body:
  text: 龜巢藁校勘記卷次葉次行次本書王宋校本目錄三前九避雨下脫無錫贈何敬存一題六前九陪遊姜公墩下脫次韵贈虛中講主一題十九後三贈應孟恭碧桃下脫老況一題二三後七寄源別流下脫悼徐孟銘一題二五後九遣悶下脫聽雨一題二八前五元日早起下脫訪王景逸不遇一題一一前三荆軻軻作聶後六粤古漢武古作昔六後八沉淵不濡王校濡作濕七前七彌綸治道王校綸作縫後七人事亦改改作催八前一煦若陽春陽春二字乙轉前八卉以爲袴王校卉作布後七子亦爲我王校亦作欲九前一粗糲粗作精前七築室居于幽僻兮室居二字乙轉後二馳名而鶩利名馳而利鶩九十折後九前一分宜雞鶩之飧王校宜作安飧作爭食十後四慨有憾于予衷憾作感後五亂曰亂作系後八肺石賦下有注郡學堂試四字十一前一同仁仁作人前四使民立乎其上兮使下有窮字前六聽其決兮宋校删其字後二曰厚重而不可轉厚重作重厚兮疑自天而來降而作之後四盤陀石兮無石字後五支磯磯作機十二前九玄珍玄作效後一以燿于黎民無以字後三而旅處處作行後五稟質中行稟質二字乙轉十三前二或千祀而束苓王校束苓作巢蓮前六雲行而雨施行雲而施雨前七擬物狀以有體擬物狀作乍擬物後一有彰厥名宋校有作久唐虞之廷唐虞作虞后後四祥休之徵祥休二字乙轉後八歌詠太平太平作隆功十四前三高其曠逸逸作達醒則矜其典型則作乃前四而視之曰王校視作䂓前六化祥慈祥慈二字乙轉後五禮酌禮下有曰淸二字十五前一暢飮暢作痛二三前三館人館上有時字後三閒坐似禪僧坐似二字乙轉五後一昨朝相別夢初萌王校夢作病六前二蘭陵溪上梅梅下空格作花村世居齊梁之子孫瀕溪沃壤足禾十五字後七新秋雨洗宋校新秋作秋時七前三四白下詩傳名不朽傳名二字乙轉後八衣食兒躬耕耕作稼八後八璚林日晏王校日作昏後九漁莎獨速莎作蓑九前二胡石潤卿無胡字前四俱在道上在作宿前五因題其後因作用後三有君子王校君作男十前六富篇章章作秩後二招魂不來招魂二字乙轉十一前一人懷帝閽人作之子後一十年河海河作湖十二後八五月天風吹巾舃王校吹作冷後九遇客尋真羽衣客遇客作遇逐十四前二金牛城西牛作斗後五六去時聲啞啞歸來宋校此二句作去時羽翩翩羽翩翩歸來聲啞啞後七子爲子王校爲作生萬物人爲靈人爲萬物靈後九以詩貽王校詩下有見字十七前二浸書閣王校浸作沁前六祶袍祶作綈後九詩成天一笑詩作書十八前九繆談恕陶潛王校談作誤後四何由過幽􅊤王校由作當後七十年走京洛十作少十九前八捍闘頃流血王校頃作頂二三前五寄惠山鑒長老下有注字仲明號太虛六字二五後八九迷經路迷經作徑迷二六後四歲歲九龍峯前脫無錫贈何敬存一題二八後三爭聲喧爭作鳴後五勿使空人之曠城王校曠城作城曠人宅三十前七河江浸坤軸河江作江湖前八珊瑚珠珠作枝後四辨惑編編下有序字後九塵世盈我襟宋校世作土從此閬風岑此作遊三二後五啣土有慈烏土作吐烏作雅三三前五羣圃何時重構築羣疑郡之訛三四後八無有似者有作肖三五前五覺來憶詩話話作語三七前五臨期賦遁去王校期賦作岐賊前七相願猶夔蚿願作顧後五吳兒賣戈劎宋校戈作刀後六何曾盡掃除宋校曾作當三八後八西京宋校京作凉後九東齋可談書談作讀三九後三爲賊所得王校得作執後四以一身代衆人之代作免王校作脫急後八難明之志志作心四十前八擊賊作癘鬼癘作厲天意不可問意作高後五能慰謝謝作藉四二前三高樹蔭釜堂釜作華王校作斧後一稍暇曾讀書曾作仍四三前五飛灰灰作埃四四前四注十五日十五作初一四五前四春雨生王校生作晴三一前八問之爾何忙爾何二字乙轉二後三噫下有注翳叶於結反五字後四憶兄下有注八月中結友五字三後五寒飢飢作餓五前七寒食前前作日六後二授餐慰行邁餐作粲執德心宋校執作報後八東郭兔兔作㕙七前二往往多是逕鄕民王校逕作還八前九誰令紀綱壞紀綱二字乙轉後五丞相聞新詔宋校聞作開後六除官平舊章宋校平作率後七何以玉能藏宋校以作似九後六遇蘭若王校遇作過十前三禪板打王校板作杖十一前後折九一兩㳺阻戈兵戈兵二字乙轉後一黃甘陸吉甘作柑王校陸作綠吉作橘十三前三相顧苦爲情苦作若十五前二注無爲無爲作月庭前三注月庭月庭作無爲前六正須王校正作止佳處亦悠哉王校亦作正後五菖歜香浮玉藥舡玉藥二字乙轉十六前六身世同一漚同作等十七前二白鷗鷗作鳧十九後三若列媧石列作裂後七短纜􅌛舊椿􅌛作擊疑繫之誤二十前一邑作里前五六爾居爾游王校居作游游作泳二二前三兼贈兩山主人贈作呈後一歌舞擁高娃王校高作嬌重繫纏頭錦繫作費後二何如宗有道宗作依後六學步恐成差王校學作舉二三前六得失永須論塞馬永作不王校作未二五後七誰爲薦蘩蘋蘩作溪二八前八刼灰灰作火後七送子扇一搧搧作握二九前七舡去逆風王校去作子三十前一岐麥當茂王校岐作薺三一前三看山水山作流前五數千年年作載後七寒汀汀作牕三三後九別後逢人說北山說作問三四前一悉往還悉作數前六繞樹翠山嵐繞寺翠嵐浮後一遭屯邅遭作遘三五前三論文誠耐久王校文作交三六前一客裾來曳王校客作長前五航船浪翻翠袖濕王校航作觥三七前八酒懷酒作襟三九前五和梅同知和作賀四十前二衙鼓三搥搥作撾後一酒酣各哦詩各作客四一前五五月中旬喜報書喜作領四二後八思君長倚馬鞍山倚作傍四三後四長扁扁作扃四七後五且咏重陽日日作酒四八前二豈不懷歸兮兮作歟後七扁舟相贈贈作趁四九前五注以其事索書書作詩五二前九我思崑山王校思作昔後三杏花落王校杏花作花自觀農來往杏花村王校觀作勸五三前二春風芳草有芊芊王校有作又後一飮水獨食蜜宋校獨作猶後四于焉保貞吉于作終後六雪中傲吏吏作兀五四前九先拈秃筆題詩王校先作戲五五前八野蘭野作焚後一君不宋君三善言不下有見字四三後五經禪老經作徑山四前三鬚眉比白雪比白雪作皆雪霜後五幸均適相逢王校均作君五前四不見桃源不見作君覔後一一笑梅邊有明月王校有作看後五旭先生宋校旭下有齋字耽書宋校耽上有終日二字後九仙姬姬作嫗七前二柳城柳作鄕十前四划舡海中歸划作戈後四黃犢王校犢作獨十一後八巢海頭王校巢作東十三前六上海王校上作山十四前五留我居篠江江作涇前七老叟心自憐王校叟作瘦十五前七古人王校古作故十六前八吮疽人在五侯家疽作癰十七後六一犂新水初春雨王校水作足十八後五淳風浸凋零王校浸作漫後六惟爾爲觀者王校爲作達二十前一不如看畫梅上頭如下有燒香二字王校梅作樓前五滄浪濱浪作海靑山頭上王校上作白二一後四一槃秋露澄王校秋作淸後九茲山賴有傳王校有作相二二前一和臨寒食有感宋校臨作林後四逃難居頻徙王校逃作多二三後一之死遂聞心宋校聞作關後三遷屋詩王校屋作居二五前一江草碧搖書帶淨王校搖作挼後四爲我許君許作喜二七前三幽雅久矣王校雅作栖前六三鳳聯翩卽罷前王校卽作郞前八燈燃佛龕王校燃作照二八後九所作水仙花求求下有題字二九後七由唐轉覆宋覆宋作羈束三十前一老尊素素作宿前六生成世業宋校成作承前八縛得銛鉏王校鉏作錐後一莫怪年棄如土年下有來字三二前二時與予相善時作特前四送我但吟詩王校我作老後五六眼前事世等蟻夢王校事世二字乙轉等作真三三後二滄茫宋校滄作倉三四後三飢烏王校烏作鴻後六交數無善道王校數作鄰三五前一寵且驕王校寵且作日寵前五坐視城棄擲王校城作成後四嗟哉爾淮夷王校夷下增亡命起倉卒衡行十五載十字後五其理信弗忒其作斯三七前一歸畊溪上田溪作滆後九施天朋王校朋作用三八前一夜逃松上王校上作江後五一別經年十二霜王校年作今四十後七高誼揭中吳王校揭作藹四二前七墮浮沉浮沉二字乙轉四三前六且喜早秋頻雨雨作得兩四四前六楞嚴嚴作伽前九明月江行王校月作日後九圓似鏡圓作懸四五前九呼酒滿傾金卷荷王校滿作頻中庭舞月王校中作空後八此石冥如此竹王校冥作實宜四六前一老夫亦得時徜徉得下有與字時下有同字前八賦此以別以作爲後五樂莫樂于親俱存于作兮四七前七天風爲拂衣王校拂作振四八前三我看蘆花王校我作臥前七忽成龍宋校龍作尨前八天上人遭恐撞王校恐作怒撞上有杖字後七翻經屋上王校屋作臺五十前二對酒泉對作共五一前七百無憂無作不五二前七復哦詩哦作吟前九吟笑人吟作冷後七常談無鬼論王校談作持五三前四靑玉籠宋校籠作龍前八聚仙友聚作集後八一時陵谷變刧灰時作昨五四前一以言老禪伯王校以作似禪伯作萬回五五前四所得氣尤淸氣作趣淸作深前九二百五日二疑作一後一文遊臺榭王校文作交五六後九爛成土王校土上有糞字五七前四從來廣東南丹宋校東作西前七自廣東東作西後四獷俗俗下有馴字後七湖南海廣西海下有北字廣下有東字五八前九民大快快作悅後六蛙平幸偷生王校平作乎後八農病于重斂農上有而良二字五九前九有如彼彼作此不負公負公作市恩後四經蓮幙王校經作紅後七冠冕縛宋校冠作軒六十前一看魚鯈魚作游前二有回首望江南有下有時字前七白屋屋作壁六一前六屋頭東邊扶桑樹邊作近前九誰與論王校論作隣五一前七名石石作山二前三瓊瑤瑤作瑰四後三我公去知淸興多王校知作時後八洞前玉氣金瀰漫王校金作今五前二以分淸致王校以作十前七漓墨鉛碑篆亦奇鉛作圓前八竹姑子年年春宋校姑下有仙字年年作明年後六位之宋校位作倍登升升作降六前三良辰良作芳前四介僎色津津介僎二字乙轉前六置宴豈能倫豈作詎七後三强酒醉當先王校當作常八前一齋居縮如蝸如作似前二春醪春作村九前三送主上人王校主作住後二此喜自得安心方王校自作似後九城陰山作讀書堆王校作作下十前四衰髩幾經蓬綴雪經作莖後二春申巷巷作港十二後五六閉門夫何如何如二字乙轉後九涵活王校涵作含尙待明日煦王校明作朝十五前二身爲百里宰王校宰作寄前六眼明如趙州王校眼明作說法前七法幢扶未起未作欲十七前三射弓弩弓作工後四酒盃盃作樽後八一行鴻舉舉作澤十九後五兩眼王校兩作老後九高人高作羽二十後八頭載白王校白作雪二一前九雲央央王校央央作英英後一十里十作千二二前二更喜流年歲未華歲作鬂前四長史仲埜王校仲上有陳字二三前四髭髩王校髩作髥前六兒子木蒙釋屯種蒙下有恩字後二同春姸同作回後八此叟性惡圓王校此作聱後九顚危賴能防王校能作周二四後五也勝兵前肉籬王校也作遠二五前五金碧溪溪作區二七前四牙籤三萬間王校間作卷後一僧流僧作禪後五竟何愆宋校愆作愆二八後二歸佩納幽蘭王校納作紉二九前六萬家聚家作夫後二倂用郡守張侯弔用下有趣字墓之行三十前三晤言固已晩已作云後九奚爵而爲奚爵而作爵奚爾三一前四夫亦何幸夫作走三三前四北風狼號霰撤粟粟作菽