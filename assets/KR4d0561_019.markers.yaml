  - {type: variant, offset: 6186, length: 0, content: '', WYG: 教而成學及以他書考之符也果登長慶進士第斯亦可謂不負其親矣然而為集賢校理乃有誤改金根之繆噫是豈以擢第之後遂弗究于學歟今觀松居先生筆韓公之詩以示其子盖先生之心即韓公之心也為之子者得不以親之心為心乎仲野今學優而仕方且以學軒署燕居之所懃懃焉佩服父訓為學不厭夫如是視韓公之子有間矣昔人有言顔何人哉希之則是况希韓乎僕雖老尚刮目以俟時洪武五年二月初吉毘陵謝應芳書題太乙真人圖按韓子蒼之詩曰太乙真人蓮葉舟又曰龍眠畫手老入神此盖題李伯時畫也所謂真人者姓名時代考之列仙傳䓁書無之不知其果何如人然以蓮為舟偃然髙卧風神瀟灑茍非有幻化之術乃能真蛻骨而仙者疇克若是乎是圖摹冩之妙較之龍眠筆法人無間然其必善學而得其傳乎神仙有無姑置勿論夫君子玩物以適情耳當此金革擾攘之餘人方埋頭塵坌欲超然物外之逰而不可得覧是圖者當心融神㑹與博望之槎琴髙之鯉金仙氏之浮杯踏蘆者同適其適不止論形似而已宗禮求予言俾題其巻首云書歴代䝉求後世俗以千字文為啟蒙之書尚矣然使之識字而已餘何益乎是書亦四言為句便于習讀自羲農以來數千載世代盛衰歴數修短粲然可見授蒙童令熟記而知之豈云小補觀者其毋忽焉某年月日龜巢老人題題子昻竹石昔文敏公初赴京過毘陵止宗人東臯先生家人多求公翰墨後仕于朝往來霅上時先生數從之逰因得公書畫凡數幅内竹石一紙公題小詩絶類此巻吁公初以書名于時其畫與詩本皆絶妙今此巻備焉有區區未易贊述者特以予家藏舊物皆亡於兵眎今又隔一宇宙捧玩再三不勝慨惜題敬親樓詩巻後丹徒陳彦芳既𦵏其親于别墅搆樓以奉先祀扁曰敬親示不忘也夫死者魂氣歸于天形魄歸于地故廟以妥神墓以藏體廟必于家者神依于人者也今彥芳奉祀别第其有徴于古歟抑其心有得于敬親之實而非矯焉以假其文者歟夫目之所視而思從之登斯樓也丘壟在望松楸蔚乎其前知吾親之藏于茲也與其族之人時而至焉固將羮墻而見之抑是室也吾親之所種樹今則拱焉吾親之所燕逰其遺跡在焉彦芳即是而思其親其有不起孝敬乎詩曰維桑與梓必恭敬止延陵季子曰骨肉歸復于土魂氣則無不之也彦芳之心其有徴於此因書以歸之題觀奕圖世謂觀棋者恒髙於當局之士予曰不然顧其人智有優劣亦係乎用心之至與未至耳今觀是圖冩對奕者二人其風度閒雅皆若聊爾于奕坐而旁觀者一人則注目棋局凝然若精思入神或一着可以决勝負而未易語人者熟視其狀殆猶陳平患諸吕燕居深念不見陸生入坐時也吁世之當國者旁求㕘佐與之策安危計成敗亦有用心如觀奕者乎撫巻三嘆用題其末庶覧者或有感焉楊妃齒痛圖玉環瓠犀以荔子而痛痛未甚也三郎為環而痛痛則甚矣使移是痛以痛天下羣黎之痛烏有天寳之亂蜀山之狩乎今觀唐棣所圖不痛環之痛而痛三郎之痛抑亦為當時羣黎之痛也噫題山谷香嚴偈墨跡宋髙宗謂書學廢於五季至本朝蔡襄等方入格律蘇黄米薛各有趨向然則山谷之書為一代名筆豈易得哉題糜氏家譜凡為譜牒者往往追稱先世勲業之盛世代遼邈變革不常茫然紊然有未易考者或乃致遥遥華胄之誚君子恥之今觀崑山糜氏子才家譜則不然世祖而下至金紫光祿公為髙祖之考然後旁及羣從至於人所不知之地天其報之如此家譜之作盖欲其後人念祖修德象其賢行其澤非直為觀美也詩曰子子孫孫勿替引之予亦誦此為他山之石云䟦許氏臺萊集予嘗以天下福善禍滛騐諸古今其理未嘗不焯焯也若曹彬曹翰皆宋重臣以彬之賢屢世榮顯翰肆貪暴子孫飢寒當時史官特並書之以示勸懲詎不信然今觀宜興簿許侯克敬所示臺萊集譜其族自南唐金紫公居畨迄今埀五百年其間擢巍科登膴仕者代不乏人非尋常世族之家所能及也其從兄德夫為金紫公十六世孫以舊編所紀詳於名爵畧於行義乃重著而備錄之諸先正之潛德幽光粲然在目然以愚觀之必又有多蓄隂德黙契于天者雖子孫有所不知閭里有所不聞國史郡乘有所不能傳載天其相之裕乃後昆所以緜逺盛大至於如此不然何世代屢易許氏之澤愈乆而愈不冺耶詩曰無念爾祖聿修厥德又曰子子孫孫勿替引之愚請為克敬誦之詩為祝規并筆于巻末而歸之時洪武七年夏五月之吉毘陵謝某䟦族𦵏圖河南保定趙先生所著族𦵏圖其說本於周官㕘諸衆論尊卑昭穆粲然有倫使觀之者心生孝悌亦猶觀老泉蘓氏族譜也如是以𦵏其親以祛其風水之惑於名教豈小補哉先生諱炳字季明其經學德望為中州時宗至元大德間七聘方起官至翰林承㫖學士平居多著述若四書選註䓁書皆有功斯文愚恐東南之人有未知程伯淳者故粗述於圖說之後鏤版而傳之詳見元史䟦蘓魏公百韵詩後右蘓魏公百韵詩叙平生出處行事之大節謙言為家訓也然字字句句皆足為世楷模豈特一家之訓而已哉若考亭朱夫子西山真文忠公諸大賢咸有贊述區區後學尚何言歟某竊嘗忝與公之裔孫景瞻父逰屢䝉出是詩警教嘗謂某曰名教有餘樂異端戒多紊只此二句有終身行之不盡者盖其服膺祖訓力踐正學卓然不為異端邪說之所惑故有是言時某䓁知所向慕者幸頼私淑而加勉焉於乎瞻父既殁世亦隨變瞻父之子若孫家毁於兵獨珍藏是詩出入戎馬間三十年與身俱存且能奉庭訓不淫老佛亦可謂不負魏公埀訓之意也某重獲覧觀儼如對瞻父晤語敬書此以寓感愴䟦脫時敬叅政手書字書心畫也人能覩其親之心畫而知其志焉斯可謂能子矣今觀髙郵同守畏吾氏伯堅于兵革之餘得乃翁脫公大㕘所書晝錦堂記如獲重寳愛之敬之不翅若其親之在目其殆著存不忘者歟愚嘗論歐陽子之為此記也盖知韓魏公之志在乎德被生民功施社稷故以此二語為一篇之要大㕘筆其文得非志魏公之所志乎使伯堅灼見其親之志曰德曰功當知勉其所以繼之者是則愛敬之心又推之于書字翰墨之外能子之道必如是而後盡耳昔者辛夘秋公來毘陵適予復忠公墓田築祠立碑公為之大喜嘗以弔祭之文示予而往焉時所書端謹持重視此篇筆意蕭散神氣飄逸有不同者此先見其字學之妙不凝滯于一偏也於乎落月滿屋梁猶疑見顏色况心畫乎想像髙風不勝起慕敬書此以告伯堅并抒所懐云書安撫陳公䟦先君小像自贊後昔者狄節使却梁公畫像世固稱之若先代遺容遺言如安撫公父子者其後人當視瞻如生存敬恭如侍側勉焉冀企及之雖時有隆汚命有通塞有不克奮勵以纘先緒然所以是是非非不避權勢赴人急難如救頭然是皆起懦疾之藥石也慎毋以狄公藉口而藐眎厥祖如塗人然詩曰無念爾祖聿修厥德軒冕云乎哉閥閲云乎哉今安撫七世孫茂吾婿也出示石刻祖像并覽贊䟦起敬起慕因題其後如此云䟦張氏家譜圖右畨禺張氏家譜圖知常州府事中憲公度倣歐蘓族譜為之由七世祖而下瓜瓞延蔓尊卑戚踈瞭焉在目中憲需予言愚於是切有感焉書首九族詩重同姓吾夫子嘗刪定二經埀訓萬世其敦本之意至深切矣若夫大小宗之法盖推廣之後世宗法寖壊世教日衰然天理民彛未嘗冺絶東平九世之張江州百口之陳亦代有之若文正公則能以祖宗之心為心贍族有田踈逺畢給真可謂不負詩書敦本之意今觀中憲公追念厥祖留情譜系惓惓如此他日㕘大政得厚祿如文正可為之時以是心為之吾知文正公不能専美於昔矣揚子雲曰顏何人哉希之則是愚於是亦云䟦吕仲珪孝思巻夫為人子者或不幸於養生送死之道有未盡焉處禮之變當從權以事其事豈徒抱終天之戚而已哉今觀崑山吕仲珪氏早嵗以父命出贅不能奉甘㫖後其親旅殯白下去家五百餘里又不能春秋省掃以寓哀思服闋數年痛䀌如昨與人言輒流涕盖仲珪以孝有不及情莫能忘然則如之何而可也惟所謂權宜用釋氏茶毘之法函骨而歸瘞諸故丘宰而楸梧祠而蘋藻焄蒿悽愴常若見之則其親之死猶不死也若夫繼志述事或出或處樹其業以顯其親則諸士夫頌美孝思之言斯足徴矣䟦凌克禮父子孝感詩文後昔聖人以子騫父母昆弟之言而稱其孝盖人之善事親者必先目之口之于同室之人而後一鄉一國熟聞而著稱極而至于流芳天下後世矣前數年客有過毘陵者說潤卿父子之孝吃吃不離口予來婁江婁之人咸譽之既而盧兖州子長嬰以趙徴士用晦所贈孝感序并諸賢士夫歌詩若干篇皆本乎其父母昆弟之言予然後知潤卿二子長克仁次克禮能罄家輸粟以贖父罪去之日奮不顧身數千里危難争先而赴吁昔趙禮兄弟遇暴將臠食之其兄孝曰吾體肥可代吾弟若克禮事雖不同其亦趙氏之心歟然或者謂是亦常人所能為予故原其心而論之如此豈易得哉今凌氏五世而居重闈色養曰慈曰孝其所以盡其孝道者固不止於是也洪武十六年夏五龜巢老人謝某䟦䟦陳寺丞思愛菴疏右故宋寺丞陳公以思愛菴奉先疏請果上人主之駢儷精切字畫端勁其為人可知寥寥二百餘年為果嗣法者不知凡㡬代是菴易名圓通盖亦有年公之疏文幸而無恙今性中師弟子知敬重之求士夫題識余於是竊有感焉宋之文獻禮樂盛于漢唐然當時世家如文潞公之有家廟者絶少請寺觀為香火院者滔滔豈禮樂不明淪於習俗以致然乎今性中知其文當知其心知其心則知所以敬其先世者在乎菴仍舊名庶存初意如此則名正言順而奉先之意終于有成寺丞公之死猶無死也豈徒重其文而已哉䟦岳氏族譜岳氏為常之望族舊矣予早歲過唐門見其第宅相甲乙者數家且聞竹山蔣先生言宋乾德間岳王弟經略使之孫自九江來居由宋而元子姓蕃衍文物之盛㧞萃同里比以陵谷變遷奕葉憔悴東之懼譜牒散失嗣而緝之猶老泉蘓公之譜其族也老泉之言曰觀吾譜者孝弟之心當油然而生吾知東之亦以是有望于族人焉或謂昔者狄武襄不後梁公君子韙之是大不然非其後而附之者非也為其後而自外者尤非也故人苟能以東之之心為心由孝弟以行吾仁則民吾同胞四海兄弟無往而非仁矣然則族譜之作豈小補哉時洪武十有九年六月既望龜巢老人謝某敬䟦䟦經訓啟䝉右經訓啟䝉北溪陳先生所著也先生經學得考亭夫子之傳卓然為一代師表病世之訓䝉者所教厖雜蔑養正之功故采摭經傳以三字四字為句緝成韵語以便習讀其書言孝之大原學之㫖要使幼學者誠能熟讀而藴之於心養其德性既而長施諸事業則舉而措之耳蘭曩避兵東呉得此書三十餘載郡人徐孟容孟曽䓁見而寳之謂明珠暗投良可惜也是用版刻以廣其傳於乎先生經訓以教羣䝉盖以聖賢之心為心視厖雜之書蘭鮑不同俱化之效乆當見之凡為父師者可不慎其擇乎子程子曰習與性成聖賢同歸吾於此亦云洪武己巳九月重陽日毘陵老諸生謝應芳拜手敬跋張孝子傳張孝子小字阿伴常之無錫人也為兒時父母以歲饑去鄉土流離四方後徙居晋陵之東洲未㡬父卒兄亦早世家益貧母查氏僂傴不能任婦事中歲復多病常在床席伴傭力黄氏家仰給之黄氏工染色伴因學焉乆而遂精其業主愛之歲益其直伴身無完衣其奉養之具則隨直而豐時得一美味必歸遺母母或分飼之則紿云已食母盡之則喜當暑月每夕炳蒿艾以驅去室中之蚊拂枕席以安母寢隆冬雨雪罏不絶薪夜必燠母於懐如此者二十餘年服勤於親殫力於傭未嘗一日廢其事怠其志也母夀六十五以天年終伴慟哭幾絶先數歲預營𦵏具及歛之日即舁柩歸無錫合𦵏父塋今墓木已拱春秋携酒肉省掃必邀至鄰里飲食之拳拳焉為保全丘壠之計平居遇飲食適口猶常動風木之悲或哽咽飲泣徹而後已且以親在之日仰食黄氏深德之効力愈謹或者常欲倍其直募之伴不從嗚呼斯亦可謂義焉耳今鄉人特嘉其孝稱為張孝子云贊曰以曽騫之賢又親炙聖人得學問之力其孝宜矣若伴之微生長陋俗目汙㓙德耳習誶語乃卓然返哺跪乳梟獍之羣使㳺聖門而學焉安知非曽與騫之徒歟區區受傭於人又能以力報効乆而弗忘吁世之朝祿爵而暮亡叛者其人能無愧乎錢孝女傳錢孝女者呉郡田家女也父母喜其性婉順納婿與居洪武初兵興歲餘徙家常之三山湖服勤婦工兼力農畝搰搰乎共養其親父卒母老而病踰兩期腹有瘕癖號呼痛楚女甚憂苦每中夜禮佛籲天拜跪懇禱一夕潛以刄刲股紿其母為他肉熟而進之連年之疾即刻而愈既而鄰里以其母無號痛聲故詢知其然衆皆驚嘆女姨母吕氏為吾鄰嘗詰之言其平昔細行多不可及乆而益勤至不惜其肢體斯亦可謂篤孝也與論曰昔鄠人之孝同於錢氏昌黎伯固嘗非之其言盖本諸經以毁傷為未善也然閭閻匹夫之愚禮教不知一念之誠根於方寸通乎神明而孝感昭著如此豈易得哉豈易得哉於乎使薄俗之不顧養者聞錢氏之風亦寧不泚顙芒背恧其心而知悔悟也與是歲庚申六月望日諸葛節婦黄氏傳黄氏名真净丹陽縣吕城諸葛用中之妻也父家晋陵以其女生有淑姿善女工父母鍾愛擇配數年聞用中為兒時過驛亭適南臺監察御史普公見之以其能屬對摛大字甚佳呼為竒童聰慧之聲洋溢四境故黄氏之父以女許嫁之既嫁而翁知其能遂託付家事使其子得専儒業翁殁其夫婦能以翁之心為心服勤如初賓敬之禮弗渝肥家之功益著養子作而愛不姑息凡鄉里之為父為母之賢者咸儀之元末兵興夫婦挈家竄呉下蒿簪卉服藜藿食飲艱苦十有餘年夫病而亡哀慟㡬絶吐肝膽告之柩前曰未亡人真净三年服除當星冠羽衣若女道士以終其身有所否者天殛之由是教其子以繼承宗嗣無忝厥祖洪武改元於鴻雁安集之初歸𦵏其夫命其子復舊業什有二三餘皆棄置盖亦知止足之義而無殆辱也數年之間又能撙其餘力助羽流重搆清微觀以祠先世身佩符籙日誦老氏書貞節愈固今春秋七十有二鄉人嘗欲聞諸官乞旌其門婦曰夫死不嫁吾分内事耳卒不許於乎婦有節義禮教所嘉况能繼述以昌其業以裕其嗣續豈尋常守節者所能及哉予常往來常鎮間聞諸邑人質諸鄉校無間然者故撮其要而書時洪武二十二年三月之吉長白山居圖說客有過余者雨牕焚香相與覽髙沙李侯山居圖客謂余曰世謂畫為無聲詩信矣往者李徳裕以軒冕之貴疏平泉之逰賦詩憶之是圖之作亦其詩之意歟余曰不然平泉花石以力致之窮奢極靡盖溺於玩物者也夫長白山天然勝槩為梁鄒冠冕甘泉巨谷嘉木幽卉蔚有清氣昔范文正公讀書其間虀茹糜食與山俱清卒為一代名臣今侯鍾茲山之英人品卓絶學亦如之至於擢髙科參大政出處繼范公故武山中猨鶴詎云忘情但時方敭歴中外若安石為蒼生而起奚暇復顧東山乎是圖也盖侯黙寓家居讀書之意以示其子孫抑亦示不忘桑梓之敬耳平泉之思豈其比哉客唯而起且俾以所荅之語筆之圖左俟侯見而質諸月泉說學老氏之學宗乎無為而能無不為者惟其心之清明洞徹不泥於物所謂圓機之士為能然耳吾友闞伯真殆庶㡬乎漢天師四十二代孫張公大真人嘗以符籙授伯真伯真宗其道行之於家黄冠鶴􅌁蕭然出塵然而隂陽醫藥巫卜之術又旁通至於桑海變易溷跡塵土亦未嘗忘其學離其道也真人嘉其能乃大書月泉二字為伯真號吁名者實之賓也月泉之稱豈茍然而已哉共推千載心秋月照寒水昔吾朱夫子有是言也今真人指其心而喻之所以警伯真者至深切矣是心也誠能皎然如月之明湛然如泉之清無幽不燭有感斯應雖以膠膠擾擾之物紛乎吾前而吾之至清至明者盖自若也則圓機之士不㡬乎和光同塵升老氏之堂而入其室乎伯真勉乎哉無知生說夫人與萬物同生兩間而其所以不同者心知之靈耳彼巢而知風穴而知雨鳴而司晨吠而警盗知恩而返哺知機而避去若此者亦未嘗蠢然而已人而無知可以不如物乎吾友趙君執中生而聰明又嘗用力於格致之學行年三十號無知生故聞者不能無疑焉或謂執中以時俗尚智術飾巧詐狡獪萬狀深疾之將欲塗其聰塞其明矯俗之弊以返乎不知不識之天寧為蚩蚩之氓而不辭也予曰不然若是則因噎而廢食矣吾意執中讀孔氏書尚友千古觀聖門髙弟賢如顔子聞一知十方且有若無實若虗終日如愚人然况學者乎故雖多識前言往行而自視欿然猶無所知也然則名為無知實欲求知其所見之大為何如哉予嘗扣之執中執中笑而不荅故筆此觧或人之疑并勵吾執中亦以自勵云子京字說父命子名而朋友字之禮也吾友張君伯祥之子名畿予固知其愛子之心期以逺大字曰子京且為之說曰京畿人海也五城十二樓金門玉堂冠冕佩服館閣之文物羽林之儀仗瓊林大盈之府庫凡如此類皆天下所無有實為魚龍變化之地也故有志之士雖在窮髪必勇其行乘風雲呌閶闔瞻日月之光被雨露之恩然後為無負也今子京年方壯强一日千里弗忘命名取字之意不然則齷齪與蓬藋同腐徒美其名何足尚哉存耕說為孫允昭州判作客有遇存耕叟於龜巢者商畧今古劇談乆之客謂予曰叟方膴仕而暇耕乎不耒耜蔑畎畝耕可得乎予曰不然善觀人者于其心不于其迹夫以其迹論之叟固嘗主一縣之簿矣嘗為一州之倅矣然方寸之地了無荆榛耕之以禮耨之以義存而遺之子孫故于昔人之言取以自號以示無忘之意耳吁以其遺較諸德公盖亦大同小異歟且天生斯人皆有此亦莫不有耕耨之具焉但往往荒穢弗治怠棄而自失茍存之則其後之以耕以穫以收其成功乃必然之理何泥其迹為哉客語塞叟起而謝曰詩曰他人有心予忖度之巢翁之謂也請以對客之語貽諸後人目曰存耕說云龜巢翁者毘陵謝芳氏也景中字説尼山聖人筆六經以詒萬世中之一言間見特出既而子思子著書以授孟子寥寥千五百年知者盖鮮至伊洛諸賢發明藴奥昭如日星後之人敢畫蛇而添足乎然所謂景者景慕以冀及之學者之志也中則人所受于兩間與生俱生無物不具學之道必先知無不明而後行無不當竊嘗以射譬之物理之中猶射之的凡射必先知其的之所在謹乃弓矢正已而射之斯可言中矣不知其的而射者妄也妄而或中乃偶然耳吾無取焉惟時中君子從容中道無適不然是妙于射者也詩曰髙山仰止景行行止如此則思過半矣景中勉乎哉不然執中如子莫中庸如胡公不免為天下後世之誚此又不可不知也德宏字說東林趙先生為前代遺賢今其四世孫名廣姿禀之淑善讀書兼明今古法律以勲業自期不狹隘以自局焉故朋友以德宏字之請其說於予予曰人生天地間𦕈如一粟謂其能與天地參者正以執德之宏心同宇宙萬物皆備於我萬化皆出於茲所謂小無内而大無外也勲名事業盖亦隨其廣狹小大而成焉若夫方寸之𠂻彼疆我界籓籬荆棘雖有所得蓄縮如蝸不免貽笑於大方之家耳然名者實之賓也名浮於實君子耻之夫以子為東林有道之孫貽謀未逺其立志果不小乎執德果不虗乎昔者孔門諸弟不如曾㸃漆雕開能見大意聖人乃恱之予之使學者誠能有二子之見以宏厥德則宇宙吾心也吾心宇宙也曽何人哉漆何人哉希之則是慎勿謂老生常談而忽諸寳山字說余聞浮屠氏之所寳者三曰佛曰法曰僧如金銀珠玉之屬為世所貴雖亦以七寳名之較諸佛法不啻霄壤故瞿曇在祗樹園説法有曰人以七寳厚施而求福者莫若般若一言持之於己教之於人得福為多由此觀之金玉之寳積如丘山何足貴哉今夫趙居士拱真有志學佛在家出家浮屠師以寳山字之其意若欲使之歆豔而得之是亦意其為善也不然則郿塢積金賈燃臍之禍銅山鼔鑄致餓死之辱凡如此類識者恥之况欲使人歆豔乎楚書曰楚國無以為寳惟善以為寳如是而言則語意明白開示以導其進庶可謂善誘人矣居士徴予意予無可言者請以楚書之語語之於浮屠之言或可補其闕云學古字說先友丁德齋往嘗以家譜示予曰五世祖為寳佑相國多藏古聖賢書厥後以陵谷變改家用淪落書亦漂散元初大父乃徙居鄉城以慈幼齋醫藥如成都賣卜者焉他書無復有也今德齋𦙍子斆喜讀軒岐靈素之外嗜六經諸史不翅膾炙故老夫以學古字之謂曰古之學以三綱五常為重綱常不舉則無以立身身不立則道不行於妻子况餘人乎然道有小大事有緩急必先其大者急者後其緩者小者毋泥焉古之人巢居穴處無宫室也茹毛飲血未稼穡也凡如此類茍一切是古非今舍此取彼不㡬乎迂踈放誕而行怪者乎吁居今之世反古之道烖必及身子思子埀訓後人為世藥石此又不可不知也學古者宜慎諸聽其自然説為黄仲器作老友黄仲器以聽其自然四字掲諸齋居一日載酒過龜巢需予文予以不知其言出何書意何在莫敢妄為之說仲器曰吾意天為自然餘無所知也予於是臆度而告之曰物本乎天而天宰之者理也夫所謂自然者如隂陽之消長日月星辰之運行江河之所以流山岳之所以峙草木鳥獸昆蟲之所以動植變化至如人大者三綱五常富貴貧賤死生夀夭之類小者如四肢百骸飲食衣服宫室車馬之屬皆本乎自然之天昧者乃欲以人勝天而不聽之若季孫氏以魯大夫僭天子禮樂富於周公秦皇漢武欲長生不死者未嘗不自禍其身也孟子曰順天者存逆天者亡斯言盡之矣仲器作而謝以故書此警諸紳示諸人亦庶乎有所警云無名異江湖之濱有物焉其大如菽圓如撱黄而黝外强而中乾似沙非沙也礫非礫也纍纍乎沙礫之中不知者直以為沙石然髹者得之以和桐漆之漬易燥以益堅否則工雖良弗能使之燥也况堅乎故善髹者率用之以其有竒用而無名故以無名異目之而邑有雷氏髹數世其亦老於髹矣每役士大夫家則以是詢之未有得其名者一日語予而悲之予止之曰是奚足悲哉夫君子負有用之材沒世而名不稱者滔滔也况微物乎噫世之用人者其亦有如雷氏之悲者乎蛇蚓五月望予艤舟城西見牧豎數軰飲牛于河俄有走而號者曰蛇將嚙人豎皆失色已而聚觀果伏蛇草中􅀈舌掉尾吐毒氣勃勃可畏羣豎欲殺之擲凷礫如雨蛇度不能免乃㳺於河猶昻首騰踴作嚙人狀旁觀有不勝憤者持短挺渉水擊之應手而斃衆懽譟為快予既歸明日過白鶴溪上時暴雨潦水盈溢而蚯蚓縱横于途途之人殆不能容足先予行者三人老一壯二皆擇地而蹈不蹂踐以殘其生吾如之回視吾蒼頭亦然予因是切有感焉夫蚓内無筋骨外無鱗介茍欲殺之斯須可累千百今若此城西之蛇欲害人而人害之蚓則無害而人亦弗為之害非有所厚薄也人而蛇者可不悟哉鷗盟文為熊元修作鷗社叟老于元末屢聘不起遂屏跡五湖三泖荒寂之濱魚鳥為伍睨京洛萬人海中鳯有池鶴有軒鷹揚而烏集紛紛乎五鳩之屬簉羽鴛鷺為時羽儀是皆出類離羣弗與吾友而吾亦弗為之友也惟鷗也素服涓潔野性閒雅且夙嘗與叟相親荷風葦月雲濤煙浪凡可以適吾適者莫不與之共之一日舉觴酧元真子天隨子乞靈為鷗社盟主而矢之曰鷗乎鷗乎忘爾機吾亦如之恒㳺居於斯又曰鷸自蚌持鵬自溟徙斯盟或渝者如白水時龜巢老人亦奉盟歃呉淞之淥而與盟焉乃丹書其辭如右招隠論夫連城之璧韞乎荆山明月之珠藏乎滄海茍非識者有以取之則希世珍不能自衒而自鬻也隠逸之士盖類此耳嘗觀古之隠者如莊周所稱巢父善巻許由樊仲父之流土苴天下雖唐虞聖人之事皆為汙耳此盖荒唐謬悠之談無足深信請以商周以來經史所載㧞其尤而論之伊尹耕有莘之野以成湯所知致幣三聘遂為阿衡不然則終於犁鉏之甿矣傅說隠於商巖以髙宗所慕圖像旁求乃得為良弼不然則終於版築之夫矣周之太公濱海而處坐茅而漁非文王載以後車則鷹揚之功不見武成之日矣漢之四皓茹芝商山其不赴髙祖之招而從儲君之㳺者盖為炎劉氏基本而出其大功為何如哉若夫淮南王八公之徒大山小山之什其才華文藻不為不盛然未聞為朝廷得人使之康濟斯世斯民之用故君子無所取焉至如光武成中興之業海内之士雲合應響而嚴光倜儻獨能以節髙之或授官而不拜或廷伏而不謁卒歸於江湖荒寂之濱欣然與魚鳥為伍惟其清風峻節砥柱頺波殊有禆於世教也三國六朝而下求其如南陽布衣鞠躬盡瘁以報其主三顧之勤者固少然徴舉遺逸代不乏人但燕石或偽為荆玉魚目或悞為隋珠不免有純盜虗聲之誚者矣今郡府之職歲舉人才是亦古招隠之遺意也惟能知之人而取諸巖穴之間度其才而薦之朝廷之上鉅細精粗各適其用此誠一聖天子恢宏治道之良法也詩曰濟濟多士文王以寧夫士也為時而出其必有以古人之所寧文王者以寧今日之天下國家毋徒視終南為㨗徑云東呉野語許慶一者崑山石浦人也贅同邑許家墩繆氏既而父歿母食貧往繆氏依焉慶一妻不孝於姑天厯三年六月十三日將晡其姑以飢訴鄰人許本空適安亭陸省磧澳魯道在坐且與繆姻戚遂同往勸說之本空以其釡中所餘飯飼之婦奪而覆諸户外曰寧與犬食本空䓁方怒罵厥婦婦毁姑不輟且指天誓所毁不妄時片雲起西北俄頃煙霧四塞晝暝如夜霹靂震地里中大駭獨其家無聞焉本空䓁但見有白氣如練緣竈突下埀三人則恍然若有推出者跌仆在地大雨傾注平地水湧踰半尺屋焚婦震死然隣居相接畧不延燎婦死至夜復甦逺近驚異時婦妊数月或者謂天不忍其腹中之子故爾由是婦方知懼養其姑以夀終今婦年六十有七當時所震者生女四十一歲矣洪武壬子冬毘陵謝某過許墩許均善家聞其詳如此嗚呼孰謂天為茫茫耶屈東海之婦而旱亁悲齊堂之女而振風炎霜降獄熒惑退舍其響應若此者已多矣豈特斯婦乎然天即理也人不順理是為逆天順則存逆則亡盖皦乎其不誣也雷震之事予特欲使昧於理者知有所警故筆之厲鬼辨往予過無錫適州人出郭迓神赤髪青面吻出兩牙狀極詭異旗旄鼓吹衛從而舁之予嘗訝而問焉人曰此唐張廵也且言公死時自謂當作厲鬼故世以公為疫厲之神而崇奉焉嗟夫是何邪說者附㑹如此耶按唐史公守睢陽如一木支大厦之踣兵盡力竭死不忘君故發憤曰生不能報陛下死當為厲鬼以擊賊此盖忠義激烈之辭豈謂為疫厲之鬼以害天下後世之人哉所謂厲鬼乃汎言剛厲之鬼若韓文驅厲鬼之厲相似非疫厲之鬼也誣枉前賢罔惑後世邪說之害一至扵此可不辨哉苐恨老無能為不能為州人毁除淫祠一洗習俗之陋區區謇言用告來者重建縣學事實皇朝革命政教一新設學校置師弟子員以教以養以求其實效非疇昔文具比故官於郡縣者皆以是切切也洪武五年武進縣知縣臨川董某縣丞江隂陳某以縣學敝隘僉議易之既而乃割俸搆講堂三間其軒楹如堂之數翼以兩齋齋各三楹教官等齋廬庖湢之屬又十餘楹由是師生有講學居息之地矣明年春視夫子廟棟橈柱折惕將壓焉曰殿曰廡曰㦸門及櫺星門皆徹而新之聖賢肖像重為修飾而邑人具瞻之敬盖益崇矣又明年規射圃於學之傍為亭三間闢門道南向深若干歩而作外户閽人守之凡廟學計若干楹其崇廣皆比昔有加地皆甃甓繚以周垣樹之嘉木奐輪之美丹碧之輝煥如也某竊惟前元時武進縣初無學宫所設教諭附郡學廪稍至闕年有司剏始記者謂病地弗𢎞盖茍焉而已今吾令與丞皆儒而官故能以興學為己任前主簿登萊尹某及今簿澤州張某相繼翼贊以底於成非不役也而役之以時故民忘其勞且有樂助其才力者皆賢長貳祗順朝家教學之意而邑人化之又能心長長之心也育才之盛當自茲始真可為斯文賀辨訛夫江南淫祠在唐為狄梁公盡毁唐衰禮廢繼以五季之亂妄意徼福諂非其鬼泛然以大號加封紊雜祀典祠廟滋多里巷間土地有祠盖肇於此然以民情推之其始也必以農榖之功本乎地土歲時祀享亦近乎報本之意迨夫廟貌之設無可為像遂以鄉之有齒爵者當之既乆而世代變革承訛踵繆至有可笑可怪而不可曉者姑以目前之郡城西南三十里曰梅村廟稱三姑其初必曰某姓三孤之官後乃訛為三姑也按周禮三孤之貴次於三公即後世所謂少師少傅少保是也村甿巫祝之流無知妄作以孤為姑又城之東北有稱十姨者必拾遺之訛稱雨淋者必羽林也夫以十姨為一婦人以雨淋而不室處是則可笑也已至若三姑乃儼然塑少艾三人冶容美飾衆所具瞻且復變九里塘為九女以附㑹其無根之談蠱惑人心傷風敗俗有不容不辨者改而正諸宜自茲始吁甚矣人之好怪也昔蘇長公之詩有曰舟中賈客莫謾狂小姑前年嫁彭郎盖江州有大孤小孤之山澎浪之磯其俗亦訛孤為姑澎浪為彭郎公戲而譏之意甚明白有足以破其惑矣如應芳者雖究明是理灼見其非奈無狄梁公在位之權又無蘇子名世之詩請與鄉之士君子追原俗情遵依法律徹去繆像題其主曰土地三孤之神如此則可以正訛傳息邪説合今朝之令典釋舊俗之羣疑且不失其初報本之意若夫掃滌淫祠行之四方有不在我者不喋喋也芻蕘有詢尚俟他日釋異古禮人之初䘮所以待三日而後小歛者冀其或再生也今吾子死終日而甦無足異者但沐浴裳衣神識不亂命諸生筆遺囑二千餘言言有倫序視其字之悞者索筆為塗改之比常人之死固有異焉至若啟殯之日經盛暑兩月不臭不腐面色如生則其異甚矣宜乎立言君子墓誌不書此盖遵用聖人不語恠之遺意雖然吾嘗視晉書盜發尚書令卞公壼之墓壼屍僵且握拳透爪宋劉忠顯公韐靖康中使金不屈而死之燕人愍其忠菆諸西岡凡八十日金退方歛葬顔色如生史皆不誣矣又如元鳥生契履武生稷說者謂神人之生異於常人麒麟蛟龍異於犬羊魚鱉夫死者一理也有生者之異於常則死而異者何足恠哉區區所言非䛕子也非好辯也公天下之理而論之也前軰有曰千人萬人中一人兩人知殆謂此意耶噫請除淫祠文先王祭法載諸禮經曰法施於民曰以勞定國曰以死勤事曰捍菑禦患者則祭之非此之屬皆淫祠也是故狄梁公盡毁淫祠程子言除淫祠而後民為善盖淫祠不除則愚民無知將謂福可謟求而得罪可妄祈而免所以為惡者多而為善者鮮矣欽惟聖朝更化之初詔誥多方淫祠有禁革諸神大號之僭稱斷婦人燒香于祠廟釋道菴院不許擅立况淫祠乎此國家洗陋俗之新條息邪説之要務普天率土罔敢不遵切見本府西城門外有不得姓土男子突然於大驛路傍創立金家神廟煽惑羣氓燒香不絶若不早為禁止將來為患可勝言哉如䝉官司覈實當里甲人等果有實跡諭令折毁庶免無知之民誤陷刑憲如此則梁公忠國之心程子教民之意一舉而兼得矣區區耄言因國家正大之氣而應之如豐山之鐘霜降而發聲也僭越之咎必䝉矜恕賜諸施行公論幸甚風俗幸甚甕天觧洪武甲子秋冬之交多雨而早寒兒軰為予作小閣東廡廡周圍紙屏上䝉葦蓆方廣裁七尺有咫圭竇出入埀之以簾亦織筠而楮之與屏一色如堊壁然瓦盆柴火傍置小榻老夫得坐卧飲食乎其中既安且燠熙然而春外間雖層氷積雪鼔之烈風天地六合為一此室以衛䕶縝宻寒氣無罅隙可能入也但一己之樂罔能及人猶醯雞之天局為一甕中耳故名之為熙熙甕天客或笑之曰樂則樂矣何誇歟彼富貴之家雕甍繡闥熾鳯炭之爐重獸錦之茵暖玉為杯酌以醇醪肉臺盤交進於前肉屛風擁於其後温柔之鄉其樂如此子之甕天能彷彿其萬一乎予曰不然彼樂於人吾樂於天樂於人者肆其欲樂於天者安其分區區野老年將九十目識一丁之外餘無德能爵祿資財皆蔑以致之今若此不惟鄉閭側陋者鮮能同之古之君子若使虜持節者囓氊沙漠佐主中興者渡兵滹沱抗疏而謫官潮陽擒賊而夜入蔡州是皆冐氷雪渉危途急於報國而不暇顧其身也又若羊角哀之往於楚左伯桃之死於樹樓煩墮指之卒赫連蒸土之衆其為凍苦可勝言哉今予之樂竊比乎醯雞甕中之天非誇也自以為足也言未竟客掩口而去捄弊世俗以浮圖治䘮以先正斥之盖欲行古䘮禮終事親之孝而厚風俗也比年以來或者吝於財而薄於親者泛然以文公家禮藉口䘮禮不行佛事不作視骨肉至親之死如塗人然棺壙之外餘皆無之不孝不慈傷風敗俗至如俗禮以飲食待執紼之人亦靳而不為親戚非之鄉里譏之有愧乎設無礙齋者多矣嘗觀佛事之作雖非正道亦彷彿古今祭祀之儀燃香㸃燈猶欝鬯庭燎之用也疏文陳白猶祝辭也齋厨供饌猶籩豆簠簋也楮錢楮幣猶𤣥纁圭璧也𦵏之日以旛幢代銘旌以鼓鈸遵輀車亦皆敬吾親而送之也然則鄉俗之人䘮禮既不能行而能為此者亦可以寓孝慈之心表哀戚之意也嗚呼今薄俗一毛不㧞二者俱廢吾恐轉相倣效習以成風將胥為梟獍之屬是故不得已而言佛事之用如前所云初非舍正道崇異端而忘古先聖賢之名教也吾家子孫當先警省知言君子當以情恕洪武二十年秋七月龜巢老人言猫捕雀圖評物之性有微近人性之義者猫捕䑕犬吠盜獬豸觸邪是也猫舍䑕而捕雀失其性也失其性斯不義矣夫雀耗倉廪耳比䑕之害什有其一今畫工貎啖雀之猫銛牙利爪吻流饞涎踞坐而猛若虣虎是張其可畏也嗚呼張綱已矣埋輪之語世莫得聞故良工用史法遺意以警夫繡衣豸冠之屬微而著隠而顯觀者宜黙識焉讀易齋秦燔六經藐大易為卜筮書不為埃燼夫豈一經之幸而己哉實千萬億載斯世斯民之幸也是書出羲文周孔四大聖人之手天也地也人也萬物萬事之理也洪纎髙下包括無遺學者當薫沐稽首北面而讀之口誦其文心維其義見聖人於羮墻之間燭妙理於形器之表全體妙用或庶㡬焉所謂卜筮之理固在其中特不専於此用耳先正程朱二先生所次至舉而兼得之奈何近代以來去聖遼邈邪說害正假禍福託妖幻以誣蓍策之靈又有宗九師而異其傳吞三畫以神其術如是自謂探賾索隠者滔滔也至若目之以遣不佳乎之而消世慮凡如此類不㡬乎侮聖人之言者乎吾友辛彬甫自早嵗讀易如恱芻豢猶恐不及而或失之故以讀易名齋需予言者數月予惟大易之義天髙海深豈管窺蠡測者敢贅疣乎惟尊之敬之對越前聖如神明父母口誦心維假以歲月將見源頭活水之來涵泳乎先天後天也洪武十七年十月既望毘陵龜巢謝某猘犬文東家翁以防盜畜獰犬數十平居多囓人翁或縦之其一忽牙口吐舌委其尾疾行而不停囓視同類則其状亦如之翁坐視若無見焉人曰猘犬也宜謹避之里有多膂力者頭髪上立忿曰我人也誅蛟搏虎吾力猶能何避此為適有猘突如其前遂怒踢之躓而不死厥足脛微有所傷不數日呌號而咥人為衆所殺嗚呼犬之猘者固病也翁坐視縱羣惡為物害無筭不仁為甚矣然世之人形獸心害同類而無厭者滔滔也豈特猘犬哉學書字書之學訓蒙者率以上大人二十五字先之以為㸃畫簡而易習也然所云三千七十殆若指孔門弟子而言是則第四字乃聖人名諱理合廻避豈宜呼之以口以凟萬世帝王之師乎其末兩句之乖刺尤甚故某不揣狂瞽嘗易之數與方名曰一二三四五六七八九十百千萬兆曰東西南北上下左右前後以字畫較之亦簡易也待其手熟即兼以壹貳叁肆伍陸柒捌玖拾伯阡萬字教之以偹公私計筭之用區區管見于茲有年敢用質諸先覺訂其是非儻不以人廢言或可為他山之石云書耕習軒後往予識崑山陳侯某慷慨論前代事髙宴曲塘既而陵谷變改各天一方未得與阿戎談也洪武庚午冬學子張文中以陳侯之𦙍子孟剛耕習軒記見示其文乃汝陽袁先生所作其辭有曰夫耕婦饁帶經鉏犁以漢魏間兒常比之吁昔陳侯以貴富雄一州今其𦙍一旦舍紈綺而臺笠緇撮委膏粱而􅅅藜飯糗熊膽之丸不勞於其親牛角之歌不效於前人盖立志之髙能為人所難能者如此袁之言信不誣矣尚奚用畫蛇而添足乎雖然靡不有初鮮克有終此古人苦口良藥也孟剛需予言敢用此為芹曝獻龜巢稿巻十四欽定四庫全書龜巢稿巻十五元謝應芳撰祭章哀詞祭姚吉甫文嗚呼物之不齊誰其主之齒去角存從古如茲如公之生夀富且寧不泯其𦙍百福具并奈何狂飈蘭摧桂折乃舘二甥以繼其絶茍非逹觀怫欝奚堪公能釋然優㳺燕酣凡我親朋時相往來有客心醉春風滿懐數日之間數往問疾留連眷顧其情愈宻卜云其㓙醫獲微功方疑蓍龜􅃍爾而終於乎蒼天知乎不知伯道無兒千古之悲所可慰者女能奉母歲時烝嘗亦猶有後凡我親戚忍言長違奠此杯斝涕泗沾衣代王文甫祭兄文嗟嗟我兄少厯﨑嶇相我先子經營厥家自失所怙顛危誰扶繄我與兄左枝右梧我室茍完兄力其痡嗚呼哀哉兄於斯世閲七十年天賦其醇樸而不鐫故此家事吾其勉㫋尺布斗粟曾無間言所可喜者兄其息肩幸有二雛能奉周旋日飲無何皥皥其天意此安佚夀或可延奈何既衰屢疾屢痊絶粒信宿晞露溘然嗚呼哀哉誰無兄弟我獨孤苦顧二雛者視予猶父我嘗朂之以纘先緒矢心以辭酸淚如雨代祭子文嗚呼天降禍於我家何其酷耶我生勞勞髪已埀白冀汝冡子仰事俯育以纘先緒汝年既長頗渉世故與汝諸弟左枝右梧我經爾緯我作爾述知稼穡之艱難未嘗敢慢而敢逸也惟汝多病常貽我憂去歲仲冬㡬致弗救厥疾既瘳我心則喜然未嘗假以詞色實慮汝因疾之餘弛而弗張馴致怠荒故也正月我適錢塘别方兩旬訃音忽至將信將疑屢泣屢止意暴疾氣或絶而復蘇聲或喑而再語匍匐來歸汝簀已易汝棺已歛吾無復見汝之面矣可不痛哉可不痛哉嗚呼彼蒼者天我罪何居人或釋之子淵之夭顏路何辜信乎脩短之有數耶天道之茫茫耶不然何乃使汝不得其夀也嗚呼汝子汝女嫡庶五人女嫁其一子皆未㛰汝何忍置之不顧耶食指之衆賦役之重又何忍老父無息肩之日耶死而有知汝必念我於𠖇𠖇之中而我之所以念汝者將何時而已耶嗚呼痛哉我築之室汝弗與居汝蓄之器用以祭汝今卜日祔𦵏汝祖塋之側撰此飲食與之永訣汝妻汝孥哀慟欲絶代王氏祭叔父文嗚呼痛哉我叔父春秋七十有二年始于承家中于克家終于成家其劬瘁艱苦非諸幼所能盡知也但見完美之室風雨不動衡從其畮阡陌相連男有室而女有家水乘舟而陸乘馬非叔父累積之功何以得此哉至如目能識丁皆叔父延師之力也行不犯義皆叔父提耳之訓也一家之間緦服同㸑以叔父之恩無偏情無私嗃嗃之威嚴不可犯故能齊其不齊以致其齊耳嗚呼痛哉庭訓之言萬萬千千今不能盡述矣如南塾篝燈東軒奉茗嘗屢進某䓁于前而語之曰吾兄弟自生至死未嘗有䦧墻之日也吾夫婦自少至老無牝晨之患也隣不争畔帑無私蓄許人以諾不食其言鈎距不知掊克不能汝䓁亦能如是乎凡此數事反復告戒知㡬朝夕今其已矣斯言不可得而聞矣而某等為之子為之姪為之孫者可不追念貽謀而踐其成法乎否則為叔父之辱親朋之譏鄉里之笑天地間之罪人也嗚呼痛哉去年之先人皆謂叔父矍鑠其夀未艾也孰謂數月之頃眎則眊焉聽則聵焉筋力索焉方病而紅㓂入室病愈而租吏打門百憂感心二豎成禍而某等猶以醫藥可恃而不懼也詎意遽至是耶嗚呼痛哉教育之恩固不能報其萬一但速𦵏以遵治命如此永别之悲五内如割泣血一酹維以告哀嗚呼痛哉尚饗代周華甫祭伯文昔我先人之早棄諸孤所恃兩伯其一復殂巋然獨存山澤之癯憐我兄弟教之友于雖異厥居有無相須撫之愛之與子不殊奉承周旋非朝伊晡階庭之間言笑怡愉小過弗責曲禮弗拘叱咤之聲罔及僕夫鄉稱善人乆矣不誣年踰八秩健飯為娯詎意一疾竟若摧枯由茲而往誨言則無疑難誰質顛危誰扶寧不使我哀號痛呼伯兮伯兮死不復蘇薄陳簠簋清酒一壺收淚永訣靈其鑒諸代祭呉閒閒真人文𤣥元之學世逺年湮不有先學孰貽後人伊昔上卿道契世皇手持𤣥珠光明四方我師繼之山鳴谷應𢎞道累朝惟清惟静帝錫之爵羽節霓旌邈乎髙風崆峒廣成出入西垣在帝左右黼黻皇猷厥功亦懋名日益重德日益尊世則頼之以棟𤣥門豈不懐歸怡雲舊隴勇退弗獲祗承天寵閒閒之情聖皇所知大書觀闕雨露所施奎畫煥然寳翫無斁瓊舘逍遥以永朝夕胡厭斯世遽逰欝羅哀聞九重傷如之何我諸葛翁嗣法之孫如牛馬走忝為後昆䑛鼎而仙原闕二行為亮西山祭光祖庭文生必有死斯理焯焯况我釋氏以滅為樂獨於交情實不能無若我與君忘之可乎昔在光孝親如葭莩承平異處患難相扶故山丘墟避地東呉未㡬言旋如蚿如䕫銅馬西來猛於䝟貐再渉大江九人與俱披荆間道體無完膚既脫虎口猶虞畏途吾二人者始終持扶白茒宵征狐嘷鬼呼沙磧遇舊廼衣廼鋪萍聚雲散連年海隅每一握手猶論毒痡維莫之秋以予起躄爰繼我師踞天惠室與居相依鐘鼓朝夕平居論道風飛電激方期進脩各殫其力君遂云亡必樂於寂我失良友是用悽惻溪毛之薦謹維來格祭沈仁齋文天道何茫茫耶顔氏之仁不永其年抑跖之暴夀胡以延豈有生之初氣禀其偏乎抑蜉蝣朝暮蟪蛄春秋一皆聽其自然乎如君之生洵美且都鄉里共稱吉人之徒蚤歲失怙藐焉而孤仰事俯育綽乎有餘若騏驥之夙駕且能範乎馳驅每逰四方以曠其居原闕如遺如其有知忍此别離我婦我子其慟亦宜天命奈何彭殤不齊傷哉永訣漬緜以詞為葛子寧祭父文嗚呼天乎人孰無父獨不假我父之年遽止是耶在昔家居仰事俯育以大父遺業之重隻力負荷嘗愳弗克所樂者惟琹惟書惟吟詠而已餘無所嗜好也嗃嗃之聲弗及犬馬姻族閭里咸薰其良善人之稱無間然者數年以來遭時艱棘流離異鄉食指百餘頼父全活亦豈易為然耶嗚呼痛哉時之避難者妻孥啼號或委溝壑吾父則旁求治生之術使某與母等無凍餒之憂也時之人居無室廬或冐風雨吾父則納交仗義之士使某與母等得居處之安也至若族有孤寒之𦙍家有臧獲之衆亦莫不愛之如骨肉然縉紳之士多與莫逆葭莩之親相與依倚但不肖孤不能幹蠱負義方之訓為多然我父之慈訓未嘗不勤也今也一疾遽爾大故顧某等為孤為嫠者真若䘮家之狗失水之魚矣鳴呼蒼天其無知乎如其有知視孤嫠之悲若此而不為之憗遺乎然而悲則悲矣猶有可慰乎𠖇𠖇中者吾母以栢舟自誓將星冠羽服以終其身以父之靈隂相之某雖不肖既於父有風木之感幸母之存寧不服勤奉養以慰吾父乎矢心陳辭維以告哀惟吾父念之代祭表嫂文維靈之生錢橋望族嬪我表兄閨門睦睦頼有内助以生以育暨肥其家且養以福吾兄强仕朔南宦逰嫂居於家家政克脩男齠而嬉女幼而柔以母可怙父弗為憂頃因䘮亂家燬於兵呉往越還千懼百驚寓茲呉門待時之清念我𦙍子可教而成以女許嫁親親相仍擬古朱陳卜世莫京雖居異鄉客舍連楹嫂嘗有言兒女鍾情必娶必嫁此心乃寧適予親䘮連服絰縗子未可醮禮文亦虧惟嫂之言艱難共知戮力同心教子擇師眷我婦子朝斯夕斯一味之珍食必共之方期將來嫁娶有時安知一疾遽爾而萎聞者愕然惨怛歔欷况我骨肉胡寧不悲最可悲者兒號女啼而今而後㷀㷀何依嗚呼死而無知哭之嗚咽尚饗代祭弟婦文嗟我兄弟遭時艱危兵燼其廬星散其人使汝妯娌等不能同家而處共㸑而食于今凡六年矣然吾弟頼汝之力以巾以櫛以絲以枲以鞠其子女常得以慰吾心焉向也吾弟與爾避地浙左吾夫婦每念汝婉孌之姿䟦涉山川漂揺風雨多有可憂者焉幸而言還得同居長洲茂苑間者數月吾乃就食於無錫矣又使汝妯娌乍聚而散百里之間相望相憶而不能數相見也近方喜汝子暫贅而歸其妻將有拜姑之日矣又喜女擇配得人亦將舘甥之時矣滿謂時將小康仍居故鄉少長咸萃搆一畮之宫犁二頃之田歲時灑飯於先人之墓側則吾妻與汝復得相率以事蘋蘩矣數日之前方聞安信片紙之上忽來訃音使舉家相顧失色始而疑焉終而信焉莫不為擗踊而長號也嗚呼痛哉天胡不仁奪吾弟之内助者耶地胡不仁奪吾姪之所恃者耶茍曰非天也非地也以汝之徽柔淑慎乃何為夭閼如此哉自今以往雖不知故鄉之願能遂否其或遂焉亦不得與汝一日之同也死生之間此憾何極雖然天降䘮禍雞犬弗及寓哀茲觴無任於邑代祭趙師吕文公之生也七十有六年時有盛衰事有得失境有逆順物有欣戚公其處之操履如一其少也以簪纓之裔而無爵祿之念其壯也以陶猗之富而無奢靡之習及其年之老成尤儉素而篤實為鄉里之善人不鬬智而用力横逆之來唾而弗拭盖明夫舌存齒亡之理而得乎全身逺害之術每論平生禍福靡常鸞膠之絃三斷而三續鳯穴之雛或存而或亡銀粧羽化付之渺茫知有命之在天忘鳬鶴之短長維箕維裘授子及孫閒居别第翟公之門清風茗椀沉水罏薰日怡情於書畫絶無心於世紛視不義之富貴如太空之浮雲獨念先世欲勵後昆託祠事於老佛之廬屬䘮具於葭莩之親視死如歸餘何足云或謂公之可憾者燕子樓化為刼灰科斗壁飄為風塵殊不知公之逹觀藐如墮甑未嘗怨天而尤人也今也人遭亂離多殞鋒鏑横屍四野烏鳶之食公乃得全體之歸佳城之室回視前日之死於非命者安能企其萬一乎某等親親尊尊道義交結渉江以道其䘮雪涕以臨其穴一觴敬酹千古之别公如不知我語又安知信宿之先方歸覲省一别之後遽疾而徂嗚呼哀哉倚門之母其望懸懸埀髻兩兒其泣漣漣鴒原永歎鸞鏡莫圓德哉若人何辜於天如某等葭莩之親情猶骨肉既不及匍匐而往救徒號呼而頓足旅櫬未歸横山埋玉顧彭殤之不齊信斯理之難燭漬緜以詞酸淚盈掬代張希良祭王文甫文公之一生磊磊落落操心至公俛仰無怍出辭必信不事鐫鑿人或狙詐言諄聽藐家庭之間一呼百諾奔走服勤罔敢乖錯及交親朋春風笑謔恩誼有餘禮文則畧患難相救扶顛濟弱鄉閭庇庥恩猶不薄或饑而餔或病而藥或輔其仁或糾其惡周恤貧寠不輕唯諾頻年時危所在跖蹻鄉人愛之歛袵如昨施德有報理亦昭灼我曹多幸松蘿附託凡詣甥舘必席賓幕從容語言欵洽杯酌别不忍去期必如約今公已矣失我榘矱枉者誰矯懵者誰覺窳者誰範觚者誰削誰指其迷誰斷其堊静言思之相視錯愕掩袂拭涕薦此泂酌為周縣尹祭顧元公文盛德之士使人後千載而興起者其信然乎猗我元公才兼文武其文也世稱三俊為當代之儒宗其武也羽扇一麾走六州之豺虎醉非嗜酒免禍驕主醒非沽名赤心自許抗疏補衮職之闕擇賢進邦國之輔史不一書勲業昭著世徒知思蓴而歸者之為髙而不知採蕨南山之言先入乎其肺腑故公之殁特為公鼔琹而悲慟哭而去也睠茲長洲實公鄉土桑梓之宫墓有祠宇何物地靈混此室處斥而去之陳我簋簠悵煙塵之滿眼懐清風之白羽維公有神以福黎庶為周尹立碑祭元公文昔典午氏碑表有禁勒石公墳勲業昭甚事傳信史石亡何時走尹茲邑永言懐思載葺祠宇籩豆具陳祀神有詩刻諸堅珉峴首之碑令人墮淚呉人於公亦復何異惟公有靈隂隲呉人克文克武無愧先民代姜周佐祭姊夫王仲德文君之老姑為我叔母而我女兄獲奉箕帚我弟於姨復得其偶如古朱陳㛰姻世守先人嘗言君性醇厚人或顛危君力能救吾親雖亡斯語不朽如予不肖公亦弗陋有過必規有善則誘眷我兄弟無一或否公年半百閒居静守閨門之内肅若賓友忘情軒冕意適杯酒獨奈今年避㓂奔走挈家于吳虎兕傍吼千驚百憂窘束如杻一女鍾愛疾莫能救羣盜稍息歸卧南牖襁褓之珠復碎于手公之痛心如割如剖痛猶未定厥疾斯遘嗟哉吉人天胡不祐今公之殁命也誰咎凡我私親倚仗何有尤憐女兄孤燈白首撫膺長號涙濕雙袖為王孟學祭母文蚤歲失怙惟母焉依母其視之猶掌中珠未寒而衣未飢而飱左提右挈顧之復之夙夜檢束惟恐不能自立以保其身以承其家以奉大父母及諸父之訓諄諄之言不一而足每於舅姑之側視其色有不豫然者退則惴惴檢其不及既自檢束又詢之二雛曰而於大父母之志或有違乎事或有怠乎抑而不能謹飭以貽其憂乎母之欣戚繫乎兒之有過無過未嘗一日忘乎懐也仰事俯育嫠居而憂勤者十年男室女嫁志願方畢然於祭祀賓客之奉身先中饋亦未嘗一日之或懈也嗚呼痛哉以母之康强而年未艾烏鳥之情方圖萬一庸詎知一疾而不起耶臨絶之言謂死無憾特以弗克終養舅姑為慊是則吾母之孝於舅姑者為何如哉宜乎舅姑之痛不翅如父母嗚呼風木之悲兒將奈何惟當追念母訓兄兄弟弟各勉成立律身成家竭力以奉承諸父以養大父母之志尺布斗粟昆弟共之不敢有毫髪欺隠意其所否者是忘其親忘其親則不孝之罪上通於天雖吾母之慈有不可得而宥者惟母有神尚其相之庶踐其言以慰母矣為陳彦直祭外姑文嗟我外姑德不可滅孤燈十年栢舟髙節為婦而孝為姑而慈林下之風鄉稱姆儀如諤與謙材俱碌碌壻于名門蒹葭倚玉每詣甥舘升堂起居必詢女家諸兄何如或墮優逸勉之克勤防微杜漸忠言屢聞或坐孱弱戒之自立扶顛持危惟恐不及比嬰微疴臥在牀席我來候問仍飯而食眷顧之情無異於常及女來歸語猶琅琅一日之間􅃍成永别卑尊戚踈故皆痛切曰婿與女感恩如前豈不哀思泣涕漣漣幸有賢嗣篤親如母䕫蚿相憐義當永乆死而有知知予之悲一觴敬酹靈之格思代胡伯亨祭外舅張守齋文於乎惟我婦翁鄉之善士不鄙庸愚妻以其子既妻其子恩義兼至念我先君夙昔交契今也孤㷀遭家殄瘁朂女内助庶弗顛躓每詣甥舘言提其耳翁經州閭必過敝止綜理厥家以綱以紀親之愛之眎子無二别無㡬何聞疾以痞女舟歸寧夜渡淞水訃音倐來驚使躃地匍匐及門翁已長逝我服雖緦我哭不偯矧為女者其痛曷已潔此一觴進饌靈几永言哀思翁其鑒只代金子俊祭錢仲居文嗟嗟仲居其止於斯福善禍滛天胡我欺父為善人君亦如之匪義弗取匪善弗為曰儉曰勤俛焉孜孜業日益廣家日益肥十數年間遭時艱危賦歛之虵毒人骨肌君安其親茹荼如飴弟則友愛室家其宜是皆深淳親親之推眷我姻戚肝膽相知温温其容抑抑其儀莫可忘者顛危扶持僉曰若翁澤流未涯厚培其根必茂其枝詎意一疾􅃍爾而萎禍福之柄誰其倒持於乎蒼天夭閼若茲某等念乃疇昔胡寧不悲矧有雙親遺孤與嫠其痛之鉅庸曷已時我舂不相我淚霑衣言採溪毛薦此一巵嗟嗟仲居庶或格之代張伯仁䓁祭父文嗚呼痛哉樹欲静而風不停子欲養而親不待哀哀諸孤所以痛裂乎其内也仰惟父天覆我兒女男室女嫁志願俱畢且復為之樹産業立根本使各得衍其餘澤焉第所恨者吾父之生過於勤勞六}
