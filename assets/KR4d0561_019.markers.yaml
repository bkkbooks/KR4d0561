  - {type: variant, offset: 6189, length: 0, content: '', WYG: 天風木之悲尚何忍言嗚呼哀哉吾親之死人皆哀之姻戚之哀思親義也鄉隣朋舊哀善人也我兄我姊我妻我孥其痛如荼五内崩裂罔極之恩奈弗克報所不敢忘各慎其身黽勉成立無忝所生尚頼遺澤埀裕後人祭蕭處士文蘭陵望族竹帛著稱髙年過於伏生儉德同於晏嬰自罹喪亂多遘迍邅萬死一生脱性命於虎口三吴百粤寄身跡於狼煙覩姑蘇之麋鹿重逰念北山之猿鶴相望言歸故里欲正首丘顧親故鮮有孑遺喜父子獨能無恙安居未㡬怪事忽生呌閽救無辜之孫霜飛六月奉命復憗遺之老風動四方盖埋劍之氣衝於斗牛故覆盆之光照於日月遂爾貽謀之願灼然隂隲之符骨肉聚於目前滫髓供於膝下得正斃而全四體應含笑而赴九泉蹇余劣才荷公知己自青年而蒙舘榖至白首無異金蘭又如王趙之交亦有陳雷之義今皆已矣可不痛哉老淚淋浪持束芻以效孺子儀容彷彿撫絲桐而呼彦先即此微忱伏惟尚饗祭錢鼎卿文代親友作吴越世家焜煌史册公為雲礽蔓延遺澤昔在妙年青雲氣格弗屑於時丘園自適風流文采聲亦藉藉晚罹兵燹稍涉囏厄三江五湖浮家泛宅歸帆無恙佳兒連璧廼疆廼理薙乃榛棘菟裘鶴渚谿流環碧公其優㳺素願斯獲邀月呼酒㸔花岸幘賔朋往來冠盖絡繹滫􅔱之供子盡厥職自春徂冬頗須藥石厥足蹣跚心仍夷懌所懌者子服勤無斁其宜㤗然瞑目中夕顧惟某等攸居咫尺匪親伊故心皆莫逆今也云亡如失肘腋緬懐德容傷心如刺鄉飲之歡無復共席薄言采藻薦此窀穸惟公鑒之有如平昔又代兩甥及甥女壻作昔人有言見舅如母此盖由親親而推之乃常情之所有如我舅翁其親愛於甥及甥女之夫者尤恩深而義厚厥恩伊何涵濡撫摩視孱弱而為扶植者支一木扵傾厦屹砥柱於頺波厥義伊何切磋刮劘念昏而為牖之者鑿渾沌之七竅投阿膠於濁河然則翁之為舅氏而愛其甥者眎餘人為何如嗚呼痛哉軟脚之疾醫云無傷謂翁健飯全愈可望如某等朝夕承奉於理固當奈公私之服役磨旋蟻之奔忙故不服勞於左右操几而執牀又安知一夕甘寢遂亡耶嗚呼痛哉聞訃而疑蒲伏救之救不可得徒哭而悲平生之恩義欲報而無期一酹永訣涕泗霑衣武進縣學起講堂祝文維洪武五年四月二十日常州府武進縣承務郎知縣董某從仕郎縣丞陳某將仕郎主簿尹某謹以釋菜之奠敢昭告於大成至聖文宣王曰夫學以明倫尚矣凡為學宫必先乎講習之地使學者登降揖讓咸有儀度朝斯夕斯以明人倫之道斯堂之所亟其成也而某等勉共厥職以副朝家興學之意尚惟聖神於斯文有以相之縣學諸生祭陶兄文天道何茫茫耶跖暴而夀顔仁而夭蘭摧桂折樗櫟合抱是皆必有其說蹇余昧而莫之曉耳吾友陶兄如玉在璞鍾厥愛於雙親求良工而彫琢既賣金以買書復徙居而近學惟吾兄心父母之心故能孜孜厥修類之如麟之角也吾黨碌碌辱交連年竊鄰燭之餘光亦效矉而勉㫋方期吾兄馳騁詩書之林㳺泳道義之淵又安知車方駕而覆轍弓始張而斷絃也耶嗟哉彼蒼誰薄誰厚賦命不齊吾將誰咎惟没世而有稱斯可謂不朽彼區區與草木同腐者雖龜鶴之年而亦何足取哉嗟我友兄其止於斯其心孔哀其友亦悲一慟永訣漬緜以詞武進縣學移先聖祝文廟貎之設人所具瞻所以尊聖賢寓祗敬也棟宇朽腐懼將壓焉不敬不尊責何可逃今將一殿兩廡撤而新之汎掃鱣堂舁置神像聖靈洋洋無適不存具瞻之敬盖自若也功僝事集神其相之祭胡秀才文公之父兄為吾友朋公之子孫吾與師生公嘗以父執遇我謙謙乎奉承翼翼乎將迎席必置醴途不並行我歩我趨視為規繩然吾亦愛之重之與之語言未嘗不肝膽相傾也於乎人孰無死有未死之前為子孫者或不能如親之志親沒之後或墜其基業是皆不能無憾於幽明也惟公不然孝友之行父兄素稱曰子曰孫起廢兩興别第新築良田歲登可以供粢盛奉輸征恤孤㷀鄉里稱少㳺之善犁鉏帶常林之經死而有知豈不含笑於九原乎於乎昔我與公俱避甲兵公亡我存無復合并每想見之于墻于羮今也以一勺之行潦表四世之交情睇彼東呉逰魂杳𠖇吾將假巫陽之詞以招之曰太湖之隂風濤震驚魂兮来歸歸我毘陵父兄之丘壟相望子孫之箕裘遹成念此土桐鄉之愛念老夫芻束之誠魂兮來歸天風泠冷祭胡子明文於乎逸翁生長越杭以醫宦逰臺閣蜚英晚罹世變戈㦸搶攘挈家海壖晦迹韜光予未識公結交令郎觝斥妖妄氣節激昻既見叔夜穆如春陽時方艱虞紛然虎狼誨言諄諄戒慎周防吾其服膺如龜穴藏歲時往來雞黍范張公年已高神氣益昌髪黟顔童飲可百觴興致酣適庭視八荒詞多滑稽歌或慨慷以公逹觀物累俱忘盖亦有子動合義方福善自天家有餘慶屢渉畏途竟為康莊予嘗比之珠玉琳琅父執遇我我思敢當所貴相知心腹腎腸公於吾兒翦拂揄揚將玉其成取寸之長通家之好㡬二十霜洪武己酉我歸於常贈言孔嘉且貽篚筐心親迹踈煙水相望前年暮秋過公豁堂三宿不寐情話連牀延致畫史為貎不颺復命其子拏舟送將别來兩秋懐思弗忘初冬病餘孤卧若僵寄書言懐并書數行歲聿云暮嗣音渺茫雪洲之報乃謂公亡淞隂石川悲風白楊命林往奠老淚其滂祭黄朱}
