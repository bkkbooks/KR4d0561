  - {type: variant, offset: 6188, length: 0, content: '', WYG: 年日用矻矻未嘗得一餉之優㳺也矧逢艱時子或受圍於城者親雖野處心常危之或行役於逺者親雖家居心實隨之餘在侍旁雖若可樂然憂患則為之料理征徭則為之區策亦未嘗忘於懐也至如鶴長鳬短物不能齊又豈能不拂吾親之意哉今也兒無所依女亦何怙菽水之歡不復可得是雖五内之裂亦徒然耳某與弟等但黽勉襄事以吾親素嗜佛學視身為幻敬以茶毘之法奉之遵治命也輀車在門翌日永訣菲焉一奠吐此哀𠂻祭先墓文於乎陵谷之變知繫乎時惟情所鍾不能不悲昔我先壠松大十圍今皆宿莾荒煙晝迷穹碑已仆佳城或隳或幸而存冢眠狐狸曰不肖孤避兵海涯九死一生如鳥無枝十有六年豈不懐歸回首鄉闗道阻且危丹陽之東呉門之西方數百里野無黔黎我兄我姨冢亦靡遺我父與母夢或見之既寤而歎涕泗交頥今我冢子擕厥妻兒歸畊舊田丘壠是依餘口猶十未能同歸歸何不能生理未治旅食異鄉破研日隨尚頼遺澤歸或有期載耕載穫蒸嘗于茲或樹松楸如前盛時嗟我祖禰知乎不知拜伏墓下拭淚陳詞代張伯仁祭黄景先文近年耆英晨星霜木婁人視公崑山片玉公之為人生有器局遭時迍邅如玉韞櫝搢紳之文罔不刮目公之處家仰事俯育陸賈之槖兒女均蓄彼經此緯同一機軸公之居鄉春風穆穆凡與之逰惟善是朂正烈髙風遐邇咸服於我姻靈眷義尤篤念無後人墜緒誰續以孫贅居我女蒙福哀我親喪觸暑匍匐弔之唁之沃酹之辱比予走謝留連欵曲别方兩旬書往而復豈意公亡疾不經宿予聞訃音哀淚盈掬奈役於官如薪濕束送不執紼罪奚可贖公或我知矜我碌碌束芻之奠鑒此心曲祭大雲講主文師之髙年七十有九以湼槃而論之復傷之何有人之所以哀吾師者吾知之矣一大藏教淹貫胸中如魯靈光天台之宗今也砥柱摧折隤波洶洶同袍之士其誰適從三周七喻化導羣迷隨所住處桃李成蹊今也野狐長嘷彌天蒺藜信從之衆疇將依歸吾黨固嘗月旦之評曰善與人交僧中之晏嬰也度不可量方外之黄生也其愛客則孔融而衣緇其滑稽則方朔而釋名也觀其詩則見其心之平淡而無牛鬼蛇神之怪觀其畫則知其興之清逸而出乎山礬水仙之外若此者豈非大雄氏所謂無罣礙者乎抑亦所謂得逰戲三昧者乎是則吾黨平昔之所敬愛而今日之以為誄也彼千駟萬鍾而死欲使吾黨贊一詞而不可得而况為之沃酹乎言採絲蒓淞江之曲懐哉若人薦此寒淥祭柴處士文近年耆英晨星落落剗刓為方誰其矩矱惟公渾厚不琱不鐫如玉在璞如珠在淵寄跡隴畮絶意圭組為龎德公不入城府以善為樂襟抱生春為馬少㳺鄉稱善人髙堂眉案如賔如友梁鴻孟光無此白首幹蠱有子三鳯翩翩源深流衍理固宜然昔我先君深敬於公所以敬者古人之風先君云亡公來慟哭吊死問生重禮之辱由茲而來陵谷變遷干戈所至流血成川公之居安其福孔厚年過七十亶為希有予聞訃音義合匍匐吏呼石壕去不可得言采溪蘋薦此一觴公其鑒之我泗霑裳子祭父文代柴貴賢作父生三子女亦如之長養㛰嫁恩義惟均以恭出贅愛念尤篤定省雖踈音問不絶每歸侍旁奉親飲食分甘食之親同稚孺豈惟食之誨言諄諄惟懼孱弱弗克樹立撫恤諸孫欣欣色康兒所喜者親在健飯兵戈擾攘十五六年幸無禍波以及吾親微疴月餘靡神弗宗供役於官如墮膠漆間嘗請告歸侍湯藥父曰亟去公家事急兒能了官父心乃安别方數日聞病小愈豈其奄忽永訣}
