  - {type: variant, offset: 10141, length: 0, content: '', WYG: 乃揺尾乞憐遂以當仁不讓之心聽其用和為貴之説乃償薄産以補亡金未幾背㰱血之盟又復為紾臂之奪用朝三暮四之術專務貪婪逞人一已百之能肆為欺罔楚弓得失秦鏡咨度勞六轡之驅馳亷法亷辨亷善亷能按百官之能否明月靡遺罅隙清風一掃塵埃睠兹寂寞之濵亦在照臨之下豺狼歛跡草木知名激濁揚清既憲綱之振肅舉直錯枉宜公道之昭彰或移北山之文或賜南山之判戒無厭溪壑之欲征悖入府庫之財庻有補于焚修更無煩于訟牒思之弗措辨之弗措願亟持全璧之歸得之若驚失之若驚當永守青氊之物謝崑梅州判舉鄉善啟求儒雅闡大猷漢室之興復見經品題作佳士荆州之識為榮矧蒙下采于菲葑豈作不言之桃李寸丹有感尺素具陳某官佐理神州賢勞王事虛心待物明于滄海之珠美德含輝粹若崑崗之玉有賢守與承流宣化在寮寀則同寅協恭切切斯民惓惓吾道氷霜並潔風月平分南山之判不移北闕之心長戀二千石不如逢掖下士尤勤九萬里直上扶揺前程甚遠吾言非佞輿望所期某久客東呉遠逃兵燹功名蹭蹬昔為上竹之鮎身世飄零今作無枝之鵲偶爾宿贊公土室儼然逮梅仙市門希髙山流水以知音驚明月夜光之投暗説項不輟薦禰有書駕言采泮水之芹何異繼廪人之粟驥千里未甘伏􅇫鳥一嗚或可驚人翺翔道義之林涵咏詩書之澤鄉之善士國之善士尚期自下以升髙知惟春秋罪惟春秋勿謂有名而無實賀陶教授啟鄭廣文才過屈宋坐一氊而司業相憐胡安定教授蘇湖置二齋而太學為法升髙自下振古如兹恭惟某官前軰典刑後學模楷于以傳道授業而解惑信乎温故知新而可為五柳莊前自昔存舊家之菊片玉山下只今樂泮水之芹振木鐸之遺音續杏壇之雅曲先覺覺後聿成陶鑄之功己立立人正賴提撕之力自此升矣式我願兮如某者白首流離青雲蹭蹬遇州倅舉一鄉之善以野夫寘多士之間愧風鷁之退飛喜星鳯之快覩先生富道德致呉興弟子之多才雜説為爬梳正學校諸生之狂簡代上馬都事啟驥伏􅇫負千里之志久倦驅馳鳥在阜作三年之鳴猶能奮躍未趨幕府敢借箸籌某}
