  - {type: variant, offset: 10138, length: 0, content: '', WYG: 制其仁如天過家上冡者子孫之情伊誰無地顧邱壟之失所實風化之有傷瀝血寸丹陳情尺素切念某痛懷伯父曩歴兵戈死雖正狐首之邱時未集鴻飛之澤啟手啟足幸能四體之全歸若斧若堂詎信百年之難保蓋自陵谷變遷之后以致家門摧敗之餘失此故塋屬諸姻黨誰其主者展我甥兮此一錯在乎當時故陸沉至于今日渭陽之舅絶無見念于秦龜隂之田那復肯歸於魯然豈料人面獸心之軰乃謀為兎葵燕麥之塲雷厲風飛宰木􅉐空于斤斧日侵月削佳城亦壞於犁鉏殆將見暴骨之寒竟何異鞭屍之慘三尺之法不畏匹夫之勇莫當向來不平之鳴屢致逄彼之怒鬪狠不顧輕性命于鴻毛匍匐而歸飽尊拳於雞肋是可忍孰不可忍如之何末如之何徒増蒿里之悲每動窮途之哭既無面於江東父老復何顔於地下祖宗日月不照之盆弗堪長覆天水違行之訟可憚終凶賴典章有禁地之條其情理實滔天之罪仰惟公道俯察愚𠂻恭惟某官讀萬巻書為百里宰氷其清玉其白絃之直稱之平寛猛適中剛柔相濟數月有撫字征科之績四郊無呌囂隳突之憂休休焉其有容皜皜乎不可尚聲蜚臺閣恩迓絲綸如某者受廛為氓閉門歛跡亦久被卓魯之化焉敢興虞芮之爭但悲夫九泉之人欲掩以一坏之土願施善政垂戒惡人使知見舅如母之親勿為敗俗亂常之事復此牛眠之地仍為馬鬛之封想去家舊鶴重歸看銜土慈烏畢集凡春秋拜掃之日皆存亡感激之時上窮碧落下黄泉為雪幽㝠之恥生當隕首死結草弗忘判斷之恩痛切之私敷宣罔既上干尚書啟公名傳字受道號止亝延祐乙卯科進士不封萬户侯願識韓荆州常切慕謫仙之志手把一封書上有皇甫字輙敢扣昌黎之門問胡為今日之來曰專為古人之事與其進也適我願兮嘗謂傳道不絶者先民之功沒世不忘者後人之義若道鄉鄒忠公之葬近在城隂有了翁陳先生之銘流傳天下孰謂此一邱之土盡廢于八世之孫鄉隣忍于瓜分翁仲隨以蕪沒故諸生為之太息于當路鳴其不平頼二侯以公道主盟不半載而佳城復舊築思亭而薦蘋藻立華表以樹松楸茍非紀載之詳尚慮耕鉏之患立羊公一片石欲大書名世之言如季子}
