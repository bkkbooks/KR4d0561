  - {type: variant, offset: 10140, length: 0, content: '', WYG: 色之日不迷鄉國興賢使三代之風復振躬行古道歴踐華途每為政郡邑之間常蜚英臺閣之上歸從彭澤舊家環北固江山教若河汾大隱居南徐城市户外之屨常滿門前之轍何多雖云遂莵裘之營必復有蒲輪之召如某者俯慚後進仰慕先知尊其所聞行其所知愧未造髙明正大之域博我以文約我以禮誓弗忘仰鑽瞻忽之誠景慕有餘編摩罔既贄見李晋仲提舉求安啟思忠公傳道之賢為褒遺事辨邪説誣民之惑乃集前言持布鼓于雷門分天章于雲漢恭惟某官儒林麟角學海龍門鍾山草堂之英靈雪竹霜松之標致懶折腰于彭澤早賦歸來聊濯足于滄浪亦云自取皜皜乎不可尚已休休乎其有容焉然吾道賴以綱維而儒林視為儀表尚持藻鑑以主文衡名動京師栢府之薦章交上官居翰苑蒲輪之召命將臨先生自此升學者仰如斗某呉中晚進白下漫逰自憐如明月暗投誰復念陽春寡和汲汲有登龍之願拳拳慕倚馬之文方往依劉以圖御李欲因劉堯輔見公乃于劉處偶得識面低頭拜東野適因邂逅之間瓣香為南豐得展殷勤之敬敢持兩帙謹用三熏長年坐井底觀天此日詣門前立雪倘賜五行之覽必蒙一字之褒登山采玉入海求珠捆載乃酬其素志製芰為衣紉蘭為佩激昂正賴其清風贄見楊亷夫提舉求序思賢錄啟兩袖春風作洛下書生之咏滿舡明月過闗西夫子之門問胡為今日之來曰端為古人之事切有請也能無從乎伏念某生延陵季子之邦頗知禮讓復道鄉鄒公之墓當效馳驅樂民俗之還淳喜士風之近古思賢有錄味道無厭紀前言往行之二三發潜德幽光之萬一自藏燕石誰售雞林恐公羊遭賣餅之譏使太元有覆醬之辱願借春秋之筆稍為月旦之評得一序以冠塵編若千金而加敝帚庻傳不朽有補將來非惟先哲之有光眞乃後學之多幸兹蓋伏遇某官乾坤清氣風雲壯懷走馬看長安花早嵗似唐人得意割雞為武城宰居官如言子愛人以文章政事之俱優宜天下國家之大用尚淹筦庫未展經綸人皆知大器晚成我乃獲景星快覩題鸚鵡賦已多年傳麗則遺音到鳯凰池將不日遂平生髙志倚期𤓰代入覲楓宸如某者敢不長遡下風永懷髙誼聞所聞見所見眞如到神仙十二樓之間步亦步趨亦趨或可在弟子三千人之列其諸欣慕㒺旣敷宣贄見張用鼎教授啟黄魯直竭蘇東坡因述依松之志禰正平過孔北海乃蒙薦鶚之辭葢同氣以相求必當仁而不讓敢持尺牘特造丈函恭惟某官海内儒宗江西詩𣲖往嵗為馬尚書賔客當時有虞學士品題謂鵬程萬里横飛期鳯池十年可到道出羲皇才過屈宋何鄭公猶在於廣文上規姚姒下逮莊騷若韓子獨尋于墜緒先覺覺後己立立人四方之學者來歸一鼓而斯文作氣博求地利開元武湖以廣澤物之功善育人才置治事齋而兼水利之意聲蜚臺閣恩迓絲綸如某者生長呉中棲遲白下顧窮居而獨善恐沒世以無聞著辨惑編闢近世之異端邪説作思賢錄發前修之潜德幽光欲煩斵郢人之斤輙敢弄班門之斧平居抱膝仰泰山北斗之髙此日承顔覩鳯凰景星之快天其或者道之行與得華衮一字之褒増敝帚千金之價品題作佳士何慚奏白雪遺音吹嘘上青𠖇或可借春風餘力答陳天倪謝薦師啟見賢而舉者古先之訓惡敢言功易子而教者夙昔之心幸逢知己豈意予互鄉之進亦勞賦小山之招恩斯勤斯至矣盡矣恭惟容齋先生元元衆妙休休有容身雖領袖宗門學則淵源吾道小樓明月勝元龍百尺之豪髙枕白雲待丹鳯九重之詔有前人風烈為後學範模如某者與緇黄交能青白眼獨喜子墨名儒行非他人羊質虎皮通家踰三十年責善難一二計兹荷愛烏之及特厪遺鯉之書曲憐覔梨栗之兒直命入芝蘭之室從明復受春秋之業看希夷畫太極之圖熊魚何幸乎兼得犬馬當知其所報道院迎仙書堂隱相増爽氣于西山鄰家乞火曉窓分燈藹餘光于東壁銘心有感筆舌奚殫謝監察御史火公舉茂異啟天朝重耳目之官實居清要風憲擢山林之士非市私恩葢竹頭木屑有可用之時而茅㧞茹連乃必然之理敢因竒遇庸布謝言切念某家本呉中客兹江左以芰荷為衣秋蘭為佩訪鍾山之英草堂之靈作山川司馬壯逰負湖海元龍豪氣自憐骯髒誰問飄零瞻烏蒼柏之間歌鳯古臺之下幸逢􅔕馬蒙試雕蟲叩大小從容之鳴以盡其聲收輪囷離竒之材而斵為器使李白立階前地如毛遂脱囊中錐得之若驚觀者如堵兹葢伏遇某官身居臺閣腹藴詩書凛凛乎動揺山岳之威惓惓乎樂育菁莪之意植公門之桃李蓄相籠之葠苓昔中州草木知名今南國芝蘭俱化三省十道俱聞鐡面之威一日九遷將拜玉音之召風塵一掃霖雨八荒如某者敢不恒念品題益加修省行日用常行之道讀平生未讀之書雖蒲柳之質望秋先零而薑桂之性到老愈辣惴惴焉出門下誓弗忘一瓣之香耿耿者在胸中當自愛千金之帚其諸感佩罔既敷宣代羽士上亷訪僉事啟上士無爭奉先師之明訓監主自盜奈公論之難容故鳴鼔而攻之若同室而鬪者切念某為李老君弟子住焦眞人道塲小小山林設住持之主席區區金帛有交代之成規比因撙節年多致有羡餘日積被前職䑕偷狗竊使空山鶴怨猿驚當市攫金衆所共見匹夫懷璧罪實難逃已嘗赴愬于有司且復諌詞于教所始則强項不屈}
