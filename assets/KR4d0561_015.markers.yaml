  - {type: variant, offset: 10139, length: 0, content: '', WYG: 字碑以昭示尊賢之意雖不咎于既往庻有補于將來求之與之完矣美矣恭惟某官老成前軰文章鉅公三千字禮樂縱横在早嵗修名揭日九萬里扶揺直上至晚年直氣凌秋典文衡則妙于稱停秉史筆則嚴于褒貶烟霞一壑今歸老于長洲茂苑之間霖雨八荒將拜命于安車蒲輪之召斯言非佞輿望所期某曩客新安聞公舊政復紫陽之闕里大振儒風勒黄絹之好辭有光吾道諒弗忘于素志必重念于斯文惟大賢無不容則小子乃有造于以紀前言徃行于以發潛徳幽光眷言梓里之間永若桐鄉之愛鏘如韶鈞蔚如虎豹雄文照耀于九京明則禮樂幽則鬼神妙理昭彰于千古存亡有感敷叙莫殫贄見余用中先生求作辨惑編序啟狂簡斐成章辯諸家之邪説品題作佳士必當代之儒宗夫瓣香敬為南豐蓋學者仰如北斗予其進也適我願兮嘗謂璞玉雖竒非和氏則山中之石琴材固美無中郎則爨下之灰太𤣥經有覆醬之譏公羊傳有賣餅之辱古猶如此今豈不然欲立言圖不朽之傳必取正于有道之士嗟今陋俗舍正路而弗由集古遺言廻狂瀾于既倒可奈一齊而衆楚猶如皆醉而獨醒驚人之鳥一鳴怪雪之犬羣吠願君斵堊為我折𠂻或衮褒一字之榮則價倍千金之重馮豐霳寄寥廓久矣馳情抉雲漢分天章豈辭揮手綱維吾道黼黻斯文兹蓋伏遇某官文章鉅公典刑前軰詞塲較藝視}
  - {type: page-break, offset: 10139, content: '', id: KR4d0561_WYG_007-4a, image: WYG1218/WYG1218-0156a.png}
