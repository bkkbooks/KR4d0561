  - {type: variant, offset: 11383, length: 0, content: '', WYG: 家其書札之妙聲詩之佳今皆不可得而見矣區區追憶故交輙成韻語寫去谷賓吟几為後㑹張本云清交早結先君子博學自謂無恒師草堂詩史擬欲續蘭亭字書將並馳百年陵谷變更日四海弟兄生死悲舊字文獻掃如電獨愛羲之又有之冬至日方欲以老况自述孫垣來侍傍說江隂陳庠仲袁仲徴二公倡和之娛區區坐馳因用足成此詩以代折簡耄矣又逢長至日悽然聊作短歌行一妻一子竟契闊兩耳兩目幾聾盲里中尚結雞豚社江上豈忘鷗鷺盟珍重暨陽䨇白璧慎毋輕用易連城江陽鄭教諭以詩見寄褒美太過且聞時赴京考績因次韻以餞其行大君立極揚威靈麾斥百家尊}
