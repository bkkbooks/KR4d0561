  - {type: variant, offset: 11385, length: 0, content: '', WYG: 不起願言學陳毋學陶此身長與雲逍遥萬松嶺上老禪衲形服雖異同清髙况有煎茶好泉水活火煎來味無比詩腸搜出煙霞語不異不同人共喜老夫耄矣筋力少尚欲去著遊山屐細啜月團雲滿甌分卧石牀雲半席幽懐為我一宵傾免使相望兩相憶郡侯以蘭行年九十以詩見贈敬以次韻厯叙平生以鳴謝臆延陵野老家業儒舊壁頗有先人書童年愚鈍不努力渉獵五經多缺如二十而冠三十娶取友必端無佞諛春秋四十五十餘髮猶未白顔猶朱才如襪線不知恥光範門前曾自譽六七八十成潦倒興來尚復歌吳趨今年九十常晝寢誰敢效尤扳宰予雲山萬疊作圖畫松風一壑鳴笙竽雙眸漸昏耳漸聵面壁寂寞如僧居焉知府公特尚齒贈以大篇明月珠老夫得之感勤渠雀躍起拜不用扶合室稚老俱驩虞十一月廿七日得塏口信以詩志喜并記臨别祝規之意賣橘人從采石還口傳家信報平安路經湖北雖云逺天近雲南不甚寒佐領謹持三尺法尊君長秉寸心丹驛橋臨别叮嚀語應念貽謀作鏡看自和同前詩於次年正月十三日附寄黔陽四千里外之官去百丈牽江舸艦安新沐恩波從日下舊家門地不氷寒洗心正在詩書澤換骨毋勞内外丹新歲僕歸正二月家書細寫阿翁看簡陳子章先生身不封萬户侯眼不識千金裘深衣幅巾避兵矛徃年零落崑山州兵餘還鄉理西疇臺笠播種襏襫收今將蓋棺萬事休但欲服飾如前修先生舊衣巾暫爾可借不縫人遵古制素願吾乃酬飄然長裾泉下遊藍縷免致先人羞生前相徃來二老亦風流横山歌夀萬拙齋横山之顛青入雲冠冕一邑無與倫山南風景最佳處隱居豈是尋常人此山鍾英三百載素封不乏青氊在向來吳下避煙塵恨不移山東入海還山喜得無崩騫種玉舊田耕紫煙雲屏正設後堂後空翠直灑前塋前觀雲每日烏皮几灌圃有時龍井水人家雞犬寂無聲宛若桃源畫圖裏山中羽人年八百昔日仙宫今佛宅丹砂未必駐童顔把酒看山真上策山乎山乎徳不孤靜而夀者山為徒美哉山禽知此意石榴枝上呼提壺我歌横山歌未了拙齋為我開懐抱移宫換羽作新聲彈入琵琶歌更好百斛葡萄為傾倒屢年作小詞或詩為萬拙齋夀癸亥夏五予以鄉人嫁禍兒軰徃崑山救之作此詩予懐紫髯翁新作緑野堂常年初度日嘉賓四筵張虚左待老夫酌我九醖觴甥孫舞鴝鵒絲竹鳴鳳凰情與酒俱深飲量非汪洋今雨獨不至應憐走他鄉峩峩馬鞍山絶頂遥相望横山一髪青滆浦西日黄想像祝睂夀有如賦髙堂留别永懐寺長老暨袁子英俞茂本通政歸吳十載前一宿永懐寺龍鍾今兩來鹿苑廢如此佳爾山中人法幢扶欲起清風方文室白日靜如水門迎老詞客問我來何自忘形亦忘年相見即相契坐啜趙州茶並隱維摩几爐薫清我心乳供便老齒鈎簾看玉峰山色亦為喜新知多邂逅咳唾珠玉美白首莫逆交獨有子袁子徳星聚叢林草木亦韡韡我思古先軰支許或可擬兼旬數相過倡和不知幾庭前石榴花半落蒼苔地長揖謝山靈歸袂霑空翠陳徳廣知事以自夀之詩見示予以其災字韻險不和乃效唐人和意以夀之故落句如此云哦松未了休官去随例放閒恩更多父子一經傳有自桑蓬初度樂如何門栽彭澤先生栁籠飬山隂道士鵝最喜孟光睂案舉捧觴嬌女把香羅徳廣喜予詩和韻見貽予復答之即三月十一日䌓霜之異於頷聫書之非虚語也繭紙寫來詩句好雞林傳去古人多花開三月春如許霜落五更寒奈何留客政須沽緑螘引年何必餌金鵝六街車馬紛馳逐自喜蕭齋雀可羅次韻荅華以愚見寄九隴山東舊宅遷一瓢齋裡曲肱眠賢如栗里陶元亮閑似香山白樂天倡和正須歌白雪丹青何必繪凌煙竹林諸阮多才俊文㑹何時共酒船哀詩鐵船海上逺移家金斗城中蔗境佳我昔頻來桃竹杖公方新種木蘭花書因教子時常買酒欲娛賓夜亦賒春夢一塲随蜨化老夫三歎立鷗沙東西家東家賣兒哭幽咽西家鬻妻含淚别形容總覺瘦如柴肝膽那能硬如鐵低田水没欠秋租今年夏租麥更無妻兒舎我莫怨呼我亦忍饑朝暮殂重午日小酌青年自是好遊者白首始知行路難一寸芳心徒似鐵數莖秃髪不勝冠匏樽偶有菖蒲酒菰黍香於苜蓿盤莫笑貧居輕速客餘生能得幾團欒五月望日寄江隂陳庠仲一别半年久相望百里間陽春知寡和落月見清顔釃酒澄江上題詩小石灣龍鍾還念我時復夢追攀同日寄袁仲徴申浦水東頭悠然客馬周焦桐絃白雪芳草席滄洲昨夜三更雨今朝五月秋有懐飛不去煙樹鬱相繆曹文質自金壇來云費延年教諭傳語且知告老而歸閑居可喜因作詩代簡我思故人松柏顔客來寄聲蓬藋間鱣堂講學竟將老鳩杖拜恩今樂閑清風枕簟五栁宅白雲圖畫三茅山雪舟未得見安道乗興豈無詩徃還朝宗鄭教諭以余去冬初度自夀之詩次韻見貽予復和而贈之憶昔予為廣陵客兩頰丹砂眼青白蕃禧觀裏看瓊花坐列羣英杯飲百無何陵谷忽變改塌然歛我扶揺翮此花天下更無雙毒手誰焚夜光璧先公舊物廣文氊家傳喜得無囏厄抱琴來坐杏花壇洋洋古操令人憶青氊坐久琴愈清君山草木皆愉色老夫今春辱佳句轉眼炎曦又隆赫郢斤非不妙彫鎪奈何吾衰腐如櫟生平甚愧性聱牙老去偏懐舊知識孤舟野渡豈長閑一壺㑹有千金值合歡杯酒細論文恨不能飛見三益江流南匯春申浦海門東入陽侯宅河魨江鮆鬭鮮新苜蓿之盤自朝夕􅓺舎安如廟堂坐脱粟甘於鐘鼎食睠我郊居樂亦然朝聽樵歌暮漁笛忘機相與白鷗眠送窮不效昌黎伯假令秋至轉饑寒亦不題詩寄髙適賢哉子淵可矜式陋巷安貧載方策六月初八日雨晴懐毛伯尚去年五月凉如秋今年六月寒颼颼重雲晝暝雨連日田家復恐沉西疇朝來日出温風起歲不薦饑人共喜貧家四壁屋漏痕彷彿篆書千百字忽憶山中人讀書兩眉白能負仲由米曾漂髙鳳麥髙堂飬親侍親側我衣斑斕親喜色有時諸父竹林遊彈琴詠詩尊爼席人生此樂古來少今乃熊魚兩兼得老夫每問書帶草鄉里小兒渾不識但道墨硯池水漲苔衣碧苔衣碧池水香思若人兮不能忘長林豐草春茫茫青松澗底含氷霜鯉魚不随白石爛鳳鳥有時鳴朝陽停雲之詩歌未足𤣥蟬為我聲相續哀詩鶴長鳬短總休悲聽我山陽笛一吹黄耳再無前日信丹心獨有上天知送行南浦成長别歸卧東山悞有期吾老未教僮荷鍤劉伶應笑阿翁癡讀大誥作巷歌二首天語諄諄禍福靈風飛雷厲鬼神聽掛書牛角田頭讀且喜農夫也識丁二一天風雨洗塵昏日月恩光及覆盆雞犬不驚田舍樂呌囂人不到鄉村贈陳棲雲鶴溪之水滆浦分一灣繚繞梅花村窮冬萬木凍欲死此花巋若靈光存清如西山采薇孤竹子白於華陽洞口隴頭雲隱居者誰希夷後人持一編種樹書戴一幅漉酒巾有時醉飲肱作枕老瓦共眠梅樹根有時不醉百事理可與孔公同出羣青鞵布襪駿奔走今年早春朝至尊紅雲殿前三舞袖歸來滿腹懐絲綸諄諄語鄰里切切教子孫子孫不但力耕稼徴輸能為公家勤編氓租斛足萬計雞犬不驚安老親短檠燈火讀大誥喜色夜夜燈花親甌窶滿篝秫田熟歲釀百榼酴醿春親朋簮盍座常滿湖鮮日擊豐盤飡胸中不著愁半㸃雲夢八九能鯨吞東鄰西舎靜如水夜無催科人打門安居樂土有如此何異武陵人說桃花源老聃戒止足願言尊所聞濁水膠可澄清鏡塵乃昏秋風挂席一相見此意吾將三復論贈周彦美象賢有子付青氊家住城西緑水邊門栁數株同舊日公租萬斛喜豐年試聽濯足滄浪曲應笑燃臍郿塢煙朝夕酒杯長在手優㳺身作酒中仙簡王尚絅不笑幡然謝九流牽車服賈思悠悠醉吟人老香山社詩到雞林價重不贈詹伯逺西北風髙寒露零牽蘿補屋揵柴荆看雲長日烏皮几夜夜教兒讀孝經示孫塏龍門一躍去年秋徑著青袍赴逺游半部魯論堪輔世政須忠藎繼前修二黔陽江水不勝清喜得居官濯爾纓秦鏡照人肝膽見邑民應在鏡中行三黑頭勲業志方雄黄耳書歸見面同斷織機中埀白母抱孫時復倚門東四春雨秋風歲又寒翁年近百足蹣跚横山菽粟東洲水多在行窩樂考槃初冬感懐令垣書所居屋壁在昔陵谷變海上十五霜歸棲失故隣乃落劍井傍百指薙荆棘耰鉏破天荒東洲釣月磯横山樵牧塲一葦去復來十月新稻嘗擕幼入寢門淒然北風涼吾兒婦嫠居我孫官逺方筠籠鶴何之盆菊花自黄跛倚赤藤杖終日徒倀倀初度蔑以為樂杜撰古樂府三章而令諸孫誦之老夫聽之比之挽歌者歌蒿薤於柩前豈不樂哉龜巢老人忘食貧歲時強欲娛賓親賣琴沽酒作生日蹲䲭爛蒸鮭菜新承歡幸有斑衣人君不見古人云酒杯不到劉伶墳杯行莫厭頻二龜巢老人貎不揚觸邪之性如神羊生憎巫覡煽妖妄疾視聃竺隳綱常耄無能為龜六藏滄浪曲窈窕章有時擊節呼兩郎男兒當自強三龜巢老人年紀多雞皮鶴髪背槖駝金丹自古無足信鐵硯如今亦不磨坐待蓋棺歸薜蘿舂有相巷有歌此時不樂成蹉跎殘生有幾何樵海歌為秦文仲先生作出山志云逺樵海名非誇老夫素相知髙風真可嘉早年欲伐廣寒桂增月清輝燭天地又欲㑹稽雲夢伐箭竹人無戰鬭遭鋒鏃汗青六經天下讀此志適蹉蛇陵谷俄變改青山樵侣集如雲一笑飄然入東海任公舊日釣魚處樵屋相隣蛟室住扶桑若木有餘薪且喜路無荆棘慮水底珊瑚樹亦多尤物不堪開眼覷樵擔弛樵斧歇濯足滄洲弄明月興來擊節和龍吟唱我海樵歌一闋也不學負薪讀書朱買臣也不識卧薪嘗膽是何人白螺為杯大如斗青苔席地軟如茵有時獨酌爛醉枕柯斧睡到日髙三丈猶醺醺夢魂不到長安市長安市上多覊旅米珠薪桂莫能賒多少伯桃寒餓死孰知海樵之樂有如此寄溧水開福寺長老源别流客有溧陽雲水僧相逢曾得問南能九重日月恩光近一壑煙霞道氣增龜紐肘懸新賜印麈談語續舊傳燈别來老病時相憶欲覓金篦刮兩瞢悼徐孟銘讀盡岐黄上古書幡然讀律應時需一官再調炎州幕二豎交攻瘴海隅頼有故人收白骨歸來鄉國瘞黄壚杏林花落紛如雨何樹哀啼五尺孤臘月十六日夜篝燈作兩書言不盡意夜半後欹枕對月口占言懐命兒軰録上耕學伯齡元修三先生南澗海萍二講主清真一鍊師暨諸吟友照天蠟燭徒明月縮地神仙是子虚九十一年殘臘盡二三百里故人疎詩成唐律傾懐抱書託吳儂問起居老我形容都變改依然貧似馬相如任義甫生日作絶句四首以鰥居無子貧病為憾予乃以理釋之誠如吾言則不必怨天尤人而處之泰然矣兄有遺孤骨肉親堦庭玉樹一枝春駿奔籩豆非無主傳襲箕裘未是貧池有紅鱗堪入饌杯浮緑螘可留人髙年已過磻溪老每日懽娛莫厭頻贈蔣居士全家欲學老龎禪木榻蒲團夜不眠誰信室中靈照女出門先上渡頭船贈袁居士羮牆欲見老瞿曇貝葉書中日夜叅布襪棕鞋門不出一盂疏食勝肥甘正月既望予奉陪邑長貳置鄉先生之祠于學釋菜而歸兒軰謂故人楊澤臞過訪臨别作長短句貽之余因口占以記鄉校中盛事并寄楊為後㑹之約云喜聞邑有絃歌宰哦松之丞更文采翕然敬我鄉先生祠諸學宫儼如在區區後學尊前賢駿奔執籩忘耄年深衣幅巾拜祠下燈月交光星滿天扶憊歸來語鄉曲此事真能厚風俗安知好客過柴門載殽問字成虚辱吾兒不識氷玉壺但言此客從前無醉墨淋漓灑白雪沂雩興與曾為徒老夫此興亦不淺尚怯落梅風剪剪少頃一百五日來蘭臯蕙畮光風轉三山湖頭舴艋舟百花莊上逍遥遊朝陽碧樹自鳴鳳湖海詩盟尋白鷗生平頗恨少知已晚有奇逢寧不喜朱絲重繫焦尾桐請為鍾期奏流水水田歌歌農務也郡縣之政租賦為急然農務乃租賦之所自出可不急乎首言三山書所見也一府四縣意在其中惟當道父母官念之芻蕘有詢更當面陳其詳以備采擇三山湖頭白水田頽㟁不修年復年田家豈不憂卒歲十室九空人索然饑腸雷鳴狀如鵠春來怕聞啼布榖願言州縣父母官喻令蚿足憐䕫足古云民事不可緩桃花雨晴春正暖文移動若風有聲畚鍤集如雲不斷三農畎畮合羣力四邑溪山增喜色麟史重書大有年官無負租民足食龔黄卓魯政績成一日九遷皆上卿天子萬壽黄河清聽我老農歌太平無錫舁佛像由暨陽而來鳴鑼鼓竪旗盖儀從僣侈家至以禍福惑人取粟帛無筭東洲任耆老沮之巫不遜被毆且以杖搪木偶幾躓而後去隣莊有王氏者撻而逐之予聞而喜乃力病援茟書此以美任并異其義理之勇云梁公毁􅁋祠真是霹靂手胡公能打鬼近代亦希有區區辨惑編或有蒙醬瓿潦倒東家丘忽爾發哮吼老拳敺妖巫拄杖擠木偶西鄰一壯夫怒挺擊羣醜捐袍偃旗蓋脫網疾走時予病中聞病去什八九朂哉爾東家内省宜弗疚報本理所崇毋落豺􅆩後一正勝百邪昔賢同不朽題打毬圖擊鞠流風自李唐官家占作狀元郎科塲廢盡毬塲在芳草萋萋幾夕陽清明後一日邂逅薦福寺長老源公話舊論詩意甚相得明日作此詩代簡貧如南阮甘投老喜得西枝近贊公白足有僧聽説法江梅無閣坐觀空詩成芳草斜陽外道在殘山剰水中一笑相忘今古意清明時節舞雩風沈徳麟母哀詞怪底吳霜二月繁一朝摧折北堂蘐母儀表表真堪畫吾軰區區豈易言斷織機中多教子分甘膝下並呼孫慈顔最有難忘處獨倚蒼茫日暮門洪武丁卯年詣烈塘祖墳祭掃恐朝暮即世子孫不知所葬者為誰且追念墓松在昔為邑里諸宰木之冠感愴寫情并圖葬穴以示兩子及孫使識之以永其孝思其詩曰百年兩度桑田變三世十年蒿里同華表前時曾駐鶴長松何日再蟠龍情鍾寒食蘋蘩外淚灑春暉草莽中老我客鄉歸不得空勞杜宇喚誰儂次韻答江隂鄭教諭見寄揚子江南山水奇杏花壇上晝隂遲魯魚亥豕讎經史江鮆河魨閲歲時兩邑相望三舎地九年凡寄數篇詩恨無縮地仙人術把酒論文醉不辭葉道士遊仙詞海變兮揚塵翦若木兮風斤醫拗人兮寓世仍猿鶴兮同羣冠切雲兮霞佩雜三秀兮蕭艾從喧囂兮萬􅄜聊遊戲兮方之外混混兮和光忽蟬蛻兮坳堂陵虚空兮轢渺茫一瞬息兮三千霜吾不知其果何適兮祗死守乎康莊輓萬拙齋曹横山下萬家莊喬木隂隂夏亦凉法曲琵琶彈鐵撥髙堂窈窕捧瓊漿素衣忽被青蠅汚赤手幾遭猛虎傷賀客未還來弔客老夫雙眼淚淋浪閏六月廿九日飄風動地自黎明堀起破屋㧞樹衆皆驚懼至夜方息次早余追念疇昔憮然作歌三家村裏老詩翁獨木橋邊一釣篷敗壘曾聞屯狗寨荒湫猶説是龍宫勢傾東海前年雨力撼南山昨日風可笑生來誇壯膽兩番如阮哭途窮葛節婦葛節婦家住崑山陽芳年二十良人亡呱呱兩兒泣蘭房一在襁褓乳口黄塵昏破鏡無復覷孤燈相伴慰凄凉霜風自冷木自落辟纑不知秋夜長重門深閉四壁立縗麻淚濕三年䘮維時率土皆戰塲疇能訓兒知義方熊丸在篋螢在囊呼兒义手立侍傍魯論二十篇孝經十八章阿母授讀聲浪浪母不姑息兒能自強從師不出鄭公鄉腹笥有書牙頰香朝夕悦親萱草堂母今年踰五十霜菽水可歡時且康觀風使者恐未知邑有野史揚芬芳玉峰父老來比徳衛共姜我言共姜無此兩兒郎哲哉此母非尋常盍亦作歌與史相激昂寄清真觀提㸃余復初祖餞昔年詩最好客來今雨話𤣥都步虚壇上三花樹讀易牕前九節蒲恬飬氣同龜息静清修容勝鶴形癯儒林老友袁真士曾道區區折簡無代簡吳中衡一夢今年一去年兩番相見兩相憐牽蘿補屋仍徒壁賣藥修琴又斷絃滆浦夕陽紅樹下淞江秋水白鷗邊何當載酒乗秋興來徃風流似雪船寄題詹伯逺蘿屋大車方檻檻小隱自寥寥門掩牽蘿屋溪懸掛樹瓢一從滄海變屢却小山招滆浦居相近城闉路匪遥洗心常翫易忘肉似聞韶苔徑春風掃𤓰田夏雨澆姓名編令甲蹤跡混漁樵蝌蚪藏書種蟾蜍作研僚訓兒燈火夜飲客歲時朝清白真能守緇黄不妄交茍焉田野樂老此聖明朝寄語青雲士巢由不見堯雪中遣興横山鶴髪翁小巷龜頭舍一爐置中央四壁塗縫罅晨粥食近午晝户閑如夜舉足手扶杖縮頸頭蒙帕㧞木飄風静宜麥大雪下公家租賦畢農圃犂鉏暇沽酒黄公壚分肉陳平社有時聚親戚談謔弄杯斝有時呼子孫舞蹈歌風雅舊竹幸平安孤松正蕭灑一笑謝梅花騷無補亡者贈張鍊師名善淵我昔諦觀韓子詩春秋書法風雅辭九流百家蘭鮑雜直筆褒貶非無之嵩山道士姓張氏大篇舂容獨稱美嘉乃丹衷獻赤墀欲撻羌夷安晉鄙天顔咫尺千里同母氏連環來夢中忠孝並存方寸地翩然歸袖舞春風淵今同姓復同道愛親又與同懐抱靈修未得一品題菉葹竟混金光草嗟予學韓年近百吟骨冰清頭雪白内交豈無黄與緇轉首多成兩塵隔淵乎淵乎識道理潮州老僧差可擬臨行握别敬留衣山靈起舞烟霞喜悼大林菴主日公三綱掣斷駕三車一笑今朝喜到家方外旦評喧衆口淤泥藕出白蓮花二熊耳峰頭有客歸相逢還著舊禪衣五山十刹都傳語莫遣閑雲出岫飛三憶昔雲林訪舊遊空堂六月靜如秋焚香坐説西來意門外青松亦㸃頭四一住横山二十年山中木石盡通禪老夫載雪重來日誰折梅花送上船輓無錫王門無車馬送迎忙身混泥塗寵辱忘涴火有時持䑕布濯纓何異在滄浪九龍山下青邱葑雙鯉池中碧草香生子賢如黄叔度牛醫千載並流芳感事二首草暗日欲落山逥路轉賒叔敖呼不起誰擊兩頭蛇二蹊田牛奪去立仗馬令肥安得春秋筆公然决是非邀舒文允小酌春秋連兩年喜事忽今日佳期一百五有菜二十七呼孫貰酒尊速客聚圭蓽風廻落花舞雲開逺山出鷸蚌自相持雞蟲果誰失鄉無月旦評世乏春秋筆長揖謝知已永言保真吉題秦仲暘雨竹湘山之陽湘水隂鷓鴣聲中雨涔涔此君一别知幾載别後桑田變滄海客來今雨重相看歲寒風節依然在餘事不須多感慨送徐士方之登州黄縣學教諭世態趨炎素所憎校官應喜冷如冰絲桐聲續龜山操膏火光分海市燈大釣六鼇將有兆髙堂三鱣豈無徴寄書黄耳還家日莫惜題詩貺剡藤觀音栁肉髻珠纓自在身何縁化作栁中人三眠未足扶風起似怯春寒翠黛顰羅漢松余素拙詩至詠物則其拙尤甚故昨效諸公賦觀音栁俗陋可笑今又聞有羅漢松可配前題再用出醜蓋欲求刻畫無鹽變惡為美勿徒笑其醜云十八羅漢十八公前身後身將無同一行九里西湖路應供誰家去雪中次韻答鄭元齡見贈青年肥遯方求志白首貧交獨念予開徑掃花童起早敲門看竹客來疎匣藏神物蛟龍劍架揷古文蝌蚪書風雨一春門不出門前車馬自紛如宿僧房澹泊齋鐘鳴雨樓風滿天金猊吐盡㫋檀煙誰知林下一宿覺我有石上三生縁懐郡城諸親友余生篤親友平居數相顧老去筋力疲此心尚如故年年二三月晴曖入城府沂雩童冠俱所樂随所遇安知今年春十日九風雨甚疑媧石漏無石可修補一榻髙堂氏四壁蝸篆古牀頭丹菌出青苔灑庭户羣芳狼籍盡來牟紅半腐我耳未全聾聽之亦良苦頼有二三子時復共樽爼或歌竹枝詞或賦梧桐句鏗鏘迭倡和所樂勝鐘鼓歸舟掛晴帆快若馳馬去圓天磨青銅新渌漲南浦候門童穉奔滄洲舞鷗鷺峩峩屋上山厯厯山上樹白石喜不爛且無泥滓汚不見黄初平散卧羊無數尸坐對煙霞神交憶支許何時松葉酒薜蘿徳星聚瞻彼片雪闕援毫抒情愫賀太平寺講主生公坐擁㸃頭石野老來聽焦尾琴祇樹獨園春又夏雜花千界古猶今壁無畫水傳奇跡塔有風鈴作妙音安得刮除雙眼膜時陪杖錫一登臨感興四月初九自城中抵家得前四句後旬日足成之兩目眵昏耳又聾僅存方寸古秦銅忘機自得親鷗侣含弩從教伏射工百越溪山詩枕上四時風月酒杯中惜春無奈春狼籍頻遣蒼頭掃落紅端午日懐古五月五日追前賢九歌九章鳴素絃蛟人應泣魚腹葬龍伯合贈龜毛氊招魂感舊痛梁壊反騷媚新圖瓦全楚天盡處卧遊去艤丹酹月羅江邊西塘詩為郭彞倫作具區東北三千里家住西塘水之涘滄洲不涴軟紅塵一鏡波光照牕几西塘本無風物奇有功於民民稱之早田霑溉數百頃苗無槁死年無饑非湫非壑非瀚渤不為蛟螭作窠窟輕舟徃來快如馬撥棹人如執鞭卒東鄰西舍雜漁樵朝出暮歸歌且謡白紅荷花紫菱芡􅍉苕蘋蓼蒲蘆茭髙齋讀書歲年久鍼經一編常在手客來問疾或問奇拄杖挂錢舡載酒人人有此林塘幽不妨未老先菟裘地因人勝從此始千古萬古芳名流端午後雨阻過詹氏蘿屋即事賦絶句二首代簡風打舡頭輓不前舡回雨㸃大如拳請看六日蟾無用且得爬沙手脚全二瀕溪數家風景幽溪流過門東轉頭黄梅雨少麥大熟買布輸官不用憂人面獸懲元惡也惡不可縱天不可欺故作二詩以懲之人面獸長七尺人衣冠人飲食面有七竅皆人形猛獸之心人莫測生來害物固不少羣居猶自藏牙爪一朝忽欲咬殺人豹麝文熊皆驚倒二人面獸聽吾語一人受害一家苦爺孃妻子令失所殘忍胡為至如許人言汝性多隂毒中汝毒者恱汝目快汝腹汝心方饜足嗚呼馮婦或再生獸乎獸乎勿横行恢恢天網布八紘莫道網疎可漏天聾盲追悼諸葛用中諱端幼年能寫大字既習舉子業學琴袁子方先生之傳父號徳齋晚學道創清微觀揚子江南疇曩日吕蒙城裏一文星科塲早試程朱易𤣥學旁叅道徳經愚與通家心甚赤賢能知巳眼常青草生書帶人皆喜竹作詩筒使不停著處溪山朝載酒有時雪月夜揚舲卜鄰晚欲從王翰分席尤加敬管寧一旦谷陵驚變改十年兵火苦飄零扣門幾誤風敲竹泛宅長如雨打萍天上玉樓俄有召月宫娥藥竟無靈細君冠佩全貞節先世箕裘祝寧馨名溢東吳滄海國魂歸北固白雲屛兩家相去百餘里一老今踰九十齡聯句每懐吟石鼎聽琴頻夢坐柯亭柱題應有能言鶴擬踏秋風去一聽寄鄧秉文二首曹横山下聱叟吕蒙城中放翁何夕舉杯邀月中秋鼓枻乗風二鐵柱硉矹二老璿霄沆瀣三更絶口不談時事掀髯聨敘平生寄陳彰逺明逺兄弟金牛臺下帶經鉏長鋏無聲食有魚兄弟五人雙璧在箕裘三世一廛居中秋明月最端正長夜浮雲或巻舒覔得丹梯上天去同將物理問何如寄辛至善青年即著逺遊鞭白首仍居小市廛寂寞蓬蒿三徑在辛勤父子一經傳奔牛堰下水到海射虎亭西山揷天我欲抱琴尋戴去中秋相近月將圎寄清微觀周泉石塵揚滄海廿餘齡真館翬飛壓庱亭風掃刼灰南土樂天開圖畫北山青丹砂九轉龍蟠鼎玉漏三更鶴聽經諸葛仙翁呼不起正須金石播遺馨三笑圖簡寂先生五栁翁襟期適與逺師同過橋相送忘相别千古風流一笑中風雲雷雨畫四首吹嘘萬物生蘧廬盎盎元氣槖籥吁偃禾㧞木有未㑹請君細讀金縢書二漠漠閑雲淡淡容不為蒼狗未從龍直須霖雨成功後依舊還山伴赤松三金電光中霹靂飛殘臣膽落震驚時雲收雨散青天出能聽無聲有阿誰四誰挽銀河沃太空恩霑赤地洗爞爞隂隂夑理天家喜都在丹青筆意中野雲歌為王元一羽士作山中之雲歛蹤跡空谷深藏伴泉石從龍之雲雷電俱四方行雨勞馳驅飄然一片雲在野看來最是悠悠者或舒或巻無朝夕南北東西随所適道人含笑松下坐我即是雲雲即我買臣讀書圖噫予㑹稽守素行何卓絶采樵工或餘誦讀聲不輟青柴擔頭春赤脚林下雪富貴知有時妻子從改節髙風一如此後世誰可埒吾將訪遺蹤更得探禹穴薦福寺紅梅詩紅梅閣事見毘陵志等書庚溪詩話載程致道詩有春風日浩蕩醉色回冰肌之句元末兵燬今本山釋源公竺淵恢復舊刹重植兹花丐予詩記之紅梅閣下梅花樹陵谷變時風㧞去堯峰老禪歸故山覔得孤根栽舊處年年春到花時節一株五出胭脂雪春風笑面歲寒心光霽混融風韻别老禪道服忘妍醜品題假我扶犂手黄州定慧海棠花可與齊名傳不朽月香水影象王宫雜花世界將無同幾度拈花有人笑吾將請問瞿曇翁源竺淵以道西傳等和予詩亦蒙見贈且云臨字等韻難和予由是復次韻酬之支許論交世所欽昌黎亦聽穎師琴深山大澤多遺逸明月清風無古今閣下梅花桃杏色庭前柏樹海潮音寫容代有丹青筆電目誰能一照臨獨孤公檜詩唐獨孤憲公為常州刺史時有手植之檜今見諸郡志等書元末樹毁於兵至二十餘年為州民者宜再植以寓思賢之意况有周鍊師為松菊主者乎率爾口占呈乞諸搢紳先生更唱迭和相與贊成亦庻乎厚風俗云憶年十五六好古尊前賢初聞獨孤檜快覩曾争先蒼然一株枿舊根皴皮錯節枝葉蕃適逢夜雨半身濕疑是徃年甘露痕孔明廟前柏相似乃在陳司徒廟之後園鄉來陵谷忽變改化作刼灰飛入海神焦鬼爛救不得桐鄉自此無光彩幸存一曲闌干石題公姓氏留遺跡石苔斕斑土花碧相伴銅駝卧荆棘余從海上避兵歸幾度摩挲長太息懐哉古之人好賢意無窮詠甘棠愛召伯賦菉竹美武公憲公此樹堪比隆後人寧不仰髙風𤣥都道士桃千樹一檜區區豈難措龍鍾野老及羣英亦愧因循坐遲暮檜乎檜乎重培植風枝相樛霜幹直邦人具曕仰遺徳見樹猶如見顔色六百二十五年如一日題牽牛圖為丁學古作不放桃林不飲池叶唐何切牧兒牽去意如何南山石爛今非昔寗戚無勞扣角歌題鷺鷥便面為丁學古作潦倒滄洲客蕭騷白鷺詩牧之呼不起此意少人知出門老去多懐舊興來時坐馳出門窮鬼笑罄室故人知野飯新菰米詩囊古竹枝諸孫溪上别矻矻問歸期題僧綱澹泊軒我愛澹泊軒山居城市中雲分半間許雨溜四壁同風林金石聲道人氷雪容澹然味無味泊然空不空露坐㸃頭石雪立摩頂松吾徒幸相與吾道喜不窮一笑兩忘言落花舞回風江山漁樂圖數口妻兒網一張船為家舎水為鄉江南江北山如畫欵乃聲中送夕陽崑山王有恒以書附常州天寧寺長老寶公問予近况作詩答之并索諸友賦重植獨孤檜詩客從笠澤來常郡書到横山問老夫哭子哭孫家已破賣書賣劍酒還沽千墩每入龜巢夢十月應開獸炭爐支許舊遊煩寄語肯題唐檜和巴歈黄林屋許贈皂布巾不至戲作此索之霜倒蓮葉巢老龜寒縮首欲裹緇布巾并裹瓦盆酒此酒今已熟此巾曾製否抱膝梁父吟炙背坐南牖老况知音誰横林隱居叟贈天寧寶滄海臨濟雲仍幾代孫猊牀說法象龍奔庭前銀杏西來意陌上銅駝東郭門四海共霑新雨露一舟能泝古淵源留衣人逺衣何在别有伽黎遺後昆悼城西周彦美二首七十六年事梨花夢裏春家傳三代禮身作兩朝人負郭田園樂連雲第宅新闕麒麟二三槐堂上客闕最青春吐酒常憐我奕棋多勝人闕竟作白頭新釃酒橋𤣥墓澘然為泣麟寄饒州鄱陽縣唐生千七百里鄱陽縣外孫書來如見面九十三歲龜巢翁中宵夢得重縫線詩瓢山人來上游吾將結社招馴鷗延陵昔日繼三讓野水何處無孤舟貧家幸爾年榖熟買書教兒耕且讀梅花無恙竹平安歲晚無勞念窮谷和舒文允見貽冬至經旬久朋來喜踐長市沽雙木榼踞坐一藜牀小酌成歡洽閑愁付杳茫山無白石爛谷有紫芝香澹泊聊相與辛酸已備嘗盡消湖海氣莫放斗牛光所貴心能直何慚貌不颺聽冰狐自惑吠雪犬何狂歲晚鷗盟在生平蟻夢忘酒堪澆磊塊袖莫舞郎當西崦黄茅嶺東洲白水鄉漁樵同此樂吹笛送斜陽夏五訪一舟禪師臨别立銀杏隂中謂予曰山中舊物什䘮八九唯此木幸無恙也宜蒙品題為天寧勝槩使居山者亦預有餘光余謝不敏然心嘗許之故兹口占以頌人物具并之美一箇虚舟渾不繋千鈞重負力能任金園地湧靈光殿銀杏天生䨇樹林佛印衲裙坡老帶昌黎詩句穎師琴禪林勝事無今古况爾庭前好緑隂輓曹子毅大使早歲輕肥試采榮一官三載繋塵纓解龜便作幽棲計𤓰圃東門學邵平二桂子初生折媆枝青氊舊物遂陵夷竹林小阮親調饍何異慈烏返哺兒三生來不鑿混沌竅此去竟作逍遥遊回頭一笑看鷸蚌未到釡鬵誰肯休洞庭胡敬之以予父執之交歲饋新橘凡十有餘年感無以報是用作歌湖山清氣鍾而翁生兒亦有古人風年年送橘拜牀下甚愧我非龎徳公今年霜落洞庭早橘熟等於葑田稻青衣童子黄金丸樹頭摘來霜未乾儂家食指百三十分甘喜得皆波及嬌癡堪笑兩曾孫手㺯金丸口欲吞阿翁老饕三嚥畢教孫食之還自喫一枚一枚復一枚翁有笑聲孫亦咍枯腸久似長卿渇甘露適從仙掌來楚江萍實不可得華峰藕亦無人識冷比雪霜甘比蜜此句真堪題此橘韓子之詩今代無借作報章揮我筆懐哉故人家洞庭七十二峰環翠屏洛陽秋風塵滿城莫能汚爾雙鞋青南山不爛黄河清正須坐閲三千齡山中舊識諸耆英莫煩老夫多寄聲紅梅前代支郎亦異哉白雲堆裏植紅梅樹經刼火多番換花向春風二月開鄰舎杏桃渾赧色禪枝草木絶纎埃一時想像題詩去别日尋芳載酒來歲旦言懐去年元日兩眉攅情抱今朝頗覺寛一夜雨聲曾不絶五更天氣只微寒二曾孫杯捧屠蘇酒冡婦厨供粔籹盤最喜催租人不到田家雞犬得平安寄盧長嬰次農我思東吳諸故人二難青年才出羣炯炯眼如巖下電英英氣作山中雲一經㫖趣熟儀禮六書偏旁宗説文無由縮地即相見晉鄙亦得沾餘薫寄辛彬甫五鳳添修助益箋雙魚書尺竟虚傳桃符忽爾三年換木榻如今兩膝穿南國鶯花春甚早東洲雞黍約如前好來同賞元宵月莫返山隂訪戴船和毛伯尚雪中登塔一夜雪深三尺許江南江北久無之躋攀鴈塔最髙處想像鴻荒未判時光動山林揺玉樹氣涵湖海湛瑶池僧房或擬天花雨田舎皆占隴麥宜黄竹無歌良可喜清河有頌不妨遲八千里外多遭貶十二街中欲訪誰白戰正須逢敵手長吟聊復解人頥凭欄細聽風鈴語似亦知音說好詩壽諸葛節婦憶昔梁鴻歌五噫挈家避兵東海涯玉樓有夢上天去孟光無復案齊眉旌旗滿眼愁滿腹抱兒日夜吞聲哭沙湖㟁竹似湘江淚痕斑盡依依菉呼天籲地吐丹衷柏舟之誓共姜同桑田變海得歸路庱亭故園榛棘中教兒服勤能構穫青氊舊物兒堪託星冠霞佩蕋珠經萱草堂前樂吾樂春秋六十有八年時人喚作女中仙麻姑送酒作生日雙成獻桃紅且鮮髙堂長夜照明月何異嫦娥廣寒闕不勞白搗𤣥霜真修自有長生訣仙家歲月我不知我來為作節婦詩他年烈婦傳中寫千古萬古芳名埀獨孤公檜詩并序予前詩謂獨孤公檜在陳廟蓋圖經所載及予親身見之一日郡人徐孟曾問曰唐刺史為一州之主手植之檜宜擇美地公表而出之衆所共瞻何寘諸陳廟之後耶予曰按唐書徳宗朝徙公為是州刺史去梁公毁江南滛祀之日未久無陳廟也唐衰禮廢淫祀寖興迨五季而禮法大壊叢祠之神類加尊號陳廟或肇於唐末而盛於斯時今荒園廢沼安知非昔日驛亭傳舎乎厯宋而元皆無改作故翁巻之詩有曰托根陳帝廟應不慮樵夫其意不以此木為不幸而反以為幸也可勝歎哉孟曾然余言遂植檜舊所予亦恐前詩為人口實因復作是詩獨孤之檜化烏有庻士重栽倚碧潯遺徳一州人眷眷流芳千載樹隂隂霜根蟠入龍蛇窟風葉響成鸞鳳吟願若甘棠無翦伐報公疇昔愛民心寄聰上人嘗託補楞伽經脫簡就用索之杕杜之歌落九天石尤風轉送歸船長洲茂苑渾無恙翠竹黄花總是禪眼孔不教迷土苴耳根常得洗風泉貝多葉上楞伽語脫落應能為補全題顧師道樓居晴空圖山孱顔雪斕斑飛樓縹緲層城巔水晶榱題白玉闌樓居之人應列仙金烏出海飛上天藍田瑶草煖生煙誰家馬上郎意態清且閑既非謫官遇雪阻藍闗又非春風得意遊長安摩挲老眼仔細看乃在櫟里先生圖畫間碧桃贈吕城􅄵官應孟㳟猗猗谷中蘭鬱鬱澗底松我愛之二物幽尋庱亭東路逢碧桃花澹然無冶容吾知所笑者羣芳鬭青紅本來天上種有此林下風老况哭子三年孫兩年一孫戎服又西川秋風茅巻藏書屋春雨苔荒負郭田堪笑平居能濩落誰知末路竟迍邅空林樹折烏巢毁奈爾孤雛失所天雨中期辛彬甫不至兼憶兒子林孫塏等一時口占二絶句雪尋戴逵興不逺雨過蘇端意甚濃若使兩賢生並世浣花溪上我遊從二一雨能生五月寒三杯欲釋兩睂攅那知酒入愁腸去化作澘然淚不乾謝饒州周氏甥孫女惠鞵昔領軍一屋之鞵未聞有惠人者今唐伯亨室人製雙鞵遺我於一千八百里之外其親愛之心可謂篤矣然則茍非伯亨之真其室中之人安能遂體其心哉區區報章豈忘所自故著其説如此詩曰濯足洮湖寂寞濱寄來雙屨藕絲新何當化作飛鳬去謝汝慇勤念老親贈盧長嬰次農憶昔盧兖州生有古人風病世禮俗壊或與禽犢同遺經授子姪世業今専攻騎箕去不返象賢躡孤踪平居迭師友砥礪相磨礲東海雙南金豐城兩神龍含光若暗投天將振儒宗叔孫自綿蕞制作成治功潛心對黄巻儼然見周公妙理析秋毫百世開羣蒙追攀大小戴旁叅鄭司農復看書帶草匝地生婁東顯親埀令名永言報而翁寄南宗僧綱大空寥寥雲自浮驕陽蟲蟲金欲流白生一室静如水清坐六月凉於秋陽羡好茶留客共獨孤多檜賦詩不官様文章祖蒲室正須述作賛皇猷寄一舟禪師葱葱䨇樹林井井百丈規欽欽響鐘鼓棣棣慎威儀空庭苾蒭草浄瓶楊栁枝滿眼皆祖意此身丁盛時熱客不相過清風堪自怡或翦葛藤話竟織駢儷詞陵谷變未久山水知音希我本六日蟾眎同五總龜儒墨各有趨支許交忘機眷言獨孤檜曾覔一二詩禪縛想自急詩筒來乃遲南風非不競北山何用移請拈木毬子聊作逢塲嬉寄講主法師西𫝊懐哉久别廬山逺奈此相望去路賖屢夢丹梯同上塔每留清話竟忘家芭蕉手種繙經葉菡蓞池開結社花三伏不嫌人褦襶一肩偏袒佛袈裟竺書自早探三藏緗帙如今載五車方寸静涵滄海月文章光炫赤城霞尚憐老馬能知道更喜神羊解觸邪早晚蓉湖秋水碧定期濯足過漚沙懐詹伯逺蝌蚪殘書補未全齋居一榻坐來穿稻花遶屋白如雪溪水出湖青接天冠盖不來騎馬客鷗鳬長傍釣魚船多時欲問平安信伏日題詩寄竹邊寄贈岳陳齋二首一書曾寄訪行窩百里相望阻滆波陽羡谿山無恙否延陵風俗變來多鵂鶹夜集連雲厦荆棘叢生注馬坡尊酒欲懐千古意中秋蘿屋候經過二南山爛石無多在東海颺塵又廿霜奇字盛傳揚子學徳門誰表鄭公鄉秋髙丹桂花纔發閏後黄楊樹必長㑹有龍蛇生大澤流芳竹帛繼先王寄薦福寺源竹淵青門薦福東堂老白首黙誦西方經有時適興倚梅閣無復談禪坐柏庭解夏欲随雲水散立秋忍聞風葉零老禪心性一如此說頂㑹有伽耶鈴寄贈吕城羽士周泉石仙風飄飄天骨奇不皤爾髪黄爾睂海上鐵船渡九折道傍闕金狄知松花釀酒常留客竹籜裁冠自賦詩不解腰纒要騎鶴道人應笑俗兒癡索居無聊自七月既望至中秋前九日腹稿得小詩十首不追琢不詮次大率皆眼前事無逺興也然胸中芥蔕有消釋未盡者或見於詞可笑我愛青山爽氣增青山似我骨稜稜半年不踏山前路也學禪居結夏僧二一昨病暍思清秋秋來兩旬熱未休堪笑荒唐野人語天公不遣火西流三詩腸頗饜木雞肥老齒方便豆粥稀今雨客來如舊雨多情只有兩烏衣四蚊蠅屏跡去何遲烏循環度不移一雨夜來凉可喜家家水滿飬魚池五十里山開翡翠屏三家村裏老人星無塵竹徑風還掃徒壁茅齋夜不扃六魚自浮沉水自流釣船閑繋小溪頭朝來頼有杯中物忘却連年日夜憂七阿翁眠食龜頭舎兒子耕耘犢鼻裩記得孝經刋誤本尚能口授教曾孫八牀頭鬭蟻取人憎壁上粘蝸失自懲螢火光殘小兒手誰憐堪作照書燈九凉風騷騷草木黄初月皎皎更漏長洛陽有夢忽驚覺鶴唳聲中人斷腸十稻花雨外紛如雪桂子風髙香滿天誰信一䨇多病眼餘生重見太平年暨陽沈徳隣氏徙居郡城名燕處之室曰咬菜根處昭其儉也龜巢老人謝蘭謂之曰夫人以儉徳立身惟窮達不變者君子韙之拙詩效顰亦曰備薑桂之用云士方窮居含糗茹草誰無菜根知味者少睠兹小物大道可擬淡而不厭斯為君子鮭菜自珍龍根自奇我菜之根朝斯夕斯若決濡肉或如嚙骨左車有聲宫商彷彿賢相脫粟聖相齕匏顧予何人口腹敢饕吾愛吾廬畦蔬遶屋盤有餘飱鼎無覆餗窮達百年始終一趣明月清風咬菜根處輓管伯齡先生多才徳與俱崑山之玉滄海珠玉華忽作白雲散珠光竟随清夜徂青青書帶匝里閈纍纍筆冡埋荒蕪雞林客來嘆且泣欲覔好詩還有無二憶昔狼煙兩袖黄斷蓬飄泊鄭公鄉金龜換酒邀明月玉麈論詩説盛唐百年往事陵谷變通家交情江海長騎箕先著祖鞭去旦夕吾將與頡頏陳存心先生挽辭代黄仲器作蒲石軒中山澤臞出門戎馬即長驅欲騎東海金鰲去竟作西風玉樹枯化鶴還家人想像義烏銜土子號呼恨無杜老揮椽筆寫入哀詩比畫圖鵪鶉圖不作巢居與穴居鳶飛魚躍不相於平坡淺草幽閒處宿食飛鳴得自如題清微觀并序蘭嘗考庱亭乃孫仲謀射虎之地今為吕城橋密邇清微是為清微勝槩也不揣言耄表而出之并為燕厦之賀云阿䝉之城何代傾𤣥元閟宫無與京英雄射虎陳迹在咫尺奔牛古堰横鯉魚飛去石盡爛桃花種來蹊自成華陽福地一如此何用山中宰相名懐袁耕學諸故人夢裏忘余兩目盲馬鞍山下訪羣英詩容總似山容瘦道氣多如海氣清皎皎白駒方屏跡嚶嚶黄鳥未忘情呼兒早起題書尺十日新年雪乍晴右寄袁耕學二憶昨吳淞十二詩清真道士獨委蛇梨花春釀適來熟頻遣青衣送酒資右寄清真觀道士俞三鈯斧單提不暫停黄花翠竹總忘形問渠送米盧仝意也愛茶聲有可聽右寄延福菴主四雲峰毬子逢塲戲一笑春風舞袖歸從此晏然門不出忍看沙界有危機右寄僧闕長老五崑山絶頂立浮屠海闊天髙氣勢孤莫道八風吹不動八風吹動有人扶右寄僧勝上人六玉峰巨邑冠東吳在處金園似給孤手把竺書朝夜讀此心能轉法華無右寄僧善性空送郁友文之京揚子江頭春二月送客登舟赴天闕男兒生有四方志莫作尋常黙然别憶昔孺子歌滄浪尼山聖人曾激揚我賡再歌呼索郎子其洗心宜勿忘次韻奉荅瓢齋先生見寄二首齋居一榻坐來穿腹笥羣經老欲眠夢裏亦行端正路醉中常造渾涵天春光荏苒無多日天氣霠霃近禁煙舊雨不來今有約虹光遥望載書船二予家經亂離蕭條無六親遥憐竹林阮中有白首人髙詞吐白雪逸氣凌青雲楩柟豫章下灌木無足云安知射工弩中厥父子身問疾數徃返先生同五倫奈何日月下覆盆茹艱辛惟天降炎霜清飈灑冠巾一朝禍根㧞戩榖乃薦臻孤鶴還九臯飄然離雞羣吾將問𤣥機載酒歌子雲僧綱賛公和尚以疾得告而歸善權舊隱横山老樵謝蘭效劉賓客竹枝二首為臨别贈維摩牀上遣文移治績垂成竟解龜僧史有如班馬筆絶勝州里去思碑二滆浦飛花送客行善權耆舊出山迎問渠那得真消息摩頂松枝喜鵲聲過無錫醫士徐士亷别墅棲神山在屋西頭竇有寒泉帶錫流山近杏林煙樹接泉香茶鼎雪花浮蜚英早歲肱三折樂道清時號四休堪笑興來忘潦倒尚能擕酒過滄洲寄楊彦澤逢人屢問平安信有子亦如郎罷賢萬石艨艟輸賦足九重閶闔奏名先未論烏鳥能含哺且喜黄楊閲閏年我昔與談忠孝事阿戎詞色兩忻然次韻送秦文仲歸海上溧水先生挽不留故山回首鬱相繆落花飛送九年客行李歸來一葉舟勲業鏡中成白首耆英㑹上冠清流獨憐詩社今寥落無復尋盟集舊鷗送秦文仲教諭歸老崑山縣盛代埀新統斯文續斷絃青山溧陽縣白首廣文氊唾視鉛刀鈍心持鐵硯堅蓬麻扶盡直茅茹㧞相連頒印恩殊重明倫教欲專諸生皆鼓篋三物屢興賢美績經三考英聲徹九天晚成真大器幽谷必闕命以菟裘老榮於晝錦還黄河清有日白石爛多年齒徳身兼備文章世自傳本來天下士且作地行仙鷗社詩盟在鱸魚斫鱠鮮寄聲袁處士雙璧喜俱全次韻}
