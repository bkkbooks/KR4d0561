  - {type: variant, offset: 11380, length: 2, content: 藁卷, WYG: 稿巻十六欽定四庫全書龜巢稿巻十七元謝應芳撰詩龜山祠詩卓彼文靖公早立程門雪載道歸東南統緒頼不絶鳯鳴朝陽能幾時朝棲瓊林暮棘枝歳晚江空卜居此毘陵草木争光輝邇來陵谷一再變煙滅灰飛舊書院殘碑斷礎落誰家應作寒砧搗霜練南山北山禪者流鼓鍾雷鳴塔廟修儒衣儒冠亦不少孰謂好賢無二周龍鍾老諸生不言忍包羞甘棠樹下吐肝膽愛禮可得存羊不羊存禮亦存所願或可酬渠渠一畆宫依然對滄洲將使邑人知有東家某駿奔籩豆祠春秋簡曹谷賔徃昔政和間結交先君子時葉公子承蔣公子舟諸良友數嘗文㑹於九華隠者周先生}
