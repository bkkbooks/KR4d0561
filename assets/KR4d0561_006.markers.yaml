  - {type: variant, offset: 7450, length: 0, content: '', WYG: 冬至即事一簾紅日雨初晴客屨駢羅送復迎賀節本非三代禮随時且喜一陽生齊奴金谷財為害楊相氷山勢易傾何似酒杯長在手青山相對適閑情冬至前二夕憶次子林不寐枕上賦詩將成忽其母夢中作聲撼而覺覺而喜言夢林烈塘舊居作湯餅畢垣居室事懽甚予因用其語為是詩結句云去年臘月初九日發軔天階又一期鄭校頗聞衿佩集歐詞應作送迎詩久無書信來黄耳每有親朋問白眉阿母夜來曾夢汝甘分仍在舊西枝送楊純夫歸琴杜子客長安行囊本枵然得錢沽酒覔鄭䖍不嫌官冷寒無氊爾來六百有餘載世道多随陵谷改身為今人心古人清風髙誼依然在嗟我如鄭貧蒙君愛如杜雖無三絶才樗散頗自喜一從傾盖意相得頭髪不知誰黒白衝寒觸熱每見過愛我西牕好山色援毫或和龜巢編解纓或濯龍井泉常言好古絶類我外物多忤中彌堅低頭甘立矮屋下髙論直到羲皇前朝來賣得凌雲賦麯生車載來相顧門前尺雪凍不消風木吼如虓虎怒宿宿信信傾腹心言欲挐舟抵家去呼兒更酌罄餘懽贈别殷勤抒情愫我昔居吳十九年君歸煩君訪諸友吳山醉處好湖山十闕鄉人來作輭脚局且對春風開笑口街頭米賤酒亦賤一百青蚨滿䨇斗儘判連日醉如泥百憂盡付無何有人生窮逹各有時阿衡元是扶犁手詩書豈徒守章句言行正須傳不朽珍重林居慎厥修好音慰我思悠悠雪篷為蔡子堅作鴟夷船載西施去遺臭五湖煙水路喜爾吳淞雪篷闕江水曾無尤物汚篷牕洞開天雨花柂樓屹立水為柱鵝鴨不驚柔櫓鳴鷗鳬渾在平沙聚非熊無夢釣無餌如琴無絃得琴趣虎頭能為畫漁蓑驢背無勞見詩句潮州阻雪八千里諫書直抗曾何補殘氊囓雪十九年使節堅持亦良苦雪篷之樂樂於天雖欲同人人弗取獨有山隂王子猷清興頗堪同日語過顯慶寺六載重來釋氏家一甌新啜趙州茶杏花風後春何冷柏子庭前日未斜拄杖頼能扶潦倒闕文煩為補楞伽要聽說法頻來徃且喜平橋路不賖書潞城樵舎壁燕子來如舊雨桃花笑為何人竹下青苔不掃恐教鶴歩生塵二一室四皆立壁六孫三已歸妻猶喜老萊舌在不妨矮屋頭低三㧞木狼無䟦㚄絶糧道阻周流天眼或開或闔人心何怨何尤四瀼東瀼西農畮巷南巷北人家白雪秋香禾黍緑雲春靄桑麻劉徳祥監税江州客有誤傳其子死者遣人回家并寄書吾孫辭甚酸苦因賦詩代簡九江相去二千里一别于今五六年盡道國恩容告老安知家信有訛傳山連楚尾青天外潮落潯陽夕照邊遥想此時公務隙爐峰相對思悠然題趙行素佩韋齋綵衣翩翩童丱年佩觹佩韘庭闈前鐵馬紛紛戰争日佩犢佩牛江海邊幽蘭紉佩非不好獨醒未欲追前賢朅來佩韋不佩弦常以輔我氣質偏視韋之緩我之急如餌良藥沉疴痊世事多因忙後錯緩不及事理亦愆不疾不徐發中節秉彞庻得全吾天巖廊鳴玉似髙歩江妃斛珠人浪傳貪榮可笑蘇季子佩六國印扶危顛何如茅齋但安坐且有竹風堪醉眠青山於人少知者白雲與我同悠然韋乎韋乎心自懸得魚吾豈忘吾筌贈黄仲器予觀道書謂洞庭山有林屋洞天仲器以避兵居之既而過雲間適海上復還常之横林閲歳月三十年距洞庭三百餘里仍以林屋自號示不忘也徴予詩故厯叙其遊息之概如此云一目九州皆戰塲避兵林屋水中央林屋仙人不知處橘井委棄青霞漿木奴包金亦致㓂人乃随雲出巖岫五湖三泖放孤舟遵海幽尋采三秀堪輿再造隔兩塵故鄉來歸能幾人芙蓉湖上大横峴煙連緑樹横林春解裝付與箕裘子管領春風桃與李幅巾自作逍遥遊别有行窩修竹裏一童出入長相随欵段之馬亦不騎林屋别來陵谷移時望白雲猶賦詩膏粱文繡俱不喜獨曰愛詩心未已堪笑老夫同此心白首論交結知己何當呼起李謫仙每飲一斗吟百篇殺青盡伐南山竹剰録好詩娛暮年悼許君善谿西老人山澤癯一生祗以詩為娛常言愛詩入骨髓好詩抄藏千百紙七言近體尤忺作不費工夫細琱削嘔心每笑李家兒牛鬼蛇神何足奇老夫初焉未相識數篇不知何處得稠人廣坐誦吾言説項過於楊巨源一朝傾盖千墩下膠漆相投不相舎西鄰假館兩年春買宅移家情轉親此時吳門正堅壁張角未死人相食雲梯砲作霹靂聲狼煙暗天血滿城吾徒幸若王官谷朝夕同吟紫芝曲桑田變海嘘吸間死欲邱首歸横山暮雲春樹勞逺憶十載詩筒仍絡繹重來桑梓甚蕭條巷有索租人呌囂骨冷九原呼不起一酹非歌續蒿里嗟哉時俗貴輕肥如子愛詩人亦稀贈王仲昭父子扁舟入吳空載月閭邱虎邱俱不謁停橈再拜范公祠楊花正落祠前雪義田義宅三百年義聲洋洋天下傳嗟爾吳之人胡不踐遺躅貪夫婪婪昧盈縮前車後車屢顛覆下床䨇屨内䨇足奚用領軍鞋一屋我來訪舊無所將贈以范公博施之義方家傳更須授賢郎福澤將來未渠央呉淞江水長藍謝青毋我忘吳逸庵輓歌辭廓然一襟涵宇宙鍾氣會稽山水秀春秋髙似伏生年岐伯諸書口傳授浙水西來家屢遷名與杏林俱不朽老去居吳抱䨇膝四顧狼煙暗如漆兒能負米百不憂有酒即呼人共吃常時隠几看青山醉則􅋜􅋜枕琴瑟廿年同飲淞江水通家之交親戚比别來恨無縮地術時復論心書一紙只今祗與阿戎談翁在九京呼不起李明善慈竹軒吳淞江南湓浦曲慈竹軒開薜蘿屋更無花木鬬芬華一徑波光照猗菉纎塵不滓蒼玉叢枝枝葉葉皆清風一年一度冬夏笋冬生其外夏其中徳哉此竹美如許子母相交禦寒暑嗟哉人為萬物靈温凊㡬人能如汝吾知吾友此軒居朝夕奉親來版輿母慈子孝黙相契更喜君子能威如樹萱堂上分甘樂諸孫錦䙀如錦籜家僮笑指青琅玕少長喜與俱平安令名千古埀不刋咄彼鴟梟兒人面刀劍腹不學返哺烏頑然忘顧復嗚呼吾不知其見此烏兮何面目爾何日兮視吾竹簡湯道原曹子壽予生頗好古恐兒軰不能繼述敢請二賢良相與語之吾兒觸屏煩為警省旦夕稍閑煑茶專待要學劉伶死便埋随行負􅓩欠輿臺螢生腐草光能幾螘在南柯夢易回一笑豫言身後事兩賢聊共掌中杯貧居何處堪鋪席流水窗前好緑苔過横山龍祠作横山龍母祠前路人説今年祭龍苦前期邑有皂衣來督遣丁夫剪榛楛里胥中有豪家郎搜攫如鷹鬫如虎編氓一呼六十人棄擲犁鉏行或沮十家之甲最可憐背血淋漓遭捶楚囊無一錢供百需肥腯豚如買烏牯手傾麥斛比珠斛剜肉成瘡誰為補胥常大嚼過屠門今乃閭閻刲鷺股吾聞此語三歎息郡邑安知弊如許祠官稽古埀令典穆穆緝熙由聖主聖心寛仁重民食三年兩度蠲租賦天生感孚和氣洽曰暘而暘雨而雨報功於龍歲有祭禮若迎猫恩更溥龍兮龍兮知不知如此嗟來食應吐皇恩蠲租詩洪武庚申天下秋糧欽蒙全免今年壬戌秋糧夏税又皆免徴征繇聖恩寛大亘古無比故耕稼之民歌謡滿野而某則併以區區所聞者書之漢紀蠲租半遷書汗竹奇大哉今聖主全以惠羣黎量與乾坤合恩同雨露埀豐年魚有夢丹詔鳳重施庻富民生遂敦寛俗習移㣲甿皆鼓腹窮士亦揚眉往制成均法新頒釋奠儀雅音諧律吕名教浹華夷茅茹今朝㧞英髦靡一遺八荒仁夀域萬世太平基水有清河日山無爛石時時雍民皥皥年耄我蚩蚩不作輸芒蟹真成曳尾龜倚牆歌此曲擊壤付吾兒林在新鄭縣學六月公文來取其子塏視疾七月初四日塏言别而行付家信外寫此一聞汝有河魚疾三宿心如野馬馳逺阻恨無人縮地吉占頼有卜言龜眵生稠漆黏䨇眼身兀枯株坐有胝預寫盖棺遺囑去好傳經業佐明時送沈居仁同塏徃新鄭二千里外視吾兒重九日前期汝歸坐卧待看黄菊綻徃來相伴白雲飛郵亭歇處加飡飯客路凉時早裌衣無限老懐言不盡臨岐目送思依依賀袁一泉陳大方新任道紀司官山中宰相古來有地上仙官今更清夜半光生䨇劍出秋髙氣感九鐘鳴丹霄拱極星辰近黄道經天日月明𤣥牝書中多妙理政須獻納佐隆平賀聰聞極正心印新任僧綱司官象法提維付偉人聖皇綸綍命諄諄手持正印天龍䕶身著方袍雨露新旭日斗城衙有鼓清時滆浦鏡無塵牆東病叟頭如雪也喜曇華並得春贈天寧寺無學長老報恩扶起法幢來鐘鼓天寧講席開道出語言文字外卓然聲價自崔嵬二麻衣䟽屩古人風儷葉駢花一掃空八萬四千修月手斧斤随入象王宫賀府官重修多稼亭朝家重下蠲租詔郡圃聿修多稼亭一帶金湯增氣概四郊禾黍勝丹青甘棠風作婆娑舞横峴雲開翡翠屏斤斧聲中勸農意爾農豐樂正須聽周節婦詩呈府縣官滆湖水出白鶴溪大江潮來溪口西江潮湖水接連處節婦姓陳周氏妻良人早世舅姑没抱雛日夜號空閨盡拈奩具易䘮具衣有淚血髽無笄績麻絡絲紡具織破牕夜雨風凄凄孤燈照影伴寂寂寒風夜雨聲酸嘶煙塵逺避東入海兒方長大能鉏犁時清歸守舊桑梓布荆蕭瑟茅茨低青絲兩髩變蒼雪皎如玉樹無纎翳前年縣官帖鄉里覈實上府文可稽老夫近聽路傍語聖皇徳與唐虞齊天語諄諄為天下求賢悉上青雲梯閭閻未見旌表節門前草没青苔蹊願言宣聖化郡邑罔俾側陋薫蕕迷旌善亭中名一題恩同璽書封紫泥佇看俗習接武皆麐蹄再贈衡志通世俗以甘㫖奉飬者為孝温清定省之禮鮮能之今寒區衡氏兄弟三人皆善飬其母其伯兄志通禮意之勤老而彌篤冬月則以身温被席雖大風雪母不知寒能此一事可配古人能勿美乎故作此續前所贈詩以補其闕云雞鳴雪屋起居安魚出冰池食飲懽最喜兒能温被席慈闈冬盡不知寒寄馬䭾沙陳糧長老龜獨巢蓮葉秋元龍髙居百尺樓長江只隔衣帶水佳景宛在蓬萊邱一年時序換新厯四海弟兄懐舊遊竹君寫我歲寒意聊作梅花寄隴頭送曹徳昇赴批驗茶引所山無猛獸水無蛟邑里春來樂意饒部集茶商新箬籠壚添酒市古溪橋赤心報國年方妙黄耳還家路不遥珍重清時用刀筆平陽遺澤正寥寥謝新鄭縣官助葬亡子并以志略送去轉縣學去年孟秋初天旱火雲熱吾孫奔父䘮病眼淚流血陸行二千里􅞶踔若跛鱉歸來秋盡時黄埃滿縗絰詢言父襄事從頭為予說一衾覆黔婁家人影單孑䘮具百無措宿儲瓶亦竭幸逢賢縣令賵贈意切切擇木製美棺飭匠夜不輟僚寀同哀傷祭奠豐且潔青青諸佩衿感化重禮節是猶風偃草宏綱頼提挈吾知賢令心髙誼等前哲無錢及元振有則與同列無麥及堯夫有則與同轍悲哉我中子忝教兩期月眷言古東里圖經自來缺編蒲載前言辛苦磨硯鐵草創十八九放筆成永别手澤存於家歲久恐亡滅抄書送琴堂公餘賜披閲韞櫝庋􅓺舎無為醬蒙設會有作家手織錦為補綴姓名蠅附驥九泉應感恱矧知埋葬恩寧無報銜結老夫懐謝言縮地恨無訣殘喘苟朝暮烏能見鬷蔑坐馳仰崧髙心聲吐嗚咽述懐䨇眸半瞎耳全聾年及新豐折臂翁孤陋一生棲白屋虚靈方寸炯青銅人如禽犢真堪耻家有詩書未是窮但願太平田野樂九原髙卧聽松風人日和前韻二首曾聞社酒可治聾椑榼分來謝里翁鈍士常磨龜硯石貴人多佩虎符銅人前出語羞稱好杯後為文錯送窮連日昏昏如病域不知春到楝花風二林居鶴髪老癡聾彷彿忘機海上翁留客但沽隣舎酒鑄錢安用蜀山銅一年春色花無幾千古川流水不窮誰謂東家錦衣樹龍頭顛卧夜來風寄南澗海苹二講主東土西天今幾華南能北秀本同家門前弟子齊腰雪案上經文五色霞袖拂古墩行傍栁缾分春水坐煎茶遥憐丈室俱清絶屢夢幽尋適興賖寄張仲安舅甥及邵濟民許叔逺去年艤棹千墩浦澆酒伯倫墳上土伯兮伯兮呼不醒仲也憂予仍眼青最喜諸甥多似舅戀戀之情無不厚東陵𤓰地兼種藥杏林仙人與同樂箕山之瓢今貯詩雞林賈人知不知老夫别來八九月憂患無端髩添雪負米不歸悲仲子我盆又鼓酸風起傷春不欲向人言恐人忍聽哀號猿最苦䨇眸失岩電近日看書渾不見兀如枯禪壁常面隙有微明澘且眩阿兒呼來滌塵硯代筆題詩簡羣彦無錫華景章以牆東陸先生所序乃祖玉溪義士之文徴予詩故有此作猗歟古聖賢飢溺視由己聖賢久不作人多飢溺死天厯年中歲薦飢老夫身親耳自知操壺枕籍委溝壑烏鳶飽食狐狸肥適逢郡縣無良吏狎弄文移等兒戱義倉和糶百蠧生殊失先民救荒意吁嗟玉溪翁髙義孰與儔黔敖之粥活鄉里立解倒懸危急秋指囷不結當世交易量不效前人尤盡令菜色作喜色如度弱水登蓬邱嗟哉玉溪翁徃事誰紀述鄉人口碑傳四方牆東老手春秋筆老夫知名五十載更喜牆東文字在義聲洋洋流至今又閲桑田變滄海天生孝孫念厥祖禮樂趨蹌䋲祖武丈夫不憂無萬鍾要為顛崖救辛苦唐君舉挽辭早年讀律如五經案頭夜照練囊螢學成能展四方志當路縉紳俱眼青神州赤縣坐蓮幕賛畫雖勞意磅礴青雲拾級歩歩徐腰纒不跨揚州鶴邯鄲夢斷楊花春桑田變海宇宙新歸來東陵剪荆棘故侯誰識𤓰田人竹林小院差可喜為箕為裘奉甘㫖青松宅邊紅稻畦白雲亭上烏皮几四時花木手自栽客來看花常置醴有時寂無語蒲團醉逃禪有時曵鳩杖朗誦逍遥篇得鹿門龎公之安比濟南伏生之年生平有如此死去真悠然薤露歌或可鐫此歌便作碑銘傳過無錫口占客舟無錫道中歸聽唱吳歌淚濕衣泰伯墓田耕觳觫偃王祠廟走伊威二三策在遺芳逺千百年來舊俗非詩寄瓢齋老詞伯吟邊同為一歔欷題漁樵共話圖爾樵斫青山爾漁釣滄洲世事百不聞此心兩悠悠道傍弛擔渚泊舟促膝面語何綢繆想論會稽人衣錦或訝桐江棄羊裘人生窮逹各有分曷不嗒然自作逍遥遊贈醫士錢伯祥杏林老仙山澤􅋯幅巾逍遥曳長裾逢人善作青白眼有子能受岐黄書酒對玉峰傾鑿落丹成金鼎飬芙蕖焦桐掛壁斷絃久藥杵聲中樂有餘題扇青山滿眼氣蕭森茅屋人家煙樹林客星多擲漁竿去誰復扁舟釣碧潯題子昂竹石圖玉堂歸來髩欲絲漚波亭中清晝時竹君石丈意相得不時為作無聲詩安安道人歌僧坊旅宿崑山縣夜讀安安道人傳似將秦鏡作斯文道人肝膽都能見早年學劍欲有為車塵馬足曾驅馳蕉隍夢斷竟失鹿葑田乃耕東海涯安知逃名逃未得射兮旌招論觀徳諸生遊藝集如雲儼如風詠從曾晳歸來自喜安其安一室視同天地寛鹿門龎公與同志妻子不知行路難傍人問我安心訣非佛非仙非臆説纎雲不滓沉寂天水湛霜潭照秋月家居四壁莓苔青柴門雖設晝亦扃年來豈獨樂吾樂堪輿俯仰俱清寧有時得錢即沽酒明月清風作三友胸澆磊塊去即休不學淳于論石斗嗟我碌碌者和爾婆娑歌無勞赤松遊只在青山窩挂瓢樹下舞婆娑歌聲繚繞青銅柯羣雄自奏巻白波安居之樂奈爾何逺緑亭為惠聚寺瑞芝年作道人愛山常目接無復經繙貝多葉碧天低處見絶頂蒼石爛來知幾刼清風一掃六合塵須彌芥子等法身諦觀有色若無色大地盡作曇華春宿崑山延福菴葉舟來訪漁樵社蘭若適逢龍象羣屋近玉山多潤色林藏寶地絶塵紛𤣥壇坐到三更月髙枕眠分半榻雲鐘鼓聲中鳴般若老夫堪笑耳無聞題崑山縣城主簿先塋圖舊家衣冠麟角族隂隂榆栁連鄉曲佳城父祖馬鬛封欝欝松楸在吾目飬親弗及奉庭闈居官豈敢懐蕨薇二十時中公務畢三千里外歸心飛出言不作雌黄口臨事不為髙下手琴堂喜得佐絃歌俸米支來供爼豆髙懐炯如寒露壺連歩陟彼青雲衢兩塋銜土集義烏更遣丹青添畫圖題竹枝雀圖覆車之粟衆喧呼爾獨忘飢入畫圖枳棘叢邊林有竹一枝何異鳳棲梧題玉峰書舎圖為俞彦智作婁江水接東海洋崑山玉立摩穹蒼江山城邑美如畫之子卜宅山之陽邯鄲夢斷歸來後詩三百篇長在手尚將古䟽補蟲魚復以今文挍蝌蚪門前小溪流水清畧彴不通車馬行漁童甕汲供茗盌鷗沙席坐尋詩盟才多轉覺讀書好春雨庭生書帶草時稱狂客醉鄉遊罔俾四明專賀老題畫魚圖魚在在藻或在淵随波泳遊同一天會得莊生濠上意畫圖詩史總難傳題畫竹顧挺之子作父作子述為竹傳神筆意古澹靈犀絶塵品題者誰龜巢老人題雪竹圖此君立雪清復清老夫見之䨇眼明琅玕恐折驚棲鳳三嘯虎頭風欲生絶句二首寫延福山中客况寄止菴長老一榻清風偶借眠白雲長遶枕頭邊客來題遍芭蕉葉我亦留詩謝老禪二風幡交動曙光揺蔬筍分甘到客寮最喜松聲秋瑟瑟月餘忘肉似聞韶一般春希夷古髙士詩言一般春以詩謚攸居夫豈尋常人一般春意何在莊生論天倪託物肆迂怪列子説混淪其言極夸大老夫請以理折衷慎勿謂我胡公之中庸古今先後無始終洪纎髙下俱流通芸芸萬物生意遂盎盎兩間和氣充鶯鶯燕燕妙歌舞花花草草紛青紅孤松或落幽澗底三秀多生糞壤中歩伸尺蠖天運轉户啓百蟄雷音同鶴長鳬短頸分一敢以私意窺神工一般春意如此朱絃嶧桐奏流水洋洋自入知音耳小車髙閣卲堯夫隨栁傍花程伯子針芥相投肝膽合祇應纔到東風裏白雲先生知不知同姓乃有此白眉老夫宿昔愛此詩四百餘載人無之頭髪雪白雙眼眵也來摸索珊瑚枝}
