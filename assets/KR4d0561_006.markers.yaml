  - {type: variant, offset: 11384, length: 0, content: '', WYG: 經出圖之馬出未巳來儀之鳳來不停萬方皆效華封祝諸將已勒燕然銘化風覃被族麟趾聘物逺來鹽虎形雄州巨邑並庠序歌臺舞榭舞優伶先生横經虎皮席弟子立雪梅花庭延陵躬耕地井井尼山聖父碑亭亭正逢海内興賢日豈作江隂老客星泮宫芹藻得佳趣隣封草木沾餘馨龜巢一老辱篇翰鱣堂幾時瞻典型趨裝又欲覲金闕飲餞愧無䨇玉缾淵清冰潔知者衆㑹有孫邕薦管寧予以小爐閣坐卧安燠名之曰熙熙甕天孫塏到江隂語劉小齋先生蒙篆書四字見其筆畫清勁可喜作詩報之乃翁澹齋先軰能篆𨽻而文為鄉郡所稱詩中故追美之昔在金斗城晤言即相違今觀玉箸篆神氣不少衰澹翁心畫傳師承古人誰秦相漢中郎殆欲肩相随舊家冠盖里密邇延陵碑古意師聖筆真贋吾何疑正如善相馬而忘牝與驪懐哉楊子雲載酒當問奇奈無縮地術龍鍾空坐馳周節婦陳氏吾甥也早寡頼其母撫恤之恩為多母卒且以語付託我夫婦擕之避兵居吳中十有餘年白首歸里一生艱苦老夫獨深知之故書此以紀其畧云哭夫未了又姑嫜獨抱遺孤涕泗滂奩具賣來營葬具不憂寒餓死空房二南山石爛海揚塵風雨飄揺笠澤濱嗟嘆渭陽田舎老辛酸同受十三春三狼煙未息歲仍饑蛟室相隣地亦危長夜㸃燈機上織明朝換米釡中炊四戰骨縱横歸路迷烈塘疑是越來溪良人地下應憐汝不作王凝斷臂妻五裙裾藍縷蓍簮折鄉井蕭條草屋卑節孝兩全頭雪白疇能說與史官知臘月十四日風雪極寒大林菴主僧以佛廬落成冰雪堆中作梵宫磨磚布地與金同何當放下南泉斧坐聽松杉萬壑風悼熊元修徴士落落龜巢翁閒閒鷗社叟雷陳十年交雲水三江口在昔鷗沙結社時盟鷗之詞我筆之唫風咏月意相得絶似伯牙逢子期朝亦詩暮亦詩詩興動來忘渇饑淞江太湖墨淋漓鶴汀鳬渚生光輝毛髪雖秋霜光風自懐抱不虞白石爛但覺滄洲好一朝林谷俄變遷我歸耕我延陵田銜寃塞海笑精衛抱怨思家憐杜鵑鷗社叟軟䨇脚晏然不受功名縛社鷗尋盟還可樂苐我路途遥來徃難如昨前年訪戴踐重約舟到山隂眼生膜黄庭不寫贈籠鵝蒲萄醱醅㫖且多船頭送别誦佳句且知步武追隂何音書從此不復得我心孔竅皆茅塞清夜悠悠思故人夢裏依然見顔色客來聞死半年久倀倀不能將絮酒悲歌為探驪龍手三日悲風動林藪次韻荅袁仲徴見寄大江南㟁衆山蒼巖谷深藏寶劍光江上風波來滚滚山中歲月去堂堂能承書業千金産喜有童孫咫尺長杯酒正須朝夕醉無勞更覓解愁方四皓圖天風吹斷紫芝歌四老幡然出薜蘿不用勒兵呼左袒安劉功比絳侯多二飽茹山中紫玉芝姓名誰徹九重知濟時隂有回天力震器安然不動移𤓰隱為崑山邵濟民賦藥壺舊懸紅杏林𤓰廬今住清江潯南柯太守了無夢東陵故侯同此心灌園自捧漢隂甕抱蔓别作黄臺吟老我坐馳三百里何由縮地重相尋簡袁耕學先生馬鞍山開龜甲屏臯比之席講六經一年不見朶雲字三月又看花雨零角巾小像固垂白野史巨編方殺青宜有詩筒繼前軰使我晉鄙沾餘馨寄熊元修摻别廿五月昏耄而受罔於人者多矣詩言此謬餘從可知一笑之餘必蒙警教愛子腹便便逢人問孝先悞傳烏鵲信剛道白雞年鷗社詩千首龜巢稿一編何當重擕手相恤話䕫蚿次韻酬陳庠仲見貽二首鳳凰阿閣自新巢鷗鷺滄洲只舊交百里雲山人契闊一簮霜雪髪蕭騷忍看雨溺堦前蟻怕說風掀屋上茅樽酒論心宜有約誰家竹裏借行庖二春申港上老人村家有詩書教子孫白首竟能安菽黍丹心豈不合乾坤諸生問字車載酒滿地落花僮掃門且喜年來忘世慮不時杯勺醉昏昏又和袁仲徴陳庠仲去冬所寄之作腐草煜煜螢火生枯梨紛紛山蟻行可憐身病道亦病猶喜目盲心不盲溪山相望數千里松竹歲寒三友盟何當相對文字飲似昔盍簮金斗城壽萬拙齋蓬萊水淺鐵船歸城郭人民半是非且喜春秋今七十能知六十九年非二天開夀域大無疆林下幽棲樂且康不須更覓長生藥昭代如今化日長三芳茂山前種玉田芙蓉湖上采蓮船東隣西舎連花竹渾是桃源一洞天四一襟秋水心無競滿面春風唾自乾可惜時無吳道子畫圖傳向邑人看五菖蒲花開香滿庭簷旌廉斾風泠泠髙堂燕客作生日紅頰紫髯雙眼青六今吾故吾知不同朱門無復掛桑弓但將一斛葡萄酒浄洗平生磊塊胸七金作狻猊􅌊寶薫桃笙如水客如雲榴花不用纒頭錦也學吳姬舞絳裙八燕雀歡聲新第宅溪山佳景古丹青琵琶自製玲瓏曲彈與龜巢老子聽九拙齋之拙意何如天賦惺憁本有餘欲識顔曾愚魯地一鞭希驥莫躊蹰十舊家青氊什襲藏兩兒斑衣長侍傍人生可樂有如此一日可比三千霜昔人謂積憂成隂積隂成雨今隂雨之久且多竟不知何憂之積以致然也淺陋之辭姑識歲月時乙丑夏五望後九日也常年五月衣輕葛今年裌衣猶未脱一天凛氣隂如秋谿山黯淡煙雲稠有時雲罅曜靈出頃刻朱光暗如漆商羊飛來作人舞羣鳩醉葚渾無語雷聲虺虺雨浪浪一雨十日夜亦滂人家屋壊什八九床頭泥淖生蝌蚪疑是彼蒼媧石裂天河水漏何時竭補天無術正憂心水鄉之田俄陸沉常州地接蘇湖境青苗在田知幾頃農人惜苗如惜兒苗死一時真可悲全家老稚仰天哭天若埀憐天雨粟不然歲饑方薦瘥里胥催租將奈何贈時義夫生民天降衷所性無不仁物欲肆侵蝕乃底失本真嘉爾鴻鵠姿超然雞鶩羣里有賦蛇毒比屋含悲辛呌閽聲徹天恩波活枯鱗老我無能為喜此聲譽聞願言一簣進將來見嶙峋貽吕雋人生異禽犢秉徳方寸許一本尊所生推恩篤諸父嗟哉淳朴姿片言不輕吐去年赴叔難代服徒役苦槖饘復今年赤脚走風雨紛紛蕭艾中薫然見蘅杜顧予子若孫疇能類於汝宜從竹林遊氣習變齊魯挽徐仲清妙年博極軒􅄮書晚景晏安閭里居小山叢桂蔚如故大兒一官清有餘落成客散烏衣宅送葬人來白馬車安得並騎箕尾去逍遥八極曵霞裾夏五即事貪墨何多禍蔓延刮毛龜背欲成氊千村萬落炊煙斷田舎逃亡犬餓眠寄王尚絅陳子儀諸友起予每憶二三子投老于今九十年自是片雲相隔爾如何尺素亦茫然蝦蟇産鼃横山下螃蠏輸芒滆浦邊若問龜巢舊風景月餘隣里斷人煙簡無錫華景章百書不如一見面此語信然胡未然燈花有約半年久桂子已落中秋前東門種𤓰抱溪甕西齋瀹茗􅆽山泉少遊鄉里樂如此應笑鳶飛瘴海天寄徐伯樞東膠山人不出村南州髙士之裔孫十年曾作螻蟻夢四壁祇有莓苔痕松分女蘿補茅屋筒引乳泉澆藥園别來幾度屋梁月顔色宛然清且温寄丹陽孫秀民翩翩白鴈秋風凉紛紛白蘋秋水香官河兩堰隔三舎旅次一違今十霜菱芡練湖秋大熟莓苔劍井夜無光故人知我老癡否年似伏生書盡忘懐京口俞伯鎮鐵甕新城舊隱居江山勝槩畫圖如五條街口多輿馬萬巻書中老蠧魚道合不妨鄉土異情親可奈信音疎杜鵑花與人俱好珍重題詩一寄予洪武乙丑秋新鄭縣學以通經薦吾孫塏移文本縣徴赴吏部塏於六經有望洋之嘆且欲辭而不可得予以孔孟之書列乎九經塏嘗受業故臨别示此數語朂之猗歟古聖賢遺言存簡編孝經及論語孟子書七篇載道繼六籍煌煌日星懸斯文覺斯民千有五百年汝生家避兵九經失青氊借書二三策教汝朝暮間大哉孔孟學曾如管窺天還鄉願卒業奈汝多迍邅朅來誰薦鶚通經乃虚傳徃哉詣春官從實吐肺肝絲麻雜菅蒯博采豈舎旃天朝恩惠寛茅拔茹或連立身報君親慎勿違至言送楊景子以通經薦舉之京亭亭青玉桐孤生秀中林雨露得所飬歲月亦已深良工㧞奇才獻作羲皇琴繫以朱絲絃鼓之丹鳳吟八風宣九垓令人格非心鄭衛化韶濩太和無古今吾將洗吾耳朝夕聆遺音和景子冬至韻隱隱鐘聲出景陽陽生望闕賀朝忙勲名有日印如斗舞蹈今朝靴滿霜咫尺天顔春色喜輪囷雲物瑞光長錫錢張宴宸恩厚一舉真堪累十觴冬至後五日承郡齋文㑹翌早賢長史置醴􅍁洽且有贈言次韻奉酬并謝不敏文章太守誰同樂幕府賓僚如李郭坎蛙誰信有奇逢鼓吹敢随東海若枯腸喜得酒一澆枵腹毋勞篾三縛獨憐澗底老孤松春風膏雨徒優渥初度作重光之冬湯餅客孟光相對頭俱白吾兒樵雪中歸來擔頭還帶詩三百詩歌熾艾夀觴舉呼鶴堦前舞瑶翮安知此後境多乖五載家門毁雙璧行年今與伏生同兀若枯株雪霜厄樵兒遺孤主黔簿四千里外勞相憶我昔蹉跎四方志每見桑弧有慚色願言膏雨發孫枝先世衣纓復輝赫皇天於余賦亦厚才散如樗夀如櫟語言聲音耳尚聞黑白分明眼猶識四肢百骸筋力微頭容與心依舊直呴嘘素不學松喬逆理偷生正何益曹横山下青松宅含笑全歸待朝夕山瓶乳酒如蜜甜笭箵寒魚鮮可食家僮荷鍤且勿忙為我挿花吹鐵笛自今每日從歡伯龜巢甕天適吾適斷送予生真上策卧雲歌為華景章作我昔所喜青雲人雲梯登登上星辰餘如風花落藩溷伊人可仰不可親只今老我成枯朽愛爾巖棲卧雲叟白雲一壑數千畆且無租稅論升斗悠悠我如雲寂寂雲伴我雲無出岫心吾無洞門鎖一榻偃仰得自如兩膝屈伸無不可布為被非難能我被以雲如白綾木為枕吾未曾以雲枕頭時曲肱牀無上下亦無客别有意氣非陳登飛鳶跕跕自炎海夜鶴繐帳清於水佳哉叟之所樂者如彼今人古人誰可擬華陽陶隱居投簮謝朝市山中作相心未閑剛道怡雲豈無愧華山陳處士大笑脱塵屣鳳凰銜書空徃來熟睡雲臺}
