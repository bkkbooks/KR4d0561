  - {type: variant, offset: 0, length: 4488, content: 龜巢藁卷之十一詞驀山溪遣悶至正丙申歲作無端湯武弔伐功成了賺盡㡬英雄動不動東征西討七篇書後强辨竟無人他兩箇至誠心到􅔄無分曉髑髅滿地天也還知道誰觧􅞮銀河敎净洗乾坤是好山妻笑我長夜飯牛歌這一曲少人聼徒自傷懷抱沁園春丁酉春寓堠山錢氏冩懷冷笑班超要覓封侯棄了毛錐看今来古徃虛名何用朝荣夕悴浮世堪悲老我衣冠傍人籬落頼有平生鉄硯隨西荘上對溪山如畵鷗鷺忘機相逢喜得新知更不用黃金鑄子期把胸中磊磈時時澆酒眼前光景處處題詩輕㡌簮花柔茵藉草時復樽前一笑嬉沉酣後任南山石爛東海塵飛滿庭芳玉雪梨渦錦雲桃扇紫簫雙鳳和鳴觥船𥘉棹烟繞博山青最喜清和天氣緑隂静梅雨𥘉晴髙齋裡馬融書帳風捲絳紗輕華年纔㡬許培風健翮曽試修程偶歸来林下閒聼松聲笑道葵花似我芳心在向日長傾黃河水如今重看朝暮還清沁水曲四海烟塵一櫂風波經行路難幸兒孫滿眼布㠶無恙夫妻白首青鏡猶團笠澤西頭碧山東畔又與梅花共歲寒新年好有茅柴村酒薺菜春盤傍人莫笑儒酸巳爛熟思之不要官任伏波强健驅馳鞍馬磻溪遭遇棄擲漁竿霜滿朝鞾雷鳴衙鼓何似農家睡得安閒寺裡喚山童把􅊦野老交歡自和雪壓新年花開想遲鶯来甚難喜杯有屠蘇春風灔灔盤有苜蓿朝日團團六十年来㝷常交際江海鷗盟搃不寒移家處每涉園成趣居谷名盤忘情世味辛酸但吟得新詩勝得官儘敎我仾頭三間矮屋從他髙歩百尺危竿白首無成蒼生應笑不是當年老謝安且琴書裡消磨晩景受用清歡又和竹與梅花偃蹇氷霜堪稱二難我依梅傍竹借人茅舍吟風弄月坐箇蒲團梅様精神竹般標致遮莫清癯未是寒柴門外一湖春水似拍銀盤昔人恨橘多酸我只笑青松也拜官每醉時仾唱滄浪一曲閒時髙卧紅日三竿兒軰来前老夫説與梅要新枝竹問安餘無事只粗茶淡飯儘有餘歡蘇武慢蘭雪衣衿芝雲冠佩咳唾成珠玉芳草萋迷蓬莱杳渺皎皎白駒空谷濯髪滄洲怡顏芳樹問天生湖海元龍豪氣肯令消縮君不見二陸聨芳三蘇接武聲動九重黃屋天上碧桃日邊紅杏真足快人心目拂䄂東膠出門西笑莫恋故園松菊看濁河流水重清齊唱太平遺曲滿江紅怪􅔄春風要将我舡兒翻覆行囊裡是羣賢相贈𢾗篇珠玉江上青山吹欲倒湖中白浪髙如屋幸年来阮籍慣途窮無心哭歸去也瓶無粟吟嘯處居無竹看造物怎生安頓老夫盤谷第四橋邊寒食夜水村相伴沙鷗宿問客懷都有㡬多愁三千斛一剪梅一色蒼然兩阿翁年也相同月也相同六年湖海共飄蓬烟也溟濛雨也溟濛移家今住葑門東朝也相從暮也相從何當歸隐舊山中桃也春風李也春風風入松寄朱原道為生日賀梅花折去一枝春人在太湖濵天生襟度容江海每開樽坐客如雲此日醉看蓬矢吾兒應吐華茵湖光山色净無塵魚鳥搃情親姑蘇城上遥相望見湖山如見伊人緑髪年華全盛白眉聲譽方新風入松嵗寒心事舊相知相别去年時如今重覩春風面比年時消瘦些兒天上玉堂何在人間金鼎頻移風塵不染素羅衣脉脉倚柴扉桃根桃葉争春媚儘敎他濃抹胭脂老我揚州何遜壠頭誰為題詩沁園春脫屦紅塵移在碧山娑羅樹邊有兩兒冠帶眼前騰踏諸孫文采膝下聨翩石几㷊香氷甌滌筆重註羲經得異傳餘無事但觀雲默坐聼雨髙眠龜巢幸與相連飲湖水清如飲菊泉問絳人甲子今四百皇家鍾乳何用三千銀艾忘情玉枝無汗一味清閑足引年昇平也看天恩賜帛雪髪垂肩金縷衣袁叔度新居卜宅椒園裡響丁丁風斤月斧杏梁飛起􅑵户青紅烟樹緑焜燿碧山隣里雞共犬也知輪羙燕子飛来堂下舞砧輕盈掌上人堪喜更可愛新桃李長洲水接淞江水好秋風鱸魚蓴菜葑田菰采艶屋神仙羅綺楚舞吳歌娯晩景肉臺盤春筍奉甘㫖五馬貴未足擬西江月老大無人青眼凄凉奈爾黃花秋来杯酌㫁流霞兀對青山如畵梦裡去尋東老覺来欲喚西家山童若説未能賖報道點茶来也風入松青龍地暖土酥香産玉似崑岡可憐不入瑶池宴到氷壺風味凄凉忽憶故園時序春盤春酒羔羊青絲生菜韮芽黄銀􅍢染紅霜桃花人面柔荑手酒㣲酣犀箸頻将鞍鼓一聲驚散六年地老天荒西江月緑樹雲林窈窕青苔石磴萦紆兩人林下曵長𥚑應是山中巢許空谷似聞樵斧危橋不渡徴車誰来為我借茅廬来與白雲同住南郷子四野接平蕪一曲清溪似畵圗燕子日長溪舘静菰蒲風洒軒􅑵暑氣無林叟話樵蘇相送東橋日巳晡啼鳥不知人禁酒葫蘆敎我那處沽摸魚子早春作看東風桞摇金縷精神頓羙如許獨憐老我雙蓬髩無復少年張緒桃葉渡任山水清妍可奈非吾土借人茅屋但有客相過清茶淡話間與論今古傷心處客去卧聼鼙皷看花渾在烟霧姑蘇臺榭笙歌散麋鹿又如前度誰恁悮敎無限蒼生命堕顛厓苦蒹葭洲渚頼有箇扁舟三竿釣竹相伴閑鷗鷺水調歌韵中秋言懐戦骨縞如雪月色淡中秋照我三千白髪都是亂離愁猶喜淞江西畔張緒門前楊桞堪係釣舟有酒適間情何用上南楼擐金甲馳鉄馬任封侯青鞋布襪且将吾道付滄洲老桂秋香未了明日明年重看此曲為誰謳長揖二三子煩為覓菟裘憶王孫銅駝淚􅊜翠苔茵落地花如堕玉人可是東君不惜春問花孫海變桑田㡬度新齊雲一炬起紅烟頃刻烟銷事巳遷折㦸沉沙月爛然船問祈連安得河清億萬年水調歌韵秋色净如洗南極瑞光多秦柱山中隐者弧矢掛烟蘿野老𫾣門看竹珍重主人留客呼酒㵼金荷為問春秋多少笑道明年六十勲業蹉跎萬羊禄千駟馬待如何洛陽城市又看荆棘卧銅駝且喜堦庭玉樹五色鵷雛俱好把此琴瑟和一曲華胥引雙鬂雪兒歌洪武九年秋余卜居干墩嘗作水調歌今也人事乖違欲還故土故𣸪和前韵以述其情并以留别吳下諸友時十三年六月𥘉也牙齒豁来乆老氣尚横秋買得歸耕黄犢兒軰幸無愁相近六龍城下只在三家村裡結屋如小舟倚樹覧山色且免賦登楼看官爵都不似醉鄊侯里翁閒話便同學士坐瀛洲寄語東吳朋友乗興能来滆浦􅋈舟聼漁謳無酒不湏慮觧我破貂裘滿庭芳塵拂風生薰爐烟梟劇談天上人間馮夷擊皷白鳯舞崑山驚倒五陵年少聼三老口角鳴湍江南好梅前菊後天氣帯㣲寒客来雖話别重歌舊曲不是陽関笑閒雲似我時去時還最喜烽烟盡熄青天净一鏡團團重来也尋盟鷗鷺訪竹問平安點絳唇𥘉度作七十年前抱麟虛負雙親夢一襟空洞生世曽何用老我東門瓜也無心去種松醪甕㵼如鉛汞時與漁樵共海上歸来鬂毛枯似經霜草薄田些少茒屋園池小三子犁鉏三婦供蘋藻村居好兎園遺藁是我傳家寳弧矢虚懸舉杯聊適棲遲意明朝冬至有酒還沉醉堪笑神仙要作長生計人間世金烏西墜難把長䋲繫老眼猶明著書未了餘生債客来休怪淡飯黄虀菜踏雪觀梅清興依然在南門外夜来尋戴扶醉䭾驢背點檢龜巢素琴絃㫁餘何有夫妻白首相敬如賔友三四兒孫五色斑斕䄂梅花酒為翁稱夀羅拜爺娘後沁園春時問黄花過了重陽如何始開為客中陶令逢他𥘉度尊前杜舉要我相陪十日秋香百年晚景一笑今朝酒莫推風光好正凉生沆瀣净洗氛埃胸中華嶽崔嵬下筆處長江滾滾来且折花簮帽劇談清事傳盃看劍聊適幽懷健翮低雲修鱗蹭蹬人道公非百里才還知否那黄河清也白日悠㢤水調歌頭六載逺相憶一日似三秋别後雪添蓬髩著述遣窮愁㡬度欲尋安道溪上片帆飛去興盡復回舟明月出東海隐躍見瓊楼喚龍伯擊鱓皷舞陽侯何時盃酒重歌蘆葉舊汀洲多謝寄来雙鯉白雪陽春𢾗曲為我和巴謳什襲付兒軰好學製弓裘南樓令夀陳縣丞赤手拔鯨牙長安早看花春風百里裛桒麻栁色宮𫀆銀束帶親受賜玉泉家鱓皷報朝衙桒弓掛緑蛇拜雙親盃捧流霞只恐哦松哦未了天上去又乗槎八聲甘州為友人贈醫士喚嫦娥白兎下蟾宫玉杵搗玄霜自㷊蘭古鼎心融靈素黙契岐黄不假殘膏賸馥時俗共傳方用我上池水遍洗膏肓家住六龍城裡有舊家風月三徑蒼莨更一林新種紅杏㬉生香問年来活人多少輾然㣲笑説㝷常誰能為冩成佳傳汗竹流芳滿庭芳夏五雨􅑵言懷十里橫山一湾流水東洲蕞尔孤村移来田舍山水對衡門老我無能為矣犁鉏事付與兒孫湖田上黄梅雨足蛙鼓聲喧親朋三四老鬚眉雪白言笑春温每擕手相過清事閑論坐把山光水色茅柴酒傾倒匏樽章臺路馬啼塵土不到紫苔痕又和寄江叔亷雞犬相聞溪山如畵梅花只在前村逍遥杖履不過翟公門前度春風巳老對芳草還憶王孫長安市看花人去車馬争喧向来東海上水南水北如石如温念鷗冷詩盟何日重論老我蓬蒿三徑開懷抱頼有琴樽公知否蕭齋雨漏四壁篆書痕菩薩蠻七夕作鋒稜磨盡方藏老懷羞對天孫説風葉動清商依稀似九章飄蕭雙鬂雪卧看湾湾月月缺有時圎人無再少年水調歌頭再和前韵青白阮生眼皮裡有陽秋誰信近来懐抱汨汨泥窮愁昨夜僧房聼雨如在瀟湘夜泊欹枕卧孤舟無復少年日觧佩醉秦楼更休説爛羊尉爛羊侯三山湖上如今田舍住東洲傾洞十年金革蓬勃一襟塵土白雪向誰謳濯足傍雲水披我老羊裘水調歌頭代陳氏謝徐彦銘玉杵搗靈藥丹鼎養芙蓉城市山林小隐家住驛橋東况是南州髙裔更飲上池真液氷雪烱心胸醫國手𥘉試在處起疲癃種隂徳方寸地繼頥翁活人多少滿林新植杏花紅遮莫南山石爛又復瀛洲水淺都付笑談中刮目看塵表黃鵠駕天風沁園春寄張希尹兼簡劉小齋張熈載憶昨秋風送書畵舡過楊栁洲把錦嚢傾倒燈花共喜棹歌歸去詩草仍留坐榻髙懸家童偶語此客㝷常頗見不襟懷好比子猷尋戴别様風流别来一日似三秋且喜花時可勝逰要㝷山問水春申故國賦詩釃酒季子髙丘醉㡌簮花吟茵藉草莫笑踈狂老未休同来也有堂前舊燕江上盟鷗點絳唇徃古来今何人不道閑居好忙多閑少應𬒳青山笑蒲柳衰顔我獨驚秋早茅齋小㡬番掀倒風雨都􅊜了風入松孤舟浪打石尤風霹靂浪聲中布帆喜得歸無恙繫長橋閑似漁蓬蛟渚如今寂寂鷗波依舊溶溶秋花開到雁来紅金菊對芙蓉一襟磊磈都澆去飲紅灰如飲黄封睡到日髙三丈從他衙皷逢逢點絳唇彩翼雙鳬寄来一幅天機錦純綿絶品将意何勤恁歳晚空山不怕氷霜凛西風緊便添𫀆緼𬒳徳吾無隐八聲甘州記年時東走避風塵隨處覓桃源偶相逢一笑堠山西畔喬木参天百尺元龍楼上下榻許髙眠鼓我匏巴瑟魚鳥欣然每日春風池舘有竹林諸阮醉䄂聫翩要簮花捧研常挾兩飛仙又安知桒田變海竟飄零老去雪盈顛綈𫀆外故人餘意肝胆雕鐫滿庭芳三闋神仙有無安居華屋即是蓬壺榴花也學紅裙舞燕雀相呼水晶盤饌供麟脯珊瑚鈎簾捲蝦鬚吹龍笛擊鼍皷年年𥘉度長日盡歡娛風流醉翁𥚹舞䄂窈窕歌童琵琶要與知音共換羽移宮玉蓮盃将酒供金蔗盌歸厨凍歡聲哄年年醉中岸幘藕花風横山翠屏藏龍古井走馬長汀四時花竹多風景勝似丹青好兒郎天生寕馨好時節日見昇平氛埃净年年夀星光照望雲亭水龍吟舊家金谷園林盡随海變桒田了一湾流水一林脩竹菟裘将老瀟洒軒􅑵波光隐映筆床茶灶但谿無六逸林無諸阮相與論懷抱不用滄洲洗耳聼風前此君清嘯黃金臺上儘敎塵士騁車争道魚鳥情親漁樵邂逅不時談笑看古来行路難行真個是閑居好賀勝朝吳淞舊雨相隣住喜復来今雨那時因遇十年艱險劍頭炊黍滿江紅舊約尋梅蹉跎過小春時節忽隴頭人至一枝先折喜見春風顔色好縞衣不受緇塵湼把十年湖海舊相知從頭説三江上滄洲雪千墩下珠林月似許詢支遁搃皆清絶重看青山携素手此情方觧相思結待漏湖水泮栁風輕孤舟發沁園春笠澤東頭翠竹漁荘滄洲釣舡看三江雲浪烟波如畵一篷風月隨處留連巨口鱸魚團臍螃蟹坐飲蓬􅑵醉即眠蒹葭畔不收笭箵意若忘筌向来四海戈鋋好戦艦都成赤壁烟笑痴兒航海空尋蓬島漁郎失路漫說桃源鷗社盟寒歌烟水寥寥𢾗百年玄真子有家傳舊曲重扣吾舷鵲橋仙青年去了青衫破了舊日青氊無了一時清興未能除説與故人知道春花春好秋花秋好每日看花尤好人生沽酒買花錢消得杖頭多少一剪梅崑岡火烈去年時玉也灰飛石也灰飛鶴長鳬短搃休題善有天知悪有天知今年快活保妻兒歌也相宜舞也相宜揮金如土醉如泥休負佳期莫負佳期又東風吹醒老梅枝南也芳菲北也芳菲月明半夜五更時笛也争吹角也争吹青松澗􅔄獨離竒寒也誰知暖也誰知老夫聊為一歔欷梅也題詩松也題詩又一天和氣盎春暉桃也芳菲李也芳菲若敎風打雨淋漓紅也塵泥白也塵泥花前把酒挿花枝欹也相宜舞也相宜鶴長鳬短搃休提長也天知短也天知江城子去年今日㵼天瓢水滔滔㫁藍橋阻我羣仙鵉鶴赴蟠桃獨有商羊偏喜雨跳且舞上山椒今年南極見丹霄射金蕉瑞光摇澆去胸中磊塊儘酕醄莫厭琵琶弹舊曲長聼取鬰輪𫀆龜巢藁卷之十一終, WYG: ''}
