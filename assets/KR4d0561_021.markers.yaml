  - {type: variant, offset: 5348, length: 7, content: 兵作干四一前一, WYG: 蛇無横道虎入窟隱然若有神撝訶入吳首謁三讓廟感古傷今發長嘯三髙祠下斥䲭夷豆籩忍覩吳為沼雲門先生鐵笛老傾盖相知皆絶倒老性尚存薑桂辣不随蒲栁秋風掃}
