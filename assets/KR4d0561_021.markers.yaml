  - {type: variant, offset: 4899, length: 0, content: '', WYG: 正勝百邪昔賢同不朽題打毬圖擊鞠流風自李唐官家占作狀元郎科塲廢盡毬塲在芳草萋萋幾夕陽清明後一日邂逅薦福寺長老源公話舊論詩意甚相得明日作此詩代簡貧如南阮甘投老喜得西枝近贊公白足有僧聽説法江梅無閣坐觀空詩成芳草斜陽外道在殘山剰水中一笑相忘今古意清明時節舞雩風沈徳麟母哀詞怪底吳霜二月繁一朝摧折北堂蘐母儀表表真堪畫吾軰區區豈易言斷織機中多教子分甘膝下並呼孫慈顔最有難忘處獨倚蒼茫日暮門洪武丁卯年詣烈塘祖墳祭掃恐朝暮即世子孫不知所葬者為誰且追念墓松在昔為邑里諸宰木之冠感愴寫情并圖葬穴以示兩子及孫使識之以永其孝思其詩曰百年兩度桑田變三世十年蒿里同華表前時曾駐鶴長松何日再蟠龍情鍾寒食蘋蘩外淚灑}
