  - {type: variant, offset: 4903, length: 0, content: '', WYG: 再植以寓思賢之意况有周鍊師為松菊主者乎率爾口占呈乞諸搢紳先生更唱迭和相與贊成亦庻乎厚風俗云憶年十五六好古尊前賢初聞獨孤檜快覩曾争先蒼然一株枿舊根皴皮錯節枝葉蕃適逢夜雨半身濕疑是徃年甘露痕孔明廟前柏相似乃在陳司徒廟之後園鄉來陵谷忽變改化}
  - {type: page-break, offset: 4903, content: '', id: KR4d0561_WYG_017-48b, image: WYG1218/WYG1218-0427b.png}
  - {type: variant, offset: 4904, length: 0, content: '', WYG: 刼灰飛入海神焦鬼爛救不得桐鄉自此無光彩幸存一曲闌干石題公姓氏留遺跡石苔斕斑土花碧相伴銅駝卧荆棘余從海上避兵歸幾度摩挲長太息懐哉古之人好賢意無窮詠甘棠愛召伯賦菉竹美武公憲公此樹堪比隆後人寧不仰髙風𤣥都道士桃千樹一檜區區豈難措龍鍾野老及羣英亦愧因循坐遲暮檜乎檜乎重培植風枝相樛霜幹直邦人具曕仰遺徳見樹猶如見顔色六百二十五年如一日題牽牛圖為丁學古作不放桃林不飲池叶唐何切牧兒牽去意如何南山石爛今非昔寗戚無勞扣角歌題鷺鷥便面為丁學古作潦倒滄洲客蕭騷白鷺詩牧之呼不起此意少人知出門老去多懐舊興來時坐馳出門窮鬼笑罄室故人知野飯新菰米詩囊古竹枝諸孫溪上别矻矻問歸期題僧綱澹泊軒我愛澹泊軒山居城市中雲分半間許雨溜四壁同風林金石聲道人氷雪容澹然味無味泊然空不空露坐㸃頭石雪立摩頂松吾徒幸相與吾道喜不窮一笑兩忘言落花舞回風江山漁樂圖數口妻兒網一張船為家舎水為鄉江南江北山如畫欵乃聲中送夕陽崑山王有恒以書附常州天寧寺長老寶公問予近况作詩答之并索諸友賦重植獨孤檜詩客從笠澤來常郡書到横山問老夫哭子哭孫家已破賣書賣劍酒還沽千墩每入龜巢夢十月應開獸炭爐支許舊遊煩寄語肯題唐檜和巴歈黄林屋許贈皂布巾不至戲作此索之霜倒蓮葉巢老龜寒縮首欲裹緇布巾并裹瓦盆酒此酒今已熟此巾曾製否抱膝梁父吟炙背坐南牖老况知音誰横林隱居叟贈天寧寶滄海臨濟雲仍幾代孫猊牀說法象龍奔庭前銀杏西來意陌上銅駝東郭門四海共霑新雨露一舟能泝古淵源留衣人逺衣何在别有伽黎遺後昆悼城西周彦美二首七十六年事梨花夢裏春家傳三代禮身作兩朝人負郭田園樂連雲第宅新闕麒麟二三槐堂上客闕最青春吐酒常憐我奕棋多勝人闕竟作白頭新釃酒橋𤣥墓澘然為泣麟寄饒州鄱陽縣唐生千七百里鄱陽縣外孫書來如見面九十三歲龜巢翁中宵夢得重縫線詩瓢山人來上游吾將結社招馴鷗延陵昔日繼三讓野水何處無孤舟貧家幸爾年榖熟買書教兒耕且讀梅花無恙竹平安歲晚無勞念窮谷和舒文允見貽冬至經旬久朋來喜踐長市沽雙木榼踞坐一藜牀小酌成歡洽閑愁付杳茫山無白石爛谷有紫芝香澹泊聊相與辛酸已備嘗盡消湖海氣莫放斗牛光所貴心能直何慚貌不颺聽冰狐自惑吠雪犬何狂歲晚鷗盟在生平蟻夢忘酒堪澆磊塊袖莫舞郎當西崦黄茅嶺東洲白水鄉漁樵同此樂吹笛送斜陽夏五訪一舟禪師臨别立銀杏隂中謂予曰山中舊物什䘮八九唯此木幸無恙也宜蒙品題為天寧勝槩使居山者亦預有餘光余謝不敏然心嘗許之故兹口占以頌人物具并之美一箇虚舟渾不繋千鈞重負力能任金園地湧靈光殿銀杏天生䨇樹林佛印衲裙坡老帶昌黎詩句穎師琴禪林勝事無今古况爾庭前好緑隂輓曹子毅大使早歲輕肥試采榮一官三載繋塵纓解龜便作幽棲計𤓰圃東門學邵平二桂子初生折媆枝青氊舊物遂陵夷竹林小阮親調饍何異慈烏返哺兒三生來不鑿混沌竅此去竟作逍遥遊回頭一笑看鷸蚌未到釡鬵誰肯休洞庭胡敬之以予父執之交歲饋新橘凡十有餘年感無以報是用作歌湖山清氣鍾而翁生兒亦有古人風年年送橘拜牀下}
