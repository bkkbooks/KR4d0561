  - {type: variant, offset: 4788, length: 1, content: 音, WYG: 夀任義甫十月初十日曾看滄海變桑田又厯黄楊厄閏年抱膝面山西牖下科頭背日午簷前中郎有女能傳業僕射無兒不怨天八十春秋䨇足健鄉人喚}
