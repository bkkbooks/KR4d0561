  - {type: variant, offset: 4656, length: 1, content: 五, WYG: 詩三百篇長在手尚將古䟽補蟲魚復以今文挍蝌蚪門前小溪流水清畧彴不通車馬行漁童甕汲供茗盌鷗沙席坐尋詩盟才多轉覺讀書好春雨庭生書帶草時稱狂客醉鄉遊罔俾四明專賀老題畫魚圖魚在在藻或在淵随波泳遊同一天會得莊生濠上意畫圖詩史總難傳題畫竹顧挺之子作父作子述為竹傳神筆意古澹靈犀絶塵品題者誰龜巢老人題雪竹圖此君立雪清復清老夫見之䨇眼明琅玕恐折驚棲鳳三嘯虎頭風欲生絶句二首寫延福山中客况寄止菴長老一榻清風偶借眠白雲長遶枕頭邊客來題遍芭蕉葉我亦留詩謝老禪二風幡交動曙光揺蔬筍分甘到客寮最喜松聲秋瑟瑟月餘忘肉似聞韶一般春希夷古髙士詩言一般春以詩謚攸居夫豈尋常人一般春意何在莊生論天倪託物肆迂怪列子説混淪其言極夸大老夫請以理折衷慎勿謂我胡公之中庸古今先後無始終洪纎髙下俱流通芸芸萬物生意遂盎盎兩間和氣充鶯鶯燕燕妙歌舞花花草草紛青紅孤松或落幽澗底三秀多生糞壤中歩伸尺蠖天運轉户啓百蟄雷音同鶴長鳬短頸分一敢以私意窺神工一般春意如此朱絃嶧桐奏流水洋洋}
