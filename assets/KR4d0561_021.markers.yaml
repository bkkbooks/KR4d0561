  - {type: variant, offset: 5189, length: 0, content: '', WYG: 得一窩安樂比前修家庭惡有司晨牝江海憐無結社鷗我子我孫宜克念莫將肝膽作仇讐又自述同示搰搰劬書覬有成區區没世恥無名七情欲斷氣未斷兩目欲盲心未盲白練製裙蠅㸃汚青燈照榻䑕縱横家聲掃地綱常在未許兒曹學倒行祭禰忌日詩投老龍鍾日思親長飬時羣咻憎陋俗四逺擇名師夢有生花筆才非脫頴錐庭闈歸定省翰墨作遊嬉隣舍三元日桃符七字詩柏臺驄馬過茅㧞鶚書馳氣色生逢掖光華照扊扅亨衢雖不到大道頗能知􅓺舍氊分坐儒冠廪稍糜中年逢世變濱海避時危骨肉能相保肝腸罔有私尚蒙先子澤不受外人欺栗里歸來廢横山卜築遲頽然窮谷叟援乃落巢兒子愛非姑息孫謀有厥貽牝雞良可惡烏飬本相宜昔怨何三失今逢此百罹雙親應念我鑒此蓼莪悲雲林書舎為徐孟容作東家領軍鞋一屋西家買妓傾珠玉寂寞南州髙士孫燈火小牕書夜讀羲皇畫卦龍負圖蝌蚪此時無簡牘神農本草軒岐語為是傳家先爛熟唐虞三代二千載六經聖賢常在目牙籖挿架日益多蔗境漸佳心未足便便腹笥貯琅玕齒頰霏霏吐珠玉鍾期骨冷呼不醒誰復賞音聽此曲青林不著軟紅塵祗許白雲簷下宿雲乎雲乎知不知封胡羯末森如竹白眉之良衆所稱能繩祖父棲幽谷清河有頌泰階平應著先鞭駕黄鵠賀潤天澤住持保寧寺横林之北横山西孤村流水古招提青苔一徑童不掃白雲半間人共棲松枝甘露落麈尾桂子香風吹麝臍我來欲問㸃頭石道價孰與生公齊南宗僧綱和尚唐允明吟友倡和見贈支許久不作緇林景清徳適見雙南金褒嘉詎容黙新詩倡且和字字皆悃愊挹此沆瀣秋注兹雲夢臆大道本平平中庭宜殖殖九品蓮花臺毋庸論西域豆腐詩并序凡人年老者以肉飬之古今一致然老而無齒則肉林之盛禁臠之供其如朶頥何求其甘輭若豆腐者真可謂飬老之善物也但名物不著乎六籍品第不列於八珍鐘鼎之家咸藐視之比予過僧房學舎連得食其佳者嘆賞不足發於咏歌是猶為冰壺先生作傳也博物君子宜蒙品題吾言固無足取重於人庻不為嚇腐䑕於鵷雛者耳誰授淮南玉食方南山種玉選青黄工夫磨轉天機熟粗滓囊傾雪汁香軟比牛酥便老齒甜於蜂蜜潤枯腸當年柱史如知味飲乳何須窈窕娘唐允明以吾孫垣自成都府巖洲衛公差過常鎮等府因得覲省賦詩見貽有情兼悲喜之句可為知我者矣次韻示垣并謝允明數千里外公家}
