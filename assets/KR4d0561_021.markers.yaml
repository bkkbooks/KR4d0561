  - {type: variant, offset: 4375, length: 3, content: 宋校薄, WYG: 鬛封添得烏銜土頽碑扶起龜趺石先生九京知不知名在人間益輝赫孔北海文潞公今人古人將無同青天髙髙不可問白楊為我呌西風題夜潮圖昔余夜醉錢塘酒看潮八月中秋後銀山湧出海門來潮聲殷若雷霆吼此圖之}
