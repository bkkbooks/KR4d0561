  - {type: variant, offset: 4485, length: 0, content: '', WYG: 復年百篇蝌蚪自為寶三足蟾蜍誰與憐目光爛爛走金電口角泠泠飛玉泉老我東家園册尚分隣燭教曾𤣥題村田樂圖老人村老瓦盆常}
  - {type: variant, offset: 4486, length: 2, content: 草豊, WYG: 雞豚社不識州縣門阿翁醉倒阿婆笑膝上吚鴉弄乳孫六月八日得次子書并書久旱髙田未秧是夕連雨三日喜而和之新鄭書來劍井邊方將隂石捶荆鞭雷霆夜作三更雨江海寒生六月天不惜空囊沽緑螘從教破屋濕青氊北窓風響蕭蕭竹如聽南薫奏五絃去冬送鄭教諭如京詩為天寧聰公沉滯至今年六月轉託發還故作此并元詩寄鄭一詩代折送行栁半年竟墮無何鄉祗因沽酒謝不敏尚謂道術能相忘髙堂談經多士集澄江濯纓清晝長為問襄陽兩耆舊歌鳳曾無説楚狂寄謝楊純夫兼簡陳髙士客來飲客北海樽客去送客東城門不嫌褦襶留信宿各出肺肝聆話言三日雨救赤地旱百川水作黄河奔賦詩為别并志喜兼簡太邱賢祖孫聞袁子英著書作詩寄之我所思兮耕學翁壯年氣欲吞白虹眼看陵谷一變改此心乃與寒灰同硯田筆耒耨經史不稼不穡勤於農我哀民彞失所飬錫類且欲來羣蒙共惟元聖筆六籍為世大法垂無窮楊墨溺人甚洪水孟氏距之成禹功秦以申商漢黄老六朝接跡論虚空緇黄愈出愈荒誕冠冕鞠躬趨下風韓歐間生數百載鳳鳴朝陽羣羽從中間洛閩繼洙泗卓彼二子能折衝雄詞至今凛生氣宜從孔道追遺蹤東將入海乗艨艟長江大河無遏壅老夫獨恨䨇眼矇不與觀日扶桑東贈衡隠居我昔母年垂九十帶經犂鉏粗供給伊今有母八十餘孝飬之聲動鄉邑堂}
