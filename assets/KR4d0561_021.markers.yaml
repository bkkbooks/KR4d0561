  - {type: variant, offset: 5280, length: 0, content: '', WYG: 久老夫平生愛蕭爽一笑相逢敢多口山靈望子早歸來相伴雲林猿鶴友朝餐青霞夕沆瀣攬翠軒中可兼取何異商時茹芝叟王有恒以詩留别其詩有鶯花催老淚之句予乃效唐人和意而不和韻送其行解其悲兼簡吳中行心友丈夫不灑離别淚杯酒堪澆磊塊胸勛業連年雙髩雪歸舟此日一帆風身居􅅵畆宜為樂腹有詩書未是窮寄語雲間吳處士好將安信慰盲翁苕溪獨釣圖吳興山水清且妍苕溪之名天下傳鷗鳬相伴一釣者風雨不歸}
