  - {type: variant, offset: 5480, length: 1, content: 曾, WYG: 澹而不厭知者誰中庸君子古來稀腐兮腐兮能飬老濟世之功不為小淮南此術昔未傳食貨志中斯闕然前時雍公賛三徳吾亦題詩三太息易名今號素醍醐諸庖易牙僉曰都次韻荅臧尚廸先生見贈延陵野唱風吹去曲誤誰知顧且聽湖海卧遊春晝靜一簾花雨集中庭二生兒喜有凌雲志補屋能牽帶雨蘿春水自流魚自樂笑人濠上說無何又荅毛伯尚白石南山無復爛朱絃流水正堪聽斗城東北柴桑里書屋三間草一庭二嘉木天生古橋梓故山月照舊藤蘿壽觥頻捧梨花酒莫問東欄事若何憶昔行憶昔父子生别離濠梁流血人正苦一聲哭斷九廻腸化}
