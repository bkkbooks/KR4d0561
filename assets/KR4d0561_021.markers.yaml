  - {type: variant, offset: 5428, length: 0, content: '', WYG: 李漢掇拾無遺珠嗟予經鉏付中子書田未熟身先萎孫枝一剪一飄零戎服西川八千里阿翁倀倀無所之况聞路難多蒺藜閉門縮首如凍龜堕甑不顧從人嗤大兒力田供菽水小兒蒸嘗伯為禰此身幸無寒與饑祗欲全歸未能爾每憶梁溪邂逅時買花載酒留人嬉元龍豪氣除未盡傷春猶賦杜鵑詩一别十年今若此此去浮生知}
  - {type: variant, offset: 5429, length: 2, content: 恤字, WYG: 幾車輪從教生四角是非毋勞辨三耳峩峩陽山煙樹緑皎皎白駒在空谷太湖流水清於玉雲影天光常在目焦桐絃斷麟膠續彈我風雩詠歸曲詩筒不時頻徃復要見珠璣咳唾琅玕腹彼此相看如鮑叔和鄒士文與陳子莊㑹飲不談黄老不談僧不憶鱸魚似季鷹行到故人清絶處今人能有幾人曾水獺氊帽代曹元度作蠻溪水獺雪毛氊帽屋蒙戎載渾天濡首墨池頻脫去不妨草聖繼張顛林塘幽為鄒士文賦林塘幽在何許梁溪之東}
