  - {type: variant, offset: 5405, length: 3, content: 王校花, WYG: 老我穴藏龜幸爾餘生際盛時九土方輿歸禹貢三農風物在豳詩蝸粘壁上涎何竭草出山中志不移獨有緇黄畏覊束遷居城郭半攅睂周可大新充糧長千里長江萬斛船飛芻輓粟上青天田家歲晚柴門閉熟讀天朝大誥編二租吏毋勞夜打門桃源風景烈塘村好將擊壤歌中意寫}
  - {type: page-break, offset: 5405, content: '', id: KR4d0561_WYG_017-92b, image: WYG1218/WYG1218-0449b.png}
  - {type: variant, offset: 5409, length: 2, content: 芲當, WYG: 丹青獻至尊初度言懐并序昔人以大塊勞我以生佚以老息以死令吾勞且佚者三萬餘日息之宜矣天教兩目電無光百物無勞覻短長大塊今朝能息我奚奴便}
  - {type: page-break, offset: 5409, content: '', id: KR4d0561_WYG_017-93a, image: WYG1218/WYG1218-0449c.png}
