  - {type: variant, offset: 5533, length: 5, content: 侯宋校云朱, WYG: 林隠居收書散黄金長洲同姓今好古散金收書同厥心老夫書痴年近百尚欲傍蒐二三策客來説項似楊源又說識韓如李白孫枝璀璨珊瑚樹襟度汪洋雲夢澤區區瓣香客懐去借書數篇謄竹素髙人若問欲何為欲使迷途人快覩天倫道在科斗編朝聞夕死勝登仙譬若丹梯借我升華顛秘籍移來鄉井傳饑渇可療疾可痊藕絲織縑顔色鮮孤寒總得衣褊􅝆客歸為我謝一言隂徳濟人知者天寄呈崑山縣學訓導崑山學舎玉峰前玉氣氤氲暖坐氊弦誦聲中和樂意浴沂童冠莫春天二一株銀杏倚齋廬長夏清風喜穆如試問西湖林處士梅花誰與歲寒居三鄴架牙籖古典多桑公鐵硯少年磨借書莫笑人痴絶矻矻編蒲老薜蘿屯田歌衣布襦食菑畬服勤犂與鉏三餘渉獵兵農書惜居諸範馳驅秋風渥洼千里駒時來躡雲衢道旁語盲翁坐南簷炙背日將午兩耳未全聾猶聞道旁語一言賢郡守愛民若慈父一言江隂丞心若秦鏡古鮑老}
