  - {type: variant, offset: 4483, length: 1, content: 豊, WYG: 亦有飽眠犢豈無敗羣者其藩或輕觸約之鞭用蒲所履繼前躅致身將青雲岳牧聫佩玉佐主牧天下庻類頼蕃育雲牧懋厥功吾言此芹曝王叔明雲峰圖王郎多學畫最工筆法似舅松雪翁松雪之書妙天下以書為畫妙亦同想當灑墨成雲峰豪氣壓倒陳元龍層巔崒嵂摩蒼穹咫尺可論千萬重嵐光翠滴天無風若有微籟鳴杉松於乎此時此畫復誰有我為此甥懐此舅秋林讀書圖春風不著長安鞭秋林讀書}
