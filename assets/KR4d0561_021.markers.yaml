  - {type: variant, offset: 4673, length: 2, content: 二前, WYG: 歌兮三太息歌聲未斷還相憶次韻答子才去秋見寄子才名朴上海縣石浦人懐哉博物張茂先淞江太湖煙水連舊藏篇翰合䨇璧新發光熖驚四筵鞠華不濕重陽雨汗竹應書大有年教子}
