  - {type: page-break, offset: 26, content: '', id: KR4d0561_WYG_015-72b, image: WYG1218/WYG1218-0367b.png}
  - {type: variant, offset: 27, length: 0, content: '', WYG: 其子之械以械之他如姻舊及凡與之逰者顛則扶之危則持之若是者又不可一二數但惜乎負竒崛之氣時不見用終於此而已於乎吾彦實之死可不為之哀乎然而象賢有人君又能擇其最肖似者為仲氏之後使先世之業並立弗墜則彦實之死猶}
  - {type: variant, offset: 28, length: 84, content: 錫贈何敬存一題六前九陪遊姜公墩下脫次韵贈虛中講主一題十九後三贈應孟恭碧桃下脫老況一題二三後七寄源別流下脫悼徐孟銘一題二五後九遣悶下脫聽雨一題二八前五元日早起下脫訪王景逸, WYG: 死也奚哀為雖然哀者人情也禮曰哭死而哀非為生者也予與君素相知而氣質且相類狐兔之悲疇克自己故為之辭以冩其哀云天胡為兮生楩楠構大厦兮無不堪匠石}
