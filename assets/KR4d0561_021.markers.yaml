  - {type: variant, offset: 4683, length: 2, content: 六後, WYG: 百隣送杯羮物九盤最喜呌囂聲不到來朝雞犬得平安題松溪釣魚圖看花不躍長安馬濯髪滄洲結鷗社千巖萬壑一絲風豈是尋常釣漁者月滿舡水滿川月在水中光不濕人於舡上坐青天魚乎魚乎自悠然只今吾亦忘吾筌林大菴主真公徃宜興參宏辨禪師回途跌傷其膝卧疾久之作此問訊石頭路上悟𤣥機跌破泥丸一笑歸從此不須盤膝坐卧看來徃白雲飛天界藏主銘祖心歸常州府䕶國院信至龜巢作此代簡偶著青鞋出薜蘿竟參白足坐盤陀龍蟠虎踞江山好燕去鴻來歲月多言别石城歸舊隠笑將塼鏡為重磨松枝東長煙霞喜我亦滄洲舞釣蓑題髙士觀松圖賢哉陶元亮休官撫孤松之人坐松隂髙興將無同楚楚煙霞裾澹然冰雪容安知洛陽道車馬正憧憧尹泰春玉峰舊隐圖春風夢破邯鄲枕三徑歸來掃白雲藏壁家書還自讀排衙縣鼓不相聞内交林壑蒼髯叟比徳冰霜抱節君熱客不來心似水滿庭空醉落紛紛王仲昭挽歌詞千墩之隂湓浦曲鬱鬱葱葱煙樹緑五陵豪氣適消亡此地人稱小金谷中有琅玕玉一株枝葉扶踈鸞鳳宿鵂鶹夜飛枝上啼九頭血汚玲瓏玉飛廉怒從天上來東走扶桑西若木掃除妖物靡孑遺玉株亦㧞移荒服八千里外雲南地煙瘴偏方魑魅俗道經}
