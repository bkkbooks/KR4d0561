  - {type: indent, offset: 8, content: 　, id: KR4d0561_krp_021-bkkind3}
  - {type: variant, offset: 8, length: 2, content: 葉次, WYG: 癸亥二月初九日孝孫某敢昭告於祖考妣伯父母祖父母父母從父母九位尊靈曰墓祭本非禮欲子孫於雨露之春不忘厥祖從俗祭掃以寓孝思尚冀遺澤使後人繼繼繩繩有永弗替謹以清酌庶羞祗薦歲事謹告謝莊曾祖墳上築墻祭奠祝文維年月日孝曾孫某以目昬不能逺去躬拜墓下謹遣𤣥孫某等代}
  - {type: page-break, offset: 8, content: '', id: KR4d0561_WYG_015-70b, image: WYG1218/WYG1218-0366b.png}
  - {type: indent, offset: 10, content: 　, id: KR4d0561_krp_021-bkkind4}
  - {type: variant, offset: 11, length: 1, content: 次, WYG: 敬昭告於曾祖考妣二位之靈曰人}
  - {type: indent, offset: 12, content: 　, id: KR4d0561_krp_021-bkkind5}
  - {type: variant, offset: 13, length: 9, content: 書王宋校本目錄三前, WYG: 乎祖極恩如天祖世雖逺天不可忘睠茲故土殯宫猶存繚以周垣以禦樵牧清明省掃歲修祀事尚祈埀裕悠逺無斁謹告寒食祭妻墓祝文余生與細君偕老君年七十有}
  - {type: indent, offset: 14, content: 　, id: KR4d0561_krp_021-bkkind6}
