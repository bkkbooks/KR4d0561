  - {type: variant, offset: 4639, length: 0, content: '', WYG: 背血淋漓遭捶楚囊無一錢供百需肥腯豚如買烏牯手傾麥斛比珠斛剜肉成瘡誰為補胥常大嚼過屠門今乃閭閻刲鷺股吾聞此語三歎息郡邑安知弊如許祠官稽古埀令典穆穆緝熙由聖主聖心寛仁重民食三年兩度蠲租賦天生感孚和氣洽曰暘而暘雨而雨報功於龍歲有祭禮若迎猫恩更溥龍兮龍兮知不知如此嗟來食應吐皇恩蠲租詩洪武庚申天下秋糧欽蒙全免今年壬戌秋糧夏税又皆免徴征繇聖恩寛大亘古無比故耕稼之民歌謡滿野而某則併以區區所聞者書之漢紀蠲租半遷書汗竹奇大哉今聖主全以惠羣黎量與乾坤合恩同雨露埀豐年魚有夢丹詔鳳重施庻富民生遂敦寛俗習移㣲甿皆鼓腹窮士亦揚眉往制成均法新頒釋奠儀雅音諧律吕名教浹華夷茅茹今朝㧞英髦靡一遺八荒仁夀域萬世太平基水有清河日山無爛石時時雍民皥皥年耄我蚩蚩不作輸芒蟹真成曳尾龜倚牆歌此曲擊壤付吾兒林在新鄭縣學六月公文來取其子塏視疾七月初四日塏言别而行付家信外寫此一聞汝有河魚疾三宿心如野馬馳逺阻恨無人縮地吉占頼有卜言龜眵生稠漆黏䨇眼身兀枯株坐有胝預寫盖棺遺囑去好傳經業佐明時送沈居仁同塏徃新鄭二千里外視吾兒重九日前期汝歸坐卧待看黄菊綻徃來相伴白雲飛郵亭歇處加飡飯客路凉時早裌衣無限}
