  - {type: variant, offset: 604, length: 1, content: 格, WYG: 幔在彤史闕文多林竹冬猶筍㕓氓巷不歌蹇予妻若子垂涕憶委佗代王尚絅挽吳母澱山湖上避兵時總角曾聞阿母慈霜野不教兒子出冰池竟得鯉魚知生前冠冕升堂拜死後芬芳婦徳碑愧我不才俱靡及抽毫遥寫楚些悲次韻賈教授暮春言懐琴有徽音劍有光惜哉江海老張蒼且將濁酒供瓢飲何必明珠用斗量壇杏}
