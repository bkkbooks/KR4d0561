  - {type: variant, offset: 5436, length: 9, content: 襟淸氣王校襟作衿五, WYG: 鼓撼我龜巢邊時余春秋九十有六年訪人嬾上山隂船卧游賦此林塘篇謝府學教授縣學沈訓導見訪杏壇遺曲}
