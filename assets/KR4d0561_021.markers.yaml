  - {type: variant, offset: 3145, length: 233, content: 禪伯王校以作似禪伯作萬回五五前四所得氣尤淸氣作趣淸作深前九二百五日二疑作一後一文遊臺榭王校文作交五六後九爛成土王校土上有糞字五七前四從來廣東南丹宋校東作西前七自廣東東作西後四獷俗俗下有馴字後七湖南海廣西海下有北字廣下有東字五八前九民大快快作悅後六蛙平幸偷生王校平作乎後八農病于重斂農上有而良二字五九前九有如彼彼作此不負公負公作市恩後四經蓮幙王校經作紅後七冠冕縛宋校冠作軒六十前一看魚鯈魚作游前二有回首望江南有下有時字前七白屋屋作壁六一前六屋頭東邊扶桑樹邊作近前九誰與, WYG: 夫獲晤語清風濯煩熱著述亦已多討}
