  - {type: variant, offset: 5412, length: 4, content: 苓古蓮字, WYG: 輓歌郎二周詩并序横山謝老過烈塘而作感今思昔掛一漏萬以元吉可大為周之白眉使先過目轉示族人大意念先世一邱之土望為保障至如吾族之微意在言外聞之者亦必有感於斯時洪武二十}
