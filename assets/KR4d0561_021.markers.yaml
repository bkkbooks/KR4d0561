  - {type: variant, offset: 0, length: 0, content: '', WYG: 朱二友文於乎兩駒並駕兮同一蹶兩輪並進兮成覆轍秋氣肅以成物兮羗蘭摧而桂折鳬鶴斷而可悲兮何短長之足說嗚呼天乎祭徑山長老顔恱堂和尚文福慧俱足惟佛稱首能具而微世亦希有如我恱翁是希有者德尊一代聲溢叢社蚤被殊渥著金伽黎所在說法四衆依歸晚坐南屛雷鳴鐘鼔雨華西湖魚龍起舞丞相授經化伏羣魔凌霄絶頂砥柱頺波慧以知㡬福以歸休崑岡之陽為師莵裘師方退藏陵谷變改兀如嬾融得大自在我昔避兵識師東林忘形儒墨結交以心時有旦評稱師孝禪吾其敬之僧中子騫九流百家問無不知吾其愛之僧中子期師之於予亦敬且愛片言可觀如拾珠貝我歸故鄉師贐其别歲時音問往來不絶前年孟冬丈室信宿白雪陽春賡和舊曲寂滅樂矣師固云然我思故交中心悁悁擷茗陽羡􅆽泉錫山詞以抒情塔鈴吾言夫祭妻文於乎誰無夫婦琹瑟相友惟汝與吾憂患白首粤自世變家燬於兵扶老携㓜蹀血宵征具區之山龍馬留跡羝觸藩籬㡬中鋒鏑載歸故邑遭歲薦饑裙無完布簪遺折蓍而於舅姑菽水朝夕生事死𦵏與我僇力烽煙滿眼人皆岻巇頼而内助匪義不為我擔耒耜爾躬井臼長育二雛庶亦肯構所居三徙非效孟母全身逺害以避豺虎内外服勤乃成此室舁疾來歸庶安且吉而飲而食而言琅琅辭絶而逝悲風滿堂六十四年不失婦道雖逢百罹卒逢夀考嗟我父子痛心如割骨肉恩愛際此契濶歲時烝嘗誰為薦羞我暑誰葛我寒誰裘風雨孤燈室與誰處齊眉之案誰為重舉宅兆斯卜祔而姑嫜一酹永訣我淚其滂兩祖祝文維洪武九年歲在丙辰七月初四日不肖孝曾孫某等敢昭告於某官之靈伏念某兒子木不幸逢豸冠之怒無辜屯鳯陽之田骨肉生離肝腸痛割以卑悃陳詞於烏府蒙大臣請命於丹墀欽承釋放之恩幸獲來歸之喜雖風憲紀綱公道之力卓然行之非天地祖宗隂隲之靈何以得此天無以報祖何可忘謹以蔬果酒饌之儀用陳菲薦謹告考妣祝文伏念某兒子木屯田臨濠如落陷阱而某原其罪狀揆諸刑書為父者有可救之理於是扶憊觸熱赴臺陳訴幸而臺官埀憐轉而上聞玉音俞允放歸養親此恩固不敢忘也然某思之苟非蚤歲蒙父母教訓之力則懵於義理昧於法律視其子可援而不能奮身為之則為父之道有所未盡今也頼吾親之訓于昔年脫其子之難於今日恩其可忘乎况乎上之人所以矜恤所以釋放使得仰事俯育而骨肉完聚者非天非祖宗有以相之不能也嗚呼天無以報矣豺獺之敬聊表於親至如父子受辱有玷先世其出於不幸而非繫乎不義而致者惟天惟祖宗尚或宥之外舅姑祝文伏念某兒子木比遭禍而屯田今䝉恩而歸里親戚骨肉重獲團圞其為外祖父母者死而有知其必哀憐眷顧而隂相之也推情揆理義不能忘三兄祝文惟我長兄有幹蠱之才而不得其夀由是而家人失節門祚陵替幽𠖇之中不能無憾也必矣然而幸存一息以嗣烝嘗如木識丁兄必愛之不啻若己子耳頃罹竒禍屯種濠梁豈不為之哀愍哉今蒙國恩歸奉菽水又豈不為之隂祐乎生而孝友死必不殊區區哀思詞莫能既惟我二兄深嗜佛學早絶伉儷誓不與同室而生同穴而死也早育二子長令出贅幼為沙門兄則超然自謂在家出家矣避兵之日緇流與俱杳不知其所終此固兄之素願也然而某佩服儒訓雅愛人倫念同氣不宜冺絶命其子林以奉嘗焉今以木屯田而歸如獲再生如脱鼎鑊吾兄以佛氏之心為心亦必為之慈愍焉惟我四兄未壯而克家將娶而即世父母悲悼終身不忘諒吾兄於父母之子若孫亦不忘也如木者幸脫屯種歸耕故隴以養其親以畜其妻子兄之喜為何如哉兄無後人命吾子森嗣之以承祭祀尚其埀裕使得與木䓁鼎峙而樹立也姊及姊夫祭文於乎賢姊之生愛弟深至視弟之子己子無異木之屯田姊必憂恚以今還家必喜而慰憫予暮年遭時不利父子汙辱有玷先世所自釋者中心無愧微姊復生孰語於是嗟而子孫俱殄疫癘歲時禴嘗頼女承繼我今摧頺百事俱廢念姊之心獨爾弗替姊夫善人義同昆季庶㡬來格鑒此微意祭母舅文代陳彦髙作昔人有言見舅如母今我不見舅氏者閲四五年又何異别吾親之乆乎瞻彼陽山追懐亂離脫萬死於虎口幸重逢於盛世然而陵谷變遷各天一涯舅甥之情惟天其知遭險人之排陷若參商而東西方鴻飛於魚網奮病翮而來歸聞舅疾而往問渉雨路之途泥承訃音於中道乃匍匐而星馳顛崖之苦蒺藜之悲皆不能與舅氏細數而陳之釋此憾者將何時耶言采溪蘋薦此泂酌哀歌渭陽涕淚交落知乎不知神在𠖇漠任仲文祭妻祖文翁於女孫親愛所鍾愛及其夫情亦與同既玉其成加以磨礱藻雖不才感恩之隆服勤左右黽勉厥躬歡然菽水庭闈春融金澤之濱瓢湖之東居凡三徙天風轉蓬今年夏秋巨浸溶溶賦歛之蛇毒於射工避地蘭陵請謀吾翁去危而安翁樂其從瞻彼横山滄海駐篷將營莵裘一畮之宫月有旬日往來憧憧豈其微疾藥石㒺功我方抱持滫􅔱之供語音未絶瞑目而終嗟我夫婦遭罹禍凶倚若㤗山山頹倚空頼有大母同此哀恫棺以黄楊衣衾重重忍茲永訣涕泗霑胸潄詞而醊以冩愚𠂻祭朱仲起文生於東呉殁於西州七十四年陶朱之儔其生也有一㕓而弗處樂浮家以優㳺有二子而離居各専力於箕裘其殁也繼室厚衣衾之具過百倍於黔婁女孫得藳砧之良襄大事而能周視世之生不聊生死不得其死者逈乎其不侔又何憾首邱之正與不耶某等或忝微姻㑹晤無㡬或傾盖於東洲之濵或結隣於横山之阯聞哭聲而匍匐徒往救而弗起兔死狐悲矧吾人耳一觴敬酹歌用蒿里祭妻祖文代楊彦澤作昔在童丱聞翁厚德邑之名門視為矜式遭時變故挈家中吴人多覆轍翁行坦途陶朱之裝㒺有遺失食指百餘乃保終吉陵谷既遷言歸故邱橋梓相須聿成莵裘匪德之積曷云能爾隂隲自天灼見斯理如某不才誤蒙采菲以孫妻之撫愛莫比每至甥舘誨言諄諄俯育之意盎然如春及翁卧疴或輟或作往來問安眷顧如昨七十八年如旦而暮眎諸夭閼實有餘祜所可悲者永别終天女孫歸寧誰其眷憐某于羮墻思亦罔極薦此溪蘋灑淚霑臆祭鄒忠公墓文公逰程門㳺楊比肩慎獨之學首得其傳孝於事親如曽如騫移孝為忠厥德兼全補衮之闕蒲伏涕漣數惇六罪羣邪凛然奈何城狐威福得専推落䧟阱炎風瘴煙忤物固爾精誠動天遐陬峻嶺感應有泉處困而亨斯文究研既釋論孟復觧韋編羲文姬孔羮墻見焉蔽日雲開暫脫迍邅再寵再辱愈磨愈堅明月之珠薶光九淵鳯穴有雛赤霄翩翩暴白先志誣衊悉蠲徳薰晋鄙埀四百年顯忠有祠奉嘗有田由宋而元有司豆籩度守是邦追慕昔賢詢諸遺黎知公故阡増土鬛封起碑之顛樵牧有禁溪山連延何以奠之秋菊寒泉仰止髙風服膺拳拳尚享祭陳氏親母文代曺子夀作惟靈生衣冠之茂族作佳配於頴川相夫子以無違實四德之兼全出鳯雛于丹穴奮彩翮之翩􅗁熊丸之教有法掌珠之愛弗偏予是以有東牀之選盖亦慕北堂之賢方鳯占之叶吉結朱陳之姻㜕何飄風之不情折萱花於歘然葭莩黯乎其失色朝露若為之涕漣念九泉之永訣酒三醊於柩前靈洋洋其如在鑒此意之勤拳子祭母文代陳煥章作嗚呼三子早孤皇皇疇依頼有慈親恩斯勤斯非徒養之而又有以教之視我三子掌珠之惜遭時艱危基業蕩析萬死一生幸迯鋒鏑徙茲滆濵茍焉休息其不滿於吾親之心者一子一孫介胄而殁居侍旁者但供其菽水習史業者常離於朝夕每勞乎倚門之望鮮能遂板輿之適所幸時康方安厥居孰謂微疾􅃍然云徂方巫醫之並用竟永棄其諸孤嗚呼痛哉而今而後雖日用三牲之養而吾親無復為之娯矣一抔之土無復窆於呉矣徒感傷於風木媿返哺之慈烏奉觴永訣肝腸若刳祭陳母文代陳彦直作生長勾呉秀鍾林屋有林下風四德之淑隨世變遷家此溪曲鄉稱姆儀徽音馥郁熊丸教子峙若鼎足伯為督家仲則戎服季也刀筆縉紳刮目甘輭之供如食厚祿斑衣諸子森如立竹春藹慈闈家用雍睦夀踰稀年殁有餘福季歸自公撫棺慟哭烏鳥之情悲乃風木里不巷歌弔者接躅某等姆儀之敬義當蒲伏言采溪毛薦此􅌬醁肸蠁有靈眎同芻束又代李一泉䓁作孟母以斷機教子成其子為亞聖陶母以剪髪待賔致其子有大名世之為人母者茍能有其遺風則其子亦必有可稱者矣若我陳母遺風伊何教子之功不鮮待賓之禮亦多昭哉彼蒼降福洋洋八十指子孫之盛七十三夀考之長東隣西舍愛同六親簞食豆羮饗如八珍為一境之姆儀誠四德之淑人倐爾云殁孰不酸辛時無張林淑德弗碑劉向不作立傳者誰我酹此巵我陳此辭亦庶㡬乎薤露之悲彤管之貽也歟祭萬氏子文人與萬物一氣所鍾何乾坤之為父母有賦予之不同顔路之子聖師之賢胡不永其年耶桞季之兄凶燄赫烈胡不使短折耶羙牛山之木而厄於牛羊戕於斧斤彼樗櫟之不才乃夀輪囷放梟囚鳯刖足麒麟若吾甥之淳朴孝敬而夭者皆莫曉乎混淪某等忍痛雪涕敢一問乎大鈞天雖不言聞必酸辛持杯酒以吊窮泉之幽魄亦以慰髙堂之老親親乎親乎慎勿為卜商氏之䘮明徒貽誚於聖人嗚呼彼蒼聞乎不聞祭沈氏女文維洪武十二年十一月初八日老姨公携其子以酒肉祭於姨孫女沈氏之靈曰汝之父與吾子為弟吾之孫中選汝父之雀屏今也如寳鏡之破於未照玉簪之折於未成傷矣哉吾父子之情傷矣哉吾父子之情又某年月日老姨婆與姑娘等以酒果家饌奠於時娘柩前嗚呼痛哉汝之生也母亡於七歲之初使汝不得蒙其撫養汝之死也父役於千里之外汝不能與之訣别未笄而善事繼母乆病而不弛女紅是皆可哀可憐而可憾者嗟哉彼蒼何彭何殤骨肉之悲寓此一觴祭外祖文代上海任仲文作翁於外孫恩德俱厚三孫之中藻為最㓜維其㓜也特恐愚陋其愛尤深加之訓誘翁自中年無心組綬湖山秋九風月杯酒幽花秀竹蒲石清繆翁於其間婆娑白首陵谷之變干戈日乆危而復安頼天之祐八十八年可謂遐夀為鄉善人其德亦懋甥孫紛然日在左右藻則出贅翁為擇偶桑梓連隂聲聞雞狗犁鉏畎畝復客桐江數月宿留廢禮百端辭莫能究比聞訃音痛心如剖匍匐而歸豈云敢後以病莫前徒抱哀痛瓢湖之水難洗厥咎翁其憫之庶㡬原宥雪涕陳情薦此簞豆為曹元度祭姑夫鄒桂堂文昔魯義姑抱姪遺子恩難兩絶義重如此公篤於親如姑之情撫視其姪同乎所生念某昆弟稚孺而孤適逢亂離干戈九區埀涸之鱗蒙激滄波無依之鵲乃棲瓊柯恩以畜之義以淑之威儀語言教且朂之人皆蒺藜我則袵席居吴數年如一朝夕陵谷變改公還故鄉某亦里居烜以餘光咄彼青蠅竟涴白璧投畀遐荒混淆瓦礫咸謂貂蟬將出兠鍪天定勝人無悔無尤云何不吊廼渉重坎訃音之來痛割肝膽丈夫馬革死不顧身惟其骨肉極切悲辛巫陽之招魂其來歸桂子秋風髙堂繐帷知恩㒺酧義蔑以報見公羮墻淚滿懐抱魯之義姑我姑之夫書以厚俗疇茲董狐祭徐逹卿文往昔避兵衆依于仁纍纍乎喪家之狗躍躍乎脫網之麕公之視予騶虞麒麟暖蘭湯而濯足下懸榻而重茵館婦子於别室撫臧獲如所親不以俗之數米而炊者以玉其粒不以時有析骸而㸑者以桂其薪或戚或疎恩惠俱臻長筵燕集禮意慇懃是故人皆以和氣氤氲喜色津津忘憂於板蕩之秋湛樂於熙臺之春殆若古桃源之避秦也别公數年滄海飛塵干戈阻絶公殁不聞迨歸里而聞之日覊縶於世紛欲一酹僑𤣥之墓閲屢歲而因循竊嘗論之世衰俗薄狥利忘義者什常八九公乃磊磊落落猶獨鶴之住雞羣然一飯之報吾志弗信抑亦有愧於古人瞻彼膠山如隔兩塵舉匏樽以澆墳上之土頌遺愛而云云酸風撼林嗚呼孔賓為陳以貞祭王母文昔在故里婦德著稱鍾禮郝法容儀具并暨孀居之一紀羗玉潔而氷清今居蘭城母儀之懿捧檄有孫盡歡甘㫖奉重闈之慈訓謹操持於胥吏故凡葭莩之親桑梓之共莫不愛之敬之尊仰乎林下之風也樂善之性本出天賦口不絶西佛之名如渇飲乎甘露其心愈慈其髪半素諸兒女之通家每升堂而拜母起居問安匪朝伊暮方菊月之下旬捧夀觴於初度安知彼蒼災祥竝臻賢孫有鶚書之薦大母則病入於膏肓巫藥罔功遽爾云亡正所謂賀者在門吊者在閭變怡懌為䀌傷矣衰絰之孫躃踊哭泣吐令伯之哀𠂻人皆為之嗚咽不有彤管孰記高節采滆浦之寒藻薦郫筒之香雪拭淚陳辭千載之别祭崑山張伯仁文洪武之初傾盖如故買宅買隣日益清顧於時蘇城樓櫓灰飛公脫陷阱欣然而歸人之所稱百鷙一鶚有猷有為抑强挾弱我所見者厚𦵏其父故舊不遺保障鄉土數載之交視同懿親為公所憂里多荆榛縛虎而縱反遭其囓鵂鶹夜啼興妖作孽室雖有繼卒以無嗣播遷臨濠日以毁顇女之嫁者遽失其良兩婿承家池魚並殃公在異鄉寸心千里骨肉傷殘痛何可已一紀之别老我於家每聞竒禍為公怨嗟蒼天蒼天斯人何辜困厄摧折乃至此乎客來今春謂公蒙恩難兄難弟同歸故園予欲賀之恨臂不飛以詩言情不勝瞻依安知隔歲公已物故集師書來我淚如雨追念疇昔肝膽相知各天一方徒云坐馳面不復晤魂其可招悲歌些辭酹此一瓢生日祀考妣祝文父母生不肖八十六年矣不肖雖不能為賢人君子為世矜式然未嘗敢為小人之不臧也雖不冨不貴不能顯榮其親亦未嘗飢寒失節以辱先也長太平之時則微樹其業遭亂離之日而不殱於兵夫妻老者暖衣飽食早眠晏起不憂不慮以安以娱是皆天地之大恩父母之遺澤也蒙天地父母之恩澤其可忘乎其可忘乎所願者子子孫孫中外和睦𤓰瓞延蔓荆棘不生使不肖夫婦如是安娱以盡其天年不乆牀褥全歸遺體尚頼天地父母之靈有以隂相之始生之日釃酒以告冬至祀外舅外姑祝文嗚呼悲哉仁而無後斯理之變而又遭世之大變也三子八孫靡有噍類所遺之業盡屬他人顧為女為婿者耄無能為竟不能為立後人以為似續以承祭祀每一思之慚色而已歎息流涕而已惟茲一陽薦此蘋藻溪毛匪薦薦以此心靈之鑒之憫其所不能為者宜宥厥辜祭唐親家母文代陳以貞母氏作德為母儀五十九年見而知者罔不稱賢昔我冡子多幸自天雀屏中選以女儷焉主我中饋毫忽罔愆母教之淑豈容忘筌昔在鄉里絲蘿纒綿今居毘陵同居一㕓姻婭之情益加於先靈在牀褥乆弗能痊曰女曰婿常侍榻前我來問安飲食留連今也云亡骨肉棄捐為子婿者公務所牽覊旅金陵未能言還女以孳育月輪未圓棺弗能慿縗麻涕漣埀髫末孫其哀亦然我念疇昔淚如迸泉有菲蘋藻供陳几筵靈其如在鑒此惓惓祭表伯母文代王仲孚作昔居故里家為比隣綿綿瓜葛如朱如陳今茲異鄉亦復如舊通家往還情日益厚靈以沉疴一載之餘匪朝伊夕候詢起居若我婦子均蒙眷顧食必分甘骨肉相處孚方驅馳信宿而歸靈乃即世幽明永違匍匐往救已不可得陳此薄奠涕淚霑臆祭王君夀文昔在西塾廿有餘年公之父叔坐予講氊愛我敬我如骨肉然公於此時鴈行聨翩敬以父執禮意勤拳規行矩歩靡不勉㫋厥後一别陵谷變遷公守故丘我落海邉萬死一生脱身戈鋋我東來歸公喜自悲喜獲再見悲歴艱危冠玉之美殘為瘡痍樓臺廣居化為茅茨衣不文繡緼袍為宜食忘八珍啜菽如飴樹菊軒堦杖履棲遲幹蠱有子蔚乎孫枝樂事以酒餘皆弗治佳哉蔗境為鄉白眉吾嘗鼓琹滆浦之湄連城屢宿細論昔時負笈之孫服受我詩自茲以來别多㑹稀花朝月夕每有所思去年暮冬尺書載馳緣有義事要公共為安知踰月遽然其萎偶出西闗路聞葬期彼祖輓者舟欲同移眸子眵昏行且尼之送不執紼奠莫奉巵烈塘之東徬徨涕泪還家數日晝夜忸怩緬維前賢絮酒千里嗟今之人跬歩或弛朋友道䘮恬不為耻擷此溪毛陳詞尺紙物薄情深公必鑒之祭妻文嗚呼悲哉靈年八十以微疾不兩日而亡人皆謂天錫之福子孫滿堂衣衾而歛瘞之髙岡并餘一紀家居樂康既葬而隣里騷然紛捉軍而驚惶使襄事之日而過之則惡乎有數百之人祭奠於北堂縞衣而送䘮也未㡬而季子森為人謀陷嫁禍其身我扶憊而赴救詣郡邑而具陳刀筆之吏欺天罔人妄移文於崑邑欲玉石之俱焚頼公道不冺如屈蠖之得伸雪理而歸父子悲辛以今思之六十年伉儷常居安而欣欣雖世變之秋避兵海濱亦未嘗遭此之不仁信乎吾細君有可福之善蒙隂相於大鈞也耶卒哭之祭遂致目闕死而有知不必我嗔吾知母之慈子必哀憐其遘迍奈何死生幽明之分兒哭之慟我亦霑巾嗚呼哀哉祭張溝南先生文維洪武十六年月日同郡老友謝蘭謹遣孫塏以清酌庶羞之奠致祭於故心友溝南先生之靈曰於乎近年耆英晨星落落公在鄉邦雞羣獨鶴詩三百篇精華咀嚼吐而為光光輝焯焯粤自蚤歲蜚聲臺閣遭時多艱屢進屢却歸來故山雲卧一壑洪武更化羣髦進趨克嶷有子首應而湏手持直筆追縱董狐如晳有參養志而娯寳樹遽折悲風呌呼公無怨尤曰命矣夫中郎之女傳業於家丙申暮春郡志有作時我與公同秉筆削甲可乙否語皆良藥别來數載心交如昨愛及吾兒義尤不薄前年過我新秋夜凉中庭夜坐月白如霜劇談千古把酒淋浪興盡而去東方未明去年夏五我兒云亡公為墓銘九原有光吊我唁我喻以大方斗城之别譙門夕陽自冬徂夏人多讚揚優哉悠哉新居草堂幽花秀石池島滄浪不徒玩物世慮俱忘顧我潦倒理宜溘先安知矍鑠乃在吾前四月九日訃音忽傳無妄之災網羅正纒葬不克送酒不漬綿每一思之淚如迸泉病目昏盲舉歩欲顛塏持瓣香拜於靈筵鮑叔知我鑒此勤惓姪婦祭姨母文昔侍姨母東吴避兵我姑繾綣諸婦奉承及歸桑梓半舍之隔歲時問候眷焉如昔今我娣姒等哭姑之淚未亁而又哭姨母而永違母乎母乎見我姑於地下其能說諸婦之哀思乎溪蘋拂霜薦此一觴阿翁悵悵作此祭章代常信孚祭親家母文曩予之家幹蠱乏人賢郎贅居蒙養而姻維時魚軒雲從析析繄我婦子獲瞻母儀事雖從權悉如所願舉室驩然親親眷眷去年合卺蒙饋茝蘭愛子及婦恩出肺肝顧予東牀每歸問安慈愛之深尚蒙埀訓所可喜者起居樂康予嘗詣門亦得升堂别來未㡬聞有隠憂豈意成疾竟弗能瘳訃音忽至婦子匍匐泣血呼天救不可得我來柩前奠此束芻區區哀忱靈其鑒諸冬至祭母文代木森作嗚呼痛哉每年冬至齋宿祀先母率諸婦供具酒食今也中饋或有缺失誰懇懇而朂之耶每年冬至賀客過門母語諸婦治具饔飱今也禮意或有懈怠誰諄諄而命之耶一味之甘誰分諸幼耶糗餌之屬誰饟諸隣里耶是則因莭序而追感者如此至若子孫之有室皆吾母擇配而為之子之婦孫之婦其婦工有未善者皆吾母教而成之平居之日甘旨裘葛之奉則吾母弗求其備温凊定省之禮或有疾則終日終夜木之濠梁屯種森之滕州被刼林之客死新鄭吾母為之廢寢忘食晝夜憂思痛苦哭㡬䘮明慈愛之情言莫能盡如此之恩又皆在劬勞罔極之外今子之死者固不能報其生而存者將何以報其萬一耶母兮母兮無復見兮冩此哀𠂻矢弗諼於逺兮祝亡子文洪武十六年十一月二十一日老父命汝弟森持思賢錄一簿置汝靈几酹之酒而祝之曰往歲板刻辯惑編既成汝嘗執書立吾前而言曰不圖今日遂二十年之所願欲矣汝於此時喜容可掬吾知吾兒推心父腹繼而摘稿尤喜成速携二書之新行不兩期而瞑目今老父偶逢於知己又為刻思賢之錄此汝之所冩者稍撙節其簡牘工數月而就緒我已盲其雙目摩挲紙本無復能讀於乎誰念其為之不易寳之如玉邪誰為其喜而傳之士夫俾咸丐乎道鄉先生之膏馥邪悲哉吾兒身不可贖置此書於靈几猶挂劍於宰木顧觸屛之子若孫絃將斷而復續覩物思人淚霑汗竹祭母舅文代東洲黄氏作嗚呼見舅如母念母不忘舅復厭世豈不永傷若我舅甥世居邑里如鳥同林鷇育棲止版圖之謬牽連伏辜天恩汪濊姑緩其罰脫網之魚頳尾發發七里八岡水溢溝澮載欣載奔過都歴塊蒼髪黧面泥土裳衣忘乃劬勞負疾而歸賀者在門退不旋踵吊者之來乃哭而慟如某至親洎諸姻婭痛不可忍涕淚交㵼將來休戚無復相知俯瀝肝膽酹此一巵祭賀彦銘文代陳彦髙作南華有言曰上夀百歲中夀八十下夀六十一月之間得開口而笑者或四五日而不能及也况遭世之岌岌乎如公之生埀及中夀喬木故不為不茂遇陵谷之變遷若摧枯而拉朽坐衣冠於塗炭脫性命於虎口元龍之豪氣雖衰丹穴之鳯雛方雊俄陸海之風波沉鐵船而莫救有竹林之小阮尚枝梧於左右五六年憂患之中能一笑如南華所言者亦烏有也嗚呼哀哉凡我親舊居同里閭困蒺藜於世變之日喣涸轍於濡沬之餘犁鉏乎荆棘之塲屋廬乎瓦礫之區若䕫蚿之相憐不戚施而蘧蒢吉㓙慶吊出入起居或叙情於杯酒澆磊落而欷㱆今也云亡痛當何如奠椒漿於三寵墮清淚如蛟珠悲風愁雲送乃輀車祭妹文嗟我先世錫山故鄉曰朱曰陳閥閱相當乃以吾妹嬪朱之良為婦而賢孝於姑嫜陵谷一變雲萍四方念我兵餘如龜穴藏聿來依棲隣壁分光爾居再遷半舍相望手足之情眷眷弗忘常念吾甥來我渭陽吾兒念姑安問亦常焉知微疾遽爾云亡朱陳六親㒺不痛傷况予潦倒孤鴈遑遑凴棺飲泣奠此壺漿祭妻兄文大哉天之所以為天兮宰萬物而幽𤣥雖陵谷而變改兮恒福善而弗愆觀若人之始終兮蒙隂隲於彼蒼避戎馬於勾呉兮渉畏境如康莊聚原鴒以救急兮作歸鴈之同行舍故土之荒穢兮樹豐業於暨陽託家政於仲氏兮日娯客以壺觴肆優㳺於桑榆之景兮家有餘慶蹇予早歲有室兮得名門之女弟頼昆季之眷顧兮於今四紀睠小阮亦僥倖兮辱妻以其弟之子悵東西之相望兮多契濶而㑹少比安問而抵家兮喜棣蕚之俱好孰謂别無兩月兮聞訃音而絶倒惨余室中之人兮姑與姪其同悲徒匍匐而莫能救兮淚滂沱而霑衣奠椒漿而永别兮叙平生而陳辭除服祭母文二月十四日為兒子木等作齊衰母服也三年之䘮猶卒哭而再祥禫而除其服者古之制也然劬勞重恩罔克有報孝思之心有不能隨服而除者也於是撤靈帷於斯寢奉神主於祠堂歲時烝嘗寓不忘之意也不忘者何敬與愛也凡吾親之所敬者敬之所愛者愛之則親之死猶無死也茍忘其親則親之故舊或踈如途人親之孫子交惡為仇敵也以若所為是不孝也觀夫孝之至者通神明不孝者必獲戾於神明也過庭之訓諄諄有年勉而行之請質諸母之靈也矢心陳詞終身戒也遷祖考神主祝文嘗聞祠堂之制當設四龕以祝四世之親不肖幼年在父兄之側失記髙祖考官稱髙祖妣姓氏故曩於兵後立神主由曽祖及禰而已虗設第一龕於茲數年今因亡妻䘮既終其子木等奉母主入祠敢請遷曽祖居第一龕曰祖曰禰從而遷之以第四龕安奉其母任氏候應芳之殁然後改題髙曽祖禰稱號也不肖違失禮制不能無罪惟尊靈恕之寒食祭曾祖墓祝文頃頼先世德澤未冺𤓰瓞遺蔓幸繼烝嘗時維禁煙隨俗展墓匪云報本庶不敢忘伏維尚饗祭祖禰墓祝文墓祭非古也以應芳不肖不克歸里不能以時省掃常愧於心每年寒食展拜墓下豺獺之意庶效萬一尚冀先澤埀裕後人有永弗替墓祭母弟祝文代木等作寒食墓祭雖狥俗禮為子孫者哀慕省掃亦庶㡬豺獺報本之意焉惟慈母賢弟魂魄有靈必蒙歆格墓祭先兄祝文父母遺體本有三兄仲兄避世不知所終伯兄季兄並窆於此時維寒食祭掃荒丘手足之情庶乎不忘娶孫婦祭祖祝文維洪武十八年歲次乙丑三月初四日乙丑孝曽孫應芳䓁以孫男塤於初五日丙寅吉辰娶本縣安豐南鄉吕氏女為妻敢昭告於某官曰娶婦三月而廟見者古㛰禮也近代之制以日代月各有義焉應芳輒敢㕘酌古今從宜從俗擬於翼日親迎婦初入門先當謁拜先世以見不敢忘本之意然後祗見舅姑及諸姻眷自茲以往庶得奉承宗祀蔓延嗣續尚頼遺澤埀裕弗替謹以清酌庶羞前期祗薦謹告祭徐仲清文嗚呼九流百家玉石混錯公隠於醫常之一鶚黄岐之書孰云不知公得其要探𤣥索微如古兵法時用出竒愽議閎辨吐屑霏霏蜚英蚤年鄉評衆推紫燕歴塊非駘可希遭時艱危挈家勾吴藥石之靈字及豚魚長蛇當路報亦銜珠以之事親厚養為娱春風杏林名聲載途所不忘者首丘如狐大明開天四海一家父母之邦青氊故廬徴車聿至乃赴清都醫國之忠老莫能輸謁告而還子孫怡愉蜂房合戸哺雀羣烏混迹市塵懸我藥壺衛生之仁施於州閭佳哉蔗境餘人所無衣冠敬共鬚眉皓如應芳忝交四世於此公有佳兒與我中子同業於儒同出而仕惟余不猶一生一死公恤其孤與諸孫齒誘掖激昻誨言提耳老我墻東相望尺咫頻年䘮明跬歩千里時蒙問訊或饋藥餌心親迹踈匪負知己今公闔棺事皆定矣我未能然望風長喟束芻授孫往奠靈几玉雪之姿羮墻宛爾載歌薤露商飇歘起願言從逰脫屣滓泥存順沒寧庶㡬無愧遷葬二兄祝文九月二十六日元歴埀盡時盜之槌頷珠斷釧臂無處無之嗟我二兄荒郊廢塜雖有後人漫不省視與無人同薪者芻者為樵牧場而犁鉏者日侵月削又將為禾黍區矣應芳以同氣之通是可忍乎今重製二函遷瘞祖壠東南隅以祔大父母父母及諸父之側竝封如前䕃以竹木嵗時酒飲庶得享而侑食焉惟兄有靈妥兹幽宅諸親友祭曹子夀文古之人有言狐死兔悲物傷其類况人為物靈居同閭里有瓜葛之親朋友之義者乎又况子夀之為人善與人交而有春風和氣者乎居常往來杯酒為禮或有時而合歡雪襟懐之凝滯奈何轑釜之聲瓶罍之耻往往鮮克遂其意也欷㱆慷慨音猶在耳一月之餘痿而弗起屬纊未定而闔棺訃音裁至而發靷東方載明虆梩亟奄於横山之址凡我親朋惆悵而已其為骨肉至親者又何忍而至於若是耶溪毛泂酌亟奠靈几遂成永違顙而有泚祭唐仲傑文公之子吾子之門弟子也吾之孫公以小友呼之過愛而忘其齒也垣雖失怙如飲食數載慶吊吉㓙且能惓惓乎盡其禮也今公之殁胥靡也哉古人月明千里再歌些詞魂兮歸兮寓永傷於匏樽一酹乎落花流水祭劉德祥親家文人皆謂公有通濟之才設施之方且見識之長何始終之乖張吾嘗以為江河之舟視舶而微非葦而杭能重載而逺適可周流於四方或長河順流懸帆巨檣一日千里快若飛黄或大江水逆石尤風狂釘石繫䌫隨波低昻或脱難於盤渦或經險於吕梁或候潮而逗遛或阻氷而徬徨安知一夕怒濤舂撞盲飈簸颺遂顛覆於鮫䱝之鄉嗚呼哀哉十四年間安危變遷以資禀之髙明知有命之在天不怨不尤處之㤗然鄉之評旦前後可甄有可稱於後者何異乎青史之傳嗚呼哀哉如某者昔在東闗隣比相依承公以鍾愛之女為吾孫阿塏之妻雖别多而㑹少獲通家而往來每黄耳之有信知告老而有期擬祖孫同迓呼麯生以洗泥訃音忽至招魂來歸塏也哭婦翁於四千里之外奈此願之乖違兩兒扶持奠此一巵文以抒瓜葛之情詩以冩薤露之悲公知不知我泗霑衣生日祀先祝文某之生斯世也九十一年每念劬勞㒺克有報也然視不明聽不聰而猶有可覩之物可聞之聲肢體雖頺猶能杖而行几而坐也方寸之天不蔽於私義理昭著而能燭物是皆生我教我者之大恩也先世之恩報雖不能實未忘乎心也况夫左右服勞飲食裘葛内外有人老老㓜㓜頗知義方非祖考埀裕之力焉能得如是之樂也自今以往天年未盡喘息未絶皆感戴之日也家饋殽羞先用祭享亦庶乎豺獺之報本也祭徐子忠文代席彦適作旦必有暮死生奈何或玉闗之不入或薤露之有歌或馬革褁於外域或魚腹𦵏於汨羅是皆卓犖之士去鄉井捐首丘而忘其考槃之阿也今公之殁類乎古人論公平昔良可悲辛其家居也克肖而翁持身以儉約勤苦待人以和氣春風其户役也覊縻長安夢方尋於失鹿事乃畢於盖棺嗚呼三子鼎峙峙乃公餗銜哀服勤惟恐顛覆雖匍匐而莫救望鍾山而慟哭東牀佳婿淚亦盈掬如某既忝姻婭且居鄉曲愲愲乎叶力同心董征輸之萬斛覩丹旐之來歸極感愴於心目蓉湖采蘋薦此􅌬醁武進縣學立先賢祠祭文代陳知縣易縣丞作昔之人以鄭公之賢而名其鄉以荀淑之子而里名髙陽葢地因人勝使山川人物皆為之有光今夫三先生之産茲邑也道學之傳淵源二程發揮道妙有功遺經劾當國以滔天之罪而貝錦乃成諫至尊以正始之道而逆鱗敢攖觀夫感應之泉醉客之語則忠義之至通乎神明若夫由大魁而演綸㕘大政而憂國者位雖不同同乎一誠輔崇寧之初政知秦蔡之匪賢俄梁木之俱壊徒流芳於汗青是皆可以為天下之師表百世之儀型豈特為鄉里之榮哉某等叨蒙國恩民社之寄以先生祠諸學宫是亦祭於社之遺意詵詵諸生奔走粢盛如將見之于墻于羮霑德薰於晋鄙何以異乎師承吾將見金鐘之䜟復靈劍之聿興謝莊曾祖墓清明祝文某嘗聞先世開封渡江蕃盛東西謝莊地因人姓三百年來陵谷變遷自髙而上故壠茫然睠茲衰丘鬰鬰如許即彼侵疆為外侮禦匝植松楸幽篁翳之弗樵弗牧周垣衛之寒食清明聿來省掃追逺者心妥此蘩􅍨尚享新河口祖墓祝文丘墓之祭禮無所考然俗禮以清明祭掃其來尚矣茍於此以盡其誠亦庶豺獺報本之意也幽明雖殊有感斯應所謂洋洋如在者將見諸羮墻見諸堂封斧封馬鬛封也某等雖不肖無似尚期埀裕以衍餘澤繼述弗替尚享先考忌日祝文父母之恩人皆㒺極惟吾父之鍾愛於某也既生之又能擇師而教之使日就琢磨黽勉樹立雖不克能馳驅取青紫以舉其身以顯其親以澤其後人然此身頼訓育之力不姦不邪不淪胥於習俗之陋於先世無甚忝辱子若孫則矯枉就正識之無於農圃之間而我杖履所至晏然棲息無飢無憂是皆吾親之遺澤未冺也此恩此德之死不忘惟兹忌辰祗陳泂酌以鳴其感悰恭請顯妣石氏安人同賜假享謹告祝先致語代丁學古作奉先思孝聖賢之訓甚明事死如生祖考之靈可格焚香代鬰鬯之灌秉燭為庭燎之光雖無鐘鼓鏗鏘惟是豆籩奔走志意追思於齋戒儀容宛見於羮墻蘋蘩蕰􅇨之毛靈筵可薦参苓姜桂之物相籠親儲谷陵兩變於頻年城郭一㕓於今日如繩祖武勉讀父書豚魚或昧於交孚時加修省豺獺粗知於報本歲奉烝嘗伏願濯濯厥靈洋洋如在灾不生禍不作正頼乎厦屋帡幪居之安資之深何異乎門閭髙大根深蒂固地乆天長初進酒生不封侯賜酒泉無人死作酒中仙一杯初進葡萄醁且喜家庭有象賢苾苾芬芬一豆羮丹𠂻寸許若葵傾我祖我宗應歡喜自幸厨無轑釜聲再進酒饌銀燭生花再舉觴滿堂渾是欝金香愁多莫問人間世年少多為地下郎不識駝峰翠釜烹羮名錦帯亦虗稱一杯骨董如芹獻五味調和意盡誠三進酒饌孤兒碌碌混泥塵華胄遥遥出縉紳百拜勉循三獻禮一年祗薦四時新廟堂調鼎用塩梅四海蒼生笑口開我手幸無窮鬼捩折旋三獻奉羮杯進饅頭籠餅炊來玉屑香貽年喜得歲豐穰賢如脫粟晏平仲應笑縮葱侯侍郎送靈致語切以欲表孝情勉循俗禮焚楮錢以代幣意在殷勤酹桂酒以送靈魂歸寥廓下情不勝感愴之至祭曹子毅大使文代諸親作萬物之靈莫靈於人然人以異於物者秉彜方寸之天不和而公不偽而真也惟靈身無毁傷不辱其親口無萋斐亦近乎仁不汲汲以肥家不戚戚於謀身西園鬻爵乘時取名東陵種瓜避時辭榮是皆過不吝改而復其天真至若愛女而嫁不贅婿而效秦視其弟之子猶子意終老以歡忻非明理而能之乎彼昧於理而不能然者寧不泚顙於泉下貽誚於鄉鄰某等親舊交接敬恭相於悵幽㝠之永别感涕泗而欷㱆輀車發靷奠此束芻子祭父文代奔牛陳明逺兄弟作哀哀父母生我劬勞欲報之德昊天罔極此尼山聖人刪詩三百存此言為萬世之訓也凡為人子者報親之心其可忘也况某某之痛親尢有甚於常人者元歴之末兵戈數年委棄桑梓流離異鄉其生也不能盡菽水之歡其殁也不能求宅兆之安陵谷之變丘壠之失仰愧俯怍無可奈何於茲又隔一宇宙矣今也倣昔人衣冠之葬葬以木主巫陽些歌雙魂來歸於以寓安厝之禮於以表追逺之心非敢謂報親之萬一也於乎哀哉於乎痛哉祭姊丈何子潤文代侯徳名作猗歟吾姊得配君子梁鴻孟光隠德可比睠我弟昆骨肉無異賓朋之交或臧或否坦率忤物豈無微纇於乎蒼天禍福倚伏乃著戎衣往役安陸折桞郡城别淚盈掬十年夢寐每論𠂻曲黄耳書歸殷勤齒錄路越四千親愛愈篤尚聞矍鑠慰我毣毣安知訃音遽云瞑目生還玉闗無復可卜於乎蒼天何怨何尤嗟嗟我嬃舉案無由兩地共哭痛心如抽爰命巫陽招魂道周香雪一觥薦此蘋羞魂兮魂兮來歸首丘祭金親家文代袁茂卿作金以運粮遼東巨船五十餘隻官吏役夫千餘人回途遭風覆舟而溺於乎平地風波陸沉者多航海而役奈􅄓母何魚腸𦵏兮渺茫散精靈兮八荒巫陽銜哀兮籲穹蒼白雲悠悠兮歸故鄉大矣哉尾閭無底渤澥無邉非精衛之石可填豈彭咸之居能遷魂兮來歸閭井依然雙親能保其妻子一弟服勤而力田逍遥倘佯何異乎生前某等葭莩之親鄉曲之情援溺之手㒺措將迎之意宜傾言采溪毛薦此一觥祭湯母文代吕輔之等作惟靈春秋八十有七年林下髙風鄉稱姆儀耳聰目明老而弗衰盡三從之道全四體之歸其早歲之事非所詳知請以晚年所見而知者頌之男㛰女嫁各得其時愛其男及其婦則能盡其慈親其女及其婿則無偏無私其諸卑幼愛亦如之視姻眷如骨肉待隣里無陵夷故其病也人皆扶持其殁也人皆涕洟而今而後侍奉無期區區酌東洲之水擷横山之薇於以見親親之情於以表戀戀之悲靈其不昧鑒此哀詞祭重外甥女周氏文維洪武二十四年十一月日}
