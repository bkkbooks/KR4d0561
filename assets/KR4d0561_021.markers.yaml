  - {type: variant, offset: 4900, length: 0, content: '', WYG: 暉草莽中老我客鄉歸不得空勞杜宇喚誰儂次韻答江隂鄭教諭見寄揚子江南山水奇杏花壇上晝隂遲魯魚亥豕讎經史江鮆河魨閲歲時兩邑相望三舎地九年凡寄數篇詩恨無縮地仙人術把酒論文醉不辭葉道士遊仙詞海變兮揚塵翦若木兮風斤醫拗人兮寓世仍猿鶴兮同羣冠切雲兮霞佩雜三秀兮蕭艾從喧囂兮萬􅄜聊遊戲兮方之外混混兮和光忽蟬蛻兮坳堂陵虚空兮轢渺茫一瞬息兮三千霜吾不知其果何適兮祗死守乎康莊輓萬拙齋曹横山下萬家莊喬木隂隂夏亦凉法曲琵琶彈鐵撥髙堂窈窕捧瓊漿素衣忽被青蠅汚赤手幾遭猛虎傷賀客未還來弔客老夫雙眼淚淋浪閏六月廿九日飄風動地自黎明堀起破屋㧞樹衆皆驚懼至夜方息次早余追念疇昔憮然作歌三家村裏老詩翁獨木橋邊一釣篷敗壘曾聞屯狗寨荒湫猶説是龍宫勢傾東海前年雨力撼南山昨日風可笑生來誇壯膽兩番如阮哭途窮葛節婦葛節婦家住崑山陽芳年二十良人亡呱呱兩兒泣蘭房一在襁褓乳口黄塵昏破鏡無復覷孤燈相伴慰凄凉霜風自冷木自落辟纑不知秋夜長重門深閉四壁立縗麻淚濕三年䘮維時率土皆戰塲疇能訓兒知義方熊丸在篋螢在囊呼兒义手立侍傍魯論二十篇孝經十八章阿母授讀聲浪浪母不姑息兒能自強從師不出鄭公鄉腹笥有書牙頰香朝夕悦親萱草堂母今年踰五十霜菽水可歡時且康觀風使者恐未知邑有野史揚芬芳玉峰父老來比徳衛共姜我言共姜無此兩兒郎哲哉此母非尋常盍亦作歌與史相激昂寄清真觀提㸃余復初祖餞昔年詩最好客來今雨話𤣥都步虚壇上三花樹讀易牕前九節蒲恬飬氣同龜息静清修容勝鶴形癯儒林老友袁真士曾道區區折簡無代簡吳中衡一夢今年一去年兩番相見兩相憐牽蘿補屋仍徒壁賣藥修琴又斷絃滆浦夕陽紅樹下淞江秋水白鷗邊何當載酒乗秋興來徃風流似雪船寄題詹伯逺蘿屋大車方檻檻小隱自寥寥門掩牽蘿屋溪懸掛樹瓢一從滄海變屢却小山招滆浦居相近城闉路匪遥洗心常翫易忘肉似聞韶苔徑春風掃𤓰田夏雨澆姓名編令甲蹤跡混漁樵蝌蚪藏書種蟾蜍作研僚訓兒燈火夜飲客歲時朝清白真能守緇黄不妄交茍焉田野樂老此聖明朝寄語青雲士巢由不見堯雪中遣興横山鶴髪翁小巷龜頭舍一爐置中央四壁塗縫罅晨粥食近午晝户閑如夜舉足手扶杖縮頸頭蒙帕㧞木飄風静}
