  - {type: variant, offset: 4702, length: 1, content: 河, WYG: 晞髪滄洲吟杜若歸來一曲焦尾桐今古閑愁總忘却老夫喜聞心與同以言相贈仍相約東門之東劍井西蘿屋數椽雲一壑肯為尋山數見過樵飲漁歌良不惡人生百年能有幾但看花開與花落世傳仙人上天騎白鶴荒唐繆悠言不怍請從先生持筆削崑山辛彬甫元夕前旅次岑寂}
