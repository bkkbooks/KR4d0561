道乃備師作書九前六其言論論作議後四盤根錯節盤作蟠後五而今何屑屑如是而今作至是耶十前一以厲其所守以下有益字前三送小湖徐巡檢序湖作河十一後一方謙謙謙下有然字後二葢如耳如下有是字十二後四鳥獸之害人人下有者字後八葬之之作諸十三前二喪亂之際王校際作時前九必有子愛之心有下有其字後五公以明敏之才明下有察內二字十四前六溫溫乎不重溫字秩秩乎不重秩字後一知之深之作公爲二字後二賢勞無前無作如後三不止長洲吳縣而縣下有單父二字已十五前一余故交余作彝後九將有日日下有矣字十六後一所可否否下有者字十七後二必先誨之之下有以理二字十八前六必寓意詩酒意下有於字後四至正庚子秋秋下有九月二字祺上人人下有等字後五一旦旦作日十九前一愚隱一至隱下有師字十留數日留作居前二留客之勤勤作固後八渡吳江江作淞二十前五有難以語之人者之作諸者下有其歟有樂三字王校有作真前六題其簡首題作筆後七卽在金陵卽下有休字後于杭後作隱後九濟人之仁仁作盛德二一前六蓋少矣少作尠前九寧得專美于昔乎寧作固不二字乎作矣後一諸君子無子字後八勞農河防農下有及字二二前二游任厥職王校游作猷前五大器晩成成作就前九檀之可以爲車檀上有若字後三至正乙巳巳下有冬字後六義不敢辭敢作容殫志盡力志作智後九視之猶金湯湯下有云故當道咸嘉允貞之能而凡與其役者多德之十九字二三前一可謂可作所前八都門外都作西後二而此哉王校而作至二四前二風濤洪肆洪作橫前四墟邑相望邑作里前六因以蘇港名之蘇下有君字前八蓋此類耳耳下有今君賓府幕以所負之才贊畫郡政蓋滔滔也十八字後七追述少游述作念二五前四某與君某作予前七贈送之不同之下有有字後七其不負國家修文不作無之教歟二九前三孝感之誠王校誠作瑞前八贈寫生生作照後七花木魚鳥魚鳥作鳥獸三十前三並著勳業業作烈三一前三繼而世變繼作旣前七升公升作昇三二後四雖常以藥活常下有能字活下有人字三四後六余曰余下有則字三七後八而榮歸也以其吏榮歸也作別英事之精三八前三一日日作旦三九後一臥施轍而留也施字空二格王校云原本施施二字一作旋後六必不負必作其四十前九于是會聚耆宿之聚作集士四一前一相見之晩見作知前三已博通通下有之字前六膚淺蒙昧昧下有管窺蠡測四字後六曰稽古曰下有若字四二前三無間然然下有者字前八鐵筆珉之外乎珉上有堅字後一詩若干首詩下有凡字後四宜以父母之心爲宜上有理字心四三前九予于是從而賢之于是作以是亦四四前八寢食俱廢俱作幾後二其聲之不焯焯其上有未見二字無不字爵有崇卑爵作位後三職有大小大小二字乙轉後四奉公所職恢恢乎職下有之其二字後五豆區之之下有養字後六爲京兆爲下有雋字四五前二能洒脫洒脫二字乙轉前三絕跡京洛塵土跡下有乎字結忘形交交在結字下前七三萬之隔萬下有里字後九優哉游哉游作悠四六前一送遆知縣遆作適前二世俗所謂世上有嘗觀二字前七置諸膝膝下有上字前八大耄之年耄作耋後四斯世世作邑後八覘公之志志作意蓋樂乎歸乎下有其字四七前六然以律身居官之律身二字在官字下法前七丞之父歸父之亟歸後一不減崔玄暐之母不上有殆字後六專美于前前作唐後七而可以爲孝矣而下有後字四八前六乃亦得之得下有而用二字後八釋門老緇老作名四九前二不知不上有有字爲聖學之始終條之在終字下理前三發爲文章發作紬前六惜哉惜上有吁可二字前八方山翁方作芳下同前九高公明德爲外甥明作名甥作孫後八六百四十九字四十九作九十四後九則家庭授受則作其五十前二以炫其奇妙奇妙作光怪前三不易其操王校操作言前四遇病病作疾後八以事少之事作是五一前三士人人作夫前四爲之序焉焉下有余曰嘻視彥德之心賢於越人多矣十四字前五稚騃之幼年幼年作秋言語不通語下有有字後二尙論如此論作義五二前六芄芄其直芄芄作丸丸後一而異其素愛之心異作易也後四在歲寒後彫在下有乎字五三前三飄然爲外遊爲下有方字前四篤于親親下有眷焉二字後一負伯牛之疾者者下有數年二字後五以邀厚利利下有以肥其家四字五四前四周公周作姬後七則與不知知下有者字五五前三三復而申吿吿下有之字五六前七衣冠纓絡纓絡作瓔珞前九予曰予下有辭不獲乃言五字後五引人爲善引作誘後七登無上道登作證後九予言筆之言下有請字十五一前七復延至至作致前九拘者縱縱下有新者穉三字後九而人不知歟而人作人所如是如上有誠字二前五拭目以俟拭作括前七至正丙申申下有春字前八以龜巢題之題作顏後三鳩工材王校工下有度字三前二終其天年天年作夀考前四相斯世者相作於後六從人間借屋無間字後七凡五徙凡上有居字四前三雖偪仄雖上有室字前六歷數千載千下有億字正不藩籬町畦不下有必字前七以自局也局作足後三人不能壞不作莫後九溪山如畫山下有煙樹四顧四字五前一僅一間間下有而止二字前八朝於斯夕夕下有于斯二字皆雲悠居悠作攸後一無所往往作住後三吾不知吾作亦後六猶有此室者王校有作事後七抑亦云王校云作示一宿之意乎乎作與六前七荆棘王校棘作榛七後三茲草堂王校茲作今八前二靜學學下有之功二字後八耕蓑釣笠友友作交九後二橫其南南作西後四璚匜盃盃上有玉字後六吟嘯嘯作咲十前九解或人之嘲云嘲下有如此二字後九忘形交形作年十一前四市井井作肆前七八遠方來用之士來用作朋來前九扁乃舊名王校乃作仍十二後四室無纖塵室作瑩十三前二蓋其所喜者王校喜作晞前三桑樞甕牖之美王校美作賢十四前五華靡之之下有習字前七霜瓣露葉王校瓣作枝前八九有明契焉有明作默有後六亦得適其適也得下有以字十五前一致習俗之侈致上有馴字前三力所不足王校足作及前六栽三楹王校栽作裁高不過尋丈丈下有而延袤深廣如之扁曰斗室時喬寓以居宴如也夫二十字前七別墅王校墅作第前八吾將以其細行王校將作嘗後一無一豪放矜肆之豪放矜肆之態作毫態驕矜放肆後二好禮之遺風風下有焉字後三以要譽要下有虚字十六前一且曰所思者且下有言字所下有謂字前三母蕞昌邑蕞作菆前四茅寇殄滅王校茅作蔓歸室祖塋王校室作定十七前四故至唐無故字後四塚上之木塚作宰後六殽核樽爼王校爼下增色養以盡其歡仍以翁之所號者名其亭嘗謂曰二十字十八前一必有悟乎悟作契後三稱爲儒士儒作端後四尤稱異之異作譽十九前一而接跡子思跡下有於字前三抑戒之作抑作懿二十前四道卬卬作印前九請先生之筆請作匄後九繩祖武武下有而繼之三字豈非浮圖圖下有氏字二一前五予老廢筆硯硯作畊前六方諄諄勗之諄下有然字二二前五以堯舜之之下有道字葢以前賢論之葢上有此字二三前五蓑笠蓑作臺後二林鋤經董君南鋤經作經鉏王校君作召後三使生所造生作秉彝下行同二四前五常人言之常上有自字後二蔽媸姸媸姸二字乙轉二五前六先儒詳之矣王校詳之作釋之詳前七言人之持物言作夫前九不失于中于作其後一必謹于持轡持作執以頤軒涪翁賦詩軒下有請字後五蔬水曲肱蔬作飮二七前七遺臭後世遺上有而字二八前一望先生有以警之望作匄前三闤中闤下有闠字前六以濟夫人人下重人字二九後一聞師訃訃下有空格王校作音後六度亭度作庱三十前七而高尙之意而作其後二以明其道明作鳴三一前四特書此以識歲月王校特作請前八一無所擾所擾作擾攘而耳之聽而作兩聽作聰後一豈虛語乎語作名後四用和侍親庭幃用上有時字後五以怡其親怡作娛金帳金作錦三二後九遇瓜田遇作過三三前二乃不以以下有我字十六一前四掩骼埋胔胔下有者字後三見念之秦之作於那復肯還于魯還作歸二前九受廛爲民民作氓後六弗判斷之恩弗下有忘字三前四鄒忠公之墓墓作葬後二如季子十字昭示字下有碑以二字尊賢之意後五則愼于稱停愼作妙後六霞雲一壑霞雲作煙霞四前四蔚如虎豹王校如作若五前五舊家北固江山北上有環字隱居南徐城市隱上有大字後一編揣摩罔旣無揣字後二求啓空格作序王校作文後三誣民之枉枉作惑六前七程門立雪程門作門前七前四爲百里宰百里作武城八後二上淸㝠淸作靑後五古先之制制作訓九前二行非他人行作用前三虎質羊皮羊質虎皮前四梨棗王校棗作栗前八小窗分燈小作曉後三有可之時可下有用字十前四蓄相籠之葠苓王校相作箱前五今南國衣冠衣冠作芝蘭前八讀生平未讀之書生平二字乙轉前九不忘一瓣之香不作弗後一千金之帚帚下有其諸感佩罔旣敷宣八字後四若同室而闘者王校而作之竊念李老君弟下有爲字子十一前五秦鏡王校鏡下增分明恭維某官冰雪襟懷雷霆號令咨詢十六字後一庶有補于將來將來作焚修後五儒雅儒上有求字十二後六恭維某官官下有前輩典刑後學模楷于以傳道授業而解惑信乎溫故知新而可爲五柳莊前自昔存舊家之菊片玉山下只今樂泮水之芹振木鐸之遺音續杏壇之雅曲先覺覺後聿成陶鑄之功己立立人正賴提撕之力自此升矣適我願兮如某者白首未趨幕府敢借箸籬某官一百九十三字後六五色筆王校色作彩十三前五已知和知作曾前七多困飢寒困下有于字後四長途王校長作窮十四後三各都各上有在字後七遺臭衝天衝作熏十五前三惟當路發神明之王校路作道政前四申明紀律紀律作舊章苻澤之兵苻作萑前八照堂上之親王校照作奉十六前八天陰地濕地作雨後七無黨無偏偏下有各守一廉冰其淸而玉其白咸稱二美弦之直而鏡之明二十二字後九蘭臺蘭作鸞十七前四仁良之俗仁作淳後一孤寒寒作哀後五蓉爲裳裳下有桂忍飢忘溝壑之憂八字王校增居陋免煙塵之汙米如珠薪如十二字後六無麟角鳳觜之奇無作匪十八後四撫字合由乎古道字作治乎作於後六孝弟可盡可下有以字後七忠信可撻可下有以字後九錢穀兵刑兵刑作甲兵十九前一斯三年而有成斯作庶前五春風春作仁前六閭門門作閻前八幸屬故知屬作辱前九反不投林反作獨後六洗手奉公公下有不聽誅求致結讐於軍帥不隨偏黨或見忌於官僚二十字二一後二秋霜霜作風金牛臺牛臺作斗城後三未暮之春未作來春作歌後五民生之本生下有衣食二字風化之原風上有國家二字二二前一民何以勸民作農後四如下有者字後五欲訓城南之子欲上有勉字後六願蒙庇天下之賢賢作寒二三前一故詞章誠有可嘉故作蓋前四常承說項承作曾後三東吳東作中北海之濱北作東二四前一作詩序啓啓下有注名紳字士行齊郡人八字前四寸丹方感方作有田野草莽莽作茅後九泉石膏肓此句在煙霞痼疾下二六前八九甚至弊生于本邑甚至作馴致二七前二城郭寢擊柝之聲擊柝之聲作抱關之柝前五力効馳驅馳驅二字乙轉後三每經斯地斯作此二八後二吳中中作下後三有感而傷傷下有情字後九抉雲雲下有漢字二九前二王國經綸經作絲前二三扶搖直上之秋扶搖作方當三十前二鯤鯨之化鯨作鵬前三小子有相依之志子作草前九幾千仞廬山王校山下有哉字後一五百年名世世下有者字後四感激之恩恩作情三一前二必先察有司之利必作尤有司作目病前三二前二三或有一得或上有慮字有下有於字前三何忍三緘何上有口字忍下有於字後一蒼海蒼作滄況人物由來之盛況作故三三後六河山淸氣河作湖三四後一朋儕儕作儔後九雖聰明正直之有有司作無私司三五後三今我求伊求作尋三六前三國家國作朝前四郡縣縣作國三七前二一言言作語前五勿刓印勿作毋前七仁見爲仁知見爲爲均作謂知後七是皆欲業耕耕下有稼字三八後六姑以前月切近者王校前月作目前後七去年去作上後九俱有堪信顯顯下有跡字三九前三驗數納征納征二字乙轉前七擬于粮內于下有秋字後五從寬免征寬作實後七下歲歲作年四十前八窮苦苦作窘前九良爲可閔閔下有焉字四一前二採辦採作催四二後二中牟之雅化雅作德後八千里里作仞十七一前五獲締孚盟王校孚作莩順平之序順下有嘉字加調甘旨之羞加上有而字後二俾葭莩之有倚葭莩作蒹葭後九尙許從容許作喜二前一二惟崇道義之文惟作合文作交三前五遠惠一綫綫作緘四前二同傾此日日作夕後一煇煌煇作熒聚拜聚作集五前七八父母之命此句在幣帛之將下後六何慕淸高王校何作仰八葉宰相之家八上有論字六前八佇看鶚薦看作膺前九宋相以福星星下有爲比二字七前七上詞履祥詞作詷前九洗耳流水耳下有臨字拄頰西山頰下有對字八前四侄孫王校侄上有小字燈火相習習作親前五一經粗曉曉作習九後一蝸居之子居作室後二如雲如雨王校雲雨二字乙轉十前二同稱人傑人作三前三而得近君王校君作居後四竹林步兵之遺遺作遊後九遂齊眉之願願作樂十一前七使方乃蒙言賀王校方作者前八景見八珍之貺王校景作驚前九奈雨淋滂沱之未王校淋作師休後二他時膝下時作年後五喜玉板之無汗王校板作枝十二前四隣民之久王校民作居後六屢蒙存問存作枉後七將謀于小席席作集十三後五敢用坐邀坐作屈十四前一泥飯之歡飯作飮前四請月仲承王校月作周後二後旬後作下後六儗飮之謀王校儗作泥十五前三一杯之飮飮作款前四郄騎郄作都後八懷不盡忘盡作能後九小席之飮席作集十七前七官空格作台候二字後九見一陽之復見作驗十九後四角黍達昌歜角作菰達作連二十前二明鏡之圓鏡作月後七小皃服勤門戶小兒作某男二一前六愚男愚上有而字二二前三枌榆甚近近作邇前四爰締嘉盟爰作言後四風紀之詞詞作司二三前三欲聚笑談聚作敍後一佳期在邇佳作節二四後六宜趣鸞臺臺作粧後九不施脂粉脂作朱二六後三聰明明作敏後六不妨聘禮之空格作來二七前四歲月日時無易易下有遲速何辭四字後六回儀菲薄薄作甚二九後五抱孫至有室之年至作當三十前六久著於圖經久作夙前九治絲執絮絮作枲三一前六禮樂聿新新作興前七其呈瑞王校其字删後六俟龍馬龜圖俟作傒三二前六聖節賀表表下有注九月初五日五字後八雞鳴而問安安下有朝夕承顏四字三三前九仰雲日之餘情王校日作物情作輝後九位鎭東宮之久鎮東作正靑三四前六傳道道作德後三嚮洪福之萬年王校嚮作享後九功盛玄綩綩作紈疑當作紞十八一前七誤改金銀之謬銀作根前九先生之心先上有蓋字後一得不以公之心公作親二前三能真蛻骨而仙者能上有乃字前四較之龍眠筆法之作諸前五而得其神乎神作傳前六皆埋頭塵坌皆作方後一題其卷云云云云作首云後九宋人宋作宗三後二神依于人也于作乎人下有者字後八其有不起敬者乎敬者作孝敬五前三各有旨趣旨趣作趣向後八當時史官時作世後九豈不信然豈作詎六前四略于名爵詳于行略詳二字互易義前五諸先生生作正前七閭里里作閻後八葬其親葬上有以字以去其風水之惑以下有祛字七前九真文公文下有忠字後五以去室中之蚊去上有驅字十五前一省墓墓作掃必邀至隣里王校至作致前五欲倍其値募募下有之字前六稱爲孝子云爲下有張字魯騫魯作曾前七聖門門作人後二其人能無愧乎王校其上有視字能作寧後六搰搰搰下有乎字十六前九而知悔悟也歟歟下有是歲庚申六月望日八字後九養子作而作而作力作十七前六以承宗嗣以下有繼字前八數年之後後作間後二以旌其門以作乞後五予常往來常作嘗十八前一畫爲無聲聲下有詩字前九豈云忘情豈作詎後一侯蓋默寓侯蓋二字乙轉後三俾以所答之語俾上有且字十九前五共推千載心推作惟二十前三而不知也知作辭前六終身如愚身作日後六劍杖劍作兵二一後二以示無窮之意耳窮作忘後三且天生斯人人下有皆有此三字後六何泥其迹爲哉王校何上有子字後八自曰存耕說云自曰作因作二三前七貽笑于大方方下有之家二字二四前六使之之作人二五前一道有大小大小二字乙轉二六前四故書之之作此後九飮牛而過河而過作于二七前二舌王校作舑前三擲礫如雨擲下有凷字度不能脫王校脫作免後六五湖三泖之間泖下有荒寂二字後九羽衣王校衣作儀二八前三一日舉舉下有觴酧二字前四鷗社主盟主盟二字乙轉前七乃丹書其辭辭下有如右二字後六致聘再三聘再三作幣三聘二九前一則無鷹揚之功武無無字功下有不成之日矣見二字前五文藻才華才華文藻前六使之康濟斯民濟下有斯世二字民下有之用二字前七雲集集作合後五今郡縣之職今上有方字三十前九而覆戶外覆下有諸字後七媍姙數月媍上有時字三一前五順天者存逆天者順則存逆則亡亡三二前八臨川董董下有某字前九革俸革作割三三後五廟貌之設宋校設下有繪以丹靑塑以土木求諸冥漠十二字後七不可解者解作曉三四前一等于三公等作次前五三孤孤作姑前七傷敗風俗敗風二字乙轉後三如者作應芳後四雖究明其其作是理無狄公無上有奈字三五前八宜乎言君子乎下有立字前九此蓋遵遵下有用字三六前八借稱借作僭後三神廟稱爲金家金家神廟後五諭拆毀諭下有令字後七愛民之意愛作教三七前六七飮食坐臥坐臥飮食後一故名之曰曰作爲後七區區老夫老夫作野老三八前一者使虜持節節下有者字後三畫啖雀之貓畫作貌三九前六特不專於此耳此下有用字所次並舉次作以前八蓍蔡蔡作䇿前九以神其術術下有如是二字王校云原本時字後一目之以遺空格作不佳手之四字後二侮聖言乎聖言作聖人之言者四十前二其一忽口吐舌忽下有忽張二字而不顧顧作停前三亦如如下有之字前四有膂力者者下有頭髮上立四字前五吾力能爲能爲作猶能適猘王校猘下有犬字後四是則第四字是則作如字後五手之口之出之於口十九一前六徹而後返返作退後一閭門閭作里後二俘掠掠作略嘗語語作謂後六騎者騎作攻二前一先君子嘗語之君子作子屢前四紀述紀作著前七譜系喪喪下有失字前八繼室張氏室下有以字後四無間者間下有然字後六貨用益饒貨作貲後七封殖封作豐今亡矣今上有親字三前四授鉅細事授上有畫字前八皆均而無私而作一後五同母二妹王校二妹作妹二人一嫁邑人張氏一上有其字張作姜四前二雖少者亦引避者作長前六戒子孫孫作姪前八亦以自悅也以下有此字五後九孝養養作奉六前九無錫膠山錫下有東字後三及妻康氏及上有先生二字後七餘俱尙幼次某俱幼後八洪武己巳巳下有冬字七前二早歲從遊從遊二字乙轉前五鐵瓶人也瓶下有巷字性聰明明作慧前九鄕里里作閭八前五如脉訣活人等書訣下有歌字等書二字乙轉後二幼兒應門應作譍後六但藥餌三兩月而藥餌二字乙轉而愈作方後八報禮報上有其字後九先生生下有曰斯人三字九前一爲世用用作而用之三字前二吳江富人吳上有然字前九其子以余父執子下有某字後六蘇州州下有府字十前二年愈長而學愈進愈均作益前八大明明下有洪武二字後一女三人三作二人下有嫁里中嚴氏五字十一後七嘗語蘭曰嘗上有婁字後九語滑稽語下有多字十二前一及教轍與女及下有其爲母三字後六茁而折鷇鷇下有而衊造是物者何滅裂九字十三前五仍與僧居之僧下有日字前九貧乏貧作窮十四前一具知處士具作且後二寧小爲錘毋大爲錘毋作錐勿錯十五前二爾永思爾永二字乙轉寄高風寄作繼前九賴人扶持人作君後二大明九丘大作文十六前一同知知作守前七揭茲攸居茲作諸後六敬事必給王校必作畢後七斯須必持持作惜十八後五仁熟之後後作秋十九前五不失矩步矩作故後一濩落蔆作蠖後八卽赴水死卽上有母字二十後七宜而弗失而作爾二一後七或得佹失佹作或二二前二可以無忝以作亦忝作靦前三戒之敬之敬作謹二十一前九其情益密益作愈二後一厥疾旣愈愈作瘳四前九孰意意作謂後二二豎成空格作後五泣血一酬酬作酧五前二怡懌懌作愉後二維淸維寧寧作靜後六七大書書下有觀霜以三字下空一格六前九狐噑鬼哭哭作呼八後二以終其身身下有願以父之靈陰相之八字王校之下增使無忝於先世六字後四願以父之靈陰相無此九字厥後後九以母可恃恃作怙九前五惟嫂之言王校言作賢十前七歲時酒飯酒作洒十二前七一呼百作王校作作諾十三後七克武克文武文二字互易後九君之老姑老作先十四前九厥疾新遘新作斯嗟哉若人若作吉後四惟母焉依焉作是後六以承大父母承作奉十六前五眷顧之間間作情前八義當久永久永二字乙轉十七前一翁其鑒諸諸作只後七而親不存存作待十八前八兒無所瞻瞻作依是雖五內雖作維後六荒烟盡迷盡作晝不思言者王校思作忍十九前一塚亦靡遺王校塚作家後七比予之謝之作走二十前三復傷之何有復下有哀字二二前三公家事數數作嚴後二同于晏嬰于作乎二三前二而赴九原原作泉二四前七厥義維何維作伊後三服役役作勞二五前五共勉厥職共勉二字乙轉後九嗟嗟友兄嗟嗟作嗟我二六前五鮎堂鮎作鱣後七起廢兩具具作興二七前三睇彼吳東吳東二字乙轉二八後一蝶血交征蝶當作喋交作霄疑宵之誤後三釵遺折蓍釵作簪後八悲風滿室王校室作堂三十前一暗於義理暗作懵前三賴親訓賴下有吾字親下有之字脫子難脫下有其字子下有之字三一前八命子林命下有其字前九以奉烝嘗烝嘗作嘗焉後一以佛之心佛下有氏字必爲之慈悲也悲也作愍焉後六而峙立也峙作樹三二前一今令還家今令作以今三三後二三寵而醊寵作範後四生於吳東吳東二字乙轉三五後五昭采翮之翩翩翩翩作翩三八前六幽魂魂作魄後九父殁于千里之外殁作役四十前四陵谷變遷變遷作改變四一前五十之八九之作常後五出乎天賦出乎作本出四二前二夷懌夷作怡後二反遭其齧王校遭作受後四日以毀棄家日以毁而壻承家而作兩四三前九夫妻諧老王校諧老作白首老者後四以盡天年盡下有其字四四前三惟茲一陽王校陽作觴前四閔其不能能下有爲者二字以宥厥辜以作宜四五後二衣不紋綉紋作文後七去年莫春春作冬四九前一靈其鑒之之作諸前七誰饟之之作諸後六將以報其萬一耶將下有何字五十前七此汝之所寫者王校此作比後一士友友作夫治丐王校治作沾五二前五鄰里分光里作壁五三前六注二月十四四下有日字後四親之子孫子孫二字乙轉五四前九素賴先世德澤王校素作仰後五庶幾萬一幾作效後八豺獺報之意報下有本字五六前三名聲載途王校名作芳前六怡懌懌作愉五七前一我三兄三作二前六安茲幽宅安作妥五九後八徐子思思作忠六一前七復靈劍之文復下不空格王校劍下增井字之下增氣復生橋梁坊巷復以狀元爲名尙祈垂裕斯十八字後二卽彼强侵强侵二字乙轉後四妥此蘩藻王校妥作寓後九雖不肖肖下有無似二字六一前五雖不克奮馳驅奮作範前七俗陋之習陋習二字乙轉後三祀先文文作致語後八當年王校當作昔六四後六意終老以歡欣王校意作竟六五前五親親之心親親作報親痛親王校痛下有二字後八每念衷曲念作論六六前七奈貝母何貝作颶前九白雲悠兮疊一悠字後一可遷可作能後二具保其妻子具作能六八前七今雨有時招呼時下有而字後二淸逸如淸下有興字後五薦此束芻此作茲六九前三幽殯宮疊幽字殯下不空格前六霜露之變變作悲前九有不能忘忘下有其言也三字七十前五癸丑丑作亥後三不能遠來來作去後七尙期垂裕期作祈七二前五不五而逝五下有日字後三嘗爲人人作令七三後四攖暴疾攖作嬰不終日日作夕七四後八物胡不齊齊作侔七五後四不鳥其形不作爾, WYG: ''}
