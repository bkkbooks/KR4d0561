  - {type: variant, offset: 2447, length: 682, content: 王校秋作淸後九茲山賴有傳王校有作相二二前一和臨寒食有感宋校臨作林後四逃難居頻徙王校逃作多二三後一之死遂聞心宋校聞作關後三遷屋詩王校屋作居二五前一江草碧搖書帶淨王校搖作挼後四爲我許君許作喜二七前三幽雅久矣王校雅作栖前六三鳳聯翩卽罷前王校卽作郞前八燈燃佛龕王校燃作照二八後九所作水仙花求求下有題字二九後七由唐轉覆宋覆宋作羈束三十前一老尊素素作宿前六生成世業宋校成作承前八縛得銛鉏王校鉏作錐後一莫怪年棄如土年下有來字三二前二時與予相善時作特前四送我但吟詩王校我作老後五六眼前事世等蟻夢王校事世二字乙轉等作真三三後二滄茫宋校滄作倉三四後三飢烏王校烏作鴻後六交數無善道王校數作鄰三五前一寵且驕王校寵且作日寵前五坐視城棄擲王校城作成後四嗟哉爾淮夷王校夷下增亡命起倉卒衡行十五載十字後五其理信弗忒其作斯三七前一歸畊溪上田溪作滆後九施天朋王校朋作用三八前一夜逃松上王校上作江後五一別經年十二霜王校年作今四十後七高誼揭中吳王校揭作藹四二前七墮浮沉浮沉二字乙轉四三前六且喜早秋頻雨雨作得兩四四前六楞嚴嚴作伽前九明月江行王校月作日後九圓似鏡圓作懸四五前九呼酒滿傾金卷荷王校滿作頻中庭舞月王校中作空後八此石冥如此竹王校冥作實宜四六前一老夫亦得時徜徉得下有與字時下有同字前八賦此以別以作爲後五樂莫樂于親俱存于作兮四七前七天風爲拂衣王校拂作振四八前三我看蘆花王校我作臥前七忽成龍宋校龍作尨前八天上人遭恐撞王校恐作怒撞上有杖字後七翻經屋上王校屋作臺五十前二對酒泉對作共五一前七百無憂無作不五二前七復哦詩哦作吟前九吟笑人吟作冷後七常談無鬼論王校談作持五三前四靑玉籠宋校籠作龍前八聚仙友聚作集後八一, WYG: 徹闕維}
