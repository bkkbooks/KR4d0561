  - {type: variant, offset: 4, length: 3, content: 勘記卷, WYG: 歸𦵏横山而姨丈弔之祭之猶無異乎平昔禮意之慇懃也數年之間姨丈不禄吾兄則折桂秋風時垣又失脚危途路迷而車覆母嫠居子戎服母東呉子西蜀回視六親皆茫然置諸弗告今也幸服役而過家哀辭一幅酸涙一掬吐母子之真情於此來之一慟哭也尊無醇酎豆無㫖蓄聲容藹然鑒此𠂻曲新河口祖墳上祭奠祝文維洪武十六年歲}
  - {type: page-break, offset: 4, content: '', id: KR4d0561_WYG_015-70a, image: WYG1218/WYG1218-0366a.png}
