  - {type: variant, offset: 4630, length: 1, content: 淚, WYG: 二千墩南浦水廻環一棹西風路不難骯髒曾於堂上坐綈袍能禦客中寒可憐學劍身今老祗有耽書興未䦨傳語心知數君子小春來借早梅看冬至即事一簾紅日雨初晴客屨駢羅送復迎賀節本非三代禮随時且喜一陽生齊奴金谷財為害楊相氷山勢易傾何似酒杯長在手青山相對適閑情冬至前二夕憶次子林不寐枕上賦詩將成忽其母夢中}
