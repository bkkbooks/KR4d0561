  - {type: variant, offset: 4901, length: 0, content: '', WYG: 麥大雪下公家租賦畢農圃犂鉏暇沽酒黄公壚分肉陳平社有時聚親戚談謔弄杯斝有時呼子孫舞蹈歌風雅舊竹幸平安孤松正蕭灑一笑謝梅花騷無補亡者贈張鍊師名善淵我昔諦觀韓子詩春秋書法風雅辭九流百家蘭鮑雜直筆褒貶非無之嵩山道士姓張氏大篇舂容獨稱美嘉乃丹衷獻赤墀欲撻羌夷安晉鄙天顔咫尺千里同母氏連環來夢中忠孝並存方寸地翩然歸袖舞春風淵今同姓復同道愛親又與同懐抱靈修未得一品題菉葹竟混金光草嗟予學韓年近百吟骨冰清頭雪白内交豈無黄與緇轉首多成兩塵隔淵乎淵乎識道理潮州老僧差可擬臨行握别敬留衣山靈起舞烟霞喜悼大林菴主日公三綱掣斷駕三車一笑今朝喜到家方外旦評喧衆口淤泥藕出白蓮花二熊耳峰頭有客歸相逢還著舊禪衣五山十刹都傳語莫遣閑雲出岫飛三憶昔雲林訪舊遊空堂六月靜如秋焚香坐説西來意門外青松亦㸃頭四一住横山二十年山中木石盡通禪老夫載雪重來日誰折梅花送上船輓無錫王門無車馬送迎忙身混泥塗寵辱忘涴火有時持䑕布濯纓何異在滄浪九龍山下青邱葑雙鯉池中碧草香生子賢如黄叔度牛醫千載並流芳感事二首草暗日欲落山逥路轉賒叔敖呼不起誰擊兩頭蛇二蹊田牛奪去立仗馬令肥安得春秋筆公然决是非邀舒文允小酌春秋連兩年喜事忽今日佳期一百五有菜二十七呼孫貰酒尊速客聚圭蓽風廻落花舞雲開逺山出鷸蚌自相持雞蟲果誰失鄉無月旦評世乏春秋筆長揖謝知已永言保真吉題秦仲暘雨竹湘山之陽湘水隂鷓鴣聲中雨涔涔此君一别知幾載别後桑田變滄海客來今雨重相看歲寒風節依然在餘事不須多感慨送徐士方之登州黄縣學教諭世態趨炎素所憎校官應喜冷如冰絲桐聲續龜山操膏火光分海市燈大釣六鼇將有兆髙堂三鱣豈無徴寄書黄耳還家日莫惜題詩貺剡藤觀音栁肉髻珠纓自在身何縁化作栁中人三眠未足扶風起似怯春寒翠黛顰羅漢松余素拙詩至詠物則其拙尤甚故昨效諸公賦觀音栁俗陋可笑今又聞有羅漢松可配前題再用出醜蓋欲求刻畫無鹽變惡為美勿徒笑其醜云十八羅漢十八公前身後身將無同一行九里西湖路應供誰家去雪中次韻答鄭元齡見贈青年肥遯方求志白首貧交獨念予開徑掃花童起}
