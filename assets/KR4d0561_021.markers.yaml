  - {type: variant, offset: 4762, length: 3, content: 王校令, WYG: 吾詩相勸匪相訐不信汝曹之心真是鐵次韻錢彦學見寄頻年歸計果何如九龍之山駒谷虚山中流泉若有語遲子續修鴻漸書二三十年來山上山詩名流落五湖間歸尋鈯斧南泉老壠有白雲相伴閒三萍水相逢記昔年馬鞍山下屢周旋羊裘不脱漁竿老彷彿嚴光也自賢四一榜三魁我舊都如今文盛說中吳詩窮不用論郊島風雅揚揚有大涂五梁谿如鏡照羣峰勝地生才淑氣鍾想像鶡冠人未老金莖露洗玉芙蓉六桑柘東風呌伯勞犁鉏南畆課兒曹一枝樂與鷦鷯並阿閣那知有鳳巢七春秋九十明年是禮樂三千夙志衰訪戴未能移剡棹和陶猶欲繼坡詩題天葩雲液軒識馬不須論牝牡相人但欲知賢否我愛天葩雲液軒中人賢在一真無矯揉戴星出入公務勞退食從容樂詩酒紫毫之筆吐天葩得意如看長安花白螺之杯㵼雲液破悶絶勝陽羡茶謫仙九京不復}
