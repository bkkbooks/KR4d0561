  - {type: variant, offset: 4810, length: 0, content: '', WYG: 日陽來復三年月閏餘芸邊生意動君子喜何如王有恒秋初貽書約囬過訪尋假館之盟故作此於丁堰姜氏迓之舊雨魚來今復來故人懐抱亦佳哉黄楊樹厄三年閏緹室葭飛六管灰文有熖光皆李杜情如膠漆即陳雷燈花有約鷗盟在莫負柴門掃緑苔龜巢稿巻十六欽定四庫全書龜巢稿巻十七元謝應芳撰詩龜山祠詩卓彼文靖公早立程門雪載道歸東南統緒頼不絶鳯鳴朝陽能幾時朝棲瓊林暮棘枝歳晚江空卜居此毘陵草木争光輝邇來陵谷}
