  - {type: indent, offset: 4905, content: 　　　　　　　　　　　　　　　　　, id: KR4d0561_krp_021-bkkind1483}
  - {type: variant, offset: 4905, length: 0, content: '', WYG: 愧我非龎徳公今年霜落洞庭早橘熟等於葑田稻青衣童子黄金丸樹頭摘來霜未乾儂家食指百三十分甘喜得皆波及嬌癡堪笑兩曾孫手㺯金丸口欲吞阿翁老饕三嚥畢教孫食之還自喫一枚一枚復一枚翁有笑聲孫亦咍枯腸久似長卿渇甘露適從仙掌來楚江萍實不可得華峰藕亦無人識冷比雪霜甘比蜜此句真堪題此橘韓子之詩今代無借作報章揮我筆懐哉故人家洞庭七十二峰環翠屏洛陽秋風塵滿城莫能汚爾雙鞋青南山不爛黄河清正須坐閲三千齡山中舊識諸耆英莫煩老夫多寄聲紅梅前代支郎亦異哉白雲堆裏植紅梅樹經刼火多番換花向春風二月開鄰舎杏桃渾赧色禪枝草木絶纎埃一時想像題詩去别日尋芳載酒來歲旦言懐去年元日兩眉攅情抱今朝頗覺寛一夜雨聲曾不絶五更天氣只微寒二曾孫杯捧屠蘇酒冡婦厨供粔籹盤最喜催租人不到田家雞犬得平安寄盧長嬰次農我思東吳諸故人二難青年才出羣炯炯眼如巖下電英英氣作山中雲一經㫖趣熟儀禮六書偏旁宗説文無由縮地即相見晉鄙亦得沾餘薫寄辛彬甫五鳳添修助益箋雙魚書尺竟虚傳桃符忽爾三年換木榻如今兩膝穿南國鶯花春甚早東洲雞黍約如前好來同賞元宵月莫返山隂訪戴船和毛伯尚雪中登塔一夜雪深三尺許江南江北久無之躋攀鴈塔最髙處想像鴻荒未判時光動山林揺玉樹氣涵湖海湛瑶池僧房或擬天花雨田舎皆占隴麥宜黄竹無歌良可喜清河有頌不妨遲八千里外多遭貶十二街中欲訪誰白戰正須逢敵手長吟聊復解人頥凭欄細聽風鈴語似亦知音說好詩壽諸葛節婦憶昔梁鴻歌五噫挈家避兵東海涯玉樓有夢上天去孟光無復案齊眉旌旗滿眼愁滿腹抱兒日夜吞聲哭沙湖㟁竹似湘江淚痕斑盡依依菉呼天籲地吐丹衷柏舟之誓共姜同桑田變海得歸路庱亭故園榛棘中教兒服勤能構穫青氊舊物兒堪託星冠霞佩蕋珠經萱草堂前樂吾樂春秋六十有八年時人喚作女中仙麻姑送酒作生日雙成獻桃紅且鮮髙堂長夜照明月何異嫦娥廣寒闕不勞白搗𤣥霜真修自有長生訣仙家歲月我不知我來為作節婦詩他年烈婦傳中寫千古萬古芳名埀獨孤公檜詩并序予前詩謂獨孤公檜在陳廟蓋圖經所載及予親身見之一日郡人徐孟曾問曰唐刺史為一州之主手植之檜宜擇美地公表而出之衆所共瞻何寘諸陳廟之}
