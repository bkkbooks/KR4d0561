  - {type: variant, offset: 4379, length: 1, content: 藩, WYG: 知幾年當時景物皆依然雲山兩岸淡籠月雪浪一江髙拍天一觀頓覺毛髪立再觀祇恐衣裳濕扁舟漁子任掀舞别渚鷗鳬自翔集奔騰澎湃無足驚人間平地風波生乗桴尼父果浮海從遊我亦跨長鯨郭府判惠佛面竹杖盖以佛狀而名之矧夫節有交互之異旁生兩枝末復為一視他杖殊不同詩以謝之頎然此君生越裳化身無乃是空王生來丈六紫金相復現太乙青藜光孫枝並出比能秀老節交錯成文章只恐化龍飛入海尚煩垂念瞽倀倀呈府官求刋思賢録忠公神遊白玉京鳳凰無復朝陽鳴寥寥二百九}
