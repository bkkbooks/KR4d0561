  - {type: variant, offset: 4893, length: 2, content: 作霞, WYG: 老暨袁子英俞茂本通政歸吳十載前一宿永懐寺龍鍾今兩來鹿苑廢如此佳爾山中人法幢扶欲起清風方文室白日靜如水門迎老詞客問我來何自忘形亦忘年相見即相契坐啜趙州茶並隱維摩几爐薫清我心乳供便老齒鈎簾看玉峰山色亦為喜新知多邂逅咳唾珠玉美白首莫逆交獨有子袁子徳星聚叢林草木亦韡韡我思古先軰支許或可擬兼旬數相過倡和不知幾庭前石榴花半落蒼苔地長揖謝山靈歸袂霑空翠陳徳廣知事以自夀之詩見示予以其災字韻險不和乃效唐人和意以夀之故落句如此云哦松未了休官去随例放閒恩更多父子一經傳有自桑蓬初度樂如何門栽彭澤先生栁籠飬山隂道士鵝最喜孟光睂案舉捧觴嬌女把香羅徳廣喜予詩和韻見貽予復答之即三月}
