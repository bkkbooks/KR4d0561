  - {type: variant, offset: 5204, length: 0, content: '', WYG: 法似南泉鈯斧單提十五年歲晚閉門渾不出忍看霜倒佛池蓮寄吕克明生不封侯}
  - {type: variant, offset: 5205, length: 2, content: 作句, WYG: 酒泉筆耕東郭太平年林居適與僧廬近也為招賢種白蓮二客來曾得問林泉書帶青青倍昔年且喜時人多未識楚江萍實華峰蓮次韻自述兩目塵昏淚迸泉春秋虚度伏生年滄江歲晚龜藏穴依舊巢居一葉蓮二雪水煎茶勝惠泉茶經重著兩}
