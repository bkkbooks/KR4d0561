  - {type: variant, offset: 5190, length: 1, content: 事, WYG: 七八月間行李歸揺尾門迎一黄耳傷心客散兩烏衣穿楊自可成勲業擢桂從他赴禮闈多謝故人能警策好鐫肝膽莫相違袁耕學先生以陶詩集句十五首見示心賞不足以辭荅之先生山澤臞遊戲詞翰中生來愛陶詩白首情所鍾集句成大章一氣春混融纍纍九曲珠螘絲中貫通嗟予目無見擊節歌玲瓏竊比蔡中郎以聲識焦桐即物因有感懐賢仰髙風孤竹首陽餓五栁柴桑窮窮非餓死比方寸將無同史稱晉徴士直哉考亭翁風俗今變改草木豈亦從黄花朱紫貴青松大夫封邪蒿匝地生指佞草絶蹤何當過横山班荆坐孤峰先生口懸河洗我蔕芥胸風帆早乗興我耳猶未聾弔薦福竺淵源公滄海塵生罷逺遊紅梅手植繼前修雲開樓閣人彈指風振簷鈴我掉頭十萬里程天竺國一乗車駕雪山牛客來舊日喫茶處煙冷薫爐憶趙州寄南京僧綱并寄唐允明雪竹霜葩歲晚時袈裟逢掖徃來嬉著書應笑龜巢老刻畫無鹽醜不知二詩滿簞瓢酒滿船時人喚}
