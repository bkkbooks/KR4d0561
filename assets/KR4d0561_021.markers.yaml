  - {type: variant, offset: 7676, length: 12428, content: 前六往膠山墓田宋校山下有耕字前八梅花杏樹杏作古二十後七楊柳花飛花飛二字乙轉二二前九自述此首已見卷三二三前六黃犢去欄王校去作出前七悲歌甯戚歌下有笑字前九後一兒飯牛空格作童拍手三字後九手可拈王校可作自二四前五烽火息息作熄二六前六皇天有意生男兒意作會後一頭欲白欲作又二七前九祖道道作帳二八前五毛穎功名應立傳王校名作多前八賀陳子經王校經作山前九不負人人宋校人人作文人後一柳絮宮袍宋校絮作染三二前三送贈題日本王校贈題作僧還前九酷肖厥祖酷作遠三三後四滄洲依然皆烟波然作舊三四前八載酒門前來問奇載酒門前宋校作好事況多載酒三六前九今瓜及王校今作欣老大正當王校大作火後七念我鹽車月老題月老二字乙轉十一三前二且琴書裡消磨且在裡字下前七一湖春水王校一上有好字前一要新枝枝作詩四前二羣賢賢作公五前一風入松王校松下有注梅花二字前八移在碧山在作家後三今四百今下有踰字六前六靑山如畫靑作江前七山童若說宋校若作羞後三鞍鼓鞍作鞞七前三教我那處沽我下有提來二字後三三竿釣竹三作一後八秋香未了秋作吹後九爲誰謳誰作君八前四問花孫孫作神後二萬羊祿宋校羊作鍾九前四艤舟舟作棹十二後二春風已老老作先十三前七濯足傍雲水傍作弄前九注徐彥銘彥作孟後七注劉小齋小作少十六後一二劍頭炊黍黍下空格作如今相見衰顏醉酒似經霜紅葉湖山佳處登高望遠徧題詩去二十五字後八待漏湖水泮王校漏作滆十七前二三烟波如畫烟波如作宛然圖前七寒歌歌下有聲斷續三字後二未能除除作消十二一後七今兩縣之民王校民下有室如縣磬四字二前三三斗而已三作一二前八計畝科數數作粟後二十之八九之作有後七何異奪烏鳶之食何上有亦字三前八冗員員作官後二而細陳之細作悉後六三百三作二四前八由漢以來由作自五前一亦淪於汚陋之習淪下有胥字習作耶俗前三一以報罔極之恩一作于前六祀范蠡蠡下有書字前七公卿大人人作夫六後七雖欲至之至作止七前八正前人之謬謬下有戾字新生民之耳目生作斯後八干凟凟作冒八後三得負荆得作一九後四珠珍之粧珍作粉十前四先生之心先上有與字前七卒莫知其非非下有矣字後一以理揆揆下有之字後六而祀之祀作奉十一前三他山之助助作石後七今天子所通祀者子下有之字後八皆未嘗有匹偶偶下有之設二字後九獨有之乎乎下有愚也二字十二前三祠堂書堂下有碑字後三一千五十年有餘年有餘作餘載碑文碑下有表字十四前三豈不樂其美耶樂下有成字十六前九旣嘗爲旣作顧後三幾見之之詩不重之字後七幸免溝壑幸下有而無恙父子筆耕粗八字十七前七較輕長短輕下有重字後一視舌猶在猶作尙後五直陳之陳作述十八前四摟墻而妻桑中之妻下有三焉雖繼室妾五字行窩旁觀王校窩下增別館所至聚麀至如新臺艾豭之醜尤有不可道者二十字前六教門不敢言之不敢言之作之辱前七恐其怨詈也詈作害前九愚惟狂直惟作性十九前三斯世斯民世作道前六不斵不支辭不支作之前七潤色之色作飾後三則虛中之說王校則下有與字二十後一種學作文之業作作績二一前一陶詩一卷卷作編後二而知其休戚知作共後七意謂痛入骨髓王校謂下增賢有司必能爲之興利除害而無困苦矣僕嘗從而聽之其愁嘆之聲未有息也特以張氏以來賦斂之毒四十一字二三前六不能辦辦下有納字後五自辦人船船下有脚力二字二四前九行乎有司乎作之二五前二且有知己己下有者字前三故不自忘僭越無不字王校忘下有其字前八不能作字不作未後二初疑謬謬下有傳字後五務如刻銘王校務作無宋校務上有爲字二六前二至禱禱下有不宣二字後五恐拂執事之意拂作咈後七如郊墟郊作鄒二七前三衆人之口口作言前四而以忠吿朋友之吿下有爲字義前六而四國流言而下有有字而盈篋謗書而下有有字後七不審動作作作止二八後八秦陸盧殷熊諸契王校熊下有趙字家二九前三作一書書作詩前九動止迪吉王校吉下增某自去秋以來父子爲人排陷今居橫山與漁樵者二十字後四姓氏氏作名筆之野史之作諸三一前五不能見汝不上有俱字前七兵途數年途作餘後一則以爲可喜王校喜作嘉後九二親嘗嘗上有蒸字三二前二不能不作未前三子心安乎子作于前六汝兄早殁殁作喪後一修行之道之作佛非吾所知吾下有之字後四予生平業儒無平字三三後九冒嫉嫉下有者字三五前三必爲喜懌爲下有之字前八熟睡無有猷無有猷作百無猷爲後七敢聞命敢下有不字三六前二二百里二作三前三美上人王校美作茂前五欣羨欣羨欣作歆前六尊細論尊下有酒字後四蒙郡守過愛蒙上有林也二字後六臨書馳系書下有無任二字三七前三問起居問上有令字後二郡庠諸友友作公後八寢爲廢缺爲作成三八後九特此未之及此下有一端偶三字三九後三鬱乎苦熱乎作鬱四十後四示教二三二三作一二後七由宋而元而作及後九勿以人廢言勿上有幸字四二前六皆無異於古人人下有矣字前九猶不亡也也下有耶字後四同于一誠也于作乎後八面識之餘王校面識作識詧性可賢父子佳章性作惟四三前九亦不强與之語也不下有必字後四不細論王校不下有及字後九餘文縷述文作不四四前三余先生文敍文敍二字乙轉前六余提舉舉作學後四某詞穴長