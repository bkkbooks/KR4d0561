  - {type: variant, offset: 4906, length: 4, content: 七僧坊坊, WYG: 耶予曰按唐書徳宗朝徙公為是州刺史去梁公毁江南滛祀之日未久無陳廟也唐衰禮廢淫祀寖興迨五季而禮法大壊叢祠之神類加尊號陳廟或肇於唐末而盛於斯時今荒園廢沼安知非昔日驛亭傳舎乎厯宋而元皆無改}
