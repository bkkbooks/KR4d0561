  - {type: variant, offset: 5386, length: 1, content: 陰, WYG: 眠到夜深方自省莎雞鳴我枕頭邊二廣寒宫闕吳剛斧桂子天香總浪傳古意正須人黙識華峰絶頂藕如船三青蠅盡集汚衣巾白鳥雷鳴夜噆人安得天教生處樂百蟲俱蟄四時春秋興七首臺笠朝京天下同楓宸頒賞不論功人材列郡三英粲歲事連年百榖豐村鼓鼕鼕喧社日酒旗獵獵舞秋風螭坳誰秉春秋筆為祝皇家紀治隆二凉飈微起早秋初炎宇蠅蚊未盡除厯代興亡聽燕子幾家慈孝學烏雛面皮寧受人人唾頭髪還教日日梳堪笑六經俱忘却夢中猶讀啟蒙書三大暑方徂火始流絺衣遽易木綿裘穹林木落風猶怒破屋茅飛雨未休虎豹九闗冠有豸華夷一統佩無牛願言耕鑿終吾老老瓦盆邊擊壤謳四疇昔愁聞爛石歌并愁無地避干戈如今喜有清河頌更喜横山得薜蘿旅鴈帶人家信至霜楓似我老顔酡紛紛紅紫時為貴老圃黄花變易多五矮牕兀坐􅈸擡頭劍氣依然射斗牛石}
