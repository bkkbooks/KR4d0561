  - {type: variant, offset: 5192, length: 0, content: '', WYG: 地行仙抽絲適有冰蠺繭好為焦桐續斷絃東洲觀音堂甃瓦歌七佛之師觀世音十方化身無古今補陀金刹南海現無價寶珠龍女獻東洲築堂五六春茅茨乃作有漏因珠冠白衣漬泥潦龍王女兒應笑倒豈無圬者善安排不堪空打赤白崖鴛鴦瓦合數千百圓通大士居安宅衆毛集來成一裘震風凌雨更無憂青銅錢與珍珠粟今生布施來生福松竹梅三詠歲寒松柏冠山林論語埀名照古今韋偃畢宏俱即世傳神頼有草堂吟二淇箓猗猗比武公清風本與首陽同六經煙滅秦坑後嘉爾雲礽紀載功三吳王醉處十餘里僅}
