  - {type: indent, offset: 4876, content: 　　　　　　　　　　　, id: KR4d0561_krp_021-bkkind1471}
  - {type: variant, offset: 4876, length: 0, content: '', WYG: 惺憁本有餘欲識顔曾愚魯地一鞭希驥莫躊蹰十舊家青氊什襲藏兩兒斑衣長侍傍人生可樂有如此一日可比三千霜昔人謂積憂成隂積隂成雨今隂雨之久且多竟不知何憂之積以致然也淺陋之辭姑識歲月時乙丑夏五望後九日也常年五月衣輕葛今年裌衣猶未脱一天凛氣隂如秋谿山黯淡煙雲稠有時雲罅曜靈出頃刻朱光暗如漆商羊飛來作人舞羣鳩醉葚渾無語雷聲虺虺雨浪浪一雨十日夜亦滂人家屋壊什}
  - {type: page-break, offset: 4876, content: '', id: KR4d0561_WYG_017-10a, image: WYG1218/WYG1218-0408a.png}
  - {type: indent, offset: 4877, content: 　, id: KR4d0561_krp_021-bkkind1472}
  - {type: variant, offset: 4877, length: 0, content: '', WYG: 九床頭泥淖生蝌蚪疑是彼蒼媧石裂天河水漏何時竭補天無術正憂心水鄉之田俄陸沉常州地接蘇湖境青苗在田知幾頃農人惜苗如惜兒苗死一時真可悲全家老稚仰天哭天若埀憐天雨粟不然歲饑方薦瘥里胥催租將奈何贈時義夫生民天降衷所性無不仁物欲肆侵蝕乃底失本真嘉爾鴻鵠姿超然雞鶩羣里有賦蛇毒比屋含悲辛呌閽聲徹天恩波活枯鱗老我無能為喜此聲譽聞願言一簣進將來見嶙峋貽吕雋人生異禽犢秉徳方寸許一本尊所生推恩篤諸父嗟哉淳朴姿片言不輕吐去年赴叔難代服徒役苦槖饘復今年赤脚走風雨紛紛蕭艾中薫然見蘅杜顧予子若孫疇能類於汝宜從竹林遊氣習變齊魯挽徐仲清妙年博極軒􅄮書晚景晏安閭里居小山叢桂蔚如故大兒一官清有餘落成客散烏衣宅送葬人來白馬車安得並騎箕尾去逍遥八極曵霞裾夏五即事貪墨何多禍蔓延刮毛龜背欲成氊千村萬落炊煙斷田舎逃亡犬餓眠寄王尚絅陳子儀諸友起予每憶二三子投老于今九十年自是片雲相隔爾如何尺素亦茫然蝦蟇産鼃横山下螃蠏輸芒滆浦邊若問龜巢舊風景月餘隣里斷人煙簡無錫華景章百書不如一見面此語信然胡未然燈花有約半年久桂子已落中秋前東門種𤓰抱溪甕西齋瀹茗􅆽山泉少遊鄉里樂如此應笑鳶飛瘴海天寄徐伯樞東膠山人不出村南州髙士之裔孫十年曾作螻蟻夢四壁祇有莓苔痕松分女蘿補茅屋筒引乳泉澆藥園别來幾度屋梁月顔色宛然清且温寄丹陽孫秀民翩翩白鴈秋風凉紛紛白蘋秋水香官河兩堰隔三舎旅次一違今十霜菱芡練湖秋大熟莓苔劍井夜無光故人知我老癡否年似伏生書盡忘懐京口俞伯鎮鐵甕新城舊隱居江山勝槩畫圖如五條街口多輿馬萬巻書中老蠧魚道合不妨鄉土異情親可奈信音疎杜鵑花與人俱好珍重題詩一寄予洪武乙丑秋新鄭縣學以通經薦吾孫塏移文本縣徴赴吏部塏於六經有望洋之嘆且欲辭而不可得予以孔孟之書列乎九經塏嘗受業故臨别示此數語朂之猗歟古聖賢遺言存簡編孝經及論語孟子書七篇載道繼六籍煌煌日星懸斯文覺斯民千有五百年汝生家避兵九經失青氊借書二三策教汝朝暮間大哉孔孟學曾如管窺天還鄉願卒業奈汝多迍邅朅來誰薦鶚通經乃虚傳徃哉詣春官從實吐肺肝絲麻雜菅蒯博采豈舎旃天朝恩惠寛茅拔茹或連立身報君親慎勿違至言送楊景子以通經薦舉之京亭亭青玉桐孤生秀中林雨露得所飬歲月亦已深良工㧞奇才獻作羲皇琴繫以朱絲絃鼓之丹鳳吟八風宣九垓令人格非心鄭衛化韶濩太和無古今吾將洗吾耳朝夕聆遺音和景子冬至韻隱隱鐘聲出景陽陽生望闕賀朝忙勲名有日印如斗舞蹈今朝靴滿霜咫尺天顔春色喜輪囷雲物瑞光長錫錢張宴宸恩厚一舉真堪累十觴冬至}
