  - {type: variant, offset: 4635, length: 0, content: '', WYG: 年距洞庭三百餘里仍以林屋自號示不忘也徴予詩故厯叙其遊息之概如此云一目九州皆戰塲避兵林屋水中央林屋仙人不知處橘井委棄青霞漿木奴包金亦致㓂人乃随雲出巖岫五湖三泖放孤舟遵海幽尋采三秀堪輿再造隔兩塵故鄉來歸能幾人芙蓉湖上大横峴煙連緑樹横林春解裝付與箕裘子管領春風桃與李幅巾自作逍遥遊别有行窩修竹裏一童出入長相随欵段之馬亦不騎林屋别來陵谷移時望白雲猶賦詩膏粱文繡俱不喜獨曰愛詩心未已堪笑老夫同此心白首論交結知己何當呼起李謫仙每飲一斗吟百篇殺青盡伐南山竹剰録好詩娛暮年悼許君善谿西老人山澤癯一生祗以詩為娛常言愛詩入骨髓好詩抄藏千百紙七言近體尤忺作不費工夫細琱削嘔心每笑李家兒牛鬼蛇神何足奇老夫初焉未相識數篇不知何處得稠人廣坐誦吾言説項過於楊巨源一朝傾盖千墩下膠漆相投不相舎西鄰假館兩年春買宅移家情轉親此時吳門正堅壁張角未死人相食雲梯砲作霹靂聲狼煙暗天血滿城吾徒幸若王官谷朝夕同吟紫芝曲桑田變海嘘吸間死欲邱首歸横山暮雲春樹勞逺憶十載詩筒仍絡繹重來桑梓甚蕭條巷有索租人呌囂骨冷九原呼不起一酹非歌續蒿里嗟哉時俗貴輕肥如子愛詩人亦稀贈王仲昭父子扁舟入吳空載月閭邱虎邱俱不謁停橈再拜范公祠楊花正落祠前雪義田義宅三百年義聲洋洋天下傳嗟爾吳之人胡不踐遺躅貪夫婪婪昧盈縮前車}
