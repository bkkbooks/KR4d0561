  - {type: variant, offset: 5169, length: 2, content: 作赤, WYG: 笻杖扶踔踸故舊驚骨立兒童嗤貎寢時子適見蔑為我言責沈心持一寸鐵詞吐五色錦所喜得三益豈料别數稔嗣音竟茫然屏跡疑逺甚近從支遁遊因聞許詢吟家住洛陽橋窗含滆湖浸煙波隔紅塵雲樹幕清䕃安得忘年交時能邀月飲文章論大雅酣適就髙枕人生貴佚樂此樂真絶品}
