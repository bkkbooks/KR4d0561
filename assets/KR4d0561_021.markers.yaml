  - {type: variant, offset: 5365, length: 0, content: '', WYG: 不要譽不求福髙義景前修遺風振頽俗惜哉時無鍾子期聽我焦桐彈此曲性存真公以南泉鈯斧入天寧天叢社猶附庸也龜巢老人}
  - {type: variant, offset: 5366, length: 3, content: 投四四, WYG: 歌以送之歌曰吾聞西方教無相無住著單提了無礙羣居亦同樂大林新法幢天寧古道塲屋皆雲半間庭各月一方不縛肚上篾不舐瓣頭蜜何以飬幼軀自種還自喫􅂿翻生死海坐斷聞思修獨園銀杏樹應作石㸃頭寄南京僧綱和尚去年同看中秋月東閣開牕夜賦詩閣下桂花無恙否秋風又到去年時八月旦辛易齋書來知耕學袁先生客死秣陵以詩哭之吳門山水隔陳雷魚鴈依然數徃來秋晚書題霜}
