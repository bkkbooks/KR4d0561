  - {type: indent, offset: 4641, content: 　, id: KR4d0561_krp_021-bkkind1394}
  - {type: variant, offset: 4642, length: 0, content: '', WYG: 滆浦鏡無塵牆東病叟頭如雪也喜曇華並得春贈天寧寺無學長老報恩扶起法幢來鐘鼓天寧講席開道出語言文字外卓然聲價自崔嵬二麻衣䟽屩古人風儷葉駢花一掃空八萬四千修月手斧斤随入象王宫賀府官重修多稼亭朝家重下蠲租詔郡圃聿修多稼亭一帶金湯增氣概四郊禾黍勝丹青甘棠風}
  - {type: page-break, offset: 4642, content: '', id: KR4d0561_WYG_016-39b, image: WYG1218/WYG1218-0388d.png}
  - {type: variant, offset: 4643, length: 2, content: 特鼠, WYG: 婆娑舞横峴雲開翡翠屏斤斧聲中勸農意爾農豐樂正須聽周節婦詩呈府縣官滆湖水出白鶴溪大江潮來溪口西江潮湖水接連處節婦姓陳周氏妻良人早世舅姑没抱雛日夜號空閨盡拈奩具易䘮具衣有淚血髽無笄績麻絡絲紡具織破牕夜雨風凄凄孤燈照影伴寂寂寒風夜雨聲酸嘶煙塵逺避東入海兒方長大能鉏犁時清歸守舊桑梓布荆蕭瑟茅茨低青絲兩髩變蒼雪皎如玉樹無纎翳前年縣官帖鄉里覈實上府文可稽老夫近聽路傍語聖皇徳與唐虞齊天語諄諄為天下求賢悉上青雲梯閭閻未見旌表節門前草没青苔蹊願言宣聖化郡邑罔俾側陋薫蕕迷旌善亭中名一題恩同璽書封紫泥佇看俗習接武皆麐蹄再贈衡志通世俗以甘㫖奉飬者為孝温清定省之禮鮮能之今寒區衡氏兄弟三人皆善飬其母其伯兄志通禮意之勤老而彌篤冬月則以身温被席雖大風雪母不知寒能此一事可配古人能勿美乎故}
  - {type: page-break, offset: 4643, content: '', id: KR4d0561_WYG_016-40a, image: WYG1218/WYG1218-0389a.png}
  - {type: page-break, offset: 4643, content: '', id: KR4d0561_WYG_016-40b, image: WYG1218/WYG1218-0389b.png}
  - {type: indent, offset: 4644, content: 　, id: KR4d0561_krp_021-bkkind1395}
  - {type: variant, offset: 4646, length: 1, content: 齒, WYG: 此續前所贈詩以補其闕云雞鳴雪屋起居安魚出冰池食飲懽最喜兒能温被席慈闈冬盡不知寒寄馬䭾沙陳糧長老龜獨巢蓮葉秋元龍髙居百尺樓長江只隔衣帶水佳景宛在蓬萊邱一年時序換新厯四海弟兄懐舊遊竹君寫我歲寒意聊作梅花寄隴頭送曹徳昇赴批驗茶引所山無猛獸水無蛟邑里春來樂意饒部集茶商新箬籠壚添酒市古溪橋赤心報國年方妙黄耳還家路不遥珍重清時用刀筆平陽遺澤正寥寥謝新鄭縣官助葬亡子并以志略送去轉縣學去年孟秋初天旱火雲熱吾孫奔父䘮病眼淚流血陸行二千里􅞶踔若跛鱉歸來秋盡時黄埃滿縗絰詢言父襄事從頭為予說一衾覆黔婁家人影單孑䘮具百無措宿儲瓶亦竭幸逢賢縣令賵贈意切切擇木製美棺飭匠夜不輟僚寀同哀傷祭奠豐且潔青青諸佩衿感化重禮節是猶風偃草宏綱頼提挈吾知賢令心髙誼等前哲無錢及元振有則與同列無麥及堯夫有則與同轍悲哉我中子忝教兩期月眷言古東里圖經自來缺編蒲載前言辛苦磨硯鐵草創十八九放筆成永别手澤存於家歲久恐亡滅抄書送琴堂公餘賜披閲韞櫝庋􅓺舎無為醬蒙設會有作家手織錦為補綴姓名蠅附驥九泉應感恱矧知埋葬恩寧無報銜結老夫懐謝言縮地恨無訣殘喘苟朝暮烏能見鬷蔑坐馳仰崧髙心聲吐嗚咽述懐䨇眸半瞎耳全聾年及新豐折臂翁孤陋一生棲白屋虚靈方寸炯青銅人如禽犢真堪耻家有詩書未是窮但願太平田野樂九原髙卧聽松風人日和前韻二首曾聞社酒可治聾椑榼分來謝里翁鈍士常磨龜硯石貴人多佩虎符銅人前出語羞稱好杯}
