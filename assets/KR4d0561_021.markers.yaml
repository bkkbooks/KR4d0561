  - {type: indent, offset: 4892, content: 　, id: KR4d0561_krp_021-bkkind1478}
  - {type: variant, offset: 4892, length: 0, content: '', WYG: 泉下遊藍縷免致先人羞生前相徃來二老亦風流横山歌夀萬拙齋横山之顛青入雲冠冕一邑無與倫山南風景最佳處隱居豈是尋常人此山鍾英三百載素封不乏青氊在向來吳下避煙塵恨不移山東入海還山喜得無崩騫種玉舊田耕紫煙雲屏正設後堂後空翠直灑前塋前觀雲每日烏皮几灌圃有時龍井水人家雞犬寂無聲宛若桃源畫圖裏山中羽人年八百昔日仙宫今佛宅丹砂未必駐童顔把酒看山真上策山乎山乎徳不孤靜而夀者山為徒美哉山禽知此意石榴枝上呼提壺我歌横山歌未了拙齋為我開懐抱移宫換羽作新聲彈入琵琶歌更好百斛葡萄為傾倒屢年作小詞或詩為萬拙齋夀癸亥夏五予以鄉人嫁禍兒軰徃崑山救之作此詩予懐紫髯翁新作緑野堂常年初度日嘉賓四筵張虚左待老夫酌我九醖觴甥孫舞鴝鵒絲竹鳴鳳凰情與酒俱深飲量非汪洋今雨獨不至應憐走他鄉峩峩馬鞍山絶頂遥相望横山一髪青滆浦西日黄想像祝睂夀有如賦髙堂留别永懐寺}
  - {type: page-break, offset: 4892, content: '', id: KR4d0561_WYG_017-18a, image: WYG1218/WYG1218-0412a.png}
