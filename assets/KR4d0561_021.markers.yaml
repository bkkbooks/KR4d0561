  - {type: variant, offset: 4717, length: 1, content: 十, WYG: 壁莓苔衣前榮燕雀來賀喜中林猿鶴還相依山中服食何所有松根茯苓大如斗松拂輕於白玉麈松醪香似黄封酒座有嘉賓樽不空每日共澆談笑口不言不笑黙相契平生久要蒼髯叟向來百卉腓且衰偃蹇不受冰雪欺尼山聖者無復起歲寒}
