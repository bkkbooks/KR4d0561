  - {type: indent, offset: 4633, content: 　　　　　　　　　, id: KR4d0561_krp_021-bkkind1391}
  - {type: variant, offset: 4633, length: 0, content: '', WYG: 期鄭校頗聞衿佩集歐詞應作送迎詩久無書信來黄耳每有親朋問白眉阿母夜來曾夢汝甘分仍在舊西枝送楊純夫歸琴杜子客長安行囊本枵然得錢沽酒覔鄭䖍不嫌官冷寒無氊爾來六百有餘載世道多随陵谷改身為今人心古人清風髙誼依然在嗟我如鄭貧蒙君愛如杜雖無三絶才樗散頗自喜一從傾盖意相得頭髪不知誰黒白衝寒觸熱每見過愛我西牕好山色援毫或和龜巢編解纓或濯龍井泉常言好古絶類我外物多忤中彌堅低頭甘立矮屋下髙論直到羲皇前朝來賣得凌雲賦麯生車載來相顧門前尺雪凍不消風木吼如虓虎怒宿宿信信傾腹心言欲挐舟抵家去呼兒更酌罄餘懽贈别殷勤抒情愫我昔居吳十九年君歸煩君訪諸友吳山醉處好湖山十闕鄉人來作輭脚局且對春風開笑口街頭米賤酒亦賤一百青蚨滿䨇斗儘判連日醉如泥百憂盡付無何有人生窮逹各有時阿衡元是扶犁手詩書豈徒守章句言行正須傳不朽珍重林居慎厥修好音慰我思悠悠雪篷為蔡子堅作鴟夷船載西施去遺臭五湖煙水路喜爾吳淞雪篷闕江水曾無尤物汚篷牕洞開天雨花柂樓屹立水為柱鵝鴨不驚柔櫓鳴鷗鳬渾在平沙聚非熊無夢釣無餌如琴無絃得琴趣虎頭能為畫漁蓑驢背無勞見詩句潮州阻雪八千里諫書直抗曾何補殘氊囓雪十九年使節堅持亦良苦雪篷之樂樂於天雖欲同人人弗取獨有山隂王子猷清興頗堪同日語過顯慶寺六載重來釋氏家一甌新啜趙州茶杏花風後春何冷柏子庭前日未斜拄杖頼能扶潦倒闕文煩為補楞伽要聽說法頻來徃且喜平橋路不賖書潞城樵舎壁燕子來如舊雨桃花笑為何人竹下青苔不掃恐教鶴歩生塵二一室四皆立壁六孫三已歸妻猶喜老萊舌在不妨矮屋頭低三㧞木狼無䟦㚄絶糧道阻周流天眼或開或闔人心何怨何尤四瀼東瀼西農畮巷南巷北人家白雪秋香禾黍緑雲春靄桑麻劉徳祥監税江州客有誤傳其子死者遣人回家并寄書吾孫辭甚酸苦因賦詩代簡九江相去二千里一别于今五六年盡道國恩容告老安知家信有訛傳山連楚尾青天外潮落潯陽夕照邊遥想此時公務隙爐峰相對思悠然題趙行素佩韋齋綵衣翩翩童丱年佩觹佩韘庭闈前鐵馬紛紛戰争日佩犢佩牛江海邊幽蘭紉佩非不好獨醒未欲追前賢朅來佩韋不佩弦常以輔我氣質偏視韋之緩我之急如餌良藥沉疴痊世事多因忙後錯緩不及事理亦愆不疾不徐發中節秉彞庻得全吾天巖廊鳴玉似髙歩江妃斛珠人浪傳貪榮可笑蘇季子佩六國印扶危顛何如茅齋但安坐且有竹風堪醉眠青山於人少知者白雲與我同悠然韋乎韋乎心自懸得魚吾豈忘吾筌贈黄仲器予觀道書謂洞庭山有林屋洞天仲器以避兵居之既而過雲間適海上復還常之横林閲歳月}
