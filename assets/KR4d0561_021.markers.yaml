  - {type: variant, offset: 4902, length: 0, content: '', WYG: 敲門看竹客來疎匣藏神物蛟龍劍架揷古文蝌蚪書風雨一春門不出門前車馬自紛如宿僧房澹泊齋鐘鳴雨樓風滿天金猊吐盡㫋檀煙誰知林下一宿覺我有石上三生縁懐郡城諸親友余生篤親友平居數相顧老去筋力疲此心尚如故年年二三月晴曖入城府沂雩童冠俱所樂随所遇安知今年春十日九風雨甚疑媧石漏無石可修補一榻髙堂氏四壁蝸篆古牀頭丹菌出青苔灑庭户羣芳狼籍盡來牟紅半腐我耳未全聾聽之亦良苦頼有二三子時復共樽爼或歌竹枝詞或賦梧桐句鏗鏘迭倡和所樂勝鐘鼓歸舟掛晴帆快若馳馬去圓天磨青銅新渌漲南浦候門童穉奔滄洲舞鷗鷺峩峩屋上山厯厯山上樹白石喜不爛且無泥滓汚不見黄初平散卧羊無數尸坐對煙霞神交憶支許何時松葉酒薜蘿徳星聚瞻彼片雪闕援毫抒情愫賀太平寺講主生公坐擁㸃頭石野老來聽焦尾琴祇樹獨園春又夏雜花千界古猶今壁無畫水傳奇跡塔有風鈴作妙音安得刮除雙眼膜時陪杖錫一登臨感興四月初九自城中抵家得前四句後旬日足成之兩目眵昏耳又聾僅存方寸古秦銅忘機自得親鷗侣含弩從教伏射工百越溪山詩枕上四時風月酒杯中惜春無奈春狼籍頻遣蒼頭掃落紅端午日懐古五月五日追前賢九歌九章鳴素絃蛟人應泣魚腹葬龍伯合贈龜毛氊招魂感舊痛梁壊反騷媚新圖瓦全楚天盡處卧遊去艤丹酹月羅江邊西塘詩為郭彞倫作具區東北三千里家住西塘水之涘滄洲不涴軟紅塵一鏡波光照牕几西塘本無風物奇有功於民民稱之早田霑溉數百頃苗無槁死年無饑非湫非壑非瀚渤不為蛟螭作窠窟輕舟徃來快如馬撥棹人如執鞭卒東鄰西舍雜漁樵朝出暮歸歌且謡白紅荷花紫菱芡􅍉苕蘋蓼蒲蘆茭髙齋讀書歲年久鍼經一編常在手客來問疾或問奇拄杖挂錢舡載酒人人有此林塘幽不妨未老先菟裘地因人勝從此始千古萬古芳名流端午後雨阻過詹氏蘿屋即事賦絶句二首代簡風打舡頭輓不前舡回雨㸃大如拳請看六日蟾無用且得爬沙手脚全二瀕溪數家風景幽溪流過門東轉頭黄梅雨少麥大熟買布輸官不用憂人面獸懲元惡也惡不可縱天不可欺故作二詩以懲之人面獸長七尺人衣冠人飲食面有七竅皆人形猛獸之心人莫測生來害物固不少羣居猶自藏牙爪一朝忽欲咬殺人豹麝文熊皆驚倒二人面獸聽吾語一人受害一家苦爺孃妻子令失所殘忍胡為至如許人言汝性多隂毒中汝毒者恱汝目快汝腹汝心方饜足嗚呼馮婦或再生獸乎獸乎勿横行恢恢天網布八紘莫道網疎可漏天聾盲追悼諸葛用中諱端幼年能寫大字既習舉子業學琴袁子方先生之傳父號徳齋晚學道創清微觀揚子江南疇曩日吕蒙城裏一文星科塲早試程朱易𤣥學旁叅道徳經愚與通家心甚赤賢能知巳眼常青草生書帶人皆喜竹作詩筒使不停著處溪山朝載酒有時雪月夜揚舲卜鄰晚欲從王翰分席尤加敬管寧一旦谷陵驚變改十年兵火苦飄零扣門幾誤風敲竹泛宅長如雨打萍天上玉樓俄有召月宫娥藥竟無靈細君冠佩全貞節先世箕裘祝寧馨名溢東吳滄海國魂歸北固白雲屛兩家相去百餘里一老今踰九十齡聯句每懐吟石鼎聽琴頻夢坐柯亭柱題應有能言鶴擬踏秋風去一聽寄鄧秉文二首曹横山下聱叟吕蒙城中放翁何夕舉杯邀月中秋鼓枻乗風二鐵柱硉矹二老璿霄沆瀣三更絶口不談時事掀髯聨敘平生寄陳彰逺明逺兄弟金牛臺下帶經鉏長鋏無聲食有魚兄弟五人雙璧在箕裘三世一廛居中秋明月最端正長夜浮雲或巻舒覔得丹梯上天去同將物理問何如寄辛至善青年即著逺遊鞭白首仍居小市廛寂寞蓬蒿三徑在辛勤父子一經傳奔牛堰下水到海射虎亭西山揷天我欲抱琴尋戴去中秋相近月將圎寄清微觀周泉石塵揚滄海廿餘齡真館翬飛壓庱亭風掃刼灰南土樂天開圖畫北山青丹砂九轉龍蟠鼎玉漏三更鶴聽經諸葛仙翁呼不起正須金石播遺馨三笑圖簡寂先生五栁翁襟期適與逺師同過橋相送忘相别千古風流一笑中風雲雷雨畫四首吹嘘萬物生蘧廬盎盎元氣槖籥吁偃禾㧞木有未㑹請君細讀金縢書二漠漠閑雲淡淡容不為蒼狗未從龍直須霖雨成功後依舊還山伴赤松三金電光中霹靂飛殘臣膽落震驚時雲收雨散青天出能聽無聲有阿誰四誰挽銀河沃太空恩霑赤地洗爞爞隂隂夑理天家喜都在丹青筆意中野雲歌為王元一羽士作山中之雲歛蹤跡空谷深藏伴泉石從龍之雲雷電俱四方行雨勞馳驅飄然一片雲在野看來最是悠悠者或舒或巻無朝夕南北東西随所適道人含笑松下坐我即是雲雲即我買臣讀書圖噫予㑹稽守素行何卓絶采樵工或餘誦讀聲不輟青柴擔頭春赤脚林下雪富貴知有時妻子從改節髙風一如此後世誰可埒吾將訪遺蹤更得探禹穴薦福寺紅梅詩紅梅閣事見毘陵志等書庚溪詩話載程致道詩有春風日浩蕩醉色回冰肌之句元末兵燬今本山釋源公竺淵恢復舊刹重植兹花丐予詩記之紅梅閣下梅花樹陵谷變時風㧞去堯峰老禪歸故山覔得孤根栽舊處年年春到花時節一株五出胭脂雪春風笑面歲寒心光霽混融風韻别老禪道服忘妍醜品題假我扶犂手黄州定慧海棠花可與齊名傳不朽月香水影象王宫雜花世界將無同幾度拈花有人笑吾將請問瞿曇翁源竺淵以道西傳等和予詩亦蒙見贈且云臨字等韻難和予由是復次韻酬之支許論交世所欽昌黎亦聽穎師琴深山大澤多遺逸明月清風無古今閣下梅花桃杏色庭前柏樹海潮音寫容代有丹青筆電目誰能一照臨獨孤公檜詩唐獨孤憲公為常州刺史時有手植之檜今見諸郡志等書元末樹毁於兵至二十餘年為州民者}
