  - {type: variant, offset: 4889, length: 1, content: 曳, WYG: 日附寄黔陽四千里外之官去百丈牽江舸艦安新沐恩波從日下舊家門地不氷寒洗心正在詩書澤換骨毋勞内外丹新歲僕歸正二月家書細寫阿翁看簡陳子章先生身不封萬户侯眼不識千金裘深衣幅巾避兵矛徃年零落崑山州兵餘還鄉理西疇臺笠播種襏襫收今將蓋棺萬事休但欲服飾如前修先生舊衣巾暫爾可借不縫人遵古制素願吾乃酬飄然}
