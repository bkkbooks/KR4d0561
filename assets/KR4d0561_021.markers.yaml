  - {type: indent, offset: 5110, content: 　, id: KR4d0561_krp_021-bkkind1543}
  - {type: variant, offset: 5110, length: 2, content: 後七, WYG: 鈯斧單提不暫停黄花翠竹總忘形問渠送米盧仝意也愛茶聲有可聽右寄延福菴主四雲峰毬子逢塲戲一笑春風舞袖歸從此晏然門不出忍看沙界有危機右寄僧闕長老五崑山絶頂立浮屠海闊天髙氣勢孤莫道八風吹不動八風吹動有人扶右寄僧勝上人六玉峰巨邑冠東吳在處金園似給孤手把竺書朝夜讀此心能轉法華無右寄僧善性空送郁友文之京揚子江頭春二月送客登舟赴天闕男兒生有四方志莫作尋常黙然别憶昔孺子歌滄浪尼山聖人曾激揚我賡再歌呼索郎子其洗心宜勿忘次韻奉荅瓢齋先生見寄二首齋居一榻坐來穿腹笥羣經老欲眠夢裏亦行端正路醉中常造渾涵天春光荏苒無多日天氣霠霃近禁煙舊雨不來今有約虹光遥望載書船二予家經亂離蕭條無六親遥憐竹林阮}
