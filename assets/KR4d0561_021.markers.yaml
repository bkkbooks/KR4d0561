  - {type: variant, offset: 4831, length: 0, content: '', WYG: 先生横經虎皮席弟子立雪梅花庭延陵躬耕地井井尼山聖父碑亭亭正逢海内興賢日豈作江隂老客星泮宫芹藻得佳趣隣封草木沾餘馨龜巢一老辱篇翰鱣堂幾時瞻典型趨裝又欲覲金闕飲餞愧無䨇玉缾淵清冰潔知者衆㑹有孫邕薦管寧予以小爐閣坐卧安燠名之曰熙熙甕天孫塏到江隂語劉小齋先生蒙篆書四字見其筆畫清勁可喜作詩報之乃翁澹齋先軰能篆𨽻而文為鄉郡所稱詩中故追美之昔在金斗城晤言即相違今觀玉箸篆神氣不少衰澹翁心畫傳師承古人誰秦相漢中郎殆欲肩相随舊家冠盖里密邇延陵碑古意師聖筆真贋吾何疑正如善相馬而忘牝與驪懐哉楊子雲載酒當問奇奈無縮地術龍鍾空坐馳周節婦陳氏吾甥也早寡頼其母撫恤之恩為多母卒且以語付託我夫婦擕之避兵居吳中十有餘年白首歸里一生艱苦老夫獨深知之故書此以紀其畧云哭夫未了又姑嫜獨抱遺孤涕泗滂奩具賣來營葬具不憂寒餓死空房二南山石爛海揚塵風雨飄揺笠澤濱嗟嘆渭陽田舎老辛酸同受十三春三狼煙未息歲仍饑蛟室相隣地亦危長夜㸃燈機上織明朝換米釡中炊四戰骨縱横歸路迷烈塘疑是越來溪良人地下應憐汝不作}
