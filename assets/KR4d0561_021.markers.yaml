  - {type: variant, offset: 4679, length: 0, content: '', WYG: 感年咄彼新豐折臂翁偷生年與我}
  - {type: variant, offset: 4680, length: 0, content: '', WYG: 同世無兵革真難遇家有經鋤未是窮兒子冷官成覆水老妻春夢逐飄風獨憐未畢全歸願兩目昏盲耳更聾天有眼風波起平地胥溺無可援荆棘生大塗跬歩不得前清朝赫赫嚴紀律汚吏貪婪弄刀筆翻雲覆雨妙若神白日青天暗如漆天有眼視必明何忍覩此世人之不平轟雷尚擊黨碑碎炎霜豈不飛闤扃惜哉延陵好州邑呌囂之聲雜號泣龔黄卓魯幾時來解我閭閻倒懸急天有耳腹中或有劍對面難隄防笑中或藏刀轉頭多中傷人形獸心險莫測擠人火坑猶下石東隣西舎苦牽連爺娘妻子多狼藉天有耳聽必聰何忍聞此世人之不公恢恢天網或汝漏百靈未必皆癡聾嗟哉尼父無復見冶長非罪誰能辯况有䜛夫口爍金將謂盖髙天聽逺寄野居處士春風有花随處看不勞快馬走長安春山有藥皆可采何用樓船渡東海老生常談人所忽門巷蕭條青草没野居隠者獨知言乃曰與我心同然埀簾丹室清如水賣卜君平絶相似得錢沽酒常滿壺談笑樂與親朋俱金谷飛蚊暫時聚静逺何如野居趣匣藏三尺古吳鈎幸無蛟龍驚斗牛焦桐絃絶挂空壁洗心只用床頭易忘年之交三十春與我義同雷與陳千墩别來耳目疾兀如朽株門不出六經家業愧無傳教兒只讀原道篇有懐欲得語同志東飛恨不生䨇翅牛鬼蛇神雖孔多青天白日奈人何願言正己斥邪説始終一念堅如鐵寸膏欲澄千丈渾厥功有無宜莫論和任義甫重陽絶句三首西風拂我菊花筵霜落蒲萄酒瓮前弓勁馬肥煙瘴歇雲南將士正開邊二題糕醉筆吐天花風景蕭條興亦嘉多少玉門關外客故鄉一望一咨嗟三休官陶令果何聊不赴江州太守招天上無人能送酒浮雲空}
