  - {type: variant, offset: 5267, length: 1, content: 害, WYG: 王逹善母挽詞阿母穆穆林下風生兒彷彿晉阿戎起家讀書眼如電閥閲衣冠俱一變三從無違四徳全月旦有評無間然萱花堂上安且吉分甘抱孫長在膝風含夏葛并刀剪雪霑寒笋充厨饌兒能苦學夜不眠不勞母}
