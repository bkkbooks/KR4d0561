  - {type: variant, offset: 601, length: 0, content: '', WYG: 花作送行雪巖詩為江隂李縣丞作瞻彼雪巖太行之隂玉樹瓊林纎滓弗侵雪巖峩峩巖有薜蘿有美君子居巖之阿峩峩雪巖蔚蘿如昔時止時行不泥其跡雪白而清巖静而深曷其似之君子之君子之心始終一節謂予不信如彼巖雪寄希物先楚蘭江二禪老優缽花開五百年連枝香徹九重天恩承雨露移金刹語帶煙霞潄玉泉虎踞龍蟠多古迹燕來鴻去又新年老夫嬾著遊山屐空仰崔嵬夕照邊過烈塘祖墳里人牧牛于壠上以詩呈郡邑鳳橋之西烈塘東我祖我禰馬鬛封向來松柏蟠蒼龍灰飛煙滅邱前風十年天造開鴻濛恩沾萬國生育同壟頭萌蘖春蒙茸藤枝棘花雜青紅牛羊斧斤集如蠭一年一度一掃空白頭遺孤抱哀恫麾之不去欺龍鍾無階上天訴天翁吞聲躑躅淚滿胸府公頼有渤海龔琴堂長貳明且聰令行如風偃蒿蓬樵夫牧人乃絶踪將來宰木蔽幽宫九原感戴恩無窮嗚呼九原感戴恩無窮懐成都監倉趙執中三首擲去任公舊釣竿龍墀拜命即之官丈夫志在功名外蜀道行來自不難二七千里外芙蓉城四五月間鶗鴂聲月俸支來賸沽酒莫遣閑愁取次生三公餘訪古碧雞祠官栁野}
  - {type: page-break, offset: 601, content: '', id: KR4d0561_WYG_016-4b, image: WYG1218/WYG1218-0371b.png}
