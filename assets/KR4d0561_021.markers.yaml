  - {type: variant, offset: 5277, length: 0, content: '', WYG: 盖棺應喜得全歸諄諄有命提兒耳不以浮屠廢䘮禮素車白馬紛如雪閭里光輝人共説我歌薤露聊云云宜有張林之碑傳後人塗謡新年騎竹走兒童兩月甘棠憇召公大誥奉揚天子命崇文絶與昔賢同閭閻四邑歌謡喜囹圄羣縲剖決空魯泮芹香霑教雨孔壇花暖鼓春風投膠澄水真難事覆簣為山必奏功早晚璽書嘉政績東闗劍井氣如虹和王有恒野歩芳草青青路欲迷白頭有客共扶藜吳田半没桃花水辜負春風布穀啼二雨雨風風一夜春惜花愁殺少年人青山不管人閑事也學吳姬翠黛顰和王有恒見贈客來欲與問天翁鳬鶴奚為脛不同一代衣冠更變後五湖風月笑談中脫巾釃酒留知巳擊節哦詩和送窮窗下小桃嬌欲語錯教童子喚紅紅糟邱作為鮑思文作諸公搰搰營莵裘何如將老吾糟邱杯餘酣睡儘落魄堂上肉食從伊優酒泉不作二千石醉鄉宜封萬户侯幕天席地燭明月日與麴生同宴遊攬翠軒昔人車載蒲萄酒區區為覔西凉守山川信美得專城能有幾}
