  - {type: variant, offset: 3396, length: 363, content: 瓊瑤瑤作瑰四後三我公去知淸興多王校知作時後八洞前玉氣金瀰漫王校金作今五前二以分淸致王校以作十前七漓墨鉛碑篆亦奇鉛作圓前八竹姑子年年春宋校姑下有仙字年年作明年後六位之宋校位作倍登升升作降六前三良辰良作芳前四介僎色津津介僎二字乙轉前六置宴豈能倫豈作詎七後三强酒醉當先王校當作常八前一齋居縮如蝸如作似前二春醪春作村九前三送主上人王校主作住後二此喜自得安心方王校自作似後九城陰山作讀書堆王校作作下十前四衰髩幾經蓬綴雪經作莖後二春申巷巷作港十二後五六閉門夫何如何如二字乙轉後九涵活王校涵作含尙待明日煦王校明作朝十五前二身爲百里宰王校宰作寄前六眼明如趙州王校眼明作說法前七法幢扶未起未作欲十七前三射弓弩弓作工後四酒盃盃作樽後八一行鴻舉舉作澤十九後五兩眼王校兩作老後九高人高作羽二十後八頭載白王校白作雪二一前九雲央央王校央央作英英後一十里十, WYG: 叠歌竟}
