  - {type: variant, offset: 4872, length: 0, content: '', WYG: 賦藥壺舊懸紅杏林𤓰廬今住清江潯南柯太守了無夢東陵故侯同此心灌園自捧漢隂甕抱蔓别}
  - {type: indent, offset: 4873, content: 　, id: KR4d0561_krp_021-bkkind1470}
  - {type: variant, offset: 4873, length: 0, content: '', WYG: 黄臺吟老我坐馳三百里何由縮地重相尋簡袁耕學先生馬鞍山開龜甲屏臯比之席講六經一年不見朶雲字三月又看花雨零角巾小像固垂白野史巨編方殺青宜有詩筒繼前軰使我晉鄙沾餘馨寄熊元修摻别廿五月昏耄而受罔於人者多矣詩言此謬餘從可知一笑之餘必蒙警教愛子腹便便逢人問孝先悞傳烏鵲信剛道白雞年鷗社詩千首龜巢稿一編何當重擕手相恤話䕫蚿次韻酬陳庠仲見貽二首鳳凰阿閣自新巢鷗鷺滄洲只舊交百里雲山人契闊一簮霜雪髪蕭騷忍看雨溺堦前蟻怕說風掀屋上茅樽酒論心宜有約誰家竹裏借行庖二春申港上老人村家有詩書教子孫白首竟能安菽黍丹心豈不合乾坤諸生問字車載酒滿地落花僮掃門且喜年來忘世慮不時杯勺醉昏昏又和袁仲徴陳庠仲去冬所寄之}
  - {type: page-break, offset: 4873, content: '', id: KR4d0561_WYG_017-7a, image: WYG1218/WYG1218-0406c.png}
  - {type: page-break, offset: 4873, content: '', id: KR4d0561_WYG_017-7b, image: WYG1218/WYG1218-0406d.png}
  - {type: variant, offset: 4874, length: 0, content: '', WYG: 腐草煜煜螢火生枯梨紛紛山蟻行可憐身病道亦病猶喜目盲心不盲溪山相望數千里松竹歲寒三友盟何當相對文字飲似昔盍簮金斗城壽萬拙齋蓬萊水淺鐵船歸城郭人民半是非且喜春秋今七十能知六十九年非二天開夀域大無疆林下幽棲樂且康不須更覓長生藥昭代如今化日長三芳茂山前種玉田芙蓉湖上采蓮船東隣西舎連花竹渾是桃源一洞天四一襟秋水心無競滿面春風唾自乾可惜時無吳道子畫圖傳向邑人看五菖蒲花開香滿庭簷旌廉斾風泠泠髙堂燕客}
  - {type: page-break, offset: 4874, content: '', id: KR4d0561_WYG_017-8a, image: WYG1218/WYG1218-0407a.png}
  - {type: page-break, offset: 4874, content: '', id: KR4d0561_WYG_017-8b, image: WYG1218/WYG1218-0407b.png}
