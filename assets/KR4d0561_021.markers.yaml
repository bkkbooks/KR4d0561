  - {type: variant, offset: 602, length: 1, content: 下, WYG: 皆可詩我欲見詩知雅興如何黄耳到家遲寄熊元修五湖三泖一􅋯仙心骨俱清地更偏睡鴨燒香書屋裏閑鷗結社釣磯邊絶憐芳草無塵土又喜黄楊閲閏年熟客不來清晝永南山相對兩悠然晚香亭為蔣公勉作維莫之秋百草不芳惟菊有華晚節之香君子擬之金玉其相顒顒卬卬氣凌風霜回視春葩綺羅靚妝及兹凉秋掃跡窮荒菊也特立澹乎坤裳我佩爾紉我帶爾纕厥徳之馨匪飡其英亭有三徑里猶柴桑亭亦有池永同南陽宜爾父子眉夀無康矧有佳客駱盧王楊髙堂起居階庭趨蹌玩物適意其樂洋洋鄙人作歌以侑稱觴題龔景良傍梅書屋南昌山水非不佳卜隣直欲傍梅花花開歳晚香滿屋清致不減林逋家三間茅宇大如斗四壁圖書雜蝌蚪腹笥便便不自多汗竹之編長在手有時門外雪三尺羣籟無聲人絶跡梅花立雪似游揚不作桃哀憔悴色春風滿面笑相看知我鐵心同歳寒他日移居玉堂署應有品題稱二難洛陽牡丹春比屋日夜沉酣沸絲竹何當聆我讀書聲亦若聞韶觧忘肉次韻荅毛雲莊并簡太希先生吾聞天台之山冠東南蔚有清氣非雲嵐山髙一萬八千丈石頭毛髪青􅆴􅆴鍾靈仙釋踵相接求為世用疇能堪不知三綱九法是何物浪説千巖萬壑能窮探雲莊先生隠君子非仙非釋棲苔龕胸中氷滿壺頭上雪一簮羲皇以來書盡讀熱官不要詩仍湛草堂侣有北山鶴菊泉飲比南陽潭清風日掃三徑竹寒霜歳熟千頭柑齊名子陳子不愛功名酣坐談風月只松麈卧遊山澤非桃驂老夫恨臂不羽翼翩然飛去時相叅四壁同馬卿一褌如阮咸猶喜盤飡菜有二十七生世年踰八十三忘機頗覺白生室造道尚欲青於藍向來行路如棘澁今乃茹荼猶薺甘小山老叢桂滄江倚枯柟愛君傑作神氣壯睠我孤陋顔色慚蘭陵府主蓮幕客皆云此詩壓倒方雲菴赤手鯨牙力可拔薫人雞舌香微含餘波及我老孤研清入肺腑蠲焚惔一朝怪事出幕府口不忍語非三緘令威到家兮能自談常郡經歴鄭履元禮吾友天台陳太希之門人到任數月家人至而元禮病疫而殁寡妻稚子遑遑無歸予作二詩以哀挽之盲風歘起怪禽呼吹折琅玕樹一株何事天公渾不管生年多賦道旁樗二琅玕樹折鳳巢傾膽落鵷雛抱母鳴故國欲歸䨇羽弱哀哀啼作杜鵑聲延陵野老歌送張太守延陵野老巾滿霜送侯入朝歌道傍歌中不解說循良但云三載安農桑官無煩苛歳豐穰饑有菽粟寒衣裳我侯興學扶綱常授經諸生踵陳襄一鼓士氣弛而張劍井亦復騰輝光訟庭春來莎草長風行四邑方泱泱九重天語星使將五馬夜趣天官裝黎明馬出金斗坊羣氓猶挽青絲韁銓衡郡才進巖廊將見列郡皆龔黄連歩拾級登廟廊佩鳴珩璜謹趨蹡掖垣紫薇花自香甘棠之愛民弗忘大江東流青海洋我思悠悠未渠央寄吕教諭覔惠山泉木屐上山老無力茶鐺覔泉猶累人目光直射九龍角胸次欲浣三斛塵水符分竹果如約石牀焦桐堪作薪君當知我鄙肉食一瓢不厭平生貧寄袁子英横山東望崑山逺江水西來海水連每辱手書論著述猶如面晤奉周旋微陽喜復飛葭管大有重書汗竹編若問老夫兒女事曾孫又抱小春前謝余提學摘藳序虚譽何人説草𤣥雄文為我冠蒲編諸公共美金聲擲兒軰争誇石刻傳篛褁小團陽羡月缾封新汲惠山泉故鄉風土殊蕭瑟聊作梅花寄海邊挽吳母曹氏賢母無復見孤兒痛奈何絳紗}
