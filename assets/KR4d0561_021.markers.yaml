  - {type: variant, offset: 4516, length: 1, content: 後, WYG: 只愁水面重租課飛風健卒頻追呼逋租畢輸搒捶脱前村有酒仍湏沽猶勝禄食致奇禍坐受鈇鉞連妻孥夜來湖上好明月醉吹蘆笛歌嗚嗚人生之樂有如此此身安用紆青朱漁郎漁郎知我乎我亦烟波老釣徒溪居垂釣圖磻溪老父興西周綸竿棄擲鷹揚秋富春先生赴東漢羊裘㡬被朝衣換人生出處各有時如魚飲水魚自知釣鈎無餌釣清泚若人彷彿元真子好山滿眼青孱顔清風緑樹滄洲灣悠然意態極瀟洒豈是尋常釣魚者浮波之龜如出洛漁郎睨之龜弗却賣卜覔錢人正多七十}
