  - {type: variant, offset: 5363, length: 1, content: 校, WYG: 仲昭語及之慨然有鏤板之意後果如其言蘭初意凡遇郡守及府教到任各送一部庻有所觀感而不廢其祭掃之禮焉今蘭於埀死之秋追念疇昔乃口占以抒其情曰故人家住千墩麓為儂版刻思賢録祗縁見説道鄉翁傳道程門能慎獨刻書未了謫炎荒寄聲龜巢事宜速乃將楮幣折青蚨七萬五千錢數}
