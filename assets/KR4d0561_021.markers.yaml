  - {type: variant, offset: 4636, length: 0, content: '', WYG: 車屢顛覆下床䨇屨内䨇足奚用領軍鞋}
  - {type: indent, offset: 4637, content: 　, id: KR4d0561_krp_021-bkkind1393}
  - {type: variant, offset: 4637, length: 0, content: '', WYG: 屋我來訪舊無所將贈以范公博施之義方家傳更須授賢郎福澤將來未渠央呉淞江水長藍謝青毋我忘吳逸庵輓歌辭廓然一襟涵宇宙鍾氣會稽山水秀春秋髙似伏生年岐伯諸書口傳授浙水西來家屢遷名與杏林俱不朽老去居吳抱䨇膝四顧狼煙暗如漆兒能負米百不憂有酒即呼人共吃常}
  - {type: page-break, offset: 4637, content: '', id: KR4d0561_WYG_016-35b, image: WYG1218/WYG1218-0386d.png}
  - {type: variant, offset: 4638, length: 0, content: '', WYG: 隠几看青山醉則􅋜􅋜枕琴瑟廿年同飲淞江水通家之交親戚比别來恨無縮地術時復論心書一紙只今祗與阿戎談翁在九京呼不起李明善慈竹軒吳淞江南湓浦曲慈竹軒開薜蘿屋更無花木鬬芬華一徑波光照猗菉纎塵不滓蒼玉叢枝枝葉葉皆清風一年一度冬夏笋冬生其外夏其中徳哉此竹美如許子母相交禦寒暑嗟哉人為萬物靈温凊㡬人能如汝吾知吾友此軒居朝夕奉親來版輿母慈子孝黙相契更喜君子能威如樹萱堂上分甘樂諸孫錦䙀如錦籜家僮笑指青琅玕少長喜與俱平安令名千古埀不刋咄彼鴟梟兒人面刀劍腹不學返哺烏頑然忘顧復嗚呼吾不知其見此烏兮何面目爾何日兮視吾竹簡湯道原曹子壽予生頗好古恐兒軰不能繼述敢請二賢良相與語之吾兒觸屏煩為警省旦夕稍閑煑茶專待要學劉伶死便埋随行負􅓩欠輿臺螢生腐草光能幾螘在南柯夢易回一笑豫言身後事兩賢聊共掌中杯貧居何處堪鋪席流水窗前好緑苔過横山龍祠作横山龍母祠前路人説今年祭龍苦前期邑有皂衣來督遣丁夫剪榛楛里胥中有豪家郎搜攫如鷹鬫如虎編氓一呼六十人棄擲犁鉏行或沮十家之甲最可}
  - {type: page-break, offset: 4638, content: '', id: KR4d0561_WYG_016-36a, image: WYG1218/WYG1218-0387a.png}
