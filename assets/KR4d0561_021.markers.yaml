  - {type: variant, offset: 4620, length: 3, content: 麯作麴, WYG: 登臨共醉姑蘇臺眼前一事特可喜湖山清氣鍾羣才先生屢薦胡不起濯髪滄洲弄煙水遥遥裔出華亭侯甫里髙風更無比只今奕葉多流芳東床嬌客名尤香呼兒整我遊山屐早晚去從潘孟陽次韻答集講主}
