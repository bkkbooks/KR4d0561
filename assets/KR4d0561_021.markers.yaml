  - {type: variant, offset: 4381, length: 3, content: 六前五, WYG: 載其文况忍成漂零某也束髪頗嗜學四方掇拾手不停珠聫璧合綴方册字字句句含芳馨向來避地東入海挾書幾落長平坑還家暗投科斗壁何異寶劍埋豐城郡公宣化重名教斯文要俾晦復明顛呼鐵筆寫堅木彷彿中郎鐫石經螢窓雪案人快覩妙語炳如懸日星顯忠不須庵}
