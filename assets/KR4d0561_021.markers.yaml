  - {type: variant, offset: 4402, length: 0, content: '', WYG: 皂葛巾兒業經鉏能飬志家居瓢飲不憂貧屋頭箇箇慈烏喜堦下翩翩舞鶴馴此日誰為湯餅客孟光相對髩如銀二秋菊春蘭各有時頽然老我一書癡脚跟不識青雲路頭髪空成白雪絲怕醉有時曾止酒遣閑無日不吟詩傍人若問今年幾八十年前五歳兒送聰上人蘇州有即常州有今雨來時舊雨來銕限門前人立雪寶華堂上鼓鳴雷九州禹貢包時橘十里吳}
