  - {type: indent, offset: 5420, content: 　, id: KR4d0561_krp_021-bkkind1637}
  - {type: variant, offset: 5420, length: 0, content: '', WYG: 月朔日也東西二周烈塘曲世與吾家鼎三足東周阿婆吾女兄西周阿婆吾女叔百年世事一再變遼鶴歸來無處宿蝦蟆之陵幸然在煙慘雲悽寒篠緑吾祖汝曹尊外翁數塜纍纍列昭穆年年梨雪落清明藐予來作孤猿哭周宗奕葉半憔悴}
  - {type: variant, offset: 5421, length: 0, content: '', WYG: 恤}
  - {type: variant, offset: 5425, length: 2, content: 族遑, WYG: 旌東枝只今春意多西枝亦復花如簇有能啣土學義烏無患觸松來野鹿篤親茍不負前言髙誼真堪振頽俗莫云古道獨行難天將照汝光明燭示二子自烈塘還横山而作也曾子曰人之將死其言也善吾於此亦云羲皇未造書契先二五渾淪無可甄勲華繼羲立人極三代典禮星日懸人之有生必有死飬生送死理宜然一從楊墨至聃釋異端邪説多􅆾愆我生頼以讀書力破浪㠶我中流船蒼頭荷鍤日随我死即埋我横山前毋勞沙門送作佛毋勞羽客送登仙漆燈不必照長夜宰樹不須纒紙錢椒漿或酹寒食雨麥飯或灑清明煙謝莊西頭烈塘口髙曾祖禰上留田年來岸谷復變改𤓰瓞幸爾猶綿綿微如豺􅆩知報本汝曹慎毋忘所天賀西傳和尚為僧司副綱大鈞巍巍立人極緇流亦須方寸赤選佛塲中選厥官提挈綱維揮判筆龜巢老人盲且痃刮眼欲覔黄金篦黄河水清一快覩更看鉢羅開盛時崑山辛彬甫夏初以人才見上奉㫖還家教諸生讀大誥限以十二月五日師生赴御前試讀如期而徃受賞而歸蘭甚以為喜作是詩賀之白袍鵠立簉鵷行青佩鳬趨被寵光大誥三編建瓴水春風兩袖御爐香賜金堪比燕臺聘抱玉仍歸卞匵藏試看明年書帶草崑山多似鄭公鄉長洲劉衡來云無錫徐伯樞縣丞重過衍慶院有詩題壁予乃次韻叙别并寄題膠山幽居各一首朝陽鸞鳳失巢時偶集叢林枳棘枝坐客一氊曾吐酒過橋三笑共哦詩長洲茂苑多年别野水孤舟到處移重掬清流弄明月秋風禪榻鬢絲埀二西日長安多看花東膠故邱今種𤓰問奇每却人送酒飬老喜有兒當家一雜清氣比肩少七言長詩適興賖暖香不爇古銅鼎雪梅應作先春花送丁敬止擕室人奉母徃西流乃翁寓所完聚風雨舟車渉路難爺娘妻子聚團欒七千里外桑蓬老十二時中菽水歡楊栁小詞聊送别葡萄斗酒莫求官過庭煩説龜巢老新結松蘿亦問安代簡荅陳子章先生屋山日髙三丈餘盲翁負暄頭不梳客來長揖道傳語宛丘先生今寄書開緘為我一再讀闕雞壇歃血闔閭城三十六年如信宿象賢無人固可吁玉潤之壻亦可娛韓子文章妙天}
