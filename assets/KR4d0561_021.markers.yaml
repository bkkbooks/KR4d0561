  - {type: variant, offset: 4672, length: 0, content: '', WYG: 妻子將來事無涯且免鬨吾耳挽張溝南故人家住江之隂江城草堂花竹深蚶杯喜作真率飲鳳管不殊韶濩音中郎有女可傳業萬事不復縈吾心於乎一歌兮一悽愴白璧如今窆黄壤故人墓在君山下黄絹碑辭更親寫風流不减賀知章軒昂有如嵇叔夜秋風蕭瑟宿草青過客知名多下馬於乎再歌兮再思之誰能為我追騎箕故人生來天骨奇抱才不試清名埀山隂道士寶遺墨雞林賈人傳舊詩寒家夜夜屋梁月顔色宛然前别時於乎}
