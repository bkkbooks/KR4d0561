  - {type: variant, offset: 5222, length: 0, content: '', WYG: 十里強先人痛惜家譜亡能言其畧忘其詳髙曾夲住開封府紹興之先離亂苦随龍渡江寓兹土以謝名莊似韋杜後來一𣲖分烈塘華屋髙邱乃吾祖季父咸淳中甲科封胡羯末皆簮組}
  - {type: page-break, offset: 5222, content: '', id: KR4d0561_WYG_017-80a, image: WYG1218/WYG1218-0443a.png}
  - {type: variant, offset: 5223, length: 1, content: 校, WYG: 厯巳矣元厯新竟作遺珠沉合浦我祖佳城宰木拱家庭玉樹遭斤斧我祖我伯我父兄青塜纍纍續遷祔轉頭滄海又揚塵十年逃難歸洪武昏鴉滿樹雀無枝結巢乃在横山塢三子六孫中子殂長孫又殞黔陽簿黄茅嶺畔作哀邱昭穆按圖無牴牾年年寒食春草長横山烈塘連謝莊一盂麥飯一壺酒老淚觸處俱淋浪於乎豺􅆩猶能效烝嘗何况人為物靈知義方我今諄諄語兩郎爾子爾孫宜勿忘冬至前一日寫懐二首龍鍾去年冬修書辨魚魯吾兒念吾衰勸我勿自苦吾嘗責吾兒曾讀孝經否聖人教斯民揚名顯父母窮達固有命劬勞何敢負芟夷兎園册於道或小補方誦蓼莪篇安知又初度存順没吾寧全歸冀朝暮二今年盲且聾狀若霜木槁齒牙脫兩齶涕淚出四竅獨存方寸鐵自謂無價寶異端屢排斥滛祀絶祈禱喋喋非好辨惓惓衛吾道一陽葭欲飛九土荔將出家人忽起早為我作生日沽酒}
