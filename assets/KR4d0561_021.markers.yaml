  - {type: variant, offset: 4661, length: 1, content: 注, WYG: 此白眉老夫宿昔愛此詩四百餘載人無之頭髪雪白雙眼眵也來摸索珊瑚枝風波詞家住横山古澗阿孰知平地有風波一壺為濟中流急可奈無金報爾何}
