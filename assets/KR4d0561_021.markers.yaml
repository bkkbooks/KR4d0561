  - {type: indent, offset: 4647, content: 　　　　　　　　　　　　　　　, id: KR4d0561_krp_021-bkkind1396}
  - {type: variant, offset: 4648, length: 0, content: '', WYG: 為文錯送窮連日昏昏如病域不知春到楝花風二林居鶴髪老癡聾彷彿忘機海上翁留客但沽隣舎酒鑄錢安用蜀山銅一年春色花無幾千古川流水不窮誰謂東家錦衣樹龍頭顛卧夜來風寄南澗海苹二講主東土西天今幾華南能北秀本同家門前弟子齊腰雪案上經文五色霞袖拂古墩行傍栁缾分春水坐煎茶遥憐丈室俱清絶屢夢幽尋適興賖寄張仲安舅甥及邵濟民許叔逺去年艤棹千墩浦澆酒伯倫墳上土伯兮伯兮呼不醒仲也憂予仍眼青最喜諸甥多似舅戀戀之情無不厚東陵𤓰地兼種藥杏林仙人與同樂箕山之瓢今貯詩雞林賈人知不知老夫别來八九月憂患無端髩添雪負米不歸悲仲子我盆又鼓酸風起傷春不欲向人言恐人忍聽哀號猿最苦䨇眸失岩電近日看書渾不見兀如枯禪壁常面隙有微明澘且眩阿兒呼來滌塵硯代筆題詩簡羣彦無錫華景章以牆東陸先生所序乃祖玉溪義士之文徴予詩故有此作猗歟古聖賢飢溺視由己聖賢久不作人多飢溺死天厯年中歲薦飢老夫身親耳自知操壺枕籍委溝壑烏鳶飽食狐狸肥適逢郡縣無良吏狎弄文移等兒戱義倉和糶百蠧生殊失先民救荒意吁嗟玉溪翁髙義孰與儔黔敖之粥活鄉里立解倒懸危急秋指囷不結當世交易量不效前人尤盡令菜色作喜色如度弱水登蓬邱嗟哉玉溪翁徃事誰紀述鄉人口碑傳}
