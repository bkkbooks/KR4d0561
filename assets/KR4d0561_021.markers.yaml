  - {type: variant, offset: 337, length: 0, content: '', WYG: 為之哀乎或謂彼佛以寂滅為樂而道傳深究厥旨必樂於逝矣奚哀為予曰不然吾今哀道傳者情也其樂與否非所論也夫情動於中而辭出焉辭而哀之亦以示不忘云大鈞賦物兮物胡不侔深谷蘭摧兮蕕生道周良農服田兮祈榖有秋禾方秀實兮賦以螟蛑於乎哀哉伊人好修天其渺茫兮吾將誰尤哀鶴辭至正八年秋盜夜入吾友諸葛用中氏之家殺其鶴於後圃已而盜被執詰之盗吐其實當其穴墻之時鶴長鳴警之既穴而入鶴奮翮而前若將力禦焉故遇害用中於是惋惜流涕褁之席坎而埋之縣文學汪君以敬為}
