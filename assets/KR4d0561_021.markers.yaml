  - {type: variant, offset: 5361, length: 0, content: '', WYG: 投顔公智公支許游墨名儒行一年少宅我闔閭風雨秋中吳偶作鵷雛穴越鳥喧呼來不絶熊袁盧殷吳趙許相伴滄洲弄明月華亭清唳真可聽獨憐士衡呼不醒鱸魚斫鱠新釀美坐客有無杯不停逃生十年聊自}
  - {type: indent, offset: 5362, content: 　, id: KR4d0561_krp_021-bkkind1619}
  - {type: variant, offset: 5362, length: 0, content: '', WYG: 不知蘇臺有麋鹿大明赫赫照中天東風送我還鄉船昏鴉占盡故林樹老鶴孤飛無宿處東門種𤓰官道邊莵裘擇隣遷復遷大兒横山薜蘿屋小兒東洲稊稗田耕桑汲汲飬吾老晨昏定省俱舎旃每逢暑月多晝眠小牕看竹風泠然風來扇枕竹罄折使人若見黄童賢窮快活年近百懐哉古君子鐵面金榜客知巳宜有報終身竟無策作詩示我子若孫勿言儒冠多悞身讀書萬巻百忙底當時杜老乃云云人生茍不識義理馬牛襟裾真可恥銅山餓死黄帽郎莫信有錢能使鬼吾今兩眼暗如漆尚喜一襟澄似水曾聞聖人言孜孜斃方巳家僮荷􅓩好相随速埋願與劉伶比黄茅嶺畔青松宅松聲為我鳴緑綺更莫用伽佗歩虚汚吾耳寄小齋劉先生延陵季子耕田處太乙老人藜焰明動筆即摛蒼頡字著書重草太𤣥經古苔門巷車無轍修竹堂堦夏亦清一别數年三舎近斗城猶望聚文星簡張道履代蔣以誠作虚名不託爛柯仙斫雪青山十五年一曲樵歌人未識瑶城江上獨先傳二客來東里遇炎霜老却瓊林樹一章頼有麟膠絃可接焦桐流水發鏗鏘三雞林近有賈人來不向何樓買襪材坐待春風吹鐵笛筆端還有鐵花開寄宜興教諭人言陽羡溪山好溪山好處能多少山無猛獸水無蛟且喜只今逢盛朝竹姑堪入風土記茶歌可比康衢謡黌宫倚長橋髙堂鳴講鼓新除學官教雨滂坐令巖邑成鄒魯老夫憶昨覩星凰别來隔邑遥相望山如硯屏空翠濕溪作墨池流水香火星西流拂新日蓐收行秋掃餘熱堂堦滿地落槐花衿佩詵詵立黄雪鄉無三害風俗美賓興名賢天子喜予有一言請試聽丹梯拾級徐徐升地因人勝地必靈邑里草生書帶青鄭康成齊令名思賢録元末為宋先賢鄒忠公祠墓而作也洪武壬戌㑹崑山}
