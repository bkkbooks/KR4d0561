  - {type: variant, offset: 5180, length: 7, content: 與作憶二七後五, WYG: 首陳褒美辭其間方鮑庾微意若少之樽酒欲細論諒非談笑嬉迄今千載下疇能發𤣥機區區蠡測海敢告新相知秋髙金氣清桂子香風吹虹光書畫船雞黍或可期合歡杯勺間評此兩白睂况有古經史相傳更多疑朝聞夕長逝九京含笑歸憂旱吟吾聞東海殺一孝婦三年乾天人感通非浪言又聞長平坑卒四十萬胡為乎竟舎旃人讀書貴主窮理斯理未明堪汗顔朅來一旱月幾圓老農多憂良可憐青苗蟲生食欲盡赤地龜坼生炎煙龍祠巫祝杯珓擲羽士醮壇鐘磬喧妻孥踏車或抱餒牛犢賣來供社錢盲翁夜來亦不眠追思直從三代前堯湯水旱皆數年必能有以扶顛連當今聖明君咫尺九重天有能鳴哀玉陛前天恩不日彌九川一夫罔令溝壑填耕田鑿井仍熙然示冡子及孫曹横山下小菟裘某水某邱堪釣遊四世團欒}
