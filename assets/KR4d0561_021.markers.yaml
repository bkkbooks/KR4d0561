  - {type: variant, offset: 2, length: 1, content: 藁, WYG: 老人謝舅翁擕子及孫以清酌庶羞祭汝重外甥周氏娘子告之曰人不幸遇世變而俘於兵如風雨落花藩溷泥途鮮或不汚汝乃釋係累以配二千石之子冝其家而恱於舅姑此不幸中之幸非人之所能圖也至如一念之孝念母孀居廿餘年抱歸寧之願百餘舍渉艱闗之途德哉良人能與之俱服齊衰以終其䘮脫簪珥以恤其家睠我東翁母嘗託孤亦欲報之以瓊琚凡如此類竹帛可書則昔之所幸者抑亦有感於天而天賜之扶輿也今也一疾斯須朝露溘然鬛封象服慈親墓田苐良人之悲有未𦵏之親未笄之女汝何忍乎舍㫋吾意汝視斯世斯身履氷臨淵玉石俱焚萬萬千千保遺體之全歸餘無憾於九泉寥寥旌善亭令名誰為傳於乎蒼天代曹原度祭黄仲器文公平生與某為忘年交年雖不同身同澤臞韋杜桑麻叔牙夷吾舊雨有時而契濶今雨有時而招呼往往來來曽不計誰數而誰疏也夫以公晚歲言之一子出贅鼓盆自娯或蒼頭而詩巻或長鬚而酒壺或載月剡溪之舟或踏雪㶚橋之驢尋梅㸔竹清興逸如故人謂公為荷篠荷蕢之徒嗚呼公之闔棺之日某客東呉不救䘮於匍匐不送䘮於泥途每一思之涕泗霑裾酌彼潢潦薦兹束芻謝莊墓祭祝文開封舊家軒冕烈塘隨龍渡江奄宅兹方豈無佳城海水尋田敬惟髙堂祖封巋然清明祭掃豺獺遺意尚期埀裕有永弗替烈塘墓祭祝文人本乎祖猶物之天化育之恩疇能盡然維曽大父瓜瓞蔓延幽幽殯宫宅此平原左三從祖我祖右偏兩伯遷祔雙璧仍連五封十靈餘皆茫然天荒地老陵谷變遷尚頼遺澤箕裘勉㫋清明省掃薦此蘋蘩霜露之悲永矢弗諼横山墓祭祝文代子木作哀哉慈親寂寞九泉吾弟與姪亦遽然而然言之痛心有不能忘其言也夫親在則晨昬定省親殁則春秋祭祀寒食上塚陳此饛簋雖不足報其劬勞庶循乎世俗之禮維吾親吾弟及其子念之祭邵姨夫文代孫垣作嗚呼先人在時我姨丈以肺腑之親往來之頻不逺三舍有如比鄰至不幸殁於鄭}
