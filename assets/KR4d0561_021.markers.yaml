  - {type: variant, offset: 5106, length: 2, content: 荒苔, WYG: 蒲石軒中山澤臞出門戎馬即長驅欲騎東海金鰲去竟作西風玉樹枯化鶴還家人想像義烏銜土子號呼恨無杜老揮椽筆寫入哀詩比畫圖鵪鶉圖不作巢居與穴居鳶飛魚躍不相於平坡淺草幽閒處宿食飛鳴得自如題清微觀并序蘭嘗考庱亭乃孫仲謀射虎之地今為吕城橋密邇清微是為清微勝槩也不揣言耄表而出之并為燕厦之賀云阿䝉之城何代傾𤣥元閟宫無與京英雄射虎陳迹在咫尺奔牛古堰横鯉魚飛去石盡爛桃花種來蹊自成華陽福地一如此何用山中宰相名懐袁耕學諸故人夢裏忘余兩目盲馬鞍山下訪羣英詩容總似山容瘦道氣多如海氣清皎皎白駒方屏跡嚶嚶黄鳥未忘情呼兒早起題書尺十日新年雪乍晴右寄袁耕學}
