  - {type: variant, offset: 5030, length: 0, content: '', WYG: 不官様文章祖蒲室正須述作賛皇猷寄一舟禪師葱葱䨇樹林井井百丈規欽欽響鐘鼓棣棣慎威儀空庭苾蒭草浄瓶楊栁枝滿眼皆祖意此身丁盛時熱客不相過清風堪自怡或翦葛藤話竟織駢儷詞陵谷變未久山水知音希我本六日蟾眎同五總龜儒墨各有趨支許交忘機眷言獨孤檜曾覔一二詩禪縛想自急詩筒來乃遲南風非不競北山何用移請拈木毬子聊作逢塲嬉寄講主法師西𫝊懐哉久别廬山逺奈此相望去路賖屢夢丹梯同上塔每留清話竟忘家芭蕉手種繙經葉菡蓞池開結社花三伏不嫌人褦襶一肩偏袒佛袈裟竺書自早探三藏緗帙如今載五車方寸静涵滄海月文章光炫赤城霞尚憐老馬能知道更喜神羊解觸邪早晚蓉湖秋水碧定期濯足過漚沙懐詹伯逺蝌蚪殘書補未全齋居一榻坐來穿稻花遶屋白如雪溪水出湖青接天冠盖不來騎馬客鷗鳬長傍釣魚船多時欲問平安信伏日題詩寄竹邊寄贈岳陳齋二首一書曾寄訪行窩百里相望阻滆波陽羡谿山無恙}
