  - {type: variant, offset: 4719, length: 1, content: 一, WYG: 凋誰品題春風牡丹洛陽市華屋金盤鬭奢靡車馬遊觀人如蟻但説姚家之黄魏家紫那知松菴之清樂如此送任義甫之京放却滄洲老釣竿送將圖籍上長安朝霞爛爛日初出熱客紛紛路未乾七里八岡鳩杖去三山二水鳳臺看薫風解愠今猶古舞袖歸來語所歡辛彬甫自京城回過東洲田舎極言曾覲}
