  - {type: indent, offset: 4649, content: 　, id: KR4d0561_krp_021-bkkind1397}
  - {type: variant, offset: 4649, length: 0, content: '', WYG: 方牆東老手春秋筆老夫知名五十載更喜牆東文字在義聲洋洋流至今又閲桑田變滄海天生孝孫念厥祖禮樂趨蹌䋲祖武丈夫不憂無萬鍾要為顛崖救辛苦唐君舉挽辭早年讀律如五經案頭夜照練囊螢學成能展四方志當路縉紳俱眼青神州赤縣坐蓮幕賛畫雖勞意磅礴青雲拾級歩歩徐腰纒不跨揚州鶴邯鄲夢斷楊花春桑田變海宇宙新歸來東陵剪荆棘故侯誰識𤓰田人竹林小院差可喜為箕為裘奉甘㫖青松宅邊紅稻畦白雲亭上烏皮几四時花木手自栽客來看花常置醴有時寂無語蒲團醉逃禪有時曵鳩杖朗誦逍遥篇得鹿門龎公之安比濟南伏生之年生平有如此死去真悠然薤露歌或可鐫此歌便作碑銘傳過無錫口占客舟無錫道中歸聽唱吳歌淚濕衣泰伯墓田耕觳觫偃王祠廟走伊威二三策在遺芳逺千百年來舊俗非詩寄瓢齋老詞伯吟邊同為一歔欷題漁樵}
  - {type: page-break, offset: 4649, content: '', id: KR4d0561_WYG_016-45a, image: WYG1218/WYG1218-0391c.png}
  - {type: page-break, offset: 4649, content: '', id: KR4d0561_WYG_016-45b, image: WYG1218/WYG1218-0391d.png}
  - {type: variant, offset: 4650, length: 1, content: 携, WYG: 話圖爾樵斫青山爾漁釣滄洲世事百不聞此心兩悠悠道傍弛擔渚泊舟促膝面語何綢繆想論會稽人衣錦或訝桐江棄羊裘人生窮逹各有分曷不嗒然自作逍遥遊贈醫士錢伯祥杏林老仙山澤􅋯幅巾逍遥曳長裾逢人善作青白眼有子能受岐黄書酒對玉峰傾鑿落丹成金鼎飬芙蕖焦桐掛壁斷絃久藥杵聲中樂有餘題扇青山滿眼氣蕭森茅屋人家煙樹林客星多擲漁竿去誰復扁舟釣碧潯題子昂竹石圖玉堂歸來髩欲絲漚波亭中清晝時竹君石丈意相得不時為作無聲詩安安道人歌僧坊旅宿崑山縣夜讀安安道人傳似將秦鏡作斯文道人肝膽都能見早年學劍欲有為車塵馬足曾驅馳蕉隍夢斷竟失鹿葑田乃耕東海涯安知逃名逃未得射兮旌招論觀徳諸生遊藝集如雲儼如風詠從曾晳歸來自喜安其安一室視同天地寛鹿門龎公與同志妻子不知行路難傍人問我安心訣非佛非仙非臆説纎雲不滓沉寂天水湛霜潭照秋月家居四壁莓苔青柴門雖設晝亦扃年來豈獨樂吾樂堪輿俯仰俱清寧有時得錢即沽酒明月清風作三友胸澆磊塊去即休不學淳于論石斗嗟我碌碌者和爾婆娑歌無勞赤松遊只在青山窩挂瓢樹下舞婆娑歌聲繚繞青銅柯羣雄自奏巻白波安居之樂奈爾何逺緑亭為惠聚寺瑞芝年作道人愛山常目接無復經繙貝多葉碧天低處見絶頂蒼石爛來知幾刼清風一掃六合塵須彌芥子等法身諦觀有色若無色大地盡作曇華春宿崑山延福菴葉舟來訪漁樵社蘭若適逢龍象羣屋近玉山多潤色林藏寶地絶塵紛𤣥壇坐到三更月髙枕眠分半榻雲鐘鼓聲中鳴般若老夫堪笑耳無聞題崑山縣城主簿先塋圖舊家衣冠麟角族隂隂榆栁連鄉曲佳城父祖馬鬛封欝欝松楸在吾目飬親弗及奉庭闈居官豈敢懐蕨薇二十時中公務畢三千里外歸心飛出言不作雌黄口臨事不為髙下}
