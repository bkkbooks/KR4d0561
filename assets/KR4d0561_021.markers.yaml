  - {type: variant, offset: 5450, length: 2, content: 渡渡, WYG: 䭾同策吟鞭過薜蘿老病送迎門不出楊花飛雪奈寒何别後數日知途中值雨再此謝不能固留鄰家借酒過墻頭楓火新鑚且易裘風雨不留佳客住溪山應為老夫羞一氊冷暖忘木榻四月清和值麥秋珍重沈腰圍革帶先鞭何日上瀛洲詠懐詩奉府縣訓導早年豪氣慕元龍人日窮途}
  - {type: page-break, offset: 5450, content: '', id: KR4d0561_WYG_017-99a, image: WYG1218/WYG1218-0452c.png}
  - {type: indent, offset: 5451, content: 　, id: KR4d0561_krp_021-bkkind1646}
  - {type: variant, offset: 5453, length: 1, content: 䭾, WYG: 嗣宗夢斷春風金騕褭情鍾秋水玉芙蓉春秋魚魯渾多誤河洛圖書豈易逢四海弟兄頭白少懐哉澗底有青松寄樵海教授老先生洎諸故人室移縣罄三家墅身作爬沙六日蟾生死固知天已定盲聾可奈日相兼桃花笑我頻辭酒燕子嗔人不捲簾吳下友朋春夢裏休官多喜似陶潛寄集公詢公二講主吾聞西方教教人無住著桑下一宿去信步恐顛錯嘉爾兩尊者髙風素相若出世扶法幢功成竟忘却掃除煩惱魔灑脱禪律縛不随法華轉亦不觀日落千墩片雲間卧遊當行脚日來崑山縣山靈有佳客欣然為彈指又見此樓閣人皆時乎時我亦樂其樂老夫數年别每憶霞上作含吐海潮音因風寄寥廓寄陳明逺兄弟先世多遺澤清風並絶塵門}
  - {type: page-break, offset: 5453, content: '', id: KR4d0561_WYG_017-99b, image: WYG1218/WYG1218-0452d.png}
