  - {type: variant, offset: 4911, length: 3, content: 房十四, WYG: 故翁巻之詩有曰托根陳帝廟應不慮樵夫其意不以此木為不幸而反以為幸也可勝歎哉孟曾然余言遂植檜舊所予亦恐}
