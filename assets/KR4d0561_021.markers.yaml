  - {type: variant, offset: 609, length: 2, content: 居齊, WYG: 蹇予八十翁懐人二千里哦松公務餘食檗珍珠比魏公百韻詩仕學有遺軌錢孝女詩斷臂耻受汚剜目示守節斷髪割耳鼻亦截忍棄夫家甘毁滅吁嗟錢氏女孝心亦如之剟肉於股療阿婆想當持刀入手時精誠黙感天翁知百靈撝呼走神醫肉乃化作藥石糜溲除淋液腹除癖如以湯泉澆雪釋婆無呻吟女弗戚隣翁里媪皆嘆息予生慕忠孝老去仍惓惓每見返哺烏如甫拜杜鵑願言屏䲭鴞不與同戴天竹林寒筍冰池鯉澤中堇菜籬根米天其埀恩錫孝子董狐盡為書青史和江隂鄭教諭登樓為愛君山好每登樓上頭一氊渾不冷有酒更何愁歳月江流急人生泡影浮興來歌舞罷倚檻看天不次韻答陳推官珍重新詩遺華於翠織成披雲天似洗連日雨頻傾大府羣英聚清朝列爵榮正湏康濟力膏澤被蒼生和陳推官過余公祠公諱闕字庭心元進士安慶路總管守城死洪武初勅建元忠臣廟謚忠宣公砥柱廻瀾屹吕}
