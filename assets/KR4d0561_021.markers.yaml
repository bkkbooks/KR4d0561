  - {type: variant, offset: 4931, length: 10, content: 巓王校緲下有倚字後一, WYG: 城巔水晶榱題白玉闌樓居之人應列仙金烏出海飛上天藍田瑶草煖生煙誰家馬上郎意態清且閑既非謫官遇雪阻藍闗又非春風得意遊長安摩挲老眼仔細看乃在櫟里先生圖畫間碧桃贈吕城􅄵官應孟㳟猗猗谷中蘭鬱鬱澗底松}
