  - {type: variant, offset: 4686, length: 0, content: '', WYG: 譯路幽險澤有神龍惡薫觸洪浪掀天霹靂飛幾作湘纍葬魚腹丹旐歸來窆鄉土華屋髙邱生死足縗麻痛泣桑梓悲淚痕多似湘江竹嗟我東西南北人愛爾瑰奇曾刮目鄉無旦評勿為少令名在我思賢録嗚呼青山紅塔道鄉墳誰復相期薦秋菊贈醫師張有成嗟哉延陵古城郭舊家喬木秋蕭索先生眉夀氣如春借問平居果何樂笑言吾樂得於天燕饗不勞鐘鼓作一從無夢見周公青箱五經束髙閣便便老腹只醫書}
