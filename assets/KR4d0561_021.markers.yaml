  - {type: variant, offset: 5117, length: 2, content: 宋校, WYG: 髙詞吐白雪逸氣凌青雲楩柟豫章下灌木無足云安知射工弩中厥父子身問疾數徃返先生同五倫奈何日月下覆盆茹艱辛惟天降炎霜清飈灑冠巾一朝禍根㧞戩榖乃薦臻孤鶴還九臯飄然離雞羣吾將問𤣥機載酒歌子雲僧綱賛公和尚以疾得告而歸善權舊隱横山老樵謝蘭效劉賓客竹枝二}
  - {type: page-break, offset: 5117, content: '', id: KR4d0561_WYG_017-68b, image: WYG1218/WYG1218-0437b.png}
  - {type: variant, offset: 5120, length: 0, content: '', WYG: 為臨别贈維摩牀上遣文移治績垂成竟解龜僧史有如班馬筆絶勝州里去思碑二滆浦飛花送客行善權耆舊出山迎問渠那得真消息摩頂松枝喜鵲聲過無錫醫士徐士亷别墅棲神山在屋西頭竇有寒泉帶錫流山近杏林煙樹接泉香茶鼎雪花浮蜚英早歲肱三折樂道清時號四休堪笑興來忘潦倒尚能擕酒過滄洲寄楊彦澤逢人屢問平安信有子亦如郎罷賢萬石艨艟輸賦足九重閶闔奏名先未論烏鳥能含哺且喜黄楊閲閏年我昔與談忠孝事阿戎詞色兩忻然次韻送秦文仲歸海上溧水先生挽不留故山回首鬱相繆落花飛送九年客行李歸來一葉舟勲業鏡中成白首耆英㑹上冠清流獨憐詩社今寥落無復尋盟集舊鷗送秦文仲教諭歸老崑山縣盛代埀新統斯文續斷絃青山溧陽縣白首廣文氊唾視鉛刀鈍心持鐵硯堅蓬麻扶盡直茅茹㧞相連頒印恩殊重明倫教欲專諸生皆鼓篋三物屢興賢美績經三考英聲徹九天晚成真大器幽谷必闕命以菟裘老榮於晝錦還黄河清有日白石爛多年齒徳身兼備文章世自傳本來天下士且}
