  - {type: variant, offset: 5193, length: 2, content: 三三, WYG: 晚唐人一詩不遇西湖林處士暗香疎影有誰知寄習訥二講主南山北山兩浮圖東家西家皆給孤塵世換來風景别上堂鐘鼔似}
