  - {type: variant, offset: 4445, length: 2, content: 王校, WYG: 老夫遥望徳星聚乗興幾回車欲巾聞趙朋南免官還家作此代簡并以孝女傳求詩兼寄毛世延熊元修水村先生氷雪姿一襟清氣溢為詩不同不異頗奇崛歩趨李白仍委蛇夜郎歸來脫塵屣濯足淞江太湖水雞壇有盟知弗渝書或浮沉况杭葦衰年萬事皆遺忘咏歌之樂殊未央請觀側陋出純孝援筆為揚蘭蕙芳毛公世業詩三百白華補亡求必獲更煩漚社語閑叟定有隋珠照方册舊冬十二月初四日次子林赴京初九日入覲十三日授開封新鄭縣學教諭即日之任時雨雪連數日寒甚眷焉于懐久而不釋兒别䨇親到日邊承恩徑著逺遊鞭一千里外汴梁路十二月中氷雪天楊震未期堂有鱣鄭䖍何愧坐無氊只今偃武修文日正欲鸞膠續斷絃服霞道}
