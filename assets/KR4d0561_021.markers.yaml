  - {type: variant, offset: 4915, length: 1, content: 三, WYG: 詩為人口實因復作是詩獨孤之檜化烏有庻士重栽倚碧潯遺徳一州人眷眷流芳千載樹隂隂霜根蟠入龍蛇窟風葉響成鸞鳳吟願若甘棠無翦伐報公疇昔愛民心寄聰上人嘗託補楞伽經脫簡就用索之杕杜之歌落九天石尤風轉送歸船長洲茂苑渾無恙翠竹黄花總是禪眼孔不教迷土苴耳根常得洗風泉貝多葉上楞伽語脫落應能為補全題顧師道樓居}
