  - {type: variant, offset: 4589, length: 2, content: 後四, WYG: 追古聖五音六律洞𤣥機一襟宇宙春熙熙七絃氷霜風颸颸得之於心應於手如魚飲水非人知鈞天廣樂醉鄉境悉以所樂鳴金徽髙臺自傾池自廢雍門枉為田文悲我歌醉琴行持贈醉琴叟小春多釀梅花酒我來與君酌大斗濯足滄波太湖口}
