  - {type: variant, offset: 4389, length: 3, content: 王校忠, WYG: 牽裾伏蒲想儀型儼然見我鄉先生題徐良夫耕漁軒我本耕漁人喜子與同志子居中吳山水窟比我延陵更佳致太湖三萬六千頃七十二峰連紫翠山皆可畊水可漁無復紛紜嬰世累朋游日接慎威儀酣酒賦詩時適意客來遺我金蘭集儼然承顔依玉立因以今人思古人與客評論重於邑輟耕莘野赴阿衡後人嘵嘵疑割烹擲去漁竿佐周武鷹揚之勞亦良苦當今盛時伊吕多幽棲正宜安薜蘿山中小草或浪出千慮鮮能無一失願言飬髙持素心百鍊不改堅如金相過未擬聆跫音寄言時復相規箴生日口號餘生重}
