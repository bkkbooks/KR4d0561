  - {type: variant, offset: 4832, length: 1, content: 校, WYG: 凝斷臂妻五裙裾藍縷蓍簮折鄉井蕭條草屋卑節孝兩全頭雪白疇能說與史官知臘月十四日風雪極寒大林菴主僧以佛廬落成冰雪堆中作梵宫磨磚布地與金同何當放下南泉斧坐聽松杉萬壑風悼熊元修徴士落落龜巢翁閒閒鷗社叟雷陳十年交雲水三江口在昔鷗沙結社時盟鷗之詞我筆之唫風咏月意相得絶似伯牙逢子期朝亦詩暮亦詩詩興動來忘渇饑淞江太湖墨淋漓鶴汀鳬渚生光輝毛髪雖秋霜光風自懐抱不虞白石爛但覺滄洲好一朝林谷俄變遷我歸耕我延陵田銜寃塞海笑精衛抱怨思家憐杜鵑鷗社叟軟䨇脚晏然不受功名縛社鷗尋盟還可樂苐我路途遥來徃難如昨前年訪戴踐重約舟到山隂眼生膜黄庭不寫贈籠鵝蒲萄醱醅㫖且多船頭送别誦佳句且知步武追隂何音書從此不復得我心孔竅皆茅塞清夜悠悠思故人夢裏依然見顔色客來聞死半年久倀倀不能將絮酒悲歌為探驪龍手三日悲風動林藪次韻荅袁仲徴見寄大江南㟁衆山蒼巖谷深藏寶劍光江上風波來滚滚山中歲月去堂堂能承書業千金産喜有童孫咫尺長杯酒正須朝夕醉}
