  - {type: variant, offset: 547, length: 0, content: '', WYG: 欽定四庫全書龜巢稿巻十六元謝應芳撰詩雪巢為馬仲良賦馬鞍山髙數千尺考槃之阿環大澤梅花為屋雪為巢窓户玲瓏空虚白諸公衮衮登雲梯若人奚獨能幽棲澹然素志絶華藻要令朴俗還標枝藍闗策馬官逺謫居延牧羝氊盡囓何如雪飲樂巢居更與党家風味别梨雲無夢清如許膝上兒郎賦冰柱此生此樂慎勿移聽取龜巢老人語次韻答許西溪憶昔送别黄花秋烏紗破帽霜滿頭别來作詩屢問訊夢中載酒時遨遊兵戈同歴二十載鵂鶹夜啼雲靄靄全家老稚幸逃生又閲桑田變滄海啓榮之樂今有餘勿謂比榮年不如峴山一望三太息襄陽耆舊晨星踈次韻自述百年有限耻求仙數口無饑頼薄田菰米熟來連日雨菊花開到小春天方從易外窮羲畫無復詩中泥鄭箋客至酒盃時一舉開籠放鶴舞蹁躚送婁主簿赴京考績吳霜如雪㸃征衣匹馬之京小𨽻随鸞棘特書良史筆鳳臺重覽謫仙詩天開景運榮文治年少多才際盛時野老送行無贐物梅花折去臈}
