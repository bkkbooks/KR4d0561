  - {type: variant, offset: 333, length: 0, content: '', WYG: 得終其志力學而未能發乎文辭以黼黻斯道此衆人所共惜而為哀者也予於道傳初無葭莩之親鄉里之暱䘮亂之際傾葢如舊舘焉以安其居榖焉以盡其禮愛之敬之二載猶一日視親戚鄉里殆有過焉以今思之}
