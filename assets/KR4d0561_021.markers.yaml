  - {type: indent, offset: 4897, content: 　, id: KR4d0561_krp_021-bkkind1480}
  - {type: variant, offset: 4897, length: 0, content: '', WYG: 日䌓霜之異於頷聫書之非虚語也繭紙寫來詩句好雞林傳去古人多花開三月春如許霜落五更寒奈何留客政須沽緑螘引年何必餌金鵝六街車馬紛馳逐自喜蕭齋雀可羅次韻荅華以愚見寄九隴山東舊宅遷一瓢齋裡曲肱眠賢如栗里陶元亮閑似香山白樂天倡和正須歌白雪丹青何必繪凌煙竹林諸阮多才俊文㑹何時共酒船哀詩鐵船海上逺移家金斗城中蔗境佳我昔頻來桃竹杖公方新種木蘭花書因教子時常買酒欲娛賓夜亦賒春夢一塲随蜨化老夫三歎立鷗沙東西家東家賣兒哭幽咽西家鬻妻含淚别形容總覺瘦如柴肝膽那能硬如鐵低田水没欠秋租今年夏租麥更無妻兒舎我莫怨呼我亦忍饑朝暮殂重午日小酌青年自是好遊者白首始知行路難一寸芳心徒似鐵數莖秃髪不勝冠匏樽偶有菖蒲酒菰黍香於苜蓿盤莫笑貧居輕速客餘生能得幾團欒五月望日寄江隂陳庠仲一别半年久相望百里間陽春知寡和落月見清顔釃酒澄江上題詩小石灣龍鍾還念我時復夢追攀同日寄袁仲徴申浦水東頭悠然客馬周焦桐絃白雪芳草席滄洲昨夜三更雨今朝五月秋有懐飛不去煙樹鬱相繆曹文質自金壇來云費延年教諭傳語且知告老而歸閑居可喜因作詩代簡我思故人松柏顔客來寄聲蓬藋間鱣堂講學竟將老鳩杖拜恩今樂閑清風枕簟五栁宅白雲圖畫三茅山雪舟未得見安道乗興豈無詩徃還朝宗鄭教諭以余去冬初度自夀之詩次韻見貽予復和而贈之憶昔予為廣陵客兩頰丹砂眼青白蕃禧觀裏看瓊花坐列羣英杯飲百無何陵谷忽變改塌然歛我扶揺翮此花天下更無雙毒手誰焚夜光璧先公舊物廣文氊家傳喜得無囏厄抱琴來坐杏花壇洋洋古操令人憶青氊坐久琴愈清君山草木皆愉色老夫今春辱佳句轉眼炎曦又隆赫郢斤非不妙彫鎪奈何吾衰腐如櫟生平甚愧性聱牙老去偏懐舊知識孤舟野渡豈長閑一壺㑹有千金值合歡杯酒細論文恨不能飛見三益江流南匯春申浦海門東入陽侯宅河魨江鮆鬭鮮新苜蓿之盤自朝夕􅓺舎安如廟堂坐脱粟甘於鐘鼎食睠我郊居樂亦然朝聽樵歌暮漁笛忘機相與白鷗眠送窮不效昌黎伯假令秋至轉饑寒亦不題詩寄髙適賢哉子淵可矜式陋巷安貧載方策六月初八日雨晴懐毛伯尚去年五月凉如秋今年六月寒颼颼重雲晝暝雨連日田家復恐沉西疇朝來日出温風起歲不薦饑人共喜貧家四壁屋漏痕彷彿篆書千百字忽憶山中人讀書兩眉白能負仲由米曾漂髙鳳麥髙堂飬親侍親側我衣斑斕親喜色有時諸父竹林遊彈琴詠詩尊爼席人生此樂古來少今乃熊魚兩兼得老夫每問書帶草鄉里小兒渾不識但道墨硯池水漲苔衣碧苔衣碧池水香思若人兮不能忘長林豐草春茫茫青松澗底含氷霜鯉魚不随白石爛鳳鳥有時鳴朝陽停雲之詩歌未足𤣥蟬為我聲相續哀詩鶴長鳬短總休悲聽我山陽笛一吹黄耳再無前日信丹心獨有上天知送行南浦成長别歸卧東山悞有期吾老未教僮荷鍤劉伶應笑阿翁癡讀大誥作巷歌二首天語諄諄禍福靈風飛雷厲鬼神聽掛書牛角田頭讀且喜農夫也識丁二一天風雨洗塵昏日月恩光及覆盆雞犬不驚田舍樂呌囂人不到鄉村贈陳棲雲鶴溪之水滆浦分一灣繚繞梅花村窮冬萬木凍欲死此花巋若靈光存清如西山采薇孤竹子白於華陽洞口隴頭雲隱居者誰希夷後人持一編種樹書戴一幅漉酒巾有時醉飲肱作枕老瓦共眠梅樹根有時不醉百事理可與孔公同出羣青鞵布襪駿奔走今年早春朝至尊紅雲殿前三舞袖歸來滿腹懐絲綸諄諄語鄰里切切教子孫子孫不但力耕稼徴輸能為公家勤編氓租斛足萬計雞犬不驚安老親短檠燈火讀大誥喜色夜夜燈花親甌窶滿篝秫田熟歲釀百榼酴醿春親朋簮盍座常滿湖鮮日擊豐盤飡胸中不著愁半㸃雲夢八九能鯨吞東鄰西舎靜如水夜無催科人打門安居樂土有如此何異武陵人說桃花源老聃戒止足願言尊所聞濁水膠可澄清鏡塵乃昏秋風挂席一相見此意吾將三復論贈周彦美象賢有子付青氊家住城西緑水邊門栁數株同舊日公租萬斛喜豐年試聽濯足滄浪曲應笑燃臍郿塢煙朝夕酒杯長在手優㳺身作酒中仙簡王尚絅不笑幡然謝九流牽車服賈思悠悠醉吟人老香山社詩到雞林價重不贈詹伯逺西北風髙寒露零牽蘿補屋揵柴荆看雲長日烏皮几夜夜教兒讀孝經示孫塏龍門一躍去年秋徑著青袍赴逺游半部魯論堪輔世政須忠藎繼前修二黔陽江水不勝清喜得居官濯爾纓秦鏡照人肝膽見邑民應在鏡中行三黑頭勲業志方雄黄耳書歸見面同斷織機中埀白母抱孫時復倚門東四春雨秋風歲又寒翁年近百足蹣跚横山菽粟東洲水多在行窩樂考槃初冬感懐令垣書所居屋壁在昔陵谷變海上十五霜歸棲失故隣乃落劍井傍百指薙荆棘耰鉏破天荒東洲釣月磯横山樵牧塲一葦去復來十月新稻嘗擕幼入寢門淒然北風涼吾兒婦嫠居我孫官逺方筠籠鶴何之盆菊花自黄跛倚赤藤杖終日徒倀倀初度蔑以為樂杜撰古樂府三章而令諸孫誦之老夫聽之比之挽歌者歌蒿薤於柩前豈不樂哉龜巢老人忘食貧歲時強欲娛賓親賣琴沽酒作生日蹲䲭爛蒸鮭菜新承歡幸有斑衣人君不見古人云酒杯不到劉伶墳杯行莫厭頻二龜巢老人貎不揚觸邪之性如神羊生憎巫覡煽妖妄疾視聃竺隳綱常耄無能為龜六藏滄浪曲窈窕章有時擊節呼兩郎男兒當自強三龜巢老人年紀多雞皮鶴髪背槖駝金丹自古無足信鐵硯如今亦不磨坐待蓋棺歸薜蘿舂有相巷有歌此時不樂成蹉跎殘生有幾何樵海歌為秦文仲先生作出山志云逺樵海名非誇老夫素相知髙風真可嘉早年欲伐廣寒桂增月清輝燭天地又欲㑹稽雲夢伐箭竹人無戰鬭遭鋒鏃汗青六經天下讀此志適蹉蛇陵谷俄變改青山樵侣集如雲一笑飄然入東海任公舊日釣魚處樵屋相隣蛟室住扶桑若木有餘薪且喜路無荆棘慮水底珊瑚樹亦多尤物不堪開眼覷樵擔弛樵斧歇濯足滄洲弄明月興來擊節和龍吟唱我海樵歌一闋也不學負薪讀書朱買臣也不識卧薪嘗膽是何人白螺為杯大如斗青苔席地軟如茵有時獨酌爛醉枕柯斧睡到日髙三丈猶醺醺夢魂不到長安市長安市上多覊旅米珠薪桂莫能賒多少伯桃寒餓死孰知海樵之樂有如此寄溧水開福寺長老源别流客有溧陽雲水僧相逢曾得問南能九重日月恩光近一壑煙霞道氣增龜紐肘懸新賜印麈談語續舊傳燈别來老病時相憶欲覓金篦刮兩瞢悼徐孟銘讀盡岐黄上古書幡然讀律應時需一官再調炎州幕二豎交攻瘴海隅頼有故人收白骨歸來鄉國瘞黄壚杏林花落紛如雨何樹哀啼五尺孤臘月十六日夜篝燈作兩書言不盡意夜半後欹枕對月口占言懐命兒軰録上耕學伯齡元修三先生南澗海萍二講主清真一鍊師暨諸吟友照天蠟燭徒明月縮地神仙是子虚九十一年殘臘盡二三百里故人疎詩成唐律傾懐抱書託吳儂問起居老我形容都變改依然貧似馬相如任義甫生日作絶句四首以鰥居無子貧病為憾予乃以理釋之誠如吾言則不必怨天尤人而處之泰然矣兄有遺孤骨肉親堦庭玉樹一枝春駿奔籩豆非無主傳襲箕裘未是貧池有紅鱗堪入饌杯浮緑螘可留人髙年已過磻溪老每日懽娛莫厭頻贈蔣居士全家欲學老龎禪木榻蒲團夜不眠誰信室中靈照女出門先上渡頭船贈袁居士羮牆欲見老瞿曇貝葉書中日夜叅布襪棕鞋門不出一盂疏食勝肥甘正月既望予奉陪邑長貳置鄉先生之祠于學釋菜而歸兒軰謂故人楊澤臞過訪臨别作長短句貽之余因口占以記鄉校中盛事并寄楊為後㑹之約云喜聞邑有絃歌宰哦松之丞更文采翕然敬我鄉先生祠諸學宫儼如在區區後學尊前賢駿奔執籩忘耄年深衣幅巾拜祠下燈月交光星滿天扶憊歸來語鄉曲此事真能厚風俗安知好客過柴門載殽問字成虚辱吾兒不識氷玉壺但言此客從前無醉墨淋漓灑白雪沂雩興與曾為徒老夫此興亦不淺尚怯落梅風剪剪少頃一百五日來蘭臯蕙畮光風轉三山湖頭舴艋舟百花莊上逍遥遊朝陽碧樹自鳴鳳湖海詩盟尋白鷗生平頗恨少知已晚有奇逢寧不喜朱絲重繫焦尾桐請為鍾期奏流水水田歌歌農務也郡縣之政租賦為急然農務乃租賦之所自出可不急乎首言三山書所見也一府四縣意在其中惟當道父母官念之芻蕘有詢更當面陳其詳以備采擇三山湖頭白水田頽㟁不修年復年田家豈不憂卒歲十室九空人索然饑腸雷鳴狀如鵠春來怕聞啼布榖願言州縣父母官喻令蚿足憐䕫足古云民事不可緩桃花雨晴春正暖文移動若風有聲畚鍤集如雲不斷三農畎畮合羣力四邑溪山增喜色麟史重書大有年官無負租民足食龔黄卓魯政績成一日九遷皆上卿天子萬壽黄河清聽我老農歌太平無錫舁佛像由暨陽而來鳴鑼鼓竪旗盖儀從僣侈家至以禍福惑人取粟帛無筭東洲任耆老沮之巫不遜被毆且以杖搪木偶幾躓而後去隣莊有王氏者撻而逐之予聞而喜乃力病援茟書此以美任并異其義理之勇云梁公毁􅁋祠真是霹靂手胡公能打鬼近代亦希有區區辨惑編或有蒙醬瓿潦倒東家丘忽爾發哮吼老拳敺妖巫拄杖擠木偶西鄰一壯夫怒挺擊羣醜捐袍偃旗蓋脫網疾走時予病中聞病去什八九朂哉爾東家内省宜弗疚報本理所崇毋落豺􅆩}
