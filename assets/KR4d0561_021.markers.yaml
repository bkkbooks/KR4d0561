  - {type: indent, offset: 18, content: 　　　, id: KR4d0561_krp_021-bkkind7}
  - {type: substitution, offset: 19, original: 錄, replacement: 録, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-4560}}
  - {type: indent, offset: 20, content: 　, id: KR4d0561_krp_021-bkkind8}
  - {type: indent, offset: 21, content: 　, id: KR4d0561_krp_021-bkkind9}
  - {type: indent, offset: 23, content: 　, id: KR4d0561_krp_021-bkkind10}
  - {type: variant, offset: 23, length: 2, content: 避雨, WYG: 我齒長於君者兩年以余之潦倒而君稍强健也孰謂君先棄余而逝也君骨肉之窆於此倐焉兩旬視時艱虞恨不能相從泉}
  - {type: indent, offset: 25, content: 　, id: KR4d0561_krp_021-bkkind11}
  - {type: variant, offset: 26, length: 0, content: '', WYG: 以安其居維茲寒食擕子孫狥俗祭掃以寓哀思尚享寒食祭子墓祝文墓藏而骨豈祭所乎然而爾之遺言有曰歸袝先塋子孫姻戚歲時灑麥飯於松楸之下志願足矣今茲寒食扶我擕幼設祭墦間以踐爾之言如爾之素志抑亦表長幼骨肉之情吾子有靈尚飲食之代祭胡隠君文惟靈世居東呉笠澤之濱厭處卑濕於茲卜隣同井為鄉埀五十春維桑與梓寖為婚姻待人以恭儉以律身二子克肖搆穫惟勤貽謀諸孫佔畢其呻老福婆娑笻杖幅巾如某等同一里閈往來侁侁以翁髙年而尊而親翁雖不飲席必同茵笑語相狎翁弗我嗔春風童顔喜色津津意其夀考籛鏗之倫何物二豎瘨我吉人我來問安翁語諄諄别不旋踵哭聲遽聞追念疇昔涕泗霑巾當此窀穸束芻具陳出門一慟悲風愁雲張彦實哀詞歲丁亥之仲冬丹陽張君彦實遘厲瘧疾不五日而逝其友人謝應芳為哭之慟且歎曰噫君自小倜儻多知謀尚氣節能仗大義平居論時事言如湧泉故縉紳多器之其憂人之憂樂人之樂亦庶㡬杜季良之流歟苐峭直不容人過遇强梗欲鉏去之用是或斂怨焉後至元間邑大姓與令有隙且與君不相能因媒蘖其短詣部使愬之謂君嘗為令納賄部使者初不能察稍加淫刑欲强服焉令恐噤不復辯君受挫辱至數日終不忍加誣於令若是者非伏義能之乎至正初里有横逆君疾之一日乃自殘其幼搆大獄以䧟君之季子聞者股栗君處之裕然詣郡邑雪理卒能}
  - {type: page-break, offset: 26, content: '', id: KR4d0561_WYG_015-71a, image: WYG1218/WYG1218-0366c.png}
