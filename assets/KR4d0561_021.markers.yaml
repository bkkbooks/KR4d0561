  - {type: variant, offset: 4652, length: 1, content: 共, WYG: 琴堂喜得佐絃歌俸米支來供爼豆髙懐炯如寒露壺連歩陟彼青雲衢兩塋銜土集義烏更遣丹青添畫圖題竹枝雀圖覆車之粟衆喧呼爾獨忘飢入畫圖枳棘叢邊林有竹一枝何異鳳棲梧題玉峰書舎圖為俞彦智}
