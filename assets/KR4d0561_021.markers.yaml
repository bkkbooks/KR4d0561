  - {type: indent, offset: 4713, content: 　, id: KR4d0561_krp_021-bkkind1417}
  - {type: variant, offset: 4713, length: 1, content: 哀, WYG: 三年縗嗟哉天質美如彼移家恨不居同里歸來細與吾兒說檢身自謂誰優劣緜駒處齊齊善歌東瞻玉峰奈逺何寄耕學袁先生新歲又人日故人無嗣音數詩曾倡和半載孰浮沉笠澤鷗盟在蕉隍鹿夢尋吾今洗吾耳聽此絶絃琴自和感年前韻軒軒黄鶴化鳬翁老態如今變亦同幾度出門遭鬼笑一生徒壁坐詩窮掃松先壠清明日杭葦官河舶䑲風春怨忍聞啼蜀魄傍人為我喜癡聾逸菴詩代膠山徐伯樞}
  - {type: page-break, offset: 4713, content: '', id: KR4d0561_WYG_016-59b, image: WYG1218/WYG1218-0398d.png}
  - {type: variant, offset: 4715, length: 1, content: 悲, WYG: 士學而仕猶力於農三時服勤乃逸於冬當勤之時以稼以穡鹵莽滅裂施報弗忒未勞而逸君子所憎勞而不逸君子不能於昭令典致仕有期一日必葺罔敢或随時之至矣銜恩遄歸逸子而菴亦孔而宜其容舒遲其行逶迤含哺鼓腹樂乎雍熙莊曰大塊逸我以老是用作歌以為頌禱清澹子詩世味尚醲郁清澹獨有水寡慾飬吾心汪汪亦如彼朶頥良可羞菜根有餘美凡為君子交當知肉食鄙題趙典史家藏聰聞極所畫水仙有人宴坐風泉室水仙之花照佛日冰鷗滌硯為傳神不著纎塵涴清質山礬是弟梅是兄涪翁品題非過情紅蓮幙静簿書暇時一覽觀心眼明題松菴圖吾聞張子房漢家初封萬户侯便從赤松方外遊又聞陶隠居華陽髙住三層樓尚愛松風聽不休從遊松子或假託請聽松聲真可樂古人今人同此心老去棲遲必巖壑白髪左司諫赤心天子知君恩飬老他日歸光州草木增光輝今觀畫史貌清致想像為作松菴詩青山崔嵬青松離奇三間薜蘿屋}
