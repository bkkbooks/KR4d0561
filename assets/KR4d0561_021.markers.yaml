  - {type: variant, offset: 4875, length: 0, content: '', WYG: 生日紅頰紫髯雙眼青六今吾故吾知不同朱門無復掛桑弓但將一斛葡萄酒浄洗平生磊塊胸七金作狻猊􅌊寶薫桃笙如水客如雲榴花不用纒頭錦也學吳姬舞絳裙八燕雀歡聲新第宅溪山佳景古丹青琵琶自製玲瓏曲彈與龜巢老子聽九拙齋之拙意何如天}
