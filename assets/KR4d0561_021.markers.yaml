  - {type: variant, offset: 4458, length: 3, content: 王校一, WYG: 乃無術麻姑送酒徒爾誇吾服吾霞吾自足安知世有萬羊禄夷齊餓死良可憐留得清名傳汗竹秦人採藥尋蓬山好兒好女無復還漢宫空設盛露盤銅仙為之淚汍瀾元霜本非霜絳雪亦非雪請從服霞道人逍遥指㸃空同授真訣貽五牧劉永真昔賢五牧家何在今爾幽棲地甚偏種秫每供彭澤酒煑茶時汲惠山泉錦鳩呼婦雨初歇丹杏}
