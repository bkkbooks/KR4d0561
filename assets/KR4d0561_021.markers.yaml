  - {type: variant, offset: 4811, length: 3, content: 後六注, WYG: 再變煙滅灰飛舊書院殘碑斷礎落誰家應作寒砧搗霜練南山北山禪者流鼓鍾雷鳴塔廟修儒衣儒冠亦不少孰謂好賢無二周龍鍾老諸生不言忍包羞甘棠樹下吐肝膽愛禮可得存羊不羊存禮亦存所願或可酬渠渠一畆宫依然對滄洲將使邑人知有東家某駿奔籩豆祠春秋簡曹谷賔徃昔政和間結交先君子時葉公子承蔣公子舟諸良友數嘗文㑹於九華隠者周先生之家其書札之妙}
