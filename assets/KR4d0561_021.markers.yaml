  - {type: variant, offset: 5455, length: 2, content: 五靑, WYG: 馳驛路林下讀書人龍澤靈湫古牛臺佛樹新盲翁飛不去徒憶外家親懐辛至善通江橋下别小海醉中聽玩世頭俱白逢人眼共青溪}
