  - {type: variant, offset: 4878, length: 0, content: '', WYG: 五日承郡齋文㑹翌早賢長史置醴􅍁洽且有贈言次韻奉酬并謝不敏文章太守誰同樂幕府賓僚如李郭坎蛙誰信有奇逢鼓吹敢随東海若枯腸喜得酒一澆枵腹毋勞篾三縛獨憐澗底老孤松春風膏雨徒優渥初度作重光之冬湯餅客孟光相對頭俱白吾兒樵雪中歸來擔頭還帶詩三百詩歌熾艾夀觴舉呼鶴堦前舞瑶翮安知此後境多乖五載家門毁雙璧行年今與伏生同兀若枯株雪霜厄樵兒遺孤主黔簿四千里外勞相憶我昔蹉跎四方志每見桑弧有慚色願言膏雨發孫枝先世衣纓復輝赫皇天於余賦亦厚才散如樗夀如櫟語言聲音耳尚聞黑白分明眼猶識四肢百骸筋力微頭容與心依舊直呴嘘素不學松喬逆理偷生正何益曹横山下青松宅含笑全歸待朝夕山瓶乳酒如蜜甜笭箵寒魚鮮可食家僮荷鍤且勿忙為我挿花吹鐵笛自今每日從歡伯龜巢甕天適吾適斷送予生真上策卧雲歌為華景章作我昔所喜青雲人雲梯登登上星辰餘如風花落藩溷伊人可仰不可親只今老我成枯朽愛爾巖棲卧雲叟白雲一壑數千畆且無租稅論升斗悠悠我如雲寂寂雲伴我雲無出岫心吾無洞門鎖一榻偃仰得自如兩膝屈伸無不可布為被非難能我被以雲如白綾木為枕吾未曾以雲枕頭時曲肱牀無上下亦無客别有意氣非陳登飛鳶跕跕自炎海夜鶴繐帳清於水佳哉叟之所樂者如彼今人古人誰可擬華陽陶隱居投簮謝朝市山中作相心未閑剛道怡雲豈無愧華山陳處士大笑脱塵屣鳳凰銜書空徃來熟睡雲臺終不起願言學陳毋學陶此身長與雲逍遥萬松嶺上老禪衲形服雖異同清髙况有煎茶好泉水活火煎來味無比詩腸搜出煙霞語不異不同人共喜老夫耄矣筋力少尚欲去著遊山屐細啜月團雲滿甌分卧石牀雲半席幽懐為我一宵傾免使相望兩相憶郡侯以蘭行年九十以詩見贈敬以次韻厯叙平生以鳴謝臆延陵野老家業儒舊壁頗有先人書童年愚鈍不努力渉獵五經多缺如二十而冠三十娶取友必端無佞諛春秋四十五十餘髮猶未白顔猶朱才如襪線不知恥光範門前曾自譽}
