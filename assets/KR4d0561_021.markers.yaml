  - {type: variant, offset: 4518, length: 13, content: 紆靑紫紫作朱後五釣竿釣作綸, WYG: 鑚將奈何不如且曳泥涂尾相伴幽人弄煙水細看元在畫圖中多言莫笑癡獃翁管伯齡惠書并和詩故復次前韻荅芙蓉湖照横山影蓬藋門開曲逕通半載月昏渾不出一經頭白未能窮論交半是漁樵者訪舊多於夢寐中説與故人能信不頹然黄鵠化鳬翁維揚王有恒避亂居東吴三十餘年所至寓舍以聴雨篷名之多學能琴而善飲醉則鼔琴自娱故自號曰醉琴然鄉土之思亦嘗扵琴發之予盖相聞而未之識也吾友釋仲翔専書為求}
