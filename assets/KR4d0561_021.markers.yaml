  - {type: variant, offset: 4640, length: 1, content: 鼠, WYG: 懐言不盡臨岐目送思依依賀袁一泉陳大方新任道紀司官山中宰相古來有地上仙官今更清夜半光生䨇劍出秋髙氣感九鐘鳴丹霄拱極星辰近黄道經天日月明𤣥牝書中多妙理政須獻納佐隆平賀聰聞極正心印新任僧綱司官象法提維付偉人聖皇綸綍命諄諄手持正印天龍䕶身著方袍雨露新旭日斗城衙有鼓清}
