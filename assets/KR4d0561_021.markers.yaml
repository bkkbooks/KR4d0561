  - {type: variant, offset: 4879, length: 0, content: '', WYG: 七八十成潦倒興來尚復歌吳趨今年九十常晝寢誰敢效尤扳宰予雲山萬疊作圖畫松風一壑鳴笙竽雙眸漸昏耳漸聵面壁寂寞如僧居焉知府公特尚齒贈以大篇明月珠老夫得之感勤渠雀躍起拜不用扶合室稚老俱驩虞十一月廿七日得塏口信以詩志喜并記臨别祝規之意賣橘人從采石還口傳家信報平安路經湖北雖云逺}
