  - {type: variant, offset: 4667, length: 0, content: '', WYG: 夏五余寓崑山延福菴蒙李無逸冒雨見訪且邀午酌以尋二十年交好之盟席中聞余茂本通政談玉峰志鏤版無逸能力為之髙義可喜别後作此詩以賛其美并致謝意云老夫著書雪盈顛秃筆掃盡松煤煙書成無人為傳刻明珠暗投三十年玉峰有志今雕鐫公乃下榻邀羣賢魯魚亥豕盡滌濯銀鈎鐵畫森戈鋋婁江風物靡不載一邑快覩人争先知公髙風雅量振頽俗令名當與傳澱山湖邊五畆宅芙蓉錦城耕稌田多情念我久離别風雨逺來書畫舡開樽竹館話夙昔屋角雨聲飛瀑泉爛烹鶂肉軟炊黍特憐老齒令相便草堂之資送杜甫遥知破屋窺青天别來東望澱山月再盈再虧今復絃鵷雛出穴皆五色門牆桃李春俱妍無由縮地更擕手寄詩并送思賢編自挽洪武六年}
