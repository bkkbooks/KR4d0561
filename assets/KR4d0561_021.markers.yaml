  - {type: variant, offset: 5433, length: 0, content: '', WYG: 里宛若浣花流水西頭住滄洲繚繞白鷗沙青山隔斷紅塵路幽棲人似鹿門龎畊耘特欠妻孥助清時固難遇生處聊自樂閭巷絶車馬堦庭可羅雀門}
  - {type: variant, offset: 5434, length: 1, content: 四, WYG: 芳草不教鉏㸑下焦桐亦髙閣排衙不聞官舍鼓抱闗那知兵戍柝催科吏不打吾門知我家無田負郭穿窬盗不入吾室知我帑無金可摸烏衣喜得客居安黄耳且無家信惡愛詩愛酒愛親朋此外物情俱澹泊鄉來無鍚山中泉潺潺日夜流青鉛三吳化作百戰地草木血腥人亦然殘山剰水本落寞地因人勝佳名傳老夫獨恨傾蓋晚枕書方作邊韶眠清晨曹劌過空谷}
  - {type: page-break, offset: 5434, content: '', id: KR4d0561_WYG_017-98a, image: WYG1218/WYG1218-0452a.png}
