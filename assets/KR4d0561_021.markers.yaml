  - {type: variant, offset: 600, length: 0, content: '', WYG: 澒囂塵藥杵聲中樂隠淪兒軰荷鉏今日去一株添種杏林春雪舟棹歌并序湖南潘公珍仲自號雪舟以耆艾之年監稅江隂縣洪武戊辰冬赴京考績語予曰今將告老于朝得㫖則扁舟載雪而歸矣雪舟之興盖與山隂王子猷有不同耳吁昔者陸公紀官滿欝林歸舟載石使當日苞苴有物則奚用是石為哉公之雪舟意盖如此若夫鴟夷子皮之舟装江南重寳復竊取傾國之尤物随之汚衊五湖遺臭千古其視吾載石與雪者不翅霄壤今雪舟之歸雖未可必然其志趣髙潔如此雖在市朝亦必為清白吏是亦不歸之歸也予嘉之故為作雪舟棹歌三章以道其樂云載雪兮孤舟帆江風兮中流蘭槐歸兮無恙吾將老兮滄洲再歌剖肉兮藏珠抱玉兮求沽悵斯人兮非吾徒尋鷗盟兮侣樵蘓三歌舟揺揺兮江水長五老玉立兮遥相望解吾纓兮濯湖湘樂吾之樂兮未渠央送王主簿赴京考績三年一枝此鸞棘一息萬里方鵬程長安西日舉頭近匹馬北風行色清朝廷考績埀令典臺閣交薦蜚英聲隣封野老頭雪白也折}
