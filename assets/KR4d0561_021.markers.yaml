  - {type: variant, offset: 760, length: 756, content: 河海河作湖十二後八五月天風吹巾舃王校吹作冷後九遇客尋真羽衣客遇客作遇逐十四前二金牛城西牛作斗後五六去時聲啞啞歸來宋校此二句作去時羽翩翩羽翩翩歸來聲啞啞後七子爲子王校爲作生萬物人爲靈人爲萬物靈後九以詩貽王校詩下有見字十七前二浸書閣王校浸作沁前六祶袍祶作綈後九詩成天一笑詩作書十八前九繆談恕陶潛王校談作誤後四何由過幽􅊤王校由作當後七十年走京洛十作少十九前八捍闘頃流血王校頃作頂二三前五寄惠山鑒長老下有注字仲明號太虛六字二五後八九迷經路迷經作徑迷二六後四歲歲九龍峯前脫無錫贈何敬存一題二八後三爭聲喧爭作鳴後五勿使空人之曠城王校曠城作城曠人宅三十前七河江浸坤軸河江作江湖前八珊瑚珠珠作枝後四辨惑編編下有序字後九塵世盈我襟宋校世作土從此閬風岑此作遊三二後五啣土有慈烏土作吐烏作雅三三前五羣圃何時重構築羣疑郡之訛三四後八無有似者有作肖三五前五覺來憶詩話話作語三七前五臨期賦遁去王校期賦作岐賊前七相願猶夔蚿願作顧後五吳兒賣戈劎宋校戈作刀後六何曾盡掃除宋校曾作當三八後八西京宋校京作凉後九東齋可談書談作讀三九後三爲賊所得王校得作執後四以一身代衆人之代作免王校作脫急後八難明之志志作心四十前八擊賊作癘鬼癘作厲天意不可問意作高後五能慰謝謝作藉四二前三高樹蔭釜堂釜作華王校作斧後一稍暇曾讀書曾作仍四三前五飛灰灰作埃四四前四注十五日十五作初一四五前四春雨生王校生作晴三一前八問之爾何忙爾何二字乙轉二後三噫下有注翳叶於結反五字後四憶兄下有注八月中結友五字三後五寒飢飢作餓五前七寒食前前作日六後二授餐慰行邁餐作粲執德心宋校執作報後八東郭兔兔作㕙七前二往往多是逕鄕民王校逕作還八前九誰令紀綱壞紀綱二字乙轉後五丞相聞新詔宋校聞作開後六除官平舊章宋校平作率後七何以玉能藏宋校以作似九後六遇蘭若王校遇作過十前三禪板打王校板作杖十一前後折九一兩㳺阻戈, WYG: 交}
