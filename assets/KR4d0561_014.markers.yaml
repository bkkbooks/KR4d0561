  - {type: variant, offset: 0, length: 17107, content: 龜巢藁卷之十四序送黄仲賢同知吳江州序國家以民為本故州縣守令之職必慎擇焉以其近民故也苟知近民之理則必如醫之近人察其脉而知病否農之近田視其苗而知羙悪母之近子求其意而知欲悪苟非其人則何異以巫為醫以工為農以塗人為子之母乎至正己巳秋太尉丞相知黄公仲賢之能啓奉正命命同知吳江州事其職可謂近民矣或曰君前爲江西省照磨爲南臺掾所至蔚有能聲末嘗近乎民也矧今位州長之下僚佐之上凡所處决非已得專其爲政也不亦難乎予曰位不同而理同苟吾之理明如鏡照物持此以居同僚之間無偏執無詭随一州之事交相可否舉直錯枉惟理是従必能使斯民無嘆息愁恨于田里者矣夫如是可謂醫之知病否者也農之識其苗之羙悪者也母之能求其子之意而知欲悪者也近民之理如斯而巳君之行其友某請予以理之一言叙而送之予則毘陵謝應芳也贈卜者陸仲明詩序卜筮之説予嘗著辨惑編論之詳矣今吾友徐君伯卬謂中呉陸仲明氏善卜徃徃以疑事决之其應如響故率諸善文辭者贈言且徵予為之序夫枚卜功臣雖唐虞之聖猶用之若三代則塗山之卜飛熊之占百谷之筮皆騐以興國特不知當時掌蓍龜者何如其人也春秋時或者謂筮長龜短而龜獨重于世家國大事未嘗不謀之善卜者誠能紹天之明以七十二筴洞明吉凶其人豈易得㢤但世之假龜䇿以售妖誕之説者垂簾居肆所在有之君子不能無憾焉夫以伯卬之明智而稱仲明若此則仲明之精于卜也可信矣雖然昔君平於問卜之士語臣以忠語子以孝其諸善道莫不随其人詔之于世敎殊有𥙷焉諸君既賦詩以贈譽予不佞復以是規之仲明其留意焉婁曲書堂詩集序人情孰不愛其子乎惟其愛之以徳使之能自樹立斯君子之愛矣崑山殷君叙父有見于斯視嬴金不如一經乃買書築室于婁江之上命其子奎日與師友講學寝處食息于其間而奎也服膺父訓篤專厥修而經歲累月足不跡庭户外學與日積聲聞遠迩若參政鄱陽周公亦過而嘉之扁其室曰婁曲書堂既而鉄崖揚先生及諸名士皆有賦咏而予亦嘗題其壁焉今君叙又欲因詩以賈其子之餘勇而益進之乃裒集諸詩時令諷誦且俾予序所以集詩之意吁若君叙之愛其子者可謂君子矣奎字孝章亦可謂孝于其親而名不虚得矣予嘗三復是編頋其詩類警策不特頌殷氏堂搆之羙而已使凡為人父為人子者得而觀之莫不有所感發興起而為風教之助云杏林春詩卷序予嘗讀列仙傳至董奉杏林之事嘗掩卷而嘆曰嗟乎奉必有道之士而隐于醫者也觀其用薬活人而不責人之報以杏易粟且復賑夫飢者非有道而能若是乎傳者葢欲特著其事託為神仙以髙之殊不知君子之所取者在此而不在彼也呉子中行去奉千載景慕之将繼其羙乃大書杏林春三字于齊居之室示不忘也所謂杏林者葢根于胸中方寸之地而春則發乎秉彛之天流芳後人傳之不朽非蔚然佳樹而巳吁中行之學人固知能世其家而其心則予猶恐人或未之知也今觀四方士大夫遺之詩文咸嘉其存心之仁儗諸董仙無間者可謂有諸中形諸外矣予于是益加起敬三嘆之餘用題卷首送琇上人序予聞浮屠氏之學其宗有三曰敎曰禅曰律敎以明法理禅以悟本心律則操且式而巳三家説行互相優劣果孰得而孰失㢤吾意其宗于敎者猶儒而窮經要得其本矣彼禅兾頓悟律謹細行雖各有義然循其常而求之始乎粗而卒于精始乎求其言而終有得于言意之表者則于教誠有取焉玉林師有見于兹也自少走呉楚間求其㴱于浮圗之書者從焉又旁求吾儒之書而讀之故能歲時享其祖禰而且仁其族也予故與之交且䁥焉今玉林以斷雲法師主澄江迎福之席得華嚴之傳徃貳之以尸其悦衆之職吁醍醐甘露悦乎口者也秘宻之藏要妙之理悦乎心者也師徃以其詩究竟衍説廣示其衆来學之飫焉者孰不歡喜而信慕㢤而况有得于吾儒之㫖耶于是衆餞以詩予則為之序云送慈晋卿序秦漢以來官不封建為郡縣者徃徃以交承之數視為傳舍治效葢蔑如也况廵檢或以省檄之過郊授者截日代去其傳舍尤非郡縣之比惟慈晋卿則不然君来犇牛即諗諸衆曰吾居此誠不知能㡬何時然食君之禄雖一日必事其事爾吏必謹其案牘爾廵兵必嚴警邏否則必汝責弗恕于是各殚其力而君之用情尤倍之居民謐寕盗賊屏息四境之内晏如也既而郡府以材榦聞復以渠堰等事委之夫犇牛當驛路之衝凡朝廷使命之出東南方物之貢與夫省憲百司徃来絡繹㒺不役廵兵䕶送之稍緩則怒罵鞭扑皂隷不能堪而君處之泰然每以身代廵兵之役退無怒言閲四年如一日葢其立志之確而忘其勞且辱也今郷人徳之郡府嘉之儒紳君子咸賦詩以華其行吁世之傳舍其官者聞慈君之風可以少變矣送秦彦明序士不可以窮逹論也窮而耕莘達而阿衡窮而釣渭達而鷹揚窮而版築達而霖雨所謂窮達者時也向使諸賢者不遇于時則終為莘野之農渭濵之漁傅岩之賤夫耳吁今人猶古人也惟其藏噐于身待時而用不躁不競斯為可貴世之狐趋狗媚利禄以榮其身者君子恥之淮海秦彦明儒先之子也家庭之訓聞此熟矣觀其所負之噐如干将莫邪用為𥙷履之錐豈其利㢤然而為貧而仕與浮沉未嘗有毫髪躁競意征商之暇每與僕痛飲劇談商畧今古語及先民耕釣版築之事必奮髯抵几激昻盡醉而後已今其行無以為餞請以疇昔所常共談者書以贈之以堅其待時之志送趙縣尹之安仁序予聞古鄱陽之地土沃民富物産饒衍故以饒名州考之今則銀錫絲絮魚稻之属誠夥其民誠殷名不虚得矣郡属州縣六安仁其一也土壤民物視他邑為最或謂其民習奢靡蕩礼法不才者居多土沃故也為此邑者厥惟艱㢤是不然凡民之情有恒産者而後有恒心庶且富而後可敎否則汲汲救死不贍敎将焉施然則安仁之民其可敎者奚其難但近時州縣吏視其地之瘠肥民之豊嗇以為幸不幸者其意有不在乎治之難易也今趙君天祺為安仁令吾知能敎其民而不以為難也必矣何以言之徃者君大父為賢守令著稱于時君卓然有祖風烈製錦斯邑牛刀發硎豈不恢恢乎有餘地㢤斯民也将見𬒳絃歌之化成禮譲之風熈熈乎耕稼之為樂也寂寂乎雞犬之相安也皥皥乎不知帝力于我為何有也麻中之蓬亦何待矯而直㢤君之行可慶者如此而其民又豈不大可慶乎贈刊字張生序古者毫楮未興書以刀筆故六經徃徃口傳耳受不能無誤然識者正焉其失猶未遠也毫楮既作師道乃俻轉相傳冩譌謬滋多至近代板刻之誤而人有不敢遽易者况俗徒規利至有節去其詞使章斷句裂以誤學者然板夲既行聖經賢傳乃得家傳而人誦之固亦有功名敎矣金沙張敬之善􅍢書者也家本業儒故能矯二者之弊且以篆􅊢究字書原委偏傍點畫毫髮無舛士大夫咸以是稱之方今天下文明正制度考文之日舘閣諸書校讎有人勒之琬琰以幸来世将有取若之藝者若之名由是亦彰矣敬之其勉㢤送崔仲徳序予徃有京口之行識崔君仲徳于諸葛用中席上温温其容抑抑其儀其言論粹然一出于正心窃敬之意其人非天質之羙必師友淵源之懿也既而詢之士大夫乃知君姚文獻公之門人自蚤歲篤學尚友千古文献公特噐重之及壮侍親宦逰臺閣多薦辟不就今也為貧而仕監税吕城予嘗壺觴庱寺得以聆文献公緒餘之論窺君抱負汪洋無涯既而部使者諗君之才以郡邑危難事命之盤根錯節迎刄而觧識者韙之或曰君徃年唾視軒冕而今何屑屑如是耶予曰不然仕止乆速時也安知徐駈于後者不疾過于前㢤苦心志勞筋骨空乏其身又安知非天之所以玉其成乎予聞文献公宗孟氏之學君于此聞之熟矣尚兾尊所聞行所知以厲其所守功名爵禄特餘事耳請以此為臨别贈送小湖徐廵檢序常為浙右大藩府統州縣四廵檢司又五倍之獨小河瀕楊子江風颿浪舶輻輳岸下販私塩以漁厚利者徃徃與居民通甚者禦人江海之上日薰月炙悪習滋蔓數年以来號稱難治淮安徐君逹善適官于兹君患之視政之日即申明憲章以嚴警邏吏不敢肆卒不敢怠未㡬民有蹈前轍者追亾摘伏㒺或遺漏境内肅然道東西行者争稱譽之由是郡知其能乃攝奔牛黄土之警君一以公勤􅊩之民皆謐寕閲五載如一日今代去彼鄉人之頼以安者設祖帳青門外皆依依然不忍云别予既嘉君之有徳于民亦喜其民之不忘徳也吁今天下之盗豈止是㢤蠭螘之衆窃兵于遐陬豺虎之徒賊民于當路斯民尤苦之以君之才使之佩虎符擁貔貅則蠭螘可掃也使之峩廌冠持玉節則豺虎可擒也蠭螘掃而豺虎擒斯不負其才矣贈醫士頋彦文序頋氏為吳中望族舊矣近代家益濠者多業儒至我彦文生而岐嶷方丱角即慨然思所以濟人且曰士而未逹蔑以及物惟醫其庶㡬乎于是挟古今醫薬之書徃從舅氏葛先生學焉探賾索隐垂十年業成而歸惓惓乎欲展其素志凡以疾吿之者必詳審製善薬手足視貧富無間然者故徃徃薬有竒效特稱良醫彦文方謙謙不自滿不責報于人然人既徳之而亦未嘗無報也吁古之善醫國者其操心葢如耳禹視人之病溺也殫力以䟽導之法拯之稷視人之病飢也盡誠以稼穑之方救之伊尹以一徳療傷桀之厲周公以四事觧中紂之毒調隂陽弭灾眚保飬生息卒能躋羣黎于仁壽之域以成十全之功漢唐諸公功雖不逮然于人所疾苦随用救藥㒺不殚乃心力今覌彦文用心之勤如此必有見于此乎一日友人安元卿以其有未報之徳相與載酒濠上因以前言質之彦文笑而不答余復吿之曰昔丙吉于孝宣㣲時有大恩其始未之知也他日将封侯丙吉病甚上憂其不起識者謂吉有隂徳必享其楽後果如其言然則有盛徳者不報于人必報于天此又吾彦文之所當知者酒既終元卿請書此為贈送楊善章序至正辛丑春予舟次吳門友人楊善章過予曰先大父安撫公葬餘杭考妣祔之杭人以丘壟之廣竹樹之盛名其地曰楊墳是也前年冦兵入境喋血百餘里古今坆陵邅禍樊祟者不可勝計我先壟雖赭其地殯宫幸無恙焉然而冦退之後榛棘蔽野鳥獸之害人出没其間春秋霜露之思悵望飲泣痛吾親弗及夏畦馬醫之鬼一抔之土又安知終無緑林之患乎朝斯夕斯情勿能巳今将徃以浮屠氏茶毘之法舉之凾骨而歸葬之吳之西山庶㡬歲時省掃以寓追逺之意于理其可乎㢤予曰此理之變也禮曰古不修墓况改葬乎不得巳而改者固有之矣舉而燔者未之有也雖然當此喪亂之際而三綱㡬絶父子或不相頋今善章一念之孝不忘乎親将冒險涉遠負其親巳寒之骨去危就安斯可取焉君子固不當以常理責之也予既荅善章之問因筆諸簡牘以餞其行送彭主簿調吳縣序昔人謂州縣徒勞者誕矣夫州縣為民父母居是官必有子愛之心盡撫字之寔以勤以勞斯稱厥職于戴星出入者致一邑之治運甓朝暮者成八州之功否則淪胥尸素有不免君子伐檀之譏若我長洲簿彭公其可謂能勤勞者欤長洲隷大藩加次師旅飛芻輓粟事如蝟毛公以明敏之才剸繁治劇如庖丁觧牛得其肯綮刄有餘地然一念之愛切切乎為斯民保障服勞盡瘁不怠不息未㡬府令出郊視水以董事農事公所至訪民利病見諸施行集流離而為土著飭㳺惰而躬稼穡抑强扶弱扶剔奸蠧民用大快或吿之曰公今職有所專餘若可置公大不然言一邑之政皆簿所當為吾敢惮其勤乎尤務以亷譲律身以清苦自厲雖按行之勞酒肉不御日三飯脱粟而巳吏卒從行操如束􅊜然割已俸食之使畏而愛于民無毫髪擾至若尊賢下士温温乎其容秩秩乎儀動遵矩矱言必忠信有古人之遺風焉由是廟堂嘉其能改調吳縣葢欲用利噐于蟠根錯節展其效耳今士夫大為邑人抒去思之情詩以贈之吾友陶君徳潤知之深走書以序引見屬凡所稱道皆予曩聞于人人者吁賢勞無前加以無倦其治效當不止長洲吳縣而巳将繼羙長沙公八州之大吾言斯足徵矣贈醫士吳中行序僕老吳下常怪其俗之陋尚鬼而多惑嗜利而輕義欲得卓越之士不為習俗所移者相與語道葢寥寥耳一日友人趙君執中書来曰去年春彛舉家病疫垂髫之兒蒲伏薪水適錢塘世醫吳中行来閔余故交過門視疾謂二親巳不可療彛則藥而愈矣時族姻比閭方煽乎妖巫之妄疫鬼之害跡不及門獨中行曁里人陳希玄日一二至扶持而薬之饘粥以飲之彛得不死未㡬吾親果相繼而殁中行又力為之㐮事閲數年月彛念蔑以報厥徳姑償薬資中行拒而不受今里中士大夫皆賦詩以美中行請為之序焉僕閲書起敬恨未識其人耳既而識之且聆語言知學問之博識趣之髙不特醫業而精又嘗得劍術之妙達官貴人多用薦辟然骯髒不苟合不屑就卷而懐之泊如也惟讀書窮理愈進愈力假醫薬以寓吾心之仁而濟物焉若中行者可謂不淪胥于尚鬼之俗而惑者也亦可謂能舍利而取義者也亦可謂卓越不俗而造道者也斯人也昔吾願見而不可得今既得之可不楽道其善以勵其俗㢤吁麟角鳳觜世不多見孰謂世無麟鳳與識麟鳳者知其待時而出不乆将有日僕等又當刮目以俟送梅知州序予嘗觀古之為政者惟能以亷律身則心清而理明身正而道行故周官以六亷計羣吏之治自漢而下史稱亷吏者其政皆卓卓矧予西溪梅公生質英敏加以學問之力亷介絶人初倅崑山聲聞于時遂陞同知州事在州六年門無私謁較諸楊伯起却故人之遺羊興祖辭府丞之餉范史雲之塵甑馮元叔之齊馬無以異也當其􅊩事之日時與同僚相可否同僚曰公亷而能所可否非私也當從之無戾焉御胥吏防其奸欺窘如束􅊜胥吏曰公亷而正所窘束非苛也當謹之無違焉至辨獄訟均租庸用刑罸以齊其民民則曰公亷而明刑罸非暴也當服之無犯焉是故佐是川之乆道日益行政日益修品秩加而名日益著焉耳今知吳江寔為州長而位乎同僚之上其御吏其治民又非前日佐貳比惟仍以一亷處之則所謂心清而理明身正而道行可必矣吁庖丁觧牛刄有餘地葢得其肯綮之要也若夫以亷律身豈非為政之要乎雖然克終之戒君子慎之某辱公為布衣交于其行敢以君子所慎者吿之為臨别贈送費知州秩滿詩集序東平費侯為崑山之五年二月初吉侯得代時毘陵謝某適寓是州聞州人頌之曰公昔下車時方擾攘民用蕩柝老弱餓莩餘或行伍勞来之乃復土著以耕以桒以生産而租賦然猶惧不能安其業也頼公之明為能識民情而燭吏欺使民得盡其欲悪吏不敢並縁而為奸媸媸之民間有訟于庭者侯必先誨之諄諄焉如父兄之于子弟良師友之于弟子䧟于誣則為之直其枉而不避困于役則為之節其力而不窮至其有罪施以刑罸亦未嘗無哀矜之意焉是州地方二百里其民咸得安土而粒食者侯之恵也又曰學校乆廢侯振厲之尊育賢才文敎蔚興黌宇輪奐視昔有加而閭閻委巷絃誦偕作使之駸駸乎為禮義之俗者侯之功也子聞而嘉之既而道海虞適無錫過長洲茂苑周逰乎淞江太湖之上士大夫凡與談崑山費侯咸稱譽如州人之言其能詩之士各賦詩以贈之予則即其所聞以序編首書畫舫燕集序古之人凡樂其髙尚者必寓意詩酒花竹山水之間與之逰者葢亦楽其楽焉若我玉山隐君其亦可謂髙尚者乎君生長世家一旦盡去其少年豪華之習結草堂玉山中蒔花種竹日與山僧羽人布衣韋帯之士以逰以居達官貴人未嘗一見其靣徵車之来則踰垣閉門甚于叚泄不知者或􅏺以迂怪君聞之自若也至正庚子秋愚隐師携祺上人過之語道相契日坐至夜分乃巳一旦君置酒書畫舫主賔凡八人其七人皆善飲獨遇隐師性不嗜酒亦欣然為勸酬嗢噱各盡其歡既酔以對酒當歌人生㡬何兩語䦰韵賦詩時秋髙雨晴芙蓉金菊之花照映池島悦人心目而咏歌有不能巳者故分韵之外復有倡和之什焉夫愚隐一至留數日非惟主人留客之勤而客亦眷乎山水花竹之間而忘其去則所謂楽其樂也諸詩冩燕集之娱園池之勝俻矣予復引而申之以識歲月梅隐山房詩集序昔人有言天下無真楽随所遇而得者乃真楽也今吾以珏上人觀之其信然乎徃上人逰諸方參菩提逹摩西来之意名山勝境長年忘歸不知者意其江湖之楽耳既而歸錫谷影不出出山渉獵羣典適興賦詩怡然自得又若移其楽于山林文史矣至正癸夘春愚隐師主禅月道塲召為記室上人以佛法淑同𫀆之士以詞章接縉紳士大夫人皆楽其道之行焉閲數月謝事當路者或薦舉之孰不曰以珏之才之羙宜其繼羙黄龍益弘斯道殊不知上人之来特以答愚隐師相知而巳餘非其志也于是飄然别去渡吳江過崑山東瀕于海頋荒江寂寞之濵僧廬幽閴梅花環繞境與心㑹乃寓缾錫題其所居之室曰梅隐山房蒲團木榻晏如也定起之時曵履梅下或欣然猶迦葉視拈花而喜而人不知也吁東吳巨刹楼閣相望鐘鼓之聲相聞苟從當路之薦置身蕭爽孰不為之楽㢤今若此其楽葢自得之有難以語之人者欤諸君懐上人者為之賦梅隐詩一卷俾不肖題其簡首予不敏姑以平昔所知者道其梗㮣云送理上人歸天台飬親序予避地吳下聞宗元師之名者數年及與之逰則知名不虚得方以見晚為恨師乃念親老于家言歸覲省且欲築室于先人之墓祠佛飬親以酧㒺極予聞而嘉之因請諸縉紳歌詩以贈其行或曰子逢掖者又嘗著書辨老佛之惑矣彼浮屠者既與之逰又從而譽之何㢤予曰不然予交浮屠亦各有所取焉徃在京口以清苦交了翁即在金陵以文詞交訢公後于杭交古鼎銘公以其端謹而誠慤也今于吳交愚隐智公悦堂顔公一以其有濟人之仁一以其有事親之孝也其他或學或行或趣識髙遠未嘗無所取焉今宗元有了翁之清又心乎顔公之心可不敬乎吁當此兵戈之秋道路梗澁頃歩千里有能披荆榛冐矢石梯山航海勇徃而不頋者皆功名之士貨利之人求其如宗元之行葢少矣夫宗元于蘇湖諸大藂林所至安隐且有虚主席以待之者師皆辭焉誠使結廬以守松楸之地持缽以盡菽水之歡可謂釋門之曽閔矣彼織蒲如陳睦州者寕得專羙于昔乎諸君子然予言既贈之詩予乃述所以致敬宗元之意弁于篇首為徑山顔長老送丁州判序予聞古之任人者為官擇人未嘗為人擇官故量材授任不遽更易必使乆于其職而得以考其績焉今丁君克明為崑山州判官洗心奉公孜孜厥職凡州長發號施令必相與可否然不負乖刺惟是之從至如出郊勞農河防繕修警邏之役靡不殚其力焉秩甫滿公府復命判嘉定州事可謂委任之專有古者為官擇人之遺意也以君之才㳺任厥職是猶駕輕車就熟路不遺餘力凡昔之所以澤此民者其必澤彼民矣等而上之佐郡國貳憲省将無適而不可大噐晚成其可量㢤某以乆䖏鄉邦故知公為詳于其行書此為别并為嘉定州人之賀云送陳允貞序士君子負有用之才必得善識者擇而取之然後能適其用耳譬之木檀之可以為車楛之可以為矢桐之可以為琴瑟𣏌桞之可以為桮棬楩楠豫章之可以為明堂棟柱材雖良能自致其用乎至正乙巳王命江浙分省參政周公開望亭河為固國計公知允貞為能幹濟使董其役允貞方以吳江州吏目秩滿而歸承命之重義不敢辭于是殚志盡力宣勞王事召畚􅓩數十萬人為之計工程限期日不疾不徐民用子来兩月之間事功乃集河長四十里北接􅒩湖南通􅒩渠又東注于震澤吳人視之猶金湯然則若允貞者可謂有可用之才矣又得善識者擇而取之斯適其用矣今允貞赴塩場幕官吾知其才足以有為也塩法之弊多于牛毛各部細民葢有望于良有司也乆矣惟允貞盡其才之用焉為智長老送蘇縣尹序至正丙午春予方過上海卓錫于寂寞之濵適縣令蘇君彦祥秩滿而去士大夫祖帳都門外田夫野老遮道請留或膝行而前脱君之靴先後數四不啻攀轅而卧轍也予嘗揖父老而問之曰蘇君何以得若等之心而此㢤父老曰我賢令亷明公正材幹絶人三年之間凡可以康濟吾民者知無不為且精于法律小大之事處决如流吏畏民服租賦非不重也頼除去宿弊而無横歛之毒徭役非不夥也以差次民力而無不均之苦至若謹庠序明教化置礼楽之噐以嚴祭祀増社學之設以廣文敎凡祠廟之在祀典者皆修舉廢墜䴡牲之碑所在正立街衢橋梁舉邑完好又曰縣瀕巨海江流交接風濤洪肆險悪萬状禦人者徃徃出没其中過者病之令乃相地之利由縣治西南開大港接新涇口延袤㡬四十里墟邑相望雞犬之聲相聞昔之畏境今為康荘風帆雨檝晝夜不休縣之人不忘所自因以蘇港名之予聞而嘆曰令賢乎哉此葢千萬世之遺澤也秦之白渠常之孟瀆杭之蘇堤葢此類耳予復何言特以前所聞父老之語序而送之以抒邑人去思之意云送鄧宜之還鄊序昔二疏為東宮師傅告老而歸當時祖帳之設黄金之贈太史氏悉書之或曰以二公之賢尊為師傳區區贈送奚足羙㢤是不然此葢羙其還鄉之楽非以為師傅之榮也夫鄉里人之所難忘也若班定遠馬伏波皆絶世之雄立功異域名聞天下猶且願生入玉門関及追述少㳺平生之語况餘人乎葢狐正首丘魂魄之思沛皆出乎本然之天也今宜之鄧君假舘張侯羣弟子服勤盡禮講貫之暇主賔燕洽閲寒暑十有二十載如一朝夕然鄉土之念常縈于懐束書言還舘人留弗能止其父子昆弟乃翕然餽贐又相率諸友人贈詩且屬予為之序焉某與君鄉人也親戚也知君之心者也因謂之曰君之行有班馬之所無者方諸二䟽雖榮名贈送之不同而鄉里之楽則一耳苐慚余滯留徒知君之楽而莫能與之楽其楽也君歸凡故人之有見問者幸為我謝之多稼亭燕集詩序洪武十年春上巳前之一日郡守番禺張侯置酒多稼亭聚僚佐洎縫掖之士十有三人相與訪前修遺跡尚交而挹其羙焉環視四郊烟鉏雨耕乃喜而言曰嘉我良民殆不負牧守卲農之意欤旁睨黌舍衿佩雲集又曰嘉我諸生其不負國家修文之敎欤至若滆浦環于前三山屏于後雲霞竹樹千態萬状􅌂然為天開畫圗快人心目侯于是舉酒属客臨流賦詩葢其興之所適情之所寓有不啻蘭亭禊事之娛而巳沂雩風詠殆庶㡬焉吾儕亦得以楽其楽也坐客詩凡若干篇侯以龜巣老生謝某為客之右因命為之序云代董知縣送同僚尹主簿序洪武四年冬余備員為武進令與縣丞陳徳廣相繼而至時山東尹公明善為簿數月同寅之𥘉嘗相謂曰吾三人之為是邑也其猶同舟共濟乎余嘗聞操舟之術舵者主之然必以篙者櫓者橈者檝者㴱以竿者締以矴者桅檣而帆者然後江海可濟也有其具蔑其人其能濟乎雖有其人而不僇力以事其事亦未有能濟者也今明善􅊩事乆為之甚勤可謂善操舟者矣自是同志恊力康濟邑民事無不理兩朞之餘寔無愧于操舟之喻也六年冬明善以銓考増秩余與丞及其代官張奉先祖帳而别明善復舉前説以勵吾人余曰是言也豈特是邑所宜則之凡為雄州劇郡以及方伯藩府皆當以是為心則無適而不可也古之善相天下者若傅説之賢其主猶以作楫命之况餘人乎明善之行吾請以前所言者筆諸縑素為臨别贈縣丞江隂人名某主簿澤州人名某余則鰲溪董某贈醫士張恒齋序夫良醫之用薬如良将之用兵知彼知己百戦百勝非偶然也且人之有疾必係于五臟六府殊不易知也苟曰飲上池之水而能然乎了然于心目之間非吾之所知也必也目其色耳其音語焉而推其詳脉焉而究其藴如是而後可謂知彼矣彼疾既知又當所用之薬必中厥疾如戦必克乃所謂醫之良猶将之良也恒齋張公世居儀真以醫名家今提領常州惠民薬局事郡人徃徃負危疾詣公公可否之其曰可者皆如期而愈猶龜卜燭照而數計之也葢公自蚤歲䆒心于儒者之學以明物理軒岐以下數千載醫薬之書莫不探賾索隐觸處洞然未嘗出詭秘一言以自神其術也近吾友丁以道之子搆疾而危羣醫縮首公診而薬之其病如春氷而釋其人如枯荄而生以道徳之且言曰郡人䝉是恩者衆矣安得太史氏為作佳傳焜煌簡䇿耶吁余嘗以恒齋之學論之将来必醫及國家躋斯民于㤗和之域秉史筆者當大書特書傳之無窮也奚患無聞乎送陳尚言歸㑹稽序㑹稽陳尚言以其從兄為常州府幕長銜父命來視之常之士友因得時與之逰而東郭謝某獨㴱有敬焉者尚言方妙年自持如老成人凡相見時徃徃論古今忠孝事世俗之談未嘗一出諸口也洪武六年八月之吉言别于余前兩月方盛暑余嘗見束装其兄固留之至是宜其掛秋風之帆矣或謂尚言之欲亟其歸者厭吾邦之陋而楽其故國山川之勝也余請詰之子之歸将窮探禹穴搜竒索隐而求神秘之文乎将幽㝷雲門與山僧林叟相期逰適乎将蘭亭觴咏鏡湖第宅踵昔人之髙躅乎夫以數日所知尚言者觀之吾知其不為是也必矣子之歸朝耕夜讀搰搰乎為飬親計将使紫岩山中復見董召南以孝義稱孝感之誠天降厥家丗有韓退之又當雄詞大篇以播其遺芬矣尚言聆余言笑而不答後五日某命兒子木筆之聊藉手為臨别贈某延陵人時年七十有八自號龜巢老人云贈冩生玉泉子序玉泉子本常郡􅖘亭侯之裔六世祖居金壇地因人姓是為蔣庄月鍳翁其父也玉泉以胸涵氷壺目烱岩電得乃翁冩照之傳甲寅春我郡侯孫公請為紀顔因過余為傳老醜坐客有言冩照自頋愷之始者余曰不然昔庖羲氏畫卦而人文肇開曰書曰畫葢推輪于此矣余嘗觀六書如天之日月星辰人之耳目口鼻物之山水花木魚鳥其文類皆象形然則象形而畫其義一也黄帝尭舜垂衣裳而山龍華䖝之属施諸五采作繪一語登載典册繪畫之事著矣殷髙宗審象求賢而得傅説吾意冩照之原本此欤至炎漢兩君圗功臣于麟閣雲臺之上與青史鉄劵並著勲業自是而畫之名世者滔滔也若晋之愷之乃其一耳然今人冩真以形似玉泉則併其神氣意趣得之見于毫素非汎汎作繪者可同日語况平昔于所見之人但曾半面雖即世之後亦能想像而䫉之至有使其子孫下拜號呼宛然如見其親此又得乃翁不傳之妙而能人之所難能者也吁使玉泉生于有商必能為君貌夢中之賢人矣當今郡公開國圗象凌烟徴車胡為其未至耶月鍳翁年垂九袠博物稽古玉泉請以予辨客之語質之而翁苟以為然亦必以輪扁不能喻其子者然予論玉泉者矣送祖心上人省親序學佛氏而不忘師父之恩知君命之重而弗敢渝是為良浮圗吾當與之逰贈以言而嘉之是亦與人為善也蘭陵銘上人本四明宦族蚤失恃元末時乃翁爲江西省幕僚随繼母侍翁居官邅時擾攘江右失守省署移福建乃翁以王事赴北俾其子徃錢塘鞠于從父繼而世變從父家毁于兵嵗且􅥐飢流離蘇常間時貴逰子弟多失身上人獨能涉厯艱險不農工不丐􅊢不服賈負販而趋利慕大雄氏空寂之敎可超脱物累遂祝髪從浮圗師東谷升公而學焉禅林矩矱蹈履惟謹其父子不相知者十有一年然一念之孝根于其心嘗礼佛黙禱得一日之飬以盡烏鳥之情志願足矣洪武甲寅春父来金陵知翁無恙且有弟在膝下以奉朝夕上人喜不勝于是告其師亟徃覲省以余昔嘗以君親之道語之請别于余且言曰銘之行雖為吾親誠不敢畔吾師而負國朝度僧之命而返吾𥘉服也織蒲之飬或庶㡬焉余曰然如上人者處困之日不失其身居㤗之時不易其心誠可謂良浮圗矣撫其弟安其親使人稱為禅林之子騫吾無間然矣彼人靣而獍心者聞上人之風能無愧乎能無警乎是歲四月之吉謝某序贈錢隐居序二月之吉余方據槁梧坐澹泊齋友人嚴子敬過余而言曰去年冬某嘗患背疽状如覆盆視疾者皆寒心焉隣有隐君子錢氏志道甫者獨曰無傷也薬可愈也既而用薬一如其言某嘗奉幣以償裹薬之資志道乃固辤弗受敢請賛一辭以著其羙亦以示不忘也余聞之仰而嘆曰夫疽發于背者危疾也古之人智謀如范增才勇如姜牙皆為所害志道能療斯疾豈易㢤余還鄉五年聞鄉人之譽志道者藉藉今吾以子敬之言益信且志道蚤讀書好結客竒方妙術故多得之雖常以薬活而不以醫名家其可謂隐徳弗耀者欤不謀利不計功亦可謂好義者欤釀羙酒以娛客蓄善薬以與人吾知志道之心即蘇長公之心也世之鄙吝如斛斯者其妻以百錢市薬猶以為恨况與人乎聞志道之風薄俗可敦矣吁昔人為一卒吮疽尚登簡册如志道之賢安知無太史氏爲作佳傳耶送太古禅師住持祥符序釋門先覺之士以能荷大雄法者爲象爲龍理固然矣求其七徳五文之偹和鳴而翔集所至而羣從惟鳳爲然兹又不可以象龍槩論也今吾以太古徽公觀之其僧中之鳳也欤公早歲入雙徑寂照師之室韞徳抱道蔚乎其文猶鳳毛也旣而主常之文明蘇之秀峰踞猊座說法㣲宻妙音聞者悦懌是猶鳳鳴朝陽也去此數年而陵谷變改故鄉来歸不啻如鳳翔赤霄覧徳輝而下視津里如丹穴飲太湖如醴泉以靈山古法幢之顛仆徃扶植之瓦礫之地将為瑶圃灌莽之卉将為琅玕使七十二峰之境皆為岐陽而把茅挿竹皆阿閣也彼門翕然而從者四衆之外衣冠紛集復有宗雷陶謝軰從遠公為外方逰故藂林旦評緇素輿論咸謂公為僧中之鳳無間然者慎勿諉枳棘非梧所棲而姑為桒下之宿也公之行郡邑士大夫咸稱羡而送之龜巣老人乃為之歌曰鳳兮鳳兮一飛羣随覧徳之輝載鳴瓊枝唯其時弓送郡守孫侯秩滿序人恒言郡縣之職愛民為先殊不知善為郡縣者必先能馭其吏而後愛民之政得行焉若我常州府孫侯其可謂善為郡者欤侯濟南人奉朝命由起居注出守以舊聞小吏多蠧政下車之𥘉即汰之擇之量材用之又從而戒飭之閤六曹操如束􅊜公勤亷謹身為率先民有不理於邑赴愬廷下侯之聼之惟一二僚属與聞焉吏無敢庭立睥睨者至于抱案牘署决惴惴焉惟恐或毫髮悞舞文之弊葢絶無之故善政得以行善教得以施一郡四邑之民咸𬒳其澤視古良二千石無愧焉耳今也以秩滿赴京人皆謂侯能愛民治有成績余曰侯能馭吏乃㴱得為治之要故特為叙述将使為郡縣者聞之取以為法太史氏采録為法于後人非徒為我侯頌羙而巳送金希賢上京序太學為賢士之関尚矣洪武七年冬朝命下府州縣學以諸生勝冠者赴國學厯練衿佩之士星聚雲集猗欤盛㢤常之武進縣金生希賢由縣學赴命請别于余且徵贈言余曰㓜學壮行古今一致上之人将使之仕仕乃行其學也士君子欲其仕學俱優卒有成效惟勤者能之尼山大聖忘寝廢食顔閔不能曾日三省若是者皆學之勤乎周公相國待旦而起陶士行在州而運甓巫馬期為邑而戴星是仕之勤也吁聖賢猶爾况學者乎葢士之學與仕也猶農夫之治田也彼農之勤者其耕也㴱其耨也熟其樹藝也必以時既藝矣乃耘乃耔乃藨乃萒旱則為之灌溉澇則為之决塞沾手塗足搰搰乎斯湏不能休故其苗之興也勃然其稼芄芃然其寔則栗栗然也及其穫也視惰農之收則倍蓰什伯之不同為士而勤其功名爵禄如豊收之農可必也生徃拜國子先生曁諸公鉅卿請以是質之苟然吾言生其勉乎哉送葉以㳟赴京序士不以窮逹論也耕莘窮也逹而阿衡版築窮也達而霖雨漁釣窮也達而鷹揚之三賢者苟不逢其時則㤗然終其身道之行不行非所計也番禺葉以恭以卓犖之才爲張渚批騐所官凡九年日與貿貿焉負販逐利者較什一之征此道行之日乎然以恭公乃心勤乃事皦皦乎九年如一日其道未嘗不行也葢以㳟以前人詩書之澤渗漉肌骨眎貪墨􅎱嫉者不啻如赫腐之鴟慕氊之螘耳班資崇庳非所論也余老滆濵聞以恭才名乆矣今赴調京師適荆溪故人許克敬過余談以恭之賢且相與論古今窮達士俾余筆之持以贈别亦曰堅以㳟之志云送陳長史秩滿序古人之以言贈行者尚矣然其言或規戒焉或勸勉焉不頌徳不羙才噐不揄揚聲名眎後世立言有不同耳若老𣆀于孔子之行曰無多言無多事如斯而巳夫聖人豈無可頌羙者乎葢稱頌之辭無益于行有道之士所不爲也余甞於學軒陳公暇日商畧古今清議及此相與嘆息今公爲常州府經厯得代如京師士大夫爲詩爲文以頌其五年賛畫之羙者衆矣余請以古人一事忠吿而期望焉昔趙忠獻以半部論語决大政卒成相業人到于今稱之吁時有古今道無古今居今之世行古之道是亦古人也况公之家學青氊一經淵源有自誠能慎終如𥘉仕學俱進則何施而不可何徃而不逹㢤幸毋謂老生常談而忽之吾将見世之稱忠献者爲公之稱矣送劉文可序洪武九年冬吾友沈子英書來曰文可劉公南雄佳士也爲磨勘司掾属凡若干月所閲案牘疵類畢舉雖毫髮無遺焉今也書滿而榮歸也以其吏事之精心目之明雅敬重之求一言爲臨别贈余曰傳不云乎胸中正則眸子瞭焉吾雖未識文可視子英之所稱道文可之心可知矣吾嘗以鏡觀之百鍊之銅瑩若秋水其所照者物無遁形一日䝉以塵垢光乃􅉭昧塵垢愈積􅉭昧愈甚而至于一物無所見矣詩曰靡不有𥘉鮮克有終故君子慎之夫以文可之心無私欲之蔽猶鏡之不塵垢也案牘之謬誰能隐乎雖然百鍊之銅能照人之靣而巳不能照人之肝胆能燭目前之物而巳不能燭天下古今萬事之理奚足以儗文可方寸之鏡乎文可持此鏡以渉臺閣慎終如始光輝日新将来聖天子取人為鑑則必置諸左右以輔昭明之治吾與子英軰又當相率以賀之并自賀其言之不誣也是歲十有二月厶日毘陵龜巣老人謝厶書送孫太守奔喪歸濟南序代魏同知作洪武丙辰閏九月既望濟南孫侯厶毘陵守之五年聞母夫人即世撤甘棠之説動風木之悲既而涕雪具訃吿月日上聞将衰絰而歸邦人愛公不啻如召父杜母聞公觧印綬即相率林立㦸門外翕然而言曰閭閻之氓頼賢侯守宣皇上徳化政無煩苛使得力耕稼供賦税以植其業以畜其妻子非吾民所能為也教學校之教頼修舉廢墜使得明敎化育人才以展其用非多士能自致也又曰賢守以亷律身馭吏如束􅊜秉法如懸衡一洗貪墨舞文之弊至筦鑰之細犴狴之煩租庸商征之属咸得其肯綮而㳺刄焉郡統四邑若網在綱綱無不舉目亦随之奈何斯言殆欲卧施轍而留也時余忝佐貳聆州人之言若此然論公之才之羙又豈苞屦臺笠者所能盡哉公嘗言斷机之訓吾親猶孟母也止酒之戒猶陶母也曰清曰謹為時著稱又豈非崔母之淑玄暐乎吁非母之賢不能淑子之身非子之孝不能如母之志移孝為忠必不負聖天子承宣之寄他日大用豈易量㢤今觀士大夫贈言凡若干篇余以州人之言頗詳且寔因摭之以叙編首云是月厶日同知常州府事厶郡厶書續毘陵志序昔人謂九州之誌言九州所有土地所生風氣乃宣也郡志之作本諸此乎毘陵為古名郡其山川土田風俗名物之属登載舊志尚班班可攷然由元𥘉而至于今百有餘年曾無紀述之者誠曠典也洪武十年春中憲大夫張度􅊩政之𥘉以朝廷命天下郡邑纂修志書于是㑹聚耆宿之士稽古訂今博采見聞撰次成帙凡一十卷中間無類䟽混不能無之至若前代闕文則不能妄為之説然時有異同事有沿革因是編而求之亦可以摡見矣是年歲在丁巳夏五之吉郡人謝應芳序贈儒醫徐士方序予方據槁梧玩庭草生意里人萬仲珎過予曰比鎰遘寒疾謁二醫皆危之于是邀徐卿士方眎之乃談笑間授薬剋期而愈頋鎰蔑以報厥徳丐先生為之贈言示弗忘也予曰嘻仲珍何相見之晚耶士方由早歲嗜學涉獵經史若六氣七情之病乎人五薬十全之係乎醫者巳博通既而以父祖所傳軒岐之書金匱石函諸家之方論旁參曲究以㑹其極且嘗賦遠逰得四方賢師友淵源之懿故其遇疾也如庖丁觧牛得其肯綮恢恢乎刄有餘地是豈膚淺䝉昧者可同日語㢤惟其厚重簡黙猶連城之璧混乎碔砆㣲卞和固莫能辨也老子曰大辯若訥大巧若拙士方其近之雖然吾知士方之才不局於是而巳必也為時而出康濟斯民卓然為醫國之士斯不負所學也責沈之文吾尚當為仲珍為之洪武十年嵗次丁巳六月厶日謝厶撰併書贈刋字闞士淵詩序曰稽古文字由竹簡以来世之欲傳乆而不朽者其惟勒諸金石乎然苟非專其藝而精之敬其事而謹之則所勒有無足傳者矣今觀荆溪闞士淵之勒石也一點一畫敬謹之至殆若黙契程伯子作字甚敬之意字書八法秋毫無遺是以吾郡守番禺張公特賞識之中書史舍人靖可盧舍人公武亦皆稱羙無間然吁士淵之敬謹如此豈局于一藝之㣲而巳㢤昔人有言能敬必有徳使士淵遇知臼季其必薦之如缺耨也抑予又有説焉昔者安民山知敬司馬公能從容一言于勒碑之頃登載史册流芳無窮其傳世又豈在鉄筆珉之外乎予嘗嘉士淵之能贈以長句今郡中諸士大夫之作者交相揄揚詩若干首且俾予爲之叙焉送王主簿克禮還江隂序人有恒言曰州縣爲民父母葢州縣之職爲最近民撫之字之宜以父母之心爲心愛其民如愛子也然所謂愛者豈其姑息而巳㢤使其服役于公則如服勤于親授之事而責其成功不棘不艱不虐不苛如是者皆父母愛子之心即君子愷悌之心也古稱召父杜母者其心葢如是耳以今觀之江隂縣主簿王公克禮其庶㡬乎洪武戊辰春奉令役邑人數千陶于常州府東簿董之與武進無錫之民夾運渠而陶之其眉薪芻手埏埴朝夕説簿之賢者矻矻不絶口隣邑之人亦甚稱譽予因徃視之其紀律非不嚴也程督非不謹也鞭笞捶撻非不施設也唯其慈威並行寛猛相濟過之小者宥之情可閔者恤之力不逮者濟之豈弟之心常藹然于紀律程督鞭笞之間故蚩蚩之甿感其徳忘其勞不自覺其聲之出乎喙也予于是從而賢之與之語曰夫縣之簿丞佐其令為一邑之父母也郡之佐貳佐其守為一郡之父母也公卿大夫臺閣守監百執事是皆輔佐天子為億兆之父母也今也簿将厯階而升曰令曰守曰公卿輔佐百執事咸有日矣苟不以民遠而忘宦成而怠則輿人之誦太史之筆當並傳于時豈召父杜母所能專羙彼虐其子而廪焚井溺者抑亦薫其善而良焉斯民之幸也簿嘗然予言請佩服今其行故書以贈之送周叔文序古之生子者設弧矢以射四方欲其有四方志也然其親欲子為之者豈不能盡然㢤但立志不凡君子貴之近代曺武穆試周之日左取干戈右持爼豆天生淑質志在文武其後出入将相為一代名臣非偶然而致也今觀㑹稽戚先生為叔文贈言謂叔文早甚聪慧且好學尤喜讀尚書每開卷則竟日終夕寝食俱廢不啻口芻豢而耳箾韶也夫書道政事叔文喜之其志可知然筮仕以来屡涉險阻特事親以孝行聞或疑其聲之不焯焯也是大不然夫爵有崇卑職有大小能盡厥職斯為足稱姑以目前言之河泊三載洗手奉公所職恢恢乎如庖丁觧牛刄有餘地使其親不以尸素憂豆區之楽于鍾鼎使叔文為京兆則平反之政日娛其親又何患無焯焯之聲乎吁丈夫之志有非或人之所知也先軰嘗説善觀花者見根撥而知花品之上下予於叔文敢窃比之贈滄洲生詩序延陵隠君子薛仲弘氏以英妙之年能洒脱紈綺氣習絶跡京洛塵土讀種樹書結忘形交與臺笠扉屨者伍所居三山湖東南寂寞之濵流水一湾漚沙半席每讀杜少陵吾道付滄洲之句欣欣然若有所得故自號曰滄洲生弘之曰蓬萊十洲學仙者誇以示人且去弱水三萬之隔其荒唐繆愆而不足信也明矣唐有瀛洲命十八學士居之其地位清絶尊崇顯榮固不易得然一旦牝晨汚衊之辱有不能免者是亦非所願也眷兹滄洲有四時天與之楽焉春水觀魚荷風清暑扣月舷而歌披雲蓑而釣是皆楽之得乎天同乎人亘古今而不窮者尚何覬覦哉龜巣老人聞其言而嘉之與之交而遺之詩曰楽彼滄洲宅爾素侯某水某丘以釣以㳺洲之西東三山芙蓉惟北維南魚荘鶴林風清月明我揚其舲滄浪有歌或濯其纓不鐘不皷不鼎不爼優㢤㳺哉尚友千古送遆知縣父還鄉序世俗所謂慈父者以其有姑息之愛無相夷之悪而巳自秦人慈子耆利借鋤徳色習以成俗恬不為怪于兹有年矣當此之時有能卓然敎其子而不淪于俗習者其父之賢為何如㢤濬川遆公以其子為武進令不逺四千里而來愛之若欲置諸膝教之則提其耳然不三月而亟去子欲留飬而不可得余以大耄之年獲半靣于鄊飲席間從而勸留之公曰吾兒以一介之㣲䝉朝廷録用長于兹邑若穉孺以負烏獲之任也必先謹乃身公乃心殚乃力規行矩歩以稱厥職如此則上不負聖天子拔擢之重恩下不辜斯丗斯民之望榮其身以慰其親吾雖衣敝緼𫀆猶狐貉也啜菽飲水猶八珍也吾既語吾兒吾兒能佩服吾言則吾歸吾廬何異朝夕侍側以享其禄飬之娱乎吁聆公之言覘公之志葢楽乎歸而不可留也于是酌之酒而賀之曰令有羙政民必頌之余将採歌謡之詞筆諸簡牘附黄耳平安之信以報公也送趙縣丞奔母喪序洪武庚申秋朝命以昌邑所舉趙賢良為武進丞在邑多善政明年夏五奔母䘮而歸士民攀恋有不忍别者丞慟哭而謂之曰比吾父來視予諄諄然以律身居官之法命之且云母氏之訓戒尤多丞之父歸将以安吾母也烏知未能以豆區之餘為甘旨一日之奉而吾遽至于此言未既嗚咽頓踣民亦涕泣而不能留某于是知其母夫人之賢不减崔玄暐之母也然玄暐遵母訓而清謹為丗所稱使賢母之名流芳百丗非孝而能之乎今丞之孝于母也豈止𬒳衰麻居倚廬不酒肉琴瑟三年而巳㢤必也居則飬生䘮死以事其親出則移孝為忠以事其君曰清曰謹終始一致㒺俾崔侍郎專羙于前則其母之死猶無死也而可以為孝矣雖然父天之尊巍然在上慎勿哀毁踰禮以貽親憂此又不可不知也贈黄有文序昔聖人垂衣裳以治天下至五色作服則尊卑貴賤之秩章章矣後丗于五采之外加之以金此又極其盛而文之然禮法之制惟在上者得全于服御之属近代以空王老君之尊儗諸王者乃亦得之餘則有禁是故以飾金為藝亦鲜而易弛焉常郡黄有文早孤受業厥祖丁時之艱藝用弗售有文能不弛其業而益精之時既平大江南北數百里凡釋老氏之家交相薦用殆無虚日洪武壬戌春郡城圓通院住山釋壽公作梵宇規矩置法藏命有文䞉施五采縻金而飾之有文若㴱諳乾毒之教荘嚴相好咸適其宜皆至若轉藏之神皆金為甲胄威武僇力如風轉篷俛俯之間光明焜煌􅌂然為金色界使觀者興起其轉悪為善之意吾嘗聞瞿曇有言畫沙童子戯以成佛若然則有文之功亦豈少㢤由是釋門老緇及方外能文之士多贈言以嘉其能夀公乃属余序其事如此余于是窃有感焉六藝之教禮楽為先今儒門子弟什廢八九其大者不知金聲玉振為聖學之始終條理其次不能以金匱石室之書發為文章黼黻治道甚者金根繆易傳笑四方視有文能世其業寕無愧乎使有文之為藝以彼易此必大有可觀者矣惜㢤贈醫士髙彦述序洪武壬戌夏友人詹伯逺書來曰先軰葛氏方山翁以善治傷寒獨歩江表髙公明徳為外甥而受其業青出于藍故當時人謂有秘傳焉今其子彦述業復如之比年以来人之抱危疾以頼全活者紛紛也如吾家累亦屡病屡薬效若響應厥徳有未易忘者丐先生為之著述㒺俾越人専羙于昔予曰嘻方山翁予早歲親炙多聆語言每云素問一經言簡理奥張長沙論傷寒傳変搃若干萬言其要在經之爇病一篇六百四十九字而巳人能明是經之理則終身用之有不能盡者以是觀之則家庭授受豈外是乎夫彦述之可敬者能象賢以承家學志不自滿外無藻飾不誇張以炫其竒妙不圭角以長其聲價嘿嘿乎不易其操謙謙乎不矜其能遇病則以理燭之如法以治之如由基善射發皆中的觀者或驚異而神之耳吾知其父子所得於葛氏者大經大法如此而巳無所異聞也窃嘗以儒者之學譬之論語之書孰不誦讀趙忠獻以是書半部相其君以救天下當是時遘五季之厲羣黎凋瘵頼以蘇息何嘗于二十篇之外别有所傳授乎他日太史氐采予言而筆之庶以見彦述之學源逺流清且一洗俗論秘傳之陋垂芳簡册追配古人亦何慊乎㢤贈崑山醫士王彦徳詩序世傳秦越人之醫獨歩當代在諸國則随其俗之所重者醫之或小兒或老人婦女変更以售其術葢其心出乎聲利之外而人不察也予嘗以事少之一日至崑山友人徐彦智謂予曰醫師王先生彦徳專科為小兒醫其學有過人者厶兩兒患痘瘡甚危觀者束手邀彦徳薬之乃指日而愈酬之幣固辭且曰凡故舊皆不為市利交况契愛如彦智乎由是邑之士人咸賦詩以頌其羙丐巢翁為之序焉人恒言醫之難莫難于小兒葢稚騃之㓜年利害有不明言語不通疾則易為顛躓猶草木之萌易摧折也吾知彦徳方寸之天不蔽于欲一以理之明推治衆疾而疾無不治者擴而充之非所難也特專科以世其家耳雖然昔者淇有王豹而人善謳髙唐有綿駒而俗善歌今崑邑之有彦徳博學如此尚論如此風聲氣習動蕩一方乆之則蘭鮑俱化餘波之及薰我晋鄙老夫修野史又當牽聫得書以兹書為張本松菴圗詩序洪武甲子春厶以鄒忠公遺文見邑宰河南彭公伯常因觀四栢賦宰謂予曰子知劉司諫之愛松亦如忠公愛栢乎司諌本東原世家今居光州光山縣從祖之故第山有羙松心甚愛之號曰松菴比遇知聖天子擢官諌垣謇謇諤諤多禆治道天子嘉之聲溢中外然乃以松菴自號也予由是繪山間之松松間之菴求能詩者咏之以寓夫激昻之意敢請子為之序焉厶辭不獲雖未識司諫之面以其愛松之心推之可以知其人矣夫松之為物芄芃其直猶人之挺拔也鬰鬰其盛猶人之𢡟徳也貫四時厯氷雪猶大丈夫之貞節雅操也凛乎趙清献之鉄靣堅乎宋廣平之鉄心殆無過焉卓㢤若人㴱相契合不以山林臺閣之殊而異其素愛之心也昔之人或喜聼其松風或欲巣于雲松或哦之中庭之中或撫之東籬之東是皆愛之于心而所以爲愛者不同吾知司諫之愛在嵗寒後彫佩孔訓于厥躬吁山花澗草紛紛然望秋而先零者寕不有愧于十八公乎今毘陵士友詩凡若干篇皆想像光山而賦之一旦欽命承恩命賜歸莵裘蒼髯白髮相與嵗寒又當别爲咏歌持去爲松菴壽贈義士池徳澄序昔元暦未終人方酣富貴汲汲乎進取徳澄先大父秋蟾先生慕老氏之學脱屣家事飄然為外逰徳澄篤于親撰杖履從之足跡遍南土名山勝景多逢異人徃徃得薬術方技以授其孫旣而陵谷変遷先生亦從此逝矣徳澄今家居東郭混淆闤闠然而喜玄談尚髙致綽有祖風頻年復逺逰以適其志趣所聞所見益以廣矣夫以薬術之妙觀之信乎有異人之傳矣同里劉文忠負伯牛之疾者屡醫弗痊㡬瀕于危一旦䝉徳澄療之指日而愈酬之幣不納文忠徳之需予言以紀其羙予曰嘻神農氏嘗百草為醫藥以濟天下後丗葢以天地生物之心為心也近代以来或假是以邀厚利否則咈然怒望望然去眎其困苦而天閼者弗恤也可勝嘆㢤徳澄矯薄俗仗義如此予故以義士名之農皇大聖人在天之靈必隂隲以成厥徳以博施其義于人人之報之有不止如黄雀白龜而巳也龜巣老人謝厶撰時洪武十有七年嵗在甲子秋日送唐用彰序周公相成周作禮制大司徒以三物敎人即其賢者能者賔興之取士之法蔑以加矣近代以來科目雖多亦彷彿成周之意而已但士之為學于聖人心學之㫖有昩焉故或賢或否如魚目之混􅌐珠者有也姑以一二言之漢之董仲舒公孫丞相同出于賢良方正者而弘有曲學阿世之謬唐之韓吏部愈桞刺史宗元同出于博學宏詞也而宗元有薰附權要之辱至宋三百年文盛之日凡居台輔必用碩儒如司馬温公光王荆公安石張公商英等皆進士而丞相也若王張之属其學無不精敏絶人豈有不知聖人之心學者乎葢徒知之不能行之則與不知無以異矣洪武甲子秋邑人唐用彰以府學弟子中選鄊闈明年乙丑春二月赴春官大比需言于予予喜其孝弟稱于家謙徳著于旦評才華蔚茂而學益修其大用于明時也必矣請以聖人心術之要曰慎獨曰思無邪曰精一執中三復而申告惟用彰真知力行兩輪並進則先軰賢者之勲庸事業或我亦可為賀不惟上之有以行致君澤民之心而下有以遂顯親揚名之願亦可見不以老生常談忽之也二十四孝讃序人生兩間以天降之衷為秉彛之性故能参于三才有感斯應為萬物之最靈者也夫孝為乃性中之一事然立身之本莫大于斯故尼山大聖人與髙弟弟子反覆問答著為大經奈何聖代彌遠風俗寖衰秦漢以来耰鋤徳色箕箒評語者滔滔也甚者至于人其形獍其心可撫膺切齒流涕而痛哭者也今觀郡人王逹善所讃二十四孝裒為一編其間言孝感之事什有八九且以孝經冠于編首葢取孝通神明一語推而廣之欲使人欣羡而勉于企及于名教豈小𥙷㢤或謂重華聖孝千古一人豈宜與泛泛者類講是固然矣吁逹善之意葢欲攬太陽與月星並照容光焜焜無幽不明老夫儗非其倫辭不逹意宜君子無求偹焉贈王仲文序洪武乙巳秋横山大林菴主真公性存過予曰厶重搆菴廬作觀世音菩薩伽山一㑹上則五雲縹緲佛現全身凡菩薩之衣冠纓絡靈岩寳地種種相好咸用金飾工人王仲文且能運巧思僇力以成其羙今其行丐先生一言譽之予曰嘗聞瞿曇師有云以畫為佛以沙為塔皆能成道此葢以因果立説開方便門使衆生由是而入大乗之道自漢以来其法寖盛塔廟像設若繪者繡者􅍢金玉石者泥塑木雕者從而出焉今性存能以佛之心為心引人為善荘嚴梵相豈徒羙觀葢欲具瞻者起恭敬心好楽心篤信力行登無上道非因果而巳宜乎同袍之士及曹随向化之人風行草偃如此其盛也性存然予言筆之為仲文臨别贈十四卷終, WYG: ''}
