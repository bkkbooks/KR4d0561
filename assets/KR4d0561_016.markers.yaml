  - {type: variant, offset: 0, length: 3634, content: 龜巢藁卷之十六啓訟伯父墳地上縣宰啓掩骼埋胔古今之制其仁如天過家上塚者子孫之情伊誰無地頋丘壟之失所寔風化之有傷瀝血寸丹陳情尺素切念厶痛懐伯父曩厯兵戈死雖正狐首之丘時未集鴻飛之澤啓手啓足幸能四體之全歸若釜若堂詎信百年之難保葢自陵谷變遷之後以致家門摧敗之餘失此故茔属諸姻黨誰其主之展我甥兮此一錯在乎當時故陸沉至于今日渭陽之舅既無見念之秦龜隂之田那復肯還于魯然豈料人靣獸心之軰乃謀爲兎葵燕麥之場雷厲風飛宰木頓空于斤斧日侵月削佳城亦壊于犁鉏殆将見暴骨之寒又何異鞭屍之慘三尺之法不畏匹夫之勇莫當向来不平之鳴屡致逢彼之怒闘狠不頋輕性命于鴻毛匍匐而歸飽尊拳于雞肋是可忍孰不可忍如之何末如之何徒憎蒿里之悲每動窮途之哭既無靣于江東父老復何顔于地下祖宗日月不照之盆弗堪長覆天水違行之訟可惮终凶頼典章有禁地之條其情理寔滔天之罪仰惟公道俯察愚衷恭惟厶官讀萬卷書為百里宰氷其清玉其白絃之直稱之平寛猛適中剛柔相濟數月有撫字征科之績四郊無呌囂墮突之憂休休焉其有容皜皜乎不可尚聲蜚臺閣㤙迓絲綸如厶者受㕓為民閉門歛跡亦乆𬒳卓魯之化烏敢虞芮之争但悲夫九原之人𣣔掩以一坏之土願施善政垂戒悪人使知見舅如母之親勿為敗俗亂常之事復此牛眠之地仍為馬鬛之封想去家舊鶴重歸看銜土慈烏畢集凡春秋拜埽之日皆存亾感激之時上窮碧落下黄泉為雪幽㝠之恥生當隕首死結草弗判㫁之恩痛切之私敷宣㒺旣上于尚書啓么名傳字受道號止齋延祐乙邜科進士不封萬户侯願識韓荆州常切慕謫仙之志手把一封書上有皇甫字輙敢扣昌黎之門問胡為今日之來曰專為古人之事與其進也適我願兮甞謂傳道不絶者先民之功没世不忘者後人之義若道鄉鄒忠公之墓近在城隂有了翁陳先生之銘流傳天下孰謂此一丘之土盡廢于八世之孫鄉鄰忍于瓜分翁仲随以蕪没故諸生為之太息于當路鳴其不平頼二侯以公道主盟不半載而佳城復舊築思亭而薦蘋藻立華表以樹松楸茍非紀載之詳尚慮耕鉏之患立羊公一片石大書名世之言如季子十字昭示尊賢之意雖不咎于既徃庶有𥙷于将來求之與之完矣羙矣恭惟厶官老成前軰文章鉅公三千字禮樂縦横在早歲修名掲日九萬里扶揺直上至晚年直氣凌雲典文衡則慎于稱停秉史筆則嚴于褒貶霞雲一􅊤将歸老于長洲茂苑之間霖雨八荒将拜命于安車蒲輪之召斯言非佞輿望所期厶曩客新安聞公舊政復紫陽之闕里大振儒風勒黄絹之好辭有光吾道諒弗忘乎素志必重念于斯文惟大賢無不容則小子庶有造于以紀前言徃行于以發潜徳幽光當令梓里之間永若桐鄉之愛鏘如韶鈞蔚如虎豹雄文照耀于九京明則禮樂幽則鬼神妙理昭彰于千古存亾有感敷叙莫殚贄見余用中先生求作辨惑編序啓狂簡斐成章辨諸家之邪説品題作佳士必當代之儒宗夫瓣香敬為南豊葢學者仰如北斗與其進也適我願兮甞謂璞玉雖竒非和氏則山中之石琴材固羙無中郎則㸑下之灰太玄經有覆醤之􅏺公羊傳有賣餅之辱古猶如此今豈不然𣣔立言圗不朽之傳必取正于有道之士嗟今陋俗舍正路而弗由集古遺言廻狂瀾于旣倒可奈一齊而衆楚猶如皆醉而獨醒驚人之鳥一鳴怪雪之犬羣吠願君斵堊為我折衷或衮褒一字之榮則價倍千金之重馮豊霳寄寥廓乆矣馳情抉雲漢分天章豈辭揮手綱維吾道黼黻斯文兹葢伏遇厶官文章鉅公典型前軰詞塲較藝視五色之目不迷鄉國興賢使三代之風復振躬行古道歴踐華途每為政邑郡之間常蜚英䑓閣之上歸從彭澤舊家北固江山敎若河汾隐居南徐城市戸外之屦常滿門前之轍何多雖云遂莵裘之營必復有蒲輪之召如厶旨俯慚後進仰慕先知尊其所聞行其所知愧未造髙明正大之域博我以文約我以禮誓弗忘仰鑚瞻忽之誠景慕有餘編揣摩㒺旣贄見李晋仲提舉求啓思忠公傳道之賢為裒遺事辨邪説誣民之枉乃集前言持布鼓于雷門分天章于雲漢㳟惟厶官儒林麟角學海龍門鍾山草堂之英靈雪竹霜松之標致懶折腰于彭澤早賦歸來聊濯足于滄浪亦云自取皜皜乎不可尚巳休休乎其有容焉然吾道頼以綱維而儒林視為儀表尚持藻鍳以主文衡名動京師栢府之薦章交上官居翰苑蒲輪之召命将臨先生自此升學者仰如斗厶呉中晩進白下漫逰自憐如明月暗投誰復念陽春寡和汲汲有登龍之願拳拳慕倚馬之文方徃依劉以圗御李𣣔因劉尭輔見公乃于劉處偶得識面低頭拜東野適因邂逅之間瓣香為南豊得展􅎋勤之敬敢持兩帙謹用三薰長年坐井􅔄觀天此日詣程門立雪倘賜五行之覧必䝉一字之褒登山采玉入海求珠捆載乃酬其素志製芰為衣紉蘭為偑激昂正頼其清風贄見楊亷夫提舉求序思賢錄啓兩䄂春風作洛下書生之咏滿船明月過関西夫子之門問胡為今日之來曰端為古人之事窃有請也能無從乎伏念生延陵季子之邦頗知禮譲復道鄉鄒公之墓當効馳驅樂民俗之還淳喜士風之近古思賢有録味道無厭紀前言徃行之二三發潜徳幽光之萬一自藏燕石誰售雞林恐公羊遭賣餅之􅏺使太玄有覆醤之辱願借春秋之筆特為月旦之評得一序以冠塵編若千金而加弊帚庶傳不朽有𥙷将來非惟先哲之有光真乃後學之多幸兹葢伏遇厶官乾坤清氣風雲壮懐走馬看長安花早嵗似唐人得意割雞為百里宰居官如言子愛人以文章政事之俱優宜天下國家之大用尚淹筦庫未展經綸乂皆知大噐晚成我乃獲景星快覩題鸚鵡賦巳多年傳䴡則遺音到鳳凰池将不日遂平生髙志倚湏瓜代入覲楓宸如厶者敢不長遡下風永懐髙誼聞所聞見所見真如到神仙十二楼之間歩亦歩趋亦趋或可在弟子三千人之列其諸欣慕㒺旣敷宣䞇見張用中敎授啓黄魯直謁蘇東坡因述依松之志禰正平過孔北海乃䝉薦鶚之辭葢同氣以相求必當仁而不譲敢持尺牘特造丈凾恭惟厶官海内儒宗江西詩派徃歲為馬尚書賔客當時有虞學士品題謂鵬程萬里横飛期鳳池十年可到道出羲皇才過屈宋何鄭公猶在于廣文上規姚姒下逮荘騷若韓子獨㝷于墜緒先覺覺後已立立人四方之學者來歸一鼓而斯文作氣博求地利開玄武湖以廣澤物之功善育人才置治事齋而兼水利之意聲蜚臺閣恩迓絲綸如厶者生長吳中栖遲白下頋窮居而獨善恐没世以無聞著辨編惑闢近世之異端邪説作思賢録發前修之潜徳幽光𣣔煩斵郢人之斤輙敢弄班門之斧平居抱膝仰太山北斗之髙此日承顔覩鳳皇景星之快天其或者道之行欤得華衮一字之褒增敝帚千金之價品題作佳士何慚奏白雪遺音吹嘘上清㝠或可借春風餘力答陳天倪謝薦師啓見賢而舉者古先之制悪敢言功昜子而敎者夙昔之心幸逢知已豈意與互鄉之進亦勞賦小山之招㤙斯勤斯至矣盡矣恭惟容齋先生玄玄衆妙休休有容身雖領䄂宗門學則淵源吾道小楼明月勝元龍百尺之豪髙枕白雲待丹鳳九重之詔有前人風烈為後學範模如厶者與緇黄交能青白眼獨喜子墨名儒行非他人虎質羊皮通家随三十年責善難一二計兹荷愛烏之及特厪遺鯉之書曲憐覓梨棗之免特命入芝蘭之室從明復受春秋之業看希夷畫太極之圗熊魚何幸乎兼得犬馬當知其所報道院迎仙書堂隐相増爽氣于西山隣家乞火小窓分燈藹餘光于東壁銘心有感筆舌奚殚謝監察御史火公舉茂異啓天朝重耳目之官寔居清要風憲擢山林之士非市私恩葢竹頭木屑有可之時而茅拔茹連乃必然之理敢因竒遇庸布謝言窃念厶家本吳中客兹江左以芰荷為衣秋蘭為佩訪鍾山之英草堂之靈作山川司馬壮逰負湖海元龍豪氣自憐骯髒誰問飄零瞻烏蒼栢之間歌鳳古䑓之下幸逢騘馬䝉試雕蟲叩大小從容之鳴以盡其聲收輪囷離竒之材而為之噐使李白立堦前地如毛遂脱嚢中錐得之若驚觀者如堵兹葢伏遇厶官身居臺閣腹中詩書凛凛乎動揺山岳之威惓惓乎樂育菁莪之意植公門之桃李蓄相籠之葠苓昔中州草木知名今南國衣冠俱化三省十道俱聞鉄靣之威一日九遷将拜玉音之召風塵一埽霖雨八荒如厶者敢不恒念品題益加修省行日用常行之道讀生平未讀之書雖蒲桞之質望秋先零而薑桂之性到老愈辣惴惴焉出門下誓不忘一瓣之香耿耿者在胸中當自愛千金之帚代羽士上亷訪僉事啓上士無争奉先師之明訓監主自盗奈公論之難容故鳴鼓而攻之若同室而闘者窃念厶李老君弟子住焦真人道塲小小山林設住持之主席區區金帛有交代之成規比因樽節年多致有羡餘日積𬒳前職䑕偷狗窃使空山鶴怨猿驚當市攫金衆所共見匹夫懐璧罪寔難逃巳甞赴愬于有司且復陳詞于敎所始則强項不屈终乃揺尾乞憐遂以當仁不譲之心聼其用和為貴之説乃償薄産以𥙷亾金未㡬背挿血之盟又復為紾臂之奪用朝三暮四之術專務貪婪逞人一已百之能肆為欺㒺楚弓得失秦鏡咨度勞六轡之驅馳亷法亷辨亷善亷能按百官之能否明月靡遺罅隙清風一埽塵埃睠兹寂寞之濵亦在照臨之下豺狼歛跡草木知春激濁揚清既憲綱之振肅舉直錯枉宜公道之昭彰或移北山之文或賜南山之判戒無厭溪􅊤之欲征悖入府庫之財庶有𥙷于将来更無煩于訟牒思之弗措辨之弗措願亟持全璧之歸得之若驚失之若驚當永守青氊之物謝崑山梅州判舉鄉善啓儒雅闡大猷漢室之興復見品題作佳士荆州之識為榮矧䝉下采于菲葑豈作不言之桃李寸丹有感尺素具陳厶官佐理神州賢勞王事虚心待物明于滄海之珠羙徳含輝粹若崑岡之玉有賢守與承流宣化在寮寀則同寅協恭切切斯民惓惓吾道氷霜並㓗風月平分南山之判不移北闕之心長戀二千石不如逢掖下士尤勤九萬里直上扶摇前程甚逺吾言非佞輿望所期厶乆客東吳逺迯兵燹功名蹭蹬昔為竹上之鮎身世飄零今作無枝之鵲偶尔宿賛公土室􅌂然逯梅仙市門聼髙山流水以知音驚明月夜光以投暗説項不輙薦禰有書駕言采泮水之芹何異繼廪人之粟驥千里未甘伏櫪鳥一鳴或可驚人翺翔道義之林涵泳詩書之澤鄉之善士國之善士尚期自下以升髙知惟春秋罪惟春秋勿謂有名而無寔賀陶敎授啓鄭廣文才過屈宋坐一氊而司業相憐胡安定敎授蘇湖置二齋而太學為法升髙自下振古如兹恭惟厶, WYG: ''}
