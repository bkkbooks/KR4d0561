  - {type: variant, offset: 0, length: 1, content: 龜, SBCK: 􅀛}
  - {type: variant, offset: 0, length: 1840, content: 龜巢藁序毗陵謝先生昔避地吳淞之上余適目燕至吴予友涿郡劉子南氏甞道先生姓名學行之懿予願見而未暇焉後十年識先生之仲子林于崑山則先生已歸隠于毘陵矣又十年娄東袁子英氏以先生年八十邀余賦為先生壽継又告曰先生之門人王著集先生之詩鐫諸梓徴余文叙卷端子辭以未識先生又未嘗閲先生之詩集何敢率爾從命且何能賛一辭于其間㦲予言又豈足為先生軒輕哉然子南既稱先生于前子英復頌先生于後况嘗與先生之子林連床累日觀其從容詩禮秀㧞儒林則先生之言行可知已傳曰不知其人視其友不知其父視其子又奚必識先生之靣誦先生之詩哉嘗聞先生之為人耿介尚節義與世寡合其為詩也非有関于風化者不為非有得于性情之正者不能也惜先生不少試其才于時肥遯終身焉先生有辨惑四卷行于世皆發先儒所未發其于後學豈小𥙷哉予姑述所聞者知此先生名應芳字子蘭號龜巢云時洪武十二年歲已未七月既望前浙江儒學副提舉豊城始豊山人余詮叙龜巢藁序文章與時高下昔人有是言也有能處憂患顛沛之中不為外物之所摇奪形于言辭無戚廹憤懣之病有異于昔人之言者惟君子為能之吾于子蘭先生之文見之矣先生蚤有後譽嘗為李晋仲俞用中諸公所知生平重然諾勇于敢為紬繹經史作為文章咸有根柢與人論辨舋舋不少休在郷里時請𣸪鄒忠公墓寓吴中又請作頋元公廟世俗怵乎異端而説先生因取經傳之言作辨惑編以警之其襟度磊落識見雅正寔為士林所推重洪武十年冬先生之子林以郡府所舉至京師先生以書諗熊曰蘭有舊作學子王著欲板刻之乃為類叙以從其請子其序之庶不為醬蒙矣曩先生避兵時雖漂揺逆旅中所至人欽其徳望延致恐後巢室松江之傍講授之餘以詩酒自娱熊托交十五六年一時倡和若楊維楨亷夫倪瓉元鎮頋瑛仲英俯仰之間淪兹泉壌先生年踰八十歸隐横山寔為後進之所景慕其所著述有不期于傳而自傳者矣吾友中書舍人閩人張至道評先生之詩雅正純潔法度整嚴可與傅與厲相伯仲識者以為名言熊窃觀先生養之厚氣之充言行卓卓如此盖喜聞而楽道之者因以冠之萹端先生姓謝氏自號龜巢老人故名其集為龜巢文藁云范陽盧熊序龜巢藁𥙷遺目録歲除前一夕寓姑蘇與友人卞于珍守歲遣興和許君善韵老病已酉夏四月東維子来訪以其過崑山詩見示且邀予及盧公武殷孝章和之崑山辛彬甫元夕前旅次岑寂作詩懐之捄弊祭胡子明文龜巢藁𥙷遺歲除前一夕寓姑蘇與友人卞于珍守歲姑蘇城外小湖邉寂寞僧房借榻眠詩藁冩成丁邜集暦頭檢盡甲辰年中原喋血人争地南國啼飢水拍天起坐夜深如守歲屋山風雪打寒氊遣興和許君善韵馬圖莫怪出河遲丗事方如理亂絲蓮葉有巢龜已老竹花無實鳳仍飢籬邉艇子供垂釣林下樵童許着棋苜蓿一􅐻三丈日老妻晨起案齊眉老病乾坤如許大老病此江濱無酒可留客青山應咲人幅巾方竹杖青草落花茵賣得長門賦相如未是貧已酉夏四月東維子来訪以其過崑山詩見示且邀予及盧公武殷孝章和之酒濕宫𫀆逸興多鐡龍吟嘯舞蛟鼍一江星月光搖動八極風雲氣盪摩詩史屡書新甲子草廬還是舊烟蘿繫舡秦柱山前栁邀我吴趋和郢歌崑山辛彬甫元夕前旅次岑寂作詩懐之魯魚一洗版圗編徑着麻鞋送上天七里八岡風雨夜誰家燈火對愁眠捄弊世俗以浮圖治䘮以先正斥之盖欲行古䘮禮終事親之孝而厚風俗也比年以来或者吝扵財而薄于親者泛然以文公家禮藉口䘮禮不行佛事不作視骨肉至親之死如塗人然棺壙之外餘皆無之不孝不慈傷風敗俗至如俗禮以飲食待執紼之人亦斳而不爲親戚非之鄉里譏之有愧乎設無礙齋者多矣甞觀佛事之作雖非正道亦彷彿古今祭祀之儀然香點燭猶欝鬯庭燎之用也䟽文陳白猶祝辭也齋厨供饌猶籩豆簠簋也楮錢楮幣猶玄纁圭璧也葬之日以旛幢代銘旌以鼓鈸導輀車亦皆敬吾親而送之也然則鄊俗之人䘮禮既不䏻行而䏻為此者亦可以寓孝慈之心表哀戚之意也嗚呼今薄俗一毛不㧞二者俱廢吾恐轉相倣效習以成風将胥為獍之屬是故不得已而言佛事之用如前所云𥘉非舍正道崇異端而忘古先聖賢之名教也吾家子孫當先警省知言君子冝以情恕洪武二十年秋七月龜巢老人言祭胡子明文扵乎逸翁生長越杭以醫䆠逰䑓閣蜚英晚罹世變戈㦸搶攘挈家海壖晦迹韜光子未識公結交令郎觝斥妖妄氣節激昂既見叔夜穆如春陽時方艱虞紛然虎狼誨言諄諄戒慎周防吾其服膺如龜六藏歲時徃来雞黍范張公年已髙神氣益昌髪黟顔童飲可百觴興致酣適庭視八荒詞多滑稽歌或慨慷以公逹觀物累俱忘蓋亦有子動合義方福善自天家有餘慶婁渉畏途竟為康荘予甞比之珠玉琳琅父執遇我我惡敢當所貴相知心腹腎腸公視吾児剪拂揄揚将玉其成取寸之長通家之好幾二十霜洪武已酉我歸扵常贈言孔嘉且貽篚筐心親迹疏烟水相望前年莫秋過公豁堂三宿不寐情話連床延致畫史為貌不颺復命其子拏舟送将别来両秋懐思弗忘𥘉冬病餘孤卧若僵寄書言懐并書数行歲聿云暮嗣音渺茫雪洲之報乃謂公亡淞隂石川悲風白楊命林徃奠老涙其滂, WYG: ''}
