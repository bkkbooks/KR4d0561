  - {type: variant, offset: 11108, length: 0, content: '', WYG: 不惡春來花雨喜無多三農飽喫田間飯諸將猶揮馬上戈州縣勞人宜莫厭要令襦袴有新歌寄贈費伯謙愛爾青年二十餘無心富貴獨耽書楊花雪落滄洲静艾納煙銷白屋虚門外自馳金騕褭案頭長對玉蟾蜍别來吟得詩多少好寄江村慰索居簡趙執中谿鳥忘機與結盟鄰雞解語共談經簾前花落胭脂雪樓外山開翡翠屏無事干人腰嬾折多情于我眼偏青于今同飲長洲水只隔煙波望德星過悅堂長老看沈香小山適見楊鐵崖所題畵像堂堂之容令人起敬因作此以贈阿師僧中之白眉身長九尺聃耳垂金爛袈裟舊御賜鐵笛道人新賦詩貝葉手繙諸般若沈香誰琢小須彌不知門外春深淺花雨繽紛二六時題恒上人清流堂悠悠黄天蕩菀彼祗樹林水流過堂下一帶清且深要之源頭活澄徹無古今山僧作觀想亦以明其心停雲共徘徊游魚自浮沈三伏不知暑爽氣生綠隂水華晚色凈風柳孤蟬吟嗟哉五濁世干戈如沸鬵客來且忘言滄洲濯塵襟懐道傳上人海上誰知己僧中有此郎借人三畆宅留我百花莊故里煙塵暗窮居歲月長釡鍾時振乏燈火夜分光書摘金根誤詩囊夢草香溪山皆杖屨花竹共壺觴每念馮唐老能容阮籍狂五年同信宿十口賴歡康辟榖終無術飄蓬又遠方世情多可笑交誼獨難忘南國黄梅雨西林綠樹涼思君重迴首湖水隔微茫懐滄海上人床頭不問有金無客到山中酒必沽愛我生來心似鐵逢人為道唾成珠㝷梅幾處同舟去對月常時折簡呼别後合塘春水暖柳隂誰與看飛鳬又自述并簡滄海齋居頗喜俗塵無坐看諸公玉盡沽滿地楊花風捲雪一池荷葉雨跳珠借書日與兒曹讀鄰酒時令老僕呼山上有山曽有約何時雙履作飛鳬和徐伯樞初還膠山作無錫元度子昔年歌舞送觥船每日登臨對乳泉麥秀故基今雊雉花飛南國又啼鵑官軍尚蹀邊城血田舎初生竈突煙只恐歸耘歸未得徴車將到白雲邊次韻贈徐仲剛兄弟難弟難兄思不羣風流絶似太中君對床夜聴山中雨避世春耕隴上雲四株松樹青隂合一帶溪流野色分老我劍心猶未死尚攜長鋏客田文次韻贈慶德謙監州彷彿桃源古洞天幽香兩岸鬬嬋娟煙波鷗作忘機友風柳蟬如脫骨仙田父相過終日醉畦蔬小摘四時鮮棄官溧水歸來早贏得閑情樂酒邊還珠詞寄顧仲瑛并序余以玉山隱君避地居欈李猶合浦之珠徙而去焉今謝杭州當路于吳而州縣更化猶合浦之有孟甞也人而珠者可不還乎因作合浦還珠詞寄君以致招要之意其詞曰嗟爾珠生合浦川澤見光輝采珠人似雨孟甞不來兮珠亦良苦鮫泪竭魚目瞽二嗟爾珠去合浦川澤失光輝龍嗔獻珠女孟甞下車兮魚鼈率舞象罔除吏商阻三嗟爾珠還合浦川媚仍含輝潜居水仙府孟甞愛物兮物無違迕明月出夜光吐代簡錢夢弼六年十見堠山雲愛客情多最憶君社酒每傾鸚鵡盞燕姬屢舞石榴裠漁郎一去仙源隔鷰子重來舊宅焚别墅于今鄰錫谷煑茶還許石泉分絶句屈原投江死揚雄投閣生一時生死計千古是非心夏五雜書使者乗槎海上來藩臣迎詔府中開半年赤地無纎雨此日青天忽殷雷鵷鷺聨班齊喜舞梟鴟脫網莫驚猜征西諸將櫜弓矢應受淮夷納欵囘二遠客相過說帝都黄金如土米如珠内園人歇催花鼓市肆塵生賣酒罏河北功臣稱李郭江南租稅賴蘇湖明朝漕運開洋去原闕三賨布初來價倍高吳鹽重𣙜令如毛淡烹蓴菜羮無豉倒看天吳褐有濤風起秣陵號虎兕天連青海縱鯨鼇長洲茂苑吳山好自媿多憂兩目蒿四綠髪年來忽已皤尊前不樂復如何直如柳惠猶三黜醒似靈均漫九歌無數烏鴉爭晚樹一雙白鳥浴晴波相逢莫厭滄洲静要路從前覆轍多雲文閣為鄒伯常賦光範門前人似蟻君獨幽棲徴不起西窓拄笏看青山東閣垂簾熱沈水非煙非霧非霞氛欲斷復續何氤氲若有龍眠博山底海嶽清氣嘘成文梨花夢醒春無跡一縷猶縈靈壁石白衣蒼狗從變改明月當風自虚寂可憐權門銅臭兒臍燈將然恬不知何當招之入爾室三熏三沐論我詩和徐仲剛歸田山下室環堵門前柳數株青秧移畎畆白水似陂湖避世方躬稼傳家本業儒十年躋仕路兩浙走危途熟路歸來馬高林返哺烏煙塵雖未息風月不虚孤松葉燒茶竈花枝挂酒壺拂塵梭鹿尾席地草龍須鳥雀窺窓隙漁樵來坐隅家居聊放適世路甚﨑嶇池水魚堪養庭階草不誅眼前能自足身外更何需病鶴開籠放飢猿擲果呼看雲添逸興對月了詩逋田父邀皆去村童醉或扶不嫌鄉俗陋敢學古人迂西堠良田熟東膠小徑紆泉香雲骨髓花瑩雪肌膚犬吠溪雲出牛歸田野晡幽居東近海何必更乗桴寄寗伯讓州倅次仲剛韻籠鶴乗軒笑衞公歸來高臥北窓風忘機鷗鷺相依乆滿眼湖山與畵同洗馬池邊楊柳綠釣魚亭下藕花紅自知大器成須晚不與時人校近功次韻寄斷雲法師嵯峩塔廟厭長橋東望扶桑路不遥聴法龍來雲滿室傳衣人立雪齊腰階前祇樹黄金地石上菖蒲碧玉苖猶記昔年相見日為師吹徹伍員簫和沈啟之席上詠梅絶句把酒花前歌竹枝看花不覺舉杯遲春來結得黄金子還有調羮鼎鼐時弔顧將軍墓并序顧榮字彦先晉散騎常侍贈驃騎將軍開府儀同三司諡元公其勲業詳見晉史余甞慕其為人今客吳門適近其墓在黄天蕩南地方二三里土人直以顧榮墓名之予因徃弔焉白髪吳儂說姓名將軍墓近闔閭城徴車入洛稱三俊割炙知人得再生江月似留麾扇影松風猶作鼓琴聲停舟一酹蘋花渚野鶴雙飛躑躅鳴寄徐頥齋先生憶昨天恩頻賜帛數年國步政多艱莫嫌旅舎纔容膝喜有丹砂可駐顔進乳吳姬香玉暖弄雛萊子綵衣斑故園松菊知誰主又見秋風燕子還九日為客東吳年復年吳霜飛上髩毛邊青山滿眼暗如霧白雁一聲哀徹天細看茱萸占老健忽聞桃杏作春妍鄰翁將謂花呈瑞邀我題詩展盛筵送陳希𤣥入道海上蓬萊知有無林泉佳趣即仙都三朝鶴繞燒香几九轉龍蟠煑汞罏滿地白雲山館静隔溪紅樹水村孤敲門莫厭相過客要覔丹書古篆符題梅竹水仙圖羅浮美人倚修竹凌波仙子適相逢春風桃李自塵土不涴歲寒氷雪容代簡淨慈寺顔悅堂長老南屏樓閣照西湖四面雲山列畵圖丞相頻來談般若老禪端坐結跏趺長廊百五僧猶在古井㝷常水不枯獨有門前楊柳樹春風得似舊時無代簡倪雲林江水西頭繋客槎漁莊遥望隔鷗沙枕書門掩三竿日題畵毫飛五色霞杯斝椒香仍臈味階庭蘭茁又春華雪晴我欲㝷梅去尚待東家借鹿車次韻陳惟寅懷古幽㝷度香徑遐思倚琴臺烏喙甞膽日雉妖捧心來春風煽天艶滅國輕于埃二慿高望海湖白馬還來無一杯弔忠魂江風為號呼悲哉抉眼地愁煙暗苔蕪三奕奕讓王宫遥遥延陵墓吳儂奉烝甞春秋幾霜露胡為後之人無復繼高步右姑蘇四寶鼎移炎祚降王赴幽都遂令虎林人得免馬邑屠獨憐金盌出啼殺稽山烏五輦路土花碧金門苾芻闗浮海兩龍馬一去不復還空遺温室樹過客猶高攀六我來銅駝巷葛嶺重行行相逢話師相皆云誤蒼生遺臭千萬年沙堤湖上横右錢唐烈婦歌并序烈婦姓周氏蘇州太倉人至正丙申其父以兵帥貪虐隂結壯士數輩將殺之謀泄舉家被戮帥之子悅婦少艾誘為妻不從痛罵而死今鄉人義而哀之構祠立碑亷夫楊先生為記其事且屬江西陳季子索詩以著其事陳君手持烈婦碑勸我為作烈婦歌人生自古孰無死烈婦之死名不磨本是東滄小家女粉黛不施眉自嫵父母憐惜忍違離納婿于家半年許阿爺從軍氣頗麄欲殺不義奔京都手持芒刃機不宻身落禍坑家乃屠繡衣郎君元帥子少年絶愛傾城美願言攜手與同歸即免梟首尸諸市郎君滿屋堆黄金安知難買烈婦心耳邊言逐飄風過腹内寃含滄海深罵聲不絶郎君怒馬上揮刀斫頭去雙鸞羞覩青銅鏡全家甘赴黄泉路娟娟肌體嬌如雪烈烈肝腸堅似鐵一團寃血注婁江至今流水聲嗚咽男兒讀書峩冠巾偷生或忍忘君親奴顔婢膝曳朱紫得不媿此裙釵人嗚呼得不媿此裙釵人贈馮縣丞野夫東郭帶經鋤田畯相逢為下車百里雷鳴元夕後一犁雨足五更初行庖只飲長洲水署筆頻鈔種樹書獨奈賦蛇除未得逢人蹙額問何如二九土荆榛七八年吳儂挽粟上青天秋風杼柚黄茅屋春雨犁鉏白水田農畆要令無佩犢琴堂政頼佐鳴絃停車為說闕意闕斜陽野樹邊題墨竹吾聞雪堂老仙之愛竹到處敲門看漪緑為誰寫此秋一枝葉葉風生清可掬恍如坐我此君軒與君相對淡忘言焚蘭金鴨綴鳯髓我思古人欲遘止盧知州宜興秩滿以避亂乆寓無錫視同故鄉今知崑山必有懷二州風物之美贈詩言情并致頌禱我思陽羡茶初生如粟粒州人歳入貢雷霆未驚蟄天荒地老經幾年春歸又聞啼杜鵑山中靈草化荆棘白蛇何處藏蜿蜒玉川先生一尺鐵欲刳妖蟇救明月丹霄路㫁肝腸熱還憶茶甌飲氷雪二我思惠山泉長流無古今瓶罌走千里煮茗清人心向來烈火炎錫谷神焦鬼爛勢莫撲池邊墮石亦灰飛此水泠泠瀉寒玉高人飲泉五六年一襟清氣清於泉好為吳儂洗煩熱乗風歸報蓬壺仙可笑崑山州奉省府之命例試在學儒人以余為第三名故有是作可笑秋娘已白頭也隨年少上秦樓舞腰强學春風柳不及春風柳様柔送慶德謙知州漕運之京師兼簡陳子山學士十三萬斛葑田珠一帆南風到直沽天上䕫龍應為喜海中鮫鰐近來無江湖乆臥頭垂白雨露重霑紱已朱寄語玉堂陳學士楚狂憔悴客東吳顧仲瑛避地嘉興幾二年聞囘崑山徃見不遇作詩寄之末篇兼簡西白老細雨清明節扁舟過玉山傳書元有誤飛舄竟無還芳草萋萋碧落花㸃㸃斑題名牆外竹黄鳥正間闗二客來常問訊書去半沈浮兩度黄梅雨相思白髪秋樵蘇今短笠山水古長洲寄與天寧老龜巢賦咏不麥飯歌和徐主簿韻太倉陳陳歲仍熟田舎嗷嗷食無粟朝來飯甑麥新炊一穗新煙出茅屋磨旋日月吐霏屑湯湧波濤跳碎玉耕蓑樵笠隴頭歸急雨森如瀉銀竹妻孥笑語同一飽且免飢雷鳴此腹安知列鼎五侯家日食萬錢猶未足和陸宗望韻贈夏師魯百斛葡萄賸有餘一官不換只閑居窓含雲氣虞山近門掩秋聲栗樹疎鴻雁去來知幾度雞蟲得失竟何如丈夫高蓋非無日聊遣閑情賦子虚寄袁仲長古人心事古冠裳近代伊誰有比方杜甫苦吟頭戴笠管寧危坐膝穿牀秋風落葉多如雨老圃黄花獨傲霜我亦卜鄰依歲晚讀書東壁借餘光謝徐伯樞兄弟膠山下墓田東膠山有牛眠地西堠村連走馬塘乞與一坏藏白骨待看殘夢熟黄粱梅花杏樹堪懸劍竇乳寒泉可薦觴從此便令童荷鍤諸君賢似古桐鄉送費伯謙之吳郡侍親若翁清約似無官宜爾儒衣不厭寒燈火十年勲業在湖山千古畵圖看氷池魚躍共調膳雪屋雞鳴起問安他日過庭煩寄語别來頭白卧江干崑山陳伯康築亭山巔楊邊梅過之題曰玉山高處且為賦詩命郭羲仲劉景儀及予和之神仙中人鐵笛老愛爾玉山雙眼青玉山高處挂手板鐵笛醉時圍肉屏天生丹穴鳯為石東望黒洋鯤出溟人傑地靈風物美絶勝西蜀子雲亭鉛上人席上作有客有客龜巢翁鬚髯如雪氣如虹權門要路脚不到寧與山僧野老長游從鉛公喜不縛禪律百榼沽來作生日雪花似亦為人喜庭舞婆娑俄入室酒邊笑殺東家兒㯽榔不與劉穆之㝷常有客謝無酒有時對酒還攅眉人生能得幾初度且無長繩繋烏兎癡兒夢夢真可嗤不識盈虚元有數君不見黄頭郎到頭餓死錢堆傍何如眼前有酒且為樂毋令愁結九廻腸婁曲書堂為殷君叙作汨彼婁水東連于海爰有幽貞居婁之滙蜑舟岸泊婁人紛拏幽貞有子劬書厥家晨雞既鳴灑掃室堂羞我甘輭閱我縹緗我經我史如耕如桑我服劬勞罔敢怠荒黍稌有田魚亦有梁味道之腴游藝之塲曰父與子欣欣樂康其樂維何匪人伊天憧憧徃來誰其語旃遣愁偶覽青銅鏡方驚白雪髭如何不飲酒猶自苦吟詩面作鞾紋皺腰間帶孔移獨存方寸鐵剛似少年時二茅屋瀕湖住蕪菁借地栽一秋常苦雨十月屢聞雷岸草青青出牆花灼灼開掃除蠅蚋跡還有北風來和危太樸參政韻送慶德謙治中徐驅百騎稳如船雨露新承下九天當道故人多汲引大參佳句獨流傳數年華髪風塵裡一㸃丹心日月邊老驥只今方展足蜚聲當不愧前賢留别知隱愚長老蘇昌齡先生淞江太湖春水生湖邊白鷗㝷舊盟遠公沽酒壯行色坡老題詩慰别情燕子日長書屋静落花風颺釣絲輕相過不負青山約一櫂夷猶兩日程徐伯樞和韻送行予復答之主人送客呼麯生膠山卜居仍有盟綈袍戀戀感君意去國遲遲知我情敎子正須熊膽苦看花應喜馬蹄輕老夫把釣扶桑下目送鵬摶九萬程挽雍逸處士孝友人無間詩書子更賢十年遭世亂三樂得天全處士星今隕虚堂月自圓客來懸榻在老泪為澘然寄謝雙楊沈仲庸并簡同席諸友一林修竹映滄洲百榼葡萄泛玉舟送客留髠成大醉憐君小阮與同遊舊家燕子飛華屋滿地龍孫著錦裘絶似蘭亭修禊日坐中賔客總風流朱明道等九人和前韻見貽各答一首并自述一首新居風景似麟洲我亦頻來繫客舟山列畵屏朱果熟湖開青鏡錦鱗遊疎狂不厭高陽侣彫敝應憐季子裘有酒正須開笑口黄河今復見清流右贈朱志道二先月軒前杜若洲抱琴童子釣魚舟蝸牛有國方交戰鷗鳥忘機且共遊戲綵諸孫頭峙玉瀕湖二頃足莵裘吟餘不接紅塵事洗耳無勞枕碧流右贈明道三楊柳飛花雪滿洲水邊亭子小如舟四時花月供談笑千古湖山可釣遊有客即呼鸚鵡盞無衣還贈鷫鸘裘試聽月旦評鄉里倜儻今為第一流右贈原道四}
