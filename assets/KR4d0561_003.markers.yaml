  - {type: variant, offset: 11106, length: 1, content: 善, WYG: 君綽早赴崑山州烏紗白髪兩遺黎同賦新年第一詩吳下喜頒堯日歴嵩呼重見漢官儀春囘南國梅先得律轉東風樹未知試向馬鞍山上望楚氛猶自暗邊陲訪王景逸不遇其婿梁國傳留宿東齋作此簡景逸并允德阿林隨我曵長裾宿爾幽人水竹居雲暗一天龍吐水溪喧半夜獺求魚邯鄲枕上新年夢光範門前舊日書欲與兩賢論出處還家相見意何如吳生以趙仲穆所書蘇文忠公遊道場何山詩屬張天英緒人及予和之溪流行盡穿林麓白塔紅亭照嵒谷道場深處看何山僧住山頭我山足兩山雲似海瀰漫飛路百折空中盤我昔幽㝷愛僧舎亦欲卜築臨清湍東坡先生不世出咳唾珠璣落禪席可憐前度厄兵燹一踣寶幢誰再植永嘉山水汚歌鬟幸無若人來此間坡詩珍重趙侯寫使我見詩如見山我衰不夢周公旦猶夢㝷山及春半買花載酒約吳生慎勿渝盟重嗟歎同楊鐵崖弔龍洲墓和劉韻排雲閶闔問神州目極龍沙萬里愁匡主首陳天下養和戎深為國人羞方期殺賊懸金印又報脩文記玉樓一代人豪公寂寞春風掃墓為停舟附楊鐵崖讀君舊日伏闕疏喚起開禧一段愁龍川狀元曽表怪冷山使者忍包羞東江風雨一斗酒大地山河百尺樓白鶴飛來作人語道人赤壁政横舟次韻楊鐵崖過李樂菴墓胸中萬巻色絲長才出纎毫補舜裳笑脫廌冠辭柏府羞看狐穴倚椒房結菴投老林泉樂易簀遺言翰墨香鐵笛仙翁今表墓婁人當不愧同鄉次韻寄梅西溪宦情吟思兩如何咫尺婁江不我過呉下土風}
