  - {type: variant, offset: 11105, length: 0, content: '', WYG: 馬吉卿太尉初開藩府日我卿長揖與談兵快鞭自此宜先着偉器如何竟晚成舊菊數株荒老圃寒流一帶繞孤城草廬只在齊門裡堪笑無人識孔明山人家為路以道作先生自是青雲人歸來故山鉏白雲家徒四壁藤蘿屋頭戴一幅逍遥巾松根茯苓大如斗木柄長鑱常在手賸收柿葉教兒書更摘松花釀春酒題詩滿屋酒滿船客來無日不陶然人間豺虎自鬭死雲中雞犬多成仙山人家住山林好日日晏眠無事惱笑他東望玉門闗絶域思歸歎年老過牛彦伊寓所對雪口占問訊蛟龍浦來㝷鷗鷺盟天風寒贔屭氷雪歲崢嶸平旦徐徐起清樽細細傾獨憐鄉國逺西望若為情美崑山費知府重脩學宫詩昔侯未牧崑山州州置逺移東海頭百年鄉校風雨毁四郊戎馬煙塵秋州仍舊山侯下馬勸農耕桑重儒雅春秋籩豆駿奔走日月宫牆煥圖寫素王清廟衮龍衣博士高堂鸛雀飛泮池芹􅍨堪采摘緇林草木生光輝時方擾攘人用武侯為斯文扶砥柱同僚才並青雲器參佐功成脩月斧廟前銀杏雙蓋青堂後玉峰開畵屏諸生揖讓秉周禮我侯語言宗六經官清只飲淞江水鱸魚自肥蓴自美齊名常衮與文翁興學之功照青史代道傳招路徴君益上人過西林精舎西林新種梅花樹未有詩人為品題尊酒小窓邀上客杖藜今日過前溪家園小摘春盤菜野徑初乾臈雪泥二老風流堪入畵不妨琴與鶴同攜贈水西長老中伯庸兼簡承天毅剛中禾城說法兩三年貔虎如林䕶法筵一片白雲閑出岫五湖春水濶連天詩堪補世方留稿琴乏知音竟絶絃賴爾峨峰堂上老喜留賔客共杯泉雪中懐杜玉泉玉谿兄弟暨管伯齡對雪僧窓憶舊遊浣花溪上草堂幽弟兄愛客情懐好賔主談時氣味投揚楚兩州城近接吳淞一帶水長流興來早晚相㝷去解劍漁翁覔釣舟元日同}
