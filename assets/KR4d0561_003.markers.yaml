  - {type: variant, offset: 14232, length: 1, content: 終, WYG: 江水一笑相㸔兩鬢霜田野無人鴉種麥漕渠通海蟹輸芒憑君莫語悲秋事且復持杯送夕陽玉田䘮側室作詩悼之余亦次韵以相其哀目斷琹臺日暮雲相如無復見文君最憐機上廻文巧更憶燈前教子勤繡箧熊丸香尚在綺牕鸞鏡影初分江村一月黄梅雨誰為衣篝爇寳薰五叢涇送玉田徙碧山與龜巢隣居傾葢雨兩月同客天一方君今挈家去宅我龜巢傍為聞碧山好宛在雲水鄉朝紳多寄寓群髦富文章將尋鷗鷺盟與我同六藏老婦堪夜績東壁分餘光客至亦可留覓酒過短墻巷無車馬塵屋有汗竹香籯金與床笏笑視俱亡羊惟存廣文氊讀書坐藜牀閉門樂吾樂疏食猶膏粱清風北忩下懐哉古羲皇寄鎦景儀先生杏花春雨晴時别蒲栁秋風又颯然笳鼓新城嚴警邏溪山幽館喜安便校書還照青藜火煑茗應􅆽錫谷泉近遇故交聞有信逺勞埀問念無氊龜巢仍寓黄天蕩鼃竈今連白水田自分犁鋤聊卒歲可堪兵革更飢年家居食指一百廿斗米緡錢八九千𤨏𤨏旅懐言莫盡知君憐我似䕫蚿寄顔悦堂長老及崑山諸友薦嚴永懐二方丈雙徑歸來舊竹邉林風磵月兩依然崑山特立烟塵外婁水東流渤澥連坐有故人應念我客無此老共逃禪南能北秀煩傳語秋晚相過飲菊泉杜子才掾史擕詩見訪次韵白首無機心江鷗最憐我復有新相知時來與閒坐一凉初過雨七月正流火先鞭君已着短鍤我方荷壯君早騫騰先我常轗軻憐君幸如此数見何不可茒茨湖上居菱芡水中果後㑹期碧山合歡呼白墮更邀詩酒侣共載書畫舸中秋月如晝西溪捩歸柁玉山顧隠君自嘉興荅詩詢僕近况且云徑山禪老亦望一見故復用韻自述簡諸故人數椽茅屋一笻枝萬事無心獨愛詩詩債隔年償未了帶圍連月孔頻移呉田積雨生禾耳笠澤西風斷桞絲眼底故知俱契濶抱琹何處覓鍾期次韵荅戴德隠見贈我生無他長耽書竟成癖鬚眉皆雪霜肝膽如鐡石所頼識前賢頃歩不妄適向來走風塵朝不能慮夕行囊既羞澀家累且繁劇隨身一破硯百指全仰食驅馳今九載未始一日閒豈不懐故園松菊怡我顏長蛇及封豕出沒咫尺間逢人問親戚野坐荆屢班不見雁足書徒眎刀頭環遥憐金斗城如望玉門樹憶昔重九時鄉隣約雞黍黄花香可愛白酒味不薄東家復西家相邀總難却負郭有二頃平居得三樂朋㳺結詩社時時共吟噱溪澗采蘋蘩春秋奉祀禴㡬廻乗天風欲跨揚州鶴那知一顛沛江湖竟漂泊移家碧山下家具少于車幸君適相逢同念去國賖聚如水上萍散若風中花或琹教河汾或𤣥授侯芭交情比投漆子弟亦通家詩筒頻往來瞬息經兩稔壯君多志氣將衣買臣錦老我忘功名但就吕公枕三江五湖水共喜魚不淰茰觴了佳節藜床甘且寢春日方遲遲秋霜俄凛凛好客多釀酒願作東林沈寄丁彦誠旌旗滿眼各西東君覓桃源我轉蓬兵後即知還舊宅客來曾辱寄詩筒石田種秫梁溪曲茶竈分泉錫谷中最喜西忩山色好青霞不染俗塵紅贈沈彦肅典史兼簡王景德空山寒雲白如雪歲晚高軒過巖穴三生石上拂蒼苔一笑梅邉有明月牀頭釀得松花酒思與故人傾瓦缶煩君為問王子猷剡舟肯棹同來不旭齋歌次鐡笛先生韵旭先生行年七十餘躭書樂且孺白駒過隙莫可留欲把長繩繫烏兔囊無一錢任羞澀腹有羣經飽撑拄論交貴在見肝胆不學時人口相煦有時醉吟詩其巧猶瓦注快若爬背癢十爪倩仙嫗昔賢只讀圯上編便遇君王借前箸先生豈無策可用草廬未有人三顧青山白雲古畫圖筆牀茶竈今家具居吳十年食破硯硯田幸喜無租稅秋風籬落桑葉隕枯蔓蕭條繫寒瓠西伯何當獵渭濵載取非熊後車去次韵寄題鄒朋夀草堂并簡劉旭齋賓主東南美溪山繞屋廬經鉏百戰後版築十年餘木落西風急忩鳴夜雨疎侁侁二三子燈火案頭書荅楊獻可見贈憶爾梁鴻山下宅園池不減李文饒一朝猛雨鶯花去十載東風燕麥揺客裏相逢聊慰藉樽前一笑共歌謡君歸不負青山約好似淮南早見招簡呉江朱志道昆季去年長至聽塤箎轉眼今年又此時棣鄂喜存兵後樹梅花早綻雪前枝西山近日無烽火東閣何人共酒巵兒軰北歸今問訊呉音變楚莫相疑盛彥英隠居太湖之隂號具區耕叟命僕作詩以歌詠其樂去脫屣東華塵躬耕太湖濱桑麻接隣里魚鳥情相親閒時讀書牛背上安知六國方攻秦東風二月桃花雨布榖飛來向人語一犁初破隴頭春黄犢出䦨徤如虎羲農世逺莫可追南山石爛無足悲悲歌笑寗戚夜半猶未已人間閒是非何用汚牛耳我田已耕春晝閑樵童隨我㸔青山日暮歸來一壺酒我歌嗚嗚童拍手童拍手兒飯牛一天星月爛不收重捻鐵笛作三弄七十二峯俱㸃頭小至九年至日悲流落一笑今朝醉醱醅兒子歸來十里外老妻歡喜兩眉開宻雲藏去黄棉襖輕雪飛來緹室灰遥念故園歸未得竹籬為我䕶寒梅臘月臘月無多日行年六十三浮生空自老往事日多慙南國山皆赭東郊草未藍蕭條江郭外雲暝雪􅆴􅆴懐野舟閒長老兼簡真本元大地北風寒且嚴香凝丈室晝埀簾庭前栢樹心相契牕下梅花手可拈出郭鐘聲聞數里穿城塔影見重尖欲求智永千文帖煩說區區寄口占古鼎歌并序中呉萬夀寺舊藏古銅鼎其欵識有云王在周康穆宫冊錫寰用作皇考鄭伯姬尊鼎大德中任陽謝氏嘗欲以重寳易之時住持㸃翁師不從後謝氏為構佛殿㸃遂以鼎荅之至正丙申謝遭兵鼎因失去甲辰夏四月愚隠智公乃得於軍人之手耆舊聚觀皆曰我山中舊物也既而出鼎見示且徴予詩以紀之碧雲師着金伽黎空王殿前龍象隨一夫長跪送古鼎狀若獻寳波斯兒羣緇來觀集丈室中有老僧前致詞云是山中舊時物立誦欵識能無遺惟有臣寰紀君賜用顯厥考鄭伯姬文詞詰屈錯盤誥字體隠伏蟠蛟螭蒼姬紀錄世屢改不知何代來於斯謝家寳樹易趙璧巨構賈與秦城齊鼎兮鼎兮什襲去歲踰數紀今來歸師聞此語重歎息兵火連年炎九域金鐘大鏞棄路旁總若沉沙銷折㦸珠還合浦獨無恙䕶持信有天龍力摩挲兩鉉濕煙霧錯落丹砂映金碧濁水摩尼五色兼出海珊瑚髙一尺嗚呼羲軒之鼎莫可求禹鼎亦已淪東周世所用者非爾儔或膨豕腹徒飽羞調羮爾無與覆餗爾不憂歸來兮歸來北山兮菟裘汾隂自有為時出切莫放光驚斗牛歲除前一日寓姑蘇與友人卞于珍守歲姑蘇城外小湖邉寂寞僧房借榻眠詩稿冩成丁夘集歴頭檢盡甲辰年中原喋血人争地南國啼飢水拍天起坐夜深如守歲屋山風雪灑寒氊偕徐伯樞訪王孟翼酌酒論詩經宿而别舊雨客來今復來溪堂新築栁新栽風生玉麈談詩律露濕金盤把酒杯淮甸三邉烽火熄呉山千里畫圖開相如來奏凌雲賦當路疇能薦逸才劍池送曹廣文赴學士院檢討峩峩虎邱山湛湛劍池水水深人莫測草生寒不萎世傳祖龍劍斫斷蒼雲根千古兩絶壁鐵花㸃苔㾗僧厨轉轆轤隂崖落氷雪臨池人有語響荅出林樾先生屢幽賞盥沐彈鳴琴木石俱㸃頭魚龍亦知音今居白玉堂還念青山約羣仙與重逰増輝舊巖穴雨中懐徐草堂兼述杜掾史求詩之意亂紅飛盡綠隂稠風雨凉生四月秋且喜三邉清似水何妨一室小如舟歐虞墨帖時臨寫呉越青山總卧逰肯為杜陵題老桂難兄應作置書郵和浦玉田清明日郊行湖上新堤踏軟沙少年人面映桃花花村風物渾如舊獨欠青帘賣酒家二栁絲裊裊拂蒼波花雨斑斑㸃綠莎寒食清明春又晚人生不樂復如何三笠澤西頭王墓村桃花水沒竹籬根年年春到清明日兒女郊行栁挿門四一幅春雲巧似裁隔湖飛過碧山來野橋小立題詩處夾竹桃花爛熳開五四望青山眼欲花山光都是薄雲遮杖藜徐歩歸來晚月上東忩恰到家六每惜春光去後思春來行樂復何辭放舟莫近呉門去諸將樓船正出師夀徐伯樞碧山湖邉銀杏樹數百人家星散住中有南州高士孫借屋讀書深閉門豈無香醪甜似蜜好客相過方與喫朝來爛醉呼不醒蓬矢桑弧挂虚壁皇天有意生男兒錦繡五藏璚瑰詞亂紅飛去綠隂静菖蒲花發當何時贈葛天民吾聞清孝公為君八世祖可憐遭亂離麻鞋走塵土牀頭無金何處索堂上雙親頭欲白五星躔度書一編江湖乃作談天客吾嘗閲其書心目俱茫然星辰之高四萬八千里三百六十五度分周天人生兩間應列宿探索豈易窮幽𤣥君今自喜得其妙回視筌蹄成一笑萬象森羅方寸中千尺碧潭寒月照髙談往往驚倒人黄金捆載歸養親鱸魚斫鱠􅅅紫蒓褊􅝆五色斑衣新人家生兒孝養有如此何必鐘鳴鼎食重華茵扁舟過我三江口留宿龜巢㸔星斗欃槍熒惑總莫論且道酒星無恙否酒星茍無恙酒禁必早開娯爾白髪親酌彼黄金罍我生不願萬户侯亦不願識韓荆州但願太平無事百不憂吾兒賣文君賣術得錢可以沽新篘命呉謳若翁與我日日眠糟邱崔宗明掾史請告之錢塘省母將徙居來呉時太尉丞相張公在分省嘉宗明之行贈錢數十緡故詩及之丞相知君念母情金刀錯落贐君行衣冠祖帳三江口帷幔歸舟㡬日程烏鵲知人先喜信鱸魚入饌試當烹髙堂若問呉門事王國金湯第一城和浦玉田咏物嗟爾五月菊黄花發何早平生傲霜枝乃雜半夏草趨炎真強顏乆雨竟埀老榴裙炫人眼坤裳為誰好忍負陶淵明秋風舊懐抱二嗟爾六白蟾爬沙出何遲天生一腹皤且有三足竒乖時人共棄保身自汚池昨午遭磔死同類多可悲月官老蟇精居髙知不知寄鮑仲孚提舉風雨蕭蕭五月凉堦前書帶草應長心傳千古文章印名重諸公翰墨塲官舍㸔山閒挂笏齋居掃地静焚香野夫别後遥相憶一榻青苔兩鬢霜寄陳子章申屠仲權聽雨聽風半月餘高齋吟嘯興何如雨添泮水芹芽長風撼帷林杏子踈毛頴功名應立傳杜康交絶豈無書陽春白雪詞皆妙好寄龜巢慰索居賀陳子經赴學士院著作白玉為堂置此身詩書端不負人人生花綵筆絲綸羙栁絮宫袍雨露新日過八磚趨禁署天開一國用儒紳呉淞江上漁樵客也為謳歌寂寞濱}
