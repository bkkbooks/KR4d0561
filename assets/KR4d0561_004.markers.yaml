  - {type: variant, offset: 11943, length: 0, content: '', WYG: 楚南藏主來詢知元明師居義興山中附詩問訊十年不喫陽羨茶山中舊宅還㡬家道人今歸卧煙霞石池手種青蓮花青山且喜依然好蛟兮虎兮跡俱掃客有放棹東海頭安書好寄龜巢老感物寄珪玉田書記矯矯千里駒英英五花文塩車太行路汗血亦滿身嗟爾本龍骨誤隨凡馬羣何當一變化翩翩籋青雲二樞宫降精英為象純玉色誰令畊舜田乃負烏犍軶豈無金覉絡錦䄡為爾飾鼻吸酥酪河歸來梵王宅和靈巖虎邱感事娃宫無復有樓臺佛刹而今亦草萊衲子盡隨飛錫去將軍曽此駐兵來青山銜日猶前度滄海揚塵復㡬廻霜落呉天香徑冷斷猨啼月不勝哀二兵餘重到古禪闗無限傷心四望間林下㸃頭皆礟石門前戰骨似丘山劍池屢變珠光赤盤石猶沾血㸃斑白髪破衣耆舊在獨憐寧老不生還遣興和許君善韵馬圖莫恠出猶遲世事方如理亂絲蓮葉有巢龜已老竹花無實鳯仍飢籬邉艇子供埀釣林下樵童許奕棋苜蓿一盤三丈日老妻晨起案齊眉次韵荅因了菴重經䘮亂勞相憶多謝將詩問起居鄰有國朝新定律家無屋壁舊藏書月明江上魚龍伏歲宴山林草木疎堪笑出門多滯礙兀如禪衲坐僧廬普講主哀詩前代王孫錦繡腸中藏萬卷佛書香一鞭竟著三車去不作修文地下郎二自喜年來兩耳聾不聞今古鬬羣雄每逢林下三生石只說尋常萬事空三長把吟豪貎水仙梅兄礬弟亦牽聨如今收拾歸何許兠率宫中别有天四瓊林自有鳯凰枝枳棘叢邉翅偶埀鴟嚇不知緣底事赤霄飛去竟難追五茶毘煙斷蛟龍浦舍利珠藏窣堵坡從此不沽陶令酒藕花零落柰秋何六天台一曲繼天泉獨抱遺琴十二年古調不隨陵谷變麟膠誰續斷頭絃寄孫彥民讀君呉儂詞如讀舂陵萹惜哉未作郡手拍元子肩𤣥髪亦已華鐡硯亦已穿秋蘭抱幽馨竒寳横道邉請以白雲曲載理朱絲絃勿論聽者希我心自怡然題水仙山礬梅花圖綽約誰家女子依稀水府仙人莫恠無言脉脉正須頻喚真真二紅杏碧桃春暖梅兄礬弟氷清㑹得生花筆意隠然金石詩聲乙酉元日漫興四國山河喜奠安一年時序又更端酴酥春酒到手暖楊桞曉風吹面寒太史始行新律歴齊民俱易古衣冠故鄉只在停雲外奈可親朋欲㑹難簡曹仲鉉東海歸來塵自揚一竿西日釣滄浪州人尚說家園在沙鳥皆知世慮忘竹笋滿林冬入饌梅花繞屋夜生香吾兒學稼書仍讀應喜分燈過短墻送僧還日本吾聞帶方東南有國環滄溟龜峯雲接扶桑青飛梅花開作絳雪佳實亦比蟠桃頳珊瑚出水光奪目老蚌吐珠皆夜明山藏水產足珍恠惟人尤得鍾其英釋門龍象獻寳出眉目秀異風骨清錫飛一萬四千里欲以佛法中華鳴手探天目獅子窟速肖厥祖天人驚三呉百粤小盤礴王公下榻争趨迎大哉禪月古叢社正法眼藏轟雷霆思親要織睦州屨春風稳送歸帆輕老夫扶􅉵走相餞事有干請煩留情往時爾國逺秦火六籍不隨煙燼零願言傳冩遺全璧一洗魚魯開羣盲上人名亦埀不朽能使舶䑲為馬䭾吾經張伯祥自濠州惠詩且相傳有還家之喜即事口占聊抒情愫春風濠上來家奴寄詩親朋及老夫微詞周折出肺腑蟻絲九曲穿遺珠神龜脫網曽有夢靈鵲報喜寧虗孤大鈞播物各生遂忍使鳯凰長在笯羣兒覓竹跨為馬呉淞江上迎歸艫南堂花竹春正好玉芝粲若珊瑚珠老夫亦作輭脚局典衣沽酒黄公壚賀陳思忠自濠州歸南山石爛海揚塵播物依然出大鈞坡老暫為儋耳客謫仙豈作夜郎人歸舟㠶巻桃花雨家宴盃傾竹葉春雪髪巢翁臞似鶴也隨鷗鷺去相親得玉山顧徴君書作此代簡濠上人來書數行開緘如對語琅琅酒盃已辨弓蛇誤藥杵無勞玉兎將少待天公舒老眼剩收雲母束歸装舊家亭舘花狼籍春水依然滿綠塘老病乾坤如許大老病此江濵無酒可留客青山應笑人幅巾方竹杖青草落花茵賣得長門賦相如未是真水村歌為趙朋南賦我愛水村好為作水村歌君家水村二百載閭里向來冠葢多銅駝巷陌自荆棘滄海依然皆煙波墻花巷栁接葭菼蘆荻蘋蓼茭蒲荷澱湖噴薄東岸曲陳湖繚繞西邱阿前看震澤後笠澤青山數㸃堆青螺錦溪橋頭魚米市亦有朝鼓鳴如鼉市聲豈不傾人耳先生閉戸雀可羅茶竈筆牀魚童釣簑人稱陸魯望自比張志和兩賢尚友作三隠過也亦宜呼小坡長安道上人擾擾奈爾水村安樂窩二我愛水村好作歌仍和之水村之樂能自得山村之號真相宜齋居隠居白日静門外繫船青桞埀讀書牕雞亦觧語㤀機沙鳥皆相知葑田種秫足為酒草亭對竹長哦詩平生自是愛結客况復客多來問竒清談閑揮玉麈拂高㑹醉傾金屈巵飲牛有渚蓄魚有池老夫願卜隣矯屋與隔籬分燈訪績兒女共曵杖往來鄰舍嬉從此水村作土著與君說詩時觧頥次韵荅許君善小逕紆廽草欲迷村居如在瀼東西為煎新茗頻敲火自掃殘花恐汚泥白首十年呉下客傷心千古越來溪羣賢何日能相顧重為湖山一品題己酉夏四月東維子來訪以其過崑山詩見示且邀余及盧公武殷孝章和之酒濕宫袍逸興多鐡龍吟嘯舞蛟鼉一江星月光揺動八極風雲氣盪摩詩史屢書新甲子草廬還是舊煙蘿繫船秦柱山前栁邀我呉趨和郢歌次韵荅焦任道誰越誰秦自瘠肥别來十載電光飛尚看書帖題青李未掌絲綸對紫薇老我襟懐寒古井憐君氣宇盎春暉石川古栁清隂好且繫書船莫賦歸次任道韵贈朱公路贊府清濁無論渭與涇請㸔流水悟浮生莫憂白石南山爛且喜黄梅細雨晴石几題詩焚艾納水亭酣酒卧桃笙𤓰田不理春來草怕有人呼作邵平謝焦任道惠畫焦君青雲器不减阮仲容飲酒五六斗卓然猶祖風髯龍吐醉墨逸氣超鴻濛騷雅靡不作無聲詩更工淋漓練裠幅遺我龜巢翁翁老如兒癡嗜詩羊棗同層崖飛瀑泉撫玩意不窮何以報夫君秋江采芙蓉露筋廟詩斷臂孤兒事可悲露筋娘子死尤竒裙裾不受紅塵汚膏血都充白鳥飢野燐照人魂斷處田家妻嫂睡濃時玉遺香骨天應惜鐡比真心世共知宿草埋煙迷古塚幽花泣雨倚叢祠碑存米老春秋筆詩有歐公絶妙詞尚待姓名傳國史更看旌表照門楣古今絶少青雲士却忍將身作夏姬祭顧玉山詩於乎玉山翁世居呉右族生逢元盛時當路屢推轂辭榮樂蕭散竟藴璞中玉早持萬金產轉手授家督不為五岳逰家園蒔花竹讀書數千巻旁覈聃與竺非無酒如澠過客佳乃肅徒見駟馬車未若一儒服緇黄璨然者待遇亦刮目常言性嗜詩趣味勝粱肉興來抉雲漢毫端注飛瀑詞林采英華琰刻播芬馥承平十三年嘯傲心自足世故一變更十室九顛覆幽棲綽山下擬比王官谷時余逃難來憔悴如病鵠相見恨殊晚姓名聞已熟夜飲佳樹軒明朝杯又續髙堂桂花秋金釵剪銀燭雙歌棹觥船洗我愁萬斛一留兩月餘坐客常五六寫圖紀觴詠墜水亦有曲連牀可詩齋清話屢同宿擇鄰移我家歲晚安且燠奈何鼙鼓聲忽若雷振屋婁人悉驚散我亦猿失木萍漂甫里東賣文如賣卜感翁數相過餽問慰窮蹙翁亦客檇李逺避蝮蛇毒山川鬰相望詩筒時往復陵谷復一變翁歸理松菊松菊理未能蒺藜俄困辱余舟傍笠澤訪舊宿西塾夜深屏輿𨽻促膝語心腹春風舊池舘荒煙秋草緑朝廷更化初召役事重穋挈家赴臨濠星言去程速送行愧鄒㳺口占謝龜縮詩去秋復春客來書滿幅念我及兒軰舉室䝉記錄自言多疾戾經年在牀褥欝攸屢驚嚇使我長觳觫尚須手顫定親禮寄篇牘安知厪踰月遽爾聞不禄初疑傳者訛細聞淚盈掬嗟我老異鄉知已失鮑叔蕪辭叙疇曩悲吟甚于哭神交死如生歆此盃中醁荅馬公振見寄燭龍銜日火雲迷飛到中天不肯西安得天瓢瀉凉雨仍看地裂補春泥兵戈不到王官谷煙樹相望罨畫溪莫笑老夫多古意露筋祠廟要君題二經鉏初不效常林安我貧居未死心江上小山堪入畫門前新栁未成隂斷編重緝忘年老險語孤吟到夜深毒熱甚于中宿酒我頭連日為岑岑三頼有酒船堪拍浮何憂蓬髩不禁秋卜隣老圃今𤓰及借榻僧忩喜竹幽老大正當秋近熱微風可奈晚來休能騎欵段來相顧惟爾同鄉馬少㳺次韵寄野舟長老舊雨别來陵谷變新秋又見火流西黄楊樹厄重經閠白藕花開不染泥千古長洲連茂苑一湖香水似曹溪支郎愛馬情還在念我塩車月老題橘隠軒為仲謙作愛爾林居物色幽茅齋橘樹對滄洲添修太史木奴傳合比列仙松子逰氷雪杯香蘇井水霜風簾捲洞庭秋小山叢桂遥相似只恐招賢總未休}
