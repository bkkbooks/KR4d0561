  - {type: line-break, offset: 0, content: '', id: KR4d0561_SBCK_004-1a01}
  - {type: variant, offset: 0, length: 1490, content: 龜巢藁卷之四詩楊縣丞董役開白茅河晝夜辛勤以詩代簡畚鍤如雲穿白渠客来喜得問何如行庖只飲婁江水俸米頻供擔石儲人起四夷燒蠟燭霜飛兩袖坐藍輿􅎋勤左轄銀瓶酒為報功成有薦書劉旭齋過婁江客舍作詩贈之方欲題詩寄草堂逺勞移櫂到滄浪十年同飲三江水一笑相看両鬂霜田野無人鵶種麥漕渠通海蟹輸芒馮君莫語悲秋事且復持盃送夕陽玉田喪側室作詩悼之予亦次韵以慰其哀目斷琴臺日暮雲相如無復見文君最憐機上廻文巧更憶燈前教子勤繡箧熊丸香尚在綺􅑵鵉鏡影初分江村一月黄梅雨誰爲衣篝爇寳薰五叢涇送玉田徙碧山與龜巢鄰居傾葢雨両月同客天一方君今挈家去宅我龜巢傍為聞碧山好宛在雲水鄊朝紳多寄寓羣髦富文章將尋鷗鷺盟與我同六藏老婦堪夜績東壁分餘光客至亦可留覔酒過短墻巷無車馬塵屋有汗竹香籯金與床笏笑視俱亡羊惟存廣文氊讀書坐藜床閉門樂吾樂𬞞食猶膏粱清風北􅑵下懐哉古羲皇寄鎦景儀先生杏花春雨晴時别蒲栁秋風又颯然笳鼓新城嚴警邏溪山幽舘喜安便校書還照青藜火煮茗應㪺錫谷泉近遇故交聞有信逺勞埀問念無氊龜巢仍寓黄天蕩鼃竈今連白水田自分犁鉏聊卒歲可堪兵革更飢年家居食指一百廿斗米緡錢八九千瑣瑣旅懐言莫盡知君憐我似䕫蚿寄顔悦堂長老及崑山州學諸士友薦嚴永懐二方丈雙徑歸来舊竹邉林風磵月兩依然崑山恃立烟塵外婁水東流渤澥連坐有故人應念我客無此老共逃禪南能北秀煩傳語秋晚相過飲菊泉杜子才掾史擕詩見訪次韵一首白首無機心江鷗最憐我復有新相知時来與間坐一凉初過雨七月正流火先鞭君巳着短鍤我方荷壮君早騰騫老我常轗軻鄰君幸如此𢾗日何不可茅茨湖上居菱芡水中果後㑹期碧山合歡呼白墮更邀詩酒侣共載書画舸中秋月如晝西溪捩歸柁玉山頋隠君自嘉興答詩詢僕近况且云經禅老亦望一見故復用韵自述簡諸故人𢾗椽茅屋一笻枝萬事無心獨愛詩詩債隔年償未了帶圍連月恐頻移呉田積雨生禾耳笠澤西風斷桞絲眼􅔄故知俱契濶抱琴何䖏覔鍾期次韵答戴麟隠見贈我生無他長耽書竟成癖鬚眉比白雪肝胆如鉄石所頼識前言頃歩不妄適向来走風塵朝不能慮夕行囊既羞澁家累且繁劇随身一破硯百指全仰食驅馳今九載未始一日閒豈不懐故園松菊怡我顏長蛇及封豕出沒咫尺間逢人問親戚野坐荆屡班不見雁足書徒眎刀頭環遥憐金斗城如望玉門関憶昔重九時鄉鄰雞黍約黄花香可愛白酒味不薄東家復西家相邀搃難却負郭有二頃平居得三樂朋逰結詩社時時共吟噱溪澗采蘋蘩春秋奉祀禴㡬廻乗天風欲跨揚州鶴那知一顛沛江湖竟漂泊移家碧山下家具少於車幸均適相逢同念去國賖聚如水上萍散若風中花或琴教河汾或玄授侯芭交情比投漆子弟亦通家詩筒頻往来瞬息經兩稔壯君多志氣將衣買臣錦我志忘功名但就吕公枕三江五湖水共喜魚不淰萸觴了佳節藜床甘且寢春日方遲遲秋霜俄凛凛好客多釀酒願作東林沈寄丁彦誠旌旗滿眼各西東不見桃源我轉蓬兵後即知還舊宅客来曾辱寄詩筒石田種秫梁溪曲茶灶分泉錫谷中最喜西􅣘山色好青霞不染俗塵紅贈沈彦肅典史兼簡王景德空山寒雲白如雪歲晚高軒過岩穴三生石上拂蒼苔一笑梅邉有明月床頭釀得松花酒思與故人傾瓦缶煩君為問王猷子剡舟肯棹同来否旭齋歌次鉄笛先生韵旭先生行年七十餘耽書樂且孺白駒過隙莫可留欲把長繩繫烏兎囊無一錢任羞歰腹有羣經飽撑拄論交貴在見肝胆不學時人口相煦有時醉吟詩其巧猶凢注快若爬背癢十瓜倩仙姬昔賢只讀圯上編便遇君王借前箸先生豈無策可用草廬未有人三頋青山白雲古圖畵床筆茶灶今家具居吳十年食破硯硯田幸喜無租稅秋風籬落霜葉隕枯蔓蕭條繫寒瓠西伯何當獵渭濵載取匪熊後車去次韵題鄒明夀草堂併簡劉旭齋賔主東南羙溪山繞屋廬經鉏百戦後版築十年餘木落西風急􅑵鳴夜雨踈侁侁二三子燈火案頭書答楊献可見贈憶爾梁鴻山下宅園池不減李文饒一朝猛雨鶯花去十載東風燕麥揺客裡相逢聊慰藉樽前一笑共歌謡君歸不負青山約好似誰南早見招, WYG: ''}
