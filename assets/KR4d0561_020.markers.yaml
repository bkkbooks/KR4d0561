  - {type: variant, offset: 5443, length: 16405, content: 景先文近年耆英晨星霜木婁人視公崑山片玉公之為人生有噐局遭時迍邅如玉韞匱搢紳之文㒺不刮目公之處家仰事俯育陸賈之槖兒女均蓄彼徑此緯同一机軸公之居鄉春風穆穆凡與之逰惟善是朂烈髙風遐迩咸服于我姻黨眷義尤篤念無後人墜緒誰續以孫贅居我女䝉福哀我親䘮觸暑匍匐弔之唁之沃酬之辱比予之謝留連欵曲别方兩旬書徃而復豈意公亾疾不徑宿予聞訃音哀淚盈掬奈役于官如薪􅊜束送不執紼罪奚可贖公或我知矜我碌碌束芻之奠鍳此心曲祭大雲講主文師之髙年七十有九以湼槃而論之復傷之何有人之所以哀我師者我知之矣一大藏敎淹貫胸中如魯靈光天台之宗今也砥柱摧折隤波洶洶同𫀆之士其誰適從三周七喻化導羣迷随所住䖏桃李成蹊今也野狐長嘷彌天蒺藜信從之衆疇将依歸吾黨固嘗有月旦之評曰善與人交僧中之晏嬰也度不可量方外之黄生也其愛客則孔融而衣緇其滑稽則方朔而釋名也觀其詩則見其心之平淡而無牛鬼蛇神之怪觀其畵則知其興之清逸而出乎山􅈨水仙之外若是者豈非大雄氏所謂無罣碍者乎抑亦所謂得㳺戯三昧者乎是則吾党平昔之所敬愛而今日之所以為誄也彼千駟萬鍾而死者欲使吾黨賛一詞而不可得而况為之沃酹乎言采絲蒓淞江之曲懐㢤若人薦此寒渌祭柴處士文近年耆英晨星落落剗刓為方誰其矩矱惟公渾厚不琱不鎸如玉在璞如珠在淵寄跡隴畮絶意圭組為龎徳公不入城府以善為楽襟抱生春為馬少逰鄉稱善人髙堂眉案如賔如友梁鴻孟光無此白首幹蠱有子三鳳翩翩源㴱流衍理固宜然昔我先君㴱敬於公所以敬者古人之風先君云亾公来慟哭弔死問生重禮之辱由兹而来陵谷變遷干戈所至流血成川公之居安其福孔厚年過七十亶為希有予聞訃音義合匍匐吏呼石壕去不可得言采溪蘋薦此一觴公其鍳之我泗沾裳代柴子祭父文父生三子女亦如之長飬婚嫁恩義維均以恭出贅愛念尤篤定省雖踈音問不絶每歸侍旁奉親飲食分甘食之親同穉孺豈惟食之誨言諄諄惟惧孱弱弗克樹立撫恤諸孫欣欣色康兒所喜者親在健飲兵戈擾攘十五六年幸無險波以及我親㣲痾月餘靡神弗宗恭役于官如墮膠􅃮間嘗請吿歸侍湯薬父曰亟去公家事數兒能了官父心乃安别方數日聞病小愈豈其淹忽永訣終天風木之悲尚何忍言嗚呼哀㢤我親之死人皆哀之姻戚之哀思親義也鄉鄰朋舊哀善人也我兄我姊我妻我孥其痛如荼五内崩裂㒺極之恩奈弗克報所不敢忘各慎其身黽勉成之無忝所生尚頼遺澤垂𥙿後人祭蕭處士文蘭陵望族竹帛著稱髙年過于伏生儉徳同于晏嬰自罹䘮亂多遘迍邅萬死一生脱性命于虎口三吳百粤寄身跡於狼烟覩姑蘇之麋鹿重逰念北山之猿鶴相望言歸故里欲正首邱頋親故鮮有子遺喜父子獨能無恙安居未㡬怪事忽生呌閽救無辜之孫霜飛六月奉命復慗遺之老風動四方葢埋劍之氣冲于斗牛故覆盆之光照于日月遂尔貽謀之念灼然隂隲之符骨肉聚于目前滫􅔱供于膝下得正斃而全四體應含笑而赴九原蹇予劣材荷公知已自青年而䝉舘榖至白首無異金蘭又如王趙之交亦有陳雷之義今皆巳矣可不痛㢤老淚淋浪持束芻以效孺子儀容彷彿撫絲桐而呼彦光即此㣲忱伏惟尚饗代祭錢鼎卿文吳越世家焜煌史册公為雲礽蔓延遺澤昔在妙年青雲氣格弗屑於時丘園自適風流文采聲亦藉藉晚罹兵燹稍渉艱戹三江五湖浮家泛宅歸帆無恙佳兒連璧廼疆廼理薙乃榛棘莵裘鶴渚谿流環碧公其優游素願斯獲邀朋呼酒看花岸幘賔明徃来冠葢絡繹滫􅔱之供子盡厥職自春徂冬頗湏薬石厥足蹣跚心仍夷懌所懌者子服勤無斁宜其泰然瞑目中夕頋惟厶等攸居咫尺匪親伊故心皆莫逆今也云亾如失肘腋緬懐徳容傷心如刺鄉飲之歡無復共席薄言采藻薦此窀穸惟公鍳之有如平昔又代兩甥及甥婿作昔人有言見舅如母此葢由親親而推之乃常情之所有如我舅翁其親愛於甥及甥女之夫者尤恩㴱而義厚厥恩維何煦濡撫摩眎弱孱而為扶植者支一木于㡬傾之厦屹砥柱于頽波厥義維何切磋刮劘念昏愚而為牖之者鑿渾沌之七竅投阿膠于濁河然則翁之為舅氏而愛其甥者視餘人為何如嗚呼痛㢤軟脚之疾醫云無傷謂翁健飯全愈可望如厶等朝夕承奉于埋固當奈公私之服役磨旋蟻之犇忙故不得服役于左右􅋵几而執床又安知一夕甘寝而遂亾耶嗚呼痛㢤聞訃而疑蒲伏救之救不可得徒哭而悲念生平之恩義雖欲報而無期一酧永訣涕泗沾衣武進縣學起講堂祝文維洪武五年四月二十日丁酉常州府武進縣承務郎知縣董厶從仕郎縣丞陳厶将士郎主簿尹厶謹以釋菜之奠敢昭吿于大成至聖文宣王曰夫學以明倫尚矣凡為學宫必先乎講習之地使學者登降揖譲咸有儀度朝斯夕斯以明人倫之道斯堂之所以亟其成也而厶等共勉厥職以副朝家興學之意尚惟神聖於斯文有以相之縣學諸生祭陶兄文天道何茫茫耶跖暴而夀顔仁而天蘭摧桂折樗檪合抱是皆必有其説蹇余昩而莫之暁耳吾友陶兄如玉在璞鍾厥愛于雙親求良工而雕琢既賣金以買書復徙居而近學惟吾兄心父母之心故能孜孜厥修類如麟之角也吾党碌碌辱交連年竊隣燭之餘光亦效顰而勉旃方期吾兄馳騁乎詩書之林游泳乎道義之淵又安知車方駕而覆轍弓始張而㫁弦也耶嗟㢤彼蒼誰薄誰厚賦命不齊吾将誰咎惟没世而有稱斯可謂不朽彼區區與草木同腐者雖龜鶴之年而亦何足取㢤嗟嗟友兄其止于斯其心孔哀其友亦悲一慟永訣漬綿以詞武進縣學移先聖祝文廟貌之設人所具瞻所以尊聖賢寓祗敬也棟宇朽腐惧将壓焉不敬不尊責何可逃今将一殿兩廡撤而新之汛埽鮎堂舁置神像聖靈洋洋無適不存具瞻之敬葢自若也工僝事集神其相之祭胡秀才文公之父兄為我友朋公之子孫吾與師生公嘗以父執遇我謙謙乎奉承翼翼乎将迎席必置醴途不並行我歩我趋視為規䋲然吾亦愛之重之與之語言未嘗不肝胆相傾也嗚呼人孰無死有未死之前為子係者或不能如親之志親没之後或墜其基業是皆不能無憾于幽明也惟公不然孝友之行父兄素稱曰子曰孫起廢兩具别第新築良田歲登可以供粢盛奉輸征恤孤㷀鄉里稱少㳺之善犁鉏帯常林之經死而有知豈不含笑于九原子嗚呼昔我與公俱避甲兵公亾我存無復合併每想見之于墻見之於羔今也以一勺之行潦表四世之交情睇彼吳東逰魂杳㝠我将假巫陽之詞以招之曰太湖之隂風濤震驚魂兮来歸歸我毘陵父兄之坵隴相望子孫之箕裘遹成念此土桐鄉之愛念老夫束芻之誠魂兮来歸天風冷冷祭朱黄二友文嗚呼兩駒並駕兮同一蹷兩輪並進弓成覆轍秋氣肅以戕物兮羗蘭摧而挂折鳬鶴㫁而可悲兮何短長之足説嗚呼天乎祭徑山長老顔悦堂文福慧俱足惟佛稱首能具而㣲世亦希有如吾悦翁是希有者徳尊一代聲溢藂社早被殊渥著金伽黎所在説法四衆皈依晚坐南屏雷鳴鐘皷雨華西湖魚龍起舞丞相授經化伏羣魔凌霄絶頂砥柱頽波慧以知㡬福以歸休崑岡之陽為師莵裘師方退藏陵谷変改兀如嬾融得大自在我昔避兵識師東林忘形儒墨結交以心時有旦評師稱孝禅吾其敬之僧中子騫九流百家問無不知吾其愛之僧中子期師之于予亦敬且愛片言可親如拾珠貝我歸故鄉師贐其别歲時音問徃来不絶前年孟冬丈室信宿白雪陽春𢋫和舊曲寂㓕樂矣師固云然故我思故交中心悁悁擷茗陽羡㪺泉錫山詞以抒情塔鈴吾言夫祭妻文嗚呼誰無夫婦琴瑟相友惟汝與我憂患白首粤自世變家燬于兵扶老携㓜蝶血交征具區之山龍馬留跡羝觸肉籬㡬中鋒鏑載歸故邑遭歲薦飢裙無完布釵遺折蓍而于舅姑菽水朝夕生事死葬與我僇力𤇺烟滿眼人皆岻巇頼而内助非義不為我檐耒耜而躬井臼長育二雏庶亦肯構所居三徙非效孟母全身逺害以避豺虎内外服勤乃成此堂舁疾来居庶安且吉而飲而食而言琅琅辭絶而逝悲風滿室六十四年不失婦道雖逢百罹卒獲夀考嗟我父子痛心如割骨肉恩愛祭此契濶歲時烝嘗誰為薦羞我暑誰葛我寒誰裘風雨孤燈室與誰處齊眉之案誰為重舉宅兆斯卜祔而姑嫜一酧永訣我淚其滂兩祖祝文維洪武九年歲在丙辰七月𥘉四日不孝曾孫厶等敢昭告于厶官之靈伏念厶兒子木不幸逢豸冠之怒無辜屯鳳陽之田骨肉生離肝腸痛割以卑悃陳詞于烏府䝉大臣請命于丹墀欽承釋放之恩幸獲来歸之喜雖風憲紀綱公道之力卓然行之非天地祖宗隂隲之靈何以得此天無以報祖何可忘謹以𬞞菓酒饌之儀用陳菲薦謹告考妣祝文伏念厶兒子木屯田臨濠如落䧟阱而厶原其罪状揆諸刑書為父者有可救之理于是扶􅉵觸熱赴臺陳訴幸而臺官垂憐轉而上聞玉音俞允放歸養親此恩固不敢忘也然厶思之苟非早歲䝉父母教訓之力則暗于義理昧於法律視其子可援而不能奮身以為之則為父之道有所未盡今也頼親訓于昔年脱子難于今日恩其可忘乎况乎上之人所以矜恤所以釋放使得仰事俛育而骨肉完聚者非天與祖宗有以相之不能也嗚呼天無以報矣豺獺之敬聊表於親至如父子受辱有玷先世其出于不幸而非係乎不義而致者惟天惟祖宗尚或宥之外舅姑祝文伏念厶兒子木比遭禍而屯田今䝉恩而歸里親戚骨肉重獲團栾其為外祖父母者死而有知其必哀憐眷頋而隂相之也推情揆理義不能忘三兄祝文惟吾長兄有幹蠱之才而不得其夀由是而家人失節門祚陵替幽㝠之中不能無憾也必矣然而幸存一息以嗣烝嘗如木識丁兄必愛之不啻若已子耳頃罹竒禍屯種濠梁豈不爲之悲愍哉今䝉國恩歸奉菽水又豈不爲之隂祐乎生而孝友死必不殊區區哀思詞莫能既惟吾三兄㴱嗜佛學早絶伉􅓻誓不與同室而生同穴而死也早育二子長令出贅㓜爲沙門兄則超然自謂在家出家矣避兵之日緇流與俱杳不知其所終此固兄之素願也然而厶佩服儒訓雅愛人倫念同氣不宜冺絶命子林以奉烝嘗今以木屯田而歸如獲再生如脱鼎鑊吾兄以佛之心為心亦必為之慈悲也惟吾四兄未壮而克家将娶而即世父母悲悼終身不忘諒吾兄于父母之子若孫亦不忘也如木者幸脱屯種故歸耕故壠以飬其親以畜其妻子兄之喜為何如㢤兄無後命吾子森嗣之以承祭祀尚期垂𥙿使得與木等鼎峙而峙立也姊及姊夫祭文嗚呼賢姊之生愛弟㴱至視弟之子已子無異木之屯田姊必憂恚今令還家必喜而慰閔予暮年遭時不利父子汚辱有玷先世所自釋者中心無愧㣲姊復生孰語于是嗟而子孫俱死疫癘歲時禴甞頼女承繼我今摧頽百事俱廢念姊之心獨爾弗替姊夫善人義同昆季庶㡬来格鍳此㣲意代祭母舅文昔人有言見舅如母今吾不見舅氏者閲四五年又何異別吾親之乆乎瞻彼陽山追懐乱離脱萬死于虎口幸重逢于盛世然而陵谷变遷各天一方舅甥之情惟天其知遭險人之排䧟茗参商而東西方鴻飛于魚網奮病翮而来歸聞舅疾而徃問渉雨露之塗泥承訃音于中道乃蒲伏而星馳顛崖之苦蒺藜之悲皆不能與舅氏細數而陳之釋此憾者将何時耶言采溪蘋薦此泂酌哀歌渭陽涕淚交落知乎不知神在㝠漠代任仲文祭妻祖文翁於女孫親愛所鍾愛及其夫情亦與同既玉其成加以磨礱藻雖不才感恩之隆服勤左右黽勉厥躬歡然菽水庭幃春融金澤之濵瓢湖之東居凡三徙天風轉篷今年夏秋巨浸如洚賦歛之蛇毒于射工避地蘭陵請謀吾翁去危就安翁樂其從瞻彼横山滄海駐蓬将營莵裘一畝之宫月有旬日徃来憧憧豈其㣲疾薬石㒺功我方抱持滫瀡之供語音未絶瞑目而終嗟我夫婦遭罹禍凶倚若㤗山山頽倚空頼有大母同此哀恫棺以黄楊衣衾重重忍兹永訣涕泗沾胸三寵而醊以冩愚衷祭朱仲起文生於吳東殁于西州七十四年陶朱之疇其生也有一㕓而弗處樂浮家以優㳺有二子而離居各專力于箕裘其殁也繼室厚衣衾之具過百倍于黔婁女孫得藁砧之良㐮大事而能周視世之生不聊生死不得其死者逈乎其不侔又何憾首邱之正與否耶厶等或忝㣲姻㑹晤無㡬或傾葢于東洲之濵或結隣于横山之阯聞哭聲而蒲伏徒徃救而弗起兎死狐悲矧吾人耳一觴敬酧用歌蒿里代楊彦澤祭妻祖文昔在童丱聞翁厚徳邑之名門視為矜式遭時變故挈家中吳人多覆轍翁行坦途陶朱之装㒺有遺失食指百餘乃保終吉陵谷既遷言歸故邱橋梓相湏聿成莵裘非徳之積曷云能爾隂隲自天灼見斯理如厶不才誤䝉采菲以孫妻之撫愛莫比每至甥舘誨言諄諄俯育之徳盎然如春及翁卧疴或輟或作徃来問安眷頋如昨七十八年如旦而莫視諸夭閼寔有餘祐所可悲者永别終天女孫歸寕誰其眷憐厶于羔墻思亦㒺極薦此溪蘋凍淚沾臆祭鄒忠公墓文公逰程門㳺楊比肩慎獨之學首得其傳孝于事親如曽如騫移孝為忠厥徳兼全𥙷衮之闕蒲伏涕漣數惇六罪羣邪凛然奈何城狐威福得專推落䧟阱炎風瘴烟忤物固爾精誠動天遐陬峻嶺感應有泉處困而亨斯文䆒研既釋論孟復觧韋編羲文姬孔羔墻見焉蔽日雲開暫脱迍邅再寵再辱愈磨愈堅明月之珠霾光九淵鳳穴有雏赤霄翩翩暴白先志誣衊悉蠲徳薰晋鄙垂四百年顯忠有祠奉甞有田由宋而元有司豆籩度守是邦追慕昔賢詢諸遺黎知公故阡増土鬣封起碑之顛樵牧有禁溪山連延何以奠之秋菊寒泉仰止髙風服膺拳拳尚饗代曹子夀祭陳氏親母文惟靈生衣冠之茂族作佳配于頴川相夫子以無違寔四徳之兼全出鳳雏于丹穴昭采翮之翩翩熊丸之教有法掌珠之愛弗偏予是以有東床之選葢亦慕北堂之賢方鳯占之叶吉結朱陳之姻㜕何飄風之不情折萱花于歘然葭莩黯乎其失色朝露若為之涕漣念九泉之永訣酒三寵于柩前靈洋洋其如在鍳此意之勤拳代陳煥章祭母文嗚呼三子早孤皇皇疇依頼有慈親恩斯勤斯非徒飬之而又有以敎之視我三子掌珠之惜遭時艱危基業蕩析萬死一生幸逃鋒鏑徙兹滆濵苟焉休息其不滿于吾親之心者一子一孫介胄而殁居侍旁者但供其菽水習史業者常離于朝夕每勞乎倚門之望鮮能遂板輿之適所幸時康方安厥居孰謂㣲疾遽然云殂方巫醫之並用竟永棄其諸孤嗚呼痛㢤而今而後雖日用三牲之飬而我親無復為之娯矣一抔之土無復窆于吳矣徒感傷于風木愧返哺之慈烏奉觴永訣肝腸若刳代祭陳母文生長勾吳秀鍾林屋有林下風四徳之淑随世变遷家此溪曲鄉稱姆儀嶶音馥郁熊丸教子峙若鼎足伯為督家仲則戎服季也刀筆搢紳刮目甘軟之供如食厚禄斑衣諸子森如立竹春藹慈闈家用雍睦夀踰稀年殁有餘福季歸自公撫棺慟哭烏烏之情悲乃風木里不卷歌弔者接躅厶等姆儀之敬義當蒲伏言采溪毛薦此􅌬醁肹蠁有靈眎同芻束又代李一泉等作孟母以㫁机教子成其子爲亞聖陶母以剪髪待賔致其子有大名世之爲人母者苟能有其遺風則其子亦必有可稱者矣若吾陳母其遺風伊何敎子之功不鮮待賔之礼亦多昭㢤彼蒼降福洋洋八十指子孫之盛七十三夀考之長東隣西舍愛同六親簞食豆羔饗如八珍爲一境之母儀誠四徳之淑人倐尔云殁孰不酸辛時無張林孰徳弗碑劉向不作立傳者誰我酹此巵我陳此辞亦庶乎薤露之悲彤管之貽也欤祭萬氏子文人與萬物一氣所鍾何乾坤之爲父母有賦予之不同顔路之子聖師之賢胡不永其年耶桞季之兄凶熖赫烈胡不使短折耶美牛山之木而厄于牛羊戕于斧斤彼樗檪之不才乃夀而輪囷故梟囚鳳刖足麒麟若吾甥之淳朴孝敬而夭者皆莫曉乎混淪厶等忍痛雪涕敢一問乎大鈞天雖不言聞必酸辛持杯酒以弔窮泉之幽魂亦以慰髙堂之老親親乎親乎慎勿為卜商氏之喪明徒貽誚于聖人嗚呼彼蒼聞乎不聞祭沈氏女文維洪武十二年十一月𥘉八日老姨公携其子以酒肉祭于姨孫女沈氏之靈曰汝之父與吾子為弟吾之孫甞中選汝之父之雀屏今也如寳鏡之破于未照玉簮之折于未成嗚呼傷矣㢤吾父子之情傷矣㢤吾父子之情又厶年月日老姨婆與姑娘等以酒果家饌奠于時娘柩前嗚呼痛㢤汝之生也母亾于七歲之𥘉使汝不得蒙其撫養汝之死也父殁于千里之外汝不能與之訣别未笄而善事繼母乆病而不弛女紅是皆可哀可憐而可憾者嗟㢤彼蒼何彭何殤骨肉之悲寓此一觴代任仲文祭外祖文翁于外孫恩徳俱厚三孫之中藻為最㓜惟其㓜也特恐愚陋其愛尤㴱加之訓誘翁自中年無心組綬湖山秋九風月杯酒幽花秀竹蒲石清繆翁于其間婆娑白首陵谷之变干戈日乆危而復安頼天之祐八十八年可謂遐夀為鄉善人其徳亦𢡟甥孫紛然日在左右藻則出贅翁為擇偶桒梓連隂聲聞雞狗犁鉏畎畝復客桐江數月宿留廢禮百端辤莫能䆒比聞訃音痛心如剖匍匐而歸豈云敢後以病莫前徒抱哀疚瓢湖之水難洗厥咎翁其閔之庶或原宥雪涕陳情薦此簞豆為曹元度祭姑夫鄒挂堂文昔魯義姑抱姪遺子恩難兩絶義重如此公篤於親如姑之情撫字其姪同乎所生念厶昆弟稚孺而孤適逢亂離干戈九邱垂涸之鱗䝉激滄波無依之鵲乃栖瓊柯恩以蓄之義以淑之威儀言語教且朂之人皆蒺藜我則祍席居吳吳數年如一朝夕陵谷变遷公還故鄉厶亦里居烜以餘光咄彼青蝇竟涴白璧投界遐荒混淆瓦䃯咸謂貂蝉将出兠鍳天定勝人無悔無尤夫何不弔乃渉重坎訃音之来痛割肝膽丈夫馬草死不頋身唯其骨肉極切悲辛巫陽之招魂其来歸桂子秋風髙堂繐帷知恩㒺酧義蔑以報見公羔墙淚滿懐抱義魯之義姑我姑之夫書以厚俗疇兹董狐祭徐逹卿文徃昔避兵衆依於仁纍纍乎喪家之狗躍躍乎脱網之麕公之視予騶虞麒麟煖蘭湯而濯足下懸榻而重茵舘婦子於别室撫臧獲而所親不以俗有數未而炊者以玉其粒不以時有析骸而㸑者以桂其薪或戚或䟽恩惠俱臻長筵燕集礼意殷勤是故人皆以和氣氤氲喜色津津忘憂于板蕩之秋湛樂于熈臺之春殆若古桃源之避秦也别公數年滄海飛壁干戈阻絶公殁不聞迨歸里而聞之日覊縶于世紛欲一酹橋玄之墓閲數歲而因循窈甞論之世衰俗薄狥利忘義者十之八九公乃磊磊落落猶獨寉之在羣雞然一飯之報吾志弗信抑亦有愧于古人瞻彼膠山如隔雨塵舉匏樽以澆墳上之土頌遺愛而云云酸風撼林嗚呼孔賔為陳以貞祭王母文昔在故里婦徳著稱鍾禮郝法容儀具并暨孀居之一紀羗玉㓗而氷清今居蘭城母儀之懿奉檄有孫盡歡甘㫖奉重闈之慈訓謹􅍾持于胥吏故凡葭莩之親桑梓之供莫不愛之敬之尊仰乎林下之風也楽善之性出乎天賦口不絶西佛之名如渇飲于甘露其心愈慈其法髪半素諸兒女之通家每升堂而拜母起居問安匪朝伊暮方鞠月之下旬捧夀觴于𥘉度安知彼蒼災祥並臻賢孫有鶚書之薦而大母則病入於膏肓巫薬㒺功遽尔云亾正所謂賀者在門弔者在閭變夷懌為䀌傷矣衰絰之孫擗踊哭泣吐令伯之哀衷人皆為之嗚咽不有彤管孰紀髙節采滆浦之寒藻薦郫筒之香雪拭淚陳辤千載之别祭崑山張伯仁文洪武之𥘉傾葢如故買宅買隣日益清頋于時蘇城楼櫓灰飛公脱䧟阱欣然而歸人之所稱百鷙一鶚有猷有為抑强扶弱我所見者厚葬其父故舊不遺保障鄉土數載之交視同懿親爲公所憂里多荆榛縛虎而縦反遭其齧鵂鶹夜啼興妖作孽室雖有繼卒以無嗣播遷臨濠日以毁棄女之嫁者遽失其良而壻承家池魚並殃公在異鄉寸心千里骨肉傷殘痛何可巳一紀之别老我于家每聞竒禍爲公怨嗟蒼天蒼天斯人何辜困厄摧折乃至此乎客来今春謂公䝉恩難兄難弟同歸故園予欲賀之恨臂不飛以詩言情不勝瞻依安知隔歲公巳物故集師書来我淚如雨追念疇昔肝膽相知天各一方徒云坐馳面不復晤魂其可招悲歌些辤酹此一瓢生日祀考妣祝文父母生不肖八十六年矣不肖雖不能為賢人君子為世矜式然未嘗敢為小人之不臧也雖不富不貴不能顯榮其親亦未嘗飢寒失節以辱先也長太平之時則㣲樹其業遭乱離之日而不殱于兵夫妻諧老煖衣飽食蚤眠晏起不憂不慮以安以娯是皆天地之大恩父母之遺澤也䝉天地父母之恩澤其可忘乎其可忘乎所願者子子孫孫中外和睦瓜瓞蔓延荆棘不生使不肖夫婦如是安娯以盡天年不乆床褥全歸天遺體尚頼天地父母之靈有以隂相之始生之日釃酒以吿冬至祀外舅姑祝文嗚呼悲㢤仁而無後斯理之變而又遭世之大遭變也三子八孫靡有噍類所遺之業盡属他人頋為女為婿者耄無能為竟不能為立後人以為似續以承祭祀每一思之慚色而巳扼腕而巳嘆息流涕而巳惟兹一陽薦此蘋藻蘋藻匪薦薦以此心靈之鍳之閔其不能以宥厥辜祭唐親家母文徳為母儀五十九年見而知者㒺不稱賢昔我冡子多幸自天雀屏中選以女􅓻焉主我中饋毫忽㒺愆母教之淑豈容忘筌昔在鄉里絲蘿纏綿今居毘陵同居一㕓姻婭之情益加於先母在床褥乆弗能痊曰女曰壻常侍榻前我来問安飲食流連今也云亾骨肉棄捐為子壻者公務所愆覊旅金陵未能言還女以慈育月輪未圎棺弗能憑縗麻涕漣垂髫末孫其哀亦然我念疇昔淚如迸泉有菲蘋藻供陳几筵靈其如在鍳此惓惓代王仲孚祭表伯母文昔居故里家為比隣綿綿瓜瓞如朱如陳今兹異鄉亦復如舊通家徃還情以日益厚靈以沉痾一載之餘匪朝伊夕俟詢起居若我婦子均䝉眷頋食必分甘骨肉相處孚方馳驅信宿而歸靈乃即世幽明永違匍匐徃救巳不可得陳此薄奠涕淚沾臆祭王君夀文昔在西塾廿有餘年公之父叔坐於講氊愛我敬我如骨肉然公于此時雁行聨翩敬以父執禮意勤拳規行矩歩靡不勉旃厥後一别陵谷變遷公守故邱我落梅邉萬死一生脱身戈鋋我東来歸公喜自悲喜獲再見悲厯艱危冠玉之羙殘為瘡痍楼臺廣居化為茅茨衣不紋綉緼𫀆為宜食忘八珍啜菽如飴樹菊軒堦杖履棲遲幹蠱有子蔚乎孫枝楽事以酒餘皆弗治佳㢤蔗境為鄉白眉我甞鼔琴滆浦之湄連城娄宿細論昔時負笈之孫服受我詩自兹以来别多㑹稀花朝月夕毎有所思去年莫春尺書載馳縁有義事要公共為安知踰月遽然其萎偶出西関路聞葬期彼祖輓者舟欲同移眸子眵昏行且尼之送不執紼奠莫奉巵烈塘之東徬徨涕淚還家數日晝夜忸怩緬維前賢絮酒千里嗟今之人跬歩或弛朋友道喪恬不為恥擷此溪毛陳詞尺𥿄物薄情㴱公必鍳止祭妻文嗚呼悲㢤靈年八十以㣲疾不兩日而亾人皆謂天錫之福子孫滿堂衣衾而歛瘞之髙岡并餘一紀家居楽康既葬而隣里騷然紛捉軍而驚惶使㐮事之日而遇之則悪乎有數百之人祭奠于北堂縞衣而送喪也未㡬而季子森為人謀䧟嫁禍其身我扶􅉵而赴救詣郡邑而具陳刀筆之吏欺天妄人妄移文于崑邑欲玉石之俱焚頼公道之不冺如屈蠖之得伸雪埋而歸父子悲辛以今思之六十年之伉􅓻常居安而欣欣雖世變之秋避兵海濵亦未甞遭此不仁信乎我細君有可福之善䝉隂相于大鈞也耶卒哭之祭遂致目眚死而有知必不我嗔吾知母之慈子必哀憐其遘迍奈何死生幽明之分兒哭之慟我亦沾巾嗚呼悲㢤祭張溝南先生文維洪武十六年月日同郡老友謝蘭謹遣孫塏以清酌庶羞之奠致祭于故心友溝南先生之靈曰嗚呼近年耆英晨星落落公在鄉邦雞羣獨鶴詩三百篇精華咀嚼吐而為文光輝焯焯粤自早歲蜚聲臺閣遭時多艱屡進屡郤歸来故山雲卧一􅊤洪武更化羣髦進趨克嶷有子首應而湏手持直筆追踪董狐如晳有参飬志而娛寳樹遽折悲風呌呼公無怨尤曰命矣夫中郎之女傳業于家丙申莫春郡志有作時我與云同秉筆削甲可乙否語皆良薬别来𢾗載心交如昨愛及吾兒義尤不薄前年過我新秋夜凉中庭夜坐月白如霜劇談千古把酒淋浪興盡而去東方未明去年夏五我兒云亾公為墓銘九原有光弔我唁我喻以大方斗城之別譙門夕陽自冬徂春人多讃揚優㢤㳺㢤新居草堂幽花秀石池島蒼莨不徒玩物世慮俱忘頋我潦倒理宜溘先安知矍鑠乃在我前四月九日訃音忽傳无妄之灾網罹正纒葬不克送酒不漬綿毎一思之淚如迸泉病目昏盲舉歩欲顛塏持瓣香拜于靈筵鮑叔知我鍳此勤惓姪婦祭姨母文昔侍姨母東吳避兵我姑繾綣諸婦奉承及歸桑梓半舍之隔歲時候問眷焉如昔今我娣姒等哭姑之淚未乾而又哭姨母而永違母乎母乎見我姑于地下其能説諸婦之哀思乎溪蘋霜薦此一觴阿翁倀倀作此祭章代常信孚祭親家母文曩予之家幹蠱乏人賢郎贅居䝉飬而姻維時魚軒雲從祁祁繄我婦子獲瞻母儀事雖從權悉如所願舉室歡然親親眷眷去年合巹䝉餽茝蘭愛子及婦恩出肺肝頋予東床每歸問安慈愛之㴱尚䝉垂訓所可喜者起居楽康予甞詣門亦得升堂别来未㡬聞有隐憂豈意成疾竟弗能瘳訃音忽至婦子匍匐泣血呼天救不可得我来柩前奠此束芻區區哀忱靈其鍳之代木森冬至祭母文嗚呼痛㢤每年冬至齋宿祀先母率諸婦供具酒食今也中饋或有缺失誰懇懇而朂之耶每年冬至賀客過門母語諸婦治具迎接今也礼意或有懈怠誰諄諄而命之耶一味之甘誰分諸㓜耶糗餌之属誰饟之鄰里耶是則目擊序而追感者如此至若子孫之有室皆吾母擇配而為之子之婦孫之婦其婦工有未善者皆吾母敎而成之平居之日甘㫖裘葛之奉則吾母弗求其偹温凊定省之礼或有疾則終日終夜木之濠梁屯種森之滕州𬒳刼林之客死新鄭吾母為之廢寝忘食晝夜憂思痛哭㡬致䘮明慈愛之情言莫能盡如此之恩又皆在劬勞㒺極之外今子之死者固不能報其生而存者将以報其萬一耶母兮母兮無復見兮冩此哀衷矢弗諼于逺弓祝亾子文洪武十六年十一月二十一日老父命汝弟森持思賢録一簿置汝靈几酹之酒而祝之曰徃歲板刻辨惑編既成汝甞執書立吾前而言曰不圖今日遂二十年之願欲矣汝于此時喜容可掬吾知吾兒推心父腹繼而摘藁尤喜成速携二書新鄭之行不兩期而瞑目今老父偶逢于知已又為刻思賢之録此汝之所冩者稍撙節其簡牘工數月而就緒吾巳盲其雙目摩挲𥿄夲無復能讀嗚呼誰念其為之不易寳之如玉耶誰為其喜而傳之士友道治丐乎道鄉先生之膏馥耶悲㢤吾兒身不可贖置此書于靈几猶掛劍于宰木頋觸屏之子若孫絃将㫁而復續睹物思人淚沾汗竹代東洲黄氏祭母舅文嗚呼見舅如母念母不忘舅復厭世豈不永傷若吾舅甥世居邑里如鳥同林鷇育棲止版圖之繆牽連伏辜天恩汪􅐮姑緩其罸脱網之魚赬尾發發七里八岡水溢溝澮載欣載奔過我歴塊蒼髪黧面泥土裳衣忘乃劬勞負疚而歸賀者在門退不旋踵弔者之来乃哭而慟如至親洎諸姻婭痛不可忍涕淚交㵼将来休戚無復相知俯􅅹肝胆酹此一巵祭賀彦銘文南華有言曰上夀百歲中夀八十下夀六十一月之間得開口而笑者或四五日而不能及也况遭世之岌岌乎如公之生垂及中夀喬木故家不為不茂遇陵谷之变遷若摧枯而拉朽坐衣冠于塗炭脱性命于虎口元龍之豪氣雖衰丹穴之鳳雏方雊俄陸海之風波沉鉄船而莫救有竹林之小阮尚枝梧于左右五六年憂患之中能一笑如南華所言者亦烏有也嗚呼哀㢤凡我親舊居同里閭困蒺藜于世变之日煦涸轍于濡沫之餘犁鋤乎荆棘之埸屋廬乎瓦礫之區若夔蚿之相憐不戚施而籧篨吉凶慶弔出入起居或叙情于杯酒澆磊落而欷歔今也云亾痛當何如奠椒漿于三寵墮清淚如鮫殊悲風愁雲送乃輭車代陳彦髙祭妺文嗟我先世錫山故鄉曰朱曰陳閥閲相當乃以我妺嬪朱之良為婦而賢孝於姑嫜陵谷一變雲萍四方念我兵餘如龜六藏聿来依稀鄰里分光爾居再遷半舍相望手足之情眷眷相弗忘常念我甥来我渭陽我兒念姑安問亦常焉知㣲疾遽尓云亾朱陳六親㒺不痛傷况予潦倒孤雁遑遑慿棺飲泣奠此壺漿祭妻兄文大哉天之所以爲天兮宰萬物而幽玄雖陵谷而變改兮恒福善而弗愆觀若人之始終兮蒙隂隲于彼蒼避戎馬于勾吳兮渉畏境如康荘聚原鴒以救急兮作歸雁之同行舍故土之荒穢兮樹豊業于暨陽托家政于仲氏弓日娛客以壺觴肆優㳺于桑榆之景兮家有餘慶蹇予早歲有室兮得名門之女弟頼昆季之眷頋兮于今四歲紀睠小阮亦僥倖弓辱妻以其弟之子悵東西之相望兮多契濶而㑹少比問安而抵家兮喜棣蕚之俱好孰謂别無兩月弓聞訃音而絶倒慘予室中之人兮姑與姪其同悲徒匍匐而莫救兮淚滂沱而沾衣奠椒漿而永别兮叙生平而陳詞除服祭母文二月十四為兒子木等作齊衰母服也三年之䘮猶卒哭而再祥禫而除其服者古之制也然劬勞重㤙㒺克有報孝思之心有不能随服而除者也於是撤靈幃于斯寝奉神主于祠堂歲時烝嘗寓不忘之意也不忘者何敬與愛也凡吾親之所敬者敬之所愛者愛之則親之死猶無死也苟忘其親則親之故舊或䟽如途人親之子孫交悪為仇敵也以若所為是不孝也觀夫孝之至者通神明不孝者必獲戾于神也過庭之訓諄諄有年勉而行之請質諸母之靈也矢心陳詞終身戒也遷祖考神主祝文嘗聞祠堂之制當設四龕以祝四世之親不肖㓜年在父兄之側失記髙祖考官稱髙祖妣姓氏故曩于兵後重立神主由曽祖及禰而巳虚設第一龕于兹數載今因亾妻終喪其子木等奉母主入祠敢請遷曽祖居第一龕曰祖曰禰從而遷之以第四龕安奉其母任氏候應芳之殁然後改題髙曽祖禰稱號也不肖違失禮制不能無罪惟尊靈恕之寒食祭曽祖墓祝文素頼先世徳澤未冺瓜瓞遺蔓幸繼烝嘗時維禁烟随俗展墓匪云報本庶不敢忘伏惟尚饗祭祖禰墓祝文墓祭非古也以應芳不肖不克歸里不能以時省掃常愧于心每念寒食展拜墓下豺獺之意庶㡬萬一常兾先澤垂𥙿後人有永弗替墓祭母弟祝文寒食墓祭雖狥俗禮為子孫者哀墓省掃亦庶㡬豺獺報之意焉惟慈母賢弟魂魄有靈必䝉歆格墓祭先兄祝文父母遺體夲有三兄仲兄避世不知所終伯兄季兄並窆于此時維寒食祭掃荒邱手足之情庶乎不忘娶孫婦祭祖祝文維洪武十八年歲次乙丑三月𥘉四日乙丑孝曽孫應芳等以孫男塤于𥘉五日丙寅吉辰娶夲縣安豊南鄉吕氏女為妻敢招告于厶官曰娶婦三月而廟見者古婚禮也近代之制以日代月各有義焉應芳輙敢參酌古今從宜從俗儗於翼日親迎婦𥘉入門先當拜謁先丗以見不敢忘本之意然後祗見舅姑及詣姻眷自兹以徃庶得奉承宗祀蔓延嗣續尚頼遺澤垂𥙿弗替謹以清羞酌庶羞前期祗薦謹告祭徐仲清文嗚呼九流百家玉石混錯公隐于醫常之一鶚黄岐之書孰云不知公得其要探玄索㣲如古兵法時用出竒博議宏辨吐屑霏霏蜚英早年鄉評衆推紫燕厯塊非駘可希遭時艱危挈家勾吳薬石之靈孚及豚魚長蛇當路報亦銜珠以之事親厚飬為娛春風杏林名聲載途所不忘者首邱如狐大明開天四海一家父母之邦青氊故廬徵車聿至乃赴清都醫國之忠老莫能輸謁告而還子孫怡懌蜂房合户哺雀羣烏混迹市塵懸我薬壺衞生之仁施于州閭佳㢤蔗境餘人所無衣冠敬共鬚眉皓如應芳沗交四世于此公有佳兒愛我中子同業於儒同出而仕惟命不由一生一死公恤其孤與諸孫齒誘掖激昂誨言提耳老我墻東相望咫尺頻年喪明跬歩千里時䝉問信或餽薬餌心親迹踈匪負知己今公榼棺事皆定矣我末能然望風長喟束芻授孫徃奠靈几玉雪之姿羔墻宛尔載歌薤露商飈歘起願言從逰脱屣滓泥存順没寕庶㡬無愧遷葬三兄祝文元厯垂盡時盗之槌頷珠㫁臂釧無處無之嗟我三兄荒郊廢塚雖有後人漫不省視與無人同薪者芻者爲樵牧埸而犁鉏者日侵月削又将爲禾黍區矣應芳以同氣之迹是可忍乎今重製二凾遷瘞祖壟東南隅以祔大父母父母及諸父之側並封如前䕃以竹木歲時洒飯庶得享而侑食焉惟兄有靈安兹幽宅諸親友祭曹子夀文古之人有言兎死狐悲物傷其類况人爲物靈居同里閭有瓜葛之親朋友之義者乎又况子夀之為人善與人交而有春風和氣者呼居常徃来杯酒為禮或有時而合歡雪襟懐之凝滯奈何轑釡之聲瓶罍之恥徃徃鮮克遂其意也欷歔忼慨音猶在耳一月之餘痿而弗起属纊未定而榼棺訃音裁至而發靷東方載明虆梩亟奄于横山之趾凡我親朋惆悵而巳其為骨肉至親者又何忍而至于若是耶溪毛泂酌亟奠靈几遂成永違䫙而有泚祭唐仲傑文公之子吾子之門弟子也吾之孫公以小友呼之過愛而忘其齒也垣雖失怙如飲食數載慶弔吉凶且能惓惓乎盡其禮也今公之没胥靡也㢤古人月明千里再歌些調魂弓歸只寓永傷于匏樽一酹乎落花流水祭劉徳祥親家文人皆謂公有通濟之才設施之方且識見之長何終始之乖張吾甞比公為江河之舟視舶而㣲非葦而抗能重載而逺適可周流于四方或長河順流懸帆巨檣一日千里快若飛黄或大江水逆石尤風狂釘石系䌫随波低昂或脱難於盤渦或經險于吕梁或候潮而逗遛或阻水而徬徨安知一夕怒濤舂撞盲飈簸揚遂顛覆于鮫鱓之鄉嗚呼哀㢤六十四年安危變遷以資禀之髙明知有命之在天不尤不怨處之㤗然鄉之旦評前後可甄有可稱于後者何異乎青史之傳嗚呼哀㢤如厶者昔在東関隣比相依承公以鍾愛之女為吾孫阿塏之妻雖别多而會少獲通家而徃来每黄耳之有信知告老而有期儗祖孫之同迓呼麯生以洗泥訃音忽至招魂来歸塏也哭婦翁于四千里之外奈此願之乖違兩兒扶持奠此一巵文以抒瓜葛之情詩以冩薤露之悲公知不知我泗沾衣生日祀先祝文厶之生斯世也九十一年每念劬勞㒺克有報也然視不明聼不聪而猶有可覩之物可聞之聲肢體雖頽猶能杖而行几而坐也方寸之天不蔽于私義理昭著而能燭物是皆生我敎我者之大恩也先世之恩雖不能報寔末忘乎心也况夫左右服勞飲食裘葛内外有人老老㓜㓜頗知義方非祖考垂𥙿之力焉能得如是之楽也自今以徃天年未盡喘息未絶皆感戴之日也家饋殽羞先用祭享亦庶乎豺獺之報本也欤代席彦適祭徐子思文旦必有暮死生奈何或玉関之不入或薤露之有歌或馬草褁于異域或魚腹葬于泪羅是皆卓犖之士去鄉井捐首邱而忘其考槃之阿也今公之没類乎古人論公平昔良可悲辛其家居也克肖而翁持身以儉約勤苦待人以和氣春風其戸役也覊縻長安夢方㝷于失鹿事乃畢于葢棺嗚呼三子䁀峙峙乃公餗銜哀服勤惟恐顛覆雖匍匐而莫救望鍾山而慟哭東床佳婿淚亦盈掬如厶既忝姻婭且居鄉曲愲愲乎叶力同心董征輸之萬斛覩丹旐之来歸極感愴于心目蓉湖采蘋薦此􅌬醁武進縣學立先賢祠祭文昔之人以鄭公之賢而名其鄉以荀淑之子而里名髙陽葢地因人勝使山川人物皆爲之有光今夫三先生之産兹邑也道學之傳淵源二程發揮道妙有功遺經劾當國以滔天之罪而貝錦乃成諌至尊以正始之道而逆鱗敢攖觀夫感應之泉醉客之語則忠義之至通乎神明若夫由大魁而演綸參大政而憂國者位雖不同同乎一誠輔崇寕之𥘉政知秦蔡之非賢俄梁木之俱壊徒流芳于汗青量皆可以為天下之師表百世之儀型豈特為鄉里之榮㢤厶等叨䝉國恩社民之寄以先生祠諸學宫是亦祭于社之遺意詵詵諸生駿奔粢盛如将見之於墙於羔沾徳薰于晋鄙何以異乎師承我将見金鍾之䜟復靈劍之文聿興謝荘曽祖墓清明祝文厶嘗聞先世開封渡江蕃盛東西謝荘地因人姓三百年来陵谷變遷自髙而上故隴茫然睠兹哀邱鬰鬰如許即彼强侵為外禦侮非松非楸幽篁翳之弗樵弗牧周垣衞之寒食清明聿来省掃追逺者心妥此蘩藻尚享新河口祖墓祝文邱墓之祭禮無所考然俗礼以清明祭掃其来尚矣苟于此以盡其誠亦庶乎豺獺報夲之意幽明雖殊有感斯應所謂洋洋如在者将見諸羔墙見諸堂封斧封馬鬛封也厶等雖不肖尚期垂𥙿以衍餘澤繼述弗替尚享先考忌日祝文父母之恩人皆㒺極惟我父之鍾愛于某也既生之又能擇師而教之使日就琢磨黽勉樹立雖不克奮馳驅取青紫以華其身以顯其親以澤其後人然此身頼訓育之力不姦不邪不淪胥于俗陋之習於先世無甚忝辱子若孫則矯枉就正識之無于農圃之間我則杖履所至晏然棲息無飢無憂是皆吾親之遺澤未冺也此恩此徳之死不忘惟兹忌辰祗陳泂酌以鳴其感悰恭請顯妣石人氏安人同賜假享謹告代丁學古祀先文奉先思孝聖賢之訓甚明事死如生祖考之靈可格焚香代鬰鬯之灌秉燭為庭燎之光雖無鐘皷鏗鏘惟是豆籩奔走志意追思于齋戒客儀如見之羔墻蘋蘩蕰藻之菜靈筵可薦参苓薑桂之物相籠親傳谷陵兩變于當年城郭一㕓于今日如䋲祖武勉讀父書豚魚或昩于交孚時加修省豺獺粗知于報夲歲奉烝甞伏願濯濯厥靈洋洋如在灾不生禍不作正頼乎厦屋帡幪居之安資之㴱何異乎門閭髙大根㴱蒂固地乆天長𥘉進酒生不封侯賜酒泉無人死作酒中仙一杯𥘉進葡蔔醁且喜家庭有象賢苾苾芬芬一豆羔丹衷寸許若葵傾我宗我祖應歡喜自惜厨無轑釜聲再進酒饌銀燭生花再舉觴滿堂渾是鬰金香愁多莫問人間世年少多為地下郎不識駝峰翠釜烹羔名錦帯亦虚稱一杯骨董如芹献五味調和意盡誠三進酒饌孤兒碌碌混泥塵華胄遥遥出搢紳百拜勉循三献禮一年祗薦四時新廟堂調鼎用塩梅四海蒼生笑口開我手幸無窮鬼捩折旋三献奉羔盃進饅頭籠餅炊来玉屑香貽牟喜得歲豊穰賢如脱粟晏平仲應笑縮葱侯侍郎送靈致語切以欲表孝忱勉循俗禮焚楮錢以代幣意在殷勤酹桂酒以送靈魂歸寥廓下情不勝感愴之至代祭曹子毅大使文萬物之靈莫靈于人然人所以異于物者秉彛方寸之天不私而公不偽而真也惟靈身無毁傷不辱其親口無萋斐亦近乎仁不汲汲于肥家不戚戚于謀身西園鬻爵乗時取名東陵種瓜避時辤榮是皆過不吝改而復其天真至若愛女而嫁不贅婿而效秦視其弟之子猶子意終老以歡欣非明理而能之乎彼昧於理而不能然者寕不泚䫙于泉下貽誚于鄉鄰厶等親舊交接敬恭相承悵幽㝠之永别感涕泗而欷歔輭車發靷奠此束芻子祭父文代犇牛陳明逺兄弟作哀哀父母生我劬勞欲報之徳昊天㒺極此尼山聖人删詩三百存此言爲萬世之訓也凡爲人子者親親之心其可忘耶况厶厶之痛親尤有甚于常人者元暦之末兵戈數年委棄桒梓流離異鄉其生也不能盡菽水之歡其没也不能永宅兆之安陵谷之變邱壟之失仰愧俛怍無可奈何于兹又隔一宇宙矣今也倣昔人衣冠之塟塟以木主巫陽些歌魂兮来歸于以寓安厝之禮于以表追逺之心非敢謂報親之萬一也嗚呼哀㢤嗚呼痛㢤代祭姊丈何子潤文猗欤吾姊得配君子梁鴻孟光隐徳可比睠我弟昆骨肉無異賔朋之交或臧或否坦率忤物豈無㣲纇嗚呼蒼天禍福倚伏乃著戎衣徃役安陸折桞郡城别淚盈掬十年夢寐每念衷曲黄耳書歸殷勤齒數路越四千親愛益篤尚聞矍鑠慰我毣毣安知訃音遽云瞑目生還玉関無復可卜嗚呼蒼天何怨何尤嗟嗟我嬃舉案無由兩地共哭痛心如抽爰命巫陽招魂道周香雪一觥薦此蘋羞魂兮魂兮来歸首邱代祭金親家文金以運粮遼東巨船五十餘隻官吏役夫千餘囬途遭風覆舟而溺嗚呼平地風波陸沉者多航海而没奈貝母何魚腹葬兮渺茫散精靈兮八荒巫陽啣哀兮籲穹蒼白雲悠弓歸故鄉大矣㢤尾閭無􅔄渤澥無邉非精衞之石可填豈彭咸之居可遷魂弓来歸閭井依然雙親具保其妻子一弟服勤而力田逍遥徜徉何異乎生前厶等葭莩之親鄉曲之情援溺之手㒺措将迎之意宜傾言采溪毛薦此一觥代吕輔之祭湯母文惟靈春秋八十有七年林下髙風鄉稱姆儀耳聪目明老而弗衰盡三從之道全四徳之歸其早歲之事非詳所知請以晚年所見而知者頌之男婚女嫁各得其時愛其男及其婦則能盡其慈親其女及其婿則無偏無私凡諸卑㓜愛亦如之視姻眷如骨肉待隣里無陵夷故其病也人皆扶持其殁也人皆涕洟而今而後侍奉無期區區酌東洲之水擷横山之薇于以見親親之情于以表恋恋之悲靈其不昩鍳此哀詞祭重外甥女周氏文維洪武二十四年十一月日龜巢老人謝舅翁携子及孫以清酌庶羞祭汝重外甥周氏娘子告之曰人不幸遇世變而俘于兵如風雨落花藩溷泥塗鮮或不汚汝乃釋係累以配二千石之子宜其家而悦于舅姑此不幸中之幸非人之所能圖也至如一念之孝念母孀居廿餘年抱歸寕之願百餘舍渉艱関之途徳㢤良人能與之俱服齊衰以終其䘮脱簮珥以恤其家睠我東翁母嘗託孤亦𣣔報之以璚琚凡如此類竹帛可書然則昔之所幸者抑亦有感于天而天賜之扶輿也今也一疾斯湏朝露溘然鬛封象服慈親田墓弟良人之悲有未葬之親未笄之女汝何忍乎舍旃我意汝視斯世斯身履氷臨淵玉石俱焚萬萬千千保遺體之全歸餘無憾于九泉寥寥旌善亭令名誰為傳嗚呼蒼天代曹原度祭黄仲噐文公長原内厶為忘年交年雖不同身同澤臞韋杜桒麻叔牙夷吾舊雨有時而契濶今雨有時招呼徃徃来来曽不計其誰數而誰䟽也夫以公之晩歲言之一子出贅鼓盆自娛或蒼頭而詩卷或長鬚而酒壺或載月剡溪之舟或踏雪覇橋之驢㝷梅看竹清逸如故人謂公為荷蓧荷蕢之徒嗚呼公之闔棺之日厶客東吳不救䘮于匍匐不送葬于泥塗每一思之涕泗沾𥚑酌彼潢潦薦此束芻謝荘墓祭祝文開封舊家軒冕烈塘随龍渡江奄宅兹土豈無佳城海水尋田敬惟髙堂祖封巋然清明祭掃豺獺遺意尚期垂𥙿有永弗替烈塘墓祭祝文人夲乎祖猶物之天化育之㤙疇能盡然維曽大父瓜瓞蔓延幽殯宫宅此平原左三從祖吾祖右偏兩伯遷祔壁仍連五封十靈餘皆茫然天荒地老陵谷變遷尚頼遺澤箕裘勉旃清明省掃薦此蘋蘩霜露之變永矢弗諼横山墓祭祝文哀㢤慈親寂寞九泉我弟與侄亦遽溘然言之痛心有不能忘夫親在則晨昏定省親殁則春秋祭祀寒食上塜陳此饛簋雖不足報其劬勞庶循乎世俗之禮為吾親吾弟及其子念之代孫垣祭邵姨夫文嗚呼先人在時吾姨丈以肺腑之親徃来之頻不逺三舍有如比隣至不幸殁于鄭校歸葬横山而姨丈弔之祭之無異乎平昔礼意之殷勤也數年之間姨丈不祿吾兄則桂折秋風時垣又失脚危途路迷而車覆母婺矛牙居子戎服母東吳子西蜀廻視六親皆茫然置之而弗告今也幸服役而過家哀詞一幅酸淚一掬吐母子之真情于此来之一慟哭也樽無醇酹豆無㫖蓄聲容藹然鍳此衷曲新河口祖坟上祭奠祝文維洪武十六年歲次癸丑二月𥘉九日孝孫厶敢昭吿于祖考妣伯父母父母祖父母父母從父母九位尊靈曰墓祭本非礼欲子孫于雨露之春不忘厥祖從俗祭掃以寓孝思尚兾遺澤使後人繼繼䋲䋲有永弗替謹以清酌庶羞祗薦歲事謹吿謝荘曽祖坟上築墻祭奠祝文維年月日孝曽孫厶以目昏不能逺来躬拜墓下謹遣玄孫厶等代行敬昭吿于曽祖考妣二位之靈曰人本乎祖㤙極如天祖世雖逺天不可忘眷此故土殯宫猶存繚以周垣以禦樵牧清明省掃歲修祀事尚期垂𥙿悠逺無斁謹吿寒食祭妻墓祝文余生與細君偕老君年七十有九吾齒長于君者兩年以予之潦倒而君稍强健也孰謂君先棄予而逝也君骨肉之窆于此倐焉両旬視時艱虞恨不能相從泉下以安其居惟兹寒食携子孫狥俗祭掃以寓哀思尚饗寒食祭子墓祝文墓藏而骨豈祭所乎然而之遺言有曰歸祔先茔子孫姻戚歲時洒麥飯于松楸之下志願足矣今兹寒食扶我携㓜設祭墦間以踐而之言如而之祭志抑亦表長㓜骨肉之情吾子有靈尚飲食之代祭胡隐君文惟靈世居東吳笠澤之濵厭處卑􅊜于兹卜鄰同井為鄉垂五十春維桒與梓寑為婚􅊚待人以恭儉以律身二子克肖構穫維勤貽厥諸孫佔畢其呻老福婆娑笻杖幅巾如厶等同一里閈徃来侁侁以翁年髙而尊而親翁雖不飲席必同茵笑語相狎翁弗我嗔春風童顔喜色津津意其夀考籛鏗之倫何物二竪瘨我吉人我来問安翁語諄諄别不旋踵哭聲遽聞追念疇昔涕泗沾巾當此窀穸束芻具陳出門一慟悲風愁雲張彦寔哀詞歲丁亥之仲冬丹陽張君彦寔遘厲瘧疾不五而逝其友人謝應芳為哭之慟且嘆曰噫君自少倜儻多知謀尚氣節能仗大義平居論時事言若湧泉故搢紳多噐之其憂人之憂楽人之楽亦庶㡬杜季良之流欤苐峭直不容人過遇强梗𣣔鉏去之用是或歛怨焉后至元間邑大姓與令有隙且與君不相能因媒蘖其短詣部使者愬之謂君嘗為人納賄部使者𥘉不能察稍加淫刑𣣔强服焉令恐噤不復辨君受挫辱屡數日終不忍加誣于令若是者非仗義能之乎至正𥘉里有横逆君疾之一日乃自殘其㓜搆大獄以陷君之季子聞者股栗君處之𥙿然詣郡邑雪理卒能脱其子之械以械之他如姻舊及凡與之逰者顛則扶之危則持之若是者又不可一二數但惜乎負竒崛之氣時不見用終於此而巳嗚呼吾彦寔之死可不為之哀乎然而象賢有人君又能擇其最肖似者為仲氏之後使先世之業並立弗墜然則彦寔之死猶無死也奚哀為雖然哀者人情也禮曰哭死而哀非為生者也予與君素相知而氣質且相類狐兎之悲疇克自巳故為之辭以冩其哀云天胡為兮生楩楠搆大厦兮無不堪匠石不遇兮老雲岩天胡為兮生龍媒塩車困兮骹骨埋名駒汗血兮陵風埃折瑶華兮山之阿望羙人兮不我過我心傷悲兮淚滂沱夀上人哀詞浮屠夀道傳蘇人也年三十攖暴疾不終日而逝其親戚師友以及鄉里之人咸哀之予之哀則又有已私焉我聞道傳為兒童時既棄家學浮屠越數歲慕徑山古鼎師化風徃事之為入室弟子未㡬師命典教藏聲譽蔚然巳而振錫逰諸方參禅門老宿聞見日益廣操履日益堅𬒳緇衣茹蒿芹泊如也一日念親老無他侍飬飄然来歸朝夕奉滫􅔱以答頋復之㤙又築室西林閉門讀天竺書且旁通百家㑹其歸趣閲五六年矻矻不少暇庸詎知遽至于斯耶吁夫以道傳之聪敏勤苦早歲入徑山之室典教藏巳卓犖不羣使厯階而升足為藂林師表道傳乃退然自守而卒無聞也飬親而不得終其志力學而未能發乎文辭以黼黻斯道此衆人所共惜而哀者也予于道傳𥘉無葭莩之親鄉里之嫟䘮亂之際傾葢如舊舘焉以安其居榖焉以盡其禮愛之敬之二載猶一日視親戚鄉里殆有過焉以今思之可不重為之哀乎或謂彼佛以寂㓕為樂而道傳㴱究厥㫖必楽于逝焉奚哀為予曰不然吾今哀道傳者情也其楽與否非所論也夫情動于中而辭出焉辭而哀之亦以示不忘云大鈞賦物兮物胡不齊㴱谷蘭摧兮蕕生道周良農服田兮祈榖有秋禾方秀寔兮賊以螟蛑嗚呼哀㢤伊人好脩天其渺茫兮我将誰尤哀鶴辭至正八年秋盗夜入我友諸葛用中之家殺其鶴于後圃巳而盗被執詰之盗吐其寔當其穴墻之時鶴長鳴警之既穴而入鶴奮翮而前若将力禦焉故遇害用中于是惋惜流涕褁之席坎而埋之縣文學汪君以敬為作瘞鶴銘進士王君伯恂又為之誄然則鶴之死可無憾矣然予于是重有感焉夫物性能警盗者狗也非鶴也警盗而鳴亦巳異矣禦盗而死不亦義乎人為物靈求其舍生取義者尤不易得况禽鳥乎葛之鶴其可謂義鶴也巳矣故哀之以辭其辭曰鶴兮鶴兮瘞彼髙岡不鳥其形心人之良鶴之斃兮殉于義兮骨朽名存猶無死兮龜巢藁卷之二十終, WYG: ''}
