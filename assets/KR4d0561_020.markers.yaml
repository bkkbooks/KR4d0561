  - {type: variant, offset: 0, length: 5449, content: 龜巢藁卷之二十祭文祭姚吉甫文嗚呼物之不齊誰其主之齒去角存從古如兹如公之生夀富且寕不冺其胤百福具并奈何狂飈蘭摧桂折乃舘二甥以繼其絶茍非逹觀拂鬰奚堪公能釋然優㳺燕酣凡我親朋時相徃來有客必醉春風滿懐𢾗日之間𢾗徃問疾留連眷頋其情益宻卜云其凶醫獲㣲功方疑蓍龜遽爾而終嗚呼蒼天知乎不知伯道無兒千古之悲所可慰者女能奉母歲時烝嘗亦猶有後凡我親戚忍言長違奠此杯斚涕泗沾衣代王文甫祭兄文嗟嗟我兄少歴﨑嶇相我先子經營厥家自失所怙顛危誰扶繄我與兄左枝右梧我室苟完兄力其痡嗚呼哀㢤兄於斯世閲七十年天賦其醇朴而不鐫故此家事我其勉旃尺布斗粟曽無間言所可喜者兄其息肩幸有二雛能奉周旋日飲無何皥皡其天意此安佚夀或可延奈何既衰屡疾屡痊絶粒信宿晞露溘然嗚呼哀㢤誰無兄弟我獨孤苦頋二雏者視予猶父我嘗朂之以纉先緒矢心以辭酸淚如雨代祭子文嗚呼天降禍于我家何其酷耶我生勞勞髪已垂白兾汝冡子仰事俯育以纉先緒汝年既長頗渉丗故與汝諸弟左枝右梧我經爾緯我作爾述知稼穑之艱難未嘗敢慢而敢逸也維汝多病常貽我憂去歲仲冬㡬致弗救厥疾既愈我心則喜然未嘗假以詞色寔慮汝因疾之餘弛而弗張馴致怠荒故也正月之吉我適錢塘别方兩旬訃音忽至将信将疑屡泣屡止意汝暴疾氣或絶而復蘇聲或喑而再語匍匐来歸汝簣巳易汝棺巳歛無從見汝之面矣可不痛㢤可不痛㢤嗚呼彼蒼者天我罪何居人或釋之子淵之天顔路何辜信乎脩短之有𢾗耶天道之茫茫耶不然何乃使汝不得其夀也嗚呼汝子汝女嫡庶五人女嫁其一子皆未婚汝何忍置之不頋耶食指之衆賦役之重又何忍老父無息肩之日耶死而有知汝必念我于㝠㝠之中而我之所以念汝者将何時而已耶嗚呼痛哉我築之室汝弗與居汝蓄之噐用以祭汝今卜日祔葬汝祖茔之側撰此飲食與之永訣汝妻汝孥哀慟欲絶代王氏祭叔父文嗚呼痛哉我叔父春秋七十有二年始于承家中於克家終於成家其劬瘁艱苦非諸㓜所能盡知也但見完羙之室風雨不動衡從其畮阡陌相連男有室而女有家水乗舟而陸乗馬非叔父積累之功何以得此㢤至如目能識丁皆叔父延師之力也行不犯義皆叔父提耳之訓也一家之間緦服何㸑以叔父之恩無偏情無私嗃嗃之威嚴不可犯故能齊其不齊以致其齊耳嗚呼痛㢤庭訓之言萬萬千千今不能盡述矣如南塾篝燈東軒奉茗嘗屡進厶等於前而語之曰我兄弟自生至死未嘗有䦧墻之日也老我夫婦自少至老無牝晨之患也隣不争畔帑無私蓄許人以諾不食其言鈎距不知掊克不能汝等亦能如是乎凡此𢾗事反復吿戒知㡬朝夕今其巳矣斯言不可得而聞矣而厶等為之子為之侄為之孫者可不追念貽謀而踐其成法乎否則為叔父之辱親朋之􅏺鄊里之笑天地間之罪人也嗚呼痛㢤去年先人皆謂叔父矍鑠其夀未艾也孰意數月之頃視則眊焉聼則聵焉筋力索焉方病而紅冦入室病愈而租吏打門百憂感心二䜿成而厶等猶以醫薬可恃而不惧也詎意遽至是耶嗚呼痛㢤教育之恩固不能報其萬一但速葬以遵治命如此永别之悲五内加割泣血一酬惟以告哀嗚呼痛㢤尚饗代周華甫祭伯文昔我先人早棄諸孤所恃兩伯其一復殂巋然獨存山澤之癯憐我兄弟教之友于雖異厥居有無相湏撫之愛之與子不殊奉承周旋匪朝伊晡階庭之間言笑怡懌小過弗責曲禮弗拘叱咤之聲㒺及僕夫鄉稱善人乆矣不誣年踰八秩健飯為娛詎意一疾竟若摧枯由兹而徃誨言則無疑難誰質顛危誰扶寕不使我哀號痛呼伯兮伯兮死不復蘇薄陳簠簋清酒一壺收淚永訣靈其鍳諸代祭吳間間真人文玄元之學世遠言湮不有先覺孰貽後人伊昔上卿道契世皇手持玄珠光明四方吾師繼之山鳴谷應弘道累朝維清維寕帝錫之爵羽節霓旌邈乎髙風崆峒廣成出入西垣在帝左右黼黻皇猷厥功亦懋名日益重徳日益尊世則頼之以棟玄門豈不懐歸怡雲舊隴勇退弗獲祗承天寵間間之情聖皇所知大書所思奎畫煥然寳翫無斁瓊舘逍遥以永朝夕胡厭斯世遽逰鬰羅哀聞九重傷如之何我諸葛翁嗣法之孫如牛馬走忝為後昆䑛鼎而僊雞犬弗及寓哀兹觴無任於悒為亮西山祭光祖庭文生必有死斯理焯焯况我釋氏以滅為楽獨于交情寔不能無若我與君忘之可乎昔在光孝親如葭莩承平異處患難相扶故山丘墟避地東吳未㡬言還如蚿如夔銅馬西来猛于䝟貐再渉大江九人與俱披榛門道體無完膚既脱虎口猶虞畏途我二人者始終持扶白茒宵征狐嘷鬼哭磧沙遇舊廼衣廼舖萍聚雲散連年海隅每一握手猶論毒痡維暮之秋以予起躄爰繼我師踞天惠室與君相依鐘皷朝夕平居論道風飛電激方期進修各殚其力君遽云亾必楽扵寂我失良友是用悽惻溪毛之薦諒維来格祭沈仁齋文天道何茫茫耶顔氏之永仁不永其年栁跖之暴夀何以延豈有生之𥘉氣禀其偏乎抑蜉蝣朝暮蟪蛄春秋一皆聼其自然乎如君之生洵羙且都鄉閭共稱吉人之徒蚤歲失怙藐焉而孤仰事俛育綽乎有餘若騏驥之夙駕且能範乎馳驅毎逰四方以廣其居安知信宿之先方歸覲省一别之後遽疾而殂嗚呼哀㢤倚門之母其望懸懸垂髻兩兒其泣漣漣鴒原永嘆鵉鏡莫圎徳㢤若人何辜于天如厶等葭莩之親情猶骨肉既不及匍匐而徃救徒號呼而頓足旅櫬未歸横山埋玉頋彭殤之不齊信斯理之難燭漬緜以詞酸淚盈掬為葛子寕祭父文嗚呼天乎人孰無父獨不假我父之年遽止是耶在昔家居仰事俯育以大父遺業之重隻力負荷常惧弗克所楽者惟琴惟書是吟詠而巳餘無所嗜好也嗃嗃之聲弗及犬馬姻族閭里咸薰其良善人之稱無間然者數年以来遭時艱棘流離異鄉食指百餘頼父全活亦豈易為然耶嗚呼痛㢤時之避難者妻孥啼號或委溝􅊤我父則旁求治生之術使母與厶等無凍餒之憂也時之人居無室廬或冐風雨我父則納交仗義之士使母與厶等得居處之安也至若族有孤寒之胤家有臧獲之衆亦莫不愛之如骨肉然搢紳之士多與莫逆葭莩之親相與依倚但不肖孤不能幹蠱負義方之訓為多然我父之慈訓未嘗不勤勤也今也一疾遽尔大故頋厶等為孤為婺者真若䘮家之狗失水之魚矣嗚呼蒼天其無知乎如其有知視孤婺之悲若此而不為之憗遺乎然而悲則悲矣猶有可慰乎㝠㝠中者我母以栢舟自誓将星冠羽服以終其身厶雖愚不肖既於父有風木之憾幸母之存寕不服勤奉飬以慰我父乎矢心陳詞惟以吿哀惟吾父念之願以父之靈隂相厥後代祭表嫂文維靈之生錢橋望族嬪我表兄閨門睦睦頼有内助以生以育暨肥其家且飬以福吾兄强仕朔南宦逰嫂居於家家政克脩男齠而嬉女㓜而柔以母可恃父弗為憂頃因䘮亂家毁于兵吳徃越還千惧百驚寓兹吳門待時之清念我胤子可敎而成以女許嫁親親相仍儗古朱陳卜世莫京雖居異郷客舍聫梦嫂嘗有言兒女鍾情必娶必嫁此心乃寕適予親䘮連服絰縗子未可醮礼文亦虧惟嫂之言艱難共知戮力同心敎子擇師眷我婦子朝斯夕斯一味之珍食必共之方期将来嫁娶有時安知一疾遽尔而萎聞者愕然慘怛歔欷况我骨肉胡寕不悲最可悲者兒號女啼而今而後㷀㷀何依死而無知棄之如遺如其有知忍此别離我婦我子其慟亦宜天命奈何彭殤不齊傷㢤永訣漬綿以詞代祭弟婦文嗟我兄弟遭時艱危兵燼其廬星散其人使汝妯娌等不能同家而䖏共㸑而食於今凡六十年矣然吾弟頼汝之力以巾以櫛以絲以枲以鞠其子女常得以慰我心焉鄉也吾弟與而避地浙左我夫婦每念汝婉娈之姿跋渉山川漂揺風雨多有可憂者焉幸而言還得同居長洲茂苑間者𢾗月我乃就食于無錫矣又使汝妯娌乍聚而散百里之間相望相憶而不能𢾗相見也近方喜汝子暫贅而歸其妻将有拜姑之日矣又喜汝女擇配得人亦将有舘甥之時矣滿謂時将小康仍居故鄉少長咸萃搆一畮之宫犁二頃之田歲時酒飯于先人之墓則我妻與汝復得相率以事蘋蘩矣𢾗日之前方聞安信片𥿄之上忽来訃音使舉家相頋失色始而疑焉終而信焉莫不為擗踊而長號也嗚呼痛㢤天胡不仁奪吾弟之内助者耶地胡不仁奪吾侄之所恃者耶苟曰非天也非地也以汝之徽柔淑慎乃何為夭閼如此㢤自今以徃雖不知故鄉之願能遂與否其或遂焉亦不得與汝一日同也生死之間此憾何極雖然天降䘮亂代祭趙師吕文公之生也七十有六年時有盛衰事有得失境有順逆物有欣戚公其處之操履如一其少也以簮纓之裔而無爵禄之念其壮也以陶猗之富而無奢靡之習及其年之老成尤儉素而篤寔為鄉里之善人不闘智而用力横逆之来唾面弗拭葢明夫舌存齒亡之理而得乎全身逺害之術每論平生禍福靡常鵉膠之絃三㫁而三續鳳穴之雛或存而或亾銀杯羽化付之渺茫知有命之在天忘鳬鶴之短長維箕維裘授子及孫閒居别第翟公之門清風茗椀沉水罏薰日怡情于晝書絶無心于世紛視不義之富貴如太空之浮雲獨念先世欲勵後昆託祠事于老佛之廬属䘮具于葭莩之親視死如歸餘何足云或謂公之可憾者燕子楼化為刼灰科斗壁飄為風塵殊不知公之逹觀藐如堕甑未嘗怨天而尤人也今也人遭亂離多殞鋒鏑横屍四野鳥鳶之食公乃得全體之歸掩佳城之室廻視前日之死于非命者安能企其萬一乎厶等親親尊尊道義交結渉江以送其䘮雪涕以臨其穴一觴之酬千古永别公知不知我語無極嗚咽尚餐代張希良祭王文甫文公之一生磊磊落落操心至公俯仰無怍出辭必信不事鐫鑿人或狙詐言諄聼藐家庭之間一呼百作奔走服勤㒺敢乖錯及交親朋春風笑謔恩誼有餘礼文則畧患難相救扶顛濟弱鄉里庇庥恩尤不薄或飢而餔或病而薬或輔其仁或紏其悪周恤貧寠不輕唯諾頻年時危所在跖蹻鄉人愛之歛袵如昨施徳有報理亦昭灼我曹多幸松蘿附托凡諸甥舘必席賔幕從容語言欵洽杯酌别不忍去期必如約今公巳矣失我矩薙枉者誰矯懵者誰覺窳者誰範觚者誰削誰指其迷誰㫁其堊静言思之相視錯愕掩𬒮拭涕薦此泂酌為周縣尹祭頋元公文盛徳之士使人後千載而興起者其信然乎猗欤元公才兼文武其文也世稱三俊為當代之儒宗其武也羽扇一麾走六州之豺虎醉非嗜酒免禍驕主醒非沽名赤心自許抗䟽𥙷衮職之闕擇賢進邦國之輔史不一書勲業昭著世徒知思蓴而歸者之為髙而不知採蕨南山之言先入乎其肺腑故公之殁特為公鼓琴而悲慟哭而去也睠兹長洲寔公鄉土桒梓之宫墓有祠宇何物地靈混此室處斥而去之陳我簋簠悵烟塵之滿眼懐清風之白羽惟公有神以福黎庶為周尹立碑祭元公文昔典午氏碑表有禁勒石公墳勲業昭甚事傳信史石亾何時走尹兹邑永言懐思載葺祠宇籩豆具陳祀神有詩刻諸堅珉峴首之碑令人堕淚吳人于公亦復何異惟公有靈隂隲吳人克武克文無愧先民代姜周佐祭姨夫王仲徳文君之老姑為我叔母而我女兄獲奉箕帚我弟於姨復得其偶如古朱陳婚姻世守先人嘗言君性醇厚人或顛危君力能救我親雖亾斯語不朽如不肖者公亦弗陋有過必規有善必誘眷我弟兄無一或否公年半百閒居静守閨門之内肅若賔友忘情軒冕適意杯酒獨奈今年避冦奔走挈家於舟虎兕傍吼千驚百憂窘束如杻一女鍾愛疾莫能救羣盗稍息歸卧南牖襁褓之珠復碎于手公之痛心如割如剖痛猶未定厥疾新遘嗟㢤若人天胡不祐今公之殁命也誰咎凡我私親倚仗何有尤憐女兄孤燈白首撫膺長號淚􅊜雙䄂為王孟學祭母文蚤歲失怙惟母焉依母其視之猶掌中珠未寒而衣未飢而飱左提右挈頋之復之夙夜檢束惟恐不能自立以保其身以承其家以承大父母及諸父之訓諄諄之言不一而足每于舅姑之側視其色有不豫然者退則惴惴檢其不及既自檢束又詢之二雛曰爾於大父母之志或有違乎事或有怠乎抑不能謹飭以貽其憂乎母之欣戚係乎兒之有過無過未嘗一日忘乎懐也仰事俯育婺居而憂勤者十年男室女家志願方畢然于祭祀賔客之奉身先中饋亦未嘗一日之或懈也嗚呼痛㢤兒以母之康强而年未艾烏鳥之情方圗萬一庸詎知一疾而不起耶臨絶之言謂死無憾特以弗克終飬舅姑為慊是則吾母之孝于舅姑者為何如㢤宜乎舅姑之痛不翅如父母嗚呼風木之悲兒将奈何惟當追念母訓兄兄弟弟各勉成立律身成家竭力以奉承諸父以飬大父母之志尺布斗粟昆弟共之不敢有毫髪欺隐若有所否者是忘其親忘其親則不孝之罪上通乎天雖吾母之慈有不可得而宥者惟母有神尚克相之庶踐其言以慰母靈為陳彦直祭外姑文嗟我外姑徳不可滅孤燈十年柏舟髙節為婦而孝為姑而慈林下之風鄉稱姆儀如諤與謙材俱碌碌婿于名門蒹葭倚玉毎詣甥舘升堂起居必詢女家諸兄何如或堕優逸勉之克勤防㣲杜漸忠言屡聞或坐孱弱戒之自立扶顛持危惟恐不及比嬰㣲疴時在床席我来候問仍飲而食眷頋之間無異于常及女来歸語猶琅琅一日之間遽成永别卑尊戚䟽故皆痛切曰婿與女感恩如前豈不哀思泣涕漣漣幸有賢嗣篤親如母夔蚿相憐義當乆永死而有知知予之悲一觴敬酬靈之格思代吳伯亨祭外舅張守齋文嗚呼惟我婦翁鄉之善士不鄙庸愚妻以其子既妻其子恩義兼至念我先君夙昔交契今也孤㷀遭家殄瘁朂女内助庶弗顛躓毎詣甥舘言提其耳翁經州閭必過敝止綜理厥家以綱以紀親之愛之視子無二别無㡬何聞疾以痞女舟歸寕夜渡淞水訃音歘来驚使躃地匍匐及門翁巳長逝我服雖緦我哭不偯矧為女者其痛曷巳㓗此一觴進饌靈几永言哀思翁其鍳諸代金子俊祭錢仲居文嗟嗟仲居其止於斯福善禍淫天胡我斯父為善人君亦如之非義弗取非善弗為曰儉曰勤俛焉孜孜業日益廣家日益肥十數年間遭時艱危賦歛之虵毒人骨肌君安其親茹荼如飴弟則友愛室家其宜是皆㴱淳親親之推眷我姻戚肝胆相知温温其容抑抑其儀莫可忘者顛危扶持僉曰若翁澤流未涯厚培其根必茂其枝詎意一疾遽尔而萎禍福之柄誰其倒持於乎蒼天天閼若兹厶等念乃疇昔胡寕不悲矧如雙親遺孤與婺其痛之鉅庸曷已時我舂不相我淚沾衣言采溪毛薦此一巵嗟嗟仲居庶或格之代張伯仁等祭父文於乎痛㢤樹欲静而風不停子欲養而親不存哀哀諸孤所以痛裂乎其内也仰惟父天覆我兒女男室女家志願俱畢且復為之樹産業立根本使各得衍其餘澤焉苐所恨者我父之生過於勤勞六十九年日用矻矻未嘗得一餉之優㳺也矧逢艱時子或受圍于城者親雖野䖏心常危之或行役于逺者親雖家居心寔随之餘在侍旁親若可楽然憂患則為之料理征徭則為之區䇿亦未嘗忘於懐也至如鶴長鳬短物不能齊又豈能不拂我親之意㢤今也兒無所瞻女亦何怙菽水之歡不復可得是雖五内之裂亦徒然耳厶等與弟等但黽勉㐮事以我親索嗜佛學視身為幻敬以茶毘之法奉之遵治命也輀車在門翌日永訣菲焉一奠吐此哀衷祭先墓文於乎陵谷之變知係乎時惟情所鍾不能不悲昔我先壟松大十圍今皆宿莽荒烟盡迷不思言者佳城或墮或幸而存塚眠狐狸曰不肖孤避兵海涯九死一生如鳥無枝十有六年豈不懐㱕囬首鄉関道阻且危丹陽之東吳門之西方𢾗百里野無黔黎我兄我姨塜亦靡遺我父與母夣或見之既寤而嘆涕泗交頥今我冡子携厥妻兒歸耕舊田丘壟是依餘口猶十未能同歸歸何不能生理未治旅食異鄉破研日随尚頼遺澤歸或有期載耕載穫烝嘗于兹或樹松楸如前盛時嗟我祖禰知乎不知拜伏墓下拭淚陳詞代張伯仁祭, WYG: ''}
