  - {type: variant, offset: 0, length: 10138, content: 龜巢藁卷之八詩寄徐伯樞東膠山人不出村南州髙士之裔孫十年曾作蝼蟻夢四壁祇有莓苔痕松分女蘿𥙷茅屋磵引乳泉澆藥園别来幾度屋梁月顔色宛然清且温寄丹陽孫秀民翩翩白雁秋風凉紛紛白蘋秋水香官河兩堰隔三舎旅次一違今十霜菱芡練湖秋大熟莓苔劍井夜無光故人知我老痴不年似伏生書盡忘懐京口俞伯鎮鉄甕新城舊隐居江山勝槩畫圖如五條街口多輿馬萬卷書中老蠧魚道合不妨鄊土異情親可奈信音䟽杜鵑花與人俱好珍重題詩一寄予洪武乙丑秋新鄭縣學以通經薦吾孫塏移文本縣徴赴吏部塏于六經有望洋之嘆且欲辭而不可得予以孔孟之書列乎九經塏嘗受業故臨别示此𢾗語朂之猗與古聖賢遺言存簡編孝經及論語孟子書七篇載道繼六經煌煌日星懸斯文覺斯民于有五百年汝生家辟兵九經失青氊借書二三策教汝朝暮間大哉孔孟學曾以管窺天還鄊願卒業奈汝多屯邅朅来誰薦鶚通經乃虚傳徃哉詣春官從寔吐肺肝絲麻雜菅蒯博采豈舍旃天恩朝惠寛茅拔茹或連立身報君親慎勿違聖言送楊景子以通經薦舉之京亭亭青玉桐孤生秀林中雨露得所飬歲月亦已深良工拔竒才献作羲皇琴繫以朱絲絃鼓之丹鳳吟八風宣九垓令人格非心鄭衛化韶濩太和無古今吾將洗吾耳朝夕聆遺音和景子韵冬至隐隐鐘聲出景陽楊生望闕賀朝忙勲名有日印如斗舞蹈今朝靴滿霜咫尺天顔春色喜輪囷雲物瑞光長賜錢張晏宸恩厚一舉真堪累十觴冬至後五日承郡齋文㑹翼日賢長史置醴欵洽且有贈言次韵奉酬并謝不敏文章太守誰同樂幕府賔僚如李郭坎蛙誰信有竒逢鼓吹敢随東海若枯腸喜得酒一澆枵腹毋勞篾三縛獨憐澗􅔄老孤松春風膏雨徒優渥𥘉度作重光之冬湯餅作客孟光相對頭俱白吾兒樵雪晚歸来担頭還帶詩三百詩歌熾艾夀觴舉呼寉堦前舞瑶翮安知此後境多乖五載家門毁㕠璧行年今與伏生同兀若枯枝雪霜厄樵兒遺孤主黔簿四千里外勞相憶我昔蹉跎四方志每見桒弧有慚色願言膏雨發孫枝先世衣纓復輝赫皇天于余賦亦厚才散如樗夀如櫟髙語言聲耳尚聞黑白分明眼猶識四肢百骸筋力㣲頭容與心依舊直呴嘘素不學松喬逆理偷生正何益曺横山下青松宅含笑全㱕待朝夕山缾乳酒如蜜甜笭箵寒魚鮮可食家僮荷鍤且勿忙為我挿花且吹笛自今每日從歡伯龜巢甕天適吾適斷送予生真上策卧雲歌為華景彰作我昔所喜青雲人雲梯登登上星辰餘如風花落藩溷伊人可仰不可親只今老我成枯朽愛爾岩棲卧雲叟白雲一壑𢾗千畝且無租稅論升斗悠悠我如雲寂寂雲伴我雲出岫吾心𥘉無洞門鎖一榻偃仰得自如両膝屈伸無不可布為𬒳非難能我𬒳以雲如白綾木為枕我未曾以雲枕頭時曲肱床無上下亦無客别有意氣非陳登飛鳶跕跕自炎海夜寉繐帳清于水佳哉叟之所樂者如彼今人古人誰可擬華陽陶隐居投簮謝朝市山中作相心未閑剛道怡雲豈無愧華山陳䖏士大笑脱塵屣鳳凰銜書空徃来熟睡雲臺終不起願言學陳母學陶此身長與雲逍遥萬松嶺上老禪衲形服雖異同清髙况有煎茶好泉水活火煎来味無比詩腸搜出烟霞語不異不同人共喜老夫耄矣少筋力尚欲去着逰山屐細啜月團雲滿甌分卧石床雲半席幽懐為我一宵傾免使相望両相憶郡侯以蘭行年九十以詩見贈敬次韵厯叙平生以鳴謝臆延陵野老家業儒舊壁頗有先人書童年愚鈍不努力渉獵五經多缺如二十而冠三十娶取友必端無佞諛春秋四十五十餘髮猶未白顔猶朱才如襪線不知恥光範門前曾自譽六七八十成潦倒興来尚欲歌吳趋今年九十常晝寢誰敢效尤扳宰予雲山萬叠作圖畫松風一壑鳴笙竽㕠眸漸昏耳漸聵面壁寂寞如僧居焉知府公特尚齒贈以大篇明月珠老夫得之感勤渠雀躍拜起不用扶合室稚老俱歡虞十一月廿七日得塏口信以詩志喜并記塏前臨别祝規之意賣橘人從采石還口傳家信報平安路經湖北雖云逺天近雲南不甚寒佐令謹持三尺法尊君長秉寸心丹驛橋臨别丁寕語應念貽謀作鏡看自和同前詩于次年正月十三日寄黔陽四千里外之官去百丈牽江舸艦安新沐恩波從日下舊家門地不氷寒洗心正在詩書澤換骨毋勞内外丹新歲僕歸正二月家書細寫阿翁看簡陳子章先生身不封萬户侯眼不識千金裘深衣幅巾避戈矛徃年零落崑山州兵餘還鄊理西疇臺笠播種襏襫收今將盖棺萬事休但欲服飾如前修先生舊衣巾暫尔可借不縫人合古制素願吾乃酬飄然長𥚑泉下逰藍縷免致先人羞生前相徃来二老亦風流横山歌夀萬拙齋横山之巔青入雲冠冕一邑無與倫山南風景最佳處隐居豈是尋常人此山鍾英三百載素封不乏青氊在向来吳下避烟塵恨不移山東入海還山喜得無崩騫種玉舊田耕紫烟雲屏正設後堂後空翠直灑前塋前觀雲每日烏皮几灌園有時龍井水人家雞犬寂無聲宛若桃源畫圖裡山中羽人王八百昔日仙宫今佛宅丹砂未必駐童顔把酒看山真上策山乎山乎徳不孤靜而夀者山為徒美哉山禽知此意石榴枝上呼提壺我歌横山歌未了拙齋為我開懐抱移宫換羽作新聲彈入琵琶歌更好百斛葡萄為傾倒屢年作小詞或詩為萬拙齋夀癸亥夏五十日予以鄊人嫁禍兒軰徃崑山救之時有詩曰予懐紫髯翁新作緑埜堂常年𥘉度日嘉賔四筵張虚左待老夫酌我九醖觴甥孫舞鴝鵒絲竹鳴鳳凰情與酒俱深飲量非洋汪今雨獨不至應憐走他鄊峩峩馬鞍山絶頂遥相望横山一髪青滆浦四目黄想像祝眉夀有如賦髙堂留别永懐寺長老暨袁子英余茂本通政歸吳十載前一宿永懐寺龍鍾今兩来鹿苑廢如此佳尔山中人法幢扶欲起清風方丈室白日靜如水門迎髙詞客問我来何自忘形亦忘年相見即相契坐啜趙州茶並隐維摩几爐薫清我心乳供便老齒鈎簾看玉峯山色亦為喜新知多邂逅咳唾珠玉羙白首莫逆交獨有子袁子徳星聚叢林草木亦􅙽􅙽我思古先軰支許或可儗兼旬𢾗相過倡和不知幾庭前石榴花半落蒼苔地長揖謝山靈歸𬒮沾空翠陳徳廣知事以自夀之詩見示予以其災字韵險不和乃效唐人和意以夀之故落句如此云哦松未了除官去随例放閑恩更多父子一經傳有自桒蓬𥘉度樂如何門栽彭澤先生栁籠飬山隂道士鵝最喜孟光眉案舉捧觴嬌女把香羅徳廣喜予詩和韵見貽予復荅之即三月二十一日繁霜之異于頷聫書之非虚語也繭紙冩来詩句好雞林傳去古人多花開三月春如許霜落五更寒奈何留客正湏沽緑螘引年何必餌金鵝六街車馬紛馳逐自喜蕭齋雀可羅次韵荅華以愚見寄九隴山東舊宅邉一瓢齋裡曲肱眠賢如栗里陶元亮閑似香山白樂天倡和正湏歌白雪丹青何必繪凌烟竹林諸阮多才俊文㑹何時共酒船哀詩鉄船海上逺移家金斗城中境最佳我昔頻来桃竹杖公方新種木蘭花書因教子時常買酒欲娛賔夜亦賖春夢一塲随蝶化老夫三嘆立鷗沙東西家東家賣兒哭幽咽西家鬻妻含淚别形容搃覺瘦如柴肝胆那能硬如鉄低田水没欠秋租今年夏租麥更無妻兒舍我莫怨呼我亦忍飢朝暮殂重午日小酌青年自是好逰者白首始知行路難一寸芳心徒似鉄𢾗莖秃髪不勝冠匏樽偶有菖蒲酒菰黍香于苜蓿盤莫笑貧居輕速客餘生能得幾團圞五月望日寄江隂陳庠仲一别半年久相望百里間陽春知寡和落月見清顔釃酒澄江上題詩小石湾龍鍾還念我時復夢追攀同日寄袁仲徴申浦水東頭悠然客馬周焦桐絃白雪芳草席滄洲昨夜三更雨今朝五月秋有懐飛不去烟樹鬱相繆曹文質自金壇来云費延年教諭傳語且知告老而㱕閑居可喜因作此詩代簡我思故人松栢顔客来寄聲蓬藋間鮎堂􅊰學竟將老鳩杖拜恩今樂閑清風枕簟五栁宅白雲圖画三茅山雪舟未得見安道乗興豈無詩徃還鄭朝宗教諭以予去冬𥘉度自夀之詩次韵見貽予復和而贈之憶昔予為廣陵客両頰丹砂眼青白蕃禧觀裡看瓊花坐列羣英杯飲百無何陵谷忽变改塌然歛我扶揺翮此花天下更無雙毒手誰焚夜光璧先公舊物廣文氊家傳喜得無艱厄抱琴来坐杏花壇洋洋古操令人憶青氊坐久琴愈清君山草木皆愉色老夫今春辱佳句轉眼炎曦又隆赫郢斤非不妙彫鎪奈何吾衰腐如櫟生平甚愧性聱齖老去偏懐舊知識孤舟野渡豈長閑一壺㑹有千金直合歡盃酒細論文恨不能飛見三益江流南滙春申浦海門東入陽侯宅河魨江鮆闘鮮新苜蓿之盤自朝夕黌舍安如廟堂坐脱粟甘于鍾鼎食睠我郊居樂亦然朝聼樵歌暮漁笛忘機相與白鷗眠送窮不效昌黎伯假令秋至轉飢寒亦不題詩寄髙適賢哉子淵可矜式陋巷安貧載方策六月𥘉八日雨晴懐毛伯尚去年五月凉如秋今年六月寒颼颼重隂晝瞑雨連日田家復恐沉西疇朝来日出温風起歲不薦飢人共喜貧家四壁屋漏痕彷彿篆書千百字忽憶山中人讀書両眉白能負仲由米曾漂髙鳳麥髙堂飬親侍親側我衣斑爛親喜色有如諸父竹林逰彈琴咏詩樽爼席人生此樂古人少今乃熊魚両兼得老夫每問書帶草鄊里小兒渾不識但道墨硯池水漲苔衣碧池水香思若人兮不能忘長林豐草春茫茫青松磵􅔄含氷霜鯉魚不随白石爛鳳鳥有時鳴朝陽停雲之詩歌未足玄蟬為我聲相續哀詩鶴長鳬短搃非悲聼我山陽笛一吹黄耳再無前日信丹心獨有上天知送行南浦成長别㱕卧東山悞有期吾老未教僮荷鍤劉伶應笑阿翁痴讀大誥作巷歌二首天語諄諄禍福靈風飛雷厲鬼神驚聼掛書牛角田頭讀且喜農夫也識丁其二一天風雨洗塵昏日月恩光及覆盆雞犬不驚田舍樂呌囂人不到鄊村贈陳棲雲鶴溪之水滆浦分一湾繚繞梅花村窮冬萬木凍欲死此花巋若靈光存清如西山采薇孤竹子白于華陽洞口嶺頭雲隐居者誰希夷後人持一編種樹書戴一幅漉酒巾有時醉飲肱作枕有時不醉百事理可與孔公同出羣青鞋布襪駿奔走今年早春朝至尊紅雲殿前三舞䄂歸来滿腹懐絲綸能為公家勤編氓租斛足萬計雞犬不驚安老親短檠燈火讀大誥喜色夜夜燈花新甌窭滿篝秫田熟歲釀百榼酴醿春親朋簮盍坐常滿湖鮮日擊豐饔飱胸中不着愁半㸃雲夢八九能鯨吞東隣西舍静如水夜無催科人打門安居樂土有如此何異武陵人說桃花源老𣆀戒止足願言尊所聞濁水膠可澄清鏡塵乃昬秋風挂席一相見此意吾將三復論贈周彦羙象賢有子付青氊家住城西緑水邊門栁𢾗株同舊日公租萬斛喜豊年試聼濯足滄浪曲應笑燃臍郿塢烟朝夕酒盃長在手優㳺身作飲中仙簡王尚絅不笑皤然􅒜九流牽車服賈思悠悠醉吟人老香山社詩到雞林價重否贈詹伯逺西北風髙寒露零牽蘿𥙷屋揵柴荆看雲長日烏皮几夜夜教兒讀孝經示孫塏龍門一躍去年秋徑着青𫀆赴逺逰半部魯論堪輔丗政湏忠藎繼前修其二黔陽江水不勝清喜得居官濯爾纓秦鏡照人肝胆見邑民盡在鏡中行其三黑頭勲業志方雄黄耳書歸見靣同斷織机中埀白母抱孫時復倚門東其四春雨秋風歲又寒翁年近百足蹣跚横山菽粟東洲水多在行􅌪樂考槃𥘉冬感懐令垣書所居屋壁在昔陵谷變海上十五霜歸棲失故隣乃落劍井傍百指薙荆棘耰鉏破天荒東洲釣月磯横山樵牧塲一葦去復来十月新稻嘗携㓜入寢門凄然北風凉吾兒婦婺居吾孫官逺方筠籠鶴何之盆菊花自黄跛倚赤藤杖終日徒倀倀𥘉度蔑以為樂杜撰古樂府三章而令諸孫誦之老夫聼之比之輓歌者歌蒿薤于柩前豈不樂哉龜巢老人忘食貧歲時強欲娛賔親賣琴沽酒作生日蹲䲭爛蒸鮭菜新承歡幸有斑衣人君不見古人云酒杯不到劉伶墳杯行莫厭頻其二龜巢老人貎不揚觸邪之性如神羊生憎巫覡煽妖妄疾視𣆀竺隳綱常耄無能為龜六藏滄浪曲窈窕章有時擊節呼兩郎男兒當自強其三龜巢老人年紀多雞皮鶴髪背槖駞金丹自古無足信鉄硯如今亦不磨坐待盖棺歸薜蘿舂有相巷有歌此時不樂成蹉跎殘生有幾何樵海歌為秦文仲先生作出山志云逺樵海名非夸老夫素相知髙風真可嘉早年欲伐廣寒桂增月清輝燭天地又欲㑹稽雲夢伐箭竹人無戰闘遭鋒鏃汗青六經天下讀此志適蹉蛇陵谷俄変改青山樵侣集如雲一笑飄然東入海任公舊日釣魚䖏樵屋相隣鮫室住扶桑若木有餘薪且喜路無荆棘慮水􅔄珊瑚樹亦多尤物不堪開眼覷樵担弛樵斧歇濯足滄洲弄明月興来擊節和龍吟唱我海樵歌一闋也不學負薪讀書朱買臣也不識卧薪嘗胆是何人白螺為杯大如斗青苔席地軟如茵有時獨酌爛醉枕柯斧睡到日髙三丈猶醺醺夢魂不到長安市長安市上多覊旅米珠薪桂莫能賖多少伯桃寒餓死孰知海樵之樂有如此寄溧水開福寺長老源别流客有溧陽雲水僧相逢曾得問南能九重日月恩光近一壑烟霞道氣增龜紐肘懸新賜印麈談語續舊傳燈别来老病常相憶欲覓金篦刮兩瞢悼徐孟銘讀盡軒岐上古書憣然讀律應時需一官再調炎州幙二𥪡交攻瘴海隅頼有故人收白骨歸来鄉國瘞黄壚杏林花落紛如雨何樹哀啼五尺孤臘月十六日夜篝燈作両書言不盡意夜半後欹枕對月口占言懐命兒軰録上耕學伯齡元修三先生南澗海萍二􅊰主清真一鍊師暨諸吟友照天蠟燭徒明月縮地神仙是子虚九十一年殘臘盡二三百里故人踈詩成唐律傾懐抱書託吳儂問起居老我形容多変改依然貧似馬相如任義甫生日作絶句四首以鰥居無子貧病為憾予乃以理釋之誠如吾言則不必怨天尤人而處之泰然矣兄有遺孤骨肉親庭堦玉樹一株春駿奔籩豆非無主傳襲箕裘未是貧池有紅鱗堪入饌杯浮緑螘可留人年髙已過磻溪老每日懽娛莫厭頻贈蔣居士全家欲學老龎禪木榻蒲團夜不眠誰信室中靈照女出門先上渡頭船贈袁居士羔墙欲見老瞿曇貝葉書中日夜參布襪棕鞋門不出一盂𬞞食勝肥甘正月既望予奉陪邑長貳置鄊先生之祠于學釋菜而㱕兒軰謂故人楊澤臞過訪臨别作長短句貽之予因口占以記喜聞邑有絃歌宰哦松之丞更文采翕然敬我鄊先生祠置學宫儼如在區區後學尊前賢駿奔執籩忘耄年深衣幅巾拜祠下燈月交光星滿天扶􅉵歸来語鄊曲此事真能厚風俗安知好客過柴門載殽問字成虚辱吾兒不識氷玉壺但言此客從前無醉墨淋漓洒白雪沂雩興與曾為徒老夫此興亦不淺尚怯落梅風剪剪少頃一百五日来蘭臯蕙畮光風轉三山湖頭舴艋舟百花莊上逍遥逰朝陽碧樹自鳴鳳湖海詩盟尋白鷗平生頗恨少知己晚有竒逢寕不喜朱絃重繫焦尾桐請為鍾期奏流水水田歌歌農務也郡縣之政租賦為急然農乃租賦之所自出可不急乎首言三山書所見也一府四縣意在其中當道父母官念之芻蕘有詢更當靣陳其詳以偹采擇三山湖頭白水田頽岸不修年復年田家豈不憂卒歲十室九空人索然飢腸雷鳴狀如鵠春来怕聞啼布榖願言州縣父母官喻令蚿足憐䕫足古云民事不可緩桃花雨晴春正暖文移動若風有聲畚鍤如雲集不斷三農畎畮合羣力四邑溪山增喜色麟史重書大有年官無負租民足食龔黄卓魯政績成一日九遷皆上卿天子萬壽黄河清聼我老農歌太平無錫舁佛像由暨陽而来鳴鑼皷樹旗盖儀從僣侈家至以禍福惑人取粟布無算東洲任耆老沮之巫不遜𬒳毆且以杖搪木偶幾躓而後去隣莊有王氏者撻而逐之予聞而喜乃力病援筆書此以美任併異其義理之勇云梁公毁淫祠真是霹靂手胡公能打鬼近代亦希有區區辨惑編或有蒙醬瓿潦倒東家丘忽爾發哮吼老拳毆妖巫拄杖擠木偶西隣一壯夫怒挺擊羣醜捐𫀆偃旗盖脫網兎疾走時予病中聞病去什八九朂哉尔東家内省宜勿疚報本理所崇毋落豺獺後一正勝百邪昔賢同不朽題打毬圖擊鞠流風自李唐官家占作狀元郎科塲廢盡毬塲在芳草凄凄幾夕陽清明後一日邂逅薦福寺長老源公話舊論詩意甚相得明日作此詩代簡留别貧如南阮甘投老喜得西枝近賛公白足有僧聼説法江梅無閣坐觀空詩成芳草斜陽外道在殘山剰水中一笑相忘今古意清明時節舞雩風沈徳麟母哀詩怪􅔄吳霜二月繁一朝摧折北堂萱母儀表表真堪畫吾軰區區豈易言斷織機中多教子分甘膝下並呼孫慈顔最有難言處獨立蒼茫日暮門洪武丁夘年詣烈塘祖墳祭掃恐朝暮即世子孫不知所葬者為誰且追念墓松在昔為邑里諸宰木之冠感愴寫情并圖葬穴以示兩子及孫使識之以永其孝思其詩曰百年兩度桒田変三世十阡蒿里同華表前時曾駐寉長松何日再蟠龍情鍾寒食蘋蘩外淚洒春暉草莽中老我客鄊歸不得空勞杜宇喚誰儂次韵答江隂鄭教諭見寄楊子江南山水竒杏花壇上晝隂遲魯魚􅕀豕讎經史江鮆河魨閲歲時兩邑相望三舍地九年凢寄𢾗篇詩恨無縮地仙人術把酒論文醉不辭葉道士逰仙詞海變兮揚塵折若木兮風斤繄抝抝兮寓世仍猨寉兮同羣冠切雲兮霞佩雜三秀兮蕭艾從喧囂兮萬籟聊逰戯兮方之外混混兮和光忽蟬蛻兮㘭堂凌虚空兮鑠渺茫一瞬息兮三千霜吾不知其果何適兮祗死守乎康莊輓萬拙齋曹横山下萬家莊喬木隂隂夏亦凉法曲琵琶彈鋏撥髙堂窈窕捧瓊漿素衣忽𬒳青蝇汚赤手幾遭猛虎傷賀客未還来弔客老夫㕠涙洒淋浪閏六月廿九日飄風動地自黎明掘起破屋拔樹衆皆驚懼至夜方息次早余追念疇昔憮然作歌三家村裡老詩翁獨木橋邊一釣蓬敗壘曾聞屯狗寨荒湫猶説是龍宫勢傾東海前年雨力撼南山昨日風可笑生来誇壯胆兩番如阮哭途窮葛節婦葛節婦家住崑山陽芳年二十良人亡呱呱兩兒泣蘭房一在襁褓乳口黄塵昏破鏡無復覷孤燈相伴慰凄凉霜風自冷木自落辟纑不知秋夜長重門深閉四壁立縗麻淚􅊜三年䘮惟時率土皆戰塲疇能訓兒知義方熊丸在篋螢在囊呼兒乂手立侍旁魯論二十篇孝經十八章阿母授讀聲琅琅母不姑息兒能自強從師不出鄭公鄉腹笥有書牙頰香朝夕悦親萱草堂母今年踰五十霜菽水可􅌚時且康觀風使者恐未知邑有野史揚芬芳玉峯父老来比徳衛共姜我言共姜無此兩兒郎哲哉此母非尋常盍亦作歌與史相激昂寄清真觀提㸃余復作祖餞昔年詩最好客来今雨話玄都步虚壇上三花樹讀易􅑵前九節蒲恬飬氣同龜息静清修形寉容似鶴形癯儒林老友袁徴士曾道區區折簡無代簡吳中衡一夢今年一去年兩番相見兩相隣牽蘿𥙷屋仍徒壁賣藥修琴又斷絃滆浦夕陽紅樹下淞江秋水白鷗邊何當載酒乗秋興来徃風流似雪船寄題詹伯逺蘿屋大車方檻檻小隱自寥寥門掩牽蘿屋溪懸挂樹瓢一從滄海変屢却小山招滆浦居相近城闉路匪遥洗心常玩易忘肉似聞韶苔徑春風掃瓜田夏雨澆姓名編令甲踪跡混漁樵蝌蚪藏書種蟾蜍作研僚訓兒燈火夜飲客歲時朝清白真能守緇黄不妄交茍焉田野樂老此聖明朝寄語青雲士巢由不見堯雪中遣興横山寉髪翁小巷龜頭舍一爐置中央四壁塗縫罅晨粥食近午晝户閉如夜舉足手扶杖縮頸頭蒙帕拔木飄風静宜麥大雪下公家租賦畢農圃犁鉏暇沽酒黄公壚分肉陳平社有時聚親戚談謔弄盃斚有時呼子孫舞蹈歌風雅舊竹幸平安孤松正瀟洒一笑謝梅花騷無𥙷亾者贈張鍊師名善淵我昔諦觀韓子詩春秋書法風雅辭九流百家蘭鮑雜直筆褒貶非無之嵩山道士姓張氏大篇舂容獨稱美嘉乃丹衷献赤墀欲撻羗夷安晉鄙天顔咫尺千里同母氏連環來夢中忠孝並存方寸地翩然歸袖舞春風淵今同姓復同道親愛又與同懐抱靈修未得一品題蕭葹竟混金光草嗟予學韓年近百吟骨氷清頭雪白内交豈無黄與緇轉首多成兩塵隔淵乎淵乎識道理潮州老僧差可儗敬留衣山靈起舞烟霞喜悼大林庵主日公三光掣斷駕三車一笑今朝喜到家方外旦評喧衆口淤泥藕出白蓮花熊耳峯頭有客歸相逢還着舊禪衣五山十刹都傳語莫遣閑雲出岫飛憶昔雲林訪舊遊空堂六月靜如秋㷊香坐説西來意門外青山亦㸃頭一住横山二十年山中木石盡通禪老夫載雪重來日誰折梅花送上船輓無錫王門無車馬送迎忙身混泥塗寵辱忘涴火有時持䑕布濯纓何異在滄浪九龍山中下青丘葑雙鯉池中碧草香生子賢如黄叔度牛醫千載共流芳感事二首草暗日欲落山廻路轉賖叔敖呼不起誰擊兩頭蛇蹊田牛奪去立仗馬令肥安得春秋筆公然决是非邀舒文允小酌春秋連兩年喜事忽今日佳期一百五有菜二十七呼孫貰酒尊速客聚圭蓽風廻落花舞雲開逺山出鷸蚌自相持雞䖝誰得失鄉無月旦評丗乏春秋筆長揖謝知己永言保貞吉題秦仲暘雨竹湘山之陽湘水隂鷓鴣聲中雨涔涔此君一别知幾載别後桒田変滄海客来今雨重相看歲寒風節依然在餘事不許多感慨送徐士方之登州黄縣學教諭丗態趋炎素所憎校官應喜冷如氷絲桐聲續龜山操膏火光分海市燈大釣六鰲將有兆髙堂三鱣豈無徴寄書黄耳還家日莫惜題詩貺剡藤觀音栁肉髻珠纓自在身何縁化作栁中人三眠未足風扶起似怯春寒翠黛顰羅漢松余子素拙詩至詠物則其拙尤甚故昨效諸公賦觀音栁俗陋可笑今又羅漢松可配前題再用出醜盖欲求刻畫無塩変悪為羙勿徒笑其醜云十八羅漢十八公身前身後將毋同一行九里西湖應供誰家去雪中次韵答鄭玄齡見寄青年肥遯方求志白首貧交獨念予開徑掃花僮起早敲門看竹客来踈匣藏神物蛟龍劍架揷古文蝌蚪書風雨一春門不出門前車馬自紛如宿僧房澹泊齋鐘鳴雨楼風滿天金猊吐盡旃香檀誰知林下一宿覺我有石上三生縁懐郡城諸友余生篤親友平居𢾗相過老去筋力疲此心尚如故年年二三月晴暖入城府舞雩童冠俱所樂随所遇安知今年春十日九風雨甚疑媧石漏無石可修𥙷一榻髙堂眠四壁蝸篆古床頭丹茵出青苔洒庭户羣芳狼籍盡来牟半紅腐我耳未全聾聼之亦良苦頼有二三子時復供樽爼或歌竹枝詞或賦梧桐句鏗鏘迭倡和所樂勝鐘皷歸舟挂晴㠶快若馳馬去圓天炯青銅新渌漲南浦候門童推奔滄洲舞漚鷺峩峩屋上山厯厯山上樹白石喜不爛且無泥滓汚不見黄𥘉平散卧羊無𢾗尸坐對烟霞神交憶支許何時松葉酒薜蘿徳星聚瞻彼片雲内援毫抒情愫賀太平寺􅊰主生公坐擁㸃頭石野老来聼焦尾琴祗樹獨園春又夏雜花千界古猶今壁無畫水傳竒跡塔有風鈴作妙音安得刮除㕠眼膜時倍杖錫一追尋感興前四句後旬日始足成之折四月𥘉九日自城中抵家得兩目眵昏耳又聾僅存方寸古秦銅忘机自得親鷗侣含弩從教伏射工百越溪山詩枕上四時風月酒杯中惜春無奈春狼籍頻遣蒼頭掃落紅端午日懐古五月五日追前賢九歌九章鳴素絃蛟人應泣魚腹葬龍伯合贈龜毛氊招魂感舊痛梁壊反騷美新圖瓦全楚天盡䖏卧逰去艤舟酹月羅江邊西塘詩爲郭彞倫作具區東北三十里家住西塘水之涘滄洲不浣軟紅塵一境波光照􅑵几西塘本無風物竒有功于民民稱之旱田霑溉𢾗百頃苗無稿死年無飢非湫非壑非瀚渤不為蛟螭作窠窟輕舟徃来快如馬撥棹人如執鞭卒東隣西舍雜漁樵朝出暮㱕歌且謡白紅荷葉紫菱芡􅍉苕蘋蓼蒲蘆茭髙齋讀書歲年乆鍼經一編常在手客来問疾或問竒拄杖挂錢船載酒人生有此林塘幽不妨未老先菟裘地因人勝從此始千古萬古芳名流端午後雨阻過詹氏蘿屋即事賦絶句二首代簡風打船頭挽不前船回雨㸃大如拳請看六日蟾無用且得爬沙手脚全瀕溪𢾗家風景幽溪流過門東轉頭黄梅雨少麥大熟賣布輸官不用憂人靣獸懲元悪也悪不可縱天不可欺故作二詩以懲之人靣獸長七尺人衣冠人飲食靣有七竅皆人形猛獸之人心莫測生来害物固不少羣居猶自藏牙瓜一朝忽欲咬殺人豺麛熊文皆驚倒其二人靣獸聼吾語一人受害一家苦爺娘妻子令失所殘忍胡為至如許人言汝性多隂毒中汝毒者悦汝目快汝腹汝心方饜足嗚呼馮婦或再生獸乎獸乎勿横行恢恢天網布八絃莫道網踈可漏天聾盲追悼諸葛用中舉子業學琴袁子方先生折諱端幼年能冩大字既習門折之楊子江南疇曩日吕蒙城裡一文星科塲早試程朱易玄學旁參道徳經愚與通家心甚赤賢能知己眼常青草生書帶人家喜竹作詩筒使不停着䖏溪山朝載酒有時雪月夜揚舲卜隣晚欲從王翰分席尤加敬管寕一旦陵谷驚変改十年兵火苦飄零扣門幾語風敲竹泛宅長如雨打萍天上玉楼俄有召月宫娥藥竟無靈細君冠佩全貞節先丗箕裘祝寕馨名溢東吳滄海國魂歸北固白雲屏両家相去百餘里一老今踰九十齡聫句每懐吟石鼎聼琴頻夢坐分亭柱題應有能言鶴儗踏秋風去一聼寄鄧秉文二首曹横山下聱叟吕蒙城中放翁何夕舉杯邀月中秋鼓枻乗風鉄柱硉矹二老璿霄沆瀣三更絶口不談時事掀髯聊叙平生寄陳彰逺明逺兄弟金牛臺下帶經鉏長鋏無聲食有魚兄弟五人雙璧在箕裘三丗一㕓居中秋明月最端正長夜浮雲或巻舒覓得丹梯上天去同將物理問何如寄辛至善青年即着逺逰鞭白首仍居小市㕓寂寞蓬蒿三徑在辛勤父子一經傳奔牛堰下水到海射虎亭西山挿天我欲抱琴尋戴去中秋相近月將圎寄清微觀周石泉塵揚滄海廿餘齡幽舘翬飛壓庱亭風埽刼灰南土樂天開圖畫北山青丹砂九轉龍蟠鼎玉漏三更寉聼經諸葛仙翁呼不起正湏金石播遺馨三笑圖蕳寂先生五栁翁襟期適與逺師同過橋相送忘相别千古風流一笑中風雲雷雨畫四首芸芸萬物生蘧廬盎盎元氣槖籥吁偃禾拔木有未㑹請君細讀金縢書漠漠閑雲淡淡容不為蒼狗未從龍直湏霖雨功成後依舊還山伴赤松金電光中霹靂飛殘臣胆落震驚時雲收雨散青天出能聼無聲有阿誰誰挽銀河沃太空思沾赤地洗爞爞隂陽爕理天家喜都在丹青筆意中野雲歌為王元一羽士作山中之雲歛踪跡空谷深藏伴泉石從龍之雲雷電俱四方行雨勞馳驅飄然一片雲在野看来最是悠悠者或舒或巻無朝夕南北東西随所適道人含笑松下坐我即是雲雲即我買臣讀書圖噫予㑹稽守素行何卓絶采樵工或餘誦讀聲不輟青柴担頭春赤脚林下雪富貴知有時妻子從改節髙風一如此後世誰可埒吾將訪遺蹤更得探禹穴薦福寺紅梅詩紅梅閣事見毘陵志等書庚溪詩話載程致道詩有春風日浩蕩醉色回氷肌之句元末兵燬今夲山釋源公竺淵恢復舊刹重植兹花丐予詩記之紅梅閣下梅花樹陵谷変時風拔去堯峯老禪歸故山覓得孤根栽舊䖏年年春到花節時一株玉出臙脂雪春風笑靣歲寒心光塵混融風韻别老禪道眼忘妍醜品題假我扶犁手黄州定慧海棠花可與齊名傳不朽月香水影象王宫雜花丗界將毋同幾度拈花有人笑吾將請問瞿曇翁源竺淵以道西傳等和予詩亦蒙見贈予因復次韵酬之支許論交世所欽昌黎亦聼頴師琴深山大澤多遺逸明月清風無古今閣下梅花桃杏色庭前松栢海潮音冩容代有丹青筆電目誰能一照青獨孤公檜詩唐獨孤憲公爲常州刺史時有手植之檜今見諸郡志等書元末樹毁于兵至此二十餘年爲州民者宜再植以寓思賢之意况周有鍊師爲松菊主者乎率尔口占呈乞諸縉紳先生更唱迭和相與賛成亦庻乎厚風俗云憶年十五六好古尊前賢𥘉聞獨孤檜快覩曾争先蒼然一株枿舊根皴皮錯節枝葉蕃適逢夜雨半身􅊜疑是徃年甘露痕孔明廟前栢相似乃在陳司徒廟之後園向来陵谷忽変改化作刼灰飛入海神焦鬼爛救不得桐鄊自此無光彩幸存一曲欄杆石題公姓氏留遺跡石苔斕斑土花碧相伴銅駝卧荆棘予從海上避兵歸幾度摩挲長太息懐哉古之人好賢意無窮咏甘棠愛召伯賦菉竹美武公憲公此樹堪比隆後人寕不仰髙風玄都道士桃千樹一檜區區豈難錯龍鍾野老及羣英亦愧因循坐遲暮檜乎檜乎重培植風枝相樛霜幹直邦人具瞻仰遺徳見樹猶如見顔色六百二十五年如一日題牽牛圖為丁學古作不放桃林不飲池牧童牽去意如何南山石爛今非昔寗戚無勞扣角歌題鷺鷥便靣為丁學古作潦倒滄洲客蕭條白鷺詩牧之呼不起此意少人知出門老去多懐舊興来時坐馳出門窮鬼笑罄室故人知野飯新菰米詩囊古竹枝諸孫溪上别矻矻問歸期題僧房澹泊軒我愛澹泊軒山居城市中雲分半間許雨溜四壁同風林金石聲道人氷雪容澹然味無味泊然空不空露坐㸃頭石雪立摩頂松吾徒幸相與吾道喜不窮一笑兩忘言落花舞廻風江山漁樂圖𢾗口妻兒網一張船為家舍水為鄊江南江北山如画欵乃聲中送夕陽崑山王有恒以詩書附常州天寧寺長老寶公問予近况作詩荅之併索諸友賦重植獨孤公檜詩客從笠澤来常郡書到横山問老夫哭子哭孫家已破賣書賣劍酒還沽千墩每入龜巢夢十月應開獸炭爐支許舊逰煩寄語肯題唐檜和巴歈黄林屋許贈皂布不至戯作此索之嚴霜倒蓮葉龜巢寒縮首欲褁緇布巾并簏瓦盆酒此酒今已熟此巾曾製否抱膝梁父吟炙背坐南牖老况知音誰横林隐叟贈天寧寶滄海臨濟雲礽幾代孫猊床說法象龍奔庭前銀杏西来意陌上銅駝東郭門四海共沾新雨露一舟能泝古淵源留衣人逺衣何在别有伽黎遺後昆悼城西周彦美二首七十六年事梨花夢裡春家傳三代禮身作両朝人負郭田園樂連雲第宅新麒麟三槐堂上客最青春吐酒常憐我奕碁多勝人竟作白頭新釃酒橋玄墓澘然為泣麟龜巢藁卷之八終, WYG: ''}
