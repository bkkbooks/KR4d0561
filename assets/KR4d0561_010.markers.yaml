  - {type: variant, offset: 8563, length: 0, content: '', WYG: 和紀叔維中秋清夜尋常秉燭逰况逢明月桂花秋君吟梨谷揮椽筆我泊楓橋倚柁樓白雪似添雙髩老青天不著片雲浮老夫酣適遥相似座有潘郎便善謳題王叔正江村讀書圖紅葉江上村青燈案頭書長年門不出吾道竟何如叔正過訪傅恢書記寄聲作詩寄之余澤歸來王子猷問君知與對滄洲一灣流水市塵逺兩岸人家煙樹幽客至白雲分半榻興來明月載孤舟如何不到淞江上卧看蘆花雪色秋和馬公振江上早行聞君拂曉渡婁江觧得江妃玉佩雙旭日曈曨初挂樹浮雲變化忽成龍路旁客踏前車覆天上人遭恐杖撞俯仰古今成一笑春風頼有酒能降和衛澄逺雪詩洋海氷寒若凌隂坐看飛雪積來深出門總是瓊瑶地繞屋皆成薝蔔林為説擒呉今李愬因評怨華古羊斟兎園詞客飄零盡撚我霜髭為一吟和楚蘭江禪老應制賦擁翠亭之作翻經屋上煙霞客擁翠亭前雨露多道載三車還報國詩成七步口懸河衲衣風拂天香染錫杖雲隨御輦過聖主得賢方藹藹羣臣寧不賦巻阿寄顔長老江西馬祖不世出城南恱翁雙徑歸芭蕉雨作堂下樂薜荔天生墻上衣繙經猶能作細字秉拂孰與談𤣥機别來半載㡬相憶江岸小桃花又飛和陳思忠過王德修草堂曲塘楊栁似蘇隄編戸菑畬比鄭陂春日鶯花圖畫裏秋風鷄黍故人期開樽許共傾蕉葉出妓應教舞柘枝老我杖藜慵出入草堂遥望為題詩次王修德韵茅堂有酒時一中少陵郊居今瀼東絶憐春水漲新緑不著市塵飛軟紅百年禮樂重制作四海衣冠今㑹同幽棲正要人不識莫厭門徑生蒿蓬和呉斯民感懐詩到}
