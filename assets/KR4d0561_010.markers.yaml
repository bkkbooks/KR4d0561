  - {type: variant, offset: 6509, length: 1, content: 濵, WYG: 濱寄因本初講主愛爾呉江水西寺門前流水碧于苔松花布地金無數蕉葉繙經紙萬枚講席每留詩客坐浴堂曽為國王開别來雨洗秋容净凉入袈裟亦快哉寄謝楚芳鄉城一别十五年别時𤣥髪今皤然無聲詩與有聲畫彼此贏得虚名傳君家有子為時出且喜讀書兼讀律絶勝吾兒但筆耕三徑蓬蒿塵滿室老夫宿如龜六藏思君見之羮與墻移家同飲太湖水尚期東壁分餘光代簡崔宗明掾史孤坐馳遐想羮墻見若人宫墻今畫省家世舊朱輪南國梅花早北堂萱草春慈顔應有喜過客總儒紳二落葉擁柴扉吾兒日暮歸手持毛義檄身著老萊衣客路風塵乆青雲故舊稀何當報一飯不遣此心違夀徐主簿昔君濯濯如春栁鞍馬日隨丞相後翩然提劍掃蠻煙欲取黄金印如斗一鞭徑渡浙河東東南滿眼旌旗紅手援赤子出塗炭慈溪草木生華風長嘯歸旌行復止濯髪淞江太湖水鱸魚蒓菜非不佳總憶家山舊桃李君今草堂宅東郊有田可耕山可樵堂上慈親足甘㫖相知與結桑麻交金門玉堂紫薇省無復回頭㸔畫餅但愛鵞溪秋水清雪色蘆花一千頃豪吟往往似謫仙但不持盃醉花前盃中之物時有禁煑茶都費惠山泉龜巢老翁不浪出逺來為君作生日草堂此日題此句風竹四檐吹􅓋篥申仲義録事自杭州來議論慷慨風節可喜作此以贈客來試問錢塘事冠葢都非舊日人尚喜西湖堪種栁不知東海欲揚塵手題王粲登樓賦頭戴陶潛漉酒巾如此江山如此客政須傾倒洞庭春和沈啟之立春作何物淮夷學井蛙東風依舊滿天涯春盤薦酒盃頻舉醉筆題詩字半斜無數故人俱契濶一雙老眼近昏花家貧頼有長鑱在坐待青山長蕨芽徐伯樞仲剛來云鄉僧闕刺血寫華嚴成好事者為之盛集緇素送經至呉門無量夀庵時有人以兠羅綿化佛手觀者異之贈言盈軸徐伯仲徵余詩不已故檃括佛氏作此貽之吾聞兩足尊化身千百億諸相即非相非空亦非色云何兠羅綿變現佛手出華嚴海無量本無塵可拭隻手挽頺波正頼佛之力譬如水中月在處照澄碧若以色見之癡雲暗如漆由來標月指具眼當自識暮春陪周明府過顧將軍祠下碑黄天蕩上將軍樹樹下數家人姓顧行人遥指若堂封往事猶論麾扇渡新祠畫藻煙霧濕古木埀羅鬼神䕶長洲縣令枉髙葢短褐巢翁曵雙履海棠正落胭脂雪山缾為酹金盤露柱頭老鶴作人語道旁馴雉隨車駐呉趨一曲歌未了蜀魄數聲春又暮金戈鐵馬尚酣戰白羽清風復誰睹㸔碑莫怪客如雲彼君子兮真可慕端午日徐伯卭過寓所以詩見示次韵南湖風浪惡客至喜且驚連日雨不止明朝隂又生划船海中歸戰鼓江上鳴端陽一盃酒忍聽歌霖零簡徐伯卭淮海十年猶亂離清江一曲自棲遲門前纔送催租吏籬下還吟採菊詩世事紛紜何日已襟懐瀟灑少人知卜隣欲近蘆花渚我亦扁舟理釣絲寄徑山及以中長老重攬凌霄絶頂秋歸來笠澤繫孤舟青山何處無黄犢滄海相知有白鷗六合雲開天蕩蕩百川風静水悠悠試聽漁父滄浪曲江上蘆花亦㸃頭夀慶治中日下歸來年復年之官未上浙東船人憐埀老身長徤自喜居閒志益堅好客毎呼隣舍酒教兒不惜買書錢試㸔尚父鷹揚日渭水秋風雪滿顛次韵寄題碧雲禪老上海縣山居青松種來過屋長松濤六月生秋凉香凝笏室静如水道人觸法俱相忘二住庵人似南泉老無數青山在屋頭眠鹿堦前金布地西風吹老桂花秋三門前問話人立雪想象吾家㳺與揚靈禽盡得響天樂老鴈獨憐隨稲粱四海上諸峯絶㸃埃浦泉流水碧于苔何當借與梅花屋我亦移家嵗晚來又和律詩笠澤東連海好山青更多逺分苔脯供兼寄草菴歌拄錫僧方去攜琹客又過送迎門不出奈爾懶融何寄沈德齋入城每問東林老避地今居巢海頭秋半即嘗菰米飯冬初已著木綿裘青衣擣藥隣鮫室烏几燒香對蜃樓我欲移家相近住釣竿煩為覔滄洲為源長老贈醫士單子達老我無他伎憐君正妙年父書能盡讀醫術得親傳舊隠荆溪上今居笠澤邉幽蘭紉古佩采藥洗春泉鶴守燒丹室鷗隨載酒船毎聞驅二豎近喜活枯禪優鉢微含笑頻伽喜欲顛却還青玉案持去白雲篇髙誼能如此明時豈舍旃政須醫國手為我救顛連普大雲講主以紈扇畫蘭見惠作詩謝之時雲在呉江普度院講法華經學徒甚衆上人遺我白團扇扇上復為蘭傳神足知清興迥絶俗更覺幽馨時襲人猊座講經雙樹下龜巢織屨五湖濱明朝相約㸔山去不怕西風揚逺塵寄朱原道昆季太湖三萬六千頃流血水腥江海連㡬處焚舟成赤壁有時飛礟落青天雞蟲得失那能問鴻雁飛鳴亦可憐若箇桃源堪共住也須容我釣魚船臘月三日偕俞寛仲過篠涇僧舍䝉舉似近日詩次韻一首故國溪山各逺離倚樓長笛為誰吹相逢上海三生石共惜邉風兩鬢絲客舍暫如桑下宿世途危甚劍頭炊明朝裹茗西菴去更約匡衡細説詩勁節亭詩為中半雲講主賦我本山林人此君與群居頻年避戎馬出走荆棘途雙溪適相遇嵗晚氷雪餘蒼顔固云老清氣方凛如儼然古君子節勁心仍虗紛紛桃李花榮悴纔斯須長松髯似㦸亦作秦大夫我思首陽山竹君兩遺孤髙風激頺懦氣節與君俱之人不復見見君如友于此意知者誰居停老浮屠緑琹為我彈碧酒為我沽萬事付一笑嗒然我忘吾懐徐伯樞諸友憶昨方卧病妻子呼避兵扶持上輕舟烽火照夜明問兵今逺近言圍闔閭城頼有風滿㠶送我東南征三宿坐不寐鶴鳴近華亭晚泊青龍江蘆菔匝地青新知適相遇留我居篠徑土風頗淳朴地僻雞犬寧吾病日已瘳客來能送迎老叟心自憐或謂詩骨清比鄰兩三家情親若平生園蔬日持送酒壺時共傾對酒不能樂艱虞未忘情懐哉數君子雨打水上萍漂揺各何許吾將尋舊盟賣刀買黄犢子孫共春畊奈何西枝西礟石猶雷鳴偕俞寛仲逰普光寺俞作詩紀行余和一首繞屋踈筠玉有光沿堦細草翠生香林藏鹿苑雙溪曲路轉龍江十里強蕉葉繙經人自樂槐根做夢蟻何忙白衣二老來聽法甘露醍醐得試嘗臘月廿日㑹林才元于普光方丈詞氣峥嶸吐玉虹山林興與老夫同獨憐幽草來西磵共聽枯桑呌北風四海十年兵火後雙溪一笑夕陽中評詩為掉樓卿舌殊勝儀秦諂七雄送和彦良兼簡朱端卿移家喜得好林泉甫里先生古宅邉憂世頗添新白髪校書還坐舊青氊秋風茅屋都無恙臘月梅花正可憐我有古人多古意斷琹煩為續朱絃贈張孟文青龍江水清如玉青龍故家書滿屋中有郇公九葉孫一目五行能盡讀科名未欲拾地芥燈火長如校天祿有時述作繼風雅三國六朝車並轂手揮赤血㧞鯨牙琹斷𤣥文裂蛇腹雙溪近傳寒食句又出唐人一機軸相逢説項人益多宛見清標立霜竹吾生愛詩入骨髓老去窮吟鬢如鵠金張許史懶折腰沈謝曹劉長在目江頭偶泊避風船故山將歸采黄獨金盤不必贈檳榔願覔奚奴珠一斛次韵贈本蘭上人庭前手植娑羅樹樹下頻繙竺國書失鹿不知秦二世𦵏魚那問楚三閭園收柿葉皆新紙林養松花當宿儲十里雙溪春水綠浮杯待復訪樵漁余患癰疽適兵後無醫藥可療即事口占并寓感歎吮癰人在五侯家市肆都無藥可賒童子歸來風雪夜老夫愁絶對梅花次韵徐伯樞見寄病卧北山乆愁添白髪新一冬無雨雪四海尚風塵妻子移家逺親朋折簡頻梅花應笑我出語欲驚人二客夜牛衣薄王春鳯厯新東南蝸角地多少馬蹄塵鼙皷依然急壺觴莫厭頻君㸔塞翁馬得失豈由人奉贈薛宗師及于薛二真人論道清寧日承恩紫極天星言辭輦轂雲卧樂林泉虎衛燒丹室龍畊種玉田居山閒宰相行地活神仙清問時猶及𤣥談世共傳春秋今近百弟子動成千入室稱于薛承歡度嵗年蓬萊方丈外磧隩澱湖邉别墅三花盛深居萬竹連玉桃紅綻雨瑶草碧生煙麟脯供仙饌鸚杯舞醉筵雲璈齊上下霞袂各褊􅝆福地風塵逺壺天日月懸目光方炯炯眉夀正綿綿老我頭埀白尋師志在𤣥飄零隨草芥佩服集蘭荃欲進圯橋履重來笠澤船山靈原有約石髓未應堅析理秋毫末研㡬太極先黍珠當一照光彩徹天淵早春訪蔡君立家以詩見贈次韵荅之老夫藜杖病初起幽谷蘭花喜正開持酒對花留信宿賦詩題竹約重來一犁新水初春雨百蟄皆驚半夜雷嗟我無錢堪買犢歸畊心亦冷如灰正月卄三日過許君善竹所留六日日蒙置醴且出諸畵巻命留題焉茅屋秋風杜陵老桃花春水許家墩連宵共剪西忩燭每日頻開北海尊童稚問譍知揖讓鄉鄰見客問寒温遲留不厭逢多雨喜得題詩萬竹軒余過横塘訪趙朋南先生值回錦溪遂留許徴士家雨牕因覧元夕之作次韻代簡行路難行乆不禁尋君欲吐别來心十年飯顆詩容瘦一病文園渇思深鹿浦繫船逢積雨客忩拄笏見遙岑誰能縮地仙人術共聽花枝快活吟安素齋詩為髙彦舉作羲皇世云逺淳風浸彫零紛紛慕浮華形役心靡寧惟爾為觀者於物澹忘情天君常泰然月白霜潭清羙玉非不沽沽之價連城向來莘野農釋耒即阿衡磻溪釣魚叟飛揚乃如鷹湯文茍無遇耕釣畢此生懐哉古之人安素斯足稱溪西小隠詩為許君善作馬鞍山南三十里鹿虞浦接横塘水桃花兩岸小橋西蘿屋數椽修竹裏先生頭戴烏角巾青鞋不踏東華塵扁舟溪上釣明月長鑱隴頭鋤白雲客來㸔竹呼隣酒客去對山開北牖琹彈古調每横膝筆冩新詩長在手自言得句如得官富貴却作浮雲看青山有約如不爽白鷗之盟奚可寒箕山乆矣人寂寞眼底誰能如此樂文章多樂鸚鵡洲衣冠俱上麒麟閣老夫幽懐欲與論移家今近西枝村風清月白憶𤣥度莫怪杖藜來叩門題孫彦學所藏江貫道清江汎月圖吾聞老郭之傳許與江山水絶筆稱無雙此圖夜景江所作彷彿秋聲動林壑長江澄澄月在水逺山蒼蒼樹如蟻如此江山夜放舟若人真是逍遥逰爾來一百四十載陵谷變遷畫圖在世無蘇李兩詩仙赤壁采石俱蕭然老夫此興固不少觧裘亦足沽清醥出門有礙行且休不如燒香看畫海上頭雪山圖憶昔山居擁寒雪夜半讀書聲未歇長林月在挂猿枝幽谷風生藏虎穴十年奔走避兵塵手持一竿滄海濱適因㸔畫長太息青山頭上亦如人普講主寓普度蘭若十一月望為㳺軍檢括是夕以稾稭䝉首露坐陸氏莊埃燼中怡然賦詩余嘉其言無瞋恚和而美之道人心如如説法無定處無喜亦無嗔亦無諸恐怖初聞戎馬來杖錫出普度羣氓棄家走子女多失怙或遭刀箭傷或受係累去或作蚕聲哭或為折腰歩裸跣走且僵煙塵晝如暮師時在中野亦值一强禦猛若歌利王殺佛渾不顧手持霜雪刃聲發雷霆怒惡状冠羣醜丹青筆難措脱我僧伽黎問我石頭路搜索祗園金檢括青州布區區身外物自謂無足䕶把茅聊葢頭露宿吟古句干戈雖未息江山喜如故相期㸔餘春牡丹花貴富和趙朋春詞落梅風急綺疏寒檐鐵鏘如響八鸞堪笑嬌癡兒女子折花騎竹繞長干二多謝提壺不住鳴杏花枝上月三更銀罌卸盡葡萄緑祗為傷春醉不成三小閣鈎簾待月時燭花頻剪夜何其惜春不奈春宵短翻憶秋宵玉漏遲四花拂盆池入鏡光桞揺臺榭弄鵞黄晚來頗覺東風惡分付薫籠爇暖香逰南山和徐伯卬韵諸君南山逰豪吟氣憑陵惜無龜巢老拄杖移赤藤俛觀陳湖水一槃秋露澄吾兒躡吾屐樂與君共登坐草藉苔茵尊酒空十朋埀楊細腰舞不費纒頭綾羡君方妙年文章有師承譬彼學佛者當為大乗僧滂沱夜來雨紅日喜初升楊花飛渡江茫然白雲騰晨看有聲畫妙若曹不興兹山頼有傳詩名與俱稱和臨寒食有感何處登臨散客愁千墩浦上聽漁謳清明落盡梨花雪能得春風㡬日逰二憶得少年寒食日落花塵上馬蹄香六龍城郭春如畫那得旌旗帶雨揚三烈塘墳上樹如雲一埽東風十五春不信令威歸不得竟移華表屬他人四一徑落花春晝静四隣嘉樹綠隂繁兒曹忘却懐鄉意浪説春風似故園五白髪蕭蕭客未歸凄風𦂳雨禁煙時青苔白骨尋常事堪笑田文為客悲遷居迯難居頻徙幽懐孰與論崑山一舍地湓浦數家村老去仍為客朝來又抱孫雨餘春韭綠生意滿東園聞玉山顧隠君以賦役入城負疾而歸而山中花竹多為有區區懐思寄詩代簡聞道龎公也入城還家風雨近清明催租人去詩仍好市藥童歸病已輕尚喜竹林青笋出不嫌花徑紫苔生野夫得此平安信尋訪姑遲數日程哭杜玉泉處士每憶城南杜今為地下郎好詩留巨帙遺像在髙堂濯濯孫枝秀離離宰木長可憐桑與梓春雨竟凄凉二東郭溪山勝南園花竹深平生多樂事之死遂問心挂我客中劍撫君牀上琹廻風吹桞雪和淚落衣襟四月二日林自瑶城歸寫遷屋詩四首因以述懐并紀時事鶴長鳬短世難齊滿眼風塵客路迷竈突未黔居未徙兒曹况在兩湖西二六幅蒲帆帶雨來瑶城艇子􅂈湖來老妻正倚門前樹雪色楊花覆緑苔三僦得山居鑿井新客來不厭煑茶頻屋頭驀地顛風起狼藉桃花滿樹春四髩絲埀領白􅆴􅆴老我身如作繭蚕午夢忽驚飛礟響狼煙只在澱湖南余往哭杜處士過淞江問途乃知其弟玉溪亦殂去兩月追懐宿昔作詩悼之往歲留三宿今晨哭二難榻懸無復下琴斷為誰彈溪竹春雲散庭花夜月寒悲乎浮世事長夜雨漫漫荅徐伯樞見寄十載風塵走朔南白頭如雪面如藍借車載具家頻徙應俗為文筆大慙茅屋雨添苔上壁竹籬煙䕶筍抽簪别來行路難行甚何夕挑燈與細談二杜宇催歸不絶聲知君歸計正留情東膠茶焙春煙暖西堠花村夕照明音信尚煩黄耳寄交情不負白鷗盟明年築室相隣住兒軰求田與力耕邀管伯齡許君善鄧宜之端午小集十年端午常為客一笑今朝有故人江草碧揺書帶净石榴紅摺舞裙新潮生小港通船路風掃幽軒振席塵酒禁未聞罍爵恥茶鐺爛煑兩旗春邀月田上人借得溪鷗半席沙相期來喫趙州茶渡江賸有蘆堪折日落潮回即到家次韵答許君善見貽憶昔平居頻㑹友家有秫田今釀酒安知今日對端陽無酒可澆談笑口客來置茶聊觧羞強將車轄井中投清風緑樹北忩起時聴一聲黄栗留西山雲起日將暮斯須雨暗横塘路銀燈纔㸃即生花為我喜君青眼顧我心如醉顔如酡憂時未寧今老何明年此日復此㑹此時還遣玲瓏歌即事黄梅落盡雨初晴客舍青苔四壁生鐡礟打城聲動地老妻猶訝是雷鳴代簡大雲講主天竺之書五千巻吾師以之全藏轉早年手握摩尼珠飄然擲錫逰天衢歸來濯足太湖水從此一龕兀坐如枯株有時忽作獅子吼狐狸野牛顛倒走有時閒寫山水華華光之梅作清友近聞有約過貧家貧家掃門迎象車欲知老夫何物作清供湓隂小圃自種崑崙瓜朱公路縣丞和徐伯卭詩見示不為險韵窘束余甚喜之故復和一首以寫起敬之意瓜廬淞水西溪山勝東陵玉立開徑竹纓埀刺檐藤善養氣不餒静觀心澄澄白雪少人和青山與誰登稽古蓄萬巻問竒來逺朋顧余犢鼻布不識馬眼綾來詩清可喜玉露仙掌承想當締思時寂如禪定僧詩成掃巨筆墨汁飲數升干戈有時休雅頌當復興願同杜拾遺一代詩史稱夀張實甫我愛龎德公躬耕亂離日以安遺子孫此計真第一君今牀頭金有餘傳家之計乃亦如况入東林逺公社每誦西竺空王書幽棲乆矣機心息鷗鷺相知俱莫逆獨憐丹穴一鵷雛偶爾西飛歸未得願言晚節金石堅河清復見昇平年明年此日夀觴舉三鳯聨翩郎罷前寄贈勝無能上人雙林舊宅今蘭若百丈清規老作家燈燃佛龕無晝夜榻留禪衲共煙霞屋頭青覆娑羅樹池上紅開菡萏花六月香風清似水老夫曽此坐鷗沙丁未夏六月寓真覺庵數日日賦小詩以寫目前之景適大雲師遺雙清圖足成十首祗樹園林舊雨荒僧廬今喜近滄浪我來一榻南牕下分得溪風午夜凉二臨溪照見影稜稜老我頭童狀若僧堪笑讀書心未死夜來猶對佛前燈三燭龍銜日出東溟飛到天中落火星莫怪懶融門不出一林翠竹風泠泠四荷盃飲露比名酒松麈生風無俗談日落清蟬吟未了雨來白蟻戰方酣五髙堂無塵清晝遲山僧持鉢未歸時白衣仙人坐相對净瓶楊栁青埀埀六客來自汲煑茶泉躄足浮屠亦可憐借我石牀箕踞坐有時閒說趙州禪七㯶鞋布襪苧衣輕好客何妨日送迎試聽礟車飛霹靂將軍觸熱正鏖兵八雙林一室捲微疴列坐羣緇問若何不用散花天女軰儼然無語老維摩九芭蕉葉上遍題詩更覓呉牋寫竹枝過客莫嫌人寂寞髩絲禪榻正相宜十生愛梅花與水仙故人摹冩寄林泉披圖净寫燒香几何異長齋繡佛前普講主過千墩偕余訪許溪西出普公曩嵗所作水仙花求題普為重記嵗月俾余題其左云梅兄礬弟總不見邂逅獨睹凌波仙雲翁指㸃笑相語為我傳神三十年簡蔡君立從事齷齪布衣老生無晉人風杖藜相訪不相見興盡適與王猷同出門喜清飈天氣凉蕭蕭重雲忽迸日六合如洪窑東屯行行行且止賣藥人家杏林裏蜚亷意若迎我歸南薫轉從西北起快哉一披襟長詠出舞雩老夫此興君必知黄金不用鑄鍾期歸去來兮溢水西與諸友論詩次朋南韵每見古人詩不俗恨不移家與連屋人生有詩可傳世萬事無成心亦足嗟哉風雅絶遺音斷絃未有麟膠續三經三緯機軸在文士疇非頼私淑屈原吐詞蘭蕙香能襲餘馨惟宋玉兩京豪華六朝靡聲律由唐轉覆束草堂先生獨冠佩進退委蛇氣容肅孔明廟柏一品題儼然箓竹生淇澳要之煉詩如煉丹九轉成功龍虎伏秋髙當約許𤣥度妙法参諸老尊宿次韵荅朋南重九之約重陽無酒不須賒看菊柴桑處士家只恐滿城風雨到客忩岑寂對檐花贈筆生王伯純時方用武我業儒王生賣筆來吾廬生成世業霅溪上製筆特與常人殊宣城阻兵十三載猶喜山中老㕙在㧞來秋頴帶微霜縛得銛鉏含五彩昔年草制供玉堂玉堂仙人雲錦裳三縑一字不易得筆價亦與時俱昻莫恠年來棄如土掃滌風塵必斨斧生今賣筆我賣文何異適越資章甫呼兒亟用買一束為我寫成懐古錄吾兒作字三歎賞八法以之隨意足我有好音生可知用筆將見文明時栁公筆諫佐明主老我筆畊箋古詩逝將重作毛頴傳為紀頻年遭薄賤牽連為生書姓名守棘不隨陵谷變中秋適逢秋禁開椰瓢酌生新醱醅酒酣仰視月中􅇠長笑一聲歸去來盧志道馬公振以滿城風雨近重陽為詩首句各賦二絶同日見寄要余和之滿城風雨近重陽一望蘇臺百感傷臺下伏屍多濺血秋花不似舊年黄二滿城風雨近重陽門巷蕭條草木黄茅屋破來天更漏誰能補石繼媧皇三滿城風雨近重陽籬菊花開酒未甞四海兵戈無了日十年書劍客他鄉四滿城風雨近重陽猶喜觀山目力長風雨晴時山更好也須攜酒挂車傍兩年九日晴景不同口占二詩聊述梗槩去年重九日烽火接三州黄菊無心看青山滿眼愁風霜新鶴髪塵土舊貂裘為覔桃源路拏舟到海頭二今年重九日兵破闔閭城紅粉娃宫毁黄金郿塢傾老懐多感慨歸思轉縱横頼有茱茰酒開軒看晚晴旭齋劉先生四明隠君子也客呉數年日以詩酒自娱時與予相友善丁未秋年七十有六自謂不久於世為志墓之文及賦詩自挽其詩曰知非終戒酒送我但吟詩且邀予以辭挽之予既為賛小像後五日乃擕酒詣崑勸飲故有是作天生劉伶愛杯酌杯餘更以詩為樂有時痛飲發豪興徹夜長吟追古作胸吞雲夢氣峥嶸筆吐珠璣光錯落知心每恐化渇烏見病驚卧作癯鶴為嫌八達太疎狂乃效獨醒甘寂寞髙陽人笑老癡漢杜舉身遭束高閣我來黄菊似含喜座對青山論鑄錯舉觴一笑口復開盖棺百年心不怍金龜足可換新篘玉兎無勞擣靈藥偃月堂前丞相死齊雲樓下降王縛眼前世事真蟻夢身後虗名等螢爝何如閒策鐡拄杖時復醉傾金鑿落吾詩更作薤露歌活挽先生薦清酌張伯庸在郡城被圍數月間道而歸賦詩賀之雁書到手人方喜虎口脱身君已還難似上天行蜀道險於中夜出秦闗桞營皷角邉聲逺萊子衣裳喜色斑百斛葡萄新釀熱歌童莫放酒盃閑方池詩為馬公振作攜我方竹杖看君方池水宛然俯中庭照影月明裏清風生蘋末素練吹不起魚樂魚自知主人亦應爾和許君善郊居秋色蒼茫日落斜鯉魚風起荻飛花先生晚酌依稀醉吹笛漁童恰到家二書畫船頭吐白虹談𤣥麈尾灑清風繞籬種得陶潛菊時復看花酒一中三堦前有草比琅玕屋上慈烏即鳯鸞老去山林友麋鹿不知貔虎尚桓桓四流水柴門不厭貧古今曽見㡬何人山中松菊陶元亮谷口犁鉏鄭子真五恠底深秋氣候温野花成子竹生孫數椽衡宇清溪曲風雨蕭蕭晝掩門六竹有幽軒水有渠閉門不出十年餘一編修得梅花譜又註神農本草書七朝野新聞總闕如經鋤甘分老迂踈客來留喫雕胡飯旋斫溪頭出網魚八窮到無錐累始輕黄金何用苦留情姑蘇臺榭新如畫又被西風一夜傾九不見魯山元紫芝干戈滿眼少陵詩采樵何處青山好逢着仙人且看棋十一雨洗兵秋可憐東呉香稻熟紅蓮許家墩下斜陽外無數飢烏落晚田淮夷篇大邦淛河西湖郡稱第一淮夷豺柘黄來作豺虎窟交隣無善道四顧距勁敵一鶚嬰網羅同氣頓蕭瑟正朔仍奉漢天恩滿牀笏賦粟嵗倍蓰郿塢金日積非無舶䑲風海運不挂席包藏狼子心反覆莫可測臺閣兩重臣忍為梟獍食井蛙自尊大出入復警蹕愛弟寵且驕開府門列㦸提兵㡬百萬勢熱手可炙甲第連青雲圊溷亦丹碧瑶池長夜飲天魔舞傾國帷幄皆面䛕忠鯁即揮斥權門競豪奢婪婪務懐璧淮南舊巢穴坐視城棄擲出師理侵疆所向皆敗績鄰兵賈餘勇一舉數州得羣􅇯納降去孤城獨堅壁奈何圍數重樓櫓比如櫛礟車拂雲漢晝夜飛霹靂寵弟既虀粉左右皆股栗短兵屢相接苖獠與戮力南濠百花洲流血水盡赤閉闗甫期月人面多菜色蔬食猶八珍骸骨㸑下析衆叛已不知豕突猶親出前途忽投戈回騎不數匹一炬齊雲樓妻子隨煙滅縛虎送臺城咆哮氣方息嗟哉爾淮夷富貴亦已極雕墻底滅亡斯理信弗忒十月過吳門無數雲梯盡未收髑髏如雪擁蘓州偽王守死空遺臭降將偷生忍負羞鹿走荒臺千載後烏啼野樹五更頭篙師也為愁無寐不待天明已放舟過無錫書所見朝發呉門東暮宿錫山下隔墻語嗚咽云是流移者生來本村居白首事耕稼居城僅期月區區避兵馬狂奴稱老虎咥人空四野城降人出闗方幸虎遭冎里胥俄促人負郭一網打監官驅上船寸歩不少假不知遣何之骨肉忍相舍語罷哭聲悲涕與淚交瀉同行十數人瘦骨皆一把鐵索連係頸俛首若喑啞天髙恐無聞爾悲知者寡歸故里憶昔走避兵棄别鄉井去意將朝暮去行行重回顧安知今一紀方踏去時路四郊皆蔓草白日暝如霧披榛訪閭里隔水拜先墓傷哉􅆃令原黄蒿走狐兎别墅破墻在郵亭乃新作隣兒二三軰茅茨晝扄戶相見不相識熟視肖厥父坐乆泣且言為我語親故什九死兵戈餘亡不知處兒詞吐未終我淚已如注對食不能飡相期歸蟻聚吾將語吾兒賣書買農具歸耕溪上田擬若烏反哺吾其正首丘此心庶無負戊申歲訪朋南執中二趙君皆連牀夜話極談今古時朋南以草亭自號工詩有唐人風致不茍作也越數日作詩眷㽞臨别復有魚米之遺執中亦和詩示余意皆有餘而不盡也後十日次韻二首其一寄題草亭兼謝所遺一以寄執中以述交契之厚云圖畫蘭亭迹甚陳谿山何似草亭真晉人標致清談妙杜子詩篇下筆親客至合歡常盡醉我來留宿豈辭頻還家飽喫魚羮飯更喜缾儲玉粒新二經嵗離懐得具陳酒盃深淺兩情真老夫生頼詩書力良友交同骨肉親楊桞錦溪春尚淺綺羅燈市雨何頻别來十日牛衣卧世事如今又一新和施天朋即事二章章五句呉儂頭白雙眼昏夜逃淞上煙水村老妻剪紙招驚魂問之不説苦徭役但言入地恨無門二呉儂十年遭亂離飛芻輓粟筋力疲哀哀婦子皆瘡痍春來破屋雨連日疑是淚從天眼埀戊申春浙西僧尼道流凡主寺觀者皆集金陵蘇州萬夀寺長老愚隠師亦在焉僕嘗夣寐中與談今昔且問及剛中毅公故賦此以寄二老云夢繞鍾山訪舊逰共看江水話閻浮隴西鸚鵡金籠閉海底珊瑚鐡網收刀尺尚須成妙用缾盂未得賦歸休别時問我雙蛾老為道身如不繫舟寄姪僧德無言時在金壇西謝村菴居紅梅閣下夜連牀一别經年十二霜爾父爾兄俱即世吾孫吾子未還鄉西林卓錫青山好東海埀綸白髪長何日與言生死事更論松菊故園荒二嗟我成童即棄家住菴鈍斧老金沙箧藏林下繙經葉缾養山中供佛花浮世本來同一宿歸途必合駕三車白頭癡叔遥相憶燈下修書字半斜馬公振以乆雨懐思作詩見寄適千墩諸友朋為謀道旁之舍因和及之并發巨浸之歎云芳草萋萋春復春桃花應笑未歸人數椽矮屋清溪曲一箇扁舟緑桞津且與往來乗欵段從教圖畫上麒麟老妻頗勝劉伶婦不惜春衣典酒頻二吟罷秋風破屋歌不堪春雨復牽蘿無人為補青天漏滿眼愁看白水多階下縳橋兒渡蟻門前換字客籠鵞可憐豪氣三千丈方覓堯夫十二窩公振和許溪西韵并簡老夫次韵荅之世亂已如此年飢更奈何城池百戰後風雨一春多有酒客同飲耽詩病亦哦老懐聊自適頭髪未全皤和同明府留題趙靈寺大澤水環金刹地小樓簾捲玉山煙桃花雨濯江邉錦榆莢風飛地上錢人世屢驚天柱折佛光還自月輪圓衲僧㑹得頻伽語也學詩人拜杜鵑田家謡花朝一雨連寒食水沒呉田深三尺田家壁立杼軸空逃亡半作溝中瘠農官令下星火飛勸農踏車農苦飢產蛙之竈斷煙續藜莧煑來青藜肥商羊舞如獨脚鬼天瓢倒傾恐未已水車恨不化渇龍一口汲盡西疇水我謂爾農毋怨天堯田水溢亦九年但有人能拯飢渇即令四海無顛連請君試聽踏車歌鼕鼕聲中含疾苦天門九重路脩阻此聲何由徹明主趙真白挽歌辭前代衣冠族先生山澤癯淳風振薄俗髙誼掲中呉舊責焚餘劵凶年賑餓夫紅塵無足跡白雪滿髭鬚鐡硯磨來磷籯金視若無蹇余牛馬走愛爾鳯凰雛卜宅來依倚通家學歩趨玉枝纔有汗瑶草􅃍成枯敬下墳前馬仍瞻屋上烏典型無復見老淚落鮫珠寄謝朋南執中中行諸友兼簡楚綱滄海二禪伯錦溪水流無住時我思故人心如之扁舟來繫溪上桞六月初三新雨後常年大暑今欲流今年天氣凉于秋故人相見不相舍水竹軒亭榻俱下東家談笑復西家西家碧筩瀉流霞醉抽吟巻看珠玉夜牕剪盡如椽燭明朝竟日復留連月在栁梢方解船瀕溪更有好僧舍古木隂森正宜夏龎眉兩僧亦可人茶鐺長煑小園春但欲移牀就泉石共聽松花坐終夕簡熊元修憐君苦有軟脚疾我愧貧無挑藥錢此日尺書重問訊何時杖䇿與周旋湖鄉地濕黄梅雨舍舘牕含緑艾􅈣猶喜東家人事好銀缾長送酒如泉奉贈呉逸菴先生頭髪烏如漆上夀明年八十三豈有神仙傳秘訣尚看孫子著朝簪燒香看畫湘簾捲留客題詩緑酒酣堪笑野夫扶醉别出門更與阿戎談寄張伯祥兼簡顧玉山尺書曾去墮沉浮嗟我懐人意未休兩地共㸔千里月西風又換一年秋牧羝餐雪猶歸國買犢耕耘且素侯暇日煩尋顧文學為言相送媿鄒㳺石箭頭歌并序丙午冬呉人自望亭驛鑿渠通漕湖深丈餘乃得石箭頭長洲徐伯卬氏以所得之一見遺一以遺兒元鎮請各賦詩南山爛盡蒼雲根飄風勢欲傾崑崙何物老砮作遺鏃神鑱鬼削秋無㾗沈沙不隨戈㦸折太隂𤣥精壯氷結五丁假手出重泉猶帶堯時九烏血羵羊肝胆破尼子走折足獨有老於莵坐嘯風滿谷猨臂將軍骨已枯蒼頭廬兒金僕姑時乎時乎奈爾砮次韵集講主見懐君今風北我枝南燈火餘輝借佛龕老去著書酬素志客來揮塵接清談逺公沽酒能相引中散鳴琹豈不堪且喜早秋頻得雨襟懐無復欝如惔偕大雲大成二講主及學上人宿聖像寺詢無言山房作西晉招提屋半摧江流依舊碧縈廽黄楊偶戹今年閠青海曾浮古佛來明月一庭僧下榻清風四座客銜盃石䦨㸃筆題詩去池上藕花秋正開次韵荅許君善滄洲濯我足白首事經畬幸作依劉客難忘薦禰書病聽驚螘鬪守拙類鳩居長日思君子新詩忽起予早秋寄恱堂長老雙徑人來候起居山靈想亦問何如煩師為覓龍潭水洗眼將看後世書二秋陽皜皜火雲騰未有天風洗欝蒸珍重毗耶方丈室一壺寒露置清氷三我愛青山冷淡交呉淞江上寄龜巢秋來剪得芭蕉葉欲借楞伽手自抄閠七月七日許徴士以詩見招適余有毗陵之行不及赴次韻答之西風木落大江秋明月江行倚柁樓一路看山三百里桂花時節到奔牛過無錫梅村口占贈喻子英梁鴻山下碧溪灣落日蒼茫客度闗秋色已催紅日老人生何似白鷗閑危橋跨水苔㾗滑折㦸沉沙血㸃斑竒士相逢忽相别相知只在片言間中秋和易九成韵中秋無客夜相過落葉衡門感慨多明月㡬廻懸似鏡浮生百嵗去如梭誰家桂子香如許我屋茆扉冷奈何猶勝去年連日雨呉兒苦織覆城梭二海門潮上水西流白兎蟾蜍出海頭洶洶有聲驚雨至囂囂衆口說天愁楚氛已覺三邉盡湯網終當四面收自昔金陵多王氣如今重作帝皇州三玉人携手歩凌波憶昔南樓載酒過樓上管絃長夜沸座中賓客少年多按歌自擊鐡如意呼酒滿傾玉巻荷堪笑餘情忘未盡中庭舞月影婆娑為許君善題竹石圖竹君骨清癯石丈貎竒古誰其為冩真呉中馬振父吾生兩眼多閲人此君見之情甚親尋常兩膝不易屈此丈拜之心莫逆可憐君家萬竹遭斧斤石亦去作飛將軍齋居此日空對畫目前所喜無風塵凛然清氣秋滿屋六月不知炎暑酷我來賦詩重品題此石嵌空如此竹勿為葛陂龍勿為金華羊徴君與爾作三友老夫亦得與時同徜徉聽秋軒詩為開元寺方厓長老作一龕禪寂照蘭膏四壁凉生襲楮袍落木有聲頻到耳學人無語自吹毛鶴鳴夜半露初下鴈拂月邉風正髙恠底塔鈴饒舌甚亦如九辯繼離騷韓仲禮宦家子也工冩大字終日矻矻予甚閔之賦此為别君不見韋仲將能摛大字一丈強懸空髙冩雲殿榜鬚髪頓令成雪霜君今捉筆長于帚作字繼韋千載後非顏非桞筋骨殊大如車輪小如斗知君欲與韋為儔韋所苦者君知不青雲有路去亦好只恐君年未老先白頭願言投筆勿浪出菽水髙堂永朝夕樂莫樂兮親俱存畫餅功名總何益九月四日過許君善家觀睦義溪長老與朱公路縣丞等唱和中秋吟君善索和一首老禪吐詞金石聲中秋浩歌蟾兎驚哦松人歸與唱和筆力可扶天柱傾惜哉未草金鑾詔但說三盃通大道舉盃此夕問姮娥百嵗㡬回開口笑天風泠泠洗炎熱炎熱洗空風未歇西齋一樹紅木樨且喜看花眼如月喜薦嚴希長老自金陵還山作此賀之京洛多塵土天風為振衣山中流水在林下白雲歸不說前三語惟尋第一機古藤獅子室燕坐寳花飛}
