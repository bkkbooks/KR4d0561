  - {type: variant, offset: 3154, length: 0, content: '', WYG: 次韻陳惟寅懷古幽㝷度香徑遐思倚琴臺烏喙甞膽日雉妖捧心來春風煽天艶滅國輕于埃二慿高望海湖白馬還來無一杯弔忠魂江風為號呼悲哉抉眼地愁煙暗苔蕪三奕奕讓王宫遥遥延陵墓吳儂奉烝甞春秋幾霜露胡為後之人無復繼高步右姑蘇四寶鼎移炎祚降王赴幽都遂令虎林人得免馬邑屠獨憐金盌出啼殺稽山烏五輦路土花碧金門苾芻闗浮海兩龍馬一去不復還空遺温室樹過客猶高攀六我來銅駝巷葛嶺重行行相逢話師相皆云誤蒼生遺臭千萬年沙堤湖上横右錢唐烈婦歌并序烈婦姓周氏蘇州太倉人至正丙申其父以兵帥貪虐隂結壯士數輩將殺之謀泄舉家被戮帥之子悅婦少艾誘為妻不從痛罵而死今鄉人義而哀之構祠立碑亷夫楊先生為記其事且屬江西陳季子索詩以著其事陳君手持烈婦碑勸我為作烈婦歌人生自古孰無死烈婦之死名不磨本是東滄小家女粉黛不施眉自嫵父母憐惜忍違離納婿于家半年許阿爺從軍氣頗麄欲殺不義奔京都手持芒刃機不宻身落禍坑家乃屠繡衣郎君元帥子少年絶愛傾城美願言攜手與同歸即免梟首尸諸市郎君滿屋堆黄金安知難買烈婦心耳邊言逐飄風過腹内寃含滄海深罵聲不絶郎君怒馬上揮刀斫頭去雙鸞羞覩青銅鏡全家甘赴黄泉路娟娟肌體嬌如雪烈烈肝腸堅似鐵一團寃血注婁江至今流水聲嗚咽男兒讀書峩冠巾偷生或忍忘君親奴顔婢膝曳朱紫得不媿此裙釵人嗚呼得不媿此裙釵人}
