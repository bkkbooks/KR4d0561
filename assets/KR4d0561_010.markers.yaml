  - {type: variant, offset: 8570, length: 0, content: '', WYG: 時石泉住丹徒紫府觀聞師訃即謝事而歸塟之志在復業揄揚道法風動一方向化者咸樂施以相之諸葛氏母子其尤也于是剪荆榛畚瓦礫鳩工度材辛勤十有餘年作三清殿前闢山門傍翼兩廡祖祠經室丹房齋厨之屬凡若干楹穹林竹樹蔚然屏蔽輪奐之光焜煌乎蒙城故區度亭遺跡長塘之煙水湖光北固之雲霞山色亦皆映帶為清微勝概矣吁凡為人後者有能繼述如此豈不為賢子孫乎近世縫掖之士學必有師禮宜報効未嘗彷彿如此者也予因記其事之顛末深用感慨并書此為世之勸云棲雲軒記雲之為物聚散不常其聚也由膚寸之微至於彌六合雨天下其散則斯須無踪人莫能測况能與之棲遲乎惟英英而白悠悠而閒者方外之士相羊似之每寓言而髙尚之意云耳常郡𤣥妙觀莊某以寧棲雲有軒意盖如此夫以寧師老􅅨其學以清静為宗青山白雲澹然幽棲固其宜也然􅅨在周室柱史有年青牛出闗然後著書五千言以鳴其道亦未嘗絶物斯世而為髙尚焉後之善學者如陶貞白于齊梁之間挂冠都門怡雲句曲若將終身焉及乎以大任寄之固辭而不可得遂乃坐山中如廟堂之上茹茯苓如鐘鼎之食人到于今稱之不失為華陽真逸也矧吾以寧有琴而能作松風之聲有詩可以賦怡雲之情是則陶之所樂皆為吾有山林市朝或處或出何往而非棲雲之地哉吁由周而來寥寥二千餘年所謂隠居以求其志行義以逹其道者竟無其人是可嘆也若夫華山之陳一枕白雲三徴不起此又不可同日語矣以寧徴予文特書此以識歲月以偹從善之擇云聽雪軒記夫雪聲之微若有若無聽之者必方寸之間一無擾攘兩耳之聽不為物奪然後可得而聞也同郡馬用和居市㕓以陶猗為伍絲竹車馬之喧晝夜不息聽雪有軒豈虚名乎洪武初予嘗忝為東家某知其為氏之良别來十餘年說者謂用和讀書養親習與志長超然出羣遇歲晚同雲霰集而霏霏之雪繼之時用和侍親庭闈言此為豐年之瑞以娯其親捧夀觴如金帳羊羔舞斑衣如仙人鶴氅以春蟲撲牕之聲為金石之鳴舉家之人同得以樂其樂也既退獨處軒居萬籟俱寂乃想像撒塩飛絮聽于無聲不啻若鈞天廣樂九奏而有遺音所樂有未易語諸人者其心必曰蘇子卿十九年牧羝沙漠李元直夜半擊鵝襲蔡梁園之賦客揮毫㶚橋之詩人覔句皆安知雪之有聲如此其樂哉用和需予文請以是相知之言識諸軒壁異日黄金鑄我鍾期吾亦無愧焉爾𤓰田記農皇古聖神以人道急于養生是故作耒耜敎之粒食又為之醫藥以濟其夭閼而本草之書出焉既而軒岐問荅靈樞素問與本草並行為醫家之大經大法也崑山邵濟民氏家傳是書深究厥㫖為醫巨擘迨元末年業隳於兵慕古之同姓種𤓰東陵于是即所居淞滸糞于𤓰田臺笠而鋤抱甕而灌綿綿唪唪之瓞如周雅所稱以之養親可以充一味之甘以之留客可以侑一茶之欵其蒂為苦口良藥可與參苓薑桂竝用以活人濟民嘉之因以𤓰田自號朝于斯夕于斯寓幽興于斯非矜乎東陵華胄也方今盛時過𤓰田而納履者無之或為古之人有白兎御史殆若戲言無足患者其樂為何如哉予嘗避地東呉濟民乆交乃不以我三百廿里為逺九十六歲為耄致書求文再四益勤予辭不獲遂以昔所見而知者筆之是為記習静軒記洪武丙寅冬前知武進縣太原舒公之孫文允書來曰某家居闢小軒讀書強名習静用唐人詩中語也丐先生為予識之書凡四至不容以耄辭乃謂之曰人生而静天賦之性感物而動情之欲也性至微故學者必有以養之然後不為物欲之所汨習静之意必有見於此歟夫以文允之英姿壯年學優而仕動而有為取青紫如拾芥今乃韜聲光歛踪跡負米養親之外足不入城府影不出户庭目不眩邪色耳不汚鄭聲膏粱綺繡不適乎口體罄室隘巷門可羅雀澹然而資于外者如此廓乎虚襟寂乎靈臺幽探乎經史之奥􅉼泳乎義理之懌出入乎諸子百家而無他岐之惑焉其怡然養乎中者又如此可謂得習静之方矣昔者濓溪翁主静之學程伯子以親炙而得之其平居終日坐如泥塑及其動與物接則一團和氣穆如春風視世之以槁木死灰為静者逈不侔矣愚意周程之學盖黙契夫大學定静之㫖相傳使文允以周程為法而學焉則習與性成二賢同歸豈特如摩詰之語而已哉予不佞故卒以是告之時洪武二十年四月之吉同郡龜巢老人撰龜巢稿巻六欽定四庫全書龜巢稿巻七元謝應芳撰啟訟伯父墳地上縣宰啟掩骼埋胔者古今之制其仁如天過家上冡者子孫之情伊誰無地顧邱壟之失所實風化之有傷瀝血寸丹陳情尺素切念某痛懷伯父曩歴兵戈死雖正狐首之邱時未集鴻飛之澤啟手啟足幸能四體之全歸若斧若堂詎信百年之難保蓋自陵谷變遷之后以致家門摧敗之餘失此故塋屬諸姻黨誰其主者展我甥兮此一錯在乎當時故陸沉至于今日渭陽之舅絶無見念于秦龜隂之田那復肯歸於魯然豈料人面獸心之軰乃謀為兎葵燕麥之塲雷厲風飛宰木􅉐空于斤斧日侵月削佳城亦壞於犁鉏殆將見暴骨之寒竟何異鞭屍之慘三尺之法不畏匹夫之勇莫當向來不平之鳴屢致逄彼之怒鬪狠不顧輕性命于鴻毛匍匐而歸飽尊拳於雞肋是可忍孰不可忍如之何末如之何徒増蒿里之悲每動窮途之哭既無面於江東父老復何顔於地下祖宗日月不照之盆弗堪長覆天水違行之訟可憚終凶賴典章有禁地之條其情理實滔天之罪仰惟公道俯察愚𠂻恭惟某官讀萬巻書為百里宰氷其清玉其白絃之直稱之平寛猛適中剛柔相濟數月有撫字征科之績四郊無呌囂隳突之憂休休焉其有容皜皜乎不可尚聲蜚臺閣恩迓絲綸如某者受廛為氓閉門歛跡亦久被卓魯之化焉敢興虞芮之爭但悲夫九泉之人欲掩以一坏之土願施善政垂戒惡人使知見舅如母之親勿為敗俗亂常之事復此牛眠之地仍為馬鬛之封想去家舊鶴重歸看銜土慈烏畢集凡春秋拜掃之日皆存亡感激之時上窮碧落下黄泉為雪幽㝠之恥生當隕首死結草弗忘判斷之恩痛切之私敷宣罔既上干尚書啟公名傳字受道號止亝延祐乙卯科進士不封萬户侯願識韓荆州常切慕謫仙之志手把一封書上有皇甫字輙敢扣昌黎之門問胡為今日之來曰專為古人之事與其進也適我願兮嘗謂傳道不絶者先民之功沒世不忘者後人之義若道鄉鄒忠公之葬近在城隂有了翁陳先生之銘流傳天下孰謂此一邱之土盡廢于八世之孫鄉隣忍于瓜分翁仲隨以蕪沒故諸生為之太息于當路鳴其不平頼二侯以公道主盟不半載而佳城復舊築思亭而薦蘋藻立華表以樹松楸茍非紀載之詳尚慮耕鉏之患立羊公一片石欲大書名世之言如季子十字碑以昭示尊賢之意雖不咎于既往庻有補于將來求之與之完矣美矣恭惟某官老成前軰文章鉅公三千字禮樂縱横在早嵗修名揭日九萬里扶揺直上至晚年直氣凌秋典文衡則妙于稱停秉史筆則嚴于褒貶烟霞一壑今歸老于長洲茂苑之間霖雨八荒將拜命于安車蒲輪之召斯言非佞輿望所期某曩客新安聞公舊政復紫陽之闕里大振儒風勒黄絹之好辭有光吾道諒弗忘于素志必重念于斯文惟大賢無不容則小子乃有造于以紀前言徃行于以發潛徳幽光眷言梓里之間永若桐鄉之愛鏘如韶鈞蔚如虎豹雄文照耀于九京明則禮樂幽則鬼神妙理昭彰于千古存亡有感敷叙莫殫贄見余用中先生求作辨惑編序啟狂簡斐成章辯諸家之邪説品題作佳士必當代之儒宗夫瓣香敬為南豐蓋學者仰如北斗予其進也適我願兮嘗謂璞玉雖竒非和氏則山中之石琴材固美無中郎則爨下之灰太𤣥經有覆醬之譏公羊傳有賣餅之辱古猶如此今豈不然欲立言圖不朽之傳必取正于有道之士嗟今陋俗舍正路而弗由集古遺言廻狂瀾于既倒可奈一齊而衆楚猶如皆醉而獨醒驚人之鳥一鳴怪雪之犬羣吠願君斵堊為我折𠂻或衮褒一字之榮則價倍千金之重馮豐霳寄寥廓久矣馳情抉雲漢分天章豈辭揮手綱維吾道黼黻斯文兹蓋伏遇某官文章鉅公典刑前軰詞塲較藝視五色之日不迷鄉國興賢使三代之風復振躬行古道歴踐華途每為政郡邑之間常蜚英臺閣之上歸從彭澤舊家環北固江山教若河汾大隱居南徐城市户外之屨常滿門前之轍何多雖云遂莵裘之營必復有蒲輪之召如某者俯慚後進仰慕先知尊其所聞行其所知愧未造髙明正大之域博我以文約我以禮誓弗忘仰鑽瞻忽之誠景慕有餘編摩罔既贄見李晋仲提舉求安啟思忠公傳道之賢為褒遺事辨邪説誣民之惑乃集前言持布鼓于雷門分天章于雲漢恭惟某官儒林麟角學海龍門鍾山草堂之英靈雪竹霜松之標致懶折腰于彭澤早賦歸來聊濯足于滄浪亦云自取皜皜乎不可尚已休休乎其有容焉然吾道賴以綱維而儒林視為儀表尚持藻鑑以主文衡名動京師栢府之薦章交上官居翰苑蒲輪之召命將臨先生自此升學者仰如斗某呉中晚進白下漫逰自憐如明月暗投誰復念陽春寡和汲汲有登龍之願拳拳慕倚馬之文方往依劉以圖御李欲因劉堯輔見公乃于劉處偶得識面低頭拜東野適因邂逅之間瓣香為南豐得展殷勤之敬敢持兩帙謹用三熏長年坐井底觀天此日詣門前立雪倘賜五行之覽必蒙一字之褒登山采玉入海求珠捆載乃酬其素志製芰為衣紉蘭為佩激昂正賴其清風贄見楊亷夫提舉求序思賢錄啟兩袖春風作洛下書生之咏滿舡明月過闗西夫子之門問胡為今日之來曰端為古人之事切有請也能無從乎伏念某生延陵季子之邦頗知禮讓復道鄉鄒公之墓當效馳驅樂民俗之還淳喜士風之近古思賢有錄味道無厭紀前言往行之二三發潜德幽光之萬一自藏燕石誰售雞林恐公羊遭賣餅之譏使太元有覆醬之辱願借春秋之筆稍為月旦之評得一序以冠塵編若千金而加敝帚庻傳不朽有補將來非惟先哲之有光眞乃後學之多幸兹蓋伏遇某官乾坤清氣風雲壯懷走馬看長安花早嵗似唐人得意割雞為武城宰居官如言子愛人以文章政事之俱優宜天下國家之大用尚淹筦庫未展經綸人皆知大器晚成我乃獲景星快覩題鸚鵡賦已多年傳麗則遺音到鳯凰池將不日遂平生髙志倚期𤓰代入覲楓宸如某者敢不長遡下風永懷髙誼聞所聞見所見眞如到神仙十二樓之間步亦步趨亦趨或可在弟子三千人之列其諸欣慕㒺旣敷宣贄見張用鼎教授啟黄魯直竭蘇東坡因述依松之志禰正平過孔北海乃蒙薦鶚之辭葢同氣以相求必當仁而不讓敢持尺牘特造丈函恭惟某官海内儒宗江西詩𣲖往嵗為馬尚書賔客當時有虞學士品題謂鵬程萬里横飛期鳯池十年可到道出羲皇才過屈宋何鄭公猶在於廣文上規姚姒下逮莊騷若韓子獨尋于墜緒先覺覺後己立立人四方之學者來歸一鼓而斯文作氣博求地利開元武湖以廣澤物之功善育人才置治事齋而兼水利之意聲蜚臺閣恩迓絲綸如某者生長呉中棲遲白下顧窮居而獨善恐沒世以無聞著辨惑編闢近世之異端邪説作思賢錄發前修之潜德幽光欲煩斵郢人之斤輙敢弄班門之斧平居抱膝仰泰山北斗之髙此日承顔覩鳯凰景星之快天其或者道之行與得華衮一字之褒増敝帚千金之價品題作佳士何慚奏白雪遺音吹嘘上青𠖇或可借春風餘力答陳天倪謝薦師啟見賢而舉者古先之訓惡敢言功易子而教者夙昔之心幸逢知己豈意予互鄉之進亦勞賦小山之招恩斯勤斯至矣盡矣恭惟容齋先生元元衆妙休休有容身雖領袖宗門學則淵源吾道小樓明月勝元龍百尺之豪髙枕白雲待丹鳯九重之詔有前人風烈為後學範模如某者與緇黄交能青白眼獨喜子墨名儒行非他人羊質虎皮通家踰三十年責善難一二計兹荷愛烏之及特厪遺鯉之書曲憐覔梨栗之兒直命入芝蘭之室從明復受春秋之業看希夷畫太極之圖熊魚何幸乎兼得犬馬當知其所報道院迎仙書堂隱相増爽氣于西山鄰家乞火曉窓分燈藹餘光于東壁銘心有感筆舌奚殫謝監察御史火公舉茂異啟天朝重耳目之官實居清要風憲擢山林之士非市私恩葢竹頭木屑有可用之時而茅㧞茹連乃必然之理敢因竒遇庸布謝言切念某家本呉中客兹江左以芰荷為衣秋蘭為佩訪鍾山之英草堂之靈作山川司馬壯逰負湖海元龍豪氣自憐骯髒誰問飄零瞻烏蒼柏之間歌鳯古臺之下幸逢􅔕馬蒙試雕蟲叩大小從容之鳴以盡其聲收輪囷離竒之材而斵為器使李白立階前地如毛遂脱囊中錐得之若驚觀者如堵兹葢伏遇某官身居臺閣腹藴詩書凛凛乎動揺山岳之威惓惓乎樂育菁莪之意植公門之桃李蓄相籠之葠苓昔中州草木知名今南國芝蘭俱化三省十道俱聞鐡面之威一日九遷將拜玉音之召風塵一掃霖雨八荒如某者敢不恒念品題益加修省行日用常行之道讀平生未讀之書雖蒲柳之質望秋先零而薑桂之性到老愈辣惴惴焉出門下誓弗忘一瓣之香耿耿者在胸中當自愛千金之帚其諸感佩罔既敷宣代羽士上亷訪僉事啟上士無爭奉先師之明訓監主自盜奈公論之難容故鳴鼔而攻之若同室而鬪者切念某為李老君弟子住焦眞人道塲小小山林設住持之主席區區金帛有交代之成規比因撙節年多致有羡餘日積被前職䑕偷狗竊使空山鶴怨猿驚當市攫金衆所共見匹夫懷璧罪實難逃已嘗赴愬于有司且復諌詞于教所始則强項不屈終乃揺尾乞憐遂以當仁不讓之心聽其用和為貴之説乃償薄産以補亡金未幾背㰱血之盟又復為紾臂之奪用朝三暮四之術專務貪婪逞人一已百之能肆為欺罔楚弓得失秦鏡咨度勞六轡之驅馳亷法亷辨亷善亷能按百官之能否明月靡遺罅隙清風一掃塵埃睠兹寂寞之濵亦在照臨之下豺狼歛跡草木知名激濁揚清既憲綱之振肅舉直錯枉宜公道之昭彰或移北山之文或賜南山之判戒無厭溪壑之欲征悖入府庫之財庻有補于焚修更無煩于訟牒思之弗措辨之弗措願亟持全璧之歸得之若驚失之若驚當永守青氊之物謝崑梅州判舉鄉善啟求儒雅闡大猷漢室之興復見經品題作佳士荆州之識為榮矧蒙下采于菲葑豈作不言之桃李寸丹有感尺素具陳某官佐理神州賢勞王事虛心待物明于滄海之珠美德含輝粹若崑崗之玉有賢守與承流宣化在寮寀則同寅協恭切切斯民惓惓吾道氷霜並潔風月平分南山之判不移北闕之心長戀二千石不如逢掖下士尤勤九萬里直上扶揺前程甚遠吾言非佞輿望所期某久客東呉遠逃兵燹功名蹭蹬昔為上竹之鮎身世飄零今作無枝之鵲偶爾宿贊公土室儼然逮梅仙市門希髙山流水以知音驚明月夜光之投暗説項不輟薦禰有書駕言采泮水之芹何異繼廪人之粟驥千里未甘伏􅇫鳥一嗚或可驚人翺翔道義之林涵咏詩書之澤鄉之善士國之善士尚期自下以升髙知惟春秋罪惟春秋勿謂有名而無實賀陶教授啟鄭廣文才過屈宋坐一氊而司業相憐胡安定教授蘇湖置二齋而太學為法升髙自下振古如兹恭惟某官前軰典刑後學模楷于以傳道授業而解惑信乎温故知新而可為五柳莊前自昔存舊家之菊片玉山下只今樂泮水之芹振木鐸之遺音續杏壇之雅曲先覺覺後聿成陶鑄之功己立立人正賴提撕之力自此升矣式我願兮如某者白首流離青雲蹭蹬遇州倅舉一鄉之善以野夫寘多士之間愧風鷁之退飛喜星鳯之快覩先生富道德致呉興弟子之多才雜説為爬梳正學校諸生之狂簡代上馬都事啟驥伏􅇫負千里之志久倦驅馳鳥在阜作三年之鳴猶能奮躍未趨幕府敢借箸籌某官胸襟貯萬巻書文章揮五色筆頻年花縣絃歌之化大行今日薇垣贊畫之才方展王公大人以青眼相顧縉紳先生以白眉見稱兹泛緑以依紅將腰金而曳紫一節旣全其清白深憂當念乎羣黎願為龍伯髙勿效杜季良恪守祖傳之家法近舍皇甫湜遠取白居易當求世用之人才跂予望之自此升矣某遠逃兵燹久客句呉秋菊寒泉祠甫里見尊賢之義長洲茂苑頌鄉校勒輿人之言己曽和白雪之詞但未覩景星之快由村落每來城府知軍民多困飢寒敢用條陳以效芹獻于以開難發之口于以推不忍之心區區非釣于虚名懇懇必求其實效蒼生顚厓受辛苦隔羣仙天上清髙大芘廣厦俱歡顔願比屋眼前突兀代謝沈太守啟一輪明月清輝今照蘇州萬里長風素志乃如宗慤念先人之遺澤挈孤子于長途知幸自天感恩無地恭惟某官乾坤清氣風雲壯懷既不忘向日之誠且深識隨時之義往年烏府冠峩鹿角之威此日黄堂庭蔑䑕牙之訟退食則斑衣以娯父母傳家則黄巻以授兒孫鞭不施蒲莊先種柳愷悌咸稱召杜勲名必到蕭曹三江五湖之風謡政聲藹藹四海八荒之霖雨輿望懸懸遺愛甘棠流芳汗竹如某者仰依公庇勉讀父書既己承薦鶚之章當不負愛烏之及偹葠苓于藥籠作桃李于公門庻竭駑材以圖豹變父為大夫子為士賴提携發軔之初車如流水馬如龍願追逐後塵之末其為報効罔既敷宣上沈太守啟太叔為鄭大夫始從寛而終猛不疑謁暴公子先言威而後恩惟大海不擇細流庻他山可以攻玉請以田夫野老之語陳於大人君子之前切以某近寓吳江昨經荒浦聞近日有䑕竊狗偷之軰在各都如蜂屯蟻聚之多始則穿窬終為强禦忽忽乎神出鬼沒累累然晝伏夜行星月光中窺商賈他鄉之客烟波深處伺妻孥逃難之人或如斫嚴顔之頭或若斷孤兒之臂横屍洲渚流血泥沙遺臭熏天銜哀入地掩鼻而過者多矣垂泣而道者誰與鄉隣懼而不言州縣置之不問致令滋蔓轉肆兇頑目之所覩者如此其多耳之未聞者尤為不少新鬼煩寃舊鬼哭痛恨難忘他生未卜此生休𠂻情誰訴惟當路發神明之政為斯民雪冥漠之寃三尺法申明舊章五色棒掃除羣醜寛猛相濟不勞用萑澤之兵恩威並行何待持繡衣之斧一雷既震百蟄皆驚恭惟某官俊傑識時精忠貫日清氷出萬壑此往年烏府威聲明月照蘇州乃今日虎丘嘉話甘棠樹聽召南之訟老萊衣照堂上之親愛民若拙于征科下士能勤于吐握五花馬金章紫綬方被殊恩六柳莊綠水青山未容髙興政湏治最以候登庸如某者幸獲承顔甚慚饒舌聞而來見而去仰山斗之彌髙道以政齊以刑看民風之丕變上梅知州陸同知啟稂莠不除必有傷于嘉穀盜賊不息寧無害于良民目前事可為寒心林下人敢云饒舌俯慚卑陋上瀆髙明切以某為客松陵􅋈舟荒浦聞近日有鼠竊狗偷之輩在各鄉如蜂屯蟻聚之多或穿墉以踰垣或發匱以胠篋或牽去春耕之犢或移人夜泊之舟或刼行商囊槖為之席捲或因逃難妻孥與之偕亡或如斫嚴顔之頭或若斷孤兒之臂慘星月見遭毒手渺烟波逸去兇身濺血菰蒲伏屍洲渚漂流于五都十都之境臭腐于六月七月之時里正不敢言恐煩檢覆鄉隣寂無語懼有干連致使跳梁轉加延蔓天隂雨濕但聞寃鬼之聲水遠山長渾是愁人之境惡貫既滿禁網難逃今有司獲盜竊之徒宜因事䆒㓙强之黨幸毋姑息亟賜施行轟雷霆于掩耳之先照日月于覆盆之下追三窟兎須旁求曲徑之踪殺兩頭蛇方能免後人之患餘罪戾之輕者加徒役而遠焉庻令涇渭殊流不使薫蕕同器蓋治此非常之盜必加以非常之刑雪痛怨于黄泉聽歌謡于綠野恭惟某官某官同心同德無黨無偏各守一亷氷其清而玉其白咸稱二美絃之直而鏡之明閭閻蒙撫字之恩案牘絶煩苛之弊訟庭如水印匣生塵明月清風蹔爾居淞江太湖之上髙牙大纛翩然到鸞臺鳯閣之間人皆仰之自此升矣如某者言雖僣越事實昭彰秪縁以兎死狐悲未免較鶴長鳬短溺猶己溺望明公擴仁愛之心刑期無刑變惡黨為淳良之俗幽明有感贊美奚殫代上江浙丞相求䕃叙啟上書伏光範門韓愈以布衣自進斗酒酌新豐市馬周于逆旅誰知仰止三台素非一日惟吐哺握髪以下士敢披肝瀝膽以陳情切念某生毘陵錫谷之墟客呉郡長洲之滸早年勤苦頗讀父書連嵗孤哀且罹兵燹竄妻孥于荆棘揮涕泗于蓼莪學弓為箕學冶為裘尚賴傳家之業在無父何怙無母何恃孰憐逰子之歸遲望西日於長安歎南風之不競欝欝居此遑遑何之芰為衣蓉為裳忍飢忘溝壑之憂闕苐慚没世而無聞有負先人之遺澤欲求䕃叙願借恩光雖云匪麟角鳯觜之竒亦庻幾竹頭木屑之用持衡留藻鑑天書適降于九重隨水上龍門桃浪可乗于三級鯤鯨變化鵷鷺翺翔兹蓋伏遇某官簡在帝心股肱王室保江浙數州之地障東南半壁之天以和靜鎮國家量同文靖有忠勲塞天地爵比汾陽公門之桃李欣榮藥籠之參苓並蓄五風十雨頻年見隂陽調爕之功寸地尺天指日復疆里廣輪之舊恩加衮舄銘在鼎彛如某者幸獲瞻依宜蒙㧞擢大木為杗細木為桷良工得國用之宜南山有臺北山有萊君子致太平之樂永言報効盡力驅馳賀上海石縣尹啟郎官應列宿方照臨滄海之秋鴻毛遇順風乃奮起青雲之日敬陳賀語兼進忠言嘗觀時有盛衰道無今古為國者必以人民為本有司者必以父母為心擾攘雖値于難時撫治合由于古道簡編所載榘矱具存曰既庻既富而教之曰足食足兵而信矣曰孝弟可以盡堯舜之道曰忠信可以撻秦楚之兵惟教道能結其心斯奮發以盡其力小而一邑大而九州是道為農桑學校之原其事乃錢穀甲兵之屬茍一日而必葺庻三年而有成倘不鄙常談老生斯可謂知言君子某官心存愷悌氣禀髙明先世稱萬石君其道義傳家之久今官為百里宰蓋功名發軔之初以胸中所藴之詩書為目下可行之政事征科不廢撫字尤勤仁風藹田野如春民無愁歎明月照閭閻似水吏絶喧囂釜魚之聲譽己聞堂鱣之禎祥必應行書上考竚見髙遷某幸辱故知喜聞新政彼客燕皆能賀履豈窮猿獨不投林東入海西去秦擬欲依棲于贊老昔無襦今有袴願同歌詠于呉儂諸士友陳言陸同知誣枉事啟排難解紛竊慕古人之髙義舉直錯枉宜蒙當道之至公芻蕘有言菲葑可采切見呉江州同知陸某職居佐貳政出循良三載守官一亷如水自許以赤心報國人皆知洗手奉公不聽誅求因結仇于軍帥不隨偏黨或見忌于官僚豈意權豪乃加排䧟以兵戍千有司之政以文移行無妄之灾舁一夫病死身屍勒其子巧生詞訟集衆擁停屍之地環若重圍當官逼仵作之人傷皆誣騐强梁若此毒害顯然越官職以横行違憲章而不顧各州縣聞之而䘮胆諸士民覩此以寒心赫然恣逞其㓙威甚矣有傷于治體是可忍也尚何言哉仰惟上相之賢明俯察本官之寃枉照覆盆之日月即見昭彰遏平地之風波毋令䧟溺如某等與本官初無私愛且隔隣封聞一州有頼其主張知百姓多蒙其恩惠昔頌德于三江五湖之上今稱寃于萬口一辭之間其言至公而無私所願抑强而扶弱直為壯曲為老當明曲直之情危而持顚而扶庻免顚危之辱宜加采擇特賜施行上量田徐孟二公啟立國以經界為先當盡革其中之弊生民以耕稼為本方能供在上之需惟任用之得人乃公勤而稱職欲陳梗槩敢效芹誠嘗謂朝廷革命之初才俊為時而出凡所以體國經野皆可以忠君愛民况皇家付尺度之公要農畝定租庸之法甲是乙非者固當分辨鶴長鳬短者尤宜折𠂻為前代除毒歛之蛇免後人為涸轍之鮒此當務之為急其任非輕但至公而無私所行必達某官同心同德無黨無偏志如百鍊之鋼不為繞指事若重調之瑟能用改絃雖寸田尺宅皆入版圖而賸水殘山猶蒙紀錄田野既揚其聲譽銓衡必錄其勤勞同升諸公一臺二妙某生本常郡寓此呉鄉如去邠而居岐敢因徐而見孟願求荒圃學為老農春雨一犁駕烏犍而東作青雲萬里看黄鵠之䨇飛上王知府啟玉門闗兩髩秋風歸來晚景金斗城一輪明月喜把清輝人皆作來暮之歌我欲快爭先之覩騎竹失隨于童子杖藜敢謁于大人既獲披雲亦言獻曝嘗謂農桑者民生衣食之本學校者國家風化之原其在有司亶為急務睠此常郡即古延陵二十年兵革以來數百里人烟欲絶犁鉏不作絃誦無聞大田皆變為荆榛泮宮亦燬為瓦礫今天下全歸于大統而郡中方集其遺氓如谷寒而鄒律重嘘若絃斷而麟膠再續農何以勸惟恤民則民乃力農學何以興惟重士則士皆志學嚴一鼓以作氣必三年而有成田野辟而賦税増教化行而習俗美上以副聖天子明詔之意下以著賢邦侯善治之功斯文黼黻于皇猷舉世甄陶于清化渤海郡勸農龔遂復見于今成都府興學文翁㒺專于昔茍二端之並舉則百廢之俱興幸無謂老生常談眞可與古人同傳某官三槐世胄五馬恩榮金莖露之澄清玉壺氷之潔白有民人有社稷雅稱宏才為保障為繭絲㑹能兼美飽夙學於胸次急先務于目前報主赤心待士青眼吐握行周公之禮謙德彌光循良希漢吏之賢芳名不朽如某者幸然歸魯得此依劉三十年辛勤有廬勉欲訓城南之子千萬間突兀廣厦願蒙庇天下之寒頌禱有餘敷宣㒺既謝孫大雅惠詩文啟寄杜甫題草堂舉世誦高公之句送李愿歸盤谷至今傳韓子之文葢詞章誠有可嘉則名譽皆為不朽感承傑作敬叙謝言某生長延陵本同鄉土僑居呉郡俱避風塵既聲跡之相聞且音問之不絶千萬人之前常曽説項十五年之内惟欠識荆嘗結巢為蓮葉之龜來詩甚美至還家若華表之鶴得序尤榮顧余生非李杜之儔眎所作乃髙韓之比陽春寡和明月暗投巾箱謹于珍藏棐几時乎圭復想風采于氛埃之外見肺肝於文字之間投桃報瓊兹抒情于尺素如葭倚玉别請教於丈函某官以申浦之澄清鍾于姿禀以君山之蒼古發于文章驅馳莊騷出入佛老鳴教鐸中呉者久投朝簮東海之濵枕流潄石而有祖風弄月吟風而忘世慮山中厯日閲黄楊厄閏之年天上春風待紅杏倚雲之日如某者素慚孤陋雅愛交逰味六經如嗜膏粱親三益便成膠漆江東暮雲之酒願與論文山隂雪夜之舟尚期乘興雷門持鼔郢匠揮斤謝張雲門作詩序啟名紳字士行齊郡人魯直獻東坡二詩葢欲見瞻依之志士安敘左冲三賦方能無非議之辭葢當世之鴻儒乃後學之龜鑑寸丹方感尺素具陳伏念某田野草茅山林樗櫟不揣鉛刀之鈍常持鐵硯之堅鮎上竹竿往嵗之功名可笑龜巢蓮葉近年之身世如浮八九家寂寞江村三千文蕭騷白髪出言爛熟作事迂踈寤疑辨惑以成編懷古思賢而有錄頹然詩癖忘乃途窮時抱膝為梁甫吟或掩鼻作洛生詠對明月清風而思元度藴髙山流水以待鍾期持鼓雷門探珠驪頷得警策片言而為幸豈㫪容大篇之敢望珠璧暗投璚瑶匪報不識面而知肺腑可謂神交如冩容而見精神珍藏手蹟披雲未遂仰斗彌髙恭惟某官四海儒宗一門科第為時而出不勝烏鳥之情謝病而歸非為鱸魚之美以東呉之山水為西漢之文章託古意于焦桐播遺芳于叢桂風月襟懷江湖性氣本磊落之竒才烟霞痼疾泉石膏肓享優㳺之清福道則髙矣人皆仰之如某者敢不佩服斯文勉旃爾力敝甚千金之帚榮哉一字之褒廢繩墨不為拙工灼見用春秋之筆經品題便作佳士惟恐孤月旦之評瞻望依依臨書草草擬與金壇縣告索尹氏寄書啟賣金買書自是平生之志刻舟求劍難忘眷戀之情雖呉霜己白其頭顱惟秦鏡能明其肝胆敬持尺素用寫寸丹切念某避地曩年泛湖連日移舟至尹干橋下依乃姻家藏書如孔氏壁中扄諸奥室物宜多矣人皆見之十三年賤跡飄蓬數百巻常懷汗竹豈知𤓰葛乃變薫蕕以諸史之青編易兩牽之黄犢餘存簡牘悉入巾箱屢云還合浦之珠竟不返連城之璧朝經暮史欲重對于聖賢甲是乙非合辨明于官府是可忍孰不可忍求之與抑與之與惟當道之至公庻斯文之不墜聽其言也適我願兮某官承恩九重出宰百里廼氷其清廼玉其白如絃之直如鏡之明以識時俊傑之才了積年繁劇之事戴星出入雙鳬暫止于金沙摶風扶揺孤鳯必巢于阿閣某遠來隣邑如倚太山鶴溪水天影涵秋比琴堂之清澈米家船虹光映日載書簏以還歸擬謝常州府官啟曽參以同姓殺人其母嘗投杼而走黔易非在家遘疾厥子乃驚心而歸奈何事出于隣封馴致弊生于本邑幸大府能為辨析今㣲言合用敷陳切念某乙老窮居若守株于横峴丁男逺出因負米于荆溪叠叠乎縣帖拘追纍纍乎里人被執爰自三月三修禊之日皂𨽻登門遂令八十八老耄之年倉皇赴縣換名字如雲翻雨覆動文移則雷厲風飛䧟穽欲成網羅交設南阮貧北阮富姓雖同而産業不同東家智西家愚人有異而鄉閭亦異故奔訴甘棠之下蒙戒懲刻木之徒號咷徹乎二天枉屈為之一雪伏遇某官等同宣聖化並著仁聲召父杜母之慈祥春濡雨露礬弟梅兄之清白月映氷霜閭閻響擊壤之歌城郭寢抱關之柝行書上考佇徯髙遷如某者父子知恩鄉隣感德覆蕉藏鹿本無夣于前時縁木求魚免受灾于後日報當銜結力効驅馳上周縣尹請祭顧將軍啟孔北海表鄭公鄉人皆起敬文潞公題明道墓學者知歸葢追敬于儒先實有裨于風化敢持尺牘用徹琴堂某老不趨時心猶好古覽中呉之勝槩訪前代之名賢笠澤西頭皇天蕩烟波相接葑門東畔顧將軍邱壠猶存叢祠倚馬鬛之封荒蘚没龜趺之石每經此地常念斯人生為呉相之孫死有元公之諡華亭二陸初齊名得三俊之稱白羽一麾獨仗義平六州之亂晋史備書其勲業呉儂尚保其祠塋但每嵗之烝嘗欠有司之籩豆不揣效豐干饒舌敢云煩陶令折腰蘋蘩矢薦于鬼神桑梓愈加其恭敬此非違道以干譽幸不以人而廢言恭惟某官以董賈之才為卓魯之政乃氷其清乃玉其白如絃之直如鏡之明見義勇為當仁不讓有民人有社稷國家委任之隆教禮樂教詩書流化承宣之急行書上考竚見髙遷某飄泊長洲蕭條短褐投老二天之下知名兩月之間其言至公而無私其事似緩而實急生芻一束其人如玉望喬仙雙舄之鳬寒鴉數㸃流水孤村弔華表千年之鶴干陳敬初先生作懷古錄序啟懷賢千古聊綴緝夫前言借重一辭庻流傳於後世切有請也能無從乎睠我楚狂久客呉下過鳯凰山顧彦先之墓有感而傷情傾鸚鵡杯李太白之詩長歌而擊節甚矣疾薫蕕同器忍乎隨桃李不言豆籩既請于有司丹青乃新其遺廟屏除妖塜祭掃佳城搢紳皆為之詠歌樵牧則嚴于禁約載嘘藜燄用寫蒲編于以發幽潜之光于以紀廢興之事過雷門持布鼓敢曵長裾抉雲漢分天章煩揮健筆某居玉堂之署人慕登瀛紬石室之書自當名世為士林冠冕演王國絲綸目短曹劉汗流籍湜大鵬九萬里方當直上之秋黄河三千年㑹見重清之日前程逺大吾道光榮某不揣迂疎尚希題品書八篇因窮而著初不效于古人賦三都得叙而傳尚有望于今日代上饒叅政啟叔向知鬷蔑因聞堂下之言毛遂從平原乃脱囊中之頴既古人有如此者豈今日獨不然乎切念某幼讀父書從逰都邑聞所聞見所見囿先生長者之鈞陶歩亦歩趨亦趨習王公大人之規矩辭親日下捧檄浙東干戈擾攘者閲五六年鞍馬驅馳者知幾千里及區區益升斗之禄又紛紛服州縣之勞栖枳棘于慈溪望蓬萊于滄海既失怙恃遂用來歸兄弟飄零狀若䘮家之狗功名蹭蹬誰憐失水之魚然此膝不屈于常人而其志敢忘于斯世家徒四壁壯氣横秋但知讀書以聖賢為師未嘗出門與俗流為伍髙山流水頼有知音明月夜光忍令投暗鷙鶚之書既作鯤鵬之化何疑惟大匠無可弃之才宜小草有相依之志葠苓藥籠桃李公門恭惟某官俊傑識時耿介㧞俗隴雲可悦己嘗似山中宰相之閒仁風載揚今復慰天下蒼生之望胷次炯玉壺氷露文章埀金薤琳琅借箸而籌入則告嘉謀于公府累茵而坐出則叅大政于薇垣己立立人先覺覺後行吾道于干戈之際救斯民于塗炭之中幾千仭廬山者衆人所仰五百年名世者非公而誰如某者慕藺許年依劉今日襪線之才雖短菲葑之采不遺朝取一人暮取一人莫非荷提撕之力待以國士報以國士當不忘感激之情輕凟崇嚴重加悚息上張太尉啟蘇轍上韓太尉書所願覩賢人光耀馬周寓常中郎館即能以時務條陳不揣下愚敢希前軰敬以惜軍愛民之事陳於王公大人之前聞斯行之時則美矣嘗謂有民有社須當畫策以治安足食足兵乃可運籌而征討凖今酌古發政施仁茍欲展心上之經綸尤先察目前之利病勿求近效宜作遠圖開荒田則為富國之原設屯田則為守邉之計除民瘼則免誅求之苦積軍儲則無匱乏之憂廣鹽𣙜之法則遠近流通恤軍士之家則存亡感激凡兹六事盡在一時日月雖明固難照覆盆之地風雨不動願蒙庇廣厦之天布以新條革除舊弊惟其愛民如子必不以人廢言詢我芻蕘教人稼穡易其田薄其税民力方紓居有倉行有糧兵威自振幸無吝一舉手一舉足之力更勿辭三握髪三吐哺之勤庻士夫得進其忠言而軍民免令其失所恭惟太尉相君英雄蓋世度量容舟以崧髙維岳之英靈為海納百川之襟度興利除害更張漢瑟之絃革故鼎新重作禹書之貢西鄙之烟塵去遠東呉之風俗還淳見諸生如見大賔保斯民若保赤子天上天下咸知向日之忱江北江南共仰福星之照名埀竹帛勲在鼎彛某十載風塵一篷烟雨避地居淞江之滸憂天如杞國之人功名雖負于素心窮困尚憐于黔首慮或有于一得口何忍于三緘知我春秋罪我春秋欲救顚崖之辛苦待以國士報以國士終當範我之馳驅俯竭葵傾仰希藻鑑賀蔡教授到任啟建學立師本三代之良法化民成俗即二南之遺風夫以世衰而道㣲其必人存而政舉喜聆木鐸敢進芻蕘睠此崑山舞丹崖之鳯石沛然婁水接滄海之鯨波以山川如是之竒人物由來之盛紛紛顯宦比比髙門豪如劉龍洲乃寓焉賢若李樂菴而居此適値近年之兵革遂忘舊日之衣冠城郭是而人民非禮義廢而政教失幸鄉校之不毁今學宮之茍完有司奔走於豆籩多士趨蹌於禮樂但龍蛇之混雜有鳬鶴之短長中也養不中才也養不才政賴有甄陶之力仁者謂之仁知者謂之知豈容無區别之心惟自今秦鏡之明更不致齊竽之濫大杗小桷匠氏固無棄材貴玉賤珉識者自能定價嚴一鼓以作氣必三年而有成恭惟某官心醉六經眼空四海杏花壇上重來鼓焦尾之琴荷蕢門前試聽擊有心之磬胷次炯玉壺氷露文章埀金薤琳琅曩嘗居淮海維揚人共仰泰山北斗能不失前賢規矩眞可為後學範模苜蓿闌干且莫厭一官之冷菁莪長育當挽囬吾道之春立登要津入居翰苑如某者蹉跎仕路流落他鄉不能看長安之花乃亦采泮池之藻聞所聞見所見星鳯先覩而快哉歩亦歩趨亦趨蘭鮑久居而化矣為王叔才通呉伯善啟魯連為解紛而出斯為天下之竒陳平能宰社而均終作朝中之相茍有為于今日亦何異於古人今一見之竊有請也恭惟某官湖山清氣丘壑閒情雖爵祿不入其心惟孝友是亦為政車乘下澤稱鄉里之善人樓卧上床本湖海之豪氣律呂鳴朝陽之鳯階庭舞荀氏之龍惟其博古通今所以出類㧞萃有文舉座上之客而開尊嘗滿聞鬷明堂下之言而執手相知近者悦遠者來親踈無間剛不吐柔不茹好惡惟公藏器待時在邦必達某許年慕藺此日識荆深知有長者之風輙敢訴不平之事曩予有子勉作鹽商同客嘉禾王吉父與成交易親書片楮孔方兄俱付檢收不料墮其計中從此置諸度外屢約屢爽轉富轉貪但知堆滿籯之金不肯返連城之璧况視予之流落尤縱意而欺凌獸心忍負于朋儔狡窟乃居于仁里望公秦鏡照我覆盆能扶顚以持危必舉直而錯枉風行草偃水到渠成是猶能解戰國之紛亦何異宰鄉人之社道之禮樂示之好惡豚魚必感而相孚失之東隅收之桑榆犬馬當知其有報心有所憤書不盡言為王叔才等訴神文亘古亘今人世有難明之事誰曲誰直鬼神能灼見其情雖聰明正直之無私必禍福吉㓙之有報請陳始末用徹幽明切念某至正十有五年作檇李異鄉之客統鈔三百餘錠買呉江同姓之鹽託在契交信從期約立文慿之一紙比重託之千金豈其反面無情從此掉頭不顧彼己跨腰錢之鶴我乃求縁木之魚日往月來馴致遷延之久雲翻雨覆不勝變詐之多故連年空打白厓至今日竟為烏有交情既絶禮貌全無本來似鮑叔相知每去如魯侯不遇彼因致富積鹺物之如山我則固窮避兵戈而失路不念流離之苦轉加欺㒺之心日月不照于覆盆風雨自安于廣厦昔伊過我待為席上之珍今我尋伊視若眼中之刺是可忍孰不可忍如之何末如之何既告于隣里鄉黨之間當質諸上下神祇之之有吾言若謬甘受天誅彼語若誣當遭隂譴願洋洋之如在降濯濯之厥靈有感必通如響斯應舉直錯枉必須天理昭彰福善禍滛庻使人心畏服上周郎中陳言五事啟李白識韓荆州雖萬户之封非其所願鬷明見鄭叔向惟一言之善得以相人今區區慕足下之賢敢切切論日前之事上以裨朝家之清化下以􅇺郡國之蒼生遠視欲明邇言可察兹蓋伏遇某官乾坤清氣風雲壯懷向坐黄堂著蒲鞭之善政今遷畵省冠蓮幕之諸賔有撥亂反正之才盡扶顚持危之力心不忘於向日義不失于隨時英聲蜚九重之天遺愛溢三呉之地和氣挽囬于寒谷恩光照及于覆盆見多士如見大賔保斯民若保赤子能興利以除害不吐剛而茹柔史編當紀其循良鈞軸政須其贊畫門墻羅列好多培桃李之春鼎鼐調和有大用鹽梅之日更勤吐握以廣咨詢如某者甫里索居太山髙仰折桂之功名蹭蹬衡門之心跡栖遲雖讀書以聖賢為師但出門則農圃為伍東隣西舍痛遭毒歛之蛇南枝北風多作無依之鵲歎息愁怨之聲常聞于田里呌囂隳突之吏每見于鄉隣况軍儲不積則時有借糴之憂而官俸太輕則必有侵漁之患此皆繫百姓之休戚疇能出一語以發揚惟大人肯念乎羣黎故小子敢輸其忠赤非甚髙難行之事非荒唐繆悠之談是曰是非曰非尚從公論聞所聞見所見奚敢餙詞宜改絃而更張毋刓印而弗予他有剥床而請者别當借箸以籌之溺猶己溺饑猶己饑斯謂愛民之術仁見謂仁知見謂知初無私己之謀饒舌云云優容幸幸謹奉啟并以所言五事開具詣省幕以聞伏惟台慈鑒念一開荒田夫民之有田猶魚之有水也魚無水則枯而死民無田則饑而斃原民之情豈不欲治田以養其生哉今長洲縣崑山州等處水深圍田積荒嵗久無錫常熟等處殘破地面荆棘連天其各處流移之民餬口四方而無卓錐之地是皆欲業耕稼以養生者也但所慮者犁鉏纔舉即有征科廬舍未完便當差役是以寧受艱辛且逃租賦寧甘窮餓不還鄉土每嵗雖蒙官司招諭復業及委官勸農不為不至而民之所慮如此遂成虚文况各處低田圍岸久壞非一時可能修築積水甚深非一時可以車戽必須隔年料理以俟春耕田家作苦舉筆難盡如蒙呈達省府行下各州縣踏勘荒田數目叅酌至元年間叅政開荒舊例聽令諸人請佃每年不過若干初年官不徴糧私無租課應干雜役俱得優免次年公私半徴三年成熟然後全征如此則人皆為養生之謀而不憚工力之費一二年間官糧數増國家享無窮之利矣開此荒田官民兩便一除民瘼為政以恤民為先若夫民瘼未除而謂能卹之者謬矣然今之民瘼未易枚舉姑以前月切近者言之如崑山州等處上年旱澇相兼髙田則禾苗枯槁低田則積水瀰漫各都里正及佃户細民經官告狀俱有堪信顯跡不期驗灾官吏不行詣田踏視從實免征止坐各州縣衙門及諸寺觀逼令鄉胥里正一槩伏熟繼後部粮官吏驗數征納其細民棄業逃亡十去八九但將各處里正絣扒吊打責限陪比破蕩家産終不能足幸蒙上司體察里正人等發下所屬州縣乃得疎放立案擬于秋糧内帶征若今嵗秋粮之時果于里正名下追征其里正百孔千瘡奚暇再剜其肉以補于兹必着落原佃之人一同部内上下交征决致失所况連年兵革擾攘差科繁重里正人等俱各消乏誠不能以一嵗之所收辦兩年之租賦縱使捶楚之下求而得之甚非國家愛民之意亦非諸大臣恤民之政也如蒙言諸省府移文郡邑從實免征庻使里正之家免于破蕩力田之衆不致逋逃非惟今嵗秋糧易于辦集而亦免下年荒廢其田矣除此民瘼斯民幸甚一抑豪强貧富不等借貸有之舊制民間私債月息三分年月雖多不過一本一利誠良法也近年以來其官豪富强之家乘人之急取利過倍少有逋欠凌虐百端或于借貸之時勒令併利作本虚立文約明起三分利息實收過倍之數或有還欠利息倒換文憑利上生利或寛收窄放更易斗斛或左右邀求减剋分例其舉逋還債之人阨于窮窘吞聲忍氣噤不敢語良可閔惻上年幸而官府知之出榜禁約但久弊不能頓除如蒙申明舊制定立罪名嚴加禁治庻使權豪嗜利之徒畏懼憲刑毋蹈前非抑强扶弱公道幸甚一積軍儲為國之要足食足兵然兵固不可無食而用也但頻年水澇嵗無全收如無錫常熟等處殘破之餘田地抛荒租糧减數今國家軍儲之用常恐不敷况凡有賞勞俱用米粟動以數百千石為無益之費至于青黄不接軍人有缺食之憂百姓有借粮之患竊嘗觀之有司催辦米如珠璣濫賞贏餘粟如塵土此理曉然人所共見今後宜從省府移文禀知太尉遇有功賞從公斟酌或以多爵之榮或犒以金銀等物撙節米糧以備饑荒如此則倉廪之積日増月羡漕運可供軍儲可給而民無和糴預借之患矣多積軍儲公私便益一増俸祿張官置吏本以治民黜陟幽明欲其稱職然必須俸祿足以飬亷然後考其成否而黜陟之斯可使之無憾矣今府州縣之職最為繁雞大小官吏之俸類皆鮮少仰事俯育寧免素心洗手奉公誠不易得其間以貪汚黜罷者固不足恤而清貧亷介祿不償勞者上之人宜軫念之如蒙建言本省告之太尉以官吏俸給之數酌古準今量加増益如此則居官者可以絶貪墨之心百姓無侵漁之患矣傳曰忠信重祿所以勸士俸祿之増公道幸甚賀偰知州到任啟騎竹羣童爭先遠迓扶藜一老敢進常談或可比乎芻蕘庶無棄于菅蒯嘗謂州縣作民父母詩書為世範模必須酌古準今乃能承流宣化蟠根錯節毋令挫利器之鋒流水髙山正欲奏朱絃之曲夫御吏治民之要惟正己格物為先吏或奸欺民多疾苦但鄉無呌囂隳突之吏則田無歎息愁恨之民照日月于覆盆轟雷霆于蟄户寛猛相濟㤙威並行省刑馴致于無刑聽訟當期于無訟魯中牟之淑化官至司徒黄頴川之循良入為丞相茍有為于今日亦何異于古人恭惟某官屢世簮纓一門科第金薤琳瑯之文采玉壺氷露之襟懷花縣相傳藹仁聲于荒服蒲鞭不用布德澤于疲甿下車纔一月之間比屋皆二天之惠皜皜乎不可尚恢恢乎其有餘鷦鷯之巢一枝本非素志鳯凰之翔千仭方進修程跂余望之自此升矣某素嘗仰斗近獲披雲過蒙禮貌謙謙喜聽政聲藉藉芘寒有賴獻曝何慚三千年黄河一清坐待太平之日九萬里摶風直上佇看大用之秋有猷有為善頌善禱龜巢稿巻七欽定四庫全書龜巢稿巻八元謝應芳撰啟劄子状箋表蕭答張納幣啟松堅晚節梅占春魁恭惟某官起居有常動靜多福某幸扳華閥獲締莩盟敬慿一紙之書用效七襄之報祗詞燕申且嚴鱗甲更兾順和平之序而加調甘㫖之羞予日望之自此升矣出使展埋輪之志閥閲殊髙封侯由給餉之功源流己遠幸二姓之合好占八世之莫京令姪精習讀書拾芥之功名必取孫女粗勤織絍采蘋之法度能循荷葑菲之不遺俾蒹葭之有倚兹承奠雁喜近乘龍苐慚奩具之蕭條莫稱洞房之張設幣帛筐篚其厚意拜而受之男女室家之大倫永為好也答請期啟合歡尋月老之盟將偕鴛偶涓吉訂星翁之厯乃遣魚書既承黄絹之好辭敢謂綠窓之難嫁曰迎鸞於桃李春風之日尚喜從容欲奠雁于松栢嵗寒之時何勞鄭重蓋篤婚姻之好合崇道義之交迨其吉迨其今敬聞命矣宜其家宜其室適我願兮賀闞信卿生日壽八十嵗三月初一日生生申令辰二月後初交三月比彭髙壽十分中纔是一分子孫克肖而俱賢嵗月方來而未艾敬將薄禮仰祝修齡非熊非羆夢必形於西伯如岡如阜壽將比於南山申賀率然丙融幸甚張回鄒定姻三幅啟緑野春明畵堂日永某官百靈交相多福駢臻某遥望隣封近通姻譜仰辱問名之禮敬酬交好之書心馳宴居首陳魚素敢兾對乳燕青春之景而加調紫駝翠釜之珍愛助一杯勤惓三祝昔南軒以道鄉可敬曽為䟦甘泉之銘今東泊與時干相聞且喜接隣封之境惟先世斯文舊契宜後人此日新婚令嗣筆豔春葩力勤儒業姪女燈明夜績志在女紅幸有良媒乃成佳偶采下體菲葑之外將厚意筐篚之間受言藏之永為好也投我以桃報以李正三春桃李之時丈夫有室女有家乃百嵗室家之願有懷依倚無任欣榮陳彦謙府史滿歸惠錢舜舉畵遣禮答賀發軔修程十載試蕭曹刀筆還家遠惠一緘遺顧陸丹青愧予龍鍾失此燕賀想萊子斑衣之樂勝買臣晝錦之榮不腆送芹切希笑粲挿茱萸遍兄弟予胥樂兮投木桃報璚瑶我無是也娶婦拜祖先致語伏以有夫婦而後有父子大矣人倫故齋戒以告鬼神重乎婚禮幸及時以成家室敢即刻以覲祖宗參酌時宜兼從古制既不忘於報本乃可得而合歡濯濯厥靈降藍橋之仙宅洋洋如在坐花燭之璚筵伏願先世埀恩新人蒙福有是父有是子一門天爵之榮宜其室宜其家百世雲孫之盛合巹致語竊以禮言合卺自古有之俗曰交杯其來尚矣于結髪百年之始合開顔一飲之歡孔雀屏中選當年竟成伉儷鴛鴦盞同傾此夕豈不歡娯伏願孝順庭闈諧和琴瑟新粧不俗朝朝畵張敞之眉敬對如賔日日舉孟光之案詩曰花燭春輝照洞房藍橋仙偶飲瓊漿開花結子三千嵗人與蟠桃壽總長拜舅姑致語伏以男女居室之願喜得及時父母舅姑之尊先當行禮欲居敬而行簡乃酌古而準今試看花燭熒煌何異桃源㑹集拜舅姑而及舅姑之宗族拜親戚以分親戚之尊卑各致殷勤咸加恭敬伏願夫夫婦婦同心和順於六親子子孫孫一氣流傳於百世趙與蕭請期啟嘉㑹合禮尋月老之姻盟内事用柔訂星翁之日歴納幣於小春良月之吉御輪於大寒信宿之先是用成行必蒙允諾嵗月日時無易迨其吉兮男女居室大倫永為好也寸芹脩敬一粲為榮趙與蕭聘啟蘭陵之蕭衣冠素盛石橋之趙門户今寒月老書其姓名雲孫知為僥倖令孫女鍾禮郝法乃天生眞淑之姿某男周誥殷盤亦日誦聖賢之訓曩中牽絲之選時為佩韘之童數年粗喜其長成六禮豈容於缺畧男女之際婚姻之始區區幣帛之將父母之命媒妁之言永永室家之好蕭答陶納幣啟二首十月小春一年好景恭惟某官起居惟適祿福是宜某舊日相知新婚可喜辱子雲之筆札効女星之報章躬問宴居首陳鱗幅其必對畵閣紅爐之景而加調紫駝翠釜之羞善保儒珍早登仕版讀五柳先生之傳何慕清髙論八葉宰相之家俛慚寥落夙昔友一鄉之善婚姻占八世之昌令嗣誦詩讀書克脩儒業孫女治絲執枲方習女工既叶鳯占將成鴛偶辱錦繡之贈如此乏璚瑶之報奈何受言藏之永為好也兄弟子猶子愛芝蘭玉樹之芳父母心為心喜松栢女蘿之施王答鮮于定婚啟二首菊存晚節梅近小春恭惟某官森衞百靈起居多祿某因親雖舊結好惟新來書粲四六之文復狀致再三之敬寅恭上問未竟下忱其必順風霜氣候之清而加養玉雪丰神之秀佇膺鶚薦即奮鵬程宋相以福星為比族望殊髙晋人以嵓電見稱風流何在詎圖僥倖乃締婚姻令嗣能讀父書功名必取孫女勉遵姆教工巧何能既赤䋲繫足之有縁當舉案齊眉之永好一誠相體六禮何繁笑折黄花答今日殷勤之贈寄言紅葉待他年伉儷之諧張與巢求贅親啟交情至舊眞如鮑叔相知姻事從權欲效秦人出贅兹蓋天作之合亦云時措之宜欲以幣交未蒙金諾先此行成于月老便須涓吉于星翁所恃久要毋嫌欲速就爾居就爾宿送劉郎暫入天台從如雨從如雲看韓姞終歸蹶里獻芹可愧鑒茹為榮王與巢定婚啟二首楓錦裁紅荷衣換綠恭惟某官考槃阿澗詒福岡陵某宻邇鄭鄉喜諧齊偶爰發鹿皮之幣敢修魚腹之書上詷履祥初嚴蒙吉對去燕來鴻之景進烹龍炰鳯之羞前迓恩榮下情煩禱洗耳臨流水千古髙風拄頰對西山一時佳致雲孫幸甚月老書之令姪女養在深閨兼備德容之美小孫男出就外傅粗知禮義之方亦云鳴鳯求凰詎謂食魚必鯉問名伊始合好惟新男女居室大倫願言偕老幣帛筐篚將意幸兾包荒薄侑寸芹别陳尺楮王與符定婚啟二首風露䨇清水天兼凈恭惟某官于時處處降福穰穰某雖隔花封忝居莩黨敢奉尺書之敬仰干丈席之尊既諏茵鼎有嚴簡書當桂子餘香之秋得棣蕚相輝之樂請稽月令善保天和樂施恩多尚書令遺風可仰太平策在文中子正學誰傳過攀閥閲之髙乃合婚姻之好令姪女閨房毓秀粹然四徳兼全姪孫男燈火相親勉爾一經粗習所幸中東床坦腹之選豈非藉赤䋲繫足之縁問名通魚腹書將意遣鹿皮幣薄乎云爾歸斯受之夫婦有室父母心信前縁之不謬婚娶論財夷虜道知髙誼之不然請期啟婚姻無六禮之繁實欽髙誼唯諾若千金之重足見眞情行成既托於氷言涓吉乃稽於星厯擬三月中旬之始合百年佳偶之歡想周南梅摽有詩看陳村杏花堪畵得及時也式我願兮承顔當合卺之期敢云燕喜將意表折梅之敬尚兾包荒欣忭有餘敷陳㒺既王聘巢啟男女擇德聖賢之訓昭然婚姻以時父母之心同爾願言合好庻免愆期令女四德兼全天生淑質小孫一丁粗識日習遺經念厥祖之暮年宜此兒之蚤娶幸蒙金諾肯賜玉成敢將奠雁之儀就訂迎鸞之約後觴九日星在户星在天御輪三周從如雲從如雨請巢氏父母送鸞二首男室女家喜畢大倫之事山殽野􅉡可無小酌之歡敢望髙車肯過衡宇相邀愧泥濘勿辭送仙子乘鸞髙誼薄雲天所願得嘉賔式燕許年聞林下之風喜成姻婭後夜聽鐙前之語願叙團圞仰屈魚軒寵臨蝸舍之子宜家宜室必加敬式之辭騎從如雨如雲將見爛盈之美請符氏父母送鸞二首居室大倫喜佳期之在邇婚姻良㑹宜此夕之為歡掃羅雀門迎衛鸞從烹葵邀上客甚有愧于荒凉隨柳過前川必不辭于光賁嫁織女于河西依稀渡鵲降姮娥于月下縹緲乘鸞􅉥予望之切有請也燕衎如兄如弟適當姻禮之初象服如山如河願覩母儀之盛蕭聘張啟張良為功臣與蕭何同稱三傑張禹有愛女嫁蕭咸而得近居既兩家先世如斯宜百世姻聨于此令愛育閨房之秀能采蘋蘩小姪當門戸之勞頗知稼穡僥倖中牽絲妙選因循欠納幣常儀欲調羮以奉其慈闈奈乏人而主乎中饋禮慚遲慢事幸速成雖無雙璧之將己拜百金之諾今日聘明日娶即迎鸞從之歸五世昌八世京永叶鳯占之吉姪娶請親翁啟吾弟惟一息幸畢婚姻女子願有家必蒙往送望公車騎光我階庭挹丹桂之香風玩清秋之明月花燭洞房之喜相與欣欣竹林歩兵之遺不妨衮衮張答鄒請上客啟二首兩小無嫌蒙養喜成夫婦一尊重與太平宜㑹婚姻伏辱寵招本當趨赴藉手乏荆釵之飾何顔覩花燭之輝男有室女有家且遂齊眉之樂膏吾車秣吾馬别圖㑹面之期童婚三載喜合卺之有期王母肆筵辱貽書之見召維慚蓮髩合拜蘭姿奈老態之龍鍾久無心于燕樂梨花夜月對繡佛以長齋花燭春風想金屏而多喜代王孟學答張希良賀乃父置妾劄子一婢赤脚家君每謂包羞雙魚素書使者乃蒙言賀適逢早出難擬暮歸僣啓三印之封景見八珍之貺本無禀命合用繳囬奈雨師滂沱之未休恐星使往來之多累弗辭躐等遂用拜嘉今日目前甚愧璚瑶之匪報他時膝下當言珠璧之暗投賀置壽器劄子鼎新壽器比銀鏤之黄腸珍重安居喜玉枝之無汗雖賢達豫謀其身後歡娯益享其目前是用送芹敢希笑粲賦詩自挽君應有陶令佳章荷􅓩相隨誰不慕劉伶髙見王文甫嘗卧疾諸親友探問醫禱禮意甚勤疾愈欲置酒叙謝未遑也至是設盛席招之凡十有七人各書以請歌偪仄行念隣民之久别作眞率㑹慕前軰之遺風擬兹廿一日清晨舉我二三年缺典踏雪沽酒敲氷煮茶思向來採薪之憂難得此盍簮之喜白髪三千丈相看若圖畵之竒金釵十二行但愧欠笙歌之盛右請蕭桂岩曩嵗負新之憂屢厪存問今日折梅之信敢有相期卜大寒一日之先作小酌三杯之欵願陪談笑并謝扶持奴白飯馬青芻聊盡少陵之意膾金虀羮玉糝眞如坡老之詩右請蕭舜卿讀床頭易屢蒙枉問氷廬稱飲中仙每羡隱居雲壑斗酒將謀于小席尺書預奉以邀賓待堯蓂四莢之新如蟠桃一花之㑹志于道據于德勿云冠佩之殊和其光同其塵聊共壺觴之樂右請呉雲陵往年問疾屢荷殷勤晚景居安寧忘感激開小閣㑹數人之客至大寒先一日之期沽酒謝玉川先生下榻待南州髙士折梅逢驛使寄言報幽谷之春看竹到貧家毋吝踏前村之雪右請趙師呂向來問病曽勞得得相過老去投閑願奉元元髙論將社酒一杯之舉待堯蓂四莢之更亟掃蝸居秪迎鶴駕陶陸同社幸無麯糵之嫌孔李通家况在葭莩之末右請姜紫霞曩辱問平安之竹念我顚危邇來對索笑之梅思君契濶速客先大寒一日呼兒辦小酌三杯敢用坐邀幸毋他却頗嘗見此客不談塵生風顧安所得酒乎隣酤踏雪右請張伯起往日負膏肓之疾多荷扶持連年懷肺腑之親無由㑹集當此嘉平之月適為閑暇之時敢謀廿一日泥飲之歡何異三千年河清之㑹願切有請惠然肯來摘我園中蔬盤飣初無異品為此席上客襟懷皆喜相知右請陳嘉㑹昔擁衾聞鬪螘之聲曽勞下問今對酒如長鯨之吸願與髙談期大寒一日之先望清早羣賢之集螘浮仍臘聊索笑于梅花騎氣如虹必増輝于蓬蓽右請月仲承故舊不棄曩勞問疾于吾廬潦倒餘生合罄謝言于姻黨在嘉平下旬而先一日擬延留上客以共三杯酌言醻之切有請也有客過茅宇跫然空谷之音携酒㸔芝山乘此剡溪之興右請蕭定卿人生幾何汨汨塵勞之事嵗聿云暮區區擬飲之謀待堯階換四莢之蓂望慶亭來五花之馬爐煨芋栗瓮㵼茅柴一簞食一瓢飲聊奉笑談之樂三握髪三吐哺豈辭迎肅之勞右請陳君惠疾病相扶持常懷往事故舊則不棄可無謝言敢于後甲三日之期聊為知己一杯之欵願切有請賁然來思瞻彼牛䑓郄騎攬揺金之轡過兹蝸舍長鯨吸藥玉之舡右請翁深甫有患有身曽荷扶持之賜相親相近豈忘感佩之情欲謝殷勤久成稽緩廿一日專邀大斾三五杯聊奉清談地爐煨酒暖如湯仍浮臘味金城土酥凈如練試簇春盤右請委用佐卧痾三載之先曽勞請禱話舊片時之欵屢欲邀迎奈何日出事生至此江空嵗晚先大寒之一日集佳客之數人對月歌竹枝當盡留連之意摶拳握松子願陪少俊之歡右請周華甫饋藥感康子之意懷不能忘置醴敬穆生之賢願切有請大寒之前一日小集之歡片時誦陋室銘望髙軒過灰香芋栗菲然盤飣之㣲索笑梅花忘却緼袍之冷右請陳君傑有患有身往嵗幾成枯朽是父是子當時多荷扶持奈相逢傾蓋為難遂久失舉杯稱謝先大寒之一夕請小酌之三杯田家拊缶之歌嗚嗚共發故人綈袍之意戀戀相看右請張漢傑曩嵗負薪之憂叠承書問今日折梅之信專用邀迎先一日于大寒㑹諸賔于小席煩君騎從過我蝸居觥籌衆賔之歡聊復爾耳綈袍故人之意何日忘之右請陳仲祥老無能為每有索居之歎嵗聿云暮可無良㑹之歡先大寒一日之期辦小酌三杯之欵願切有請惠然肯來注玉傾銀笑田家之老瓦揺金織翠過才子之髙軒右請陳伯將賀符君彦遇恩劄子平地風波偶罹人禍覆盆日月喜獲天恩惟吉直荷天之休使横逆如氷之釋某有懷燕賀無奈龍鍾敢將芹曝之儀少助竹林之宴呌囂東西隳突南北笑前時悍吏之來觥籌交錯起坐喧譁想今日醉翁之樂王與金定姻三幅啟二首四月維夏南風之薫恭惟某官台候起居多福某素聞華胄新締莩盟敢於六禮之初輙上一箋之敬寅恭事上申敬如前所兾順清和之時而加調甘㫖之饍行膺芝檢即上蒲輪秺侯珥貂之孫猶能世顯葉令飛鳬之舄豈得家傳媒妁殷勤婚姻繾綣令孫天生淑質兼全四德之稱小孫日誦陳編方盡三餘之力得佳偶之諧若此為大父之樂何如禮宜問名幣以將意王郎嬌客勿戲嘲坡老之詩金縷綉襦想富若樂天之語新親賀冬至劄子鳯鳴占八世之昌婚姻締好犧畫騐一陽之復時序更新循乃常儀賀此佳節恭惟某官道隨陽長德與年髙炯炯然若清氷英標㧞俗温温乎如愛日和氣接人方霑賜帛之恩將見安車之召某傾心仰斗轉眼書雲寄殷勤聊折梅花諧伉儷將尋𤓰葛日迎脩晷喜添紅線之工月閏來春擬講青廬之禮新親賀七夕劄子二首𤓰果庭前望鵲橋之仙偶芙蓉江上尋鴛侣之嘉盟因景物以興懷具禮文而脩好恭惟某官黄山毓秀綠野居閑立志清髙欲追蹤于巢父無心機巧豈徼福于天孫其初筵露浥之餘必遠召天書之至某謀身甚拙晒腹無書卜兒曹鸞鏡之圓看女子蛛絲之喜獻芹可愧笑粲為榮華屋神仙想穿鍼于良夜洞房花燭宜合卺于明年月老檢書久定婚姻之約天孫分巧豈無兒女之情敢徇彛儀以賀佳節恭惟某官令名揭日壯氣横秋縹緲十二樓正宜供阮庭之錦拍塞五千巻又兼晒隆腹之書舉頭睹銀漢祥光拭目進青雲髙歩某俯慚蹇拙仰慕清髙以𤓰果之時羞問梧桐之秋月薄乎云爾歸斯受之當此時占喜蛛絲擬來嵗往迎鸞從機杼織作毋勞吟草堂之詩黼黻文章但願遂柳州之禱新親賀端午劄于訂月下書幸締朱陳之好賀天中節合循荆楚之風景物來前禮文敢後恭惟某官身其蕭爽居則清髙月旦有評比南州之髙士日長無事卧北窻之清風九節蒲聊用引年三年艾殊堪濟世獨醒咸羡多福鼎來某舉目葵榴馳情𤓰葛雖所獻非雪羅風葛或可留付霧閤雲窻星候起居雷同問訊角黍逹昌歜遥知盡華燭之歡兎絲階女蘿續當有佳期之約納采道日劄子伐柯以斧言當納采之時差穀有書喜得用柔之日雖居敬而行簡亦酌古以準今待季春更六莢之蓂效野老獻一芹之禮惟無責備必賜包荒鶯語丁寧報金谷東風之信鸞粧次第看玉臺明月之圓問名道日劄子月老檢書幸自天而作合星翁視厯敢擇日以尋盟後中秋八日之期結佳偶百年之好切有請也能無從乎獻芹聊效野人題葉試看流水男女之際婚姻之始禮合盡於殷勤父母之命媒妁之言願早諧于伉儷袁與陸三幅啟二首綠野春明畵堂晝永恭惟某官考槃在澗増福如川某忝在舊交喜成新好敬致鹿皮之幣敢陳魚腹之書躬問燕居首陳魚素尚冀對朱雀烏衣之景更加調紫駝翠釜之珍引養引恬善頌善禱累世傳象山之學共仰髙風無人問牛渚之舟有慚明月鳯占既叶鴛偶期諧令愛育秀閨房生乃全於四德某男服勤門戸學則悞於三餘荷葑菲之不遺俾絲蘿之為好薄言納采厚望包荒春水桃花江上遣長須獻鯉秋風桂子月中迎仙女乘鸞鄒與陸聘啟甫里世居門望偉欝林之石道鄉家學師傳本伊洛之源藉氷語以聨姻實雲仍其多幸丁寧鶯語催促鸞粧令愛夙奉母儀禮已閑於内則愚男勉承父訓書頗讀於中庸顧惟在飄泊之餘願早遂團欒之樂六禮之文雖簡雙親之意實殷尚兾包荒毋嫌欲速迨今迨吉當歌梅摽之詩宜室宜家喜對桃花之景送芹可愧笑粲為榮新親賀冬至劄子八世莫京幸隂隲鳯占之吉七日來復喜陽生犧畫之初婚姻方重於交歡節序合先於稱賀禮雖效芹羮之獻物乃如葭灰之輕餘皆削去繁文昔己感承嘉命既書雲物便約星期香閣日長看刺繡新添之綫梅櫩春早遣過庭親迎之車朱答李取男帖贅姻劄子某揆辰珠滴檐花翠揺門柳恭惟某官考槃其在阿在澗介福則如崗如陵某依仁居鄭公之鄉枌榆甚邇贅子效秦人之俗𤓰葛維新荷不鄙西家之愚乃獲中東床之選首蒙厚禮言締嘉盟月下老既辱來前春帖子敬當納上題書桐葉足知流水之多情寄語桃花將續仙源之盛事某伏望翠蓬星眷戬穀日増倘有委令毋吝攽曉社學聘章用黨庠術序之良規學開鄉社求蒙養聖功之成效職在師儒頼琴堂為擇範模使編户得從規矩文風聿盛化雨俱霑恭惟某官學有淵源眼空淮海一斑窺見蚤逰風紀之司千仭翺翔遠避烟塵之境適張公為江海之客知伯牙有山水之音將欲脩鶚薦之書先請坐臯比之席姑鳴教鐸以俟徴車某願雲龍以相隨覩星鳯而為快敬將聘幣亟往招旌設絳帳於張林來青衿於鄭校予潔予進勿謂互鄉童子之難言于勤于思即若國子先生之善誨代朱𢎞道請張子安昆仲等别多㑹少居常諷詠於停雲時和嵗豐欲叙笑談於終日邀上客一杯之欵在中秋三日之先舉匏樽丹桂花前候蘭棹白蘋洲畔難兄難弟必能與吾弟偕行明月明年更約似今年同賞臨書率爾望賜惠然新親賀冬至劄子新婚交締占八世之莫京寒暑薦更喜一陽之來復節期在邇候問宜先恭惟某官韞玉儒林濯纓芳浦髙標絶俗炯若清氷和氣接人温如愛日蓋鍾以湖山之秀而得夫詩禮之傳棠棣聨輝才華益著書雲記事坐評魯史之祥賦雪成名行赴梁園之召某弟兄舊愛兒女新歡眷言尋合好之盟徼禮作踐長之慶念因親致親者久矣視居簡行簡而恕之葭灰飛緹室之時且酬佳節花燭盟洞房之夕始待初春謹此申聞伏希丙在新婿整容致語昔年占鳯皆云家世之昌今日乘龍果見門䦨之喜繼桃源之盛事留花燭之良宵魚水交歡燕雀相賀某人胸藏錦繡口吐珠璣種玉有縁聘婦投其雙璧籯金既富傳家兼以一經將畵他張敞之眉先整我潘安之貌秋水為神玉為骨人謂無雙芙蓉如面柳如眉天生一對敢陳蕪語用贊華姻詩曰一雙新偶錦鴛鴦百嵗和鳴翠鳯凰最喜天姿如傅粉不須湯餅試何郎伏願結髪維新齊眉永好夫夫婦婦常調琴瑟之音子子孫孫克紹箕裘之業新婦整容致語天孫配鵲橋之仙相依銀漢秦女得鳯簫之偶並樂瑶臺蓋居室人之大倫而婚姻世之重禮既諧鳯卜宜趣鸞粧某人珠箔銀屛繡襦金縷梅花㸃額作壽陽宮様之竒桃葉宜人有周南國風之美眼横秋水眉歛春山香閨移歩歩金蓮合卺出纎纎玉手不施朱粉本來如月裏姮娥若論清眞尤勝於人間西子欣逢好合敢頌輿言詩曰紅葉殷勤不負人燭花今照洞房春紅絲隔幔牽情久羅帯同心結好新伏願夫唱婦隨天長地久五男二女享盛福於髙年四徳三從著香名於彤管新親遣使請上客致語兩姓為婚永結朱陳之好千里命駕當如嵇呂之交持來雙鯉之書請送乘鸞之女柳筵盛設花燭邀迎某官喬木世家耆英人物美矣育閨中秀愛之如掌上珍繡褥金屏李監宅門䦨之喜瑶簪珠履孟嘗君賔客之多既當年擇對東床宜此日送行南浦金勒馬嘶芳草樓舡燕蹴飛花明月隨人春風滿路從如雲從如雨之子于歸星在戸星在天嘉賔式宴云云請期劄子曩中雀屏孫謀以為幸事今觀鳯厯親迎而有良辰越流觴三日之期請合卺百年之好燈花有約梅摽及時投以李投以桃用請期之常禮宜其家宜其室締諧老之佳盟專此申聞諒惟丙在請男上客五日季春兩家合好烹葵邀上客因舊親以結新親杖藜立芳洲望早酌而娯晚酌請女上客祓禊三日婚姻百年織女渡銀河鵲橋懽諧星偶王母㑹瑶池燕衎早駕雲車李囬徐再婚聘啟因親致親之好從古流傳舊婿新婿之詩正宜重詠魚腹聿來其書尺鸞膠將用於續絃令姪醫緩齊名以聰敏旁通儒術小女姊嬃同氣乃殷勤粗習女工齊眉之案雖新坦腹之床不易自天作合如月仍圓琴瑟鐘鼔之樂故多幣帛筐篚之將何勝前日受今日受不妨聘禮之來舊雨來今雨來重見御輪之喜囬芹菲薄副楮條之答請期劄子婚姻憑月老之言幸成佳偶聘娶攷星翁之厯喜有良辰催花雨正此連綿五朶雲遽然飛墜敬聞命矣迨其吉兮男女居室大倫古今所重嵗月日時無易遲速何辭答納幣三幅啟花朝餘景桃雨方晴恭惟某官天相閒居日膺盛福某僣扳華閲幸締莩盟輙囬魚尺之書專問燕居之敬祗調燕申巳嚴魚甲尚兾對芳菲之景而加調甘㫖之羞善保安閑式副頌禱一舍相望皆住鶴溪之滸二姓合好永諧魚水之歡載笑載言迨今迨吉某人案頭燈火殷勤黄巻之間而某女針指衣裳寂寞綠窓之下荷不遺于葑菲斯可擬于松蘿納幣今朝結褵有日桃花灼灼喜婚姻如此其宜𤓰瓞綿綿看嗣續將來之盛囬儀菲甚副剡條之納幣啟張知府子聘盧推官女文武才之並稱夙欽華胄齊魯論之兼講甚愧㣲宗知心本出于同鄉愛子乃求其嘉偶鄰封伊邇姻好維新令愛四德俱全自是閨房之秀長男一經粗習尚須燈火之工雀屏幸中於前時鴈幣宜陳於此日星翁涓吉月老行成承筐之意既將合卺之期可待鐡瓮城山花夾道似入桃源金斗門官柳長街將迎鸞從寸芹菲甚副楮條之賀娶弟婦劄子令弟號河東之鳯生有竒才仙娥乘月下之鸞來為佳偶禮成合卺喜溢連枝想洞房花燭以歡娯送野老芹羮而慶賀塤箎交作一家藹和氣之春琴瑟和鳴百嵗永齊眉之好薄言申控厚望丙融又兄督厥家重乃友于之義弟宜其室合兹宴爾之歡鳯卜有靈鴒原多喜某人胸襟量濶洪如萬頃之波手足情親常共對床之雨稱二難於月旦行六禮於婚姻某忝在莩親敬持芹獻想鴻雁之行有喜受燕雀之賀無言翠舞珠歌花燭夜驩諧伉儷金昆玉季桃源洞盛集神仙俛述蕪辭仰希藻鑑納婿請上客得賢婿美如玉潤樂與同居慕親翁文有金聲願陪情話髙軒寵過陋室増輝請親眷送婿女挿荆釵幸致東床之婿客來茅宇毋嫌南阮之貧傾蓋有期執盃專俟又得婿如桃源之樂琴瑟和鳴邀賔共花燭之光樽巵小酌式相好矣請無却之瑣瑣之姻納婿欲叙團欒親親之長來賔誠為光餙再三申敬千萬寵臨祖為孫娶請親家狀抱孫欣有室之年寔為僥倖送女見宜家之好共樂團欒花燭將送慈裾寵賁祖母娶孫婦請親家母狀孫娶而倚門龍鍾亦笑女行而結帨鸞從將臨願覩蘭姿請移蓮歩問名三幅啟萬答蔣天方嚴肅月乃嘉平恭惟某官台候動止多福某交蒙舊愛姻締新盟承書粲駢儷之文答簡致殷勤之意前陳候問上徹覽觀尚加調紫駝翠釡之珍以安處畵閣紅爐之樂蒲輪有召梓里増榮山隨蔣姓大宗夙著於圖經莊用萬名先世亦稱於鄉國荷雲誼平居而交契宜氷人相語以聨姻令孫誦詩讀書承祖風之淳謹小女治絲執枲遵姆訓之工勤吉從鳯占喜成鸞偶擇德之初心既遂問名之彛禮何多受言藏之永為好也竹開三徑相望如倚玉之榮梅贈一枝􅂓仰作報璚之敬請新親家翁狀愛女甚於男人皆羡安昌之比見我有此客孰不云文定之榮請式宴以交驩望御鸞而光賁請新親家母狀降月府之姮娥佳期在邇宴瑶池之王母良㑹維新立候蓬門望移蓮歩謝免糧表兩浙奉蠲租之詔恩意天寛羣黎懷結草之心懽聲雷動睠斯民而得此實亘古以無之欽惟德合乾坤明同日月生知安行之聖巍巍成功以博施濟衆之仁洋洋育物干戈既戢禮樂聿興普天率土慶以來歸甘露卿雲紛其呈瑞臣某等叨居劇郡幸遇明時遥瞻丹闕之光仰效華封之祝一曰壽二曰富龜疇之景福無疆千斯倉萬斯箱農畮之豐年多慶中宮箋德配一人聖政有内廷之助恩霑兩浙公私免編户之征臣庻均歡古今希遇褘衣合則垂懿範於宮闈彤管紀功示母儀於邦國厚同坤載壽與天齊臣出守㣲邦蒙恩大幸家給人足喜關雎麟趾之化行時和嵗豐徯龍馬龜圖之瑞出東宮箋主器叅萬機之政日用三朝綸音蠲兩浙之租恩霑庻姓震長居儲離明協照星辰河岳煌煌氣象之新車服旌旗奕奕威儀之盛夷夏咸悦春秋鼎來臣等藩守至㣲葵誠上謝農餘粟女餘布樂謳歌朝覲之歸書同文行同倫統侯甸要荒之服聖節賀表九月初五日皇天錫羡篤生聖哲之姿化日舒長馴致雍熈之治春秋鼎盛夷夏咸懽欽惟德配二儀量包六合立綱陳紀同天下之車書偃武修文舞階前之干羽蠲租賦以紓為民者之力増俸祿以飬為官者之亷庻績其凝彛倫其叙臣某叨居郡守陪列朝班黎獻為帝臣粤有陶唐氏萬邦之衆壽富多男子敢效華封人三祝之誠千秋節賀表誕彌厥月先重陽五日之期時乂惟天繼洪祚萬年之業永隆邦本大愜輿情敬惟以孝以仁惟明惟允鶴駕鷄鳴而問寢朝夕承顔龍行虎歩於太平乾坤篤祜丕承寶緒益衍瑶圖某等㣲若草茅誠同葵藿望神樞之電繞壽祝儲宮願化國之日長恩霑寰宇冬至表龍飛御九有之師尊居丹扆犧畫驗一陽之復律應黄鐘愛日舒長普天蒙福欽惟乾坤合德日月同明度越古今用武功而平四海制作禮樂敷文德以教兆民當亞嵗之令辰納應時之洪福某忝居小邑阻賀大廷干羽兩階想天顔之有喜衣冠萬國仰雲物之餘輝東宮箋七日來復陽生緹室之初八表依歸位正青宮之久欣逢令旦茂輯嘉禧敬惟天生聰明日新成德能仰承於聖訓用叅贊其皇猷眎金鏡以納忠義崇風紀奉玉巵而上壽恩重天倫邦本益隆輿情允愜某叨居下邑賀語前陳夙興視饍而問安更有書雲之喜賢佐保躬而傅德尚論愛日之誠中宮箋陽生葭管天時妙斡於𤣥機懽藹椒闈日晷新添於紅線掖廷和樂寰宇清寧敬惟壽與天齊德同坤厚萬乘至尊之賔敬雅重褘衣六宮内則之教修尚勤元紞載逢令節益介繁禧某㣲若草茅誠同葵藿履長今日宮中奏式燕之娯習美成風天下頼關雎之化正旦表普天率土幅員歸一統之初獻嵗發春正朔届三朝之始時調玉燭喜溢瑶墀欽惟聖德乾剛神功震赫蕩蕩乎如天之大人所難名昭昭乎如日之升物無不照履始和之吉月嚮洪福之萬年臣某等忝牧邑民阻趨庭賀鳯厯頒春於天下化及華夷獸樽置酒於殿前樂聞忠讜中宮箋四時成嵗洊逢泰道之亨萬物資生實仰坤儀之盛春囬寰宇歡藹掖廷敬惟位正褘衣功成元紞風教天下關雎正始之音朝夕宮中巻耳求賢之志履端有喜介福宜多臣某等領邑覊縻望闕稱賀紫宸配德新年布澤如春彤管流芳億壽與天同載東宮箋正月之吉始和輿情共悦維天之命不己嗣服益隆春藹青宮祚延蒼籙敬惟長為主器允應貞符親傳精一之心淵源聖學叅决萬機之政黼黻皇猷迎新茂對於良辰端本繼承其大業臣某等叨居縣邑阻賀宮庭鳯厯頒春大地之羣生有喜龍樓問寢齊天之洪福俱増龜巢稿巻八欽定四庫全書龜巢稿巻九元謝應芳撰序送黄仲賢同知呉江州序國家以民為本故州縣守令之職必愼擇焉以其近民故也茍知近民之理則必如醫之近人察其脉而知病否農之近田視其苗之美惡母之近子求其意而知惡欲苟非其人則何異以巫為醫以工為農以塗人為子之母乎至正己巳秋太尉丞相知黄公仲賢之能啟奉上命命同知呉江州事其職可謂近民矣或曰君前為江西省照磨為南臺掾雖所至蔚有能聲未嘗近乎民也矧今位州長之下僚佐之上凡所處决非己得專其為政也不亦難乎余曰不然位不同而理同茍吾之理明如鏡照物持此以居同僚之間無偏執無詭隨一州之事交相可否舉直錯枉惟理是從必能使斯民無歎息愁恨于田里者矣夫如是可謂醫之知病否者也農之識其苗之美惡者也母之能求其子之意而知惡欲者也近民之理如斯而已君之行其友某等請余以理之一言叙而送之余則毘陵謝應芳也贈卜者陸仲明詩序卜筮之説予嘗著辨惑編論之詳矣今吾友徐君伯卬謂中呉陸仲明氏善卜往往以疑事决之其應如響故率諸善文詞者贈言且徴予為之序夫卜功臣雖唐虞之聖猶用之若三代則塗山之卜飛燕之占百穀之筮皆騐以興國特不知當時掌蓍龜者何如其人也春秋時或者謂蓍短龜長而龜獨重於世家國大事未嘗不謀及之善卜者誠能紹天之明以七十二鑽洞明吉㐫其人豈易得哉但世之假龜䇿以售妖誕之説者垂簾居肆所在有之君子不能無憾焉夫以伯卬之明智而稱仲明若此則仲明之精於卜也可信矣雖然昔君平於問卜之士語臣以忠語子以孝其諸善道莫不隨其人以詔之於世教殊有補焉諸君既賦詩以譽仲明予不佞請復以是規之仲明其留意焉婁曲書堂詩序人情孰不愛其子乎惟其愛之以德使之能自樹立斯君子之愛矣崑山殷君叙父有見於兹視籯金不如一經及買書築室於婁江之上命其子奎曰與師友講學寢處食息乎其間而奎也服膺父訓篤專厥脩或經嵗累月足不跡庭户外學與日積聲聞遠邇若參政鄱陽周公亦過而嘉之扁其室曰婁曲書堂既而銕厓楊先生及諸名勝皆有賦詠而予亦嘗題其壁焉今君叙又欲因詩以賈其子之餘勇而益進之乃裒集諸詩時令諷誦且俾予序所以集詩之意吁若君叙之愛其子者可謂君子矣奎字孝章亦可謂孝於其親而名不虚得矣余嘗三復是編顧其詩類多警䇿不特頌殷氏堂構之美而已使凡為人父為人子者得而觀之又且有所感發興起而為風教之助云杏林春詩巻序予嘗讀列仙傳至董奉杏林之事嘗掩巻而歎曰嗟乎奉必有道之士而隱於醫者也觀其用藥活人而不責人之報以杏易粟且復賑夫飢者非有道而能若是乎傳者蓋欲特著其事託為神仙以髙之殊不知君子之所取者在此而不在彼也呉君中行去奉千載景慕之將繼踵其美乃大書杏林春三字於齋居之室示不忘也所謂杏林者蓋根于胸中方寸之地而春則發乎秉彛之天流芳後人傳之不朽蔚然嘉樹而已吁中行之學人固知能世其家而其心則予猶恐人或未之悉也今觀四方士大夫遺之詩文咸嘉其存心之仁擬諸董仙無間然者可謂有諸中形諸外矣予於是益加起敬三嘆之餘用題巻首送琇上人序予聞浮屠氏之學其宗有三曰教曰禪曰律教以明法理禪以悟本性律則操且式而已三家説行互相優劣果孰得而孰失哉吾意其宗於教者猶儒而窮經要得其本矣彼禪兾頓悟律謹細行雖各有義然循其常而求之始乎粗而卒于精始乎求其言而終有得於言意之外者則於教誠有取焉玉林師有見於兹也自少走呉楚間求其深於浮屠氏之書者從焉又旁求吾儒之書而讀之故能嵗時享其祖禰而且仁其族也予故與之交且暱焉今玉林以斷雲法師主澄江迎福之席得華嚴之傳往貳之以尸其悦衆之職吁醍醐甘露悦乎口者也秘宻之藏要妙之理悦乎心者也師往以其書究竟衍説廣示其衆來學者之飫焉孰不歡喜而信慕哉而况有得于吾儒㫖邪于是衆餞以詩予則為之序云送慈晋卿序秦漢以來官不封建為郡縣者往往以交承之數視為傳舍治效蓋蔑如也况巡檢或以省檄為之遇郊授者截日代去其傳舍尤非郡縣之比惟慈君晋卿則不然君來奔牛即諗諸衆曰吾居此誠不知能幾何時然食君之祿雖一日必事其事爾吏必謹其案牘爾廵兵必嚴警邏否則必汝責弗恕於是各殫其力而君之用情尤倍之居民謐寧盗賊屏息四境之内晏如也既而郡府以材幹聞復以渠堰等事委之夫奔牛當驛路之衝凡朝廷使命之出東南方物之貢與夫省憲百司往來絡繹罔不役廵兵䕶送之稍緩則怒罵鞭朴皂𨽻不能堪而君處之泰然每以身代廵兵之役退無怨言閲四年如一日蓋其立志之確而忘其勞且辱也今鄉人德之郡府嘉之儒紳君子咸賦詩以華其行吁世之傳舍其官者聞慈君之風亦可少變矣送秦彦明序士不可以窮達論也窮而耕莘達而阿衡窮而釣渭達而鷹揚窮而版築達則霖雨所謂窮達者時也鄉使賢者不遇於時則終為莘野之農渭濵之漁傅岩之賤夫耳吁今人猶古人也惟其藏器於身待時而用不躁不競斯為可貴世之狐趨狗媚竊利祿以榮其身者君子耻之淮海秦彦明儒先之子也家庭之訓聞此熟矣觀其所負之器如干將莫邪用為補履之錐豈其利哉然為貧而仕與時浮沉未嘗有毫髪躁競意征商之暇每與僕痛飲劇談商畧今古語及先民耕釣版築之事必奮然扺几慷慨激昂盡醉而後己今其行無以為餞請以疇昔嘗所共談者書以贈之以堅其待時之志送趙縣尹之安仁序余聞古鄱陽之地土沃民富物産饒衍故以饒名州考之今則銀錫絲枲魚稻之屬誠夥其民誠殷名不虚得矣郡屬州縣六安仁其一也土壤民物視他邑為最或謂其民習奢靡蕩禮法不才者居多土沃故也為此邑者厥惟艱哉是不然凡民之情有恒産而後有恒心庻且富而後可教否則汲汲焉救死不贍教將焉施然則安仁之民其可教者歟奚其難但近時州縣吏視其地之瘠肥民之豐嗇以為幸不幸者其意有不在乎治之難易也今趙君天祺為安仁令吾知能教其民而不以為難也必矣何以言之往者君大父為賢守令著稱于時君卓然有祖風烈製錦斯邑牛刀發硎豈不恢恢乎有餘地哉斯民吾將見其被絃歌之化成禮義之俗熙熙乎耕稼之為樂也寂寂乎雞犬之相安也皥皥乎不知帝力於我為何如也麻中之蓬亦何待矯而直哉君之行可慶者如此而其民又豈不大可慶乎贈刋字張生序古者毫楮未興書以刀筆故六經往往口傳耳受不能無誤然識者正焉其失猶未遠也毫楮既作書道乃備轉相傳冩譌謬滋多至近代板刻之誤而人有不敢遽易者况俗徒規利至有節去其詞使章斷句裂以誤學者然板既行聖經賢傳乃得家傳而人誦之固亦有功名教矣金沙張敬之善鏤書者也家本業儒故能矯二者之弊且以篆𨽻究字書原委偏傍㸃畫亳髪無舛士大夫咸以是稱之方今天下文明正制度考文之日館閣諸書校讎有人勒之琬琰以幸來世將有取若之藝者若之名由是亦彰矣敬之其勉哉送崔仲德序予往京口之行識崔君仲德於諸葛用中席上温温其容抑抑其儀其言議粹然一出于正心竊敬之意其人非天質之美必師友淵源之懿也既而詢之士大夫乃知君姚文獻公之門人自早嵗篤學尚友千古文獻公特器重之及壯侍親宦逰臺閣多薦辟不就今也為貧而仕監税呂城予嘗壺觴闕亭得以聆文獻公緒餘之論窺君抱負汪洋無涯既而部使者諗君之才以郡中危難事命之蟠根錯節迎刃而解識者韙之或曰君往年唾視軒冕至是何屑屑如是邪予曰不然仕止久速時也安知徐驅於後者不疾過於前哉苦心志勞筋骨空乏其身又安知非天之所以玉其成乎予聞文獻公宗孟氏之學君於此聞之熟矣尚兾尊所聞行所知以益勵其所守功名爵祿特餘事耳請以此為臨别贈送小河徐廵檢序常為淛右大藩府統州縣四廵檢司又五倍之獨小河瀕揚子江風帆浪舶輻輳岸下販私鹽以漁利者往往與居民通甚者禦人江海之上日熏月炙惡習滋蔓數年以來號稱難治淮安徐君逹善適官於兹君患之視政之日既申明憲章以嚴警邏吏不敢肆卒不敢怠未幾民有蹈前轍者追亡摘伏㒺或遺漏境内肅然道東西行者爭稱譽之由是郡知其能乃命攝奔牛黄土之警君一以公勤涖之民以謐寧閲五載如一日今代去彼鄉人之頼以安者設祖帳青城下皆依依然不忍别余既嘉君之有德於民亦喜其民之不忘德也吁今天下之盗豈止是哉蠭螘之衆竊兵於遐陬豺虎之徒賊民於當路斯居民尤苦之以君之才使之佩虎符擁􅆛貅則蠭螘可掃也使峩廌冠持玉節則豺虎可擒也蜂螘掃而豺虎擒斯不負其才矣贈醫士顧彦文序顧氏為呉中望族舊矣近代家蓋濠者多業儒至彦文生而岐嶷方丱角即慨然思所以濟人且曰士而未達蔑以及物惟醫其庻幾乎於是挾古今醫藥之書往從舅氏葛先生學焉探􅄨索隱垂十年業成而歸惓惓乎欲展其素志凡以疾告之者必詳審製善藥手足視貧富無間然者故往往藥有竒效特稱良醫彦文方謙謙然不自滿不責報於人然人既德之而亦未嘗無報也吁古之善醫國者其操心蓋如是耳禹視人之病溺也殫力以疏導之法拯之稷視人之病飢也竭誠以稼穡之方救之伊尹以一徳療桀之厲周公以四事觧紂之虐調隂陽弭災眚保養生全卒能躋羣黎於仁夀之域以成十全之效漢唐諸公功雖不逮然於人所疾苦隨用救藥㒺不殫乃心力今觀彦文用心之勤必有見于此乎一日友人安元卿以其有未報之德相與載酒濠上因以前言質之彦文笑而不答余復告之曰昔丙吉於孝宣㣲時有大恩其始未之知也他日將封侯丙吉病甚上憂其不起識者謂吉有隂德必享其樂後果如其言然則有盛德者不報于人必報于天此又吾彦文之所當知者酒既終元卿請書此為贈送楊善章序至正辛丑春予舟次呉門友人楊善章過予曰先大父安撫公葬餘杭考妣祔之杭人以丘壠之廣竹樹之盛名其地曰楊墳是也前年冦兵入境喋血百餘里古今墳陵遭禍樊崇者不可勝計我先壠雖赭其地殯宮幸無恙焉然而寇退之後榛棘蔽野鳥獸之害人者出没其間春秋霜露之思悵望飲泣痛吾親弗及夏畦馬醫之鬼一坏之土又安知終無綠林之患乎朝斯夕斯情弗能己今將往以浮屠氏茶毘之法舉之函骨而歸瘞諸呉之西山庻嵗時省掃以寓追遠之意於禮其可乎哉予曰此禮之變也禮曰古不修墓况改葬乎不得已而改者固有之矣舉而燔者未之有也雖然當此䘮亂之際三綱幾絶父子或不相顧今善章一念之孝不忘乎親將冒險渉難負其親己寒之骨去危就安斯可取焉君子固不當以常禮責之也余既答善章之問因筆諸簡牘以餞其行送彭主簿調呉縣序昔人謂州縣徒勞者誕矣夫州縣為民父母居是官必有其子愛之心盡撫字之術以勤以勞斯稱厥職故戴星出入者致一邑之治運甓朝暮者成八州之功否則淪胥尸素有不免君子伐檀之譏若我長洲簿彭府君其可謂能勤勞者歟長洲𨽻大藩加次師旅飛芻輓粟事如蝟毛公以明察内敏之才剸繁治劇如庖丁觧牛得其肯綮刃有餘地然一念之愛切切乎為斯民保障服勞盡瘁不怠不息未幾府令出郊視水以董農事公所至訪民利病見諸施行集流離而為土著飭逰惰以躬稼穡抑强扶弱剔抉奸蠧民用大快或告之曰公今職有所專餘若可置公大不然言一邑之政皆簿所當為吾敢憚其勤乎尤務以亷潔律身以清苦自厲雖按行之勞酒肉不御日三飯脱粟而已吏卒從行操如束濕然割已俸食之使畏而愛于民無毫髪擾至若尊賢下士温乎其容秩乎其儀動遵矩矱言必忠信有古人之遺風焉由是廟堂嘉其能改調呉縣蓋欲用利器於蟠根錯節展其效耳今士大夫為邑人抒去思之情詩以贈之吾友陶君德潤知公為深走書以序引見屬凡所稱道皆予曩聞於人人者吁賢勞如前加以無倦其冶效當不止長洲呉縣若單父而已將美繼長沙公八州之大吾言斯足徴矣贈醫士呉中行序僕老呉下怪其俗之陋尚鬼而多惑嗜利而輕義欲得卓越之士不為俗習所移者相與語道蓋甚尠耳一日友人趙執中書來曰去年春彛舉家病疫垂髫之兒蒲伏薪水適錢塘世醫呉中行來閔彛故交過門視疾謂二親已不可療彛則藥而愈矣時族姻比里方煽乎妖巫之妄愳乎疫鬼之害跡不及門獨中行暨里人陳希元日一二至扶持而藥之饘粥以飼之彛得不死未幾吾親果相繼而殁中行又力為之襄事越數月彛念蔑以報厥德姑償藥資中行拒而不受今里中士大夫皆賦詩以美中行請為之序焉僕閲書起敬恨未識其人耳既而識之且聆語言知學問之博識趣之髙不特業醫而精又嘗得劍術之妙達官貴人多用薦辟然骯髒不茍不屑就巻而懷之泊如也惟讀書窮理愈進愈力假醫藥以寓吾心之仁而濟物若中行者可謂不淪胥於尚鬼之俗而惑者也亦可謂能舍利而取義者也亦可謂卓越不羣而造道者也斯人也昔吾願見而不可得今既得之可不樂道其善以厲其俗哉吁麟角鳯觜世不多見孰謂世無麟鳯與識麟鳯者知其待時而出不久將有日矣僕等又當刮目以俟送梅知州序予嘗觀古之為政者惟能以亷律身則心清而理明身正而道行故周官以六亷計羣吏之治自漢而下史稱亷吏者其政皆焯焯矧予西溪梅公生質猶季雅亷也加以學問之力亷介絶人初倅崑山聲聞于時遂陞同知州事在州六年門無私謁較諸楊伯起却故人之遺羊興祖拒府丞之餉范史雲之塵甑馮元淑之齋馬無異也當其蒞事之日時與同僚相可否同僚曰公亷而能所可否者非私也當從之無戾焉御胥吏防其姦欺窘如束濕胥吏曰公亷而正所窘束非苛也當謹之無違焉至辨獄訟均租庸用刑罰以齊其民民則曰公亷而明刑罰非暴也當服之無犯焉是故佐是州之久道日益進行日益修品秩加而名日益著焉耳今知吳江實為州長而位乎同僚之上其御吏其治民又非前日佐貳比仍以一亷處之則所謂心清而理明身正而道行可必矣吁庖丁觧牛刃有餘地蓋得其肯綮之要也若夫以亷律身豈非為政之要乎雖然克終之戒君子慎之某辱公為布衣交于其行敢以君子所慎者告之為臨别贈送費知州秩滿詩序東平費侯為崑山之五年二月初吉侯得代時毘陵謝某適寓是州聞州人頌之曰公昔下車時方擾攘民用蕩析老弱餓莩餘或行伍公勞來之乃復土著以耕以桑以生産而租賦然猶懼不能安其業也頼公之明為能識民情而燭吏欺使民得盡其要欲吏不敢並縁而為姦蚩蚩之氓間有訟于庭者侯必先誨之以理諄諄焉如賢父兄之于子弟良師友之于弟子䧟於誣則為之直其枉而不避困于役則為之節其力而不窮至其有罪施以刑罰亦未嘗無哀矜之意焉是州地方二百里其民咸得安土而粒食者侯之惠也又曰學校久廢侯則振厲之尊育才賢文教蔚興黌宇輪奂視昔有加而閭閻委巷絃誦偕作使之駸駸乎為禮義之俗者侯之功也予聞而嘉之既而道海虞適無錫過長洲茂苑周逰乎淞江太湖之上士大夫凡與談及崑山咸稱譽如州人之言其能詩之士各賦詩以贈之予則即其所聞以序編首書畫舫燕集序古之人凡樂其髙尚者必寓意於詩酒花竹山水之間與之逰者蓋亦樂其樂若我玉山隱君其亦可謂髙尚者乎君生長世家一旦盡去其少年豪華之習結草堂玉山中蒔花種竹日與山僧羽人布衣韋帶之士以逰以居達官貴人未嘗一見其面徴車之來則踰垣閉門甚於段泄不知者或譏以迂怪君聞之自若也至正庚子秋九月愚隱師携祺上人等過之語道相契日坐至夜分乃已一日君置酒書畫舫主賔凡八人其七人皆善飲獨愚隱師性不嗜酒亦欣然為之勸酬嗢噱各盡其驩既醉以對酒當歌人生幾何兩語䦰韻賦詩時秋髙雨晴芙蓉金菊之花照映池島悦人心目而詠歌有不能已者故分韻之外復有倡和之什焉夫愚隱師一至居數日非惟主人留客之固而客亦眷乎山水花竹之間而忘其去則所謂樂其樂也諸詩寫燕集之娛園池之勝備矣余復引而申之以識嵗月梅隱山房詩序昔人有言天下無眞樂隨所寓而得者乃眞樂也今吾以珏上人觀之其信然乎往上人逰諸方叅菩提達磨西來之意名山勝景長年忘歸不知者意其江湖之樂耳既而歸錫谷影不出山渉獵羣典適興賦詩怡然自得又若移其樂於山林文史矣至正癸卯春愚隱師主禪月道塲召為記室上人以佛法淑同袍之士以辭章接縉紳士大夫人皆樂其道之行焉閲數月謝事當路者或薦舉之孰不曰以珏之才之美宜其繼黄龍益宏斯道殊不知上人之來特以答愚隱師相知而已餘非其志也於是飄然别去渡呉淞過崑山東瀕於海顧荒江寂寞之濵僧廬幽閴梅竹環繞境與心㑹乃寓缾鍚顔其所居之室曰梅隱山房蒲團木榻晏如也定起之時曵履梅下或欣然猶迦葉視拈花而喜而人不知也吁呉中巨刹樓閣相望鐘鼓之聲相聞茍從當路之薦置身蕭爽孰不為之樂哉今若此其樂蓋自得之有難以語諸人者有樂與諸君懷上人者為之賦梅隱詩一巻俾不肖筆其首簡予不敏姑以平昔所知者道其梗槩云送理上人歸天台飬親序余避地吳下聞宗元師之名者數年及與之㳺則知名不虚得方以見晚為恨師乃念親老于家言歸覲省且欲築廬于先人之墓詞佛養親以酬㒺極余聞而嘉之因請諸縉紳歌詩以贈其行或曰子逢掖者又嘗著書辨老佛之惑矣浮屠氏既與之㳺又從而譽之何哉余曰不然余交浮屠亦各有所取焉往在京口以清苦交了公即休在金陵以文詞交訢公笑隱於杭交古鼎銘公以其端謹而誠慤也今於呉交愚隱智公悦堂顔公一以其有濟人之盛德一以其有事親之孝也其他或學或行或識趣髙逺未嘗無所取焉今宗元有了公之清又心乎顔公之心可不敬乎吁當此兵戈之秋道路梗澁跬歩千里有能披荆榛冒矢石梯山航海勇往而不顧者大率皆功名之士貨利之人求其如宗元之行蓋尠矣夫宗元於蘇湖諸大叢林所至安隱且有虚主席以待之者師皆辭焉誠使結廬以守松楸之地持缽以盡菽水之歡可謂釋門曽閔歟吁彼織蒲如陳睦州者固不得專美於昔矣諸君然余言既贈之詩余乃述所致敬宗元之意弁於篇首為徑山顔長老送丁州判序予聞古之任人者為官擇人未嘗為人擇官故量材授職不遽更易必使久于其職而得以考其績焉今丁君克明為崑山州判官洗心奉公孜孜厥職凡州長發號施令必相與可否然不務乖剌惟是之從至如出郊勞農及河防繕修警邏之役靡不殫其力焉秩甫滿公府復命君判嘉定州事可謂委任之專有古者為官擇人之遺意也以君之才㳺刃厥職是猶駕輕車就熟路不遺餘力凡昔之所以澤此民者其必澤彼民矣等而上之佐郡國貳憲省將無適而不可大器晚就其可量哉某以久處鄉邦故知公為詳於其行書此為别并為嘉定州人之賀云送陳允貞序士君子負有用之才必得善識者擇而取之然後能適其用耳譬之木若檀之可以為車楛之可以為矢桐之可以為琴瑟杞柳之可為桮棬楩柟豫章之可為明堂棟柱材雖良能自致其用乎至正乙已冬王命江浙分省叅政用公開望亭河為固國計公知允貞為能幹濟使董其役允貞方以呉江州吏目滿秩而歸承命之重義不容辭於是殫智盡力宣勞王事召畚鍤數十萬人為之計工程限期日不疾不徐民用子來兩月之間事功乃集河長四十里北接曹湖南通漕渠又東注于震澤呉人視之猶金湯云故當咸嘉允貞之能而凡與其役者多德之然則允貞所謂有用之才又得善識者擇而取之斯適其用矣今允貞赴鹽塲幕官吾知其才足以有為也鹽法之弊多於牛毛属部細民蓋有望於良有司也久矣惟允貞盡其才之用焉為智長老送蘇縣尹序至正丙午春余過上海卓錫于寂寞之濵適縣令蘇君産祥秩滿而去士大夫祖帳西門外田夫野老遮道請留或膝行而前脱君鞾先後數四不翅攀轅而卧轍也余嘗揖父老而問之曰蘇令何以得若等之心如此哉父老曰賢令亷明公正材幹絶人三年之間凡可以康濟吾民者知無不為且精於法律小大之事處决如流吏畏民服租賦非不重也頼除去宿弊而無横歛之毒徭役非不夥也以差次民力而無不均之苦至若謹序庠明教化置禮樂之器以嚴祭祀増社學之説以廣文教凡祠廟之在祀典者皆修舉廢墜麗牲之碑所在正立街衢橋梁舉邑完好又曰縣瀕鉅海江流交接風濤横肆險惡萬狀禦人者往往出没其中過者病之令乃相地之利由縣治西南開大港接新涇口延袤幾四十里墟邑相望雞犬之聲相聞昔之畏境今為康莊風帆雨檝晝夜不休縣之人不忘所自因以蘇港名之焉余聞而歎曰令賢乎哉此蓋千萬世之遺澤也秦之白渠常之孟瀆杭之蘇堤蓋此類耳今君賔府幕以所負之才贊畫郡政蓋滔滔也余復何言特以前所聞父老之語序而送之以抒邑人志思之意云送鄧宜之還鄉序昔二疏為東宮師傅告老而歸當時祖帳之設黄金之贈太史氏悉書之或曰以二公之賢尊為師傅區區贈送奚足美哉是不然此蓋美其還鄉之樂非以為師傅之榮也夫鄉里人之所難忘也若班定逺馬伏波皆絶世之雄立功異域名聞天下猶且願生入玉門關及追念少㳺平生之語况餘人乎蓋狐正首邱魂魄之思沛皆出乎本然之天也今宜之鄧君假館張侯羣弟子服勤盡禮講貫之暇主賔燕洽閲寒暑十有二載如一朝夕然故鄉之念常縈乎懷束書言還館人留弗能止其父子昆季乃翕然餽贐又相率諸友人贈詩且屬余為之序焉余與君鄉人也親戚也知君之心者也因謂之曰君之行有班馬之所無者方諸二疏雖榮名贈送之有不同而鄉里之樂則一耳苐慚余殢留知君之樂而莫能與之樂其樂也君歸凡故人有見問者幸為我謝之多稼亭燕集詩序洪武十年春上已前之一日郡守番禺張侯置酒多稼亭集僚佐洎逢掖之士十有三人相與訪前修遺跡尚交而趾其美焉環視四郊烟鉏雨耕乃喜而言曰嘉我良民始不負牧守邵農之意歟旁睨黌舍衿佩雲集又曰嘉我諸生其無負國家修文之教歟至若滆浦環于前三山屏于後雲霞竹樹千態萬狀儼然為天開畵圖快人心目侯於是舉酒屬客臨流賦詩蓋其興之所適情之所寓有不翅蘭亭禊事之娯而已沂雩風詠亦殆庻幾吾儕亦得以樂其樂也坐客詩凡若干篇侯以龜巢老生謝某客之坐因命為之序云贈醫士張恒齋序夫良醫之用藥如良將之用兵知彼知己百戰百勝非偶然也且人之有疾必繫乎五臟六腑殊不易知也茍曰飲上池之水而能了然於心目之間非吾之所知也必也目其色耳其音語焉而推其詳脉焉而究其藴如是而后可謂知彼矣彼疾既知又當所用之藥必中厥疾如戰必克乃所謂醫之良猶將之良也恒齋張公世居儀眞以醫名家今提領常州惠民藥局事郡人往負危疾詣公公可否之其曰可者皆如期而愈猶龜卜燭照而數計之也蓋公自蚤嵗究心于儒者之學以明物理軒岐以下數千載醫藥之書莫不探賾索隱觸處洞然未嘗出詭祕一言以自神其術也近吾友丁以道之子遘疾而危羣醫縮手公診而藥之其病如春氷而釋其人如枯荄而生以道德之且言曰郡人蒙是恩者衆矣安得太史氏為作佳傳焜煌簡册耶吁余嘗以恒齋之學論之將來必醫及國家躋斯民於泰和之域秉史筆者當大書特書傳之無窮也奚患無聞乎送陳尚言歸㑹稽序㑹稽陳尚言以其從兄為常州府幕長銜父命來視之常之士友因得時與之㳺而東郭謝某獨深有敬焉者尚言方妙年自持如老成人凡相見時往往論古今忠孝事世俗之談未嘗一出諸口也洪武六年八月之吉言别於余前兩月方盛暑余嘗見束裝其兄固留之至是宜挂秋風之帆矣或謂尚言之欲亟其歸者厭我陋邦而樂其故國山川之勝也予請詰之子之歸將窮探禹穴搜竒索隱而求神秘之文乎將幽尋雲門與山僧林叟相期㳺適乎將蘭亭觴咏鏡湖第宅踵昔人之髙躅乎夫以數年所知尚言者觀之吾知其不為是也必矣子之歸朝耕夜讀林樵澗漁搰搰乎為養親計將使紫岩山中復見董召南以孝義稱孝感之祥天降厥家世有韓退之又當雄辭大篇以播其遺芬矣尚言聆余言笑而不答後五日某命兒子木筆之聊藉手為臨别贈某延陵人時年七十有八自號龜巢老人云代董知縣送同僚尹主簿序洪武四年冬余備員為武進令與縣丞陳德廣相繼而至時山東尹公明善為簿數月同寅之初嘗相與言曰吾三人之為是邑也其猶同舟共濟乎余嘗聞操舟之術舵者主之然必以篙者櫓者橈者檝者深以竿者縴以矴者桅檣而帆者然後江海可濟也有其具蔑其人其能濟乎雖有其人苟不僇力以事其事亦未能有濟者也今明善涖事久為之甚習可謂善操舟者矣自是同志協力康濟邑民事無不理兩朞之餘實無愧于􅋵舟之喻也六年冬明善以銓考増秩余與丞及其代官張奉先祖帳而别明善復舉前説以勵吾人余曰斯言也豈特官是邑其宜則之凡為雄州劇郡以及方面藩府皆當以是為心則無適而不可也古之善相天下者若傅説之賢其主猶以作楫命之况餘人乎明善之行吾請以前所言者筆諸縑素為臨别贈縣丞江隂人名某主簿澤州人名某余則鰲溪董某贈寫照玉泉子序玉泉子本常郡闕亭侯之裔六世祖居金壇地因人姓是為蔣莊月鍳翁其父也玉泉以胸涵氷壺目炯若電得乃翁冩照之傳甲寅春我郡侯孫公請為紀顔因過予為傳老醜坐客有言寫照自顧愷之始者予曰不然昔庖羲氏畫卦而人文肇開曰書曰畵蓋椎輪于此矣余嘗觀六書如天之日月星辰人之耳目鼻口物之山水花木鳥獸其文類皆象形然則象形而畫其義一也黄帝堯舜垂衣裳而山龍華蟲之屬施諸五采作繪一語登載典册繪畵之事著矣殷髙宗審象求賢而得傅説吾意寫照之原本此歟至炎漢兩君圖功臣於麟閣雲臺之上與青史鐵券並著勲烈自是而畵之名世者滔滔也若晋之愷之乃其一爾然今人冩眞僅以形似玉泉則并其神氣意趣得之見於毫素非汎汎作繪者可同日語况平昔於所見之人但曽半面雖即世之久亦能想象而貌之至有使其子孫下拜號呼宛然如見其親此又得乃翁不傳之妙而能人之所難能也吁使玉泉生於有商必能為君貌夢中之賢人矣當今羣公秉國圖象凌烟徴車胡為其未至耶月鍳翁年垂九袠博物稽古玉泉歸請以予辯客之語質之而翁茍以為然亦必以輪扁不能喻其子者然予論玉泉者矣送祖心上人省親序學佛氏而不忘父師之恩知君命之重而弗敢渝是為良浮圖吾當與之㳺贈其言而嘉之是亦與人為善也蘭陵銘上人本名宦族早失怙元末時廼翁為江西省幙僚隨繼母侍翁居官遭時擾攘江右失守省署移福建乃翁以王事赴比俾其子往錢塘鞠于從父既而世變從父家毁于兵且荐饑流離蘇常時貴㳺子弟多失身上人獨能渉歴艱險不農工不丐𨽻不服賈負販而趨利慕大雄氏空寂之教可超脱物累遂祝髪從浮圖師東谷昇公而學焉禪林矩矱蹈履惟謹其父子不相知者十有一年然一念之孝根于其心常禮佛黙禱得一日之飬以盡烏鳥之情志願足矣洪武甲寅春父來金陵知翁無恙且有弟在膝下以奉朝夕上人喜不勝於是告其師亟往覲省以余昔嘗以君親之道語之請别於余且言曰銘之行雖為吾親誠不敢畔吾師而負國朝度僧之命而返吾初服也織蒲之飬或庻幾焉余曰然如上人者處困之日不失其身居泰之時不易其心誠可謂良浮圖矣撫其弟安其親使人稱為禪林之子騫吾無間然矣彼人面而獍心者聞上人之風能無愧乎能無警乎是嵗四月之吉謝某序贈錢隱居序二月之吉余方㨿槁梧坐澹泊齋友人嚴子敬過余而言曰去年冬某嘗患背疽狀如覆盆視疾者皆寒心焉隣有陶君子錢氏志道甫獨曰無傷也藥可愈也既而用藥一如其言某嘗奉幣以償藥之資志道乃固辭弗受請贊一辭以著其美亦以示不忘也余聞之仰而嘆曰夫疽發於背者危疾也古之人智謀如范増勇如姜才皆為所害志道能療斯疾豈易哉余還鄉五年聞鄉人之譽志道者籍籍今吾以子敬之言益信且志道蚤讀書好結客竒方妙術故多得之雖常能以藥活人而不以醫名家其可謂隱徳弗耀者歟不謀利不計功亦可謂好義者歟釀美酒以娯客畜善藥以與人吾知志道之心即蘇長公之心也世之鄙吝如斛斯者其妻以百錢市藥猶以為恨况與人乎聞志道之風薄俗可敦矣吁昔人為一卒吮疽尚登册簡如志道之賢安知無太史氏為作佳傳耶送太古禪師住持祥符序釋門先覺之士以能荷大雄法者為象為龍理固然矣求其七德五文之備和鳴而翔集所至而羣從惟鳯為然兹又不可象龍槩論也今吾以太古徽公觀之其僧中之鳯也歟公蚤嵗入䨇徑寂照師之室韞德抱道蔚乎其文猶鳯毛也既而主常之文明蘇之秀峯踞猊座説法㣲宻妙音聞者悦懌是猶鳯鳴朝陽也去此數年而陵谷變改故鄉來歸不翅如翺翔赤霄覧德而下視津里如丹穴飲太湖如醴泉以靈山古法幢之顚仆往扶植之瓦礫之地將為瑶圃灌莽之卉將為琅玕使七十二峯之境皆為岐陽而把茅挿竹皆阿閣也彼翕然而從者四衆之外衣冠紛集復有宗雷陶謝軰從遠公為方外逰故叢林旦評緇素輿論咸謂公為僧中之鳯無間然者慎勿諉枳棘非吾所棲而姑為桑下之宿也公之行郡邑士大夫咸稱羡而送之龜巢老人乃為之歌曰鳯兮鳯兮一飛羣隨覧德之輝載鳴瓊枝維其時兮送郡守孫侯秩滿序人恒言郡縣之職愛民為先殊不知善為郡縣者必先能馭其吏而後愛民之政得行焉若我常州府孫侯其可謂善為郡者歟侯濟南人奉朝命由起居注出守以舊聞小吏多蠧政下車之初即汰之擇之量材用之又從而戒飭之闔六曹操如束濕公勤謹身為率先民有不理於邑赴愬庭下侯聽之惟一二僚屬與聞焉吏無敢庭立睥睨者至於抱案牘署决惴惴焉惟恐或毫髪悞舞文之弊蓋絶無之故善政得以行善教得以施一郡四邑之民咸被其澤視古良二千石無愧焉耳今也以秩滿赴京人皆謂侯能愛民治有成績余則曰侯能馭吏乃深得為治之要故特為序述將使為郡縣者聞之取以為法太史氏采錄為法於後人非徒為我侯頌美而已送金生西上序太學為賢士之闗尚矣洪武七年冬朝命下府州縣學以諸生勝冠者赴國學歴練衿佩之士星聚雲集猗歟盛哉常之武進縣金生希賢由縣赴命請别於予且徴贈言余曰幼學壯行古今一致上之人將使之仕仕乃行其學也士君子欲其仕學俱優卒有成效惟勤者能之尼山大聖忘寢廢食顔問不能曽日三省若是皆學之勤乎周公相國待旦而起陶士行在州而運甓巫馬期為邑而戴星是仕之勤也吁聖賢猶爾况學者乎蓋士之學與仕也猶農夫之治田也彼農之勤者其耕也深其耨也熟其樹藝也必矣時既藝矣乃耘乃耔乃藨乃蓘旱乾則為之溉灌澇則為之决塞沾手塗足搰搰乎斯須不能休故其苗之興也勃然其稼芃芃然其實則栗栗然也及其穫也視惰農之收則倍徙什伯之不同為士而勤其功名爵祿如豐收之農可必也生往拜國子先生暨諸公鉅卿請以是質之茍然吾言生其勉乎哉送葉以恭赴京序士不可窮達論也莘耕之窮達而阿衡版築之窮達而霖雨鼓刀漁釣之窮達而鷹揚之三賢者茍不逢其時則泰然以終其身道之行不行非所計也番陽葉以恭以卓犖之才為張渚批驗所官凡九年日與貿貿焉負販逐利者較什一之征此行道之日乎然以恭公乃心勤乃事皦皦乎九年如一日其道未嘗不行也蓋以恭以前人詩書之澤滲漉肌骨眎貪墨媢嫉者不啻嚇腐之鴟慕羶之蟻耳班資崇􅋻非所論也予老滆濵聞以恭才名久矣今赴調京師適荆溪故人許克敬過予談以恭之賢且與論相古今窮達士俾予筆之持以贈别亦曰堅以恭之志云送陳長史秩滿序古人之以言贈行者尚矣然其言或規戒焉或勸勉焉不頌德不美才器不揄揚名聲視後世立言有不同耳若老聃於孔子之行曰無多言無多事如斯而已夫聖人豈無可頌乎蓋稱頌之辭無益於行有道之士所不為也余嘗於學軒陳公暇日商畧古今清議及此相與太息今公為常州府經歴得代將如京師士大夫為詩為文以頌其五年贊畫之美者衆矣余請以古人一事忠告而期望焉昔趙忠獻以半部論語决大政卒成相業人到于今稱之吁時有古今道無今古居今之世行古之道是亦古人也况公之家學青氊一經淵源有自誠能慎終如初仕學俱進則何施而不可何往而不達哉幸毋謂老生常談而忽之吾將見世之稱忠獻者為公之稱矣送劉文可序洪武九年冬吾友沈子英書來曰文可劉公南雄佳士也為磨勘司掾屬凡若干月所閲案牘疵纇畢舉雖毫髪無遺焉今也書滿而别榮以其吏事之精心目之明雅敬重之求一言為臨别贈予曰傳不云乎胸中正則眸子瞭焉吾雖未識文可視子英之所稱道文可之心可知矣吾嘗以吾鏡觀之百錬之銅瑩若秋水其所照者物無遁形一旦蒙以塵垢光乃茫昧塵垢愈積茫昧愈甚極而至於一物無所見矣詩曰靡不有初鮮克有終故君子慎之夫以文可之心無私欲之弊猶鏡之不塵垢也案牘之謬詎能隱乎雖然百錬之銅能照人之面而已不能照人之肝膽能燭目前之物而已不能燭天下古今萬事之理奚足以擬文可方寸之鏡乎文可持此鏡以陟臺閣慎終如始光輝日新將來聖天子取人為鑑則必置諸左右以輔昭明之治吾與子英軰又當相率以賀之并自賀其言之不誣也是嵗十有二月某日毘陵龜巢老人謝某書送孫太守奔䘮歸濟南序代魏同知作洪武丙辰閠九月既望濟南孫侯某毘陵守之五年聞母夫人即世撤甘棠之説動風木之悲既而雪涕泣具訃告日月上聞衰絰而歸邦人愛公不啻如召父杜母聞公解印綬即相率林立㦸門外翕然而言曰閭閻之甿頼賢守宣皇上德化政無煩苛使得力耕稼供賦税以植其業以畜其妻子非吾民所能為也學校之教頼修廢舉墜使得明教化育人才以展其用非多士能自致也又曰賢守以亷律身馭吏如束濕秉法如縣衡一洗貪墨舞文之弊至筦鑰之細犴狴之繁租庸商征之屬咸得其肯綮而㳺刃焉郡統四邑若網在綱綱或不舉目亦隨之奈何斯言殆欲卧車轍而留也時余忝佐貳聆州人之言若此然論公之才之美又豈苞􅋰䑓笠者所能盡哉公嘗言斷機之訓吾親猶孟母也止酒之戒猶陶母也曰清曰謹為時著稱又豈非崔母之淑元暐乎噫非母之賢不能淑子之身非子之孝不能如其母之志移孝為忠宜其不負聖天子承宣之寄他日大用豈易量哉今觀士夫贈言凡若干篇余以州人之言頗詳且實因摭之以叙編首云是月某日同知常州府事某郡某書續毘陵誌序昔人謂九州之誌言九州所有土地所生風氣所宜也郡誌之作本諸此乎毘陵為古名郡其山川土田風俗名物之屬登載舊誌尚班班可考然由元初而至于今百有餘年曽無紀述之者誠曠典也洪武十年春郡守中憲大夫張度蒞政之初以朝廷命天下郡邑纂修志書於是㑹集耆宿之士稽今訂古博采見聞撰次成帙凡一十巻中間蕪纇踈畧不能無之至若前代闕文則不能妄為之説然時有異同事有沿革因是編而求之亦可以槩見矣是年嵗在丁已夏五之吉郡人謝某序贈儒醫徐士方序余方㨿槁梧玩庭草生意里人萬仲珍過予曰比鎰遘寒疾謁二醫皆危之於是邀徐卿士方眎之乃譚笑間授藥尅期而愈顧鎰蔑以報厥德丐先生為之贈言示弗忘也余曰嘻仲珍何相知之晚耶士方由早晚嗜學渉獵經史若六氣七情之病乎人五藥十全之繫乎醫者已博通之既而以父祖所傳軒岐之書金匱石函諸家之方論旁參曲究以㑹其極且嘗賦遠逰得四方賢師友淵源之懿故其遇疾如庖丁解得其肯綮恢恢乎刃有餘地是豈膚淺蒙昧管窺蠡測者可同日語哉惟其重厚簡黙猶連城之璧混乎碔砆㣲卞和固莫能辨也老子曰大辯若訥大巧若拙士方其近之雖然吾知士方之才不局於是而已必也為時而出康濟斯民卓然為醫國之士斯不負所學也責沈之文吾尚當為仲珍為之洪武十年嵗次丁已六月日謝某撰并書贈刋字闞士淵詩序曰若稽古文字由竹簡以來世之欲傳久而不朽者其惟勒諸金石乎然茍非專其藝而精之敬其事而謹之則所勒有無足傳者矣今觀荆溪闞士淵之勒石也一㸃一畫敬謹之至殆若黙契程伯子作字甚敬之意字書八法秋毫無遺是以我郡守番禺張公特賞識之中書史舍人靖可盧舍人公武亦皆稱美無間然者吁士淵之敬謹如此豈局於一藝之㣲而已哉昔人有言能敬必有德使士淵遇知臼季其必薦之如缺耨也抑予又有説焉昔者安民由知敬司馬公能從容一言於勒碑之頃登載史册流芳無窮其傳世又豈在銕筆堅珉之外乎予嘗嘉士淵之能贈以長句今郡中諸士夫之作者交相揄揚詩凡若干首且俾余之叙焉送王主簿克禮還江隂序人有恒言州縣為民父母蓋州縣之職最為近民撫之字之理宜以父母之心為心愛其民如愛子也然所謂愛者豈其姑息而已哉使其服役於公則如服勤于親授之事而責其成功不棘不囏不虐不苛如是者皆父母愛子之心即君子豈弟之心也古稱召父杜母者其心蓋如是耳以今觀之江隂縣主簿王公克禮其庻乎洪武戊辰春奉令役邑人數千陶于常州府武東簿董之與武進無錫之民夾運渠而陶其負薪芻手埏埴朝夕説簿之賢者矻矻不離口鄰邑之人亦甚稱譽予因往視之其紀律非不嚴也程督非不謹也鞭笞捶撻非不施設也惟其慈威並行寛猛相濟過之小者宥之情可憫者恤之力不逮者濟之豈弟之心常藹然于紀律程督鞭笞之間故蚩蚩之甿感其德忘其勞不自覺其聲之出乎喙也予以是亦從而賢之與之語曰夫縣之簿丞佐其令為一邑之父母也郡之佐貳佐其守為一郡之父母也公卿大夫臺閣守監百執事是皆輔佐天子為億兆之父母也今也簿將歴階而升曰令曰守曰公卿輔佐百執事咸有日矣苟不以民遠而忘宦成而怠則輿人之誦史氏之筆當並傳於時豈召父杜母所能專美彼虐其子而廪焚井溺者抑亦董其善而良焉斯民之幸也簿嘗然予言請佩服今其行故書以贈之送周叔文序古之生子者設弧矢以射四方欲其有四方志也然其親欲子為之者豈遽能盡然哉但立志不凡君子韙之近代若曹武穆試周之日而左取干戈右持爼豆天生淑質志在文武其后出入將相為一代名臣非偶然而致也今觀㑹稽戚先生為叔文贈言謂叔文蚤甚聪慧且好學尤喜讀尚書每開巻則竟日終夕寢食幾廢不啻口芻豢而耳箾韶也夫書道政事叔文喜之其志可知然筮仕以來屢渉險阻特事親以孝行聞或疑未見其聲之焯焯也是大不然夫位有崇卑職有大小能盡厥職斯為足稱姑以目前言之河泊三載洗手奉公所職之具恢恢乎如庖丁解牛刃有餘地使其親不以尸素為憂豆區之養樂於鐘鼎使叔文為雋京兆則平反之政日娯其親又何患無焯焯之聲乎吁丈夫之志有非或人之所知也先軰嘗説善觀花者見根撥而知花品之上下予於叔文敢竊比之贈滄洲生詩序延陵隱君子薛仲𢎞氏以英妙之年能脱洒紈綺氣習絶跡乎京洛塵土讀種樹書結交忘形與臺笠屝屨者伍所居三山湖東南寂寞之濵流水一灣漚沙半席每誦杜少陵吾道付滄洲之句欣欣然若有所得故自號曰滄洲生𢎞之言曰蓬萊十洲學仙者誇以示人且去弱水三萬里之隔其荒唐繆悠而不足信也明矣唐有瀛洲命十八學士居之其地位清絶尊崇顯榮固不易得然一旦牝晨汚衊之辱有不能免者亦非所願也眷兹滄洲有四時天與之樂春水觀魚荷風清暑扣月舷而歌披雪蓑而釣是皆樂之得乎天同乎人亘今古而不窮者尚何覬覦哉龜巢老人聞其言而嘉之與之交而遺之詩曰樂彼滄洲宅爾素侯某水某邱以釣以逰洲之西東三山芙蓉維北維南魚莊鶴林風清月明我揚其舲滄浪有歌或濯其纓不鐘不鼓不鼎不爼優哉悠哉尚友千古送遆知縣父還鄉序嘗觀世俗所謂慈者以其有姑息之愛無相夷之惡而已自秦人慈子嗜利借鋤德色習以成俗恬不為怪于兹有年矣當此之時有卓然能教其子而不淪於習俗者其父之賢為何如哉濬川遆公以其子為武進令不遠四千里而來愛之若欲置諸膝上教之則提其耳然不三月而亟去子欲留養而不可得予以大耄之年獲半面于鄉飲席間從而勸留之公曰吾兒以一介之㣲蒙朝廷錄用長于兹邑若稚孺以負烏獲之任必先也謹乃身公乃心殫乃力規行矩歩以稱職如此則上不負聖天子㧞擢之重恩下不辜斯邑斯民之望榮其身以慰其親吾雖衣敝緼袍猶狐貉也啜菽飲水猶八珍也吾既語吾兒吾兒能佩服吾言則吾歸吾廬何異朝夕視側以享其祿飬之娯乎吁公可謂慈而能教愛不姑息而為時之賢父矣聆公之言覘公之意蓋樂乎其歸而不可留於是酌之酒而賀之曰令有美政民必頌之予將采歌謡之辭筆諸簡牘附黄耳平安之報以報公也送趙縣丞奔母䘮序洪武庚申秋朝命以昌邑所舉趙賢良為武進丞在邑多善政明年夏五奔母䘮而歸士民攀戀有不忍别者丞慟哭而謂之曰比吾父來視予諄諄然以居官律身之法命之且云母氏之訓戒尤多父之歸將以安吾母也烏知未能以豆區之餘為甘㫖一日之奉而吾遽至於斯言未既嗚咽頓踣民亦涕泣而不能留某於是知其母夫人之賢殆不减崔元暐之母也然元暐遵母訓而清謹為世所稱使賢母之名流芳百世非孝而能之乎今丞之孝於母也豈止被衰麻居倚廬不酒肉琴瑟三年而已哉必也居則飬生䘮死以事其親出則移孝為忠以事其君曰清曰謹終始一致㒺俾崔侍郎專美於唐則其母之死猶無死也而可以為孝矣雖然父天之尊巍然在上慎勿哀毁踰禮以貽親憂此又不可不知也贈黄有文序昔聖人垂衣裳以治天下至五色作服則尊卑貴賤之秩章章矣後世於五采之外加之以金此又極其盛而文之然禮法之制惟在上者得全於服御之屬近代以空王老君之尊擬諸王者乃亦得而用之餘則有禁是故以餙金為藝亦鮮而易弛焉常郡黄有文早孤受業厥祖丁時之艱藝用弗售有文能不弛其業而益精之時既太平大江南北數百里凡釋老氏之家交相薦用殆無虚日洪武壬戌春郡城圓通院住山釋壽公作梵宇規置法藏命有文賸施五采糜金而餙之有文若深諳乾毒之教莊嚴相好咸適其宜至若轉藏之神皆金為甲冑威武僇力如風轉蓬俛仰之間光明焜煌儼然為金色界使觀者興其轉惡為善之意吾嘗聞瞿曇有言畫沙童子戲以成佛若然則有文之功亦豈少哉由是釋門名緇及方外能文之士多贈言以嘉其能壽公乃屬予序其事如此余於是切有感焉六藝之教禮樂為今儒門子弟什廢八九其大者有不知金聲玉振為聖學始終之條理其次不能以金匱石室之書為文章黼黻治道甚者金根繆易傳笑四方視有文能世其業寧無愧乎使有文之為藝以彼易此必有大可觀者矣吁可惜哉贈醫士髙彦述序洪武壬戌夏友人詹伯逺書來曰先軰葛氏芳山翁以善治傷寒獨歩江表髙公名德為外孫而受其業青出於藍故當時人謂有秘傳焉今其子彦述業復如之比年以來人之抱危疾以頼全活者累累也如某家累亦屢病屢藥效若響應厥德有未易忘者焉先生為之著述㒺俾越人專美於昔予曰嘻芳山翁予早嵗親炙多聆語言每云素問一經言簡理奥張長沙論傷寒傳變總若干萬言其要在經之熱病一篇六百九十四字而已人能明是經之理則終身之用有不能盡者以是觀之其家庭授受豈外是乎夫彦述之可敬者能象賢以承家學志不自滿外無藻餙不誇張以炫其光怪不圭角以長其聲價嘿嘿乎不易其言謹謹乎不矜其能遇疾則以理燭之如法以治之如由基善射發皆中的觀者或驚異而神之耳吾知其父子所得於葛氏者大經大法如此而已無所異聞也竊嘗以儒者之學譬之論語之書孰不誦讀趙忠獻以是書半部相其君以救天下當是時遘五季之厲羣黎凋瘵以蘇息何嘗於二十篇之外别有所傳授乎他日太史氏采予言而筆之庻以見彦述之學源清流清且一洗俗論秘傳之陋垂芳簡册追配古人亦何慊乎哉贈崑山醫士王彦德詩序世傳秦越人之醫獨歩當代在諸國則隨其俗之所重者醫之或小兒或老人婦女變更以售其術蓋其心出乎聲利之私而人不察也予嘗以是少之一日至崑山友人余彦智謂予曰醫師王先生彦德專科為小兒醫其學有過人者某兩兒患痘瘡甚危觀者縮手邀彦德藥之乃指日而愈酬之幣固辭且曰凡故舊皆不為市利交况契愛如彦智乎由是邑人與士夫咸賦詩以頌其美丐巢翁為之序焉余曰嘻視彦德之心賢於越人多矣人恒言醫之難莫難於小兒蓋稚騃之秋利害有不明言語有不通疾厲易為顚躓猶草木之萌易摧折也吾知彦德方寸之天不蔽於慾一以理之明治衆疾而疾無不治者擴而充之非所難也特專科以世其家耳雖然昔者河西有王豹而人善謳髙唐有緜駒而俗善歌今崑邑有彦徳博學如此尚義如此風聲習氣動盪一方久之則蘭鮑俱化餘波之及薰我晋陵老夫修野史又當牽聨得書以諸詩為張本松菴圖詩序洪武甲子春某以鄒忠公遺文見邑宰河南彭公伯常因觀四栢賦宰謂予曰子知劉司諌之愛松亦如忠公愛栢乎司諌本東原世家今居光州光山縣從祖之故第山有美松心甚愛之號曰松菴比遇知聖天子擢官諌垣謇謇諤諤多裨治道天子嘉之聲溢中外然乃松菴素志也余由是繪山間之松松間之菴求能詩者詠之以寓夫激昂之意敢請子為之序焉某辭不獲雖未識司諌之面以其愛松之心推之可以知其人矣夫松之為物丸丸其直猶人之挺㧞也欝欝其盛猶人之􅅷德也貫四時歴氷雪猶大丈夫之眞節雅操也凛乎趙清獻之鐵面堅乎宋廣平之鐵心殆無過焉卓哉若人深相契合不以山林臺閣之殊而易其素愛之心也昔之人或喜聽其松風或欲巢於雲松或哦之中庭之中或撫之東籬之東是皆愛之於心而所以為愛者不同吾知司諌之愛在乎嵗寒後凋佩孔訓于厥躬吁山花澗草紛紛然望秋而先零者寧不有愧于十八公乎今毘陵士友詩凡若干篇皆想像光山而賦之一旦欽承恩命賜歸莵裘蒼髯白髪相與嵗寒又當别為咏歌持去為松菴壽贈義士池德澄序昔天厯末終人方酣貴富汲汲乎進取德澄先大父秋蟾先生慕老氏之學脱屣家事飄然為方外逰德澄篤於親眷焉撰杖屨從之足跡遍南土名山勝景多逢異人往往得藥術方技以授其孫既而陵谷變遷先生亦從此逝矣德澄今家居東郭混淆闤闠然而喜元談尚髙致綽有祖風頻年復逺逰以適其志趣所聞所見益之廣矣夫以藥術之妙觀之信乎有異人之傳矣同里劉文忠負伯牛之疾者數年屢醫弗痊幾瀕于危一旦蒙德澄療指日而愈酬之幣不納文忠德之需予言以紀其美予曰嘻神農氏嘗百草為醫藥以濟天下後世蓋以天地生物之心為心也近代以來或假是徼厚利以肥其家否則咈然怒望望然去眎其困苦而夭閼者弗恤也可勝歎哉德澄矯薄俗仗義如此故余以義士名之農皇大聖人在天之靈必隂隲以成厥德以博施其義于人人之報之有不止如黄雀白龜而已也時洪武十七年嵗在甲子秋日撰送唐用彰序姬公相成周作禮制大司徒以三物教人即其賢者能者賔興之取士之法蔑以加矣近代以來科目雖多亦彷彿成周之意而已但士之為學於聖人心學之㫖有昧焉故或賢或否如魚目之混驪珠者已姑以一二言之漢之董相仲舒公孫丞相𢎞同出乎賢良方正者而𢎞有曲學阿世之謬唐之韓吏部愈柳刺史宗元同出乎博學宏詞也而宗元有薰附權要之辱至宋三百年文盛之日凡居台輔必用碩儒如司馬温公光王荆公安石張公商英等皆進士而丞相也若王張之屬其學無不精敏絶人豈有不知聖人心學者乎蓋徒知之不能行之則與不知者無以異也洪武甲子秋邑人唐用彰氏以府學弟子員中選鄉闈明年乙丑春二月赴春官大比需言于予予喜其孝弟稱於家謙德著於旦評才華蔚茂而學益脩其大用於明時也必矣請以聖人心術之要曰慎獨曰思無邪曰精一執中三復而申告之惟用彰眞知力行兩輪並進則先軰賢者之勲庸事業我亦可為賀不惟上有以副致君澤民之心而下有以遂顯親揚名之願亦可見不以老生常談忽之也二十四孝讚序人生兩間以天降之𠂻為秉彛之性故能參于三才有感斯應為萬物之最靈者也夫孝乃性中之一事然立身之本莫大於斯故尼山大聖人與髙弟子反覆問答著為大經奈何聖代彌逺風俗寖衰秦漢以來耰鋤德色箕箒誶語者滔滔也甚者至於人其形梟獍其心可撫膺切齒流涕而痛哭者也今觀郡人王達善所讚二十四孝裒為一編其間言孝感之事什有八九且以孝經一章冠於編首蓋取孝通神明一語推而廣之欲使人歆羡而勉於企及於名教豈小補哉或謂重華聖孝千古一人豈宜與泛泛者類稱是固然矣吁達善之意蓋欲攬太陽與月星並照容光焜焜無幽不明老夫儗非其倫辭不達意宜君子無求備焉贈王仲文序洪武乙已秋横山大林菴主僧眞公性存過予曰某重搆菴廬作觀世音菩薩伽山一㑹其上則五雲縹緲佛現全身凡菩薩之衣冠瓔珞靈嵓寶地種種相好咸用金餙其工人王仲文且能運巧思僇力以成其美今其行丐先生一言譽之予辭不獲乃言曰嘗聞瞿曇師有云以畵為佛以沙為墖皆能成道此蓋以因果立説開方便門使衆生由是而入大乘之道自漢以來其法寖盛墖廟像設若繪者繡者鏤玉石者泥塑木彫者從而出焉今性存能以佛之心為心誘人為善莊嚴梵相豈徒美觀蓋欲具瞻者起恭敬心好樂心篤信力行證無上道非因果而已宜乎同袍之士闕曹隨向化之人風行草偃如此其盛也性存然吾言請筆之為仲文臨别贈龜巢稿巻九欽定四庫全書龜巢稿巻十元謝應芳撰疏三教堂修造疏推倒人我山三教一家之意踏翻生死海十方諸佛之心必須無風雨震凌乃可集江湖名勝青山舊隱白馬宏規欲求木于工師湏布金于長者過我門入我室不妨分半席烟霞上我堂踞我床相與話三生風月祝聖人壽報檀那恩元山主造退居疏掀翻黒漆桶舉頭見明月當空跳上白牛車拂袖喜春風滿路毋慅急流中勇為退歩怕從閙籃裏只管鑚頭但給孤舍祇樹之園則摩詰坐散花之室作鐵門限透金剛圈畫圖對緑水青山供養受清風明月應無所住作如是觀大千觀是一禅床但要覺得些安身立命之地百丈只有三轉語必須撞着箇㸃頭㑹意之人了是因縁勝諸福徳梁寳寺修造疏數百年祖師道塲天龍圍繞五七件未了公案歲月因循要令折碓觜花生莫謂冷灰中豆爆有縁相遇何事不成大丈夫直下承當小比丘向前料理試看寳刹勝昔年梁武之時當效華封祝今上唐虞之壽無邉功徳難盡贊揚謝雨佛事疏如惔如焚方慮亢陽之地既優既渥乃蒙甘澤之恩欲報效于鴻鈞敬皈依于象教伏念王某同羽士呉某冠裳雖異鄉井實同有公家賦粟之征無仙子飡松之術望霓蹙額得雨寛心田疇不失於農時溝壑免憂於他曰感造化鬼神之力誦如來秘宻之言開法華道塲設伊蒲法供伏願百靈鍳格諸佛證明雨我公及我私尚求霑足井而飲耕而食共樂豐登更兾萬邦之咸寧永頼一人之有慶謝恩誦法華經疏朝廷推曠蕩之恩饑饉處税粮全免官吏執偏私之見施行間荆棘横生欲徼福於百靈當投誠於三寳事雖不遂心曷能忘切念某等欽觀詔條可霑徳澤赴愬為七鄉之衆奔馳歴半載之餘公乎私乎自謂上天能鍳仁者知者皆云不日而成雖一時遭毒歛之蛇或他日得塞翁之馬掃除梵宇持誦真詮二十四人同演法音六萬餘言重宣妙義設香花燈燭之供奉天龍鬼神之靈上荅聖恩下祈民福伏願一人有慶四海攸同大臣以道事君㒺敢咈􅁝綸之命庶人召役則往將來免粟米之征時和歲豐天長地久誦法華經疏作善降祥上古之書埀訓供佛有福法華之語流傳欲報徳於百靈用投誠於三寳伏念某戸門孤立租賦交征為公為私寧無過咎有財有用幸遂經營居之安而資之深災不生而禍不作荷天錫福靡日忘恩擇三五之良辰禮大千之諸佛肅陳清供敬誦真詮伏願慧日照臨神天感格吾老及人老家家無凍餒之憂新年勝舊年旦旦有平安之喜作佛事謝聖恩蠲租疏官賦半蠲欽奉九重之詔聖恩難報皈依三寳之尊敬爇清薫俯陳丹悃伏念某草茅雖賤稼穡維艱幸蒙曠蕩之恩又獲豐登之嵗倉箱頓滿饘粥可供盡力催科喜輸官之易畢中心報效感聖代之難逢仰祝皇圗䖍修佛事伏願一人有慶萬壽無疆乃聖乃神乃文乃武聖德合乾坤之大自東自西自南自北清光瞻日月之明結社畫凈土疏嘗觀釋迦世尊説西方淨土教人念佛真方便第一義今欲依阿彌陀無量夀二經畫寫極樂境界仍遠法師㑹一百二十三人結為蓮社瞻依寳地修行净業凡我同盟作成幸甚西方國過十萬億有極樂世界九品生花東林社有廿三人與圜悟祖師六時行道兹欲精修凈業亦須遠效前賢想像玉毫荘嚴寳地非助我者孰能為之孔方兄肯為結縁呉道子便教著筆有色無色有相無相看諸佛之本來面目如何先覺後覺先知後知見一頭之湼槃妙心方可頂門具眼言下㸃頭海印菴起山門疏遍大千界未嘗無見性成佛之人入不二門方得箇安身立命之地希升堂必開戸牖為巨室必使工師敢告諸賢用求多助老僧作鐵門限儘教雲水往來世尊放玉毫光轉見山林輝赫大開方便是名莊嚴請誌寳長老掩壙疏為馬鬛封痛念慈親之歿作獅子吼願聞開士之言陟彼屺兮切有請也㳟惟某人談空説有窮深極㣲恭透禅機面少室山中之壁得來佛法傳黄梅嶺上之衣五藴皆空一絲不挂哀哉無恃幸爾有縁願師乗出岫之雲為我送落山之月覆將香合子超昇在一轉語之間作箇土饅頭安穩於九重泉之下勿孤申請顒俟降臨待雲菴雕觀音疏念彼觀音本自尋聲救苦如是信解何妨粧假成真看良工刻畫之奇即菩薩化生之妙大檀越以七寳布施紫竹林現五色毫光龍女獻珠鸚􅛥聽法瞿曇老千百億化亦須現光明之中善財子五十三恭管取在皈依之列其為福徳難盡贊揚請蒋居士造諫壁橋疏編竹渡蟻隂徳猶多乗輿濟人傳名不朽况此河梁建造兼之佛閣莊嚴必須有力量人了此大因果事某人荆谿秀氣竹逕遺風江水汲乾無一老㸃頭印可湼盤鑚透不二門信手掣開尚古人淳厚之風絶時俗浮華之態積而能散綽然有餘人皆仰之切有請也睠兹諫壁實乃要途爛月一舷毎横舟於野水埀虹千丈欲砥柱於中流惟其成此飛梁從此免令病渉蝀挿天鯨跨海兩邊鏁三尺闌干簾捲雨棟飛雲就上搆七重樓閣如斯福徳難盡賛揚請蔣月堂建奔牛橋疏古堰横奔牛漫有前賢之句過橋乗駟馬方無病渉之憂必得其人庶成乃事某人為善最樂見義勇為廣造輿梁不特濟人於溱洧多佟塔廟尤能事佛於祇園聚福海由歴刦之修登彼㟁乃平生之願難兄難弟均懷編竹渡蟻之仁賢子賢孫綽有跨竈過父之美鄉閭稱善湖海知名睠此官河實為孔道當一市人烟輳集通四方車騎往來每遇斷橋如隔弱水不有填河之鵲又無跨海之鯨欲得安行必須改作甃鱗鱗之萬甓䕶曲曲之廻欄車流水馬㳺龍聽揚名於道上月出雲虹飲澗看横影於波間慷慨承當咄嗟可辦置供佛花板疏獻花發善智之心因縁不昧刻楮用宋人之手工巧難成必湏上根噐人㑹此好因果事胷中開發筆底化生非莊嚴是名莊嚴此福徳勝前福徳看他枝葉似優鉢曇佛士之養為我苾芻作阿羅漢人天之供天惠寺請愚隱長老開山疏閶闔城萬竈􅆛貅多依佛刹給孤園七寳樓臺大闡禅闗誰其尸之曰有人矣某人機鋒不露道價彌髙若王侯将相往往歸心而淮海魚龍時時聼法慈悲願重救群生於刀鋸斧鉞之間常寂光明悟真空於文字言語之外逢塲作􅃧到處為家必須竪硬鐵脊梁庶不負布金心地久矣暗中摸索宜乎直下承當三千年河水重清唱開元太平之曲二六時天花亂雨入如來般若之門拈一瓣香祝九重壽請亮西山住天慧寺諸山疏佛法全盛以來在處有珠幢寳刹世道多故如此其誰能玉振金聲聞斯行之可為難矣某人頂門具眼鼻孔撩天數千巻貝多葉迷人都成一笑五百歲鉢曇花瑞世自得单傳悠然卧北牕清風久矣挹西山爽氣來此矻中流砥柱我亦分東壁餘光葭樹相依鼓鐘交作如如不動黒漆桶盡底掀翻綽綽有餘破紬襖為他重著慈悲廣大慷慨承當天惠寺請亮西山住持疏嚼啐鐵餕饀有幾人氣味相投搭著金伽黎二千載風流尚在顧天惠以記公刀尺政日來立百丈繩規去欲息肩來當接踵某人潑天聲價立地機闗捋猛虎鬚早歲入曇華宻室揮白麈尾前時坐三槐道塲邉逢雨横風狂便欲山深林宻如明月暗投者久亦陽春寡和而然闔閭城突兀叢林任天惠姑安虎旅午橋荘往來雲水聼雷音皆上龍門三呼北闕聖人一示西來祖意方外交送愚隱師住萬壽寺疏禅月道塲為吳下叢林之冠凌霄法窟得淮南老虎之孫惟其祖武能繩可使家聲復振象龍雲集林壑風生某人如愚不愚以隱無隱所見即大乗境界其行皆實際工夫出入干戈曾救百萬億顛厓之命扶持宗社實有三大千恒沙之功故名公鉅卿多以為師而諸子百家亦來問道今方外舊逰相慶了箇中大事因縁雖碧雲之出本自無心然白雪之歌莫非古意昔萬壽今萬壽祝聖壽之無疆彼一時此一時将盛時之重見方外交送毅剛中住承天寺疏峙䨇峨石古道塲金布祇園示一指禅衆僧寳珠還合浦頋馬齒掩嘉蔬之久如麟膠續斷絃之初惟得其人廼宏斯道某人曹谿正派淮海名流天下壯遊所至奏陽春白雪山中舊隱向來分明月清風南楚翁謂青出於藍北山老喜抜茅連茹當此猊座重敷之日實為象法中興之秋王公大人既為更張天龍夜义必加擁䕶菩提樹纎塵不惹初無今古之殊優曇花滿地還開聿見禎祥之意續燈諸祖祝聖萬年新創水雲庵疏鹿苑二千年河沙界多興佛刹龍江六七里水雲鄉宜建法幢布金地既已現成卓錫泉葢将湧出權輿自我恢拓在人振雷霆鐘鼓之音接雲水瓶盂之衆弹指頃要開樓閣筆頭邊當落珠璣長者布施七寳羅漢身何必朝西天而暮東土華封殷勤三祝聖人壽正須望北闕以頌南山福有所歸恩無不報方外交賀顔悦堂住徑山疏展開一坐具視十方皆䨇徑道塲扶起大法幢障百川為中流砥柱惟烏獲可勝重任如鸞膠能續斷絃既得其人必𢎞斯道某人徳尊一代名徹九重金伽黎著處雨露猶香玉麈尾揮時人天交敬賢相君問西來祖意針芥相投正法眼得東璵親傳鉢花重現連歩上凌霄絶頂先聲至頑石㸃頭變瓦礫作七寳堦墀還成鹿苑滿虛空見五雲樓閣永鎮龍宮鐘鼓雷嗚缾盂星集士大夫期望如此者久矣佛世尊受記如彼者存焉只有天在上更無山與齊此地真為峻絶雖知燈是火不悟鐘非飯吾儕是亦知歸亟奉賀言尚圖宿覺東隱菴化齋糧疏世尊遺教每朝令乞化七家衲子坐禅在處要供需四事東隱菴雖云草創西來意正欲同參必先為餬口之謀乃可得安心之法三條篾𦂳縛腹此蓋藥山老特地求奇五斗米嬾折腰是亦栗里翁有田可恃必須盃盂裡喫見成粥飯乃可蒲團上做著實工夫願諸公欣欣然指囷看大衆兀兀乎面壁攪河成酪待他時節到來運水搬柴是我神通妙用常當飽徳誓不食言化募畫十王等像疏數百年水陸科儀廣傳緇素三千界鬼神情状妙入丹青看天堂地獄之不同使鐵心石腸之俱化莊嚴如是因果何疑欲得吳道子筆下通靈必藉孔方兄眼前助力有相無相非無相直須是得兎忘蹄大乗小乗最大乗更不待畫蛇添足諸公具眼為我㸃頭西歸菴化齋糧疏一把茅葢頭即不免隨縁安衆三條篾縛腹豈盡能為道忘饑欲安廼心必餬其口望檀信舉指囷之手令木魚作呼粥之聲凡釡中爛煮虚空僧堂裡儘留雲水佛世尊著衣持鉢幸傳流如此家風龎居士運水搬柴但作用無非神妙施當有報誓不食言千墩寺造木橋疏編竹筏而渡蟻猶有隂功造輿梁以濟人豈無因果千墩浦素為衝要駟馬車孰不往来惟相逢一笑揮金可便使群工斫木試看流水即跨長虹澱山湖水國人家自是生成圖畫趙州老石橋公案别當拈起話頭了是因縁勝諸福徳大祥薦父水陸道塲疏代徐伯樞薦父徐太中作喪不過三年鞠育之恩㒺極佛能度一切慈悲之願𢎞深俯瀝丹衷仰干皇覺伏念某顯考某官搢紳推重䑓閣蜚英立身揚名以顯其親賣金買書而傳於子赤心報國居京師為三品之官白骨他鄉頼朋友掩一抔之土死或悟空花之幻生豈忘風木之悲􅆘亂離而蒲伏莫前非涊淟而劬勞敢負旅櫬雖藏于東薊神逰當往于西方祥􅎭日臨緇衣雲集吹螺擊鼓熏修按水陸科儀掃地焚香禮拜作天人供養伏願一靈感格諸佛降臨執金剛臺接引至七寳金沙之地瞻玉毫相化生託四色車輪之花凡在幽冥悉皆超度水陸道塲榜同前今據某郡某州某鄉奉佛弟子徐某及弟某等投誠伏為顯考太中大夫中書户部郎中徐公不禄以來致䘮三年禮冝除服追念父恩昊天㒺極取至正二十一年十二月廿六日為始啟建冥陽水陸大齋三晝夜藉此良因用伸超度道塲法事條具左方喪制有終人子念劬勞之報法門無量世尊埀慈愍之仁故𢎞開水陸道塲乃大集河沙功徳天龍圍繞嶽瀆感通今齋主徐某等念先君壽五六十年生斯世成百千萬事官居三品名聞四方衣紫隨朝所存者致君澤民之志焚黄先世且及乎封妻廕子之榮痛憐客死于京華欲得神遊于淨土廣邀緇侣䖍禮金僊琅函展貝葉之文鐡鉢供伊蒲之饌香雲縹緲花雨繽紛樹燈懸明月光阿鼻獄爍開幽暗斛食施甘露味尸陀林充滿饑虛凡所謂六道四生皆于此三皈五戒是名無礙以濟群生其齋主當盡乃心我清衆各修厥職有感斯應無願不從徐公百不憂方直徃於極樂恒老三轉語更何在于多言無間寃親俱能解脱廣濟菴道者化修造等縁事疏瀕湖祇樹園林刼灰久冷大地襍花世界佛日長明三條篾縛腹𦂳做工夫一莖草璚樓須教出現分甘古井總是醍醐想像靈山粧成寳地無孔笛要聲諧律吕有髪僧當力効殷勤諸公從筆底落成不日見眼前突兀燕雀相賀龍象群居比邱衆千二百五羅漢重宣般若方丈室八萬四千師子共禮維摩壽祝楓宸福歸檀越蛟龍菴塑觀音等像疏觀世音七佛之師神通具足阿羅漢諸天之衆在處依歸今欲令粧假成真奈不解將無做有諸開寳藏滿載鐵船對長洲茂苑之江山作補陀落迦之境界願菩薩三十二應刹刹度人看善財五十三參時時見佛相逢具眼必為㸃頭忠清院修造疏忠清公宇宙隔越猶奉烝嘗瞿曇老風雨振凌豈容坐視雖曰即心是佛也須開口告人小苾芻固碌碌不才得錢米則多多益辦八萬四千修月斧儘爾時匠石呼來百千萬億恒河沙願施主福田増廣但蒙金諾即注銀鈎萬峰菴修造疏半夜傳衣諸佛祖當時道在九年面壁小禅庵近日人多本來無鏡以無臺亦合肯堂而肯構工師求木非赤手而可圖長者折枝須㸃頭而相許金錯刀作成有用鐵門限凖備都來雲水依歸天龍擁䕶横展布金之地大開選佛之塲竪起硬脊梁每日坐三條椽下掀翻黒漆桶大家上百尺竿頭壽祝楓宸福歸檀越化城菴鑄銅鐘疏舊用鐵今易之舊錯聚六州之鐵久已知非新鐘鑄萬選之銅今將改作惟檀越共為爐鞲而蒲牢即出範圍作興禮樂於山林號令人天於夜旦山鳴谷應八百聲吼動鯨音月落烏啼三千界喚醒塵夢佛㑹祈禳疏時和歲豐喜見昇平之兆天高地逈難酬覆載之恩感仰鴻鈞皈依象教切念某等或僧或俗為里為隣田疇蔑水旱之虞邊境絶烟塵之患物無疵癘家用平康䕫蚿如此其相憐豺獺豈忘于報本莊嚴寳地諷誦琅函遍禱之天地神祗同鍳此河沙功徳伏願一人有慶萬邦咸寧日斯邁月斯征立見秋成之富災不生禍不作羣居生計之安化衣缽疏世尊入舍衞城也須持缽祖師過大庾嶺先已傳衣惟二者之得兼乃一生之可了奈罹兵燹俱化刼灰令干求衆檀越相成庶圓滿小苾芻所願一缽在手三衣稱身海上降龍使可比六通羅漢山中禮佛更不霑半㸃塵埃由此成功誓將報徳法華經㑹疏為陵埜卿等作世尊千百億化愍大地之衆生法華六萬餘言有恒沙之功徳欲慿資報是用皈依切念某等忝在人倫幸叨佛庇天地為之覆載風塵迨乎廓清擇暮春望日之良辰建同社常年之勝㑹三周七喻齊演梵音六道四生俱聞妙法供陳脯笋香爇旃檀頼象王願力之𢎞深感龍天鬼神之歡喜伏願潜銷黒業復見清明熾而昌壽而臧户户獲康寧之福災不生禍不作年年遇豐稔之秋化修造疏西歸菴勤上人冩金字法華經化修造及増盖觀音殿有漏無漏硬脊梁撑住虛空前三後三爛葛藤掃除風雨要此屋似銀山䥫壁問誰家無明月清風孔方兄但為㸃頭公輸子便教動手敢持貝葉用告恩檀黄金字冩七軸蓮葉藉妙法河沙願力白玉毫現諸佛菩薩看圓通宫殿隨身是名莊嚴勝前福徳散花文為恢上人作夫散花者心地栽培善根滋長春生金剪枝枝奪造化工夫香滿錦堂朶朶作人天供養如風飄墜似雪繽紛優缽曇大地皆春曼陀羅從空亂雨昔天雨散之維摩室中者此也我世尊拈于靈山㑹者同乎勿云色界迷人正要頂門具眼肇自一花而五葉皆為同氣以連枝欲了知是色是空須㑹得無聲無臭桃紅李白河陽縣車馬塵多魏紫姚黄洛陽城綺羅香溷曷若傾葵心于佛日乃蒙盼蓮目于慈雲想像金園莊嚴寳地千江水見千江月共看法性圓明一片西飛一片東當悟色身虛幻其為因果難盡賛揚募長明燈油疏宻地工夫不用説石窻油盞普天照耀要单提露桂燈籠老苾芻畧用吹嘘大檀越正湏傾倒膏馥沾溉因果分明二六時中常剔起靈光一㸃三千界内總利他癡暗衆生西歸菴修梁武懴疏空王為象教之尊慈悲廣大懴法脱蟒形之苦因果昭彰既響報于昔年宜精修于今日即蘭若皈依金相為檀那宣演琅函必須衆力維持乃備諸般供養作功徳海開解脱門娑婆世間滿眼是誌公和尚忉利天上舉頭見郗氏夫人福徳無邉讃嘆難盡二聖院浴佛疏九龍水浴紫金身慶西方聖人初度二聖菴結白蓮社繼東林遠公道塲想像毗藍皈依極樂大檀越隨喜布施小比邱如法莊嚴諸塵非塵是名微塵清净身本無塵垢憶佛念佛必定見佛廣長舌同演佛音幸發心花共成因果滄洲菴修造疏本菴艸創之初事有未備兹欲葢造前軒裝塑觀音聖像晨香夕燈修行凈業端為祝延聖壽上報四恩旁資三有敢望諸大檀越相與作成指􅅒揮金多多益辦挿竹建精藍鎮蛟鼉之窟宅開花成結果展龍象之法筵莫謂滄洲菴小小規模要作補陀巖巍巍境界軒開寳地像塑珠纓惟諸公同為結縁則良匠皆能呈巧莊嚴相好非莊嚴是名莊嚴福徳因縁此福徳勝前福徳功歸檀施壽祝楓宸化城院募縁疏本宅以下元令節啟建念佛道塲與諸上善人同修凈業所用香燭齋供之儀望樂助焉其為因果葢有讃揚難盡者惟好者領之叅一指禅本元元坐三條椽下念幾聲佛要人人生九品華中當此下元敢提前話舉赤手欲諸般辦集用青蚨須衆力圓成香火焚修人天供養看西方極樂世界只在目前比東林祖師道塲亦非分外願言向道請為結縁千墩寺翻葢大悲殿疏延福寺襟江帶湖梁天監之年逺矣觀音殿震風凌雨魯靈光之狀巋然雖千手千眼乃吾佛化身然一瓦一椽皆衆人願力因縁有遇修證何難磨磚時用南岳工夫加泥處㑹古靈說法即有漏而無漏在求仁而得仁寳葢珠瓔瞻妙相於㫋檀林内金螭䥫鳯展畫圖於秦柱峯前壽祝楓宸福歸檀越齋僧簿叙别徑山興聖萬夀禅寺徒弟淵切見宿生多幸沗與僧流道業無成四恩㒺報謹以平昔所受信施之資自四月八日為始齋僧千員每員銅錢四十文為一飯之供敢望各題芳字以滿區區之願云出家以六和為尚勉守清規傾囊與衆人結縁願酧素志效减米同舟之意助折蘆渡水之行一千員白足倘過茅菴四萬箇青錢聊供蒲饌東手來西手去免虛孤信施之恩左畫圓右畫方請連署題名之筆佛日照鑒宗風振揚釋氏舉棺文代昇東爲衡母作佛説西方極樂邦大千沙界更無䨇諸天接引移蓮歩認取光明大法幢恭惟某人現婦女身生娑婆世不宿業八十幾年之内發三菩提心慕樂土十萬億國之西念阿彌陀佛三從不失五戒能持子行孝而暗合禮經婦服勤而俱無誶語愛男孫女孫之親意毫髪無偏待姻黨鄉黨之真情骨肉相似報縁斯盡享福亦多到這裏葢棺事定正要脱灑出門超凡入聖咦一脚踏翻生死海逍遥直上九華䑓活套起棺文代呉彦徳作野花繁盛不多時明月團圓亦易􅉻一竅鑿開方寸地百年生死了無疑恭惟某官天性髙朗心地坦平精勤六十五年料理百千萬事嗣祖宗之基業實為有光了男女之室家皆如所願到這裏出門一句要説到佛老氏未曽說處神鬼皆聼㑹麽自古斯民行直道青天白日甚分明剃僧頭致語然解脱香㸃光明燭恭請十方諸佛説法度人要人之四大幻身脱塵離俗煩惱根盡皆除去菩提樹自此員成伏願法嗣興隆不負真如之印宗門光顯能傳無盡之燈詩曰煩惱根生歴刼前如今盡落寳刀邉頂門露出金剛眼照見三千及大千募縁造藥師琉璃燈疏諸佛開方便門救衆生之苦楚歴刼轉光明藏破六趣之昏迷藥師燈宜用於道塲桑門氏合營其法具煌煌火樹欲他因地移來朶朶金蓮自我心花發現惟金諾一揮大筆便玉成數尺長檠毋論㸑蠟之齊奴絶勝燃犀之温嶠膏澤注琉璃盌内恒沙佛同放白毫恩光分阿鼻獄中大地人皆除障業功成普照福有攸歸薦父醮詞親恩㒺報勉為改葬之圖道力可慿敢有超昇之望俛陳丹悃仰徹𤣥穹切念先考某官蚤稱善人晚罹惡世羣雄血戰故避地于湖南一旦身亡乃迷塗于道左以兒女室家之相失豈衣衾棺槨之能周茶毘近效乎緇流煉度全慿于羽士櫝藏神主地易佳城設齋醮於新居薦英靈於仙府十極之髙真降監九原之幽滯同升伏願天得以清地得以寧由是魂升而魄降父止於慈子止於孝庶幾本立而道生存殁俱安幽明無間妻亡終七日設醮疏失内助而興哀音容如在祈上蒼之埀愍魂魄超升俛瀝蟻忱仰干鴻造切念忘室王氏自少結髪至老同心亡正室側室之尊卑渾無妬忌均養子庶子之親愛皆盡劬勞諧和而處者閲三十餘年頃刻而亡者又四十九日蝸居設醮羽士朝真誦靈寳之妙經獻齋厨之清供伏願蒙恩三境超度一靈脱跡塵寰棄絶人間之事標名仙籍逍遥天上之逰早壇辭上天之載廣大難名如日之昇昭明無際雪手香花之供星冠玉筍之班伏願三境巍巍並降臨於下土萬靈奕奕咸拱衞於中天午壇辭日之方中式瞻光耀風斯在下重覲威顔心傾葵藿之誠躬致蘋蘩之薦伏願恩覃九域均蒙化育之仁澤及九泉㒺俾沉淪之苦晚壇辭日之夕矣禮益宜勤天可必乎善無不報仰止九闗之望肅然三接之儀伏願浩浩其天鍳悃誠于方寸昭昭在上降徳澤于幽𡨕幽醮建壇詞為王文父作凡五首兩䘮終制靡忘追逺之誠百拜籲哀敢瀆盖髙之聽肅瞻金闕肇建瑶䑓絳節下臨緑章上逹巍巍蕩蕩洽大徳于寰區窈窈㝠㝠度幽魂于泉壤早朝詞明發懷二人恐淪酆土齋沐祀上帝祗仰鈞天昭對威顔備殚悃愊伏願維天之命恩光被于重泉如日之升魂氣超于清境午朝詞日之方中祥輝廣被道之云逺仙仗遥臨載伸對越之忱庸表䖍干之義伏願清都洞鑒共循晝接之儀幽壤超升永脱昏迷之境晚朝詞日忽忽其時暮深念幽𡨕皇剡剡其揚靈允能超度惴焉三瀆仰止九天伏願黒籍銷名長夜脱沉淪之苦丹䑓受籙熙春樂道徳之言青詞甥姪銜哀先後七旬而無怙聖賢垂訓古今三載以終䘮俯慚悲悼之忱仰徹穹窿之慶伏念先兄某創業歴腁胝之苦黽勉成家妹夫某贅居為骨肉之親始終同㸑幽𡨕隔世祥禫踰期縁歲凶重困征徭故日久有稽薦抜爰慿羽士式演真科三熏飛奏其緑章諸孤泣除其素韠不違天于咫尺如履氷而戰兢薦父幽醮建壇詞為王敏孟學作陟岵興哀欲報劬勞之徳籲天歸命庸伸薦抜之誠俶建瑶壇式敷珠笈伏願罪除黒籍名署丹臺零落歸邱山悟人間之夢境清髙隔風雨遊天上之仙都薦父青詞子養親不待深負劬勞日邁月斯征遽經祥禫對越虎闗之遠敬陳蟻悃之誠伏念某先考某質直一生辛勤多故仰事俯育盡心堂構之謀朝出暮歸殚力户門之役訓子觸屏而無怒賔妻舉案而甚恭忍棄諸孤倐逾三載雖雪衣之已釋奈風木之堪悲所兾超昇有嚴醮事伏願帝鄉可到仙靈必通逰白玉京行矣跨吹笙之鳯朝紫金闕飄然往飛舄之鳬醮星青詞代陳子純為弟禳疾作天有六滛疾病多由于感受星羅萬象吉凶或繫于運行稽首瞻天傾心告斗伏念某弟某一身多病數月弗瘳手足拳攣動若太山之挾胷膈否塞梗如雲夢之吞敬修清醮于生辰敢乞洪恩于列宿伏願璣衡照鑒瑶闕感通徳星聚太邱憂者樂病者愈熒惑退三舍居之安資之深幽醮薦父青詞子養親不待難酬㒺極之恩民欲天必從敢徹盖髙之聽蟻忱所禱虎拜具陳伏念某同弟某父殁踰一十五年深負終天之痛母喪畢二十五月又逢忌日之臨怙恃俱無劬勞曷報爰慿道衆式演真科區區盡對越之誠切切有超昇之望伏願千真列衞九老啟途左畫圓右畫方變化五城之境東王公西王母逍遥三境之天道士化法衣疏神仙足官府追陪長用鞭鸞海圗拆波濤補綻豈宜顛鳯黄冠空戴藍縷包羞必湏着紫霞衣乃可立紅雲殿窮道人不妨鈔化富公子當為作成曵月出門待金闕曉鐘之後擕烟滿袖拜玉皇香案之前報施主恩祝聖人壽請曹月湖舉棺疏蓋棺已矣生死關未脱塵寰出門何之神仙路豈無㨗徑敢煩指示庶獲超昇恭惟某人和光同塵尊徳樂義一襟湖海湛如明月澄波三尺風雷閒與孤雲出岫嗟我雁行之相失煩師鶴馭之寵臨説破𤣥闗大道只消一語喝醒凡夣飛魂直上九天請鄧混然起棺盖棺雖定莫酧母氏之恩抜宅無縁那到神仙之境必求髙士為指迷途恭惟某人和光同塵出類抜萃發揚宗敎混混然活水之源㳺戱辭章蕩蕩乎春雲之態簮星曵月乗虛御風仰希鳴珮之臨分付出門之語喚醒濁夣俾聖善之超昇飛上清都庶精神之不死再拜稽首萬望㸃頭代仁惠觀請周彦忠孔李通家之交盖由道義楊墨歸儒之道必頼師模誰其尸之曰有人矣恭惟某官才髙時軰譽藹旦評濂學家傳不剗牕前之草唐詩句好能吟觀裡之桃來坐臯比行看豹變某强名曰道主善惟師敢期如大匠誨人幸勿拒童蒙求我道其道徳其徳應慚所學之不同歩亦歩趍亦趍但願其徒之速肖代歸真觀請孫伯昭寄老子法中强名曰道誨諸生舘下主善為師久欲依歸敢云招致恭惟某稽古䆒春秋之學蜚英冠月旦之評不惟獨抱遺經抑且旁通百氏𤣥都賦種桃之句足擬唐人山隂冩籠鵞之經可同晉帖平居養素尤善談𤣥才名三十年未嘗厭廣文之飯扶揺九萬里尚肯為逍遥之逰大噐晚成英才樂育如某者仰如山斗居此瓮天墨歸楊楊歸儒曽聞其語士希賢賢希聖實慕斯文敢設坐氊以迎敎鐸孺子或容其進履相儒可隱于書堂澹泊相忘清虛共守道其道徳其徳小哉坐井之觀歩亦歩趨亦趨瞠若絶塵之後獻芹申敬鑒茹為榮虀菴疏為江叔亷作潦到餘生三百瓮寒虀未了流離數載千萬間廣厦誰依菴居卜築于江湖土著便同於鄉里竹開三徑藤㓨四簾惟諸君贈草堂之資則老我得莵裘之計脱粟飯視同珠玉苦菜根嚼出宫商養藜藿之幽姿變膏粱之舊習落成有日座中約青州從事交驩繼美當年杯後為冰壷先生立傳帡幪有自感戴奚忘壽寧寺請源别流住持諸山疏嵯峨古塔䨇尖挿霄漢之間蕭瑟禅林一變經烟塵之後念正法凌遲者久待偉人振厲而興某人豎硬脊梁有大力量宗門下識時俊傑緇衣中少年老成從金山躍龍門如神黿鼉鼓舞對劍井坐猊床説法猿鳥依歸能于此扶顛持危乃卓然出類拔萃烟霞接境庶幾分東壁餘光雲水滿堂相與挹西山爽氣式修鄰好益振宗風方外交疏比年以叢林凋謝恬養者多望望而去今吾别流源公以壽寧禅寺禮聘之勤奮為兹山領袖真可謂以道自任者也吾黨之士深用賛歎敬緝儷語以效燕雀之賀云千丈渾寸膠難澄久傒河清之日百鳥鳴孤鳯忽見将來道泰之秋顧兹山並立浮屠由前代特稱名刹駕言𢎞道允在淂人某人學有源流名揚湖海妙髙臺了翁法窟如青出藍毘陵郡新興道塲如風偃草逰􅃧卓水雲之錫棲遲横野渡之舟末法中為宗門棟梁知音者歎朱絃疏越堂前露柱明明為諸佛放光塔上風鈴亹亹與衆生説法華亭縣請仁伯靜住宣妙寺山門疏鳴百里之絃歌固云在我振叢林之鐘鼓正在得人由諸山鶚薦而來宜千仭鳯翔而下某人崑邱産玉合浦藏珠蚤遇作家函丈入澤公之室中居報國法筵提智者之綱仁者靜固其本心道之行綽有餘力望雲出岫如月當空虛室白生即洞逹光明之藏華亭清唳亦宣揚微妙之音聖壽萬年法輪三轉諸山疏同前繼三支而稱博學逺躡遺蹤用一䕫以作大章足知雅曲時則可矣聞斯行之某人冰雪丰姿江湖襟度執經問難遍叅諸老之門領懴司賓兩秉叢林之政蜚英聲于方外展濶歩于雲間踞鳯凰山作獅子吼天髙地逈靣九峰翡翠之屏月白風清目三泖水精之域方外交疏送大雲講主權住福壽院福壽禅院者錦溪之佳處也山中耆舊以主席不宜乆虛力請我大雲和尚居之事雖從權而林泉頗為増重吾黨亦可尋盟蓮社矣持一瓣香綺語以賀山不在髙安静處卓飛空之錫老當益壯談笑間用合道之雄暫踞猊床横揮麈拂某人春秋八十功行三千竪𢎞教硬脊梁得天台真骨髓慈雲廣大諸方蒙教雨旁霑智月圓明在處有人天交贊鐘鼓震錦溪北栅衣冠比廬阜東林或疑為入谷之幽自謂作逢塲之戱法雖修于出世義不失于隨時當此黄楊厄閠之秋乃有白蓮結社之日魯司㓂攝行相事曽三月以成治功逺法師影不出山且六時而修淨業薄言燕賀永締鷗盟永安院尼請禅老興正宗住持疏余曩歳以衣缽之資檀施之力創造本院年今八十有六力不能支且無法嗣是用以一應恒産捨為十方禅刹恭請紹隆正宗和尚入院焚修接納雲水契券雖明禮宜疏請昔天竺第一代祖師得度頼阿難之力今震旦徧十方禅刹流傳皆逹磨之宗欲改換其門閭宜選擇乎領袖位須徳稱道在人𢎞某人學有淵源名揚湖海千巖篦刮目謂能承鐵壁箕裘一把茅盖頭又多挹玉峰温潤撥慈航過來不逺将法幢扶起何難雲擁猊床風生麈拂泗橋流水喜縈囬説法之塲祇樹獨園當恢拓布金之地香捻一瓣壽祝九重真武經堂㑹置田疏代張伯祥作某将建真武道堂為吾黨月㑹清修之地築室塑像勉當獨為預置齋田敢裒衆力惟諸君領之上真𤣥聖揚靈足踏于龜蛇下土蒼生報本心同于豺獺擬一已力營真舘率諸賢預買祊田年年得黍稷之馨日日奉蘋蘩之薦永言祭享賴此膏腴作善則祥不善則殃此體物不遺之妙同盟之人既盟之後正自求多福之秋筆底揮金隴頭種玉置草堂疏代施天朋作某久客横塘視同鄉土業欲築室于此圖将老焉敬惟諸君子夙昔庇士必賜作成修辭抒情不自覺其抽黄對白也仲宣依劉荆州慷慨作登樓之賦子美詰王録事殷勤覔艸堂之資盖依仁乃客子之本心然芘士實故人之髙誼孔方兄但能助力公輸子便可成功鶴帳弗空莵裘可老厦成而燕雀相賀喜化日之初長門髙而車馬能容看徳星之常聚帡幪有造感戴奚忘方外交疏予生寡諧俗特於方外髙識之士樂與之㳺若我雪心和尚前居南山相好為忘年交今主領天寧禅寺緇素歡欣山林徳色予于是緝數語以頌其美以抒其交情云齊雲古佛刹留泗州僧寳之衲衣慧日大法門為常郡禅林之冠冕稱其名宜有其實𢎞其道必得其人恭惟顯公禅師妙年老成奇噐卓犖入松林室中布毛吹雪傳無盡燈坐楞伽峰頂麈尾生風握真如印如巻舒于前日大展布于斯時金斗城圖晝天開䥫門限搢紳雲集爾乃竿木逢塲而作戱我豈燈花有約而不來青青翠竹欝欝黄芽聽法皆能㑹意巍巍髙山洋洋流水知音當為㸃頭燕賀聿修鷗盟永好招魂致語為隂陽正術呉彦徳作伏以狐正首丘凡物有本原之性鶴歸華表雖仙亦故里之思三魂或散于異鄉一念可通于八極焚香拜跪剪紙招要切念近故某官生有多聞死無遺憾馳驅日下空知行路之難漂泊天涯竟作顛崕之墮玉門闗峰廻路轉金斗城物換星移庸歌宋玉之詞敬效巫陽之力往年蜀魄思家而千載號呼今日楚魂歸第而六親迎迓洋洋如在肅肅有聲髙堂共燈燭之光靈几享殽羞之薦月白風清此良夜獲叙幽情水逺山長愁殺人變為佳境醵諸友買石題獨孤公檜四字廬山種蓮堪笑者區區佞佛董林栽杏可憐哉碌碌勞生玉箸篆重題姓字金斗城倍有輝光尚須假力于錢神即俾奏功于匠氏似羊公一片石乃大書而特書此季子十字碑尤居簡而行簡願言鳩僝請與鷗盟干親友重搆草堂代黄仲噐作荒徑猶存陶彭澤歸來太早吾廬獨破杜少陵受凍何堪巢一枝欲比鷦鷯樹三匝正如烏鵲室廬拮据風雨帡幪孔方兄毋吝㸃頭公輸子便令動手十萬貫揚州鶴上人自求仙八九家錦里村居吾将老矣合矣完矣優哉悠哉大林菴佛像裝金法事疏芳茂山大林道塲鼎新革故補陀巖圓通法㑹粧假成真仰恃慈悲俯陳悃愊切念某䥫船渡海鈯斧開山浩浩刼峯𤣥都之兎葵淨掃瀼瀼甘露獨園之祇樹新霑從把茅次第鳩工置刻木粧嚴像設金色界移來勝境玉毫光照見恒沙鐘鼓雷鳴瓶盂雲集一宿雖成于頓覺四恩當報于將來伏願佛日照臨龍天擁䕶我見人見衆生見因見趣以精修梵音妙音海潮音觀音聲而圓悟尚期檀越同證菩提横山白龍祠修造疏天蓋髙而地盖厚人能感通山有仙而水有龍官為祭祀必嚴廟貎乃稱輿情公輸子欲便興工孔方兄必先助力蜿蜒靈物想像髙堂駿奔走執豆籩參酌用古今之禮鼓雷霆順風雨願言無水旱之憂輪奐美哉神明彰矣重造東山港木橋疏東山趾頭横巨港橋斷連年東里子産無乗輿人皆病渉每鶴立相呼趂渡令鳩工重作飛梁事欲速成力湏多助牽牛來往真可比牛郎七夕之牛乗馬徑過亦何異馬卿駟車之馬吾事濟矣衆皆悦之無錫興道鄉重建太平橋疏長安道到處皆通溪山滿眼太平橋連年大壞鄉里驚心義合勇為力宜多助不用集填河烏鵲便當見跨水虹蜺乗輿濟人施惠毋勞于子産丈夫題柱揚名何異于長卿方外交疏賀哲既明為𢎞聖講主壽安山坐鎮朔方如如不動華嚴海流傳妙界浩浩無邊惟得其人乃𢎞斯道某人學窮員頓道混根塵舌上瀾翻皆白馬未駝之文字胸中囊括有黄龍不測之機闗挺然冬嶺孤松接乃秋江正派即從别業以竪法幢天龍加以䕶持猿鶴為之鼓舞江流百數里同梵音演竺國之經吾軰十餘人比賢士結匡廬之社尚期珍重式副願言重建忠祐廟疏自隋朝稱八絶之靈巍然廟食與陳墓對一坏之土巋若堂封人傑地靈者八九百年灰飛烟滅者一十三載剪除荒棘經營閟宮展今日之宏規復前人之舊觀工師求木政須用使鬼之錢長者折枝敢請下如神之筆紅雲殿香雲繚繞白鶴溪流水廽環看眼前突兀之屋既成有栽上槎枒之松堪畫雝雝在宫肅肅在廟儼遺像於丹青赫赫厥聲濯濯厥靈振英風于今古福歸庶士壽祝一人普度齋壇榜大地衆生多沉淪于苦海恒沙諸佛能拯救于慈航㑹遇有縁寃親無間切念齋主僧某洎諸信士等為見曩因喪亂兼值凶荒或被戮于兵戈或遭烹于鼎鑊或疫癘而全家不起或饑羸而比屋俱亡月明星稀長夜發無依之嘆天隂雨濕常時聞寃哭之聲三寳前今獲皈依九泉下悉令解脱故此新開鹿苑于焉延奉象王命苾芻按乃科儀傳華嚴諷諸經典燃火樹照阿鼻獄焜燿靈暉施斛食拌尸陀林飽饜甘露齋主宜志心歸命僧流當竭力奉行有感必通無欲不遂伏願佛垂慈愍人得超昇玉毫相光照十方咸聽正法金沙池花開四色同往化生壽永天家恩霑沙界干人贈人疏嘗聞朋友有通財之義今某人毘陵人也久客居貧欲還鄉而不可得敢請諸君子仗義以贐其行真美事也聽馮驩弹鋏之歌不勝感慨覽王粲登樓之賦亦甚懷歸事有難言理宜代述某鄧侯華胄毘陵宦家二十年海内兵戈遭逢塗炭五千巻胸中文字收歛光芒故園之松菊都荒暮景之桑榆不暖但空載滿船明月豈能乗兩腋清風惟諸公曰餽贐焉則此老營莵裘矣腰纒十萬貫便可比揚州之行負郭二頃田更何用蘇秦之印毋嫌饒舌特為㸃頭代曹仲鉉募親舊作隱居疏白髪三千丈悵然咏謫仙之詩行窩十二家徒爾慕堯夫之樂借巢鳩拙繞樹烏飛屋茅席巻於秋風衾䥫寒添於夜雨欲新搆作莵裘之計必故人贈草堂之資經之營之完矣美矣潞城風景幸春囬兵革之餘劍井虹光㸔日射軒窻之外帡幪有自感戴奚忘道家受生㑹疏大功不宰巍巍乎上帝難名小道可觀碌碌乎下民有報盖豺獺不忘其報本即潢汙可薦其真誠芳名請日下先題勝㑹在天中令節惟白水真人辦力有𤣥都道士通靈水到渠成山鳴谷應天一地二天三地四要之同受于初生人一已百人十已千冝爾力行於斯道黄鶴菴居疏飡五粒松前度看桑田變海縣一壺藥今畨結茅屋居山要得如清溪道士之家必蒙助白水真人之力帡幪有造修養奚難遶香烟鶴聽珠經山鳴谷應養神丹龍蟠金鼎地久天長辨惑編鋟板疏左賦初傳洛陽紙頓増多價白詩可易雞林賈猶用一金矧端人正士之立言皆至聖大賢之遺訓人能𢎞道徳必有隣切見龜巢老人行年彌髙信道愈篤文字五千巻筆前言為辨惑之編辛懃三十年絃古調待知音之聽固緝補其舊矣冝鋟梓以廣之登山采玉入海求珠所寳無暗投之歎製芰為衣紉蘭為佩相成俱化薰之功珍重斯文咄嗟可辦奔牛􅄵南重建井亭疏古堰横奔牛髙下分河中之水碾渦深没馬傍邊宜井上之亭中書君但請揮金公輸子便能求木畫檐飛起金臺接藹藹之雲烟素綆來趨樂石甃泠泠之氷雪願言多助立見落成沈子英以先塋毁於兵重葬木主作佛事追薦疏七十二疑塜求全難救於昔人千有億化身超度祗慿於我佛投誠三寳進悼雙親伏念某顯考某官顯妣某氏歿有後先恩皆深重北邙埋骨不期毁馬鬛之封西郭招魂復用卜牛眠之地祔卯君而安厝題神主以珍藏情極哀傷事從權變爰命緇衣之侶共陳素供之儀鳴佛樂于法筵宣梵音于教典聚功徳海及尸陀林伏願佛日照臨人天感格九品蓮䑓之極樂父母超昇一坏莎土之無虞兒孫祭掃天長地久存順没寧方外交疏賀行敏中住永慶寺塵生東海八荒宇宙重開石爛南山一壑烟霞猶在欲起廢而還舊觀須作興以布新條水到渠成山鳴谷應某人深悟单提之㫖旁通百氏之書石麟角煎膠續絃從禅月道塲得來三昧秋兎毫囊錐脱頴有潑天聲價震動諸方道之行與時則可矣折松枝升座説法種蓮華結社招賢且自怡隴上之雲將突見眼前之屋置草堂宿土舍今吾似少陵先生留玉帶鎮山門何代無東坡居士燕賀有喜鷗盟弗渝忠祐廟修造疏世稱八絶數百年人傑地靈廟食一方二十載灰飛烟滅欲舉手作長廊廣殿向知音説流水髙山老我鶴歸良工鳩集惟長者秉如神之筆能慨然助使鬼之錢經之營之完矣美矣丹青遺像若生存大業之初恢拓𢎞規將復見靈光之舊褔歸衆信壽祝九重諸山請偕長老住報恩寺疏金園祇樹胡少師原是恩檀玉盌菖蒲蘇長公曽留詞藻雖往事盡成隳廢惟得人乃可作興某人學有淵源聲溢湖海大力量能勝重任諸行軰或稱老成松月堂前吹布毛于禅衲錢塘江上揮麈尾于法筵斷絃琴未續朱絲無孔笛别成清調如斯出手方謂作家岸為谷谷為陵更㸔歴僧祇之刼士希賢賢希聖㑹當傳佛祖之燈隣壁光輝宗門焜耀三山湖重建木橋疏踏蘆渡水莫言他物㑹通神伐木為橋且作此目前方便故址在雨汀烟渚良工運月斧風斤要得速成必須多助彷彿填河之烏鵲依稀跨海之虹蜺三山湖岐路縱横人無病渉駟馬車諸公絡繹自可留題濟衆云功埀名不朽重建排墓橋疏斷橋人不渡如弱水以隔蓬萊小徑曲通村奈荒野而披榛棘溪分燕尾路繞羊膓必飛梁重壓烟波則大道直趨城郭金璧一揮于長者斧斤羣集而成之浮杯僧不用驚鷗題柱客儘看乗駟設天上填河靈鵲毋聽譌傳躡空中跨水長虹佇看髙歩咄嗟事辦讃嘆福生逺塵居疏為善慶堂作歴數河沙未盡僧祇之刼逺離塵垢詎忘我佛之言一把茅得以葢頭三條篾儘堪縛腹道須多助室乃茍完離舊隱稍入深居近新洋最為佳境展開一坐具地截㫁諸塵勞門寒山帚不用掃除明鏡䑓毋勞拂拭招白雲為伴侶更無心出巖岫之間對玉峰作畫圗其妙趣在丹青之外以安隱入作清净觀陵口慈院化修造疏扶起法幢據一帶江山之陵口飛來禅錫憇十方雲水之路頭剪荆棘重作叢林掃埃燼仍為寳地數年不輟百廢俱興今將捲屋上之茅從新覆瓦更合剗堦前之草依舊磨磚搆層軒奉七佛之師望北闕祝一人之壽小苾芻向前料理大檀那直下承當種種莊嚴綿綿接續使工師求木聚良材以待匠石之需為長者折枝修因果而有福田之報惟金爾諾斯玉其成方外交疏賀蘭楚芳住法濟寺以大法濟世而出接跡前修如小山招隱而來増輝同列布金園雖云廢毁硬䥫漢斯可承當某人學有淵源名揚湖海虎阜藹騰雲之氣在昔與教藏通靈蛟溪響流水之聲至今效分座説法道將行矣人皆仰之西排灣重見珠林東印土俱成寳地陶彭澤入逺公社更不勞沽酒見招韓昌黎聽頴師琴自肯為賦詩相贈忘形緇素同志清髙塔寺疏青山門匝地荆榛化城安在紅塔寺倚天樓閣勝地重開雖苾芻卓錫而經營必檀越布金而成就掃除瓦礫整頓林泉壘七級之浮圖復還舊觀成一區之蘭若永守清規報施主恩祝聖人壽設𡨕道塲榜金仙慈愍開八萬四千方便之門寳公科儀指一十二數超升之路既殷勤而修設冝次第以宣揚燃解脱香秉光明燭緇流星集旛影雲揚専追悼于一靈敬皈依于三寳禮菩薩諸天聖衆召阿鼻十府𡨕王法雷鳴鐃鼓之音甘露灑盤盂之供演大乗法懴除累世愆尤燃藥師燈照破諸途幽暗施伽陀食濟衆饑虚散五彩之仙花解多生之寃結爾齋主必加精恪無願不從我清衆各盡䖍恭有感斯應伏願佛光普照法理圓通成就功徳山積算比恒沙之喻脱離生死海亡靈得凈土之逰作佛事薦陳都事疏名同仁字仲埜前常郡經歴念伯道之無兒誰承祭祀頼西方之有佛可兾超昇追悼同寅投誠大覺伏念某官儒林拔萃仕路蜚英五六年勞贊畫蘭陵卓然可敬四千里赴承宣蓮幙遽爾云亡桐棺菆葬于太原木主奉祠于精舍供陳蔬筍香爇旃檀世尊放玉毫相光釋子誦金剛般若集恒沙之功徳為淨土之莊嚴表我交情助公𡨕福伏願洋洋如在濯濯厥靈栢子庭前聽法㑹西來祖意蓮華䑓上逰魂得上品化生方外交疏賀㣲太古住天寧寺一天寧有内外之稱經權並用九雲夢無芥蒂之迹觸背俱亡惟麟膠可續斷絃佀烏獲能勝重任道之行也人皆仰之某人前輩老成单提正印早入寂照室得徑山骨髓而歸親承圓悟宗聳秀峰頭角而出由由然寸絲不挂堂堂乎大噐晚成坐蘭陵茅一道塲納芥子大千沙界蘇州有常州有總成嘉話舊雨來今雨去皆與忘情鐘鼓雷鳴衣冠雲集古調倡陽春白雪餘香存晚節黄花韓昌黎海上留衣特致敬大顛之意蘇子瞻山中解帶不妨問佛印之禅凡與鷗盟永言為好方外交疏賀聰聞極住天寧寺毘陵稱劇郡天寧為第一禅林泗州留法衣風化有許多因地舊網羅重新振舉大力量直下承當湖海推賢山林増重某人堂堂偉噐藉藉英聲虎阜師承聞圓悟相傳之極致龍河法藏得維摩未譯之先幾浮盃使日出之邦駐錫憇春申之浦有聲畫無聲詩等為逰戱横説禪竪説教儘自圓融踞此猊床香雲繚繞拈将麈拂花雨繽紛石池種靈運之蓮山門對獨孤之檜道則髙矣美矣人皆見之仰之三千年黄河清喜遭遇今朝之盛日十八賢匡廬社㸔振興前軰之髙風凡我同盟順爾成德薦亡女疏女因産而亡蝮母裂腸於生育轉致寃愆象王慈眼於沉淪能令解脱皈依大覺敷露微忱切念亡女某氏為結子之桃花一時飄墜視當堦之蓂莢三載更新欲撤靈幃𢎞開法席梵唄演瑜伽教典慈恩降阿鼻獄人寳燈破𡨕路之昏斛食濟陀林之餒罪如霜釋業比氷消極漂溺以上慈航洗穢濁而歸淨土伏願佛天覆燾慧日照臨大乗上乗最上乗裒諸功徳欲界色界無色界從此超昇常州府天寧寺修造疏娑婆世大千沙界往古來今毘陵郡第一道塲殘山剩水大法幢要人扶起老禪衲領衆支撐開甘露門持修月斧佛有殿似靈光巋峙獨整天龍衞從之威鐘有樓如五鳯添修庶免風雨震凌之患新兩廡而鴈堂奕奕廣丈室而猊座巍巍形勢依金城湯池周圍䕶銀山䥫壁興言多助立見有成視銀杏為雙樹林數百尺欝葱佳氣接曇花從五竺國二千年奕葉餘芳除服設醮薦亡疏明發懷人恐沉淪於下土齋沐祀帝敢對越於上蒼仰瞻威顔俛瀝情悃伏願恩光普照見旭日于雲中魂氣超升御靈飈于天上日之方中恩輝廣被天之所覆大徳難名謹陳伉儷之情尚乞哀矜之賜伏願一誠天鑒幸獲接于齋壇萬罪氷消獲早生於仙境日之夕矣事亡如存天何言哉有感必應稽首三瀆馳情九霄伏願黒籍除名竟飄然而遺世丹梯飛歩即從此以登仙居䘮踰古制之期勉嬰世務煉度伏髙真之力可濟幽靈仰籲洪鈞俯陳丹悃切念亡室某氏生無妬忌能内助以成家備歴艱辛甫中年而即世琴瑟之音固絶室家之意難亡命黄冠演其科儀設清供同乎禴祭敷宣道典歌詠歩虚諸孤除服以追哀十極降恩而超度伏願朝紫金闕乗織女之雲車居白玉京勝嫦娥之月府尚期遺澤益裕後昆重建後餘橋疏論靈鵲填河之事每笑譌傳假祖龍鞭石之神何憂病渉睠此滆湖頭濶港寔為鶴溪上要途惟諸賢發鄭僑濟人之心則良工用媧氏補天之手以舊石加諸土木看新冬成此津梁客有馬長卿必為題昇仙之柱賢如鄭子産毋勞用溱洧之車太平興國寺修塔造寺疏毘陵郡諸山起廢幸此明時太平寺一塔巋存依然壯觀風摧雨壞歲乆月長戒壇與梵宇俱亡畫水在圖經空載巍巍乎七層巨搆茫茫然百畮荒基扶天柱之傾宜先出手聽風鈴之語㑹有知音雖卓錫已有人焉而布金必須長者千年鐡柱觀看青蓮居士重禮𡨕僧半天拍闌干待簡齋先生留題佳句聿成勝事求著修名常州府送聰聞極住蘇州萬壽寺一笑視齊雲舍利頓現神光三遷至禪月道塲能繩祖武遽爾風吹别調本來雲出無心某人見合真知聞皆極致是空是色出熈怡藍外之青自本自根得妙喜骨中之髓進非躐等道在力行猊床擁五色香雲麈拂灑六時花雨以淞江太湖倒傾其法海于長洲茂苑振起其宗風登東山登泰山道眼盖明于天下處北海處南海交情何異于日前尚曰隣封毋忘舊好常州府請中道立住天寧寺乾毒發一花五葉之春流芳震旦天寧為四縣諸山之冠填重毘陵必須得前軰老成乃可為後學師表切有請也聞斯行之某人有藴皆空無道不立山林下工夫縝宻湖海間聲價崢嶸無凖翁祖派傳來得寧翁虎邱之親授穹窿山寳珠拈出陞景山猊座以盛行連年横野渡之舟此日擊誓江之楫平地把法幢扶起獨園隨坐具展開白槌雷鳴緇侶雲集金斗城鳴抱闗之柝鐘鼓相聞䥫門限待問話之人衣冠聿至佇徯三祝同寅一誠普庵堂修齋安奉徳藏主靈位代蟮作叢林鐘鼓道本貴于同修祠宇香燈義不忘于前軰敢謂東山小宗之從子仰于西方大覺之慈悲悃愊具陳慈悲諦聽切念故師伯藏主徳公早遵父訓過匡廬蓮社之門繼得師承入靈隱竹泉之室主名山一大藏教典渉危途十餘載兵戈常時若緘口無言凡事皆灰心不作雖病業難迯于俗舍乃寂滅預知乎去期法已茶毘禮宜蒲供安奉覺靈于舊隱宜揚科教于今辰伏願成就菩提圓融般若六十五年娑婆世界夢幻俱空百千萬億清淨法身光明普照延福菴衆設法華道塲保安疏居安慮危愍衆生之煩惱扞災禦患頼諸佛之慈悲俯述輿情仰千大覺切念某人等家居長幼咸寄幻於兩間氣候燠寒或違和於四體共闡道塲于延福同宣妙義于法華爐爇寳香藹祥雲之繚繞花生銀燭増慧日之光輝伊蒲列供于齋筵因果縁成于梵宇伏願佛天覆幬法雨霑濡五運六氣之流行無災無害七喻三周之功徳無運無邉凡在乎隣里鄉黨之間共享此壽冨康寧之福延福庵修造疏修月之斧數千世傳異事補天之石五色神立竒功矧草創之禪林乃檀那之福地若加修補愈更作興或捨舊而圖新或裒多而益寡斧彼鋸彼輪焉奐焉上漏下濕處任在􅀈墁東塗西抹時光生髤飾孔方兄但能助力阿羅漢别當現身非莊嚴是名莊嚴此福徳勝前福徳展開一坐具舉頭皆延福道塲更上一層樓彈指見華嚴境界願言金諾事悉玉成常州天寧寺請性天之住山疏金天地作瓦礫塲空王殿巋然突兀䥫門限為戈㦸用僧伽衣乆矣刼灰必得人扶起法幢特為我展開禪席瓶盂雲集鐘鼓雷鳴某人北山三譍早歲入曇翁之室西江一吸無人當馬祖之鋒煮虛空煨拆脚鐺談般若聚㸃頭石在處香雲繚繞有時花雨繽紛時止時行了無罣礙浙左浙右靡不依歸今菟裘為將老之營而竿木乃逢場之戱幸無多讓勇為此行吳山青越山青拄杖挑白雲飛起常州有蘇州有滿船載明月歸來延陵精舍疏并叙昔司馬公諸君子在洛為邵堯夫先生買宅人到于今稱之今叔濓江徵君世居江隂與延陵季子墓同里清風髙節實景慕之邇來避地吳下擬欲築延陵精舍于淞江之上使學者有所依歸吾黨之士冝相率以助其費亦庶乎為堯夫買宅之意也不揣僣言作成幸甚君子攸居不鄙九夷之陋英才可教常存三樂之心欲衿佩之㳺從宜齋廬之講習非助我者孰能為之切見某人喬木故家飄蓬叔世書劍客長洲茂苑襟懷藹和氣春風五色筆之文章家傳乆矣十字碑之賢墓鄉念存焉築精舍笠澤之濱揭故園延陵之扁既不忘于桑梓且樂育于菁莪願言為長者折枝僉曰使工師求木美輪美奐鼓瑟鼓琴試看荷蕢過門之徒皆為升堂入室之士青山在上流水在下馬公樂花竹餘春先生如邱學舍如舟蘇子以虀塩送老亟圖燕賀永締鷗盟呈長洲縣請修顧元公祠堂文嘗謂古昔名賢合奉烝甞之禮世俗滛祠豈容混雜其間風化所闗事冝改作切見晉散騎常侍贈侍中驃騎将軍開府儀同三司顧元公相門華裔文武全才當時與陸機陸雲並稱三俊王𨗳慕江南之望張華號南金之竒以樂道而鼓琴能知人之錫炙平六州之大亂成一代之竒功其他勲業具載晉史祭典曰有功于民則祀之若元公之賢理宜廟食今墓在長洲縣二十九都皇天蕩南舊有祠堂為鄉里奉嘗之地近被一等無知小民将本處廢廟中土地神像移入本祠使夫婦列坐玉石混淆惑亂觀聽於理未應如蒙官為致祭撤去續添神像禁斷樵牧整葺祠宇非惟尊先賢辨滛祀以明禮法且能正人心厲風俗有補風化為此合行具呈崑山州學講堂上梁文設庠序學校之教于國中人倫為重聞金石絲竹之音于堂上聖道彌尊頼有人心上經綸見此屋眼前突兀恭惟知州相公理明聖學職守神州念斯文重繫綱常知厥職實兼師帥如文翁化蜀多除弟子更繇似常衮治閩親與諸生揖讓顧瞻鶚泮乃搆鱣堂看接武布武於上下之間快求仁得仁於講論之際先聖人洋洋如在賢太守赫赫厥聲視鄭之不廢鄉校而過之比魯公能修泮宮而成矣齋廬俱備廊廡亦新騶虞之徳諸侯之風是皆本先王之教宗廟之美百官之富喜共窺夫子之門爰舉修梁敢陳善頌梁之東日出扶桑麗太空五色喜看祥瑞現八荒都在照臨中梁之西湖上青山玉笋齊千里風塵銅馬去四郊春雨錦鳩啼梁之南負郭人家瓮繭蠶共愛甘棠周召伯重歌岐麥漢張堪梁之北江水滔滔歸水國人心亦自水朝宗聲教依然流九域梁之上萬象森羅天蕩蕩日邊氛祲已全銷天下太平今可望梁之下州里絃歌總風雅三呉徳化服淮夷多士文章繼班馬伏願上梁之後一人有慶萬邦咸寧舞干羽格苗氏之頑大禹班師而勿用修文徳來逺人之服顓臾近費以何憂化日舒長士風益盛募朋友置十七史疏農有菑畬可盡畊鋤之力儒無簡䇿曷資講習之功借于人或誚為癡閱于市自亦可笑切見某人螢窻苦學陋巷甘貧十七史歴代之書擬求善本數千載古人之事具欲周知區區未遂其志咄咄不離于口割鷺股奈何無肉刮龜毛安得成氊雖君子存固窮之心在朋友有通財之義多助寡助大書特書便令載米家之船管取挿鄴侯之架知之者好之者樂之者相與講明歲之餘日之餘時之餘儘教披玩其為感佩奚可弭忘當時以中統鈔題助者趙師呂蕭昭卿王伯祥王子芳王仲徳各一百貫葛用中王君壽道士鄧混然各五十貫祁塵外蕭子璋金君玉各廿五貫僧琇玉林廿貫命甥女婿周朋舉詣集慶路干託士友陳雲心買紙儒學内印置共作四百六十册所用裝潢作料二真等費計二百貫澹泊齋藏貯諸史時至元五年歲在己卯余在鳴鳯王氏家塾是書至至正丙申春因避兵寄藏金壇縣尹秀峰家其子吾婿也勸募刋思賢録疏代張希尹作某伏覩故宋道鄉先生鄒忠公常郡名賢程門傳道其一言一行皆可為天下法若龜山楊公了齋陳公南軒張公晦菴朱文公丞相李忠定公諸賢咸有賛述宋季及元郡守校官暨諸名士嘗為表著祠墓之作散諸四方者不一龜巢老人謝某裒輯成編名思賢錄凡若干巻然非鋟梓以傳則忠與賢之文辭将遂湮没寧不惜哉某比以梨板百片助之其鋟之資尚有望于好事君子書成之日庋諸學宮庻得以貽永乆也洪武十一年八月中秋日江隂張端刋龜巢摘稿代王尚綱作嘗觀石鼓之詩閱二千餘年剥落未盡學者猶可得而傳焉近代板刻頗亦類此今呉中黄宗禮氏欲以龜巢謝先生之詩鏤板而傳之適以事阻因循十年敢用告諸君與巢翁相知諸為協力玉成其事夫巢翁之詩多以忠孝節義形于詠歌茍得刻本以廣其傳于世教豈小補哉龜巢稿巻十欽定四庫全書龜巢稿巻十一元謝應芳撰書上奉使宣撫書時為嵗荒而述也某嘗觀孟子告鄒君之言曰凶年饑歲君之民老弱轉乎溝壑壯者散而之四方者幾千人矣而君之倉廪實府庫充有司莫以告是上慢而殘下也夫鄒小國也孟子猶以是告之况堂堂天朝富有四海而倉廪府庫比之鄒君相去萬萬奈何有司者遇凶荒之年而不思救荒之策知出納之吝而不知時措之冝宜其殘慢又甚于孟子之説者責何可逭耶伏惟大人奉聖天子明命廵歴遐陬詢民疾苦其矜卹黎庶慈如父母糾正百司凛如風霜盖能以聖上之心為心惟恐一夫之不得其所耳然民之疾苦莫甚于饑今常州屬邑曰武進曰晉陵其境土與鎮江相連歲之凶荒實相似也今兩縣之民皇皇焉嗷嗷焉與鎮江之民何以異哉然彼則有仰給官廪之喜此則有餓死溝壑之憂國家一視同仁初無彼此厚薄之殊特繫乎有司之能告與否耳嗟乎常之民自冬徂春訴饑郡邑僅嘗得義倉之粟一二斗而已斯人也譬之乆旱之苗微雨斯須豈能蘇息必待優渥沾足而後免乎枯槁耳當此之時青黄不接食草木之根者有之鬻子女而食者有之去父母離鄉井行乞道路者滔滔也有司方且移文覈實籍有田之家計畆科粟以為賑卹之政其亦不思之甚矣夫粟之為物必産于田歲凶則田不收矣夫不收之田雖累巨萬粟何可得乎况頻年不登賦役重困産去税存者十有八九一旦又加諸賦歛之毒其狼狽為何如哉徒使皂𨽻之徒家至戸到呌囂之聲雞犬弗寧是以有田者亦多為東西南北之人矣其詣有司者則拘之縶之鞭之扑之刮龜毫于箠楚之下割鷺股于挫辱之餘區區所得民不足贍假令能贍其民亦何異奪烏鳶之食與之螻蟻耶若是者某誠知大人君子之心必不忍為也忍令有司為之乎夫常之為郡大郡也官廪之粟陳陳相因又有附餘之粟存焉公帑之積綽綽有餘又有賍罰之金在焉斯二者非國經費有司亦何靳而不以施諸民乎茍能以是施之亦可以解倒懸之急况能如汲黯發河内之粟乎惟大人舉而行之上推聖恩下副民望盛徳之至然民疾苦豈止于斯如公田之重租宜减官鹽之髙價宜輕田户之酒課宜更都水之冗官宜汰凡如此類未易枚舉獨以賑饑一事首凟鈞聽葢民之顛連命在朝夕非若他事可少緩也芻蕘之言倘蒙採擇餘者又當條具而悉陳之惟大人埀察焉區區干凟崇嚴不勝悚息與王氏諸子書諸君子居䘮三年除服有日聞欲命羽士設醮以資𡨕福所費計統鈔二百錠有竒以粟用之幾四百石是亦出乎孝敬之心循乎世俗之禮也然𡨕福之實果何有哉以愚言之用三日醮筵之費賑一鄉人戸之饑當此凶年使數千百人得餔其粟而免為溝中瘠者其歡欣贊誦奚止百倍于黄冠之口哉若諸君更欲盡追逺之誠則于祥禫之日豐潔致祭亦庶乎終䘮之禮矣但今之世俗親没之後凡言做好事者非佛氏之齋必老氏之醮二端之外餘無用情雖祭祀亦不為意盖亦未之思也愚請引古證今以齋醮無足信者為諸公詳之佛氏以釋迦為師其書自漢以來流入中國初無設齋之説也至梁武帝妄祈因果俾僧流為之厥後亡滅宗國餓死臺城使設齋而有因果豈至是哉道家以老君為師自周以來其書傳之天下亦無設醮之説也至宋徽宗妄意求福令羽流為之未幾傾危社稷流落徼外使設醮而能獲福决不至于此矣二君昏迷不明物理信一時妖幻之言為二氏衣食之計如此前代名賢當今豪傑卓然有見而不惑者固多有之惟閭閻細民惑者什九何足論哉諸君負聰明特達之才有深逺宏濶之見平居髙論迥出人表豈至是而亦淪胥于汚陋之俗耶必能以理燭齋醮之妄以財行賑卹之仁上下一心䖍奉祭祀于以寓孝思之意于以報㒺極之恩上天鑒臨何福不至先君有靈必含笑𡨕𡨕中矣余以忠告者乃朋友之義也在交契不敢以不忠惟諸君念之論呉人不當祀范蠡書投老異鄉如龜藏乆未嘗敢輙造公卿大夫之門為㳺説之客也今一造焉亦不敢如方朔自譽毛遂自薦以求其用亦非有富國强兵之策驚世駭俗之論以衒其能特以古人一事有闗風化敢請為閣下陳之僕近過呉江嘗逰三髙祠頋瞻遺像覽前人記載金石之文見所謂三髙者曰范蠡曰張翰曰陸龜蒙謂其清風峻節天下共髙之邑人為東家某而祀之僕于是竊有感焉夫季鷹魯望呉産者也呉之人慕為東家㐀是已䲭夷子皮始終事越間嘗以行成留呉其心未嘗一日忘乎越也進美女納寳噐以惑呉之君臣乗虚進兵以滅呉之宗社大率皆蠡之謀越人論功蠡居第一豈非呉之大仇乎惟其功成名遂遯跡而去其識見固髙于常人然浮海適齊則裝其輕寳珠玉以行在齊復營致千金之産自齊之陶懷其重寳而去居陶而父子畊畜轉物逐利又致累鉅萬之資僕嘗觀太史公以是屢書不一書者盖深鄙之非取之也較諸子房辭漢翛然從赤松子逰相去萬萬矣又觀杜牧之詩蘇子瞻之詩皆謂蠡得西施以申公夏姬為比由是而言謂其人為貪為穢亦不為過尚何清風髙節之足慕乎今也以呉人馨香之黍稷享敵國貪穢之仇讐于理其可乎哉禮云民不祀非族况仇敵乎或曰有其舉之不可廢也僕應之曰呉有三髙人特未之思耳若泰伯仲雍延陵季子真可謂天下所共髙者也凡為呉人茍非土木孰不有髙山景行之思雖欲止之而不能也惟當道君子循名責實改而易之實足以稱三髙之名雪千載之羞而饜服輿人之心矣然斯言也僕不往告之他人而特告于閣下者誠以閣下心正而理明學博而識髙見義所在勇于有為凡于正人心厚風俗之事知無不行特此一端偶未之及聞僕所説必不以人廢言此僕所以發其乆箝之口也惟閣下參秉鈞衡之暇稽諸祀典以理裁之以義决之為之改作奉三讓至徳之聖人祠于堂上配以二賢仍以季鷹魯望列之從祀如此則振前人之謬戾新斯民之耳目正髙風崇禮讓激衰世薄俗而勸之其于風化豈小補哉惟大人君子埀察焉若謂蠡有功而祀之則越人祀之宜矣如諸葛武侯之賢蜀人祀之呉魏亦未嘗有祠焉斯理之公古今不殊幽明無間所謂質諸鬼神而無疑者也苐恐不知者以僕之言既不足以謀身又不急于世用斥其迂濶而譏笑之僕于心誠無愧焉古語云可為智者道難與俗人言所恃髙明必蒙鑒察區區干冒崇嚴不勝悚息代與李中丞書某去年夏四月嘗奉状附某官漕運之行不審徹鈞覽否即日仲春伏惟君侯神相多福某避地呉下六年于兹顛沛流離困窮艱難萬狀逺不能奔父䘮于京師近不能葬母骨于鄊土兄弟妻孥救死不贍故于父母殆若忘恩其實銜哀茹痛朝斯夕斯未嘗頃刻忘于懷也若大人之深恩厚徳重如邱山亦未能伏謁門下效犬馬之力以報其萬一幽明兩負度日如年惟大人念先人之夙好憫遺孤之艱虞特賜哀憐不加譴責為幸甚矣某擬今歲歸耕膠山剪荆棘藝禾黍庶一稔而有宿舂之粮即灑飯先人之墓一負荆于大人之門也兹因呉縣尹詣前謹奉此承候起居并述所以趦趄負罪之故舍弟某臨書羅拜悃不殊前下情無任悚懼感慕之至伏惟鈞察上盛教諭論土地夫人書常州路學教授盛克明以文廟先聖殿及門廡等屋湫隘皆撤而新之廟前建文昌土地二祠其土地舊多淫祀嘗詢之應芳悉皆除去但夫人之像為或者所沮而存余盡力請毁之至書再上教授乃白諸郡守賈侯侯然之像遂毁教授名昭維揚人侯名禧字吉甫真定人也自先生之教于常也講貫之暇繕修廟學二三年間百廢具興某竊嘗與鄉之諸老論之皇元置郡博士以來未有如先生用心之勤者也功其懋哉功其懋哉時有細故一端尚宜改作敢以狂瞽之言輙凟清聽惟先生察之伏覩本學重建地靈祠于儀門之外其神有無姑置勿論使誠有之是豈不知亷恥者哉今肖像之設夫婦偶坐楚楚乎裙釵之飾盈盈乎朱粉之粧侍從傍立男女雜處儼然坐聖人清廟之下能無恥乎禮曰男子居外女子居内又曰女子出門必擁蔽其面雖近世禮俗之敝亦未嘗無男女之别也至如閭閻細民之家人或過之其妻猶避嫌不出豈有身為神靈而為之配者不知内外之分呈身露面眉案並食以饕士大夫籩豆之薦反不若閭閻匹婦而能避嫌乎吁幽明雖殊理則一致决無是理也明矣比聞吾先生以此為細㣲之故不欲矯世違俗而姑從衆也則先生之心固然矣但學校者風化所出之地凡有作為人所矜式愚恐四方來觀将謂禮或宜然轉相倣效而卒莫知其非矣又恐禮法之士從而議之又安知先生初見之明如彼其後從衆之意如此耶此愚所以不避譴責僣伸寸喙以罄其芻蕘之誠惟先生以理揆之勇為撤去非惟雪神羞明禮教不淪胥習俗之謬抑亦可見先生之不以人廢言矣抑愚又有説焉夫地之靈者莫靈于賢者也若呉季子張文靖胡文恭鄒忠公諸賢正毘陵土産之英靈學有舊祠庳隘弗稱即于此祠而奉之不勝夫無名氏之鬼乎程子曰除神祀而民為善斯言也雖質諸聖人在天之靈亦何疑哉夫如是而或獲戾于鬼神者凡有殃咎宜加于某之身無悔區區僣越惟先生察之又上盛教授書某比見地靈祠設夫婦之像恐未合禮切嘗冒昧有言欲裨明見亦庶乎他山之石耳或有誚余者曰怪神之事聖人不語非不語也盖不易語諸人也夫地靈之神其配偶有無未易窺測若果無之則儒先君子必嘗論説今吾子以一介之微言雖屢中又安足取信于人也哉僕聞之既謝不敏退而考諸五峰胡先生之論南嶽曰世俗為廟貎置男女屋而貯之䙝瀆之甚厥後北溪陳先生又從而釋之曰自聖學不明鬼神情状都不能曉如泰山封帝儼然人形埀旒端冕且立后殿于其後不知又是何山配之為婦也然則土地之于山岳類也像貎之設已為不經况復加之配偶乎惟先生撤而去之以祛衆惑其有未喻者乞以前二公大儒之言曉之其誰曰不然况當今天下之所通祀者曰三皇曰孔子曰社稷或廟貎焉或壇壝焉皆未嘗有匹偶之設何物地靈而獨有之乎愚也稽之古訓已如彼參之祀典又如此反覆思繹决無是理不免再用塵凟以殫其千慮一得之愚惟先生埀察焉干周侍御作顧元公祠堂碑書某毘陵鄙人也逃難異鄉百事踈懶惟好古之念根于其心老而彌篤遇有感觸奮然欲為力雖不足亦必假手于人卒于成而後已今有一事復因人就緒輙敢具述顛末為閣下成之某僑居葑門適與顧元公之墓相近地方五六里俗稱顧榮墓是以知之既知之數往弔而問焉夫元公晉之名臣也其勲業家世詳見史編元帝大興二年十一月十七日卒于官迄今凡一千五十餘載碑文雖失丘壠尚存土人以其地如鳯形名鳯凰嶺前有二墩峙立左右樷祠一區為鄉里奉嘗之地其來逺矣近有無知之民舁置土地神塑像數軰列坐其中其荒謬淫䙝有不可勝誅者以某一介之微莫能改作是用言諸長洲縣令周君君博雅而文方其視政之初力行古道故聞而喜之遂與某等展墓且詣祠奠謁屬某為文告之曰何物地靈混此室處既而令方議去淫祀整葺祠宇邑人張實乃樂成賢令之志輸財效力惟命是從圬人梓工並手交作瓦甓之毁者易之棟宇之朽者易之像設供具門垣墓表靡不完好二墩則各植梧桐二株名雙梧墩盖張華嘗稱公為朝陽之鳯及墓名鳯嶺故也月餘畢功令復躬祭祠下麗牲有碑宜勒文以發昔賢之幽光而周令亦牽連得書然必求大手筆為之斯不朽矣惟閣下碩徳令望為今儒宗典雅之文追古作者若篆𨽻之妙則秦丞相漢中郎並駕而驅吾不知其孰先而孰後也兵革以來諸老凋謝所謂斗南一人而已惟閣下追念前修賜之述作并為揮灑使刻之堅珉則詞翰兩絶焜燿丘隴將見夫争先摹寫以廣其傳則元公之勲業聞望益著于青史之外矣某又考之南史晉武帝禁立碑表著于令甲至元帝時驃騎府主簿以故恩葬舊君顧榮請為立碑詔特從之然則今閣下之文繼美千載可謂無愧焉耳如某區區龜巢在往歲猶蒙黼黻矧斯文之傳有補風化閣下豈不樂其美耶此某不揣僣越拜書閣下以閣下之必不却也輕凟崇嚴不勝悚息上王總管正風俗書嘗聞豐山之鐘霜降而鳴説者謂氣之相感理或然也今某一介草茅覩呉下風俗之壞扼腕切齒不忍隱黙敢請為閣下陳之盖以閣下得天地之正氣養之于心施于政事故區區狂直感而有聲猶豐山之鐘也惟閣下發號施令行諸郡邑必能誅鋤淫穢一洗汚俗振其氣之餘烈也是氣也在天則為風為霆為秋霜為烈日在地則為艸而指佞犬而咋姦豸而觸邪歐陽子所謂天地之義氣而孟子所謂浩然者也夫以閣下之清非秋霜乎其明非烈日乎政教號令非雷厲而風行乎如某者氣禀獷直疾惡如仇盖亦似乎指佞之艸咋姦之犬觸邪之豸也吁昔孫叔敖殺兩頭蛇而隂徳之報位至楚相自世俗觀之敖之殺蛇損物命也殊不知除一物而免衆人之害徳莫大者也今日之事正類此物故復舉此以破世俗之惑罄其一得之愚惟閣下察之賀丁州判到任書某客居江滸帶經而鋤一日鄉之父老過余曰兩年吾州以州長之賢民用復業今又復得賢州佐共仁其民必能盡除煩苛使田里無歎恨之聲矣余居此飲婁江之水是亦婁江之人也可不喜乎可不賀乎余曰倅方下車曷知其賢曰吾聞之居家能敬其親居官則敬其同僚遇文士則敬武士則敬緇衣黄冠醫藥卜筮之屬咸禮貎之微而皂𨽻亦善遇之又微而蚩蚩之民伏庭下訟曲直者亦謹以三尺之法裁之未嘗厲其聲怒其色也是皆敬之存于中形于外如此非賢而能之乎時甚樂聞其説因黙念先民之言謂能敬必有徳徳以治民而民必被其澤矣既而入州以父老言詢諸文武醫卜緇黄之間無間然者至于搢紳月旦之評道路輿人之頌比前所聞者尤加詳焉是誠可喜而可賀也然則一州之人今被其澤固當為一州之賀等而上之澤及一郡則又當為一郡之賀又等而上之敭歴臺閣羽儀天朝可為斯世斯民之賀者未艾也惟一念之敬始而終之君子慎焉與陳翰林子山書某丙申冬逃難呉門逢人問閣下出處顧嘗為浙東路難之憂後二年聞居翰苑深用為喜近于唐彦博處又喜知爵位之崇道徳文章之盛每誦一代不數人百年能幾見之詩馳慕而已某離鄉六年備歴艱險年今六十百無所成獨與兒輩固窮嘗懼失其故歩也比來目昏耳聾髯白如雪惟髪尚有黒者則其状全類社公可笑可笑鄊人多無噍類而某一家數口幸而無恙父子筆畊粗免溝壑特未知將來如何耳兹因胡宰行謹此問訊即日秋髙伏惟善加保愛亟秉鈞衡以福天下上周參政正風俗書某毘陵賤士也曩歲以避兵來呉閣下時為郡主有所控訴俱蒙接納由是知閣下為能聽言為能下士常懷野人芹曝之獻而未能也今閣下參秉鈞衡為國柱石以斯世斯民為己任呉人賴之若子之有慈母風雨之有夏屋别妍媸而有鏡較輕重長短而有權度也况閣下不自有其明下士之勤吐握不倦聽言之切詢及芻蕘某雖老無能為視舌尚在豈終無一言以效芹曝乎然國家之事錢榖甲兵則既有人籌之矣講求法制亦有人矣薦賢舉能又有人矣特呉中風俗壞于浮屠之不肖者曽無以及之某敢請為閣下直述之夫男女有别然後父子親父子親然後義生義生然後禮作禮作然後萬物安無别無義禽獸之道故禮謹大昏詩首闗雎易著咸恒書稱釐降聖人慮天下後世深矣彼佛之為敎雖有異同然以淫為戒亦甚至切但今之浮屠玉石混淆所謂不肖者乃僧中之羅刹佛氏之罪人無别無義之禽獸也某處某等之徒未易枚舉姑以目前言之某以堂堂住持之稱踰墻而摟三闕二字繼室桑中之妾駢集方丈行窩旁觀因往往唾斥怒罵但未有言于官者耳同衣不敢言之教門之鄉里不敢言之恐其怨害也上司懸隔而不聞州縣置之而不問是以恣其荒淫了無忌憚逺近效尤淫風大行良家子女蘭鮑俱化甚可惜也愚惟狂直不忍喑黙然某本異鄉之人區區僣言殆猶西家之犬吠東隣之盗使其主因吠而警耳且能使家衆捕之亦庶乎救其所失不然則犬為徒吠且徒取憎于盗耳今閣下當路于呉非斯民之主乎有司非家衆乎治其人使返其尤物而風俗還淳非尚能救其失乎以閣下之明必不使某為徒吠之犬而徒取盗者之憎也惟閣下察之或疑浮屠氏不肖者多莫能盡治是大不然君子之徳風也小人之徳草也風行草偃如響斯應有不待家至而戸到也昔明道程先生言于朝曰治天下以正風俗為本然則區區所陳不為細故惟閣下採擇賜之施行非言之幸斯道斯民之大幸也與劉旭齊書某三復誌文皆逹生委命之意不琱不琢之辭深用敬服謹依命微潤飾之但遷葬二親不宜説以便省掃亦不宜泥風水之説也啟菆而遷庶合古制所謂以家學授受而姪子青領鄉薦乃家庭盛事宜特書之至如流寓崑山亦紀實也若孫某必書在某處不然則有其人而不知所在是闕文也以術數二字易相者之言則虛中之説前後相應又見公精于虗中一家之書而免議者有多惑之誚所需挽詩未能措手題小像數語方爾腹稿續當納上若夫戒酒一節未喻髙見古人居䘮不得飲酒食肉然必曰五十以上血氣既衰須酒肉扶養者則不必然是則酒肉乃老者之不可無也今年將八秩正宜以詩酒自娯盡其天年死無所憾戒而不飲非惑于罪福乎若以戒酒為盛徳事勉而為之則古之聖賢皆欠此一徳不然何老癡如是耶望不以人廢言亟請呼麯生以永朝夕重九僕當折菊一枝擕酒一壺并作活祭文詣前為公洗胸中凝滯也與孝章殷君書相去纔一舍地不面動經半載可勝馳情比聞足下以名後而往如玉抵鵲深用慨歎已而知有傭力者代之得不廢種學績文之業又深為之喜也某嘗謂士生斯時固樂于得時行道然有命焉非力可致當此之時茍能有一畆之宫可以棲息賣金買書教子共讀客至沽酒劇談古今真樂事也左近朋友惟足下洎子英袁君公振馬君朋南執中二趙君幸足下勿以細故少沮而遽改其樂焉某于二十年前固嘗樂于此矣今茲窮途不復可得家累百六十指借屋而居仲春以來風雨連月頽檐敗壁濕薪破竈視累輩若有不豫色者某賴有陶詩一編可以自娯且時與樵歌漁謳更唱迭和乃釋然無纎芥之累于胸中也諸友㑹間煩以前所陳者告之使樂其樂旭齋劉先生無諸君之樂者則以漁樵唱和邀之亦必樂余之樂矣僧廬十絶先乞示教上何太守書僕本毘陵人也寄跡呉下于茲有年竊聞賢府侯以清静治民亷明之聲洋溢下里凡民得以安集于二天之下者為幸多矣僕雖窮居一室從事筆畊然日與田夫野老為伍而共其休戚焉比者欽奉綸音大赦天下聖恩汪濊物無不沾而斯民之幸尤多詔罷敝之民何以紓之又曰民有不便有司舉之此足以見聖天子憂念斯民之心如此其切托付有司之意又如此其重也由是田野之民歡欣鼓舞意謂痛入骨髓今又有増科水脚之患焉譬如乆病之人舊疾未愈新病復増實何可當哉奈何里胥催徵急于星火飛芻輓粟晝夜不停搰搰無吐氣暇雖欲赴愬于甘棠之下不可得已况能愬諸輦轂之下乎如某者以筆代畊田無寸土于官賦重輕本無干預然斯民困苦之狀慘于目嗟怨之聲刺于耳誠有所不忍者况聞賢府侯吐握下士子愛庶民故輙敢以芻蕘之言上逹台聽是猶豐山之鐘霜降而自鳴野人之芹愛君而特獻也一誠如此餘無覬覦惟大人君子上以體聖皇矜卹之意下以察疲民疾苦之情鑒僕愚誠恕其僣越特䝉採擇賜之施行使困苦之民得以蘇息愁歎之聲化為謳歌将見太史氏以循良之政登載簡册而僕亦當作襦袴之謡與田夫野老歌詠于郊野間矣呈府侯書嘗謂國家更化務從寛大以安民州縣承行貴在申明而無弊事既有乖理宜陳説見奉詔書内一欵節該民間凡有不便事理該載不盡者有司明白申舉事輕者中書省即與施行重者集議聞奏欽奉如此切見崑山州歲辦秋糧八十餘萬石舊年本州遵奉上司所行每糧一石起科水脚米一斗各保人戸赴京納糧其所用水脚俱係自行出備當時有司失于申明上司優免開除兼之張氏以來比于前元多増糧額民以窮困輸官不敷今加水脚其數益厚不能辦納致令催糧里長人等破家蕩産累遭校責監繫囹圄受罪數月逃亡縊溺者不知其數直至今年八月欽遇赦恩纔方釋免切詳上司允行每糧一石科米一斗既是明白水脚葢以人戸赴京送納逺渉江湖艱難重費以此糧米為稍水船脚之用其理顯然上年官司所收不見如何用度即係重復于民未經定奪開除况今洪武元年見奉上司明文起科船料令佃戸自辦人船脚力送納官糧又每石收銅錢五十文及以官糧二百五十石起科水夫一名赴京畿漕運司應役上項元科水脚糧米有司一槩征收使民不支給官無用度非上司原行之意人民受害下情不能上逹良可哀憫若不建言尤慮今歲秋糧必到似前拖欠負累官府人戸逃亡不無荒廢田業闗係非輕其他州縣事亦一體如䝉采覽備申上司詳議為民除免甚副聖天子優卹斯民之美意公道幸甚蒼生幸甚與孫彦民書伏覽題顧元公祠堂詩語皆事實且以辨斥淫祠表而出之非茍作也筆之懷古錄中歎賞未已忽州人抄示吏部移文行乎有司禁止淫祀且令勘取忠臣烈士之屬載諸祀典者皆奉制集議而行實為聖朝更化之盛舉忠如元公真宜廟食苐恐里社之人不知東家丘之可敬不為申報良可惜也望先生借重一言詢之郡邑必合乎祀典載之有司歲時之祭將自兹始庶不負朝家之美意又恐革命以來巫覡之流復以妖象混淆扇惑愚俗軍民樵採或不知禁更乞上陳督府旁及郡縣請給榜文嚴加禁約尤見先生之仗義也元公在天之靈盖昭昭耳某本合親奉周旋適病齒痛劇其頭岑岑寒熱不可以風故弗能前然視舌尚在且有知己者可與之言故不自忘其僣越而覼縷也惟先生不辭緩頰之勞特賜發揚公道幸甚元公本傳就用緘去拙詩奉懷别楮呈似一笑慰顧國衡䘮父書暮春承令先君書首叙别懷次言羇况驚虞憂患靡不詳悉所云舊疾新愈惟手顫未能作字又曰顫定更寫詩寄去也時予以來人便回即口占一律用代答簡豈意五月六日遽聞捐舘初疑謬傳未以為信又細詢之果爾大故不覺老泪之濕衣袂也區區友朋猶此慘怛况為之子若孫者其鉅痛為何如哉然孝子之至宜以後事為急顯親為務如刻銘紀徳瘞骨闕山及以遺稿可傳世者鏤板而傳之如此則先君子之亡猶未亡也僕以衰老弗克蒲伏往弔切見張司業以詩祭韓吏部勉效一篇以陳薄奠因敢僣越相告如前所云諸季洎令子諒惟孝心所同各兾節哀順變僇力遺事以盡孝思之情臨書悽楚至禱不宣與陳彦直書古人有言曰瓜田不納履李下不整冠盖嫌疑之地不可不慎衆口鑠金不可不畏今執事欲以臨濠倉屋就宅上為之意在招致同役鳩集梓工朝夕相與規措監督而成就之至如供給飲食收拾物料亦得以驅馳臧獲輿𨽻之人為之効力此固忠厚君子之用心視公家之事如家事也然以嫌疑論之則類乎整李下之冠納瓜田之履知幾君子可不避乎數日以來事未作而行道之人已有萋菲之言况他日乎吾嘗詢諸執事之骨肉至親及宗族姻眷朋友相知者皆曰誠有可嫌疑者如前所云但恐咈執事之意不敢直言不敢强諌退而論之猶可更張造作之地如鄒􅇕陳渡橋等處隣鄉接境宻邇同役執事領袖于彼使佐貳者各任其責工匠者各展其力凡一切所用錢物公同出納明白簿書如此則不根之言無自而生矣或于公務之隙歸理家政亦何不可斯言也雖出自衆人之言實合于老夫之心是用筆之簡牘以告執事盖亦恃以平日相愛相敬而以忠告朋友之義如此執事勿謂㓗已奉公無可為其謗者昔周公聖人也而有四國流言樂羊子賢士也而有盈篋謗書况今俗薄其嫉妬怨憎揺唇鼓舌者所在而成羣一旦妄生謗讟譁然而蠭起執事將何術以止之耶茍無術以止之則其患有不可勝言者可不慮哉可不慮哉易曰君子作事謀始又曰君子見幾而作不俟終日始而不謀見幾而不作後雖噬臍恐無及矣區區僣言切希恕察與許鈞善書春初承諸名勝惠詩盖以社櫟無用之才或能致壽而忘其蒲栁之秋也知感知感自是音問曠絶不審動止何似可勝懷仰區區徙居横山日與野翁溪友班荆坐談或泥飲擊缶更相唱和以為娯樂餘無可言者數日前乆雨而晴出門野望欣然見百榖稔熟遥想呉淞江上西溪沃壤秋風䆉稏黄雲滿目真可為先生賀吾兒森得舅氏新田四五畆畊以蓻秫度其所收亦可釀臈酒作粔籹以充其親之老饕若先生之家豈不十倍于此倍十之喜亦可知矣千墩諸故人煩問訊并致豐年之賀臨書馳企與袁子英書比者周履常來承手誨具審起居安吉諸公多星散所喜孝伯教諭遠回及有提學俞先生寓同里閈朝夕相與講明古道或倡和時以為樂而某違距幾三百里恨無縮地行術可以同其樂也如景仰何如景仰何曩聞欲著書以究事物之藴其他述作必更有之示教一二可乎吾儕道同志合雖各處一方茍能于文字間以古道朂率交相責善視連屋不相往來與夫往而蔑可語者逺勝之矣俞先生往未曽參拜莫敢以此情告公及秦陸盧殷熊闕諸契家念僕舊交勿棄老謬幸賜警策則區區未死以前皆可以與聞古道之日也某目雖昏尚可以强觀大字書耳雖聾亦可以聽人髙聲語但健忘絶不能記或欲作一詩閱數日而不能成既成而援筆欲寫又為茫然嗜學之意實未厭也惟諸公念之春晚寒暖不常切兾為斯文慎重與京口俞伯鎮書比小兒去丹陽倉卒附舟不及書問及歸乃言嘗至甕城以塵容俗状羞去謁見即日仲秋計惟天相斯文動止廸吉朝夕㳺從或山歌野唱以適其適餘無可與故人道者西望長江馳慕而已公居泮宮必多著述不鄙老繆尚希有以見教近聞丹徒令君死𦵏魚腹蔚有政聲區區恨不得其姓名事實之詳筆諸野史敢煩髙弟録示可乎本官遺文暨諸大手筆之所紀載尤望示警吁喧啾百鳥中忽見孤鳯鳴識與不識皆樂為之一聞耳末由㑹晤更兾珍重答熊𤣥修書頃辱賜詩及書其詩所以開釋老懷者多矣書辭詳悉如聆面言然皆辱追理清事非世俗寒暄之問而已䝉所跋雷震事言簡理明殊有警策辨惑編未到書府不知陸沉何地矣今再用一册與鷗盟文送上此文命題葢子虗烏有先生類也悠繆之談茍合雅意使老夫亦得挂名鷗社中不亦可乎愚見以閒叟易野叟之號名實相稱且人皆得以稱道耳比聞寓舍有鬱攸兩畨之厄而郎囝且為萬里之行懷抱欠佳然君子處困亨乃為曠逹况有小令郎幹父之蠱朝夕侍側足以為娯此意此言惟先生然之如某者自去秋為凶人排陷嘗繼以重疾人皆危之頼天之靈復延殘喘由夏而秋村居放適數日患痢自謂必死僥倖又不藥而愈亟命兒軰執筆口授答諸公春首之書及盡償隔年詩債先生聞之必為我一大噱也與姪僧徳藏主書汝七八歲時父母鍾愛因汝父好佛欲令汝為僧身雖在家已僧其首教汝讀論孟即兼佛書埀及成童遽命從釋汝母泣而從之時優曇師為汝祝髮授以五戒及汝侍靈隠竹泉師法席果茗之費罄汝衣鉢汝父且竭力繼之盖望汝為釋門偉噐至如成佛作祖説法度人皆汝父所望也不幸汝母先即世父亦客死于兵俱不能見汝特逹可不念哉可不念哉今汝汨没固時之使然兵鋒數年竟不復㸃檢其身奮厲其志貿貿焉甘于閶茸豈絶然不記憶汝父之言耶近聞去金陵謁西域髙年之僧受戒而囘吾謂此行在庸人則為可嘉在汝則為可笑葢庸人昧理有不知殺盗淫妄之非或酗于酒一旦受此五戒遵而行之變惡為善是可嘉也汝自幼為兩名師弟子豈不曽授汝之戒乎抑西來之僧不以瞿曇為宗而别有所戒乎不然則往年之戒即今日之戒受而不持徒爾僕僕是可笑也吾嘗觀佛書説父母劬勞四恩之一也凡學佛者在所當報不知胡老僧曽語及否吾聞汝于二親烝嘗及俗禮掃墓等事皆不為之其心必曰古禪老有言一子出家九族生天是為大孝惟恐不能盡出家之道不能度九族之人負乃劬勞為人訕笑以為豺狼之不如于心安乎余近者一病幾死日來稍愈恐旦夕溘先朝露則斯言無復有人告汝故扶憊援筆布露肝膽慎勿諱疾而忌醫蹈前覆轍父母所生二子汝兄早䘮惟汝獨存春秋祭祀奚忍從汝而絶耶似續之計老不可為若釋門祠奉之禮汝亦可為否則奉春秋祭掃隨俗禮以終其身亦庶不㤀㒺極之報云耳若夫修行佛道非吾之所想亦當先務㸃檢其身奮厲其志持守戒律由粗入精水到渠成何所不至誠能如是乃不負汝父平昔之願也汝其勉之汝其勉之予生業儒故不事佛使其為僧則衣佛之衣學佛之學凡與汝所言者汝當力行幸勿謂言耄而忽之與蘇性可書中秋前一日淫雨喜晴晨坐坐瓮牖下焚香瓦鼎三復魏公百韻詩追念令先君面諭之言雖隔一宇宙猶昨日也感慨之餘書數語巻末謹用納上以今觀之前軰如瞻翁先生得正大之學卓然不為異端紊惑者盖亦鮮矣幸而象賢有子又篤生磊落振拔之孫及有姻眷如伯逺兄者相與矗立交相勉厲視百家妖妄邪誕之説如鵂鶹夜鳴吐罵斥逐不一動其心此僕所以愛之敬之以三俊為㤀年交也數日來抱疾待斃百無挂牽但恐兒軰于失怙之後為鄉俗所移或違治命吾死之日三君子有能為中流砥柱者乎伯逺洎令嗣偉正同此致意頽憊不克親書必䝉照察與蘇州呉趙二心友書今春曹徳升去甞致書二妙隨得報章知中行避地海濱盖亦離羣而索居也時老夫在憂患中聞之為之悵然荷執中埀念不逺三百里欲賜見訪此情豈泛愛者可得同日語哉某二三年來父子邅迍有不忍與故舊言者前年秋木為縣學訓𨗳媢嫉者以擅離役訟之受笞五十斥為編氓去年暮冬忽分憲于案牘求疵府司官曹俱被罪責而木復加五十五杖發鳯陽屯時某以卧病不能為之申愬痛苦而已抑鬱而已其從弟送行至正月中旬負疾而歸醫救月餘屢瀕于危老夫平生惡况未有如斯時者既而病者勿藥老懷欲紓方擬抱牒赴䑓閣之下以鳴其不平承郡守以毘陵誌書付託辭不獲命自春徂夏黽勉校正疲憊之軀如墮膠漆每一思之涕涙交瀉如此更兩月餘夏初誌書甫完乃盲左目雖可見天日如隔烟霧由是杜門餌藥又復經月慮恐雙目俱盲則此志不伸此子不復能救矣于是奮不顧死力疾詣憲府陳詞仍以惡詩傾寫䑛犢之情頼臺官上下如秦鏡並照灼見肝膽特賜哀憐信宿之間上徹天聽欽䝉玊音放木歸養半年陷阱一旦得脱于七月初三日到家老夫先歸兼詢其抑鬰痛苦積于懷抱者方若氷釋矣然則非上天有以相之不能也非祖宗之遺澤未冺亦不能也顧區區力援其子以盡為父之道實斯文啟廸之力為多二公吾斯文骨肉視木如弟姪者其受禍必為之憂苦其䝉恩必為之喜懌故歴叙顛末用徹清聽不自覺其覼縷也拙詩謹呈事亦概見凡知己如元修子英公振鈞善諸先生均煩舉似或者有以見教則老夫得歌詠為樂其幸多矣盖平昔樂于讀書今以目疾而廢但每日飽飯熟睡百無猷為亦無可為樂者惟樂此一事以待斃耳未㑹間惟二妙徳業進脩幽真養福下情不勝至禱不宣答許鈞善書中秋後一日翰墨到手甚慰馳思且知三書渺茫埀念愈切䝉薦舘地且玉其成鮑叔之知何以過此但某年既耄矣某子如死而復生有菽水之養矣茍不知止貽笑老耼亦違我聖人貪得之戒矣佩服重言敢不聞命方竹杖甚佳受惠感激承問吾兒其事見于呉趙書中皆抄去先生視之必重為之戚而喜也答管伯齡書一别十年相去幾三百里非惟㑹面之難而書尺亦不能寄清風明月未嘗不思𤣥度世羙上人自錦里來歸得手札并佳章情誼藹然文藻燦爛足見徳業與年齒俱髙欣羡欣羡婁江之東詞林獨歩又安得尊酒細論如曩年終日竟夕之娛乎然昔人有言心親則千里晤對矍鑠二老扁舟往來不消十數日程相與訪諸故人于三江五湖之上以適其適真吾軰餘生之樂事也歲晚有興當踐斯言奉和來詩聊抒情愫鄙陋之辭發一笑耳令嗣過庭煩道前悃金陵往還過敝寓白鶴溪可乎兒軰曰木曰森皆為農横山之陽廢學可恥林也䝉郡守過愛舉充江隂縣學職固辭不獲去有日矣其如居者壁立何諒故人埀念故及之餘不一臨書無任馳系與盧公武書前歲殷文學再赴咸陽持至佳作且極談幽貞之吉甚慰馳想今年春得袁子英先生書乃知公車入鳯閣而演綸之筆已在手矣可喜可賀即日諒惟徳日益修道日益隆而文譽日益以著可勝仰企從子林到京令問起居并以拙詩一小編呈似盖有學子王尚絅者將欲刻畫無鹽出醜鄉里于予舊稿中摘出一二類而編之敢望痛加删削賜之序引則庶或不致覆瓿矣往者懷古錄屬有記載今亡之原稿若存更乞抄示區區棊花手巾并囤碑一本送上希領意歲晏更兾為斯文慎重以迓春禧與陶孝思書比月旦鄉飲而别滿望執事與郡庠諸公同過鄒墓以陪賢太守及官僚仝為祭掃不審胡為不來也夫鄒忠公為道學君子天下共賢之在昔學有祠墓有亭郡守教官嵗有祀事二三百年之間遺文尚存非繆傳也然豈特鄉郡如此哉凡其平昔過化之地莫不尸而祝之惟近嵗以來郡中之祠亭俱燬奉嘗之禮寖滅廢缺今府公舉兹墜典與斯文有光較諸弔萇𢎞祭樂毅屈平田横諸先民者豈不韙歟是行也雖道路之人猶為興感矧學士大夫好古而尊賢者乎某于五月七月間有拙詩二首兹用録似盖以執事相知而不哂其迂相契而不責其僣必能倡率鼔舞賜之述作若郡博士先生及周儲二妙見之亦必翕然揄揚以崇先哲縣學諸名勝聞之又安得不從而作興耶展墓之行想能有日而某又當持一盃以陪沃酹區區别有僣言庶得面盡矣不宣上武進樊大尹請置先賢祠書某嘗聞古者祭鄉先生于社盖祭社以功而鄉先生以徳而預享焉崇徳報功其義一也近世祠鄉賢于學宫是亦附祭于社之遺意其禮可不事歟姑以武進言之若我胡文恭公張文清公鄒忠公霍状元乃所謂鄉先生之表表者前知縣江右董公繕修黌舍嘗置祠文廟儀門之左欲于此祠而奉祀之以秩滿而去遂成曠典今明府視政以來闔邑之事大小畢舉特此一端偶未之及然而事雖至微實繫風化如䝉即此祠宇修設供具崇奉先哲尸而祝之使邑人知所向慕必有過祠下而嘉歎之者曰今之山川猶古山川也今之學校亦古學校也士生斯邑茍能如前人之賢為世師表亦得享無窮之祀矣由是而感發興起奮厲激昻風聲氣習渾然俱化又安知不有胡張鄒霍之賢相繼而出耶愚所謂事雖至微而係于風化者此也惟明府不以老生之言為迂而以國家之風化為重舉此盛事以厲風俗斯文幸甚鄉邑幸甚答崑山袁子英書七月望正鬱鬱苦熱忽承六月廿四日書及聮篇佳作逐一披玩快然如清風入懷加以金井水灑靣醴泉甘露之沃烟火肺腸也繼即付小兒林逹張溝而近林自郡庠來歸云學中諸士友仝觀蚶杯之詩不勝稱羡想希尹得之玩味賞識其快意無異于老夫也某白首歸里故舊淪没惟希尹相知為深若思賢録一見即欣然助楮板百片且將率好事者刻之想執事聞之亦以為喜故用語及區區又有一事不避譏笑専此干托學子王著欲以龜巢稿鋟梓因摘數十篇與之名曰摘稿愚意亂道雖多不能盡出醜耳然必大手筆如提學平齋余先生者畧為序引若右軍為蕺山老嫗書扇則非惟價重當時而名亦為之不冺惟執事玉成之某扵此先生固未嘗有半面之雅去年冬嘗䝉惠詩以光衰朽乃執事過愛其亦從而愛之今之求文諒執事一語之賜必可得矣他日當耑馳瓣香因徐見孟以鳴謝悃餘有干凟别楮具陳鈞乞留意朝暮間拱候報音辰下雨凉伏惟講貫之暇多有著述示教一二尤妙東望玉峯無任馳想與賈教授書昔郡庠祠道鄉鄒先生祀享而學官復有墓祭由宋及元未嘗廢弛今我郡博士未䝉舉行盖兵革之後學校方興前此或未之聞也區區老生用敢饒舌幸勿以人廢言與周儲兩助教議之特賜修舉則某亦當採薇横山挹泉龍井挾憊駿奔以從諸公之後矣兹有口占并以思賢録送上惟講貫之暇電目一覽必有佳作如前軰發先哲之餘光也曕奉在邇書不盡言臨楮馳系不宣與鄉友鄒鈞顯論合祀忠公書嘗聞盱江李太伯之没家無子孫其鄉邑學校𦵏而祠之祭掃不缺也栁耆卿客死襄陽羣妓合金而𦵏每春上塜謂弔栁七至今以為美談吁以太伯視吾鄉先生鄒忠公之賢有間矣况耆卿乎夫忠公程門傳道為一代名臣且嘗以義文周孔之易論孟之書發明妙理埀教百世郡有祠墓幾三百年不幸因元延祐以來有非其種而為似續佳城毁裂殆盡繼以陵谷變遷蕩然無遺去年冬頼有賢郡守率僚屬墓祭碑之仆者植之樵而牧者禁之庶亦無愧太伯之郡邑矣苐吾黨服儒衣冠未嘗持一觴以澆墳上之土視曩之舞裙歌扇者反不及之區區老生感今懷昔可不告諸文獻故家乎惟執事乃故家之傑出者也顧某嘗以忠公之盛徳大業洎諸賢士大夫紀述之辭録為一帙名思賢茍能板刻而傳使觀者知忠公之賢如此則其髙山景行之思駿奔豆籩之敬自有不能已者景鄒有亭顯忠有菴皆無異于古人矣夫如是則斯文之光鄉土之榮風俗之厚且美為何如哉昔人有言曰存則人亡則書盖書存則其人之亡猶不亡也耶與詹伯逺書前兩年宜興許主簿六月送炭盖其知范叔之寒豫為之計今足下于此月惠布葢與許公之心同乎一誠也老夫雖嘗以小詩謝之今衰懶不能措一詞然此心感荷實不能忘知己者必以情恕非簡慢也近得江陰張希尹都事夢屋篇謹用緘去此老語不過諛而意有抑揚足下宜識之餘人所作尚未到手惟可賢父子佳章毋吝見示老夫自月旦到陳館代子訓䝉稍暇則以古今名人之詩長歌短咏自以為樂殆猶曽晳之嗜羊棗也可笑可笑秋辰下暑而凉惟樂嵗優游安享清福為慰與李石泉書某寓此寂寞濱日以吟嘯自娯過客多望望而去有如一泉近仁至則閒坐片時語及吟事者盖絶無而僅有也所需拙作令學子録去諸人視之必有笑吾軰所好如栁下之鍛何足樂哉然自得之樂難以語人亦不必强與之語也秋凉過此必留一宿然庶得清風明月之夜傾倒所懷耳聞以一泉為字乆矣近獲晤語言乃改為石泉又欲以固本為字石泉則為道號矣某因足下去速不細論想所以欲改者必有人謂一泉二字竒崛且無出處是大不然夫一泉者謂一胍之泉自原而出非溢美之詞也若僣尤古人之九淵及世俗所矜玉泉之類却當改之兄道號冝在晚年隨所寓而稱之不必拘拘于名字之義囘示雅意當為作字説矣餘文縷述不宣答袁子英書秋間領教帖及發至余先生序文此盖以執事過情之譽致䝉褒拂如此兒軰得之即鋟諸梓老夫感銘于心豈忘所自哉今拙詩二首其一寫懷仰之情一以謝余提學并寄陽羡茶一裹惠山泉兩罌區區微忱煩為轉逹所諭毁范蠡祠不審果否抄示之文又不知前軰遺稿耶今人所著耶毁祠于某年月某人言之某官行之耶欲得其詳傳之郡邑使在位君子有倣傚者是亦遵令典正風俗之一端也某因兒子木入杭代渠訓䝉陳氏閱三四月漁樵唱和無足舉似近作辨訛數十語將與舘人行當録去請教某詞冗長以其欲揭之樷祠諭彼愚俗不得不然所愧不能言簡意明如古作者欲再得木居士等一二事引用其間惟執事多識前言敢求批示某以兩目昏盲不克詣座下細論徒増馳慕而已余先生洎諸名勝同此請益即日祁寒切兾安居養恬以壽斯文答惠子及送泉書一别兩年將謂假舘華莊優㳺蔗境未聞移席縣庠也故昨于學齋書中有失問訊兹承賜詩與惠山泉偕至不勝感激遂即刻奉和以抒謝忱曰龍山只在片雲間不到山中四十年多謝故人知渴想瓦瓶封寄煮茶泉笑笑學齋回更煩尋水符之盟毋使山靈笑人寂寂也竹山詞乆為烏有弗克奉命歲晏末由晤言惟善保為斯文壽與曹師禹書昨詣魁塾值入城未囘絳帳之下衿佩仍集賢主翁代鳴教鐸清風穆如歆羡而退老夫藏穴如龜然亦有時蹣跚于西枝之西東洲之東如曳尾泥塗者近聞里中有孝感事心甚喜之作小傳為記其實片楮録上敢望實翁徳和諸名勝交相潤飾賜之咏歌庶幾觀民風者採摭亦可為聲教之助云爾與永慶雪心長老書比承裹茗過寂寞濱誾誾話言殊可人意且䝉以清節處士徵余文義不容辭然别後思之似難以畫竹之美遽用為號嘗觀古之人以號著稱者多矣姑舉其一二言之晉之陶淵明門栽五栁因自謂五栁先生世以其不事二君乃以靖節處士稱之非自號也陶𢎞景掛冠神武門歸隱華陽洞人稱華陽隠君後賜號華陽真逸唐之張志和待詔翰林以母没不仕居江湖間稱烟波釣徒後賜號曰𤣥真子亦非自美也白樂天平生顯宦晚年放意詩酒號醉吟先生及與香山僧滿等結社稱香山居士而已宋徽宗以徐仲車不仕為孝木有連理甘露屢降諡節孝處士歐陽以劉凝之棄官歸匡廬作詩贈之有曰丈夫壯節似君少其後朱晦菴為作祠亭匾曰壯節皆非架空立説也由是觀之曰清曰節詎宜自稱在他人亦不宜過情而譽之今王處士之家或有清節可愛之竹以寓名稱或逃于逸與丹丘羽人為方外逰即以此意澹然為號豈不韙歟今畫者鞠躬問道于師之像寘諸巻首亦人所未曉也是皆待公與之定論批示詳悉方可措詞拙直之言必䝉領畧秋暑尚熾惟安稳為宗門自重稍凉造見以謝先施并盡所懷臨書不勝馳系答集講主書八月初承書及詩乃知仁祥二長者一在九京一居濠上前聞陶生之言皆謬也誦詩驚怛而嗟歎之迨今未已惟髙隱清修得大自在且與諸親友及宻邇者逰從如昨可敬可羡所諭聽雨篷海萍等作丁寧再四義不容辭但昏耄無人可語兹用稿呈煩為潤色庶不為二公之醬䝉耳兒子林去冬臈月赴新鄭縣不得奉命若海萍之詩必得釋門善知識以上乗宗㫖發揚方盡其妙非兒軰章句儒之所能也如老夫者亦臆度想像而已淞南小隠却易可作亦煩先得其詳方可着筆區區管見改日細論有恒公振諸吟伯求賦錢孝女詩煩介意取寄吕克明宅専望専望更兾以宗門自重不宣與林掌教論請建先賢祠書夫學校以明倫為本育才為務風化之所由出也如追慕前賢褒嘉忠孝節義等事樹之風聲使化行俗美則于學校之教豈小補哉汝今所職不可不知此為先務也吾聞新鄭為古名邑邑有東里子産故鄉宋歐陽文忠公之墓在焉此二賢者一為鄭之賢大夫事見春秋傳等書不毁鄉校已有大功于世教况其有君子之道乎其一以道徳文章為世師表力排異端羽翼名教配諸孟韓功亦懋矣凡過而知者當為起敬邑之人可無同鄉之愛乎汝今多幸奉天子之命領教兹邑訪求古蹟知有二賢理宜考諸簡册參之禮經告于當道請置祠學宫是亦古者祀鄉先生于社之遺意也釋菜之禮以誠以敬毋事繁文尤不宜用世俗楮鏹如賄賂然其祠堂供具亦從簡古毋事華飾所費之資當割俸與諸生及賢士大夫協力為之慎勿為邑氓之撓愚見如此未知諸名公以為何如與熊元脩書昨者不以衰朽自棄往訪故人滿擬細講道誼傾寫素懷奈何已眚之目加以暴疾不如所願臨行辱厚餽不能謝别䝉諭淫祀雖以懐古録進呈亦不能面議攘斥之竟悵然而歸連數日所患不痊暗室坐卧因思洪武初欽覩詔條斷除塑像今彼無知民不以顧元公忠藎為敬而以俗稱金家神之類羣然土偶玉石混淆非惟循蹈覆轍有負前人且違今代惟新之命宜于里中及守祠者示以禮法悉以屛除獨設木主題曰晉散騎常侍顧元公之神庶得上遵國典下息邪説豈不韙歟想先生以足疾所沮憤然于懷莫若告諸鱸鄉隠者等一鼓作氣仗大義而為之不啻如摧枯拉朽耳某實以衰病不前此舌尚存詎容泯黙先生與諸公必能矜察非徒為是嘐嘐然也乃事顛末具載周左丞記中請稽考事實合宜而行慎勿為狺狺吠雪者弛焉雲山相望顒俟報音夜來聽兒軰誦佳作于孝女之事議論抑揚詞意古淡非泛泛者可比小兒求引年詩尚希賜教鱸鄉諸吟友二詩兼得尤佳𤨏碎不及各書煩為引忱臨楮馳系不宣與呉中衡書别後第三日小兒以舟自無錫問津到令親蔣宅滿擬請判閫孺人與老妻兒婦軰少聚奈何如燕鴻相避悵然而歸然令岳母老安人在彼養疴賢夫婦必有候問之日望乗便過寂寥濵茶話以償所願鷗社翁所言淫祀愚意以執事寓居長洲難與里中等語鷗社軟脚疾雖厄健歩或可以今古理法告諸鱸鄉隠者從臾而為之則無以異乎老夫奔走先後也尊翁挽詞并舊文録上所領厚惠舉室知感同此申謝到千墩王有恒處更煩索引年集求諸公詩賤累老妻而下皆屬筆問貴眷起居并奉相過之約區區懇禱不宣與馬公振諸故人書比到千墩蒙綈袍戀戀日與周旋弔死問生悉如所願乆獲賛成思賢録事欣幸佩徳没齒不㤀但不得一登草堂連床夜話荷執事以目疾見憐弗責爾如仲昭甫孝義恭謹襟度恢宏雪篷叟敬老愛客挺㧞出羣其禮意皆溢乎欵接餽贈之外有可思而不可忘也南澗海萍二法師忘形而知心有恒濟民二契家愛敬而盡禮明善則篤親戚重師友才識兼進尤為可喜相見間煩一一道謝感意别後到陳溪信宿逢人説項無不歆羡思賢録命刋書者為之為無梨板未得速成想中秋前王猷訪戴之日書成則偕往晤言特未知病眼為何如耳執事詩已編録孝女詩于呉彦徳處取至但欠伯齡先生等作尚有望焉諸公賜引年詩多多益佳更煩發去中行兄處盖熊毛諸吟友欲作故也老夫重改去慈竹軒詩尚兾羣彦以郢斤交斵付明善入巻無致為大方笑仲安賢良彦清昆季同此致意不及另書答謝袁子英先生書惟中上人來承問念吾子早世以詞哀之以鷄酒祭之存殁知感即日暮春伏惟師弟風浴詠歸追踪古人賸有樂地老夫可仰而不可及也自去夏以來目昏則見人不能識認耳聾則低聲語言不聞齒髪皆脱落幾盡日食糜粥殘喘僅存然此心好古嗜學不减疇昔時令小孫軰近立侍側髙論原道西銘太極圖説等篇不㤀素志奈有時以目前平地風波為之憂恨不得與亡妻相從九原之為愈也謹此奉謝并述潦倒之状如前所云晤語無期切兾善保以享清福不宣與姜天定書前者得挽詩二首吾子𡨕𡨕中必知感髙義老夫亦知所學非舊阿蒙但不克一相見與細論不識近日為醫為儒専于何業少暇可過潞城與小孫仝到横山啜清茶説淡話就煩删擇舊稿類抄别帙盖年來兩目昏盲謄録者字多差誤得是正之庶免貽後人之笑耳有一舘地就議可否寒家雖遭兩䘮皆不用世俗所尚之禮足下之來無勞虛費夫貧者不以貨財為禮老者不以筋力為禮此古之通義也但近年朋友道喪不可不􅊰風俗甚薄宜敦勸之若吾友吳啟之父子王季髙叔姪令弟周輔等皆平昔有見識有議論者聞吾軰講古今必能輔相激勸以篤人倫以厚風俗曽子曰人之將死其言也善請誦此以速其行顧老夫衰頽不乆于世遲則不復論此古道矣良可惜也偶有謝新鄭張宰一詩録去過目觀其仗義如此薄俗之敦亦庶幾焉與袁耕學書比在崑山四十日凡新知舊交青目顧盼赤心解紛指迷途挽頽波者皆知所自也况飲食交載禮意俱隆老夫與子孫軰感銘心骨有難于筆舌盡者㑹間煩一一代謝六月朔到家布帆無恙但病目赤爛兩耳益聾殊覺厭世若友文齋匾煩先生為之俞孝女事政宜上旌善亭表著以遵令典以厚風俗其移文立傳事合詳明宜大手筆為之吾軰當從而賛美可也姓名年紀嵗月日時得批示一知尤妙即日暑雨希倍加珍攝為斯文壽與俞彦智書昨到崑山故舊中如畊學先生靈光巋然新相知者皆可人意惟執事削去邊幅能仗大義能勤小物能刻畫無鹽以衒其美老懷銘感之死奚㤀兒子及孫感亦如之兩文皆納上幸恕稽緩即日秋暑諒惟起居安適酒邉清興必多然狂客之號但當風流如賀季真以稱其名至若滑稽太過或笑中有刀以貽後患詩曰善戱謔兮不為虐兮聖人于三百篇中垂戒如此宜保察之老夫托愛厚饒舌再四盖區區如愛美玉恐汚于蠅聲發于心不忍緘黙幸毋責焉坡翁詩曽蒙許借望付至小孫軰一覽秋冬决當奉納臨書懇禱與海萍講主書崑山延福僧舍中兩獲晤語知平地風波所在有之逹人大觀必不芥蔕于靈臺也㑹後抵家不及言别想已還湓溪安穏清適老夫以思賢録刻完追感王仲昭處士獨成其美美不敢㤀今以此書一部送置靈几吾友士庸于宅務之餘不時誦讀以忠義視為規式黽勉以循蹈之則先尊深為象賢之喜也揚子曰希顔之人亦顔之徒惟講主誘掖奨勸以玊成之醉琴賢賔主續當印去懷哉昭甫無任悵惜與余茂本通政書昨到崑山得傾盖如故者數人而執事開誠心論古道片言隻字商畧可否其謙益有過人者逺大之噐豈易量哉况飲食餽遺禮意兼盡使老夫及兒輩感佩而歸未知所報嘗凂作亡子挽詩必蒙留意望付至以光泉壤區區贈無逸一詩煩為轉逹令親雪篷髙隣仲名㑹間呼賤名致謝即日秋暑更兾節哀慎重以終禮制臨書馳系與張子才書曩嵗承􅋈舟東郭知老夫坐分鷗沙賜以専席奈交臂而失候歸帆者兩三月而後已去年秋亡子辱諸公哀挽之詞小孫裒為一編名幽光録今年重九為予泣而誦之且曰公有一詩别紙見寄乃令再四髙誦使余泚䫙芒背想吾兒九原感作亦如是耳縁來詩初到之日病目昏盲致使明珠暗投不曽答片言以鳴謝臆殆若忘故人綈袍之髙誼其過奚文其過奚文自春以來衰耄愈加公聞之必哀矜而弗責也次韻一詩聊抒情愫并想像肥遯之樂而嘉之餘詩用以見老况如此惡薄俗如此之甚請與野居先生過目同發浩歎晤語無期東望不勝馳仰惟髙隠自重不宣與陳彦直書去冬見安道蒙玉成思賢録書板常恐如畚土為山功􅉻一簣死不瞑目今完矣印去一部以踐吾言候有暇日巖電一過則先賢忠孝之道足以私淑授兩令子亦可為進修之助焉聞尚絅諸友自有樂事不發去為醬瓿蒙也俟相見當盡所懷茲不一與王季髙書昔年蒙先尊延置西塾二十餘年敬為賓師愛同骨肉想足下能念其親必不忘其親之所敬愛者老夫之心實亦未嘗忘也聞令嗣聰明可教摘藳一本送去與之又一本送令姪孟凱之子此生曽從㳺資質亦甚可喜區區拙作譬若滄浪孺子之歌善聽者亦自有所得庶乎進學之助言耄而繁尚希採擇與曹徳聲書歸畊之文承命再四不容以言耄辭今腹稿初成令小孫録去若文意有疑似處脱畧處未愜雅意處無吝批示當更思之辭雖不工皆親家所吐之真情所處之實事無虗褒妄貶以累懿徳吁歸畊如此植業如此三親之樂又如此風聲氣習里俗可敦草茆之言庶亦無愧區區恃肝膽相照布此真情非足恭也又昨承手教并惠佳布足見崇重斯文之意本合拜嘉但忝在𤓰葛居常多蒙眷愛雖辭之感激如受之也改去拙作頗盡老懷尚恐有説未到處無吝喻及吾孫或有所見亦可説來老夫平昔不諱疾忌醫凡于朋友中商畧文字亦必忠告未嘗面是而心非也早晚相見當盡所懐即日寒煖不常切兾順時遵養以迓春禧與袁畊學書去年夏五客崑山以詩言懷辱先生與詞林八俊釋門二老𤣥都一髙士從而和之聨珠合璧皆歸錦囊且欣然欲為序文裒為一巻以飾衰朽自秋徂冬懸懸在望新正得幸耄老書聞别有髙興此詩巻豈置諸度外耶或有人作殷洪喬耶區區老癡望猶未已敢請滿其所望焉與髙彦述書往來之禮尚矣然事有不及又當以情恕之不拘拘繁文末節而求偹焉所為君子之交也且如昨者家下小孫歸妻相邀茶話值足下以令嗣姻期之廹不暇過訪若此真情吾何訝焉今老夫本天地間一無用人了無覊絆深欲去賀足下醮子奈手足俱瘡膝灣尤甚攣拳痛楚不能屈信及臂無空膚行坐皆不可得而難往矣足下亦必以真情恕之况山兒有出不克代行千萬莫遣人相招徒勞往返亦不勞饋餉如舍下以區區羮胾送人皆成臭腐空為具文耳老夫待瘡疾既愈必到宅住三兩日晝則同嬉市㕓夜則連床清話飲之食之無所不可吾知宅上乏僕無異寒家天道暄暖甚于前日幸勿勞心役人蹈吾覆轍也吾兒森揆時度物同吐肝膽如此惟足下聽之信之而為知心之親戚矣與辛彬甫書日者令似歸曽致書問并凂求諸公賦節婦詩想留意朝暮間専望寄示令似有老夫適永懷寺詩稿就煩抄至今緘去邵濟民𤓰隱詩此公為貴縣官醫必有行館敢勞一寄幸勿浮沉畊學先生暨陳朱伊呂諸賢良諒惟起居皆安文譽益振所求珠玉早賜壓巻區區嗜詩如嗜飲食幸毋哂焉臨書懇禱不宣與任義甫書人之所貴乎有子者生而事之死而𦵏之祭之先主制禮用是以長其恩愛其來尚矣但近代禮廢俗尚浮屠難于改易比聞主壻之䘮始欲茶毘是則釋氏之教也衆以為戾法而尼之其餘佛事初不相沮子乃屬纊未定而闔棺訃音裁行而發引銘旌不立三虞不祭一切䘮具皆謂無用是不畧遵古䘮禮也然大小佛事亦皆不作使其子將何以表孝思之情耶若夫靈帷題神主不稱厥考又何以致其子如在之誠耶死而有知不能無憾先王之禮未見其然釋氏之教恐亦不如是之謬也以禮論之莫若令外孫改題神主曰顯考某官之靈旁書曰孝子某奉祀如此則名正言順存殁皆無憾焉且如虞祭不設以所用之資作為佛事内以塞一家之責外以解衆口之嘲抑亦可以敦孝順厚風俗也老夫忝在𤓰葛愛如弟兄不避譴訶故用忠告惟伯大叔及諸親從長慫慂而為之與孫彦民書臈月既望兒軰在周石泉處持所贈節婦詩歸詩序中過辱愛敬謙卑之老與文焰俱髙不啻得驪頷之珍連城之璧也蒙索辨惑編并拙稿兹用納上譬若人有痼疾揭之大途尚希遇倉扁而為之藥石焉應芳就禀犬馬之年今九十有一矣去冬初度荷鄉中諸朋友贈言成軸如蒙大手筆刻畫無鹽粉飾衰朽得不以為蒿里之歌乎即日新春伏兾以道自娯為斯文壽不宣回黔陽簿長孫書别去將半年家中老幼俱安舊冬橘客口傳采石信知布㠶無恙為喜今皂𨽻二人至知汝到京來書取夏衣書册等物一一付去汝途中作詩固好但到任之後當以佐令丞治政為重以稱厥成有暇則以細玩律令參考經訓日夜究心决不可作詩作文有妨公務最要𦂳者正已以待吏毋致欺妄循禮以待同僚毋黨毋偏諸事勤謹庶不負朝廷付托之意平昔家訓更不縷述惟吾孫念之曽有二書正月半寄新河周元吉子去恐未到與陳徳廣書某早嵗失怙衰絰中蒙豸官品題光生腐草俛焉就學覬有少進奈駑鈍卒無所成無補于世于是掇拾古聖賢遺訓綴辨惑一編曩幸公為邑丞􅟅工板刻今増前元趙學士昞所著𦵏圖其説本乎周官義理昭著良可為法但欠知本官封謚乃有缺文欲得元史考究三四年來嘗于江隂無錫丹陽三縣學干借俱云無之干諸士夫相識者亦然愚恐溘先朝露貽誤後人用敢再凟望于宜興縣藏書之家特為轉借趙公本傳一抄明説老夫好古之癡如嗜土炭人所不堪自以為樂有能使之厭飲其為欣幸死而不㤀即日雨凉惟琴書自娯坐享清福臨書馳系答吕克明求序文書某奉白昔者左太冲賦三都𤣥晏先生序之張茂先見而美之然後傳寫者衆而紙價為之益髙至如陳師錫序歐史半山老人乃有糞穢佛首之譏吁序文之作可有可無此又不可不知也彬甫來以所著文册徵序余以目眚不能閱其文之美而賛一辭又以長孫有無妄之灾惡况滿前㒺克搆思初非搢紳見譏而固却也然余嘗聽人誦三教圖等篇善為抑揚可喜可喜今足下年妙如此敏學如此爨桐椽竹何患乎無賞識者乎區區耄言希恕察與張子才書前嵗和髙作甚媿稽緩相去逺相見難然相敬相愛之心如故即日秋髙想林居優㳺恬養清福某老状如糞土墻加之風雨頹在朝夕否則芝菌之出塵土或有日焉敢請與執事言之野居先生義人也人皆曰早歲有杜季良遺風非余所知予所見者戎馬搶攘中由錢塘來長洲以故人趙某舉家病疫親戚無過門者先生裹藥活其兄弟妻子凡五人又如起閒居余縣丞之痿救東滄賤工某姓名者如虺如瘵如卧莩而再生皆饋謝而不納至如儒貧緇衣黄冠之貧而清者亦如之呉之人多以是稱焉余乆欲野史作小傳以勵薄俗所謂糞土而出芝菌也煩執事以平昔所見所聞枚舉録示更煩詢訪諸士夫必廣有之區區失記趙俞等名氏質之野居可也遇便人過常郡寄至城中申明亭左劉文中家苐恐溘先朝露㒺克踐言尚希矜恕不宣與呉中衡書十月旦得手書并文知連年情况不如曩昔然天時人事易地皆然無可奈何所喜厥疾既瘳養生有術珍重以盡天年可也蒙諭墓銘古之人本無生前預作體制來意甚切交情至深雖盲聾齒痛舉身瘡瘍勉强腹稿寫去中間用朱筆批處令賢郎從實填寫令閣之賢已于中衡墓誌見之不必别作子祭父文古人别無之盖擗踊泣血之際何暇作文如發引等事只用祝板直述家禮有式可考不敢杜撰若伯叔父祭姪等類却有之幸勿見訝小孫垣今春軍役乃兄塏去秋死老夫曽有口號云云見存寡婦孤女六人幼男九嵗屋已賣田多荒吾兒見在横林橋南張家訓蒙托庇無事森因去年巡攔而貧餘無咎宅居何處土産何物有便人令去問安也賢郎名某字某年若干子女若干亦望見報兩家子孫三世之交亦古道子才賢良及諸故人子孫相見者皆呼賤名問訊區區不宣賀府學教授到任書某早嵗嘗聞之師曰凡府學官郡為士者當以師禮尊之是故聞先生到任㤀其雙目之盲兩舍之逺即扶憊往為斯文賀可嘉者謙光和氣待人接物至諸生則嚴條約以規之所謂道並行而不相悖也區區蒙禮意數載飲食過厚感不容勝其大可喜者親承聖天子以明倫育才之道諄諄乎命之増重斯文之恩至渥也别來三月逢人語之或曰常郡于八九十年之間屢經兵燹衣冠文物蕩然無遺欲其一鼓作氣變齊為魯不亦難乎是不然夫以教官重于朝則縫掖之士重于野况有賢太守承流宣化相與作興風動一邦化行一邑則犁鉏帶經者有之牛角挂書者有之負薪持竿而誦讀者有之正不待家喻户曉而使之然也一榜三魁將復見矣其文獻之光煥乎八統又豈止一郡而已哉某不揣愚陋嘗綴思賢辨惑二編兹用上逹或可為學校涓埃之助云言耄而繁切希矜恕不宣龜巢稿巻十一欽定四庫全書龜巢稿巻十二元謝應芳撰詞驀山溪遣悶至正丙申嵗作無端湯武弔伐功成了賺盡幾英雄動不動東征西討七篇書後强辨竟無人他兩箇至誠心到底無分曉髑髏滿地天也還知道誰解挽銀河教淨洗乾坤是好山妻笑我長夜飯牛歌這一曲少人聽徒自傷懷抱沁園春丁酉春寓堠錢氏寫懷冷笑班超要覔封矦棄了毛錐看今來古往虗名何用朝榮夕悴浮世堪悲老我衣冠傍人籬落頼有平生䥫硯隨西莊上對溪山如畫鷗鷺忘機相逢喜得新知更不用黄金鑄子期把胸中磊塊時時澆酒眼前光景處處題詩輕帽簮花柔茵藉艸時復尊前一笑嬉沉酣後任南山石爛東海塵飛滿庭芳玉雪梨渦錦雲桃扇紫簫雙鳯和鳴觥船初棹烟繞博山青最喜清和天氣緑隂静梅雨新晴髙齋裡馬融書帳風捲絳紗輕華年纔幾許培風健翮曽試修程偶歸來林下閒聽松聲笑道葵花似我芳心在向日長傾黄河水如今重看朝暮還清沁水曲四海烟塵一棹風波經行路難幸兒孫滿眼布帆無恙夫妻白首青鏡猶團笠澤西頭碧山東畔又與梅花共嵗寒新年好有茆柴村酒薺菜春盤傍人莫笑儒酸已爛熟思之不要官任伏波强健驅馳鞍馬磻溪遭遇棄擲漁竿霜滿朝靴雷鳴衙皷何似農家睡得安閑時裡喚山童把醆野老交懽自和雪壓新年花開想遲鶯來甚難喜盃有屠蘇春風灧灧盤餘苜蓿朝日團團六十年來尋常交際江海鷗盟總不寒移家處每渉園成趣居谷名盤忘情世味辛酸但吟得新詩勝得官儘教我低頭三間矮屋從他髙歩百尺危竿白首無成蒼生應笑不是當年老謝安琴書裏且消磨晚景受用清懽又和竹與梅花偃蹇氷霜堪稱二難我依梅傍竹借人茅舍唫風弄月坐箇蒲團梅様精神竹般標致遮莫清癯未是寒柴門外一湖春水似拍銀盤昔人恨橘多酸我只笑青松也拜官每醉時低唱滄浪一曲閒時髙卧紅日三竿兒軰前來老夫説與梅要新詩竹問安餘無事只麄茶淡飯儘有餘懽蘇武慢蘭雪衣衿芝雲冠佩咳唾動成珠玉芳草萋迷蓬萊杳𣺌皎皎白駒空谷濯髪滄洲怡顔芳樹樂甚優伶絲竹問天生湖海元龍豪氣肯令消縮君不見三陸聮芳三蘇接武聲動九重華屋天上碧桃日邉紅杏真足快人心目拂袖東膠出門西笑莫戀故園松菊看濁河流水重清齊唱太平遺曲滿江紅恠底春風要将我船兒畨覆行囊裡是群公相贈數篇珠玉江上青山吹欲倒湖中白浪髙如屋幸年來阮籍慣窮途無心哭歸去也缾無粟吟嘯處居無竹看造物怎生安頓老夫盤谷第四橋邉寒食夜水村相伴沙鷗宿問客懷都有幾多愁三千斛一剪梅一色蒼髯兩阿翁年也相同月也相同六年湖海共飄蓬烟也溟濛雨也溟濛移家今住葑門東朝也相從暮也相從何當歸隠舊山中桃也春風李也春風風入松寄朱原道為生日賀梅花折去一枝春人在太湖濵天生襟度容江海每開尊坐客如雲此日醉看蓬矢吾兒應吐華茵湖光山色淨無塵魚鳥揔情親姑蘇城上遥相望見湖山如見伊人緑髪年華全盛白眉聲譽方新又歲寒心事舊相知相别去年時如今重覩春風面比年時消瘦些兒天上玉堂何在人間金鼎頻移風塵不染素羅衣脉脉倚柴扉桃根桃葉争春媚儘教他濃抺胭脂老我揚州何遜隴頭誰為題詩金縷衣袁叔度新居卜宅椒園裡響丁丁風斤月斧杏梁飛起牕戸青紅烟樹緑焜燿碧山鄰里雞共犬也知輪美燕子飛來堂下舞似輕盈掌上人堪喜更可愛新桃李長洲水接松江水好秋風鱸魚蓴菜葑田菰米艷屋神仙羅綺楚舞呉歌娯晚景肉䑓盤春筍供甘㫖五馬貴未足擬}
