  - {type: variant, offset: 5375, length: 0, content: '', WYG: 古鼎歌并序中呉萬夀寺舊藏古銅鼎其欵識有云王在周康穆宫冊錫寰用作皇考鄭伯姬尊鼎大德中任陽謝氏嘗欲以重寳易之時住持㸃翁師不從後謝氏為構佛殿㸃遂以鼎荅之至正丙申謝遭兵鼎因失去甲辰夏四月愚隠智公乃得於軍人之手耆舊聚觀皆曰我山中舊物也既而出鼎見示且徴予詩以紀之碧雲師着金伽黎空王殿前龍象隨一夫長跪送古鼎狀若獻寳波斯兒羣緇來觀集丈室中有老僧前致詞云是山中舊時物立誦欵識能無遺惟有臣寰紀君賜用顯厥考鄭伯姬文詞詰屈錯盤誥字體隠伏蟠蛟螭蒼姬紀錄世屢改不知何代來於斯謝家寳樹易趙璧巨構賈與秦城齊鼎兮鼎兮什襲去歲踰數紀今來歸師聞此語重歎息兵火連年炎九域金鐘大鏞棄路旁總若沉沙銷折㦸珠還合浦獨無恙䕶持信有天龍力摩挲兩鉉濕煙霧錯落丹砂映金碧濁水摩尼五色兼出海珊瑚髙一尺嗚呼羲軒之鼎莫可求禹鼎亦已淪東周世所用者非爾儔或膨豕腹徒飽羞調羮爾無與覆餗爾不憂歸來兮歸來北山兮菟裘汾隂自有為時出切莫放光驚斗牛歲除前一日寓姑蘇與友人卞于珍守歲姑蘇城外小湖邉寂寞僧房借榻眠詩稿冩成丁夘集歴頭檢盡甲辰年中原喋血人争地南國啼飢水拍天起坐夜深如守歲屋山風雪灑寒氊}
