長房木榻管㓜安逍遥烏皮几神仙紫金丹時為療民瘼於親駐童顔葵心抱忠赤萊衣舞斕斑棲遲雲林下放浪湖海間訪舊過滆浦尋幽出呉闗退鷁翅方歛盟鷗心共閒樂哉壺中天虗白泰宇寛送董經歴奔喪歸太原清風蓮幙諸侯客白雪麻衣䘮母還扇枕未能償素志倚門無復見慈顔四千里外迢迢路一片雲邉莾莾山只恐鶴書催入覲又隨鵷鷺造朝班西宿丁堰贈江隂王主薄五月六月凉如秋昨夕今夕雨不休屋山雷撼黑風起漕渠水溢黄河流河濱之陶萬夫聚誰其董之暨陽簿􅅅墻祗見烏曹磚飲氷食蘗忘情苦老夫擊柝天未明隔水又聞搏埴聲扁舟興盡不往見惡詩聊冩來時情夏五之初偕江隂張希聲䓁過鄒忠公墓即事口占以寓感慨并用趣郡守張侯弔墓之行青山門外羊腸路走謁道鄉夫子墓向來滄海變桑田翁仲漂零竟何處麗牲之碑高十尺頺若銅駝卧荆棘牧童敲火未足悲正恐𤓰分搗衣石使君五馬來何時摩挲細㸔黄絹辭五丁一呼為扶起隴頭草木皆光輝予方與客酹清酤白鶴飛來作人語使君應表鄭公鄉専美那容孔文舉代簡張希尹余生寡諧俗老去得知己晤言固云晚莫逆良可喜聨翩諸侯客寂寞著書事夜分青藜火晝並烏皮几㡬回論班馬一笑觀亥豕煙雲揮灑外風月吟嘯裏蚶盃酌流霞獸爐􅅡沉水佳哉水調詞清我塵俗耳朱絃聽者稀白雪和能㡬别來懐合簪夢見承倒屣帷林大江邉瓢巷横山趾秋風落梧葉甘雨熟菰米相望不三舍相過堪一葦詩筒繼元白通家猶孔李况與阿戎談亦與諸任齒尚友古之人厥德薰晋鄙雨中懐任義甫十日秋霖未肯晴石尤風作虎嘷聲東門父老應相問何事龎公也入城蚶盃溝南老仙出杯孔竒酌言詢之杯從何來匪兕而觥匪玉而巵不琱不鎪不覆不欹謂為蚌耶鷸胡弗持謂為蛤邪爵奚爾為測海之蠡其殆庶㡬老仙笑言子宜背窺瓦壟之文微蚶而誰水族之秀實生天池昔逢羽人觀迺朶頥麯蘗為粮華陽同歸轉客我者廿年于兹如李白氏杯鸚杓鷀釃風酹月朝斯夕斯走亦何幸數從宴娯百憂俱忘是用作詩次韵管伯齡見寄笠澤臞儒比列仙菊潭秋水觧延年每懐逺送江頭别喜得安書鴈足傳赤米白塩瀕海地香橙紫蠏早霜天客來賸說幽居好日日題詩思湧泉二滄洲舊隠宅江東白首忘機似海翁金菊晚開香淡淡玉山孤立勢崇崇通家子弟連年别愛客情懐往日同歲晚欲尋安道去扁舟當趁落湖風又郇公五朶雲天風送來前憐我落巢兒覆盆重見天三復誦佳句一如飲甘泉金篦刮吾眼華津生我咽重念謝公險毛骨仍凛然金鑠雖被毁璧歸猶幸全兩鬢雪飄蕭雙袖風蹁蹮寒蛩語音喜秋花笑容妍荅詩報君知今年勝前年贈刋字闞士淵憶昔趙文敏公之冩天下碑鐫字獨稱茅紹之紹之之妙在何許八法靡有秋毫遺嗟哉文敏不同世抱藝如茅誰品第斬蛟橋下溪水清鐡筆淬來鋒甚銳篆𨽻真行章草書銀鈎鐡畫冩璠璵天然筋骨見顔桞假手補戈真是虞文章太守眼如電語重兼金數稱羡青年正可為時出山居聽泉何足戀羣公將勒燕然銘中郎要令傳石經老夫為伊雙眼青鐡筆于今錚有聲寄盧公武舍人投老鶴溪埀釣緡遥憐鳯池掌絲綸靴霜待漏朝㑹早墨雲染翰詞頭新石麟自是天上物金薤散作人間春尚須鼓吹振六籍蹴踏班馬追楊荀送同知陞遷安慶郡太守郡守坐分金斗月朝靴今滿玉階霜一襟耿耿留遺愛五馬霏霏被寵光官誥叠承恩渥重御屏新錄姓名香可憐八十龜巢老尚欲攀轅立道傍送史宗儒歸省親北風狼號霰撒菽洮湖白浪髙於屋㳺子扁舟歸省親行囊賸有新珠玉舟行到家除夕前髙堂守歲開長筵斑衣捧酒為親夀河清復見昇平年相門出相今非昔文彩風流還籍籍一賦可值千百斤貧似相如未岑寂窮居我亦四壁空吾兒經鋤瀼西東煩將此意問若翁名教之樂將毋同寄金華府尹經歴牧伯方宣化賓僚喜得仁幕中勞贊畫胸次有經綸􅇵郡征輸夥清朝紀律新轍魚須救涸尺蠖正求伸月湛雙溪水風生七邑春簿書雖雜遝矩矱自持循耿耿存虗室昭昭對大鈞宦成敢小怠德立豈無鄰逺别長相憶前言敢重陳葑菲如可采薑桂有餘辛白首龍鍾老滄洲寂寞濱歸鴻如可寄千里見慇慇送田副使父憂歸若人自是青雲器九萬扶揺尚埀翅髙秋沆瀣生碧霄搏入詩脾作清氣頻年坐此塵土塲纖埃不滓芙蓉裳豪吟接跡李太白桞金梨雪揚芬芳詩成落筆蛟蛇走多入雞林賈人手今朝送别毘陵城折盡西門道傍桞東風雨晴花錦香京華到時春正長上林一枝棲鳯凰鳯兮鳯兮鳴朝陽送張常州奉㫖入覲白髪田舍翁清曉何跚跚送侯赴朝覲扳轅吐哀丹去年榖半熟藜藿度歲寒春來理農務豈憚稼穡難采薪供陶冶四境空榛菅執柯渉重湖荆南斫青山非無犁鉏具靡暇􅅵畝間烏曹事未已綠野多荒閑願侯念氷兢為民徹天闗樵斧暫容息農畮力可殫民歌岐麥秀侯策五馬還古今兩張堪並載青史㸔送王起東御史丁憂起復赴京君親恩重生當報忠孝情移義與俱冠豸威名傳舊日攀龍寵渥拜新除玉堦雲集來儀鳯錫谷人稱返哺烏折盡驛橋飛絮桞親朋相送喜何如送陶孝思赴召夙學多才思崇文際盛時鶴書騰日下鵬奮出天池發軔青雲路承恩白玉墀泥塗龜曵乆阿閣鳯巢宜繩準持三尺絲毫畏四知佩韋遵古訓介石蹈良規比德雲輝草同誠向日葵往哉行所學動必慎其儀器作璠璵美文成黼黻竒遺芳留汗竹無負故人期張知府命子送祖考墓碑還鄉名門父子傳一經儼如韋相有𤣥成從親宦逰養親志念祖喜䝉封贈榮潛德幽光恐磨滅伐石南山鐫墓碣宋公文章踵韓桞史公清書追禇薛龜趺螭首重摩挲舟車載去勝槖駞四千里外薄炎海佳城埋玉山嵯峨墓前翁仲㸔石立面帶煙霞含喜色九原精魂斯焜煌百世雲礽益輝赫八月九月秋風清綵衣翩蹮趨鯉庭恱親細說鄉里情老夫亦來堂下聽和賈教授懐鄉試㸔一簣可為山千里程從跬歩間取印正須金斗大還家未入玉門闗泮芹過雨香堪摘壇杏無風意共閑我欲中秋聽琹去扁舟􅋈棹後河灣寄賈教授相期詣鄒墳祭掃題詩郡圃景鄒亭澆酒林莊下馬陵白草西風秋莾莾青山北郭路登登柱頭且㸔誰為鶴驥尾何慙我附蠅坐待秋凉行有日老夫扶憊策烏藤道郷祠堂詩送張縣丞道鄉祠前松柏蒼清氣凛然知㡬霜伏蒲一䟽吐肝膽汗竹千古傳芬芳此去長安日月近且喜髙秋風雨凉立朝願學子鄒子他年便作知恩堂題許别駕雪山圖南山雲起連北山樂天賦詩心共閒東山月出照赤壁子瞻倚歌情甚適今公畫圖誦雪峰託興應與雲月同璚林玉樹絶纎滓蓬婆城外山相侣羣邱角立白龍堆飢寒喜無桃與哀蹇驢滑澾山前去絶似㶚橋人覔句公餘展巻巖電流襟懐化作氷壺秋楊家氷山無足倚何如坐對兹山隠烏几同友人祭鄒墓各賦詩一首先生高塚麒麟卧令子峩冠獬廌威汚玉青蠅除穢跡銜書紫鳯賜恩輝八千里外甘泉竭三百年來世澤微㵼我一盃寒澗淥卧碑扶起立斜暉送楊通判知蘇州府延陵父老攀轅别呉郡兒童跨竹迎闕秩遷藩府重恩榮五湖秋水清堪比三壤遺風俗易成遥望虎丘山下月餘光還可到柴荆寄張熙載問疾溝南隠者敦同姓每說相知見肺肝名似項斯詩句好身如沈約帶圍寛一江雪浪潮平岸十日秋霖雨作寒珍重齋居足怡恱玉枝無汗竹平安和賈教授詠懐兩袖西風獨倚樓一天秋色斷虹收水村霜落紅于染山色煙嵐翠欲流眼底㸔來興廢事胸中銷盡古今愁莫嫌苜蓿盤無味喜有葡萄酒可篘重九次韵石潭無菊比南陽老我三千白髪長九日正須多買酒一錢何必用㸔囊自憐身健茱茰紫更喜盤餘苜蓿香早起東牕拄吟笏坐㸔紅日上扶桑又和寄秦宜中髙堂燕客似高陽醉筆題詩興味長戀戀多情舊紗帽滔滔無底老書囊銀瓶茰酒觥船滿玉杵橙虀蠏斗香應笑陶潛空抱菊西風繞屋呌枯桑贈辛林甫有客有客雙眼青婁江山水鍾其靈十年足不出户庭手披韋編不暫停案頭照盡練囊螢先天後天見日星百家喧囂無足聆九師亦以蠡測溟蓍策之妙窮杳㝠語人吉㓙影隨形滿庭書帶生香馨一簾秋色風泠泠去年抱琹來野亭古操為我作水伶吾方采樵如負苓相與􅇵談洗心經呼吸沆瀣食楚萍一掃世味羶與腥有時醉我蘆花汀客來買卦呼不醒惜哉孤鳯五色翎翩翾何日儀虞庭鳯兮鳯兮請試聽黄河水清三千齡龜巢稿巻五欽定四庫全書龜巢稿巻六元謝應芳撰記瑞竹軒記余辟地甫里與徑山夀上人為方外交一日過余曰今年春吾祖如山翁燕居之所挿竹為酴釄屏閲數日竹皆復活或者以瑞稱之故名其軒曰瑞竹敢請子為吾翁記之既而復延致竹所相與撫玩曰是竹也前為屏時屈其所天至是乃盡釋其縛屈者伸抑者揚拘者縱新者闕穉葉發乎蒼幹勁節之間生意藹如有不可得而閼者愚乃退而思之夫竹非蒲葦䓁易生之物可不根而植者今若此果何祥耶嘗聞往者㓂萊公挿竹而生世謂公忠義所感如山之竹亦必有所感而致然乎余來呉中聞翁有微德之事二焉屬歲飢饉里有窮乏則周之俗多􅈄畋忍物暴殄恒買而放斯二者固尋常有力之家能為之豈其一念之誠仁發于中黙契于天而獨有此休徴歟抑别有隂德人所不知歟誠如是則萊公之竹不能専美於昔矣雖然物之瑞未若人之瑞也嗣法之徒森如立竹有能虚心以受道秉節以植德清風孤標為上根器則其為瑞又豈此君可同日語吁人為物靈氣化尤速某即拭目以俟龜巢記至正丙申春余辟地滆上依舊識里翁劉氏家築室一區棲婦子差可容膝既而以龜巢顔之客或過余曰龜亦何嘗有巢哉予曰子不聞乎千歲之龜巢於蓮葉盖其以葉為巢初不費經營之力也顧予此室實類之僦地里翁地不論值假力鄰伍力不受傭鳩工材則有鄉邑諸友人相之故其室不勞而成今也閉門縮首帖然如藏六之龜蟄乎其間此龜巢之所以名也比数日來春和景明氛埃寢息四境之内桴鼓不驚田夫野老相與招致渉桑苧之園過桃李之蹊瓦盆濁醪歌舞酧酢逍遥徜徉又得如曵尾泥塗者此雖巢外之樂亦因巢而得也但不能嘘吸道引如龜永年茍於此偷生亂離免禍鋒鏑全要領以終其夀考志願足矣若夫明休咎斷吉㓙决大疑於國家浮洛出書為太平文明之瑞則同類之中自有偹四靈相斯世者區區巢居之樂與坎井醯瓮同乎一天不知大小之闕為何如客曰有是哉子之適意也而今而後吾亦欲從子之居以適其適可乎予曰可客喜而去予因次對客之語用為記龜巢後記是歲八月之初天兵自西州來者火四郊而食其人吾之龜巢與先舊宅俱燼矣予乃船妻子間行而東過横山竄無錫期月之間屢瀕於危當是時跧伏篷底屏息若支牀者然猶數數引頸回顧以戀其故土明年仲秋至婁江東近扵海潮風汐雨漂揺棲苴乆之遂舍之從人借屋而寓閲四年居凡五徙聞鄉邑無噍類以是同室之人幸若再生雖貧窶不以為苦且復以為樂也至吾之所樂則又以窮居無事得專心讀古聖賢書以廣其志仰天不愧俯地不怍廓如也然視此大塊吾生若浮與夫龜浮蓮葉者何異所至以龜巢名室雖偪仄心有餘裕盖不以棟宇為巢而以天地為巢也峻宇雕墻莫知其光蓽門圭竇莫知其陋但知此巢自開闢以來歴數千億載不壊吾與萬物同居其間正不必藩籬町畦以自局也以是而觀區區舊巢墮甑奚恤雖物之巢居者衆矣儗龜之巢先後固異龜則儗其靈耳若曰以靈自燋亦其用於世者然也世不我用吾生自全吁用不用全不全繫造物者處之如何非龜所能為也惟兩間之巢人莫能壊此吾心可恃而安者吾心既安何往不樂苐恐不知者謂無巢而有名疑為誕故重託毛頴氏告之雲半間記歲庚子月閠五西山師搆小閣於天慧莊而居之額曰雲半間盖取諸前軰詩中語也予時客天慧與師落成徘徊其上溪山煙樹四顧如畫人皆喜之愛之而師之所樂不在是也是屋僅一間而止髙不倍尋廣不踰丈無欂櫨栥梲之華自常人觀之井幹麗譙奚啻霄壤師獨處之裕如盖其前後左右牖户虗爽蒲圃木榻薰爐禪几之外無長物焉師於六時坐如泥塑諸弟子𤓰華之供日一二至談説有或從侍立客或至信信宿宿皆不能常與師共之惟英英之雲悠悠而來朝於斯夕於斯窮嵗月於斯一榻之外皆雲攸居言半間者亦謙辭耳夫雲之為物本來無心而吾師心無所住是亦無心人也以無心之人遇無心之物故不情而親不契而合乆之則雲忘其雲雲即我也我忘為我我即雲也吾視吾室亦不知其與天地相間孰為大孰為小也莊周云天下莫大乎秋毫之末而泰山為小其言殆庶幾乎雖然諸皆相忘吾師固知之乆矣然而猶自此室者抑亦云桑下一宿之意與予嘗以斯言質之師曰然遂為記歸耘軒記吾友徐君伯樞以兵後還無錫故里築室膠山署曰歸耘徴予文記之予嘗質之曰而翁太中公為時名卿今逝矣州大夫亷君之才能也其家方薦之省府將上聞以官之而暇耘其田乎伯樞笑而不荅予退而思之君名父之子自蚤歲淑諸師友菑畬經訓埀二十年今以先世負郭之田莾為荆榛固不可不畊且耘也然亦奚忍舉此而廢彼耶必也帶經犁鉏斯可矣古之人若耕莘者樂堯舜之道耕南陽者有梁父之吟故一旦以三聘三顧之而起非惟澤溉生民功施社稷尡耀當世而伊訓諸篇出師兩表至今與日月争光是豈専于農者能之乎雖然耘田之事亦有治道存焉敢請與伯樞論之五榖猶良民也稂莠之屬猶㓙頑也草生而不耘則榖不榖矣芸之早則用力寡而功多小緩則小害大緩則大害既害而耘或百倍其力而不盡雖去之而榖已疾其害矣吁草害于榖治田者道也凶頑之害良民治人者可逃其責乎惟沮溺荷篠之流潔身亂倫者不足以語此伯樞宜留意焉樞聞乃起而謝曰是吾志也請書之用誌於壁庶他日知所警云東郭草堂記至正乙巳春友人徐君仲剛書來曰瑗性迂拙分甘退藏擇無錫東郊荒僻之地作草堂居之讀書灌園蝸休蟻適自謂有可樂者子知我其能為我記之乎予惟仲剛卓犖之士也譬之楩柟豫章不巨室棟柱則山林而已比嘗佐令慈溪方欲抉吏弊更苛政以仁其民一旦以當路掣肘棄若敝屣翻然來歸客呉下數年不入城府其抱負為何如哉兹草堂居寛閑之野前有鵝津可釣可㳺鴻山宛山屏列左右東膠西堠紫翠相接又皆牕戸間天然圖畫也仲剛入則與書中聖賢相對出則與里中農圃為伍親友時至忘形爾汝腰不為督郵而折膝不為汾陽而屈適興賦詩往往有太白豪放所謂有可樂者其以是與雖然昔諸葛孔明居南陽亦蕭然草廬而已及乎以三顧而出入陣有圖出師有表而勲業焯焯如是静學之功信不誣矣荒僻之居又安知非天假為學之地乎愚請以規仲剛并記斯堂之歲月云野人居記余聞之易其地則齊楚異音同其居則蘭鮑俱化大哉居乎故君子必慎其擇也予友呉中行今乃去朝市逺城郭挈家淞江之濱桑麻之野蕭然一室名野人居是果奚擇而取哉昔中行以劍術㳺諸侯借箸之籌幕中之辨嘗見用於當世豪傑矣未㡬以時之不利投簪來歸回視淮隂狗烹之歎華亭鶴唳之悲銅山餓死之辱金塢燃臍之禍未嘗不愴然于懐其言曰窮居之安不愈於負且乘乎蔬食之樂不優於覆公餗乎由是縮首閉門百念灰冷獨研精古聖賢醫藥之書以事其親以濟夫人暇日則携杖屨往來溪山間與嵒穴吟嘯者㳺耕簔釣笠交亦無間情真而不邉幅語朴而無貝錦滄洲濯足或坐終日茅檐炙背或談千古桃花流水之外杳不知其孰為秦而孰為晉也但知譚泉飲菊可以永其親之年江鮮膾鱸可以美其親之饍𤓰疇芋區芝田藥圃皆其地所有而名都大邑之所無也若中行可謂善擇其居矣予與中行有通家之好一日携兒子林過之用是為乃翁夀中行嘉予言請以為記因命林執筆以書其居之壁云雪洲記趙君執中蘇人也家笠澤之隂與天隨子故里相望澱湖直其東陳湖横其西其墟落乃一洲渚耳君性喜雪凡歲寒雪作之日天地六合炯如氷壺三江五湖如璚匜玉杯而山林皆瑶草琪樹也然陽精掩耀湯泉欲氷歌黄竹而悲者在在有之時君獨傲兀吟笑于滄洲之上或終日竟夕而忘歸焉盖一時清氣與虚室之白洞然無間故自謂平生慶快無踰此時乃即其所居之處所樂之事自號為雪洲也予嘗於夏日過之階庭之間竹有蒼雪明牕素几寂無纎塵而大篇短章又皆與氷柱雪車同一光潔且曰桞雪之春蘆雪之秋亦猶見似人而喜予於是知雪洲之樂盖無時而不自得也或曰以君之才宜其從名王逰兎園而其遇出竒謀平蔡州而樂其成功窮居野處何足快哉吁昔子程子論顔子之樂非樂簞瓢陋巷也君之雪洲亦類是歟但區區言耄不能揄揚姑述其槩并以觧或人之嘲如此云竹梧書房記洪武辛亥予去家十有八年而歸儒紳故交多無噍類獨友人秦公宜仲主貴池縣簿告老于家予首訪之與客偕往公所居環堵之外皆焦􅇕灌莾乃題其室曰竹梧書房客因訝而問焉予曰嘻我知之矣公之先君子以多資𢎞第宅儲書數千巻自蚤歲教公為舉子業公研精伏生所傳之書旁通百家文譽日著時子山陳先生未魁天下與公為忘年交嘗與予過之其階庭之間巨竹數百雙梧玉立綠隂蒼雪清氣襲人而公之風神蕭灑殆若與竹梧俱化子山嘉之故有是篇夫髙垣大宅今瓦礫也碧梧翠竹今枳棘也埀籖挿架之帙不為刼灰則市肆之醬䝉矣惟腹笥之書幸而無恙故嘗為郡博士以教其邦又推其緒餘佐治巖邑以嘉恵其黎首今老矣尚能鳴待問之鐘以接逺方朋來之士為文章則駸駸乎周誥殷盤而不聱牙也扁乃舊名葢不忘父兄師友淵源之懿耳客既釋然公亦頷首出縑素請筆前語以告後之不吾知者并以示諸子若孫庶箕裘其業云是冬月建子日㡬望余則龜巢老人謝某也映雪齋記毗陵何士信起家業儒儲書數百帙研精誦讀晝夜不息榜其室曰映雪齋葢慕孫康氏之苦學焉夫以士信之家居市㕓足資用焚膏繼晷乃所優為齋居豈虛名哉其心必曰我自短檠猶雪之明我室棐几猶雪之瑩我讀我書夜氣以澄微言妙理披雪覩星顧我靈臺皦皦乎不雪而白不氷而清唾視籝金珍惜分隂曾不知九逵塵土之蓬勃四時寒燠之變更然則映雪二字又何異湯盤九字之銘歟彼㶚橋詩人梁園賦客有不可與同日語者惟篤志之士如㳺如楊立雪於當代程夫子之門者聞之必予其進矣士信謁予文請以是勵之蘿屋記毗陵郡城之西南距滆湖廿有餘里湖水支流北抵城而滙其地有髙原平林風篁煙樹景物瀟灑友人詹伯逺居之茨宇一區牽蘿補葺匾曰蘿屋名固不虛盖亦以昭其儉耳然庭户閴如日必灑掃木榻棐几瑩無纎塵平居則肅然孤立以孔孟之書教孫共讀異端邪說絶口不談彼流俗相煽而炫惑者弗接勝友時至尊爼欵洽或相與論端人貞士氣義風節終日竟夕亹亹不厭予嘗過而問曰子豈掃除一室之小丈夫乎伯逺笑而不荅予曰噫我知之矣伯逺通古今明物理眎昔人之銅山金塢皆禍基也峻宇雕墻匪安宅矣盖其所喜者桑樞甕牖之美而所樂者簞瓢陋巷之天儼然為草廬布衣而耕南陽之田者其出處豈易與人言哉雖使得志其不為堂堂九仭也必矣善觀人者毋以蘿屋之儉而陋諸洪武十有二年歲在己未四月之吉謝某記菊軒記古者逹觀之士寓物適意初未甞肆意於外物也若莊周觀魚支遁觀馬阮孚自䗶之屐嵇康栁下之鍜與夫愛竹愛松愛諸花卉者大率皆適意而已近世流俗以淵明愛菊亦從而愛之所植或百數十株髙及尋仞花大如杯假以花師接養之工移易種類使坤裳正色亦多變而失真其嬌紅韻白紫茜紺碧之屬愈出愈竒且復以西子玉環等人物之名名之是則誇多鬬美肆意以極玩好之娯視淵明奚翅霄壤夫東籬之菊猶西山之薇薄言采之可以樂饑若乃賦離騷而飡落英者其庶幾乎寒圃晚香樂則樂矣然其趣有不可同日語者吁流俗之謬如前所云豈不大可笑乎吾友王夀翁以菊軒徵予文予恐其翫好之意淪於汙俗兩年不為措一辭今乃不然翁春秋七十有三凡早歳華靡之習皆已絶去軒墀蓻菊僅一二本其言曰吾所以愛此者嘉其當草木變衰之候霜瓣露葉澹然幽芬挺挺特立久而不墜殆與晚年矍鑠者黙有契焉故朝斯夕斯逍遥相羊或開牕坐宴或置酒速客終日相對不厭不倦雖髙風雅致不敢妄擬於陶其適意之樂亦無官之韓魏公也咄彼庸儒朋滛可憎安得疾惡如諸伯厚者相與御剛風摶沆瀣周流八極為兹花一洗汚衊之辱過翁幽軒呼酒髙酌咏柴桑之詩歌離騷之章盡醉以適翁之適而吾亦得以適其適也矢心陳詞用誌軒壁為後㑹張本云斗室記自標枝巢穴之世逺宫室之制日新月盛世祿之家第有甲乙馴致習俗之侈而堂髙數仭墻屋錦繡者比比矣若夫屈身矮屋之士往往以力所不足不能有為其志未嘗不澹然也惟吾可積則不然可積以呉越錢氏之裔贅延安唐侯之家往來雲間築室采邑鳯山屏其前淞水襟帶其左右屋裁三楹髙不過尋丈而延袤深廣如之匾曰斗室時僑寓以居宴如也夫以婦家封侯之貴采邑之富雖連雲别闕咄嗟可成今若此亦可謂不滛於冨貴者歟吾將以其細行觀之屢歲過鄉里視故舊親戚謙謙乎抑抑乎執子弟禮不異童丱之日無一毫驕矜放肆以加於人故咸謂有先君子好禮之遺風焉然則斗室之儉本乎天性非矯飾一時以要虛譽而為之也昔衛公子荆善居室完曰苟完美曰茍美故孔子稱之若可積之儉而約於衛荆其庻㡬乎吾用是以稱可積延安家法之足稱亦可見矣是為記思齋記膠東賈文學鈞慶典教毘陵郡以燕處之堂榜曰思齋徴予文記之且言曰某所謂思者非謂能三思而行亦非敢以九思之訓待旦之意示警如書紳也思吾親於疇昔䘮亂之秋相繼即世母蕞昌邑父堲萊縣㡬致蕪沒幸而茅㓂殄滅歸室祖塋大明開天㧞擢寒畯代畊有祿而養弗及親矣風木之憾十有餘年去鄉土㡬千餘里霜露降濡悲感交集念欲灑飯松邱使吾親不為若敖之鬼棲息桑梓以終餘年此朝夕耿耿於懐也予曰嘻㳺子悲故鄉信矣况思親乎然君子之思其親者豈止是哉烏雛返哺豺獺報本特一事耳必也出言舉足動合矩度不忘其親詩禮之訓聽于無聲思無邪以正其心儼若思以敬其遺體由是而推其緒餘以淑諸人以施諸行事忠君報國流芳汗青以顯榮其親夫然後息負荷之肩觧組綬之縛訪親戚省墳墓某水某邱凡吾親所釣㳺處吾得釣而㳺焉鶡冠鳩杖抱子弄孫以安享太平田埜之樂則今日之所思者豈不熊魚兼得乎區區耄言筆識齋壁庶或紓其懐抱云白雲亭記東漢趙邠卿夀藏之作吾意其渉艱危將以得全歸為喜故耳至唐司空表聖乃預為壙槨時與客觴咏其中又作休休亭以寓超然物外之意史稱曠逹不誣矣今吾反唐公均舉由末致仕佚老於家洪武革命䝉天憗遺以弓裘無嗣業者命其兄之子某允明為後家事鉅細悉付托之即在家為有髪僧㕘釋門諸老以學其學春秋八十有九號曰白雲翁距舍南百餘歩迺為佳城傍結茅龕晝夜禪寐允明則日候起居奉甘軟如事所生且能承順其志築亭于前復鑿池以藝蓮芡之屬幽花秀竹與冢上之木參錯相映每邀致親之所愛盍簪于亭薫爐茗椀相樂也且曰某負米四方往往望白雲思親有如昔人之言者雖歸侍旁雲常在目請先生為我記之時坐客有辯之者曰吾聞藥山禪師以雪之在天為西來祖意今雲翁禪眼之明必有契乎禪悟之語非允明名亭之意亦非儒紳先生所知也予曰不然夫英英之雲一也其觀感各有不同雲翁身如雲浮太空貎焉斯須猶瞿曇氏電露之諭也若夫允明望親舍之雲而懸懸者是則以梁公之心為心家居以壟雲自怡庸詎知非華陽真逸之心乎吁仁見謂仁知見謂知予所知者此理而已禪則吾不知也客笑而不言予曰如何翁曰佳允明曰唯唯是為記養正齋記徃余客東吳十有餘年聞儒林月旦以琴川髙彦和氏稱為儒士聲甚藉藉予雖未相識而相慕焉洪武辛酉秋友人楊純夫尤稱譽之且言彦和以養正名齋葢取䝉卦之辭猥徴予言屢辭弗獲予曰大哉易也豈敢以管窺之見以贅疣乎請以古之善養正者為彦和誦之如孟母三遷使其子去丘墓市㕓為不逰之地習禮容籩豆于嬉戲之間如室於蘭乆而俱化厥後以寡欲養心以直養氣傳正學而接跡于子思辟異端而竝功于禹是母是子非善養者能如是乎衛武公行年九十有五懿戒之作既自箴警且求卿大夫官師之屬交相教戒瞽矇誦讚朝夕弗違言行之純罔有圭玷亦豈非善養者乎是故一為亞聖一為睿聖易之所謂聖功者不誣矣吁人生天地間所受之性本無邪僻惟其情竇既開牽於物欲日浸月漬或正或否遂乃有君子小人之分茍得其養則如木從繩其正若自然矣今彦和之為端士也䝉養之功不言可知繼自今以來學與日積道隨年長佩服乎七篇之書􅆂養乎大雅之章毋曲學毋枉道毋有獲而詭偽慎終如始益進益修如此則希孟而孟希武而武何止如旦評而已哉區區言耄而瞽幸純夫為我謝之重建雲居菴記洪武十有六年春雲居主僧德傳過予曰宋咸淳間四世祖諱行興號祖庭來自天目山駐錫爵林露坐說法風動一方緇素與檀施坌集遂結菴以處之名曰雲居由宋而元祖年九十有二終于至正乙酉其嗣法弟子曰慧滿繼之四年而沒曰道印以甲乙傳及元末菴燬於兵慧滿避兵他適不知所之而德傳念祖師過化之地義不忍捨去大明更化初頼吾佛之道與時偕行于是剪荆榛畚瓦礫復經始營之距爵林百餘歩得里人湯逹卿故基以廣其居今茍完矣請先生之筆以識之前此予嘗過横山之隂憇足于菴觀夫所築之室凡二十餘楹堂有佛像設供具鐘磬列焉僧有室經案禪榻香燈備焉餘如齋厨井湢之屬罔有不備其地近山而爽塏逺城郭而幽閴晨嵐夕霏空翠灑牕户間無囂塵市聲滓人耳目傳公日掩闗趺坐泊如也吁是雖蕞爾一區如把茅葢頭然視佛之所謂桑下一宿者亦已多矣彼名山巨刹膏腴以千萬計尸素之士或不能及若傳公者服勤如此肯搆如此繩祖武而繼之人如此豈非浮圖氏子孫之象賢者歟予故聽其所謂并以目見之實三嘆而書之是歲夏六月之望同郡龜巢老人謝某撰歸耕記予老廢筆耕授之子子以拙辭躬稼又弗克服勤方諄諄然朂之以周公無逸之訓潞城曹德聲書來曰震往者避兵東呉顚沛萬狀還鄉以來田舍粗葺歸耕二字掲諸座隅示不忘也惟巢翁姻婭而相知敢請識其顚末以埀警其後人予曰嘻前元時德聲曽大父為晋陵閭石大父起家登仕版歴官至東平路同知殁數年而德聲失怙丁時多艱家用蕩析蔑有能相顧者藐焉依母氏笠澤之濱狼􅈣滿眼矢石塞路窮途之困甚于蒺藜杳不知先業失墜為何如也大明更化初竭蹶而趨偕女弟之家還故里荷蓑笠操耒耜薙荆棘之區犁之剷瓦礫之塲屋之載搆載穫粗理而恢拓之烝嘗之奉滫瀡之養征徭賦稅之所需罔有不給且能割膏腴以寧二兄之歸斷鴈復得以成行逰魚不失其同隊東阡西陌雞鳴狗吠桑梓敬共是如其素願也然則患難之餘歸耕有如此者豈易得哉若曰其歸也非衣錦之榮休官之適其耕也非能以堯舜之道樂于畎畝此盖以前賢論之衆人可同日語乎如德聲者先世之業失而復得骨肉之親散而復聚况時和歲豐率土寧謐凡我同類皆得耕田鑿井驩然為太平之民其樂雖異于古人未為無所樂也吁以其艱難勤苦十有餘年而後得此後之人或罔有攸知寧無怠荒乎此記之所以作也顧予年耄請復以語吾兒者語之夫周公聖人也無逸一書為世龜鑑茍知之則當尊其所聞俛焉孜孜以述纘承其先緒詩曰子子孫孫弗替引之吾於此亦云書屋記洪武壬戌秋崑山故交辛斌甫過龜巢為其友蔣生秉彛請書屋記且曰生自齠齔時嗜學雖祁寒大暑矻矻不少廢年十五父命學吏事閲數月不懌而歸既而令服賈走淮浙南北數千里亦常以簡冊自隨少暇輒誦讀之竟不屑罔市利以肥其家遂令力穡為仰事俯育計秉彛廼從親之令臺笠緇撮以事其事三餘之日愈進厥功老夫以未嘗靣其人目其居難乎架空鑿虚而為之文也明年夏五予舟過婁江斌甫與生郊迓而過之所謂書屋者初無埀籖萬軸也亦非連雲大宅四書六經外諸古圗史與陶𢎞毛頴列乎其間與之語燦然有文意吾常林經鉏董君南之朝耕夜讀亦如是而已矣揚子曰晞驥之馬亦驥之乘使秉彛所造愈深進愈力則所就未易量也然則秉彛能承順其親且不卑屈其志謂非能子可乎所居在崑山城西九里橋之南其江山景物無闗於書屋者不書特以其心跡之實書之用為記時洪武十六年五月二十八日逸菴記夫人莫不欲四體之逸也惟君子則逸其心故嘗操而存之寡欲以養之秉彛之天一真無偽感而通之動㒺不吉周書曰作德心逸日休君子取之故能逸其心也今河南彭公伯常為武進令自號逸菴夫所謂逸者心逸之謂歟自常人言之州縣之職其勞甚矣顧兹巨邑事如絲棼雖戴星出入猶恐不迨可能逸乎予曰不然公以夙學老成之才為之征科撫字恩威並行雀角䑕牙曲直能辨如庖丁觧牛知其肯綮牛雖多而芒刄不頓也矧夫至公之心炯如秦鏡且不以塵土蔽妍􅑦所照隨物應之則是吾心之逸盖自若也雖在官舍視為逸菴不亦可乎一旦朝家以七十之年優容里居則吾心之逸與肢體之逸熊魚兼得矣雖然古之逸民若夷恵之儔髙風峻節為世師表吁吾知逸菴之逸必如是而後已焉持敬齋記前軰以齋居之名著稱者多矣其最著者曰誠齋簡齋容齋又有以先正箴銘而傳者曰敬齋求放心齋是也其後一變曰疏曰酸曰松雪者紛紛然人争效之齋之義逺矣今贛之聶伯䕫氏以持敬名齋需言于愚愚固辭不獲乃言曰聖人筆六經以詔萬世敬之一字層見叠出先儒詳之矣愚復何言竊觀所謂持者意在執持而用之人之持物猶吾之持敬也持物以手持敬以心茍不致謹則亦莫之能用也譬射者必謹于持弓而後不失其中御者必謹于執轡而後不失其馳又如執玉捧盈必洞洞屬屬然如弗勝如將失之然後能勝而弗失也伯䕫鄉逰成均持此敬以進德脩業故學優而仕宰髙平持此敬以治其民而民有去思焉邇來為諸侯幕賓翼翼乎以㕘贊承宣為務謹三尺御羣吏以涖四邑是皆持此敬以展其用歴兹以往百司皆然有官守則持此以共其職有言責則持此以盡其忠峩冠冕鳴佩玉鸞臺鳯閣簉羽鵷鷺無非持此心之敬而用之其用有不能盡者敬乎敬乎亦豈非一言而可以終身行之者乎夫如是則上不負天子下不負所學齋名著稱亦卓然如昔人矣雖然宦成而怠世固有之惟君子慎終如始有不為其怠者衛武公春秋九十有五官為周司徒方且再三以敬慎為詩日夜警戒故卒能為衛聖武公愚不敏敢請獻此詩為持敬慎終之助洪武十七年歲在甲子三月二十六日恬澹齋記為髙彦述作昔有與彥述同姓字君素者以頥軒請涪翁賦詩其畧曰辱莫辱多欲樂莫樂無求㫖哉斯言真可為恬澹齋座右銘也盖多欲則不能恬静必辱其身無求則澹泊自足樂於其心由是知孔顏之樂非樂乎飲水曲肱簞瓢陋巷而蔗境之佳可漸入而得矣夫彥述先君子以醫名家獨歩鄉國流風遺俗今豈無}
