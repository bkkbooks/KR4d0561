  - {type: variant, offset: 8256, length: 0, content: '', WYG: 露筋廟詩斷臂孤兒事可悲露筋娘子死尤竒裙裾不受紅塵汚膏血都充白鳥飢野燐照人魂斷處田家妻嫂睡濃時玉遺香骨天應惜鐡比真心世共知宿草埋煙迷古塚幽花泣雨倚叢祠碑存米老春秋筆詩有歐公絶妙詞尚待姓名傳國史更看旌表照門楣古今絶少青雲士却忍將身作夏姬祭顧玉山詩於乎玉山翁世居呉右族生逢元盛時當路屢推轂辭榮樂蕭散竟藴璞中玉早持萬金產轉手授家督不為五岳逰家園蒔花竹讀書數千巻旁覈聃與竺非無酒如澠過客佳乃肅徒見駟馬車未若一儒服緇黄璨然者待遇亦刮目常言性嗜詩趣味勝粱肉興來抉雲漢毫端注飛瀑詞林采英華琰刻播芬馥承平十三年嘯傲心自足世故一變更十室九顛覆幽棲綽山下擬比王官谷時余逃難來憔悴如病鵠相見恨殊晚姓名聞已熟夜飲佳樹軒明朝杯又續髙堂桂花秋金釵剪銀燭雙歌棹觥船洗我愁萬斛一留兩月餘坐客常五六寫圖紀觴詠墜水亦有曲連牀可詩齋清話屢同宿擇鄰移我家歲晚安且燠奈何鼙鼓聲忽若雷振屋婁人悉驚散我亦猿失木萍漂甫里東賣文如賣卜感翁數相過餽問慰窮蹙翁亦客檇李逺避蝮蛇毒山川鬰相望詩筒時往復陵谷復一變翁歸理松菊松菊理未能蒺藜俄困辱余舟傍笠澤訪舊宿西塾夜深屏輿𨽻促膝語心腹春風舊池舘荒煙秋草緑朝廷更化初召役事重穋挈家赴臨濠星言去程速送行愧鄒㳺口占謝龜縮詩去秋復春客來書滿幅念我及兒軰舉室䝉記錄自言多疾戾經年在牀褥欝攸屢驚嚇使我長觳觫尚須手顫定親禮寄篇牘安知厪踰月遽爾聞不禄初疑傳者訛細聞淚盈掬嗟我老異鄉知已失鮑叔蕪辭叙疇曩悲吟甚于哭神交死如生歆此盃中醁}
