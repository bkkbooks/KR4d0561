  - {type: variant, offset: 5024, length: 0, content: '', WYG: 闕右自述過吳江三高祠三高祠前秋水波客來弔古悲且歌季鷹魯望桑梓敬蠡也籩豆理則那生為越人身相越百計吞吳吳乃滅直憂烏喙將無情兎死狗烹肝腦裂飄然攜家湖海遊捧心人與同扁舟越人誇功鑄金像于吳孰曰非仇讎行裝重寶乆彌厚清高之風絶何有奉甞堪笑木腸兒忍覩荒臺麋鹿走江風蕭蕭楓葉寒扣舷折我青琅玕靈胥怒挾海潮起殷若雷鳴過雪灘寄偰知州兼簡蔡教授使君心似婁江水霜落秋高清復清田野但知耕穫喜閭閻不識呌囂聲背山舘舎雲連屋通海漕渠潮入城公退應㝷蔡文學投壺置酒適閑情病中夢徐伯樞戴時中見過既而伯樞惠詩次韻答之病來呼酒當神樓又得牽絲作釣鈎堪笑生為窮谷叟何妨死作醉鄉侯四壁西風茅屋冷一簾疎雨桂花秋山童浄掃門前路數日頻迎李郭舟中秋日觀朱明道自壽之詩次韻言懷并紀讌集兵戈驅廹十年還此夕珠歌翠舞間出罋葡萄杯灎灎盤鈴傀儡錦斑斑達人不惜千金費浮世能逢幾日閑月裡嫦娥應笑我也將華髪對嬌鬟追和侯良齋秋懷寸絲欲補袞龍衣歲月蹉跎素願違身老江湖心未已夢遊京洛覺還非蕭蕭木落青山瘦浩浩西風白鴈飛慚愧太湖清似鏡照人雙髩短垂絲二出入都無騎從隨杖藜於我頗相宜詩成每得江山助酒病還將麯糵醫杜甫眼前茅屋在陶潜心事菊花知朝來兩袖西風泪遥為鄉人灑肉籬三世事無涯生有涯逍遥誰得似南華龜巢近傍三江水鷗侣平分半席沙稚子學書収柿葉老妻添絮采蘆花客來且共藜床坐莫說金張許史家四垂蘿曲磴絶攀縁挑酒笻枝不挂錢白石路傍如虎踞青松澗底作龍眠一杯且咏重陽日二頃何須負郭田風景不殊陵谷異丹心雪髪兩堪憐六柳庒爲沈太守作彭澤五株柳清風千載餘顧予心乃心修名難與俱所以樹六柳于焉結吾廬門前有流水樹下堪釣魚我柳已成隂豈不懐歸歟人生一趨舎世事紛萬殊善學柳下惠風雨慎守居繼跡子陶子亦曰姑徐徐誰其知此心南山黙如愚九月八日朱原道席上作主人預晏重陽客我老重逢癸夘年醉把黄花簪席㡌笑攜紅袖棹觥船洞庭山色軒窓外震澤波光几席邊不用登臨勞騎從恍如蓬島醉羣仙為吳中行題畵老樹骨立偃蹇秋山氣勢崔嵬閑却一江風月扁舟罷釣歸來次韻答珏仲瑛客僧留客古禪宫湯若爐熏對菊叢佛法不隨塵世變鄉心猶與故人同一林紅樹含疎雨半壁青天截斷虹早晚相㝷東海上扁舟相趁落花風題春江獨釣圖江碧山青雨過時輕煙漠漠樹離離白頭吕望鷹揚去獨釣滄洲是阿誰過崑山王御史墓宋御史王褒字彦先登宣和進士第紹興初上疏論十弊切中時病後告老居崑山逸野堂所著有春秋集傳等書行于世墓在州南乆廢之餘賴知州偰公復之友人殷孝章以其事索詩故有是作先生逸野堂何在仰止崑山有所思麟史立言三傳外廌冠遺直中興時一坏難汚孤忠骨十弊猶存蹇諤辭過客下車翁仲立共看重樹墓前碑簡金君玉峩峩洞庭山宛在水中央山風西北來微帶橘柚香吾有山中居一别今十霜題橘宜有書鴻雁日南翔老懷多感嘅煙火生肺腸作詩報君知湖山迥相望聞杜玉泉臥疾以詩代簡聞君臥讀床頭易世事更新恐未知一國山林包錦繡五湖煙水照旌旗天寒日暮人相憶冬至陽生歲又稀江柳鵝黄春草綠幽㝷當不負前期次韻沈啟之宴飲柏酒春三日梅花信有風赴君雞黍約醉我鹿皮翁凍雪山頭白晴雲海上紅天高不可問吾道未應窮贈慶别駕台州别駕不之官煙水孤村共歲寒偶有濁醪留晚酌旋挑生菜簇春盤三年鄰里通家好四海兵戈行路難且喜門前金色柳東風堪作畵圖看送人妾為尼燕子樓中别綺疏象王宫裡學真如秋波獨注蓮花漏春笋頻翻貝葉書十二雲峰無復夢三千沙界本來虚散花天女長圍繞觀色觀空樂有餘路義道見訪示詩言懐予次一首書畵船來城郭外客窓春作雨隂中一違談笑經年乆又得壺觴此日同江水照人清似鏡山頭戴雪白如翁新詩屬和題青竹几杖相隨許阿戎次鄭起南縣丞出郊出郭問農事哦詩思不羣犁鉏江上雨桑麥隴頭雲馴雉行相逐雄鳩語更聞野翁相勞苦飛蓋倚晴曛上元夜賦雪此夕何夕風作威急雪打我白板扉大如鵠鶴小鷗鷺乗風作陣横空飛老夫起坐驚且喜窓隙壁罅皆珠璣鄰家兒女時未寢看與燈月爭光輝夜深人静燈燭滅宻掩姮娥爛銀闕恍如太極未分時混沌之天無日月須臾忽聴簷竹折驚動老夫方寸鐵直憂壓倒湖上山連我龜巢化魚鱉老龜縮頸牛衣中夜長如歲心忡忡鄰雞三號催曉發燭龍飛出扶桑東口銜火珠光燄紅萬國一照春融融客懐愁與雪俱釋青山依舊撐虚空吳門訪路義道和古詩客來上元夜筠軒照晴雪對雪飲流霞敲氷煑團月誦君詩數篇忘我衣百結一笑看梅花餘事不復說二新年到城市憂思喜一雪復覩漢官儀仍書王正月蘇州古名郡刺史得元結老我愚溪愚無勞捕蛇說贈楊君濟縣丞我思崑山鉏白雲高軒訪我麋鹿羣我今長洲釣明月君適過此寂寞濵感君相知式相好與君談笑開懐抱坐分半席白鷗沙滿目青山浄如掃社公雨晴風作惡村北村南杏花落勸農來徃杏花村雞犬不驚田舎樂君歸哦松坐松隂我舟更入菰蒲深釣鉤無餌勿語人但說煙波無處㝷寄蕭舜卿兼簡虎邱寧居中長老時蕭年八十三矣愛爾林居虎邱寺劍池磐石好林泉一門父子頭如雪十載兵戈命在天故國青山還歴歴春風芳草自芊芊生公㑹有招賢意我亦來從種自蓮達至善自錢唐過訪㑹徐伯樞昆仲諸友小酌以杜少陵春日鶯啼修竹裡句分韻得日字兼旬苦隂雨隂蘚青入室良朋遠方來一笑百憂失闊别十載餘艱虞能盡述喜聞戎馬間猶得用儒術間闗脫虎口壮志曽不屈歸來西湖上飲水獨食蜜中吳舊新知生存百無一龜巢酒盈樽聊以永今日兩兒聆言話諸孫亦繞膝殷勤問生理為我長太息干戈紛滿眼世事暗如漆願言慎所之終焉保貞吉雪舟詩為王照磨作雪中傲兀乗孤舟千載復見王子猷吾知君欲記高興君聴我言當㸃頭男兒胸中有兵甲筆底聽滔水三峽正須擊檝誓中流雪外蓬婆爭蹴踏長驅夜入懸瓠城指揮鵞鴨混軍聲生擒逆䜿取金印江海却㝷鷗鷺盟和沈啟之早春書懐水光山色浄無塵滿眼東風景物新繭栗犢眠芳草地木蘭船繫緑楊津莫嫌頭上鬔鬆雪且盡杯中㶑灎春鶴自乗軒鳥自好滄洲鷗鷺與情親簡錢仁山一榻青苔對雪五湖春水流澌欲遣長鬚覔酒同拈秃筆題詩二月七日和徐伯樞排悶人生百年能幾何有酒快酌金叵羅已看蓬髩㸃蒼雪莫待桑田變白波東風花外鵲聲喜落日城頭烏尾訛君詩到手客在座擊節聴我玲瓏歌伯樞以啟之韻作詩見贈復答一首蕭齋孤坐席凝塵喜得君詩字字新四海交遊期管鮑一家兄弟比椿津多情燕子重來日絶色桃花不負春媿我少年書劍在白頭無復報君親贈星術王逵夫虞廷命官非不多歴象必先羲曁和羲和去今數千載名與列宿俱嵯峨先生本學羲和氏聊爾談星隱吳市二十八宿緯五星上繫天時下人事先生為人推吉㐫一天星斗羅心胷河圖洛書造化窟妙理貫徹精靈通齋居垂簾坐終日金鴨焚蘭煙霧碧客車載酒來問情先生舌端飛霹靂每將忠孝語臣子不惜忠言逆人耳天降灾祥本在人人能轉移天亦喜君不見宋君三善言熒惑退三舎天人果相孚大咎亦可謝又不見韓退之命在斗牛身坐箕遭讒受謗能自知怡然高咏三星詩吾儕此理或未析請從先生考星歴和郜彦清州判暮春寓僧舎治最功成解印歸春風綠髪未應稀如何拄笏禪床下閑看孤雲倦鳥飛二沈水香消午篆煙僧房聊借石床眠多羅樹上頻伽語絶勝天津聴杜鵑三篋藏緗帙沁雲香手閱金經掩竹房門外不知春早晚綠隂滿地日初長雨中寄友人春風冷凄凄煙雨晝暝暝相望隔重湖幽事頗闗情賴有小吳牋可以寫心聲心聲寫難盡况無雁南征出門泥没膝恨不生羽翎隔窓兩黄鳥花間語嚶嚶頺然枕書卧一榻莓苔青龜巢稿巻三欽定四庫全書龜巢稿巻四元謝應芳撰詩楊縣丞董役開白茅河晝夜勤以詩代簡畚挿如雲穿白渠客来喜得問何如行庖只飲婁江水俸米頻供擔石儲人起四更燒爉燭霜飛兩袖坐籃輿殷勤左轄銀缾酒為報功成有薦書劉旭齋過婁江客舍作詩贈之方欲題詩寄草堂逺勞移棹過滄浪十年同飲三江水一笑相㸔兩鬢霜田野無人鴉種麥漕渠通海蟹輸芒憑君莫語悲秋事且復持杯送夕陽玉田䘮側室作詩悼之余亦次韵以相其哀目斷琹臺日暮雲相如無復見文君最憐機上廻文巧更憶燈前教子勤繡箧熊丸香尚在綺牕鸞鏡影初分江村一月黄梅雨誰為衣篝爇寳薰五叢涇送玉田徙碧山與龜巢隣居傾葢雨兩月同客天一方君今挈家去宅我龜巢傍為聞碧山好宛在雲水鄉朝紳多寄寓群髦富文章將尋鷗鷺盟與我同六藏老婦堪夜績東壁分餘光客至亦可留覓酒過短墻巷無車馬塵屋有汗竹香籯金與床笏笑視俱亡羊惟存廣文氊讀書坐藜牀閉門樂吾樂疏食猶膏粱清風北忩下懐哉古羲皇寄鎦景儀先生杏花春雨晴時别蒲栁秋風又颯然笳鼓新城嚴警邏溪山幽館喜安便校書還照青藜火煑茗應􅆽錫谷泉近遇故交聞有信逺勞埀問念無氊龜巢仍寓黄天蕩鼃竈今連白水田自分犁鋤聊卒歲可堪兵革更飢年家居食指一百廿斗米緡錢八九千𤨏𤨏旅懐言莫盡知君憐我似䕫蚿寄顔悦堂長老及崑山諸友薦嚴永懐二方丈雙徑歸來舊竹邉林風磵月兩依然崑山特立烟塵外婁水東流渤澥連坐有故人應念我客無此老共逃禪南能北秀煩傳語秋晚相過飲菊泉杜子才掾史擕詩見訪次韵白首無機心江鷗最憐我復有新相知時來與閒坐一凉初過雨七月正流火先鞭君已着短鍤我方荷壯君早騫騰先我常轗軻憐君幸如此数見何不可茒茨湖上居菱芡水中果後㑹期碧山合歡呼白墮更邀詩酒侣共載書畫舸中秋月如晝西溪捩歸柁玉山顧隠君自嘉興荅詩詢僕近况且云徑山禪老亦望一見故復用韻自述簡諸故人數椽茅屋一笻枝萬事無心獨愛詩詩債隔年償未了帶圍連月孔頻移呉田積雨生禾耳笠澤西風斷桞絲眼底故知俱契濶抱琹何處覓鍾期次韵荅戴德隠見贈我生無他長耽書竟成癖鬚眉皆雪霜肝膽如鐡石所頼識前賢頃歩不妄適向來走風塵朝不能慮夕行囊既羞澀家累且繁劇隨身一破硯百指全仰食驅馳今九載未始一日閒豈不懐故園松菊怡我顏長蛇及封豕出沒咫尺間逢人問親戚野坐荆屢班不見雁足書徒眎刀頭環遥憐金斗城如望玉門樹憶昔重九時鄉隣約雞黍黄花香可愛白酒味不薄東家復西家相邀總難却負郭有二頃平居得三樂朋㳺結詩社時時共吟噱溪澗采蘋蘩春秋奉祀禴㡬廻乗天風欲跨揚州鶴那知一顛沛江湖竟漂泊移家碧山下家具少于車幸君適相逢同念去國賖聚如水上萍散若風中花或琹教河汾或𤣥授侯芭交情比投漆子弟亦通家詩筒頻往來瞬息經兩稔壯君多志氣將衣買臣錦老我忘功名但就吕公枕三江五湖水共喜魚不淰茰觴了佳節藜床甘且寢春日方遲遲秋霜俄凛凛好客多釀酒願作東林沈寄丁彦誠旌旗滿眼各西東君覓桃源我轉蓬兵後即知還舊宅客來曾辱寄詩筒石田種秫梁溪曲茶竈分泉錫谷中}
