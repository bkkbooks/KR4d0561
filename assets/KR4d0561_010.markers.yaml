  - {type: variant, offset: 8565, length: 2, content: 藁卷, WYG: 兩日前桞花飛雪正紛然峴山有感知羊祜禹穴曾探繼馬遷老我短檠墻角棄憐君古硯案頭穿欲將磊塊都澆去何日移封共酒泉劍井全家劍井邉不飲井中水要令生瑞氣藹藹見多士古甃暗莓苔羸缾委泥滓黄河今復清豈獨長已矣獨孤公檜珍重前賢手自栽無情斤斧忍相摧専車載去蒼龍骨竟作誰家爨下灰惠山泉此山一别二十年此水流出山中船人言近日絶可喜不見流船但流水老夫來訪舊煙霞僧鐺試瀹趙州茶惜哉泉味美如故不比世味如蒸沙陽羨茶南山茶樹化刼灰白蛇無復銜子來頻年雨露養遺枿先春粟粒珠含胎待看茶焙春煙起蒻籠封春貢天子誰能遺我小團月煙火肺肝令一洗歲朝示二三子我生老筆耕齷齪不自羞教兒復為之能識此意不為農或逋租服賈必逺逰非才茍祿仕往往遭愆尤先師有明訓富貴不可求兒能負米歸老父百不憂日髙三丈餘睡起梳白頭藜牀草氍毹布冠木棉裘比屋吏叫囂吾廬自幽幽食粥了餘年死即埋髙邱今晨捧椒觴復喜嵗一週一唱三子和聊作擊壤謳寄徑山顔恱堂長老每懐城南隠者家崑山石火徑山茶年年春晚重門閉怕踏堦前落地花二兩耳埀肩雪滿顛維摩一室小林泉白雲牕下黄楊樹且喜重經厄閏年懐許君善别後逢人問薜蘿打門時有吏催科消磨舊日躭詩癖春興吟成恐不多二桑扈催蠶桑葉肥麥田雊雉麥花飛春餘閠月無多日鄰舍逃亡歸未歸三昨夜龜巢酒半醺春風吹夢去尋君落花芳草千墩路攜手斜陽不忍分寄趙朋南狂風横雨去年時大厦難將一木支最喜草亭修竹净催租人去復哦詩二石首魚來金色新桃花酒熟甕頭春急須秉燭逰長夜莫遣山公冷笑人寄趙執中案頭花落硯池香庭下草生書帶長黄巻青燈風雨夜更和熊膽付兒郎二一見相知二十春交情無媿古雷陳如今滆上龜巢逺不惜書來鴈足頻寄呉中衡老我誰知己端人最憶君常談無鬼論不作送窮文藥杵三更月萊衣五色雲桑榆春自暖蘭􅉅發幽芬芙蓉城仙人歌寄贈孫大雅仙人家住芙蓉城芙蓉為冠結蘭纓飛車去作蓬萊客玳瑁筵開麟脯擘八溟揚塵一轉蓬扶壓倒到東王公仙人手策青玉龍翩翩歸袂飄天風華亭之西玉山東羣仙挽留鸞鶴從雲墻霞壁五畝宫金華翠葉九粒松雙眸㸃漆顔如童瀛洲再看蟠桃紅蔡經家藏老姑酒能為仙人集仙友琹髙醉歌經拍手要我龜巢老人來和否寄黄宗禮星槎池舘東牀客氷玉襟懐我所知百榼葡萄春灔灔一欄芍藥晝遲遲門前送却催租吏枕上還吟夢草詩只恐繡帷人起早又催京兆畫蛾眉秋晚過太平塔下四顧瓦礫塲有懐徽太古禪老作詩招之一昨陵谷變刼灰飛九州太平古招提寳地成荒丘浮圖巋然在氣勢凌髙秋風鈴作梵音終日語不休以言老萬回合為故山留竿木本隨身把茅堪葢頭畫沙且成佛况乃願力優髙壇降甘露大車駕白牛老我煙霞交風流繼前修冬至和陳縣丞韵𤣥機妙斡無古今一陽來復消羣隂聖人灼見天地心贊易乃鳴金玉音蘭也朝來新盥沐三復韋編謝亭毒卿雲燦爛迷九天旭日曈曨出暘谷丞哉丞哉初下車踐長之喜當何如絃歌化行風俗美寒谷春生自兹始逸菴詩為呉子明賦我愛逸菴叟有詩能養生百事不挂懐三樂殊稱情行年八十餘白髪無一莖每聞責子歎笑我如淵明優哉復㳺哉笠澤山水清二日髙三丈餘先生睡初起雪屋燒煖香行庖膾氷鯉逍遥白􅏩巾傲兀烏皮几鈎簾對青山倚杖看流水世事了不聞無勞洗吾耳三客來兩忘情不復事迎送有酒即盡歡杯當笛三弄羲皇敢云傲周孔亦無夢衆口從雌黄我腹自空洞行歌山澤間斯樂誰與共四人生老而逸伊誰無此心惟翁適所願林居小湖隂或持無餌釣或抱不絃琹山水古名畫所得趣尤深長歎康樂公木屐費登臨送李彦明歸髙郵老夫歸從東海頭春風送客歸秦郵出門復暏鴈北鄉物我喜得同悠悠呉船鼔櫂渡江去烏輪正挂扶桑樹桃花倚岸笑相看杜宇催人啼不住征袍十年塵土多濯纓今作滄浪歌一百五日寒食雨三十六湖春水波文㳺臺榭剪荆棘繼美前賢集嘉客誰能喚起老龍眠重寫耳孫湖上宅寄題無錫錢仲毅煑茗軒聚蛟金谷任葷羶煑茗留人也自賢三百小團陽羨月尋常新汲惠山泉星飛白石僮敲火煙出青林鶴上天莫恠坐無齊趙客玉川茅屋小如船王松溪知事别兩紀陵谷既變復㑹常州年皆七十餘喜各無恙又喜松溪别而復得觴以賀之詩紀嵗月年來兩度塵生海二老相逢雪滿顛杖屨荒城寒食後琹尊别業舊堂前桃花含笑似欲語燕子飛來絶可憐此日為君歌此曲雨蘇春旱午隂天後數日松溪見和二詩予復次韵送歸華亭放舟東郭語長年喜見春風不放顛三月鶯花詩巻裏五湖舟水柁樓前青山司馬如今老白木長鑱祗自憐歸到鳯山門不出北牕真是小壺天雨宿縣學齋舍作客來帷林候漁父黌舍坐聽三日雨諸生讀書喧兩廡商羊飛來立當宁雨聲書聲雜蛙鼓蚓歌亦自諧宫羽青苔上階茵生柱敗壁淋漓籀文古齋僮不敢開牖户風撼庭柯嘯飢虎南山老石爛成土天漏誰能鍊金補去年旱魃走呉楚田家往往悲塵釜麥秋一飽方自許莫教化作飛蛾舞宜山謡并序廣東南丹諸州民獠雜居素稱難治洪武初朝命設官置司安撫之山東尹明善實在僚選凡所司事知無不為為無不達蒞官再期多善政後四年有客自廣西來者傳其事甚詳余乃摘其大者作宜山謡七篇苖猺地連交趾咸籍為民且為除㓙號人恱之作椎結舞椎結舞擊銅鼔淺蠻生蠻皆按堵賣刀買鉏犁銜恩人鳥語獷俗馴惡名去豈弟君子吾父母沿邉舊置七十五以猺為長每羣聚為諸州害今罷之民乃安作除虎窟除虎窟虎皆散亡尨睡月湖南海北廣東西千里如今無白骨無白骨人何憂每每舊屯田年年稻花秋我所思兮龍江水流兵後薦飢發官廪活宜山數萬口民德之作枯桑枯桑枯桑徒為我薪煑石弗糜曷以食人廪發于官我命乃續誰其主之伊人如玉伊人如玉孚及豚魚詔我婦子償粟勿渝厥粟固償厥徳彌忘懐我伊人于羮于墻覃國大韋仲海等世為土豪與溪猺洞蠻相表裏反側不一公以計禽殺之民大快作霹靂斧霹靂斧行天誅百靈奔走羣醜除磔梟獍醢猰㺄招徠角端舞騶虞日月兩山明畏境成康衢宜山莫天䕶虎踞一方公言諸方伯徙和州民樂之作坎井蛙坎井蛙今渤澥偷生蝦蜆門怒腹氣何在長魚䟦浪欲吞舟竟作任公雪花鱠蛙乎幸偷生有媿輸芒蟹前度放蛙人今日恩如海蠻獠負固歲乆不供而良農病於重歛今均之視前賦减什五六恩不能忘作生子以尹名生子以尹名有田須力畊昔憂公租重今憂公租輕窮閻杼軸具當路鈞衡平焦𠖇覆盆下覩此白日明革命之初公以安邉事宜屢白相府民懐之作鞍馬勞鞍馬勞肉消髀廣西一去二千里借箸籌邉丞相喜兩年單騎八往廻青草黄茅瘴煙裏鞍馬勞有如彼不負公不掠美一寸忠丹報天子送丞漢德員外徙居臨濠憶昔呉鉤歛霜鍔歐冶已知蛟可斮窮探虎穴走山靈湧出蜃樓招海若三台分照紫薇垣一蜚徑入紅蓮幕安知滄海忽生塵乃見巨魚今縱壑携家春雨赤城還揚舲秋水濠梁約老夫白髪三千丈别來幸有琹書樂羨子青雲二十年此去亦無冠冕縛故鄉相見恍如夢往事重論成大噱呼兒觧我鷫鸘裘離亭飲客鸕鷀杓南薰稳送渡江水西笑遥憐好城郭莊生臺上看㳺鯈彭祖山中拾靈藥平居襟懐本瀟灑在處林泉可盤礴有時回首望江南題詩如寄雲間鶴次韵贈董明府兼贈陳縣丞尹主簿綠莎聼事灑清風四野遺黎集澤鴻佳政總堪傳國史丹心曽不愧天公横琹坐對中秋月援筆詞傾百歩闕僚佐粹然連白璧有時來我瀼溪東寄錢夢弼并為乃翁宣慰公夀閒對青山晝掩扉家居身著老萊衣懶于日下看花去贏得街頭負米歸一笑觥船香雪美百年城郭昔人非髙堂秋爽而翁樂稻熟湖田蠏正肥送虞長史歸閩中卓犖青雲器凄凉白雨秋棄官辭傳舍舁疾上歸舟岸有吟蛩送檣無語燕留七閩天杳杳兩淛水悠悠親舍孤雲影山城大海頭倚門勞逺望脫屣得長休金榜聲名在斑衣願未酬猗蘭重製曲蘐草足㤀憂丹穴生鵷鳯龍光射斗牛此心能自足餘物更何求老我三家墅憐君百尺樓相知稱鮑叔逺送媿鄒㳺海上多靈藥山中儗素侯家園紅荔子能寄故人不野人居短歌三章為呉中衡賦野人居住何許屋頭東近扶桑樹三江五湖在庭戸身著老萊衣手擘龍根脯賦歸來兮謝簪組二野人居誰與論芸夫蕘子皆同塵朋來逺訪多縉紳焚香㨿髙梧持盃岸綸巾睠魚鳥兮情相親三野人居書滿屋神農本草僅一束用之可比連城玉香林春樹緑樂吾親杏菊潭秋水兮忘啜菽過馬公振南江草堂南江草堂人白眉耽書成癖復耽詩千金買書讀未了化作刼灰飛海涯國風雅頌三百首愛入骨髓淪膚肌兩亰三國六朝下驅駕直與唐人馳老夫一别再寒暑重覧碧海珊瑚枝溪西隠者亦好事白首苦吟忘渇飢逢人往往誦佳句况此酒邉逢項斯歡然共醉成夜宿石銚煑茶焚玉蕤詩家風月談未了老蟾已墮西山陲盍簪此夕復何夕一庭寒菊花離披龜巢稿巻四欽定四庫全書龜巢稿巻五元謝應芳撰詩贈邵濟民曲塘地仙居洗藥溪水香青衣兩童子玉杵搗𤣥霜𤣥霜搗来奉髙堂老親食之夀而康天生便便貯書腹金匱石函書爛熟東南海上多名山山中采藥騎青鹿歸来濯足婁江水坐對青山隠烏几囊探藥物不論錢但欲使人無病耳有時彈琹鸞鳯音有時抜筆長短吟紛紛呧痔吮癰者徒教别屋堆黄金聞雲門張先生慈烏軒焦尾居名賦二詩慈烏曲慈烏乳衆雛雛大羽翼成翩翩出巢飛啞啞繞林鳴得食不自飽歸以飼所生紛然同類中有此骨肉情余昔養親日瞻烏常自懲白首重相見愛之雙眼青匪謂得所止丈人屋崢嶸為時梟獍多見烏如閔曽王孫金彈丸慎勿令畏驚焦桐曲焦桐製孤琹舉世稱異材往非蔡中郎竟作爨下灰七絃繫朱絲徽金軫瓊瑰知音適相遇攜上髙髙臺一彈廣陵散絶響有餘哀筝琶沸新聲瓦釜亦鳴雷天機妙循環復見泰宇開爾桐朱鳯吟靈風揚九垓吾今洗吾耳盤石坐莓苔芝秀軒詩猗歟名門夙稱五常遥遥耳孫厥德復昌於粲爾子文藻有光如彼芝草曄曄其英自天降祥奕葉流芳匪曰三秀仙人之粮林壑爾居竒芬逺揚雍公之扁金薤琳瑯於昭彼蒼福善孔彰俾爾耆艾家有餘慶維來維礽永言弗忘結茅東郭歲晚言懐行盡難行路歸來父母邦溪山閑杖履花竹小軒牕教子知一二抱孫成兩雙有時城府去深媿鹿門龎二齷齪龜巢老蕭條鶴髪秋過眉桃竹杖方領木棉裘補世慙無術通家憶舊逰幸來雙白鳥能與共滄洲三静掃蕭齋地書牀一舊氊談經雞亦觧迎客犬常先流水柴門外横山瓮牖前春秋埀八十食粥了餘年四季子躬耕地寥寥禮讓風度遼歸老鶴遵渚集飛鴻土姓多相雜鄉音舊不同獨憐東郭外劍井氣如虹五官塘人似蟻環堵室如蝸白髪三千丈清貧第一家地爐寒撥火雪水夜煎茶好客知誰至青燈結細花六過客應相笑衰翁未得閒酒經方補註詩稿又重刪藜杖家家竹藍輿處處山數朝天色冷髙卧掩柴闗七故國歸來晚孤城草木寒親朋皆鬼籙鄉里少儒冠寫琰金鐘失沉沙鐡㦸殘譙門斜照裏時為一辛酸八臘月無多日春風又一年儘添頭上雪聊適瓮中天彩筆題氷柱青衣送酒船晚來賓客散清興更悠然和陳二令逰善權洞我昔陽羨逰春山聽茶歌别來三十載重㳺竟蹉跎憑髙每望碧湖外羣峰玉立青嵯峨善權山水最佳處我公去知清興多來時風景溢吾目不用登臨勞吾足有聲之畫勝丹青曲盡物情人歎服天開地闢羲皇前神工為誰開洞天爾來一萬八千歲金堂玉室居羣仙飛車鸞鶴乆不見春去秋來只鴻鴈青山前度汚狼煙從此四郊荆棘遍洞前玉氣金瀰漫仙家應作瑶池觀層巔巨石勢欲墮過者為之心膽寒翩翩石燕黏翠壁飛來若與人相識馬如龍車如水尋常貴逰無足數以分清致侣名緇一代風流繼支許樂哉山水三日逰忘却世間千種愁昔人名句題玉柱今公徤筆留銀鉤寄言武陵人桃源兹可求丹砂多與鍾乳襍瑶草不知蒲栁秋長橋無饞蛟南山無猛虎在處可逰觀政須人好古闕墨圓碑篆亦竒絶似岐山石為鼓竹姑子明年春山僧煑玉邀嘗新哦松暇日肯同去作詩更為山傳神鄉飲酒詩皇帝即位之五年歳在壬子詔天下行鄉飲酒禮明年癸丑正月二日常州府太守孫公率僚属行之儀物品節不約不侈省部主事宋公實在賓位僎介而下耆客凡二十七人執事者位之其登降揖讓盥洗獻酢靡不如矩時某年七十有七亦得以布衣厠諸賢士大夫之列葢有不勝其喜幸者率爾口占以紀盛集云一統乾坤大羣生雨露新君王能建極風俗易還淳鄉飲稽蒼籙天書降紫宸諸侯遵令典嘉讌展芳辰黌舍簪纓集珍羞爼豆陳主賓儀秩秩僎介色津津椒頌三陽日芹香泮水春工歌聲律古揚觶獻酬頻聖澤沾羣品仁風播八垠賜酺無足比置宴詎能倫老我闕中闕諸公席上珍叨陪聆闕法喜獲坐連茵引領瞻西日傾心拱北辰知恩無以報三祝效封人謝董明府惠炭范叔寒多正不禁烏新重惠比烏金賒來脫粟方炊飯留得焦桐好製琹環堵一龕春盎盎麗譙三鼓夜沉沉硯池雲起龍香暖寫我梅花鐡石心雨中懐秦主簿東門之東西市西人家屋頭啼竹雞新年十日九風雨二老㡬時堪杖藜懐儲教授鎬京春宴醉簪花歩出都門駕小車七里八岡山店夜一氊風雨宿誰家次韻言懐親朋淪落盡故國似他邦矮柱龜頭舍踈櫺蚌殻牕鵲聲簷外喜鸞影鏡中雙兒女俱婚嫁逃禪笑老龎二江海飄零客􅈣塵二十秋逝將諸犬子歸老此菟裘夜雪圍爐坐春風秉燭逰樵漁時共醉何異宴瀛洲三老我龜藏六無毛可作氊躭詩閑未得強酒醉當先茅宇城闉外梅花臘日前幸逢賢郡守鄉飲禮髙年四短日經南陸嚴寒鼔朔風遍懐知己友長覔寄書鴻世態今如此人心古不同青天如可問飛歩躡長虹五風冷柴門閉齋居縮似蝸小橋平陸里識字老農家野飯常留客村醪頗勝茶早梅溪上折斜挿膽瓶華六貧居家事少客去跛奚閑茅屋牽蘿補蘭堦擇草刪雪添南浦水雲暗北牕山孰謂寒如許雞鳴客度闗七自分馮唐老誰憐范叔寒婆娑鳩在杖蕭散鶡為冠夢筆才華减談經喘息殘昨來初度日淚落酒盃酸八神仙無足信何藥可延年素行多違俗丹心不愧天座留談笑客門泊往來船吟雪誰相似襄陽孟浩然送秦宜仲主簿之京丈夫不灑離别淚盃酒聊發玲瓏歌黄楊閏餘歲已乆紅杏日邉春正多子瞻手攜鐡柱杖太白足上金鑾坡鳯臺佳景必重賦千萬寄詩來薜蘿送主上人兵後尋叔歸臨江侍養青年未焚紫羅囊竹林之逰鵷鳯翔一旦身為苾蒭草半間屋住菩提塲安知兵甲滿天地遂令叔姪成参商桑田即變家亦毁蒲屨欲織親俱亡某山某水總淪沒曰祖曰禰誰蒸嘗象龍駕法力雖猛豺獺報本情難忘﨑嶇行脚求從父殷勤稽首祈空王䕶身符出虎牢險忍辱鎧染狼煙黄長洲茂苑乆争戰殘山剩水方凄凉相逢不覺開口笑差喜自得安心方行人嗟歎擁長道畫鷁送將歸故鄉孤雲飛處是玉笥把茅蓋頭猶錦堂蒲羞可助潢潦薦木瓢共飲曹溪香愚觀諸公發歌詠力為吾道扶綱常惜哉僧中有此郎疇能為爾加冠裳於乎疇能為爾加冠裳次韵袁仲徴見寄并自述城隂山作讀書堆書畫船從海上回春水泮池芹小摘秋風老圃菊重栽明時正用凌雲筆清夜還傾酹月杯百里相忘兩相憶詩筒好寄便鴻來二才華减盡姓名低頼有綸竿釣碧溪衰鬢㡬莖蓬綴雪閑心一㸃絮沾泥江山有助詩頻賦朋舊相過酒共攜金斗城東二三里道傍茅舍似雞棲借韵寄蔣以愚江上羣山翠作堆江雲與客共低回黄楊閏後餘無厄丹桂天髙孰為栽飽吃河豚肥似乳醉看江水小如杯延陵祠墓春申巷我亦拏舟訪古來借韵寄劉小齋白練裠輕帽屋低緑隂庭戸瞰清溪詞章落筆如翻水篆籀藏鋒若印泥一昨論文心共許㡬重飛夢手重攜絶憐鳯穴生雛好已向朝陽碧樹棲謝許克敬六月惠炭去年臘月人凍死我亦牛衣眠不起家僮赤脚令采樵日暮歸來墮雙指德哉古人憐我貧于今暑月遺烏薪藥爐喜得文武火茶鐺爛煑槍旗春禦寒有偹心膽壯故態盡除寒乞相山空歲晚雪復來平地不妨深一丈烏薪爇成霞焰紅藜牀坐我龜巢翁灰中芋栗薦村酒凍梨面作桃花容齊奴爨蠟自奢侈野人炙背無足比融融之樂度殘年重賦新詩謝知己病中䝉董知縣陳縣丞尹主簿枉顧且有白粲𤓰酒之惠旣而病愈賦此以謝鳬舄飛來野老家同僚先後佩飛霞共憐敗絮多生蝨為問疑盃或飲蛇月俸分將官廪粟朋尊兼餉早秋𤓰相如四壁生光彩試握霜毫荅寵嘉常郡泮宫詩猗昔廟學悉燬于兵我侯作之聿觀厥成巍巍素王羣賢儼如侯殿侯廡豆籩所於師生有廬講道在堂飲社讀法有程有章我侯戾止若網而綱嘉乃進修戒毋怠荒宫墻非髙丹堊非侈道彌六合聖有遺軌侯揚天休嘉惠士子士風還淳庶見麟趾武邑新學詩邑有孔廟棟橈欲墮舊亦有學濕漏且庳惟邑長式撤而新之清廟奕奕門廡階墀聖賢明靈陟降在兹黌宇言言齋有詩書師友講貫朝斯夕斯射則有圃書或臨池帷林杏壇古音朱絲顧諟廟學治化之基帶澤育莪比迹蒼姬絃歌武城異世同規襍詩積隂當𤣥冬生生機已息陽孳僅毫髪梅花獨先得若人玩化機於此已深識攀條摘玉蕋吟玩意莫測維復見天心所慮羣隂逼閉門夫如何君子政惕夕煢煢保養間由兹見天德二山雲忽低徊四郊紛白雨老農荷鋤歸布谷桑間語相勸一何勤一鳴再三俛老農感禽意豈憚東作苦嘉榖已函活尚待明日煦小兒未觧事大兒逺服賈農器已可敶耡耰在梁梠入室惟老妻出沒撫􅑥甒三凛秋氣忽微徂暑已云往黄花異凡木所植本因壤稜稜清霜間誰復見俛仰肅殺一氣中鋭氣出其上强梁固可人傲德毋日長四志士想邱壑老驥厭長道歸來已低徊但覺青山好至樂在天倫不必事華藻交歡能㡬何及今已衰老五至老無􅁱行善類日以疎生知媿古人宴安夫何如羣處不念德草草復離居春還有餘興雜花滿郊墟網罟不能操空羡淵中魚六青陽既開動草木方敷榮積雪忽如此豈不害含生大化無停機生生寧有已人心偶自徂豈不害天理援琹一鼓之坐致麤穢除吾分一天地積隂夫何如二月二日漫興東風吹散社公雨紅白花開爛錦雲時俗喜逢迎富日老夫羞作送窮文裌衣試著寒猶怯拄杖歸來酒半醺為問驛橋楊桞樹送人多少去從軍送安上人歸馬跡山挿竹山中偶出逰折蘆濠上即歸休踞牀獅子聲方吼踣銕龍駒跡尚留華雨六時紛似雪松風五月冷於秋客來認得南泉斧七十二峰應㸃頭禱雨黄梅落盡雨愆期太守憂農日皺眉滂沛一朝隨五馬四更三㸃謁叢祠二乞雨歸來雨滿天朝衣兩袖帶香煙綠莎青笠人如畫多稼亭中看力田三一寸丹衷徹彼蒼不勞方士篆符章田家雨足豐年瑞官舍風清化日長寄京口俞伯鎮兼簡江教授飛雲妙墨來前日聽雨髙軒憶妙年杜曲桑麻㡬家在韋賢父子一經傳杖藜欲去尋黄鶴褁茗相攜看杜鵑竹樹樓臺江總宅想應新築大江邉夀董明府臨汝佳山水鍾英賦厥初身為百里宰腹有五車書見客無官况休衙只獨居夀眉揚喜色百里拜新除次韵荅性天之長老道人踞猊牀眼明如趙州每言西來意爰及東家邱白首林泉交清風江海秋法幢扶欲起法鼓鳴未休本來無住著聊爾小淹留鹿眠荒苑内烏啼古城頭天道自坦夷髙堂豈伊優他山石可礪直木枝有樛巴蛇或吞象鼷䑕能食牛頼有佛目明洞見鬼窟幽萬語歸一㸃坐斷聞思修病中即事何物青蠅滓玉壺掣鞲飢鶻攫鵷雛病軀痛作雷鳴腹垢面愁添雪滿鬚欹枕卧看殘菊在下牀呼取短笻扶客來與說塞翁馬笑指蒼天慰老夫二天方老我心如鐡誰謂讒人口爍金覆轍始知行路險移家此去入山深缾無儲粟還沽酒爨有焦桐莫製琹且喜日來聾兩耳從教蚯蚓作龍吟九月朔䝉周彦美詹伯逺蘇惟可攜酒殽過城東草廬時余徃潞城田舍次日賦此以贈老夫一棹尋醫去佳客三人載酒過破屋茅飛烏豈好衡門木落雀堪羅交情自古陳雷少世態如今鬼蜮多醉帽簪花開笑口尚須秋曉過西河示子憶年二九歲之吉朝賁闖門驄馬匹柏府遄歸鄂書出烏雛戀母情所鍾歛翮不附髙飛鴻屢閲星霜怨樹風帶經犁鉏賫壯志欲籋青雲竟顛躓羞與腐草枯木比東家借燈夜繼日著書泚我潛夫筆數載兀如僧縛律書成兩髩秋蓬飛出門復遇鍾子期麟膠為續焦桐絲旁觀方笑鮎上竹呉下風塵驚滿目蕉隍夢成俄失鹿蒼姬訖籙寳鼎移血流四海誅鯨鯢水魚漏網亦㡬希全家幸爾歸鄉土欲學龎公逺城府骨肉遭逢射弓弩卧疴兩月悟前非白生虚室春熙熙茹荼味亦甘如飴朝來坐起沐且櫛炙背茨檐抱雙膝七十八年聊記述懐呉中行老我平生頗閲人惟公知已絶無倫别來夢裏常論舊只說閑中莫厭貧湖海氣豪心似鐵庭闈親老鬢如銀遥憐歲晚家居好魚躍氷池入饌新寄熊元修佳兒發軔之官去名父居閑味道腴詩巻剩添兵後作酒尊常為客來沽江湖結社鷗盟冷遼海還鄉鶴夢孤煙水相望逺相憶寒雲欲雪晝糢糊寄武城知縣趙鵬南雙舄鳬飛下赤墀一行鴻澤撫黔黎昔賢過化絃歌地今代重興禮樂時春雨桑麻如杜曲秋風未稼即邠詩檗飡氷飲持三尺製錦功成聖主知寄盧公武兼問殷孝伯安信憶言雨别去途難喜得雲歸舊谷盤郡乘手揮狐史筆齋居頭帶鹿皮冠草生林舘皆書帶竹老溪園可釣竿獨念咸陽殷博士有無黄耳報平安送殷孝伯教諭之咸陽逺逰自是男兒志特立正當強仕年衣上宻縫慈母線擔頭輕束廣文氊春秋三傳繼絶學畢郢諸生得盛傳老我也須飛夢去振衣同陟華山巔䕶國寺對雨去年梅熟雨蹉跎豈意今年苦雨多偶食僧廬苔作脯忍聞田舍麥生蛾山禽滑滑題雙樹檐漏浪浪注九河往事共論魚腹恨近年平地亦風波和林韵黄梅落盡天猶雨白日晚來風更寒老去甚慙詩興少病餘猶喜酒腸寛舟中自古有敵國李下從今莫整冠蒲屋紙􅆤明似雪政須僵卧似袁安送性天之長老兼簡初士元大方厓兩禪伯方坐天寧古道塲􅃍辭雲水别河梁蕭蕭木落山中雨去去孤篷滆上霜白雪調髙人寡和黄花開晚自餘香南能北秀煩相問為覓平安第一方徙居横山口號為愛横山山水清山前築室小溪縈老夫枕石㸔雲卧兒軰求田候雨畊古井寒泉龍有宅孤村夜月犬無聲廿年兩眼風塵晴猶喜如今見太平二三農閭伍共煙霞數口清貧第一家瓦釜煑糜燒槲葉布裘添絮着蘆花交逰總覺鄉情好吟眺偏宜野景賖不見羽人王百八浪傳仙井委丹砂三清夢尋常繞薜蘿白頭今日此婆娑牕含風露秋容净簾捲林霏爽氣多浮世百年生處樂青山㡬度醉時歌莫愁猛獸藏林樾郡有劉昆必渡河四山北山南地盡耕人家祗欠讀書聲丹楓似我衰顔醉黄鶴如仙瘦骨清呉越喜逢連歲稔朱陳多續舊姻盟客來莫厭頻留宿新種梅花好月明次韵荅袁子英見寄萬國風塵百戰餘一襟氷雪五車書朝廷未賜延年杖鄉里聊乘下澤車鐡網珊瑚遺渤海玉峰鸂鶒異伊