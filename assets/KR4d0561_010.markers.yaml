  - {type: variant, offset: 8569, length: 0, content: '', WYG: 餘年來乃能與時浮沉不競不躁不貪不墨舊家氣習掃滌净盡故齋居之室題曰恬澹盖取諸内經養生之要旁㕘老莊而有得焉至如諸子百家之書亦能渉獵然文􅇨不露不求人知城居如子真谷口賣藥如君平賣卜簾常晝埀門或早閉衣布素若紈綺茹麄糲如膏粱由其氣禀之清資以學力斯恬澹有過人者每謂人曰人生固不能無欲也多欲奚為彼銅山鑄錢郿塢積金一姬傾斛珠萬馬如錦繡凡如此類孰不禍賈當時而遺臭後世乎言之必撫掌大笑傾倒而後已吁黄太史九原可作論二髙當有抑揚老夫贅言亦庶㡬奬勸之助云芸室記予耄無能為者乆矣嶄然骨立百念灰冷獨嗜學好友之心猶未能忘前元故交淪没殆盡每見後生少年能讀書通古今識道理且不為異端邪說所惑則愛重之同郡為忘年友者凡數人其一伯禮也洪武戊辰秋伯禮書來曰某居鄉城環堵一室有古聖賢經傳及醫書若干巻日用渉獵間以芸香辟蠧庋諸室中顔曰芸室望先生以警之書再至義不容辭矧予数相往來知其室無節梲之華無丹碧之飾無屛罳帷幄為觀美之資宴安之具闤闠中有山林清致木榻棐几圖籍左右薫爐短檠陶泓毛頴之屬晝夜為伍孜孜厥􅁱嘗謂人曰吾為醫家方技可以寓吾心之仁以濟夫人人故先之非以儒為迂而後之也吁伯禮言此其知道乎然九流百家莫大于儒儒之道莫大于仁伯禮知醫藥之方或未知仁之方傳曰已立立人已逹逹人仁之方也尼山大聖盖得夫唐虞三代之傳傳之萬世以康濟斯民非金匱石函之方可同年而語者請以是筆諸芸室藴諸身施諸人則吾心之仁不可勝用醫儒之道所謂竝行而不相悖者信矣是為記重建清微觀記夫師教之恩報同君親盖化之重者見于經昭昭也然道德五千言此非所先茍師道之不降則道德亦不能有傳矣今清微觀主周鍊師石泉勤而行之是能黙契禮經而獨超乎其類也洪武己巳春石泉書來謂予曰某追懐先師歸復故業丐先生為文識之予嘉其能而不却也抑嘗過丹陽聞諸鄉老之言其報師之恩藹然可見初邑人諸葛德齋隠居學道佩天師符命剏此觀為脩鍊之所既而羽化實為開山之鼻祖也弟子裴静山䓁住持以甲乙傳元末觀毁衆亦飄散或存或否洪武改元其徒朱竹軒言還結茅而居未㡬而}
