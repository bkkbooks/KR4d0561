front:
  text: 龜巢藁卷之四
  hash: sha256:542e483fa4712ba5b59fe716091dc96923c05d13b1640947687977fd3e43a4d8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0561_SBCK_004-1a}
body:
  text: 詩楊縣丞董役開白茅河晝夜辛勤以詩代簡畚鍤如雲穿白渠客來喜得問何如行庖只飲婁江水俸米頻供擔石儲人起四夷燒蠟燭霜飛兩袖坐藍輿􅎋勤左轄銀瓶酒為報功成有薦書劉旭齊過婁江客舍作詩贈之方欲題詩寄草堂逺勞移櫂到滄浪十年同飲三江水一笑相看兩鬢霜田野無人鴉種麥漕渠通海蟹輸芒馮君莫語悲秋事且復持杯送夕陽玉田喪側室作詩悼之豫亦次韵以慰其哀目斷琴臺日暮雲相如無復見文君最憐機上回文巧更憶燈前教子勤繡篋熊丸香尚在綺􅑵鵉鏡影初分江村一月黃梅雨誰為衣篝爇寶薰五叢涇送玉田徙碧山與龜巢鄰居傾蓋雨兩月同客天一方君今挈家去宅我龜巢傍為聞碧山好宛在雲水鄊朝紳多寄寓羣髦富文章將尋鷗鷺盟與我同六藏老婦堪夜績東壁分餘光客至亦可留覔酒過短墻巷無車馬塵屋有汗竹香籯金與床笏笑視俱亡羊惟存廣文氊讀書坐藜床閉門樂吾樂𬞞食猶膏粱清風北􅑵下懷哉古羲皇寄鎦景儀先生杏花春雨晴時别蒲栁秋風又颯然笳鼓新城嚴警邏溪山幽館喜安便校書還照青藜火煮茗應㪺錫谷泉近遇故交聞有信逺勞埀問念無氊龜巢仍寓黃天蕩蛙竈今連白水田自分犁鉏聊卒歲可堪兵革更飢年家居食指一百草斗米緡錢八九千瑣瑣旅懷言莫盡知君憐我似䕫蚿寄顔悅堂長老及崑山州學諸士友薦嚴永懷二方丈雙徑歸來舊竹邉林風澗月兩依然崑山恃立烟塵外婁水東流渤澥連坐有故人應念我客無此老共逃禪南能北秀煩傳語秋晚相過飲菊泉杜子才掾史擕詩見訪次韵一首白首無機心江鷗最憐我復有新相知時來與間坐一凉初過雨七月正流火先鞭君巳著短鍤我方荷壯君早騰騫老我常轗軻鄰君幸如此𢾗日何不可茅茨湖上居菱芡水中果後㑹期碧山合歡呼白墮更邀詩酒侣共載書畫舸中秋月如晝西溪捩歸柁玉山顧隱君自嘉興答詩詢僕近况且云經禪老亦望一見故復用韵自述簡諸故人𢾗椽茅屋一笻枝萬事無心獨愛詩詩債隔年償未了帶圍連月恐頻移吳田積雨生禾耳笠澤西風斷桞絲眼􅔄故知俱契濶抱琴何處覔鍾期次韵答戴麟隱見贈我生無他長耽書竟成癖鬚眉比白雪肝膽如鐵石所賴識前言頃步不妄適向來走風塵朝不能慮夕行囊既羞澀家纍且繁劇隨身一破硯百指全仰食驅馳今九載未始一日閒豈不懷故園松菊怡我顏長蛇及封豕出沒咫尺間逢人問親戚野坐荆屢班不見雁足書徒視刀頭環遙憐金斗城如望玉門關憶昔重九時鄉鄰雞黍約黃花香可愛白酒味不薄東家復西家相邀總難却負郭有二頃平居得三樂朋逰結詩社時時共吟噱溪澗采蘋蘩春秋奉祀禴幾回乘天風欲跨揚州鶴那知一顛沛江湖竟漂泊移家碧山下家具少於車幸均適相逢同念去國賖聚如水上萍散若風中花或琴教河汾或玄授侯芭交情比投漆子弟亦通家詩筒頻往來瞬息經兩稔壯君多志氣將衣買臣錦我志忘功名但就吕公枕三江五湖水共喜魚不淰萸觴了佳節藜床甘且寢春日方遲遲秋霜俄凛凛好客多釀酒願作東林沈寄丁彥誠旌旗滿眼各西東不見桃源我轉蓬兵後即知還舊宅客來曾辱寄詩筒石田種秫梁溪曲茶灶分泉錫谷中最喜西􅣘山色好青霞不染俗塵紅贈沈彥肅典史兼簡王景德空山寒雲白如雪歲晚高軒過岩穴三生石上拂蒼苔一笑梅邉有明月床頭釀得松花酒思與故人傾瓦缶煩君為問王猷子剡舟肯棹同來否旭齊歌次鐵笛先生韵旭先生行年七十餘耽書樂且孺白駒過隙莫可留欲把長繩繫烏兔囊無一錢任羞歰腹有羣經飽撑拄論交貴在見肝膽不學時人口相煦有時醉吟詩其巧猶凡注快若爬背癢十瓜倩仙姬昔賢只讀圯上編便遇君王借前箸先生豈無策可用草廬未有人三顧青山白雲古圖畫床筆茶灶今家具居吳十年食破硯硯田幸喜無租稅秋風籬落霜葉隕枯蔓蕭條繫寒瓠西伯何當獵渭濵載取匪熊後車去次韵題鄒明夀草堂併簡劉旭齊賔主東南美溪山繞屋廬經鉏百戰後版築十年餘木落西風急􅑵鳴夜雨踈侁侁二三子燈火案頭書答楊獻可見贈憶爾梁鴻山下宅園池不減李文饒一朝猛雨鶯花去十載東風燕麥搖客裡相逢聊慰藉樽前一笑共歌謡君歸不負青山約好似誰南早見招寄因本初􅊰主愛爾吳江水西寺門前流水碧於苔松花布地金無𢾗蕉葉翻經紙萬枚􅊰席每留詩客坐浴堂曽為國王開别來雨洗秋容净凉入袈裟亦快哉答謝楚芳栁城一别十五年别時玄髮今皤然無聲詩與有聲畫彼此贏得虛名傳君家有子為時出且喜讀書兼讀律絶勝吾兒但筆耕三徑蓬蒿塵滿室老天縮如龜六藏思君見之羔與墻移家同飲太湖水尚期東壁分餘光代簡崔宗明掾史二首孤坐馳遐想羔墻見若人宫墻今畫省家世舊朱綸南國梅花早北堂萱草春慈顔應有喜過客總儒紳其二落葉擁柴扉吾兒日暮歸手持毛義檄身著老萊衣客路風塵久青雲故舊稀何當報一飯不遣此心違夀徐主簿昔君濯濯如春栁鞍馬日隨丞相後翩然提劍掃蠻烟欲取黃金印如斗一鞭徑渡浙河東東南滿眼旌旗紅手援赤子出塗炭慈溪草木生華風長嘯歸旌行復止濯髮松江太湖水鱸魚􅐜菜非不佳總憶山家舊桃李君今草堂宅東郊有田可耕山可樵堂上慈親足甘旨相知與結桑麻交金門玉堂紫薇省無復回頭看畫餅但愛鵝津秋水清雪色蘆花一千頃豪吟往往似謫仙但不持杯醉花前杯中之物時有禁煮茶多費惠山泉龜巢老翁不浪出逺來為君作生日草堂此日題此詩風竹四簷吹觱篥申仲義録事自杭州來議論慷慨風節可喜作此以贈客來試問錢塘事冠蓋都非舊日人尚喜西河堪種栁不知東海欲揚塵手題王粲登樓賦頭戴陶潜漉酒巾如此江山如此客政須傾倒洞庭春啓之沈丈立春作次韵和之何物淮夷久亂華東風依舊滿天涯春盤薦酒杯頻舉醉筆題詩字半斜無𢾗故人俱契濶一雙老眼近昏花家貧賴有長鑱在坐待青山長蕨芽徐伯樞仲剛來云鄊僧刺血寫華嚴成好事者為之盛集緇素送經置吳門無量夀庵時有人以兜羅綿拭經綿化佛手觀者異之贈言盈軸徐伯仲徵豫詩不已故檃括佛氏作此貽之吾聞兩足尊化身千百億諸相即非相非空亦非色云何兜羅綿變現佛手出華嚴海無量本無塵可拭隻手挽頽波正賴佛之力譬如水中月在處照澄碧若以色見之癡雲暗如漆由來標月指具眼當自識莫春陪周明府過顧將軍祠下看碑黃天蕩上將軍樹樹下𢾗家人姓顧行人遙指若堂封往事猶論麾扇渡新祠畫藻烟霧􅊜古木垂羅鬼神護長洲縣令枉髙蓋短褐巢翁曵雙履海棠正落胭脂雪山餅為酬金盤露柱頭老鶴作人語道傍馴雉隨車駐吳趨一曲歌未了蜀魄𢾗聲春又莫金戈鐵馬尚酣戰白羽清風誰復覩看碑莫怪客如雲彼君子兮真可慕端午日徐伯卬過寓所以詩見示次韵首折一南湖風浪惡客至喜且驚連日雨不止明朝隂又生划船海中歸戰鼓江上鳴端陽一杯酒忍聽歌霖零簡徐伯卬淮海十年猶亂離清江一曲自棲遲門前才送催租吏籬下還吟采菊詩世事紛紛何日巳襟懷瀟灑少人知卜鄰欲近蘆花渚我亦扁舟理釣絲寄徑山及以中長老重攬凌霄絶頂秋歸來笠澤繫孤舟青山何處無黃犢滄海相知有白鷗六合雲開天蕩蕩百州風靜水悠悠試聽漁父滄浪曲江上蘆花亦㸃頭夀慶治中日下歸來年復年之官未上浙東船人憐垂老身長健自喜居閒志益堅好客每呼鄰舍酒教兒不惜買書錢試看尚父鷹揚日渭水秋風雪滿顛次韵寄題碧雲禪老上海縣山居四絶青松種來過屋長松濤六月生秋凉香凝笏室靜如水道人觸法俱相忘住菴人似南泉老無𢾗青山在屋頭眠鹿階前金布地西風吹老桂花秋門前問話人立雪想像吾家遊與楊靈禽盡得響天樂老雁獨憐隨稻梁海上諸峯絶㸃埃浦泉流水碧于苔何當借與梅花屋我亦移家嵗晚來又和律詩一首笠澤東連海好山青更多逺分苔脯供兼寄草菴詩拄錫僧方去携琴客又過送迎門不出奈爾懶融和寄沈德齊入城每問東林老避地今居巢海頭秋半即嘗菰米飯冬初已著木棉裘青衣搗藥鄰鮫室烏几燒香對蜃樓我欲移家相近住釣竿煩為覔滄洲為源長老贈醫士單子達老我無他技憐君正妙年父書能盡讀醫術得親傳舊隱荆溪上今居笠澤邉幽蘭紉古佩采藥洗春泉鶴守燒丹室鷗隨載酒船每聞驅二豎近喜活枯禪優鉢微含笑頻伽喜欲顛却還青玉案持去白雲篇髙誼能如此明時豈舍旃政須醫國手為我救顛連普大雲􅊰主以紈扇畫蘭見惠作詩謝之時雲在吳江普渡院􅊰法華經學徒甚衆上人遺我白團扇扇上復為蘭傳神足知清興逈絶俗更覺幽馨時襲人猊座􅊰經雙樹下龜巢織屨五湖濱明朝相約看山去不怕西風揚逺塵寄朱道源昆季太湖三萬六千頃流血水腥江海連幾次焚舟成赤水壁有時飛炮落青天雞蟲得失那能問鴻雁飛鳴亦可憐若箇桃源堪共住也須容我釣魚船臘月二日偕俞寬仲過篠涇僧舍䝉舉示近詩次韵一首故國溪山各逺離倚樓長笛為誰吹相逢上海三生石共惜邉風兩鬢絲客舍暫如枽下宿世途危甚劍頭炊明朝褁茗西菴去更約匡衡細說詩徑節亭詩為中半雲􅊰主賦我夲山林人此君與羣居頻年避戎馬出走荆棘途雙溪適相遇嵗晚氷雪餘蒼顔固云老清氣方凛如儼然古君子節徑心仍虛紛紛桃李花榮悴才斯須長松髯如㦸亦作秦大夫我思首陽山竹君兩遺孤髙風激頽懦氣節與君俱之人不復見見君如友于此意知者誰居亭老浮屠緑琴為我彈碧酒為我沽萬事付一笑嗒然我忘吾懷徐伯樞諸友一昨方卧病妻子呼避兵扶持上輕舟烽火照夜明問兵今逺近言圍闔閭城賴有風滿帆送我東南征三宿坐不寐鶴鳴近華亭晚泊青龍江蘆葭匝地青新知適相遇留我居篠江土風頗淳朴地僻雞犬寧吾病日以瘳客來能送迎老叟心自憐或謂詩骨清比鄰兩三家情親若平生園蔬日持送酒壺時共傾對酒不能樂憂虞未忘情懷哉𢾗君子雨打水上萍漂落各何許吾將尋舊盟賣刀買黃犢子孫共春耕奈何西枝西炮石猶雷鳴偕俞仲寬逰普光寺俞作詩紀行豫和首折一繞屋踈筠玉有光沿階細草翠生香林藏鹿苑雙溪曲路轉龍江十里強蕉葉翻經人自樂槐根做夢蟻何忙白衣二老來聽法甘露醍醐得試嘗臘月草日㑹林才元于普光方丈詞氣峥嶸吐玉虹山林興與老夫同獨憐幽草來西澗共聽枯枽叶北風四海十年兵火後雙溪一笑夕陽中評詩為掉樓卿舌似勝儀秦諂七雄送和彥良兼簡朱端卿移家喜得好林泉甫里先生古宅邉憂世頗添新白髮投書還坐舊青氊秋風茅屋都無恙臘月梅花正可憐我友古人多古意斷琴煩為續朱絃贈張孟文青龍江水清如玉青龍故家書滿屋中有郇公七世孫一目五行能盡讀科名未欲拾地芥燈火長如校天祿有時述作繼風雅三國六朝車並轂手揮赤血拔鯨牙琴斷玄文裂蛇腹雙溪近傳寒食句又出唐人一機軸相逢說項人益多宛見清標立霜竹我生愛詩入骨髓老去窮吟鬢如鵠金張許史懶折腰沈謝曹劉長在日江頭偶泊避風船故山將歸采黃獨金盤不必贈檳榔願覔奚奴珠一斛次韵贈木蘭亭上人庭前手植婆羅樹樹下頻翻竺國書失鹿不知秦二世葬魚那問楚三閭園收柿葉皆新紙林養松花當宿儲十里雙溪春水緑浮杯時復訪樵漁余患癰疽適兵後無醫藥可療即事口占併寓感嘆吮疽人在五侯家市肆都無藥可賖童子歸來風雪夜老夫愁絶對梅花次韵徐伯樞見寄二首病卧碧山久添愁白髮新一冬無雨雪四海尚風塵妻子移家逺親朋折簡頻梅花應笑我出語欲驚人其二客夜牛衣薄王春鳳曆新東南蛙角地多少馬蹄塵鼙鼓依然急壺觴莫厭頻君看塞翁馬得失豈由人奉贈薛宗師及于薛二真人論道清寧日承恩紫極天星言辭輦轂雲卧樂林泉虎衛燒丹室龍耕種玉田居山閒宰相行地活神仙清問時猶及玄談世共傳春秋今近百弟子動成千入室稱于薛承歡度嵗年蓬萊方丈外磧隩澱湖邉别墅三花盛深居萬竹連玉桃紅綻雨瑶草碧生烟麟脯供仙饌鸚杯舞醉筵雲璈齊上下霞袂各褊􅝆福地風塵逺壺天日月懸目光方炯炯眉夀正綿綿老我頭垂白尋師志在玄飄零隨草芥佩服集蘭荃欲進圯橋履重來笠澤船山靈元有約石髓未應堅析理秋毫末研幾太極先黍珠當一照光彩徹天淵早春訪蔡君立家以詩見贈次韵答之老夫藜杖病初起幽谷蘭花喜正開持酒對花留信宿題詩賦竹約重來一犁新水初春雨百蟄皆驚半夜雷嗟我無錢堪買犢歸耕心亦冷如灰正月草三日過許君善竹所留六日日蒙置醴且出諸畫卷命留題焉茅屋秋風杜陵老桃花春水許家墩連宵共剪西􅑵燭每日頻開北海樽童稚間譍知揖讓鄊鄰見客問寒暄遲留不厭逢多雨喜得題詩萬竹軒余過橫塘訪趙朋南先生值回錦溪遂留許徴士家雨􅑵因覽元夕之作次韵代簡行路難行久不禁尋君欲吐别來心十年飯顆詩容瘦一病文園渴思深鹿浦繫船逢積雨客􅑵拄笏見遙岑誰能縮地仙人術共聽花枝快活吟安素齊詩為髙彥舉作羲黃世云逺淳風浸凋零紛紛慕浮華形役心靡寧惟爾為觀者於物淡忘情天君常泰然月白霜潭清美玉非不沽沽之價連城向來莘野農釋耒即阿衡磻溪釣魚叟飛揚乃如鷹湯文茍無遇耕釣畢此生懷哉古之人安素斯足稱溪西小隱詩為許君善作馬鞍山南三十里鹿虞浦接橫塘水桃花兩岸小橋西蘿屋𢾗椽修竹裡先生頭戴烏角巾青鞋不踏東華塵扁舟溪上釣明月長鑱龍頭鉏白雲客來看竹呼鄰酒客去對山開北牖琴彈古調每橫膝筆寫新詩長在手自言得句如得官富貴却作浮雲看青山有約如不爽白鷗之盟奚可寒箕山久矣人寂寞眼􅔄誰能如此樂文章多樂鸚鵡洲衣冠俱上麒麟閣老夫幽懷欲與論移家今近西枝村風清月白憶玄度莫怪杖藜來叩門題孫彥學所藏江貫道清江泛月圖吾聞老郭之傳許與江山水絶筆稱無雙此夜圖景江所作倣佛秋聲動林􅊤長江沉沉月在水逺山蒼蒼樹如蟻如此江山夜放舟若人真是逍遙逰爾來一百四十載陵谷變遷圖畫在世無蘇李兩詩仙赤壁采石俱蕭然老夫此興固不少解裘亦足酤清醥出門有礙行且休不如看畫梅上頭雪山圖憶昔山居擁寒雪夜半讀書聲未歇長林月在掛猿枝幽谷風生藏虎穴十年奔走避兵塵手持一竿滄浪濱適因看畫長太息青山頭上亦如人普講主寓普度蘭若十一月望為逰軍撿括是夕以藁秸䝉首露坐陸氏莊埃燼中怡然賦詩豫嘉其言無瞋恚和而美之道人心如如說法無定處無喜復無瞋亦無諸恐怖初聞戎馬來杖錫出普度羣氓棄家走子女多失怙或遭刀箭傷或受係纍去或作吞聲哭或為折腰步裸跣走且僵烟塵晝如暮師時在中野亦值一强禦惡狀冠羣醜丹青筆難措脫我僧伽黎問我石頭路搜索祗園金撿括青州布區區身外物自謂無足護把茅聊蓋頭露宿吟古句干戈雖未息江山喜如故相期看餘春牡丹花貴富和趙朋南春詞四首落梅風急綺疏寒􅉉鐵鏘如響八鸞堪笑嬌癡兒女子折花騎竹繞長干多謝提壺不住鳴杏花枝上月三更銀􅎆㵼盡葡萄緑祗為傷春醉不成小閣鈎簾待月時燭花頻剪夜何其惜春不奈春宵短翻憶秋宵玉漏遲花拂盆池入鏡光桞搖臺榭弄鵝黃晚來頗覺東風惡分付薰籠爇暖香遊南山和徐伯昻韵諸君南山逰豪吟氣憑凌惜無龜巢老拄杖携赤藤俯觀陳湖水一槃秋露澄吾兒躡吾屐樂與君共登坐花籍苔茵樽酒空十朋垂楊細腰舞不費纒頭綾羡君方妙年文章有師承譬彼學佛者當為大乘僧滂沱夜來雨紅日喜綵升楊花飛渡江茫然白雲騰晨看有聲畫妙若曹不興兹山賴有傳詩名與俱稱和臨寒食有感五絶何處登臨散客愁千墩浦上聽漁謳清明落盡梨花雪能得東風幾日逰憶得少年寒食日落花塵上馬蹄香六龍城郭春如畫那得旌旗帶雨揚烈塘墳上樹如雲一掃東風十五春不信令威歸不得竟移華表屬他人一徑落花春晝靜四鄰嘉樹緑隂繁兒曹忘却還鄊意浪說春風似故園白髮蕭蕭客未歸凄風緊雨禁烟時青苔白骨尋常事堪笑田文為客悲遷居逃難居頻徙幽懷孰與論崑山一舍地湓浦𢾗家村老去仍為客朝來又抱孫雨餘春酒緑生意滿東園聞玉山顧隱君以賦役入城負疾而歸而山中花竹多有區區懷思寄詩代簡聞道龎公也入城還家風雨近清明催租人去詩仍好市藥童歸病已輕尚喜竹林青筍出不嫌花徑紫苔生野夫得此平安信尋訪姑遲𢾗日程哭杜玉泉處士二首每憶城南杜今為地下郎好詩留巨帙遺像在髙堂濯濯孫枝秀離離宰木長可憐枽與梓春雨竟凄凉其二東郭溪山勝南園花竹深平生多樂事之死遂聞心掛我客中劍撫君床上琴回風吹桞雪和泪落衣襟四月二日林自瑶城歸寫呈遷屋詩四首因以述懷併記時事鶴長鳬短世難齊滿眼風塵客路迷灶突未黔居未徙兒曹况在兩湖西六幅蒲帆帶雨開瑶城艇子過湖來老妻正倚門前樹雪色楊花覆緑苔僦得山居鑿井深客來不厭煮茶頻屋頭驀地顛風起狼籍桃花滿樹春鬢絲垂領白毿毿老我身如作繭蠶午夢忽驚飛炮響狼烟只在澱湖南豫往哭杜處士過松江問途乃知其弟玉溪亦殂去兩月追懷夙昔作詩悼之往歲留三宿今晨哭二難榻懸無復下琴斷為誰彈溪竹春雲散庭花夜月寒悲乎浮世事長夜雨漫漫答徐伯樞見寄二首十載風塵走朔南白頭如雪靣如藍借車載具家頻徙應俗為文筆大慚茅屋雨添苔上壁竹籬烟護笋抽簮别來行路難行甚何夕挑燈與細談杜宇催歸不絶聲知君㱕計正留情東膠茶焙春烟暖西堠花村夕照明音信尚煩黃耳寄友情不負白鷗盟明年築室相鄰住兒輩求田與力耕邀管伯齡許君善鄧宜之端午小集十年端午長為客一笑今朝有故人江草碧搖書帶净石榴花摺舞裙舞新潮生小巷通船路風拂幽軒振席塵酒襟未開罍爵恥茶鐺爛煮兩旗春邀月田上人借得溪鷗半席沙相期來吃趙州茶渡江剩有蘆堪折日落潮回即到家次韵答許君善見貽憶昔平居頻㑹友家有秫田共釀酒安知今日對端陽無酒可澆談笑口客來置茶聊解羞強將車轄井中投清風緑樹北􅑵下時聽一聲黃栗留西山雲起日將暮斯須雨暗橫塘路銀燈才㸃即生花為我許君青眼過顧我心如醉顔如酡憂時未寧奈老何明年此日復此㑹此詩當遣玲瓏歌即事黃梅落盡雨初晴客舍青苔四壁生鐵炮打城聲動地老妻猶訝是雷鳴代簡大雲􅊰主天竺之書五千卷吾師以之全藏轉蚤年手握摩尼珠飄然擲錫逰天衢歸來濯足太湖水從此一龕兀坐如枯枝有時忽作獅子吼狐狸野牛顛倒走有時間寫山水花花光之梅作清友近聞有約過貧家貧家掃門迎象車欲知老夫何物作清供湓隂小圃自種崑崙瓜朱公路縣丞和徐伯卬詩見示不為險韵窘束豫甚喜之復和一首以寫起敬之意瓜廬松水西溪山勝東陵玉立開徑竹纓垂刺􅉉藤善養氣不餒靜觀心澄澄白雪少人和青山與誰登稽古蓄萬卷問竒來逺朋顧余犢鼻布不識馬眼綾來詩清可喜玉露仙掌承想當締思時寂如禪定僧詩成掃巨筆墨汁飲𢾗升干戈有時休雅頌當復興願同杜拾遺一代詩史稱夀張實甫我愛龎德公躬耕亂離日以安遺子孫此計真第一君今床頭金有餘傳家之計乃亦如况入東林逺公社每誦西竺空王書幽雅久矣機心息鷗鷺相知真莫逆獨憐丹穴一鵷雛偶爾西飛歸未得願言晚節金石堅河清復見升平年明年此日夀觴舉三鳳聫翩即罷前寄贈勝無能上人雙林舊宅今蘭若百丈清規老作家燈燃佛龕無晝夜榻留禪衲共烟霞屋頭青覆娑羅樹池上紅開菡萏花六月香風清似水野夫曽此坐鷗沙丁未夏六月寓真覺菴𢾗日日賦小詩以寫目前之景適大雲師遺雙清圖足成十首祗樹園林舊雨荒僧廬今喜近滄浪我來一榻南􅑵下分得溪風午夜凉臨溪照見影􅏢􅏢老我頭童狀若僧堪笑讀書心未死夜來猶對佛前燈燭龍銜日出東溟飛到天中落火星莫怪懶慵門不出一林翠竹風泠泠荷杯飲露比名酒松鹿生風無俗談日落清蟬吟未了雨來白蟻戰方酣髙堂無塵清晝遲山僧持鉢未歸時白衣仙人坐相對净瓶楊栁青垂垂客來自汲煮茶泉躄足浮屠亦可憐借我石床箕踞坐有時間說趙州禪棕鞋不襪苧衣輕好客何妨日送迎試聽炮車飛霹靂將軍觸熱正鏖兵雙林一室養微疴列坐羣緇問若何不用散花天女輩儼然無語老維摩芭蕉葉上遍題詩更覔吳箋寫竹枝過客莫嫌人寂寞鬢絲禪榻正相宜生愛梅花與水仙故人摹寫寄林泉披圖净拂燒香几何異長齊繡佛前普􅊰主過千墩偕余訪許溪西出普公曩嵗所作水仙花求普為重記嵗月俾余題其左云梅兄礬弟總不見邂逅獨覩凌波仙雲翁指㸃笑相語為我傳神三十年簡蔡君立從事齷齪布衣老生無晉人風杖藜相訪不相見興盡適與王猷同出門喜清飈天氣凉蕭蕭重雲忽迸日六合如洪窰東屯行行行且止賣藥人家杏林裡蜚亷意若迎我歸南薰轉從西北起快哉一披襟長咏出舞雩老夫此興君必知黃金不用鑄鍾期歸去來兮湓水西與諸友論詩次朋南韵每見故人詩不俗恨不移家與連屋人生有詩可傳世萬事無成心亦足嗟哉風雅絶遺音斷絃未有麟膠續三經三緯機軸在文士疇非賴私淑屈原吐詞蘭蕙香能襲餘響馨惟宋玉兩京豪華六朝靡聲律由唐轉覆宋草堂先生獨冠佩進退委蛇氣容肅孔明廟柏一品題儼然菉竹森淇澳要之煉詩如煉丹九轉功成龍虎伏秋髙當約許玄度妙法參之老尊素次韵答朋南重九之約重陽無酒不須賖看菊柴枽處士家只恐滿城風雨到客􅑵岑寂對􅉉花贈筆生王伯純時方用武我業儒王生賣筆來吾廬生成世業霅溪上製筆特與常人殊宣城阻兵十三載猶喜山中老㕙在拔來秋頴帶微霜縛得銛鉏含五彩昔年草制供玉堂玉堂仙人雲錦裳三縑一字不易得筆價亦與時俱昂莫怪年棄如土掃滌風塵必斨斧生今賣筆我賣文何異適越資章甫呼兒亟用買一束為我寫成懷古録吾兒作字三嘆賞八法以之隨意足我有好音生可知用筆將見文明時諸公諫筆佐明主老我耕筆箋古詩逝將重作毛頴傳為記頻年遭薄賤牽聫為生書姓名守業不隨陵谷變中秋適逢酒禁開椰瓢酌生新潑醅酒酣仰視月中兔長嘯一聲歸去來盧志道馬公振以滿城風雨近重陽為詩首句各賦二絶同日見寄要余和之滿城風雨近重陽一望蘇臺百感傷臺下伏尸多濺血秋花不似舊年黃滿城風雨近重陽門巷蕭條草木黃茅屋破來天更漏誰能補石繼媧皇滿城風雨近重陽籬菊花開酒未嘗四海兵戈無了日十年書劍客他鄊滿城風雨近重陽猶喜觀山目力長風雨晴時山更好也須携酒拄車傍兩年九日情景不同口占二詩聊述梗槩去年重九日烽火接三州黃菊無心看青山滿眼愁風霜新鶴髮塵土舊貂裘為覔桃源路拿舟到海頭其二今年重九日兵破闔閭城紅粉宫娃毁黃金郿塢傾老懷多感慨歸思轉縱橫賴有茱萸酒開軒看晚晴旭齊劉先生四明隱君子也客吳𢾗年日以詩酒自娛時與豫相善丁未秋年七十有六自謂不久于世為志墓之文及賦自挽其詩曰知非才戒酒送我但吟詩且邀豫以詞挽之豫既為贊小像後五日乃携酒詣崑山勸飲故有是作天生劉伶愛杯勺杯餘更以詩為樂有時痛飲發豪興徹夜長吟追古作胸吞雲夢氣峥嶸筆吐珠璣光錯落知心每恐化湯烏見面俄驚作癯鶴為嫌八達太踈狂乃效獨醒甘寂寞髙陽人笑老癡漢杜舉身遭束高閣我來黃菊似含笑喜坐對青山論酬錯舉觴一笑口復開蓋棺百年心不怍金龜足可換新篘玉兔無勞搗靈藥偃月堂前丞相死齊雲樓下降王縛眼前事世等蟻夢身後虛名等螢爝何如間策鐵拄杖時復醉傾金錯落吾詩便作薤露歌活挽先生薦清酌張伯庸在郡城被圍𢾗月間道而歸賦詩賀之雁書到手人方喜虎口脫身君已還難似上天行蜀道險于中夜出秦關桞營鼓角邉聲逺萊子衣裳喜色斑百斛葡萄新釀熟歌童莫放酒杯間方池詩為馬公振作携我方竹杖看君方池方水宛然俯中庭照影月明裡清風生蘋末素練吹不起魚樂魚自知主人亦應爾和許君善郊居十首秋色滄茫日落斜鯉魚風起荻飛花先生晚酌依稀醉吹笛漁童恰到家書畫船頭吐白虹談玄麈尾灑清風繞籬種得陶潜菊時復看花酒一中階前幽草比琅玕屋上慈烏即鳳鵉老我山林友麋鹿不知貔虎尚桓桓流水柴門不厭貧古今曽見幾何人山中松菊陶元亮谷口犁鉏鄭子真怪􅔄深秋氣候溫野花成子竹生孫𢾗椽衡宇清溪曲風雨蕭蕭晝掩門竹有幽軒水有渠閉門不出十年餘一編修得梅花譜又注神農本草書朝野新聞總闕如經鉏甘分老迂踈客來留喫雕胡飯旋斫溪頭出網魚窮到無錐纍始輕黃金何用苦留情姑蘇臺榭新如畫又被西風一夜傾不見魯山元紫芝干戈滿眼少陵詩采樵何處青山好逢著仙人且看碁一雨洗兵秋可憐東吳香稻熟紅蓮許家墩下斜陽外無𢾗飢烏落晚田淮夷篇大邦浙河西吳郡稱第一淮夷著柘黃來作豺虎窟交𢾗無善道西顧距徑敵一鶚攖網羅同氣頓蕭瑟正朔仍奉漢天恩滿床笏賦粟嵗倍蓰郿塢金日積非無舶䑲風海運不挂席包藏狼子心反覆莫可測臺閣兩重臣忍為梟獍食井蛙自尊大出入復警蹕愛弟寵且驕開府門列㦸提兵幾百萬勢熱手可炙甲第連青雲圊溷亦丹碧瑶池長夜飲天魔舞傾國幃幄皆面諛忠鯁即麾斥權門競豪奢婪婪務懷璧淮南舊巢穴坐視城棄擲出師理侵疆所向輒敗績鄰兵賈餘勇一舉𢾗州得羣凶納降去孤城獨堅壁奈何圍𢾗重樓櫓比如櫛炮車拂雲漢晝夜飛霹靂寵弟既虀粉左右皆股栗短兵屢相接苖獠與戮力南濠百花洲流血水盡赤閉關甫期月人面多菜色𬞞食猶八珍骸骨㸑下折衆叛巳不知豕突猶親出前途忽投戈回騎不𢾗匹一炬齊雲樓妻子隨烟滅縛虎送臺城咆哮氣方息嗟哉爾淮夷富貴亦巳極雕墻􅔄滅亡其理信弗忒十月過吳門無𢾗雲梯盡未收髑髏如雪擁蘇州僞王守死空遺臭降將偷生忍負羞鹿走荒臺千載後烏啼野樹五更頭篙師也為愁無寐不待天明已放舟過無錫書所見一首朝發吳門東暮宿錫山下隔墻語嗚咽云是流移者生來本村居白首事耕稼居城僅期月區區避兵馬狂奴稱老虎嘻人空四野城降人出關方幸虎遭咼里胥俄促人負郭一網打監官驅上船寸步不少假不知遣何之骨肉忍相舍語罷哭聲悲涕與淚交㵼同行十𢾗人瘦骨皆一把鐵索連係頸俯首若喑啞天髙恐無聞爾悲知者寡歸故里一首憶昔走避兵棄别鄊井去意將朝暮歸行行重回顧安知今一紀方踏去時路四郊皆蔓草白日暝如霧披榛訪閭里隔水拜先墓傷哉鶺鴒原黃蒿走狐兔别墅破墻在郵亭乃新作鄰兒二三輩茅茨晝扄户相見不相識熟視肖厥父坐久泣且言為我語親故什九死兵戈餘亡不知處其詞吐未終我淚已如注對食不能餐相期歸蟻衆吾將語吾兒賣書買農具歸耕溪上田宜若烏返哺吾其正丘首此心庶無負戊申歲訪朋南執中二趙君皆連床夜話極談今古時朋南以草亭自號工詩有唐人風致不茍作也越信宿作詩眷留臨别復有魚米之遺執中亦和詩示余意皆有餘而不盡也後十日次韵二首其一寄題草堂兼謝所遺一以寄執中以述交契之厚云圖畫蘭亭跡甚陳溪山何殊草堂真晉人標致清談妙杜子詩篇下筆親客至合歡常盡醉我來留宿豈辭頻還家飽喫魚羔飯更喜瓶儲玉粒新經嵗離懷得具陳酒杯深淺兩情真老夫生賴詩書力良友交同骨肉親楊桞錦溪春尚淺綺羅鐙市雨何頻别來十日牛衣卧世事如今又一新和施天朋即事二章章五句吳儂頭白雙眼昏夜逃松上烟水村老妻剪𥿄招驚魂問之不說苦徭役但言入地恨無門吳儂十年遭亂離飛芻挽粟精力疲哀哀婦子皆瘡痍春來破屋雨連日疑是淚從天眼垂戊申春浙西僧尼道流凡主寺觀者皆集金陵蘇州萬夀寺長老愚隱師亦在焉僕嘗夢寐中與談今昔且問及剛中毅公故賦此以寄二老夢繞鍾山訪舊逰共看江水話閻浮隴西鸚鵡金籠閟海􅔄珊瑚鐵網收刀尺尚須成妙用鉢盂未得賦歸休别時問我雙峩老為道身如不繫舟寄侄僧德無言二首謝村菴居折時在金壇西紅梅閣下夜連床一别經年十二霜爾父爾兄俱即世我孫我子未還鄊西林卓錫青山好東海垂綸白髮長何日與言生死事更論松菊故園荒嗟我成童即棄家住菴鈍斧老金沙篋藏林下翻經葉瓶養山林供佛花浮世夲來同一宿歸途必合駕三車白頭癡叔遙相憶燈下修書字半斜馬公振以久雨懷思作詩見寄適千墩諸友朋為謀道旁之舍因和及之併發巨浸之嘆云芳草凄凄春復春桃花應笑未歸人𢾗椽矮屋清溪曲一箇扁舟緑桞津且與往來乘欵假從教圖畫上麒麟老妻頗勝劉伶婦不惜春衣典酒頻吟罷秋風破屋歌不堪春雨復牽蘿無人為補青天漏滿眼愁看白水多階下縳橋兒渡蟻門前換字客籠鵝可憐豪氣三千丈方覔堯夫十二窩公振和許西溪韵併簡老夫次韵答之世亂已如此年飢更奈何城池百戰後風雨一春多有酒客同飲耽詩病亦哦老懷聊自遣頭髮未全皤和周明府留題趙靈寺大澤水環金剎地小樓簾􅐈玉山烟桃花雨濯江邉錦榆莢風飛地上錢人世屢驚天柱折佛光還自月輪圓衲僧㑹得頻伽語也學詩人拜杜鵑田家謡花朝一雨連寒食水沒吳田深三尺田家壁立杼軸空逃亡半作􅗂中瘠農官令下星火飛勸農踏車農苦飢産灶之蛙斷烟續藜莧煮來青葉肥商羊舞如獨腳鬼天瓢倒傾恐未巳水車恨不化渴龍一口吸盡西疇水我謂爾農毋怨天堯田水溢亦九年但有人能拯飢溺即令四海無顛連請君試聽踏車鼓鼕鼕聲中含疾苦天門九重路修阻此聲何由徹明主趙貞白挽歌詞前代衣冠族先生山澤癯淳風振薄俗髙誼揭中吳舊債焚餘劵凶年賑餓夫紅塵無足跡白雪滿髭須鐵硯磨來磷籯金視若無蹇豫牛馬走愛爾鳯凰雛卜宅來依倚通家學步趨玉枝才有汗瑶草遽成枯敬下墳前馬仍瞻屋上烏典刑無復見老淚落鮫珠寄謝朋南執中中行諸友兼簡楚岡滄海二禪伯錦溪水流無住時我思故人心如之扁舟來繫溪上桞六月初三新雨後常年大暑金欲流今年天氣凉于秋故人相見不相舍水竹軒亭榻俱下東家談復西家西家碧筒㵼流霞醉抽吟卷看珠玉夜􅑵剪尽如椽竹明朝竟日復留連月在栁梢方解船瀕溪更有好僧舍古木隂森正宜夏龎眉兩僧亦可人茶鐺長煮小園春但欲移床就泉石共聽松花坐終夕簡熊元修憐君苦有軟腳疾愧我貧無挑藥錢此日尺書重問訊何時杖䇿與周旋湖鄊地􅊜黃梅雨舍館􅑵含緑艾烟猶喜東家人好事銀瓶長送酒如泉奉贈吳逸菴先生頭髮烏如漆上夀明年八十三豈有神仙傳祕訣尚看孫子著朝簮燒香看畫湘簾􅐈留客題詩緑酒酣堪笑野夫扶醉别出門更與阿戎談寄張伯祥兼簡顧玉山尺書曾去墮浮沉嗟我懷人意未休兩地共看千里月西風又換一年秋牧羝餐雪猶歸國買犢耕雲且素侯暇日煩尋顧文學為言相送愧鄒逰石箭頭歌併序丙午冬吳人自望亭驛鑿渠通漕湖深丈餘乃得石箭頭長洲徐伯昂氏以所得之一見遺一以遺倪元鎮請各賦詩南山爛盡蒼雲根飄風勢欲傾崑崙何物老砮作遺鏃神鬼削秋無㾗沉沙不隨戈㦸折太隂玄精壯氷結五丁假手出重泉猶帶堯時九烏血羵羊膽肝破尼子走折足猶有老於莵坐嘨風滿谷猿臂將軍骨巳枯蒼頭盧兒金僕姑時乎時乎奈爾砮次韵集􅊰主見懷君今風北我枝南燈火餘輝借佛龕老去著書酬素志客來揮塵接清談逺公沽酒能相引中散琴鳴豈不堪且喜早秋頻雨襟懷無復鬱如惔偕大雲大成二􅊰主及學上人宿聖像寺詢無言山房作西晉招題屋半催江流依舊碧縈廽黃楊偶厄今年閏青海曾浮古佛來明月一庭僧下榻清風四座客銜杯石䦨㸃筆題詩處池上藕花秋正開次韵答許君善滄洲濯我足白首事經畬幸作依劉客難忘荐禰書病聽驚蟻鬪守拙賴鳩居長日思君子新詩忽起豫早秋寄恱堂長老三首雙徑人來候起居山靈想亦問何如煩師為覔龍潭水洗眼將看後世書秋陽皓皓火雲騰未有天風洗鬱蒸珍重毗耶方丈室一壺寒露置清氷我愛青山冷淡交吳淞江上寄龜巢秋來剪得芭蕉葉欲借楞嚴手自鈔閏七月七日許徴士以詩見招適余有昆陵之行不及赴次韵答之西風木落大江秋明月江行倚柁樓一路看山三百里桂花時節到奔牛過無錫梅村口占贈喻子英梁鴻山下碧溪灣落日蒼茫客度關秋色巳催紅日老人生何似白鷗閒危橋跨水苔㾗􅉸折㦸沉沙血㸃斑竒士相逢忽相别相知只在片言間中秋三首和易九成韵中秋無客夜相過落葉衡門感慨多明月幾回圎似鏡浮生百嵗去如梭誰家桂子香如許我屋茅飛冷奈何猶勝去年連日雨吳兒苦織覆城蓑海門潮上水西流白兔蟾蜍出海頭洶洶有聲驚雨至囂囂衆口說天愁楚氛巳覺三邉净湯網終當四面收自惜金陵多王氣如今重作帝王州玉人携手步陵波憶昔南樓載酒過樓上管絃長夜沸座中賔客少年多按歌自擊鐵如意呼酒滿傾金卷荷堪笑餘情忘未盡中庭舞月影婆娑為許君善題竹石圖竹君骨清癯石丈貌竒古誰其為寫真中吳馬振之吾生兩眼多閲人此君見之情甚親尋常兩膝不昜屈此丈拜之心莫逆可憐君家萬竹遭斧斤石亦去作飛將軍齊居此日空對畫目前所喜無風塵凛然清秋氣滿屋六月不知炎暑酷我來賦詩重品題此石冥如此竹勿為葛陂龍勿為金華羊徴君與爾作三友老夫亦得時徜徉聽秋軒詩為開元寺方崖長老作一龕禪寂照蘭膏四壁凉生襲楮袍落木有聲頻到耳學人無語自吹毛寉鳴夜半露𥘉下雁拂月邉風正髙怪􅔄塔鈴饒舌甚亦如九辨繼離騷韓仲禮宦家子也工寫大字終日矻矻豫甚閔之賦此以别君不見韋仲將能寫大字一丈強懸空髙寫雲殿榜鬚髮頓令成雪霜君今捉筆長于帚作字繼韋千載後非顔非桞筋骨殊大如車輪小如斗知君欲與韋為儔韋所苦者君知否青雲有路去亦好只恐君年未老先白頭願言投筆勿浪出菽水髙堂永朝夕樂莫樂于親俱存畫餅功名總何益九月四日過許君善家觀睦義溪長老與朱公路縣丞等倡和中秋吟君善索和一首老禪吐詞金石聲中秋浩歌蟾兔驚哦松人歸與倡和筆力可扶天柱傾惜哉未草金鵉詔但說三杯通大道舉杯此夕問姮娥百嵗幾回開口笑天風冷冷洗炎熱炎熱洗空風未歇西齊一樹紅木犀且喜看花眼如月喜薦嚴希長老自金陵還山作此賀之京洛多塵土天風為拂衣山中流水在林下白雲歸不說前三語誰尋第一機古藤獅子室燕坐寶花飛和紀叔維中秋清夜尋常秉燭逰况逢明月桂花秋君吟梨谷揮椽筆我泊楓橋倚柁樓白雪似添霜鬢老青天不著片雲浮老夫酣適遙相似座有潘郎便善謳題王叔正江村讀書圖紅葉江上村青燈案頭書長年門不出吾道竟何如叔正過訪傳恢書記寄聲作詩寄之余澤歸來王子猷問君知與對滄洲一灣流水市塵逺兩岸人家烟樹幽客至白雲分半榻興來明月載孤舟如何不到淞江上我看蘆花雪色秋和馬公振江上早行聞君拂曉渡婁江解得江妃玉佩雙旭日曈曨初挂樹浮雲變化忽成龍路旁客蹈前車覆天上人遭恐撞俯仰古今成一笑春風賴有酒能降和衛澄逺雪詩洋海氷寒若凌隂坐看飛雪積來深出門總是瓊瑶地繞屋皆成薝蔔林為說擒吳今李訴因評怨華古羊斟兔園詞客飄零盡撚我霜髭為一吟和楚蘭江禪老應制賦擁翠之作翻經屋上烟霞客擁翠亭前雨露多道載三車懷報國詩成七步口懸河衲衣風拂天香染錫杖雲隨御輦過聖主得賢方藹藹羣臣寧不賦卷阿寄顔長老江西馬祖不世出城南悅翁雙徑歸芭蕉雨作堂下樂薜荔天生墻上衣翻經猶能作細字秉拂孰與談玄機别來半載幾相憶江岸小桃花又飛和陳思忠過王德修草堂曲塘楊栁似蘇堤編戶菑畬比鄭陂春日鶯花圖畫裡秋風難黍故人期開樽許與傾蕉葉出妓應教舞柘枝老我杖藜慵出入草堂遙望為題詩次王德修韵茅堂有酒時一中少陵郊居今瀼東絶憐春水漲新緑不著市塵飛軟紅百年禮樂重制作四海衣冠今㑹同幽棲正要人不識莫厭門徑生蒿蓬和吳斯民感懷詩到龜巢兩日前桞花飛雪正紛然峴山有感知羊祜禹穴曾探繼馬遷老我短檠墻角棄憐君古硯案頭穿欲將磊塊都澆去何日移封對酒泉劍井余家劍井邉不飲井中水要令生瑞氣藹藹見多士古甃暗莓苔羸瓶委泥滓黃河今復清豈獨長已矣獨孤公檜珍重前賢手自栽無情斧斤忍相摧専車載去蒼龍骨竟作誰家㸑下灰惠山泉此山一别二十年此水流出山中船人言近日絶可喜不見流船但流水老夫來訪舊烟霞僧鐺試瀹趙州茶惜哉泉味美如故不比世味如蒸沙陽羡茶南山茶樹化劫灰白蛇無復銜子來頻年雨露養遺枿先春粟粒含珠胎待看茶焙春烟起篛籠封春貢天子誰能遺我小團月烟火肺肝令一洗歲朝示二三子十二韵我生老筆耕齷齪不自羞教兒復為之能識此意否為農或逋租服賈必逺逰非才茍祿仕往往遭愆尤先師有明訓富貴不可求兒能負米歸老父百無憂日髙三丈餘睡起梳白頭藜床草氍㼶布冠木棉裘比屋吏呌囂吾廬自幽幽食粥了餘年死即埋髙丘今晨捧椒觴復喜嵗一周一倡三子和聊作擊壤謳寄徑山顔悅堂長老二首每憶城南隱者家崑山石火徑山茶年年春晚重門閉怕踏階前落地花兩耳垂肩雪滿顛維摩一室小林泉白雲􅑵下黃楊樹且喜重徑厄閏年懷許君善三首别後逢人問薜蘿打門時有吏催科消磨舊日耽書癖春興吟成恐不多桑扈催蠶枽葉肥麥田雊雉麥花飛春餘閏月無多日鄰舍逃亡歸未歸昨夜龜巢酒半醺春風吹夢去尋君落花芳草千墩路携手斜陽不忍分寄趙朋南二首狂風斜雨去年時大厦難將一木支最喜草亭修竹净催科人去復哦詩石首魚來金色新桃花酒熟甕頭春急須秉燭逰良夜莫遣山公吟笑人寄趙執中二首案頭花落硯池香庭下草生書帶長黃卷青燈風雨夜更和熊膽付兒郎一見相知二十春交情無愧古雷陳如今滆上龜巢逺不惜書來雁足頻寄吳中衡老我誰知已端人最憶君常談無鬼論不作送窮文藥杵三更月萊衣五色雲枽榆春自暖蘭茝發幽芬芙蓉城仙人歌寄贈孫大雅仙人家住芙蓉城芙蓉為冠結蘭纓飛車去作蓬萊客玳瑁筵開麟脯擘八暝揚塵一轉蓬扶枽厭到東王公仙人手策青玉籠翩翩歸袂飄天風華亭之西玉山東羣仙挽留鵉鶴從雲墻霞壁五畝宫金華翠葉九粒松㕠眸㸃漆顔如童瀛洲再看蟠桃紅蔡經家藏老姑酒能為仙人聚仙友琴髙醉歌經拍手要我龜巢老人來和否寄黃宗禮星槎池館東床客氷玉襟懷我所知百榼蒲萄春灔灔一欄芍藥晝遲遲門前送却催租吏枕上還吟夢草詩只恐繡幃人起早又催京兆畫蛾眉秋晚過太平塔下四顧瓦礫場有懷徽太古禪老作詩招之一時陵谷變劫灰飛九州太平古招提寶地成荒丘浮圖巋然在氣勢凌髙秋風鈴作梵音終日語不休以言老禪伯合為故山留竿木夲隨身把茅堪蓋頭畫沙且成佛况乃願力優髙壇降甘露大車駕白牛老我烟霞交風流繼前修冬至和陳縣丞韵玄機妙斡無古今一陽來復消羣隂聖人灼見天地心贊昜乃鳴金玉音蘭也朝來新盥沐三復韋編謝亭毒卿雲燦爛彌九天旭日曈曨出暘谷丞哉丞哉初下車踐長之喜當何如絃歌化行風俗美寒谷春生自兹始逸菴詩四首為吳子明賦我愛逸菴叟有時能飬生百事不挂懷三樂殊稱情行年八十餘白髮無一莖每聞責子嘆笑我如淵明優哉復遊哉笠澤山水清日髙三丈餘先生睡初起雪屋燒暖香行庖膾氷鯉逍遙白㲲巾傲兀烏皮几鉤簾對青山倚杖看流水世事了不聞無勞洗吾耳客來兩忘情不復事迎送有酒即盡歡當杯笛三弄羲黃敢云傲周孔亦無夢衆口從雌黃我腹自空洞行歌山澤間此樂誰與共人生老而逸伊誰無此心惟翁適所願林居小湖隂或持無餌釣或抱不絃琴山水古名畫所得氣尤清長嘆康樂公木屐費登臨送李彥明歸髙郵老夫歸從東海頭春風送客歸秦郵出門復覩雁北向物我喜得同悠悠吳船鼓櫂渡江去烏輪政挂扶枽樹桃花倚岸笑相看杜宇催人啼不住征袍十年塵土多濯纓今作滄浪歌二百五日寒食雨三十六湖春水波文逰臺榭剪荆棘繼美前修聚佳客誰能喚起老龍眠重寫耳孫湖上宅寄題無錫錢仲毅煮茗軒聚蛟金谷任葷羶煮茗留人也自賢三百小團陽羡月尋常新汲惠山泉星飛白石僮𫾣火烟出青林寉上天莫怪坐無齊魯客玉川茅屋小如船王松溪知事别兩紀陵谷既變復命常州年皆七十餘喜各無恙又喜松溪别第失而復得觴以賀之詩紀嵗月年來兩度塵生海二老重逢雪滿顛杖履荒城寒食後琴樽别業舊堂前桃花含笑似欲語燕子飛來絶可憐此日為君歌此曲雨蘇春早午隂天後𢾗日松溪見和二詩豫復次韵送歸華亭放舟東郭語長年喜見春風不放顛三月鶯花詩卷裡五湖烟水柁樓前青衫司馬如今老白木長鑱祗自憐歸到鳯山門不出北􅑵真是小壺天雨宿縣學齊舍作客來帷林候漁父黌舍坐聽三日雨諸生讀書喧兩廡商羊飛來立當寧雨聲書聲雜蛙鼓蚓歌自亦諧宫羽青苔上階茵生柱敗壁淋漓籀文古齊僮不敢開户牖風撼庭柯嘯飢虎南山老石爛成土天漏誰能鍊金𥙷去年旱魃走吳楚田家往往悲塵釡麥秋一飽方自許莫教化作飛蛾舞宜山謡併序從來廣東南丹諸州民獠雜居素號難治洪武初朝命設官置司安撫之山東尹明善實任獠選凡所司事知無不為為無不速􅊩官再期多善政後四年有客自廣東來者傳其事甚詳余乃摘其大者作宜山謡七篇苗獠地連交趾咸籍為民且為除其凶號人悅之作椎結舞椎結舞擊銅鼓淺蠻深蠻皆安堵賣刀買鉏犁銜恩人鳥語獷俗惡名去豈弟君子吾父母沿邉舊制置屯十五以猺為長每羣聚為諸州害今罷之民乃安作除虎窟除虎窟虎皆散亡龍睡穴湖南海廣西千里如今無白骨無白骨人何憂每每舊屯田年年稻花秋我所思兮龍江水流兵後薦飢發官廪活宜山𢾗萬口民德之作枯桑枯枽枯枽徒為我薪煮石弗糜曷以食人廪發于官我命乃續誰其主之伊人如玉伊人如玉孚及豚魚詔我婦子償粟勿渝厥粟固償厥德靡忘我懷伊人于羔于墻覃國大韋仲海等世為土豪與溪蠻洞猺相為表裏反側不一公以計擒殺之民大快作霹靂斧霹靂斧行天誅百靈奔走羣醜除磔梟獍醢䝟貐招來角端舞騶虞日月兩山明畏境成康衢宜山莫天護虎踞一方公言諸方伯徙和州民樂之作坎井蛙坎井蛙今渤澥偷生蝦蜆門怒腹氣何在長魚跋浪欲吞舟竟作任公雪花鱠蛙平幸偷生有愧輸􅉭蟹前度放蛙人今日恩如海蠻獠負固稅久不貢農病于重斂公均之視前賦减什五六恩不能忘作生子以尹名生子以尹名有田宜須力耕昔憂公租重今喜公租輕窮􅉉杼軸具當路鈞衡平焦冥覆盆下覩此白日明革命之初公以安邉事宜屢白相府民懷之作鞍馬勞鞍馬勞肉消髀廣西一去二千里借箸籌邉丞相喜兩年單騎八往回青草黃茅瘴烟裡鞍馬勞有如彼不負公不掠美一寸忠丹報天子送丞漢德員外徙居臨濠憶昔吳鉤斂霜鍔歐台已知蛟可斫窮探虎穴走山靈勇撤蜃樓招海若三台分照紫薇垣一飛徑入紅蓮幕安知滄海忽生塵乃見巨魚今縱􅊤携家春雨赤城邉還揚舲秋水濠梁約老夫白髮三千丈别來幸有琴書樂羡子青雲二十年此去亦無冠冕縛故鄉相見恍如夢往事重論成大噱呼兒解我鷫鸘裘離亭飲客鸕鷀杓南薰穩送渡江水西笑遙憐好城郭莊生臺上看魚鯈彭祖山中拾靈藥平居襟懷夲瀟灑在處林泉可盤礴有回首望江南題詩好寄雲間鶴次韵贈董明府兼贈陳縣丞尹主簿緑莎聼事灑清風四野遺黎集澤鴻佳政總堪書國史丹心曽不愧天公橫琴坐對中秋月援筆詞傾百步洪僚佐粹然連白屋有時來我瀼西東寄錢夢弼併為乃翁宣慰公夀門對青山晝掩扉家居身著老萊衣懶于日下看花去贏得街頭負米歸一笑􅘑船香雪美百年城郭昔人非髙堂秋爽而翁樂稻熟湖田蟹正肥送虞長史歸閩中十四韵卓犖青雲器凄凉白雨秋棄官辭傳舍舁病上歸舟岸有吟蛩送墻無語燕留七閩天杳杳兩浙水悠悠親舍孤雲影山城大海頭倚門勞逺望脫屣得長休金榜聲名在班衣志願酬猗蘭重製曲萱草足忘憂丹穴生鵷鳳龍光射斗牛此心能自足餘物更何求老我三家墅憐君百尺樓相知稱鮑叔逺送愧鄒逰海上多靈藥山中擬素侯家園紅荔子能寄故人否野人居短歌三章為吳中衡賦野人居住何許屋頭東邉扶桑樹三江五湖在庭戶身著老萊衣手擘龍根脯賦㱕來兮謝簮組野人居誰與論藝夫蕘子皆同塵朋來逺訪多搢紳焚香據槁梧持杯岸綸巾眷魚鳥兮情相親野人居書滿屋神農夲草僅一束用之可比連城玉菊潭秋水香杏林春樹緑樂吾親兮忘啜菽過馬公振南江草堂南江草堂人白眉湛書成癖復湛詩千金買書讀未了化作劫灰飛海涯國風雅頌三百首愛入骨髓淪膚肌兩京三國六朝下驅駕直與唐人馳老夫一别再寒暑重覽碧海珊瑚枝溪西隱者亦好事白首苦吟忘渴飢逢人往往誦佳句况此酒邉逢項斯歡然共醉成夜宿石銚煮茶焚玉𬎼詩家風月談未了老蟾已墮西山陲盍簮此夕復何夕一庭寒菊花離披龜巢藁卷之四終
