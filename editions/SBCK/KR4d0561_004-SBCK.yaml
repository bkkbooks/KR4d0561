front:
  text: 龜巢藁􅃃之四
  hash: sha256:f41c3f01baa4caa16e8f19df3e4f65964db8385c07a51180456b2ba25c78bffb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0561_SBCK_004-1a}
body:
  text: 詩楊縣丞董役開白茅河晝夜辛勤以詩代簡畚鍤如雲穿白渠客来喜得問何如行庖只飲婁江水俸米頻供擔石儲人起四夷燒蠟燭霜飛兩袖坐藍輿􅎋勤左轄銀瓶酒為報功成有薦書劉旭齋過婁江客舍作詩贈之方欲題詩寄草堂逺勞移櫂到滄浪十年同飲三江水一􅀏相看両鬂霜田野無人鵶種麥漕渠通海􅈉輸芒馮君莫語悲秋事且復持盃送夕陽玉田喪側室作詩悼之予亦次韵以慰其哀目斷琴臺日暮雲相如無復見文君最憐機上廻文巧更憶燈前教子勤繡箧熊丸香尚在綺􅑵鵉鏡影初分江村一月黄梅雨誰爲衣篝爇寳薰五叢涇送玉田徙碧山與龜巢鄰居傾葢雨両月同客天一方君今挈家去宅我龜巢傍為聞碧山好宛在雲水鄊朝紳多寄寓羣髦富文章將尋鷗鷺盟與我同六藏老婦堪夜績東壁分餘光客至亦可留覔酒過短墻巷無車馬塵屋有汗竹香籯金與床笏􅀏視俱亡羊惟存廣文氊讀書坐藜床閉門樂吾樂􅂼食猶膏粱清風北􅑵下懐哉古羲皇寄鎦景儀先生杏花春雨晴時别蒲栁秋風又颯然笳鼓新城嚴警邏溪山幽舘喜安便校書還照青藜火煮茗應􅆽錫谷泉近遇故交聞有信逺勞埀問念無氊龜巢仍寓黄天蕩鼃竈今連白水田自分犁鉏􅂓卒歲可堪兵革更飢年家居食指一百廿斗米緡錢八九千􅃈􅃈旅懐言莫盡知君憐我似䕫蚿寄顔悦堂長老及崑山州學諸士友薦嚴永懐二方丈雙徑歸来舊竹邉林風磵月兩依然崑山恃立烟塵外婁水東流渤澥連坐有故人應念我客無此老共逃禪南能北秀煩傳語秋晚相過飲菊泉杜子才掾史擕詩見訪次韵一首白首無機心江鷗最憐我復有新相知時来與間坐一凉初過雨七月正流火先鞭君巳着短鍤我方荷壮君早騰騫老我常轗軻鄰君幸如此􅂾日何不可茅茨湖上居菱芡水中果後㑹期碧山合歡呼白墮更邀詩酒侣共載書画舸中秋月如晝西溪捩歸柁玉山頋隠君自嘉興答詩詢僕近况且云經禅老亦望一見故復用韵自述簡諸故人􅂾椽茅屋一笻枝萬事無心獨愛詩詩債隔年償未了帶圍連月恐頻移呉田積雨生禾耳笠澤西風斷桞絲眼􅔄故知俱契濶抱琴何䖏覔鍾期次韵答戴麟隠見贈我生無他長耽書竟成癖鬚眉比白雪肝胆如鉄石所頼識前言頃歩不妄􅆘向来走風塵朝不能慮夕行囊既羞澁家累且繁劇随身一破硯百指全仰食驅馳今九載未始一日閒豈不懐故園松菊怡我顏長蛇及封豕出沒咫尺間逢人問親戚野坐荆屡班不見雁足書徒眎刀頭環遥憐金斗城如望玉門関憶昔重九時鄉鄰雞黍約黄花香可愛白酒味不薄東家復西家相邀搃難却負郭有二頃平居得三樂朋逰結詩社時時共吟噱溪澗采蘋蘩春秋奉祀禴㡬廻乗天風欲跨揚州鶴那知一顛沛江湖竟漂泊移家碧山下家具少於車幸均􅆘相逢同念去國賖聚如水上萍散若風中花或琴教河汾或玄授侯芭交情比投漆子弟亦通家詩筒頻往来瞬息經兩稔壯君多志氣將衣買臣錦我志忘功名但就吕公枕三江五湖水共喜魚不淰萸觴了佳節藜床甘且寢春日方遲遲秋霜俄凛凛好客多釀酒願作東林沈寄丁彦誠旌旗滿眼各西東不見桃源我轉蓬兵後即知還舊宅客来曾辱寄詩筒石田種秫梁溪曲茶灶分泉錫谷中最喜西􅣘山色好青霞不染俗塵紅贈沈彦肅典史兼簡王景德空山寒雲白如雪歲晚高軒過岩穴三生石上拂蒼苔一􅀏梅邉有明月床頭釀得松花酒思與故人傾瓦缶煩君為問王猷子剡舟肯棹同来否旭齋歌次鉄笛先生韵旭先生行年七十餘耽書樂且孺白駒過隙莫可留欲把長繩繫烏兎囊無一錢任羞歰腹有羣經飽撑拄論交貴在見肝胆不學時人口相煦有時醉吟詩其巧猶凢注快若爬背癢十􅆶倩仙姬昔賢只讀圯上編便遇君王借前箸先生豈無策可用草廬未有人三頋青山白雲古圖畵床筆茶灶今家具居吳十年食破硯硯田幸喜無租稅秋風籬落霜葉隕枯蔓蕭條繫寒瓠西伯何當獵渭濵載取匪熊後車去次韵題鄒明夀草堂併簡劉旭齋賔主東南羙溪山繞屋廬經鉏百􅀾後版築十年餘木落西風急􅑵鳴夜雨踈侁侁二三子燈火案頭書答楊献可見贈憶爾梁鴻山下宅園池不減李文饒一朝猛雨鶯花去十載東風燕麥揺客􅂻相逢􅂓慰藉樽前一􅀏共歌謡君歸不負青山約好似誰南早見招寄因本初􅊰主愛尔呉江水西寺門前流水碧於苔松花布地金無􅂾蕉葉繙經紙萬枚􅊰席每留詩客坐浴堂曽為國王開别来雨洗秋容净凉入袈裟亦快哉答謝楚芳栁城一别十五年别時􅀇髪今皤然無聲詩與有聲􅀞彼此贏得虚名傳君家有子為時出且喜讀書兼讀律絶勝吾兒但筆畊三徑蓬蒿塵滿室老天縮如龜六藏思君見之􅅅與墻移家同飲太湖水尚期東壁分餘光代簡崔宗明掾史二首􅀌坐馳遐想􅅅墻見若人宫墻今画省家世舊朱綸南國梅花早北堂萱草春慈顔應有喜過客搃儒紳其二落葉擁柴扉吾兒日暮歸手持毛義檄身着老萊衣客路風塵乆青雲故舊稀何當報一飯不遣此心違夀徐主簿昔君濯濯如春栁鞍馬日随丞相後翩然提劍掃蛮烟欲取黄金印如斗一鞭徑渡浙河東東南滿眼旌旗紅手援赤子出塗炭慈溪草木生華風長嘯歸旌行復止濯髮松江太湖水鱸魚􅐜菜非不佳搃憶山家舊桃李君今草堂宅東郊有田可畊山可樵堂上慈親足甘旨相知與結桒麻交金門玉堂紫薇省無復回頭看画餅但愛鵞津秋水清雪色蘆花一千頃豪吟徃徃似謫仙但不持盃醉花前杯中之物時有禁煮茶多費惠山泉􅀛巢老翁不浪出逺来為君作生日草堂此日題此詩風竹四簷吹觱篥申仲義録事自杭州来議論慷慨風節可喜作此以贈客来試問錢塘事冠葢都非舊日人尚喜西河堪種栁不知東海欲揚塵手題王粲登楼賦頭戴陶潜漉酒巾如此江山如此客政湏傾倒洞庭春啓之沈丈立春作次韵和之何物淮夷乆亂華東風依舊滿天涯春盤薦酒盃頻舉醉筆題詩字半斜無􅂾故人俱契濶一雙老眼近昏花家貧頼有長鑱在坐待青山長蕨芽徐伯樞仲剛来云鄊僧刺血冩華嚴成好事者為之盛集緇素送經置呉門無量夀庵時有人以兠羅綿拭經緜化佛手觀者異之贈言盈軸徐伯仲徵予詩不已故檃括佛氏作此貽之吾聞両足尊化身千百億諸相即非相非空亦非色云何兠羅綿変現佛手出華嚴海無量本無塵可拭隻手挽頽波正頼佛之力譬如水中月在處照澄碧若以色見之痴雲暗如漆由来標月指具眼當自識莫春陪周明府過頋將軍祠下看碑黄天蕩上將軍樹樹下􅂾家人姓頋行人遥指若堂封徃事猶論麾扇渡新祠画藻烟霧􅊜古木垂羅􅀑神䕶長洲縣令枉髙葢短褐巢翁曵雙履海棠正落胭脂雪山餅為酧金盤露柱頭老鶴作人語道傍馴雉随車駐呉趋一曲歌未了蜀魄􅂾聲春又莫金戈鉄馬尚酣􅀾白羽清風誰復覩看碑莫怪客如雲彼君子兮真可慕端午日徐伯卬過寓􅀁以詩見示次韵首折一南湖風浪􅁖客至喜且驚連日雨不止明朝隂又生划舡海中歸􅀾鼓江上鳴端陽一杯酒忍聽歌霖零簡徐伯卬淮海十年猶亂離清江一曲自棲遲門前􅅻送催租吏籬下還吟采菊詩世事紛紛何日巳襟懐瀟洒少人知卜鄰欲近蘆花渚我亦扁舟理釣絲寄徑山及以中長老重攬凌霄絶頂秋歸来笠澤繫􅀌舟青山何䖏無黄犢滄海相知有白鷗六合雲開天蕩蕩百州風静水悠悠試聽漁父滄浪曲江上蘆花亦㸃頭夀慶治中日下歸来年復年之官未上浙東舡人憐垂老身長健自喜居閒志益堅好客毎呼鄰舍酒教兒不惜買書錢試看尚父鷹揚日渭水秋風雪滿顛次韵寄題碧雲禅老上海縣山居四絶青松種来過屋長松濤六月生秋凉香凝笏室静如水道人觸法俱相忘住菴人似南泉老無􅂾青山在屋頭眠鹿堦前金布地西風吹老桂花秋門前問話人立雪想像吾家㳺與楊靈禽盡得響天樂老雁獨憐随稲梁海上諸峯絶㸃埃浦泉流水碧于苔何當借與梅花屋我亦移家嵗晚来又和律詩一首笠澤東連海好山青更多逺分苔脯供兼寄艸菴詩拄錫僧方去携琴客又過送迎門不出奈尔􅂴融和寄沈德齋入城每問東林老避地今居巢海頭秋半即嘗菰米飯冬初已着木棉裘青衣搗藥鄰鮫室烏几燒香對蜃楼我欲移家相近住釣竿煩為覔滄洲為源長老贈醫士單子達老我無他技憐君正妙年父書能盡讀醫術得親傳舊隠荆溪上今居笠澤邉幽蘭紉古佩采藥洗春泉鶴守燒丹室鷗随載酒舡毎聞驅二豎近喜活枯禅優缽㣲含􅀏頻伽喜欲顛却還青玉案持去白雲篇髙誼能如此明時豈舍旃政湏醫國手為我救顛連普大雲􅊰主以紈扇􅀞蘭見惠作詩謝之時雲在呉江普渡院􅊰法華經學徒甚衆上人遺我白團扇扇上復為蘭傳神足知清興逈絶俗更覺幽馨時襲人猊座􅊰經雙樹下龜巢織屨五湖濱明朝相約看山去不怕西風揚逺塵寄朱道源昆季太湖三萬六千頃流血水腥江海連㡬次焚舟成赤水壁有時飛砲落青天雞䖝得失那能問鴻雁飛鳴亦可憐若箇桃源堪共住也湏容我釣魚舡臈月二日偕俞寛仲過篠涇僧舍䝉舉示近詩次韵一首故國溪山各逺􅄐倚楼長笛為誰吹相逢上海三生石共惜邉風兩鬂絲客舍暫如枽下宿世途危甚劍頭炊明朝褁茗西菴去更約匡衡細説詩勁節亭詩為中半雲􅊰主賦我夲山林人此君與羣居頻年避戎馬出走荆棘途雙溪􅆘相遇嵗晚氷雪餘蒼顔固云老清氣方凛如儼然古君子節勁心仍虚紛紛桃李花榮悴􅅻斯湏長松髯如㦸亦作秦大夫我思首陽山竹君兩遺􅀌髙風激頽懦氣節與君俱之人不復見見君如友于此意知者誰居亭老浮屠緑琹為我弹碧酒為我沽萬事付一􅀏嗒然我􅁯吾懐徐伯樞諸友一昨方卧病妻子呼避兵扶持上輕舟烽火照夜明問兵今逺近言圍闔閭城頼有風滿㠶送我東南征三宿坐不寐鶴鳴近華亭晚泊青龍江蘆葭匝地青新知􅆘相遇留我居篠江土風頗淳朴地僻雞犬寕吾病日以瘳客来能送迎老叟心自憐或謂詩骨清比鄰兩三家情親若平生園蔬日持送酒壺時共傾對酒不能樂憂虞未忘情懐哉􅂾君子雨打水上萍漂落各何許吾將尋舊盟賣刀買黄犢子孫共春耕奈何西枝西砲石猶雷鳴偕俞仲寛逰普光寺俞作詩紀行予和首折一繞屋踈筠玉有光沿堦細草翠生香林藏鹿苑雙溪曲路轉龍江十里強蕉葉繙經人自樂槐根做夢螘何忙白衣二老来聴法甘露醍醐得試嘗臘月廿日㑹林才元于普光方丈詞氣峥嶸吐玉虹山林興與老夫同獨憐幽草来西磵共聽枯枽叶北風四海十年兵火後雙溪一􅀏夕陽中評詩為掉楼卿舌似勝儀秦諂七雄送和彦良兼簡朱端卿移家喜得好林泉甫里先生古宅邉憂世頗添新白髪投書還坐舊青氊秋風茅屋都無恙臘月梅花正可憐我友古人多古意斷琹煩為續朱絃贈張孟文青龍江水清如玉青龍故家書滿屋中有郇公七世孫一目五行能盡讀科名未欲拾地芥燈火長如校天祿有時述作繼風雅三國六朝車並轂手揮赤血㧞鯨牙琴斷玄文裂蛇腹雙溪近傳寒食句又出唐人一機軸相逢説項人益多宛見清標立霜竹我生愛詩入骨髓老去窮吟髩如鵠金張許史􅂴折腰沈謝曹劉長在日江頭偶泊避風舡故山將歸采黄獨金盤不必贈檳榔願覔奚奴珠一斛次韵贈木蘭亭上人庭前手植婆羅樹樹下頻繙竺國書失鹿不知秦二世葬魚那問楚三閭園收柿葉皆新紙林養松花當宿儲十里雙溪春水綠浮盃時復訪樵漁余患癰疽􅆘兵後無醫藥可療即事口占併寓感嘆吮疽人在五侯家市肆都無藥可賖童子歸来風雪夜老夫愁絶對梅花次韵徐伯樞見寄二首病卧碧山乆添愁白髪新一冬無雨雪四海尚風塵妻子移家逺親朋折簡頻梅花應􅀏我出語欲驚人其二客夜牛衣薄王春鳳暦新東南蛙角地多少馬蹄塵鼙皷依然急壺觴莫厭頻君看塞翁馬得失豈由人奉贈薛宗師及于薛二真人論道清寕日承恩紫極天星言辭輦轂雲卧樂林泉虎衛燒丹室龍畊種玉田㞐山閒宰相行地活神仙清問時猶及玄談世共傳春秋今近百弟子動成千入室稱于薛承歡度嵗年蓬莱方丈外磧隩澱湖邉别墅三花盛深居萬竹連玉桃紅綻雨瑶草碧生烟麟脯供仙饌鸚盃舞醉筵雲璈齊上下霞袂各褊􅝆福地風塵逺壺天日月懸目光方烱烱眉夀正綿綿老我頭垂白尋師志在玄飄零随草芥佩服集蘭荃欲進圯橋履重来笠澤舡山靈元有約石髓未應堅析理秋毫末研㡬太極先黍珠當一照光彩徹天淵早春訪蔡君立家以詩見贈次韵答之老夫藜杖病初起幽谷蘭花喜正開持酒對花留信宿題詩賦竹約重来一犁新水初春雨百蟄皆驚半夜雷嗟我無錢堪買犢歸畊心亦冷如􅁅正月廿三日過許君善竹所留六日日蒙置醴且出諸􅀞卷命留題焉茅屋秋風杜陵老桃花春水許家墩連宵共剪西􅑵燭每日頻開北海樽童稚間譍知揖讓鄊鄰見客問寒暄遲留不厭逢多雨喜得題詩萬竹軒余過横塘訪趙朋南先生值回錦溪遂留許徴士家雨􅑵因覧元夕之作次韵代簡行路難行乆不禁尋君欲吐别来心十年飯顆詩容瘦一病文園渇思􅅧鹿浦繫舡逢積雨客􅑵拄笏見遙岑誰能縮地仙人術共聴花枝快活吟安素齋詩為髙彦舉作羲黄世云逺淳風浸凋零紛紛慕浮華形役心靡寕惟尔為觀者於物澹忘情天君常泰然月白霜潭清羙玉非不沽沽之價連城向来莘野農释耒即阿衡磻溪釣魚叟飛揚乃如鷹湯文茍無遇耕釣畢此生懐㢤古之人安素斯足稱溪西小隠詩為許君善作馬鞍山南三十里鹿虞浦接横塘水桃花兩岸小橋西蘿屋􅂾椽脩竹􅂻先生頭戴烏角巾青鞋不踏東華塵扁舟溪上釣明月長鑱龍頭鉏白雲客来看竹呼鄰酒客去對山開北牖琹弹古調每横膝筆冩新詩長在手自言得句如得官富貴却作浮雲看青山有約如不爽白鷗之盟奚可寒箕山乆矣人寂寞眼􅔄誰能如此樂文章多樂鸚鵡洲衣冠俱上麒麟閣老夫幽懐欲與論移家今近西枝村風清月白憶􅀇度莫怪杖藜来叩門題孫彦學所藏江貫道清江泛月圖吾聞老郭之傳許與江山水絶筆稱無雙此夜圖景江􅀁作彷彿秋聲動林􅊤長江沉沉月在水逺山蒼蒼樹如蟻如此江山夜放舟若人真是逍遥逰尔来一百四十載陵谷變􅁶圖􅀞在世無蘇李兩詩仙赤壁采石俱蕭然老夫此興固不少觧裘亦足酤清醥出門有碍行且休不如看􅀞梅上頭雪山圖憶昔山居擁寒雪夜半讀書聲未歇長林月在掛猿枝幽谷風生藏虎穴十年奔走避兵塵手持一竿滄浪濱􅆘因看􅀞長太息青山頭上亦如人普講主寓普度蘭若十一月望為逰軍撿括是夕以藁稭䝉首露坐陸氏莊埃燼中怡然賦詩予嘉其言無瞋恚和而美之道人心如如説法無定䖏無喜復無瞋亦無諸恐怖初聞戎馬来杖錫出普度羣氓棄家走子女多失怙或遭刀箭傷或受係累去或作吞聲哭或為折腰歩裸跣走且僵烟塵晝如暮師時在中野亦值一强禦􅁖状冠羣醜丹青筆難措脱我僧伽黎問我石頭路搜索祗園金撿括青州布區區身外物自謂無足䕶把茅􅂓盖頭露宿吟古句干戈雖未息江山喜如故相期看餘春牡丹花貴富和趙朋南春詞四首落梅風急綺䟽寒􅉉鉄鏘如响八鸞堪􅀏嬌痴兒女子折花騎竹繞長干多謝提壺不住鳴杏花枝上月三更銀􅎆㵼盡葡萄緑祗為傷春醉不成小閣鈎簾待月時燭花頻剪夜何其惜春不奈春宵短翻憶秋宵玉漏遲花拂盆池入鏡光桞揺臺榭弄鵞黄晚来頗覺東風􅁖分付薫籠爇煖香遊南山和徐伯昻韵諸君南山逰豪吟氣憑凌惜無龜巢老拄杖携赤藤俛觀陳湖水一槃秋露澄吾兒躡吾屐樂與君共登坐花籍苔茵樽酒空十朋垂楊細腰舞不費纒頭綾羡君方妙年文章有師承譬彼學佛者當為大乗僧滂沱夜来雨紅日喜綵升楊花飛渡江茫然白雲騰晨看有聲画妙若曹不興兹山頼有傳詩名與俱稱和臨寒食有感五絶何䖏登臨散客愁千墩浦上聽漁謳清明落盡梨花雪能得東風㡬日逰憶得少年寒食日落花塵上馬蹄香六龍城郭春如画那得旌旗帶雨揚烈塘墳上樹如雲一埽東風十五春不信令威歸不得竟移華表属他人一徑落花春晝静四鄰嘉樹綠隂繁兒曹忘却還鄊意浪説春風似故園白髪蕭蕭客未歸凄風􅂃雨禁烟時青苔白骨尋常事堪􅀏田文為客悲遷居逃難居頻徙幽懐孰與論崑山一舍地湓浦􅂾家村老去仍為客朝来又抱孫雨餘春酒緑生意滿東園聞玉山頋隠君以賦役入城負疾而歸而山中花竹多有區區懐思寄詩代簡聞道龎公也入城還家風雨近清明催租人去詩仍好市藥童歸病已輕尚喜竹林青筍出不嫌花徑紫苔生野夫得此平安信尋訪姑遲􅂾日程哭杜玉泉䖏士二首每憶城南杜今為地下郎好詩留巨帙遺像在髙堂濯濯孫枝秀􅄐􅄐宰木長可憐枽與梓春雨竟凄凉其二東郭溪山勝南園花竹深平生多樂事之死遂聞心掛我客中劍撫君床上琴廻風吹桞雪和泪落衣襟四月二日林自瑶城歸冩呈􅁶屋詩四首因以述懐併記時事鶴長鳬短世難齊滿眼風塵客路迷灶突未黔居未徙兒曹况在兩湖西六幅蒲㠶帶雨開瑶城艇子過湖来老妻正倚門前樹雪色楊花覆緑苔僦得山居鑿井􅅧客来不厭煮茶頻屋頭驀地顛風起狼籍桃花滿樹春髩絲垂領白毿毿老我身如作繭蚕午夢忽驚飛砲响狼烟只在澱湖南予徃哭杜䖏士過松江問途乃知其弟玉溪亦殂去兩月追懐夙昔作詩悼之徃歲留三宿今晨哭二難榻懸無復下琴斷為誰弹溪竹春雲散庭花夜月寒悲乎浮世事長夜雨漫漫答徐伯樞見寄二首十載風塵走朔南白頭如雪靣如藍借車載具家頻徙應俗為文筆大慚茅屋雨添苔上壁竹籬烟䕶笋抽簮别来行路難行甚何夕挑燈與細談杜宇催歸不絶聲知君㱕計正留情東膠茶焙春烟煖西堠花村夕照明音信尚煩黄耳寄友情不負白鷗盟明年築室相鄰住兒軰求田與力耕邀管伯齡許君善鄧宜之端午小集十年端午長為客一􅀏今朝有故人江草碧揺書帶净石榴花摺舞裙舞新潮生小巷通舡路風拂幽軒振席塵酒襟未開罍爵恥茶鐺爛煮兩旗春邀月田上人借得溪鷗半席沙相期来吃趙州茶渡江剰有蘆堪折日落潮回即到家次韵答許君善見貽憶昔平居頻㑹友家有秫田共釀酒安知今日對端陽無酒可澆談􅀏口客来置茶􅂓觧羞強將車轄井中投清風緑樹北􅑵下時聴一聲黄栗留西山雲起日將暮斯湏雨暗横塘路銀燈􅅻㸃即生花為我許君青眼過頋我心如醉顔如酡憂時未寕奈老何明年此日復此㑹此詩當遣玲瓏歌即事黄梅落盡雨初晴客舍青苔四壁生鉄砲打城聲動地老妻猶訝是雷鳴代簡大雲􅊰主天竺之書五千􅃃吾師以之全藏轉蚤年手握摩尼珠飄然擲錫逰天衢歸来濯足太湖水從此一龕兀坐如枯枝有時忽作獅子吼狐狸野牛顛倒走有時閑冩山水花花光之梅作清友近聞有約過貧家貧家掃門迎象車欲知老夫何物作清供湓隂小圃自種崑崙􅀲朱公路縣丞和徐伯卬詩見示不為險韵窘束予甚喜之復和一首以冩起敬之意􅀲廬松水西溪山勝東陵玉立開徑竹纓垂刺􅉉藤善養氣不餒静觀心澄澄白雪少人和青山與誰登稽古蓄萬􅃃問竒来逺朋頋余犢鼻布不識馬眼綾来詩清可喜玉露仙掌承想當締思時寂如禅定僧詩成掃巨筆墨汁飲􅂾升干戈有時休雅頌當復興願同杜拾遺一代詩史稱夀張實甫我愛龎德公躬耕亂􅄐日以安遺子孫此計真第一君今床頭金有餘傳家之計乃亦如况入東林逺公社每誦西竺空王書幽雅乆矣机心息鷗鷺相知真莫逆獨憐丹穴一鵷雏偶爾西飛歸未得願言晚節金石堅河清復見昇平年明年此日夀觴舉三鳳聫翩即罷前寄贈勝無能上人雙林舊宅今蘭若百丈清規老作家燈燃佛龕無晝夜榻留禅衲共烟霞屋頭青覆娑羅樹池上紅開菡萏花六月香風清似水野夫曽此坐鷗沙丁未夏六月寓真覺菴􅂾日日賦小詩以冩目前之景􅆘大雲師遺雙清圖足成十首祗樹園林舊雨荒僧廬今喜近滄浪我来一榻南􅑵下分得溪風午夜凉臨溪照見影􅏢􅏢老我頭童狀若僧堪􅀏讀書心未死夜来猶對佛前燈燭龍銜日出東溟飛到天中落火星莫怪􅂴慵門不出一林翠竹風泠泠荷盃飲露比名酒松鹿生風無俗談日落清蝉吟未了雨来白蟻􅀾方酣髙堂無塵清晝遲山僧持缽未歸時白衣仙人坐相對净瓶楊栁青垂垂客来自汲煮茶泉躄足浮屠亦可憐借我石床箕踞坐有時閑說趙州禅㯶鞵不韈苧衣輕好客何妨日送迎試聴砲車飛霹靂將軍觸熱正鏖兵雙林一室養㣲疴列坐羣緇問若何不用散花天女軰儼然無語老維摩芭蕉葉上遍題詩更覔呉箋冩竹枝過客莫嫌人寂寞髩絲禅榻正相宜生愛梅花與水仙故人摹冩寄林泉披圖净拂燒香几何異長齋繡佛前普􅊰主過千墩偕余訪許溪西出普公曩嵗所作水仙花求普為重記嵗月俾余題其左云梅兄礬弟搃不見邂逅獨覩凌波仙雲翁指㸃􅀏相語為我傳神三十年簡蔡君立從事齷齪布衣老生無晉人風杖藜相訪不相見興盡􅆘與王猷同出門喜清飈天氣凉蕭蕭重雲忽迸日六合如洪窰東屯行行行且止賣藥人家杏林􅂻蜚亷意若迎我歸南薫轉從西北起快哉一披襟長咏出舞雩老夫此興君必知黄金不用鑄鍾期歸去来􅀆湓水西與諸友論詩次朋南韵每見故人詩不俗恨不移家與連屋人生有詩可傳世萬事無成心亦足嗟㢤風雅絶遺音斷絃未有麟膠續三經三緯機軸在文士疇非頼私淑屈原吐詞蘭蕙香能襲餘響馨惟宋玉兩京豪華六朝靡聲律由唐轉覆宋草堂先生獨冠佩進退委蛇氣容肅孔明廟栢一品題儼然菉竹森淇澳要之煉詩如煉丹九轉功成龍虎伏秋髙當約許玄度妙法参之老尊素次韵答朋南重九之約重陽無酒不湏賖看菊柴枽䖏士家只恐滿城風雨到客􅑵岑寂對􅉉花贈筆生王伯純時方用武我業儒王生賣筆来吾廬生成世業霅溪上製筆特與常人殊宣城阻兵十三載猶喜山中老㕙在㧞来秋頴帶㣲霜縛得銛鉏含五彩昔年草制供玉堂玉堂仙人雲錦裳三縑一字不易得筆價亦與時俱昂莫怪年棄如土掃滌風塵必斨斧生今賣筆我賣文何異􅆘越資章甫呼兒亟用買一束為我冩成懐古錄吾兒作字三嘆賞八法以之随意足我有好音生可知用筆將見文明時諸公諫筆佐明主老我耕筆箋古詩逝將重作毛頴傳為記頻年遭薄賤牽聫為生書姓名守業不随陵谷变中秋􅆘逢酒禁開椰瓢酌生新潑醅酒酣仰視月中兎長嘯一聲歸去来盧志道馬公振以滿城風雨近重陽爲詩首句各賦二絶同日見寄要余和之滿城風雨近重陽一望蘇臺百感傷臺下伏屍多濺血秋花不似舊年黄滿城風雨近重陽門巷蕭條草木黄茅屋破来天更漏誰能補石繼媧皇滿城風雨近重陽籬菊花開酒未甞四海兵戈無了日十年書劍客他鄊滿城風雨近重陽猶喜觀山目力長風雨晴時山更好也湏携酒拄車傍兩年九日情景不同口占二詩􅂓述梗槩去年重九日烽火接三州黄菊無心看青山滿眼愁風霜新鶴髪塵土舊貂裘為覔桃源路挐舟到海頭其二今年重九日兵破闔閭城紅粉宫娃毁黄金郿鄔傾老懐多感慨歸思轉縱横頼有茱萸酒開軒看晚晴旭齋劉先生四明隠君子也客呉􅂾年日以詩酒自娱時與予相善丁未秋年七十有六自謂不乆于世為誌墓之文及賦自輓其詩曰知非􅅻戒酒送我但吟詩且邀予以詞輓之予既為賛小像後五日乃携酒詣崑山勸飲故有是作天生劉伶愛杯勺杯餘更以詩為樂有時痛飲􅀤豪興徹夜長吟追古作胸吞雲夢氣峥嶸筆吐珠璣光錯落知心每恐化湯烏見面俄驚作癯鶴為嫌八達太踈狂乃效獨醒甘寂寞髙陽人􅀏老痴漢杜舉身遭束高閣我来黄菊似含􅀏喜坐對青山論酬錯舉觴一􅀏口復開葢棺百年心不怍金龜足可換新篘玉兎無勞搗靈藥􅅯月堂前丞相死齊雲楼下降王􅅞眼前事世等蟻夢身後虚名等螢爝何如閑策鉄拄杖時復醉傾金錯落吾詩便作薤露歌活輓先生薦清酌張伯庸在郡城被圍􅂾月間道而歸賦詩賀之雁書到手人方喜虎口脱身君已還難似上天行蜀道險于中夜出秦関桞营皷角邉聲逺萊子衣裳喜色斑百斛葡萄新釀熟歌童莫放酒盃閑方池詩爲馬公振作携我方竹杖看君方池方水宛然俯中庭照影月明􅂻清風生蘋末素練吹不起魚樂魚自知主人亦應爾和許君善郊居十首秋色滄茫日落斜鯉魚風起荻飛花先生晚酌依稀醉吹笛漁童恰到家書画舡頭吐白虹談玄麈尾洒清風繞籬種得陶潜菊時復看花酒一中堦前幽草比琅玕屋上慈烏即鳳鵉老我山林友麋鹿不知貔虎尚桓桓流水柴門不厭貧古今曽見㡬何人山中松菊陶元亮谷口犁鉏鄭子真怪􅔄􅅧秋氣􅀱温野花成子竹生孫􅂾椽衡宇清溪曲風雨蕭蕭晝掩門竹有幽軒水有渠閉門不出十年餘一編修得梅花譜又註神農本草書朝野新聞搃闕如經鉏甘分老迂踈客来留喫雕胡飯旋斫溪頭出網魚窮到無錐累始輕黄金何用苦留情姑蘇臺榭新如画又被西風一夜傾不見魯山元紫芝干戈滿眼少陵詩采樵何䖏青山好逢着仙人且看碁一雨洗兵秋可憐東呉香稻熟紅蓮許家墩下斜陽外無􅂾飢烏落晚田淮夷篇大􅀖浙河西呉郡稱第一淮夷著柘黄来作豺虎窟交􅂾無善道西頋距勁敵一鶚攖網羅同氣頓蕭瑟正朔仍奉漢天恩滿床笏賦粟嵗倍蓰郿鄔金日積非無舶䑲風海運不挂席包藏狼子心反覆莫可測臺閣兩重臣忍為梟獍食井蛙自尊大出入復警蹕愛弟􅃂且驕開府門列㦸提兵㡬百萬勢熱手可炙甲第連青雲圊溷亦丹碧瑶池長夜飲天魔舞傾國幃幄皆面䛕忠鯁即麾斥權門競豪奢婪婪務懐璧淮南舊巢穴坐視城棄擲出師理侵疆􅀁向輙敗績鄰兵賈餘勇一舉􅂾州得羣兇納降去􅀌城獨堅壁奈何圍􅂾重楼櫓比如櫛砲車拂雲漢晝夜飛霹靂􅃂弟既虀粉左右皆股栗短兵屡相接苖獠與戮力南濠百花洲流血水盡赤閉闗甫期月人面多菜色􅂼食猶八珍骸骨㸑下折衆叛巳不知豕突猶親出前途忽投戈回騎不􅂾匹一炬齊雲楼妻子随烟滅縛虎送臺城咆哮氣方息嗟㢤尔淮夷富貴亦巳極雕墻􅔄滅亡其理信弗忒十月過吳門無􅂾雲梯盡未收髑髅如雪擁蘇州偽王守死空遺臭降將偷生忍負羞鹿走荒臺千載後烏啼野樹五更頭篙師也為愁無寐不待天明已放舟過無錫書􅀁見一首朝發呉門東暮宿錫山下隔墻語嗚咽云是流移者生来本村居白首事畊稼居城僅期月區區避兵馬狂奴稱老虎咥人空四野城降人出関方幸虎遭咼里胥俄促人負郭一網打監官駈上舡寸歩不少假不知遣何之􅇧肉忍相舍語罷哭聲悲涕與淚交㵼同行十􅂾人瘦􅇧皆一把鉄索連係頸俛首若喑啞天髙恐無聞尔悲知者寡歸故里一首憶昔走避兵棄别鄊井去意將朝暮歸行行重回頋安知今一紀方踏去時路四郊皆蔓草白日暝如霧披榛訪閭里隔水拜先墓傷㢤鶺鴒原黄蒿走狐兎别墅破墻在郵亭乃新作鄰兒二三軰茅茨晝扄户相見不相識熟視肖厥父坐乆泣且言為我語親故什九死兵戈餘亾不知䖏其詞吐未終我淚已如注對食不能飡相期歸蟻衆吾將語吾兒賣書買農具歸畊溪上田宜若烏返哺吾其正丘首此心庶無負戊申􅀊訪朋南執中二趙君皆連床夜話極談今古時朋南以草亭自號工詩有唐人風致不茍作也越信宿作詩眷留臨别復有魚米之遺執中亦和詩示余意皆有餘而不盡也後十日次韵二首其一寄題草堂兼謝所遺一以寄執中以述交契之厚云圖􅀞蘭亭跡甚陳溪山何殊草堂真晉人標致清談妙杜子詩篇下筆親客至合歡常盡醉我来留宿豈辭頻還家飽喫魚􅅅飯更喜瓶儲玉粒新經嵗􅄐懐得具陳酒盃􅅧淺兩情真老夫生頼詩書力良友交同􅇧肉親楊桞錦溪春尚淺綺羅鐙市雨何頻别来十日牛衣卧世事如今又一新和施天朋即事二章章五句呉儂頭白雙眼昏夜逃松上烟水村老妻剪􅁓招驚魂問之不説苦徭役但言入地恨無門呉儂十年遭亂􅄐飛芻輓粟精力疲哀哀婦子皆瘡痍春来破屋雨連日疑是淚從天眼垂戊申春浙西僧尼道流凡主寺觀者皆集金陵蘇州萬夀寺長老愚隠師亦在焉僕甞夢寐中與談今昔且問及剛中毅公故賦此以寄二老夢繞鍾山訪舊逰共看江水話閻浮隴西鸚鵡金籠閟海􅔄􅃢瑚鉄網收刀尺尚湏成妙用缽盂未得賦歸休别時問我雙峩老為道身如不繫舟寄侄僧德無言二首謝村菴居折時在金壇西紅梅閣下夜連床一别經年十二霜尔父尔兄俱即世我孫我子未還鄊西林卓錫青山好東海垂綸白髪長何日與言生死事更論松菊故園荒嗟我成童即棄家住菴鈍斧老金沙箧藏林下繙經葉缾養山林供佛花浮世夲来同一宿歸途必合駕三車白頭痴叔遥相憶燈下修書字半斜馬公振以乆雨懐思作詩見寄􅆘千墩諸友朋為謀道旁之舍因和及之併􅀤巨浸之嘆云芳草凄凄春復春桃花應􅀏未歸人􅂾椽矮屋清溪曲一箇扁舟緑桞津且與徃来乗欵叚從教圖􅀞上麒麟老妻頗勝劉伶婦不惜春衣典酒頻吟罷秋風破屋歌不堪春雨復牽蘿無人為補青天漏滿眼愁看白水多堦下縳橋兒渡蟻門前換字客籠鵞可憐豪氣三千丈方覔堯夫十二窩公振和許西溪韵併簡老夫次韵答之世亂已如此年飢更奈何城池百􅀾後風雨一春多有酒客同飲耽詩病亦哦老懐􅂓自遣頭髪未全皤和周明府留題趙靈寺大澤水環金刹地小楼簾􅐈玉山烟桃花雨濯江邉錦榆荚風飛地上錢人世屡驚天柱折佛光還自月輪圓衲僧㑹得頻伽語也學詩人拜杜鵑田家謡花朝一雨連寒食水沒呉田􅅧三尺田家壁立杼軸空逃亾半作􅗂中瘠農官令下星火飛勸農踏車農苦飢産灶之鼃斷烟續藜莧煮来青葉肥商羊舞如獨脚􅀑天瓢倒傾恐未巳水車恨不化渇龍一口吸盡西疇水我謂尔農毋怨天堯田水溢亦九年但有人能拯飢溺即令四海無顛連請君試聽踏車鼓鼕鼕聲中含疾苦天門九重路修阻此聲何由徹明主趙貞白輓歌詞前代衣冠族先生山澤癯淳風振薄俗髙􅁩掲中呉舊債焚餘劵凶年賑餓夫紅塵無足跡白雪滿髭湏鉄硯磨来磷籯金視若無蹇予牛馬走愛爾鳯凰雏卜宅来依倚通家學歩趋玉枝􅅻有汗瑶草遽成枯敬下墳前馬仍瞻屋上烏典刑無復見老淚落鮫珠寄謝朋南執中中行諸友兼簡楚岡滄海二禅伯錦溪水流無住時我思故人心如之扁舟来繫溪上桞六月初三新雨後常年大暑金欲流今年天氣凉于秋故人相見不相舍水竹軒亭榻俱下東家談復西家西家碧筒㵼流霞醉抽吟􅃃看珠玉夜􅑵剪尽如椽竹明朝竟日復留連月在栁梢方觧舡瀕溪更有好僧舍古木隂森正宜夏龎眉兩僧亦可人茶鐺長煮小園春但欲移床就泉石共聽松花坐終夕簡熊元修憐君苦有輭脚疾愧我貧無挑藥錢此日尺書重問訊何時杖䇿與周旋湖鄊地􅊜黄梅雨舍舘􅑵含緑艾烟猶喜東家人好事銀瓶長送酒如泉奉贈呉逸菴先生頭髪烏如漆上夀明年八十三豈有神仙傳秘訣尚看孫子著朝簮燒香看􅀞湘簾􅐈留客題詩緑酒酣堪􅀏野夫扶醉别出門更與阿戎談寄張伯祥兼簡頋玉山尺書曾去墮浮沉嗟我懐人意未休両地共看千里月西風又換一年秋牧羝餐雪猶歸國買犢耕雲且素侯暇日煩尋頋文學為言相送愧鄒逰石箭頭歌併序丙午冬呉人自望亭驛鑿渠通漕湖􅅧丈餘乃得石箭頭長洲徐伯昂氏以所得之一見遺一以遺倪元鎮請各賦詩南山爛盡蒼雲根飄風勢欲傾崑崙何物老砮作遺鏃神鬼削秋無㾗沉沙不随戈㦸折太隂玄精壮氷結五丁假手出重泉猶帶堯時九烏血羵羊胆肝破尼子走折足猶有老於莵坐嘨風滿谷猿臂將軍􅇧巳枯蒼頭盧兒金僕姑時乎時乎奈爾砮次韵集􅊰主見懐君今風北我枝南燈火餘輝借佛龕老去著書酬素志客来揮塵接清談逺公沽酒能相引中散琴鳴豈不堪且喜早秋頻雨襟懐無復鬰如惔偕大雲大成二􅊰主及學上人宿聖像寺詢無言山房作西晉招題屋半催江流依舊碧萦廽黄楊偶戹今年閏青海曾浮古佛来明月一庭僧下榻清風四座客銜盃石䦨㸃筆題詩䖏池上藕花秋正開次韵答許君善滄洲濯我足白首事經畬幸作依劉客難􅁯荐禰書病聽驚螘闘守拙頼鳩居長日思君子新詩忽起予早秋寄恱堂長老三首雙徑人来候起居山靈想亦問何如煩師為覔龍潭水洗眼將看後世書秋陽皜皜火雲騰未有天風洗鬰蒸珍重毗耶方丈室一壺寒露置清氷我愛青山冷淡交呉淞江上寄亀巢秋来剪得芭蕉葉欲借楞嚴手自鈔閏七月七日許徴士以詩見招􅆘余有昆陵之行不及赴次韵答之西風木落大江秋明月江行倚柁楼一路看山三百里桂花時節到奔牛過無錫梅村口占贈喻子英梁鴻山下碧溪灣落日蒼茫客度関秋色巳催紅日老人生何似白鷗閒危橋跨水苔㾗􅉸折㦸沉沙血㸃斑竒士相逢忽相别相知只在片言間中秋三首和易九成韵中秋無客夜相過落葉衡門感慨多明月㡬囬圎似鏡浮生百嵗去如梭誰家桂子香如許我屋茅飛冷奈何猶勝去年連日雨呉兒苦織覆城蓑海門潮上水西流白兎蟾蜍出海頭洶洶有聲驚雨至囂囂衆口說天愁楚氛巳覺三邉净湯網終當四面收自惜金陵多王氣如今重作帝王州玉人携手歩陵波憶昔南楼載酒過楼上管絃長夜沸座中賔客少年多按歌自擊鉄如意呼酒滿傾金􅃃荷堪􅀏餘情􅁯未盡中庭舞月影婆娑為許君善題竹石圖竹君􅇧清癯石丈貎竒古誰其為冩真中呉馬振之吾生両眼多閲人此君見之情甚親尋常兩膝不昜屈此丈拜之心莫逆可憐君家萬竹遭斧斤石亦去作飛將軍齋居此日空對画目前所喜無風塵凛然清秋氣滿屋六月不知炎暑酷我来賦詩重品題此石冥如此竹勿為葛陂龍勿為金華羊徴君與爾作三友老夫亦得時徜徉聽秋軒詩為開元寺方厓長老作一龕禅寂照蘭膏四壁凉生襲楮袍落木有聲頻到耳學人無語自吹毛寉鳴夜半露􅀄下雁拂月邉風正髙怪􅔄塔鈴饒舌甚亦如九辨繼離騷韓仲禮宦家子也工冩大字終日矻矻予甚閔之賦此以别君不見韋仲將能冩大字一丈強懸空髙冩雲殿榜鬚髪頓令成雪霜君今捉筆長于帚作字繼韋千載後非顔非桞筋􅇧殊大如車輪小如斗知君欲與韋為儔韋所苦者君知否青雲有路去亦好只恐君年未老先白頭願言投筆勿浪出菽水髙堂永朝夕樂莫樂于親俱存画餅功名搃何益九月四日過許君善家觀睦義溪長老與朱公路縣丞等倡和中秋吟君善索和一首老禅吐詞金石聲中秋浩歌蟾兎驚哦松人歸與倡和筆力可扶天柱傾惜㢤未草金鵉詔但說三盃通大道舉杯此夕問姮娥百嵗㡬回開口􅀏天風冷冷洗炎熱炎熱洗空風未歇西齋一􅀣紅木犀且喜看花眼如月喜薦嚴希長老自金陵還山作此賀之京洛多塵土天風為拂衣山中流水在林下白雲歸不說前三語誰尋第一機古藤獅子室燕坐寳花飛和紀叔維中秋清夜尋常秉燭逰况逢明月桂花秋君吟梨谷揮椽筆我泊楓橋倚柁楼白雪似添霜鬂老青天不着片雲浮老夫酣􅆘遥相似座有潘郎便善謳題王叔正江村讀書圖紅葉江上村青燈案頭書長年門不出吾道竟何如叔正過訪􅀓恢書記寄聲作詩寄之余澤歸来王子猷問君知與對滄洲一湾流水市塵逺両岸人家烟樹幽客至白雲分半榻興来明月載􅀌舟如何不到淞江上我看蘆花雪色秋和馬公振江上早行聞君拂曉渡婁江觧得江妃玉佩雙旭日曈曨初挂樹浮雲変化忽成龍路旁客蹈前車覆天上人遭恐撞俛仰古今成一􅀏春風頼有酒能降和衛澄逺雪詩洋海氷寒若凌隂坐看飛雪積来􅅧出門搃是瓊瑶地繞屋皆成薝蔔林為説擒呉今李愬因評怨華古羊斟兎園詞客飄零盡撚我霜髭為一吟和楚蘭江禅老應制賦擁翠之作翻經屋上烟霞客擁翠亭前雨露多道載三車懐報國詩成七步口懸河衲衣風拂天香染錫杖雲随御輦過聖主得賢方藹藹羣臣寕不賦􅃃阿􅀉顔長老江西馬祖不世出城南悦翁雙徑歸芭蕉雨作堂下樂薜荔天生墻上衣繙經猶能作細字秉拂孰與談玄機别来半載㡬相憶江岸小桃花又飛和陳思忠過王德修草堂曲塘楊栁似蘇堤編戸菑畬比鄭陂春日鶯花圖畫􅂻秋風難黍故人期開樽許與傾蕉葉出妓應教舞柘枝老我杖藜慵出入草堂遥望為題詩次王德修韵茅堂有酒時一中少陵郊居今瀼東絶憐春水漲新緑不着市塵飛軟紅百年禮樂重制作四海衣冠今㑹同幽棲正要人不識莫厭門逕生蒿蓬和呉斯民感懐詩到龜巢両日前桞花飛雪正紛然峴山有感知羊祜禹穴曾探繼馬􅁶老我短檠墻角棄憐君古硯案頭穿欲將磊塊都澆去何日移封對酒泉劍井余家劍井邉不飲井中水要令生瑞氣藹藹見多士古甃暗莓苔羸缾委泥滓黄河今復清豈獨長已矣獨􅀌公檜珍重前賢手自栽無情斧斤忍相摧専車載去蒼龍骨竟作誰家㸑下􅁅惠山泉此山一别二十年此水流出山中舡人言近日絶可喜不見流舡但流水老夫来訪舊烟霞僧鐺試瀹趙州茶惜哉泉味美如故不比世味如蒸沙陽羡茶南山茶樹化刼􅁅白蛇無復銜子来頻年雨露養遺枿先春粟粒含珠胎待看茶焙春烟起篛籠封春貢天子誰能遺我小團月烟火肺肝令一洗􅀊朝示二三子十二韵我生老筆耕齷齪不自羞教兒復為之能識此意否為農或逋租服賈必逺逰非才茍祿仕徃徃遭愆尤先師有明訓富貴不可求兒能負米歸老父百無憂日髙三丈餘睡起梳白頭藜床草氍㼶布冠木棉裘比屋吏呌囂吾廬自幽幽食粥了餘年死即埋髙丘今晨捧椒觴復喜嵗一週一倡三子和􅂓作擊壤謳寄徑山顔悦堂長老二首每憶城南隠者家崑山石火徑山茶年年春晚重門閉怕踏堦前落地花兩耳垂肩雪滿顛維摩一室小林泉白雲􅑵下黄楊樹且喜重徑厄閏年懐許君善三首别後逢人問薜蘿打門時有吏催科消磨舊日耽書癖春興吟成恐不多桑扈催蚕枽葉肥麥田雊雉麥花飛春餘閏月無多日鄰舍逃亾歸未歸昨夜龜巢酒半醺春風吹夢去尋君落花芳草千墩路携手斜陽不忍分寄趙朋南二首狂風斜雨去年時大厦難將一木支最喜艸亭脩竹净催科人去復哦詩石首魚来金色新桃花酒熟甕頭春急湏秉燭逰良夜莫遣山公吟􅀏人寄趙執中二首案頭花落硯池香庭下艸生書帶長黄􅃃青燈風雨夜更和熊膽付兒郎一見相知二十春交情無愧古雷陳如今滆上龜巢逺不惜書来雁足頻寄呉中衡老我誰知已端人最憶君常談無􅀑論不作送窮文藥杵三更月莱衣五色雲枽榆春自暖蘭茝􅀤幽芬芙蓉城仙人歌寄贈孫大雅仙人家住芙蓉城芙蓉為冠結蘭纓飛車去作蓬莱客玳瑁筵開麟脯擘八暝揚塵一轉蓬扶枽厭到東王公仙人手策青玉籠翩翩歸袂飄天風華亭之西玉山東羣仙挽留鵉鶴從雲墻霞壁五畝宫金華翠葉九粒松㕠眸㸃漆顔如童瀛洲􅂯看蟠桃紅蔡經家藏老姑酒能為仙人聚仙友琹髙醉歌經拍手要我龜巢老人来和否寄黄宗禮星槎池舘東床客氷玉襟懐我所知百榼蒲萄春灔灔一欄芍藥晝遲遲門前送却催租吏枕上還吟夢草詩只恐綉幃人起早又催京兆画蛾眉秋晚過太平塔下四頋瓦礫塲有懐徽太古禅老作詩招之一時陵谷变刼􅁅飛九州太平古招提寳地成荒丘浮圖巋然在氣勢凌髙秋風鈴作梵音終日語不休以言老禅伯合為故山留竿木夲随身把茅堪盖頭畫沙且成佛况乃願力優髙壇降甘露大車駕白牛老我烟霞交風流繼前修冬至和陳縣丞韵玄機妙斡無古今一陽来復消羣隂聖人灼見天地心賛昜乃鳴金玉音蘭也朝来新盥沐三復韋編謝亭毒卿雲燦爛彌九天旭日曈曨出暘谷丞哉丞哉初下車踐長之喜當何如絃歌化行風俗美寒谷春生自兹始逸菴詩四首為呉子明賦我愛逸菴叟有時能飬生百事不挂懐三樂殊稱情行年八十餘白髪無一莖每聞責子嘆􅀏我如淵明優哉復㳺㢤笠澤山水清日髙三丈餘先生睡初起雪屋燒煖香行庖膾氷鯉逍遥白􅏩巾傲兀烏皮几鉤簾對青山􅀝杖看流水世事了不聞無勞洗吾耳客来両􅁯情不復事迎送有酒即盡歡當盃笛三弄羲黄敢云傲周孔亦無夢衆口從雌黄我腹自空洞行歌山澤間此樂誰與共人生老而逸伊誰無此心惟翁􅆘􅀁願林居小湖隂或持無餌釣或抱不絃琴山水古名画􅀁得氣尤清長嘆康樂公木􅄚費登臨送李彦明歸髙郵老夫歸從東海頭春風送客歸秦郵出門復覩雁北向物我喜得同悠悠呉舡鼔櫂渡江去烏輪政挂扶枽樹桃花倚岸􅀏相看杜宇催人啼不住征袍十年塵土多濯纓今作滄浪歌二百五日寒食雨三十六湖春水波文逰臺榭剪荆棘繼美前修聚佳客誰能喚起老龍眠重冩耳孫湖上宅寄題無錫錢仲毅煮茗軒聚蛟金谷任葷羶煮茗留人也自賢三百小團陽羡月尋常新汲惠山泉星飛白石僮􅃻火烟出青林寉上天莫怪坐無齊魯客玉川茅屋小如舡王松溪知事别両紀陵谷既变復命常州年皆七十餘喜各無恙又喜松溪别第失而復得觴以賀之詩紀嵗月年来両度塵生海二老重逢雪滿顛杖􅂂荒城寒食後琴樽别業舊堂前桃花含􅀏似欲語燕子飛来絶可怜此日為君歌此曲雨蘇春早午隂天後􅂾日松溪見和二詩予復次韵送歸華亭放舟東郭語長年喜見春風不放顛三月鶯花詩􅃃􅂻五湖烟水柁楼前青衫司馬如今老白木長鑱祗自憐歸到鳯山門不出北􅑵真是小壺天雨宿縣學齋舍作客来帷林候漁父黌舍坐聴三日雨諸生讀書喧兩廡商羊飛来立當宁雨聲書聲雜蛙鼓蚓歌自亦諧宫羽青苔上堦茵生柱敗壁淋漓籀文古齋僮不敢開户牖風撼庭柯嘯飢虎南山老石爛成土天漏誰能鍊金􅀘去年旱魃走呉楚田家徃徃悲塵釡麥秋一飽方自許莫教化作飛蛾舞宜山謡併序從来廣東南丹諸州民獠雜居素號難治洪武初朝命設官置司安撫之山東尹明善寔任獠選凡􅀁司事知無不為為無不速􅊩官􅂯期多善政後四年有客自廣東来者傳其事甚詳余乃摘其大者作宜山謡七篇苗獠地連交趾咸籍為民且為除其凶􅃅人悦之作椎結舞椎結舞擊銅鼔淺蠻深蛮皆安堵賣刀買鉏犁銜恩人鳥語獷俗􅁖名去豈弟君子吾父母沿邉舊制置屯十五以猺為長每羣聚為諸州害今罷之民乃安作除虎窟除虎窟虎皆散亾龍睡穴湖南海廣西千里如今無白􅇧無白􅇧人何憂每每舊屯田年年稻花秋我􅀁思􅀆龍江水流兵後薦飢􅀤官廪活宜山􅂾萬口民德之作枯桑枯枽枯枽徒為我薪煮石弗糜曷以食人廪􅀤于官我命乃續誰其主之伊人如玉伊人如玉孚及豚魚詔我婦子償粟勿渝厥粟固償厥徳靡􅁯我懐伊人于􅅅于墻覃國大韋仲海等世為土豪與溪蛮洞猺相為表裏反側不一公以計擒殺之民大快作霹靂斧霹靂斧行天誅百靈奔走羣醜除磔梟獍醢䝟貐招来角端舞騶虞日月両山明畏境成康衢宜山莫天䕶虎踞一方公言諸方伯徙和州民樂之作坎井蛙坎井蛙今渤澥偷生蝦蜆門怒腹氣何在長魚䟦浪欲吞舟竟作任公雪花鱠蛙平幸偷生有愧輸􅉭􅈉前度放蛙人今日恩如海蠻獠負固税乆不貢農病于重歛公均之視前賦减什五六恩不能􅁯作生子以尹名生子以尹名有田宜湏力畊昔憂公租重今喜公租輕窮􅉉杼軸具當路鈞衡平焦㝠覆盆下覩此白日明革命之初公以安邉事宜屡白相府民懐之作鞍馬勞鞍馬勞肉消髀廣西一去二千里借箸籌邉丞相喜両年单騎八徃廻青草黄茅瘴烟􅂻鞍馬勞有如彼不負公不掠美一寸忠丹報天子送丞漢德員外徙居臨濠憶昔呉鉤歛霜鍔歐台已知蛟可斮窮探虎穴走山靈勇撤蜃楼招海若三台分照紫􅅔垣一飛徑入紅蓮幙安知滄海忽生塵乃見巨魚今縱􅊤携家春雨赤城邉還揚舲秋水濠梁約老夫白髪三千丈别来幸有琴書樂羡子青雲二十年此去亦無冠冕縛故鄉相見恍如夢徃事重論成大噱呼兒觧我鷫鸘裘􅄐亭飲客鸕鷀杓南薰稳送渡江水西􅀏遥憐好城郭莊生臺上看魚鯈彭祖山中拾靈藥平居襟懐夲瀟洒在䖏林泉可盤礴有回首望江南題詩好寄雲間鶴次韵贈董明府兼贈陳縣丞尹主簿緑莎聼事洒清風四野遺黎集澤鴻佳政搃堪書國史丹心曽不愧天公横琴坐對中秋月援筆詞傾百歩洪僚佐粹然連白屋有時来我瀼西東寄錢夢弼併為乃翁宣慰公夀門對青山晝掩扉家居身著老萊衣􅈸于日下看花去贏得街頭負米歸一􅀏􅘑舡香雪美百年城郭昔人非髙堂秋爽而翁樂稻熟湖田􅈉正肥送虞長史歸閩中十四韵卓犖青雲噐凄凉白雨秋棄官辭傳舍舁病上歸舟岸有吟蛩送墻無語燕留七閩天杳杳兩浙水悠悠親舍􅀌雲影山城大海頭倚門勞逺望脫屣得長休金榜聲名在班衣志願酬猗蘭重製曲蘐草足㤀憂丹穴生鵷鳳龍光射斗牛此心能自足餘物更何求老我三家墅憐君百尺楼相知稱鮑叔逺送愧鄒逰海上多靈藥山中儗素侯家園紅荔子能寄故人否埜人居短歌三章為呉中衡賦野人居住何許屋頭東邉扶桑樹三江五湖在庭戸身着老萊衣手擘龍根脯賦㱕来􅀆謝簮組野人居誰與論芸夫蕘子皆同塵朋来逺訪多搢紳焚香據槁梧持盃岸綸巾睠魚鳥􅀆情相親野人居書滿屋神農夲草僅一束用之可比連城玉菊潭秋水香杏林春樹緑樂吾親􅀆􅁯啜菽過馬公振南江草堂南江草堂人白眉湛書成癖復湛詩千金買書讀未了化作刼􅁅飛海涯國風雅頌三百首愛入骨髄淪膚肌兩京三國六朝下驅駕直與唐人馳老夫一别􅂯寒暑重覧碧海􅃢瑚枝溪西隠者亦好事白首苦吟􅁯渇飢逢人徃徃誦佳句况此酒邉逢項斯歡然共醉成夜宿石銚煮茶焚玉􅅋詩家風月談未了老蟾已墮西山陲盍簮此夕復何夕一庭寒菊花離披􅀛巢藁卷之四終
