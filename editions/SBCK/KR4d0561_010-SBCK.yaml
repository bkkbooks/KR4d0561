front:
  text: 􅀛巢藁卷之十
  hash: sha256:56c4e083d90055cc0603c427276f750d5e90af920cadd28ac44fd6382b9673e4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0561_SBCK_010-1a}
body:
  text: 詩贈馬吉卿太尉􅀄開藩府日我卿長揖與談兵快鞭自此宜先着偉噐如何竟晩成舊菊􅂾株荒老圃寒流一􅅁遶􅀌城草廬只在齊門􅂻堪􅀏無人識孔明山人家為路以道作先生自是青雲人歸来故山鉏白雲家徒四壁藤蘿屋頭戴一幅逍遥巾松根茯苓大如斗木柄長鑱常在手賸􅀵市葉敎兒書更摘松花釀春酒題詩滿屋酒滿舡客来無日不陶然人間豺虎自闘死雲中雞犬多成仙山人家住山林好日日晏眠無事惱􅀏他東望玉門関絶域思歸歎年老過牛彦伊寓􅀁對雪口占問訊蛟龍浦来㝷鷗鷺盟天風寒屭贔氷雪􅀊峥嵘平旦徐徐起清樽細細傾獨憐鄊􅀦逺西望苦為情羙崑山費知府重修學宮詩昔侯未牧崑山州州置逺移東海頭百年鄊校風雨毁四郊戎馬烟塵秋州仍舊山侯下馬勸農耕桒重儒雅春秋籩豆駿奔走日月宫墻煥圗冩素王清廟衮龍衣博士髙堂鸛雀飛泮池芹藻堪采摘帷林草木生光輝時方擾攘人用武侯為斯文扶砥柱同僚才並青雲噐参佐功成修月斧廟前銀杏雙葢青堂後玉峯開畵屏諸生揖譲秉周禮我侯語言宗六經官清只飲淞江水鱸魚自肥蓴自美齊名常衮與文翁興學之功照青史代道傳招路徴君益上人過西林精舍西林新種梅花樹未有詩人為品題尊酒小窓邀上客杖藜今日過前溪家園小摘金盤菜野徑􅀄乾臈雪坭二老風流堪入畵不妨琴與寉同携贈水西長老中伯庸兼簡承天毅剛中禾城說法兩三年􅆛虎如林䕶法筵一片白雲閒出岫五湖春水濶連天詩堪􅀘世方留稿琴乏知音覓絶絃頼爾峩峰堂上老喜留賔客共盃泉雪中懷杜玉泉玉谿兄弟曁管伯齡對雪僧窓憶舊逰浣花溪上草堂幽弟兄愛客情懷好賔主談時氣味投􅀭楚兩川城近接吳淞一􅅁水長流興来早晚相尋去觧􅄃漁翁覓釣舟元日同趙君綽早起崑山州烏紗白髪兩遺黎同賦新年第一詩吳下喜頒堯日暦嵩呼重見漢官儀春回南􅀦梅先得律轉東風樹未知試向馬鞍山上望楚氛猶自暗􅁁陲訪王景逸不遇其婚梁􅀦傳留宿東齋作此簡景逸并允德阿林随我曵長􅅂宿爾幽人水竹居雲暗一天龍吐水溪喧半夜􅆩求魚邯郸枕上新年夢光範門前舊日書欲與兩賢論出䖏還家相見意何如吳生以趙仲穆􅀁書蘇文忠公逰道塲何山詩属張天英諸人及予和之溪流行盡穿林􅅢白塔紅亭照岩谷道塲􅅧處看何山僧住山頭我山足兩山雲似海㳽漫飛路百折空中盤我昔幽㝷愛僧舍亦欲卜築臨清湍東坡先生不世出咳唾珠璣落禅席可憐前度燹厄兵燹一踣寳塔誰􅂯植永嘉山水汚􅁔鬟幸無若人来此間坡詩珍重趙侯冩使我見詩如見山我衰不夢周公旦猶夢㝷山及春半買花載酒約吳生慎勿渝盟重嗟歎寄楊鉄崖讀君舊日伏闕䟽喚起開禧一番愁龍川状元曽表怪冷山使者忍包羞東江風雨一斗酒大地山河百尺楼白鶴飛来作人語道人赤壁正横舟次韵楊鉄崖過李楽菴墓胸中萬􅃃色絲長才出􅊏毫􅀘舜裳􅀏脱廌冠辭栢府羞看狐穴􅀝椒房結菴投老林泉楽易簀遺言翰墨香鉄笛仙翁今表墓娄人當不愧桐鄉次韵寄梅西溪宦情吟思兩如何咫尺娄江不我過吳下土風良不􅁖春来花雨喜無多三農飽喫田間飯諸􅀅猶揮馬上戈州縣勞人宜莫厭要令􅃭袴有新歌寄贈費伯謙愛爾青年二十餘無心富貴獨眈書楊花雪落滄洲静艾納烟銷白室虗門外自馳金腰􅒁案頭長對玉蟾蜍别来吟得詩多少好寄江村慰索居簡趙執中溪鳥􅁯机與結盟隣雞觧語共談經􅄕前花落胭脂雪楼外山開翡翠屏無事干人腰􅂴折多情于我眼偏青于今同飲長洲水只隔烟波望徳星過悦堂長老看沉香小山適見楊鉄崖􅀁題畵像堂堂之容令人起敬因作此以贈阿師僧中之白眉身長九尺􅅨耳垂金爛袈裟舊御賜鉄􅅇道人今賦詩貝葉手繙諸般若沉香誰􅅣小湏弥不知門外春􅅧淺花雨繽紛二六時題恒上人清流堂悠悠黄天蕩菀彼祗樹林水流􅂈堂下一􅅁清且􅅧要之源頭活澄澈無古今山僧作􅀚想亦以明其心停雲共徘徊㳺魚自浮沉三伏不知暑爽氣生緑隂水華晩色净風栁􅀌蝉吟嗟㢤五濁世干戈如沸􅑄客来且􅁯言滄洲濯塵􅁭懷道傳上人海上誰知己僧中有此郎借人三畝宅留我百花荘故里烟塵闇窮居􅀊月長釜鍾時振乏燈火夜分光書摘金拫誤詩嚢夢草香溪山皆杖􅂂花竹共壺觴每念馮唐老能容阮籍狂五年同信宿十口頼歡康辟榖終無術飄蓬又逺方世情多可􅀏交誼獨難􅁯南􅀦黄梅雨西林緑樹凉思君重回首湖水隔㣲􅃼懷滄海上人床頭不問有金無客到山中酒必沽愛我生来心似鉄逢人為道唾成珠㝷梅㡬處同舟去對月常時折簡呼别後合塘春水暖栁隂誰與看飛鳬又自述并簡滄海幽居頗喜俗塵無坐看諸公玉盡沽滿地楊花風􅐈雪一池荷葉雨跳珠借書日與兒曹讀隣酒時令老僕呼山上有山曾有約何時㕠􅂂作飛鳬和徐伯樞􅀄還膠山作無錫􅀇度子昔年􅁔舞送航船每日登臨對乳泉麥秀故基今雊雉花飛南􅀦又啼鵑官軍尚喋􅁁城血田舍􅀄生灶突烟只恐歸耘歸未得徴車􅀅到白雲􅁁次贈韵徐仲剛兄弟難弟難兄思不羣風流絶似太中君對床夜聼山中雨辟世春耕隴上雲四株松樹青隂合一􅅁溪流野色分老我劍心猶未死尚携長鋏客田文次韵贈慶徳謙監州彷彿桃源古洞天幽香兩岸闘婵娟烟波鷗作􅁯机友風桞蝉如脱骨仙田父相過終日醉畦􅂼小摘四時鮮棄官溧水歸来早嬴得閑情樂酒􅁁還珠詞三首寄頋仲瑛并序予以玉山隐君避地居擕李猶合浦之珠徙而去焉今謝杭州當路于吳而州縣更化猶合浦之有孟嘗也人而珠者可不還乎因作合浦還珠詞􅀉君以致招要之意其詞曰嗟爾珠生合浦川澤見光輝采珠人似雨孟嘗不来􅀆珠亦良苦鮫淚竭魚目瞽嗟尔珠去合浦川澤失光輝龍嗔献珠女孟嘗下車􅀆魚鱉率舞象㒺除吏商阻嗟尔珠還合浦川媚仍含輝潜居水仙府孟嘗愛物􅀆物無違忤明月出夜光吐代簡錢夢弼六年不見堠山雲愛客情多最憶君社酒每傾鸚鵡盞燕姬屡舞石榴裙漁郎一去仙源隔燕子重来舊宅焚别墅于今隣錫谷煮茶還許石泉分絶句屈原投江死􅀭雄投閣生一時生死計千古是非心􅁨五雜書四首使者乗槎海上来藩臣迎詔府中開半年赤地無纎雨此日青天忽􅎋雷鵷鷺聨班齊喜舞梟鴟脱􅃠莫驚猜征西諸􅀅橐􅃓矢應受淮夷納欵回其二逺客相􅂈說帝都黄金如玉米如珠内園人歇催花鼓市肆塵生賣酒壚河北功臣稱李郭江南租税頼􅂫湖明朝漕運開船洋去㡬日風㠶到直沽其三賨布􅀄来價倍髙吳塩重榷令如毛淡烹蓴菜􅅅無豉倒看天吳褐有濤風起株林號虎兕天連青海縦鯨鰲長洲茂􅁐河山好自愧多憂兩目蒿其四緑髪年来忽巳皤尊前不楽復如何直如栁惠猶三黜醒似靈均漫九􅁔無􅂾烏鴉争晩樹一㕠白鳥皓清波相逢莫厭滄洲静要路從前覆轍多和徐仲剛歸田二十韵山下室環堵門前桞􅂾株青秧移􅅵畝白水似陂湖辟丗方躬稼傳家夲業儒十年躋仕路兩浙走危途熟路歸来馬髙林返哺烏烟塵雖未息風月不虛􅀌松葉燒茶灶花枝挂酒壺拂塵椶麈尾席地草龍􅂡烏雀窺窓隙漁樵来坐隅家居􅂓放適世路甚崎嶇池水魚堪飬庭堦草不誅眼前能自足身外更何需病寉開籠放飢猿擲果呼看雲添逸興對月了詩逋田父邀皆去村童醉或扶不嫌鄊俗陋甘學古人迂西堠良田熟東膠小徑紆泉香雲骨髄花瑩雪肌膚犬吠溪雲出牛歸田野晡幽居東近海何必更乗桴寄寗伯譲州倅次仲剛韵籠鶴乗軒􅀏衞公歸来髙卧北窓風􅁯机鷗鷺相依乆滿眼湖山與畵同洗馬池􅁁楊桞緑釣魚亭下藕花紅自知大噐成湏晩不與時人較近功次韵寄斷雲法師嵯峨塔廟壓長橋東望扶桒路不遥聼法龍来雲滿室傳衣人立雪齊腰堦前祗樹黄金地石上菖蒲碧玉苗猶記昔年相見日為師吹徹伍員簫和沈啓之席上詠梅絶句把酒花前􅁔竹枝看花不覺舉盃遲春来結得黃金子還有調􅅅􅂦鼐時弔頋􅀅軍墓并序頋榮字彦先晋散􅀐常侍驃􅀐􅀅軍開府儀同三司謚元公其勲業詳見晋史予嘗慕其為人今客吳門適近其墓在皇天蕩南地方二三里土人直以頋榮墓名之予因徃弔焉白髪吳儂說姓名􅀅軍墓近闔閭城徴車入洛稱三俊割炙知人得􅂯生江月似留揮扇影松風猶作鼓琴聲傍花舟一酹蘋花渚野鶴㕠飛躑躅鳴寄徐頥齋先生一昨天㤙頻賜帛􅂾年􅀦歩政多艱莫嫌旅舍􅂊容􅂰喜有丹砂可駐顔進乳吳姬香玉暖弄雛萊子綵衣斑故園松菊知誰主又見秋風燕子還九日為客東吳年復年吳霜飛上髩毛􅁁青山滿眼暗如霧白雁一聲哀徹天細看茱茰占老健忽聞桃杏作春妍隣翁􅀅謂花呈瑞邀我題詩展盛筵送陳希􅀇入道海上蓬莱知有無林泉隹趣即仙都三朝寉繞燒香几九轉龍蟠煮汞爐滿地白雲山舘静隔溪紅樹水村􅀌􅃻門莫厭相過客要覓丹書古篆符題梅竹水仙圗羅浮羙人􅀝脩竹凌波仙子適相逢春風桃李自塵土不涴嵗寒氷雪容代簡倪雲林江水西頭繫客槎漁庄遥望隔鷗沙枕書門掩三竿日題畵毫飛五色霞盃斚椒香仍臈味堦庭蘭茁又春華雪晴我欲㝷梅去尚待東家借鹿車贈馮縣丞二首野夫東郭帶經鉏田畯相逢為下車百里雷鳴元夕後一犁雨足五更􅀄行庖只飲長洲水署筆頻抄種樹書獨奈賦蛇除未得逢人蹙額問何如其二九土荆榛七八年吳儂輓粟上青天秋風杼軸黄茅屋春雨犁鉏白水田農畝要令無佩犢琴堂正頼佐鳴絃停車為說哦松意立盡斜陽野樹􅁁題墨竹吾聞雪堂老仙之愛竹到處􅃻門看猗緑為誰冩此秋一枝葉葉風生清可掬恍如坐我此君軒與君相對澹􅁯言焚蘭金鴨綴鳳髄我思古人欲覯止盧知州宜興秩滿以辟亂乆寓無錫視同故鄉今知崑山必有懐二州風物之羙贈詩言情并致頌禱我思陽羡茶􅀄生如粟粒州人嵗入貢雷霆未驚蟄天荒地老今㡬年春歸又聞啼杜鵑山中靈草化荆􅁄白蛇何處藏蜿蜒玉川先生一寸鉄欲刳妖蟇救明月丹霄路㫁肝腸􅀬還憶茶甌飲氷雪其二我思惠山泉長流無古今瓶􅎆走千里煮茗清人心向来烈火炎錫谷神焦􅀑爛􅀔莫撲池􅁁堕石亦􅁅飛此水冷冷㵼寒玉髙人飲泉五六年一􅁭清氣清于泉好為吳儂洗煩􅀬乗風歸報蓬萊仙可􅀏崑山州奉省府之命例試在學儒人以予為第三名故有是作可􅀏秋娘巳白頭也随年少上秦楼舞腰强作春風栁不及春風栁葉柔頋仲瑛辟地嘉興㡬二年聞回崑山徃見不遇作詩寄之末章兼簡西白長老細雨清明節扁舟過玉山傳書元有誤飛寫竟無還芳草萋萋碧落花􅀧點斑題名墻外竹黄鳥正間関其二客来常問訊書去半沉浮兩度黄梅雨相思白髪秋樵􅂫今短笠山水古長洲寄與天寕老􅀛巢賦咏不麥秋􅁔和徐主簿韵太倉陳陳􅀊仍熟田舍嗷嗷食無粟朝来飯甑新麥炊一穗青烟出茅屋磨旋日月出霄屑湯湧波濤跳碎玉耕簑樵笠壠頭歸急雨森如㵼銀竹妻孥􅀏語同一飽且免飢雷鳴此腹安知列􅂦五侯家日食萬錢猶未足和陸宗魯韵贈夏師魯百斛葡蔔賸有餘一官不換只閒居窓含雲氣虞山近門掩秋聲栗􅀣䟽鴻雁去来知㡬度雞䖝得失竟何如丈夫髙盖非無日􅂓遣閑情賦子虚桐鄊送費伯謙之吳郡侍親若翁清約似無官宜尔儒衣不厭寒燈火十年勲業在河山于古畵圗看氷池魚躍供調饍雪屋雞鳴起問安他日過庭煩寄語别来頭白卧江干鉛上人席上作有客有客􅀛巢翁􅂡髯如雪氣如虹􅁠門要路脚不到寕與山僧野老長逰􅀙鉛公喜不縛禅律百榼沽来作生日雪花似亦為人喜庭舞婆娑俄入室酒􅁁􅀏殺東家兒㯽榔不與劉穆之㝷常有客謝無酒有時對酒還攅眉人生能得㡬􅀄度且無長䋲係烏兎痴兒夢夢真可嗤不識盈虚元有􅂾君不見黃頭郎到頭餓死錢堆傍何如眼前有酒且為楽母令愁結九廻腸遣愁二首偶覧青銅鏡方驚白雪髭如何不飲酒猶自苦吟詩靣作鞾紋皺腰間􅅁孔移獨存方寸鉄剛似少年時其二茅屋瀕湖住蕪菁借地栽一秋常苦雨十月屡聞雷岸草青青出墻花灼灼開埽除蝇蚋迹還有北風来和危太僕􅂙政韵送慶徳謙治中驅馳百􅀐稳如船雨露新承下九天當道故人多汲引大􅂙佳句獨流傳􅂾年華髪風塵􅂻一點丹心日月􅁁老􅂹只今方展足蜚英當不愧前賢留别智隐愚長老蘇昌齡先生淞江太湖春水生湖􅁁白鷗尋舊盟逺么沽酒壮行色坡老題詩慰别情燕子日長書屋静落花風颺釣絲輕相過不負青山約一櫂夷猶両日程徐伯樞和韵送行予復荅之主人送客呼麯生膠山􅁲居仍有盟祶􅂁恋恋感君意去􅀦遲遲知我情敎子正湏熊胆苦看花應喜馬啼輕老夫把釣扶桒下目送􅉇摶九萬程輓雍逸處士孝友人無間詩書子更賢十年遭丗亂三樂得天全處士星今隕虚堂月自圎客来懸榻在老泪為澘然寄謝㕠陽沈仲庸并簡同席諸友一林脩竹映滄洲百榼蒲萄泛玉舟送客留髠成大醉憐君小阮與同逰舊家燕子飛華屋滿地龍孫着錦裘絶似蘭亭修褉日坐中賔客搃風流朱明道等九人和前韵見貽各荅一首并自述一首贈朱志道新居風景似麟洲我亦頻来繫客舟山列畵屏朱果熟湖開青鏡錦鱗㳺踈狂不厭髙陽侣凋敝應憐季子裘有酒正湏開􅀏口黄河今復見清流贈朱明道光月軒前杜若洲􅈽琴童子釣魚舟蝸牛有􅀦方交􅀾鷗鳥􅁯機且共逰戯綵諸孫頭峙玉瀕湖三頃足菟裘吟餘不接紅塵事洗耳無勞枕碧流贈朱原道楊桞花飛雪滿洲水􅁁亭子小如舟四時花月供談􅀏千古湖山可釣逰有客即呼鸚鵡盞無衣還贈鷫鸘裘試聼月旦評鄊里倜儻今為第一流贈趙善長清江濯足坐中洲自喜身如不繫舟槐􅀦功名前日夢玉京􅀌負少年逰每邀田父同雞黍巳學山人製鹿裘醉後劇談今古事靣如頳玉語如流贈華子强父子晩凉池舘藕花洲郎罷呼兒放綵舟老􅂰尚容文度坐佳賔多與阿戎逰長腰米飯猶珍饌五色莱衣勝綺裘莫􅀏東家人評語由来涇渭不同流贈盛彦英愛君楓落吳江句有客相期放剡舟滿眼雞䖝從得失􅁯形鵬鷃共遨逰秋来江上鱸堪鮓嵗晩山中貉可裘如此幽居良不􅁖比隣况復有詩流荅惠上人鍊得身形癯似鶴江湖杯渡㨗于舟湖􅁁舊宅適歸隐吳下諸山今卧逰學道已知磗作鏡工詩更悟冶為裘曹劉沈謝何零落風月平分支遁流荅崔彦麟老夫衰􅂴慙無學年少才華羡李舟好覓靈槎天上去莫攀仙桂月中逰踞床我欲来吹笛換酒君當為觧裘最喜今年秋至早凉生六月火西流自述少年學士俱瀛洲老夫浮家唯葉舟每憐古調少人聼幸得新知如舊逰四海風塵桃竹杖十年霜雪木棉裘迩来同飲太湖水最喜白鷗非俗流簡吳江朱志道昆仲去年長至聼塤箎轉眼今年又此時棣蕚喜存兵後樹梅花早綻雪前枝西山近日無烽火東閣何人共酒巵兒軰北歸今問訊呉音变楚莫相疑盛彦英隐居太湖之隂號具區耕叟命僕作詩以歌詠其楽云脱屣東華塵躬耕太湖濵桒麻接隣里魚鳥情相親間時讀書牛背上安知六􅀦方攻秦東風三月桃花雨布榖飛来向人語一犁􅀄破隴頭春黃犢去欄健如虎羲農世逺莫可追南山石爛無足悲悲􅁔􅇞戚夜半猶未已人間閑是非何用汚牛耳我田已耕春晝閑樵童随我看青山日暮歸来一壺酒我􅁔嗚嗚童拍手兒飯牛一天星月爛不􅀵重捻鉄􅅇作三弄七十二峯俱􅀧頭臈月臈月無多日行年六十三浮生空自老徃事日多慙南􅀦山皆赭東郊草未藍蕭條江郭外雲瞑雪毵毿懐野舟閑老長兼簡真夲元大地北風寒且嚴香凝丈室晝垂􅄕庭前栢樹心相契窓下梅花手可拈出郭鐘聲聞􅂾里穿城塔影見重尖欲求智永千文帖煩說區區寄口占偕徐伯樞訪王孟翼酌酒論詩經宿而别舊􅀨客来今復来溪堂新築栁新栽風生玉麈談詩律露􅊜金盤把酒盃淮甸三􅁁烽火息吳山千里畵圗開相如未奏凌雲賦當路誰能薦逸才劍池送曹廣文赴學士院檢討峩峩虎丘山湛湛劍池水水􅅧人莫測草生寒不萎世傳祖龍劍砍㫁蒼雲根千古兩絶壁鉄花􅀧苔痕僧厨轉轆轤隂厓落氷雪臨池人有語響荅出林樾先生屡幽賞盥濯弹琴鳴木石俱􅀧頭龍魚亦知音今居白玉堂還念青山約羣仙與重逰增輝舊岩穴雨中懷徐草堂兼述杜掾史求詩之意亂紅飛盡緑隂稠風雨凉生四月秋且喜三􅁁清似水何妨一室小如舟歐虞墨帖時臨冩呉越青山搃卧逰肯為杜陵題老桂難兄應作置書郵和浦玉田清明日郊行六絶湖上新堤􅂿軟沙少年人靣映桃花花村風物渾如舊獨欠青帘賣酒家其二栁絲梟裊拂滄波花􅀨班班􅀧緑莎寒食清明春又晩人生不楽復如何其三笠澤西頭王墓村桃花水浸竹籬根年年春到清明日兒女郊行栁挿門其四一幅春雲巧似裁滆湖飛過碧山来野橋小立題詩處夾竹桃花爛熳開其五四望青山眼欲花山光都是薄雲遮杖藜徐歩歸来晚月上東窓恰到家其六每惜春花去後思春来行楽復何辭放舟莫近吳門去諸􅀅楼船正出師夀徐伯樞碧山湖􅁁銀杏樹􅂾百人家星散住中有南州髙士孫借屋讀書􅅧閉門豈無香醪甜似􅁡好客相􅂈方與喫朝来爛醉呼不醒蓬矢桒􅃓挂虚壁皇天有意生男兒錦綉五藏瓊瑰詞亂紅飛去緑隂静菖蒲花􅀤當何時贈􅁑天民吾聞清孝公為君八世祖可憐遭亂􅄐麻鞋走塵土床頭無金何處索堂上雙親頭欲白五星􅆞度書一編江湖乃作談天客吾嘗閲其書心目俱􅃼然星辰之髙四萬八千里三百六十五度分周天人生両間應列宿探索豈易窮幽􅀇君今自喜得其妙回視筌蹄成一􅀏萬象森羅方寸中千尺碧潭寒月照髙談徃徃驚倒人黃金捆載歸飬親鱸魚斫膾􅅅紫蓴􅄶􅝆五色斑衣新人家生兒孝飬有如此何必鐘鳴􅂦食重華茵扁舟􅂈我三江口留宿􅀛巢看星斗攙搶熒惑搃莫論且道酒星無恙否酒星苟無恙酒禁必早開娱尔白髪親酌彼黄金罍我生不願萬户侯亦不願識韓荆州但念太平無事百不憂吾兒賣文君賣術得錢可以沽新篘命吳姫謳若翁與我日日眠糟丘崔宗明掾史請吿之錢塘省母􅀅徙居東吳時太尉丞相張公在分省嘉宗明之行贈錢􅂾千緡故詩及之丞相知君念母情金刀錯落贐君行衣冠祖道三江口帷幔歸舟㡬日程烏鵲知人先喜信鱸魚入饌試當烹髙堂若問吳門事王􅀦金湯第一城和浦玉田詠物二首嗟尔五月菊黃花􅀤何早平生傲霜枝乃雜半夏草趋炎真强顔乆雨竟垂老榴裙炫人眼坤裳為誰好忍負陶淵明秋風舊懷抱其二嗟尔六月蟾爬沙出何遲天生一腹皤且有三足竒乖時人共棄保身自汚池昨午遭磔死同􅀋多可悲月宫老蟇精居髙知不知寄陳子章申屠仲􅁠聼雨聼風半月餘髙齋吟嘯興何如雨添泮水芹芽長風撼帷林杏子踈毛頴功名應立傳杜康交絶豈無書陽春白雪詞皆妙好寄􅀛巢慰索居賀陳子經赴學士院著作白玉為堂置此身詩書端不負人人花生綵筆絲綸羙栁絮宫􅂁雨露新日過八磚趋禁署天開一􅀦用儒紳吳淞江上漁樵客也為謳􅁔寂寞濵楚南藏主来詢知元明師居義興中山附詩問訊十年不吃陽羡茶山中舊宅知㡬家道人今歸卧烟霞石池手種青蓮花青山且喜依然好蛟􅀆龍􅀆跡俱掃客有放槎東海頭安書好寄􅀛巢老感物二首寄珪玉田書記矯矯千里駒英英五花文塩車太行路汗血亦滿身嗟尔夲龍骨誤随凡馬羣何當一變化翩翩籋青雲其二樞官降精英為象純玉色誰令耕舜田乃負烏犍軶豈無金覊絡錦􅅁為尔飾鼻吸酥酪河歸来梵王宅和靈岩虎丘感事二首娃宫無復有楼臺佛刹而今亦草萊衲子盡随飛錫去􅀅軍曾此駐兵来青山銜日猶前度滄海􅀭塵復㡬廻霜落吳天香徑冷斷猿啼月不勝哀其二兵餘重到古禅関無限傷心四望間林下􅀧頭皆礟石門前􅀾􅇧似丘山劍池屡變珠光赤盤石猶沾血􅀧斑白髪布衣耆舊在獨憐寕老不生還次韵荅因了菴重經喪亂勞相憶多謝􅀅詩問􅀁居隣有􅀦朝新定律家無屋壁舊藏書月明江上魚龍伏􅀊晏山林草木踈堪􅀏出門多􅆡礙兀如禅衲坐僧廬普􅊰主哀詩六首前代王孫錦繡腸中藏萬卷佛書香一鞭竟著三車去不作修文地下郎自喜年来両耳聾不聞今古闘羣雄每逢林下三生石只說㝷常萬事空長把吟毫貌水仙梅兄礬弟亦牽聨如今􅀵拾歸何許兠率宫中别有天璚林自有鳳凰枝枳􅁄叢􅁁翅偶垂鴟嚇不知縁􅔄事赤霄飛去竟難追茶毘烟㫁蛟龍浦舍利珠藏窣堵陂􅀙此不沽陶令酒藕絲零落奈秋何天台一曲繼天泉獨􅈽瑶琴三十年古調不随陵谷變麟膠誰續㫁頭絃寄孫彦民讀君吳儂詞如讀舂陵篇惜㢤未作郡手拍元子肩􅀇髪亦已華鉃硯亦已穿秋蘭抱幽馨竒寳横道􅁁請以白雪曲載理朱絲絃勿論聼者希我心自怡然題水仙山礬梅花圗二首綽約誰家女子依稀水府仙人莫怪無言脉脉正湏頻喚真真紅杏碧桃春暖梅兄礬弟氷清會得生花筆意隐然金石詩聲己酉元日漫興四􅀦山河喜奠安一年時序又更端酴酥春酒到手暖楊桞曉風吹靣寒太史始行新律暦齊民俱易古衣冠故鄊只在停雲外可奈親朋欲會難簡曹仲鉉東海歸来塵自颺一竿西日釣滄浪洲人尚説家聲在沙鳥皆知世慮􅁯竹笋滿林冬入饌梅花繞屋夜生香吾兒學稼書仍讀應喜分燈過短墻送贈題日夲吾聞􅅁方東南有􅀦環滄溟􅀛峯雲接扶桒青紅梅花開作絳雪隹寔亦比蟠桃頳􅃢瑚出水光奪目老蚌吐珠皆夜明山藏水産足珍怪惟人尤得鍾其英釋門龍象献寳出眉目秀異風􅇧清錫飛一萬四千里欲以佛法中華鳴首探天目獅子窟酷肖厥祖天人驚三吳百粤小盤礴王公下榻争趋迎大㢤禅月古藂社正法眼藏轟雷霆思親要織睦州屦春風稳送㱕帆輕老夫扶􅉵走相餞事有干請煩留情徃来尔􅀦逺秦火六籍不随埃燼零願言傳冩遺全璧一洗魚魯開羣盲上人名亦垂不朽能使舶䑲為馬䭾吾經張伯祥自濠州惠詩且相傳有還家之喜即事口占􅂓抒情愫春風濠上来家奴寄詩親朋及老夫㣲詞周折出肺腑螘絲九曲穿遺珠神􅀛脱網曽有夢靈鵲報喜寕虛􅀌大鈞播物各生遂忍使鳳凰長在笯羣兒覓竹跨爲馬吳淞江上迎㱕艫南堂花竹春正好玉芝燦若􅃢瑚株老夫亦作輭脚局典衣沽酒黄公罏賀陳思忠自濠州歸南山石爛海􅀭塵播物依然出大鈞坡老暫爲儋耳客謫仙豈作夜郎人㱕舟㠶􅃃桃花􅀨家宴盃傾竹葉春雪髪巢翁臞似寉也随鷗鷺去相親水村􅁔二首為趙鵬南賦我愛水村好為作水村􅁔君家水村二百載閭里向来冠盖多銅駝巷陌自荆􅁄滄洲依然皆烟波墻花巷桞接葭菼蘆藡蘋蓼茭蒲荷澱湖噴薄東岸曲陳湖繚繞西丘阿前看震澤後笠澤青山􅂾􅀧堆青螺錦溪橋頭魚米市亦有朝鼓鳴如鼉市聲豈不傾人耳先生閉戸雀可羅筆床茶灶漁童釣蓑人􅁛陸魯望自比張志和両賢尚友作三隐過也亦宜呼小坡長安道上人擾擾奈尔水村安楽窩其二我愛水村好作歌仍和之水村之楽能自得水村之號真相宜齋居隐几白日静門外係舡青栁垂讀書窓雞亦觧語􅁯機沙鳥皆相知葑田種秫足為酒草亭對竹長哦詩平生自是愛結客載酒門前来問竒清談閑揮玉塵拂髙會醉傾金屈巵飲牛有渚畜魚有池老夫願卜隣矮屋與隔籬分燈紡績兒女共曵杖徃来隣舍嬉從此水村作土著與君説詩時觧頥次韵荅許君善小徑紆廻草欲迷村居如在瀼東西為煎新茗頻􅃻火自掃殘花恐汚泥白首十年吳下客傷心千古越来溪羣賢何日能相頋重為湖山一品題次韵荅焦任道誰越誰秦自瘠肥别来十載電光飛尚看書帖題青李未掌絲綸對紫􅅔老我􅁭懷寒古井憐君氣宇盎春暉石川古栁清隂好且繫書舡莫賦㱕次任道韵贈朱公路賛府清濁無論渭與涇請看流水悟浮生莫憂白石南山爛且喜黄梅細雨晴石几題詩焚艾衲水亭酣酒卧桃笙􅀲田不理春来草怕有人呼作邵平謝焦任道惠畵焦君青雲噐不减阮仲容飲酒五六斗卓然猶祖風髯龍吐醉墨逸氣超鴻濛騷雅靡不作無聲詩更工淋漓練裙幅遺我􅀛巢翁翁老如兒痴耆詩羊棗同層崖飛瀑泉撫玩意不窮何以報夫君秋江待芙蓉荅馬公振見寄三首燭龍銜日火雲迷飛到中天不肯西安得天瓢㵼凉雨仍看地裂􅀘春泥兵戈不到王官谷烟樹相望罨畵溪莫􅀏老夫多古意露筋祠廟要君題其二經鉏􅀄不效常林安我貧居未死心江上小山堪入畵門前新桞未成隂㫁徧重緝􅁯年老險韵􅀌吟到夜深毒􅀬甚于中宿酒我頭連日爲岑岑其三頼有酒舡堪拍浮何憂蓬鬂不禁秋卜隣老圃今􅀲及借榻僧窓喜竹幽老大正當秋近􅀬㣲風可奈晚来休能􅀐欵叚来相頋惟尔同鄊馬少㳺次韵􅀉野舟長老舊雨别来陵谷変新秋又見火流西黄楊樹厄重經閏白藕花開不染泥千古長洲連茂􅁐一湖香水似曺溪支郎愛馬情還在念我塩車月老題橘隐軒為鄒仲謙作愛爾林居物色幽茅齋橘樹對滄洲添修太史木奴傳合比列仙松子逰氷雪盃香􅂫井水霜風簾捲洞庭秋小山藂桂遥相似只恐招賢搃未休􅀛巢藁卷之十終
