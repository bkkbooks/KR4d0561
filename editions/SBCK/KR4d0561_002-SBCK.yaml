front:
  text: 􅀛巢藁巻之二
  hash: sha256:b3feb0ee29b6a5e983cec63779b20d652239b7b11af67b965500c48062393ed0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0561_SBCK_002-1a}
body:
  text: 奉陪陳伯大先軰及趙師吕張伯啓朱月江清夫兄弟登金牛臺九韻六龍城西吕城東奔牛古堰卧兩龍誰築髙臺水中沚野有蔓草牛無踪河邊青苔生白􅇧刀鎗箭瘢猶未滅問知八十二年前戰死當時皆義卒鉄馬遁去劉将軍大家牽羊走燕雲三百山河獻明主北駝南象今紛紛登臨且喜得隹客鞠育青青已堪摘浮雲世事勿復論一醉西風真上䇿和蘇竹逸秋日還郷夢繞淞江太湖上舊家鄰里古漁磯長腰秔米家家熟巨口鱸魚個個肥為客已驚􅁝滿鬂還鄊何待錦為衣筆床茶灶蓬􅑵下來徃風㠶􅂾日飛呈趙徵士吳姬手執金叵羅春風􅀏面生紅渦主人留客長夜飲客拜主人辭酒多主人沉醉客亦醉客散扶歸主人睡殘杯冷炙厨頭傾鄰家兒有啼飢聲江碧山千户席上以我愛夏日長分韵得夏字故書六韵堯階舞干羽聲教溢夷夏清風細栁营長日有餘暇兵厨移竹林觴詠集陶謝酒傾虎頭杯盤割牛心炙佳哉醉鄊境漸入如啖蔗客去復相期明朝還命駕自冬而春舉家病疫予幸獨無恙既而疾止詩以自賀併記里俗之陋云十五韵昨歲夏秋旱四國人顛連餓死非不悲病疫尤可憐甚者枕相籍遺骸飽烏鳶安知期月餘厲氣猶鬰然余家百餘指連屋魚貫眠頋我如一木支此敗屋顛上堂問湯藥下厨供粥飦鄊鄰不我過恐為疫鬼纒俚俗無足怪妖巫肆訛傳所頼學之力賦命知自天立言斥滛祀秉志金石堅慈親今健飯甥男仍滿前吾妻及女嬃問寝相後先嗟哉黄楊木脱此厄閏年東風播陽和草木仍春妍鄧道士雪中遺梅花一枝詩一首酒二樽見惠舘人王文父飲余遐觀楼次韵荅詩仍要鄧晚集欲作梅花賦才踈愧廣平一枝春到手酒香詩更新開樽對雪飲将詩遣童去亟請過蕭亝石􅂦與聨句栽桑春雨墻陰手自鉏賸栽桑􅀣遶吾廬歸来笑與山溪妻説来歳春蚕食有餘九日對雨懐倪雲林白雨何其急青山不可登兀然無客到閑坐似禪僧盆菊􅂾十蕋村醪四五升猶勝陶靖節冷眼望王弘飬鶴七韵西鄰主人翁養鶴如飬客傳童供寉料稍慢童受責試問寉何如羽毛喜㓗白又能舞翩躚長鳴振金石客有寉􅇧清粹然含素徳窮居以詩鳴冷面常菜色賦命寉不如可為長太息送李知事赴邵武中以詩經及第前訓導折金壇李質字竹操延祐常學舟車千里逺甌越萬山連舊俗民多獷孤城地極偏朝廷用儒術幕府賛承宣更喜詩三百東南可盛傳送凌萬里挈家㱕海陵鄰居三十載奈此别􅄐何客路秋光薄㱕舟月色多雲山連海岱呉楚隔江波珍重千金璞良工更琢磨郡學西齋夜坐懐親友客心清似水學舍冷如氷苔榻三秋雨芸編半夜燈病多憂老母會少憶良朋麋鹿山林性悠然愧未能送兄逰􅀘陀山四首蓮花已結東林社藜杖復尋南海逰千百憶身黄面老化城今豈在􅌡洲飛鳶帖帖水連天行李蕭蕭客上舡津吏不湏勞詰問道人来禮白衣仙􅃄霧昏㝠晝不開颶風吹浪雪成堆献珠龍女應相笑何䖏扁舟載月来堂上慈親老惜兒逺逰尋佛􅀏兒痴􅀝門望汝㱕来日三月䦨珊四月時寄錢塘敎諭金君㨗紫鳳啣書下九天司徒今日復興賢􅁒知别後成何事和得陶詩百許篇哭王伯祥二絶昨朝相别夢􅀄萌一夕那知隔死生蹠自永年顔自夭大鈞于物信無情傷哉郎罷客西湖匍匐㱕来玉樹枯風雨髙堂春寂寞忍聞長夜泣諸孤惠山泉和翟􅀇􅀇先生韵青山屈曲九龍蟠一􅂀清泉噴雪寒陵谷変􅁶知幾度石池洋溢不曽乾幽亭過客分雲液古寺閑僧煑月團莫向貴㳺誇􅅸品恐煩迢逓入長安耕隠為蕭徵士作蘭陵溪上梅黍敎子讀書􅅧閉門時人􅀏渠生理拙渠亦􅀏人多覆轍春来烏犍一犂雨歲晚黄精三尺雪有時獨自舞短蓑飯牛别作耕田歌長安車馬自塵土奈爾濯足滄浪何君不見蘇秦為無田負郭平生不識耕田樂奴顔婢膝謁諸侯黄金載多禍随作君今有田兼有書夜深燈火朝犁鉏只恐一朝富貴逼人去猿寉笑人留住折不送住僧徳無言歸靈隠二十韵鴻鵠之志飛冲天鯤鯨入海方悠然汝生不受塵網牽作佛要在靈運前先入壁經汝舍旃棄家乃著牛車鞭袈裟斜擔雲半肩東西南北十五年爾来􅂙得靈隐禅神鯉躍出西山顛歸来瓦瓶携冷泉侑以白雲歌􅁆篇我昔西湖􅋈酒舡曽聞老猿啼翠烟新秋雨洗山㳙㳙石頭路滑難攀縁汝今言歸磨汝磚山中之人應汝憐道經孤山脚下梅花邊敢煩爲我問訊林逋仙寄金陵陳雲心先生浙後復歸家于金陵折先生少學道㳺寓兩者多從之㳺逺蒙惠書故以詩代簡折以能詩善琴終知臺門然屡薦不起學先生閉户自婆娑御史乗􅔕每見過白下詩傳名不朽紫霞琴譜訂無訛楼居卧看三山逺學子来從兩淛多一别十年還念我逺厪書尺問如何送陳漢卿赴江隂州知事十三韵玉雪風神秀雲霄志氣雄騫騰從早􅀊交結盡明公鶚薦無虛日鵬搏􅆘順風修名今樹立令徳磨礲清露金莖表黄流玉瓉中詞章追太史雕􅅣謝良工綸綍恩重被無裳秩漸􅂭雄州勞賛畫善政惠疲癃幕府文書簡江城草木空風濤秋浩蕩烟雨晝溟濛退食揮塵吏忘机對海翁仕優吟更好境㑹意何窮􅄐索遥憐我殷勤爲擊䝉愈慈親年八十四首慈親年八十言笑滿懷春衣食兒躬耕烝嘗婦采蘋一閑殊可喜長健不妨貧眉夀曽孫酒黄花節物新其二慈親年八十早歲歴兵戈老此太平世晏然安樂窩門前流水活隴上白雲多兒軰生涯好東臯雨一蓑其三慈親年八十一子帶經鋤貧賤無鐘􅂦辛勤有屋廬小園千個竹老圃四時蔬鄰舍閑来徃諸孫御板輿其四慈親年八十頭鬂雪紛然安得長生術終為不老仙平生甘澹泊中歲􅅸腥羶净拂燒香几持經綉佛前聞友人陳子山廷試第一喜而有作用寄乃弟子方紫衣使者日邊来為道元方作大魁金闕早朝鳴佩入璚林日宴戴花回九天㤙澤沾多士一㸃文星近上台愧我無成驚且喜漁莎獨速舞溪隈犇牛廵檢胡石潤卿示予胡婦殺虎圖其事乃前至元七年濵洲軍士劉平之戍棗陽與妻胡俱在道上為虎所得胡逐虎殺之潤卿持畫索書詩因題其後猛虎誰不畏良人吾所天眼看性命落虎口妾身雖死何足憐嗟㢤劉郎妻力不猛于虎怒氣一􅁬􅀤執虎如執鼠想當攘臂急逐時太山可拔城可隳呼兒取刀兒後随刀入母手虎腹披當時若使遭虎嚙虎口甘心作同穴嗟㢤劉郎妻今古誰足擬馮媛當熊為君立饒娥殺蛟随父死嗚呼裙􅁫之下有君子宜爾芳名著青史鮮于瑞卿還碧亭鮮于公子平泉荘有亭翼然水中央天光雲影白日静菱葉荷花清露香栁下繫舡魚可釣坐中留客酒盈觴門前漁浦接洮滆白鳥飛去烟蒼􅃼朱逸齊先生輓詞三首前朝士習雕䖝巧先生詞章風格老功名到手陵谷變雲霖竟作商山皓駢花儷葉墜秋風獨􅈽遺經自探討嗚呼一歌兮懷我師平生瓣香今為誰堦庭桂子􅀄芬芳盲飈怪雨俄摧傷中郎頼有女傳業安然得老温柔鄊平生綴輯富篇章才名不與身俱亡嗚呼􅂯歌􅀆雲石裂斷腸猿呌黄山月憶年十五愛學經先生眷之㕠眼青每随杖履訪朋舊耳聞目擊皆儀刑而今先軰搃淪没黄鐘大吕吾誰聼於乎三歌􅀆涕淚零招魂不来秋杳㝠送秦彦明二首美人木蘭舟春風挂㠶去舟􅁿疾如飛可喜亦可惧浙江多風波越山暗烟樹孤月照蓬􅑵今夜宿何處其二老􅂹千里材塩車九折坂行行復行行伯樂遇何晚之人懷帝閽丹霄路云逺一笑膏吾車疇能為推挽送趙方叔入京去去京華八月􅀄聖皇清暑返鸞輿五門雨洗紅塵净九闕涼生碧栁踈慈母衣裳縫宻綫丈夫門户出髙車翰林若見陳修撰為道野夫曽寄書贈術士楊南溪有客有客楊南溪天文之學師重黎又讀郭璞青囊書書今不用如筌蹄十年河海聲藉藉觀水觀山㕠眼碧一官雖冷氣如春那識人間有金璧相逢林下秋雨乾髙梧葉落天風寒杯酒殷勤盡清興作詩醉冩烏􅁝闌立秋苦熱念秋至立秋意欣欣一雨忽破塊千山净無塵新月挂髙樹凉風洒衣巾重耒囊中書懷我堂上親丈夫茍未遇妻孥耕且耘胡為苦􅄐别低頭長傍人和孫伯昭佛社二十韵􅀕法埀明訓􅀖家祀有功愚氓何悖禮佞佛乃成風婦女僧流雜香花佛社􅂭三身誇悉怛千眼慕圎通金像瞻如在珍羞供極豊九衢迎象駕百綵製天宫􅆼窕閨房秀聨翩市井童荘嚴森侍衛㳺衍􅆘西東行道駢緇素飛塵隘軟紅寶幢雲母扇銀燭竹晶籠鐃鈸伶倫後袈裟粉黛中亂倫言可醜妄意福来崇廢業兼旬久揮金與土同盤㳺律有禁長吏聼如聾闔郡喧邪説同􅂁見直躬新詩来滿紙髙論􅀤羣䝉白雪無人和皇天鍳厥􅇆不為因果惑真是丈夫雄感激徒三嘆棲遲奈兩窮抗言摧佛骨所願學韓公贈丹陽歸真觀諸葛鍊師鸐溪之水鳴㶁㶁九曲龍蟠䕶仙宅東南一望天宇寛緑野平蕪接洮滆堦前老樹三十圍門列脩篁􅂾干㦸緑隂庭户􅊜空翠五月天風吹巾舄埜夫何縁飲丹井遇客尋真羽衣客焦仙莎衣煮白石吕翁榴皮題素壁物換人非􅂾百年予復幽探訪陳迹黄冠老師卧龍種知雄守雌室虚白詵詵弟子皆速省中有詩豪更琴癖哦詩鼓琴師亦喜一唱為之三嘆息嗟予汩没塵土中到此悠然百憂釋采芝終日不盈䄡曵屣長歌晚山碧寄題蒋仲益野趣亭十二韵陶潜㱕故園日渉乃成趣迷途雖不逺已恨出門悞眷兹亭中人不識功名路幽居瞰洮滆詩盟結漚鷺秔稌湖上田花竹家後圃山色開画圖波光照􅑵户寒燈課兒孫春耕了農務杖􅂂三十年曽無一塵汚人生天地間溘如草頭露軒冕渠自勞刀鋸吾無惧熙熙太平世千載寔難遇野趣知自娱難以語童孺代簡蒋成玉三首徃年同掣釣鰲鈎空載錢塘月滿舟從此相思不相見槐花又老􅂾番秋東風傾盖采芹亭一笑相看兩眼青老我無成今學稼荷鉏依舊帶遺經春来一月苦隂雨少頃雨晴邀客嬉金斗城西芳草路水邉楊栁青􅄐􅄐送牛季和赴旌徳教諭十韵積雨喜新霽六合無􅊏埃江頭楊栁風送客征㠶開把杯問青天天網信恢恢之人飽經術吐辭粲璚瑰不居白玉堂合著黄金臺培風展雲翮胡為尚低􅆦徃矣敎岩邑菀然育羣材峩峩敬亭山相看亦佳㢤薺麥茂雪霜蛟龍候風雷秋風木􅀲熟好題書後来慈烏十韵􅀝􅑵看慈烏生雏念雏飢黄口未能啄雌雄交哺之羽毛日以長飛飛展㕠翼父母乃巢居羣雏為求食得食能幾何入口不下咽去時聲啞啞歸来羽翩翩大烏能爾慈小烏能爾孝他時子為子宜亦如爾報萬物人為靈不孝誠何心我今作此詩警世還自箴余子元御史枉駕敝廬以詩貽次韵奉贈竒哉古秦鏡奸邪見肝胆當年献天子重瞳目親覧迩来匣中蔵寒月光湛湛玉臺重拂拭清輝元不减陪全公逰仁惠觀途中酌酒賦詩予和首折二呉山相送越山迎二十年前􅔕馬行今日經從重逰䖏詩情秋色喜㕠清山中羽人山下迎籃輿看山吟復行松隂呼酒聼禽語一笑如見黄河清邀髙則誠郊居小集别多無奈苦相憶頼有尺書時徃来逢人為説烏寶傳此客合貯黄金臺北風塵土歲云莫南湖水多氷􅁒開扁舟短棹出西郭元日相期看野梅同逰趙君模過訪荒城歲晚氷雪繁幽人校書􅅧閉門書中樂與聖賢對門外寂無車馬喧年光冉冉老将至心事悠悠誰與論肯為梅花過寒谷定邀髙子共清樽偕丹陽諸葛用中金壇王元徵同應鄊試阻風無錫和用中韵舡􅑵晝􅊕鈎簾坐暘谷雷鳴送雨来佳友喜如㕠鳳集清樽且對九龍開槐花滿眼催行色桂子吹香入酒杯黄㡌怕敎牽䌫去請看風浪雪成堆次鄧混然韵送溧陽王元仁兼簡乃父時可先生兄元德客􅂻匆匆送客歸江空歲晚雪晴時父兄相見煩傳語書劒重来好寄詩世事兩年多反覆人情十日九馳驅甓橋東畔王猷宅杖履幽尋未有期丹陽道中早行過吕城冩示諸葛用中十三韵寒雞丑前鳴雨急風更􅁖吾欲遄吾車僕夫殊不樂坐待風雨休早出丹陽郭行行二三里風雨復交作造化小兒劇変態不可度雨􅊜衣􅁒氷風吹面如削前途迷逺近古堠暗摸索懷㢤故人居不逺可依托奈此道路難尺進咫復却之人書萬􅃃芸香浸書閣閉門了無事卧聼簷花落吾年幾倍之賦命乃爾薄詩成徃呈似定􅀤一大噱全僉憲自黄州以西洋布遣􅀐見惠作詩謝之十月北風方怒號故人西布似祶􅂁逺勞使者傳書信笑看家人落剪刀留得海圗飛鳯鳥絶勝山􅄢集鵝毛歳寒氷雪空山􅂻千里相思報木桃除夕和諸葛用中韵盡道王門可曵􅅂青山吾自愛吾廬新年且醉屠蘇酒舊業重修種􅀣書堂上弄雏慈母喜堦前繫馬故人䟱東風一樹梅花雪折得南枝報鯉魚寄陳修撰五始師麟筆羣公繫馬􅁶欲明前代事不失後人傳紫禁烟花繞丹霄日月懸詩成天一笑髙歩更聨翩諸葛用中邀賞牡丹痛飲終日且留僕與陳鍊師宿成趣軒各賦詩十二韵金谷春風暖名花宿雨霑錦堂夝覆幄華屋晝埀簾公子開瓊宴仙人駕玉蟾妙年皆可畏老態不我嫌栁雪沾衣袂花枝壓㡌簷舞裙雲冉冉謌板玉􅊏􅊏鸞鳳鳴絲竹羔豚出釡鬵􅀄筵猶秩秩終日竟厭厭客少情偏洽杯深意轉忺猖狂容阮籍繆談恕陶潜大笑南柯蟻深慚竹上鮎題詩紀行樂罄折謝勞謙次韵羅居仁閑居遣興春近清明日花開金斗城閉門忘寵辱染翰作真行芳艸自生意青山不世情何由過幽壑携酒聼松聲楊氏橘隠軒十二韵少年走京洛衣冠混泥塗脱身車馬塵竟作山澤臞開軒靣流水坐對橘一枝客来必留連手談以爲娱手談亦何好􅂓􅆘歳月徂南風緑隂凉長日幽鳥呼寂然此樹下身如蜩甲枯千橘比户侯斯亦非吾徒况彼終南山㨗徑争奔趋驅車過吾里豈不愧木奴江浙平章巙巙公家飬二鴿其雄斃於狸奴人以他雄配之遂闘死作義鴿詩韵折十一翩翩兩飛奴其羽白如雪鳥獸忽相殘雄死雌䠥􅍷􅅸食累􅂾日悲鳴聲不歇蒼頭配他偶捍闘頃流血血流氣猶憤血盡氣力絶嗟爾非鴛鴦失偶不􅂯結嗟爾非雎鳩所性殊有别于人擬共姜之死同一轍夫何宫閫内徃徃少貞烈夏姬更九夫河間不可説􅂓為義鴿行永激婦女節陳伯大先軰偕邾仲義陳容亝張子毅見過酒邉以茶􅀲留客遲分韵得茶字白鶴溪清水見沙溪頭茅屋埜人家柴門净掃迎来客薄酒遲留當啜茶林响西風桐隕葉雨晴南畮稻吹花北􅑵幾個青青竹題遍新詩日未斜傷田家二首踏踏溪上車嶷嶷田中苗踏車非不勤水盡苖枯焦人力不勝天奈爾秋陽驕􅀄春脱寒衣典米事東作歳旱榖不收且無衣可著飢寒去何之前途半􅗂壑又堯田九年水湯田七年乾保民茍無術羣黎搃凋殘我農今疇依州縣父母官父母不我憐何􅀙語辛酸神農作耒耜后稷敎稼穡安知後之人耕稼多乏食乏食未足憂山中有黄犢奈何㸃鄊夫州城要修築平明荷鉏去雷鳴忍飢腹菊泉詩為孫嘉賦七韵循彼南山言采其菊爰有寒泉在彼空谷挹彼注兹有芬其馥既澄爾心亦瑩爾目所謂伊人温其如玉宜爾眉夀荷天百祿賜之南陽為爾湯沐嘉定雜詩二首黍熟湖田花鴨飛雨香秋浦篛魚肥野翁織屦街頭賣日暮裹塩沽酒歸趂潮艇子若㳺龍潮落横塘日下舂負郭人家星散住水邉多種木芙蓉崑山居太倉折時州治移孤峯雲叠叠舊邑草蕭蕭覔石敲新火拏舟趂早潮沙田紅稻熟溪􅃠白魚跳寂寞悲秋客蓬􅑵酒一瓢寄邾仲義二首我思埀虹橋滄波緑楊津蕚蕚棣花宅瞰此江之濵荷衣佩秋蘭野飯􅅅紫蓴一􅀙橋上别花􅀤三千春相思復相思為爾歌停雲我思釣雪灘烟波􅂾千頃幽人讀書罷乗風放孤艇沙頭弄明月水底見天影鱸魚秋自肥楓葉霜自冷釣鈎未連鰲􅂓此駐清景過太倉楊栁溪邉繫客槎桃花雨後栁吹花東風地角環滄海日夜潮聲走白沙市舶物多横道路江瑶價重壓魚蝦天妃廟下沈􅀇璧漕運開洋鼔亂撾簡崔徵君姚􅂙政門人牧菴夫子乆絶筆巾笥藏書手澤存白首逝将􅅧報國青雲多是舊同門去年雪􅂻西郊别何日花前北海樽芳艸萋萋春又晚杜鵑殾􅂻憶王孫和王文振遣興齋居幽事頗関心晉帖時時自手臨徐穉不来常挂榻鍾期相遇始弹琴東風城市紅塵暗長日軒􅑵碧草􅅧聖代明堂方有作豈容材棟老雲林送陳縣尹之東流東流父老候飛鳬莫遣前驅叱避途好問去年天子詔邑中差税受㤙無哭全僉事早歳乗􅔕馬當時負重名四州豺虎縛一䟽鬼神驚觧組歸江漢還家訪友生安知成永訣杯酒吕䝉城羣鼠羣鼠穿我墉晝出不我避蒼頭徃執之赤手反􅇜噬呼號驚四隣狸奴盡呼至羣狸視如盲鼠軰從此逝老我氣力衰長呼夜無寐寄惠山鍳長老太湖之陽九龍峯金田蟄爾僧中龍山頭雲出野漠漠石眼泉落殾淙淙呵氷古硯冩墨竹掃雪臨軒看碧松别来兩度歳華晚祗見梅花信一封答友人問訊官河春水緑􅉿􅉿重結衡茅近水濵膝下斑衣三稚子堂前白髪一慈親閉門無事足為樂挿架有書何患貧秫田更喜連年熟釀得香醪味更醇元日試筆諼草堂前竹􅂾竿歸来喜見搃平安春風暖入屠蘇酒朝日光生苜蓿盤萬國臣隣同受朔一年時序又更端買臣未衣還家錦庸􅆆從敎白眼看送新安程以文先生入京春雪􅀄消楊栁黄楊雄奏賦入明光鶯啼禁􅁐煙花暖人著宫􅂁雨露香聖代百年周禮樂儒林諸老漢文章政湏直作揮椽筆風月平分白玉堂和京口張君益南園新居鐵城如甕藏華屋金桞埀絲鎮畫橋賀厦燕来尋舊主灌園人立候春潮戱題花月詩皆好醉覧江山酒易消天意也應留逺客雨師連日㵼天瓢王元徳别去􅂾年重㑹吕城諸葛氏家冩蘭見贈且索詩送行時予辨惑編成或忌而謗之者因併及之與君一别幾十霜喜君學與才俱長向来作詩方刻苦而今格律殊髙古向来祗為竹傳神而今復為蘭冩真懸崖叠石幽致古木寒藤有意生意胸中清氣吐筆端有殾無殾俱可觀相逢莫恨無知者縑素盈箱乞傳冩􅅸勝編書斥異端老我穿屋牛衣寒十年歳月磨硯鉄嬴得羣厖争吠雪願君為作指南車獨行周道當何如答凌萬里見寄移家一别十年多予髮蒼蒼子若何老去情懐偏念舊向来消息頗傳訛遥憐杜甫因詩瘦欲為揚雄載酒過稍待長江羣盗息洞簫吹我醉時歌送辛明善之縉雲監税兼髙則誠錄事縉雲山下水盤盤一舸夷猶七十灘如此壮逰良不􅁖何妨逺别去之官風生白苧征衫薄雨過黄梅客路乾傳語郡中髙錄事小編求序冠篇端題桃源圖昔年曽讀桃源記㑹得陶潜言外意柴桑避世如避秦恨不山深􅅸其事借秦為喻説桃源漁郎之逰皆寓言不然溪上山如故胡乃舟回迷經路若令此景真在山此翁必入窮躋攀編詩不用書甲子姓名無復留人間只今唐虞太平世花栁村村足佳致不湏重展畫圖看四海桃源復何異張子毅生日招飲以詩夀之􅅧山大澤生龍蛇文采風流出故家柔桑負郭田三頃灯火乃翁書五車南風􅀄結石榴子細雨㣲挹菖蒲花生徒女樂為君夀老夫也得醉流霞避雨繫馬庱亭東郵亭似寉籠長河飛白雪髙􅀣洒清風州界􅅻相接鄉音便不同野人来問字錯認是楊雄􅀊􅀊九龍峯寒泉落氷雪美人此傾盖為我滌煩熱世途自荆榛肝胆無楚越􅑀髙一長嘯清風滿林樾送崔仲徳歸錢塘家住湧金門瀕湖五畝園梅邉童飬寉松下客呼猿頭白心猶壮官卑徳自尊徵車未来日詩禮敎諸孫送盛本􅀄敎諭之全椒淮海維揚才俊多先鞭奈爾妙年何璚花春酒三年别滁水秋風一葦過聖代只今興禮樂人家是䖏有絃歌安書寄與南来雁時有新詩到薜蘿辛至善永思亭八韵而家本西域而翁葬桐鄊鄊人猶永思哀哀况諸􅀰春雨暗宿草秋風悲白楊别来春復秋于焉奉烝嘗思誠見容色宛在􅅅與墻一念不少休東流水湯湯到海水猶已此心未渠央詒謀子若孫百世室有家次韵陳知逺秋日言懷奔牛古堰頭築室俯滄洲愛客常沽酒耽書不下楼青山啣落日白露􅊜髙秋最喜多兄弟㕠親百不憂諸葛用中成趣軒九韵幽幽小園池結屋三四楹若人青雲噐乃有丘􅊤情渉園以成趣尚友陶淵明池水魚潑潑花枝鳥嚶嚶太極圗外意芳艸堦前生吾趣吾自知對客無以名欲識琴中趣且聆絃上聲欲識酒中趣百壺與君傾啖蔗勿遽棄佳境将来迎李御史過訪霜飛白簡照南臺早歳君門射䇿来獨立敢言天下事寔封頻到御前開騑騑􅔕馬過茅宇恋恋祶􅂁念櫟材慚愧山林麋鹿性偃然方樂卧蒼苔題畫鷹蒼鷹獨立清秋樹劒翮風生欲飛去林間燕雀動成羣海上鴐鵝亦無􅂾鴐鵝燕雀争殾喧擊之不擊無足言快須為我殺鈎鵅勿使空人之曠城曹娥廟死孝魚龍窟垂名簡册香江流随姓氏鄊土奉烝嘗黄絹碑辭古青山宰木長世間梟獍子何面過祀堂伏日奉懷江浙髙掾史次早友人黄仲徳入杭以詩代簡伏日常年苦炎熱今年伏日風雨凉官曺早出丞相府賔客髙㑹湖山堂垂楊繫馬緑隂静畫舸採蓮紅粉香應有新詩紀行樂武林風物増輝光河魨十一韵世言河魨魚大羙有大毒彼羙吾不知彼毒聞已熟其子小如芥食之脹如菽腹腴膏血多目脾頭項縮烹調茍失飪禍至不轉瞩或言直一死輕命重口腹邇来廿里間杯􅅅􅂾家哭譬諸安與史敢用甘顛覆溺愛多不明奚止一水族作此河魨詩逢人敢忠告過道鄊先生墓有感十六韵忠公天下士夙學能慎獨平生寸心赤耿耿照黄屋元符引􅅂諌痛甚賈生哭上言正中宫下言斥當軸直道時不容除名竄荒服建中及崇寕寵辱手畨覆炎蒸嶺南地文章散清馥晚􅀊歸故山林荘竟埋玉向来望佳城鬰鬰暗松竹今為禾黍區春雨耕觳糓翁仲知何歸雲仍困無告嗟予呫畢生斯文頼私淑願言理侵疆重植宰上木愚公将移山自謂計已熟精衛填東海可奈力不足傷心復傷心殘碑卧荒􅅢簡呉門葛可久九韵東南古吳㑹河江浸坤軸閶門萬人海驪珠混魚目嗟爾􅃢瑚珠光彩照􅊤谷挺挺八尺軀便便五經腹復用岐黄書敎子時共讀座有焦尾桐樽餘荔枝緑我室雖甚逺扁舟徃来熟此别獨經年􅅅墻見鴻鵠珍重應時湏抵鵲毋以玉久􅁒應命故有末句折時分省募文武士聞可寄謝京口俞府判先生辨惑編九韵憶昨携槁梧徃學太古音清風一揮手為我湔蓬心言歸卧空谷神飛繞帷林寄来明月珠價重㕠南金豈不懷報章慙愧秋蛩吟人生少㑹遇嵗月何駸尋晨瞻蒜山髙夕覧江水􅅧江山􅄅予懷塵世盈我􅁭行當駕黄寉􅀙此閬風岑璚花行送盛克明敎授歸維揚揚州好花非不多奈尔􅅸品無㕠何水沉香􅇧素玉蕋琉璃滑葉青瑶柯東風二月花時莭二十四橋香浸月小山叢桂避芳塵東閣官梅褪殘雪向来名士多品題拈香御史今亦知何日移春献天子不負此花天下竒王長史代祀天妃回偶留常州為予作辨惑編序驛亭飲别以詩謝之字叔善巙折長史名餘館客也折巙平章使者祈靈海上回蛟螭逺避漕舡開入朝将進賢臣頌當路皆知舘閣材傾盖道邉欣邂逅邅車林下久徘􅆦綵毫題我蒲編去鵉鳳回翔燕雀猜奉同干尚書賀髙太尉承㤙詩紫鳳啣書下日邉玉樽金幣禮髙年天㤙已見来三錫月俸猶供食萬錢緑野干橋間几杖長洲茂􅁐羙山川舊家池舘花如錦簫皷春風送酒舡次韻陳心逺久雨七韵秋風捲衡茅我屋漏已久春來復多雨水馬堦下走人皆憂巨浸吾謂晴可守獨憂東海上連年聚羣醜官軍渉鯨彼鼠軰未梟首西疇作沮洳閒我扶犁手何以觧此憂山缾㵼春酒喜復鄒忠公墓田賦絶句十首謝兩郡侯新松重植古人墳五馬同来兩使君歸我侵疆三十畝山靈慙愧謝移文白頭翁媪􅀝林荘􅀏指􅂽丘舊石羊誰料百年荆棘􅂻又看金紫奠椒漿奕奕祠堂春雨生青山紅塔照簷楹檐前燕雀聲何喜冠盖如雲為落成去年風雨暗桑麻今雨楸梧一望賖寄語無情梟獍子壠上啣土有慈烏傾囊不惜購殘碑為愛前朝㓜婦詞賴有賢侯知古意從敎俗士笑書痴府公遺愛沾幽壤吏部文章勒翠珉寒食清明人洒飯落花飛絮鳥啼春里翁猶記前朝事五馬年年上􅊘来白鳥能言髙柱立黄楊合􅈽細花開青山無􅂾麒麟􅊘人到林荘下馬過為問路傍楊栁樹向来興廢事如何景鄒亭在稼亭東斷礎猶存艸莽中羣圃何時重搆築􅅅墻長見道鄊翁千古一抔忠義土青山門户碧溪陰溪流冷浸中宵月照見先生未死心三月歸田舍作五首十年為客不窺園數日還家獨閉門兒女牽衣拂塵土親朋折簡問寒暄江南花栁青春好淮上風煙白晝昏聞道賊渠今磔死雨􅑵􅂬喜倒芳樽余生甘兮老漁樵竹徑柴扉掩寂寥舍後薄田堪種秫門前流水喜通潮人遭歳歉飱榆粥天假春晴飬麥苖蚤起憑髙望西北楚氛猶似未全消天開鉄網放鯨鯢甲馬歸营罷鼓鼙四海蒼生皆鼓舞三苖何物竟昏迷愁聞近日軍需急幸得新年米價低春雨壠頭耕未得桑林布榖為誰啼鴉鳴鵲噪搃無靈庸儒譌言更莫聼萬國山河春蕩蕩一時烟霧晝㝠㝠官軍自足追窮寇縣吏猶勞募壮丁何日買刀仍買犢花村雞犬共安寕飛芻輓粟未能休嗟我鄊隣日夜憂何事羣兇恣猖獗半年諸将擁貔貅桃花過雨紅顔老杜宇傷春血淚流堪笑腐儒無可用下帷依舊説春秋記夢併序至正十二年六月初八日夜夢於先人舊居之後堂看故兄所遺春帖有讀書傳家等語因念先人嘗言曽大父以儒名家從父領鄊薦為校官我兄尤好學而文今其孫無有似者次兄二子皆廢學吾三子亦未成立以此感泣既覺而涕泗交頥心甚怵􅅥因作詩以示兒苦熱夜難寐坐久方偃息夢歸巷南宅竹􅀣皆歴歴伯兄手題詩猶存後堂壁余時因感傷先世本逢掖書殾今寂寥寶􅀣化荆棘立􅀚楷書字哭泣淚沾臆覺来憶詩話白月光滿室重念世澤㣲門衰自疇昔我方埀髫時伯父死于溺音容兩􅃼然了若不相識但聞能孝友風姿頗清逸四十五六年遺文搃狼藉題壁尚何有此夢生此夕余生雖無成多頼讀書力揩劘鏡上塵積累机上錦嗣續幸不冺所願能自植木也年十六林亦及二七阿森今九齡父母俱愛惜不為樵牧童又不學稼穡螢􅑵與雪案寸晷宜自惜讀書承世業此語誠藥石汝曺能黾勉是亦尊汝伯旁􅀚勿相笑説夢等兒劇客來革孔頻移轉覺寛酒杯雖舉不成􅂬客來為説紅巾苦􅑵下榴花亦怕看進士馬仲達為常州路錄事司達魯花赤監築城以詩見示余次韵答風櫩􅈽膝聼鳴蜩頗覺鄊村有呌囂四海百年歸一統兩階何日格三苖斗城新築関門早鉄騎南征去路遥年少􅂙軍金榜客可無竒策上丹霄至正壬辰十月廿二日於妻兄任氏家避亂得家兄信感嘆而作避地横山下􅄐家十日餘鴒原常在望魚素忽傳書猛虎走城郭蝮蛇生里閭欲歸歸未得搔首獨躊躇􅀄度有感年五十寓任氏折十一月初六日時我生何不辰埀白遭亂􅄐鄊城箭滿眼咫尺不得歸百年今已半喘息能幾時桑蓬負􅀄心蓼莪有餘悲慙愧朱買臣富貴能自期男兒無所成百齡亦何為對酒不復飲把劍空欷歔㓂退别詹魯賢十六韵君家天台下我家滆湖邉針芥一相投膠漆四五年倉皇避羣盗妻子同一舡中途苦􅄐散經旬各憂煎相見若􅂯生相依益相憐横山􅀣歴歴東洲水濺濺山水非不佳旌旗日紛然兩家妻與子一月夜不眠明􅀤竄荆棘衣被褁槖饘莫歸客櫩下耳語青燈前葵心傾太陽􅂎國憂崩天逝将哭秦庭乞師掃烽烟臨期賦遁去此志從鬰然坐閲明年春東風草芊芊􅆭别牛城下相願猶䕫蚿重結死生交永矢金石堅送京口劉千户歸营十二韵桓桓千夫長胸有萬甲兵生長太平世終日醉六經一朝著兠鍪羅馬出瓮城擒賊不知􅂾報國丹心傾台司方論功憲節偕按行部曲嚴武威瘡痍撫罷甿寶刀洗荆溪鉄馬歸栁营鶯花已春莫草􅀣猶血腥一雨殊足喜四野布榖鳴呉兒賣戈劒買牛事春畊頋瞻天地間埃氛未全清何曾盡掃除丈夫功業成過金陵明道書院訪友人髙孟立山長􅆘遇秩滿且有側室洗兒之喜作詩賀之六韵客来鳳臺下􅆘見生鳳雏斑斑五色羽唪唪百尺梧家客席上珍愛君掌中珠度曲紫玉簫㵼酒黄金壺起舞為君壽試啼呼阿奴梅花亦觧事含笑立庭隅過陳時舉宅畫壁十一韵㕠松歳寒姿拳石太古色我昔山中逰憇此松下石松花雪霏霏松葉風瑟瑟安知此清景相對復今日拏空兩髯龍乃在一書屋主人罷鳴琴晏坐室生白客来苦炎􅀬傍􅀣欲推幘不聞天籟鳴但見空翠滴煩衿頓如洗林􅊤幽興􅆘經月􅂾相過明朝有行役黄埃赤日中令人轉相憶孫伯昭與陳天倪用簡齋一凉㤙到􅇧四壁事多違為韵賦詩見寄全和答之薄田西河上種穀多種秫秋来喜甘雨牀頭釀真一我思山中人不見如參商蒲萄好留客毋用博西京秋水漲百川無人洗乾坤堪笑閭閻下空懷報主㤙東齋可談書西齋堪寄傲山中儘寛閒俗客自不到凄凄草上霜耿耿天上月遥憐両淮地千里照白􅇧吾生西復東徒以口腹累懷㢤安樂翁不出時有四明月足可喜好句無用覔寒蛩為誰悲唧唧鳴四壁殷勤語兒曺要識一丁字明年世清寕依然重文事主人錦氍毹飲客金叵羅遥憐古岩桂香似廣寒多持身服苦淡􅆘口􅁯甘􅃾青雲丈夫志白首慎毋違哀陶堯佐併序十三韵至正壬辰冬紅巾䧟常州駈州民攻京口不從者殺之我邑人陶君尭佐不幸為賊所得且欲并駈其諸父昆弟以行君厚賂之以一身代衆人之急從至丹陽聞官軍鼓噪聲即倒戈剌賊渠堕馬因被害時吾里有識君者既而語其事於予予以君嘗讀書知順逆故誠信而悲之閲二年方欲問諸水濱筆之野史以暴白其難明之志其族人有為之後者􅁙君衣冠予述前所聞作詩哀之嗟爾練湖水不洗斯人汙􅁈血化為碧春雨生苔蕪皇天有老眼斯人亦何辜生當太平日三世家業儒本無縛雞力苦被虎豺驅孰知能賈勇倒戈誅賊渠鉄石一寸心虀粉七尺軀而家既能全而憤亦以舒但恨薫與蕕混然骨同枯華表寉不返竹林啼鳳鶵衣冠藏古丘魂魄逰清都擊賊作癘鬼當與張君徒天意不可問愁雲晝糊糢兵後到杭馬掾史置酒見招且示以所與石䖏道丘長卿西湖倡和之什次韵首折一西湖山色冷如􅁅前度劉郎今又来紅粉畫舡今寂寞斷橋流水自縈回一堤寒栁風烟老両鬂飛蓬歳月催頼有故人能慰謝緑樽重對晚山開西湖曲西湖春水緑于酒西湖女兒嬌似栁依稀二月三月春攀折千人萬人手我有一索青銅錢明朝也買下湖舡試歌斷臂孤兒曲湖上豈無人㑹傳自錢塘回舟中懷馬掾史省前山色翠欲滴幕下官曺清且閑公退每傾鸚鵡盞客来頻爇鷓鴣班坐看急雨沾花席應念扁舟出栁湾白髪鄭䖍毡未暖還家方苦路間関舟中懷辛至善春草緑如許之人猶未歸江東雲度水馬土雨沾衣王事馳驅久家鄊信息希多情舊時燕還繞畫梁飛望官軍楊子江邉羣盗来奔牛吕城飛刼灰客懐每日鬰不樂笑口幾時能復開東郭流􅄐人似蟻西村格闘鼔如雷官軍望斷無消息獨立斜陽首重回示長子木二十韵萑澤聚羣盗池魚恐遭殃喜今避地去溪上一葦杭汝妻扶汝母小婢携槖囊丱角汝両弟随行色蒼黄僕夫偕汝留家居謹周防屋後林有竹林後園有桑祖宗百年墳高􅀣蔭釡堂汝為吾冡嗣承家奉烝嘗興廢固有時生理無怠􅂽但無􅗂􅊤憂可待時世康鄊鄰或侵凌勿與較短長韓信跨下辱自度勢莫當婁公面上唾不拭庸何傷彼􅁖汝勿為口亦勿播􅀭天定能勝人善􅁖報乃彰松栢耐歳寒葵藿傾夕陽此身可虀粉此志勿攺常汝㓜頗醇謹亦嘗聞義方稍暇曽讀書慎勿弄杯觴行看太平日斯文復輝光嚴将軍戰馬歌并序至正乙未春常多盗省府調兵捕之浙東宣慰司元帥嚴公来縂軍未幾無錫平移軍武進一日搗来富荘賊巢軍中失二馬明日賊乗之抗官兵烈塘上二馬聞金鼓来奔賊控勒不能止随遂堕地馬立踶殺之官兵大㨗故予烈塘之民感神其事俾余作歌以美之徃聞齊軍夜路迷老馬前導人追随又聞的盧躍檀溪漢業復立西南隅古来良􅂹稱有徳未有驍騰能殺賊将軍両馬䭾賊来雲霧四起生風雷紅綃帕首尓何物霜蹄一路成飛􅁅軍前認主鳴且舞驚倒熊羆與豺虎羣兇胆落不敢追官軍凱旋搥大鼔馬兮馬兮誠有功湏知感物由元戎将軍接迹武惠功煌煌史册書勲庸尔馬名亦埀無窮别姻家尹居士孫可傳者予女妻之故避折尹氏世居金檀尹干橋其寄留家具及古今書八百餘帙復回故折亂挈家依焉未几寇兵自溧陽至予遂矣折邑烽火西来滿眼紅歸㠶􅋉挂寉溪風蛟龍劍伏豊城下蝌蚪書藏魯壁中邠老自憐能世守阮生誰信又途窮一盃此夕知何夕兒女挑燈笑語同贈花御史常侍文尹晋陵水雲􅁭懷鉄面威鄊井重過思依依州官跼􅐲迎􅔕馬父老懽忻識綵衣閩越地偏滄海接江淮屋逺縞霜衣飛舊逰還念城東客白首持竿坐釣磯過無􅃬口號丞相達識帖穆爾公赴江浙折至正十五年十二月十五日憤而作折余因感丞相楼舡搥大鼓鉄騎前驅猛于虎紛紛䑕軰敢横行與我官軍戰河滸落日未落懸林梢一天殺氣風騷騷官軍縱火鼠入窟太湖水濶陽山髙相君賢似唐裴度豈無将軍如李愬兠鍪戴雪搗賊巢一夕湖舡竟飛渡我有一寸鉄願作将軍箭将軍三箭定陽山湖水依然净如練楊鉄崖先生旣為應芳序思賢録又以應芳上書丞相不報作長詩贈行是用感激賦此留别兼謝錢塘江上乆為客先範門前三上書喜得問竒楊子宅何慚題柱馬卿車風塵鴻洞人皆恐氷雪崢嶸歳又除覔得驪珠三百顆横山歸卧舊田廬代簡蘇景瞻先生二絶西門渡頭春水生故人不来舟自横聞道移家近湖住手栽桑柘緑隂成布榖聲中春雨生溪頭􅀝杖看春畊干戈滿地人相食宜爾龎公不入城􅀛巢藁巻之二終
