front:
  text: 􅀛巢藁巻之三詩
  hash: sha256:23b8a8fb99eade1804fb1da439781c2008f8db517b2801c5fce0b6e4651ef11b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0561_SBCK_003-1a}
body:
  text: 養竹成大林養竹成大林頻年竹生孫美竹非不多􅁖竹亦已繁羣奴為洗之徃哉聆我言美者慎勿傷􅁖者必去根勿虞爾斧缺勿憚爾力煩宿莽蕩無餘清風仍滿園樹頭鴉䳎鳴樹頭鴉䳎鳴農人起芸苗問之爾何忙良田莠驕驕去年耘較遲草蔓人力寡稂莠非不除卒以害吾稼吾聞農人語猛省天下事養虎常害人玩寇亦如此移家金壇尹干橋奉寄俞用中先生辟地金壇縣懐人鉄甕城戰塵今滿眼憂國豈忘情北固山無恙中􅍽水最清卜居何䖏好爲我主鷗盟大父卒宋末塟烈塘之東墓松合抱者數百株一旦爲鄉豪伐去郡縣弗能禁愬之分省亦莫敢誰何應芳痛憤于家形于夣寐至正十六年二月廿六日也當年掃松寒食朝紙錢挂之松樹腰今年無樹堪挂紙冡頭揷竹風蕭蕭孤兒抱怨吞聲哭躑躅歸來臥茅屋夜深忽夢蒼髯翁手足褁創頭髪秃告言淮襄荆楚間羣兇殺人連數年名門世胄皆赤族楩楠豫章何足憐吾方欲問天下事雞鳴夢破心如醉髯翁恐是十八公天耶人耶誰降凶五噫歌大明何爲而翳兮噫大凶胡爲而裂兮噫觸邪之廌角胡折兮噫祥麟在郊足亦刖兮噫天乎遺黎豈至是而底滅兮噫憶兄平生愛緇侣逃難亦與俱骨月不相頋安危竟何如銅馬從南來殺人血成渠一炬灰萬室九原槌含珠懐哉鶺鴒原何時蓬蓽廬横山絶高䖏獨立􅆌愁予三五七言角蛇啼翼虎飛百年鳯雏環五色鵷雏饑盲風怪雨已連月青天白日寜無時歲莫獨歸浩浩北風吹戰塵還鄉無復見鄉人四郊荒草斜陽外一樹寒梅野水濵偶有新詩題甲子忽驚初度過庚寅僧廬夜宿明朝别黙念莪蒿淚滿巾西膠山雪晴罷吳家渡築城之役折寫呈無錫州尹遂䝉一夜雪深二尺强石人墮指氷蚕僵猶喜金烏兩翅凍不折天明飛出海上之扶桑老夫晨起膠山下風景看來渾是畵連山萬頃玉爲田隔水數家銀作舎田中築城團義兵日高未飯饑腸鳴黄泥凍地硬如鉄白柄短鉏鏗有聲不辭受寒飢但恐􅃜工程將軍踏雪來㸃兵萬夫鵠立顫且驚馬前壮士五色棒棒頭性命鴻毛輕予生悔不習兵法雪夜擒吳書奏㨗客櫩抱膝漫悲謌奈爾義兵寒苦何丁亥歲旦徐達卿席上作主人飲客椒花酒笑語春風口角生乆雨忽晴人共喜又聞周鄭欲㝷盟元夕寓田舎有感憶得去年王正月錢塘風雪正頻繁馬周獨酌新豐市韓愈三書光範門喪亂不霑新雨露饑寒今憶舊田園堠山西畔孤村裡借屋篝燈過上元贈錢夢弼連雲第宅堠山西喬木森森與屋齊萬國熊羆方血戰一林鵉鳯自幽栖東風池舘春如畫長日笙歌醉似泥吐酒錦茵容野客新年十日九招擕丹陽陳天倪及其弟剛中犇牛陳心逺等諸羽士避兵洞庭山寄此代簡洞庭林屋聚羣仙問訊曽逢賣橘舡湖上白魚多滿尺山中朱果不論錢仙家犬吠雲連屋澤國龍吟月滿天辟榖有方煩寄我吾將多與世人傳陳大翁過堠山客舎情話連日追悼母氏使應芳情見乎詞宋常州通判之子折翁名師可字伯大外家親戚惟翁在相見猶能話阿􅭊三夜客窓同寂寞兩年兵火各流􅄐可憐今雨窮途客誰識前朝郡倅兒前世青氊零落盡行囊留得數篇詩寒食前聞鄉信口占鄰舎驚呼避蝮蛇老妻嗔怒唾烏鴉誰知昨夜三更雨又送春風一度花寒食清明人上塜夕陽芳草客思家愁來復遶青山去何䖏壚亭酒可賖訪孟伯堅周履道不遇班馬文章駕並馳雲龍追逐去何之門前流水垂楊栁屋上青山呌子規三月又逢修禊日一觴還憶太平時可憐潦倒無家客滿目風塵兩鬂絲刺促行次履道韵刺促何刺促江上秋風破茅屋誰憐杜少陵長歌之哀甚于哭故山可望不可歸髑髏臺高春草緑浮雲滓日竟誰洗烈火連天勢難撲三農不復把犁鉏風雨荷戈城上宿於乎人生有子作征夫不如返哺林間烏題春林雨意圖前山後山雲氣濃欲雨不雨天無風記得去年初夏裡此時舡過滆湖東懐周履道六韵平生多朋遊窮途見交態每歌杕杜詩重念伐木廢孰謂新相知情如舊親愛手書辱殷勤授餐慰行邁老我無爲執德心未艾秋風自揺落松栢嵗寒在狗寨謡徃聞淮西軍食人狗亦有寨屯如軍是時江南幸無事尚謂傳者言非真安知吾鄉今亦爾地方百里皆荆榛三村兩村犬成羣見人如見東郭兎跳踉大噉猛于虎坡陀高踞聲狺狺路旁青草堆白骨天外飛鳶銜㫁筋征夫早去胆欲落寃鬼夜哭情難伸可憐性命塟饞腹徃徃多是鄉民向來喪家狗絶食遺骸或與狐狸分乗時爲暴至若此此事千古同悲辛寢皮食肉不可得張牙㺯爪何由馴虞廷九官分厥職益必掌火山澤焚犬乎犬乎胡不革爾心全爾身主爾主鄰爾鄰揺尾乞食仍相親毋使犬砦之名天下聞夀玉山人十六韵黄梅雨歇南風清緑槐如雲隂滿庭胡髯雪白雙眼明長日細字箋龍經有時忽著道士服騎鶴三天奏符籙天上神仙知姓名人間富貴羞馳逐翁年已耄何矍鑠姮娥應授長生藥我來避地方卜鄰翁與談天甚爲樂酒邊却笑磻溪翁吾年與同心不同鷹揚未若漁釣好周家自有羣羆熊平生毛頴與親炙老去麯生尤莫逆白鷗之盟君勿渝門外紅塵一千尺八月十六日顛沛中見頋玉山䝉置酒嘉樹軒相與劇談痛飲懽如平生且有來夕草堂之約既醉而别賦此以贈來徃東吳三十年吳人多示好詩篇片言堂下知鬷蔑一笑樽前夀魯連嘉樹連雲秋不老桂花如雪月仍圓烽烟已隔重湖水且爲交懽理素絃留别頋玉山將徃杭州卜居二十韵垂白遭多難倉黄走四方吳人今入貢越冦復侵疆百戰山河破三邊草木荒軍容皆赫赫徒御亦揚揚舉士思投筆農人習臂槍誰令紀綱壊未改瑟琴張卓爾文章伯平生錦綉腸琹書曽不廢軒冕逈相忘愛客坐常滿耽詩夜亦忙登龍嗟潦倒鳯鳥亦翺翔說項口不輟留髠興甚長百篇詩倡和屢舞酒淋浪老驥羞跧伏饑鷹欲逺揚憂天如杞國辟地卜錢塘丞相聞新詔除官平舊章覆蕉曽有夢腐草或先光蕭颯㕠蓬髩漂揺一葦杭第慚金自躍何以玉能藏海底珊瑚赤松根琥珀香明朝重回首嘉樹鬱蒼蒼贈道傳上人偶識廬山逺山莊借屋居撥雲分臘酒踏雪送寒蔬門俯溪光逈窓含野色虚相過兩不厭燈火案頭書送蔡伯昇辟兵澱山依故人典衣沽酒磧沙頭送客携家訪舊遊虎窟携來桃竹杖鷗波蕩去木蘭舟黄楊偶戹今年閏老菊重逢九日秋覔得桃源堪辟世結鄰當與老莵裘陳湖夜泊平湖清水清如鏡照見潘郎兩鬂斑帶箭飛來何䖏雁一聲哀怨入雲間訪澱山因自明習無學二禪老西風滿帆天所假扁舟過湖快如馬欲㝷漁父問桃源因訪高僧遇蘭若南能北秀兩魁竒翠竹黄花搃瀟洒相逢握手問流落試爲從頭畧傾寫生居揚子大江濵老我延陵力田者羣兇西來火三月四境更無茅一把鄉鄰死戰血漂杵妻子生擒肉爲鮓随波幸若魚漏網失窟驚如㕙在野山中碧松堪療饑池上白蓮宜結社笑語同行有髪僧數見不辭禪板打懐玉山隱君并簡其子國衡錦翮鵷雏海上囘無端鷗鷺失驚猜青山靜對機心息好客相過笑口開魚躍氷池堪入饌蛆浮臘瓮足持盃官軍赴敵忙如蟻奈爾重門掩緑苔懐袁子英疇昔㝷君竹浦西芭蕉月上姓名題别來歲晚相留戀行到窮途孰指迷兩髩風霜秋颯颯一蓬烟雨晝凄凄遥憐冠盖高陽里長伴山翁醉似泥懐諸葛用中每憶君家書畵舡夢魂飛繞太湖邊干戈滿地無休日萍梗他鄉又一年西北天高烟霧隔東南海濶水雲連何當覔得蓬萊路相與從遊采藥仙至正丁酉冬玉山燕客芝雲堂適有時貴自海上來以黄甘遺之玉山乃分餉坐客且曰吳中以連年擾攘無之今有之諸君子不容無詩故有是作青巾西來人食肉逃難西采采黄獨上書不伏光範門忍饑寧負將軍腹玉山燕客客滿堂香柑新帶永嘉霜分金四坐照人面潄玉三嚥清詩腸山中椰瓢大如斗吳姬劈來薦春酒酒酣遥指洞庭山爲問木奴曾貢不頻年兩浙阻戈兵黄甘陸吉不相過此時共享此佳果胡不取醉花前歌漢廷傳柑還賜宴應念江南乆征戰聖恩有詔悉蠲租可奈數州人已無贈鎦元臣何士安二省郎冬十二月一雨滂婁江水高三尺强翩翩使者傳令急肅肅官軍赴敵忙日出山頭雲氣白春囬海上栁枝黄捷書明日報樞府連璧少年増寵光錢夢弼移舟過姜里後三日予徃見之適夢弼卧病庚子正月賦此為别堠山之别苦倉猝甫里相逢說亂􅄐喜見新年正王月重瞻舊日漢官儀酒盃不惜金魚換藥杵何勞玉兎持借問董家雞共犬有無祥瑞似前時漫興十一首甫里水東頭垂蘿繋客舟客心清似水吟鬂白于鷗詞賦知無用干戈苦未休蓬窓三日雨農事憶西疇其一五十不富貴蹉跎又六年新愁添寉髪故國暗狼烟白㡌看雲坐青燈聴雨眠痴兒書􅂴讀翻笑腹便便其二吳地方千里齊民搃荷戈人生無可奈天運竟如何米市黄金賤沙場白骨多故山時一望老眼淚懸河其三伐木燒官炭中林霹靂飛窮猿無可擇飛鵲更何依野雨生稊稗山風長蕨薇兒曺能采拾猶足慰年饑其四吳女何多巧吳趋作楚聲市㕓方易肆朱粉復傾城壓酒桃花塢弹筝細栁营將軍正年少相頋苦為情其五闔閭城下栁誰種緑隂成樹繋浮江馬枝遷出谷鶯我朝方用武僧寺搃屯兵猶喜湖田熟街頭米價平其六田舍方東作州家要義兵瀕湖團水寨􅓯石甃山城栁暗春烟煖芹香潤雨晴荷鉏歸未得布榖為誰鳴其七盡道從軍好封侯甚不難羽書頻報捷相府即除官北鄙烟塵逺東風雨雪寒腐儒人共笑白首鹿皮冠其八赫赫千夫長揺揺四櫓舡舡輕如躍馬冦退欲歸田蓑笠松江上犁鉏榖雨前只愁邊報急生計又茫然其九太湖三百里流血水雲腥戰皷有時歇漁歌無䖏聽飄零孤雁白惨淡逺山青題橘音書斷令人憶洞庭其十近聞哀痛詔使者又江東兵革何時息車書四海同落梅春雨後芳草夕陽中俛仰長流涕窮途一老翁其十一頋國衡萬戸席上與乃翁及元樸長老􅂾客把酒賦詩各成七言四韵客來寒食清明日每日春風醉玉山綵筆醉題鸚鵡賦寶香頻爇鷓鴣班簾前脩竹翠欲滴池上小桃紅更殷按得錦箏新製曲隔花黄鳥共間闗宿夀上人山房再和金西白長老韵春來淮楚兵方息今夜村莊犬亦寧分得梅邊半窓月借看松下兩函經屋山風颺茶烟白江浦雲連樹葉青來徃風流似支許獨慚吟鬂已星星訪積善寺貴上人適與旌德寺學無為明月庭相集四人年皆五十有六酒邊聨句共成一律既而又各和一首四人二百廿四歲逋翁一日酒傾三百杯月庭醉裡不知浮世狹無為吟邊但覺好懐開應芳春雲冉冉連江樹逋翁晴雪紛紛落野梅無為邂逅相逢􅄐亂日月庭布帆無恙亦隹哉應芳四人二百廿四歲野老浮家僧渡杯共喜江湖春水靜適逢西北莫雲開神仙換骨元無藥宰相調羮自有梅昔酒正須終日醉醉鄉佳䖏亦悠哉送梅州判之崑山百戰歸來佐一州貂蟬從此出兠鍪山城近海金湯固市舶通番食貨稠下馬正逢梅子雨勸農須趂麥花秋薦賢不負尚書意治最功成秩更優端午日瑞光寺西白長老方丈作藕花池上端陽日菖歜香浮玉藥舡可喜山僧能好客長容野老醉逃禪連宵雨漲三江水當午雲開一鏡天醉倚浮屠望鄉國横山依舊暗烽烟對雨書懐書生得句百憂忘更喜新知共一方醫士為焚賖藥券彦文折指頋鄰僧借與讀書床道傳折指夀十年鄉國烟塵暗五月江村風雨涼不用弱流三萬里地無豺虎即仙鄉次韵贈管伯齡風塵連四海身世同一漚斯文幸未喪同類猶相求蜉蝣果何物敢作撼樹謀諸公新亭淚可笑學楚囚我無西園金孰問東家丘嗟爾一片玉産此崑山州天門九重深献納亦末由江村茅屋雨湖田稻花秋門外車有轍窓前水長流時無華子魚幼安誰與儔濯足弄雲水商歌興悠悠胸蟠五色線唾視萬户侯針芥適相遇珠璧驚暗投酒盃接殷勤詩盟結綢繆千金享敝帚猶曰不易酬新知如故交一笑忘百憂停杯問蒼天干戈幾時休金風雖乍起火雲未全􅀵谿橋栁隂清繋我三日舟掺執不忍别相期重來遊甫里先生有田二頃可無官况復時危行路難丹鳯徒勞啣詔下白鷗自放出闌看春從頋渚随茶灶月向淞江伴釣竿舊宅不知何處是浮屠樓閣倚高寒次韵袁子英過吳江兼簡琦龍門孤城當澤國潮撼勢如浮挂杖㝷僧寺長橋係客舟江寒楓葉落湖暝蝮蛇遊寄語龍門客詩盟莫負鷗江上女和子英韵妾生吳江上阿爺最鍾情十五嫁夫婿紅顔如舜英别來各天涯所共惟月明妾守江上宅夫戍邊頭城江上畏行露邊頭防斫營一朝義當盡性命鴻毛輕死願化葵藿兩兩心同傾送頋玉山遊東南諸山我愛向子平婚嫁畢兒女平生掌上珠棄置若敝屣百事不挂眼五嶽縱遐武朝與麋鹿遊暮與泉石伍泉石本無情所喜絶塵土松風出林磵笙瑟音調古但聞幽鳥鳴猶勝俗人語咄彼貪墨徒躋蹬炤金塢遺臭千萬年其禍皆自賈吾知子平心夙昔慕巢許矧兹風雨秋摧蘭折蘅杜徃哉山水窟幽期赴緇侣觧纓濯滄浪苕花八風舞老我病江沱臨風為延佇和頋仲英金粟塜燕集詩我昔過北印立馬山之隈為問壠頭樹皆云後人栽生前樽酒誰不有無人到此自對青山開屋堆黄金五侯貴難免白骨生蒼苔最憐吉士或狂折有如㸑下蕉桐材玉山先生逹觀者胸次不着閑悲哀清秋携客墳上飲麯車載酒山童推大笑胥魂乗白馬深慚鯀魄化黄熊墓名自製身自挽視身不啻輕如埃鵉翔鳯翥玉箸篆虎踞龍蟠金粟堆鶴羣三繞喜樹舞􅀛巢並載豐碑來長吟復短吟此興何高哉秋風無情摧萬物芙蓉亦老胭脂腮笑言他年翁仲共寂寞何如此時賔客相追陪功名絶愁根富貴脫禍胎百年能幾日一日能幾杯從此秉燭長夜飲猶恐四蛇二䑕忙相催主人爛醉客亦醉絶倒不頋旁人咍北望中州數千里人家盡作邱前灰髑髏委江郊多是賢與才忍饑自作首陽鬼獨醒誰念湘江纍神仙初無不死藥方士浪說㝷蓬菜君不見無邊之海白淼淼無名之山青巍巍長鯨嘘吸成風雷徐氏一去何曽回玉山以予欲徙居淞江之東設席書畵舡邀袁子英陸元庠恢上人用江東日暮雲分韵賦詩以餞予得江字用以留别浮家野老㕠目厖捩拕欲渡吳淞江東將入海釣濤龍玉山山中别老龎西池之屋如舽艭左圖右史堆滿窓燈花揺揺落銀釭葡萄灔灔傾玉缸四簷白雲雨飛流淙若列媧石銀河洚主人長歌客按腔翕然鐘皷相撃撞酒酣捉筆如長杠千軍可掃鼎可扛諸公大才齊楚邦騷壇將軍霖麾幢客來投筆乞受降乃辱贈以白璧㕠明朝短纜􅌛舊樁馮夷前驅鼓逄逄海濵懐人倚石矼書筒時寄黄耳尨來􅀛軒詩玉山作折為頋君維歲之初兵閧邑我鐍其扃以辟以徙今我來思室有爾􅀛我墉弗穿尔從何來委蛇委蛇爰曳其尾來􅀛之祥云何不喜我户伊威我牖蠨蛸嗟我婦子亦孔之勞尔其泥途我室我家豈不尔思以名其廬瞻彼池水有蒲有蓮尔居尔游宜永其年袁子英偕宗别傳過天慧庄因獲晤言夜話之餘口占以贈短髪蕭蕭雪滿簪老禪方丈挂瑶琹月明毎憶許玄度歲晚同來支道林四海干戈猶在眼百年軒冕搃無心梅花玉立西窓下相伴哦詩到夜深子英之玉山頋隱君今于同里法喜寺樓居日抄佛書至午而止餘暇則吟咏不輟雖親舊來訪亦不徃答焉余因子英復去作此代簡客來喜得平安信蕭寺樓居日掩扃湖近浪揺窓影白地偏苔没履痕青羣賢方結蓮花社小楷猶抄貝葉經歲晚扁舟過甫里好㝷漁父過寒汀送照元明住白馬寺老梅飛去迹猶靈七十二峯湖上青已喜黄龍新說法無勞白馬逺䭾經六時花雨狻猊座五色雲開翡翠屏携取寒泉同煮茗予將歲晚過禪扃冬至日陪高太守坐愚隱山房讀易有感一殻渾沌破二氣從此分消長固有時爕理亦在人云何數年内濁亂暗楚氛維時當嚴冬祫衣煖如春中林竹抽萌花開雪紛紛隂極陽復生踐長喜兹晨蒲團踞禪榻芸窓對爐薫筌蹄謝支許羮墻見羲文嗒然我忘吾萬事何足云人日懐管伯齡及杜泉玉昆仲定一山上人吳淞江頭春水生美人不來舟自横一年又過牛羊日四海豈忘鷗鷺盟管寕白㡌傲軒冕杜陵名家多弟兄結社香山僧更好野老何緣與姓名劉景儀寓崑山永懐寺除日作三十韵見貽時予客薦嚴丈次韵答之兼贈兩山主人遭亂心如醉偷生鬂已華一年看又過幾度發長嗟淮海浮羣馬荆蛮闘兩蛇妖氣渾不散殺機轉相加倦客誰相頋高僧意孔嘉燒香談般若􅀝樹聽楞伽文風月三生石文章五色霞堦前時剗草坐上或拈花我下南能榻君居北秀家麄豪笑俗子歌舞擁高娃重繫纒頭錦頻敲拍板牙何如宗有道樂此寂無譁法喜常親炙塵心亦变華濟河求巨筏出宅問三車兵火西來盛神京北望賖憂天同杞國賦雪擬劉义西寺齋鐘應孤城戍鼓撾朋遊欣宻迩世務那紛拏衮衮華軒鶴喧喧晚樹鴉餘生知有幾學步恐成差故國歸心切烽烟滿眼遮衣冠無噍類戈㦸亂如麻不識蓬萊路那逢博望槎憤秦思蹈海悲楚欲還沙竊比君臣蟻誰憐喜怒蛙桃符驚節換萍迹寄天涯君憶蘇堤栁予懐楊羡茶吟篇聊侣和醉筆半欹斜此意方相得前言匪敢誇尚期金百鍊永保玉無瑕聞頋玉山芝雲堂火而所藏之書俱焚恐其不能為懐寄詩釋之誰將藜熖觸羣書腹笥便便自有餘得失永須論塞馬平安􅂓復問池魚草堂留客仍投轄香經㝷詩可曳裾别院海棠春滿眼重來燕子喜何如和玉山初夏言懐二首聞君乆約東林老林下棲遲避俗塵蓮社不妨陶令醉韭葅誰信庾郎貧蘇湖􅄅􅄅田皆水淮楚茫茫草没人春去百花先自落五更風雨况相因四海風塵渾未息一時天道豈無知待看雨散雲收日依舊山青水緑時死欲便埋童荷鍤生能自挽手裁詩道今風致清如許行路相傳口似碑再用韵寄悅堂長老松雪孤標孰與倫烟霞一室靜無塵清談每日能留我自說平生不患貧城郭含輝山藴玉堦除聽法石如人曇花不逐春紅老信與東風别有因老虎兒孫到鳯池聲名曽徹九重知鶴書天上頒恩日猊坐山中說法時寸草不忘慈母報白華無愧古人詩春秋直筆黄夫子曽為東林著二碑踏車􅁔吳田水深三尺許搃是去年秋莫雨勸農使者催春畊田甲頻撾水車鼓江村破屋能幾家家家婦姑俱踏車蓬飛両鬂赤㕠脚亦有兒女㕠髻丫淞江太湖愁滿眼白汗沾衣足生趼車輪轆轆羊角轉水波翻翻龍舌巻春來十日九不晴怕聞鵓鳩呼雨聲滂沱纔禆片時乆辛苦又加三日程當家豈無夫與子打魚日糴去城市城中禁米難出関田上忍飢還戽水四郊未種圍田榖三邊已運官倉粟安得木牛為木龍運水疾于牛足陸西林日落田婦歸隤岸白烟魚虎飛詩翁獨立長太息何處青山有蕨薇和陶菊庄郊行二首崑山春暖玉生烟滬瀆潮平水接天行到滄洲人寂寂坐看青荇葉田田十年四海暗烽烟五栁先生醉樂天芳草夕陽江上路獨憐春水滿間田梅子玉判官勸農過客舎口占以贈婁江之南一萬家葑田水深忙踏車喜有春禽鳴布榖幸無夜雨漲桃花州倅勸農頻出郭野航牽纜小如􅀲白鷗也自知人意引領相望立釣槎觀浴佛有感銀盤水浴紫金身白髪禪和拜跪頻周孔豈無初度日諸生誰為薦蘩蘋和頋玉山重構釣月軒龍戰虎爭無了日他年誰是復誰非諸公圖像凌烟閣此老逃名釣月磯新雨一池荷葉長南風四月楝花飛我來喜聽滄浪曲欲挽遊絲繋落暉夏夜作五年兄弟各西東兄在今年七十翁戎馬此時猶塞路覊鴻何處或傷弓對床夜坐空堦雨擁被秋吟破屋風夢裡不知身是客覺來愁絶泪沾胸陪梅州判智長老石教授陳惟兄夀上人等遊姜公墩小酌梅以杜子美興來今日盡君歡分韵予得日字白雨洗炎􅀬清風洒瑟瑟梅仙約幽㝷邀我杖藜出同遊得名緇飄然興俱逸移舟泊釣渚看竹過僧室行行陟高邱苔溪樹隂宻崑山含玉潤巋然如卓筆羣峰太湖上雄勢爭崒嵂江中早潮囘風急去帆疾梅仙最多喜播種農事畢青苗匝吳田芳草眠繭栗斯民乆塗炭天意諒深恤兵餘幸豐年一飽百憂失懽然各有慶雙榼酒盡吃安知艱虞世得此閒暇日幽情寫絲桐餘懐􅂓短述次韵贈虚中講主三友高論乆寂寞一鼔雷音號令嚴正法眼明岩下電􅀇機味若水中塩池蓮玉立天開鏡庭竹金聲風捲簾大地政須沾化雨蹄涔寧許老龍潛六月廿二日愚隱和上以詩留别徃磧沙寺以寓缾鍚其詩末句云一聲短笛滄浪莫收拾絲綸下釣臺予次韵二首送之既而懐磧沙諸公復就韵代簡一曲滄浪歌未了滿舡明月賦歸來俗塵自暗人間世不著纎毫惹鏡臺白髪道人無住著磧沙湖上去還來湖深六月天風冷花雨吹香般若臺愚叟長老折右二首送誌公刀尺傳家乆舡子絲綸罷釣來一鏡湖光照樓閣坐看明月映高臺瀕湖金刹清涼境冠盖時時聴法來刮目試看天下士幾人胸次有樓臺剛中長老折右二首寄長歌白雪無人和近喜碧雲禪老來龍女献珠烟水國馮夷撃鼓雨花臺一牛鳴地長相憶頼有尺書時徃來白馬山中人獨逺孤雲落日在琹臺舟兼懐照元明折右二首寄閑野連日顛風吹海立幾時飛錫過湖來絶憐湖上林泉好六月清風似五臺寄益以道刼􅁅烟銷江總宅斷蓬風轉海濵來干戈未息衣冠老誰築黄金聘士臺寄江叔亷寄趙君綽舊家公子老儒冠詩巻梅花共歲寒湖上月明携客飲樓前山色枕書看十年四海風塵暗乆旱三湖水澤乾滿目天雲秋後熟敢題尺牘問平安送扇贈趙執中送子扇一搧呼兒書八分相望湖上宅只隔隴頭雲南國多秋熱西風有楚氛庭幃清枕席持此奉殷勤寄天章上人兼簡陶菊庄東林花雨滿衣巾文采風流有若人留客看山常滿座開軒臨水逈無塵娟娟烏鵲橋邊月灔灔葡萄甕􅂻春朝夕徃來陶博士應拈醉筆賦詩頻簡西白長老高情每向詩中見怪事今于病􅂻聞舡去逆風牽纜去葦花飛雪暗江濆雁來南國邊聲逺鴉集西林野色曛笑佛袈裟歸檇李秋風塵土自紛紛贈費克明知州崑山之石白如玉婁江之水涅不緇試持山水比州牧厥德清白同于斯吳儂賴公父母慈遭時艱危䝉撫綏盡令賣刀買牛犢不失與國充耘耔訟庭無人辨雀角圜扉空鎻生蛛絲獨憐沃土重租賦瘡痍不忍加鞭笞早騎羸馬戴星出晚踏明月歸來遲紛紛公務日不暇烱烱此心天弗欺毎延多士談禮樂頓覺喜色浮鬚眉菁莪方育泮林雨岐麥當茂氷霜時未擬文翁能化蜀已過魯山無紫芝蜚名籍籍動藩府將徹九重天子知夏五聞吳門湯君說以書見寄既而茫然九月末因馬吉卿來甫里詢知君説仍居閒詩以代簡不見故人逾六載曽聞書札寄多時浮沉江上知何許淪落天涯有所思老驥未應甘伏櫪驚烏可是别無枝欲過竹所㝷袁粲每望山隂憶戴逵策策秋風桐葉盡凄凄寒雨菊花遲幽懐每日如中酒世事頻年似奕碁一笑相逢期未得邊塵眼滿鬂如絲送愚隠長老主萬夀寺戎馬廢六籍三乗亦多魔中流矻砥柱猶能障頺波吾師雪卧乆王公礼為模說法繼禪月珠林雨曼陀弘開甘露門諸根並漸摩一鼔氣復作天龍衞烟蘿秋空雲霧開佛日光輝多題林泉雅趣圖贈杜玉泉泉翁愛山如愛客到䖏好山皆莫逆脚根不涴京洛塵面紋長帶煙霞色奚童抱琹翁曳履長日山中看山水萬松清籟響如絃滿地白雪吹不起桂風蘿月秋復春野花幽鳥情相親巢由相去數千年黄綺以來能幾人山顛水涯風物美都在我翁詩巻裡莊周夢蝶蝶夢周覽是圖者同天㳺寄屈時中諸友白蠡塘南烟水村伊人辟世若桃源家家雞黍留賔客夜夜熊丸教子孫慈竹叢深冬笋出野梅根暖早花繁扁舟一夕乗清興我亦來敲月下門逢鄉僧昱東明他鄉逢着故鄉人叙舊情如骨肉親猶喜吾兄存兩子俱從釋氏究三身煩君為寄平安信道我今居寂寞濵何日浮杯來甫里寒汀燈火話酸辛梅子玉董版築于杭城别去日乆區區思懷作此以寄錢塘江上石頭城鍤畚如雲杵雨聲兩袖西風騎馬立五更殘月聴雞鳴銀缾犒酒平章喜金鼔還州父老迎力盡東南非一日政須遺愛撫孤㷀奉寄楊鉄崖先生光範門前三上書先生曽為發長吁画橋楊栁藏書屋鉄笛梅花落酒壺偶遇故人論北海相思一夜夢西湖由來海内誇長句問寄浮家野老無寄題悅堂長老城南小隱絶句五首為愛城南水竹幽高人結屋近滄洲南園十畆蹲鴟熟足擬人間萬户侯門前流水與江通屋上青山與画同文武衣冠來聴法紺園長繋玉花驄象龍入室動成行燕雀随人亦自忙白髪老禪揮玉麈袈裟猶帶御爐香屋頭新植青松樹池上重栽白藕花元亮孤舟靈運屐不妨來與共煙霞客來多是一宿覺我亦幸有三生縁扁舟過門清夜裡烏几燒香繡佛前題淵明采菊圖一官棄如屣三徑今來歸言采東籬菊如彼西山薇秫田未熟壼無酒白衣携來恰重九今年不識是何年且爲黄花開笑口非無小窓膝可容花前一笑樽已空衰顔得酒借春色霜染樹頭秋葉紅先生之貧人共惜先生之心人莫識大厦難將一木支逃入醉鄉聊自適玉山邀至同里法喜寺飲别是夕酒醒夢囘宿雨初霽月明可喜即景賦詩兼寫送别之意風吹雨脚斷月到天心明孤鶴有清夢荒雞非􅁖聲南浦明朝别西湖幾日程棹歌人正苦莫上石頭城寄愚隠長老别後逢人説北山吳門第一古禪闗江湖缾錫多依倚文武衣冠悉徃還鉄騎解鞍祇樹下金魚換酒雨花間最憐丈室雙童子捧茗燒香不暫閑寄虎丘居中長老初春舡過百花洲不謁閭丘謁虎丘古徑入門蒼蘚合新城繞樹翠山嵐遊方每學僧行脚聴法當随石㸃頭更覔西菴修竹裡寒泉一酌薦前修和玉山排悶寒窓誦君詩字字黄絹婦嗟君遭屯邅蛇虎嚇前後毅然能忍性不矯亦不揉黄金本何物一任化烏有胸中耿耿在依舊冲牛斗大兒萬户侯金印已懸肘小兒未强仕詩禮方授受兩娥遽奔月星橋吠天狗更憐鳯臺女先亦辭父母君能悟空幻視世等塵垢哦詩作㳺戯一日凡幾首開樽飲詞客錦綉從醉嘔愛賢眼常青垂老髪仍黝逆境雖滿前百戰喜不負憧憧彼貧夫富貴爭進取力强可拔山勢熱可炙手美新皆揚雄託孤誰杵臼龍為堅白論衍事雌黄口何如玉山人不失素所守愚也比方臯識馬忘牝牡傾盖即相知論文誠耐乆嵗寒松柏心先零愧蒲栁鄊來九折坂此日一杯酒豪吟鬼神泣醉筆蛟蛇走萬事付忘言太山同培塿焦任道欲過夀上人山庄并與僕相見前期以詩相貽傳和之邀僕同賦舊說君家有墨庄新詩今見墨雲香閑來林下㝷緇侣當為墻頭喚索郎邊境日來西冦近滄江歳晏北風涼先生素識融公嬾莫怪而今不下床再和韵寄趙彦深平原公子午橋庄草木當年雨露香桂樹不嫌招隠士桃花應喜識漁郎錦茵醉酒冬宵煖水檻垂綸夏月涼我亦欲招横玉去為君三弄據胡床次韵寄杜玉泉昆仲授書不逢黄石公采藥不遇龎眉翁杜陵名家好賔客客􅅂來曵梅花風德㢤若人氣冲融渙然釋我心怔冲張燈為展風月宴坐客搃開氷雪容火螢熒煌吐星斗金鰲贔屭移方蓬高年垂及絳縣老合歡要䇿青州功唾壺玉缺擊如意臂鞲珠脫携謌童航船浪翻翠袖􅊜笑絶如舉驪山烽紫雲一曲歌未了陽烏飛出扶桒東明朝仲氏復迎客百花潭邊收釣筒長魚斫膾白于雪葡萄新釀青如空高堂坐擁肉屏煖寒士無復鳴秋蛩溪山相映色俱喜塤箎迭奏情無窮老夫生長近吳下所恨白首方遊從頻年坐我塗炭苦此日置身仙子宫已令沉湎恣為樂尚論古人客折衷賦歸既無田種秫獨醒敢誇衣集蓉啣杯樂聖非易得良辰美景真難逢論交不以車笠異忘形且喜禖期同咄彼貪夫逐名利何異糞壤蜣螂䖝蛮爭觸戰更堪笑要于蝸角稱蚕叢邊隅風塵莽浩浩天門烟霧深重重世云酒為知己飲可不罄尔琉璃鍾扁舟徃還渡吳淞泗橋且喜春潮通興來徑去造竹所碧灣樹下維孤篷祗慚詩債償未了毛頴爲我長匆匆此詩􅂓紀前日事此韵乃和前年冬分柑細君與說項眉案坐對如梁鴻碧雲山房分韵得簷字古寺雲林静春宵風雨兼阿師如􅒟逺有酒醑陶潛海味分苔脯園蔬摘韮尖金蕉傳四座銀竹瀉層檐談辨情相洽醺酣意轉欣燭長紅未盡缾罄緑頻添小令皆毛舉新題各口占酒懐雖曠蕩詩律自清嚴浪雪翻茶鼎香烟繞竹簾偶論蝸國戰因笑楚人鉗老去甘藏拙閑來得養恬青松知此意相對一掀髯雨夜懐朱澤民一天風雨夜漫漫獨為先生發永歎杜甫數椽茅屋破鄭䖍三絶坐寒氊鶯花紫禁囘頭夢烟樹青山抱膝看最憶舊遊諸閣老别來零落漢衣冠和邹弘道諸公遊磧沙寺錢塘形勝接蘇湖風物于今入戰圖獨尔磧沙仍似舊諸公杯酒不相孤逺山雲歛千􅈐出幽樹春來百鳥呼白髪老僧盤膝坐笑看車馬陟危途次韵寄路以道笑將簪紱棄如泥出郭移家住水西芳草喜人車轍少逺山齊我屋簷低門前古樹慈烏集梁上新巢乳燕飛更喜東橋僧舎好桃花多似武陵溪送居南山還嘉禾檇李亭前水接天楊侯曽此洗龍泉道傍已伐將軍樹湖上今題書畵舡滄海揚塵知幾度黄楊厄閏又今年因君與說戈干苦相送臨􅄮一愴然題李白月下泛舟圖青蠅觸起脫靴時飛燕嗔人鳯亦疑杯酒佯狂江海上此心惟有月明知七月二日過益上人問疾因過路以道山人家飲酒樂甚詩以謝之新秋去謁病維摩因與山人醉薜蘿頭戴鶡冠堪入畵手鳴漁鼔更能歌竹邊亭子清風細壁上詩篇好客多從此徃來溪路熟扁舟乗興數相過和梅同知遷秩二首我愛朱絲絃其音淡如平為人滌邪穢妙理通神明良工繋錦瑟選練亦已精移柱喜更張白雲風冷泠我愛青銅鏡炯如秋月圓為人别妍媸毫髪俱了然纎塵不受汙光輝人共憐政須重拂拭玉臺更高懸窈窕誰家女和卜思賢韵窈窕誰家女依稀慕璚樹向來適良人門户比房杜今年遘疾難飄零太行路風雨道滂沱不失春態度珠簾十二樓燕子忍辭去合歡㑹有時無勞嘆遲莫次韵寄呈謝杭州金湯險據鳯凰山日月遥瞻虎豹闗每見題詩懐故舊也知為政有餘閑慈幃一飯雙魚美衙鼔三搥五馬還細說平章親更喜黄金横帶綵衣班中秋日玉山頋仲瑛邀翟明府份陸良貴仁秦文仲約等十人飲金粟上酒酣賦詩各成一首憶昔避戎馬放櫂來北山相逢適中秋展席解愁顔安知復今夕喜讌集羣賢烽烟雖未息眼底喜不見華月出松杪靈飈散天香主稱死便埋荷鍤童在傍酒酣各哦詩其樂勝鐘皷柱頭老令威為作八風舞人生不飲酒杯盂空匶前寥寥􅂾千載孰與劉伶賢贈章彦復省掾相約覧秋色松江來小舟留人十日雨洗耳百花洲祖逖鞭方著張良箸欲籌吾廬吾自愛霜菊晚香幽偕愚隠長老重過玉山草堂次文中韵中秋醉眠金粟堆重陽又捧菊花杯欲從南郭隐几卧為約北山禪老來松下低頭拜竒石竹邊随意坐蒼苔林風磵月足佳趣安知世有黄金臺簡嘉興天寕寺西白長老五月中旬喜報書客來兼得問何如天花亂雨袈裟地祗樹重栽瓦礫墟風月三生情分在烟波百里信音疎高秋且喜吳田熟說法開堂響木魚玉山席上分韵得對字勞生紛如蟻出没兹大塊達人獨超然逍遥物之外秋高天氣清喜此良燕㑹蹇予顦顇客亦忝文詩軰黄花有佳色青山若賔對飲者醉如泥不飲亦慶快卓彼浮屠師入俗無罣碍笑指空中雲非觸亦非背絶倒草堂翁東壁珊瑚碎輓華亭吕輔之横溪居士折諱良佐號屢却􅊹車不赴官黄金多用恤饑寒銘槐西墅雲林屋釣竹前溪雪浪灘王烈能平鄉里訟龎公獨遺子孫安只今海内文章伯多憶賔筵禮􅂾寛􅀉郭羲仲霜骨稜稜七尺軀昻然獨鶴睨羣雏門前問字人携酒舶上求詩客送珠山色隔溪雲縹緲梅花繞屋雪糢糊别來歲晚遥相憶愁絶荒郊夜月孤題玉山移舟月夜過客舎忽聞側室之訃即留别一首而去别後韵和以訂重來之約畵舡月下過江村客舎荒涼笑語溫忽報緑珠飛堕地輕如玉斗碎鴻門蘭臺乆絶行雲夢蒿里聊傾酧月樽携客東橋重問竹柴門當為掃苔痕代簡牛彦伊客來為報平安信知在長洲茂苑間借榻眠雲僧舎静舉盃邀月客窓寒無家且喜身長健玩世何妨髪已班三度梅花曽寄否思君長倚馬鞍山題王景逸所藏瘦馬圖將軍百戰自封侯老病誰憐玉腕騮皮肉瘦來渾見骨精神滅盡只垂頭長鳴落日青山下獨立西風白草秋猶勝駱駝三萬匹都随􅀾士死炎州寄張彦復蘭省歸來日未斜閉門塵静似山家教兒楷字謄書藳遺客生絹寫墨花太伯祠前人走馬姑蘇城上樹棲鴉知君觸䖏多懐古忍聴吳趋唱小娃和馬吉卿韵寄開天啟長老西望天峰百餘里高僧何日共遊居談禪丈室揮松麈塵􅓏長扁聴木魚萬􅊤秋聲饑虎嘯一池雲氣老龍嘘更㝷香徑靈岩下與子聊乗下澤車贈趙善良清江濯足坐中洲自喜身如不繫舟槐國功名前日夢玉京􅀌負少年遊每邀田父同雞黍已學山人製鹿裘醉後劇談今古事面如頳玉語如流贈華子强父子晚涼池舘藕花洲郎罷呼兒放綵舟老膝尚容文度坐佳賔多與阿戎遊長腰米飯猶珍饌五色萊衣勝綺裘莫笑東家人誶語由來涇渭不同流答盛彦英愛君楓落吳江句有客相期放剡舟滿眼雞䖝從得失􅁯形鵬鷃共遨遊秋来江上鱸堪鮓歳晚山中貉可裘如此幽居良不􅁖比隣况復有詩流答惠上人鍊得身形癯如鶴江湖杯渡㨗于舟湖邊舊宅適歸隱吳下諸山今卧遊學道已知磚作鏡上詩更悟冶為裘曺劉沈謝何淪落風月平分支遁流答崔彦麟老夫衰􅂴慙無學年少才華羡李舟好覔靈槎天上去莫攀仙桂月中遊踞床我欲來吹笛換酒君當為解裘早喜今年秋至早涼生六月火西流自述少年學士俱瀛洲老大浮家惟葉舟每憐古調少人聴幸得新知如舊遊四海風塵桃竹杖十年霜雪木棉裘迩來同飲太湖水最喜白鷗非俗流過吳江三高祠三高祠前秋水波客來弔古悲且歌季鷹魯望桑梓敬蠡也籩豆理則那生為越人身向越百計吞吳吳乃滅直憂烏喙將無情兎死狗烹肝腦裂飄然携家湖海遊捧心人與同扁舟越人誇功鑄金像于吳孰曰非仇讎行裝重寶乆弥厚清高之風絶何有奉甞堪笑木腸兒忍覩荒臺麋鹿走江風蕭蕭楓葉寒扣舷折我青琅玕靈胥怒挾海潮起殷若雷鳴過雪灘寄偰知州兼簡蔡教授使君心似婁江水霜落秋高清復清田野但知畊穫喜閭閻不識呌囂聲背山舘舎雲連屋通海漕渠潮入城公退應㝷蔡文學投壺置酒適閒情病中夢徐伯樞戴時中見過既而伯樞惠詩次韵答之病來呼酒當神楼又得牽絲作釣鈎堪笑生為窮谷叟何妨死作醉鄉侯四壁西風茅屋冷一簾疎雨桂花秋山童浄掃門前路數日頻迎李郭舟中秋日觀朱道明自壽之詩次韵言懷并紀燕集兵戈驅廹十餘年此夕珠歌翠舞間出瓮葡萄盃灔灔盤鈴傀儡錦班班達人不惜千金費浮世能逢幾日閑月裡嫦娥應笑我也將華髪對嬌鬟追和侯良齋秋懷四首寸絲欲補袞龍衣歲月蹉跎素願違身老江湖心未已夢遊京洛覺還非蕭蕭木落青山瘦浩浩西風曰雁稀慚愧太湖清似鏡照人雙鬂短垂絲出入都無騎從随杖藜于我頗相宜詩成每得江山助酒病還將麯糵醫杜甫眼前茅屋在陶潜心事菊花知朝來兩袖西風泪遥為鄉人洒籬世事無涯生有涯逍遥誰得似南華􅀛巢近傍三江水鷗侣平分半席沙稚子學書収柿葉老妻添絮採蘆花客來且共藜床坐莫說金張許史家垂蘿曲磴轉攀縁挑酒笻枝不挂錢白石路傍如虎踞青松磵􅔄作龍眠一盃且咏重陽日二頃何須負郭田風景不殊陵谷異丹心雪髪兩堪憐六柳庄為沈太守作彭澤五株柳清風千載餘頋予心乃心修名難與俱所以樹六柳于焉結吾廬門前有流水樹下堪釣魚我柳已成隂豈不懐歸兮人生一趋舎世事紛萬殊善學柳下惠風雨慎攸居繼跡子陶子亦曰姑徐徐誰其知此心南山黙如愚九月八日朱原道席上作主人預燕重陽客我老重逢癸夘年醉把黄花簪席㡌笑携紅袖棹觥舡洞庭山色軒窓外震澤波光几席間不用登臨勞騎從恍如蓬島羣醉羣仙為吳中行題画老樹骨立偃蹇秋山氣勢崔嵬閑却一江風月扁舟釣罷歸來次韵答班仲英客僧留客古禪宫湯茗爐薫對菊叢佛法不随塵世变鄉心猶與故人同一林紅樹含疎雨半壁青天截斷虹早晚相㝷東海上扁舟相贈落潮風題春江獨釣圖江碧山青雨過時輕烟漠漠樹離離白頭吕望鷹揚去獨釣滄洲是阿誰過崑山王御史墓宣和進士第紹興初上折宋御史王褒字彦先登野堂所著有春秋集傳等書行于世墓折疏論十􅁦切中時病後告老居崑山逸友人殷孝章以其事索書故有是作折在州南乆廢之餘賴知州偰公復之先生逸野堂何在仰止崑山有所思麟史立言三傳外廌冠遺直中興時一坏難朽孤忠骨十􅁦猶存蹇諤辭過客下車翁仲立共看重樹墓前碑簡金君玉峩峩洞庭山宛在水中央山風西北來微帶橘柚香吾友山中居一别今十霜題橘宜有書鴻雁日南来翔老懷多感慨烟火生肺腸作詩報君知湖山逈相望聞杜玉泉臥疾以詩代簡聞君臥讀床頭易世事更新恐未知一國山林包錦綉五湖烟水照旌旗天寒日暮人相憶冬至陽生歲又移江柳鵝黄春艸綠幽㝷當不負前期次韵沈啟之宴飲栢酒春三日梅花信有風赴君雞黍約醉我鹿皮翁凍雪山頭白晴雲海上紅天高不可問吾道未應窮贈慶别駕台州别駕不之官烟水孤村共歲寒偶有濁醪留晚酌旋挑生菜簇春盤三年鄰里通家好四海兵戈行路難且喜門前金色柳東風堪作画圖看送人妾為妮燕子樓中别綺疏象王宫裡學真如秋波獨注蓮花漏春筍頻翻貝葉書十二雲峰無復夢三千沙界本來虚散花天女長圍繞觀色觀空樂有餘路義道見訪示詩言懐予次韵一首書畵舡來城郭外客窓春在雨雲中一違談笑經年乆又得壺觴此日同江水照人清似鏡山頭戴雪白如翁新詩属和題青竹几杖相随許阿戎次鄭啓南縣丞出郊出郭問農事哦詩思不羣犁鉏江上雨桒麥隴頭雲馴雉行相逐雄鳩語更聞野翁相勞苦飛葢倚晴曛上元夜賦雪此夕何夕風作威急雪打我白板扉大如鵠鶴小鷗鷺乗風作陣横空飛老夫起坐驚且喜窓隙壁罅皆珠璣鄰家兒女時未寢看與燈月爭光輝夜深人静燈燭滅宻掩姮娥爛銀闕恍如太極未分時混沌之天無日月須臾忽聴簷竹折驚動老夫方寸鉄直憂壓倒湖上山連我􅀛巢化魚鱉老􅀛縮頸牛衣中夜長如歲心冲冲鄰家雞嗸三催曉發燭龍飛出扶桒東口啣火珠光燄紅萬國一照春融融客懐愁與雪俱釋青山依舊撑虚空吳門訪路義道和古詩二首客來上元夜筠軒照晴雪對雪飲流霞敲氷煑團月誦君詩數篇忘我衣百結一笑看梅花餘事不復說其二新年到城市憂思喜一雪復覩漢官儀仍書王正月蘇州古名郡刺史得元結老我愚溪翁無勞捕蛇說贈楊君濟縣丞我思崑山鉏白雲高軒訪我麋鹿羣我今長洲釣明月君復過此寂寞濵感君相知式相好與君談笑開懐抱坐分半席白鷗沙滿目青山浄如掃社公雨晴春風作􅁖村北村南杏花落勸農來徃杏花村雞犬不驚田舎樂君歸哦松坐松隂我舟更入菰蒲深釣鈎無餌勿語人但說烟波無處㝷寄蕭舜卿兼簡虎丘寧居中長老時蕭年八十三矣愛尔鄰居虎丘寺劍池磐石好林泉一門父子頭如雪十載兵戈命在天故國青山還歴歴春風芳草有芊芊生公㑹有招賢意我亦来從種白蓮達至善自錢塘過訪㑹徐伯樞昆仲諸友小酌以少陵春日鶯啼脩竹􅂻分韵得日字兼旬苦隂雨堦蘚青入室良朋遠方來一􅀏百憂失濶别十載餘艱虞難盡述喜聞戎馬間猶得用儒術間関脫虎口壮志曽不屈歸來西湖上飲水獨食蜜吳中舊親知生存百無一􅀛巢酒盈樽聊以永今日兩兒聆話言諸孫亦繞膝殷勤問生理為我長太息干戈紛滿眼世事暗如漆願言慎所之于焉保貞吉雪舟詩為王照磨作雪中傲吏乗孤舟千載復見王子猷吾知君欲記高興君聴我言當㸃頭男兒胸中有兵甲筆􅔄滔滔水三峽正須擊檝誓中流雪外蓬婆爭蹴踏長驅夜入懸瓠城指麾鵞鴨混軍聲生擒逆豎取金印江梅却㝷鷗鷺盟和沈啓之早春書懐水光山色浄無塵滿眼東風景物新繭栗犢眠芳草地木蘭舡繫緑楊津莫嫌頭上髼鬆雪且盡杯中㶑灔春鶴自乗軒鳥自好滄洲鷗鷺與情親簡錢仁山一榻青苔對雪五湖春水流斯欲遣長湏覔酒先拈秃筆題詩二月七日和徐伯樞排悶一首人生百年能幾何有酒快酌金叵羅已有蓬髩㸃蒼雪莫待桒田变白波東風花外鵲聲喜落日城頭烏尾訛君詩到手客在坐擊節聴我玲瓏歌伯樞以啟之韵作詩見贈復答一首蕭齋孤坐席凝塵喜得君詩字字新四海交遊期管鮑一家兄弟比椿津多情燕子重來日絶色桃花不負春愧我少年書劍在白頭無復報君親贈星術王逵夫虞廷命官非不多暦象必先羲曁和羲和年去數千載名與列宿俱嵯峨先生本學羲和氏聊尔談星隱吳市二十八宿緯五經上係天時下人事先生為人推吉凶一天星斗羅心胸河圖洛書造化窟妙理貫徹精靈通齋居垂簾坐終日金鴨野蘭烟􅈁碧客車載酒來問情先生舌端飛霹靂每將忠孝語臣子不惜忠言逆人耳天降灾祥本在人人能轉移天亦喜君不宋君三善言熒惑退三舎天人果相孚大咎亦可謝又不見韓退之命在斗牛坐在箕遭讒受謗能自知怡然高咏三星詩吾儕此理或未析請從先生考星暦和郜彦清州判莫春寓僧舎三首治最功成解印歸春風綠髪未應稀如何拄笏禪床下閑看孤雲倦鳥飛沈水香銷午篆烟僧房聊借石床眠多羅樹上頻伽語絶勝天津聴杜鵑篋藏湘帙沁雲香手閱金經掩竹房門外不知春早晚綠隂滿地日初長雨中寄友春風冷凄凄烟雨晝溟溟相望隔重湖幽事頗闗情頼有小吳牋可以寫心聲心聲寫難盡况無雁南征出門泥没膝恨不生羽翎隔窓兩黄鳥花問語嚶嚶頺然枕書卧一榻莓苔青􅀛巢藁􅃃之三終
