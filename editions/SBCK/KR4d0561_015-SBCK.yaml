body:
  text: 記瑞竹軒記予辟地甫里與徑山壽上人爲方外交一日過予曰今年春吾祖如山翁燕居之􅀁挿竹爲酴醿屏閲數日竹皆蘇活或者以瑞稱之故名其軒曰瑞竹敢請子爲吾翁記之既而復延至竹􅀁相與撫玩曰是竹也前爲屏時屈其􅀁天至是乃盡釋其􅅞屈者信抑者􅀭拘者縦葉􅀤乎蒼幹勁節之間生意藹然有不可得而閼者愚乃退而思之夫竹非蒲葦等易生之物可不根而生者今􅀂此果何祥耶甞聞徃者冦莱公挿竹而生世謂公忠義􅀁感如山之竹亦必有􅀁感而致然乎予来吳中聞翁有㣲德之事二焉属􅀊飢饉里有窮乏則周之俗多􅈄畋忍物􅁀殄恒買而放之斯二者固㝷常有力之家能為之豈其一念之誠仁􅀤于中黙契于天而獨有此休徴欤抑别有隂徳而人不知欤如是則萊公之竹不能專羙于昔矣雖然物之瑞未􅀂人之瑞也嗣法之徒森如竹立有能虚心以受道秉節以植徳清風􅀌摽為上拫噐則其為瑞又豈此君可同日語吁人為物靈氣化尤速厶即拭目以俟􅀛巣記至正丙申予辟地滆上依舊識里翁劉氏家築室一區棲婦子差可容􅂰既而以􅀛巣題之客或過予曰􅀛亦何甞有巣㢤予曰子不聞乎千􅀊之􅀛巣于蓮葉葢其以葉為巣􅀄不費經营之力也頋予此室寔􅀋之僦地里翁地不論直假力隣伍力不受傭鳩工材則有鄉邑諸友人相之故其室不勞而成今也閉門縮首帖然如藏六之􅀛蟄乎其間此􅀛巣之􅀁以名也比􅁆日來春和景明氛埃寝息四境之内桴鼔不驚田夫野老相與招致涉桒苧之園過桃李之蹊瓦盃濁醪􅁔舞酬酢逍遥徜徉又得如曵尾泥塗者此雖巣外之楽亦因巣而得也但不能嘘吸導引如􅀛永年苟于此偷生亂離免禍鋒鏑全要領以終其天年志願足矣􅀂夫明休咎㫁吉凶决大疑于國家浮洛出書為太平文明之瑞則同􅀋之中自有偹四靈相斯丗者區區巣居之楽與坎井醯瓮同乎一天不知大小之笑為何如客曰有是㢤子之適意也而今而後吾亦􅁒􅀙子之居以適其適可乎予曰可客喜而去予因次對客之語是為記􅀛巣後記是􅀊八月之􅀄天兵自西州來者火四郊而食其人吾之􅀛巣與先世舊宅俱燼矣予乃船妻子間行而東過横山竄無錫朞月之間屡瀕于危當是時跧伏蓬底屏息􅀂支牀者然猶􅁆數引頸回頋以戀其故土明年仲秋至婁江東近于海潮風汐雨漂揺拪苴乆之遂舍之従人間借屋而寓閲四年凡五徙聞隣邑無噍􅀋于是同室之人幸􅀂􅂯生雖貧寠不以為苦且復以為楽也至吾之􅀁楽則又以窮居無事得專心讀古聖賢書以廣其志仰天不愧俯地不怍廓如也然視此大􅒘吾生􅀂浮與夫􅀛浮蓮葉者何異故􅀁至以􅀛巣名室雖偪仄心有餘􅁉葢不以棟宇為巣而以天地為巣也峻宇雕墻莫知其光蓽門圭竇莫知其陋但知此巣自開闢以来厯􅁆千載不壊吾與萬物同居其間正不藩籬町畦以自局也以是而􅀚區區舊巣與堕甑奚惜雖然物之巣居者衆矣未􅀂儗􅀛之巣先後㒺異􅀛則儗其靈耳􅀂曰以靈自燋亦其用于世者然也世不吾用吾生自全吁用不用全不全係造物者處之如何非􅀛􅀁能爲也惟兩間之巣人不能壊此吾心可恃而安者吾心既安何徃不楽苐恐不知者謂無巣而有名疑爲誕故重託毛穎氏吿之雲半間記􅀊庚子月閏五西山師搆小閣于天慧荘而居之題曰雲半間葢取諸詩中語也予時客天慧與師落成徘徊其上溪山如画人皆喜之愛之而師之􅀁楽不在是也是屋僅一間髙不倍尋廣不踰丈無欂櫨栥棁之華自常人􅀚之井幹麗譙奚啻霄壌師獨處之􅁉如葢其前後左右牗户虚爽蒲􅇛木榻薫爐禅几之外無長物焉師于六時坐如泥塑諸弟子􅀲花之供日一二至談􅆰説有或従侍立客至或信信宿宿皆不能常與師共之惟英英之雲悠悠而來朝于斯夕窮􅀊月于斯一榻之外皆雲悠居言半間者亦謙辭耳夫雲之為物本来無心而吾師心無􅀁徃是亦無心人也以無心之人遇無心之物故不情而親不契而合乆之則雲􅁯其雲雲即我也我􅁯為我我即雲也吾視吾室吾不知其與天地相間孰為大而孰為小也荘周云天下莫大于秋毫之末而太山為小其言殆庶㡬乎雖然諸相皆􅄭吾師固知之乆矣然而猶有此室者抑亦云桒下一􅀫之意乎予甞以斯言質之師曰然遂為記歸耘軒記吾友徐君伯摳以兵後還無錫故里築室膠山署曰歸耘徵予文記之予甞質之曰而翁大中公為時名卿今逝矣州大夫亷君之才能也其家方薦之省府􅀅上聞以官之而暇耘其田乎伯摳􅀏而不答予退而思之君名父之子自早􅀊淑諸師友菑畬經訓垂二十年今以先世負郭之田莽為荆􅁄固不可不耕且耘也然亦奚忍舉此而廢彼耶必也帯經犁鉏斯可矣古之人􅀂耕莘者楽尭舜之道耕南陽者有梁父之唫故一旦以三聘三頋之而起非惟澤溉生民功施社稷焜燿當世而伊訓諸篇出師両表至今與日月争光是豈專于農者能之乎雖然芸田之事亦有治道存焉敢請與伯樞論之五榖猶良民也稂莠之属猶凶頑也草生而不芸則榖不榖矣芸之早則用力寡而功多小緩則小害大緩則大害既害而芸或百倍其力而不能盡去雖去之而榖巳罹其害矣吁草害于榖治田者過也凶頑之害良民治人者可逃其責乎惟沮溺荷蓧之流㓗身亂倫者不足以語此伯樞宜留意焉樞聞乃起而謝曰是吾志也請書之用誌于壁庶他日知􅀁警云東郭草堂記至正乙巳春友人徐君仲剛書来曰瑗性迂拙分甘退藏擇無錫東郭荒僻之地作草堂居之讀書灌園蝸休蟻適自謂有可楽者子知我能為我記之乎予唯仲剛卓犖之士也譬之楩抩豫章不巨室棟柱則山林而巳比甞佐令慈溪方欲抉吏弊更苛政以仁其民一旦以當路掣肘棄􅀂敝屣憣然来歸客吳下數年不入城府其􅈽負為何如哉兹草堂居寬閑之野前有鵝津可釣可㳺鴻山宛山屏列左右東膠西堠紫翠相接又皆􅈧户間天然􅀞圖也仲剛入則與書中聖賢相對出則與里中農圃為伍親友時至􅁯形爾汝腰不為督郵而折􅂰不為汾陽而屈適興賦詩徃徃有太白豪放􅀁謂有可楽者其以是欤雖然昔諸葛孔明居南陽亦蕭然草廬而巳及乎以三頋而出八陣有圗出師有表而勲業卓卓如是静學信不誣矣吁荒僻之居又安知非天假為學之地乎愚請以規仲剛併記斯堂之􅀊月云野人居記余聞之易其地則齊楚異音同其居則蘭􅇹俱化大㢤居乎故君子必慎其擇也予友吳中行今乃去朝市逺城郭挈家淞江之濵桒麻之野蕭然一室名野人居是果奚擇而取㢤昔中行以劔術逰諸侯借箸之籌幕中之辨嘗見用于當世豪傑矣未㡬以時之不利投􅆪来歸回視淮隂狗烹之嘆華亭鶴淚之悲銅山餓死之辱金塢然臍之禍未甞不愴然于懐其言曰窮居之安不愈于負且乗乎􅂼食之樂不優于覆公餗乎由是縮首閉門百念􅁅冷獨研精古聖賢醫薬之書以事其親以濟夫人暇日則携杖履徃来溪山間與岩穴吟嘯者㳺耕蓑釣笠友亦無間情真而不􅁁幅語朴而無貝錦滄洲濯足或坐終日茅簷曝背或談千古桃花流水之外杳不知其孰爲秦而孰爲晋也但知潭泉飲掬可以永親之年江鮮膾鱸可以羙親之饍􅀲疇芋區芝田藥圃皆其地􅀁有而名都大邑之􅀁無也􅀂中行亦可謂善擇其居矣予與中行有通家之好一日携兒子林過之用是爲乃翁壽中行嘉予言請以爲記因命林執筆以書其居之壁云雪洲記趙君執中蘇人也家笠澤之隂與天随子故里相望澱湖直其東陳湖横其南其墟落乃一洲渚耳君性喜雪凡􅀊寒雪作之日天地六合烱如氷壺三江五湖如璚匜盃而山林皆瑤草琪􅀣也然陽精掩耀湯泉欲氷􅁔黄竹而悲者在在有之時君獨傲兀吟嘯于滄洲之上或終日竟夕而􅁯歸焉葢一時清氣與虚室之白洞然無間故自謂平生慶快無踰此者乃即其􅀁居之處􅀁楽之事自號爲雪洲也予甞于夏日過之堦庭之間竹有蒼雪明􅆤净几寂無纎塵而大篇短章又皆與氷柱雪車同一光㓗且曰栁雪之春蘆雪之秋亦猶見似人而喜予于是知雪洲之楽葢無時而不自得也或曰以君之才宜其􅀙名王逰兎園而楽其遇出竒謀平蔡州而楽其功窮居野處何足快㢤吁昔子程子論顔子之楽非楽簞瓢陋巷也君之雪洲亦􅀋是欤但區區言髟耄不能揄􅀭姑述其㮣併以觧或人之嘲云竹梧書房記洪武辛􅕀予去家十有八年而歸搢紳故交多無噍􅀋獨友人秦公宜仲主貴池縣簿吿老于家予首訪之與客偕徃公􅀁居環堵之外皆焦墟灌莽乃題其室曰竹梧書房客因訝而問焉予曰嘻我知之矣公之先君子以多資弘第宅儲書􅁆千卷自蚤􅀊敎公為舉子業公研精伏生􅀁傳之書旁通百家文譽日著時子山陳先生未魁天下與公為􅁯形交甞與予過之其堦庭之間巨竹􅁆百雙梧玉立緑隂蒼雪清氣襲人而公之丰神瀟洒殆􅀂與竹梧俱化子山嘉之故有是扁夫髙垣大宅今瓦礫也碧格翠竹今枳􅁄也垂籖挿架之帙不為􅁅刼則市井之醤䝉矣惟腹笥之書幸而無恙故甞為郡博士以敎其邦人又推其緒餘佐治岩邑以嘉惠其黎首今老矣尚能為鳴待問之鐘以接逺方来用之士為文章則駸駸乎周誥殷盤而不聱牙也扁乃舊名葢不􅁯父兄師友淵源之懿也客既釋然公亦頷首出縑素請筆前語以吿後之不吾知者併以示諸子􅀂孫庶箕裘其業云是冬月建子日㡬望余則􅀛巣老人謝厶也映雪齋記毘陵何士信起家業儒儲書數百帙研精誦讀晝夜不息搒其室曰映雪葢慕孫康氏之苦學焉夫以士信之家居市㕓足資用㷊膏繼晷乃􅀁優爲齋居豈虚名㢤其心必曰我囱短檠猶雪之明我室棐几猶雪之瑩我讀我書夜氣以澄㣲言妙理披雲覩星頋我靈臺皦皦乎不雪而白不氷而清唾視籝金珍惜分隂曾不知九逵塵土之蓬勃四時寒燠之變更然則映雪二字又何異湯盤九字之銘欤彼㶚橋詩人梁園賦客有不可與同日語者惟篤志之士如㳺如楊立雪于當代程夫子之門者聞之必與其進矣士信謁余文請以是勵之蘿屋記毘陵郡城之西南距滆湖二十有餘里湖水支流北抵城而匯其地有髙原平林風篁烟􅀣景物瀟洒友人􅉟伯逺居之茨宇一區牽蘿􅀘葺扁曰蘿屋名固不虚葢亦以昭其儉耳然庭戸􅞔如日必洒掃木榻棐几室無纎塵平居則䔥然􅀌立以孔孟之書敎孫共讀異端邪説絶口不談彼流俗相煽而眩惑者弗接勝友時至撙爼欵洽或相與論端人貞士氣義風節終日竟夕亹亹不厭余甞過而問曰子豈掃除一室之小丈夫乎伯逺笑而不答予曰噫我知之矣伯逺通古今明物理視昔人之銅山金塢皆禍基也峻宇雕墻非安宅矣葢其􅀁喜者桒樞甕牗之羙而􅀁楽者簞瓢陋巷之天􅌂然為草廬布衣而耕南陽之田者其出處豈易與人言㢤雖使得志其不為髙堂九仞也必矣善􅀚人者慎母以蘿屋之儉而陋諸洪武十有二年􅀊在己未四月之吉謝厶記菊軒記古者逹􅀚之士寓物􅆘意􅀄未甞肆意于物也􅀂荘周􅀚魚支遁覌馬阮孚自䗶之􅄚嵇康桞下之鍜與夫愛竹愛松愛諸花卉者大率皆􅆘意而巳近世流俗以淵明愛菊亦􅀙而愛之􅀁植或百􅁆十株髙及㝷仞花大如盃假以花師接飬之工移易種􅀋使坤黄正色亦多變而失真其嬌紅韵白紫茜紺碧之属愈出愈竒且復以西子玉環等尤物之名名之是則誇多闘靡肆意以極玩好之娛視淵明何啻霄壤夫東籬之菊猶西山之􅅔薄言采之可以楽飢􅀂乃賦離騷而飡落英者其庶㡬乎韓圃晩香楽則楽矣然其趣有不可同日語者吁流俗之謬如前􅀁云豈不大可􅀏乎吾友王夀翁以菊軒徵予文予恐其玩好之意淪于汚俗両年不為措一辭今乃不然翁春秋七十有三凡早􅀊華靡之皆巳絶去軒墀藝菊僅一二本其言曰吾􅀁以愛此者嘉其于草木變衰之秋霜瓣露葉澹然幽芬挺挺特立乆而不墜殆與晚年矍鑠者有明􅆻焉故朝斯夕斯逍遥徜徉或開軒燕坐或置酒速客終日相對不厭不倦雖高風雅致不敢􅄭儗于陶其適意之楽亦無官之韓魏公也咄彼庸儒朋􅁋可憎安得疾􅁖如諸伯厚者相與勵剛風搏沆瀣周流八極為兹花一洗汚衊之辱過翁齋軒呼酒髙酌咏柴桒之詩􅁔離騷之章盡醉以適翁之適而吾亦得適其適也矢心陳詞用誌軒璧為後㑹張夲云斗室記自標枝巣穴之世逺宫室之制日新月盛世禄之家第有甲乙致習俗之侈而堂髙數仞墻屋錦繡者比比矣􅀂夫屈身矮屋之士徃徃以力􅀁不足不能有為其志未甞不焱然也惟吾可積則不然可積以吳越錢氏之裔贅延安唐侯之家徃來雲間築室采邑風山屏其前淞水􅁭帯其左右屋栽三楹高不過㝷丈以婦家封侯之貴采地之富雖連雲别墅咄嗟可成今􅀂此亦可謂不􅁋于富貴者欤吾􅀅以其細行􅀚之屡嵗過鄉里視故舊親戚抑抑乎謙謙乎執子弟禮不異乎童丱之日無一豪放矜肆之態以加于人故咸謂有先君子好禮之遺風然則斗室之儉本乎天性非矯飾一時以要譽而為之也昔衛公子荆善居室完曰苟完美曰苟羙故孔子􅁛之􅀂可積之儉而約于衞荆其庶㡬乎吾用是以稱可積而延安家法之足稱亦可見矣是為記思齋記膠東賈文學鈞慶典敎毘陵郡以燕處之室榜思齋徵予文記之且曰厶􅀁思者非謂能三思而行亦非敢以九思之訓待旦之意示警如書紳也思吾親于疇昔䘮亂之秋相繼即世母蕞昌邑父堲萊縣㡬致蕪没幸而茅冦殄滅歸室祖茔大明開天拔擢寒畯代耕有禄而飬弗及親矣風木之憾十有餘年去鄉土㡬千餘里霜露降濡悲感交集念􅁒洒飯松丘使吾親不為􅀂敖氏之􅀑栖息桒梓以終餘年此朝夕耿耿于懐也予曰嘻逰子悲故鄉信矣况思親乎然君子之思其親者豈止是㢤烏雏返哺豺􅆩報本特一事耳必也出言舉足動合矩度不􅁯其親詩禮之訓聼于無聲思無邪以正其心􅌂􅀂思以敬其遺體由是而推其緒餘以淑諸人以施諸行事忠君報􅀦流芳汗青以􅂋榮其親夫然後息負荷之肩觧組綬之縛訪親戚省墳墓某水某丘凡吾親平生􅀁釣㳺處吾得釣而㳺焉鶡冠鳩杖􅈽子弄孫以安享太平田野之楽則今日之􅀁思者豈不熊魚棄得乎區區耄言筆諸齋壁庶或紓其懐􅈽云白雲亭記東漢趙邠卿壽藏之作吾意其涉艱危􅀅以得全歸為喜故耳故至唐司􅆰表聖乃預為壙槨時與客觴咏其中又作休休亭以寓超然物外之意史稱曠逹不誣矣今吾友唐公均舉由元末致仕佚老于家洪武革命䝉天憗遺以􅃓裘無嗣業者命其兄之子允明為後家事鉅細悉付託之即在家為有髮僧􅂙釋門諸老以學其學春秋八十有九號曰白雲翁距舍南百餘歩廼為佳城旁結茅龕晝夜禅寐允明則日候起居奉甘軟如事􅀁生且能承順其志築亭于前復鑿池以蓺蓮芡之属幽花秀竹與塚上之木参錯相映每邀致親之􅀁愛盍簮于亭薫爐茗盌殽核樽爼厶負米四方徃徃望白雲思親有如昔人之言者雖歸侍傍雲常在目請先生為我記之時坐客有辨之者曰吾聞薬山禅師以雪之在天為西來祖意今雲翁禅眼之明必有悟乎禅悟之語非允明名亭之意亦非儒紳先生􅀁知也予曰不然夫英英之雲一也其􅀁􅀚感各有不同雲翁葢視身如雲浮太􅆰藐焉斯湏猶瞿曇氏電露之喻也􅀂夫允明望親舍之雲而懸懸者是則以梁公之心為心家居以壟雲自怡庸詎知非華陽真逸之心乎吁仁見為仁智見為智予􅀁知者此理而巳禅則吾不知也客笑而不言予曰如何翁曰唯允明亦曰唯唯是為記養正齋記徃余客東吳十有餘年聞儒林旦評以琴川髙彦和氏稱為儒士聲甚藉藉余雖未相識而相慕焉洪武辛酉秋友人􅀭純夫尤􅁛異之且言彦和以飬正名齋葢取諸䝉卦之辭猥徵予言屡辭弗􅀗予曰大㢤易也豈敢以管窺之見以贅疣乎請以古之善飬正者為彦和誦之如孟母三􅁶使其子去丘墓市㕓為不逰之地習禮容爼豆于嬉戯之間如室于蘭乆而俱化厥後以寡欲飬心以直養氣傳正學而接跡子思闢異端而並功于禹是母是子非善養者能如是乎衛武公行年九十有五抑戒之作既自箴警且求卿大夫官師之属交相敎戒瞽矇禆讃朝夕弗違言行之純㒺有圭玷亦豈非善飬者乎是故一為亞聖一為睿聖易之􅀁謂聖功者不誣矣吁人生天地間而􅀁受之中夲無頗僻惟情竇既開牽于物􅁒日浸月漬或正或否遂乃有君子小人之分苟得其飬則如木􅀙䋲其正􅀂自然矣今彦和之為端士也䝉飬之功不言可知繼自今以徃學與日積道随年長佩服乎七篇之書涵飬乎大雅之章毋曲學毋枉道毋有􅀗而詭偽慎終如始益進益修如此則希孟而孟希武而武何止如旦評而巳㢤區區言耄而瞽幸純夫為我謝之重建雲居菴記洪武十有六年春雲居菴主僧徳傳過予曰宋咸淳間四世祖諱行興號祖庭來自天目山駐錫爵林露坐説法風動一方緇素與檀施坌集遂結菴以處之名曰雲居由宋而元祖年九十有二終于至正乙酉其嗣法子弟曰慧滿繼之四年而殁曰道卭以甲乙傳及尤宋菴燬于兵慧滿避兵他適不知􅀁之而徳傳念祖師過化之地義不忍捨去大明更化􅀄頼吾佛之道與時偕行于是剪荆榛畚瓦䃯復經始营之距爵林百餘里歩得里人湯逹卿故基以廣其居今苟完矣請先生之筆以誌之前此予甞過横山之隂憇足于菴􅀚夫􅀁築之室凡二十餘楹堂有佛像設供具鐘皷列焉僧有室經案禅榻香燈偹焉餘如齋厨井湢之属㒺有不偹其地近山而爽塏逺城郭而幽閴晨嵐夕霏􅆰翠洒􅑵戸間無囂塵市聲滓人耳目傳公日掩関趺坐泊如也吁是雖蕞尔一區如抱茅葢頭然視佛之􅀁謂桒下一􅀫者亦巳多矣彼名山巨刹膏􅃾以萬計尸素之士或不􅀎及􅀂傳公者服勤如此􅈕搆如此䋲祖武又如此豈非浮圗子孫之象賢者欤予故聼其􅀁謂併以目見之實三嘆而書之是􅀊夏六月之望同郡􅀛巣老人謝某撰歸耕記予老廢筆硯授之子子以拙辭躬稼又弗克服勤方諄諄朂之以周公無逸之訓潞城曺徳聲書來曰震徃者避兵東吳顚沛萬状還鄊以来田舍粗葺筆歸耕二字掲諸座隅示不􅁯也惟巣翁姻婭而相知敢請識其顛末以垂警其後人予曰嘻前元時徳聲曽大父為晋陵閭右大父起家登仕版厯官至東平路同知殁後數年而徳聲失怙丁時多艱家用蕩析蔑有能相頋者藐焉依母氏笠澤之濵狼烟滿眼矢石塞路窮途之困甚于蒺藜杳不知先業失墜為何如也大明更化􅀄竭蹶而趋偕女家弟之家還故里荷蓑笠操耒耜薙荆􅁄之區犁之剷瓦䃯之􅂣屋之載搆載穫料理而恢拓之烝甞之奉滫􅔱之供征徭賦税之􅀁需㒺有不給且能割膏􅃾以寕二兄之歸斷雁復得以成行㳺魚不失其同隊東阡西陌雞鳴狗吠桒梓敬共是皆如其素願也然則患難之餘歸耕有如此者豈易得㢤􅀂曰其歸也非衣錦之榮休官之適其耕也非能以尭舜之楽于􅅵畝葢以前賢論之衆人可同日語乎如徳聲者先世之業失而復得骨肉之親散而復聚况時和􅀊豊率土寕謐凡我同􅀋皆得耕田鑿井􅂬然爲太平之民其楽雖異于古人未爲無􅀁楽也吁以其艱難勤苦十有餘年而後得此後之人㒺有攸知寕無怠荒乎此記之􅀁以作也頋予言耄請復以語吾兒者語之夫周公聖人也無逸一書為世􅀛鑑苟知之則當尊其􅀁聞俛焉孜孜以繼以述以纉承其先緒詩曰子子孫孫勿替引之吾于此亦云書屋記洪武壬戌秋崑山故交辛斌甫過􅀛巣為其友􅃽生秉􅃔請書屋記且曰生自齠齓時嗜學雖祈寒大暑矻矻不少廢年十五父命學吏事閲數月不懌而歸旣而令服賈走淮浙南北數千里亦常以簡策自随少暇輒誦讀之竟不屑㒺市利以肥其家遂令力穡為仰事俯育計秉􅃔乃􅀙親之令蓑笠緇撮以事其事三餘之日愈進厥功老夫以未甞靣其人目其居難乎架􅆰鑿虚而為之文也明年夏五予舟過婁江斌甫與生郊迓而過之􅀁謂書屋者􅀄無垂籖萬軸也亦非連雲大宅也四書六經外諸古圖史與陶弘毛頴列乎其間與之語粲然有文意吾常林鋤經董君南之朝耕夜讀亦如是而巳矣揚子曰晞􅂹之馬亦􅂹之乗使生􅀁造愈􅅧進愈力則􅀁就未易量也然則生能承順其親且不卑屈其志謂非能子可乎􅀁居在崑山城西九里橋之南其江山景物無関于書屋者不書特以其心跡之寔書之用為記時洪武十六年五月二十八日逸菴記夫人莫不欲四體之逸也惟君子則逸其心故甞操而存之寡慾以養之秉􅃔之天一真無偽感而通之動㒺不吉周書曰作徳心逸日休君子取之故能逸其心也今河南彭公伯常爲武進令自號逸菴夫􅀁謂逸者心逸之謂欤常人言之州縣之職其勞甚矣頋兹巨邑事如絲棼雖戴星出入猶恐不逮何能逸乎予曰不然公以夙學老成之才爲之征科撫字㤙威並行雀角䑕牙曲直能辨如庖丁觧牛如其肯綮牛雖多而􅉭刄不頓也矧夫至公之心烱如秦鏡且不以塵土蔽媸妍􅀁照随物應之是則吾心之逸葢自􅀂也雖在官舍視為逸菴不亦可乎一旦朝家以七十之年優容里居則吾心之逸與肢體之逸熊魚兼得矣雖然古之逸民􅀂夷惠之儔髙風峻節為世師表吁吾知逸菴之逸必如是而後巳焉持敬齋記前軰以齋居之名著稱者多矣其最著者曰誠齋簡齋容齋又有以先正箴銘而傳者曰敬齋求放心齋是也其後一變曰䟽曰酸曰松雪者紛紛然人争效之齋之義逺矣今贛之聶伯䕫氏以持敬名齋需言于愚愚固辭不􅀗乃言曰聖人筆六經以照萬世敬之一字層見叠出先儒詳之矣愚復何言窃􅀚􅀁謂持者意在執持而用之言人之持物猶吾之持敬也持物以手持敬以心苟不致謹則亦莫之能用也譬之射者必謹于持弓矢而後不失于中御者必謹于持轡而後不失其馳又如執玉捧盈必洞洞属属然如弗勝如􅀅失之然後能勝而弗失也伯䕫向逰成均持此敬以進徳脩業故學優而仕宰髙平持此敬以治其民而民有去思焉迩來為諸侯幕賔翼翼乎以参賛承宣為務謹三尺御羣吏以􅊩四邑是皆持此敬以展其用厯兹以徃百司皆然有官守則持此以共其職有言責則持此以盡其忠峩冠冕鳴佩玉鵉臺鳳閣筵羽鵷鷺無非持此心之敬而用之其用有不能盡者敬乎敬乎亦豈非一言而可以終身行之者乎夫如是則上不負天子下不負􅀁學齋名著稱亦卓然如昔人矣雖然宦成而怠世固有之惟君子慎終如始有不為其怠者衛武公春秋九十有五官為周司徒方且􅂯三以敬慎為詩日夜警戒故卒能為睿聖武公愚不敏敢請獻此詩為持敬慎終之助洪武十七年嵗在甲子三月二十六日恬􅌿齋記為髙彦述作昔有與彦述同姓字君素者以頥軒涪翁賦詩其畧曰辱莫辱多􅁒楽莫楽無求㫖㢤斯言真可為恬􅌿齋座右銘也葢多􅁒則不能恬静必辱其身無求則􅌿泊自足楽于其心由是知孔顔之楽非楽乎􅂼水曲肱簞瓢陋巷而蔗境之佳可漸入而得矣夫彦述先君子以醫名家獨歩鄉國流風遺俗今豈無之十餘年来乃能與時浮沉不競不躁不貪不墨舊家習氣掃除净盡故齋居之室題曰恬澹葢取諸内經飬生之要旁􅂙荘老而有得焉至如諸子百家之書亦多渉獵然文藻不露不求人知城居如子真谷口賣藥君平賣卜􅄕常晝垂門或早閉衣布素􅀂紈綺茹粗糲􅀂膏梁由其氣質之清資以學力故恬淡有過人者每謂人曰人生固不能無􅁒也多􅁒奚為彼銅山鑄錢郿塢積金一姬傾斛珠萬馬如錦繍凡如此􅀋孰不賈禍當時遺􅆨後世乎言之必撫掌大􅀏傾倒而後巳吁黄太史九原可作二髙當有抑􅀭老夫贅言亦庶乎奨􅂆之助云芸室記予耄無能為也乆矣嶄然骨立百念􅁅冷獨嗜學好友之心猶未能􅁯前元故交淪没殆盡每每見後生少年能讀書通古今識道理且不為異端邪説􅀁惑則愛之重之同郡為􅁯年友者凡􅁆人其一伯禮也洪武戊辰秋伯禮書来曰厶居鄉城環堵一室有古聖賢經傳及古醫書􅀂干卷日用涉獵間以芸香辟蠧庋諸室中顔曰芸室望先生有以警之書􅂯至義不容辭矧予數相徃来知其室無節棁之華無丹碧之飾無屏罳帷幄為􅀚羙之資宴安之具闤中有山林清致木榻業几圖籍左右熏爐短檠陶弘毛穎之属晝夜為伍孜孜厥修嘗謂人曰吾為醫家方技可以寓吾心之仁以濟夫人故先之非以儒為迂而後之也吁伯礼言此其知道乎然九流百家莫大于儒儒之道莫大于仁伯礼知醫薬之方或未知仁之方傳曰已立立人已逹逹人仁之方也尼山大聖葢得夫唐虞三代之傳傳之萬世以康濟斯民非金匱石室之方可同年而語者請以是筆諸芸室藴諸身施諸人則吾心之仁不可勝用醫儒之道􅀁謂並行而不相背者信矣是爲記重建清㣲􅀚記夫師教之恩報同君親葢礼之重者見于經昭昭也然道徳五千言此非􅀁先苟師道之不隆則道徳亦不能有傳矣今清㣲􅀚主周鍊師石泉勤而行之是能黙契禮經而獨超乎其􅀋也洪武己巳春石泉書來謂予曰厶追懐先師歸復故業丐先生為文識之予嘉其能而不却也抑甞過丹陽聞諸鄉老之言其報師之恩藹然可見􅀄邑人諸􅁑徳齋隐居學道佩天師符命剏此􅀚為修鍊之􅀁旣而羽化寔為開山之鼻祖也弟子裴静山䓁住持以甲乙傳元末􅀚燬衆亦飄散或存或亾洪武改元其徒朱竹軒言還結茅而居未㡬而終時石泉住丹徒紫府􅀚聞師訃即謝事而歸葬之志在復業揄􅀭道法風動一方向化者咸楽施以相之諸􅁑氏母子其尤也于是剪荆榛畚瓦䃯鳩工度材辛勤十有餘年作三清殿前闢山門旁翼両廡祖祠經室丹房齋厨之属凡􅀂干楹穹林竹􅀣蔚然屏蔽輪奐之光焜煌乎䝉城故區度亭遺跡長塘之煙水湖光北固之雲霞山色亦皆映帯為清㣲勝㮣矣吁凡為人後者有能繼述如此豈不為賢子孫乎近世逢掖之士學必有師禮宜報効未甞彷彿如此者也予因記其事之顛末􅅧用感慨併書此為世之􅂆云栖雲軒記雲之為物聚散不常其聚也由膚寸之㣲至于彌六合雨天下其散也則斯湏無踪人莫能測况能與之栖遲乎惟英英而白悠悠而閑者方外之士相羊似之每寓言而髙尚之意云耳常郡玄妙􅀚荘厶以寕栖雲有軒意葢如此夫以寕師老􅅨其學以清净為宗青山白雲澹然幽棲固其宜也然􅅨在周室柱史有年青牛出関然後著書五千言以明其道亦未甞絶人物斯世而爲髙尚焉後之善學者如陶貞白于齊梁之間挂冠都門怡雲句曲􅀂􅀅終身焉及乎以大任寄之固辭而不可得遂乃坐山中如廟堂之上茹茯苓如鐘􅂦之食人到于今􅁛之不失爲華陽真逸也矧吾以寕有琴而能作松風之詩聲有詩可以賦怡雲之情是則陶之􅀁楽皆爲吾有山林朝市或䖏或出何徃非栖雲之地哉吁由周而來寥寥二千餘年􅀁謂隐居以求其志行義以逹其道者竟無其人是可嘆也􅀂夫華山之陳一枕白雲三徴不起此又不可同日語矣以寕徵予文特書此以識􅀊月併以偹従善之择云聼雪軒記夫雪聲之㣲􅀂有􅀂無聼之者必方寸之間一無􅀁擾而耳之聼不為物奪然後可得而聞也同郡馬用和居市㕓以陶􅀝為伍絲竹車馬之喧晝夜不息聼雪有軒豈虚語乎洪武􅀄予甞忝為東家丘知其為馬氏之良别来十餘年説者謂用和讀書養親習與志長超然出羣遇􅀊晩同雲集霰而霏霏之雪繼之用和侍親庭幃言此為豊年之瑞以怡其親奉壽觴如金帳羊羔舞斑衣如仙人鶴氅以春䖝撲􅆤之聲為金石之鳴舉家之人同得以楽其楽也既退獨處軒居萬􅄜俱寂乃想像撤塩飛絮聼于無聲不啻􅀂鈞天廣楽九奏而有遺音􅀁楽有未易語諸人者其心必曰蘇子卿十九年牧羝沙漠李元直夜半撃鵝襲蔡梁園之賦客揮毫㶚橋之詩人覔句皆安知雪之有聲如此其楽㢤用和需予文請以是相知之言誌諸軒壁異日以黄金鑄我為鍾期吾亦無愧焉爾􅀲田記農皇古神聖以人道急于養生是故作耒耜敎之粒食又為之醫薬以濟其夭閼而本草之書出焉旣而軒岐問答靈樞素問與本草並行為醫家之大經大法也崑山卲濟民氏家傳是書􅅧究厥㫖為醫巨擘迨元末年業􅈥于兵慕古之同姓種􅀲東陵于是即􅀁居淞滸糞于􅀲田戴笠而鋤抱甕而灌綿綿唪唪之􅚩如周雅􅀁稱以之養親可以充一味之甘以之留客可以侑一茶之欵其蒂為苦口良薬可與参苓薑桂並用以活人濟民嘉之因以􅀲田自號朝于斯夕于斯寓幽興于斯非矜乎東陵華胄也方今盛時遇􅀲田而納􅂂者無之或為古之人有白兎御史殆􅀂戯言無足患者其楽為何如哉予甞避地東吳濟民乆交乃不以三百廿里為逺九十六􅀊為耄致書求文􅂯四益勤予辭不􅀗遂以昔􅀁見而知者筆之是為記習静軒記洪武丙寅冬前知武進縣太原舒公之孫文允書來曰厶家居僻小軒讀書强名習静用唐人詩中語也丐先生為余識之書凡四至不容以言耄辭乃謂之曰人生而静天賦之性感物而動情之􅁒也性至㣲故學者必有以養之然後不為物􅁒􅀁汨習静之意必有見于此欤夫以文允之英姿壮年學優而仕動而有為取青紫如拾地芥今乃韜聲光歛踪跡負米飬親之外足不入城府影不出户庭目不眩邪色耳不汚鄭聲膏梁綺繡不適乎口體罄室隘巷門可羅雀澹然而資于外者如此廓乎虚􅁭寂乎靈䑓幽探乎經史之奥涵泳義理之􅃾出入乎諸子百家而無他岐之惑焉其恬然飬乎中者又如此可謂得習静之方矣昔濓溪翁主静之學程伯子以親炙而得之其平居終日坐如泥塑及其動與物接則一􅇛和氣穆如春風視世之以槁木死􅁅為静者逈不侔矣愚聞周程之學葢黙契夫大學定静之㫖以相傳使文允以周程為法而學焉則習與性成二賢同歸豈特如摩詰之語而巳哉予不佞故卒以是告之時洪武二十年四月之吉同郡􅀛巣老人撰􅀛巢藁卷之十五終
