front:
  text: 􅀛巢藁􅃃之五
  hash: sha256:a8f467aa8d3e061155350cb986e0e8c24662165b7f1e24152c1323348ca66c43
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0561_SBCK_005-1a}
body:
  text: 詩贈邵濟民曲塘地僊居洗藥溪水香青衣両童子玉杵搗玄霜玄霜搗来奉髙堂老親食之夀而康天生便便貯書腹金匱石函書爛熟東南海上多名石石中采藥騎青鹿歸来濯足婁江水對坐青山隐烏几嚢探藥物不論錢但欲使人無病耳有時弹琴鳶鳳音有時拔筆長短吟紛紛䑛痔吮癰者從教别屋堆黄金聞雲門張先生以慈烏軒焦尾居名文集賦二詩以贈慈烏曲九韵慈烏乳衆雛雛大羽翼成翩翩出巢飛啞啞繞林鳴得食不自飽歸以飤􅀁生紛然同類中有此骨肉情余昔飬親日瞻烏常自懲白首重相見愛之雙眼青匪謂得􅀁止丈人屋峥嶸爲時梟獍多見烏如閔曽王孫金弹丸慎勿令畏驚焦桐曲九韵焦桐製孤琴舉世􅁛異材徃非蔡中郎竟作㸑下􅁅七絃繫朱絲徽金軫瓊瑶知音􅆘相遇携上髙髙臺一弹金陵散絶響有餘哀筝琶沸新聲瓦釡亦雷鳴天機妙循環復見㤗宇開爾桐朱鳳吟靈風揚九垓吾今洗吾耳盤石坐莓苔芝秀軒詩一首猗與名門夙稱五常遥遥耳孫厥徳復昌於粲爾子文藻有光如彼朱草曄曄其英自天降祥奕葉流芳匪曰三秀仙人之粮林􅊤爾居奇芬逺揚雍公之扁金薤琳琅於昭彼蒼福善孔彰俾爾耆艾家有餘慶維来維仍永言弗􅁯結茅東郭􅀊晚言懐八首行盡難行路歸来父母􅀖溪山閒杖􅂂花竹小軒􅑵敎子知一二抱孫成兩雙有時城府去􅅧媿鹿門龎其二齷齪􅀛巢老蕭條鶴髪秋過眉桃竹杖方領木棉裘􅀘世慚無術通家憶舊逰幸然雙白鳥能與共滄洲其三净掃蕭齋地書床一舊氊談經雞亦觧迎客犬常先流水柴門外横山甕牖前春秋垂八十食粥了餘年其四季子躬耕地寥寥禮讓風度遼歸老鶴遵渚集飛鴻土姓多相雜鄉音舊不同獨憐東郭外劍井氣如虹其五官塘人似蟻環堵室如蝸白髪三千丈清貧第一家地爐寒撥火雪水夜煎茶好客知誰至青燈結細花其六過客應相笑巢翁未得閑酒經方􅀘註詩稿又重删藜杖家家竹藍輿䖏䖏山􅂾朝天色冷髙卧掩柴関其七故國歸来晚􅀌城草木寒親朋皆􅀑籙鄉里少儒冠冩琰金鍾失沉沙鉄㦸殘譙門斜照􅂻時為一辛酸其八臘月無多日春風又一年儘添頭上雪􅂓􅆘瓮中天彩筆題氷柱青衣送酒船晚来賓客散清興更悠然和陳貳令逰善權洞我昔陽羡逰春山聼茶􅁔别来三十載重逰竟蹉跎憑髙每望碧湖外羣􅄘玉立青嵯峨善権山水最佳䖏我公去知清興多来時風景溢吾目不用登臨勞吾足有聲之画勝丹青曲盡物情人嘆服天開地闢羲皇前神工為誰開洞天爾来一萬八千􅀊金堂玉室居羣仙飛車鵉寉乆不見春去秋来只鴻雁青山前度汚狼烟從此四郊荆棘遍洞前玉氣金㳽漫仙家應作瑶池􅀚層巔巨石􅀔欲堕過者為之心胆寒翩翩石燕粘翠壁飛来若與人相識馬如龍車如水尋常貴逰無足􅂾以分清致似名緇一代風流􅁇支許樂哉山水三日逰􅁯却世間千種愁昔人名句題玉柱今公健筆留銀鈎寄言武陵人桃源兹可求丹沙多與鍾乳雜瑶草不知蒲桞秋長橋無饞蛟南山無猛虎在䖏可観逰政湏人好古漓墨鉛碑􅂐亦奇絶似岐山石為鼓竹姑子年年春山僧煮玉邀甞新哦松暇日肯同去作詩更為山傳神鄉飲酒詩十四韵皇帝即位之五年􅀊在壬子詔天下行鄊飲酒禮明年癸丑正月上日常州府太守孫公率僚属行之儀物品節不約不侈省部主事宋公實在賔位僎介耆客凡二十七人執事者位之其登升揖譲盥洗献酢靡不如榘時某七十有七亦得以布衣厠諸賢士大夫之列葢有不勝其喜幸者率爾口占以紀盛集云一統乾坤大羣生雨露新君王能建極風俗易還淳鄉飲稽蒼籙天書降紫宸諸侯遵令典嘉讌展良辰黌舍簮纓集珍羞爼豆陳主賔儀秩秩介僎色津津椒頌三陽日芹香泮水春工􅁔聲律古揚觶献酬頻聖澤沾羣品仁風播八垠賜䀯無足比置宴豈能倫老我溝中斷諸公席上珍叨陪聆讀法喜􅀗坐連茵引領瞻西日傾心拱北辰知恩無以報三祝效封人謝董明府惠炭范叔寒多正不禁烏薪重惠比烏金賖來脱粟􅋉煮飯留得焦桐好製琴環堵一龕春盎盎䴡譙三鼓夜沉沉硯池雲起龍香暖冩我梅花鉄石心雨中懐秦主簿東門之東西市西人家屋頭竹雞啼新年十日九風雨二老㡬時堪杖藜懐儲教授鎬京春宴醉簮花歩出都門駕小車七里八岡山店夜一氊風雨宿誰家次韵言懐八首親朋淪落盡故􅀦似他􅀖矮柱􅀛頭舍踈􅎉蚌殻􅣘鵲聲簷外喜鵉影鏡中雙兒女俱婚嫁迯禅笑老龎其二江海飄零客烟塵二十秋逝將諸犬子㱕老此莵裘夜雪圍爐坐春風秉燭逰樵漁時共醉何異宴瀛洲其三老我􅀛藏六無毛可作氊裁詩閑未得强酒醉當先茅宇城闉外梅花臘日前幸逢賢郡守鄊飲禮髙年其四短日經南陸嚴寒鼓朔風遍懐知己友長覔寄書鴻世態今如此人心古不同青天如可問飛歩躡長虹其五風冷柴門閑齋居縮如蝸小橋平陸里識字老農家野飯常留客春醪頗勝茶早梅溪上折斜挿胆瓶花其六貧居家事少客去跛奚閑茅屋牽蘿􅀘蘭堦擇草删雪添南浦水雲暗北􅑵山孰謂寒如許雞鳴客度関其七自分馮唐老誰憐范叔寒婆娑鳩在杖蕭散鶡為冠夢筆才華减談經喘息殘昨来初度日淚落酒盃酸其八神仙無足信何藥可延年素行多違俗丹心不愧天座有談笑客門泊徃来舡吟雪誰相似㐮陽孟浩然送秦宜仲主簿之京丈夫不洒離别淚盃酒􅂓發玲瓏歌黄楊閏餘􅀊已乆紅杏日邉春正多子瞻手携鉄拄杖太白足上金鑾坡鳳臺佳境必重賦千萬寄詩来薜蘿送主上人兵後尋叔歸臨江侍養十八韵青年未焚紫羅嚢竹林之逰鵷鳳翔一旦身為苾芻草半間屋住菩提塲安知兵甲滿天地遂令叔侄成参商桒田既变家亦毁蒲􅋰欲織親俱亾某丘某水搃淪􅃿曰祖曰禰誰烝嘗象龍駕法力雖猛豺􅆩報本情難􅁯崎嶇行脚求從父􅇻勤稽首祈空王䕶身符出虎牢險忍辱鎧染狼烟黄長洲茂􅁐乆争􅀾殘山剰水方凄凉相逢不覺開口笑此喜自得安心方行人嗟嘆擁長道􅀞鷁送􅀅歸故鄉􅀌雲飛䖏是玉笥把茅葢頭猶錦堂蒲羞可助潢潦薦木瓢共飲曺溪香愚観諸公􅀤􅁔咏力為吾道扶綱常惜㢤僧中有此郎疇能為爾加冠裳於乎疇能為爾加冠裳次韵􅀽仲徵見寄併自述二首城隂山作讀書堆書画船從海上回春水泮池芹小摘秋風老圃菊重栽明時正用凌雲筆清夜還傾酬月盃百里相􅁯両相憶詩筒好寄便鴻来才華减盡姓名低頼有綸竿釣碧溪衰髩㡬經蓬綴雪関心一􅀧絮沾泥江山有助詩頻賦朋舊相過酒共携金斗城東二三里道傍茅舍似雞栖借韵寄􅃽以忠江上羣山翠作堆江雲與客共低回黄楊閏後餘無厄丹桂天髙孰為栽飽喫河豚肥似乳醉看江水小如盃延陵祠墓春申巷我亦挐舟訪古来借韵寄劉小齋白練裙輕㡌屋低緑隂庭戸瞰清溪詞章落筆如翻水􅂐籀藏鋒若印泥一昨論交心共許㡬重飛夢手重携絶憐鳳穴生雏好已向朝陽碧樹栖謝許克敬六月惠炭去年臘月人凍死我亦中夜眠不起家僮赤脚令采樵日暮歸来堕雙指德㢤故人憐我貧于今暑月遺烏薪藥爐喜得文武火茶鐺爛煮搶旗春禦寒有偹心胆壮故態盡除寒乞相山􅆰􅀊晚雪復来平地不妨􅅧一丈烏薪􅀬成霞熖紅藜床坐我􅀛巢翁􅁅中芋栗薦村酒凍梨面作桃花容齊奴㸑蠟自奢侈野人炙背無足比融融之樂度殘年重賦新詩謝知己病中䝉董知縣陳縣丞尹主簿枉頋且有白粲􅀲酒之惠旣而病愈賦此以謝鳬舄飛来野老家同僚先後佩飛霞共憐敗絮多生蝨為問疑盃或飲蛇月俸分􅀅官廪粟朋樽兼餉早秋􅀲相如四壁光生彩試握霜毫答􅃂嘉常郡泮宫詩猗昔廟學悉燬于兵我侯作之聿觀厥成巍巍素王羣賢􅌂如侯殿侯廡豆籩于􅀁師生有廬􅊰道在堂飲社讀法有程有章我侯戾止若網而綱嘉乃進修戒毋怠荒宫墻匪髙丹堊非侈道㳽六合聖有遺軌侯揚天休嘉惠士子儒風還淳庶見麟趾武邑新學詩邑有孔廟棟橈欲堕舊亦有學􅊜漏且庳唯邑長貳撤而新之清廟奕奕門廡堦墀聖賢明靈陟降在兹黌宇言言齋有書詩師友􅊰貫朝斯夕斯射則有圃書或臨池帷林杏壇古音朱絃頋諟廟學治化之基帝澤育莪比迹蒼姬絃􅁔武城異世同規雜詩積隂當玄冬生生已機息陽孳僅毫髪梅花獨先得若人玩化机于此已􅅧識攀條摘玉蕊吟玩意莫測誰復見天心􅀁慮羣隂逼閉門夫何如君子政􅅥夕㷀㷀保飬間由兹見天徳山雲忽低徊四郊分白両老農荷鉏歸播榖桒間語相勧一何勤一鳴􅂯三俛老翁感禽意豈惮東作苦嘉榖已涵活尚待明日煦小兒未觧事大兒逺服賈農噐已可敶鋤耰在梁梠入室唯老妻出汲撫􅑥甒凛秋氣忽㣲徂暑已云􅉨黄花異凡木􅀁植本因壌稜稜青霜間誰復見俛仰肅殺一氣中鋭氣出其上强梁固可人傲德毋日長志士想丘􅊤老􅂹厭道長歸来已低徊但覺青山好至樂在天倫不必事華藻交歓能㡬何及今已衰老至老無修行善類日以踈生知愧古人晏安夫何如羣䖏不念徳草草復離居春逰有餘興雜花滿郊墟網􅅈不能操􅆰羡淵中魚青陽既開動草木方敷荣積雪忽如此豈不害含生大化無停機生生寕有已人心偶自徂豈不害天理援琹一鼓之坐致粗􅁾除吾分一天地積隂夫何如二月二日漫興東風吹散社公雨紅白花開爛錦雲時俗喜逢迎富日老夫羞作送窮文裌衣試着寒猶怯拄杖歸来酒半醺為問驛橋楊栁樹送人多少去從軍送安上人歸馬跡山挿竹山中偶出逰折蘆濠上即歸休踞床獅子聲方吼踣鉄龍駒迹尚留花雨六時紛似雪松風五月冷于秋客来認得南泉斧七十二峯應􅀧頭禱雨三首黄梅落盡雨愆期太守憂農日皺眉滂沛一朝随五馬四更三􅀧謁叢祠乞雨歸来雨滿天朝衣兩䄂帯香烟緑蓑青笠人如畵多稼亭中看力田一寸丹􅇆徹彼蒼不勞方士篆符章田家雨足豊年瑞官舍風清化日長寄京口俞伯鎮兼簡江教授飛雲妙墨来前日聼雨髙軒憶妙年杜曲桑麻幾家在韋賢父子一經傳杖藜欲去尋黄寉裹茗相携看杜鵑竹樹楼臺江揔宅想應新築大江邉夀董明府臨汝佳山水鍾英賦厥初身為百里宰腹有五車書見客無官况休衙只獨居夀眉揚喜色􅀲代拜新除次韵答性天之長老道人踞猊床眼明如趙州每言西来意爰及東家丘白首林泉交清風江海秋法幢扶未起法皷鳴未休本来無住着􅂓尔小淹留鹿眠荒􅁐内烏啼古城頭大道自坦夷高堂豈伊憂他山石可礪直木枝有樛巴蛇或吞象鼷䑕能食牛頼有佛目明洞見􅀑窟幽萬語歸一􅀧坐㫁聞思修病中即事二首何物青蠅滓玉壺掣韝飢鶻攫鵷鶵病軀痛作雷鳴腹垢靣愁添雪滿􅂡欹枕卧看殘菊在下床呼取短笻扶客来與説塞翁馬笑指蒼天慰老夫天方老我心如鉄誰謂讒人口鑠金覆轍始知行路險移家此去入山􅅧瓶無儲粟還沽酒㸑有焦桐莫製琹且喜日来聾両耳從教蚯蚓作龍吟九月􅃋䝉周彦美詹伯逺蘇性可携酒餚過城東草廬時余徃潞城田舍次日賦此以謝老夫一棹尋醫去佳客三人載酒過破屋茅飛烏豈好衡門木落雀堪羅交情自古陳雷少世態如今􅀑蜮多醉㡌簮花開口􅀏尚湏秋曉過西河示子憶年二九􅀊之吉朝賁闖門􅔕馬匹栢府遄歸鶚書出烏雛恋母情􅀁鍾歛翮不附髙飛鴻屡閲星霜怨樹風帯經犁鉏賫壮志欲迩青雲竟顛躓羞與腐草枯木比東家借燈夜繼日著書泚我潜夫筆􅂾載兀如僧縛律書成兩鬂秋蓬飛出門復遇鍾子期麟膠為續焦桐絲旁􅀚方􅀏鮎上竹吳下風塵驚滿目焦隍夢成俄失鹿蒼姬訖籙寳􅂦移血流四海誅鯨鯢小魚漏網亦㡬希全家幸爾㱕鄉土欲學龎公逺城府􅇧肉􅇜逢射􅃓弩卧痾兩月悟前非白生虚室春熈熈茹荼味亦甘如飴朝来起坐沐且櫛炙背茅簷抱雙􅂰七十八年􅂓紀述懐吳中行老我平生頗閲人唯公知已絶無倫别来夢􅂻常論舊只説閑中莫厭貧湖海氣豪心似鉄庭幃親老鬂如銀遥憐􅀊晚家居好魚躍氷池入饌新寄熊元修佳兒發軔之官去名父居閑味道腴詩卷賸添兵後作酒盃常為客来沽江湖結社鷗盟冷遼海還鄉寉夢􅀌烟水相望逺相憶寒雲欲画雪糢糊寄武城知縣趙朋南雙舃鳬飛下赤墀一行鴻舉撫羣黎昔賢過化絃􅁔地今代重興禮樂時春雨桒麻如杜曲秋風禾稼即豳詩檗飡氷飲持三尺製錦功成聖主知寄盧公武兼問􅇻孝伯安信憶言雨别去途難喜得雲歸舊谷盤郡乗手揮狐史筆齋居頭戴鹿皮冠草生林舘皆書帯竹老溪園可釣竿獨念咸陽􅇻博士有無黄耳報平安送殷孝伯教諭之咸陽逺逰自是男兒志特立正當强仕年衣上宻縫慈母線担頭輕朿廣文氊春秋三傳繼絶學畢郢諸生得盛傳老我也湏飛夢去振衣同陟華山顛䕶􅀦寺對雨去年梅熟雨蹉跎豈意今年苦雨多偶食僧廬苔作脯忍聞田舍麥生蛾山禽滑滑啼雙樹簷溜浪浪注九河徃事莫論魚腹恨近来平地亦風波和林韵黄梅落盡天猶雨白日晚来風更寒老去甚慚詩興少病餘猶喜酒腸寬舟中自古有敵􅀦李下從今莫整冠蒲屋􅁓􅑵明似雪政湏僵卧似􅀽安送性天之長老兼簡初士元大方厓兩禅伯方坐天寕古道塲遽辭雲水别河梁蕭蕭木落山中雨去去孤篷滆上霜白雪調髙人寡和黄花秋晚自餘香南能北秀煩相問為覔安心第一方徙居横山口號四首為愛横山山水清山前築室小溪縈老夫枕石看雲卧兒軰求田候雨畊古井寒泉龍有宅􅀌村夜月大無聲廿年兩眼風塵暗猶喜如今見太平三農閭伍共烟霞􅂾口清貧第一家瓦釡煮麋燒槲葉布裘添絮着蘆花交逰搃覺鄉情好吟眺偏宜野景賖不見髙人王八百浪傳仙井委丹沙清夢尋常繞薜蘿白頭今日此婆娑􅑵含風露秋容净簾􅐈林霏爽氣多浮世百年生䖏樂青山㡬度醉時􅁔莫愁猛獸藏林樾郡有劉昆必渡河山北山南地盡畊人家祗欠讀書聲丹楓似我衰顔醉黄寉如仙瘦􅇧清吳越喜逢連􅀊稔朱陳多續舊姻盟客来莫厭貧留宿新種梅花好月明次韵答袁子英見寄萬􅀦風塵百􅀾餘一􅁭氷雪五車書朝廷未賜延年杖鄉里􅂓乗下澤車鉄網􅃢瑚遺渤海玉峯鸂􅈑異伊閭長門直賦千金貴詎信相如筆乆虚上臺官經鉏子為屯田去罄室翁㱕担石無八十衰顔頭戴白一双昬眼淚含珠鵲寒空繞無枝樹烏餒徒生返哺雏匍匐哀鳴臺閣下尚期甘雨活焦枯輓謝天民二首細栁营中玉一株狂飈吹折莫春初杜鵑繞樹啼紅血知爾思歸恨有餘三十青年氣食牛貂蝉未得出兠鍪故園芳草春如海誰謂王孫不復逰題鄧九淵縣丞白雲親舍圖若人自是青雲噐方爾浮雲如展􅂹白雲親舍作畫圖寓我思親未歸意螺山隐隐雲央央吾家宛在山之陽西天十里水天碧北堂五月松花凉堂上慈親夀觴舉堂下諸孫緑衣舞頼伊黄耳觧傳書道我赤心方報主主恩方報報親恩望兒無勞親􅀝門直待平反㱕報喜却到青山白雲􅂻和宜興鄧縣丞出郭二首離墨山前芳草艸多馬啼曽此㡬經過囤碑文字無人識風雨銷殘近若何民有􅁔謡吏不譁村庄兒女簇如花􅅧山䖏䖏茶烟煖小市家家酒斾斜楊栁隂中頻駐馬杜䳌聲􅂻亦􅁯家祗縁報􅀦心殊􅋀更喜流年􅀊未華金牛臺送長史仲埜清明雨晴花正開折花送客金牛臺金牛遺跡不復見但見塵埃野馬去復来臺前鶴溪貫洮滆瀕湖緑野平如席臺後羣山􅀝大江齊梁故里迷榛棘登髙望逺散􅄐憂超然如見崑崙丘為問堰頭楊桞樹頗常見有此客否五年􅂙賛二千石飲氷食檗持三尺簿書肯棨㳺刄餘白雪詞髙人共惜楼船泝流出京口閘官放水蛟鱓吼青苔絶壁為留題名與此臺俱不朽贈眼醫張嘉甫重瞳天子真天人擇醫乃得天麒麟金篦不刮眼中瞙家有異藥能通神璇霄沆瀣和玄霜洗滌靈臺烟火􅀬刀圭㣲入阿堵中風卷浮雲出明月天顔咫尺頻為喜白金紫騮恩甚侈豈無太史載册書繼美倉公上池水老夫一目雲糢糊扶􅉵逺来煩掃除京華道上􅀑椰榆爾詩􅀅比蛇啣珠贈周實翁髭髩如㦸氣如虹芳茂山前矍鑠翁可惜一双青白眼看雲􅀌卧北􅑵風兒子木䝉釋屯種而㱕詩以志喜老烏失􅀌雏噭􅃅鵉臺前鵉鳴徹九関徳澤降自天鉄籠放雏㱕渇飲劍井泉井泉非不甘飲之不下咽念我老病烏肺肝烟火然返哺知㡬時􅇧肉且生全牖戸尚綢繆羽衣復翩􅝆衆烏喜聲集卉木同春妍援筆紀􅄐合執徐洪武年吳中行惠方竹杖徃有方竹杖化龍㱕混􅉭吾知龍之靈知吾力尚强今年八十餘舉足􅀔欲僵一目眇􅂾月白日如昏黄出門多棘榛况復畏虎狼感君扶持意以杖逺寄􅀅稜稜七尺觚材㧞宛種良􅀌根斬鉄石老節凌風霜此叟性􅁖圎為尔重激昂氣類喜相得顛危頼能防秋風黄葉村春雨烏石岡掛我沽酒錢時與逰醉鄉赤藤含赧色青藜失輝光覩物思故人晤言未渠央卽事二首方竹過眉杖单紗墊角巾室中無長物林下一閑人北牖青山近南風朱夏凉草􅂼留客飯木榻似僧房余之死欲速埋素志也今偶得小丘于横山之陽竁而甓之余他日葢棺埋可速矣􅀝我長鑱􅁔以自􅆘枯蝉蜕殻欲化老蚕作繭自纒一笑不拘風水六藏姑待天年阮孚着􅄚未了劉伶荷鍤長随便作松根糞土也勝兵前肉籬次韵陳庠仲見寄老去衡茅寒到􅇧兒能負米慰愁顔峡舟風打前時覆塞馬天教此日還氷雪冷冷龍井水烟霞隐隐鹿門山芙蓉池上鷗波濶殊勝雕籠鎻白鷴贈陳谷禅老帀地叢林瓦礫塲法幢扶起破天荒木魚呼粥餔禅侣􅂼筍香来八九霜選佛塲開金碧溪雲蘿烟樹一塵無客来㑹得安心法莫向江邉更折蘆布金人比獨園多金色山林作􅀘陀童子畫沙成佛去蹄涔豈足儗鯨波庭前栢樹觧通禅洞􅂻桃花小更妍愧我梁園詞賦客鬂絲風裊煮茶烟送孫太守奔喪㱕濟南大江之南烟水秋滆湖船送孫常州甘棠遺愛召伯去黄揚閏餘丁母憂五年組綬忽衰絰四郊􅃭袴多􅁔謳兒童􅀐竹忍相送父老杖藜争欲留􅀌雲宛在長白外清濟如㵼銀潢流北堂蘐草秋寂寂西風落木寒颼颼堂前稽顙献蘋藻隴頭洒淚沾松楸誓言永佩阿弥訓酒戒不受旁人咻蜚英乆矣徹斧扆欒棘暫尔棲林丘頴川太守已台􅂦碧山學士皆瀛洲政湏大木成巨室豈容野水横􅀌舟君親俱報志願足几杖却㱕封素侯送源無竭回金山龍㳺堂前師子床坐分風月今㡬霜千金一壺有妙用三吳百越􅂓逢塲黄花􅓹􅓹秋雨爛白雲悠悠江水長重摩松頂作受記毋令黛色参穹蒼復愁茅茨􅂾家黄葉村霏雨一月溪水渾慈鴉種麥日未暝猛虎下山人閉門江隂陳漢廣為北平府指麾使司知事随例免官黄金臺上古賢士竹帛垂名丗稱美碧油幢下今幙賔風雲際遇與同倫清氷玉壺烱胸臆鉄箸爐􅁅妙籌畫􅇻勤報􅀦傾寸丹雪花如席不知寒扶揺方展雲􅉇翼翩然退飛随六鷁且喜髙堂慰老親母勞黄耳寄書頻澄江如練山如掃金菊蓉芙秋正好人生三樂古難全熊魚得兼真自天塤箎迭奏夀觴舉綵衣􅄶􅝆􅂰前舞富貴故鄉朱買臣風流鑑湖賀季真一經已勝千金産况有牙籖三萬間應笑􅀛巢鶴髪翁小兒只作識字農脱身顛厓猶自喜殚力犁鉏供菽水尚期東壁借餘光讀我兎園書滿箱重逰虎丘寺不謁閭丘謁虎丘幅巾藜杖興悠悠飄蕭白髪三千丈来徃青山八十秋寳地近曽為􅀾壘劍池今復属僧流老松知我題詩意也學生公石􅀧頭過吳門二千年外興亾事試為吳儂問老天西子矉眉真可醜東門抉目竟何􅄽荒臺走鹿岩花笑殘膾成魚野史傳買得緑尊堪晚酌且􅀅湖水煮湖鮮次韵答姜天定二首白首㱕来山澤癯山行依舊不湏扶十年兵革遺黎少幾䖏沙塲􅀾骨枯􅂴去效顰随醜媍安知起躄到浮圖求詩雖厭雞林賈猶勝門前吏索租詩筒寄自清秋晚書印封来白絹斜一子幸能㱕負米双瞳可奈翳生花居貧不病知原憲弔古能文愛李華何日細論今古事􅂽村獨樹老夫家送任叔正㱕上海猗與子任子唾珠腹琅玕一登龍虎榜即着獬廌冠陛辭􅀩主恩家居奉親􅌚行嚢負禄米㱕佩納幽蘭秋月釣龍江春雲畊鳳山藥室費長房木榻管㓜安逍遥烏皮几神仙紫金丹為時療民瘼于親駐童顔葵心抱忠赤萊衣舞􅃢斑棲遲雲林下放浪湖海間訪舊過滆浦尋幽出呉関退鷁翅方歛盟鷗心共閑樂㦲壺中天虚白泰宇寬送董經厯奔喪㱕太原清風蓮幕諸侯客白雪麻衣喪母還扇枕未能償素志􅀝門無復見慈顔四千里外迢迢路一片雲邉莽莽山只恐鶴書催入覲又随鵷鷺造朝班西宿丁堰贈江隂王主簿五月六月凉如秋昨夕今夕雨不休屋山雷撼黒風起􅈇渠水溢黄河流河濵之陶萬家聚誰其董之暨陽簿􅅅墻祗見烏曺磚飲氷食檗􅁯情苦老兵擊析天未明隔水又聞􅅮埴聲扁舟興盡不往見􅁖詩􅂓冩来時情夏五之初偕江隂張希尹等過鄒忠公墓即事口占以寓感慨併用郡守張侯弔墓之行青山門外羊腸路走謁道鄉夫子墓向来滄海桑田变翁仲飘零竟何䖏䴡牲之碑高十尺頽若銅駝卧荆棘牧童􅃻火未足悲正恐􅀲分搗衣石使君五馬来何時摩挲細看黄絹辭五丁一呼為扶起隴頭草木皆光輝余方與客酧清沽白寉飛来作人語使君應表鄭公鄉專美那容孔文舉代簡張希尹余生寡諧俗老去得知己晤言固已晚莫逆良可喜聫翩諸侯客寂寞著書事夜分青藜火晝並烏皮几㡬回論班馬一笑觀亥豕烟雲揮洒外風月吟嘯􅂻酣蚶盃酌流霞獸爐􅀬沉水佳㢤水調詞清我塵俗耳朱絃聼者希白雪和能㡬别来懐合簮夢見承倒屣帷林大江邉瓢巷横山趾秋風落梧葉甘雨熟菰米相望不三舍相過堪一葦詩筒繼元白通家猶孔李况于阿戎談亦與諸仼齒尚友古之人厥徳薰晋鄙雨中懐任義甫十日秋霖未肯晴石尤風作虎嘷聲東門父老應相問何事龎公也入城蚶盃溝南老仙出盃孔竒酌言詢之盃從何来匪兕而觥匪玉而巵不雕不鎪不覆不欹謂為蚌耶鷸胡弗持謂為蛤耶奚爵而為測海之蠡其殆庶㡬老仙笑言子宜背窺瓦壟之文㣲蚶而誰水族之秀寔生天池昔逢羽人觀乃朶頥麯蘖爲粮華陽同㱕轉客我者丑年于兹如李白氏杯鸚杓鷀釃風酧月朝斯夕斯走亦何幸􅂾從宴娭百憂俱􅁯是用作詩次韵管伯齡見寄三首笠澤臞儒比列仙菊潭秋水觧延年每懐逺送江頭别喜得安書雁足傳赤米白塩瀕海地香橙紫􅈉早霜天客来賸說幽居好日日題詩思湧泉滄洲舊隠宅江東白首􅁯機似海翁金菊晚開香澹澹玉山􅀌立􅀔崇崇通家子弟連年别愛客情懐徃日同􅀊晚欲尋安道去扁舟當迩落潮風郇公五朶雲天風送来前憐我落巢兒覆盆重見天三復誦佳句一如飲甘泉金篦刮吾眼華津生我咽重念謝公險毛􅇧仍凛然金鑠雖被毁璧㱕猶幸全兩鬂雪飄蕭双􅃑風翩􅝆寒蛩語音喜秋花笑容妍答詩報君知今年勝前年贈刋字闞士淵憶昔趙文敏公之冩天下碑鐫字獨􅁛茅紹之紹之之妙在何許八法靡有秋毫遺嗟哉文敏不同世抱藝如茅誰品第斬蛟橋下溪水清鉄筆淬来鋒甚銳􅂐􅀠真行章草書銀鈎鉄畫冩璠璵天然筋骨見顔栁假手􅀘戈真是虞文章太守眼如電語重兼金􅂾􅁛羡青年正可為時出山居聼泉何足恋羣公􅀅勒燕然銘中郎要令傳石經老夫為伊双眼青鉄筆于今錚有聲􅀉盧公武舍人投老鶴溪垂釣緡遥憐鳳池掌絲綸鞾霜待漏朝㑹早墨雲染翰詞頭新石麟自是天上物金薤散作人間春尚湏鼓吹振六籍蹴踏班馬追楊荀送同知陞􅁶安慶郡太守郡守坐分金斗月朝鞾金滿玉堦霜一􅁭耿耿留遺愛五馬霏霏􅀍􅃂光官詔叠承恩渥重御屏新録姓名香可憐八十􅀛巢老尚欲攀轅立道旁送史宗儒歸省親北風狼號霰撤粟洮湖白浪高于屋逰子扁舟歸省親行嚢賸有新珠玉舟行到家除夕前髙堂守􅀊開長筵斑衣捧酒爲親夀河清復見昇平年相門出相今非昔文采風流還籍籍一賦可值千百金貧似相如永岑寂窮居我亦四壁􅆰吾兒經鉏走西東煩􅀅此意問若翁名教之樂􅀅毋同寄金華府尹經厯方伯方宣化賔僚喜得人幕中勞賛畫胸次有經綸􅇵邑征輸夥清朝紀律新轍魚湏救涸尺蠖正求伸月湛双溪水風生七邑春簿書雖雜遝矩矱自持循耿耿存虚室昭昭對大鈞宦成防小怠徳立豈無鄰逺别長相憶前言敢重陳菲葑如可采薑桂有餘香白首龍鍾老滄洲寂寞濵歸鴻書可寄千里見忞忞送田副使父憂歸若人自是青雲噐九萬扶揺尚垂翅髙秋沆瀣生碧霄搏入詩脾作清氣頻年坐此塵土塲􅊏埃不滓芙蓉裳豪吟接迹李太白栁金梨雪揚芬芳詩成落筆蚊蛇走多入雞林賈人手今朝送入毘陵城折盡西門道傍桞東風雨晴花錦香京華到時春正長上林一枝栖鳳凰鳳􅀆鳳􅀆鳴朝陽送張常州奉㫖入覲白髪田舍翁清曉何跚跚送侯入朝覲扳轅吐衷丹去年榖半熟藜藿度寒􅀊春来理農務豈惮稼穡難采薪供陶冶四境空榛菅執柯渉重湖荆南研青山非無犁鉏具靡暇􅅵畝間烏曺事未已緑野多荒閑願侯念氷兢為民徹天関樵斧容暫息農畮力可殚民􅁔岐麥秀侯策五馬還古今兩張堪並載青史看送王啓東御史丁憂起復赴京君親恩重生當報忠孝情移義與俱冠豸威名傳舊日攀龍􅃂渥拜新除玉堦雲集来儀鳳錫谷人􅁛返哺烏折盡驛橋飛絮栁親朋相送喜何如送陶孝思赴召夙學多才思崇文際盛時鶚書騰日下􅉇奮出天池􅀤軔青雲路承恩白玉墀泥塗龜曵乆阿閣鳳巢宜䋲凖持三尺絲毫畏四知佩韋遵古訓介石蹈良規比徳雲暉草同誠向日葵徃㢤行􅀁學動必慎其儀噐作璠璵美文成黼黻竒遺芳流汗竹無負故人期張知府命子送祖考墓碑還鄉名門父子傳一經儼如韋腎有玄成從親宦逰飬親志念祖喜䝉封贈榮潜徳幽光恐磨滅伐石南山鐫墓碣宋公文章踵韓栁史公清書追禇薛􅀛趺螭首重摩挲舟車載去勝槖馳四千里外薄炎海佳城埋玉山嵯峩墓前翁仲看石立靣帯烟霞含喜色九原精魂斯焜煌百世雲礽益輝赫八月九月秋風清彩衣􅄶􅝆趋鯉庭説親細説鄉里情老夫亦来下堂聼和賈教授還鄉試看一簣可為山千里程途跬歩間取印正湏金斗大還家未入玉門関泮芹過雨香堪摘壇杏無風意共閑我欲中秋聼琴去扁舟􅋈棹後河湾􅀉賈教授相期詣鄒墳􅀕掃題詩郡圃景鄒亭澆酒林荘下馬陵白草西風秋莽莽青山北郭路登登柱頭且看誰為寉􅂹尾何慚我附蝇坐待秋凉行有日老夫扶􅉵策烏藤道鄉祠堂詩送張縣丞道鄊祠前松栢蒼清氣凛然知㡬霜伏蒲一䟽吐肝胆汗竹千古傳芬芳此去長安日月近且喜高秋風雨凉立朝願學子邹子他年便作知恩堂題許别駕雪山圗南山雲起連北山樂天賦詩心共閑東山月出照赤壁子瞻􅀝􅁔情甚􅆘今公画圗誦雪峯託興應與雲月同瓊林玉樹絶􅊏滓蓬婆城外山相似羣丘角立白龍堆飢寒喜無桃與哀蹇驢滑澾山前去絶似㶚橋人覔句公餘展􅃃岩電流􅁭懐化作氷壺秋楊家氷山無足􅀝何如坐對兹山隠烏几同友人􅀕鄒墓各賦詩一首先生高塚麟麒卧令子峩冠豸鹿威汚玉青蝇除􅁾跡銜書紫鳳賜恩輝八千里外甘泉竭三百年来世澤㣲㵼我一盃寒澗緑卧碑扶起立斜暉送楊通判知蘇州府延陵父老攀轅别吳郡兒童跨竹迎功覆斯民推徳厚秩􅁶藩府重恩榮五湖秋水清堪比三譲遺風俗易成遥望虎丘山下月餘光還可到柴荆􅀉張熈載問疾溝南隐者敦同姓每説相知見肺肝名似項斯詩句好腰如沈約帯圍寬一江雪浪潮平岸十日秋霖雨作寒珍重齋居足怡晚玉枝無竹汗平安和賈教授詠懐両䄂西風獨􅀝楼一天秋色斷虹收水村霜落紅于染山市烟嵐翠􅁒流眼􅔄看来興廢事胸中消盡古今愁莫嫌苜蓿盤無味喜有葡蔔酒可篘重九次韵石潭無菊比南陽老我三千白髪長九日正湏多買酒一錢何必用看嚢自憐身健茱茰紫更喜盤餘苜蓿香早起東􅑵挂吟笏坐看紅日上扶桑又和􅀉秦宜中高堂燕客似高陽醉筆題詩興味長恋恋多情舊紗㡌滔滔無􅔄老書囊銀瓶茰酒􅘑舡滿玉杵橙虀蠏斗香應笑陶潜􅆰抱菊西風繞屋呌枯桑贈辛林甫有客有客雙眼青婁江山水鍾其英十年足不出户庭手披韋編不暫停案頭照盡書嚢螢先天後天見日星百家喧囂無足聆九師亦以蠡測溟蓍策之妙窮杳冥語人吉凶影随形滿庭書帯生香馨一簾秋色風冷冷去年抱琹来野亭古操為我作氷伶我方采樵如負苓相與􅇵談洗心經呼吸沆瀣食楚萍一掃世味氊與腥有時醉我蘆花汀客来買卦呼不醒惜㢤􅀌鳳五色翎翩褼何日儀虞廷鳳􅀆鳳􅀆請試聼黄河水清三千齡􅀛巢藁卷之五終
