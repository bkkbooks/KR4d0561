front:
  text: 􅀛巢藁序毗陵謝先生昔避地吳淞之上余適目燕至吴予友􅃰郡劉子南氏甞道先生姓名學行之懿予願見而未暇焉後十年識先生之仲子林于崑山則先生已歸隠于毘陵矣又十年娄東􅀽子英氏以先生年八十邀余賦為先生壽継又告曰先生之門人王著集先生之詩鐫諸梓徴余文叙卷端子辭以未識先生又未嘗閲先生之詩集何敢率爾從命且何能賛一辭于其間㦲予言又豈足為先生軒輕哉然子南既稱先生于前子英復頌先生于後况嘗與先生之子林連床累日觀其從容詩禮秀㧞儒林則先生之言行可知已傳曰不知其人視其友不知其父視其子又奚必識先生之靣誦先生之詩哉嘗聞先生之為人耿介尚節義與世寡合其為詩也非有関于風化者不為非有得于性情之正者不能也惜先生不少試其才于時肥遯終身焉先生有辨惑四卷行于世皆發先儒􅀁未􅀤其于後學豈小􅀘哉予姑述􅀁聞者知此先生名􅀿芳字子蘭號􅀛巢云時洪武十二年􅀊已未七月既望前浙江儒學副提舉豊城始豊山人余詮叙􅀛巢藁序文章與時高下昔人有是言也有能處􅁨患顛沛之中不為外物之􅀁摇奪形于言辭無戚廹憤懣之病有異于昔人之言者惟君子為能之吾于子蘭先生之文見之矣先生蚤有後譽嘗為李晋仲俞用中諸公􅀁知生平重然諾勇于敢為紬繹經史作為文章咸有根柢與人論辨舋舋不少休在郷里時請􅂧鄒忠公墓寓吴中又請作頋元公廟世俗怵乎異端而説先生因取經傳之言作辨惑編以警之其􅁭度磊落識見雅正寔為士林􅀁推重洪武十年冬先生之子林以郡府􅀁舉至京師先生以書諗熊曰蘭有􅃇作學子王著欲板刻之乃為􅁼叙以從其請子其序之庶不為醬蒙矣􅇮先生避兵時雖漂揺逆旅中􅀁至人欽其徳望延致恐後巢室松江之傍講授之餘以詩酒自娱熊托交十五六年一時倡和若楊維楨亷夫倪瓉元鎮頋瑛仲英俯仰之間淪兹泉壌先生年踰八十歸隐横山寔為後進之􅀁景慕其􅀁著述有不期于傳而自傳者矣吾友中書舍人閩人張至道評先生之詩雅正純潔法度整嚴可與傅與厲相伯仲識者以為名言熊窃觀先生養之厚氣之充言行卓卓如此盖喜聞而楽道之者因以冠之萹端先生姓謝氏自號􅀛巢老人故名其集為􅀛巢文藁云范陽盧熊序􅀛巢藁􅀘遺目録
