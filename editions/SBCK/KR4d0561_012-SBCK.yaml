body:
  text: 書上奉使宣撫書時為􅀊􅂽而述也某嘗觀孟子告鄒君之言曰凶年飢􅀊君之民老弱轉乎溝􅊤壮者散而之四方者㡬千人矣而君之倉廪寔府庫充有司莫以吿是上慢而殘下也夫鄒小􅀦也孟子猶以是告之况堂堂天朝富有四海倉廪府庫比之鄒君相去萬萬奈何有司者遇凶荒之年而不思救荒之䇿知出納之吝而不知時措之宜其殘慢有甚于孟子之說者責何可逭耶伏惟大人奉聖天子明命廵歴遐陬詢民疾苦其矜恤黎庶慈如父母紏正百官凛如風霜盖能以聖上之心爲心唯恐一夫之不得其􅀁耳然民之疾苦莫甚于飢今常州属邑曰武進曰晋陵其境土與鎮江相連􅀊之凶􅂽寔相似也今兩縣之民皇皇焉嗸嗸焉與鎮江之民何以異㢤然彼則有仰給官廪之喜此則有餓死溝􅊤之憂􅀦家一視同仁􅀄無彼此厚薄之殊特係有司之能告與否耳嗟乎常之民自春冬徂春訴飢郡邑僅嘗得義倉之粟三斗而巳斯人也譬之乆旱之苗㣲雨斯湏豈能蘇息必待優渥霑足而後免乎枯槁耳當此之時青黄不接食草木之根者有之鬻子女而食者有之去父母􅄐鄉井行乞道路者滔滔也有司方且移文覈寔藉有田之家計畝科􅂾以為賑恤之政其亦不思之甚矣夫粟之為物必産于田􅀊凶則田不收矣夫不收之田雖累巨萬粟何可得乎况頻年不登賦役重困産去税存者十之八九一旦又加諸賦歛之毒其狼狽為何如㢤徒使皂􅀠之徒家至户到呌囂之聲雞犬弗寕是以有田者亦多為東西南北之人矣其詣有司者拘之縶之鞭之扑之刮􅀛毛于箠楚之下剖鷺股于挫辱之餘區區􅀁得民不足贍假令能贍其民何異奪烏鳶之食與之蝼蟻耶若是者誠知大人君子之用心必不忍為也忍令有司為之乎夫常之為郡大郡也官廪之蓄陳陳相因又有附餘之粟存焉公帑之積綽綽有餘又有􅂍罸之金在焉斯二者非􅀦經費有司者亦何靳而不以施諸民乎苟能以是施之亦可觧倒懸之急况能如汲黯􅀤河内之粟乎惟大人舉而行之上推聖恩下副民望盛徳之至也然民疾苦豈止于斯如公田之重租宜减官塩之髙價宜輕田户之酒課宜更都水之冗員宜汰凡如此􅀋未易枚舉獨以賑飢一事首凟鈞聼葢民之顛連命在朝夕非若他事可少緩也芻蕘之言倘䝉採择餘者又當條具而細陳之惟大人垂察焉區區干凟崇嚴不勝悚息與王氏諸子書諸君子居䘮三年除服有日聞欲命羽士設醮以助㝠福􅀁費計統鈔三百有竒以粟用之㡬四百石是亦出乎孝敬之心循乎丗俗之禮也然㝠福之寔果何有㢤以愚言之用三日醮筵之費賑一鄊人戸之飢當此凶年使􅂾百千人得餔其粟而免為溝中瘠者其􅂬欣賛頌豈止百倍于黄冠師之口㢤若諸君子更欲盡追逺之誠則于祥禫之日豊㓗致􅀕亦庶乎終䘮之禮矣但今之丗俗親殁之後凡言做好事者非佛氏之齋即老氏之醮二端之外餘無用情雖􅀕祀亦不為意葢亦未之思也愚請引古證今以齋醮無足信者為諸公言之佛氏以釋迦為師其書由漢以来流入中􅀦􅀄無設齋之説也至梁武帝􅄭祈因果俾僧流為之厥後亾滅宗􅀦餓死臺城使設齋而有因果豈至是㢤道家以老君為師自周以来其書傳之天下亦無設醮之説也至宋徽宗􅄭意求福令羽流為之未㡬傾危社稷流落金虜使設醮而能􅀗福决不至于此矣二君昏迷不明物理信一時妖幻之言為二氏衣食之計如此前代名賢當今豪傑卓然有見而不惑者固多有之惟閭閻細民惑者十九何足論㢤諸君負聪明特逹之才有深逺宏濶之見平居髙論逈出人表豈至是而亦淪于汚陋之習耶必能以理燭齋醮之􅄭以財行賑卹之仁上下一心䖍奉􅀕祀一以寓孝思之意一以報㒺極之恩上天鍳臨何福不至先君有􅂕必含􅀏㝠㝠中矣余以忠告者朋友之義也在交契不敢不忠惟諸君念之論吳人不當祀范蠡投老異鄊如􅀛藏六未嘗敢輙造公卿大人之門為㳺説之客也今一造焉亦不敢如方朔自譽毛遂自薦以求其用亦非敢有富􅀦强兵之䇿驚丗駭俗之論以衒其能特以古人一事有関風化敢請為閣下陳之僕嘗近過吳江嘗逰三髙祠頋瞻遺像覧前人記載金石之文見􅀁謂三髙者曰范蠡曰張翰曰陸􅀛蒙謂其清風峻節天下共髙之邑人為東家丘而祀之僕于是窃有感焉夫季􅈾魯望吳産者也吳之人慕為東家丘是巳鴟夷子皮始終事越間嘗以行成留于吳其心未嘗一日􅁯乎越也進羙女納寳噐以惑吳之君臣乗虚進兵以滅吳之宗社大率皆蠡之謀越人論功蠡居第一豈非吳之大仇乎惟其功成名遂遯迹而去其識見固髙于常人然浮海􅆘齊則裝其珍寳珠玉以行在齊復营致千金之産自齊之陶懐其重寳而去居陶而父子耕畜轉物逐利又致累巨萬之資僕嘗觀太史公以是屡書不一書者葢深鄙之非取之也較諸子房辭漢翛然從赤松子逰相去萬萬矣又觀杜牧之詩蘇子瞻之詩皆謂范蠡西施以申公夏􅁎為比由是而言謂其人為貪為􅁾亦不為過尚何清風峻節之足慕乎今也以吳人馨香之􅁰稷享敵􅀦貪􅁾之仇讎于理其可乎㢤禮民不祀非族况仇讎乎或曰有其舉之不可廢也僕應之曰吳有三髙人特未之思耳若太伯仲雍延陵季子真可謂天下􅀁共髙者也凡為吳人苟非土木孰不有髙山景行之思雖欲至之而不能也唯當道君子循名核寔改而易之寔足以􅁛三髙之名雪千載之羞而厭服輿人之心矣然斯言也僕不徃告之他人而特告于閣下者誠以閣下心正而理明學博而識髙見義􅀁在勇于有為凡以正人心厚風俗之事知無不行特此一端偶未之及耳及聞僕􅀁説必不以人廢言此僕􅀁以􅀤其乆箝之口也惟閣下􅂙秉鈞衡之暇稽諸祀典以理裁之以義决之為之改作奉三譲至徳之聖人祠于堂上配以二賢仍以季膺魯望列之􅀙祀如此則正前人之謬新生民之耳目振髙風崇禮讓激衰丗薄俗而勸之其于風化豈小􅀘㢤唯大人君子垂察焉若謂蠡之有功而祀之則越人祀之宜矣若諸􅁑武侯之賢蜀人祀之吳魏亦未嘗有祠焉斯理之公古今不殊幽明無間􅀁謂質諸􅀑神而無疑者也苐恐不知者以僕之言旣不足以謀身又不急于用世斥其迂濶而譏􅀏之僕于心誠無愧焉古語云可語與智者道難與俗人言􅀁恃髙明必䝉鍳察區區干凟崇嚴不勝􅋺息代與李中丞書某去年夏四月奉状附某官􅈇運之行不審徹鈞覧否卽日仲春伏惟鈞候神相多福某避地吳下六年于兹顛沛流離困窮艱難萬状逺不能奔父䘮于京師近不能葬母骨于鄉士兄弟妻孥救死不贍故于父母殆若􅁯思其寔銜哀茹痛朝斯夕斯未嘗頃刻􅁯于懐也若大人之深恩厚澤重如丘山亦未能伏謁門下効犬馬之力以報于萬一幽明兩負度日如年唯大人念先人之夙好憫遺􅀌之艱虞特賜哀憐不加譴責為幸甚矣某儗今􅀊歸耕膠山剪荆􅁄藝禾􅁰庶一稔而有宿舂之粮卽洒飯先人之墓得負荆于大人之門也兹因吳縣尹詣前謹奉此承候起居併述􅀁以趂趄負罪之故舍弟某臨書羅拜悃不殊前下情無任􅋺惧感慕之至伏惟鈞察上盛敎諭論土地夫人書常州路學敎授盛克明以文廟先聖殿及門廡等屋湫隘皆撤而新之廟前建文昌土地二祠其土地舊多􅁋祀嘗詢之應芳悉皆除去但夫人之像為或者􅀁沮而存余盡力請毁之至書􅂯上敎授乃白諸郡守賈侯侯然之像遂毁敎授名昭維揚人侯名禧字吉甫真定人也自先生之敎于常也講貫之暇繕修廟學二三年間百廢其興窃嘗與鄉之諸老論之皇元置郡博士以来未有如先生用心之勤者也功其􅅷㢤功其􅅷㢤特有細故一端尚宜改作敢以狂瞽之言輙凟清聼惟先生察之伏覩夲學重建地􅂕祠于儀門之外其神有無姑置勿論使誠有之是豈不知亷恥者㢤今肖像之設夫婦偶坐楚楚乎裙􅁫之飾盈盈乎珠珍之粧侍從旁立男女雜處儼然坐聖人清廟之下能無恥乎禮曰男子居外女子居内又曰女子出門必擁蔽其靣雖近世禮俗之敝亦未嘗無男女之別也至如閭閻細民之家人或過之其妻猶避嫌不岀豈有身為神􅂕而為之配者不知内外之分呈身露靣眉案並食以饕士大夫籩豆之薦反不若閭閻匹婦而能避嫌乎吁幽明雖殊理則一致决無是理也明矣比聞吾先生以此爲細㣲之故不欲矯世違俗而姑從衆也先生之心固然矣但學校者風化􅀁岀之地凡有作爲人􅀁矜式愚恐四方来觀􅀅謂理或宜然轉相倣效又而卒莫知其非又恐禮法之士􅀙而議之又安知先生􅀄見之明如彼其後從衆之意如此耶此愚􅀁以不避譴責僣伸尺喙以罄其芻蕘之誠唯先生以䋥揆勇為撤去非惟雪神羞明礼敎不淪胥習俗之謬抑亦可見先生之不以人廢言矣抑愚又有説焉天地之􅂕者莫􅂕于賢者也若吳季子張文靖胡文恭鄒忠公諸賢正毘陵土産之英􅂕學有舊祠庳隘弗􅁛即于此祠而祀之不勝夫無名氏之鬼乎程子曰除神祠而民為善斯言也雖質諸聖人在天之􅂕亦何疑㢤夫如是而或􅀗戾于􅀑神者凡加于某之身無悔區區僣越惟先生察之又上盛敎授書某比見地􅂕祠設夫婦之像恐未合禮窃嘗冐昩有言欲禆明見亦庶乎他山之助耳或有謂予者曰怪神之事聖人不語非不語也盖不易語諸人也夫地􅂕之神其配偶有無未易窺測若果無之則先儒君子必嘗論説今吾子以一介之㣲言雖屡中又安足取信于人也㢤僕聞之旣謝不敏退而考諸五峯胡先生之論南嶽曰世俗為廟貌置男女屋而貯之䙝凟之甚厥北溪陳先生又􅀙而釋之曰自聖學不明􅀑神情状都不能曉如㤗山封帝􅌂然人形垂旒端冤且立后殿于其後不知又是何山配之為婦也然則土地之于山嶽􅀋也廟貎之設巳為不經况復加之配偶乎惟先生撤而去之以祛衆惑其有未喻者乞以前二公大儒之言曉之其誰曰不然况當今天子􅀁通祀者曰三皇曰孔子曰社稷或廟貎焉或壇壝焉皆未嘗有匹偶何物地􅂕而獨有之乎稽之古訓巳如彼􅂙之祀典又如此反覆思繹决無是理不免􅂯用塵凟以殚其千慮一得之愚惟先生垂察焉干周侍御作頋元公祠堂書某毘陵鄙人也逃難異鄊百事踈􅂴惟好古之念根于其心老而彌篤偶有感觸􅁬然欲為力雖不足亦必假手于人卒于成而後巳今有一事復因人就緒敢具述顛末為閣下陳之某僑居葑門􅆘與頋元公之墓相近地方五六里俗􅁛頋榮墓是以知之旣知之􅂾徃弔而問焉夫元公晋之名臣也其勲業家世詳見史編元帝大興二年十一月十七日卒于官迄今凡一千五十年有餘碑文雖失丘壠尚存土人以其地如鳳形名鳳凰嶺前有二墩峙立左右樷祠一區為鄊人奉嘗之地其来逺矣近有無知之民舁置土地神塑像􅂾軰列坐其中其􅂽謬􅁋䙝有不可勝誅者以某一介之㣲不能改作是用言諸長洲縣令周君君博雅而文方其視政之􅀄力行古道故聞而喜之遂與某等展墓且詣祠奠謁属某為文告之曰何物地􅂕混此室䖏旣而令方議斥去􅁋祀整葺祠宇邑人張寔乃樂成賢令之志輸財効刀唯命是􅀙圬人梓工並手交作瓦甓之毁者易之棟宇之朽者新之像設供具門垣墓表靡不完好二墩則各植梧桐二株名㕠梧墩盖張華嘗􅁛公為朝陽之鳳及墓名鳳嶺故也月餘畢功令復躬􅀕祠下麗牲有碑宜勒文以􅀤昔賢之幽光而周令亦牽聫得書然必求大手筆為之斯不朽矣唯閣下碩徳令望為今儒宗典雅之文追古作者若􅂐􅀠之妙則雖秦丞相漢中郎並駕而驅吾不知其孰先而孰後也兵革以来諸老凋謝􅀁謂斗南一人而巳唯閣下追念前修賜之述作并為揮洒使刻之堅珉則詞翰両絶焜燿丘壠􅀅見士大夫争先摹冩以廣其傳則元公之勲業聞望益著于青史之外矣某又考之南史晋武帝禁立碑表著于令甲至元帝時驃􅀐府主簿請恩葬舊君頋荣請為立碑詔特􅀙之然則今閣下之文􅁇羙千載可謂無愧焉耳如某區區􅀛巢在徃􅀊猶䝉黼黻矧斯文之傳有禆風化閣下豈不樂其羙耶此某不揣僣越拜書閣下意閣下之必不􅁍也輕凟崇嚴不勝悚息上王縂管正風俗書嘗聞豊山之鍾霜降而嗚説者謂氣之相感理或然也今某一介草莽覩吳下風俗之壊扼腕切齒不忍隐黙敢請為閣下陳之葢以閣下得天地之正氣飬之于身施于政事故區區狂直感而有聲猶豊山之鍾也惟閣下􅀤號施令行諸郡邑必能誅鉏􅁋􅁾一洗汚俗振其氣之餘烈也是氣也在天則為風為霆為秋霜烈日在地則為草而指佞犬而咋姦豸而觸邪毆陽子􅀁渭天地之義氣而孟子􅀁謂浩然者也夫以閣下之清非秋霜乎其明非烈日乎政敎號令非霆厲而風飛乎如某者氣禀獷直疾􅁖如仇葢亦似乎指佞之草咋姦之大觸邪之豸也昔孫叔敖殺兩頭蛇而隂徳之報位至楚相自世俗􅀚之敖之殺蛇􅆷物命也殊不知除一物而免衆人之害徳莫大者也今日之事正􅀋此物故復舉此以破世俗之惑罄其一得之愚唯閣下察之賀丁州判到任書某客居江滸帶經而鋤一日鄊之父老過子曰兩年吾州以州長之賢民用復業今又得賢州佐仁其民必能盡除其煩苛使田里無歎恨之聲矣余居此飲娄江之水是亦娄江之人也可不喜乎可不賀乎予曰倅方下車􅂚知其賢曰吾聞之居家能敬其親居官則敬其同僚遇文士則敬武士則敬緇衣黄冠醫藥卜筮之属咸禮貎之㣲而皂􅀠亦善遇之又㣲而􅃖􅃖之民伏庭下訟曲直者亦謹以三尺之法裁之未嘗厲其聲怒其色也是皆敬之存于中形于外如此非賢而能之乎時某樂聞其説因念先民之言謂能敬必有徳德以治民而民必􅀍其澤矣旣而入州以父老之言詢諸文武醫卜緇黄之間無間然者至于縉紳月旦之評道路輿人之頌比前􅀁聞者尤加詳焉是誠可喜而可賀也然則一州之人今􅀍其澤固當為一州之人賀等而上之澤及一郡則又當為一郡之人賀又等而上之􅆒厯臺閣羽儀天朝可為斯世斯民之賀者未艾也惟一念之敬始而終之君子慎焉與陳翰林子山書某丙申􅀄冬逃難吳門逢人問閣下出處既嘗為浙東路難之憂後二年聞居翰􅁐深用為喜近于唐彦博處又喜知爵位之崇道徳文章之盛每誦一代不􅂾人百年㡬見之之詩馳慕而已某􅄐鄊六年偹厯艱險年今六十百無􅀁成獨與兒軰固窮末嘗一失其故歩也比来目昏耳聾髯白如雪惟髪尚有黒者則其状全􅀋社公可􅀏可􅀏鄊人多無噍􅀋而某一家􅂾口幸免溝􅊤特未知􅀅来如何耳兹因胡宰行謹此問訊即日秋髙伏惟善加保愛亟秉鈞衡以福天下上周参政正風俗書某毘陵賤士也曩􅀊以避兵来吳閣下時為郡主有􅀁控訴俱䝉接納由是知閣下為能聼言為能下士常懐野人芹曝之献而未能也今閣下参秉鈞衡為􅀦柱石以斯世斯民為己任吳人頼之若子之有慈母風雨之有夏屋別妍媸而有鏡較輕長短而有􅁠度也况閣下不自有其明下士之勤吐握不􅌒聼言之切詢及芻蕘雖老無能為視舌猶在豈終無一言以效芹曝乎然􅀦家之事錢榖甲兵則既有人籌之矣講求法制則亦有人矣薦賢舉能則又有人矣特呉中風俗壊于浮圗氏之不肖者曽無以及之某敢請為閣下直陳之夫男女有别然後父子親父子親然後義生義生然後禮作禮作然後萬物安無别無義禽獸之道故禮謹大婚詩首関雎易著咸恒書載􅁵降聖人慮天下後丗􅅧矣彼佛之為敎雖有異同然以􅁋為戒亦甚至切但今之浮圗王石淆混􅀁謂不肖者乃僧中之羅刹佛氏之罪人無别無義之禽獸也某䖏某等之徒未易枚舉姑以目前言之某以堂堂住持之稱搂墙而妻桒中之妾駢集方丈行窩旁􅀚因徃徃唾斥怒罵但未有言于官者耳同衣不敢之言之敎門不敢言之鄊里不敢言之恐其怨詈也上司懸隔而不聞州縣置之而不問是以恣其荒􅁋了無忌惮逺近效尤􅁋風大行良家子女蘭􅇹俱化甚可惜也愚惟狂直不忍喑黙然某夲異郷之人區區僣言殆猶西家之犬吠東隣之盗使其主因吠而警且能使其家衆捕之亦庶乎救其􅀁失不然則犬為徒吠且徒取憎于盗耳今閣下當路于吳非斯民之主乎有司非家衆乎治其人使返其尤物而風俗還淳非尚救其失乎以閣下之明必不使某為徒吠之犬而徒取盗者之憎也惟閣下察之或疑浮圗氏不肖者多莫能盡治是大不然君子之徳風也小人之徳草也風行草􅅯如響斯應有不待家至而户到也昔明道程先生言于朝曰治天下以正風俗為夲然則區區􅀁陳不為細故惟閣下采擇賜之施行非言之幸斯世斯民之大幸也與劉旭齋書某三復誌文皆逹生委命之意不琱不斵不支辭深用敬服謹依命㣲潤色之但􅁶葬二親不宜説以便省埽亦不宜泥風水之説也啓菆而遷庶合古制􅀁渭以家學授受而姪子青領鄊薦乃家庭盛事宜特書之至如流寓崑山亦紀寔也若孫某必書在某處不然則有其人而不知􅀁在是闕文也以術􅂾二字易相者之言則虚中之説前後相應又見公精于虚中一家之言而免議者有多惑之誚􅀁需輓詩未能措手題小像􅂾語方尔腹稿續當納上若夫戒酒一節未諭髙見古人居䘮不得飲酒食肉然必曰五十以上血氣既衰湏酒肉扶飬者則不必然是則酒肉乃老者之不可無也今年􅀅八秩正宜以詩酒自娱盡其天年死無􅀁憾戒而不飲非惑于罪福乎若以戒酒為盛徳事勉而為之則古之聖賢皆欠此一徳不然何老痴如是耶望不以人廢言亟請呼麹生以永朝夕重九日僕當折菊一枝携酒一壺併作活􅀕文詣前為公洗胸中凝滯也與孝章􅎋君書相去􅅻一舍地不面動經半載可勝馳情比聞足下以名後而徃如玉抵鵲深用慨嘆既而知有傭力者代之得不廢種學作文之業又深為之喜也某嘗謂士生斯世固樂于得時行道然有命焉非可力致當此之時苟能有一畝之宫可以栖息賣金買書敎子共讀客至沽酒劇談古今真樂事也左近朋友唯足下洎子英袁君公振馬君􅉇南執中二趙君有之幸足下勿以細故少沮而遽改其楽焉某于二十年前固嘗樂于此矣今兹窮途不復可得家累百六十指借屋而居仲春以来頽椽敗壁􅊜薪破灶視累軰若有不豫色者某頼有陶詩一卷可以自娯且時與樵􅁔漁謳更唱迭和乃釋然無􅊏芥之累于胸中也諸友人會間煩以前􅀁陳者告之使樂其樂旭齋劉先生無諸君之樂者則以漁樵唱和邀之亦必楽予之樂矣僧廬十絶先乞示教上何太守書僕夲毘陵人也􅀉跡吳下于兹有年窃聞賢府侯以清静治民亷明之聲洋溢千里凡民得以安集于二天之下者為幸多矣僕雖窮居一室􅀙事筆耕然日與田夫野老為伍而知其休戚焉比者欽奉綸音大赦天下聖恩汪􅐮物無不沾而斯民之幸尤多詔曰罷敝之民何以紓之又曰民有不便有司舉之觀此足以見聖天子憂念斯民之心如此其切托付有司之意又如此其重也由是田野之民􅌚欣鼓舞意謂痛入骨髄今又増修水脚之患焉譬如乆病之人舊疾未愈新病復増寔何可當㢤奈何里胥催徵急于星火飛芻挽粟夤夜不停搰搰無吐氣暇雖欲赴訴于甘棠之下不可得已况能訴諸輦轂之下乎如某者以筆代耕田無寸土于官賦輕重夲無干預然斯民疾苦之状日􅆭于目嗟怨之聲日刺于耳誠有􅀁不忍者况聞賢府侯吐握下士子愛斯民故輙敢以芻蕘之言上逹台聼是猶豊山之鐘霜降而自鳴野人之芹愛君而持献也一誠如此餘無覬覦惟大人君子上以體聖天子矜恤之意下以察疲民疾苦之情鍳僕愚誠恕其僣越特䝉采擇賜之施行使困苦之民得以蘇息愁嘆之聲化為謳􅁔􅀅見太史氏以循良之政登諸簡册而僕亦當作襦袴之􅁔謡與田夫野老􅁔詠于郊野間矣呈府侯書嘗聞􅀦家更化務􅀙寬大以安民州縣承行貴在申明而無􅁦事既有乖理宜陳説見奉詔書内一欵節該民間有不便事理該載不盡者有司白明申舉輕者中書省即與施行重者集議奏聞欽奉如此切見崑山州􅀊觧秋粮八十餘萬石舊年夲州遵奉上司􅀁行每粮壹石起科水脚米一斗各保人戸赴京納粮其􅀁用水脚俱係自行岀偹當時有司失于申明上司優免開除兼之張氏以来比于前元多増粮額民以窮困輸官不敷今加水脚其􅂾愈厚不能辦致令催粮里長人等破家蕩産累遭杖責監係囹圄受罪􅂾月逃亾縊死者不知其􅂾直至今年八月欽遇赦恩􅅻方釋免切詳上司允行每粮一石科米一斗既是明白水脚葢以人戸赴京送納逺渉江湖艱難重費以此粮米為稍水船脚之用其理􅂋然上年官司􅀁收不見如何用度即係重徵于民未經定奪開除况今洪武元年見奉上司明文起科船料令佃户自辦人船送納官粮又每石收銅錢五十文及以官粮二百五十石起科水夫一名赴京畿􅈇運司應役上項元科水脚粮米有司一概征收使民不支官無用度非上司允行之意人民受害下情不能上逹良可哀憫若不建言尤慮今􅀊秋粮必到拖欠負累官府人户逃亾不無􅂽廢田業関係非輕其他州縣事亦一體如䝉采覧偹申上司詳議為民除免甚副聖天子憂恤斯民之美意公道幸甚蒼生幸甚與孫彦民書伏覧題頋元公祠堂詩語皆事寔且以辨斥􅁋祀表而岀之非苟作也筆之懐古録中嘆賞未已忽州人抄示禮部符文行乎有司禁止􅁋祀令取勘忠臣烈士之属載諸祀典皆奉制集議而行寔為聖朝更化之盛舉忠如元公真宜廟食苐恐里社之人不知東家丘之可敬不為申報良可惜也望先生借重一言詢諸郡邑必合于祀典載之有司􅀊時之􅀕􅀅自兹始庶不負朝家之美意又恐革命以来巫覡之流復以妖像混淆煽惑愚俗軍民樵採或不知禁更乞上陳督府旁及郡縣請給榜文􅃊加禁約尤見先生之仗義也元公在天之􅂕盖昭昭耳某夲合親奉周旋􅆘病齒痛劇其頭涔涔然寒􅀬不可以風故弗能前然視舌尚在且有知已可與之言故不自􅁯僣越而覼􅈁也惟先生不辞緩頬之勞特賜􅀤􅀭公道幸甚元公夲傳就用緘去拙詩奉懐别楮呈似一􅀏慰頋􅀦衡喪父書莫春承令先君書首叙别懐次言覊况驚虞憂患靡不詳悉􅀁喜舊疾新愈惟手顫不能作字又曰顫定更冩詩􅀉可也時予以来人便回即口占一律用代答簡豈意五月六日遽聞捐舘􅀄疑謬未以為信又細詢之果爾大故不覺老淚之􅊜衣􅃑也區區朋友猶此􅆭怛况為之子若孫其鉅痛為何如㢤然孝子之志宜以後事􅂋親務如刻銘紀徳􅄟骨山及以遺稿可傳丗者􅍢板而傳之如此則先君子之亾猶未亾也僕以衰老弗克蒲伏徃弔窃見張司業以詩􅀕韓吏部勉效一篇以陳薄奠因敢僣越相告如前􅀁云諸季洎令子諒惟孝心􅀁同各兾節哀順変僇力遺事孝以盡孝思之情臨書凄楚至禱與陳彦直書古人有言曰􅀲田不納􅂂李下不整冠葢嫌疑之地不可不慎衆口鑠金不可不畏今執事欲以臨濠倉屋就宅上為之意在招致同役鳩集梓工朝夕相與規措監督而成就之至如供給飲食收拾物料亦得以馳驅􅆇􅀗輿􅀠之人為之効力此固忠厚君子之用心視公家之事如家事也然以嫌疑論之則􅀋乎整李下之冠納􅀲田之􅂂知㡬君子可不避乎􅂾日以来事未作而行道之人已有萋斐之言况他日乎吾嘗詢諸執事之􅇧􅁏至親及宗族姻眷朋友相知者皆曰誠有可嫌疑者如前􅀁云但恐拂執事之意不敢直言不敢强諌退而論之謂猶可更張造作之地如郊墟陳渡橋等䖏隣鄊接境宻迩同役執事領䄂于彼使佐貳者各任其責工匠者各展其力凡一切􅀁用錢物公同岀納明白簿書如此則不根之言無自而生矣或于公務之􅂩歸理家政亦何不可斯言也雖出自衆人之口寔合乎老夫之心用是筆之簡牘以告執事葢亦特乎平昔相愛相敬而以忠告朋友之義如此執事勿謂㓗已奉公無可為其謗者昔周公聖人也而四􅀦流言樂羊子賢士而盈箧謗書况今俗薄其嫉妬怨憎揺唇鼔舌者􅀁在而成羣一旦􅄭生謗讟譁然蠭起執事􅀅何術以止之耶苟無術以止之則其患有不可勝言者可不慮㢤易曰君子作事謀始又曰君子見㡬而作不俟終日始而不謀見㡬而不作後雖噬臍恐無及矣區區僣言切希恕察與許君善書春􅀄承諸名勝惠詩盖以社櫟無用之材或能致夀而􅁯其蒲栁之秋也知感知感自是音問曠絶不審動作何似可勝懐仰區區徙居横山日與野翁溪友班荆坐談或泥飲擊缶更相唱和以為娯樂餘無可言者􅂾日前乆雨而晴出門野望欣然見百榖稔熟遥想吳淞江西溪沃壌秋風􅛉稏黄雲滿目真可為先生賀吾兒森得舅氏新田四五畝耕以藝秫度其􅀁􅀵亦可醸臈酒作粔敉以充其親之老饕若先生之家豈不十倍于此倍十之喜亦可知矣千墩諸故人煩問訊併致豊年之賀臨書馳系與􅀽子英書比者周􅂂常来承手誨具審起居安吉諸公多星散􅀁喜孝伯敎諭逺歸及有提舉俞先生寓同里閈相與講明古道或唱或和時以為樂而某違距三百里恨無縮地術以同其樂也如景仰何如景仰何􅇮聞欲著書以䆒理學之藴其他述作必更有之示敎一二可乎吾儕道同志合雖各䖏一方苟能于文字間以古道朂率交相責善視連屋不相徃来與夫徃来而蔑可語者逺勝之矣俞先生未嘗􅂙拜莫敢以此情告公及秦陸盧􅎋熊諸契家念僕舊交勿棄老謬幸賜警䇿則區區未死以前皆可以與聞古道之日也某目雖昏尚可强􅀚大字書耳雖聾亦可以聼人髙聲語但健􅁯絶不能記或欲作一書閲􅂾日而不能成旣成而援筆欲冩又為􅃼然嗜學之意寔未厭也惟諸公念之春晩寒暖不常切兾為斯文慎重與京口俞伯鎮書比小兒去丹陽倉卒附舟不及書問及歸乃言嘗至瓮城以塵容俗状羞去謁見即日仲春計惟天相斯文動止廸吉朝夕􅀙逰或山􅁔野唱以􅆘其􅆘餘無可與故人道者西望長江馳慕而已公居泮宫必多著述不鄙老謬尚希有以見敎近聞丹徒令君死葬魚腹蔚有政敎聲區區恨不得其姓氏事寔之詳筆之野史敢煩髙弟録示可乎本官遺文暨諸大手筆之􅀁記載尤望示警吁喧啾百鳥中忽見􅀌鳳鳴識與不識者皆樂為之一聞耳末由㑹晤更兾珍重答熊元修書頃辱賜詩及書其詩􅀁以開释老懐者多矣書辭詳悉如聆靣言然皆属追理情事非世俗寒暄之問而已䝉􅀁䟦雷震事言簡理明殊有警䇿辨惑編未到書府不知陸沉何地矣今􅂯用一册與鷗盟文送上此文命題葢子虚烏有􅀋也繆悠之談苟合雅意老夫亦得挂名鷗社中不亦可乎愚見以閒叟易野叟之號名寔相􅁛且人皆得以􅁛道耳比聞寓舍有鬰攸兩番之厄而郎囝且為萬里之行懐􅈽欠佳然君子䖏困而亨乃為曠逹况有小令郎幹父之蠱朝夕侍側足以為娱此意此言惟先生然之如某者自去秋為凶人排䧟嘗􅁇以重疾人皆危之頼天之􅂕復延殘喘由夏而秋邨居放􅆘􅂾日患痢自謂必死僥倖又不藥而愈亟命兒軰執筆口授答諸公春首之詩及盡償隔年詩債先生聞之必為我一大噱也與侄僧徳藏主書汝七八􅀊時父母鍾愛因汝父好佛欲令汝為僧身雖在家巳僧其首敎汝讀論孟即兼佛書垂及成童遽命從釋汝母泣而從之時優曇師爲汝祝髪授以五戒汝侍靈隐竹泉師法席果茗之費罄汝衣缽汝父且竭力􅁇之葢望汝爲釋門偉噐至如成佛作祖說法度人皆汝父􅀁望也不幸汝母先即丗父亦客死于兵不能見汝特逹可不念㢤可不念㢤今汝汩没固時之使然兵途􅂾年竟不復檢􅀧其身􅁬勵其志貿貿焉甘于茸闒豈絶然不記汝父之言耶近聞去金陵謁西域髙年之僧受戒而回吾謂此行在庸人則以為可喜在汝則以為可􅀏葢庸人昧理有不知奸盗􅁋􅄭之非或酗于酒一旦受此五戒遵而行之変􅁖為善是可嘉也汝自㓜為両名師弟子豈不曽授汝之戒乎抑西来之僧不以瞿曇為宗而别有􅀁戒乎不然則徃年之戒即今日之戒受而不持徒尓僕僕是可􅀏也吾嘗見佛書説父母劬勞四恩之一也凡學佛者在􅀁當報不知胡老僧曾語及否吾聞汝于二親嘗及俗礼掃墓等事皆不為之其心必曰古禅老有言一子出家九族升天是為大孝惟恐不能盡出家之道度九族之人負乃劬勞為人訕􅀏以為豺狼之不如子心安乎余近者一病㡬死日来稍愈恐旦夕溘先朝露則斯言無復有人告汝故扶􅉵援筆布露肝胆慎勿諱疾而忌醫蹈前覆轍父母􅀁生二子汝兄早殁惟汝獨存春秋􅀕祀奚忍􅀙汝而絶耶似續之計老不可為若釋門祀奉之礼汝亦可為可否則春秋􅀕埽随俗礼以終其身亦庶不􅁯㒺極之報云爾若夫修行之道非吾􅀁知想亦當先務檢􅀧其身􅁬厲其志持守戒律由粗入精水到渠成何􅀁不至誠能如是乃不負汝父平昔之願也汝其勉之至予生平業儒故不事佛使其為僧則衣佛之衣學佛之學凡與汝􅀁言者自當力行幸勿謂言耄而忽之與蘇性可書中秋前一日􅍂雨喜晴晨起坐瓮牖下焚香瓦􅂦三復魏公百韵詩追念令先君面諭之言雖隔一宇宙猶昨日也感慨之餘書􅂾語卷末謹用納上以今觀之前軰如瞻翁先生得正大之學不爲異端紊惑者葢鮮矣幸而象賢有子又篤生磊落振拔之孫及有姻眷如伯逺兄者相與矗立交相勉勵視百家妖􅄭邪誕之說如鵂鶅夜鳴唾罵斥逐不一動其心此僕􅀁以愛之敬之與三俊爲􅁯年交也􅂾日来􅈽疾待斃百無掛牽但恐兒軰于失怙之後爲郷俗􅀁移或違治命吾死之日三君子有能爲中流砥柱者乎伯逺洎令嗣偉正同此致意頽􅉵不克親書必䝉照察與蘇吳趙二心友書今春曹徳升去嘗致書二妙随得報章知中行辟地海濵葢亦􅄐羣而索居也時老夫多憂患中聞之為之悵然荷執中垂念不逺三百里欲賜見訪此情豈泛愛者可同語㢤某二三年来父子邅迍有不忍與故舊言者前年秋木為縣學訓導冐嫉以擅自離役訟之受笞五十斥為乎伯逺洎令嗣偉正同此致意頽􅉵不克親書必䝉照察與蘇吳趙二心友書今春曹徳升去嘗致書二妙随得報章知中行辟地海濵葢亦􅄐羣而索居也時老夫多憂患中聞之為之悵然荷執中垂念不逺三百里欲賜見訪此情豈泛愛者可同語㢤某二三年来父子邅迍有不忍與故舊言者前年秋木為縣學訓導冐嫉以擅自離役訟之受笞五十斥為編氓去年暮冬忽分憲于案牘下求庇府司官曺俱􅀍罪責而木復加五十五杖􅀤鳳陽屯種時某以卧病不能為之聲訴痛苦而巳抑鬰而已某從弟送行至正月中旬負疾而歸醫救月餘屡瀕于危老夫平生􅁖况未有如斯時者旣而病者弗藥老懐稍紓方儗􅈽牒赴臺閣之下以鳴其不平承郡守以毘陵誌書付託辞不􅀗命自春徂夏黾勉校正疲􅉵之軀如堕膠􅃮每一思之涕淚交㵼如此又兩月之餘夏􅀄誌書甫完乃盲左目雖可見天日如隔烟霧由是杜門藥餌又復經月慮恐雙目俱瞽則此志不伸此子不復能救矣于是􅁬不頋死力疾詣憲府陳詞仍以􅁖詩傾冩䑛犢之情頼臺官上下如秦鏡並照灼見肝胆特賜哀憐信宿之間上徹天聼欽䝉玉音放木歸飬半年䧟阱一旦得脱于七月􅀄三日到家老夫先歸兼旬其抑鬰痛苦積于懐􅈽者方若氷釋矣然非上天有以相之不能也非祖宗之遺泽未冺亦不能也頋區區力援其子以盡為父之道寔斯文啓廸之力為多二公吾斯文􅇧肉視木如弟侄者其受禍必為之憂苦其䝉恩亦必為喜懌故厯敘顛末用徹清聼不自覺其覼􅈁也拙詩就呈事亦概見凡知已如玄修子英公振鈞善諸先生就煩舉似或者有以見教則老夫得􅁔詠為樂其幸多矣葢平昔樂于讀書今以目疾而廢但每日飽飯熟睡無有猷亦無可為樂者惟樂此一事以待斃耳未會間惟二妙徳業進修幽貞飬福下情不勝至禱不宣答許鈞善書中秋後一日翰墨到手甚慰馳思且知三書􅄅􅃼垂念愈切䝉薦舘地且玉其成鮑叔之知何以過此但某年既耄矣某子如死而復生有菽水之飬矣苟不知止貽􅀏老􅅨亦違我聖人貪得之戒矣佩服重言敢聞命方竹杖甚嘉受惠感激承問吾兒其事見于送趙書中皆抄去先生視之必重為之戚而喜也荅管伯齡書一别十年相去㡬二百里非惟會面之難而書尺亦不能􅀉清風明月未嘗不思玄度也羙上人自錦里来歸得手札併佳章情誼藹然文藻燦爛足見徳業與年齒俱髙欣羡欣羡娄江之東詞林獨歩又安得尊細論如􅇮年終日竟夕之娛乎然昔人有言心親則千里晤對矍鑠二老扁舟徃来不消十􅂾日程相與訪諸故人于三江五湖之上以􅆘其􅆘真吾軰餘生之樂事也􅀊晚有興當踐斯言奉和来詩􅂓抒情愫鄙陋之辭發一􅀏耳令嗣過庭煩道前悃金陵徃還過敝寓白鶴溪上可乎兒軰曰木曰森皆為農横山之陽廢學可恥䝉郡守過愛舉充江隂縣學職固辞不􅀗去有日矣其如居者壁立何故人垂念故及之餘不盡言臨書馳系與盧公武書前􅀊􅎋文學􅂯赴咸陽持至佳作且極談幽貞之吉甚慰馳想今年春得􅀽子英先生書乃知公車入鳳閣而演綸之筆巳在手矣可喜可賀即日諒惟徳日益修道日益􅂭而文譽日益以著可勝企仰從子森到京問起居併以拙詩一小編呈似盖有學子王尚絅者􅀅欲刻畫無塩出醜鄊里于予舊稿中摘出一二􅀋而編之敢望痛加刪削賜之序引則庶或不爲醬䝉矣徃者懐古録辱有紀載今亾之原稿若存乞更抄示區區棊花手巾并囤碑一本送上希領意􅀊晏更兾爲斯文慎重以迓春禧與陶孝思書比月旦鄊飲而别滿望執事與郡庠諸友同過鄒墓以陪賢太守及官僚之属同爲􅀕埽不審胡爲不来也夫鄒忠公爲道學君子天下共賢之在昔學有祠墓有亭郡守敎官􅀊有祀事二三百年之間遺文尚存非謬傳也然豈特鄉郡如此㢤凡其平昔過化之地莫不尸而祝之惟近􅀊以来郡中之祠亭俱毁奉嘗之礼寢爲廢缺今府公舉兹墜典斯文有光較諸弔萇弘􅀕樂毅屈平田横諸先民者豈不偉欤是行也雖道路之人猶為興感矧學士大夫好古而尊賢者乎某于五月七月間有拙詩二首兹用録似葢以執事相知而下哂也其迂相􅆻而不責其僣必能倡率鼔舞賜之述作若郡􅀶士先生及周儲二妙見之亦必翕然揄􅀭以崇先哲縣學諸名勝聞之又安得不從而作興耶展墓之行想能有日而某又當持一杯以陪沃酧區區別有僣言庶得靣盡矣不宣上武進縣樊大尹請置先賢祠書某嘗聞古者􅀕鄊先生于社葢􅀕社以功而鄊先生以徳而預享焉崇徳報功其義一也近世祠鄊賢于學宫是亦附􅀕于社之遺意其礼可不重欤姑以武進言之若我胡文恭公張文清公鄒忠公霍状元乃􅀁謂鄊先生之表表者前知縣江右董公繕修黌舍嘗置祠文廟儀門之左欲于此祠而奉祀之以秩滿而去遂成曠典今明府視政以来閤邑之事大小畢舉特此未之及然而事雖㣲寔係風化如䝉即此祠宇修設供具崇奉先哲尸而祝之使邑人知􅀁向慕必有過祠下而嘉嘆之者曰今之山川猶古山川也今之學校亦古學校也士生斯邑苟能如前人之賢為丗師表亦得享無窮之祀矣由是而感􅀤興起􅁬勵激昂風聲氣習渾然俱化又安知不有胡張鄒霍之賢相􅁇而岀􅁘愚􅀁謂事雖至㣲而係于風化者此也惟明府不以老生之言為迂而以􅀦家之風化為重舉此盛事以勵風俗斯文幸甚鄊邑幸甚荅崑山􅀽子英書七月望正鬰乎苦􅀬忽承六月廿四日書及聫篇述作逐一披玩快然如清風入懐加以金井水洗面醴泉甘露之沃烟火肺腸也􅁇即付小兒林逹張溝南近林自郡庠来歸云學中諸士友同覌蚶盃之詩不勝稱羡想希尹得之玩味賞識其快意無異于老夫也某白首歸里故舊淪没惟希尹相知為深若思賢録一見即欣然助楮板百片且􅀅率好事者刻之想執事聞之亦以為喜故用語及區區又有一事不避􅏺􅀏專此干托學子王著欲以􅀛巢藁鋟梓因摘􅂾十篇與之名曰摘藁愚意亂道雖多不能盡出醜耳然必大手筆如提舉平齋余先生者畧為序引若右軍為蕺山老嫗書扇則非唯價重當時而名亦為之不冺惟執事王成之某于此先生固未嘗有半靣之雅去年冬嘗䝉惠書以光衰朽乃執事過愛其亦從而愛之今之求文諒執事一語之賜必可得矣他日當專持瓣香因徐見孟以鳴謝悃餘有干凟别楮具陳鈞乞留意朝暮間拱候報音辰下雨凉伏惟講貫之暇多有著述示敎二三尤妙東望玉峯無任馳想與賈敎授書昔郡庠祠道鄊鄒先生祀享而學官復有墓祭由宋而元未嘗廢弛今我郡博士未䝉舉行盖兵革之後學校方興前此或未之聞也區區老生用敢饒舌勿以人廢言與周儲両助敎議之特賜修舉則某亦當采􅅔横山挹泉龍井扶􅉵駿奔以從諸公之後矣兹有口占併以思賢録送上惟講貫之暇電目一覧必有隹作如前軰􅀤先哲之餘光也詹奉在迩書不盡言臨楮馳系不宣與鄊友鄒鈞􅂋論合祀忠公書嘗聞盱江李太伯之殁家無子孫其鄊邑學校葬而祀之􅀕掃不缺也栁耆卿客死㐮陽羣妓金合而葬每春上塜謂弔栁七至今而為美談吁以太伯視吾鄊先生鄒忠公之賢有間矣况栁卿乎夫鄒公程門傳道為一代名臣且嘗以羲文周孔之易論孟之書發明妙理垂敎百丗郡有祠墓㡬三百年不幸因元祐以来有非其種而為似續佳城毁滅殆盡㡬以陵谷変􅁶蕩然無遺去年冬頼有賢太守率僚属墓􅀕碑之仆者植之樵而牧者禁之庶亦無愧太伯之郡邑矣苐吾黨服儒衣冠未嘗持一觴以澆墳上之土視㐮之舞裙􅁔扇者反不及之區區老生感今懐古可不告諸文獻故家乎惟執事乃故家之傑岀者也頋某嘗以忠公之盛徳大業洎諸賢士大夫紀述之辭録為一帙名思賢苟能板刻而傳使觀者知忠公之賢如此則其髙山景行之思駿奔籩豆之敬自有不能巳者景鄒有亭􅂋忠有菴皆無異于古人夫如是則斯文之光鄊土之榮風俗之厚且羙為何如㢤昔人有言曰存則人亾則書葢書存則其人之亾猶不亾也與詹伯逺書前兩年宜興主簿許六月送炭葢其知范叔之寒豫爲之計今足下于此月恵布盖與許公之心同于一誠也老夫雖嘗以小詩謝之今衰􅂴不能措一詞然此心感荷寔不能􅁯知己者必以情恕非簡慢也近得江隂張希尹都事蘆屋篇謹用緘去此老語不過䛕而意有抑􅀭足下宜靣識之餘人􅀁作尚未到手性可賢父子佳章母吝見示老夫自月旦到陳舘代子訓䝉稍暇則以古今名人之詩長􅁔短詠自以為樂殆猶曾晳之嗜羊􅀥也可􅀏可􅀏辰下暑而凉惟樂􅀊優㳺安享清福為慰與李石泉詩某寓此寂寞濵日以吟嘯自娱過客多望望而去有如一泉近仁至則閑坐片時語及吟事者葢絶無而僅有也􅀁需拙作令學子録去諸人視之必有􅀏吾軰􅀁好如柳下之鍜何足樂㢤然自得之樂難以語人亦不强與之語也秋凉過此必留一宿然庶得清風明月之夜傾倒􅀁懐耳聞以一泉為字乆矣近􅀗晤語言乃改為石泉又欲以固夲為字石泉則為道號矣某因足下去速不細論想􅀁以欲改者必有人謂一泉二字竒崛且無岀䖏是大不然夫一泉者謂一脉之泉自源而出非溢羙之詞也若僣效古人之九淵及世俗􅀁矜玉泉之􅀋却當改之况道號宜在晚年随􅀁寓而􅁛之不必拘拘于名字之義回示雅意當為作字説去矣餘文􅈁述不宣荅􅀽子英書秋間領敎帖及􅀤至余先生文叙此葢以執事過情之譽致䝉褒拂如此兒軰得之即鋟諸梓老夫感銘于心豈􅁯􅀁自㢤今拙詩二首其一冩懐仰之情一以謝余提舉并􅀉陽羡茶一褁惠山泉兩􅎆區區㣲忱煩為轉逹􅀁諭毁范蠡祠不審果否抄示之文又不知前軰遺藁耶今人􅀁著耶祠毁于某年月某人言之某人行之耶欲得其詳傳之郡邑使在位君子有倣效者亦遵令典正風俗之一端也某因兒子木入杭代渠訓䝉陳氏閲三四月漁樵唱和無足舉似近作辨訛􅂾十語􅀅與舘人行之録去求敎某詞冗長以其欲掲之菆祠諭彼愚俗不得不然􅀁愧不能言簡意明如古作者欲􅂯得木居士等一二事引用其間惟執事多識前言敢求批示某以兩目昏盲不克詣足下座下細論徒増馳慕而已余先生洎諸名勝同此請益即日祈寒切兾安居飬㤗以壽斯文荅惠子及送泉書一别兩年􅀅渭假舘華庄優㳺蔗境未聞移席縣庠也故昨日于學齋書中有失問訊兹承賜詩與惠泉偕至不勝感激遂即刻奉和以抒謝忱曰龍山只在片雲間不到山中四十年多謝故人知渇想瓦瓶封􅀉煮茶泉一􅀏一􅀏學齋回更煩尋水符之盟毋使山􅂕􅀏人寂寂也竹山詞乆為烏有弗克奉命􅀊晏未由晤言惟善保為斯文夀與曹師禹書昨詣魁塾值入郡未回絳帳之下衿偑仍集賢主翁代嗚敎鐸清風穆如歆羡而退老夫藏六如􅀛亦有時蹣􅘐于西枝之西東洲之東如曵尾泥塗者近聞里中有孝感事心甚喜之作小傳為記其寔片楮録上敢望與寔翁徳和諸名勝交相潤飾賜之咏􅁔庶㡬觀民風者採摭亦可為聲敎之助云爾與永慶雪心長老書比承裹茗過寂寞濵誾誾話言殊可人意且䝉以清節處士徵予文義不容辭然别後思之似難以􅀞竹之羙遽用為號嘗觀古之人以號著稱者多矣姑舉其一二言之若晋之陶淵明門栽五栁因自謂五栁先生世以不事二君乃以靖節處士稱之非自號也陶弘景掛冠神武門歸隐華陽洞人􅁛華陽隱君後賜號華陽真逸唐之張志和待詔翰林以母殁不仕居江湖間稱烟波釣徒後賜號曰玄真子亦非自羙也白樂天平生􅂋官晩年放意詩酒自􅁛醉吟先生及與香山僧滿等結社􅁛香山居士而巳宋徽宗以徐仲車不仕為孝民栽木連理甘露屡降謚節孝䖏士歐陽公以劉凝之棄官歸匡廬作詩贈之有曰丈夫壮莭似君少其後朱晦菴為作祠亭扁曰壮節皆非架空立説也由是觀之曰清曰節詎宜自􅁛在他人亦不宜過情而譽之今王處士之家或有清節可愛之竹以寓名稱或與丹丘羽士為方外逰即以此意淡然為號豈不韙欤今画者鞠躬問道于師之像置諸􅃃首亦人􅀁未曉也是皆待公與之論定批示詳悉方可措手拙直之言必䝉領畧秋暑尚熾惟安飬為宗門自重稍凉造見以謝先施并盡􅀁懐臨書不勝馳系荅集講主書八月􅀄承書及詩乃知仁祥二長者一在九京一居濠上前聞陶生之言皆謬也誦詩驚怛而嗟嘆之迨今未巳惟髙隐清修得大自在且與諸親友及宻迩者逰從如昨可敬可羡􅀁諭聼雨篷海萍等作丁寕􅂯四義不容辭但昏耄無可人語兹用稿呈煩為潤色庶不為二公之醤䝉耳兒子林去冬臘月赴新鄭縣不得奉命若海萍之詩必得釋門善知識以上乗宗㫖􅀤揚方盡其妙非兒軰章句詞儒之􅀁能也如老夫者亦臆度想像而巳淞南小隐􅁍易可作亦煩先得其詳方可着筆區區管見改日細論有恒振諸吟伯求賦錢孝女詩煩介意取􅀉吕克宅專望專望更兾宗門自重不宣與林掌敎諭請建先賢祠書夫學校以明倫為夲育才為風化之􅀁由出也如追慕前賢褒嘉忠孝節義等事樹之風聲使化行俗羙則于學校之敎豈小􅀘㢤汝令􅀁職不可不知此先務也吾聞新鄭為古名邑邑有東里子産故郷宋歐陽文忠公之墓在焉此二賢者一為鄭之賢大夫事見春秋傳等書不毁鄊校巳大有功于世敎况其有君子之道乎其一以道徳文章為世師表力排異端羽翼名敎配諸孟韓功亦􅅷矣凡過而知者當為起敬邑之人可無桐鄊之愛乎汝今多幸奉天子之命領敎兹邑訪求古蹟知有二賢理宜考之簡册􅂙之礼經告于當道請置祠學宫是亦古者祀鄊先生于社之遺意也釋菜之礼以誠以敬母事繁文尤不宜用丗俗楮鏹如賄賂然其祠堂供具亦􅀙簡古毋事華飾􅀁費之資當割俸與諸生及賢士大夫恊力為之慎勿為邑氓之撓愚見如此未審諸名公以為何如與熊元修書昨者不以衰朽自棄徃訪故人滿擬細講道誼傾冩素懐奈何以目􅌌加以􅁀疾不如􅀁願臨行辱厚餽不能謝別䝉諭􅁋祀雖以懐古録薦呈亦不能面議攘斥之意悵然而歸連􅂾日􅀁患不痊時室坐卧因思洪武􅀄親覩詔條㫁除塑像今彼無知民不以頋元公忠藎為忠而以俗稱金家神之􅀋羣然土偶玉石混淆非惟循蹈前覆轍有負前人且違今代維新之命宜于里中及守祠者示以礼法悉以屏除設木主題曰晋散􅀐常侍頋元公之神庶得上遵􅀦典下息邪説豈不韙欤想先生以足疾􅀁沮忿然于懐莫若告諸鱸鄉隐者等一鼔作氣仗大義而為之不啻如摧枯拉朽耳某寔以衰病不前此舌尚存豈容嘿嘿先生與諸公必能矜察非徒為是嘐嘐然也乃事顛末具載周左丞記中請稽考事寔合宜而行慎勿為狺狺吠雪者弛焉雲山相望顒俟報音夜来兒軰誦佳作于孝友之事議論抑􅀭詞意古淡非泛泛者可比小兒求引年詩尚希賜教鱸鄉諸吟友二詩兼得尤佳􅃈碎不及各書煩為引忱臨楮馳系不宣與吳中衡書别後第三日小兒以舟自無錫問津到令親􅃽宅滿擬請閫孺人與老妻兒婦軰少聚奈何如燕鴻相避悵然而歸然令岳母老安人在彼養痾賢夫婦必有候問之日望乗便過寂寥濵茶話以償􅀁願鷗社翁􅀁言􅁋祀愚意以執事寓居長洲難與里中等語鷗社軟脚疾雖厄健歩或可以古今理法告諸鱸鄊隐者􅀙容而為之則無以異乎老夫奔走先後也尊翁挽詞併舊文録上􅀁領厚惠舉室知感同此申謝到千墩王有恒處更煩索引年集求諸公詩賤累老妻而下兒軰等皆嘱筆問貴眷起居併奉相過之約區區懇禱不宣與馬公振諸故人書比到千墩􅀩祶􅂁恋恋日與周旋弔死問生悉如􅀁願又􅀗賛成思賢録事欣幸佩徳没齒不忘但不得一登草堂連床夜話荷執事以目疾見憐弗責爾如仲昭甫孝義恭謹􅁭度恢弘雪篷叟敬老愛客挺拔出羣其禮意皆溢乎欵接餽贈之外有可思而不可忘也南澗海萍二法師􅁯形而知心有恒濟民二􅆻家愛敬而盡禮明善則篤親戚重師友才識兼進尤為可喜相見煩一一道謝别後到陳溪信宿逢人説項無不欣羡思賢録命刋書者為之為無梨板未得速成想中秋前王猷訪戴之日書成則偕徃晤言特未知病眼為何如耳執事詩已編録孝女詩于吳彦徳處取至但欠伯齡先生等作尚有望焉諸公賜引年詩多多益善更煩􅀤去中行兄處盖熊毛諸吟友欲作故也老夫重改去慈竹軒詩尚兾羣彦以郢斤交斲付明善入卷無致為大方􅀏仲安賢良彦清昆季同此致意不及另書草草答謝袁子英先生書性中上人来承問吾子早世以詞哀之以雞酒􅀕之存殁知感即日莫春伏惟師弟風雩詠歸追踪古人賸有樂地老夫可仰而不可即也自去夏以来目昏則見人不能識認耳聾則低聲語言不聞齒髪皆脱落㡬盡日食麋粥殘喘僅存然此心好古嗜學不减疇昔時令小孫軰近立侍傍髙誦原道西銘太極圗説等篇不􅁯素志奈有時以目前平地風波爲之驚憂恨不得與亾妻相􅀙九原之爲愈也謹此奉謝併述潦倒之状如前􅀁云晤言無期切兾善保以享清福不宣與姜天定書前者得挽詩二首吾子㝠㝠之中必知感髙義老夫亦知􅀁學非舊阿䝉但不克一相見與細論不識近日爲醫爲儒專于何業少暇可過潞城與小孫同到横山啜清茶說淡話就煩刪择舊稿􅀋抄别帙盖年来兩目昏盲謄録者字多差誤得正是之庶免後人之􅀏耳有一舘地就議可否寒家雖遭兩䘮皆不用世俗􅀁尚之礼足下之来無勞虚費夫貧者不以貨財為礼老者不以筋力為禮此古之通義也但近年朋友道喪不可不講風俗甚薄宜敦勸之若吾友吳啓之父子王季髙叔侄令弟周輔等皆平昔有見識者有議論者聞吾軰講今古必能輔相激勸以篤人倫以厚風俗曽子曰人之􅀅死其言也善請誦此以速其行老夫衰頽不乆于丗遲則不復論此古道矣良可惜也偶有謝新鄭張宰一詩録去過目觀其仗義如此薄俗之敦亦庶㡬焉與袁耕學書比在崑山四十日凡新知舊交青目頋盻赤心觧紛指迷途挽頽波者皆知􅀁自也况飲食交載禮意俱􅂭老夫與子孫軰感銘心􅇧有難以筆舌盡者會間煩一一代謝六月朔到家布帆無恙但病目赤爛兩耳益聾殊覺厭丗若友文齋扁煩先生為之孝女事政宜上旌善亭表著以遵令典以厚風俗其移文立傳事合詳明宜大手筆為之吾軰當􅀙而賛美可也姓名年紀􅀊月日時得批示一知尤妙即日暑雨希倍加珍攝為斯文夀與俞彦智書昨到崑山故舊中如耕學先生􅂕光巋然新相者知皆可人意惟執事削去邉幅能仗大義能勤小物能刻畫無塩以衒其羙老懐感銘之死奚􅁯兒子及孫感亦如之兩文皆納上幸恕稽遲即日秋暑諒惟起居安􅆘酒邊清興必多然狂客之號但當風流如賀季真以稱其名至若滑稽太過或􅀏中有刀以貽後患詩曰善戯謔兮不為虐兮聖人于三百篇中垂戒如此宜保察之老夫托厚愛饒舌􅂯四葢區區如愛羙玉恐汚于蝇聲􅀤于心不忍緘黙幸毋責焉坡翁詩案曽䝉許借望付至小孫軰一覧秋冬即當奉納臨書懇禱與海萍講主書崑山延福僧舍中面􅀗晤語知平地風波􅀁在有之逹人大􅀚必不芥蔕于􅂕臺也㑹後抵家不及言别想已還湓溪安稳清􅆘老夫以思賢録刻完追感王仲昭處士獨成其羙義不敢忘今以此書一部送置􅂕几吾友出于宅務之餘不時誦讀以忠義視為規式黾勉以循蹈之則先尊深為衆賢之喜也揚子曰希顔之人亦顔之徒惟誘掖奬勸以玉成之醉琴賢賔主續當印去懐㢤昭甫無任悵惜與余茂夲通政書昨到崑山得傾葢如故者􅂾人而執事開誠心論古道片言隻字商畧可否其謙益有過人者逺大之噐豈易量㢤况飲食餽遺禮意兼盡使老夫及兒軰感佩而歸未知􅀁報嘗凂作亡子挽詩必䝉留意望付至以光泉壌區區贈無逸一詩煩為轉逹令親雪篷髙隣仲各會間呼賤名致謝即日秋暑更兾節哀慎重以終禮制臨書馳系與張子才書曩􅀊承􅋈舟東郭知老夫坐分鷗沙賜以專席奈交臂而失候歸帆者兩三月而後巳去年秋亾子辱諸君哀挽之詞小孫裒為一編名幽光録今年重九為予泣而誦之且曰公有一詩别􅁓見寄乃令􅂯四髙誦使予泚䫙􅉭背想小兒九原感作亦如是耳縁来詩􅀄到之日病目昏盲致使明珠暗投不曾荅片言以鳴謝臆殆若􅁯故人綈􅂁之高誼其過奚文其過奚文自春以来衰耄益加公聞之必哀矜而弗責也次韵一詩􅂓抒情愫併想像肥遯之樂而嘉之餘詩用以見老况如此之􅁖薄俗如此之甚請與野居先生過目同發浩嘆晤語無期東望不勝馳仰惟髙隐自重不宣與陳彦直書去冬見安道䝉玉成思賢録書板常恐如畚土爲山功􅃜一簣死不􅉂目今完矣印去一部以踐吾言候有暇日岩電一過則先賢忠孝之道足以私淑授兩令子亦可爲進修之助焉聞尚絅諸友自有樂事不􅀤去爲醤瓿䝉也俟相見當盡􅀁懐兹不一一與王季髙書昔者䝉先尊延置西熟二十餘年敬爲賔師愛同骨肉想足下能念其親必不􅁯其親之􅀁敬愛者老夫之心寔亦未嘗忘也聞令嗣聪明可敎摘藁一夲送去與之又一夲送令侄孟凱之子此生從逰姿質亦甚可喜區區拙作譬若滄浪孺子之􅁔善聼者當自有􅀁得亦庶乎進學之一助言耄而繁尚希采擇與曺徳聲書歸耕之文承命􅂯四不容以言耄辭今腹藁􅀄成令小孫録去若文意有疑處脱畧未惬雅意處無吝批示當􅁷思之辭雖不工皆親家􅀁吐之真情􅀁處之寔事無虚褒妄貶以累懿徳吁歸耕如此植業如此二親之樂又如此風敎氣習里俗可敦草茅之言庶亦無愧區區恃肝胆相照布此真情非足恭也又昨承手敎并惠佳布足見崇重斯文之意夲合拜嘉但􅂙在􅀲􅁑居常多䝉眷愛雖辭之感激拜嘉但忝在􅀲􅁑居常多如受之也改去拙作頗盡老懐尚恐有説未到處無吝喻及吾孫或有􅀁見亦可説来老夫平昔不諱疾忌醫凡于朋友中商畧文字亦必忠告未嘗靣是而心非也早晚相見當盡􅀁懐即日寒煗不常切希順時遵飬以迓春禧與袁耕學書去年夏五客崑山以詩言懐辱先生于詞林八俊释門二老玄都一髙士􅀙而和之聫珠合璧皆歸錦囊且欣然欲賜序文裒為一卷以飾衰朽自秋徂冬懸懸在望新春得辛老書聞别有髙興此詩卷豈置諸度外耶或有人作殷洪喬耶區老痴望猶未巳敢請滿其􅀁望焉與髙彦述書徃来之禮尚矣然事有不及又當以情恕之不拘拘繁文末節而求偹焉􅀁以為君子之交也且如昨者家下小孫歸妻相邀茶話值足下以令嗣婟期之廹不暇過訪若此真情吾何訝焉今老夫夲天地一無用人了無覊絆深欲去賀足下醮子奈手足俱瘡􅂰灣尤甚攣拳痛楚不能屈伸及臂無完膚行坐皆不可得而難徃矣足下亦必以真情恕之况小兒有出不克代行千萬莫遣人相招徒勞徃返亦不勞饋餉如舍下以區區􅃵胾送人皆成臭腐空為文具耳老夫待瘡疾旣愈必到宅住三兩日晝則同嬉市㕓夜則連床清話飲之食之無􅀁不可吾知宅上乏僕無異寒家天道暄暖甚于前日幸勿勞心役人蹈吾覆轍也吾兒森揆時度物同吐肝胆如此唯足下聼之信之而為知心之親戚矣與辛彬甫書日者令似歸曽致書問并凂求諸公賦節婦詩想留意朝暮專望􅀉示令似有老夫􅆘永懐寺詩稿就煩抄至今緘去邵濟民􅀲隐詩此公為貴縣官醫必有行舘敢勞一寄幸勿浮沉耕學先生暨陳朱尹吕諸賢諒惟起居皆安文譽益振􅀁求珠玉早賜壓卷區區嗜詩如嗜飲食幸毋哂焉臨書懇禱不宣與任義甫書人之􅀁貴乎有子者生而事之死而葬之􅀕之先王制禮用是以長其恩愛其来尚矣但近代禮廢俗尚浮屠難于改易比聞主婿之喪始欲茶毘此則释氏之敎也衆以爲戾法而尼之其餘佛事􅀄不相沮子乃屬纊未定而榼棺赴音裁行而􅀤靷銘旌不立三虞不􅀕一切喪具皆謂無用是不畧遵古䘮禮也然大小事佛亦皆不作使其子􅀅何以表孝思之情耶若夫􅂕帷題神主不稱厥考又何以致其子如在之誠也耶死而有知不能無憾先王之禮未見其然释氏之敎恐亦不如是之謬也以禮論之莫若令外甥改題神主曰􅂋考某官之􅂕旁書孝子某奉祀如此則名正言順存没皆安無餘憾焉且如虞􅀕不設以􅀁用之資作為佛事内以塞一家之責外以觧衆口之嘲抑亦可以敦孝順厚風俗也老夫忝在􅀲􅁑愛如弟兄不避譴訶故用忠告惟伯大叔立諸親􅀙長􅀙心勇而為之與孫彦銘書臈月既望兒軰在周石泉處持􅀁贈節婦詩歸詩序中過辱愛敬謙卑之光與文熖俱髙不啻得􅌐龍之珠連城之璧也䝉索辨惑編併拙稿兹用納上譬若人有痼疾掲之大途尚希遇倉扁而為之藥石耳應芳就禀犬馬之年今九十有一矣去冬􅀄度荷鄊中諸朋友贈言成軸如䝉大手筆刻畫無塩粉飾衰朽得不以為蒿里之􅁔乎即日新春伏兾以道自娛為斯文夀不宣回黔陽簿長孫書别去􅀅半年家中老㓜皆安舊冬橘客傳菜石信知布帆無恙為喜今皂􅀠二人至知汝到京來書取夏衣書冊等物一一付去汝途中作詩固好但到任之後當以佐令丞治政為重以稱厥職有暇則細玩律令􅂙考經訓日夜䆒心决不可作詩作文有妨公務最要􅂃者正己以待吏毋致欺㒺循禮以待同僚毋黨毋偏諸事勤謹庶不負朝廷付托之意平昔家訓更不􅈁述惟吾孫念之曽有二詩正月半􅀉新河周亢吉子去恐未到與陳徳廣書某早􅀊失怙縗絰中䝉豸官品題光生腐草俛焉就學覬有少進奈駑鈍卒無􅀁成無􅀘于丗于是掇拾古聖賢遺訓綴辨惑一編􅇮幸公為邑丞孱工刻板今增前賢趙學士昞􅀁著葬圗其説夲乎周官義理昭著良為可法但欠知夲官封謚乃有缺文欲得元史考䆒三四年来嘗于江隂無錫丹陽三縣學干借俱云無之干諸士大夫相識者亦然愚恐溘先朝露貽􅀏後人用敢􅂯凟望于宜興縣藏書之家特為轉借趙公夲傳一夲明説老夫好古之痴如嗜吐炭人􅀁不堪自以為樂有能使之厭飫其為欣幸死而不􅁯即日雨凉惟琴書自娛坐享清福臨書馳系不宣答吕克明求序文書某奉白昔者左太冲賦三都玄晏先生序之張茂先見而羙之然後傳冩者衆而􅁓價為之益髙至如陳師錫序歐史半山老人乃有糞􅁾佛首之􅏺吁序文之作可有可無此又不可不知也彬甫来以􅀁著之册徵序予以目􅌌不能閲其文之羙而贅一詞又以長孫有无妄之灾􅁖况滿前㒺克搆思􅀄非縉紳見􅏺而固却也然予嘗聼人誦三敎圗等篇善為抑􅀭可喜可喜今足下年妙如此敏學如此㸑同椽竹何患乎無賞識者乎區區耄言幸希恕察與張子才書前􅀊和髙作甚愧稽緩相去逺相見難然相敬相愛之心如故即日秋髙想林居優㳺恬飬清福某老状如糞土墻加之風雨頽在朝夕否則芝茵之岀慈土或有日焉敢請與執事言之野居先生義士也人皆曰早􅀊有杜季良遺風非予􅀁知予􅀁見者戎馬搶攘中由錢塘来長洲以故人趙某舉家病疫親戚無過門者先生褁藥活其兄弟妻子凡五人又如起閑居俞縣丞某之瘘救東滄賤工某姓名者如虺如瘵如餓莩而􅂯生皆餽謝而不納至如儒而緇衣黄冠貧而清者亦如之吳之人多以是稱焉予乆欲效埜史作小傳以勵薄俗􅀁謂糞土而岀芝菌也煩執事以平昔􅀁見􅀁聞枚舉録示更煩訪諸士夫必廣有之區區失記趙俞等名氏質之野居可也便人過常郡􅀉至城東申明亭劉文中家苐恐溘先朝露罔克踐言尚希矜恕不宣與吳中衡書十月旦得手書併文知連年情况不如􅇮昔然天時人事易地皆然無可奈何􅀁喜厥疾既愈養生有術珍重以盡天年可也䝉諭墓銘古之人夲無生前預立體制来意甚切交情至深雖盲聾齒痛舉身瘡瘍勉强腹稿冩去中間用硃筆批處令賢郎􅀙寔填冩令閣之賢巳于中衡墓誌見之不必别作子􅀕父文古人别無之葢擗踊泣血之際何暇作文如􅀤靷等事只用祝板直述家礼有式可考不敢杜撰若伯叔􅀕侄等􅀋却有之幸勿見訝小孫垣今春軍役乃兄塏去秋巳死老夫曽有口號云云現存寡婦􅀌女六人㓜男九􅀊屋巳賣田多荒吾兒現在横林橋南張家訓䝉託庇無事森因舊年廵欄而貧餘無咎宅居何處土産何物有便人令去問安也賢郎名某字某年若干子女若干亦望見報兩子孫三世之交亦古道子才賢良及諸故人子孫相見者皆呼賤名問訊區區不宣賀府學敎授到任書某早􅀊嘗聞之師曰凡府學官郡爲師士當以師禮尊之是故聞先生到任􅁯其雙目之盲兩舍之遠即扶􅉵徃為斯文賀可喜者謙光和氣待人接物至諸生則嚴條約以規之􅀁謂道並行而不相悖也區區䝉飲食􅂾載禮意過厚感不容勝其大可喜者親承聖天子命以明倫育才之道諄諄乎命之増重斯文之恩至渥也别来三月逢人語之或曰常郡于八九十年之間屡經兵燹衣冠文物蕩然無遺欲其一鼔作氣變齊為魯不亦難乎是大不然夫敎官重于朝則縫掖之士重于野况有賢太守承流宣化相與作興風動一􅀖化行四邑則犁鉏帶經者有之牛角掛書者有之負薪持竿而誦讀者有之正不待家喻户曉而使之然也一榜三魁􅀅復見矣其文獻之光煥乎八紘又豈僅一郡而巳哉某不揣愚陋嘗綴思賢辨惑二編兹用送逹或可為學校涓埃之助云言耄而繁切希矜恕不宣􅀛巢藁卷之十二終
