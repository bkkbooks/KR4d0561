front:
  text: 寄因本初講主愛爾呉江水西寺門前流水碧于苔松花布地金無數蕉葉繙經紙萬枚講席每留詩客坐浴堂曽為國王開别來雨洗秋容净凉入袈裟亦快哉
  hash: sha256:abc256f573c64836b785fde33cd0d9680a2282054597609ce4c65c1746563cac
body:
  text: 寄謝楚芳鄉城一别十五年别時𤣥髪今皤然無聲詩與有聲畫彼此贏得虚名傳君家有子為時出且喜讀書兼讀律絶勝吾兒但筆耕三徑蓬蒿塵滿室老夫宿如龜六藏思君見之羮與墻移家同飲太湖水尚期東壁分餘光代簡崔宗明掾史孤坐馳遐想羮墻見若人宫墻今畫省家世舊朱輪南國梅花早北堂萱草春慈顔應有喜過客總儒紳二落葉擁柴扉吾兒日暮歸手持毛義檄身著老萊衣客路風塵乆青雲故舊稀何當報一飯不遣此心違夀徐主簿昔君濯濯如春栁鞍馬日隨丞相後翩然提劍掃蠻煙欲取黄金印如斗一鞭徑渡浙河東東南滿眼旌旗紅手援赤子出塗炭慈溪草木生華風長嘯歸旌行復止濯髪淞江太湖水鱸魚蒓菜非不佳總憶家山舊桃李君今草堂宅東郊有田可耕山可樵堂上慈親足甘㫖相知與結桑麻交金門玉堂紫薇省無復回頭㸔畫餅但愛鵞溪秋水清雪色蘆花一千頃豪吟往往似謫仙但不持盃醉花前盃中之物時有禁煑茶都費惠山泉龜巢老翁不浪出逺來為君作生日草堂此日題此句風竹四檐吹􅓋篥申仲義録事自杭州來議論慷慨風節可喜作此以贈客來試問錢塘事冠葢都非舊日人尚喜西湖堪種栁不知東海欲揚塵手題王粲登樓賦頭戴陶潛漉酒巾如此江山如此客政須傾倒洞庭春和沈啟之立春作何物淮夷學井蛙東風依舊滿天涯春盤薦酒盃頻舉醉筆題詩字半斜無數故人俱契濶一雙老眼近昏花家貧頼有長鑱在坐待青山長蕨芽徐伯樞仲剛來云鄉僧闕刺血寫華嚴成好事者為之盛集緇素送經至呉門無量夀庵時有人以兠羅綿化佛手觀者異之贈言盈軸徐伯仲徵余詩不已故檃括佛氏作此貽之吾聞兩足尊化身千百億諸相即非相非空亦非色云何兠羅綿變現佛手出華嚴海無量本無塵可拭隻手挽頺波正頼佛之力譬如水中月在處照澄碧若以色見之癡雲暗如漆由來標月指具眼當自識暮春陪周明府過顧將軍祠下碑黄天蕩上將軍樹樹下數家人姓顧行人遥指若堂封往事猶論麾扇渡新祠畫藻煙霧濕古木埀羅鬼神䕶長洲縣令枉髙葢短褐巢翁曵雙履海棠正落胭脂雪山缾為酹金盤露柱頭老鶴作人語道旁馴雉隨車駐呉趨一曲歌未了蜀魄數聲春又暮金戈鐵馬尚酣戰白羽清風復誰睹㸔碑莫怪客如雲彼君子兮真可慕端午日徐伯卭過寓所以詩見示次韵南湖風浪惡客至喜且驚連日雨不止明朝隂又生划船海中歸戰鼓江上鳴端陽一盃酒忍聽歌霖零簡徐伯卭淮海十年猶亂離清江一曲自棲遲門前纔送催租吏籬下還吟採菊詩世事紛紜何日已襟懐瀟灑少人知卜隣欲近蘆花渚我亦扁舟理釣絲寄徑山及以中長老重攬凌霄絶頂秋歸來笠澤繫孤舟青山何處無黄犢滄海相知有白鷗六合雲開天蕩蕩百川風静水悠悠試聽漁父滄浪曲江上蘆花亦㸃頭夀慶治中日下歸來年復年之官未上浙東船人憐埀老身長徤自喜居閒志益堅好客毎呼隣舍酒教兒不惜買書錢試㸔尚父鷹揚日渭水秋風雪滿顛次韵寄題碧雲禪老上海縣山居青松種來過屋長松濤六月生秋凉香凝笏室静如水道人觸法俱相忘二住庵人似南泉老無數青山在屋頭眠鹿堦前金布地西風吹老桂花秋三門前問話人立雪想象吾家㳺與揚靈禽盡得響天樂老鴈獨憐隨稲粱四海上諸峯絶㸃埃浦泉流水碧于苔何當借與梅花屋我亦移家嵗晚來又和律詩笠澤東連海好山青更多逺分苔脯供兼寄草菴歌拄錫僧方去攜琹客又過送迎門不出奈爾懶融何寄沈德齋入城每問東林老避地今居巢海頭秋半即嘗菰米飯冬初已著木綿裘青衣擣藥隣鮫室烏几燒香對蜃樓我欲移家相近住釣竿煩為覔滄洲為源長老贈醫士單子達老我無他伎憐君正妙年父書能盡讀醫術得親傳舊隠荆溪上今居笠澤邉幽蘭紉古佩采藥洗春泉鶴守燒丹室鷗隨載酒船毎聞驅二豎近喜活枯禪優鉢微含笑頻伽喜欲顛却還青玉案持去白雲篇髙誼能如此明時豈舍旃政須醫國手為我救顛連普大雲講主以紈扇畫蘭見惠作詩謝之時雲在呉江普度院講法華經學徒甚衆上人遺我白團扇扇上復為蘭傳神足知清興迥絶俗更覺幽馨時襲人猊座講經雙樹下龜巢織屨五湖濱明朝相約㸔山去不怕西風揚逺塵寄朱原道昆季太湖三萬六千頃流血水腥江海連㡬處焚舟成赤壁有時飛礟落青天雞蟲得失那能問鴻雁飛鳴亦可憐若箇桃源堪共住也須容我釣魚船臘月三日偕俞寛仲過篠涇僧舍䝉舉似近日詩次韻一首故國溪山各逺離倚樓長笛為誰吹相逢上海三生石共惜邉風兩鬢絲客舍暫如桑下宿世途危甚劍頭炊明朝裹茗西菴去更約匡衡細説詩勁節亭詩為中半雲講主賦我本山林人此君與群居頻年避戎馬出走荆棘途雙溪適相遇嵗晚氷雪餘蒼顔固云老清氣方凛如儼然古君子節勁心仍虗紛紛桃李花榮悴纔斯須長松髯似㦸亦作秦大夫我思首陽山竹君兩遺孤髙風激頺懦氣節與君俱之人不復見見君如友于此意知者誰居停老浮屠緑琹為我彈碧酒為我沽萬事付一笑嗒然我忘吾懐徐伯樞諸友憶昨方卧病妻子呼避兵扶持上輕舟烽火照夜明問兵今逺近言圍闔閭城頼有風滿㠶送我東南征三宿坐不寐鶴鳴近華亭晚泊青龍江蘆菔匝地青新知適相遇留我居篠徑土風頗淳朴地僻雞犬寧吾病日已瘳客來能送迎老叟心自憐或謂詩骨清比鄰兩三家情親若平生園蔬日持送酒壺時共傾對酒不能樂艱虞未忘情懐哉數君子雨打水上萍漂揺各何許吾將尋舊盟賣刀買黄犢子孫共春畊奈何西枝西礟石猶雷鳴偕俞寛仲逰普光寺俞作詩紀行余和一首繞屋踈筠玉有光沿堦細草翠生香林藏鹿苑雙溪曲路轉龍江十里強蕉葉繙經人自樂槐根做夢蟻何忙白衣二老來聽法甘露醍醐得試嘗臘月廿日㑹林才元于普光方丈詞氣峥嶸吐玉虹山林興與老夫同獨憐幽草來西磵共聽枯桑呌北風四海十年兵火後雙溪一笑夕陽中評詩為掉樓卿舌殊勝儀秦諂七雄送和彦良兼簡朱端卿移家喜得好林泉甫里先生古宅邉憂世頗添新白髪校書還坐舊青氊秋風茅屋都無恙臘月梅花正可憐我有古人多古意斷琹煩為續朱絃贈張孟文青龍江水清如玉青龍故家書滿屋中有郇公九葉孫一目五行能盡讀科名未欲拾地芥燈火長如校天祿有時述作繼風雅三國六朝車並轂手揮赤血㧞鯨牙琹斷𤣥文裂蛇腹雙溪近傳寒食句又出唐人一機軸相逢説項人益多宛見清標立霜竹吾生愛詩入骨髓老去窮吟鬢如鵠金張許史懶折腰沈謝曹劉長在目江頭偶泊避風船故山將歸采黄獨金盤不必贈檳榔願覔奚奴珠一斛次韵贈本蘭上人庭前手植娑羅樹樹下頻繙竺國書失鹿不知秦二世𦵏魚那問楚三閭園收柿葉皆新紙林養松花當宿儲十里雙溪春水綠浮杯待復訪樵漁余患癰疽適兵後無醫藥可療即事口占并寓感歎吮癰人在五侯家市肆都無藥可賒童子歸來風雪夜老夫愁絶對梅花次韵徐伯樞見寄病卧北山乆愁添白髪新一冬無雨雪四海尚風塵妻子移家逺親朋折簡頻梅花應笑我出語欲驚人二客夜牛衣薄王春鳯厯新東南蝸角地多少馬蹄塵鼙皷依然急壺觴莫厭頻君㸔塞翁馬得失豈由人奉贈薛宗師及于薛二真人論道清寧日承恩紫極天星言辭輦轂雲卧樂林泉虎衛燒丹室龍畊種玉田居山閒宰相行地活神仙清問時猶及𤣥談世共傳春秋今近百弟子動成千入室稱于薛承歡度嵗年蓬萊方丈外磧隩澱湖邉别墅三花盛深居萬竹連玉桃紅綻雨瑶草碧生煙麟脯供仙饌鸚杯舞醉筵雲璈齊上下霞袂各褊􅝆福地風塵逺壺天日月懸目光方炯炯眉夀正綿綿老我頭埀白尋師志在𤣥飄零隨草芥佩服集蘭荃欲進圯橋履重來笠澤船山靈原有約石髓未應堅析理秋毫末研㡬太極先黍珠當一照光彩徹天淵早春訪蔡君立家以詩見贈次韵荅之老夫藜杖病初起幽谷蘭花喜正開持酒對花留信宿賦詩題竹約重來一犁新水初春雨百蟄皆驚半夜雷嗟我無錢堪買犢歸畊心亦冷如灰正月卄三日過許君善竹所留六日日蒙置醴且出諸畵巻命留題焉茅屋秋風杜陵老桃花春水許家墩連宵共剪西忩燭每日頻開北海尊童稚問譍知揖讓鄉鄰見客問寒温遲留不厭逢多雨喜得題詩萬竹軒余過横塘訪趙朋南先生值回錦溪遂留許徴士家雨牕因覧元夕之作次韻代簡行路難行乆不禁尋君欲吐别來心十年飯顆詩容瘦一病文園渇思深鹿浦繫船逢積雨客忩拄笏見遙岑誰能縮地仙人術共聽花枝快活吟安素齋詩為髙彦舉作羲皇世云逺淳風浸彫零紛紛慕浮華形役心靡寧惟爾為觀者於物澹忘情天君常泰然月白霜潭清羙玉非不沽沽之價連城向來莘野農釋耒即阿衡磻溪釣魚叟飛揚乃如鷹湯文茍無遇耕釣畢此生懐哉古之人安素斯足稱溪西小隠詩為許君善作馬鞍山南三十里鹿虞浦接横塘水桃花兩岸小橋西蘿屋數椽修竹裏先生頭戴烏角巾青鞋不踏東華塵扁舟溪上釣明月長鑱隴頭鋤白雲客來㸔竹呼隣酒客去對山開北牖琹彈古調每横膝筆冩新詩長在手自言得句如得官富貴却作浮雲看青山有約如不爽白鷗之盟奚可寒箕山乆矣人寂寞眼底誰能如此樂文章多樂鸚鵡洲衣冠俱上麒麟閣老夫幽懐欲與論移家今近西枝村風清月白憶𤣥度莫怪杖藜來叩門題孫彦學所藏江貫道清江汎月圖吾聞老郭之傳許與江山水絶筆稱無雙此圖夜景江所作彷彿秋聲動林壑長江澄澄月在水逺山蒼蒼樹如蟻如此江山夜放舟若人真是逍遥逰爾來一百四十載陵谷變遷畫圖在世無蘇李兩詩仙赤壁采石俱蕭然老夫此興固不少觧裘亦足沽清醥出門有礙行且休不如燒香看畫海上頭雪山圖憶昔山居擁寒雪夜半讀書聲未歇長林月在挂猿枝幽谷風生藏虎穴十年奔走避兵塵手持一竿滄海濱適因㸔畫長太息青山頭上亦如人普講主寓普度蘭若十一月望為㳺軍檢括是夕以稾稭䝉首露坐陸氏莊埃燼中怡然賦詩余嘉其言無瞋恚和而美之道人心如如説法無定處無喜亦無嗔亦無諸恐怖初聞戎馬來杖錫出普度羣氓棄家走子女多失怙或遭刀箭傷或受係累去或作蚕聲哭或為折腰歩裸跣走且僵煙塵晝如暮師時在中野亦值一强禦猛若歌利王殺佛渾不顧手持霜雪刃聲發雷霆怒惡状冠羣醜丹青筆難措脱我僧伽黎問我石頭路搜索祗園金檢括青州布區區身外物自謂無足䕶把茅聊葢頭露宿吟古句干戈雖未息江山喜如故相期㸔餘春牡丹花貴富和趙朋春詞落梅風急綺疏寒檐鐵鏘如響八鸞堪笑嬌癡兒女子折花騎竹繞長干二多謝提壺不住鳴杏花枝上月三更銀罌卸盡葡萄緑祗為傷春醉不成三小閣鈎簾待月時燭花頻剪夜何其惜春不奈春宵短翻憶秋宵玉漏遲四花拂盆池入鏡光桞揺臺榭弄鵞黄晚來頗覺東風惡分付薫籠爇暖香逰南山和徐伯卬韵諸君南山逰豪吟氣憑陵惜無龜巢老拄杖移赤藤俛觀陳湖水一槃秋露澄吾兒躡吾屐樂與君共登坐草藉苔茵尊酒空十朋埀楊細腰舞不費纒頭綾羡君方妙年文章有師承譬彼學佛者當為大乗僧滂沱夜來雨紅日喜初升楊花飛渡江茫然白雲騰晨看有聲畫妙若曹不興兹山頼有傳詩名與俱稱和臨寒食有感何處登臨散客愁千墩浦上聽漁謳清明落盡梨花雪能得春風㡬日逰二憶得少年寒食日落花塵上馬蹄香六龍城郭春如畫那得旌旗帶雨揚三烈塘墳上樹如雲一埽東風十五春不信令威歸不得竟移華表屬他人四一徑落花春晝静四隣嘉樹綠隂繁兒曹忘却懐鄉意浪説春風似故園五白髪蕭蕭客未歸凄風𦂳雨禁煙時青苔白骨尋常事堪笑田文為客悲遷居迯難居頻徙幽懐孰與論崑山一舍地湓浦數家村老去仍為客朝來又抱孫雨餘春韭綠生意滿東園聞玉山顧隠君以賦役入城負疾而歸而山中花竹多為有區區懐思寄詩代簡聞道龎公也入城還家風雨近清明催租人去詩仍好市藥童歸病已輕尚喜竹林青笋出不嫌花徑紫苔生野夫得此平安信尋訪姑遲數日程哭杜玉泉處士每憶城南杜今為地下郎好詩留巨帙遺像在髙堂濯濯孫枝秀離離宰木長可憐桑與梓春雨竟凄凉二東郭溪山勝南園花竹深平生多樂事之死遂問心挂我客中劍撫君牀上琹廻風吹桞雪和淚落衣襟四月二日林自瑶城歸寫遷屋詩四首因以述懐并紀時事鶴長鳬短世難齊滿眼風塵客路迷竈突未黔居未徙兒曹况在兩湖西二六幅蒲帆帶雨來瑶城艇子􅂈湖來老妻正倚門前樹雪色楊花覆緑苔三僦得山居鑿井新客來不厭煑茶頻屋頭驀地顛風起狼藉桃花滿樹春四髩絲埀領白􅆴􅆴老我身如作繭蚕午夢忽驚飛礟響狼煙只在澱湖南余往哭杜處士過淞江問途乃知其弟玉溪亦殂去兩月追懐宿昔作詩悼之往歲留三宿今晨哭二難榻懸無復下琴斷為誰彈溪竹春雲散庭花夜月寒悲乎浮世事長夜雨漫漫荅徐伯樞見寄十載風塵走朔南白頭如雪面如藍借車載具家頻徙應俗為文筆大慙茅屋雨添苔上壁竹籬煙䕶筍抽簪别來行路難行甚何夕挑燈與細談二杜宇催歸不絶聲知君歸計正留情東膠茶焙春煙暖西堠花村夕照明音信尚煩黄耳寄交情不負白鷗盟明年築室相隣住兒軰求田與力耕邀管伯齡許君善鄧宜之端午小集十年端午常為客一笑今朝有故人江草碧揺書帶净石榴紅摺舞裙新潮生小港通船路風掃幽軒振席塵酒禁未聞罍爵恥茶鐺爛煑兩旗春邀月田上人借得溪鷗半席沙相期來喫趙州茶渡江賸有蘆堪折日落潮回即到家次韵答許君善見貽憶昔平居頻㑹友家有秫田今釀酒安知今日對端陽無酒可澆談笑口客來置茶聊觧羞強將車轄井中投清風緑樹北忩起時聴一聲黄栗留西山雲起日將暮斯須雨暗横塘路銀燈纔㸃即生花為我喜君青眼顧我心如醉顔如酡憂時未寧今老何明年此日復此㑹此時還遣玲瓏歌即事黄梅落盡雨初晴客舍青苔四壁生鐡礟打城聲動地老妻猶訝是雷鳴代簡大雲講主天竺之書五千巻吾師以之全藏轉早年手握摩尼珠飄然擲錫逰天衢歸來濯足太湖水從此一龕兀坐如枯株有時忽作獅子吼狐狸野牛顛倒走有時閒寫山水華華光之梅作清友近聞有約過貧家貧家掃門迎象車欲知老夫何物作清供湓隂小圃自種崑崙瓜朱公路縣丞和徐伯卭詩見示不為險韵窘束余甚喜之故復和一首以寫起敬之意瓜廬淞水西溪山勝東陵玉立開徑竹纓埀刺檐藤善養氣不餒静觀心澄澄白雪少人和青山與誰登稽古蓄萬巻問竒來逺朋顧余犢鼻布不識馬眼綾來詩清可喜玉露仙掌承想當締思時寂如禪定僧詩成掃巨筆墨汁飲數升干戈有時休雅頌當復興願同杜拾遺一代詩史稱夀張實甫我愛龎德公躬耕亂離日以安遺子孫此計真第一君今牀頭金有餘傳家之計乃亦如况入東林逺公社每誦西竺空王書幽棲乆矣機心息鷗鷺相知俱莫逆獨憐丹穴一鵷雛偶爾西飛歸未得願言晚節金石堅河清復見昇平年明年此日夀觴舉三鳯聨翩郎罷前寄贈勝無能上人雙林舊宅今蘭若百丈清規老作家燈燃佛龕無晝夜榻留禪衲共煙霞屋頭青覆娑羅樹池上紅開菡萏花六月香風清似水老夫曽此坐鷗沙丁未夏六月寓真覺庵數日日賦小詩以寫目前之景適大雲師遺雙清圖足成十首祗樹園林舊雨荒僧廬今喜近滄浪我來一榻南牕下分得溪風午夜凉二臨溪照見影稜稜老我頭童狀若僧堪笑讀書心未死夜來猶對佛前燈三燭龍銜日出東溟飛到天中落火星莫怪懶融門不出一林翠竹風泠泠四荷盃飲露比名酒松麈生風無俗談日落清蟬吟未了雨來白蟻戰方酣五髙堂無塵清晝遲山僧持鉢未歸時白衣仙人坐相對净瓶楊栁青埀埀六客來自汲煑茶泉躄足浮屠亦可憐借我石牀箕踞坐有時閒說趙州禪七㯶鞋布襪苧衣輕好客何妨日送迎試聽礟車飛霹靂將軍觸熱正鏖兵八雙林一室捲微疴列坐羣緇問若何不用散花天女軰儼然無語老維摩九芭蕉葉上遍題詩更覓呉牋寫竹枝過客莫嫌人寂寞髩絲禪榻正相宜十生愛梅花與水仙故人摹冩寄林泉披圖净寫燒香几何異長齋繡佛前普講主過千墩偕余訪許溪西出普公曩嵗所作水仙花求題普為重記嵗月俾余題其左云梅兄礬弟總不見邂逅獨睹凌波仙雲翁指㸃笑相語為我傳神三十年簡蔡君立從事齷齪布衣老生無晉人風杖藜相訪不相見興盡適與王猷同出門喜清飈天氣凉蕭蕭重雲忽迸日六合如洪窑東屯行行行且止賣藥人家杏林裏蜚亷意若迎我歸南薫轉從西北起快哉一披襟長詠出舞雩老夫此興君必知黄金不用鑄鍾期歸去來兮溢水西與諸友論詩次朋南韵每見古人詩不俗恨不移家與連屋人生有詩可傳世萬事無成心亦足嗟哉風雅絶遺音斷絃未有麟膠續三經三緯機軸在文士疇非頼私淑屈原吐詞蘭蕙香能襲餘馨惟宋玉兩京豪華六朝靡聲律由唐轉覆束草堂先生獨冠佩進退委蛇氣容肅孔明廟柏一品題儼然箓竹生淇澳要之煉詩如煉丹九轉成功龍虎伏秋髙當約許𤣥度妙法参諸老尊宿次韵荅朋南重九之約重陽無酒不須賒看菊柴桑處士家只恐滿城風雨到客忩岑寂對檐花贈筆生王伯純時方用武我業儒王生賣筆來吾廬生成世業霅溪上製筆特與常人殊宣城阻兵十三載猶喜山中老㕙在㧞來秋頴帶微霜縛得銛鉏含五彩昔年草制供玉堂玉堂仙人雲錦裳三縑一字不易得筆價亦與時俱昻莫恠年來棄如土掃滌風塵必斨斧生今賣筆我賣文何異適越資章甫呼兒亟用買一束為我寫成懐古錄吾兒作字三歎賞八法以之隨意足我有好音生可知用筆將見文明時栁公筆諫佐明主老我筆畊箋古詩逝將重作毛頴傳為紀頻年遭薄賤牽連為生書姓名守棘不隨陵谷變中秋適逢秋禁開椰瓢酌生新醱醅酒酣仰視月中􅇠長笑一聲歸去來盧志道馬公振以滿城風雨近重陽為詩首句各賦二絶同日見寄要余和之滿城風雨近重陽一望蘇臺百感傷臺下伏屍多濺血秋花不似舊年黄二滿城風雨近重陽門巷蕭條草木黄茅屋破來天更漏誰能補石繼媧皇三滿城風雨近重陽籬菊花開酒未甞四海兵戈無了日十年書劍客他鄉四滿城風雨近重陽猶喜觀山目力長風雨晴時山更好也須攜酒挂車傍兩年九日晴景不同口占二詩聊述梗槩去年重九日烽火接三州黄菊無心看青山滿眼愁風霜新鶴髪塵土舊貂裘為覔桃源路拏舟到海頭二今年重九日兵破闔閭城紅粉娃宫毁黄金郿塢傾老懐多感慨歸思轉縱横頼有茱茰酒開軒看晚晴旭齋劉先生四明隠君子也客呉數年日以詩酒自娱時與予相友善丁未秋年七十有六自謂不久於世為志墓之文及賦詩自挽其詩曰知非終戒酒送我但吟詩且邀予以辭挽之予既為賛小像後五日乃擕酒詣崑勸飲故有是作天生劉伶愛杯酌杯餘更以詩為樂有時痛飲發豪興徹夜長吟追古作胸吞雲夢氣峥嶸筆吐珠璣光錯落知心每恐化渇烏見病驚卧作癯鶴為嫌八達太疎狂乃效獨醒甘寂寞髙陽人笑老癡漢杜舉身遭束高閣我來黄菊似含喜座對青山論鑄錯舉觴一笑口復開盖棺百年心不怍金龜足可換新篘玉兎無勞擣靈藥偃月堂前丞相死齊雲樓下降王縛眼前世事真蟻夢身後虗名等螢爝何如閒策鐡拄杖時復醉傾金鑿落吾詩更作薤露歌活挽先生薦清酌張伯庸在郡城被圍數月間道而歸賦詩賀之雁書到手人方喜虎口脱身君已還難似上天行蜀道險於中夜出秦闗桞營皷角邉聲逺萊子衣裳喜色斑百斛葡萄新釀熱歌童莫放酒盃閑方池詩為馬公振作攜我方竹杖看君方池水宛然俯中庭照影月明裏清風生蘋末素練吹不起魚樂魚自知主人亦應爾和許君善郊居秋色蒼茫日落斜鯉魚風起荻飛花先生晚酌依稀醉吹笛漁童恰到家二書畫船頭吐白虹談𤣥麈尾灑清風繞籬種得陶潛菊時復看花酒一中三堦前有草比琅玕屋上慈烏即鳯鸞老去山林友麋鹿不知貔虎尚桓桓四流水柴門不厭貧古今曽見㡬何人山中松菊陶元亮谷口犁鉏鄭子真五恠底深秋氣候温野花成子竹生孫數椽衡宇清溪曲風雨蕭蕭晝掩門六竹有幽軒水有渠閉門不出十年餘一編修得梅花譜又註神農本草書七朝野新聞總闕如經鋤甘分老迂踈客來留喫雕胡飯旋斫溪頭出網魚八窮到無錐累始輕黄金何用苦留情姑蘇臺榭新如畫又被西風一夜傾九不見魯山元紫芝干戈滿眼少陵詩采樵何處青山好逢着仙人且看棋十一雨洗兵秋可憐東呉香稻熟紅蓮許家墩下斜陽外無數飢烏落晚田淮夷篇大邦淛河西湖郡稱第一淮夷豺柘黄來作豺虎窟交隣無善道四顧距勁敵一鶚嬰網羅同氣頓蕭瑟正朔仍奉漢天恩滿牀笏賦粟嵗倍蓰郿塢金日積非無舶䑲風海運不挂席包藏狼子心反覆莫可測臺閣兩重臣忍為梟獍食井蛙自尊大出入復警蹕愛弟寵且驕開府門列㦸提兵㡬百萬勢熱手可炙甲第連青雲圊溷亦丹碧瑶池長夜飲天魔舞傾國帷幄皆面䛕忠鯁即揮斥權門競豪奢婪婪務懐璧淮南舊巢穴坐視城棄擲出師理侵疆所向皆敗績鄰兵賈餘勇一舉數州得羣􅇯納降去孤城獨堅壁奈何圍數重樓櫓比如櫛礟車拂雲漢晝夜飛霹靂寵弟既虀粉左右皆股栗短兵屢相接苖獠與戮力南濠百花洲流血水盡赤閉闗甫期月人面多菜色蔬食猶八珍骸骨㸑下析衆叛已不知豕突猶親出前途忽投戈回騎不數匹一炬齊雲樓妻子隨煙滅縛虎送臺城咆哮氣方息嗟哉爾淮夷富貴亦已極雕墻底滅亡斯理信弗忒十月過吳門無數雲梯盡未收髑髏如雪擁蘓州偽王守死空遺臭降將偷生忍負羞鹿走荒臺千載後烏啼野樹五更頭篙師也為愁無寐不待天明已放舟過無錫書所見朝發呉門東暮宿錫山下隔墻語嗚咽云是流移者生來本村居白首事耕稼居城僅期月區區避兵馬狂奴稱老虎咥人空四野城降人出闗方幸虎遭冎里胥俄促人負郭一網打監官驅上船寸歩不少假不知遣何之骨肉忍相舍語罷哭聲悲涕與淚交瀉同行十數人瘦骨皆一把鐵索連係頸俛首若喑啞天髙恐無聞爾悲知者寡歸故里憶昔走避兵棄别鄉井去意將朝暮去行行重回顧安知今一紀方踏去時路四郊皆蔓草白日暝如霧披榛訪閭里隔水拜先墓傷哉􅆃令原黄蒿走狐兎别墅破墻在郵亭乃新作隣兒二三軰茅茨晝扄戶相見不相識熟視肖厥父坐乆泣且言為我語親故什九死兵戈餘亡不知處兒詞吐未終我淚已如注對食不能飡相期歸蟻聚吾將語吾兒賣書買農具歸耕溪上田擬若烏反哺吾其正首丘此心庶無負戊申歲訪朋南執中二趙君皆連牀夜話極談今古時朋南以草亭自號工詩有唐人風致不茍作也越數日作詩眷㽞臨别復有魚米之遺執中亦和詩示余意皆有餘而不盡也後十日次韻二首其一寄題草亭兼謝所遺一以寄執中以述交契之厚云圖畫蘭亭迹甚陳谿山何似草亭真晉人標致清談妙杜子詩篇下筆親客至合歡常盡醉我來留宿豈辭頻還家飽喫魚羮飯更喜缾儲玉粒新二經嵗離懐得具陳酒盃深淺兩情真老夫生頼詩書力良友交同骨肉親楊桞錦溪春尚淺綺羅燈市雨何頻别來十日牛衣卧世事如今又一新和施天朋即事二章章五句呉儂頭白雙眼昏夜逃淞上煙水村老妻剪紙招驚魂問之不説苦徭役但言入地恨無門二呉儂十年遭亂離飛芻輓粟筋力疲哀哀婦子皆瘡痍春來破屋雨連日疑是淚從天眼埀戊申春浙西僧尼道流凡主寺觀者皆集金陵蘇州萬夀寺長老愚隠師亦在焉僕嘗夣寐中與談今昔且問及剛中毅公故賦此以寄二老云夢繞鍾山訪舊逰共看江水話閻浮隴西鸚鵡金籠閉海底珊瑚鐡網收刀尺尚須成妙用缾盂未得賦歸休别時問我雙蛾老為道身如不繫舟寄姪僧德無言時在金壇西謝村菴居紅梅閣下夜連牀一别經年十二霜爾父爾兄俱即世吾孫吾子未還鄉西林卓錫青山好東海埀綸白髪長何日與言生死事更論松菊故園荒二嗟我成童即棄家住菴鈍斧老金沙箧藏林下繙經葉缾養山中供佛花浮世本來同一宿歸途必合駕三車白頭癡叔遥相憶燈下修書字半斜馬公振以乆雨懐思作詩見寄適千墩諸友朋為謀道旁之舍因和及之并發巨浸之歎云芳草萋萋春復春桃花應笑未歸人數椽矮屋清溪曲一箇扁舟緑桞津且與往來乗欵段從教圖畫上麒麟老妻頗勝劉伶婦不惜春衣典酒頻二吟罷秋風破屋歌不堪春雨復牽蘿無人為補青天漏滿眼愁看白水多階下縳橋兒渡蟻門前換字客籠鵞可憐豪氣三千丈方覓堯夫十二窩公振和許溪西韵并簡老夫次韵荅之世亂已如此年飢更奈何城池百戰後風雨一春多有酒客同飲耽詩病亦哦老懐聊自適頭髪未全皤和同明府留題趙靈寺大澤水環金刹地小樓簾捲玉山煙桃花雨濯江邉錦榆莢風飛地上錢人世屢驚天柱折佛光還自月輪圓衲僧㑹得頻伽語也學詩人拜杜鵑田家謡花朝一雨連寒食水沒呉田深三尺田家壁立杼軸空逃亡半作溝中瘠農官令下星火飛勸農踏車農苦飢產蛙之竈斷煙續藜莧煑來青藜肥商羊舞如獨脚鬼天瓢倒傾恐未已水車恨不化渇龍一口汲盡西疇水我謂爾農毋怨天堯田水溢亦九年但有人能拯飢渇即令四海無顛連請君試聽踏車歌鼕鼕聲中含疾苦天門九重路脩阻此聲何由徹明主趙真白挽歌辭前代衣冠族先生山澤癯淳風振薄俗髙誼掲中呉舊責焚餘劵凶年賑餓夫紅塵無足跡白雪滿髭鬚鐡硯磨來磷籯金視若無蹇余牛馬走愛爾鳯凰雛卜宅來依倚通家學歩趨玉枝纔有汗瑶草􅃍成枯敬下墳前馬仍瞻屋上烏典型無復見老淚落鮫珠寄謝朋南執中中行諸友兼簡楚綱滄海二禪伯錦溪水流無住時我思故人心如之扁舟來繫溪上桞六月初三新雨後常年大暑今欲流今年天氣凉于秋故人相見不相舍水竹軒亭榻俱下東家談笑復西家西家碧筩瀉流霞醉抽吟巻看珠玉夜牕剪盡如椽燭明朝竟日復留連月在栁梢方解船瀕溪更有好僧舍古木隂森正宜夏龎眉兩僧亦可人茶鐺長煑小園春但欲移牀就泉石共聽松花坐終夕簡熊元修憐君苦有軟脚疾我愧貧無挑藥錢此日尺書重問訊何時杖䇿與周旋湖鄉地濕黄梅雨舍舘牕含緑艾􅈣猶喜東家人事好銀缾長送酒如泉奉贈呉逸菴先生頭髪烏如漆上夀明年八十三豈有神仙傳秘訣尚看孫子著朝簪燒香看畫湘簾捲留客題詩緑酒酣堪笑野夫扶醉别出門更與阿戎談寄張伯祥兼簡顧玉山尺書曾去墮沉浮嗟我懐人意未休兩地共㸔千里月西風又換一年秋牧羝餐雪猶歸國買犢耕耘且素侯暇日煩尋顧文學為言相送媿鄒㳺石箭頭歌并序丙午冬呉人自望亭驛鑿渠通漕湖深丈餘乃得石箭頭長洲徐伯卬氏以所得之一見遺一以遺兒元鎮請各賦詩南山爛盡蒼雲根飄風勢欲傾崑崙何物老砮作遺鏃神鑱鬼削秋無㾗沈沙不隨戈㦸折太隂𤣥精壯氷結五丁假手出重泉猶帶堯時九烏血羵羊肝胆破尼子走折足獨有老於莵坐嘯風滿谷猨臂將軍骨已枯蒼頭廬兒金僕姑時乎時乎奈爾砮次韵集講主見懐君今風北我枝南燈火餘輝借佛龕老去著書酬素志客來揮塵接清談逺公沽酒能相引中散鳴琹豈不堪且喜早秋頻得雨襟懐無復欝如惔偕大雲大成二講主及學上人宿聖像寺詢無言山房作西晉招提屋半摧江流依舊碧縈廽黄楊偶戹今年閠青海曾浮古佛來明月一庭僧下榻清風四座客銜盃石䦨㸃筆題詩去池上藕花秋正開次韵荅許君善滄洲濯我足白首事經畬幸作依劉客難忘薦禰書病聽驚螘鬪守拙類鳩居長日思君子新詩忽起予早秋寄恱堂長老雙徑人來候起居山靈想亦問何如煩師為覓龍潭水洗眼將看後世書二秋陽皜皜火雲騰未有天風洗欝蒸珍重毗耶方丈室一壺寒露置清氷三我愛青山冷淡交呉淞江上寄龜巢秋來剪得芭蕉葉欲借楞伽手自抄閠七月七日許徴士以詩見招適余有毗陵之行不及赴次韻答之西風木落大江秋明月江行倚柁樓一路看山三百里桂花時節到奔牛過無錫梅村口占贈喻子英梁鴻山下碧溪灣落日蒼茫客度闗秋色已催紅日老人生何似白鷗閑危橋跨水苔㾗滑折㦸沉沙血㸃斑竒士相逢忽相别相知只在片言間中秋和易九成韵中秋無客夜相過落葉衡門感慨多明月㡬廻懸似鏡浮生百嵗去如梭誰家桂子香如許我屋茆扉冷奈何猶勝去年連日雨呉兒苦織覆城梭二海門潮上水西流白兎蟾蜍出海頭洶洶有聲驚雨至囂囂衆口說天愁楚氛已覺三邉盡湯網終當四面收自昔金陵多王氣如今重作帝皇州三玉人携手歩凌波憶昔南樓載酒過樓上管絃長夜沸座中賓客少年多按歌自擊鐡如意呼酒滿傾玉巻荷堪笑餘情忘未盡中庭舞月影婆娑為許君善題竹石圖竹君骨清癯石丈貎竒古誰其為冩真呉中馬振父吾生兩眼多閲人此君見之情甚親尋常兩膝不易屈此丈拜之心莫逆可憐君家萬竹遭斧斤石亦去作飛將軍齋居此日空對畫目前所喜無風塵凛然清氣秋滿屋六月不知炎暑酷我來賦詩重品題此石嵌空如此竹勿為葛陂龍勿為金華羊徴君與爾作三友老夫亦得與時同徜徉聽秋軒詩為開元寺方厓長老作一龕禪寂照蘭膏四壁凉生襲楮袍落木有聲頻到耳學人無語自吹毛鶴鳴夜半露初下鴈拂月邉風正髙恠底塔鈴饒舌甚亦如九辯繼離騷韓仲禮宦家子也工冩大字終日矻矻予甚閔之賦此為别君不見韋仲將能摛大字一丈強懸空髙冩雲殿榜鬚髪頓令成雪霜君今捉筆長于帚作字繼韋千載後非顏非桞筋骨殊大如車輪小如斗知君欲與韋為儔韋所苦者君知不青雲有路去亦好只恐君年未老先白頭願言投筆勿浪出菽水髙堂永朝夕樂莫樂兮親俱存畫餅功名總何益九月四日過許君善家觀睦義溪長老與朱公路縣丞等唱和中秋吟君善索和一首老禪吐詞金石聲中秋浩歌蟾兎驚哦松人歸與唱和筆力可扶天柱傾惜哉未草金鑾詔但說三盃通大道舉盃此夕問姮娥百嵗㡬回開口笑天風泠泠洗炎熱炎熱洗空風未歇西齋一樹紅木樨且喜看花眼如月喜薦嚴希長老自金陵還山作此賀之京洛多塵土天風為振衣山中流水在林下白雲歸不說前三語惟尋第一機古藤獅子室燕坐寳花飛楚南藏主來詢知元明師居義興山中附詩問訊十年不喫陽羨茶山中舊宅還㡬家道人今歸卧煙霞石池手種青蓮花青山且喜依然好蛟兮虎兮跡俱掃客有放棹東海頭安書好寄龜巢老感物寄珪玉田書記矯矯千里駒英英五花文塩車太行路汗血亦滿身嗟爾本龍骨誤隨凡馬羣何當一變化翩翩籋青雲二樞宫降精英為象純玉色誰令畊舜田乃負烏犍軶豈無金覉絡錦䄡為爾飾鼻吸酥酪河歸來梵王宅和靈巖虎邱感事娃宫無復有樓臺佛刹而今亦草萊衲子盡隨飛錫去將軍曽此駐兵來青山銜日猶前度滄海揚塵復㡬廻霜落呉天香徑冷斷猨啼月不勝哀二兵餘重到古禪闗無限傷心四望間林下㸃頭皆礟石門前戰骨似丘山劍池屢變珠光赤盤石猶沾血㸃斑白髪破衣耆舊在獨憐寧老不生還遣興和許君善韵馬圖莫恠出猶遲世事方如理亂絲蓮葉有巢龜已老竹花無實鳯仍飢籬邉艇子供埀釣林下樵童許奕棋苜蓿一盤三丈日老妻晨起案齊眉次韵荅因了菴重經䘮亂勞相憶多謝將詩問起居鄰有國朝新定律家無屋壁舊藏書月明江上魚龍伏歲宴山林草木疎堪笑出門多滯礙兀如禪衲坐僧廬普講主哀詩前代王孫錦繡腸中藏萬卷佛書香一鞭竟著三車去不作修文地下郎二自喜年來兩耳聾不聞今古鬬羣雄每逢林下三生石只說尋常萬事空三長把吟豪貎水仙梅兄礬弟亦牽聨如今收拾歸何許兠率宫中别有天四瓊林自有鳯凰枝枳棘叢邉翅偶埀鴟嚇不知緣底事赤霄飛去竟難追五茶毘煙斷蛟龍浦舍利珠藏窣堵坡從此不沽陶令酒藕花零落柰秋何六天台一曲繼天泉獨抱遺琴十二年古調不隨陵谷變麟膠誰續斷頭絃寄孫彥民讀君呉儂詞如讀舂陵萹惜哉未作郡手拍元子肩𤣥髪亦已華鐡硯亦已穿秋蘭抱幽馨竒寳横道邉請以白雲曲載理朱絲絃勿論聽者希我心自怡然題水仙山礬梅花圖綽約誰家女子依稀水府仙人莫恠無言脉脉正須頻喚真真二紅杏碧桃春暖梅兄礬弟氷清㑹得生花筆意隠然金石詩聲乙酉元日漫興四國山河喜奠安一年時序又更端酴酥春酒到手暖楊桞曉風吹面寒太史始行新律歴齊民俱易古衣冠故鄉只在停雲外奈可親朋欲㑹難簡曹仲鉉東海歸來塵自揚一竿西日釣滄浪州人尚說家園在沙鳥皆知世慮忘竹笋滿林冬入饌梅花繞屋夜生香吾兒學稼書仍讀應喜分燈過短墻送僧還日本吾聞帶方東南有國環滄溟龜峯雲接扶桑青飛梅花開作絳雪佳實亦比蟠桃頳珊瑚出水光奪目老蚌吐珠皆夜明山藏水產足珍恠惟人尤得鍾其英釋門龍象獻寳出眉目秀異風骨清錫飛一萬四千里欲以佛法中華鳴手探天目獅子窟速肖厥祖天人驚三呉百粤小盤礴王公下榻争趨迎大哉禪月古叢社正法眼藏轟雷霆思親要織睦州屨春風稳送歸帆輕老夫扶􅉵走相餞事有干請煩留情往時爾國逺秦火六籍不隨煙燼零願言傳冩遺全璧一洗魚魯開羣盲上人名亦埀不朽能使舶䑲為馬䭾吾經張伯祥自濠州惠詩且相傳有還家之喜即事口占聊抒情愫春風濠上來家奴寄詩親朋及老夫微詞周折出肺腑蟻絲九曲穿遺珠神龜脫網曽有夢靈鵲報喜寧虗孤大鈞播物各生遂忍使鳯凰長在笯羣兒覓竹跨為馬呉淞江上迎歸艫南堂花竹春正好玉芝粲若珊瑚珠老夫亦作輭脚局典衣沽酒黄公壚賀陳思忠自濠州歸南山石爛海揚塵播物依然出大鈞坡老暫為儋耳客謫仙豈作夜郎人歸舟㠶巻桃花雨家宴盃傾竹葉春雪髪巢翁臞似鶴也隨鷗鷺去相親得玉山顧徴君書作此代簡濠上人來書數行開緘如對語琅琅酒盃已辨弓蛇誤藥杵無勞玉兎將少待天公舒老眼剩收雲母束歸装舊家亭舘花狼籍春水依然滿綠塘老病乾坤如許大老病此江濵無酒可留客青山應笑人幅巾方竹杖青草落花茵賣得長門賦相如未是真水村歌為趙朋南賦我愛水村好為作水村歌君家水村二百載閭里向來冠葢多銅駝巷陌自荆棘滄海依然皆煙波墻花巷栁接葭菼蘆荻蘋蓼茭蒲荷澱湖噴薄東岸曲陳湖繚繞西邱阿前看震澤後笠澤青山數㸃堆青螺錦溪橋頭魚米市亦有朝鼓鳴如鼉市聲豈不傾人耳先生閉戸雀可羅茶竈筆牀魚童釣簑人稱陸魯望自比張志和兩賢尚友作三隠過也亦宜呼小坡長安道上人擾擾奈爾水村安樂窩二我愛水村好作歌仍和之水村之樂能自得山村之號真相宜齋居隠居白日静門外繫船青桞埀讀書牕雞亦觧語㤀機沙鳥皆相知葑田種秫足為酒草亭對竹長哦詩平生自是愛結客况復客多來問竒清談閑揮玉麈拂高㑹醉傾金屈巵飲牛有渚蓄魚有池老夫願卜隣矯屋與隔籬分燈訪績兒女共曵杖往來鄰舍嬉從此水村作土著與君說詩時觧頥次韵荅許君善小逕紆廽草欲迷村居如在瀼東西為煎新茗頻敲火自掃殘花恐汚泥白首十年呉下客傷心千古越來溪羣賢何日能相顧重為湖山一品題己酉夏四月東維子來訪以其過崑山詩見示且邀余及盧公武殷孝章和之酒濕宫袍逸興多鐡龍吟嘯舞蛟鼉一江星月光揺動八極風雲氣盪摩詩史屢書新甲子草廬還是舊煙蘿繫船秦柱山前栁邀我呉趨和郢歌次韵荅焦任道誰越誰秦自瘠肥别來十載電光飛尚看書帖題青李未掌絲綸對紫薇老我襟懐寒古井憐君氣宇盎春暉石川古栁清隂好且繫書船莫賦歸次任道韵贈朱公路贊府清濁無論渭與涇請㸔流水悟浮生莫憂白石南山爛且喜黄梅細雨晴石几題詩焚艾納水亭酣酒卧桃笙𤓰田不理春來草怕有人呼作邵平謝焦任道惠畫焦君青雲器不减阮仲容飲酒五六斗卓然猶祖風髯龍吐醉墨逸氣超鴻濛騷雅靡不作無聲詩更工淋漓練裠幅遺我龜巢翁翁老如兒癡嗜詩羊棗同層崖飛瀑泉撫玩意不窮何以報夫君秋江采芙蓉露筋廟詩斷臂孤兒事可悲露筋娘子死尤竒裙裾不受紅塵汚膏血都充白鳥飢野燐照人魂斷處田家妻嫂睡濃時玉遺香骨天應惜鐡比真心世共知宿草埋煙迷古塚幽花泣雨倚叢祠碑存米老春秋筆詩有歐公絶妙詞尚待姓名傳國史更看旌表照門楣古今絶少青雲士却忍將身作夏姬祭顧玉山詩於乎玉山翁世居呉右族生逢元盛時當路屢推轂辭榮樂蕭散竟藴璞中玉早持萬金產轉手授家督不為五岳逰家園蒔花竹讀書數千巻旁覈聃與竺非無酒如澠過客佳乃肅徒見駟馬車未若一儒服緇黄璨然者待遇亦刮目常言性嗜詩趣味勝粱肉興來抉雲漢毫端注飛瀑詞林采英華琰刻播芬馥承平十三年嘯傲心自足世故一變更十室九顛覆幽棲綽山下擬比王官谷時余逃難來憔悴如病鵠相見恨殊晚姓名聞已熟夜飲佳樹軒明朝杯又續髙堂桂花秋金釵剪銀燭雙歌棹觥船洗我愁萬斛一留兩月餘坐客常五六寫圖紀觴詠墜水亦有曲連牀可詩齋清話屢同宿擇鄰移我家歲晚安且燠奈何鼙鼓聲忽若雷振屋婁人悉驚散我亦猿失木萍漂甫里東賣文如賣卜感翁數相過餽問慰窮蹙翁亦客檇李逺避蝮蛇毒山川鬰相望詩筒時往復陵谷復一變翁歸理松菊松菊理未能蒺藜俄困辱余舟傍笠澤訪舊宿西塾夜深屏輿𨽻促膝語心腹春風舊池舘荒煙秋草緑朝廷更化初召役事重穋挈家赴臨濠星言去程速送行愧鄒㳺口占謝龜縮詩去秋復春客來書滿幅念我及兒軰舉室䝉記錄自言多疾戾經年在牀褥欝攸屢驚嚇使我長觳觫尚須手顫定親禮寄篇牘安知厪踰月遽爾聞不禄初疑傳者訛細聞淚盈掬嗟我老異鄉知已失鮑叔蕪辭叙疇曩悲吟甚于哭神交死如生歆此盃中醁荅馬公振見寄燭龍銜日火雲迷飛到中天不肯西安得天瓢瀉凉雨仍看地裂補春泥兵戈不到王官谷煙樹相望罨畫溪莫笑老夫多古意露筋祠廟要君題二經鉏初不效常林安我貧居未死心江上小山堪入畫門前新栁未成隂斷編重緝忘年老險語孤吟到夜深毒熱甚于中宿酒我頭連日為岑岑三頼有酒船堪拍浮何憂蓬髩不禁秋卜隣老圃今𤓰及借榻僧忩喜竹幽老大正當秋近熱微風可奈晚來休能騎欵段來相顧惟爾同鄉馬少㳺次韵寄野舟長老舊雨别來陵谷變新秋又見火流西黄楊樹厄重經閠白藕花開不染泥千古長洲連茂苑一湖香水似曹溪支郎愛馬情還在念我塩車月老題橘隠軒為仲謙作愛爾林居物色幽茅齋橘樹對滄洲添修太史木奴傳合比列仙松子逰氷雪杯香蘇井水霜風簾捲洞庭秋小山叢桂遥相似只恐招賢總未休和紀叔維中秋清夜尋常秉燭逰况逢明月桂花秋君吟梨谷揮椽筆我泊楓橋倚柁樓白雪似添雙髩老青天不著片雲浮老夫酣適遥相似座有潘郎便善謳題王叔正江村讀書圖紅葉江上村青燈案頭書長年門不出吾道竟何如叔正過訪傅恢書記寄聲作詩寄之余澤歸來王子猷問君知與對滄洲一灣流水市塵逺兩岸人家煙樹幽客至白雲分半榻興來明月載孤舟如何不到淞江上卧看蘆花雪色秋和馬公振江上早行聞君拂曉渡婁江觧得江妃玉佩雙旭日曈曨初挂樹浮雲變化忽成龍路旁客踏前車覆天上人遭恐杖撞俯仰古今成一笑春風頼有酒能降和衛澄逺雪詩洋海氷寒若凌隂坐看飛雪積來深出門總是瓊瑶地繞屋皆成薝蔔林為説擒呉今李愬因評怨華古羊斟兎園詞客飄零盡撚我霜髭為一吟和楚蘭江禪老應制賦擁翠亭之作翻經屋上煙霞客擁翠亭前雨露多道載三車還報國詩成七步口懸河衲衣風拂天香染錫杖雲隨御輦過聖主得賢方藹藹羣臣寧不賦巻阿寄顔長老江西馬祖不世出城南恱翁雙徑歸芭蕉雨作堂下樂薜荔天生墻上衣繙經猶能作細字秉拂孰與談𤣥機别來半載㡬相憶江岸小桃花又飛和陳思忠過王德修草堂曲塘楊栁似蘇隄編戸菑畬比鄭陂春日鶯花圖畫裏秋風鷄黍故人期開樽許共傾蕉葉出妓應教舞柘枝老我杖藜慵出入草堂遥望為題詩次王修德韵茅堂有酒時一中少陵郊居今瀼東絶憐春水漲新緑不著市塵飛軟紅百年禮樂重制作四海衣冠今㑹同幽棲正要人不識莫厭門徑生蒿蓬和呉斯民感懐詩到龜巢兩日前桞花飛雪正紛然峴山有感知羊祜禹穴曾探繼馬遷老我短檠墻角棄憐君古硯案頭穿欲將磊塊都澆去何日移封共酒泉劍井全家劍井邉不飲井中水要令生瑞氣藹藹見多士古甃暗莓苔羸缾委泥滓黄河今復清豈獨長已矣獨孤公檜珍重前賢手自栽無情斤斧忍相摧専車載去蒼龍骨竟作誰家爨下灰惠山泉此山一别二十年此水流出山中船人言近日絶可喜不見流船但流水老夫來訪舊煙霞僧鐺試瀹趙州茶惜哉泉味美如故不比世味如蒸沙陽羨茶南山茶樹化刼灰白蛇無復銜子來頻年雨露養遺枿先春粟粒珠含胎待看茶焙春煙起蒻籠封春貢天子誰能遺我小團月煙火肺肝令一洗歲朝示二三子我生老筆耕齷齪不自羞教兒復為之能識此意不為農或逋租服賈必逺逰非才茍祿仕往往遭愆尤先師有明訓富貴不可求兒能負米歸老父百不憂日髙三丈餘睡起梳白頭藜牀草氍毹布冠木棉裘比屋吏叫囂吾廬自幽幽食粥了餘年死即埋髙邱今晨捧椒觴復喜嵗一週一唱三子和聊作擊壤謳寄徑山顔恱堂長老每懐城南隠者家崑山石火徑山茶年年春晚重門閉怕踏堦前落地花二兩耳埀肩雪滿顛維摩一室小林泉白雲牕下黄楊樹且喜重經厄閏年懐許君善别後逢人問薜蘿打門時有吏催科消磨舊日躭詩癖春興吟成恐不多二桑扈催蠶桑葉肥麥田雊雉麥花飛春餘閠月無多日鄰舍逃亡歸未歸三昨夜龜巢酒半醺春風吹夢去尋君落花芳草千墩路攜手斜陽不忍分寄趙朋南狂風横雨去年時大厦難將一木支最喜草亭修竹净催租人去復哦詩二石首魚來金色新桃花酒熟甕頭春急須秉燭逰長夜莫遣山公冷笑人寄趙執中案頭花落硯池香庭下草生書帶長黄巻青燈風雨夜更和熊膽付兒郎二一見相知二十春交情無媿古雷陳如今滆上龜巢逺不惜書來鴈足頻寄呉中衡老我誰知己端人最憶君常談無鬼論不作送窮文藥杵三更月萊衣五色雲桑榆春自暖蘭􅉅發幽芬芙蓉城仙人歌寄贈孫大雅仙人家住芙蓉城芙蓉為冠結蘭纓飛車去作蓬萊客玳瑁筵開麟脯擘八溟揚塵一轉蓬扶壓倒到東王公仙人手策青玉龍翩翩歸袂飄天風華亭之西玉山東羣仙挽留鸞鶴從雲墻霞壁五畝宫金華翠葉九粒松雙眸㸃漆顔如童瀛洲再看蟠桃紅蔡經家藏老姑酒能為仙人集仙友琹髙醉歌經拍手要我龜巢老人來和否寄黄宗禮星槎池舘東牀客氷玉襟懐我所知百榼葡萄春灔灔一欄芍藥晝遲遲門前送却催租吏枕上還吟夢草詩只恐繡帷人起早又催京兆畫蛾眉秋晚過太平塔下四顧瓦礫塲有懐徽太古禪老作詩招之一昨陵谷變刼灰飛九州太平古招提寳地成荒丘浮圖巋然在氣勢凌髙秋風鈴作梵音終日語不休以言老萬回合為故山留竿木本隨身把茅堪葢頭畫沙且成佛况乃願力優髙壇降甘露大車駕白牛老我煙霞交風流繼前修冬至和陳縣丞韵𤣥機妙斡無古今一陽來復消羣隂聖人灼見天地心贊易乃鳴金玉音蘭也朝來新盥沐三復韋編謝亭毒卿雲燦爛迷九天旭日曈曨出暘谷丞哉丞哉初下車踐長之喜當何如絃歌化行風俗美寒谷春生自兹始逸菴詩為呉子明賦我愛逸菴叟有詩能養生百事不挂懐三樂殊稱情行年八十餘白髪無一莖每聞責子歎笑我如淵明優哉復㳺哉笠澤山水清二日髙三丈餘先生睡初起雪屋燒煖香行庖膾氷鯉逍遥白􅏩巾傲兀烏皮几鈎簾對青山倚杖看流水世事了不聞無勞洗吾耳三客來兩忘情不復事迎送有酒即盡歡杯當笛三弄羲皇敢云傲周孔亦無夢衆口從雌黄我腹自空洞行歌山澤間斯樂誰與共四人生老而逸伊誰無此心惟翁適所願林居小湖隂或持無餌釣或抱不絃琹山水古名畫所得趣尤深長歎康樂公木屐費登臨送李彦明歸髙郵老夫歸從東海頭春風送客歸秦郵出門復暏鴈北鄉物我喜得同悠悠呉船鼔櫂渡江去烏輪正挂扶桑樹桃花倚岸笑相看杜宇催人啼不住征袍十年塵土多濯纓今作滄浪歌一百五日寒食雨三十六湖春水波文㳺臺榭剪荆棘繼美前賢集嘉客誰能喚起老龍眠重寫耳孫湖上宅寄題無錫錢仲毅煑茗軒聚蛟金谷任葷羶煑茗留人也自賢三百小團陽羨月尋常新汲惠山泉星飛白石僮敲火煙出青林鶴上天莫恠坐無齊趙客玉川茅屋小如船王松溪知事别兩紀陵谷既變復㑹常州年皆七十餘喜各無恙又喜松溪别而復得觴以賀之詩紀嵗月年來兩度塵生海二老相逢雪滿顛杖屨荒城寒食後琹尊别業舊堂前桃花含笑似欲語燕子飛來絶可憐此日為君歌此曲雨蘇春旱午隂天後數日松溪見和二詩予復次韵送歸華亭放舟東郭語長年喜見春風不放顛三月鶯花詩巻裏五湖舟水柁樓前青山司馬如今老白木長鑱祗自憐歸到鳯山門不出北牕真是小壺天雨宿縣學齋舍作客來帷林候漁父黌舍坐聽三日雨諸生讀書喧兩廡商羊飛來立當宁雨聲書聲雜蛙鼓蚓歌亦自諧宫羽青苔上階茵生柱敗壁淋漓籀文古齋僮不敢開牖户風撼庭柯嘯飢虎南山老石爛成土天漏誰能鍊金補去年旱魃走呉楚田家往往悲塵釜麥秋一飽方自許莫教化作飛蛾舞宜山謡并序廣東南丹諸州民獠雜居素稱難治洪武初朝命設官置司安撫之山東尹明善實在僚選凡所司事知無不為為無不達蒞官再期多善政後四年有客自廣西來者傳其事甚詳余乃摘其大者作宜山謡七篇苖猺地連交趾咸籍為民且為除㓙號人恱之作椎結舞椎結舞擊銅鼔淺蠻生蠻皆按堵賣刀買鉏犁銜恩人鳥語獷俗馴惡名去豈弟君子吾父母沿邉舊置七十五以猺為長每羣聚為諸州害今罷之民乃安作除虎窟除虎窟虎皆散亡尨睡月湖南海北廣東西千里如今無白骨無白骨人何憂每每舊屯田年年稻花秋我所思兮龍江水流兵後薦飢發官廪活宜山數萬口民德之作枯桑枯桑枯桑徒為我薪煑石弗糜曷以食人廪發于官我命乃續誰其主之伊人如玉伊人如玉孚及豚魚詔我婦子償粟勿渝厥粟固償厥徳彌忘懐我伊人于羮于墻覃國大韋仲海等世為土豪與溪猺洞蠻相表裏反側不一公以計禽殺之民大快作霹靂斧霹靂斧行天誅百靈奔走羣醜除磔梟獍醢猰㺄招徠角端舞騶虞日月兩山明畏境成康衢宜山莫天䕶虎踞一方公言諸方伯徙和州民樂之作坎井蛙坎井蛙今渤澥偷生蝦蜆門怒腹氣何在長魚䟦浪欲吞舟竟作任公雪花鱠蛙乎幸偷生有媿輸芒蟹前度放蛙人今日恩如海蠻獠負固歲乆不供而良農病於重歛今均之視前賦减什五六恩不能忘作生子以尹名生子以尹名有田須力畊昔憂公租重今憂公租輕窮閻杼軸具當路鈞衡平焦𠖇覆盆下覩此白日明革命之初公以安邉事宜屢白相府民懐之作鞍馬勞鞍馬勞肉消髀廣西一去二千里借箸籌邉丞相喜兩年單騎八往廻青草黄茅瘴煙裏鞍馬勞有如彼不負公不掠美一寸忠丹報天子送丞漢德員外徙居臨濠憶昔呉鉤歛霜鍔歐冶已知蛟可斮窮探虎穴走山靈湧出蜃樓招海若三台分照紫薇垣一蜚徑入紅蓮幕安知滄海忽生塵乃見巨魚今縱壑携家春雨赤城還揚舲秋水濠梁約老夫白髪三千丈别來幸有琹書樂羨子青雲二十年此去亦無冠冕縛故鄉相見恍如夢往事重論成大噱呼兒觧我鷫鸘裘離亭飲客鸕鷀杓南薰稳送渡江水西笑遥憐好城郭莊生臺上看㳺鯈彭祖山中拾靈藥平居襟懐本瀟灑在處林泉可盤礴有時回首望江南題詩如寄雲間鶴次韵贈董明府兼贈陳縣丞尹主簿綠莎聼事灑清風四野遺黎集澤鴻佳政總堪傳國史丹心曽不愧天公横琹坐對中秋月援筆詞傾百歩闕僚佐粹然連白璧有時來我瀼溪東寄錢夢弼并為乃翁宣慰公夀閒對青山晝掩扉家居身著老萊衣懶于日下看花去贏得街頭負米歸一笑觥船香雪美百年城郭昔人非髙堂秋爽而翁樂稻熟湖田蠏正肥送虞長史歸閩中卓犖青雲器凄凉白雨秋棄官辭傳舍舁疾上歸舟岸有吟蛩送檣無語燕留七閩天杳杳兩淛水悠悠親舍孤雲影山城大海頭倚門勞逺望脫屣得長休金榜聲名在斑衣願未酬猗蘭重製曲蘐草足㤀憂丹穴生鵷鳯龍光射斗牛此心能自足餘物更何求老我三家墅憐君百尺樓相知稱鮑叔逺送媿鄒㳺海上多靈藥山中儗素侯家園紅荔子能寄故人不野人居短歌三章為呉中衡賦野人居住何許屋頭東近扶桑樹三江五湖在庭戸身著老萊衣手擘龍根脯賦歸來兮謝簪組二野人居誰與論芸夫蕘子皆同塵朋來逺訪多縉紳焚香㨿髙梧持盃岸綸巾睠魚鳥兮情相親三野人居書滿屋神農本草僅一束用之可比連城玉香林春樹緑樂吾親杏菊潭秋水兮忘啜菽過馬公振南江草堂南江草堂人白眉耽書成癖復耽詩千金買書讀未了化作刼灰飛海涯國風雅頌三百首愛入骨髓淪膚肌兩亰三國六朝下驅駕直與唐人馳老夫一别再寒暑重覧碧海珊瑚枝溪西隠者亦好事白首苦吟忘渇飢逢人往往誦佳句况此酒邉逢項斯歡然共醉成夜宿石銚煑茶焚玉蕤詩家風月談未了老蟾已墮西山陲盍簪此夕復何夕一庭寒菊花離披龜巢稿巻四欽定四庫全書龜巢稿巻五元謝應芳撰詩
