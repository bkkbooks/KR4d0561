body:
  text: 弔豫讓賦予讀史遷刺客傳閔豫讓亦厠於荆聶之列也故賦以弔之嗟忠臣與義士兮何正氣之烈烈匪死生而抑志兮豈存亡以改節仰豫子之炳炳兮復故主之所仇感知己以滅身兮雖九死其何尤欲潛名以匿姓兮乃絶蹤而滅跡爰漆身而吞炭兮雖家人而不識前詐刑以塗厠兮後伏橋而褰裳雖匕首之不利兮惟趙孟之不忘彼友不諒厥志兮哀其生之自苦曰汝才而臣之兮必近幸而釋汝計何逞而不行兮欲何求而不遂胡戕形以毁質兮乃前䟦而後躓伊賢哲之確志兮固始終而不渝既指生以為誓兮肯中道而改塗身雖朽而無怨兮義不可以暫離聲雖喑而不顧兮行不可以少虧信所為之孔艱兮忘所謀之不長将愧人臣之不忠兮遑恤予身之見傷茍委質而求殺兮乃吾心之已貳仇不足以報趙兮徳不信于酬志念智氏之知己兮迺國士而遇予忽反君以事仇兮殆犬豕之弗如嗟夫子之言行兮與日月而爭光遡千載之遼遼兮紛郁郁其遺芳何太史之不可攷信兮列彼名於刺客夫豈碌碌之燕荆兮豈區區之軹聶士有沽譽而作善兮有徼利以行義茍有為而為之兮雖似真而實偽彼知瑶之既殱兮及知宗之既夷夫子之身無所託兮夫子之心為可知乃抗節而效死兮豈攘名而蹈利彼太史之載筆兮胡不章而反刺盖自古孰不有死兮貴委命之得所諒夫子非匹夫之勇兮宜君子之所與雖笑貎之不可得兮氣凜凛其猶生撫遺史而歌弔兮表夫子之忠貞亂曰松栢之剛有時折兮金石之堅有時裂兮維忠烈烈豫子勇且决兮獲正而斃復何説兮不有君子疇發越兮千古萬古祗刺客兮復賦隂陽消長之理無往不返盖一闔而一闢者也夫斡流推旋無端無始此天道之所以立也當其玉衡建子金鐘調律而㣲陽之胍已騐葭灰于緹室也夫剥窮上而反下則其象也具於碩果之不食而七日之始旋盖其幾動於日至之日也吾嘗觀雷在地中之象而得其説夫雷陽也地陰也壮陰閉於九野而潛陽昭於窮泉斯造化之至理生生而不息者也且萬物老死於坤而芽萌於復盖懼春生之不蕃故以養以藏之甚密也然必自掩身而齋戒禁嗜欲於聲色於以待陰陽之初定存萬感於一寂也况乎无疾无咎而利有所往實聖人幸君子之道長於是乎陽扶而陰抑者也然則復其見天地之心㣲至誠者亦孰得識也且天理之復固有其常而人心之復亦不可逆故夫惡極必善而亂極必寜柔極必剛晦極必明盖以天生斯人靈於萬物者也若夫迷而未逺乃能遄返則若醉而得醒夣之得覺譬如夜氣之清不受乎旦晝之梏也信能獲其萌於隱㣲之際則朝乾夕惕以全君子修身之大節也凛乎其頻復之厲裕乎其休復之吉也卓乎其獨復之勇厚乎其敦復之實也赧乎其迷復之㓙必自强而不自孽者也夫惟顔子其殆庶哉因從事於克復而得善則服膺而弗失者也盖其明以察幾剛以致决故優優乎入聖人之域也彼聖此愚均是人耳増予心之恧也君子則齊其心而不敢放則善端綿綿而續也然則欲遏人欲而反天理亦惟謹獨之念而幾㣲之不忽也斥鷃賦惟二氣之妙凝播庶類於羣生嗟斥鷃之至微亦禀氣而載形其薄質之輕儇無舉彩之煥明味不登於鼎俎羽不用於旗旌既無虞於罟網又何慮於弋矰於是庭除之際籓籬之下匪乗而遊翳匹而處决然而躍搶然而去物莫能害樂得其所匪榮菑翳匪薄榛莽茍可托跡鼓翼斯舉匪陋麻菽匪羡稷黍茍可充食俯味斯取夫其委命而足順理而安欲無所縱樂無所盤不因賄而致焚不藏珍以取患不飾身以賈禍不懷音而見殘静若守而有待動若倦而知還雖形㣲而處僻任此生之自然彼其魯雞之鬭胡鷹之勢介距在身絛鏇在體鸚鵡能言而入籠孔雀飾外而受制或産絶垠或生遐裔傷伉儷之相違哀母子之偕逝縱僥存而倖免亦貌惨而容悴豈非形色之瓌材質之偉為世所用為人所貴諒處身之不智終有累於斯世且夫滄溟之鵬醯甕之雞均一天地復奚累為萬品一區要與之齊維兹之鷃亦適其宜何重何輕何髙何卑小大之辨又焉能知達人大觀夫復奚疑承露盤賦粤昔漢武乗龍御天身都富貴心慕神仙動出塵之遐想訪妙道之真傳覬長生而久視與松喬而相後先也爾乃氣類翕從精神感召祕方畢呈至人胥造授房中之異術論延年之至寶匪玉其芝匪瑶其艸采乾坤之精爽庶可臻於夀考於是烹蜀道之美銅襍麗水之良金既噓霆而煽電亦穴陽而冶陰築栢梁之崇臺卓天表而嶔崟諒彌髙而彌峻非可計於丈尋觀其屹若雲峯壮如砥柱表斷鼇以立極懸驤龍而行雨竊造化之功巧有鬼神之呵䕶爾乃抗以仙掌冒以金盤詫飈輪之閃閃驚圜規之桓桓騁怪誕於羣姓馳䧺偉於千官至人進曰奇功既成吾事已濟願舉玉趾臨幸其地於是天子乃潄正陽含朝霞屏萬㡬之思慮絶九重之紛華迨夫夜淡氣冲雲消月皓澍靈湑於重霄降鮮英於清灝泫泫如飴霏霏如膏不賴乎金丹之錬不屑乎𤣥霜之擣盖自然之嘉瑞真可以後天而不老遂乃屑蜚璚和漙珠靈液飲麄穢除神漿未擬醴泉焉如卻五味以謝六塵又奚翅石髓之醍醐也既而形超埃􅅽體若羽翼趍火不焦沉淵不沒浩乎如禦寇之御風栩兮如蒙荘之化蜨盖夙昔之願以遂而求仙之能事畢矣嗟乎吾觀漢武惑於方士既受誣於文成復見欺於五利信荒唐之邪説殆無異於嬴政之世彼其内嗜聲色外窮甲兵任貪夫而黷貨用酷吏而淫刑恣盤遊而無度極土木之經營朝苦心而焦思夕疲神而􅉵精縱飛仙之有藥復何可以長生觀其建元初政赫赫明明罷黜百氏表章六經彌綸治道網羅羣英信一代之英主能持盈而守成使其慎厥終始進乎明誠不玩於物不恣於情泊乎其無為淡乎其太清則不必餐玉瀣濯金莖處方壺登蓬瀛自可以保真而養静享無疆之遐齡是故至聖无欲存順沒寜使漢武欲效唐虞之治胡不刻斯盤以九字之湯銘禦寒賦有北鄰客訪於南鄰主人曰四序相推暑往寒來天時既變人事亦催風霜髙潔氷雪皚皚敢問諸子将何以禦之哉主人對曰吾用吾計卿用卿䇿請子先陳吾為子説客曰雄樓傑閣深閨邃房綺窓不啟畫閣初粧紅爐獸炭煦若春陽此予所居之處也主人曰予也桑樞竹牖且塞且墐穴地作爐火惟煨燼客曰九醖之設八珍之列炙鶉臇雁炮羔臑鼈聚物天美咄嗟而獲此吾所食之味也主人曰予也蹲鴟可煨桑落可傾一罌之雪復有茗烹客曰狐貉之裘綺紈之服襺以文繡飾以金碧舎舊服新随意所適此吾衣服之費也主人曰予也帛以為襦卉以為袴且縫且紐復著以絮客曰重屏既列邃幙且張鎮帷以犀展罽在床錦衾繡縟爛其有光粉白黛緑笑言芬芳此吾寝息之安也主人曰予也布衾如雪紙帳如雲縞綦茹慮聊樂吾貧客哂然而笑曰予居養之異服御非常禦此隆冬猶未足當若子之謂其亦疎矣主人曰噫是何言之謬也盈天地間林林而生富兮則濁窶兮斯清分定之故孰敢云爭子亦為我而不得我欲效子而不能胥樂其有何殊之稱且吾居之而安不計乎室廬之華陋服之而煗不較乎裳衣之麄細嗜之而飽不察乎飲食之精糲寝之而寜不論乎衾裯之鮮敝凡可卒歲何庸侈麗矧予所謂天和者而子固不足與於此子其行焉無汙吾耳客於是茫然自失黙然無語汗面芒背懷慙而去閒居賦夫何予性之耿介兮與時俗之寡諧築屋室於幽僻兮離喧囂與氛埃繄前修之可慕兮矧古道之可追何皇皇而無所止兮乃慮往而營來羌行止之有時兮信用舍之有遇視富貴如浮雲兮豈名馳而利騖朝吾遊於道囿兮夕吾憩於藝圃思衡門之栖遲兮慕考槃之窮處依灌木以結宇兮引清泉以為池樹脩竹之娟娟兮滋幽蘭之猗猗與禽魚而相處兮同欣欣而忘機既撫松以長嘯兮復臨流而詠詩列左圖而右史兮置前琴與後棋春吾蠶以為衣兮秋吾穫以忘飢雖遯世而吾不知兮唯昭質其無虧信鸞鵠不可以矰弋兮豈麒麟之可羇宜雞鶩之爭食兮任駑馬之交馳延漁樵以論交兮美田廬以自適既不怨而不尤兮又何喪而何得嗟萬鍾之厚祿兮暨駟馬之軒車徒暌争而交攫兮紛總總兮焉如亦孰知信之可立兮孰知義之可服刓其方以為圓兮操其直以為曲彼恬然以為榮此赧然以為辱諒薫蕕而不相入兮寜抱余之真獨蹇予豈獨好異兮欲索居而離羣厭流俗之靡靡兮誠不能和光而同塵景顔氏之屢空兮乃樂天而知命仰仲憲之蓬桑兮曰惟貧而非病彼前哲之懋行兮羌與道而同符何愚人之汩汩兮愴乎其若囚拘羞潘岳之諛佞拜車塵於途側胡亦賦此閒居兮乃論士之巧拙雖千載之遼遼兮慨有感於予衷茍非拔俗而髙蹈兮亦何予之能同系曰時與我兮相違審夫命兮何疑憂人之憂兮羌者有時樂我之樂兮知者其誰肺石賦郡學堂試昔聖人之御世兮貴上下之情通羌一眎以同人兮曽不廢於困窮有長以司平兮或權衡之失中繄窮民之有愬兮阻天闗之九重非設法以階其進兮嗟皇皇其曷從爰置石於王都兮其色肺肝之與同使窮民立乎其上兮得吐露其情衷心纍纍乎三日兮斯可見其哀恫士師從而聽其决兮私一毫之靡容信尺蠖之久屈兮覩大明之當空脱辛苦於顛崖兮躋春臺之融融乃歸罪於其長兮激凛凜之清風以春生秋殺之道並行兮誰膏澤之敢壅兹巻石之在他山兮亦惟玉之可攻孰徴求於岩穴兮乃佐治而有功曰重厚而不可轉兮疑自天之來降薄京口之狼石兮聚當世之梟雄圖沒都之華石兮徒媚主於深宫咲佛爐之盤陀兮坐枯禪以談空彼支機之神怪兮適欺世之盲聾是皆不足以擬倫兮徒雕琢而磨礱惟嘉石之可配兮並見錄於周公惟皇元之有道兮過成周之治隆倍麟趾之信厚兮由上令而下共畫衣冠而不犯兮将比屋之可封無一夫之不獲兮雖肺石其奚庸皥皥乎不知帝力之何有兮民於變於時雍四靈賦江浙鄉試聖王御極至治惟新修文偃武蹈徳詠仁被聲教於四表畢梯航而來臣發春陽之厚澤布大造之洪恩何隠不顯何憂不欣何疾不瘳何屈不信士向道而㳺藝賈棄偽而鬻真工務業於堅樸農務力於耕耘極中和之至徳致嘉祥之效珍維龜維龍維鳳維麟應時畢至以彰聖神迺詠厥事耀於黎民夫麟之為物其形不類匪麋匪鹿匪虎匪兕乃肉其角乃圓其趾不羣居而旅行不䧟穽而罹罟音既中於鐘律行復合於規矩生草不踐㣲蟲不履原其徳行吁嗟仁矣朝陽之鳳質稟天行九苞表瑞六徳儲祥晨遊紫霧夕飲元霜發文采之粲粲動和鳴之鏘鏘臨寥廓而髙跱凌雲霄而逺翔俾烟霏之閟色與日月而騰光覽徳輝而來下羌出處之有常介族之長元龜實先十朋之重五色之全下夷平而法地上隆規而象天或萬年而升木或千祀而巢蓮順隂陽以呼吸藏景曜於重泉斷休咎於滋惑明吉㐫於未然信穹壤之奇物能鈎深而造𤣥懿矣神龍有威有稜巨細脩短信屈降升千變萬化杳不可憑張鱗鬛之参差挺頭角之峥嶸既行雲而施雨復嘘風而吸霆或躍於淵或遊在坰擬物類以有體忽神化而無形聞之斯懾覩之斯驚盖曠代而罕值實有國之嘉禎予嘗稽之傳記考之大經四物孔異有彰厥名若夫皇羲之世虞后之庭姒禹之代姬昌之京或以成太昊之紀官或以聽簫韶之九成或以負洛書之大範或以應關雎之化行維随時而隠見故王者以為休祥之徴矧兹昭代聖聖相承與勲華而比徳𦕈漢唐之所稱海嶽之精藪澤之英何祥不産何異不呈宜羽毛與鱗介總符合於文明蹇予沐浴盛化歌詠隆平躬雖處於蓬室心獨向於皇扃睹兹奇瑞欲黙不能敬綴辭以成賦仍名之曰四靈酒賦有客有客一醉一醒邂逅相遇欵我柴荆醉則髙其曠達醒則矜其典型劇談雄辨舌揺風霆於是醒者睨醉客而視之曰若不聞乎禹惡㫖酒夏徳其昌紂為糟邱殷祚滅亡何物狂藥毒人肝腸甘之者必酗中之者必傷化慈祥為凶險變沉静為淫荒語言厖雜氣勢鴟張或罵将軍之座或登節度之床或吐丞相之茵或牽美人之裳或翹足沐猴之舞或俛首羣豕之場微酒之故胡然而狂甚而雙親之養不顧七尺之軀亦忘腐脅而斃遺臭無疆酒之害人如此若何不痛絶而謹為之防乎醉者曰是何言哉是何言哉吾聞上古窪尊三代罍爵茍聖賢之不飲何桮棬之有作書稱麯糵禮曰清酌鄉飲之儀獻酬交錯若近代之飲者皆磊磊而落落晉之八達非酒何以逃亂世之誅唐之八仙非酒何以脱㣲官之縛酒之於人其徳不薄變怒為喜轉憂為樂釋憤氣之怨争發鈍口之談謔故曰痛飲吾之師不飲客之惡獨醒之原懷沙寂寞啜茶之仝血染鋒鍔然則酒何負於人哉爾獨未知其趣而遽薄之也詞未既予乃從而釋之曰止止二子之説各倚一偏請折其衷子其聽旃往古來今酒不可無祭祀賔客日用之需但用之者豐不可縱儉不可拘縱失之湎拘失之愚愚乃人所鄙湎乃酒之辜酒以成禮威儀秩如酒以合懽怡怡愉愉夫如是又安得喪於而徳害於而軀亡於而國敗於而家乎二客於是蹶然而起負牆而立請誦惟酒無量不及亂之言庶無過與不及龜巢稿巻一欽定四庫全書巻龜巢稿巻二元謝應芳撰詩
