seq: 21
front:
  text: 朱二友文於乎兩駒並駕兮同一蹶兩輪並進兮成覆轍秋氣肅以成物兮羗蘭摧而桂折鳬鶴斷而可悲兮何短長之足說嗚呼天乎
  hash: sha256:c4f6169e2a430e5e955d54e4d33a8894fd9472cbf72c8cc2bf170ef729905946
body:
  text: 祭徑山長老顔恱堂和尚文福慧俱足惟佛稱首能具而微世亦希有如我恱翁是希有者德尊一代聲溢叢社蚤被殊渥著金伽黎所在說法四衆依歸晚坐南屛雷鳴鐘鼔雨華西湖魚龍起舞丞相授經化伏羣魔凌霄絶頂砥柱頺波慧以知㡬福以歸休崑岡之陽為師莵裘師方退藏陵谷變改兀如嬾融得大自在我昔避兵識師東林忘形儒墨結交以心時有旦評稱師孝禪吾其敬之僧中子騫九流百家問無不知吾其愛之僧中子期師之於予亦敬且愛片言可觀如拾珠貝我歸故鄉師贐其别歲時音問往來不絶前年孟冬丈室信宿白雪陽春賡和舊曲寂滅樂矣師固云然我思故交中心悁悁擷茗陽羡􅆽泉錫山詞以抒情塔鈴吾言夫祭妻文於乎誰無夫婦琹瑟相友惟汝與吾憂患白首粤自世變家燬於兵扶老携㓜蹀血宵征具區之山龍馬留跡羝觸藩籬㡬中鋒鏑載歸故邑遭歲薦饑裙無完布簪遺折蓍而於舅姑菽水朝夕生事死𦵏與我僇力烽煙滿眼人皆岻巇頼而内助匪義不為我擔耒耜爾躬井臼長育二雛庶亦肯構所居三徙非效孟母全身逺害以避豺虎内外服勤乃成此室舁疾來歸庶安且吉而飲而食而言琅琅辭絶而逝悲風滿堂六十四年不失婦道雖逢百罹卒逢夀考嗟我父子痛心如割骨肉恩愛際此契濶歲時烝嘗誰為薦羞我暑誰葛我寒誰裘風雨孤燈室與誰處齊眉之案誰為重舉宅兆斯卜祔而姑嫜一酹永訣我淚其滂兩祖祝文維洪武九年歲在丙辰七月初四日不肖孝曾孫某等敢昭告於某官之靈伏念某兒子木不幸逢豸冠之怒無辜屯鳯陽之田骨肉生離肝腸痛割以卑悃陳詞於烏府蒙大臣請命於丹墀欽承釋放之恩幸獲來歸之喜雖風憲紀綱公道之力卓然行之非天地祖宗隂隲之靈何以得此天無以報祖何可忘謹以蔬果酒饌之儀用陳菲薦謹告考妣祝文伏念某兒子木屯田臨濠如落陷阱而某原其罪狀揆諸刑書為父者有可救之理於是扶憊觸熱赴臺陳訴幸而臺官埀憐轉而上聞玉音俞允放歸養親此恩固不敢忘也然某思之苟非蚤歲蒙父母教訓之力則懵於義理昧於法律視其子可援而不能奮身為之則為父之道有所未盡今也頼吾親之訓于昔年脫其子之難於今日恩其可忘乎况乎上之人所以矜恤所以釋放使得仰事俯育而骨肉完聚者非天非祖宗有以相之不能也嗚呼天無以報矣豺獺之敬聊表於親至如父子受辱有玷先世其出於不幸而非繫乎不義而致者惟天惟祖宗尚或宥之外舅姑祝文伏念某兒子木比遭禍而屯田今䝉恩而歸里親戚骨肉重獲團圞其為外祖父母者死而有知其必哀憐眷顧而隂相之也推情揆理義不能忘三兄祝文惟我長兄有幹蠱之才而不得其夀由是而家人失節門祚陵替幽𠖇之中不能無憾也必矣然而幸存一息以嗣烝嘗如木識丁兄必愛之不啻若己子耳頃罹竒禍屯種濠梁豈不為之哀愍哉今蒙國恩歸奉菽水又豈不為之隂祐乎生而孝友死必不殊區區哀思詞莫能既惟我二兄深嗜佛學早絶伉儷誓不與同室而生同穴而死也早育二子長令出贅幼為沙門兄則超然自謂在家出家矣避兵之日緇流與俱杳不知其所終此固兄之素願也然而某佩服儒訓雅愛人倫念同氣不宜冺絶命其子林以奉嘗焉今以木屯田而歸如獲再生如脱鼎鑊吾兄以佛氏之心為心亦必為之慈愍焉惟我四兄未壯而克家將娶而即世父母悲悼終身不忘諒吾兄於父母之子若孫亦不忘也如木者幸脫屯種歸耕故隴以養其親以畜其妻子兄之喜為何如哉兄無後人命吾子森嗣之以承祭祀尚其埀裕使得與木䓁鼎峙而樹立也姊及姊夫祭文於乎賢姊之生愛弟深至視弟之子己子無異木之屯田姊必憂恚以今還家必喜而慰憫予暮年遭時不利父子汙辱有玷先世所自釋者中心無愧微姊復生孰語於是嗟而子孫俱殄疫癘歲時禴嘗頼女承繼我今摧頺百事俱廢念姊之心獨爾弗替姊夫善人義同昆季庶㡬來格鑒此微意祭母舅文代陳彦髙作昔人有言見舅如母今我不見舅氏者閲四五年又何異别吾親之乆乎瞻彼陽山追懐亂離脫萬死於虎口幸重逢於盛世然而陵谷變遷各天一涯舅甥之情惟天其知遭險人之排陷若參商而東西方鴻飛於魚網奮病翮而來歸聞舅疾而往問渉雨路之途泥承訃音於中道乃匍匐而星馳顛崖之苦蒺藜之悲皆不能與舅氏細數而陳之釋此憾者將何時耶言采溪蘋薦此泂酌哀歌渭陽涕淚交落知乎不知神在𠖇漠任仲文祭妻祖文翁於女孫親愛所鍾愛及其夫情亦與同既玉其成加以磨礱藻雖不才感恩之隆服勤左右黽勉厥躬歡然菽水庭闈春融金澤之濱瓢湖之東居凡三徙天風轉蓬今年夏秋巨浸溶溶賦歛之蛇毒於射工避地蘭陵請謀吾翁去危而安翁樂其從瞻彼横山滄海駐篷將營莵裘一畮之宫月有旬日往來憧憧豈其微疾藥石㒺功我方抱持滫􅔱之供語音未絶瞑目而終嗟我夫婦遭罹禍凶倚若㤗山山頹倚空頼有大母同此哀恫棺以黄楊衣衾重重忍茲永訣涕泗霑胸潄詞而醊以冩愚𠂻祭朱仲起文生於東呉殁於西州七十四年陶朱之儔其生也有一㕓而弗處樂浮家以優㳺有二子而離居各専力於箕裘其殁也繼室厚衣衾之具過百倍於黔婁女孫得藳砧之良襄大事而能周視世之生不聊生死不得其死者逈乎其不侔又何憾首邱之正與不耶某等或忝微姻㑹晤無㡬或傾盖於東洲之濵或結隣於横山之阯聞哭聲而匍匐徒往救而弗起兔死狐悲矧吾人耳一觴敬酹歌用蒿里祭妻祖文代楊彦澤作昔在童丱聞翁厚德邑之名門視為矜式遭時變故挈家中吴人多覆轍翁行坦途陶朱之裝㒺有遺失食指百餘乃保終吉陵谷既遷言歸故邱橋梓相須聿成莵裘匪德之積曷云能爾隂隲自天灼見斯理如某不才誤蒙采菲以孫妻之撫愛莫比每至甥舘誨言諄諄俯育之意盎然如春及翁卧疴或輟或作往來問安眷顧如昨七十八年如旦而暮眎諸夭閼實有餘祜所可悲者永别終天女孫歸寧誰其眷憐某于羮墻思亦罔極薦此溪蘋灑淚霑臆祭鄒忠公墓文公逰程門㳺楊比肩慎獨之學首得其傳孝於事親如曽如騫移孝為忠厥德兼全補衮之闕蒲伏涕漣數惇六罪羣邪凛然奈何城狐威福得専推落䧟阱炎風瘴煙忤物固爾精誠動天遐陬峻嶺感應有泉處困而亨斯文究研既釋論孟復觧韋編羲文姬孔羮墻見焉蔽日雲開暫脫迍邅再寵再辱愈磨愈堅明月之珠薶光九淵鳯穴有雛赤霄翩翩暴白先志誣衊悉蠲徳薰晋鄙埀四百年顯忠有祠奉嘗有田由宋而元有司豆籩度守是邦追慕昔賢詢諸遺黎知公故阡増土鬛封起碑之顛樵牧有禁溪山連延何以奠之秋菊寒泉仰止髙風服膺拳拳尚享祭陳氏親母文代曺子夀作惟靈生衣冠之茂族作佳配於頴川相夫子以無違實四德之兼全出鳯雛于丹穴奮彩翮之翩􅗁熊丸之教有法掌珠之愛弗偏予是以有東牀之選盖亦慕北堂之賢方鳯占之叶吉結朱陳之姻㜕何飄風之不情折萱花於歘然葭莩黯乎其失色朝露若為之涕漣念九泉之永訣酒三醊於柩前靈洋洋其如在鑒此意之勤拳子祭母文代陳煥章作嗚呼三子早孤皇皇疇依頼有慈親恩斯勤斯非徒養之而又有以教之視我三子掌珠之惜遭時艱危基業蕩析萬死一生幸迯鋒鏑徙茲滆濵茍焉休息其不滿於吾親之心者一子一孫介胄而殁居侍旁者但供其菽水習史業者常離於朝夕每勞乎倚門之望鮮能遂板輿之適所幸時康方安厥居孰謂微疾􅃍然云徂方巫醫之並用竟永棄其諸孤嗚呼痛哉而今而後雖日用三牲之養而吾親無復為之娯矣一抔之土無復窆於呉矣徒感傷於風木媿返哺之慈烏奉觴永訣肝腸若刳祭陳母文代陳彦直作生長勾呉秀鍾林屋有林下風四德之淑隨世變遷家此溪曲鄉稱姆儀徽音馥郁熊丸教子峙若鼎足伯為督家仲則戎服季也刀筆縉紳刮目甘輭之供如食厚祿斑衣諸子森如立竹春藹慈闈家用雍睦夀踰稀年殁有餘福季歸自公撫棺慟哭烏鳥之情悲乃風木里不巷歌弔者接躅某等姆儀之敬義當蒲伏言采溪毛薦此􅌬醁肸蠁有靈眎同芻束又代李一泉䓁作孟母以斷機教子成其子為亞聖陶母以剪髪待賔致其子有大名世之為人母者茍能有其遺風則其子亦必有可稱者矣若我陳母遺風伊何教子之功不鮮待賓之禮亦多昭哉彼蒼降福洋洋八十指子孫之盛七十三夀考之長東隣西舍愛同六親簞食豆羮饗如八珍為一境之姆儀誠四德之淑人倐爾云殁孰不酸辛時無張林淑德弗碑劉向不作立傳者誰我酹此巵我陳此辭亦庶㡬乎薤露之悲彤管之貽也歟祭萬氏子文人與萬物一氣所鍾何乾坤之為父母有賦予之不同顔路之子聖師之賢胡不永其年耶桞季之兄凶燄赫烈胡不使短折耶羙牛山之木而厄於牛羊戕於斧斤彼樗櫟之不才乃夀輪囷放梟囚鳯刖足麒麟若吾甥之淳朴孝敬而夭者皆莫曉乎混淪某等忍痛雪涕敢一問乎大鈞天雖不言聞必酸辛持杯酒以吊窮泉之幽魄亦以慰髙堂之老親親乎親乎慎勿為卜商氏之䘮明徒貽誚於聖人嗚呼彼蒼聞乎不聞祭沈氏女文維洪武十二年十一月初八日老姨公携其子以酒肉祭於姨孫女沈氏之靈曰汝之父與吾子為弟吾之孫中選汝父之雀屏今也如寳鏡之破於未照玉簪之折於未成傷矣哉吾父子之情傷矣哉吾父子之情又某年月日老姨婆與姑娘等以酒果家饌奠於時娘柩前嗚呼痛哉汝之生也母亡於七歲之初使汝不得蒙其撫養汝之死也父役於千里之外汝不能與之訣别未笄而善事繼母乆病而不弛女紅是皆可哀可憐而可憾者嗟哉彼蒼何彭何殤骨肉之悲寓此一觴祭外祖文代上海任仲文作翁於外孫恩德俱厚三孫之中藻為最㓜維其㓜也特恐愚陋其愛尤深加之訓誘翁自中年無心組綬湖山秋九風月杯酒幽花秀竹蒲石清繆翁於其間婆娑白首陵谷之變干戈日乆危而復安頼天之祐八十八年可謂遐夀為鄉善人其德亦懋甥孫紛然日在左右藻則出贅翁為擇偶桑梓連隂聲聞雞狗犁鉏畎畝復客桐江數月宿留廢禮百端辭莫能究比聞訃音痛心如剖匍匐而歸豈云敢後以病莫前徒抱哀痛瓢湖之水難洗厥咎翁其憫之庶㡬原宥雪涕陳情薦此簞豆為曹元度祭姑夫鄒桂堂文昔魯義姑抱姪遺子恩難兩絶義重如此公篤於親如姑之情撫視其姪同乎所生念某昆弟稚孺而孤適逢亂離干戈九區埀涸之鱗蒙激滄波無依之鵲乃棲瓊柯恩以畜之義以淑之威儀語言教且朂之人皆蒺藜我則袵席居吴數年如一朝夕陵谷變改公還故鄉某亦里居烜以餘光咄彼青蠅竟涴白璧投畀遐荒混淆瓦礫咸謂貂蟬將出兠鍪天定勝人無悔無尤云何不吊廼渉重坎訃音之來痛割肝膽丈夫馬革死不顧身惟其骨肉極切悲辛巫陽之招魂其來歸桂子秋風髙堂繐帷知恩㒺酧義蔑以報見公羮墻淚滿懐抱魯之義姑我姑之夫書以厚俗疇茲董狐祭徐逹卿文往昔避兵衆依于仁纍纍乎喪家之狗躍躍乎脫網之麕公之視予騶虞麒麟暖蘭湯而濯足下懸榻而重茵館婦子於别室撫臧獲如所親不以俗之數米而炊者以玉其粒不以時有析骸而㸑者以桂其薪或戚或疎恩惠俱臻長筵燕集禮意慇懃是故人皆以和氣氤氲喜色津津忘憂於板蕩之秋湛樂於熙臺之春殆若古桃源之避秦也别公數年滄海飛塵干戈阻絶公殁不聞迨歸里而聞之日覊縶於世紛欲一酹僑𤣥之墓閲屢歲而因循竊嘗論之世衰俗薄狥利忘義者什常八九公乃磊磊落落猶獨鶴之住雞羣然一飯之報吾志弗信抑亦有愧於古人瞻彼膠山如隔兩塵舉匏樽以澆墳上之土頌遺愛而云云酸風撼林嗚呼孔賓為陳以貞祭王母文昔在故里婦德著稱鍾禮郝法容儀具并暨孀居之一紀羗玉潔而氷清今居蘭城母儀之懿捧檄有孫盡歡甘㫖奉重闈之慈訓謹操持於胥吏故凡葭莩之親桑梓之共莫不愛之敬之尊仰乎林下之風也樂善之性本出天賦口不絶西佛之名如渇飲乎甘露其心愈慈其髪半素諸兒女之通家每升堂而拜母起居問安匪朝伊暮方菊月之下旬捧夀觴於初度安知彼蒼災祥竝臻賢孫有鶚書之薦大母則病入於膏肓巫藥罔功遽爾云亡正所謂賀者在門吊者在閭變怡懌為䀌傷矣衰絰之孫躃踊哭泣吐令伯之哀𠂻人皆為之嗚咽不有彤管孰記高節采滆浦之寒藻薦郫筒之香雪拭淚陳辭千載之别祭崑山張伯仁文洪武之初傾盖如故買宅買隣日益清顧於時蘇城樓櫓灰飛公脫陷阱欣然而歸人之所稱百鷙一鶚有猷有為抑强挾弱我所見者厚𦵏其父故舊不遺保障鄉土數載之交視同懿親為公所憂里多荆榛縛虎而縱反遭其囓鵂鶹夜啼興妖作孽室雖有繼卒以無嗣播遷臨濠日以毁顇女之嫁者遽失其良兩婿承家池魚並殃公在異鄉寸心千里骨肉傷殘痛何可已一紀之别老我於家每聞竒禍為公怨嗟蒼天蒼天斯人何辜困厄摧折乃至此乎客來今春謂公蒙恩難兄難弟同歸故園予欲賀之恨臂不飛以詩言情不勝瞻依安知隔歲公已物故集師書來我淚如雨追念疇昔肝膽相知各天一方徒云坐馳面不復晤魂其可招悲歌些辭酹此一瓢生日祀考妣祝文父母生不肖八十六年矣不肖雖不能為賢人君子為世矜式然未嘗敢為小人之不臧也雖不冨不貴不能顯榮其親亦未嘗飢寒失節以辱先也長太平之時則微樹其業遭亂離之日而不殱於兵夫妻老者暖衣飽食早眠晏起不憂不慮以安以娱是皆天地之大恩父母之遺澤也蒙天地父母之恩澤其可忘乎其可忘乎所願者子子孫孫中外和睦𤓰瓞延蔓荆棘不生使不肖夫婦如是安娱以盡其天年不乆牀褥全歸遺體尚頼天地父母之靈有以隂相之始生之日釃酒以告冬至祀外舅外姑祝文嗚呼悲哉仁而無後斯理之變而又遭世之大變也三子八孫靡有噍類所遺之業盡屬他人顧為女為婿者耄無能為竟不能為立後人以為似續以承祭祀每一思之慚色而已歎息流涕而已惟茲一陽薦此蘋藻溪毛匪薦薦以此心靈之鑒之憫其所不能為者宜宥厥辜祭唐親家母文代陳以貞母氏作德為母儀五十九年見而知者罔不稱賢昔我冡子多幸自天雀屏中選以女儷焉主我中饋毫忽罔愆母教之淑豈容忘筌昔在鄉里絲蘿纒綿今居毘陵同居一㕓姻婭之情益加於先靈在牀褥乆弗能痊曰女曰婿常侍榻前我來問安飲食留連今也云亡骨肉棄捐為子婿者公務所牽覊旅金陵未能言還女以孳育月輪未圓棺弗能慿縗麻涕漣埀髫末孫其哀亦然我念疇昔淚如迸泉有菲蘋藻供陳几筵靈其如在鑒此惓惓祭表伯母文代王仲孚作昔居故里家為比隣綿綿瓜葛如朱如陳今茲異鄉亦復如舊通家往還情日益厚靈以沉疴一載之餘匪朝伊夕候詢起居若我婦子均蒙眷顧食必分甘骨肉相處孚方驅馳信宿而歸靈乃即世幽明永違匍匐往救已不可得陳此薄奠涕淚霑臆祭王君夀文昔在西塾廿有餘年公之父叔坐予講氊愛我敬我如骨肉然公於此時鴈行聨翩敬以父執禮意勤拳規行矩歩靡不勉㫋厥後一别陵谷變遷公守故丘我落海邉萬死一生脱身戈鋋我東來歸公喜自悲喜獲再見悲歴艱危冠玉之美殘為瘡痍樓臺廣居化為茅茨衣不文繡緼袍為宜食忘八珍啜菽如飴樹菊軒堦杖履棲遲幹蠱有子蔚乎孫枝樂事以酒餘皆弗治佳哉蔗境為鄉白眉吾嘗鼓琹滆浦之湄連城屢宿細論昔時負笈之孫服受我詩自茲以來别多㑹稀花朝月夕每有所思去年暮冬尺書載馳緣有義事要公共為安知踰月遽然其萎偶出西闗路聞葬期彼祖輓者舟欲同移眸子眵昏行且尼之送不執紼奠莫奉巵烈塘之東徬徨涕泪還家數日晝夜忸怩緬維前賢絮酒千里嗟今之人跬歩或弛朋友道䘮恬不為耻擷此溪毛陳詞尺紙物薄情深公必鑒之祭妻文嗚呼悲哉靈年八十以微疾不兩日而亡人皆謂天錫之福子孫滿堂衣衾而歛瘞之髙岡并餘一紀家居樂康既葬而隣里騷然紛捉軍而驚惶使襄事之日而過之則惡乎有數百之人祭奠於北堂縞衣而送䘮也未㡬而季子森為人謀陷嫁禍其身我扶憊而赴救詣郡邑而具陳刀筆之吏欺天罔人妄移文於崑邑欲玉石之俱焚頼公道不冺如屈蠖之得伸雪理而歸父子悲辛以今思之六十年伉儷常居安而欣欣雖世變之秋避兵海濱亦未嘗遭此之不仁信乎吾細君有可福之善蒙隂相於大鈞也耶卒哭之祭遂致目闕死而有知不必我嗔吾知母之慈子必哀憐其遘迍奈何死生幽明之分兒哭之慟我亦霑巾嗚呼哀哉祭張溝南先生文維洪武十六年月日同郡老友謝蘭謹遣孫塏以清酌庶羞之奠致祭於故心友溝南先生之靈曰於乎近年耆英晨星落落公在鄉邦雞羣獨鶴詩三百篇精華咀嚼吐而為光光輝焯焯粤自蚤歲蜚聲臺閣遭時多艱屢進屢却歸來故山雲卧一壑洪武更化羣髦進趨克嶷有子首應而湏手持直筆追縱董狐如晳有參養志而娯寳樹遽折悲風呌呼公無怨尤曰命矣夫中郎之女傳業於家丙申暮春郡志有作時我與公同秉筆削甲可乙否語皆良藥别來數載心交如昨愛及吾兒義尤不薄前年過我新秋夜凉中庭夜坐月白如霜劇談千古把酒淋浪興盡而去東方未明去年夏五我兒云亡公為墓銘九原有光吊我唁我喻以大方斗城之别譙門夕陽自冬徂夏人多讚揚優哉悠哉新居草堂幽花秀石池島滄浪不徒玩物世慮俱忘顧我潦倒理宜溘先安知矍鑠乃在吾前四月九日訃音忽傳無妄之災網羅正纒葬不克送酒不漬綿每一思之淚如迸泉病目昏盲舉歩欲顛塏持瓣香拜於靈筵鮑叔知我鑒此勤惓姪婦祭姨母文昔侍姨母東吴避兵我姑繾綣諸婦奉承及歸桑梓半舍之隔歲時問候眷焉如昔今我娣姒等哭姑之淚未亁而又哭姨母而永違母乎母乎見我姑於地下其能說諸婦之哀思乎溪蘋拂霜薦此一觴阿翁悵悵作此祭章代常信孚祭親家母文曩予之家幹蠱乏人賢郎贅居蒙養而姻維時魚軒雲從析析繄我婦子獲瞻母儀事雖從權悉如所願舉室驩然親親眷眷去年合卺蒙饋茝蘭愛子及婦恩出肺肝顧予東牀每歸問安慈愛之深尚蒙埀訓所可喜者起居樂康予嘗詣門亦得升堂别來未㡬聞有隠憂豈意成疾竟弗能瘳訃音忽至婦子匍匐泣血呼天救不可得我來柩前奠此束芻區區哀忱靈其鑒諸冬至祭母文代木森作嗚呼痛哉每年冬至齋宿祀先母率諸婦供具酒食今也中饋或有缺失誰懇懇而朂之耶每年冬至賀客過門母語諸婦治具饔飱今也禮意或有懈怠誰諄諄而命之耶一味之甘誰分諸幼耶糗餌之屬誰饟諸隣里耶是則因莭序而追感者如此至若子孫之有室皆吾母擇配而為之子之婦孫之婦其婦工有未善者皆吾母教而成之平居之日甘旨裘葛之奉則吾母弗求其備温凊定省之禮或有疾則終日終夜木之濠梁屯種森之滕州被刼林之客死新鄭吾母為之廢寢忘食晝夜憂思痛苦哭㡬䘮明慈愛之情言莫能盡如此之恩又皆在劬勞罔極之外今子之死者固不能報其生而存者將何以報其萬一耶母兮母兮無復見兮冩此哀𠂻矢弗諼於逺兮祝亡子文洪武十六年十一月二十一日老父命汝弟森持思賢錄一簿置汝靈几酹之酒而祝之曰往歲板刻辯惑編既成汝嘗執書立吾前而言曰不圖今日遂二十年之所願欲矣汝於此時喜容可掬吾知吾兒推心父腹繼而摘稿尤喜成速携二書之新行不兩期而瞑目今老父偶逢於知己又為刻思賢之錄此汝之所冩者稍撙節其簡牘工數月而就緒我已盲其雙目摩挲紙本無復能讀於乎誰念其為之不易寳之如玉邪誰為其喜而傳之士夫俾咸丐乎道鄉先生之膏馥邪悲哉吾兒身不可贖置此書於靈几猶挂劍於宰木顧觸屛之子若孫絃將斷而復續覩物思人淚霑汗竹祭母舅文代東洲黄氏作嗚呼見舅如母念母不忘舅復厭世豈不永傷若我舅甥世居邑里如鳥同林鷇育棲止版圖之謬牽連伏辜天恩汪濊姑緩其罰脫網之魚頳尾發發七里八岡水溢溝澮載欣載奔過都歴塊蒼髪黧面泥土裳衣忘乃劬勞負疾而歸賀者在門退不旋踵吊者之來乃哭而慟如某至親洎諸姻婭痛不可忍涕淚交㵼將來休戚無復相知俯瀝肝膽酹此一巵祭賀彦銘文代陳彦髙作南華有言曰上夀百歲中夀八十下夀六十一月之間得開口而笑者或四五日而不能及也况遭世之岌岌乎如公之生埀及中夀喬木故不為不茂遇陵谷之變遷若摧枯而拉朽坐衣冠於塗炭脫性命於虎口元龍之豪氣雖衰丹穴之鳯雛方雊俄陸海之風波沉鐵船而莫救有竹林之小阮尚枝梧於左右五六年憂患之中能一笑如南華所言者亦烏有也嗚呼哀哉凡我親舊居同里閭困蒺藜於世變之日喣涸轍於濡沬之餘犁鉏乎荆棘之塲屋廬乎瓦礫之區若䕫蚿之相憐不戚施而蘧蒢吉㓙慶吊出入起居或叙情於杯酒澆磊落而欷㱆今也云亡痛當何如奠椒漿於三寵墮清淚如蛟珠悲風愁雲送乃輀車祭妹文嗟我先世錫山故鄉曰朱曰陳閥閱相當乃以吾妹嬪朱之良為婦而賢孝於姑嫜陵谷一變雲萍四方念我兵餘如龜穴藏聿來依棲隣壁分光爾居再遷半舍相望手足之情眷眷弗忘常念吾甥來我渭陽吾兒念姑安問亦常焉知微疾遽爾云亡朱陳六親㒺不痛傷况予潦倒孤鴈遑遑凴棺飲泣奠此壺漿祭妻兄文大哉天之所以為天兮宰萬物而幽𤣥雖陵谷而變改兮恒福善而弗愆觀若人之始終兮蒙隂隲於彼蒼避戎馬於勾呉兮渉畏境如康莊聚原鴒以救急兮作歸鴈之同行舍故土之荒穢兮樹豐業於暨陽託家政於仲氏兮日娯客以壺觴肆優㳺於桑榆之景兮家有餘慶蹇予早歲有室兮得名門之女弟頼昆季之眷顧兮於今四紀睠小阮亦僥倖兮辱妻以其弟之子悵東西之相望兮多契濶而㑹少比安問而抵家兮喜棣蕚之俱好孰謂别無兩月兮聞訃音而絶倒惨余室中之人兮姑與姪其同悲徒匍匐而莫能救兮淚滂沱而霑衣奠椒漿而永别兮叙平生而陳辭除服祭母文二月十四日為兒子木等作齊衰母服也三年之䘮猶卒哭而再祥禫而除其服者古之制也然劬勞重恩罔克有報孝思之心有不能隨服而除者也於是撤靈帷於斯寢奉神主於祠堂歲時烝嘗寓不忘之意也不忘者何敬與愛也凡吾親之所敬者敬之所愛者愛之則親之死猶無死也茍忘其親則親之故舊或踈如途人親之孫子交惡為仇敵也以若所為是不孝也觀夫孝之至者通神明不孝者必獲戾於神明也過庭之訓諄諄有年勉而行之請質諸母之靈也矢心陳詞終身戒也遷祖考神主祝文嘗聞祠堂之制當設四龕以祝四世之親不肖幼年在父兄之側失記髙祖考官稱髙祖妣姓氏故曩於兵後立神主由曽祖及禰而已虗設第一龕於茲數年今因亡妻䘮既終其子木等奉母主入祠敢請遷曽祖居第一龕曰祖曰禰從而遷之以第四龕安奉其母任氏候應芳之殁然後改題髙曽祖禰稱號也不肖違失禮制不能無罪惟尊靈恕之寒食祭曾祖墓祝文頃頼先世德澤未冺𤓰瓞遺蔓幸繼烝嘗時維禁煙隨俗展墓匪云報本庶不敢忘伏維尚饗祭祖禰墓祝文墓祭非古也以應芳不肖不克歸里不能以時省掃常愧於心每年寒食展拜墓下豺獺之意庶效萬一尚冀先澤埀裕後人有永弗替墓祭母弟祝文代木等作寒食墓祭雖狥俗禮為子孫者哀慕省掃亦庶㡬豺獺報本之意焉惟慈母賢弟魂魄有靈必蒙歆格墓祭先兄祝文父母遺體本有三兄仲兄避世不知所終伯兄季兄並窆於此時維寒食祭掃荒丘手足之情庶乎不忘娶孫婦祭祖祝文維洪武十八年歲次乙丑三月初四日乙丑孝曽孫應芳䓁以孫男塤於初五日丙寅吉辰娶本縣安豐南鄉吕氏女為妻敢昭告於某官曰娶婦三月而廟見者古㛰禮也近代之制以日代月各有義焉應芳輒敢㕘酌古今從宜從俗擬於翼日親迎婦初入門先當謁拜先世以見不敢忘本之意然後祗見舅姑及諸姻眷自茲以往庶得奉承宗祀蔓延嗣續尚頼遺澤埀裕弗替謹以清酌庶羞前期祗薦謹告祭徐仲清文嗚呼九流百家玉石混錯公隠於醫常之一鶚黄岐之書孰云不知公得其要探𤣥索微如古兵法時用出竒愽議閎辨吐屑霏霏蜚英蚤年鄉評衆推紫燕歴塊非駘可希遭時艱危挈家勾吴藥石之靈字及豚魚長蛇當路報亦銜珠以之事親厚養為娱春風杏林名聲載途所不忘者首丘如狐大明開天四海一家父母之邦青氊故廬徴車聿至乃赴清都醫國之忠老莫能輸謁告而還子孫怡愉蜂房合戸哺雀羣烏混迹市塵懸我藥壺衛生之仁施於州閭佳哉蔗境餘人所無衣冠敬共鬚眉皓如應芳忝交四世於此公有佳兒與我中子同業於儒同出而仕惟余不猶一生一死公恤其孤與諸孫齒誘掖激昻誨言提耳老我墻東相望尺咫頻年䘮明跬歩千里時蒙問訊或饋藥餌心親迹踈匪負知己今公闔棺事皆定矣我未能然望風長喟束芻授孫往奠靈几玉雪之姿羮墻宛爾載歌薤露商飇歘起願言從逰脫屣滓泥存順沒寧庶㡬無愧遷葬二兄祝文九月二十六日元歴埀盡時盜之槌頷珠斷釧臂無處無之嗟我二兄荒郊廢塜雖有後人漫不省視與無人同薪者芻者為樵牧場而犁鉏者日侵月削又將為禾黍區矣應芳以同氣之通是可忍乎今重製二函遷瘞祖壠東南隅以祔大父母父母及諸父之側竝封如前䕃以竹木嵗時酒飲庶得享而侑食焉惟兄有靈妥兹幽宅諸親友祭曹子夀文古之人有言狐死兔悲物傷其類况人為物靈居同閭里有瓜葛之親朋友之義者乎又况子夀之為人善與人交而有春風和氣者乎居常往來杯酒為禮或有時而合歡雪襟懐之凝滯奈何轑釜之聲瓶罍之耻往往鮮克遂其意也欷㱆慷慨音猶在耳一月之餘痿而弗起屬纊未定而闔棺訃音裁至而發靷東方載明虆梩亟奄於横山之址凡我親朋惆悵而已其為骨肉至親者又何忍而至於若是耶溪毛泂酌亟奠靈几遂成永違顙而有泚祭唐仲傑文公之子吾子之門弟子也吾之孫公以小友呼之過愛而忘其齒也垣雖失怙如飲食數載慶吊吉㓙且能惓惓乎盡其禮也今公之殁胥靡也哉古人月明千里再歌些詞魂兮歸兮寓永傷於匏樽一酹乎落花流水祭劉德祥親家文人皆謂公有通濟之才設施之方且見識之長何始終之乖張吾嘗以為江河之舟視舶而微非葦而杭能重載而逺適可周流於四方或長河順流懸帆巨檣一日千里快若飛黄或大江水逆石尤風狂釘石繫䌫隨波低昻或脱難於盤渦或經險於吕梁或候潮而逗遛或阻氷而徬徨安知一夕怒濤舂撞盲飈簸颺遂顛覆於鮫䱝之鄉嗚呼哀哉十四年間安危變遷以資禀之髙明知有命之在天不怨不尤處之㤗然鄉之評旦前後可甄有可稱於後者何異乎青史之傳嗚呼哀哉如某者昔在東闗隣比相依承公以鍾愛之女為吾孫阿塏之妻雖别多而㑹少獲通家而往來每黄耳之有信知告老而有期擬祖孫同迓呼麯生以洗泥訃音忽至招魂來歸塏也哭婦翁於四千里之外奈此願之乖違兩兒扶持奠此一巵文以抒瓜葛之情詩以冩薤露之悲公知不知我泗霑衣生日祀先祝文某之生斯世也九十一年每念劬勞㒺克有報也然視不明聽不聰而猶有可覩之物可聞之聲肢體雖頺猶能杖而行几而坐也方寸之天不蔽於私義理昭著而能燭物是皆生我教我者之大恩也先世之恩報雖不能實未忘乎心也况夫左右服勞飲食裘葛内外有人老老㓜㓜頗知義方非祖考埀裕之力焉能得如是之樂也自今以往天年未盡喘息未絶皆感戴之日也家饋殽羞先用祭享亦庶乎豺獺之報本也祭徐子忠文代席彦適作旦必有暮死生奈何或玉闗之不入或薤露之有歌或馬革褁於外域或魚腹𦵏於汨羅是皆卓犖之士去鄉井捐首丘而忘其考槃之阿也今公之殁類乎古人論公平昔良可悲辛其家居也克肖而翁持身以儉約勤苦待人以和氣春風其户役也覊縻長安夢方尋於失鹿事乃畢於盖棺嗚呼三子鼎峙峙乃公餗銜哀服勤惟恐顛覆雖匍匐而莫救望鍾山而慟哭東牀佳婿淚亦盈掬如某既忝姻婭且居鄉曲愲愲乎叶力同心董征輸之萬斛覩丹旐之來歸極感愴於心目蓉湖采蘋薦此􅌬醁武進縣學立先賢祠祭文代陳知縣易縣丞作昔之人以鄭公之賢而名其鄉以荀淑之子而里名髙陽葢地因人勝使山川人物皆為之有光今夫三先生之産茲邑也道學之傳淵源二程發揮道妙有功遺經劾當國以滔天之罪而貝錦乃成諫至尊以正始之道而逆鱗敢攖觀夫感應之泉醉客之語則忠義之至通乎神明若夫由大魁而演綸㕘大政而憂國者位雖不同同乎一誠輔崇寧之初政知秦蔡之匪賢俄梁木之俱壊徒流芳於汗青是皆可以為天下之師表百世之儀型豈特為鄉里之榮哉某等叨蒙國恩民社之寄以先生祠諸學宫是亦祭於社之遺意詵詵諸生奔走粢盛如將見之于墻于羮霑德薰於晋鄙何以異乎師承吾將見金鐘之䜟復靈劍之聿興謝莊曾祖墓清明祝文某嘗聞先世開封渡江蕃盛東西謝莊地因人姓三百年來陵谷變遷自髙而上故壠茫然睠茲衰丘鬰鬰如許即彼侵疆為外侮禦匝植松楸幽篁翳之弗樵弗牧周垣衛之寒食清明聿來省掃追逺者心妥此蘩􅍨尚享新河口祖墓祝文丘墓之祭禮無所考然俗禮以清明祭掃其來尚矣茍於此以盡其誠亦庶豺獺報本之意也幽明雖殊有感斯應所謂洋洋如在者將見諸羮墻見諸堂封斧封馬鬛封也某等雖不肖無似尚期埀裕以衍餘澤繼述弗替尚享先考忌日祝文父母之恩人皆㒺極惟吾父之鍾愛於某也既生之又能擇師而教之使日就琢磨黽勉樹立雖不克能馳驅取青紫以舉其身以顯其親以澤其後人然此身頼訓育之力不姦不邪不淪胥於習俗之陋於先世無甚忝辱子若孫則矯枉就正識之無於農圃之間而我杖履所至晏然棲息無飢無憂是皆吾親之遺澤未冺也此恩此德之死不忘惟兹忌辰祗陳泂酌以鳴其感悰恭請顯妣石氏安人同賜假享謹告祝先致語代丁學古作奉先思孝聖賢之訓甚明事死如生祖考之靈可格焚香代鬰鬯之灌秉燭為庭燎之光雖無鐘鼓鏗鏘惟是豆籩奔走志意追思於齋戒儀容宛見於羮墻蘋蘩蕰􅇨之毛靈筵可薦参苓姜桂之物相籠親儲谷陵兩變於頻年城郭一㕓於今日如繩祖武勉讀父書豚魚或昧於交孚時加修省豺獺粗知於報本歲奉烝嘗伏願濯濯厥靈洋洋如在灾不生禍不作正頼乎厦屋帡幪居之安資之深何異乎門閭髙大根深蒂固地乆天長初進酒生不封侯賜酒泉無人死作酒中仙一杯初進葡萄醁且喜家庭有象賢苾苾芬芬一豆羮丹𠂻寸許若葵傾我祖我宗應歡喜自幸厨無轑釜聲再進酒饌銀燭生花再舉觴滿堂渾是欝金香愁多莫問人間世年少多為地下郎不識駝峰翠釜烹羮名錦帯亦虗稱一杯骨董如芹獻五味調和意盡誠三進酒饌孤兒碌碌混泥塵華胄遥遥出縉紳百拜勉循三獻禮一年祗薦四時新廟堂調鼎用塩梅四海蒼生笑口開我手幸無窮鬼捩折旋三獻奉羮杯進饅頭籠餅炊來玉屑香貽年喜得歲豐穰賢如脫粟晏平仲應笑縮葱侯侍郎送靈致語切以欲表孝情勉循俗禮焚楮錢以代幣意在殷勤酹桂酒以送靈魂歸寥廓下情不勝感愴之至祭曹子毅大使文代諸親作萬物之靈莫靈於人然人以異於物者秉彜方寸之天不和而公不偽而真也惟靈身無毁傷不辱其親口無萋斐亦近乎仁不汲汲以肥家不戚戚於謀身西園鬻爵乘時取名東陵種瓜避時辭榮是皆過不吝改而復其天真至若愛女而嫁不贅婿而效秦視其弟之子猶子意終老以歡忻非明理而能之乎彼昧於理而不能然者寧不泚顙於泉下貽誚於鄉鄰某等親舊交接敬恭相於悵幽㝠之永别感涕泗而欷㱆輀車發靷奠此束芻子祭父文代奔牛陳明逺兄弟作哀哀父母生我劬勞欲報之德昊天罔極此尼山聖人刪詩三百存此言為萬世之訓也凡為人子者報親之心其可忘也况某某之痛親尢有甚於常人者元歴之末兵戈數年委棄桑梓流離異鄉其生也不能盡菽水之歡其殁也不能求宅兆之安陵谷之變丘壠之失仰愧俯怍無可奈何於茲又隔一宇宙矣今也倣昔人衣冠之葬葬以木主巫陽些歌雙魂來歸於以寓安厝之禮於以表追逺之心非敢謂報親之萬一也於乎哀哉於乎痛哉祭姊丈何子潤文代侯徳名作猗歟吾姊得配君子梁鴻孟光隠德可比睠我弟昆骨肉無異賓朋之交或臧或否坦率忤物豈無微纇於乎蒼天禍福倚伏乃著戎衣往役安陸折桞郡城别淚盈掬十年夢寐每論𠂻曲黄耳書歸殷勤齒錄路越四千親愛愈篤尚聞矍鑠慰我毣毣安知訃音遽云瞑目生還玉闗無復可卜於乎蒼天何怨何尤嗟嗟我嬃舉案無由兩地共哭痛心如抽爰命巫陽招魂道周香雪一觥薦此蘋羞魂兮魂兮來歸首丘祭金親家文代袁茂卿作金以運粮遼東巨船五十餘隻官吏役夫千餘人回途遭風覆舟而溺於乎平地風波陸沉者多航海而役奈􅄓母何魚腸𦵏兮渺茫散精靈兮八荒巫陽銜哀兮籲穹蒼白雲悠悠兮歸故鄉大矣哉尾閭無底渤澥無邉非精衛之石可填豈彭咸之居能遷魂兮來歸閭井依然雙親能保其妻子一弟服勤而力田逍遥倘佯何異乎生前某等葭莩之親鄉曲之情援溺之手㒺措將迎之意宜傾言采溪毛薦此一觥祭湯母文代吕輔之等作惟靈春秋八十有七年林下髙風鄉稱姆儀耳聰目明老而弗衰盡三從之道全四體之歸其早歲之事非所詳知請以晚年所見而知者頌之男㛰女嫁各得其時愛其男及其婦則能盡其慈親其女及其婿則無偏無私其諸卑幼愛亦如之視姻眷如骨肉待隣里無陵夷故其病也人皆扶持其殁也人皆涕洟而今而後侍奉無期區區酌東洲之水擷横山之薇於以見親親之情於以表戀戀之悲靈其不昧鑒此哀詞祭重外甥女周氏文維洪武二十四年十一月日龜巢老人謝舅翁擕子及孫以清酌庶羞祭汝重外甥周氏娘子告之曰人不幸遇世變而俘於兵如風雨落花藩溷泥途鮮或不汚汝乃釋係累以配二千石之子冝其家而恱於舅姑此不幸中之幸非人之所能圖也至如一念之孝念母孀居廿餘年抱歸寧之願百餘舍渉艱闗之途德哉良人能與之俱服齊衰以終其䘮脫簪珥以恤其家睠我東翁母嘗託孤亦欲報之以瓊琚凡如此類竹帛可書則昔之所幸者抑亦有感於天而天賜之扶輿也今也一疾斯須朝露溘然鬛封象服慈親墓田苐良人之悲有未𦵏之親未笄之女汝何忍乎舍㫋吾意汝視斯世斯身履氷臨淵玉石俱焚萬萬千千保遺體之全歸餘無憾於九泉寥寥旌善亭令名誰為傳於乎蒼天代曹原度祭黄仲器文公平生與某為忘年交年雖不同身同澤臞韋杜桑麻叔牙夷吾舊雨有時而契濶今雨有時而招呼往往來來曽不計誰數而誰疏也夫以公晚歲言之一子出贅鼓盆自娯或蒼頭而詩巻或長鬚而酒壺或載月剡溪之舟或踏雪㶚橋之驢尋梅㸔竹清興逸如故人謂公為荷篠荷蕢之徒嗚呼公之闔棺之日某客東呉不救䘮於匍匐不送䘮於泥途每一思之涕泗霑裾酌彼潢潦薦兹束芻謝莊墓祭祝文開封舊家軒冕烈塘隨龍渡江奄宅兹方豈無佳城海水尋田敬惟髙堂祖封巋然清明祭掃豺獺遺意尚期埀裕有永弗替烈塘墓祭祝文人本乎祖猶物之天化育之恩疇能盡然維曽大父瓜瓞蔓延幽幽殯宫宅此平原左三從祖我祖右偏兩伯遷祔雙璧仍連五封十靈餘皆茫然天荒地老陵谷變遷尚頼遺澤箕裘勉㫋清明省掃薦此蘋蘩霜露之悲永矢弗諼横山墓祭祝文代子木作哀哉慈親寂寞九泉吾弟與姪亦遽然而然言之痛心有不能忘其言也夫親在則晨昬定省親殁則春秋祭祀寒食上塚陳此饛簋雖不足報其劬勞庶循乎世俗之禮維吾親吾弟及其子念之祭邵姨夫文代孫垣作嗚呼先人在時我姨丈以肺腑之親往來之頻不逺三舍有如比鄰至不幸殁於鄭校歸𦵏横山而姨丈弔之祭之猶無異乎平昔禮意之慇懃也數年之間姨丈不禄吾兄則折桂秋風時垣又失脚危途路迷而車覆母嫠居子戎服母東呉子西蜀回視六親皆茫然置諸弗告今也幸服役而過家哀辭一幅酸涙一掬吐母子之真情於此來之一慟哭也尊無醇酎豆無㫖蓄聲容藹然鑒此𠂻曲新河口祖墳上祭奠祝文維洪武十六年歲次癸亥二月初九日孝孫某敢昭告於祖考妣伯父母祖父母父母從父母九位尊靈曰墓祭本非禮欲子孫於雨露之春不忘厥祖從俗祭掃以寓孝思尚冀遺澤使後人繼繼繩繩有永弗替謹以清酌庶羞祗薦歲事謹告謝莊曾祖墳上築墻祭奠祝文維年月日孝曾孫某以目昬不能逺去躬拜墓下謹遣𤣥孫某等代行敬昭告於曾祖考妣二位之靈曰人本乎祖極恩如天祖世雖逺天不可忘睠茲故土殯宫猶存繚以周垣以禦樵牧清明省掃歲修祀事尚祈埀裕悠逺無斁謹告寒食祭妻墓祝文余生與細君偕老君年七十有九我齒長於君者兩年以余之潦倒而君稍强健也孰謂君先棄余而逝也君骨肉之窆於此倐焉兩旬視時艱虞恨不能相從泉下以安其居維茲寒食擕子孫狥俗祭掃以寓哀思尚享寒食祭子墓祝文墓藏而骨豈祭所乎然而爾之遺言有曰歸袝先塋子孫姻戚歲時灑麥飯於松楸之下志願足矣今茲寒食扶我擕幼設祭墦間以踐爾之言如爾之素志抑亦表長幼骨肉之情吾子有靈尚飲食之代祭胡隠君文惟靈世居東呉笠澤之濱厭處卑濕於茲卜隣同井為鄉埀五十春維桑與梓寖為婚姻待人以恭儉以律身二子克肖搆穫惟勤貽謀諸孫佔畢其呻老福婆娑笻杖幅巾如某等同一里閈往來侁侁以翁髙年而尊而親翁雖不飲席必同茵笑語相狎翁弗我嗔春風童顔喜色津津意其夀考籛鏗之倫何物二豎瘨我吉人我來問安翁語諄諄别不旋踵哭聲遽聞追念疇昔涕泗霑巾當此窀穸束芻具陳出門一慟悲風愁雲張彦實哀詞歲丁亥之仲冬丹陽張君彦實遘厲瘧疾不五日而逝其友人謝應芳為哭之慟且歎曰噫君自小倜儻多知謀尚氣節能仗大義平居論時事言如湧泉故縉紳多器之其憂人之憂樂人之樂亦庶㡬杜季良之流歟苐峭直不容人過遇强梗欲鉏去之用是或斂怨焉後至元間邑大姓與令有隙且與君不相能因媒蘖其短詣部使愬之謂君嘗為令納賄部使者初不能察稍加淫刑欲强服焉令恐噤不復辯君受挫辱至數日終不忍加誣於令若是者非伏義能之乎至正初里有横逆君疾之一日乃自殘其幼搆大獄以䧟君之季子聞者股栗君處之裕然詣郡邑雪理卒能脫其子之械以械之他如姻舊及凡與之逰者顛則扶之危則持之若是者又不可一二數但惜乎負竒崛之氣時不見用終於此而已於乎吾彦實之死可不為之哀乎然而象賢有人君又能擇其最肖似者為仲氏之後使先世之業並立弗墜則彦實之死猶無死也奚哀為雖然哀者人情也禮曰哭死而哀非為生者也予與君素相知而氣質且相類狐兔之悲疇克自己故為之辭以冩其哀云天胡為兮生楩楠構大厦兮無不堪匠石不遇兮老雲巖天胡為兮生龍媒鹽車困兮駿骨埋名駒汗血兮凌風埃折瑶華兮山之阿望羙人兮不我過我心傷悲兮淚滂沱夀上人哀詞浮屠夀道傳蘓人也年三十嬰暴疾不終夕而逝其親戚師友以及鄉里之人也咸哀之予之哀則又有己私焉吾聞道傳為兒童時既棄家學浮屠越數歲慕徑山古鼎師化風往事之為入室弟子未㡬師命典教藏聲譽蔚然已而振錫逰諸方㕘禪門老宿聞見日益廣操履日益堅被緇艾茹蒿芹泊如也一日念親老無他侍養飄然來歸朝夕奉滫瀡以荅顧復之恩又築室西林閉門讀天竺書且旁通百氏會其歸趣閲五六年矻矻不少暇庸詎知遽止於斯邪吁夫道傳之聰敏勤苦早歲入徑山之室典教藏已卓犖不羣使歴階而升足為叢林師表矣道傳乃退然自守而卒無聞也養親而不得終其志力學而未能發乎文辭以黼黻斯道此衆人所共惜而為哀者也予於道傳初無葭莩之親鄉里之暱䘮亂之際傾葢如舊舘焉以安其居榖焉以盡其禮愛之敬之二載猶一日視親戚鄉里殆有過焉以今思之可不重為之哀乎或謂彼佛以寂滅為樂而道傳深究厥旨必樂於逝矣奚哀為予曰不然吾今哀道傳者情也其樂與否非所論也夫情動於中而辭出焉辭而哀之亦以示不忘云大鈞賦物兮物胡不侔深谷蘭摧兮蕕生道周良農服田兮祈榖有秋禾方秀實兮賦以螟蛑於乎哀哉伊人好修天其渺茫兮吾將誰尤哀鶴辭至正八年秋盜夜入吾友諸葛用中氏之家殺其鶴於後圃已而盜被執詰之盗吐其實當其穴墻之時鶴長鳴警之既穴而入鶴奮翮而前若將力禦焉故遇害用中於是惋惜流涕褁之席坎而埋之縣文學汪君以敬為作瘞鶴銘進士王君伯恂又為之誄然則鶴之死可無憾矣然余於是重有感焉夫物性能警盜者狗也非鶴也警盜而鳴亦已異矣禦盜而死不亦義乎人為物靈求其舍生取義者猶不易得况禽鳥乎葛之鶴其可謂義鶴也已矣故哀之以辭其辭曰鶴兮鶴兮瘞彼髙岡爾鳥其形心人之良鶴之斃兮狥於義兮骨朽名存猶無死兮龜巢稿巻十五欽定四庫全書龜巢稿巻十六元謝應芳撰詩雪巢為馬仲良賦馬鞍山髙數千尺考槃之阿環大澤梅花為屋雪為巢窓户玲瓏空虚白諸公衮衮登雲梯若人奚獨能幽棲澹然素志絶華藻要令朴俗還標枝藍闗策馬官逺謫居延牧羝氊盡囓何如雪飲樂巢居更與党家風味别梨雲無夢清如許膝上兒郎賦冰柱此生此樂慎勿移聽取龜巢老人語次韻答許西溪憶昔送别黄花秋烏紗破帽霜滿頭别來作詩屢問訊夢中載酒時遨遊兵戈同歴二十載鵂鶹夜啼雲靄靄全家老稚幸逃生又閲桑田變滄海啓榮之樂今有餘勿謂比榮年不如峴山一望三太息襄陽耆舊晨星踈次韻自述百年有限耻求仙數口無饑頼薄田菰米熟來連日雨菊花開到小春天方從易外窮羲畫無復詩中泥鄭箋客至酒盃時一舉開籠放鶴舞蹁躚送婁主簿赴京考績吳霜如雪㸃征衣匹馬之京小𨽻随鸞棘特書良史筆鳳臺重覽謫仙詩天開景運榮文治年少多才際盛時野老送行無贐物梅花折去臈前枝寄張以誠二首入城一度一相尋為愛論詩識趣深歳晏杜門寒不出折梅要寄隴頭今二蘭陵市上澒囂塵藥杵聲中樂隠淪兒軰荷鉏今日去一株添種杏林春雪舟棹歌并序湖南潘公珍仲自號雪舟以耆艾之年監稅江隂縣洪武戊辰冬赴京考績語予曰今將告老于朝得㫖則扁舟載雪而歸矣雪舟之興盖與山隂王子猷有不同耳吁昔者陸公紀官滿欝林歸舟載石使當日苞苴有物則奚用是石為哉公之雪舟意盖如此若夫鴟夷子皮之舟装江南重寳復竊取傾國之尤物随之汚衊五湖遺臭千古其視吾載石與雪者不翅霄壤今雪舟之歸雖未可必然其志趣髙潔如此雖在市朝亦必為清白吏是亦不歸之歸也予嘉之故為作雪舟棹歌三章以道其樂云載雪兮孤舟帆江風兮中流蘭槐歸兮無恙吾將老兮滄洲再歌剖肉兮藏珠抱玉兮求沽悵斯人兮非吾徒尋鷗盟兮侣樵蘓三歌舟揺揺兮江水長五老玉立兮遥相望解吾纓兮濯湖湘樂吾之樂兮未渠央送王主簿赴京考績三年一枝此鸞棘一息萬里方鵬程長安西日舉頭近匹馬北風行色清朝廷考績埀令典臺閣交薦蜚英聲隣封野老頭雪白也折梅花作送行雪巖詩為江隂李縣丞作瞻彼雪巖太行之隂玉樹瓊林纎滓弗侵雪巖峩峩巖有薜蘿有美君子居巖之阿峩峩雪巖蔚蘿如昔時止時行不泥其跡雪白而清巖静而深曷其似之君子之君子之心始終一節謂予不信如彼巖雪寄希物先楚蘭江二禪老優缽花開五百年連枝香徹九重天恩承雨露移金刹語帶煙霞潄玉泉虎踞龍蟠多古迹燕來鴻去又新年老夫嬾著遊山屐空仰崔嵬夕照邊過烈塘祖墳里人牧牛于壠上以詩呈郡邑鳳橋之西烈塘東我祖我禰馬鬛封向來松柏蟠蒼龍灰飛煙滅邱前風十年天造開鴻濛恩沾萬國生育同壟頭萌蘖春蒙茸藤枝棘花雜青紅牛羊斧斤集如蠭一年一度一掃空白頭遺孤抱哀恫麾之不去欺龍鍾無階上天訴天翁吞聲躑躅淚滿胸府公頼有渤海龔琴堂長貳明且聰令行如風偃蒿蓬樵夫牧人乃絶踪將來宰木蔽幽宫九原感戴恩無窮嗚呼九原感戴恩無窮懐成都監倉趙執中三首擲去任公舊釣竿龍墀拜命即之官丈夫志在功名外蜀道行來自不難二七千里外芙蓉城四五月間鶗鴂聲月俸支來賸沽酒莫遣閑愁取次生三公餘訪古碧雞祠官栁野梅皆可詩我欲見詩知雅興如何黄耳到家遲寄熊元修五湖三泖一􅋯仙心骨俱清地更偏睡鴨燒香書屋裏閑鷗結社釣磯邊絶憐芳草無塵土又喜黄楊閲閏年熟客不來清晝永南山相對兩悠然晚香亭為蔣公勉作維莫之秋百草不芳惟菊有華晚節之香君子擬之金玉其相顒顒卬卬氣凌風霜回視春葩綺羅靚妝及兹凉秋掃跡窮荒菊也特立澹乎坤裳我佩爾紉我帶爾纕厥徳之馨匪飡其英亭有三徑里猶柴桑亭亦有池永同南陽宜爾父子眉夀無康矧有佳客駱盧王楊髙堂起居階庭趨蹌玩物適意其樂洋洋鄙人作歌以侑稱觴題龔景良傍梅書屋南昌山水非不佳卜隣直欲傍梅花花開歳晚香滿屋清致不減林逋家三間茅宇大如斗四壁圖書雜蝌蚪腹笥便便不自多汗竹之編長在手有時門外雪三尺羣籟無聲人絶跡梅花立雪似游揚不作桃哀憔悴色春風滿面笑相看知我鐵心同歳寒他日移居玉堂署應有品題稱二難洛陽牡丹春比屋日夜沉酣沸絲竹何當聆我讀書聲亦若聞韶觧忘肉次韻荅毛雲莊并簡太希先生吾聞天台之山冠東南蔚有清氣非雲嵐山髙一萬八千丈石頭毛髪青􅆴􅆴鍾靈仙釋踵相接求為世用疇能堪不知三綱九法是何物浪説千巖萬壑能窮探雲莊先生隠君子非仙非釋棲苔龕胸中氷滿壺頭上雪一簮羲皇以來書盡讀熱官不要詩仍湛草堂侣有北山鶴菊泉飲比南陽潭清風日掃三徑竹寒霜歳熟千頭柑齊名子陳子不愛功名酣坐談風月只松麈卧遊山澤非桃驂老夫恨臂不羽翼翩然飛去時相叅四壁同馬卿一褌如阮咸猶喜盤飡菜有二十七生世年踰八十三忘機頗覺白生室造道尚欲青於藍向來行路如棘澁今乃茹荼猶薺甘小山老叢桂滄江倚枯柟愛君傑作神氣壯睠我孤陋顔色慚蘭陵府主蓮幕客皆云此詩壓倒方雲菴赤手鯨牙力可拔薫人雞舌香微含餘波及我老孤研清入肺腑蠲焚惔一朝怪事出幕府口不忍語非三緘令威到家兮能自談常郡經歴鄭履元禮吾友天台陳太希之門人到任數月家人至而元禮病疫而殁寡妻稚子遑遑無歸予作二詩以哀挽之盲風歘起怪禽呼吹折琅玕樹一株何事天公渾不管生年多賦道旁樗二琅玕樹折鳳巢傾膽落鵷雛抱母鳴故國欲歸䨇羽弱哀哀啼作杜鵑聲延陵野老歌送張太守延陵野老巾滿霜送侯入朝歌道傍歌中不解說循良但云三載安農桑官無煩苛歳豐穰饑有菽粟寒衣裳我侯興學扶綱常授經諸生踵陳襄一鼓士氣弛而張劍井亦復騰輝光訟庭春來莎草長風行四邑方泱泱九重天語星使將五馬夜趣天官裝黎明馬出金斗坊羣氓猶挽青絲韁銓衡郡才進巖廊將見列郡皆龔黄連歩拾級登廟廊佩鳴珩璜謹趨蹡掖垣紫薇花自香甘棠之愛民弗忘大江東流青海洋我思悠悠未渠央寄吕教諭覔惠山泉木屐上山老無力茶鐺覔泉猶累人目光直射九龍角胸次欲浣三斛塵水符分竹果如約石牀焦桐堪作薪君當知我鄙肉食一瓢不厭平生貧寄袁子英横山東望崑山逺江水西來海水連每辱手書論著述猶如面晤奉周旋微陽喜復飛葭管大有重書汗竹編若問老夫兒女事曾孫又抱小春前謝余提學摘藳序虚譽何人説草𤣥雄文為我冠蒲編諸公共美金聲擲兒軰争誇石刻傳篛褁小團陽羡月缾封新汲惠山泉故鄉風土殊蕭瑟聊作梅花寄海邊挽吳母曹氏賢母無復見孤兒痛奈何絳紗空幔在彤史闕文多林竹冬猶筍㕓氓巷不歌蹇予妻若子垂涕憶委佗代王尚絅挽吳母澱山湖上避兵時總角曾聞阿母慈霜野不教兒子出冰池竟得鯉魚知生前冠冕升堂拜死後芬芳婦徳碑愧我不才俱靡及抽毫遥寫楚些悲次韻賈教授暮春言懐琴有徽音劍有光惜哉江海老張蒼且將濁酒供瓢飲何必明珠用斗量壇杏作花紅樹暖泮芹抽葉翠波香鼇山邈在天東北時復瞻雲首一昂寄萊陽縣丞蘇偉正觸熱訪而翁萊陽書適至而翁釋離憂吾儕慰馳系青雲發軔初甘雨随車沛旱歲竟豐穰天恩更汪濊㕓氓九衢舞海市百靈喜魁然英妙年際此太平世蹇予八十翁懐人二千里哦松公務餘食檗珍珠比魏公百韻詩仕學有遺軌錢孝女詩斷臂耻受汚剜目示守節斷髪割耳鼻亦截忍棄夫家甘毁滅吁嗟錢氏女孝心亦如之剟肉於股療阿婆想當持刀入手時精誠黙感天翁知百靈撝呼走神醫肉乃化作藥石糜溲除淋液腹除癖如以湯泉澆雪釋婆無呻吟女弗戚隣翁里媪皆嘆息予生慕忠孝老去仍惓惓每見返哺烏如甫拜杜鵑願言屏䲭鴞不與同戴天竹林寒筍冰池鯉澤中堇菜籬根米天其埀恩錫孝子董狐盡為書青史和江隂鄭教諭登樓為愛君山好每登樓上頭一氊渾不冷有酒更何愁歳月江流急人生泡影浮興來歌舞罷倚檻看天不次韻答陳推官珍重新詩遺華於翠織成披雲天似洗連日雨頻傾大府羣英聚清朝列爵榮正湏康濟力膏澤被蒼生和陳推官過余公祠公諱闕字庭心元進士安慶路總管守城死洪武初勅建元忠臣廟謚忠宣公砥柱廻瀾屹吕梁安知誰武復誰湯六年守戰孤臣死一代文章萬丈光草木荒城威肅肅丹青遺廟貎揚揚悲歌沃酹知何日北斗持來挹酒漿殷孝伯輓詞憶昔覊旅中片言識鬷蔑十載忘年交兵戈正騷屑闕知子早卓越春秋參五傳窮源見澄徹闕維時陵谷變遵飬卧巖穴洪武更化初鋒車聘髙潔辭勞忤當路一命萬里徹志違烏鳥飬淚忍啼鵑血咸陽火方燼教雨沃餘烈奐輪周孔廟駿奔豆籩設庭生書帶草青青比蘭茁孤雲日在望縮地恨無訣遄歸一覲省亟去兩踰月老夫獲晤語清風濯煩熱著述亦已多討論心愈切安知三叠歌竟作千古别招魂頼遺孤魂歸母埀絶於乎世之人賦命何優劣或厭飫八珍子獨茹冰雪或稳歩康莊子獨蹊阬隉行行止於斯矩歩踵先哲崑山雲氣慘婁江水聲咽誰為有道碑修名罔磨滅哭盧知州諱熊字公武束帛三徴出薜蘿雲堦歩武正逶迤飄風動地須臾靜奈爾琅玕遽折何二雪手灘流理繭絲一襟華藻竟何施秋風夜月華亭鶴又作悲聲似昔時送浦良能之安陸府代父從軍秋風凉秋夜長徃哉讀父書超然出戎行詩書元帥古來有縉紳先生今汝望寄徐伯樞縣丞逐客多焚晝錦衣謫仙喜得夜郎歸古來白雪詞難和此去青山志不違洗馬池邊楊栁暗卧龍岡上豆苗肥獨憐棣蕚秋蕭瑟又見西風旅鴈飛某巢居病瘧有客自青門山來者語予曰賢太守過道鄉佳城以弔以酹且為之扶植仆碑添土舊封又將築周垣而䕶之殘山剰水皆有徳色某聞之喜不覺其疾頓愈起坐午窓老硯濡墨筆是詩以記盛事洪武十年歳在丁巳七月十日也世有文潞公乃立明道表明道表不立斯文尚幽𦕈時有孔北海乃稱通徳門通徳門不稱大儒曷推尊古人今人同此心當風正欲披其襟嗟予巢家子騶子傳道龍門天下士一朝扣天闗獨立批龍鱗祗恐緑衣黄裳悞人主安知炎煙瘴雨危其身萬里投荒挺霜竹歸來青山竟埋玉迄今二百九十年陵谷幾畨經變遷折角麒麟卧荆棘復見薄侯駐熊軾鬛封添得烏銜土頽碑扶起龜趺石先生九京知不知名在人間益輝赫孔北海文潞公今人古人將無同青天髙髙不可問白楊為我呌西風題夜潮圖昔余夜醉錢塘酒看潮八月中秋後銀山湧出海門來潮聲殷若雷霆吼此圖之作知幾年當時景物皆依然雲山兩岸淡籠月雪浪一江髙拍天一觀頓覺毛髪立再觀祇恐衣裳濕扁舟漁子任掀舞别渚鷗鳬自翔集奔騰澎湃無足驚人間平地風波生乗桴尼父果浮海從遊我亦跨長鯨郭府判惠佛面竹杖盖以佛狀而名之矧夫節有交互之異旁生兩枝末復為一視他杖殊不同詩以謝之頎然此君生越裳化身無乃是空王生來丈六紫金相復現太乙青藜光孫枝並出比能秀老節交錯成文章只恐化龍飛入海尚煩垂念瞽倀倀呈府官求刋思賢録忠公神遊白玉京鳳凰無復朝陽鳴寥寥二百九十載其文况忍成漂零某也束髪頗嗜學四方掇拾手不停珠聫璧合綴方册字字句句含芳馨向來避地東入海挾書幾落長平坑還家暗投科斗壁何異寶劍埋豐城郡公宣化重名教斯文要俾晦復明顛呼鐵筆寫堅木彷彿中郎鐫石經螢窓雪案人快覩妙語炳如懸日星顯忠不須庵忠鄒無用亭牽裾伏蒲想儀型儼然見我鄉先生題徐良夫耕漁軒我本耕漁人喜子與同志子居中吳山水窟比我延陵更佳致太湖三萬六千頃七十二峰連紫翠山皆可畊水可漁無復紛紜嬰世累朋游日接慎威儀酣酒賦詩時適意客來遺我金蘭集儼然承顔依玉立因以今人思古人與客評論重於邑輟耕莘野赴阿衡後人嘵嘵疑割烹擲去漁竿佐周武鷹揚之勞亦良苦當今盛時伊吕多幽棲正宜安薜蘿山中小草或浪出千慮鮮能無一失願言飬髙持素心百鍊不改堅如金相過未擬聆跫音寄言時復相規箴生日口號餘生重作太平民雪色綾袍皂葛巾兒業經鉏能飬志家居瓢飲不憂貧屋頭箇箇慈烏喜堦下翩翩舞鶴馴此日誰為湯餅客孟光相對髩如銀二秋菊春蘭各有時頽然老我一書癡脚跟不識青雲路頭髪空成白雪絲怕醉有時曾止酒遣閑無日不吟詩傍人若問今年幾八十年前五歳兒送聰上人蘇州有即常州有今雨來時舊雨來銕限門前人立雪寶華堂上鼓鳴雷九州禹貢包時橘十里吳王醉處梅請與淡翁論古意老夫朝暮亦浮杯送僧歸四明省母同根華蕚兩三枝甘輭能供老阿㜷不用睦州蒲織履睦州因得賦歸遲二吳霜如雪滿袈裟正月闌珊可到家别有一般清浄供髙堂設法向摩耶送鄭教諭進表之京束氊黌舎跨征鞍奉表朝家慶履端虎拜三呼稱萬夀龍顔一笑宴千官酌來天上葡萄酒洗去胸中苜蓿盤官様文章新製作老夫刮目待歸看過天寧寺閲行中和尚澹居稿知其邃於易學兼長於詩故寄此西來祖業繼箕裘旁入儒林託泳游二雅什中歌矩度九師注外易源流松堪受記皆摩頂石解知音亦㸃頭逸興飄飄誰足擬白雲飛度楚江秋次韻陳推官元旦作東風楊栁驛橋邊香雪沽來斗十千早飲屠蘇懐舊俗遥瞻閶闔賀新年萬方人樂昇平世五色雲開咫尺天廊廟器成今未晚著鞭姑讓祖生先正月十四日代簡招鄉中親友上元之前日將午相邀諸公集環堵山瓢持作鸚鵡杯畦蔬擷取龍根脯兩兒肅客衣襜襜老夫鶴立梅花檐照天蠟燭夜有月勿謂寒舍無燈相棄嫌寄管伯齡兼簡陶呈甫前年詩寫心聲去今日人來口信通一自初交經世變兩無相笑坐文窮崑山氷柱軒窓外笠澤煙波賦詠中更憶南隣龍頂竹曾留東走鹿皮翁張伯仁兄弟濠梁蒙恩還鄉客行二月初三日詩到千墩寄二難且喜江南春氣早不聞濠上雨聲寒花時多釀酴醿酒芳館重修芍藥欄徃事真成塞翁馬正須招集笑相看簡伯仁里中親友七人臨濠人歸去年夏故園花開今兩春看花把酒應共樂訪竹題詩毋厭頻紅塵車馬跡不到滄洲魚鳥人相親老夫遥望徳星聚乗興幾回車欲巾聞趙朋南免官還家作此代簡并以孝女傳求詩兼寄毛世延熊元修水村先生氷雪姿一襟清氣溢為詩不同不異頗奇崛歩趨李白仍委蛇夜郎歸來脫塵屣濯足淞江太湖水雞壇有盟知弗渝書或浮沉况杭葦衰年萬事皆遺忘咏歌之樂殊未央請觀側陋出純孝援筆為揚蘭蕙芳毛公世業詩三百白華補亡求必獲更煩漚社語閑叟定有隋珠照方册舊冬十二月初四日次子林赴京初九日入覲十三日授開封新鄭縣學教諭即日之任時雨雪連數日寒甚眷焉于懐久而不釋兒别䨇親到日邊承恩徑著逺遊鞭一千里外汴梁路十二月中氷雪天楊震未期堂有鱣鄭䖍何愧坐無氊只今偃武修文日正欲鸞膠續斷絃服霞道人歌服霞道人本仙骨隠居琴川山水窟朝看鼎食暮鼎烹富貴於人果何物道人忘世味祗服山中霞却青精棄胡麻八珍視同泥與沙扶桑飛出金老鴉氤氲五色摶精華呴嘘呼吸間入腹皆河車手持九霞觴頭戴三朶花松風為作洞仙曲絶勝金谷鳴筝琶一經不學乃無術麻姑送酒徒爾誇吾服吾霞吾自足安知世有萬羊禄夷齊餓死良可憐留得清名傳汗竹秦人採藥尋蓬山好兒好女無復還漢宫空設盛露盤銅仙為之淚汍瀾元霜本非霜絳雪亦非雪請從服霞道人逍遥指㸃空同授真訣貽五牧劉永真昔賢五牧家何在今爾幽棲地甚偏種秫每供彭澤酒煑茶時汲惠山泉錦鳩呼婦雨初歇丹杏作花春正妍堪笑老夫頭似雪興來尋戴過前川雲牧詩為楊同知賦廬陵美山川穹林古喬木雲椏三千年遵飬卑自牧靜言求放心雞犬常在目朅來陟雲衢半刺剖符竹牧民如牧羊四郊春草緑草豐羊茁壯亦有飽眠犢豈無敗羣者其藩或輕觸約之鞭用蒲所履繼前躅致身將青雲岳牧聫佩玉佐主牧天下庻類頼蕃育雲牧懋厥功吾言此芹曝王叔明雲峰圖王郎多學畫最工筆法似舅松雪翁松雪之書妙天下以書為畫妙亦同想當灑墨成雲峰豪氣壓倒陳元龍層巔崒嵂摩蒼穹咫尺可論千萬重嵐光翠滴天無風若有微籟鳴杉松於乎此時此畫復誰有我為此甥懐此舅秋林讀書圖春風不著長安鞭秋林讀書年復年百篇蝌蚪自為寶三足蟾蜍誰與憐目光爛爛走金電口角泠泠飛玉泉老我東家園册尚分隣燭教曾𤣥題村田樂圖老人村老瓦盆常作雞豚社不識州縣門阿翁醉倒阿婆笑膝上吚鴉弄乳孫六月八日得次子書并書久旱髙田未秧是夕連雨三日喜而和之新鄭書來劍井邊方將隂石捶荆鞭雷霆夜作三更雨江海寒生六月天不惜空囊沽緑螘從教破屋濕青氊北窓風響蕭蕭竹如聽南薫奏五絃去冬送鄭教諭如京詩為天寧聰公沉滯至今年六月轉託發還故作此并元詩寄鄭一詩代折送行栁半年竟墮無何鄉祗因沽酒謝不敏尚謂道術能相忘髙堂談經多士集澄江濯纓清晝長為問襄陽兩耆舊歌鳳曾無説楚狂寄謝楊純夫兼簡陳髙士客來飲客北海樽客去送客東城門不嫌褦襶留信宿各出肺肝聆話言三日雨救赤地旱百川水作黄河奔賦詩為别并志喜兼簡太邱賢祖孫聞袁子英著書作詩寄之我所思兮耕學翁壯年氣欲吞白虹眼看陵谷一變改此心乃與寒灰同硯田筆耒耨經史不稼不穡勤於農我哀民彞失所飬錫類且欲來羣蒙共惟元聖筆六籍為世大法垂無窮楊墨溺人甚洪水孟氏距之成禹功秦以申商漢黄老六朝接跡論虚空緇黄愈出愈荒誕冠冕鞠躬趨下風韓歐間生數百載鳳鳴朝陽羣羽從中間洛閩繼洙泗卓彼二子能折衝雄詞至今凛生氣宜從孔道追遺蹤東將入海乗艨艟長江大河無遏壅老夫獨恨䨇眼矇不與觀日扶桑東贈衡隠居我昔母年垂九十帶經犂鉏粗供給伊今有母八十餘孝飬之聲動鄉邑堂前􅁮􅁮忘憂花屋頭翩翩返哺鴉林宗若識茅季偉薦書定徹天王家題漁人扳罾圖大横峴東芙蓉湖水村髙樹屹西株漁郎曳罾坐樹下短衣緇撮赤髭鬚此圖無乃貎此景東鄰曲舎皆菰蒲吾嘗過此看春水桃花雨晴春日晡漁郎含笑語厥子鱖魚肥似淞江鱸街頭米貴魚亦貴賣魚日糴供家餔只愁水面重租課飛風健卒頻追呼逋租畢輸搒捶脱前村有酒仍湏沽猶勝禄食致奇禍坐受鈇鉞連妻孥夜來湖上好明月醉吹蘆笛歌嗚嗚人生之樂有如此此身安用紆青朱漁郎漁郎知我乎我亦烟波老釣徒溪居垂釣圖磻溪老父興西周綸竿棄擲鷹揚秋富春先生赴東漢羊裘㡬被朝衣換人生出處各有時如魚飲水魚自知釣鈎無餌釣清泚若人彷彿元真子好山滿眼青孱顔清風緑樹滄洲灣悠然意態極瀟洒豈是尋常釣魚者浮波之龜如出洛漁郎睨之龜弗却賣卜覔錢人正多七十二鑚將奈何不如且曳泥涂尾相伴幽人弄煙水細看元在畫圖中多言莫笑癡獃翁管伯齡惠書并和詩故復次前韻荅芙蓉湖照横山影蓬藋門開曲逕通半載月昏渾不出一經頭白未能窮論交半是漁樵者訪舊多於夢寐中説與故人能信不頹然黄鵠化鳬翁維揚王有恒避亂居東吴三十餘年所至寓舍以聴雨篷名之多學能琴而善飲醉則鼔琴自娱故自號曰醉琴然鄉土之思亦嘗扵琴發之予盖相聞而未之識也吾友釋仲翔専書為求二詩遂為賦之聴雨篷昔年家住揚州市雨聲不入弦歌耳居吴聴雨三十年客舍如篷卧篷底篷忩晝暝雲抺漆滴滴㸃㸃疎復密絶似瀟湘夜泊時半雜風波響蕭瑟有時聲急如建瓴有時珠玉聲琮玎屋山便作柂樓倚兩耳洗来心骨清心骨之清豈不好一㸃鄊心忘未了天中玉樹無雙花夢魂日夜長飛遶只今二十四橋月依舊玉簫聲不絶一㠶風送到𤓰洲聴雨孤篷聲又絶醉琴張顛草筆常醉揮以頭濡墨愈神竒醉琴之妙亦應爾穎師乃為徴吾詩琴中佳趣知者誰麯生為我同襟期千鍾百觚追古聖五音六律洞𤣥機一襟宇宙春熙熙七絃氷霜風颸颸得之於心應於手如魚飲水非人知鈞天廣樂醉鄉境悉以所樂鳴金徽髙臺自傾池自廢雍門枉為田文悲我歌醉琴行持贈醉琴叟小春多釀梅花酒我來與君酌大斗濯足滄波太湖口聽醉琴為醉友海苹為詢無言講主作大海多風波浮苹蔑根蒂嗟爾海上苹似我人間世前身楊白花幸不墮泥滓化生江漢間朝宗随衆水出没幾沙刼全此清浄體所以無住著黙契宗乗㫖芥子内須彌吾知同妙理挽王氏祖母母在重闈鶴髪垂孫為能吏鶚書馳二三百里去鄉國七十五年稱母儀李密陳情方有表張林紀徳未成碑斗城昨夜西風急吹折諼花帶雨枝次韻酧陸子文見贈故鄉不願衣錦歸亦不願入承明廬願言結交天下士腹有五車今古書還家十年空兩手釣竿之外餘何有白雲如雪横滿山蘿屋三間大於斗浪川䨇鯉來新吟詩中意興秋俱清雄豪氣敵劉夢得喜無郊島愁窮聲嗟哉風雅久不續老我山林成朽木金盤秋露玉壺氷洗去胸中塵一斛覔官應笑明河篇託物可擬石鼎聫先生識趣出塵表鞭䇿後進追前賢東望吳門長太息舊俗繁華復因襲太湖三萬六千頃七十二峰湖水側何日擕將麯秀才登臨共醉姑蘇臺眼前一事特可喜湖山清氣鍾羣才先生屢薦胡不起濯髪滄洲弄煙水遥遥裔出華亭侯甫里髙風更無比只今奕葉多流芳東床嬌客名尤香呼兒整我遊山屐早晚去從潘孟陽次韻答集講主二首欲尋石上三生約姑待梅邊十月春結社東林無奈逺寄書南鴈豈辭頻平生頼得詩書力朋軰多如骨肉親元伯九泉呼不起擬將雞黍一沾巾二千墩南浦水廻環一棹西風路不難骯髒曾於堂上坐綈袍能禦客中寒可憐學劍身今老祗有耽書興未䦨傳語心知數君子小春來借早梅看冬至即事一簾紅日雨初晴客屨駢羅送復迎賀節本非三代禮随時且喜一陽生齊奴金谷財為害楊相氷山勢易傾何似酒杯長在手青山相對適閑情冬至前二夕憶次子林不寐枕上賦詩將成忽其母夢中作聲撼而覺覺而喜言夢林烈塘舊居作湯餅畢垣居室事懽甚予因用其語為是詩結句云去年臘月初九日發軔天階又一期鄭校頗聞衿佩集歐詞應作送迎詩久無書信來黄耳每有親朋問白眉阿母夜來曾夢汝甘分仍在舊西枝送楊純夫歸琴杜子客長安行囊本枵然得錢沽酒覔鄭䖍不嫌官冷寒無氊爾來六百有餘載世道多随陵谷改身為今人心古人清風髙誼依然在嗟我如鄭貧蒙君愛如杜雖無三絶才樗散頗自喜一從傾盖意相得頭髪不知誰黒白衝寒觸熱每見過愛我西牕好山色援毫或和龜巢編解纓或濯龍井泉常言好古絶類我外物多忤中彌堅低頭甘立矮屋下髙論直到羲皇前朝來賣得凌雲賦麯生車載來相顧門前尺雪凍不消風木吼如虓虎怒宿宿信信傾腹心言欲挐舟抵家去呼兒更酌罄餘懽贈别殷勤抒情愫我昔居吳十九年君歸煩君訪諸友吳山醉處好湖山十闕鄉人來作輭脚局且對春風開笑口街頭米賤酒亦賤一百青蚨滿䨇斗儘判連日醉如泥百憂盡付無何有人生窮逹各有時阿衡元是扶犁手詩書豈徒守章句言行正須傳不朽珍重林居慎厥修好音慰我思悠悠雪篷為蔡子堅作鴟夷船載西施去遺臭五湖煙水路喜爾吳淞雪篷闕江水曾無尤物汚篷牕洞開天雨花柂樓屹立水為柱鵝鴨不驚柔櫓鳴鷗鳬渾在平沙聚非熊無夢釣無餌如琴無絃得琴趣虎頭能為畫漁蓑驢背無勞見詩句潮州阻雪八千里諫書直抗曾何補殘氊囓雪十九年使節堅持亦良苦雪篷之樂樂於天雖欲同人人弗取獨有山隂王子猷清興頗堪同日語過顯慶寺六載重來釋氏家一甌新啜趙州茶杏花風後春何冷柏子庭前日未斜拄杖頼能扶潦倒闕文煩為補楞伽要聽說法頻來徃且喜平橋路不賖書潞城樵舎壁燕子來如舊雨桃花笑為何人竹下青苔不掃恐教鶴歩生塵二一室四皆立壁六孫三已歸妻猶喜老萊舌在不妨矮屋頭低三㧞木狼無䟦㚄絶糧道阻周流天眼或開或闔人心何怨何尤四瀼東瀼西農畮巷南巷北人家白雪秋香禾黍緑雲春靄桑麻劉徳祥監税江州客有誤傳其子死者遣人回家并寄書吾孫辭甚酸苦因賦詩代簡九江相去二千里一别于今五六年盡道國恩容告老安知家信有訛傳山連楚尾青天外潮落潯陽夕照邊遥想此時公務隙爐峰相對思悠然題趙行素佩韋齋綵衣翩翩童丱年佩觹佩韘庭闈前鐵馬紛紛戰争日佩犢佩牛江海邊幽蘭紉佩非不好獨醒未欲追前賢朅來佩韋不佩弦常以輔我氣質偏視韋之緩我之急如餌良藥沉疴痊世事多因忙後錯緩不及事理亦愆不疾不徐發中節秉彞庻得全吾天巖廊鳴玉似髙歩江妃斛珠人浪傳貪榮可笑蘇季子佩六國印扶危顛何如茅齋但安坐且有竹風堪醉眠青山於人少知者白雲與我同悠然韋乎韋乎心自懸得魚吾豈忘吾筌贈黄仲器予觀道書謂洞庭山有林屋洞天仲器以避兵居之既而過雲間適海上復還常之横林閲歳月三十年距洞庭三百餘里仍以林屋自號示不忘也徴予詩故厯叙其遊息之概如此云一目九州皆戰塲避兵林屋水中央林屋仙人不知處橘井委棄青霞漿木奴包金亦致㓂人乃随雲出巖岫五湖三泖放孤舟遵海幽尋采三秀堪輿再造隔兩塵故鄉來歸能幾人芙蓉湖上大横峴煙連緑樹横林春解裝付與箕裘子管領春風桃與李幅巾自作逍遥遊别有行窩修竹裏一童出入長相随欵段之馬亦不騎林屋别來陵谷移時望白雲猶賦詩膏粱文繡俱不喜獨曰愛詩心未已堪笑老夫同此心白首論交結知己何當呼起李謫仙每飲一斗吟百篇殺青盡伐南山竹剰録好詩娛暮年悼許君善谿西老人山澤癯一生祗以詩為娛常言愛詩入骨髓好詩抄藏千百紙七言近體尤忺作不費工夫細琱削嘔心每笑李家兒牛鬼蛇神何足奇老夫初焉未相識數篇不知何處得稠人廣坐誦吾言説項過於楊巨源一朝傾盖千墩下膠漆相投不相舎西鄰假館兩年春買宅移家情轉親此時吳門正堅壁張角未死人相食雲梯砲作霹靂聲狼煙暗天血滿城吾徒幸若王官谷朝夕同吟紫芝曲桑田變海嘘吸間死欲邱首歸横山暮雲春樹勞逺憶十載詩筒仍絡繹重來桑梓甚蕭條巷有索租人呌囂骨冷九原呼不起一酹非歌續蒿里嗟哉時俗貴輕肥如子愛詩人亦稀贈王仲昭父子扁舟入吳空載月閭邱虎邱俱不謁停橈再拜范公祠楊花正落祠前雪義田義宅三百年義聲洋洋天下傳嗟爾吳之人胡不踐遺躅貪夫婪婪昧盈縮前車後車屢顛覆下床䨇屨内䨇足奚用領軍鞋一屋我來訪舊無所將贈以范公博施之義方家傳更須授賢郎福澤將來未渠央呉淞江水長藍謝青毋我忘吳逸庵輓歌辭廓然一襟涵宇宙鍾氣會稽山水秀春秋髙似伏生年岐伯諸書口傳授浙水西來家屢遷名與杏林俱不朽老去居吳抱䨇膝四顧狼煙暗如漆兒能負米百不憂有酒即呼人共吃常時隠几看青山醉則􅋜􅋜枕琴瑟廿年同飲淞江水通家之交親戚比别來恨無縮地術時復論心書一紙只今祗與阿戎談翁在九京呼不起李明善慈竹軒吳淞江南湓浦曲慈竹軒開薜蘿屋更無花木鬬芬華一徑波光照猗菉纎塵不滓蒼玉叢枝枝葉葉皆清風一年一度冬夏笋冬生其外夏其中徳哉此竹美如許子母相交禦寒暑嗟哉人為萬物靈温凊㡬人能如汝吾知吾友此軒居朝夕奉親來版輿母慈子孝黙相契更喜君子能威如樹萱堂上分甘樂諸孫錦䙀如錦籜家僮笑指青琅玕少長喜與俱平安令名千古埀不刋咄彼鴟梟兒人面刀劍腹不學返哺烏頑然忘顧復嗚呼吾不知其見此烏兮何面目爾何日兮視吾竹簡湯道原曹子壽予生頗好古恐兒軰不能繼述敢請二賢良相與語之吾兒觸屏煩為警省旦夕稍閑煑茶專待要學劉伶死便埋随行負􅓩欠輿臺螢生腐草光能幾螘在南柯夢易回一笑豫言身後事兩賢聊共掌中杯貧居何處堪鋪席流水窗前好緑苔過横山龍祠作横山龍母祠前路人説今年祭龍苦前期邑有皂衣來督遣丁夫剪榛楛里胥中有豪家郎搜攫如鷹鬫如虎編氓一呼六十人棄擲犁鉏行或沮十家之甲最可憐背血淋漓遭捶楚囊無一錢供百需肥腯豚如買烏牯手傾麥斛比珠斛剜肉成瘡誰為補胥常大嚼過屠門今乃閭閻刲鷺股吾聞此語三歎息郡邑安知弊如許祠官稽古埀令典穆穆緝熙由聖主聖心寛仁重民食三年兩度蠲租賦天生感孚和氣洽曰暘而暘雨而雨報功於龍歲有祭禮若迎猫恩更溥龍兮龍兮知不知如此嗟來食應吐皇恩蠲租詩洪武庚申天下秋糧欽蒙全免今年壬戌秋糧夏税又皆免徴征繇聖恩寛大亘古無比故耕稼之民歌謡滿野而某則併以區區所聞者書之漢紀蠲租半遷書汗竹奇大哉今聖主全以惠羣黎量與乾坤合恩同雨露埀豐年魚有夢丹詔鳳重施庻富民生遂敦寛俗習移㣲甿皆鼓腹窮士亦揚眉往制成均法新頒釋奠儀雅音諧律吕名教浹華夷茅茹今朝㧞英髦靡一遺八荒仁夀域萬世太平基水有清河日山無爛石時時雍民皥皥年耄我蚩蚩不作輸芒蟹真成曳尾龜倚牆歌此曲擊壤付吾兒林在新鄭縣學六月公文來取其子塏視疾七月初四日塏言别而行付家信外寫此一聞汝有河魚疾三宿心如野馬馳逺阻恨無人縮地吉占頼有卜言龜眵生稠漆黏䨇眼身兀枯株坐有胝預寫盖棺遺囑去好傳經業佐明時送沈居仁同塏徃新鄭二千里外視吾兒重九日前期汝歸坐卧待看黄菊綻徃來相伴白雲飛郵亭歇處加飡飯客路凉時早裌衣無限老懐言不盡臨岐目送思依依賀袁一泉陳大方新任道紀司官山中宰相古來有地上仙官今更清夜半光生䨇劍出秋髙氣感九鐘鳴丹霄拱極星辰近黄道經天日月明𤣥牝書中多妙理政須獻納佐隆平賀聰聞極正心印新任僧綱司官象法提維付偉人聖皇綸綍命諄諄手持正印天龍䕶身著方袍雨露新旭日斗城衙有鼓清時滆浦鏡無塵牆東病叟頭如雪也喜曇華並得春贈天寧寺無學長老報恩扶起法幢來鐘鼓天寧講席開道出語言文字外卓然聲價自崔嵬二麻衣䟽屩古人風儷葉駢花一掃空八萬四千修月手斧斤随入象王宫賀府官重修多稼亭朝家重下蠲租詔郡圃聿修多稼亭一帶金湯增氣概四郊禾黍勝丹青甘棠風作婆娑舞横峴雲開翡翠屏斤斧聲中勸農意爾農豐樂正須聽周節婦詩呈府縣官滆湖水出白鶴溪大江潮來溪口西江潮湖水接連處節婦姓陳周氏妻良人早世舅姑没抱雛日夜號空閨盡拈奩具易䘮具衣有淚血髽無笄績麻絡絲紡具織破牕夜雨風凄凄孤燈照影伴寂寂寒風夜雨聲酸嘶煙塵逺避東入海兒方長大能鉏犁時清歸守舊桑梓布荆蕭瑟茅茨低青絲兩髩變蒼雪皎如玉樹無纎翳前年縣官帖鄉里覈實上府文可稽老夫近聽路傍語聖皇徳與唐虞齊天語諄諄為天下求賢悉上青雲梯閭閻未見旌表節門前草没青苔蹊願言宣聖化郡邑罔俾側陋薫蕕迷旌善亭中名一題恩同璽書封紫泥佇看俗習接武皆麐蹄再贈衡志通世俗以甘㫖奉飬者為孝温清定省之禮鮮能之今寒區衡氏兄弟三人皆善飬其母其伯兄志通禮意之勤老而彌篤冬月則以身温被席雖大風雪母不知寒能此一事可配古人能勿美乎故作此續前所贈詩以補其闕云雞鳴雪屋起居安魚出冰池食飲懽最喜兒能温被席慈闈冬盡不知寒寄馬䭾沙陳糧長老龜獨巢蓮葉秋元龍髙居百尺樓長江只隔衣帶水佳景宛在蓬萊邱一年時序換新厯四海弟兄懐舊遊竹君寫我歲寒意聊作梅花寄隴頭送曹徳昇赴批驗茶引所山無猛獸水無蛟邑里春來樂意饒部集茶商新箬籠壚添酒市古溪橋赤心報國年方妙黄耳還家路不遥珍重清時用刀筆平陽遺澤正寥寥謝新鄭縣官助葬亡子并以志略送去轉縣學去年孟秋初天旱火雲熱吾孫奔父䘮病眼淚流血陸行二千里􅞶踔若跛鱉歸來秋盡時黄埃滿縗絰詢言父襄事從頭為予說一衾覆黔婁家人影單孑䘮具百無措宿儲瓶亦竭幸逢賢縣令賵贈意切切擇木製美棺飭匠夜不輟僚寀同哀傷祭奠豐且潔青青諸佩衿感化重禮節是猶風偃草宏綱頼提挈吾知賢令心髙誼等前哲無錢及元振有則與同列無麥及堯夫有則與同轍悲哉我中子忝教兩期月眷言古東里圖經自來缺編蒲載前言辛苦磨硯鐵草創十八九放筆成永别手澤存於家歲久恐亡滅抄書送琴堂公餘賜披閲韞櫝庋􅓺舎無為醬蒙設會有作家手織錦為補綴姓名蠅附驥九泉應感恱矧知埋葬恩寧無報銜結老夫懐謝言縮地恨無訣殘喘苟朝暮烏能見鬷蔑坐馳仰崧髙心聲吐嗚咽述懐䨇眸半瞎耳全聾年及新豐折臂翁孤陋一生棲白屋虚靈方寸炯青銅人如禽犢真堪耻家有詩書未是窮但願太平田野樂九原髙卧聽松風人日和前韻二首曾聞社酒可治聾椑榼分來謝里翁鈍士常磨龜硯石貴人多佩虎符銅人前出語羞稱好杯後為文錯送窮連日昏昏如病域不知春到楝花風二林居鶴髪老癡聾彷彿忘機海上翁留客但沽隣舎酒鑄錢安用蜀山銅一年春色花無幾千古川流水不窮誰謂東家錦衣樹龍頭顛卧夜來風寄南澗海苹二講主東土西天今幾華南能北秀本同家門前弟子齊腰雪案上經文五色霞袖拂古墩行傍栁缾分春水坐煎茶遥憐丈室俱清絶屢夢幽尋適興賖寄張仲安舅甥及邵濟民許叔逺去年艤棹千墩浦澆酒伯倫墳上土伯兮伯兮呼不醒仲也憂予仍眼青最喜諸甥多似舅戀戀之情無不厚東陵𤓰地兼種藥杏林仙人與同樂箕山之瓢今貯詩雞林賈人知不知老夫别來八九月憂患無端髩添雪負米不歸悲仲子我盆又鼓酸風起傷春不欲向人言恐人忍聽哀號猿最苦䨇眸失岩電近日看書渾不見兀如枯禪壁常面隙有微明澘且眩阿兒呼來滌塵硯代筆題詩簡羣彦無錫華景章以牆東陸先生所序乃祖玉溪義士之文徴予詩故有此作猗歟古聖賢飢溺視由己聖賢久不作人多飢溺死天厯年中歲薦飢老夫身親耳自知操壺枕籍委溝壑烏鳶飽食狐狸肥適逢郡縣無良吏狎弄文移等兒戱義倉和糶百蠧生殊失先民救荒意吁嗟玉溪翁髙義孰與儔黔敖之粥活鄉里立解倒懸危急秋指囷不結當世交易量不效前人尤盡令菜色作喜色如度弱水登蓬邱嗟哉玉溪翁徃事誰紀述鄉人口碑傳四方牆東老手春秋筆老夫知名五十載更喜牆東文字在義聲洋洋流至今又閲桑田變滄海天生孝孫念厥祖禮樂趨蹌䋲祖武丈夫不憂無萬鍾要為顛崖救辛苦唐君舉挽辭早年讀律如五經案頭夜照練囊螢學成能展四方志當路縉紳俱眼青神州赤縣坐蓮幕賛畫雖勞意磅礴青雲拾級歩歩徐腰纒不跨揚州鶴邯鄲夢斷楊花春桑田變海宇宙新歸來東陵剪荆棘故侯誰識𤓰田人竹林小院差可喜為箕為裘奉甘㫖青松宅邊紅稻畦白雲亭上烏皮几四時花木手自栽客來看花常置醴有時寂無語蒲團醉逃禪有時曵鳩杖朗誦逍遥篇得鹿門龎公之安比濟南伏生之年生平有如此死去真悠然薤露歌或可鐫此歌便作碑銘傳過無錫口占客舟無錫道中歸聽唱吳歌淚濕衣泰伯墓田耕觳觫偃王祠廟走伊威二三策在遺芳逺千百年來舊俗非詩寄瓢齋老詞伯吟邊同為一歔欷題漁樵共話圖爾樵斫青山爾漁釣滄洲世事百不聞此心兩悠悠道傍弛擔渚泊舟促膝面語何綢繆想論會稽人衣錦或訝桐江棄羊裘人生窮逹各有分曷不嗒然自作逍遥遊贈醫士錢伯祥杏林老仙山澤􅋯幅巾逍遥曳長裾逢人善作青白眼有子能受岐黄書酒對玉峰傾鑿落丹成金鼎飬芙蕖焦桐掛壁斷絃久藥杵聲中樂有餘題扇青山滿眼氣蕭森茅屋人家煙樹林客星多擲漁竿去誰復扁舟釣碧潯題子昂竹石圖玉堂歸來髩欲絲漚波亭中清晝時竹君石丈意相得不時為作無聲詩安安道人歌僧坊旅宿崑山縣夜讀安安道人傳似將秦鏡作斯文道人肝膽都能見早年學劍欲有為車塵馬足曾驅馳蕉隍夢斷竟失鹿葑田乃耕東海涯安知逃名逃未得射兮旌招論觀徳諸生遊藝集如雲儼如風詠從曾晳歸來自喜安其安一室視同天地寛鹿門龎公與同志妻子不知行路難傍人問我安心訣非佛非仙非臆説纎雲不滓沉寂天水湛霜潭照秋月家居四壁莓苔青柴門雖設晝亦扃年來豈獨樂吾樂堪輿俯仰俱清寧有時得錢即沽酒明月清風作三友胸澆磊塊去即休不學淳于論石斗嗟我碌碌者和爾婆娑歌無勞赤松遊只在青山窩挂瓢樹下舞婆娑歌聲繚繞青銅柯羣雄自奏巻白波安居之樂奈爾何逺緑亭為惠聚寺瑞芝年作道人愛山常目接無復經繙貝多葉碧天低處見絶頂蒼石爛來知幾刼清風一掃六合塵須彌芥子等法身諦觀有色若無色大地盡作曇華春宿崑山延福菴葉舟來訪漁樵社蘭若適逢龍象羣屋近玉山多潤色林藏寶地絶塵紛𤣥壇坐到三更月髙枕眠分半榻雲鐘鼓聲中鳴般若老夫堪笑耳無聞題崑山縣城主簿先塋圖舊家衣冠麟角族隂隂榆栁連鄉曲佳城父祖馬鬛封欝欝松楸在吾目飬親弗及奉庭闈居官豈敢懐蕨薇二十時中公務畢三千里外歸心飛出言不作雌黄口臨事不為髙下手琴堂喜得佐絃歌俸米支來供爼豆髙懐炯如寒露壺連歩陟彼青雲衢兩塋銜土集義烏更遣丹青添畫圖題竹枝雀圖覆車之粟衆喧呼爾獨忘飢入畫圖枳棘叢邊林有竹一枝何異鳳棲梧題玉峰書舎圖為俞彦智作婁江水接東海洋崑山玉立摩穹蒼江山城邑美如畫之子卜宅山之陽邯鄲夢斷歸來後詩三百篇長在手尚將古䟽補蟲魚復以今文挍蝌蚪門前小溪流水清畧彴不通車馬行漁童甕汲供茗盌鷗沙席坐尋詩盟才多轉覺讀書好春雨庭生書帶草時稱狂客醉鄉遊罔俾四明專賀老題畫魚圖魚在在藻或在淵随波泳遊同一天會得莊生濠上意畫圖詩史總難傳題畫竹顧挺之子作父作子述為竹傳神筆意古澹靈犀絶塵品題者誰龜巢老人題雪竹圖此君立雪清復清老夫見之䨇眼明琅玕恐折驚棲鳳三嘯虎頭風欲生絶句二首寫延福山中客况寄止菴長老一榻清風偶借眠白雲長遶枕頭邊客來題遍芭蕉葉我亦留詩謝老禪二風幡交動曙光揺蔬筍分甘到客寮最喜松聲秋瑟瑟月餘忘肉似聞韶一般春希夷古髙士詩言一般春以詩謚攸居夫豈尋常人一般春意何在莊生論天倪託物肆迂怪列子説混淪其言極夸大老夫請以理折衷慎勿謂我胡公之中庸古今先後無始終洪纎髙下俱流通芸芸萬物生意遂盎盎兩間和氣充鶯鶯燕燕妙歌舞花花草草紛青紅孤松或落幽澗底三秀多生糞壤中歩伸尺蠖天運轉户啓百蟄雷音同鶴長鳬短頸分一敢以私意窺神工一般春意如此朱絃嶧桐奏流水洋洋自入知音耳小車髙閣卲堯夫隨栁傍花程伯子針芥相投肝膽合祇應纔到東風裏白雲先生知不知同姓乃有此白眉老夫宿昔愛此詩四百餘載人無之頭髪雪白雙眼眵也來摸索珊瑚枝風波詞家住横山古澗阿孰知平地有風波一壺為濟中流急可奈無金報爾何洪武十六年夏五余寓崑山延福菴蒙李無逸冒雨見訪且邀午酌以尋二十年交好之盟席中聞余茂本通政談玉峰志鏤版無逸能力為之髙義可喜别後作此詩以賛其美并致謝意云老夫著書雪盈顛秃筆掃盡松煤煙書成無人為傳刻明珠暗投三十年玉峰有志今雕鐫公乃下榻邀羣賢魯魚亥豕盡滌濯銀鈎鐵畫森戈鋋婁江風物靡不載一邑快覩人争先知公髙風雅量振頽俗令名當與傳澱山湖邊五畆宅芙蓉錦城耕稌田多情念我久離别風雨逺來書畫舡開樽竹館話夙昔屋角雨聲飛瀑泉爛烹鶂肉軟炊黍特憐老齒令相便草堂之資送杜甫遥知破屋窺青天别來東望澱山月再盈再虧今復絃鵷雛出穴皆五色門牆桃李春俱妍無由縮地更擕手寄詩并送思賢編自挽洪武六年九月作齷齪龜巢翁飄蕭烏角巾干戈二十載幸爾全其身平生得三樂此去棄六親青山為我宅白雲為我隣寄聲謝相知毋勞為酸辛二生為無用人死作無名鬼生死天地間區區等螻蟻商人自忍饑楚人從赴水長鑱付兒曹持以字妻子將來事無涯且免鬨吾耳挽張溝南故人家住江之隂江城草堂花竹深蚶杯喜作真率飲鳳管不殊韶濩音中郎有女可傳業萬事不復縈吾心於乎一歌兮一悽愴白璧如今窆黄壤故人墓在君山下黄絹碑辭更親寫風流不减賀知章軒昂有如嵇叔夜秋風蕭瑟宿草青過客知名多下馬於乎再歌兮再思之誰能為我追騎箕故人生來天骨奇抱才不試清名埀山隂道士寶遺墨雞林賈人傳舊詩寒家夜夜屋梁月顔色宛然前别時於乎三歌兮三太息歌聲未斷還相憶次韻答子才去秋見寄子才名朴上海縣石浦人懐哉博物張茂先淞江太湖煙水連舊藏篇翰合䨇璧新發光熖驚四筵鞠華不濕重陽雨汗竹應書大有年教子一經還自讀林居幽趣相依然感年咄彼新豐折臂翁偷生年與我相同世無兵革真難遇家有經鋤未是窮兒子冷官成覆水老妻春夢逐飄風獨憐未畢全歸願兩目昏盲耳更聾天有眼風波起平地胥溺無可援荆棘生大塗跬歩不得前清朝赫赫嚴紀律汚吏貪婪弄刀筆翻雲覆雨妙若神白日青天暗如漆天有眼視必明何忍覩此世人之不平轟雷尚擊黨碑碎炎霜豈不飛闤扃惜哉延陵好州邑呌囂之聲雜號泣龔黄卓魯幾時來解我閭閻倒懸急天有耳腹中或有劍對面難隄防笑中或藏刀轉頭多中傷人形獸心險莫測擠人火坑猶下石東隣西舎苦牽連爺娘妻子多狼藉天有耳聽必聰何忍聞此世人之不公恢恢天網或汝漏百靈未必皆癡聾嗟哉尼父無復見冶長非罪誰能辯况有䜛夫口爍金將謂盖髙天聽逺寄野居處士春風有花随處看不勞快馬走長安春山有藥皆可采何用樓船渡東海老生常談人所忽門巷蕭條青草没野居隠者獨知言乃曰與我心同然埀簾丹室清如水賣卜君平絶相似得錢沽酒常滿壺談笑樂與親朋俱金谷飛蚊暫時聚静逺何如野居趣匣藏三尺古吳鈎幸無蛟龍驚斗牛焦桐絃絶挂空壁洗心只用床頭易忘年之交三十春與我義同雷與陳千墩别來耳目疾兀如朽株門不出六經家業愧無傳教兒只讀原道篇有懐欲得語同志東飛恨不生䨇翅牛鬼蛇神雖孔多青天白日奈人何願言正己斥邪説始終一念堅如鐵寸膏欲澄千丈渾厥功有無宜莫論和任義甫重陽絶句三首西風拂我菊花筵霜落蒲萄酒瓮前弓勁馬肥煙瘴歇雲南將士正開邊二題糕醉筆吐天花風景蕭條興亦嘉多少玉門關外客故鄉一望一咨嗟三休官陶令果何聊不赴江州太守招天上無人能送酒浮雲空作白衣飄九日志喜黄花無雨笑相看青女初霜未覺寒天下編氓增負版雲南征士解歸鞍市沽斗酒錢三百隣送杯羮物九盤最喜呌囂聲不到來朝雞犬得平安題松溪釣魚圖看花不躍長安馬濯髪滄洲結鷗社千巖萬壑一絲風豈是尋常釣漁者月滿舡水滿川月在水中光不濕人於舡上坐青天魚乎魚乎自悠然只今吾亦忘吾筌林大菴主真公徃宜興參宏辨禪師回途跌傷其膝卧疾久之作此問訊石頭路上悟𤣥機跌破泥丸一笑歸從此不須盤膝坐卧看來徃白雲飛天界藏主銘祖心歸常州府䕶國院信至龜巢作此代簡偶著青鞋出薜蘿竟參白足坐盤陀龍蟠虎踞江山好燕去鴻來歲月多言别石城歸舊隠笑將塼鏡為重磨松枝東長煙霞喜我亦滄洲舞釣蓑題髙士觀松圖賢哉陶元亮休官撫孤松之人坐松隂髙興將無同楚楚煙霞裾澹然冰雪容安知洛陽道車馬正憧憧尹泰春玉峰舊隐圖春風夢破邯鄲枕三徑歸來掃白雲藏壁家書還自讀排衙縣鼓不相聞内交林壑蒼髯叟比徳冰霜抱節君熱客不來心似水滿庭空醉落紛紛王仲昭挽歌詞千墩之隂湓浦曲鬱鬱葱葱煙樹緑五陵豪氣適消亡此地人稱小金谷中有琅玕玉一株枝葉扶踈鸞鳳宿鵂鶹夜飛枝上啼九頭血汚玲瓏玉飛廉怒從天上來東走扶桑西若木掃除妖物靡孑遺玉株亦㧞移荒服八千里外雲南地煙瘴偏方魑魅俗道經七譯路幽險澤有神龍惡薫觸洪浪掀天霹靂飛幾作湘纍葬魚腹丹旐歸來窆鄉土華屋髙邱生死足縗麻痛泣桑梓悲淚痕多似湘江竹嗟我東西南北人愛爾瑰奇曾刮目鄉無旦評勿為少令名在我思賢録嗚呼青山紅塔道鄉墳誰復相期薦秋菊贈醫師張有成嗟哉延陵古城郭舊家喬木秋蕭索先生眉夀氣如春借問平居果何樂笑言吾樂得於天燕饗不勞鐘鼓作一從無夢見周公青箱五經束髙閣便便老腹只醫書頗學挂壺人賣藥藥囊得錢儘沽酒兒舞斑衣我杯勺有時出郭看青山手策笻枝曳芒屩揚子江頭滆湖口晞髪滄洲吟杜若歸來一曲焦尾桐今古閑愁總忘却老夫喜聞心與同以言相贈仍相約東門之東劍井西蘿屋數椽雲一壑肯為尋山數見過樵飲漁歌良不惡人生百年能有幾但看花開與花落世傳仙人上天騎白鶴荒唐繆悠言不怍請從先生持筆削崑山辛彬甫元夕前旅次岑寂作詩懐之魯魚一洗版圖編徑著麻鞋送上天七里八岡風雨夜誰家燈火對愁眠贈吕克明馬鞍之山玉嶙峋氣所鍾者徳潤身古人已矣不可遇今人多躡青雲去中有一人冰雪姿青雲埀翅歸故枝老夫識面三四載但見才華發光彩去年訪舊山水鄉乃聞孝行非尋常兢兢持身親所喜為親不惜殘肢體親存盡歡䘮盡哀哀號淚濕三年縗嗟哉天質美如彼移家恨不居同里歸來細與吾兒說檢身自謂誰優劣緜駒處齊齊善歌東瞻玉峰奈逺何寄耕學袁先生新歲又人日故人無嗣音數詩曾倡和半載孰浮沉笠澤鷗盟在蕉隍鹿夢尋吾今洗吾耳聽此絶絃琴自和感年前韻軒軒黄鶴化鳬翁老態如今變亦同幾度出門遭鬼笑一生徒壁坐詩窮掃松先壠清明日杭葦官河舶䑲風春怨忍聞啼蜀魄傍人為我喜癡聾逸菴詩代膠山徐伯樞作士學而仕猶力於農三時服勤乃逸於冬當勤之時以稼以穡鹵莽滅裂施報弗忒未勞而逸君子所憎勞而不逸君子不能於昭令典致仕有期一日必葺罔敢或随時之至矣銜恩遄歸逸子而菴亦孔而宜其容舒遲其行逶迤含哺鼓腹樂乎雍熙莊曰大塊逸我以老是用作歌以為頌禱清澹子詩世味尚醲郁清澹獨有水寡慾飬吾心汪汪亦如彼朶頥良可羞菜根有餘美凡為君子交當知肉食鄙題趙典史家藏聰聞極所畫水仙有人宴坐風泉室水仙之花照佛日冰鷗滌硯為傳神不著纎塵涴清質山礬是弟梅是兄涪翁品題非過情紅蓮幙静簿書暇時一覽觀心眼明題松菴圖吾聞張子房漢家初封萬户侯便從赤松方外遊又聞陶隠居華陽髙住三層樓尚愛松風聽不休從遊松子或假託請聽松聲真可樂古人今人同此心老去棲遲必巖壑白髪左司諫赤心天子知君恩飬老他日歸光州草木增光輝今觀畫史貌清致想像為作松菴詩青山崔嵬青松離奇三間薜蘿屋四壁莓苔衣前榮燕雀來賀喜中林猿鶴還相依山中服食何所有松根茯苓大如斗松拂輕於白玉麈松醪香似黄封酒座有嘉賓樽不空每日共澆談笑口不言不笑黙相契平生久要蒼髯叟向來百卉腓且衰偃蹇不受冰雪欺尼山聖者無復起歲寒後凋誰品題春風牡丹洛陽市華屋金盤鬭奢靡車馬遊觀人如蟻但説姚家之黄魏家紫那知松菴之清樂如此送任義甫之京放却滄洲老釣竿送將圖籍上長安朝霞爛爛日初出熱客紛紛路未乾七里八岡鳩杖去三山二水鳳臺看薫風解愠今猶古舞袖歸來語所歡辛彬甫自京城回過東洲田舎極言曾覲天顔之喜舉酒送别詩以和之一百十户一版圖兩三箇月兩赴都親承天語拜闕下喜得風帆歸海隅到家且聽華亭鶴斫鱠旋買淞江鱸鄉人為作軟脚局衆樂不妨如大酺悼䕶國院昇東谷和尚憶昔桑田變海時法幢扶起歲仍饑諸方乞食供緇侣十載開堂響白槌香火石龕師子像紗籠塵壁老夫詩客來今雨重留宿誰向東園折露葵六月初一日亡室初度感愴而作白髪三千丈齊眉六十年今朝煮湯餅㸑婢亦澘然六月望自潞城回東洲書目前二事以示親知庻聞者或有省焉緹縈贖父謁天子聶嫈痛弟哭屍死親親義重不顧身千載流芳著青史今人豈無骨肉親冷眼視同行路人朝家旌善作亭子誘我薄俗令還淳吾詩相勸匪相訐不信汝曹之心真是鐵次韻錢彦學見寄頻年歸計果何如九龍之山駒谷虚山中流泉若有語遲子續修鴻漸書二三十年來山上山詩名流落五湖間歸尋鈯斧南泉老壠有白雲相伴閒三萍水相逢記昔年馬鞍山下屢周旋羊裘不脱漁竿老彷彿嚴光也自賢四一榜三魁我舊都如今文盛說中吳詩窮不用論郊島風雅揚揚有大涂五梁谿如鏡照羣峰勝地生才淑氣鍾想像鶡冠人未老金莖露洗玉芙蓉六桑柘東風呌伯勞犁鉏南畆課兒曹一枝樂與鷦鷯並阿閣那知有鳳巢七春秋九十明年是禮樂三千夙志衰訪戴未能移剡棹和陶猶欲繼坡詩題天葩雲液軒識馬不須論牝牡相人但欲知賢否我愛天葩雲液軒中人賢在一真無矯揉戴星出入公務勞退食從容樂詩酒紫毫之筆吐天葩得意如看長安花白螺之杯㵼雲液破悶絶勝陽羡茶謫仙九京不復作一篇斗酒誰共樂藍田哦松人亦好座無杜康殊落寞我詩我酒興不孤風月溪山皆畫圖胸中磊塊盡澆去方寸炯如冰一壺愚聞孔公醉决事勝人醒孔公何人哉希之即齊名斯言請為座右銘酒徳有頌政有聲詩聲更作韶鈞鳴夀任義甫十月初十日曾看滄海變桑田又厯黄楊厄閏年抱膝面山西牖下科頭背日午簷前中郎有女能傳業僕射無兒不怨天八十春秋䨇足健鄉人喚作地行仙次韻彭知縣以公事如宜興過滆湖作百川水溢東流急天風捲雲如捲席雄鳩呼雌鼓晴翼且喜人無雨􅍂疾官舡掛帆出湖去乗風破浪無衝激舟人笑指一足烏烏也竛竮退飛鷁山無猛獸水無蛟陽羡徃來人絡繹蓬牕拄笏看青山佳句屢成忘旰食令乎令乎匪遊逸聊為湖山窮眼力滆湖飛渡不崇朝東滙沙湖又深入彼疆此界犬牙地概用朝家律三尺人言行路古來難範我馳驅自無失星言勒移署椽筆分我餘光照隣壁懐吳中衡心友老去多蒙故舊憐客來喜得信音傳書能教子醫傳業居欲依仁宅屢遷赤米白鹽瀕海地青萍緑綺博山煙曾聞靈素多曾注好擬詩家作鄭箋代簡張子才遐想張梨谷相望吳野居馬鞍長在望魚尺久無書七日陽來復三年月閏餘芸邊生意動君子喜何如王有恒秋初貽書約囬過訪尋假館之盟故作此於丁堰姜氏迓之舊雨魚來今復來故人懐抱亦佳哉黄楊樹厄三年閏緹室葭飛六管灰文有熖光皆李杜情如膠漆即陳雷燈花有約鷗盟在莫負柴門掃緑苔龜巢稿巻十六欽定四庫全書龜巢稿巻十七元謝應芳撰詩龜山祠詩卓彼文靖公早立程門雪載道歸東南統緒頼不絶鳯鳴朝陽能幾時朝棲瓊林暮棘枝歳晚江空卜居此毘陵草木争光輝邇來陵谷一再變煙滅灰飛舊書院殘碑斷礎落誰家應作寒砧搗霜練南山北山禪者流鼓鍾雷鳴塔廟修儒衣儒冠亦不少孰謂好賢無二周龍鍾老諸生不言忍包羞甘棠樹下吐肝膽愛禮可得存羊不羊存禮亦存所願或可酬渠渠一畆宫依然對滄洲將使邑人知有東家某駿奔籩豆祠春秋簡曹谷賔徃昔政和間結交先君子時葉公子承蔣公子舟諸良友數嘗文㑹於九華隠者周先生之家其書札之妙聲詩之佳今皆不可得而見矣區區追憶故交輙成韻語寫去谷賓吟几為後㑹張本云清交早結先君子博學自謂無恒師草堂詩史擬欲續蘭亭字書將並馳百年陵谷變更日四海弟兄生死悲舊字文獻掃如電獨愛羲之又有之冬至日方欲以老况自述孫垣來侍傍說江隂陳庠仲袁仲徴二公倡和之娛區區坐馳因用足成此詩以代折簡耄矣又逢長至日悽然聊作短歌行一妻一子竟契闊兩耳兩目幾聾盲里中尚結雞豚社江上豈忘鷗鷺盟珍重暨陽䨇白璧慎毋輕用易連城江陽鄭教諭以詩見寄褒美太過且聞時赴京考績因次韻以餞其行大君立極揚威靈麾斥百家尊六經出圖之馬出未巳來儀之鳳來不停萬方皆效華封祝諸將已勒燕然銘化風覃被族麟趾聘物逺來鹽虎形雄州巨邑並庠序歌臺舞榭舞優伶先生横經虎皮席弟子立雪梅花庭延陵躬耕地井井尼山聖父碑亭亭正逢海内興賢日豈作江隂老客星泮宫芹藻得佳趣隣封草木沾餘馨龜巢一老辱篇翰鱣堂幾時瞻典型趨裝又欲覲金闕飲餞愧無䨇玉缾淵清冰潔知者衆㑹有孫邕薦管寧予以小爐閣坐卧安燠名之曰熙熙甕天孫塏到江隂語劉小齋先生蒙篆書四字見其筆畫清勁可喜作詩報之乃翁澹齋先軰能篆𨽻而文為鄉郡所稱詩中故追美之昔在金斗城晤言即相違今觀玉箸篆神氣不少衰澹翁心畫傳師承古人誰秦相漢中郎殆欲肩相随舊家冠盖里密邇延陵碑古意師聖筆真贋吾何疑正如善相馬而忘牝與驪懐哉楊子雲載酒當問奇奈無縮地術龍鍾空坐馳周節婦陳氏吾甥也早寡頼其母撫恤之恩為多母卒且以語付託我夫婦擕之避兵居吳中十有餘年白首歸里一生艱苦老夫獨深知之故書此以紀其畧云哭夫未了又姑嫜獨抱遺孤涕泗滂奩具賣來營葬具不憂寒餓死空房二南山石爛海揚塵風雨飄揺笠澤濱嗟嘆渭陽田舎老辛酸同受十三春三狼煙未息歲仍饑蛟室相隣地亦危長夜㸃燈機上織明朝換米釡中炊四戰骨縱横歸路迷烈塘疑是越來溪良人地下應憐汝不作王凝斷臂妻五裙裾藍縷蓍簮折鄉井蕭條草屋卑節孝兩全頭雪白疇能說與史官知臘月十四日風雪極寒大林菴主僧以佛廬落成冰雪堆中作梵宫磨磚布地與金同何當放下南泉斧坐聽松杉萬壑風悼熊元修徴士落落龜巢翁閒閒鷗社叟雷陳十年交雲水三江口在昔鷗沙結社時盟鷗之詞我筆之唫風咏月意相得絶似伯牙逢子期朝亦詩暮亦詩詩興動來忘渇饑淞江太湖墨淋漓鶴汀鳬渚生光輝毛髪雖秋霜光風自懐抱不虞白石爛但覺滄洲好一朝林谷俄變遷我歸耕我延陵田銜寃塞海笑精衛抱怨思家憐杜鵑鷗社叟軟䨇脚晏然不受功名縛社鷗尋盟還可樂苐我路途遥來徃難如昨前年訪戴踐重約舟到山隂眼生膜黄庭不寫贈籠鵝蒲萄醱醅㫖且多船頭送别誦佳句且知步武追隂何音書從此不復得我心孔竅皆茅塞清夜悠悠思故人夢裏依然見顔色客來聞死半年久倀倀不能將絮酒悲歌為探驪龍手三日悲風動林藪次韻荅袁仲徴見寄大江南㟁衆山蒼巖谷深藏寶劍光江上風波來滚滚山中歲月去堂堂能承書業千金産喜有童孫咫尺長杯酒正須朝夕醉無勞更覓解愁方四皓圖天風吹斷紫芝歌四老幡然出薜蘿不用勒兵呼左袒安劉功比絳侯多二飽茹山中紫玉芝姓名誰徹九重知濟時隂有回天力震器安然不動移𤓰隱為崑山邵濟民賦藥壺舊懸紅杏林𤓰廬今住清江潯南柯太守了無夢東陵故侯同此心灌園自捧漢隂甕抱蔓别作黄臺吟老我坐馳三百里何由縮地重相尋簡袁耕學先生馬鞍山開龜甲屏臯比之席講六經一年不見朶雲字三月又看花雨零角巾小像固垂白野史巨編方殺青宜有詩筒繼前軰使我晉鄙沾餘馨寄熊元修摻别廿五月昏耄而受罔於人者多矣詩言此謬餘從可知一笑之餘必蒙警教愛子腹便便逢人問孝先悞傳烏鵲信剛道白雞年鷗社詩千首龜巢稿一編何當重擕手相恤話䕫蚿次韻酬陳庠仲見貽二首鳳凰阿閣自新巢鷗鷺滄洲只舊交百里雲山人契闊一簮霜雪髪蕭騷忍看雨溺堦前蟻怕說風掀屋上茅樽酒論心宜有約誰家竹裏借行庖二春申港上老人村家有詩書教子孫白首竟能安菽黍丹心豈不合乾坤諸生問字車載酒滿地落花僮掃門且喜年來忘世慮不時杯勺醉昏昏又和袁仲徴陳庠仲去冬所寄之作腐草煜煜螢火生枯梨紛紛山蟻行可憐身病道亦病猶喜目盲心不盲溪山相望數千里松竹歲寒三友盟何當相對文字飲似昔盍簮金斗城壽萬拙齋蓬萊水淺鐵船歸城郭人民半是非且喜春秋今七十能知六十九年非二天開夀域大無疆林下幽棲樂且康不須更覓長生藥昭代如今化日長三芳茂山前種玉田芙蓉湖上采蓮船東隣西舎連花竹渾是桃源一洞天四一襟秋水心無競滿面春風唾自乾可惜時無吳道子畫圖傳向邑人看五菖蒲花開香滿庭簷旌廉斾風泠泠髙堂燕客作生日紅頰紫髯雙眼青六今吾故吾知不同朱門無復掛桑弓但將一斛葡萄酒浄洗平生磊塊胸七金作狻猊􅌊寶薫桃笙如水客如雲榴花不用纒頭錦也學吳姬舞絳裙八燕雀歡聲新第宅溪山佳景古丹青琵琶自製玲瓏曲彈與龜巢老子聽九拙齋之拙意何如天賦惺憁本有餘欲識顔曾愚魯地一鞭希驥莫躊蹰十舊家青氊什襲藏兩兒斑衣長侍傍人生可樂有如此一日可比三千霜昔人謂積憂成隂積隂成雨今隂雨之久且多竟不知何憂之積以致然也淺陋之辭姑識歲月時乙丑夏五望後九日也常年五月衣輕葛今年裌衣猶未脱一天凛氣隂如秋谿山黯淡煙雲稠有時雲罅曜靈出頃刻朱光暗如漆商羊飛來作人舞羣鳩醉葚渾無語雷聲虺虺雨浪浪一雨十日夜亦滂人家屋壊什八九床頭泥淖生蝌蚪疑是彼蒼媧石裂天河水漏何時竭補天無術正憂心水鄉之田俄陸沉常州地接蘇湖境青苗在田知幾頃農人惜苗如惜兒苗死一時真可悲全家老稚仰天哭天若埀憐天雨粟不然歲饑方薦瘥里胥催租將奈何贈時義夫生民天降衷所性無不仁物欲肆侵蝕乃底失本真嘉爾鴻鵠姿超然雞鶩羣里有賦蛇毒比屋含悲辛呌閽聲徹天恩波活枯鱗老我無能為喜此聲譽聞願言一簣進將來見嶙峋貽吕雋人生異禽犢秉徳方寸許一本尊所生推恩篤諸父嗟哉淳朴姿片言不輕吐去年赴叔難代服徒役苦槖饘復今年赤脚走風雨紛紛蕭艾中薫然見蘅杜顧予子若孫疇能類於汝宜從竹林遊氣習變齊魯挽徐仲清妙年博極軒􅄮書晚景晏安閭里居小山叢桂蔚如故大兒一官清有餘落成客散烏衣宅送葬人來白馬車安得並騎箕尾去逍遥八極曵霞裾夏五即事貪墨何多禍蔓延刮毛龜背欲成氊千村萬落炊煙斷田舎逃亡犬餓眠寄王尚絅陳子儀諸友起予每憶二三子投老于今九十年自是片雲相隔爾如何尺素亦茫然蝦蟇産鼃横山下螃蠏輸芒滆浦邊若問龜巢舊風景月餘隣里斷人煙簡無錫華景章百書不如一見面此語信然胡未然燈花有約半年久桂子已落中秋前東門種𤓰抱溪甕西齋瀹茗􅆽山泉少遊鄉里樂如此應笑鳶飛瘴海天寄徐伯樞東膠山人不出村南州髙士之裔孫十年曾作螻蟻夢四壁祇有莓苔痕松分女蘿補茅屋筒引乳泉澆藥園别來幾度屋梁月顔色宛然清且温寄丹陽孫秀民翩翩白鴈秋風凉紛紛白蘋秋水香官河兩堰隔三舎旅次一違今十霜菱芡練湖秋大熟莓苔劍井夜無光故人知我老癡否年似伏生書盡忘懐京口俞伯鎮鐵甕新城舊隱居江山勝槩畫圖如五條街口多輿馬萬巻書中老蠧魚道合不妨鄉土異情親可奈信音疎杜鵑花與人俱好珍重題詩一寄予洪武乙丑秋新鄭縣學以通經薦吾孫塏移文本縣徴赴吏部塏於六經有望洋之嘆且欲辭而不可得予以孔孟之書列乎九經塏嘗受業故臨别示此數語朂之猗歟古聖賢遺言存簡編孝經及論語孟子書七篇載道繼六籍煌煌日星懸斯文覺斯民千有五百年汝生家避兵九經失青氊借書二三策教汝朝暮間大哉孔孟學曾如管窺天還鄉願卒業奈汝多迍邅朅來誰薦鶚通經乃虚傳徃哉詣春官從實吐肺肝絲麻雜菅蒯博采豈舎旃天朝恩惠寛茅拔茹或連立身報君親慎勿違至言送楊景子以通經薦舉之京亭亭青玉桐孤生秀中林雨露得所飬歲月亦已深良工㧞奇才獻作羲皇琴繫以朱絲絃鼓之丹鳳吟八風宣九垓令人格非心鄭衛化韶濩太和無古今吾將洗吾耳朝夕聆遺音和景子冬至韻隱隱鐘聲出景陽陽生望闕賀朝忙勲名有日印如斗舞蹈今朝靴滿霜咫尺天顔春色喜輪囷雲物瑞光長錫錢張宴宸恩厚一舉真堪累十觴冬至後五日承郡齋文㑹翌早賢長史置醴􅍁洽且有贈言次韻奉酬并謝不敏文章太守誰同樂幕府賓僚如李郭坎蛙誰信有奇逢鼓吹敢随東海若枯腸喜得酒一澆枵腹毋勞篾三縛獨憐澗底老孤松春風膏雨徒優渥初度作重光之冬湯餅客孟光相對頭俱白吾兒樵雪中歸來擔頭還帶詩三百詩歌熾艾夀觴舉呼鶴堦前舞瑶翮安知此後境多乖五載家門毁雙璧行年今與伏生同兀若枯株雪霜厄樵兒遺孤主黔簿四千里外勞相憶我昔蹉跎四方志每見桑弧有慚色願言膏雨發孫枝先世衣纓復輝赫皇天於余賦亦厚才散如樗夀如櫟語言聲音耳尚聞黑白分明眼猶識四肢百骸筋力微頭容與心依舊直呴嘘素不學松喬逆理偷生正何益曹横山下青松宅含笑全歸待朝夕山瓶乳酒如蜜甜笭箵寒魚鮮可食家僮荷鍤且勿忙為我挿花吹鐵笛自今每日從歡伯龜巢甕天適吾適斷送予生真上策卧雲歌為華景章作我昔所喜青雲人雲梯登登上星辰餘如風花落藩溷伊人可仰不可親只今老我成枯朽愛爾巖棲卧雲叟白雲一壑數千畆且無租稅論升斗悠悠我如雲寂寂雲伴我雲無出岫心吾無洞門鎖一榻偃仰得自如兩膝屈伸無不可布為被非難能我被以雲如白綾木為枕吾未曾以雲枕頭時曲肱牀無上下亦無客别有意氣非陳登飛鳶跕跕自炎海夜鶴繐帳清於水佳哉叟之所樂者如彼今人古人誰可擬華陽陶隱居投簮謝朝市山中作相心未閑剛道怡雲豈無愧華山陳處士大笑脱塵屣鳳凰銜書空徃來熟睡雲臺終不起願言學陳毋學陶此身長與雲逍遥萬松嶺上老禪衲形服雖異同清髙况有煎茶好泉水活火煎來味無比詩腸搜出煙霞語不異不同人共喜老夫耄矣筋力少尚欲去著遊山屐細啜月團雲滿甌分卧石牀雲半席幽懐為我一宵傾免使相望兩相憶郡侯以蘭行年九十以詩見贈敬以次韻厯叙平生以鳴謝臆延陵野老家業儒舊壁頗有先人書童年愚鈍不努力渉獵五經多缺如二十而冠三十娶取友必端無佞諛春秋四十五十餘髮猶未白顔猶朱才如襪線不知恥光範門前曾自譽六七八十成潦倒興來尚復歌吳趨今年九十常晝寢誰敢效尤扳宰予雲山萬疊作圖畫松風一壑鳴笙竽雙眸漸昏耳漸聵面壁寂寞如僧居焉知府公特尚齒贈以大篇明月珠老夫得之感勤渠雀躍起拜不用扶合室稚老俱驩虞十一月廿七日得塏口信以詩志喜并記臨别祝規之意賣橘人從采石還口傳家信報平安路經湖北雖云逺天近雲南不甚寒佐領謹持三尺法尊君長秉寸心丹驛橋臨别叮嚀語應念貽謀作鏡看自和同前詩於次年正月十三日附寄黔陽四千里外之官去百丈牽江舸艦安新沐恩波從日下舊家門地不氷寒洗心正在詩書澤換骨毋勞内外丹新歲僕歸正二月家書細寫阿翁看簡陳子章先生身不封萬户侯眼不識千金裘深衣幅巾避兵矛徃年零落崑山州兵餘還鄉理西疇臺笠播種襏襫收今將蓋棺萬事休但欲服飾如前修先生舊衣巾暫爾可借不縫人遵古制素願吾乃酬飄然長裾泉下遊藍縷免致先人羞生前相徃來二老亦風流横山歌夀萬拙齋横山之顛青入雲冠冕一邑無與倫山南風景最佳處隱居豈是尋常人此山鍾英三百載素封不乏青氊在向來吳下避煙塵恨不移山東入海還山喜得無崩騫種玉舊田耕紫煙雲屏正設後堂後空翠直灑前塋前觀雲每日烏皮几灌圃有時龍井水人家雞犬寂無聲宛若桃源畫圖裏山中羽人年八百昔日仙宫今佛宅丹砂未必駐童顔把酒看山真上策山乎山乎徳不孤靜而夀者山為徒美哉山禽知此意石榴枝上呼提壺我歌横山歌未了拙齋為我開懐抱移宫換羽作新聲彈入琵琶歌更好百斛葡萄為傾倒屢年作小詞或詩為萬拙齋夀癸亥夏五予以鄉人嫁禍兒軰徃崑山救之作此詩予懐紫髯翁新作緑野堂常年初度日嘉賓四筵張虚左待老夫酌我九醖觴甥孫舞鴝鵒絲竹鳴鳳凰情與酒俱深飲量非汪洋今雨獨不至應憐走他鄉峩峩馬鞍山絶頂遥相望横山一髪青滆浦西日黄想像祝睂夀有如賦髙堂留别永懐寺長老暨袁子英俞茂本通政歸吳十載前一宿永懐寺龍鍾今兩來鹿苑廢如此佳爾山中人法幢扶欲起清風方文室白日靜如水門迎老詞客問我來何自忘形亦忘年相見即相契坐啜趙州茶並隱維摩几爐薫清我心乳供便老齒鈎簾看玉峰山色亦為喜新知多邂逅咳唾珠玉美白首莫逆交獨有子袁子徳星聚叢林草木亦韡韡我思古先軰支許或可擬兼旬數相過倡和不知幾庭前石榴花半落蒼苔地長揖謝山靈歸袂霑空翠陳徳廣知事以自夀之詩見示予以其災字韻險不和乃效唐人和意以夀之故落句如此云哦松未了休官去随例放閒恩更多父子一經傳有自桑蓬初度樂如何門栽彭澤先生栁籠飬山隂道士鵝最喜孟光睂案舉捧觴嬌女把香羅徳廣喜予詩和韻見貽予復答之即三月十一日䌓霜之異於頷聫書之非虚語也繭紙寫來詩句好雞林傳去古人多花開三月春如許霜落五更寒奈何留客政須沽緑螘引年何必餌金鵝六街車馬紛馳逐自喜蕭齋雀可羅次韻荅華以愚見寄九隴山東舊宅遷一瓢齋裡曲肱眠賢如栗里陶元亮閑似香山白樂天倡和正須歌白雪丹青何必繪凌煙竹林諸阮多才俊文㑹何時共酒船哀詩鐵船海上逺移家金斗城中蔗境佳我昔頻來桃竹杖公方新種木蘭花書因教子時常買酒欲娛賓夜亦賒春夢一塲随蜨化老夫三歎立鷗沙東西家東家賣兒哭幽咽西家鬻妻含淚别形容總覺瘦如柴肝膽那能硬如鐵低田水没欠秋租今年夏租麥更無妻兒舎我莫怨呼我亦忍饑朝暮殂重午日小酌青年自是好遊者白首始知行路難一寸芳心徒似鐵數莖秃髪不勝冠匏樽偶有菖蒲酒菰黍香於苜蓿盤莫笑貧居輕速客餘生能得幾團欒五月望日寄江隂陳庠仲一别半年久相望百里間陽春知寡和落月見清顔釃酒澄江上題詩小石灣龍鍾還念我時復夢追攀同日寄袁仲徴申浦水東頭悠然客馬周焦桐絃白雪芳草席滄洲昨夜三更雨今朝五月秋有懐飛不去煙樹鬱相繆曹文質自金壇來云費延年教諭傳語且知告老而歸閑居可喜因作詩代簡我思故人松柏顔客來寄聲蓬藋間鱣堂講學竟將老鳩杖拜恩今樂閑清風枕簟五栁宅白雲圖畫三茅山雪舟未得見安道乗興豈無詩徃還朝宗鄭教諭以余去冬初度自夀之詩次韻見貽予復和而贈之憶昔予為廣陵客兩頰丹砂眼青白蕃禧觀裏看瓊花坐列羣英杯飲百無何陵谷忽變改塌然歛我扶揺翮此花天下更無雙毒手誰焚夜光璧先公舊物廣文氊家傳喜得無囏厄抱琴來坐杏花壇洋洋古操令人憶青氊坐久琴愈清君山草木皆愉色老夫今春辱佳句轉眼炎曦又隆赫郢斤非不妙彫鎪奈何吾衰腐如櫟生平甚愧性聱牙老去偏懐舊知識孤舟野渡豈長閑一壺㑹有千金值合歡杯酒細論文恨不能飛見三益江流南匯春申浦海門東入陽侯宅河魨江鮆鬭鮮新苜蓿之盤自朝夕􅓺舎安如廟堂坐脱粟甘於鐘鼎食睠我郊居樂亦然朝聽樵歌暮漁笛忘機相與白鷗眠送窮不效昌黎伯假令秋至轉饑寒亦不題詩寄髙適賢哉子淵可矜式陋巷安貧載方策六月初八日雨晴懐毛伯尚去年五月凉如秋今年六月寒颼颼重雲晝暝雨連日田家復恐沉西疇朝來日出温風起歲不薦饑人共喜貧家四壁屋漏痕彷彿篆書千百字忽憶山中人讀書兩眉白能負仲由米曾漂髙鳳麥髙堂飬親侍親側我衣斑斕親喜色有時諸父竹林遊彈琴詠詩尊爼席人生此樂古來少今乃熊魚兩兼得老夫每問書帶草鄉里小兒渾不識但道墨硯池水漲苔衣碧苔衣碧池水香思若人兮不能忘長林豐草春茫茫青松澗底含氷霜鯉魚不随白石爛鳳鳥有時鳴朝陽停雲之詩歌未足𤣥蟬為我聲相續哀詩鶴長鳬短總休悲聽我山陽笛一吹黄耳再無前日信丹心獨有上天知送行南浦成長别歸卧東山悞有期吾老未教僮荷鍤劉伶應笑阿翁癡讀大誥作巷歌二首天語諄諄禍福靈風飛雷厲鬼神聽掛書牛角田頭讀且喜農夫也識丁二一天風雨洗塵昏日月恩光及覆盆雞犬不驚田舍樂呌囂人不到鄉村贈陳棲雲鶴溪之水滆浦分一灣繚繞梅花村窮冬萬木凍欲死此花巋若靈光存清如西山采薇孤竹子白於華陽洞口隴頭雲隱居者誰希夷後人持一編種樹書戴一幅漉酒巾有時醉飲肱作枕老瓦共眠梅樹根有時不醉百事理可與孔公同出羣青鞵布襪駿奔走今年早春朝至尊紅雲殿前三舞袖歸來滿腹懐絲綸諄諄語鄰里切切教子孫子孫不但力耕稼徴輸能為公家勤編氓租斛足萬計雞犬不驚安老親短檠燈火讀大誥喜色夜夜燈花親甌窶滿篝秫田熟歲釀百榼酴醿春親朋簮盍座常滿湖鮮日擊豐盤飡胸中不著愁半㸃雲夢八九能鯨吞東鄰西舎靜如水夜無催科人打門安居樂土有如此何異武陵人說桃花源老聃戒止足願言尊所聞濁水膠可澄清鏡塵乃昏秋風挂席一相見此意吾將三復論贈周彦美象賢有子付青氊家住城西緑水邊門栁數株同舊日公租萬斛喜豐年試聽濯足滄浪曲應笑燃臍郿塢煙朝夕酒杯長在手優㳺身作酒中仙簡王尚絅不笑幡然謝九流牽車服賈思悠悠醉吟人老香山社詩到雞林價重不贈詹伯逺西北風髙寒露零牽蘿補屋揵柴荆看雲長日烏皮几夜夜教兒讀孝經示孫塏龍門一躍去年秋徑著青袍赴逺游半部魯論堪輔世政須忠藎繼前修二黔陽江水不勝清喜得居官濯爾纓秦鏡照人肝膽見邑民應在鏡中行三黑頭勲業志方雄黄耳書歸見面同斷織機中埀白母抱孫時復倚門東四春雨秋風歲又寒翁年近百足蹣跚横山菽粟東洲水多在行窩樂考槃初冬感懐令垣書所居屋壁在昔陵谷變海上十五霜歸棲失故隣乃落劍井傍百指薙荆棘耰鉏破天荒東洲釣月磯横山樵牧塲一葦去復來十月新稻嘗擕幼入寢門淒然北風涼吾兒婦嫠居我孫官逺方筠籠鶴何之盆菊花自黄跛倚赤藤杖終日徒倀倀初度蔑以為樂杜撰古樂府三章而令諸孫誦之老夫聽之比之挽歌者歌蒿薤於柩前豈不樂哉龜巢老人忘食貧歲時強欲娛賓親賣琴沽酒作生日蹲䲭爛蒸鮭菜新承歡幸有斑衣人君不見古人云酒杯不到劉伶墳杯行莫厭頻二龜巢老人貎不揚觸邪之性如神羊生憎巫覡煽妖妄疾視聃竺隳綱常耄無能為龜六藏滄浪曲窈窕章有時擊節呼兩郎男兒當自強三龜巢老人年紀多雞皮鶴髪背槖駝金丹自古無足信鐵硯如今亦不磨坐待蓋棺歸薜蘿舂有相巷有歌此時不樂成蹉跎殘生有幾何樵海歌為秦文仲先生作出山志云逺樵海名非誇老夫素相知髙風真可嘉早年欲伐廣寒桂增月清輝燭天地又欲㑹稽雲夢伐箭竹人無戰鬭遭鋒鏃汗青六經天下讀此志適蹉蛇陵谷俄變改青山樵侣集如雲一笑飄然入東海任公舊日釣魚處樵屋相隣蛟室住扶桑若木有餘薪且喜路無荆棘慮水底珊瑚樹亦多尤物不堪開眼覷樵擔弛樵斧歇濯足滄洲弄明月興來擊節和龍吟唱我海樵歌一闋也不學負薪讀書朱買臣也不識卧薪嘗膽是何人白螺為杯大如斗青苔席地軟如茵有時獨酌爛醉枕柯斧睡到日髙三丈猶醺醺夢魂不到長安市長安市上多覊旅米珠薪桂莫能賒多少伯桃寒餓死孰知海樵之樂有如此寄溧水開福寺長老源别流客有溧陽雲水僧相逢曾得問南能九重日月恩光近一壑煙霞道氣增龜紐肘懸新賜印麈談語續舊傳燈别來老病時相憶欲覓金篦刮兩瞢悼徐孟銘讀盡岐黄上古書幡然讀律應時需一官再調炎州幕二豎交攻瘴海隅頼有故人收白骨歸來鄉國瘞黄壚杏林花落紛如雨何樹哀啼五尺孤臘月十六日夜篝燈作兩書言不盡意夜半後欹枕對月口占言懐命兒軰録上耕學伯齡元修三先生南澗海萍二講主清真一鍊師暨諸吟友照天蠟燭徒明月縮地神仙是子虚九十一年殘臘盡二三百里故人疎詩成唐律傾懐抱書託吳儂問起居老我形容都變改依然貧似馬相如任義甫生日作絶句四首以鰥居無子貧病為憾予乃以理釋之誠如吾言則不必怨天尤人而處之泰然矣兄有遺孤骨肉親堦庭玉樹一枝春駿奔籩豆非無主傳襲箕裘未是貧池有紅鱗堪入饌杯浮緑螘可留人髙年已過磻溪老每日懽娛莫厭頻贈蔣居士全家欲學老龎禪木榻蒲團夜不眠誰信室中靈照女出門先上渡頭船贈袁居士羮牆欲見老瞿曇貝葉書中日夜叅布襪棕鞋門不出一盂疏食勝肥甘正月既望予奉陪邑長貳置鄉先生之祠于學釋菜而歸兒軰謂故人楊澤臞過訪臨别作長短句貽之余因口占以記鄉校中盛事并寄楊為後㑹之約云喜聞邑有絃歌宰哦松之丞更文采翕然敬我鄉先生祠諸學宫儼如在區區後學尊前賢駿奔執籩忘耄年深衣幅巾拜祠下燈月交光星滿天扶憊歸來語鄉曲此事真能厚風俗安知好客過柴門載殽問字成虚辱吾兒不識氷玉壺但言此客從前無醉墨淋漓灑白雪沂雩興與曾為徒老夫此興亦不淺尚怯落梅風剪剪少頃一百五日來蘭臯蕙畮光風轉三山湖頭舴艋舟百花莊上逍遥遊朝陽碧樹自鳴鳳湖海詩盟尋白鷗生平頗恨少知已晚有奇逢寧不喜朱絲重繫焦尾桐請為鍾期奏流水水田歌歌農務也郡縣之政租賦為急然農務乃租賦之所自出可不急乎首言三山書所見也一府四縣意在其中惟當道父母官念之芻蕘有詢更當面陳其詳以備采擇三山湖頭白水田頽㟁不修年復年田家豈不憂卒歲十室九空人索然饑腸雷鳴狀如鵠春來怕聞啼布榖願言州縣父母官喻令蚿足憐䕫足古云民事不可緩桃花雨晴春正暖文移動若風有聲畚鍤集如雲不斷三農畎畮合羣力四邑溪山增喜色麟史重書大有年官無負租民足食龔黄卓魯政績成一日九遷皆上卿天子萬壽黄河清聽我老農歌太平無錫舁佛像由暨陽而來鳴鑼鼓竪旗盖儀從僣侈家至以禍福惑人取粟帛無筭東洲任耆老沮之巫不遜被毆且以杖搪木偶幾躓而後去隣莊有王氏者撻而逐之予聞而喜乃力病援茟書此以美任并異其義理之勇云梁公毁􅁋祠真是霹靂手胡公能打鬼近代亦希有區區辨惑編或有蒙醬瓿潦倒東家丘忽爾發哮吼老拳敺妖巫拄杖擠木偶西鄰一壯夫怒挺擊羣醜捐袍偃旗蓋脫網疾走時予病中聞病去什八九朂哉爾東家内省宜弗疚報本理所崇毋落豺􅆩後一正勝百邪昔賢同不朽題打毬圖擊鞠流風自李唐官家占作狀元郎科塲廢盡毬塲在芳草萋萋幾夕陽清明後一日邂逅薦福寺長老源公話舊論詩意甚相得明日作此詩代簡貧如南阮甘投老喜得西枝近贊公白足有僧聽説法江梅無閣坐觀空詩成芳草斜陽外道在殘山剰水中一笑相忘今古意清明時節舞雩風沈徳麟母哀詞怪底吳霜二月繁一朝摧折北堂蘐母儀表表真堪畫吾軰區區豈易言斷織機中多教子分甘膝下並呼孫慈顔最有難忘處獨倚蒼茫日暮門洪武丁卯年詣烈塘祖墳祭掃恐朝暮即世子孫不知所葬者為誰且追念墓松在昔為邑里諸宰木之冠感愴寫情并圖葬穴以示兩子及孫使識之以永其孝思其詩曰百年兩度桑田變三世十年蒿里同華表前時曾駐鶴長松何日再蟠龍情鍾寒食蘋蘩外淚灑春暉草莽中老我客鄉歸不得空勞杜宇喚誰儂次韻答江隂鄭教諭見寄揚子江南山水奇杏花壇上晝隂遲魯魚亥豕讎經史江鮆河魨閲歲時兩邑相望三舎地九年凡寄數篇詩恨無縮地仙人術把酒論文醉不辭葉道士遊仙詞海變兮揚塵翦若木兮風斤醫拗人兮寓世仍猿鶴兮同羣冠切雲兮霞佩雜三秀兮蕭艾從喧囂兮萬􅄜聊遊戲兮方之外混混兮和光忽蟬蛻兮坳堂陵虚空兮轢渺茫一瞬息兮三千霜吾不知其果何適兮祗死守乎康莊輓萬拙齋曹横山下萬家莊喬木隂隂夏亦凉法曲琵琶彈鐵撥髙堂窈窕捧瓊漿素衣忽被青蠅汚赤手幾遭猛虎傷賀客未還來弔客老夫雙眼淚淋浪閏六月廿九日飄風動地自黎明堀起破屋㧞樹衆皆驚懼至夜方息次早余追念疇昔憮然作歌三家村裏老詩翁獨木橋邊一釣篷敗壘曾聞屯狗寨荒湫猶説是龍宫勢傾東海前年雨力撼南山昨日風可笑生來誇壯膽兩番如阮哭途窮葛節婦葛節婦家住崑山陽芳年二十良人亡呱呱兩兒泣蘭房一在襁褓乳口黄塵昏破鏡無復覷孤燈相伴慰凄凉霜風自冷木自落辟纑不知秋夜長重門深閉四壁立縗麻淚濕三年䘮維時率土皆戰塲疇能訓兒知義方熊丸在篋螢在囊呼兒义手立侍傍魯論二十篇孝經十八章阿母授讀聲浪浪母不姑息兒能自強從師不出鄭公鄉腹笥有書牙頰香朝夕悦親萱草堂母今年踰五十霜菽水可歡時且康觀風使者恐未知邑有野史揚芬芳玉峰父老來比徳衛共姜我言共姜無此兩兒郎哲哉此母非尋常盍亦作歌與史相激昂寄清真觀提㸃余復初祖餞昔年詩最好客來今雨話𤣥都步虚壇上三花樹讀易牕前九節蒲恬飬氣同龜息静清修容勝鶴形癯儒林老友袁真士曾道區區折簡無代簡吳中衡一夢今年一去年兩番相見兩相憐牽蘿補屋仍徒壁賣藥修琴又斷絃滆浦夕陽紅樹下淞江秋水白鷗邊何當載酒乗秋興來徃風流似雪船寄題詹伯逺蘿屋大車方檻檻小隱自寥寥門掩牽蘿屋溪懸掛樹瓢一從滄海變屢却小山招滆浦居相近城闉路匪遥洗心常翫易忘肉似聞韶苔徑春風掃𤓰田夏雨澆姓名編令甲蹤跡混漁樵蝌蚪藏書種蟾蜍作研僚訓兒燈火夜飲客歲時朝清白真能守緇黄不妄交茍焉田野樂老此聖明朝寄語青雲士巢由不見堯雪中遣興横山鶴髪翁小巷龜頭舍一爐置中央四壁塗縫罅晨粥食近午晝户閑如夜舉足手扶杖縮頸頭蒙帕㧞木飄風静宜麥大雪下公家租賦畢農圃犂鉏暇沽酒黄公壚分肉陳平社有時聚親戚談謔弄杯斝有時呼子孫舞蹈歌風雅舊竹幸平安孤松正蕭灑一笑謝梅花騷無補亡者贈張鍊師名善淵我昔諦觀韓子詩春秋書法風雅辭九流百家蘭鮑雜直筆褒貶非無之嵩山道士姓張氏大篇舂容獨稱美嘉乃丹衷獻赤墀欲撻羌夷安晉鄙天顔咫尺千里同母氏連環來夢中忠孝並存方寸地翩然歸袖舞春風淵今同姓復同道愛親又與同懐抱靈修未得一品題菉葹竟混金光草嗟予學韓年近百吟骨冰清頭雪白内交豈無黄與緇轉首多成兩塵隔淵乎淵乎識道理潮州老僧差可擬臨行握别敬留衣山靈起舞烟霞喜悼大林菴主日公三綱掣斷駕三車一笑今朝喜到家方外旦評喧衆口淤泥藕出白蓮花二熊耳峰頭有客歸相逢還著舊禪衣五山十刹都傳語莫遣閑雲出岫飛三憶昔雲林訪舊遊空堂六月靜如秋焚香坐説西來意門外青松亦㸃頭四一住横山二十年山中木石盡通禪老夫載雪重來日誰折梅花送上船輓無錫王門無車馬送迎忙身混泥塗寵辱忘涴火有時持䑕布濯纓何異在滄浪九龍山下青邱葑雙鯉池中碧草香生子賢如黄叔度牛醫千載並流芳感事二首草暗日欲落山逥路轉賒叔敖呼不起誰擊兩頭蛇二蹊田牛奪去立仗馬令肥安得春秋筆公然决是非邀舒文允小酌春秋連兩年喜事忽今日佳期一百五有菜二十七呼孫貰酒尊速客聚圭蓽風廻落花舞雲開逺山出鷸蚌自相持雞蟲果誰失鄉無月旦評世乏春秋筆長揖謝知已永言保真吉題秦仲暘雨竹湘山之陽湘水隂鷓鴣聲中雨涔涔此君一别知幾載别後桑田變滄海客來今雨重相看歲寒風節依然在餘事不須多感慨送徐士方之登州黄縣學教諭世態趨炎素所憎校官應喜冷如冰絲桐聲續龜山操膏火光分海市燈大釣六鼇將有兆髙堂三鱣豈無徴寄書黄耳還家日莫惜題詩貺剡藤觀音栁肉髻珠纓自在身何縁化作栁中人三眠未足扶風起似怯春寒翠黛顰羅漢松余素拙詩至詠物則其拙尤甚故昨效諸公賦觀音栁俗陋可笑今又聞有羅漢松可配前題再用出醜蓋欲求刻畫無鹽變惡為美勿徒笑其醜云十八羅漢十八公前身後身將無同一行九里西湖路應供誰家去雪中次韻答鄭元齡見贈青年肥遯方求志白首貧交獨念予開徑掃花童起早敲門看竹客來疎匣藏神物蛟龍劍架揷古文蝌蚪書風雨一春門不出門前車馬自紛如宿僧房澹泊齋鐘鳴雨樓風滿天金猊吐盡㫋檀煙誰知林下一宿覺我有石上三生縁懐郡城諸親友余生篤親友平居數相顧老去筋力疲此心尚如故年年二三月晴曖入城府沂雩童冠俱所樂随所遇安知今年春十日九風雨甚疑媧石漏無石可修補一榻髙堂氏四壁蝸篆古牀頭丹菌出青苔灑庭户羣芳狼籍盡來牟紅半腐我耳未全聾聽之亦良苦頼有二三子時復共樽爼或歌竹枝詞或賦梧桐句鏗鏘迭倡和所樂勝鐘鼓歸舟掛晴帆快若馳馬去圓天磨青銅新渌漲南浦候門童穉奔滄洲舞鷗鷺峩峩屋上山厯厯山上樹白石喜不爛且無泥滓汚不見黄初平散卧羊無數尸坐對煙霞神交憶支許何時松葉酒薜蘿徳星聚瞻彼片雪闕援毫抒情愫賀太平寺講主生公坐擁㸃頭石野老來聽焦尾琴祇樹獨園春又夏雜花千界古猶今壁無畫水傳奇跡塔有風鈴作妙音安得刮除雙眼膜時陪杖錫一登臨感興四月初九自城中抵家得前四句後旬日足成之兩目眵昏耳又聾僅存方寸古秦銅忘機自得親鷗侣含弩從教伏射工百越溪山詩枕上四時風月酒杯中惜春無奈春狼籍頻遣蒼頭掃落紅端午日懐古五月五日追前賢九歌九章鳴素絃蛟人應泣魚腹葬龍伯合贈龜毛氊招魂感舊痛梁壊反騷媚新圖瓦全楚天盡處卧遊去艤丹酹月羅江邊西塘詩為郭彞倫作具區東北三千里家住西塘水之涘滄洲不涴軟紅塵一鏡波光照牕几西塘本無風物奇有功於民民稱之早田霑溉數百頃苗無槁死年無饑非湫非壑非瀚渤不為蛟螭作窠窟輕舟徃來快如馬撥棹人如執鞭卒東鄰西舍雜漁樵朝出暮歸歌且謡白紅荷花紫菱芡􅍉苕蘋蓼蒲蘆茭髙齋讀書歲年久鍼經一編常在手客來問疾或問奇拄杖挂錢舡載酒人人有此林塘幽不妨未老先菟裘地因人勝從此始千古萬古芳名流端午後雨阻過詹氏蘿屋即事賦絶句二首代簡風打舡頭輓不前舡回雨㸃大如拳請看六日蟾無用且得爬沙手脚全二瀕溪數家風景幽溪流過門東轉頭黄梅雨少麥大熟買布輸官不用憂人面獸懲元惡也惡不可縱天不可欺故作二詩以懲之人面獸長七尺人衣冠人飲食面有七竅皆人形猛獸之心人莫測生來害物固不少羣居猶自藏牙爪一朝忽欲咬殺人豹麝文熊皆驚倒二人面獸聽吾語一人受害一家苦爺孃妻子令失所殘忍胡為至如許人言汝性多隂毒中汝毒者恱汝目快汝腹汝心方饜足嗚呼馮婦或再生獸乎獸乎勿横行恢恢天網布八紘莫道網疎可漏天聾盲追悼諸葛用中諱端幼年能寫大字既習舉子業學琴袁子方先生之傳父號徳齋晚學道創清微觀揚子江南疇曩日吕蒙城裏一文星科塲早試程朱易𤣥學旁叅道徳經愚與通家心甚赤賢能知巳眼常青草生書帶人皆喜竹作詩筒使不停著處溪山朝載酒有時雪月夜揚舲卜鄰晚欲從王翰分席尤加敬管寧一旦谷陵驚變改十年兵火苦飄零扣門幾誤風敲竹泛宅長如雨打萍天上玉樓俄有召月宫娥藥竟無靈細君冠佩全貞節先世箕裘祝寧馨名溢東吳滄海國魂歸北固白雲屛兩家相去百餘里一老今踰九十齡聯句每懐吟石鼎聽琴頻夢坐柯亭柱題應有能言鶴擬踏秋風去一聽寄鄧秉文二首曹横山下聱叟吕蒙城中放翁何夕舉杯邀月中秋鼓枻乗風二鐵柱硉矹二老璿霄沆瀣三更絶口不談時事掀髯聨敘平生寄陳彰逺明逺兄弟金牛臺下帶經鉏長鋏無聲食有魚兄弟五人雙璧在箕裘三世一廛居中秋明月最端正長夜浮雲或巻舒覔得丹梯上天去同將物理問何如寄辛至善青年即著逺遊鞭白首仍居小市廛寂寞蓬蒿三徑在辛勤父子一經傳奔牛堰下水到海射虎亭西山揷天我欲抱琴尋戴去中秋相近月將圎寄清微觀周泉石塵揚滄海廿餘齡真館翬飛壓庱亭風掃刼灰南土樂天開圖畫北山青丹砂九轉龍蟠鼎玉漏三更鶴聽經諸葛仙翁呼不起正須金石播遺馨三笑圖簡寂先生五栁翁襟期適與逺師同過橋相送忘相别千古風流一笑中風雲雷雨畫四首吹嘘萬物生蘧廬盎盎元氣槖籥吁偃禾㧞木有未㑹請君細讀金縢書二漠漠閑雲淡淡容不為蒼狗未從龍直須霖雨成功後依舊還山伴赤松三金電光中霹靂飛殘臣膽落震驚時雲收雨散青天出能聽無聲有阿誰四誰挽銀河沃太空恩霑赤地洗爞爞隂隂夑理天家喜都在丹青筆意中野雲歌為王元一羽士作山中之雲歛蹤跡空谷深藏伴泉石從龍之雲雷電俱四方行雨勞馳驅飄然一片雲在野看來最是悠悠者或舒或巻無朝夕南北東西随所適道人含笑松下坐我即是雲雲即我買臣讀書圖噫予㑹稽守素行何卓絶采樵工或餘誦讀聲不輟青柴擔頭春赤脚林下雪富貴知有時妻子從改節髙風一如此後世誰可埒吾將訪遺蹤更得探禹穴薦福寺紅梅詩紅梅閣事見毘陵志等書庚溪詩話載程致道詩有春風日浩蕩醉色回冰肌之句元末兵燬今本山釋源公竺淵恢復舊刹重植兹花丐予詩記之紅梅閣下梅花樹陵谷變時風㧞去堯峰老禪歸故山覔得孤根栽舊處年年春到花時節一株五出胭脂雪春風笑面歲寒心光霽混融風韻别老禪道服忘妍醜品題假我扶犂手黄州定慧海棠花可與齊名傳不朽月香水影象王宫雜花世界將無同幾度拈花有人笑吾將請問瞿曇翁源竺淵以道西傳等和予詩亦蒙見贈且云臨字等韻難和予由是復次韻酬之支許論交世所欽昌黎亦聽穎師琴深山大澤多遺逸明月清風無古今閣下梅花桃杏色庭前柏樹海潮音寫容代有丹青筆電目誰能一照臨獨孤公檜詩唐獨孤憲公為常州刺史時有手植之檜今見諸郡志等書元末樹毁於兵至二十餘年為州民者宜再植以寓思賢之意况有周鍊師為松菊主者乎率爾口占呈乞諸搢紳先生更唱迭和相與贊成亦庻乎厚風俗云憶年十五六好古尊前賢初聞獨孤檜快覩曾争先蒼然一株枿舊根皴皮錯節枝葉蕃適逢夜雨半身濕疑是徃年甘露痕孔明廟前柏相似乃在陳司徒廟之後園鄉來陵谷忽變改化作刼灰飛入海神焦鬼爛救不得桐鄉自此無光彩幸存一曲闌干石題公姓氏留遺跡石苔斕斑土花碧相伴銅駝卧荆棘余從海上避兵歸幾度摩挲長太息懐哉古之人好賢意無窮詠甘棠愛召伯賦菉竹美武公憲公此樹堪比隆後人寧不仰髙風𤣥都道士桃千樹一檜區區豈難措龍鍾野老及羣英亦愧因循坐遲暮檜乎檜乎重培植風枝相樛霜幹直邦人具曕仰遺徳見樹猶如見顔色六百二十五年如一日題牽牛圖為丁學古作不放桃林不飲池叶唐何切牧兒牽去意如何南山石爛今非昔寗戚無勞扣角歌題鷺鷥便面為丁學古作潦倒滄洲客蕭騷白鷺詩牧之呼不起此意少人知出門老去多懐舊興來時坐馳出門窮鬼笑罄室故人知野飯新菰米詩囊古竹枝諸孫溪上别矻矻問歸期題僧綱澹泊軒我愛澹泊軒山居城市中雲分半間許雨溜四壁同風林金石聲道人氷雪容澹然味無味泊然空不空露坐㸃頭石雪立摩頂松吾徒幸相與吾道喜不窮一笑兩忘言落花舞回風江山漁樂圖數口妻兒網一張船為家舎水為鄉江南江北山如畫欵乃聲中送夕陽崑山王有恒以書附常州天寧寺長老寶公問予近况作詩答之并索諸友賦重植獨孤檜詩客從笠澤來常郡書到横山問老夫哭子哭孫家已破賣書賣劍酒還沽千墩每入龜巢夢十月應開獸炭爐支許舊遊煩寄語肯題唐檜和巴歈黄林屋許贈皂布巾不至戲作此索之霜倒蓮葉巢老龜寒縮首欲裹緇布巾并裹瓦盆酒此酒今已熟此巾曾製否抱膝梁父吟炙背坐南牖老况知音誰横林隱居叟贈天寧寶滄海臨濟雲仍幾代孫猊牀說法象龍奔庭前銀杏西來意陌上銅駝東郭門四海共霑新雨露一舟能泝古淵源留衣人逺衣何在别有伽黎遺後昆悼城西周彦美二首七十六年事梨花夢裏春家傳三代禮身作兩朝人負郭田園樂連雲第宅新闕麒麟二三槐堂上客闕最青春吐酒常憐我奕棋多勝人闕竟作白頭新釃酒橋𤣥墓澘然為泣麟寄饒州鄱陽縣唐生千七百里鄱陽縣外孫書來如見面九十三歲龜巢翁中宵夢得重縫線詩瓢山人來上游吾將結社招馴鷗延陵昔日繼三讓野水何處無孤舟貧家幸爾年榖熟買書教兒耕且讀梅花無恙竹平安歲晚無勞念窮谷和舒文允見貽冬至經旬久朋來喜踐長市沽雙木榼踞坐一藜牀小酌成歡洽閑愁付杳茫山無白石爛谷有紫芝香澹泊聊相與辛酸已備嘗盡消湖海氣莫放斗牛光所貴心能直何慚貌不颺聽冰狐自惑吠雪犬何狂歲晚鷗盟在生平蟻夢忘酒堪澆磊塊袖莫舞郎當西崦黄茅嶺東洲白水鄉漁樵同此樂吹笛送斜陽夏五訪一舟禪師臨别立銀杏隂中謂予曰山中舊物什䘮八九唯此木幸無恙也宜蒙品題為天寧勝槩使居山者亦預有餘光余謝不敏然心嘗許之故兹口占以頌人物具并之美一箇虚舟渾不繋千鈞重負力能任金園地湧靈光殿銀杏天生䨇樹林佛印衲裙坡老帶昌黎詩句穎師琴禪林勝事無今古况爾庭前好緑隂輓曹子毅大使早歲輕肥試采榮一官三載繋塵纓解龜便作幽棲計𤓰圃東門學邵平二桂子初生折媆枝青氊舊物遂陵夷竹林小阮親調饍何異慈烏返哺兒三生來不鑿混沌竅此去竟作逍遥遊回頭一笑看鷸蚌未到釡鬵誰肯休洞庭胡敬之以予父執之交歲饋新橘凡十有餘年感無以報是用作歌湖山清氣鍾而翁生兒亦有古人風年年送橘拜牀下甚愧我非龎徳公今年霜落洞庭早橘熟等於葑田稻青衣童子黄金丸樹頭摘來霜未乾儂家食指百三十分甘喜得皆波及嬌癡堪笑兩曾孫手㺯金丸口欲吞阿翁老饕三嚥畢教孫食之還自喫一枚一枚復一枚翁有笑聲孫亦咍枯腸久似長卿渇甘露適從仙掌來楚江萍實不可得華峰藕亦無人識冷比雪霜甘比蜜此句真堪題此橘韓子之詩今代無借作報章揮我筆懐哉故人家洞庭七十二峰環翠屏洛陽秋風塵滿城莫能汚爾雙鞋青南山不爛黄河清正須坐閲三千齡山中舊識諸耆英莫煩老夫多寄聲紅梅前代支郎亦異哉白雲堆裏植紅梅樹經刼火多番換花向春風二月開鄰舎杏桃渾赧色禪枝草木絶纎埃一時想像題詩去别日尋芳載酒來歲旦言懐去年元日兩眉攅情抱今朝頗覺寛一夜雨聲曾不絶五更天氣只微寒二曾孫杯捧屠蘇酒冡婦厨供粔籹盤最喜催租人不到田家雞犬得平安寄盧長嬰次農我思東吳諸故人二難青年才出羣炯炯眼如巖下電英英氣作山中雲一經㫖趣熟儀禮六書偏旁宗説文無由縮地即相見晉鄙亦得沾餘薫寄辛彬甫五鳳添修助益箋雙魚書尺竟虚傳桃符忽爾三年換木榻如今兩膝穿南國鶯花春甚早東洲雞黍約如前好來同賞元宵月莫返山隂訪戴船和毛伯尚雪中登塔一夜雪深三尺許江南江北久無之躋攀鴈塔最髙處想像鴻荒未判時光動山林揺玉樹氣涵湖海湛瑶池僧房或擬天花雨田舎皆占隴麥宜黄竹無歌良可喜清河有頌不妨遲八千里外多遭貶十二街中欲訪誰白戰正須逢敵手長吟聊復解人頥凭欄細聽風鈴語似亦知音說好詩壽諸葛節婦憶昔梁鴻歌五噫挈家避兵東海涯玉樓有夢上天去孟光無復案齊眉旌旗滿眼愁滿腹抱兒日夜吞聲哭沙湖㟁竹似湘江淚痕斑盡依依菉呼天籲地吐丹衷柏舟之誓共姜同桑田變海得歸路庱亭故園榛棘中教兒服勤能構穫青氊舊物兒堪託星冠霞佩蕋珠經萱草堂前樂吾樂春秋六十有八年時人喚作女中仙麻姑送酒作生日雙成獻桃紅且鮮髙堂長夜照明月何異嫦娥廣寒闕不勞白搗𤣥霜真修自有長生訣仙家歲月我不知我來為作節婦詩他年烈婦傳中寫千古萬古芳名埀獨孤公檜詩并序予前詩謂獨孤公檜在陳廟蓋圖經所載及予親身見之一日郡人徐孟曾問曰唐刺史為一州之主手植之檜宜擇美地公表而出之衆所共瞻何寘諸陳廟之後耶予曰按唐書徳宗朝徙公為是州刺史去梁公毁江南滛祀之日未久無陳廟也唐衰禮廢淫祀寖興迨五季而禮法大壊叢祠之神類加尊號陳廟或肇於唐末而盛於斯時今荒園廢沼安知非昔日驛亭傳舎乎厯宋而元皆無改作故翁巻之詩有曰托根陳帝廟應不慮樵夫其意不以此木為不幸而反以為幸也可勝歎哉孟曾然余言遂植檜舊所予亦恐前詩為人口實因復作是詩獨孤之檜化烏有庻士重栽倚碧潯遺徳一州人眷眷流芳千載樹隂隂霜根蟠入龍蛇窟風葉響成鸞鳳吟願若甘棠無翦伐報公疇昔愛民心寄聰上人嘗託補楞伽經脫簡就用索之杕杜之歌落九天石尤風轉送歸船長洲茂苑渾無恙翠竹黄花總是禪眼孔不教迷土苴耳根常得洗風泉貝多葉上楞伽語脫落應能為補全題顧師道樓居晴空圖山孱顔雪斕斑飛樓縹緲層城巔水晶榱題白玉闌樓居之人應列仙金烏出海飛上天藍田瑶草煖生煙誰家馬上郎意態清且閑既非謫官遇雪阻藍闗又非春風得意遊長安摩挲老眼仔細看乃在櫟里先生圖畫間碧桃贈吕城􅄵官應孟㳟猗猗谷中蘭鬱鬱澗底松我愛之二物幽尋庱亭東路逢碧桃花澹然無冶容吾知所笑者羣芳鬭青紅本來天上種有此林下風老况哭子三年孫兩年一孫戎服又西川秋風茅巻藏書屋春雨苔荒負郭田堪笑平居能濩落誰知末路竟迍邅空林樹折烏巢毁奈爾孤雛失所天雨中期辛彬甫不至兼憶兒子林孫塏等一時口占二絶句雪尋戴逵興不逺雨過蘇端意甚濃若使兩賢生並世浣花溪上我遊從二一雨能生五月寒三杯欲釋兩睂攅那知酒入愁腸去化作澘然淚不乾謝饒州周氏甥孫女惠鞵昔領軍一屋之鞵未聞有惠人者今唐伯亨室人製雙鞵遺我於一千八百里之外其親愛之心可謂篤矣然則茍非伯亨之真其室中之人安能遂體其心哉區區報章豈忘所自故著其説如此詩曰濯足洮湖寂寞濱寄來雙屨藕絲新何當化作飛鳬去謝汝慇勤念老親贈盧長嬰次農憶昔盧兖州生有古人風病世禮俗壊或與禽犢同遺經授子姪世業今専攻騎箕去不返象賢躡孤踪平居迭師友砥礪相磨礲東海雙南金豐城兩神龍含光若暗投天將振儒宗叔孫自綿蕞制作成治功潛心對黄巻儼然見周公妙理析秋毫百世開羣蒙追攀大小戴旁叅鄭司農復看書帶草匝地生婁東顯親埀令名永言報而翁寄南宗僧綱大空寥寥雲自浮驕陽蟲蟲金欲流白生一室静如水清坐六月凉於秋陽羡好茶留客共獨孤多檜賦詩不官様文章祖蒲室正須述作賛皇猷寄一舟禪師葱葱䨇樹林井井百丈規欽欽響鐘鼓棣棣慎威儀空庭苾蒭草浄瓶楊栁枝滿眼皆祖意此身丁盛時熱客不相過清風堪自怡或翦葛藤話竟織駢儷詞陵谷變未久山水知音希我本六日蟾眎同五總龜儒墨各有趨支許交忘機眷言獨孤檜曾覔一二詩禪縛想自急詩筒來乃遲南風非不競北山何用移請拈木毬子聊作逢塲嬉寄講主法師西𫝊懐哉久别廬山逺奈此相望去路賖屢夢丹梯同上塔每留清話竟忘家芭蕉手種繙經葉菡蓞池開結社花三伏不嫌人褦襶一肩偏袒佛袈裟竺書自早探三藏緗帙如今載五車方寸静涵滄海月文章光炫赤城霞尚憐老馬能知道更喜神羊解觸邪早晚蓉湖秋水碧定期濯足過漚沙懐詹伯逺蝌蚪殘書補未全齋居一榻坐來穿稻花遶屋白如雪溪水出湖青接天冠盖不來騎馬客鷗鳬長傍釣魚船多時欲問平安信伏日題詩寄竹邊寄贈岳陳齋二首一書曾寄訪行窩百里相望阻滆波陽羡谿山無恙否延陵風俗變來多鵂鶹夜集連雲厦荆棘叢生注馬坡尊酒欲懐千古意中秋蘿屋候經過二南山爛石無多在東海颺塵又廿霜奇字盛傳揚子學徳門誰表鄭公鄉秋髙丹桂花纔發閏後黄楊樹必長㑹有龍蛇生大澤流芳竹帛繼先王寄薦福寺源竹淵青門薦福東堂老白首黙誦西方經有時適興倚梅閣無復談禪坐柏庭解夏欲随雲水散立秋忍聞風葉零老禪心性一如此說頂㑹有伽耶鈴寄贈吕城羽士周泉石仙風飄飄天骨奇不皤爾髪黄爾睂海上鐵船渡九折道傍闕金狄知松花釀酒常留客竹籜裁冠自賦詩不解腰纒要騎鶴道人應笑俗兒癡索居無聊自七月既望至中秋前九日腹稿得小詩十首不追琢不詮次大率皆眼前事無逺興也然胸中芥蔕有消釋未盡者或見於詞可笑我愛青山爽氣增青山似我骨稜稜半年不踏山前路也學禪居結夏僧二一昨病暍思清秋秋來兩旬熱未休堪笑荒唐野人語天公不遣火西流三詩腸頗饜木雞肥老齒方便豆粥稀今雨客來如舊雨多情只有兩烏衣四蚊蠅屏跡去何遲烏循環度不移一雨夜來凉可喜家家水滿飬魚池五十里山開翡翠屏三家村裏老人星無塵竹徑風還掃徒壁茅齋夜不扃六魚自浮沉水自流釣船閑繋小溪頭朝來頼有杯中物忘却連年日夜憂七阿翁眠食龜頭舎兒子耕耘犢鼻裩記得孝經刋誤本尚能口授教曾孫八牀頭鬭蟻取人憎壁上粘蝸失自懲螢火光殘小兒手誰憐堪作照書燈九凉風騷騷草木黄初月皎皎更漏長洛陽有夢忽驚覺鶴唳聲中人斷腸十稻花雨外紛如雪桂子風髙香滿天誰信一䨇多病眼餘生重見太平年暨陽沈徳隣氏徙居郡城名燕處之室曰咬菜根處昭其儉也龜巢老人謝蘭謂之曰夫人以儉徳立身惟窮達不變者君子韙之拙詩效顰亦曰備薑桂之用云士方窮居含糗茹草誰無菜根知味者少睠兹小物大道可擬淡而不厭斯為君子鮭菜自珍龍根自奇我菜之根朝斯夕斯若決濡肉或如嚙骨左車有聲宫商彷彿賢相脫粟聖相齕匏顧予何人口腹敢饕吾愛吾廬畦蔬遶屋盤有餘飱鼎無覆餗窮達百年始終一趣明月清風咬菜根處輓管伯齡先生多才徳與俱崑山之玉滄海珠玉華忽作白雲散珠光竟随清夜徂青青書帶匝里閈纍纍筆冡埋荒蕪雞林客來嘆且泣欲覔好詩還有無二憶昔狼煙兩袖黄斷蓬飄泊鄭公鄉金龜換酒邀明月玉麈論詩説盛唐百年往事陵谷變通家交情江海長騎箕先著祖鞭去旦夕吾將與頡頏陳存心先生挽辭代黄仲器作蒲石軒中山澤臞出門戎馬即長驅欲騎東海金鰲去竟作西風玉樹枯化鶴還家人想像義烏銜土子號呼恨無杜老揮椽筆寫入哀詩比畫圖鵪鶉圖不作巢居與穴居鳶飛魚躍不相於平坡淺草幽閒處宿食飛鳴得自如題清微觀并序蘭嘗考庱亭乃孫仲謀射虎之地今為吕城橋密邇清微是為清微勝槩也不揣言耄表而出之并為燕厦之賀云阿䝉之城何代傾𤣥元閟宫無與京英雄射虎陳迹在咫尺奔牛古堰横鯉魚飛去石盡爛桃花種來蹊自成華陽福地一如此何用山中宰相名懐袁耕學諸故人夢裏忘余兩目盲馬鞍山下訪羣英詩容總似山容瘦道氣多如海氣清皎皎白駒方屏跡嚶嚶黄鳥未忘情呼兒早起題書尺十日新年雪乍晴右寄袁耕學二憶昨吳淞十二詩清真道士獨委蛇梨花春釀適來熟頻遣青衣送酒資右寄清真觀道士俞三鈯斧單提不暫停黄花翠竹總忘形問渠送米盧仝意也愛茶聲有可聽右寄延福菴主四雲峰毬子逢塲戲一笑春風舞袖歸從此晏然門不出忍看沙界有危機右寄僧闕長老五崑山絶頂立浮屠海闊天髙氣勢孤莫道八風吹不動八風吹動有人扶右寄僧勝上人六玉峰巨邑冠東吳在處金園似給孤手把竺書朝夜讀此心能轉法華無右寄僧善性空送郁友文之京揚子江頭春二月送客登舟赴天闕男兒生有四方志莫作尋常黙然别憶昔孺子歌滄浪尼山聖人曾激揚我賡再歌呼索郎子其洗心宜勿忘次韻奉荅瓢齋先生見寄二首齋居一榻坐來穿腹笥羣經老欲眠夢裏亦行端正路醉中常造渾涵天春光荏苒無多日天氣霠霃近禁煙舊雨不來今有約虹光遥望載書船二予家經亂離蕭條無六親遥憐竹林阮中有白首人髙詞吐白雪逸氣凌青雲楩柟豫章下灌木無足云安知射工弩中厥父子身問疾數徃返先生同五倫奈何日月下覆盆茹艱辛惟天降炎霜清飈灑冠巾一朝禍根㧞戩榖乃薦臻孤鶴還九臯飄然離雞羣吾將問𤣥機載酒歌子雲僧綱賛公和尚以疾得告而歸善權舊隱横山老樵謝蘭效劉賓客竹枝二首為臨别贈維摩牀上遣文移治績垂成竟解龜僧史有如班馬筆絶勝州里去思碑二滆浦飛花送客行善權耆舊出山迎問渠那得真消息摩頂松枝喜鵲聲過無錫醫士徐士亷别墅棲神山在屋西頭竇有寒泉帶錫流山近杏林煙樹接泉香茶鼎雪花浮蜚英早歲肱三折樂道清時號四休堪笑興來忘潦倒尚能擕酒過滄洲寄楊彦澤逢人屢問平安信有子亦如郎罷賢萬石艨艟輸賦足九重閶闔奏名先未論烏鳥能含哺且喜黄楊閲閏年我昔與談忠孝事阿戎詞色兩忻然次韻送秦文仲歸海上溧水先生挽不留故山回首鬱相繆落花飛送九年客行李歸來一葉舟勲業鏡中成白首耆英㑹上冠清流獨憐詩社今寥落無復尋盟集舊鷗送秦文仲教諭歸老崑山縣盛代埀新統斯文續斷絃青山溧陽縣白首廣文氊唾視鉛刀鈍心持鐵硯堅蓬麻扶盡直茅茹㧞相連頒印恩殊重明倫教欲專諸生皆鼓篋三物屢興賢美績經三考英聲徹九天晚成真大器幽谷必闕命以菟裘老榮於晝錦還黄河清有日白石爛多年齒徳身兼備文章世自傳本來天下士且作地行仙鷗社詩盟在鱸魚斫鱠鮮寄聲袁處士雙璧喜俱全次韻寄薦福寺東堂長老坐斷根塵知幾年逢人猶説未生前有時觸背都忘却笑指扶桑尺五天二家山不見舊忘年重植紅梅慰目前樓閣大開彈指頃香風應到率陀天三莫笑黄楊老閏年枝枝葉葉不如前姓名留在香山社也愛吟詩似樂天横山白龍祠神母何年生白龍曹横一墓遶龍宫蜿蜒靈物望如在寂寞古井清若空山川每見出雲氣鄉里競傳行雨功府縣官曹走籩豆質我識字田家翁簡沈時敏二首徃予入城府笻杖扶踔踸故舊驚骨立兒童嗤貎寢時子適見蔑為我言責沈心持一寸鐵詞吐五色錦所喜得三益豈料别數稔嗣音竟茫然屏跡疑逺甚近從支遁遊因聞許詢吟家住洛陽橋窗含滆湖浸煙波隔紅塵雲樹幕清䕃安得忘年交時能邀月飲文章論大雅酣適就髙枕人生貴佚樂此樂真絶品二憶昨觀李杜詞塲車並馳追蹤三百篇齊名盛唐時杜詩多與李李與杜者希當時豈偶然意或有隱微復觀杜憶李首陳褒美辭其間方鮑庾微意若少之樽酒欲細論諒非談笑嬉迄今千載下疇能發𤣥機區區蠡測海敢告新相知秋髙金氣清桂子香風吹虹光書畫船雞黍或可期合歡杯勺間評此兩白睂况有古經史相傳更多疑朝聞夕長逝九京含笑歸憂旱吟吾聞東海殺一孝婦三年乾天人感通非浪言又聞長平坑卒四十萬胡為乎竟舎旃人讀書貴主窮理斯理未明堪汗顔朅來一旱月幾圓老農多憂良可憐青苗蟲生食欲盡赤地龜坼生炎煙龍祠巫祝杯珓擲羽士醮壇鐘磬喧妻孥踏車或抱餒牛犢賣來供社錢盲翁夜來亦不眠追思直從三代前堯湯水旱皆數年必能有以扶顛連當今聖明君咫尺九重天有能鳴哀玉陛前天恩不日彌九川一夫罔令溝壑填耕田鑿井仍熙然示冡子及孫曹横山下小菟裘某水某邱堪釣遊四世團欒非易得一窩安樂比前修家庭惡有司晨牝江海憐無結社鷗我子我孫宜克念莫將肝膽作仇讐又自述同示搰搰劬書覬有成區區没世恥無名七情欲斷氣未斷兩目欲盲心未盲白練製裙蠅㸃汚青燈照榻䑕縱横家聲掃地綱常在未許兒曹學倒行祭禰忌日詩投老龍鍾日思親長飬時羣咻憎陋俗四逺擇名師夢有生花筆才非脫頴錐庭闈歸定省翰墨作遊嬉隣舍三元日桃符七字詩柏臺驄馬過茅㧞鶚書馳氣色生逢掖光華照扊扅亨衢雖不到大道頗能知􅓺舍氊分坐儒冠廪稍糜中年逢世變濱海避時危骨肉能相保肝腸罔有私尚蒙先子澤不受外人欺栗里歸來廢横山卜築遲頽然窮谷叟援乃落巢兒子愛非姑息孫謀有厥貽牝雞良可惡烏飬本相宜昔怨何三失今逢此百罹雙親應念我鑒此蓼莪悲雲林書舎為徐孟容作東家領軍鞋一屋西家買妓傾珠玉寂寞南州髙士孫燈火小牕書夜讀羲皇畫卦龍負圖蝌蚪此時無簡牘神農本草軒岐語為是傳家先爛熟唐虞三代二千載六經聖賢常在目牙籖挿架日益多蔗境漸佳心未足便便腹笥貯琅玕齒頰霏霏吐珠玉鍾期骨冷呼不醒誰復賞音聽此曲青林不著軟紅塵祗許白雲簷下宿雲乎雲乎知不知封胡羯末森如竹白眉之良衆所稱能繩祖父棲幽谷清河有頌泰階平應著先鞭駕黄鵠賀潤天澤住持保寧寺横林之北横山西孤村流水古招提青苔一徑童不掃白雲半間人共棲松枝甘露落麈尾桂子香風吹麝臍我來欲問㸃頭石道價孰與生公齊南宗僧綱和尚唐允明吟友倡和見贈支許久不作緇林景清徳適見雙南金褒嘉詎容黙新詩倡且和字字皆悃愊挹此沆瀣秋注兹雲夢臆大道本平平中庭宜殖殖九品蓮花臺毋庸論西域豆腐詩并序凡人年老者以肉飬之古今一致然老而無齒則肉林之盛禁臠之供其如朶頥何求其甘輭若豆腐者真可謂飬老之善物也但名物不著乎六籍品第不列於八珍鐘鼎之家咸藐視之比予過僧房學舎連得食其佳者嘆賞不足發於咏歌是猶為冰壺先生作傳也博物君子宜蒙品題吾言固無足取重於人庻不為嚇腐䑕於鵷雛者耳誰授淮南玉食方南山種玉選青黄工夫磨轉天機熟粗滓囊傾雪汁香軟比牛酥便老齒甜於蜂蜜潤枯腸當年柱史如知味飲乳何須窈窕娘唐允明以吾孫垣自成都府巖洲衛公差過常鎮等府因得覲省賦詩見貽有情兼悲喜之句可為知我者矣次韻示垣并謝允明數千里外公家事七八月間行李歸揺尾門迎一黄耳傷心客散兩烏衣穿楊自可成勲業擢桂從他赴禮闈多謝故人能警策好鐫肝膽莫相違袁耕學先生以陶詩集句十五首見示心賞不足以辭荅之先生山澤臞遊戲詞翰中生來愛陶詩白首情所鍾集句成大章一氣春混融纍纍九曲珠螘絲中貫通嗟予目無見擊節歌玲瓏竊比蔡中郎以聲識焦桐即物因有感懐賢仰髙風孤竹首陽餓五栁柴桑窮窮非餓死比方寸將無同史稱晉徴士直哉考亭翁風俗今變改草木豈亦從黄花朱紫貴青松大夫封邪蒿匝地生指佞草絶蹤何當過横山班荆坐孤峰先生口懸河洗我蔕芥胸風帆早乗興我耳猶未聾弔薦福竺淵源公滄海塵生罷逺遊紅梅手植繼前修雲開樓閣人彈指風振簷鈴我掉頭十萬里程天竺國一乗車駕雪山牛客來舊日喫茶處煙冷薫爐憶趙州寄南京僧綱并寄唐允明雪竹霜葩歲晚時袈裟逢掖徃來嬉著書應笑龜巢老刻畫無鹽醜不知二詩滿簞瓢酒滿船時人喚作地行仙抽絲適有冰蠺繭好為焦桐續斷絃東洲觀音堂甃瓦歌七佛之師觀世音十方化身無古今補陀金刹南海現無價寶珠龍女獻東洲築堂五六春茅茨乃作有漏因珠冠白衣漬泥潦龍王女兒應笑倒豈無圬者善安排不堪空打赤白崖鴛鴦瓦合數千百圓通大士居安宅衆毛集來成一裘震風凌雨更無憂青銅錢與珍珠粟今生布施來生福松竹梅三詠歲寒松柏冠山林論語埀名照古今韋偃畢宏俱即世傳神頼有草堂吟二淇箓猗猗比武公清風本與首陽同六經煙滅秦坑後嘉爾雲礽紀載功三吳王醉處十餘里僅得晚唐人一詩不遇西湖林處士暗香疎影有誰知寄習訥二講主南山北山兩浮圖東家西家皆給孤塵世換來風景别上堂鐘鼔似前無寄辛彬甫長短句分三四派聖賢經訓數千年唔咿聲裏工夫熟萬象森羅月滿天寄性空山主次韻住菴家法似南泉鈯斧單提十五年歲晚閉門渾不出忍看霜倒佛池蓮寄吕克明生不封侯向酒泉筆耕東郭太平年林居適與僧廬近也為招賢種白蓮二客來曾得問林泉書帶青青倍昔年且喜時人多未識楚江萍實華峰蓮次韻自述兩目塵昏淚迸泉春秋虚度伏生年滄江歲晚龜藏穴依舊巢居一葉蓮二雪水煎茶勝惠泉茶經重著兩三年夜來明月梅花下又擬濓溪説愛蓮感懐生來迂闊從人笑老去盲聾祇自憐紅藥殿春能幾日黄楊厄閏又三年簷風巻我􅢤蝛幔夜月窺人蟣蝨氊江夏黄童能扇枕當時太史豈虚傳短歌行東謝莊西謝莊奔牛東斗十里強先人痛惜家譜亡能言其畧忘其詳髙曾夲住開封府紹興之先離亂苦随龍渡江寓兹土以謝名莊似韋杜後來一𣲖分烈塘華屋髙邱乃吾祖季父咸淳中甲科封胡羯末皆簮組宋厯巳矣元厯新竟作遺珠沉合浦我祖佳城宰木拱家庭玉樹遭斤斧我祖我伯我父兄青塜纍纍續遷祔轉頭滄海又揚塵十年逃難歸洪武昏鴉滿樹雀無枝結巢乃在横山塢三子六孫中子殂長孫又殞黔陽簿黄茅嶺畔作哀邱昭穆按圖無牴牾年年寒食春草長横山烈塘連謝莊一盂麥飯一壺酒老淚觸處俱淋浪於乎豺􅆩猶能效烝嘗何况人為物靈知義方我今諄諄語兩郎爾子爾孫宜勿忘冬至前一日寫懐二首龍鍾去年冬修書辨魚魯吾兒念吾衰勸我勿自苦吾嘗責吾兒曾讀孝經否聖人教斯民揚名顯父母窮達固有命劬勞何敢負芟夷兎園册於道或小補方誦蓼莪篇安知又初度存順没吾寧全歸冀朝暮二今年盲且聾狀若霜木槁齒牙脫兩齶涕淚出四竅獨存方寸鐵自謂無價寶異端屢排斥滛祀絶祈禱喋喋非好辨惓惓衛吾道一陽葭欲飛九土荔將出家人忽起早為我作生日沽酒斗八升有菜二十七北風非不寒南簷盎如春都置眼前事且漉頭上巾巢居烏返哺拄扶鳩祝噎横山齊瓮氷東洲釣船月窮鬼莫見笑老夫堪為恱寄語撲燈蛾少須燈自滅寄朱季明客來曾説問詩臞西郭梅花玉一株朝日尋常照苜蓿春風次第到屠蘇通潮港淺潮田熟捍海城髙海㓂無珍重歲寒門不出催租吏卒競喧呼寄題讀易齊為辛彬甫作讀盡諸家卜筮書羲經日夜巻還舒數椽茅屋婁江上一樹梅花臘月初童子研朱頻滴露客來買卦或潛虚珠璣咳唾琅玕腹何患家無擔石儲王逹善母挽詞阿母穆穆林下風生兒彷彿晉阿戎起家讀書眼如電閥閲衣冠俱一變三從無違四徳全月旦有評無間然萱花堂上安且吉分甘抱孫長在膝風含夏葛并刀剪雪霑寒笋充厨饌兒能苦學夜不眠不勞母作熊膽丸客來治具兒不乏毋勞母剪青絲髪升堂拜母環珮鏘慈顔怡愉春滿堂希年厚福有如此千萬人中能有幾兵餘重見太平時盖棺應喜得全歸諄諄有命提兒耳不以浮屠廢䘮禮素車白馬紛如雪閭里光輝人共説我歌薤露聊云云宜有張林之碑傳後人塗謡新年騎竹走兒童兩月甘棠憇召公大誥奉揚天子命崇文絶與昔賢同閭閻四邑歌謡喜囹圄羣縲剖決空魯泮芹香霑教雨孔壇花暖鼓春風投膠澄水真難事覆簣為山必奏功早晚璽書嘉政績東闗劍井氣如虹和王有恒野歩芳草青青路欲迷白頭有客共扶藜吳田半没桃花水辜負春風布穀啼二雨雨風風一夜春惜花愁殺少年人青山不管人閑事也學吳姬翠黛顰和王有恒見贈客來欲與問天翁鳬鶴奚為脛不同一代衣冠更變後五湖風月笑談中脫巾釃酒留知巳擊節哦詩和送窮窗下小桃嬌欲語錯教童子喚紅紅糟邱作為鮑思文作諸公搰搰營莵裘何如將老吾糟邱杯餘酣睡儘落魄堂上肉食從伊優酒泉不作二千石醉鄉宜封萬户侯幕天席地燭明月日與麴生同宴遊攬翠軒昔人車載蒲萄酒區區為覔西凉守山川信美得專城能有幾時權在手何如白駒在空谷四山空翠皆吾有非煙非霧非塵氛鬱鬱葱葱藹林藪兩間清氣相混融若有人􅆽西柄斗繄我南州髙士孫說項求詩半年久老夫平生愛蕭爽一笑相逢敢多口山靈望子早歸來相伴雲林猿鶴友朝餐青霞夕沆瀣攬翠軒中可兼取何異商時茹芝叟王有恒以詩留别其詩有鶯花催老淚之句予乃效唐人和意而不和韻送其行解其悲兼簡吳中行心友丈夫不灑離别淚杯酒堪澆磊塊胸勛業連年雙髩雪歸舟此日一帆風身居􅅵畆宜為樂腹有詩書未是窮寄語雲間吳處士好將安信慰盲翁苕溪獨釣圖吳興山水清且妍苕溪之名天下傳鷗鳬相伴一釣者風雨不歸三板船駱駝橋上人如蟻看花馬去長安市滄浪古調不欲聽笭箵小鮮何足睨溪流入湖清接天鳶飛魚樂兩悠然休寧掛冠歸故里丹青想像元真子漁童樵子俱不見雨簔煙笠真乃爾嗟予經鉏老窮閻文章書畫愛猶兼兹圖若以文並覘必須一字酬三縑端午家居州縣似新豐不作偷生折臂翁蒲歜尚能邀客共榴花堪比舞裙紅三年艾老蓬蒿下六日蟾遺坎井中世事古來多可笑陶然且卧北牕風窮快活示二子香風嫋嫋花滿林花間鳥有快活吟吾生天與窮快活一鳴可不如春禽憶年十八正月旦薦官船泊西河㟁東隣西舎看桃符適然有喜邀相見時予縗絰淚淋漓鶚書不作令待時丁寧郡守飬寒畯月支學廩供慈闈窮快活從此得鄉黨州里皆喜色六經如天從筦窺一方寸地開茅塞破竹方知迎刃解啖蔗漸能嘉境入看花不上長安道桃李家山春正好馮驩有鋏不能彈乗車食魚鐘鼓考充閭有子燕雀鳴打門無吏雞犬寧阿婆含笑歸九京遺澤使人呼寧馨塞翁之馬無得失四十年來如一日南山石爛莫奈何移家東海避干戈蛇無横道虎入窟隱然若有神撝訶入吳首謁三讓廟感古傷今發長嘯三髙祠下斥䲭夷豆籩忍覩吳為沼雲門先生鐵笛老傾盖相知皆絶倒老性尚存薑桂辣不随蒲栁秋風掃玉山玉泉膠漆投顔公智公支許游墨名儒行一年少宅我闔閭風雨秋中吳偶作鵷雛穴越鳥喧呼來不絶熊袁盧殷吳趙許相伴滄洲弄明月華亭清唳真可聽獨憐士衡呼不醒鱸魚斫鱠新釀美坐客有無杯不停逃生十年聊自足不知蘇臺有麋鹿大明赫赫照中天東風送我還鄉船昏鴉占盡故林樹老鶴孤飛無宿處東門種𤓰官道邊莵裘擇隣遷復遷大兒横山薜蘿屋小兒東洲稊稗田耕桑汲汲飬吾老晨昏定省俱舎旃每逢暑月多晝眠小牕看竹風泠然風來扇枕竹罄折使人若見黄童賢窮快活年近百懐哉古君子鐵面金榜客知巳宜有報終身竟無策作詩示我子若孫勿言儒冠多悞身讀書萬巻百忙底當時杜老乃云云人生茍不識義理馬牛襟裾真可恥銅山餓死黄帽郎莫信有錢能使鬼吾今兩眼暗如漆尚喜一襟澄似水曾聞聖人言孜孜斃方巳家僮荷􅓩好相随速埋願與劉伶比黄茅嶺畔青松宅松聲為我鳴緑綺更莫用伽佗歩虚汚吾耳寄小齋劉先生延陵季子耕田處太乙老人藜焰明動筆即摛蒼頡字著書重草太𤣥經古苔門巷車無轍修竹堂堦夏亦清一别數年三舎近斗城猶望聚文星簡張道履代蔣以誠作虚名不託爛柯仙斫雪青山十五年一曲樵歌人未識瑶城江上獨先傳二客來東里遇炎霜老却瓊林樹一章頼有麟膠絃可接焦桐流水發鏗鏘三雞林近有賈人來不向何樓買襪材坐待春風吹鐵笛筆端還有鐵花開寄宜興教諭人言陽羡溪山好溪山好處能多少山無猛獸水無蛟且喜只今逢盛朝竹姑堪入風土記茶歌可比康衢謡黌宫倚長橋髙堂鳴講鼓新除學官教雨滂坐令巖邑成鄒魯老夫憶昨覩星凰别來隔邑遥相望山如硯屏空翠濕溪作墨池流水香火星西流拂新日蓐收行秋掃餘熱堂堦滿地落槐花衿佩詵詵立黄雪鄉無三害風俗美賓興名賢天子喜予有一言請試聽丹梯拾級徐徐升地因人勝地必靈邑里草生書帶青鄭康成齊令名思賢録元末為宋先賢鄒忠公祠墓而作也洪武壬戌㑹崑山王仲昭語及之慨然有鏤板之意後果如其言蘭初意凡遇郡守及府教到任各送一部庻有所觀感而不廢其祭掃之禮焉今蘭於埀死之秋追念疇昔乃口占以抒其情曰故人家住千墩麓為儂版刻思賢録祗縁見説道鄉翁傳道程門能慎獨刻書未了謫炎荒寄聲龜巢事宜速乃將楮幣折青蚨七萬五千錢數足不要譽不求福髙義景前修遺風振頽俗惜哉時無鍾子期聽我焦桐彈此曲性存真公以南泉鈯斧入天寧天叢社猶附庸也龜巢老人作歌以送之歌曰吾聞西方教無相無住著單提了無礙羣居亦同樂大林新法幢天寧古道塲屋皆雲半間庭各月一方不縛肚上篾不舐瓣頭蜜何以飬幼軀自種還自喫􅂿翻生死海坐斷聞思修獨園銀杏樹應作石㸃頭寄南京僧綱和尚去年同看中秋月東閣開牕夜賦詩閣下桂花無恙否秋風又到去年時八月旦辛易齋書來知耕學袁先生客死秣陵以詩哭之吳門山水隔陳雷魚鴈依然數徃來秋晚書題霜後橘歲寒詩寄隴頭梅但知抱道貧非病豈料生兒禍有胎嗟我淚從枯眼出秋風遥灑鳳凰臺感物眼昏不見中秋月疑是重雲障碧天眠到夜深方自省莎雞鳴我枕頭邊二廣寒宫闕吳剛斧桂子天香總浪傳古意正須人黙識華峰絶頂藕如船三青蠅盡集汚衣巾白鳥雷鳴夜噆人安得天教生處樂百蟲俱蟄四時春秋興七首臺笠朝京天下同楓宸頒賞不論功人材列郡三英粲歲事連年百榖豐村鼓鼕鼕喧社日酒旗獵獵舞秋風螭坳誰秉春秋筆為祝皇家紀治隆二凉飈微起早秋初炎宇蠅蚊未盡除厯代興亡聽燕子幾家慈孝學烏雛面皮寧受人人唾頭髪還教日日梳堪笑六經俱忘却夢中猶讀啟蒙書三大暑方徂火始流絺衣遽易木綿裘穹林木落風猶怒破屋茅飛雨未休虎豹九闗冠有豸華夷一統佩無牛願言耕鑿終吾老老瓦盆邊擊壤謳四疇昔愁聞爛石歌并愁無地避干戈如今喜有清河頌更喜横山得薜蘿旅鴈帶人家信至霜楓似我老顔酡紛紛紅紫時為貴老圃黄花變易多五矮牕兀坐􅈸擡頭劍氣依然射斗牛石作丈人渠自拜木稱居士我何求看花儘有長安馬横渡渾無野水舟尊酒欲論今古意叔牙何日過林邱六橙搗金虀紫蠏烹客車投轄坐飛觥一時酒興兼詩興半夜風聲雜雨聲人事盡随髙下手世情多作短長檠賣薪童子歸來晚但説街頭酒價平七花巢老我穴藏龜幸爾餘生際盛時九土方輿歸禹貢三農風物在豳詩蝸粘壁上涎何竭草出山中志不移獨有緇黄畏覊束遷居城郭半攅睂周可大新充糧長千里長江萬斛船飛芻輓粟上青天田家歲晚柴門閉熟讀天朝大誥編二租吏毋勞夜打門桃源風景烈塘村好將擊壤歌中意寫作丹青獻至尊初度言懐并序昔人以大塊勞我以生佚以老息以死令吾勞且佚者三萬餘日息之宜矣天教兩目電無光百物無勞覻短長大塊今朝能息我奚奴便作輓歌郎二周詩并序横山謝老過烈塘而作感今思昔掛一漏萬以元吉可大為周之白眉使先過目轉示族人大意念先世一邱之土望為保障至如吾族之微意在言外聞之者亦必有感於斯時洪武二十四年十二月朔日也東西二周烈塘曲世與吾家鼎三足東周阿婆吾女兄西周阿婆吾女叔百年世事一再變遼鶴歸來無處宿蝦蟆之陵幸然在煙慘雲悽寒篠緑吾祖汝曹尊外翁數塜纍纍列昭穆年年梨雪落清明藐予來作孤猿哭周宗奕葉半憔悴遑恤蕭條渭陽旌東枝只今春意多西枝亦復花如簇有能啣土學義烏無患觸松來野鹿篤親茍不負前言髙誼真堪振頽俗莫云古道獨行難天將照汝光明燭示二子自烈塘還横山而作也曾子曰人之將死其言也善吾於此亦云羲皇未造書契先二五渾淪無可甄勲華繼羲立人極三代典禮星日懸人之有生必有死飬生送死理宜然一從楊墨至聃釋異端邪説多􅆾愆我生頼以讀書力破浪㠶我中流船蒼頭荷鍤日随我死即埋我横山前毋勞沙門送作佛毋勞羽客送登仙漆燈不必照長夜宰樹不須纒紙錢椒漿或酹寒食雨麥飯或灑清明煙謝莊西頭烈塘口髙曾祖禰上留田年來岸谷復變改𤓰瓞幸爾猶綿綿微如豺􅆩知報本汝曹慎毋忘所天賀西傳和尚為僧司副綱大鈞巍巍立人極緇流亦須方寸赤選佛塲中選厥官提挈綱維揮判筆龜巢老人盲且痃刮眼欲覔黄金篦黄河水清一快覩更看鉢羅開盛時崑山辛彬甫夏初以人才見上奉㫖還家教諸生讀大誥限以十二月五日師生赴御前試讀如期而徃受賞而歸蘭甚以為喜作是詩賀之白袍鵠立簉鵷行青佩鳬趨被寵光大誥三編建瓴水春風兩袖御爐香賜金堪比燕臺聘抱玉仍歸卞匵藏試看明年書帶草崑山多似鄭公鄉長洲劉衡來云無錫徐伯樞縣丞重過衍慶院有詩題壁予乃次韻叙别并寄題膠山幽居各一首朝陽鸞鳳失巢時偶集叢林枳棘枝坐客一氊曾吐酒過橋三笑共哦詩長洲茂苑多年别野水孤舟到處移重掬清流弄明月秋風禪榻鬢絲埀二西日長安多看花東膠故邱今種𤓰問奇每却人送酒飬老喜有兒當家一雜清氣比肩少七言長詩適興賖暖香不爇古銅鼎雪梅應作先春花送丁敬止擕室人奉母徃西流乃翁寓所完聚風雨舟車渉路難爺娘妻子聚團欒七千里外桑蓬老十二時中菽水歡楊栁小詞聊送别葡萄斗酒莫求官過庭煩説龜巢老新結松蘿亦問安代簡荅陳子章先生屋山日髙三丈餘盲翁負暄頭不梳客來長揖道傳語宛丘先生今寄書開緘為我一再讀闕雞壇歃血闔閭城三十六年如信宿象賢無人固可吁玉潤之壻亦可娛韓子文章妙天下李漢掇拾無遺珠嗟予經鉏付中子書田未熟身先萎孫枝一剪一飄零戎服西川八千里阿翁倀倀無所之况聞路難多蒺藜閉門縮首如凍龜堕甑不顧從人嗤大兒力田供菽水小兒蒸嘗伯為禰此身幸無寒與饑祗欲全歸未能爾每憶梁溪邂逅時買花載酒留人嬉元龍豪氣除未盡傷春猶賦杜鵑詩一别十年今若此此去浮生知有幾車輪從教生四角是非毋勞辨三耳峩峩陽山煙樹緑皎皎白駒在空谷太湖流水清於玉雲影天光常在目焦桐絃斷麟膠續彈我風雩詠歸曲詩筒不時頻徃復要見珠璣咳唾琅玕腹彼此相看如鮑叔和鄒士文與陳子莊㑹飲不談黄老不談僧不憶鱸魚似季鷹行到故人清絶處今人能有幾人曾水獺氊帽代曹元度作蠻溪水獺雪毛氊帽屋蒙戎載渾天濡首墨池頻脫去不妨草聖繼張顛林塘幽為鄒士文賦林塘幽在何許梁溪之東五十里宛若浣花流水西頭住滄洲繚繞白鷗沙青山隔斷紅塵路幽棲人似鹿門龎畊耘特欠妻孥助清時固難遇生處聊自樂閭巷絶車馬堦庭可羅雀門前芳草不教鉏㸑下焦桐亦髙閣排衙不聞官舍鼓抱闗那知兵戍柝催科吏不打吾門知我家無田負郭穿窬盗不入吾室知我帑無金可摸烏衣喜得客居安黄耳且無家信惡愛詩愛酒愛親朋此外物情俱澹泊鄉來無鍚山中泉潺潺日夜流青鉛三吳化作百戰地草木血腥人亦然殘山剰水本落寞地因人勝佳名傳老夫獨恨傾蓋晚枕書方作邊韶眠清晨曹劌過空谷一鼓撼我龜巢邊時余春秋九十有六年訪人嬾上山隂船卧游賦此林塘篇謝府學教授縣學沈訓導見訪杏壇遺曲三千齡彈與龜巢老子聽頼有青松知曲意掀髯為我舞堦庭二㶚橋詩客蹇驢䭾同策吟鞭過薜蘿老病送迎門不出楊花飛雪奈寒何别後數日知途中值雨再此謝不能固留鄰家借酒過墻頭楓火新鑚且易裘風雨不留佳客住溪山應為老夫羞一氊冷暖忘木榻四月清和值麥秋珍重沈腰圍革帶先鞭何日上瀛洲詠懐詩奉府縣訓導早年豪氣慕元龍人日窮途作嗣宗夢斷春風金騕褭情鍾秋水玉芙蓉春秋魚魯渾多誤河洛圖書豈易逢四海弟兄頭白少懐哉澗底有青松寄樵海教授老先生洎諸故人室移縣罄三家墅身作爬沙六日蟾生死固知天已定盲聾可奈日相兼桃花笑我頻辭酒燕子嗔人不捲簾吳下友朋春夢裏休官多喜似陶潛寄集公詢公二講主吾聞西方教教人無住著桑下一宿去信步恐顛錯嘉爾兩尊者髙風素相若出世扶法幢功成竟忘却掃除煩惱魔灑脱禪律縛不随法華轉亦不觀日落千墩片雲間卧遊當行脚日來崑山縣山靈有佳客欣然為彈指又見此樓閣人皆時乎時我亦樂其樂老夫數年别每憶霞上作含吐海潮音因風寄寥廓寄陳明逺兄弟先世多遺澤清風並絶塵門前馳驛路林下讀書人龍澤靈湫古牛臺佛樹新盲翁飛不去徒憶外家親懐辛至善通江橋下别小海醉中聽玩世頭俱白逢人眼共青溪山三舎隔風雨百花零頼有忘憂物千錢一巨瓶素醍醐楚江萍實本烏有童謡浪出詞人口社園菜根非不佳老饕可奈無齒牙世傳淮南豆為腐山僧野人嘗厭飫誰信窮居寂寞濱街頭買來如八珍金莖無露石無髄眼前蔑物堪為比吾兒捧持供老親乳姑何異唐夫人我非曾晳嗜羊棗樂與曾元同一飽澹而不厭知者誰中庸君子古來稀腐兮腐兮能飬老濟世之功不為小淮南此術昔未傳食貨志中斯闕然前時雍公賛三徳吾亦題詩三太息易名今號素醍醐諸庖易牙僉曰都次韻荅臧尚廸先生見贈延陵野唱風吹去曲誤誰知顧且聽湖海卧遊春晝靜一簾花雨集中庭二生兒喜有凌雲志補屋能牽帶雨蘿春水自流魚自樂笑人濠上說無何又荅毛伯尚白石南山無復爛朱絃流水正堪聽斗城東北柴桑里書屋三間草一庭二嘉木天生古橋梓故山月照舊藤蘿壽觥頻捧梨花酒莫問東欄事若何憶昔行憶昔父子生别離濠梁流血人正苦一聲哭斷九廻腸化作瘴煙生阿堵當時見而知者誰西門橋畔栁攅眉從兹失却巖下電欲送孤鴻煙障迷天教兒歸飬郎罷一語不聞相慰藉有時摸索案頭書手澤未乾多羽化去年秋初至今日白日青天闇如漆下牀寸歩莫能移食飲不分朝與夕蒼天蒼天宜蒙見憐早入鬼録如令登仙區區有一語請與親朋言生兒可愛儘教愛留取眼光終暮年楊文靖公祠堂詩立雪程門道學傳東南𤓰瓞遂緜緜置身方到賢闗地隻手將扶杞國天豺虎跳梁非偶爾鳶魚飛躍自悠然常州舊宅今焦土宜有蒸嘗似昔年送垣戍蜀屯所七千餘里孫屯田九十六歲翁勉旃人心堅與鐵石比天眼明如日月懸赤甲山川皆勝境黄雲壠畆正豐年漆燈照我青松宅别後全歸日宴然即事簡臧尚廸毛伯尚噫吁戲痴翁百拙盲兩眸好古之人念不休睠言文靖祠舊在城東頭桑田為海岸為谷祠亦化作濟河伐楚之焚舟文靖早從伊洛一𣲖東南流時方薦賢㧞其尤遽從天上落常州至今羮牆間儀型見前修移文宜託北山靈作室祀我東家邱二人同厥心衆毛成此裘冠冕斯文黼黻皇猷光生劍井衝斗牛照人駿奔蘋藻羞鳳兮鳳兮兩悠悠一鳴三千秋昔聞吳興沈東林隠居收書散黄金長洲同姓今好古散金收書同厥心老夫書痴年近百尚欲傍蒐二三策客來説項似楊源又說識韓如李白孫枝璀璨珊瑚樹襟度汪洋雲夢澤區區瓣香客懐去借書數篇謄竹素髙人若問欲何為欲使迷途人快覩天倫道在科斗編朝聞夕死勝登仙譬若丹梯借我升華顛秘籍移來鄉井傳饑渇可療疾可痊藕絲織縑顔色鮮孤寒總得衣褊􅝆客歸為我謝一言隂徳濟人知者天寄呈崑山縣學訓導崑山學舎玉峰前玉氣氤氲暖坐氊弦誦聲中和樂意浴沂童冠莫春天二一株銀杏倚齋廬長夏清風喜穆如試問西湖林處士梅花誰與歲寒居三鄴架牙籖古典多桑公鐵硯少年磨借書莫笑人痴絶矻矻編蒲老薜蘿屯田歌衣布襦食菑畬服勤犂與鉏三餘渉獵兵農書惜居諸範馳驅秋風渥洼千里駒時來躡雲衢道旁語盲翁坐南簷炙背日將午兩耳未全聾猶聞道旁語一言賢郡守愛民若慈父一言江隂丞心若秦鏡古鮑老本郎當不覺䨇袖舞安得普天下州縣皆樂土人無笑中刀物無射工弩不憂歲年晚不畏冰雪苦春從天上來百草沐膏雨新新堂猗歟隱君子城市山林靜方寸秉彞天皎若古秦鏡妍媸照人面肝膽見人病朝朝頻拂拭麈尾犀角柄秋風塵自多不到靈臺境湯盤九字銘宜加日三省椿萱堂將軍大樹從錦纒髙堂椿萱香藹然昔椿夀閲八千歲今萱徳薫三百篇分甘穉孫遶膝下承歡萊子舞堦前雙親之樂有如此虎頭應作畫圖傳上李太守龜山先生之學伊洛傳道鄉先生與比肩熊魚慎獨各有省同在中庸書一篇後來出處固不同晚復同此終餘年當時州人買田宅楊乃宅居鄒贍田百年世變厄兵燹宅為焦土田荒煙府公去春下車日蘭以缺典曾敷宣還家薦欲去專對目盲耳聾身莫前願言一祠尊兩賢巋曾若魯靈光然斧工毋勞巧節棁畫史亦勿丹青妍滆湖挹水注罍爵泮池采藻供豆籩風行四邑草必偃續成三考蒲無鞭斯文熾而昌劍井光燭天瑶琴斷絃續金榜三魁懸甘棠遺愛歲百千不須龜趺石立如峴巔邦人去思肝膽鐫老蠶老蠶不眠食日夜作繭忙繭成上繰車雪色藕絲香埀衣美紱冕在上供皇王衣被普天下其功實難量蜘蛛巧如之結網能髙張蠛蠓可欺者羅致日充腸予生勉續學歲閲九十霜為蠶不為蛛賦善頼彼蒼雖無黄絹辭斐然成厥章小則效裨補大以繫綱常制度苟無違尺短寸有長願言後之人緒餘毋或忘負暄峩峩芳茂山為我遮朔風南陸日杲杲南簷暖融融盤飱豆粥輭箕踞藳席重追思古羲皇首出開鴻蒙宫居食而衣生民藉軒農勲華教明倫三代禮樂隆尼山集大成斯文萬世宗蘭也幸知此不與禽獸同年紀近百歲心源猶四通三字四字句經訓授蒙童七言五言詩大音鳴寸𠂻時無雞窠兒自號龜巢翁負暄樂如此人言少如儂儂亦自知足作詩謝天公代簡髙彦述長安道上人如蟻恬澹齋中香自凝金匱早傳先世業玉樞誰授道家經梅花立雪應含笑麯糵流霞可解酲莫訝盲翁詩永訣又從追蠡一撞莛懐詹蘿屋烏石岡頭送上船黄楊厄閏又三年煙蘿小隠三家墅霜稻豐收負郭田置酒待賓常撃缶買書教子不論錢盲翁恨不能飛去永别歸來赴九泉和遊大林菴韻石頭數里横山路丹井多年羽士家聖代重開新宇宙禪林乃易舊煙霞沿堦細草龜毛緑䕶竹踈籬象眼斜更有庭前松柏樹潮音也似學楞伽龜巢稿巻十七
