front:
  text: 官胸襟貯萬巻書文章揮五色筆頻年花縣絃歌之化大行今日薇垣贊畫之才方展王公大人以青眼相顧縉紳先生以白眉見稱兹泛緑以依紅將腰金而曳紫一節旣全其清白深憂當念乎羣黎願為龍伯髙勿效杜季良恪守祖傳之家法近舍皇甫湜遠取白居易當求世用之人才跂予望之自此升矣某遠逃兵燹久客句呉秋菊寒泉祠甫里見尊賢之義長洲茂苑頌鄉校勒輿人之言己曽和白雪之詞但未覩景星之快由村落每來城府知軍民多困飢寒敢用條陳以效芹獻于以開難發之口于以推不忍之心區區非釣于虚名懇懇必求其實效蒼生顚厓受辛苦隔羣仙天上清髙大芘廣厦俱歡顔願比屋眼前突兀
