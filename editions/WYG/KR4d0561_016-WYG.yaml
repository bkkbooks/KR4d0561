body:
  text: 代謝沈太守啟一輪明月清輝今照蘇州萬里長風素志乃如宗慤念先人之遺澤挈孤子于長途知幸自天感恩無地恭惟某官乾坤清氣風雲壯懷既不忘向日之誠且深識隨時之義往年烏府冠峩鹿角之威此日黄堂庭蔑䑕牙之訟退食則斑衣以娯父母傳家則黄巻以授兒孫鞭不施蒲莊先種柳愷悌咸稱召杜勲名必到蕭曹三江五湖之風謡政聲藹藹四海八荒之霖雨輿望懸懸遺愛甘棠流芳汗竹如某者仰依公庇勉讀父書既己承薦鶚之章當不負愛烏之及偹葠苓于藥籠作桃李于公門庻竭駑材以圖豹變父為大夫子為士賴提携發軔之初車如流水馬如龍願追逐後塵之末其為報効罔既敷宣上沈太守啟太叔為鄭大夫始從寛而終猛不疑謁暴公子先言威而後恩惟大海不擇細流庻他山可以攻玉請以田夫野老之語陳於大人君子之前切以某近寓吳江昨經荒浦聞近日有䑕竊狗偷之軰在各都如蜂屯蟻聚之多始則穿窬終為强禦忽忽乎神出鬼沒累累然晝伏夜行星月光中窺商賈他鄉之客烟波深處伺妻孥逃難之人或如斫嚴顔之頭或若斷孤兒之臂横屍洲渚流血泥沙遺臭熏天銜哀入地掩鼻而過者多矣垂泣而道者誰與鄉隣懼而不言州縣置之不問致令滋蔓轉肆兇頑目之所覩者如此其多耳之未聞者尤為不少新鬼煩寃舊鬼哭痛恨難忘他生未卜此生休𠂻情誰訴惟當路發神明之政為斯民雪冥漠之寃三尺法申明舊章五色棒掃除羣醜寛猛相濟不勞用萑澤之兵恩威並行何待持繡衣之斧一雷既震百蟄皆驚恭惟某官俊傑識時精忠貫日清氷出萬壑此往年烏府威聲明月照蘇州乃今日虎丘嘉話甘棠樹聽召南之訟老萊衣照堂上之親愛民若拙于征科下士能勤于吐握五花馬金章紫綬方被殊恩六柳莊綠水青山未容髙興政湏治最以候登庸如某者幸獲承顔甚慚饒舌聞而來見而去仰山斗之彌髙道以政齊以刑看民風之丕變上梅知州陸同知啟稂莠不除必有傷于嘉穀盜賊不息寧無害于良民目前事可為寒心林下人敢云饒舌俯慚卑陋上瀆髙明切以某為客松陵􅋈舟荒浦聞近日有鼠竊狗偷之輩在各鄉如蜂屯蟻聚之多或穿墉以踰垣或發匱以胠篋或牽去春耕之犢或移人夜泊之舟或刼行商囊槖為之席捲或因逃難妻孥與之偕亡或如斫嚴顔之頭或若斷孤兒之臂慘星月見遭毒手渺烟波逸去兇身濺血菰蒲伏屍洲渚漂流于五都十都之境臭腐于六月七月之時里正不敢言恐煩檢覆鄉隣寂無語懼有干連致使跳梁轉加延蔓天隂雨濕但聞寃鬼之聲水遠山長渾是愁人之境惡貫既滿禁網難逃今有司獲盜竊之徒宜因事䆒㓙强之黨幸毋姑息亟賜施行轟雷霆于掩耳之先照日月于覆盆之下追三窟兎須旁求曲徑之踪殺兩頭蛇方能免後人之患餘罪戾之輕者加徒役而遠焉庻令涇渭殊流不使薫蕕同器蓋治此非常之盜必加以非常之刑雪痛怨于黄泉聽歌謡于綠野恭惟某官某官同心同德無黨無偏各守一亷氷其清而玉其白咸稱二美絃之直而鏡之明閭閻蒙撫字之恩案牘絶煩苛之弊訟庭如水印匣生塵明月清風蹔爾居淞江太湖之上髙牙大纛翩然到鸞臺鳯閣之間人皆仰之自此升矣如某者言雖僣越事實昭彰秪縁以兎死狐悲未免較鶴長鳬短溺猶己溺望明公擴仁愛之心刑期無刑變惡黨為淳良之俗幽明有感贊美奚殫代上江浙丞相求䕃叙啟上書伏光範門韓愈以布衣自進斗酒酌新豐市馬周于逆旅誰知仰止三台素非一日惟吐哺握髪以下士敢披肝瀝膽以陳情切念某生毘陵錫谷之墟客呉郡長洲之滸早年勤苦頗讀父書連嵗孤哀且罹兵燹竄妻孥于荆棘揮涕泗于蓼莪學弓為箕學冶為裘尚賴傳家之業在無父何怙無母何恃孰憐逰子之歸遲望西日於長安歎南風之不競欝欝居此遑遑何之芰為衣蓉為裳忍飢忘溝壑之憂闕苐慚没世而無聞有負先人之遺澤欲求䕃叙願借恩光雖云匪麟角鳯觜之竒亦庻幾竹頭木屑之用持衡留藻鑑天書適降于九重隨水上龍門桃浪可乗于三級鯤鯨變化鵷鷺翺翔兹蓋伏遇某官簡在帝心股肱王室保江浙數州之地障東南半壁之天以和靜鎮國家量同文靖有忠勲塞天地爵比汾陽公門之桃李欣榮藥籠之參苓並蓄五風十雨頻年見隂陽調爕之功寸地尺天指日復疆里廣輪之舊恩加衮舄銘在鼎彛如某者幸獲瞻依宜蒙㧞擢大木為杗細木為桷良工得國用之宜南山有臺北山有萊君子致太平之樂永言報効盡力驅馳賀上海石縣尹啟郎官應列宿方照臨滄海之秋鴻毛遇順風乃奮起青雲之日敬陳賀語兼進忠言嘗觀時有盛衰道無今古為國者必以人民為本有司者必以父母為心擾攘雖値于難時撫治合由于古道簡編所載榘矱具存曰既庻既富而教之曰足食足兵而信矣曰孝弟可以盡堯舜之道曰忠信可以撻秦楚之兵惟教道能結其心斯奮發以盡其力小而一邑大而九州是道為農桑學校之原其事乃錢穀甲兵之屬茍一日而必葺庻三年而有成倘不鄙常談老生斯可謂知言君子某官心存愷悌氣禀髙明先世稱萬石君其道義傳家之久今官為百里宰蓋功名發軔之初以胸中所藴之詩書為目下可行之政事征科不廢撫字尤勤仁風藹田野如春民無愁歎明月照閭閻似水吏絶喧囂釜魚之聲譽己聞堂鱣之禎祥必應行書上考竚見髙遷某幸辱故知喜聞新政彼客燕皆能賀履豈窮猿獨不投林東入海西去秦擬欲依棲于贊老昔無襦今有袴願同歌詠于呉儂諸士友陳言陸同知誣枉事啟排難解紛竊慕古人之髙義舉直錯枉宜蒙當道之至公芻蕘有言菲葑可采切見呉江州同知陸某職居佐貳政出循良三載守官一亷如水自許以赤心報國人皆知洗手奉公不聽誅求因結仇于軍帥不隨偏黨或見忌于官僚豈意權豪乃加排䧟以兵戍千有司之政以文移行無妄之灾舁一夫病死身屍勒其子巧生詞訟集衆擁停屍之地環若重圍當官逼仵作之人傷皆誣騐强梁若此毒害顯然越官職以横行違憲章而不顧各州縣聞之而䘮胆諸士民覩此以寒心赫然恣逞其㓙威甚矣有傷于治體是可忍也尚何言哉仰惟上相之賢明俯察本官之寃枉照覆盆之日月即見昭彰遏平地之風波毋令䧟溺如某等與本官初無私愛且隔隣封聞一州有頼其主張知百姓多蒙其恩惠昔頌德于三江五湖之上今稱寃于萬口一辭之間其言至公而無私所願抑强而扶弱直為壯曲為老當明曲直之情危而持顚而扶庻免顚危之辱宜加采擇特賜施行上量田徐孟二公啟立國以經界為先當盡革其中之弊生民以耕稼為本方能供在上之需惟任用之得人乃公勤而稱職欲陳梗槩敢效芹誠嘗謂朝廷革命之初才俊為時而出凡所以體國經野皆可以忠君愛民况皇家付尺度之公要農畝定租庸之法甲是乙非者固當分辨鶴長鳬短者尤宜折𠂻為前代除毒歛之蛇免後人為涸轍之鮒此當務之為急其任非輕但至公而無私所行必達某官同心同德無黨無偏志如百鍊之鋼不為繞指事若重調之瑟能用改絃雖寸田尺宅皆入版圖而賸水殘山猶蒙紀錄田野既揚其聲譽銓衡必錄其勤勞同升諸公一臺二妙某生本常郡寓此呉鄉如去邠而居岐敢因徐而見孟願求荒圃學為老農春雨一犁駕烏犍而東作青雲萬里看黄鵠之䨇飛上王知府啟玉門闗兩髩秋風歸來晚景金斗城一輪明月喜把清輝人皆作來暮之歌我欲快爭先之覩騎竹失隨于童子杖藜敢謁于大人既獲披雲亦言獻曝嘗謂農桑者民生衣食之本學校者國家風化之原其在有司亶為急務睠此常郡即古延陵二十年兵革以來數百里人烟欲絶犁鉏不作絃誦無聞大田皆變為荆榛泮宮亦燬為瓦礫今天下全歸于大統而郡中方集其遺氓如谷寒而鄒律重嘘若絃斷而麟膠再續農何以勸惟恤民則民乃力農學何以興惟重士則士皆志學嚴一鼓以作氣必三年而有成田野辟而賦税増教化行而習俗美上以副聖天子明詔之意下以著賢邦侯善治之功斯文黼黻于皇猷舉世甄陶于清化渤海郡勸農龔遂復見于今成都府興學文翁㒺專于昔茍二端之並舉則百廢之俱興幸無謂老生常談眞可與古人同傳某官三槐世胄五馬恩榮金莖露之澄清玉壺氷之潔白有民人有社稷雅稱宏才為保障為繭絲㑹能兼美飽夙學於胸次急先務于目前報主赤心待士青眼吐握行周公之禮謙德彌光循良希漢吏之賢芳名不朽如某者幸然歸魯得此依劉三十年辛勤有廬勉欲訓城南之子千萬間突兀廣厦願蒙庇天下之寒頌禱有餘敷宣㒺既謝孫大雅惠詩文啟寄杜甫題草堂舉世誦高公之句送李愿歸盤谷至今傳韓子之文葢詞章誠有可嘉則名譽皆為不朽感承傑作敬叙謝言某生長延陵本同鄉土僑居呉郡俱避風塵既聲跡之相聞且音問之不絶千萬人之前常曽説項十五年之内惟欠識荆嘗結巢為蓮葉之龜來詩甚美至還家若華表之鶴得序尤榮顧余生非李杜之儔眎所作乃髙韓之比陽春寡和明月暗投巾箱謹于珍藏棐几時乎圭復想風采于氛埃之外見肺肝於文字之間投桃報瓊兹抒情于尺素如葭倚玉别請教於丈函某官以申浦之澄清鍾于姿禀以君山之蒼古發于文章驅馳莊騷出入佛老鳴教鐸中呉者久投朝簮東海之濵枕流潄石而有祖風弄月吟風而忘世慮山中厯日閲黄楊厄閏之年天上春風待紅杏倚雲之日如某者素慚孤陋雅愛交逰味六經如嗜膏粱親三益便成膠漆江東暮雲之酒願與論文山隂雪夜之舟尚期乘興雷門持鼔郢匠揮斤謝張雲門作詩序啟名紳字士行齊郡人魯直獻東坡二詩葢欲見瞻依之志士安敘左冲三賦方能無非議之辭葢當世之鴻儒乃後學之龜鑑寸丹方感尺素具陳伏念某田野草茅山林樗櫟不揣鉛刀之鈍常持鐵硯之堅鮎上竹竿往嵗之功名可笑龜巢蓮葉近年之身世如浮八九家寂寞江村三千文蕭騷白髪出言爛熟作事迂踈寤疑辨惑以成編懷古思賢而有錄頹然詩癖忘乃途窮時抱膝為梁甫吟或掩鼻作洛生詠對明月清風而思元度藴髙山流水以待鍾期持鼓雷門探珠驪頷得警策片言而為幸豈㫪容大篇之敢望珠璧暗投璚瑶匪報不識面而知肺腑可謂神交如冩容而見精神珍藏手蹟披雲未遂仰斗彌髙恭惟某官四海儒宗一門科第為時而出不勝烏鳥之情謝病而歸非為鱸魚之美以東呉之山水為西漢之文章託古意于焦桐播遺芳于叢桂風月襟懷江湖性氣本磊落之竒才烟霞痼疾泉石膏肓享優㳺之清福道則髙矣人皆仰之如某者敢不佩服斯文勉旃爾力敝甚千金之帚榮哉一字之褒廢繩墨不為拙工灼見用春秋之筆經品題便作佳士惟恐孤月旦之評瞻望依依臨書草草擬與金壇縣告索尹氏寄書啟賣金買書自是平生之志刻舟求劍難忘眷戀之情雖呉霜己白其頭顱惟秦鏡能明其肝胆敬持尺素用寫寸丹切念某避地曩年泛湖連日移舟至尹干橋下依乃姻家藏書如孔氏壁中扄諸奥室物宜多矣人皆見之十三年賤跡飄蓬數百巻常懷汗竹豈知𤓰葛乃變薫蕕以諸史之青編易兩牽之黄犢餘存簡牘悉入巾箱屢云還合浦之珠竟不返連城之璧朝經暮史欲重對于聖賢甲是乙非合辨明于官府是可忍孰不可忍求之與抑與之與惟當道之至公庻斯文之不墜聽其言也適我願兮某官承恩九重出宰百里廼氷其清廼玉其白如絃之直如鏡之明以識時俊傑之才了積年繁劇之事戴星出入雙鳬暫止于金沙摶風扶揺孤鳯必巢于阿閣某遠來隣邑如倚太山鶴溪水天影涵秋比琴堂之清澈米家船虹光映日載書簏以還歸擬謝常州府官啟曽參以同姓殺人其母嘗投杼而走黔易非在家遘疾厥子乃驚心而歸奈何事出于隣封馴致弊生于本邑幸大府能為辨析今㣲言合用敷陳切念某乙老窮居若守株于横峴丁男逺出因負米于荆溪叠叠乎縣帖拘追纍纍乎里人被執爰自三月三修禊之日皂𨽻登門遂令八十八老耄之年倉皇赴縣換名字如雲翻雨覆動文移則雷厲風飛䧟穽欲成網羅交設南阮貧北阮富姓雖同而産業不同東家智西家愚人有異而鄉閭亦異故奔訴甘棠之下蒙戒懲刻木之徒號咷徹乎二天枉屈為之一雪伏遇某官等同宣聖化並著仁聲召父杜母之慈祥春濡雨露礬弟梅兄之清白月映氷霜閭閻響擊壤之歌城郭寢抱關之柝行書上考佇徯髙遷如某者父子知恩鄉隣感德覆蕉藏鹿本無夣于前時縁木求魚免受灾于後日報當銜結力効驅馳上周縣尹請祭顧將軍啟孔北海表鄭公鄉人皆起敬文潞公題明道墓學者知歸葢追敬于儒先實有裨于風化敢持尺牘用徹琴堂某老不趨時心猶好古覽中呉之勝槩訪前代之名賢笠澤西頭皇天蕩烟波相接葑門東畔顧將軍邱壠猶存叢祠倚馬鬛之封荒蘚没龜趺之石每經此地常念斯人生為呉相之孫死有元公之諡華亭二陸初齊名得三俊之稱白羽一麾獨仗義平六州之亂晋史備書其勲業呉儂尚保其祠塋但每嵗之烝嘗欠有司之籩豆不揣效豐干饒舌敢云煩陶令折腰蘋蘩矢薦于鬼神桑梓愈加其恭敬此非違道以干譽幸不以人而廢言恭惟某官以董賈之才為卓魯之政乃氷其清乃玉其白如絃之直如鏡之明見義勇為當仁不讓有民人有社稷國家委任之隆教禮樂教詩書流化承宣之急行書上考竚見髙遷某飄泊長洲蕭條短褐投老二天之下知名兩月之間其言至公而無私其事似緩而實急生芻一束其人如玉望喬仙雙舄之鳬寒鴉數㸃流水孤村弔華表千年之鶴干陳敬初先生作懷古錄序啟懷賢千古聊綴緝夫前言借重一辭庻流傳於後世切有請也能無從乎睠我楚狂久客呉下過鳯凰山顧彦先之墓有感而傷情傾鸚鵡杯李太白之詩長歌而擊節甚矣疾薫蕕同器忍乎隨桃李不言豆籩既請于有司丹青乃新其遺廟屏除妖塜祭掃佳城搢紳皆為之詠歌樵牧則嚴于禁約載嘘藜燄用寫蒲編于以發幽潜之光于以紀廢興之事過雷門持布鼓敢曵長裾抉雲漢分天章煩揮健筆某居玉堂之署人慕登瀛紬石室之書自當名世為士林冠冕演王國絲綸目短曹劉汗流籍湜大鵬九萬里方當直上之秋黄河三千年㑹見重清之日前程逺大吾道光榮某不揣迂疎尚希題品書八篇因窮而著初不效于古人賦三都得叙而傳尚有望于今日代上饒叅政啟叔向知鬷蔑因聞堂下之言毛遂從平原乃脱囊中之頴既古人有如此者豈今日獨不然乎切念某幼讀父書從逰都邑聞所聞見所見囿先生長者之鈞陶歩亦歩趨亦趨習王公大人之規矩辭親日下捧檄浙東干戈擾攘者閲五六年鞍馬驅馳者知幾千里及區區益升斗之禄又紛紛服州縣之勞栖枳棘于慈溪望蓬萊于滄海既失怙恃遂用來歸兄弟飄零狀若䘮家之狗功名蹭蹬誰憐失水之魚然此膝不屈于常人而其志敢忘于斯世家徒四壁壯氣横秋但知讀書以聖賢為師未嘗出門與俗流為伍髙山流水頼有知音明月夜光忍令投暗鷙鶚之書既作鯤鵬之化何疑惟大匠無可弃之才宜小草有相依之志葠苓藥籠桃李公門恭惟某官俊傑識時耿介㧞俗隴雲可悦己嘗似山中宰相之閒仁風載揚今復慰天下蒼生之望胷次炯玉壺氷露文章埀金薤琳琅借箸而籌入則告嘉謀于公府累茵而坐出則叅大政于薇垣己立立人先覺覺後行吾道于干戈之際救斯民于塗炭之中幾千仭廬山者衆人所仰五百年名世者非公而誰如某者慕藺許年依劉今日襪線之才雖短菲葑之采不遺朝取一人暮取一人莫非荷提撕之力待以國士報以國士當不忘感激之情輕凟崇嚴重加悚息上張太尉啟蘇轍上韓太尉書所願覩賢人光耀馬周寓常中郎館即能以時務條陳不揣下愚敢希前軰敬以惜軍愛民之事陳於王公大人之前聞斯行之時則美矣嘗謂有民有社須當畫策以治安足食足兵乃可運籌而征討凖今酌古發政施仁茍欲展心上之經綸尤先察目前之利病勿求近效宜作遠圖開荒田則為富國之原設屯田則為守邉之計除民瘼則免誅求之苦積軍儲則無匱乏之憂廣鹽𣙜之法則遠近流通恤軍士之家則存亡感激凡兹六事盡在一時日月雖明固難照覆盆之地風雨不動願蒙庇廣厦之天布以新條革除舊弊惟其愛民如子必不以人廢言詢我芻蕘教人稼穡易其田薄其税民力方紓居有倉行有糧兵威自振幸無吝一舉手一舉足之力更勿辭三握髪三吐哺之勤庻士夫得進其忠言而軍民免令其失所恭惟太尉相君英雄蓋世度量容舟以崧髙維岳之英靈為海納百川之襟度興利除害更張漢瑟之絃革故鼎新重作禹書之貢西鄙之烟塵去遠東呉之風俗還淳見諸生如見大賔保斯民若保赤子天上天下咸知向日之忱江北江南共仰福星之照名埀竹帛勲在鼎彛某十載風塵一篷烟雨避地居淞江之滸憂天如杞國之人功名雖負于素心窮困尚憐于黔首慮或有于一得口何忍于三緘知我春秋罪我春秋欲救顚崖之辛苦待以國士報以國士終當範我之馳驅俯竭葵傾仰希藻鑑賀蔡教授到任啟建學立師本三代之良法化民成俗即二南之遺風夫以世衰而道㣲其必人存而政舉喜聆木鐸敢進芻蕘睠此崑山舞丹崖之鳯石沛然婁水接滄海之鯨波以山川如是之竒人物由來之盛紛紛顯宦比比髙門豪如劉龍洲乃寓焉賢若李樂菴而居此適値近年之兵革遂忘舊日之衣冠城郭是而人民非禮義廢而政教失幸鄉校之不毁今學宮之茍完有司奔走於豆籩多士趨蹌於禮樂但龍蛇之混雜有鳬鶴之短長中也養不中才也養不才政賴有甄陶之力仁者謂之仁知者謂之知豈容無區别之心惟自今秦鏡之明更不致齊竽之濫大杗小桷匠氏固無棄材貴玉賤珉識者自能定價嚴一鼓以作氣必三年而有成恭惟某官心醉六經眼空四海杏花壇上重來鼓焦尾之琴荷蕢門前試聽擊有心之磬胷次炯玉壺氷露文章埀金薤琳琅曩嘗居淮海維揚人共仰泰山北斗能不失前賢規矩眞可為後學範模苜蓿闌干且莫厭一官之冷菁莪長育當挽囬吾道之春立登要津入居翰苑如某者蹉跎仕路流落他鄉不能看長安之花乃亦采泮池之藻聞所聞見所見星鳯先覩而快哉歩亦歩趨亦趨蘭鮑久居而化矣為王叔才通呉伯善啟魯連為解紛而出斯為天下之竒陳平能宰社而均終作朝中之相茍有為于今日亦何異於古人今一見之竊有請也恭惟某官湖山清氣丘壑閒情雖爵祿不入其心惟孝友是亦為政車乘下澤稱鄉里之善人樓卧上床本湖海之豪氣律呂鳴朝陽之鳯階庭舞荀氏之龍惟其博古通今所以出類㧞萃有文舉座上之客而開尊嘗滿聞鬷明堂下之言而執手相知近者悦遠者來親踈無間剛不吐柔不茹好惡惟公藏器待時在邦必達某許年慕藺此日識荆深知有長者之風輙敢訴不平之事曩予有子勉作鹽商同客嘉禾王吉父與成交易親書片楮孔方兄俱付檢收不料墮其計中從此置諸度外屢約屢爽轉富轉貪但知堆滿籯之金不肯返連城之璧况視予之流落尤縱意而欺凌獸心忍負于朋儔狡窟乃居于仁里望公秦鏡照我覆盆能扶顚以持危必舉直而錯枉風行草偃水到渠成是猶能解戰國之紛亦何異宰鄉人之社道之禮樂示之好惡豚魚必感而相孚失之東隅收之桑榆犬馬當知其有報心有所憤書不盡言為王叔才等訴神文亘古亘今人世有難明之事誰曲誰直鬼神能灼見其情雖聰明正直之無私必禍福吉㓙之有報請陳始末用徹幽明切念某至正十有五年作檇李異鄉之客統鈔三百餘錠買呉江同姓之鹽託在契交信從期約立文慿之一紙比重託之千金豈其反面無情從此掉頭不顧彼己跨腰錢之鶴我乃求縁木之魚日往月來馴致遷延之久雲翻雨覆不勝變詐之多故連年空打白厓至今日竟為烏有交情既絶禮貌全無本來似鮑叔相知每去如魯侯不遇彼因致富積鹺物之如山我則固窮避兵戈而失路不念流離之苦轉加欺㒺之心日月不照于覆盆風雨自安于廣厦昔伊過我待為席上之珍今我尋伊視若眼中之刺是可忍孰不可忍如之何末如之何既告于隣里鄉黨之間當質諸上下神祇之之有吾言若謬甘受天誅彼語若誣當遭隂譴願洋洋之如在降濯濯之厥靈有感必通如響斯應舉直錯枉必須天理昭彰福善禍滛庻使人心畏服上周郎中陳言五事啟李白識韓荆州雖萬户之封非其所願鬷明見鄭叔向惟一言之善得以相人今區區慕足下之賢敢切切論日前之事上以裨朝家之清化下以􅇺郡國之蒼生遠視欲明邇言可察兹蓋伏遇某官乾坤清氣風雲壯懷向坐黄堂著蒲鞭之善政今遷畵省冠蓮幕之諸賔有撥亂反正之才盡扶顚持危之力心不忘於向日義不失于隨時英聲蜚九重之天遺愛溢三呉之地和氣挽囬于寒谷恩光照及于覆盆見多士如見大賔保斯民若保赤子能興利以除害不吐剛而茹柔史編當紀其循良鈞軸政須其贊畫門墻羅列好多培桃李之春鼎鼐調和有大用鹽梅之日更勤吐握以廣咨詢如某者甫里索居太山髙仰折桂之功名蹭蹬衡門之心跡栖遲雖讀書以聖賢為師但出門則農圃為伍東隣西舍痛遭毒歛之蛇南枝北風多作無依之鵲歎息愁怨之聲常聞于田里呌囂隳突之吏每見于鄉隣况軍儲不積則時有借糴之憂而官俸太輕則必有侵漁之患此皆繫百姓之休戚疇能出一語以發揚惟大人肯念乎羣黎故小子敢輸其忠赤非甚髙難行之事非荒唐繆悠之談是曰是非曰非尚從公論聞所聞見所見奚敢餙詞宜改絃而更張毋刓印而弗予他有剥床而請者别當借箸以籌之溺猶己溺饑猶己饑斯謂愛民之術仁見謂仁知見謂知初無私己之謀饒舌云云優容幸幸謹奉啟并以所言五事開具詣省幕以聞伏惟台慈鑒念一開荒田夫民之有田猶魚之有水也魚無水則枯而死民無田則饑而斃原民之情豈不欲治田以養其生哉今長洲縣崑山州等處水深圍田積荒嵗久無錫常熟等處殘破地面荆棘連天其各處流移之民餬口四方而無卓錐之地是皆欲業耕稼以養生者也但所慮者犁鉏纔舉即有征科廬舍未完便當差役是以寧受艱辛且逃租賦寧甘窮餓不還鄉土每嵗雖蒙官司招諭復業及委官勸農不為不至而民之所慮如此遂成虚文况各處低田圍岸久壞非一時可能修築積水甚深非一時可以車戽必須隔年料理以俟春耕田家作苦舉筆難盡如蒙呈達省府行下各州縣踏勘荒田數目叅酌至元年間叅政開荒舊例聽令諸人請佃每年不過若干初年官不徴糧私無租課應干雜役俱得優免次年公私半徴三年成熟然後全征如此則人皆為養生之謀而不憚工力之費一二年間官糧數増國家享無窮之利矣開此荒田官民兩便一除民瘼為政以恤民為先若夫民瘼未除而謂能卹之者謬矣然今之民瘼未易枚舉姑以前月切近者言之如崑山州等處上年旱澇相兼髙田則禾苗枯槁低田則積水瀰漫各都里正及佃户細民經官告狀俱有堪信顯跡不期驗灾官吏不行詣田踏視從實免征止坐各州縣衙門及諸寺觀逼令鄉胥里正一槩伏熟繼後部粮官吏驗數征納其細民棄業逃亡十去八九但將各處里正絣扒吊打責限陪比破蕩家産終不能足幸蒙上司體察里正人等發下所屬州縣乃得疎放立案擬于秋糧内帶征若今嵗秋粮之時果于里正名下追征其里正百孔千瘡奚暇再剜其肉以補于兹必着落原佃之人一同部内上下交征决致失所况連年兵革擾攘差科繁重里正人等俱各消乏誠不能以一嵗之所收辦兩年之租賦縱使捶楚之下求而得之甚非國家愛民之意亦非諸大臣恤民之政也如蒙言諸省府移文郡邑從實免征庻使里正之家免于破蕩力田之衆不致逋逃非惟今嵗秋糧易于辦集而亦免下年荒廢其田矣除此民瘼斯民幸甚一抑豪强貧富不等借貸有之舊制民間私債月息三分年月雖多不過一本一利誠良法也近年以來其官豪富强之家乘人之急取利過倍少有逋欠凌虐百端或于借貸之時勒令併利作本虚立文約明起三分利息實收過倍之數或有還欠利息倒換文憑利上生利或寛收窄放更易斗斛或左右邀求减剋分例其舉逋還債之人阨于窮窘吞聲忍氣噤不敢語良可閔惻上年幸而官府知之出榜禁約但久弊不能頓除如蒙申明舊制定立罪名嚴加禁治庻使權豪嗜利之徒畏懼憲刑毋蹈前非抑强扶弱公道幸甚一積軍儲為國之要足食足兵然兵固不可無食而用也但頻年水澇嵗無全收如無錫常熟等處殘破之餘田地抛荒租糧减數今國家軍儲之用常恐不敷况凡有賞勞俱用米粟動以數百千石為無益之費至于青黄不接軍人有缺食之憂百姓有借粮之患竊嘗觀之有司催辦米如珠璣濫賞贏餘粟如塵土此理曉然人所共見今後宜從省府移文禀知太尉遇有功賞從公斟酌或以多爵之榮或犒以金銀等物撙節米糧以備饑荒如此則倉廪之積日増月羡漕運可供軍儲可給而民無和糴預借之患矣多積軍儲公私便益一増俸祿張官置吏本以治民黜陟幽明欲其稱職然必須俸祿足以飬亷然後考其成否而黜陟之斯可使之無憾矣今府州縣之職最為繁雞大小官吏之俸類皆鮮少仰事俯育寧免素心洗手奉公誠不易得其間以貪汚黜罷者固不足恤而清貧亷介祿不償勞者上之人宜軫念之如蒙建言本省告之太尉以官吏俸給之數酌古準今量加増益如此則居官者可以絶貪墨之心百姓無侵漁之患矣傳曰忠信重祿所以勸士俸祿之増公道幸甚賀偰知州到任啟騎竹羣童爭先遠迓扶藜一老敢進常談或可比乎芻蕘庶無棄于菅蒯嘗謂州縣作民父母詩書為世範模必須酌古準今乃能承流宣化蟠根錯節毋令挫利器之鋒流水髙山正欲奏朱絃之曲夫御吏治民之要惟正己格物為先吏或奸欺民多疾苦但鄉無呌囂隳突之吏則田無歎息愁恨之民照日月于覆盆轟雷霆于蟄户寛猛相濟㤙威並行省刑馴致于無刑聽訟當期于無訟魯中牟之淑化官至司徒黄頴川之循良入為丞相茍有為于今日亦何異于古人恭惟某官屢世簮纓一門科第金薤琳瑯之文采玉壺氷露之襟懷花縣相傳藹仁聲于荒服蒲鞭不用布德澤于疲甿下車纔一月之間比屋皆二天之惠皜皜乎不可尚恢恢乎其有餘鷦鷯之巢一枝本非素志鳯凰之翔千仭方進修程跂余望之自此升矣某素嘗仰斗近獲披雲過蒙禮貌謙謙喜聽政聲藉藉芘寒有賴獻曝何慚三千年黄河一清坐待太平之日九萬里摶風直上佇看大用之秋有猷有為善頌善禱龜巢稿巻七欽定四庫全書龜巢稿巻八元謝應芳撰啟劄子状箋表
