body:
  text: 養竹成大林養竹成大林頻年竹生孫美竹非不多惡竹亦已繁羣奴為洗之徃哉聆我言美者慎勿傷去惡必去根勿虞爾斧缺勿憚爾力煩宿莽蕩無餘清風仍滿園樹頭鵶䳎鳴樹頭鵶䳎鳴農人起耘苗問之何爾忙良田莠驕驕去年耕較遲草蔓人力寡稂莠非不除卒以害吾稼吾聞農人語猛省天下事養虎常害人玩寇亦如此移家金壇尹干橋奉寄俞用中先生辟地金壇縣懐人鐵罋城戰塵今滿眼憂國更忘情北固山無恙中􅍽水最清卜居何處好為我主鷗盟大父卒宋末塟烈塘之東墓松皆合抱數百株一旦為鄉豪伐去郡縣弗能禁愬之分省亦莫敢誰何應芳痛憤於家形於夣寐當年掃松寒食朝紙錢掛之松樹腰今年無樹堪挂紙冡頭揷竹風蕭蕭孤兒抱怨吞聲哭躑躅歸來臥茅屋夜深忽夢蒼髯翁手足褁創頭髪秃告言淮襄荆楚間羣兇殺人連數年名門世胄皆赤族楩楠豫章何足憐吾方欲問天下事雞鳴夢破心如醉髯翁恐是十八公天邪人邪誰降㐫五噫歌大明胡爲而翳兮噫大㓙胡爲而裂兮噫觸邪之豸角何折兮噫祥麟在郊足亦刖兮噫太平遺黎豈至是而底滅兮噫憶兄八月中結友平生愛緇侣逃難亦與俱骨肉不相顧安危意何如銅馬從南來殺人血成渠一炬灰萬室九原槌含珠懐哉眷令原何時蓬蓽廬横山絶高處獨立𦕈愁予三五七言角蛇啼翼虎飛百年鳯雛壞五色鵷雛饑盲風怪雨已連月青天白日寜無時歲暮獨歸浩浩北風吹戰塵還鄉無復見鄉人四郊荒艸斜陽外一樹寒梅野水濵偶有新詩題甲子忽驚初度過庚寅僧廬夜宿明朝别黙念莪蒿泪滿巾西膠山雪晴寫呈無錫州尹遂䝉罷吳家渡築城之役一夜雪深三尺强石人墮指氷蠶僵猶喜金烏兩翅凍不折天明飛出海上之扶桑老夫晨起膠山下風景看來渾是畵連山萬頃玉爲田隔水數家銀作舎田中築城團義兵日高未飯饑腸鳴黄泥凍地硬如鐵白柄短鉏鏗有聲不辭受饑寒但恐虧工程將軍踏雪來㸃名萬夫鵠立顫且驚馬前壮士五色棒棒頭性命鴻毛輕予生悔不習兵法雪夜擒吳書奏㨗客櫩抱膝漫悲歌奈爾義兵寒苦何丁亥歲旦徐達卿席上作主人飲客椒花酒笑語春風口角生乆雨忽晴人共喜又聞周鄭欲㝷盟元夕寓田舎有感憶得去年王正月錢塘風雪正頻繁馬周獨酌新豐市韓愈三書光範門喪亂不霑新雨露饑寒今憶舊田園堠山西畔孤村裡借屋篝燈過上元贈錢夢弼連雲第宅堠山西喬木森森與屋齊萬國熊羆方血戰一林鸞鳯自幽棲東風池舘春如晝長日笙歌醉似泥吐酒錦茵容野客新年十日九招攜丹陽陳天倪及其弟剛中奔牛陳心逺等諸羽士避兵洞庭山寄此代簡洞庭林屋聚羣仙問訊曽逢賣橘舡湖上白魚多滿尺山中朱果不論錢仙家犬吠雲連屋澤國龍吟月滿天辟榖有方煩寄我吾將多與世人傳陳大翁過堠山客舎情話連日追悼母氏使應芳情見乎詞翁名師可字伯大宋常州通判之子外家親戚惟翁在相見猶能話阿㜷三夜客窓同寂寞兩年兵火共流離可憐今雨窮途客誰識前朝郡倅兒前世青氊零落盡行囊留得數篇詩寒食日聞鄉信口占鄰舎驚呼避蝮蛇老妻嗔怒唾烏鴉誰知昨夜三更雨又送春風一度花寒食清明人上冢夕陽芳草客思家愁來復遶青山去何處壚頭酒可賖訪孟伯堅周履道不遇班馬文章駕並馳雲龍追逐去何之門前流水垂楊栁屋上青山噭子規三月又逢修禊日一觴還憶太平時可憐潦倒無家客滿目風塵兩髩絲刺促行次履道韻刺促何刺促江上秋風破茅屋誰憐杜少陵長歌之哀甚于哭故山可望不可歸髑髏臺高春草緑浮雲滓日竟誰洗烈火連天勢難撲三農不復把犁鉏風雨荷戈城上宿於乎人生有子作征夫不如返哺林間烏題春林雨意圖前山後山雲氣濃欲雨不雨天無風記得去年初夏裡此時船過滆湖東懐周履道平生多朋遊窮途見交態每歌杕杜詩重念伐木廢孰謂新相知情如舊親愛手書辱殷勤授粲慰行邁我老無能爲執德心未艾秋風自揺落松柏歲寒在狗寨謡徃聞淮西軍食人狗亦有寨屯如軍是時江南幸無事尚謂傳者言非真安知吾鄉今亦爾地方百里皆荆榛三村兩村犬成羣見人如見東郭㕙跳踉大噉猛于虎陂陀高踞聲狺狺路傍青草堆白骨天外飛鳶銜㫁筋征夫早去膽欲落寃鬼夜哭情難伸可憐性命塟饞腹徃徃多是近鄉民向來喪家狗絶食遺骸或與狐狸分乗時爲暴至若此此事千古同悲辛寢皮食肉不可得張牙㺯爪何由馴虞廷九官分厥職益必掌火山澤焚犬乎犬乎胡不革爾心全爾身主爾主鄰爾鄰揺尾乞食仍相親毋使犬砦之名天下聞夀玉山主人黄梅雨歇南風清緑槐如雲隂滿庭胡髯雪白雙眼明長日細字箋龍經有時忽著道士服騎鶴三天奏符籙天上神仙知姓名人間富貴差馳逐翁年已髦何矍鑠姮娥應授長生藥我來避地方卜鄰翁與談天甚爲樂酒邊却笑磻溪翁吾年與同心不同鷹揚未若漁釣好周家自有羣羆熊平生毛頴與親炙老去麯生尤莫逆白鷗之盟君忽渝門外紅塵一千尺八月十六日顛沛中見顧玉山䝉置酒嘉樹軒相與劇談痛飲懽如平生且有來夕草堂之約既醉而别賦此以贈來徃東吳三十年吳人多示好詩篇片言堂下知鬷蔑一笑尊前夀魯連嘉樹連雲秋不老桂花如雪月仍圓烽煙只隔重湖水且爲交懽理素絃留别顧玉山將徃杭州卜居垂白遭多難倉黄走四方吳人今入貢越冦復侵强百戰山河破三邊草木荒軍容皆赫赫徒御亦揚揚舉士思投筆農夫習臂槍誰令紀綱壊未改瑟琴張卓爾文章伯平生錦繡腸琴書曽不廢軒冕迥相忘愛客坐常滿躭詩夜亦忙登龍嗟潦倒鳯鳥與翺翔說項口不輟留髠興甚長百篇詩自和屢舞酒淋浪老驥羞跧伏饑鷹欲逺揚憂天如杞國辟地卜錢塘丞相聞新詔除官率舊章覆蕉曽有夢腐草或生光蕭颯雙蓬髩漂揺一葦杭第慙金自躍何以玉能藏海底珊瑚赤松根琥珀香明朝重回首嘉樹鬱蒼蒼贈道傳上人偶識廬山逺山莊借屋居撥雲分臈酒踏雪送寒蔬門俯溪光迥窓含野色虚相過兩不厭燈火案頭書送蔡伯昇避兵澱山依故人典衣沽酒磧沙頭送客攜家訪舊遊虎窟攜來桃竹杖鷗波蕩去木蘭舟黄楊偶厄今年閏老菊重逢九日秋覔得桃源堪避世結鄰當與老莵裘陳湖夜泊平湖秋水清如鏡照見潘郎兩髩斑帶箭飛來何處雁一聲哀怨入雲間訪澱山因自明習無學二禪老西風滿帆天所假扁舟過湖快如馬欲㝷漁父問桃源因訪高僧過蘭若南能北秀兩魁竒翠竹黄花總瀟洒相逢握手問流落試爲從頭畧傾寫生居揚子大江濵老我毘陵力田者羣兇西來火三月四境更無茅一把鄉鄰死戰血漂杵妻子生擒肉爲酢隨波幸若魚漏網失窟驚如㕙在野山中碧松堪療饑池上白蓮宜結社笑語同打有髪僧數見不辭禪杖行懐玉山隱君并簡其子國衡錦翮鵷雛海上囘無端鷗鷺失驚猜青山靜對機心息好客相過笑口開魚躍氷池堪入饌蛆浮臈罋足持盃官軍赴敵忙如螘奈爾重門掩緑苔懐袁子英疇昔㝷君竹浦西芭蕉葉上姓名題别來歲晚相留戀行到窮途孰指迷兩髩風霜秋颯颯一蓬煙雨晝凄凄遥憐冠蓋高陽里長伴山翁醉似泥懐諸葛用中每憶君家書畵船夢魂飛繞太湖邊干戈滿地無休日萍梗他鄉又一年西北天高煙霧隔東南海濶水雲連何當覔得蓬萊路相與從遊採藥仙至正丁酉冬玉山燕客芝雲堂適有時貴自海上來以黄柑遺之玉山乃分餉坐客且曰吳中以連年擾攘無之今有之諸君子不容無詩故有是作青巾西來食人肉逃難西山采黄獨上書不伏光範門忍饑寧負將軍腹玉山燕客客滿堂香柑新帶永嘉霜分金四座照人面潄玉三咽清詩腸山中椰瓢如大斗吳姬擘來薦春酒酒酣遥指洞庭山爲問木奴曾貢否頻年兩浙阻兵戈黄柑緑橘不相過此時共享此佳果胡不取醉花前歌漢庭傳柑還賜宴應念江南乆征戰聖恩有詔息蠲租可奈數州人已無贈鎦元臣何士安二省郎冬十二月一雨滂婁江水高三尺强翩翩使者傳令急肅肅官軍赴敵忙日出山頭雲氣白春囘海上栁枝黄捷書明月報樞府連璧少年増寵光錢夢弼移舟過姜里後三日余徃見之適夢弼卧疾董子舍中正月賦此為别堠山之别苦倉猝甫里相逢說亂離喜見新年王正月重瞻舊日漢官儀酒杯不惜金魚換藥杵何勞玉兎持借問董家雞共犬有無祥瑞似前時漫興甫里水東流垂蘿繋客舟客心清似水吟髩白於鷗詞賦知無用干戈苦未休蓬窓三日雨農事憶西疇二五十不富貴蹉跎又六年新愁添鶴髪故國暗狼煙白㡌看雲坐青燈聴雨眠痴兒書嬾讀翻笑腹便便三吳地方千里齊民總荷戈人生無可奈天運竟如何米市黄金賤沙場白骨多故山時一望老眼泪懸河四伐木燒官炭中林霹靂飛窮猿無可擇飛鵲更何依野雨生稊稗山風長蕨薇兒曺能采擇猶足慰年饑五吳女何多巧吳趨作楚聲市㕓方易肆朱粉復傾城壓酒桃花塢彈箏細栁營將軍正年少相顧若爲情六闔閭城下栁誰種緑隂成樹繋浮江馬枝遷出谷鶯我朝方用武僧寺總屯兵猶喜湖田熟街頭米價平七田舎方東作州家要義兵瀕湖團水寨劚石甃山城栁暗村煙暖芹香潤雨晴荷鉏歸未得布榖爲誰鳴八盡道從軍好封侯甚不難羽書頻報捷相府即除官北闕煙塵逺東風雨雪寒腐儒人共笑白首鹿皮冠九赫赫千夫長揺揺四櫓船船輕如躍馬冦退欲歸田蓑笠松江上犁鉏榖雨前只愁邊報急生計又茫然十太湖三百里流血水雲腥戰鼓有時歇漁歌無處聽飄零孤鴈白惨淡逺山青題橘音書斷令人憶洞庭十一近聞哀痛詔使者又江東兵革何時息軍書四海同落梅春雨後芳草夕陽中俯仰長流涕窮途一老翁顧國衡萬戸席上與乃翁及元璞長老等數客把酒賦詩各成七言四韻客來寒食清明日每日春風醉玉仙綵筆醉題鸚鵡賦寶香頻爇鷓鴣斑簾前脩竹翠欲滴地上小桃紅更殷按得錦箏新製曲隔花黄鳥共間闗宿夀上人山房再和金西白長老韻春來淮楚兵方息今夜村莊犬亦寧分得梅邊半窓月借看松下兩函經屋山風颺茶煙白江浦雲連樹葉青來徃風流似支許獨慙吟髩已星星訪積善寺貴上人適與旌德寺學無為明月庭讌集四人年皆五十有六酒邊聨句共成一律既而又各和一律四人二百廿四歲逋翁一日酒傾三百杯月庭醉裡不知浮世狹無為吟邊但覺好懐開應芳春雲冉冉連江樹逋翁晴雪紛紛落野梅月庭邂逅相逢離亂日無為布帆無恙亦佳哉應芳和四人二百廿四歲野老浮家僧渡杯喜共江湖春水靜適逢西北暮雲開神仙換骨元無藥宰相調羮自有梅旨酒正須終日醉醉鄉佳處亦悠哉送梅州判之崑山百戰歸來佐一州貂蟬從此出兠鍪山城近海金湯固市舶通番食貨稠下馬正逢梅子雨勸農須趁麥花秋薦賢不負尚書意治最功成秩更優端午日瑞光寺西白長老方丈作藕花池上端陽日菖歜香浮藥玉船可喜山僧能好客常容野老醉逃禪連宵雨漲三江水當午雲開一鏡天醉倚浮屠望鄉國横山依舊暗烽煙對雨書懐書生得句百憂忘更喜新知共一方醫士為焚賖藥券指顧彦文鄰僧借與讀書床指夀道傳十年鄉國煙塵暗五月江村風雨涼不用弱流三萬里地無豺虎即仙鄉次韻贈管伯齡風連四海塵身世等一漚斯文幸未喪同類猶相求蜉蝣果何物敢作撼樹謀諸公新亭淚可笑學楚囚我無西園金孰問東家邱嗟爾一片玉産此崑山州天門九重深獻納亦末由江村茅屋雨湖田稻花秋門外車有轍窓前水長流時無華子魚幼安誰與儔濯足弄雲水商歌興悠悠胷蟠五色綫唾視闕鍼芥適相遇珠璧驚暗投酒杯接慇懃詩盟結綢繆千金享敝帚猶曰不易酬新知如故交一笑忘百憂停杯問蒼天干戈幾時休金風雖乍起火雲未全收溪橋栁隂清繋我三日舟操執不忍别相期重來遊甫里先生有田二頃可無官况復時危行路難丹鳯徒勞銜詔下白鳬自放出闌看春從顧渚隨茶竈月向淞江伴釣竿舊宅不知何處是浮屠樓閣倚高寒次韻袁子英過吳江兼簡琦龍門孤城當澤國潮撼勢如浮拄杖㝷僧寺長橋繋客舟江寒楓葉落湖暝蝮蛇遊寄語龍門客詩盟莫負鷗江上女和子英韻妾生吳江上阿爺最鍾情十五嫁夫婿紅顔如舜英别來各天涯所共惟月明妾守江上宅夫戍邊頭城江上畏行路邊頭防斫營一朝義當盡性命鴻毛輕死願化葵藿兩兩心同傾送顧玉山遊東南諸山我愛向子平婚嫁畢兒女平生掌中珠棄置若敝屣百事不挂眼五岳縱遐武朝與麋鹿遊莫與泉石伍泉石初無情所喜絶塵土松風出林磵笙瑟音調古但聞幽鳥鳴猶勝俗人語咄彼貪墨徒臍燈照金塢遺臭千萬年其禍皆自賈吾知子平心夙昔慕巢許矧兹風雨秋摧蘭折衡杜徃哉山水窟幽期赴緇侣解纓濯滄浪苕花八風舞老我病江沱臨風爲延佇和顧仲瑛金粟冢讌集詩我昔過北邙立馬山之隈爲問隴頭樹皆云後人栽生前尊酒誰不有無人到此自對青山開屋堆黄金五侯貴難免白骨生蒼苔最憐吉士或枉折有如㸑下焦桐材玉山先生達觀者胷次不着閑悲哀清秋攜客坟上飲麯車載酒山童推大笑胥魂乗白馬深慙鯀魄化黄能墓銘自製身自挽視身不啻輕如埃鸞翔鳯翥玉箸篆虎踞龍蟠金粟堆鶴羣三繞喜樹舞龜趺並載豐碑來長吟復短吟此興何高哉秋風無情摧萬物芙蓉亦老胭脂腮笑言他年翁仲共寂寞何如此時賔客相追陪功名絶愁根富貴脫禍胎百年能幾日一日能幾杯從兹秉燭長夜飲猶恐四蛇二䑕忙相催主人爛醉客亦醉絶倒不顧傍人唉北望中州數千里人家盡作兵前灰髑髏委江郊多是賢與才忍饑自作首陽鬼獨醒誰念湘江纍神仙初無不死藥方士浪說㝷蓬萊君不見無邊之海白淼淼無名之山青巍巍長鯨嘘吸成風雷徐氏一去何曽囘玉山以予欲徙居淞江之東設席書畵舫邀袁子英陸元庠恢上人用江東日暮雲分韻賦詩以餞予得江字用以留别浮家野老雙目厖捩柁欲渡吳淞江東將入海釣濤瀧玉山山中别老龎西池之屋如舽艭左圖右書堆滿窓燈花揺揺落銀釭葡萄灎灎傾玉缸四檐白雨飛流淙若裂媧石銀河洚主人長歌客接腔翕然鐘鼔相撃撞酒酣捉筆如長杠千軍可掃鼎可扛諸公大才齊楚邦騷壇老將霖麾幢客來投戈乞受降乃辱贈以白璧雙明朝短纜撃舊樁馮夷前驅鼓逄逄海濵懐人倚石矼書筒時寄黄耳厖來龜軒詩為顧玉山作維歲之初兵閧邑里我鐍其扃以辟以徙今我來思室有爾龜我墉弗穿爾從何來委蛇委蛇爰曳其尾來龜之祥云何不喜我户伊威我牖蠨蛸嗟我婦子亦孔之勞爾其泥塗我室我家豈不爾思以名其廬瞻彼池水有蒲有蓮爾居爾游以永其年袁子英偕宗别傳過天慧莊因獲晤言夜話之餘口占以贈短髪蕭蕭雪滿簪老禪方丈挂瑶琴月明毎憶許元度歲晚同來支道林四海干戈猶在眼百年軒冕總無心梅花玉立西窓下相伴哦詩到夜深子英之玉山顧隱君令於同里法喜寺樓居日鈔佛書至午而止餘暇則吟咏不輟雖親舊來訪亦不徃答焉余因子英復去作此代簡客來喜得平安信蕭寺樓居日揜扃湖近浪揺窓影白地偏苔没履痕青羣賢方結蓮花社小楷猶鈔貝葉經歲晚扁舟歸甫里好㝷漁父過寒汀送照元明住白馬寺老梅飛去跡猶靈七十二峯湖上青已喜黄龍新說法無勞白馬逺䭾經六時花雨狻猊座五色雲開翡翠屏挹取寒泉同煮茗予將歲晚過禪扃冬至日陪高太守坐愚隱山房讀易有感一殻混沌破二氣從此分消長固有時爕理亦在人云何數年内濁亂暗楚氛維時當嚴冬裌衣暖如春中林竹抽萌花間雪紛紛隂極陽復生踐長喜兹辰蒲團踞禪榻芸窓對爐薫筌蹄謝支許羮牆見羲文嗒然我忘吾萬事何足云人日懐管伯齡及杜泉玉昆仲一山上人吳淞江頭春水生美人不來舟自横一年又過牛羊日四海豈忘鷗鷺盟管寧白㡌傲軒冕杜陵名家多弟兄結社香山僧更好野老何緣與姓名劉景儀寓崑山永懐寺除日作詩三十韻見貽時余客薦嚴因次韻答之兼呈兩山主人遭亂心如箭偷生髩已華一年看又過幾度發長嗟淮海浮羣鳥荆蠻鬭兩蛇妖氛渾不散殺氣轉相加倦客誰相過高僧意孔嘉燒香談般若倚樹聽楞伽風月三生石文章五色霞階前時剗草坐上或拈花我下南能榻君居北秀家麄豪笑俗子歌舞擁高娃重費纒頭錦頻敲拍板牙何如依有道樂此寂無譁法喜常親炙塵心亦變花濟河求巨筏出宅問三車兵火西來盛神京北望賖憂天同杞國賦雪擬劉义西寺齋鐘應孤城戍鼓撾朋遊欣宻邇世務奈紛拏衮衮華軒鶴喧喧晚樹鴉餘生知有幾學步恐成差故國歸心切烽煙望眼遮衣冠無噍類戈㦸亂如麻不識蓬萊路那逢博望槎憤秦思蹈海悲楚欲還沙竊比君臣蟻誰憐喜怒蛙桃符驚節換萍跡寄天涯君憶蘇隄栁予懐陽羡茶吟篇聊倡和醉筆半欹斜此意方相得前言匪敢誇尚期金百鍊永保玉無瑕聞顧玉山芝雲堂火而所藏之書俱焚恐其不能為懐寄詩釋之誰將藜燄燭羣書腹笥便便自有餘得失未須論塞馬平安􅂓復問池魚草堂留客仍投轄香徑㝷詩可曳裾别院海棠春滿眼重來燕子喜何如和玉山初夏言懐聞君乆約東林老林下棲遲避俗塵蓮社不妨陶令醉韭葅誰信庾郎貧蘇湖𣺌𣺌田皆水淮海茫茫草没人春去百花先自落五更風雨况相因二四海風塵渾未息一時天道豈無知待看雨散雲收日依舊青山緑水時死欲便埋童荷挿生能自挽手裁詩道今風致清如許行路相傳口似碑再用韻寄悅堂長老松雪孤標孰與倫煙霞一室靜無塵清談每日能留我自說平生不患貧城郭含輝山韞玉階除聽法石如人曇花不逐春紅老信與東風别有因二老虎兒孫到鳯池聲名曽徹九重知鶴書天上頒恩日猊坐山中說法時寸草不忘慈母報白華無媿故人詩春秋直筆黄夫子曽為東鄰著二碑踏車歌吳田水深三尺許總是去年秋暮雨勸農使者催春耕田甲頻撾水車鼓江村破屋能幾家家家婦姑俱踏車蓬飛兩髩赤雙脚亦有女兒雙髻丫松江太湖愁滿眼白汗沾衣足生趼車輪轆轆羊角轉水波翻翻龍舌巻春來十日九不晴怕聞鵓鳩呼雨聲滂沱纔禆片時乆辛苦又加三日程當家豈無夫與子打魚日糴去城市城中禁米難出闗田上忍饑還戽水四郊未種圍田榖三邊已運官倉粟安得木牛為木龍運水疾於牛足陸西林日落田婦歸隤岸白煙魚虎飛詩翁獨立長太息何處青山有蕨薇和陶菊莊郊行崑山春暖玉生煙滬瀆潮平水接天行到滄洲人寂寂坐看青荇葉田田二十年四海暗烽煙五栁先生醉樂天芳草夕陽江上路獨憐春水滿閒田梅子玉判官勸農過客舎口占以贈婁江之南一萬家葑田水深忙踏車喜有春禽鳴布榖幸無夜雨漲桃花州倅勸農頻出郭野航牽纜小如𤓰白鷗也似知人意引領相将立釣槎觀浴佛有感銀盤水浴紫金身白髪禪和拜跪頻周孔豈無初度日諸生誰為薦溪蘋和顧玉山重構釣月軒虎戰龍爭無了日他年誰是復誰非諸公圖像凌煙閣此老逃名釣月磯新雨一池荷葉長南風四月楝花飛我來喜聽滄浪曲欲挽遊絲繋落暉夏夜作五年兄弟各西東兄在今年七十翁戎馬此時猶塞路羇鴻何處或傷弓對床夜聽空階雨擁被秋吟破屋風夢裡不知身是客覺來愁絶泪沾胷陪梅州判智長老石教授陳惟兄夀上人等遊姜公墩小酌梅以杜子美興來今日盡君歡分韻余得日字白雨洗炎歊秋風灑瑟瑟梅仙約幽㝷邀我杖藜出同遊得名緇飄然興俱逸移舟泊釣渚看竹過僧室行行陟高邱苔溪樹隂宻崑山含玉潤巋然如卓筆羣峰太湖上雄勢爭崒嵂江中早潮囘風急去帆疾梅仙最多喜播種農事畢青苗匝吳田芳草眠繭栗斯民乆塗炭天意諒深恤兵餘喜豐年一飽百憂失懽然各有慶雙榼酒盡吃安知艱虞世得此閑暇日幽情寫絲桐餘懐􅂓短述次韻贈虚中講主三友高論乆寂寞一鼔雷音號令嚴正法眼明嵒下電𤣥機味若水中鹽池蓮玉立天開鏡庭竹金聲風捲簾大地正須沾化雨蹄涔寧許老龍潛六月卄二日愚隱和上以詩留别徃磧沙寺以寓缾鍚其詩末句云一聲短笛滄江暮收拾絲綸下釣臺予次韻二首送之既而懐磧沙諸公復就韻代簡一曲滄浪歌未了滿船明月賦歸來俗塵自暗人間世不着纎毫惹鏡臺二白髪道人無處著磧沙湖上去還來湖深六月天風冷花雨吹香般若臺右二首送愚叟長老又誌公刀尺傳家乆船子絲綸罷釣來一鏡湖光照樓閣共看明月坐高臺二瀕湖金刹清涼境冠蓋時時聴法來刮目試看天下士幾人胸次有樓臺右二首寄剛中長老又長歌白雪無人和近喜碧雲禪老來龍女獻珠煙水國馮夷撃鼓雨花臺二一牛鳴地長相憶賴有尺書時徃來白馬山中人獨逺孤雲落日在琴臺右二首寄閑野舟兼懐照元明又連日顛風吹海立幾時飛錫過湖來絶憐湖上林泉好六月清風似五臺右寄益以道又刦火煙銷江總宅斷蓬風轉海濵來干戈未息衣冠老誰築黄金聘士臺右寄江叔亷寄趙君綽舊家公子老儒冠詩巻梅花共歲寒湖上月明攜客飲樓前山色枕書看十年四海風塵暗乆旱三吳水澤乾滿目天雲秋後熱敢題尺牘問平安送扇贈趙執忠送子扇一搧呼兒書八分相望湖上宅只隔隴頭雲南國多秋熱西風有楚氛庭幃清枕席持此奉殷勤寄天章上人兼簡陶菊莊東林花雨滿衣巾文采風流有若人留客看山常滿座開軒臨水迥無塵娟娟烏鵲橋邊月灔灔葡萄罋裡春朝夕徃來陶博士應拈醉筆賦詩頻簡西白長老高情每向詩中見怪事今於病裡聞船去逆風牽纜怯葦花飛雪暗江濆雁來南國邊聲逺鴉集西林野色曛笑拂袈裟歸欈李秋風塵土自紛紛贈費克明知州崑山之石白如玉婁江之水涅不緇試持山水比州牧厥德清白同于斯吳儂賴公父母慈遭時艱危䝉撫綏盡令賣刀買牛犢不失與國充耘耔訟庭無人辨雀角圜扉空鎻生蛛絲獨憐沃土重財賦瘡痍不忍加鞭笞早騎羸馬戴星出晚踏明月歸來遲紛紛公務日不暇烱烱此心天弗欺毎延多士談禮樂頓覺喜色浮鬚眉菁莪方育泮林雨薺麥當茂氷霜時未擬文翁能化蜀已過魯山無紫芝蜚名籍籍動藩府將徹九重天子知夏五聞吳門湯君說以書見寄既而茫然九月末因馬吉卿來甫里詢知君説仍居閒詩以代簡不見故人逾六載曽聞書札寄多時浮沈江上知何許淪落天涯有所思老驥未應甘伏櫪驚烏可是别無枝欲過竹所㝷袁粲每望山隂憶戴逵策策秋風桐葉盡凄凄寒雨菊花遲幽懐每日如中酒世事頻年似奕棋一笑相逢期未得邊塵滿眼髩如絲送愚隠長老主萬夀寺戎馬廢六籍三乗亦多魔中流矻砥柱猶能障頺波吾師雲卧乆王公禮為羅說法繼禪月珠林雨曼陀宏開甘露門諸根並漸摩一鼔氣復作天龍衞煙蘿秋空雲霧開佛日光輝多題林泉雅趣圖贈杜玉泉泉翁愛山如愛客到處好山皆莫逆脚根不涴京洛塵面紋長帶煙霧色奚童抱琴翁曳履長日山中看流水萬松清籟響如絃滿地白雪吹不起桂風蘿月秋復春野花幽鳥情相親巢由相去數千載黄綺以來能幾人山顛水涯風物美都在我翁詩巻裡莊周夢蜨蜨夢周覽是圖者同天遊寄屈時中諸友白蠡塘南煙水村伊人避世若桃源家家雞黍留賔客夜夜熊丸教子孫慈竹叢深冬笋出野梅根暖早花繁扁舟一夕乗清興我亦來敲月下門逢鄉僧昱東明他鄉逢着故鄉人叙舊情如骨肉親猶喜吾兄存兩子俱從釋氏究三身煩君為寄平安信道我今居寂寞濵何日浮杯來甫里寒窓燈火話酸辛梅子玉董版築於杭城别去日乆區區思懐作此以寄錢塘江上石頭城畚揷如雲杵雨聲兩袖西風騎馬立五更殘月聴雞鳴銀屏犒酒平章喜金鼔還州父老迎力盡東南非一日政須遺愛撫孤㷀奉寄楊鐵崕先生光範門前三上書先生曽為發長吁畵橋楊栁藏書屋鐵笛梅花落酒壺偶遇故人論北海相思一夜夢西湖由來海内誇長句肯寄浮家野老無寄題悅堂長老城南小隱絶句為愛城南水竹幽高人結屋近滄洲東園十畆蹲鴟熟足擬人間萬户侯二門前流水與江通屋上青山與畵同文武衣冠來聴法紺園長繋玉花驄三象龍入室動成行燕雀隨人亦賀忙白髪老禪揮玉麈袈裟猶帶御爐香四屋頭新植青松樹池上重栽白藕花元亮孤舟靈運屐不妨來與共煙霞五客來多是一宿覺我亦幸有三生縁扁舟過門清夜裡烏几燒香繡佛前題淵明采菊圖一官棄如屣三徑今來歸言采東籬菊如彼西山薇秫田未熟禾無酒白衣攜來恰重九今年不識是何年且為黄花開笑口非無小窓膝可容花前一笑樽已空衰顔得酒借春色霜染樹頭秋葉紅先生之貧人共惜先生之心人莫識大厦難將一木支逃入醉鄉聊自適玉山邀至同里法喜寺飲别是夕酒醒夢囘宿雨初霽月明可喜即景賦詩兼寫送别之意風吹雨脚斷月到天心明孤鶴有清夢荒雞非惡聲南浦明朝别西湖幾日程杵歌人正苦莫上石頭城寄愚隠長老别後逢人問北山吳門第一古禪闗江湖瓶錫多依倚文武衣冠數徃還鐵騎解鞍祇樹下金魚換酒雨華間最憐丈室雙童子捧茗燒香不暫閑寄虎邱居中長老初春船過百花洲不謁閭邱謁虎邱古徑入門蒼蘚合新城繞寺翠嵐浮遊方每學僧行脚聴法當隨石㸃頭更覔西庵修竹裡寒泉一勺薦前修和玉山排悶寒窓誦君詩字字黄絹婦嗟君遘迍邅蛇虎嚇前後毅然能忍性不矯亦不揉黄金本何物一任化烏有胸中耿耿在依舊衝牛斗大兒萬户侯金印已懸肘小兒未强仕詩禮方授受兩娥遽奔川星橋吠天狗更憐鳯臺女先亦辭父母君能悟空幻視世等塵垢哦詩作遊戲一日凡幾首開尊飲詞客錦叚從醉嘔愛賢眼常清垂老髪仍黝逆境雖滿前百戰喜不負憧憧彼貧夫富貴爭進取力强誇拔山勢熱可炙手美新皆揚雄托孤誰杵臼龍為堅白論衍事雌黄口何如玉山人不失素所守愚也比方臯識馬忘牝牡傾蓋即相知論文仍耐乆嵗寒松柏青先零媿蒲栁嚮來九折坂此日一杯酒豪吟鬼神泣醉筆蛟蛇走萬事付無言㤗山同培塿焦任道欲過夀上人山莊并與僕相見前期以詩見貽傳和之邀僕同賦舊說君家有墨莊新詩今見墨雲香閒來林下㝷緇侣當為牆頭喚索郎邊境日來西冦近滄江歳宴北風涼先生素識融公嬾莫怪而今不下床再和韻寄趙彦深平原公子午橋莊草木當年雨露香桂樹不嫌招隠士桃花應喜識漁郎錦茵醉酒冬宵暖水檻垂綸夏月涼我亦欲招横玉去為君三弄據胡床次韻寄杜玉泉昆仲授書不逢黄石公采藥不遇龎眉翁杜陵名家好賔客客裾來曳梅花風德哉若人氣冲融渙然釋我心怔忡張燈為展風月宴坐客總開氷雪容火蛾熒煌吐星斗金鼇贔屭移方蓬高年垂及絳縣老合歡要䇿青州功唾壺擊折玉如意臂鞲珠脫攜歌童觥船浪翻翠袖濕笑絶如舉驪山烽紫雲一曲歌未了陽烏飛出扶桑東明朝仲氏復迎客百花潭邊收釣筒長魚斫鱠白於雪葡萄新釀青如空高堂坐擁肉屏暖寒士無復鳴秋蛩溪山相映色俱喜塤箎迭奏情無窮老夫生長近吳下所恨白首方遊從頻年坐我塗炭苦此日置身仙子宫已令沈湎恣為樂尚論古人容折衷賦歸既無田種术獨醒敢誇衣集蓉銜杯樂聖非易得良辰美景真難逢論交不以車笠異忘形且喜襟期同咄彼貪夫逐名利何異糞壤蜣螂蟲蠻爭觸戰更堪笑要於蝸角稱蠶叢邊隅風塵莽浩浩天門煙霧深重重世云酒為知己飲可不罄爾琉璃鍾扁舟徃還渡吳淞泗橋且喜春潮通興來徑去造竹所碧灣樹下維孤篷祗慚詩債償未了毛頴為我長怱怱此詩􅂓寄前日事此韻乃和前年冬分柑與君細說項眉案坐對如梁鴻碧雲山房分韻得檐字古寺雲林静春宵風雨兼阿師如恵逺有酒醑陶潛海味分苔脯園蔬摘韭尖金蕉傳四座銀竹瀉層檐談辨情相洽醺酣意轉忺燭長紅未盡缾罄緑頻添小令皆毛舉新題各口占襟懐雖曠達詩律自清嚴浪雪翻茶鼎香煙繞竹簾偶論蝸國戰因笑楚人鉗老去甘藏拙閒來得養恬青松知此意相對一掀髯雨夜懐朱澤民一天風雨夜漫漫獨為先生發永歎杜甫數椽茅屋破鄭䖍三絶坐氈寒鶯花紫禁囘頭夢煙樹青山抱膝看最憶舊遊諸閣老别來零落漢衣冠和鄒宏道諸公遊磧沙寺錢塘形勝絶蘇湖風物於今入戰圖獨爾磧沙仍似舊諸公杯酒不相孤逺山雲歛千峰出幽樹春來百鳥呼白髪老僧盤膝坐笑看車馬陟危途次韻寄路以道笑將簪紱棄如泥出郭移家住水西芳草喜人車轍少逺山齊我屋檐低門前古樹慈烏集梁上新巢乳燕棲更喜東橋僧舎好桃花多似武陵溪送居南山還嘉禾欈李亭前水接天楊侯曽此洗龍泉道傍已伐將軍樹湖上今題書畵船滄海揚塵知幾度黄楊厄閏又今年因君與說干戈苦相送臨期一愴然題李白月下泛舟圖青蠅觸起脫鞾時飛燕嗔人鳯亦疑杯酒佯狂江海上此心惟有月明知七月二日過益上人問病因過路以道山人家飲酒樂甚詩以謝之新秋去謁病維摩因與山人醉薜蘿頭戴鶡冠堪入畵手鳴漁鼔更能歌竹邊亭子清風細壁上詩篇好客多從此徃來溪路熟扁舟乗興數相過賀梅同知遷秩我愛朱絲絃其音淡如平為人滌邪穢妙理通神明良工繋錦瑟選練亦已精移柱喜更長白雲風冷泠二我愛青銅鏡炯如秋月圓為人别妍媸毫髪俱了然纎塵不受汚光輝共人憐政須重拂拭玉臺更高懸窈窕誰家女和卜思顔韻窈窕誰家女依稀慕璚樹向來適良人門户比房杜今年遘疾難飄零太行路風雨道傍花不失春態度珠簾十二樓燕子忍辭去合歡㑹有時無勞歎遲莫次韻寄呈謝杭州金湯險據鳯凰山日月遥瞻虎豹闗每見題詩懐故舊也知為政有餘閒慈幃一飯雙魚美衙鼔三撾五馬還細說平章親更喜黄金揷帶綵衣斑中秋日玉山顧仲瑛邀翟明府份陸良貴仁秦文仲約等十人飲金粟冢上酒酣賦詩各成一首憶昔避戎馬放棹來北山相逢適中秋展席解愁顔安知復今夕嘉讌集羣彦烽烟雖未息眼底喜不見華月出松杪靈飈散天香主稱死便埋荷鍤童在傍酒酬客哦詩其樂勝鐘鼔柱頭老令威為作八風舞人生不飲酒杯盂空匶前寥寥數千載孰與劉伶賢贈章彦復省掾相約攬秋色淞江來小舟留人十日雨洗耳百花洲祖逖鞭方著張良箸欲籌吾廬吾自愛霜菊晚香幽偕愚隠長老重過玉山草堂次文中韻中秋醉眠金粟堆重陽又捧菊花杯欲從南國隐几卧為約北山禪老來松下低頭拜竒石竹邊隨意坐蒼苔林風澗月足佳趣安知世有黄金臺簡嘉興天寧寺西白長老五月中旬領報書客來兼得問何如天花亂雨袈裟地柢樹重栽瓦礫墟風月三生情分在煙波百里信音疎高秋且喜吳田熟說法開堂響木魚玉山席上分韻得對字勞生紛如蟻出没兹大塊達人獨超然逍遥物之外秋高天氣清喜此良宴㑹蹇予憔悴容亦忝支許輩黄花有佳色青山若賔對飲者醉如泥不飲亦慶快卓彼浮屠師入俗無罣礙笑指空中雲非觸亦非背絶倒草堂翁東壁珊瑚碎挽華亭吕輔之諱良佐人號横溪居士屢却安車不赴官黄金多用恤饑寒銘槐西墅雲林屋釣竹前溪雪浪灘王烈能平鄉里訟龎公獨遺子孫安只今海内文章伯多憶賔筵禮數寛寄郭羲仲霜骨稜稜七尺軀昻然獨鶴睨羣雛門前問字人攜酒舶上求詩客送珠山色隔溪雲縹緲梅花繞屋雪糢糊别來歲晚遥相憶愁絶荒江夜月孤顧玉山移舟月夜過客舎忽聞側室之訃即留别一詩而去别後和韻以訂重來之約畵船月下過江村客舎荒涼笑語溫忽報緑珠飛墮地輕如玉斗碎鴻門蘭臺乆絶行雲夢蒿里聊傾酹月樽攜客東橋重問竹柴門當為掃苔痕代簡牛彦伊客來為報平安信知在長洲茂苑間借榻眠雲僧舎静舉杯邀月客窓寒無家且喜身長健玩世何妨髪已斑三度梅花曽寄否思君長憶馬鞍山題王景逸所藏瘦馬圖將軍百戰自封侯老病誰憐玉腕騮皮肉瘦來渾見骨精神減盡只垂頭長鳴落日青山下獨立西風白草秋猶勝駱駝三萬匹都隨壯士死炎州寄張彦復蘭省歸來日未斜閉門塵静似山家教兒楷字謄書藳遺客生綃寫墨花太伯祠前人走馬姑蘇城上樹棲鴉知君觸處多懐古忍聴吳趨唱小娃和馬吉卿韻寄開天啟長老西望天峰百餘里高僧何日共遊居談禪丈室揮松麈步􅓏長廊聴木魚萬壑秋聲饑虎嘯一池雲氣老龍嘘更㝷香逕靈嵒下與子聊乗下澤車贈馬吉卿太尉初開藩府日我卿長揖與談兵快鞭自此宜先着偉器如何竟晚成舊菊數株荒老圃寒流一帶繞孤城草廬只在齊門裡堪笑無人識孔明山人家為路以道作先生自是青雲人歸來故山鉏白雲家徒四壁藤蘿屋頭戴一幅逍遥巾松根茯苓大如斗木柄長鑱常在手賸收柿葉教兒書更摘松花釀春酒題詩滿屋酒滿船客來無日不陶然人間豺虎自鬭死雲中雞犬多成仙山人家住山林好日日晏眠無事惱笑他東望玉門闗絶域思歸歎年老過牛彦伊寓所對雪口占問訊蛟龍浦來㝷鷗鷺盟天風寒贔屭氷雪歲崢嶸平旦徐徐起清樽細細傾獨憐鄉國逺西望若為情美崑山費知府重脩學宫詩昔侯未牧崑山州州置逺移東海頭百年鄉校風雨毁四郊戎馬煙塵秋州仍舊山侯下馬勸農耕桑重儒雅春秋籩豆駿奔走日月宫牆煥圖寫素王清廟衮龍衣博士高堂鸛雀飛泮池芹􅍨堪采摘緇林草木生光輝時方擾攘人用武侯為斯文扶砥柱同僚才並青雲器參佐功成脩月斧廟前銀杏雙蓋青堂後玉峰開畵屏諸生揖讓秉周禮我侯語言宗六經官清只飲淞江水鱸魚自肥蓴自美齊名常衮與文翁興學之功照青史代道傳招路徴君益上人過西林精舎西林新種梅花樹未有詩人為品題尊酒小窓邀上客杖藜今日過前溪家園小摘春盤菜野徑初乾臈雪泥二老風流堪入畵不妨琴與鶴同攜贈水西長老中伯庸兼簡承天毅剛中禾城說法兩三年貔虎如林䕶法筵一片白雲閑出岫五湖春水濶連天詩堪補世方留稿琴乏知音竟絶絃賴爾峨峰堂上老喜留賔客共杯泉雪中懐杜玉泉玉谿兄弟暨管伯齡對雪僧窓憶舊遊浣花溪上草堂幽弟兄愛客情懐好賔主談時氣味投揚楚兩州城近接吳淞一帶水長流興來早晚相㝷去解劍漁翁覔釣舟元日同趙君綽早赴崑山州烏紗白髪兩遺黎同賦新年第一詩吳下喜頒堯日歴嵩呼重見漢官儀春囘南國梅先得律轉東風樹未知試向馬鞍山上望楚氛猶自暗邊陲訪王景逸不遇其婿梁國傳留宿東齋作此簡景逸并允德阿林隨我曵長裾宿爾幽人水竹居雲暗一天龍吐水溪喧半夜獺求魚邯鄲枕上新年夢光範門前舊日書欲與兩賢論出處還家相見意何如吳生以趙仲穆所書蘇文忠公遊道場何山詩屬張天英緒人及予和之溪流行盡穿林麓白塔紅亭照嵒谷道場深處看何山僧住山頭我山足兩山雲似海瀰漫飛路百折空中盤我昔幽㝷愛僧舎亦欲卜築臨清湍東坡先生不世出咳唾珠璣落禪席可憐前度厄兵燹一踣寶幢誰再植永嘉山水汚歌鬟幸無若人來此間坡詩珍重趙侯寫使我見詩如見山我衰不夢周公旦猶夢㝷山及春半買花載酒約吳生慎勿渝盟重嗟歎同楊鐵崖弔龍洲墓和劉韻排雲閶闔問神州目極龍沙萬里愁匡主首陳天下養和戎深為國人羞方期殺賊懸金印又報脩文記玉樓一代人豪公寂寞春風掃墓為停舟附楊鐵崖讀君舊日伏闕疏喚起開禧一段愁龍川狀元曽表怪冷山使者忍包羞東江風雨一斗酒大地山河百尺樓白鶴飛來作人語道人赤壁政横舟次韻楊鐵崖過李樂菴墓胸中萬巻色絲長才出纎毫補舜裳笑脫廌冠辭柏府羞看狐穴倚椒房結菴投老林泉樂易簀遺言翰墨香鐵笛仙翁今表墓婁人當不愧同鄉次韻寄梅西溪宦情吟思兩如何咫尺婁江不我過呉下土風良不惡春來花雨喜無多三農飽喫田間飯諸將猶揮馬上戈州縣勞人宜莫厭要令襦袴有新歌寄贈費伯謙愛爾青年二十餘無心富貴獨耽書楊花雪落滄洲静艾納煙銷白屋虚門外自馳金騕褭案頭長對玉蟾蜍别來吟得詩多少好寄江村慰索居簡趙執中谿鳥忘機與結盟鄰雞解語共談經簾前花落胭脂雪樓外山開翡翠屏無事干人腰嬾折多情于我眼偏青于今同飲長洲水只隔煙波望德星過悅堂長老看沈香小山適見楊鐵崖所題畵像堂堂之容令人起敬因作此以贈阿師僧中之白眉身長九尺聃耳垂金爛袈裟舊御賜鐵笛道人新賦詩貝葉手繙諸般若沈香誰琢小須彌不知門外春深淺花雨繽紛二六時題恒上人清流堂悠悠黄天蕩菀彼祗樹林水流過堂下一帶清且深要之源頭活澄徹無古今山僧作觀想亦以明其心停雲共徘徊游魚自浮沈三伏不知暑爽氣生綠隂水華晚色凈風柳孤蟬吟嗟哉五濁世干戈如沸鬵客來且忘言滄洲濯塵襟懐道傳上人海上誰知己僧中有此郎借人三畆宅留我百花莊故里煙塵暗窮居歲月長釡鍾時振乏燈火夜分光書摘金根誤詩囊夢草香溪山皆杖屨花竹共壺觴每念馮唐老能容阮籍狂五年同信宿十口賴歡康辟榖終無術飄蓬又遠方世情多可笑交誼獨難忘南國黄梅雨西林綠樹涼思君重迴首湖水隔微茫懐滄海上人床頭不問有金無客到山中酒必沽愛我生來心似鐵逢人為道唾成珠㝷梅幾處同舟去對月常時折簡呼别後合塘春水暖柳隂誰與看飛鳬又自述并簡滄海齋居頗喜俗塵無坐看諸公玉盡沽滿地楊花風捲雪一池荷葉雨跳珠借書日與兒曹讀鄰酒時令老僕呼山上有山曽有約何時雙履作飛鳬和徐伯樞初還膠山作無錫元度子昔年歌舞送觥船每日登臨對乳泉麥秀故基今雊雉花飛南國又啼鵑官軍尚蹀邊城血田舎初生竈突煙只恐歸耘歸未得徴車將到白雲邊次韻贈徐仲剛兄弟難弟難兄思不羣風流絶似太中君對床夜聴山中雨避世春耕隴上雲四株松樹青隂合一帶溪流野色分老我劍心猶未死尚攜長鋏客田文次韻贈慶德謙監州彷彿桃源古洞天幽香兩岸鬬嬋娟煙波鷗作忘機友風柳蟬如脫骨仙田父相過終日醉畦蔬小摘四時鮮棄官溧水歸來早贏得閑情樂酒邊還珠詞寄顧仲瑛并序余以玉山隱君避地居欈李猶合浦之珠徙而去焉今謝杭州當路于吳而州縣更化猶合浦之有孟甞也人而珠者可不還乎因作合浦還珠詞寄君以致招要之意其詞曰嗟爾珠生合浦川澤見光輝采珠人似雨孟甞不來兮珠亦良苦鮫泪竭魚目瞽二嗟爾珠去合浦川澤失光輝龍嗔獻珠女孟甞下車兮魚鼈率舞象罔除吏商阻三嗟爾珠還合浦川媚仍含輝潜居水仙府孟甞愛物兮物無違迕明月出夜光吐代簡錢夢弼六年十見堠山雲愛客情多最憶君社酒每傾鸚鵡盞燕姬屢舞石榴裠漁郎一去仙源隔鷰子重來舊宅焚别墅于今鄰錫谷煑茶還許石泉分絶句屈原投江死揚雄投閣生一時生死計千古是非心夏五雜書使者乗槎海上來藩臣迎詔府中開半年赤地無纎雨此日青天忽殷雷鵷鷺聨班齊喜舞梟鴟脫網莫驚猜征西諸將櫜弓矢應受淮夷納欵囘二遠客相過說帝都黄金如土米如珠内園人歇催花鼓市肆塵生賣酒罏河北功臣稱李郭江南租稅賴蘇湖明朝漕運開洋去原闕三賨布初來價倍高吳鹽重𣙜令如毛淡烹蓴菜羮無豉倒看天吳褐有濤風起秣陵號虎兕天連青海縱鯨鼇長洲茂苑吳山好自媿多憂兩目蒿四綠髪年來忽已皤尊前不樂復如何直如柳惠猶三黜醒似靈均漫九歌無數烏鴉爭晚樹一雙白鳥浴晴波相逢莫厭滄洲静要路從前覆轍多雲文閣為鄒伯常賦光範門前人似蟻君獨幽棲徴不起西窓拄笏看青山東閣垂簾熱沈水非煙非霧非霞氛欲斷復續何氤氲若有龍眠博山底海嶽清氣嘘成文梨花夢醒春無跡一縷猶縈靈壁石白衣蒼狗從變改明月當風自虚寂可憐權門銅臭兒臍燈將然恬不知何當招之入爾室三熏三沐論我詩和徐仲剛歸田山下室環堵門前柳數株青秧移畎畆白水似陂湖避世方躬稼傳家本業儒十年躋仕路兩浙走危途熟路歸來馬高林返哺烏煙塵雖未息風月不虚孤松葉燒茶竈花枝挂酒壺拂塵梭鹿尾席地草龍須鳥雀窺窓隙漁樵來坐隅家居聊放適世路甚﨑嶇池水魚堪養庭階草不誅眼前能自足身外更何需病鶴開籠放飢猿擲果呼看雲添逸興對月了詩逋田父邀皆去村童醉或扶不嫌鄉俗陋敢學古人迂西堠良田熟東膠小徑紆泉香雲骨髓花瑩雪肌膚犬吠溪雲出牛歸田野晡幽居東近海何必更乗桴寄寗伯讓州倅次仲剛韻籠鶴乗軒笑衞公歸來高臥北窓風忘機鷗鷺相依乆滿眼湖山與畵同洗馬池邊楊柳綠釣魚亭下藕花紅自知大器成須晚不與時人校近功次韻寄斷雲法師嵯峩塔廟厭長橋東望扶桑路不遥聴法龍來雲滿室傳衣人立雪齊腰階前祇樹黄金地石上菖蒲碧玉苖猶記昔年相見日為師吹徹伍員簫和沈啟之席上詠梅絶句把酒花前歌竹枝看花不覺舉杯遲春來結得黄金子還有調羮鼎鼐時弔顧將軍墓并序顧榮字彦先晉散騎常侍贈驃騎將軍開府儀同三司諡元公其勲業詳見晉史余甞慕其為人今客吳門適近其墓在黄天蕩南地方二三里土人直以顧榮墓名之予因徃弔焉白髪吳儂說姓名將軍墓近闔閭城徴車入洛稱三俊割炙知人得再生江月似留麾扇影松風猶作鼓琴聲停舟一酹蘋花渚野鶴雙飛躑躅鳴寄徐頥齋先生憶昨天恩頻賜帛數年國步政多艱莫嫌旅舎纔容膝喜有丹砂可駐顔進乳吳姬香玉暖弄雛萊子綵衣斑故園松菊知誰主又見秋風燕子還九日為客東吳年復年吳霜飛上髩毛邊青山滿眼暗如霧白雁一聲哀徹天細看茱萸占老健忽聞桃杏作春妍鄰翁將謂花呈瑞邀我題詩展盛筵送陳希𤣥入道海上蓬萊知有無林泉佳趣即仙都三朝鶴繞燒香几九轉龍蟠煑汞罏滿地白雲山館静隔溪紅樹水村孤敲門莫厭相過客要覔丹書古篆符題梅竹水仙圖羅浮美人倚修竹凌波仙子適相逢春風桃李自塵土不涴歲寒氷雪容代簡淨慈寺顔悅堂長老南屏樓閣照西湖四面雲山列畵圖丞相頻來談般若老禪端坐結跏趺長廊百五僧猶在古井㝷常水不枯獨有門前楊柳樹春風得似舊時無代簡倪雲林江水西頭繋客槎漁莊遥望隔鷗沙枕書門掩三竿日題畵毫飛五色霞杯斝椒香仍臈味階庭蘭茁又春華雪晴我欲㝷梅去尚待東家借鹿車次韻陳惟寅懷古幽㝷度香徑遐思倚琴臺烏喙甞膽日雉妖捧心來春風煽天艶滅國輕于埃二慿高望海湖白馬還來無一杯弔忠魂江風為號呼悲哉抉眼地愁煙暗苔蕪三奕奕讓王宫遥遥延陵墓吳儂奉烝甞春秋幾霜露胡為後之人無復繼高步右姑蘇四寶鼎移炎祚降王赴幽都遂令虎林人得免馬邑屠獨憐金盌出啼殺稽山烏五輦路土花碧金門苾芻闗浮海兩龍馬一去不復還空遺温室樹過客猶高攀六我來銅駝巷葛嶺重行行相逢話師相皆云誤蒼生遺臭千萬年沙堤湖上横右錢唐烈婦歌并序烈婦姓周氏蘇州太倉人至正丙申其父以兵帥貪虐隂結壯士數輩將殺之謀泄舉家被戮帥之子悅婦少艾誘為妻不從痛罵而死今鄉人義而哀之構祠立碑亷夫楊先生為記其事且屬江西陳季子索詩以著其事陳君手持烈婦碑勸我為作烈婦歌人生自古孰無死烈婦之死名不磨本是東滄小家女粉黛不施眉自嫵父母憐惜忍違離納婿于家半年許阿爺從軍氣頗麄欲殺不義奔京都手持芒刃機不宻身落禍坑家乃屠繡衣郎君元帥子少年絶愛傾城美願言攜手與同歸即免梟首尸諸市郎君滿屋堆黄金安知難買烈婦心耳邊言逐飄風過腹内寃含滄海深罵聲不絶郎君怒馬上揮刀斫頭去雙鸞羞覩青銅鏡全家甘赴黄泉路娟娟肌體嬌如雪烈烈肝腸堅似鐵一團寃血注婁江至今流水聲嗚咽男兒讀書峩冠巾偷生或忍忘君親奴顔婢膝曳朱紫得不媿此裙釵人嗚呼得不媿此裙釵人贈馮縣丞野夫東郭帶經鋤田畯相逢為下車百里雷鳴元夕後一犁雨足五更初行庖只飲長洲水署筆頻鈔種樹書獨奈賦蛇除未得逢人蹙額問何如二九土荆榛七八年吳儂挽粟上青天秋風杼柚黄茅屋春雨犁鉏白水田農畆要令無佩犢琴堂政頼佐鳴絃停車為說闕意闕斜陽野樹邊題墨竹吾聞雪堂老仙之愛竹到處敲門看漪緑為誰寫此秋一枝葉葉風生清可掬恍如坐我此君軒與君相對淡忘言焚蘭金鴨綴鳯髓我思古人欲遘止盧知州宜興秩滿以避亂乆寓無錫視同故鄉今知崑山必有懷二州風物之美贈詩言情并致頌禱我思陽羡茶初生如粟粒州人歳入貢雷霆未驚蟄天荒地老經幾年春歸又聞啼杜鵑山中靈草化荆棘白蛇何處藏蜿蜒玉川先生一尺鐵欲刳妖蟇救明月丹霄路㫁肝腸熱還憶茶甌飲氷雪二我思惠山泉長流無古今瓶罌走千里煮茗清人心向來烈火炎錫谷神焦鬼爛勢莫撲池邊墮石亦灰飛此水泠泠瀉寒玉高人飲泉五六年一襟清氣清於泉好為吳儂洗煩熱乗風歸報蓬壺仙可笑崑山州奉省府之命例試在學儒人以余為第三名故有是作可笑秋娘已白頭也隨年少上秦樓舞腰强學春風柳不及春風柳様柔送慶德謙知州漕運之京師兼簡陳子山學士十三萬斛葑田珠一帆南風到直沽天上䕫龍應為喜海中鮫鰐近來無江湖乆臥頭垂白雨露重霑紱已朱寄語玉堂陳學士楚狂憔悴客東吳顧仲瑛避地嘉興幾二年聞囘崑山徃見不遇作詩寄之末篇兼簡西白老細雨清明節扁舟過玉山傳書元有誤飛舄竟無還芳草萋萋碧落花㸃㸃斑題名牆外竹黄鳥正間闗二客來常問訊書去半沈浮兩度黄梅雨相思白髪秋樵蘇今短笠山水古長洲寄與天寧老龜巢賦咏不麥飯歌和徐主簿韻太倉陳陳歲仍熟田舎嗷嗷食無粟朝來飯甑麥新炊一穗新煙出茅屋磨旋日月吐霏屑湯湧波濤跳碎玉耕蓑樵笠隴頭歸急雨森如瀉銀竹妻孥笑語同一飽且免飢雷鳴此腹安知列鼎五侯家日食萬錢猶未足和陸宗望韻贈夏師魯百斛葡萄賸有餘一官不換只閑居窓含雲氣虞山近門掩秋聲栗樹疎鴻雁去來知幾度雞蟲得失竟何如丈夫高蓋非無日聊遣閑情賦子虚寄袁仲長古人心事古冠裳近代伊誰有比方杜甫苦吟頭戴笠管寧危坐膝穿牀秋風落葉多如雨老圃黄花獨傲霜我亦卜鄰依歲晚讀書東壁借餘光謝徐伯樞兄弟膠山下墓田東膠山有牛眠地西堠村連走馬塘乞與一坏藏白骨待看殘夢熟黄粱梅花杏樹堪懸劍竇乳寒泉可薦觴從此便令童荷鍤諸君賢似古桐鄉送費伯謙之吳郡侍親若翁清約似無官宜爾儒衣不厭寒燈火十年勲業在湖山千古畵圖看氷池魚躍共調膳雪屋雞鳴起問安他日過庭煩寄語别來頭白卧江干崑山陳伯康築亭山巔楊邊梅過之題曰玉山高處且為賦詩命郭羲仲劉景儀及予和之神仙中人鐵笛老愛爾玉山雙眼青玉山高處挂手板鐵笛醉時圍肉屏天生丹穴鳯為石東望黒洋鯤出溟人傑地靈風物美絶勝西蜀子雲亭鉛上人席上作有客有客龜巢翁鬚髯如雪氣如虹權門要路脚不到寧與山僧野老長游從鉛公喜不縛禪律百榼沽來作生日雪花似亦為人喜庭舞婆娑俄入室酒邊笑殺東家兒㯽榔不與劉穆之㝷常有客謝無酒有時對酒還攅眉人生能得幾初度且無長繩繋烏兎癡兒夢夢真可嗤不識盈虚元有數君不見黄頭郎到頭餓死錢堆傍何如眼前有酒且為樂毋令愁結九廻腸婁曲書堂為殷君叙作汨彼婁水東連于海爰有幽貞居婁之滙蜑舟岸泊婁人紛拏幽貞有子劬書厥家晨雞既鳴灑掃室堂羞我甘輭閱我縹緗我經我史如耕如桑我服劬勞罔敢怠荒黍稌有田魚亦有梁味道之腴游藝之塲曰父與子欣欣樂康其樂維何匪人伊天憧憧徃來誰其語旃遣愁偶覽青銅鏡方驚白雪髭如何不飲酒猶自苦吟詩面作鞾紋皺腰間帶孔移獨存方寸鐵剛似少年時二茅屋瀕湖住蕪菁借地栽一秋常苦雨十月屢聞雷岸草青青出牆花灼灼開掃除蠅蚋跡還有北風來和危太樸參政韻送慶德謙治中徐驅百騎稳如船雨露新承下九天當道故人多汲引大參佳句獨流傳數年華髪風塵裡一㸃丹心日月邊老驥只今方展足蜚聲當不愧前賢留别知隱愚長老蘇昌齡先生淞江太湖春水生湖邊白鷗㝷舊盟遠公沽酒壯行色坡老題詩慰别情燕子日長書屋静落花風颺釣絲輕相過不負青山約一櫂夷猶兩日程徐伯樞和韻送行予復答之主人送客呼麯生膠山卜居仍有盟綈袍戀戀感君意去國遲遲知我情敎子正須熊膽苦看花應喜馬蹄輕老夫把釣扶桑下目送鵬摶九萬程挽雍逸處士孝友人無間詩書子更賢十年遭世亂三樂得天全處士星今隕虚堂月自圓客來懸榻在老泪為澘然寄謝雙楊沈仲庸并簡同席諸友一林修竹映滄洲百榼葡萄泛玉舟送客留髠成大醉憐君小阮與同遊舊家燕子飛華屋滿地龍孫著錦裘絶似蘭亭修禊日坐中賔客總風流朱明道等九人和前韻見貽各答一首并自述一首新居風景似麟洲我亦頻來繫客舟山列畵屏朱果熟湖開青鏡錦鱗遊疎狂不厭高陽侣彫敝應憐季子裘有酒正須開笑口黄河今復見清流右贈朱志道二先月軒前杜若洲抱琴童子釣魚舟蝸牛有國方交戰鷗鳥忘機且共遊戲綵諸孫頭峙玉瀕湖二頃足莵裘吟餘不接紅塵事洗耳無勞枕碧流右贈明道三楊柳飛花雪滿洲水邊亭子小如舟四時花月供談笑千古湖山可釣遊有客即呼鸚鵡盞無衣還贈鷫鸘裘試聽月旦評鄉里倜儻今為第一流右贈原道四清江濯足坐中洲自喜身如不繫舟槐國功名前日夢玉京辜負少年遊每邀田父同雞黍已學山人製鹿裘醉後劇談今古事面如頳玉語如流右贈趙善良五晚涼池館藕花洲郎罷呼郎放綵舟老膝尚容文度坐佳賔多與阿戎遊長腰米飯猶珍饌五色萊衣勝綺裘莫笑東家人誶語由來涇渭不同流右贈華子强父子六愛君楓落吳江句有客相投放剡舟滿眼雞蟲從得失忘形鵬鷃共遨遊秋來江上鱸堪鮓歳晚山中貉可裘如此幽居良不惡比鄰况復有詩流右答盛彦英七鍊得身形癯似鶴江潮杯渡㨗于舟湖邊舊宅適歸隱吳下諸山今卧遊學道已知磚作鏡工詩更悟冶為裘曺劉沈謝何零落風月平分支遁流右答惠上人八老夫衰嬾慙無學年少才華羡李舟好覔靈槎天上去莫攀仙桂月中遊踞床我欲來吹笛換酒君當為解裘最喜今年秋至早涼生六月火西流右答崔彦麟九少年學士俱瀛洲老夫浮家惟葉舟每憐古調少人聴幸得新知如舊遊四海風塵桃竹杖十年霜雪木綿裘爾來同飲太湖水闕右自述過吳江三高祠三高祠前秋水波客來弔古悲且歌季鷹魯望桑梓敬蠡也籩豆理則那生為越人身相越百計吞吳吳乃滅直憂烏喙將無情兎死狗烹肝腦裂飄然攜家湖海遊捧心人與同扁舟越人誇功鑄金像于吳孰曰非仇讎行裝重寶乆彌厚清高之風絶何有奉甞堪笑木腸兒忍覩荒臺麋鹿走江風蕭蕭楓葉寒扣舷折我青琅玕靈胥怒挾海潮起殷若雷鳴過雪灘寄偰知州兼簡蔡教授使君心似婁江水霜落秋高清復清田野但知耕穫喜閭閻不識呌囂聲背山舘舎雲連屋通海漕渠潮入城公退應㝷蔡文學投壺置酒適閑情病中夢徐伯樞戴時中見過既而伯樞惠詩次韻答之病來呼酒當神樓又得牽絲作釣鈎堪笑生為窮谷叟何妨死作醉鄉侯四壁西風茅屋冷一簾疎雨桂花秋山童浄掃門前路數日頻迎李郭舟中秋日觀朱明道自壽之詩次韻言懷并紀讌集兵戈驅廹十年還此夕珠歌翠舞間出罋葡萄杯灎灎盤鈴傀儡錦斑斑達人不惜千金費浮世能逢幾日閑月裡嫦娥應笑我也將華髪對嬌鬟追和侯良齋秋懷寸絲欲補袞龍衣歲月蹉跎素願違身老江湖心未已夢遊京洛覺還非蕭蕭木落青山瘦浩浩西風白鴈飛慚愧太湖清似鏡照人雙髩短垂絲二出入都無騎從隨杖藜於我頗相宜詩成每得江山助酒病還將麯糵醫杜甫眼前茅屋在陶潜心事菊花知朝來兩袖西風泪遥為鄉人灑肉籬三世事無涯生有涯逍遥誰得似南華龜巢近傍三江水鷗侣平分半席沙稚子學書収柿葉老妻添絮采蘆花客來且共藜床坐莫說金張許史家四垂蘿曲磴絶攀縁挑酒笻枝不挂錢白石路傍如虎踞青松澗底作龍眠一杯且咏重陽日二頃何須負郭田風景不殊陵谷異丹心雪髪兩堪憐六柳庒爲沈太守作彭澤五株柳清風千載餘顧予心乃心修名難與俱所以樹六柳于焉結吾廬門前有流水樹下堪釣魚我柳已成隂豈不懐歸歟人生一趨舎世事紛萬殊善學柳下惠風雨慎守居繼跡子陶子亦曰姑徐徐誰其知此心南山黙如愚九月八日朱原道席上作主人預晏重陽客我老重逢癸夘年醉把黄花簪席㡌笑攜紅袖棹觥船洞庭山色軒窓外震澤波光几席邊不用登臨勞騎從恍如蓬島醉羣仙為吳中行題畵老樹骨立偃蹇秋山氣勢崔嵬閑却一江風月扁舟罷釣歸來次韻答珏仲瑛客僧留客古禪宫湯若爐熏對菊叢佛法不隨塵世變鄉心猶與故人同一林紅樹含疎雨半壁青天截斷虹早晚相㝷東海上扁舟相趁落花風題春江獨釣圖江碧山青雨過時輕煙漠漠樹離離白頭吕望鷹揚去獨釣滄洲是阿誰過崑山王御史墓宋御史王褒字彦先登宣和進士第紹興初上疏論十弊切中時病後告老居崑山逸野堂所著有春秋集傳等書行于世墓在州南乆廢之餘賴知州偰公復之友人殷孝章以其事索詩故有是作先生逸野堂何在仰止崑山有所思麟史立言三傳外廌冠遺直中興時一坏難汚孤忠骨十弊猶存蹇諤辭過客下車翁仲立共看重樹墓前碑簡金君玉峩峩洞庭山宛在水中央山風西北來微帶橘柚香吾有山中居一别今十霜題橘宜有書鴻雁日南翔老懷多感嘅煙火生肺腸作詩報君知湖山迥相望聞杜玉泉臥疾以詩代簡聞君臥讀床頭易世事更新恐未知一國山林包錦繡五湖煙水照旌旗天寒日暮人相憶冬至陽生歲又稀江柳鵝黄春草綠幽㝷當不負前期次韻沈啟之宴飲柏酒春三日梅花信有風赴君雞黍約醉我鹿皮翁凍雪山頭白晴雲海上紅天高不可問吾道未應窮贈慶别駕台州别駕不之官煙水孤村共歲寒偶有濁醪留晚酌旋挑生菜簇春盤三年鄰里通家好四海兵戈行路難且喜門前金色柳東風堪作畵圖看送人妾為尼燕子樓中别綺疏象王宫裡學真如秋波獨注蓮花漏春笋頻翻貝葉書十二雲峰無復夢三千沙界本來虚散花天女長圍繞觀色觀空樂有餘路義道見訪示詩言懐予次一首書畵船來城郭外客窓春作雨隂中一違談笑經年乆又得壺觴此日同江水照人清似鏡山頭戴雪白如翁新詩屬和題青竹几杖相隨許阿戎次鄭起南縣丞出郊出郭問農事哦詩思不羣犁鉏江上雨桑麥隴頭雲馴雉行相逐雄鳩語更聞野翁相勞苦飛蓋倚晴曛上元夜賦雪此夕何夕風作威急雪打我白板扉大如鵠鶴小鷗鷺乗風作陣横空飛老夫起坐驚且喜窓隙壁罅皆珠璣鄰家兒女時未寢看與燈月爭光輝夜深人静燈燭滅宻掩姮娥爛銀闕恍如太極未分時混沌之天無日月須臾忽聴簷竹折驚動老夫方寸鐵直憂壓倒湖上山連我龜巢化魚鱉老龜縮頸牛衣中夜長如歲心忡忡鄰雞三號催曉發燭龍飛出扶桑東口銜火珠光燄紅萬國一照春融融客懐愁與雪俱釋青山依舊撐虚空吳門訪路義道和古詩客來上元夜筠軒照晴雪對雪飲流霞敲氷煑團月誦君詩數篇忘我衣百結一笑看梅花餘事不復說二新年到城市憂思喜一雪復覩漢官儀仍書王正月蘇州古名郡刺史得元結老我愚溪愚無勞捕蛇說贈楊君濟縣丞我思崑山鉏白雲高軒訪我麋鹿羣我今長洲釣明月君適過此寂寞濵感君相知式相好與君談笑開懐抱坐分半席白鷗沙滿目青山浄如掃社公雨晴風作惡村北村南杏花落勸農來徃杏花村雞犬不驚田舎樂君歸哦松坐松隂我舟更入菰蒲深釣鉤無餌勿語人但說煙波無處㝷寄蕭舜卿兼簡虎邱寧居中長老時蕭年八十三矣愛爾林居虎邱寺劍池磐石好林泉一門父子頭如雪十載兵戈命在天故國青山還歴歴春風芳草自芊芊生公㑹有招賢意我亦來從種自蓮達至善自錢唐過訪㑹徐伯樞昆仲諸友小酌以杜少陵春日鶯啼修竹裡句分韻得日字兼旬苦隂雨隂蘚青入室良朋遠方來一笑百憂失闊别十載餘艱虞能盡述喜聞戎馬間猶得用儒術間闗脫虎口壮志曽不屈歸來西湖上飲水獨食蜜中吳舊新知生存百無一龜巢酒盈樽聊以永今日兩兒聆言話諸孫亦繞膝殷勤問生理為我長太息干戈紛滿眼世事暗如漆願言慎所之終焉保貞吉雪舟詩為王照磨作雪中傲兀乗孤舟千載復見王子猷吾知君欲記高興君聴我言當㸃頭男兒胸中有兵甲筆底聽滔水三峽正須擊檝誓中流雪外蓬婆爭蹴踏長驅夜入懸瓠城指揮鵞鴨混軍聲生擒逆䜿取金印江海却㝷鷗鷺盟和沈啟之早春書懐水光山色浄無塵滿眼東風景物新繭栗犢眠芳草地木蘭船繫緑楊津莫嫌頭上鬔鬆雪且盡杯中㶑灎春鶴自乗軒鳥自好滄洲鷗鷺與情親簡錢仁山一榻青苔對雪五湖春水流澌欲遣長鬚覔酒同拈秃筆題詩二月七日和徐伯樞排悶人生百年能幾何有酒快酌金叵羅已看蓬髩㸃蒼雪莫待桑田變白波東風花外鵲聲喜落日城頭烏尾訛君詩到手客在座擊節聴我玲瓏歌伯樞以啟之韻作詩見贈復答一首蕭齋孤坐席凝塵喜得君詩字字新四海交遊期管鮑一家兄弟比椿津多情燕子重來日絶色桃花不負春媿我少年書劍在白頭無復報君親贈星術王逵夫虞廷命官非不多歴象必先羲曁和羲和去今數千載名與列宿俱嵯峨先生本學羲和氏聊爾談星隱吳市二十八宿緯五星上繫天時下人事先生為人推吉㐫一天星斗羅心胷河圖洛書造化窟妙理貫徹精靈通齋居垂簾坐終日金鴨焚蘭煙霧碧客車載酒來問情先生舌端飛霹靂每將忠孝語臣子不惜忠言逆人耳天降灾祥本在人人能轉移天亦喜君不見宋君三善言熒惑退三舎天人果相孚大咎亦可謝又不見韓退之命在斗牛身坐箕遭讒受謗能自知怡然高咏三星詩吾儕此理或未析請從先生考星歴和郜彦清州判暮春寓僧舎治最功成解印歸春風綠髪未應稀如何拄笏禪床下閑看孤雲倦鳥飛二沈水香消午篆煙僧房聊借石床眠多羅樹上頻伽語絶勝天津聴杜鵑三篋藏緗帙沁雲香手閱金經掩竹房門外不知春早晚綠隂滿地日初長雨中寄友人春風冷凄凄煙雨晝暝暝相望隔重湖幽事頗闗情賴有小吳牋可以寫心聲心聲寫難盡况無雁南征出門泥没膝恨不生羽翎隔窓兩黄鳥花間語嚶嚶頺然枕書卧一榻莓苔青龜巢稿巻三欽定四庫全書龜巢稿巻四元謝應芳撰詩楊縣丞董役開白茅河晝夜勤以詩代簡畚挿如雲穿白渠客来喜得問何如行庖只飲婁江水俸米頻供擔石儲人起四更燒爉燭霜飛兩袖坐籃輿殷勤左轄銀缾酒為報功成有薦書劉旭齋過婁江客舍作詩贈之方欲題詩寄草堂逺勞移棹過滄浪十年同飲三江水一笑相㸔兩鬢霜田野無人鴉種麥漕渠通海蟹輸芒憑君莫語悲秋事且復持杯送夕陽玉田䘮側室作詩悼之余亦次韵以相其哀目斷琹臺日暮雲相如無復見文君最憐機上廻文巧更憶燈前教子勤繡箧熊丸香尚在綺牕鸞鏡影初分江村一月黄梅雨誰為衣篝爇寳薰五叢涇送玉田徙碧山與龜巢隣居傾葢雨兩月同客天一方君今挈家去宅我龜巢傍為聞碧山好宛在雲水鄉朝紳多寄寓群髦富文章將尋鷗鷺盟與我同六藏老婦堪夜績東壁分餘光客至亦可留覓酒過短墻巷無車馬塵屋有汗竹香籯金與床笏笑視俱亡羊惟存廣文氊讀書坐藜牀閉門樂吾樂疏食猶膏粱清風北忩下懐哉古羲皇寄鎦景儀先生杏花春雨晴時别蒲栁秋風又颯然笳鼓新城嚴警邏溪山幽館喜安便校書還照青藜火煑茗應􅆽錫谷泉近遇故交聞有信逺勞埀問念無氊龜巢仍寓黄天蕩鼃竈今連白水田自分犁鋤聊卒歲可堪兵革更飢年家居食指一百廿斗米緡錢八九千𤨏𤨏旅懐言莫盡知君憐我似䕫蚿寄顔悦堂長老及崑山諸友薦嚴永懐二方丈雙徑歸來舊竹邉林風磵月兩依然崑山特立烟塵外婁水東流渤澥連坐有故人應念我客無此老共逃禪南能北秀煩傳語秋晚相過飲菊泉杜子才掾史擕詩見訪次韵白首無機心江鷗最憐我復有新相知時來與閒坐一凉初過雨七月正流火先鞭君已着短鍤我方荷壯君早騫騰先我常轗軻憐君幸如此数見何不可茒茨湖上居菱芡水中果後㑹期碧山合歡呼白墮更邀詩酒侣共載書畫舸中秋月如晝西溪捩歸柁玉山顧隠君自嘉興荅詩詢僕近况且云徑山禪老亦望一見故復用韻自述簡諸故人數椽茅屋一笻枝萬事無心獨愛詩詩債隔年償未了帶圍連月孔頻移呉田積雨生禾耳笠澤西風斷桞絲眼底故知俱契濶抱琹何處覓鍾期次韵荅戴德隠見贈我生無他長耽書竟成癖鬚眉皆雪霜肝膽如鐡石所頼識前賢頃歩不妄適向來走風塵朝不能慮夕行囊既羞澀家累且繁劇隨身一破硯百指全仰食驅馳今九載未始一日閒豈不懐故園松菊怡我顏長蛇及封豕出沒咫尺間逢人問親戚野坐荆屢班不見雁足書徒眎刀頭環遥憐金斗城如望玉門樹憶昔重九時鄉隣約雞黍黄花香可愛白酒味不薄東家復西家相邀總難却負郭有二頃平居得三樂朋㳺結詩社時時共吟噱溪澗采蘋蘩春秋奉祀禴㡬廻乗天風欲跨揚州鶴那知一顛沛江湖竟漂泊移家碧山下家具少于車幸君適相逢同念去國賖聚如水上萍散若風中花或琹教河汾或𤣥授侯芭交情比投漆子弟亦通家詩筒頻往來瞬息經兩稔壯君多志氣將衣買臣錦老我忘功名但就吕公枕三江五湖水共喜魚不淰茰觴了佳節藜床甘且寢春日方遲遲秋霜俄凛凛好客多釀酒願作東林沈寄丁彦誠旌旗滿眼各西東君覓桃源我轉蓬兵後即知還舊宅客來曾辱寄詩筒石田種秫梁溪曲茶竈分泉錫谷中最喜西忩山色好青霞不染俗塵紅贈沈彦肅典史兼簡王景德空山寒雲白如雪歲晚高軒過巖穴三生石上拂蒼苔一笑梅邉有明月牀頭釀得松花酒思與故人傾瓦缶煩君為問王子猷剡舟肯棹同來不旭齋歌次鐡笛先生韵旭先生行年七十餘躭書樂且孺白駒過隙莫可留欲把長繩繫烏兔囊無一錢任羞澀腹有羣經飽撑拄論交貴在見肝胆不學時人口相煦有時醉吟詩其巧猶瓦注快若爬背癢十爪倩仙嫗昔賢只讀圯上編便遇君王借前箸先生豈無策可用草廬未有人三顧青山白雲古畫圖筆牀茶竈今家具居吳十年食破硯硯田幸喜無租稅秋風籬落桑葉隕枯蔓蕭條繫寒瓠西伯何當獵渭濵載取非熊後車去次韵寄題鄒朋夀草堂并簡劉旭齋賓主東南美溪山繞屋廬經鉏百戰後版築十年餘木落西風急忩鳴夜雨疎侁侁二三子燈火案頭書荅楊獻可見贈憶爾梁鴻山下宅園池不減李文饒一朝猛雨鶯花去十載東風燕麥揺客裏相逢聊慰藉樽前一笑共歌謡君歸不負青山約好似淮南早見招簡呉江朱志道昆季去年長至聽塤箎轉眼今年又此時棣鄂喜存兵後樹梅花早綻雪前枝西山近日無烽火東閣何人共酒巵兒軰北歸今問訊呉音變楚莫相疑盛彥英隠居太湖之隂號具區耕叟命僕作詩以歌詠其樂去脫屣東華塵躬耕太湖濱桑麻接隣里魚鳥情相親閒時讀書牛背上安知六國方攻秦東風二月桃花雨布榖飛來向人語一犁初破隴頭春黄犢出䦨徤如虎羲農世逺莫可追南山石爛無足悲悲歌笑寗戚夜半猶未已人間閒是非何用汚牛耳我田已耕春晝閑樵童隨我㸔青山日暮歸來一壺酒我歌嗚嗚童拍手童拍手兒飯牛一天星月爛不收重捻鐵笛作三弄七十二峯俱㸃頭小至九年至日悲流落一笑今朝醉醱醅兒子歸來十里外老妻歡喜兩眉開宻雲藏去黄棉襖輕雪飛來緹室灰遥念故園歸未得竹籬為我䕶寒梅臘月臘月無多日行年六十三浮生空自老往事日多慙南國山皆赭東郊草未藍蕭條江郭外雲暝雪􅆴􅆴懐野舟閒長老兼簡真本元大地北風寒且嚴香凝丈室晝埀簾庭前栢樹心相契牕下梅花手可拈出郭鐘聲聞數里穿城塔影見重尖欲求智永千文帖煩說區區寄口占古鼎歌并序中呉萬夀寺舊藏古銅鼎其欵識有云王在周康穆宫冊錫寰用作皇考鄭伯姬尊鼎大德中任陽謝氏嘗欲以重寳易之時住持㸃翁師不從後謝氏為構佛殿㸃遂以鼎荅之至正丙申謝遭兵鼎因失去甲辰夏四月愚隠智公乃得於軍人之手耆舊聚觀皆曰我山中舊物也既而出鼎見示且徴予詩以紀之碧雲師着金伽黎空王殿前龍象隨一夫長跪送古鼎狀若獻寳波斯兒羣緇來觀集丈室中有老僧前致詞云是山中舊時物立誦欵識能無遺惟有臣寰紀君賜用顯厥考鄭伯姬文詞詰屈錯盤誥字體隠伏蟠蛟螭蒼姬紀錄世屢改不知何代來於斯謝家寳樹易趙璧巨構賈與秦城齊鼎兮鼎兮什襲去歲踰數紀今來歸師聞此語重歎息兵火連年炎九域金鐘大鏞棄路旁總若沉沙銷折㦸珠還合浦獨無恙䕶持信有天龍力摩挲兩鉉濕煙霧錯落丹砂映金碧濁水摩尼五色兼出海珊瑚髙一尺嗚呼羲軒之鼎莫可求禹鼎亦已淪東周世所用者非爾儔或膨豕腹徒飽羞調羮爾無與覆餗爾不憂歸來兮歸來北山兮菟裘汾隂自有為時出切莫放光驚斗牛歲除前一日寓姑蘇與友人卞于珍守歲姑蘇城外小湖邉寂寞僧房借榻眠詩稿冩成丁夘集歴頭檢盡甲辰年中原喋血人争地南國啼飢水拍天起坐夜深如守歲屋山風雪灑寒氊偕徐伯樞訪王孟翼酌酒論詩經宿而别舊雨客來今復來溪堂新築栁新栽風生玉麈談詩律露濕金盤把酒杯淮甸三邉烽火熄呉山千里畫圖開相如來奏凌雲賦當路疇能薦逸才劍池送曹廣文赴學士院檢討峩峩虎邱山湛湛劍池水水深人莫測草生寒不萎世傳祖龍劍斫斷蒼雲根千古兩絶壁鐵花㸃苔㾗僧厨轉轆轤隂崖落氷雪臨池人有語響荅出林樾先生屢幽賞盥沐彈鳴琴木石俱㸃頭魚龍亦知音今居白玉堂還念青山約羣仙與重逰増輝舊巖穴雨中懐徐草堂兼述杜掾史求詩之意亂紅飛盡綠隂稠風雨凉生四月秋且喜三邉清似水何妨一室小如舟歐虞墨帖時臨寫呉越青山總卧逰肯為杜陵題老桂難兄應作置書郵和浦玉田清明日郊行湖上新堤踏軟沙少年人面映桃花花村風物渾如舊獨欠青帘賣酒家二栁絲裊裊拂蒼波花雨斑斑㸃綠莎寒食清明春又晚人生不樂復如何三笠澤西頭王墓村桃花水沒竹籬根年年春到清明日兒女郊行栁挿門四一幅春雲巧似裁隔湖飛過碧山來野橋小立題詩處夾竹桃花爛熳開五四望青山眼欲花山光都是薄雲遮杖藜徐歩歸來晚月上東忩恰到家六每惜春光去後思春來行樂復何辭放舟莫近呉門去諸將樓船正出師夀徐伯樞碧山湖邉銀杏樹數百人家星散住中有南州高士孫借屋讀書深閉門豈無香醪甜似蜜好客相過方與喫朝來爛醉呼不醒蓬矢桑弧挂虚壁皇天有意生男兒錦繡五藏璚瑰詞亂紅飛去綠隂静菖蒲花發當何時贈葛天民吾聞清孝公為君八世祖可憐遭亂離麻鞋走塵土牀頭無金何處索堂上雙親頭欲白五星躔度書一編江湖乃作談天客吾嘗閲其書心目俱茫然星辰之高四萬八千里三百六十五度分周天人生兩間應列宿探索豈易窮幽𤣥君今自喜得其妙回視筌蹄成一笑萬象森羅方寸中千尺碧潭寒月照髙談往往驚倒人黄金捆載歸養親鱸魚斫鱠􅅅紫蒓褊􅝆五色斑衣新人家生兒孝養有如此何必鐘鳴鼎食重華茵扁舟過我三江口留宿龜巢㸔星斗欃槍熒惑總莫論且道酒星無恙否酒星茍無恙酒禁必早開娯爾白髪親酌彼黄金罍我生不願萬户侯亦不願識韓荆州但願太平無事百不憂吾兒賣文君賣術得錢可以沽新篘命呉謳若翁與我日日眠糟邱崔宗明掾史請告之錢塘省母將徙居來呉時太尉丞相張公在分省嘉宗明之行贈錢數十緡故詩及之丞相知君念母情金刀錯落贐君行衣冠祖帳三江口帷幔歸舟㡬日程烏鵲知人先喜信鱸魚入饌試當烹髙堂若問呉門事王國金湯第一城和浦玉田咏物嗟爾五月菊黄花發何早平生傲霜枝乃雜半夏草趨炎真強顏乆雨竟埀老榴裙炫人眼坤裳為誰好忍負陶淵明秋風舊懐抱二嗟爾六白蟾爬沙出何遲天生一腹皤且有三足竒乖時人共棄保身自汚池昨午遭磔死同類多可悲月官老蟇精居髙知不知寄鮑仲孚提舉風雨蕭蕭五月凉堦前書帶草應長心傳千古文章印名重諸公翰墨塲官舍㸔山閒挂笏齋居掃地静焚香野夫别後遥相憶一榻青苔兩鬢霜寄陳子章申屠仲權聽雨聽風半月餘高齋吟嘯興何如雨添泮水芹芽長風撼帷林杏子踈毛頴功名應立傳杜康交絶豈無書陽春白雪詞皆妙好寄龜巢慰索居賀陳子經赴學士院著作白玉為堂置此身詩書端不負人人生花綵筆絲綸羙栁絮宫袍雨露新日過八磚趨禁署天開一國用儒紳呉淞江上漁樵客也為謳歌寂寞濱
