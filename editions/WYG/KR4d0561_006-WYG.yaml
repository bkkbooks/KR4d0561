漁樵朝出暮歸歌且謡白紅荷花紫菱芡􅍉苕蘋蓼蒲蘆茭髙齋讀書歲年久鍼經一編常在手客來問疾或問奇拄杖挂錢舡載酒人人有此林塘幽不妨未老先菟裘地因人勝從此始千古萬古芳名流端午後雨阻過詹氏蘿屋即事賦絶句二首代簡風打舡頭輓不前舡回雨㸃大如拳請看六日蟾無用且得爬沙手脚全二瀕溪數家風景幽溪流過門東轉頭黄梅雨少麥大熟買布輸官不用憂人面獸懲元惡也惡不可縱天不可欺故作二詩以懲之人面獸長七尺人衣冠人飲食面有七竅皆人形猛獸之心人莫測生來害物固不少羣居猶自藏牙爪一朝忽欲咬殺人豹麝文熊皆驚倒二人面獸聽吾語一人受害一家苦爺孃妻子令失所殘忍胡為至如許人言汝性多隂毒中汝毒者恱汝目快汝腹汝心方饜足嗚呼馮婦或再生獸乎獸乎勿横行恢恢天網布八紘莫道網疎可漏天聾盲追悼諸葛用中諱端幼年能寫大字既習舉子業學琴袁子方先生之傳父號徳齋晚學道創清微觀揚子江南疇曩日吕蒙城裏一文星科塲早試程朱易𤣥學旁叅道徳經愚與通家心甚赤賢能知巳眼常青草生書帶人皆喜竹作詩筒使不停著處溪山朝載酒有時雪月夜揚舲卜鄰晚欲從王翰分席尤加敬管寧一旦谷陵驚變改十年兵火苦飄零扣門幾誤風敲竹泛宅長如雨打萍天上玉樓俄有召月宫娥藥竟無靈細君冠佩全貞節先世箕裘祝寧馨名溢東吳滄海國魂歸北固白雲屛兩家相去百餘里一老今踰九十齡聯句每懐吟石鼎聽琴頻夢坐柯亭柱題應有能言鶴擬踏秋風去一聽寄鄧秉文二首曹横山下聱叟吕蒙城中放翁何夕舉杯邀月中秋鼓枻乗風二鐵柱硉矹二老璿霄沆瀣三更絶口不談時事掀髯聨敘平生寄陳彰逺明逺兄弟金牛臺下帶經鉏長鋏無聲食有魚兄弟五人雙璧在箕裘三世一廛居中秋明月最端正長夜浮雲或巻舒覔得丹梯上天去同將物理問何如寄辛至善青年即著逺遊鞭白首仍居小市廛寂寞蓬蒿三徑在辛勤父子一經傳奔牛堰下水到海射虎亭西山揷天我欲抱琴尋戴去中秋相近月將圎寄清微觀周泉石塵揚滄海廿餘齡真館翬飛壓庱亭風掃刼灰南土樂天開圖畫北山青丹砂九轉龍蟠鼎玉漏三更鶴聽經諸葛仙翁呼不起正須金石播遺馨三笑圖簡寂先生五栁翁襟期適與逺師同過橋相送忘相别千古風流一笑中風雲雷雨畫四首吹嘘萬物生蘧廬盎盎元氣槖籥吁偃禾㧞木有未㑹請君細讀金縢書二漠漠閑雲淡淡容不為蒼狗未從龍直須霖雨成功後依舊還山伴赤松三金電光中霹靂飛殘臣膽落震驚時雲收雨散青天出能聽無聲有阿誰四誰挽銀河沃太空恩霑赤地洗爞爞隂隂夑理天家喜都在丹青筆意中野雲歌為王元一羽士作山中之雲歛蹤跡空谷深藏伴泉石從龍之雲雷電俱四方行雨勞馳驅飄然一片雲在野看來最是悠悠者或舒或巻無朝夕南北東西随所適道人含笑松下坐我即是雲雲即我買臣讀書圖噫予㑹稽守素行何卓絶采樵工或餘誦讀聲不輟青柴擔頭春赤脚林下雪富貴知有時妻子從改節髙風一如此後世誰可埒吾將訪遺蹤更得探禹穴薦福寺紅梅詩紅梅閣事見毘陵志等書庚溪詩話載程致道詩有春風日浩蕩醉色回冰肌之句元末兵燬今本山釋源公竺淵恢復舊刹重植兹花丐予詩記之紅梅閣下梅花樹陵谷變時風㧞去堯峰老禪歸故山覔得孤根栽舊處年年春到花時節一株五出胭脂雪春風笑面歲寒心光霽混融風韻别老禪道服忘妍醜品題假我扶犂手黄州定慧海棠花可與齊名傳不朽月香水影象王宫雜花世界將無同幾度拈花有人笑吾將請問瞿曇翁源竺淵以道西傳等和予詩亦蒙見贈且云臨字等韻難和予由是復次韻酬之支許論交世所欽昌黎亦聽穎師琴深山大澤多遺逸明月清風無古今閣下梅花桃杏色庭前柏樹海潮音寫容代有丹青筆電目誰能一照臨獨孤公檜詩唐獨孤憲公為常州刺史時有手植之檜今見諸郡志等書元末樹毁於兵至二十餘年為州民者宜再植以寓思賢之意况有周鍊師為松菊主者乎率爾口占呈乞諸搢紳先生更唱迭和相與贊成亦庻乎厚風俗云憶年十五六好古尊前賢初聞獨孤檜快覩曾争先蒼然一株枿舊根皴皮錯節枝葉蕃適逢夜雨半身濕疑是徃年甘露痕孔明廟前柏相似乃在陳司徒廟之後園鄉來陵谷忽變改化作刼灰飛入海神焦鬼爛救不得桐鄉自此無光彩幸存一曲闌干石題公姓氏留遺跡石苔斕斑土花碧相伴銅駝卧荆棘余從海上避兵歸幾度摩挲長太息懐哉古之人好賢意無窮詠甘棠愛召伯賦菉竹美武公憲公此樹堪比隆後人寧不仰髙風𤣥都道士桃千樹一檜區區豈難措龍鍾野老及羣英亦愧因循坐遲暮檜乎檜乎重培植風枝相樛霜幹直邦人具曕仰遺徳見樹猶如見顔色六百二十五年如一日題牽牛圖為丁學古作不放桃林不飲池叶唐何切牧兒牽去意如何南山石爛今非昔寗戚無勞扣角歌題鷺鷥便面為丁學古作潦倒滄洲客蕭騷白鷺詩牧之呼不起此意少人知出門老去多懐舊興來時坐馳出門窮鬼笑罄室故人知野飯新菰米詩囊古竹枝諸孫溪上别矻矻問歸期題僧綱澹泊軒我愛澹泊軒山居城市中雲分半間許雨溜四壁同風林金石聲道人氷雪容澹然味無味泊然空不空露坐㸃頭石雪立摩頂松吾徒幸相與吾道喜不窮一笑兩忘言落花舞回風江山漁樂圖數口妻兒網一張船為家舎水為鄉江南江北山如畫欵乃聲中送夕陽崑山王有恒以書附常州天寧寺長老寶公問予近况作詩答之并索諸友賦重植獨孤檜詩客從笠澤來常郡書到横山問老夫哭子哭孫家已破賣書賣劍酒還沽千墩每入龜巢夢十月應開獸炭爐支許舊遊煩寄語肯題唐檜和巴歈黄林屋許贈皂布巾不至戲作此索之霜倒蓮葉巢老龜寒縮首欲裹緇布巾并裹瓦盆酒此酒今已熟此巾曾製否抱膝梁父吟炙背坐南牖老况知音誰横林隱居叟贈天寧寶滄海臨濟雲仍幾代孫猊牀說法象龍奔庭前銀杏西來意陌上銅駝東郭門四海共霑新雨露一舟能泝古淵源留衣人逺衣何在别有伽黎遺後昆悼城西周彦美二首七十六年事梨花夢裏春家傳三代禮身作兩朝人負郭田園樂連雲第宅新闕麒麟二三槐堂上客闕最青春吐酒常憐我奕棋多勝人闕竟作白頭新釃酒橋𤣥墓澘然為泣麟寄饒州鄱陽縣唐生千七百里鄱陽縣外孫書來如見面九十三歲龜巢翁中宵夢得重縫線詩瓢山人來上游吾將結社招馴鷗延陵昔日繼三讓野水何處無孤舟貧家幸爾年榖熟買書教兒耕且讀梅花無恙竹平安歲晚無勞念窮谷和舒文允見貽冬至經旬久朋來喜踐長市沽雙木榼踞坐一藜牀小酌成歡洽閑愁付杳茫山無白石爛谷有紫芝香澹泊聊相與辛酸已備嘗盡消湖海氣莫放斗牛光所貴心能直何慚貌不颺聽冰狐自惑吠雪犬何狂歲晚鷗盟在生平蟻夢忘酒堪澆磊塊袖莫舞郎當西崦黄茅嶺東洲白水鄉漁樵同此樂吹笛送斜陽夏五訪一舟禪師臨别立銀杏隂中謂予曰山中舊物什䘮八九唯此木幸無恙也宜蒙品題為天寧勝槩使居山者亦預有餘光余謝不敏然心嘗許之故兹口占以頌人物具并之美一箇虚舟渾不繋千鈞重負力能任金園地湧靈光殿銀杏天生䨇樹林佛印衲裙坡老帶昌黎詩句穎師琴禪林勝事無今古况爾庭前好緑隂輓曹子毅大使早歲輕肥試采榮一官三載繋塵纓解龜便作幽棲計𤓰圃東門學邵平二桂子初生折媆枝青氊舊物遂陵夷竹林小阮親調饍何異慈烏返哺兒三生來不鑿混沌竅此去竟作逍遥遊回頭一笑看鷸蚌未到釡鬵誰肯休洞庭胡敬之以予父執之交歲饋新橘凡十有餘年感無以報是用作歌湖山清氣鍾而翁生兒亦有古人風年年送橘拜牀下甚愧我非龎徳公今年霜落洞庭早橘熟等於葑田稻青衣童子黄金丸樹頭摘來霜未乾儂家食指百三十分甘喜得皆波及嬌癡堪笑兩曾孫手㺯金丸口欲吞阿翁老饕三嚥畢教孫食之還自喫一枚一枚復一枚翁有笑聲孫亦咍枯腸久似長卿渇甘露適從仙掌來楚江萍實不可得華峰藕亦無人識冷比雪霜甘比蜜此句真堪題此橘韓子之詩今代無借作報章揮我筆懐哉故人家洞庭七十二峰環翠屏洛陽秋風塵滿城莫能汚爾雙鞋青南山不爛黄河清正須坐閲三千齡山中舊識諸耆英莫煩老夫多寄聲紅梅前代支郎亦異哉白雲堆裏植紅梅樹經刼火多番換花向春風二月開鄰舎杏桃渾赧色禪枝草木絶纎埃一時想像題詩去别日尋芳載酒來歲旦言懐去年元日兩眉攅情抱今朝頗覺寛一夜雨聲曾不絶五更天氣只微寒二曾孫杯捧屠蘇酒冡婦厨供粔籹盤最喜催租人不到田家雞犬得平安寄盧長嬰次農我思東吳諸故人二難青年才出羣炯炯眼如巖下電英英氣作山中雲一經㫖趣熟儀禮六書偏旁宗説文無由縮地即相見晉鄙亦得沾餘薫寄辛彬甫五鳳添修助益箋雙魚書尺竟虚傳桃符忽爾三年換木榻如今兩膝穿南國鶯花春甚早東洲雞黍約如前好來同賞元宵月莫返山隂訪戴船和毛伯尚雪中登塔一夜雪深三尺許江南江北久無之躋攀鴈塔最髙處想像鴻荒未判時光動山林揺玉樹氣涵湖海湛瑶池僧房或擬天花雨田舎皆占隴麥宜黄竹無歌良可喜清河有頌不妨遲八千里外多遭貶十二街中欲訪誰白戰正須逢敵手長吟聊復解人頥凭欄細聽風鈴語似亦知音說好詩壽諸葛節婦憶昔梁鴻歌五噫挈家避兵東海涯玉樓有夢上天去孟光無復案齊眉旌旗滿眼愁滿腹抱兒日夜吞聲哭沙湖㟁竹似湘江淚痕斑盡依依菉呼天籲地吐丹衷柏舟之誓共姜同桑田變海得歸路庱亭故園榛棘中教兒服勤能構穫青氊舊物兒堪託星冠霞佩蕋珠經萱草堂前樂吾樂春秋六十有八年時人喚作女中仙麻姑送酒作生日雙成獻桃紅且鮮髙堂長夜照明月何異嫦娥廣寒闕不勞白搗𤣥霜真修自有長生訣仙家歲月我不知我來為作節婦詩他年烈婦傳中寫千古萬古芳名埀獨孤公檜詩并序予前詩謂獨孤公檜在陳廟蓋圖經所載及予親身見之一日郡人徐孟曾問曰唐刺史為一州之主手植之檜宜擇美地公表而出之衆所共瞻何寘諸陳廟之後耶予曰按唐書徳宗朝徙公為是州刺史去梁公毁江南滛祀之日未久無陳廟也唐衰禮廢淫祀寖興迨五季而禮法大壊叢祠之神類加尊號陳廟或肇於唐末而盛於斯時今荒園廢沼安知非昔日驛亭傳舎乎厯宋而元皆無改作故翁巻之詩有曰托根陳帝廟應不慮樵夫其意不以此木為不幸而反以為幸也可勝歎哉孟曾然余言遂植檜舊所予亦恐前詩為人口實因復作是詩獨孤之檜化烏有庻士重栽倚碧潯遺徳一州人眷眷流芳千載樹隂隂霜根蟠入龍蛇窟風葉響成鸞鳳吟願若甘棠無翦伐報公疇昔愛民心寄聰上人嘗託補楞伽經脫簡就用索之杕杜之歌落九天石尤風轉送歸船長洲茂苑渾無恙翠竹黄花總是禪眼孔不教迷土苴耳根常得洗風泉貝多葉上楞伽語脫落應能為補全題顧師道樓居晴空圖山孱顔雪斕斑飛樓縹緲層城巔水晶榱題白玉闌樓居之人應列仙金烏出海飛上天藍田瑶草煖生煙誰家馬上郎意態清且閑既非謫官遇雪阻藍闗又非春風得意遊長安摩挲老眼仔細看乃在櫟里先生圖畫間碧桃贈吕城􅄵官應孟㳟猗猗谷中蘭鬱鬱澗底松我愛之二物幽尋庱亭東路逢碧桃花澹然無冶容吾知所笑者羣芳鬭青紅本來天上種有此林下風老况哭子三年孫兩年一孫戎服又西川秋風茅巻藏書屋春雨苔荒負郭田堪笑平居能濩落誰知末路竟迍邅空林樹折烏巢毁奈爾孤雛失所天雨中期辛彬甫不至兼憶兒子林孫塏等一時口占二絶句雪尋戴逵興不逺雨過蘇端意甚濃若使兩賢生並世浣花溪上我遊從二一雨能生五月寒三杯欲釋兩睂攅那知酒入愁腸去化作澘然淚不乾謝饒州周氏甥孫女惠鞵昔領軍一屋之鞵未聞有惠人者今唐伯亨室人製雙鞵遺我於一千八百里之外其親愛之心可謂篤矣然則茍非伯亨之真其室中之人安能遂體其心哉區區報章豈忘所自故著其説如此詩曰濯足洮湖寂寞濱寄來雙屨藕絲新何當化作飛鳬去謝汝慇勤念老親贈盧長嬰次農憶昔盧兖州生有古人風病世禮俗壊或與禽犢同遺經授子姪世業今専攻騎箕去不返象賢躡孤踪平居迭師友砥礪相磨礲東海雙南金豐城兩神龍含光若暗投天將振儒宗叔孫自綿蕞制作成治功潛心對黄巻儼然見周公妙理析秋毫百世開羣蒙追攀大小戴旁叅鄭司農復看書帶草匝地生婁東顯親埀令名永言報而翁寄南宗僧綱大空寥寥雲自浮驕陽蟲蟲金欲流白生一室静如水清坐六月凉於秋陽羡好茶留客共獨孤多檜賦詩不官様文章祖蒲室正須述作賛皇猷寄一舟禪師葱葱䨇樹林井井百丈規欽欽響鐘鼓棣棣慎威儀空庭苾蒭草浄瓶楊栁枝滿眼皆祖意此身丁盛時熱客不相過清風堪自怡或翦葛藤話竟織駢儷詞陵谷變未久山水知音希我本六日蟾眎同五總龜儒墨各有趨支許交忘機眷言獨孤檜曾覔一二詩禪縛想自急詩筒來乃遲南風非不競北山何用移請拈木毬子聊作逢塲嬉寄講主法師西𫝊懐哉久别廬山逺奈此相望去路賖屢夢丹梯同上塔每留清話竟忘家芭蕉手種繙經葉菡蓞池開結社花三伏不嫌人褦襶一肩偏袒佛袈裟竺書自早探三藏緗帙如今載五車方寸静涵滄海月文章光炫赤城霞尚憐老馬能知道更喜神羊解觸邪早晚蓉湖秋水碧定期濯足過漚沙懐詹伯逺蝌蚪殘書補未全齋居一榻坐來穿稻花遶屋白如雪溪水出湖青接天冠盖不來騎馬客鷗鳬長傍釣魚船多時欲問平安信伏日題詩寄竹邊寄贈岳陳齋二首一書曾寄訪行窩百里相望阻滆波陽羡谿山無恙否延陵風俗變來多鵂鶹夜集連雲厦荆棘叢生注馬坡尊酒欲懐千古意中秋蘿屋候經過二南山爛石無多在東海颺塵又廿霜奇字盛傳揚子學徳門誰表鄭公鄉秋髙丹桂花纔發閏後黄楊樹必長㑹有龍蛇生大澤流芳竹帛繼先王寄薦福寺源竹淵青門薦福東堂老白首黙誦西方經有時適興倚梅閣無復談禪坐柏庭解夏欲随雲水散立秋忍聞風葉零老禪心性一如此說頂㑹有伽耶鈴寄贈吕城羽士周泉石仙風飄飄天骨奇不皤爾髪黄爾睂海上鐵船渡九折道傍闕金狄知松花釀酒常留客竹籜裁冠自賦詩不解腰纒要騎鶴道人應笑俗兒癡索居無聊自七月既望至中秋前九日腹稿得小詩十首不追琢不詮次大率皆眼前事無逺興也然胸中芥蔕有消釋未盡者或見於詞可笑我愛青山爽氣增青山似我骨稜稜半年不踏山前路也學禪居結夏僧二一昨病暍思清秋秋來兩旬熱未休堪笑荒唐野人語天公不遣火西流三詩腸頗饜木雞肥老齒方便豆粥稀今雨客來如舊雨多情只有兩烏衣四蚊蠅屏跡去何遲烏循環度不移一雨夜來凉可喜家家水滿飬魚池五十里山開翡翠屏三家村裏老人星無塵竹徑風還掃徒壁茅齋夜不扃六魚自浮沉水自流釣船閑繋小溪頭朝來頼有杯中物忘却連年日夜憂七阿翁眠食龜頭舎兒子耕耘犢鼻裩記得孝經刋誤本尚能口授教曾孫八牀頭鬭蟻取人憎壁上粘蝸失自懲螢火光殘小兒手誰憐堪作照書燈九凉風騷騷草木黄初月皎皎更漏長洛陽有夢忽驚覺鶴唳聲中人斷腸十稻花雨外紛如雪桂子風髙香滿天誰信一䨇多病眼餘生重見太平年暨陽沈徳隣氏徙居郡城名燕處之室曰咬菜根處昭其儉也龜巢老人謝蘭謂之曰夫人以儉徳立身惟窮達不變者君子韙之拙詩效顰亦曰備薑桂之用云士方窮居含糗茹草誰無菜根知味者少睠兹小物大道可擬淡而不厭斯為君子鮭菜自珍龍根自奇我菜之根朝斯夕斯若決濡肉或如嚙骨左車有聲宫商彷彿賢相脫粟聖相齕匏顧予何人口腹敢饕吾愛吾廬畦蔬遶屋盤有餘飱鼎無覆餗窮達百年始終一趣明月清風咬菜根處輓管伯齡先生多才徳與俱崑山之玉滄海珠玉華忽作白雲散珠光竟随清夜徂青青書帶匝里閈纍纍筆冡埋荒蕪雞林客來嘆且泣欲覔好詩還有無二憶昔狼煙兩袖黄斷蓬飄泊鄭公鄉金龜換酒邀明月玉麈論詩説盛唐百年往事陵谷變通家交情江海長騎箕先著祖鞭去旦夕吾將與頡頏陳存心先生挽辭代黄仲器作蒲石軒中山澤臞出門戎馬即長驅欲騎東海金鰲去竟作西風玉樹枯化鶴還家人想像義烏銜土子號呼恨無杜老揮椽筆寫入哀詩比畫圖鵪鶉圖不作巢居與穴居鳶飛魚躍不相於平坡淺草幽閒處宿食飛鳴得自如題清微觀并序蘭嘗考庱亭乃孫仲謀射虎之地今為吕城橋密邇清微是為清微勝槩也不揣言耄表而出之并為燕厦之賀云阿䝉之城何代傾𤣥元閟宫無與京英雄射虎陳迹在咫尺奔牛古堰横鯉魚飛去石盡爛桃花種來蹊自成華陽福地一如此何用山中宰相名懐袁耕學諸故人夢裏忘余兩目盲馬鞍山下訪羣英詩容總似山容瘦道氣多如海氣清皎皎白駒方屏跡嚶嚶黄鳥未忘情呼兒早起題書尺十日新年雪乍晴右寄袁耕學二憶昨吳淞十二詩清真道士獨委蛇梨花春釀適來熟頻遣青衣送酒資右寄清真觀道士俞三鈯斧單提不暫停黄花翠竹總忘形問渠送米盧仝意也愛茶聲有可聽右寄延福菴主四雲峰毬子逢塲戲一笑春風舞袖歸從此晏然門不出忍看沙界有危機右寄僧闕長老五崑山絶頂立浮屠海闊天髙氣勢孤莫道八風吹不動八風吹動有人扶右寄僧勝上人六玉峰巨邑冠東吳在處金園似給孤手把竺書朝夜讀此心能轉法華無右寄僧善性空送郁友文之京揚子江頭春二月送客登舟赴天闕男兒生有四方志莫作尋常黙然别憶昔孺子歌滄浪尼山聖人曾激揚我賡再歌呼索郎子其洗心宜勿忘次韻奉荅瓢齋先生見寄二首齋居一榻坐來穿腹笥羣經老欲眠夢裏亦行端正路醉中常造渾涵天春光荏苒無多日天氣霠霃近禁煙舊雨不來今有約虹光遥望載書船二予家經亂離蕭條無六親遥憐竹林阮中有白首人髙詞吐白雪逸氣凌青雲楩柟豫章下灌木無足云安知射工弩中厥父子身問疾數徃返先生同五倫奈何日月下覆盆茹艱辛惟天降炎霜清飈灑冠巾一朝禍根㧞戩榖乃薦臻孤鶴還九臯飄然離雞羣吾將問𤣥機載酒歌子雲僧綱賛公和尚以疾得告而歸善權舊隱横山老樵謝蘭效劉賓客竹枝二首為臨别贈維摩牀上遣文移治績垂成竟解龜僧史有如班馬筆絶勝州里去思碑二滆浦飛花送客行善權耆舊出山迎問渠那得真消息摩頂松枝喜鵲聲過無錫醫士徐士亷别墅棲神山在屋西頭竇有寒泉帶錫流山近杏林煙樹接泉香茶鼎雪花浮蜚英早歲肱三折樂道清時號四休堪笑興來忘潦倒尚能擕酒過滄洲寄楊彦澤逢人屢問平安信有子亦如郎罷賢萬石艨艟輸賦足九重閶闔奏名先未論烏鳥能含哺且喜黄楊閲閏年我昔與談忠孝事阿戎詞色兩忻然次韻送秦文仲歸海上溧水先生挽不留故山回首鬱相繆落花飛送九年客行李歸來一葉舟勲業鏡中成白首耆英㑹上冠清流獨憐詩社今寥落無復尋盟集舊鷗送秦文仲教諭歸老崑山縣盛代埀新統斯文續斷絃青山溧陽縣白首廣文氊唾視鉛刀鈍心持鐵硯堅蓬麻扶盡直茅茹㧞相連頒印恩殊重明倫教欲專諸生皆鼓篋三物屢興賢美績經三考英聲徹九天晚成真大器幽谷必闕命以菟裘老榮於晝錦還黄河清有日白石爛多年齒徳身兼備文章世自傳本來天下士且作地行仙鷗社詩盟在鱸魚斫鱠鮮寄聲袁處士雙璧喜俱全次韻
