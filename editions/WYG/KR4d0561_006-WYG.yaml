body:
  text: 雪巢為馬仲良賦馬鞍山髙數千尺考槃之阿環大澤梅花為屋雪為巢窓户玲瓏空虚白諸公衮衮登雲梯若人奚獨能幽棲澹然素志絶華藻要令朴俗還標枝藍闗策馬官逺謫居延牧羝氊盡囓何如雪飲樂巢居更與党家風味别梨雲無夢清如許膝上兒郎賦冰柱此生此樂慎勿移聽取龜巢老人語次韻答許西溪憶昔送别黄花秋烏紗破帽霜滿頭别來作詩屢問訊夢中載酒時遨遊兵戈同歴二十載鵂鶹夜啼雲靄靄全家老稚幸逃生又閲桑田變滄海啓榮之樂今有餘勿謂比榮年不如峴山一望三太息襄陽耆舊晨星踈次韻自述百年有限耻求仙數口無饑頼薄田菰米熟來連日雨菊花開到小春天方從易外窮羲畫無復詩中泥鄭箋客至酒盃時一舉開籠放鶴舞蹁躚送婁主簿赴京考績吳霜如雪㸃征衣匹馬之京小𨽻随鸞棘特書良史筆鳳臺重覽謫仙詩天開景運榮文治年少多才際盛時野老送行無贐物梅花折去臈前枝寄張以誠二首入城一度一相尋為愛論詩識趣深歳晏杜門寒不出折梅要寄隴頭今二蘭陵市上澒囂塵藥杵聲中樂隠淪兒軰荷鉏今日去一株添種杏林春雪舟棹歌并序湖南潘公珍仲自號雪舟以耆艾之年監稅江隂縣洪武戊辰冬赴京考績語予曰今將告老于朝得㫖則扁舟載雪而歸矣雪舟之興盖與山隂王子猷有不同耳吁昔者陸公紀官滿欝林歸舟載石使當日苞苴有物則奚用是石為哉公之雪舟意盖如此若夫鴟夷子皮之舟装江南重寳復竊取傾國之尤物随之汚衊五湖遺臭千古其視吾載石與雪者不翅霄壤今雪舟之歸雖未可必然其志趣髙潔如此雖在市朝亦必為清白吏是亦不歸之歸也予嘉之故為作雪舟棹歌三章以道其樂云載雪兮孤舟帆江風兮中流蘭槐歸兮無恙吾將老兮滄洲再歌剖肉兮藏珠抱玉兮求沽悵斯人兮非吾徒尋鷗盟兮侣樵蘓三歌舟揺揺兮江水長五老玉立兮遥相望解吾纓兮濯湖湘樂吾之樂兮未渠央送王主簿赴京考績三年一枝此鸞棘一息萬里方鵬程長安西日舉頭近匹馬北風行色清朝廷考績埀令典臺閣交薦蜚英聲隣封野老頭雪白也折梅花作送行雪巖詩為江隂李縣丞作瞻彼雪巖太行之隂玉樹瓊林纎滓弗侵雪巖峩峩巖有薜蘿有美君子居巖之阿峩峩雪巖蔚蘿如昔時止時行不泥其跡雪白而清巖静而深曷其似之君子之君子之心始終一節謂予不信如彼巖雪寄希物先楚蘭江二禪老優缽花開五百年連枝香徹九重天恩承雨露移金刹語帶煙霞潄玉泉虎踞龍蟠多古迹燕來鴻去又新年老夫嬾著遊山屐空仰崔嵬夕照邊過烈塘祖墳里人牧牛于壠上以詩呈郡邑鳳橋之西烈塘東我祖我禰馬鬛封向來松柏蟠蒼龍灰飛煙滅邱前風十年天造開鴻濛恩沾萬國生育同壟頭萌蘖春蒙茸藤枝棘花雜青紅牛羊斧斤集如蠭一年一度一掃空白頭遺孤抱哀恫麾之不去欺龍鍾無階上天訴天翁吞聲躑躅淚滿胸府公頼有渤海龔琴堂長貳明且聰令行如風偃蒿蓬樵夫牧人乃絶踪將來宰木蔽幽宫九原感戴恩無窮嗚呼九原感戴恩無窮懐成都監倉趙執中三首擲去任公舊釣竿龍墀拜命即之官丈夫志在功名外蜀道行來自不難二七千里外芙蓉城四五月間鶗鴂聲月俸支來賸沽酒莫遣閑愁取次生三公餘訪古碧雞祠官栁野梅皆可詩我欲見詩知雅興如何黄耳到家遲寄熊元修五湖三泖一􅋯仙心骨俱清地更偏睡鴨燒香書屋裏閑鷗結社釣磯邊絶憐芳草無塵土又喜黄楊閲閏年熟客不來清晝永南山相對兩悠然晚香亭為蔣公勉作維莫之秋百草不芳惟菊有華晚節之香君子擬之金玉其相顒顒卬卬氣凌風霜回視春葩綺羅靚妝及兹凉秋掃跡窮荒菊也特立澹乎坤裳我佩爾紉我帶爾纕厥徳之馨匪飡其英亭有三徑里猶柴桑亭亦有池永同南陽宜爾父子眉夀無康矧有佳客駱盧王楊髙堂起居階庭趨蹌玩物適意其樂洋洋鄙人作歌以侑稱觴題龔景良傍梅書屋南昌山水非不佳卜隣直欲傍梅花花開歳晚香滿屋清致不減林逋家三間茅宇大如斗四壁圖書雜蝌蚪腹笥便便不自多汗竹之編長在手有時門外雪三尺羣籟無聲人絶跡梅花立雪似游揚不作桃哀憔悴色春風滿面笑相看知我鐵心同歳寒他日移居玉堂署應有品題稱二難洛陽牡丹春比屋日夜沉酣沸絲竹何當聆我讀書聲亦若聞韶觧忘肉次韻荅毛雲莊并簡太希先生吾聞天台之山冠東南蔚有清氣非雲嵐山髙一萬八千丈石頭毛髪青􅆴􅆴鍾靈仙釋踵相接求為世用疇能堪不知三綱九法是何物浪説千巖萬壑能窮探雲莊先生隠君子非仙非釋棲苔龕胸中氷滿壺頭上雪一簮羲皇以來書盡讀熱官不要詩仍湛草堂侣有北山鶴菊泉飲比南陽潭清風日掃三徑竹寒霜歳熟千頭柑齊名子陳子不愛功名酣坐談風月只松麈卧遊山澤非桃驂老夫恨臂不羽翼翩然飛去時相叅四壁同馬卿一褌如阮咸猶喜盤飡菜有二十七生世年踰八十三忘機頗覺白生室造道尚欲青於藍向來行路如棘澁今乃茹荼猶薺甘小山老叢桂滄江倚枯柟愛君傑作神氣壯睠我孤陋顔色慚蘭陵府主蓮幕客皆云此詩壓倒方雲菴赤手鯨牙力可拔薫人雞舌香微含餘波及我老孤研清入肺腑蠲焚惔一朝怪事出幕府口不忍語非三緘令威到家兮能自談常郡經歴鄭履元禮吾友天台陳太希之門人到任數月家人至而元禮病疫而殁寡妻稚子遑遑無歸予作二詩以哀挽之盲風歘起怪禽呼吹折琅玕樹一株何事天公渾不管生年多賦道旁樗二琅玕樹折鳳巢傾膽落鵷雛抱母鳴故國欲歸䨇羽弱哀哀啼作杜鵑聲延陵野老歌送張太守延陵野老巾滿霜送侯入朝歌道傍歌中不解說循良但云三載安農桑官無煩苛歳豐穰饑有菽粟寒衣裳我侯興學扶綱常授經諸生踵陳襄一鼓士氣弛而張劍井亦復騰輝光訟庭春來莎草長風行四邑方泱泱九重天語星使將五馬夜趣天官裝黎明馬出金斗坊羣氓猶挽青絲韁銓衡郡才進巖廊將見列郡皆龔黄連歩拾級登廟廊佩鳴珩璜謹趨蹡掖垣紫薇花自香甘棠之愛民弗忘大江東流青海洋我思悠悠未渠央寄吕教諭覔惠山泉木屐上山老無力茶鐺覔泉猶累人目光直射九龍角胸次欲浣三斛塵水符分竹果如約石牀焦桐堪作薪君當知我鄙肉食一瓢不厭平生貧寄袁子英横山東望崑山逺江水西來海水連每辱手書論著述猶如面晤奉周旋微陽喜復飛葭管大有重書汗竹編若問老夫兒女事曾孫又抱小春前謝余提學摘藳序虚譽何人説草𤣥雄文為我冠蒲編諸公共美金聲擲兒軰争誇石刻傳篛褁小團陽羡月缾封新汲惠山泉故鄉風土殊蕭瑟聊作梅花寄海邊挽吳母曹氏賢母無復見孤兒痛奈何絳紗空幔在彤史闕文多林竹冬猶筍㕓氓巷不歌蹇予妻若子垂涕憶委佗代王尚絅挽吳母澱山湖上避兵時總角曾聞阿母慈霜野不教兒子出冰池竟得鯉魚知生前冠冕升堂拜死後芬芳婦徳碑愧我不才俱靡及抽毫遥寫楚些悲次韻賈教授暮春言懐琴有徽音劍有光惜哉江海老張蒼且將濁酒供瓢飲何必明珠用斗量壇杏作花紅樹暖泮芹抽葉翠波香鼇山邈在天東北時復瞻雲首一昂寄萊陽縣丞蘇偉正觸熱訪而翁萊陽書適至而翁釋離憂吾儕慰馳系青雲發軔初甘雨随車沛旱歲竟豐穰天恩更汪濊㕓氓九衢舞海市百靈喜魁然英妙年際此太平世蹇予八十翁懐人二千里哦松公務餘食檗珍珠比魏公百韻詩仕學有遺軌錢孝女詩斷臂耻受汚剜目示守節斷髪割耳鼻亦截忍棄夫家甘毁滅吁嗟錢氏女孝心亦如之剟肉於股療阿婆想當持刀入手時精誠黙感天翁知百靈撝呼走神醫肉乃化作藥石糜溲除淋液腹除癖如以湯泉澆雪釋婆無呻吟女弗戚隣翁里媪皆嘆息予生慕忠孝老去仍惓惓每見返哺烏如甫拜杜鵑願言屏䲭鴞不與同戴天竹林寒筍冰池鯉澤中堇菜籬根米天其埀恩錫孝子董狐盡為書青史和江隂鄭教諭登樓為愛君山好每登樓上頭一氊渾不冷有酒更何愁歳月江流急人生泡影浮興來歌舞罷倚檻看天不次韻答陳推官珍重新詩遺華於翠織成披雲天似洗連日雨頻傾大府羣英聚清朝列爵榮正湏康濟力膏澤被蒼生和陳推官過余公祠公諱闕字庭心元進士安慶路總管守城死洪武初勅建元忠臣廟謚忠宣公砥柱廻瀾屹吕梁安知誰武復誰湯六年守戰孤臣死一代文章萬丈光草木荒城威肅肅丹青遺廟貎揚揚悲歌沃酹知何日北斗持來挹酒漿殷孝伯輓詞憶昔覊旅中片言識鬷蔑十載忘年交兵戈正騷屑闕知子早卓越春秋參五傳窮源見澄徹闕維時陵谷變遵飬卧巖穴洪武更化初鋒車聘髙潔辭勞忤當路一命萬里徹志違烏鳥飬淚忍啼鵑血咸陽火方燼教雨沃餘烈奐輪周孔廟駿奔豆籩設庭生書帶草青青比蘭茁孤雲日在望縮地恨無訣遄歸一覲省亟去兩踰月老夫獲晤語清風濯煩熱著述亦已多討論心愈切安知三叠歌竟作千古别招魂頼遺孤魂歸母埀絶於乎世之人賦命何優劣或厭飫八珍子獨茹冰雪或稳歩康莊子獨蹊阬隉行行止於斯矩歩踵先哲崑山雲氣慘婁江水聲咽誰為有道碑修名罔磨滅哭盧知州諱熊字公武束帛三徴出薜蘿雲堦歩武正逶迤飄風動地須臾靜奈爾琅玕遽折何二雪手灘流理繭絲一襟華藻竟何施秋風夜月華亭鶴又作悲聲似昔時送浦良能之安陸府代父從軍秋風凉秋夜長徃哉讀父書超然出戎行詩書元帥古來有縉紳先生今汝望寄徐伯樞縣丞逐客多焚晝錦衣謫仙喜得夜郎歸古來白雪詞難和此去青山志不違洗馬池邊楊栁暗卧龍岡上豆苗肥獨憐棣蕚秋蕭瑟又見西風旅鴈飛某巢居病瘧有客自青門山來者語予曰賢太守過道鄉佳城以弔以酹且為之扶植仆碑添土舊封又將築周垣而䕶之殘山剰水皆有徳色某聞之喜不覺其疾頓愈起坐午窓老硯濡墨筆是詩以記盛事洪武十年歳在丁巳七月十日也世有文潞公乃立明道表明道表不立斯文尚幽𦕈時有孔北海乃稱通徳門通徳門不稱大儒曷推尊古人今人同此心當風正欲披其襟嗟予巢家子騶子傳道龍門天下士一朝扣天闗獨立批龍鱗祗恐緑衣黄裳悞人主安知炎煙瘴雨危其身萬里投荒挺霜竹歸來青山竟埋玉迄今二百九十年陵谷幾畨經變遷折角麒麟卧荆棘復見薄侯駐熊軾鬛封添得烏銜土頽碑扶起龜趺石先生九京知不知名在人間益輝赫孔北海文潞公今人古人將無同青天髙髙不可問白楊為我呌西風題夜潮圖昔余夜醉錢塘酒看潮八月中秋後銀山湧出海門來潮聲殷若雷霆吼此圖之作知幾年當時景物皆依然雲山兩岸淡籠月雪浪一江髙拍天一觀頓覺毛髪立再觀祇恐衣裳濕扁舟漁子任掀舞别渚鷗鳬自翔集奔騰澎湃無足驚人間平地風波生乗桴尼父果浮海從遊我亦跨長鯨郭府判惠佛面竹杖盖以佛狀而名之矧夫節有交互之異旁生兩枝末復為一視他杖殊不同詩以謝之頎然此君生越裳化身無乃是空王生來丈六紫金相復現太乙青藜光孫枝並出比能秀老節交錯成文章只恐化龍飛入海尚煩垂念瞽倀倀呈府官求刋思賢録忠公神遊白玉京鳳凰無復朝陽鳴寥寥二百九十載其文况忍成漂零某也束髪頗嗜學四方掇拾手不停珠聫璧合綴方册字字句句含芳馨向來避地東入海挾書幾落長平坑還家暗投科斗壁何異寶劍埋豐城郡公宣化重名教斯文要俾晦復明顛呼鐵筆寫堅木彷彿中郎鐫石經螢窓雪案人快覩妙語炳如懸日星顯忠不須庵忠鄒無用亭牽裾伏蒲想儀型儼然見我鄉先生題徐良夫耕漁軒我本耕漁人喜子與同志子居中吳山水窟比我延陵更佳致太湖三萬六千頃七十二峰連紫翠山皆可畊水可漁無復紛紜嬰世累朋游日接慎威儀酣酒賦詩時適意客來遺我金蘭集儼然承顔依玉立因以今人思古人與客評論重於邑輟耕莘野赴阿衡後人嘵嘵疑割烹擲去漁竿佐周武鷹揚之勞亦良苦當今盛時伊吕多幽棲正宜安薜蘿山中小草或浪出千慮鮮能無一失願言飬髙持素心百鍊不改堅如金相過未擬聆跫音寄言時復相規箴生日口號餘生重作太平民雪色綾袍皂葛巾兒業經鉏能飬志家居瓢飲不憂貧屋頭箇箇慈烏喜堦下翩翩舞鶴馴此日誰為湯餅客孟光相對髩如銀二秋菊春蘭各有時頽然老我一書癡脚跟不識青雲路頭髪空成白雪絲怕醉有時曾止酒遣閑無日不吟詩傍人若問今年幾八十年前五歳兒送聰上人蘇州有即常州有今雨來時舊雨來銕限門前人立雪寶華堂上鼓鳴雷九州禹貢包時橘十里吳王醉處梅請與淡翁論古意老夫朝暮亦浮杯送僧歸四明省母同根華蕚兩三枝甘輭能供老阿㜷不用睦州蒲織履睦州因得賦歸遲二吳霜如雪滿袈裟正月闌珊可到家别有一般清浄供髙堂設法向摩耶送鄭教諭進表之京束氊黌舎跨征鞍奉表朝家慶履端虎拜三呼稱萬夀龍顔一笑宴千官酌來天上葡萄酒洗去胸中苜蓿盤官様文章新製作老夫刮目待歸看過天寧寺閲行中和尚澹居稿知其邃於易學兼長於詩故寄此西來祖業繼箕裘旁入儒林託泳游二雅什中歌矩度九師注外易源流松堪受記皆摩頂石解知音亦㸃頭逸興飄飄誰足擬白雲飛度楚江秋次韻陳推官元旦作東風楊栁驛橋邊香雪沽來斗十千早飲屠蘇懐舊俗遥瞻閶闔賀新年萬方人樂昇平世五色雲開咫尺天廊廟器成今未晚著鞭姑讓祖生先正月十四日代簡招鄉中親友上元之前日將午相邀諸公集環堵山瓢持作鸚鵡杯畦蔬擷取龍根脯兩兒肅客衣襜襜老夫鶴立梅花檐照天蠟燭夜有月勿謂寒舍無燈相棄嫌寄管伯齡兼簡陶呈甫前年詩寫心聲去今日人來口信通一自初交經世變兩無相笑坐文窮崑山氷柱軒窓外笠澤煙波賦詠中更憶南隣龍頂竹曾留東走鹿皮翁張伯仁兄弟濠梁蒙恩還鄉客行二月初三日詩到千墩寄二難且喜江南春氣早不聞濠上雨聲寒花時多釀酴醿酒芳館重修芍藥欄徃事真成塞翁馬正須招集笑相看簡伯仁里中親友七人臨濠人歸去年夏故園花開今兩春看花把酒應共樂訪竹題詩毋厭頻紅塵車馬跡不到滄洲魚鳥人相親老夫遥望徳星聚乗興幾回車欲巾聞趙朋南免官還家作此代簡并以孝女傳求詩兼寄毛世延熊元修水村先生氷雪姿一襟清氣溢為詩不同不異頗奇崛歩趨李白仍委蛇夜郎歸來脫塵屣濯足淞江太湖水雞壇有盟知弗渝書或浮沉况杭葦衰年萬事皆遺忘咏歌之樂殊未央請觀側陋出純孝援筆為揚蘭蕙芳毛公世業詩三百白華補亡求必獲更煩漚社語閑叟定有隋珠照方册舊冬十二月初四日次子林赴京初九日入覲十三日授開封新鄭縣學教諭即日之任時雨雪連數日寒甚眷焉于懐久而不釋兒别䨇親到日邊承恩徑著逺遊鞭一千里外汴梁路十二月中氷雪天楊震未期堂有鱣鄭䖍何愧坐無氊只今偃武修文日正欲鸞膠續斷絃服霞道人歌服霞道人本仙骨隠居琴川山水窟朝看鼎食暮鼎烹富貴於人果何物道人忘世味祗服山中霞却青精棄胡麻八珍視同泥與沙扶桑飛出金老鴉氤氲五色摶精華呴嘘呼吸間入腹皆河車手持九霞觴頭戴三朶花松風為作洞仙曲絶勝金谷鳴筝琶一經不學乃無術麻姑送酒徒爾誇吾服吾霞吾自足安知世有萬羊禄夷齊餓死良可憐留得清名傳汗竹秦人採藥尋蓬山好兒好女無復還漢宫空設盛露盤銅仙為之淚汍瀾元霜本非霜絳雪亦非雪請從服霞道人逍遥指㸃空同授真訣貽五牧劉永真昔賢五牧家何在今爾幽棲地甚偏種秫每供彭澤酒煑茶時汲惠山泉錦鳩呼婦雨初歇丹杏作花春正妍堪笑老夫頭似雪興來尋戴過前川雲牧詩為楊同知賦廬陵美山川穹林古喬木雲椏三千年遵飬卑自牧靜言求放心雞犬常在目朅來陟雲衢半刺剖符竹牧民如牧羊四郊春草緑草豐羊茁壯亦有飽眠犢豈無敗羣者其藩或輕觸約之鞭用蒲所履繼前躅致身將青雲岳牧聫佩玉佐主牧天下庻類頼蕃育雲牧懋厥功吾言此芹曝王叔明雲峰圖王郎多學畫最工筆法似舅松雪翁松雪之書妙天下以書為畫妙亦同想當灑墨成雲峰豪氣壓倒陳元龍層巔崒嵂摩蒼穹咫尺可論千萬重嵐光翠滴天無風若有微籟鳴杉松於乎此時此畫復誰有我為此甥懐此舅秋林讀書圖春風不著長安鞭秋林讀書年復年百篇蝌蚪自為寶三足蟾蜍誰與憐目光爛爛走金電口角泠泠飛玉泉老我東家園册尚分隣燭教曾𤣥題村田樂圖老人村老瓦盆常作雞豚社不識州縣門阿翁醉倒阿婆笑膝上吚鴉弄乳孫六月八日得次子書并書久旱髙田未秧是夕連雨三日喜而和之新鄭書來劍井邊方將隂石捶荆鞭雷霆夜作三更雨江海寒生六月天不惜空囊沽緑螘從教破屋濕青氊北窓風響蕭蕭竹如聽南薫奏五絃去冬送鄭教諭如京詩為天寧聰公沉滯至今年六月轉託發還故作此并元詩寄鄭一詩代折送行栁半年竟墮無何鄉祗因沽酒謝不敏尚謂道術能相忘髙堂談經多士集澄江濯纓清晝長為問襄陽兩耆舊歌鳳曾無説楚狂寄謝楊純夫兼簡陳髙士客來飲客北海樽客去送客東城門不嫌褦襶留信宿各出肺肝聆話言三日雨救赤地旱百川水作黄河奔賦詩為别并志喜兼簡太邱賢祖孫聞袁子英著書作詩寄之我所思兮耕學翁壯年氣欲吞白虹眼看陵谷一變改此心乃與寒灰同硯田筆耒耨經史不稼不穡勤於農我哀民彞失所飬錫類且欲來羣蒙共惟元聖筆六籍為世大法垂無窮楊墨溺人甚洪水孟氏距之成禹功秦以申商漢黄老六朝接跡論虚空緇黄愈出愈荒誕冠冕鞠躬趨下風韓歐間生數百載鳳鳴朝陽羣羽從中間洛閩繼洙泗卓彼二子能折衝雄詞至今凛生氣宜從孔道追遺蹤東將入海乗艨艟長江大河無遏壅老夫獨恨䨇眼矇不與觀日扶桑東贈衡隠居我昔母年垂九十帶經犂鉏粗供給伊今有母八十餘孝飬之聲動鄉邑堂前􅁮􅁮忘憂花屋頭翩翩返哺鴉林宗若識茅季偉薦書定徹天王家題漁人扳罾圖大横峴東芙蓉湖水村髙樹屹西株漁郎曳罾坐樹下短衣緇撮赤髭鬚此圖無乃貎此景東鄰曲舎皆菰蒲吾嘗過此看春水桃花雨晴春日晡漁郎含笑語厥子鱖魚肥似淞江鱸街頭米貴魚亦貴賣魚日糴供家餔只愁水面重租課飛風健卒頻追呼逋租畢輸搒捶脱前村有酒仍湏沽猶勝禄食致奇禍坐受鈇鉞連妻孥夜來湖上好明月醉吹蘆笛歌嗚嗚人生之樂有如此此身安用紆青朱漁郎漁郎知我乎我亦烟波老釣徒溪居垂釣圖磻溪老父興西周綸竿棄擲鷹揚秋富春先生赴東漢羊裘㡬被朝衣換人生出處各有時如魚飲水魚自知釣鈎無餌釣清泚若人彷彿元真子好山滿眼青孱顔清風緑樹滄洲灣悠然意態極瀟洒豈是尋常釣魚者浮波之龜如出洛漁郎睨之龜弗却賣卜覔錢人正多七十二鑚將奈何不如且曳泥涂尾相伴幽人弄煙水細看元在畫圖中多言莫笑癡獃翁管伯齡惠書并和詩故復次前韻荅芙蓉湖照横山影蓬藋門開曲逕通半載月昏渾不出一經頭白未能窮論交半是漁樵者訪舊多於夢寐中説與故人能信不頹然黄鵠化鳬翁維揚王有恒避亂居東吴三十餘年所至寓舍以聴雨篷名之多學能琴而善飲醉則鼔琴自娱故自號曰醉琴然鄉土之思亦嘗扵琴發之予盖相聞而未之識也吾友釋仲翔専書為求二詩遂為賦之聴雨篷昔年家住揚州市雨聲不入弦歌耳居吴聴雨三十年客舍如篷卧篷底篷忩晝暝雲抺漆滴滴㸃㸃疎復密絶似瀟湘夜泊時半雜風波響蕭瑟有時聲急如建瓴有時珠玉聲琮玎屋山便作柂樓倚兩耳洗来心骨清心骨之清豈不好一㸃鄊心忘未了天中玉樹無雙花夢魂日夜長飛遶只今二十四橋月依舊玉簫聲不絶一㠶風送到𤓰洲聴雨孤篷聲又絶醉琴張顛草筆常醉揮以頭濡墨愈神竒醉琴之妙亦應爾穎師乃為徴吾詩琴中佳趣知者誰麯生為我同襟期千鍾百觚追古聖五音六律洞𤣥機一襟宇宙春熙熙七絃氷霜風颸颸得之於心應於手如魚飲水非人知鈞天廣樂醉鄉境悉以所樂鳴金徽髙臺自傾池自廢雍門枉為田文悲我歌醉琴行持贈醉琴叟小春多釀梅花酒我來與君酌大斗濯足滄波太湖口聽醉琴為醉友海苹為詢無言講主作大海多風波浮苹蔑根蒂嗟爾海上苹似我人間世前身楊白花幸不墮泥滓化生江漢間朝宗随衆水出没幾沙刼全此清浄體所以無住著黙契宗乗㫖芥子内須彌吾知同妙理挽王氏祖母母在重闈鶴髪垂孫為能吏鶚書馳二三百里去鄉國七十五年稱母儀李密陳情方有表張林紀徳未成碑斗城昨夜西風急吹折諼花帶雨枝次韻酧陸子文見贈故鄉不願衣錦歸亦不願入承明廬願言結交天下士腹有五車今古書還家十年空兩手釣竿之外餘何有白雲如雪横滿山蘿屋三間大於斗浪川䨇鯉來新吟詩中意興秋俱清雄豪氣敵劉夢得喜無郊島愁窮聲嗟哉風雅久不續老我山林成朽木金盤秋露玉壺氷洗去胸中塵一斛覔官應笑明河篇託物可擬石鼎聫先生識趣出塵表鞭䇿後進追前賢東望吳門長太息舊俗繁華復因襲太湖三萬六千頃七十二峰湖水側何日擕將麯秀才登臨共醉姑蘇臺眼前一事特可喜湖山清氣鍾羣才先生屢薦胡不起濯髪滄洲弄煙水遥遥裔出華亭侯甫里髙風更無比只今奕葉多流芳東床嬌客名尤香呼兒整我遊山屐早晚去從潘孟陽次韻答集講主二首欲尋石上三生約姑待梅邊十月春結社東林無奈逺寄書南鴈豈辭頻平生頼得詩書力朋軰多如骨肉親元伯九泉呼不起擬將雞黍一沾巾二千墩南浦水廻環一棹西風路不難骯髒曾於堂上坐綈袍能禦客中寒可憐學劍身今老祗有耽書興未䦨傳語心知數君子小春來借早梅看冬至即事一簾紅日雨初晴客屨駢羅送復迎賀節本非三代禮随時且喜一陽生齊奴金谷財為害楊相氷山勢易傾何似酒杯長在手青山相對適閑情冬至前二夕憶次子林不寐枕上賦詩將成忽其母夢中作聲撼而覺覺而喜言夢林烈塘舊居作湯餅畢垣居室事懽甚予因用其語為是詩結句云去年臘月初九日發軔天階又一期鄭校頗聞衿佩集歐詞應作送迎詩久無書信來黄耳每有親朋問白眉阿母夜來曾夢汝甘分仍在舊西枝送楊純夫歸琴杜子客長安行囊本枵然得錢沽酒覔鄭䖍不嫌官冷寒無氊爾來六百有餘載世道多随陵谷改身為今人心古人清風髙誼依然在嗟我如鄭貧蒙君愛如杜雖無三絶才樗散頗自喜一從傾盖意相得頭髪不知誰黒白衝寒觸熱每見過愛我西牕好山色援毫或和龜巢編解纓或濯龍井泉常言好古絶類我外物多忤中彌堅低頭甘立矮屋下髙論直到羲皇前朝來賣得凌雲賦麯生車載來相顧門前尺雪凍不消風木吼如虓虎怒宿宿信信傾腹心言欲挐舟抵家去呼兒更酌罄餘懽贈别殷勤抒情愫我昔居吳十九年君歸煩君訪諸友吳山醉處好湖山十闕鄉人來作輭脚局且對春風開笑口街頭米賤酒亦賤一百青蚨滿䨇斗儘判連日醉如泥百憂盡付無何有人生窮逹各有時阿衡元是扶犁手詩書豈徒守章句言行正須傳不朽珍重林居慎厥修好音慰我思悠悠雪篷為蔡子堅作鴟夷船載西施去遺臭五湖煙水路喜爾吳淞雪篷闕江水曾無尤物汚篷牕洞開天雨花柂樓屹立水為柱鵝鴨不驚柔櫓鳴鷗鳬渾在平沙聚非熊無夢釣無餌如琴無絃得琴趣虎頭能為畫漁蓑驢背無勞見詩句潮州阻雪八千里諫書直抗曾何補殘氊囓雪十九年使節堅持亦良苦雪篷之樂樂於天雖欲同人人弗取獨有山隂王子猷清興頗堪同日語過顯慶寺六載重來釋氏家一甌新啜趙州茶杏花風後春何冷柏子庭前日未斜拄杖頼能扶潦倒闕文煩為補楞伽要聽說法頻來徃且喜平橋路不賖書潞城樵舎壁燕子來如舊雨桃花笑為何人竹下青苔不掃恐教鶴歩生塵二一室四皆立壁六孫三已歸妻猶喜老萊舌在不妨矮屋頭低三㧞木狼無䟦㚄絶糧道阻周流天眼或開或闔人心何怨何尤四瀼東瀼西農畮巷南巷北人家白雪秋香禾黍緑雲春靄桑麻劉徳祥監税江州客有誤傳其子死者遣人回家并寄書吾孫辭甚酸苦因賦詩代簡九江相去二千里一别于今五六年盡道國恩容告老安知家信有訛傳山連楚尾青天外潮落潯陽夕照邊遥想此時公務隙爐峰相對思悠然題趙行素佩韋齋綵衣翩翩童丱年佩觹佩韘庭闈前鐵馬紛紛戰争日佩犢佩牛江海邊幽蘭紉佩非不好獨醒未欲追前賢朅來佩韋不佩弦常以輔我氣質偏視韋之緩我之急如餌良藥沉疴痊世事多因忙後錯緩不及事理亦愆不疾不徐發中節秉彞庻得全吾天巖廊鳴玉似髙歩江妃斛珠人浪傳貪榮可笑蘇季子佩六國印扶危顛何如茅齋但安坐且有竹風堪醉眠青山於人少知者白雲與我同悠然韋乎韋乎心自懸得魚吾豈忘吾筌贈黄仲器予觀道書謂洞庭山有林屋洞天仲器以避兵居之既而過雲間適海上復還常之横林閲歳月三十年距洞庭三百餘里仍以林屋自號示不忘也徴予詩故厯叙其遊息之概如此云一目九州皆戰塲避兵林屋水中央林屋仙人不知處橘井委棄青霞漿木奴包金亦致㓂人乃随雲出巖岫五湖三泖放孤舟遵海幽尋采三秀堪輿再造隔兩塵故鄉來歸能幾人芙蓉湖上大横峴煙連緑樹横林春解裝付與箕裘子管領春風桃與李幅巾自作逍遥遊别有行窩修竹裏一童出入長相随欵段之馬亦不騎林屋别來陵谷移時望白雲猶賦詩膏粱文繡俱不喜獨曰愛詩心未已堪笑老夫同此心白首論交結知己何當呼起李謫仙每飲一斗吟百篇殺青盡伐南山竹剰録好詩娛暮年悼許君善谿西老人山澤癯一生祗以詩為娛常言愛詩入骨髓好詩抄藏千百紙七言近體尤忺作不費工夫細琱削嘔心每笑李家兒牛鬼蛇神何足奇老夫初焉未相識數篇不知何處得稠人廣坐誦吾言説項過於楊巨源一朝傾盖千墩下膠漆相投不相舎西鄰假館兩年春買宅移家情轉親此時吳門正堅壁張角未死人相食雲梯砲作霹靂聲狼煙暗天血滿城吾徒幸若王官谷朝夕同吟紫芝曲桑田變海嘘吸間死欲邱首歸横山暮雲春樹勞逺憶十載詩筒仍絡繹重來桑梓甚蕭條巷有索租人呌囂骨冷九原呼不起一酹非歌續蒿里嗟哉時俗貴輕肥如子愛詩人亦稀贈王仲昭父子扁舟入吳空載月閭邱虎邱俱不謁停橈再拜范公祠楊花正落祠前雪義田義宅三百年義聲洋洋天下傳嗟爾吳之人胡不踐遺躅貪夫婪婪昧盈縮前車後車屢顛覆下床䨇屨内䨇足奚用領軍鞋一屋我來訪舊無所將贈以范公博施之義方家傳更須授賢郎福澤將來未渠央呉淞江水長藍謝青毋我忘吳逸庵輓歌辭廓然一襟涵宇宙鍾氣會稽山水秀春秋髙似伏生年岐伯諸書口傳授浙水西來家屢遷名與杏林俱不朽老去居吳抱䨇膝四顧狼煙暗如漆兒能負米百不憂有酒即呼人共吃常時隠几看青山醉則􅋜􅋜枕琴瑟廿年同飲淞江水通家之交親戚比别來恨無縮地術時復論心書一紙只今祗與阿戎談翁在九京呼不起李明善慈竹軒吳淞江南湓浦曲慈竹軒開薜蘿屋更無花木鬬芬華一徑波光照猗菉纎塵不滓蒼玉叢枝枝葉葉皆清風一年一度冬夏笋冬生其外夏其中徳哉此竹美如許子母相交禦寒暑嗟哉人為萬物靈温凊㡬人能如汝吾知吾友此軒居朝夕奉親來版輿母慈子孝黙相契更喜君子能威如樹萱堂上分甘樂諸孫錦䙀如錦籜家僮笑指青琅玕少長喜與俱平安令名千古埀不刋咄彼鴟梟兒人面刀劍腹不學返哺烏頑然忘顧復嗚呼吾不知其見此烏兮何面目爾何日兮視吾竹簡湯道原曹子壽予生頗好古恐兒軰不能繼述敢請二賢良相與語之吾兒觸屏煩為警省旦夕稍閑煑茶專待要學劉伶死便埋随行負􅓩欠輿臺螢生腐草光能幾螘在南柯夢易回一笑豫言身後事兩賢聊共掌中杯貧居何處堪鋪席流水窗前好緑苔過横山龍祠作横山龍母祠前路人説今年祭龍苦前期邑有皂衣來督遣丁夫剪榛楛里胥中有豪家郎搜攫如鷹鬫如虎編氓一呼六十人棄擲犁鉏行或沮十家之甲最可憐背血淋漓遭捶楚囊無一錢供百需肥腯豚如買烏牯手傾麥斛比珠斛剜肉成瘡誰為補胥常大嚼過屠門今乃閭閻刲鷺股吾聞此語三歎息郡邑安知弊如許祠官稽古埀令典穆穆緝熙由聖主聖心寛仁重民食三年兩度蠲租賦天生感孚和氣洽曰暘而暘雨而雨報功於龍歲有祭禮若迎猫恩更溥龍兮龍兮知不知如此嗟來食應吐皇恩蠲租詩洪武庚申天下秋糧欽蒙全免今年壬戌秋糧夏税又皆免徴征繇聖恩寛大亘古無比故耕稼之民歌謡滿野而某則併以區區所聞者書之漢紀蠲租半遷書汗竹奇大哉今聖主全以惠羣黎量與乾坤合恩同雨露埀豐年魚有夢丹詔鳳重施庻富民生遂敦寛俗習移㣲甿皆鼓腹窮士亦揚眉往制成均法新頒釋奠儀雅音諧律吕名教浹華夷茅茹今朝㧞英髦靡一遺八荒仁夀域萬世太平基水有清河日山無爛石時時雍民皥皥年耄我蚩蚩不作輸芒蟹真成曳尾龜倚牆歌此曲擊壤付吾兒林在新鄭縣學六月公文來取其子塏視疾七月初四日塏言别而行付家信外寫此一聞汝有河魚疾三宿心如野馬馳逺阻恨無人縮地吉占頼有卜言龜眵生稠漆黏䨇眼身兀枯株坐有胝預寫盖棺遺囑去好傳經業佐明時送沈居仁同塏徃新鄭二千里外視吾兒重九日前期汝歸坐卧待看黄菊綻徃來相伴白雲飛郵亭歇處加飡飯客路凉時早裌衣無限老懐言不盡臨岐目送思依依賀袁一泉陳大方新任道紀司官山中宰相古來有地上仙官今更清夜半光生䨇劍出秋髙氣感九鐘鳴丹霄拱極星辰近黄道經天日月明𤣥牝書中多妙理政須獻納佐隆平賀聰聞極正心印新任僧綱司官象法提維付偉人聖皇綸綍命諄諄手持正印天龍䕶身著方袍雨露新旭日斗城衙有鼓清時滆浦鏡無塵牆東病叟頭如雪也喜曇華並得春贈天寧寺無學長老報恩扶起法幢來鐘鼓天寧講席開道出語言文字外卓然聲價自崔嵬二麻衣䟽屩古人風儷葉駢花一掃空八萬四千修月手斧斤随入象王宫賀府官重修多稼亭朝家重下蠲租詔郡圃聿修多稼亭一帶金湯增氣概四郊禾黍勝丹青甘棠風作婆娑舞横峴雲開翡翠屏斤斧聲中勸農意爾農豐樂正須聽周節婦詩呈府縣官滆湖水出白鶴溪大江潮來溪口西江潮湖水接連處節婦姓陳周氏妻良人早世舅姑没抱雛日夜號空閨盡拈奩具易䘮具衣有淚血髽無笄績麻絡絲紡具織破牕夜雨風凄凄孤燈照影伴寂寂寒風夜雨聲酸嘶煙塵逺避東入海兒方長大能鉏犁時清歸守舊桑梓布荆蕭瑟茅茨低青絲兩髩變蒼雪皎如玉樹無纎翳前年縣官帖鄉里覈實上府文可稽老夫近聽路傍語聖皇徳與唐虞齊天語諄諄為天下求賢悉上青雲梯閭閻未見旌表節門前草没青苔蹊願言宣聖化郡邑罔俾側陋薫蕕迷旌善亭中名一題恩同璽書封紫泥佇看俗習接武皆麐蹄再贈衡志通世俗以甘㫖奉飬者為孝温清定省之禮鮮能之今寒區衡氏兄弟三人皆善飬其母其伯兄志通禮意之勤老而彌篤冬月則以身温被席雖大風雪母不知寒能此一事可配古人能勿美乎故作此續前所贈詩以補其闕云雞鳴雪屋起居安魚出冰池食飲懽最喜兒能温被席慈闈冬盡不知寒寄馬䭾沙陳糧長老龜獨巢蓮葉秋元龍髙居百尺樓長江只隔衣帶水佳景宛在蓬萊邱一年時序換新厯四海弟兄懐舊遊竹君寫我歲寒意聊作梅花寄隴頭送曹徳昇赴批驗茶引所山無猛獸水無蛟邑里春來樂意饒部集茶商新箬籠壚添酒市古溪橋赤心報國年方妙黄耳還家路不遥珍重清時用刀筆平陽遺澤正寥寥謝新鄭縣官助葬亡子并以志略送去轉縣學去年孟秋初天旱火雲熱吾孫奔父䘮病眼淚流血陸行二千里􅞶踔若跛鱉歸來秋盡時黄埃滿縗絰詢言父襄事從頭為予說一衾覆黔婁家人影單孑䘮具百無措宿儲瓶亦竭幸逢賢縣令賵贈意切切擇木製美棺飭匠夜不輟僚寀同哀傷祭奠豐且潔青青諸佩衿感化重禮節是猶風偃草宏綱頼提挈吾知賢令心髙誼等前哲無錢及元振有則與同列無麥及堯夫有則與同轍悲哉我中子忝教兩期月眷言古東里圖經自來缺編蒲載前言辛苦磨硯鐵草創十八九放筆成永别手澤存於家歲久恐亡滅抄書送琴堂公餘賜披閲韞櫝庋􅓺舎無為醬蒙設會有作家手織錦為補綴姓名蠅附驥九泉應感恱矧知埋葬恩寧無報銜結老夫懐謝言縮地恨無訣殘喘苟朝暮烏能見鬷蔑坐馳仰崧髙心聲吐嗚咽述懐䨇眸半瞎耳全聾年及新豐折臂翁孤陋一生棲白屋虚靈方寸炯青銅人如禽犢真堪耻家有詩書未是窮但願太平田野樂九原髙卧聽松風人日和前韻二首曾聞社酒可治聾椑榼分來謝里翁鈍士常磨龜硯石貴人多佩虎符銅人前出語羞稱好杯後為文錯送窮連日昏昏如病域不知春到楝花風二林居鶴髪老癡聾彷彿忘機海上翁留客但沽隣舎酒鑄錢安用蜀山銅一年春色花無幾千古川流水不窮誰謂東家錦衣樹龍頭顛卧夜來風寄南澗海苹二講主東土西天今幾華南能北秀本同家門前弟子齊腰雪案上經文五色霞袖拂古墩行傍栁缾分春水坐煎茶遥憐丈室俱清絶屢夢幽尋適興賖寄張仲安舅甥及邵濟民許叔逺去年艤棹千墩浦澆酒伯倫墳上土伯兮伯兮呼不醒仲也憂予仍眼青最喜諸甥多似舅戀戀之情無不厚東陵𤓰地兼種藥杏林仙人與同樂箕山之瓢今貯詩雞林賈人知不知老夫别來八九月憂患無端髩添雪負米不歸悲仲子我盆又鼓酸風起傷春不欲向人言恐人忍聽哀號猿最苦䨇眸失岩電近日看書渾不見兀如枯禪壁常面隙有微明澘且眩阿兒呼來滌塵硯代筆題詩簡羣彦無錫華景章以牆東陸先生所序乃祖玉溪義士之文徴予詩故有此作猗歟古聖賢飢溺視由己聖賢久不作人多飢溺死天厯年中歲薦飢老夫身親耳自知操壺枕籍委溝壑烏鳶飽食狐狸肥適逢郡縣無良吏狎弄文移等兒戱義倉和糶百蠧生殊失先民救荒意吁嗟玉溪翁髙義孰與儔黔敖之粥活鄉里立解倒懸危急秋指囷不結當世交易量不效前人尤盡令菜色作喜色如度弱水登蓬邱嗟哉玉溪翁徃事誰紀述鄉人口碑傳四方牆東老手春秋筆老夫知名五十載更喜牆東文字在義聲洋洋流至今又閲桑田變滄海天生孝孫念厥祖禮樂趨蹌䋲祖武丈夫不憂無萬鍾要為顛崖救辛苦唐君舉挽辭早年讀律如五經案頭夜照練囊螢學成能展四方志當路縉紳俱眼青神州赤縣坐蓮幕賛畫雖勞意磅礴青雲拾級歩歩徐腰纒不跨揚州鶴邯鄲夢斷楊花春桑田變海宇宙新歸來東陵剪荆棘故侯誰識𤓰田人竹林小院差可喜為箕為裘奉甘㫖青松宅邊紅稻畦白雲亭上烏皮几四時花木手自栽客來看花常置醴有時寂無語蒲團醉逃禪有時曵鳩杖朗誦逍遥篇得鹿門龎公之安比濟南伏生之年生平有如此死去真悠然薤露歌或可鐫此歌便作碑銘傳過無錫口占客舟無錫道中歸聽唱吳歌淚濕衣泰伯墓田耕觳觫偃王祠廟走伊威二三策在遺芳逺千百年來舊俗非詩寄瓢齋老詞伯吟邊同為一歔欷題漁樵共話圖爾樵斫青山爾漁釣滄洲世事百不聞此心兩悠悠道傍弛擔渚泊舟促膝面語何綢繆想論會稽人衣錦或訝桐江棄羊裘人生窮逹各有分曷不嗒然自作逍遥遊贈醫士錢伯祥杏林老仙山澤􅋯幅巾逍遥曳長裾逢人善作青白眼有子能受岐黄書酒對玉峰傾鑿落丹成金鼎飬芙蕖焦桐掛壁斷絃久藥杵聲中樂有餘題扇青山滿眼氣蕭森茅屋人家煙樹林客星多擲漁竿去誰復扁舟釣碧潯題子昂竹石圖玉堂歸來髩欲絲漚波亭中清晝時竹君石丈意相得不時為作無聲詩安安道人歌僧坊旅宿崑山縣夜讀安安道人傳似將秦鏡作斯文道人肝膽都能見早年學劍欲有為車塵馬足曾驅馳蕉隍夢斷竟失鹿葑田乃耕東海涯安知逃名逃未得射兮旌招論觀徳諸生遊藝集如雲儼如風詠從曾晳歸來自喜安其安一室視同天地寛鹿門龎公與同志妻子不知行路難傍人問我安心訣非佛非仙非臆説纎雲不滓沉寂天水湛霜潭照秋月家居四壁莓苔青柴門雖設晝亦扃年來豈獨樂吾樂堪輿俯仰俱清寧有時得錢即沽酒明月清風作三友胸澆磊塊去即休不學淳于論石斗嗟我碌碌者和爾婆娑歌無勞赤松遊只在青山窩挂瓢樹下舞婆娑歌聲繚繞青銅柯羣雄自奏巻白波安居之樂奈爾何逺緑亭為惠聚寺瑞芝年作道人愛山常目接無復經繙貝多葉碧天低處見絶頂蒼石爛來知幾刼清風一掃六合塵須彌芥子等法身諦觀有色若無色大地盡作曇華春宿崑山延福菴葉舟來訪漁樵社蘭若適逢龍象羣屋近玉山多潤色林藏寶地絶塵紛𤣥壇坐到三更月髙枕眠分半榻雲鐘鼓聲中鳴般若老夫堪笑耳無聞題崑山縣城主簿先塋圖舊家衣冠麟角族隂隂榆栁連鄉曲佳城父祖馬鬛封欝欝松楸在吾目飬親弗及奉庭闈居官豈敢懐蕨薇二十時中公務畢三千里外歸心飛出言不作雌黄口臨事不為髙下手琴堂喜得佐絃歌俸米支來供爼豆髙懐炯如寒露壺連歩陟彼青雲衢兩塋銜土集義烏更遣丹青添畫圖題竹枝雀圖覆車之粟衆喧呼爾獨忘飢入畫圖枳棘叢邊林有竹一枝何異鳳棲梧題玉峰書舎圖為俞彦智作婁江水接東海洋崑山玉立摩穹蒼江山城邑美如畫之子卜宅山之陽邯鄲夢斷歸來後詩三百篇長在手尚將古䟽補蟲魚復以今文挍蝌蚪門前小溪流水清畧彴不通車馬行漁童甕汲供茗盌鷗沙席坐尋詩盟才多轉覺讀書好春雨庭生書帶草時稱狂客醉鄉遊罔俾四明專賀老題畫魚圖魚在在藻或在淵随波泳遊同一天會得莊生濠上意畫圖詩史總難傳題畫竹顧挺之子作父作子述為竹傳神筆意古澹靈犀絶塵品題者誰龜巢老人題雪竹圖此君立雪清復清老夫見之䨇眼明琅玕恐折驚棲鳳三嘯虎頭風欲生絶句二首寫延福山中客况寄止菴長老一榻清風偶借眠白雲長遶枕頭邊客來題遍芭蕉葉我亦留詩謝老禪二風幡交動曙光揺蔬筍分甘到客寮最喜松聲秋瑟瑟月餘忘肉似聞韶一般春希夷古髙士詩言一般春以詩謚攸居夫豈尋常人一般春意何在莊生論天倪託物肆迂怪列子説混淪其言極夸大老夫請以理折衷慎勿謂我胡公之中庸古今先後無始終洪纎髙下俱流通芸芸萬物生意遂盎盎兩間和氣充鶯鶯燕燕妙歌舞花花草草紛青紅孤松或落幽澗底三秀多生糞壤中歩伸尺蠖天運轉户啓百蟄雷音同鶴長鳬短頸分一敢以私意窺神工一般春意如此朱絃嶧桐奏流水洋洋自入知音耳小車髙閣卲堯夫隨栁傍花程伯子針芥相投肝膽合祇應纔到東風裏白雲先生知不知同姓乃有此白眉老夫宿昔愛此詩四百餘載人無之頭髪雪白雙眼眵也來摸索珊瑚枝風波詞家住横山古澗阿孰知平地有風波一壺為濟中流急可奈無金報爾何洪武十六年夏五余寓崑山延福菴蒙李無逸冒雨見訪且邀午酌以尋二十年交好之盟席中聞余茂本通政談玉峰志鏤版無逸能力為之髙義可喜别後作此詩以賛其美并致謝意云老夫著書雪盈顛秃筆掃盡松煤煙書成無人為傳刻明珠暗投三十年玉峰有志今雕鐫公乃下榻邀羣賢魯魚亥豕盡滌濯銀鈎鐵畫森戈鋋婁江風物靡不載一邑快覩人争先知公髙風雅量振頽俗令名當與傳澱山湖邊五畆宅芙蓉錦城耕稌田多情念我久離别風雨逺來書畫舡開樽竹館話夙昔屋角雨聲飛瀑泉爛烹鶂肉軟炊黍特憐老齒令相便草堂之資送杜甫遥知破屋窺青天别來東望澱山月再盈再虧今復絃鵷雛出穴皆五色門牆桃李春俱妍無由縮地更擕手寄詩并送思賢編自挽洪武六年九月作齷齪龜巢翁飄蕭烏角巾干戈二十載幸爾全其身平生得三樂此去棄六親青山為我宅白雲為我隣寄聲謝相知毋勞為酸辛二生為無用人死作無名鬼生死天地間區區等螻蟻商人自忍饑楚人從赴水長鑱付兒曹持以字妻子將來事無涯且免鬨吾耳挽張溝南故人家住江之隂江城草堂花竹深蚶杯喜作真率飲鳳管不殊韶濩音中郎有女可傳業萬事不復縈吾心於乎一歌兮一悽愴白璧如今窆黄壤故人墓在君山下黄絹碑辭更親寫風流不减賀知章軒昂有如嵇叔夜秋風蕭瑟宿草青過客知名多下馬於乎再歌兮再思之誰能為我追騎箕故人生來天骨奇抱才不試清名埀山隂道士寶遺墨雞林賈人傳舊詩寒家夜夜屋梁月顔色宛然前别時於乎三歌兮三太息歌聲未斷還相憶次韻答子才去秋見寄子才名朴上海縣石浦人懐哉博物張茂先淞江太湖煙水連舊藏篇翰合䨇璧新發光熖驚四筵鞠華不濕重陽雨汗竹應書大有年教子一經還自讀林居幽趣相依然感年咄彼新豐折臂翁偷生年與我相同世無兵革真難遇家有經鋤未是窮兒子冷官成覆水老妻春夢逐飄風獨憐未畢全歸願兩目昏盲耳更聾天有眼風波起平地胥溺無可援荆棘生大塗跬歩不得前清朝赫赫嚴紀律汚吏貪婪弄刀筆翻雲覆雨妙若神白日青天暗如漆天有眼視必明何忍覩此世人之不平轟雷尚擊黨碑碎炎霜豈不飛闤扃惜哉延陵好州邑呌囂之聲雜號泣龔黄卓魯幾時來解我閭閻倒懸急天有耳腹中或有劍對面難隄防笑中或藏刀轉頭多中傷人形獸心險莫測擠人火坑猶下石東隣西舎苦牽連爺娘妻子多狼藉天有耳聽必聰何忍聞此世人之不公恢恢天網或汝漏百靈未必皆癡聾嗟哉尼父無復見冶長非罪誰能辯况有䜛夫口爍金將謂盖髙天聽逺寄野居處士春風有花随處看不勞快馬走長安春山有藥皆可采何用樓船渡東海老生常談人所忽門巷蕭條青草没野居隠者獨知言乃曰與我心同然埀簾丹室清如水賣卜君平絶相似得錢沽酒常滿壺談笑樂與親朋俱金谷飛蚊暫時聚静逺何如野居趣匣藏三尺古吳鈎幸無蛟龍驚斗牛焦桐絃絶挂空壁洗心只用床頭易忘年之交三十春與我義同雷與陳千墩别來耳目疾兀如朽株門不出六經家業愧無傳教兒只讀原道篇有懐欲得語同志東飛恨不生䨇翅牛鬼蛇神雖孔多青天白日奈人何願言正己斥邪説始終一念堅如鐵寸膏欲澄千丈渾厥功有無宜莫論和任義甫重陽絶句三首西風拂我菊花筵霜落蒲萄酒瓮前弓勁馬肥煙瘴歇雲南將士正開邊二題糕醉筆吐天花風景蕭條興亦嘉多少玉門關外客故鄉一望一咨嗟三休官陶令果何聊不赴江州太守招天上無人能送酒浮雲空作白衣飄九日志喜黄花無雨笑相看青女初霜未覺寒天下編氓增負版雲南征士解歸鞍市沽斗酒錢三百隣送杯羮物九盤最喜呌囂聲不到來朝雞犬得平安題松溪釣魚圖看花不躍長安馬濯髪滄洲結鷗社千巖萬壑一絲風豈是尋常釣漁者月滿舡水滿川月在水中光不濕人於舡上坐青天魚乎魚乎自悠然只今吾亦忘吾筌林大菴主真公徃宜興參宏辨禪師回途跌傷其膝卧疾久之作此問訊石頭路上悟𤣥機跌破泥丸一笑歸從此不須盤膝坐卧看來徃白雲飛天界藏主銘祖心歸常州府䕶國院信至龜巢作此代簡偶著青鞋出薜蘿竟參白足坐盤陀龍蟠虎踞江山好燕去鴻來歲月多言别石城歸舊隠笑將塼鏡為重磨松枝東長煙霞喜我亦滄洲舞釣蓑題髙士觀松圖賢哉陶元亮休官撫孤松之人坐松隂髙興將無同楚楚煙霞裾澹然冰雪容安知洛陽道車馬正憧憧尹泰春玉峰舊隐圖春風夢破邯鄲枕三徑歸來掃白雲藏壁家書還自讀排衙縣鼓不相聞内交林壑蒼髯叟比徳冰霜抱節君熱客不來心似水滿庭空醉落紛紛王仲昭挽歌詞千墩之隂湓浦曲鬱鬱葱葱煙樹緑五陵豪氣適消亡此地人稱小金谷中有琅玕玉一株枝葉扶踈鸞鳳宿鵂鶹夜飛枝上啼九頭血汚玲瓏玉飛廉怒從天上來東走扶桑西若木掃除妖物靡孑遺玉株亦㧞移荒服八千里外雲南地煙瘴偏方魑魅俗道經七譯路幽險澤有神龍惡薫觸洪浪掀天霹靂飛幾作湘纍葬魚腹丹旐歸來窆鄉土華屋髙邱生死足縗麻痛泣桑梓悲淚痕多似湘江竹嗟我東西南北人愛爾瑰奇曾刮目鄉無旦評勿為少令名在我思賢録嗚呼青山紅塔道鄉墳誰復相期薦秋菊贈醫師張有成嗟哉延陵古城郭舊家喬木秋蕭索先生眉夀氣如春借問平居果何樂笑言吾樂得於天燕饗不勞鐘鼓作一從無夢見周公青箱五經束髙閣便便老腹只醫書頗學挂壺人賣藥藥囊得錢儘沽酒兒舞斑衣我杯勺有時出郭看青山手策笻枝曳芒屩揚子江頭滆湖口晞髪滄洲吟杜若歸來一曲焦尾桐今古閑愁總忘却老夫喜聞心與同以言相贈仍相約東門之東劍井西蘿屋數椽雲一壑肯為尋山數見過樵飲漁歌良不惡人生百年能有幾但看花開與花落世傳仙人上天騎白鶴荒唐繆悠言不怍請從先生持筆削崑山辛彬甫元夕前旅次岑寂作詩懐之魯魚一洗版圖編徑著麻鞋送上天七里八岡風雨夜誰家燈火對愁眠贈吕克明馬鞍之山玉嶙峋氣所鍾者徳潤身古人已矣不可遇今人多躡青雲去中有一人冰雪姿青雲埀翅歸故枝老夫識面三四載但見才華發光彩去年訪舊山水鄉乃聞孝行非尋常兢兢持身親所喜為親不惜殘肢體親存盡歡䘮盡哀哀號淚濕三年縗嗟哉天質美如彼移家恨不居同里歸來細與吾兒說檢身自謂誰優劣緜駒處齊齊善歌東瞻玉峰奈逺何寄耕學袁先生新歲又人日故人無嗣音數詩曾倡和半載孰浮沉笠澤鷗盟在蕉隍鹿夢尋吾今洗吾耳聽此絶絃琴自和感年前韻軒軒黄鶴化鳬翁老態如今變亦同幾度出門遭鬼笑一生徒壁坐詩窮掃松先壠清明日杭葦官河舶䑲風春怨忍聞啼蜀魄傍人為我喜癡聾逸菴詩代膠山徐伯樞作士學而仕猶力於農三時服勤乃逸於冬當勤之時以稼以穡鹵莽滅裂施報弗忒未勞而逸君子所憎勞而不逸君子不能於昭令典致仕有期一日必葺罔敢或随時之至矣銜恩遄歸逸子而菴亦孔而宜其容舒遲其行逶迤含哺鼓腹樂乎雍熙莊曰大塊逸我以老是用作歌以為頌禱清澹子詩世味尚醲郁清澹獨有水寡慾飬吾心汪汪亦如彼朶頥良可羞菜根有餘美凡為君子交當知肉食鄙題趙典史家藏聰聞極所畫水仙有人宴坐風泉室水仙之花照佛日冰鷗滌硯為傳神不著纎塵涴清質山礬是弟梅是兄涪翁品題非過情紅蓮幙静簿書暇時一覽觀心眼明題松菴圖吾聞張子房漢家初封萬户侯便從赤松方外遊又聞陶隠居華陽髙住三層樓尚愛松風聽不休從遊松子或假託請聽松聲真可樂古人今人同此心老去棲遲必巖壑白髪左司諫赤心天子知君恩飬老他日歸光州草木增光輝今觀畫史貌清致想像為作松菴詩青山崔嵬青松離奇三間薜蘿屋四壁莓苔衣前榮燕雀來賀喜中林猿鶴還相依山中服食何所有松根茯苓大如斗松拂輕於白玉麈松醪香似黄封酒座有嘉賓樽不空每日共澆談笑口不言不笑黙相契平生久要蒼髯叟向來百卉腓且衰偃蹇不受冰雪欺尼山聖者無復起歲寒後凋誰品題春風牡丹洛陽市華屋金盤鬭奢靡車馬遊觀人如蟻但説姚家之黄魏家紫那知松菴之清樂如此送任義甫之京放却滄洲老釣竿送將圖籍上長安朝霞爛爛日初出熱客紛紛路未乾七里八岡鳩杖去三山二水鳳臺看薫風解愠今猶古舞袖歸來語所歡辛彬甫自京城回過東洲田舎極言曾覲天顔之喜舉酒送别詩以和之一百十户一版圖兩三箇月兩赴都親承天語拜闕下喜得風帆歸海隅到家且聽華亭鶴斫鱠旋買淞江鱸鄉人為作軟脚局衆樂不妨如大酺悼䕶國院昇東谷和尚憶昔桑田變海時法幢扶起歲仍饑諸方乞食供緇侣十載開堂響白槌香火石龕師子像紗籠塵壁老夫詩客來今雨重留宿誰向東園折露葵六月初一日亡室初度感愴而作白髪三千丈齊眉六十年今朝煮湯餅㸑婢亦澘然六月望自潞城回東洲書目前二事以示親知庻聞者或有省焉緹縈贖父謁天子聶嫈痛弟哭屍死親親義重不顧身千載流芳著青史今人豈無骨肉親冷眼視同行路人朝家旌善作亭子誘我薄俗令還淳吾詩相勸匪相訐不信汝曹之心真是鐵次韻錢彦學見寄頻年歸計果何如九龍之山駒谷虚山中流泉若有語遲子續修鴻漸書二三十年來山上山詩名流落五湖間歸尋鈯斧南泉老壠有白雲相伴閒三萍水相逢記昔年馬鞍山下屢周旋羊裘不脱漁竿老彷彿嚴光也自賢四一榜三魁我舊都如今文盛說中吳詩窮不用論郊島風雅揚揚有大涂五梁谿如鏡照羣峰勝地生才淑氣鍾想像鶡冠人未老金莖露洗玉芙蓉六桑柘東風呌伯勞犁鉏南畆課兒曹一枝樂與鷦鷯並阿閣那知有鳳巢七春秋九十明年是禮樂三千夙志衰訪戴未能移剡棹和陶猶欲繼坡詩題天葩雲液軒識馬不須論牝牡相人但欲知賢否我愛天葩雲液軒中人賢在一真無矯揉戴星出入公務勞退食從容樂詩酒紫毫之筆吐天葩得意如看長安花白螺之杯㵼雲液破悶絶勝陽羡茶謫仙九京不復作一篇斗酒誰共樂藍田哦松人亦好座無杜康殊落寞我詩我酒興不孤風月溪山皆畫圖胸中磊塊盡澆去方寸炯如冰一壺愚聞孔公醉决事勝人醒孔公何人哉希之即齊名斯言請為座右銘酒徳有頌政有聲詩聲更作韶鈞鳴夀任義甫十月初十日曾看滄海變桑田又厯黄楊厄閏年抱膝面山西牖下科頭背日午簷前中郎有女能傳業僕射無兒不怨天八十春秋䨇足健鄉人喚作地行仙次韻彭知縣以公事如宜興過滆湖作百川水溢東流急天風捲雲如捲席雄鳩呼雌鼓晴翼且喜人無雨􅍂疾官舡掛帆出湖去乗風破浪無衝激舟人笑指一足烏烏也竛竮退飛鷁山無猛獸水無蛟陽羡徃來人絡繹蓬牕拄笏看青山佳句屢成忘旰食令乎令乎匪遊逸聊為湖山窮眼力滆湖飛渡不崇朝東滙沙湖又深入彼疆此界犬牙地概用朝家律三尺人言行路古來難範我馳驅自無失星言勒移署椽筆分我餘光照隣壁懐吳中衡心友老去多蒙故舊憐客來喜得信音傳書能教子醫傳業居欲依仁宅屢遷赤米白鹽瀕海地青萍緑綺博山煙曾聞靈素多曾注好擬詩家作鄭箋代簡張子才遐想張梨谷相望吳野居馬鞍長在望魚尺久無書七日陽來復三年月閏餘芸邊生意動君子喜何如王有恒秋初貽書約囬過訪尋假館之盟故作此於丁堰姜氏迓之舊雨魚來今復來故人懐抱亦佳哉黄楊樹厄三年閏緹室葭飛六管灰文有熖光皆李杜情如膠漆即陳雷燈花有約鷗盟在莫負柴門掃緑苔龜巢稿巻十六欽定四庫全書龜巢稿巻十七元謝應芳撰詩龜山祠詩卓彼文靖公早立程門雪載道歸東南統緒頼不絶鳯鳴朝陽能幾時朝棲瓊林暮棘枝歳晚江空卜居此毘陵草木争光輝邇來陵谷一再變煙滅灰飛舊書院殘碑斷礎落誰家應作寒砧搗霜練南山北山禪者流鼓鍾雷鳴塔廟修儒衣儒冠亦不少孰謂好賢無二周龍鍾老諸生不言忍包羞甘棠樹下吐肝膽愛禮可得存羊不羊存禮亦存所願或可酬渠渠一畆宫依然對滄洲將使邑人知有東家某駿奔籩豆祠春秋簡曹谷賔徃昔政和間結交先君子時葉公子承蔣公子舟諸良友數嘗文㑹於九華隠者周先生之家其書札之妙聲詩之佳今皆不可得而見矣區區追憶故交輙成韻語寫去谷賓吟几為後㑹張本云清交早結先君子博學自謂無恒師草堂詩史擬欲續蘭亭字書將並馳百年陵谷變更日四海弟兄生死悲舊字文獻掃如電獨愛羲之又有之冬至日方欲以老况自述孫垣來侍傍說江隂陳庠仲袁仲徴二公倡和之娛區區坐馳因用足成此詩以代折簡耄矣又逢長至日悽然聊作短歌行一妻一子竟契闊兩耳兩目幾聾盲里中尚結雞豚社江上豈忘鷗鷺盟珍重暨陽䨇白璧慎毋輕用易連城江陽鄭教諭以詩見寄褒美太過且聞時赴京考績因次韻以餞其行大君立極揚威靈麾斥百家尊六經出圖之馬出未巳來儀之鳳來不停萬方皆效華封祝諸將已勒燕然銘化風覃被族麟趾聘物逺來鹽虎形雄州巨邑並庠序歌臺舞榭舞優伶先生横經虎皮席弟子立雪梅花庭延陵躬耕地井井尼山聖父碑亭亭正逢海内興賢日豈作江隂老客星泮宫芹藻得佳趣隣封草木沾餘馨龜巢一老辱篇翰鱣堂幾時瞻典型趨裝又欲覲金闕飲餞愧無䨇玉缾淵清冰潔知者衆㑹有孫邕薦管寧予以小爐閣坐卧安燠名之曰熙熙甕天孫塏到江隂語劉小齋先生蒙篆書四字見其筆畫清勁可喜作詩報之乃翁澹齋先軰能篆𨽻而文為鄉郡所稱詩中故追美之昔在金斗城晤言即相違今觀玉箸篆神氣不少衰澹翁心畫傳師承古人誰秦相漢中郎殆欲肩相随舊家冠盖里密邇延陵碑古意師聖筆真贋吾何疑正如善相馬而忘牝與驪懐哉楊子雲載酒當問奇奈無縮地術龍鍾空坐馳周節婦陳氏吾甥也早寡頼其母撫恤之恩為多母卒且以語付託我夫婦擕之避兵居吳中十有餘年白首歸里一生艱苦老夫獨深知之故書此以紀其畧云哭夫未了又姑嫜獨抱遺孤涕泗滂奩具賣來營葬具不憂寒餓死空房二南山石爛海揚塵風雨飄揺笠澤濱嗟嘆渭陽田舎老辛酸同受十三春三狼煙未息歲仍饑蛟室相隣地亦危長夜㸃燈機上織明朝換米釡中炊四戰骨縱横歸路迷烈塘疑是越來溪良人地下應憐汝不作王凝斷臂妻五裙裾藍縷蓍簮折鄉井蕭條草屋卑節孝兩全頭雪白疇能說與史官知臘月十四日風雪極寒大林菴主僧以佛廬落成冰雪堆中作梵宫磨磚布地與金同何當放下南泉斧坐聽松杉萬壑風悼熊元修徴士落落龜巢翁閒閒鷗社叟雷陳十年交雲水三江口在昔鷗沙結社時盟鷗之詞我筆之唫風咏月意相得絶似伯牙逢子期朝亦詩暮亦詩詩興動來忘渇饑淞江太湖墨淋漓鶴汀鳬渚生光輝毛髪雖秋霜光風自懐抱不虞白石爛但覺滄洲好一朝林谷俄變遷我歸耕我延陵田銜寃塞海笑精衛抱怨思家憐杜鵑鷗社叟軟䨇脚晏然不受功名縛社鷗尋盟還可樂苐我路途遥來徃難如昨前年訪戴踐重約舟到山隂眼生膜黄庭不寫贈籠鵝蒲萄醱醅㫖且多船頭送别誦佳句且知步武追隂何音書從此不復得我心孔竅皆茅塞清夜悠悠思故人夢裏依然見顔色客來聞死半年久倀倀不能將絮酒悲歌為探驪龍手三日悲風動林藪次韻荅袁仲徴見寄大江南㟁衆山蒼巖谷深藏寶劍光江上風波來滚滚山中歲月去堂堂能承書業千金産喜有童孫咫尺長杯酒正須朝夕醉無勞更覓解愁方四皓圖天風吹斷紫芝歌四老幡然出薜蘿不用勒兵呼左袒安劉功比絳侯多二飽茹山中紫玉芝姓名誰徹九重知濟時隂有回天力震器安然不動移𤓰隱為崑山邵濟民賦藥壺舊懸紅杏林𤓰廬今住清江潯南柯太守了無夢東陵故侯同此心灌園自捧漢隂甕抱蔓别作黄臺吟老我坐馳三百里何由縮地重相尋簡袁耕學先生馬鞍山開龜甲屏臯比之席講六經一年不見朶雲字三月又看花雨零角巾小像固垂白野史巨編方殺青宜有詩筒繼前軰使我晉鄙沾餘馨寄熊元修摻别廿五月昏耄而受罔於人者多矣詩言此謬餘從可知一笑之餘必蒙警教愛子腹便便逢人問孝先悞傳烏鵲信剛道白雞年鷗社詩千首龜巢稿一編何當重擕手相恤話䕫蚿次韻酬陳庠仲見貽二首鳳凰阿閣自新巢鷗鷺滄洲只舊交百里雲山人契闊一簮霜雪髪蕭騷忍看雨溺堦前蟻怕說風掀屋上茅樽酒論心宜有約誰家竹裏借行庖二春申港上老人村家有詩書教子孫白首竟能安菽黍丹心豈不合乾坤諸生問字車載酒滿地落花僮掃門且喜年來忘世慮不時杯勺醉昏昏又和袁仲徴陳庠仲去冬所寄之作腐草煜煜螢火生枯梨紛紛山蟻行可憐身病道亦病猶喜目盲心不盲溪山相望數千里松竹歲寒三友盟何當相對文字飲似昔盍簮金斗城壽萬拙齋蓬萊水淺鐵船歸城郭人民半是非且喜春秋今七十能知六十九年非二天開夀域大無疆林下幽棲樂且康不須更覓長生藥昭代如今化日長三芳茂山前種玉田芙蓉湖上采蓮船東隣西舎連花竹渾是桃源一洞天四一襟秋水心無競滿面春風唾自乾可惜時無吳道子畫圖傳向邑人看五菖蒲花開香滿庭簷旌廉斾風泠泠髙堂燕客作生日紅頰紫髯雙眼青六今吾故吾知不同朱門無復掛桑弓但將一斛葡萄酒浄洗平生磊塊胸七金作狻猊􅌊寶薫桃笙如水客如雲榴花不用纒頭錦也學吳姬舞絳裙八燕雀歡聲新第宅溪山佳景古丹青琵琶自製玲瓏曲彈與龜巢老子聽九拙齋之拙意何如天賦惺憁本有餘欲識顔曾愚魯地一鞭希驥莫躊蹰十舊家青氊什襲藏兩兒斑衣長侍傍人生可樂有如此一日可比三千霜昔人謂積憂成隂積隂成雨今隂雨之久且多竟不知何憂之積以致然也淺陋之辭姑識歲月時乙丑夏五望後九日也常年五月衣輕葛今年裌衣猶未脱一天凛氣隂如秋谿山黯淡煙雲稠有時雲罅曜靈出頃刻朱光暗如漆商羊飛來作人舞羣鳩醉葚渾無語雷聲虺虺雨浪浪一雨十日夜亦滂人家屋壊什八九床頭泥淖生蝌蚪疑是彼蒼媧石裂天河水漏何時竭補天無術正憂心水鄉之田俄陸沉常州地接蘇湖境青苗在田知幾頃農人惜苗如惜兒苗死一時真可悲全家老稚仰天哭天若埀憐天雨粟不然歲饑方薦瘥里胥催租將奈何贈時義夫生民天降衷所性無不仁物欲肆侵蝕乃底失本真嘉爾鴻鵠姿超然雞鶩羣里有賦蛇毒比屋含悲辛呌閽聲徹天恩波活枯鱗老我無能為喜此聲譽聞願言一簣進將來見嶙峋貽吕雋人生異禽犢秉徳方寸許一本尊所生推恩篤諸父嗟哉淳朴姿片言不輕吐去年赴叔難代服徒役苦槖饘復今年赤脚走風雨紛紛蕭艾中薫然見蘅杜顧予子若孫疇能類於汝宜從竹林遊氣習變齊魯挽徐仲清妙年博極軒􅄮書晚景晏安閭里居小山叢桂蔚如故大兒一官清有餘落成客散烏衣宅送葬人來白馬車安得並騎箕尾去逍遥八極曵霞裾夏五即事貪墨何多禍蔓延刮毛龜背欲成氊千村萬落炊煙斷田舎逃亡犬餓眠寄王尚絅陳子儀諸友起予每憶二三子投老于今九十年自是片雲相隔爾如何尺素亦茫然蝦蟇産鼃横山下螃蠏輸芒滆浦邊若問龜巢舊風景月餘隣里斷人煙簡無錫華景章百書不如一見面此語信然胡未然燈花有約半年久桂子已落中秋前東門種𤓰抱溪甕西齋瀹茗􅆽山泉少遊鄉里樂如此應笑鳶飛瘴海天寄徐伯樞東膠山人不出村南州髙士之裔孫十年曾作螻蟻夢四壁祇有莓苔痕松分女蘿補茅屋筒引乳泉澆藥園别來幾度屋梁月顔色宛然清且温寄丹陽孫秀民翩翩白鴈秋風凉紛紛白蘋秋水香官河兩堰隔三舎旅次一違今十霜菱芡練湖秋大熟莓苔劍井夜無光故人知我老癡否年似伏生書盡忘懐京口俞伯鎮鐵甕新城舊隱居江山勝槩畫圖如五條街口多輿馬萬巻書中老蠧魚道合不妨鄉土異情親可奈信音疎杜鵑花與人俱好珍重題詩一寄予洪武乙丑秋新鄭縣學以通經薦吾孫塏移文本縣徴赴吏部塏於六經有望洋之嘆且欲辭而不可得予以孔孟之書列乎九經塏嘗受業故臨别示此數語朂之猗歟古聖賢遺言存簡編孝經及論語孟子書七篇載道繼六籍煌煌日星懸斯文覺斯民千有五百年汝生家避兵九經失青氊借書二三策教汝朝暮間大哉孔孟學曾如管窺天還鄉願卒業奈汝多迍邅朅來誰薦鶚通經乃虚傳徃哉詣春官從實吐肺肝絲麻雜菅蒯博采豈舎旃天朝恩惠寛茅拔茹或連立身報君親慎勿違至言送楊景子以通經薦舉之京亭亭青玉桐孤生秀中林雨露得所飬歲月亦已深良工㧞奇才獻作羲皇琴繫以朱絲絃鼓之丹鳳吟八風宣九垓令人格非心鄭衛化韶濩太和無古今吾將洗吾耳朝夕聆遺音和景子冬至韻隱隱鐘聲出景陽陽生望闕賀朝忙勲名有日印如斗舞蹈今朝靴滿霜咫尺天顔春色喜輪囷雲物瑞光長錫錢張宴宸恩厚一舉真堪累十觴冬至後五日承郡齋文㑹翌早賢長史置醴􅍁洽且有贈言次韻奉酬并謝不敏文章太守誰同樂幕府賓僚如李郭坎蛙誰信有奇逢鼓吹敢随東海若枯腸喜得酒一澆枵腹毋勞篾三縛獨憐澗底老孤松春風膏雨徒優渥初度作重光之冬湯餅客孟光相對頭俱白吾兒樵雪中歸來擔頭還帶詩三百詩歌熾艾夀觴舉呼鶴堦前舞瑶翮安知此後境多乖五載家門毁雙璧行年今與伏生同兀若枯株雪霜厄樵兒遺孤主黔簿四千里外勞相憶我昔蹉跎四方志每見桑弧有慚色願言膏雨發孫枝先世衣纓復輝赫皇天於余賦亦厚才散如樗夀如櫟語言聲音耳尚聞黑白分明眼猶識四肢百骸筋力微頭容與心依舊直呴嘘素不學松喬逆理偷生正何益曹横山下青松宅含笑全歸待朝夕山瓶乳酒如蜜甜笭箵寒魚鮮可食家僮荷鍤且勿忙為我挿花吹鐵笛自今每日從歡伯龜巢甕天適吾適斷送予生真上策卧雲歌為華景章作我昔所喜青雲人雲梯登登上星辰餘如風花落藩溷伊人可仰不可親只今老我成枯朽愛爾巖棲卧雲叟白雲一壑數千畆且無租稅論升斗悠悠我如雲寂寂雲伴我雲無出岫心吾無洞門鎖一榻偃仰得自如兩膝屈伸無不可布為被非難能我被以雲如白綾木為枕吾未曾以雲枕頭時曲肱牀無上下亦無客别有意氣非陳登飛鳶跕跕自炎海夜鶴繐帳清於水佳哉叟之所樂者如彼今人古人誰可擬華陽陶隱居投簮謝朝市山中作相心未閑剛道怡雲豈無愧華山陳處士大笑脱塵屣鳳凰銜書空徃來熟睡雲臺終不起願言學陳毋學陶此身長與雲逍遥萬松嶺上老禪衲形服雖異同清髙况有煎茶好泉水活火煎來味無比詩腸搜出煙霞語不異不同人共喜老夫耄矣筋力少尚欲去著遊山屐細啜月團雲滿甌分卧石牀雲半席幽懐為我一宵傾免使相望兩相憶郡侯以蘭行年九十以詩見贈敬以次韻厯叙平生以鳴謝臆延陵野老家業儒舊壁頗有先人書童年愚鈍不努力渉獵五經多缺如二十而冠三十娶取友必端無佞諛春秋四十五十餘髮猶未白顔猶朱才如襪線不知恥光範門前曾自譽六七八十成潦倒興來尚復歌吳趨今年九十常晝寢誰敢效尤扳宰予雲山萬疊作圖畫松風一壑鳴笙竽雙眸漸昏耳漸聵面壁寂寞如僧居焉知府公特尚齒贈以大篇明月珠老夫得之感勤渠雀躍起拜不用扶合室稚老俱驩虞十一月廿七日得塏口信以詩志喜并記臨别祝規之意賣橘人從采石還口傳家信報平安路經湖北雖云逺天近雲南不甚寒佐領謹持三尺法尊君長秉寸心丹驛橋臨别叮嚀語應念貽謀作鏡看自和同前詩於次年正月十三日附寄黔陽四千里外之官去百丈牽江舸艦安新沐恩波從日下舊家門地不氷寒洗心正在詩書澤換骨毋勞内外丹新歲僕歸正二月家書細寫阿翁看簡陳子章先生身不封萬户侯眼不識千金裘深衣幅巾避兵矛徃年零落崑山州兵餘還鄉理西疇臺笠播種襏襫收今將蓋棺萬事休但欲服飾如前修先生舊衣巾暫爾可借不縫人遵古制素願吾乃酬飄然長裾泉下遊藍縷免致先人羞生前相徃來二老亦風流横山歌夀萬拙齋横山之顛青入雲冠冕一邑無與倫山南風景最佳處隱居豈是尋常人此山鍾英三百載素封不乏青氊在向來吳下避煙塵恨不移山東入海還山喜得無崩騫種玉舊田耕紫煙雲屏正設後堂後空翠直灑前塋前觀雲每日烏皮几灌圃有時龍井水人家雞犬寂無聲宛若桃源畫圖裏山中羽人年八百昔日仙宫今佛宅丹砂未必駐童顔把酒看山真上策山乎山乎徳不孤靜而夀者山為徒美哉山禽知此意石榴枝上呼提壺我歌横山歌未了拙齋為我開懐抱移宫換羽作新聲彈入琵琶歌更好百斛葡萄為傾倒屢年作小詞或詩為萬拙齋夀癸亥夏五予以鄉人嫁禍兒軰徃崑山救之作此詩予懐紫髯翁新作緑野堂常年初度日嘉賓四筵張虚左待老夫酌我九醖觴甥孫舞鴝鵒絲竹鳴鳳凰情與酒俱深飲量非汪洋今雨獨不至應憐走他鄉峩峩馬鞍山絶頂遥相望横山一髪青滆浦西日黄想像祝睂夀有如賦髙堂留别永懐寺長老暨袁子英俞茂本通政歸吳十載前一宿永懐寺龍鍾今兩來鹿苑廢如此佳爾山中人法幢扶欲起清風方文室白日靜如水門迎老詞客問我來何自忘形亦忘年相見即相契坐啜趙州茶並隱維摩几爐薫清我心乳供便老齒鈎簾看玉峰山色亦為喜新知多邂逅咳唾珠玉美白首莫逆交獨有子袁子徳星聚叢林草木亦韡韡我思古先軰支許或可擬兼旬數相過倡和不知幾庭前石榴花半落蒼苔地長揖謝山靈歸袂霑空翠陳徳廣知事以自夀之詩見示予以其災字韻險不和乃效唐人和意以夀之故落句如此云哦松未了休官去随例放閒恩更多父子一經傳有自桑蓬初度樂如何門栽彭澤先生栁籠飬山隂道士鵝最喜孟光睂案舉捧觴嬌女把香羅徳廣喜予詩和韻見貽予復答之即三月十一日䌓霜之異於頷聫書之非虚語也繭紙寫來詩句好雞林傳去古人多花開三月春如許霜落五更寒奈何留客政須沽緑螘引年何必餌金鵝六街車馬紛馳逐自喜蕭齋雀可羅次韻荅華以愚見寄九隴山東舊宅遷一瓢齋裡曲肱眠賢如栗里陶元亮閑似香山白樂天倡和正須歌白雪丹青何必繪凌煙竹林諸阮多才俊文㑹何時共酒船哀詩鐵船海上逺移家金斗城中蔗境佳我昔頻來桃竹杖公方新種木蘭花書因教子時常買酒欲娛賓夜亦賒春夢一塲随蜨化老夫三歎立鷗沙東西家東家賣兒哭幽咽西家鬻妻含淚别形容總覺瘦如柴肝膽那能硬如鐵低田水没欠秋租今年夏租麥更無妻兒舎我莫怨呼我亦忍饑朝暮殂重午日小酌青年自是好遊者白首始知行路難一寸芳心徒似鐵數莖秃髪不勝冠匏樽偶有菖蒲酒菰黍香於苜蓿盤莫笑貧居輕速客餘生能得幾團欒五月望日寄江隂陳庠仲一别半年久相望百里間陽春知寡和落月見清顔釃酒澄江上題詩小石灣龍鍾還念我時復夢追攀同日寄袁仲徴申浦水東頭悠然客馬周焦桐絃白雪芳草席滄洲昨夜三更雨今朝五月秋有懐飛不去煙樹鬱相繆曹文質自金壇來云費延年教諭傳語且知告老而歸閑居可喜因作詩代簡我思故人松柏顔客來寄聲蓬藋間鱣堂講學竟將老鳩杖拜恩今樂閑清風枕簟五栁宅白雲圖畫三茅山雪舟未得見安道乗興豈無詩徃還朝宗鄭教諭以余去冬初度自夀之詩次韻見貽予復和而贈之憶昔予為廣陵客兩頰丹砂眼青白蕃禧觀裏看瓊花坐列羣英杯飲百無何陵谷忽變改塌然歛我扶揺翮此花天下更無雙毒手誰焚夜光璧先公舊物廣文氊家傳喜得無囏厄抱琴來坐杏花壇洋洋古操令人憶青氊坐久琴愈清君山草木皆愉色老夫今春辱佳句轉眼炎曦又隆赫郢斤非不妙彫鎪奈何吾衰腐如櫟生平甚愧性聱牙老去偏懐舊知識孤舟野渡豈長閑一壺㑹有千金值合歡杯酒細論文恨不能飛見三益江流南匯春申浦海門東入陽侯宅河魨江鮆鬭鮮新苜蓿之盤自朝夕􅓺舎安如廟堂坐脱粟甘於鐘鼎食睠我郊居樂亦然朝聽樵歌暮漁笛忘機相與白鷗眠送窮不效昌黎伯假令秋至轉饑寒亦不題詩寄髙適賢哉子淵可矜式陋巷安貧載方策六月初八日雨晴懐毛伯尚去年五月凉如秋今年六月寒颼颼重雲晝暝雨連日田家復恐沉西疇朝來日出温風起歲不薦饑人共喜貧家四壁屋漏痕彷彿篆書千百字忽憶山中人讀書兩眉白能負仲由米曾漂髙鳳麥髙堂飬親侍親側我衣斑斕親喜色有時諸父竹林遊彈琴詠詩尊爼席人生此樂古來少今乃熊魚兩兼得老夫每問書帶草鄉里小兒渾不識但道墨硯池水漲苔衣碧苔衣碧池水香思若人兮不能忘長林豐草春茫茫青松澗底含氷霜鯉魚不随白石爛鳳鳥有時鳴朝陽停雲之詩歌未足𤣥蟬為我聲相續哀詩鶴長鳬短總休悲聽我山陽笛一吹黄耳再無前日信丹心獨有上天知送行南浦成長别歸卧東山悞有期吾老未教僮荷鍤劉伶應笑阿翁癡讀大誥作巷歌二首天語諄諄禍福靈風飛雷厲鬼神聽掛書牛角田頭讀且喜農夫也識丁二一天風雨洗塵昏日月恩光及覆盆雞犬不驚田舍樂呌囂人不到鄉村贈陳棲雲鶴溪之水滆浦分一灣繚繞梅花村窮冬萬木凍欲死此花巋若靈光存清如西山采薇孤竹子白於華陽洞口隴頭雲隱居者誰希夷後人持一編種樹書戴一幅漉酒巾有時醉飲肱作枕老瓦共眠梅樹根有時不醉百事理可與孔公同出羣青鞵布襪駿奔走今年早春朝至尊紅雲殿前三舞袖歸來滿腹懐絲綸諄諄語鄰里切切教子孫子孫不但力耕稼徴輸能為公家勤編氓租斛足萬計雞犬不驚安老親短檠燈火讀大誥喜色夜夜燈花親甌窶滿篝秫田熟歲釀百榼酴醿春親朋簮盍座常滿湖鮮日擊豐盤飡胸中不著愁半㸃雲夢八九能鯨吞東鄰西舎靜如水夜無催科人打門安居樂土有如此何異武陵人說桃花源老聃戒止足願言尊所聞濁水膠可澄清鏡塵乃昏秋風挂席一相見此意吾將三復論贈周彦美象賢有子付青氊家住城西緑水邊門栁數株同舊日公租萬斛喜豐年試聽濯足滄浪曲應笑燃臍郿塢煙朝夕酒杯長在手優㳺身作酒中仙簡王尚絅不笑幡然謝九流牽車服賈思悠悠醉吟人老香山社詩到雞林價重不贈詹伯逺西北風髙寒露零牽蘿補屋揵柴荆看雲長日烏皮几夜夜教兒讀孝經示孫塏龍門一躍去年秋徑著青袍赴逺游半部魯論堪輔世政須忠藎繼前修二黔陽江水不勝清喜得居官濯爾纓秦鏡照人肝膽見邑民應在鏡中行三黑頭勲業志方雄黄耳書歸見面同斷織機中埀白母抱孫時復倚門東四春雨秋風歲又寒翁年近百足蹣跚横山菽粟東洲水多在行窩樂考槃初冬感懐令垣書所居屋壁在昔陵谷變海上十五霜歸棲失故隣乃落劍井傍百指薙荆棘耰鉏破天荒東洲釣月磯横山樵牧塲一葦去復來十月新稻嘗擕幼入寢門淒然北風涼吾兒婦嫠居我孫官逺方筠籠鶴何之盆菊花自黄跛倚赤藤杖終日徒倀倀初度蔑以為樂杜撰古樂府三章而令諸孫誦之老夫聽之比之挽歌者歌蒿薤於柩前豈不樂哉龜巢老人忘食貧歲時強欲娛賓親賣琴沽酒作生日蹲䲭爛蒸鮭菜新承歡幸有斑衣人君不見古人云酒杯不到劉伶墳杯行莫厭頻二龜巢老人貎不揚觸邪之性如神羊生憎巫覡煽妖妄疾視聃竺隳綱常耄無能為龜六藏滄浪曲窈窕章有時擊節呼兩郎男兒當自強三龜巢老人年紀多雞皮鶴髪背槖駝金丹自古無足信鐵硯如今亦不磨坐待蓋棺歸薜蘿舂有相巷有歌此時不樂成蹉跎殘生有幾何樵海歌為秦文仲先生作出山志云逺樵海名非誇老夫素相知髙風真可嘉早年欲伐廣寒桂增月清輝燭天地又欲㑹稽雲夢伐箭竹人無戰鬭遭鋒鏃汗青六經天下讀此志適蹉蛇陵谷俄變改青山樵侣集如雲一笑飄然入東海任公舊日釣魚處樵屋相隣蛟室住扶桑若木有餘薪且喜路無荆棘慮水底珊瑚樹亦多尤物不堪開眼覷樵擔弛樵斧歇濯足滄洲弄明月興來擊節和龍吟唱我海樵歌一闋也不學負薪讀書朱買臣也不識卧薪嘗膽是何人白螺為杯大如斗青苔席地軟如茵有時獨酌爛醉枕柯斧睡到日髙三丈猶醺醺夢魂不到長安市長安市上多覊旅米珠薪桂莫能賒多少伯桃寒餓死孰知海樵之樂有如此寄溧水開福寺長老源别流客有溧陽雲水僧相逢曾得問南能九重日月恩光近一壑煙霞道氣增龜紐肘懸新賜印麈談語續舊傳燈别來老病時相憶欲覓金篦刮兩瞢悼徐孟銘讀盡岐黄上古書幡然讀律應時需一官再調炎州幕二豎交攻瘴海隅頼有故人收白骨歸來鄉國瘞黄壚杏林花落紛如雨何樹哀啼五尺孤臘月十六日夜篝燈作兩書言不盡意夜半後欹枕對月口占言懐命兒軰録上耕學伯齡元修三先生南澗海萍二講主清真一鍊師暨諸吟友照天蠟燭徒明月縮地神仙是子虚九十一年殘臘盡二三百里故人疎詩成唐律傾懐抱書託吳儂問起居老我形容都變改依然貧似馬相如任義甫生日作絶句四首以鰥居無子貧病為憾予乃以理釋之誠如吾言則不必怨天尤人而處之泰然矣兄有遺孤骨肉親堦庭玉樹一枝春駿奔籩豆非無主傳襲箕裘未是貧池有紅鱗堪入饌杯浮緑螘可留人髙年已過磻溪老每日懽娛莫厭頻贈蔣居士全家欲學老龎禪木榻蒲團夜不眠誰信室中靈照女出門先上渡頭船贈袁居士羮牆欲見老瞿曇貝葉書中日夜叅布襪棕鞋門不出一盂疏食勝肥甘正月既望予奉陪邑長貳置鄉先生之祠于學釋菜而歸兒軰謂故人楊澤臞過訪臨别作長短句貽之余因口占以記鄉校中盛事并寄楊為後㑹之約云喜聞邑有絃歌宰哦松之丞更文采翕然敬我鄉先生祠諸學宫儼如在區區後學尊前賢駿奔執籩忘耄年深衣幅巾拜祠下燈月交光星滿天扶憊歸來語鄉曲此事真能厚風俗安知好客過柴門載殽問字成虚辱吾兒不識氷玉壺但言此客從前無醉墨淋漓灑白雪沂雩興與曾為徒老夫此興亦不淺尚怯落梅風剪剪少頃一百五日來蘭臯蕙畮光風轉三山湖頭舴艋舟百花莊上逍遥遊朝陽碧樹自鳴鳳湖海詩盟尋白鷗生平頗恨少知已晚有奇逢寧不喜朱絲重繫焦尾桐請為鍾期奏流水水田歌歌農務也郡縣之政租賦為急然農務乃租賦之所自出可不急乎首言三山書所見也一府四縣意在其中惟當道父母官念之芻蕘有詢更當面陳其詳以備采擇三山湖頭白水田頽㟁不修年復年田家豈不憂卒歲十室九空人索然饑腸雷鳴狀如鵠春來怕聞啼布榖願言州縣父母官喻令蚿足憐䕫足古云民事不可緩桃花雨晴春正暖文移動若風有聲畚鍤集如雲不斷三農畎畮合羣力四邑溪山增喜色麟史重書大有年官無負租民足食龔黄卓魯政績成一日九遷皆上卿天子萬壽黄河清聽我老農歌太平無錫舁佛像由暨陽而來鳴鑼鼓竪旗盖儀從僣侈家至以禍福惑人取粟帛無筭東洲任耆老沮之巫不遜被毆且以杖搪木偶幾躓而後去隣莊有王氏者撻而逐之予聞而喜乃力病援茟書此以美任并異其義理之勇云梁公毁􅁋祠真是霹靂手胡公能打鬼近代亦希有區區辨惑編或有蒙醬瓿潦倒東家丘忽爾發哮吼老拳敺妖巫拄杖擠木偶西鄰一壯夫怒挺擊羣醜捐袍偃旗蓋脫網疾走時予病中聞病去什八九朂哉爾東家内省宜弗疚報本理所崇毋落豺􅆩後一正勝百邪昔賢同不朽題打毬圖擊鞠流風自李唐官家占作狀元郎科塲廢盡毬塲在芳草萋萋幾夕陽清明後一日邂逅薦福寺長老源公話舊論詩意甚相得明日作此詩代簡貧如南阮甘投老喜得西枝近贊公白足有僧聽説法江梅無閣坐觀空詩成芳草斜陽外道在殘山剰水中一笑相忘今古意清明時節舞雩風沈徳麟母哀詞怪底吳霜二月繁一朝摧折北堂蘐母儀表表真堪畫吾軰區區豈易言斷織機中多教子分甘膝下並呼孫慈顔最有難忘處獨倚蒼茫日暮門洪武丁卯年詣烈塘祖墳祭掃恐朝暮即世子孫不知所葬者為誰且追念墓松在昔為邑里諸宰木之冠感愴寫情并圖葬穴以示兩子及孫使識之以永其孝思其詩曰百年兩度桑田變三世十年蒿里同華表前時曾駐鶴長松何日再蟠龍情鍾寒食蘋蘩外淚灑春暉草莽中老我客鄉歸不得空勞杜宇喚誰儂次韻答江隂鄭教諭見寄揚子江南山水奇杏花壇上晝隂遲魯魚亥豕讎經史江鮆河魨閲歲時兩邑相望三舎地九年凡寄數篇詩恨無縮地仙人術把酒論文醉不辭葉道士遊仙詞海變兮揚塵翦若木兮風斤醫拗人兮寓世仍猿鶴兮同羣冠切雲兮霞佩雜三秀兮蕭艾從喧囂兮萬􅄜聊遊戲兮方之外混混兮和光忽蟬蛻兮坳堂陵虚空兮轢渺茫一瞬息兮三千霜吾不知其果何適兮祗死守乎康莊輓萬拙齋曹横山下萬家莊喬木隂隂夏亦凉法曲琵琶彈鐵撥髙堂窈窕捧瓊漿素衣忽被青蠅汚赤手幾遭猛虎傷賀客未還來弔客老夫雙眼淚淋浪閏六月廿九日飄風動地自黎明