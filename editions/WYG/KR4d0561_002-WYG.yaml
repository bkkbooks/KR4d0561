聲俱可觀相逢莫恨無知者縑素盈箱乞傳寫絶勝編書斥異端老我穿屋牛衣寒十年歳月磨研鐵嬴得羣厖爭吠雪願君為作指南車獨行周道當何如荅凌萬里見寄移家一别十年多予髮蒼蒼子若何老去情懷偏念舊向來消息頗傳訛遥憐杜甫因詩瘦欲為揚雄載酒過稍待長江羣盗息洞簫吹我醉時歌送辛明善之縉雲監税兼簡髙則誠錄事縉雲山下水盤盤一舸夷猶七十灘如此壮遊良不惡何妨逺别去之官風生白苧征衫薄雨過黄梅客路乾傳語郡中髙錄事小篇求序冠篇端題桃源圖昔年曽讀桃源記㑹得陶潜言外意柴桑避世如避秦恨不山深絶其事借人為喻説桃源漁郎之遊皆寓言不然溪上山如故何乃舟迴徑迷路若令此景真在山此翁必入窮躋攀編書不用書甲子姓名無復留人間只今唐虞太平世花栁村村足佳致不須重展畫圖看四海桃源復何異張子毅生日招飲以詩夀之深山大澤生龍蛇文采風流出故家柔桑負郭田三頃燈火乃翁書五車南風初結石榴子細雨㣲浥菖蒲花生徒女樂為君夀老夫也得醉流霞避雨繫馬庱亭東郵亭似鶴籠長河飛白雪髙樹洒清風州境纔相接鄉音便不同野人來問字錯認是揚雄無錫贈何敬存歳歳九龍峯寒泉落冰雪美人此傾盖為我滌煩熱世途自荆榛肝胆無楚越凭髙一長嘯清風滿林樾送崔仲徳歸錢塘家住湧金門瀕湖五畝園梅邉童養鶴松下客呼猿頭白心猶壮官卑徳自尊徴車未來日詩禮教諸孫送盛本初教諭之全椒淮海維揚才俊多先鞭奈爾妙年何瓊花春酒三年别滁水秋風一葦過聖代只今興禮樂人家是處有絃歌安書寄與南來鴈時有新詩到薜蘿時乃翁克明先生為毘陵教授故云辛至善永思亭而家本西域而翁葬桐鄉鄉人猶永思哀哀况諸郎春雨暗宿草秋風悲白楊别來春復秋於焉奉烝嘗思成見容色宛在羮與墻一念不少休東流水湯湯到海水猶已此心未渠央貽謀子若孫百世豈有疆次韻陳知逺秋日言懷奔牛古堰頭築室俯滄洲愛客常沽酒躭書不下樓青山啣落日白露濕髙秋最喜多兄弟雙親百不憂諸葛用中成趣軒幽幽小園池結屋三四楹若人青雲器乃有邱壑情渉園以成趣尚友陶淵明池水魚潑潑花枝鳥嚶嚶太極圗外意芳草堦前生吾趣吾自知對客無以名欲識琴中趣且聆絃上聲欲識酒中趣百壺與君傾啖蔗勿遽棄佳境将來迎李御史過訪霜飛白簡照南臺早歳君門射䇿來獨立敢言天下事實封頻到御前開騑騑驄馬過茅宇戀戀綈袍念樗材慚愧山林麋鹿性偃然方樂卧蒼苔題畫鷹蒼鷹獨立清秋樹劍翮風生欲飛去林間燕雀動成羣海上鴐鵝亦無數鴐鵝燕雀鳴聲喧擊之不擊無足言快須為我殺鴝鵅勿使空人之曠城曹娥廟死孝魚龍窟垂名簡册香江流随姓氏鄉土奉烝嘗黄絹碑詞古青山宰木長世間梟獍子何面過祠堂伏日奉懷浙江髙掾吏次早友人黄仲徳入杭以詩代簡伏日常年苦炎熱今年伏日風雨凉官曺早出丞相府賔客髙㑹湖山堂垂楊繫馬緑隂静畫舸採蓮紅粉香應有新詩紀行樂武林風物増輝光河魨世言河魨魚大美有大毒彼美吾不知彼毒聞已熟其子小如芥食之脹如菽腹腴膏血多目脾頭項縮烹􅠉茍失飪禍至不轉瞩或言直一死輕命重口腹爾來廿里間杯羮數家哭譬諸安與史敢用甘顛覆溺愛多不明奚止一水族作此河魨詩逢人敢忠告過鄒道卿先生墓有感忠公天下士夙學能慎獨平生寸心赤耿耿照黄屋元符引裾諌痛甚賈生哭上言正中宫下言斥當軸直道時不容除名竄荒服建中及崇寜寵辱手翻覆炎蒸嶺南地文章散清馥晚歳歸故山林荘竟埋玉向來望佳城欝欝暗松竹今為禾黍區春雨耕觳􅑌翁仲知何歸雲仍困無告嗟予佔畢生斯文賴私淑願言理侵疆重植宰上木愚公将移山自謂計已熟精衛欲填海可奈力不足傷心復傷心殘碑卧荒麓簡呉門葛可久東南古吳㑹江湖浸坤軸閶門萬人海驪珠混魚目嗟爾珊瑚枝光彩照壑谷挺挺八尺軀便便五經腹復用岐黄書教子時共讀座有焦尾桐樽餘荔枝緑我室雖甚逺扁舟往來熟此别獨經年羮墻見鴻鵠珍重應時須抵鵲毋以玉時分省募文武士間可久欲應命故有末句寄謝京口俞府判先生辨惑編序憶昨倚槁梧往學太古音清風一揮手為我湔蓬心言歸卧空谷神飛繞帷林寄來明月珠價重雙南金豈不懷報章慙媿秋蟲吟人生少㑹遇嵗月何駸尋晨瞻蒜山髙夕覽江水深江山𣺌予懷塵世盈我襟行當駕黄鶴從逰閬山岑璚花行送盛克明歸維揚揚州好花非不多奈爾絶品無雙何水沉香骨素玉蕋琉璃滑葉青揺柯東風二月花時節二十四橋香浸月小山樷桂避芳塵東閣官梅褪殘雪向來名士多品題括香御史今亦知何日移春獻天子不負此花天下奇王長史代祀天妃囘偶留常州為予作辨惑編序驛亭飲别以詩謝之使者祈靈海上囘蛟螭逺避漕舡開入朝将進賢人頌當路皆知舘閣材傾盖道邊欣邂逅邅車林下久徘徊彩毫題我蒲編去鸞鳳囘翔燕雀猜長史名餘字叔善平章庫庫舘客也奉同干尚書賀髙太尉承恩詩紫鳳啣書下日邊一樽金幣禮髙年天恩已見來三錫月俸猶供十萬錢緑野午橋閑几杖長洲茂苑美山川舊家池館花如錦簫鼓春風送酒船次韻陳心逺久雨秋風巻衡茒我屋漏已久春來復多雨水馬階下走人皆憂巨浸我謂晴可守獨憂東海上連年聚羣醜官軍渉鯨波鼠輩未梟首西疇化沮洳閑我扶犁手何以解此憂山缾瀉春酒喜復鄒忠公墓田賦絶句十首謝兩郡侯新松重植古人墳五馬同來兩使君歸我侵疆三十畝山靈慚愧謝移文二白頭翁媪倚林荘咲指荒邱舊石羊誰料百年荆棘裡又看金紫奠椒漿三奕奕祠亭春雨晴青山紅塔照簷楹檐前燕雀聲何喜冠盖如雲為落成四去年風雨暗桑麻今雨楸梧一望賖寄語無情梟獍子壠頭銜土有慈鴉五傾囊不惜購殘碑為愛前朝幼婦詞賴有賢侯知古意從教俗士笑書癡六府公遺愛沾幽壤禮部文章勒翠珉寒食清明人洒飯落花飛絮鳥啼春七里翁猶記前朝事五馬年年上冢來白鳥能言髙柱立黄楊合抱細花開八青山無數麒麟冢人到林荘下馬過為問路傍楊栁樹向來興廢事如何九景鄒亭在稼亭東斷礎猶存草莽中郡圃何時重構築羮墻長見道鄉翁十千古一坏忠義土青山門戸碧溪陰溪流冷浸中宵月照見先生未死心二月歸田舎作十年為客不窺園數日還家獨閉門兒女牽衣拂塵土親朋折簡問寒暄江南花栁青春好淮上風烟白晝昏聞道賊渠今磔死雨窓歡喜倒芳樽二余生甘分老漁樵竹徑柴扉掩寂寥舍後薄田堪種秫門前流水喜通潮人遭歳歉飱榆粥天假春晴養麥苖早起凭髙望西北楚氛猶似未全消三天開鐵網放鯨鯢甲馬歸營罷鼓鼙四海蒼生皆鼓舞三苖何物竟昏迷愁聞近日軍需急幸得新年米價低春雨隴頭耕未得桑林布榖為誰啼四鴉鳴鵲噪總無靈庸孺譌言更莫聴萬國山河春蕩蕩一時烟霧晝㝠㝠官軍自足追窮寇縣吏猶勞募壮丁何日賣刀仍買犢花村雞犬共安寜五飛芻輓粟未能休嗟我鄉隣日夜憂何事羣兇恣猖獗半年諸将擁貔貅桃花過雨紅顔老杜宇傷春血淚流堪笑腐儒無可用下帷依舊説春秋記夢并序至正十二年六月初八日夜夢于先人舊居之後堂看故兄所遺春帖有讀書傳家等語因念先人嘗言曽大父以儒名家從父領鄉薦為校官我兄猶好學而文今其孫無有似者次兄二子皆廢學吾三子皆未成立以此感泣旣覺而涕泗交頥心甚怵惕因作以示兒苦熱夜難寐坐久方偃息夢歸巷南宅竹樹皆歴歴伯兄手題詩猶存後堂壁余時因感傷先世本縫掖書聲今寂寥寶樹化荆棘立觀楷書字哭泣泪沾臆覺來憶詩話白月光滿室重念世澤微門衰自疇昔我方埀髫時伯父死于溺音容兩茫然了若不相識但聞能孝友風姿頗清逸四十五六年遺文總狼籍題壁尚何有此夢生此夕予生雖無成多賴讀書力揩劘鏡上塵積累機上帛嗣續幸不冺所願能自植木也年十六林亦及二七阿森今九齡父母俱愛惜不為樵牧童又不學稼穡螢窓與雪案寸晷宜自惜讀書承世業此語真藥石汝曺能黾勉是亦尊汝伯旁觀勿相笑説夢等兒劇客來革孔頻移轉覺寛酒杯雖舉不成懽客來為説紅巾苦窓下榴花亦怕看進士馬仲達為常州路錄事司達魯花赤監築城以詩見示余次韻荅風櫩抱膝聼鳴蜩頗覺鄉隣有呌嚻四海百年歸一統兩階何日格三苖斗城新築關門早鐵騎南征去路遥年少參軍金榜客可無奇策上丹霄至正壬辰十月廿二日于妻兄任氏家避亂得家兄信感歎而作避地横山下離家十日餘鴒原常在望魚素忽傳書猛虎走城郭蝮蛇生里閭欲歸歸未得搔首獨躊蹰初度有感十一月初六日時年五十寓任氏我生何不辰埀白遭亂離鄉城箭滿眼咫尺不得歸百年今已半喘息能幾時桑蓬負初心蓼莪有餘悲慚愧朱買臣富貴能自期男兒無所成百齡亦何為對酒不復飲把劍空欷㱆寇退别詹魯賢君家天台下我家滆河邊針芥一相投膠漆四五年倉皇避羣盗妻子同一船中途苦離散經旬各憂煎再見若再生相依益相憐横山樹歴歴東洲水濺濺山水非不佳旌旗日紛然兩家妻與子一月夜不眠明發竄榛棘衣被裹槖饘莫歸客櫩下耳語青燈前葵心傾太陽杞國憂崩天逝将哭秦庭乞師掃風烟臨期賊遁去此志徒欝然坐閲明年春東風草芊芊慘别斗城下相顧猶䕫蚿重結死生交永矢金石堅送京口劉千戸歸營桓桓千夫長胸有萬甲兵生長太平世終日醉六經一朝着兠鍪躍馬出甕城擒賊不知數報國丹心傾台司方論功憲節偕按行部曲嚴武威瘡痍撫罷氓寶刀洗荆溪鐵馬歸栁營鶯花已春暮草樹猶血腥一雨殊足喜四野布榖鳴呉兒賣刀劍買牛事春耕顧瞻天地間埃氛未全清何當盡掃除丈夫功業成過金陵明道書院訪友人髙孟立山長適遇秩滿且有側室洗兒之喜作詩賀之客來鳳臺下適見生鳳雛斑斑五色羽菶菶百尺梧衆客席上珍愛君掌中珠度曲紫玉簫瀉酒黄金壺起舞為君壽試啼呼阿奴梅花亦解事含笑文庭隅題陳時舉宅畫壁雙松歳寒姿拳石太古色我昔山中遊憩此松下石松花雪霏霏松葉風瑟瑟安知此清景相對復今日拏空兩髯龍乃在一書屋主人罷鳴琴宴坐室生白客來苦炎熱傍樹欲推幘不聞天籟鳴但見空翠滴煩衿頓如洗林壑幽興適經月數相過明朝有行役黄埃赤日中令人轉相憶孫伯昭與陳天倪用簡齋一凉恩到骨四壁事多違為韻賦詩見寄全和荅之薄田西河上種穀多種秫秋來喜甘雨牀頭釀眞一我思山中人不見如參商蒲萄好留客毋用博西涼秋水漲百川無人洗乾坤堪笑閭閻下空懷報主恩東亝可談書西亝堪寄傲山中儘寛閑俗客自不到凄凄草上霜耿耿天上月遥憐兩淮地千里照白骨吾生西復東徒以口腹累懷哉安樂翁不出時有四明月足可喜好句無用覔寒蛩為誰悲唧唧鳴四壁殷勤語兒曺要識一丁字明年世清寜依然重文事主人錦􅉊毺飲客金叵羅遥憐古岩桂香似廣寒多持身服苦澹適口忘甘肥青雲丈夫志白首慎無違哀陶堯佐并序至正壬辰冬紅巾陷常州驅民攻京口不從者殺之我邑人陶君堯佐不幸為賊所得且欲併驅其諸父昆弟以行君厚賂之以一身睨衆人之急從至丹陽聞官軍鼓譟聲即倒戈刺賊渠堕馬因被害時吾里有識君者旣而語其事于予予以君嘗讀書知逆順故誠信而悲之閲二年方欲問諸水濱筆之野史以暴白其難明之心其族人有為之後者葬君衣冠予述前所聞作詩哀之嗟爾練湖水不洗斯人汚寃血化為碧春雨生苔蕪皇天有老眼斯人實何辜生當太平日三世家業儒本無縛雞力苦被豺虎驅孰知能賈勇倒戈誅賊渠鐵石一寸心虀粉七尺軀而家既能全而憤亦已舒但恨薫與蕕混然骨同枯華表鶴不返竹林啼鳳雛衣冠藏古邱魂魄逰清都擊賊作厲鬼當與張君徒天髙不可問愁雲晝模糊兵後到杭馬掾史置酒見招且示以所與石處道邱長卿西湖倡和之什次韻一首西湖山色冷如灰前度劉郎今又來紅粉畫船今寂寞斷橋流水自縈逥一堤寒栁風烟老兩鬢飛蓬歳月催賴有故人能慰藉緑尊重對晚山開西湖曲西湖春水緑于酒西湖女兒嬌似栁依稀二月三月春攀折千人萬人手我有一索青銅錢明朝也買下湖船試歌斷臂孤兒曲湖上豈無人㑹傳自錢唐囬舟中懷馬掾史省前山色翠欲滴幕下官曺清且閑公退每傾鸚鵡盞客來頻爇鷓鴣斑坐看急雨沾花席應念扁舟出栁灣白髪鄭䖍氊未暖還家方苦路間関舟中懷辛至善春草緑如許之人猶未歸江東雲度水馬上雨沾衣王事馳驅久家鄉信息稀多情舊時燕還繞畫梁飛望官軍揚子江邉羣盗來奔牛吕城飛刼灰客懐每日欝不樂笑口幾時能復開東郭流離人似蟻西村格鬬鼔如雷官軍望斷無消息獨立斜陽首重囬示長子木萑澤聚羣盗池魚恐遭殃喜今避地去溪上一葦杭汝妻扶汝母小婢携槖囊丱角汝兩弟隨行色倉皇僕夫偕汝留家居謹周防屋後林有竹林後園有桑祖宗百年墳高樹蔭斧堂汝為吾冡嗣承家奉烝嘗興廢固有時生理無怠荒但無溝壑憂可待時世康鄉隣或侵陵勿與較短長韓信跨下辱自度勢莫當婁公靣上吐不拭庸何傷彼惡汝勿為口亦勿播揚天定能勝人善惡報乃彰松栢耐歳寒葵藿傾太陽此身可虀粉此志勿改常汝幼頗醇謹亦嘗聞義方稍暇仍讀書慎勿弄杯觴行看太平日斯文復輝光嚴将軍戰馬歌并序至正乙未春常多盗省府調兵捕之浙東宣慰司元帥嚴公來總軍事未幾無錫平移軍武進一日搗來富荘賊巢軍中失二馬明日賊乗之抗官兵烈塘上二馬聞金鼓來奔賊控勒不能止遂墮地馬立踶殺之官兵大㨗故今烈塘之民咸神其事俾予作歌以美之往聞齊軍夜路迷老馬前導人追随又聞的盧躍檀谿漢業復立西南隅古來良驥稱有徳未有驍騰能殺賊将軍兩馬䭾賊來雲霧四起生風雷紅綃帕首爾何物霜蹄一路成飛灰軍前認主鳴且舞驚倒熊羆與貙虎羣兇胆落不敢追官軍凱還搥大鼔馬兮馬兮誠有功須知感物由老戎将軍接迹武恵功煌煌史册書勲庸爾馬名亦埀無窮别姻家尹居士并序尹氏世居金壇尹干橋其孫可傳者予女妻之故避亂挈家依焉未幾寇兵自溧陽至予遂寄留家具及古今書八百餘帙復回故邑矣烽火西來滿眼紅歸帆忙挂鶴溪風蛟龍劍伏鄷城下科斗書藏魯壁中邠老自憐能世守阮生誰信又途窮一盃此夕誠何夕兒女挑燈笑語同贈花御史常侍文尹晋陵氷雪襟懷鐵面威井鄉重過思依依州官跼蹐迎驄馬父老懽欣識綵衣閩越地偏滄海接江淮屋逺縞霜飛舊逰還念城東客白首持竿坐釣磯過無錫口號至正十五年十二月初一日丞相達識帖木爾公赴江浙余因感憤而作丞相樓船搥大鼓鐵騎前驅猛于虎紛紛鼠輩敢横行與我官軍戰河滸落日未落縣林梢一天殺氣風騷騷官軍縱火鼠入窟太湖水濶陽山髙相君賢似唐裴度豈無将軍如李愬兠鍪載雪搗賊巢一夕湖船竟飛渡我有一寸鐵願作将軍箭将軍三箭定陽山湖水依然净如練楊鐵崖先生既為應芳敘思賢錄又以應芳上書丞相府不報作長詩贈行是用感激賦此留别兼謝錢塘江上久為客光範門前三上書喜得問奇揚子宅何慙題柱馬卿車風塵鴻洞人皆恐氷雪崢嶸歳又除覔得驪珠三百顆横山歸卧舊田廬代簡蘇景瞻先生西門渡頭春水生故人不來舟自横聞道移家近湖住手栽桑柘緑陰成二布榖聲中春雨晴溪頭倚杖看春耕干戈滿地人相食宜爾龎公不入城龜巢稿巻二欽定四庫全書龜巢稿巻三元謝應芳撰詩
