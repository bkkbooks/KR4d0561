body:
  text: 奉陪陳伯大先輩及趙師吕張伯起朱月江金清夫兄弟登金牛臺六龍城西吕城東奔牛古堰卧兩龍誰築髙臺水中沚野有蔓草牛無蹤河邊青苔生白骨刀鎗箭瘢猶未没聞知八十二年前戰死當時皆義卒鐵馬遁去劉将軍大家牽羊走燕雲三百山河獻明主北駝南象今紛紛登臨且喜得佳客鞠育青青已堪摘浮雲世事勿復論一醉西風真上策和蘇仲逸秋日懷鄉夢繞松江太湖上舊家隣里古漁磯長腰秔米家家熟巨口鱸魚箇箇肥為客已驚絲鬢滿還鄉何待錦衣歸筆床茶竈蓬忩下來往風帆數日飛呈趙徵士吳姬手執金叵羅春風吹面生紅渦主人留客長夜飲客拜主人辭酒多主人沉醉客亦醉客散扶歸主人睡殘杯冷炙厨頭傾隣家兒有啼飢聲江碧山千戸席上以我愛夏日長分韻得夏字故書堯階舞干羽聲教溢夷夏清風細栁營長日有餘暇兵厨移竹林觴詠集陶謝酒傾虎頭盃盤割牛心炙佳哉醉鄉境漸入如啖蔗客去復相期明朝還命駕自冬而春舉家病疫予幸獨無恙既而疾止詩以自賀并記里俗之陋云昨歲夏秋旱四國人顛連餓死非不悲病疫尤可憐甚者相枕藉遺骸飽烏鳶安知期月餘厲氣猶欝然余家百餘指連屋魚貫眠顧我如一木支此敗屋顛上堂問湯藥下厨供粥飦鄉隣不我過恐為疫鬼纏俚俗無足怪妖誣肆訛傳所賴學之力賦命知自天立言斥滛祀秉志金石堅慈親今健飯甥男行滿前吾妻及女嬃問寝相後先嗟哉黄楊木脱此厄閏年東風播陽和草木仍春妍鄧道士遺梅花一枝詩一首酒二樽見惠時館人王文父飲余遐觀樓次韻答詩仍要鄧晚集欲作梅花賦才踈愧廣平一枝春到手酒香詩更清開樽對雪飲将詩遣童去亟請過蕭齋石鼎與聯句栽桑春雨墻陰手自鉏賸栽桑樹遶吾廬歸來笑與山妻説來歳春蠶食有餘九日對雨白雨何其急青山不可登兀然無客到閒似坐禪僧盆菊數十蕋村醪四五升猶勝陶靖節冷眼望王𢎞養鶴西隣主人翁養鶴如養客専童供鶴料稍慢童受責試問鶴何如毛羽喜潔白又能舞蹁躚長鳴振金石客有鶴骨清粹然含素徳窮居以詩鳴冷面常菜色賦命鶴不如可為長太息送李知事赴邵武詩闕金壇李質字竹操延祐中以詩經及第前訓導常學舟車千里逺甌粤萬山連舊俗民多獷孤城地極偏朝廷用儒術幕府贊承宣更喜詩三百東南可盛傳送凌萬里挈家歸海陵隣居三十載奈此别離何客路秋光薄歸舟月色多雲山連海岱呉楚隔江波珍重千金璞良工更琢磨郡學西齋夜坐懷親友客心清似水學舍冷如冰苔榻三秋雨芸編半夜燈病多憂老母會少憶良朋麋鹿山林性悠然愧未能送兄遊補陀山蓮花已結東林社藜杖復尋南海遊千百億身黄面老化城今豈在瀛洲二飛鳶跕跕水連天行李蕭蕭客上船津吏不須勞詰問道人來禮白衣仙三烟霧昏㝠晝不開颶風吹浪雪成堆獻珠龍女應相笑何處扁舟載月來四堂上慈親老惜兒逺逰尋佛咲兒痴倚門望汝歸來日三月䦨珊四月時寄錢唐教諭金君犍紫鳳銜書下九天司徒今日復興賢欲知别後成何事和得陶詩百許篇哭王伯祥昨朝相别夢初萌一夕那知隔死生蹠自永年顔自夭大鈞於物信無情二傷哉郎罷客西湖匍匐歸來玉樹枯風雨髙堂春寂寞忍聞長夜泣諸孤惠山泉和翟𤣥𤣥先生韻青山屈曲九龍盤一派清泉噴雪寒陵谷變遷知幾度石池洋溢不曽乾幽亭過客分雲液古寺閑僧煮月團莫向貴游誇絶品恐煩迢遞入長安耕隠為蕭徵士作蘭陵溪上梅花村世居齊梁之子孫瀕溪沃壤足禾黍教子讀書深閉門時人咲渠生理拙渠亦咲人多覆轍春來烏犍一犂雨歲晚黄精三尺雪有時獨宿舞短蓑飯牛别作耕田歌長安車馬自塵土奈爾濯足滄浪何君不見蘇秦為無田負郭平生不識耕田樂奴顔婢膝謁諸侯黄金載多禍随作君今有田兼有書夜深燈火朝犁鉏只恐一朝富貴逼人去猿鶴笑人留不住送姪僧德無言歸靈隠鴻鵠之志飛冲天鯤鯨入海方悠然汝生不受塵網牽作佛要在靈運前先人壁經汝舎旃棄家另著牛車鞭袈裟斜擔雲半肩東西南北十五年邇來參得靈隠禪神鯉躍出西山巔歸來瓦缾携冷泉侑以白雲歌數篇我昔西湖艤酒船曽聞老猿啼翠烟時秋雨洗山娟娟石頭路滑難攀縁汝今言歸磨汝磚山中之人應汝憐道經孤山脚下梅花邊敢煩為我問訊林逋仙寄金陵陳雲心先生先生少學道游寓兩浙後復歸儒而家于金陵以能詩善琴終見知臺閣然屢薦不起學者多從之遊逺蒙惠書故以詩代簡先生閉戸自婆娑御史乗驄每見過白下詩名傳不朽紫霞琴譜訂無訛樓居卧看三山逺學子來從兩浙多一别十年還念我逺厪書尺問如何送陳漢卿赴江陰州知事玉雪風神秀雲霄志氣雄騫騰從早歲交結盡明公鶚薦無虛日鵬搏適順風脩名今樹立令徳愈磨礲清露金莖表黄流玉瓉中詞章追太史琱斵謝良工綸綍㤙重被冠裳秩漸隆雄州勞賛畫善政惠疲癃幕府文書簡江城草木空風濤秋浩蕩烟雨晝㝠濛退食麾塵吏忘機對海翁仕優吟更好境㑹意何窮離索遥憐我殷勤為擊䝉慈親年八十慈親年八十言笑滿懷春衣食兒躬稼烝嘗婦采蘋一閑殊可喜長健不妨貧眉夀曽孫酒黄花節物新二慈親年八十早歲歴兵戈老此太平世宴然安樂窩門前流水活隴上白雲多兒輩生涯好東臯雨一蓑三慈親年八十一子帶經鋤貧賤無鐘鼎辛勤有屋廬小園千箇筍老圃四時蔬隣舍閑來往諸孫御板輿四慈親年八十頭髩雪紛然安得長生術終為不老仙平生甘淡泊中歲絶腥羶净拂燒香几持經繡佛前聞友人陳子山廷試第一喜而有作用寄乃弟子方紫衣使者日邊來為道元方作大魁金闕早朝鳴佩入璚林日宴戴花囘九天恩澤沾多士一㸃文星近上台媿我無成驚且喜漁蓑獨速舞溪隈犇牛巡檢石潤卿示予胡婦殺虎圖其事乃前至元七年濵州軍士之戍棗陽與妻胡俱在道上為虎所得胡逐虎殺之潤卿持畫索詩用題其後猛虎誰不畏良人吾所天眼看性命落虎口妾身雖死何足憐嗟哉劉郎妻力不猛於虎怒氣一奮發執虎如執鼠想當攘臂急逐時泰山可抜城可隳呼兒取刀兒後隨刀入母手虎腹披當時若使遭虎囓虎口甘心作同穴嗟哉劉郎妻今古誰足儗馮媛當熊為帝立饒娥殺蛟隨父死嗚呼裙釵之下有君子宜爾芳名著靑史鮮于瑞卿還碧亭鮮于公子平泉荘有亭翼然水中央天光雲影白日静菱葉荷花清露香栁下繫船魚可釣坐中留客酒盈觴門前漁浦接洮滆白鳥飛去烟蒼茫朱逸齋先生挽詞前朝士習雕蟲巧先生詞章風格老功名到手陵谷變雲霖竟作商山皓駢花儷葉墜秋風獨抱遺經自探討嗚呼一歌兮懷我師平生瓣香今為誰二堦庭桂子初芬芳盲飈怪雨俄摧傷中郎賴有女傳業安然得老温柔鄉平生綴緝富篇帙才名不與身俱亡嗚呼再歌兮雲石裂斷腸猿呌黄山月三憶年十五從學經先生眷之雙眼青每隨杖履訪朋舊耳聞目擊皆儀刑而今先輩總淪没黄鐘大吕将誰聽嗚呼三歌兮涕泪零魂招不來秋杳㝠送秦彦明美人木蘭舟春風挂帆去輕舟疾如飛可喜亦可懼浙江多風波越山暗烟樹孤月照蓬窗今夜宿何處二老驥千里村鹽車九折坂行行復行行伯樂遇何晚之人懷帝閽丹霄路云逺一笑膏吾車疇能為推挽送趙方叔入京去去京華八月初聖皇清暑返鸞輿五門雨洗紅塵净九闕涼生碧栁踈慈母衣裳縫密綫丈夫門戸出髙車翰林若見陳脩撰為道野夫曽寄書贈術士楊南溪有客有客楊南溪天文之學師重黎又讀郭璞青囊書書今不用如筌蹄十年湖海聲藉藉觀水觀山雙眼碧一官雖冷氣如春那識人間有金璧相逢林下秋雨乾髙梧葉落天風寒杯酒殷勤盡清興作詩醉寫烏絲闌立秋苦熱念秋至立秋意欣欣一雨忽破凷千山净無塵新月挂髙樹涼風洒衣巾重來囊中書懷我堂上親丈夫茍未遇妻孥耕且耘胡為苦離别低頭長傍人和孫伯昭佛社祭法埀明訓邦家祀有功愚氓何悖禮佞佛乃成風婦女僧流雜香花佛社隆三身誇息怛千眼慕圎通金像瞻如在珍羞共極豐九衢迎象駕百綵製天宫窈窕閨房秀聯翩市井童荘嚴森侍衛㳺衍適西東行道駢緇素飛塵溢軟紅寶幢雲母扇銀燭竹晶籠鐃鈸伶倫後袈裟粉黛中亂倫言可醜妄意福來崇廢業兼旬久揮金與土同盤遊律有禁長吏聽如聾闔郡喧邪説同袍見直躬新詩來滿紙髙論發羣䝉白雪無人和皇天鑒厥衷不為因果惑真是丈夫雄感激徒三歎栖遲奈兩窮抗言摧佛骨所願學韓公贈丹陽歸真觀諸葛錬師鸐溪之水鳴㶁㶁九曲龍蟠䕶仙宅東南一望天宇寛緑野平蕪接洮滆階前老樹三十圍門列脩篁數千㦸緑陰庭戸濕空翠五月天風吹巾舄野夫何縁飲丹井遇逐尋真羽衣客焦仙莎衣煮白石吕翁榴皮題素壁物換人非數百年予復幽探訪陳迹黄冠老師卧龍鍾知雄守雌室虚白詵詵弟子皆速省中有詩豪更琴癖陳雄亝能琴且長於七言哦詩鼓琴師亦喜一倡為之三歎息嗟予汩没塵土中到此悠然憂不釋采芝終日不盈襜曵屣長歌晚山碧寄題蒋仲益野趣亭陶潜歸故園日渉乃成趣迷途雖不逺已恨出門悞眷兹亭中人不識功名路幽居瞰洮滆詩盟結鷗鷺秔稌湖上田花竹家後圃山色開畫圖波光照窗戸寒鐙課兒孫春耕了農務杖屨三十年曽無一塵汚人生天地間溘如草頭露軒冕渠自勞刀鋸吾無懼熙熙太平世千載實難遇野趣祇自怡難以語童孺代簡蒋成玉往年同掣釣鼇鉤空載錢塘月滿舟從此相思不相見槐花又老一畨秋二東風傾盖采芹亭一笑相看兩眼青老我無成今學稼荷鉏依舊帶遺經三春來一月苦陰雨少頃雨晴邀客嬉金斗城西芳草路水邊楊栁青離離送牛季和赴旌徳教諭積雨喜新霽六合無纎埃江頭楊栁風送客征帆開把盃問青天天網信恢恢之人飽經術吐辭粲瓊瑰不居白玉堂合著黄金臺培風展雲翮胡為尚低徊往矣教岩邑菀然育羣才峩峩敬亭山相看亦佳哉薺麦茂霜雪蛟龍候風雷秋風木𤓰熟好題書後來慈烏倚窓看慈烏生雛念雛飢黄口未能啄雌雄交哺之羽毛日以長飛飛展雙翼父母乃巢居羣雛為求食得食能幾何入口不下咽去時聲啞啞歸來羽翩翩大烏能爾慈小烏能爾孝他時子為子宜亦如爾報人為萬物靈不孝誠何心我今作此詩警世還自箴余子元御史枉駕敝廬以詩貽次韻奉贈奇哉古秦鏡奸邪見肝胆當年獻天子重瞳目親覽爾來匣中藏寒月光湛湛玉臺重拂拭清輝元不減陪全公遊仁惠觀途中酌酒賦詩予和二首呉山相送越山迎二十年前驄馬行今日經過舊遊處詩情秋色喜雙清二山中羽人山下迎籃輿看山吟復行松陰呼酒聽琴語一笑如見黄河清邀髙則誠郊居小集别多無那苦相憶賴有尺書時往來逢人為説烏寶傳此客合貯黄金臺北風塵土歲云暮南湖水波冰欲開扁舟短棹出西郭元日相期看野梅同遊趙君模過訪荒城歲晚冰雪繁幽人校書深閉門書中樂與聖賢對户外寂無車馬喧年光冉冉老将至心事悠悠誰與論肯為梅花過寒谷定邀髙子共清樽偕丹陽諸葛用中金壇王元徵同應鄉試阻風無錫和用中韻船窓晝暝鈎簾坐暘谷雷鳴送雨來佳友喜逢雙鳳集清尊且對九龍開槐花滿眼催行色桂子吹香入酒杯黄帽怕教牽䌫去請看風浪雪成堆次鄧混然韻送溧陽王元仁兼簡乃父時可先生兄元德客裡匆匆送客歸江空歲晚雪晴時父兄相見煩傳語書劍重來好寄詩世事兩年多反覆人情一日九驅馳甓橋東畔王猷宅杖履幽尋未有期丹陽道中早行過吕城寫示諸葛用中十三韻寒雞丑前鳴雨急風更惡吾欲遄吾車僕夫