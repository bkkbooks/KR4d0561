body:
  text: 贈邵濟民曲塘地仙居洗藥溪水香青衣兩童子玉杵搗𤣥霜𤣥霜搗来奉髙堂老親食之夀而康天生便便貯書腹金匱石函書爛熟東南海上多名山山中采藥騎青鹿歸来濯足婁江水坐對青山隠烏几囊探藥物不論錢但欲使人無病耳有時彈琹鸞鳯音有時抜筆長短吟紛紛呧痔吮癰者徒教别屋堆黄金聞雲門張先生慈烏軒焦尾居名賦二詩慈烏曲慈烏乳衆雛雛大羽翼成翩翩出巢飛啞啞繞林鳴得食不自飽歸以飼所生紛然同類中有此骨肉情余昔養親日瞻烏常自懲白首重相見愛之雙眼青匪謂得所止丈人屋崢嶸為時梟獍多見烏如閔曽王孫金彈丸慎勿令畏驚焦桐曲焦桐製孤琹舉世稱異材往非蔡中郎竟作爨下灰七絃繫朱絲徽金軫瓊瑰知音適相遇攜上髙髙臺一彈廣陵散絶響有餘哀筝琶沸新聲瓦釜亦鳴雷天機妙循環復見泰宇開爾桐朱鳯吟靈風揚九垓吾今洗吾耳盤石坐莓苔芝秀軒詩猗歟名門夙稱五常遥遥耳孫厥德復昌於粲爾子文藻有光如彼芝草曄曄其英自天降祥奕葉流芳匪曰三秀仙人之粮林壑爾居竒芬逺揚雍公之扁金薤琳瑯於昭彼蒼福善孔彰俾爾耆艾家有餘慶維來維礽永言弗忘結茅東郭歲晚言懐行盡難行路歸來父母邦溪山閑杖履花竹小軒牕教子知一二抱孫成兩雙有時城府去深媿鹿門龎二齷齪龜巢老蕭條鶴髪秋過眉桃竹杖方領木棉裘補世慙無術通家憶舊逰幸來雙白鳥能與共滄洲三静掃蕭齋地書牀一舊氊談經雞亦觧迎客犬常先流水柴門外横山瓮牖前春秋埀八十食粥了餘年四季子躬耕地寥寥禮讓風度遼歸老鶴遵渚集飛鴻土姓多相雜鄉音舊不同獨憐東郭外劍井氣如虹五官塘人似蟻環堵室如蝸白髪三千丈清貧第一家地爐寒撥火雪水夜煎茶好客知誰至青燈結細花六過客應相笑衰翁未得閒酒經方補註詩稿又重刪藜杖家家竹藍輿處處山數朝天色冷髙卧掩柴闗七故國歸來晚孤城草木寒親朋皆鬼籙鄉里少儒冠寫琰金鐘失沉沙鐡㦸殘譙門斜照裏時為一辛酸八臘月無多日春風又一年儘添頭上雪聊適瓮中天彩筆題氷柱青衣送酒船晚來賓客散清興更悠然和陳二令逰善權洞我昔陽羨逰春山聽茶歌别來三十載重㳺竟蹉跎憑髙每望碧湖外羣峰玉立青嵯峨善權山水最佳處我公去知清興多來時風景溢吾目不用登臨勞吾足有聲之畫勝丹青曲盡物情人歎服天開地闢羲皇前神工為誰開洞天爾來一萬八千歲金堂玉室居羣仙飛車鸞鶴乆不見春去秋來只鴻鴈青山前度汚狼煙從此四郊荆棘遍洞前玉氣金瀰漫仙家應作瑶池觀層巔巨石勢欲墮過者為之心膽寒翩翩石燕黏翠壁飛來若與人相識馬如龍車如水尋常貴逰無足數以分清致侣名緇一代風流繼支許樂哉山水三日逰忘却世間千種愁昔人名句題玉柱今公徤筆留銀鉤寄言武陵人桃源兹可求丹砂多與鍾乳襍瑶草不知蒲栁秋長橋無饞蛟南山無猛虎在處可逰觀政須人好古闕墨圓碑篆亦竒絶似岐山石為鼓竹姑子明年春山僧煑玉邀嘗新哦松暇日肯同去作詩更為山傳神鄉飲酒詩皇帝即位之五年歳在壬子詔天下行鄉飲酒禮明年癸丑正月二日常州府太守孫公率僚属行之儀物品節不約不侈省部主事宋公實在賓位僎介而下耆客凡二十七人執事者位之其登降揖讓盥洗獻酢靡不如矩時某年七十有七亦得以布衣厠諸賢士大夫之列葢有不勝其喜幸者率爾口占以紀盛集云一統乾坤大羣生雨露新君王能建極風俗易還淳鄉飲稽蒼籙天書降紫宸諸侯遵令典嘉讌展芳辰黌舍簪纓集珍羞爼豆陳主賓儀秩秩僎介色津津椒頌三陽日芹香泮水春工歌聲律古揚觶獻酬頻聖澤沾羣品仁風播八垠賜酺無足比置宴詎能倫老我闕中闕諸公席上珍叨陪聆闕法喜獲坐連茵引領瞻西日傾心拱北辰知恩無以報三祝效封人謝董明府惠炭范叔寒多正不禁烏新重惠比烏金賒來脫粟方炊飯留得焦桐好製琹環堵一龕春盎盎麗譙三鼓夜沉沉硯池雲起龍香暖寫我梅花鐡石心雨中懐秦主簿東門之東西市西人家屋頭啼竹雞新年十日九風雨二老㡬時堪杖藜懐儲教授鎬京春宴醉簪花歩出都門駕小車七里八岡山店夜一氊風雨宿誰家次韻言懐親朋淪落盡故國似他邦矮柱龜頭舍踈櫺蚌殻牕鵲聲簷外喜鸞影鏡中雙兒女俱婚嫁逃禪笑老龎二江海飄零客􅈣塵二十秋逝將諸犬子歸老此菟裘夜雪圍爐坐春風秉燭逰樵漁時共醉何異宴瀛洲三老我龜藏六無毛可作氊躭詩閑未得強酒醉當先茅宇城闉外梅花臘日前幸逢賢郡守鄉飲禮髙年四短日經南陸嚴寒鼔朔風遍懐知己友長覔寄書鴻世態今如此人心古不同青天如可問飛歩躡長虹五風冷柴門閉齋居縮似蝸小橋平陸里識字老農家野飯常留客村醪頗勝茶早梅溪上折斜挿膽瓶華六貧居家事少客去跛奚閑茅屋牽蘿補蘭堦擇草刪雪添南浦水雲暗北牕山孰謂寒如許雞鳴客度闗七自分馮唐老誰憐范叔寒婆娑鳩在杖蕭散鶡為冠夢筆才華减談經喘息殘昨來初度日淚落酒盃酸八神仙無足信何藥可延年素行多違俗丹心不愧天座留談笑客門泊往來船吟雪誰相似襄陽孟浩然送秦宜仲主簿之京丈夫不灑離别淚盃酒聊發玲瓏歌黄楊閏餘歲已乆紅杏日邉春正多子瞻手攜鐡柱杖太白足上金鑾坡鳯臺佳景必重賦千萬寄詩來薜蘿送主上人兵後尋叔歸臨江侍養青年未焚紫羅囊竹林之逰鵷鳯翔一旦身為苾蒭草半間屋住菩提塲安知兵甲滿天地遂令叔姪成参商桑田即變家亦毁蒲屨欲織親俱亡某山某水總淪沒曰祖曰禰誰蒸嘗象龍駕法力雖猛豺獺報本情難忘﨑嶇行脚求從父殷勤稽首祈空王䕶身符出虎牢險忍辱鎧染狼煙黄長洲茂苑乆争戰殘山剩水方凄凉相逢不覺開口笑差喜自得安心方行人嗟歎擁長道畫鷁送將歸故鄉孤雲飛處是玉笥把茅蓋頭猶錦堂蒲羞可助潢潦薦木瓢共飲曹溪香愚觀諸公發歌詠力為吾道扶綱常惜哉僧中有此郎疇能為爾加冠裳於乎疇能為爾加冠裳次韵袁仲徴見寄并自述城隂山作讀書堆書畫船從海上回春水泮池芹小摘秋風老圃菊重栽明時正用凌雲筆清夜還傾酹月杯百里相忘兩相憶詩筒好寄便鴻來二才華减盡姓名低頼有綸竿釣碧溪衰鬢㡬莖蓬綴雪閑心一㸃絮沾泥江山有助詩頻賦朋舊相過酒共攜金斗城東二三里道傍茅舍似雞棲借韵寄蔣以愚江上羣山翠作堆江雲與客共低回黄楊閏後餘無厄丹桂天髙孰為栽飽吃河豚肥似乳醉看江水小如杯延陵祠墓春申巷我亦拏舟訪古來借韵寄劉小齋白練裠輕帽屋低緑隂庭戸瞰清溪詞章落筆如翻水篆籀藏鋒若印泥一昨論文心共許㡬重飛夢手重攜絶憐鳯穴生雛好已向朝陽碧樹棲謝許克敬六月惠炭去年臘月人凍死我亦牛衣眠不起家僮赤脚令采樵日暮歸來墮雙指德哉古人憐我貧于今暑月遺烏薪藥爐喜得文武火茶鐺爛煑槍旗春禦寒有偹心膽壯故態盡除寒乞相山空歲晚雪復來平地不妨深一丈烏薪爇成霞焰紅藜牀坐我龜巢翁灰中芋栗薦村酒凍梨面作桃花容齊奴爨蠟自奢侈野人炙背無足比融融之樂度殘年重賦新詩謝知己病中䝉董知縣陳縣丞尹主簿枉顧且有白粲𤓰酒之惠旣而病愈賦此以謝鳬舄飛來野老家同僚先後佩飛霞共憐敗絮多生蝨為問疑盃或飲蛇月俸分將官廪粟朋尊兼餉早秋𤓰相如四壁生光彩試握霜毫荅寵嘉常郡泮宫詩猗昔廟學悉燬于兵我侯作之聿觀厥成巍巍素王羣賢儼如侯殿侯廡豆籩所於師生有廬講道在堂飲社讀法有程有章我侯戾止若網而綱嘉乃進修戒毋怠荒宫墻非髙丹堊非侈道彌六合聖有遺軌侯揚天休嘉惠士子士風還淳庶見麟趾武邑新學詩邑有孔廟棟橈欲墮舊亦有學濕漏且庳惟邑長式撤而新之清廟奕奕門廡階墀聖賢明靈陟降在兹黌宇言言齋有詩書師友講貫朝斯夕斯射則有圃書或臨池帷林杏壇古音朱絲顧諟廟學治化之基帶澤育莪比迹蒼姬絃歌武城異世同規襍詩積隂當𤣥冬生生機已息陽孳僅毫髪梅花獨先得若人玩化機於此已深識攀條摘玉蕋吟玩意莫測維復見天心所慮羣隂逼閉門夫如何君子政惕夕煢煢保養間由兹見天德二山雲忽低徊四郊紛白雨老農荷鋤歸布谷桑間語相勸一何勤一鳴再三俛老農感禽意豈憚東作苦嘉榖已函活尚待明日煦小兒未觧事大兒逺服賈農器已可敶耡耰在梁梠入室惟老妻出沒撫􅑥甒三凛秋氣忽微徂暑已云往黄花異凡木所植本因壤稜稜清霜間誰復見俛仰肅殺一氣中鋭氣出其上强梁固可人傲德毋日長四志士想邱壑老驥厭長道歸來已低徊但覺青山好至樂在天倫不必事華藻交歡能㡬何及今已衰老五至老無􅁱行善類日以疎生知媿古人宴安夫何如羣處不念德草草復離居春還有餘興雜花滿郊墟網罟不能操空羡淵中魚六青陽既開動草木方敷榮積雪忽如此豈不害含生大化無停機生生寧有已人心偶自徂豈不害天理援琹一鼓之坐致麤穢除吾分一天地積隂夫何如二月二日漫興東風吹散社公雨紅白花開爛錦雲時俗喜逢迎富日老夫羞作送窮文裌衣試著寒猶怯拄杖歸來酒半醺為問驛橋楊桞樹送人多少去從軍送安上人歸馬跡山挿竹山中偶出逰折蘆濠上即歸休踞牀獅子聲方吼踣銕龍駒跡尚留華雨六時紛似雪松風五月冷於秋客來認得南泉斧七十二峰應㸃頭禱雨黄梅落盡雨愆期太守憂農日皺眉滂沛一朝隨五馬四更三㸃謁叢祠二乞雨歸來雨滿天朝衣兩袖帶香煙綠莎青笠人如畫多稼亭中看力田三一寸丹衷徹彼蒼不勞方士篆符章田家雨足豐年瑞官舍風清化日長寄京口俞伯鎮兼簡江教授飛雲妙墨來前日聽雨髙軒憶妙年杜曲桑麻㡬家在韋賢父子一經傳杖藜欲去尋黄鶴褁茗相攜看杜鵑竹樹樓臺江總宅想應新築大江邉夀董明府臨汝佳山水鍾英賦厥初身為百里宰腹有五車書見客無官况休衙只獨居夀眉揚喜色百里拜新除次韵荅性天之長老道人踞猊牀眼明如趙州每言西來意爰及東家邱白首林泉交清風江海秋法幢扶欲起法鼓鳴未休本來無住著聊爾小淹留鹿眠荒苑内烏啼古城頭天道自坦夷髙堂豈伊優他山石可礪直木枝有樛巴蛇或吞象鼷䑕能食牛頼有佛目明洞見鬼窟幽萬語歸一㸃坐斷聞思修病中即事何物青蠅滓玉壺掣鞲飢鶻攫鵷雛病軀痛作雷鳴腹垢面愁添雪滿鬚欹枕卧看殘菊在下牀呼取短笻扶客來與說塞翁馬笑指蒼天慰老夫二天方老我心如鐡誰謂讒人口爍金覆轍始知行路險移家此去入山深缾無儲粟還沽酒爨有焦桐莫製琹且喜日來聾兩耳從教蚯蚓作龍吟九月朔䝉周彦美詹伯逺蘇惟可攜酒殽過城東草廬時余徃潞城田舍次日賦此以贈老夫一棹尋醫去佳客三人載酒過破屋茅飛烏豈好衡門木落雀堪羅交情自古陳雷少世態如今鬼蜮多醉帽簪花開笑口尚須秋曉過西河示子憶年二九歲之吉朝賁闖門驄馬匹柏府遄歸鄂書出烏雛戀母情所鍾歛翮不附髙飛鴻屢閲星霜怨樹風帶經犁鉏賫壯志欲籋青雲竟顛躓羞與腐草枯木比東家借燈夜繼日著書泚我潛夫筆數載兀如僧縛律書成兩髩秋蓬飛出門復遇鍾子期麟膠為續焦桐絲旁觀方笑鮎上竹呉下風塵驚滿目蕉隍夢成俄失鹿蒼姬訖籙寳鼎移血流四海誅鯨鯢水魚漏網亦㡬希全家幸爾歸鄉土欲學龎公逺城府骨肉遭逢射弓弩卧疴兩月悟前非白生虚室春熙熙茹荼味亦甘如飴朝來坐起沐且櫛炙背茨檐抱雙膝七十八年聊記述懐呉中行老我平生頗閲人惟公知已絶無倫别來夢裏常論舊只說閑中莫厭貧湖海氣豪心似鐵庭闈親老鬢如銀遥憐歲晚家居好魚躍氷池入饌新寄熊元修佳兒發軔之官去名父居閑味道腴詩巻剩添兵後作酒尊常為客來沽江湖結社鷗盟冷遼海還鄉鶴夢孤煙水相望逺相憶寒雲欲雪晝糢糊寄武城知縣趙鵬南雙舄鳬飛下赤墀一行鴻澤撫黔黎昔賢過化絃歌地今代重興禮樂時春雨桑麻如杜曲秋風未稼即邠詩檗飡氷飲持三尺製錦功成聖主知寄盧公武兼問殷孝伯安信憶言雨别去途難喜得雲歸舊谷盤郡乘手揮狐史筆齋居頭帶鹿皮冠草生林舘皆書帶竹老溪園可釣竿獨念咸陽殷博士有無黄耳報平安送殷孝伯教諭之咸陽逺逰自是男兒志特立正當強仕年衣上宻縫慈母線擔頭輕束廣文氊春秋三傳繼絶學畢郢諸生得盛傳老我也須飛夢去振衣同陟華山巔䕶國寺對雨去年梅熟雨蹉跎豈意今年苦雨多偶食僧廬苔作脯忍聞田舍麥生蛾山禽滑滑題雙樹檐漏浪浪注九河往事共論魚腹恨近年平地亦風波和林韵黄梅落盡天猶雨白日晚來風更寒老去甚慙詩興少病餘猶喜酒腸寛舟中自古有敵國李下從今莫整冠蒲屋紙􅆤明似雪政須僵卧似袁安送性天之長老兼簡初士元大方厓兩禪伯方坐天寧古道塲􅃍辭雲水别河梁蕭蕭木落山中雨去去孤篷滆上霜白雪調髙人寡和黄花開晚自餘香南能北秀煩相問為覓平安第一方徙居横山口號為愛横山山水清山前築室小溪縈老夫枕石㸔雲卧兒軰求田候雨畊古井寒泉龍有宅孤村夜月犬無聲廿年兩眼風塵晴猶喜如今見太平二三農閭伍共煙霞數口清貧第一家瓦釜煑糜燒槲葉布裘添絮着蘆花交逰總覺鄉情好吟眺偏宜野景賖不見羽人王百八浪傳仙井委丹砂三清夢尋常繞薜蘿白頭今日此婆娑牕含風露秋容净簾捲林霏爽氣多浮世百年生處樂青山㡬度醉時歌莫愁猛獸藏林樾郡有劉昆必渡河四山北山南地盡耕人家祗欠讀書聲丹楓似我衰顔醉黄鶴如仙瘦骨清呉越喜逢連歲稔朱陳多續舊姻盟客來莫厭頻留宿新種梅花好月明次韵荅袁子英見寄萬國風塵百戰餘一襟氷雪五車書朝廷未賜延年杖鄉里聊乘下澤車鐡網珊瑚遺渤海玉峰鸂鶒異伊閭長門賦直千金貴詎信相如筆乆虗上臺官經鋤子為屯田去罄室翁歸儋石無八十衰顔頭戴白一雙昏眼淚含珠鵲寒空繞無枝樹烏餒徒生返哺雛匍匐哀鳴臺下閣尚期甘雨活焦枯挽謝天民細桞營中玉一株狂飈吹折莫春初杜鵑繞樹啼紅血知爾思歸恨有餘二三十青年氣食牛貂蟬未得出兠鍪故園芳草春如海誰謂王孫不復逰題鄧九淵縣丞白雲親舍圖若人自是青雲器方爾浮雲如展驥白雲親舍作畫圖寓我思親未歸意螺山隠隠雲央央吾家宛在山之陽西天千里水天碧北堂五月松花凉堂上慈親夀觴舉堂下諸生綵衣舞頼伊黄耳觧傳書道我赤心方報主主恩方報報親恩望兒無勞親倚門直待平反歸報喜却到青山白雲裏和宜興鄧縣丞出離墨山前芳草多馬蹄曽此㡬經過囤碑文字無人識風雨消殘近若何二民有歌謡吏不譁村莊兒女簇如花深山處處茶煙暖小市家家酒斾斜楊桞隂中頻駐馬杜鵑聲裏亦忘家祗緣報國心殊􅋀更喜流年鬢未華金牛臺送長史仲埜清明雨晴花正開折花送客金牛臺金牛遺跡不復見但見塵埃野馬去復來臺前鶴谿貫洮滆瀕湖緑野平如席臺後羣山倚大江齊梁故里迷榛棘登髙望逺散離憂超然如見崑崙邱為問堰頭楊桞樹頗嘗見有此客不五年參贊二千石飲氷食檗持三日簿書肯綮㳺刄餘白雪詞髙人共惜樓船泝流出京口閘官放水蛟龍吼青苔絶壁為留題名與此臺俱不朽贈眼醫張嘉甫重瞳天子真天人擇醫乃得天麒麟金篦不刮眼中瞙家有異藥能通神璇霄沆瀣和𤣥雪洗滌靈臺煙火熱刀圭微入阿堵中風巻微雲出明月天顔咫尺頻為喜白金紫騮恩甚侈豈無太史載冊書繼美倉公上池水老夫一目雲糢糊扶􅉵逺來煩掃除京華道上鬼揶揄爾詩將比蛇銜珠贈周實翁髩髭如㦸氣如虹芳茂山前矍鑠翁可惜一雙青白眼㸔雲孤卧北牕風兒子木䝉恩釋屯種而歸詩以誌喜老烏失孤雛噭號鸞臺前鸞鳴徹九闗徳澤降自天鐡籠放雛歸渇飲劍井泉井泉非不甘飲之不下咽念我老病烏肺肝煙火然返哺知㡬時骨肉且生全牖戸尚綢繆羽衣復翩躚衆鳥喜聲集卉木回春妍援毫紀離合執徐洪武年呉中行惠方竹杖往有方竹杖化龍歸混茫吾知龍之靈知我力尚強今年八十餘舉足勢欲僵一目眇數月白日如昏黄出門多棘榛况復畏虎狼感君扶持意以杖逺寄將稜稜七尺觚材㧞宛種良孤根斬鐡石老節凌風霜聱叟性惡圓為爾重激昻氣類喜相得顛危頼能防秋風黄葉村春雨烏石岡挂我沽酒錢時與逰醉鄉赤藤含赧色青藜失輝光睹物思故人晤言未渠央即事方竹過眉杖单紗墊角巾室中無長物林下一閑人二北牖青山近南風朱夏凉草蔬留客飯木榻似僧房余之死欲速埋素志也今偶得小邱扵横山之陽竁而甓之余他日葢棺埋可速矣倚我長欃歌以自適枯蟬脫殻欲化老蠶作繭自纒一笑不拘風水龜藏姑待天年二阮孚着屐未了劉伶荷鍤長隨便作松根糞土也勝兵前肉籬次韵陳庠仲見寄老去衡茅寒到骨兒能負米慰愁顔峽舟風打前時覆塞馬天教此日還氷雪泠泠龍井水煙霞隠隠鹿門山芙蓉湖上鷗波濶殊勝雕籠鎻白鷴贈陳谷禪老帀地叢林瓦礫塲法幢扶起破天荒木魚呼粥餔禪侣蔬筍香來八九霜二選佛場開金碧區雲蘿煙樹一塵無客來㑹得安心法莫向江邉更折蘆三布金人比獨園多金色山林作補陀童子畫沙成佛去蹄涔豈足擬鯨波四庭前栢樹觧通禪洞裏桃花小更妍媿我梁園詞賦客髩絲風裊煑茶煙送孫太守奔䘮歸濟南大江之南煙水秋滆湖船送孫常州甘棠遺愛召伯去黄楊閠餘丁母憂五年組綬忽衰絰四郊􅃭袴多歌謳兒童騎竹忍相送父老杖藜争欲留孤雲宛在長白外清濟如㵼銀潢流北堂萱草秋寂寂西風落木寒颼颼堂前稽顙薦蘋􅇨隴頭灑淚沾松楸誓言永佩阿㜷訓酒戒不受傍人咻蜚英乆矣徹斧扆欒棘暫爾棲林邱頴川太守已台鼎碧山學士皆瀛洲正須大木成巨室豈容野水横孤舟君親俱報志願足几杖却歸封素侯送源無竭回金山龍㳺堂前獅子牀坐分風月今㡬霜千金一壺有妙用三呉百越聊逢塲黄花鬰鬰秋雨爛白雲悠悠江水長重摩松頂作受記毋令黛色參穹蒼復愁茅茨數家黄葉村霏雨一月溪水渾慈鴉種麥日未暝猛虎下山人閉門江隂陳漢廣為北平府指揮使司知事隨例免官黄金臺上古賢士竹帛埀名世稱羙碧油幢下今幙賓風雲際遇與同倫清氷玉壺烱胸臆鐡箸爐灰妙籌畫殷勤報國傾寸丹雪花如席不知寒扶揺方展雲鵬翼翩然退飛隨六鷁且喜髙堂慰老親毋勞黄耳寄書頻澄江如練山如掃金菊芙蓉秋正好人生三樂古難全熊魚得兼真自天塤箎迭奏夀觴舉綵衣褊蹮膝前舞富貴故鄉朱買臣風流鑑湖賀季真一經已勝千金産况有牙籖三萬間應笑龜巢鶴髪翁小兒只作識字農脫身顛厓猶自喜殫力犁鉏供菽水尚期東壁借餘光讀我兎園書半箱重逰虎丘寺不謁閭丘謁虎丘幅巾藜杖興悠悠飄蕭白髪三千丈來往青山八十秋寳地近曽為戰壘劍池今復属禪流老松知我題詩意也學生公石㸃頭過呉門二千年外興亡事試為呉儂問老天西子矉眉真可醜東門抉目竟何􅄽荒臺走鹿巖花笑殘鱠成魚野史傳買得綠尊堪晚酌且將湖水煮湖鮮次韵荅姜天定白首歸來山澤臞山行依舊不須扶十年兵革遺黎少㡬處沙塲戰骨枯嬾去效顰隨醜婦安知走躄到浮圖求詩惟厭雞林賈猶勝門前吏索租二詩筒寄自清秋曉書印封來白絹斜一子幸能歸負米雙瞳可奈翳生花居貧不病如原憲弔古能文愛李華何日細論今古事荒村獨樹老夫家送任叔正歸上海猗歟子任子唾珠腹琅玕一登龍虎榜即着獬廌冠陛辭䝉主恩家居奉親歡行囊負禄米歸佩納幽蘭秋月釣龍江春雲畊鳯山藥室費長房木榻管㓜安逍遥烏皮几神仙紫金丹時為療民瘼於親駐童顔葵心抱忠赤萊衣舞斕斑棲遲雲林下放浪湖海間訪舊過滆浦尋幽出呉闗退鷁翅方歛盟鷗心共閒樂哉壺中天虗白泰宇寛送董經歴奔喪歸太原清風蓮幙諸侯客白雪麻衣䘮母還扇枕未能償素志倚門無復見慈顔四千里外迢迢路一片雲邉莾莾山只恐鶴書催入覲又隨鵷鷺造朝班西宿丁堰贈江隂王主薄五月六月凉如秋昨夕今夕雨不休屋山雷撼黑風起漕渠水溢黄河流河濱之陶萬夫聚誰其董之暨陽簿􅅅墻祗見烏曹磚飲氷食蘗忘情苦老夫擊柝天未明隔水又聞搏埴聲扁舟興盡不往見惡詩聊冩來時情夏五之初偕江隂張希聲䓁過鄒忠公墓即事口占以寓感慨并用趣郡守張侯弔墓之行青山門外羊腸路走謁道鄉夫子墓向來滄海變桑田翁仲漂零竟何處麗牲之碑高十尺頺若銅駝卧荆棘牧童敲火未足悲正恐𤓰分搗衣石使君五馬來何時摩挲細㸔黄絹辭五丁一呼為扶起隴頭草木皆光輝予方與客酹清酤白鶴飛來作人語使君應表鄭公鄉専美那容孔文舉代簡張希尹余生寡諧俗老去得知己晤言固云晚莫逆良可喜聨翩諸侯客寂寞著書事夜分青藜火晝並烏皮几㡬回論班馬一笑觀亥豕煙雲揮灑外風月吟嘯裏蚶盃酌流霞獸爐􅅡沉水佳哉水調詞清我塵俗耳朱絃聽者稀白雪和能㡬别來懐合簪夢見承倒屣帷林大江邉瓢巷横山趾秋風落梧葉甘雨熟菰米相望不三舍相過堪一葦詩筒繼元白通家猶孔李况與阿戎談亦與諸任齒尚友古之人厥德薰晋鄙雨中懐任義甫十日秋霖未肯晴石尤風作虎嘷聲東門父老應相問何事龎公也入城蚶盃溝南老仙出杯孔竒酌言詢之杯從何來匪兕而觥匪玉而巵不琱不鎪不覆不欹謂為蚌耶鷸胡弗持謂為蛤邪爵奚爾為測海之蠡其殆庶㡬老仙笑言子宜背窺瓦壟之文微蚶而誰水族之秀實生天池昔逢羽人觀迺朶頥麯蘗為粮華陽同歸轉客我者廿年于兹如李白氏杯鸚杓鷀釃風酹月朝斯夕斯走亦何幸數從宴娯百憂俱忘是用作詩次韵管伯齡見寄笠澤臞儒比列仙菊潭秋水觧延年每懐逺送江頭别喜得安書鴈足傳赤米白塩瀕海地香橙紫蠏早霜天客來賸說幽居好日日題詩思湧泉二滄洲舊隠宅江東白首忘機似海翁金菊晚開香淡淡玉山孤立勢崇崇通家子弟連年别愛客情懐往日同歲晚欲尋安道去扁舟當趁落湖風又郇公五朶雲天風送來前憐我落巢兒覆盆重見天三復誦佳句一如飲甘泉金篦刮吾眼華津生我咽重念謝公險毛骨仍凛然金鑠雖被毁璧歸猶幸全兩鬢雪飄蕭雙袖風蹁蹮寒蛩語音喜秋花笑容妍荅詩報君知今年勝前年贈刋字闞士淵憶昔趙文敏公之冩天下碑鐫字獨稱茅紹之紹之之妙在何許八法靡有秋毫遺嗟哉文敏不同世抱藝如茅誰品第斬蛟橋下溪水清鐡筆淬來鋒甚銳篆𨽻真行章草書銀鈎鐡畫冩璠璵天然筋骨見顔桞假手補戈真是虞文章太守眼如電語重兼金數稱羡青年正可為時出山居聽泉何足戀羣公將勒燕然銘中郎要令傳石經老夫為伊雙眼青鐡筆于今錚有聲寄盧公武舍人投老鶴溪埀釣緡遥憐鳯池掌絲綸靴霜待漏朝㑹早墨雲染翰詞頭新石麟自是天上物金薤散作人間春尚須鼓吹振六籍蹴踏班馬追楊荀送同知陞遷安慶郡太守郡守坐分金斗月朝靴今滿玉階霜一襟耿耿留遺愛五馬霏霏被寵光官誥叠承恩渥重御屏新錄姓名香可憐八十龜巢老尚欲攀轅立道傍送史宗儒歸省親北風狼號霰撒菽洮湖白浪髙於屋㳺子扁舟歸省親行囊賸有新珠玉舟行到家除夕前髙堂守歲開長筵斑衣捧酒為親夀河清復見昇平年相門出相今非昔文彩風流還籍籍一賦可值千百斤貧似相如未岑寂窮居我亦四壁空吾兒經鋤瀼西東煩將此意問若翁名教之樂將毋同寄金華府尹經歴牧伯方宣化賓僚喜得仁幕中勞贊畫胸次有經綸􅇵郡征輸夥清朝紀律新轍魚須救涸尺蠖正求伸月湛雙溪水風生七邑春簿書雖雜遝矩矱自持循耿耿存虗室昭昭對大鈞宦成敢小怠德立豈無鄰逺别長相憶前言敢重陳葑菲如可采薑桂有餘辛白首龍鍾老滄洲寂寞濱歸鴻如可寄千里見慇慇送田副使父憂歸若人自是青雲器九萬扶揺尚埀翅髙秋沆瀣生碧霄搏入詩脾作清氣頻年坐此塵土塲纖埃不滓芙蓉裳豪吟接跡李太白桞金梨雪揚芬芳詩成落筆蛟蛇走多入雞林賈人手今朝送别毘陵城折盡西門道傍桞東風雨晴花錦香京華到時春正長上林一枝棲鳯凰鳯兮鳯兮鳴朝陽送張常州奉㫖入覲白髪田舍翁清曉何跚跚送侯赴朝覲扳轅吐哀丹去年榖半熟藜藿度歲寒春來理農務豈憚稼穡難采薪供陶冶四境空榛菅執柯渉重湖荆南斫青山非無犁鉏具靡暇􅅵畝間烏曹事未已綠野多荒閑願侯念氷兢為民徹天闗樵斧暫容息農畮力可殫民歌岐麥秀侯策五馬還古今兩張堪並載青史㸔送王起東御史丁憂起復赴京君親恩重生當報忠孝情移義與俱冠豸威名傳舊日攀龍寵渥拜新除玉堦雲集來儀鳯錫谷人稱返哺烏折盡驛橋飛絮桞親朋相送喜何如送陶孝思赴召夙學多才思崇文際盛時鶴書騰日下鵬奮出天池發軔青雲路承恩白玉墀泥塗龜曵乆阿閣鳯巢宜繩準持三尺絲毫畏四知佩韋遵古訓介石蹈良規比德雲輝草同誠向日葵往哉行所學動必慎其儀器作璠璵美文成黼黻竒遺芳留汗竹無負故人期張知府命子送祖考墓碑還鄉名門父子傳一經儼如韋相有𤣥成從親宦逰養親志念祖喜䝉封贈榮潛德幽光恐磨滅伐石南山鐫墓碣宋公文章踵韓桞史公清書追禇薛龜趺螭首重摩挲舟車載去勝槖駞四千里外薄炎海佳城埋玉山嵯峨墓前翁仲㸔石立面帶煙霞含喜色九原精魂斯焜煌百世雲礽益輝赫八月九月秋風清綵衣翩蹮趨鯉庭恱親細說鄉里情老夫亦來堂下聽和賈教授懐鄉試㸔一簣可為山千里程從跬歩間取印正須金斗大還家未入玉門闗泮芹過雨香堪摘壇杏無風意共閑我欲中秋聽琹去扁舟􅋈棹後河灣寄賈教授相期詣鄒墳祭掃題詩郡圃景鄒亭澆酒林莊下馬陵白草西風秋莾莾青山北郭路登登柱頭且㸔誰為鶴驥尾何慙我附蠅坐待秋凉行有日老夫扶憊策烏藤道郷祠堂詩送張縣丞道鄉祠前松柏蒼清氣凛然知㡬霜伏蒲一䟽吐肝膽汗竹千古傳芬芳此去長安日月近且喜髙秋風雨凉立朝願學子鄒子他年便作知恩堂題許别駕雪山圖南山雲起連北山樂天賦詩心共閒東山月出照赤壁子瞻倚歌情甚適今公畫圖誦雪峰託興應與雲月同璚林玉樹絶纎滓蓬婆城外山相侣羣邱角立白龍堆飢寒喜無桃與哀蹇驢滑澾山前去絶似㶚橋人覔句公餘展巻巖電流襟懐化作氷壺秋楊家氷山無足倚何如坐對兹山隠烏几同友人祭鄒墓各賦詩一首先生高塚麒麟卧令子峩冠獬廌威汚玉青蠅除穢跡銜書紫鳯賜恩輝八千里外甘泉竭三百年來世澤微㵼我一盃寒澗淥卧碑扶起立斜暉送楊通判知蘇州府延陵父老攀轅别呉郡兒童跨竹迎闕秩遷藩府重恩榮五湖秋水清堪比三壤遺風俗易成遥望虎丘山下月餘光還可到柴荆寄張熙載問疾溝南隠者敦同姓每說相知見肺肝名似項斯詩句好身如沈約帶圍寛一江雪浪潮平岸十日秋霖雨作寒珍重齋居足怡恱玉枝無汗竹平安和賈教授詠懐兩袖西風獨倚樓一天秋色斷虹收水村霜落紅于染山色煙嵐翠欲流眼底㸔來興廢事胸中銷盡古今愁莫嫌苜蓿盤無味喜有葡萄酒可篘重九次韵石潭無菊比南陽老我三千白髪長九日正須多買酒一錢何必用㸔囊自憐身健茱茰紫更喜盤餘苜蓿香早起東牕拄吟笏坐㸔紅日上扶桑又和寄秦宜中髙堂燕客似高陽醉筆題詩興味長戀戀多情舊紗帽滔滔無底老書囊銀瓶茰酒觥船滿玉杵橙虀蠏斗香應笑陶潛空抱菊西風繞屋呌枯桑贈辛林甫有客有客雙眼青婁江山水鍾其靈十年足不出户庭手披韋編不暫停案頭照盡練囊螢先天後天見日星百家喧囂無足聆九師亦以蠡測溟蓍策之妙窮杳㝠語人吉㓙影隨形滿庭書帶生香馨一簾秋色風泠泠去年抱琹來野亭古操為我作水伶吾方采樵如負苓相與􅇵談洗心經呼吸沆瀣食楚萍一掃世味羶與腥有時醉我蘆花汀客來買卦呼不醒惜哉孤鳯五色翎翩翾何日儀虞庭鳯兮鳯兮請試聽黄河水清三千齡龜巢稿巻五欽定四庫全書龜巢稿巻六元謝應芳撰記瑞竹軒記余辟地甫里與徑山夀上人為方外交一日過余曰今年春吾祖如山翁燕居之所挿竹為酴釄屏閲數日竹皆復活或者以瑞稱之故名其軒曰瑞竹敢請子為吾翁記之既而復延致竹所相與撫玩曰是竹也前為屏時屈其所天至是乃盡釋其縛屈者伸抑者揚拘者縱新者闕穉葉發乎蒼幹勁節之間生意藹如有不可得而閼者愚乃退而思之夫竹非蒲葦䓁易生之物可不根而植者今若此果何祥耶嘗聞往者㓂萊公挿竹而生世謂公忠義所感如山之竹亦必有所感而致然乎余來呉中聞翁有微德之事二焉屬歲飢饉里有窮乏則周之俗多􅈄畋忍物暴殄恒買而放斯二者固尋常有力之家能為之豈其一念之誠仁發于中黙契于天而獨有此休徴歟抑别有隂德人所不知歟誠如是則萊公之竹不能専美於昔矣雖然物之瑞未若人之瑞也嗣法之徒森如立竹有能虚心以受道秉節以植德清風孤標為上根器則其為瑞又豈此君可同日語吁人為物靈氣化尤速某即拭目以俟龜巢記至正丙申春余辟地滆上依舊識里翁劉氏家築室一區棲婦子差可容膝既而以龜巢顔之客或過余曰龜亦何嘗有巢哉予曰子不聞乎千歲之龜巢於蓮葉盖其以葉為巢初不費經營之力也顧予此室實類之僦地里翁地不論值假力鄰伍力不受傭鳩工材則有鄉邑諸友人相之故其室不勞而成今也閉門縮首帖然如藏六之龜蟄乎其間此龜巢之所以名也比数日來春和景明氛埃寢息四境之内桴鼓不驚田夫野老相與招致渉桑苧之園過桃李之蹊瓦盆濁醪歌舞酧酢逍遥徜徉又得如曵尾泥塗者此雖巢外之樂亦因巢而得也但不能嘘吸道引如龜永年茍於此偷生亂離免禍鋒鏑全要領以終其夀考志願足矣若夫明休咎斷吉㓙决大疑於國家浮洛出書為太平文明之瑞則同類之中自有偹四靈相斯世者區區巢居之樂與坎井醯瓮同乎一天不知大小之闕為何如客曰有是哉子之適意也而今而後吾亦欲從子之居以適其適可乎予曰可客喜而去予因次對客之語用為記龜巢後記是歲八月之初天兵自西州來者火四郊而食其人吾之龜巢與先舊宅俱燼矣予乃船妻子間行而東過横山竄無錫期月之間屢瀕於危當是時跧伏篷底屏息若支牀者然猶數數引頸回顧以戀其故土明年仲秋至婁江東近扵海潮風汐雨漂揺棲苴乆之遂舍之從人借屋而寓閲四年居凡五徙聞鄉邑無噍類以是同室之人幸若再生雖貧窶不以為苦且復以為樂也至吾之所樂則又以窮居無事得專心讀古聖賢書以廣其志仰天不愧俯地不怍廓如也然視此大塊吾生若浮與夫龜浮蓮葉者何異所至以龜巢名室雖偪仄心有餘裕盖不以棟宇為巢而以天地為巢也峻宇雕墻莫知其光蓽門圭竇莫知其陋但知此巢自開闢以來歴數千億載不壊吾與萬物同居其間正不必藩籬町畦以自局也以是而觀區區舊巢墮甑奚恤雖物之巢居者衆矣儗龜之巢先後固異龜則儗其靈耳若曰以靈自燋亦其用於世者然也世不我用吾生自全吁用不用全不全繫造物者處之如何非龜所能為也惟兩間之巢人莫能壊此吾心可恃而安者吾心既安何往不樂苐恐不知者謂無巢而有名疑為誕故重託毛頴氏告之雲半間記歲庚子月閠五西山師搆小閣於天慧莊而居之額曰雲半間盖取諸前軰詩中語也予時客天慧與師落成徘徊其上溪山煙樹四顧如畫人皆喜之愛之而師之所樂不在是也是屋僅一間而止髙不倍尋廣不踰丈無欂櫨栥梲之華自常人觀之井幹麗譙奚啻霄壤師獨處之裕如盖其前後左右牖户虗爽蒲圃木榻薰爐禪几之外無長物焉師於六時坐如泥塑諸弟子𤓰華之供日一二至談説有或從侍立客或至信信宿宿皆不能常與師共之惟英英之雲悠悠而來朝於斯夕於斯窮嵗月於斯一榻之外皆雲攸居言半間者亦謙辭耳夫雲之為物本來無心而吾師心無所住是亦無心人也以無心之人遇無心之物故不情而親不契而合乆之則雲忘其雲雲即我也我忘為我我即雲也吾視吾室亦不知其與天地相間孰為大孰為小也莊周云天下莫大乎秋毫之末而泰山為小其言殆庶幾乎雖然諸皆相忘吾師固知之乆矣然而猶自此室者抑亦云桑下一宿之意與予嘗以斯言質之師曰然遂為記歸耘軒記吾友徐君伯樞以兵後還無錫故里築室膠山署曰歸耘徴予文記之予嘗質之曰而翁太中公為時名卿今逝矣州大夫亷君之才能也其家方薦之省府將上聞以官之而暇耘其田乎伯樞笑而不荅予退而思之君名父之子自蚤歲淑諸師友菑畬經訓埀二十年今以先世負郭之田莾為荆榛固不可不畊且耘也然亦奚忍舉此而廢彼耶必也帶經犁鉏斯可矣古之人若耕莘者樂堯舜之道耕南陽者有梁父之吟故一旦以三聘三顧之而起非惟澤溉生民功施社稷尡耀當世而伊訓諸篇出師兩表至今與日月争光是豈専于農者能之乎雖然耘田之事亦有治道存焉敢請與伯樞論之五榖猶良民也稂莠之屬猶㓙頑也草生而不耘則榖不榖矣芸之早則用力寡而功多小緩則小害大緩則大害既害而耘或百倍其力而不盡雖去之而榖已疾其害矣吁草害于榖治田者道也凶頑之害良民治人者可逃其責乎惟沮溺荷篠之流潔身亂倫者不足以語此伯樞宜留意焉樞聞乃起而謝曰是吾志也請書之用誌於壁庶他日知所警云東郭草堂記至正乙巳春友人徐君仲剛書來曰瑗性迂拙分甘退藏擇無錫東郊荒僻之地作草堂居之讀書灌園蝸休蟻適自謂有可樂者子知我其能為我記之乎予惟仲剛卓犖之士也譬之楩柟豫章不巨室棟柱則山林而已比嘗佐令慈溪方欲抉吏弊更苛政以仁其民一旦以當路掣肘棄若敝屣翻然來歸客呉下數年不入城府其抱負為何如哉兹草堂居寛閑之野前有鵝津可釣可㳺鴻山宛山屏列左右東膠西堠紫翠相接又皆牕戸間天然圖畫也仲剛入則與書中聖賢相對出則與里中農圃為伍親友時至忘形爾汝腰不為督郵而折膝不為汾陽而屈適興賦詩往往有太白豪放所謂有可樂者其以是與雖然昔諸葛孔明居南陽亦蕭然草廬而已及乎以三顧而出入陣有圖出師有表而勲業焯焯如是静學之功信不誣矣荒僻之居又安知非天假為學之地乎愚請以規仲剛并記斯堂之歲月云野人居記余聞之易其地則齊楚異音同其居則蘭鮑俱化大哉居乎故君子必慎其擇也予友呉中行今乃去朝市逺城郭挈家淞江之濱桑麻之野蕭然一室名野人居是果奚擇而取哉昔中行以劍術㳺諸侯借箸之籌幕中之辨嘗見用於當世豪傑矣未㡬以時之不利投簪來歸回視淮隂狗烹之歎華亭鶴唳之悲銅山餓死之辱金塢燃臍之禍未嘗不愴然于懐其言曰窮居之安不愈於負且乘乎蔬食之樂不優於覆公餗乎由是縮首閉門百念灰冷獨研精古聖賢醫藥之書以事其親以濟夫人暇日則携杖屨往來溪山間與嵒穴吟嘯者㳺耕簔釣笠交亦無間情真而不邉幅語朴而無貝錦滄洲濯足或坐終日茅檐炙背或談千古桃花流水之外杳不知其孰為秦而孰為晉也但知譚泉飲菊可以永其親之年江鮮膾鱸可以美其親之饍𤓰疇芋區芝田藥圃皆其地所有而名都大邑之所無也若中行可謂善擇其居矣予與中行有通家之好一日携兒子林過之用是為乃翁夀中行嘉予言請以為記因命林執筆以書其居之壁云雪洲記趙君執中蘇人也家笠澤之隂與天隨子故里相望澱湖直其東陳湖横其西其墟落乃一洲渚耳君性喜雪凡歲寒雪作之日天地六合炯如氷壺三江五湖如璚匜玉杯而山林皆瑶草琪樹也然陽精掩耀湯泉欲氷歌黄竹而悲者在在有之時君獨傲兀吟笑于滄洲之上或終日竟夕而忘歸焉盖一時清氣與虚室之白洞然無間故自謂平生慶快無踰此時乃即其所居之處所樂之事自號為雪洲也予嘗於夏日過之階庭之間竹有蒼雪明牕素几寂無纎塵而大篇短章又皆與氷柱雪車同一光潔且曰桞雪之春蘆雪之秋亦猶見似人而喜予於是知雪洲之樂盖無時而不自得也或曰以君之才宜其從名王逰兎園而其遇出竒謀平蔡州而樂其成功窮居野處何足快哉吁昔子程子論顔子之樂非樂簞瓢陋巷也君之雪洲亦類是歟但區區言耄不能揄揚姑述其槩并以觧或人之嘲如此云竹梧書房記洪武辛亥予去家十有八年而歸儒紳故交多無噍類獨友人秦公宜仲主貴池縣簿告老于家予首訪之與客偕往公所居環堵之外皆焦􅇕灌莾乃題其室曰竹梧書房客因訝而問焉予曰嘻我知之矣公之先君子以多資𢎞第宅儲書數千巻自蚤歲教公為舉子業公研精伏生所傳之書旁通百家文譽日著時子山陳先生未魁天下與公為忘年交嘗與予過之其階庭之間巨竹數百雙梧玉立綠隂蒼雪清氣襲人而公之風神蕭灑殆若與竹梧俱化子山嘉之故有是篇夫髙垣大宅今瓦礫也碧梧翠竹今枳棘也埀籖挿架之帙不為刼灰則市肆之醬䝉矣惟腹笥之書幸而無恙故嘗為郡博士以教其邦又推其緒餘佐治巖邑以嘉恵其黎首今老矣尚能鳴待問之鐘以接逺方朋來之士為文章則駸駸乎周誥殷盤而不聱牙也扁乃舊名葢不忘父兄師友淵源之懿耳客既釋然公亦頷首出縑素請筆前語以告後之不吾知者并以示諸子若孫庶箕裘其業云是冬月建子日㡬望余則龜巢老人謝某也映雪齋記毗陵何士信起家業儒儲書數百帙研精誦讀晝夜不息榜其室曰映雪齋葢慕孫康氏之苦學焉夫以士信之家居市㕓足資用焚膏繼晷乃所優為齋居豈虛名哉其心必曰我自短檠猶雪之明我室棐几猶雪之瑩我讀我書夜氣以澄微言妙理披雪覩星顧我靈臺皦皦乎不雪而白不氷而清唾視籝金珍惜分隂曾不知九逵塵土之蓬勃四時寒燠之變更然則映雪二字又何異湯盤九字之銘歟彼㶚橋詩人梁園賦客有不可與同日語者惟篤志之士如㳺如楊立雪於當代程夫子之門者聞之必予其進矣士信謁予文請以是勵之蘿屋記毗陵郡城之西南距滆湖廿有餘里湖水支流北抵城而滙其地有髙原平林風篁煙樹景物瀟灑友人詹伯逺居之茨宇一區牽蘿補葺匾曰蘿屋名固不虛盖亦以昭其儉耳然庭户閴如日必灑掃木榻棐几瑩無纎塵平居則肅然孤立以孔孟之書教孫共讀異端邪說絶口不談彼流俗相煽而炫惑者弗接勝友時至尊爼欵洽或相與論端人貞士氣義風節終日竟夕亹亹不厭予嘗過而問曰子豈掃除一室之小丈夫乎伯逺笑而不荅予曰噫我知之矣伯逺通古今明物理眎昔人之銅山金塢皆禍基也峻宇雕墻匪安宅矣盖其所喜者桑樞甕牖之美而所樂者簞瓢陋巷之天儼然為草廬布衣而耕南陽之田者其出處豈易與人言哉雖使得志其不為堂堂九仭也必矣善觀人者毋以蘿屋之儉而陋諸洪武十有二年歲在己未四月之吉謝某記菊軒記古者逹觀之士寓物適意初未甞肆意於外物也若莊周觀魚支遁觀馬阮孚自䗶之屐嵇康栁下之鍜與夫愛竹愛松愛諸花卉者大率皆適意而已近世流俗以淵明愛菊亦從而愛之所植或百數十株髙及尋仞花大如杯假以花師接養之工移易種類使坤裳正色亦多變而失真其嬌紅韻白紫茜紺碧之屬愈出愈竒且復以西子玉環等人物之名名之是則誇多鬬美肆意以極玩好之娯視淵明奚翅霄壤夫東籬之菊猶西山之薇薄言采之可以樂饑若乃賦離騷而飡落英者其庶幾乎寒圃晚香樂則樂矣然其趣有不可同日語者吁流俗之謬如前所云豈不大可笑乎吾友王夀翁以菊軒徵予文予恐其翫好之意淪於汙俗兩年不為措一辭今乃不然翁春秋七十有三凡早歳華靡之習皆已絶去軒墀蓻菊僅一二本其言曰吾所以愛此者嘉其當草木變衰之候霜瓣露葉澹然幽芬挺挺特立久而不墜殆與晚年矍鑠者黙有契焉故朝斯夕斯逍遥相羊或開牕坐宴或置酒速客終日相對不厭不倦雖髙風雅致不敢妄擬於陶其適意之樂亦無官之韓魏公也咄彼庸儒朋滛可憎安得疾惡如諸伯厚者相與御剛風摶沆瀣周流八極為兹花一洗汚衊之辱過翁幽軒呼酒髙酌咏柴桑之詩歌離騷之章盡醉以適翁之適而吾亦得以適其適也矢心陳詞用誌軒壁為後㑹張本云斗室記自標枝巢穴之世逺宫室之制日新月盛世祿之家第有甲乙馴致習俗之侈而堂髙數仭墻屋錦繡者比比矣若夫屈身矮屋之士往往以力所不足不能有為其志未嘗不澹然也惟吾可積則不然可積以呉越錢氏之裔贅延安唐侯之家往來雲間築室采邑鳯山屏其前淞水襟帶其左右屋裁三楹髙不過尋丈而延袤深廣如之匾曰斗室時僑寓以居宴如也夫以婦家封侯之貴采邑之富雖連雲别闕咄嗟可成今若此亦可謂不滛於冨貴者歟吾將以其細行觀之屢歲過鄉里視故舊親戚謙謙乎抑抑乎執子弟禮不異童丱之日無一毫驕矜放肆以加於人故咸謂有先君子好禮之遺風焉然則斗室之儉本乎天性非矯飾一時以要虛譽而為之也昔衛公子荆善居室完曰苟完美曰茍美故孔子稱之若可積之儉而約於衛荆其庻㡬乎吾用是以稱可積延安家法之足稱亦可見矣是為記思齋記膠東賈文學鈞慶典教毘陵郡以燕處之堂榜曰思齋徴予文記之且言曰某所謂思者非謂能三思而行亦非敢以九思之訓待旦之意示警如書紳也思吾親於疇昔䘮亂之秋相繼即世母蕞昌邑父堲萊縣㡬致蕪沒幸而茅㓂殄滅歸室祖塋大明開天㧞擢寒畯代畊有祿而養弗及親矣風木之憾十有餘年去鄉土㡬千餘里霜露降濡悲感交集念欲灑飯松邱使吾親不為若敖之鬼棲息桑梓以終餘年此朝夕耿耿於懐也予曰嘻㳺子悲故鄉信矣况思親乎然君子之思其親者豈止是哉烏雛返哺豺獺報本特一事耳必也出言舉足動合矩度不忘其親詩禮之訓聽于無聲思無邪以正其心儼若思以敬其遺體由是而推其緒餘以淑諸人以施諸行事忠君報國流芳汗青以顯榮其親夫然後息負荷之肩觧組綬之縛訪親戚省墳墓某水某邱凡吾親所釣㳺處吾得釣而㳺焉鶡冠鳩杖抱子弄孫以安享太平田埜之樂則今日之所思者豈不熊魚兼得乎區區耄言筆識齋壁庶或紓其懐抱云白雲亭記東漢趙邠卿夀藏之作吾意其渉艱危將以得全歸為喜故耳至唐司空表聖乃預為壙槨時與客觴咏其中又作休休亭以寓超然物外之意史稱曠逹不誣矣今吾反唐公均舉由末致仕佚老於家洪武革命䝉天憗遺以弓裘無嗣業者命其兄之子某允明為後家事鉅細悉付托之即在家為有髪僧㕘釋門諸老以學其學春秋八十有九號曰白雲翁距舍南百餘歩迺為佳城傍結茅龕晝夜禪寐允明則日候起居奉甘軟如事所生且能承順其志築亭于前復鑿池以藝蓮芡之屬幽花秀竹與冢上之木參錯相映每邀致親之所愛盍簪于亭薫爐茗椀相樂也且曰某負米四方往往望白雲思親有如昔人之言者雖歸侍旁雲常在目請先生為我記之時坐客有辯之者曰吾聞藥山禪師以雪之在天為西來祖意今雲翁禪眼之明必有契乎禪悟之語非允明名亭之意亦非儒紳先生所知也予曰不然夫英英之雲一也其觀感各有不同雲翁身如雲浮太空貎焉斯須猶瞿曇氏電露之諭也若夫允明望親舍之雲而懸懸者是則以梁公之心為心家居以壟雲自怡庸詎知非華陽真逸之心乎吁仁見謂仁知見謂知予所知者此理而已禪則吾不知也客笑而不言予曰如何翁曰佳允明曰唯唯是為記養正齋記徃余客東吳十有餘年聞儒林月旦以琴川髙彦和氏稱為儒士聲甚藉藉予雖未相識而相慕焉洪武辛酉秋友人楊純夫尤稱譽之且言彦和以養正名齋葢取䝉卦之辭猥徴予言屢辭弗獲予曰大哉易也豈敢以管窺之見以贅疣乎請以古之善養正者為彦和誦之如孟母三遷使其子去丘墓市㕓為不逰之地習禮容籩豆于嬉戲之間如室於蘭乆而俱化厥後以寡欲養心以直養氣傳正學而接跡于子思辟異端而竝功于禹是母是子非善養者能如是乎衛武公行年九十有五懿戒之作既自箴警且求卿大夫官師之屬交相教戒瞽矇誦讚朝夕弗違言行之純罔有圭玷亦豈非善養者乎是故一為亞聖一為睿聖易之所謂聖功者不誣矣吁人生天地間所受之性本無邪僻惟其情竇既開牽於物欲日浸月漬或正或否遂乃有君子小人之分茍得其養則如木從繩其正若自然矣今彦和之為端士也䝉養之功不言可知繼自今以來學與日積道隨年長佩服乎七篇之書􅆂養乎大雅之章毋曲學毋枉道毋有獲而詭偽慎終如始益進益修如此則希孟而孟希武而武何止如旦評而已哉區區言耄而瞽幸純夫為我謝之重建雲居菴記洪武十有六年春雲居主僧德傳過予曰宋咸淳間四世祖諱行興號祖庭來自天目山駐錫爵林露坐說法風動一方緇素與檀施坌集遂結菴以處之名曰雲居由宋而元祖年九十有二終于至正乙酉其嗣法弟子曰慧滿繼之四年而沒曰道印以甲乙傳及元末菴燬於兵慧滿避兵他適不知所之而德傳念祖師過化之地義不忍捨去大明更化初頼吾佛之道與時偕行于是剪荆榛畚瓦礫復經始營之距爵林百餘歩得里人湯逹卿故基以廣其居今茍完矣請先生之筆以識之前此予嘗過横山之隂憇足于菴觀夫所築之室凡二十餘楹堂有佛像設供具鐘磬列焉僧有室經案禪榻香燈備焉餘如齋厨井湢之屬罔有不備其地近山而爽塏逺城郭而幽閴晨嵐夕霏空翠灑牕户間無囂塵市聲滓人耳目傳公日掩闗趺坐泊如也吁是雖蕞爾一區如把茅葢頭然視佛之所謂桑下一宿者亦已多矣彼名山巨刹膏腴以千萬計尸素之士或不能及若傳公者服勤如此肯搆如此繩祖武而繼之人如此豈非浮圖氏子孫之象賢者歟予故聽其所謂并以目見之實三嘆而書之是歲夏六月之望同郡龜巢老人謝某撰歸耕記予老廢筆耕授之子子以拙辭躬稼又弗克服勤方諄諄然朂之以周公無逸之訓潞城曹德聲書來曰震往者避兵東呉顚沛萬狀還鄉以來田舍粗葺歸耕二字掲諸座隅示不忘也惟巢翁姻婭而相知敢請識其顚末以埀警其後人予曰嘻前元時德聲曽大父為晋陵閭石大父起家登仕版歴官至東平路同知殁數年而德聲失怙丁時多艱家用蕩析蔑有能相顧者藐焉依母氏笠澤之濱狼􅈣滿眼矢石塞路窮途之困甚于蒺藜杳不知先業失墜為何如也大明更化初竭蹶而趨偕女弟之家還故里荷蓑笠操耒耜薙荆棘之區犁之剷瓦礫之塲屋之載搆載穫粗理而恢拓之烝嘗之奉滫瀡之養征徭賦稅之所需罔有不給且能割膏腴以寧二兄之歸斷鴈復得以成行逰魚不失其同隊東阡西陌雞鳴狗吠桑梓敬共是如其素願也然則患難之餘歸耕有如此者豈易得哉若曰其歸也非衣錦之榮休官之適其耕也非能以堯舜之道樂于畎畝此盖以前賢論之衆人可同日語乎如德聲者先世之業失而復得骨肉之親散而復聚况時和歲豐率土寧謐凡我同類皆得耕田鑿井驩然為太平之民其樂雖異于古人未為無所樂也吁以其艱難勤苦十有餘年而後得此後之人或罔有攸知寧無怠荒乎此記之所以作也顧予年耄請復以語吾兒者語之夫周公聖人也無逸一書為世龜鑑茍知之則當尊其所聞俛焉孜孜以述纘承其先緒詩曰子子孫孫弗替引之吾於此亦云書屋記洪武壬戌秋崑山故交辛斌甫過龜巢為其友蔣生秉彛請書屋記且曰生自齠齔時嗜學雖祁寒大暑矻矻不少廢年十五父命學吏事閲數月不懌而歸既而令服賈走淮浙南北數千里亦常以簡冊自隨少暇輒誦讀之竟不屑罔市利以肥其家遂令力穡為仰事俯育計秉彛廼從親之令臺笠緇撮以事其事三餘之日愈進厥功老夫以未嘗靣其人目其居難乎架空鑿虚而為之文也明年夏五予舟過婁江斌甫與生郊迓而過之所謂書屋者初無埀籖萬軸也亦非連雲大宅四書六經外諸古圗史與陶𢎞毛頴列乎其間與之語燦然有文意吾常林經鉏董君南之朝耕夜讀亦如是而已矣揚子曰晞驥之馬亦驥之乘使秉彛所造愈深進愈力則所就未易量也然則秉彛能承順其親且不卑屈其志謂非能子可乎所居在崑山城西九里橋之南其江山景物無闗於書屋者不書特以其心跡之實書之用為記時洪武十六年五月二十八日逸菴記夫人莫不欲四體之逸也惟君子則逸其心故嘗操而存之寡欲以養之秉彛之天一真無偽感而通之動㒺不吉周書曰作德心逸日休君子取之故能逸其心也今河南彭公伯常為武進令自號逸菴夫所謂逸者心逸之謂歟自常人言之州縣之職其勞甚矣顧兹巨邑事如絲棼雖戴星出入猶恐不迨可能逸乎予曰不然公以夙學老成之才為之征科撫字恩威並行雀角䑕牙曲直能辨如庖丁觧牛知其肯綮牛雖多而芒刄不頓也矧夫至公之心炯如秦鏡且不以塵土蔽妍􅑦所照隨物應之則是吾心之逸盖自若也雖在官舍視為逸菴不亦可乎一旦朝家以七十之年優容里居則吾心之逸與肢體之逸熊魚兼得矣雖然古之逸民若夷恵之儔髙風峻節為世師表吁吾知逸菴之逸必如是而後已焉持敬齋記前軰以齋居之名著稱者多矣其最著者曰誠齋簡齋容齋又有以先正箴銘而傳者曰敬齋求放心齋是也其後一變曰疏曰酸曰松雪者紛紛然人争效之齋之義逺矣今贛之聶伯䕫氏以持敬名齋需言于愚愚固辭不獲乃言曰聖人筆六經以詔萬世敬之一字層見叠出先儒詳之矣愚復何言竊觀所謂持者意在執持而用之人之持物猶吾之持敬也持物以手持敬以心茍不致謹則亦莫之能用也譬射者必謹于持弓而後不失其中御者必謹于執轡而後不失其馳又如執玉捧盈必洞洞屬屬然如弗勝如將失之然後能勝而弗失也伯䕫鄉逰成均持此敬以進德脩業故學優而仕宰髙平持此敬以治其民而民有去思焉邇來為諸侯幕賓翼翼乎以㕘贊承宣為務謹三尺御羣吏以涖四邑是皆持此敬以展其用歴兹以往百司皆然有官守則持此以共其職有言責則持此以盡其忠峩冠冕鳴佩玉鸞臺鳯閣簉羽鵷鷺無非持此心之敬而用之其用有不能盡者敬乎敬乎亦豈非一言而可以終身行之者乎夫如是則上不負天子下不負所學齋名著稱亦卓然如昔人矣雖然宦成而怠世固有之惟君子慎終如始有不為其怠者衛武公春秋九十有五官為周司徒方且再三以敬慎為詩日夜警戒故卒能為衛聖武公愚不敏敢請獻此詩為持敬慎終之助洪武十七年歲在甲子三月二十六日恬澹齋記為髙彦述作昔有與彥述同姓字君素者以頥軒請涪翁賦詩其畧曰辱莫辱多欲樂莫樂無求㫖哉斯言真可為恬澹齋座右銘也盖多欲則不能恬静必辱其身無求則澹泊自足樂於其心由是知孔顏之樂非樂乎飲水曲肱簞瓢陋巷而蔗境之佳可漸入而得矣夫彥述先君子以醫名家獨歩鄉國流風遺俗今豈無之十餘年來乃能與時浮沉不競不躁不貪不墨舊家氣習掃滌净盡故齋居之室題曰恬澹盖取諸内經養生之要旁㕘老莊而有得焉至如諸子百家之書亦能渉獵然文􅇨不露不求人知城居如子真谷口賣藥如君平賣卜簾常晝埀門或早閉衣布素若紈綺茹麄糲如膏粱由其氣禀之清資以學力斯恬澹有過人者每謂人曰人生固不能無欲也多欲奚為彼銅山鑄錢郿塢積金一姬傾斛珠萬馬如錦繡凡如此類孰不禍賈當時而遺臭後世乎言之必撫掌大笑傾倒而後已吁黄太史九原可作論二髙當有抑揚老夫贅言亦庶㡬奬勸之助云芸室記予耄無能為者乆矣嶄然骨立百念灰冷獨嗜學好友之心猶未能忘前元故交淪没殆盡每見後生少年能讀書通古今識道理且不為異端邪說所惑則愛重之同郡為忘年友者凡數人其一伯禮也洪武戊辰秋伯禮書來曰某居鄉城環堵一室有古聖賢經傳及醫書若干巻日用渉獵間以芸香辟蠧庋諸室中顔曰芸室望先生以警之書再至義不容辭矧予数相往來知其室無節梲之華無丹碧之飾無屛罳帷幄為觀美之資宴安之具闤闠中有山林清致木榻棐几圖籍左右薫爐短檠陶泓毛頴之屬晝夜為伍孜孜厥􅁱嘗謂人曰吾為醫家方技可以寓吾心之仁以濟夫人人故先之非以儒為迂而後之也吁伯禮言此其知道乎然九流百家莫大于儒儒之道莫大于仁伯禮知醫藥之方或未知仁之方傳曰已立立人已逹逹人仁之方也尼山大聖盖得夫唐虞三代之傳傳之萬世以康濟斯民非金匱石函之方可同年而語者請以是筆諸芸室藴諸身施諸人則吾心之仁不可勝用醫儒之道所謂竝行而不相悖者信矣是為記重建清微觀記夫師教之恩報同君親盖化之重者見于經昭昭也然道德五千言此非所先茍師道之不降則道德亦不能有傳矣今清微觀主周鍊師石泉勤而行之是能黙契禮經而獨超乎其類也洪武己巳春石泉書來謂予曰某追懐先師歸復故業丐先生為文識之予嘉其能而不却也抑嘗過丹陽聞諸鄉老之言其報師之恩藹然可見初邑人諸葛德齋隠居學道佩天師符命剏此觀為脩鍊之所既而羽化實為開山之鼻祖也弟子裴静山䓁住持以甲乙傳元末觀毁衆亦飄散或存或否洪武改元其徒朱竹軒言還結茅而居未㡬而終時石泉住丹徒紫府觀聞師訃即謝事而歸塟之志在復業揄揚道法風動一方向化者咸樂施以相之諸葛氏母子其尤也于是剪荆榛畚瓦礫鳩工度材辛勤十有餘年作三清殿前闢山門傍翼兩廡祖祠經室丹房齋厨之屬凡若干楹穹林竹樹蔚然屏蔽輪奐之光焜煌乎蒙城故區度亭遺跡長塘之煙水湖光北固之雲霞山色亦皆映帶為清微勝概矣吁凡為人後者有能繼述如此豈不為賢子孫乎近世縫掖之士學必有師禮宜報効未嘗彷彿如此者也予因記其事之顛末深用感慨并書此為世之勸云棲雲軒記雲之為物聚散不常其聚也由膚寸之微至於彌六合雨天下其散則斯須無踪人莫能測况能與之棲遲乎惟英英而白悠悠而閒者方外之士相羊似之每寓言而髙尚之意云耳常郡𤣥妙觀莊某以寧棲雲有軒意盖如此夫以寧師老􅅨其學以清静為宗青山白雲澹然幽棲固其宜也然􅅨在周室柱史有年青牛出闗然後著書五千言以鳴其道亦未嘗絶物斯世而為髙尚焉後之善學者如陶貞白于齊梁之間挂冠都門怡雲句曲若將終身焉及乎以大任寄之固辭而不可得遂乃坐山中如廟堂之上茹茯苓如鐘鼎之食人到于今稱之不失為華陽真逸也矧吾以寧有琴而能作松風之聲有詩可以賦怡雲之情是則陶之所樂皆為吾有山林市朝或處或出何往而非棲雲之地哉吁由周而來寥寥二千餘年所謂隠居以求其志行義以逹其道者竟無其人是可嘆也若夫華山之陳一枕白雲三徴不起此又不可同日語矣以寧徴予文特書此以識歲月以偹從善之擇云聽雪軒記夫雪聲之微若有若無聽之者必方寸之間一無擾攘兩耳之聽不為物奪然後可得而聞也同郡馬用和居市㕓以陶猗為伍絲竹車馬之喧晝夜不息聽雪有軒豈虚名乎洪武初予嘗忝為東家某知其為氏之良别來十餘年說者謂用和讀書養親習與志長超然出羣遇歲晚同雲霰集而霏霏之雪繼之時用和侍親庭闈言此為豐年之瑞以娯其親捧夀觴如金帳羊羔舞斑衣如仙人鶴氅以春蟲撲牕之聲為金石之鳴舉家之人同得以樂其樂也既退獨處軒居萬籟俱寂乃想像撒塩飛絮聽于無聲不啻若鈞天廣樂九奏而有遺音所樂有未易語諸人者其心必曰蘇子卿十九年牧羝沙漠李元直夜半擊鵝襲蔡梁園之賦客揮毫㶚橋之詩人覔句皆安知雪之有聲如此其樂哉用和需予文請以是相知之言識諸軒壁異日黄金鑄我鍾期吾亦無愧焉爾𤓰田記農皇古聖神以人道急于養生是故作耒耜敎之粒食又為之醫藥以濟其夭閼而本草之書出焉既而軒岐問荅靈樞素問與本草並行為醫家之大經大法也崑山邵濟民氏家傳是書深究厥㫖為醫巨擘迨元末年業隳於兵慕古之同姓種𤓰東陵于是即所居淞滸糞于𤓰田臺笠而鋤抱甕而灌綿綿唪唪之瓞如周雅所稱以之養親可以充一味之甘以之留客可以侑一茶之欵其蒂為苦口良藥可與參苓薑桂竝用以活人濟民嘉之因以𤓰田自號朝于斯夕于斯寓幽興于斯非矜乎東陵華胄也方今盛時過𤓰田而納履者無之或為古之人有白兎御史殆若戲言無足患者其樂為何如哉予嘗避地東呉濟民乆交乃不以我三百廿里為逺九十六歲為耄致書求文再四益勤予辭不獲遂以昔所見而知者筆之是為記習静軒記洪武丙寅冬前知武進縣太原舒公之孫文允書來曰某家居闢小軒讀書強名習静用唐人詩中語也丐先生為予識之書凡四至不容以耄辭乃謂之曰人生而静天賦之性感物而動情之欲也性至微故學者必有以養之然後不為物欲之所汨習静之意必有見於此歟夫以文允之英姿壯年學優而仕動而有為取青紫如拾芥今乃韜聲光歛踪跡負米養親之外足不入城府影不出户庭目不眩邪色耳不汚鄭聲膏粱綺繡不適乎口體罄室隘巷門可羅雀澹然而資于外者如此廓乎虚襟寂乎靈臺幽探乎經史之奥􅉼泳乎義理之懌出入乎諸子百家而無他岐之惑焉其怡然養乎中者又如此可謂得習静之方矣昔者濓溪翁主静之學程伯子以親炙而得之其平居終日坐如泥塑及其動與物接則一團和氣穆如春風視世之以槁木死灰為静者逈不侔矣愚意周程之學盖黙契夫大學定静之㫖相傳使文允以周程為法而學焉則習與性成二賢同歸豈特如摩詰之語而已哉予不佞故卒以是告之時洪武二十年四月之吉同郡龜巢老人撰龜巢稿巻六欽定四庫全書龜巢稿巻七元謝應芳撰啟訟伯父墳地上縣宰啟掩骼埋胔者古今之制其仁如天過家上冡者子孫之情伊誰無地顧邱壟之失所實風化之有傷瀝血寸丹陳情尺素切念某痛懷伯父曩歴兵戈死雖正狐首之邱時未集鴻飛之澤啟手啟足幸能四體之全歸若斧若堂詎信百年之難保蓋自陵谷變遷之后以致家門摧敗之餘失此故塋屬諸姻黨誰其主者展我甥兮此一錯在乎當時故陸沉至于今日渭陽之舅絶無見念于秦龜隂之田那復肯歸於魯然豈料人面獸心之軰乃謀為兎葵燕麥之塲雷厲風飛宰木􅉐空于斤斧日侵月削佳城亦壞於犁鉏殆將見暴骨之寒竟何異鞭屍之慘三尺之法不畏匹夫之勇莫當向來不平之鳴屢致逄彼之怒鬪狠不顧輕性命于鴻毛匍匐而歸飽尊拳於雞肋是可忍孰不可忍如之何末如之何徒増蒿里之悲每動窮途之哭既無面於江東父老復何顔於地下祖宗日月不照之盆弗堪長覆天水違行之訟可憚終凶賴典章有禁地之條其情理實滔天之罪仰惟公道俯察愚𠂻恭惟某官讀萬巻書為百里宰氷其清玉其白絃之直稱之平寛猛適中剛柔相濟數月有撫字征科之績四郊無呌囂隳突之憂休休焉其有容皜皜乎不可尚聲蜚臺閣恩迓絲綸如某者受廛為氓閉門歛跡亦久被卓魯之化焉敢興虞芮之爭但悲夫九泉之人欲掩以一坏之土願施善政垂戒惡人使知見舅如母之親勿為敗俗亂常之事復此牛眠之地仍為馬鬛之封想去家舊鶴重歸看銜土慈烏畢集凡春秋拜掃之日皆存亡感激之時上窮碧落下黄泉為雪幽㝠之恥生當隕首死結草弗忘判斷之恩痛切之私敷宣罔既上干尚書啟公名傳字受道號止亝延祐乙卯科進士不封萬户侯願識韓荆州常切慕謫仙之志手把一封書上有皇甫字輙敢扣昌黎之門問胡為今日之來曰專為古人之事與其進也適我願兮嘗謂傳道不絶者先民之功沒世不忘者後人之義若道鄉鄒忠公之葬近在城隂有了翁陳先生之銘流傳天下孰謂此一邱之土盡廢于八世之孫鄉隣忍于瓜分翁仲隨以蕪沒故諸生為之太息于當路鳴其不平頼二侯以公道主盟不半載而佳城復舊築思亭而薦蘋藻立華表以樹松楸茍非紀載之詳尚慮耕鉏之患立羊公一片石欲大書名世之言如季子十字碑以昭示尊賢之意雖不咎于既往庻有補于將來求之與之完矣美矣恭惟某官老成前軰文章鉅公三千字禮樂縱横在早嵗修名揭日九萬里扶揺直上至晚年直氣凌秋典文衡則妙于稱停秉史筆則嚴于褒貶烟霞一壑今歸老于長洲茂苑之間霖雨八荒將拜命于安車蒲輪之召斯言非佞輿望所期某曩客新安聞公舊政復紫陽之闕里大振儒風勒黄絹之好辭有光吾道諒弗忘于素志必重念于斯文惟大賢無不容則小子乃有造于以紀前言徃行于以發潛徳幽光眷言梓里之間永若桐鄉之愛鏘如韶鈞蔚如虎豹雄文照耀于九京明則禮樂幽則鬼神妙理昭彰于千古存亡有感敷叙莫殫贄見余用中先生求作辨惑編序啟狂簡斐成章辯諸家之邪説品題作佳士必當代之儒宗夫瓣香敬為南豐蓋學者仰如北斗予其進也適我願兮嘗謂璞玉雖竒非和氏則山中之石琴材固美無中郎則爨下之灰太𤣥經有覆醬之譏公羊傳有賣餅之辱古猶如此今豈不然欲立言圖不朽之傳必取正于有道之士嗟今陋俗舍正路而弗由集古遺言廻狂瀾于既倒可奈一齊而衆楚猶如皆醉而獨醒驚人之鳥一鳴怪雪之犬羣吠願君斵堊為我折𠂻或衮褒一字之榮則價倍千金之重馮豐霳寄寥廓久矣馳情抉雲漢分天章豈辭揮手綱維吾道黼黻斯文兹蓋伏遇某官文章鉅公典刑前軰詞塲較藝視五色之日不迷鄉國興賢使三代之風復振躬行古道歴踐華途每為政郡邑之間常蜚英臺閣之上歸從彭澤舊家環北固江山教若河汾大隱居南徐城市户外之屨常滿門前之轍何多雖云遂莵裘之營必復有蒲輪之召如某者俯慚後進仰慕先知尊其所聞行其所知愧未造髙明正大之域博我以文約我以禮誓弗忘仰鑽瞻忽之誠景慕有餘編摩罔既贄見李晋仲提舉求安啟思忠公傳道之賢為褒遺事辨邪説誣民之惑乃集前言持布鼓于雷門分天章于雲漢恭惟某官儒林麟角學海龍門鍾山草堂之英靈雪竹霜松之標致懶折腰于彭澤早賦歸來聊濯足于滄浪亦云自取皜皜乎不可尚已休休乎其有容焉然吾道賴以綱維而儒林視為儀表尚持藻鑑以主文衡名動京師栢府之薦章交上官居翰苑蒲輪之召命將臨先生自此升學者仰如斗某呉中晚進白下漫逰自憐如明月暗投誰復念陽春寡和汲汲有登龍之願拳拳慕倚馬之文方往依劉以圖御李欲因劉堯輔見公乃于劉處偶得識面低頭拜東野適因邂逅之間瓣香為南豐得展殷勤之敬敢持兩帙謹用三熏長年坐井底觀天此日詣門前立雪倘賜五行之覽必蒙一字之褒登山采玉入海求珠捆載乃酬其素志製芰為衣紉蘭為佩激昂正賴其清風贄見楊亷夫提舉求序思賢錄啟兩袖春風作洛下書生之咏滿舡明月過闗西夫子之門問胡為今日之來曰端為古人之事切有請也能無從乎伏念某生延陵季子之邦頗知禮讓復道鄉鄒公之墓當效馳驅樂民俗之還淳喜士風之近古思賢有錄味道無厭紀前言往行之二三發潜德幽光之萬一自藏燕石誰售雞林恐公羊遭賣餅之譏使太元有覆醬之辱願借春秋之筆稍為月旦之評得一序以冠塵編若千金而加敝帚庻傳不朽有補將來非惟先哲之有光眞乃後學之多幸兹蓋伏遇某官乾坤清氣風雲壯懷走馬看長安花早嵗似唐人得意割雞為武城宰居官如言子愛人以文章政事之俱優宜天下國家之大用尚淹筦庫未展經綸人皆知大器晚成我乃獲景星快覩題鸚鵡賦已多年傳麗則遺音到鳯凰池將不日遂平生髙志倚期𤓰代入覲楓宸如某者敢不長遡下風永懷髙誼聞所聞見所見眞如到神仙十二樓之間步亦步趨亦趨或可在弟子三千人之列其諸欣慕㒺旣敷宣贄見張用鼎教授啟黄魯直竭蘇東坡因述依松之志禰正平過孔北海乃蒙薦鶚之辭葢同氣以相求必當仁而不讓敢持尺牘特造丈函恭惟某官海内儒宗江西詩𣲖往嵗為馬尚書賔客當時有虞學士品題謂鵬程萬里横飛期鳯池十年可到道出羲皇才過屈宋何鄭公猶在於廣文上規姚姒下逮莊騷若韓子獨尋于墜緒先覺覺後己立立人四方之學者來歸一鼓而斯文作氣博求地利開元武湖以廣澤物之功善育人才置治事齋而兼水利之意聲蜚臺閣恩迓絲綸如某者生長呉中棲遲白下顧窮居而獨善恐沒世以無聞著辨惑編闢近世之異端邪説作思賢錄發前修之潜德幽光欲煩斵郢人之斤輙敢弄班門之斧平居抱膝仰泰山北斗之髙此日承顔覩鳯凰景星之快天其或者道之行與得華衮一字之褒増敝帚千金之價品題作佳士何慚奏白雪遺音吹嘘上青𠖇或可借春風餘力答陳天倪謝薦師啟見賢而舉者古先之訓惡敢言功易子而教者夙昔之心幸逢知己豈意予互鄉之進亦勞賦小山之招恩斯勤斯至矣盡矣恭惟容齋先生元元衆妙休休有容身雖領袖宗門學則淵源吾道小樓明月勝元龍百尺之豪髙枕白雲待丹鳯九重之詔有前人風烈為後學範模如某者與緇黄交能青白眼獨喜子墨名儒行非他人羊質虎皮通家踰三十年責善難一二計兹荷愛烏之及特厪遺鯉之書曲憐覔梨栗之兒直命入芝蘭之室從明復受春秋之業看希夷畫太極之圖熊魚何幸乎兼得犬馬當知其所報道院迎仙書堂隱相増爽氣于西山鄰家乞火曉窓分燈藹餘光于東壁銘心有感筆舌奚殫謝監察御史火公舉茂異啟天朝重耳目之官實居清要風憲擢山林之士非市私恩葢竹頭木屑有可用之時而茅㧞茹連乃必然之理敢因竒遇庸布謝言切念某家本呉中客兹江左以芰荷為衣秋蘭為佩訪鍾山之英草堂之靈作山川司馬壯逰負湖海元龍豪氣自憐骯髒誰問飄零瞻烏蒼柏之間歌鳯古臺之下幸逢􅔕馬蒙試雕蟲叩大小從容之鳴以盡其聲收輪囷離竒之材而斵為器使李白立階前地如毛遂脱囊中錐得之若驚觀者如堵兹葢伏遇某官身居臺閣腹藴詩書凛凛乎動揺山岳之威惓惓乎樂育菁莪之意植公門之桃李蓄相籠之葠苓昔中州草木知名今南國芝蘭俱化三省十道俱聞鐡面之威一日九遷將拜玉音之召風塵一掃霖雨八荒如某者敢不恒念品題益加修省行日用常行之道讀平生未讀之書雖蒲柳之質望秋先零而薑桂之性到老愈辣惴惴焉出門下誓弗忘一瓣之香耿耿者在胸中當自愛千金之帚其諸感佩罔既敷宣代羽士上亷訪僉事啟上士無爭奉先師之明訓監主自盜奈公論之難容故鳴鼔而攻之若同室而鬪者切念某為李老君弟子住焦眞人道塲小小山林設住持之主席區區金帛有交代之成規比因撙節年多致有羡餘日積被前職䑕偷狗竊使空山鶴怨猿驚當市攫金衆所共見匹夫懷璧罪實難逃已嘗赴愬于有司且復諌詞于教所始則强項不屈終乃揺尾乞憐遂以當仁不讓之心聽其用和為貴之説乃償薄産以補亡金未幾背㰱血之盟又復為紾臂之奪用朝三暮四之術專務貪婪逞人一已百之能肆為欺罔楚弓得失秦鏡咨度勞六轡之驅馳亷法亷辨亷善亷能按百官之能否明月靡遺罅隙清風一掃塵埃睠兹寂寞之濵亦在照臨之下豺狼歛跡草木知名激濁揚清既憲綱之振肅舉直錯枉宜公道之昭彰或移北山之文或賜南山之判戒無厭溪壑之欲征悖入府庫之財庻有補于焚修更無煩于訟牒思之弗措辨之弗措願亟持全璧之歸得之若驚失之若驚當永守青氊之物謝崑梅州判舉鄉善啟求儒雅闡大猷漢室之興復見經品題作佳士荆州之識為榮矧蒙下采于菲葑豈作不言之桃李寸丹有感尺素具陳某官佐理神州賢勞王事虛心待物明于滄海之珠美德含輝粹若崑崗之玉有賢守與承流宣化在寮寀則同寅協恭切切斯民惓惓吾道氷霜並潔風月平分南山之判不移北闕之心長戀二千石不如逢掖下士尤勤九萬里直上扶揺前程甚遠吾言非佞輿望所期某久客東呉遠逃兵燹功名蹭蹬昔為上竹之鮎身世飄零今作無枝之鵲偶爾宿贊公土室儼然逮梅仙市門希髙山流水以知音驚明月夜光之投暗説項不輟薦禰有書駕言采泮水之芹何異繼廪人之粟驥千里未甘伏􅇫鳥一嗚或可驚人翺翔道義之林涵咏詩書之澤鄉之善士國之善士尚期自下以升髙知惟春秋罪惟春秋勿謂有名而無實賀陶教授啟鄭廣文才過屈宋坐一氊而司業相憐胡安定教授蘇湖置二齋而太學為法升髙自下振古如兹恭惟某官前軰典刑後學模楷于以傳道授業而解惑信乎温故知新而可為五柳莊前自昔存舊家之菊片玉山下只今樂泮水之芹振木鐸之遺音續杏壇之雅曲先覺覺後聿成陶鑄之功己立立人正賴提撕之力自此升矣式我願兮如某者白首流離青雲蹭蹬遇州倅舉一鄉之善以野夫寘多士之間愧風鷁之退飛喜星鳯之快覩先生富道德致呉興弟子之多才雜説為爬梳正學校諸生之狂簡代上馬都事啟驥伏􅇫負千里之志久倦驅馳鳥在阜作三年之鳴猶能奮躍未趨幕府敢借箸籌某官胸襟貯萬巻書文章揮五色筆頻年花縣絃歌之化大行今日薇垣贊畫之才方展王公大人以青眼相顧縉紳先生以白眉見稱兹泛緑以依紅將腰金而曳紫一節旣全其清白深憂當念乎羣黎願為龍伯髙勿效杜季良恪守祖傳之家法近舍皇甫湜遠取白居易當求世用之人才跂予望之自此升矣某遠逃兵燹久客句呉秋菊寒泉祠甫里見尊賢之義長洲茂苑頌鄉校勒輿人之言己曽和白雪之詞但未覩景星之快由村落每來城府知軍民多困飢寒敢用條陳以效芹獻于以開難發之口于以推不忍之心區區非釣于虚名懇懇必求其實效蒼生顚厓受辛苦隔羣仙天上清髙大芘廣厦俱歡顔願比屋眼前突兀代謝沈太守啟一輪明月清輝今照蘇州萬里長風素志乃如宗慤念先人之遺澤挈孤子于長途知幸自天感恩無地恭惟某官乾坤清氣風雲壯懷既不忘向日之誠且深識隨時之義往年烏府冠峩鹿角之威此日黄堂庭蔑䑕牙之訟退食則斑衣以娯父母傳家則黄巻以授兒孫鞭不施蒲莊先種柳愷悌咸稱召杜勲名必到蕭曹三江五湖之風謡政聲藹藹四海八荒之霖雨輿望懸懸遺愛甘棠流芳汗竹如某者仰依公庇勉讀父書既己承薦鶚之章當不負愛烏之及偹葠苓于藥籠作桃李于公門庻竭駑材以圖豹變父為大夫子為士賴提携發軔之初車如流水馬如龍願追逐後塵之末其為報効罔既敷宣上沈太守啟太叔為鄭大夫始從寛而終猛不疑謁暴公子先言威而後恩惟大海不擇細流庻他山可以攻玉請以田夫野老之語陳於大人君子之前切以某近寓吳江昨經荒浦聞近日有䑕竊狗偷之軰在各都如蜂屯蟻聚之多始則穿窬終為强禦忽忽乎神出鬼沒累累然晝伏夜行星月光中窺商賈他鄉之客烟波深處伺妻孥逃難之人或如斫嚴顔之頭或若斷孤兒之臂横屍洲渚流血泥沙遺臭熏天銜哀入地掩鼻而過者多矣垂泣而道者誰與鄉隣懼而不言州縣置之不問致令滋蔓轉肆兇頑目之所覩者如此其多耳之未聞者尤為不少新鬼煩寃舊鬼哭痛恨難忘他生未卜此生休𠂻情誰訴惟當路發神明之政為斯民雪冥漠之寃三尺法申明舊章五色棒掃除羣醜寛猛相濟不勞用萑澤之兵恩威並行何待持繡衣之斧一雷既震百蟄皆驚恭惟某官俊傑識時精忠貫日清氷出萬壑此往年烏府威聲明月照蘇州乃今日虎丘嘉話甘棠樹聽召南之訟老萊衣照堂上之親愛民若拙于征科下士能勤于吐握五花馬金章紫綬方被殊恩六柳莊綠水青山未容髙興政湏治最以候登庸如某者幸獲承顔甚慚饒舌聞而來見而去仰山斗之彌髙道以政齊以刑看民風之丕變上梅知州陸同知啟稂莠不除必有傷于嘉穀盜賊不息寧無害于良民目前事可為寒心林下人敢云饒舌俯慚卑陋上瀆髙明切以某為客松陵􅋈舟荒浦聞近日有鼠竊狗偷之輩在各鄉如蜂屯蟻聚之多或穿墉以踰垣或發匱以胠篋或牽去春耕之犢或移人夜泊之舟或刼行商囊槖為之席捲或因逃難妻孥與之偕亡或如斫嚴顔之頭或若斷孤兒之臂慘星月見遭毒手渺烟波逸去兇身濺血菰蒲伏屍洲渚漂流于五都十都之境臭腐于六月七月之時里正不敢言恐煩檢覆鄉隣寂無語懼有干連致使跳梁轉加延蔓天隂雨濕但聞寃鬼之聲水遠山長渾是愁人之境惡貫既滿禁網難逃今有司獲盜竊之徒宜因事䆒㓙强之黨幸毋姑息亟賜施行轟雷霆于掩耳之先照日月于覆盆之下追三窟兎須旁求曲徑之踪殺兩頭蛇方能免後人之患餘罪戾之輕者加徒役而遠焉庻令涇渭殊流不使薫蕕同器蓋治此非常之盜必加以非常之刑雪痛怨于黄泉聽歌謡于綠野恭惟某官某官同心同德無黨無偏各守一亷氷其清而玉其白咸稱二美絃之直而鏡之明閭閻蒙撫字之恩案牘絶煩苛之弊訟庭如水印匣生塵明月清風蹔爾居淞江太湖之上髙牙大纛翩然到鸞臺鳯閣之間人皆仰之自此升矣如某者言雖僣越事實昭彰秪縁以兎死狐悲未免較鶴長鳬短溺猶己溺望明公擴仁愛之心刑期無刑變惡黨為淳良之俗幽明有感贊美奚殫代上江浙丞相求䕃叙啟上書伏光範門韓愈以布衣自進斗酒酌新豐市馬周于逆旅誰知仰止三台素非一日惟吐哺握髪以下士敢披肝瀝膽以陳情切念某生毘陵錫谷之墟客呉郡長洲之滸早年勤苦頗讀父書連嵗孤哀且罹兵燹竄妻孥于荆棘揮涕泗于蓼莪學弓為箕學冶為裘尚賴傳家之業在無父何怙無母何恃孰憐逰子之歸遲望西日於長安歎南風之不競欝欝居此遑遑何之芰為衣蓉為裳忍飢忘溝壑之憂闕苐慚没世而無聞有負先人之遺澤欲求䕃叙願借恩光雖云匪麟角鳯觜之竒亦庻幾竹頭木屑之用持衡留藻鑑天書適降于九重隨水上龍門桃浪可乗于三級鯤鯨變化鵷鷺翺翔兹蓋伏遇某官簡在帝心股肱王室保江浙數州之地障東南半壁之天以和靜鎮國家量同文靖有忠勲塞天地爵比汾陽公門之桃李欣榮藥籠之參苓並蓄五風十雨頻年見隂陽調爕之功寸地尺天指日復疆里廣輪之舊恩加衮舄銘在鼎彛如某者幸獲瞻依宜蒙㧞擢大木為杗細木為桷良工得國用之宜南山有臺北山有萊君子致太平之樂永言報効盡力驅馳賀上海石縣尹啟郎官應列宿方照臨滄海之秋鴻毛遇順風乃奮起青雲之日敬陳賀語兼進忠言嘗觀時有盛衰道無今古為國者必以人民為本有司者必以父母為心擾攘雖値于難時撫治合由于古道簡編所載榘矱具存曰既庻既富而教之曰足食足兵而信矣曰孝弟可以盡堯舜之道曰忠信可以撻秦楚之兵惟教道能結其心斯奮發以盡其力小而一邑大而九州是道為農桑學校之原其事乃錢穀甲兵之屬茍一日而必葺庻三年而有成倘不鄙常談老生斯可謂知言君子某官心存愷悌氣禀髙明先世稱萬石君其道義傳家之久今官為百里宰蓋功名發軔之初以胸中所藴之詩書為目下可行之政事征科不廢撫字尤勤仁風藹田野如春民無愁歎明月照閭閻似水吏絶喧囂釜魚之聲譽己聞堂鱣之禎祥必應行書上考竚見髙遷某幸辱故知喜聞新政彼客燕皆能賀履豈窮猿獨不投林東入海西去秦擬欲依棲于贊老昔無襦今有袴願同歌詠于呉儂諸士友陳言陸同知誣枉事啟排難解紛竊慕古人之髙義舉直錯枉宜蒙當道之至公芻蕘有言菲葑可采切見呉江州同知陸某職居佐貳政出循良三載守官一亷如水自許以赤心報國人皆知洗手奉公不聽誅求因結仇于軍帥不隨偏黨或見忌于官僚豈意權豪乃加排䧟以兵戍千有司之政以文移行無妄之灾舁一夫病死身屍勒其子巧生詞訟集衆擁停屍之地環若重圍當官逼仵作之人傷皆誣騐强梁若此毒害顯然越官職以横行違憲章而不顧各州縣聞之而䘮胆諸士民覩此以寒心赫然恣逞其㓙威甚矣有傷于治體是可忍也尚何言哉仰惟上相之賢明俯察本官之寃枉照覆盆之日月即見昭彰遏平地之風波毋令䧟溺如某等與本官初無私愛且隔隣封聞一州有頼其主張知百姓多蒙其恩惠昔頌德于三江五湖之上今稱寃于萬口一辭之間其言至公而無私所願抑强而扶弱直為壯曲為老當明曲直之情危而持顚而扶庻免顚危之辱宜加采擇特賜施行上量田徐孟二公啟立國以經界為先當盡革其中之弊生民以耕稼為本方能供在上之需惟任用之得人乃公勤而稱職欲陳梗槩敢效芹誠嘗謂朝廷革命之初才俊為時而出凡所以體國經野皆可以忠君愛民况皇家付尺度之公要農畝定租庸之法甲是乙非者固當分辨鶴長鳬短者尤宜折𠂻為前代除毒歛之蛇免後人為涸轍之鮒此當務之為急其任非輕但至公而無私所行必達某官同心同德無黨無偏志如百鍊之鋼不為繞指事若重調之瑟能用改絃雖寸田尺宅皆入版圖而賸水殘山猶蒙紀錄田野既揚其聲譽銓衡必錄其勤勞同升諸公一臺二妙某生本常郡寓此呉鄉如去邠而居岐敢因徐而見孟願求荒圃學為老農春雨一犁駕烏犍而東作青雲萬里看黄鵠之䨇飛上王知府啟玉門闗兩髩秋風歸來晚景金斗城一輪明月喜把清輝人皆作來暮之歌我欲快爭先之覩騎竹失隨于童子杖藜敢謁于大人既獲披雲亦言獻曝嘗謂農桑者民生衣食之本學校者國家風化之原其在有司亶為急務睠此常郡即古延陵二十年兵革以來數百里人烟欲絶犁鉏不作絃誦無聞大田皆變為荆榛泮宮亦燬為瓦礫今天下全歸于大統而郡中方集其遺氓如谷寒而鄒律重嘘若絃斷而麟膠再續農何以勸惟恤民則民乃力農學何以興惟重士則士皆志學嚴一鼓以作氣必三年而有成田野辟而賦税増教化行而習俗美上以副聖天子明詔之意下以著賢邦侯善治之功斯文黼黻于皇猷舉世甄陶于清化渤海郡勸農龔遂復見于今成都府興學文翁㒺專于昔茍二端之並舉則百廢之俱興幸無謂老生常談眞可與古人同傳某官三槐世胄五馬恩榮金莖露之澄清玉壺氷之潔白有民人有社稷雅稱宏才為保障為繭絲㑹能兼美飽夙學於胸次急先務于目前報主赤心待士青眼吐握行周公之禮謙德彌光循良希漢吏之賢芳名不朽如某者幸然歸魯得此依劉三十年辛勤有廬勉欲訓城南之子千萬間突兀廣厦願蒙庇天下之寒頌禱有餘敷宣㒺既謝孫大雅惠詩文啟寄杜甫題草堂舉世誦高公之句送李愿歸盤谷至今傳韓子之文葢詞章誠有可嘉則名譽皆為不朽感承傑作敬叙謝言某生長延陵本同鄉土僑居呉郡俱避風塵既聲跡之相聞且音問之不絶千萬人之前常曽説項十五年之内惟欠識荆嘗結巢為蓮葉之龜來詩甚美至還家若華表之鶴得序尤榮顧余生非李杜之儔眎所作乃髙韓之比陽春寡和明月暗投巾箱謹于珍藏棐几時乎圭復想風采于氛埃之外見肺肝於文字之間投桃報瓊兹抒情于尺素如葭倚玉别請教於丈函某官以申浦之澄清鍾于姿禀以君山之蒼古發于文章驅馳莊騷出入佛老鳴教鐸中呉者久投朝簮東海之濵枕流潄石而有祖風弄月吟風而忘世慮山中厯日閲黄楊厄閏之年天上春風待紅杏倚雲之日如某者素慚孤陋雅愛交逰味六經如嗜膏粱親三益便成膠漆江東暮雲之酒願與論文山隂雪夜之舟尚期乘興雷門持鼔郢匠揮斤謝張雲門作詩序啟名紳字士行齊郡人魯直獻東坡二詩葢欲見瞻依之志士安敘左冲三賦方能無非議之辭葢當世之鴻儒乃後學之龜鑑寸丹方感尺素具陳伏念某田野草茅山林樗櫟不揣鉛刀之鈍常持鐵硯之堅鮎上竹竿往嵗之功名可笑龜巢蓮葉近年之身世如浮八九家寂寞江村三千文蕭騷白髪出言爛熟作事迂踈寤疑辨惑以成編懷古思賢而有錄頹然詩癖忘乃途窮時抱膝為梁甫吟或掩鼻作洛生詠對明月清風而思元度藴髙山流水以待鍾期持鼓雷門探珠驪頷得警策片言而為幸豈㫪容大篇之敢望珠璧暗投璚瑶匪報不識面而知肺腑可謂神交如冩容而見精神珍藏手蹟披雲未遂仰斗彌髙恭惟某官四海儒宗一門科第為時而出不勝烏鳥之情謝病而歸非為鱸魚之美以東呉之山水為西漢之文章託古意于焦桐播遺芳于叢桂風月襟懷江湖性氣本磊落之竒才烟霞痼疾泉石膏肓享優㳺之清福道則髙矣人皆仰之如某者敢不佩服斯文勉旃爾力敝甚千金之帚榮哉一字之褒廢繩墨不為拙工灼見用春秋之筆經品題便作佳士惟恐孤月旦之評瞻望依依臨書草草擬與金壇縣告索尹氏寄書啟賣金買書自是平生之志刻舟求劍難忘眷戀之情雖呉霜己白其頭顱惟秦鏡能明其肝胆敬持尺素用寫寸丹切念某避地曩年泛湖連日移舟至尹干橋下依乃姻家藏書如孔氏壁中扄諸奥室物宜多矣人皆見之十三年賤跡飄蓬數百巻常懷汗竹豈知𤓰葛乃變薫蕕以諸史之青編易兩牽之黄犢餘存簡牘悉入巾箱屢云還合浦之珠竟不返連城之璧朝經暮史欲重對于聖賢甲是乙非合辨明于官府是可忍孰不可忍求之與抑與之與惟當道之至公庻斯文之不墜聽其言也適我願兮某官承恩九重出宰百里廼氷其清廼玉其白如絃之直如鏡之明以識時俊傑之才了積年繁劇之事戴星出入雙鳬暫止于金沙摶風扶揺孤鳯必巢于阿閣某遠來隣邑如倚太山鶴溪水天影涵秋比琴堂之清澈米家船虹光映日載書簏以還歸擬謝常州府官啟曽參以同姓殺人其母嘗投杼而走黔易非在家遘疾厥子乃驚心而歸奈何事出于隣封馴致弊生于本邑幸大府能為辨析今㣲言合用敷陳切念某乙老窮居若守株于横峴丁男逺出因負米于荆溪叠叠乎縣帖拘追纍纍乎里人被執爰自三月三修禊之日皂𨽻登門遂令八十八老耄之年倉皇赴縣換名字如雲翻雨覆動文移則雷厲風飛䧟穽欲成網羅交設南阮貧北阮富姓雖同而産業不同東家智西家愚人有異而鄉閭亦異故奔訴甘棠之下蒙戒懲刻木之徒號咷徹乎二天枉屈為之一雪伏遇某官等同宣聖化並著仁聲召父杜母之慈祥春濡雨露礬弟梅兄之清白月映氷霜閭閻響擊壤之歌城郭寢抱關之柝行書上考佇徯髙遷如某者父子知恩鄉隣感德覆蕉藏鹿本無夣于前時縁木求魚免受灾于後日報當銜結力効驅馳上周縣尹請祭顧將軍啟孔北海表鄭公鄉人皆起敬文潞公題明道墓學者知歸葢追敬于儒先實有裨于風化敢持尺牘用徹琴堂某老不趨時心猶好古覽中呉之勝槩訪前代之名賢笠澤西頭皇天蕩烟波相接葑門東畔顧將軍邱壠猶存叢祠倚馬鬛之封荒蘚没龜趺之石每經此地常念斯人生為呉相之孫死有元公之諡華亭二陸初齊名得三俊之稱白羽一麾獨仗義平六州之亂晋史備書其勲業呉儂尚保其祠塋但每嵗之烝嘗欠有司之籩豆不揣效豐干饒舌敢云煩陶令折腰蘋蘩矢薦于鬼神桑梓愈加其恭敬此非違道以干譽幸不以人而廢言恭惟某官以董賈之才為卓魯之政乃氷其清乃玉其白如絃之直如鏡之明見義勇為當仁不讓有民人有社稷國家委任之隆教禮樂教詩書流化承宣之急行書上考竚見髙遷某飄泊長洲蕭條短褐投老二天之下知名兩月之間其言至公而無私其事似緩而實急生芻一束其人如玉望喬仙雙舄之鳬寒鴉數㸃流水孤村弔華表千年之鶴干陳敬初先生作懷古錄序啟懷賢千古聊綴緝夫前言借重一辭庻流傳於後世切有請也能無從乎睠我楚狂久客呉下過鳯凰山顧彦先之墓有感而傷情傾鸚鵡杯李太白之詩長歌而擊節甚矣疾薫蕕同器忍乎隨桃李不言豆籩既請于有司丹青乃新其遺廟屏除妖塜祭掃佳城搢紳皆為之詠歌樵牧則嚴于禁約載嘘藜燄用寫蒲編于以發幽潜之光于以紀廢興之事過雷門持布鼓敢曵長裾抉雲漢分天章煩揮健筆某居玉堂之署人慕登瀛紬石室之書自當名世為士林冠冕演王國絲綸目短曹劉汗流籍湜大鵬九萬里方當直上之秋黄河三千年㑹見重清之日前程逺大吾道光榮某不揣迂疎尚希題品書八篇因窮而著初不效于古人賦三都得叙而傳尚有望于今日代上饒叅政啟叔向知鬷蔑因聞堂下之言毛遂從平原乃脱囊中之頴既古人有如此者豈今日獨不然乎切念某幼讀父書從逰都邑聞所聞見所見囿先生長者之鈞陶歩亦歩趨亦趨習王公大人之規矩辭親日下捧檄浙東干戈擾攘者閲五六年鞍馬驅馳者知幾千里及區區益升斗之禄又紛紛服州縣之勞栖枳棘于慈溪望蓬萊于滄海既失怙恃遂用來歸兄弟飄零狀若䘮家之狗功名蹭蹬誰憐失水之魚然此膝不屈于常人而其志敢忘于斯世家徒四壁壯氣横秋但知讀書以聖賢為師未嘗出門與俗流為伍髙山流水頼有知音明月夜光忍令投暗鷙鶚之書既作鯤鵬之化何疑惟大匠無可弃之才宜小草有相依之志葠苓藥籠桃李公門恭惟某官俊傑識時耿介㧞俗隴雲可悦己嘗似山中宰相之閒仁風載揚今復慰天下蒼生之望胷次炯玉壺氷露文章埀金薤琳琅借箸而籌入則告嘉謀于公府累茵而坐出則叅大政于薇垣己立立人先覺覺後行吾道于干戈之際救斯民于塗炭之中幾千仭廬山者衆人所仰五百年名世者非公而誰如某者慕藺許年依劉今日襪線之才雖短菲葑之采不遺朝取一人暮取一人莫非荷提撕之力待以國士報以國士當不忘感激之情輕凟崇嚴重加悚息上張太尉啟蘇轍上韓太尉書所願覩賢人光耀馬周寓常中郎館即能以時務條陳不揣下愚敢希前軰敬以惜軍愛民之事陳於王公大人之前聞斯行之時則美矣嘗謂有民有社須當畫策以治安足食足兵乃可運籌而征討凖今酌古發政施仁茍欲展心上之經綸尤先察目前之利病勿求近效宜作遠圖開荒田則為富國之原設屯田則為守邉之計除民瘼則免誅求之苦積軍儲則無匱乏之憂廣鹽𣙜之法則遠近流通恤軍士之家則存亡感激凡兹六事盡在一時日月雖明固難照覆盆之地風雨不動願蒙庇廣厦之天布以新條革除舊弊惟其愛民如子必不以人廢言詢我芻蕘教人稼穡易其田薄其税民力方紓居有倉行有糧兵威自振幸無吝一舉手一舉足之力更勿辭三握髪三吐哺之勤庻士夫得進其忠言而軍民免令其失所恭惟太尉相君英雄蓋世度量容舟以崧髙維岳之英靈為海納百川之襟度興利除害更張漢瑟之絃革故鼎新重作禹書之貢西鄙之烟塵去遠東呉之風俗還淳見諸生如見大賔保斯民若保赤子天上天下咸知向日之忱江北江南共仰福星之照名埀竹帛勲在鼎彛某十載風塵一篷烟雨避地居淞江之滸憂天如杞國之人功名雖負于素心窮困尚憐于黔首慮或有于一得口何忍于三緘知我春秋罪我春秋欲救顚崖之辛苦待以國士報以國士終當範我之馳驅俯竭葵傾仰希藻鑑賀蔡教授到任啟建學立師本三代之良法化民成俗即二南之遺風夫以世衰而道㣲其必人存而政舉喜聆木鐸敢進芻蕘睠此崑山舞丹崖之鳯石沛然婁水接滄海之鯨波以山川如是之竒人物由來之盛紛紛顯宦比比髙門豪如劉龍洲乃寓焉賢若李樂菴而居此適値近年之兵革遂忘舊日之衣冠城郭是而人民非禮義廢而政教失幸鄉校之不毁今學宮之茍完有司奔走於豆籩多士趨蹌於禮樂但龍蛇之混雜有鳬鶴之短長中也養不中才也養不才政賴有甄陶之力仁者謂之仁知者謂之知豈容無區别之心惟自今秦鏡之明更不致齊竽之濫大杗小桷匠氏固無棄材貴玉賤珉識者自能定價嚴一鼓以作氣必三年而有成恭惟某官心醉六經眼空四海杏花壇上重來鼓焦尾之琴荷蕢門前試聽擊有心之磬胷次炯玉壺氷露文章埀金薤琳琅曩嘗居淮海維揚人共仰泰山北斗能不失前賢規矩眞可為後學範模苜蓿闌干且莫厭一官之冷菁莪長育當挽囬吾道之春立登要津入居翰苑如某者蹉跎仕路流落他鄉不能看長安之花乃亦采泮池之藻聞所聞見所見星鳯先覩而快哉歩亦歩趨亦趨蘭鮑久居而化矣為王叔才通呉伯善啟魯連為解紛而出斯為天下之竒陳平能宰社而均終作朝中之相茍有為于今日亦何異於古人今一見之竊有請也恭惟某官湖山清氣丘壑閒情雖爵祿不入其心惟孝友是亦為政車乘下澤稱鄉里之善人樓卧上床本湖海之豪氣律呂鳴朝陽之鳯階庭舞荀氏之龍惟其博古通今所以出類㧞萃有文舉座上之客而開尊嘗滿聞鬷明堂下之言而執手相知近者悦遠者來親踈無間剛不吐柔不茹好惡惟公藏器待時在邦必達某許年慕藺此日識荆深知有長者之風輙敢訴不平之事曩予有子勉作鹽商同客嘉禾王吉父與成交易親書片楮孔方兄俱付檢收不料墮其計中從此置諸度外屢約屢爽轉富轉貪但知堆滿籯之金不肯返連城之璧况視予之流落尤縱意而欺凌獸心忍負于朋儔狡窟乃居于仁里望公秦鏡照我覆盆能扶顚以持危必舉直而錯枉風行草偃水到渠成是猶能解戰國之紛亦何異宰鄉人之社道之禮樂示之好惡豚魚必感而相孚失之東隅收之桑榆犬馬當知其有報心有所憤書不盡言為王叔才等訴神文亘古亘今人世有難明之事誰曲誰直鬼神能灼見其情雖聰明正直之無私必禍福吉㓙之有報請陳始末用徹幽明切念某至正十有五年作檇李異鄉之客統鈔三百餘錠買呉江同姓之鹽託在契交信從期約立文慿之一紙比重託之千金豈其反面無情從此掉頭不顧彼己跨腰錢之鶴我乃求縁木之魚日往月來馴致遷延之久雲翻雨覆不勝變詐之多故連年空打白厓至今日竟為烏有交情既絶禮貌全無本來似鮑叔相知每去如魯侯不遇彼因致富積鹺物之如山我則固窮避兵戈而失路不念流離之苦轉加欺㒺之心日月不照于覆盆風雨自安于廣厦昔伊過我待為席上之珍今我尋伊視若眼中之刺是可忍孰不可忍如之何末如之何既告于隣里鄉黨之間當質諸上下神祇之之有吾言若謬甘受天誅彼語若誣當遭隂譴願洋洋之如在降濯濯之厥靈有感必通如響斯應舉直錯枉必須天理昭彰福善禍滛庻使人心畏服上周郎中陳言五事啟李白識韓荆州雖萬户之封非其所願鬷明見鄭叔向惟一言之善得以相人今區區慕足下之賢敢切切論日前之事上以裨朝家之清化下以􅇺郡國之蒼生遠視欲明邇言可察兹蓋伏遇某官乾坤清氣風雲壯懷向坐黄堂著蒲鞭之善政今遷畵省冠蓮幕之諸賔有撥亂反正之才盡扶顚持危之力心不忘於向日義不失于隨時英聲蜚九重之天遺愛溢三呉之地和氣挽囬于寒谷恩光照及于覆盆見多士如見大賔保斯民若保赤子能興利以除害不吐剛而茹柔史編當紀其循良鈞軸政須其贊畫門墻羅列好多培桃李之春鼎鼐調和有大用鹽梅之日更勤吐握以廣咨詢如某者甫里索居太山髙仰折桂之功名蹭蹬衡門之心跡栖遲雖讀書以聖賢為師但出門則農圃為伍東隣西舍痛遭毒歛之蛇南枝北風多作無依之鵲歎息愁怨之聲常聞于田里呌囂隳突之吏每見于鄉隣况軍儲不積則時有借糴之憂而官俸太輕則必有侵漁之患此皆繫百姓之休戚疇能出一語以發揚惟大人肯念乎羣黎故小子敢輸其忠赤非甚髙難行之事非荒唐繆悠之談是曰是非曰非尚從公論聞所聞見所見奚敢餙詞宜改絃而更張毋刓印而弗予他有剥床而請者别當借箸以籌之溺猶己溺饑猶己饑斯謂愛民之術仁見謂仁知見謂知初無私己之謀饒舌云云優容幸幸謹奉啟并以所言五事開具詣省幕以聞伏惟台慈鑒念一開荒田夫民之有田猶魚之有水也魚無水則枯而死民無田則饑而斃原民之情豈不欲治田以養其生哉今長洲縣崑山州等處水深圍田積荒嵗久無錫常熟等處殘破地面荆棘連天其各處流移之民餬口四方而無卓錐之地是皆欲業耕稼以養生者也但所慮者犁鉏纔舉即有征科廬舍未完便當差役是以寧受艱辛且逃租賦寧甘窮餓不還鄉土每嵗雖蒙官司招諭復業及委官勸農不為不至而民之所慮如此遂成虚文况各處低田圍岸久壞非一時可能修築積水甚深非一時可以車戽必須隔年料理以俟春耕田家作苦舉筆難盡如蒙呈達省府行下各州縣踏勘荒田數目叅酌至元年間叅政開荒舊例聽令諸人請佃每年不過若干初年官不徴糧私無租課應干雜役俱得優免次年公私半徴三年成熟然後全征如此則人皆為養生之謀而不憚工力之費一二年間官糧數増國家享無窮之利矣開此荒田官民兩便一除民瘼為政以恤民為先若夫民瘼未除而謂能卹之者謬矣然今之民瘼未易枚舉姑以前月切近者言之如崑山州等處上年旱澇相兼髙田則禾苗枯槁低田則積水瀰漫各都里正及佃户細民經官告狀俱有堪信顯跡不期驗灾官吏不行詣田踏視從實免征止坐各州縣衙門及諸寺觀逼令鄉胥里正一槩伏熟繼後部粮官吏驗數征納其細民棄業逃亡十去八九但將各處里正絣扒吊打責限陪比破蕩家産終不能足幸蒙上司體察里正人等發下所屬州縣乃得疎放立案擬于秋糧内帶征若今嵗秋粮之時果于里正名下追征其里正百孔千瘡奚暇再剜其肉以補于兹必着落原佃之人一同部内上下交征决致失所况連年兵革擾攘差科繁重里正人等俱各消乏誠不能以一嵗之所收辦兩年之租賦縱使捶楚之下求而得之甚非國家愛民之意亦非諸大臣恤民之政也如蒙言諸省府移文郡邑從實免征庻使里正之家免于破蕩力田之衆不致逋逃非惟今嵗秋糧易于辦集而亦免下年荒廢其田矣除此民瘼斯民幸甚一抑豪强貧富不等借貸有之舊制民間私債月息三分年月雖多不過一本一利誠良法也近年以來其官豪富强之家乘人之急取利過倍少有逋欠凌虐百端或于借貸之時勒令併利作本虚立文約明起三分利息實收過倍之數或有還欠利息倒換文憑利上生利或寛收窄放更易斗斛或左右邀求减剋分例其舉逋還債之人阨于窮窘吞聲忍氣噤不敢語良可閔惻上年幸而官府知之出榜禁約但久弊不能頓除如蒙申明舊制定立罪名嚴加禁治庻使權豪嗜利之徒畏懼憲刑毋蹈前非抑强扶弱公道幸甚一積軍儲為國之要足食足兵然兵固不可無食而用也但頻年水澇嵗無全收如無錫常熟等處殘破之餘田地抛荒租糧减數今國家軍儲之用常恐不敷况凡有賞勞俱用米粟動以數百千石為無益之費至于青黄不接軍人有缺食之憂百姓有借粮之患竊嘗觀之有司催辦米如珠璣濫賞贏餘粟如塵土此理曉然人所共見今後宜從省府移文禀知太尉遇有功賞從公斟酌或以多爵之榮或犒以金銀等物撙節米糧以備饑荒如此則倉廪之積日増月羡漕運可供軍儲可給而民無和糴預借之患矣多積軍儲公私便益一増俸祿張官置吏本以治民黜陟幽明欲其稱職然必須俸祿足以飬亷然後考其成否而黜陟之斯可使之無憾矣今府州縣之職最為繁雞大小官吏之俸類皆鮮少仰事俯育寧免素心洗手奉公誠不易得其間以貪汚黜罷者固不足恤而清貧亷介祿不償勞者上之人宜軫念之如蒙建言本省告之太尉以官吏俸給之數酌古準今量加増益如此則居官者可以絶貪墨之心百姓無侵漁之患矣傳曰忠信重祿所以勸士俸祿之増公道幸甚賀偰知州到任啟騎竹羣童爭先遠迓扶藜一老敢進常談或可比乎芻蕘庶無棄于菅蒯嘗謂州縣作民父母詩書為世範模必須酌古準今乃能承流宣化蟠根錯節毋令挫利器之鋒流水髙山正欲奏朱絃之曲夫御吏治民之要惟正己格物為先吏或奸欺民多疾苦但鄉無呌囂隳突之吏則田無歎息愁恨之民照日月于覆盆轟雷霆于蟄户寛猛相濟㤙威並行省刑馴致于無刑聽訟當期于無訟魯中牟之淑化官至司徒黄頴川之循良入為丞相茍有為于今日亦何異于古人恭惟某官屢世簮纓一門科第金薤琳瑯之文采玉壺氷露之襟懷花縣相傳藹仁聲于荒服蒲鞭不用布德澤于疲甿下車纔一月之間比屋皆二天之惠皜皜乎不可尚恢恢乎其有餘鷦鷯之巢一枝本非素志鳯凰之翔千仭方進修程跂余望之自此升矣某素嘗仰斗近獲披雲過蒙禮貌謙謙喜聽政聲藉藉芘寒有賴獻曝何慚三千年黄河一清坐待太平之日九萬里摶風直上佇看大用之秋有猷有為善頌善禱龜巢稿巻七欽定四庫全書龜巢稿巻八元謝應芳撰啟劄子状箋表蕭答張納幣啟松堅晚節梅占春魁恭惟某官起居有常動靜多福某幸扳華閥獲締莩盟敬慿一紙之書用效七襄之報祗詞燕申且嚴鱗甲更兾順和平之序而加調甘㫖之羞予日望之自此升矣出使展埋輪之志閥閲殊髙封侯由給餉之功源流己遠幸二姓之合好占八世之莫京令姪精習讀書拾芥之功名必取孫女粗勤織絍采蘋之法度能循荷葑菲之不遺俾蒹葭之有倚兹承奠雁喜近乘龍苐慚奩具之蕭條莫稱洞房之張設幣帛筐篚其厚意拜而受之男女室家之大倫永為好也答請期啟合歡尋月老之盟將偕鴛偶涓吉訂星翁之厯乃遣魚書既承黄絹之好辭敢謂綠窓之難嫁曰迎鸞於桃李春風之日尚喜從容欲奠雁于松栢嵗寒之時何勞鄭重蓋篤婚姻之好合崇道義之交迨其吉迨其今敬聞命矣宜其家宜其室適我願兮賀闞信卿生日壽八十嵗三月初一日生生申令辰二月後初交三月比彭髙壽十分中纔是一分子孫克肖而俱賢嵗月方來而未艾敬將薄禮仰祝修齡非熊非羆夢必形於西伯如岡如阜壽將比於南山申賀率然丙融幸甚張回鄒定姻三幅啟緑野春明畵堂日永某官百靈交相多福駢臻某遥望隣封近通姻譜仰辱問名之禮敬酬交好之書心馳宴居首陳魚素敢兾對乳燕青春之景而加調紫駝翠釜之珍愛助一杯勤惓三祝昔南軒以道鄉可敬曽為䟦甘泉之銘今東泊與時干相聞且喜接隣封之境惟先世斯文舊契宜後人此日新婚令嗣筆豔春葩力勤儒業姪女燈明夜績志在女紅幸有良媒乃成佳偶采下體菲葑之外將厚意筐篚之間受言藏之永為好也投我以桃報以李正三春桃李之時丈夫有室女有家乃百嵗室家之願有懷依倚無任欣榮陳彦謙府史滿歸惠錢舜舉畵遣禮答賀發軔修程十載試蕭曹刀筆還家遠惠一緘遺顧陸丹青愧予龍鍾失此燕賀想萊子斑衣之樂勝買臣晝錦之榮不腆送芹切希笑粲挿茱萸遍兄弟予胥樂兮投木桃報璚瑶我無是也娶婦拜祖先致語伏以有夫婦而後有父子大矣人倫故齋戒以告鬼神重乎婚禮幸及時以成家室敢即刻以覲祖宗參酌時宜兼從古制既不忘於報本乃可得而合歡濯濯厥靈降藍橋之仙宅洋洋如在坐花燭之璚筵伏願先世埀恩新人蒙福有是父有是子一門天爵之榮宜其室宜其家百世雲孫之盛合巹致語竊以禮言合卺自古有之俗曰交杯其來尚矣于結髪百年之始合開顔一飲之歡孔雀屏中選當年竟成伉儷鴛鴦盞同傾此夕豈不歡娯伏願孝順庭闈諧和琴瑟新粧不俗朝朝畵張敞之眉敬對如賔日日舉孟光之案詩曰花燭春輝照洞房藍橋仙偶飲瓊漿開花結子三千嵗人與蟠桃壽總長拜舅姑致語伏以男女居室之願喜得及時父母舅姑之尊先當行禮欲居敬而行簡乃酌古而準今試看花燭熒煌何異桃源㑹集拜舅姑而及舅姑之宗族拜親戚以分親戚之尊卑各致殷勤咸加恭敬伏願夫夫婦婦同心和順於六親子子孫孫一氣流傳於百世趙與蕭請期啟嘉㑹合禮尋月老之姻盟内事用柔訂星翁之日歴納幣於小春良月之吉御輪於大寒信宿之先是用成行必蒙允諾嵗月日時無易迨其吉兮男女居室大倫永為好也寸芹脩敬一粲為榮趙與蕭聘啟蘭陵之蕭衣冠素盛石橋之趙門户今寒月老書其姓名雲孫知為僥倖令孫女鍾禮郝法乃天生眞淑之姿某男周誥殷盤亦日誦聖賢之訓曩中牽絲之選時為佩韘之童數年粗喜其長成六禮豈容於缺畧男女之際婚姻之始區區幣帛之將父母之命媒妁之言永永室家之好蕭答陶納幣啟二首十月小春一年好景恭惟某官起居惟適祿福是宜某舊日相知新婚可喜辱子雲之筆札効女星之報章躬問宴居首陳鱗幅其必對畵閣紅爐之景而加調紫駝翠釜之羞善保儒珍早登仕版讀五柳先生之傳何慕清髙論八葉宰相之家俛慚寥落夙昔友一鄉之善婚姻占八世之昌令嗣誦詩讀書克脩儒業孫女治絲執枲方習女工既叶鳯占將成鴛偶辱錦繡之贈如此乏璚瑶之報奈何受言藏之永為好也兄弟子猶子愛芝蘭玉樹之芳父母心為心喜松栢女蘿之施王答鮮于定婚啟二首菊存晚節梅近小春恭惟某官森衞百靈起居多祿某因親雖舊結好惟新來書粲四六之文復狀致再三之敬寅恭上問未竟下忱其必順風霜氣候之清而加養玉雪丰神之秀佇膺鶚薦即奮鵬程宋相以福星為比族望殊髙晋人以嵓電見稱風流何在詎圖僥倖乃締婚姻令嗣能讀父書功名必取孫女勉遵姆教工巧何能既赤䋲繫足之有縁當舉案齊眉之永好一誠相體六禮何繁笑折黄花答今日殷勤之贈寄言紅葉待他年伉儷之諧張與巢求贅親啟交情至舊眞如鮑叔相知姻事從權欲效秦人出贅兹蓋天作之合亦云時措之宜欲以幣交未蒙金諾先此行成于月老便須涓吉于星翁所恃久要毋嫌欲速就爾居就爾宿送劉郎暫入天台從如雨從如雲看韓姞終歸蹶里獻芹可愧鑒茹為榮王與巢定婚啟二首楓錦裁紅荷衣換綠恭惟某官考槃阿澗詒福岡陵某宻邇鄭鄉喜諧齊偶爰發鹿皮之幣敢修魚腹之書上詷履祥初嚴蒙吉對去燕來鴻之景進烹龍炰鳯之羞前迓恩榮下情煩禱洗耳臨流水千古髙風拄頰對西山一時佳致雲孫幸甚月老書之令姪女養在深閨兼備德容之美小孫男出就外傅粗知禮義之方亦云鳴鳯求凰詎謂食魚必鯉問名伊始合好惟新男女居室大倫願言偕老幣帛筐篚將意幸兾包荒薄侑寸芹别陳尺楮王與符定婚啟二首風露䨇清水天兼凈恭惟某官于時處處降福穰穰某雖隔花封忝居莩黨敢奉尺書之敬仰干丈席之尊既諏茵鼎有嚴簡書當桂子餘香之秋得棣蕚相輝之樂請稽月令善保天和樂施恩多尚書令遺風可仰太平策在文中子正學誰傳過攀閥閲之髙乃合婚姻之好令姪女閨房毓秀粹然四徳兼全姪孫男燈火相親勉爾一經粗習所幸中東床坦腹之選豈非藉赤䋲繫足之縁問名通魚腹書將意遣鹿皮幣薄乎云爾歸斯受之夫婦有室父母心信前縁之不謬婚娶論財夷虜道知髙誼之不然請期啟婚姻無六禮之繁實欽髙誼唯諾若千金之重足見眞情行成既托於氷言涓吉乃稽於星厯擬三月中旬之始合百年佳偶之歡想周南梅摽有詩看陳村杏花堪畵得及時也式我願兮承顔當合卺之期敢云燕喜將意表折梅之敬尚兾包荒欣忭有餘敷陳㒺既王聘巢啟男女擇德聖賢之訓昭然婚姻以時父母之心同爾願言合好庻免愆期令女四德兼全天生淑質小孫一丁粗識日習遺經念厥祖之暮年宜此兒之蚤娶幸蒙金諾肯賜玉成敢將奠雁之儀就訂迎鸞之約後觴九日星在户星在天御輪三周從如雲從如雨請巢氏父母送鸞二首男室女家喜畢大倫之事山殽野􅉡可無小酌之歡敢望髙車肯過衡宇相邀愧泥濘勿辭送仙子乘鸞髙誼薄雲天所願得嘉賔式燕許年聞林下之風喜成姻婭後夜聽鐙前之語願叙團圞仰屈魚軒寵臨蝸舍之子宜家宜室必加敬式之辭騎從如雨如雲將見爛盈之美請符氏父母送鸞二首居室大倫喜佳期之在邇婚姻良㑹宜此夕之為歡掃羅雀門迎衛鸞從烹葵邀上客甚有愧于荒凉隨柳過前川必不辭于光賁嫁織女于河西依稀渡鵲降姮娥于月下縹緲乘鸞􅉥予望之切有請也燕衎如兄如弟適當姻禮之初象服如山如河願覩母儀之盛蕭聘張啟張良為功臣與蕭何同稱三傑張禹有愛女嫁蕭咸而得近居既兩家先世如斯宜百世姻聨于此令愛育閨房之秀能采蘋蘩小姪當門戸之勞頗知稼穡僥倖中牽絲妙選因循欠納幣常儀欲調羮以奉其慈闈奈乏人而主乎中饋禮慚遲慢事幸速成雖無雙璧之將己拜百金之諾今日聘明日娶即迎鸞從之歸五世昌八世京永叶鳯占之吉姪娶請親翁啟吾弟惟一息幸畢婚姻女子願有家必蒙往送望公車騎光我階庭挹丹桂之香風玩清秋之明月花燭洞房之喜相與欣欣竹林歩兵之遺不妨衮衮張答鄒請上客啟二首兩小無嫌蒙養喜成夫婦一尊重與太平宜㑹婚姻伏辱寵招本當趨赴藉手乏荆釵之飾何顔覩花燭之輝男有室女有家且遂齊眉之樂膏吾車秣吾馬别圖㑹面之期童婚三載喜合卺之有期王母肆筵辱貽書之見召維慚蓮髩合拜蘭姿奈老態之龍鍾久無心于燕樂梨花夜月對繡佛以長齋花燭春風想金屏而多喜代王孟學答張希良賀乃父置妾劄子一婢赤脚家君每謂包羞雙魚素書使者乃蒙言賀適逢早出難擬暮歸僣啓三印之封景見八珍之貺本無禀命合用繳囬奈雨師滂沱之未休恐星使往來之多累弗辭躐等遂用拜嘉今日目前甚愧璚瑶之匪報他時膝下當言珠璧之暗投賀置壽器劄子鼎新壽器比銀鏤之黄腸珍重安居喜玉枝之無汗雖賢達豫謀其身後歡娯益享其目前是用送芹敢希笑粲賦詩自挽君應有陶令佳章荷􅓩相隨誰不慕劉伶髙見王文甫嘗卧疾諸親友探問醫禱禮意甚勤疾愈欲置酒叙謝未遑也至是設盛席招之凡十有七人各書以請歌偪仄行念隣民之久别作眞率㑹慕前軰之遺風擬兹廿一日清晨舉我二三年缺典踏雪沽酒敲氷煮茶思向來採薪之憂難得此盍簮之喜白髪三千丈相看若圖畵之竒金釵十二行但愧欠笙歌之盛右請蕭桂岩曩嵗負新之憂屢厪存問今日折梅之信敢有相期卜大寒一日之先作小酌三杯之欵願陪談笑并謝扶持奴白飯馬青芻聊盡少陵之意膾金虀羮玉糝眞如坡老之詩右請蕭舜卿讀床頭易屢蒙枉問氷廬稱飲中仙每羡隱居雲壑斗酒將謀于小席尺書預奉以邀賓待堯蓂四莢之新如蟠桃一花之㑹志于道據于德勿云冠佩之殊和其光同其塵聊共壺觴之樂右請呉雲陵往年問疾屢荷殷勤晚景居安寧忘感激開小閣㑹數人之客至大寒先一日之期沽酒謝玉川先生下榻待南州髙士折梅逢驛使寄言報幽谷之春看竹到貧家毋吝踏前村之雪右請趙師呂向來問病曽勞得得相過老去投閑願奉元元髙論將社酒一杯之舉待堯蓂四莢之更亟掃蝸居秪迎鶴駕陶陸同社幸無麯糵之嫌孔李通家况在葭莩之末右請姜紫霞曩辱問平安之竹念我顚危邇來對索笑之梅思君契濶速客先大寒一日呼兒辦小酌三杯敢用坐邀幸毋他却頗嘗見此客不談塵生風顧安所得酒乎隣酤踏雪右請張伯起往日負膏肓之疾多荷扶持連年懷肺腑之親無由㑹集當此嘉平之月適為閑暇之時敢謀廿一日泥飲之歡何異三千年河清之㑹願切有請惠然肯來摘我園中蔬盤飣初無異品為此席上客襟懷皆喜相知右請陳嘉㑹昔擁衾聞鬪螘之聲曽勞下問今對酒如長鯨之吸願與髙談期大寒一日之先望清早羣賢之集螘浮仍臘聊索笑于梅花騎氣如虹必増輝于蓬蓽右請月仲承故舊不棄曩勞問疾于吾廬潦倒餘生合罄謝言于姻黨在嘉平下旬而先一日擬延留上客以共三杯酌言醻之切有請也有客過茅宇跫然空谷之音携酒㸔芝山乘此剡溪之興右請蕭定卿人生幾何汨汨塵勞之事嵗聿云暮區區擬飲之謀待堯階換四莢之蓂望慶亭來五花之馬爐煨芋栗瓮㵼茅柴一簞食一瓢飲聊奉笑談之樂三握髪三吐哺豈辭迎肅之勞右請陳君惠疾病相扶持常懷往事故舊則不棄可無謝言敢于後甲三日之期聊為知己一杯之欵願切有請賁然來思瞻彼牛䑓郄騎攬揺金之轡過兹蝸舍長鯨吸藥玉之舡右請翁深甫有患有身曽荷扶持之賜相親相近豈忘感佩之情欲謝殷勤久成稽緩廿一日專邀大斾三五杯聊奉清談地爐煨酒暖如湯仍浮臘味金城土酥凈如練試簇春盤右請委用佐卧痾三載之先曽勞請禱話舊片時之欵屢欲邀迎奈何日出事生至此江空嵗晚先大寒之一日集佳客之數人對月歌竹枝當盡留連之意摶拳握松子願陪少俊之歡右請周華甫饋藥感康子之意懷不能忘置醴敬穆生之賢願切有請大寒之前一日小集之歡片時誦陋室銘望髙軒過灰香芋栗菲然盤飣之㣲索笑梅花忘却緼袍之冷右請陳君傑有患有身往嵗幾成枯朽是父是子當時多荷扶持奈相逢傾蓋為難遂久失舉杯稱謝先大寒之一夕請小酌之三杯田家拊缶之歌嗚嗚共發故人綈袍之意戀戀相看右請張漢傑曩嵗負薪之憂叠承書問今日折梅之信專用邀迎先一日于大寒㑹諸賔于小席煩君騎從過我蝸居觥籌衆賔之歡聊復爾耳綈袍故人之意何日忘之右請陳仲祥老無能為每有索居之歎嵗聿云暮可無良㑹之歡先大寒一日之期辦小酌三杯之欵願切有請惠然肯來注玉傾銀笑田家之老瓦揺金織翠過才子之髙軒右請陳伯將賀符君彦遇恩劄子平地風波偶罹人禍覆盆日月喜獲天恩惟吉直荷天之休使横逆如氷之釋某有懷燕賀無奈龍鍾敢將芹曝之儀少助竹林之宴呌囂東西隳突南北笑前時悍吏之來觥籌交錯起坐喧譁想今日醉翁之樂王與金定姻三幅啟二首四月維夏南風之薫恭惟某官台候起居多福某素聞華胄新締莩盟敢於六禮之初輙上一箋之敬寅恭事上申敬如前所兾順清和之時而加調甘㫖之饍行膺芝檢即上蒲輪秺侯珥貂之孫猶能世顯葉令飛鳬之舄豈得家傳媒妁殷勤婚姻繾綣令孫天生淑質兼全四德之稱小孫日誦陳編方盡三餘之力得佳偶之諧若此為大父之樂何如禮宜問名幣以將意王郎嬌客勿戲嘲坡老之詩金縷綉襦想富若樂天之語新親賀冬至劄子鳯鳴占八世之昌婚姻締好犧畫騐一陽之復時序更新循乃常儀賀此佳節恭惟某官道隨陽長德與年髙炯炯然若清氷英標㧞俗温温乎如愛日和氣接人方霑賜帛之恩將見安車之召某傾心仰斗轉眼書雲寄殷勤聊折梅花諧伉儷將尋𤓰葛日迎脩晷喜添紅線之工月閏來春擬講青廬之禮新親賀七夕劄子二首𤓰果庭前望鵲橋之仙偶芙蓉江上尋鴛侣之嘉盟因景物以興懷具禮文而脩好恭惟某官黄山毓秀綠野居閑立志清髙欲追蹤于巢父無心機巧豈徼福于天孫其初筵露浥之餘必遠召天書之至某謀身甚拙晒腹無書卜兒曹鸞鏡之圓看女子蛛絲之喜獻芹可愧笑粲為榮華屋神仙想穿鍼于良夜洞房花燭宜合卺于明年月老檢書久定婚姻之約天孫分巧豈無兒女之情敢徇彛儀以賀佳節恭惟某官令名揭日壯氣横秋縹緲十二樓正宜供阮庭之錦拍塞五千巻又兼晒隆腹之書舉頭睹銀漢祥光拭目進青雲髙歩某俯慚蹇拙仰慕清髙以𤓰果之時羞問梧桐之秋月薄乎云爾歸斯受之當此時占喜蛛絲擬來嵗往迎鸞從機杼織作毋勞吟草堂之詩黼黻文章但願遂柳州之禱新親賀端午劄于訂月下書幸締朱陳之好賀天中節合循荆楚之風景物來前禮文敢後恭惟某官身其蕭爽居則清髙月旦有評比南州之髙士日長無事卧北窻之清風九節蒲聊用引年三年艾殊堪濟世獨醒咸羡多福鼎來某舉目葵榴馳情𤓰葛雖所獻非雪羅風葛或可留付霧閤雲窻星候起居雷同問訊角黍逹昌歜遥知盡華燭之歡兎絲階女蘿續當有佳期之約納采道日劄子伐柯以斧言當納采之時差穀有書喜得用柔之日雖居敬而行簡亦酌古以準今待季春更六莢之蓂效野老獻一芹之禮惟無責備必賜包荒鶯語丁寧報金谷東風之信鸞粧次第看玉臺明月之圓問名道日劄子月老檢書幸自天而作合星翁視厯敢擇日以尋盟後中秋八日之期結佳偶百年之好切有請也能無從乎獻芹聊效野人題葉試看流水男女之際婚姻之始禮合盡於殷勤父母之命媒妁之言願早諧于伉儷袁與陸三幅啟二首綠野春明畵堂晝永恭惟某官考槃在澗増福如川某忝在舊交喜成新好敬致鹿皮之幣敢陳魚腹之書躬問燕居首陳魚素尚冀對朱雀烏衣之景更加調紫駝翠釜之珍引養引恬善頌善禱累世傳象山之學共仰髙風無人問牛渚之舟有慚明月鳯占既叶鴛偶期諧令愛育秀閨房生乃全於四德某男服勤門戸學則悞於三餘荷葑菲之不遺俾絲蘿之為好薄言納采厚望包荒春水桃花江上遣長須獻鯉秋風桂子月中迎仙女乘鸞鄒與陸聘啟甫里世居門望偉欝林之石道鄉家學師傳本伊洛之源藉氷語以聨姻實雲仍其多幸丁寧鶯語催促鸞粧令愛夙奉母儀禮已閑於内則愚男勉承父訓書頗讀於中庸顧惟在飄泊之餘願早遂團欒之樂六禮之文雖簡雙親之意實殷尚兾包荒毋嫌欲速迨今迨吉當歌梅摽之詩宜室宜家喜對桃花之景送芹可愧笑粲為榮新親賀冬至劄子八世莫京幸隂隲鳯占之吉七日來復喜陽生犧畫之初婚姻方重於交歡節序合先於稱賀禮雖效芹羮之獻物乃如葭灰之輕餘皆削去繁文昔己感承嘉命既書雲物便約星期香閣日長看刺繡新添之綫梅櫩春早遣過庭親迎之車朱答李取男帖贅姻劄子某揆辰珠滴檐花翠揺門柳恭惟某官考槃其在阿在澗介福則如崗如陵某依仁居鄭公之鄉枌榆甚邇贅子效秦人之俗𤓰葛維新荷不鄙西家之愚乃獲中東床之選首蒙厚禮言締嘉盟月下老既辱來前春帖子敬當納上題書桐葉足知流水之多情寄語桃花將續仙源之盛事某伏望翠蓬星眷戬穀日増倘有委令毋吝攽曉社學聘章用黨庠術序之良規學開鄉社求蒙養聖功之成效職在師儒頼琴堂為擇範模使編户得從規矩文風聿盛化雨俱霑恭惟某官學有淵源眼空淮海一斑窺見蚤逰風紀之司千仭翺翔遠避烟塵之境適張公為江海之客知伯牙有山水之音將欲脩鶚薦之書先請坐臯比之席姑鳴教鐸以俟徴車某願雲龍以相隨覩星鳯而為快敬將聘幣亟往招旌設絳帳於張林來青衿於鄭校予潔予進勿謂互鄉童子之難言于勤于思即若國子先生之善誨代朱𢎞道請張子安昆仲等别多㑹少居常諷詠於停雲時和嵗豐欲叙笑談於終日邀上客一杯之欵在中秋三日之先舉匏樽丹桂花前候蘭棹白蘋洲畔難兄難弟必能與吾弟偕行明月明年更約似今年同賞臨書率爾望賜惠然新親賀冬至劄子新婚交締占八世之莫京寒暑薦更喜一陽之來復節期在邇候問宜先恭惟某官韞玉儒林濯纓芳浦髙標絶俗炯若清氷和氣接人温如愛日蓋鍾以湖山之秀而得夫詩禮之傳棠棣聨輝才華益著書雲記事坐評魯史之祥賦雪成名行赴梁園之召某弟兄舊愛兒女新歡眷言尋合好之盟徼禮作踐長之慶念因親致親者久矣視居簡行簡而恕之葭灰飛緹室之時且酬佳節花燭盟洞房之夕始待初春謹此申聞伏希丙在新婿整容致語昔年占鳯皆云家世之昌今日乘龍果見門䦨之喜繼桃源之盛事留花燭之良宵魚水交歡燕雀相賀某人胸藏錦繡口吐珠璣種玉有縁聘婦投其雙璧籯金既富傳家兼以一經將畵他張敞之眉先整我潘安之貌秋水為神玉為骨人謂無雙芙蓉如面柳如眉天生一對敢陳蕪語用贊華姻詩曰一雙新偶錦鴛鴦百嵗和鳴翠鳯凰最喜天姿如傅粉不須湯餅試何郎伏願結髪維新齊眉永好夫夫婦婦常調琴瑟之音子子孫孫克紹箕裘之業新婦整容致語天孫配鵲橋之仙相依銀漢秦女得鳯簫之偶並樂瑶臺蓋居室人之大倫而婚姻世之重禮既諧鳯卜宜趣鸞粧某人珠箔銀屛繡襦金縷梅花㸃額作壽陽宮様之竒桃葉宜人有周南國風之美眼横秋水眉歛春山香閨移歩歩金蓮合卺出纎纎玉手不施朱粉本來如月裏姮娥若論清眞尤勝於人間西子欣逢好合敢頌輿言詩曰紅葉殷勤不負人燭花今照洞房春紅絲隔幔牽情久羅帯同心結好新伏願夫唱婦隨天長地久五男二女享盛福於髙年四徳三從著香名於彤管新親遣使請上客致語兩姓為婚永結朱陳之好千里命駕當如嵇呂之交持來雙鯉之書請送乘鸞之女柳筵盛設花燭邀迎某官喬木世家耆英人物美矣育閨中秀愛之如掌上珍繡褥金屏李監宅門䦨之喜瑶簪珠履孟嘗君賔客之多既當年擇對東床宜此日送行南浦金勒馬嘶芳草樓舡燕蹴飛花明月隨人春風滿路從如雲從如雨之子于歸星在戸星在天嘉賔式宴云云請期劄子曩中雀屏孫謀以為幸事今觀鳯厯親迎而有良辰越流觴三日之期請合卺百年之好燈花有約梅摽及時投以李投以桃用請期之常禮宜其家宜其室締諧老之佳盟專此申聞諒惟丙在請男上客五日季春兩家合好烹葵邀上客因舊親以結新親杖藜立芳洲望早酌而娯晚酌請女上客祓禊三日婚姻百年織女渡銀河鵲橋懽諧星偶王母㑹瑶池燕衎早駕雲車李囬徐再婚聘啟因親致親之好從古流傳舊婿新婿之詩正宜重詠魚腹聿來其書尺鸞膠將用於續絃令姪醫緩齊名以聰敏旁通儒術小女姊嬃同氣乃殷勤粗習女工齊眉之案雖新坦腹之床不易自天作合如月仍圓琴瑟鐘鼔之樂故多幣帛筐篚之將何勝前日受今日受不妨聘禮之來舊雨來今雨來重見御輪之喜囬芹菲薄副楮條之答請期劄子婚姻憑月老之言幸成佳偶聘娶攷星翁之厯喜有良辰催花雨正此連綿五朶雲遽然飛墜敬聞命矣迨其吉兮男女居室大倫古今所重嵗月日時無易遲速何辭答納幣三幅啟花朝餘景桃雨方晴恭惟某官天相閒居日膺盛福某僣扳華閲幸締莩盟輙囬魚尺之書專問燕居之敬祗調燕申巳嚴魚甲尚兾對芳菲之景而加調甘㫖之羞善保安閑式副頌禱一舍相望皆住鶴溪之滸二姓合好永諧魚水之歡載笑載言迨今迨吉某人案頭燈火殷勤黄巻之間而某女針指衣裳寂寞綠窓之下荷不遺于葑菲斯可擬于松蘿納幣今朝結褵有日桃花灼灼喜婚姻如此其宜𤓰瓞綿綿看嗣續將來之盛囬儀菲甚副剡條之納幣啟張知府子聘盧推官女文武才之並稱夙欽華胄齊魯論之兼講甚愧㣲宗知心本出于同鄉愛子乃求其嘉偶鄰封伊邇姻好維新令愛四德俱全自是閨房之秀長男一經粗習尚須燈火之工雀屏幸中於前時鴈幣宜陳於此日星翁涓吉月老行成承筐之意既將合卺之期可待鐡瓮城山花夾道似入桃源金斗門官柳長街將迎鸞從寸芹菲甚副楮條之賀娶弟婦劄子令弟號河東之鳯生有竒才仙娥乘月下之鸞來為佳偶禮成合卺喜溢連枝想洞房花燭以歡娯送野老芹羮而慶賀塤箎交作一家藹和氣之春琴瑟和鳴百嵗永齊眉之好薄言申控厚望丙融又兄督厥家重乃友于之義弟宜其室合兹宴爾之歡鳯卜有靈鴒原多喜某人胸襟量濶洪如萬頃之波手足情親常共對床之雨稱二難於月旦行六禮於婚姻某忝在莩親敬持芹獻想鴻雁之行有喜受燕雀之賀無言翠舞珠歌花燭夜驩諧伉儷金昆玉季桃源洞盛集神仙俛述蕪辭仰希藻鑑納婿請上客得賢婿美如玉潤樂與同居慕親翁文有金聲願陪情話髙軒寵過陋室増輝請親眷送婿女挿荆釵幸致東床之婿客來茅宇毋嫌南阮之貧傾蓋有期執盃專俟又得婿如桃源之樂琴瑟和鳴邀賔共花燭之光樽巵小酌式相好矣請無却之瑣瑣之姻納婿欲叙團欒親親之長來賔誠為光餙再三申敬千萬寵臨祖為孫娶請親家狀抱孫欣有室之年寔為僥倖送女見宜家之好共樂團欒花燭將送慈裾寵賁祖母娶孫婦請親家母狀孫娶而倚門龍鍾亦笑女行而結帨鸞從將臨願覩蘭姿請移蓮歩問名三幅啟萬答蔣天方嚴肅月乃嘉平恭惟某官台候動止多福某交蒙舊愛姻締新盟承書粲駢儷之文答簡致殷勤之意前陳候問上徹覽觀尚加調紫駝翠釡之珍以安處畵閣紅爐之樂蒲輪有召梓里増榮山隨蔣姓大宗夙著於圖經莊用萬名先世亦稱於鄉國荷雲誼平居而交契宜氷人相語以聨姻令孫誦詩讀書承祖風之淳謹小女治絲執枲遵姆訓之工勤吉從鳯占喜成鸞偶擇德之初心既遂問名之彛禮何多受言藏之永為好也竹開三徑相望如倚玉之榮梅贈一枝􅂓仰作報璚之敬請新親家翁狀愛女甚於男人皆羡安昌之比見我有此客孰不云文定之榮請式宴以交驩望御鸞而光賁請新親家母狀降月府之姮娥佳期在邇宴瑶池之王母良㑹維新立候蓬門望移蓮歩謝免糧表兩浙奉蠲租之詔恩意天寛羣黎懷結草之心懽聲雷動睠斯民而得此實亘古以無之欽惟德合乾坤明同日月生知安行之聖巍巍成功以博施濟衆之仁洋洋育物干戈既戢禮樂聿興普天率土慶以來歸甘露卿雲紛其呈瑞臣某等叨居劇郡幸遇明時遥瞻丹闕之光仰效華封之祝一曰壽二曰富龜疇之景福無疆千斯倉萬斯箱農畮之豐年多慶中宮箋德配一人聖政有内廷之助恩霑兩浙公私免編户之征臣庻均歡古今希遇褘衣合則垂懿範於宮闈彤管紀功示母儀於邦國厚同坤載壽與天齊臣出守㣲邦蒙恩大幸家給人足喜關雎麟趾之化行時和嵗豐徯龍馬龜圖之瑞出東宮箋主器叅萬機之政日用三朝綸音蠲兩浙之租恩霑庻姓震長居儲離明協照星辰河岳煌煌氣象之新車服旌旗奕奕威儀之盛夷夏咸悦春秋鼎來臣等藩守至㣲葵誠上謝農餘粟女餘布樂謳歌朝覲之歸書同文行同倫統侯甸要荒之服聖節賀表九月初五日皇天錫羡篤生聖哲之姿化日舒長馴致雍熈之治春秋鼎盛夷夏咸懽欽惟德配二儀量包六合立綱陳紀同天下之車書偃武修文舞階前之干羽蠲租賦以紓為民者之力増俸祿以飬為官者之亷庻績其凝彛倫其叙臣某叨居郡守陪列朝班黎獻為帝臣粤有陶唐氏萬邦之衆壽富多男子敢效華封人三祝之誠千秋節賀表誕彌厥月先重陽五日之期時乂惟天繼洪祚萬年之業永隆邦本大愜輿情敬惟以孝以仁惟明惟允鶴駕鷄鳴而問寢朝夕承顔龍行虎歩於太平乾坤篤祜丕承寶緒益衍瑶圖某等㣲若草茅誠同葵藿望神樞之電繞壽祝儲宮願化國之日長恩霑寰宇冬至表龍飛御九有之師尊居丹扆犧畫驗一陽之復律應黄鐘愛日舒長普天蒙福欽惟乾坤合德日月同明度越古今用武功而平四海制作禮樂敷文德以教兆民當亞嵗之令辰納應時之洪福某忝居小邑阻賀大廷干羽兩階想天顔之有喜衣冠萬國仰雲物之餘輝東宮箋七日來復陽生緹室之初八表依歸位正青宮之久欣逢令旦茂輯嘉禧敬惟天生聰明日新成德能仰承於聖訓用叅贊其皇猷眎金鏡以納忠義崇風紀奉玉巵而上壽恩重天倫邦本益隆輿情允愜某叨居下邑賀語前陳夙興視饍而問安更有書雲之喜賢佐保躬而傅德尚論愛日之誠中宮箋陽生葭管天時妙斡於𤣥機懽藹椒闈日晷新添於紅線掖廷和樂寰宇清寧敬惟壽與天齊德同坤厚萬乘至尊之賔敬雅重褘衣六宮内則之教修尚勤元紞載逢令節益介繁禧某㣲若草茅誠同葵藿履長今日宮中奏式燕之娯習美成風天下頼關雎之化正旦表普天率土幅員歸一統之初獻嵗發春正朔届三朝之始時調玉燭喜溢瑶墀欽惟聖德乾剛神功震赫蕩蕩乎如天之大人所難名昭昭乎如日之升物無不照履始和之吉月嚮洪福之萬年臣某等忝牧邑民阻趨庭賀鳯厯頒春於天下化及華夷獸樽置酒於殿前樂聞忠讜中宮箋四時成嵗洊逢泰道之亨萬物資生實仰坤儀之盛春囬寰宇歡藹掖廷敬惟位正褘衣功成元紞風教天下關雎正始之音朝夕宮中巻耳求賢之志履端有喜介福宜多臣某等領邑覊縻望闕稱賀紫宸配德新年布澤如春彤管流芳億壽與天同載東宮箋正月之吉始和輿情共悦維天之命不己嗣服益隆春藹青宮祚延蒼籙敬惟長為主器允應貞符親傳精一之心淵源聖學叅决萬機之政黼黻皇猷迎新茂對於良辰端本繼承其大業臣某等叨居縣邑阻賀宮庭鳯厯頒春大地之羣生有喜龍樓問寢齊天之洪福俱増龜巢稿巻八欽定四庫全書龜巢稿巻九元謝應芳撰序送黄仲賢同知呉江州序國家以民為本故州縣守令之職必愼擇焉以其近民故也茍知近民之理則必如醫之近人察其脉而知病否農之近田視其苗之美惡母之近子求其意而知惡欲苟非其人則何異以巫為醫以工為農以塗人為子之母乎至正己巳秋太尉丞相知黄公仲賢之能啟奉上命命同知呉江州事其職可謂近民矣或曰君前為江西省照磨為南臺掾雖所至蔚有能聲未嘗近乎民也矧今位州長之下僚佐之上凡所處决非己得專其為政也不亦難乎余曰不然位不同而理同茍吾之理明如鏡照物持此以居同僚之間無偏執無詭隨一州之事交相可否舉直錯枉惟理是從必能使斯民無歎息愁恨于田里者矣夫如是可謂醫之知病否者也農之識其苗之美惡者也母之能求其子之意而知惡欲者也近民之理如斯而已君之行其友某等請余以理之一言叙而送之余則毘陵謝應芳也贈卜者陸仲明詩序卜筮之説予嘗著辨惑編論之詳矣今吾友徐君伯卬謂中呉陸仲明氏善卜往往以疑事决之其應如響故率諸善文詞者贈言且徴予為之序夫卜功臣雖唐虞之聖猶用之若三代則塗山之卜飛燕之占百穀之筮皆騐以興國特不知當時掌蓍龜者何如其人也春秋時或者謂蓍短龜長而龜獨重於世家國大事未嘗不謀及之善卜者誠能紹天之明以七十二鑽洞明吉㐫其人豈易得哉但世之假龜䇿以售妖誕之説者垂簾居肆所在有之君子不能無憾焉夫以伯卬之明智而稱仲明若此則仲明之精於卜也可信矣雖然昔君平於問卜之士語臣以忠語子以孝其諸善道莫不隨其人以詔之於世教殊有補焉諸君既賦詩以譽仲明予不佞請復以是規之仲明其留意焉婁曲書堂詩序人情孰不愛其子乎惟其愛之以德使之能自樹立斯君子之愛矣崑山殷君叙父有見於兹視籯金不如一經及買書築室於婁江之上命其子奎曰與師友講學寢處食息乎其間而奎也服膺父訓篤專厥脩或經嵗累月足不跡庭户外學與日積聲聞遠邇若參政鄱陽周公亦過而嘉之扁其室曰婁曲書堂既而銕厓楊先生及諸名勝皆有賦詠而予亦嘗題其壁焉今君叙又欲因詩以賈其子之餘勇而益進之乃裒集諸詩時令諷誦且俾予序所以集詩之意吁若君叙之愛其子者可謂君子矣奎字孝章亦可謂孝於其親而名不虚得矣余嘗三復是編顧其詩類多警䇿不特頌殷氏堂構之美而已使凡為人父為人子者得而觀之又且有所感發興起而為風教之助云杏林春詩巻序予嘗讀列仙傳至董奉杏林之事嘗掩巻而歎曰嗟乎奉必有道之士而隱於醫者也觀其用藥活人而不責人之報以杏易粟且復賑夫飢者非有道而能若是乎傳者蓋欲特著其事託為神仙以髙之殊不知君子之所取者在此而不在彼也呉君中行去奉千載景慕之將繼踵其美乃大書杏林春三字於齋居之室示不忘也所謂杏林者蓋根于胸中方寸之地而春則發乎秉彛之天流芳後人傳之不朽蔚然嘉樹而已吁中行之學人固知能世其家而其心則予猶恐人或未之悉也今觀四方士大夫遺之詩文咸嘉其存心之仁擬諸董仙無間然者可謂有諸中形諸外矣予於是益加起敬三嘆之餘用題巻首送琇上人序予聞浮屠氏之學其宗有三曰教曰禪曰律教以明法理禪以悟本性律則操且式而已三家説行互相優劣果孰得而孰失哉吾意其宗於教者猶儒而窮經要得其本矣彼禪兾頓悟律謹細行雖各有義然循其常而求之始乎粗而卒于精始乎求其言而終有得於言意之外者則於教誠有取焉玉林師有見於兹也自少走呉楚間求其深於浮屠氏之書者從焉又旁求吾儒之書而讀之故能嵗時享其祖禰而且仁其族也予故與之交且暱焉今玉林以斷雲法師主澄江迎福之席得華嚴之傳往貳之以尸其悦衆之職吁醍醐甘露悦乎口者也秘宻之藏要妙之理悦乎心者也師往以其書究竟衍説廣示其衆來學者之飫焉孰不歡喜而信慕哉而况有得于吾儒㫖邪于是衆餞以詩予則為之序云送慈晋卿序秦漢以來官不封建為郡縣者往往以交承之數視為傳舍治效蓋蔑如也况巡檢或以省檄為之遇郊授者截日代去其傳舍尤非郡縣之比惟慈君晋卿則不然君來奔牛即諗諸衆曰吾居此誠不知能幾何時然食君之祿雖一日必事其事爾吏必謹其案牘爾廵兵必嚴警邏否則必汝責弗恕於是各殫其力而君之用情尤倍之居民謐寧盗賊屏息四境之内晏如也既而郡府以材幹聞復以渠堰等事委之夫奔牛當驛路之衝凡朝廷使命之出東南方物之貢與夫省憲百司往來絡繹罔不役廵兵䕶送之稍緩則怒罵鞭朴皂𨽻不能堪而君處之泰然每以身代廵兵之役退無怨言閲四年如一日蓋其立志之確而忘其勞且辱也今鄉人德之郡府嘉之儒紳君子咸賦詩以華其行吁世之傳舍其官者聞慈君之風亦可少變矣送秦彦明序士不可以窮達論也窮而耕莘達而阿衡窮而釣渭達而鷹揚窮而版築達則霖雨所謂窮達者時也鄉使賢者不遇於時則終為莘野之農渭濵之漁傅岩之賤夫耳吁今人猶古人也惟其藏器於身待時而用不躁不競斯為可貴世之狐趨狗媚竊利祿以榮其身者君子耻之淮海秦彦明儒先之子也家庭之訓聞此熟矣觀其所負之器如干將莫邪用為補履之錐豈其利哉然為貧而仕與時浮沉未嘗有毫髪躁競意征商之暇每與僕痛飲劇談商畧今古語及先民耕釣版築之事必奮然扺几慷慨激昂盡醉而後己今其行無以為餞請以疇昔嘗所共談者書以贈之以堅其待時之志送趙縣尹之安仁序余聞古鄱陽之地土沃民富物産饒衍故以饒名州考之今則銀錫絲枲魚稻之屬誠夥其民誠殷名不虚得矣郡屬州縣六安仁其一也土壤民物視他邑為最或謂其民習奢靡蕩禮法不才者居多土沃故也為此邑者厥惟艱哉是不然凡民之情有恒産而後有恒心庻且富而後可教否則汲汲焉救死不贍教將焉施然則安仁之民其可教者歟奚其難但近時州縣吏視其地之瘠肥民之豐嗇以為幸不幸者其意有不在乎治之難易也今趙君天祺為安仁令吾知能教其民而不以為難也必矣何以言之往者君大父為賢守令著稱于時君卓然有祖風烈製錦斯邑牛刀發硎豈不恢恢乎有餘地哉斯民吾將見其被絃歌之化成禮義之俗熙熙乎耕稼之為樂也寂寂乎雞犬之相安也皥皥乎不知帝力於我為何如也麻中之蓬亦何待矯而直哉君之行可慶者如此而其民又豈不大可慶乎贈刋字張生序古者毫楮未興書以刀筆故六經往往口傳耳受不能無誤然識者正焉其失猶未遠也毫楮既作書道乃備轉相傳冩譌謬滋多至近代板刻之誤而人有不敢遽易者况俗徒規利至有節去其詞使章斷句裂以誤學者然板既行聖經賢傳乃得家傳而人誦之固亦有功名教矣金沙張敬之善鏤書者也家本業儒故能矯二者之弊且以篆𨽻究字書原委偏傍㸃畫亳髪無舛士大夫咸以是稱之方今天下文明正制度考文之日館閣諸書校讎有人勒之琬琰以幸來世將有取若之藝者若之名由是亦彰矣敬之其勉哉送崔仲德序予往京口之行識崔君仲德於諸葛用中席上温温其容抑抑其儀其言議粹然一出于正心竊敬之意其人非天質之美必師友淵源之懿也既而詢之士大夫乃知君姚文獻公之門人自早嵗篤學尚友千古文獻公特器重之及壯侍親宦逰臺閣多薦辟不就今也為貧而仕監税呂城予嘗壺觴闕亭得以聆文獻公緒餘之論窺君抱負汪洋無涯既而部使者諗君之才以郡中危難事命之蟠根錯節迎刃而解識者韙之或曰君往年唾視軒冕至是何屑屑如是邪予曰不然仕止久速時也安知徐驅於後者不疾過於前哉苦心志勞筋骨空乏其身又安知非天之所以玉其成乎予聞文獻公宗孟氏之學君於此聞之熟矣尚兾尊所聞行所知以益勵其所守功名爵祿特餘事耳請以此為臨别贈送小河徐廵檢序常為淛右大藩府統州縣四廵檢司又五倍之獨小河瀕揚子江風帆浪舶輻輳岸下販私鹽以漁利者往往與居民通甚者禦人江海之上日熏月炙惡習滋蔓數年以來號稱難治淮安徐君逹善適官於兹君患之視政之日既申明憲章以嚴警邏吏不敢肆卒不敢怠未幾民有蹈前轍者追亡摘伏㒺或遺漏境内肅然道東西行者爭稱譽之由是郡知其能乃命攝奔牛黄土之警君一以公勤涖之民以謐寧閲五載如一日今代去彼鄉人之頼以安者設祖帳青城下皆依依然不忍别余既嘉君之有德於民亦喜其民之不忘德也吁今天下之盗豈止是哉蠭螘之衆竊兵於遐陬豺虎之徒賊民於當路斯居民尤苦之以君之才使之佩虎符擁􅆛貅則蠭螘可掃也使峩廌冠持玉節則豺虎可擒也蜂螘掃而豺虎擒斯不負其才矣贈醫士顧彦文序顧氏為呉中望族舊矣近代家蓋濠者多業儒至彦文生而岐嶷方丱角即慨然思所以濟人且曰士而未達蔑以及物惟醫其庻幾乎於是挾古今醫藥之書往從舅氏葛先生學焉探􅄨索隱垂十年業成而歸惓惓乎欲展其素志凡以疾告之者必詳審製善藥手足視貧富無間然者故往往藥有竒效特稱良醫彦文方謙謙然不自滿不責報於人然人既德之而亦未嘗無報也吁古之善醫國者其操心蓋如是耳禹視人之病溺也殫力以疏導之法拯之稷視人之病飢也竭誠以稼穡之方救之伊尹以一徳療桀之厲周公以四事觧紂之虐調隂陽弭災眚保養生全卒能躋羣黎於仁夀之域以成十全之效漢唐諸公功雖不逮然於人所疾苦隨用救藥㒺不殫乃心力今觀彦文用心之勤必有見于此乎一日友人安元卿以其有未報之德相與載酒濠上因以前言質之彦文笑而不答余復告之曰昔丙吉於孝宣㣲時有大恩其始未之知也他日將封侯丙吉病甚上憂其不起識者謂吉有隂德必享其樂後果如其言然則有盛德者不報于人必報于天此又吾彦文之所當知者酒既終元卿請書此為贈送楊善章序至正辛丑春予舟次呉門友人楊善章過予曰先大父安撫公葬餘杭考妣祔之杭人以丘壠之廣竹樹之盛名其地曰楊墳是也前年冦兵入境喋血百餘里古今墳陵遭禍樊崇者不可勝計我先壠雖赭其地殯宮幸無恙焉然而寇退之後榛棘蔽野鳥獸之害人者出没其間春秋霜露之思悵望飲泣痛吾親弗及夏畦馬醫之鬼一坏之土又安知終無綠林之患乎朝斯夕斯情弗能己今將往以浮屠氏茶毘之法舉之函骨而歸瘞諸呉之西山庻嵗時省掃以寓追遠之意於禮其可乎哉予曰此禮之變也禮曰古不修墓况改葬乎不得已而改者固有之矣舉而燔者未之有也雖然當此䘮亂之際三綱幾絶父子或不相顧今善章一念之孝不忘乎親將冒險渉難負其親己寒之骨去危就安斯可取焉君子固不當以常禮責之也余既答善章之問因筆諸簡牘以餞其行送彭主簿調呉縣序昔人謂州縣徒勞者誕矣夫州縣為民父母居是官必有其子愛之心盡撫字之術以勤以勞斯稱厥職故戴星出入者致一邑之治運甓朝暮者成八州之功否則淪胥尸素有不免君子伐檀之譏若我長洲簿彭府君其可謂能勤勞者歟長洲𨽻大藩加次師旅飛芻輓粟事如蝟毛公以明察内敏之才剸繁治劇如庖丁觧牛得其肯綮刃有餘地然一念之愛切切乎為斯民保障服勞盡瘁不怠不息未幾府令出郊視水以董農事公所至訪民利病見諸施行集流離而為土著飭逰惰以躬稼穡抑强扶弱剔抉奸蠧民用大快或告之曰公今職有所專餘若可置公大不然言一邑之政皆簿所當為吾敢憚其勤乎尤務以亷潔律身以清苦自厲雖按行之勞酒肉不御日三飯脱粟而已吏卒從行操如束濕然割已俸食之使畏而愛于民無毫髪擾至若尊賢下士温乎其容秩乎其儀動遵矩矱言必忠信有古人之遺風焉由是廟堂嘉其能改調呉縣蓋欲用利器於蟠根錯節展其效耳今士大夫為邑人抒去思之情詩以贈之吾友陶君德潤知公為深走書以序引見屬凡所稱道皆予曩聞於人人者吁賢勞如前加以無倦其冶效當不止長洲呉縣若單父而已將美繼長沙公八州之大吾言斯足徴矣贈醫士呉中行序僕老呉下怪其俗之陋尚鬼而多惑嗜利而輕義欲得卓越之士不為俗習所移者相與語道蓋甚尠耳一日友人趙執中書來曰去年春彛舉家病疫垂髫之兒蒲伏薪水適錢塘世醫呉中行來閔彛故交過門視疾謂二親已不可療彛則藥而愈矣時族姻比里方煽乎妖巫之妄愳乎疫鬼之害跡不及門獨中行暨里人陳希元日一二至扶持而藥之饘粥以飼之彛得不死未幾吾親果相繼而殁中行又力為之襄事越數月彛念蔑以報厥德姑償藥資中行拒而不受今里中士大夫皆賦詩以美中行請為之序焉僕閲書起敬恨未識其人耳既而識之且聆語言知學問之博識趣之髙不特業醫而精又嘗得劍術之妙達官貴人多用薦辟然骯髒不茍不屑就巻而懷之泊如也惟讀書窮理愈進愈力假醫藥以寓吾心之仁而濟物若中行者可謂不淪胥於尚鬼之俗而惑者也亦可謂能舍利而取義者也亦可謂卓越不羣而造道者也斯人也昔吾願見而不可得今既得之可不樂道其善以厲其俗哉吁麟角鳯觜世不多見孰謂世無麟鳯與識麟鳯者知其待時而出不久將有日矣僕等又當刮目以俟送梅知州序予嘗觀古之為政者惟能以亷律身則心清而理明身正而道行故周官以六亷計羣吏之治自漢而下史稱亷吏者其政皆焯焯矧予西溪梅公生質猶季雅亷也加以學問之力亷介絶人初倅崑山聲聞于時遂陞同知州事在州六年門無私謁較諸楊伯起却故人之遺羊興祖拒府丞之餉范史雲之塵甑馮元淑之齋馬無異也當其蒞事之日時與同僚相可否同僚曰公亷而能所可否者非私也當從之無戾焉御胥吏防其姦欺窘如束濕胥吏曰公亷而正所窘束非苛也當謹之無違焉至辨獄訟均租庸用刑罰以齊其民民則曰公亷而明刑罰非暴也當服之無犯焉是故佐是州之久道日益進行日益修品秩加而名日益著焉耳今知吳江實為州長而位乎同僚之上其御吏其治民又非前日佐貳比仍以一亷處之則所謂心清而理明身正而道行可必矣吁庖丁觧牛刃有餘地蓋得其肯綮之要也若夫以亷律身豈非為政之要乎雖然克終之戒君子慎之某辱公為布衣交于其行敢以君子所慎者告之為臨别贈送費知州秩滿詩序東平費侯為崑山之五年二月初吉侯得代時毘陵謝某適寓是州聞州人頌之曰公昔下車時方擾攘民用蕩析老弱餓莩餘或行伍公勞來之乃復土著以耕以桑以生産而租賦然猶懼不能安其業也頼公之明為能識民情而燭吏欺使民得盡其要欲吏不敢並縁而為姦蚩蚩之氓間有訟于庭者侯必先誨之以理諄諄焉如賢父兄之于子弟良師友之于弟子䧟於誣則為之直其枉而不避困于役則為之節其力而不窮至其有罪施以刑罰亦未嘗無哀矜之意焉是州地方二百里其民咸得安土而粒食者侯之惠也又曰學校久廢侯則振厲之尊育才賢文教蔚興黌宇輪奂視昔有加而閭閻委巷絃誦偕作使之駸駸乎為禮義之俗者侯之功也予聞而嘉之既而道海虞適無錫過長洲茂苑周逰乎淞江太湖之上士大夫凡與談及崑山咸稱譽如州人之言其能詩之士各賦詩以贈之予則即其所聞以序編首書畫舫燕集序古之人凡樂其髙尚者必寓意於詩酒花竹山水之間與之逰者蓋亦樂其樂若我玉山隱君其亦可謂髙尚者乎君生長世家一旦盡去其少年豪華之習結草堂玉山中蒔花種竹日與山僧羽人布衣韋帶之士以逰以居達官貴人未嘗一見其面徴車之來則踰垣閉門甚於段泄不知者或譏以迂怪君聞之自若也至正庚子秋九月愚隱師携祺上人等過之語道相契日坐至夜分乃已一日君置酒書畫舫主賔凡八人其七人皆善飲獨愚隱師性不嗜酒亦欣然為之勸酬嗢噱各盡其驩既醉以對酒當歌人生幾何兩語䦰韻賦詩時秋髙雨晴芙蓉金菊之花照映池島悦人心目而詠歌有不能已者故分韻之外復有倡和之什焉夫愚隱師一至居數日非惟主人留客之固而客亦眷乎山水花竹之間而忘其去則所謂樂其樂也諸詩寫燕集之娛園池之勝備矣余復引而申之以識嵗月梅隱山房詩序昔人有言天下無眞樂隨所寓而得者乃眞樂也今吾以珏上人觀之其信然乎往上人逰諸方叅菩提達磨西來之意名山勝景長年忘歸不知者意其江湖之樂耳既而歸錫谷影不出山渉獵羣典適興賦詩怡然自得又若移其樂於山林文史矣至正癸卯春愚隱師主禪月道塲召為記室上人以佛法淑同袍之士以辭章接縉紳士大夫人皆樂其道之行焉閲數月謝事當路者或薦舉之孰不曰以珏之才之美宜其繼黄龍益宏斯道殊不知上人之來特以答愚隱師相知而已餘非其志也於是飄然别去渡呉淞過崑山東瀕於海顧荒江寂寞之濵僧廬幽閴梅竹環繞境與心㑹乃寓缾鍚顔其所居之室曰梅隱山房蒲團木榻晏如也定起之時曵履梅下或欣然猶迦葉視拈花而喜而人不知也吁呉中巨刹樓閣相望鐘鼓之聲相聞茍從當路之薦置身蕭爽孰不為之樂哉今若此其樂蓋自得之有難以語諸人者有樂與諸君懷上人者為之賦梅隱詩一巻俾不肖筆其首簡予不敏姑以平昔所知者道其梗槩云送理上人歸天台飬親序余避地吳下聞宗元師之名者數年及與之㳺則知名不虚得方以見晚為恨師乃念親老于家言歸覲省且欲築廬于先人之墓詞佛養親以酬㒺極余聞而嘉之因請諸縉紳歌詩以贈其行或曰子逢掖者又嘗著書辨老佛之惑矣浮屠氏既與之㳺又從而譽之何哉余曰不然余交浮屠亦各有所取焉往在京口以清苦交了公即休在金陵以文詞交訢公笑隱於杭交古鼎銘公以其端謹而誠慤也今於呉交愚隱智公悦堂顔公一以其有濟人之盛德一以其有事親之孝也其他或學或行或識趣髙逺未嘗無所取焉今宗元有了公之清又心乎顔公之心可不敬乎吁當此兵戈之秋道路梗澁跬歩千里有能披荆榛冒矢石梯山航海勇往而不顧者大率皆功名之士貨利之人求其如宗元之行蓋尠矣夫宗元於蘇湖諸大叢林所至安隱且有虚主席以待之者師皆辭焉誠使結廬以守松楸之地持缽以盡菽水之歡可謂釋門曽閔歟吁彼織蒲如陳睦州者固不得專美於昔矣諸君然余言既贈之詩余乃述所致敬宗元之意弁於篇首為徑山顔長老送丁州判序予聞古之任人者為官擇人未嘗為人擇官故量材授職不遽更易必使久于其職而得以考其績焉今丁君克明為崑山州判官洗心奉公孜孜厥職凡州長發號施令必相與可否然不務乖剌惟是之從至如出郊勞農及河防繕修警邏之役靡不殫其力焉秩甫滿公府復命君判嘉定州事可謂委任之專有古者為官擇人之遺意也以君之才㳺刃厥職是猶駕輕車就熟路不遺餘力凡昔之所以澤此民者其必澤彼民矣等而上之佐郡國貳憲省將無適而不可大器晚就其可量哉某以久處鄉邦故知公為詳於其行書此為别并為嘉定州人之賀云送陳允貞序士君子負有用之才必得善識者擇而取之然後能適其用耳譬之木若檀之可以為車楛之可以為矢桐之可以為琴瑟杞柳之可為桮棬楩柟豫章之可為明堂棟柱材雖良能自致其用乎至正乙已冬王命江浙分省叅政用公開望亭河為固國計公知允貞為能幹濟使董其役允貞方以呉江州吏目滿秩而歸承命之重義不容辭於是殫智盡力宣勞王事召畚鍤數十萬人為之計工程限期日不疾不徐民用子來兩月之間事功乃集河長四十里北接曹湖南通漕渠又東注于震澤呉人視之猶金湯云故當咸嘉允貞之能而凡與其役者多德之然則允貞所謂有用之才又得善識者擇而取之斯適其用矣今允貞赴鹽塲幕官吾知其才足以有為也鹽法之弊多於牛毛属部細民蓋有望於良有司也久矣惟允貞盡其才之用焉為智長老送蘇縣尹序至正丙午春余過上海卓錫于寂寞之濵適縣令蘇君産祥秩滿而去士大夫祖帳西門外田夫野老遮道請留或膝行而前脱君鞾先後數四不翅攀轅而卧轍也余嘗揖父老而問之曰蘇令何以得若等之心如此哉父老曰賢令亷明公正材幹絶人三年之間凡可以康濟吾民者知無不為且精於法律小大之事處决如流吏畏民服租賦非不重也頼除去宿弊而無横歛之毒徭役非不夥也以差次民力而無不均之苦至若謹序庠明教化置禮樂之器以嚴祭祀増社學之説以廣文教凡祠廟之在祀典者皆修舉廢墜麗牲之碑所在正立街衢橋梁舉邑完好又曰縣瀕鉅海江流交接風濤横肆險惡萬狀禦人者往往出没其中過者病之令乃相地之利由縣治西南開大港接新涇口延袤幾四十里墟邑相望雞犬之聲相聞昔之畏境今為康莊風帆雨檝晝夜不休縣之人不忘所自因以蘇港名之焉余聞而歎曰令賢乎哉此蓋千萬世之遺澤也秦之白渠常之孟瀆杭之蘇堤蓋此類耳今君賔府幕以所負之才贊畫郡政蓋滔滔也余復何言特以前所聞父老之語序而送之以抒邑人志思之意云送鄧宜之還鄉序昔二疏為東宮師傅告老而歸當時祖帳之設黄金之贈太史氏悉書之或曰以二公之賢尊為師傅區區贈送奚足美哉是不然此蓋美其還鄉之樂非以為師傅之榮也夫鄉里人之所難忘也若班定逺馬伏波皆絶世之雄立功異域名聞天下猶且願生入玉門關及追念少㳺平生之語况餘人乎蓋狐正首邱魂魄之思沛皆出乎本然之天也今宜之鄧君假館張侯羣弟子服勤盡禮講貫之暇主賔燕洽閲寒暑十有二載如一朝夕然故鄉之念常縈乎懷束書言還館人留弗能止其父子昆季乃翕然餽贐又相率諸友人贈詩且屬余為之序焉余與君鄉人也親戚也知君之心者也因謂之曰君之行有班馬之所無者方諸二疏雖榮名贈送之有不同而鄉里之樂則一耳苐慚余殢留知君之樂而莫能與之樂其樂也君歸凡故人有見問者幸為我謝之多稼亭燕集詩序洪武十年春上已前之一日郡守番禺張侯置酒多稼亭集僚佐洎逢掖之士十有三人相與訪前修遺跡尚交而趾其美焉環視四郊烟鉏雨耕乃喜而言曰嘉我良民始不負牧守邵農之意歟旁睨黌舍衿佩雲集又曰嘉我諸生其無負國家修文之教歟至若滆浦環于前三山屏于後雲霞竹樹千態萬狀儼然為天開畵圖快人心目侯於是舉酒屬客臨流賦詩蓋其興之所適情之所寓有不翅蘭亭禊事之娯而已沂雩風詠亦殆庻幾吾儕亦得以樂其樂也坐客詩凡若干篇侯以龜巢老生謝某客之坐因命為之序云贈醫士張恒齋序夫良醫之用藥如良將之用兵知彼知己百戰百勝非偶然也且人之有疾必繫乎五臟六腑殊不易知也茍曰飲上池之水而能了然於心目之間非吾之所知也必也目其色耳其音語焉而推其詳脉焉而究其藴如是而后可謂知彼矣彼疾既知又當所用之藥必中厥疾如戰必克乃所謂醫之良猶將之良也恒齋張公世居儀眞以醫名家今提領常州惠民藥局事郡人往負危疾詣公公可否之其曰可者皆如期而愈猶龜卜燭照而數計之也蓋公自蚤嵗究心于儒者之學以明物理軒岐以下數千載醫藥之書莫不探賾索隱觸處洞然未嘗出詭祕一言以自神其術也近吾友丁以道之子遘疾而危羣醫縮手公診而藥之其病如春氷而釋其人如枯荄而生以道德之且言曰郡人蒙是恩者衆矣安得太史氏為作佳傳焜煌簡册耶吁余嘗以恒齋之學論之將來必醫及國家躋斯民於泰和之域秉史筆者當大書特書傳之無窮也奚患無聞乎送陳尚言歸㑹稽序㑹稽陳尚言以其從兄為常州府幕長銜父命來視之常之士友因得時與之㳺而東郭謝某獨深有敬焉者尚言方妙年自持如老成人凡相見時往往論古今忠孝事世俗之談未嘗一出諸口也洪武六年八月之吉言别於余前兩月方盛暑余嘗見束裝其兄固留之至是宜挂秋風之帆矣或謂尚言之欲亟其歸者厭我陋邦而樂其故國山川之勝也予請詰之子之歸將窮探禹穴搜竒索隱而求神秘之文乎將幽尋雲門與山僧林叟相期㳺適乎將蘭亭觴咏鏡湖第宅踵昔人之髙躅乎夫以數年所知尚言者觀之吾知其不為是也必矣子之歸朝耕夜讀林樵澗漁搰搰乎為養親計將使紫岩山中復見董召南以孝義稱孝感之祥天降厥家世有韓退之又當雄辭大篇以播其遺芬矣尚言聆余言笑而不答後五日某命兒子木筆之聊藉手為臨别贈某延陵人時年七十有八自號龜巢老人云代董知縣送同僚尹主簿序洪武四年冬余備員為武進令與縣丞陳德廣相繼而至時山東尹公明善為簿數月同寅之初嘗相與言曰吾三人之為是邑也其猶同舟共濟乎余嘗聞操舟之術舵者主之然必以篙者櫓者橈者檝者深以竿者縴以矴者桅檣而帆者然後江海可濟也有其具蔑其人其能濟乎雖有其人苟不僇力以事其事亦未能有濟者也今明善涖事久為之甚習可謂善操舟者矣自是同志協力康濟邑民事無不理兩朞之餘實無愧于􅋵舟之喻也六年冬明善以銓考増秩余與丞及其代官張奉先祖帳而别明善復舉前説以勵吾人余曰斯言也豈特官是邑其宜則之凡為雄州劇郡以及方面藩府皆當以是為心則無適而不可也古之善相天下者若傅説之賢其主猶以作楫命之况餘人乎明善之行吾請以前所言者筆諸縑素為臨别贈縣丞江隂人名某主簿澤州人名某余則鰲溪董某贈寫照玉泉子序玉泉子本常郡闕亭侯之裔六世祖居金壇地因人姓是為蔣莊月鍳翁其父也玉泉以胸涵氷壺目炯若電得乃翁冩照之傳甲寅春我郡侯孫公請為紀顔因過予為傳老醜坐客有言寫照自顧愷之始者予曰不然昔庖羲氏畫卦而人文肇開曰書曰畵蓋椎輪于此矣余嘗觀六書如天之日月星辰人之耳目鼻口物之山水花木鳥獸其文類皆象形然則象形而畫其義一也黄帝堯舜垂衣裳而山龍華蟲之屬施諸五采作繪一語登載典册繪畵之事著矣殷髙宗審象求賢而得傅説吾意寫照之原本此歟至炎漢兩君圖功臣於麟閣雲臺之上與青史鐵券並著勲烈自是而畵之名世者滔滔也若晋之愷之乃其一爾然今人冩眞僅以形似玉泉則并其神氣意趣得之見於毫素非汎汎作繪者可同日語况平昔於所見之人但曽半面雖即世之久亦能想象而貌之至有使其子孫下拜號呼宛然如見其親此又得乃翁不傳之妙而能人之所難能也吁使玉泉生於有商必能為君貌夢中之賢人矣當今羣公秉國圖象凌烟徴車胡為其未至耶月鍳翁年垂九袠博物稽古玉泉歸請以予辯客之語質之而翁茍以為然亦必以輪扁不能喻其子者然予論玉泉者矣送祖心上人省親序學佛氏而不忘父師之恩知君命之重而弗敢渝是為良浮圖吾當與之㳺贈其言而嘉之是亦與人為善也蘭陵銘上人本名宦族早失怙元末時廼翁為江西省幙僚隨繼母侍翁居官遭時擾攘江右失守省署移福建乃翁以王事赴比俾其子往錢塘鞠于從父既而世變從父家毁于兵且荐饑流離蘇常時貴㳺子弟多失身上人獨能渉歴艱險不農工不丐𨽻不服賈負販而趨利慕大雄氏空寂之教可超脱物累遂祝髪從浮圖師東谷昇公而學焉禪林矩矱蹈履惟謹其父子不相知者十有一年然一念之孝根于其心常禮佛黙禱得一日之飬以盡烏鳥之情志願足矣洪武甲寅春父來金陵知翁無恙且有弟在膝下以奉朝夕上人喜不勝於是告其師亟往覲省以余昔嘗以君親之道語之請别於余且言曰銘之行雖為吾親誠不敢畔吾師而負國朝度僧之命而返吾初服也織蒲之飬或庻幾焉余曰然如上人者處困之日不失其身居泰之時不易其心誠可謂良浮圖矣撫其弟安其親使人稱為禪林之子騫吾無間然矣彼人面而獍心者聞上人之風能無愧乎能無警乎是嵗四月之吉謝某序贈錢隱居序二月之吉余方㨿槁梧坐澹泊齋友人嚴子敬過余而言曰去年冬某嘗患背疽狀如覆盆視疾者皆寒心焉隣有陶君子錢氏志道甫獨曰無傷也藥可愈也既而用藥一如其言某嘗奉幣以償藥之資志道乃固辭弗受請贊一辭以著其美亦以示不忘也余聞之仰而嘆曰夫疽發於背者危疾也古之人智謀如范増勇如姜才皆為所害志道能療斯疾豈易哉余還鄉五年聞鄉人之譽志道者籍籍今吾以子敬之言益信且志道蚤讀書好結客竒方妙術故多得之雖常能以藥活人而不以醫名家其可謂隱徳弗耀者歟不謀利不計功亦可謂好義者歟釀美酒以娯客畜善藥以與人吾知志道之心即蘇長公之心也世之鄙吝如斛斯者其妻以百錢市藥猶以為恨况與人乎聞志道之風薄俗可敦矣吁昔人為一卒吮疽尚登册簡如志道之賢安知無太史氏為作佳傳耶送太古禪師住持祥符序釋門先覺之士以能荷大雄法者為象為龍理固然矣求其七德五文之備和鳴而翔集所至而羣從惟鳯為然兹又不可象龍槩論也今吾以太古徽公觀之其僧中之鳯也歟公蚤嵗入䨇徑寂照師之室韞德抱道蔚乎其文猶鳯毛也既而主常之文明蘇之秀峯踞猊座説法㣲宻妙音聞者悦懌是猶鳯鳴朝陽也去此數年而陵谷變改故鄉來歸不翅如翺翔赤霄覧德而下視津里如丹穴飲太湖如醴泉以靈山古法幢之顚仆往扶植之瓦礫之地將為瑶圃灌莽之卉將為琅玕使七十二峯之境皆為岐陽而把茅挿竹皆阿閣也彼翕然而從者四衆之外衣冠紛集復有宗雷陶謝軰從遠公為方外逰故叢林旦評緇素輿論咸謂公為僧中之鳯無間然者慎勿諉枳棘非吾所棲而姑為桑下之宿也公之行郡邑士大夫咸稱羡而送之龜巢老人乃為之歌曰鳯兮鳯兮一飛羣隨覧德之輝載鳴瓊枝維其時兮送郡守孫侯秩滿序人恒言郡縣之職愛民為先殊不知善為郡縣者必先能馭其吏而後愛民之政得行焉若我常州府孫侯其可謂善為郡者歟侯濟南人奉朝命由起居注出守以舊聞小吏多蠧政下車之初即汰之擇之量材用之又從而戒飭之闔六曹操如束濕公勤謹身為率先民有不理於邑赴愬庭下侯聽之惟一二僚屬與聞焉吏無敢庭立睥睨者至於抱案牘署决惴惴焉惟恐或毫髪悞舞文之弊蓋絶無之故善政得以行善教得以施一郡四邑之民咸被其澤視古良二千石無愧焉耳今也以秩滿赴京人皆謂侯能愛民治有成績余則曰侯能馭吏乃深得為治之要故特為序述將使為郡縣者聞之取以為法太史氏采錄為法於後人非徒為我侯頌美而已送金生西上序太學為賢士之闗尚矣洪武七年冬朝命下府州縣學以諸生勝冠者赴國學歴練衿佩之士星聚雲集猗歟盛哉常之武進縣金生希賢由縣赴命請别於予且徴贈言余曰幼學壯行古今一致上之人將使之仕仕乃行其學也士君子欲其仕學俱優卒有成效惟勤者能之尼山大聖忘寢廢食顔問不能曽日三省若是皆學之勤乎周公相國待旦而起陶士行在州而運甓巫馬期為邑而戴星是仕之勤也吁聖賢猶爾况學者乎蓋士之學與仕也猶農夫之治田也彼農之勤者其耕也深其耨也熟其樹藝也必矣時既藝矣乃耘乃耔乃藨乃蓘旱乾則為之溉灌澇則為之决塞沾手塗足搰搰乎斯須不能休故其苗之興也勃然其稼芃芃然其實則栗栗然也及其穫也視惰農之收則倍徙什伯之不同為士而勤其功名爵祿如豐收之農可必也生往拜國子先生暨諸公鉅卿請以是質之茍然吾言生其勉乎哉送葉以恭赴京序士不可窮達論也莘耕之窮達而阿衡版築之窮達而霖雨鼓刀漁釣之窮達而鷹揚之三賢者茍不逢其時則泰然以終其身道之行不行非所計也番陽葉以恭以卓犖之才為張渚批驗所官凡九年日與貿貿焉負販逐利者較什一之征此行道之日乎然以恭公乃心勤乃事皦皦乎九年如一日其道未嘗不行也蓋以恭以前人詩書之澤滲漉肌骨眎貪墨媢嫉者不啻嚇腐之鴟慕羶之蟻耳班資崇􅋻非所論也予老滆濵聞以恭才名久矣今赴調京師適荆溪故人許克敬過予談以恭之賢且與論相古今窮達士俾予筆之持以贈别亦曰堅以恭之志云送陳長史秩滿序古人之以言贈行者尚矣然其言或規戒焉或勸勉焉不頌德不美才器不揄揚名聲視後世立言有不同耳若老聃於孔子之行曰無多言無多事如斯而已夫聖人豈無可頌乎蓋稱頌之辭無益於行有道之士所不為也余嘗於學軒陳公暇日商畧古今清議及此相與太息今公為常州府經歴得代將如京師士大夫為詩為文以頌其五年贊畫之美者衆矣余請以古人一事忠告而期望焉昔趙忠獻以半部論語决大政卒成相業人到于今稱之吁時有古今道無今古居今之世行古之道是亦古人也况公之家學青氊一經淵源有自誠能慎終如初仕學俱進則何施而不可何往而不達哉幸毋謂老生常談而忽之吾將見世之稱忠獻者為公之稱矣送劉文可序洪武九年冬吾友沈子英書來曰文可劉公南雄佳士也為磨勘司掾屬凡若干月所閲案牘疵纇畢舉雖毫髪無遺焉今也書滿而别榮以其吏事之精心目之明雅敬重之求一言為臨别贈予曰傳不云乎胸中正則眸子瞭焉吾雖未識文可視子英之所稱道文可之心可知矣吾嘗以吾鏡觀之百錬之銅瑩若秋水其所照者物無遁形一旦蒙以塵垢光乃茫昧塵垢愈積茫昧愈甚極而至於一物無所見矣詩曰靡不有初鮮克有終故君子慎之夫以文可之心無私欲之弊猶鏡之不塵垢也案牘之謬詎能隱乎雖然百錬之銅能照人之面而已不能照人之肝膽能燭目前之物而已不能燭天下古今萬事之理奚足以擬文可方寸之鏡乎文可持此鏡以陟臺閣慎終如始光輝日新將來聖天子取人為鑑則必置諸左右以輔昭明之治吾與子英軰又當相率以賀之并自賀其言之不誣也是嵗十有二月某日毘陵龜巢老人謝某書送孫太守奔䘮歸濟南序代魏同知作洪武丙辰閠九月既望濟南孫侯某毘陵守之五年聞母夫人即世撤甘棠之説動風木之悲既而雪涕泣具訃告日月上聞衰絰而歸邦人愛公不啻如召父杜母聞公解印綬即相率林立㦸門外翕然而言曰閭閻之甿頼賢守宣皇上德化政無煩苛使得力耕稼供賦税以植其業以畜其妻子非吾民所能為也學校之教頼修廢舉墜使得明教化育人才以展其用非多士能自致也又曰賢守以亷律身馭吏如束濕秉法如縣衡一洗貪墨舞文之弊至筦鑰之細犴狴之繁租庸商征之屬咸得其肯綮而㳺刃焉郡統四邑若網在綱綱或不舉目亦隨之奈何斯言殆欲卧車轍而留也時余忝佐貳聆州人之言若此然論公之才之美又豈苞􅋰䑓笠者所能盡哉公嘗言斷機之訓吾親猶孟母也止酒之戒猶陶母也曰清曰謹為時著稱又豈非崔母之淑元暐乎噫非母之賢不能淑子之身非子之孝不能如其母之志移孝為忠宜其不負聖天子承宣之寄他日大用豈易量哉今觀士夫贈言凡若干篇余以州人之言頗詳且實因摭之以叙編首云是月某日同知常州府事某郡某書續毘陵誌序昔人謂九州之誌言九州所有土地所生風氣所宜也郡誌之作本諸此乎毘陵為古名郡其山川土田風俗名物之屬登載舊誌尚班班可考然由元初而至于今百有餘年曽無紀述之者誠曠典也洪武十年春郡守中憲大夫張度蒞政之初以朝廷命天下郡邑纂修志書於是㑹集耆宿之士稽今訂古博采見聞撰次成帙凡一十巻中間蕪纇踈畧不能無之至若前代闕文則不能妄為之説然時有異同事有沿革因是編而求之亦可以槩見矣是年嵗在丁已夏五之吉郡人謝某序贈儒醫徐士方序余方㨿槁梧玩庭草生意里人萬仲珍過予曰比鎰遘寒疾謁二醫皆危之於是邀徐卿士方眎之乃譚笑間授藥尅期而愈顧鎰蔑以報厥德丐先生為之贈言示弗忘也余曰嘻仲珍何相知之晚耶士方由早晚嗜學渉獵經史若六氣七情之病乎人五藥十全之繫乎醫者已博通之既而以父祖所傳軒岐之書金匱石函諸家之方論旁參曲究以㑹其極且嘗賦遠逰得四方賢師友淵源之懿故其遇疾如庖丁解得其肯綮恢恢乎刃有餘地是豈膚淺蒙昧管窺蠡測者可同日語哉惟其重厚簡黙猶連城之璧混乎碔砆㣲卞和固莫能辨也老子曰大辯若訥大巧若拙士方其近之雖然吾知士方之才不局於是而已必也為時而出康濟斯民卓然為醫國之士斯不負所學也責沈之文吾尚當為仲珍為之洪武十年嵗次丁已六月日謝某撰并書贈刋字闞士淵詩序曰若稽古文字由竹簡以來世之欲傳久而不朽者其惟勒諸金石乎然茍非專其藝而精之敬其事而謹之則所勒有無足傳者矣今觀荆溪闞士淵之勒石也一㸃一畫敬謹之至殆若黙契程伯子作字甚敬之意字書八法秋毫無遺是以我郡守番禺張公特賞識之中書史舍人靖可盧舍人公武亦皆稱美無間然者吁士淵之敬謹如此豈局於一藝之㣲而已哉昔人有言能敬必有德使士淵遇知臼季其必薦之如缺耨也抑予又有説焉昔者安民由知敬司馬公能從容一言於勒碑之頃登載史册流芳無窮其傳世又豈在銕筆堅珉之外乎予嘗嘉士淵之能贈以長句今郡中諸士夫之作者交相揄揚詩凡若干首且俾余之叙焉送王主簿克禮還江隂序人有恒言州縣為民父母蓋州縣之職最為近民撫之字之理宜以父母之心為心愛其民如愛子也然所謂愛者豈其姑息而已哉使其服役於公則如服勤于親授之事而責其成功不棘不囏不虐不苛如是者皆父母愛子之心即君子豈弟之心也古稱召父杜母者其心蓋如是耳以今觀之江隂縣主簿王公克禮其庻乎洪武戊辰春奉令役邑人數千陶于常州府武東簿董之與武進無錫之民夾運渠而陶其負薪芻手埏埴朝夕説簿之賢者矻矻不離口鄰邑之人亦甚稱譽予因往視之其紀律非不嚴也程督非不謹也鞭笞捶撻非不施設也惟其慈威並行寛猛相濟過之小者宥之情可憫者恤之力不逮者濟之豈弟之心常藹然于紀律程督鞭笞之間故蚩蚩之甿感其德忘其勞不自覺其聲之出乎喙也予以是亦從而賢之與之語曰夫縣之簿丞佐其令為一邑之父母也郡之佐貳佐其守為一郡之父母也公卿大夫臺閣守監百執事是皆輔佐天子為億兆之父母也今也簿將歴階而升曰令曰守曰公卿輔佐百執事咸有日矣苟不以民遠而忘宦成而怠則輿人之誦史氏之筆當並傳於時豈召父杜母所能專美彼虐其子而廪焚井溺者抑亦董其善而良焉斯民之幸也簿嘗然予言請佩服今其行故書以贈之送周叔文序古之生子者設弧矢以射四方欲其有四方志也然其親欲子為之者豈遽能盡然哉但立志不凡君子韙之近代若曹武穆試周之日而左取干戈右持爼豆天生淑質志在文武其后出入將相為一代名臣非偶然而致也今觀㑹稽戚先生為叔文贈言謂叔文蚤甚聪慧且好學尤喜讀尚書每開巻則竟日終夕寢食幾廢不啻口芻豢而耳箾韶也夫書道政事叔文喜之其志可知然筮仕以來屢渉險阻特事親以孝行聞或疑未見其聲之焯焯也是大不然夫位有崇卑職有大小能盡厥職斯為足稱姑以目前言之河泊三載洗手奉公所職之具恢恢乎如庖丁解牛刃有餘地使其親不以尸素為憂豆區之養樂於鐘鼎使叔文為雋京兆則平反之政日娯其親又何患無焯焯之聲乎吁丈夫之志有非或人之所知也先軰嘗説善觀花者見根撥而知花品之上下予於叔文敢竊比之贈滄洲生詩序延陵隱君子薛仲𢎞氏以英妙之年能脱洒紈綺氣習絶跡乎京洛塵土讀種樹書結交忘形與臺笠屝屨者伍所居三山湖東南寂寞之濵流水一灣漚沙半席每誦杜少陵吾道付滄洲之句欣欣然若有所得故自號曰滄洲生𢎞之言曰蓬萊十洲學仙者誇以示人且去弱水三萬里之隔其荒唐繆悠而不足信也明矣唐有瀛洲命十八學士居之其地位清絶尊崇顯榮固不易得然一旦牝晨汚衊之辱有不能免者亦非所願也眷兹滄洲有四時天與之樂春水觀魚荷風清暑扣月舷而歌披雪蓑而釣是皆樂之得乎天同乎人亘今古而不窮者尚何覬覦哉龜巢老人聞其言而嘉之與之交而遺之詩曰樂彼滄洲宅爾素侯某水某邱以釣以逰洲之西東三山芙蓉維北維南魚莊鶴林風清月明我揚其舲滄浪有歌或濯其纓不鐘不鼓不鼎不爼優哉悠哉尚友千古送遆知縣父還鄉序嘗觀世俗所謂慈者以其有姑息之愛無相夷之惡而已自秦人慈子嗜利借鋤德色習以成俗恬不為怪于兹有年矣當此之時有卓然能教其子而不淪於習俗者其父之賢為何如哉濬川遆公以其子為武進令不遠四千里而來愛之若欲置諸膝上教之則提其耳然不三月而亟去子欲留養而不可得予以大耄之年獲半面于鄉飲席間從而勸留之公曰吾兒以一介之㣲蒙朝廷錄用長于兹邑若稚孺以負烏獲之任必先也謹乃身公乃心殫乃力規行矩歩以稱職如此則上不負聖天子㧞擢之重恩下不辜斯邑斯民之望榮其身以慰其親吾雖衣敝緼袍猶狐貉也啜菽飲水猶八珍也吾既語吾兒吾兒能佩服吾言則吾歸吾廬何異朝夕視側以享其祿飬之娯乎吁公可謂慈而能教愛不姑息而為時之賢父矣聆公之言覘公之意蓋樂乎其歸而不可留於是酌之酒而賀之曰令有美政民必頌之予將采歌謡之辭筆諸簡牘附黄耳平安之報以報公也送趙縣丞奔母䘮序洪武庚申秋朝命以昌邑所舉趙賢良為武進丞在邑多善政明年夏五奔母䘮而歸士民攀戀有不忍别者丞慟哭而謂之曰比吾父來視予諄諄然以居官律身之法命之且云母氏之訓戒尤多父之歸將以安吾母也烏知未能以豆區之餘為甘㫖一日之奉而吾遽至於斯言未既嗚咽頓踣民亦涕泣而不能留某於是知其母夫人之賢殆不减崔元暐之母也然元暐遵母訓而清謹為世所稱使賢母之名流芳百世非孝而能之乎今丞之孝於母也豈止被衰麻居倚廬不酒肉琴瑟三年而已哉必也居則飬生䘮死以事其親出則移孝為忠以事其君曰清曰謹終始一致㒺俾崔侍郎專美於唐則其母之死猶無死也而可以為孝矣雖然父天之尊巍然在上慎勿哀毁踰禮以貽親憂此又不可不知也贈黄有文序昔聖人垂衣裳以治天下至五色作服則尊卑貴賤之秩章章矣後世於五采之外加之以金此又極其盛而文之然禮法之制惟在上者得全於服御之屬近代以空王老君之尊擬諸王者乃亦得而用之餘則有禁是故以餙金為藝亦鮮而易弛焉常郡黄有文早孤受業厥祖丁時之艱藝用弗售有文能不弛其業而益精之時既太平大江南北數百里凡釋老氏之家交相薦用殆無虚日洪武壬戌春郡城圓通院住山釋壽公作梵宇規置法藏命有文賸施五采糜金而餙之有文若深諳乾毒之教莊嚴相好咸適其宜至若轉藏之神皆金為甲冑威武僇力如風轉蓬俛仰之間光明焜煌儼然為金色界使觀者興其轉惡為善之意吾嘗聞瞿曇有言畫沙童子戲以成佛若然則有文之功亦豈少哉由是釋門名緇及方外能文之士多贈言以嘉其能壽公乃屬予序其事如此余於是切有感焉六藝之教禮樂為今儒門子弟什廢八九其大者有不知金聲玉振為聖學始終之條理其次不能以金匱石室之書為文章黼黻治道甚者金根繆易傳笑四方視有文能世其業寧無愧乎使有文之為藝以彼易此必有大可觀者矣吁可惜哉贈醫士髙彦述序洪武壬戌夏友人詹伯逺書來曰先軰葛氏芳山翁以善治傷寒獨歩江表髙公名德為外孫而受其業青出於藍故當時人謂有秘傳焉今其子彦述業復如之比年以來人之抱危疾以頼全活者累累也如某家累亦屢病屢藥效若響應厥德有未易忘者焉先生為之著述㒺俾越人專美於昔予曰嘻芳山翁予早嵗親炙多聆語言每云素問一經言簡理奥張長沙論傷寒傳變總若干萬言其要在經之熱病一篇六百九十四字而已人能明是經之理則終身之用有不能盡者以是觀之其家庭授受豈外是乎夫彦述之可敬者能象賢以承家學志不自滿外無藻餙不誇張以炫其光怪不圭角以長其聲價嘿嘿乎不易其言謹謹乎不矜其能遇疾則以理燭之如法以治之如由基善射發皆中的觀者或驚異而神之耳吾知其父子所得於葛氏者大經大法如此而已無所異聞也竊嘗以儒者之學譬之論語之書孰不誦讀趙忠獻以是書半部相其君以救天下當是時遘五季之厲羣黎凋瘵以蘇息何嘗於二十篇之外别有所傳授乎他日太史氏采予言而筆之庻以見彦述之學源清流清且一洗俗論秘傳之陋垂芳簡册追配古人亦何慊乎哉贈崑山醫士王彦德詩序世傳秦越人之醫獨歩當代在諸國則隨其俗之所重者醫之或小兒或老人婦女變更以售其術蓋其心出乎聲利之私而人不察也予嘗以是少之一日至崑山友人余彦智謂予曰醫師王先生彦德專科為小兒醫其學有過人者某兩兒患痘瘡甚危觀者縮手邀彦德藥之乃指日而愈酬之幣固辭且曰凡故舊皆不為市利交况契愛如彦智乎由是邑人與士夫咸賦詩以頌其美丐巢翁為之序焉余曰嘻視彦德之心賢於越人多矣人恒言醫之難莫難於小兒蓋稚騃之秋利害有不明言語有不通疾厲易為顚躓猶草木之萌易摧折也吾知彦德方寸之天不蔽於慾一以理之明治衆疾而疾無不治者擴而充之非所難也特專科以世其家耳雖然昔者河西有王豹而人善謳髙唐有緜駒而俗善歌今崑邑有彦徳博學如此尚義如此風聲習氣動盪一方久之則蘭鮑俱化餘波之及薰我晋陵老夫修野史又當牽聨得書以諸詩為張本松菴圖詩序洪武甲子春某以鄒忠公遺文見邑宰河南彭公伯常因觀四栢賦宰謂予曰子知劉司諌之愛松亦如忠公愛栢乎司諌本東原世家今居光州光山縣從祖之故第山有美松心甚愛之號曰松菴比遇知聖天子擢官諌垣謇謇諤諤多裨治道天子嘉之聲溢中外然乃松菴素志也余由是繪山間之松松間之菴求能詩者詠之以寓夫激昂之意敢請子為之序焉某辭不獲雖未識司諌之面以其愛松之心推之可以知其人矣夫松之為物丸丸其直猶人之挺㧞也欝欝其盛猶人之􅅷德也貫四時歴氷雪猶大丈夫之眞節雅操也凛乎趙清獻之鐵面堅乎宋廣平之鐵心殆無過焉卓哉若人深相契合不以山林臺閣之殊而易其素愛之心也昔之人或喜聽其松風或欲巢於雲松或哦之中庭之中或撫之東籬之東是皆愛之於心而所以為愛者不同吾知司諌之愛在乎嵗寒後凋佩孔訓于厥躬吁山花澗草紛紛然望秋而先零者寧不有愧于十八公乎今毘陵士友詩凡若干篇皆想像光山而賦之一旦欽承恩命賜歸莵裘蒼髯白髪相與嵗寒又當别為咏歌持去為松菴壽贈義士池德澄序昔天厯末終人方酣貴富汲汲乎進取德澄先大父秋蟾先生慕老氏之學脱屣家事飄然為方外逰德澄篤於親眷焉撰杖屨從之足跡遍南土名山勝景多逢異人往往得藥術方技以授其孫既而陵谷變遷先生亦從此逝矣德澄今家居東郭混淆闤闠然而喜元談尚髙致綽有祖風頻年復逺逰以適其志趣所聞所見益之廣矣夫以藥術之妙觀之信乎有異人之傳矣同里劉文忠負伯牛之疾者數年屢醫弗痊幾瀕于危一旦蒙德澄療指日而愈酬之幣不納文忠德之需予言以紀其美予曰嘻神農氏嘗百草為醫藥以濟天下後世蓋以天地生物之心為心也近代以來或假是徼厚利以肥其家否則咈然怒望望然去眎其困苦而夭閼者弗恤也可勝歎哉德澄矯薄俗仗義如此故余以義士名之農皇大聖人在天之靈必隂隲以成厥德以博施其義于人人之報之有不止如黄雀白龜而已也時洪武十七年嵗在甲子秋日撰送唐用彰序姬公相成周作禮制大司徒以三物教人即其賢者能者賔興之取士之法蔑以加矣近代以來科目雖多亦彷彿成周之意而已但士之為學於聖人心學之㫖有昧焉故或賢或否如魚目之混驪珠者已姑以一二言之漢之董相仲舒公孫丞相𢎞同出乎賢良方正者而𢎞有曲學阿世之謬唐之韓吏部愈柳刺史宗元同出乎博學宏詞也而宗元有薰附權要之辱至宋三百年文盛之日凡居台輔必用碩儒如司馬温公光王荆公安石張公商英等皆進士而丞相也若王張之屬其學無不精敏絶人豈有不知聖人心學者乎蓋徒知之不能行之則與不知者無以異也洪武甲子秋邑人唐用彰氏以府學弟子員中選鄉闈明年乙丑春二月赴春官大比需言于予予喜其孝弟稱於家謙德著於旦評才華蔚茂而學益脩其大用於明時也必矣請以聖人心術之要曰慎獨曰思無邪曰精一執中三復而申告之惟用彰眞知力行兩輪並進則先軰賢者之勲庸事業我亦可為賀不惟上有以副致君澤民之心而下有以遂顯親揚名之願亦可見不以老生常談忽之也二十四孝讚序人生兩間以天降之𠂻為秉彛之性故能參于三才有感斯應為萬物之最靈者也夫孝乃性中之一事然立身之本莫大於斯故尼山大聖人與髙弟子反覆問答著為大經奈何聖代彌逺風俗寖衰秦漢以來耰鋤德色箕箒誶語者滔滔也甚者至於人其形梟獍其心可撫膺切齒流涕而痛哭者也今觀郡人王達善所讚二十四孝裒為一編其間言孝感之事什有八九且以孝經一章冠於編首蓋取孝通神明一語推而廣之欲使人歆羡而勉於企及於名教豈小補哉或謂重華聖孝千古一人豈宜與泛泛者類稱是固然矣吁達善之意蓋欲攬太陽與月星並照容光焜焜無幽不明老夫儗非其倫辭不達意宜君子無求備焉贈王仲文序洪武乙已秋横山大林菴主僧眞公性存過予曰某重搆菴廬作觀世音菩薩伽山一㑹其上則五雲縹緲佛現全身凡菩薩之衣冠瓔珞靈嵓寶地種種相好咸用金餙其工人王仲文且能運巧思僇力以成其美今其行丐先生一言譽之予辭不獲乃言曰嘗聞瞿曇師有云以畵為佛以沙為墖皆能成道此蓋以因果立説開方便門使衆生由是而入大乘之道自漢以來其法寖盛墖廟像設若繪者繡者鏤玉石者泥塑木彫者從而出焉今性存能以佛之心為心誘人為善莊嚴梵相豈徒美觀蓋欲具瞻者起恭敬心好樂心篤信力行證無上道非因果而已宜乎同袍之士闕曹隨向化之人風行草偃如此其盛也性存然吾言請筆之為仲文臨别贈龜巢稿巻九欽定四庫全書龜巢稿巻十元謝應芳撰疏三教堂修造疏推倒人我山三教一家之意踏翻生死海十方諸佛之心必須無風雨震凌乃可集江湖名勝青山舊隱白馬宏規欲求木于工師湏布金于長者過我門入我室不妨分半席烟霞上我堂踞我床相與話三生風月祝聖人壽報檀那恩元山主造退居疏掀翻黒漆桶舉頭見明月當空跳上白牛車拂袖喜春風滿路毋慅急流中勇為退歩怕從閙籃裏只管鑚頭但給孤舍祇樹之園則摩詰坐散花之室作鐵門限透金剛圈畫圖對緑水青山供養受清風明月應無所住作如是觀大千觀是一禅床但要覺得些安身立命之地百丈只有三轉語必須撞着箇㸃頭㑹意之人了是因縁勝諸福徳梁寳寺修造疏數百年祖師道塲天龍圍繞五七件未了公案歲月因循要令折碓觜花生莫謂冷灰中豆爆有縁相遇何事不成大丈夫直下承當小比丘向前料理試看寳刹勝昔年梁武之時當效華封祝今上唐虞之壽無邉功徳難盡贊揚謝雨佛事疏如惔如焚方慮亢陽之地既優既渥乃蒙甘澤之恩欲報效于鴻鈞敬皈依于象教伏念王某同羽士呉某冠裳雖異鄉井實同有公家賦粟之征無仙子飡松之術望霓蹙額得雨寛心田疇不失於農時溝壑免憂於他曰感造化鬼神之力誦如來秘宻之言開法華道塲設伊蒲法供伏願百靈鍳格諸佛證明雨我公及我私尚求霑足井而飲耕而食共樂豐登更兾萬邦之咸寧永頼一人之有慶謝恩誦法華經疏朝廷推曠蕩之恩饑饉處税粮全免官吏執偏私之見施行間荆棘横生欲徼福於百靈當投誠於三寳事雖不遂心曷能忘切念某等欽觀詔條可霑徳澤赴愬為七鄉之衆奔馳歴半載之餘公乎私乎自謂上天能鍳仁者知者皆云不日而成雖一時遭毒歛之蛇或他日得塞翁之馬掃除梵宇持誦真詮二十四人同演法音六萬餘言重宣妙義設香花燈燭之供奉天龍鬼神之靈上荅聖恩下祈民福伏願一人有慶四海攸同大臣以道事君㒺敢咈􅁝綸之命庶人召役則往將來免粟米之征時和歲豐天長地久誦法華經疏作善降祥上古之書埀訓供佛有福法華之語流傳欲報徳於百靈用投誠於三寳伏念某戸門孤立租賦交征為公為私寧無過咎有財有用幸遂經營居之安而資之深災不生而禍不作荷天錫福靡日忘恩擇三五之良辰禮大千之諸佛肅陳清供敬誦真詮伏願慧日照臨神天感格吾老及人老家家無凍餒之憂新年勝舊年旦旦有平安之喜作佛事謝聖恩蠲租疏官賦半蠲欽奉九重之詔聖恩難報皈依三寳之尊敬爇清薫俯陳丹悃伏念某草茅雖賤稼穡維艱幸蒙曠蕩之恩又獲豐登之嵗倉箱頓滿饘粥可供盡力催科喜輸官之易畢中心報效感聖代之難逢仰祝皇圗䖍修佛事伏願一人有慶萬壽無疆乃聖乃神乃文乃武聖德合乾坤之大自東自西自南自北清光瞻日月之明結社畫凈土疏嘗觀釋迦世尊説西方淨土教人念佛真方便第一義今欲依阿彌陀無量夀二經畫寫極樂境界仍遠法師㑹一百二十三人結為蓮社瞻依寳地修行净業凡我同盟作成幸甚西方國過十萬億有極樂世界九品生花東林社有廿三人與圜悟祖師六時行道兹欲精修凈業亦須遠效前賢想像玉毫荘嚴寳地非助我者孰能為之孔方兄肯為結縁呉道子便教著筆有色無色有相無相看諸佛之本來面目如何先覺後覺先知後知見一頭之湼槃妙心方可頂門具眼言下㸃頭海印菴起山門疏遍大千界未嘗無見性成佛之人入不二門方得箇安身立命之地希升堂必開戸牖為巨室必使工師敢告諸賢用求多助老僧作鐵門限儘教雲水往來世尊放玉毫光轉見山林輝赫大開方便是名莊嚴請誌寳長老掩壙疏為馬鬛封痛念慈親之歿作獅子吼願聞開士之言陟彼屺兮切有請也㳟惟某人談空説有窮深極㣲恭透禅機面少室山中之壁得來佛法傳黄梅嶺上之衣五藴皆空一絲不挂哀哉無恃幸爾有縁願師乗出岫之雲為我送落山之月覆將香合子超昇在一轉語之間作箇土饅頭安穩於九重泉之下勿孤申請顒俟降臨待雲菴雕觀音疏念彼觀音本自尋聲救苦如是信解何妨粧假成真看良工刻畫之奇即菩薩化生之妙大檀越以七寳布施紫竹林現五色毫光龍女獻珠鸚􅛥聽法瞿曇老千百億化亦須現光明之中善財子五十三恭管取在皈依之列其為福徳難盡贊揚請蒋居士造諫壁橋疏編竹渡蟻隂徳猶多乗輿濟人傳名不朽况此河梁建造兼之佛閣莊嚴必須有力量人了此大因果事某人荆谿秀氣竹逕遺風江水汲乾無一老㸃頭印可湼盤鑚透不二門信手掣開尚古人淳厚之風絶時俗浮華之態積而能散綽然有餘人皆仰之切有請也睠兹諫壁實乃要途爛月一舷毎横舟於野水埀虹千丈欲砥柱於中流惟其成此飛梁從此免令病渉蝀挿天鯨跨海兩邊鏁三尺闌干簾捲雨棟飛雲就上搆七重樓閣如斯福徳難盡賛揚請蔣月堂建奔牛橋疏古堰横奔牛漫有前賢之句過橋乗駟馬方無病渉之憂必得其人庶成乃事某人為善最樂見義勇為廣造輿梁不特濟人於溱洧多佟塔廟尤能事佛於祇園聚福海由歴刦之修登彼㟁乃平生之願難兄難弟均懷編竹渡蟻之仁賢子賢孫綽有跨竈過父之美鄉閭稱善湖海知名睠此官河實為孔道當一市人烟輳集通四方車騎往來每遇斷橋如隔弱水不有填河之鵲又無跨海之鯨欲得安行必須改作甃鱗鱗之萬甓䕶曲曲之廻欄車流水馬㳺龍聽揚名於道上月出雲虹飲澗看横影於波間慷慨承當咄嗟可辦置供佛花板疏獻花發善智之心因縁不昧刻楮用宋人之手工巧難成必湏上根噐人㑹此好因果事胷中開發筆底化生非莊嚴是名莊嚴此福徳勝前福徳看他枝葉似優鉢曇佛士之養為我苾芻作阿羅漢人天之供天惠寺請愚隱長老開山疏閶闔城萬竈􅆛貅多依佛刹給孤園七寳樓臺大闡禅闗誰其尸之曰有人矣某人機鋒不露道價彌髙若王侯将相往往歸心而淮海魚龍時時聼法慈悲願重救群生於刀鋸斧鉞之間常寂光明悟真空於文字言語之外逢塲作􅃧到處為家必須竪硬鐵脊梁庶不負布金心地久矣暗中摸索宜乎直下承當三千年河水重清唱開元太平之曲二六時天花亂雨入如來般若之門拈一瓣香祝九重壽請亮西山住天慧寺諸山疏佛法全盛以來在處有珠幢寳刹世道多故如此其誰能玉振金聲聞斯行之可為難矣某人頂門具眼鼻孔撩天數千巻貝多葉迷人都成一笑五百歲鉢曇花瑞世自得单傳悠然卧北牕清風久矣挹西山爽氣來此矻中流砥柱我亦分東壁餘光葭樹相依鼓鐘交作如如不動黒漆桶盡底掀翻綽綽有餘破紬襖為他重著慈悲廣大慷慨承當天惠寺請亮西山住持疏嚼啐鐵餕饀有幾人氣味相投搭著金伽黎二千載風流尚在顧天惠以記公刀尺政日來立百丈繩規去欲息肩來當接踵某人潑天聲價立地機闗捋猛虎鬚早歲入曇華宻室揮白麈尾前時坐三槐道塲邉逢雨横風狂便欲山深林宻如明月暗投者久亦陽春寡和而然闔閭城突兀叢林任天惠姑安虎旅午橋荘往來雲水聼雷音皆上龍門三呼北闕聖人一示西來祖意方外交送愚隱師住萬壽寺疏禅月道塲為吳下叢林之冠凌霄法窟得淮南老虎之孫惟其祖武能繩可使家聲復振象龍雲集林壑風生某人如愚不愚以隱無隱所見即大乗境界其行皆實際工夫出入干戈曾救百萬億顛厓之命扶持宗社實有三大千恒沙之功故名公鉅卿多以為師而諸子百家亦來問道今方外舊逰相慶了箇中大事因縁雖碧雲之出本自無心然白雪之歌莫非古意昔萬壽今萬壽祝聖壽之無疆彼一時此一時将盛時之重見方外交送毅剛中住承天寺疏峙䨇峨石古道塲金布祇園示一指禅衆僧寳珠還合浦頋馬齒掩嘉蔬之久如麟膠續斷絃之初惟得其人廼宏斯道某人曹谿正派淮海名流天下壯遊所至奏陽春白雪山中舊隱向來分明月清風南楚翁謂青出於藍北山老喜抜茅連茹當此猊座重敷之日實為象法中興之秋王公大人既為更張天龍夜义必加擁䕶菩提樹纎塵不惹初無今古之殊優曇花滿地還開聿見禎祥之意續燈諸祖祝聖萬年新創水雲庵疏鹿苑二千年河沙界多興佛刹龍江六七里水雲鄉宜建法幢布金地既已現成卓錫泉葢将湧出權輿自我恢拓在人振雷霆鐘鼓之音接雲水瓶盂之衆弹指頃要開樓閣筆頭邊當落珠璣長者布施七寳羅漢身何必朝西天而暮東土華封殷勤三祝聖人壽正須望北闕以頌南山福有所歸恩無不報方外交賀顔悦堂住徑山疏展開一坐具視十方皆䨇徑道塲扶起大法幢障百川為中流砥柱惟烏獲可勝重任如鸞膠能續斷絃既得其人必𢎞斯道某人徳尊一代名徹九重金伽黎著處雨露猶香玉麈尾揮時人天交敬賢相君問西來祖意針芥相投正法眼得東璵親傳鉢花重現連歩上凌霄絶頂先聲至頑石㸃頭變瓦礫作七寳堦墀還成鹿苑滿虛空見五雲樓閣永鎮龍宮鐘鼓雷嗚缾盂星集士大夫期望如此者久矣佛世尊受記如彼者存焉只有天在上更無山與齊此地真為峻絶雖知燈是火不悟鐘非飯吾儕是亦知歸亟奉賀言尚圖宿覺東隱菴化齋糧疏世尊遺教每朝令乞化七家衲子坐禅在處要供需四事東隱菴雖云草創西來意正欲同參必先為餬口之謀乃可得安心之法三條篾𦂳縛腹此蓋藥山老特地求奇五斗米嬾折腰是亦栗里翁有田可恃必須盃盂裡喫見成粥飯乃可蒲團上做著實工夫願諸公欣欣然指囷看大衆兀兀乎面壁攪河成酪待他時節到來運水搬柴是我神通妙用常當飽徳誓不食言化募畫十王等像疏數百年水陸科儀廣傳緇素三千界鬼神情状妙入丹青看天堂地獄之不同使鐵心石腸之俱化莊嚴如是因果何疑欲得吳道子筆下通靈必藉孔方兄眼前助力有相無相非無相直須是得兎忘蹄大乗小乗最大乗更不待畫蛇添足諸公具眼為我㸃頭西歸菴化齋糧疏一把茅葢頭即不免隨縁安衆三條篾縛腹豈盡能為道忘饑欲安廼心必餬其口望檀信舉指囷之手令木魚作呼粥之聲凡釡中爛煮虚空僧堂裡儘留雲水佛世尊著衣持鉢幸傳流如此家風龎居士運水搬柴但作用無非神妙施當有報誓不食言千墩寺造木橋疏編竹筏而渡蟻猶有隂功造輿梁以濟人豈無因果千墩浦素為衝要駟馬車孰不往来惟相逢一笑揮金可便使群工斫木試看流水即跨長虹澱山湖水國人家自是生成圖畫趙州老石橋公案别當拈起話頭了是因縁勝諸福徳大祥薦父水陸道塲疏代徐伯樞薦父徐太中作喪不過三年鞠育之恩㒺極佛能度一切慈悲之願𢎞深俯瀝丹衷仰干皇覺伏念某顯考某官搢紳推重䑓閣蜚英立身揚名以顯其親賣金買書而傳於子赤心報國居京師為三品之官白骨他鄉頼朋友掩一抔之土死或悟空花之幻生豈忘風木之悲􅆘亂離而蒲伏莫前非涊淟而劬勞敢負旅櫬雖藏于東薊神逰當往于西方祥􅎭日臨緇衣雲集吹螺擊鼓熏修按水陸科儀掃地焚香禮拜作天人供養伏願一靈感格諸佛降臨執金剛臺接引至七寳金沙之地瞻玉毫相化生託四色車輪之花凡在幽冥悉皆超度水陸道塲榜同前今據某郡某州某鄉奉佛弟子徐某及弟某等投誠伏為顯考太中大夫中書户部郎中徐公不禄以來致䘮三年禮冝除服追念父恩昊天㒺極取至正二十一年十二月廿六日為始啟建冥陽水陸大齋三晝夜藉此良因用伸超度道塲法事條具左方喪制有終人子念劬勞之報法門無量世尊埀慈愍之仁故𢎞開水陸道塲乃大集河沙功徳天龍圍繞嶽瀆感通今齋主徐某等念先君壽五六十年生斯世成百千萬事官居三品名聞四方衣紫隨朝所存者致君澤民之志焚黄先世且及乎封妻廕子之榮痛憐客死于京華欲得神遊于淨土廣邀緇侣䖍禮金僊琅函展貝葉之文鐡鉢供伊蒲之饌香雲縹緲花雨繽紛樹燈懸明月光阿鼻獄爍開幽暗斛食施甘露味尸陀林充滿饑虛凡所謂六道四生皆于此三皈五戒是名無礙以濟群生其齋主當盡乃心我清衆各修厥職有感斯應無願不從徐公百不憂方直徃於極樂恒老三轉語更何在于多言無間寃親俱能解脱廣濟菴道者化修造等縁事疏瀕湖祇樹園林刼灰久冷大地襍花世界佛日長明三條篾縛腹𦂳做工夫一莖草璚樓須教出現分甘古井總是醍醐想像靈山粧成寳地無孔笛要聲諧律吕有髪僧當力効殷勤諸公從筆底落成不日見眼前突兀燕雀相賀龍象群居比邱衆千二百五羅漢重宣般若方丈室八萬四千師子共禮維摩壽祝楓宸福歸檀越蛟龍菴塑觀音等像疏觀世音七佛之師神通具足阿羅漢諸天之衆在處依歸今欲令粧假成真奈不解將無做有諸開寳藏滿載鐵船對長洲茂苑之江山作補陀落迦之境界願菩薩三十二應刹刹度人看善財五十三參時時見佛相逢具眼必為㸃頭忠清院修造疏忠清公宇宙隔越猶奉烝嘗瞿曇老風雨振凌豈容坐視雖曰即心是佛也須開口告人小苾芻固碌碌不才得錢米則多多益辦八萬四千修月斧儘爾時匠石呼來百千萬億恒河沙願施主福田増廣但蒙金諾即注銀鈎萬峰菴修造疏半夜傳衣諸佛祖當時道在九年面壁小禅庵近日人多本來無鏡以無臺亦合肯堂而肯構工師求木非赤手而可圖長者折枝須㸃頭而相許金錯刀作成有用鐵門限凖備都來雲水依歸天龍擁䕶横展布金之地大開選佛之塲竪起硬脊梁每日坐三條椽下掀翻黒漆桶大家上百尺竿頭壽祝楓宸福歸檀越化城菴鑄銅鐘疏舊用鐵今易之舊錯聚六州之鐵久已知非新鐘鑄萬選之銅今將改作惟檀越共為爐鞲而蒲牢即出範圍作興禮樂於山林號令人天於夜旦山鳴谷應八百聲吼動鯨音月落烏啼三千界喚醒塵夢佛㑹祈禳疏時和歲豐喜見昇平之兆天高地逈難酬覆載之恩感仰鴻鈞皈依象教切念某等或僧或俗為里為隣田疇蔑水旱之虞邊境絶烟塵之患物無疵癘家用平康䕫蚿如此其相憐豺獺豈忘于報本莊嚴寳地諷誦琅函遍禱之天地神祗同鍳此河沙功徳伏願一人有慶萬邦咸寧日斯邁月斯征立見秋成之富災不生禍不作羣居生計之安化衣缽疏世尊入舍衞城也須持缽祖師過大庾嶺先已傳衣惟二者之得兼乃一生之可了奈罹兵燹俱化刼灰令干求衆檀越相成庶圓滿小苾芻所願一缽在手三衣稱身海上降龍使可比六通羅漢山中禮佛更不霑半㸃塵埃由此成功誓將報徳法華經㑹疏為陵埜卿等作世尊千百億化愍大地之衆生法華六萬餘言有恒沙之功徳欲慿資報是用皈依切念某等忝在人倫幸叨佛庇天地為之覆載風塵迨乎廓清擇暮春望日之良辰建同社常年之勝㑹三周七喻齊演梵音六道四生俱聞妙法供陳脯笋香爇旃檀頼象王願力之𢎞深感龍天鬼神之歡喜伏願潜銷黒業復見清明熾而昌壽而臧户户獲康寧之福災不生禍不作年年遇豐稔之秋化修造疏西歸菴勤上人冩金字法華經化修造及増盖觀音殿有漏無漏硬脊梁撑住虛空前三後三爛葛藤掃除風雨要此屋似銀山䥫壁問誰家無明月清風孔方兄但為㸃頭公輸子便教動手敢持貝葉用告恩檀黄金字冩七軸蓮葉藉妙法河沙願力白玉毫現諸佛菩薩看圓通宫殿隨身是名莊嚴勝前福徳散花文為恢上人作夫散花者心地栽培善根滋長春生金剪枝枝奪造化工夫香滿錦堂朶朶作人天供養如風飄墜似雪繽紛優缽曇大地皆春曼陀羅從空亂雨昔天雨散之維摩室中者此也我世尊拈于靈山㑹者同乎勿云色界迷人正要頂門具眼肇自一花而五葉皆為同氣以連枝欲了知是色是空須㑹得無聲無臭桃紅李白河陽縣車馬塵多魏紫姚黄洛陽城綺羅香溷曷若傾葵心于佛日乃蒙盼蓮目于慈雲想像金園莊嚴寳地千江水見千江月共看法性圓明一片西飛一片東當悟色身虛幻其為因果難盡賛揚募長明燈油疏宻地工夫不用説石窻油盞普天照耀要单提露桂燈籠老苾芻畧用吹嘘大檀越正湏傾倒膏馥沾溉因果分明二六時中常剔起靈光一㸃三千界内總利他癡暗衆生西歸菴修梁武懴疏空王為象教之尊慈悲廣大懴法脱蟒形之苦因果昭彰既響報于昔年宜精修于今日即蘭若皈依金相為檀那宣演琅函必須衆力維持乃備諸般供養作功徳海開解脱門娑婆世間滿眼是誌公和尚忉利天上舉頭見郗氏夫人福徳無邉讃嘆難盡二聖院浴佛疏九龍水浴紫金身慶西方聖人初度二聖菴結白蓮社繼東林遠公道塲想像毗藍皈依極樂大檀越隨喜布施小比邱如法莊嚴諸塵非塵是名微塵清净身本無塵垢憶佛念佛必定見佛廣長舌同演佛音幸發心花共成因果滄洲菴修造疏本菴艸創之初事有未備兹欲葢造前軒裝塑觀音聖像晨香夕燈修行凈業端為祝延聖壽上報四恩旁資三有敢望諸大檀越相與作成指􅅒揮金多多益辦挿竹建精藍鎮蛟鼉之窟宅開花成結果展龍象之法筵莫謂滄洲菴小小規模要作補陀巖巍巍境界軒開寳地像塑珠纓惟諸公同為結縁則良匠皆能呈巧莊嚴相好非莊嚴是名莊嚴福徳因縁此福徳勝前福徳功歸檀施壽祝楓宸化城院募縁疏本宅以下元令節啟建念佛道塲與諸上善人同修凈業所用香燭齋供之儀望樂助焉其為因果葢有讃揚難盡者惟好者領之叅一指禅本元元坐三條椽下念幾聲佛要人人生九品華中當此下元敢提前話舉赤手欲諸般辦集用青蚨須衆力圓成香火焚修人天供養看西方極樂世界只在目前比東林祖師道塲亦非分外願言向道請為結縁千墩寺翻葢大悲殿疏延福寺襟江帶湖梁天監之年逺矣觀音殿震風凌雨魯靈光之狀巋然雖千手千眼乃吾佛化身然一瓦一椽皆衆人願力因縁有遇修證何難磨磚時用南岳工夫加泥處㑹古靈說法即有漏而無漏在求仁而得仁寳葢珠瓔瞻妙相於㫋檀林内金螭䥫鳯展畫圖於秦柱峯前壽祝楓宸福歸檀越齋僧簿叙别徑山興聖萬夀禅寺徒弟淵切見宿生多幸沗與僧流道業無成四恩㒺報謹以平昔所受信施之資自四月八日為始齋僧千員每員銅錢四十文為一飯之供敢望各題芳字以滿區區之願云出家以六和為尚勉守清規傾囊與衆人結縁願酧素志效减米同舟之意助折蘆渡水之行一千員白足倘過茅菴四萬箇青錢聊供蒲饌東手來西手去免虛孤信施之恩左畫圓右畫方請連署題名之筆佛日照鑒宗風振揚釋氏舉棺文代昇東爲衡母作佛説西方極樂邦大千沙界更無䨇諸天接引移蓮歩認取光明大法幢恭惟某人現婦女身生娑婆世不宿業八十幾年之内發三菩提心慕樂土十萬億國之西念阿彌陀佛三從不失五戒能持子行孝而暗合禮經婦服勤而俱無誶語愛男孫女孫之親意毫髪無偏待姻黨鄉黨之真情骨肉相似報縁斯盡享福亦多到這裏葢棺事定正要脱灑出門超凡入聖咦一脚踏翻生死海逍遥直上九華䑓活套起棺文代呉彦徳作野花繁盛不多時明月團圓亦易􅉻一竅鑿開方寸地百年生死了無疑恭惟某官天性髙朗心地坦平精勤六十五年料理百千萬事嗣祖宗之基業實為有光了男女之室家皆如所願到這裏出門一句要説到佛老氏未曽說處神鬼皆聼㑹麽自古斯民行直道青天白日甚分明剃僧頭致語然解脱香㸃光明燭恭請十方諸佛説法度人要人之四大幻身脱塵離俗煩惱根盡皆除去菩提樹自此員成伏願法嗣興隆不負真如之印宗門光顯能傳無盡之燈詩曰煩惱根生歴刼前如今盡落寳刀邉頂門露出金剛眼照見三千及大千募縁造藥師琉璃燈疏諸佛開方便門救衆生之苦楚歴刼轉光明藏破六趣之昏迷藥師燈宜用於道塲桑門氏合營其法具煌煌火樹欲他因地移來朶朶金蓮自我心花發現惟金諾一揮大筆便玉成數尺長檠毋論㸑蠟之齊奴絶勝燃犀之温嶠膏澤注琉璃盌内恒沙佛同放白毫恩光分阿鼻獄中大地人皆除障業功成普照福有攸歸薦父醮詞親恩㒺報勉為改葬之圖道力可慿敢有超昇之望俛陳丹悃仰徹𤣥穹切念先考某官蚤稱善人晚罹惡世羣雄血戰故避地于湖南一旦身亡乃迷塗于道左以兒女室家之相失豈衣衾棺槨之能周茶毘近效乎緇流煉度全慿于羽士櫝藏神主地易佳城設齋醮於新居薦英靈於仙府十極之髙真降監九原之幽滯同升伏願天得以清地得以寧由是魂升而魄降父止於慈子止於孝庶幾本立而道生存殁俱安幽明無間妻亡終七日設醮疏失内助而興哀音容如在祈上蒼之埀愍魂魄超升俛瀝蟻忱仰干鴻造切念忘室王氏自少結髪至老同心亡正室側室之尊卑渾無妬忌均養子庶子之親愛皆盡劬勞諧和而處者閲三十餘年頃刻而亡者又四十九日蝸居設醮羽士朝真誦靈寳之妙經獻齋厨之清供伏願蒙恩三境超度一靈脱跡塵寰棄絶人間之事標名仙籍逍遥天上之逰早壇辭上天之載廣大難名如日之昇昭明無際雪手香花之供星冠玉筍之班伏願三境巍巍並降臨於下土萬靈奕奕咸拱衞於中天午壇辭日之方中式瞻光耀風斯在下重覲威顔心傾葵藿之誠躬致蘋蘩之薦伏願恩覃九域均蒙化育之仁澤及九泉㒺俾沉淪之苦晚壇辭日之夕矣禮益宜勤天可必乎善無不報仰止九闗之望肅然三接之儀伏願浩浩其天鍳悃誠于方寸昭昭在上降徳澤于幽𡨕幽醮建壇詞為王文父作凡五首兩䘮終制靡忘追逺之誠百拜籲哀敢瀆盖髙之聽肅瞻金闕肇建瑶䑓絳節下臨緑章上逹巍巍蕩蕩洽大徳于寰區窈窈㝠㝠度幽魂于泉壤早朝詞明發懷二人恐淪酆土齋沐祀上帝祗仰鈞天昭對威顔備殚悃愊伏願維天之命恩光被于重泉如日之升魂氣超于清境午朝詞日之方中祥輝廣被道之云逺仙仗遥臨載伸對越之忱庸表䖍干之義伏願清都洞鑒共循晝接之儀幽壤超升永脱昏迷之境晚朝詞日忽忽其時暮深念幽𡨕皇剡剡其揚靈允能超度惴焉三瀆仰止九天伏願黒籍銷名長夜脱沉淪之苦丹䑓受籙熙春樂道徳之言青詞甥姪銜哀先後七旬而無怙聖賢垂訓古今三載以終䘮俯慚悲悼之忱仰徹穹窿之慶伏念先兄某創業歴腁胝之苦黽勉成家妹夫某贅居為骨肉之親始終同㸑幽𡨕隔世祥禫踰期縁歲凶重困征徭故日久有稽薦抜爰慿羽士式演真科三熏飛奏其緑章諸孤泣除其素韠不違天于咫尺如履氷而戰兢薦父幽醮建壇詞為王敏孟學作陟岵興哀欲報劬勞之徳籲天歸命庸伸薦抜之誠俶建瑶壇式敷珠笈伏願罪除黒籍名署丹臺零落歸邱山悟人間之夢境清髙隔風雨遊天上之仙都薦父青詞子養親不待深負劬勞日邁月斯征遽經祥禫對越虎闗之遠敬陳蟻悃之誠伏念某先考某質直一生辛勤多故仰事俯育盡心堂構之謀朝出暮歸殚力户門之役訓子觸屏而無怒賔妻舉案而甚恭忍棄諸孤倐逾三載雖雪衣之已釋奈風木之堪悲所兾超昇有嚴醮事伏願帝鄉可到仙靈必通逰白玉京行矣跨吹笙之鳯朝紫金闕飄然往飛舄之鳬醮星青詞代陳子純為弟禳疾作天有六滛疾病多由于感受星羅萬象吉凶或繫于運行稽首瞻天傾心告斗伏念某弟某一身多病數月弗瘳手足拳攣動若太山之挾胷膈否塞梗如雲夢之吞敬修清醮于生辰敢乞洪恩于列宿伏願璣衡照鑒瑶闕感通徳星聚太邱憂者樂病者愈熒惑退三舍居之安資之深幽醮薦父青詞子養親不待難酬㒺極之恩民欲天必從敢徹盖髙之聽蟻忱所禱虎拜具陳伏念某同弟某父殁踰一十五年深負終天之痛母喪畢二十五月又逢忌日之臨怙恃俱無劬勞曷報爰慿道衆式演真科區區盡對越之誠切切有超昇之望伏願千真列衞九老啟途左畫圓右畫方變化五城之境東王公西王母逍遥三境之天道士化法衣疏神仙足官府追陪長用鞭鸞海圗拆波濤補綻豈宜顛鳯黄冠空戴藍縷包羞必湏着紫霞衣乃可立紅雲殿窮道人不妨鈔化富公子當為作成曵月出門待金闕曉鐘之後擕烟滿袖拜玉皇香案之前報施主恩祝聖人壽請曹月湖舉棺疏蓋棺已矣生死關未脱塵寰出門何之神仙路豈無㨗徑敢煩指示庶獲超昇恭惟某人和光同塵尊徳樂義一襟湖海湛如明月澄波三尺風雷閒與孤雲出岫嗟我雁行之相失煩師鶴馭之寵臨説破𤣥闗大道只消一語喝醒凡夣飛魂直上九天請鄧混然起棺盖棺雖定莫酧母氏之恩抜宅無縁那到神仙之境必求髙士為指迷途恭惟某人和光同塵出類抜萃發揚宗敎混混然活水之源㳺戱辭章蕩蕩乎春雲之態簮星曵月乗虛御風仰希鳴珮之臨分付出門之語喚醒濁夣俾聖善之超昇飛上清都庶精神之不死再拜稽首萬望㸃頭代仁惠觀請周彦忠孔李通家之交盖由道義楊墨歸儒之道必頼師模誰其尸之曰有人矣恭惟某官才髙時軰譽藹旦評濂學家傳不剗牕前之草唐詩句好能吟觀裡之桃來坐臯比行看豹變某强名曰道主善惟師敢期如大匠誨人幸勿拒童蒙求我道其道徳其徳應慚所學之不同歩亦歩趍亦趍但願其徒之速肖代歸真觀請孫伯昭寄老子法中强名曰道誨諸生舘下主善為師久欲依歸敢云招致恭惟某稽古䆒春秋之學蜚英冠月旦之評不惟獨抱遺經抑且旁通百氏𤣥都賦種桃之句足擬唐人山隂冩籠鵞之經可同晉帖平居養素尤善談𤣥才名三十年未嘗厭廣文之飯扶揺九萬里尚肯為逍遥之逰大噐晚成英才樂育如某者仰如山斗居此瓮天墨歸楊楊歸儒曽聞其語士希賢賢希聖實慕斯文敢設坐氊以迎敎鐸孺子或容其進履相儒可隱于書堂澹泊相忘清虛共守道其道徳其徳小哉坐井之觀歩亦歩趨亦趨瞠若絶塵之後獻芹申敬鑒茹為榮虀菴疏為江叔亷作潦到餘生三百瓮寒虀未了流離數載千萬間廣厦誰依菴居卜築于江湖土著便同於鄉里竹開三徑藤㓨四簾惟諸君贈草堂之資則老我得莵裘之計脱粟飯視同珠玉苦菜根嚼出宫商養藜藿之幽姿變膏粱之舊習落成有日座中約青州從事交驩繼美當年杯後為冰壷先生立傳帡幪有自感戴奚忘壽寧寺請源别流住持諸山疏嵯峨古塔䨇尖挿霄漢之間蕭瑟禅林一變經烟塵之後念正法凌遲者久待偉人振厲而興某人豎硬脊梁有大力量宗門下識時俊傑緇衣中少年老成從金山躍龍門如神黿鼉鼓舞對劍井坐猊床説法猿鳥依歸能于此扶顛持危乃卓然出類拔萃烟霞接境庶幾分東壁餘光雲水滿堂相與挹西山爽氣式修鄰好益振宗風方外交疏比年以叢林凋謝恬養者多望望而去今吾别流源公以壽寧禅寺禮聘之勤奮為兹山領袖真可謂以道自任者也吾黨之士深用賛歎敬緝儷語以效燕雀之賀云千丈渾寸膠難澄久傒河清之日百鳥鳴孤鳯忽見将來道泰之秋顧兹山並立浮屠由前代特稱名刹駕言𢎞道允在淂人某人學有源流名揚湖海妙髙臺了翁法窟如青出藍毘陵郡新興道塲如風偃草逰􅃧卓水雲之錫棲遲横野渡之舟末法中為宗門棟梁知音者歎朱絃疏越堂前露柱明明為諸佛放光塔上風鈴亹亹與衆生説法華亭縣請仁伯靜住宣妙寺山門疏鳴百里之絃歌固云在我振叢林之鐘鼓正在得人由諸山鶚薦而來宜千仭鳯翔而下某人崑邱産玉合浦藏珠蚤遇作家函丈入澤公之室中居報國法筵提智者之綱仁者靜固其本心道之行綽有餘力望雲出岫如月當空虛室白生即洞逹光明之藏華亭清唳亦宣揚微妙之音聖壽萬年法輪三轉諸山疏同前繼三支而稱博學逺躡遺蹤用一䕫以作大章足知雅曲時則可矣聞斯行之某人冰雪丰姿江湖襟度執經問難遍叅諸老之門領懴司賓兩秉叢林之政蜚英聲于方外展濶歩于雲間踞鳯凰山作獅子吼天髙地逈靣九峰翡翠之屏月白風清目三泖水精之域方外交疏送大雲講主權住福壽院福壽禅院者錦溪之佳處也山中耆舊以主席不宜乆虛力請我大雲和尚居之事雖從權而林泉頗為増重吾黨亦可尋盟蓮社矣持一瓣香綺語以賀山不在髙安静處卓飛空之錫老當益壯談笑間用合道之雄暫踞猊床横揮麈拂某人春秋八十功行三千竪𢎞教硬脊梁得天台真骨髓慈雲廣大諸方蒙教雨旁霑智月圓明在處有人天交贊鐘鼓震錦溪北栅衣冠比廬阜東林或疑為入谷之幽自謂作逢塲之戱法雖修于出世義不失于隨時當此黄楊厄閠之秋乃有白蓮結社之日魯司㓂攝行相事曽三月以成治功逺法師影不出山且六時而修淨業薄言燕賀永締鷗盟永安院尼請禅老興正宗住持疏余曩歳以衣缽之資檀施之力創造本院年今八十有六力不能支且無法嗣是用以一應恒産捨為十方禅刹恭請紹隆正宗和尚入院焚修接納雲水契券雖明禮宜疏請昔天竺第一代祖師得度頼阿難之力今震旦徧十方禅刹流傳皆逹磨之宗欲改換其門閭宜選擇乎領袖位須徳稱道在人𢎞某人學有淵源名揚湖海千巖篦刮目謂能承鐵壁箕裘一把茅盖頭又多挹玉峰温潤撥慈航過來不逺将法幢扶起何難雲擁猊床風生麈拂泗橋流水喜縈囬説法之塲祇樹獨園當恢拓布金之地香捻一瓣壽祝九重真武經堂㑹置田疏代張伯祥作某将建真武道堂為吾黨月㑹清修之地築室塑像勉當獨為預置齋田敢裒衆力惟諸君領之上真𤣥聖揚靈足踏于龜蛇下土蒼生報本心同于豺獺擬一已力營真舘率諸賢預買祊田年年得黍稷之馨日日奉蘋蘩之薦永言祭享賴此膏腴作善則祥不善則殃此體物不遺之妙同盟之人既盟之後正自求多福之秋筆底揮金隴頭種玉置草堂疏代施天朋作某久客横塘視同鄉土業欲築室于此圖将老焉敬惟諸君子夙昔庇士必賜作成修辭抒情不自覺其抽黄對白也仲宣依劉荆州慷慨作登樓之賦子美詰王録事殷勤覔艸堂之資盖依仁乃客子之本心然芘士實故人之髙誼孔方兄但能助力公輸子便可成功鶴帳弗空莵裘可老厦成而燕雀相賀喜化日之初長門髙而車馬能容看徳星之常聚帡幪有造感戴奚忘方外交疏予生寡諧俗特於方外髙識之士樂與之㳺若我雪心和尚前居南山相好為忘年交今主領天寧禅寺緇素歡欣山林徳色予于是緝數語以頌其美以抒其交情云齊雲古佛刹留泗州僧寳之衲衣慧日大法門為常郡禅林之冠冕稱其名宜有其實𢎞其道必得其人恭惟顯公禅師妙年老成奇噐卓犖入松林室中布毛吹雪傳無盡燈坐楞伽峰頂麈尾生風握真如印如巻舒于前日大展布于斯時金斗城圖晝天開䥫門限搢紳雲集爾乃竿木逢塲而作戱我豈燈花有約而不來青青翠竹欝欝黄芽聽法皆能㑹意巍巍髙山洋洋流水知音當為㸃頭燕賀聿修鷗盟永好招魂致語為隂陽正術呉彦徳作伏以狐正首丘凡物有本原之性鶴歸華表雖仙亦故里之思三魂或散于異鄉一念可通于八極焚香拜跪剪紙招要切念近故某官生有多聞死無遺憾馳驅日下空知行路之難漂泊天涯竟作顛崕之墮玉門闗峰廻路轉金斗城物換星移庸歌宋玉之詞敬效巫陽之力往年蜀魄思家而千載號呼今日楚魂歸第而六親迎迓洋洋如在肅肅有聲髙堂共燈燭之光靈几享殽羞之薦月白風清此良夜獲叙幽情水逺山長愁殺人變為佳境醵諸友買石題獨孤公檜四字廬山種蓮堪笑者區區佞佛董林栽杏可憐哉碌碌勞生玉箸篆重題姓字金斗城倍有輝光尚須假力于錢神即俾奏功于匠氏似羊公一片石乃大書而特書此季子十字碑尤居簡而行簡願言鳩僝請與鷗盟干親友重搆草堂代黄仲噐作荒徑猶存陶彭澤歸來太早吾廬獨破杜少陵受凍何堪巢一枝欲比鷦鷯樹三匝正如烏鵲室廬拮据風雨帡幪孔方兄毋吝㸃頭公輸子便令動手十萬貫揚州鶴上人自求仙八九家錦里村居吾将老矣合矣完矣優哉悠哉大林菴佛像裝金法事疏芳茂山大林道塲鼎新革故補陀巖圓通法㑹粧假成真仰恃慈悲俯陳悃愊切念某䥫船渡海鈯斧開山浩浩刼峯𤣥都之兎葵淨掃瀼瀼甘露獨園之祇樹新霑從把茅次第鳩工置刻木粧嚴像設金色界移來勝境玉毫光照見恒沙鐘鼓雷鳴瓶盂雲集一宿雖成于頓覺四恩當報于將來伏願佛日照臨龍天擁䕶我見人見衆生見因見趣以精修梵音妙音海潮音觀音聲而圓悟尚期檀越同證菩提横山白龍祠修造疏天蓋髙而地盖厚人能感通山有仙而水有龍官為祭祀必嚴廟貎乃稱輿情公輸子欲便興工孔方兄必先助力蜿蜒靈物想像髙堂駿奔走執豆籩參酌用古今之禮鼓雷霆順風雨願言無水旱之憂輪奐美哉神明彰矣重造東山港木橋疏東山趾頭横巨港橋斷連年東里子産無乗輿人皆病渉每鶴立相呼趂渡令鳩工重作飛梁事欲速成力湏多助牽牛來往真可比牛郎七夕之牛乗馬徑過亦何異馬卿駟車之馬吾事濟矣衆皆悦之無錫興道鄉重建太平橋疏長安道到處皆通溪山滿眼太平橋連年大壞鄉里驚心義合勇為力宜多助不用集填河烏鵲便當見跨水虹蜺乗輿濟人施惠毋勞于子産丈夫題柱揚名何異于長卿方外交疏賀哲既明為𢎞聖講主壽安山坐鎮朔方如如不動華嚴海流傳妙界浩浩無邊惟得其人乃𢎞斯道某人學窮員頓道混根塵舌上瀾翻皆白馬未駝之文字胸中囊括有黄龍不測之機闗挺然冬嶺孤松接乃秋江正派即從别業以竪法幢天龍加以䕶持猿鶴為之鼓舞江流百數里同梵音演竺國之經吾軰十餘人比賢士結匡廬之社尚期珍重式副願言重建忠祐廟疏自隋朝稱八絶之靈巍然廟食與陳墓對一坏之土巋若堂封人傑地靈者八九百年灰飛烟滅者一十三載剪除荒棘經營閟宮展今日之宏規復前人之舊觀工師求木政須用使鬼之錢長者折枝敢請下如神之筆紅雲殿香雲繚繞白鶴溪流水廽環看眼前突兀之屋既成有栽上槎枒之松堪畫雝雝在宫肅肅在廟儼遺像於丹青赫赫厥聲濯濯厥靈振英風于今古福歸庶士壽祝一人普度齋壇榜大地衆生多沉淪于苦海恒沙諸佛能拯救于慈航㑹遇有縁寃親無間切念齋主僧某洎諸信士等為見曩因喪亂兼值凶荒或被戮于兵戈或遭烹于鼎鑊或疫癘而全家不起或饑羸而比屋俱亡月明星稀長夜發無依之嘆天隂雨濕常時聞寃哭之聲三寳前今獲皈依九泉下悉令解脱故此新開鹿苑于焉延奉象王命苾芻按乃科儀傳華嚴諷諸經典燃火樹照阿鼻獄焜燿靈暉施斛食拌尸陀林飽饜甘露齋主宜志心歸命僧流當竭力奉行有感必通無欲不遂伏願佛垂慈愍人得超昇玉毫相光照十方咸聽正法金沙池花開四色同往化生壽永天家恩霑沙界干人贈人疏嘗聞朋友有通財之義今某人毘陵人也久客居貧欲還鄉而不可得敢請諸君子仗義以贐其行真美事也聽馮驩弹鋏之歌不勝感慨覽王粲登樓之賦亦甚懷歸事有難言理宜代述某鄧侯華胄毘陵宦家二十年海内兵戈遭逢塗炭五千巻胸中文字收歛光芒故園之松菊都荒暮景之桑榆不暖但空載滿船明月豈能乗兩腋清風惟諸公曰餽贐焉則此老營莵裘矣腰纒十萬貫便可比揚州之行負郭二頃田更何用蘇秦之印毋嫌饒舌特為㸃頭代曹仲鉉募親舊作隱居疏白髪三千丈悵然咏謫仙之詩行窩十二家徒爾慕堯夫之樂借巢鳩拙繞樹烏飛屋茅席巻於秋風衾䥫寒添於夜雨欲新搆作莵裘之計必故人贈草堂之資經之營之完矣美矣潞城風景幸春囬兵革之餘劍井虹光㸔日射軒窻之外帡幪有自感戴奚忘道家受生㑹疏大功不宰巍巍乎上帝難名小道可觀碌碌乎下民有報盖豺獺不忘其報本即潢汙可薦其真誠芳名請日下先題勝㑹在天中令節惟白水真人辦力有𤣥都道士通靈水到渠成山鳴谷應天一地二天三地四要之同受于初生人一已百人十已千冝爾力行於斯道黄鶴菴居疏飡五粒松前度看桑田變海縣一壺藥今畨結茅屋居山要得如清溪道士之家必蒙助白水真人之力帡幪有造修養奚難遶香烟鶴聽珠經山鳴谷應養神丹龍蟠金鼎地久天長辨惑編鋟板疏左賦初傳洛陽紙頓増多價白詩可易雞林賈猶用一金矧端人正士之立言皆至聖大賢之遺訓人能𢎞道徳必有隣切見龜巢老人行年彌髙信道愈篤文字五千巻筆前言為辨惑之編辛懃三十年絃古調待知音之聽固緝補其舊矣冝鋟梓以廣之登山采玉入海求珠所寳無暗投之歎製芰為衣紉蘭為佩相成俱化薰之功珍重斯文咄嗟可辦奔牛􅄵南重建井亭疏古堰横奔牛髙下分河中之水碾渦深没馬傍邊宜井上之亭中書君但請揮金公輸子便能求木畫檐飛起金臺接藹藹之雲烟素綆來趨樂石甃泠泠之氷雪願言多助立見落成沈子英以先塋毁於兵重葬木主作佛事追薦疏七十二疑塜求全難救於昔人千有億化身超度祗慿於我佛投誠三寳進悼雙親伏念某顯考某官顯妣某氏歿有後先恩皆深重北邙埋骨不期毁馬鬛之封西郭招魂復用卜牛眠之地祔卯君而安厝題神主以珍藏情極哀傷事從權變爰命緇衣之侶共陳素供之儀鳴佛樂于法筵宣梵音于教典聚功徳海及尸陀林伏願佛日照臨人天感格九品蓮䑓之極樂父母超昇一坏莎土之無虞兒孫祭掃天長地久存順没寧方外交疏賀行敏中住永慶寺塵生東海八荒宇宙重開石爛南山一壑烟霞猶在欲起廢而還舊觀須作興以布新條水到渠成山鳴谷應某人深悟单提之㫖旁通百氏之書石麟角煎膠續絃從禅月道塲得來三昧秋兎毫囊錐脱頴有潑天聲價震動諸方道之行與時則可矣折松枝升座説法種蓮華結社招賢且自怡隴上之雲將突見眼前之屋置草堂宿土舍今吾似少陵先生留玉帶鎮山門何代無東坡居士燕賀有喜鷗盟弗渝忠祐廟修造疏世稱八絶數百年人傑地靈廟食一方二十載灰飛烟滅欲舉手作長廊廣殿向知音説流水髙山老我鶴歸良工鳩集惟長者秉如神之筆能慨然助使鬼之錢經之營之完矣美矣丹青遺像若生存大業之初恢拓𢎞規將復見靈光之舊褔歸衆信壽祝九重諸山請偕長老住報恩寺疏金園祇樹胡少師原是恩檀玉盌菖蒲蘇長公曽留詞藻雖往事盡成隳廢惟得人乃可作興某人學有淵源聲溢湖海大力量能勝重任諸行軰或稱老成松月堂前吹布毛于禅衲錢塘江上揮麈尾于法筵斷絃琴未續朱絲無孔笛别成清調如斯出手方謂作家岸為谷谷為陵更㸔歴僧祇之刼士希賢賢希聖㑹當傳佛祖之燈隣壁光輝宗門焜耀三山湖重建木橋疏踏蘆渡水莫言他物㑹通神伐木為橋且作此目前方便故址在雨汀烟渚良工運月斧風斤要得速成必須多助彷彿填河之烏鵲依稀跨海之虹蜺三山湖岐路縱横人無病渉駟馬車諸公絡繹自可留題濟衆云功埀名不朽重建排墓橋疏斷橋人不渡如弱水以隔蓬萊小徑曲通村奈荒野而披榛棘溪分燕尾路繞羊膓必飛梁重壓烟波則大道直趨城郭金璧一揮于長者斧斤羣集而成之浮杯僧不用驚鷗題柱客儘看乗駟設天上填河靈鵲毋聽譌傳躡空中跨水長虹佇看髙歩咄嗟事辦讃嘆福生逺塵居疏為善慶堂作歴數河沙未盡僧祇之刼逺離塵垢詎忘我佛之言一把茅得以葢頭三條篾儘堪縛腹道須多助室乃茍完離舊隱稍入深居近新洋最為佳境展開一坐具地截㫁諸塵勞門寒山帚不用掃除明鏡䑓毋勞拂拭招白雲為伴侶更無心出巖岫之間對玉峰作畫圗其妙趣在丹青之外以安隱入作清净觀陵口慈院化修造疏扶起法幢據一帶江山之陵口飛來禅錫憇十方雲水之路頭剪荆棘重作叢林掃埃燼仍為寳地數年不輟百廢俱興今將捲屋上之茅從新覆瓦更合剗堦前之草依舊磨磚搆層軒奉七佛之師望北闕祝一人之壽小苾芻向前料理大檀那直下承當種種莊嚴綿綿接續使工師求木聚良材以待匠石之需為長者折枝修因果而有福田之報惟金爾諾斯玉其成方外交疏賀蘭楚芳住法濟寺以大法濟世而出接跡前修如小山招隱而來増輝同列布金園雖云廢毁硬䥫漢斯可承當某人學有淵源名揚湖海虎阜藹騰雲之氣在昔與教藏通靈蛟溪響流水之聲至今效分座説法道將行矣人皆仰之西排灣重見珠林東印土俱成寳地陶彭澤入逺公社更不勞沽酒見招韓昌黎聽頴師琴自肯為賦詩相贈忘形緇素同志清髙塔寺疏青山門匝地荆榛化城安在紅塔寺倚天樓閣勝地重開雖苾芻卓錫而經營必檀越布金而成就掃除瓦礫整頓林泉壘七級之浮圖復還舊觀成一區之蘭若永守清規報施主恩祝聖人壽設𡨕道塲榜金仙慈愍開八萬四千方便之門寳公科儀指一十二數超升之路既殷勤而修設冝次第以宣揚燃解脱香秉光明燭緇流星集旛影雲揚専追悼于一靈敬皈依于三寳禮菩薩諸天聖衆召阿鼻十府𡨕王法雷鳴鐃鼓之音甘露灑盤盂之供演大乗法懴除累世愆尤燃藥師燈照破諸途幽暗施伽陀食濟衆饑虚散五彩之仙花解多生之寃結爾齋主必加精恪無願不從我清衆各盡䖍恭有感斯應伏願佛光普照法理圓通成就功徳山積算比恒沙之喻脱離生死海亡靈得凈土之逰作佛事薦陳都事疏名同仁字仲埜前常郡經歴念伯道之無兒誰承祭祀頼西方之有佛可兾超昇追悼同寅投誠大覺伏念某官儒林拔萃仕路蜚英五六年勞贊畫蘭陵卓然可敬四千里赴承宣蓮幙遽爾云亡桐棺菆葬于太原木主奉祠于精舍供陳蔬筍香爇旃檀世尊放玉毫相光釋子誦金剛般若集恒沙之功徳為淨土之莊嚴表我交情助公𡨕福伏願洋洋如在濯濯厥靈栢子庭前聽法㑹西來祖意蓮華䑓上逰魂得上品化生方外交疏賀㣲太古住天寧寺一天寧有内外之稱經權並用九雲夢無芥蒂之迹觸背俱亡惟麟膠可續斷絃佀烏獲能勝重任道之行也人皆仰之某人前輩老成单提正印早入寂照室得徑山骨髓而歸親承圓悟宗聳秀峰頭角而出由由然寸絲不挂堂堂乎大噐晚成坐蘭陵茅一道塲納芥子大千沙界蘇州有常州有總成嘉話舊雨來今雨去皆與忘情鐘鼓雷鳴衣冠雲集古調倡陽春白雪餘香存晚節黄花韓昌黎海上留衣特致敬大顛之意蘇子瞻山中解帶不妨問佛印之禅凡與鷗盟永言為好方外交疏賀聰聞極住天寧寺毘陵稱劇郡天寧為第一禅林泗州留法衣風化有許多因地舊網羅重新振舉大力量直下承當湖海推賢山林増重某人堂堂偉噐藉藉英聲虎阜師承聞圓悟相傳之極致龍河法藏得維摩未譯之先幾浮盃使日出之邦駐錫憇春申之浦有聲畫無聲詩等為逰戱横説禪竪説教儘自圓融踞此猊床香雲繚繞拈将麈拂花雨繽紛石池種靈運之蓮山門對獨孤之檜道則髙矣美矣人皆見之仰之三千年黄河清喜遭遇今朝之盛日十八賢匡廬社㸔振興前軰之髙風凡我同盟順爾成德薦亡女疏女因産而亡蝮母裂腸於生育轉致寃愆象王慈眼於沉淪能令解脱皈依大覺敷露微忱切念亡女某氏為結子之桃花一時飄墜視當堦之蓂莢三載更新欲撤靈幃𢎞開法席梵唄演瑜伽教典慈恩降阿鼻獄人寳燈破𡨕路之昏斛食濟陀林之餒罪如霜釋業比氷消極漂溺以上慈航洗穢濁而歸淨土伏願佛天覆燾慧日照臨大乗上乗最上乗裒諸功徳欲界色界無色界從此超昇常州府天寧寺修造疏娑婆世大千沙界往古來今毘陵郡第一道塲殘山剩水大法幢要人扶起老禪衲領衆支撐開甘露門持修月斧佛有殿似靈光巋峙獨整天龍衞從之威鐘有樓如五鳯添修庶免風雨震凌之患新兩廡而鴈堂奕奕廣丈室而猊座巍巍形勢依金城湯池周圍䕶銀山䥫壁興言多助立見有成視銀杏為雙樹林數百尺欝葱佳氣接曇花從五竺國二千年奕葉餘芳除服設醮薦亡疏明發懷人恐沉淪於下土齋沐祀帝敢對越於上蒼仰瞻威顔俛瀝情悃伏願恩光普照見旭日于雲中魂氣超升御靈飈于天上日之方中恩輝廣被天之所覆大徳難名謹陳伉儷之情尚乞哀矜之賜伏願一誠天鑒幸獲接于齋壇萬罪氷消獲早生於仙境日之夕矣事亡如存天何言哉有感必應稽首三瀆馳情九霄伏願黒籍除名竟飄然而遺世丹梯飛歩即從此以登仙居䘮踰古制之期勉嬰世務煉度伏髙真之力可濟幽靈仰籲洪鈞俯陳丹悃切念亡室某氏生無妬忌能内助以成家備歴艱辛甫中年而即世琴瑟之音固絶室家之意難亡命黄冠演其科儀設清供同乎禴祭敷宣道典歌詠歩虚諸孤除服以追哀十極降恩而超度伏願朝紫金闕乗織女之雲車居白玉京勝嫦娥之月府尚期遺澤益裕後昆重建後餘橋疏論靈鵲填河之事每笑譌傳假祖龍鞭石之神何憂病渉睠此滆湖頭濶港寔為鶴溪上要途惟諸賢發鄭僑濟人之心則良工用媧氏補天之手以舊石加諸土木看新冬成此津梁客有馬長卿必為題昇仙之柱賢如鄭子産毋勞用溱洧之車太平興國寺修塔造寺疏毘陵郡諸山起廢幸此明時太平寺一塔巋存依然壯觀風摧雨壞歲乆月長戒壇與梵宇俱亡畫水在圖經空載巍巍乎七層巨搆茫茫然百畮荒基扶天柱之傾宜先出手聽風鈴之語㑹有知音雖卓錫已有人焉而布金必須長者千年鐡柱觀看青蓮居士重禮𡨕僧半天拍闌干待簡齋先生留題佳句聿成勝事求著修名常州府送聰聞極住蘇州萬壽寺一笑視齊雲舍利頓現神光三遷至禪月道塲能繩祖武遽爾風吹别調本來雲出無心某人見合真知聞皆極致是空是色出熈怡藍外之青自本自根得妙喜骨中之髓進非躐等道在力行猊床擁五色香雲麈拂灑六時花雨以淞江太湖倒傾其法海于長洲茂苑振起其宗風登東山登泰山道眼盖明于天下處北海處南海交情何異于日前尚曰隣封毋忘舊好常州府請中道立住天寧寺乾毒發一花五葉之春流芳震旦天寧為四縣諸山之冠填重毘陵必須得前軰老成乃可為後學師表切有請也聞斯行之某人有藴皆空無道不立山林下工夫縝宻湖海間聲價崢嶸無凖翁祖派傳來得寧翁虎邱之親授穹窿山寳珠拈出陞景山猊座以盛行連年横野渡之舟此日擊誓江之楫平地把法幢扶起獨園隨坐具展開白槌雷鳴緇侶雲集金斗城鳴抱闗之柝鐘鼓相聞䥫門限待問話之人衣冠聿至佇徯三祝同寅一誠普庵堂修齋安奉徳藏主靈位代蟮作叢林鐘鼓道本貴于同修祠宇香燈義不忘于前軰敢謂東山小宗之從子仰于西方大覺之慈悲悃愊具陳慈悲諦聽切念故師伯藏主徳公早遵父訓過匡廬蓮社之門繼得師承入靈隱竹泉之室主名山一大藏教典渉危途十餘載兵戈常時若緘口無言凡事皆灰心不作雖病業難迯于俗舍乃寂滅預知乎去期法已茶毘禮宜蒲供安奉覺靈于舊隱宜揚科教于今辰伏願成就菩提圓融般若六十五年娑婆世界夢幻俱空百千萬億清淨法身光明普照延福菴衆設法華道塲保安疏居安慮危愍衆生之煩惱扞災禦患頼諸佛之慈悲俯述輿情仰千大覺切念某人等家居長幼咸寄幻於兩間氣候燠寒或違和於四體共闡道塲于延福同宣妙義于法華爐爇寳香藹祥雲之繚繞花生銀燭増慧日之光輝伊蒲列供于齋筵因果縁成于梵宇伏願佛天覆幬法雨霑濡五運六氣之流行無災無害七喻三周之功徳無運無邉凡在乎隣里鄉黨之間共享此壽冨康寧之福延福庵修造疏修月之斧數千世傳異事補天之石五色神立竒功矧草創之禪林乃檀那之福地若加修補愈更作興或捨舊而圖新或裒多而益寡斧彼鋸彼輪焉奐焉上漏下濕處任在􅀈墁東塗西抹時光生髤飾孔方兄但能助力阿羅漢别當現身非莊嚴是名莊嚴此福徳勝前福徳展開一坐具舉頭皆延福道塲更上一層樓彈指見華嚴境界願言金諾事悉玉成常州天寧寺請性天之住山疏金天地作瓦礫塲空王殿巋然突兀䥫門限為戈㦸用僧伽衣乆矣刼灰必得人扶起法幢特為我展開禪席瓶盂雲集鐘鼓雷鳴某人北山三譍早歲入曇翁之室西江一吸無人當馬祖之鋒煮虛空煨拆脚鐺談般若聚㸃頭石在處香雲繚繞有時花雨繽紛時止時行了無罣礙浙左浙右靡不依歸今菟裘為將老之營而竿木乃逢場之戱幸無多讓勇為此行吳山青越山青拄杖挑白雲飛起常州有蘇州有滿船載明月歸來延陵精舍疏并叙昔司馬公諸君子在洛為邵堯夫先生買宅人到于今稱之今叔濓江徵君世居江隂與延陵季子墓同里清風髙節實景慕之邇來避地吳下擬欲築延陵精舍于淞江之上使學者有所依歸吾黨之士冝相率以助其費亦庶乎為堯夫買宅之意也不揣僣言作成幸甚君子攸居不鄙九夷之陋英才可教常存三樂之心欲衿佩之㳺從宜齋廬之講習非助我者孰能為之切見某人喬木故家飄蓬叔世書劍客長洲茂苑襟懷藹和氣春風五色筆之文章家傳乆矣十字碑之賢墓鄉念存焉築精舍笠澤之濱揭故園延陵之扁既不忘于桑梓且樂育于菁莪願言為長者折枝僉曰使工師求木美輪美奐鼓瑟鼓琴試看荷蕢過門之徒皆為升堂入室之士青山在上流水在下馬公樂花竹餘春先生如邱學舍如舟蘇子以虀塩送老亟圖燕賀永締鷗盟呈長洲縣請修顧元公祠堂文嘗謂古昔名賢合奉烝甞之禮世俗滛祠豈容混雜其間風化所闗事冝改作切見晉散騎常侍贈侍中驃騎将軍開府儀同三司顧元公相門華裔文武全才當時與陸機陸雲並稱三俊王𨗳慕江南之望張華號南金之竒以樂道而鼓琴能知人之錫炙平六州之大亂成一代之竒功其他勲業具載晉史祭典曰有功于民則祀之若元公之賢理宜廟食今墓在長洲縣二十九都皇天蕩南舊有祠堂為鄉里奉嘗之地近被一等無知小民将本處廢廟中土地神像移入本祠使夫婦列坐玉石混淆惑亂觀聽於理未應如蒙官為致祭撤去續添神像禁斷樵牧整葺祠宇非惟尊先賢辨滛祀以明禮法且能正人心厲風俗有補風化為此合行具呈崑山州學講堂上梁文設庠序學校之教于國中人倫為重聞金石絲竹之音于堂上聖道彌尊頼有人心上經綸見此屋眼前突兀恭惟知州相公理明聖學職守神州念斯文重繫綱常知厥職實兼師帥如文翁化蜀多除弟子更繇似常衮治閩親與諸生揖讓顧瞻鶚泮乃搆鱣堂看接武布武於上下之間快求仁得仁於講論之際先聖人洋洋如在賢太守赫赫厥聲視鄭之不廢鄉校而過之比魯公能修泮宮而成矣齋廬俱備廊廡亦新騶虞之徳諸侯之風是皆本先王之教宗廟之美百官之富喜共窺夫子之門爰舉修梁敢陳善頌梁之東日出扶桑麗太空五色喜看祥瑞現八荒都在照臨中梁之西湖上青山玉笋齊千里風塵銅馬去四郊春雨錦鳩啼梁之南負郭人家瓮繭蠶共愛甘棠周召伯重歌岐麥漢張堪梁之北江水滔滔歸水國人心亦自水朝宗聲教依然流九域梁之上萬象森羅天蕩蕩日邊氛祲已全銷天下太平今可望梁之下州里絃歌總風雅三呉徳化服淮夷多士文章繼班馬伏願上梁之後一人有慶萬邦咸寧舞干羽格苗氏之頑大禹班師而勿用修文徳來逺人之服顓臾近費以何憂化日舒長士風益盛募朋友置十七史疏農有菑畬可盡畊鋤之力儒無簡䇿曷資講習之功借于人或誚為癡閱于市自亦可笑切見某人螢窻苦學陋巷甘貧十七史歴代之書擬求善本數千載古人之事具欲周知區區未遂其志咄咄不離于口割鷺股奈何無肉刮龜毛安得成氊雖君子存固窮之心在朋友有通財之義多助寡助大書特書便令載米家之船管取挿鄴侯之架知之者好之者樂之者相與講明歲之餘日之餘時之餘儘教披玩其為感佩奚可弭忘當時以中統鈔題助者趙師呂蕭昭卿王伯祥王子芳王仲徳各一百貫葛用中王君壽道士鄧混然各五十貫祁塵外蕭子璋金君玉各廿五貫僧琇玉林廿貫命甥女婿周朋舉詣集慶路干託士友陳雲心買紙儒學内印置共作四百六十册所用裝潢作料二真等費計二百貫澹泊齋藏貯諸史時至元五年歲在己卯余在鳴鳯王氏家塾是書至至正丙申春因避兵寄藏金壇縣尹秀峰家其子吾婿也勸募刋思賢録疏代張希尹作某伏覩故宋道鄉先生鄒忠公常郡名賢程門傳道其一言一行皆可為天下法若龜山楊公了齋陳公南軒張公晦菴朱文公丞相李忠定公諸賢咸有賛述宋季及元郡守校官暨諸名士嘗為表著祠墓之作散諸四方者不一龜巢老人謝某裒輯成編名思賢錄凡若干巻然非鋟梓以傳則忠與賢之文辭将遂湮没寧不惜哉某比以梨板百片助之其鋟之資尚有望于好事君子書成之日庋諸學宮庻得以貽永乆也洪武十一年八月中秋日江隂張端刋龜巢摘稿代王尚綱作嘗觀石鼓之詩閱二千餘年剥落未盡學者猶可得而傳焉近代板刻頗亦類此今呉中黄宗禮氏欲以龜巢謝先生之詩鏤板而傳之適以事阻因循十年敢用告諸君與巢翁相知諸為協力玉成其事夫巢翁之詩多以忠孝節義形于詠歌茍得刻本以廣其傳于世教豈小補哉龜巢稿巻十欽定四庫全書龜巢稿巻十一元謝應芳撰書上奉使宣撫書時為嵗荒而述也某嘗觀孟子告鄒君之言曰凶年饑歲君之民老弱轉乎溝壑壯者散而之四方者幾千人矣而君之倉廪實府庫充有司莫以告是上慢而殘下也夫鄒小國也孟子猶以是告之况堂堂天朝富有四海而倉廪府庫比之鄒君相去萬萬奈何有司者遇凶荒之年而不思救荒之策知出納之吝而不知時措之冝宜其殘慢又甚于孟子之説者責何可逭耶伏惟大人奉聖天子明命廵歴遐陬詢民疾苦其矜卹黎庶慈如父母糾正百司凛如風霜盖能以聖上之心為心惟恐一夫之不得其所耳然民之疾苦莫甚于饑今常州屬邑曰武進曰晉陵其境土與鎮江相連歲之凶荒實相似也今兩縣之民皇皇焉嗷嗷焉與鎮江之民何以異哉然彼則有仰給官廪之喜此則有餓死溝壑之憂國家一視同仁初無彼此厚薄之殊特繫乎有司之能告與否耳嗟乎常之民自冬徂春訴饑郡邑僅嘗得義倉之粟一二斗而已斯人也譬之乆旱之苗微雨斯須豈能蘇息必待優渥沾足而後免乎枯槁耳當此之時青黄不接食草木之根者有之鬻子女而食者有之去父母離鄉井行乞道路者滔滔也有司方且移文覈實籍有田之家計畆科粟以為賑卹之政其亦不思之甚矣夫粟之為物必産于田歲凶則田不收矣夫不收之田雖累巨萬粟何可得乎况頻年不登賦役重困産去税存者十有八九一旦又加諸賦歛之毒其狼狽為何如哉徒使皂𨽻之徒家至戸到呌囂之聲雞犬弗寧是以有田者亦多為東西南北之人矣其詣有司者則拘之縶之鞭之扑之刮龜毫于箠楚之下割鷺股于挫辱之餘區區所得民不足贍假令能贍其民亦何異奪烏鳶之食與之螻蟻耶若是者某誠知大人君子之心必不忍為也忍令有司為之乎夫常之為郡大郡也官廪之粟陳陳相因又有附餘之粟存焉公帑之積綽綽有餘又有賍罰之金在焉斯二者非國經費有司亦何靳而不以施諸民乎茍能以是施之亦可以解倒懸之急况能如汲黯發河内之粟乎惟大人舉而行之上推聖恩下副民望盛徳之至然民疾苦豈止于斯如公田之重租宜减官鹽之髙價宜輕田户之酒課宜更都水之冗官宜汰凡如此類未易枚舉獨以賑饑一事首凟鈞聽葢民之顛連命在朝夕非若他事可少緩也芻蕘之言倘蒙採擇餘者又當條具而悉陳之惟大人埀察焉區區干凟崇嚴不勝悚息與王氏諸子書諸君子居䘮三年除服有日聞欲命羽士設醮以資𡨕福所費計統鈔二百錠有竒以粟用之幾四百石是亦出乎孝敬之心循乎世俗之禮也然𡨕福之實果何有哉以愚言之用三日醮筵之費賑一鄉人戸之饑當此凶年使數千百人得餔其粟而免為溝中瘠者其歡欣贊誦奚止百倍于黄冠之口哉若諸君更欲盡追逺之誠則于祥禫之日豐潔致祭亦庶乎終䘮之禮矣但今之世俗親没之後凡言做好事者非佛氏之齋必老氏之醮二端之外餘無用情雖祭祀亦不為意盖亦未之思也愚請引古證今以齋醮無足信者為諸公詳之佛氏以釋迦為師其書自漢以來流入中國初無設齋之説也至梁武帝妄祈因果俾僧流為之厥後亡滅宗國餓死臺城使設齋而有因果豈至是哉道家以老君為師自周以來其書傳之天下亦無設醮之説也至宋徽宗妄意求福令羽流為之未幾傾危社稷流落徼外使設醮而能獲福决不至于此矣二君昏迷不明物理信一時妖幻之言為二氏衣食之計如此前代名賢當今豪傑卓然有見而不惑者固多有之惟閭閻細民惑者什九何足論哉諸君負聰明特達之才有深逺宏濶之見平居髙論迥出人表豈至是而亦淪胥于汚陋之俗耶必能以理燭齋醮之妄以財行賑卹之仁上下一心䖍奉祭祀于以寓孝思之意于以報㒺極之恩上天鑒臨何福不至先君有靈必含笑𡨕𡨕中矣余以忠告者乃朋友之義也在交契不敢以不忠惟諸君念之論呉人不當祀范蠡書投老異鄉如龜藏乆未嘗敢輙造公卿大夫之門為㳺説之客也今一造焉亦不敢如方朔自譽毛遂自薦以求其用亦非有富國强兵之策驚世駭俗之論以衒其能特以古人一事有闗風化敢請為閣下陳之僕近過呉江嘗逰三髙祠頋瞻遺像覽前人記載金石之文見所謂三髙者曰范蠡曰張翰曰陸龜蒙謂其清風峻節天下共髙之邑人為東家某而祀之僕于是竊有感焉夫季鷹魯望呉産者也呉之人慕為東家㐀是已䲭夷子皮始終事越間嘗以行成留呉其心未嘗一日忘乎越也進美女納寳噐以惑呉之君臣乗虚進兵以滅呉之宗社大率皆蠡之謀越人論功蠡居第一豈非呉之大仇乎惟其功成名遂遯跡而去其識見固髙于常人然浮海適齊則裝其輕寳珠玉以行在齊復營致千金之産自齊之陶懷其重寳而去居陶而父子畊畜轉物逐利又致累鉅萬之資僕嘗觀太史公以是屢書不一書者盖深鄙之非取之也較諸子房辭漢翛然從赤松子逰相去萬萬矣又觀杜牧之詩蘇子瞻之詩皆謂蠡得西施以申公夏姬為比由是而言謂其人為貪為穢亦不為過尚何清風髙節之足慕乎今也以呉人馨香之黍稷享敵國貪穢之仇讐于理其可乎哉禮云民不祀非族况仇敵乎或曰有其舉之不可廢也僕應之曰呉有三髙人特未之思耳若泰伯仲雍延陵季子真可謂天下所共髙者也凡為呉人茍非土木孰不有髙山景行之思雖欲止之而不能也惟當道君子循名責實改而易之實足以稱三髙之名雪千載之羞而饜服輿人之心矣然斯言也僕不往告之他人而特告于閣下者誠以閣下心正而理明學博而識髙見義所在勇于有為凡于正人心厚風俗之事知無不行特此一端偶未之及聞僕所説必不以人廢言此僕所以發其乆箝之口也惟閣下參秉鈞衡之暇稽諸祀典以理裁之以義决之為之改作奉三讓至徳之聖人祠于堂上配以二賢仍以季鷹魯望列之從祀如此則振前人之謬戾新斯民之耳目正髙風崇禮讓激衰世薄俗而勸之其于風化豈小補哉惟大人君子埀察焉若謂蠡有功而祀之則越人祀之宜矣如諸葛武侯之賢蜀人祀之呉魏亦未嘗有祠焉斯理之公古今不殊幽明無間所謂質諸鬼神而無疑者也苐恐不知者以僕之言既不足以謀身又不急于世用斥其迂濶而譏笑之僕于心誠無愧焉古語云可為智者道難與俗人言所恃髙明必蒙鑒察區區干冒崇嚴不勝悚息代與李中丞書某去年夏四月嘗奉状附某官漕運之行不審徹鈞覽否即日仲春伏惟君侯神相多福某避地呉下六年于兹顛沛流離困窮艱難萬狀逺不能奔父䘮于京師近不能葬母骨于鄊土兄弟妻孥救死不贍故于父母殆若忘恩其實銜哀茹痛朝斯夕斯未嘗頃刻忘于懷也若大人之深恩厚徳重如邱山亦未能伏謁門下效犬馬之力以報其萬一幽明兩負度日如年惟大人念先人之夙好憫遺孤之艱虞特賜哀憐不加譴責為幸甚矣某擬今歲歸耕膠山剪荆棘藝禾黍庶一稔而有宿舂之粮即灑飯先人之墓一負荆于大人之門也兹因呉縣尹詣前謹奉此承候起居并述所以趦趄負罪之故舍弟某臨書羅拜悃不殊前下情無任悚懼感慕之至伏惟鈞察上盛教諭論土地夫人書常州路學教授盛克明以文廟先聖殿及門廡等屋湫隘皆撤而新之廟前建文昌土地二祠其土地舊多淫祀嘗詢之應芳悉皆除去但夫人之像為或者所沮而存余盡力請毁之至書再上教授乃白諸郡守賈侯侯然之像遂毁教授名昭維揚人侯名禧字吉甫真定人也自先生之教于常也講貫之暇繕修廟學二三年間百廢具興某竊嘗與鄉之諸老論之皇元置郡博士以來未有如先生用心之勤者也功其懋哉功其懋哉時有細故一端尚宜改作敢以狂瞽之言輙凟清聽惟先生察之伏覩本學重建地靈祠于儀門之外其神有無姑置勿論使誠有之是豈不知亷恥者哉今肖像之設夫婦偶坐楚楚乎裙釵之飾盈盈乎朱粉之粧侍從傍立男女雜處儼然坐聖人清廟之下能無恥乎禮曰男子居外女子居内又曰女子出門必擁蔽其面雖近世禮俗之敝亦未嘗無男女之别也至如閭閻細民之家人或過之其妻猶避嫌不出豈有身為神靈而為之配者不知内外之分呈身露面眉案並食以饕士大夫籩豆之薦反不若閭閻匹婦而能避嫌乎吁幽明雖殊理則一致决無是理也明矣比聞吾先生以此為細㣲之故不欲矯世違俗而姑從衆也則先生之心固然矣但學校者風化所出之地凡有作為人所矜式愚恐四方來觀将謂禮或宜然轉相倣效而卒莫知其非矣又恐禮法之士從而議之又安知先生初見之明如彼其後從衆之意如此耶此愚所以不避譴責僣伸寸喙以罄其芻蕘之誠惟先生以理揆之勇為撤去非惟雪神羞明禮教不淪胥習俗之謬抑亦可見先生之不以人廢言矣抑愚又有説焉夫地之靈者莫靈于賢者也若呉季子張文靖胡文恭鄒忠公諸賢正毘陵土産之英靈學有舊祠庳隘弗稱即于此祠而奉之不勝夫無名氏之鬼乎程子曰除神祀而民為善斯言也雖質諸聖人在天之靈亦何疑哉夫如是而或獲戾于鬼神者凡有殃咎宜加于某之身無悔區區僣越惟先生察之又上盛教授書某比見地靈祠設夫婦之像恐未合禮切嘗冒昧有言欲裨明見亦庶乎他山之石耳或有誚余者曰怪神之事聖人不語非不語也盖不易語諸人也夫地靈之神其配偶有無未易窺測若果無之則儒先君子必嘗論説今吾子以一介之微言雖屢中又安足取信于人也哉僕聞之既謝不敏退而考諸五峰胡先生之論南嶽曰世俗為廟貎置男女屋而貯之䙝瀆之甚厥後北溪陳先生又從而釋之曰自聖學不明鬼神情状都不能曉如泰山封帝儼然人形埀旒端冕且立后殿于其後不知又是何山配之為婦也然則土地之于山岳類也像貎之設已為不經况復加之配偶乎惟先生撤而去之以祛衆惑其有未喻者乞以前二公大儒之言曉之其誰曰不然况當今天下之所通祀者曰三皇曰孔子曰社稷或廟貎焉或壇壝焉皆未嘗有匹偶之設何物地靈而獨有之乎愚也稽之古訓已如彼參之祀典又如此反覆思繹决無是理不免再用塵凟以殫其千慮一得之愚惟先生埀察焉干周侍御作顧元公祠堂碑書某毘陵鄙人也逃難異鄉百事踈懶惟好古之念根于其心老而彌篤遇有感觸奮然欲為力雖不足亦必假手于人卒于成而後已今有一事復因人就緒輙敢具述顛末為閣下成之某僑居葑門適與顧元公之墓相近地方五六里俗稱顧榮墓是以知之既知之數往弔而問焉夫元公晉之名臣也其勲業家世詳見史編元帝大興二年十一月十七日卒于官迄今凡一千五十餘載碑文雖失丘壠尚存土人以其地如鳯形名鳯凰嶺前有二墩峙立左右樷祠一區為鄉里奉嘗之地其來逺矣近有無知之民舁置土地神塑像數軰列坐其中其荒謬淫䙝有不可勝誅者以某一介之微莫能改作是用言諸長洲縣令周君君博雅而文方其視政之初力行古道故聞而喜之遂與某等展墓且詣祠奠謁屬某為文告之曰何物地靈混此室處既而令方議去淫祀整葺祠宇邑人張實乃樂成賢令之志輸財效力惟命是從圬人梓工並手交作瓦甓之毁者易之棟宇之朽者易之像設供具門垣墓表靡不完好二墩則各植梧桐二株名雙梧墩盖張華嘗稱公為朝陽之鳯及墓名鳯嶺故也月餘畢功令復躬祭祠下麗牲有碑宜勒文以發昔賢之幽光而周令亦牽連得書然必求大手筆為之斯不朽矣惟閣下碩徳令望為今儒宗典雅之文追古作者若篆𨽻之妙則秦丞相漢中郎並駕而驅吾不知其孰先而孰後也兵革以來諸老凋謝所謂斗南一人而已惟閣下追念前修賜之述作并為揮灑使刻之堅珉則詞翰兩絶焜燿丘隴將見夫争先摹寫以廣其傳則元公之勲業聞望益著于青史之外矣某又考之南史晉武帝禁立碑表著于令甲至元帝時驃騎府主簿以故恩葬舊君顧榮請為立碑詔特從之然則今閣下之文繼美千載可謂無愧焉耳如某區區龜巢在往歲猶蒙黼黻矧斯文之傳有補風化閣下豈不樂其美耶此某不揣僣越拜書閣下以閣下之必不却也輕凟崇嚴不勝悚息上王總管正風俗書嘗聞豐山之鐘霜降而鳴説者謂氣之相感理或然也今某一介草茅覩呉下風俗之壞扼腕切齒不忍隱黙敢請為閣下陳之盖以閣下得天地之正氣養之于心施于政事故區區狂直感而有聲猶豐山之鐘也惟閣下發號施令行諸郡邑必能誅鋤淫穢一洗汚俗振其氣之餘烈也是氣也在天則為風為霆為秋霜為烈日在地則為艸而指佞犬而咋姦豸而觸邪歐陽子所謂天地之義氣而孟子所謂浩然者也夫以閣下之清非秋霜乎其明非烈日乎政教號令非雷厲而風行乎如某者氣禀獷直疾惡如仇盖亦似乎指佞之艸咋姦之犬觸邪之豸也吁昔孫叔敖殺兩頭蛇而隂徳之報位至楚相自世俗觀之敖之殺蛇損物命也殊不知除一物而免衆人之害徳莫大者也今日之事正類此物故復舉此以破世俗之惑罄其一得之愚惟閣下察之賀丁州判到任書某客居江滸帶經而鋤一日鄉之父老過余曰兩年吾州以州長之賢民用復業今又復得賢州佐共仁其民必能盡除煩苛使田里無歎恨之聲矣余居此飲婁江之水是亦婁江之人也可不喜乎可不賀乎余曰倅方下車曷知其賢曰吾聞之居家能敬其親居官則敬其同僚遇文士則敬武士則敬緇衣黄冠醫藥卜筮之屬咸禮貎之微而皂𨽻亦善遇之又微而蚩蚩之民伏庭下訟曲直者亦謹以三尺之法裁之未嘗厲其聲怒其色也是皆敬之存于中形于外如此非賢而能之乎時甚樂聞其説因黙念先民之言謂能敬必有徳徳以治民而民必被其澤矣既而入州以父老言詢諸文武醫卜緇黄之間無間然者至于搢紳月旦之評道路輿人之頌比前所聞者尤加詳焉是誠可喜而可賀也然則一州之人今被其澤固當為一州之賀等而上之澤及一郡則又當為一郡之賀又等而上之敭歴臺閣羽儀天朝可為斯世斯民之賀者未艾也惟一念之敬始而終之君子慎焉與陳翰林子山書某丙申冬逃難呉門逢人問閣下出處顧嘗為浙東路難之憂後二年聞居翰苑深用為喜近于唐彦博處又喜知爵位之崇道徳文章之盛每誦一代不數人百年能幾見之詩馳慕而已某離鄉六年備歴艱險年今六十百無所成獨與兒輩固窮嘗懼失其故歩也比來目昏耳聾髯白如雪惟髪尚有黒者則其状全類社公可笑可笑鄊人多無噍類而某一家數口幸而無恙父子筆畊粗免溝壑特未知將來如何耳兹因胡宰行謹此問訊即日秋髙伏惟善加保愛亟秉鈞衡以福天下上周參政正風俗書某毘陵賤士也曩歲以避兵來呉閣下時為郡主有所控訴俱蒙接納由是知閣下為能聽言為能下士常懷野人芹曝之獻而未能也今閣下參秉鈞衡為國柱石以斯世斯民為己任呉人賴之若子之有慈母風雨之有夏屋别妍媸而有鏡較輕重長短而有權度也况閣下不自有其明下士之勤吐握不倦聽言之切詢及芻蕘某雖老無能為視舌尚在豈終無一言以效芹曝乎然國家之事錢榖甲兵則既有人籌之矣講求法制亦有人矣薦賢舉能又有人矣特呉中風俗壞于浮屠之不肖者曽無以及之某敢請為閣下直述之夫男女有别然後父子親父子親然後義生義生然後禮作禮作然後萬物安無别無義禽獸之道故禮謹大昏詩首闗雎易著咸恒書稱釐降聖人慮天下後世深矣彼佛之為敎雖有異同然以淫為戒亦甚至切但今之浮屠玉石混淆所謂不肖者乃僧中之羅刹佛氏之罪人無别無義之禽獸也某處某等之徒未易枚舉姑以目前言之某以堂堂住持之稱踰墻而摟三闕二字繼室桑中之妾駢集方丈行窩旁觀因往往唾斥怒罵但未有言于官者耳同衣不敢言之教門之鄉里不敢言之恐其怨害也上司懸隔而不聞州縣置之而不問是以恣其荒淫了無忌憚逺近效尤淫風大行良家子女蘭鮑俱化甚可惜也愚惟狂直不忍喑黙然某本異鄉之人區區僣言殆猶西家之犬吠東隣之盗使其主因吠而警耳且能使家衆捕之亦庶乎救其所失不然則犬為徒吠且徒取憎于盗耳今閣下當路于呉非斯民之主乎有司非家衆乎治其人使返其尤物而風俗還淳非尚能救其失乎以閣下之明必不使某為徒吠之犬而徒取盗者之憎也惟閣下察之或疑浮屠氏不肖者多莫能盡治是大不然君子之徳風也小人之徳草也風行草偃如響斯應有不待家至而戸到也昔明道程先生言于朝曰治天下以正風俗為本然則區區所陳不為細故惟閣下採擇賜之施行非言之幸斯道斯民之大幸也與劉旭齊書某三復誌文皆逹生委命之意不琱不琢之辭深用敬服謹依命微潤飾之但遷葬二親不宜説以便省掃亦不宜泥風水之説也啟菆而遷庶合古制所謂以家學授受而姪子青領鄉薦乃家庭盛事宜特書之至如流寓崑山亦紀實也若孫某必書在某處不然則有其人而不知所在是闕文也以術數二字易相者之言則虛中之説前後相應又見公精于虗中一家之書而免議者有多惑之誚所需挽詩未能措手題小像數語方爾腹稿續當納上若夫戒酒一節未喻髙見古人居䘮不得飲酒食肉然必曰五十以上血氣既衰須酒肉扶養者則不必然是則酒肉乃老者之不可無也今年將八秩正宜以詩酒自娯盡其天年死無所憾戒而不飲非惑于罪福乎若以戒酒為盛徳事勉而為之則古之聖賢皆欠此一徳不然何老癡如是耶望不以人廢言亟請呼麯生以永朝夕重九僕當折菊一枝擕酒一壺并作活祭文詣前為公洗胸中凝滯也與孝章殷君書相去纔一舍地不面動經半載可勝馳情比聞足下以名後而往如玉抵鵲深用慨歎已而知有傭力者代之得不廢種學績文之業又深為之喜也某嘗謂士生斯時固樂于得時行道然有命焉非力可致當此之時茍能有一畆之宫可以棲息賣金買書教子共讀客至沽酒劇談古今真樂事也左近朋友惟足下洎子英袁君公振馬君朋南執中二趙君幸足下勿以細故少沮而遽改其樂焉某于二十年前固嘗樂于此矣今茲窮途不復可得家累百六十指借屋而居仲春以來風雨連月頽檐敗壁濕薪破竈視累輩若有不豫色者某賴有陶詩一編可以自娯且時與樵歌漁謳更唱迭和乃釋然無纎芥之累于胸中也諸友㑹間煩以前所陳者告之使樂其樂旭齋劉先生無諸君之樂者則以漁樵唱和邀之亦必樂余之樂矣僧廬十絶先乞示教上何太守書僕本毘陵人也寄跡呉下于茲有年竊聞賢府侯以清静治民亷明之聲洋溢下里凡民得以安集于二天之下者為幸多矣僕雖窮居一室從事筆畊然日與田夫野老為伍而共其休戚焉比者欽奉綸音大赦天下聖恩汪濊物無不沾而斯民之幸尤多詔罷敝之民何以紓之又曰民有不便有司舉之此足以見聖天子憂念斯民之心如此其切托付有司之意又如此其重也由是田野之民歡欣鼓舞意謂痛入骨髓今又有増科水脚之患焉譬如乆病之人舊疾未愈新病復増實何可當哉奈何里胥催徵急于星火飛芻輓粟晝夜不停搰搰無吐氣暇雖欲赴愬于甘棠之下不可得已况能愬諸輦轂之下乎如某者以筆代畊田無寸土于官賦重輕本無干預然斯民困苦之狀慘于目嗟怨之聲刺于耳誠有所不忍者况聞賢府侯吐握下士子愛庶民故輙敢以芻蕘之言上逹台聽是猶豐山之鐘霜降而自鳴野人之芹愛君而特獻也一誠如此餘無覬覦惟大人君子上以體聖皇矜卹之意下以察疲民疾苦之情鑒僕愚誠恕其僣越特䝉採擇賜之施行使困苦之民得以蘇息愁歎之聲化為謳歌将見太史氏以循良之政登載簡册而僕亦當作襦袴之謡與田夫野老歌詠于郊野間矣呈府侯書嘗謂國家更化務從寛大以安民州縣承行貴在申明而無弊事既有乖理宜陳説見奉詔書内一欵節該民間凡有不便事理該載不盡者有司明白申舉事輕者中書省即與施行重者集議聞奏欽奉如此切見崑山州歲辦秋糧八十餘萬石舊年本州遵奉上司所行每糧一石起科水脚米一斗各保人戸赴京納糧其所用水脚俱係自行出備當時有司失于申明上司優免開除兼之張氏以來比于前元多増糧額民以窮困輸官不敷今加水脚其數益厚不能辦納致令催糧里長人等破家蕩産累遭校責監繫囹圄受罪數月逃亡縊溺者不知其數直至今年八月欽遇赦恩纔方釋免切詳上司允行每糧一石科米一斗既是明白水脚葢以人戸赴京送納逺渉江湖艱難重費以此糧米為稍水船脚之用其理顯然上年官司所收不見如何用度即係重復于民未經定奪開除况今洪武元年見奉上司明文起科船料令佃戸自辦人船脚力送納官糧又每石收銅錢五十文及以官糧二百五十石起科水夫一名赴京畿漕運司應役上項元科水脚糧米有司一槩征收使民不支給官無用度非上司原行之意人民受害下情不能上逹良可哀憫若不建言尤慮今歲秋糧必到似前拖欠負累官府人戸逃亡不無荒廢田業闗係非輕其他州縣事亦一體如䝉采覽備申上司詳議為民除免甚副聖天子優卹斯民之美意公道幸甚蒼生幸甚與孫彦民書伏覽題顧元公祠堂詩語皆事實且以辨斥淫祠表而出之非茍作也筆之懷古錄中歎賞未已忽州人抄示吏部移文行乎有司禁止淫祀且令勘取忠臣烈士之屬載諸祀典者皆奉制集議而行實為聖朝更化之盛舉忠如元公真宜廟食苐恐里社之人不知東家丘之可敬不為申報良可惜也望先生借重一言詢之郡邑必合乎祀典載之有司歲時之祭將自兹始庶不負朝家之美意又恐革命以來巫覡之流復以妖象混淆扇惑愚俗軍民樵採或不知禁更乞上陳督府旁及郡縣請給榜文嚴加禁約尤見先生之仗義也元公在天之靈盖昭昭耳某本合親奉周旋適病齒痛劇其頭岑岑寒熱不可以風故弗能前然視舌尚在且有知己者可與之言故不自忘其僣越而覼縷也惟先生不辭緩頰之勞特賜發揚公道幸甚元公本傳就用緘去拙詩奉懷别楮呈似一笑慰顧國衡䘮父書暮春承令先君書首叙别懷次言羇况驚虞憂患靡不詳悉所云舊疾新愈惟手顫未能作字又曰顫定更寫詩寄去也時予以來人便回即口占一律用代答簡豈意五月六日遽聞捐舘初疑謬傳未以為信又細詢之果爾大故不覺老泪之濕衣袂也區區友朋猶此慘怛况為之子若孫者其鉅痛為何如哉然孝子之至宜以後事為急顯親為務如刻銘紀徳瘞骨闕山及以遺稿可傳世者鏤板而傳之如此則先君子之亡猶未亡也僕以衰老弗克蒲伏往弔切見張司業以詩祭韓吏部勉效一篇以陳薄奠因敢僣越相告如前所云諸季洎令子諒惟孝心所同各兾節哀順變僇力遺事以盡孝思之情臨書悽楚至禱不宣與陳彦直書古人有言曰瓜田不納履李下不整冠盖嫌疑之地不可不慎衆口鑠金不可不畏今執事欲以臨濠倉屋就宅上為之意在招致同役鳩集梓工朝夕相與規措監督而成就之至如供給飲食收拾物料亦得以驅馳臧獲輿𨽻之人為之効力此固忠厚君子之用心視公家之事如家事也然以嫌疑論之則類乎整李下之冠納瓜田之履知幾君子可不避乎數日以來事未作而行道之人已有萋菲之言况他日乎吾嘗詢諸執事之骨肉至親及宗族姻眷朋友相知者皆曰誠有可嫌疑者如前所云但恐咈執事之意不敢直言不敢强諌退而論之猶可更張造作之地如鄒􅇕陳渡橋等處隣鄉接境宻邇同役執事領袖于彼使佐貳者各任其責工匠者各展其力凡一切所用錢物公同出納明白簿書如此則不根之言無自而生矣或于公務之隙歸理家政亦何不可斯言也雖出自衆人之言實合于老夫之心是用筆之簡牘以告執事盖亦恃以平日相愛相敬而以忠告朋友之義如此執事勿謂㓗已奉公無可為其謗者昔周公聖人也而有四國流言樂羊子賢士也而有盈篋謗書况今俗薄其嫉妬怨憎揺唇鼓舌者所在而成羣一旦妄生謗讟譁然而蠭起執事將何術以止之耶茍無術以止之則其患有不可勝言者可不慮哉可不慮哉易曰君子作事謀始又曰君子見幾而作不俟終日始而不謀見幾而不作後雖噬臍恐無及矣區區僣言切希恕察與許鈞善書春初承諸名勝惠詩盖以社櫟無用之才或能致壽而忘其蒲栁之秋也知感知感自是音問曠絶不審動止何似可勝懷仰區區徙居横山日與野翁溪友班荆坐談或泥飲擊缶更相唱和以為娯樂餘無可言者數日前乆雨而晴出門野望欣然見百榖稔熟遥想呉淞江上西溪沃壤秋風䆉稏黄雲滿目真可為先生賀吾兒森得舅氏新田四五畆畊以蓻秫度其所收亦可釀臈酒作粔籹以充其親之老饕若先生之家豈不十倍于此倍十之喜亦可知矣千墩諸故人煩問訊并致豐年之賀臨書馳企與袁子英書比者周履常來承手誨具審起居安吉諸公多星散所喜孝伯教諭遠回及有提學俞先生寓同里閈朝夕相與講明古道或倡和時以為樂而某違距幾三百里恨無縮地行術可以同其樂也如景仰何如景仰何曩聞欲著書以究事物之藴其他述作必更有之示教一二可乎吾儕道同志合雖各處一方茍能于文字間以古道朂率交相責善視連屋不相往來與夫往而蔑可語者逺勝之矣俞先生往未曽參拜莫敢以此情告公及秦陸盧殷熊闕諸契家念僕舊交勿棄老謬幸賜警策則區區未死以前皆可以與聞古道之日也某目雖昏尚可以强觀大字書耳雖聾亦可以聽人髙聲語但健忘絶不能記或欲作一詩閱數日而不能成既成而援筆欲寫又為茫然嗜學之意實未厭也惟諸公念之春晚寒暖不常切兾為斯文慎重與京口俞伯鎮書比小兒去丹陽倉卒附舟不及書問及歸乃言嘗至甕城以塵容俗状羞去謁見即日仲秋計惟天相斯文動止廸吉朝夕㳺從或山歌野唱以適其適餘無可與故人道者西望長江馳慕而已公居泮宮必多著述不鄙老繆尚希有以見教近聞丹徒令君死𦵏魚腹蔚有政聲區區恨不得其姓名事實之詳筆諸野史敢煩髙弟録示可乎本官遺文暨諸大手筆之所紀載尤望示警吁喧啾百鳥中忽見孤鳯鳴識與不識皆樂為之一聞耳末由㑹晤更兾珍重答熊𤣥修書頃辱賜詩及書其詩所以開釋老懷者多矣書辭詳悉如聆面言然皆辱追理清事非世俗寒暄之問而已䝉所跋雷震事言簡理明殊有警策辨惑編未到書府不知陸沉何地矣今再用一册與鷗盟文送上此文命題葢子虗烏有先生類也悠繆之談茍合雅意使老夫亦得挂名鷗社中不亦可乎愚見以閒叟易野叟之號名實相稱且人皆得以稱道耳比聞寓舍有鬱攸兩畨之厄而郎囝且為萬里之行懷抱欠佳然君子處困亨乃為曠逹况有小令郎幹父之蠱朝夕侍側足以為娯此意此言惟先生然之如某者自去秋為凶人排陷嘗繼以重疾人皆危之頼天之靈復延殘喘由夏而秋村居放適數日患痢自謂必死僥倖又不藥而愈亟命兒軰執筆口授答諸公春首之書及盡償隔年詩債先生聞之必為我一大噱也與姪僧徳藏主書汝七八歲時父母鍾愛因汝父好佛欲令汝為僧身雖在家已僧其首教汝讀論孟即兼佛書埀及成童遽命從釋汝母泣而從之時優曇師為汝祝髮授以五戒及汝侍靈隠竹泉師法席果茗之費罄汝衣鉢汝父且竭力繼之盖望汝為釋門偉噐至如成佛作祖説法度人皆汝父所望也不幸汝母先即世父亦客死于兵俱不能見汝特逹可不念哉可不念哉今汝汨没固時之使然兵鋒數年竟不復㸃檢其身奮厲其志貿貿焉甘于閶茸豈絶然不記憶汝父之言耶近聞去金陵謁西域髙年之僧受戒而囘吾謂此行在庸人則為可嘉在汝則為可笑葢庸人昧理有不知殺盗淫妄之非或酗于酒一旦受此五戒遵而行之變惡為善是可嘉也汝自幼為兩名師弟子豈不曽授汝之戒乎抑西來之僧不以瞿曇為宗而别有所戒乎不然則往年之戒即今日之戒受而不持徒爾僕僕是可笑也吾嘗觀佛書説父母劬勞四恩之一也凡學佛者在所當報不知胡老僧曽語及否吾聞汝于二親烝嘗及俗禮掃墓等事皆不為之其心必曰古禪老有言一子出家九族生天是為大孝惟恐不能盡出家之道不能度九族之人負乃劬勞為人訕笑以為豺狼之不如于心安乎余近者一病幾死日來稍愈恐旦夕溘先朝露則斯言無復有人告汝故扶憊援筆布露肝膽慎勿諱疾而忌醫蹈前覆轍父母所生二子汝兄早䘮惟汝獨存春秋祭祀奚忍從汝而絶耶似續之計老不可為若釋門祠奉之禮汝亦可為否則奉春秋祭掃隨俗禮以終其身亦庶不㤀㒺極之報云耳若夫修行佛道非吾之所想亦當先務㸃檢其身奮厲其志持守戒律由粗入精水到渠成何所不至誠能如是乃不負汝父平昔之願也汝其勉之汝其勉之予生業儒故不事佛使其為僧則衣佛之衣學佛之學凡與汝所言者汝當力行幸勿謂言耄而忽之與蘇性可書中秋前一日淫雨喜晴晨坐坐瓮牖下焚香瓦鼎三復魏公百韻詩追念令先君面諭之言雖隔一宇宙猶昨日也感慨之餘書數語巻末謹用納上以今觀之前軰如瞻翁先生得正大之學卓然不為異端紊惑者盖亦鮮矣幸而象賢有子又篤生磊落振拔之孫及有姻眷如伯逺兄者相與矗立交相勉厲視百家妖妄邪誕之説如鵂鶹夜鳴吐罵斥逐不一動其心此僕所以愛之敬之以三俊為㤀年交也數日來抱疾待斃百無挂牽但恐兒軰于失怙之後為鄉俗所移或違治命吾死之日三君子有能為中流砥柱者乎伯逺洎令嗣偉正同此致意頽憊不克親書必䝉照察與蘇州呉趙二心友書今春曹徳升去甞致書二妙隨得報章知中行避地海濱盖亦離羣而索居也時老夫在憂患中聞之為之悵然荷執中埀念不逺三百里欲賜見訪此情豈泛愛者可得同日語哉某二三年來父子邅迍有不忍與故舊言者前年秋木為縣學訓𨗳媢嫉者以擅離役訟之受笞五十斥為編氓去年暮冬忽分憲于案牘求疵府司官曹俱被罪責而木復加五十五杖發鳯陽屯時某以卧病不能為之申愬痛苦而已抑鬱而已其從弟送行至正月中旬負疾而歸醫救月餘屢瀕于危老夫平生惡况未有如斯時者既而病者勿藥老懷欲紓方擬抱牒赴䑓閣之下以鳴其不平承郡守以毘陵誌書付託辭不獲命自春徂夏黽勉校正疲憊之軀如墮膠漆每一思之涕涙交瀉如此更兩月餘夏初誌書甫完乃盲左目雖可見天日如隔烟霧由是杜門餌藥又復經月慮恐雙目俱盲則此志不伸此子不復能救矣于是奮不顧死力疾詣憲府陳詞仍以惡詩傾寫䑛犢之情頼臺官上下如秦鏡並照灼見肝膽特賜哀憐信宿之間上徹天聽欽䝉玊音放木歸養半年陷阱一旦得脱于七月初三日到家老夫先歸兼詢其抑鬰痛苦積于懷抱者方若氷釋矣然則非上天有以相之不能也非祖宗之遺澤未冺亦不能也顧區區力援其子以盡為父之道實斯文啟廸之力為多二公吾斯文骨肉視木如弟姪者其受禍必為之憂苦其䝉恩必為之喜懌故歴叙顛末用徹清聽不自覺其覼縷也拙詩謹呈事亦概見凡知己如元修子英公振鈞善諸先生均煩舉似或者有以見教則老夫得歌詠為樂其幸多矣盖平昔樂于讀書今以目疾而廢但每日飽飯熟睡百無猷為亦無可為樂者惟樂此一事以待斃耳未㑹間惟二妙徳業進脩幽真養福下情不勝至禱不宣答許鈞善書中秋後一日翰墨到手甚慰馳思且知三書渺茫埀念愈切䝉薦舘地且玉其成鮑叔之知何以過此但某年既耄矣某子如死而復生有菽水之養矣茍不知止貽笑老耼亦違我聖人貪得之戒矣佩服重言敢不聞命方竹杖甚佳受惠感激承問吾兒其事見于呉趙書中皆抄去先生視之必重為之戚而喜也答管伯齡書一别十年相去幾三百里非惟㑹面之難而書尺亦不能寄清風明月未嘗不思𤣥度世羙上人自錦里來歸得手札并佳章情誼藹然文藻燦爛足見徳業與年齒俱髙欣羡欣羡婁江之東詞林獨歩又安得尊酒細論如曩年終日竟夕之娛乎然昔人有言心親則千里晤對矍鑠二老扁舟往來不消十數日程相與訪諸故人于三江五湖之上以適其適真吾軰餘生之樂事也歲晚有興當踐斯言奉和來詩聊抒情愫鄙陋之辭發一笑耳令嗣過庭煩道前悃金陵往還過敝寓白鶴溪可乎兒軰曰木曰森皆為農横山之陽廢學可恥林也䝉郡守過愛舉充江隂縣學職固辭不獲去有日矣其如居者壁立何諒故人埀念故及之餘不一臨書無任馳系與盧公武書前歲殷文學再赴咸陽持至佳作且極談幽貞之吉甚慰馳想今年春得袁子英先生書乃知公車入鳯閣而演綸之筆已在手矣可喜可賀即日諒惟徳日益修道日益隆而文譽日益以著可勝仰企從子林到京令問起居并以拙詩一小編呈似盖有學子王尚絅者將欲刻畫無鹽出醜鄉里于予舊稿中摘出一二類而編之敢望痛加删削賜之序引則庶或不致覆瓿矣往者懷古錄屬有記載今亡之原稿若存更乞抄示區區棊花手巾并囤碑一本送上希領意歲晏更兾為斯文慎重以迓春禧與陶孝思書比月旦鄉飲而别滿望執事與郡庠諸公同過鄒墓以陪賢太守及官僚仝為祭掃不審胡為不來也夫鄒忠公為道學君子天下共賢之在昔學有祠墓有亭郡守教官嵗有祀事二三百年之間遺文尚存非繆傳也然豈特鄉郡如此哉凡其平昔過化之地莫不尸而祝之惟近嵗以來郡中之祠亭俱燬奉嘗之禮寖滅廢缺今府公舉兹墜典與斯文有光較諸弔萇𢎞祭樂毅屈平田横諸先民者豈不韙歟是行也雖道路之人猶為興感矧學士大夫好古而尊賢者乎某于五月七月間有拙詩二首兹用録似盖以執事相知而不哂其迂相契而不責其僣必能倡率鼔舞賜之述作若郡博士先生及周儲二妙見之亦必翕然揄揚以崇先哲縣學諸名勝聞之又安得不從而作興耶展墓之行想能有日而某又當持一盃以陪沃酹區區别有僣言庶得面盡矣不宣上武進樊大尹請置先賢祠書某嘗聞古者祭鄉先生于社盖祭社以功而鄉先生以徳而預享焉崇徳報功其義一也近世祠鄉賢于學宫是亦附祭于社之遺意其禮可不事歟姑以武進言之若我胡文恭公張文清公鄒忠公霍状元乃所謂鄉先生之表表者前知縣江右董公繕修黌舍嘗置祠文廟儀門之左欲于此祠而奉祀之以秩滿而去遂成曠典今明府視政以來闔邑之事大小畢舉特此一端偶未之及然而事雖至微實繫風化如䝉即此祠宇修設供具崇奉先哲尸而祝之使邑人知所向慕必有過祠下而嘉歎之者曰今之山川猶古山川也今之學校亦古學校也士生斯邑茍能如前人之賢為世師表亦得享無窮之祀矣由是而感發興起奮厲激昻風聲氣習渾然俱化又安知不有胡張鄒霍之賢相繼而出耶愚所謂事雖至微而係于風化者此也惟明府不以老生之言為迂而以國家之風化為重舉此盛事以厲風俗斯文幸甚鄉邑幸甚答崑山袁子英書七月望正鬱鬱苦熱忽承六月廿四日書及聮篇佳作逐一披玩快然如清風入懷加以金井水灑靣醴泉甘露之沃烟火肺腸也繼即付小兒林逹張溝而近林自郡庠來歸云學中諸士友仝觀蚶杯之詩不勝稱羡想希尹得之玩味賞識其快意無異于老夫也某白首歸里故舊淪没惟希尹相知為深若思賢録一見即欣然助楮板百片且將率好事者刻之想執事聞之亦以為喜故用語及區區又有一事不避譏笑専此干托學子王著欲以龜巢稿鋟梓因摘數十篇與之名曰摘稿愚意亂道雖多不能盡出醜耳然必大手筆如提學平齋余先生者畧為序引若右軍為蕺山老嫗書扇則非惟價重當時而名亦為之不冺惟執事玉成之某扵此先生固未嘗有半面之雅去年冬嘗䝉惠詩以光衰朽乃執事過愛其亦從而愛之今之求文諒執事一語之賜必可得矣他日當耑馳瓣香因徐見孟以鳴謝悃餘有干凟别楮具陳鈞乞留意朝暮間拱候報音辰下雨凉伏惟講貫之暇多有著述示教一二尤妙東望玉峯無任馳想與賈教授書昔郡庠祠道鄉鄒先生祀享而學官復有墓祭由宋及元未嘗廢弛今我郡博士未䝉舉行盖兵革之後學校方興前此或未之聞也區區老生用敢饒舌幸勿以人廢言與周儲兩助教議之特賜修舉則某亦當採薇横山挹泉龍井挾憊駿奔以從諸公之後矣兹有口占并以思賢録送上惟講貫之暇電目一覽必有佳作如前軰發先哲之餘光也曕奉在邇書不盡言臨楮馳系不宣與鄉友鄒鈞顯論合祀忠公書嘗聞盱江李太伯之没家無子孫其鄉邑學校𦵏而祠之祭掃不缺也栁耆卿客死襄陽羣妓合金而𦵏每春上塜謂弔栁七至今以為美談吁以太伯視吾鄉先生鄒忠公之賢有間矣况耆卿乎夫忠公程門傳道為一代名臣且嘗以義文周孔之易論孟之書發明妙理埀教百世郡有祠墓幾三百年不幸因元延祐以來有非其種而為似續佳城毁裂殆盡繼以陵谷變遷蕩然無遺去年冬頼有賢郡守率僚屬墓祭碑之仆者植之樵而牧者禁之庶亦無愧太伯之郡邑矣苐吾黨服儒衣冠未嘗持一觴以澆墳上之土視曩之舞裙歌扇者反不及之區區老生感今懷昔可不告諸文獻故家乎惟執事乃故家之傑出者也顧某嘗以忠公之盛徳大業洎諸賢士大夫紀述之辭録為一帙名思賢茍能板刻而傳使觀者知忠公之賢如此則其髙山景行之思駿奔豆籩之敬自有不能已者景鄒有亭顯忠有菴皆無異于古人矣夫如是則斯文之光鄉土之榮風俗之厚且美為何如哉昔人有言曰存則人亡則書盖書存則其人之亡猶不亡也耶與詹伯逺書前兩年宜興許主簿六月送炭盖其知范叔之寒豫為之計今足下于此月惠布葢與許公之心同乎一誠也老夫雖嘗以小詩謝之今衰懶不能措一詞然此心感荷實不能忘知己者必以情恕非簡慢也近得江陰張希尹都事夢屋篇謹用緘去此老語不過諛而意有抑揚足下宜識之餘人所作尚未到手惟可賢父子佳章毋吝見示老夫自月旦到陳館代子訓䝉稍暇則以古今名人之詩長歌短咏自以為樂殆猶曽晳之嗜羊棗也可笑可笑秋辰下暑而凉惟樂嵗優游安享清福為慰與李石泉書某寓此寂寞濱日以吟嘯自娯過客多望望而去有如一泉近仁至則閒坐片時語及吟事者盖絶無而僅有也所需拙作令學子録去諸人視之必有笑吾軰所好如栁下之鍛何足樂哉然自得之樂難以語人亦不必强與之語也秋凉過此必留一宿然庶得清風明月之夜傾倒所懷耳聞以一泉為字乆矣近獲晤語言乃改為石泉又欲以固本為字石泉則為道號矣某因足下去速不細論想所以欲改者必有人謂一泉二字竒崛且無出處是大不然夫一泉者謂一胍之泉自原而出非溢美之詞也若僣尤古人之九淵及世俗所矜玉泉之類却當改之兄道號冝在晚年隨所寓而稱之不必拘拘于名字之義囘示雅意當為作字説矣餘文縷述不宣答袁子英書秋間領教帖及發至余先生序文此盖以執事過情之譽致䝉褒拂如此兒軰得之即鋟諸梓老夫感銘于心豈忘所自哉今拙詩二首其一寫懷仰之情一以謝余提學并寄陽羡茶一裹惠山泉兩罌區區微忱煩為轉逹所諭毁范蠡祠不審果否抄示之文又不知前軰遺稿耶今人所著耶毁祠于某年月某人言之某官行之耶欲得其詳傳之郡邑使在位君子有倣傚者是亦遵令典正風俗之一端也某因兒子木入杭代渠訓䝉陳氏閱三四月漁樵唱和無足舉似近作辨訛數十語將與舘人行當録去請教某詞冗長以其欲揭之樷祠諭彼愚俗不得不然所愧不能言簡意明如古作者欲再得木居士等一二事引用其間惟執事多識前言敢求批示某以兩目昏盲不克詣座下細論徒増馳慕而已余先生洎諸名勝同此請益即日祁寒切兾安居養恬以壽斯文答惠子及送泉書一别兩年將謂假舘華莊優㳺蔗境未聞移席縣庠也故昨于學齋書中有失問訊兹承賜詩與惠山泉偕至不勝感激遂即刻奉和以抒謝忱曰龍山只在片雲間不到山中四十年多謝故人知渴想瓦瓶封寄煮茶泉笑笑學齋回更煩尋水符之盟毋使山靈笑人寂寂也竹山詞乆為烏有弗克奉命歲晏末由晤言惟善保為斯文壽與曹師禹書昨詣魁塾值入城未囘絳帳之下衿佩仍集賢主翁代鳴教鐸清風穆如歆羡而退老夫藏穴如龜然亦有時蹣跚于西枝之西東洲之東如曳尾泥塗者近聞里中有孝感事心甚喜之作小傳為記其實片楮録上敢望實翁徳和諸名勝交相潤飾賜之咏歌庶幾觀民風者採摭亦可為聲教之助云爾與永慶雪心長老書比承裹茗過寂寞濱誾誾話言殊可人意且䝉以清節處士徵余文義不容辭然别後思之似難以畫竹之美遽用為號嘗觀古之人以號著稱者多矣姑舉其一二言之晉之陶淵明門栽五栁因自謂五栁先生世以其不事二君乃以靖節處士稱之非自號也陶𢎞景掛冠神武門歸隱華陽洞人稱華陽隠君後賜號華陽真逸唐之張志和待詔翰林以母没不仕居江湖間稱烟波釣徒後賜號曰𤣥真子亦非自美也白樂天平生顯宦晚年放意詩酒號醉吟先生及與香山僧滿等結社稱香山居士而已宋徽宗以徐仲車不仕為孝木有連理甘露屢降諡節孝處士歐陽以劉凝之棄官歸匡廬作詩贈之有曰丈夫壯節似君少其後朱晦菴為作祠亭匾曰壯節皆非架空立説也由是觀之曰清曰節詎宜自稱在他人亦不宜過情而譽之今王處士之家或有清節可愛之竹以寓名稱或逃于逸與丹丘羽人為方外逰即以此意澹然為號豈不韙歟今畫者鞠躬問道于師之像寘諸巻首亦人所未曉也是皆待公與之定論批示詳悉方可措詞拙直之言必䝉領畧秋暑尚熾惟安稳為宗門自重稍凉造見以謝先施并盡所懷臨書不勝馳系答集講主書八月初承書及詩乃知仁祥二長者一在九京一居濠上前聞陶生之言皆謬也誦詩驚怛而嗟歎之迨今未已惟髙隱清修得大自在且與諸親友及宻邇者逰從如昨可敬可羡所諭聽雨篷海萍等作丁寧再四義不容辭但昏耄無人可語兹用稿呈煩為潤色庶不為二公之醬䝉耳兒子林去冬臈月赴新鄭縣不得奉命若海萍之詩必得釋門善知識以上乗宗㫖發揚方盡其妙非兒軰章句儒之所能也如老夫者亦臆度想像而已淞南小隠却易可作亦煩先得其詳方可着筆區區管見改日細論有恒公振諸吟伯求賦錢孝女詩煩介意取寄吕克明宅専望専望更兾以宗門自重不宣與林掌教論請建先賢祠書夫學校以明倫為本育才為務風化之所由出也如追慕前賢褒嘉忠孝節義等事樹之風聲使化行俗美則于學校之教豈小補哉汝今所職不可不知此為先務也吾聞新鄭為古名邑邑有東里子産故鄉宋歐陽文忠公之墓在焉此二賢者一為鄭之賢大夫事見春秋傳等書不毁鄉校已有大功于世教况其有君子之道乎其一以道徳文章為世師表力排異端羽翼名教配諸孟韓功亦懋矣凡過而知者當為起敬邑之人可無同鄉之愛乎汝今多幸奉天子之命領教兹邑訪求古蹟知有二賢理宜考諸簡册參之禮經告于當道請置祠學宫是亦古者祀鄉先生于社之遺意也釋菜之禮以誠以敬毋事繁文尤不宜用世俗楮鏹如賄賂然其祠堂供具亦從簡古毋事華飾所費之資當割俸與諸生及賢士大夫協力為之慎勿為邑氓之撓愚見如此未知諸名公以為何如與熊元脩書昨者不以衰朽自棄往訪故人滿擬細講道誼傾寫素懷奈何已眚之目加以暴疾不如所願臨行辱厚餽不能謝别䝉諭淫祀雖以懐古録進呈亦不能面議攘斥之竟悵然而歸連數日所患不痊暗室坐卧因思洪武初欽覩詔條斷除塑像今彼無知民不以顧元公忠藎為敬而以俗稱金家神之類羣然土偶玉石混淆非惟循蹈覆轍有負前人且違今代惟新之命宜于里中及守祠者示以禮法悉以屛除獨設木主題曰晉散騎常侍顧元公之神庶得上遵國典下息邪説豈不韙歟想先生以足疾所沮憤然于懷莫若告諸鱸鄉隠者等一鼓作氣仗大義而為之不啻如摧枯拉朽耳某實以衰病不前此舌尚存詎容泯黙先生與諸公必能矜察非徒為是嘐嘐然也乃事顛末具載周左丞記中請稽考事實合宜而行慎勿為狺狺吠雪者弛焉雲山相望顒俟報音夜來聽兒軰誦佳作于孝女之事議論抑揚詞意古淡非泛泛者可比小兒求引年詩尚希賜教鱸鄉諸吟友二詩兼得尤佳𤨏碎不及各書煩為引忱臨楮馳系不宣與呉中衡書别後第三日小兒以舟自無錫問津到令親蔣宅滿擬請判閫孺人與老妻兒婦軰少聚奈何如燕鴻相避悵然而歸然令岳母老安人在彼養疴賢夫婦必有候問之日望乗便過寂寥濵茶話以償所願鷗社翁所言淫祀愚意以執事寓居長洲難與里中等語鷗社軟脚疾雖厄健歩或可以今古理法告諸鱸鄉隠者從臾而為之則無以異乎老夫奔走先後也尊翁挽詞并舊文録上所領厚惠舉室知感同此申謝到千墩王有恒處更煩索引年集求諸公詩賤累老妻而下皆屬筆問貴眷起居并奉相過之約區區懇禱不宣與馬公振諸故人書比到千墩蒙綈袍戀戀日與周旋弔死問生悉如所願乆獲賛成思賢録事欣幸佩徳没齒不㤀但不得一登草堂連床夜話荷執事以目疾見憐弗責爾如仲昭甫孝義恭謹襟度恢宏雪篷叟敬老愛客挺㧞出羣其禮意皆溢乎欵接餽贈之外有可思而不可忘也南澗海萍二法師忘形而知心有恒濟民二契家愛敬而盡禮明善則篤親戚重師友才識兼進尤為可喜相見間煩一一道謝感意别後到陳溪信宿逢人説項無不歆羡思賢録命刋書者為之為無梨板未得速成想中秋前王猷訪戴之日書成則偕往晤言特未知病眼為何如耳執事詩已編録孝女詩于呉彦徳處取至但欠伯齡先生等作尚有望焉諸公賜引年詩多多益佳更煩發去中行兄處盖熊毛諸吟友欲作故也老夫重改去慈竹軒詩尚兾羣彦以郢斤交斵付明善入巻無致為大方笑仲安賢良彦清昆季同此致意不及另書答謝袁子英先生書惟中上人來承問念吾子早世以詞哀之以鷄酒祭之存殁知感即日暮春伏惟師弟風浴詠歸追踪古人賸有樂地老夫可仰而不可及也自去夏以來目昏則見人不能識認耳聾則低聲語言不聞齒髪皆脱落幾盡日食糜粥殘喘僅存然此心好古嗜學不减疇昔時令小孫軰近立侍側髙論原道西銘太極圖説等篇不㤀素志奈有時以目前平地風波為之憂恨不得與亡妻相從九原之為愈也謹此奉謝并述潦倒之状如前所云晤語無期切兾善保以享清福不宣與姜天定書前者得挽詩二首吾子𡨕𡨕中必知感髙義老夫亦知所學非舊阿蒙但不克一相見與細論不識近日為醫為儒専于何業少暇可過潞城與小孫仝到横山啜清茶説淡話就煩删擇舊稿類抄别帙盖年來兩目昏盲謄録者字多差誤得是正之庶免貽後人之笑耳有一舘地就議可否寒家雖遭兩䘮皆不用世俗所尚之禮足下之來無勞虛費夫貧者不以貨財為禮老者不以筋力為禮此古之通義也但近年朋友道喪不可不􅊰風俗甚薄宜敦勸之若吾友吳啟之父子王季髙叔姪令弟周輔等皆平昔有見識有議論者聞吾軰講古今必能輔相激勸以篤人倫以厚風俗曽子曰人之將死其言也善請誦此以速其行顧老夫衰頽不乆于世遲則不復論此古道矣良可惜也偶有謝新鄭張宰一詩録去過目觀其仗義如此薄俗之敦亦庶幾焉與袁耕學書比在崑山四十日凡新知舊交青目顧盼赤心解紛指迷途挽頽波者皆知所自也况飲食交載禮意俱隆老夫與子孫軰感銘心骨有難于筆舌盡者㑹間煩一一代謝六月朔到家布帆無恙但病目赤爛兩耳益聾殊覺厭世若友文齋匾煩先生為之俞孝女事政宜上旌善亭表著以遵令典以厚風俗其移文立傳事合詳明宜大手筆為之吾軰當從而賛美可也姓名年紀嵗月日時得批示一知尤妙即日暑雨希倍加珍攝為斯文壽與俞彦智書昨到崑山故舊中如畊學先生靈光巋然新相知者皆可人意惟執事削去邊幅能仗大義能勤小物能刻畫無鹽以衒其美老懷銘感之死奚㤀兒子及孫感亦如之兩文皆納上幸恕稽緩即日秋暑諒惟起居安適酒邉清興必多然狂客之號但當風流如賀季真以稱其名至若滑稽太過或笑中有刀以貽後患詩曰善戱謔兮不為虐兮聖人于三百篇中垂戒如此宜保察之老夫托愛厚饒舌再四盖區區如愛美玉恐汚于蠅聲發于心不忍緘黙幸毋責焉坡翁詩曽蒙許借望付至小孫軰一覽秋冬决當奉納臨書懇禱與海萍講主書崑山延福僧舍中兩獲晤語知平地風波所在有之逹人大觀必不芥蔕于靈臺也㑹後抵家不及言别想已還湓溪安穏清適老夫以思賢録刻完追感王仲昭處士獨成其美美不敢㤀今以此書一部送置靈几吾友士庸于宅務之餘不時誦讀以忠義視為規式黽勉以循蹈之則先尊深為象賢之喜也揚子曰希顔之人亦顔之徒惟講主誘掖奨勸以玊成之醉琴賢賔主續當印去懷哉昭甫無任悵惜與余茂本通政書昨到崑山得傾盖如故者數人而執事開誠心論古道片言隻字商畧可否其謙益有過人者逺大之噐豈易量哉况飲食餽遺禮意兼盡使老夫及兒輩感佩而歸未知所報嘗凂作亡子挽詩必蒙留意望付至以光泉壤區區贈無逸一詩煩為轉逹令親雪篷髙隣仲名㑹間呼賤名致謝即日秋暑更兾節哀慎重以終禮制臨書馳系與張子才書曩嵗承􅋈舟東郭知老夫坐分鷗沙賜以専席奈交臂而失候歸帆者兩三月而後已去年秋亡子辱諸公哀挽之詞小孫裒為一編名幽光録今年重九為予泣而誦之且曰公有一詩别紙見寄乃令再四髙誦使余泚䫙芒背想吾兒九原感作亦如是耳縁來詩初到之日病目昏盲致使明珠暗投不曽答片言以鳴謝臆殆若忘故人綈袍之髙誼其過奚文其過奚文自春以來衰耄愈加公聞之必哀矜而弗責也次韻一詩聊抒情愫并想像肥遯之樂而嘉之餘詩用以見老况如此惡薄俗如此之甚請與野居先生過目同發浩歎晤語無期東望不勝馳仰惟髙隠自重不宣與陳彦直書去冬見安道蒙玉成思賢録書板常恐如畚土為山功􅉻一簣死不瞑目今完矣印去一部以踐吾言候有暇日巖電一過則先賢忠孝之道足以私淑授兩令子亦可為進修之助焉聞尚絅諸友自有樂事不發去為醬瓿蒙也俟相見當盡所懷茲不一與王季髙書昔年蒙先尊延置西塾二十餘年敬為賓師愛同骨肉想足下能念其親必不忘其親之所敬愛者老夫之心實亦未嘗忘也聞令嗣聰明可教摘藳一本送去與之又一本送令姪孟凱之子此生曽從㳺資質亦甚可喜區區拙作譬若滄浪孺子之歌善聽者亦自有所得庶乎進學之助言耄而繁尚希採擇與曹徳聲書歸畊之文承命再四不容以言耄辭今腹稿初成令小孫録去若文意有疑似處脱畧處未愜雅意處無吝批示當更思之辭雖不工皆親家所吐之真情所處之實事無虗褒妄貶以累懿徳吁歸畊如此植業如此三親之樂又如此風聲氣習里俗可敦草茆之言庶亦無愧區區恃肝膽相照布此真情非足恭也又昨承手教并惠佳布足見崇重斯文之意本合拜嘉但忝在𤓰葛居常多蒙眷愛雖辭之感激如受之也改去拙作頗盡老懷尚恐有説未到處無吝喻及吾孫或有所見亦可説來老夫平昔不諱疾忌醫凡于朋友中商畧文字亦必忠告未嘗面是而心非也早晚相見當盡所懐即日寒煖不常切兾順時遵養以迓春禧與袁畊學書去年夏五客崑山以詩言懷辱先生與詞林八俊釋門二老𤣥都一髙士從而和之聨珠合璧皆歸錦囊且欣然欲為序文裒為一巻以飾衰朽自秋徂冬懸懸在望新正得幸耄老書聞别有髙興此詩巻豈置諸度外耶或有人作殷洪喬耶區區老癡望猶未已敢請滿其所望焉與髙彦述書往來之禮尚矣然事有不及又當以情恕之不拘拘繁文末節而求偹焉所為君子之交也且如昨者家下小孫歸妻相邀茶話值足下以令嗣姻期之廹不暇過訪若此真情吾何訝焉今老夫本天地間一無用人了無覊絆深欲去賀足下醮子奈手足俱瘡膝灣尤甚攣拳痛楚不能屈信及臂無空膚行坐皆不可得而難往矣足下亦必以真情恕之况山兒有出不克代行千萬莫遣人相招徒勞往返亦不勞饋餉如舍下以區區羮胾送人皆成臭腐空為具文耳老夫待瘡疾既愈必到宅住三兩日晝則同嬉市㕓夜則連床清話飲之食之無所不可吾知宅上乏僕無異寒家天道暄暖甚于前日幸勿勞心役人蹈吾覆轍也吾兒森揆時度物同吐肝膽如此惟足下聽之信之而為知心之親戚矣與辛彬甫書日者令似歸曽致書問并凂求諸公賦節婦詩想留意朝暮間専望寄示令似有老夫適永懷寺詩稿就煩抄至今緘去邵濟民𤓰隱詩此公為貴縣官醫必有行館敢勞一寄幸勿浮沉畊學先生暨陳朱伊呂諸賢良諒惟起居皆安文譽益振所求珠玉早賜壓巻區區嗜詩如嗜飲食幸毋哂焉臨書懇禱不宣與任義甫書人之所貴乎有子者生而事之死而𦵏之祭之先主制禮用是以長其恩愛其來尚矣但近代禮廢俗尚浮屠難于改易比聞主壻之䘮始欲茶毘是則釋氏之教也衆以為戾法而尼之其餘佛事初不相沮子乃屬纊未定而闔棺訃音裁行而發引銘旌不立三虞不祭一切䘮具皆謂無用是不畧遵古䘮禮也然大小佛事亦皆不作使其子將何以表孝思之情耶若夫靈帷題神主不稱厥考又何以致其子如在之誠耶死而有知不能無憾先王之禮未見其然釋氏之教恐亦不如是之謬也以禮論之莫若令外孫改題神主曰顯考某官之靈旁書曰孝子某奉祀如此則名正言順存殁皆無憾焉且如虞祭不設以所用之資作為佛事内以塞一家之責外以解衆口之嘲抑亦可以敦孝順厚風俗也老夫忝在𤓰葛愛如弟兄不避譴訶故用忠告惟伯大叔及諸親從長慫慂而為之與孫彦民書臈月既望兒軰在周石泉處持所贈節婦詩歸詩序中過辱愛敬謙卑之老與文焰俱髙不啻得驪頷之珍連城之璧也蒙索辨惑編并拙稿兹用納上譬若人有痼疾揭之大途尚希遇倉扁而為之藥石焉應芳就禀犬馬之年今九十有一矣去冬初度荷鄉中諸朋友贈言成軸如蒙大手筆刻畫無鹽粉飾衰朽得不以為蒿里之歌乎即日新春伏兾以道自娯為斯文壽不宣回黔陽簿長孫書别去將半年家中老幼俱安舊冬橘客口傳采石信知布㠶無恙為喜今皂𨽻二人至知汝到京來書取夏衣書册等物一一付去汝途中作詩固好但到任之後當以佐令丞治政為重以稱厥成有暇則以細玩律令參考經訓日夜究心决不可作詩作文有妨公務最要𦂳者正已以待吏毋致欺妄循禮以待同僚毋黨毋偏諸事勤謹庶不負朝廷付托之意平昔家訓更不縷述惟吾孫念之曽有二書正月半寄新河周元吉子去恐未到與陳徳廣書某早嵗失怙衰絰中蒙豸官品題光生腐草俛焉就學覬有少進奈駑鈍卒無所成無補于世于是掇拾古聖賢遺訓綴辨惑一編曩幸公為邑丞􅟅工板刻今増前元趙學士昞所著𦵏圖其説本乎周官義理昭著良可為法但欠知本官封謚乃有缺文欲得元史考究三四年來嘗于江隂無錫丹陽三縣學干借俱云無之干諸士夫相識者亦然愚恐溘先朝露貽誤後人用敢再凟望于宜興縣藏書之家特為轉借趙公本傳一抄明説老夫好古之癡如嗜土炭人所不堪自以為樂有能使之厭飲其為欣幸死而不㤀即日雨凉惟琴書自娯坐享清福臨書馳系答吕克明求序文書某奉白昔者左太冲賦三都𤣥晏先生序之張茂先見而美之然後傳寫者衆而紙價為之益髙至如陳師錫序歐史半山老人乃有糞穢佛首之譏吁序文之作可有可無此又不可不知也彬甫來以所著文册徵序余以目眚不能閱其文之美而賛一辭又以長孫有無妄之灾惡况滿前㒺克搆思初非搢紳見譏而固却也然余嘗聽人誦三教圖等篇善為抑揚可喜可喜今足下年妙如此敏學如此爨桐椽竹何患乎無賞識者乎區區耄言希恕察與張子才書前嵗和髙作甚媿稽緩相去逺相見難然相敬相愛之心如故即日秋髙想林居優㳺恬養清福某老状如糞土墻加之風雨頹在朝夕否則芝菌之出塵土或有日焉敢請與執事言之野居先生義人也人皆曰早歲有杜季良遺風非余所知予所見者戎馬搶攘中由錢塘來長洲以故人趙某舉家病疫親戚無過門者先生裹藥活其兄弟妻子凡五人又如起閒居余縣丞之痿救東滄賤工某姓名者如虺如瘵如卧莩而再生皆饋謝而不納至如儒貧緇衣黄冠之貧而清者亦如之呉之人多以是稱焉余乆欲野史作小傳以勵薄俗所謂糞土而出芝菌也煩執事以平昔所見所聞枚舉録示更煩詢訪諸士夫必廣有之區區失記趙俞等名氏質之野居可也遇便人過常郡寄至城中申明亭左劉文中家苐恐溘先朝露㒺克踐言尚希矜恕不宣與呉中衡書十月旦得手書并文知連年情况不如曩昔然天時人事易地皆然無可奈何所喜厥疾既瘳養生有術珍重以盡天年可也蒙諭墓銘古之人本無生前預作體制來意甚切交情至深雖盲聾齒痛舉身瘡瘍勉强腹稿寫去中間用朱筆批處令賢郎從實填寫令閣之賢已于中衡墓誌見之不必别作子祭父文古人别無之盖擗踊泣血之際何暇作文如發引等事只用祝板直述家禮有式可考不敢杜撰若伯叔父祭姪等類却有之幸勿見訝小孫垣今春軍役乃兄塏去秋死老夫曽有口號云云見存寡婦孤女六人幼男九嵗屋已賣田多荒吾兒見在横林橋南張家訓蒙托庇無事森因去年巡攔而貧餘無咎宅居何處土産何物有便人令去問安也賢郎名某字某年若干子女若干亦望見報兩家子孫三世之交亦古道子才賢良及諸故人子孫相見者皆呼賤名問訊區區不宣賀府學教授到任書某早嵗嘗聞之師曰凡府學官郡為士者當以師禮尊之是故聞先生到任㤀其雙目之盲兩舍之逺即扶憊往為斯文賀可嘉者謙光和氣待人接物至諸生則嚴條約以規之所謂道並行而不相悖也區區蒙禮意數載飲食過厚感不容勝其大可喜者親承聖天子以明倫育才之道諄諄乎命之増重斯文之恩至渥也别來三月逢人語之或曰常郡于八九十年之間屢經兵燹衣冠文物蕩然無遺欲其一鼓作氣變齊為魯不亦難乎是不然夫以教官重于朝則縫掖之士重于野况有賢太守承流宣化相與作興風動一邦化行一邑則犁鉏帶經者有之牛角挂書者有之負薪持竿而誦讀者有之正不待家喻户曉而使之然也一榜三魁將復見矣其文獻之光煥乎八統又豈止一郡而已哉某不揣愚陋嘗綴思賢辨惑二編兹用上逹或可為學校涓埃之助云言耄而繁切希矜恕不宣龜巢稿巻十一欽定四庫全書龜巢稿巻十二元謝應芳撰詞驀山溪遣悶至正丙申嵗作無端湯武弔伐功成了賺盡幾英雄動不動東征西討七篇書後强辨竟無人他兩箇至誠心到底無分曉髑髏滿地天也還知道誰解挽銀河教淨洗乾坤是好山妻笑我長夜飯牛歌這一曲少人聽徒自傷懷抱沁園春丁酉春寓堠錢氏寫懷冷笑班超要覔封矦棄了毛錐看今來古往虗名何用朝榮夕悴浮世堪悲老我衣冠傍人籬落頼有平生䥫硯隨西莊上對溪山如畫鷗鷺忘機相逢喜得新知更不用黄金鑄子期把胸中磊塊時時澆酒眼前光景處處題詩輕帽簮花柔茵藉艸時復尊前一笑嬉沉酣後任南山石爛東海塵飛滿庭芳玉雪梨渦錦雲桃扇紫簫雙鳯和鳴觥船初棹烟繞博山青最喜清和天氣緑隂静梅雨新晴髙齋裡馬融書帳風捲絳紗輕華年纔幾許培風健翮曽試修程偶歸來林下閒聽松聲笑道葵花似我芳心在向日長傾黄河水如今重看朝暮還清沁水曲四海烟塵一棹風波經行路難幸兒孫滿眼布帆無恙夫妻白首青鏡猶團笠澤西頭碧山東畔又與梅花共嵗寒新年好有茆柴村酒薺菜春盤傍人莫笑儒酸已爛熟思之不要官任伏波强健驅馳鞍馬磻溪遭遇棄擲漁竿霜滿朝靴雷鳴衙皷何似農家睡得安閑時裡喚山童把醆野老交懽自和雪壓新年花開想遲鶯來甚難喜盃有屠蘇春風灧灧盤餘苜蓿朝日團團六十年來尋常交際江海鷗盟總不寒移家處每渉園成趣居谷名盤忘情世味辛酸但吟得新詩勝得官儘教我低頭三間矮屋從他髙歩百尺危竿白首無成蒼生應笑不是當年老謝安琴書裏且消磨晚景受用清懽又和竹與梅花偃蹇氷霜堪稱二難我依梅傍竹借人茅舍唫風弄月坐箇蒲團梅様精神竹般標致遮莫清癯未是寒柴門外一湖春水似拍銀盤昔人恨橘多酸我只笑青松也拜官每醉時低唱滄浪一曲閒時髙卧紅日三竿兒軰前來老夫説與梅要新詩竹問安餘無事只麄茶淡飯儘有餘懽蘇武慢蘭雪衣衿芝雲冠佩咳唾動成珠玉芳草萋迷蓬萊杳𣺌皎皎白駒空谷濯髪滄洲怡顔芳樹樂甚優伶絲竹問天生湖海元龍豪氣肯令消縮君不見三陸聮芳三蘇接武聲動九重華屋天上碧桃日邉紅杏真足快人心目拂袖東膠出門西笑莫戀故園松菊看濁河流水重清齊唱太平遺曲滿江紅恠底春風要将我船兒畨覆行囊裡是群公相贈數篇珠玉江上青山吹欲倒湖中白浪髙如屋幸年來阮籍慣窮途無心哭歸去也缾無粟吟嘯處居無竹看造物怎生安頓老夫盤谷第四橋邉寒食夜水村相伴沙鷗宿問客懷都有幾多愁三千斛一剪梅一色蒼髯兩阿翁年也相同月也相同六年湖海共飄蓬烟也溟濛雨也溟濛移家今住葑門東朝也相從暮也相從何當歸隠舊山中桃也春風李也春風風入松寄朱原道為生日賀梅花折去一枝春人在太湖濵天生襟度容江海每開尊坐客如雲此日醉看蓬矢吾兒應吐華茵湖光山色淨無塵魚鳥揔情親姑蘇城上遥相望見湖山如見伊人緑髪年華全盛白眉聲譽方新又歲寒心事舊相知相别去年時如今重覩春風面比年時消瘦些兒天上玉堂何在人間金鼎頻移風塵不染素羅衣脉脉倚柴扉桃根桃葉争春媚儘教他濃抺胭脂老我揚州何遜隴頭誰為題詩金縷衣袁叔度新居卜宅椒園裡響丁丁風斤月斧杏梁飛起牕戸青紅烟樹緑焜燿碧山鄰里雞共犬也知輪美燕子飛來堂下舞似輕盈掌上人堪喜更可愛新桃李長洲水接松江水好秋風鱸魚蓴菜葑田菰米艷屋神仙羅綺楚舞呉歌娯晚景肉䑓盤春筍供甘㫖五馬貴未足擬沁園春脫屣紅塵移家碧山娑羅樹邉有兩兒冠帶眼前騰踏諸孫文采膝下聨翩石几焚香氷甌滌筆重註羲經得異傳餘無事但觀雲黙坐聽雨髙眠龜巢幸與相連飲湖水清如飲菊泉問絳人甲子今踰四百皇家鍾乳何用三千銀艾忘情玉枝無汗一味清閑足引年升平也看天恩賜帛雪髪垂肩西江月老大無人青眼凄凉奈爾黄花秋來盃勺斷流霞兀對江山如畫夢裡去尋東老覺來欲喚西家山童若説未能賖報道㸃茶來也風入松青龍地煖土酥香産玉似崑岡可憐不入瑶池宴倒氷壺風味凄凉忽憶故園時序春盤春酒羔羊青絲生菜韭芽黄銀縷染紅霜桃花人面柔荑手酒微酣犀箸頻將鞞皷一聲驚散六年地老天荒西江月緑樹雲林窅窕青苔石磴縈紆兩人林下曵長裾應是山中巢許空谷似聞樵斧危橋不度徴車誰來為我借茅廬來與白雲同住南鄉子四野接平蕪一曲清溪似畫圖燕子日長溪館靜菰蒲風灑軒牕暑氣無林叟話樵蘇相送東橋日已晡啼鳥不知人禁酒葫蘆教我提來何處沽摸魚子早春作看東風栁揺金縷精神頓美如許獨憐老我雙蓬鬢無復少年張緒桃葉渡任山水清妍可奈非我土借人茅宇但有客相過清茶淡話閒與論今古傷心處客去卧聽鼙皷看花渾在烟霧姑蘇䑓榭笙歌散麋鹿又如前度誰恁悞教無限蒼生命墮顛厓苦兼葭洲渚頼有箇扁舟一竿釣竹相伴閑鷗鷺水調歌頭中秋言懷戰骨縞如雪月色慘中秋照我三千白髪都是亂離愁猶喜淞江西畔張緒門前楊栁堪繫釣魚舟有酒適情興何用上南樓擐金甲馳鐡馬任封侯青鞋布韈且将吾道付滄洲老桂吹香未了明月明年重看此曲為君謳長揖二三子煩為覓莵裘憶王孫銅駞泪濕翠苔茵落地花如墮玉人可是東君不惜春問花神海變桑田幾度新又齊雲一炬起紅烟頃刻烟消事已遷折㦸沉沙月爛然問祈連安得河清億萬年水調歌頭秋色净如洗南極瑞光多秦柱山中隠者弧矢掛烟蘿野老敲門看竹珍重主人留客呼酒㵼金荷為問春秋多少笑道明年六十勲業竟蹉跎萬鍾禄千駟馬待如何洛陽城市又看荆棘卧銅駞且喜堦庭玉樹五色鵷雛俱好對此琴瑟和一曲華胥引䨇鬢雪兒歌洪武元年秋余卜居千墩嘗作水調歌今也人事乖違欲還故里故復和前韻以述其情并以留别呉下諸友時三年六月初也牙齒豁未乆老氣尚横秋買得歸畊黄犢兒軰幸無愁相近六龍城下只在三家村裡結屋小如舟倚樹覽山色且免賦登樓看官爵都不似醉鄉侯里翁閑話便同學士坐瀛洲寄語東呉朋友乗興能來滆浦􅋈棹聽漁謳無酒不須慮解我破貂裘滿庭芳麈拂風生薰爐烟裊劇談天上人間馮夷擊鼓白鳯舞崑山驚倒五陵年少聽三老口角鳴湍江南好梅前菊後天氣帶㣲寒客來雖話别重歌舊曲不是陽闗笑閒雲似我時去時還最喜烽烟盡熄青天淨一鏡團團重來也尋盟鷗鷺訪竹問平安㸃絳唇初度作七十年前抱麟虗負䨇親夢一襟空洞生世曽何用老我東門𤓰也無心種松醪甕㵼如鉛汞時與漁樵共二海上歸來鬢毛枯似經霜草薄田些少茆屋園池小三子犁鉏三婦供蘋藻村居好兎園遺稿是我傳家寳三弧矢休懸舉杯聊適棲遲意明朝冬至有酒還沉醉堪笑神仙要作長生計人間世金烏西墜難把長繩繫四老眼猶明著書未了餘生債客來休怪淡飯黄虀菜踏雪觀梅清興依然在南門外夜來尋戴扶醉䭾驢背五㸃檢龜巢素琴絃斷餘何有夫妻白首相敬如賓友三四孫兒五色斑斕袖梅花酒為翁稱壽羅拜爹娘後沁園春借問黄花過了重陽如何始開為客中陶令逢他初度尊前杜舉要我相陪十日秋香百年晚景一笑今朝酒莫推風光好正凉生沆瀣净洗氛埃胸中華岳崔嵬下筆處長江滾滚來且折花簮帽劇談清事引盃看劍聊適幽懷健翮低雲脩鱗蹭蹬人道公非百里才還知否那黄河清也白日悠哉水調歌頭六載逺相憶一日似三秋别後雪添蓬鬢著述遣窮愁閉户欲尋安道溪上片帆飛去興盡復回舟明月出東海隠約見瓊樓喚龍伯擊鱓鼓舞陽侯何時杯酒重歌蘆葉舊汀洲多謝寄來雙魚白雪陽春數曲為我和巴謳什襲付兒軰好學製弓裘南樓令壽陳縣丞赤手㧞鯨牙長安早看花藹春風百里桑麻栁色宫袍銀束帯親受錫玉皇家鱓皷報早衙桑弓掛緑蛇拜雙親杯捧流霞只恐哦松哦未了天上去又乗槎八聲甘州為友人贈醫士喚嫦娥白兎下蟾宫玉杵擣𤣥霜自焚蘭古鼎心融靈素黙契岐黄不假殘膏賸馥時俗共傳方用我上池水遍洗膏肓家住六龍城裡有舊家風月三徑蒼筤更一林新種紅杏暖生香問年來活人多少只囅然微笑説尋常誰能為冩成佳傳汗竹流芳滿庭芳夏五雨窻言懷十里横山一灣流水東洲蕞爾孤村移老田舍山水對衡門老我無能為矣犁鉏事付與兒孫湖田上黄梅雨足蛙黽皷聲喧親朋三四老鬚眉雪白言笑春温每擕手相過清事閑論坐挹山光水色茅柴酒傾倒匏尊章䑓路馬蹄塵土不到紫苔㾗又和寄江叔亷雞犬相聞溪山如畫梅花只在前村逍遥杖履不過翟公門前度春風已先對芳艸還憶王孫長安市看花人去車馬正争喧向來東海上水南水北如石如温念鷗冷詩盟何日重論老我蓬蒿三徑開懷抱頼有琴尊公知否蕭齊雨漏四壁篆書㾗菩薩蠻七夕作鋒稜磨盡方藏拙老懷羞對天孫説風葉動清商依稀似九章飄蕭雙鬢雪卧看彎彎月月缺有時圓人無再少年水調歌頭再和前韻青白既生眼皮裡有陽秋誰信近來懷抱汨汨泥窮愁昨夜僧房聽雨如在瀟湘夜泊欹枕臥孤舟無復少年日解佩醉秦樓更休説爛羊尉爛羊侯三山湖上如今田舍住東洲澒洞十年金革蓬勃一襟塵土白雪向誰謳濯足㺯雲水披我老羊裘又代陳氏謝徐孟銘玉杵擣靈藥丹鼎養芙蓉城市山林小隠家住驛橋東况是南洲髙裔更飲上池直液氷雪炯心胷醫國手初試在處起疲癃種隂徳方寸地繼頥翁活人多少滿林新植杏花紅遮莫南山石爛又復瀛洲水淺都付笑談中刮目看塵表黄鵠駕天風沁園春寄張希尹兼簡劉小齋劉熈載憶昨秋風送書畫船過楊栁洲把錦囊傾倒燈花共喜棹歌歸去詩艸仍留坐榻髙懸家童偶語此客尋常頗見否襟懷好比子猷尋戴别様風流别來一日似三秋且喜花時可勝逰要尋山問水春申故國賦詩釃酒季子髙邱醉帽簮花吟茵藉艸莫笑踈狂老未休同來也有堂前舊燕江上盟鷗㸃絳唇往古來今何人不道閑居好忙多閑少應被青山笑蒲栁衰顔我獨驚秋早茅齋小幾畨掀倒風雨都經了風入松孤舟浪打石尤風霹􅋬浪聲中布帆喜得歸無恙繫長橋閑似漁蓬蛟渚如今寂寂鷗波依舊溶溶秋花開到鴈來紅金菊對芙蓉一襟磊塊都澆去飲紅灰如飲黄封睡到日髙三丈從他衙皷逢逢㸃絳唇彩翼雙鳬寄來一幅天機錦闕絶品將意何勤恁闕嵗晚空山不怕氷霜凛西風𦂳便添袍緼被徳吾無隠八聲甘州記年時東走避風塵隨處覔桃源偶相逢一笑緱山西畔喬木叅天百尺元龍樓上許髙眠鼓我匏巴瑟魚鳥欣然每日春風池舘有竹林諸阮醉袖聮翩要簮花捧研常挾兩飛仙又安知桑田變海竟飄零老去雪盈顛綈袍外故人餘意肝膽雕鐫滿庭芳三闋神仙有無安居華屋即是蓬壺榴花也學紅裙舞燕雀喧呼水晶盤饌供麟脯珊瑚鉤簾捲蝦鬚吹龍笛擊鼉皷年年初度長日儘歡娯風流醉翁蹁躚舞袖窈窕皷童琵琶要與知音共換羽移宫玉蓮杯将酒供金蔗盌歸厨凍歡聲哄年年醉中岸幘藕花風横山翠屛藏龍古井走馬長汀四時花竹多風景勝似丹青好兒郎天生寧馨好時節日見昇平氛埃净年年壽星光照望雲亭水龍吟舊家金谷園林盡隨海變桑田了一灣流水一林修竹莵裘将老瀟灑軒窻波光隠映筆床茶竈但溪無六逸林無諸阮誰相與論懷抱不用滄洲洗耳聽風前此君清嘯黄金䑓上儘教塵土騁車争道魚鳥情親漁樵邂逅不時談笑看古來行路難行真箇是閑居好賀聖朝呉淞舊雨相隣住喜復來今雨那時同遇十年艱險劍頭炊黍缺下調滿江紅舊約尋梅蹉跎過小春時節忽隴頭人至一枝先折喜見春風顔色好縞衣不受緇塵湼把十年湖海舊相知從頭説三江上滄洲雪千墩下珠林月似許詢支遁總皆清絶重看青山擕素手此情方解相思結待漏湖氷泮栁風輕孤舟發沁園春笠澤東頭翠竹漁莊滄洲釣船看三江雲浪宛然圖畫一篷風月隨處留連巨口鱸魚團臍螃蠏坐飲篷牕醉即眠蒹葭畔不收笭箵意若㤀筌向來四海戈鋋好戰艦都成赤壁烟笑癡兒航海空尋蓬島漁郎失路漫説桃源漚社盟寒歌聲斷烟水寥寥數百年𤣥真子有家傳舊曲重扣吾舷鵲橋仙青年去了青衫破了舊日青氊無了一時清興未能除説與故人知道春花春好秋花秋好每日看花尤好人生沽酒買花錢消得杖頭多少一剪梅崑岡火烈去年時玉也灰飛石也灰飛鶴長鳬短總休提善有天知惡有天知今年快活保妻兒歌也相宜舞也相宜揮金如土醉如泥休負佳期莫負佳期又東風吹醒老梅枝南也芳菲北也芳菲月明半夜五更時笛也争吹角也争吹青松澗底獨離竒寒也誰知煖也誰知老夫聊為一􅌵欷梅也題詩松也題詩又一天和氣盎春暉桃也芳菲李也芳菲若敎風打雨淋漓紅也塵泥白也塵泥花前把酒挿花枝歌也相宜舞也相宜鶴長鳬短總休提長也天知短也天知江城子去年今日㵼天瓢水滔滔斷藍橋阻我群仙鸞鶴赴蟠桃獨有商羊偏喜雨跳且舞上山椒今年南極見丹霄射金蕉瑞光揺澆去胸中磊塊儘酕醄莫厭琵琶彈舊曲長聽取鬱輪袍龜巢稿巻十二欽定四庫全書龜巢稿巻十三元謝應芳撰行狀誌銘贊箴故伯母行狀從母姓鄧氏諱某常州武進縣曹坊里人也年十九我從父諱文正娶為妻動遵禮法事舅姑甚謹姑晚歲失明每飲食必相之徹而後退平居雖甚寒暑服勤女工每夜分而后寢至元乙亥天兵南下以常州未平駐師京口逰騎往來居民多避地他徙吾謝氏居城西烈塘以世業不忍去置東西竇門募丁壯守之騎不能入然人情恟懼母自以少艾恐遭俘略嘗謂娣姒䓁曰設不幸為北兵所虜將若何衆皆曰茍無所逃惟聽命耳母獨毅然曰吾寧自死誓不受辱是年五月八日騎者二十餘軰攻里門甚急衆不能禦遂奔潰攻者火其廬虜從母及隣婦數人遭係累而去行臨漕渠母乃潛脫其棄簪珥於道傍投水而斃時南岸菑醫之中有竄伏者見之已而來告求其屍果得嗚呼吾從母不屈而死者于今七十年矣應芳為兒先子屢嘗語之今諸父六人俱無嗣不肖茍不白其事是冺其潛德謹錄先子遺言狀其行如右惟當世立言君子賜之著述則從母死且不朽謹狀王佛子行狀王佛子諱彬字文甫常州武進人往遭亂譜系喪失弗究其先所自考從龍當至元乙亥天兵南下家國殱焉常既内屬繼室以張氏養子質數年而生君君潔白端好父珍之六歲即延師教于家君性敏慧善記誦明年生痘疹疾時已授孟子書恐為同業所先數號泣白其母母曰兒疾旦暮且愈以兒强記之資寧懼弗及乎殆不能釋用是致𤯝一目稍長事親孝與兄質無間然者未冠經營家事率有條理公私内外咸便之居無何貲用益饒父母終每遇時祀追思飲泣曰向吾豐殖計裕親也親今亡矣多蓄奚為願傾貲之半以施于佛祈助㝠福再渉南海禮補陀山君憫其以報親為心而弗疵云及兄歿喪葬亦如禮至是與兄同居者七十年矣平生慕馬少㳺之為人好閲古書中孝友隂相事然性剛直人有過面折不少貸每旦起立卑幼庭下畫授鉅細事大要歸信讓勤儉子孫少有不及必加誚責待其兄之子若孫殊覺寛假常勵之曰吾非爾宥也茍怠吾事行且罪及兄子軰愈趨事以勤食指㡬數百緦服同㸑歲時頒賚及嫁娶品式至于服食􅊏嗇皆均一無私家庭之内肅如也晚築遐觀樓以延賓客多叙時流名軰相與婆娑嬉逰諸子姓因得磨礲浸潤亦醖藉可愛佛子方少時有里人夜為盗家𨽻獲將殺之君力救免且戒𨽻勿言後數年其人臨終時自語其子使毋忘焉聞者或以是詰之終于不言同母二妹其一嫁邑人姜氏生二子至正間其父子俱為讎家誣陷抵獄吏鍜文埀成如律乃惻然為援之遂脫其死餘親故藉其力以排患難亦多類此故鄉邑倚之若長隄鉅防之於湍流狂瀾云若隣里貧而病者每助醫藥之資且常置棺置别墅有不能歛者則與之或乘馬出入遇負戴者雖少長亦引避田間見耆老必下馬相勞苦以為常故鄉人號為王佛子浙西以田賦為重州縣吏以其家租入之多命為正首徭役殆無虗月然按文應需之外課戒子姪毋以毫髪横擾細民人頼以安仰之㡬如父母橋梁溝洫不待官府督責而豫自辦集公私兼濟其利亦以此自勉也至閑暇時委家事諸子姪携一二朋舊問丹陽道過句容臨白下陟鍾山冶亭之杪徘徊徙倚訪六朝遺跡挹臺閣清氣或入呉抵錢塘覽湖山勝槩悠然忘歸此又其髙致而人少能知者至正十二年十月紅巾據常時佛子方卧疾于家賊衆坌至盡掠其所有意恐為里人禦奪發倉廪誘之皆不至賊縱火乃為撲滅已而賊誅君疾適愈起召里人嘉勞之明年春正月卒于家年七十二子庭玉䓁以其年二月葬君于直瀆新阡送者千餘人多哭之慟皆曰善人亡矣妻丹徒周氏生子男三人長庭芝蚤卒次庭玉次庭槐女二人長適丹陽周氏次適呉門金氏妾周氏生子庭梧孫男曰敏曰政曰孜俱有室餘尚㓜兄之子庭桂次庭椿其子尤夥某與佛子同里閈且辱招致教其子孫者十餘年故知君為詳謹狀其行實以俟當代立言君子撰序次第期示不冺故處士存心陳公行狀曾祖諱文表宋兼州司户餘缺祖諱霆轟宋從政郎行國子錄餘缺考諱聖澤字容軒宋承節郎提刑提舉司奔牛酒庫提幹陞提刑司簽幕兵馬鈐轄朝奉郎常州通判賜緋銀魚袋帯行都督府機宜文字先生諱師可字伯大自號存心老人通判公之第三子也宋末父居官常州武進縣奔牛鎮宋亡而元遂為武進人母某氏先生生至元十五年戊寅不數歲能通孝經論孟大義父常問之應對如流然天資醇朴不尚文藻既長當路者多薦辟之皆不就孝奉二親於喪事𦵏祭罔不如禮其弟振可父命為同邑張總把後蒙可贅盧莊金氏後振可頗豪俠先生數勸止之然其好賓客接後進飲食教誨送往迎來亦不减乎其弟也平居坐蒲石軒觀盆池小魚洋洋自得曰魚之樂猶吾之樂也或小飲微醉歌安窩先生之詩擊節嘆賞晚年家居為童子師無賢愚貴賤但内拜則進而教之束脯之禮不計其孰有而孰無也元末草竊蜂起鄉里有不可得而居者挈家依無錫東膠山安氏食指數百恬不為憂盖人多知先生為有德之士供具不絶既而䑕軰旁午乃轉徙蘇州城西先生及妻康氏相繼以病而殁先生享年八十有一妻年若干宰木㡬拱遇世變環城數十里河隍變遷而大明開天矣先生初娶陶氏生子曰以仁先卒繼室康氏子男四人長曰某次曰某娶某氏孫男三人長曰融娶丹陽陳氏次某俱㓜洪武己巳冬葬二親衣冠於唐原祖塋之側嗚呼先生生死始終兩遭兵變不以艱危虧事親之禮不以困乏失守身之節存心之號不誣也某自早歲㳺從且忝姻戚知先生為詳故狀其梗槩如右管伯齡妻壙誌張氏諱某蘇州鐡瓶巷人也性聰慧女工多不學而能其精巧有過人者父母鍾愛擇配逺邑得處士為儒族名家子厚貲裝而嫁之事舅姑能盡婦道凡祭祀賓客在中饋所當為者為之靡不中節鄉閭則之男女㛰嫁之禮亦然生子男二人長曰嗣娶同邑宋氏次曰繼娶陳氏從軍某州三女長妙真適方氏次淑真以真所適皆里居嚴氏孫男三人長顒娶周氏次仰充皆幼孫女一人適史氏曾孫女二人長復奴早亡次孝奴在幼自處士歿丁時多艱憂患在牀褥者㡬年某年月日病卒享年若干某年月日封窆與處士同穴毘陵謝某嘗居為隣故知其槩如此云義士呉先生墓誌銘先生諱輒字中衡其先㑹稽人祖某元浙江省醫學提舉居官杭城因家焉考某妣某氏某年月日生先生性聰敏過人初家塾之師授以孝經論孟即暗誦如流成童通醫書内經奥㫖餘如脉訣歌活人書䓁多熟焉至如吹洞簫鼔琴瑟舞劍皆不學而成其志若有不屑于醫者元末多故南臺某官穆爾古蘓公知其才召為幕賓方欲力薦之而穆爾古蘇公以他事被䜛落陷穽中公懼禍波及之變姓名挈家海上乆之乃賣藥以養其親長洲故交趙執中舉家病疫隣里無相過者獨幼兒應門先生過其家呼厥子入視皆以藥飲之數日而愈後執中父母妻子跪拜奉幣而酬之先生固辭曰朋友患難不相救乎進士某縣丞俞某患軟脚疾先生憐其貧往視之曰可療但餌藥三兩月方愈俞言無藥裹之資先生曰君有此則吾豈為不速之客乎後如期而安其報禮亦毫髪不受或問俞之交非趙氏比何同然耶先生曰斯人有可用之才使得存為世而用之不亦可乎凡貧居有一才一藝求醫而醫可者皆然故呉人翕然以義士稱之然呉江富人有沈姓者遣幣招致及門其主人方事巫禱先生乃飄然而歸翌日沈氏復重幣固請先生終不赴而返前幣焉凡如此者亦多矣或譏其桀傲弗辨也平居能孝奉二親親歿則廬墓終制化行於家妻某氏事舅姑亦盡婦道先生于大明洪武某年甲子終于家享年若干𦵏崑山縣石浦考塋之側先妻某氏生子曰集後妻趙氏無子皆先卒其子某以余父執知其親為詳請誌其墓故述其梗槩如右銘曰時不利志不遂假方技行吾義全是身報厥親骨雖朽名弗湮於乎蒼天德哉若人管伯齡墓誌先生諱夀昌字伯齡蘇州府崑山縣人也祖諱某宋開寳中以詞賦領鄉薦考諱某遭宋革命遺逸而終生處士于元之皇慶四年某甲子某月某日氣質清秀不數歲能暗誦小學四書通大義既長為學道書院訓導諸生恱服文譽蔚然越二年以病請告踰百日而歸自是年益長而學益進善屬文尤工於詩泗橋杜玉泉氏招先生以教諸子時玉泉以詩鳴花朝月夕更唱迭和其詩如元白而不俗郊島而不寒不瘦也館榖凡二十餘年玉泉殁而教授于家學徒愈盛如歇後鄭五軰及緇衣黄冠能詩者咸與之㳺有古儒之遺風焉大明洪武某年月日卒年七十有六𦵏某娶某氏生子男二人長曰某經鋤養親次曰某從軍某州女二人嫁里中嚴氏孫男女若干於乎先生抱俊逸之才負髙尚之節齊名尚志超然晏居有詩文二十餘巻曰尚志齋集藏于家辭藻之名榮于軒冕誌其墓者毘陵故交謝某也墓誌銘龜巢老人姓謝氏應芳其名子蘭字早從其親聞譜系世居開封多顯貴六世之祖武進尉東西謝莊族滋熾大父别業烈塘涘生男七人一進士遭宋革命家乃燬煙滅灰飛三百指舊家奕世盡憔悴頼有雙親踣而起四男一女同遺體男皆吾兄女吾姊伯兄早殁孤藐爾二仲及嬃竟無嗣我生迂踈昧生理妻任井臼畜三子木也左右奉菽水曰林曰森伯為禰七孫惟塏冠而儼坦垣成童餘幼稚商周興亡陵谷異舉家幸獲全生齒干戈十年浮海避强名龜巢䓁㳺戲還鄉無復舊閭里築室横山墓山址春秋虗度八十二著書數篇而已矣府公遺石誌丘竁聊爾云云叙終始大明洪武十年歲次丁巳七月十一日病中口授友人江隂張端呉處士妻墓誌銘逸菴處士之妻姓曹氏諱某崑山人享年若干後處士若干年卒呉俗尚佛事死者火之其子輒卓然能矯俗之弊以禮葬石浦之原與處士同域時某年某月某日也毘陵謝子蘭與處士有通家之好處士屢嘗語蘭曰吾妻性柔慧早歲在父母家精女工事親以孝謹聞既嫁而主饋奉嘗靡不適舅姑意顧予性嗜酒喜讌賓客語多滑稽賓退每相規焉及其為母教輒與女皆有矩度教輒婦亦如之然平居言笑雖連屋之人未嘗聞也輒負氣節以剛直多與物忤母常戒飭之不敢肆微如臧獲御之亦盡恩義凡如此類其姻戚比閭之所稱無間然者今輒以蘭知其母之詳乞為銘蘭于是紀述舊聞使後之為女為婦為母者儀之則其死猶無死也銘曰淑德之全德容静妍玉温潤而栗然其生也天永其年其殁也人稱其賢又奚卹彤管之無傳乎騋孫墓磚銘龜巢謝第六孫名騋孫生三歲而能言父口授周南闗雎䓁篇立能成誦余愛之意他日可業儒以繼先世甫五歲以痘疹死時洪武十一年三月十有三日也翌日瘞潞城之原余乃哭而銘之曰茁而折鷇而衊造是物者何滅裂張處士墓誌銘處士諱功􅅷字實甫蘇州崑山人也先世多顯宦譜牒具存考諱應辰不樂仕進居鄉里為鄉之善人母曹氏生君之日世方中微君蚤歲即幹蠱有所樹立既孤養母氏極甘輭之奉鄉人稱之母殁而家益肥中歲畢婚嫁事即以家政授二子而子又能豐其殖焉君乃搆佛廬于先人墓左以奉祀事仍與僧日居之故四方浮屠師多與之㳺平居月齋十數日卉服蔬茹泊如也旦則持佛書諷誦畢乃㦸手向天聲謝其意若曰吾之所以得此者皆天也不敢忘也施僧之餘眎窮乏或周之然奉身寡約始終一致自號守齋盖以此耳吁其亦可謂有恒者歟妻沈生子男四人長曰天麒娶邑人金氏再娶姚氏次天麟娶朱氏次天佐出贅同邑夏氏先卒季天佑贅嘉禾王氏而歸女四人曰妙善妙清妙静妙智皆有家而妙清早世孫男曰畿娶倪氏曰絅未冠孫女曰真曰善曰因曰寧皆得配曰瓊英曰玉英尚幼處士春秋六十有九洪武元年五月十二日終于家明年五月二十七日瘞祔考塋其子天麟乞銘于毘陵謝某而某乆客呉下且知處士銘曰始蘖其椔卒蕃其枝惟根于天者弗移曰德之恒予是以銘之嗚呼其止于斯兮方寸鐵銘天地為爐隂陽為炭鑄方寸鐡非桞下鍜剛不可屈堅不可磨侯堅侯剛利用實多仝欲以之刳食月蟲璟以執政剛過于崇惟善用者為衡之權稱物平施錙銖弗偏嗟爾有此藏之于宻以桑氏硯改而為筆摛辭琰琬百煉其工剔去魯魚斯文有功彼寸鐡兮人孰無之欲偉其器繄鈐與錘寧小為錐勿大為錯凡百君子非由外鑠永思軒銘人之生天地中父之恩與天同生而養送厥終盡以禮猶哀恫矧逺離遭鞠㓙一失怙無由從德罔極思何窮生之初本倥侗玉而錯金而礱器之成皆父功哺不烏乳不􅩫忝爾靈慚灝穹念爾親修爾躬以爾孝移為忠其親顯名亦崇茍不然思奚庸霜雨露動厥𠂻執籩豆感必通永爾思如水東于羮墻見儀容庶象賢繼髙風方竹杖銘并序予性喜方偶得一方竹為杖甚愛之因念古之崇節義尚亷隅者類焉刻銘其端持以自警猗與竹君易圜為方虗心固節悉如其常其方伊何如玉界尺不砥而平不繩而直曰予老矣頼君扶持義以方外庶克似之竹素齋銘為鄧宜之作天人交敷羲畫馬圖文明九丘科斗六經於昭日星漆書汗青姬公宣尼斯文緝熈為世範儀百家之多繼聖惟軻如江如河竹兮素兮文斯寓兮開牖户兮爾於其中樸斵磨礱德業攸崇茍留其辭舍己弗治雖多奚為余言若兹亶弗爾欺亦以自規願學齋銘溧陽曾明府塾字子嘉前家居之日以願學名齋今居官扁仍其舊其友常州府同守楊侯徴予文辭不獲命乃為之銘曰終始典學德脩罔覺㫖哉斯言為世矩矱欽惟素王聖本生知學而不厭惟日孜孜好學如顏為聖之亞天若假年不日而化三千七十歩趨後先曰願學者子華之賢卓爾君子志華之志掲諸攸居書紳何異學以明之仕以行之仕學俱優兩輪並馳厥德之脩與日俱積豈惟日積乾乾夕惕願學若茲勲業鼎來不負所學尚慎㫋哉愛日堂銘為無錫趙德宏作先民有言孝有不及人之事親所以為急矧伊大母春秋七十稱亦耆年為儀里邑晨昏定省扶持出入甘輭而饋輕暖而襲養非徒愛敬事必給慈訓並成蘭薰蕙裛慎言與行如玉之執曜靈西馳恨莫能繫分隂寸晷斯須必追厥德既脩業亦樹之愛日若茲衆善斯集毋卑我言陞階拾級白賁軒銘天地之文我象我儀惟文之極澹焉是宜賁之上九白賁無咎茍為不然咎將吾有聖人立言妙理冲漠能近取譬亦孔之灼如衣美錦其文煌煌維其尚絅闇然而彰以賁而白不賁之賁君子以之咎弗我致嘉爾釋氏脩乃白業殊途同歸意明允惬永思堂銘崑山吕克明起家業儒信道篤而事親孝以父母生前奉佛志極堅固有不可移者常承順而恱之及其殁依釋氏茶毘法瘞骨于墓從治命也至居喪則多用古禮縗麻哭踊不酒不肉以終三年之制視世俗舍禮法而溺乎異端者不同也既而近佳城擇地搆堂龕木主香燈朝暮歲時烝嘗追逺之心懇懇切切惟恐後人有弗逮者堂名永思盖取諸古經永言孝思之意洪武癸亥夏五月克明徴文故為之銘曰人之有生曰父曰母劬勞之恩天髙地厚方具慶時綵衣青春志弗克養徒美八珍一朝云亡無復定省雖欲愛日捕風繫影嘉爾孝子事死如生葬從治命祭盡其情日居月諸時則邁矣繼繼承承或怠懈矣經言永思掲諸斯堂非曰能之示不敢忘婁水滔滔不舍晝夜悠悠我思與水交㵼滔滔流水無古無今我思悠悠與水俱深春秋霜露溪毛泂酌有感斯應來享來格無形而形無聲而聲羮墻見之是為思成烏鳥之忱豺獺之意雖子若孫有引弗替存耕銘人有寸田産仁與義君子存之罔俾蕪穢詩書耒耜耕以學力種德樹業如黍如稷我苗芃芃我稼既同仁熟之秋其用不窮彼自棄者厥田弗治耕也鹵莾獲亦如之舍己芸人斯尤可嗤朂哉存耕惟日孜孜程工或虧不其餒而鎦景儀先生畫像贊山澤之癯頎然而長面有詩紋鬚眉雪霜幅巾藜杖逍遥相羊不可貎者其行之方其心孔臧其音琅琅德哉若人俾也可忘張伯仁畫像贊隨俗衣冠容物襟度坦然真率頎然魁梧屢渉危途不失故歩嘗即其天之所賦徴諸人之所慕其可謂吾韜俊傑之光而實能逹時務者歟抑亦可謂冺星鳯之跡而人欲快覩者歟月泉道人小像贊烱烱乎精神蕭蕭乎衣巾渉陵谷之變而乆于風塵忍泥途之辱而全其天真玩世濩落隨時屈伸噫是所謂湼不緇磨不磷託跡為方外隠淪者耶曹節婦贊有序按家傳婦呉姓歸曹氏二家皆江隂望族生子曰有實方幼婦秉節十五年嫠居字孤慈而能教遇世變乃擕子避兵子被執母即赴水死既而子得脫欲收塟母屍日夜號哭求諸水濱乆之終不能得遂以母所服遺飾之物厝諸棺合葬父塋哀毁骨立鄉人悲之君子謂有實之篤於親非其親教之有素而能然乎夫以子之早孤母不失教不賢而能之乎然婦之所以能死節者又豈非世族文獻之澤有以致之乎故為之贊曰楚臯之蘭生有餘芬瑜而不瑕藍田之珍猗與爾嫠比德蘭玉為女為婦儀爾族屬蘭摧玉湛于江之隂跂彼共姜心乎其心拙逸箴嗟世之人知謀為賢膠膠擾擾靡日不然不作聰明不事機巧邇逸若兹庶乎近道身弗行險意無外馳爾逸若茲孰云非宜作偽而拙其拙可羞好逰而逸其逸可憂拙逸之言本乎周子吾其申之以究厥㫖巧㓙拙吉巧勞拙逸旨哉斯言宜爾勿失師箴堯舜湯文為君而師洙泗設教斯文在茲寥寥漢儒章句云爾濓洛諸公麟角鳯嘴師道之大實難其人曰可為者温故知新若童子師為亦弗易養正之功實繫于是師乎師乎宜日三省吾為子箴亦以自警坦率齋箴嗟今之人以文滅質允矣君子欲矯其失徑情直行是為坦率本之于身作德心逸推之于人言踐其實不脩邉幅不任智術不奴其顏不婢其膝其腹無劍口亦無蜜終始弗貳表裏惟一坦率若茲亦孔之吉彼異端者蕩無紀律居不衣冠馬牛其匹坦率若茲乃有足述吾亦率爾言為爾弼謂予不信有如皦日拙齋箴維古聖者經綸大經至巧若拙無為而成唐虞之民其俗皥皥不識不知非無大鑿三代以降知巧百出或哲或愚或得或失去古日逺巧日益多卓爾君子拙如之何言抱其朴不事華藻不䑕之黠不兎之狡彼蛛為羅巧于謀食我飲如蟬清風兩腋鳩拙于巢蠶巧于繭巧拙若斯亦可無靦作偽而拙其拙可羞誠拙而逸其心休休戒之謹之真偽兩途十目所視毋失其趨龜巢稿巻十三欽定四庫全書龜巢稿巻十四元謝應芳撰題䟦傳說雜著題徐松居所書昌黎詩後僕早歲誦符讀書城南詩嘉韓公教子如此其切意其子必樂有賢父之教而成學及以他書考之符也果登長慶進士第斯亦可謂不負其親矣然而為集賢校理乃有誤改金根之繆噫是豈以擢第之後遂弗究于學歟今觀松居先生筆韓公之詩以示其子盖先生之心即韓公之心也為之子者得不以親之心為心乎仲野今學優而仕方且以學軒署燕居之所懃懃焉佩服父訓為學不厭夫如是視韓公之子有間矣昔人有言顔何人哉希之則是况希韓乎僕雖老尚刮目以俟時洪武五年二月初吉毘陵謝應芳書題太乙真人圖按韓子蒼之詩曰太乙真人蓮葉舟又曰龍眠畫手老入神此盖題李伯時畫也所謂真人者姓名時代考之列仙傳䓁書無之不知其果何如人然以蓮為舟偃然髙卧風神瀟灑茍非有幻化之術乃能真蛻骨而仙者疇克若是乎是圖摹冩之妙較之龍眠筆法人無間然其必善學而得其傳乎神仙有無姑置勿論夫君子玩物以適情耳當此金革擾攘之餘人方埋頭塵坌欲超然物外之逰而不可得覧是圖者當心融神㑹與博望之槎琴髙之鯉金仙氏之浮杯踏蘆者同適其適不止論形似而已宗禮求予言俾題其巻首云書歴代䝉求後世俗以千字文為啟蒙之書尚矣然使之識字而已餘何益乎是書亦四言為句便于習讀自羲農以來數千載世代盛衰歴數修短粲然可見授蒙童令熟記而知之豈云小補觀者其毋忽焉某年月日龜巢老人題題子昻竹石昔文敏公初赴京過毘陵止宗人東臯先生家人多求公翰墨後仕于朝往來霅上時先生數從之逰因得公書畫凡數幅内竹石一紙公題小詩絶類此巻吁公初以書名于時其畫與詩本皆絶妙今此巻備焉有區區未易贊述者特以予家藏舊物皆亡於兵眎今又隔一宇宙捧玩再三不勝慨惜題敬親樓詩巻後丹徒陳彦芳既𦵏其親于别墅搆樓以奉先祀扁曰敬親示不忘也夫死者魂氣歸于天形魄歸于地故廟以妥神墓以藏體廟必于家者神依于人者也今彥芳奉祀别第其有徴于古歟抑其心有得于敬親之實而非矯焉以假其文者歟夫目之所視而思從之登斯樓也丘壟在望松楸蔚乎其前知吾親之藏于茲也與其族之人時而至焉固將羮墻而見之抑是室也吾親之所種樹今則拱焉吾親之所燕逰其遺跡在焉彦芳即是而思其親其有不起孝敬乎詩曰維桑與梓必恭敬止延陵季子曰骨肉歸復于土魂氣則無不之也彦芳之心其有徴於此因書以歸之題觀奕圖世謂觀棋者恒髙於當局之士予曰不然顧其人智有優劣亦係乎用心之至與未至耳今觀是圖冩對奕者二人其風度閒雅皆若聊爾于奕坐而旁觀者一人則注目棋局凝然若精思入神或一着可以决勝負而未易語人者熟視其狀殆猶陳平患諸吕燕居深念不見陸生入坐時也吁世之當國者旁求㕘佐與之策安危計成敗亦有用心如觀奕者乎撫巻三嘆用題其末庶覧者或有感焉楊妃齒痛圖玉環瓠犀以荔子而痛痛未甚也三郎為環而痛痛則甚矣使移是痛以痛天下羣黎之痛烏有天寳之亂蜀山之狩乎今觀唐棣所圖不痛環之痛而痛三郎之痛抑亦為當時羣黎之痛也噫題山谷香嚴偈墨跡宋髙宗謂書學廢於五季至本朝蔡襄等方入格律蘇黄米薛各有趨向然則山谷之書為一代名筆豈易得哉題糜氏家譜凡為譜牒者往往追稱先世勲業之盛世代遼邈變革不常茫然紊然有未易考者或乃致遥遥華胄之誚君子恥之今觀崑山糜氏子才家譜則不然世祖而下至金紫光祿公為髙祖之考然後旁及羣從至於人所不知之地天其報之如此家譜之作盖欲其後人念祖修德象其賢行其澤非直為觀美也詩曰子子孫孫勿替引之予亦誦此為他山之石云䟦許氏臺萊集予嘗以天下福善禍滛騐諸古今其理未嘗不焯焯也若曹彬曹翰皆宋重臣以彬之賢屢世榮顯翰肆貪暴子孫飢寒當時史官特並書之以示勸懲詎不信然今觀宜興簿許侯克敬所示臺萊集譜其族自南唐金紫公居畨迄今埀五百年其間擢巍科登膴仕者代不乏人非尋常世族之家所能及也其從兄德夫為金紫公十六世孫以舊編所紀詳於名爵畧於行義乃重著而備錄之諸先正之潛德幽光粲然在目然以愚觀之必又有多蓄隂德黙契于天者雖子孫有所不知閭里有所不聞國史郡乘有所不能傳載天其相之裕乃後昆所以緜逺盛大至於如此不然何世代屢易許氏之澤愈乆而愈不冺耶詩曰無念爾祖聿修厥德又曰子子孫孫勿替引之愚請為克敬誦之詩為祝規并筆于巻末而歸之時洪武七年夏五月之吉毘陵謝某䟦族𦵏圖河南保定趙先生所著族𦵏圖其說本於周官㕘諸衆論尊卑昭穆粲然有倫使觀之者心生孝悌亦猶觀老泉蘓氏族譜也如是以𦵏其親以祛其風水之惑於名教豈小補哉先生諱炳字季明其經學德望為中州時宗至元大德間七聘方起官至翰林承㫖學士平居多著述若四書選註䓁書皆有功斯文愚恐東南之人有未知程伯淳者故粗述於圖說之後鏤版而傳之詳見元史䟦蘓魏公百韵詩後右蘓魏公百韵詩叙平生出處行事之大節謙言為家訓也然字字句句皆足為世楷模豈特一家之訓而已哉若考亭朱夫子西山真文忠公諸大賢咸有贊述區區後學尚何言歟某竊嘗忝與公之裔孫景瞻父逰屢䝉出是詩警教嘗謂某曰名教有餘樂異端戒多紊只此二句有終身行之不盡者盖其服膺祖訓力踐正學卓然不為異端邪說之所惑故有是言時某䓁知所向慕者幸頼私淑而加勉焉於乎瞻父既殁世亦隨變瞻父之子若孫家毁於兵獨珍藏是詩出入戎馬間三十年與身俱存且能奉庭訓不淫老佛亦可謂不負魏公埀訓之意也某重獲覧觀儼如對瞻父晤語敬書此以寓感愴䟦脫時敬叅政手書字書心畫也人能覩其親之心畫而知其志焉斯可謂能子矣今觀髙郵同守畏吾氏伯堅于兵革之餘得乃翁脫公大㕘所書晝錦堂記如獲重寳愛之敬之不翅若其親之在目其殆著存不忘者歟愚嘗論歐陽子之為此記也盖知韓魏公之志在乎德被生民功施社稷故以此二語為一篇之要大㕘筆其文得非志魏公之所志乎使伯堅灼見其親之志曰德曰功當知勉其所以繼之者是則愛敬之心又推之于書字翰墨之外能子之道必如是而後盡耳昔者辛夘秋公來毘陵適予復忠公墓田築祠立碑公為之大喜嘗以弔祭之文示予而往焉時所書端謹持重視此篇筆意蕭散神氣飄逸有不同者此先見其字學之妙不凝滯于一偏也於乎落月滿屋梁猶疑見顏色况心畫乎想像髙風不勝起慕敬書此以告伯堅并抒所懐云書安撫陳公䟦先君小像自贊後昔者狄節使却梁公畫像世固稱之若先代遺容遺言如安撫公父子者其後人當視瞻如生存敬恭如侍側勉焉冀企及之雖時有隆汚命有通塞有不克奮勵以纘先緒然所以是是非非不避權勢赴人急難如救頭然是皆起懦疾之藥石也慎毋以狄公藉口而藐眎厥祖如塗人然詩曰無念爾祖聿修厥德軒冕云乎哉閥閲云乎哉今安撫七世孫茂吾婿也出示石刻祖像并覽贊䟦起敬起慕因題其後如此云䟦張氏家譜圖右畨禺張氏家譜圖知常州府事中憲公度倣歐蘓族譜為之由七世祖而下瓜瓞延蔓尊卑戚踈瞭焉在目中憲需予言愚於是切有感焉書首九族詩重同姓吾夫子嘗刪定二經埀訓萬世其敦本之意至深切矣若夫大小宗之法盖推廣之後世宗法寖壊世教日衰然天理民彛未嘗冺絶東平九世之張江州百口之陳亦代有之若文正公則能以祖宗之心為心贍族有田踈逺畢給真可謂不負詩書敦本之意今觀中憲公追念厥祖留情譜系惓惓如此他日㕘大政得厚祿如文正可為之時以是心為之吾知文正公不能専美於昔矣揚子雲曰顏何人哉希之則是愚於是亦云䟦吕仲珪孝思巻夫為人子者或不幸於養生送死之道有未盡焉處禮之變當從權以事其事豈徒抱終天之戚而已哉今觀崑山吕仲珪氏早嵗以父命出贅不能奉甘㫖後其親旅殯白下去家五百餘里又不能春秋省掃以寓哀思服闋數年痛䀌如昨與人言輒流涕盖仲珪以孝有不及情莫能忘然則如之何而可也惟所謂權宜用釋氏茶毘之法函骨而歸瘞諸故丘宰而楸梧祠而蘋藻焄蒿悽愴常若見之則其親之死猶不死也若夫繼志述事或出或處樹其業以顯其親則諸士夫頌美孝思之言斯足徴矣䟦凌克禮父子孝感詩文後昔聖人以子騫父母昆弟之言而稱其孝盖人之善事親者必先目之口之于同室之人而後一鄉一國熟聞而著稱極而至于流芳天下後世矣前數年客有過毘陵者說潤卿父子之孝吃吃不離口予來婁江婁之人咸譽之既而盧兖州子長嬰以趙徴士用晦所贈孝感序并諸賢士夫歌詩若干篇皆本乎其父母昆弟之言予然後知潤卿二子長克仁次克禮能罄家輸粟以贖父罪去之日奮不顧身數千里危難争先而赴吁昔趙禮兄弟遇暴將臠食之其兄孝曰吾體肥可代吾弟若克禮事雖不同其亦趙氏之心歟然或者謂是亦常人所能為予故原其心而論之如此豈易得哉今凌氏五世而居重闈色養曰慈曰孝其所以盡其孝道者固不止於是也洪武十六年夏五龜巢老人謝某䟦䟦陳寺丞思愛菴疏右故宋寺丞陳公以思愛菴奉先疏請果上人主之駢儷精切字畫端勁其為人可知寥寥二百餘年為果嗣法者不知凡㡬代是菴易名圓通盖亦有年公之疏文幸而無恙今性中師弟子知敬重之求士夫題識余於是竊有感焉宋之文獻禮樂盛于漢唐然當時世家如文潞公之有家廟者絶少請寺觀為香火院者滔滔豈禮樂不明淪於習俗以致然乎今性中知其文當知其心知其心則知所以敬其先世者在乎菴仍舊名庶存初意如此則名正言順而奉先之意終于有成寺丞公之死猶無死也豈徒重其文而已哉䟦岳氏族譜岳氏為常之望族舊矣予早歲過唐門見其第宅相甲乙者數家且聞竹山蔣先生言宋乾德間岳王弟經略使之孫自九江來居由宋而元子姓蕃衍文物之盛㧞萃同里比以陵谷變遷奕葉憔悴東之懼譜牒散失嗣而緝之猶老泉蘓公之譜其族也老泉之言曰觀吾譜者孝弟之心當油然而生吾知東之亦以是有望于族人焉或謂昔者狄武襄不後梁公君子韙之是大不然非其後而附之者非也為其後而自外者尤非也故人苟能以東之之心為心由孝弟以行吾仁則民吾同胞四海兄弟無往而非仁矣然則族譜之作豈小補哉時洪武十有九年六月既望龜巢老人謝某敬䟦䟦經訓啟䝉右經訓啟䝉北溪陳先生所著也先生經學得考亭夫子之傳卓然為一代師表病世之訓䝉者所教厖雜蔑養正之功故采摭經傳以三字四字為句緝成韵語以便習讀其書言孝之大原學之㫖要使幼學者誠能熟讀而藴之於心養其德性既而長施諸事業則舉而措之耳蘭曩避兵東呉得此書三十餘載郡人徐孟容孟曽䓁見而寳之謂明珠暗投良可惜也是用版刻以廣其傳於乎先生經訓以教羣䝉盖以聖賢之心為心視厖雜之書蘭鮑不同俱化之效乆當見之凡為父師者可不慎其擇乎子程子曰習與性成聖賢同歸吾於此亦云洪武己巳九月重陽日毘陵老諸生謝應芳拜手敬跋張孝子傳張孝子小字阿伴常之無錫人也為兒時父母以歲饑去鄉土流離四方後徙居晋陵之東洲未㡬父卒兄亦早世家益貧母查氏僂傴不能任婦事中歲復多病常在床席伴傭力黄氏家仰給之黄氏工染色伴因學焉乆而遂精其業主愛之歲益其直伴身無完衣其奉養之具則隨直而豐時得一美味必歸遺母母或分飼之則紿云已食母盡之則喜當暑月每夕炳蒿艾以驅去室中之蚊拂枕席以安母寢隆冬雨雪罏不絶薪夜必燠母於懐如此者二十餘年服勤於親殫力於傭未嘗一日廢其事怠其志也母夀六十五以天年終伴慟哭幾絶先數歲預營𦵏具及歛之日即舁柩歸無錫合𦵏父塋今墓木已拱春秋携酒肉省掃必邀至鄰里飲食之拳拳焉為保全丘壠之計平居遇飲食適口猶常動風木之悲或哽咽飲泣徹而後已且以親在之日仰食黄氏深德之効力愈謹或者常欲倍其直募之伴不從嗚呼斯亦可謂義焉耳今鄉人特嘉其孝稱為張孝子云贊曰以曽騫之賢又親炙聖人得學問之力其孝宜矣若伴之微生長陋俗目汙㓙德耳習誶語乃卓然返哺跪乳梟獍之羣使㳺聖門而學焉安知非曽與騫之徒歟區區受傭於人又能以力報効乆而弗忘吁世之朝祿爵而暮亡叛者其人能無愧乎錢孝女傳錢孝女者呉郡田家女也父母喜其性婉順納婿與居洪武初兵興歲餘徙家常之三山湖服勤婦工兼力農畝搰搰乎共養其親父卒母老而病踰兩期腹有瘕癖號呼痛楚女甚憂苦每中夜禮佛籲天拜跪懇禱一夕潛以刄刲股紿其母為他肉熟而進之連年之疾即刻而愈既而鄰里以其母無號痛聲故詢知其然衆皆驚嘆女姨母吕氏為吾鄰嘗詰之言其平昔細行多不可及乆而益勤至不惜其肢體斯亦可謂篤孝也與論曰昔鄠人之孝同於錢氏昌黎伯固嘗非之其言盖本諸經以毁傷為未善也然閭閻匹夫之愚禮教不知一念之誠根於方寸通乎神明而孝感昭著如此豈易得哉豈易得哉於乎使薄俗之不顧養者聞錢氏之風亦寧不泚顙芒背恧其心而知悔悟也與是歲庚申六月望日諸葛節婦黄氏傳黄氏名真净丹陽縣吕城諸葛用中之妻也父家晋陵以其女生有淑姿善女工父母鍾愛擇配數年聞用中為兒時過驛亭適南臺監察御史普公見之以其能屬對摛大字甚佳呼為竒童聰慧之聲洋溢四境故黄氏之父以女許嫁之既嫁而翁知其能遂託付家事使其子得専儒業翁殁其夫婦能以翁之心為心服勤如初賓敬之禮弗渝肥家之功益著養子作而愛不姑息凡鄉里之為父為母之賢者咸儀之元末兵興夫婦挈家竄呉下蒿簪卉服藜藿食飲艱苦十有餘年夫病而亡哀慟㡬絶吐肝膽告之柩前曰未亡人真净三年服除當星冠羽衣若女道士以終其身有所否者天殛之由是教其子以繼承宗嗣無忝厥祖洪武改元於鴻雁安集之初歸𦵏其夫命其子復舊業什有二三餘皆棄置盖亦知止足之義而無殆辱也數年之間又能撙其餘力助羽流重搆清微觀以祠先世身佩符籙日誦老氏書貞節愈固今春秋七十有二鄉人嘗欲聞諸官乞旌其門婦曰夫死不嫁吾分内事耳卒不許於乎婦有節義禮教所嘉况能繼述以昌其業以裕其嗣續豈尋常守節者所能及哉予常往來常鎮間聞諸邑人質諸鄉校無間然者故撮其要而書時洪武二十二年三月之吉長白山居圖說客有過余者雨牕焚香相與覽髙沙李侯山居圖客謂余曰世謂畫為無聲詩信矣往者李徳裕以軒冕之貴疏平泉之逰賦詩憶之是圖之作亦其詩之意歟余曰不然平泉花石以力致之窮奢極靡盖溺於玩物者也夫長白山天然勝槩為梁鄒冠冕甘泉巨谷嘉木幽卉蔚有清氣昔范文正公讀書其間虀茹糜食與山俱清卒為一代名臣今侯鍾茲山之英人品卓絶學亦如之至於擢髙科參大政出處繼范公故武山中猨鶴詎云忘情但時方敭歴中外若安石為蒼生而起奚暇復顧東山乎是圖也盖侯黙寓家居讀書之意以示其子孫抑亦示不忘桑梓之敬耳平泉之思豈其比哉客唯而起且俾以所荅之語筆之圖左俟侯見而質諸月泉說學老氏之學宗乎無為而能無不為者惟其心之清明洞徹不泥於物所謂圓機之士為能然耳吾友闞伯真殆庶㡬乎漢天師四十二代孫張公大真人嘗以符籙授伯真伯真宗其道行之於家黄冠鶴􅌁蕭然出塵然而隂陽醫藥巫卜之術又旁通至於桑海變易溷跡塵土亦未嘗忘其學離其道也真人嘉其能乃大書月泉二字為伯真號吁名者實之賓也月泉之稱豈茍然而已哉共推千載心秋月照寒水昔吾朱夫子有是言也今真人指其心而喻之所以警伯真者至深切矣是心也誠能皎然如月之明湛然如泉之清無幽不燭有感斯應雖以膠膠擾擾之物紛乎吾前而吾之至清至明者盖自若也則圓機之士不㡬乎和光同塵升老氏之堂而入其室乎伯真勉乎哉無知生說夫人與萬物同生兩間而其所以不同者心知之靈耳彼巢而知風穴而知雨鳴而司晨吠而警盗知恩而返哺知機而避去若此者亦未嘗蠢然而已人而無知可以不如物乎吾友趙君執中生而聰明又嘗用力於格致之學行年三十號無知生故聞者不能無疑焉或謂執中以時俗尚智術飾巧詐狡獪萬狀深疾之將欲塗其聰塞其明矯俗之弊以返乎不知不識之天寧為蚩蚩之氓而不辭也予曰不然若是則因噎而廢食矣吾意執中讀孔氏書尚友千古觀聖門髙弟賢如顔子聞一知十方且有若無實若虗終日如愚人然况學者乎故雖多識前言往行而自視欿然猶無所知也然則名為無知實欲求知其所見之大為何如哉予嘗扣之執中執中笑而不荅故筆此觧或人之疑并勵吾執中亦以自勵云子京字說父命子名而朋友字之禮也吾友張君伯祥之子名畿予固知其愛子之心期以逺大字曰子京且為之說曰京畿人海也五城十二樓金門玉堂冠冕佩服館閣之文物羽林之儀仗瓊林大盈之府庫凡如此類皆天下所無有實為魚龍變化之地也故有志之士雖在窮髪必勇其行乘風雲呌閶闔瞻日月之光被雨露之恩然後為無負也今子京年方壯强一日千里弗忘命名取字之意不然則齷齪與蓬藋同腐徒美其名何足尚哉存耕說為孫允昭州判作客有遇存耕叟於龜巢者商畧今古劇談乆之客謂予曰叟方膴仕而暇耕乎不耒耜蔑畎畝耕可得乎予曰不然善觀人者于其心不于其迹夫以其迹論之叟固嘗主一縣之簿矣嘗為一州之倅矣然方寸之地了無荆榛耕之以禮耨之以義存而遺之子孫故于昔人之言取以自號以示無忘之意耳吁以其遺較諸德公盖亦大同小異歟且天生斯人皆有此亦莫不有耕耨之具焉但往往荒穢弗治怠棄而自失茍存之則其後之以耕以穫以收其成功乃必然之理何泥其迹為哉客語塞叟起而謝曰詩曰他人有心予忖度之巢翁之謂也請以對客之語貽諸後人目曰存耕說云龜巢翁者毘陵謝芳氏也景中字説尼山聖人筆六經以詒萬世中之一言間見特出既而子思子著書以授孟子寥寥千五百年知者盖鮮至伊洛諸賢發明藴奥昭如日星後之人敢畫蛇而添足乎然所謂景者景慕以冀及之學者之志也中則人所受于兩間與生俱生無物不具學之道必先知無不明而後行無不當竊嘗以射譬之物理之中猶射之的凡射必先知其的之所在謹乃弓矢正已而射之斯可言中矣不知其的而射者妄也妄而或中乃偶然耳吾無取焉惟時中君子從容中道無適不然是妙于射者也詩曰髙山仰止景行行止如此則思過半矣景中勉乎哉不然執中如子莫中庸如胡公不免為天下後世之誚此又不可不知也德宏字說東林趙先生為前代遺賢今其四世孫名廣姿禀之淑善讀書兼明今古法律以勲業自期不狹隘以自局焉故朋友以德宏字之請其說於予予曰人生天地間𦕈如一粟謂其能與天地參者正以執德之宏心同宇宙萬物皆備於我萬化皆出於茲所謂小無内而大無外也勲名事業盖亦隨其廣狹小大而成焉若夫方寸之𠂻彼疆我界籓籬荆棘雖有所得蓄縮如蝸不免貽笑於大方之家耳然名者實之賓也名浮於實君子耻之夫以子為東林有道之孫貽謀未逺其立志果不小乎執德果不虗乎昔者孔門諸弟不如曾㸃漆雕開能見大意聖人乃恱之予之使學者誠能有二子之見以宏厥德則宇宙吾心也吾心宇宙也曽何人哉漆何人哉希之則是慎勿謂老生常談而忽諸寳山字說余聞浮屠氏之所寳者三曰佛曰法曰僧如金銀珠玉之屬為世所貴雖亦以七寳名之較諸佛法不啻霄壤故瞿曇在祗樹園説法有曰人以七寳厚施而求福者莫若般若一言持之於己教之於人得福為多由此觀之金玉之寳積如丘山何足貴哉今夫趙居士拱真有志學佛在家出家浮屠師以寳山字之其意若欲使之歆豔而得之是亦意其為善也不然則郿塢積金賈燃臍之禍銅山鼔鑄致餓死之辱凡如此類識者恥之况欲使人歆豔乎楚書曰楚國無以為寳惟善以為寳如是而言則語意明白開示以導其進庶可謂善誘人矣居士徴予意予無可言者請以楚書之語語之於浮屠之言或可補其闕云學古字說先友丁德齋往嘗以家譜示予曰五世祖為寳佑相國多藏古聖賢書厥後以陵谷變改家用淪落書亦漂散元初大父乃徙居鄉城以慈幼齋醫藥如成都賣卜者焉他書無復有也今德齋𦙍子斆喜讀軒岐靈素之外嗜六經諸史不翅膾炙故老夫以學古字之謂曰古之學以三綱五常為重綱常不舉則無以立身身不立則道不行於妻子况餘人乎然道有小大事有緩急必先其大者急者後其緩者小者毋泥焉古之人巢居穴處無宫室也茹毛飲血未稼穡也凡如此類茍一切是古非今舍此取彼不㡬乎迂踈放誕而行怪者乎吁居今之世反古之道烖必及身子思子埀訓後人為世藥石此又不可不知也學古者宜慎諸聽其自然説為黄仲器作老友黄仲器以聽其自然四字掲諸齋居一日載酒過龜巢需予文予以不知其言出何書意何在莫敢妄為之說仲器曰吾意天為自然餘無所知也予於是臆度而告之曰物本乎天而天宰之者理也夫所謂自然者如隂陽之消長日月星辰之運行江河之所以流山岳之所以峙草木鳥獸昆蟲之所以動植變化至如人大者三綱五常富貴貧賤死生夀夭之類小者如四肢百骸飲食衣服宫室車馬之屬皆本乎自然之天昧者乃欲以人勝天而不聽之若季孫氏以魯大夫僭天子禮樂富於周公秦皇漢武欲長生不死者未嘗不自禍其身也孟子曰順天者存逆天者亡斯言盡之矣仲器作而謝以故書此警諸紳示諸人亦庶乎有所警云無名異江湖之濱有物焉其大如菽圓如撱黄而黝外强而中乾似沙非沙也礫非礫也纍纍乎沙礫之中不知者直以為沙石然髹者得之以和桐漆之漬易燥以益堅否則工雖良弗能使之燥也况堅乎故善髹者率用之以其有竒用而無名故以無名異目之而邑有雷氏髹數世其亦老於髹矣每役士大夫家則以是詢之未有得其名者一日語予而悲之予止之曰是奚足悲哉夫君子負有用之材沒世而名不稱者滔滔也况微物乎噫世之用人者其亦有如雷氏之悲者乎蛇蚓五月望予艤舟城西見牧豎數軰飲牛于河俄有走而號者曰蛇將嚙人豎皆失色已而聚觀果伏蛇草中􅀈舌掉尾吐毒氣勃勃可畏羣豎欲殺之擲凷礫如雨蛇度不能免乃㳺於河猶昻首騰踴作嚙人狀旁觀有不勝憤者持短挺渉水擊之應手而斃衆懽譟為快予既歸明日過白鶴溪上時暴雨潦水盈溢而蚯蚓縱横于途途之人殆不能容足先予行者三人老一壯二皆擇地而蹈不蹂踐以殘其生吾如之回視吾蒼頭亦然予因是切有感焉夫蚓内無筋骨外無鱗介茍欲殺之斯須可累千百今若此城西之蛇欲害人而人害之蚓則無害而人亦弗為之害非有所厚薄也人而蛇者可不悟哉鷗盟文為熊元修作鷗社叟老于元末屢聘不起遂屏跡五湖三泖荒寂之濱魚鳥為伍睨京洛萬人海中鳯有池鶴有軒鷹揚而烏集紛紛乎五鳩之屬簉羽鴛鷺為時羽儀是皆出類離羣弗與吾友而吾亦弗為之友也惟鷗也素服涓潔野性閒雅且夙嘗與叟相親荷風葦月雲濤煙浪凡可以適吾適者莫不與之共之一日舉觴酧元真子天隨子乞靈為鷗社盟主而矢之曰鷗乎鷗乎忘爾機吾亦如之恒㳺居於斯又曰鷸自蚌持鵬自溟徙斯盟或渝者如白水時龜巢老人亦奉盟歃呉淞之淥而與盟焉乃丹書其辭如右招隠論夫連城之璧韞乎荆山明月之珠藏乎滄海茍非識者有以取之則希世珍不能自衒而自鬻也隠逸之士盖類此耳嘗觀古之隠者如莊周所稱巢父善巻許由樊仲父之流土苴天下雖唐虞聖人之事皆為汙耳此盖荒唐謬悠之談無足深信請以商周以來經史所載㧞其尤而論之伊尹耕有莘之野以成湯所知致幣三聘遂為阿衡不然則終於犁鉏之甿矣傅說隠於商巖以髙宗所慕圖像旁求乃得為良弼不然則終於版築之夫矣周之太公濱海而處坐茅而漁非文王載以後車則鷹揚之功不見武成之日矣漢之四皓茹芝商山其不赴髙祖之招而從儲君之㳺者盖為炎劉氏基本而出其大功為何如哉若夫淮南王八公之徒大山小山之什其才華文藻不為不盛然未聞為朝廷得人使之康濟斯世斯民之用故君子無所取焉至如光武成中興之業海内之士雲合應響而嚴光倜儻獨能以節髙之或授官而不拜或廷伏而不謁卒歸於江湖荒寂之濱欣然與魚鳥為伍惟其清風峻節砥柱頺波殊有禆於世教也三國六朝而下求其如南陽布衣鞠躬盡瘁以報其主三顧之勤者固少然徴舉遺逸代不乏人但燕石或偽為荆玉魚目或悞為隋珠不免有純盜虗聲之誚者矣今郡府之職歲舉人才是亦古招隠之遺意也惟能知之人而取諸巖穴之間度其才而薦之朝廷之上鉅細精粗各適其用此誠一聖天子恢宏治道之良法也詩曰濟濟多士文王以寧夫士也為時而出其必有以古人之所寧文王者以寧今日之天下國家毋徒視終南為㨗徑云東呉野語許慶一者崑山石浦人也贅同邑許家墩繆氏既而父歿母食貧往繆氏依焉慶一妻不孝於姑天厯三年六月十三日將晡其姑以飢訴鄰人許本空適安亭陸省磧澳魯道在坐且與繆姻戚遂同往勸說之本空以其釡中所餘飯飼之婦奪而覆諸户外曰寧與犬食本空䓁方怒罵厥婦婦毁姑不輟且指天誓所毁不妄時片雲起西北俄頃煙霧四塞晝暝如夜霹靂震地里中大駭獨其家無聞焉本空䓁但見有白氣如練緣竈突下埀三人則恍然若有推出者跌仆在地大雨傾注平地水湧踰半尺屋焚婦震死然隣居相接畧不延燎婦死至夜復甦逺近驚異時婦妊数月或者謂天不忍其腹中之子故爾由是婦方知懼養其姑以夀終今婦年六十有七當時所震者生女四十一歲矣洪武壬子冬毘陵謝某過許墩許均善家聞其詳如此嗚呼孰謂天為茫茫耶屈東海之婦而旱亁悲齊堂之女而振風炎霜降獄熒惑退舍其響應若此者已多矣豈特斯婦乎然天即理也人不順理是為逆天順則存逆則亡盖皦乎其不誣也雷震之事予特欲使昧於理者知有所警故筆之厲鬼辨往予過無錫適州人出郭迓神赤髪青面吻出兩牙狀極詭異旗旄鼓吹衛從而舁之予嘗訝而問焉人曰此唐張廵也且言公死時自謂當作厲鬼故世以公為疫厲之神而崇奉焉嗟夫是何邪說者附㑹如此耶按唐史公守睢陽如一木支大厦之踣兵盡力竭死不忘君故發憤曰生不能報陛下死當為厲鬼以擊賊此盖忠義激烈之辭豈謂為疫厲之鬼以害天下後世之人哉所謂厲鬼乃汎言剛厲之鬼若韓文驅厲鬼之厲相似非疫厲之鬼也誣枉前賢罔惑後世邪說之害一至扵此可不辨哉苐恨老無能為不能為州人毁除淫祠一洗習俗之陋區區謇言用告來者重建縣學事實皇朝革命政教一新設學校置師弟子員以教以養以求其實效非疇昔文具比故官於郡縣者皆以是切切也洪武五年武進縣知縣臨川董某縣丞江隂陳某以縣學敝隘僉議易之既而乃割俸搆講堂三間其軒楹如堂之數翼以兩齋齋各三楹教官等齋廬庖湢之屬又十餘楹由是師生有講學居息之地矣明年春視夫子廟棟橈柱折惕將壓焉曰殿曰廡曰㦸門及櫺星門皆徹而新之聖賢肖像重為修飾而邑人具瞻之敬盖益崇矣又明年規射圃於學之傍為亭三間闢門道南向深若干歩而作外户閽人守之凡廟學計若干楹其崇廣皆比昔有加地皆甃甓繚以周垣樹之嘉木奐輪之美丹碧之輝煥如也某竊惟前元時武進縣初無學宫所設教諭附郡學廪稍至闕年有司剏始記者謂病地弗𢎞盖茍焉而已今吾令與丞皆儒而官故能以興學為己任前主簿登萊尹某及今簿澤州張某相繼翼贊以底於成非不役也而役之以時故民忘其勞且有樂助其才力者皆賢長貳祗順朝家教學之意而邑人化之又能心長長之心也育才之盛當自茲始真可為斯文賀辨訛夫江南淫祠在唐為狄梁公盡毁唐衰禮廢繼以五季之亂妄意徼福諂非其鬼泛然以大號加封紊雜祀典祠廟滋多里巷間土地有祠盖肇於此然以民情推之其始也必以農榖之功本乎地土歲時祀享亦近乎報本之意迨夫廟貌之設無可為像遂以鄉之有齒爵者當之既乆而世代變革承訛踵繆至有可笑可怪而不可曉者姑以目前之郡城西南三十里曰梅村廟稱三姑其初必曰某姓三孤之官後乃訛為三姑也按周禮三孤之貴次於三公即後世所謂少師少傅少保是也村甿巫祝之流無知妄作以孤為姑又城之東北有稱十姨者必拾遺之訛稱雨淋者必羽林也夫以十姨為一婦人以雨淋而不室處是則可笑也已至若三姑乃儼然塑少艾三人冶容美飾衆所具瞻且復變九里塘為九女以附㑹其無根之談蠱惑人心傷風敗俗有不容不辨者改而正諸宜自茲始吁甚矣人之好怪也昔蘇長公之詩有曰舟中賈客莫謾狂小姑前年嫁彭郎盖江州有大孤小孤之山澎浪之磯其俗亦訛孤為姑澎浪為彭郎公戲而譏之意甚明白有足以破其惑矣如應芳者雖究明是理灼見其非奈無狄梁公在位之權又無蘇子名世之詩請與鄉之士君子追原俗情遵依法律徹去繆像題其主曰土地三孤之神如此則可以正訛傳息邪説合今朝之令典釋舊俗之羣疑且不失其初報本之意若夫掃滌淫祠行之四方有不在我者不喋喋也芻蕘有詢尚俟他日釋異古禮人之初䘮所以待三日而後小歛者冀其或再生也今吾子死終日而甦無足異者但沐浴裳衣神識不亂命諸生筆遺囑二千餘言言有倫序視其字之悞者索筆為塗改之比常人之死固有異焉至若啟殯之日經盛暑兩月不臭不腐面色如生則其異甚矣宜乎立言君子墓誌不書此盖遵用聖人不語恠之遺意雖然吾嘗視晉書盜發尚書令卞公壼之墓壼屍僵且握拳透爪宋劉忠顯公韐靖康中使金不屈而死之燕人愍其忠菆諸西岡凡八十日金退方歛葬顔色如生史皆不誣矣又如元鳥生契履武生稷說者謂神人之生異於常人麒麟蛟龍異於犬羊魚鱉夫死者一理也有生者之異於常則死而異者何足恠哉區區所言非䛕子也非好辯也公天下之理而論之也前軰有曰千人萬人中一人兩人知殆謂此意耶噫請除淫祠文先王祭法載諸禮經曰法施於民曰以勞定國曰以死勤事曰捍菑禦患者則祭之非此之屬皆淫祠也是故狄梁公盡毁淫祠程子言除淫祠而後民為善盖淫祠不除則愚民無知將謂福可謟求而得罪可妄祈而免所以為惡者多而為善者鮮矣欽惟聖朝更化之初詔誥多方淫祠有禁革諸神大號之僭稱斷婦人燒香于祠廟釋道菴院不許擅立况淫祠乎此國家洗陋俗之新條息邪説之要務普天率土罔敢不遵切見本府西城門外有不得姓土男子突然於大驛路傍創立金家神廟煽惑羣氓燒香不絶若不早為禁止將來為患可勝言哉如䝉官司覈實當里甲人等果有實跡諭令折毁庶免無知之民誤陷刑憲如此則梁公忠國之心程子教民之意一舉而兼得矣區區耄言因國家正大之氣而應之如豐山之鐘霜降而發聲也僭越之咎必䝉矜恕賜諸施行公論幸甚風俗幸甚甕天觧洪武甲子秋冬之交多雨而早寒兒軰為予作小閣東廡廡周圍紙屏上䝉葦蓆方廣裁七尺有咫圭竇出入埀之以簾亦織筠而楮之與屏一色如堊壁然瓦盆柴火傍置小榻老夫得坐卧飲食乎其中既安且燠熙然而春外間雖層氷積雪鼔之烈風天地六合為一此室以衛䕶縝宻寒氣無罅隙可能入也但一己之樂罔能及人猶醯雞之天局為一甕中耳故名之為熙熙甕天客或笑之曰樂則樂矣何誇歟彼富貴之家雕甍繡闥熾鳯炭之爐重獸錦之茵暖玉為杯酌以醇醪肉臺盤交進於前肉屛風擁於其後温柔之鄉其樂如此子之甕天能彷彿其萬一乎予曰不然彼樂於人吾樂於天樂於人者肆其欲樂於天者安其分區區野老年將九十目識一丁之外餘無德能爵祿資財皆蔑以致之今若此不惟鄉閭側陋者鮮能同之古之君子若使虜持節者囓氊沙漠佐主中興者渡兵滹沱抗疏而謫官潮陽擒賊而夜入蔡州是皆冐氷雪渉危途急於報國而不暇顧其身也又若羊角哀之往於楚左伯桃之死於樹樓煩墮指之卒赫連蒸土之衆其為凍苦可勝言哉今予之樂竊比乎醯雞甕中之天非誇也自以為足也言未竟客掩口而去捄弊世俗以浮圖治䘮以先正斥之盖欲行古䘮禮終事親之孝而厚風俗也比年以來或者吝於財而薄於親者泛然以文公家禮藉口䘮禮不行佛事不作視骨肉至親之死如塗人然棺壙之外餘皆無之不孝不慈傷風敗俗至如俗禮以飲食待執紼之人亦靳而不為親戚非之鄉里譏之有愧乎設無礙齋者多矣嘗觀佛事之作雖非正道亦彷彿古今祭祀之儀燃香㸃燈猶欝鬯庭燎之用也疏文陳白猶祝辭也齋厨供饌猶籩豆簠簋也楮錢楮幣猶𤣥纁圭璧也𦵏之日以旛幢代銘旌以鼓鈸遵輀車亦皆敬吾親而送之也然則鄉俗之人䘮禮既不能行而能為此者亦可以寓孝慈之心表哀戚之意也嗚呼今薄俗一毛不㧞二者俱廢吾恐轉相倣效習以成風將胥為梟獍之屬是故不得已而言佛事之用如前所云初非舍正道崇異端而忘古先聖賢之名教也吾家子孫當先警省知言君子當以情恕洪武二十年秋七月龜巢老人言猫捕雀圖評物之性有微近人性之義者猫捕䑕犬吠盜獬豸觸邪是也猫舍䑕而捕雀失其性也失其性斯不義矣夫雀耗倉廪耳比䑕之害什有其一今畫工貎啖雀之猫銛牙利爪吻流饞涎踞坐而猛若虣虎是張其可畏也嗚呼張綱已矣埋輪之語世莫得聞故良工用史法遺意以警夫繡衣豸冠之屬微而著隠而顯觀者宜黙識焉讀易齋秦燔六經藐大易為卜筮書不為埃燼夫豈一經之幸而己哉實千萬億載斯世斯民之幸也是書出羲文周孔四大聖人之手天也地也人也萬物萬事之理也洪纎髙下包括無遺學者當薫沐稽首北面而讀之口誦其文心維其義見聖人於羮墻之間燭妙理於形器之表全體妙用或庶㡬焉所謂卜筮之理固在其中特不専於此用耳先正程朱二先生所次至舉而兼得之奈何近代以來去聖遼邈邪說害正假禍福託妖幻以誣蓍策之靈又有宗九師而異其傳吞三畫以神其術如是自謂探賾索隠者滔滔也至若目之以遣不佳乎之而消世慮凡如此類不㡬乎侮聖人之言者乎吾友辛彬甫自早嵗讀易如恱芻豢猶恐不及而或失之故以讀易名齋需予言者數月予惟大易之義天髙海深豈管窺蠡測者敢贅疣乎惟尊之敬之對越前聖如神明父母口誦心維假以歲月將見源頭活水之來涵泳乎先天後天也洪武十七年十月既望毘陵龜巢謝某猘犬文東家翁以防盜畜獰犬數十平居多囓人翁或縦之其一忽牙口吐舌委其尾疾行而不停囓視同類則其状亦如之翁坐視若無見焉人曰猘犬也宜謹避之里有多膂力者頭髪上立忿曰我人也誅蛟搏虎吾力猶能何避此為適有猘突如其前遂怒踢之躓而不死厥足脛微有所傷不數日呌號而咥人為衆所殺嗚呼犬之猘者固病也翁坐視縱羣惡為物害無筭不仁為甚矣然世之人形獸心害同類而無厭者滔滔也豈特猘犬哉學書字書之學訓蒙者率以上大人二十五字先之以為㸃畫簡而易習也然所云三千七十殆若指孔門弟子而言是則第四字乃聖人名諱理合廻避豈宜呼之以口以凟萬世帝王之師乎其末兩句之乖刺尤甚故某不揣狂瞽嘗易之數與方名曰一二三四五六七八九十百千萬兆曰東西南北上下左右前後以字畫較之亦簡易也待其手熟即兼以壹貳叁肆伍陸柒捌玖拾伯阡萬字教之以偹公私計筭之用區區管見于茲有年敢用質諸先覺訂其是非儻不以人廢言或可為他山之石云書耕習軒後往予識崑山陳侯某慷慨論前代事髙宴曲塘既而陵谷變改各天一方未得與阿戎談也洪武庚午冬學子張文中以陳侯之𦙍子孟剛耕習軒記見示其文乃汝陽袁先生所作其辭有曰夫耕婦饁帶經鉏犁以漢魏間兒常比之吁昔陳侯以貴富雄一州今其𦙍一旦舍紈綺而臺笠緇撮委膏粱而􅅅藜飯糗熊膽之丸不勞於其親牛角之歌不效於前人盖立志之髙能為人所難能者如此袁之言信不誣矣尚奚用畫蛇而添足乎雖然靡不有初鮮克有終此古人苦口良藥也孟剛需予言敢用此為芹曝獻龜巢稿巻十四欽定四庫全書龜巢稿巻十五元謝應芳撰祭章哀詞祭姚吉甫文嗚呼物之不齊誰其主之齒去角存從古如茲如公之生夀富且寧不泯其𦙍百福具并奈何狂飈蘭摧桂折乃舘二甥以繼其絶茍非逹觀怫欝奚堪公能釋然優㳺燕酣凡我親朋時相往來有客心醉春風滿懐數日之間數往問疾留連眷顧其情愈宻卜云其㓙醫獲微功方疑蓍龜􅃍爾而終於乎蒼天知乎不知伯道無兒千古之悲所可慰者女能奉母歲時烝嘗亦猶有後凡我親戚忍言長違奠此杯斝涕泗沾衣代王文甫祭兄文嗟嗟我兄少厯﨑嶇相我先子經營厥家自失所怙顛危誰扶繄我與兄左枝右梧我室茍完兄力其痡嗚呼哀哉兄於斯世閲七十年天賦其醇樸而不鐫故此家事吾其勉㫋尺布斗粟曾無間言所可喜者兄其息肩幸有二雛能奉周旋日飲無何皥皥其天意此安佚夀或可延奈何既衰屢疾屢痊絶粒信宿晞露溘然嗚呼哀哉誰無兄弟我獨孤苦顧二雛者視予猶父我嘗朂之以纘先緒矢心以辭酸淚如雨代祭子文嗚呼天降禍於我家何其酷耶我生勞勞髪已埀白冀汝冡子仰事俯育以纘先緒汝年既長頗渉世故與汝諸弟左枝右梧我經爾緯我作爾述知稼穡之艱難未嘗敢慢而敢逸也惟汝多病常貽我憂去歲仲冬㡬致弗救厥疾既瘳我心則喜然未嘗假以詞色實慮汝因疾之餘弛而弗張馴致怠荒故也正月我適錢塘别方兩旬訃音忽至將信將疑屢泣屢止意暴疾氣或絶而復蘇聲或喑而再語匍匐來歸汝簀已易汝棺已歛吾無復見汝之面矣可不痛哉可不痛哉嗚呼彼蒼者天我罪何居人或釋之子淵之夭顏路何辜信乎脩短之有數耶天道之茫茫耶不然何乃使汝不得其夀也嗚呼汝子汝女嫡庶五人女嫁其一子皆未㛰汝何忍置之不顧耶食指之衆賦役之重又何忍老父無息肩之日耶死而有知汝必念我於𠖇𠖇之中而我之所以念汝者將何時而已耶嗚呼痛哉我築之室汝弗與居汝蓄之器用以祭汝今卜日祔𦵏汝祖塋之側撰此飲食與之永訣汝妻汝孥哀慟欲絶代王氏祭叔父文嗚呼痛哉我叔父春秋七十有二年始于承家中于克家終于成家其劬瘁艱苦非諸幼所能盡知也但見完美之室風雨不動衡從其畮阡陌相連男有室而女有家水乘舟而陸乘馬非叔父累積之功何以得此哉至如目能識丁皆叔父延師之力也行不犯義皆叔父提耳之訓也一家之間緦服同㸑以叔父之恩無偏情無私嗃嗃之威嚴不可犯故能齊其不齊以致其齊耳嗚呼痛哉庭訓之言萬萬千千今不能盡述矣如南塾篝燈東軒奉茗嘗屢進某䓁于前而語之曰吾兄弟自生至死未嘗有䦧墻之日也吾夫婦自少至老無牝晨之患也隣不争畔帑無私蓄許人以諾不食其言鈎距不知掊克不能汝䓁亦能如是乎凡此數事反復告戒知㡬朝夕今其已矣斯言不可得而聞矣而某等為之子為之姪為之孫者可不追念貽謀而踐其成法乎否則為叔父之辱親朋之譏鄉里之笑天地間之罪人也嗚呼痛哉去年之先人皆謂叔父矍鑠其夀未艾也孰謂數月之頃眎則眊焉聽則聵焉筋力索焉方病而紅㓂入室病愈而租吏打門百憂感心二豎成禍而某等猶以醫藥可恃而不懼也詎意遽至是耶嗚呼痛哉教育之恩固不能報其萬一但速𦵏以遵治命如此永别之悲五内如割泣血一酹維以告哀嗚呼痛哉尚饗代周華甫祭伯文昔我先人之早棄諸孤所恃兩伯其一復殂巋然獨存山澤之癯憐我兄弟教之友于雖異厥居有無相須撫之愛之與子不殊奉承周旋非朝伊晡階庭之間言笑怡愉小過弗責曲禮弗拘叱咤之聲罔及僕夫鄉稱善人乆矣不誣年踰八秩健飯為娯詎意一疾竟若摧枯由茲而往誨言則無疑難誰質顛危誰扶寧不使我哀號痛呼伯兮伯兮死不復蘇薄陳簠簋清酒一壺收淚永訣靈其鑒諸代祭呉閒閒真人文𤣥元之學世逺年湮不有先學孰貽後人伊昔上卿道契世皇手持𤣥珠光明四方我師繼之山鳴谷應𢎞道累朝惟清惟静帝錫之爵羽節霓旌邈乎髙風崆峒廣成出入西垣在帝左右黼黻皇猷厥功亦懋名日益重德日益尊世則頼之以棟𤣥門豈不懐歸怡雲舊隴勇退弗獲祗承天寵閒閒之情聖皇所知大書觀闕雨露所施奎畫煥然寳翫無斁瓊舘逍遥以永朝夕胡厭斯世遽逰欝羅哀聞九重傷如之何我諸葛翁嗣法之孫如牛馬走忝為後昆䑛鼎而仙原闕二行為亮西山祭光祖庭文生必有死斯理焯焯况我釋氏以滅為樂獨於交情實不能無若我與君忘之可乎昔在光孝親如葭莩承平異處患難相扶故山丘墟避地東呉未㡬言旋如蚿如䕫銅馬西來猛於䝟貐再渉大江九人與俱披荆間道體無完膚既脫虎口猶虞畏途吾二人者始終持扶白茒宵征狐嘷鬼呼沙磧遇舊廼衣廼鋪萍聚雲散連年海隅每一握手猶論毒痡維莫之秋以予起躄爰繼我師踞天惠室與居相依鐘鼓朝夕平居論道風飛電激方期進脩各殫其力君遂云亡必樂於寂我失良友是用悽惻溪毛之薦謹維來格祭沈仁齋文天道何茫茫耶顔氏之仁不永其年抑跖之暴夀胡以延豈有生之初氣禀其偏乎抑蜉蝣朝暮蟪蛄春秋一皆聽其自然乎如君之生洵美且都鄉里共稱吉人之徒蚤歲失怙藐焉而孤仰事俯育綽乎有餘若騏驥之夙駕且能範乎馳驅每逰四方以曠其居原闕如遺如其有知忍此别離我婦我子其慟亦宜天命奈何彭殤不齊傷哉永訣漬緜以詞為葛子寧祭父文嗚呼天乎人孰無父獨不假我父之年遽止是耶在昔家居仰事俯育以大父遺業之重隻力負荷嘗愳弗克所樂者惟琹惟書惟吟詠而已餘無所嗜好也嗃嗃之聲弗及犬馬姻族閭里咸薰其良善人之稱無間然者數年以來遭時艱棘流離異鄉食指百餘頼父全活亦豈易為然耶嗚呼痛哉時之避難者妻孥啼號或委溝壑吾父則旁求治生之術使某與母等無凍餒之憂也時之人居無室廬或冐風雨吾父則納交仗義之士使某與母等得居處之安也至若族有孤寒之𦙍家有臧獲之衆亦莫不愛之如骨肉然縉紳之士多與莫逆葭莩之親相與依倚但不肖孤不能幹蠱負義方之訓為多然我父之慈訓未嘗不勤也今也一疾遽爾大故顧某等為孤為嫠者真若䘮家之狗失水之魚矣鳴呼蒼天其無知乎如其有知視孤嫠之悲若此而不為之憗遺乎然而悲則悲矣猶有可慰乎𠖇𠖇中者吾母以栢舟自誓將星冠羽服以終其身以父之靈隂相之某雖不肖既於父有風木之感幸母之存寧不服勤奉養以慰吾父乎矢心陳辭維以告哀惟吾父念之代祭表嫂文維靈之生錢橋望族嬪我表兄閨門睦睦頼有内助以生以育暨肥其家且養以福吾兄强仕朔南宦逰嫂居於家家政克脩男齠而嬉女幼而柔以母可怙父弗為憂頃因䘮亂家燬於兵呉往越還千懼百驚寓茲呉門待時之清念我𦙍子可教而成以女許嫁親親相仍擬古朱陳卜世莫京雖居異鄉客舍連楹嫂嘗有言兒女鍾情必娶必嫁此心乃寧適予親䘮連服絰縗子未可醮禮文亦虧惟嫂之言艱難共知戮力同心教子擇師眷我婦子朝斯夕斯一味之珍食必共之方期將來嫁娶有時安知一疾遽爾而萎聞者愕然惨怛歔欷况我骨肉胡寧不悲最可悲者兒號女啼而今而後㷀㷀何依嗚呼死而無知哭之嗚咽尚饗代祭弟婦文嗟我兄弟遭時艱危兵燼其廬星散其人使汝妯娌等不能同家而處共㸑而食于今凡六年矣然吾弟頼汝之力以巾以櫛以絲以枲以鞠其子女常得以慰吾心焉向也吾弟與爾避地浙左吾夫婦每念汝婉孌之姿䟦涉山川漂揺風雨多有可憂者焉幸而言還得同居長洲茂苑間者數月吾乃就食於無錫矣又使汝妯娌乍聚而散百里之間相望相憶而不能數相見也近方喜汝子暫贅而歸其妻將有拜姑之日矣又喜女擇配得人亦將舘甥之時矣滿謂時將小康仍居故鄉少長咸萃搆一畮之宫犁二頃之田歲時灑飯於先人之墓側則吾妻與汝復得相率以事蘋蘩矣數日之前方聞安信片紙之上忽來訃音使舉家相顧失色始而疑焉終而信焉莫不為擗踊而長號也嗚呼痛哉天胡不仁奪吾弟之内助者耶地胡不仁奪吾姪之所恃者耶茍曰非天也非地也以汝之徽柔淑慎乃何為夭閼如此哉自今以往雖不知故鄉之願能遂否其或遂焉亦不得與汝一日之同也死生之間此憾何極雖然天降䘮禍雞犬弗及寓哀茲觴無任於邑代祭趙師吕文公之生也七十有六年時有盛衰事有得失境有逆順物有欣戚公其處之操履如一其少也以簪纓之裔而無爵祿之念其壯也以陶猗之富而無奢靡之習及其年之老成尤儉素而篤實為鄉里之善人不鬬智而用力横逆之來唾而弗拭盖明夫舌存齒亡之理而得乎全身逺害之術每論平生禍福靡常鸞膠之絃三斷而三續鳯穴之雛或存而或亡銀粧羽化付之渺茫知有命之在天忘鳬鶴之短長維箕維裘授子及孫閒居别第翟公之門清風茗椀沉水罏薰日怡情於書畫絶無心於世紛視不義之富貴如太空之浮雲獨念先世欲勵後昆託祠事於老佛之廬屬䘮具於葭莩之親視死如歸餘何足云或謂公之可憾者燕子樓化為刼灰科斗壁飄為風塵殊不知公之逹觀藐如墮甑未嘗怨天而尤人也今也人遭亂離多殞鋒鏑横屍四野烏鳶之食公乃得全體之歸佳城之室回視前日之死於非命者安能企其萬一乎某等親親尊尊道義交結渉江以道其䘮雪涕以臨其穴一觴敬酹千古之别公如不知我語又安知信宿之先方歸覲省一别之後遽疾而徂嗚呼哀哉倚門之母其望懸懸埀髻兩兒其泣漣漣鴒原永歎鸞鏡莫圓德哉若人何辜於天如某等葭莩之親情猶骨肉既不及匍匐而往救徒號呼而頓足旅櫬未歸横山埋玉顧彭殤之不齊信斯理之難燭漬緜以詞酸淚盈掬代張希良祭王文甫文公之一生磊磊落落操心至公俛仰無怍出辭必信不事鐫鑿人或狙詐言諄聽藐家庭之間一呼百諾奔走服勤罔敢乖錯及交親朋春風笑謔恩誼有餘禮文則畧患難相救扶顛濟弱鄉閭庇庥恩猶不薄或饑而餔或病而藥或輔其仁或糾其惡周恤貧寠不輕唯諾頻年時危所在跖蹻鄉人愛之歛袵如昨施德有報理亦昭灼我曹多幸松蘿附託凡詣甥舘必席賓幕從容語言欵洽杯酌别不忍去期必如約今公已矣失我榘矱枉者誰矯懵者誰覺窳者誰範觚者誰削誰指其迷誰斷其堊静言思之相視錯愕掩袂拭涕薦此泂酌為周縣尹祭顧元公文盛德之士使人後千載而興起者其信然乎猗我元公才兼文武其文也世稱三俊為當代之儒宗其武也羽扇一麾走六州之豺虎醉非嗜酒免禍驕主醒非沽名赤心自許抗疏補衮職之闕擇賢進邦國之輔史不一書勲業昭著世徒知思蓴而歸者之為髙而不知採蕨南山之言先入乎其肺腑故公之殁特為公鼔琹而悲慟哭而去也睠茲長洲實公鄉土桑梓之宫墓有祠宇何物地靈混此室處斥而去之陳我簋簠悵煙塵之滿眼懐清風之白羽維公有神以福黎庶為周尹立碑祭元公文昔典午氏碑表有禁勒石公墳勲業昭甚事傳信史石亡何時走尹茲邑永言懐思載葺祠宇籩豆具陳祀神有詩刻諸堅珉峴首之碑令人墮淚呉人於公亦復何異惟公有靈隂隲呉人克文克武無愧先民代姜周佐祭姊夫王仲德文君之老姑為我叔母而我女兄獲奉箕帚我弟於姨復得其偶如古朱陳㛰姻世守先人嘗言君性醇厚人或顛危君力能救吾親雖亡斯語不朽如予不肖公亦弗陋有過必規有善則誘眷我兄弟無一或否公年半百閒居静守閨門之内肅若賓友忘情軒冕意適杯酒獨奈今年避㓂奔走挈家于吳虎兕傍吼千驚百憂窘束如杻一女鍾愛疾莫能救羣盜稍息歸卧南牖襁褓之珠復碎于手公之痛心如割如剖痛猶未定厥疾斯遘嗟哉吉人天胡不祐今公之殁命也誰咎凡我私親倚仗何有尤憐女兄孤燈白首撫膺長號涙濕雙袖為王孟學祭母文蚤歲失怙惟母焉依母其視之猶掌中珠未寒而衣未飢而飱左提右挈顧之復之夙夜檢束惟恐不能自立以保其身以承其家以奉大父母及諸父之訓諄諄之言不一而足每於舅姑之側視其色有不豫然者退則惴惴檢其不及既自檢束又詢之二雛曰而於大父母之志或有違乎事或有怠乎抑而不能謹飭以貽其憂乎母之欣戚繫乎兒之有過無過未嘗一日忘乎懐也仰事俯育嫠居而憂勤者十年男室女嫁志願方畢然於祭祀賓客之奉身先中饋亦未嘗一日之或懈也嗚呼痛哉以母之康强而年未艾烏鳥之情方圖萬一庸詎知一疾而不起耶臨絶之言謂死無憾特以弗克終養舅姑為慊是則吾母之孝於舅姑者為何如哉宜乎舅姑之痛不翅如父母嗚呼風木之悲兒將奈何惟當追念母訓兄兄弟弟各勉成立律身成家竭力以奉承諸父以養大父母之志尺布斗粟昆弟共之不敢有毫髪欺隠意其所否者是忘其親忘其親則不孝之罪上通於天雖吾母之慈有不可得而宥者惟母有神尚其相之庶踐其言以慰母矣為陳彦直祭外姑文嗟我外姑德不可滅孤燈十年栢舟髙節為婦而孝為姑而慈林下之風鄉稱姆儀如諤與謙材俱碌碌壻于名門蒹葭倚玉每詣甥舘升堂起居必詢女家諸兄何如或墮優逸勉之克勤防微杜漸忠言屢聞或坐孱弱戒之自立扶顛持危惟恐不及比嬰微疴臥在牀席我來候問仍飯而食眷顧之情無異於常及女來歸語猶琅琅一日之間􅃍成永别卑尊戚踈故皆痛切曰婿與女感恩如前豈不哀思泣涕漣漣幸有賢嗣篤親如母䕫蚿相憐義當永乆死而有知知予之悲一觴敬酹靈之格思代胡伯亨祭外舅張守齋文於乎惟我婦翁鄉之善士不鄙庸愚妻以其子既妻其子恩義兼至念我先君夙昔交契今也孤㷀遭家殄瘁朂女内助庶弗顛躓每詣甥舘言提其耳翁經州閭必過敝止綜理厥家以綱以紀親之愛之眎子無二别無㡬何聞疾以痞女舟歸寧夜渡淞水訃音倐來驚使躃地匍匐及門翁已長逝我服雖緦我哭不偯矧為女者其痛曷已潔此一觴進饌靈几永言哀思翁其鑒只代金子俊祭錢仲居文嗟嗟仲居其止於斯福善禍滛天胡我欺父為善人君亦如之匪義弗取匪善弗為曰儉曰勤俛焉孜孜業日益廣家日益肥十數年間遭時艱危賦歛之虵毒人骨肌君安其親茹荼如飴弟則友愛室家其宜是皆深淳親親之推眷我姻戚肝膽相知温温其容抑抑其儀莫可忘者顛危扶持僉曰若翁澤流未涯厚培其根必茂其枝詎意一疾􅃍爾而萎禍福之柄誰其倒持於乎蒼天夭閼若茲某等念乃疇昔胡寧不悲矧有雙親遺孤與嫠其痛之鉅庸曷已時我舂不相我淚霑衣言採溪毛薦此一巵嗟嗟仲居庶或格之代張伯仁䓁祭父文嗚呼痛哉樹欲静而風不停子欲養而親不待哀哀諸孤所以痛裂乎其内也仰惟父天覆我兒女男室女嫁志願俱畢且復為之樹産業立根本使各得衍其餘澤焉第所恨者吾父之生過於勤勞六十九年日用矻矻未嘗得一餉之優㳺也矧逢艱時子或受圍於城者親雖野處心常危之或行役於逺者親雖家居心實隨之餘在侍旁雖若可樂然憂患則為之料理征徭則為之區策亦未嘗忘於懐也至如鶴長鳬短物不能齊又豈能不拂吾親之意哉今也兒無所依女亦何怙菽水之歡不復可得是雖五内之裂亦徒然耳某與弟等但黽勉襄事以吾親素嗜佛學視身為幻敬以茶毘之法奉之遵治命也輀車在門翌日永訣菲焉一奠吐此哀𠂻祭先墓文於乎陵谷之變知繫乎時惟情所鍾不能不悲昔我先壠松大十圍今皆宿莾荒煙晝迷穹碑已仆佳城或隳或幸而存冢眠狐狸曰不肖孤避兵海涯九死一生如鳥無枝十有六年豈不懐歸回首鄉闗道阻且危丹陽之東呉門之西方數百里野無黔黎我兄我姨冢亦靡遺我父與母夢或見之既寤而歎涕泗交頥今我冢子擕厥妻兒歸畊舊田丘壠是依餘口猶十未能同歸歸何不能生理未治旅食異鄉破研日隨尚頼遺澤歸或有期載耕載穫蒸嘗于茲或樹松楸如前盛時嗟我祖禰知乎不知拜伏墓下拭淚陳詞代張伯仁祭黄景先文近年耆英晨星霜木婁人視公崑山片玉公之為人生有器局遭時迍邅如玉韞櫝搢紳之文罔不刮目公之處家仰事俯育陸賈之槖兒女均蓄彼經此緯同一機軸公之居鄉春風穆穆凡與之逰惟善是朂正烈髙風遐邇咸服於我姻靈眷義尤篤念無後人墜緒誰續以孫贅居我女蒙福哀我親喪觸暑匍匐弔之唁之沃酹之辱比予走謝留連欵曲别方兩旬書往而復豈意公亡疾不經宿予聞訃音哀淚盈掬奈役於官如薪濕束送不執紼罪奚可贖公或我知矜我碌碌束芻之奠鑒此心曲祭大雲講主文師之髙年七十有九以湼槃而論之復傷之何有人之所以哀吾師者吾知之矣一大藏教淹貫胸中如魯靈光天台之宗今也砥柱摧折隤波洶洶同袍之士其誰適從三周七喻化導羣迷隨所住處桃李成蹊今也野狐長嘷彌天蒺藜信從之衆疇將依歸吾黨固嘗月旦之評曰善與人交僧中之晏嬰也度不可量方外之黄生也其愛客則孔融而衣緇其滑稽則方朔而釋名也觀其詩則見其心之平淡而無牛鬼蛇神之怪觀其畫則知其興之清逸而出乎山礬水仙之外若此者豈非大雄氏所謂無罣礙者乎抑亦所謂得逰戲三昧者乎是則吾黨平昔之所敬愛而今日之以為誄也彼千駟萬鍾而死欲使吾黨贊一詞而不可得而况為之沃酹乎言採絲蒓淞江之曲懐哉若人薦此寒淥祭柴處士文近年耆英晨星落落剗刓為方誰其矩矱惟公渾厚不琱不鐫如玉在璞如珠在淵寄跡隴畮絶意圭組為龎德公不入城府以善為樂襟抱生春為馬少㳺鄉稱善人髙堂眉案如賔如友梁鴻孟光無此白首幹蠱有子三鳯翩翩源深流衍理固宜然昔我先君深敬於公所以敬者古人之風先君云亡公來慟哭吊死問生重禮之辱由茲而來陵谷變遷干戈所至流血成川公之居安其福孔厚年過七十亶為希有予聞訃音義合匍匐吏呼石壕去不可得言采溪蘋薦此一觴公其鑒之我泗霑裳子祭父文代柴貴賢作父生三子女亦如之長養㛰嫁恩義惟均以恭出贅愛念尤篤定省雖踈音問不絶每歸侍旁奉親飲食分甘食之親同稚孺豈惟食之誨言諄諄惟懼孱弱弗克樹立撫恤諸孫欣欣色康兒所喜者親在健飯兵戈擾攘十五六年幸無禍波以及吾親微疴月餘靡神弗宗供役於官如墮膠漆間嘗請告歸侍湯藥父曰亟去公家事急兒能了官父心乃安别方數日聞病小愈豈其奄忽永訣終天風木之悲尚何忍言嗚呼哀哉吾親之死人皆哀之姻戚之哀思親義也鄉隣朋舊哀善人也我兄我姊我妻我孥其痛如荼五内崩裂罔極之恩奈弗克報所不敢忘各慎其身黽勉成立無忝所生尚頼遺澤埀裕後人祭蕭處士文蘭陵望族竹帛著稱髙年過於伏生儉德同於晏嬰自罹喪亂多遘迍邅萬死一生脱性命於虎口三吴百粤寄身跡於狼煙覩姑蘇之麋鹿重逰念北山之猿鶴相望言歸故里欲正首丘顧親故鮮有孑遺喜父子獨能無恙安居未㡬怪事忽生呌閽救無辜之孫霜飛六月奉命復憗遺之老風動四方盖埋劍之氣衝於斗牛故覆盆之光照於日月遂爾貽謀之願灼然隂隲之符骨肉聚於目前滫髓供於膝下得正斃而全四體應含笑而赴九泉蹇余劣才荷公知己自青年而蒙舘榖至白首無異金蘭又如王趙之交亦有陳雷之義今皆已矣可不痛哉老淚淋浪持束芻以效孺子儀容彷彿撫絲桐而呼彦先即此微忱伏惟尚饗祭錢鼎卿文代親友作吴越世家焜煌史册公為雲礽蔓延遺澤昔在妙年青雲氣格弗屑於時丘園自適風流文采聲亦藉藉晚罹兵燹稍涉囏厄三江五湖浮家泛宅歸帆無恙佳兒連璧廼疆廼理薙乃榛棘菟裘鶴渚谿流環碧公其優㳺素願斯獲邀月呼酒㸔花岸幘賔朋往來冠盖絡繹滫􅔱之供子盡厥職自春徂冬頗須藥石厥足蹣跚心仍夷懌所懌者子服勤無斁其宜㤗然瞑目中夕顧惟某等攸居咫尺匪親伊故心皆莫逆今也云亡如失肘腋緬懐德容傷心如刺鄉飲之歡無復共席薄言采藻薦此窀穸惟公鑒之有如平昔又代兩甥及甥女壻作昔人有言見舅如母此盖由親親而推之乃常情之所有如我舅翁其親愛於甥及甥女之夫者尤恩深而義厚厥恩伊何涵濡撫摩視孱弱而為扶植者支一木扵傾厦屹砥柱於頺波厥義伊何切磋刮劘念昏而為牖之者鑿渾沌之七竅投阿膠於濁河然則翁之為舅氏而愛其甥者眎餘人為何如嗚呼痛哉軟脚之疾醫云無傷謂翁健飯全愈可望如某等朝夕承奉於理固當奈公私之服役磨旋蟻之奔忙故不服勞於左右操几而執牀又安知一夕甘寢遂亡耶嗚呼痛哉聞訃而疑蒲伏救之救不可得徒哭而悲平生之恩義欲報而無期一酹永訣涕泗霑衣武進縣學起講堂祝文維洪武五年四月二十日常州府武進縣承務郎知縣董某從仕郎縣丞陳某將仕郎主簿尹某謹以釋菜之奠敢昭告於大成至聖文宣王曰夫學以明倫尚矣凡為學宫必先乎講習之地使學者登降揖讓咸有儀度朝斯夕斯以明人倫之道斯堂之所亟其成也而某等勉共厥職以副朝家興學之意尚惟聖神於斯文有以相之縣學諸生祭陶兄文天道何茫茫耶跖暴而夀顔仁而夭蘭摧桂折樗櫟合抱是皆必有其說蹇余昧而莫之曉耳吾友陶兄如玉在璞鍾厥愛於雙親求良工而彫琢既賣金以買書復徙居而近學惟吾兄心父母之心故能孜孜厥修類之如麟之角也吾黨碌碌辱交連年竊鄰燭之餘光亦效矉而勉㫋方期吾兄馳騁詩書之林㳺泳道義之淵又安知車方駕而覆轍弓始張而斷絃也耶嗟哉彼蒼誰薄誰厚賦命不齊吾將誰咎惟没世而有稱斯可謂不朽彼區區與草木同腐者雖龜鶴之年而亦何足取哉嗟我友兄其止於斯其心孔哀其友亦悲一慟永訣漬緜以詞武進縣學移先聖祝文廟貎之設人所具瞻所以尊聖賢寓祗敬也棟宇朽腐懼將壓焉不敬不尊責何可逃今將一殿兩廡撤而新之汎掃鱣堂舁置神像聖靈洋洋無適不存具瞻之敬盖自若也功僝事集神其相之祭胡秀才文公之父兄為吾友朋公之子孫吾與師生公嘗以父執遇我謙謙乎奉承翼翼乎將迎席必置醴途不並行我歩我趨視為規繩然吾亦愛之重之與之語言未嘗不肝膽相傾也於乎人孰無死有未死之前為子孫者或不能如親之志親沒之後或墜其基業是皆不能無憾於幽明也惟公不然孝友之行父兄素稱曰子曰孫起廢兩興别第新築良田歲登可以供粢盛奉輸征恤孤㷀鄉里稱少㳺之善犁鉏帶常林之經死而有知豈不含笑於九原乎於乎昔我與公俱避甲兵公亡我存無復合并每想見之于墻于羮今也以一勺之行潦表四世之交情睇彼東呉逰魂杳𠖇吾將假巫陽之詞以招之曰太湖之隂風濤震驚魂兮来歸歸我毘陵父兄之丘壟相望子孫之箕裘遹成念此土桐鄉之愛念老夫芻束之誠魂兮來歸天風泠冷祭胡子明文於乎逸翁生長越杭以醫宦逰臺閣蜚英晚罹世變戈㦸搶攘挈家海壖晦迹韜光予未識公結交令郎觝斥妖妄氣節激昻既見叔夜穆如春陽時方艱虞紛然虎狼誨言諄諄戒慎周防吾其服膺如龜穴藏歲時往來雞黍范張公年已高神氣益昌髪黟顔童飲可百觴興致酣適庭視八荒詞多滑稽歌或慨慷以公逹觀物累俱忘盖亦有子動合義方福善自天家有餘慶屢渉畏途竟為康莊予嘗比之珠玉琳琅父執遇我我思敢當所貴相知心腹腎腸公於吾兒翦拂揄揚將玉其成取寸之長通家之好㡬二十霜洪武己酉我歸於常贈言孔嘉且貽篚筐心親迹踈煙水相望前年暮秋過公豁堂三宿不寐情話連牀延致畫史為貎不颺復命其子拏舟送將别來兩秋懐思弗忘初冬病餘孤卧若僵寄書言懐并書數行歲聿云暮嗣音渺茫雪洲之報乃謂公亡淞隂石川悲風白楊命林往奠老淚其滂祭黄朱二友文於乎兩駒並駕兮同一蹶兩輪並進兮成覆轍秋氣肅以成物兮羗蘭摧而桂折鳬鶴斷而可悲兮何短長之足說嗚呼天乎祭徑山長老顔恱堂和尚文福慧俱足惟佛稱首能具而微世亦希有如我恱翁是希有者德尊一代聲溢叢社蚤被殊渥著金伽黎所在說法四衆依歸晚坐南屛雷鳴鐘鼔雨華西湖魚龍起舞丞相授經化伏羣魔凌霄絶頂砥柱頺波慧以知㡬福以歸休崑岡之陽為師莵裘師方退藏陵谷變改兀如嬾融得大自在我昔避兵識師東林忘形儒墨結交以心時有旦評稱師孝禪吾其敬之僧中子騫九流百家問無不知吾其愛之僧中子期師之於予亦敬且愛片言可觀如拾珠貝我歸故鄉師贐其别歲時音問往來不絶前年孟冬丈室信宿白雪陽春賡和舊曲寂滅樂矣師固云然我思故交中心悁悁擷茗陽羡􅆽泉錫山詞以抒情塔鈴吾言夫祭妻文於乎誰無夫婦琹瑟相友惟汝與吾憂患白首粤自世變家燬於兵扶老携㓜蹀血宵征具區之山龍馬留跡羝觸藩籬㡬中鋒鏑載歸故邑遭歲薦饑裙無完布簪遺折蓍而於舅姑菽水朝夕生事死𦵏與我僇力烽煙滿眼人皆岻巇頼而内助匪義不為我擔耒耜爾躬井臼長育二雛庶亦肯構所居三徙非效孟母全身逺害以避豺虎内外服勤乃成此室舁疾來歸庶安且吉而飲而食而言琅琅辭絶而逝悲風滿堂六十四年不失婦道雖逢百罹卒逢夀考嗟我父子痛心如割骨肉恩愛際此契濶歲時烝嘗誰為薦羞我暑誰葛我寒誰裘風雨孤燈室與誰處齊眉之案誰為重舉宅兆斯卜祔而姑嫜一酹永訣我淚其滂兩祖祝文維洪武九年歲在丙辰七月初四日不肖孝曾孫某等敢昭告於某官之靈伏念某兒子木不幸逢豸冠之怒無辜屯鳯陽之田骨肉生離肝腸痛割以卑悃陳詞於烏府蒙大臣請命於丹墀欽承釋放之恩幸獲來歸之喜雖風憲紀綱公道之力卓然行之非天地祖宗隂隲之靈何以得此天無以報祖何可忘謹以蔬果酒饌之儀用陳菲薦謹告考妣祝文伏念某兒子木屯田臨濠如落陷阱而某原其罪狀揆諸刑書為父者有可救之理於是扶憊觸熱赴臺陳訴幸而臺官埀憐轉而上聞玉音俞允放歸養親此恩固不敢忘也然某思之苟非蚤歲蒙父母教訓之力則懵於義理昧於法律視其子可援而不能奮身為之則為父之道有所未盡今也頼吾親之訓于昔年脫其子之難於今日恩其可忘乎况乎上之人所以矜恤所以釋放使得仰事俯育而骨肉完聚者非天非祖宗有以相之不能也嗚呼天無以報矣豺獺之敬聊表於親至如父子受辱有玷先世其出於不幸而非繫乎不義而致者惟天惟祖宗尚或宥之外舅姑祝文伏念某兒子木比遭禍而屯田今䝉恩而歸里親戚骨肉重獲團圞其為外祖父母者死而有知其必哀憐眷顧而隂相之也推情揆理義不能忘三兄祝文惟我長兄有幹蠱之才而不得其夀由是而家人失節門祚陵替幽𠖇之中不能無憾也必矣然而幸存一息以嗣烝嘗如木識丁兄必愛之不啻若己子耳頃罹竒禍屯種濠梁豈不為之哀愍哉今蒙國恩歸奉菽水又豈不為之隂祐乎生而孝友死必不殊區區哀思詞莫能既惟我二兄深嗜佛學早絶伉儷誓不與同室而生同穴而死也早育二子長令出贅幼為沙門兄則超然自謂在家出家矣避兵之日緇流與俱杳不知其所終此固兄之素願也然而某佩服儒訓雅愛人倫念同氣不宜冺絶命其子林以奉嘗焉今以木屯田而歸如獲再生如脱鼎鑊吾兄以佛氏之心為心亦必為之慈愍焉惟我四兄未壯而克家將娶而即世父母悲悼終身不忘諒吾兄於父母之子若孫亦不忘也如木者幸脫屯種歸耕故隴以養其親以畜其妻子兄之喜為何如哉兄無後人命吾子森嗣之以承祭祀尚其埀裕使得與木䓁鼎峙而樹立也姊及姊夫祭文於乎賢姊之生愛弟深至視弟之子己子無異木之屯田姊必憂恚以今還家必喜而慰憫予暮年遭時不利父子汙辱有玷先世所自釋者中心無愧微姊復生孰語於是嗟而子孫俱殄疫癘歲時禴嘗頼女承繼我今摧頺百事俱廢念姊之心獨爾弗替姊夫善人義同昆季庶㡬來格鑒此微意祭母舅文代陳彦髙作昔人有言見舅如母今我不見舅氏者閲四五年又何異别吾親之乆乎瞻彼陽山追懐亂離脫萬死於虎口幸重逢於盛世然而陵谷變遷各天一涯舅甥之情惟天其知遭險人之排陷若參商而東西方鴻飛於魚網奮病翮而來歸聞舅疾而往問渉雨路之途泥承訃音於中道乃匍匐而星馳顛崖之苦蒺藜之悲皆不能與舅氏細數而陳之釋此憾者將何時耶言采溪蘋薦此泂酌哀歌渭陽涕淚交落知乎不知神在𠖇漠任仲文祭妻祖文翁於女孫親愛所鍾愛及其夫情亦與同既玉其成加以磨礱藻雖不才感恩之隆服勤左右黽勉厥躬歡然菽水庭闈春融金澤之濱瓢湖之東居凡三徙天風轉蓬今年夏秋巨浸溶溶賦歛之蛇毒於射工避地蘭陵請謀吾翁去危而安翁樂其從瞻彼横山滄海駐篷將營莵裘一畮之宫月有旬日往來憧憧豈其微疾藥石㒺功我方抱持滫􅔱之供語音未絶瞑目而終嗟我夫婦遭罹禍凶倚若㤗山山頹倚空頼有大母同此哀恫棺以黄楊衣衾重重忍茲永訣涕泗霑胸潄詞而醊以冩愚𠂻祭朱仲起文生於東呉殁於西州七十四年陶朱之儔其生也有一㕓而弗處樂浮家以優㳺有二子而離居各専力於箕裘其殁也繼室厚衣衾之具過百倍於黔婁女孫得藳砧之良襄大事而能周視世之生不聊生死不得其死者逈乎其不侔又何憾首邱之正與不耶某等或忝微姻㑹晤無㡬或傾盖於東洲之濵或結隣於横山之阯聞哭聲而匍匐徒往救而弗起兔死狐悲矧吾人耳一觴敬酹歌用蒿里祭妻祖文代楊彦澤作昔在童丱聞翁厚德邑之名門視為矜式遭時變故挈家中吴人多覆轍翁行坦途陶朱之裝㒺有遺失食指百餘乃保終吉陵谷既遷言歸故邱橋梓相須聿成莵裘匪德之積曷云能爾隂隲自天灼見斯理如某不才誤蒙采菲以孫妻之撫愛莫比每至甥舘誨言諄諄俯育之意盎然如春及翁卧疴或輟或作往來問安眷顧如昨七十八年如旦而暮眎諸夭閼實有餘祜所可悲者永别終天女孫歸寧誰其眷憐某于羮墻思亦罔極薦此溪蘋灑淚霑臆祭鄒忠公墓文公逰程門㳺楊比肩慎獨之學首得其傳孝於事親如曽如騫移孝為忠厥德兼全補衮之闕蒲伏涕漣數惇六罪羣邪凛然奈何城狐威福得専推落䧟阱炎風瘴煙忤物固爾精誠動天遐陬峻嶺感應有泉處困而亨斯文究研既釋論孟復觧韋編羲文姬孔羮墻見焉蔽日雲開暫脫迍邅再寵再辱愈磨愈堅明月之珠薶光九淵鳯穴有雛赤霄翩翩暴白先志誣衊悉蠲徳薰晋鄙埀四百年顯忠有祠奉嘗有田由宋而元有司豆籩度守是邦追慕昔賢詢諸遺黎知公故阡増土鬛封起碑之顛樵牧有禁溪山連延何以奠之秋菊寒泉仰止髙風服膺拳拳尚享祭陳氏親母文代曺子夀作惟靈生衣冠之茂族作佳配於頴川相夫子以無違實四德之兼全出鳯雛于丹穴奮彩翮之翩􅗁熊丸之教有法掌珠之愛弗偏予是以有東牀之選盖亦慕北堂之賢方鳯占之叶吉結朱陳之姻㜕何飄風之不情折萱花於歘然葭莩黯乎其失色朝露若為之涕漣念九泉之永訣酒三醊於柩前靈洋洋其如在鑒此意之勤拳子祭母文代陳煥章作嗚呼三子早孤皇皇疇依頼有慈親恩斯勤斯非徒養之而又有以教之視我三子掌珠之惜遭時艱危基業蕩析萬死一生幸迯鋒鏑徙茲滆濵茍焉休息其不滿於吾親之心者一子一孫介胄而殁居侍旁者但供其菽水習史業者常離於朝夕每勞乎倚門之望鮮能遂板輿之適所幸時康方安厥居孰謂微疾􅃍然云徂方巫醫之並用竟永棄其諸孤嗚呼痛哉而今而後雖日用三牲之養而吾親無復為之娯矣一抔之土無復窆於呉矣徒感傷於風木媿返哺之慈烏奉觴永訣肝腸若刳祭陳母文代陳彦直作生長勾呉秀鍾林屋有林下風四德之淑隨世變遷家此溪曲鄉稱姆儀徽音馥郁熊丸教子峙若鼎足伯為督家仲則戎服季也刀筆縉紳刮目甘輭之供如食厚祿斑衣諸子森如立竹春藹慈闈家用雍睦夀踰稀年殁有餘福季歸自公撫棺慟哭烏鳥之情悲乃風木里不巷歌弔者接躅某等姆儀之敬義當蒲伏言采溪毛薦此􅌬醁肸蠁有靈眎同芻束又代李一泉䓁作孟母以斷機教子成其子為亞聖陶母以剪髪待賔致其子有大名世之為人母者茍能有其遺風則其子亦必有可稱者矣若我陳母遺風伊何教子之功不鮮待賓之禮亦多昭哉彼蒼降福洋洋八十指子孫之盛七十三夀考之長東隣西舍愛同六親簞食豆羮饗如八珍為一境之姆儀誠四德之淑人倐爾云殁孰不酸辛時無張林淑德弗碑劉向不作立傳者誰我酹此巵我陳此辭亦庶㡬乎薤露之悲彤管之貽也歟祭萬氏子文人與萬物一氣所鍾何乾坤之為父母有賦予之不同顔路之子聖師之賢胡不永其年耶桞季之兄凶燄赫烈胡不使短折耶羙牛山之木而厄於牛羊戕於斧斤彼樗櫟之不才乃夀輪囷放梟囚鳯刖足麒麟若吾甥之淳朴孝敬而夭者皆莫曉乎混淪某等忍痛雪涕敢一問乎大鈞天雖不言聞必酸辛持杯酒以吊窮泉之幽魄亦以慰髙堂之老親親乎親乎慎勿為卜商氏之䘮明徒貽誚於聖人嗚呼彼蒼聞乎不聞祭沈氏女文維洪武十二年十一月初八日老姨公携其子以酒肉祭於姨孫女沈氏之靈曰汝之父與吾子為弟吾之孫中選汝父之雀屏今也如寳鏡之破於未照玉簪之折於未成傷矣哉吾父子之情傷矣哉吾父子之情又某年月日老姨婆與姑娘等以酒果家饌奠於時娘柩前嗚呼痛哉汝之生也母亡於七歲之初使汝不得蒙其撫養汝之死也父役於千里之外汝不能與之訣别未笄而善事繼母乆病而不弛女紅是皆可哀可憐而可憾者嗟哉彼蒼何彭何殤骨肉之悲寓此一觴祭外祖文代上海任仲文作翁於外孫恩德俱厚三孫之中藻為最㓜維其㓜也特恐愚陋其愛尤深加之訓誘翁自中年無心組綬湖山秋九風月杯酒幽花秀竹蒲石清繆翁於其間婆娑白首陵谷之變干戈日乆危而復安頼天之祐八十八年可謂遐夀為鄉善人其德亦懋甥孫紛然日在左右藻則出贅翁為擇偶桑梓連隂聲聞雞狗犁鉏畎畝復客桐江數月宿留廢禮百端辭莫能究比聞訃音痛心如剖匍匐而歸豈云敢後以病莫前徒抱哀痛瓢湖之水難洗厥咎翁其憫之庶㡬原宥雪涕陳情薦此簞豆為曹元度祭姑夫鄒桂堂文昔魯義姑抱姪遺子恩難兩絶義重如此公篤於親如姑之情撫視其姪同乎所生念某昆弟稚孺而孤適逢亂離干戈九區埀涸之鱗蒙激滄波無依之鵲乃棲瓊柯恩以畜之義以淑之威儀語言教且朂之人皆蒺藜我則袵席居吴數年如一朝夕陵谷變改公還故鄉某亦里居烜以餘光咄彼青蠅竟涴白璧投畀遐荒混淆瓦礫咸謂貂蟬將出兠鍪天定勝人無悔無尤云何不吊廼渉重坎訃音之來痛割肝膽丈夫馬革死不顧身惟其骨肉極切悲辛巫陽之招魂其來歸桂子秋風髙堂繐帷知恩㒺酧義蔑以報見公羮墻淚滿懐抱魯之義姑我姑之夫書以厚俗疇茲董狐祭徐逹卿文往昔避兵衆依于仁纍纍乎喪家之狗躍躍乎脫網之麕公之視予騶虞麒麟暖蘭湯而濯足下懸榻而重茵館婦子於别室撫臧獲如所親不以俗之數米而炊者以玉其粒不以時有析骸而㸑者以桂其薪或戚或疎恩惠俱臻長筵燕集禮意慇懃是故人皆以和氣氤氲喜色津津忘憂於板蕩之秋湛樂於熙臺之春殆若古桃源之避秦也别公數年滄海飛塵干戈阻絶公殁不聞迨歸里而聞之日覊縶於世紛欲一酹僑𤣥之墓閲屢歲而因循竊嘗論之世衰俗薄狥利忘義者什常八九公乃磊磊落落猶獨鶴之住雞羣然一飯之報吾志弗信抑亦有愧於古人瞻彼膠山如隔兩塵舉匏樽以澆墳上之土頌遺愛而云云酸風撼林嗚呼孔賓為陳以貞祭王母文昔在故里婦德著稱鍾禮郝法容儀具并暨孀居之一紀羗玉潔而氷清今居蘭城母儀之懿捧檄有孫盡歡甘㫖奉重闈之慈訓謹操持於胥吏故凡葭莩之親桑梓之共莫不愛之敬之尊仰乎林下之風也樂善之性本出天賦口不絶西佛之名如渇飲乎甘露其心愈慈其髪半素諸兒女之通家每升堂而拜母起居問安匪朝伊暮方菊月之下旬捧夀觴於初度安知彼蒼災祥竝臻賢孫有鶚書之薦大母則病入於膏肓巫藥罔功遽爾云亡正所謂賀者在門吊者在閭變怡懌為䀌傷矣衰絰之孫躃踊哭泣吐令伯之哀𠂻人皆為之嗚咽不有彤管孰記高節采滆浦之寒藻薦郫筒之香雪拭淚陳辭千載之别祭崑山張伯仁文洪武之初傾盖如故買宅買隣日益清顧於時蘇城樓櫓灰飛公脫陷阱欣然而歸人之所稱百鷙一鶚有猷有為抑强挾弱我所見者厚𦵏其父故舊不遺保障鄉土數載之交視同懿親為公所憂里多荆榛縛虎而縱反遭其囓鵂鶹夜啼興妖作孽室雖有繼卒以無嗣播遷臨濠日以毁顇女之嫁者遽失其良兩婿承家池魚並殃公在異鄉寸心千里骨肉傷殘痛何可已一紀之别老我於家每聞竒禍為公怨嗟蒼天蒼天斯人何辜困厄摧折乃至此乎客來今春謂公蒙恩難兄難弟同歸故園予欲賀之恨臂不飛以詩言情不勝瞻依安知隔歲公已物故集師書來我淚如雨追念疇昔肝膽相知各天一方徒云坐馳面不復晤魂其可招悲歌些辭酹此一瓢生日祀考妣祝文父母生不肖八十六年矣不肖雖不能為賢人君子為世矜式然未嘗敢為小人之不臧也雖不冨不貴不能顯榮其親亦未嘗飢寒失節以辱先也長太平之時則微樹其業遭亂離之日而不殱於兵夫妻老者暖衣飽食早眠晏起不憂不慮以安以娱是皆天地之大恩父母之遺澤也蒙天地父母之恩澤其可忘乎其可忘乎所願者子子孫孫中外和睦𤓰瓞延蔓荆棘不生使不肖夫婦如是安娱以盡其天年不乆牀褥全歸遺體尚頼天地父母之靈有以隂相之始生之日釃酒以告冬至祀外舅外姑祝文嗚呼悲哉仁而無後斯理之變而又遭世之大變也三子八孫靡有噍類所遺之業盡屬他人顧為女為婿者耄無能為竟不能為立後人以為似續以承祭祀每一思之慚色而已歎息流涕而已惟茲一陽薦此蘋藻溪毛匪薦薦以此心靈之鑒之憫其所不能為者宜宥厥辜祭唐親家母文代陳以貞母氏作德為母儀五十九年見而知者罔不稱賢昔我冡子多幸自天雀屏中選以女儷焉主我中饋毫忽罔愆母教之淑豈容忘筌昔在鄉里絲蘿纒綿今居毘陵同居一㕓姻婭之情益加於先靈在牀褥乆弗能痊曰女曰婿常侍榻前我來問安飲食留連今也云亡骨肉棄捐為子婿者公務所牽覊旅金陵未能言還女以孳育月輪未圓棺弗能慿縗麻涕漣埀髫末孫其哀亦然我念疇昔淚如迸泉有菲蘋藻供陳几筵靈其如在鑒此惓惓祭表伯母文代王仲孚作昔居故里家為比隣綿綿瓜葛如朱如陳今茲異鄉亦復如舊通家往還情日益厚靈以沉疴一載之餘匪朝伊夕候詢起居若我婦子均蒙眷顧食必分甘骨肉相處孚方驅馳信宿而歸靈乃即世幽明永違匍匐往救已不可得陳此薄奠涕淚霑臆祭王君夀文昔在西塾廿有餘年公之父叔坐予講氊愛我敬我如骨肉然公於此時鴈行聨翩敬以父執禮意勤拳規行矩歩靡不勉㫋厥後一别陵谷變遷公守故丘我落海邉萬死一生脱身戈鋋我東來歸公喜自悲喜獲再見悲歴艱危冠玉之美殘為瘡痍樓臺廣居化為茅茨衣不文繡緼袍為宜食忘八珍啜菽如飴樹菊軒堦杖履棲遲幹蠱有子蔚乎孫枝樂事以酒餘皆弗治佳哉蔗境為鄉白眉吾嘗鼓琹滆浦之湄連城屢宿細論昔時負笈之孫服受我詩自茲以來别多㑹稀花朝月夕每有所思去年暮冬尺書載馳緣有義事要公共為安知踰月遽然其萎偶出西闗路聞葬期彼祖輓者舟欲同移眸子眵昏行且尼之送不執紼奠莫奉巵烈塘之東徬徨涕泪還家數日晝夜忸怩緬維前賢絮酒千里嗟今之人跬歩或弛朋友道䘮恬不為耻擷此溪毛陳詞尺紙物薄情深公必鑒之祭妻文嗚呼悲哉靈年八十以微疾不兩日而亡人皆謂天錫之福子孫滿堂衣衾而歛瘞之髙岡并餘一紀家居樂康既葬而隣里騷然紛捉軍而驚惶使襄事之日而過之則惡乎有數百之人祭奠於北堂縞衣而送䘮也未㡬而季子森為人謀陷嫁禍其身我扶憊而赴救詣郡邑而具陳刀筆之吏欺天罔人妄移文於崑邑欲玉石之俱焚頼公道不冺如屈蠖之得伸雪理而歸父子悲辛以今思之六十年伉儷常居安而欣欣雖世變之秋避兵海濱亦未嘗遭此之不仁信乎吾細君有可福之善蒙隂相於大鈞也耶卒哭之祭遂致目闕死而有知不必我嗔吾知母之慈子必哀憐其遘迍奈何死生幽明之分兒哭之慟我亦霑巾嗚呼哀哉祭張溝南先生文維洪武十六年月日同郡老友謝蘭謹遣孫塏以清酌庶羞之奠致祭於故心友溝南先生之靈曰於乎近年耆英晨星落落公在鄉邦雞羣獨鶴詩三百篇精華咀嚼吐而為光光輝焯焯粤自蚤歲蜚聲臺閣遭時多艱屢進屢却歸來故山雲卧一壑洪武更化羣髦進趨克嶷有子首應而湏手持直筆追縱董狐如晳有參養志而娯寳樹遽折悲風呌呼公無怨尤曰命矣夫中郎之女傳業於家丙申暮春郡志有作時我與公同秉筆削甲可乙否語皆良藥别來數載心交如昨愛及吾兒義尤不薄前年過我新秋夜凉中庭夜坐月白如霜劇談千古把酒淋浪興盡而去東方未明去年夏五我兒云亡公為墓銘九原有光吊我唁我喻以大方斗城之别譙門夕陽自冬徂夏人多讚揚優哉悠哉新居草堂幽花秀石池島滄浪不徒玩物世慮俱忘顧我潦倒理宜溘先安知矍鑠乃在吾前四月九日訃音忽傳無妄之災網羅正纒葬不克送酒不漬綿每一思之淚如迸泉病目昏盲舉歩欲顛塏持瓣香拜於靈筵鮑叔知我鑒此勤惓姪婦祭姨母文昔侍姨母東吴避兵我姑繾綣諸婦奉承及歸桑梓半舍之隔歲時問候眷焉如昔今我娣姒等哭姑之淚未亁而又哭姨母而永違母乎母乎見我姑於地下其能說諸婦之哀思乎溪蘋拂霜薦此一觴阿翁悵悵作此祭章代常信孚祭親家母文曩予之家幹蠱乏人賢郎贅居蒙養而姻維時魚軒雲從析析繄我婦子獲瞻母儀事雖從權悉如所願舉室驩然親親眷眷去年合卺蒙饋茝蘭愛子及婦恩出肺肝顧予東牀每歸問安慈愛之深尚蒙埀訓所可喜者起居樂康予嘗詣門亦得升堂别來未㡬聞有隠憂豈意成疾竟弗能瘳訃音忽至婦子匍匐泣血呼天救不可得我來柩前奠此束芻區區哀忱靈其鑒諸冬至祭母文代木森作嗚呼痛哉每年冬至齋宿祀先母率諸婦供具酒食今也中饋或有缺失誰懇懇而朂之耶每年冬至賀客過門母語諸婦治具饔飱今也禮意或有懈怠誰諄諄而命之耶一味之甘誰分諸幼耶糗餌之屬誰饟諸隣里耶是則因莭序而追感者如此至若子孫之有室皆吾母擇配而為之子之婦孫之婦其婦工有未善者皆吾母教而成之平居之日甘旨裘葛之奉則吾母弗求其備温凊定省之禮或有疾則終日終夜木之濠梁屯種森之滕州被刼林之客死新鄭吾母為之廢寢忘食晝夜憂思痛苦哭㡬䘮明慈愛之情言莫能盡如此之恩又皆在劬勞罔極之外今子之死者固不能報其生而存者將何以報其萬一耶母兮母兮無復見兮冩此哀𠂻矢弗諼於逺兮祝亡子文洪武十六年十一月二十一日老父命汝弟森持思賢錄一簿置汝靈几酹之酒而祝之曰往歲板刻辯惑編既成汝嘗執書立吾前而言曰不圖今日遂二十年之所願欲矣汝於此時喜容可掬吾知吾兒推心父腹繼而摘稿尤喜成速携二書之新行不兩期而瞑目今老父偶逢於知己又為刻思賢之錄此汝之所冩者稍撙節其簡牘工數月而就緒我已盲其雙目摩挲紙本無復能讀於乎誰念其為之不易寳之如玉邪誰為其喜而傳之士夫俾咸丐乎道鄉先生之膏馥邪悲哉吾兒身不可贖置此書於靈几猶挂劍於宰木顧觸屛之子若孫絃將斷而復續覩物思人淚霑汗竹祭母舅文代東洲黄氏作嗚呼見舅如母念母不忘舅復厭世豈不永傷若我舅甥世居邑里如鳥同林鷇育棲止版圖之謬牽連伏辜天恩汪濊姑緩其罰脫網之魚頳尾發發七里八岡水溢溝澮載欣載奔過都歴塊蒼髪黧面泥土裳衣忘乃劬勞負疾而歸賀者在門退不旋踵吊者之來乃哭而慟如某至親洎諸姻婭痛不可忍涕淚交㵼將來休戚無復相知俯瀝肝膽酹此一巵祭賀彦銘文代陳彦髙作南華有言曰上夀百歲中夀八十下夀六十一月之間得開口而笑者或四五日而不能及也况遭世之岌岌乎如公之生埀及中夀喬木故不為不茂遇陵谷之變遷若摧枯而拉朽坐衣冠於塗炭脫性命於虎口元龍之豪氣雖衰丹穴之鳯雛方雊俄陸海之風波沉鐵船而莫救有竹林之小阮尚枝梧於左右五六年憂患之中能一笑如南華所言者亦烏有也嗚呼哀哉凡我親舊居同里閭困蒺藜於世變之日喣涸轍於濡沬之餘犁鉏乎荆棘之塲屋廬乎瓦礫之區若䕫蚿之相憐不戚施而蘧蒢吉㓙慶吊出入起居或叙情於杯酒澆磊落而欷㱆今也云亡痛當何如奠椒漿於三寵墮清淚如蛟珠悲風愁雲送乃輀車祭妹文嗟我先世錫山故鄉曰朱曰陳閥閱相當乃以吾妹嬪朱之良為婦而賢孝於姑嫜陵谷一變雲萍四方念我兵餘如龜穴藏聿來依棲隣壁分光爾居再遷半舍相望手足之情眷眷弗忘常念吾甥來我渭陽吾兒念姑安問亦常焉知微疾遽爾云亡朱陳六親㒺不痛傷况予潦倒孤鴈遑遑凴棺飲泣奠此壺漿祭妻兄文大哉天之所以為天兮宰萬物而幽𤣥雖陵谷而變改兮恒福善而弗愆觀若人之始終兮蒙隂隲於彼蒼避戎馬於勾呉兮渉畏境如康莊聚原鴒以救急兮作歸鴈之同行舍故土之荒穢兮樹豐業於暨陽託家政於仲氏兮日娯客以壺觴肆優㳺於桑榆之景兮家有餘慶蹇予早歲有室兮得名門之女弟頼昆季之眷顧兮於今四紀睠小阮亦僥倖兮辱妻以其弟之子悵東西之相望兮多契濶而㑹少比安問而抵家兮喜棣蕚之俱好孰謂别無兩月兮聞訃音而絶倒惨余室中之人兮姑與姪其同悲徒匍匐而莫能救兮淚滂沱而霑衣奠椒漿而永别兮叙平生而陳辭除服祭母文二月十四日為兒子木等作齊衰母服也三年之䘮猶卒哭而再祥禫而除其服者古之制也然劬勞重恩罔克有報孝思之心有不能隨服而除者也於是撤靈帷於斯寢奉神主於祠堂歲時烝嘗寓不忘之意也不忘者何敬與愛也凡吾親之所敬者敬之所愛者愛之則親之死猶無死也茍忘其親則親之故舊或踈如途人親之孫子交惡為仇敵也以若所為是不孝也觀夫孝之至者通神明不孝者必獲戾於神明也過庭之訓諄諄有年勉而行之請質諸母之靈也矢心陳詞終身戒也遷祖考神主祝文嘗聞祠堂之制當設四龕以祝四世之親不肖幼年在父兄之側失記髙祖考官稱髙祖妣姓氏故曩於兵後立神主由曽祖及禰而已虗設第一龕於茲數年今因亡妻䘮既終其子木等奉母主入祠敢請遷曽祖居第一龕曰祖曰禰從而遷之以第四龕安奉其母任氏候應芳之殁然後改題髙曽祖禰稱號也不肖違失禮制不能無罪惟尊靈恕之寒食祭曾祖墓祝文頃頼先世德澤未冺𤓰瓞遺蔓幸繼烝嘗時維禁煙隨俗展墓匪云報本庶不敢忘伏維尚饗祭祖禰墓祝文墓祭非古也以應芳不肖不克歸里不能以時省掃常愧於心每年寒食展拜墓下豺獺之意庶效萬一尚冀先澤埀裕後人有永弗替墓祭母弟祝文代木等作寒食墓祭雖狥俗禮為子孫者哀慕省掃亦庶㡬豺獺報本之意焉惟慈母賢弟魂魄有靈必蒙歆格墓祭先兄祝文父母遺體本有三兄仲兄避世不知所終伯兄季兄並窆於此時維寒食祭掃荒丘手足之情庶乎不忘娶孫婦祭祖祝文維洪武十八年歲次乙丑三月初四日乙丑孝曽孫應芳䓁以孫男塤於初五日丙寅吉辰娶本縣安豐南鄉吕氏女為妻敢昭告於某官曰娶婦三月而廟見者古㛰禮也近代之制以日代月各有義焉應芳輒敢㕘酌古今從宜從俗擬於翼日親迎婦初入門先當謁拜先世以見不敢忘本之意然後祗見舅姑及諸姻眷自茲以往庶得奉承宗祀蔓延嗣續尚頼遺澤埀裕弗替謹以清酌庶羞前期祗薦謹告祭徐仲清文嗚呼九流百家玉石混錯公隠於醫常之一鶚黄岐之書孰云不知公得其要探𤣥索微如古兵法時用出竒愽議閎辨吐屑霏霏蜚英蚤年鄉評衆推紫燕歴塊非駘可希遭時艱危挈家勾吴藥石之靈字及豚魚長蛇當路報亦銜珠以之事親厚養為娱春風杏林名聲載途所不忘者首丘如狐大明開天四海一家父母之邦青氊故廬徴車聿至乃赴清都醫國之忠老莫能輸謁告而還子孫怡愉蜂房合戸哺雀羣烏混迹市塵懸我藥壺衛生之仁施於州閭佳哉蔗境餘人所無衣冠敬共鬚眉皓如應芳忝交四世於此公有佳兒與我中子同業於儒同出而仕惟余不猶一生一死公恤其孤與諸孫齒誘掖激昻誨言提耳老我墻東相望尺咫頻年䘮明跬歩千里時蒙問訊或饋藥餌心親迹踈匪負知己今公闔棺事皆定矣我未能然望風長喟束芻授孫往奠靈几玉雪之姿羮墻宛爾載歌薤露商飇歘起願言從逰脫屣滓泥存順沒寧庶㡬無愧遷葬二兄祝文九月二十六日元歴埀盡時盜之槌頷珠斷釧臂無處無之嗟我二兄荒郊廢塜雖有後人漫不省視與無人同薪者芻者為樵牧場而犁鉏者日侵月削又將為禾黍區矣應芳以同氣之通是可忍乎今重製二函遷瘞祖壠東南隅以祔大父母父母及諸父之側竝封如前䕃以竹木嵗時酒飲庶得享而侑食焉惟兄有靈妥兹幽宅諸親友祭曹子夀文古之人有言狐死兔悲物傷其類况人為物靈居同閭里有瓜葛之親朋友之義者乎又况子夀之為人善與人交而有春風和氣者乎居常往來杯酒為禮或有時而合歡雪襟懐之凝滯奈何轑釜之聲瓶罍之耻往往鮮克遂其意也欷㱆慷慨音猶在耳一月之餘痿而弗起屬纊未定而闔棺訃音裁至而發靷東方載明虆梩亟奄於横山之址凡我親朋惆悵而已其為骨肉至親者又何忍而至於若是耶溪毛泂酌亟奠靈几遂成永違顙而有泚祭唐仲傑文公之子吾子之門弟子也吾之孫公以小友呼之過愛而忘其齒也垣雖失怙如飲食數載慶吊吉㓙且能惓惓乎盡其禮也今公之殁胥靡也哉古人月明千里再歌些詞魂兮歸兮寓永傷於匏樽一酹乎落花流水祭劉德祥親家文人皆謂公有通濟之才設施之方且見識之長何始終之乖張吾嘗以為江河之舟視舶而微非葦而杭能重載而逺適可周流於四方或長河順流懸帆巨檣一日千里快若飛黄或大江水逆石尤風狂釘石繫䌫隨波低昻或脱難於盤渦或經險於吕梁或候潮而逗遛或阻氷而徬徨安知一夕怒濤舂撞盲飈簸颺遂顛覆於鮫䱝之鄉嗚呼哀哉十四年間安危變遷以資禀之髙明知有命之在天不怨不尤處之㤗然鄉之評旦前後可甄有可稱於後者何異乎青史之傳嗚呼哀哉如某者昔在東闗隣比相依承公以鍾愛之女為吾孫阿塏之妻雖别多而㑹少獲通家而往來每黄耳之有信知告老而有期擬祖孫同迓呼麯生以洗泥訃音忽至招魂來歸塏也哭婦翁於四千里之外奈此願之乖違兩兒扶持奠此一巵文以抒瓜葛之情詩以冩薤露之悲公知不知我泗霑衣生日祀先祝文某之生斯世也九十一年每念劬勞㒺克有報也然視不明聽不聰而猶有可覩之物可聞之聲肢體雖頺猶能杖而行几而坐也方寸之天不蔽於私義理昭著而能燭物是皆生我教我者之大恩也先世之恩報雖不能實未忘乎心也况夫左右服勞飲食裘葛内外有人老老㓜㓜頗知義方非祖考埀裕之力焉能得如是之樂也自今以往天年未盡喘息未絶皆感戴之日也家饋殽羞先用祭享亦庶乎豺獺之報本也祭徐子忠文代席彦適作旦必有暮死生奈何或玉闗之不入或薤露之有歌或馬革褁於外域或魚腹𦵏於汨羅是皆卓犖之士去鄉井捐首丘而忘其考槃之阿也今公之殁類乎古人論公平昔良可悲辛其家居也克肖而翁持身以儉約勤苦待人以和氣春風其户役也覊縻長安夢方尋於失鹿事乃畢於盖棺嗚呼三子鼎峙峙乃公餗銜哀服勤惟恐顛覆雖匍匐而莫救望鍾山而慟哭東牀佳婿淚亦盈掬如某既忝姻婭且居鄉曲愲愲乎叶力同心董征輸之萬斛覩丹旐之來歸極感愴於心目蓉湖采蘋薦此􅌬醁武進縣學立先賢祠祭文代陳知縣易縣丞作昔之人以鄭公之賢而名其鄉以荀淑之子而里名髙陽葢地因人勝使山川人物皆為之有光今夫三先生之産茲邑也道學之傳淵源二程發揮道妙有功遺經劾當國以滔天之罪而貝錦乃成諫至尊以正始之道而逆鱗敢攖觀夫感應之泉醉客之語則忠義之至通乎神明若夫由大魁而演綸㕘大政而憂國者位雖不同同乎一誠輔崇寧之初政知秦蔡之匪賢俄梁木之俱壊徒流芳於汗青是皆可以為天下之師表百世之儀型豈特為鄉里之榮哉某等叨蒙國恩民社之寄以先生祠諸學宫是亦祭於社之遺意詵詵諸生奔走粢盛如將見之于墻于羮霑德薰於晋鄙何以異乎師承吾將見金鐘之䜟復靈劍之聿興謝莊曾祖墓清明祝文某嘗聞先世開封渡江蕃盛東西謝莊地因人姓三百年來陵谷變遷自髙而上故壠茫然睠茲衰丘鬰鬰如許即彼侵疆為外侮禦匝植松楸幽篁翳之弗樵弗牧周垣衛之寒食清明聿來省掃追逺者心妥此蘩􅍨尚享新河口祖墓祝文丘墓之祭禮無所考然俗禮以清明祭掃其來尚矣茍於此以盡其誠亦庶豺獺報本之意也幽明雖殊有感斯應所謂洋洋如在者將見諸羮墻見諸堂封斧封馬鬛封也某等雖不肖無似尚期埀裕以衍餘澤繼述弗替尚享先考忌日祝文父母之恩人皆㒺極惟吾父之鍾愛於某也既生之又能擇師而教之使日就琢磨黽勉樹立雖不克能馳驅取青紫以舉其身以顯其親以澤其後人然此身頼訓育之力不姦不邪不淪胥於習俗之陋於先世無甚忝辱子若孫則矯枉就正識之無於農圃之間而我杖履所至晏然棲息無飢無憂是皆吾親之遺澤未冺也此恩此德之死不忘惟兹忌辰祗陳泂酌以鳴其感悰恭請顯妣石氏安人同賜假享謹告祝先致語代丁學古作奉先思孝聖賢之訓甚明事死如生祖考之靈可格焚香代鬰鬯之灌秉燭為庭燎之光雖無鐘鼓鏗鏘惟是豆籩奔走志意追思於齋戒儀容宛見於羮墻蘋蘩蕰􅇨之毛靈筵可薦参苓姜桂之物相籠親儲谷陵兩變於頻年城郭一㕓於今日如繩祖武勉讀父書豚魚或昧於交孚時加修省豺獺粗知於報本歲奉烝嘗伏願濯濯厥靈洋洋如在灾不生禍不作正頼乎厦屋帡幪居之安資之深何異乎門閭髙大根深蒂固地乆天長初進酒生不封侯賜酒泉無人死作酒中仙一杯初進葡萄醁且喜家庭有象賢苾苾芬芬一豆羮丹𠂻寸許若葵傾我祖我宗應歡喜自幸厨無轑釜聲再進酒饌銀燭生花再舉觴滿堂渾是欝金香愁多莫問人間世年少多為地下郎不識駝峰翠釜烹羮名錦帯亦虗稱一杯骨董如芹獻五味調和意盡誠三進酒饌孤兒碌碌混泥塵華胄遥遥出縉紳百拜勉循三獻禮一年祗薦四時新廟堂調鼎用塩梅四海蒼生笑口開我手幸無窮鬼捩折旋三獻奉羮杯進饅頭籠餅炊來玉屑香貽年喜得歲豐穰賢如脫粟晏平仲應笑縮葱侯侍郎送靈致語切以欲表孝情勉循俗禮焚楮錢以代幣意在殷勤酹桂酒以送靈魂歸寥廓下情不勝感愴之至祭曹子毅大使文代諸親作萬物之靈莫靈於人然人以異於物者秉彜方寸之天不和而公不偽而真也惟靈身無毁傷不辱其親口無萋斐亦近乎仁不汲汲以肥家不戚戚於謀身西園鬻爵乘時取名東陵種瓜避時辭榮是皆過不吝改而復其天真至若愛女而嫁不贅婿而效秦視其弟之子猶子意終老以歡忻非明理而能之乎彼昧於理而不能然者寧不泚顙於泉下貽誚於鄉鄰某等親舊交接敬恭相於悵幽㝠之永别感涕泗而欷㱆輀車發靷奠此束芻子祭父文代奔牛陳明逺兄弟作哀哀父母生我劬勞欲報之德昊天罔極此尼山聖人刪詩三百存此言為萬世之訓也凡為人子者報親之心其可忘也况某某之痛親尢有甚於常人者元歴之末兵戈數年委棄桑梓流離異鄉其生也不能盡菽水之歡其殁也不能求宅兆之安陵谷之變丘壠之失仰愧俯怍無可奈何於茲又隔一宇宙矣今也倣昔人衣冠之葬葬以木主巫陽些歌雙魂來歸於以寓安厝之禮於以表追逺之心非敢謂報親之萬一也於乎哀哉於乎痛哉祭姊丈何子潤文代侯徳名作猗歟吾姊得配君子梁鴻孟光隠德可比睠我弟昆骨肉無異賓朋之交或臧或否坦率忤物豈無微纇於乎蒼天禍福倚伏乃著戎衣往役安陸折桞郡城别淚盈掬十年夢寐每論𠂻曲黄耳書歸殷勤齒錄路越四千親愛愈篤尚聞矍鑠慰我毣毣安知訃音遽云瞑目生還玉闗無復可卜於乎蒼天何怨何尤嗟嗟我嬃舉案無由兩地共哭痛心如抽爰命巫陽招魂道周香雪一觥薦此蘋羞魂兮魂兮來歸首丘祭金親家文代袁茂卿作金以運粮遼東巨船五十餘隻官吏役夫千餘人回途遭風覆舟而溺於乎平地風波陸沉者多航海而役奈􅄓母何魚腸𦵏兮渺茫散精靈兮八荒巫陽銜哀兮籲穹蒼白雲悠悠兮歸故鄉大矣哉尾閭無底渤澥無邉非精衛之石可填豈彭咸之居能遷魂兮來歸閭井依然雙親能保其妻子一弟服勤而力田逍遥倘佯何異乎生前某等葭莩之親鄉曲之情援溺之手㒺措將迎之意宜傾言采溪毛薦此一觥祭湯母文代吕輔之等作惟靈春秋八十有七年林下髙風鄉稱姆儀耳聰目明老而弗衰盡三從之道全四體之歸其早歲之事非所詳知請以晚年所見而知者頌之男㛰女嫁各得其時愛其男及其婦則能盡其慈親其女及其婿則無偏無私其諸卑幼愛亦如之視姻眷如骨肉待隣里無陵夷故其病也人皆扶持其殁也人皆涕洟而今而後侍奉無期區區酌東洲之水擷横山之薇於以見親親之情於以表戀戀之悲靈其不昧鑒此哀詞祭重外甥女周氏文維洪武二十四年十一月日龜巢老人謝舅翁擕子及孫以清酌庶羞祭汝重外甥周氏娘子告之曰人不幸遇世變而俘於兵如風雨落花藩溷泥途鮮或不汚汝乃釋係累以配二千石之子冝其家而恱於舅姑此不幸中之幸非人之所能圖也至如一念之孝念母孀居廿餘年抱歸寧之願百餘舍渉艱闗之途德哉良人能與之俱服齊衰以終其䘮脫簪珥以恤其家睠我東翁母嘗託孤亦欲報之以瓊琚凡如此類竹帛可書則昔之所幸者抑亦有感於天而天賜之扶輿也今也一疾斯須朝露溘然鬛封象服慈親墓田苐良人之悲有未𦵏之親未笄之女汝何忍乎舍㫋吾意汝視斯世斯身履氷臨淵玉石俱焚萬萬千千保遺體之全歸餘無憾於九泉寥寥旌善亭令名誰為傳於乎蒼天代曹原度祭黄仲器文公平生與某為忘年交年雖不同身同澤臞韋杜桑麻叔牙夷吾舊雨有時而契濶今雨有時而招呼往往來來曽不計誰數而誰疏也夫以公晚歲言之一子出贅鼓盆自娯或蒼頭而詩巻或長鬚而酒壺或載月剡溪之舟或踏雪㶚橋之驢尋梅㸔竹清興逸如故人謂公為荷篠荷蕢之徒嗚呼公之闔棺之日某客東呉不救䘮於匍匐不送䘮於泥途每一思之涕泗霑裾酌彼潢潦薦兹束芻謝莊墓祭祝文開封舊家軒冕烈塘隨龍渡江奄宅兹方豈無佳城海水尋田敬惟髙堂祖封巋然清明祭掃豺獺遺意尚期埀裕有永弗替烈塘墓祭祝文人本乎祖猶物之天化育之恩疇能盡然維曽大父瓜瓞蔓延幽幽殯宫宅此平原左三從祖我祖右偏兩伯遷祔雙璧仍連五封十靈餘皆茫然天荒地老陵谷變遷尚頼遺澤箕裘勉㫋清明省掃薦此蘋蘩霜露之悲永矢弗諼横山墓祭祝文代子木作哀哉慈親寂寞九泉吾弟與姪亦遽然而然言之痛心有不能忘其言也夫親在則晨昬定省親殁則春秋祭祀寒食上塚陳此饛簋雖不足報其劬勞庶循乎世俗之禮維吾親吾弟及其子念之祭邵姨夫文代孫垣作嗚呼先人在時我姨丈以肺腑之親往來之頻不逺三舍有如比鄰至不幸殁於鄭校歸𦵏横山而姨丈弔之祭之猶無異乎平昔禮意之慇懃也數年之間姨丈不禄吾兄則折桂秋風時垣又失脚危途路迷而車覆母嫠居子戎服母東呉子西蜀回視六親皆茫然置諸弗告今也幸服役而過家哀辭一幅酸涙一掬吐母子之真情於此來之一慟哭也尊無醇酎豆無㫖蓄聲容藹然鑒此𠂻曲新河口祖墳上祭奠祝文維洪武十六年歲次癸亥二月初九日孝孫某敢昭告於祖考妣伯父母祖父母父母從父母九位尊靈曰墓祭本非禮欲子孫於雨露之春不忘厥祖從俗祭掃以寓孝思尚冀遺澤使後人繼繼繩繩有永弗替謹以清酌庶羞祗薦歲事謹告謝莊曾祖墳上築墻祭奠祝文維年月日孝曾孫某以目昬不能逺去躬拜墓下謹遣𤣥孫某等代行敬昭告於曾祖考妣二位之靈曰人本乎祖極恩如天祖世雖逺天不可忘睠茲故土殯宫猶存繚以周垣以禦樵牧清明省掃歲修祀事尚祈埀裕悠逺無斁謹告寒食祭妻墓祝文余生與細君偕老君年七十有九我齒長於君者兩年以余之潦倒而君稍强健也孰謂君先棄余而逝也君骨肉之窆於此倐焉兩旬視時艱虞恨不能相從泉下以安其居維茲寒食擕子孫狥俗祭掃以寓哀思尚享寒食祭子墓祝文墓藏而骨豈祭所乎然而爾之遺言有曰歸袝先塋子孫姻戚歲時灑麥飯於松楸之下志願足矣今茲寒食扶我擕幼設祭墦間以踐爾之言如爾之素志抑亦表長幼骨肉之情吾子有靈尚飲食之代祭胡隠君文惟靈世居東呉笠澤之濱厭處卑濕於茲卜隣同井為鄉埀五十春維桑與梓寖為婚姻待人以恭儉以律身二子克肖搆穫惟勤貽謀諸孫佔畢其呻老福婆娑笻杖幅巾如某等同一里閈往來侁侁以翁髙年而尊而親翁雖不飲席必同茵笑語相狎翁弗我嗔春風童顔喜色津津意其夀考籛鏗之倫何物二豎瘨我吉人我來問安翁語諄諄别不旋踵哭聲遽聞追念疇昔涕泗霑巾當此窀穸束芻具陳出門一慟悲風愁雲張彦實哀詞歲丁亥之仲冬丹陽張君彦實遘厲瘧疾不五日而逝其友人謝應芳為哭之慟且歎曰噫君自小倜儻多知謀尚氣節能仗大義平居論時事言如湧泉故縉紳多器之其憂人之憂樂人之樂亦庶㡬杜季良之流歟苐峭直不容人過遇强梗欲鉏去之用是或斂怨焉後至元間邑大姓與令有隙且與君不相能因媒蘖其短詣部使愬之謂君嘗為令納賄部使者初不能察稍加淫刑欲强服焉令恐噤不復辯君受挫辱至數日終不忍加誣於令若是者非伏義能之乎至正初里有横逆君疾之一日乃自殘其幼搆大獄以䧟君之季子聞者股栗君處之裕然詣郡邑雪理卒能脫其子之械以械之他如姻舊及凡與之逰者顛則扶之危則持之若是者又不可一二數但惜乎負竒崛之氣時不見用終於此而已於乎吾彦實之死可不為之哀乎然而象賢有人君又能擇其最肖似者為仲氏之後使先世之業並立弗墜則彦實之死猶無死也奚哀為雖然哀者人情也禮曰哭死而哀非為生者也予與君素相知而氣質且相類狐兔之悲疇克自己故為之辭以冩其哀云天胡為兮生楩楠構大厦兮無不堪匠石不遇兮老雲巖天胡為兮生龍媒鹽車困兮駿骨埋名駒汗血兮凌風埃折瑶華兮山之阿望羙人兮不我過我心傷悲兮淚滂沱夀上人哀詞浮屠夀道傳蘓人也年三十嬰暴疾不終夕而逝其親戚師友以及鄉里之人也咸哀之予之哀則又有己私焉吾聞道傳為兒童時既棄家學浮屠越數歲慕徑山古鼎師化風往事之為入室弟子未㡬師命典教藏聲譽蔚然已而振錫逰諸方㕘禪門老宿聞見日益廣操履日益堅被緇艾茹蒿芹泊如也一日念親老無他侍養飄然來歸朝夕奉滫瀡以荅顧復之恩又築室西林閉門讀天竺書且旁通百氏會其歸趣閲五六年矻矻不少暇庸詎知遽止於斯邪吁夫道傳之聰敏勤苦早歲入徑山之室典教藏已卓犖不羣使歴階而升足為叢林師表矣道傳乃退然自守而卒無聞也養親而不得終其志力學而未能發乎文辭以黼黻斯道此衆人所共惜而為哀者也予於道傳初無葭莩之親鄉里之暱䘮亂之際傾葢如舊舘焉以安其居榖焉以盡其禮愛之敬之二載猶一日視親戚鄉里殆有過焉以今思之可不重為之哀乎或謂彼佛以寂滅為樂而道傳深究厥旨必樂於逝矣奚哀為予曰不然吾今哀道傳者情也其樂與否非所論也夫情動於中而辭出焉辭而哀之亦以示不忘云大鈞賦物兮物胡不侔深谷蘭摧兮蕕生道周良農服田兮祈榖有秋禾方秀實兮賦以螟蛑於乎哀哉伊人好修天其渺茫兮吾將誰尤哀鶴辭至正八年秋盜夜入吾友諸葛用中氏之家殺其鶴於後圃已而盜被執詰之盗吐其實當其穴墻之時鶴長鳴警之既穴而入鶴奮翮而前若將力禦焉故遇害用中於是惋惜流涕褁之席坎而埋之縣文學汪君以敬為作瘞鶴銘進士王君伯恂又為之誄然則鶴之死可無憾矣然余於是重有感焉夫物性能警盜者狗也非鶴也警盜而鳴亦已異矣禦盜而死不亦義乎人為物靈求其舍生取義者猶不易得况禽鳥乎葛之鶴其可謂義鶴也已矣故哀之以辭其辭曰鶴兮鶴兮瘞彼髙岡爾鳥其形心人之良鶴之斃兮狥於義兮骨朽名存猶無死兮龜巢稿巻十五欽定四庫全書龜巢稿巻十六元謝應芳撰詩
