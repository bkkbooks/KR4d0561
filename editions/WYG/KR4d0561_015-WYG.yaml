body:
  text: 瑞竹軒記余辟地甫里與徑山夀上人為方外交一日過余曰今年春吾祖如山翁燕居之所挿竹為酴釄屏閲數日竹皆復活或者以瑞稱之故名其軒曰瑞竹敢請子為吾翁記之既而復延致竹所相與撫玩曰是竹也前為屏時屈其所天至是乃盡釋其縛屈者伸抑者揚拘者縱新者闕穉葉發乎蒼幹勁節之間生意藹如有不可得而閼者愚乃退而思之夫竹非蒲葦䓁易生之物可不根而植者今若此果何祥耶嘗聞往者㓂萊公挿竹而生世謂公忠義所感如山之竹亦必有所感而致然乎余來呉中聞翁有微德之事二焉屬歲飢饉里有窮乏則周之俗多􅈄畋忍物暴殄恒買而放斯二者固尋常有力之家能為之豈其一念之誠仁發于中黙契于天而獨有此休徴歟抑别有隂德人所不知歟誠如是則萊公之竹不能専美於昔矣雖然物之瑞未若人之瑞也嗣法之徒森如立竹有能虚心以受道秉節以植德清風孤標為上根器則其為瑞又豈此君可同日語吁人為物靈氣化尤速某即拭目以俟龜巢記至正丙申春余辟地滆上依舊識里翁劉氏家築室一區棲婦子差可容膝既而以龜巢顔之客或過余曰龜亦何嘗有巢哉予曰子不聞乎千歲之龜巢於蓮葉盖其以葉為巢初不費經營之力也顧予此室實類之僦地里翁地不論值假力鄰伍力不受傭鳩工材則有鄉邑諸友人相之故其室不勞而成今也閉門縮首帖然如藏六之龜蟄乎其間此龜巢之所以名也比数日來春和景明氛埃寢息四境之内桴鼓不驚田夫野老相與招致渉桑苧之園過桃李之蹊瓦盆濁醪歌舞酧酢逍遥徜徉又得如曵尾泥塗者此雖巢外之樂亦因巢而得也但不能嘘吸道引如龜永年茍於此偷生亂離免禍鋒鏑全要領以終其夀考志願足矣若夫明休咎斷吉㓙决大疑於國家浮洛出書為太平文明之瑞則同類之中自有偹四靈相斯世者區區巢居之樂與坎井醯瓮同乎一天不知大小之闕為何如客曰有是哉子之適意也而今而後吾亦欲從子之居以適其適可乎予曰可客喜而去予因次對客之語用為記龜巢後記是歲八月之初天兵自西州來者火四郊而食其人吾之龜巢與先舊宅俱燼矣予乃船妻子間行而東過横山竄無錫期月之間屢瀕於危當是時跧伏篷底屏息若支牀者然猶數數引頸回顧以戀其故土明年仲秋至婁江東近扵海潮風汐雨漂揺棲苴乆之遂舍之從人借屋而寓閲四年居凡五徙聞鄉邑無噍類以是同室之人幸若再生雖貧窶不以為苦且復以為樂也至吾之所樂則又以窮居無事得專心讀古聖賢書以廣其志仰天不愧俯地不怍廓如也然視此大塊吾生若浮與夫龜浮蓮葉者何異所至以龜巢名室雖偪仄心有餘裕盖不以棟宇為巢而以天地為巢也峻宇雕墻莫知其光蓽門圭竇莫知其陋但知此巢自開闢以來歴數千億載不壊吾與萬物同居其間正不必藩籬町畦以自局也以是而觀區區舊巢墮甑奚恤雖物之巢居者衆矣儗龜之巢先後固異龜則儗其靈耳若曰以靈自燋亦其用於世者然也世不我用吾生自全吁用不用全不全繫造物者處之如何非龜所能為也惟兩間之巢人莫能壊此吾心可恃而安者吾心既安何往不樂苐恐不知者謂無巢而有名疑為誕故重託毛頴氏告之雲半間記歲庚子月閠五西山師搆小閣於天慧莊而居之額曰雲半間盖取諸前軰詩中語也予時客天慧與師落成徘徊其上溪山煙樹四顧如畫人皆喜之愛之而師之所樂不在是也是屋僅一間而止髙不倍尋廣不踰丈無欂櫨栥梲之華自常人觀之井幹麗譙奚啻霄壤師獨處之裕如盖其前後左右牖户虗爽蒲圃木榻薰爐禪几之外無長物焉師於六時坐如泥塑諸弟子𤓰華之供日一二至談説有或從侍立客或至信信宿宿皆不能常與師共之惟英英之雲悠悠而來朝於斯夕於斯窮嵗月於斯一榻之外皆雲攸居言半間者亦謙辭耳夫雲之為物本來無心而吾師心無所住是亦無心人也以無心之人遇無心之物故不情而親不契而合乆之則雲忘其雲雲即我也我忘為我我即雲也吾視吾室亦不知其與天地相間孰為大孰為小也莊周云天下莫大乎秋毫之末而泰山為小其言殆庶幾乎雖然諸皆相忘吾師固知之乆矣然而猶自此室者抑亦云桑下一宿之意與予嘗以斯言質之師曰然遂為記歸耘軒記吾友徐君伯樞以兵後還無錫故里築室膠山署曰歸耘徴予文記之予嘗質之曰而翁太中公為時名卿今逝矣州大夫亷君之才能也其家方薦之省府將上聞以官之而暇耘其田乎伯樞笑而不荅予退而思之君名父之子自蚤歲淑諸師友菑畬經訓埀二十年今以先世負郭之田莾為荆榛固不可不畊且耘也然亦奚忍舉此而廢彼耶必也帶經犁鉏斯可矣古之人若耕莘者樂堯舜之道耕南陽者有梁父之吟故一旦以三聘三顧之而起非惟澤溉生民功施社稷尡耀當世而伊訓諸篇出師兩表至今與日月争光是豈専于農者能之乎雖然耘田之事亦有治道存焉敢請與伯樞論之五榖猶良民也稂莠之屬猶㓙頑也草生而不耘則榖不榖矣芸之早則用力寡而功多小緩則小害大緩則大害既害而耘或百倍其力而不盡雖去之而榖已疾其害矣吁草害于榖治田者道也凶頑之害良民治人者可逃其責乎惟沮溺荷篠之流潔身亂倫者不足以語此伯樞宜留意焉樞聞乃起而謝曰是吾志也請書之用誌於壁庶他日知所警云東郭草堂記至正乙巳春友人徐君仲剛書來曰瑗性迂拙分甘退藏擇無錫東郊荒僻之地作草堂居之讀書灌園蝸休蟻適自謂有可樂者子知我其能為我記之乎予惟仲剛卓犖之士也譬之楩柟豫章不巨室棟柱則山林而已比嘗佐令慈溪方欲抉吏弊更苛政以仁其民一旦以當路掣肘棄若敝屣翻然來歸客呉下數年不入城府其抱負為何如哉兹草堂居寛閑之野前有鵝津可釣可㳺鴻山宛山屏列左右東膠西堠紫翠相接又皆牕戸間天然圖畫也仲剛入則與書中聖賢相對出則與里中農圃為伍親友時至忘形爾汝腰不為督郵而折膝不為汾陽而屈適興賦詩往往有太白豪放所謂有可樂者其以是與雖然昔諸葛孔明居南陽亦蕭然草廬而已及乎以三顧而出入陣有圖出師有表而勲業焯焯如是静學之功信不誣矣荒僻之居又安知非天假為學之地乎愚請以規仲剛并記斯堂之歲月云野人居記余聞之易其地則齊楚異音同其居則蘭鮑俱化大哉居乎故君子必慎其擇也予友呉中行今乃去朝市逺城郭挈家淞江之濱桑麻之野蕭然一室名野人居是果奚擇而取哉昔中行以劍術㳺諸侯借箸之籌幕中之辨嘗見用於當世豪傑矣未㡬以時之不利投簪來歸回視淮隂狗烹之歎華亭鶴唳之悲銅山餓死之辱金塢燃臍之禍未嘗不愴然于懐其言曰窮居之安不愈於負且乘乎蔬食之樂不優於覆公餗乎由是縮首閉門百念灰冷獨研精古聖賢醫藥之書以事其親以濟夫人暇日則携杖屨往來溪山間與嵒穴吟嘯者㳺耕簔釣笠交亦無間情真而不邉幅語朴而無貝錦滄洲濯足或坐終日茅檐炙背或談千古桃花流水之外杳不知其孰為秦而孰為晉也但知譚泉飲菊可以永其親之年江鮮膾鱸可以美其親之饍𤓰疇芋區芝田藥圃皆其地所有而名都大邑之所無也若中行可謂善擇其居矣予與中行有通家之好一日携兒子林過之用是為乃翁夀中行嘉予言請以為記因命林執筆以書其居之壁云雪洲記趙君執中蘇人也家笠澤之隂與天隨子故里相望澱湖直其東陳湖横其西其墟落乃一洲渚耳君性喜雪凡歲寒雪作之日天地六合炯如氷壺三江五湖如璚匜玉杯而山林皆瑶草琪樹也然陽精掩耀湯泉欲氷歌黄竹而悲者在在有之時君獨傲兀吟笑于滄洲之上或終日竟夕而忘歸焉盖一時清氣與虚室之白洞然無間故自謂平生慶快無踰此時乃即其所居之處所樂之事自號為雪洲也予嘗於夏日過之階庭之間竹有蒼雪明牕素几寂無纎塵而大篇短章又皆與氷柱雪車同一光潔且曰桞雪之春蘆雪之秋亦猶見似人而喜予於是知雪洲之樂盖無時而不自得也或曰以君之才宜其從名王逰兎園而其遇出竒謀平蔡州而樂其成功窮居野處何足快哉吁昔子程子論顔子之樂非樂簞瓢陋巷也君之雪洲亦類是歟但區區言耄不能揄揚姑述其槩并以觧或人之嘲如此云竹梧書房記洪武辛亥予去家十有八年而歸儒紳故交多無噍類獨友人秦公宜仲主貴池縣簿告老于家予首訪之與客偕往公所居環堵之外皆焦􅇕灌莾乃題其室曰竹梧書房客因訝而問焉予曰嘻我知之矣公之先君子以多資𢎞第宅儲書數千巻自蚤歲教公為舉子業公研精伏生所傳之書旁通百家文譽日著時子山陳先生未魁天下與公為忘年交嘗與予過之其階庭之間巨竹數百雙梧玉立綠隂蒼雪清氣襲人而公之風神蕭灑殆若與竹梧俱化子山嘉之故有是篇夫髙垣大宅今瓦礫也碧梧翠竹今枳棘也埀籖挿架之帙不為刼灰則市肆之醬䝉矣惟腹笥之書幸而無恙故嘗為郡博士以教其邦又推其緒餘佐治巖邑以嘉恵其黎首今老矣尚能鳴待問之鐘以接逺方朋來之士為文章則駸駸乎周誥殷盤而不聱牙也扁乃舊名葢不忘父兄師友淵源之懿耳客既釋然公亦頷首出縑素請筆前語以告後之不吾知者并以示諸子若孫庶箕裘其業云是冬月建子日㡬望余則龜巢老人謝某也映雪齋記毗陵何士信起家業儒儲書數百帙研精誦讀晝夜不息榜其室曰映雪齋葢慕孫康氏之苦學焉夫以士信之家居市㕓足資用焚膏繼晷乃所優為齋居豈虛名哉其心必曰我自短檠猶雪之明我室棐几猶雪之瑩我讀我書夜氣以澄微言妙理披雪覩星顧我靈臺皦皦乎不雪而白不氷而清唾視籝金珍惜分隂曾不知九逵塵土之蓬勃四時寒燠之變更然則映雪二字又何異湯盤九字之銘歟彼㶚橋詩人梁園賦客有不可與同日語者惟篤志之士如㳺如楊立雪於當代程夫子之門者聞之必予其進矣士信謁予文請以是勵之蘿屋記毗陵郡城之西南距滆湖廿有餘里湖水支流北抵城而滙其地有髙原平林風篁煙樹景物瀟灑友人詹伯逺居之茨宇一區牽蘿補葺匾曰蘿屋名固不虛盖亦以昭其儉耳然庭户閴如日必灑掃木榻棐几瑩無纎塵平居則肅然孤立以孔孟之書教孫共讀異端邪說絶口不談彼流俗相煽而炫惑者弗接勝友時至尊爼欵洽或相與論端人貞士氣義風節終日竟夕亹亹不厭予嘗過而問曰子豈掃除一室之小丈夫乎伯逺笑而不荅予曰噫我知之矣伯逺通古今明物理眎昔人之銅山金塢皆禍基也峻宇雕墻匪安宅矣盖其所喜者桑樞甕牖之美而所樂者簞瓢陋巷之天儼然為草廬布衣而耕南陽之田者其出處豈易與人言哉雖使得志其不為堂堂九仭也必矣善觀人者毋以蘿屋之儉而陋諸洪武十有二年歲在己未四月之吉謝某記菊軒記古者逹觀之士寓物適意初未甞肆意於外物也若莊周觀魚支遁觀馬阮孚自䗶之屐嵇康栁下之鍜與夫愛竹愛松愛諸花卉者大率皆適意而已近世流俗以淵明愛菊亦從而愛之所植或百數十株髙及尋仞花大如杯假以花師接養之工移易種類使坤裳正色亦多變而失真其嬌紅韻白紫茜紺碧之屬愈出愈竒且復以西子玉環等人物之名名之是則誇多鬬美肆意以極玩好之娯視淵明奚翅霄壤夫東籬之菊猶西山之薇薄言采之可以樂饑若乃賦離騷而飡落英者其庶幾乎寒圃晚香樂則樂矣然其趣有不可同日語者吁流俗之謬如前所云豈不大可笑乎吾友王夀翁以菊軒徵予文予恐其翫好之意淪於汙俗兩年不為措一辭今乃不然翁春秋七十有三凡早歳華靡之習皆已絶去軒墀蓻菊僅一二本其言曰吾所以愛此者嘉其當草木變衰之候霜瓣露葉澹然幽芬挺挺特立久而不墜殆與晚年矍鑠者黙有契焉故朝斯夕斯逍遥相羊或開牕坐宴或置酒速客終日相對不厭不倦雖髙風雅致不敢妄擬於陶其適意之樂亦無官之韓魏公也咄彼庸儒朋滛可憎安得疾惡如諸伯厚者相與御剛風摶沆瀣周流八極為兹花一洗汚衊之辱過翁幽軒呼酒髙酌咏柴桑之詩歌離騷之章盡醉以適翁之適而吾亦得以適其適也矢心陳詞用誌軒壁為後㑹張本云斗室記自標枝巢穴之世逺宫室之制日新月盛世祿之家第有甲乙馴致習俗之侈而堂髙數仭墻屋錦繡者比比矣若夫屈身矮屋之士往往以力所不足不能有為其志未嘗不澹然也惟吾可積則不然可積以呉越錢氏之裔贅延安唐侯之家往來雲間築室采邑鳯山屏其前淞水襟帶其左右屋裁三楹髙不過尋丈而延袤深廣如之匾曰斗室時僑寓以居宴如也夫以婦家封侯之貴采邑之富雖連雲别闕咄嗟可成今若此亦可謂不滛於冨貴者歟吾將以其細行觀之屢歲過鄉里視故舊親戚謙謙乎抑抑乎執子弟禮不異童丱之日無一毫驕矜放肆以加於人故咸謂有先君子好禮之遺風焉然則斗室之儉本乎天性非矯飾一時以要虛譽而為之也昔衛公子荆善居室完曰苟完美曰茍美故孔子稱之若可積之儉而約於衛荆其庻㡬乎吾用是以稱可積延安家法之足稱亦可見矣是為記思齋記膠東賈文學鈞慶典教毘陵郡以燕處之堂榜曰思齋徴予文記之且言曰某所謂思者非謂能三思而行亦非敢以九思之訓待旦之意示警如書紳也思吾親於疇昔䘮亂之秋相繼即世母蕞昌邑父堲萊縣㡬致蕪沒幸而茅㓂殄滅歸室祖塋大明開天㧞擢寒畯代畊有祿而養弗及親矣風木之憾十有餘年去鄉土㡬千餘里霜露降濡悲感交集念欲灑飯松邱使吾親不為若敖之鬼棲息桑梓以終餘年此朝夕耿耿於懐也予曰嘻㳺子悲故鄉信矣况思親乎然君子之思其親者豈止是哉烏雛返哺豺獺報本特一事耳必也出言舉足動合矩度不忘其親詩禮之訓聽于無聲思無邪以正其心儼若思以敬其遺體由是而推其緒餘以淑諸人以施諸行事忠君報國流芳汗青以顯榮其親夫然後息負荷之肩觧組綬之縛訪親戚省墳墓某水某邱凡吾親所釣㳺處吾得釣而㳺焉鶡冠鳩杖抱子弄孫以安享太平田埜之樂則今日之所思者豈不熊魚兼得乎區區耄言筆識齋壁庶或紓其懐抱云白雲亭記東漢趙邠卿夀藏之作吾意其渉艱危將以得全歸為喜故耳至唐司空表聖乃預為壙槨時與客觴咏其中又作休休亭以寓超然物外之意史稱曠逹不誣矣今吾反唐公均舉由末致仕佚老於家洪武革命䝉天憗遺以弓裘無嗣業者命其兄之子某允明為後家事鉅細悉付托之即在家為有髪僧㕘釋門諸老以學其學春秋八十有九號曰白雲翁距舍南百餘歩迺為佳城傍結茅龕晝夜禪寐允明則日候起居奉甘軟如事所生且能承順其志築亭于前復鑿池以藝蓮芡之屬幽花秀竹與冢上之木參錯相映每邀致親之所愛盍簪于亭薫爐茗椀相樂也且曰某負米四方往往望白雲思親有如昔人之言者雖歸侍旁雲常在目請先生為我記之時坐客有辯之者曰吾聞藥山禪師以雪之在天為西來祖意今雲翁禪眼之明必有契乎禪悟之語非允明名亭之意亦非儒紳先生所知也予曰不然夫英英之雲一也其觀感各有不同雲翁身如雲浮太空貎焉斯須猶瞿曇氏電露之諭也若夫允明望親舍之雲而懸懸者是則以梁公之心為心家居以壟雲自怡庸詎知非華陽真逸之心乎吁仁見謂仁知見謂知予所知者此理而已禪則吾不知也客笑而不言予曰如何翁曰佳允明曰唯唯是為記養正齋記徃余客東吳十有餘年聞儒林月旦以琴川髙彦和氏稱為儒士聲甚藉藉予雖未相識而相慕焉洪武辛酉秋友人楊純夫尤稱譽之且言彦和以養正名齋葢取䝉卦之辭猥徴予言屢辭弗獲予曰大哉易也豈敢以管窺之見以贅疣乎請以古之善養正者為彦和誦之如孟母三遷使其子去丘墓市㕓為不逰之地習禮容籩豆于嬉戲之間如室於蘭乆而俱化厥後以寡欲養心以直養氣傳正學而接跡于子思辟異端而竝功于禹是母是子非善養者能如是乎衛武公行年九十有五懿戒之作既自箴警且求卿大夫官師之屬交相教戒瞽矇誦讚朝夕弗違言行之純罔有圭玷亦豈非善養者乎是故一為亞聖一為睿聖易之所謂聖功者不誣矣吁人生天地間所受之性本無邪僻惟其情竇既開牽於物欲日浸月漬或正或否遂乃有君子小人之分茍得其養則如木從繩其正若自然矣今彦和之為端士也䝉養之功不言可知繼自今以來學與日積道隨年長佩服乎七篇之書􅆂養乎大雅之章毋曲學毋枉道毋有獲而詭偽慎終如始益進益修如此則希孟而孟希武而武何止如旦評而已哉區區言耄而瞽幸純夫為我謝之重建雲居菴記洪武十有六年春雲居主僧德傳過予曰宋咸淳間四世祖諱行興號祖庭來自天目山駐錫爵林露坐說法風動一方緇素與檀施坌集遂結菴以處之名曰雲居由宋而元祖年九十有二終于至正乙酉其嗣法弟子曰慧滿繼之四年而沒曰道印以甲乙傳及元末菴燬於兵慧滿避兵他適不知所之而德傳念祖師過化之地義不忍捨去大明更化初頼吾佛之道與時偕行于是剪荆榛畚瓦礫復經始營之距爵林百餘歩得里人湯逹卿故基以廣其居今茍完矣請先生之筆以識之前此予嘗過横山之隂憇足于菴觀夫所築之室凡二十餘楹堂有佛像設供具鐘磬列焉僧有室經案禪榻香燈備焉餘如齋厨井湢之屬罔有不備其地近山而爽塏逺城郭而幽閴晨嵐夕霏空翠灑牕户間無囂塵市聲滓人耳目傳公日掩闗趺坐泊如也吁是雖蕞爾一區如把茅葢頭然視佛之所謂桑下一宿者亦已多矣彼名山巨刹膏腴以千萬計尸素之士或不能及若傳公者服勤如此肯搆如此繩祖武而繼之人如此豈非浮圖氏子孫之象賢者歟予故聽其所謂并以目見之實三嘆而書之是歲夏六月之望同郡龜巢老人謝某撰歸耕記予老廢筆耕授之子子以拙辭躬稼又弗克服勤方諄諄然朂之以周公無逸之訓潞城曹德聲書來曰震往者避兵東呉顚沛萬狀還鄉以來田舍粗葺歸耕二字掲諸座隅示不忘也惟巢翁姻婭而相知敢請識其顚末以埀警其後人予曰嘻前元時德聲曽大父為晋陵閭石大父起家登仕版歴官至東平路同知殁數年而德聲失怙丁時多艱家用蕩析蔑有能相顧者藐焉依母氏笠澤之濱狼􅈣滿眼矢石塞路窮途之困甚于蒺藜杳不知先業失墜為何如也大明更化初竭蹶而趨偕女弟之家還故里荷蓑笠操耒耜薙荆棘之區犁之剷瓦礫之塲屋之載搆載穫粗理而恢拓之烝嘗之奉滫瀡之養征徭賦稅之所需罔有不給且能割膏腴以寧二兄之歸斷鴈復得以成行逰魚不失其同隊東阡西陌雞鳴狗吠桑梓敬共是如其素願也然則患難之餘歸耕有如此者豈易得哉若曰其歸也非衣錦之榮休官之適其耕也非能以堯舜之道樂于畎畝此盖以前賢論之衆人可同日語乎如德聲者先世之業失而復得骨肉之親散而復聚况時和歲豐率土寧謐凡我同類皆得耕田鑿井驩然為太平之民其樂雖異于古人未為無所樂也吁以其艱難勤苦十有餘年而後得此後之人或罔有攸知寧無怠荒乎此記之所以作也顧予年耄請復以語吾兒者語之夫周公聖人也無逸一書為世龜鑑茍知之則當尊其所聞俛焉孜孜以述纘承其先緒詩曰子子孫孫弗替引之吾於此亦云書屋記洪武壬戌秋崑山故交辛斌甫過龜巢為其友蔣生秉彛請書屋記且曰生自齠齔時嗜學雖祁寒大暑矻矻不少廢年十五父命學吏事閲數月不懌而歸既而令服賈走淮浙南北數千里亦常以簡冊自隨少暇輒誦讀之竟不屑罔市利以肥其家遂令力穡為仰事俯育計秉彛廼從親之令臺笠緇撮以事其事三餘之日愈進厥功老夫以未嘗靣其人目其居難乎架空鑿虚而為之文也明年夏五予舟過婁江斌甫與生郊迓而過之所謂書屋者初無埀籖萬軸也亦非連雲大宅四書六經外諸古圗史與陶𢎞毛頴列乎其間與之語燦然有文意吾常林經鉏董君南之朝耕夜讀亦如是而已矣揚子曰晞驥之馬亦驥之乘使秉彛所造愈深進愈力則所就未易量也然則秉彛能承順其親且不卑屈其志謂非能子可乎所居在崑山城西九里橋之南其江山景物無闗於書屋者不書特以其心跡之實書之用為記時洪武十六年五月二十八日逸菴記夫人莫不欲四體之逸也惟君子則逸其心故嘗操而存之寡欲以養之秉彛之天一真無偽感而通之動㒺不吉周書曰作德心逸日休君子取之故能逸其心也今河南彭公伯常為武進令自號逸菴夫所謂逸者心逸之謂歟自常人言之州縣之職其勞甚矣顧兹巨邑事如絲棼雖戴星出入猶恐不迨可能逸乎予曰不然公以夙學老成之才為之征科撫字恩威並行雀角䑕牙曲直能辨如庖丁觧牛知其肯綮牛雖多而芒刄不頓也矧夫至公之心炯如秦鏡且不以塵土蔽妍􅑦所照隨物應之則是吾心之逸盖自若也雖在官舍視為逸菴不亦可乎一旦朝家以七十之年優容里居則吾心之逸與肢體之逸熊魚兼得矣雖然古之逸民若夷恵之儔髙風峻節為世師表吁吾知逸菴之逸必如是而後已焉持敬齋記前軰以齋居之名著稱者多矣其最著者曰誠齋簡齋容齋又有以先正箴銘而傳者曰敬齋求放心齋是也其後一變曰疏曰酸曰松雪者紛紛然人争效之齋之義逺矣今贛之聶伯䕫氏以持敬名齋需言于愚愚固辭不獲乃言曰聖人筆六經以詔萬世敬之一字層見叠出先儒詳之矣愚復何言竊觀所謂持者意在執持而用之人之持物猶吾之持敬也持物以手持敬以心茍不致謹則亦莫之能用也譬射者必謹于持弓而後不失其中御者必謹于執轡而後不失其馳又如執玉捧盈必洞洞屬屬然如弗勝如將失之然後能勝而弗失也伯䕫鄉逰成均持此敬以進德脩業故學優而仕宰髙平持此敬以治其民而民有去思焉邇來為諸侯幕賓翼翼乎以㕘贊承宣為務謹三尺御羣吏以涖四邑是皆持此敬以展其用歴兹以往百司皆然有官守則持此以共其職有言責則持此以盡其忠峩冠冕鳴佩玉鸞臺鳯閣簉羽鵷鷺無非持此心之敬而用之其用有不能盡者敬乎敬乎亦豈非一言而可以終身行之者乎夫如是則上不負天子下不負所學齋名著稱亦卓然如昔人矣雖然宦成而怠世固有之惟君子慎終如始有不為其怠者衛武公春秋九十有五官為周司徒方且再三以敬慎為詩日夜警戒故卒能為衛聖武公愚不敏敢請獻此詩為持敬慎終之助洪武十七年歲在甲子三月二十六日恬澹齋記為髙彦述作昔有與彥述同姓字君素者以頥軒請涪翁賦詩其畧曰辱莫辱多欲樂莫樂無求㫖哉斯言真可為恬澹齋座右銘也盖多欲則不能恬静必辱其身無求則澹泊自足樂於其心由是知孔顏之樂非樂乎飲水曲肱簞瓢陋巷而蔗境之佳可漸入而得矣夫彥述先君子以醫名家獨歩鄉國流風遺俗今豈無之十餘年來乃能與時浮沉不競不躁不貪不墨舊家氣習掃滌净盡故齋居之室題曰恬澹盖取諸内經養生之要旁㕘老莊而有得焉至如諸子百家之書亦能渉獵然文􅇨不露不求人知城居如子真谷口賣藥如君平賣卜簾常晝埀門或早閉衣布素若紈綺茹麄糲如膏粱由其氣禀之清資以學力斯恬澹有過人者每謂人曰人生固不能無欲也多欲奚為彼銅山鑄錢郿塢積金一姬傾斛珠萬馬如錦繡凡如此類孰不禍賈當時而遺臭後世乎言之必撫掌大笑傾倒而後已吁黄太史九原可作論二髙當有抑揚老夫贅言亦庶㡬奬勸之助云芸室記予耄無能為者乆矣嶄然骨立百念灰冷獨嗜學好友之心猶未能忘前元故交淪没殆盡每見後生少年能讀書通古今識道理且不為異端邪說所惑則愛重之同郡為忘年友者凡數人其一伯禮也洪武戊辰秋伯禮書來曰某居鄉城環堵一室有古聖賢經傳及醫書若干巻日用渉獵間以芸香辟蠧庋諸室中顔曰芸室望先生以警之書再至義不容辭矧予数相往來知其室無節梲之華無丹碧之飾無屛罳帷幄為觀美之資宴安之具闤闠中有山林清致木榻棐几圖籍左右薫爐短檠陶泓毛頴之屬晝夜為伍孜孜厥􅁱嘗謂人曰吾為醫家方技可以寓吾心之仁以濟夫人人故先之非以儒為迂而後之也吁伯禮言此其知道乎然九流百家莫大于儒儒之道莫大于仁伯禮知醫藥之方或未知仁之方傳曰已立立人已逹逹人仁之方也尼山大聖盖得夫唐虞三代之傳傳之萬世以康濟斯民非金匱石函之方可同年而語者請以是筆諸芸室藴諸身施諸人則吾心之仁不可勝用醫儒之道所謂竝行而不相悖者信矣是為記重建清微觀記夫師教之恩報同君親盖化之重者見于經昭昭也然道德五千言此非所先茍師道之不降則道德亦不能有傳矣今清微觀主周鍊師石泉勤而行之是能黙契禮經而獨超乎其類也洪武己巳春石泉書來謂予曰某追懐先師歸復故業丐先生為文識之予嘉其能而不却也抑嘗過丹陽聞諸鄉老之言其報師之恩藹然可見初邑人諸葛德齋隠居學道佩天師符命剏此觀為脩鍊之所既而羽化實為開山之鼻祖也弟子裴静山䓁住持以甲乙傳元末觀毁衆亦飄散或存或否洪武改元其徒朱竹軒言還結茅而居未㡬而終時石泉住丹徒紫府觀聞師訃即謝事而歸塟之志在復業揄揚道法風動一方向化者咸樂施以相之諸葛氏母子其尤也于是剪荆榛畚瓦礫鳩工度材辛勤十有餘年作三清殿前闢山門傍翼兩廡祖祠經室丹房齋厨之屬凡若干楹穹林竹樹蔚然屏蔽輪奐之光焜煌乎蒙城故區度亭遺跡長塘之煙水湖光北固之雲霞山色亦皆映帶為清微勝概矣吁凡為人後者有能繼述如此豈不為賢子孫乎近世縫掖之士學必有師禮宜報効未嘗彷彿如此者也予因記其事之顛末深用感慨并書此為世之勸云棲雲軒記雲之為物聚散不常其聚也由膚寸之微至於彌六合雨天下其散則斯須無踪人莫能測况能與之棲遲乎惟英英而白悠悠而閒者方外之士相羊似之每寓言而髙尚之意云耳常郡𤣥妙觀莊某以寧棲雲有軒意盖如此夫以寧師老􅅨其學以清静為宗青山白雲澹然幽棲固其宜也然􅅨在周室柱史有年青牛出闗然後著書五千言以鳴其道亦未嘗絶物斯世而為髙尚焉後之善學者如陶貞白于齊梁之間挂冠都門怡雲句曲若將終身焉及乎以大任寄之固辭而不可得遂乃坐山中如廟堂之上茹茯苓如鐘鼎之食人到于今稱之不失為華陽真逸也矧吾以寧有琴而能作松風之聲有詩可以賦怡雲之情是則陶之所樂皆為吾有山林市朝或處或出何往而非棲雲之地哉吁由周而來寥寥二千餘年所謂隠居以求其志行義以逹其道者竟無其人是可嘆也若夫華山之陳一枕白雲三徴不起此又不可同日語矣以寧徴予文特書此以識歲月以偹從善之擇云聽雪軒記夫雪聲之微若有若無聽之者必方寸之間一無擾攘兩耳之聽不為物奪然後可得而聞也同郡馬用和居市㕓以陶猗為伍絲竹車馬之喧晝夜不息聽雪有軒豈虚名乎洪武初予嘗忝為東家某知其為氏之良别來十餘年說者謂用和讀書養親習與志長超然出羣遇歲晚同雲霰集而霏霏之雪繼之時用和侍親庭闈言此為豐年之瑞以娯其親捧夀觴如金帳羊羔舞斑衣如仙人鶴氅以春蟲撲牕之聲為金石之鳴舉家之人同得以樂其樂也既退獨處軒居萬籟俱寂乃想像撒塩飛絮聽于無聲不啻若鈞天廣樂九奏而有遺音所樂有未易語諸人者其心必曰蘇子卿十九年牧羝沙漠李元直夜半擊鵝襲蔡梁園之賦客揮毫㶚橋之詩人覔句皆安知雪之有聲如此其樂哉用和需予文請以是相知之言識諸軒壁異日黄金鑄我鍾期吾亦無愧焉爾𤓰田記農皇古聖神以人道急于養生是故作耒耜敎之粒食又為之醫藥以濟其夭閼而本草之書出焉既而軒岐問荅靈樞素問與本草並行為醫家之大經大法也崑山邵濟民氏家傳是書深究厥㫖為醫巨擘迨元末年業隳於兵慕古之同姓種𤓰東陵于是即所居淞滸糞于𤓰田臺笠而鋤抱甕而灌綿綿唪唪之瓞如周雅所稱以之養親可以充一味之甘以之留客可以侑一茶之欵其蒂為苦口良藥可與參苓薑桂竝用以活人濟民嘉之因以𤓰田自號朝于斯夕于斯寓幽興于斯非矜乎東陵華胄也方今盛時過𤓰田而納履者無之或為古之人有白兎御史殆若戲言無足患者其樂為何如哉予嘗避地東呉濟民乆交乃不以我三百廿里為逺九十六歲為耄致書求文再四益勤予辭不獲遂以昔所見而知者筆之是為記習静軒記洪武丙寅冬前知武進縣太原舒公之孫文允書來曰某家居闢小軒讀書強名習静用唐人詩中語也丐先生為予識之書凡四至不容以耄辭乃謂之曰人生而静天賦之性感物而動情之欲也性至微故學者必有以養之然後不為物欲之所汨習静之意必有見於此歟夫以文允之英姿壯年學優而仕動而有為取青紫如拾芥今乃韜聲光歛踪跡負米養親之外足不入城府影不出户庭目不眩邪色耳不汚鄭聲膏粱綺繡不適乎口體罄室隘巷門可羅雀澹然而資于外者如此廓乎虚襟寂乎靈臺幽探乎經史之奥􅉼泳乎義理之懌出入乎諸子百家而無他岐之惑焉其怡然養乎中者又如此可謂得習静之方矣昔者濓溪翁主静之學程伯子以親炙而得之其平居終日坐如泥塑及其動與物接則一團和氣穆如春風視世之以槁木死灰為静者逈不侔矣愚意周程之學盖黙契夫大學定静之㫖相傳使文允以周程為法而學焉則習與性成二賢同歸豈特如摩詰之語而已哉予不佞故卒以是告之時洪武二十年四月之吉同郡龜巢老人撰龜巢稿巻六欽定四庫全書龜巢稿巻七元謝應芳撰啟訟伯父墳地上縣宰啟掩骼埋胔者古今之制其仁如天過家上冡者子孫之情伊誰無地顧邱壟之失所實風化之有傷瀝血寸丹陳情尺素切念某痛懷伯父曩歴兵戈死雖正狐首之邱時未集鴻飛之澤啟手啟足幸能四體之全歸若斧若堂詎信百年之難保蓋自陵谷變遷之后以致家門摧敗之餘失此故塋屬諸姻黨誰其主者展我甥兮此一錯在乎當時故陸沉至于今日渭陽之舅絶無見念于秦龜隂之田那復肯歸於魯然豈料人面獸心之軰乃謀為兎葵燕麥之塲雷厲風飛宰木􅉐空于斤斧日侵月削佳城亦壞於犁鉏殆將見暴骨之寒竟何異鞭屍之慘三尺之法不畏匹夫之勇莫當向來不平之鳴屢致逄彼之怒鬪狠不顧輕性命于鴻毛匍匐而歸飽尊拳於雞肋是可忍孰不可忍如之何末如之何徒増蒿里之悲每動窮途之哭既無面於江東父老復何顔於地下祖宗日月不照之盆弗堪長覆天水違行之訟可憚終凶賴典章有禁地之條其情理實滔天之罪仰惟公道俯察愚𠂻恭惟某官讀萬巻書為百里宰氷其清玉其白絃之直稱之平寛猛適中剛柔相濟數月有撫字征科之績四郊無呌囂隳突之憂休休焉其有容皜皜乎不可尚聲蜚臺閣恩迓絲綸如某者受廛為氓閉門歛跡亦久被卓魯之化焉敢興虞芮之爭但悲夫九泉之人欲掩以一坏之土願施善政垂戒惡人使知見舅如母之親勿為敗俗亂常之事復此牛眠之地仍為馬鬛之封想去家舊鶴重歸看銜土慈烏畢集凡春秋拜掃之日皆存亡感激之時上窮碧落下黄泉為雪幽㝠之恥生當隕首死結草弗忘判斷之恩痛切之私敷宣罔既上干尚書啟公名傳字受道號止亝延祐乙卯科進士不封萬户侯願識韓荆州常切慕謫仙之志手把一封書上有皇甫字輙敢扣昌黎之門問胡為今日之來曰專為古人之事與其進也適我願兮嘗謂傳道不絶者先民之功沒世不忘者後人之義若道鄉鄒忠公之葬近在城隂有了翁陳先生之銘流傳天下孰謂此一邱之土盡廢于八世之孫鄉隣忍于瓜分翁仲隨以蕪沒故諸生為之太息于當路鳴其不平頼二侯以公道主盟不半載而佳城復舊築思亭而薦蘋藻立華表以樹松楸茍非紀載之詳尚慮耕鉏之患立羊公一片石欲大書名世之言如季子十字碑以昭示尊賢之意雖不咎于既往庻有補于將來求之與之完矣美矣恭惟某官老成前軰文章鉅公三千字禮樂縱横在早嵗修名揭日九萬里扶揺直上至晚年直氣凌秋典文衡則妙于稱停秉史筆則嚴于褒貶烟霞一壑今歸老于長洲茂苑之間霖雨八荒將拜命于安車蒲輪之召斯言非佞輿望所期某曩客新安聞公舊政復紫陽之闕里大振儒風勒黄絹之好辭有光吾道諒弗忘于素志必重念于斯文惟大賢無不容則小子乃有造于以紀前言徃行于以發潛徳幽光眷言梓里之間永若桐鄉之愛鏘如韶鈞蔚如虎豹雄文照耀于九京明則禮樂幽則鬼神妙理昭彰于千古存亡有感敷叙莫殫贄見余用中先生求作辨惑編序啟狂簡斐成章辯諸家之邪説品題作佳士必當代之儒宗夫瓣香敬為南豐蓋學者仰如北斗予其進也適我願兮嘗謂璞玉雖竒非和氏則山中之石琴材固美無中郎則爨下之灰太𤣥經有覆醬之譏公羊傳有賣餅之辱古猶如此今豈不然欲立言圖不朽之傳必取正于有道之士嗟今陋俗舍正路而弗由集古遺言廻狂瀾于既倒可奈一齊而衆楚猶如皆醉而獨醒驚人之鳥一鳴怪雪之犬羣吠願君斵堊為我折𠂻或衮褒一字之榮則價倍千金之重馮豐霳寄寥廓久矣馳情抉雲漢分天章豈辭揮手綱維吾道黼黻斯文兹蓋伏遇某官文章鉅公典刑前軰詞塲較藝視五色之日不迷鄉國興賢使三代之風復振躬行古道歴踐華途每為政郡邑之間常蜚英臺閣之上歸從彭澤舊家環北固江山教若河汾大隱居南徐城市户外之屨常滿門前之轍何多雖云遂莵裘之營必復有蒲輪之召如某者俯慚後進仰慕先知尊其所聞行其所知愧未造髙明正大之域博我以文約我以禮誓弗忘仰鑽瞻忽之誠景慕有餘編摩罔既贄見李晋仲提舉求安啟思忠公傳道之賢為褒遺事辨邪説誣民之惑乃集前言持布鼓于雷門分天章于雲漢恭惟某官儒林麟角學海龍門鍾山草堂之英靈雪竹霜松之標致懶折腰于彭澤早賦歸來聊濯足于滄浪亦云自取皜皜乎不可尚已休休乎其有容焉然吾道賴以綱維而儒林視為儀表尚持藻鑑以主文衡名動京師栢府之薦章交上官居翰苑蒲輪之召命將臨先生自此升學者仰如斗某呉中晚進白下漫逰自憐如明月暗投誰復念陽春寡和汲汲有登龍之願拳拳慕倚馬之文方往依劉以圖御李欲因劉堯輔見公乃于劉處偶得識面低頭拜東野適因邂逅之間瓣香為南豐得展殷勤之敬敢持兩帙謹用三熏長年坐井底觀天此日詣門前立雪倘賜五行之覽必蒙一字之褒登山采玉入海求珠捆載乃酬其素志製芰為衣紉蘭為佩激昂正賴其清風贄見楊亷夫提舉求序思賢錄啟兩袖春風作洛下書生之咏滿舡明月過闗西夫子之門問胡為今日之來曰端為古人之事切有請也能無從乎伏念某生延陵季子之邦頗知禮讓復道鄉鄒公之墓當效馳驅樂民俗之還淳喜士風之近古思賢有錄味道無厭紀前言往行之二三發潜德幽光之萬一自藏燕石誰售雞林恐公羊遭賣餅之譏使太元有覆醬之辱願借春秋之筆稍為月旦之評得一序以冠塵編若千金而加敝帚庻傳不朽有補將來非惟先哲之有光眞乃後學之多幸兹蓋伏遇某官乾坤清氣風雲壯懷走馬看長安花早嵗似唐人得意割雞為武城宰居官如言子愛人以文章政事之俱優宜天下國家之大用尚淹筦庫未展經綸人皆知大器晚成我乃獲景星快覩題鸚鵡賦已多年傳麗則遺音到鳯凰池將不日遂平生髙志倚期𤓰代入覲楓宸如某者敢不長遡下風永懷髙誼聞所聞見所見眞如到神仙十二樓之間步亦步趨亦趨或可在弟子三千人之列其諸欣慕㒺旣敷宣贄見張用鼎教授啟黄魯直竭蘇東坡因述依松之志禰正平過孔北海乃蒙薦鶚之辭葢同氣以相求必當仁而不讓敢持尺牘特造丈函恭惟某官海内儒宗江西詩𣲖往嵗為馬尚書賔客當時有虞學士品題謂鵬程萬里横飛期鳯池十年可到道出羲皇才過屈宋何鄭公猶在於廣文上規姚姒下逮莊騷若韓子獨尋于墜緒先覺覺後己立立人四方之學者來歸一鼓而斯文作氣博求地利開元武湖以廣澤物之功善育人才置治事齋而兼水利之意聲蜚臺閣恩迓絲綸如某者生長呉中棲遲白下顧窮居而獨善恐沒世以無聞著辨惑編闢近世之異端邪説作思賢錄發前修之潜德幽光欲煩斵郢人之斤輙敢弄班門之斧平居抱膝仰泰山北斗之髙此日承顔覩鳯凰景星之快天其或者道之行與得華衮一字之褒増敝帚千金之價品題作佳士何慚奏白雪遺音吹嘘上青𠖇或可借春風餘力答陳天倪謝薦師啟見賢而舉者古先之訓惡敢言功易子而教者夙昔之心幸逢知己豈意予互鄉之進亦勞賦小山之招恩斯勤斯至矣盡矣恭惟容齋先生元元衆妙休休有容身雖領袖宗門學則淵源吾道小樓明月勝元龍百尺之豪髙枕白雲待丹鳯九重之詔有前人風烈為後學範模如某者與緇黄交能青白眼獨喜子墨名儒行非他人羊質虎皮通家踰三十年責善難一二計兹荷愛烏之及特厪遺鯉之書曲憐覔梨栗之兒直命入芝蘭之室從明復受春秋之業看希夷畫太極之圖熊魚何幸乎兼得犬馬當知其所報道院迎仙書堂隱相増爽氣于西山鄰家乞火曉窓分燈藹餘光于東壁銘心有感筆舌奚殫謝監察御史火公舉茂異啟天朝重耳目之官實居清要風憲擢山林之士非市私恩葢竹頭木屑有可用之時而茅㧞茹連乃必然之理敢因竒遇庸布謝言切念某家本呉中客兹江左以芰荷為衣秋蘭為佩訪鍾山之英草堂之靈作山川司馬壯逰負湖海元龍豪氣自憐骯髒誰問飄零瞻烏蒼柏之間歌鳯古臺之下幸逢􅔕馬蒙試雕蟲叩大小從容之鳴以盡其聲收輪囷離竒之材而斵為器使李白立階前地如毛遂脱囊中錐得之若驚觀者如堵兹葢伏遇某官身居臺閣腹藴詩書凛凛乎動揺山岳之威惓惓乎樂育菁莪之意植公門之桃李蓄相籠之葠苓昔中州草木知名今南國芝蘭俱化三省十道俱聞鐡面之威一日九遷將拜玉音之召風塵一掃霖雨八荒如某者敢不恒念品題益加修省行日用常行之道讀平生未讀之書雖蒲柳之質望秋先零而薑桂之性到老愈辣惴惴焉出門下誓弗忘一瓣之香耿耿者在胸中當自愛千金之帚其諸感佩罔既敷宣代羽士上亷訪僉事啟上士無爭奉先師之明訓監主自盜奈公論之難容故鳴鼔而攻之若同室而鬪者切念某為李老君弟子住焦眞人道塲小小山林設住持之主席區區金帛有交代之成規比因撙節年多致有羡餘日積被前職䑕偷狗竊使空山鶴怨猿驚當市攫金衆所共見匹夫懷璧罪實難逃已嘗赴愬于有司且復諌詞于教所始則强項不屈終乃揺尾乞憐遂以當仁不讓之心聽其用和為貴之説乃償薄産以補亡金未幾背㰱血之盟又復為紾臂之奪用朝三暮四之術專務貪婪逞人一已百之能肆為欺罔楚弓得失秦鏡咨度勞六轡之驅馳亷法亷辨亷善亷能按百官之能否明月靡遺罅隙清風一掃塵埃睠兹寂寞之濵亦在照臨之下豺狼歛跡草木知名激濁揚清既憲綱之振肅舉直錯枉宜公道之昭彰或移北山之文或賜南山之判戒無厭溪壑之欲征悖入府庫之財庻有補于焚修更無煩于訟牒思之弗措辨之弗措願亟持全璧之歸得之若驚失之若驚當永守青氊之物謝崑梅州判舉鄉善啟求儒雅闡大猷漢室之興復見經品題作佳士荆州之識為榮矧蒙下采于菲葑豈作不言之桃李寸丹有感尺素具陳某官佐理神州賢勞王事虛心待物明于滄海之珠美德含輝粹若崑崗之玉有賢守與承流宣化在寮寀則同寅協恭切切斯民惓惓吾道氷霜並潔風月平分南山之判不移北闕之心長戀二千石不如逢掖下士尤勤九萬里直上扶揺前程甚遠吾言非佞輿望所期某久客東呉遠逃兵燹功名蹭蹬昔為上竹之鮎身世飄零今作無枝之鵲偶爾宿贊公土室儼然逮梅仙市門希髙山流水以知音驚明月夜光之投暗説項不輟薦禰有書駕言采泮水之芹何異繼廪人之粟驥千里未甘伏􅇫鳥一嗚或可驚人翺翔道義之林涵咏詩書之澤鄉之善士國之善士尚期自下以升髙知惟春秋罪惟春秋勿謂有名而無實賀陶教授啟鄭廣文才過屈宋坐一氊而司業相憐胡安定教授蘇湖置二齋而太學為法升髙自下振古如兹恭惟某官前軰典刑後學模楷于以傳道授業而解惑信乎温故知新而可為五柳莊前自昔存舊家之菊片玉山下只今樂泮水之芹振木鐸之遺音續杏壇之雅曲先覺覺後聿成陶鑄之功己立立人正賴提撕之力自此升矣式我願兮如某者白首流離青雲蹭蹬遇州倅舉一鄉之善以野夫寘多士之間愧風鷁之退飛喜星鳯之快覩先生富道德致呉興弟子之多才雜説為爬梳正學校諸生之狂簡代上馬都事啟驥伏􅇫負千里之志久倦驅馳鳥在阜作三年之鳴猶能奮躍未趨幕府敢借箸籌某
