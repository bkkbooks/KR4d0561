front:
  text: 龜巢藁卷之七
  hash: sha256:8038a70eb538ef798fedc7001993e78b3b2b594f16bfcfaa409996de8b0b490e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0561_SBCK_007-1a}
body:
  text: 詩龜山祠詩卓彼文靖公蚤立程門雪載道歸東南統緒頼不絶鳳鳴朝陽能幾時朝棲瓊林暮棘枝歳晚江空卜居此毘陵草木增光輝邇来陵谷一再變烟滅灰飛舊書院殘碑斷礎落誰家應作寒碪搗霜練南山北山禅者流鼓鐘雷鳴塔前修儒衣儒冠亦不少孰謂好賢無二周龍鍾老諸生不言忍包羞甘棠樹下吐肝胆愛禮可得存羊否羊存禮亦存所願或可酬渠渠一畝宫依然對滄洲將使邑人知有東家丘駿奔籩豆祠春秋簡曺谷賔公子承蔣公子舟諸良友𢾗嘗折徃昔政和間結交先君子時葉之妙聲音之佳今皆不可得而見矣區折文㑹于九華隠者周先生之家其書札爲後㑹張本云折區追憶故交輙成韵語冩去谷賓吟几清交早結先君子博學自謂無恒師草堂詩史儗欲續蘭亭字書將並馳百年陵谷变更日四海弟兄生死悲舊家文獻埽如電獨愛羲之又有之冬至日方欲以老况自述孫垣来侍傍說江隂陳庠仲袁仲徴二公倡和之娛區區坐馳因用足成此韵詩以代折簡耄矣又逢長至日凄然聊作短謌行一妻一子竟契濶兩耳兩目幾聾盲里中尚結雞豚社江上豈忘鷗鷺盟珍重暨陽雙白璧慎毋輕用昜連城江陽鄭教諭以詩見寄褒美太過且聞時赴京考績因次韵以餞其行大君立極揚威靈麾斤百家尊六經出圖之馬出未巳来儀之鳳来不停萬物皆效華封祝諸將已勒燕然銘化風覃被族麟趾聘物逺来監虎形雄州巨邑並庠序歌臺舞榭舞優伶先生横經虎皮席弟子立雪梅花庭延陵躬耕地井井尼山聖父碑亭亭正逢海内興賢日豈作江隂老客星泮宫芹藻得佳趣隣封草木沾餘馨龜巢一老辱篇翰鱣堂幾時瞻典刑趣裝又欲覲金闕飲餞愧無雙玉瓶淵清氷㓗知者衆㑹有孫邕荐管寕予以小爐閣坐卧安燠名之曰熙熙甕天孫塏到江隂語劉小齊先生蒙篆書四字見其筆力之清勁可喜作詩報之乃翁澹齋先軰能篆隷而文為鄊郡所稱詩中故追羙之昔在金斗城晤言即相違今觀玉箸篆神氣不少衰澹翁心畫傳師承古人誰秦相漢中郎殆欲肩相随舊家冠葢里密迩延陵碑古意師聖筆真􅎓吾何疑正如善相馬而忘牝與驪懐哉楊子雲載酒當問竒奈無縮地術龍鍾空坐馳周節婦陳氏吾甥也早寡頼其母撫恤之㤙為多母卒且以語付託我夫婦携之避兵居吳中十有餘年白首歸里一生艱苦老夫獨㴱知之故書此以紀其畧云哭夫未了又姑嫜獨抱遺孤涕泗滂奩具賣来營葬具不憂飢餓死空房南山石爛海揚塵風雨飄揺笠澤濱嗟嘆渭陽田舎老酸辛同受十三春狼烟未息歲仍飢蛟室相隣地亦危長夜㸃燈機上織明朝換米釜中炊戦骨縱横歸路迷烈塘疑是越来溪良人地下應憐汝不作王凝斷臂妻裙裾藍縷蓍簮折鄊井蕭條草屋卑節孝兩全頭雪白疇能說與史官知臘月十四日風雪極寒大林庵主僧以佛廬落成氷雪堆中作梵宫磨磚布地與金同何當放下南泉斧坐聽松杉萬􅊤風答袁仲徵掺别廿五月昏耄而受㒺于人者多矣詩言此繆餘從可知一笑之餘必䝉警教愛子腹便便逢人問孝先悞傳烏鵲信剛道白雞年鷗社詩千首龜巢藁一編何時重携手相對話䕫蚿悼熊元修徴士落落龜巢翁間間鷗社叟雷陳十年交雲水三江口在昔鷗沙結社時盟鷗之詞我筆之吟風咏月意相得絶似伯牙逢子期朝亦詩暮亦詩詩興動来忘渇飢淞江太湖墨淋漓鶴汀鳬渚生光輝毛髪雖秋霜光風自懐抱不虞白石爛但覺滄洲好一朝陵谷俄变遷我歸耕我延陵田銜冤塞海笑精衛抱怨思家憐杜鵑鷗社叟軟雙脚晏然不受功名縛社鷗尋盟還可樂苐我途路遥来徃難如昨前年訪戴踐重約舟到山隂眼生膜黄庭不冩贈籠鵝蒲萄醱醅㫖且多舡頭送别誦佳句且知步武追隂何音書從此不復得我心孔竅皆茅塞清夜悠悠思故人夢裡依然見顔色客来聞死半年乆倀倀不能將絮酒悲歌為探驪龍手三日悲風動林莾次韵荅陳庠仲見貽二首鳳凰阿閣自新巢鷗鷺滄洲只舊交百里雲山人契濶一簮霜雪髪蕭騷忍看雨溺堦前蟻怕說風掀屋上茅樽酒論心宜有約誰家竹裡借行庖春申港上老人村家有詩書教子孫白首竟能安粟黍丹心豈不合乾坤諸生問字車載酒滿地落花僮埽門且喜年来忘世慮不時盃勺醉昏昏又和袁仲徴陳庠仲去冬所寄之作腐草煜煜螢火生枯梨紛紛山蟻行可憐身病道亦病猶喜目盲心不盲溪山相望𢾗年里松竹歲寒三友盟何當相對文字飲似昔盍簮金斗城次韻荅袁仲徴見寄大江南岸衆山蒼岩谷㴱藏寶劔光江上風波来滚滚山中歲月去堂堂能承書業千金産喜有童孫咫尺長盃酒正湏朝夕醉無勞更覓觧愁方四皓圖天風吹斷紫芝歌四皓幡然出薜蘿不用勒兵呼左袒安劉功比絳侯多飽汝山中紫玉芝姓名誰徹九重知濟時隂有回天力震噐安然不動移瓜隐為崑山邵濟民作藥壺舊懸紅杏林瓜廬今住清江潯南柯太守了無夢東陵故侯同此心灌園自捧漢隂甕抱蔓别作黄臺吟我老坐馳三百里何由縮地重相尋簡袁耕學先生馬鞍山開龜甲屏臯比之席􅊰六經一年不見朶雲字三月又看花雨零角巾小像固垂白埜史巨編方殺青宜有詩筒繼前軰使我晉鄙沾餘薰壽萬拙齋蓬萊水淺鉄舡歸城郭人民半是非且喜春秋今七十能知六十九年非天開夀域大無疆林下幽棲樂且康不湏臾覓長生藥昭代如今化日長芳茂山前種玉田芙蓉湖上採蓮船東隣西舎連花竹渾是桃源一洞天一襟秋水心無競滿靣春風唾自乾可惜時無吳道子畫圖專向邑人看菖蒲花開香滿庭􅉉旌簾斾風泠泠髙堂燕客作生日紅頰紫髯雙眼青今吾故吾知不同朱門無復掛枽弓但將一斛蒲萄酒洗盡平生塊磊胸金作狻猊􅌊寶薫桃笙如水客如雲榴花不用纒頭錦也學吳姬舞絳裙燕雀懽聲新第宅溪山佳景古丹青琵琶自製玲瓏曲弹與龜巢老子聽拙齋之拙意何如天付惺惚本有餘欲識顔曾愚魯地一鞭希驥莫躊躇舊家青氊什襲藏兩兒斑衣長侍傍人生可樂有如此一日可比三千霜昔人謂積憂成隂隂積成雨今隂雨之乆且多竟不知何憂之積以致然也淺陋之詞姑識歲月時乙丑夏五望後九日也常年五月衣輕葛今年裌衣猶未脱一天隂氣凛如秋溪山黯澹烟雲稠有時雲罅曜靈出頃刻珠光暗如漆商羊飛来作人舞羣鳩醉葚渾無語雷聲虺虺雨浪浪一雨十日夜亦滂人家屋壊十八九床頭泥淖生蝌蚪疑是彼蒼媧石裂天河水漏有時竭補天無術正憂心水鄊之田俄陸沉常州地接蘇湖境青苗在田知幾頃農夫惜苗如惜兒苗死一時真可悲全家老稚仰天哭天若垂憐天雨粟不然歲飢方荐瘥里胥催租將奈何贈時義夫生民天降衷所性無不仁物欲肆侵蝕乃􅔄失本真嘉爾鴻鵠姿超然雞鶩羣里有賦蛇毒比屋含悲辛呌閽聲徹天恩波活枯鱗老我無能為喜此聲譽聞願言一簣進將来見嶙峋貽吕雋人生異禽犢秉徳方寸許一本尊所生推恩篤諸父嗟哉淳朴姿片言不輕吐去年赴叔難代服徙役苦槖饘復今年赤脚走風雨紛紛蕭艾中欣然見蘅杜頋予子若孫疇能類於汝宜從竹林遊氣習变齊魯挽徐仲清妙年博極軒岐書晚景晏安閭里居小山叢桂蔚如故大兒一官清有餘落成客散烏衣宅送葬人来白馬車安得並騎箕尾去逍遥八極曵長裾夏五即事貪墨何多禍蔓延刮毛龜背欲成氊千村萬落吹烟斷田舎逃亾犬餓眠寄王尚綗陳子儀諸友起予每憶二三子投老于今九十年自是片雲相隔爾如何尺素亦茫然蝦蟇産灶横山下螃蟹輸􅉭滆浦邊若問龜巢舊風景月餘隣里斷人烟簡無錫華景彰百書不如一見面此語信然胡未然燈花有約半年久桂子已落中秋前東門種瓜抱溪甕西齋爚茗㪺山泉少㳺鄊里樂如此應笑鳶飛瘴海天寄辛彬甫五鳳添修助益箋雙魚書尺竟虚傳桃符忽尔三年換木榻如今両膝穿南國鶯花春宜早東洲雞黍約如前好来同賞元宵月莫返山隂訪戴船和毛伯尚雪中登塔一夜雪㴱三尺許江南江北乆無之躋攀雁塔最髙䖏想像洪荒未判時光動山林揺玉樹氣涵湖海湛瑶池僧坊或儗天花雨田舎皆占隴麥宜黄竹無歌良可喜清河有頌不妨遲八千里外多遭貶十二街中欲訪誰白戦正湏逢敵手長吟聊復觧人頥憑欄細聽風鈴語似亦知音說好詩壽諸葛節婦憶昔梁鴻歌五噫挈家避兵東海涯玉楼有夢上天去孟光無復案齊眉旌旗滿眼愁滿腹抱兒日夜吞聲哭沙湖岸竹似湘江淚痕斑盡依依菉呼天龥地吐丹衷栢舟之誓共姜同枽田变海得歸路庱亭故園榛棘中教兒服勤能構穫青氊舊物兒堪託星冠霞佩蕋珠經萱草堂前樂吾樂春秋六十有八年時人喚作女中仙麻姑送酒作生日雙成獻桃紅且鮮髙堂長夜照明月何異姮娥廣寒闕不勞白兎搗玄霜真修自有長生訣仙家歲月我不知我来為作節婦詩他年烈婦傳中冩千古萬古芳名垂予前詩謂獨孤公檜在陳廟葢圖經所載及余親身見之一日郡人徐孟曾問曰唐刺史為一州之主手植之檜宜擇公𪠘羙地表而出之衆所共瞻何寘諸陳廟之後耶予曰按唐書徳宗朝徙公為是州刺史去梁公毁江南滛祠之日未乆無陳廟也唐衰禮廢淫祠寖興迨五季而禮法大壊叢祠之神類加尊號陳廟或肇於唐末而盛于斯時今廢沼荒園安知非昔日驛亭傳舎乎歴宋而元皆無改作故翁卷之詩有曰托根陳帝廟應不慮樵夫其意不以此木為不幸而反以為幸也可勝嘆哉孟曾然予言遂植檜舊所予亦恐前詩為人口寔因復作是詩獨孤之檜化烏有士庶重栽倚碧潯遺徳一州人眷眷流芳千載樹隂隂霜根盤入龍蛇窟風葉響成鵉鳳吟願若甘棠無剪伐報公疇昔愛民心寄聪上人嘗託補楞伽經脫簡就用索之杕杜之歌落九天石尤風轉送歸船長洲茂苑渾無恙翠竹黄花搃是禅眼孔不教迷土苴耳根常得洗風泉貝多葉上楞伽語脫簡應能為補全題頋師道樓居晴空圖山孱顔雪斕斑飛楼縹緲層巔水晶榱題白玉闌楼居之人應列仙金烏出海飛天上藍田瑶草煖生烟誰家馬上郎意態清且閑既非謫官遇雪阻藍関又非春風得意遊長安摩挲老眼仔細看乃在櫟里先生圖畫間碧桃贈吕城􅄵官應孟㳟猗猗谷中蘭鬱鬱澗􅔄松我愛此二物幽尋庱亭東路逢碧桃花澹然無冶容吾之所笑者羣芳闘青紅夲来天上種有此林下風老况哭子三年孫兩年一孫戎服又西川秋風茅卷藏書屋春雨苔荒負郭田堪笑平居能蠖落誰知末路竟迍邅空林樹折烏巢毁奈爾孤雏失所天雨中期辛彬甫不至兼憶兒子林孫塏等一時口占二絶句雪尋戴逵興不逺雨過蘇端意甚濃若使兩賢生並世浣花溪上我遊從一雨能生五月寒三盃欲釋兩眉攅那知酒入愁腸去化作澘然淚不乾謝饒州周氏甥孫女惠鞵昔領軍一屋之鞋未聞有惠人者今唐伯亨室人製雙鞋遺我于一千八百里之外其愛親之心可謂篤矣然則苟非伯亨之真其室中之人安能遂其心哉區區報章豈忘所自故首其説如此詩曰濯足洮湖寂寞濱寄来雙屨藕絲情何當化作飛鳬去謝汝殷勤念老親贈盧長嬰次農憶昔盧兖州生有古人風病世禮俗壊或與禽犢同遺經授子侄世業今専攻騎箕去不逺象賢躡孤踪平居迭師友砥礪相磨礲東海㕠南金豐城兩神龍含光若暗投天將振儒宗叔孫自綿菆制作成治功潜心對黄卷儼然見周公妙理析秋毫百世開羣蒙追攀大小戴旁叅鄭司農復看書帶草匝地生婁東顯親垂令名永言報而翁寄南宗僧綱太空寥寥雲自浮驕陽蟲蟲金欲流白生一室静如水清坐六月凉于秋陽羡好茶留客共獨孤多檜賦詩否官様文章祖蒲室正湏述作賛皇猷寄一舟禅師葱葱雙樹林井井百丈䂓欽欽響鐘鼓棣棣慎威儀空庭苾蒭草净瓶楊栁枝滿眼皆祖意此身丁盛時熱客不相過清風堪自娛或剪葛藤話竟織駢驪詞陵谷变未乆山水知音希我本六月蝉眎同五緫龜儒墨各有趣支許交忘機眷言獨孤檜曾覓一二詩禅縛想自急詩筒来乃遲南風非不競北山何用移請招木毬子聊作逢埸嬉寄講主法師西傳懐哉乆别廬山逺奈此相望去路賖屡夢丹梯同上塔每留清話竟忘家芭蕉手種繙經葉菡蓞池開結社花三伏不嫌人褦襶一肩扁袒佛袈裟竺書自早探三藏緗帙如今載五車方寸静涵滄海月文章光熖赤城霞尚憐老馬能知道更喜神羊觧觸邪早晚蓉湖秋水碧定期濯足過鷗沙懐詹伯逺蝌蚪殘書補未全齋居一榻坐来穿稻花遶屋白如雪溪水出湖青接天冠葢不来騎馬客鷗鳬長傍釣魚船多時欲問平安信伏日題詩寄竹邊寄贈岳陳齋二首一書曾寄訪行窩百里相望阻滆浦波陽羡溪山無恙否延陵風俗变来多鵂鶹夜集連雲厦荆棘藂生駐馬坡尊酒欲懐千古意中秋蘿屋候經過南山爛石無多在東海揚塵又廿霜竒字盛傳揚子學徳門誰表鄭公鄊秋髙丹桂花纔發閏後黄楊樹必長㑹有龍蛇生大澤流芳竹帛繼先王寄薦福寺源竹淵青門薦福東堂老白首黙誦西方經有時適性倚梅閣無復談禅坐柏庭觧夏欲随雲水散立秋忍聞風葉零老禅心性一如此說項㑹有伽耶鈴寄贈吕城羽士周石泉仙風飄飄天骨竒不皤爾髪黄爾眉兩沉海上銕船渡九折道旁金狄知釀酒松花常留客竹籜裁冠自賦詩不觧腰纒要騎鶴道人應笑俗兒痴索居無聊自七月既望至中秋前九日腹藁得小詩十首不追琢不詮次大率皆眼前事無逺興也然胸芥蔕有消釋未盡者時或見於詞可笑我愛青山爽氣增青山似我骨稜稜半年不踏山前路也學禅居結夏僧一昨病暍思清秋秋来兩旬熱未休堪笑荒唐野人語天公不遣火西流詩腸頗饜木雞肥老齒方便豆粥稀今雨客来如舊雨多情獨有兩烏衣蚊蝇屏跡去何遲烏兎循環度不移一雨夜来良可喜家家水滿飬魚池千里山開翡翠屏三家村里老人星無塵竹徑風還掃徒壁茅齋夜不扄魚自浮沉水自流釣船閑係小溪頭朝来頼有盃中物忘却連年日夜憂阿翁眠食龜頭舎兒子耕耘犢鼻裩記得孝經刋誤本尚能口授教曾孫床頭闘蟻取人憎壁上粘蝸失自懲螢火光殘小兒手誰憐堪作照書燈凉風騷騷草木黄初月皎皎更漏長洛陽有夢忽驚覺鶴唳聲中人斷腸稻花雨外紛如雪桂子風髙香滿天誰信一㕠多病眼餘生重見太平年暨陽沈徳隣氏徙居郡城名燕䖏之室曰咬菜根處昭其儉也龜巢老人謝蘭謂之曰夫人以儉立身惟窮達不移者君子韙之拙詩效顰亦曰偹薑桂之用云士方窮居含糗茹草誰無菜根知味者少睠兹小物大道可儗淡而不厭斯為君子鮭菜自珍龍根自竒我菜之根朝斯夕斯若决濡肉或如囓骨左車有聲宫商彷彿賢相脫粟聖相齕匏頋予何人口腹敢饕吾愛吾廬畦𬞞遶屋盤有餘飱鼎無覆餗窮達百年始終一趋明月清風咬菜根處挽管伯齡先生多才徳與俱崑山之玉滄海珠玉華忽作白雲散珠光竟随清夜徂青青書帶匝里閈纍纍筆塚滿荒蕪雞林客来嘆且泣欲覓好詩還有無憶昔狼烟兩袖黄斷篷飄泊鄭公鄊金龜換酒邀明月玉麈論詩説盛唐百年徃事陵谷变通家交情江海長騎箕先着祖鞭去旦夕吾將與頡頏陳存心先生挽詞代黄仲噐作蒲石軒中山澤癯出門戎馬即長驅欲騎東海金鰲去竟作西風玉樹枯化鶴還家人想像義烏銜土子號呼恨無老扗揮掾筆冩入哀詩比畫圖鵪鶉圖不作巢居與穴居鳶飛魚躍不相於平坡淺草幽閒處宿食飛鳴得自如題清㣲觀并序蘭嘗考庱亭乃孫仲謀射虎之地今為吕城橋名宻迩清㣲是為清㣲勝槩也不揣言耄表而出之并為燕厦之賀云阿䝉之城何代傾玄元閟宫無與京英雄射虎陳迹在咫尺奔牛古堰横鯉魚飛去石盡爛桃花種来蹊自成華陽福地一如此何用山中宰相名懐袁耕學諸故人夢裡忘予兩目盲馬鞍山下訪羣英詩容搃似山容瘦道氣多如海氣清皎皎白駒方屏迹嚶嚶黄鳥未忘情呼兒蚤起題書尺十日新年雪乍晴寄清真觀道士俞一昨吳淞十二詩清真道士獨委蛇梨花春釀適来熟頻遣青衣送酒資寄延福菴主鈯斧單提不蹔停黄花翠竹搃忘形問渠送米盧仝意也愛茶歌有可聽寄僧長老雪峯毬子逢塲戲一笑春風舞袖歸從此晏然門不出忍看沙界有危機寄僧勝上人崑山絶頂立浮屠海濶天髙氣勢孤莫道八風吹不動八風吹動有人扶寄僧善性空玉峯巨邑冠東吳在處金園似給孤手把竺書朝夜讀此心能轉法華無送郁友文之京揚子江頭春二月送客登舟赴天闕男兒生有四方志莫作尋常黯然别憶昔孺子歌滄浪聖尼山聖人曾激揚我𢋫再歌呼索郎子其洗心宜勿忘次韵奉荅瓢齋先生見寄二首齋居一榻坐来穿腹笥羣經老欲眠夢裡亦行端正路醉中常造渾涵天春光荏苒無多日天氣霠霃近禁烟舊雨不来今有約虹光遥望載書船予家經亂離蕭條無六親遥憐竹林院中有白首人髙詞吐白雪逸氣凌青雲楩楠豫章下灌木何足云安知射工弩中厥父子身問疾𢾗徃還先生同五倫奈何日月下覆盆茹艱辛惟天降炎霜清飈洒冠巾一朝禍根㧞戩榖乃荐臻孤鶴還九臯飄然離雞羣吾將問玄機載酒過子雲僧綱賛公和尚以疾得告而歸善權舊隐横山老樵謝蘭效劉賓客竹枝二首為臨别贈維摩床上遣文移治績垂成竟觧龜僧史有如班馬筆絶勝州里去思碑滆浦飛花送客行善卷耆舊出山迎問渠那得真消息摩頂松枝喜鵲聲徐士亷别墅徐善醫棲神山在屋西頭竇有寒泉帶錫流山近杏林烟樹接泉香茶鼎雪花浮蜚英早歲肱三折樂道清時號四休堪笑興来忘潦倒尚能携酒過滄洲寄楊彦澤逢人屡問平安信有子亦如郎罷賢萬石艨艟輸賦足九重閶闔奏名先未論烏鳥能含哺且喜黄楊閲閏年我昔與談忠孝事阿戎詞色兩欣然次韵送秦文仲歸上海溧水先生挽不留故山回首鬱相繆落花飛送九年客行李歸来一葉舟勲業鏡中成白首耆英㑹上冠清流獨憐詩社今寥落無復尋盟集舊鷗次韵寄薦福寺東堂長老坐斷根塵知幾年逢人猶説未生前有時觸背都忘却笑指扶枽尺五天家山不見舊忘年重植紅梅慰目前楼閣大開弹指頃香風應到率陀天莫笑黄楊老閏年枝枝葉葉不如前姓名留在香山社也愛吟詩白樂天横山白龍祠神母何年生白龍曺横墓邉一龍宫蜿蜒靈物塑如在寂寞古井清若空山川每見出雲氣鄊里競傳行雨功府縣官曺走籩豆質我識字田家翁簡沈時敏二首徃予入城府笻枝扶踔踸故舊驚骨立兒童嗤貎寢時子適見蔑為我言責沈心持一寸鉄詞吐五色錦所喜得三益豈料别𢾗稔嗣音竟茫然屏跡疑逺甚近從支遁遊因聞許詢吟家住洛陽橋􅑵含滆湖浸烟波隔紅塵雲樹幕清隂安得忘年交時能邀月飲文章論大雅安適就髙枕人生貴佚樂此樂真絶品其二一昨觀李杜詞場車並馳追踪三百篇齊名盛唐時杜詩多與李李與杜者希當時豈偶然意或有隐㣲復觀杜與李首陳褒美辭其間方庾鮑㣲意若少之樽酒欲細論諒非談笑嬉迄今千載下疇能發玄機區區蠡測海敢告新相知秋髙金氣清桂子香風吹虹光書畫舡雞黍或可期合歡盃勺間評此兩白眉况有古經史相傳更多疑朝聞夕長逝九京含笑歸憂旱吟吾聞東海殺一孝婦三年乾天人感通非浪言又聞長平坑卒四十萬天胡為乎竟舎旃人讀書貴窮理斯理未明堪汗顔朅来一旱月再圓老農多憂良可憐青苗䖝生食欲盡赤地龜坼生炎烟龍祠巫祝环珓擲羽士醮壇鐘磬喧妻孥踏車或抱餒牛犢賣来供社錢盲翁夜来亦不眠追思直從三代前堯湯水旱皆𢾗年必能有以扶顛連當今聖明君咫尺九重天有能哀鳴玉陛前天恩不日彌九川一夫罔令􅗂􅊤填耕田鑿井仍熙然示冡子及孫曹横山中小菟裘某水某丘堪釣遊四世團圞非昜事一窩安樂比前修家庭悪有司晨牝江海憐無結社鷗我子我孫宜克念莫將肝胆作仇讐又自述同示搰搰劬書覬有成區區没世恥無名七情欲斷氣未斷兩目欲盲心未盲白練製裙蠅㸃汚青燈照榻䑕縱横家聲掃地綱常在未許兒曺學倒行祭禰忌日詩投老龍鍾日思親長飬時羣咻憎陋俗四逺擇名師夢有生花筆才非脫頴錐庭幃歸定省翰墨作遊嬉隣舍三元日桃符七字詩柏臺􅔕馬過茅㧞鶚書馳氣色生逢掖光華照扊扅亨衢雖不到大道頗能知􅓺舍分氊坐儒冠廪稍糜中年逢世变濱海避時危骨肉能相保肝腸罔有私尚蒙先子澤不受外人欺栗里歸来廢横山卜築遲頽然窮谷叟援乃落巢兒子愛非姑息孫謀有厥貽牝雞良可悪烏飬本相宜昔怨何三失今逢此百罹雙親應念我鑒此蓼莪悲雲林書舎為徐孟容作東家領軍鞋一屋西家買妓傾珠玉寂寞南州髙士孫燈火小􅑵書夜讀羲皇畫卦龍負圖蝌蚪此時無簡牘神農本草軒岐語為是傳家先爛熟唐虞三代二千載六經聖賢常在目牙籖挿架日益多蔗境漸隹心未足便便腹笥貯琅玕齒頬霏霏吐珠玉鍾期骨冷呼不醒誰復賞音聽此曲青林不着軟紅塵祗許白雲簷下宿雲乎雲乎知不知封胡羯末森如竹白眉之良衆所稱能繩祖武棲幽谷清河有頌泰階平應着先鞭駕黄鵠賀潤天澤住持保寕寺横林之北横山西孤村流水古招題青苔一徑童不掃白雲半間人共棲松枝甘露落麈尾桂子香風吹麝臍我来欲問㸃頭石道價孰與生公齊南宗僧綱和尚唐允明吟友倡和見贈支許乆不作緇林景徳清適見㕠南金褒嘉詎容黙新詩倡且和字字皆悃愊挹此沆瀣秋注兹雲夢臆大道本平平中庭宜殖殖九品蓮花臺毋庸論西域荳腐詩并序凡人年老者以肉食飬之古今一致然而老而無齒則肉林之盛禁臠之供其如朶頥何求其甘軟若荳腐者真可謂飬老之善物也但名不著乎六籍品不列于八珍鍾鼎之家咸藐視之比予過僧舎連得食其佳者嘆賞不足發於詠歌是猶為氷壺先生作傳也博物君子宜蒙品題吾言固無足取重于人庶不為嚇腐䑕于鵷雏者耳誰授淮南玉食方南山種玉選青黄工夫磨轉天機熟查滓囊傾雪汁香軟比牛酥便老齒甜于蜂蜜潤枯腸當年柱史如知味飲乳何湏窈窕娘唐允明以吾孫垣自成都府岩洲衛公差過常鎮等府因得覲省賦詩見貽有情兼悲喜之句可為知我者矣次韵示垣併謝允明𢾗千里外公家事七八月間行李歸揺尾門迎一黄耳傷心客散兩烏衣穿楊自可成勲業擢桂從他赴禮闈多謝故人能警策好鐫肝胆莫相違袁耕學先生以陶詩集句十五首見示心賞不足以辭荅之先生山澤臞逰戯詞翰中生来愛陶詩白首情所鍾集句成大章一氣春渾融纍纍九曲珠螘絲中貫通嗟予目無見擊節歌玲瓏窃比蔡中郎以聲識焦桐即物因有感懐賢仰髙風孤竹首陽餓五栁柴枽窮窮非餓死比方寸將毋同史稱晉徴士直哉考亭翁風俗今改变草木豈亦從黄花朱紫貴青松大夫封邪蒿匝地生指佞草絶踪何當過横山班荆坐孤峯先生口懸河洗我蔕芥胸風帆早乗興我耳猶未聾弔薦福竺淵源公滄海塵生罷逺遊紅梅手植繼前修雲開楼閣人弹指風振􅉉鈴我掉頭十萬里程天竺國一乗車駕雪山牛客来舊日喫茶䖏烟冷爐薰憶趙州寄南京僧綱併寄唐允明雪竹霜葩歲晚時袈裟逢掖徃来嬉著書應笑龜巢老刻畫無塩醜不知詩滿簞飄酒滿船時人喚作地行仙抽絲適有氷蚕繭好為焦桐續斷絃東州觀音堂甃瓦歌七佛之師觀世音十方化身無古今補陀金刹南海現無價寶珠龍女献東州築堂五六春茅茨乃作有漏因珠冠白衣漬泥潦龍王女兒應笑倒豈無圬者善安排不堪空打赤白崖鴛鴦瓦合𢾗千百圓通大士居安宅衆毛聚来成一裘震風凌雨更無憂青銅錢與珍珠粟今生布施来生福松竹梅三詠歲寒松栢冠山林論語垂名照古今韋偃畢宏俱即世傳神頼有草堂吟淇菉猗猗比武公清風本與首陽同六經湮滅秦坑後嘉尔雲礽紀載功吳王醉處十餘里僅得晚唐人一詩不遇西湖林處士暗香踈影有誰知寄習訥二􅊰主南山北山兩浮圖東家西家皆給孤塵世換来風景别上堂鐘鼔似前無寄辛彬甫長短向分三四家聖賢經訓𢾗千年吾伊聲裡工夫熟萬象森羅月滿天寄性空山主次韵住菴家法似南泉鈯斧单提十五年歲晚閉門渾不出忍看霜倒佛池蓮寄吕克明生不封侯向九酒泉筆耕東郭太平年林居適與僧廬近也為招賢種白蓮客来曾得問林泉書帶青青倍昔年且喜時人多未識楚江萍寔華峯蓮次韵自述兩目塵昏淚迸泉春秋虚度伏生年滄江歲晚龜藏六依舊巢居一葉蓮雪水煎茶勝慧泉茶經重著兩三年夜来明月梅花下又擬濓溪説愛蓮感懐生来迂踈從人笑老去盲聾祗自憐紅藥殿春能幾日黄楊厄閏又三年􅉉風􅐈我蛜蝛幔夜月窺人蟣虱氊江夏黄童能扇枕當時太史豈虚傳短歌行東謝莊西謝莊奔牛東北十里強先人痛惜家譜亾能言其畧忘其詳髙曾夲住開封府紹興之先亂離苦随從龍渡江寓兹土以謝名莊似韋杜後来一派分烈塘華屋髙丘乃吾祖季父咸淳中甲科封胡羯末皆簮組宋暦巳矣元暦興竟作遺珠沉合浦吾祖隹城宰木拱家庭玉樹遭斤斧吾伯吾祖吾父兄青塜纍纍續遷祔轉頭滄海又揚塵十年逃歸洪武昏鴉滿樹雀無枝結巢乃在横山塢三子六孫中子殂長孫又隕黔陽簿黄茅嶺畔作哀丘昭穆按圖無牴牾年年寒食春草長横山烈塘連謝莊一盂麥飯一壺酒老淚觸處俱淋浪於乎豺獺猶能效烝嘗何况人為物靈知義方我今諄諄語兩郎爾子爾孫宜勿忘冬至前一日冩懐二首龍鍾去年冬修書辨魚魯吾兒念吾衰勸吾勿自苦吾嘗責吾兒曾讀孝經否聖人教斯民揚名顯父母窮達固有命劬勞何敢負芟夷免圗册于道或小補方誦蓼莪篇安知又初度存順没吾寕全歸兾朝暮其二今年盲且聾狀若霜木槁齒牙脫兩齶涕淚出四竅獨存方寸鉄自謂無價寶異端屡排斥淫祀絶祈禱喋喋非好辨惓惓衛吾道一陽葭欲飛九土荔將出家人忽起早為我作生日沽酒斗八升有菜二十七北風非不寒南􅉉盎如春都却眼前事且漉頭上巾巢居烏返哺拄扶鳩祝噎横山薺瓮氷東洲釣舡月窮鬼莫見笑老夫甚為悦寄語撲燈蛾少頃燈自滅寄朱季明客来曾説問詩臞西郭梅花玉一株朝日尋常照苜蓿春風次第到屠蘇通潮港淺潮田熟捍海城髙海㓂無珍重歲寒門不出催租吏卒競喧呼寄題讀昜齋為辛彬甫作讀盡諸家卜筮書羲經日夜卷還舒𢾗椽茅屋婁江上一樹梅花臘月初童子研硃頻露滴客来買卦或潜虚珠璣咳唾琅玕腹何害家無擔石儲王逹善母挽詞阿母穆穆林下風生兒彷彿晉阿戎起家讀書眼如電閥閲衣冠俱一变三從無違四徳全月旦有評無間然萱花堂上安且吉分甘抱孫長在膝風含夏葛并刀剪雪霑寒笋充厨饌兒能苦學夜不眠不勞母作熊胆丸客来治具兒不乏母勞母剪青絲髪升堂拜母環佩鏘慈顔怡愉春滿堂希年厚福有如此千萬人中能有幾兵餘重見太平時盖棺應喜得全歸諄諄有命提兒耳不以浮屠廢䘮禮素車白馬紛如雪閭里光輝人共説我歌薤露聊云云宜有張林之碑傳後人塗謡新年騎竹走兒童兩月甘棠憇召公大誥奉揚天子命崇文絶與昔賢同閭閻四邑歌謡喜囹圄羣縲剖决空魯泮芹香沾教雨孔壇花暖鼓春風投膠澄水真難事覆簣為山必奏功早晚璽書嘉政績東関劍井氣如虹和王有恒野歩芳草青青路欲迷白頭有客共扶藜吳田半没桃花水辜負春風布穀啼其二雨雨風風一夜春惜花愁殺少年人青山不𬋩人間事也學吳姬翠黛顰和王有恒見贈客来欲與問天翁鳬鶴奚為脛不同一代衣冠更變後五湖風月笑談中脫巾洒酒留知己擊節哦詩和送窮􅑵下小桃嬌欲語錯教童子喚紅紅糟丘作為鮑思文諸公搰搰营莵裘何如將老吾糟丘盃餘齁睡儘落魄堂上肉食從伊優酒泉不作二千石醉鄊宜封萬户侯幕天席地燭明月日與麴生同宴遊攬翠軒昔人車載蒲萄酒區區為覓西凉守山川信美得專城能有幾時權在手何如白駒在空谷四山空翠皆吾有非烟非霧非塵氛鬱鬱葱葱藹林藪兩間清氣相渾融若有人㪺西柄斗繄我南州髙士孫說項求詩半年乆老夫平生愛蕭爽一笑相逢敢多口山靈望子早歸来相伴雲林猿鶴友朝餐青霞夕沆瀣攬翠軒中可兼取何異商山茹芝叟王有恒以詩留别有鶯花落老淚之句予乃效唐人和意而不和韵送其行觧其悲兼簡吳中行心友丈夫不洒離别淚盃酒堪澆磊塊胸勲業連年㕠鬂雪歸舟此日一㠶風身居畎畝宜為樂腹有詩書未是窮寄語雲間吳處士好將安信慰盲翁苕溪獨釣圖吳興山水清且妍苕溪之名天下傳鷗鳬相伴一釣者風雨不歸三板船駱駝橋上人如蟻看花馬去長安市滄浪古調不欲聽笭箵小鮮何足睨溪流入湖清接天鳶飛魚樂兩悠然休寕掛冠歸故里丹青想像玄真子漁童樵子俱不見雨蓑烟笠真乃爾嗟予經鉏老窮􅉉文章書畫愛猶兼兹圖若以文並覘必湏一字酬三縑端午家居州縣似新豊不作偷生折臂翁蒲歜尚能邀客共榴花堪比舞裙紅三年艾老蓬蒿下六日蟾遺坎井中世事古来多可笑陶然且卧北􅑵風窮快活示二子香風嫋嫋花滿林花間鳥有快活吟吾生天與窮快活一鳴可不如春禽憶年十八正月旦薦官舡泊西河岸東隣西舎看桃符適然有喜邀相見時予縗絰淚淋漓鶚書不作令待時丁寕郡守飬寒俊月支學廩供慈闈窮快活從此得鄉黨州里皆喜色啖蔗漸能佳境入看花不上長安道桃李家山春正好馮驩有鋏不曾弹乗車食魚鐘鼓考充閭有子燕雀鳴打門無吏雞犬寕阿婆含笑歸九京遺澤使人呼寕馨塞翁之馬無得失四十年来如一日南山石爛莫奈何移家東海避兵戈蛇無横道虎入窟隱然若有人撝訶入吳首誯三讓廟感古傷今發長嘯三髙祠下斥鴟夷籩豆忍覩吳為沼雲門先生鉄笛老傾葢相知皆絶倒老性尚存薑桂辣不随蒲栁秋風掃玉山玉泉膠漆足顔公智公支許逰墨名儒行一年少宅我闔閭風雨秋中吳偶作鵷雏穴越鳥喧呼来不絶熊袁盧殷吳趙許相伴滄洲弄明月華亭清唳真可聽獨憐士衡呼不醒鱸魚斫鱠新釀羙坐客有無盃不停逃生十年聊自足不知蘇臺有麋鹿大明赫赫照中天東風送我還鄊船昏鴉占盡故林樹老鶴孤飛無宿處東門種瓜官道傍莵裘擇隣遷復遷大兒横山薜蘿屋小兒東洲稊稗田耕枽汲汲飬吾老晨昏定省豈舎旃每逢暑月多晝眠小􅑵看竹風冷然風来扇枕竹罄折使人若見黄童賢窮快活年近百懐㢤古君子鉄靣金榜客知巳宜有報終身竟無策作詩示我子若孫勿言儒冠多悞身讀書萬卷百俺低當時老社乃云云人生苟不識義理馬牛襟裾真可恥銅山餓死黄㡌郎莫信有錢能使鬼吾今兩眼暗如漆尚喜一襟澄似水曾聞聖人言孜孜斃方巳家僮荷􅓩好相随速埋願與劉伶比黄茅嶺畔青松宅松聲為我鳴緑綺更莫用伽陀歩虚汚吾耳寄劉小齋先生延陵季子耕田處太乙老人藜熖明動筆即摛倉頡字著書重草太玄經古苔門巷車無轍脩竹堂堦夏亦清一别𢾗年三舎近斗城猶望聚文星簡張履道代蔣以誠作虚名不托爛柯仙斫雪青山十五年一曲樵歌人未識瑶城江上獨先傳客来東里遇炎霜老却瓊林樹一章頼有麟膠弦可接焦桐流水發鏗鏘雞林近有賈人来不向何楼買襪材坐待春風吹鉄笛筆端還有鉄花開寄宜興教諭人言陽羡溪山好溪山好䖏能多少山無猛獸水無蛟且喜只今逢盛朝竹姑堪入風土記茶歌可比康衢謡黌宫倚長橋髙堂鳴􅊰鼓新除學官教雨滂坐令岩邑成鄒魯老夫一昨覩星鳳别来隔邑遥相望山如研屏空翠􅊜溪作墨池流水香火星西流拂新日蓐收行秋掃餘熱堂堦滿地落槐花衿佩詵詵立黄雪鄊無三害風俗羙賔興名賢天子喜予有一言請試聽丹梯拾級徐徐升地因人勝地必靈邑里草生書帶青鄭康成齊令名思賢録元末為宋先賢邹忠公祠墓而作也洪武壬戌㑹崑山王仲昭語及之慨然有􅍢扳之意後果如其言蘭初意凡遇郡守及府教到任各送一部庶有所觀感而不失其祭掃之禮焉今蘭于垂死之秋追念疇昔乃口占以抒其情故人家住千墩麓為儂版刻思賢録祗縁見説道鄊翁傳道程門能慎獨刻書未了謫炎荒寄聲龜巢事宜速乃將楮幣折青蚨七萬五千錢𢾗足不要譽不求福高義景前修遺風振頽俗惜哉時無鍾子期聽我焦桐弹此曲性存真公以南泉鈯斧入天寕天叢社猶附庸也龜巢老人作歌以送之歌曰吾聞西方教無相無住着單提了無碍羣居亦同樂大林新法幢天寕古道塲屋皆雲半間庭各月一方不縛肚上篾不䑛瓣頭蜜何以飬幻軀自種還自喫踏翻生死海坐斷聞思修獨園銀杏樹應作石㸃頭寄南京僧綱和尚去年同看中秋月東閣開􅑵夜賦詩閣下桂花無恙否秋風又到去年時八月旦辛昜齋書来知耕學袁先生客死秣陵以詩哭之吳門山水隔東雷魚雁依然𢾗徃来秋晚書題霜後橘歲寒詩寄隴頭梅但知抱道貧非病豈料生兒禍有胎嗟我淚從枯眼出秋風遥灑鳳凰臺感物眼昏不見中秋月疑是重隂障碧天眠到夜㴱方自省莎雞鳴我枕頭邉廣寒宫闕吳剛斧桂子天香搃浪傳古意正湏人黙識華峯絶頂藕如船青蝇晝集汚衣巾白鳥雷鳴夜噆人安得天教生處樂百蟲俱蟄四時春秋興七首臺笠朝京天下同楓宸頒賞不論功人才列郡三英粲歲事連年百榖豊春鼓鼕鼕喧社日酒旗獵獵舞秋風螭㘭誰秉春秋筆為祝皇家紀治隆凉飈㣲起早秋初炎宇蝇蚊未盡除厯代興亾聽燕子幾家慈孝學烏雏靣皮寕受人人唾頭髪還教日日梳堪笑六經俱忘却夢中猶讀啓蒙書大暑方徂火始流絺衣遽易木棉裘穹林木落風猶怒破屋茅飛雨未休虎豹九関冠有豸華夷一統佩無牛願言耕鑿終吾老老瓦盆邉擊壤謳疇昔愁聞爛石歌又愁無地避干戈如今喜有河清頌更喜横山得薜蘿旅雁帶人家信至霜楓似我老顔酡紛紛紅紫時為貴老圃黄花变昜多矮􅑵兀坐懶抬頭劔氣依然射斗牛石作丈人渠自拜木稱居士我何求看花儘有長安馬横渡渾無野水舟尊酒欲論今古意叔牙何日過林丘橙搗金虀紫蟹烹客車投轄坐飛觥一時酒興兼詩興半夜風聲雜雨聲人事盡随髙下手世情多作短長檠賣薪童子歸来晚但説街頭酒價平花巢老我六藏龜幸尔餘生際盛時九土方輿歸禹貢三農風物在豳詩蝸粘壁上涎何竭草出山中志不移獨有緇黄畏覊束遷居城郭半攅眉周可大新充粮長千里長江萬斛船飛芻挽粟上青天田家歲晚柴門閉熟讀天朝大誥篇租吏無勞夜打門桃源風景烈塘村好將壤擊歌中意冩作丹青献至尊初度言懐併序昔人以大塊勞我以生佚以老息以死令吾勞且佚者三萬餘息之宜矣天教兩目電無光百物無勞覷短長大塊今朝能息我奚奴便作輓歌郎二周詩併序横山謝老過烈塘而作感今思昔掛一漏萬以元吉可大為周之白眉使先過目轉示族人大意念先世一丘之土望為保障至如吾族之㣲意在言外聞之者亦必有感于斯時洪武二十四年十二月朔日也東西二周烈塘曲世與吾家鼎三足東周阿婆吾女兄西周阿婆吾女叔百年世事一再变遼鶴歸来無處宿蝦䗫之陵依然在烟慘雲悽寒篠緑吾祖汝曹尊外翁𢾗塜纍纍列昭穆年梨雪落清明藐予来作狐猿哭宗周奕葉半憔悴遑蕭條渭陽族東枝只今春意多西枝亦復花如簇有能銜土學義烏無患觸松来野鹿篤親苟不負前言髙義真堪振頽俗莫言古道獨難行天將照汝光明燭示二子自烈塘還横山而作也曾子曰人之將死其言也善吾於此亦云羲皇未造書契先二五渾淪無可甄勲華繼羲立人極三代典禮日星懸人之有生必有死飬生送死埋宜然一從楊墨至𣆀釋異端邪説多乖愆我生頼以讀書力破浪帆我中流船蒼得頭荷􅓩日随我死即埋我横山前毋勞沙門送作佛毋勞羽客送登仙漆燈不必照長夜宰樹不必纒𥿄錢椒漿或酹寒食雨麥飯或洒清明烟謝莊西頭烈塘口髙曾伯禰上留田年来岸谷復变改瓜瓞幸爾猶綿綿㣲如豺獺知報本汝曺慎毋忘所天賀西傳和尚為僧司副綱大鈞巍巍立人極緇流亦湏方寸赤選佛塲中選厥官提挈綱維揮判筆龜巢老人盲且痃刮眼欲覔黄金篦黄河水清一快覩更看缽羅開盛時崑山辛彬甫夏初以人才見上奉㫖還家教諸生讀大誥限以十二月五日師生赴御前試讀如期而徃受賞而歸蘭甚以為喜作是詩賀之白袍鵠立簉鵷行青佩鳬趋被寵光大誥三編建瓴水春風兩袖御爐香賜金堪比燕臺聘抱玉仍歸卞匵藏試看明年書帶草崑山多似鄭公鄊長洲劉衡来云無錫徐伯樞縣丞重過衍慶院有詩題壁予乃次韵留别併寄題膠山幽居各一首朝陽鵉鳳失巢時偶集叢林枳棘枝坐客一氊曾吐酒過橋三笑共哦詩長洲茂苑多年别野水孤舟到處移重掬清流弄明月秋風禅榻鬂絲垂西日長安多看花東膠故丘今種瓜問竒每却人送酒飬老喜有兒當家一襟清氣比肩少七言長詩適興賖暖香不爇古銅鼎雪梅應作老春花送丁敬止携室人奉母徃西流乃翁寓所完聚風雨舟車渉路難爺娘妻子聚團圎七千里外枽蓬老十二時中菽水懽楊栁小詞聊送别蒲萄斗酒莫求官過庭煩説龜巢老新結松蘿亦問安代簡陳子章先生屋山日髙三丈餘盲翁負暄頭不梳客来長揖道傳語宛丘先生今寄書開卷為我一再讀数行報到平安行雞壇㰱血闔閭城三十六年如信宿象賢無人固可吁玉潤之婿亦可娛韓子文章妙天下李漢掇拾無遺珠嗟予經鉏付中子書田未熟身先萎孫枝一剪一飄零戎服西川八千里阿翁倀倀無所之况聞路難多蒺藜閉門縮首如凍龜堕甑不頋人從嗤大兒力田供菽水小兒烝嘗伯為禰此身幸無寒與飢祗欲全歸未能爾每憶梁溪邂逅時買花載酒留人嬉元龍豪氣除未盡傷春猶賦杜鵑詩一别十年今若此此去浮生知有幾車輪從教生四角是非毋勞辨三耳峩峩陽山烟樹緑皎皎白駒在空谷太湖流水清于玉雲影天光常在目焦桐絲斷麟膠續弹我風雩詠歸曲詩筒不時頻徃復要見珠璣咳唾琅玕腹彼此相看如鮑叔和鄒士文與陳子莊㑹飲不談黄老不談僧不憶鱸魚似季鷹行到古人清絶處今人能有幾人曾水獺氊帽代曺元度作蛮溪水獺雪毛氊帽屋蒙戎載渾天濡首墨池頻脫去不妨草聖繼張顛林塘幽為邹士文賦林塘幽在何許梁溪之東五十里宛若浣花流水西頭住滄洲繚繞白鷗沙青山隔斷紅塵路幽棲人似鹿門龎耕耘特欠妻孥助清時固難遇生處聊自樂閭巷絶車馬堦庭可羅雀門前芳草不教鋤爨下焦桐亦髙閣排衙不聞官舍鼓抱関那知兵戍柝催科吏不打吾門知吾家無田負郭穿窬盗不入吾室知吾帑無金可摸烏衣喜得客安居黄耳且無家信悪愛詩愛酒愛親朋此外物情俱澹泊鄊来無鍚山中泉潺潺日夜流青鉛三吳化作百戦地草木血腥人亦然殘山剰水本落寞地因人勝佳名傳老夫獨恨傾葢晚枕書方作邉韶眠清晨曺劌過空谷一鼓撼我龜巢苓時余春秋九十有六年訪人懶上山隂船卧逰賦此林塘篇謝府學教授縣學沈訓導見訪杏壇遺曲三千齡弹與龜巢老子聽頼有青松知曲意掀髯為我舞階庭􅄵橋詩客蹇驢渡同策吟鞭過薜蘿老病送迎門不出楊花飛雪奈寒何别後𢾗日知途中值雨再此謝不能固留鄰家借酒過墻頭楓火新鑚且易裘風雨不留佳客住青山應為老夫羞一氊冷煖忘木榻四月清和宜麥秋珍重沈腰圍革帶先鞭何日上瀛洲詠懐詩奉府縣訓導早年豪氣慕元龍人日窮途作詞宗夢斷春風金騕褭情鍾秋水玉芙蓉春秋魚魯渾多悞河洛圖書豈昜逢四海白頭兄弟少懐哉磵􅔄有青松寄樵海教授老先生洎諸故人室移懸罄三家墅身作爬沙六月蟾生死固知天已定盲聾可奈日相兼桃花笑我頻辞酒燕子嗔人不􅐈簾吳下友朋春夢裡休官多喜似陶潜寄集公詢公二􅊰主吾聞西方教教人無住着枽下一宿去信步恐顛錯嘉爾兩尊者髙風素相若出世扶法幢功成竟忘却掃除煩惱魔洒脱禅律縛不随法華轉亦不觀日落千墩片雲間卧遊當行脚日来崑山縣山靈有佳客欣然為弹指又見此楼閣人皆時乎時吾亦樂其樂老大𢾗年别每憶霞上作含吐海潮音因風寄寥廓寄陳明逺兄弟先世多遺澤清風並絶塵門前馳驛路林下讀書人龍潭靈湫古牛臺佛樹新盲翁飛不去徒憶外家親懐辛至善通江橋下别小海醉中聽玩世頭俱白逢人眼共青溪山三舎隔風雨百花零頼有忘憂物千錢一巨瓶素醍醐楚江萍寔夲烏有童謡浪出詞人口社園菜根非不隹老饕可奈無齒牙世傳淮南荳為腐山僧野人嘗厭飫誰信窮居寂寞濱街頭買来如八珍金莖無露玉無髄眼前蔑物堪為比吾兒捧持供老親乳姑何異唐夫人我非曾晳嗜羊棗樂與曾元同一飽淡而不厭知者誰中庸君子古来稀腐兮腐兮能飬老濟世之功不為小淮南此術昔未傳食貨志中斯闕然前時雍公賛三徳我亦題詩三太息昜名今號素醍醐質諸庖丁昜牙僉曰都次韵荅臧尚廸先生見贈延陵野唱風吹去曲誤誰知頋且聽湖海卧遊春晝靜一簾花雨集中庭生兒喜有凌雲志補屋能牽帶雨蘿春水自流魚自樂笑人濠上說無何又荅毛伯尚白石南山無復爛朱絃流水正堪聽斗城東去柴枽里書屋三間草一庭嘉木天生古橋梓故山月照舊藤蘿壽觥頻捧梨花酒莫問東欄事若何憶昔行憶昔父子生别離濠梁流血人正苦一聲哭斷九廻腸化作瘴烟生阿堵當時見而知者誰西門橋畔栁攅眉從兹失却岩下電欲送孤鴻烟瘴迷天教兒歸飬郎罷一語不聞相慰藉有時摸索案頭書手澤未乾多羽化去年秋初至今日白日青天暗如漆下床寸歩莫能移飲食不分朝與夕蒼天蒼天宜蒙見憐早入鬼籙如令登仙區區有一語請與親朋言生兒可愛儘教愛留取眼光終暮年楊文靖公祠堂詩立雪程門道學傳東南瓜瓞遂綿綿置身方到賢関地隻手將扶杞國天豺虎跳梁非偶爾鳶魚飛躍自悠然常州舊宅今焦土宜有烝嘗似昔年送垣戍蜀屯所七千餘里孫屯田九十六歲翁勉旃人心堅與鉄石比天眼明如日月懸赤甲山川皆勝境黄雲隴畝正豊年漆燈照我青松宅别後全歸日晏然即事簡臧尚廸毛伯尚噫於戯痴翁百拙盲兩眸好古之人念不休睠言文靖祠舊在城東頭枽田為海岸為谷祠亦化作濟河伐楚之焚舟文靖早從伊洛逰伊洛一派東南流時方薦賢㧞其尤遽從天上落常州至今羔墻間儀刑見前修移文宜托北山靈作室祀我東家丘二人同厥心衆毛成此裘冠冕斯文黼黻皇猷光生劍井冲斗牛照人駿奔蘋藻羞鳳兮鳳兮兩悠悠一鳴三千秋昔聞吳興沈東林隠居收書散黄金長洲同姓今好古散金收書同厥心老夫書痴年近百尚欲傍蒐二三策客来説項似楊源又說識韓如李白孫枝璀璨珊瑚樹襟度汪洋雲夢澤區區瓣香客懐去借書𢾗篇謄竹素髙人若問欲何為欲使迷途人快覩天倫道在科斗編朝聞夕死勝登仙譬若丹梯借我升華巔太藕移来鄊井傳飢渇可療疾可痊藕絲織縑顔色鮮孤寒搃得衣褊􅝆客歸為我謝一言隂徳濟人知者天寄呈崑山縣學訓導崑山學舎玉峯前玉氣氤氲暖坐氊絃誦聲中和樂意浴沂童冠莫春天一株銀杏倚齋廬長夏清風喜穆如試問西湖林處士梅花誰與歲寒居鄴架牙籖古典多枽公鉄硯少年磨借書莫笑人痴絶矻矻編蒲老薜蘿屯田歌衣布襦食菑畬服勤犂與鉏三餘渉獵兵農書惜居諸範馳驅秋秋渥洼千里駒時来躡雲衢道旁語盲翁坐南簷炙背日將午兩耳未全聾猶聞道旁語一言賢郡守愛民若慈父一言江隂丞心若秦鏡古鮑老本郎當不覺舞兩袖安得普天下州縣皆樂土人無笑中刀物無射工弩不憂歲年晚不畏氷雪苦春從天上来百草沐膏雨新新堂猗欤隱君子城市山林靜方寸秉彞天有若古秦鏡妍媸照人面肝胆見人病朝朝頻拂拭麈尾犀角柄秋風塵自多不到靈臺境湯盤九字銘宜加日三省椿萱堂將軍大樹從錦纒髙堂椿萱香藹然昔椿夀閲八千歲今萱徳薫三百篇分甘穉孫遶膝下承歡萊子舞堦前雙親之樂有如此虎頭當作畫圖傳上李太守龜山先生之學伊洛傳道鄊先生與比肩熊魚慎獨各有省同在中庸書一篇後来出處固不同晚復同此終餘年當時州人買田宅楊乃宅居鄒贍田百年世变厄兵燹宅為焦土田荒烟府公去春下車日蘭以缺典曾敷宣還家薦欲去專對目盲耳聾身莫前願言一祠尊兩賢巋存若魯靈光然斧工毋勞巧節棁畫史亦勿丹青妍滆湖挹水注纍爵泮池采藻供豆籩風行四邑草必偃績成三考蒲無鞭斯文熾而昌劔井光燭天瑶琴斷絃續金榜三魁懸甘棠遺愛歲百千不湏龜趺石立如峴巔邦人去思肝胆鎸老蚕蚕老不眠食日夜作繭忙繭成上繰車雪色藕絲香垂衣羡黻冕在上供皇王衣被普天下其功寔難量蜘蛛巧如之結網能髙張蠛蠓可欺者羅致日充腸予生勉績學歲閲九十霜為蚕不為蛛賦善頼彼蒼雖無黄絹辞斐然成厥章小則効裨補大以係綱常制度苟無違尺短寸有長願言後之人緒餘毋或忘負暄峩峩芳茂山為山遮朔風南陸日杲杲南簷暖融融盤飱豆粥輭箕踞藳席重追思古羲皇首出開鴻蒙宫居食而衣生民藉軒農勲華教明倫三代禮樂隆尼山集大成斯文萬世宗蘭也幸知此不與禽獸同年紀近百歲心孫猶四通三字四字句經訓授蒙童七言五言詩大音鳴寸衷時無雞窠兒自號龜巢翁負暄樂如此人言少如儂儂亦自知足作詩謝天公代簡髙彦述長安道上人如蟻恬澹齋中香自凝金匱早傳先世業玉樞誰授道家經梅花立雪應含笑麯糵流霞可觧酲莫訝盲翁詩永訣又從追蠡一撞莛懐詹蘿屋烏石岡頭送上船黄楊厄閏又三年烟蘿小隠三家墅霜稻豊收負郭田置酒待賓常撃缶買書教子不論錢盲翁恨不能飛去永别歸来赴九泉和遊大林庵韵石頭𢾗里横山路丹井多年羽士家聖代重開新宇宙禪林乃易舊烟霞沿堦細草龜毛緑䕶竹踈籬象眼斜更有庭前松柏樹潮音也似學楞伽送秦文仲敎諭歸老崑山縣盛代垂新統斯文續斷絃青山漂陽縣白首廣文氊唾視鉛刀鈍心持鉃硯堅蓬麻扶盡直茅茹㧞相連頒印㤙殊重明倫敎欲專諸生皆鼓篋三物屡興賢羙績經三考英聲徹九天晚成真大噐幽谷必命以莵裘老荣于晝錦還黄河淸有日白石爛多年齒徳身兼俻文章世自傳本来天下士且作地行仙鷗社詩盟在鱸魚斫鱠鮮寄聲袁處士雙璧喜俱全龜巢藁卷之七終
