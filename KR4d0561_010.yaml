front:
  text: 龜巢藁卷之十
  hash: sha256:63b6af82d690e23e2d05e6d4a29031ec2ec3b873024463d351b15f96160e4156
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0561_SBCK_010-1a}
body:
  text: 詩贈馬吉卿太尉𥘉開藩府日我卿長揖與談兵快鞭自此宜先著偉器如何竟晚成舊菊𢾗株荒老圃寒流一帶繞孤城草廬只在齊門裡堪笑無人識孔明山人家為路以道作先生自是青雲人歸來故山鉏白雲家徒四壁藤蘿屋頭戴一幅逍遙巾松根茯苓大如斗木柄長鑱常在手賸收市葉教兒書更摘松花釀春酒題詩滿屋酒滿船客來無日不陶然人間豺虎自鬪死雲中雞犬多成仙山人家住山林好日日晏眠無事惱笑他東望玉門關絶域思歸歎年老過牛彥伊寓所對雪口占問訊蛟龍浦來尋鷗鷺盟天風寒屭贔氷雪歲峥嶸平旦徐徐起清樽細細傾獨憐鄊國逺西望苦為情美崑山費知府重修學宮詩昔侯未牧崑山州州置逺移東海頭百年鄊校風雨毁四郊戎馬煙塵秋州仍舊山侯下馬勸農耕桑重儒雅春秋籩豆駿奔走日月宫墻煥圗寫素王清廟衮龍衣博士髙堂鸛雀飛泮池芹藻堪采摘帷林草木生光輝時方擾攘人用武侯為斯文扶砥柱同僚才並青雲器參佐功成修月斧廟前銀杏雙蓋青堂後玉峯開畫屏諸生揖讓秉周禮我侯語言宗六經官清只飲淞江水鱸魚自肥蓴自美齊名常衮與文翁興學之功照青史代道傳招路徴君益上人過西林精舍西林新種梅花樹未有詩人為品題尊酒小窗邀上客杖藜今日過前溪家園小摘金盤菜野徑𥘉乾臘雪泥二老風流堪入畫不妨琴與寉同携贈水西長老中伯庸兼簡承天毅剛中禾城説法兩三年貔虎如林護法筵一片白雲間出岫五湖春水濶連天詩堪輔世方留稿琴乏知音覓絶絃賴爾峩峰堂上老喜留賔客共杯泉雪中懷杜玉泉玉溪兄弟暨管伯齡對雪僧窗憶舊逰浣花溪上草堂幽弟兄愛客情懷好賔主談時氣味投揚楚兩川城近接吳淞一帶水長流興來早晚相尋去解攬漁翁覓釣舟元日同趙君綽早起崑山州烏紗白髮兩遺黎同賦新年第一詩吳下喜頒堯日曆嵩呼重見漢官儀春回南國梅先得律轉東風樹未知試向馬鞍山上望楚氛猶自暗邊陲訪王景逸不遇其婚梁國傳留宿東齋作此簡景逸并允德阿林隨我曵長𥚑宿爾幽人水竹居雲暗一天龍吐水溪喧半夜獺求魚邯鄲枕上新年夢光範門前舊日書欲與兩賢論出處還家相見意何如吳生以趙仲穆所書蘇文忠公逰道場何山詩屬張天英諸人及豫和之溪流行盡穿林麓白塔紅亭照岩谷道場深處看何山僧住山頭我山足兩山雲似海瀰漫飛路百折空中盤我昔幽尋愛僧舍亦欲卜築臨清湍東坡先生不世出咳唾珠璣落禪席可憐前度燹厄兵燹一踣寶塔誰再植永嘉山水汚歌鬟幸無若人來此間坡詩珍重趙侯寫使我見詩如見山我衰不夢周公旦猶夢尋山及春半買花載酒約吳生慎勿渝盟重嗟歎寄楊鐵崖讀君舊日伏闕疏喚起開禧一番愁龍川狀元曽表怪冷山使者忍包羞東江風雨一斗酒大地山河百尺樓白鶴飛來作人語道人赤壁正橫舟次韻楊鐵崖過李樂菴墓胸中萬卷色絲長才出􅊏毫輔舜裳笑脫豸冠辭柏府羞看狐穴倚椒房結菴投老林泉樂易簀遺言翰墨香鐵笛仙翁今表墓婁人當不愧桐鄉次韻寄梅西溪宦情吟思兩如何咫尺婁江不我過吳下土風良不惡春來花雨喜無多三農飽喫田間飯諸將猶揮馬上戈州縣勞人宜莫厭要令𥜗袴有新歌寄贈費伯謙愛爾青年二十餘無心富貴獨耽書楊花雪落滄洲靜艾納煙銷白室虗門外自馳金腰􅒁案頭長對玉蟾蜍别來吟得詩多少好寄江村慰索居簡趙執中溪鳥忘機與結盟鄰雞解語共談經簾前花落胭脂雪樓外山開翡翠屏無事干人腰懶折多情于我眼偏青于今同飲長洲水只隔煙波望德星過悅堂長老看沉香小山適見楊鐵崖所題畫像堂堂之容令人起敬因作此以贈阿師僧中之白眉身長九尺𣆀耳垂金爛袈裟舊御賜鐵笛道人今賦詩貝葉手翻諸般若沉香誰琢小須彌不知門外春深淺花雨繽紛二六時題恆上人清流堂悠悠黃天蕩菀彼祗樹林水流過堂下一帶清且深要之源頭活澄徹無古今山僧作觀想亦以明其心停雲共徘徊遊魚自浮沉三伏不知暑爽氣生緑隂水華晚色淨風栁孤蟬吟嗟哉五濁世干戈如沸􅑄客來且忘言滄洲濯塵襟懷道傳上人海上誰知己僧中有此郎借人三畝宅留我百花莊故里煙塵暗窮居歲月長釜鍾時振乏燈火夜分光書摘金拫誤詩囊夢草香溪山皆杖履花竹共壺觴每念馮唐老能容阮籍狂五年同信宿十口賴歡康辟榖終無術飄蓬又逺方世情多可笑交誼獨難忘南國黃梅雨西林緑樹涼思君重回首湖水隔微茫懷滄海上人床頭不問有金無客到山中酒必沽愛我生來心似鐵逢人為道唾成珠尋梅幾處同舟去對月常時折簡呼别後合塘春水暖栁隂誰與看飛鳬又自述并簡滄海幽居頗喜俗塵無坐看諸公玉盡沽滿地楊花風􅐈雪一池荷葉雨跳珠借書日與兒曹讀鄰酒時令老僕呼山上有山曾有約何時雙履作飛鳬和徐伯樞𥘉還膠山作無錫玄度子昔年歌舞送航船每日登臨對乳泉麥秀故基今雊雉花飛南國又啼鵑官軍尚喋邊城血田舍𥘉生灶突煙只恐歸耘歸未得徴車將到白雲邊次贈韻徐仲剛兄弟難弟難兄思不羣風流絶似太中君對床夜聼山中雨辟世春耕隴上雲四株松樹青隂合一帶溪流野色分老我劍心猶未死尚携長鋏客田文次韻贈慶德謙監州倣佛桃源古洞天幽香兩岸鬪嬋娟煙波鷗作忘機友風桞蟬如脫骨仙田父相過終日醉畦𬞞小摘四時鮮棄官溧水歸來早嬴得間情樂酒邊還珠詞三首寄顧仲瑛并序豫以玉山隱君避地居擕李猶合浦之珠徙而去焉今謝杭州當路于吳而州縣更化猶合浦之有孟嘗也人而珠者可不還乎因作合浦還珠詞寄君以致招要之意其詞曰嗟爾珠生合浦川澤見光輝采珠人似雨孟嘗不來兮珠亦良苦鮫淚竭魚目瞽嗟爾珠去合浦川澤失光輝龍嗔獻珠女孟嘗下車兮魚鱉率舞象罔除吏商阻嗟爾珠還合浦川媚仍含輝潛居水仙府孟嘗愛物兮物無違忤明月出夜光吐代簡錢夢弼六年不見堠山雲愛客情多最憶君社酒每傾鸚鵡盞燕姬屢舞石榴裙漁郎一去仙源隔燕子重來舊宅焚别墅于今鄰錫谷煮茶還許石泉分絶句屈原投江死揚雄投閣生一時生死計千古是非心憂五雜書四首使者乘槎海上來藩臣迎詔府中開半年赤地無纎雨此日青天忽􅎋雷鵷鷺聨班齊喜舞梟鴟脫網莫驚猜征西諸將橐弓矢應受淮夷納欵回其二逺客相過説帝都黃金如玉米如珠內園人歇催花鼓市肆塵生賣酒壚河北功臣稱李郭江南租稅賴蘇湖明朝漕運開船洋去幾日風帆到直沽其三賨布𥘉來價倍髙吳鹽重榷令如毛淡烹蓴菜羔無豉倒看天吳褐有濤風起株林號虎兕天連青海縱鯨鰲長洲茂苑河山好自愧多憂兩目蒿其四緑髮年來忽巳皤尊前不樂復如何直如栁惠猶三黜醒似靈均漫九歌無𢾗烏鴉爭晚樹一雙白鳥皓清波相逢莫厭滄洲靜要路從前覆轍多和徐仲剛歸田二十韻山下室環堵門前桞𢾗株青秧移畎畝白水似陂湖辟丗方躬稼傳家夲業儒十年躋仕路兩浙走危途熟路歸來馬髙林返哺烏煙塵雖未息風月不虛孤松葉燒茶灶花枝挂酒壺拂塵棕麈尾席地草龍鬚烏雀窺窗隙漁樵來坐隅家居聊放適世路甚崎嶇池水魚堪飬庭階草不誅眼前能自足身外更何需病寉開籠放飢猿擲果呼看雲添逸興對月了詩逋田父邀皆去村童醉或扶不嫌鄊俗陋甘學古人迂西堠良田熟東膠小徑紆泉香雲骨髓花瑩雪肌膚犬吠溪雲出牛歸田野晡幽居東近海何必更乘桴寄寧伯讓州倅次仲剛韻籠鶴乘軒笑衛公歸來髙卧北窗風忘機鷗鷺相依久滿眼湖山與畫同洗馬池邊楊桞緑釣魚亭下藕花紅自知大器成須晚不與時人較近功次韻寄斷雲法師嵯峨塔廟壓長橋東望扶桑路不遙聼法龍來雲滿室傳衣人立雪齊腰階前祗樹黃金地石上菖蒲碧玉苗猶記昔年相見日為師吹徹伍員簫和沈啓之席上詠梅絶句把酒花前歌竹枝看花不覺舉杯遲春來結得黃金子還有調羔鼎鼐時弔顧將軍墓并序顧榮字彥先晉散騎常侍驃騎將軍開府儀同三司諡元公其勳業詳見晉史豫嘗慕其為人今客吳門適近其墓在皇天蕩南地方二三里土人直以顧榮墓名之豫因往弔焉白髮吳儂説姓名將軍墓近闔閭城徴車入洛稱三俊割炙知人得再生江月似留揮扇影松風猶作鼓琴聲傍花舟一酹蘋花渚野鶴雙飛躑躅鳴寄徐頥齋先生一昨天恩頻賜帛𢾗年國步政多艱莫嫌旅舍才容膝喜有丹砂可駐顔進乳吳姬香玉暖弄雛萊子綵衣斑故園松菊知誰主又見秋風燕子還九日為客東吳年復年吳霜飛上鬢毛邊青山滿眼暗如霧白雁一聲哀徹天細看茱茰占老健忽聞桃杏作春妍鄰翁將謂花呈瑞邀我題詩展盛筵送陳希玄入道海上蓬萊知有無林泉隹趣即仙都三朝寉繞燒香几九轉龍蟠煮汞爐滿地白雲山館靜隔溪紅樹水村孤𫾣門莫厭相過客要覓丹書古篆符題梅竹水仙圗羅浮美人倚修竹凌波仙子適相逢春風桃李自塵土不涴嵗寒氷雪容代簡倪雲林江水西頭繫客槎漁莊遙望隔鷗沙枕書門掩三竿日題畫毫飛五色霞杯斚椒香仍臘味階庭蘭茁又春華雪晴我欲尋梅去尚待東家借鹿車贈馮縣丞二首野夫東郭帶經鉏田畯相逢為下車百里雷鳴元夕後一犁雨足五更𥘉行庖只飲長洲水署筆頻抄種樹書獨奈賦蛇除未得逢人蹙額問何如其二九土荆榛七八年吳儂挽粟上青天秋風杼軸黃茅屋春雨犁鉏白水田農畝要令無佩犢琴堂正賴佐鳴絃停車為説哦松意立盡斜陽野樹邊題墨竹吾聞雪堂老仙之愛竹到處𫾣門看猗緑為誰寫此秋一枝葉葉風生清可掬恍如坐我此君軒與君相對淡忘言焚蘭金鴨綴鳳髓我思古人欲覯止盧知州宜興秩滿以辟亂久寓無錫視同故鄉今知崑山必有懷二州風物之美贈詩言情并致頌禱我思陽羡茶𥘉生如粟粒州人嵗入貢雷霆未驚蟄天荒地老今幾年春歸又聞啼杜鵑山中靈草化荆棘白蛇何處藏蜿蜒玉川先生一寸鐵欲刳妖蟇救明月丹霄路斷肝腸熱還憶茶甌飲氷雪其二我思惠山泉長流無古今瓶􅎆走千里煮茗清人心向來烈火炎錫谷神焦鬼爛勢莫撲池邊墮石亦灰飛此水冷冷㵼寒玉髙人飲泉五六年一襟清氣清于泉好為吳儂洗煩熱乘風歸報蓬萊仙可笑崑山州奉省府之命例試在學儒人以豫為第三名故有是作可笑秋娘巳白頭也隨年少上秦樓舞腰強作春風栁不及春風栁葉柔顧仲瑛辟地嘉興幾二年聞回崑山往見不遇作詩寄之末章兼簡西白長老細雨清明節扁舟過玉山傳書元有誤飛寫竟無還芳草萋萋碧落花點點斑題名墻外竹黃鳥正間關其二客來常問訊書去半沉浮兩度黃梅雨相思白髮秋樵蘇今短笠山水古長洲寄與天寧老龜巢賦咏不麥秋歌和徐主簿韻太倉陳陳歲仍熟田舍嗷嗷食無粟朝來飯甑新麥炊一穗青煙出茅屋磨旋日月出霄屑湯湧波濤跳碎玉耕簑樵笠壠頭歸急雨森如㵼銀竹妻孥笑語同一飽且免飢雷鳴此腹安知列鼎五侯家日食萬錢猶未足和陸宗魯韻贈夏師魯百斛葡蔔賸有餘一官不換只間居窗含雲氣虞山近門掩秋聲栗樹疏鴻雁去來知幾度雞蟲得失竟何如丈夫髙蓋非無日聊遣間情賦子虛桐鄊送費伯謙之吳郡侍親若翁清約似無官宜爾儒衣不厭寒燈火十年勳業在河山于古畫圗看氷池魚躍供調膳雪屋雞鳴起問安他日過庭煩寄語别來頭白卧江干鉛上人席上作有客有客龜巢翁鬚髯如雪氣如虹權門要路腳不到寧與山僧野老長逰從鉛公喜不縛禪律百榼沽來作生日雪花似亦為人喜庭舞婆娑俄入室酒邊笑殺東家兒檳榔不與劉穆之尋常有客謝無酒有時對酒還攢眉人生能得幾𥘉度且無長繩係烏兔癡兒夢夢真可嗤不識盈虛元有𢾗君不見黃頭郎到頭餓死錢堆傍何如眼前有酒且為樂母令愁結九回腸遣愁二首偶覽青銅鏡方驚白雪髭如何不飲酒猶自苦吟詩靣作鞾紋皺腰間帶孔移獨存方寸鐵剛似少年時其二茅屋瀕湖住蕪菁借地栽一秋常苦雨十月屢聞雷岸草青青出墻花灼灼開掃除蠅蚋迹還有北風來和危太僕參政韻送慶德謙治中驅馳百騎穩如船雨露新承下九天當道故人多汲引大參佳句獨流傳𢾗年華髮風塵裡一點丹心日月邊老驥只今方展足蜚英當不愧前賢留别智隱愚長老蘇昌齡先生淞江太湖春水生湖邊白鷗尋舊盟逺么沽酒壯行色坡老題詩慰别情燕子日長書屋靜落花風揚釣絲輕相過不負青山約一棹夷猶兩日程徐伯樞和韻送行豫復答之主人送客呼麯生膠山卜居仍有盟祶𫀆戀戀感君意去國遲遲知我情教子正須熊膽苦看花應喜馬啼輕老夫把釣扶桑下目送鵬摶九萬程挽雍逸處士孝友人無間詩書子更賢十年遭丗亂三樂得天全處士星今隕虛堂月自圎客來懸榻在老泪為澘然寄謝雙陽沈仲庸并簡同席諸友一林修竹映滄洲百榼蒲萄泛玉舟送客留髠成大醉憐君小阮與同逰舊家燕子飛華屋滿地龍孫著錦裘絶似蘭亭修褉日坐中賔客總風流朱明道等九人和前韻見貽各答一首并自述一首贈朱志道新居風景似麟洲我亦頻來繫客舟山列畫屏朱果熟湖開青鏡錦鱗遊踈狂不厭髙陽侣凋敝應憐季子裘有酒正須開笑口黃河今復見清流贈朱明道光月軒前杜若洲抱琴童子釣魚舟蝸牛有國方交戰鷗鳥忘機且共逰戲綵諸孫頭峙玉瀕湖三頃足菟裘吟餘不接紅塵事洗耳無勞枕碧流贈朱原道楊桞花飛雪滿洲水邊亭子小如舟四時花月供談笑千古湖山可釣逰有客即呼鸚鵡盞無衣還贈鷫鸘裘試聼月旦評鄊里倜儻今為第一流贈趙善長清江濯足坐中洲自喜身如不繫舟槐國功名前日夢玉京孤負少年逰每邀田父同雞黍巳學山人製鹿裘醉後劇談今古事靣如頳玉語如流贈華子強父子晚涼池館藕花洲郎罷呼兒放綵舟老膝尚容文度坐佳賔多與阿戎逰長腰米飯猶珍饌五色萊衣勝綺裘莫笑東家人評語由來涇渭不同流贈盛彥英愛君楓落吳江句有客相期放剡舟滿眼雞蟲從得失忘形鵬鷃共遨逰秋來江上鱸堪鮓嵗晚山中貉可裘如此幽居良不惡比鄰况復有詩流答惠上人鍊得身形癯似鶴江湖杯渡捷于舟湖邊舊宅適歸隱吳下諸山今卧逰學道已知磗作鏡工詩更悟冶為裘曹劉沈謝何零落風月平分支遁流答崔彥麟老夫衰懶慙無學年少才華羡李舟好覓靈槎天上去莫攀仙桂月中逰踞床我欲來吹笛換酒君當為解裘最喜今年秋至早涼生六月火西流自述少年學士俱瀛洲老夫浮家唯葉舟每憐古調少人聼幸得新知如舊逰四海風塵桃竹杖十年霜雪木棉裘邇來同飲太湖水最喜白鷗非俗流簡吳江朱志道昆仲去年長至聼塤箎轉眼今年又此時棣蕚喜存兵後樹梅花早綻雪前枝西山近日無烽火東閣何人共酒巵兒輩北歸今問訊吳音變楚莫相疑盛彥英隱居太湖之隂號具區耕叟命僕作詩以歌詠其樂云脫屣東華塵躬耕太湖濵桑麻接鄰里魚鳥情相親間時讀書牛背上安知六國方攻秦東風三月桃花雨布榖飛來向人語一犁𥘉破隴頭春黃犢去欄健如虎羲農世逺莫可追南山石爛無足悲悲歌寧戚夜半猶未已人間間是非何用汚牛耳我田已耕春晝間樵童隨我看青山日暮歸來一壺酒我歌嗚嗚童拍手兒飯牛一天星月爛不收重捻鐵笛作三弄七十二峯俱點頭臘月臘月無多日行年六十三浮生空自老往事日多慙南國山皆赭東郊草未藍蕭條江郭外雲瞑雪毿毿懷野舟間老長兼簡真夲元大地北風寒且嚴香凝丈室晝垂簾庭前柏樹心相契窗下梅花手可拈出郭鐘聲聞𢾗里穿城塔影見重尖欲求智永千文帖煩説區區寄口占偕徐伯樞訪王孟翼酌酒論詩經宿而别舊雨客來今復來溪堂新築栁新栽風生玉麈談詩律露􅊜金盤把酒杯淮甸三邊烽火息吳山千里畫圗開相如未奏凌雲賦當路誰能薦逸才劍池送曹廣文赴學士院檢討峩峩虎丘山湛湛劍池水水深人莫測草生寒不萎世傳祖龍劍砍斷蒼雲根千古兩絶壁鐵花點苔痕僧厨轉轆轤隂崖落氷雪臨池人有語響答出林樾先生屢幽賞盥濯彈琴鳴木石俱點頭龍魚亦知音今居白玉堂還念青山約羣仙與重逰增輝舊岩穴雨中懷徐草堂兼述杜掾史求詩之意亂紅飛盡緑隂稠風雨涼生四月秋且喜三邊清似水何妨一室小如舟歐虞墨帖時臨寫吳越青山總卧逰肯為杜陵題老桂難兄應作置書郵和浦玉田清明日郊行六絶湖上新堤踏軟沙少年人靣映桃花花村風物渾如舊獨欠青簾賣酒家其二栁絲梟裊拂滄波花雨班班點緑莎寒食清明春又晚人生不樂復如何其三笠澤西頭王墓村桃花水浸竹籬根年年春到清明日兒女郊行栁插門其四一幅春雲巧似裁滆湖飛過碧山來野橋小立題詩處夾竹桃花爛熳開其五四望青山眼欲花山光都是薄雲遮杖藜徐步歸來晚月上東窗恰到家其六每惜春花去後思春來行樂復何辭放舟莫近吳門去諸將樓船正出師夀徐伯樞碧山湖邊銀杏樹𢾗百人家星散住中有南州髙士孫借屋讀書深閉門豈無香醪甜似蜜好客相過方與喫朝來爛醉呼不醒蓬矢桑弓挂虛壁皇天有意生男兒錦繡五藏瓊瑰詞亂紅飛去緑隂靜菖蒲花發當何時贈葛天民吾聞清孝公為君八世祖可憐遭亂離麻鞋走塵土床頭無金何處索堂上雙親頭欲白五星纏度書一編江湖乃作談天客吾嘗閲其書心目俱茫然星辰之髙四萬八千里三百六十五度分周天人生兩間應列宿探索豈易窮幽玄君今自喜得其妙回視筌蹄成一笑萬象森羅方寸中千尺碧潭寒月照髙談往往驚倒人黃金捆載歸飬親鱸魚斫膾羔紫蓴𥚹􅝆五色斑衣新人家生兒孝飬有如此何必鐘鳴鼎食重華茵扁舟過我三江口留宿龜巢看星斗攙搶熒惑總莫論且道酒星無恙否酒星苟無恙酒禁必早開娛爾白髮親酌彼黃金罍我生不願萬户侯亦不願識韓荆州但念太平無事百不憂吾兒賣文君賣術得錢可以沽新篘命吳姫謳若翁與我日日眠糟丘崔宗明掾史請告之錢塘省母將徙居東吳時太尉丞相張公在分省嘉宗明之行贈錢𢾗千緡故詩及之丞相知君念母情金刀錯落贐君行衣冠祖道三江口帷幔歸舟幾日程烏鵲知人先喜信鱸魚入饌試當烹髙堂若問吳門事王國金湯第一城和浦玉田詠物二首嗟爾五月菊黃花發何早平生傲霜枝乃雜半夏草趨炎真強顔久雨竟垂老榴裙炫人眼坤裳為誰好忍負陶淵明秋風舊懷抱其二嗟爾六月蟾爬沙出何遲天生一腹皤且有三足竒乖時人共棄保身自汚池昨午遭磔死同類多可悲月宫老蟇精居髙知不知寄陳子章申屠仲權聼雨聼風半月餘髙齋吟嘯興何如雨添泮水芹芽長風撼帷林杏子踈毛頴功名應立傳杜康交絶豈無書陽春白雪詞皆妙好寄龜巢慰索居賀陳子經赴學士院著作白玉為堂置此身詩書端不負人人花生綵筆絲綸美栁絮宫𫀆雨露新日過八磚趨禁署天開一國用儒紳吳淞江上漁樵客也為謳歌寂寞濵楚南藏主來詢知元明師居義興中山附詩問訊十年不吃陽羡茶山中舊宅知幾家道人今歸卧煙霞石池手種青蓮花青山且喜依然好蛟兮龍兮迹俱掃客有放槎東海頭安書好寄龜巢老感物二首寄圭玉田書記矯矯千里駒英英五花文鹽車太行路汗血亦滿身嗟爾夲龍骨誤隨凡馬羣何當一變化翩翩籋青雲其二樞官降精英為象純玉色誰令耕舜田乃負烏犍軛豈無金羈絡錦帶為爾飾鼻吸酥酪河歸來梵王宅和靈岩虎丘感事二首娃宫無復有樓臺佛剎而今亦草萊衲子盡隨飛錫去將軍曾此駐兵來青山銜日猶前度滄海揚塵復幾回霜落吳天香徑冷斷猿啼月不勝哀其二兵餘重到古禪關無限傷心四望間林下點頭皆炮石門前戰骨似丘山劍池屢變珠光赤盤石猶沾血點斑白髮布衣耆舊在獨憐寧老不生還次韻答因了菴重經喪亂勞相憶多謝將詩問所居鄰有國朝新定律家無屋壁舊藏書月明江上魚龍伏歲晏山林草木踈堪笑出門多滯礙兀如禪衲坐僧廬普􅊰主哀詩六首前代王孫錦繡腸中藏萬卷佛書香一鞭竟著三車去不作修文地下郎自喜年來兩耳聾不聞今古鬪羣雄每逢林下三生石只説尋常萬事空長把吟毫貌水仙梅兄礬弟亦牽聨如今收拾歸何許兜率宫中别有天璚林自有鳳凰枝枳棘叢邊翅偶垂鴟嚇不知緣􅔄事赤霄飛去竟難追茶毗煙斷蛟龍浦舍利珠藏窣堵陂從此不沽陶令酒藕絲零落奈秋何天台一曲繼天泉獨抱瑶琴三十年古調不隨陵谷變麟膠誰續斷頭絃寄孫彥民讀君吳儂詞如讀舂陵篇惜哉未作郡手拍元子肩玄髮亦已華鉃硯亦已穿秋蘭抱幽馨竒寶橫道邊請以白雪曲載理朱絲絃勿論聼者希我心自怡然題水仙山礬梅花圗二首綽約誰家女子依稀水府仙人莫怪無言脈脈正須頻喚真真紅杏碧桃春暖梅兄礬弟氷清會得生花筆意隱然金石詩聲己酉元日漫興四國山河喜奠安一年時序又更端酴酥春酒到手暖楊桞曉風吹靣寒太史始行新律曆齊民俱易古衣冠故鄊只在停雲外可奈親朋欲會難簡曹仲鉉東海歸來塵自揚一竿西日釣滄浪洲人尚説家聲在沙鳥皆知世慮忘竹笋滿林冬入饌梅花繞屋夜生香吾兒學稼書仍讀應喜分燈過短墻送贈題日夲吾聞帶方東南有國環滄溟龜峯雲接扶桑青紅梅花開作絳雪隹實亦比蟠桃頳珊瑚出水光奪目老蚌吐珠皆夜明山藏水産足珍怪惟人尤得鍾其英釋門龍象獻寶出眉目秀異風骨清錫飛一萬四千里欲以佛法中華鳴首探天目獅子窟酷肖厥祖天人驚三吳百粵小盤礴王公下榻爭趨迎大哉禪月古藂社正法眼藏轟雷霆思親要織睦州屨春風穩送歸帆輕老夫扶􅉵走相餞事有干請煩留情往來爾國逺秦火六籍不隨埃燼零願言傳寫遺全璧一洗魚魯開羣盲上人名亦垂不朽能使舶䑲為馬馱吾經張伯祥自濠州惠詩且相傳有還家之喜即事口占聊抒情愫春風濠上來家奴寄詩親朋及老夫微詞周折出肺腑蟻絲九曲穿遺珠神龜脫網曽有夢靈鵲報喜寧虛孤大鈞播物各生遂忍使鳳凰長在笯羣兒覓竹跨為馬吳淞江上迎歸艫南堂花竹春正好玉芝燦若珊瑚株老夫亦作軟腳局典衣沽酒黃公罏賀陳思忠自濠州歸南山石爛海揚塵播物依然出大鈞坡老暫為儋耳客謫仙豈作夜郎人歸舟帆卷桃花雨家宴杯傾竹葉春雪髮巢翁臞似寉也隨鷗鷺去相親水村歌二首為趙鵬南賦我愛水村好為作水村歌君家水村二百載閭里向來冠蓋多銅駝巷陌自荆棘滄洲依然皆煙波墻花巷桞接葭菼蘆藡蘋蓼茭蒲荷澱湖噴薄東岸曲陳湖繚繞西丘阿前看震澤後笠澤青山𢾗點堆青螺錦溪橋頭魚米市亦有朝鼓鳴如鼉市聲豈不傾人耳先生閉戶雀可羅筆床茶灶漁童釣蓑人稱陸魯望自比張志和兩賢尚友作三隱過也亦宜呼小坡長安道上人擾擾奈爾水村安樂窩其二我愛水村好作歌仍和之水村之樂能自得水村之號真相宜齋居隱几白日靜門外係船青栁垂讀書窗雞亦解語忘機沙鳥皆相知葑田種秫足為酒草亭對竹長哦詩平生自是愛結客載酒門前來問竒清談間揮玉塵拂髙會醉傾金屈巵飲牛有渚畜魚有池老夫願卜鄰矮屋與隔籬分燈紡績兒女共曵杖往來鄰舍嬉從此水村作土著與君説詩時解頥次韻答許君善小徑紆回草欲迷村居如在瀼東西為煎新茗頻𫾣火自掃殘花恐汚泥白首十年吳下客傷心千古越來溪羣賢何日能相顧重為湖山一品題次韻答焦任道誰越誰秦自瘠肥别來十載電光飛尚看書帖題青李未掌絲綸對紫薇老我襟懷寒古井憐君氣宇盎春暉石川古栁清隂好且繫書船莫賦歸次任道韻贈朱公路贊府清濁無論渭與涇請看流水悟浮生莫憂白石南山爛且喜黃梅細雨晴石几題詩焚艾衲水亭酣酒卧桃笙瓜田不理春來草怕有人呼作邵平謝焦任道惠畫焦君青雲器不減阮仲容飲酒五六斗卓然猶祖風髯龍吐醉墨逸氣超鴻濛騷雅靡不作無聲詩更工淋漓練裙幅遺我龜巢翁翁老如兒癡耆詩羊棗同層崖飛瀑泉撫玩意不窮何以報夫君秋江待芙蓉答馬公振見寄三首燭龍銜日火雲迷飛到中天不肯西安得天瓢㵼涼雨仍看地裂輔春泥兵戈不到王官谷煙樹相望罨畫溪莫笑老夫多古意露筋祠廟要君題其二經鉏𥘉不效常林安我貧居未死心江上小山堪入畫門前新桞未成隂斷遍重緝忘年老險韻孤吟到夜深毒熱甚于中宿酒我頭連日為岑岑其三賴有酒船堪拍浮何憂蓬鬢不禁秋卜鄰老圃今瓜及借榻僧窗喜竹幽老大正當秋近熱微風可奈晚來休能騎欵假來相顧惟爾同鄊馬少遊次韻寄野舟長老舊雨别來陵谷變新秋又見火流西黃楊樹厄重經閏白藕花開不染泥千古長洲連茂苑一湖香水似曺溪支郎愛馬情還在念我鹽車月老題橘隱軒為鄒仲謙作愛爾林居物色幽茅齋橘樹對滄洲添修太史木奴傳合比列仙松子逰氷雪杯香蘇井水霜風簾捲洞庭秋小山藂桂遙相似只恐招賢總未休龜巢藁卷之十終
