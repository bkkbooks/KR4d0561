front:
  text: 龜巢藁卷之五
  hash: sha256:ad375fefe382a42e875861a8f971c887fe5b768bb71efc01ed42c81f35a08db0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0561_SBCK_005-1a}
body:
  text: 詩贈邵濟民曲塘地仙居洗藥溪水香青衣兩童子玉杵搗玄霜玄霜搗來奉髙堂老親食之夀而康天生便便貯書腹金匱石函書爛熟東南海上多名石石中采藥騎青鹿歸來濯足婁江水對坐青山隱烏几囊探藥物不論錢但欲使人無病耳有時彈琴鳶鳳音有時拔筆長短吟紛紛䑛痔吮癰者從教别屋堆黃金聞雲門張先生以慈烏軒焦尾居名文集賦二詩以贈慈烏曲九韵慈烏乳衆雛雛大羽翼成翩翩出巢飛啞啞繞林鳴得食不自飽歸以飼所生紛然同類中有此骨肉情余昔飬親日瞻烏常自懲白首重相見愛之雙眼青匪謂得所止丈人屋峥嶸為時梟獍多見烏如閔曽王孫金彈丸慎勿令畏驚焦桐曲九韵焦桐製孤琴舉世稱異材往非蔡中郎竟作㸑下灰七絃繫朱絲徽金軫瓊瑶知音適相遇携上髙髙臺一彈金陵散絶響有餘哀筝琶沸新聲瓦釡亦雷鳴天機妙循環復見泰宇開爾桐朱鳳吟靈風揚九垓吾今洗吾耳盤石坐莓苔芝秀軒詩一首猗與名門夙稱五常遙遙耳孫厥德復昌於粲爾子文藻有光如彼朱草曄曄其英自天降祥奕葉流芳匪曰三秀仙人之糧林􅊤爾居奇芬逺揚雍公之扁金薤琳琅於昭彼蒼福善孔彰俾爾耆艾家有餘慶維來維仍永言弗忘結茅東郭歲晚言懷八首行盡難行路歸來父母邦溪山閒杖履花竹小軒􅑵教子知一二抱孫成兩雙有時城府去深愧鹿門龎其二齷齪龜巢老蕭條鶴髮秋過眉桃竹杖方領木棉裘𥙷世慚無術通家憶舊逰幸然雙白鳥能與共滄洲其三净掃蕭齊地書床一舊氊談經雞亦解迎客犬常先流水柴門外橫山甕牖前春秋垂八十食粥了餘年其四季子躬耕地寥寥禮讓風度遼歸老鶴遵渚集飛鴻土姓多相雜鄉音舊不同獨憐東郭外劍井氣如虹其五官塘人似蟻環堵室如蝸白髮三千丈清貧第一家地爐寒撥火雪水夜煎茶好客知誰至青燈結細花其六過客應相笑巢翁未得間酒經方𥙷注詩稿又重删藜杖家家竹藍輿處處山𢾗朝天色冷髙卧掩柴關其七故國歸來晚孤城草木寒親朋皆鬼籙鄉里少儒冠寫琰金鍾失沉沙鐵㦸殘譙門斜照裡時為一辛酸其八臘月無多日春風又一年儘添頭上雪聊適瓮中天彩筆題氷柱青衣送酒船晚來賓客散清興更悠然和陳二令逰善權洞我昔陽羡逰春山聼茶歌别來三十載重逰竟蹉跎憑髙每望碧湖外羣峯玉立青嵯峨善權山水最佳處我公去知清興多來時風景溢吾目不用登臨勞吾足有聲之畫勝丹青曲盡物情人嘆服天開地闢羲皇前神工為誰開洞天爾來一萬八千歲金堂玉室居羣仙飛車鵉寉久不見春去秋來只鴻雁青山前度汚狼烟從此四郊荆棘遍洞前玉氣金㳽漫仙家應作瑶池觀層巔巨石勢欲墮過者為之心膽寒翩翩石燕粘翠壁飛來若與人相識馬如龍車如水尋常貴逰無足𢾗以分清致似名緇一代風流繼支許樂哉山水三日逰忘却世間千種愁昔人名句題玉柱今公健筆留銀鈎寄言武陵人桃源兹可求丹沙多與鍾乳雜瑶草不知蒲桞秋長橋無饞蛟南山無猛虎在處可觀逰政須人好古漓墨鉛碑篆亦奇絶似岐山石為鼓竹姑子年年春山僧煮玉邀嘗新哦松暇日肯同去作詩更為山傳神鄉飲酒詩十四韵皇帝即位之五年歲在壬子詔天下行鄊飲酒禮明年癸丑正月上日常州府太守孫公率僚屬行之儀物品節不約不侈省部主事宋公實在賔位僎介耆客凡二十七人執事者位之其登升揖讓盥洗獻酢靡不如矩時某七十有七亦得以布衣厠諸賢士大夫之列蓋有不勝其喜幸者率爾口占以紀盛集云一統乾坤大羣生雨露新君王能建極風俗易還淳鄉飲稽蒼籙天書降紫宸諸侯遵令典嘉宴展良辰黌舍簮纓集珍羞爼豆陳主賔儀秩秩介僎色津津椒頌三陽日芹香泮水春工歌聲律古揚觶獻酬頻聖澤沾羣品仁風播八垠賜䀯無足比置宴豈能倫老我溝中斷諸公席上珍叨陪聆讀法喜獲坐連茵引領瞻西日傾心拱北辰知恩無以報三祝效封人謝董明府惠炭范叔寒多正不禁烏薪重惠比烏金賖來脫粟忙煮飯留得焦桐好製琴環堵一龕春盎盎麗譙三鼓夜沉沉硯池雲起龍香暖寫我梅花鐵石心雨中懷秦主簿東門之東西市西人家屋頭竹雞啼新年十日九風雨二老幾時堪杖藜懷儲教授鎬京春宴醉簮花步出都門駕小車七里八岡山店夜一氊風雨宿誰家次韵言懷八首親朋淪落盡故國似他邦矮柱龜頭舍踈􅎉蚌殼􅣘鵲聲簷外喜鵉影鏡中雙兒女俱婚嫁逃禪笑老龎其二江海飄零客烟塵二十秋逝將諸犬子㱕老此莵裘夜雪圍爐坐春風秉燭逰樵漁時共醉何異宴瀛洲其三老我龜藏六無毛可作氊裁詩間未得强酒醉當先茅宇城闉外梅花臘日前幸逢賢郡守鄊飲禮髙年其四短日經南陸嚴寒鼓朔風遍懷知己友長覔寄書鴻世態今如此人心古不同青天如可問飛步躡長虹其五風冷柴門間齊居縮如蝸小橋平陸里識字老農家野飯常留客春醪頗勝茶早梅溪上折斜插膽瓶花其六貧居家事少客去跛奚間茅屋牽蘿𥙷蘭階擇草删雪添南浦水雲暗北􅑵山孰謂寒如許雞鳴客度關其七自分馮唐老誰憐范叔寒婆娑鳩在杖蕭散鶡為冠夢筆才華减談經喘息殘昨來初度日淚落酒杯酸其八神仙無足信何藥可延年素行多違俗丹心不愧天座有談笑客門泊往來船吟雪誰相似襄陽孟浩然送秦宜仲主簿之京丈夫不灑離别淚杯酒聊發玲瓏歌黃楊閏餘歲已久紅杏日邉春正多子瞻手携鐵拄杖太白足上金鑾坡鳳臺佳境必重賦千萬寄詩來薜蘿送主上人兵後尋叔歸臨江侍養十八韵青年未焚紫羅囊竹林之逰鵷鳳翔一旦身為苾芻草半間屋住菩提場安知兵甲滿天地遂令叔侄成參商桑田既變家亦毁蒲屨欲織親俱亡某丘某水總淪沒曰祖曰禰誰蒸嘗象龍駕法力雖猛豺獺報本情難忘崎嶇行腳求從父殷勤稽首祈空王護身符出虎牢險忍辱鎧染狼烟黃長洲茂苑久爭戰殘山剩水方凄凉相逢不覺開口笑此喜自得安心方行人嗟嘆擁長道畫鷁送將歸故鄉孤雲飛處是玉笥把茅蓋頭猶錦堂蒲羞可助潢潦薦木瓢共飲曺溪香愚觀諸公發歌咏力為吾道扶綱常惜哉僧中有此郎疇能為爾加冠裳於乎疇能為爾加冠裳次韵袁仲徵見寄併自述二首城隂山作讀書堆書畫船從海上回春水泮池芹小摘秋風老圃菊重栽明時正用凌雲筆清夜還傾酬月杯百里相忘兩相憶詩筒好寄便鴻來才華减盡姓名低賴有綸竿釣碧溪衰鬢幾經蓬綴雪關心一點絮沾泥江山有助詩頻賦朋舊相過酒共携金斗城東二三里道傍茅舍似雞栖借韵寄蔣以忠江上羣山翠作堆江雲與客共低回黃楊閏後餘無厄丹桂天髙孰為栽飽喫河豚肥似乳醉看江水小如杯延陵祠墓春申巷我亦拿舟訪古來借韵寄劉小齊白練裙輕帽屋低緑隂庭戶瞰清溪詞章落筆如翻水篆籀藏鋒若印泥一昨論交心共許幾重飛夢手重携絶憐鳳穴生雛好已向朝陽碧樹栖謝許克敬六月惠炭去年臘月人凍死我亦中夜眠不起家僮赤腳令采樵日暮歸來墮雙指德哉故人憐我貧于今暑月遺烏薪藥爐喜得文武火茶鐺爛煮搶旗春禦寒有偹心膽壯故態盡除寒乞相山空歲晚雪復來平地不妨深一丈烏薪熱成霞熖紅藜床坐我龜巢翁灰中芋栗薦村酒凍梨面作桃花容齊奴㸑蠟自奢侈野人炙背無足比融融之樂度殘年重賦新詩謝知己病中䝉董知縣陳縣丞尹主簿枉顧且有白粲瓜酒之惠既而病愈賦此以謝鳬舄飛來野老家同僚先後佩飛霞共憐敗絮多生蝨為問疑杯或飲蛇月俸分將官廪粟朋樽兼餉早秋瓜相如四壁光生彩試握霜毫答寵嘉常郡泮宫詩猗昔廟學悉燬于兵我侯作之聿觀厥成巍巍素王羣賢􅌂如侯殿侯廡豆籩于所師生有廬􅊰道在堂飲社讀法有程有章我侯戾止若網而綱嘉乃進修戒毋怠荒宫墻匪髙丹堊非侈道㳽六合聖有遺軌侯揚天休嘉惠士子儒風還淳庶見麟趾武邑新學詩邑有孔廟棟橈欲墮舊亦有學􅊜漏且庳唯邑長二撤而新之清廟奕奕門廡階墀聖賢明靈陟降在兹黌宇言言齊有書詩師友􅊰貫朝斯夕斯射則有圃書或臨池帷林杏壇古音朱絃顧諟廟學治化之基帝澤育莪比迹蒼姬絃歌武城異世同規雜詩積隂當玄冬生生已機息陽孳僅毫髮梅花獨先得若人玩化機于此已深識攀條摘玉蕊吟玩意莫測誰復見天心所慮羣隂逼閉門夫何如君子政惕夕㷀㷀保飬間由兹見天德山雲忽低徊四郊分白兩老農荷鉏歸播榖桑間語相勸一何勤一鳴再三俯老翁感禽意豈憚東作苦嘉榖已涵活尚待明日煦小兒未解事大兒逺服賈農器已可敶鋤耰在梁梠入室唯老妻出汲撫􅑥甒凛秋氣忽微徂暑已云􅉨黃花異凡木所植本因壤稜稜青霜間誰復見俯仰肅殺一氣中鋭氣出其上强梁固可人傲德毋日長志士想丘􅊤老驥厭道長歸來已低徊但覺青山好至樂在天倫不必事華藻交歡能幾何及今已衰老至老無修行善類日以踈生知愧古人晏安夫何如羣處不念德草草復離居春逰有餘興雜花滿郊墟網罟不能操空羡淵中魚青陽既開動草木方敷榮積雪忽如此豈不害含生大化無停機生生寧有已人心偶自徂豈不害天理援琴一鼓之坐致粗穢除吾分一天地積隂夫何如二月二日漫興東風吹散社公雨紅白花開爛錦雲時俗喜逢迎富日老夫羞作送窮文夾衣試著寒猶怯拄杖歸來酒半醺為問驛橋楊栁樹送人多少去從軍送安上人歸馬跡山插竹山中偶出逰折蘆濠上即歸休踞床獅子聲方吼踣鐵龍駒迹尚留花雨六時紛似雪松風五月冷于秋客來認得南泉斧七十二峯應點頭禱雨三首黃梅落盡雨愆期太守憂農日皺眉滂沛一朝隨五馬四更三點謁叢祠乞雨歸來雨滿天朝衣兩䄂帶香烟緑蓑青笠人如畫多稼亭中看力田一寸丹衷徹彼蒼不勞方士篆符章田家雨足豐年瑞官舍風清化日長寄京口俞伯鎮兼簡江教授飛雲妙墨來前日聼雨髙軒憶妙年杜曲桑麻幾家在韋賢父子一經傳杖藜欲去尋黃寉裹茗相携看杜鵑竹樹樓臺江揔宅想應新築大江邉夀董明府臨汝佳山水鍾英賦厥初身為百里宰腹有五車書見客無官况休衙只獨居夀眉揚喜色瓜代拜新除次韵答性天之長老道人踞猊床眼明如趙州每言西來意爰及東家丘白首林泉交清風江海秋法幢扶未起法鼓鳴未休本來無住著聊爾小淹留鹿眠荒苑內烏啼古城頭大道自坦夷高堂豈伊憂他山石可礪直木枝有樛巴蛇或吞象鼷鼠能食牛賴有佛目明洞見鬼窟幽萬語歸一點坐斷聞思修病中即事二首何物青蠅滓玉壺掣韝飢鶻攫鵷雛病軀痛作雷鳴腹垢靣愁添雪滿鬚欹枕卧看殘菊在下床呼取短笻扶客來與說塞翁馬笑指蒼天慰老夫天方老我心如鐵誰謂讒人口鑠金覆轍始知行路險移家此去入山深瓶無儲粟還沽酒㸑有焦桐莫製琴且喜日來聾兩耳從教蚯蚓作龍吟九月朔䝉周彥美詹伯逺蘇性可携酒肴過城東草廬時余往潞城田舍次日賦此以謝老夫一棹尋醫去佳客三人載酒過破屋茅飛烏豈好衡門木落雀堪羅交情自古陳雷少世態如今鬼蜮多醉帽簮花開口笑尚須秋曉過西河示子憶年二九歲之吉朝賁闖門􅔕馬匹柏府遄歸鶚書出烏雛戀母情所鍾斂翮不附髙飛鴻屢閲星霜怨樹風帶經犁鉏賫壯志欲邇青雲竟顛躓羞與腐草枯木比東家借燈夜繼日著書泚我潜夫筆𢾗載兀如僧縛律書成兩鬢秋蓬飛出門復遇鍾子期麟膠為續焦桐絲旁觀方笑鮎上竹吳下風塵驚滿目焦隍夢成俄失鹿蒼姬訖籙寶鼎移血流四海誅鯨鯢小魚漏網亦幾希全家幸爾㱕鄉土欲學龎公逺城府骨肉邅逢射弓弩卧痾兩月悟前非白生虛室春熙熙茹荼味亦甘如飴朝來起坐沐且櫛炙背茅簷抱雙膝七十八年聊紀述懷吳中行老我平生頗閲人唯公知已絶無倫别來夢裡常論舊只說間中莫厭貧湖海氣豪心似鐵庭幃親老鬢如銀遙憐歲晚家居好魚躍氷池入饌新寄熊元修佳兒發軔之官去名父居間味道腴詩卷賸添兵後作酒杯常為客來沽江湖結社鷗盟冷遼海還鄉寉夢孤烟水相望逺相憶寒雲欲畫雪糢糊寄武城知縣趙朋南雙舄鳬飛下赤墀一行鴻舉撫羣黎昔賢過化絃歌地今代重興禮樂時春雨桑麻如杜曲秋風禾稼即豳詩檗餐氷飲持三尺製錦功成聖主知寄盧公武兼問殷孝伯安信憶言雨别去途難喜得雲歸舊谷盤郡乘手揮狐史筆齊居頭戴鹿皮冠草生林館皆書帶竹老溪園可釣竿獨念咸陽殷博士有無黃耳報平安送殷孝伯教諭之咸陽逺逰自是男兒志特立正當强仕年衣上密縫慈母線擔頭輕朿廣文氊春秋三傳繼絶學畢郢諸生得盛傳老我也須飛夢去振衣同陟華山顛護國寺對雨去年梅熟雨蹉跎豈意今年苦雨多偶食僧廬苔作脯忍聞田舍麥生蛾山禽滑滑啼雙樹簷溜浪浪注九河往事莫論魚腹恨近來平地亦風波和林韵黃梅落盡天猶雨白日晚來風更寒老去甚慚詩興少病餘猶喜酒腸寬舟中自古有敵國李下從今莫整冠蒲屋𥿄􅑵明似雪政須僵卧似袁安送性天之長老兼簡初士元大方崖兩禪伯方坐天寧古道場遽辭雲水别河梁蕭蕭木落山中雨去去孤篷滆上霜白雪調髙人寡和黃花秋晚自餘香南能北秀煩相問為覔安心第一方徙居橫山口號四首為愛橫山山水清山前築室小溪縈老夫枕石看雲卧兒輩求田候雨耕古井寒泉龍有宅孤村夜月大無聲草年兩眼風塵暗猶喜如今見太平三農閭伍共烟霞𢾗口清貧第一家瓦釡煮麋燒槲葉布裘添絮著蘆花交逰總覺鄉情好吟眺偏宜野景賖不見髙人王八百浪傳仙井委丹沙清夢尋常繞薜蘿白頭今日此婆娑􅑵含風露秋容净簾􅐈林霏爽氣多浮世百年生處樂青山幾度醉時歌莫愁猛獸藏林樾郡有劉昆必渡河山北山南地盡耕人家祗缺讀書聲丹楓似我衰顔醉黃寉如仙瘦骨清吳越喜逢連歲稔朱陳多續舊姻盟客來莫厭貧留宿新種梅花好月明次韵答袁子英見寄萬國風塵百戰餘一襟氷雪五車書朝廷未賜延年杖鄉里聊乘下澤車鐵網珊瑚遺渤海玉峯鸂鶒異伊閭長門直賦千金貴詎信相如筆久虛上臺官經鉏子為屯田去罄室翁㱕擔石無八十衰顔頭戴白一雙昏眼淚含珠鵲寒空繞無枝樹烏餒徒生返哺雛匍匐哀鳴臺閣下尚期甘雨活焦枯挽謝天民二首細栁營中玉一株狂飈吹折莫春初杜鵑繞樹啼紅血知爾思歸恨有餘三十青年氣食牛貂蟬未得出兜鍪故園芳草春如海誰謂王孫不復逰題鄧九淵縣丞白雲親舍圖若人自是青雲器方爾浮雲如展驥白雲親舍作畫圖寓我思親未歸意螺山隱隱雲央央吾家宛在山之陽西天十里水天碧北堂五月松花凉堂上慈親夀觴舉堂下諸孫緑衣舞賴伊黃耳解傳書道我赤心方報主主恩方報報親恩望兒無勞親倚門直待平反㱕報喜却到青山白雲裡和宜興鄧縣丞出郭二首離墨山前芳草草多馬啼曽此幾經過囤碑文字無人識風雨銷殘近若何民有歌謡吏不譁村莊兒女簇如花深山處處茶烟暖小市家家酒斾斜楊栁隂中頻駐馬杜䳌聲裡亦忘家祗緣報國心殊􅋀更喜流年歲未華金牛臺送長史仲野清明雨晴花正開折花送客金牛臺金牛遺跡不復見但見塵埃野馬去復來臺前鶴溪貫洮滆瀕湖緑野平如席臺後羣山倚大江齊梁故里迷榛棘登髙望逺散離憂超然如見崑崙丘為問堰頭楊桞樹頗常見有此客否五年參贊二千石飲氷食檗持三尺簿書肯棨遊刃餘白雪詞髙人共惜樓船泝流出京口閘官放水蛟鱓吼青苔絶壁為留題名與此臺俱不朽贈眼醫張嘉甫重瞳天子真天人擇醫乃得天麒麟金篦不刮眼中瞙家有異藥能通神璇霄沆瀣和玄霜洗滌靈臺烟火熱刀圭微入阿堵中風卷浮雲出明月天顔咫尺頻為喜白金紫騮恩甚侈豈無太史載册書繼美倉公上池水老夫一目雲糢糊扶􅉵逺來煩掃除京華道上鬼椰榆爾詩將比蛇銜珠贈周實翁髭鬢如㦸氣如虹芳茂山前矍鑠翁可惜一雙青白眼看雲孤卧北􅑵風兒子木䝉釋屯種而㱕詩以志喜老烏失孤雛噭號鵉臺前鵉鳴徹九關德澤降自天鐵籠放雛㱕渴飲劍井泉井泉非不甘飲之不下咽念我老病烏肺肝烟火然返哺知幾時骨肉且生全牖戶尚綢繆羽衣復翩􅝆衆烏喜聲集卉木同春妍援筆紀離合執徐洪武年吳中行惠方竹杖往有方竹杖化龍㱕混􅉭吾知龍之靈知吾力尚强今年八十餘舉足勢欲僵一目眇𢾗月白日如昏黃出門多棘榛况復畏虎狼感君扶持意以杖逺寄將稜稜七尺觚材拔宛種良孤根斬鐵石老節凌風霜此叟性惡圎為爾重激昂氣類喜相得顛危賴能防秋風黃葉村春雨烏石岡掛我沽酒錢時與逰醉鄉赤藤含赧色青藜失輝光覩物思故人晤言未渠央即事二首方竹過眉杖單紗墊角巾室中無長物林下一間人北牖青山近南風朱夏凉草𬞞留客飯木榻似僧房余之死欲速埋素志也今偶得小丘于橫山之陽竁而甓之余他日蓋棺埋可速矣倚我長鑱歌以自適枯蟬蛻殼欲化老蠶作繭自纒一笑不拘風水六藏姑待天年阮孚著屐未了劉伶荷鍤長隨便作松根糞土也勝兵前肉籬次韵陳庠仲見寄老去衡茅寒到骨兒能負米慰愁顔峽舟風打前時覆塞馬天教此日還氷雪冷冷龍井水烟霞隱隱鹿門山芙蓉池上鷗波濶殊勝雕籠鎖白鷴贈陳谷禪老匝地叢林瓦礫場法幢扶起破天荒木魚呼粥餔禪侣𬞞筍香來八九霜選佛場開金碧溪雲蘿烟樹一塵無客來㑹得安心法莫向江邉更折蘆布金人比獨園多金色山林作𥙷陀童子畫沙成佛去蹄涔豈足擬鯨波庭前柏樹解通禪洞裡桃花小更妍愧我梁園詞賦客鬢絲風裊煮茶烟送孫太守奔喪㱕濟南大江之南烟水秋滆湖船送孫常州甘棠遺愛召伯去黃揚閏餘丁母憂五年組綬忽衰絰四郊𥜗袴多歌謳兒童騎竹忍相送父老杖藜爭欲留孤雲宛在長白外清濟如㵼銀潢流北堂萱草秋寂寂西風落木寒颼颼堂前稽顙獻蘋藻隴頭灑淚沾松楸誓言永佩阿弥訓酒戒不受旁人咻蜚英久矣徹斧扆欒棘暫爾棲林丘頴川太守已台鼎碧山學士皆瀛洲政須大木成巨室豈容野水橫孤舟君親俱報志願足几杖却㱕封素侯送源無竭回金山龍遊堂前師子床坐分風月今幾霜千金一壺有妙用三吳百越聊逢場黃花􅓹􅓹秋雨爛白雲悠悠江水長重摩松頂作受記毋令黛色參穹蒼復愁茅茨𢾗家黃葉村霏雨一月溪水渾慈鴉種麥日未暝猛虎下山人閉門江隂陳漢廣為北平府指麾使司知事隨例免官黃金臺上古賢士竹帛垂名丗稱美碧油幢下今幕賔風雲際遇與同倫清氷玉壺炯胸臆鐵箸爐灰妙籌畫殷勤報國傾寸丹雪花如席不知寒扶搖方展雲鵬翼翩然退飛隨六鷁且喜髙堂慰老親母勞黃耳寄書頻澄江如練山如掃金菊蓉芙秋正好人生三樂古難全熊魚得兼真自天塤箎迭奏夀觴舉綵衣𥚹􅝆膝前舞富貴故鄉朱買臣風流鑑湖賀季真一經已勝千金産况有牙籖三萬間應笑龜巢鶴髮翁小兒只作識字農脫身顛崖猶自喜殫力犁鉏供菽水尚期東壁借餘光讀我兔園書滿箱重逰虎丘寺不謁閭丘謁虎丘幅巾藜杖興悠悠飄蕭白髮三千丈來往青山八十秋寶地近曽為戰壘劍池今復屬僧流老松知我題詩意也學生公石點頭過吳門二千年外興亡事試為吳儂問老天西子矉眉真可醜東門抉目竟何愆荒臺走鹿岩花笑殘膾成魚野史傳買得緑尊堪晚酌且將湖水煮湖鮮次韵答姜天定二首白首㱕來山澤癯山行依舊不須扶十年兵革遺黎少幾處沙場戰骨枯懶去效顰隨醜婦安知起躄到浮圖求詩雖厭雞林賈猶勝門前吏索租詩筒寄自清秋晚書印封來白絹斜一子幸能㱕負米雙瞳可奈翳生花居貧不病知原憲弔古能文愛李華何日細論今古事荒村獨樹老夫家送任叔正㱕上海猗與子任子唾珠腹琅玕一登龍虎榜即著獬豸冠陛辭蒙主恩家居奉親􅌚行囊負祿米㱕佩納幽蘭秋月釣龍江春雲耕鳳山藥室費長房木榻管幼安逍遙烏皮几神仙紫金丹為時療民瘼于親駐童顔葵心抱忠赤萊衣舞珊斑棲遲雲林下放浪湖海間訪舊過滆浦尋幽出吳關退鷁翅方斂盟鷗心共間樂㦲壺中天虛白泰宇寬送董經厯奔喪㱕太原清風蓮幕諸侯客白雪麻衣喪母還扇枕未能償素志倚門無復見慈顔四千里外迢迢路一片雲邉莽莽山只恐鶴書催入覲又隨鵷鷺造朝班西宿丁堰贈江隂王主簿五月六月凉如秋昨夕今夕雨不休屋山雷撼黑風起漕渠水溢黃河流河濵之陶萬家聚誰其董之暨陽簿羔墻祗見烏曺磚飲氷食檗忘情苦老兵擊析天未明隔水又聞搏埴聲扁舟興盡不往見惡詩聊寫來時情夏五之初偕江隂張希尹等過鄒忠公墓即事口占以寓感慨併用郡守張侯弔墓之行青山門外羊腸路走謁道鄉夫子墓向來滄海桑田變翁仲飄零竟何處麗牲之碑高十尺頽若銅駝卧荆棘牧童𫾣火未足悲正恐瓜分搗衣石使君五馬來何時摩挲細看黃絹辭五丁一呼為扶起隴頭草木皆光輝余方與客酬清沽白寉飛來作人語使君應表鄭公鄉專美那容孔文舉代簡張希尹余生寡諧俗老去得知己晤言固已晚莫逆良可喜聫翩諸侯客寂寞著書事夜分青藜火晝並烏皮几幾回論班馬一笑觀亥豕烟雲揮灑外風月吟嘯裡酣蚶杯酌流霞獸爐熱沉水佳哉水調詞清我塵俗耳朱絃聼者希白雪和能幾别來懷合簮夢見承倒屣帷林大江邉瓢巷橫山趾秋風落梧葉甘雨熟菰米相望不三舍相過堪一葦詩筒繼元白通家猶孔李况于阿戎談亦與諸任齒尚友古之人厥德薰晋鄙雨中懷任義甫十日秋霖未肯晴石尤風作虎嘷聲東門父老應相問何事龎公也入城蚶杯溝南老仙出杯孔竒酌言詢之杯從何來匪兕而觥匪玉而巵不雕不鎪不覆不欹謂為蚌耶鷸胡弗持謂為蛤耶奚爵而為測海之蠡其殆庶幾老仙笑言子宜背窺瓦壟之文微蚶而誰水族之秀實生天池昔逢羽人觀乃朵頥麯蘖為糧華陽同㱕轉客我者丑年于兹如李白氏杯鸚杓鷀釃風酬月朝斯夕斯走亦何幸𢾗從宴娭百憂俱忘是用作詩次韵管伯齡見寄三首笠澤臞儒比列仙菊潭秋水解延年每懷逺送江頭别喜得安書雁足傳赤米白鹽瀕海地香橙紫蟹早霜天客來賸說幽居好日日題詩思湧泉滄洲舊隱宅江東白首忘機似海翁金菊晚開香淡淡玉山孤立勢崇崇通家子弟連年别愛客情懷往日同歲晚欲尋安道去扁舟當邇落潮風郇公五朵雲天風送來前憐我落巢兒覆盆重見天三復誦佳句一如飲甘泉金篦刮吾眼華津生我咽重念謝公險毛骨仍凛然金鑠雖被毁璧㱕猶幸全兩鬢雪飄蕭雙𬒮風翩􅝆寒蛩語音喜秋花笑容妍答詩報君知今年勝前年贈刋字闞士淵憶昔趙文敏公之寫天下碑鐫字獨稱茅紹之紹之之妙在何許八法靡有秋毫遺嗟哉文敏不同世抱藝如茅誰品第斬蛟橋下溪水清鐵筆淬來鋒甚鋭篆隸真行章草書銀鈎鐵畫寫璠璵天然筋骨見顔栁假手𥙷戈真是虞文章太守眼如電語重兼金𢾗稱羡青年正可為時出山居聼泉何足戀羣公將勒燕然銘中郎要令傳石經老夫為伊雙眼青鐵筆于今錚有聲寄盧公武舍人投老鶴溪垂釣緡遙憐鳳池掌絲綸鞾霜待漏朝㑹早墨雲染翰詞頭新石麟自是天上物金薤散作人間春尚須鼓吹振六籍蹴踏班馬追楊荀送同知升遷安慶郡太守郡守坐分金斗月朝鞾金滿玉階霜一襟耿耿留遺愛五馬霏霏𬒳寵光官詔叠承恩渥重御屏新録姓名香可憐八十龜巢老尚欲攀轅立道旁送史宗儒歸省親北風狼號霰撤粟洮湖白浪高于屋逰子扁舟歸省親行囊賸有新珠玉舟行到家除夕前髙堂守歲開長筵斑衣捧酒為親夀河清復見升平年相門出相今非昔文采風流還籍籍一賦可值千百金貧似相如永岑寂窮居我亦四壁空吾兒經鉏走西東煩將此意問若翁名教之樂將毋同寄金華府尹經厯方伯方宣化賔僚喜得人幕中勞贊畫胸次有經綸劇邑征輸夥清朝紀律新轍魚須救涸尺蠖正求伸月湛雙溪水風生七邑春簿書雖雜遝矩矱自持循耿耿存虛室昭昭對大鈞宦成防小怠德立豈無鄰逺别長相憶前言敢重陳菲葑如可采薑桂有餘香白首龍鍾老滄洲寂寞濵歸鴻書可寄千里見忞忞送田副使父憂歸若人自是青雲器九萬扶搖尚垂翅髙秋沆瀣生碧霄搏入詩脾作清氣頻年坐此塵土場􅊏埃不滓芙蓉裳豪吟接迹李太白栁金梨雪揚芬芳詩成落筆蚊蛇走多入雞林賈人手今朝送入毗陵城折盡西門道傍桞東風雨晴花錦香京華到時春正長上林一枝栖鳳凰鳳兮鳳兮鳴朝陽送張常州奉㫖入覲白髮田舍翁清曉何跚跚送侯入朝覲扳轅吐衷丹去年榖半熟藜藿度寒歲春來理農務豈憚稼穡難采薪供陶冶四境空榛菅執柯涉重湖荆南研青山非無犁鉏具靡暇畎畝間烏曺事未已緑野多荒間願侯念氷兢為民徹天關樵斧容暫息農畝力可殫民歌岐麥秀侯策五馬還古今兩張堪並載青史看送王啓東御史丁憂起復赴京君親恩重生當報忠孝情移義與俱冠豸威名傳舊日攀龍寵渥拜新除玉階雲集來儀鳳錫谷人稱返哺烏折盡驛橋飛絮栁親朋相送喜何如送陶孝思赴召夙學多才思崇文際盛時鶚書騰日下鵬奮出天池發軔青雲路承恩白玉墀泥塗龜曵久阿閣鳳巢宜繩凖持三尺絲毫畏四知佩韋遵古訓介石蹈良規比德雲暉草同誠向日葵往哉行所學動必慎其儀器作璠璵美文成黼黻竒遺芳流汗竹無負故人期張知府命子送祖考墓碑還鄉名門父子傳一經儼如韋腎有玄成從親宦逰飬親志念祖喜䝉封贈榮潜德幽光恐磨滅伐石南山鐫墓碣宋公文章踵韓栁史公清書追禇薛龜趺螭首重摩挲舟車載去勝槖馳四千里外薄炎海佳城埋玉山嵯峩墓前翁仲看石立靣帶烟霞含喜色九原精魂斯焜煌百世雲礽益輝赫八月九月秋風清彩衣𥚹􅝆趨鯉庭說親細說鄉里情老夫亦來下堂聼和賈教授還鄉試看一簣可為山千里程途跬步間取印正須金斗大還家未入玉門關泮芹過雨香堪摘壇杏無風意共間我欲中秋聼琴去扁舟􅋈棹後河灣寄賈教授相期詣鄒墳祭掃題詩郡圃景鄒亭澆酒林莊下馬陵白草西風秋莽莽青山北郭路登登柱頭且看誰為寉驥尾何慚我附蠅坐待秋凉行有日老夫扶􅉵策烏藤道鄉祠堂詩送張縣丞道鄊祠前松柏蒼清氣凛然知幾霜伏蒲一疏吐肝膽汗竹千古傳芬芳此去長安日月近且喜高秋風雨凉立朝願學子鄒子他年便作知恩堂題許别駕雪山圗南山雲起連北山樂天賦詩心共間東山月出照赤壁子瞻倚歌情甚適今公畫圗誦雪峯託興應與雲月同瓊林玉樹絶􅊏滓蓬婆城外山相似羣丘角立白龍堆飢寒喜無桃與哀蹇驢滑澾山前去絶似灞橋人覔句公餘展卷岩電流襟懷化作氷壺秋楊家氷山無足倚何如坐對兹山隱烏几同友人祭鄒墓各賦詩一首先生高冢麟麒卧令子峩冠豸鹿威汚玉青蠅除穢跡銜書紫鳳賜恩輝八千里外甘泉竭三百年來世澤微㵼我一杯寒澗緑卧碑扶起立斜暉送楊通判知蘇州府延陵父老攀轅别吳郡兒童跨竹迎功覆斯民推德厚秩遷藩府重恩榮五湖秋水清堪比三讓遺風俗易成遙望虎丘山下月餘光還可到柴荆寄張熙載問疾溝南隱者敦同姓每說相知見肺肝名似項斯詩句好腰如沈約帶圍寬一江雪浪潮平岸十日秋霖雨作寒珍重齊居足怡晚玉枝無竹汗平安和賈教授詠懷兩䄂西風獨倚樓一天秋色斷虹收水村霜落紅于染山市烟嵐翠𣣔流眼􅔄看來興廢事胸中消盡古今愁莫嫌苜蓿盤無味喜有葡蔔酒可篘重九次韵石潭無菊比南陽老我三千白髮長九日正須多買酒一錢何必用看囊自憐身健茱茰紫更喜盤餘苜蓿香早起東􅑵挂吟笏坐看紅日上扶桑又和寄秦宜中高堂燕客似高陽醉筆題詩興味長戀戀多情舊紗帽滔滔無􅔄老書囊銀瓶茰酒􅘑船滿玉杵橙虀蟹斗香應笑陶潜空抱菊西風繞屋呌枯桑贈辛林甫有客有客雙眼青婁江山水鍾其英十年足不出户庭手披韋編不暫停案頭照盡書囊螢先天後天見日星百家喧囂無足聆九師亦以蠡測溟蓍策之妙窮杳冥語人吉凶影隨形滿庭書帶生香馨一簾秋色風冷冷去年抱琴來野亭古操為我作氷伶我方采樵如負苓相與劇談洗心經呼吸沆瀣食楚萍一掃世味氊與腥有時醉我蘆花汀客來買卦呼不醒惜哉孤鳳五色翎翩褼何日儀虞廷鳳兮鳳兮請試聼黃河水清三千齡龜巢藁卷之五終
