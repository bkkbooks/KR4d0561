front:
  text: 龜巢藁序毗陵謝先生昔避地吳淞之上余適目燕至吳豫友涿郡劉子南氏嘗道先生姓名學行之懿豫願見而未暇焉後十年識先生之仲子林于崑山則先生已歸隱于毗陵矣又十年婁東袁子英氏以先生年八十邀余賦為先生壽繼又告曰先生之門人王著集先生之詩鐫諸梓徴余文叙卷端子辭以未識先生又未嘗閲先生之詩集何敢率爾從命且何能贊一辭于其間㦲豫言又豈足為先生軒輕哉然子南既稱先生于前子英復頌先生于後况嘗與先生之子林連床纍日觀其從容詩禮秀拔儒林則先生之言行可知已傳曰不知其人視其友不知其父視其子又奚必識先生之靣誦先生之詩哉嘗聞先生之為人耿介尚節義與世寡合其為詩也非有關于風化者不為非有得于性情之正者不能也惜先生不少試其才于時肥遁終身焉先生有辨惑四卷行于世皆發先儒所未發其于後學豈小𥙷哉豫姑述所聞者知此先生名應芳字子蘭號龜巢云時洪武十二年歲已未七月既望前浙江儒學副提舉豐城始豐山人余詮叙龜巢藁序文章與時高下昔人有是言也有能處憂患顛沛之中不為外物之所搖奪形于言辭無戚迫憤悶之病有異于昔人之言者惟君子為能之吾于子蘭先生之文見之矣先生蚤有後譽嘗為李晋仲俞用中諸公所知生平重然諾勇于敢為紬繹經史作為文章咸有根柢與人論辨舋舋不少休在鄉里時請𣸪鄒忠公墓寓吳中又請作顧元公廟世俗怵乎異端而說先生因取經傳之言作辨惑編以警之其襟度磊落識見雅正實為士林所推重洪武十年冬先生之子林以郡府所舉至京師先生以書諗熊曰蘭有舊作學子王著欲板刻之乃為類叙以從其請子其序之庶不為醬蒙矣曩先生避兵時雖漂搖逆旅中所至人欽其德望延致恐後巢室松江之傍講授之餘以詩酒自娛熊托交十五六年一時倡和若楊維楨亷夫倪瓉元鎮顧瑛仲英俯仰之間淪兹泉壤先生年踰八十歸隱橫山實為後進之所景慕其所著述有不期于傳而自傳者矣吾友中書舍人閩人張至道評先生之詩雅正純潔法度整嚴可與傅與厲相伯仲識者以為名言熊竊觀先生養之厚氣之充言行卓卓如此蓋喜聞而樂道之者因以冠之萹端先生姓謝氏自號龜巢老人故名其集為龜巢文藁云范陽盧熊序龜巢藁𥙷遺目録
