body:
  text: 歲除前一夕寓姑蘇與友人卞于珍守歲遣興和許君善韵老病已酉夏四月東維子來訪以其過崑山詩見示且邀豫及盧公武殷孝章和之崑山辛彬甫元夕前旅次岑寂作詩懷之救弊祭胡子明文龜巢藁𥙷遺歲除前一夕寓姑蘇與友人卞于珍守歲姑蘇城外小湖邉寂寞僧房借榻眠詩藁寫成丁邜集曆頭檢盡甲辰年中原喋血人爭地南國啼飢水拍天起坐夜深如守歲屋山風雪打寒氊遣興和許君善韵馬圖莫怪出河遲丗事方如理亂絲蓮葉有巢龜已老竹花無實鳳仍飢籬邉艇子供垂釣林下樵童許著棋苜蓿一􅐻三丈日老妻晨起案齊眉老病乾坤如許大老病此江濱無酒可留客青山應笑人幅巾方竹杖青草落花茵賣得長門賦相如未是貧已酉夏四月東維子來訪以其過崑山詩見示且邀豫及盧公武殷孝章和之酒濕宫𫀆逸興多鐡龍吟嘯舞蛟鼉一江星月光搖動八極風雲氣蕩摩詩史屢書新甲子草廬還是舊烟蘿繫船秦柱山前栁邀我吳趨和郢歌崑山辛彬甫元夕前旅次岑寂作詩懷之魯魚一洗版圗編徑著麻鞋送上天七里八岡風雨夜誰家燈火對愁眠救弊世俗以浮圖治喪以先正斥之蓋欲行古喪禮終事親之孝而厚風俗也比年以來或者吝于財而薄于親者泛然以文公家禮藉口喪禮不行佛事不作視骨肉至親之死如塗人然棺壙之外餘皆無之不孝不慈傷風敗俗至如俗禮以飲食待執紼之人亦斳而不為親戚非之鄉里譏之有愧乎設無礙齊者多矣嘗觀佛事之作雖非正道亦倣佛古今祭祀之儀然香點燭猶鬱鬯庭燎之用也疏文陳白猶祝辭也齊厨供饌猶籩豆簠簋也楮錢楮幣猶玄纁圭璧也葬之日以幡幢代銘旌以鼓鈸導輀車亦皆敬吾親而送之也然則鄊俗之人喪禮既不䏻行而䏻為此者亦可以寓孝慈之心表哀戚之意也嗚呼今薄俗一毛不拔二者俱廢吾恐轉相倣效習以成風將胥為獍之屬是故不得已而言佛事之用如前所云𥘉非舍正道崇異端而忘古先聖賢之名教也吾家子孫當先警省知言君子冝以情恕洪武二十年秋七月龜巢老人言祭胡子明文于乎逸翁生長越杭以醫䆠逰臺閣蜚英晚罹世變戈㦸搶攘挈家海壖晦迹韜光子未識公結交令郎抵斥妖妄氣節激昂既見叔夜穆如春陽時方艱虞紛然虎狼誨言諄諄戒慎周防吾其服膺如龜六藏歲時往來雞黍范張公年已髙神氣益昌髮黟顔童飲可百觴興致酣適庭視八荒詞多滑稽歌或慨慷以公逹觀物纍俱忘蓋亦有子動合義方福善自天家有餘慶婁涉畏途竟為康莊豫嘗比之珠玉琳琅父執遇我我惡敢當所貴相知心腹腎腸公視吾兒剪拂揄揚將玉其成取寸之長通家之好幾二十霜洪武已酉我歸于常贈言孔嘉且貽篚筐心親迹疏烟水相望前年莫秋過公豁堂三宿不寐情話連床延致畫史為貌不揚復命其子拏舟送將别來兩秋懷思弗忘𥘉冬病餘孤卧若僵寄書言懷并書數行歲聿云暮嗣音渺茫雪洲之報乃謂公亡淞隂石川悲風白楊命林往奠老淚其滂
