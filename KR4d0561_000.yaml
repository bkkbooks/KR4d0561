body:
  text: 歲除前一夕寓姑蘇與友人卞于珍守歲遣興和許君善韵老病已酉夏四月東維子来訪以其過崑山詩見示且邀予及盧公武殷孝章和之崑山辛彬甫元夕前旅次岑寂作詩懐之捄弊祭胡子明文龜巢藁𥙷遺歲除前一夕寓姑蘇與友人卞于珍守歲姑蘇城外小湖邉寂寞僧房借榻眠詩藁冩成丁邜集暦頭檢盡甲辰年中原喋血人争地南國啼飢水拍天起坐夜深如守歲屋山風雪打寒氊遣興和許君善韵馬圖莫怪出河遲丗事方如理亂絲蓮葉有巢龜已老竹花無實鳳仍飢籬邉艇子供垂釣林下樵童許着棋苜蓿一􅐻三丈日老妻晨起案齊眉老病乾坤如許大老病此江濱無酒可留客青山應咲人幅巾方竹杖青草落花茵賣得長門賦相如未是貧已酉夏四月東維子来訪以其過崑山詩見示且邀予及盧公武殷孝章和之酒濕宫𫀆逸興多鐡龍吟嘯舞蛟鼍一江星月光搖動八極風雲氣盪摩詩史屡書新甲子草廬還是舊烟蘿繫舡秦柱山前栁邀我吴趋和郢歌崑山辛彬甫元夕前旅次岑寂作詩懐之魯魚一洗版圗編徑着麻鞋送上天七里八岡風雨夜誰家燈火對愁眠捄弊世俗以浮圖治䘮以先正斥之盖欲行古䘮禮終事親之孝而厚風俗也比年以来或者吝扵財而薄于親者泛然以文公家禮藉口䘮禮不行佛事不作視骨肉至親之死如塗人然棺壙之外餘皆無之不孝不慈傷風敗俗至如俗禮以飲食待執紼之人亦斳而不爲親戚非之鄉里譏之有愧乎設無礙齋者多矣甞觀佛事之作雖非正道亦彷彿古今祭祀之儀然香點燭猶欝鬯庭燎之用也䟽文陳白猶祝辭也齋厨供饌猶籩豆簠簋也楮錢楮幣猶玄纁圭璧也葬之日以旛幢代銘旌以鼓鈸導輀車亦皆敬吾親而送之也然則鄊俗之人䘮禮既不䏻行而䏻為此者亦可以寓孝慈之心表哀戚之意也嗚呼今薄俗一毛不㧞二者俱廢吾恐轉相倣效習以成風将胥為獍之屬是故不得已而言佛事之用如前所云𥘉非舍正道崇異端而忘古先聖賢之名教也吾家子孫當先警省知言君子冝以情恕洪武二十年秋七月龜巢老人言祭胡子明文扵乎逸翁生長越杭以醫䆠逰䑓閣蜚英晚罹世變戈㦸搶攘挈家海壖晦迹韜光子未識公結交令郎觝斥妖妄氣節激昂既見叔夜穆如春陽時方艱虞紛然虎狼誨言諄諄戒慎周防吾其服膺如龜六藏歲時徃来雞黍范張公年已髙神氣益昌髪黟顔童飲可百觴興致酣適庭視八荒詞多滑稽歌或慨慷以公逹觀物累俱忘蓋亦有子動合義方福善自天家有餘慶婁渉畏途竟為康荘予甞比之珠玉琳琅父執遇我我惡敢當所貴相知心腹腎腸公視吾児剪拂揄揚将玉其成取寸之長通家之好幾二十霜洪武已酉我歸扵常贈言孔嘉且貽篚筐心親迹疏烟水相望前年莫秋過公豁堂三宿不寐情話連床延致畫史為貌不颺復命其子拏舟送将别来両秋懐思弗忘𥘉冬病餘孤卧若僵寄書言懐并書数行歲聿云暮嗣音渺茫雪洲之報乃謂公亡淞隂石川悲風白楊命林徃奠老涙其滂
