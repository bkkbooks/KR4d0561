front:
  text: 龜巢藁卷之十七
  hash: sha256:6aab6082d06ab2220a7897ca3e8d4473feae0191bb270bfd017c87131a462a60
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0561_SBCK_017-1a}
body:
  text: 啓蕭答張納聘啓松堅晚節梅占春魁恭惟厶官起居有常動静多福厶幸扳華閥獲締孚盟敬憑一𥿄之書用効七㐮之報祗詞申燕且嚴鱗甲更兾順平之序加調甘㫖之羞予日望之自此升矣厶出使展埋輪之志閥閲殊髙封侯由給餉之功源流巳逺幸二姓之合好占八世之莫京令侄精習讀書拾芥之功名必取孫女粗勤織絍采蘋之法度能循荷葑菲之不遺俾葭莩之有倚兹承奠雁喜近乗龍苐慚奩具之蕭條莫稱洞房之張設幣帛筐篚之厚意拜而受之男女家室之大倫永為好也答請期啓合歡㝷月老之盟将偕鴛偶涓吉訂星翁之暦乃遣魚書既承黄絹之好辭敢謂緑窓之難嫁曰迎鸞于桃李春風之日尚許從容𣣔奠雁于松桓嵗寒之時何勞鄭重葢篤婚姻之好惟崇道義之文迨其吉迨其今敬聞命矣宜其家宜其室適我願兮賀闞信卿生日壽八十三月𥘉一日生生申令辰二月後𥘉交三月比彭髙夀十分中纔是一分子孫克肖而俱賢歲月方來而未艾敬将薄禮仰祝修齡非熊非羆夢必形于西伯如岡如阜夀将比于南山申賀率然丙融幸甚張回鄒定姻三幅啓緑野春明畫堂日永厶官百靈交相多福駢臻厶遥望隣封近通姻譜仰辱問名之礼敬酧交好之書心馳燕居首陳魚素敢兾對乳燕青春之景而加調紫駝翠釡之珍愛助一枕勤惓三祝厶昔南軒以道鄉可愛曽為䟦甘泉之銘今東泊與時干相聞且喜接隣封之境惟先世斯文舊契宜後人此日新姻令嗣筆艶春葩力勤儒業侄女燈明夜績志在女紅幸有良媒乃成佳偶採下體葑菲之外将厚意筐篚之間受言藏之永為好也投我以桃報之以李正三春桃李之時丈夫有室女子有家乃百歲室家之願有懐依倚無任欣榮陳彦謙府史满歸惠錢舜舉畫遣礼荅賀發􅮾修程十載試蕭曹刀筆還家逺恵一綫遣頋陸丹青愧予龍鍾失此燕賀想萊子斑衣之樂勝買臣晝錦之榮不腆送芹切希笑粲挿茱茰遍兄弟于胥樂兮投木桃報璚瑶我無是也娶婦拜祖先致語伏以有夫婦而後有父子大矣人倫故齋戒以告鬼神重乎婚禮幸及時以成家室敢即刻以覲祖宗參酌時宜兼從古制既不忘于報夲乃可復而合歡濯濯厥靈降藍橋之仙鵲宅洋洋如在坐花燭之璚筵伏願先世垂恩新人䝉福有是父有是子一門天爵之榮宜其室宜其家百世雲孫之盛合卺致語窃以礼言合卺自古有之俗曰交盃其來尚矣于結髪百年之始合開顔一飲之歡孔雀屏中選當年竟成伉􅓻鴛鴦盃同傾此日豈不歡娛伏願孝順庭幃諧和琴瑟新妆不俗朝朝畫張敞之眉敬對如賔日日舉孟光之案詩曰花燭春輝照洞房藍橋仙偶飲璚漿開花結子三千歲人與蟠桃夀搃長拜舅姑致語伏以男女居室之願喜得及時父母舅姑之尊先當行礼𣣔居敬以行簡乃酌古而凖今試看花燭煇煌何異桃源㑹聚拜舅姑而及舅姑之宗族拜親戚以分親戚之尊卑各致殷勤咸加恭敬伏願夫夫婦婦同心和順于六親子子孫孫一氣流傳于百世趙與蕭請期啓嘉會合禮㝷月老之姻盟内事用柔訂星翁之日暦納幣于小春良月之吉御輪于大寒信宿之先是用成行必蒙允諾嵗月日時無昜迨其吉兮男女居室大倫永為好也寸芹修敬一粲為榮趙與蕭聘啓蘭陵之蕭衣冠素盛石橋之趙門户今寒月老書其姓名雲孫知為僥倖令孫女鍾禮郝法乃天生真淑之姿厶男周誥殷盤方日誦聖賢之訓曩中牽絲之選時為佩韘之童數年粗喜其長成六禮豈容于缺畧男女之際婚姻之始父母之命區區幣帛之将媒妁之言永永室家之好蕭答陶納幣啓十月小春一年好景恭惟厶官起居惟適福禄是宜厶舊日相知新婚可喜辱子雲之華札効星女之報章躬問晏居首陳鱗幅其必對畫閣紅爐之景而加調紫駝翠釜之羞善保儒珍早登仕版厶讀五桞先生之傳何慕清髙八葉宰相之家俯愧寥落夙昔友一鄉之善婚姻占八世之昌令嗣誦詩讀書克修儒業孫女治絲執絮方習女工既叶鳳占将成鴛偶辱錦繡之贈如此之璚瑶之報奈何受言藏之永為好也兄弟子猶子愛芝蘭玉樹之芳父母心為心喜松栢女蘿之施王答鮮于定婚啓菊存晩節梅近小春恭惟厶官森衛百靈起居多禄厶因親雖舊結好惟新来書粲四六之文復状致再三之敬寅恭上問未竟下忱其必順風霜氣候之清而加飬玉屑丰神之秀佇看鶚薦即奮鵬程宋相以福星族望殊髙晋人以岩電見稱風流何在詎圗僥倖乃締婚姻令嗣能讀父書功名必取孫女勉遵姆敎工巧何能既赤绳繫足之有縁當舉案齊眉之永好一誠相體六禮何繁笑折黄花答今日殷勤之贈寄言紅葉待他年伉􅌂之諧張與巢求贅親啓交倩至舊真如鮑叔相知姻事從權𣣔效秦人出贅兹葢天作之合亦云時措之宜欲以幣交未䝉金諾先此行成于月老便湏㳙吉于星翁所恃乆要母嫌欲速就爾居就爾宿送劉郎暫入天台從如雨從如雲看韓姞終歸蹶里献芹可愧鍳茹為榮王與巢定婚啓楓錦裁紅荷衣換緑恭惟厶官考槃阿澗詒福岡陵厶宻邇鄭鄉喜諧齊偶爰發鹿皮之幣敢脩魚腹之書上詞履祥𥘉嚴䝉吉對去燕來鴻之景進烹龍炰鳳之羞前迓恩榮下無頌禱洗耳流水千古髙風拄頬西山一時佳致雲孫幸甚月老書之令侄女養在㴱閨兼俻徳容之羙小孫男出就外傅粗知礼義之方亦云如鳳求凰詎謂食魚必鯉問名伊始合好維新男女居室大倫願言諧老幣帛筐篚将意幸兾包荒薄侑寸芹别陳尺楮王與符定婚啓風露雙清水天兼净恭惟厶官于時處處降福穰穰雖滆花封沗居莩党敢奉尺書之敬仰干丈席之尊既諏茵鼎有嚴簡書當桂子餘香之秋得棣蕚相輝之樂請稽月令善保天和樂施恩多尚書令遺風可仰太平榮在文中子正學誰傳過攀閥閲之髙乃合婚姻之好令侄女閨室毓秀粹然四徳兼全侄孫燈火相習勉尓一經粗曉所幸中東床坦腹之選豈非藉赤䋲繋足之縁問名通魚腹書将意遣鹿皮幣薄乎云爾歸斯受之夫婦有室父母心信前言之不謬婚娶論財夷虜道知道誼之不然請期啓婚姻無六禮之繁寔欽髙誼唯諾若千金之重足見真情行成既託于氷言㳙吉乃稽于星暦儗三月中旬之始合百年佳偶之歡想周南梅摽有詩看陳村杏花堪畫得及時也適我願兮承顔當合卺乙期敢云燕喜将意表折梅之敬尚兾包荒欣忭有餘敷陳㒺旣王聘巢啓男女擇徳聖賢之訓昭然婚姻以時父母之心同爾願言合好庶勉愆期令女四徳兼全天生淑質小孫一丁粗識日習遺經念厥祖之暮年宜此孫之早娶幸䝉金諾恩賜玉成敢将奠雁之儀就訂迎鵉之約後觴九日星在户星在天御輪三周從如雲從如雨請巢氏父母送鵉二首男室女家喜畢大倫之事山殽野蔌可無小酌之歡敢望髙車肻過衡宇相邀愧泥濘勿辭送仙子乗鸞髙誼薄雲天所願得嘉賔式燕許年聞林下之風喜成姻婭後夜聼鐙前之雨願叙團圞仰屈魚軒寵臨蝸居之子宜家宜室必加敬戒之辭騎從如雲如雨将見爛盈之美請符氏父母送鵉二首居室大倫喜佳期之在邇婚姻良會宜此夕之爲歡掃羅雀門迎衛鵉從烹葵邀上客甚有愧于荒凉随桞過前川必不辭于光賁嫁織女于河西依稀渡鵲􅑙姮娥于月下縹緲乗鵉跂予望之窃有請也燕爾如兄如弟適當姻礼之𥘉象服如山如河快覩母儀之盛蕭聘張啓張良為㓛臣與蕭何同稱人傑張禹有愛女嫁蕭咸而得近君既両家先世如斯宜百世姻聯于此令愛毓閨房之秀能采蘋蘩小侄當門户之勞頗知稼穡僥倖中牽絲妙選因循欠納幣常儀𣣔調羔以奉慈幃奈乏人以主中饋礼慚遲慢事幸速成雖無雙璧之将巳拜百金之諾今日聘明日娶即迎鵉從之歸五世昌八世京永叶鳳占之吉侄娶請親翁啓吾弟惟一息幸畢婚姻女子願有家必䝉徃送望公車騎光我堦庭挹丹桂之香風玩清秋之明月花燭洞房之喜相與欣欣竹林歩兵之遺不妨衮衮張答鄒請上客啓兩小無嫌䝉養喜成夫婦一尊重與太平宜會婚姻伏辱寵招夲當趋赴藉手乏荆釵之飾何顔覩花燭之輝男有室女有家且遂齊眉之願膏我車秣我馬别圗會靣之期童婚三載喜合卺之有期王母肆筵辱貽書之見召唯慚蓮髩合拜蘭姿奈老態之龍鍾乆無心于燕樂梨花夜月對繍佛以長齋花燭春風想金屏而多喜代王孟學荅張希良賀乃父置妾劄子一婢赤脚家君每謂包羞雙魚素書使方乃䝉言賀適逢早出難擬暮歸僣開三印之封景見八珍之貺夲無禀命合用繳回奈雨淋滂沱之未休恐星使徃來之多累弗辭躐等遂用拜嘉今日目前甚愧璚瑶之匪報他時膝下當言珠璧之暗投賀置夀噐劄子鼎新夀噐比銀镂之黄腸珍重安居喜玉板之無汗惟賢逹預謀身後宜歡娛益享目前是用送芹敢希笑粲賦詩自輓君應有陶令佳章荷鍤相随誰不慕劉伶髙見王文甫甞卧疾諸親友探問醫禱礼意甚勤疾愈欲置酒叙謝未遑也至是設盛席招之凡十有七人各書以請請蕭岩桂歌偪仄行念隣民之乆别作真率會慕前軰之遺風儗兹廿一日清晨舉我二三年缺典踏雪沽酒𫾣氷煮茶思向來采薪之憂難得此盍簮之喜白髪三千丈相看若圗畫之竒金釵十二行但愧欠笙歌之盛請蕭舜卿曩歲負薪之憂屡厪存問今日折梅之信敢有相期卜大寒一日之先作小酌三盃之欵願陪談笑併謝扶持奴白飯馬青芻聊盡少陵之意膾金薤羔玉糁真如坡老之詩請吳雲從讀床頭昜屡䝉存問氷廬稱飲中仙每羨隐居雪􅊤斗酒将謀于小席尺書預奉以邀相待蓂莢四葉之新如蟠桃一花之會志於道據於徳勿云冠佩之殊和其光同其塵聊共壼觴之樂請趙師吕徃年問疾屡荷殷勤晚景安居寕忘感激開小閣會數人之客至大寒先一日之期沽酒謝玉川先生下榻待南州髙士折梅逢驛使寄信報幽谷之春看竹到貧家母吝踏前村之雪請姜紫霞向來問病曽勞得得相過老去投閑願聆玄玄髙論将社酒一盃之舉待堯蓂四莢之新亟掃蝸居祗迎鸐駕陶陸同社幸無麯蘖之嫌孔李通家况在葭莩之末請張伯啓曩辱問平安之竹念我顛危迩来對索笑之梅思君契濶速客先大寒一日呼兒辦小酌三杯敢用坐邀幸無他却頗甞見此客不談麈生風頋安所得酒乎隣酤踏雪請陳嘉㑹徃日負膏肓之疾多荷扶持連年懐肺腑之親無由㑹集當此嘉平之月適為閒暇之時敢謀廿一日泥飯之歡何異三千年河清之會願窃有請惠然肻來摘我園中𬞞盤飣𥘉無異品爲此席上客襟懐皆喜相知請月仲承昔擁衾聞闘螘之聲曾勞下問今對酒如長鯨之吸願與髙談擬大寒一日之先望清早羣賢之集螘浮仍䗶聊索笑于梅花騎氣如虹必増輝蓬蓽請䔥定卿故舊不棄曩勞問疾于吾廬潦倒餘生合罄謝言于姻黨在嘉平後旬而先一日儗延留上客以共三盃酌言酬之窃有請也有客過茅宇跫然空谷之音携酒逰芝山乗此剡溪之興請陳君惠人生㡬何汨汩塵勞之事歲聿云莫區區儗飲之謀待堯階換四莢之􅕴望庱亭來五花之馬爐煨芋栗瓮㵼茅柴一簞食一豆羔聊奉笑談之樂三握髮三吐哺豈辭迎肅之勞請翁深甫疾病相扶持常懐徃事故舊則不棄可無謝言敢于後甲三日之期聊為知己一杯之飲願窃有請賁然来思瞻彼牛臺郄騎攬瑶金之轡過兹蝸舍長鯨吸薬玉之舡請姜用佐有患有身曽荷扶持之賜相親相近豈忘感偑之情欲謝殷勤乆成稽緩廿一日專邀大斾三五杯聊奉清談地罏煨酒煖如湯仍浮臈味金城土酥净如練試簇春盤請周華甫卧痾三載之先曾勞請禱話舊片時之欵屡欲邀迎奈何日岀事生至如此江空歲晩先大寒之一日集佳客之數人對月歌竹枝當盡留連之意摶拳握松子願陪少俊之歡請陳君傑饋薬感康子之意懐不盡忘置醴敬穆生之賢願窃有請大寒之前一日小席之飲片時誦陋室銘望髙軒過灰香芋栗菲然盤飣之㣲人立梅花忘却緼𫀆之冷請張從傑有患有身徃歲㡬成枯朽是父是子當時多荷扶持奈相逢傾葢為難遂乆失舉杯稱謝先大寒之一夕請小酌之三盃田家拊缶之歌嗚嗚共發故人綈袍之意戀戀相看請陳仲祥曩歲負薪之憂叠承書問今日折梅之信專用邀迎先一日于大寒會諸賔于小席煩君騎從過我蝸居觥籌衆賔之歡聊復爾耳綈𫀆故人之意何日忘之請陳伯将老無能為每有索居之嘆歲聿云莫可無良㑹之歡先大寒一日之期辦小酌三盃之欵願窃有請惠然肻來注玉傾銀笑田家之老瓦揺金織翠邀才子之髙軒賀符君彦遇恩劄子平地風波偶罹人禍覆盆日月喜獲天恩惟正直荷天之休使横逆如氷之釋厶有懐燕賀無奈龍鍾敢将芹曝之儀少助竹林之宴呌囂東西隳突南北笑前時悍吏之來觥籌交錯起坐喧譁想今日醉翁之樂王與金定姻三幅啓四月惟夏南風之薫恭唯厶官起居多福厶素聞華胄新締莩盟敢于六禮之𥘉輙上一箋之敬寅恭事上申敬如前所兾順清和之時而加調甘㫖之饍行􅈾芝檢即上蒲輪厶秺侯珥貂之孫猶能世顯葉令飛鳬之舃豈乏家傳媒妁殷勤婚姻繾綣令孫天生淑質兼全四徳之稱小孫日誦陳編方盡三餘之力得佳偶之諧若此爲大父之樂何如禮宜問名幣以将意玉郎嬌客勿戯嘲東坡之詩金缕綉𥜗想富若樂天之語新親賀冬至劄子鳳鳴占八世之昌婚姻締好犧畫見一陽之復時序更新循乃常儀賀兹佳節恭惟厶官道随陽長徳與年高烱烱然若清氷英標㧞俗温温乎如愛日和氣接人方沾賜帛之恩将見安車之召厶傾心仰斗轉眼書雲寄殷勤聊折梅花諧伉􅓻将㝷瓜葛日迎修晷喜添紅線之工月閏來春儗講青廬之禮新親賀七夕劄子二首瓜果庭前望鵲橋之仙偶芙蓉江上㝷鴛侣之嘉盟因景物以興懐具礼文而修好恭惟厶官黄山毓秀緑野居閒立志清髙欲追踪于巢父無心机巧豈邀福于天孫其𥘉延露浥之餘必逺召天書之至厶謀身甚拙曬腹無書卜兒曹鸞鏡之圓看合子蛛絲之喜献芹可愧笑粲為榮華屋神仙想穿鍼于良夜洞房花燭宜合卺于明年月老檢書乆定婚姻之約天孫分巧豈無免女之情敢循彛儀以賀佳節恭惟厶官令名揭日壮氣横秋縹緲十二楼正宜恭阮亭之錦拍塞五千卷又兼晒隆腹之書舉頭睹銀漢祥光拭目進青雲高歩厶俛慚蹇拙仰慕清高以瓜果之時羞問梧桐之秋信薄乎云爾歸斯受之當此時占喜蛛絲儗来歲徃迎鵉從机杼織作毋勞唫草堂之詩黼黻文章但願遂栁州之禱新親賀端午劄子訂月下書幸締朱陳之好賀天中節合循荆楚之風景物来前禮文敢後恭惟厶官身其蕭爽居則清高月旦有評比南州之髙士日長無事卧北忩之清風九節蒲聊用引年三年艾殊堪濟世獨醒咸羡多福鼎来厶舉目葵榴馳情瓜葛雖所献非雪羅風葛或可留付霧閣雲憲星眷起居雷同問訊角黍逹昌歜遥知盡華燭之歡兎絲偕女蘿續當有佳期之約納采道日劄子伐柯以斧言當納采之時差榖有書喜得用柔之日雖居敬以行簡亦酌古而凖今待季春更六英之蓂效野老献一芹之禮伏祈無責必賜􅊶荒鶯語丁寕報金谷東風之信鵉籹次第看玉臺明鏡之圎問名道日劄子月老檢書幸自天而作合星翁視暦敢擇日以㝷盟後中秋八日之期結佳偶百年之好窃有請也能無從乎献芹聊效野人題葉試看流水男女之際婚姻之始礼合盡于殷勤父母之命媒妁之言願早諧于伉􅓻袁與陸三幅啓緑野春明畫堂晝永恭惟厶官考槃在澗增福如川厶沗在舊交喜成新好敬致鹿皮之幣敢陳魚腹之書躬問燕居首陳魚素尚兾對朱雀烏衣之景更加調紫駝翠釡之珍引養引恬善頌善禱累世傳象山之學共仰髙風無人問牛渚之舟有慚明月鳳占既叶鴛偶期諧令愛毓秀閨房生乃全于四徳小免服勤門户學則悞于三餘荷葑菲之不遺俾絲蘿之為好薄言納采厚望􅊶荒春水桃花江上遣長湏致鯉秋風桂子月中迎仙女乗鵉鄒與陸聘啓甫里世居門望偉鬰林之右道鄉家學師傳夲伊洛之源藉氷語以聫姻寔雲礽其多幸丁寕鶯語催促鵉妝令愛夙奉母儀禮巳嫻于内則愚男勉承父訓書頗讀于中庸頋惟在飄泊之餘願早遂團圞之樂六禮之文雖簡雙親之意寔殷厪兾􅊶荒毋嫌欲速迨今迨吉當歌梅摽之詩宜室宜家喜對桃花之景送芹可愧笑粲為榮新親賀冬至劄子八世莫京幸隂隲鳳占之吉七日來復喜陽生犧畫之𥘉婚姻方重于交歡節序合先于稱賀禮雖效芹羔之献物乃如葭灰之輕餘皆削去繁文昔己感承嘉命既書雲物便約星期香閤日長看刺綉新添之綫梅櫩春早遣過門親迎之車朱答李取男帖贅姻劄子厶揆辰珠滴檐花翠摇門桞恭惟厶官考槃其在阿在澗介福則如岡如陵厶依仁居鄭公之鄉枌榆甚近贅子效秦人之俗瓜葛維新荷不鄙西家之愚乃獲中東床之選首䝉厚礼爰締嘉盟月下老既辱來前春帖子謹當納上題詩桐葉足知流水之多情寄語桃花将續仙源之盛事厶伏望翠蓬星眷戬榖日増倘有委令毋吝攽曉社舉聘章用黨庠術序之良規學開鄉社求䝉養聖功之成效職在師儒頼琴堂爲擇範模使編户得從規矩文風聿盛化雨俱霑恭惟厶官學有淵源眼空淮海一斑窺見早逰風紀之詞千仭翺翔逺避烟塵之境適張公爲江海之客知伯牙有山水之音将欲修鶚薦之書先請坐臯比之席姑鳴敎鐸以俟徴車厶願雲龍以相随覩星鳳而爲快敬将聘幣亟徃招旌設絳帳于張林采青衿于鄭校與潔與進勿謂互鄉難與之言于勤于思即若國子先生之誨代朱弘道請張子安昆仲啓别多㑹少居常諷咏于停雲時和歲豊欲聚笑談于终日邀上客一盃之欵在中秋三日之先舉匏樽丹桂花前候蘭棹白蘋洲畔難兄難弟必能與吾弟偕行明月明年更約似今年同賞臨書率尔望賜惠然親家賀冬至劄子新婚交締占八世之莫京寒暑荐更喜一陽之來復佳期在邇候問宜先恭惟厶官韞玉儒林濯纓芳浦髙標絶俗烱若清氷和氣接人温如愛日葢鍾以湖山之秀而得夫詩礼之傳棠棣聫輝才華益著書雲紀事坐評魯史之詳賦雪成名行赴梁園之召厶弟兄舊愛免女新歡眷言㝷合好之盟㣲礼作踐更之慶念因親致親者乆矣視居簡行簡而恕之葭灰飛緹室之時且酧佳節花燭盟洞房之夕姑待𥘉春謹此申聞伏希丙在新婿整容致語昔年占鳳皆云家世之昌今日乗龍果見門闌之喜繼桃源之盛事留花燭之良宵魚水交歡燕雀相賀厶人胸藏錦繍口吐珠璣種玉有縁聘婦投其雙璧籝金既富傳家兼以一經将畫他張敞之眉先整我潘安之貌秋水為神玉為骨人謂無雙芙蓉如面栁如眉天生一對敢陳蕪語用讃華姻詩曰一雙新偶錦鴛鴦百歲和諧翠鳯凰最喜天姿如傅粉不湏湯餅試何郎伏願結髮惟新齊眉永好夫夫婦婦常調琴瑟之音子子孫孫克紹箕裘之業新婦整容致語天孫配鵲橋之仙相依銀漢秦女得鳳蕭之偶並樂瑶臺葢居室人之大倫而婚姻世之重禮既諧鳳卜宜趣鸞臺厶人珠箔銀屏綉𥜗金縷梅花點額作夀陽宫様之竒桃葉宜人有周南國風之羙眼横秋水眉歛春山香閣移歩歩金蓮合卺出纎纎玉笋不施脂粉夲來如月裡姮娥若論清真尤勝似人間西子欣逢好合敢頌輿言詩曰媒妁殷勤不負人花燭今照洞房春紅絲隔幔牵情合羅帯同心結好新伏願夫倡婦随天長地乆五男二女享盛福于髙堂四徳三從著香名于彤管新親遣使請上客致語兩姓為婚永結朱陳之好千里命駕當如嵇吕之交持來雙鯉之書請送乗鸞之女桞筵盛設花燭邀迎厶官喬木世家耆英人物羙矣育閨中秀愛之如掌上珍綉褥金屏李監宅門䦨之喜瑶簮珠履孟嘗君賔客之多既當年擇對東床宜此日送行南浦金勒馬嘶芳草楼船燕簇飛花明月随人满路春風從如雲從如雨之子于歸星在天星在户嘉賔式燕請期劄子曩中雀屏孫謀以為幸事今觀鳳暦親迎而有良辰越流觴三日之期請合卺百年之好燈花有約梅摽及時投以李投以桃用請期之常禮宜其家宜其室締諧老之佳盟專此申聞諒惟丙在請男上客五日季春兩家合好烹葵邀上客因舊親以結新親杖藜立芳洲望早酌而娛晩酌請女上客祓禊三日婚姻百年織女渡銀河鵲橋懽諧星偶王母會瑶池燕衎早駕雲車李回徐再婚聘啓因親致親之好從古流傳舊婿新婿之詩正宜重詠魚腹聿来其書尺鸞膠将用以續絃令侄醫緩齊名以聪明旁通儒術小女姊嬃同氣乃殷勤粗習女工齊眉之案雖新坦腹之床不昜自天作合如月仍圎琴瑟鐘鼓之樂故多幣帛筐篚之将何勝前日受今日受不妨聘礼之舊雨來今雨来重見迓輪之喜回芹菲薄副楮條之答請期劄子婚姻憑月老之言幸成佳偶聘娶考星翁之暦喜有良辰催花雨正此連綿五朶雲遽然飛堕敬聞命矣迨其吉兮男女居室大倫古今所重歲月日時無昜答納幣三幅啓花朝餘景桃雨方晴恭惟厶官天相閒居日􅈾盛福厶僣扳華閲幸締莩盟輙囬魚尺之書專問燕居之敬祗詞燕申巳嚴魚甲尚兾對芳菲之景而加調甘㫖之羞善保安閑式副頌禱一舍相望皆住鶴溪之滸二姓合好永諧魚水之歡載笑載言迨今迨吉厶人案頭燈火殷勤黄卷之間而厶女針觜衣裳寂寞緑􅑵之下荷不遺于葑菲斯可擬于松蘿納幣今朝結䄜有日桃花灼灼喜婚姻如此其宜瓜􅚩綿綿看嗣續将來之盛回儀菲薄副剡條之納幣啓張知府子聘盧推官女文武才之並稱夙欽華胄齊魯論之蒹􅊰甚愧㣲宗知心夲出于同鄉愛子乃求其佳偶鄰封伊邇姻好維新令愛四徳俱全自是閨房之秀長男一經粗習尚湏燈火之工雀屏幸中于前時雁幣宜陳于此日星翁涓吉月老行成承筐之意既将合卺之期可待鉄瓮城山花夾道似入桃源金斗門官桞長街将迎鵉從寸芹菲甚副楮條之賀娶弟婦劄子令弟號河東之鳳生有竒材仙娥乗月下之鵉來為佳偶礼成合卺喜溢連枝想洞房花燭以歡娛送野老芹羔而慶賀塤箎交作一家藹和氣之春琴瑟和鳴百歲永齊眉之好薄言申控厚望丙融兄督厥家重乃友于之義弟宜其室合兹宴尓之歡鳳卜有靈鴒原多喜厶人胸襟量濶洪如萬頃之波手足倩親常共對床之雨稱二難于月旦行六禮于婚姻厶忝在莩親敬将芹献想鴻雁之行有喜受燕雀之賀無嫌翠舞珠歌花燭夜懽諧伉􅓻金昆玉季桃源洞盛集神仙俛樽巵小酌式相好矣請無却之瑣瑣之姻納婿欲叙團圞親親之長來賔誠為光飾再三申敬千萬寵臨祖為孫娶請親家狀抱孫至有室之年寔為僥倖送女見宜家之好共樂團圞花燭将迎慈𥚑寵賁祖母娶孫婦請親家母状孫娶而倚門龍鍾亦笑女行而結帨鵉從将臨願覩蘭姿請移蓮歩萬答蔣問名三幅啓天将嚴肅月乃嘉平恭惟厶官台侯動止多福厶交䝉舊愛姻締新盟承書粲駢麗之文荅簡致殷勤之意前陳候問上徹覧觀尚加調紫駝翠釜之珍以安處畫閣紅爐之樂蒲輪有召梓里增榮山随蔣姓大宗乆著于圗經庄用萬名先世亦稱于鄉國荷天相平居而交契宜氷人相語以聫姻令孫誦詩讀書承祖風之淳謹小女治絲執絮遵姆訓之工勤吉從鳳占喜成鵉偶擇徳之𥘉心既遂問名之彛礼何多受言藏之永為好也竹開三徑相望如倚玉之榮梅贈一枝聊仰作報璚之敬請新親家翁状愛女甚于男人皆羡安昌之比見我有此客否孰云文靖之榮請式宴以交歡望御鵉而光賁請新親家母状降月府之姮娥佳期在邇宴瑶池之王母良會維新立侯蓬門望移蓮歩謝免粮表兩浙奉蠲租之詔恩意天寛羣黎懐結草之心歡聲雷動睠斯民而得此寔亘古而無之欽惟徳合乾坤明同日月由生知安行之聖巍巍成功以博施濟衆之心洋洋育物干戈既戢禮樂聿新普天率土慶以來歸甘露卿雲而其呈瑞臣厶等叨居劇郡幸遇明時遥瞻丹闕之光仰效華封之祝一曰壽二曰富龜疇之景福無疆千斯倉萬斯箱農畮之豊年多慶中宫箋徳配一人聖政有内庭之助恩霑兩浙公租免編户之征臣庶均歡古今希遇欽惟禕衣合則垂懿範于宫闈彤管紀功示母儀于邦國厚同坤載夀與天齊臣岀守㣲邦恩蒙大幸家給人足喜關睢麟趾之化行時和歲豊俟龍馬龜圗之瑞出東宫箋主噐參萬㡬之政日用三朝綸音蠲両浙之租恩沾庶姓欽惟震長居儲離明協照星辰河岳煌煌氣象之新車服旌旗奕奕威儀之盛夷夏咸悦春秋鼎來臣等藩守至㣲輿告上謝農餘粟女餘布樂謳歌朝覲之歸書同文行同倫統侯甸要荒之服聖節賀表皇天錫羡篤生聖哲之姿化日舒長馴致雍熈之治春秋鼎盛夷夏咸歡欽惟徳配二儀量包六合立綱陳紀同天下之車書偃武修文舞階前之干羽蠲租賦以紓為民者之力増俸禄以養為官者之亷庶績其凝彛倫攸叙臣等叨居郡守陪列朝班黎献為帝臣粤有唐萬邦之衆夀富多男子敢效華封人三祝之誠千秋節賀表誕彌厥月先重陽五日之期時乂惟天繼洪祚萬年之衆永隆邦邦夲大惬輿情欽惟以孝以仁惟明惟允鶴駕雞鳴而問安龍行虎歩于太平乾坤篤祐丕承寶緒益衍瑶圗臣等㣲若草茅誠同葵藿望神樞之電徺夀祝儲宫願化國之日長恩霑寰宇冬至表龍飛御九日之師尊居丹扆犧畫騐一陽之復律應黄鍾愛日舒長普天䝉慶欽惟乾坤合徳日月同明度越古今同武功而平四海制作礼樂敷文徳以敎兆民當亞歲之令辰納應時之洪福臣等忝居小邑阻賀大廷干羽兩階想天顔之有喜衣裳萬國仰雲日之餘情中宫箋陽生葭琯天時妙斡于玄机懽藹椒闈日晷新添于紅線掖庭和樂寰宇清寕欽惟夀與天齊徳同坤厚萬乗至尊之賔敬雅重禕衣六宫内則之敎修尚勤玄紞再逢令節益介繁禧臣等㣲若草茅誠同葵藿履長今日宫中奏式燕之娛習羙成風天下頼関睢之化東宫箋七日來復陽生緹室之灰八表依歸位鎮東宫之乆欣逢令旦茂輯嘉禧欽惟天生聪明日新成徳能仰承于聖訓用参賛其皇猷眎金鏡以納忠義崇風紀奉玉巵而上夀恩重天倫邦夲益隆輿情允惬臣等叨居下邑賀語前陳夙興視膳而問安更有書雲之喜賢佐保躬而傳道尚論愛日之誠正旦表普天率土幅員歸一統之𥘉献歲發春正朔屇三朝之始時調玉燭喜溢瑶墀欽惟聖徳乾剛神功震赫蕩蕩乎如天之大人所難名昭昭乎如日之升物無不照履始和之吉月嚮洪福之萬年臣等忝牧邑民阻趋廷賀鳳暦頒春于天下化及華夷獸樽置酒于殿南前樂聞忠讜中宫箋四時成嵗􅥐逢㤗道之春亨萬物資生寔仰坤儀之盛春回寰宇歡藹掖庭欽惟位正禕衣功盛玄綩風敎天下関雎正始之音朝夕宫中卷耳求賢之志履端有喜介福宜多臣領邑覊縻望闕稱賀紫宸配徳新年布澤如春彤管流芳億夀與天同載東宫箋正月之吉始和輿情共悦維天之命不巳嗣服益隆春藹青宫祚延蒼籙欽惟長爲主噐允應貞符親傳精一之心淵源聖學參决萬㡬之政黼黻皇猷迎新茂對于良辰端夲繼承其大業臣等叨居縣邑阻賀宫庭鳳暦頒春
