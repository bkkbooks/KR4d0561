front:
  text: 龜巢藁卷之十七
  hash: sha256:6aab6082d06ab2220a7897ca3e8d4473feae0191bb270bfd017c87131a462a60
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0561_SBCK_017-1a}
body:
  text: 啓蕭答張納聘啓松堅晚節梅占春魁恭惟某官起居有常動靜多福某幸扳華閥獲締孚盟敬憑一𥿄之書用效七襄之報祗詞申燕且嚴鱗甲更兾順平之序加調甘旨之羞豫日望之自此升矣某出使展埋輪之志閥閲殊髙封侯由給餉之功源流巳逺幸二姓之合好占八世之莫京令侄精習讀書拾芥之功名必取孫女粗勤織絍采蘋之法度能循荷葑菲之不遺俾葭莩之有倚兹承奠雁喜近乘龍苐慚奩具之蕭條莫稱洞房之張設幣帛筐篚之厚意拜而受之男女家室之大倫永為好也答請期啓合歡尋月老之盟將偕鴛偶涓吉訂星翁之曆乃遣魚書既承黃絹之好辭敢謂緑窗之難嫁曰迎鸞于桃李春風之日尚許從容𣣔奠雁于松桓嵗寒之時何勞鄭重蓋篤婚姻之好惟崇道義之文逮其吉逮其今敬聞命矣宜其家宜其室適我願兮賀闞信卿生日壽八十三月𥘉一日生生申令辰二月後𥘉交三月比彭髙夀十分中才是一分子孫克肖而俱賢歲月方來而未艾敬將薄禮仰祝修齡非熊非羆夢必形于西伯如岡如阜夀將比于南山申賀率然丙融幸甚張回鄒定姻三幅啓緑野春明畫堂日永某官百靈交相多福駢臻某遙望鄰封近通姻譜仰辱問名之禮敬酬交好之書心馳燕居首陳魚素敢兾對乳燕青春之景而加調紫駝翠釡之珍愛助一枕勤惓三祝某昔南軒以道鄉可愛曽為跋甘泉之銘今東泊與時干相聞且喜接鄰封之境惟先世斯文舊契宜後人此日新姻令嗣筆艷春葩力勤儒業侄女燈明夜績志在女紅幸有良媒乃成佳偶採下體葑菲之外將厚意筐篚之間受言藏之永為好也投我以桃報之以李正三春桃李之時丈夫有室女子有家乃百歲室家之願有懷依倚無任欣榮陳彥謙府史滿歸惠錢舜舉畫遣禮答賀發􅮾修程十載試蕭曹刀筆還家逺惠一線遣顧陸丹青愧豫龍鍾失此燕賀想萊子斑衣之樂勝買臣晝錦之榮不腆送芹切希笑粲插茱茰遍兄弟于胥樂兮投木桃報璚瑶我無是也娶婦拜祖先致語伏以有夫婦而後有父子大矣人倫故齋戒以告鬼神重乎婚禮幸及時以成家室敢即刻以覲祖宗參酌時宜兼從古制既不忘于報夲乃可復而合歡濯濯厥靈降藍橋之仙鵲宅洋洋如在坐花燭之璚筵伏願先世垂恩新人蒙福有是父有是子一門天爵之榮宜其室宜其家百世雲孫之盛合卺致語竊以禮言合卺自古有之俗曰交杯其來尚矣于結髮百年之始合開顔一飲之歡孔雀屏中選當年竟成伉􅓻鴛鴦杯同傾此日豈不歡娛伏願孝順庭幃諧和琴瑟新妝不俗朝朝畫張敞之眉敬對如賔日日舉孟光之案詩曰花燭春輝照洞房藍橋仙偶飲璚漿開花結子三千歲人與蟠桃夀總長拜舅姑致語伏以男女居室之願喜得及時父母舅姑之尊先當行禮𣣔居敬以行簡乃酌古而凖今試看花燭輝煌何異桃源會聚拜舅姑而及舅姑之宗族拜親戚以分親戚之尊卑各致殷勤咸加恭敬伏願夫夫婦婦同心和順于六親子子孫孫一氣流傳于百世趙與蕭請期啓嘉會合禮尋月老之姻盟內事用柔訂星翁之日曆納幣于小春良月之吉御輪于大寒信宿之先是用成行必蒙允諾嵗月日時無昜逮其吉兮男女居室大倫永為好也寸芹修敬一粲為榮趙與蕭聘啓蘭陵之蕭衣冠素盛石橋之趙門户今寒月老書其姓名雲孫知為僥幸令孫女鍾禮郝法乃天生真淑之姿某男周誥殷盤方日誦聖賢之訓曩中牽絲之選時為佩韘之童數年粗喜其長成六禮豈容于缺略男女之際婚姻之始父母之命區區幣帛之將媒妁之言永永室家之好蕭答陶納幣啓十月小春一年好景恭惟某官起居惟適福祿是宜某舊日相知新婚可喜辱子雲之華札效星女之報章躬問晏居首陳鱗幅其必對畫閣紅爐之景而加調紫駝翠釜之羞善保儒珍早登仕版某讀五桞先生之傳何慕清髙八葉宰相之家俯愧寥落夙昔友一鄉之善婚姻占八世之昌令嗣誦詩讀書克修儒業孫女治絲執絮方習女工既叶鳳占將成鴛偶辱錦繡之贈如此之璚瑶之報奈何受言藏之永為好也兄弟子猶子愛芝蘭玉樹之芳父母心為心喜松柏女蘿之施王答鮮于定婚啓菊存晚節梅近小春恭惟某官森衛百靈起居多祿某因親雖舊結好惟新來書粲四六之文復狀致再三之敬寅恭上問未竟下忱其必順風霜氣候之清而加飬玉屑丰神之秀佇看鶚薦即奮鵬程宋相以福星族望殊髙晉人以岩電見稱風流何在詎圗僥幸乃締婚姻令嗣能讀父書功名必取孫女勉遵姆教工巧何能既赤繩繫足之有緣當舉案齊眉之永好一誠相體六禮何繁笑折黃花答今日殷勤之贈寄言紅葉待他年伉􅌂之諧張與巢求贅親啓交倩至舊真如鮑叔相知姻事從權𣣔效秦人出贅兹蓋天作之合亦云時措之宜欲以幣交未蒙金諾先此行成于月老便須涓吉于星翁所恃久要母嫌欲速就爾居就爾宿送劉郎暫入天台從如雨從如雲看韓姞終歸蹶里獻芹可愧鑒茹為榮王與巢定婚啓楓錦裁紅荷衣換緑恭惟某官考槃阿澗詒福岡陵某密邇鄭鄉喜諧齊偶爰發鹿皮之幣敢修魚腹之書上詞履祥𥘉嚴蒙吉對去燕來鴻之景進烹龍炮鳳之羞前迓恩榮下無頌禱洗耳流水千古髙風拄頰西山一時佳致雲孫幸甚月老書之令侄女養在深閨兼備德容之美小孫男出就外傅粗知禮義之方亦云如鳳求凰詎謂食魚必鯉問名伊始合好維新男女居室大倫願言諧老幣帛筐篚將意幸兾包荒薄侑寸芹别陳尺楮王與符定婚啓風露雙清水天兼淨恭惟某官于時處處降福穰穰雖滆花封沗居莩黨敢奉尺書之敬仰干丈席之尊既諏茵鼎有嚴簡書當桂子餘香之秋得棣蕚相輝之樂請稽月令善保天和樂施恩多尚書令遺風可仰太平榮在文中子正學誰傳過攀閥閲之髙乃合婚姻之好令侄女閨室育秀粹然四德兼全侄孫燈火相習勉尓一經粗曉所幸中東床坦腹之選豈非藉赤繩繫足之緣問名通魚腹書將意遣鹿皮幣薄乎云爾歸斯受之夫婦有室父母心信前言之不謬婚娶論財夷虜道知道誼之不然請期啓婚姻無六禮之繁實欽髙誼唯諾若千金之重足見真情行成既託于氷言涓吉乃稽于星曆擬三月中旬之始合百年佳偶之歡想周南梅摽有詩看陳村杏花堪畫得及時也適我願兮承顔當合卺乙期敢云燕喜將意表折梅之敬尚兾包荒欣忭有餘敷陳罔既王聘巢啓男女擇德聖賢之訓昭然婚姻以時父母之心同爾願言合好庶勉愆期令女四德兼全天生淑質小孫一丁粗識日習遺經念厥祖之暮年宜此孫之早娶幸蒙金諾恩賜玉成敢將奠雁之儀就訂迎鵉之約後觴九日星在户星在天御輪三周從如雲從如雨請巢氏父母送鵉二首男室女家喜畢大倫之事山殽野蔌可無小酌之歡敢望髙車肻過衡宇相邀愧泥濘勿辭送仙子乘鸞髙誼薄雲天所願得嘉賔式燕許年聞林下之風喜成姻婭後夜聼鐙前之雨願敘團圞仰屈魚軒寵臨蝸居之子宜家宜室必加敬戒之辭騎從如雲如雨將見爛盈之美請符氏父母送鵉二首居室大倫喜佳期之在邇婚姻良會宜此夕之為歡掃羅雀門迎衛鵉從烹葵邀上客甚有愧于荒涼隨桞過前川必不辭于光賁嫁織女于河西依稀渡鵲􅑙姮娥于月下縹眇乘鵉跂豫望之竊有請也燕爾如兄如弟適當姻禮之𥘉象服如山如河快覩母儀之盛蕭聘張啓張良為㓛臣與蕭何同稱人傑張禹有愛女嫁蕭咸而得近君既兩家先世如斯宜百世姻聯于此令愛育閨房之秀能采蘋蘩小侄當門户之勞頗知稼穡僥幸中牽絲妙選因循欠納幣常儀𣣔調羔以奉慈幃奈乏人以主中饋禮慚遲慢事幸速成雖無雙璧之將巳拜百金之諾今日聘明日娶即迎鵉從之歸五世昌八世京永叶鳳占之吉侄娶請親翁啓吾弟惟一息幸畢婚姻女子願有家必蒙往送望公車騎光我階庭挹丹桂之香風玩清秋之明月花燭洞房之喜相與欣欣竹林步兵之遺不妨衮衮張答鄒請上客啓兩小無嫌蒙養喜成夫婦一尊重與太平宜會婚姻伏辱寵招夲當趨赴藉手乏荆叉之飾何顔覩花燭之輝男有室女有家且遂齊眉之願膏我車秣我馬别圗會靣之期童婚三載喜合卺之有期王母肆筵辱貽書之見召唯慚蓮鬢合拜蘭姿奈老態之龍鍾久無心于燕樂梨花夜月對繍佛以長齋花燭春風想金屏而多喜代王孟學答張希良賀乃父置妾劄子一婢赤腳家君每謂包羞雙魚素書使方乃蒙言賀適逢早出難擬暮歸僣開三印之封景見八珍之貺夲無稟命合用繳回奈雨淋滂沱之未休恐星使往來之多纍弗辭躐等遂用拜嘉今日目前甚愧璚瑶之匪報他時膝下當言珠璧之暗投賀置夀器劄子鼎新夀器比銀鏤之黃腸珍重安居喜玉板之無汗惟賢逹預謀身後宜歡娛益享目前是用送芹敢希笑粲賦詩自挽君應有陶令佳章荷鍤相隨誰不慕劉伶髙見王文甫嘗卧疾諸親友探問醫禱禮意甚勤疾愈欲置酒敘謝未遑也至是設盛席招之凡十有七人各書以請請蕭岩桂歌逼仄行念鄰民之久别作真率會慕前輩之遺風擬兹草一日清晨舉我二三年缺典踏雪沽酒𫾣氷煮茶思向來采薪之憂難得此盍簮之喜白髮三千丈相看若圗畫之竒金叉十二行但愧欠笙歌之盛請蕭舜卿曩歲負薪之憂屢厪存問今日折梅之信敢有相期卜大寒一日之先作小酌三杯之欵願陪談笑併謝扶持奴白飯馬青芻聊盡少陵之意膾金薤羔玉糝真如坡老之詩請吳雲從讀床頭昜屢蒙存問氷廬稱飲中仙每羡隱居雪􅊤斗酒將謀于小席尺書預奉以邀相待蓂莢四葉之新如蟠桃一花之會志於道據於德勿云冠佩之殊和其光同其塵聊共壼觴之樂請趙師吕往年問疾屢荷殷勤晚景安居寧忘感激開小閣會數人之客至大寒先一日之期沽酒謝玉川先生下榻待南州髙士折梅逢驛使寄信報幽谷之春看竹到貧家母吝踏前村之雪請薑紫霞向來問病曽勞得得相過老去投間願聆玄玄髙論將社酒一杯之舉待堯蓂四莢之新亟掃蝸居祗迎鸐駕陶陸同社幸無麯蘖之嫌孔李通家况在葭莩之末請張伯啓曩辱問平安之竹念我顛危邇來對索笑之梅思君契濶速客先大寒一日呼兒辦小酌三杯敢用坐邀幸無他却頗嘗見此客不談麈生風顧安所得酒乎鄰酤踏雪請陳嘉會往日負膏肓之疾多荷扶持連年懷肺腑之親無由會集當此嘉平之月適為間暇之時敢謀草一日泥飯之歡何異三千年河清之會願竊有請惠然肻來摘我園中𬞞盤飣𥘉無異品為此席上客襟懷皆喜相知請月仲承昔擁衾聞鬪蟻之聲曾勞下問今對酒如長鯨之吸願與髙談擬大寒一日之先望清早羣賢之集蟻浮仍蠟聊索笑于梅花騎氣如虹必增輝蓬蓽請蕭定卿故舊不棄曩勞問疾于吾廬潦倒餘生合罄謝言于姻黨在嘉平後旬而先一日擬延留上客以共三杯酌言酬之竊有請也有客過茅宇跫然空谷之音携酒逰芝山乘此剡溪之興請陳君惠人生幾何汨汩塵勞之事歲聿云莫區區擬飲之謀待堯階換四莢之􅕴望庱亭來五花之馬爐煨芋栗甕㵼茅柴一簞食一豆羔聊奉笑談之樂三握髮三吐哺豈辭迎肅之勞請翁深甫疾病相扶持常懷往事故舊則不棄可無謝言敢于後甲三日之期聊為知己一杯之飲願竊有請賁然來思瞻彼牛臺郤騎攬瑶金之轡過兹蝸舍長鯨吸藥玉之船請薑用佐有患有身曽荷扶持之賜相親相近豈忘感偑之情欲謝殷勤久成稽緩草一日專邀大斾三五杯聊奉清談地罏煨酒暖如湯仍浮臘味金城土酥淨如練試簇春盤請周華甫卧痾三載之先曾勞請禱話舊片時之欵屢欲邀迎奈何日出事生至如此江空歲晚先大寒之一日集佳客之數人對月歌竹枝當盡留連之意摶拳握松子願陪少俊之歡請陳君傑饋藥感康子之意懷不盡忘置醴敬穆生之賢願竊有請大寒之前一日小席之飲片時誦陋室銘望髙軒過灰香芋栗菲然盤飣之微人立梅花忘却緼𫀆之冷請張從傑有患有身往歲幾成枯朽是父是子當時多荷扶持奈相逢傾蓋為難遂久失舉杯稱謝先大寒之一夕請小酌之三杯田家拊缶之歌嗚嗚共發故人綈袍之意戀戀相看請陳仲祥曩歲負薪之憂疊承書問今日折梅之信專用邀迎先一日于大寒會諸賔于小席煩君騎從過我蝸居觥籌衆賔之歡聊復爾耳綈𫀆故人之意何日忘之請陳伯將老無能為每有索居之嘆歲聿云莫可無良會之歡先大寒一日之期辦小酌三杯之欵願竊有請惠然肻來注玉傾銀笑田家之老瓦搖金織翠邀才子之髙軒賀符君彥遇恩劄子平地風波偶罹人禍覆盆日月喜獲天恩惟正直荷天之休使橫逆如氷之釋某有懷燕賀無奈龍鍾敢將芹曝之儀少助竹林之宴呌囂東西隳突南北笑前時悍吏之來觥籌交錯起坐喧譁想今日醉翁之樂王與金定姻三幅啓四月惟夏南風之薰恭唯某官起居多福某素聞華胄新締莩盟敢于六禮之𥘉輒上一箋之敬寅恭事上申敬如前所兾順清和之時而加調甘旨之膳行􅈾芝檢即上蒲輪某秺侯珥貂之孫猶能世顯葉令飛鳬之舄豈乏家傳媒妁殷勤婚姻繾綣令孫天生淑質兼全四德之稱小孫日誦陳編方盡三餘之力得佳偶之諧若此為大父之樂何如禮宜問名幣以將意玉郎嬌客勿戲嘲東坡之詩金縷繡𥜗想富若樂天之語新親賀冬至劄子鳳鳴占八世之昌婚姻締好犧畫見一陽之復時序更新循乃常儀賀兹佳節恭惟某官道隨陽長德與年高炯炯然若清氷英標拔俗溫溫乎如愛日和氣接人方沾賜帛之恩將見安車之召某傾心仰斗轉眼書雲寄殷勤聊折梅花諧伉􅓻將尋瓜葛日迎修晷喜添紅線之工月閏來春擬講青廬之禮新親賀七夕劄子二首瓜果庭前望鵲橋之仙偶芙蓉江上尋鴛侣之嘉盟因景物以興懷具禮文而修好恭惟某官黃山育秀緑野居間立志清髙欲追蹤于巢父無心機巧豈邀福于天孫其𥘉延露浥之餘必逺召天書之至某謀身甚拙曬腹無書卜兒曹鸞鏡之圓看合子蛛絲之喜獻芹可愧笑粲為榮華屋神仙想穿針于良夜洞房花燭宜合卺于明年月老檢書久定婚姻之約天孫分巧豈無免女之情敢循彛儀以賀佳節恭惟某官令名揭日壯氣橫秋縹眇十二樓正宜恭阮亭之錦拍塞五千卷又兼晒隆腹之書舉頭睹銀漢祥光拭目進青雲高步某俯慚蹇拙仰慕清高以瓜果之時羞問梧桐之秋信薄乎云爾歸斯受之當此時占喜蛛絲擬來歲往迎鵉從機杼織作毋勞吟草堂之詩黼黻文章但願遂栁州之禱新親賀端午劄子訂月下書幸締朱陳之好賀天中節合循荆楚之風景物來前禮文敢後恭惟某官身其蕭爽居則清高月旦有評比南州之髙士日長無事卧北忩之清風九節蒲聊用引年三年艾殊堪濟世獨醒咸羡多福鼎來某舉目葵榴馳情瓜葛雖所獻非雪羅風葛或可留付霧閣雲憲星眷起居雷同問訊角黍逹昌歜遙知盡華燭之歡兔絲偕女蘿續當有佳期之約納采道日劄子伐柯以斧言當納采之時差榖有書喜得用柔之日雖居敬以行簡亦酌古而凖今待季春更六英之蓂效野老獻一芹之禮伏祈無責必賜􅊶荒鶯語丁寧報金谷東風之信鵉籹次第看玉臺明鏡之圎問名道日劄子月老檢書幸自天而作合星翁視曆敢擇日以尋盟後中秋八日之期結佳偶百年之好竊有請也能無從乎獻芹聊效野人題葉試看流水男女之際婚姻之始禮合盡于殷勤父母之命媒妁之言願早諧于伉􅓻袁與陸三幅啓緑野春明畫堂晝永恭惟某官考槃在澗增福如川某沗在舊交喜成新好敬致鹿皮之幣敢陳魚腹之書躬問燕居首陳魚素尚兾對朱雀烏衣之景更加調紫駝翠釡之珍引養引恬善頌善禱纍世傳象山之學共仰髙風無人問牛渚之舟有慚明月鳳占既叶鴛偶期諧令愛育秀閨房生乃全于四德小免服勤門户學則誤于三餘荷葑菲之不遺俾絲蘿之為好薄言納采厚望􅊶荒春水桃花江上遣長須致鯉秋風桂子月中迎仙女乘鵉鄒與陸聘啓甫里世居門望偉鬱林之右道鄉家學師傳夲伊洛之源藉氷語以聫姻實雲礽其多幸丁寧鶯語催促鵉妝令愛夙奉母儀禮巳嫻于內則愚男勉承父訓書頗讀于中庸顧惟在飄泊之餘願早遂團圞之樂六禮之文雖簡雙親之意實殷厪兾􅊶荒毋嫌欲速逮今逮吉當歌梅摽之詩宜室宜家喜對桃花之景送芹可愧笑粲為榮新親賀冬至劄子八世莫京幸隂隲鳳占之吉七日來復喜陽生犧畫之𥘉婚姻方重于交歡節序合先于稱賀禮雖效芹羔之獻物乃如葭灰之輕餘皆削去繁文昔己感承嘉命既書雲物便約星期香閣日長看刺繡新添之線梅櫩春早遣過門親迎之車朱答李取男帖贅姻劄子某揆辰珠滴簷花翠搖門桞恭惟某官考槃其在阿在澗介福則如岡如陵某依仁居鄭公之鄉枌榆甚近贅子效秦人之俗瓜葛維新荷不鄙西家之愚乃獲中東床之選首蒙厚禮爰締嘉盟月下老既辱來前春帖子謹當納上題詩桐葉足知流水之多情寄語桃花將續仙源之盛事某伏望翠蓬星眷戬榖日增倘有委令毋吝攽曉社舉聘章用黨庠術序之良規學開鄉社求蒙養聖功之成效職在師儒賴琴堂為擇範模使編户得從規矩文風聿盛化雨俱霑恭惟某官學有淵源眼空淮海一斑窺見早逰風紀之詞千仭翺翔逺避煙塵之境適張公為江海之客知伯牙有山水之音將欲修鶚薦之書先請坐臯比之席姑鳴教鐸以俟徴車某願雲龍以相隨覩星鳳而為快敬將聘幣亟往招旌設絳帳于張林采青襟于鄭校與潔與進勿謂互鄉難與之言于勤于思即若國子先生之誨代朱弘道請張子安昆仲啓别多會少居常諷咏于停雲時和歲豐欲聚笑談于終日邀上客一杯之欵在中秋三日之先舉匏樽丹桂花前候蘭棹白蘋洲畔難兄難弟必能與吾弟偕行明月明年更約似今年同賞臨書率爾望賜惠然親家賀冬至劄子新婚交締占八世之莫京寒暑荐更喜一陽之來復佳期在邇候問宜先恭惟某官韞玉儒林濯纓芳浦髙標絶俗炯若清氷和氣接人溫如愛日蓋鍾以湖山之秀而得夫詩禮之傳棠棣聫輝才華益著書雲紀事坐評魯史之詳賦雪成名行赴梁園之召某弟兄舊愛免女新歡眷言尋合好之盟微禮作踐更之慶念因親致親者久矣視居簡行簡而恕之葭灰飛緹室之時且酬佳節花燭盟洞房之夕姑待𥘉春謹此申聞伏希丙在新壻整容致語昔年占鳳皆云家世之昌今日乘龍果見門闌之喜繼桃源之盛事留花燭之良宵魚水交歡燕雀相賀某人胸藏錦繍口吐珠璣種玉有緣聘婦投其雙璧籝金既富傳家兼以一經將畫他張敞之眉先整我潘安之貌秋水為神玉為骨人謂無雙芙蓉如面栁如眉天生一對敢陳蕪語用讃華姻詩曰一雙新偶錦鴛鴦百歲和諧翠鳯凰最喜天姿如傅粉不須湯餅試何郎伏願結髮惟新齊眉永好夫夫婦婦常調琴瑟之音子子孫孫克紹箕裘之業新婦整容致語天孫配鵲橋之仙相依銀漢秦女得鳳蕭之偶並樂瑶臺蓋居室人之大倫而婚姻世之重禮既諧鳳卜宜趣鸞臺某人珠箔銀屏繡𥜗金縷梅花點額作夀陽宫樣之竒桃葉宜人有周南國風之美眼橫秋水眉斂春山香閣移步步金蓮合卺出纎纎玉笋不施脂粉夲來如月裡姮娥若論清真尤勝似人間西子欣逢好合敢頌輿言詩曰媒妁殷勤不負人花燭今照洞房春紅絲隔幔牽情合羅帶同心結好新伏願夫倡婦隨天長地久五男二女享盛福于髙堂四德三從著香名于彤管新親遣使請上客致語兩姓為婚永結朱陳之好千里命駕當如嵇吕之交持來雙鯉之書請送乘鸞之女桞筵盛設花燭邀迎某官喬木世家耆英人物美矣育閨中秀愛之如掌上珍繡褥金屏李監宅門闌之喜瑶簮珠履孟嘗君賔客之多既當年擇對東床宜此日送行南浦金勒馬嘶芳草樓船燕簇飛花明月隨人滿路春風從如雲從如雨之子于歸星在天星在户嘉賔式燕請期劄子曩中雀屏孫謀以為幸事今觀鳳曆親迎而有良辰越流觴三日之期請合卺百年之好燈花有約梅摽及時投以李投以桃用請期之常禮宜其家宜其室締諧老之佳盟專此申聞諒惟丙在請男上客五日季春兩家合好烹葵邀上客因舊親以結新親杖藜立芳洲望早酌而娛晚酌請女上客祓禊三日婚姻百年織女渡銀河鵲橋歡諧星偶王母會瑶池燕衎早駕雲車李回徐再婚聘啓因親致親之好從古流傳舊壻新壻之詩正宜重詠魚腹聿來其書尺鸞膠將用以續絃令侄醫緩齊名以聰明旁通儒術小女姊嬃同氣乃殷勤粗習女工齊眉之案雖新坦腹之床不昜自天作合如月仍圎琴瑟鐘鼓之樂故多幣帛筐篚之將何勝前日受今日受不妨聘禮之舊雨來今雨來重見迓輪之喜回芹菲薄副楮條之答請期劄子婚姻憑月老之言幸成佳偶聘娶考星翁之曆喜有良辰催花雨正此連綿五朵雲遽然飛墮敬聞命矣逮其吉兮男女居室大倫古今所重歲月日時無昜答納幣三幅啓花朝餘景桃雨方晴恭惟某官天相間居日􅈾盛福某僣扳華閲幸締莩盟輒回魚尺之書專問燕居之敬祗詞燕申巳嚴魚甲尚兾對芳菲之景而加調甘旨之羞善保安間式副頌禱一舍相望皆住鶴溪之滸二姓合好永諧魚水之歡載笑載言逮今逮吉某人案頭燈火殷勤黃卷之間而某女針觜衣裳寂寞緑􅑵之下荷不遺于葑菲斯可擬于松蘿納幣今朝結䄜有日桃花灼灼喜婚姻如此其宜瓜􅚩綿綿看嗣續將來之盛回儀菲薄副剡條之納幣啓張知府子聘盧推官女文武才之並稱夙欽華胄齊魯論之蒹􅊰甚愧微宗知心夲出于同鄉愛子乃求其佳偶鄰封伊邇姻好維新令愛四德俱全自是閨房之秀長男一經粗習尚須燈火之工雀屏幸中于前時雁幣宜陳于此日星翁涓吉月老行成承筐之意既將合卺之期可待鐵甕城山花夾道似入桃源金斗門官桞長街將迎鵉從寸芹菲甚副楮條之賀娶弟婦劄子令弟號河東之鳳生有竒材仙娥乘月下之鵉來為佳偶禮成合卺喜溢連枝想洞房花燭以歡娛送野老芹羔而慶賀塤箎交作一家藹和氣之春琴瑟和鳴百歲永齊眉之好薄言申控厚望丙融兄督厥家重乃友于之義弟宜其室合兹宴尓之歡鳳卜有靈鴒原多喜某人胸襟量濶洪如萬頃之波手足倩親常共對床之雨稱二難于月旦行六禮于婚姻某忝在莩親敬將芹獻想鴻雁之行有喜受燕雀之賀無嫌翠舞珠歌花燭夜歡諧伉􅓻金昆玉季桃源洞盛集神仙俯樽巵小酌式相好矣請無却之瑣瑣之姻納壻欲敘團圞親親之長來賔誠為光飾再三申敬千萬寵臨祖為孫娶請親家狀抱孫至有室之年實為僥幸送女見宜家之好共樂團圞花燭將迎慈𥚑寵賁祖母娶孫婦請親家母狀孫娶而倚門龍鍾亦笑女行而結帨鵉從將臨願覩蘭姿請移蓮步萬答蔣問名三幅啓天將嚴肅月乃嘉平恭惟某官台侯動止多福某交蒙舊愛姻締新盟承書粲駢麗之文答簡致殷勤之意前陳候問上徹覽觀尚加調紫駝翠釜之珍以安處畫閣紅爐之樂蒲輪有召梓里增榮山隨蔣姓大宗久著于圗經莊用萬名先世亦稱于鄉國荷天相平居而交契宜氷人相語以聫姻令孫誦詩讀書承祖風之淳謹小女治絲執絮遵姆訓之工勤吉從鳳占喜成鵉偶擇德之𥘉心既遂問名之彛禮何多受言藏之永為好也竹開三徑相望如倚玉之榮梅贈一枝聊仰作報璚之敬請新親家翁狀愛女甚于男人皆羡安昌之比見我有此客否孰云文靖之榮請式宴以交歡望御鵉而光賁請新親家母狀降月府之姮娥佳期在邇宴瑶池之王母良會維新立侯蓬門望移蓮步謝免糧表兩浙奉蠲租之詔恩意天寬羣黎懷結草之心歡聲雷動眷斯民而得此實亘古而無之欽惟德合乾坤明同日月由生知安行之聖巍巍成功以博施濟衆之心洋洋育物干戈既戢禮樂聿新普天率土慶以來歸甘露卿雲而其呈瑞臣某等叨居劇郡幸遇明時遙瞻丹闕之光仰效華封之祝一曰壽二曰富龜疇之景福無疆千斯倉萬斯箱農畝之豐年多慶中宫箋德配一人聖政有內庭之助恩霑兩浙公租免編户之征臣庶均歡古今希遇欽惟禕衣合則垂懿範于宫闈彤管紀功示母儀于邦國厚同坤載夀與天齊臣出守微邦恩蒙大幸家給人足喜關睢麟趾之化行時和歲豐俟龍馬龜圗之瑞出東宫箋主器參萬幾之政日用三朝綸音蠲兩浙之租恩沾庶姓欽惟震長居儲離明協照星辰河嶽煌煌氣象之新車服旌旗奕奕威儀之盛夷夏咸悅春秋鼎來臣等藩守至微輿告上謝農餘粟女餘布樂謳歌朝覲之歸書同文行同倫統侯甸要荒之服聖節賀表皇天錫羡篤生聖哲之姿化日舒長馴致雍熙之治春秋鼎盛夷夏咸歡欽惟德配二儀量包六合立綱陳紀同天下之車書偃武修文舞階前之干羽蠲租賦以紓為民者之力增俸祿以養為官者之亷庶績其凝彛倫攸敘臣等叨居郡守陪列朝班黎獻為帝臣粵有唐萬邦之衆夀富多男子敢效華封人三祝之誠千秋節賀表誕彌厥月先重陽五日之期時乂惟天繼洪祚萬年之衆永隆邦邦夲大愜輿情欽惟以孝以仁惟明惟允鶴駕雞鳴而問安龍行虎步于太平乾坤篤祐丕承寶緒益衍瑶圗臣等微若草茅誠同葵藿望神樞之電徺夀祝儲宫願化國之日長恩霑寰宇冬至表龍飛御九日之師尊居丹扆犧畫驗一陽之復律應黃鍾愛日舒長普天蒙慶欽惟乾坤合德日月同明度越古今同武功而平四海制作禮樂敷文德以教兆民當亞歲之令辰納應時之洪福臣等忝居小邑阻賀大廷干羽兩階想天顔之有喜衣裳萬國仰雲日之餘情中宫箋陽生葭琯天時妙斡于玄機歡藹椒闈日晷新添于紅線掖庭和樂寰宇清寧欽惟夀與天齊德同坤厚萬乘至尊之賔敬雅重禕衣六宫內則之教修尚勤玄紞再逢令節益介繁禧臣等微若草茅誠同葵藿履長今日宫中奏式燕之娛習美成風天下賴關睢之化東宫箋七日來復陽生緹室之灰八表依歸位鎮東宫之久欣逢令旦茂輯嘉禧欽惟天生聰明日新成德能仰承于聖訓用參贊其皇猷視金鏡以納忠義崇風紀奉玉巵而上夀恩重天倫邦夲益隆輿情允愜臣等叨居下邑賀語前陳夙興視膳而問安更有書雲之喜賢佐保躬而傳道尚論愛日之誠正旦表普天率土幅員歸一統之𥘉獻歲發春正朔屇三朝之始時調玉燭喜溢瑶墀欽惟聖德乾剛神功震赫蕩蕩乎如天之大人所難名昭昭乎如日之升物無不照履始和之吉月嚮洪福之萬年臣等忝牧邑民阻趨廷賀鳳曆頒春于天下化及華夷獸樽置酒于殿南前樂聞忠讜中宫箋四時成嵗􅥐逢泰道之春亨萬物資生實仰坤儀之盛春回寰宇歡藹掖庭欽惟位正禕衣功盛玄綩風教天下關雎正始之音朝夕宫中卷耳求賢之志履端有喜介福宜多臣領邑羈縻望闕稱賀紫宸配德新年布澤如春彤管流芳億夀與天同載東宫箋正月之吉始和輿情共悅維天之命不巳嗣服益隆春藹青宫祚延蒼籙欽惟長為主器允應貞符親傳精一之心淵源聖學參決萬幾之政黼黻皇猷迎新茂對于良辰端夲繼承其大業臣等叨居縣邑阻賀宫庭鳳曆頒春
