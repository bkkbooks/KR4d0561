front:
  text: 龜巢藁卷之十八
  hash: sha256:4e61e4335454a39b5b4c6ba9f88abd64cca458aa9af67ea73c9ea5f9eada45c0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0561_SBCK_018-1a}
body:
  text: 題跋説雜體題陳松居所書昌黎詩後僕早歲誦符讀書城南詩嘉韓公敎子如此其切意其子必楽有賢父之敎而成學及以他書考之符也果能登長慶進士第斯亦可謂不負其親矣然而為集賢校理乃有誤改金銀之繆改金根車為金銀車噫是豈以擢第之後遂弗䆒于學欤今觀松居先生筆韓公之詩以示其子先生之心即韓公之心也爲之子者得不以公之心爲心乎仲野今學優而仕方且以學軒署燕居之所懃懃焉懇懇焉佩服父訓爲學不厭夫如是視韓公之子有間矣昔人有言顔何人㢤希之則是况希韓乎僕雖老尚刮目以俟時洪武五年二月𥘉吉毘陵謝厶書題太乙真人圗按韓子蒼之詩曰太乙真人蓮葉舟又曰龍眠畫手老入神此葢題李伯時畫也所謂真人者姓名時代考之列仙傳等書無之不知其果何如人然以蓮為舟偃然髙卧風神蕭洒非有幻化之術能真蜕骨而仙者疇能若是乎是圗摹之妙較之龍眠筆法人無間然其必善學而得其神乎神仙有無姑置勿論夫君子玩物以適情耳當此金革擾攘之餘人皆埋頭塵坌欲超然物外之逰而不可得覧是圖者當心融神會與博望之槎琴髙之鯉金仙氏之浮杯踏蘆者同適其適不止論形似而巳宗礼求予言俾題其卷云云書歴代䝉求後世俗以千字文為啓䝉之書尚矣然使之識字而已餘何益乎是書亦四言為句便為習讀自羲農以来𢾗千載世代盛衰暦𢾗脩短粲然可見授䝉童令熟記而知之豈云小𥙷㢤觀者其母忍焉厶年月日龜巢老人題題子昂竹石昔文敏公𥘉赴京師過毘陵止宋人東臯先生家人多求公翰墨後仕于朝徃来霅上時先生數從之逰因得公書画凡數幅内竹石一𥿄公題小詩絶類此卷吁公𥘉以書名于時其画與詩皆本絶妙今此卷偹焉有區區未昜賛述者特以予家藏舊物皆亾于兵眎今又隔一宇宙捧玩再三不勝慨惜題敬親楼詩卷後丹徒陳彦芳既葬其親于别墅搆楼以奉先祀扁曰敬親示不忘也夫死者魂氣歸于天形魄歸于地故廟以妥神墓以藏體廟必于家者神依于人也今彦芳奉祀别第其有徵于古欤抑其心有得于敬親之寔而非矯焉以假其文者欤夫目之所視而思從之登斯楼也丘壟在望松楸蔚乎其前知吾親之藏于兹也與其族之人時而至焉固将羙墻而見之抑是室也吾親之所種樹今則拱焉吾親之所燕逰其遺跡在焉彦芳即是以思其親其有不起敬者乎詩曰維桑與梓必恭敬止延陵季子曰骨肉歸復于土魂氣則無不之也彦芳之心其有徴于是欤因書以歸之觀奕圗世謂觀碁者恒髙于當局之士予曰不然頋其人智有優劣亦係乎用心之至與未至今觀是圗冩對奕者二人其風度閑雅皆若聊尓于奕坐而旁觀者一人則注目碁局凝然若精思入神或一着可以决勝負而未昜語人者熟視其状殆猶陳平患諸吕燕居深念不見陸生入坐題山谷香嚴偈圗墨跡宋髙宗學廢于五季至夲朝蔡㐮等方入格律蘇黄米薛各有㫖趣然則山谷之書為一代名筆豈昜得㢤題䴢氏家譜凢為譜諜者徃徃追稱先世勲業之盛世代遼邈変革下常茫然紊然有未昜考者或乃致遥遥華胄之誚君子恥之今覌崑山麋氏子才家譜則不然世祖至金紫光禄公為髙祖之考然後旁及羣從至于人所不知之地天其報之如此家譜之作葢欲後人念祖修徳象其賢行其澤非直為覌羙也詩曰子子孫孫勿替引之亦予亦誦此為他山之助云䟦許氏臺萊集予嘗以天之福善禍滛騐諸古今其理未甞不焯焯也若曺彬曺翰皆宋重臣以彬之賢屡世榮顯翰肆貪暴子孫飢寒當時史官特並書之以示勸懲豈不信然今覌宜興簿許侯克敬所示臺萊集譜其族自南唐金紫公居番迄今垂五百年其間擢巍科登膴仕者代不乏人非尋常世禄之家所能及也其從兄徳夫為金紫公十六世孫以舊編所紀畧于名爵詳于行義乃重著而偹録之諸先生之潜徳幽光燦然在目然以愚觀之必又有多蓄隂徳黙契于天者雖子孫有所不知閭里有所不聞國史郡乗有所不能傳載天其相之𥙿乃後昆所以綿延盛大至于如此不然何世代屡世昜而許氏之澤愈乆而愈不冺耶詩曰無念爾祖聿修厥徳又曰子子孫孫勿替引之愚請為克敬誦之以為祝規併筆于卷末而歸之時洪武七年夏五之吉毘陵謝厶䟦族葬圗河南保定趙先生所著族葬圗其説夲乎周官參諸衆論尊卑昭穆燦然有倫使覌之者心生孝弟亦猶覌老泉氏族譜也如是葬其親以去其風水之惑于名教豈小𥙷㢤先生諱炳字季明其經學徳望為中州儒宗至元大徳間七聘方起官至翰林承㫖學士平居多著述若四書選注等書皆有功斯文愚恐東南之人有未知程伯淳者故粗述于圗説之後􅍢版而傳之詳見元史䟦蘇魏公百韵詩後古蘇魏公百韵詩叙平生出處行事之大節謙言為家訓也然字字句句皆足為世模楷豈特一家之訓而巳㢤若考亭朱夫子西山真文公諸大賢咸有賛述區區後學尚何言欤甞忝與公之裔孫景瞻父逰䝉出是詩警敎甞謂厶曰名敎有餘樂異端戒多紊只此二句有終身行之不盡者葢其服􅈾祖訓力踐正學卓然不為異端邪説之所惑故有是言時厶軰知所向慕者亦幸頼私淑而加勉焉嗚呼瞻父既殁世亦随変瞻父之子若孫家燬于兵獨珍藏是書出入戎馬間三十年與身俱存且能奉庭訓不滛老佛亦可謂不負魏公垂訓之意也厶重獲覧觀儼對瞻父晤言敬書此以寓感愴䟦脱時敬參政手書字書心畫也能覩其親之心畫而知其志焉斯可謂能子矣今觀髙郵同守畏吾氏伯堅于兵革之餘得乃翁脱公大參所書晝錦堂記如獲重寳愛之敬之不啻若其親之在目其殆著存不忘者欤愚甞論歐陽子之為此記也葢知韓魏公之志在于徳𬒳生民功施社稷故以此二語為一篇之要大參筆其文得非志魏公之所志乎使伯堅灼見其親之志曰徳曰功當知勉其所以繼之者是則愛敬之心又推之于書字翰墨之外能子之道必如是而後盡耳昔者辛亥秋公來毘陵適予復忠公墓田築祠立碑公為之大喜甞以祭弔之文示予而徃焉時所書端謹鄭重視此篇筆意瀟洒神氣飄逸有不同者此足見其字學之妙不滯于一偏也於乎落月满屋梁猶疑見顔色况心畫乎想像髙風不勝起慕敬書此以告伯堅併抒所懐云書安撫陳公䟦先君小像自賛後昔者狄節使却梁公畫像世固稱之若先代遺容遺言如安撫公父子者其後人當瞻視如生存敬恭如侍側勉焉企及之雖時有汚隆命有通塞有不克奮力以纉先緒然所以是是非非不避權勢赴人急難如救頭然是皆起懦疾之薬石也慎母以狄公藉口而藐視厥祖如途人然詩曰無念爾祖聿修厥徳軒冕云乎㢤閥閲云乎㢤今安撫七世孫茂吾婿也出示石刻祖像併覧賛䟦起敬起慕因題其後如此云䟦張氏家譜圗右番禺張氏家譜圗知常州府事中憲公度倣歐蘇族譜為之由七世而下瓜􅚩延蔓尊卑䟽戚瞭然在目中憲需予言予于是窃有感焉書首九族詩重同姓吾夫子甞刪定二經垂訓萬世其敦夲之意至深切矣若夫大小宗之法葢推廣之後世宗法寖壊世敎日哀然天理民彛未甞冺絶東平九世之張江州百口之陳亦代有之若文正公則能以祖宗之心為心贍族有田䟽逺畢給真可謂不負詩書敦本之意今觀中憲公追念厥祖留情譜系惓惓如此他日參大政得厚禄如文正可為之時以是心為之吾知文正公不能專羙于昔矣楊子雲曰顔何人㢤希之則是愚于是亦云䟦吕仲珪孝思卷夫為人子者或不幸于飬生送死之道有未盡焉處理之變當從權以事其事豈徒抱终天之戚而巳哉今觀崑山吕仲珪氏早歲以父命出贅不能奉甘㫖後其親旅殯白下去家五百餘里又不能春秋省埽以寓哀思服闋𢾗年痛衋知昨與人言輙流涕葢仲珪以孝有不及情不能忘如之何而可惟所謂權宜用釋氏荼毘之法函骨而歸葬之故土宰有楸梧祠有蘋藻焄蒿悽愴常若見之則其親之死猶不死若夫繼志述事或出或處樹其業以慰其親則諸士大夫頌羙孝思之言斯足徴矣䟦凌克禮父子孝感詩文後昔聖人以子騫父母昆弟之言而稱其孝葢人之善事親者必先目之口之于同室之人而後一鄉一國熟聞而著稱極而至于流芳天下後世矣前數年客有過毘陵者説潤卿父子之孝吃吃不離于口予來婁江婁之人咸譽之既而盧兖州子長嬰以趙徴士用晦所贈孝感序併諸士大夫歌詩凡若干篇皆夲乎其父母昆弟之言予然後知潤卿二子長克仁次克礼能罄家輸粟以贖父罪去之日奮不頋數千里危難争先而徃吁昔趙礼兄弟遇暴将腐食之其兄孝曰吾體肥可代吾弟若克礼事雖不同其亦趙氏之心也欤然或者謂是亦常人所能為予故原其心而論之如此豈易得㢤今而後凌氏五世而居重闈色飬曰父曰孝其所以盡其孝道者固不止于是也洪武十六年夏五龜巢老人謝厶䟦䟦陳寺丞思愛菴䟽右故寺丞陳公以思愛菴奉先䟽請果上人主之駢洒精切字畫端勁其為人可知寥寥二百餘年為果法嗣者不知凡㡬代是菴易名圓通葢亦有年公之䟽文幸而無恙今性中師弟子知敬重之求士大夫題識予于是窃有感焉宋之文憲礼楽盛于漢唐然當時世家如文潞之有家廟者絶少以請寺觀為香火院者滔滔豈礼樂不明淪于習俗以致然乎今性中知其文當知其心知其心則知所以敬其先世者在是乎菴仍舊名庶存𥘉意則名正言順而奉先之事終于有成寺丞公之死猶無死也豈徒重其文而巳㢤跋岳氏族譜岳氏為常之望族舊矣予蚤歲過唐門見其第宅相甲乙者數家且聞竹山蔣先生言宋乾徳間岳王弟經畧使之孫自九江来居由宋而元子姓蕃衍文物之盛㧞萃同里比以陵谷変遷奕葉憔悴東之懼譜諜散失嗣而緝之猶老泉蘇公譜其族也泉之言曰觀吾譜者孝弟之心當油然而生吾知東之亦以是有望于族人焉或謂昔者狄武㐮不後梁公君子韙之是大不然非其後而附之者非也為其後而自外之者尤非也故人苟能以東之之心為心由孝弟以行吾仁則民吾同脃四海兄弟無徃而非仁矣然則族譜之作豈小𥙷㢤時洪武十九年六月既望龜巢老人謝厶敬䟦䟦經訓啓䝉右經學啓䝉北溪陳先生之所作也先生經學得考亭夫子之傳卓然為一代師表病世之訓䝉者所敎龎襍蔑養正之功故采摭經傳以三字四句為句緝成韵語以便習讀其書言孝之大原學之㫖要使㓜學者誠能熟讀而藴之于心飬其徳性既長而施諸事業則舉而措之耳厶嘗避兵東吳得此書三十餘載郡人徐孟容孟曽等見而寶之謂明珠暗投良可惜也用是刻版以廣其傳於乎先生著經訓以敎羣䝉葢以聖賢之心為心視龎襍之書蘭飽不同俱化之效乆當見之凡為父師者可以慎其擇乎程子曰習與性成聖賢同歸吾于此亦云洪武己巳九月重陽日毘陵老諸生謝厶拜手敬䟦張孝子傳張孝子小字阿伴常之無錫人也為兒時父母以歲飢去鄉土流離四方後徙居晋陵之東洲未㡬父卒兄亦早世家益貧母查氏傴偻不能任婦事中歲復多病常在床席伴傭力黄氏仰給之黄氏工染色体因學焉乆而遂精其業主愛之歲益其值伴身完衣其奉養之具則随值而豊時得一羙味必歸遺母母或分飼之則紿云巳食母盡之則喜當暑月每夕則􅌊蒿艾以去室中之蚊拂枕席以安母寢隆冬雨雪爐不絶薪夜必燠母于懐如此者二十餘年服勤于親殚力于傭未嘗一日廢其事怠其志也母夀六十五以天年終伴痛哭㡬絶先數歲預营葬具及歛之日即舁棺歸無錫合葬父茔今墓木巳拱春秋携酒肉省墓必邀至隣里飲食之拳拳焉為保全丘壟之計平居遇飲食適口猶常動風木之悲或哽咽飲泣徹而浚巳且以親在之日仰食黄氏㴱徳之効力愈謹或者常欲倍其值募伴不從於乎斯亦可謂義焉耳今鄉人特嘉其孝稱為孝子云賛曰以魯騫之賢又親炙聖門得學問之力其孝宜矣若伴之㣲生長陋俗目汚凶徳耳習誶語乃卓然返哺跪乳梟獍之羣使逰聖門而學焉安知非曽與騫之徒欤區區受傭于人又能以力報効乆而弗忘吁世之朝爵禄而暮叛亾者其人能無愧乎錢孝女傳錢孝女者吳郡田家之女也父母喜其性婉順納婿與居洪武𥘉兵火歲餘徙家常之三山湖服勤婦工兼力農畝搰搰共養其親父卒母老而病踰兩期腹中有瘕癖號呼痛楚女甚憂苦每中夜礼佛龥天拜跪懇禱一夕潜以刄刲股給其母為他肉熟而進之連年之疾即刻而愈既而隣里以其母無號痛殾故詢之知其然衆皆驚嘆女姨母吕氏為吾隣嘗詰之言其平昔細行多不可及乆而益勤至不惜其肢體斯亦可謂篤孝也欤論曰昔鄠人之孝同于錢氏昌黎伯固常非之其言葢本諸經以毀傷為未善也然閭閻匹婦之愚礼敎不知一念之誠根于方寸通乎神明而孝感昭著如此豈昜得㢤彼薄俗之不頋飬者聞錢氏之風亦寕不泚顙􅉭背恧其心而知悔悟也欤諸葛莭婦黄氏傅黄氏名真静丹陽縣吕城諸葛用中之妻也父家晋陵以其女生有淑姿善女工父母鍾愛擇配數年聞用中為免時過驛亭適南臺監察御史普公見之以其能属對摛大字甚隹呼為竒童聪慧之聲洋溢四境故黄氏之父以女許嫁之既嫁而翁知其能遂托付家事使其子得專儒業翁殁其夫婦皆能以翁之心為心服勤如𥘉賔敬之礼弗渝肥家之功益著飬子作而愛不姑息凡鄉里為父為母之賢者咸儀之元末兵興夫埽挈家竄吳下蒿簮卉服藜藿食飲艱苦十有餘年夫病而亾哀痛㡬絶吐肝胆告之柩前曰未亾人真静三年服除當星冠羽衣若女道士以終其身有所否者天殛之由是敎其子以承宗國無沗厥祖洪武改元于鴻雁安集之𥘉歸葬其夫命其子復舊業什有二三餘皆棄置葢亦知止足之義而無殆辱也數年之後又能樽其餘力助羽流重搆清㣲觀以祠先世身佩符籙日誦老氏書貞節愈固今春秋七十有二鄉人甞欲聞諸官以旌其門婦曰夫死不嫁吾分内事耳卒不許於乎婦有節義礼敎所嘉况能継述以昌其業以𥙿其嗣續豈㝷常守節者所能及㢤予常徃來常鎮間聞諸邑人質諸鄉校無間然者故撮其要而書時洪武二十二年三月之吉長白山居圗説客有過予者雨􅑵㷊香相與覧髙沙李侯山居圗客謂予曰世謂畫為無聲信矣徃者李徳𥙿以軒冕之貴䟽平泉之逰賦詩憶之是圗之作亦其詩之意欤予曰不然平泉花石以力致之窮奢極靡葢溺于玩物者也夫長白山天然勝槩為梁鄒冠冕甘泉巨谷嘉木幽卉蔚有清氣昔范文正公讀書其間􅐽茹糜食與山俱清卒為一代名臣今侯鍾兹山之英人品卓絶學亦如之至于擢髙科參大政岀處繼范公故武山中猿鶴豈云忘情但時方敭歴中外若安石為蒼生而起奚暇復頋東山乎是圗也侯葢黙寓家居讀書之意以示其子孫抑亦示不忘桑梓之敬焉耳平泉之書豈其比㢤客唯而起俾予以所答之語筆之圗左俟侯見而質諸月泉説學老氏之學宗乎無為而能無不為者惟其心之清明洞徹不泥于物所謂圓机之士為能然耳吾友闞伯真殆庶㡬乎漢天師四十二代孫張公大真人甞以符籙授伯真矣伯真宗其道行之于家黄冠鶴氅蕭然出塵然而隂陽醫薬巫卜之術又旁通至于桑海変昜溷跡塵土亦未甞忘其學離其道也真人嘉其能乃大書月泉二字為伯真號吁名者寔之賔也月泉之稱豈苟焉而巳㢤共推千載心秋月照寒水昔吾朱夫子有是言也今真人直指其心而喻之所以警伯真者至深切矣夫是心也誠能皎然如月之明湛然如泉之清無幽不燭有感斯應雖以膠膠擾擾之物紛乎吾前而吾之至清至明者葢自若也然則圎机之士不㡬乎和光同塵升老氏之堂而入其室乎伯真勉乎㢤無知生説夫人與萬物同生兩間而其所以不同者心知之靈耳彼巢而知風穴而知雨鳴而司晨吠而警盗知恩而返哺知飢而避去若此者亦未甞蠢然而巳人而無知可以不如物乎吾友趙君執中生而聪明又甞用力于格致之學行年三十號無知生故聞者不能無疑焉或謂執中以時俗尚智術飾巧詐狡獪萬状深疾之将欲塗其聪塞其明矯俗之弊以返乎不知不識之天寕為蚩蚩之民而不知也予曰不然若是則因噎而廢食矣吾意執中讀孔氏書尚友千古觀聖門髙弟賢如顔子聞一知十方且有若無寔若虚終身如愚人然况學者乎故雖多識前言徃行而自視欿然猶無所知也然則名為無知寔欲求知其所見之大為何如㢤予甞扣之執中執中笑而不答故筆此觧或人之疑併勵吾執中亦以自勵云子京字説父命子名而朋友字之禮也吾友張君伯祥之子名畿予固知其愛子之心期以逺大字曰子京且為之説曰京畿人海也五城十二楼金門玉堂冠冕佩服舘閣之文物羽林之劍杖璚林大盈之府庫凡如此類皆天下所無有寔為魚龍変化之地也故有志之士雖在窮髪必勇其行乗風雲呌閶闔瞻日月之光𬒳雨露之恩然後為無負也今子京年方强壮一日千里弗忘命名取字之意不然則齷齪與蓬藋同腐徒羙其名何足尚㢤存耕説為孫允昭州判作客有遇存耕叟于龜巢者商畧今古劇談乆之客謂予曰叟方膴仕而暇耕乎不耒耜蔑畎畝耕可得乎予曰不然善觀人者于其心不于其迹夫以其迹論之叟固甞主一邑之簿矣甞為一州之倅矣然方寸之地了無荆榛耕之以礼耨之以義存而遺之子孫故于昔人之言取以自號以示無窮之意耳吁以其遺較諸徳公葢亦大同而小異欤且天生斯人亦莫不有耕耨之具焉但徃徃荒穢弗治暴棄而自失苟存之則其後之人以耕以耨以收其成功乃必然之理何泥其迹為㢤客語塞叟起而謝曰詩云他人有心予忖度之巢翁之謂也請以對客之語貽諸後人自曰存耕説云龜巢翁者毘陵謝芳氏也景中字説尼山聖人筆六經以詔萬世中之一言間見特出既而子思子著書以授孟子寥寥五千百年知者葢鮮至伊洛諸賢發明藴奥昭如日星後之人敢畫蛇而添足乎然所謂景者景慕以兾及之學者之志也中則人所受于兩閭與生俱生無物不具學之道必先知無不明而後行無不當窃甞以射譬之物理之中猶射之的凡射必先知其的之所在謹乃弓矢正已而射之斯可言中矣不知其的而射者妄也妄而或中乃偶然耳吾無取焉惟時中君子従容中道無適不然是妙于射者也詩曰髙山仰止景行行止如此則思過半矣景中勉乎㢤不然執中如子莫中庸如胡公不免為天下後世之誚此又不可不知也徳宏字説東村趙先生為前代遺賢今其四世孫名廣姿禀之淑善讀書兼明古今法律以勲業自期不狹隘以自局故朋友以徳宏字之請其説于予予曰人生天地間渺如一粟謂其能與天地参者正以執徳之宏心同宇宙萬物皆偹于我萬化皆岀于兹所謂小無内而大無外也勲名事業葢亦随其廣狭大小而成焉若夫方寸之衷彼疆我界藩籬荆棘雖有所得蓄縮如蝸不免貽笑于大方耳然名者寔之賔也名浮于寔者君子恥之夫以子為東林有道之孫貽謀未逺其立志果不小乎報徳果不虚乎昔孔門諸弟如曽點􅃮雕開能見大意聖人與之悦之使學者誠能有二子之見以弘厥徳則宇宙吾心也吾心宇宙也曾何人㢤􅃮何人㢤希之則是慎勿謂老生常談而忽諸寳山字説予聞浮屠氏之所寳者三曰佛曰法曰僧如金銀珠玉之属為世所貴雖以七寶名之較諸佛法不啻霄壌故瞿曇氏在祗園説法有曰人以七寳厚施而求福者莫如般若一言持之于己教之于人得福為多由此觀之金玊之寳積丘山何足貴哉今趙居士拱貞有志學佛在家出家浮屠師以寳山字之其意若欲使之歆艶而得之是亦意其為善也不然郿塢積金賈燃臍之禍銅山鼓鑄致餓死之辱凡如此類識者恥之况𣣔使之歆艶乎楚書曰楚國無以為寳惟善以為寳如是而言則語意明白開示以導其進庶可謂善誘人矣居士徴予言予無可言者請以楚書之語語之於浮屠之言或可𥙷其闕云學古字説先友丁徳齋徃甞以家譜示予曰五世祖為寳祐相國多藏古聖賢書厥後以陵谷変改家用淪落書亦飄散元𥘉大父乃徙居鄉城以慈㓜齋醫薬如成都賣卜者焉他書無復有也今徳齋㣧子斆喜讀軒岐靈素之外嗜六經諸史不啻膾炙故老夫以學古字之謂曰古之學以三綱五常為重綱常不舉則無以立身身不立則道不行于妻子况餘人乎然道有大小事有緩急必先其大者急者後其小者緩者母泥焉古之人巢居穴處無宫室也茹毛飲血未稼穡也凡如此類苟一切是古非今舍此取彼不㡬乎迂踈放誕而行怪者乎吁居今之世反古之道灾必及身子思子垂訓後人為世薬石此尤不可不知也學古宜慎諸聼其自然説為黄仲噐作老夫黄仲噐以聼其自然四字掲諸齋居一日載酒過龜巢需予文予以不知其言出何書意何在莫敢妄為之説仲噐曰吾意天為自然餘無所知也予以是臆度而告之曰物本乎天而天宰之者理也夫所謂自然者如隂陽之消長日月星辰之運行江河之所以流山岳之所以峙草木鳥獸昆虫之所以動植変化至如人大者如三綱五常富貴貧賤死生夀夭之類小者如四肢百骸飲食衣服宫室車馬之属皆夲乎自然之天昩者乃𣣔以人勝天而不聼之若季孫氏以魯大夫僣天子禮樂富于周公秦皇漢武𣣔長生不死者未嘗不自禍其身也孟子曰順天者存逆天者亾斯言盡之矣仲噐作而謝故書之以警諸紳示諸人亦庶乎有所警云無名異江湖之濵有物焉其大如菽圎如撱黄而黝外强而中乾似沙非沙也䃯非礫也纍纍乎沙䃯之中不知者直以為沙不然髹者得之以和銅􅃮之漬昜燥以昜益堅否則工雖良弗能使之燥也况堅乎故善髹者率用之以其有竒用而無名故以無名異目之邑有雷氏者髹𢾗丗矣其亦老于髹矣每役大夫士家則以是詢之卒未有得其名者一日語予而悲之予止之曰是奚足悲哉夫君子負有用之材没世而名不稱者滔滔也况㣲物子噫世之用人者其亦有如雷之悲者乎蛇蚓五月望余􅋈舟城西見牧竪𢾗軰飲牛而過河俄有走而號者曰蛇将囓人竪皆失足色巳而聚觀果伏草中昍舌掉尾吐毒氣勃勃可畏羣豎𣣔殺之擲礫如雨蛇度不能脱乃㳺于河猶昂首騰踴作囓人状旁覌有不勝憤者持短挺涉水撃之應手而斃衆皆􅌚譟而快予既歸明日過白鶴溪上時暴雨潦水盈溢而蚯蚓縦横于途途之人殆不能容足先予行者三人老一壮二皆擇地而蹈不蹂踐以殘其生吾如之回視吾蒼頭亦然予因是窃有感焉夫蚓内無筋骨外無鱗甲苟𣣔殺之斯湏可累百千今若此視城西之蛇不侔矣噫蛇𣣔害人而人害之蚓則無害而人亦弗為之害非有所厚薄也人而蛇者可不悟哉盟鷗文為熊元脩作鷗社叟老于元末屡聘不起遂屏迹五湖三􅍩之間魚鳥為伍睨京洛萬人海中鳳有池鶴有軒鷹揚而烏集紛紛五鳩之属簉羽鴛鷺為時羽衣是皆出類離羣弗與吾友而吾亦弗為之友也惟鷗也素服涓㓗野性閒雅且常與叟相親荷風葦月雲濤烟浪凡可以適吾適者莫之與之共之一日舉玄真子天随子乞靈為鷗社主盟而矢之曰鷗乎鷗乎尔忘机吾亦如之恒游居于斯又曰鷸自蚌持鵬自溟徙斯盟或渝者如白水時龜巢老人亦奉觴㰱吳淞之渌而與盟焉乃丹書其辭招隐論夫連城之璧藴于荊山明月之殊藏于滄海苟非識者有以取之則希世之珍不能自衒而自鬻也隐逸之士葢類此耳嘗覌古之隐者如荘周所稱善卷許由樊仲父之流土苴天下雖唐虞聖人之事皆為汚耳此葢荒唐謬悠之談無足深信請以商周以來經史所載拔其尤而論之伊尹耕有莘之野以成湯所知致聘再三遂為阿衡不然則終于犁鉏之甿矣傅説隐于商岩以髙宗所慕圗像旁求乃得為良弼不然則終于版築之夫矣周之太公海濵而處坐茅而茅而論漁非文王載以後車則無鷹揚之功武成之日矣漢之四皓茹芝商山其不赴髙祖之招而從儲君之逰者葢為炎劉氏基本而岀其大功為何如㢤若夫淮南王八公之徒大山小山之什其文藻才華不為不盛然未聞為朝廷得人使之康濟斯民故君子無所取焉至如光武中興之業海内之士雲集響應而嚴光周黨獨能以節髙之或授官而不拜或廷伏而不謁卒歸江湖欣然與魚鳥為伍惟其清風峻節砥柱頽波誠有禆于世敎也三國六朝而下求其如南陽布衣鞠躬盡瘁以報其主三頋之勤者固少然徴舉遺逸代不乏人但燕石或偽為荆玉魚目或悮為隋珠不免有純盗虚殾之誚者矣今郡縣之職歲舉人才是亦古招隐之遺意也惟能知其人而取諸岩穴之間度其才而薦之朝廷之上鉅細精粗各適其用此誠輔聖天子恢弘治道之良法也詩曰濟濟多士文王以寕夫士也為時而出其必有以古人之所寕文王者以寕今日之天下國家母徒視終南為㨗徑云東野吳語許慶一者崑山縣石浦人也贅同邑許家墩繆氏既而父殁母食貧徃繆氏依焉慶一妻不孝于姑天歴三年六月十三日将晡其姑以飢訴隣人許夲空適安亭陸省磧澳魯道在坐且與繆姻戚遂同徃勸説之夲空以其釜中所餘飯飼之婦奪而覆户外曰寕以犬食本空等方怒罵厥婦婦毀姑不輟且指天誓所毀不妄時片雲起西北俄頃烟霧四塞晝暝如夜霹靂震地里中大駭獨其家無聞焉夲空等但見有白氣如練縁灶突下垂三人則恍然若有推出之者跌仆在地大兩傾注平地水溢湧踰半尺屋㷊婦震死然隣居相接畧不延燎媍死至夜復甦遠近驚異媍姙𢾗月或者謂天不忍其腹中之子故耳由是媍方知惧飬其姑以夀終今媍年六十有七當時所震者生女四十一歲矣洪武壬子冬毘陵謝厶過許墩許均善家聞其詳如此嗚呼孰謂天爲茫茫耶屈東海之媍而旱乾悲齊堂之女而振風炎霜降獄荧惑退舍其響應若此者巳多矣豈特斯媍乎然天即理也人不順理是爲逆天順天者存逆天者亾葢皦乎其不誣也雷震之事予特欲使昩于理者知有所警故筆之癘鬼辨徃予過無錫適州人出郭迓神赤髪青面吻出兩牙狀極詭異旗旄鼓吹衛從而舁之予甞訝而問焉人曰此唐張廵也且言公死時自謂當為癘鬼故世稱公為疫癘之神而崇奉焉嗟夫是何邪説者附會如此耶按唐史公守睢陽如一木支大厦之踣兵盡力竭死不忘君故發憤曰生不能報陛下死當為癘鬼以撃賊此葢忠義激烈之辭豈謂為癘鬼以害天下後世之人哉所謂癘鬼乃泛言剛癘之鬼若韓文駈癘鬼之癘相似非疫癘之癘也誣枉前賢㒺惑後人邪説之害一至于此可不辨哉苐恨老無能為不能為州人毁除滛祠一洗習俗之陋區區謇言用吿來者重建縣學事寔皇明革命政敎一新設學校置師弟子員以敎以飬以求其寔效非疇昔文具比故官于郡縣者常以是切切也洪武五年武進縣知縣臨川董縣丞江隂陳公以縣學弊隘僉議昜之既而乃革俸搆講堂三間其楹軒如堂之𢾗翼以兩齋齋各三楹敎官等齋廬庖湢之属又十餘楹由是師生有講堂居息之地矣明年春視夫子廟棟撓柱折惧将壓焉曰殿曰廡曰㦸門及靈星門皆撤而新之聖賢肖像重為修飾而邑人具瞻之敬葢益崇矣又明年規射圃于學之傍為門三間闢門道南向深若干歩而外户閽人守之凡廟學計若干楹其崇廣皆比昔有加地皆甃甓繚以周垣樹之嘉木輪奐之羙丹碧之輝煥如也厶窃惟前元時武進縣𥘉無學宫所設敎諭附郡學廩稍至厶厶年有司剏始記者謂病地弗弘葢苟焉而巳今吾令與丞皆儒而官故能以興學爲已任前主簿登萊尹公及今簿澤州張公相繼翼賛以底于成民非不役也而役之以時故民忘其勞且有樂助其才力者皆賢長貳祗順朝家敎學之意而邑人化之又能心長貳之心也育才之盛當自兹始真可爲斯文賀辨訛夫江南滛祠在唐為狄梁公盡毁唐衰礼廢繼以五季之亂妄意邀福謟非其鬼泛然以大號加封紊雜祀典祠廟滋多里巷間土地有祠葢肇于此然以民情推之必以農榖之功本乎土地歲時祀享亦近乎報本之意迨夫廟貌之設無可為像遂以鄉之有爵齒者當之既乆而世代變革承訛踵謬至有可笑可怪而不可觧者姑以前目言之郡城西南三十里曰梅村廟稱三姑其𥘉必曰厶姓三孤之官後乃訛為三姑也按周礼三孤之貴等于三公即後世所謂少師少傳少保是也村甿巫祝之流無知妄作以孤為姑又城之北東有稱十姨者必拾遺之誤雨淋者必羽林也夫以十姨為一媍人以雨淋而不室處是則可笑也巳至若三孤乃􅌂然塑少艾三人冶容羙飾衆所具瞻且復變九里塘為九女以附會其無根之談蠱惑人心傷敗風俗有不容不辨者改而正諸宜自兹始吁甚矣人之好怪也昔蘇長公之詩曰舟中賈客莫謾狂小姑前年嫁彭郎葢江州有大孤小孤之山澎浪之磯其俗亦訛孤為姑訛澎浪為彭郎公戯而􅏺之意甚明白有足以破其惑矣如厶者雖䆒明其灼見其非無狄公在位之權又無蘇子名世之詩請與鄉之士君子追原俗情遵依法律撤去繆像題其主曰土地三孤之神如此則可以正訛傳息邪説合今朝之令典释舊俗之羣疑且不失其𥘉報夲之意若夫埽滌滛祠行之四方有不在我者不喋喋也芻蕘有詢尚俟他日釋異古禮人之𥘉䘮所以待三日而後小歛者葢兾其或再生也今吾子死终日而甦無足異者但沐浴衣裳神色不亂命諸生筆遺嘱二千餘言言有倫序視其字之誤者索筆為塗改之比常人之死固有異焉至若啓􅑼之日經盛暑兩月不臭不腐靣色如生則其異甚矣宜乎言君子墓誌不書此葢遵聖人不語怪之遺意雖然吾嘗觀晋書盗發尚書令卞公壺之墓壺屍僵且握拳透瓜宋劉忠顯公韐靖康中使金不屈而死之燕然愍其忠菆諸西岡凡八十日金退方歛葬顔色如生史皆不誣矣又如元鳥生契履武生稷説者謂神人之生異于常人麒麟蛟龍異于犬羊魚鱉夫死生一理也有生者之異于常則死而異者何足怪㢤區區所以言者非諛子也非好辨也公天下之理而論之也前軰有曰千人萬人中一人兩人知殆謂此耶噫請除滛祠文先王祭法載諸禮經曰法施于民曰以勞定國曰以死勤事曰捍灾禦患者則祭之非此之属皆滛祠也是故狄梁公盡毁滛祠程子言除滛祠而後民爲善葢滛祠不除則愚民無知将謂福可謟求而得罪可妄祈而免所以爲悪者肆而爲善者鮮矣欽惟聖朝更化之𥘉詔誥多方滛祠有禁革諸神大號之借称㫁媍人燒香于祠廟釋道菴院不許擅立况滛祠乎此國家洗陋俗之新條息邪説之要道普天率土㒺敢不遵切見夲府西城門外有不得姓土男子穾然于大驛路旁創立神廟稱為金家煽惑羣氓燒香不絶若不早為禁止将来為患可勝言哉如䝉有司覈寔當地里甲人等果有寔跡諭拆毁庶免無知之民悮遭刑憲如此則梁公忠國之心程子愛民之意一舉而兼得矣區區耄言因國家正大之氣感而應之如豊山之鐘霜降而發聲也僣越之咎必䝉矜恕賜之施行公論幸甚風俗幸甚甕天觧洪武甲子秋冬之交多雨而早寒兒軰爲子作小閣東廡廡周圍𥿄屏上䝉葦席方廣裁七尺有咫圭竇出入垂之以簾亦織筠而楮之與屏一色如堊壁然瓦盆柴火旁置小榻老夫得飲食坐卧乎其中既安且燠熈然而春外雖増氷積雪鼓之烈風天地六合爲一凌隂此室以衞䕶縝宻寒氣無罅隙可能入也但一己之樂㒺能及人猶醯雞之天局爲一甕中耳故名之曰熈熙甕天客或笑之曰樂則樂矣何誇欤彼富貴之家雕甍繡闥熾鳳炭之爐重獸錦之茵煖玉爲盃酌以醇酎肉臺盤交進于前肉屏風擁于其後温柔之鄉其樂如此子之甕天能彷彿其萬一乎予曰不然彼樂于人吾樂于天樂于人者肆其欲楽于天者安其分區區老夫年将九十目識一丁之外餘無徳能爵禄資財皆蔑以致之今若此不惟鄉閭側陋者鮮能周之古之君子若使虜持節囓氊沙漠佐主中興者渡兵滹沱抗䟽而謫官潮陽擒賊而夜入蔡州是皆冐氷雪渉危途急于報國而不暇頋其身也又若羊角衰之徃于楚左伯桃之死于樹楼煩堕指之卒赫連蒸土之衆其為凍苦可勝言㢤今予之樂窃比于醯雞甕中之天非誇也自以為足也言未竟客掩口而去猫捕雀圗評物之性有㣲近人性之義者猫捕䑕犬吠盗獬豸觸邪是也猫舍䑕而捕雀失其性矣失其性斯不義矣夫雀耗倉廪耳比鼠之害什有其一今畫工畫啖雀之猫銛牙利瓜吻流饞涎踞坐而猛若虣虎是張其可畏也嗚呼張綱巳矣埋輪之語世莫得聞故良工用史法決意以警夫綉衣豸冠之属㣲而著隐而顯覌者宜黙識焉讀昜齋秦燔六經藐大昜為卜筮書不為㶼燼夫豈一經之幸而巳㢤寔千萬億載斯世斯民之幸也是書出羲文周孔四大聖人之手天也地也人也萬事萬物之理也洪􅊏髙下包括無遺學者當薰沐稽首北面而讀之口誦其文心維其義見聖人于羙墻之間燭妙理于形噐之外全體大用或庶㡬焉所謂卜筮之理固在其中特不專于此耳先正程朱二先生所次並舉而兼得之奈何近代以來去聖遼邈邪説害正假禍福託妖幻以誣蓍蔡之靈又有宗九師而異其傳吞三畫以神其術自謂探𦣱索隐者滔滔也至若目之以遣而消世慮凡如此類不㡬于侮聖言乎吾友辛彬甫自早嵗讀易如悦芻豢猶恐不及而或失之故以讀易名齋需予言者數月予惟大易之義天髙海㴱豈管窺蠡測者敢贅疣乎惟尊之敬之對越前聖如神明父母口誦心維假以歲月将見源頭活水之来涵泳乎先天後天也洪武十七年十月既望毘陵龜巢謝厶猘犬文東家翁以防盗畜獰犬𢾗十平居多囓人翁或之其一忽口吐舌妥尾疾行而不頋囓同類則其状亦如翁坐視若無見焉人曰猘犬也宜謹避之里有膂力者忿曰我人也誅鮫摶虎吾力能為何避此為適猘突如其前遂怒踼之躓而不死厥足脛㣲有所傷不𢾗日呌號而咥人為衆所殺嗚呼犬之猘者固病也翁坐視縱羣悪為害無算不仁甚矣然世之人形獸心害同類而無厭者滔滔也豈特猘犬㢤學書字書之學訓䝉者率以上大人二十五字先之以為點畫簡而昜習也然所謂三千七十殆若指孔門弟子而言是則第四字乃聖人名諱理合廽避豈宜手之口之以凟萬世帝王之師乎其末兩語之乖刺尤甚故厶不揣狂瞽嘗昜之𢾗與方名曰一二三四五六七八九十百千萬億兆曰東西南北上下左右前後以字畫較之亦簡昜也待其手熟即兼以壹貳参肆伍陸柒捌玖拾伯阡萬字敎之以俻公私計算之用區區管見于兹有年敢用質諸先覺訂其是非倘不以人廢言或可為他山之石云書耕習軒後徃予識崑山陳侯厶忼慨論前代事髙宴曲塘既而陵谷變改各天一方未得與阿戎談也洪武庚午冬學子張文中以陳侯之㣧子孟剛耕習軒記見示其文乃汝陽袁先生所作其辭有曰夫耕婦饁帶經鉏犁以漢魏間倪常比之吁昔陳侯以富貴雄一州今其㣧一旦舍紈綺而臺笠緇撮委膏梁而羹藜飯糗熊胆之丸不勞于其親牛角之歌不效于前人葢立志之髙能為人之所難能者如此袁之言信不誣矣尚奚用畫蛇而添足乎雖然靡不有𥘉觧克有终此古人苦口良薬也孟剛需予言敢用此為芹曝獻龜巢藁卷之十八終
