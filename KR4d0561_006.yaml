front:
  text: 龜巢藁卷之六
  hash: sha256:b16196a3fdf88da3f28415f027836bc7bd71d609d163e96b5ecff6ab132158d8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0561_SBCK_006-1a}
body:
  text: 詩雪巢為馬仲良賦馬鞍山髙𢾗千尺考槃之所環大澤梅花為屋雪為巢􅑵户玲瓏室虚白諸公衮衮登雲梯若人奚獨能幽棲澹然素志絶華藻要令朴俗還標枝藍関策馬官逺謫居延牧羝氊盡囓何如雪飲樂巢居更與党家風味别梨雲無夢清如許膝上兒郎賦氷柱此生此樂慎勿移聼取龜巢老人語次韵答許西溪憶昔送别黄花秋烏紗破㡌霜滿頭别来作詩屡問訊夢中載酒時遨逰兵戈同厯二十載鵂鶹夜啼雲靄靄全家老穉幸迯生又閲桑田变滄海啓榮之樂今有餘勿謂比榮年不如峴山一望三太息㐮陽耆舊晨星踈次韵自述百年有限恥求仙𢾗口無飢頼薄田菰米熟来連日雨菊花開到小春天方從易外窮羲畫無復詩中泥鄭箋客至酒盃時一舉開籠放鶴舞蹁蹮送婁主簿赴京考績吳霜如雪點征衣匹馬之京小隷随鵉棘特書良史筆鳳臺重覧謫仙詩天開景運崇文治年少多才際盛時野老送行無贐物梅花折去臘前枝寄張以誠二首入城一度一相尋為愛論詩識趣深歲晏杜門寒不出折梅要寄隴頭吟蘭陵市上厭囂塵藥杵聲中樂隐倫兒軰荷鉏今日去一枝添種杏林春雪舟棹歌併序湖南潘公珍仲寳自號雪舟以耆艾之年監税江隂縣洪武戊辰冬赴京考績語予曰今将告老于朝得㫖則扁舟載雪而㱕矣雪舟之興盖與山隂王子猷有不同耳吁昔者陸公紀官滿鬰林㱕舟載石使當苞苴有物則又焉用是石為㢤公之雪舟意葢如此若夫鴟夷子皮之舟装江重寳復窃取傾國之尤物随之汚衊五湖遺臭千古其視夫載雪與石者不啻霄壌今雪舟之歸雖未可必然其志氣髙㓗如此雖在市朝亦必為清白吏是亦不歸之歸也予嘉之故為作雪舟棹歌三章以道其樂云歌曰載雪兮孤舟㠶江風兮中流蘭橈歸兮無恙吾将老兮滄洲再歌曰剖肉兮藏珠抱玉兮求沽悵斯人兮非吾徒尋鷗盟兮結樵蘇三歌曰舟揺揺兮江水長五老玉立兮遥相望觧吾纓兮濯湖湘樂吾之樂兮未渠央送王主簿赴京考績三年一枝此鵉棘一息萬里方鵬程長安西日舉頭近匹馬北行風色清朝廷考績垂令典臺閣交薦蜚英聲隣封野老頭雪白也折梅花作送行雪岩詩為江隂李縣丞作瞻彼雪岩太行之隂玉樹瓊林􅊏滓弗侵雪岩峩峩岩有薜蘿有美君子居岩之阿峩峩雪岩薜蘿如昔時止時行不泥其迹雪白而清岩静而深曷其似之君子之心始終一節謂予不信有如岩雪寄希物先楚蘭江二禅老優缽花開五百年連枝香徹九重天恩承雨露移金刹語帯烟霞澈玉泉虎踞龍蟠多古迹燕来鴻去是新年老夫懶着遊山屐空仰崔嵬夕照邊過烈塘祖墓里人牧羊于壟上以詩呈郡邑鳳橋之西烈塘東我祖我禰馬鬛封向来松栢蟠蒼龍灰飛烟滅丘前風十年天造開鴻濛恩沾萬國生育同壟頭萌蘖春蒙茸藤枝棘花襍青紅牛羊斧斤集如蠭一年一度一掃空白頭遺孤抱哀恫麾之不去欺龍鍾無階上天訴天翁吞聲躑躅淚滿胸府公頼渤海龔琴堂長貳明且聪令行如風偃蒿蓬樵夫牧人乃絶踪将来宰木蔽幽宫九泉感戴恩無窮嗚呼九原感戴恩無窮懐成都監倉趙中執三首擲去任公舊釣竿龍墀拜命即之官丈夫志在功名外蜀道行来自不難七千里外芙蓉城四五月間鶗鴂聲月俸支来賸沽酒莫遣閑愁取次生公餘訪古碧雞祠宫栁野梅皆可詩我欲見詩知雅興如何黄耳到家遲寄熊元修五湖三泖一癯仙心骨俱清地更偏睡鴨燒香書屋裡閑鷗結社釣磯邊絶憐芳草無塵土又喜黄楊閲閏年熱客不来清晝永南山相對両悠然晚香亭為蔣公勉作維莫之春百草不芳惟菊有花晚節之香君子儗之金玉其相顒顒卬卬氣凌風霜回視春葩綺羅靚妆及兹冷秋掃跡窮荒菊也特立澹乎坤党我佩尔紉我帯尔纕厥徳之馨匪食其英亭有三徑里有柴桑亭亦有池永同南陽宜尔父子眉夀無疆矧有佳客駱盧王楊髙堂起居階庭趋蹌玩物適意其樂洋洋鄙人作歌以侑稱觴題龔景良傍梅書舍南昌山水非不佳卜鄰直𣣔傍梅花花開歲晚香滿屋清致不减林逋家三間茅宇大如斗四壁圖書襍蝌蚪腹笥便便不自多汗竹之編長在手有時門外雪三尺羣籟無聲人絶迹梅花立雪似㳺揚不作桃哀憔悴色春風滿面笑相看知我鉄心同歲寒他日移居玉堂署應有品題稱二難洛陽牡丹春比屋日夜沉酣拂絲竹何當聆我讀書聲亦若聞韶觧忘肉次韵答毛雲荘併簡大希先生吾聞天台之山冠東南蔚有清氣非雲嵐山髙一萬八千丈石頭毛髪青毵毵鍾靈仙釋踵相接求為世用疇能堪不知三綱九法是何物浪説千岩萬􅊤能窮探雲荘先生隐君子非仙非釋棲苔龕胸中氷滿壺頭上雪一簮羲皇以来書盡讀熱官不要詩仍湛草堂侣有北山鶴菊泉飲比南陽潭清風日掃三徑竹寒霜歲熟千頭柑齊名子陳子不受功名酣坐談風月只松麈卧逰山澤非桃驂老夫恨臂不羽翼翩然飛去時相参四壁同馬卿一禈如阮咸猶喜盤飡菜有二十七生世年踰八十三忘机頗覺室生白造道尚𣣔青于藍向来行路如棘澁今乃茹荼如薺甘小山老叢桂滄江倚枯柟愛君傑作神氣壮睠我孤陋顔色慚蘭陵府主蓮幙客皆云此詩壓倒方雲菴赤手鯨牙力可拔薰人雞舌香㣲含餘波及我老孤研清入腑肺蠲㷊惔一朝怪事出幕府口不忍語非三緘令威到家兮能自談常郡經歴鄭履玄禮吾友天台陳太希之門人到任𢾗月家人至而玄禮病疫而沒寡妻稚子遑遑無歸予作二詩以哀輓之盲風歘起怪禽呼吹折琅玗樹一枝何事天公渾不𬋩生年多賦道旁樗琅玕樹折鳳巣傾胆落鵷雏抱母鳴𣣔故國𣣔歸雙羽弱哀哀啼作杜鵑聲延陵野老歌送張太守延陵野老巾滿霜送侯入朝歌道傍歌中不觧説循良但云三載安農桑官無煩苛歲豊穣飢有菽粟寒衣裳我侯興學扶綱常授經諸生踵陳襄一鼓士氣弛而張劍井亦復騰輝光訟庭春来莎草長風行四邑方泱泱九重天語星使将五馬夜趣天官装黎明馬出金斗坊羣氓猶挽青絲韁銓衡郡才進岩廊将見列郡皆龔黄連歩拾級登廟廊佩鳴珩璜謹趋蹌掖垣紫薇花自香甘棠之愛民弗忘大江東流青海洋洋我思悠悠未渠央寄吕教諭覔惠山泉木屐上山老無力茶鐺覔泉猶累人目光直射九龍角胸次欲浣三斛塵氷符分竹果如約石床焦桐堪作薪君當知我鄙肉食一瓢不厭平生貧寄袁子英横山東望崑山逺江水西来海水連每辱手書論著述猶如靣晤奉周旋㣲陽喜復飛葭管大有重書汗竹編若問老夫兒女事曾孫又抱小春前謝余提學摘藁序虚譽何人説草玄雄文為我冠蒲編諸公共羡金聲擲兒軰争誇石刻傳篛裡小團陽羡月缾封新汲惠山泉故鄊風土殊蕭瑟聊作梅花寄海邊輓吳母嚴氏賢母無復見孤兒痛奈何絳紗空幔在彤史闕文多林竹冬猶笋㕓氓巷不歌蹇予妻若子垂涕憶婁佗代王尚綗輓吳母澱山湖上避兵時縂角曽聞阿母慈霜埜不教兒子出氷池竟得鯉魚知生前冠冕升堂拜死後芬芳婦徳碑愧我不才俱靡及抽毫遥冩些辭悲次韵賈教授莫春言懐琴有徽音劍有光惜㦲江海老張蒼且将濁酒供瓢飲何必明珠用斗量壇杏作花紅樹暖泮芹抽葉翠波香鰲山遥在天東北時復瞻雲首一昂寄萊陽縣丞蘇偉正觸熱訪而翁萊陽書適至而翁釋離憂吾劑慰馳系青雲發軔初甘雨随車沛旱歲竟豊穣天意更汪􅐮㕓氓九衢舞海市百靈喜魁然英妙年際此太平丗蹇予八十翁懐人二千里哦松公務餘食蘗珍味比魏公百韵詩仕學有遺軌錢孝女詩斷臂恥受汚剜目示守節斷髪割耳鼻亦截忍棄夫家甘毁滅嗟㦲錢氏女孝心亦如之剟肉于股療阿㜷想當持刀入手時精誠黙感天翁知百靈撝呼走神醫肉乃化作藥石糜溲際淋液腹除癖如以湯泉澆雪釋􅭊無呻吟女弗戚鄰翁里媪皆嘆息予生慕忠孝老去仍惓惓每見返哺烏如甫拜杜鵑願言屏䲭鴞不與同戴天竹林寒笋氷池鯉澤中堇萊籬根米天其垂恩錫孝子董狐盡為書青史和江隂鄭教諭登楼為愛山居好每登楼上頭一氊渾不冷有酒更何愁歲月江流急人生泡影浮興来歌舞罷倚檻看天不次韵荅陳推官珍重新詩遺華於翠織成立秋天侣洗連日雨頻傾大府羣英集清朝列爵荣正湏匡濟力膏澤被蒼生和陳推官過余公祠士安慶路縂管守城折公諱闕字庭心元進忠臣廟謚忠宣公折死洪武初勅建元砥柱廻瀾屹吕梁安知誰武復誰湯六年守戦孤臣死一代文章萬丈光草木荒城威肅肅丹青遺廟貎陽陽悲歌沃酧知何日北斗持来挹酒漿殷孝伯輓詞憶昔覊旅中片言識鬷篾十載忘年交兵戈正騷屑知子早卓越春秋參五傳窮源見澄徹經維時陵谷变遵飬卧岩穴洪武更化𥘉鋒車聘髙㓗辞勞忤當路一命萬里徹志違烏鳥飬淚忍啼鵑血咸陽火方燼教雨沃餘烈奐輪周孔廟駿奔豆籩設庭生書帯草青青比蘭茁孤雲日在望縮地恨無訣遄㱕一覲省亟去両踰月老夫獲晤語清風濯煩熱著述亦已多討論心愈切安知一叠歌竟作千古别招魂頼遺孤魂㱕母垂絶於乎世之人賦命何優劣或厭飫八珍子獨茹氷雪或稳歩康荘子獨蹊杌􅑾行行止于斯矩歩踵先哲崑山雲氣慘婁江水聲咽誰為有道碑修名罔磨滅哭盧知州諱熊字公武朿帛三徴出薜蘿雲階歩武正逶迤飄風動地湏臾靜奈爾琅玕遽折何雪手灉流理繭絲一襟華藻竟何施秋風夜月華亭鶴又作悲聲似昔時送浦良之安陸府代父從軍秋風凉秋夜長徃㢤讀父書超然出戎行詩書元帥古来有搢紳先生今汝望寄徐伯樞縣丞逐客多㷊晝錦衣謫仙書喜得夜郎居古来白雪詞難和此去青山志不違洗馬池邊楊栁樹卧龍岡上豆苗肥獨憐棣蕚秋蕭瑟又見西風旅雁飛某巢居病瘧有客自青山門外来者語予曰賢太守過道鄉佳城以弔以酧且為之扶植仆碑添土舊封又将築周垣而䕶之殘山剰水皆有徳色某聞之喜不覺其疾頓愈起坐午􅑵老硯濡墨筆是詩以記盛事洪武十年歲在七月十日也世有文潞公乃立明道表明道表不立斯文尚幽渺時有孔北海乃稱通徳門通徳門不稱大儒曷推尊古人今人同此心當風正欲披其襟嗟予巢家子騶子傳道龍門天下士一朝扣天関獨立批龍鱗祗恐緑衣黄裳悮人主安知炎烟瘴雨危其身萬里投荒挺霜竹歸来青山竟埋玉迄今二百九十年陵谷㡬番經变遷折角麒麟卧荆棘復見薄侯駐熊軾鬛封添得烏銜土頽碑扶起龜趺石先生九京知不知名在人間益輝赫孔北海文潞公今人古人将毋同青天髙髙不可問白楊為我呌西風題夜潮圗昔余夜醉錢塘酒看潮八月中秋後銀山湧出海門来潮聲殷若雷霆吼此圗之作知㡬年當時景物皆依然雲山兩岸淡籠月雪浪一江髙拍天一觀頓覺毛髪立再觀祇恐衣裳􅊜扁舟漁子任掀舞别渚鷗鳬自翔集奔騰澎湃無足驚人間平地風波生乗桴尼父果浮海從遊我亦跨長鯨郭府判惠佛面竹杖盖以佛状而名之矧夫節有交互之異旁生兩枝末復為一視他杖殊不同詩以謝之頎然此君生越裳化身無乃是空王生来丈六紫金相復現太乙青藜光孫枝並出比能秀老節交錯成文章只恐化龍飛入海尚煩垂念瞽倀倀呈府官求刋思賢録忠公神逰白玉京鳳皇無復朝陽鳴寥寥二百九十載其文况忍成漂零某也束髪頗嗜學四方掇拾手不停珠聫璧合綴方册字字句句含芳馨向来避地東入海挟書㡬落長平坑還家暗投科斗璧何異寶劍埋豊城郡公宣化重名教斯文要俾晦復明顛呼鉄筆冩堅氷彷彿中郎鎸石經螢􅑵雪案人快覩妙語炳如懸日星顯忠不湏庵忠鄒無用亭牽𥚑蒲伏想儀刑􅌂然見我鄉先生題徐良夫畊漁軒我本耕漁人喜子與同志子居中吳山水窟比我延陵更佳致太湖三萬六千頃七十二峯連紫翠山皆可畊水可漁無復紛紜嬰丗累朋逰日接慎威儀酣酒賦詩時適意客来遺我金蘭集􅌂然承顔依玉立因以今人思古人與客評論重於邑輟畊莘野赴阿衡後人嘵嘵疑割烹擲去漁竿佐周武鷹揚之勞亦良苦當今盛時伊吕多幽棲正宜安薜蘿山中小草或浪出千慮鮮能無一失願言飬髙持素志百錬不改堅如金相過未儗聆蛩音寄言時復相規箴生日口號二首餘生重作太平民雪色霖𫀆皂葛巾兒業經鉏能飬志家居瓢飲不憂貧屋頭個個慈烏喜堦下翩翩舞鶴馴此日誰為湯餅客孟光相對鬂如銀秋菊春蘭各有時頽然老我一書痴脚跟不識青雲路頭髪空成白雪絲怕醉有時曾止酒遣閑無日不吟詩旁人若問今年㡬八十年前五歲兒送聪上人蘇州有即常州有今雨来時舊雨来鉄限門前人立雪寶華堂上鼓鳴雷九州禹貢包時橘十里吳王醉䖏梅請與淡翁論古意老夫朝暮亦浮杯送僧歸四明省母同根花蕚兩枝連甘輭能供老阿􅭊不用睦州蒲織屦睦州因得賦㱕遲吳霜如雪滿袈裟正月闌珊可到家别有一般清浄供髙堂説法向摩耶送鄭教諭進表之京束氊黌舍跨征鞍奉表朝家慶履端虎拜三呼稱萬夀龍顔一笑宴千官酌来天上葡萄酒洗去胸中苜蓿盤官様文章新製作老夫刮目待歸看過天寕寺閲行中和尚澹居稿知其邃于易學兼長于詩故寄此西来祖業繼箕裘旁入儒林託泳㳺二雅什中歌矩度九師注外易傳流松堪受記皆摩頂石觧知音亦點頭逸興飄飄誰足儗白雲飛度楚江秋次韵陳推官元旦作東風楊栁驛橋邊香雪沽来斗十千早飲屠蘇還舊俗遥瞻閶闔賀新年萬方人樂昇平世五色雲開咫尺天廟廊噐成今未晚着鞭姑譲祖生先正月十四日代簡招鄉中親友上元之前日将午相邀諸公聚環堵山瓢持作鸚鵡盃畦𬞞擷取龍根脯兩兒粛容衣䄡䄡老夫鶴立梅花檐照天蠟燭夜有月勿謂寒舍無燈相棄嫌寄管伯齡兼簡陶呈甫前年詩冩心聲去此日人来口信通一自𥘉交經丗变兩無相笑坐文窮崑山氷柱軒􅑵外笠澤烟波賦咏中更憶南隣龍頂竹曽留東走鹿皮翁張伯仁兄弟濠梁蒙恩還鄉客行二月𥘉三日詩到千墩寄二難且喜江南春氣早不聞濠上雨聲寒花時多醸醿酴酒芳舘重修芍藥欄徃事真成塞翁馬正湏招集笑相看簡伯仁里中親友七人臨濠人歸去年夏故園花開今兩春看花把酒應共樂訪竹題詩毋厭頻紅塵車馬跡不到滄洲魚鳥人相親老夫遥望徳相聚乗興㡬回車欲巾聞趙鵬南免官還家作此代簡併以孝女傳求詩兼寄毛世延熊元修水村先生氷雪姿一襟清氣溢為詩不同不異頗竒崛歩趋李白仍委蛇夜郎歸来脱塵屣濯足淞江太湖水雞壇有盟知弗渝書或浮沉况杭葦衰年萬事皆遺忘咏歌之樂殊未央請覌側陋出純孝援筆為揚蘭蕙芳毛公丗業詩三百白華𥙷亾求必獲更煩漚社語間叟定有隋珠照方册舊冬十二月𥘉四日次子林赴京初九日入覲十三日授開封新鄭縣學教諭即日之任時雨雪連𢾗日寒甚眷焉于懐乆而不釋兒别雙親到日邊承恩徑著逺遊鞭一千里外汴梁路十二月中氷雪天楊震未期堂有鱣鄭䖍何愧坐無氊只今偃武修文日正欲鵉膠續斷絃服霞道人歌服霞道人本仙骨隐居琴川山水窟朝看鼎食暮鼎烹富貴于人果何物道人忘世味祗服山中霞却青精棄胡麻八珍視同泥與沙扶桑飛出金老鴉氤氲五色搏精華呴嘘呼吸間入腹皆河車手持九霞觴頭戴三朶花松風為作洞仙曲絶勝金谷鳴筝琶一經不學乃無術麻姑送酒徒相誇吾服吾霞吾自足安知世有萬羊禄夷齊餓死良可憐留得清名傳汗竹秦人採藥尋蓬山好兒好女無復還漢宫空設承露盤銅仙為之淚汍瀾玄霜本非霜絳雪亦非雪請從服霞道人逍遥逰指點空同授真訣貽五牧劉永真昔賢五牧家何在今爾幽棲地甚偏種秫歲供彭澤酒煮茶時汲惠山泉錦鳩呼婦雨聲歇丹杏作花春正妍堪笑老夫頭似雪興来尋戴過前川雲牧詩為楊同知賦廬陵美山川穹林古喬木雲栖三十年遵飬卑自牧静言求放心雞犬常在目朅来陟雲衢半剖桃符竹牧民如牧羊四郊春草緑豊年羊茁壮亦有飽眠犢豈無敗羣者其藩或輕觸約之鞭用蒲所履繼前躅置身埒青雲岳牧聫佩玉佐主牧天下庶類頼蕃育雲牧𢡟厥功吾言此芹曝王叔明雲峯圖王郎多學畫最工筆法似舅松雪翁松雪之書妙天下以書為畫妙亦同想當洒墨成雲峯豪氣壓倒陳元龍層巔崒嵂摩蒼穹咫尺可論千萬重嵐光翠滴天無風若有㣲籟鳴杉松此時此畫誰復有我為此甥懐此舅秋林讀書圗春風不著長安鞭秋林讀書年復年百篇蝌蚪自為寳三足蟾蜍誰與憐目光爛爛走金電口角冷冷飛玉泉老我東家兎園册尚分隣燭教曾玄題村田樂圗老人村老瓦盆常作雞豚社不識州縣門阿翁醉倒阿婆笑膝上吚鴉弄乳孫六月八日得次子詩併書乆旱髙田未秧是夕連雨三日喜而和之新鄭書来劍井邊方将隂石捶荆鞭雷霆夜坐三更雨江海寒生六月天不惜空囊沽緑螘從教破屋􅊜青氊北􅑵風響蕭蕭竹如聼南薫奏五絃去冬送鄭教諭如京詩為天寕聦公沉滯至今年六月轉託發還故作此併元詩寄鄭一詩代折送行桞半年竟堕無何鄉祗應沽酒謝不敏尚謂道術能相忘髙堂談經多士集澄江濯纓清晝長為問㐮陽兩耆舊歌鳳曽無説楚狂寄謝楊純夫兼簡陳髙士客来飲客北海樽客去送客東陵門不嫌褦襶留信宿各出肝胆聆話言三日雨救赤地旱百川水作黄河奔賦詩為别併志喜兼簡太丘賢祖孫聞袁子英著書作詩寄之我所思兮耕學翁壮年氣欲吞白虹眼看陵谷一变改此心乃與寒灰同硯田筆耒耨經史不稼不穡勤于農我衷我彛得所飬錫類且欲来羣蒙㳟惟玄聖草六籍為世大法垂無窮楊墨溺人甚洪水孟氏距之成禹功秦以申商漢黄老六朝接跡淪虚空緇黄愈出愈荒誕冠冕鞠躬趋下風韓歐問生𢾗百載鳳鳴朝陽羣羽從中間洛建繼洙泗卓彼二子能折衝雄詞至今凛生氣宜從孔道追遺踪東将入海乗艨艟長江大河無遏壅老夫獨恨雙眼矇不與観日扶桑東贈衡隐居我昔母年垂九十帯經犁鉏粗供㣛伊今有母八十餘孝飬之聲動鄉邑堂前曄曄忘憂花屋頭翩翩返哺鴉林宗若識茅季偉薦書定徹天王家題漁人扳􅊻圗大横峴東芙蓉湖水村髙樹屹兩枝漁郎曵􅊻坐樹下短衣緇撮赤髭鬚此圗無乃貎此景東鄰西舍皆菰蒲吾嘗過此看春水桃花雨晴春日晡漁郎含笑語厥子鱖魚肥似松江鱸街頭米貴魚亦貴賣魚日糴供家脯只愁水面重租課風飛健卒頻追呼逋租畢輸榜捶脱前村有酒仍湏沽猶勝禄食致竒禍坐受鈇鉞連妻孥夜来湖上好明月醉吹蘆笛歌嗚嗚人生之樂有如此此身安用紆青紫漁郎漁郎知我乎我亦烟波老釣徒溪居垂釣圗磻溪老父興西周釣竿擲棄鷹揚秋富春先生赴東漢羊裘㡬被朝衣換人生出䖏各有時如魚飲水魚自知釣鈎無餌釣清泚若人彷彿玄真子好山滿眼青孱顔清風緑樹滄洲湾悠然意態極瀟洒豈是尋常釣魚者浮波之龜如出洛漁郎睨之龜弗却買卜覔錢人正多七十二鑚人将奈何不如且曵泥塗尾相伴幽人弄烟水細看元在畫圖中多言莫笑痴獃翁管伯齡惠詩併和詩故復次前韵答芙蓉湖照横山影蓬藋門開曲徑通半載目昏渾不出一經頭白未能窮論交半是漁樵者訪舊多于夢寐中説與故人能信否頽然黄鵠化鳬翁維揚王有恒避亂居東吳三十餘年所至寓舍以聼雨篷名之多學能琴而善飲醉則鼔琴自娛故自號曰醉琴然鄉土之思亦嘗于琴發之予盖相聞而未之識也吾友釋仲翔傳書為求二詩遂為之賦聼雨篷昔年家住揚州市雨聲不入絃歌耳居吳聼雨三十年客舍如篷卧篷底篷􅑵晝瞑雲抹􅃮滴滴點點踈復宻絶似瀟湘夜泊時半襟風波想蕭瑟有時聲急如建瓴有時珠玉聲琮玎屋山使作柂楼倚兩耳洗来心骨清心骨之清豈不好一點鄉心忘未了天中玉樹無雙花夢魂日夜長飛遶只今二十四橋月依舊玉簫聲不絶一㠶送風到瓜州聼雨孤篷聲又絶醉琴張顛草書常醉揮以頭濡墨愈神竒醉琴之妙亦應爾頴師乃為徵吾詩琴中佳趣知者誰麯生為我同襟期千鍾百斛追古聖五音六律洞玄機一襟宇宙春熈熈七絃氷霜風颸颸得之於心應於手如魚飲水非人知鈞天廣樂醉鄉境悉以所樂鳴金徽髙臺自傾池自廢雍門枉爲田文悲我歌醉琴行持贈醉琴叟小春多醸梅花酒我来與君酌大斗濯足滄浪太湖口聼醉琴爲醉友海萍爲詢無言􅊰主作大海多風波浮萍蔑根蒂嗟爾海上萍似我人間世前身楊白花幸不堕泥滓化生江漢間朝宗随衆水出没㡬沙刼全此清净體所以無住着黙契宗乗㫖芥子納湏彌吾知同妙理輓王氏祖母母在重闈鶴髪垂孫為能吏鶚書馳二三百里去鄉國七十五年稱母儀李宻陳情方有表張林紀徳未成碑斗城昨夜西風急吹折萱花帯雨枝次韵酬陸子文見贈故鄉不願錦衣歸亦不願入承明廬願言結交天下士腹有五車今古書還家十年空兩手釣竿之外餘何有白雪如雲横滿山薜蘿三間大於斗浪川雙鯉来新吟詩中意與秋俱清雄豪氣敵劉夢得喜無郊島窮愁聲嗟㢤風雅乆不續老我山林成朽木金盤秋露玉壺氷洗去胸中塵一斛覔官應笑明河篇托物可儗石鼎聫先生識趣出塵表鞭䇿後進追前賢東望吳門長太息舊俗繁華復因襲太湖三萬六千頃七十二峯湖水側何日携將麯秀才登臨共醉姑蘇臺眼前一事特可喜湖山清氣鍾羣才先生薦胡不起濯髪滄洲弄烟水遥遥裔出華亭侯甫里髙風更無比只今奕葉多流芳東床嬌客名尤香呼兒整我逰山屐早晚去從潘孟陽次韵答集講主二首欲尋石上三生約姑待梅邊十月春結社東林無奈逺寄書南雁豈辭頻平生頼得詩書力朋軰多如骨肉親元伯九泉呼不起儗将雞黍淚沾巾千墩南浦水廻環一颿西風路不難骯髒曽於堂上坐綈𫀆能禦客中寒可憐學劍身今老祗有湛書興未䦨傳語心知𢾗君子小春来借早梅看風波詞家住横山古澗阿孰知平地有風波一壺爲濟中流急可奈無金報爾何洪武十六年夏五余寓崑山延福菴蒙李無逸冒雨見訪且邀午酌以尋二十年交好之盟席中聞余茂本通政談玉峯志􅍢版無逸能力為之髙義可喜别後作此詩以賛其美併致謝意云老夫著書雪滿顛秃筆掃盡松煤烟書成無人為傳刻明珠暗投三十年玉峯有志今雕鐫公乃下榻邀羣賢魯魚亥豕盡滌濯銀鈎鉄畫森戈鋋婁江風物靡不載一邑快覩人争先知公髙風雅量振頽俗令名當與書俱傳澱山湖邊五畮宅芙蓉錦城耕稌田多情念我乆離别風雨逺來書畫舡開樽竹舘話夙昔屋角雨聲飛瀑泉爛烹鶂肉軟炊黍時憐老䑕令相便草堂之資送杜甫遥知破屋窺青天别来東望澱山月再盈再虧今復弦鵷雏出穴皆五色門墻桃李春俱妍無由縮地共携手寄詩併送思賢編自輓齷齪龜巢翁飄蕭烏角巾干戈二十載幸爾全其身平生得三樂此去棄六親青山為我宅白雲為我隣寄聲􅒜相知毋勞為酸辛生為無用人死作無名鬼生死天地間區區等螻蟻商人自忍飢楚人從赴水長鑱付兒曺持以字妻子将來事無涯且免閧吾耳輓張溝南故人家住江之隂江城草堂花竹㴱蚶盃喜作真率飲鳳管不殊韶濩音中郎有女可傳業萬事無復縈吾心於乎一歌兮一悽愴白璧如今窆黄壌故人墓在君山下黄絹碑辭更親冩風流不减賀知章軒昂有如稽叔夜秋風蕭瑟宿草青過客知名多下馬於乎再歌兮再思之誰能為我追騎箕故人生来天骨竒抱才不試清名垂山隂道士遺寳墨雞林賈人傳舊詩寒家夜夜屋梁月顔色宛然前别時於乎三歌兮三太息歌聲未斷還相憶次韵答子才去秋見寄海縣石浦人折子才名朴上懐哉博物張茂先淞江太湖烟水連舊藏篇翰合雙璧新發熖光驚四筵菊花不􅊜重陽雨汗竹應書大有年敎子一經還自讀林居幽趣相依然感年咄彼新豊折臂翁偷生年與我相同世無兵革真難遇家有經鋤未是窮兒子冷官成覆水老妻春夢逐飄風獨憐未畢全歸願兩目昏盲耳更聾天有眼風波起平地胥溺無可援荆棘生大途頃歩不得前清朝赫赫嚴紀律汚吏婪婪弄刀筆翻雲覆雨妙若神白日青天暗如􅃮天有眼視必明何忍覩此世人之不平轟雷尚擊黨碑碎炎霜豈不飛闤扄惜哉延陵好州邑呌囂之聲雜號泣龔黄卓魯㡬時来觧我閭閻倒懸急天有耳腹中或有劔對面難隄防笑中或藏刀轉頭多中傷人形獸心險莫測擠人火坑猶下石東隣西舍苦牽連爺娘妻子多狼籍天有耳聼必聪何忍聞此世人之不公恢恢天網或汝漏百靈未必皆痴聾嗟㢤尼父無復見冶長非罪誰能辯况有䜛夫口鑠金将謂盖髙人聼逺寄野居䖏士春風有花随䖏看不勞快馬走長安春山有藥皆可采何用楼船渡東海老生常談人所忽門巷蕭條青馬没野居隐者獨知言乃曰與我心同然垂簾丹室清如水賣卜君平絶相似得錢沽酒長滿壺談笑樂與親朋俱金谷飛蛟暫時聚静逺何如野居趣匣藏三尺古吳鈎幸無龍光驚斗牛焦桐絃絶挂空壁洗心只用床頭易忘年之交三十春於我義同雷與陳千墩别来耳目疾兀如朽株門不出六經家業愧無傳敎兒只讀原道篇有懐欲得語同志東飛恨不生雙翅牛鬼蛇神雖孔多青天白日奈人何願言正己斥邪説始終一念堅如鉄寸膏欲澄千丈潭厥功有無宜莫論和任義甫重陽絶句三首西風拂我菊花筵霜落蒲萄酒瓮前弓勁馬肥烟瘴歇雲南将士正開邊題糕醉筆吐天花風景蕭條興亦嘉多少玉門關外客故鄊一望一咨嗟休官陶令果何聊不赴江州太守招天上無人能送酒浮雲空作白衣飄九日志喜黄花無雨笑相看青女𥘉霜未覺寒天下徧氓增負版雲南征士觧歸鞍市沽斗酒錢三百鄰送桮羔物九般最喜呌囂聲不到来朝雞犬得平安題松溪釣魚圗看花不躍長安馬濯髪滄洲結鷗社千岩萬􅊤一絲風豈是尋常釣魚者月滿船水滿川月在水中光不􅊜人于舡上坐青天魚乎魚乎自悠然只今吾亦忘吾筌大林庵主真公徃宜興參弘辨禅師回途跌傷其膝卧疾乆之作此問訊石頭路上悟玄機跌破泥丸一笑歸從此不湏盤膝坐卧看来徃白雲飛天界藏主銘祖心歸常州府䕶國院信至龜巢作此代簡偶著青鞋出薜蘿竟参白足坐盤陀龍蟠虎踞江山好燕去鴻来歲月多言别石城歸舊隐笑将磚鏡為重磨松枝東長烟霞喜我亦滄洲舞釣蓑題髙士觀松圗賢哉陶元亮休官撫孤松之人坐松隂髙興将無同楚楚烟霞𥚑澹然氷雪容安知洛陽道車馬正憧憧尹泰春玉峯舊隐圗春風夢破邯郸枕三徑歸来埽白雲藏壁家書還自讀排衙縣鼓不相聞内交林􅊤蒼髥叟比徳氷霜抱節君熱客不来心似水滿庭空翠落紛紛王仲昭挽歌詞千墩之隂湓浦曲鬰鬰葱葱烟樹緑五陵豪氣適消亾此地人稱小金谷中有琅玕玉一株枝葉扶踈鵉鳳宿鵂鶹夜飛木上啼九頭血汚玲瓏玉飛亷怒從天上来東走扶桒西若木埽除妖物靡孑遺玉株亦拔移荒服八千里外雲南地烟瘴偏方魑魅俗道經七譯路幽險澤有神龍悪薫觸洪浪掀天霹靂飛㡬作湘纍葬魚腹丹旐歸来窆鄊土華屋髙丘生死足纕麻痛泣桒梓悲淚痕多似湘江竹嗟我東西南北人愛爾瑰竒曽刮目郷無旦評勿為少令名在我思賢録嗚呼青山紅塔道鄊墳誰復相期薦秋菊贈醫師張有成嗟哉延陵古城郭舊家喬木秋蕭索先生眉夀氣如春借問平居果何樂笑言吾樂得於天燕饗不勞鐘鼓作一從無夢見周公青緗五經束髙閣便便老腹只醫書頗學掛人賣藥藥嚢得錢儘沽酒兒舞斑衣我盃勺有時出郭看青山手策笻枝曵􅉭屩揚子江頭滆河口晞髪滄洲吟杜若歸来一曲焦尾桐今古閑愁搃忘却老夫喜聞心與同以言相贈仍相約東門之東劔井西蘿屋𢾗椽雲一􅊤肯為尋山𢾗見過樵飲漁歌良不悪人生百年能有㡬但見花開與花落世傳仙人上天騎白鶴荒唐繆悠言不怍請從先生持筆削贈吕克明馬鞍之山玉嶙峋氣所鍾者徳潤身古人已矣不可遇今人多躡青雲去中有一人氷雪姿青雲垂趐歸故枝老夫識面三四載但見才華發光彩去年訪舊山水鄊乃聞孝行非尋常兢兢持身親所喜為親不惜殘肢體親存盡懽喪盡哀哀號淚􅊜三年縗嗟㢤天質美如彼移家恨不居同里歸来細與吾兒説撿身自謂誰優劣綿駒䖏齊齊善歌東瞻玉峯奈逺何寄耕學袁先生新歲又人日故人無嗣音𢾗詩曽倡和半載孰浮沉笠澤鷗盟在蕉隍鹿夢尋吾今洗吾耳聼此絶絃琴自和感年前韵軒軒黄鵠化鳬翁老態如今变亦同幾度出門邅鬼哭一生徒壁坐詩窮埽松先壠清明日杭葦官河舶趠風春怨忍聞啼蜀魄旁人為我喜痴聾逸菴詩代膠山徐伯樞作士學而仕猶力於農三時服勤乃逸于冬當勤之時以稼以穡鹵莽滅裂報施勿忒未勞而逸君子所憎勞而不逸君子不能於昭令典致仕有期一日必葺罔敢或随時之至矣銜恩遄歸逸于而菴亦孔之宜其容施遲其行逶迤含哺鼓腹樂乎雍熈荘曰大塊逸我以老是用作歌以為頌禱清澹子詩世味尚醲郁清澹獨有水寡慾飬吾心汪汪亦如彼朶頥良可羞菜根有餘美凡為君子交當知肉食鄙題趙典史家藏聪聞極所畫水仙有人晏坐風泉室水仙之花照佛日氷鷗滌筆為傳神不着􅊏塵浣清質山礬是弟梅是兄澹翁品題非過情紅蓮幙静簿書暇時一覧觀心眼明題松菴圗吾聞張子房漢家𥘉封萬户侯便從赤松方外逰又聞陶隐居華陽髙住三層楼尚愛松風聼不休從逰松子或假託請聼松聲真可樂古人今人同此心老去棲遲必岩􅊤白髪左司諫赤心天子知君恩飬老歸草木增光輝今觀畫史貌清致想像為作松庵詩青山崔嵬青松離竒三間薜蘿屋四壁莓苔衣前营燕雀来賀喜中林猿鶴還相依山中服食何所有松根茯苓大如斗松拂輕于白玉麈松醪香似黄封酒座有嘉賔樽不空每日共澆談笑口不言不笑黙相契平生乆要蒼髥叟向来百卉腓且衰偃蹇不受氷雪欺尼山聖者無復起歲寒後凋誰品題春風牡丹洛陽市華屋金盤闘奢靡車馬逰觀人似蟻但説姚家之黄魏家紫那知松菴之清樂如此送任義甫之京放却滄洲老釣竿送将圗籍上長安朝霞爛爛日𥘉出熱客紛紛路未乾七里八岡鳩杖去三山二水鳳臺看薰風觧愠今猶古舞䄂歸来語所􅌚辛彬甫自京城回過東洲田舍極言曽覲天顔之善舉酒送别詩以賀之一百十五一版圗兩三箇月兩赴都親承天語拜闕下喜得風帆歸海隅到家且聼華亭鶴斫鱠旋買松江鱸鄊人為作軟脚局衆樂不妨如大酺悼䕶國寺昇東谷和尚憶昔桒田变海時法幢扶起歲仍飢諸方乞食供緇侣十載開堂响白槌香火石龕獅子像紗籠塵壁老夫詩客来今雨重留宿誰向東園折露葵六月𥘉一日亾室𥘉度感愴而作白髪三千丈齊眉六十年今朝煮湯餅㸑婢亦澘然六月望自潞城回東洲書目前二事以示親知庶聞者或有感焉緹萦贖父謁天子聶嫈痛弟哭死屍親親義重不頋身千載流芳著青史今人豈無骨肉親冷眼視同行路人朝家旌善作亭子誘我薄俗令還淳吾詩相勸匪相訐不信汝曺之心真是鉄次韵錢彦學見寄七首頻年歸計果何如九龍之山駒谷虚山中流泉若有語遲子續修鴻漸書三十年来山上山詩名流落五湖間歸尋鈯斧南泉老隴有白雲相伴閒萍水相逢記昔年馬鞍山下屡周旋羊裘不脱漁竿老彷彿嚴光也自賢一榜三魁我舊都如今文盛説中吳詩窮不用論郊島風雅揚揚有大涂梁谿如鏡照羣峯勝地生才淑氣鍾想像鶡冠人未老金莖露洗玉芙蓉桒柘東風呌伯勞犁鉏南畝課兒曺一枝樂與鷦鷯並阿閣那知有鳳巣春秋九十是明年禮樂三千夙志衰訪戴未能移剡棹和陶猶欲繼坡詩題天葩雲液軒識馬不湏論牝牡相人但欲知賢否我愛天葩雲液軒中人賢在一真無矯揉戴星出入公務勞退食從容樂詩酒紫毫之筆吐天葩得意如看長安花白螺之盃㵼雲液破悶絶勝陽羡茶謫仙九京不復作斗酒百篇誰共樂藍田哦松人亦好座無杜康殊落寞我詩我酒興不孤風月溪山皆畫圗胸中磊塊盡澆去方寸烱如氷一壺愚聞孔公醉决事勝人醒孔公何人哉希之即齊名斯言請為座右銘酒徳有頌政有聲詩聲更作音鈞鳴夀任義甫十月十日曽看青海变桒田又厯黄楊厄閏年抱膝面山西牖下科頭背日午簷前中郎有女能傳業僕射無兒不怨天八十春秋雙足健隣人喚作地行仙次韵彭知縣以公事如宜興過滆湖作百川水溢東流急天風捲雲如捲席雄鳩呼雌鼓晴翼且喜人無滛雨疾官船掛㠶出湖去乗風破浪無衝激舟人笑指一足鳥也作竛竮退飛鷁山無猛獸水無蛟陽羡徃来人絡繹蓬􅑵挂笏看青山佳句􅍢成忘旰食令乎令乎匪逰逸聊為湖山窮眼力滆湖飛渡不崇朝東滙沙湖又深入彼疆此界犬牙地概用朝家律三尺人言行路古来難範我馳驅自無失寄言勒移署椽筆分我餘光照隣壁懐吳中衡心友老去多蒙故舊憐客来喜得信音傳書能教子醫傳業居欲依仁宅屡遷赤米白塩瀕海地青萍緑綺博山烟曽聞靈素多増註好擬詩家作鄭箋代簡張子才遐想張梨谷相望吳野居馬鞍長在望魚尺乆無書七日陽来復三年月閏餘芸邊生意動君子喜何如王有恒秋𥘉貽書約回途過訪尋假館之盟故作此于丁堰姜氏迓之舊雨曽来今復来故人懐抱亦佳㦲黄楊樹厄三年閏緹室葭飛六管灰文有熖光皆李杜情如膠􅃮即陳雷燈花有約鷗盟在莫負柴門埽緑苔龜巢藁卷之六終
