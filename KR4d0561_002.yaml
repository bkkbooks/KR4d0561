懸崖叠石幽致古木寒藤有意生意胸中清氣吐筆端有殾無殾俱可觀相逢莫恨無知者縑素盈箱乞傳寫絶勝編書斥異端老我穿屋牛衣寒十年歲月磨硯鐵嬴得羣厖爭吠雪願君為作指南車獨行周道當何如答凌萬里見寄移家一别十年多豫髮蒼蒼子若何老去情懷偏念舊向來消息頗傳訛遙憐杜甫因詩瘦欲為揚雄載酒過稍待長江羣盜息洞簫吹我醉時歌送辛明善之縉雲監稅兼髙則誠録事縉雲山下水盤盤一舸夷猶七十灘如此壯逰良不惡何妨逺别去之官風生白苧征衫薄雨過黃梅客路乾傳語郡中髙録事小編求序冠篇端題桃源圖昔年曽讀桃源記㑹得陶潜言外意柴桑避世如避秦恨不山深絶其事借秦為喻說桃源漁郎之逰皆寓言不然溪上山如故胡乃舟回迷經路若令此景真在山此翁必入窮躋攀編詩不用書甲子姓名無復留人間只今唐虞太平世花栁村村足佳致不須重展畫圖看四海桃源復何異張子毅生日招飲以詩夀之深山大澤生龍蛇文采風流出故家柔桑負郭田三頃燈火乃翁書五車南風𥘉結石榴子細雨微挹菖蒲花生徒女樂為君夀老夫也得醉流霞避雨繫馬庱亭東郵亭似寉籠長河飛白雪髙樹灑清風州界才相接鄉音便不同野人來問字錯認是楊雄歲歲九龍峯寒泉落氷雪美人此傾蓋為我滌煩熱世途自荆榛肝膽無楚越􅑀髙一長嘯清風滿林樾送崔仲德歸錢塘家住湧金門瀕湖五畝園梅邉童飬寉松下客呼猿頭白心猶壯官卑德自尊徵車未來日詩禮教諸孫送盛本𥘉教諭之全椒淮海維揚才俊多先鞭奈爾妙年何璚花春酒三年别滁水秋風一葦過聖代只今興禮樂人家是處有絃歌安書寄與南來雁時有新詩到薜蘿辛至善永思亭八韵而家本西域而翁葬桐鄊鄊人猶永思哀哀况諸郎春雨暗宿草秋風悲白楊别來春復秋于焉奉蒸嘗思誠見容色宛在羔與墻一念不少休東流水湯湯到海水猶已此心未渠央詒謀子若孫百世室有家次韵陳知逺秋日言懷奔牛古堰頭築室俯滄洲愛客常沽酒耽書不下樓青山銜落日白露􅊜髙秋最喜多兄弟㕠親百不憂諸葛用中成趣軒九韵幽幽小園池結屋三四楹若人青雲器乃有丘􅊤情涉園以成趣尚友陶淵明池水魚潑潑花枝鳥嚶嚶太極圗外意芳草階前生吾趣吾自知對客無以名欲識琴中趣且聆絃上聲欲識酒中趣百壺與君傾啖蔗勿遽棄佳境將來迎李御史過訪霜飛白簡照南臺早歲君門射䇿來獨立敢言天下事實封頻到御前開騑騑􅔕馬過茅宇戀戀祶𫀆念櫟材慚愧山林麋鹿性偃然方樂卧蒼苔題畫鷹蒼鷹獨立清秋樹劒翮風生欲飛去林間燕雀動成羣海上鴐鵝亦無𢾗鴐鵝燕雀爭殾喧擊之不擊無足言快須為我殺鈎鵅勿使空人之曠城曹娥廟死孝魚龍窟垂名簡册香江流隨姓氏鄊土奉蒸嘗黃絹碑辭古青山宰木長世間梟獍子何面過祀堂伏日奉懷江浙髙掾史次早友人黃仲德入杭以詩代簡伏日常年苦炎熱今年伏日風雨凉官曺早出丞相府賔客髙㑹湖山堂垂楊繫馬緑隂靜畫舸採蓮紅粉香應有新詩紀行樂武林風物增輝光河魨十一韵世言河魨魚大美有大毒彼美吾不知彼毒聞已熟其子小如芥食之脹如菽腹腴膏血多目脾頭項縮烹調茍失飪禍至不轉矚或言直一死輕命重口腹邇來草里間杯羔𢾗家哭譬諸安與史敢用甘顛覆溺愛多不明奚止一水族作此河魨詩逢人敢忠告過道鄊先生墓有感十六韵忠公天下士夙學能慎獨平生寸心赤耿耿照黃屋元符引𥚑諌痛甚賈生哭上言正中宫下言斥當軸直道時不容除名竄荒服建中及崇寧寵辱手畨覆炎蒸嶺南地文章散清馥晚歲歸故山林莊竟埋玉向來望佳城鬱鬱暗松竹今為禾黍區春雨耕觳穀翁仲知何歸雲仍困無告嗟豫呫畢生斯文賴私淑願言理侵疆重植宰上木愚公將移山自謂計已熟精衛填東海可奈力不足傷心復傷心殘碑卧荒麓簡吳門葛可久九韵東南古吳㑹河江浸坤軸閶門萬人海驪珠混魚目嗟爾珊瑚珠光彩照􅊤谷挺挺八尺軀便便五經腹復用岐黃書教子時共讀座有焦尾桐樽餘荔枝緑我室雖甚逺扁舟往來熟此别獨經年羔墻見鴻鵠珍重應時須抵鵲毋以玉久𣣔應命故有末句折時分省募文武士聞可寄謝京口俞府判先生辨惑編九韵憶昨携槁梧往學太古音清風一揮手為我湔蓬心言歸卧空谷神飛繞帷林寄來明月珠價重㕠南金豈不懷報章慙愧秋蛩吟人生少㑹遇嵗月何駸尋晨瞻蒜山髙夕覽江水深江山渺豫懷塵世盈我襟行當駕黃寉從此閬風岑璚花行送盛克明教授歸維揚揚州好花非不多奈爾絶品無㕠何水沉香骨素玉蕊琉璃滑葉青瑶柯東風二月花時莭二十四橋香浸月小山叢桂避芳塵東閣官梅褪殘雪向來名士多品題拈香御史今亦知何日移春獻天子不負此花天下竒王長史代祀天妃回偶留常州為豫作辨惑編序驛亭飲别以詩謝之字叔善巙折長史名餘館客也折巙平章使者祈靈海上回蛟螭逺避漕船開入朝將進賢臣頌當路皆知館閣材傾蓋道邉欣邂逅邅車林下久徘徊綵毫題我蒲編去鵉鳳回翔燕雀猜奉同干尚書賀髙太尉承恩詩紫鳳銜書下日邉玉樽金幣禮髙年天恩已見來三錫月俸猶供食萬錢緑野干橋間几杖長洲茂苑美山川舊家池館花如錦簫鼓春風送酒船次韻陳心逺久雨七韵秋風捲衡茅我屋漏已久春來復多雨水馬階下走人皆憂巨浸吾謂晴可守獨憂東海上連年聚羣醜官軍涉鯨彼鼠輩未梟首西疇作沮洳閒我扶犁手何以解此憂山瓶㵼春酒喜復鄒忠公墓田賦絶句十首謝兩郡侯新松重植古人墳五馬同來兩使君歸我侵疆三十畝山靈慙愧謝移文白頭翁媪倚林莊笑指荒丘舊石羊誰料百年荆棘裡又看金紫奠椒漿奕奕祠堂春雨生青山紅塔照簷楹檐前燕雀聲何喜冠蓋如雲為落成去年風雨暗桑麻今雨楸梧一望賖寄語無情梟獍子壠上銜土有慈烏傾囊不惜購殘碑為愛前朝幼婦詞賴有賢侯知古意從教俗士笑書癡府公遺愛沾幽壤吏部文章勒翠珉寒食清明人灑飯落花飛絮鳥啼春里翁猶記前朝事五馬年年上冢來白鳥能言髙柱立黃楊合抱細花開青山無𢾗麒麟冢人到林莊下馬過為問路傍楊栁樹向來興廢事如何景鄒亭在稼亭東斷礎猶存草莽中羣圃何時重搆築羔墻長見道鄊翁千古一抔忠義土青山門户碧溪陰溪流冷浸中宵月照見先生未死心三月歸田舍作五首十年為客不窺園數日還家獨閉門兒女牽衣拂塵土親朋折簡問寒暄江南花栁青春好淮上風煙白晝昏聞道賊渠今磔死雨􅑵歡喜倒芳樽余生甘兮老漁樵竹徑柴扉掩寂寥舍後薄田堪種秫門前流水喜通潮人遭歲歉飱榆粥天假春晴飬麥苖蚤起憑髙望西北楚氛猶似未全消天開鐵網放鯨鯢甲馬歸營罷鼓鼙四海蒼生皆鼓舞三苖何物竟昏迷愁聞近日軍需急幸得新年米價低春雨壠頭耕未得桑林布榖為誰啼鴉鳴鵲噪總無靈庸儒訛言更莫聼萬國山河春蕩蕩一時烟霧晝冥冥官軍自足追窮寇縣吏猶勞募壯丁何日買刀仍買犢花村雞犬共安寧飛芻挽粟未能休嗟我鄊鄰日夜憂何事羣凶恣猖獗半年諸將擁貔貅桃花過雨紅顔老杜宇傷春血淚流堪笑腐儒無可用下帷依舊說春秋記夢併序至正十二年六月初八日夜夢於先人舊居之後堂看故兄所遺春帖有讀書傳家等語因念先人嘗言曽大父以儒名家從父領鄊薦為校官我兄尤好學而文今其孫無有似者次兄二子皆廢學吾三子亦未成立以此感泣既覺而涕泗交頥心甚怵惕因作詩以示兒苦熱夜難寐坐久方偃息夢歸巷南宅竹樹皆歷歷伯兄手題詩猶存後堂壁余時因感傷先世本逢掖書殾今寂寥寶樹化荆棘立觀楷書字哭泣淚沾臆覺來憶詩話白月光滿室重念世澤微門衰自疇昔我方埀髫時伯父死于溺音容兩茫然了若不相識但聞能孝友風姿頗清逸四十五六年遺文總狼藉題壁尚何有此夢生此夕余生雖無成多賴讀書力揩劘鏡上塵積纍機上錦嗣續幸不泯所願能自植木也年十六林亦及二七阿森今九齡父母俱愛惜不為樵牧童又不學稼穡螢􅑵與雪案寸晷宜自惜讀書承世業此語誠藥石汝曺能黽勉是亦尊汝伯旁觀勿相笑說夢等兒劇客來革孔頻移轉覺寬酒杯雖舉不成歡客來為說紅巾苦􅑵下榴花亦怕看進士馬仲達為常州路録事司達魯花赤監築城以詩見示余次韵答風櫩抱膝聼鳴蜩頗覺鄊村有呌囂四海百年歸一統兩階何日格三苖斗城新築關門早鐵騎南征去路遙年少參軍金榜客可無竒策上丹霄至正壬辰十月草二日於妻兄任氏家避亂得家兄信感嘆而作避地橫山下離家十日餘鴒原常在望魚素忽傳書猛虎走城郭蝮蛇生里閭欲歸歸未得搔首獨躊躇𥘉度有感年五十寓任氏折十一月初六日時我生何不辰埀白遭亂離鄊城箭滿眼咫尺不得歸百年今已半喘息能幾時桑蓬負𥘉心蓼莪有餘悲慙愧朱買臣富貴能自期男兒無所成百齡亦何為對酒不復飲把劍空欷歔寇退别詹魯賢十六韵君家天台下我家滆湖邉針芥一相投膠漆四五年倉皇避羣盜妻子同一船中途苦離散經旬各憂煎相見若再生相依益相憐橫山樹歷歷東洲水濺濺山水非不佳旌旗日紛然兩家妻與子一月夜不眠明發竄荆棘衣被褁槖饘莫歸客櫩下耳語青燈前葵心傾太陽𣏌國憂崩天逝將哭秦庭乞師掃烽烟臨期賦遁去此志從鬱然坐閲明年春東風草芊芊慘别牛城下相願猶䕫蚿重結死生交永矢金石堅送京口劉千户歸營十二韵桓桓千夫長胸有萬甲兵生長太平世終日醉六經一朝著兜鍪羅馬出瓮城擒賊不知𢾗報國丹心傾台司方論功憲節偕按行部曲嚴武威瘡痍撫罷氓寶刀洗荆溪鐵馬歸栁營鶯花已春莫草樹猶血腥一雨殊足喜四野布榖鳴吳兒賣戈劒買牛事春耕顧瞻天地間埃氛未全清何曾盡掃除丈夫功業成過金陵明道書院訪友人髙孟立山長適遇秩滿且有側室洗兒之喜作詩賀之六韵客來鳳臺下適見生鳳雛斑斑五色羽唪唪百尺梧家客席上珍愛君掌中珠度曲紫玉簫㵼酒黃金壺起舞為君壽試啼呼阿奴梅花亦解事含笑立庭隅過陳時舉宅畫壁十一韵㕠松歲寒姿拳石太古色我昔山中逰憩此松下石松花雪霏霏松葉風瑟瑟安知此清景相對復今日拏空兩髯龍乃在一書屋主人罷鳴琴晏坐室生白客來苦炎熱傍樹欲推幘不聞天籟鳴但見空翠滴煩襟頓如洗林􅊤幽興適經月𢾗相過明朝有行役黃埃赤日中令人轉相憶孫伯昭與陳天倪用簡齊一凉恩到骨四壁事多違為韵賦詩見寄全和答之薄田西河上種穀多種秫秋來喜甘雨牀頭釀真一我思山中人不見如參商蒲萄好留客毋用博西京秋水漲百川無人洗乾坤堪笑閭閻下空懷報主恩東齊可談書西齊堪寄傲山中儘寬閒俗客自不到凄凄草上霜耿耿天上月遙憐兩淮地千里照白骨吾生西復東徒以口腹纍懷哉安樂翁不出時有四明月足可喜好句無用覔寒蛩為誰悲唧唧鳴四壁殷勤語兒曺要識一丁字明年世清寧依然重文事主人錦氍毹飲客金叵羅遙憐古岩桂香似廣寒多持身服苦淡適口忘甘腴青雲丈夫志白首慎毋違哀陶堯佐併序十三韵至正壬辰冬紅巾陷常州驅州民攻京口不從者殺之我邑人陶君堯佐不幸為賊所得且欲并驅其諸父昆弟以行君厚賂之以一身代衆人之急從至丹陽聞官軍鼓噪聲即倒戈剌賊渠墮馬因被害時吾里有識君者既而語其事於豫豫以君嘗讀書知順逆故誠信而悲之閲二年方欲問諸水濱筆之野史以暴白其難明之志其族人有為之後者葬君衣冠豫述前所聞作詩哀之嗟爾練湖水不洗斯人汙冤血化為碧春雨生苔蕪皇天有老眼斯人亦何辜生當太平日三世家業儒本無縛雞力苦被虎豺驅孰知能賈勇倒戈誅賊渠鐵石一寸心虀粉七尺軀而家既能全而憤亦以舒但恨薰與蕕混然骨同枯華表寉不返竹林啼鳳雛衣冠藏古丘魂魄逰清都擊賊作癘鬼當與張君徒天意不可問愁雲晝糊糢兵後到杭馬掾史置酒見招且示以所與石處道丘長卿西湖倡和之什次韵首折一西湖山色冷如灰前度劉郎今又來紅粉畫船今寂寞斷橋流水自縈回一堤寒栁風烟老兩鬢飛蓬歲月催賴有故人能慰謝緑樽重對晚山開西湖曲西湖春水緑于酒西湖女兒嬌似栁依稀二月三月春攀折千人萬人手我有一索青銅錢明朝也買下湖船試歌斷臂孤兒曲湖上豈無人㑹傳自錢塘回舟中懷馬掾史省前山色翠欲滴幕下官曺清且間公退每傾鸚鵡盞客來頻爇鷓鴣班坐看急雨沾花席應念扁舟出栁灣白髮鄭䖍氈未暖還家方苦路間關舟中懷辛至善春草緑如許之人猶未歸江東雲度水馬土雨沾衣王事馳驅久家鄊信息希多情舊時燕還繞畫梁飛望官軍楊子江邉羣盜來奔牛吕城飛劫灰客懷每日鬱不樂笑口幾時能復開東郭流離人似蟻西村格鬪鼓如雷官軍望斷無消息獨立斜陽首重回示長子木二十韵萑澤聚羣盜池魚恐遭殃喜今避地去溪上一葦杭汝妻扶汝母小婢携槖囊丱角汝兩弟隨行色蒼黃僕夫偕汝留家居謹周防屋後林有竹林後園有桑祖宗百年墳高樹蔭釡堂汝為吾冡嗣承家奉蒸嘗興廢固有時生理無怠荒但無􅗂􅊤憂可待時世康鄊鄰或侵凌勿與較短長韓信跨下辱自度勢莫當婁公面上唾不拭庸何傷彼惡汝勿為口亦勿播揚天定能勝人善惡報乃彰松柏耐歲寒葵藿傾夕陽此身可虀粉此志勿攺常汝幼頗醇謹亦嘗聞義方稍暇曽讀書慎勿弄杯觴行看太平日斯文復輝光嚴將軍戰馬歌并序至正乙未春常多盜省府調兵捕之浙東宣慰司元帥嚴公來總軍未幾無錫平移軍武進一日搗來富莊賊巢軍中失二馬明日賊乘之抗官兵烈塘上二馬聞金鼓來奔賊控勒不能止隨遂墮地馬立踶殺之官兵大捷故豫烈塘之民感神其事俾余作歌以美之往聞齊軍夜路迷老馬前導人追隨又聞的盧躍檀溪漢業復立西南隅古來良驥稱有德未有驍騰能殺賊將軍兩馬䭾賊來雲霧四起生風雷紅綃帕首尓何物霜蹄一路成飛灰軍前認主鳴且舞驚倒熊羆與豺虎羣凶膽落不敢追官軍凱旋捶大鼓馬兮馬兮誠有功須知感物由元戎將軍接迹武惠功煌煌史册書勳庸爾馬名亦埀無窮别姻家尹居士孫可傳者豫女妻之故避折尹氏世居金檀尹干橋其寄留家具及古今書八百餘帙復回故折亂挈家依焉未几寇兵自溧陽至豫遂矣折邑烽火西來滿眼紅歸帆忙挂寉溪風蛟龍劍伏豐城下蝌蚪書藏魯壁中邠老自憐能世守阮生誰信又途窮一杯此夕知何夕兒女挑燈笑語同贈花御史常侍文尹晋陵水雲襟懷鐵面威鄊井重過思依依州官局踳迎􅔕馬父老歡欣識綵衣閩越地偏滄海接江淮屋逺縞霜衣飛舊逰還念城東客白首持竿坐釣磯過無錫口號丞相達識帖穆爾公赴江浙折至正十五年十二月十五日憤而作折余因感丞相樓船捶大鼓鐵騎前驅猛于虎紛紛鼠輩敢橫行與我官軍戰河滸落日未落懸林梢一天殺氣風騷騷官軍縱火鼠入窟太湖水濶陽山髙相君賢似唐裴度豈無將軍如李訴兜鍪戴雪搗賊巢一夕湖船竟飛渡我有一寸鐵願作將軍箭將軍三箭定陽山湖水依然净如練楊鐵崖先生既為應芳序思賢録又以應芳上書丞相不報作長詩贈行是用感激賦此留别兼謝錢塘江上久為客先範門前三上書喜得問竒楊子宅何慚題柱馬卿車風塵鴻洞人皆恐氷雪崢嶸歲又除覔得驪珠三百顆橫山歸卧舊田廬代簡蘇景瞻先生二絶西門渡頭春水生故人不來舟自橫聞道移家近湖住手栽桑柘緑隂成布榖聲中春雨生溪頭倚杖看春耕干戈滿地人相食宜爾龎公不入城龜巢藁卷之二終
