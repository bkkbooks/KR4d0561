front:
  text: 龜巢藁卷之二
  hash: sha256:792d491d1f46b164e80623cfd5904dd0f30693affc26ed4f5a0f63725164517d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0561_SBCK_002-1a}
body:
  text: 奉陪陳伯大先輩及趙師吕張伯啓朱月江清夫兄弟登金牛臺九韻六龍城西吕城東奔牛古堰卧兩龍誰築髙臺水中沚野有蔓草牛無踪河邊青苔生白骨刀鎗箭瘢猶未滅問知八十二年前戰死當時皆義卒鐵馬遁去劉將軍大家牽羊走燕雲三百山河獻明主北駝南象今紛紛登臨且喜得隹客鞠育青青已堪摘浮雲世事勿復論一醉西風真上䇿和蘇竹逸秋日還鄉夢繞淞江太湖上舊家鄰里古漁磯長腰粳米家家熟巨口鱸魚個個肥為客已驚絲滿鬢還鄊何待錦為衣筆床茶灶蓬􅑵下來往風帆𢾗日飛呈趙徵士吳姬手執金叵羅春風笑面生紅渦主人留客長夜飲客拜主人辭酒多主人沉醉客亦醉客散扶歸主人睡殘杯冷炙厨頭傾鄰家兒有啼飢聲江碧山千户席上以我愛夏日長分韵得夏字故書六韵堯階舞干羽聲教溢夷夏清風細栁營長日有餘暇兵厨移竹林觴詠集陶謝酒傾虎頭杯盤割牛心炙佳哉醉鄊境漸入如啖蔗客去復相期明朝還命駕自冬而春舉家病疫豫幸獨無恙既而疾止詩以自賀併記里俗之陋云十五韵昨歲夏秋旱四國人顛連餓死非不悲病疫尤可憐甚者枕相籍遺骸飽烏鳶安知期月餘厲氣猶鬱然余家百餘指連屋魚貫眠顧我如一木支此敗屋顛上堂問湯藥下厨供粥飦鄊鄰不我過恐為疫鬼纒俚俗無足怪妖巫肆訛傳所賴學之力賦命知自天立言斥淫祀秉志金石堅慈親今健飯甥男仍滿前吾妻及女嬃問寢相後先嗟哉黃楊木脫此厄閏年東風播陽和草木仍春妍鄧道士雪中遺梅花一枝詩一首酒二樽見惠館人王文父飲余遐觀樓次韵答詩仍要鄧晚集欲作梅花賦才踈愧廣平一枝春到手酒香詩更新開樽對雪飲將詩遣童去亟請過蕭亝石鼎與聨句栽桑春雨墻陰手自鉏賸栽桑樹繞吾廬歸來笑與山溪妻說來歲春蠶食有餘九日對雨懷倪雲林白雨何其急青山不可登兀然無客到間坐似禪僧盆菊𢾗十蕊村醪四五升猶勝陶靖節冷眼望王弘飬鶴七韵西鄰主人翁養鶴如飬客傳童供寉料稍慢童受責試問寉何如羽毛喜潔白又能舞翩躚長鳴振金石客有寉骨清粹然含素德窮居以詩鳴冷面常菜色賦命寉不如可為長太息送李知事赴邵武中以詩經及第前訓導折金壇李質字竹操延祐常學舟車千里逺甌越萬山連舊俗民多獷孤城地極偏朝廷用儒術幕府贊承宣更喜詩三百東南可盛傳送凌萬里挈家㱕海陵鄰居三十載奈此别離何客路秋光薄㱕舟月色多雲山連海岱吳楚隔江波珍重千金璞良工更琢磨郡學西齊夜坐懷親友客心清似水學舍冷如氷苔榻三秋雨藝編半夜燈病多憂老母會少憶良朋麋鹿山林性悠然愧未能送兄逰𥙷陀山四首蓮花已結東林社藜杖復尋南海逰千百憶身黃面老化城今豈在􅌡洲飛鳶帖帖水連天行李蕭蕭客上船津吏不須勞詰問道人來禮白衣仙烟霧昏冥晝不開颶風吹浪雪成堆獻珠龍女應相笑何處扁舟載月來堂上慈親老惜兒逺逰尋佛笑兒癡倚門望汝㱕來日三月䦨珊四月時寄錢塘教諭金君捷紫鳳銜書下九天司徒今日復興賢𣣔知别後成何事和得陶詩百許篇哭王伯祥二絶昨朝相别夢𥘉萌一夕那知隔死生跖自永年顔自夭大鈞于物信無情傷哉郎罷客西湖匍匐㱕來玉樹枯風雨髙堂春寂寞忍聞長夜泣諸孤惠山泉和翟玄玄先生韵青山屈曲九龍蟠一派清泉噴雪寒陵谷變遷知幾度石池洋溢不曽乾幽亭過客分雲液古寺間僧煮月團莫向貴遊誇絶品恐煩迢遞入長安耕隱為蕭徵士作蘭陵溪上梅黍教子讀書深閉門時人笑渠生理拙渠亦笑人多覆轍春來烏犍一犂雨歲晚黃精三尺雪有時獨自舞短蓑飯牛别作耕田歌長安車馬自塵土奈爾濯足滄浪何君不見蘇秦為無田負郭平生不識耕田樂奴顔婢膝謁諸侯黃金載多禍隨作君今有田兼有書夜深燈火朝犁鉏只恐一朝富貴逼人去猿寉笑人留住折不送住僧德無言歸靈隱二十韵鴻鵠之志飛冲天鯤鯨入海方悠然汝生不受塵網牽作佛要在靈運前先入壁經汝舍旃棄家乃著牛車鞭袈裟斜擔雲半肩東西南北十五年爾來參得靈隱禪神鯉躍出西山顛歸來瓦瓶携冷泉侑以白雲歌數篇我昔西湖􅋈酒船曽聞老猿啼翠烟新秋雨洗山㳙㳙石頭路滑難攀緣汝今言歸磨汝磚山中之人應汝憐道經孤山腳下梅花邊敢煩為我問訊林逋仙寄金陵陳雲心先生浙後復歸家于金陵折先生少學道遊寓兩者多從之遊逺蒙惠書故以詩代簡折以能詩善琴終知臺門然屢薦不起學先生閉户自婆娑御史乘􅔕每見過白下詩傳名不朽紫霞琴譜訂無訛樓居卧看三山逺學子來從兩浙多一别十年還念我逺厪書尺問如何送陳漢卿赴江隂州知事十三韵玉雪風神秀雲霄志氣雄騫騰從早歲交結盡明公鶚薦無虛日鵬搏適順風修名今樹立令德磨礲清露金莖表黃流玉瓉中詞章追太史雕琢謝良工綸綍恩重被無裳秩漸隆雄州勞贊畫善政惠疲癃幕府文書簡江城草木空風濤秋浩蕩烟雨晝溟濛退食揮塵吏忘機對海翁仕優吟更好境㑹意何窮離索遙憐我殷勤為擊䝉愈慈親年八十四首慈親年八十言笑滿懷春衣食兒躬耕蒸嘗婦采蘋一間殊可喜長健不妨貧眉夀曽孫酒黃花節物新其二慈親年八十早歲歷兵戈老此太平世晏然安樂窩門前流水活隴上白雲多兒輩生涯好東臯雨一蓑其三慈親年八十一子帶經鋤貧賤無鐘鼎辛勤有屋廬小園千個竹老圃四時蔬鄰舍間來往諸孫御板輿其四慈親年八十頭鬢雪紛然安得長生術終為不老仙平生甘淡泊中歲絶腥羶净拂燒香几持經繡佛前聞友人陳子山廷試第一喜而有作用寄乃弟子方紫衣使者日邊來為道元方作大魁金闕早朝鳴佩入璚林日宴戴花回九天恩澤沾多士一㸃文星近上台愧我無成驚且喜漁莎獨速舞溪隈奔牛巡檢胡石潤卿示豫胡婦殺虎圖其事乃前至元七年濵洲軍士劉平之戍棗陽與妻胡俱在道上為虎所得胡逐虎殺之潤卿持畫索書詩因題其後猛虎誰不畏良人吾所天眼看性命落虎口妾身雖死何足憐嗟哉劉郎妻力不猛于虎怒氣一奮發執虎如執鼠想當攘臂急逐時太山可拔城可隳呼兒取刀兒後隨刀入母手虎腹披當時若使遭虎嚙虎口甘心作同穴嗟哉劉郎妻今古誰足擬馮媛當熊為君立饒娥殺蛟隨父死嗚呼裙叉之下有君子宜爾芳名著青史鮮于瑞卿還碧亭鮮于公子平泉莊有亭翼然水中央天光雲影白日靜菱葉荷花清露香栁下繫船魚可釣坐中留客酒盈觴門前漁浦接洮滆白鳥飛去烟蒼茫朱逸齊先生挽詞三首前朝士習雕蟲巧先生詞章風格老功名到手陵谷變雲霖竟作商山皓駢花儷葉墜秋風獨抱遺經自探討嗚呼一歌兮懷我師平生瓣香今為誰階庭桂子𥘉芬芳盲飈怪雨俄摧傷中郎賴有女傳業安然得老溫柔鄊平生綴輯富篇章才名不與身俱亡嗚呼再歌兮雲石裂斷腸猿呌黃山月憶年十五愛學經先生眷之㕠眼青每隨杖履訪朋舊耳聞目擊皆儀刑而今先輩總淪沒黃鐘大吕吾誰聼於乎三歌兮涕淚零招魂不來秋杳冥送秦彥明二首美人木蘭舟春風挂帆去舟輕疾如飛可喜亦可懼浙江多風波越山暗烟樹孤月照蓬􅑵今夜宿何處其二老驥千里材鹽車九折坂行行復行行伯樂遇何晚之人懷帝閽丹霄路云逺一笑膏吾車疇能為推挽送趙方叔入京去去京華八月𥘉聖皇清暑返鸞輿五門雨洗紅塵净九闕涼生碧栁踈慈母衣裳縫密線丈夫門户出髙車翰林若見陳修撰為道野夫曽寄書贈術士楊南溪有客有客楊南溪天文之學師重黎又讀郭璞青囊書書今不用如筌蹄十年河海聲藉藉觀水觀山㕠眼碧一官雖冷氣如春那識人間有金璧相逢林下秋雨乾髙梧葉落天風寒杯酒殷勤盡清興作詩醉寫烏絲闌立秋苦熱念秋至立秋意欣欣一雨忽破塊千山净無塵新月挂髙樹凉風灑衣巾重耒囊中書懷我堂上親丈夫茍未遇妻孥耕且耘胡為苦離别低頭長傍人和孫伯昭佛社二十韵祭法埀明訓邦家祀有功愚氓何悖禮佞佛乃成風婦女僧流雜香花佛社隆三身誇悉怛千眼慕圎通金像瞻如在珍羞供極豐九衢迎象駕百綵製天宫窈窕閨房秀聨翩市井童莊嚴森侍衛遊衍適西東行道駢緇素飛塵隘軟紅寶幢雲母扇銀燭竹晶籠鐃鈸伶倫後袈裟粉黛中亂倫言可醜妄意福來崇廢業兼旬久揮金與土同盤遊律有禁長吏聼如聾闔郡喧邪說同𫀆見直躬新詩來滿紙髙論發羣䝉白雪無人和皇天鍳厥衷不為因果惑真是丈夫雄感激徒三嘆棲遲奈兩窮抗言摧佛骨所願學韓公贈丹陽歸真觀諸葛鍊師鸐溪之水鳴㶁㶁九曲龍蟠護仙宅東南一望天宇寬緑野平蕪接洮滆階前老樹三十圍門列修篁𢾗干㦸緑隂庭户􅊜空翠五月天風吹巾舄野夫何緣飲丹井遇客尋真羽衣客焦仙莎衣煮白石吕翁榴皮題素壁物換人非𢾗百年豫復幽探訪陳迹黃冠老師卧龍種知雄守雌室虛白詵詵弟子皆速省中有詩豪更琴癖哦詩鼓琴師亦喜一唱為之三嘆息嗟豫汩沒塵土中到此悠然百憂釋采芝終日不盈䄡曵屣長歌晚山碧寄題蔣仲益野趣亭十二韵陶潜㱕故園日涉乃成趣迷途雖不逺已恨出門誤眷兹亭中人不識功名路幽居瞰洮滆詩盟結漚鷺粳稌湖上田花竹家後圃山色開畫圖波光照􅑵户寒燈課兒孫春耕了農務杖履三十年曽無一塵汚人生天地間溘如草頭露軒冕渠自勞刀鋸吾無懼熙熙太平世千載實難遇野趣知自娛難以語童孺代簡蔣成玉三首往年同掣釣鰲鈎空載錢塘月滿舟從此相思不相見槐花又老𢾗番秋東風傾蓋采芹亭一笑相看兩眼青老我無成今學稼荷鉏依舊帶遺經春來一月苦隂雨少頃雨晴邀客嬉金斗城西芳草路水邉楊栁青離離送牛季和赴旌德教諭十韵積雨喜新霽六合無􅊏埃江頭楊栁風送客征帆開把杯問青天天網信恢恢之人飽經術吐辭粲璚瑰不居白玉堂合著黃金臺培風展雲翮胡為尚低徊往矣教岩邑菀然育羣材峩峩敬亭山相看亦佳哉薺麥茂雪霜蛟龍候風雷秋風木瓜熟好題書後來慈烏十韵倚􅑵看慈烏生雛念雛飢黃口未能啄雌雄交哺之羽毛日以長飛飛展㕠翼父母乃巢居羣雛為求食得食能幾何入口不下咽去時聲啞啞歸來羽翩翩大烏能爾慈小烏能爾孝他時子為子宜亦如爾報萬物人為靈不孝誠何心我今作此詩警世還自針余子元御史枉駕敝廬以詩貽次韵奉贈竒哉古秦鏡奸邪見肝膽當年獻天子重瞳目親覽邇來匣中藏寒月光湛湛玉臺重拂拭清輝元不减陪全公逰仁惠觀途中酌酒賦詩豫和首折二吳山相送越山迎二十年前􅔕馬行今日經從重逰處詩情秋色喜㕠清山中羽人山下迎籃輿看山吟復行松隂呼酒聼禽語一笑如見黃河清邀髙則誠郊居小集别多無奈苦相憶賴有尺書時往來逢人為說烏寶傳此客合貯黃金臺北風塵土歲云莫南湖水多氷𣣔開扁舟短棹出西郭元日相期看野梅同逰趙君模過訪荒城歲晚氷雪繁幽人校書深閉門書中樂與聖賢對門外寂無車馬喧年光冉冉老將至心事悠悠誰與論肯為梅花過寒谷定邀髙子共清樽偕丹陽諸葛用中金壇王元徵同應鄊試阻風無錫和用中韵船􅑵晝暝鈎簾坐暘谷雷鳴送雨來佳友喜如㕠鳳集清樽且對九龍開槐花滿眼催行色桂子吹香入酒杯黃帽怕教牽纜去請看風浪雪成堆次鄧混然韵送溧陽王元仁兼簡乃父時可先生兄元德客裡匆匆送客歸江空歲晚雪晴時父兄相見煩傳語書劒重來好寄詩世事兩年多反覆人情十日九馳驅甓橋東畔王猷宅杖履幽尋未有期丹陽道中早行過吕城寫示諸葛用中十三韵寒