front:
  text: 龜巢藁卷之十五
  hash: sha256:899f80df54f4746f845b51f6d6e6eeafc1480459316d934c9d838238452af24b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0561_SBCK_015-1a}
body:
  text: 記瑞竹軒記豫辟地甫里與徑山壽上人為方外交一日過豫曰今年春吾祖如山翁燕居之所插竹為酴醿屏閲數日竹皆蘇活或者以瑞稱之故名其軒曰瑞竹敢請子為吾翁記之既而復延至竹所相與撫玩曰是竹也前為屏時屈其所天至是乃盡釋其縛屈者信抑者揚拘者縱葉發乎蒼幹徑節之間生意藹然有不可得而閼者愚乃退而思之夫竹非蒲葦等易生之物可不根而生者今若此果何祥耶嘗聞往者冦萊公插竹而生世謂公忠義所感如山之竹亦必有所感而致然乎豫來吳中聞翁有微德之事二焉屬歲飢饉里有窮乏則周之俗多漁畋忍物暴殄恆買而放之斯二者固尋常有力之家能為之豈其一念之誠仁發于中默契于天而獨有此休徴歟抑别有隂德而人不知歟如是則萊公之竹不能專美于昔矣雖然物之瑞未若人之瑞也嗣法之徒森如竹立有能虛心以受道秉節以植德清風孤摽為上拫器則其為瑞又豈此君可同日語吁人為物靈氣化尤速某即拭目以俟龜巢記至正丙申豫辟地滆上依舊識里翁劉氏家築室一區棲婦子差可容膝既而以龜巢題之客或過豫曰龜亦何嘗有巢哉豫曰子不聞乎千歲之龜巢于蓮葉蓋其以葉為巢𥘉不費經營之力也顧豫此室實類之僦地里翁地不論直假力鄰伍力不受傭鳩工材則有鄉邑諸友人相之故其室不勞而成今也閉門縮首帖然如藏六之龜蟄乎其間此龜巢之所以名也比數日來春和景明氛埃寢息四境之內桴鼓不驚田夫野老相與招致涉桑苧之園過桃李之蹊瓦杯濁醪歌舞酬酢逍遙徜徉又得如曵尾泥塗者此雖巢外之樂亦因巢而得也但不能噓吸導引如龜永年苟于此偷生亂離免禍鋒鏑全要領以終其天年志願足矣若夫明休咎斷吉凶决大疑于國家浮洛出書為太平文明之瑞則同類之中自有偹四靈相斯丗者區區巢居之樂與坎井醯瓮同乎一天不知大小之笑為何如客曰有是哉子之適意也而今而後吾亦𣣔從子之居以適其適可乎豫曰可客喜而去豫因次對客之語是為記龜巢後記是歲八月之𥘉天兵自西州來者火四郊而食其人吾之龜巢與先世舊宅俱燼矣豫乃船妻子間行而東過橫山竄無錫朞月之間屢瀕于危當是時跧伏蓬底屏息若支牀者然猶數數引頸回顧以戀其故土明年仲秋至婁江東近于海潮風汐雨漂搖拪苴久之遂舍之從人間借屋而寓閲四年凡五徙聞鄰邑無噍類于是同室之人幸若再生雖貧寠不以為苦且復以為樂也至吾之所樂則又以窮居無事得專心讀古聖賢書以廣其志仰天不愧俯地不怍廓如也然視此大􅒘吾生若浮與夫龜浮蓮葉者何異故所至以龜巢名室雖逼仄心有餘𥙿蓋不以棟宇為巢而以天地為巢也峻宇雕墻莫知其光蓽門圭竇莫知其陋但知此巢自開闢以來厯數千載不壞吾與萬物同居其間正不藩籬町畦以自局也以是而觀區區舊巢與墮甑奚惜雖然物之巢居者衆矣未若擬龜之巢先後罔異龜則擬其靈耳若曰以靈自燋亦其用于世者然也世不吾用吾生自全吁用不用全不全係造物者處之如何非龜所能為也惟兩間之巢人不能壞此吾心可恃而安者吾心既安何往不樂苐恐不知者謂無巢而有名疑為誕故重託毛穎氏告之雲半間記歲庚子月閏五西山師搆小閣于天慧莊而居之題曰雲半間蓋取諸詩中語也豫時客天慧與師落成徘徊其上溪山如畫人皆喜之愛之而師之所樂不在是也是屋僅一間髙不倍尋廣不踰丈無欂櫨栥棁之華自常人觀之井幹麗譙奚啻霄壤師獨處之𥙿如蓋其前後左右牗户虛爽蒲團木榻薰爐禪几之外無長物焉師于六時坐如泥塑諸弟子瓜花之供日一二至談空說有或從侍立客至或信信宿宿皆不能常與師共之惟英英之雲悠悠而來朝于斯夕窮歲月于斯一榻之外皆雲悠居言半間者亦謙辭耳夫雲之為物本來無心而吾師心無所往是亦無心人也以無心之人遇無心之物故不情而親不契而合久之則雲忘其雲雲即我也我忘為我我即雲也吾視吾室吾不知其與天地相間孰為大而孰為小也莊周云天下莫大于秋毫之末而太山為小其言殆庶幾乎雖然諸相皆妄吾師固知之久矣然而猶有此室者抑亦云桑下一宿之意乎豫嘗以斯言質之師曰然遂為記歸耘軒記吾友徐君伯摳以兵後還無錫故里築室膠山署曰歸耘徵豫文記之豫嘗質之曰而翁大中公為時名卿今逝矣州大夫亷君之才能也其家方薦之省府將上聞以官之而暇耘其田乎伯摳笑而不答豫退而思之君名父之子自早歲淑諸師友菑畬經訓垂二十年今以先世負郭之田莽為荆棘固不可不耕且耘也然亦奚忍舉此而廢彼耶必也帶經犁鉏斯可矣古之人若耕莘者樂堯舜之道耕南陽者有梁父之吟故一旦以三聘三顧之而起非惟澤溉生民功施社稷焜耀當世而伊訓諸篇出師兩表至今與日月爭光是豈專于農者能之乎雖然藝田之事亦有治道存焉敢請與伯樞論之五榖猶良民也稂莠之屬猶凶頑也草生而不藝則榖不榖矣藝之早則用力寡而功多小緩則小害大緩則大害既害而藝或百倍其力而不能盡去雖去之而榖巳罹其害矣吁草害于榖治田者過也凶頑之害良民治人者可逃其責乎惟沮溺荷蓧之流潔身亂倫者不足以語此伯樞宜留意焉樞聞乃起而謝曰是吾志也請書之用志于壁庶他日知所警云東郭草堂記至正乙巳春友人徐君仲剛書來曰瑗性迂拙分甘退藏擇無錫東郭荒僻之地作草堂居之讀書灌園蝸休蟻適自謂有可樂者子知我能為我記之乎豫唯仲剛卓犖之士也譬之楩抩豫章不巨室棟柱則山林而巳比嘗佐令慈溪方欲抉吏弊更苛政以仁其民一旦以當路掣肘棄若敝屣憣然來歸客吳下數年不入城府其抱負為何如哉兹草堂居寬間之野前有鵝津可釣可遊鴻山宛山屏列左右東膠西堠紫翠相接又皆忩户間天然畫圖也仲剛入則與書中聖賢相對出則與里中農圃為伍親友時至忘形爾汝腰不為督郵而折膝不為汾陽而屈適興賦詩往往有太白豪放所謂有可樂者其以是歟雖然昔諸葛孔明居南陽亦蕭然草廬而巳及乎以三顧而出八陳有圗出師有表而勳業卓卓如是靜學信不誣矣吁荒僻之居又安知非天假為學之地乎愚請以規仲剛併記斯堂之歲月云野人居記余聞之易其地則齊楚異音同其居則蘭鮑俱化大哉居乎故君子必慎其擇也豫友吳中行今乃去朝市逺城郭挈家淞江之濵桑麻之野蕭然一室名野人居是果奚擇而取哉昔中行以劔術逰諸侯借箸之籌幕中之辨嘗見用于當世豪傑矣未幾以時之不利投簪來歸回視淮隂狗烹之嘆華亭鶴淚之悲銅山餓死之辱金塢然臍之禍未嘗不愴然于懷其言曰窮居之安不愈于負且乘乎𬞞食之樂不優于覆公餗乎由是縮首閉門百念灰冷獨研精古聖賢醫藥之書以事其親以濟夫人暇日則携杖履往來溪山間與岩穴吟嘯者遊耕蓑釣笠友亦無間情真而不邊幅語朴而無貝錦滄洲濯足或坐終日茅簷曝背或談千古桃花流水之外杳不知其孰為秦而孰為晋也但知潭泉飲掬可以永親之年江鮮膾鱸可以美親之膳瓜疇芋區芝田藥圃皆其地所有而名都大邑之所無也若中行亦可謂善擇其居矣豫與中行有通家之好一日携兒子林過之用是為乃翁壽中行嘉豫言請以為記因命林執筆以書其居之壁云雪洲記趙君執中蘇人也家笠澤之隂與天隨子故里相望澱湖直其東陳湖橫其南其墟落乃一洲渚耳君性喜雪凡歲寒雪作之日天地六合炯如氷壺三江五湖如璚匜杯而山林皆瑤草琪樹也然陽精掩耀湯泉欲氷歌黃竹而悲者在在有之時君獨傲兀吟嘯于滄洲之上或終日竟夕而忘歸焉蓋一時清氣與虛室之白洞然無間故自謂平生慶快無踰此者乃即其所居之處所樂之事自號為雪洲也豫嘗于夏日過之階庭之間竹有蒼雪明窗净几寂無纎塵而大篇短章又皆與氷柱雪車同一光潔且曰栁雪之春蘆雪之秋亦猶見似人而喜豫于是知雪洲之樂蓋無時而不自得也或曰以君之才宜其從名王逰兔園而樂其遇出竒謀平蔡州而樂其功窮居野處何足快哉吁昔子程子論顔子之樂非樂簞瓢陋巷也君之雪洲亦類是歟但區區言髟耄不能揄揚姑述其概併以解或人之嘲云竹梧書房記洪武辛􅕀豫去家十有八年而歸搢紳故交多無噍類獨友人秦公宜仲主貴池縣簿告老于家豫首訪之與客偕往公所居環堵之外皆焦墟灌莽乃題其室曰竹梧書房客因訝而問焉豫曰嘻我知之矣公之先君子以多資弘第宅儲書數千卷自蚤歲教公為舉子業公研精伏生所傳之書旁通百家文譽日著時子山陳先生未魁天下與公為忘形交嘗與豫過之其階庭之間巨竹數百雙梧玉立緑隂蒼雪清氣襲人而公之丰神瀟灑殆若與竹梧俱化子山嘉之故有是扁夫髙垣大宅今瓦礫也碧格翠竹今枳棘也垂籖插架之帙不為灰劫則市井之醬䝉矣惟腹笥之書幸而無恙故嘗為郡博士以教其邦人又推其緒餘佐治岩邑以嘉惠其黎首今老矣尚能為鳴待問之鐘以接逺方來用之士為文章則駸駸乎周誥殷盤而不聱牙也扁乃舊名蓋不忘父兄師友淵源之懿也客既釋然公亦頷首出縑素請筆前語以告後之不吾知者併以示諸子若孫庶箕裘其業云是冬月建子日幾望余則龜巢老人謝某也映雪齊記毗陵何士信起家業儒儲書數百帙研精誦讀晝夜不息搒其室曰映雪蓋慕孫康氏之苦學焉夫以士信之家居市㕓足資用㷊膏繼晷乃所優為齊居豈虛名哉其心必曰我囱短檠猶雪之明我室棐几猶雪之瑩我讀我書夜氣以澄微言妙理披雲覩星顧我靈臺皎皎乎不雪而白不氷而清唾視籝金珍惜分隂曾不知九逵塵土之蓬勃四時寒燠之變更然則映雪二字又何異湯盤九字之銘歟彼灞橋詩人梁園賦客有不可與同日語者惟篤志之士如遊如楊立雪于當代程夫子之門者聞之必與其進矣士信謁余文請以是勵之蘿屋記毗陵郡城之西南距滆湖二十有餘里湖水支流北抵城而匯其地有髙原平林風篁烟樹景物瀟灑友人詹伯逺居之茨宇一區牽蘿𥙷葺扁曰蘿屋名固不虛蓋亦以昭其儉耳然庭戶􅞔如日必灑掃木榻棐几室無纎塵平居則䔥然孤立以孔孟之書教孫共讀異端邪說絶口不談彼流俗相煽而眩惑者弗接勝友時至撙爼欵洽或相與論端人貞士氣義風節終日竟夕亹亹不厭余嘗過而問曰子豈掃除一室之小丈夫乎伯逺笑而不答豫曰噫我知之矣伯逺通古今明物理視昔人之銅山金塢皆禍基也峻宇雕墻非安宅矣蓋其所喜者桑樞甕牗之美而所樂者簞瓢陋巷之天􅌂然為草廬布衣而耕南陽之田者其出處豈易與人言哉雖使得志其不為髙堂九仞也必矣善觀人者慎母以蘿屋之儉而陋諸洪武十有二年歲在己未四月之吉謝某記菊軒記古者逹觀之士寓物適意𥘉未嘗肆意于物也若莊周觀魚支遁觀馬阮孚自䗶之屐嵇康桞下之煆與夫愛竹愛松愛諸花卉者大率皆適意而巳近世流俗以淵明愛菊亦從而愛之所植或百數十株髙及尋仞花大如杯假以花師接飬之工移易種類使坤黃正色亦多變而失真其嬌紅韵白紫茜紺碧之屬愈出愈竒且復以西子玉環等尤物之名名之是則誇多鬪靡肆意以極玩好之娛視淵明何啻霄壤夫東籬之菊猶西山之薇薄言采之可以樂飢若乃賦離騷而餐落英者其庶幾乎韓圃晚香樂則樂矣然其趣有不可同日語者吁流俗之謬如前所云豈不大可笑乎吾友王夀翁以菊軒徵豫文豫恐其玩好之意淪于汚俗兩年不為措一辭今乃不然翁春秋七十有三凡早歲華靡之皆巳絶去軒墀藝菊僅一二本其言曰吾所以愛此者嘉其于草木變衰之秋霜瓣露葉淡然幽芬挺挺特立久而不墜殆與晚年矍鑠者有明契焉故朝斯夕斯逍遙徜徉或開軒燕坐或置酒速客終日相對不厭不倦雖高風雅致不敢妄擬于陶其適意之樂亦無官之韓魏公也咄彼庸儒朋淫可憎安得疾惡如諸伯厚者相與勵剛風搏沆瀣周流八極為兹花一洗汚衊之辱過翁齊軒呼酒髙酌咏柴桑之詩歌離騷之章盡醉以適翁之適而吾亦得適其適也矢心陳詞用志軒璧為後㑹張夲云斗室記自標枝巢穴之世逺宫室之制日新月盛世祿之家第有甲乙致習俗之侈而堂髙數仞墻屋錦繡者比比矣若夫屈身矮屋之士往往以力所不足不能有為其志未嘗不焱然也惟吾可積則不然可積以吳越錢氏之裔贅延安唐侯之家往來雲間築室采邑風山屏其前淞水襟帶其左右屋栽三楹高不過尋丈以婦家封侯之貴采地之富雖連雲别墅咄嗟可成今若此亦可謂不淫于富貴者歟吾將以其細行觀之屢嵗過鄉里視故舊親戚抑抑乎謙謙乎執子弟禮不異乎童丱之日無一豪放矜肆之態以加于人故咸謂有先君子好禮之遺風然則斗室之儉本乎天性非矯飾一時以要譽而為之也昔衛公子荆善居室完曰苟完美曰苟美故孔子稱之若可積之儉而約于衛荆其庶幾乎吾用是以稱可積而延安家法之足稱亦可見矣是為記思齊記膠東賈文學鈞慶典教毗陵郡以燕處之室榜思齊徵豫文記之且曰某所思者非謂能三思而行亦非敢以九思之訓待旦之意示警如書紳也思吾親于疇昔喪亂之秋相繼即世母蕞昌邑父堲萊縣幾致蕪沒幸而茅冦殄滅歸室祖塋大明開天拔擢寒畯代耕有祿而飬弗及親矣風木之憾十有餘年去鄉土幾千餘里霜露降濡悲感交集念𣣔灑飯松丘使吾親不為若敖氏之鬼栖息桑梓以終餘年此朝夕耿耿于懷也豫曰嘻逰子悲故鄉信矣况思親乎然君子之思其親者豈止是哉烏雛返哺豺獺報本特一事耳必也出言舉足動合矩度不忘其親詩禮之訓聼于無聲思無邪以正其心􅌂若思以敬其遺體由是而推其緒餘以淑諸人以施諸行事忠君報國流芳汗青以顯榮其親夫然後息負荷之肩解組綬之縛訪親戚省墳墓某水某丘凡吾親平生所釣遊處吾得釣而遊焉鶡冠鳩杖抱子弄孫以安享太平田野之樂則今日之所思者豈不熊魚棄得乎區區耄言筆諸齊壁庶或紓其懷抱云白雲亭記東漢趙邠卿壽藏之作吾意其涉艱危將以得全歸為喜故耳故至唐司空表聖乃預為壙槨時與客觴咏其中又作休休亭以寓超然物外之意史稱曠逹不誣矣今吾友唐公均舉由元末致仕佚老于家洪武革命䝉天憗遺以弓裘無嗣業者命其兄之子允明為後家事巨細悉付託之即在家為有髮僧參釋門諸老以學其學春秋八十有九號曰白雲翁距舍南百餘步乃為佳城旁結茅龕晝夜禪寐允明則日候起居奉甘軟如事所生且能承順其志築亭于前復鑿池以藝蓮芡之屬幽花秀竹與冢上之木參錯相映每邀致親之所愛盍簮于亭薰爐茗碗殽核樽爼某負米四方往往望白雲思親有如昔人之言者雖歸侍傍雲常在目請先生為我記之時坐客有辨之者曰吾聞藥山禪師以雪之在天為西來祖意今雲翁禪眼之明必有悟乎禪悟之語非允明名亭之意亦非儒紳先生所知也豫曰不然夫英英之雲一也其所觀感各有不同雲翁蓋視身如雲浮太空藐焉斯須猶瞿曇氏電露之喻也若夫允明望親舍之雲而懸懸者是則以梁公之心為心家居以壟雲自怡庸詎知非華陽真逸之心乎吁仁見為仁智見為智豫所知者此理而巳禪則吾不知也客笑而不言豫曰如何翁曰唯允明亦曰唯唯是為記養正齊記往余客東吳十有餘年聞儒林旦評以琴川髙彥和氏稱為儒士聲甚藉藉余雖未相識而相慕焉洪武辛酉秋友人揚純夫尤稱異之且言彥和以飬正名齊蓋取諸䝉卦之辭猥徵豫言屢辭弗獲豫曰大哉易也豈敢以管窺之見以贅疣乎請以古之善飬正者為彥和誦之如孟母三遷使其子去丘墓市㕓為不逰之地習禮容爼豆于嬉戲之間如室于蘭久而俱化厥後以寡欲飬心以直養氣傳正學而接跡子思闢異端而並功于禹是母是子非善養者能如是乎衛武公行年九十有五抑戒之作既自針警且求卿大夫官師之屬交相教戒瞽矇禆讃朝夕弗違言行之純罔有圭玷亦豈非善飬者乎是故一為亞聖一為睿聖易之所謂聖功者不誣矣吁人生天地間而所受之中夲無頗僻惟情竇既開牽于物𣣔日浸月漬或正或否遂乃有君子小人之分苟得其飬則如木從繩其正若自然矣今彥和之為端士也䝉飬之功不言可知繼自今以往學與日積道隨年長佩服乎七篇之書涵飬乎大雅之章毋曲學毋枉道毋有獲而詭僞慎終如始益進益修如此則希孟而孟希武而武何止如旦評而巳哉區區言耄而瞽幸純夫為我謝之重建雲居菴記洪武十有六年春雲居菴主僧德傳過豫曰宋咸淳間四世祖諱行興號祖庭來自天目山駐錫爵林露坐說法風動一方緇素與檀施坌集遂結菴以處之名曰雲居由宋而元祖年九十有二終于至正乙酉其嗣法子弟曰慧滿繼之四年而殁曰道卭以甲乙傳及尤宋菴燬于兵慧滿避兵他適不知所之而德傳念祖師過化之地義不忍捨去大明更化𥘉賴吾佛之道與時偕行于是剪荆榛畚瓦䃯復經始營之距爵林百餘里步得里人湯逹卿故基以廣其居今苟完矣請先生之筆以志之前此豫嘗過橫山之隂憩足于菴觀夫所築之室凡二十餘楹堂有佛像設供具鐘鼓列焉僧有室經案禪榻香燈偹焉餘如齊厨井湢之屬罔有不偹其地近山而爽塏逺城郭而幽閴晨嵐夕霏空翠灑􅑵戶間無囂塵市聲滓人耳目傳公日掩關趺坐泊如也吁是雖蕞爾一區如抱茅蓋頭然視佛之所謂桑下一宿者亦巳多矣彼名山巨剎膏腴以萬計尸素之士或不能及若傳公者服勤如此肯搆如此繩祖武又如此豈非浮圗子孫之象賢者歟豫故聼其所謂併以目見之實三嘆而書之是歲夏六月之望同郡龜巢老人謝某撰歸耕記豫老廢筆硯授之子子以拙辭躬稼又弗克服勤方諄諄朂之以周公無逸之訓潞城曺德聲書來曰震往者避兵東吳顚沛萬狀還鄊以來田舍粗葺筆歸耕二字揭諸座隅示不忘也惟巢翁姻婭而相知敢請識其顛末以垂警其後人豫曰嘻前元時德聲曽大父為晋陵閭右大父起家登仕版厯官至東平路同知殁後數年而德聲失怙丁時多艱家用蕩析蔑有能相顧者藐焉依母氏笠澤之濵狼烟滿眼矢石塞路窮途之困甚于蒺藜杳不知先業失墜為何如也大明更化𥘉竭蹶而趨偕女家弟之家還故里荷蓑笠操耒耜剃荆棘之區犁之剷瓦䃯之埸屋之載搆載穫料理而恢拓之蒸嘗之奉滫􅔱之供征徭賦稅之所需罔有不給且能割膏腴以寧二兄之歸斷雁復得以成行遊魚不失其同隊東阡西陌雞鳴狗吠桑梓敬共是皆如其素願也然則患難之餘歸耕有如此者豈易得哉若曰其歸也非衣錦之榮休官之適其耕也非能以堯舜之樂于畎畝蓋以前賢論之衆人可同日語乎如德聲者先世之業失而復得骨肉之親散而復聚况時和歲豐率土寧謐凡我同類皆得耕田鑿井歡然為太平之民其樂雖異于古人未為無所樂也吁以其艱難勤苦十有餘年而後得此後之人罔有攸知寧無怠荒乎此記之所以作也顧豫言耄請復以語吾兒者語之夫周公聖人也無逸一書為世龜鑑苟知之則當尊其所聞俯焉孜孜以繼以述以纘承其先緒詩曰子子孫孫勿替引之吾于此亦云書屋記洪武壬戌秋崑山故交辛斌甫過龜巢為其友蔣生秉彛請書屋記且曰生自齠齓時嗜學雖祈寒大暑矻矻不少廢年十五父命學吏事閲數月不懌而歸既而令服賈走淮浙南北數千里亦常以簡策自隨少暇輒誦讀之竟不屑罔市利以肥其家遂令力穡為仰事俯育計秉彛乃從親之令蓑笠緇撮以事其事三餘之日愈進厥功老夫以未嘗靣其人目其居難乎架空鑿虛而為之文也明年夏五豫舟過婁江斌甫與生郊迓而過之所謂書屋者𥘉無垂籖萬軸也亦非連雲大宅也四書六經外諸古圖史與陶弘毛頴列乎其間與之語粲然有文意吾常林鋤經董君南之朝耕夜讀亦如是而巳矣揚子曰晞驥之馬亦驥之乘使生所造愈深進愈力則所就未易量也然則生能承順其親且不卑屈其志謂非能子可乎所居在崑山城西九里橋之南其江山景物無關于書屋者不書特以其心跡之實書之用為記時洪武十六年五月二十八日逸菴記夫人莫不欲四體之逸也惟君子則逸其心故嘗操而存之寡欲以養之秉彛之天一真無僞感而通之動罔不吉周書曰作德心逸日休君子取之故能逸其心也今河南彭公伯常為武進令自號逸菴夫所謂逸者心逸之謂歟常人言之州縣之職其勞甚矣顧兹巨邑事如絲棼雖戴星出入猶恐不逮何能逸乎豫曰不然公以夙學老成之才為之征科撫字恩威並行雀角鼠牙曲直能辨如庖丁解牛如其肯綮牛雖多而􅉭刃不頓也矧夫至公之心炯如秦鏡且不以塵土蔽媸妍所照隨物應之是則吾心之逸蓋自若也雖在官舍視為逸菴不亦可乎一旦朝家以七十之年優容里居則吾心之逸與肢體之逸熊魚兼得矣雖然古之逸民若夷惠之儔髙風峻節為世師表吁吾知逸菴之逸必如是而後巳焉持敬齊記前輩以齊居之名著稱者多矣其最著者曰誠齊簡齊容齊又有以先正針銘而傳者曰敬齊求放心齊是也其後一變曰疏曰酸曰松雪者紛紛然人爭效之齊之義逺矣今贛之聶伯䕫氏以持敬名齊需言于愚愚固辭不獲乃言曰聖人筆六經以照萬世敬之一字層見叠出先儒詳之矣愚復何言竊觀所謂持者意在執持而用之言人之持物猶吾之持敬也持物以手持敬以心苟不致謹則亦莫之能用也譬之射者必謹于持弓矢而後不失于中御者必謹于持轡而後不失其馳又如執玉捧盈必洞洞屬屬然如弗勝如將失之然後能勝而弗失也伯䕫向逰成均持此敬以進德修業故學優而仕宰髙平持此敬以治其民而民有去思焉邇來為諸侯幕賔翼翼乎以參贊承宣為務謹三尺御羣吏以􅊩四邑是皆持此敬以展其用厯兹以往百司皆然有官守則持此以共其職有言責則持此以盡其忠峩冠冕鳴佩玉鵉臺鳳閣筵羽鵷鷺無非持此心之敬而用之其用有不能盡者敬乎敬乎亦豈非一言而可以終身行之者乎夫如是則上不負天子下不負所學齊名著稱亦卓然如昔人矣雖然宦成而怠世固有之惟君子慎終如始有不為其怠者衛武公春秋九十有五官為周司徒方且再三以敬慎為詩日夜警戒故卒能為睿聖武公愚不敏敢請獻此詩為持敬慎終之助洪武十七年嵗在甲子三月二十六日恬淡齊記為髙彥述作昔有與彥述同姓字君素者以頥軒涪翁賦詩其略曰辱莫辱多𣣔樂莫樂無求㫖哉斯言真可為恬淡齊座右銘也蓋多𣣔則不能恬靜必辱其身無求則淡泊自足樂于其心由是知孔顔之樂非樂乎𬞞水曲肱簞瓢陋巷而蔗境之佳可漸入而得矣夫彥述先君子以醫名家獨步鄉國流風遺俗今豈無之十餘年來乃能與時浮沉不競不躁不貪不墨舊家習氣掃除净盡故齊居之室題曰恬淡蓋取諸內經飬生之要旁參莊老而有得焉至如諸子百家之書亦多涉獵然文藻不露不求人知城居如子真谷口賣藥君平賣卜簾常晝垂門或早閉衣布素若紈綺茹粗糲若膏梁由其氣質之清資以學力故恬淡有過人者每謂人曰人生固不能無𣣔也多𣣔奚為彼銅山鑄錢郿塢積金一姬傾斛珠萬馬如錦繍凡如此類孰不賈禍當時遺臭後世乎言之必撫掌大笑傾倒而後巳吁黃太史九原可作二髙當有抑揚老夫贅言亦庶乎奬勸之助云藝室記豫耄無能為也久矣嶄然骨立百念灰冷獨嗜學好友之心猶未能忘前元故交淪沒殆盡每每見後生少年能讀書通古今識道理且不為異端邪說所惑則愛之重之同郡為忘年友者凡數人其一伯禮也洪武戊辰秋伯禮書來曰某居鄉城環堵一室有古聖賢經傳及古醫書若干卷日用涉獵間以藝香辟蠧庋諸室中顔曰藝室望先生有以警之書再至義不容辭矧豫數相往來知其室無節棁之華無丹碧之飾無屏罳帷幄為觀美之資宴安之具闤中有山林清致木榻業几圖籍左右熏爐短檠陶弘毛穎之屬晝夜為伍孜孜厥修嘗謂人曰吾為醫家方技可以寓吾心之仁以濟夫人故先之非以儒為迂而後之也吁伯禮言此其知道乎然九流百家莫大于儒儒之道莫大于仁伯禮知醫藥之方或未知仁之方傳曰已立立人已逹逹人仁之方也尼山大聖蓋得夫唐虞三代之傳傳之萬世以康濟斯民非金匱石室之方可同年而語者請以是筆諸藝室藴諸身施諸人則吾心之仁不可勝用醫儒之道所謂並行而不相背者信矣是為記重建清微觀記夫師教之恩報同君親蓋禮之重者見于經昭昭也然道德五千言此非所先苟師道之不隆則道德亦不能有傳矣今清微觀主周鍊師石泉勤而行之是能默契禮經而獨超乎其類也洪武己巳春石泉書來謂豫曰某追懷先師歸復故業丐先生為文識之豫嘉其能而不却也抑嘗過丹陽聞諸鄉老之言其報師之恩藹然可見𥘉邑人諸葛德齊隱居學道佩天師符命創此觀為修鍊之所既而羽化實為開山之鼻祖也弟子裴靜山等住持以甲乙傳元末觀燬衆亦飄散或存或亡洪武改元其徒朱竹軒言還結茅而居未幾而終時石泉住丹徒紫府觀聞師訃即謝事而歸葬之志在復業揄揚道法風動一方向化者咸樂施以相之諸葛氏母子其尤也于是剪荆榛畚瓦䃯鳩工度材辛勤十有餘年作三清殿前闢山門旁翼兩廡祖祠經室丹房齊厨之屬凡若干楹穹林竹樹蔚然屏蔽輪奐之光焜煌乎䝉城故區度亭遺跡長塘之煙水湖光北固之雲霞山色亦皆映帶為清微勝概矣吁凡為人後者有能繼述如此豈不為賢子孫乎近世逢掖之士學必有師禮宜報效未嘗倣佛如此者也豫因記其事之顛末深用感慨併書此為世之勸云栖雲軒記雲之為物聚散不常其聚也由膚寸之微至于彌六合雨天下其散也則斯須無踪人莫能測况能與之栖遲乎惟英英而白悠悠而間者方外之士相羊似之每寓言而髙尚之意云耳常郡玄妙觀莊某以寧栖雲有軒意蓋如此夫以寧師老𣆀其學以清净為宗青山白雲淡然幽棲固其宜也然𣆀在周室柱史有年青牛出關然後著書五千言以明其道亦未嘗絶人物斯世而為髙尚焉後之善學者如陶貞白于齊梁之間挂冠都門怡雲句曲若將終身焉及乎以大任寄之固辭而不可得遂乃坐山中如廟堂之上茹茯苓如鐘鼎之食人到于今稱之不失為華陽真逸也矧吾以寧有琴而能作松風之詩聲有詩可以賦怡雲之情是則陶之所樂皆為吾有山林朝市或處或出何往非栖雲之地哉吁由周而來寥寥二千餘年所謂隱居以求其志行義以逹其道者竟無其人是可嘆也若夫華山之陳一枕白雲三徴不起此又不可同日語矣以寧徵豫文特書此以識歲月併以偹從善之擇云聼雪軒記夫雪聲之微若有若無聼之者必方寸之間一無所擾而耳之聼不為物奪然後可得而聞也同郡馬用和居市㕓以陶倚為伍絲竹車馬之喧晝夜不息聼雪有軒豈虛語乎洪武𥘉豫嘗忝為東家丘知其為馬氏之良别來十餘年說者謂用和讀書養親習與志長超然出羣遇歲晚同雲集霰而霏霏之雪繼之用和侍親庭幃言此為豐年之瑞以怡其親奉壽觴如金帳羊羔舞斑衣如仙人鶴氅以春蟲撲窗之聲為金石之鳴舉家之人同得以樂其樂也既退獨處軒居萬籟俱寂乃想像撤鹽飛絮聼于無聲不啻若鈞天廣樂九奏而有遺音所樂有未易語諸人者其心必曰蘇子卿十九年牧羝沙漠李元直夜半擊鵝襲蔡梁園之賦客揮毫灞橋之詩人覔句皆安知雪之有聲如此其樂哉用和需豫文請以是相知之言志諸軒壁異日以黃金鑄我為鍾期吾亦無愧焉爾瓜田記農皇古神聖以人道急于養生是故作耒耜教之粒食又為之醫藥以濟其夭閼而本草之書出焉既而軒岐問答靈樞素問與本草並行為醫家之大經大法也崑山卲濟民氏家傳是書深究厥㫖為醫巨擘逮元末年業墮于兵慕古之同姓種瓜東陵于是即所居淞滸糞于瓜田戴笠而鋤抱甕而灌綿綿唪唪之􅚩如周雅所稱以之養親可以充一味之甘以之留客可以侑一茶之欵其蒂為苦口良藥可與參苓薑桂並用以活人濟民嘉之因以瓜田自號朝于斯夕于斯寓幽興于斯非矜乎東陵華胄也方今盛時遇瓜田而納履者無之或為古之人有白兔御史殆若戲言無足患者其樂為何如哉豫嘗避地東吳濟民久交乃不以三百草里為逺九十六歲為耄致書求文再四益勤豫辭不獲遂以昔所見而知者筆之是為記習靜軒記洪武丙寅冬前知武進縣太原舒公之孫文允書來曰某家居僻小軒讀書强名習靜用唐人詩中語也丐先生為余識之書凡四至不容以言耄辭乃謂之曰人生而靜天賦之性感物而動情之𣣔也性至微故學者必有以養之然後不為物𣣔所汨習靜之意必有見于此歟夫以文允之英姿壯年學優而仕動而有為取青紫如拾地芥今乃韜聲光斂踪跡負米飬親之外足不入城府影不出户庭目不眩邪色耳不汚鄭聲膏梁綺繡不適乎口體罄室隘巷門可羅雀淡然而資于外者如此廓乎虛襟寂乎靈臺幽探乎經史之奧涵泳義理之腴出入乎諸子百家而無他岐之惑焉其恬然飬乎中者又如此可謂得習靜之方矣昔濓溪翁主靜之學程伯子以親炙而得之其平居終日坐如泥塑及其動與物接則一團和氣穆如春風視世之以槁木死灰為靜者逈不侔矣愚聞周程之學蓋默契夫大學定靜之㫖以相傳使文允以周程為法而學焉則習與性成二賢同歸豈特如摩詰之語而巳哉豫不佞故卒以是告之時洪武二十年四月之吉同郡龜巢老人撰龜巢藁卷之十五終
