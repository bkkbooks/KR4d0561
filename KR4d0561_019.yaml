front:
  text: 龜巢藁卷之十九
  hash: sha256:2bf4d2369fe196755ebacba8aec2a43c911a26917591e61b9d37d818c1fafc7f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0561_SBCK_019-1a}
body:
  text: 行狀故伯母行狀從母姓鄧氏諱某常州武進縣曹坊里人也年十九我從父諱文正娶為妻動遵禮法事舅姑甚謹如晚嵗失明每飲食必相之徹而後返平居雖甚寒暑服勤婦工每夜分而後寢至元乙亥天兵南下以常州未平駐師京口逰騎往來居民多避地他徙吾謝氏居城西烈塘以世業弗忍去置東西閭門募丁壯守之騎不能入然人情恟懼母自以少艾恐遭俘掠嘗語娣姒等曰設不幸為北兵所虜將若之何衆皆曰苟無所逃唯聼命耳母獨毅然曰吾寧自死義不受辱是年五月八日騎者二十餘輩攻里門甚急衆不能禦遂奔潰騎者火其廬虜從母及鄰婦數人遭係纍而去行臨漕渠母乃潜脫其􅎗投簮珥于道旁投水而斃時南岸菑翳中有竄伏者見之巳而來告求其尸果得嗚呼吾從母不屈而死者于今七十年矣應芳為免時先君子嘗語之今諸父六人俱無嗣不肖苟不白其事是泯其潜德謹録先子遺言狀其行如右惟當世立言君子賜之紀述則從母死且不朽謹狀王佛子行狀王佛子諱彬字文甫常州武進人往遭亂譜系喪弗究其先所自考從龍當至元乙亥天兵南下家因殱焉常既內屬繼室張氏飬子質數年而生君君潔白端好父珍之六歲即延師教于家君性敏慧善記誦明年生痘疹疾時巳授孟子書恐為同業所先𢾗號泣白其母母曰兒病旦暮且愈以兒强記之資寧懼弗及乎殆不能釋用是致眚一目稍長事親孝與兄質無間者末冠經營家事率有條理公私內外咸便之居無何貨用益饒父母終每遇時祀則追思飲泣曰向吾封殖計𥙿親也今亡矣多蓄奚為顧傾資之半以施老佛祈助冥福再涉南海禮𥙷陀山君子憫其以報親為心而弗庛云及兄殁喪葬亦如禮至是與兄同居者七十年矣平生慕馬少逰之為人好閲古書中孝友隂相事然性剛直人有過面折不少貸每旦起立卑幼庭下授巨細事大要歸勤儉信讓子孫少有不及必加誚責待其兄之子若孫殊覺寬假常勵之曰我非爾宥也苟怠吾事行且罪及兄子輩愈趨事以勤食指幾數百緦服同㸑歲時頒賚及嫁娶品式至于服食纖嗇皆均而無私家庭之內肅如也晚築遐觀樓以延賔客多致時流名輩相與婆娑嬉逰諸子姓因得磨礱浸潤亦藴藉可愛佛子方少時有里人夜為盜為家隸所獲將殺之君力救免且戒隸勿言後𢾗年其人臨終時自語其子使母忘焉聞者或以是詰之終于不言同母二妹一嫁邑人張氏生二子至正間其父子俱為仇家誣陷抵獄吏煆文垂成如律乃惻然為援之遂脫其死餘親故藉其力以排患難者亦多類此故鄊邑倚之若長堤巨防之于湍流狂瀾云若鄰里貧而病者每助醫藥之費且常買棺置别墅有不能斂者則與之或時乘馬出入遇負戴者雖少者亦引避田間見耆老必下馬相勞苦以為常故鄊人號為王佛子浙西以田賦為重州縣吏以其家租入之多命為正首徭役殆無虛日然按文應需之外課戒子孫毋以毫髮橫擾細民人賴以安仰之幾如父母橋梁溝洫不待官府督責而預自辦集公私兼濟其利亦以自悅也至閒暇時委家事諸子侄携一二朋舊問丹陽道過句容臨白下陟鍾山冶亭之杪徘徊徙倚訪六朝遺跡挹㙜閣清氣或入吳抵錢塘覽湖山勝概悠然忘歸此又其髙致而人少能知者至正十二年十月紅巾據常州時佛子方卧疾于家賊衆坌至盡掠其所有意恐有為里人禦奪發倉廪誘之皆不至賊縱火乃為撲滅巳而賊誅君疾適愈起召里人嘉勞之明年春正月卒于家年七十二子廷玉等以其年二月葬君于直瀆之新阡送者千餘人多哭之慟皆曰善人亡矣妻丹徒周氏生子男三人長庭芝早卒次庭玉次庭槐女二人長適丹陽周氏次適吳門金氏妾周氏生子庭梧孫男曰敏曰政曰孜俱尚幼餘有室餘尚幼兄子庭桂次庭椿其子尤夥豫與佛子同里閈且辱招致教其子孫者十餘年故知君為詳謹狀其行實以俟當代立言君子撰序次第期示不泯故處士存心先生陳公行狀曽祖諱文表宋兼州司戶餘缺祖諱霆轟宋從政郎行國子録餘缺考諱聖淵字容軒宋承節郎提刑提奉司奔牛酒庫提幹升提刑司簽募兵馬鈐轄朝奉郎常州通判賜緋銀魚袋帶行都督府機宜文字先生諱師可字伯大自號存心老人通判公之第三子也宋末父母居官常州武進縣奔牛鎮宋亡而元遂為武進人母某氏先生生至元十五年戊寅不數歲能通孝經論孟大義父常問之應對如流然天姿醇朴不尚文藻既長當路者多薦辟之皆不就孝養二親于喪事葬祭罔不如禮其弟振可父命為同邑張把總後䝉可贅盧莊金氏後振可頗豪俠先生數勸止之然其好賔客接後進飲食教誨送往迎來亦不减乎其弟也平居坐蒲石軒觀盆池小魚洋洋自得曰魚之樂猶吾之樂也或小飲微醉歌安樂窩先生之詩擊節嗼賞晚年家居為童子師無賢愚貴賤但內拜則進而教之束脯之禮不計其孰有而孰無也元末草竊蜂起鄊里有不可得而居者潔家依無錫膠山安氏食指𢾗百恬不為憂蓋人多知先生為有德之士供具不絶既而鼠輩旁午乃轉徙蘇州城西及妻康氏相繼以病殁先生享年八十有一妻年若干宰木幾拱遇世變環城數十里河隍變遷而大明開天矣先生𥘉娶陶氏生子曰以仁先卒繼室康氏子男四人長曰某次某娶某氏孫男三人長曰融娶丹陽陳氏餘俱尚幼洪武己巳葬二親衣冠于唐原祖塋之側嗚呼先生生死始終兩遭兵變不以艱危虧事親之禮不以困厄失守身之節存心之號不誣也某自早歲從逰且沗姻戚知先生為甚詳故狀其梗概如右管伯齡妻壙志張氏諱某蘇州鐵瓶人也性聰明女紅多不學而能其精巧有過人者父母鍾愛擇配逺邑得處士為儒族名家子厚資裝而嫁之事舅姑能盡婦道凡祭祀賔客在中饋所當為者為之靡不中節鄊里則之男女婚嫁之禮亦然生子男二人長曰嗣娶同邑宋氏次曰繼娶陳氏從軍某州女三人長妙真適方氏次淑真以真所適皆里居嚴氏孫男三人長顒娶周氏次仰充皆幼孫女一人適史氏曽孫女二人長復奴早亡次孝奴在幼自處士沒丁時多難憂患在牀褥者幾年某年月日病卒享年若干某年月日封窆與處士同穴毗陵謝某嘗寓居為鄰故知其概如此云義士吳先生墓志銘先生諱轍字中衡其先㑹稽人祖某元浙江省醫學提舉居官杭城因家焉考某妣某氏某年月日生先生性聰敏過人𥘉家孰之師授以孝經論孟即暗誦如流成童通醫書內經奧㫖餘如脉訣活人等書多疵焉至如吹洞簫鼓瑟琴舞劔術皆不學而能其志若有不屑于醫者元末多故南臺某官買里古思公知其才召為幕賔方𣣔力薦而大用之古思公以他事𬒳讒落陷阱公懼禍波及變姓名挈家海上久之乃賣藥以飬其親長洲故交趙執中舉家病疫鄰里無相過者獨幼免應門先生過其家呼厥子入視皆以藥飲之數日而愈後執中父母妻子跪拜奉幣而酬之先生固辭曰朋友患難不相救乎進士某縣丞俞某患軟腳疾先生憐其貧往視之曰可療但藥餌三兩月而愈俞言無褁藥之資先生曰君有此則吾豈為不速之客乎後如期而安報禮亦毫髮不受或問俞之交非趙氏比何同然耶先生有可用之才使得存為世用不亦可乎凡貧居有一才一藝求醫而可醫者皆然故吳人翕然以義士稱之吳江富人有沈姓者遣幣招致及門其主人方事巫禱先生乃飄然而歸翌日沈氏復重幣固請先生終不赴而返前幣焉或􅏺其桀敖弗辨也平居能孝奉二親親殁則廬墓終制化行于家妻某氏事舅姑亦盡婦道先生于大明洪武某年甲子某日終于家享年若干葬崑山縣石浦考塋之側先妻某氏生子曰集後趙氏無子皆先卒其子以余父執知其親為詳請志其墓故述其梗概如右銘曰時不利志不遂假方技兮行吾義全是親悅是親骨雖朽兮名弗湮於乎蒼天德哉若人管伯齡墓諗先生諱夀昌字伯齡蘇州崑山縣人也祖諱某宋開寶中以詞賦領鄉薦考諱某遭宋革命遺逸而終生處士于元之皇慶四年甲子某月某日氣質清秀不數歲能暗誦小學四書大義既長為學道書院訓導諸生悅服文譽蔚然越二年以病請告踰百日而歸自是年愈長而學愈進善屬文尤工于詩泗橋杜玉泉氏招先生以教諸子時玉泉亦以詩鳴花朝月夕更唱迭和其詩如元白而不俗郊島而不寒不瘦也館榖凡二十餘年玉泉殁而教授于家學徒愈盛如歇後鄭五輩及緇衣黃冠能詩者咸與之逰有通儒之遺風焉大明某年某月日卒年七十有六葬某處娶張氏生子男二人長曰嗣鉏經飬親次曰繼從軍某州女三人孫男若干於乎先生抱俊逸之才負髙尚之節齊名尚志超然晏居有詩文二十餘卷曰尚志齊集藏于家詞藻之名榮于軒冕志其墓者毗陵故交謝某也墓志銘龜巢老人姓謝氏應芳其名子蘭字早從其親聞譜系世居開封多顯貴六世之祖武進尉東西謝莊族滋熾大父别業烈塘涘生男七人一進士遭宋革命家乃燬烟滅埃飛三百指舊家奕世盡蕉萃賴有雙親踣而起四男一女同遺體男皆吾兄女吾姊伯兄早殁孤藐爾二仲及嬃竟無嗣我生迂踈昧生理妻任井臼畜三子木也左右奉菽水曰林曰森伯為禰七孫惟塏冠而􅓻坦垣成童餘幼稚商周興亡陵谷異舉家幸獲全生齒干戈十年浮海避强名龜巢等逰戲還鄉無復舊閭里築室橫山墓山趾春秋虛度八十二著書數篇而巳矣府公遺石志丘竁聊爾云云叙終始大明洪武十年嵗次丁巳七月十一日病中口授友人江隂張端吳處士妻墓志銘逸菴處士之妻姓曹氏諱某崑山人享年若干後處士若干年卒吳俗尚佛氏死者火之其子轍卓然能矯俗之弊以禮葬石浦之原與處士同域時某年某月日也毗陵謝子蘭與處士有家通之好處士嘗語蘭曰我妻性柔慧蚤歲在父母家精女工事親以孝謹聞既嫁而主饋奉嘗靡不適舅姑意顧豫性嗜酒喜狎賔客語滑稽賔退每相規焉及教轍與女皆有矩度教轍婦亦如之然平居言笑雖連屋之人亦未嘗聞也轍負氣節以剛直多與物忤母常戒飭之不敢肆微如臧獲御之亦盡恩義凡如此類其姻戚比閭之所稱道無間然者今轍以蘭知其母之為詳也乞為銘蘭于是紀述舊聞使後之為女為婦為母者儀之則其死猶無死也銘曰淑德之全德容靜娟玉溫潤而栗然其生也天永其年其死也人稱其賢又奚恤彤管之無傳乎騋孫墓磚銘龜巢謝老第六孫字騋孫生三嵗而能言父口授周南關雎等篇立能成誦余愛之意他日可業儒以繼先世甫五嵗以痘疹死洪武十一年三月十有三日也翌日葬潞城之原余乃哭而銘之曰茁而折鷇張處士墓志銘處士諱功𢡟字實甫蘇州崑山人也先世名顯宦譜牒具存考諱應宸不樂仕進居鄉里為鄉之善人母曹氏生君之日世方中微君早嵗即幹蠱有所樹立既孤養母氏極甘軟之奉鄉人稱之母殁而家益肥中歲畢姻嫁事即以家政授二子而子又能豐其殖焉君乃構佛廬于先人墓左以奉祀事仍與僧居之故四方浮屠師多與之逰平居月齊十數日卉服𬞞茹泊如也旦則持佛書諷誦畢乃㦸手向天聲謝其意若曰吾之所以得此者皆天也不敢忘也施僧之餘視貧之或周之然奉身寡約始終一致自號守齊蓋以此耳吁其亦可謂有恆者歟妻沈氏生子男四人長曰天麒娶邑人金氏再娶姚氏次天麟娶朱氏次天佐出贅同邑夏氏先卒次天祐贅嘉禾王氏而歸女四人曰妙善妙靜妙清妙智皆有家而妙清早世孫男曰畿娶倪氏曰絅未冠孫女曰真曰善曰因曰寧皆得配曰璚英曰玊英尚幼處士春秋六十有九洪武元年五月十二日終于家明年五月二十七日瘞祔考塋其子天麟乞銘于毗陵謝某而某久客吳下具知處士銘曰始蘖其椔卒蕃其枝惟根于天者弗移曰德之恆豫是以銘之嗚呼其止于斯兮方寸鐵銘天地為罏隂陽為炭鑄方寸鐵非桞下煆剛不可屈堅不可磨侯堅侯剛利用實多同𣣔以之刳食月蟲璟以執政剛過于崇惟善用者為衡之權稱物平施錙銖勿偏嗟爾有此藏之于密以桑氏硯改而為筆摛辭琬琰百錬其工剔去魚魯斯文有功彼寸鐵兮人孰無之𣣔偉其器繄鈴與錘寧小為錘母大為錯凡百君子非由外鑠永思軒銘人之生天地中父之恩與天同生而養送厥終盡以禮猶哀恫矧逺離遭鞠凶一失怙無由從德罔極思何窮生之𥘉夲倥侗玉而錯金而礱器之成皆父功哺不烏乳不􅩫忝物靈漸灝穹念爾親修爾功以爾孝移為忠其親顯名亦崇茍不然思奚庸霜雨露愴厥衷執籩豆感必通爾永思如水東于羹墻見儀容庶象賢寄髙風方竹杖銘併序豫性喜方偶得一方竹為杖甚愛之因念古之崇節義尚亷隅者類焉刻銘其端持以自警猗歟竹君易圓為方虛心固節悉如其常其方伊何如玉界尺不砥而平不繩而直曰豫老矣賴人扶持義以方外庶克似之竹素齊銘為鄧宜之作天人交敷羲畫馬圗大明九丘科斗六經於昭日星􅃮書汗青姫公宣尼斯文緝熙為世範儀百家之多繼聖惟軻如江如河竹兮素兮文斯寓兮開牖户兮爾于其中朴斫磨礱德業攸崇苟習其辭舍已弗治雖多奚為豫言若兹亶弗爾欺亦以自規願學齊銘溧陽曽明府孰字子嘉前家居之日以願學名齊今居官扁仍其舊其友常州府同知揚侯徵豫文辭不獲命乃為之銘曰終始典學德修罔覺㫖哉斯言為世矩矱欽惟素王聖夲生知學而不厭惟日孜孜好學如顔聖為之亞天若假年不日而化三千七十步趨後先曰願學者子華之賢卓爾君子志華之志揭兹攸居書紳何異學以明之仕以行之仕學俱優兩輪並馳厥德之修與日俱積豈惟日積乾乾夕愓願學若兹勳業鼎來不負所學尚慎旃哉愛日堂銘為無錫趙德弘作先民有言孝有不及人之事親所以為急矧伊大母春秋七十彌亦耆年為儀里邑晨昏定省扶持出入甘軟而饋輕暖而襲養非徒愛敬事必給慈訓並成蘭薰蕙裛慎言與行如玉之執曜靈西馳恨莫能縶分隂寸晷斯須必持厥德既修業亦樹之愛日若兹衆善斯集母卑我言升階拾級白賁軒銘天地之文我象我儀惟文之極淡焉是宜賁之上九白賁無咎苟為不然咎將吾有聖人立言妙理冲漠能近取譬亦孔之昭如衣美錦其文煌煌惟其尚絅暗然而章以賁而白不賁之賁君子以之咎弗我致嘉爾釋氏修乃白業殊途同歸意明允愜灼永思堂銘崑山吕昭克明起家業儒信道篤而事親孝以父母生前奉佛志堅固有不可移者常承順而悅之及其殁依釋茶毗法瘞骨于墓從治命也至居喪則多用古禮衰麻哭踊不酒不肉以終三年之志視世俗舍禮法而溺于異端者不同也既而近隹城擇地搆堂龕木主朝暮香燈歲時蒸嘗追逺之心懇懇切切惟恐後人有弗逮者堂名永思蓋取諸古經永言孝思之意洪武癸亥夏五月克明徴豫文故為之銘曰人之有生曰父曰母劬勞之恩天髙地厚方具慶時綵衣青春志弗克養徒美八珍一朝云亡無復定省雖欲愛日捕風繫影嘉爾孝子事死如生葬從治命祭盡其情日居月諸時則邁矣繼繼承承或懈怠矣經言永思揭諸斯堂非曰能之示不敢忘婁水滔滔不舍晝夜悠悠我思與水交㵼滔滔流水無古無今我思悠悠與水俱深春秋霜露溪毛泂酌有感斯應來享來格無形而形無聲而聲羔墻見之是為思誠烏鳥之忱豺獺之意維子若孫有引勿替存耕銘人有寸田産仁與義君子存之罔俾蕪穢詩書耒耜耕以學力種德樹業如黍如稷我苗芃芃我稼既同仁熟之後其用不窮彼自棄者厥田弗治耕也鹵莽獲亦如之舍已藝人斯尤可嗤朂㦲存耕惟日孜孜示工或虧不其餒而鎦景儀先生畫像贊山澤之癯頎然而長面有詩紋鬚眉雪霜幅巾藜杖逍遙相羊不可貌者其力行之力其心孔臧其音琅琅德哉若人俾也可忘張伯仁畫像讃隨俗衣冠容物襟度坦然真率頎然魁梧屢涉危途不失矩步嘗即其天之所賦徴諸人之所慕其可謂吾韜俊之光而實能逹時務者歟抑可謂泯星鳯之迹而人𣣔快覩者歟月泉道人小像贊炯炯乎精神蕭蕭乎衣巾涉陵谷之變而久于風塵忍泥塗之辱而全其天真玩世濩落隨時屈伸噫是所謂涅不緇磨不磷托迹為方外之隱淪者耶曹節婦贊併序按家傳婦吳姓歸曺氏二家皆江隂望族生子曰有實方幼婦秉節十有五年婺居字孤慈而有教遇世變乃携子避兵子𬒳執即赴水死既而子得脫𣣔收葬母尸日夜號哭求諸水濵久之終不能得遂以母所遺服飾之物厝諸棺合葬父塋哀毁骨立鄉人悲之君子謂有實之篤于親非其親教之有素而能然乎夫以子之早孤母不失教不賢而能之乎然婦之所以能死節者又豈非世族文獻之澤有以致之乎故為之贊曰楚臯之蘭生有餘芬瑜而不瑕藍田之珍倚歟爾婺比德蘭玉為女為婦儀爾族屬蘭摧玉湛于江之隂跂彼共姜心乎其心拙逸針嗟世之人知誰為賢膠膠擾擾靡日不然不作聰明不事機巧爾逸若兹庶近乎道身弗行險意無外馳爾逸若兹孰云非宜作僞而拙其拙可羞好逰而逸其逸可憂拙逸之言夲乎周子吾其申之以䆒厥㫖巧凶拙吉巧勞拙逸㫖哉斯言宜而弗失師針堯舜湯文為君而師洙泗設教斯文在兹寥寥漢儒章句云爾濓洛諸公麟角鳳觜師道之大實難其人曰可為者溫故知新若童子師為亦勿昜飬正之功實係于是師乎師乎宜日三省吾為子針亦以自警坦率齊針嗟今之人以文滅質允矣君子欲矯其失徑情直行是為坦率夲之于身作德心逸推之于人言踐其實不修邉幅不任智術不奴其顔不婢其膝其腹無劍口亦無蜜終始弗二表裡惟一坦率若兹亦孔之吉彼異端者蕩無紀律居不衣冠馬牛其匹坦率若兹乃罔足述吾亦率爾言為爾弼謂豫不信有如皎日拙齊針唯古聖者經綸大經至巧若拙無為而成唐虞之民其俗皥皡不識不知非無六鑿三代以降智巧百出或哲或愚或得佹失去古日逺巧日益多卓爾君子拙如之何言抱其朴不事華藻不鼠之黠不兔之狡彼蛛為罹巧于謀食我飲如蟬清風兩腋鳩拙于巢蠶巧于繭巧拙若斯可以無忝作僞而拙其拙可羞誠拙而逸其心休休戒之敬之真僞兩途十目所視毋失所趨龜巢藁卷之十九終
