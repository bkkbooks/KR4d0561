front:
  text: 龜巢藁卷之九
  hash: sha256:4e4a07a153e284719ecb7d0714f61dd383cc6a70f10ab08a01c63352ee6e673d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0561_SBCK_009-1a}
body:
  text: 詩上録囚官浙水沄沄其類始夷孰恤株連維皇念兹曰豫憲臣風紀是任擇賢二之皇命是欽繡衣煌煌峩薦有章有秩其儀生人之望相彼圜扉胥靡孔多滅耳弗戒君子謂何國有著令慮讞以時炎風方興軺車載脂𬗟維而𥘉煆鍊以成文致則有使君明明三木汝加其隱在豫嗟爾長人相彼爰書相彼爰書吏或並緣若人何辜兾爾生全既易我心聰以聼汝汝則唾實曾莫我以獄無大小我必以情匪豫汝私天子好生天子好生恩柔爾肌懸象在魏曾汝莫知明明使君既安且和編人稱平是用作歌婁曲書堂汨彼婁水東連于海爰有幽貞居婁之匯蛋舟岸泊婁人紛拏幽貞有子劬書厥家晨雞既鳴汛掃室堂羞我甘軟奉持趨蹌我經我史如耕如桑我服其勞罔敢怠荒黍稌有田魚亦有梁味道之腴遊藝之場曰父與子欣欣樂康其樂維何匪人伊天憧憧往來誰其語旃烈婦歌并序婦周氏吳郡太倉人至正丙申其父以義兵元帥貪暴將殺之謀泄而舉家𬒳害帥之子悅婦少艾誘為妾不從痛罵而死鄊人義而哀之為之搆祠立碑㑹稽楊公亷夫為文且屬江西陳季子索詩以著其事陳君手持烈婦碑勸我為作烈婦歌人生自古孰無死烈婦之死名不磨本是東倉小家女粉黛不施眉自嫵父母憐惜忍别離納壻于家半年許阿爺從軍氣頗粗欲殺不義奔京都手持芒刃機不密身落禍坑家乃屠繡衣郎君元帥子少年絶愛傾城美願言携手與同歸即免梟首尸諸市郎君滿屋堆黃金安知難買烈婦心耳邊言逐風飄過腹內怨含滄海深罵聲不絶郎君怒馬上揮刀砍頭去㕠鵉羞覩青銅鏡全家甘赴黃泉路娟娟肌體嬌如雪烈烈肝腸堅似鐵一團寃血注婁江至今流水聲嗚咽男兒讀書峩冠巾偷生或忍忘君親奴顔婢膝曵朱紫得不愧此裙叉人嗚呼得不愧此裙叉人寄倪元鎮吳江折時避兵詩中有畫畫有詩輞川先生伯仲之襟懷不著一事惱姓名唯恐多人知竹籜裁冠晨沐髮蓮蓬洗硯晚臨池𢾗年同飲淞江水明月清風有所思淵明采菊圗晋室之危一木叵支我思古人孤竹夷齊彼薇西山我菊東籬薄言采之可以樂飢秋日凄凄卉木具腓匪菊之芳吾將曷歸倪元鎮過婁江寓舍因偕智愚隱逰姜公墩得如字秋暑賈餘勇懷抱方焚如故人江上來風雨與之俱遂令沸羔鼎化為寒露壺幽尋陟崇丘飄飄素霞𥚑同逰得名緇吟嘯興不孤大樹倚髙蓋小酌歡有餘三江五湖上羣峯開畫圗我憐我鄊土烟塵尚糢糊安知艱虞世得此暇日娛一笑百慮忘松風奏笙竽和陳維寅蘇杭懷古各三首幽尋度香徑遐思倚琴臺烏喙嘗膽日雉妖捧心來春風煽穠豔滅國輕于埃慿髙望海潮白馬還來無一杯弔忠魂江風為號呼悲哉抉眼地碧血化苔蕪丹青讓王宫松柏季子墓黔黎奉蒸嘗春秋幾霜露胡為今之人無復繼髙步寶鼎移炎祚降王赴幽都遂令虎林人斯免馬邑屠可憐金碗出啼殺稽山烏輦路土花碧金門苾芻關浮海兩龍馬一去不復還蕭條鳳凰嶺過客忍躋攀襄樊怕人問威福得專行九重倚師相十年悮蒼生銅駝卧天街今雨淚縱橫和馬公振遣興馬圗無怪出河遲世事方如理亂絲蓮葉有巢龜已老竹花無實鳳仍飢籬邉艇子供垂釣林下樵童許看棋苜蓿一盤三丈日山妻白首案齊眉顧仲瑛臨濠惠書詞甚慷慨詩以代簡濠上人來書𢾗行開緘如對語琅琅酒杯已辨弓蛇誤藥杵無勞玉兔將少待天公舒老眼賸收雲母束歸裝舊家池館花狼藉春水依然緑漫塘丘氏節孝詩君山削蒼珉江水清若空爾妹生其間山水秀所鍾人鵉鳴蹶里桃李正春風楚楚繡羅襦姢姢玉芙蓉蒼黃走烟塵竟作秋霜蓬浮苴橋海壖賴有良人從良人遽永訣跪乳遺兩􅩫還家依二親親舍四壁空黽勉薪水役辛勤機杼工十年守孤鐙朝夕滫瀡供婺居親所憐苦志恐莫終微言示鵉膠慚憤靣發紅鬒鬢落霜刀誓言死吳淞慈親乃噬臍肝膽照秦銅陵谷一變改故鄊歸路通扶携還里居失怙抱哀恫復為銜土烏埋玉掩斧封服勤奉慈幃愈久情愈隆手和熊膽丸課子學業攻共姜柏舟後志節誰與同德哉文定公世澤源無窮祭顧仲瑛嗚呼玉山翁先世吳右族生逢全盛時當路屢推轂辭榮樂蕭散竟藴石中玉早持萬金産轉手授家督不為五嶽逰家園蒔花竹讀書𢾗千卷旁核𣆀與竺非無酒如澠過客佳乃肅徒見駟馬車未若一儒服緇黃粲然者待遇情亦篤常言性嗜詩雋永過梁肉興來抉雲漢毫端注飛瀑詞林采英華琰刻播芬馥詩名滿朝野笑傲心自足世故一變更十室九顛覆幽棲綽山下人擬王官谷時豫逃難來憔悴如病鵠踵門通姓字一見已刮目夜飲嘉樹軒明朝杯又續髙堂桂花秋金叉剪銀燭㕠歌掉觥船洗我愁萬斛一留兩月餘坐客常五六寫圖紀觴詠墜水亦有曲連床可詩齊清話屢同宿擇鄰扃移家嵗晚安且燠奈何鼙鼓聲又若雷震屋婁人悉驚散我亦猿失木萍漂甫里東賣文如賣卜感翁𢾗相過餽問慰窮蹙翁亦客檇李逺避賦蛇毒山川鬱相望詩筒時往復陵谷復一變翁歸理松菊松菊理未能蒺䔧俄困辱豫舟傍笠澤訪舊宿西孰夜深屏輿隸促首話心腹春風舊池館荒烟秋草緑朝廷更化𥘉召役事重穋挈家赴臨濠星言去程速送行愧鄒逰口占謝龜縮詩去秋復春客來書滿幅念我及兒輩舉室䝉記録自言多疾疢經年在床褥鬱攸屢驚嚇使我長觳􅑌尚須手顫定親扎寄篇牘安知踰月餘遽爾聞不祿𥘉疑傳者訛細問淚盈掬嗟豫老異鄊知已失鮑叔蕪辭叙疇曩悲吟甚于哭神交死如生歆此杯中醁天寧寺性天之以同𫀆有不相能者和韵見示豫乃為之解嘲道人踞猊床說法如趙州奈何兔三窟不與貊一丘風塵􅐓洞餘草木凋零秋法幢扶未起法鼓鳴未收休夲來無住著聊爾小淹留祥麟自獨角怪鳥從九頭正須羣魔伏乃見吾道優釋門第一義坐斷聞思修秋晚過太平寺塔有懷徽太古禪老作詩招之一昨陵谷變九州飛劫灰太平招堤寶地成荒丘浮圖巋然在氣勢凌髙秋風鈴作梵音終日語不休似言老萬回合為故山留竿木本隨身把茅堪蓋頭畫沙且成佛况乃願力優老我烟霞夜風流繼前修題杜拾遺像國破家何在窮途更暮年七歌同谷裡再拜杜鵑前胡羯長安滿騎驢短褐穿畫圖憔悴色猶足見憂天遣悶乾坤如許大老我此江濵無酒可留客青山應笑人幅巾方竹杖芳草落花茵賣得長門賦相如未是貧聼雨客來帷林候漁父黌舍坐聼三日雨諸生讀書喧兩廡商羊飛來立當寧雨聲書聲雜蛙鼓蚓歌似亦諧宫吕青苔上階茵生柱敗壁淋漓籀文古齊僮不敢開户牖風撼庭柯嘯飢虎南山石爛成糞土天漏誰能為天補去年旱魃走吳楚田家什九悲魚釜麥秋一飽方自許莫教又作飛蛾舞雲文閣為鄒伯常賦光範門前人似蟻君獨幽棲徴不起西􅑵挂頰看青山東閣垂簾爇沉水非烟非露非霞氛欲斷復續何氤氲若有龍眠博山􅔄海嶽清氣噓成雯香凝燕寢清晝寂庭竹森如列修㦸白衣蒼狗從變改天上人間逈相隔咄㦲權門銅臭兒臍燈將然恬不知何當招之入爾室三薰三沐聆吾詩古鼎歌蘇州萬夀寺舊藏古銅鼎識者竒之其識有周康穆宫冊錫寰用鄭伯姬等語大德中任陽謝氏欲以玉杯易之時住山默翁師不從後謝氏為搆佛殿乃豫之至正丙申謝遭兵鼎因失去甲辰之夏四月愚隱智公復得于軍人之手耆舊聚觀皆曰我山中故物也既而出鼎見示并述其由索詩以紀之碧雲師著金伽黎空王殿前龍象隨當階一卒送古鼎狀若獻寶波斯兒羣緇聚觀方丈室中有老僧前致詞云是山中舊時物立誦窽識能無遺文詞佶屈錯盤誥字體隱伏蟠蛟螭蒼姬訖籙世屢改不知何代來于斯謝家寶樹修佛剎巨搆賈與秦城齊鼎兮鼎兮什襲去歲經六紀今來歸師聞此語重太息兵火連年炎九域金鐘大鏞棄道旁總若沉沙銷折㦸珠歸禪月獨無恙護持信有天龍力摩裟兩鉉􅊜烟霧錯落丹霄映金碧光如摩尼含五色髙比珊瑚長一尺嗚呼羲軒之鼎莫可求禹鼎亦已淪東周世所用者非爾儔或膨豕腹仍包羞調羔爾無與覆餗爾不憂歸來兮歸來北山兮菟裘汾隂自有為時出切莫放光驚斗牛戲綵堂宜興主簿許克敬念曽祖法曺公為堂奉母夫人馬氏相國馬公廷鵉為大書戲綵二字名之至乃翁復巨搆以奉其母今克敬念斯堂與親俱亡哀思有詩且持卷以求紀載按許氏家譜自南唐金紫光祿以下擢科第者三十餘人克敬亦洪武進士南唐世家故軒冕嵗久雲礽益蕃衍樂平山中戲綵堂碧梧鈞翰摛華篇當年甲第連青雲過庭趨蹌俱鳯麟二母高年俱近百兩朝紫誥金花新纍䄄列鼎鳴鐘鼓綵衣𥚹􅝆堂上舞架書連屋笏滿床折桂多從廣寒府昨來海變桑田日四海狼烟暗如漆山中舊宅化焦土孤兒歸來淚如雨八珍之味肉臺盤何如啜粟盡親歡千金之裘走南北曷若斑衣戲親側肯堂肯構固不難去家千里方居官出門羞見羔跪乳故篋尚遺熊膽丸老夫知公念親意不為髙堂燕雀計願言長佩蓼莪詩圭爵榮親繼先世兵後過季子祠延陵采地荒榛棘延陵遺廟成瓦礫延陵野老歸弔古獨立斜陽長太息塵埃野馬紛滿眼城郭人民總非昔恭惟泰伯吳鼻祖三讓髙風冠千古周衰列國俱戰爭卓爾雲礽踵遐武法國躬耕江上田曰附子臧非浪語天倫義重情所鍾屹立狂瀾見孤柱此義孰可比採薇西山孤竹子此情知者誰獲麟老筆十字碑德音寥寥二十載陵谷幾番經變攺江南近代淫祠多梁公不作可奈何於乎祠堂之毁還可屋禮讓風衰較難復漢家兄弟歌布粟唐家兄弟相屠戮何當大化一轉轂於變澆漓作淳俗九州八荒春穆穆泰伯延陵斷絃續芳也未死當刮目劉龍洲墓在崑山慧聚寺後楊鐵崖偕應芳及詣士友弔祭而作目光如電氣橫秋北望龍沙萬里愁匡主首陳天下養和戎深為國人羞獨園埋骨黃金地上界修文白玉樓一代人豪今寂寞春風蘆葉自汀洲送慶德謙知州漕運之京兼簡陳子山十三萬斛葑田珠飄南風到直沽天上䕫龍應為喜海中蛟鰐近來無山林久卧頭垂白雨露重承紱已朱寄語玉堂陳學士楚狂憔悴老東吳簡净慈寺顔長老南屏樓閣照西湖湖上雲林勝畫圖丞相頻來談般若老碧端坐結跏趺獨園重布黃金地㕠樹新裁碧玉株我欲稽山探禹穴木杯堪借渡江無崑山陳伯康築亭山巔楊鐵崖扁曰玉山高處且為賦詩邀豫及郭羲仲劉景儀殷孝伯盧公武同賦神仙中人鐵笛老為爾玉山㕠眼青玉山髙處拄手板鐵笛醉時圍肉屏天生丹穴鳯為石東望黑洋鯤出溟一代風流有如此齊名西蜀子雲亭小至兩年而回折森遭難滕州九年至日悲流落一笑今朝有醱醅兒子歸來㕠足趼老妻歡喜兩眉開凍雲濃似金壺黑飛雪輕于玉管灰咫尺故園兵火隔一枝誰寄臘前梅寄鮑仲孚提舉風雨蕭蕭五月凉階前書帶草應長心傳千古文章印名重諸公翰墨場官舍看山間拄笏齊居掃地靜㷊香野夫别後遙相憶一榻青苔兩鬢霜除夕姑蘇城外小湖邉寂寞僧房借榻眠詩藁寫成丁卯集曆頭看盡甲寅年中原喋血人爭地南國啼飢水拍天坐起夜深如守嵗屋山風雪灑寒氊楊提學過千墩寓舍出示吳淞道中所作豫次韵酬之酒􅊜宫𫀆逸興多馮夷擊鼓舞蛟鼉一江星月光搖動八極風雲氣蕩摩不學山隂回雪棹肯來林下訪烟蘿陽春白雪知音少為我臨風一再歌西野草堂為儲希崇教授作南山虎去人無患西野堂成心更幽拄笏朝看山氣爽讀書夜聼樹聲秋賢人在坐酒一斗奴輩當階橘幾頭想像碧雞坊外路野梅官栁接林丘書露筋廟碑後斷臂孤兒事可悲露筋娘子死尤竒裙𥚑不受紅塵汚膏血寧充白鳥飢野燐照人魂斷處田家妻嫂睡濃時璚瑰香骨天應惜鐵石貞心世莫知宿草和烟薶古冢幽花帶雨泣叢祠碑存米老春秋筆詩有歐陽絶妙詞風化實能禆禮俗天書宜為表門楣丗間多少青雲士不恤衣冠作夏姬冬至即事一簾紅日雨𥘉晴客屨駢羅送復迎賀節本非三代禮隨時且喜一陽生齊奴金谷財為害楊相氷山勢易傾何似酒杯長在手青山相對適間情冬至前一夕憶次子林不寐枕上賦詩將成忽其母夢中作聲撼而覺覺而喜言夢林烈塘舊居作湯餅畢垣居室事歡甚因用其語為是詩結句云去年臘月𥘉九日發軔天階又一期鄭校頗聞襟佩集歐詞應作送迎詩久無書信來黃耳每有親朋問白眉阿母夜來曾夢汝分甘仍在舊西枝送楊純夫歸琴川杜子客長安行囊本枵然得錢沽酒覔鄭䖍不嫌官冷寒無氊邇來六百有餘載丗道多隨陵谷攺身為今人心古人清風髙誼依然在嗟我如鄭貧蒙君愛如杜雖無三絶才樗散頗自喜一從傾蓋意相得頭髮不知誰白黑衝寒觸熱每見過愛我西􅑵好山色援毫或和龜巢編解纓或濯龍泉井常言好古絶類我外物多忤中弥堅低頭甘立矮屋下髙論直到羲皇前朝來賣得凌雲賦麴生車載來相顧門前尺雪凍不消風木吼如虓虎怒宿宿信信傾腹心言欲拏舟抵家去呼兒更酌罄餘歡贈别殷勤抒情愫我昔居吳年十九君歸煩君訪諸友吳山醉處好湖山鄉人來作軟腳局且對春風開口笑街頭米賤酒亦賤一百青蚨滿㕠斗儘判連日醉如泥百憂盡付無何有人生窮逹各有時阿衡元是扶犁手詩書豈徒守章句言行正須傳不朽珍重林居慎厥修好音慰我思悠悠雪篷為蔡子堅作鴟夷船載西施去遺臭五湖烟水路嘉爾吳淞雪篷叟江水曾無尤物汚篷􅑵洞開天雨花柂樓屹立氷為柱鵝鴨不驚柔櫓鳴鷗鳬渾在平沙聚非熊無夢釣無餌如琴無絃得琴趨虎頭能為畫漁蓑驢背無勞覓詩句潮州阻雪八千里抗書直諌曾何𥙷殘氊囓雪十九年使節堅持亦良苦雪篷之樂樂于天雖欲同人人弗取獨有山隂王子猷清興頗堪同日語過顯慶寺六載重來釋氏家一甌新啜趙州茶杏花風後春何冷柏子庭前日未斜拄杖賴能扶潦倒闕文煩為𥙷楞伽要聼說法頻來往且喜平橋路不賖書潞城樵舍壁燕子來如舊雨桃花笑為何人竹下青苔不掃恐教鶴步生塵一室四皆立壁六孫三已歸妻猶喜老萊舌在不妨矮屋頭低拔木狼無跋㚄絶糧道阻周流天眼或開或闔人心何怨何尤瀼東瀼西農畝巷南巷北人家白露秋香禾黍緑雲春靄桑麻劉德祥監稅江州有誤傳其子死者遣人回家并寄書吾孫詞甚酸苦豫因賦詩代簡九江相去二千里一别于今五六年盡道國容恩容告老安知家信有誤傳山連楚尾青天外潮落潯陽夕照邊遙想此時公務隙爐峯相對思悠然題趙行素佩韋齊綵衣翩翩童丱年佩觹佩韘庭闈前鐵馬紛紛戰爭日佩犢佩牛江海邊幽蘭紉佩非不好獨醒末欲追前賢朅來佩韋不佩弦常以輔我氣質偏視韋之緩我之急如餌良藥沉痾痊丗事多因忙後錯緩不及事理亦愆不疾不徐發中節秉彛庶得全吾天岩廊鳴玉似髙步江妃解珠人浪傳貪榮可笑蘇季子佩六國印扶危顛何如茅齊但安坐且有竹風堪醉眠青山于人少知者白雲與我同悠然韋乎韋乎心目懸得魚吾豈忘吾筌贈黃仲器豫觀道書謂洞庭山有林屋洞天仲器以避兵居之既而過雲間適海上復還常之橫林閲歲月三十年距洞庭三百餘里仍以林屋自號示不忘也徴豫詩故厯叙其逰息之概如此云一目九州皆戰場避兵林屋水中央林屋仙人不知處橘井委棄青霞漿木奴包金亦致寇人乃隨雲出岩岫五湖三􅍩放孤舟遵海幽尋采三秀堪輿再造隔兩塵故鄊來歸能幾人芙蓉湖上大橫峴烟連緑樹橫林春解裝付與箕裘子管領春風桃與李幅巾自作逍遙逰别有行􅌪修竹裡一童出入長相隨欵假之馬亦不騎林屋别來陵谷移時望白雲猶賦詩膏粱文繡俱不喜猶曰愛之心未已堪笑老夫同此心白首論交結知己何當呼起李謫仙每飲一斗吟百篇殺青盡伐南山竹謄録好詩娛暮年悼許君善溪西老人山澤癯一生祗以詩為娛常言愛詩入骨髓好詩抄藏千百紙七言近體尤歡作不費工夫細雕削嘔心每笑李家兒牛鬼蛇神何足奇老夫𥘉焉未相識𢾗篇不知何處得稠人廣衆誦吾言說過于楊巨源一朝傾蓋千墩下膠漆相投不相舍西鄰假館兩年春買宅移家情轉親此時吳門正堅壁張角未死人相食雲梯炮作霹靂聲狼烟暗天血滿城吾徒幸若王官谷朝夕同吟紫芝曲桑田變海間噓吸間死欲丘首歸橫山暮雲春樹勞逺憶十載詩筒仍絡繹重來桑梓甚蕭條巷有索租人呌囂骨冷九原呼不起一酬薤歌續蒿里嗟哉時俗貴輕肥如子愛詩人亦稀贈王仲昭父子扁舟入吳空載月閭丘虎丘俱不謁停橈再拜范公祠楊花正落祠前雪義田義宅二百年義聲洋洋天下傳嗟爾吳之人胡不踐遺躅貪夫婪婪昧盈縮前車後車屢顛覆下床兩屨內㕠足奚用領軍鞋一屋我來訪舊無所將贈以范公博施之義方家傳更須授賢郎福澤將來未渠央吳淞江水長藍謝青毋相忘挽吳逸菴廓然一襟涵宇宙鍾氣會稽山水秀春秋髙似伏生年岐伯諸書口傳授浙水西來家屢遷名與杏林俱不朽老去居吳抱㕠膝四顧狼烟暗如漆兒能負米百不憂有酒即呼人共喫常時隱几看青山醉則齁齁枕琴瑟草年同飲松江水通家之交親戚比别來恨無縮地術時復論心書一紙只今祗與阿戎談翁在九京呼不起李明善慈竹軒吳淞江南盆浦曲慈竹軒開薜蘿屋了無花木鬪紛華一徑波光照猗菉􅊏塵不滓蒼玉叢枝枝葉葉皆清風一年一度冬夏笋冬生其外夏其中德哉此竹美如許子母交相禦寒暑嗟哉人為萬物靈溫凊幾人能似汝吾知吾友此軒居朝夕奉親來板輿母慈子孝默相更喜君子能威如樹萱堂上分甘樂諸孫錦䙀如錦籜家僮笑指青琅玕少年喜與俱平安令名亦同千古埀咄彼鴟梟兒人靣刀劍腹不學返哺烏頑然忘顧復嗚呼吾不知其見此烏兮何面目爾何日兮視吾竹簡湯道原曺子壽豫生頗好古恐兒輩不能繼述敢請二賢良相與語之吾兒觸屏煩為警省旦夕稍間煮茶專待要學劉伶死便埋隨行負鍤缺輿臺螢生腐草光能幾蟻在南柯夢易回一笑預言身後事兩賢聊共掌中杯貧居何處堪鋪席流水􅑵前好緑苔過橫山龍祠作橫山龍母祠前路人說今年祭龍苦前期邑有皂衣來督遣丁夫剪榛莽里胥中有豪家郎搏攫如鷹噉如虎編氓一呼六十人棄擲犁鉏行或沮十家之甲最可憐背血淋漓遭捶楚囊無一錢供百需肥腯豕如買烏牯手傾麥斛比珠斛剜肉成瘡誰為𥙷胥常大嚼過屠門今乃閭閻刲鷺股吾聞此語三太息郡邑安知弊如許祠官稽古埀令典穆穆緝熙由聖主聖心寬仁重民食三年兩度蠲租賦天生感孚和氣洽曰暘而暘雨而雨報功于龍歲有祭禮若迎猫恩更溥龍兮龍兮知不知如此嗟來食應吐皇恩蠲租詩洪武庚申天下秋糧欽蒙全免今年壬戌秋糧夏稅又皆免徴征繇聖恩寬大亘古無比故耕稼之民歌謡滿野而某則併以區區所聞者作詩以紀盛事漢紀蠲租半遷書汗竹竒大哉今聖主全以惠羣黎量與乾坤合恩同雨露埀豐年魚有夢丹詔鳳重來庶富民生遂敦寬俗習移微氓皆鼓腹窮士亦揚眉古制成均法新頒釋奠儀雅音諧律吕名教浹華夷茅茹今朝拔英髦靡一遺八荒仁夀域萬丗太平基水有清河日山無爛石時時雍民皥皥年耄我蚩蚩不作輸芒蟹真成曳尾龜倚墻歌此曲擊壤付吾兒林在新鄭縣學六月公文來取其子視疾七月𥘉四日塏言别而行付家信外寫此一聞汝有河魚疾三宿心如野馬馳逺阻恨無人縮地吉占賴有卜言龜眵生稠漆粘㕠眼身兀枯枝坐有胝預寫蓋棺遺囑去好傳經業佐明時送沈居士同塏往新鄭二千里外視吾兒重九日前期汝歸坐卧待看黃菊綻往來相伴白雲飛郵亭歇處加餐飯客路凉時早夾衣無限老懷言不盡臨岐目送思依依賀袁一泉陳大方新任道紀司官山中宰相古來有地上仙官今更清夜半光生㕠劔出秋髙氣感九鍾鳴丹霄拱極星辰近黃道經天日月明玄牝書中多妙理政須獻納佐隆平賀聰聞極正心印新任僧綱司官象法提維付偉人聖皇綸綍今諄諄手持正印天龍護身著方𫀆雨露新旭日斗城衙有鼓清時滆浦鏡無塵墻東病叟頭如雪也喜曇花並得春贈天寧寺無學長老報恩扶起法幢來鐘鼓天寧􅊰席開道出語言文字外卓然聲價自崔嵬麻衣疏屩古人風儼葉駢花一掃空八萬四千修月手斧斤隨入象王宫賀府官重修多稼亭朝家重下蠲租詔郡圃聿修多稼亭一帶金湯增氣概四郊禾黍勝丹青甘棠風作婆娑舞橫峴雲開翡翠屏斧斤聲中勸農意爾農豐樂正須聼周節婦詩呈府縣官滆湖水出白寉溪大江潮來溪口西江潮湖水接連處節婦姓陳周氏妻良人早世舅姑殁抱雛日夜號空閨盡拈奩具易喪具衣有淚血髽無笄績麻絡絲紡且織破􅑵夜雨風凄凄孤燈照影伴寂寞寒風夜雨聲酸嘶烟塵逺避東入海兒方長大能鉏犁時清歸守舊桑梓荆布蕭瑟茅茨低青絲兩鬢變蒼雪皎如玉樹無􅊏翳前年縣官帖鄉里核實上府文可稽老夫近聼路旁語聖皇德與唐虞齊天語諄諄為天下求賢悉上青雲梯閭閻未見旌表節門前草沒青苔蹊願言宣聖化郡邑罔俾側陋薰蕕迷旌善亭中名一題恩同璽書封紫泥佇看俗習接武皆麟蹄再贈衡志道世俗以甘㫖奉飬者為孝溫凊定省之禮鮮能之今寒區衡氏兄弟三人皆善飬其母其伯兄志通禮意之勤老而彌篤冬則以身溫枕席雖大風雪母不知寒能此一事可配古人故作此續前所贈詩以𥙷其闕云雞鳴雪屋起居安魚出氷池食飲􅌚最喜兒能溫𬒳席慈闈冬盡不知寒寄馬䭾沙陳糧長老龜獨巢蓮葉秋元龍髙居百尺樓長江只隔衣帶水佳景宛在蓬萊丘一年時序換新曆四海兄弟懷舊逰竹君寫我歲寒意聊折梅花寄壟頭送曺德升赴批驗茶引所山無猛獸水無蛟邑里春來樂意饒部集茶商新箬籠壚添酒市古溪橋赤心報國年方妙黃耳還家路不遙珍重清時用刀筆平陽遺澤豈寥寥謝新鄭縣官助葬亡子并以志略送去去年孟秋𥘉天旱火雲熱吾孫奔父喪病眼淚流血陸行二千里􅞶踔若跛鱉歸來秋盡時黃埃滿縗絰詢言父襄事從頭為細說一衾覆黔婁家人影單孑喪具百無措宿儲瓶亦竭幸逢賢縣令賵贈意切切擇木製美棺敦匠夜不輟寮寀同哀傷祭奠豐且潔青青諸佩襟感化重禮節是猶風偃草弘綱賴提挈吾知賢令心髙誼等前哲無錢及元振有則與同列無麥及堯夫有則與同轍悲哉吾中子忝教兩朞月眷言古東里圖經自來缺編蒲載前言辛苦磨硯鐵草創十八九放筆成永别手澤存于家歲久恐亡滅抄書送琴堂公餘賜披閲韞櫝庋􅓺舍無為醬蒙設會有作家手織錦為𥙷綴姓名蠅附驥九泉應感悅矧知埋葬恩寧無報銜結老夫懷謝言縮地恨無訣殘喘苟朝莫烏能見鬷蔑坐馳仰嵩髙心聲吐烏咽述懷㕠眸半瞎耳全聾年及新豐折臂翁孤陋一生棲白屋虛靈方寸炯青銅人如禽犢真堪恥家有詩書未是窮但願太平田野樂九原髙卧聼松風人日和前韵二首曾聞社酒可治聾椑榼分來謝阿翁才士謾磨龜硯石貴人多佩虎符銅人前出語羞稱好杯後為文錯送窮連日昏昏如病酒不知春到楝花風林居鶴髮老癡聾倣佛忘機海上翁留容但沽鄰舍酒鑄錢安用蜀山銅一年春色花無幾千古川流水不窮誰謂東家錦衣樹龍顛虎卧夜來風寄南澗海蘋二􅊰主東土西天今幾華南能北秀本同家門前弟子齊腰雪案上經文五色霞䄂拂古墩行傍栁瓶分春水坐煎茶遙憐丈室俱清絶屢夢幽尋適興賖寄張仲安舅甥及邵濟民許叔逺去年􅋈棹干墩浦澆酒百倫墳上土伯兮伯兮呼不醒仲也愛豫仍眼青最喜諸甥多似舅戀戀之情無不厚東鄰瓜田兼種藥杏林仙人與同樂箕山之瓢今貯詩雞林賈人知不知老夫别來八九月憂患多端鬢添雪負米不歸悲仲子我盆又鼓酸風起傷春不欲向人言恐人忍聼哀號顛最苦㕠眸失岩電近日看書渾不見兀如枯禪壁常面隙有微明澘且眩阿兒呼來滌塵硯代筆題詩簡羣彥無錫華景章以墻東陸先生所序乃祖玉溪義士之文徴豫詩故有此作猗歟古聖賢飢溺視由己聖賢久不作人多飢溺死天曆年中歲薦飢老夫身親耳目知操壺枕籍委􅗂壑烏鳶飽食狐狸肥適逢郡縣無良吏狎弄文移等兒戲義倉和糶百蠧生殊先民救荒意吁嗟玉溪翁髙義孰與儔黔敖之粥活鄊里立解倒懸危急秋指囷不結當丗交易量不效前人尤盡令菜色作喜色如渡弱水登蓬丘嗟哉玉溪翁往事誰紀述鄊人口碑傳四方墻東老手春秋筆老夫知名五十載更喜墻東文字在義聲洋溢流至今又閲桑田變滄海天生孝孫念厥祖禮樂趨蹌繩祖武丈夫不憂無萬鍾要為顛崖救辛苦唐君舉挽詞早年讀律如五經案頭夜照練囊螢學成能展四方志當路搢紳俱眼青神州赤縣坐蓮幕贊畫雖勞意磅礴青雲拾級步徐徐腰纒不跨揚州鶴邯鄲夢斷楊花春桑田變海宇宙新歸來東陵剪荆棘故侯誰識瓜田人竹林小阮差可喜為箕為裘奉甘㫖青松宅邊紅稻畦白雲亭上烏皮几四時花木手自栽客來看花常置醴有時寂無語蒲團醉逃禪有時曵鳩杖朗誦逍遙篇得鹿門龎公之安比濟南伏生之年生平有如此死去真悠然薤露歌或可鐫此歌便作碑銘傳過無錫口號客舟無錫道中歸聼唱吳歌淚􅊜衣泰伯墓田耕觳􅑌偃王祠廟走伊威二三策在遺芳逺千百年來舊俗非詩寄瓢齊老詞伯吟邊同為一歔欷題漁樵共話圖爾樵斫青山爾漁釣滄洲世事百不聞此心兩悠悠道旁弛擔渚泊舟促膝靣語何綢繆想論會稽人衣錦或訝桐江棄羊裘人生窮逹各有分曷不嗒然自作逍遙逰贈醫士錢伯祥杏林老仙山澤癯幅巾逍遙曳長𥚑逢人善作青白眼有子能受黃岐書酒對玉峯傾鑿落丹成金鼎飬芙蕖焦桐挂壁斷絃久藥杵聲中樂有餘題扇青山滿眼氣蕭森茅屋人家烟樹春客星多擲漁竿去誰復扁舟釣碧潯題子昂竹石圖玉堂歸來鬢欲絲漚波亭中清晝遲竹君石文意相得不時為作無聲詩安安道人歌僧坊旅宿崑山縣夜續安安道人傳似將秦鏡作斯文道人肝膽都能見早年學劍欲有為車塵馬足曾馳驅蕉隍夢斷竟失鹿葑田乃耕東海涯安知逃名逃未得射兮旌招論觀德諸生逰藝集如雲儼如風詠從曾晳歸來自喜安其安一室視同天地寬鹿門龎公與同志妻子不知行路難旁人問我安心訣非佛非仙非臆說􅊏雲不滓沉寂天水湛霜潭照秋月家居四壁莓苔青柴門雖設晝亦扄年來豈獨樂吾樂堪輿俯仰正清寧有時得錢即沽酒明月清風作三友胸澆磊塊去即休不學淳于論石斗嗟我碌碌者婆娑歌無勞赤松逰只在青山􅌪挂瓢樹下蹣􅘐舞歌舞聲繚繞青桐柯羣雄自爾卷白波安居之樂奈爾何逺緑亭為惠聚寺瑞芝年作道人愛山常目接無復經翻貝多葉碧天低處見絶頂蒼石爛來知幾劫清風一灑六合塵須彌芥子等法身諦觀有色若無色大地盡作曇花春宿崑山延福菴葉舟來訪漁樵社蘭若適逢龍象羣屋近玉山多潤色林藏寶地絶塵紛玄壇坐到三更月髙枕眠分半榻雲鐘鼓聲中鳴般若老夫堪笑耳無聞題崑山縣主簿先塋圖舊衣冠麟角族隂隂榆栁連鄊曲佳城父祖馬鬣封鬱鬱松楸在吾目飬親弗及奉庭闈居官豈敢懷蕨薇二六時中公務畢三千里外歸心飛出言不作雌黃口臨事不為髙下手琴堂喜得佐絃歌俸米支來供爼豆髙懷炯如寒露壺連步陟彼青雲衢兩塋銜土集義烏更遣丹青添畫圖題竹枝雀圖覆車之粟衆喧呼爾獨忘機入畫圖枳棘叢邊林有竹一枝何異鳳凰梧題玉峯書舍圖為俞彥智作婁江水接東海洋崑山玉立摩穹蒼江山城邑美如畫之子卜宅山之陽邯鄲夢斷歸來後詩三百篇長在手尚將古疏𥙷蟲魚復以今文較蝌蚪門前小溪流水清略杓不通車馬行奚童甕汲供茗碗鷗沙席坐尋詩盟才多轉覺讀書好春雨庭生書帶草時稱狂客醉鄊逰罔俾四明專賀老題畫魚圖魚在在藻或在淵同隨波泳遊同一天會得莊生濠上意畫圖詩史總難傳題畫竹顧梃之子作父作子述為竹傳神筆意古淡靈犀絶塵品題者誰龜巢老人題雪竹圖此君立雪清復清老夫見之㕠眼明琅玕恐折驚棲鳳三嘯虎頭風欲生絶句二首寫延福山中客况寄止菴長老一榻清風偶借眠白雲長繞枕頭邊客來題遍芭蕉葉我亦留詩謝老禪風翻交動曙光搖𬞞筍分甘到客寮最喜松聲秋瑟瑟月餘忘肉似聞韶一般春希夷古髙士詩言一般春以詩諡攸居夫豈尋常人一般春意何在莊生論天倪托物肆迂怪列子說混淪其言極夸大老夫請以理折衷慎勿謂我胡公之中庸古今先後無始終洪􅊏髙下俱流通藝藝萬物生意遂盎盎兩間和氣充鶯鶯燕燕妙歌舞花花草草紛青紅孤松或落幽澗􅔄三秀多生糞壤中步伸尺蠖天運轉户啓百蟄雷音同鶴長鳬頭短分自一敢以私意窺神工一般春意如此朱絃嶧桐奏流水洋洋自入知音耳小車髙閣卲堯夫隨栁傍花程伯子針芥相投肝膽合祇應絶倒東風裡白雲先生知不知同姓乃有此白眉老夫夙昔愛此詩四百餘載人無之頭髮雪白雙眼眵也來摸索珊瑚枝寄饒州鄱陽縣唐生千七百里鄱陽縣外孫書來如見靣九十三嵗龜巢翁中宵夢得重縫線詩瓢山人來上遊吾將結社招馴鷗延陵昔日繼三讓野水何處無孤舟家貧幸爾年榖熟買書教兒耕且讀梅花無恙竹平安嵗晚無勞念窮谷和舒文允見貽冬至經旬久朋來喜踐長市沽雙木榼踞坐一藜床小酌成歡洽間愁付杳茫山無白石爛谷有紫芝香淡泊聊相與辛酸已備嘗盡消湖海氣莫放斗牛光所貴心能直何慚貌不揚聼氷狐自惑吠雪犬何狂歲晚鷗盟在生平蟻夢忘酒堪澆磊塊䄂莫舞郎當西崦黃茅嶺東洲白水鄉漁樵同此樂吹笛送斜陽夏五訪一舟禪師臨别立銀杏隂中謂豫曰山中舊物什喪八九惟此木幸無恙也宜䝉品題為天寧勝概使居山者亦預有餘光豫謝不敏然心嘗許之故兹口占以頌人物具并之美一箇虛舟渾不繫千金鈞重負力能任金園地湧靈光殿銀杏天生雙樹林佛印衲裙坡老帶昌黎詩句頴師琴禪林勝事無今古况爾庭前好緑隂挽曹子毅大使早歲輕肥試采榮一官三載係塵纓解龜便作幽栖計瓜圃東門學邵平其二桂子𥘉生折軟枝青氊舊物遂陵夷竹林小阮親調膳何異慈烏返哺兒其三生來不鑿混沌竅此去竟作逍遙逰回頭一笑看鷸蚌未到釜􅑄誰肯休洞庭胡敬之以豫父執之交歲餽新橘凡十有餘年感無以報是用作歌湖山清氣鍾而翁生兒亦有古人風年年送橘拜床下甚愧我非龎德公今年霜落洞庭早橘熟先于葑田稻青衣童子黃金丸樹頭摘來霜未乾儂家食指百三十分甘喜得皆波及嬌癡堪笑兩曾孫手弄金丸口欲吞阿翁老叨三咽畢教孫食之還自喫一枚一枚復一枚翁有笑聲孫亦咍枯腸久似長卿渴甘露適從仙掌來楚江萍實不可得華峯藕亦無人識冷比雪霜甘比蜜此句真堪題此橘韓子之詩今借代無借作報章揮我筆懷㦲故人家洞庭七十二峯環翠屏洛陽秋風塵滿城莫能汚爾雙鞋青南山不爛黃河清正須坐閲三千齡山中舊識諸耆英煩道老夫多寄聲紅梅前代支郎亦異㦲白雲堆裡植紅梅樹經劫火多番換花向春風二月開鄰舍杏桃渾赧色禪林草木絶纎埃一時想像題詩去别日尋芳載酒來歲旦言情去年元日兩眉攢懷抱今朝頗覺寬一夜雨聲曾不絶五更天氣只微寒其二曾孫杯捧屠蘇酒冡婦厨供粔籹盤最喜催租人不到田家雞犬得平安寄盧長嬰次農我思東吳諸故人三難青年才出羣爛爛眼如岩下電英英氣作山中雲一經旨趣熟儀禮六書遍旁宗說文無由縮地即相見晋鄙亦得沾餘薰龜巢藁卷之九終
