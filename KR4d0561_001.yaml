front:
  text: 龜巢藁卷之一賦類
  hash: sha256:af6b364859bdbb103196cd886e9d4dcc09f88729767d057a379dee5bf9bbf091
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0561_SBCK_001-1a}
body:
  text: 弔豫讓賦併序予讀史遷刺客傳閔豫讓亦厠於荆軻之列也故作賦以弔之嗟忠臣與義士兮何正氣之烈烈匪死生而抑志兮豈存亡以改節仰豫子之炳炳兮復故主之所讎感知己以滅身兮雖九死其何尤欲潛名以匿姓兮乃絶踪而滅迹爰漆身而吞炭兮雖家人而不識前詐刑以塗厠兮後伏橋而褰衣雖匕首之不利兮惟趙孟之不忘彼友不諒厥志兮哀其生之自苦曰汝才而臣之兮必近幸而釋汝計何逞而不行兮欲何求而不遂胡戕形以毁質兮乃前䟦而後疐伊賢哲之確志兮固始終而不渝既指生以爲誓兮肯中道而攺途身雖朽而無怨兮義不可以暫離聲雖喑而不頋兮行不可以少虧信所爲之孔艱兮忘所謀之不長将愧人臣之不忠兮遑恤予身之見傷茍委質而求殺兮乃吾心之已貳仇不足以報趙兮徳不信于酬志念智氏之知己兮廼國士而遇予忽反君以事讎兮殆犬豕之弗如嗟夫子之言行兮與日月而争光遡千載之遼遼兮紛郁郁其遺芳何太史之不可考信兮列彼名于刺客夫豈碌碌之燕荆兮豈區區之軹聶士有沽譽而作善兮有邀利以行義茍有為而為之兮雖似真而寔偽彼知瑶之既殱兮及智宗之既夷夫子之身無所託兮夫子之心為可知乃抗節而効死兮豈攘名而踏利彼太史之載筆兮胡不彰而反盖自古孰不有死兮貴委命之得所諒夫子非匹夫之勇兮宜君子之所與雖笑貎之不可得兮氣凜凛其猶生撫遺史而歌吊兮表夫子之忠貞亂曰松柏之剛有時折兮金石之堅有時裂兮維忠惟義効斯竭兮匪頋匪慮終吾節兮烈烈豫子勇且决兮獲正而斃復何説兮不有君子疇發越兮千古萬古祗刺客兮復賦隂陽消長之理無徃不返盖一闔而一闢者也夫斡流推旋無端無始此天道之所以立也當其玉衡建子金鐘調律而㣲陽之脉已騐葭灰於緹室也夫剥窮上而反下則其象已具于食碩果之不食而七日之始旋盖其幾動于日至之日也吾嘗觀雷在地中之象而得其説夫雷陽也地陰也壮陰閉於九野而潜陽昭于窮泉則造化之至理生生而不息者也且萬物既老于坤而萌芽于復盖惧春生之不蕃故以飬以藏之甚宻也然必自掩身而齋戒禁嗜慾于聲色于以待陰陽之初定存萬感于一寂也况乎無疾無咎而利有攸徃寔幸聖人幸君子之道長于是乎陽扶而陰抑者也然則復其見天地之心㣲至誠者亦孰得而識也且天地理之復固有其常而人心之復亦不可逆故夫悪極必善亂極必寜柔極必剛晦極必明盖以天生斯人靈于萬物者也若夫迷而未逺乃能遄返則若醉而得醒夢之得覺譬如夜氣之清不受乎旦晝之牿也信能獲其萌于隐㣲之際則朝乾夕惕以全君子修身之大節也凛乎其頻復之厲裕乎其休復之吉也卓乎其獨復之勇厚乎其敦復之實也赧乎其迷復之凶必自强而不自孽者也夫惟顔子其殆庶㡬因從事于克復而得善則服膺而弗失者也盖其明以察幾剛以致决故優優乎入聖人之室也彼聖此愚均是人耳増予心之恧也君子則齊其心而不敢放則善端綿綿而不絶也然則欲遏人欲而反天理亦唯謹獨之念而幾㣲之不忽也斥鷃賦維二氣之妙凝播庶類于羣生嗟斥鷃之至微亦禀氣而載形其薄質之輕儇無華采之煥明味不登于鼎姐羽不用于旗旌既無虞于罘網又何慮于弋矰于是庭除之際藩籬之下匪乗而遊繄匹而䖏决然而躍蹌然而起物莫能害樂得其所匪荣菑繄匪薄榛莽茍可投迹鼓翼斯舉匪陋麻菽匪羡稷黍茍可充食俯沬斯取夫其委命而足順理而安欲無所縱樂無所盤不用賄而致焚不藏珍以取患不飾身以賈禍不懐音而見殘静若守而有待動若倦而知還雖形㣲而䖏僻任此生之自然彼其魯雞之闘胡鷹之勢介距在身絛鏇在體鸚鵡能言而入籠孔雀飾外而受制或産絶垠或生遐裔傷伉儷之相違哀母子之偕逝縱僥存而倖免亦貌慘而容悴豈非形色之瓌材質之偉為世所用為人所貴諒䖏身之不智終有累于斯世且夫滄溟之鵬醢瓮之雞均一天地復奚累為萬品一區要與之齊維兹斥鷃亦適其宜何重何輕何髙何卑小夫之辨又焉能知大人逹觀夫復奚疑承露盤賦粤古漢武乾龍御天身都富貴心慕神仙動出塵之遐想訪妙道之真傳覬長生而乆視與松喬而相後先也爾乃氣類翕從精神感召秘方畢進至人胥造授異術之玄機論延年之至寶匪玉其芝匪瑶其草采乾坤之精爽庶可臻于夀考于是烹蜀道之羙銅襍麗水之良金既噓霆而煽電亦穴陽而治陰築柏梁之崇臺卓天表而嶔崟諒弥髙而弥峻非可計于丈尋觀其矻若雲峯壮如砥柱表斷鰲以立極縣驤龍而行雨窃造化之工巧有鬼神之呵䕶尔乃抗以仙掌冐以金盤詫飈輪之閃閃驚圜規之桓桓騁怪誕于羣姓馳雄偉于千官至人進曰奇功既成吾事巳濟願舉玉趾臨幸其地于是天子乃潄正陽含朝霞屏萬㡬之思慮絶九重之紛華迨夫夜澹氣冲雲銷月皓㴻靈湑于重霄降鮮英于清灝泫泫如飴霏霏如膏不頼乎金丹之錬不屑乎玄霜之搗盖自然之嘉瑞真可以後天而不老遂乃屑蜚璚和溥珠靈腋飲麄穢除神漿未擬醴泉焉如却五味以謝六塵又奚啻石髓之醍醐也既而形超埃壒體若羽翼趋火不焦沉渊不濡浩兮如禦寇之御風栩兮如蒙荘之化蝶盖夙昔之願以遂而求仙之能事畢矣嗟乎吾觀漢武惑于方士既受誣于文成復見欺于五利信荒唐之邪説殆無異于嬴政之世彼其内嗜聲色外窮甲兵任貪天而黷貨用酷吏而滛刑恣盤逰而無度極土木之經营朝苦心而焦思夕疲神而􅉵精縱飛仙之有藥復何可以長生觀其建元𥘉政赫赫明明罷黜百氏表章六經彌綸治道網羅羣英信一代之英主能持盈而守成使其慎厥始終進乎誠明不玩于物不恣于情泊乎其無為澹乎其太清則不必餐玉瀣擢金英䖏方壺登蓬瀛自可以保真而養静享無疆之遐齡是故至聖無欲存順沒寕使漢武欲效唐虞之治胡不刻斯盤于九字之湯銘禦寒賦有北鄰客訪于南隣主人曰四序相催暑徃寒来天時既变人事亦攺風霜髙㓗氷雪皚皚敢問諸子将何以禦之哉主人對曰吾用吾計卿用卿䇿請子先陳吾為子説客曰雄楼傑閣㴱閨邃房綺􅑵不啓畫閣𥘉粧紅爐獸炭煦若陽春此予所居之䖏也主人曰予也桑樞竹牖且塞且墐穴地作爐火惟煨燼客曰九醖之設八珍之列炙鶉臇雁炮羔臑鱉聚物夭美咄嗟而獲此吾所食之味也主人曰予也蹲鴟可煨桑落可傾一罌之雲復有茗烹客曰狐貉之裘綺紈之服襺以文繡飾以金碧舎舊服新随意所適此吾衣服之費也主人曰予也帛以為襦卉以為袴且縫且紉復著以絮客曰重屏既列邃幙且張鎮帷以犀展罽在床錦衾綉褥爛其有光粉白黛緑笑言芬芳此吾寝息之安也主人曰予也布衾如雪紙帳如雲縞綦茹藘聊樂吾貧客哂然而笑曰予居養之異服御非常禦此隆冬猶未足當若子之謂其亦踈矣主人曰噫是何言之謬也盈天地間林林而生富兮則濁窶兮斯清分定之故孰敢云争子亦為我而不得我欲效子而不能胥樂其有何踈之稱且吾居之而安不計乎室廬之華陋服之而煖不較乎裳衣之麄細嗜之而飽不察乎飲食之精糲寝之而寕不論乎衾禂之鮮敝凡可卒歲何庸侈麗矧予所謂天和者而子固不足與于此子其行焉無汙吾耳客于是茫然自失黙然無語汗面芒背懐慙而去閒居賦夫何予性之耿介兮與時俗之寡諧築室居于幽僻兮離喧囂與氛埃繄前修之可慕兮矧古道之可追何皇皇而無所止兮乃慮徃而营来羗行止之有時兮信用舍之有遇視富貴如浮雲兮豈馳名而䳱利朝吾㳺于道囿兮夕吾憇于藝圃思衡門之栖遲兮慕考槃之窮䖏依灌木以結宇兮引清泉以為池樹脩竹姢姢兮滋幽蘭之猗猗與禽魚而相䖏兮同欣欣而忘机既撫松以長嘯兮復臨流而詠詩列左圖而右史兮置前琴而後碁春吾蚕以為衣兮秋吾穫以忘飢雖遯世而不吾知兮唯昭質其無虧信鵉鵠不可以矰弋兮豈麒麟之可覊分宜雞鶩之飱兮任駑馬之交馳延漁樵以論交兮美田廬以自適既不怨而不尤兮又何喪而何得嗟萬鍾之厚祿兮暨駟馬之軒車徒睽争而交攫兮紛緫緫兮焉如亦孰知信之可立兮孰知義之可服刓其方以為圓兮操其直以為曲彼恬然以為榮兮此赧然以為辱諒薫蕕而不相入兮寜抱予之真獨謇予豈獨好異兮欲索居而離羣厭流俗之靡靡兮誠不能和光而同塵景顔氏之屡空兮乃樂天而知命仰仲憲之蓬桑兮曰唯貧而非病彼前哲之𢡟行兮羗與道而同符何愚人之汨汨兮愴乎其若囚拘羞潘岳之䛕佞兮拜車塵于途側何亦賦此閒居兮乃論士之巧拙雖千載之遼遼兮慨有感于予衷茍非拔俗而髙蹈兮亦何予之能同亂曰時與我兮相違審夫命兮何疑憂人之憂兮羌者有時樂吾之樂兮知者其誰肺石賦昔聖人之御世兮貴上下之情通羌一視以同仁兮曽不廢于困窮民有長以司平兮或榷衡之失中繄窮民之有愬兮阻天関之九重非設法以偕其進兮嗟皇皇其曷從爰置石于王都兮其色肺肝之與同使民立乎其上兮得吐露其情衷心纍纍乎三日兮斯可見其哀恫士師從而聼其决兮私一毫之靡容信尺蠖之乆曲兮睹大明之當空脱辛苦于顛崖兮躋春臺之融融乃歸罪于其長兮激凛凛之清風以春生秋殺之道並行兮誰膏澤之敢壅睠兹石之在他山兮亦惟玉之可攻孰徴求于岩穴兮乃佐治而有功曰厚重而不可轉兮疑自天而来降薄京口之狼石兮聚當世之梟雄圖殁都之華石兮徒媚主于㴱宫笑佛廬之盤陀石兮坐枯禅以談空彼支磯之神怪兮適欺世之盲聾是皆不足以儗倫兮徒雕琢而磨礱惟嘉石之可配兮並見錄于周公惟皇元之有道兮過成周之治隆俗麟趾之信厚兮由上令而下㳟畫衣冠而不犯兮将比屋之可封無一夫之不獲兮雖肺石其奚庸皥皥乎不知帝力之何有兮民於變于時雍四靈賦浙江鄉試聖王御極至治維新修文偃武蹈徳詠仁𬒳聲敎于四表畢梯航而来臣發陽春之厚澤布大造之洪㤙何隐不顯何憂不欣何疾不瘳何屈不信士鄊道而㳺藝賈去偽而鬻真工務業于堅朴農務力于耕耘極中和之至徳致嘉祥之玄珍維龜維龍維鳳維麟應時畢至以彰聖神乃詠厥事以燿于黎民夫麟之為物其形不類匪麋匪鹿匪虎匪兕廼肉其角乃圓其趾不羣居而旅䖏不䧟穽而罹罟音既中于鐘律行復合于規矩生草不踐㣲䖝不履原其徳性吁嗟仁矣朝陽之鳳稟質中行九苞表瑞六徳儲祥晨遊紫霧夕飲玄霜發文采之粲粲動和鳴之鏘鏘臨寥廓而髙峙凌雲霄而逺翔俾烟霏之閟色與日月而騰光覧徳輝而来下羌出䖏之有常介族之長元龜寔先十朋之重五色之全下夷平而法地上規隆而象天或萬年而升木或千祀而束苓順隂陽以呼吸重藏景曜于重泉斷休咎以滋惑明吉凶于未然信穹壤之奇物能鈎㴱而造玄懿矣神龍有威有稜鉅細脩短伸屈降升千变萬化杳不可憑張鱗鬛之参差挺頭角之峥嶸既雲行而雨施復嘘風而吸霆或躍于淵或遊在崗擬物狀以有體忽神化而無形聞之斯懾覩之斯驚盖曠代而罕值寔有國之嘉禎予嘗稽之傳記考之六經四物孔異有彰厥名若夫羲皇之世唐虞之廷姒禹之代姬昌之京或以成太昊之紀官或以聼簫韶之九成或以負洛書之大範或以應関雎之化行惟随時而隐見故王者以為祥休之徵矧兹昭代聖聖相承與勲華而比徳眇漢唐之所稱海嶽之精藪澤之英何祥不産何異不呈宜羽毛與鱗介搃符合于文明謇予沐浴盛化歌詠太平躬雖䖏于蓬室心獨向于皇扃覩兹竒瑞欲黙不能敬綴詞以成賦仍名之曰四靈酒賦有客有客一醉一醒邂逅相遇欵我柴荆醉則髙其曠逸醒則矜其典型劇談雄辨舌揺風霆於是醒者睨醉客而視之曰若不聞乎禹悪㫖酒夏徳其昌紂為糟丘殷祚滅亡何物狂藥毒人肝腸甘之者必酗中之者必傷化祥慈為凶險変沉静為滛荒語言龎雜氣勢鴞張或罵将軍之坐或登節度之堂床或吐丞相之茵或牽羙人之裳或翹足沐猴之舞或俛首羣豖之塲㣲酒之故胡然而狂甚而㕠親之養不頋七尺之軀亦忘腐脅而斃遺臭無疆酒之害人也如此若何不痛絶而謹為之防乎醉者曰是何言哉是何言哉吾聞上古窪樽三代罍爵茍聖賢之不飲何杯棬之有作書稱麯蘖禮酌鄊飲之儀献酬交錯若近代之飲者皆磊磊而落落晋之八逹非酒何以逃亂世之誅唐之八仙非酒何以脱㣲官之縛酒之于人其徳不薄変怒為喜轉憂為樂釋憤氣之怨争發鈍口之談謔故故暢飲吾之師不飲客之悪獨醒之原懷沙寂寞啜茶之仝血染鋒鍔然則酒何負于人哉爾獨未知其趣而遽薄之也詞未既余乃從而释之曰止止二子之説各倚一偏請折其衷子其聼旃徃古来今酒不可無祭祀賔客日用之需但用之者豊不可縱儉不可拘縱失之湎拘失之愚愚乃人所鄙湎為酒之罪酒以成禮威儀秩如酒以合歡怡怡愉愉夫如是又安得喪于而徳害于而軀亡于而國敗于而家乎二客于是蹶然而起負墻而立請誦惟酒無量不及亂之語庶無過與不及龜巢藁巻之一終
