front:
  text: 龜巢藁卷之十二
  hash: sha256:df741d9e482ab413987021f2a5cc37ee7821baba7280550391142847965317b0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0561_SBCK_012-1a}
body:
  text: 書上奉使宣撫書時為歲荒而述也某嘗觀孟子告鄒君之言曰凶年飢歲君之民老弱轉乎溝􅊤壯者散而之四方者幾千人矣而君之倉廪實府庫充有司莫以告是上慢而殘下也夫鄒小國也孟子猶以是告之况堂堂天朝富有四海倉廪府庫比之鄒君相去萬萬奈何有司者遇凶荒之年而不思救荒之䇿知出納之吝而不知時措之宜其殘慢有甚于孟子之説者責何可逭耶伏惟大人奉聖天子明命巡歷遐陬詢民疾苦其矜恤黎庶慈如父母紏正百官凛如風霜蓋能以聖上之心為心唯恐一夫之不得其所耳然民之疾苦莫甚于飢今常州屬邑曰武進曰晉陵其境土與鎮江相連歲之凶荒實相似也今兩縣之民皇皇焉嗸嗸焉與鎮江之民何以異哉然彼則有仰給官廪之喜此則有餓死溝􅊤之憂國家一視同仁𥘉無彼此厚薄之殊特係有司之能告與否耳嗟乎常之民自春冬徂春訴飢郡邑僅嘗得義倉之粟三斗而巳斯人也譬之久旱之苗微雨斯須豈能蘇息必待優渥霑足而後免乎枯稿耳當此之時青黃不接食草木之根者有之鬻子女而食者有之去父母離鄉井行乞道路者滔滔也有司方且移文核實藉有田之家計畝科𢾗以為賑恤之政其亦不思之甚矣夫粟之為物必産于田歲凶則田不收矣夫不收之田雖纍巨萬粟何可得乎况頻年不登賦役重困産去稅存者十之八九一旦又加諸賦斂之毒其狼狽為何如哉徒使皂隸之徒家至户到呌囂之聲雞犬弗寧是以有田者亦多為東西南北之人矣其詣有司者拘之縶之鞭之撲之刮龜毛于箠楚之下剖鷺股于挫辱之餘區區所得民不足贍假令能贍其民何異奪烏鳶之食與之螻蟻耶若是者誠知大人君子之用心必不忍為也忍令有司為之乎夫常之為郡大郡也官廪之蓄陳陳相因又有附餘之粟存焉公帑之積綽綽有餘又有贓罰之金在焉斯二者非國經費有司者亦何靳而不以施諸民乎苟能以是施之亦可解倒懸之急况能如汲黯發河內之粟乎惟大人舉而行之上推聖恩下副民望盛德之至也然民疾苦豈止于斯如公田之重租宜減官鹽之髙價宜輕田户之酒課宜更都水之冗員宜汰凡如此類未易枚舉獨以賑飢一事首瀆鈞聼蓋民之顛連命在朝夕非若他事可少緩也芻蕘之言倘蒙採擇餘者又當條具而細陳之惟大人垂察焉區區干瀆崇嚴不勝悚息與王氏諸子書諸君子居喪三年除服有日聞欲命羽士設醮以助冥福所費計統鈔三百有竒以粟用之幾四百石是亦出乎孝敬之心循乎丗俗之禮也然冥福之實果何有哉以愚言之用三日醮筵之費賑一鄊人戶之飢當此凶年使𢾗百千人得餔其粟而免為溝中瘠者其歡欣贊頌豈止百倍于黃冠師之口哉若諸君子更欲盡追逺之誠則于祥禫之日豐潔致祭亦庶乎終喪之禮矣但今之丗俗親殁之後凡言做好事者非佛氏之齋即老氏之醮二端之外餘無用情雖祭祀亦不為意蓋亦未之思也愚請引古證今以齋醮無足信者為諸公言之佛氏以釋迦為師其書由漢以來流入中國𥘉無設齋之説也至梁武帝妄祈因果俾僧流為之厥後亡滅宗國餓死臺城使設齋而有因果豈至是哉道家以老君為師自周以來其書傳之天下亦無設醮之説也至宋徽宗妄意求福令羽流為之未幾傾危社稷流落金虜使設醮而能獲福決不至于此矣二君昏迷不明物理信一時妖幻之言為二氏衣食之計如此前代名賢當今豪傑卓然有見而不惑者固多有之惟閭閻細民惑者十九何足論哉諸君負聰明特逹之才有深逺宏濶之見平居髙論逈出人表豈至是而亦淪于汚陋之習耶必能以理燭齋醮之妄以財行賑恤之仁上下一心虔奉祭祀一以寓孝思之意一以報罔極之恩上天鑒臨何福不至先君有靈必含笑冥冥中矣余以忠告者朋友之義也在交契不敢不忠惟諸君念之論吳人不當祀范蠡投老異鄊如龜藏六未嘗敢輒造公卿大人之門為遊説之客也今一造焉亦不敢如方朔自譽毛遂自薦以求其用亦非敢有富國強兵之䇿驚丗駭俗之論以衒其能特以古人一事有關風化敢請為閣下陳之僕嘗近過吳江嘗逰三髙祠顧瞻遺像覽前人記載金石之文見所謂三髙者曰范蠡曰張翰曰陸龜蒙謂其清風峻節天下共髙之邑人為東家丘而祀之僕于是竊有感焉夫季􅈾魯望吳産者也吳之人慕為東家丘是巳鴟夷子皮始終事越間嘗以行成留于吳其心未嘗一日忘乎越也進美女納寶器以惑吳之君臣乘虛進兵以滅吳之宗社大率皆蠡之謀越人論功蠡居第一豈非吳之大仇乎惟其功成名遂遁迹而去其識見固髙于常人然浮海適齊則裝其珍寶珠玉以行在齊復營致千金之産自齊之陶懷其重寶而去居陶而父子耕畜轉物逐利又致纍巨萬之資僕嘗觀太史公以是屢書不一書者蓋深鄙之非取之也較諸子房辭漢翛然從赤松子逰相去萬萬矣又觀杜牧之詩蘇子瞻之詩皆謂范蠡西施以申公夏姬為比由是而言謂其人為貪為穢亦不為過尚何清風峻節之足慕乎今也以吳人馨香之黍稷享敵國貪穢之仇讎于理其可乎哉禮民不祀非族况仇讎乎或曰有其舉之不可廢也僕應之曰吳有三髙人特未之思耳若太伯仲雍延陵季子真可謂天下所共髙者也凡為吳人苟非土木孰不有髙山景行之思雖欲至之而不能也唯當道君子循名核實改而易之實足以稱三髙之名雪千載之羞而厭服輿人之心矣然斯言也僕不往告之他人而特告于閣下者誠以閣下心正而理明學博而識髙見義所在勇于有為凡以正人心厚風俗之事知無不行特此一端偶未之及耳及聞僕所説必不以人廢言此僕所以發其久箝之口也惟閣下參秉鈞衡之暇稽諸祀典以理裁之以義決之為之改作奉三讓至德之聖人祠于堂上配以二賢仍以季膺魯望列之從祀如此則正前人之謬新生民之耳目振髙風崇禮讓激衰丗薄俗而勸之其于風化豈小輔哉唯大人君子垂察焉若謂蠡之有功而祀之則越人祀之宜矣若諸葛武侯之賢蜀人祀之吳魏亦未嘗有祠焉斯理之公古今不殊幽明無間所謂質諸鬼神而無疑者也苐恐不知者以僕之言既不足以謀身又不急于用世斥其迂濶而譏笑之僕于心誠無愧焉古語云可語與智者道難與俗人言所恃髙明必蒙鑒察區區干瀆崇嚴不勝悚息代與李中丞書某去年夏四月奉狀附某官漕運之行不審徹鈞覽否即日仲春伏惟鈞候神相多福某避地吳下六年于兹顛沛流離困窮艱難萬狀逺不能奔父喪于京師近不能葬母骨于鄉士兄弟妻孥救死不贍故于父母殆若忘思其實銜哀茹痛朝斯夕斯未嘗頃刻忘于懷也若大人之深恩厚澤重如丘山亦未能伏謁門下效犬馬之力以報于萬一幽明兩負度日如年唯大人念先人之夙好憫遺孤之艱虞特賜哀憐不加譴責為幸甚矣某擬今歲歸耕膠山剪荆棘藝禾黍庶一稔而有宿舂之糧即灑飯先人之墓得負荆于大人之門也兹因吳縣尹詣前謹奉此承候起居併述所以趂趄負罪之故舍弟某臨書羅拜悃不殊前下情無任悚懼感慕之至伏惟鈞察上盛教諭論土地夫人書常州路學教授盛克明以文廟先聖殿及門廡等屋湫隘皆撤而新之廟前建文昌土地二祠其土地舊多淫祀嘗詢之應芳悉皆除去但夫人之像為或者所沮而存余盡力請毁之至書再上教授乃白諸郡守賈侯侯然之像遂毁教授名昭維揚人侯名禧字吉甫真定人也自先生之教于常也講貫之暇繕修廟學二三年間百廢其興竊嘗與鄉之諸老論之皇元置郡博士以來未有如先生用心之勤者也功其𢡟哉功其𢡟哉特有細故一端尚宜改作敢以狂瞽之言輒瀆清聼惟先生察之伏覩夲學重建地靈祠于儀門之外其神有無姑置勿論使誠有之是豈不知亷恥者哉今肖像之設夫婦偶坐楚楚乎裙叉之飾盈盈乎珠珍之粧侍從旁立男女雜處儼然坐聖人清廟之下能無恥乎禮曰男子居外女子居內又曰女子出門必擁蔽其靣雖近世禮俗之敝亦未嘗無男女之別也至如閭閻細民之家人或過之其妻猶避嫌不出豈有身為神靈而為之配者不知內外之分呈身露靣眉案並食以叨士大夫籩豆之薦反不若閭閻匹婦而能避嫌乎吁幽明雖殊理則一致決無是理也明矣比聞吾先生以此為細微之故不欲矯世違俗而姑從衆也先生之心固然矣但學校者風化所出之地凡有作為人所矜式愚恐四方來觀將謂理或宜然轉相倣效又而卒莫知其非又恐禮法之士從而議之又安知先生𥘉見之明如彼其後從衆之意如此耶此愚所以不避譴責僣伸尺喙以罄其芻蕘之誠唯先生以䋥揆勇為撤去非惟雪神羞明禮教不淪胥習俗之謬抑亦可見先生之不以人廢言矣抑愚又有説焉天地之靈者莫靈于賢者也若吳季子張文靖胡文恭鄒忠公諸賢正毗陵土産之英靈學有舊祠庳隘弗稱即于此祠而祀之不勝夫無名氏之鬼乎程子曰除神祠而民為善斯言也雖質諸聖人在天之靈亦何疑哉夫如是而或獲戾于鬼神者凡加于某之身無悔區區僣越惟先生察之又上盛教授書某比見地靈祠設夫婦之像恐未合禮竊嘗冒昧有言欲禆明見亦庶乎他山之助耳或有謂豫者曰怪神之事聖人不語非不語也蓋不易語諸人也夫地靈之神其配偶有無未易窺測若果無之則先儒君子必嘗論説今吾子以一介之微言雖屢中又安足取信于人也哉僕聞之既謝不敏退而考諸五峯胡先生之論南嶽曰世俗為廟貌置男女屋而貯之褻瀆之甚厥北溪陳先生又從而釋之曰自聖學不明鬼神情狀都不能曉如泰山封帝􅌂然人形垂旒端冤且立后殿于其後不知又是何山配之為婦也然則土地之于山嶽類也廟貌之設巳為不經况復加之配偶乎惟先生撤而去之以祛衆惑其有未喻者乞以前二公大儒之言曉之其誰曰不然况當今天子所通祀者曰三皇曰孔子曰社稷或廟貌焉或壇壝焉皆未嘗有匹偶何物地靈而獨有之乎稽之古訓巳如彼參之祀典又如此反覆思繹決無是理不免再用塵瀆以殫其千慮一得之愚惟先生垂察焉干周侍御作顧元公祠堂書某毗陵鄙人也逃難異鄊百事踈懶惟好古之念根于其心老而彌篤偶有感觸奮然欲為力雖不足亦必假手于人卒于成而後巳今有一事復因人就緒敢具述顛末為閣下陳之某僑居葑門適與顧元公之墓相近地方五六里俗稱顧榮墓是以知之既知之𢾗往弔而問焉夫元公晉之名臣也其勳業家世詳見史編元帝大興二年十一月十七日卒于官迄今凡一千五十年有餘碑文雖失丘壠尚存土人以其地如鳳形名鳳凰嶺前有二墩峙立左右叢祠一區為鄊人奉嘗之地其來逺矣近有無知之民舁置土地神塑像𢾗輩列坐其中其荒謬淫褻有不可勝誅者以某一介之微不能改作是用言諸長洲縣令周君君博雅而文方其視政之𥘉力行古道故聞而喜之遂與某等展墓且詣祠奠謁屬某為文告之曰何物地靈混此室處既而令方議斥去淫祀整葺祠宇邑人張實乃樂成賢令之志輸財效刀唯命是從圬人梓工並手交作瓦甓之毁者易之棟宇之朽者新之像設供具門垣墓表靡不完好二墩則各植梧桐二株名雙梧墩蓋張華嘗稱公為朝陽之鳳及墓名鳳嶺故也月餘畢功令復躬祭祠下麗牲有碑宜勒文以發昔賢之幽光而周令亦牽聫得書然必求大手筆為之斯不朽矣唯閣下碩德令望為今儒宗典雅之文追古作者若篆隸之妙則雖秦丞相漢中郎並駕而驅吾不知其孰先而孰後也兵革以來諸老凋謝所謂斗南一人而巳唯閣下追念前修賜之述作并為揮灑使刻之堅珉則詞翰兩絶焜耀丘壠將見士大夫爭先摹寫以廣其傳則元公之勳業聞望益著于青史之外矣某又考之南史晉武帝禁立碑表著于令甲至元帝時驃騎府主簿請恩葬舊君顧榮請為立碑詔特從之然則今閣下之文繼美千載可謂無愧焉耳如某區區龜巢在往歲猶蒙黼黻矧斯文之傳有禆風化閣下豈不樂其美耶此某不揣僣越拜書閣下意閣下之必不却也輕瀆崇嚴不勝悚息上王總管正風俗書嘗聞豐山之鍾霜降而嗚説者謂氣之相感理或然也今某一介草莽覩吳下風俗之壞扼腕切齒不忍隱默敢請為閣下陳之蓋以閣下得天地之正氣飬之于身施于政事故區區狂直感而有聲猶豐山之鍾也惟閣下發號施令行諸郡邑必能誅鉏淫穢一洗汚俗振其氣之餘烈也是氣也在天則為風為霆為秋霜烈日在地則為草而指佞犬而咋姦豸而觸邪毆陽子所渭天地之義氣而孟子所謂浩然者也夫以閣下之清非秋霜乎其明非烈日乎政教號令非霆厲而風飛乎如某者氣稟獷直疾惡如仇蓋亦似乎指佞之草咋姦之大觸邪之豸也昔孫叔敖殺兩頭蛇而隂德之報位至楚相自世俗觀之敖之殺蛇戕物命也殊不知除一物而免衆人之害德莫大者也今日之事正類此物故復舉此以破世俗之惑罄其一得之愚唯閣下察之賀丁州判到任書某客居江滸帶經而鋤一日鄊之父老過子曰兩年吾州以州長之賢民用復業今又得賢州佐仁其民必能盡除其煩苛使田里無歎恨之聲矣余居此飲婁江之水是亦婁江之人也可不喜乎可不賀乎豫曰倅方下車曷知其賢曰吾聞之居家能敬其親居官則敬其同僚遇文士則敬武士則敬緇衣黃冠醫藥卜筮之屬咸禮貌之微而皂隸亦善遇之又微而蚩蚩之民伏庭下訟曲直者亦謹以三尺之法裁之未嘗厲其聲怒其色也是皆敬之存于中形于外如此非賢而能之乎時某樂聞其説因念先民之言謂能敬必有德德以治民而民必𬒳其澤矣既而入州以父老之言詢諸文武醫卜緇黃之間無間然者至于縉紳月旦之評道路輿人之頌比前所聞者尤加詳焉是誠可喜而可賀也然則一州之人今𬒳其澤固當為一州之人賀等而上之澤及一郡則又當為一郡之人賀又等而上之敡厯臺閣羽儀天朝可為斯世斯民之賀者未艾也惟一念之敬始而終之君子慎焉與陳翰林子山書某丙申𥘉冬逃難吳門逢人問閣下出處既嘗為浙東路難之憂後二年聞居翰苑深用為喜近于唐彥博處又喜知爵位之崇道德文章之盛每誦一代不𢾗人百年幾見之之詩馳慕而已某離鄊六年偹厯艱險年今六十百無所成獨與兒輩固窮末嘗一失其故步也比來目昏耳聾髯白如雪惟髮尚有黑者則其狀全類社公可笑可笑鄊人多無噍類而某一家𢾗口幸免溝􅊤特未知將來如何耳兹因胡宰行謹此問訊即日秋髙伏惟善加保愛亟秉鈞衡以福天下上周參政正風俗書某毗陵賤士也曩歲以避兵來吳閣下時為郡主有所控訴俱蒙接納由是知閣下為能聼言為能下士常懷野人芹曝之獻而未能也今閣下參秉鈞衡為國柱石以斯世斯民為己任吳人賴之若子之有慈母風雨之有夏屋別妍媸而有鏡較輕長短而有權度也况閣下不自有其明下士之勤吐握不􅌒聼言之切詢及芻蕘雖老無能為視舌猶在豈終無一言以效芹曝乎然國家之事錢榖甲兵則既有人籌之矣講求法制則亦有人矣薦賢舉能則又有人矣特吳中風俗壞于浮圗氏之不肖者曽無以及之某敢請為閣下直陳之夫男女有别然後父子親父子親然後義生義生然後禮作禮作然後萬物安無别無義禽獸之道故禮謹大婚詩首關雎易著咸恆書載釐降聖人慮天下後丗深矣彼佛之為教雖有異同然以淫為戒亦甚至切但今之浮圗王石淆混所謂不肖者乃僧中之羅剎佛氏之罪人無别無義之禽獸也某處某等之徒未易枚舉姑以目前言之某以堂堂住持之稱摟墻而妻桑中之妾駢集方丈行窩旁觀因往往唾斥怒罵但未有言于官者耳同衣不敢之言之教門不敢言之鄊里不敢言之恐其怨詈也上司懸隔而不聞州縣置之而不問是以恣其荒淫了無忌憚逺近效尤淫風大行良家子女蘭鮑俱化甚可惜也愚惟狂直不忍喑默然某夲異鄉之人區區僣言殆猶西家之犬吠東鄰之盜使其主因吠而警且能使其家衆捕之亦庶乎救其所失不然則犬為徒吠且徒取憎于盜耳今閣下當路于吳非斯民之主乎有司非家衆乎治其人使返其尤物而風俗還淳非尚救其失乎以閣下之明必不使某為徒吠之犬而徒取盜者之憎也惟閣下察之或疑浮圗氏不肖者多莫能盡治是大不然君子之德風也小人之德草也風行草偃如響斯應有不待家至而户到也昔明道程先生言于朝曰治天下以正風俗為夲然則區區所陳不為細故惟閣下采擇賜之施行非言之幸斯世斯民之大幸也與劉旭齋書某三復志文皆逹生委命之意不雕不斫不支辭深用敬服謹依命微潤色之但遷葬二親不宜説以便省掃亦不宜泥風水之説也啓菆而遷庶合古制所渭以家學授受而姪子青領鄊薦乃家庭盛事宜特書之至如流寓崑山亦紀實也若孫某必書在某處不然則有其人而不知所在是闕文也以術𢾗二字易相者之言則虛中之説前後相應又見公精于虛中一家之言而免議者有多惑之誚所需挽詩未能措手題小像𢾗語方爾腹稿續當納上若夫戒酒一節未諭髙見古人居喪不得飲酒食肉然必曰五十以上血氣既衰須酒肉扶飬者則不必然是則酒肉乃老者之不可無也今年將八秩正宜以詩酒自娛盡其天年死無所憾戒而不飲非惑于罪福乎若以戒酒為盛德事勉而為之則古之聖賢皆欠此一德不然何老癡如是耶望不以人廢言亟請呼麴生以永朝夕重九日僕當折菊一枝携酒一壺併作活祭文詣前為公洗胸中凝滯也與孝章􅎋君書相去才一舍地不面動經半載可勝馳情比聞足下以名後而往如玉抵鵲深用慨嘆既而知有傭力者代之得不廢種學作文之業又深為之喜也某嘗謂士生斯世固樂于得時行道然有命焉非可力致當此之時苟能有一畝之宫可以栖息賣金買書教子共讀客至沽酒劇談古今真樂事也左近朋友唯足下洎子英袁君公振馬君鵬南執中二趙君有之幸足下勿以細故少沮而遽改其樂焉某于二十年前固嘗樂于此矣今兹窮途不復可得家纍百六十指借屋而居仲春以來頽椽敗壁􅊜薪破灶視纍輩若有不豫色者某賴有陶詩一卷可以自娛且時與樵歌漁謳更唱迭和乃釋然無􅊏芥之纍于胸中也諸友人會間煩以前所陳者告之使樂其樂旭齋劉先生無諸君之樂者則以漁樵唱和邀之亦必樂豫之樂矣僧廬十絶先乞示教上何太守書僕夲毗陵人也寄迹吳下于兹有年竊聞賢府侯以清靜治民亷明之聲洋溢千里凡民得以安集于二天之下者為幸多矣僕雖窮居一室從事筆耕然日與田夫野老為伍而知其休戚焉比者欽奉綸音大赦天下聖恩汪􅐮物無不沾而斯民之幸尤多詔曰罷敝之民何以紓之又曰民有不便有司舉之觀此足以見聖天子憂念斯民之心如此其切托付有司之意又如此其重也由是田野之民􅌚欣鼓舞意謂痛入骨髓今又增修水腳之患焉譬如久病之人舊疾未愈新病復增實何可當哉奈何里胥催徵急于星火飛芻挽粟夤夜不停搰搰無吐氣暇雖欲赴訴于甘棠之下不可得已况能訴諸輦轂之下乎如某者以筆代耕田無寸土于官賦輕重夲無干預然斯民疾苦之狀日慘于目嗟怨之聲日刺于耳誠有所不忍者况聞賢府侯吐握下士子愛斯民故輒敢以芻蕘之言上逹台聼是猶豐山之鐘霜降而自鳴野人之芹愛君而持獻也一誠如此餘無覬覦惟大人君子上以體聖天子矜恤之意下以察疲民疾苦之情鑒僕愚誠恕其僣越特蒙采擇賜之施行使困苦之民得以蘇息愁嘆之聲化為謳歌將見太史氏以循良之政登諸簡册而僕亦當作襦袴之歌謡與田夫野老歌詠于郊野間矣呈府侯書嘗聞國家更化務從寬大以安民州縣承行貴在申明而無弊事既有乖理宜陳説見奉詔書內一欵節該民間有不便事理該載不盡者有司白明申舉輕者中書省即與施行重者集議奏聞欽奉如此切見崑山州歲解秋糧八十餘萬石舊年夲州遵奉上司所行每糧一石起科水腳米一斗各保人戶赴京納糧其所用水腳俱係自行出偹當時有司失于申明上司優免開除兼之張氏以來比于前元多增糧額民以窮困輸官不敷今加水腳其𢾗愈厚不能辦致令催糧里長人等破家蕩産纍遭杖責監係囹圄受罪𢾗月逃亡縊死者不知其𢾗直至今年八月欽遇赦恩才方釋免切詳上司允行每糧一石科米一斗既是明白水腳蓋以人戶赴京送納逺涉江湖艱難重費以此糧米為稍水船腳之用其理顯然上年官司所收不見如何用度即係重徵于民未經定奪開除况今洪武元年見奉上司明文起科船料令佃户自辦人船送納官糧又每石收銅錢五十文及以官糧二百五十石起科水夫一名赴京畿漕運司應役上項元科水腳糧米有司一概征收使民不支官無用度非上司允行之意人民受害下情不能上逹良可哀憫若不建言尤慮今歲秋糧必到拖欠負纍官府人户逃亡不無荒廢田業關係非輕其他州縣事亦一體如蒙采覽偹申上司詳議為民除免甚副聖天子憂恤斯民之美意公道幸甚蒼生幸甚與孫彥民書伏覽題顧元公祠堂詩語皆事實且以辨斥淫祀表而出之非苟作也筆之懷古録中嘆賞未已忽州人抄示禮部符文行乎有司禁止淫祀令取勘忠臣烈士之屬載諸祀典皆奉制集議而行實為聖朝更化之盛舉忠如元公真宜廟食苐恐里社之人不知東家丘之可敬不為申報良可惜也望先生借重一言詢諸郡邑必合于祀典載之有司歲時之祭將自兹始庶不負朝家之美意又恐革命以來巫覡之流復以妖像混淆煽惑愚俗軍民樵採或不知禁更乞上陳督府旁及郡縣請給榜文嚴加禁約尤見先生之仗義也元公在天之靈蓋昭昭耳某夲合親奉周旋適病齒痛劇其頭涔涔然寒熱不可以風故弗能前然視舌尚在且有知已可與之言故不自忘僣越而覼縷也惟先生不辭緩頰之勞特賜發揚公道幸甚元公夲傳就用緘去拙詩奉懷别楮呈似一笑慰顧國衡喪父書莫春承令先君書首敘别懷次言羈况驚虞憂患靡不詳悉所喜舊疾新愈惟手顫不能作字又曰顫定更寫詩寄可也時豫以來人便回即口占一律用代答簡豈意五月六日遽聞捐館𥘉疑謬未以為信又細詢之果爾大故不覺老淚之􅊜衣𬒮也區區朋友猶此慘怛况為之子若孫其巨痛為何如哉然孝子之志宜以後事顯親務如刻銘紀德瘞骨山及以遺稿可傳丗者􅍢板而傳之如此則先君子之亡猶未亡也僕以衰老弗克蒲伏往弔竊見張司業以詩祭韓吏部勉效一篇以陳薄奠因敢僣越相告如前所云諸季洎令子諒惟孝心所同各兾節哀順變僇力遺事孝以盡孝思之情臨書凄楚至禱與陳彥直書古人有言曰瓜田不納履李下不整冠蓋嫌疑之地不可不慎衆口鑠金不可不畏今執事欲以臨濠倉屋就宅上為之意在招致同役鳩集梓工朝夕相與規措監督而成就之至如供給飲食收拾物料亦得以馳驅臧獲輿隸之人為之效力此固忠厚君子之用心視公家之事如家事也然以嫌疑論之則類乎整李下之冠納瓜田之履知幾君子可不避乎𢾗日以來事未作而行道之人已有萋斐之言况他日乎吾嘗詢諸執事之骨肉至親及宗族姻眷朋友相知者皆曰誠有可嫌疑者如前所云但恐拂執事之意不敢直言不敢強諌退而論之謂猶可更張造作之地如郊墟陳渡橋等處鄰鄊接境密邇同役執事領袖于彼使佐二者各任其責工匠者各展其力凡一切所用錢物公同出納明白簿書如此則不根之言無自而生矣或于公務之隙歸理家政亦何不可斯言也雖出自衆人之口實合乎老夫之心用是筆之簡牘以告執事蓋亦特乎平昔相愛相敬而以忠告朋友之義如此執事勿謂潔已奉公無可為其謗者昔周公聖人也而四國流言樂羊子賢士而盈篋謗書况今俗薄其嫉妬怨憎搖唇鼓舌者所在而成羣一旦妄生謗讟譁然蜂起執事將何術以止之耶苟無術以止之則其患有不可勝言者可不慮哉易曰君子作事謀始又曰君子見幾而作不俟終日始而不謀見幾而不作後雖噬臍恐無及矣區區僣言切希恕察與許君善書春𥘉承諸名勝惠詩蓋以社櫟無用之材或能致夀而忘其蒲栁之秋也知感知感自是音問曠絶不審動作何似可勝懷仰區區徙居橫山日與野翁溪友班荆坐談或泥飲擊缶更相唱和以為娛樂餘無可言者𢾗日前久雨而晴出門野望欣然見百榖稔熟遙想吳淞江西溪沃壤秋風䆉稏黃雲滿目真可為先生賀吾兒森得舅氏新田四五畝耕以藝秫度其所收亦可釀臘酒作粔敉以充其親之老叨若先生之家豈不十倍于此倍十之喜亦可知矣千墩諸故人煩問訊併致豐年之賀臨書馳系與袁子英書比者周履常來承手誨具審起居安吉諸公多星散所喜孝伯教諭逺歸及有提舉俞先生寓同里閈相與講明古道或唱或和時以為樂而某違距三百里恨無縮地術以同其樂也如景仰何如景仰何曩聞欲著書以究理學之藴其他述作必更有之示教一二可乎吾儕道同志合雖各處一方苟能于文字間以古道朂率交相責善視連屋不相往來與夫往來而蔑可語者逺勝之矣俞先生未嘗參拜莫敢以此情告公及秦陸盧􅎋熊諸契家念僕舊交勿棄老謬幸賜警䇿則區區未死以前皆可以與聞古道之日也某目雖昏尚可強觀大字書耳雖聾亦可以聼人髙聲語但健忘絶不能記或欲作一書閲𢾗日而不能成既成而援筆欲寫又為茫然嗜學之意實未厭也惟諸公念之春晚寒暖不常切兾為斯文慎重與京口俞伯鎮書比小兒去丹陽倉卒附舟不及書問及歸乃言嘗至甕城以塵容俗狀羞去謁見即日仲春計惟天相斯文動止迪吉朝夕從逰或山歌野唱以適其適餘無可與故人道者西望長江馳慕而已公居泮宫必多著述不鄙老謬尚希有以見教近聞丹徒令君死葬魚腹蔚有政教聲區區恨不得其姓氏事實之詳筆之野史敢煩髙弟録示可乎本官遺文暨諸大手筆之所記載尤望示警吁喧啾百鳥中忽見孤鳳鳴識與不識者皆樂為之一聞耳末由會晤更兾珍重答熊元修書頃辱賜詩及書其詩所以開釋老懷者多矣書辭詳悉如聆靣言然皆屬追理情事非世俗寒暄之問而已蒙所跋雷震事言簡理明殊有警䇿辨惑編未到書府不知陸沉何地矣今再用一册與鷗盟文送上此文命題蓋子虛烏有類也繆悠之談苟合雅意老夫亦得挂名鷗社中不亦可乎愚見以間叟易野叟之號名實相稱且人皆得以稱道耳比聞寓舍有鬱攸兩番之厄而郎囝且為萬里之行懷抱欠佳然君子處困而亨乃為曠逹况有小令郎幹父之蠱朝夕侍側足以為娛此意此言惟先生然之如某者自去秋為凶人排陷嘗繼以重疾人皆危之賴天之靈復延殘喘由夏而秋村居放適𢾗日患痢自謂必死僥幸又不藥而愈亟命兒輩執筆口授答諸公春首之詩及盡償隔年詩債先生聞之必為我一大噱也與侄僧德藏主書汝七八歲時父母鍾愛因汝父好佛欲令汝為僧身雖在家巳僧其首教汝讀論孟即兼佛書垂及成童遽命從釋汝母泣而從之時優曇師為汝祝髮授以五戒汝侍靈隱竹泉師法席果茗之費罄汝衣鉢汝父且竭力繼之蓋望汝為釋門偉器至如成佛作祖説法度人皆汝父所望也不幸汝母先即丗父亦客死于兵不能見汝特逹可不念哉可不念哉今汝汩沒固時之使然兵途𢾗年竟不復檢點其身奮勵其志貿貿焉甘于茸闒豈絶然不記汝父之言耶近聞去金陵謁西域髙年之僧受戒而回吾謂此行在庸人則以為可喜在汝則以為可笑蓋庸人昧理有不知姦盜淫妄之非或酗于酒一旦受此五戒遵而行之變惡為善是可嘉也汝自幼為兩名師弟子豈不曽授汝之戒乎抑西來之僧不以瞿曇為宗而别有所戒乎不然則往年之戒即今日之戒受而不持徒尓僕僕是可笑也吾嘗見佛書説父母劬勞四恩之一也凡學佛者在所當報不知胡老僧曾語及否吾聞汝于二親嘗及俗禮掃墓等事皆不為之其心必曰古禪老有言一子出家九族升天是為大孝惟恐不能盡出家之道度九族之人負乃劬勞為人訕笑以為豺狼之不如子心安乎余近者一病幾死日來稍愈恐旦夕溘先朝露則斯言無復有人告汝故扶􅉵援筆布露肝膽慎勿諱疾而忌醫蹈前覆轍父母所生二子汝兄早殁惟汝獨存春秋祭祀奚忍從汝而絶耶似續之計老不可為若釋門祀奉之禮汝亦可為可否則春秋祭掃隨俗禮以終其身亦庶不忘罔極之報云爾若夫修行之道非吾所知想亦當先務檢點其身奮厲其志持守戒律由粗入精水到渠成何所不至誠能如是乃不負汝父平昔之願也汝其勉之至豫生平業儒故不事佛使其為僧則衣佛之衣學佛之學凡與汝所言者自當力行幸勿謂言耄而忽之與蘇性可書中秋前一日霪雨喜晴晨起坐甕牖下焚香瓦鼎三復魏公百韻詩追念令先君面諭之言雖隔一宇宙猶昨日也感慨之餘書𢾗語卷末謹用納上以今觀之前輩如瞻翁先生得正大之學不為異端紊惑者蓋鮮矣幸而象賢有子又篤生磊落振拔之孫及有姻眷如伯逺兄者相與矗立交相勉勵視百家妖妄邪誕之説如鵂鶅夜鳴唾罵斥逐不一動其心此僕所以愛之敬之與三俊為忘年交也𢾗日來抱疾待斃百無挂牽但恐兒輩于失怙之後為鄉俗所移或違治命吾死之日三君子有能為中流砥柱者乎伯逺洎令嗣偉正同此致意頽􅉵不克親書必蒙照察與蘇吳趙二心友書今春曹德升去嘗致書二妙隨得報章知中行辟地海濵蓋亦離羣而索居也時老夫多憂患中聞之為之悵然荷執中垂念不逺三百里欲賜見訪此情豈泛愛者可同語哉某二三年來父子邅迍有不忍與故舊言者前年秋木為縣學訓導冒嫉以擅自離役訟之受笞五十斥為乎伯逺洎令嗣偉正同此致意頽􅉵不克親書必蒙照察與蘇吳趙二心友書今春曹德升去嘗致書二妙隨得報章知中行辟地海濵蓋亦離羣而索居也時老夫多憂患中聞之為之悵然荷執中垂念不逺三百里欲賜見訪此情豈泛愛者可同語哉某二三年來父子邅迍有不忍與故舊言者前年秋木為縣學訓導冒嫉以擅自離役訟之受笞五十斥為編氓去年暮冬忽分憲于案牘下求庇府司官曺俱𬒳罪責而木復加五十五杖發鳳陽屯種時某以卧病不能為之聲訴痛苦而巳抑鬱而已某從弟送行至正月中旬負疾而歸醫救月餘屢瀕于危老夫平生惡况未有如斯時者既而病者弗藥老懷稍紓方擬抱牒赴臺閣之下以鳴其不平承郡守以毗陵志書付託辭不獲命自春徂夏黽勉校正疲􅉵之軀如墮膠􅃮每一思之涕淚交㵼如此又兩月之餘夏𥘉志書甫完乃盲左目雖可見天日如隔煙霧由是杜門藥餌又復經月慮恐雙目俱瞽則此志不伸此子不復能救矣于是奮不顧死力疾詣憲府陳詞仍以惡詩傾寫舐犢之情賴臺官上下如秦鏡並照灼見肝膽特賜哀憐信宿之間上徹天聼欽蒙玉音放木歸飬半年陷阱一旦得脫于七月𥘉三日到家老夫先歸兼旬其抑鬱痛苦積于懷抱者方若氷釋矣然非上天有以相之不能也非祖宗之遺澤未泯亦不能也顧區區力援其子以盡為父之道實斯文啓迪之力為多二公吾斯文骨肉視木如弟侄者其受禍必為之憂苦其蒙恩亦必為喜懌故厯敘顛末用徹清聼不自覺其覼縷也拙詩就呈事亦概見凡知已如玄修子英公振鈞善諸先生就煩舉似或者有以見教則老夫得歌詠為樂其幸多矣蓋平昔樂于讀書今以目疾而廢但每日飽飯熟睡無有猷亦無可為樂者惟樂此一事以待斃耳未會間惟二妙德業進修幽貞飬福下情不勝至禱不宣答許鈞善書中秋後一日翰墨到手甚慰馳思且知三書渺茫垂念愈切蒙薦館地且玉其成鮑叔之知何以過此但某年既耄矣某子如死而復生有菽水之飬矣苟不知止貽笑老𣆀亦違我聖人貪得之戒矣佩服重言敢聞命方竹杖甚嘉受惠感激承問吾兒其事見于送趙書中皆抄去先生視之必重為之戚而喜也答管伯齡書一别十年相去幾二百里非惟會面之難而書尺亦不能寄清風明月未嘗不思玄度也美上人自錦里來歸得手札併佳章情誼藹然文藻燦爛足見德業與年齒俱髙欣羡欣羡婁江之東詞林獨步又安得尊細論如曩年終日竟夕之娛乎然昔人有言心親則千里晤對矍鑠二老扁舟往來不消十𢾗日程相與訪諸故人于三江五湖之上以適其適真吾輩餘生之樂事也歲晚有興當踐斯言奉和來詩聊抒情愫鄙陋之辭發一笑耳令嗣過庭煩道前悃金陵往還過敝寓白鶴溪上可乎兒輩曰木曰森皆為農橫山之陽廢學可恥蒙郡守過愛舉充江隂縣學職固辭不獲去有日矣其如居者壁立何故人垂念故及之餘不盡言臨書馳系與盧公武書前歲􅎋文學再赴咸陽持至佳作且極談幽貞之吉甚慰馳想今年春得袁子英先生書乃知公車入鳳閣而演綸之筆巳在手矣可喜可賀即日諒惟德日益修道日益隆而文譽日益以著可勝企仰從子森到京問起居併以拙詩一小編呈似蓋有學子王尚絅者將欲刻畫無鹽出醜鄊里于豫舊稿中摘出一二類而編之敢望痛加刪削賜之序引則庶或不為醬蒙矣往者懷古録辱有紀載今亡之原稿若存乞更抄示區區棊花手巾并囤碑一本送上希領意歲晏更兾為斯文慎重以迓春禧與陶孝思書比月旦鄊飲而别滿望執事與郡庠諸友同過鄒墓以陪賢太守及官僚之屬同為祭掃不審胡為不來也夫鄒忠公為道學君子天下共賢之在昔學有祠墓有亭郡守教官歲有祀事二三百年之間遺文尚存非謬傳也然豈特鄉郡如此哉凡其平昔過化之地莫不尸而祝之惟近歲以來郡中之祠亭俱毁奉嘗之禮寢為廢缺今府公舉兹墜典斯文有光較諸弔萇弘祭樂毅屈平田橫諸先民者豈不偉歟是行也雖道路之人猶為興感矧學士大夫好古而尊賢者乎某于五月七月間有拙詩二首兹用録似蓋以執事相知而下哂也其迂相契而不責其僣必能倡率鼓舞賜之述作若郡博士先生及周儲二妙見之亦必翕然揄揚以崇先哲縣學諸名勝聞之又安得不從而作興耶展墓之行想能有日而某又當持一杯以陪沃酬區區別有僣言庶得靣盡矣不宣上武進縣樊大尹請置先賢祠書某嘗聞古者祭鄊先生于社蓋祭社以功而鄊先生以德而預享焉崇德報功其義一也近世祠鄊賢于學宫是亦附祭于社之遺意其禮可不重歟姑以武進言之若我胡文恭公張文清公鄒忠公霍狀元乃所謂鄊先生之表表者前知縣江右董公繕修黌舍嘗置祠文廟儀門之左欲于此祠而奉祀之以秩滿而去遂成曠典今明府視政以來閣邑之事大小畢舉特此未之及然而事雖微實係風化如蒙即此祠宇修設供具崇奉先哲尸而祝之使邑人知所向慕必有過祠下而嘉嘆之者曰今之山川猶古山川也今之學校亦古學校也士生斯邑苟能如前人之賢為丗師表亦得享無窮之祀矣由是而感發興起奮勵激昂風聲氣習渾然俱化又安知不有胡張鄒霍之賢相繼而出耶愚所謂事雖至微而係于風化者此也惟明府不以老生之言為迂而以國家之風化為重舉此盛事以勵風俗斯文幸甚鄊邑幸甚答崑山袁子英書七月望正鬱乎苦熱忽承六月草四日書及聫篇述作逐一披玩快然如清風入懷加以金井水洗面醴泉甘露之沃煙火肺腸也繼即付小兒林逹張溝南近林自郡庠來歸云學中諸士友同觀蚶杯之詩不勝稱羡想希尹得之玩味賞識其快意無異于老夫也某白首歸里故舊淪沒惟希尹相知為深若思賢録一見即欣然助楮板百片且將率好事者刻之想執事聞之亦以為喜故用語及區區又有一事不避􅏺笑專此干托學子王著欲以龜巢藁鋟梓因摘𢾗十篇與之名曰摘藁愚意亂道雖多不能盡出醜耳然必大手筆如提舉平齋余先生者略為序引若右軍為蕺山老嫗書扇則非唯價重當時而名亦為之不泯惟執事王成之某于此先生固未嘗有半靣之雅去年冬嘗蒙惠書以光衰朽乃執事過愛其亦從而愛之今之求文諒執事一語之賜必可得矣他日當專持瓣香因徐見孟以鳴謝悃餘有干瀆别楮具陳鈞乞留意朝暮間拱候報音辰下雨涼伏惟講貫之暇多有著述示教二三尤妙東望玉峯無任馳想與賈教授書昔郡庠祠道鄊鄒先生祀享而學官復有墓祭由宋而元未嘗廢弛今我郡博士未蒙舉行蓋兵革之後學校方興前此或未之聞也區區老生用敢饒舌勿以人廢言與周儲兩助教議之特賜修舉則某亦當采薇橫山挹泉龍井扶􅉵駿奔以從諸公之後矣兹有口占併以思賢録送上惟講貫之暇電目一覽必有隹作如前輩發先哲之餘光也詹奉在邇書不盡言臨楮馳系不宣與鄊友鄒鈞顯論合祀忠公書嘗聞盱江李太伯之殁家無子孫其鄊邑學校葬而祀之祭掃不缺也栁耆卿客死襄陽羣妓金合而葬每春上塜謂弔栁七至今而為美談吁以太伯視吾鄊先生鄒忠公之賢有間矣况栁卿乎夫鄒公程門傳道為一代名臣且嘗以羲文周孔之易論孟之書發明妙理垂教百丗郡有祠墓幾三百年不幸因元祐以來有非其種而為似續佳城毁滅殆盡幾以陵谷變遷蕩然無遺去年冬賴有賢太守率僚屬墓祭碑之仆者植之樵而牧者禁之庶亦無愧太伯之郡邑矣苐吾黨服儒衣冠未嘗持一觴以澆墳上之土視襄之舞裙歌扇者反不及之區區老生感今懷古可不告諸文獻故家乎惟執事乃故家之傑出者也顧某嘗以忠公之盛德大業洎諸賢士大夫紀述之辭録為一帙名思賢苟能板刻而傳使觀者知忠公之賢如此則其髙山景行之思駿奔籩豆之敬自有不能巳者景鄒有亭顯忠有菴皆無異于古人夫如是則斯文之光鄊土之榮風俗之厚且美為何如哉昔人有言曰存則人亡則書蓋書存則其人之亡猶不亡也與詹伯逺書前兩年宜興主簿許六月送炭蓋其知范叔之寒豫為之計今足下于此月惠布蓋與許公之心同于一誠也老夫雖嘗以小詩謝之今衰懶不能措一詞然此心感荷實不能忘知己者必以情恕非簡慢也近得江隂張希尹都事蘆屋篇謹用緘去此老語不過諛而意有抑揚足下宜靣識之餘人所作尚未到手性可賢父子佳章母吝見示老夫自月旦到陳館代子訓蒙稍暇則以古今名人之詩長歌短詠自以為樂殆猶曾晳之嗜羊棗也可笑可笑辰下暑而涼惟樂歲優遊安享清福為慰與李石泉詩某寓此寂寞濵日以吟嘯自娛過客多望望而去有如一泉近仁至則間坐片時語及吟事者蓋絶無而僅有也所需拙作令學子録去諸人視之必有笑吾輩所好如柳下之煆何足樂哉然自得之樂難以語人亦不強與之語也秋涼過此必留一宿然庶得清風明月之夜傾倒所懷耳聞以一泉為字久矣近獲晤語言乃改為石泉又欲以固夲為字石泉則為道號矣某因足下去速不細論想所以欲改者必有人謂一泉二字竒崛且無出處是大不然夫一泉者謂一脈之泉自源而出非溢美之詞也若僣效古人之九淵及世俗所矜玉泉之類却當改之况道號宜在晚年隨所寓而稱之不必拘拘于名字之義回示雅意當為作字説去矣餘文縷述不宣答袁子英書秋間領教帖及發至余先生文敘此蓋以執事過情之譽致蒙褒拂如此兒輩得之即鋟諸梓老夫感銘于心豈忘所自哉今拙詩二首其一寫懷仰之情一以謝余提舉并寄陽羡茶一褁惠山泉兩􅎆區區微忱煩為轉逹所諭毁范蠡祠不審果否抄示之文又不知前輩遺藁耶今人所著耶祠毁于某年月某人言之某人行之耶欲得其詳傳之郡邑使在位君子有倣效者亦遵令典正風俗之一端也某因兒子木入杭代渠訓蒙陳氏閲三四月漁樵唱和無足舉似近作辨訛𢾗十語將與館人行之録去求教某詞冗長以其欲揭之菆祠諭彼愚俗不得不然所愧不能言簡意明如古作者欲再得木居士等一二事引用其間惟執事多識前言敢求批示某以兩目昏盲不克詣足下座下細論徒增馳慕而已余先生洎諸名勝同此請益即日祈寒切兾安居飬泰以壽斯文答惠子及送泉書一别兩年將渭假館華莊優遊蔗境未聞移席縣庠也故昨日于學齋書中有失問訊兹承賜詩與惠泉偕至不勝感激遂即刻奉和以抒謝忱曰龍山只在片雲間不到山中四十年多謝故人知渴想瓦瓶封寄煮茶泉一笑一笑學齋回更煩尋水符之盟毋使山靈笑人寂寂也竹山詞久為烏有弗克奉命歲晏未由晤言惟善保為斯文夀與曹師禹書昨詣魁孰值入郡未回絳帳之下襟偑仍集賢主翁代嗚教鐸清風穆如歆羡而退老夫藏六如龜亦有時蹣􅘐于西枝之西東洲之東如曵尾泥塗者近聞里中有孝感事心甚喜之作小傳為記其實片楮録上敢望與實翁德和諸名勝交相潤飾賜之咏歌庶幾觀民風者採托亦可為聲教之助云爾與永慶雪心長老書比承裹茗過寂寞濵誾誾話言殊可人意且蒙以清節處士徵豫文義不容辭然别後思之似難以畫竹之美遽用為號嘗觀古之人以號著稱者多矣姑舉其一二言之若晉之陶淵明門栽五栁因自謂五栁先生世以不事二君乃以靖節處士稱之非自號也陶弘景挂冠神武門歸隱華陽洞人稱華陽隱君後賜號華陽真逸唐之張志和待詔翰林以母殁不仕居江湖間稱煙波釣徒後賜號曰玄真子亦非自美也白樂天平生顯官晚年放意詩酒自稱醉吟先生及與香山僧滿等結社稱香山居士而巳宋徽宗以徐仲車不仕為孝民栽木連理甘露屢降諡節孝處士歐陽公以劉凝之棄官歸匡廬作詩贈之有曰丈夫壯莭似君少其後朱晦菴為作祠亭扁曰壯節皆非架空立説也由是觀之曰清曰節詎宜自稱在他人亦不宜過情而譽之今王處士之家或有清節可愛之竹以寓名稱或與丹丘羽士為方外逰即以此意淡然為號豈不韙歟今畫者鞠躬問道于師之像置諸卷首亦人所未曉也是皆待公與之論定批示詳悉方可措手拙直之言必蒙領略秋暑尚熾惟安飬為宗門自重稍涼造見以謝先施并盡所懷臨書不勝馳系答集講主書八月𥘉承書及詩乃知仁祥二長者一在九京一居濠上前聞陶生之言皆謬也誦詩驚怛而嗟嘆之逮今未巳惟髙隱清修得大自在且與諸親友及密邇者逰從如昨可敬可羡所諭聼雨篷海萍等作丁寧再四義不容辭但昏耄無可人語兹用稿呈煩為潤色庶不為二公之醬蒙耳兒子林去冬臘月赴新鄭縣不得奉命若海萍之詩必得釋門善知識以上乘宗旨發揚方盡其妙非兒輩章句詞儒之所能也如老夫者亦臆度想像而巳淞南小隱却易可作亦煩先得其詳方可著筆區區管見改日細論有恆振諸吟伯求賦錢孝女詩煩介意取寄吕克宅專望專望更兾宗門自重不宣與林掌教諭請建先賢祠書夫學校以明倫為夲育才為風化之所由出也如追慕前賢褒嘉忠孝節義等事樹之風聲使化行俗美則于學校之教豈小輔哉汝令所職不可不知此先務也吾聞新鄭為古名邑邑有東里子産故鄉宋歐陽文忠公之墓在焉此二賢者一為鄭之賢大夫事見春秋傳等書不毁鄊校巳大有功于世教况其有君子之道乎其一以道德文章為世師表力排異端羽翼名教配諸孟韓功亦𢡟矣凡過而知者當為起敬邑之人可無桐鄊之愛乎汝今多幸奉天子之命領教兹邑訪求古迹知有二賢理宜考之簡册參之禮經告于當道請置祠學宫是亦古者祀鄊先生于社之遺意也釋菜之禮以誠以敬母事繁文尤不宜用丗俗楮鏹如賄賂然其祠堂供具亦從簡古毋事華飾所費之資當割俸與諸生及賢士大夫協力為之慎勿為邑氓之撓愚見如此未審諸名公以為何如與熊元修書昨者不以衰朽自棄往訪故人滿擬細講道誼傾寫素懷奈何以目青加以暴疾不如所願臨行辱厚餽不能謝別蒙諭淫祀雖以懷古録薦呈亦不能面議攘斥之意悵然而歸連𢾗日所患不痊時室坐卧因思洪武𥘉親覩詔條斷除塑像今彼無知民不以顧元公忠藎為忠而以俗稱金家神之類羣然土偶玉石混淆非惟循蹈前覆轍有負前人且違今代維新之命宜于里中及守祠者示以禮法悉以屏除設木主題曰晉散騎常侍顧元公之神庶得上遵國典下息邪説豈不韙歟想先生以足疾所沮忿然于懷莫若告諸鱸鄉隱者等一鼓作氣仗大義而為之不啻如摧枯拉朽耳某實以衰病不前此舌尚存豈容默默先生與諸公必能矜察非徒為是嘐嘐然也乃事顛末具載周左丞記中請稽考事實合宜而行慎勿為狺狺吠雪者弛焉雲山相望顒俟報音夜來兒輩誦佳作于孝友之事議論抑揚詞意古淡非泛泛者可比小兒求引年詩尚希賜教鱸鄉諸吟友二詩兼得尤佳瑣碎不及各書煩為引忱臨楮馳系不宣與吳中衡書别後第三日小兒以舟自無錫問津到令親蔣宅滿擬請閫孺人與老妻兒婦輩少聚奈何如燕鴻相避悵然而歸然令嶽母老安人在彼養痾賢夫婦必有候問之日望乘便過寂寥濵茶話以償所願鷗社翁所言淫祀愚意以執事寓居長洲難與里中等語鷗社軟腳疾雖厄健步或可以古今理法告諸鱸鄊隱者從容而為之則無以異乎老夫奔走先後也尊翁挽詞併舊文録上所領厚惠舉室知感同此申謝到千墩王有恆處更煩索引年集求諸公詩賤纍老妻而下兒輩等皆囑筆問貴眷起居併奉相過之約區區懇禱不宣與馬公振諸故人書比到千墩蒙祶𫀆戀戀日與周旋弔死問生悉如所願又獲贊成思賢録事欣幸佩德沒齒不忘但不得一登草堂連床夜話荷執事以目疾見憐弗責爾如仲昭甫孝義恭謹襟度恢弘雪篷叟敬老愛客挺拔出羣其禮意皆溢乎欵接餽贈之外有可思而不可忘也南澗海萍二法師忘形而知心有恆濟民二契家愛敬而盡禮明善則篤親戚重師友才識兼進尤為可喜相見煩一一道謝别後到陳溪信宿逢人説項無不欣羡思賢録命刋書者為之為無梨板未得速成想中秋前王猷訪戴之日書成則偕往晤言特未知病眼為何如耳執事詩已編録孝女詩于吳彥德處取至但欠伯齡先生等作尚有望焉諸公賜引年詩多多益善更煩發去中行兄處蓋熊毛諸吟友欲作故也老夫重改去慈竹軒詩尚兾羣彥以郢斤交斫付明善入卷無致為大方笑仲安賢良彥清昆季同此致意不及另書草草答謝袁子英先生書性中上人來承問吾子早世以詞哀之以雞酒祭之存殁知感即日莫春伏惟師弟風雩詠歸追蹤古人賸有樂地老夫可仰而不可即也自去夏以來目昏則見人不能識認耳聾則低聲語言不聞齒髮皆脫落幾盡日食麋粥殘喘僅存然此心好古嗜學不減疇昔時令小孫輩近立侍傍髙誦原道西銘太極圗説等篇不忘素志奈有時以目前平地風波為之驚憂恨不得與亡妻相從九原之為愈也謹此奉謝併述潦倒之狀如前所云晤言無期切兾善保以享清福不宣與薑天定書前者得挽詩二首吾子冥冥之中必知感髙義老夫亦知所學非舊阿蒙但不克一相見與細論不識近日為醫為儒專于何業少暇可過潞城與小孫同到橫山啜清茶説淡話就煩刪擇舊稿類抄别帙蓋年來兩目昏盲謄録者字多差誤得正是之庶免後人之笑耳有一館地就議可否寒家雖遭兩喪皆不用世俗所尚之禮足下之來無勞虛費夫貧者不以貨財為禮老者不以筋力為禮此古之通義也但近年朋友道喪不可不講風俗甚薄宜敦勸之若吾友吳啓之父子王季髙叔侄令弟周輔等皆平昔有見識者有議論者聞吾輩講今古必能輔相激勸以篤人倫以厚風俗曽子曰人之將死其言也善請誦此以速其行老夫衰頽不久于丗遲則不復論此古道矣良可惜也偶有謝新鄭張宰一詩録去過目觀其仗義如此薄俗之敦亦庶幾焉與袁耕學書比在崑山四十日凡新知舊交青目顧盻赤心解紛指迷途挽頽波者皆知所自也况飲食交載禮意俱隆老夫與子孫輩感銘心骨有難以筆舌盡者會間煩一一代謝六月朔到家布帆無恙但病目赤爛兩耳益聾殊覺厭丗若友文齋扁煩先生為之孝女事政宜上旌善亭表著以遵令典以厚風俗其移文立傳事合詳明宜大手筆為之吾輩當從而贊美可也姓名年紀歲月日時得批示一知尤妙即日暑雨希倍加珍攝為斯文夀與俞彥智書昨到崑山故舊中如耕學先生靈光巋然新相者知皆可人意惟執事削去邉幅能仗大義能勤小物能刻畫無鹽以衒其美老懷感銘之死奚忘兒子及孫感亦如之兩文皆納上幸恕稽遲即日秋暑諒惟起居安適酒邊清興必多然狂客之號但當風流如賀季真以稱其名至若滑稽太過或笑中有刀以貽後患詩曰善戲謔兮不為虐兮聖人于三百篇中垂戒如此宜保察之老夫托厚愛饒舌再四蓋區區如愛美玉恐汚于蠅聲發于心不忍緘默幸毋責焉坡翁詩案曽蒙許借望付至小孫輩一覽秋冬即當奉納臨書懇禱與海萍講主書崑山延福僧舍中面獲晤語知平地風波所在有之逹人大觀必不芥蒂于靈臺也會後抵家不及言别想已還湓溪安穩清適老夫以思賢録刻完追感王仲昭處士獨成其美義不敢忘今以此書一部送置靈几吾友出于宅務之餘不時誦讀以忠義視為規式黽勉以循蹈之則先尊深為衆賢之喜也揚子曰希顔之人亦顔之徒惟誘掖奬勸以玉成之醉琴賢賔主續當印去懷哉昭甫無任悵惜與余茂夲通政書昨到崑山得傾蓋如故者𢾗人而執事開誠心論古道片言隻字商略可否其謙益有過人者逺大之器豈易量哉况飲食餽遺禮意兼盡使老夫及兒輩感佩而歸未知所報嘗凂作亡子挽詩必蒙留意望付至以光泉壤區區贈無逸一詩煩為轉逹令親雪篷髙鄰仲各會間呼賤名致謝即日秋暑更兾節哀慎重以終禮制臨書馳系與張子才書曩歲承􅋈舟東郭知老夫坐分鷗沙賜以專席奈交臂而失候歸帆者兩三月而後巳去年秋亡子辱諸君哀挽之詞小孫裒為一編名幽光録今年重九為豫泣而誦之且曰公有一詩别𥿄見寄乃令再四髙誦使豫泚顙􅉭背想小兒九原感作亦如是耳緣來詩𥘉到之日病目昏盲致使明珠暗投不曾答片言以鳴謝臆殆若忘故人綈𫀆之高誼其過奚文其過奚文自春以來衰耄益加公聞之必哀矜而弗責也次韻一詩聊抒情愫併想像肥遁之樂而嘉之餘詩用以見老况如此之惡薄俗如此之甚請與野居先生過目同發浩嘆晤語無期東望不勝馳仰惟髙隱自重不宣與陳彥直書去冬見安道蒙玉成思賢録書板常恐如畚土為山功虧一簣死不瞑目今完矣印去一部以踐吾言候有暇日岩電一過則先賢忠孝之道足以私淑授兩令子亦可為進修之助焉聞尚絅諸友自有樂事不發去為醬瓿蒙也俟相見當盡所懷兹不一一與王季髙書昔者蒙先尊延置西熟二十餘年敬為賔師愛同骨肉想足下能念其親必不忘其親之所敬愛者老夫之心實亦未嘗忘也聞令嗣聰明可教摘藁一夲送去與之又一夲送令侄孟凱之子此生從逰姿質亦甚可喜區區拙作譬若滄浪孺子之歌善聼者當自有所得亦庶乎進學之一助言耄而繁尚希采擇與曺德聲書歸耕之文承命再四不容以言耄辭今腹藁𥘉成令小孫録去若文意有疑處脫略未愜雅意處無吝批示當臾思之辭雖不工皆親家所吐之真情所處之實事無虛褒妄貶以纍懿德吁歸耕如此植業如此二親之樂又如此風教氣習里俗可敦草茅之言庶亦無愧區區恃肝膽相照布此真情非足恭也又昨承手教并惠佳布足見崇重斯文之意夲合拜嘉但參在瓜葛居常多蒙眷愛雖辭之感激拜嘉但忝在瓜葛居常多如受之也改去拙作頗盡老懷尚恐有説未到處無吝喻及吾孫或有所見亦可説來老夫平昔不諱疾忌醫凡于朋友中商略文字亦必忠告未嘗靣是而心非也早晚相見當盡所懷即日寒暖不常切希順時遵飬以迓春禧與袁耕學書去年夏五客崑山以詩言懷辱先生于詞林八俊釋門二老玄都一髙士從而和之聫珠合璧皆歸錦囊且欣然欲賜序文裒為一卷以飾衰朽自秋徂冬懸懸在望新春得辛老書聞别有髙興此詩卷豈置諸度外耶或有人作殷洪喬耶區老癡望猶未巳敢請滿其所望焉與髙彥述書往來之禮尚矣然事有不及又當以情恕之不拘拘繁文末節而求偹焉所以為君子之交也且如昨者家下小孫歸妻相邀茶話值足下以令嗣婟期之迫不暇過訪若此真情吾何訝焉今老夫夲天地一無用人了無羈絆深欲去賀足下醮子奈手足俱瘡膝灣尤甚攣拳痛楚不能屈伸及臂無完膚行坐皆不可得而難往矣足下亦必以真情恕之况小兒有出不克代行千萬莫遣人相招徒勞往返亦不勞饋餉如舍下以區區羹胾送人皆成臭腐空為文具耳老夫待瘡疾既愈必到宅住三兩日晝則同嬉市㕓夜則連床清話飲之食之無所不可吾知宅上乏僕無異寒家天道暄暖甚于前日幸勿勞心役人蹈吾覆轍也吾兒森揆時度物同吐肝膽如此唯足下聼之信之而為知心之親戚矣與辛彬甫書日者令似歸曽致書問并凂求諸公賦節婦詩想留意朝暮專望寄示令似有老夫適永懷寺詩稿就煩抄至今緘去邵濟民瓜隱詩此公為貴縣官醫必有行館敢勞一寄幸勿浮沉耕學先生暨陳朱尹吕諸賢諒惟起居皆安文譽益振所求珠玉早賜壓卷區區嗜詩如嗜飲食幸毋哂焉臨書懇禱不宣與任義甫書人之所貴乎有子者生而事之死而葬之祭之先王制禮用是以長其恩愛其來尚矣但近代禮廢俗尚浮屠難于改易比聞主壻之喪始欲茶毗此則釋氏之教也衆以為戾法而尼之其餘佛事𥘉不相沮子乃屬纊未定而榼棺赴音裁行而發靷銘旌不立三虞不祭一切喪具皆謂無用是不略遵古喪禮也然大小事佛亦皆不作使其子將何以表孝思之情耶若夫靈帷題神主不稱厥考又何以致其子如在之誠也耶死而有知不能無憾先王之禮未見其然釋氏之教恐亦不如是之謬也以禮論之莫若令外甥改題神主曰顯考某官之靈旁書孝子某奉祀如此則名正言順存沒皆安無餘憾焉且如虞祭不設以所用之資作為佛事內以塞一家之責外以解衆口之嘲抑亦可以敦孝順厚風俗也老夫忝在瓜葛愛如弟兄不避譴訶故用忠告惟伯大叔立諸親從長從心勇而為之與孫彥銘書臘月既望兒輩在周石泉處持所贈節婦詩歸詩序中過辱愛敬謙卑之光與文熖俱髙不啻得􅌐龍之珠連城之璧也蒙索辨惑編併拙稿兹用納上譬若人有痼疾揭之大途尚希遇倉扁而為之藥石耳應芳就稟犬馬之年今九十有一矣去冬𥘉度荷鄊中諸朋友贈言成軸如蒙大手筆刻畫無鹽粉飾衰朽得不以為蒿里之歌乎即日新春伏兾以道自娛為斯文夀不宣回黔陽簿長孫書别去將半年家中老幼皆安舊冬橘客傳菜石信知布帆無恙為喜今皂隸二人至知汝到京來書取夏衣書册等物一一付去汝途中作詩固好但到任之後當以佐令丞治政為重以稱厥職有暇則細玩律令參考經訓日夜究心決不可作詩作文有妨公務最要緊者正己以待吏毋致欺罔循禮以待同僚毋黨毋偏諸事勤謹庶不負朝廷付托之意平昔家訓更不縷述惟吾孫念之曽有二詩正月半寄新河周亢吉子去恐未到與陳德廣書某早歲失怙縗絰中蒙豸官品題光生腐草俯焉就學覬有少進奈駑鈍卒無所成無輔于丗于是掇拾古聖賢遺訓綴辨惑一編曩幸公為邑丞孱工刻板今增前賢趙學士昞所著葬圗其説夲乎周官義理昭著良為可法但欠知夲官封諡乃有缺文欲得元史考究三四年來嘗于江隂無錫丹陽三縣學干借俱云無之干諸士大夫相識者亦然愚恐溘先朝露貽笑後人用敢再瀆望于宜興縣藏書之家特為轉借趙公夲傳一夲明説老夫好古之癡如嗜吐炭人所不堪自以為樂有能使之厭飫其為欣幸死而不忘即日雨涼惟琴書自娛坐享清福臨書馳系不宣答吕克明求序文書某奉白昔者左太沖賦三都玄晏先生序之張茂先見而美之然後傳寫者衆而𥿄價為之益髙至如陳師錫序歐史半山老人乃有糞穢佛首之􅏺吁序文之作可有可無此又不可不知也彬甫來以所著之册徵序豫以目青不能閲其文之美而贅一詞又以長孫有無妄之災惡况滿前罔克搆思𥘉非縉紳見􅏺而固却也然豫嘗聼人誦三教圗等篇善為抑揚可喜可喜今足下年妙如此敏學如此㸑同椽竹何患乎無賞識者乎區區耄言幸希恕察與張子才書前歲和髙作甚愧稽緩相去逺相見難然相敬相愛之心如故即日秋髙想林居優遊恬飬清福某老狀如糞土墻加之風雨頽在朝夕否則芝茵之出慈土或有日焉敢請與執事言之野居先生義士也人皆曰早歲有杜季良遺風非豫所知豫所見者戎馬搶攘中由錢塘來長洲以故人趙某舉家病疫親戚無過門者先生褁藥活其兄弟妻子凡五人又如起間居俞縣丞某之瘻救東滄賤工某姓名者如虺如瘵如餓莩而再生皆餽謝而不納至如儒而緇衣黃冠貧而清者亦如之吳之人多以是稱焉豫久欲效野史作小傳以勵薄俗所謂糞土而出芝菌也煩執事以平昔所見所聞枚舉録示更煩訪諸士夫必廣有之區區失記趙俞等名氏質之野居可也便人過常郡寄至城東申明亭劉文中家苐恐溘先朝露罔克踐言尚希矜恕不宣與吳中衡書十月旦得手書併文知連年情况不如曩昔然天時人事易地皆然無可奈何所喜厥疾既愈養生有術珍重以盡天年可也蒙諭墓銘古之人夲無生前預立體制來意甚切交情至深雖盲聾齒痛舉身瘡瘍勉強腹稿寫去中間用硃筆批處令賢郎從實填寫令閣之賢巳于中衡墓志見之不必别作子祭父文古人别無之蓋劈踊泣血之際何暇作文如發靷等事只用祝板直述家禮有式可考不敢杜撰若伯叔祭侄等類却有之幸勿見訝小孫垣今春軍役乃兄塏去秋巳死老夫曽有口號云云現存寡婦孤女六人幼男九歲屋巳賣田多荒吾兒現在橫林橋南張家訓蒙託庇無事森因舊年巡欄而貧餘無咎宅居何處土産何物有便人令去問安也賢郎名某字某年若干子女若干亦望見報兩子孫三世之交亦古道子才賢良及諸故人子孫相見者皆呼賤名問訊區區不宣賀府學教授到任書某早歲嘗聞之師曰凡府學官郡為師士當以師禮尊之是故聞先生到任忘其雙目之盲兩舍之遠即扶􅉵往為斯文賀可喜者謙光和氣待人接物至諸生則嚴條約以規之所謂道並行而不相悖也區區蒙飲食𢾗載禮意過厚感不容勝其大可喜者親承聖天子命以明倫育才之道諄諄乎命之增重斯文之恩至渥也别來三月逢人語之或曰常郡于八九十年之間屢經兵燹衣冠文物蕩然無遺欲其一鼓作氣變齊為魯不亦難乎是大不然夫教官重于朝則縫掖之士重于野况有賢太守承流宣化相與作興風動一邦化行四邑則犁鉏帶經者有之牛角挂書者有之負薪持竿而誦讀者有之正不待家喻户曉而使之然也一榜三魁將復見矣其文獻之光煥乎八紘又豈僅一郡而巳哉某不揣愚陋嘗綴思賢辨惑二編兹用送逹或可為學校涓埃之助云言耄而繁切希矜恕不宣龜巢藁卷之十二終
