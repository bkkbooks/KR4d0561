front:
  text: 龜巢藁卷之十一
  hash: sha256:b8405b00e417838a80e876e807ebc77b1621f5348925df8e63f8b7adf630e086
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0561_SBCK_011-1a}
body:
  text: 詞驀山溪遣悶至正丙申歲作無端湯武弔伐功成了賺盡幾英雄動不動東征西討七篇書後強辨竟無人他兩箇至誠心到􅔄無分曉髑髏滿地天也還知道誰解􅞮銀河教淨洗乾坤是好山妻笑我長夜飯牛歌這一曲少人聼徒自傷懷抱沁園春丁酉春寓堠山錢氏寫懷冷笑班超要覓封侯棄了毛錐看今來古往虛名何用朝榮夕悴浮世堪悲老我衣冠傍人籬落賴有平生鐵硯隨西莊上對溪山如畫鷗鷺忘機相逢喜得新知更不用黃金鑄子期把胸中磊磈時時澆酒眼前光景處處題詩輕帽簮花柔茵藉草時復樽前一笑嬉沉酣後任南山石爛東海塵飛滿庭芳玉雪梨渦錦雲桃扇紫簫雙鳳和鳴觥船𥘉棹煙繞博山青最喜清和天氣緑隂靜梅雨𥘉晴髙齋裡馬融書帳風捲絳紗輕華年才幾許培風健翮曽試修程偶歸來林下間聼松聲笑道葵花似我芳心在向日長傾黃河水如今重看朝暮還清沁水曲四海煙塵一棹風波經行路難幸兒孫滿眼布帆無恙夫妻白首青鏡猶團笠澤西頭碧山東畔又與梅花共歲寒新年好有茅柴村酒薺菜春盤傍人莫笑儒酸巳爛熟思之不要官任伏波強健驅馳鞍馬磻溪遭遇棄擲漁竿霜滿朝鞾雷鳴衙鼓何似農家睡得安間寺裡喚山童把􅊦野老交歡自和雪壓新年花開想遲鶯來甚難喜杯有屠蘇春風灔灔盤有苜蓿朝日團團六十年來尋常交際江海鷗盟總不寒移家處每涉園成趣居谷名盤忘情世味辛酸但吟得新詩勝得官儘教我低頭三間矮屋從他髙步百尺危竿白首無成蒼生應笑不是當年老謝安且琴書裡消磨晚景受用清歡又和竹與梅花偃蹇氷霜堪稱二難我依梅傍竹借人茅舍吟風弄月坐箇蒲團梅樣精神竹般標致遮莫清癯未是寒柴門外一湖春水似拍銀盤昔人恨橘多酸我只笑青松也拜官每醉時低唱滄浪一曲間時髙卧紅日三竿兒輩來前老夫説與梅要新枝竹問安餘無事只粗茶淡飯儘有餘歡蘇武慢蘭雪衣襟芝雲冠佩咳唾成珠玉芳草萋迷蓬萊杳渺皎皎白駒空谷濯髮滄洲怡顏芳樹問天生湖海元龍豪氣肯令消縮君不見二陸聨芳三蘇接武聲動九重黃屋天上碧桃日邊紅杏真足快人心目拂袖東膠出門西笑莫戀故園松菊看濁河流水重清齊唱太平遺曲滿江紅怪􅔄春風要將我船兒翻覆行囊裡是羣賢相贈𢾗篇珠玉江上青山吹欲倒湖中白浪髙如屋幸年來阮籍慣途窮無心哭歸去也瓶無粟吟嘯處居無竹看造物怎生安頓老夫盤谷第四橋邊寒食夜水村相伴沙鷗宿問客懷都有幾多愁三千斛一剪梅一色蒼然兩阿翁年也相同月也相同六年湖海共飄蓬煙也溟濛雨也溟濛移家今住葑門東朝也相從暮也相從何當歸隱舊山中桃也春風李也春風風入松寄朱原道為生日賀梅花折去一枝春人在太湖濵天生襟度容江海每開樽坐客如雲此日醉看蓬矢吾兒應吐華茵湖光山色淨無塵魚鳥總情親姑蘇城上遙相望見湖山如見伊人緑髮年華全盛白眉聲譽方新風入松嵗寒心事舊相知相别去年時如今重覩春風面比年時消瘦些兒天上玉堂何在人間金鼎頻移風塵不染素羅衣脈脈倚柴扉桃根桃葉爭春媚儘教他濃抹胭脂老我揚州何遜壠頭誰為題詩沁園春脫屨紅塵移在碧山娑羅樹邊有兩兒冠帶眼前騰踏諸孫文采膝下聨翩石几焚香氷甌滌筆重注羲經得異傳餘無事但觀雲默坐聼雨髙眠龜巢幸與相連飲湖水清如飲菊泉問絳人甲子今四百皇家鍾乳何用三千銀艾忘情玉枝無汗一味清間足引年升平也看天恩賜帛雪髮垂肩金縷衣袁叔度新居卜宅椒園裡響丁丁風斤月斧杏梁飛起􅑵户青紅煙樹緑焜耀碧山鄰里雞共犬也知輪美燕子飛來堂下舞砧輕盈掌上人堪喜更可愛新桃李長洲水接淞江水好秋風鱸魚蓴菜葑田菰采艷屋神仙羅綺楚舞吳歌娛晚景肉臺盤春筍奉甘旨五馬貴未足擬西江月老大無人青眼凄涼奈爾黃花秋來杯酌斷流霞兀對青山如畫夢裡去尋東老覺來欲喚西家山童若説未能賖報道點茶來也風入松青龍地暖土酥香産玉似崑岡可憐不入瑶池宴到氷壺風味凄涼忽憶故園時序春盤春酒羔羊青絲生菜韭芽黃銀􅍢染紅霜桃花人面柔荑手酒微酣犀箸頻將鞍鼓一聲驚散六年地老天荒西江月緑樹雲林窈窕青苔石磴縈紆兩人林下曵長𥚑應是山中巢許空谷似聞樵斧危橋不渡徴車誰來為我借茅廬來與白雲同住南鄉子四野接平蕪一曲清溪似畫圗燕子日長溪館靜菰蒲風灑軒􅑵暑氣無林叟話樵蘇相送東橋日巳晡啼鳥不知人禁酒葫蘆教我那處沽摸魚子早春作看東風桞搖金縷精神頓美如許獨憐老我雙蓬鬢無復少年張緒桃葉渡任山水清妍可奈非吾土借人茅屋但有客相過清茶淡話間與論今古傷心處客去卧聼鼙鼓看花渾在煙霧姑蘇臺榭笙歌散麋鹿又如前度誰恁悮教無限蒼生命墮顛崖苦蒹葭洲渚賴有箇扁舟三竿釣竹相伴間鷗鷺水調歌韻中秋言懷戰骨縞如雪月色淡中秋照我三千白髮都是亂離愁猶喜淞江西畔張緒門前楊桞堪係釣舟有酒適間情何用上南樓擐金甲馳鐵馬任封侯青鞋布襪且將吾道付滄洲老桂秋香未了明日明年重看此曲為誰謳長揖二三子煩為覓菟裘憶王孫銅駝淚􅊜翠苔茵落地花如墮玉人可是東君不惜春問花孫海變桑田幾度新齊雲一炬起紅煙頃刻煙銷事巳遷折戟沉沙月爛然船問祈連安得河清億萬年水調歌韻秋色淨如洗南極瑞光多秦柱山中隱者弧矢挂煙蘿野老𫾣門看竹珍重主人留客呼酒㵼金荷為問春秋多少笑道明年六十勳業蹉跎萬羊祿千駟馬待如何洛陽城市又看荆棘卧銅駝且喜階庭玉樹五色鵷雛俱好把此琴瑟和一曲華胥引雙鬢雪兒歌洪武九年秋余卜居干墩嘗作水調歌今也人事乖違欲還故土故𣸪和前韻以述其情并以留别吳下諸友時十三年六月𥘉也牙齒豁來久老氣尚橫秋買得歸耕黃犢兒輩幸無愁相近六龍城下只在三家村裡結屋如小舟倚樹覽山色且免賦登樓看官爵都不似醉鄊侯里翁間話便同學士坐瀛洲寄語東吳朋友乘興能來滆浦􅋈舟聼漁謳無酒不須慮解我破貂裘滿庭芳塵拂風生薰爐煙梟劇談天上人間馮夷擊鼓白鳯舞崑山驚倒五陵年少聼三老口角鳴湍江南好梅前菊後天氣帶微寒客來雖話别重歌舊曲不是陽關笑間雲似我時去時還最喜烽煙盡熄青天淨一鏡團團重來也尋盟鷗鷺訪竹問平安點絳唇𥘉度作七十年前抱麟虛負雙親夢一襟空洞生世曽何用老我東門瓜也無心去種松醪甕㵼如鉛汞時與漁樵共海上歸來鬢毛枯似經霜草薄田些少茒屋園池小三子犁鉏三婦供蘋藻村居好兔園遺藁是我傳家寶弧矢虛懸舉杯聊適棲遲意明朝冬至有酒還沉醉堪笑神仙要作長生計人間世金烏西墜難把長繩繫老眼猶明著書未了餘生債客來休怪淡飯黃虀菜踏雪觀梅清興依然在南門外夜來尋戴扶醉馱驢背點檢龜巢素琴絃斷餘何有夫妻白首相敬如賔友三四兒孫五色斑斕袖梅花酒為翁稱夀羅拜爺娘後沁園春時問黃花過了重陽如何始開為客中陶令逢他𥘉度尊前杜舉要我相陪十日秋香百年晚景一笑今朝酒莫推風光好正涼生沆瀣淨洗氛埃胸中華嶽崔嵬下筆處長江滾滾來且折花簮帽劇談清事傳杯看劍聊適幽懷健翮低雲修鱗蹭蹬人道公非百里才還知否那黃河清也白日悠哉水調歌頭六載逺相憶一日似三秋别後雪添蓬鬢著述遣窮愁幾度欲尋安道溪上片帆飛去興盡復回舟明月出東海隱躍見瓊樓喚龍伯擊鱓鼓舞陽侯何時杯酒重歌蘆葉舊汀洲多謝寄來雙鯉白雪陽春𢾗曲為我和巴謳什襲付兒輩好學製弓裘南樓令夀陳縣丞赤手拔鯨牙長安早看花春風百里裛桑麻栁色宮𫀆銀束帶親受賜玉泉家鱓鼓報朝衙桑弓挂緑蛇拜雙親杯捧流霞只恐哦松哦未了天上去又乘槎八聲甘州為友人贈醫士喚嫦娥白兔下蟾宫玉杵搗玄霜自焚蘭古鼎心融靈素默契岐黃不假殘膏賸馥時俗共傳方用我上池水遍洗膏肓家住六龍城裡有舊家風月三徑蒼莨更一林新種紅杏暖生香問年來活人多少輾然微笑説尋常誰能為寫成佳傳汗竹流芳滿庭芳夏五雨􅑵言懷十里橫山一灣流水東洲蕞爾孤村移來田舍山水對衡門老我無能為矣犁鉏事付與兒孫湖田上黃梅雨足蛙鼓聲喧親朋三四老鬚眉雪白言笑春溫每擕手相過清事間論坐把山光水色茅柴酒傾倒匏樽章臺路馬啼塵土不到紫苔痕又和寄江叔亷雞犬相聞溪山如畫梅花只在前村逍遙杖履不過翟公門前度春風巳老對芳草還憶王孫長安市看花人去車馬爭喧向來東海上水南水北如石如溫念鷗冷詩盟何日重論老我蓬蒿三徑開懷抱賴有琴樽公知否蕭齋雨漏四壁篆書痕菩薩蠻七夕作鋒稜磨盡方藏老懷羞對天孫説風葉動清商依稀似九章飄蕭雙鬢雪卧看灣灣月月缺有時圎人無再少年水調歌頭再和前韻青白阮生眼皮裡有陽秋誰信近來懷抱汨汨泥窮愁昨夜僧房聼雨如在瀟湘夜泊欹枕卧孤舟無復少年日解佩醉秦樓更休説爛羊尉爛羊侯三山湖上如今田舍住東洲傾洞十年金革蓬勃一襟塵土白雪向誰謳濯足傍雲水披我老羊裘水調歌頭代陳氏謝徐彥銘玉杵搗靈藥丹鼎養芙蓉城市山林小隱家住驛橋東况是南州髙裔更飲上池真液氷雪炯心胸醫國手𥘉試在處起疲癃種隂德方寸地繼頥翁活人多少滿林新植杏花紅遮莫南山石爛又復瀛洲水淺都付笑談中刮目看塵表黃鵠駕天風沁園春寄張希尹兼簡劉小齋張熙載憶昨秋風送書畫船過楊栁洲把錦囊傾倒燈花共喜棹歌歸去詩草仍留坐榻髙懸家童偶語此客尋常頗見不襟懷好比子猷尋戴别樣風流别來一日似三秋且喜花時可勝逰要尋山問水春申故國賦詩釃酒季子髙丘醉帽簮花吟茵藉草莫笑踈狂老未休同來也有堂前舊燕江上盟鷗點絳唇往古來今何人不道間居好忙多間少應𬒳青山笑蒲柳衰顔我獨驚秋早茅齋小幾番掀倒風雨都􅊜了風入松孤舟浪打石尤風霹靂浪聲中布帆喜得歸無恙繫長橋間似漁蓬蛟渚如今寂寂鷗波依舊溶溶秋花開到雁來紅金菊對芙蓉一襟磊磈都澆去飲紅灰如飲黃封睡到日髙三丈從他衙鼓逢逢點絳唇彩翼雙鳬寄來一幅天機錦純綿絶品將意何勤恁歲晚空山不怕氷霜凛西風緊便添𫀆緼𬒳德吾無隱八聲甘州記年時東走避風塵隨處覓桃源偶相逢一笑堠山西畔喬木參天百尺元龍樓上下榻許髙眠鼓我匏巴瑟魚鳥欣然每日春風池館有竹林諸阮醉袖聫翩要簮花捧研常挾兩飛仙又安知桑田變海竟飄零老去雪盈顛綈𫀆外故人餘意肝膽雕鐫滿庭芳三闋神仙有無安居華屋即是蓬壺榴花也學紅裙舞燕雀相呼水晶盤饌供麟脯珊瑚鈎簾捲蝦鬚吹龍笛擊鼉鼓年年𥘉度長日盡歡娛風流醉翁𥚹舞袖窈窕歌童琵琶要與知音共換羽移宮玉蓮杯將酒供金蔗碗歸厨凍歡聲哄年年醉中岸幘藕花風橫山翠屏藏龍古井走馬長汀四時花竹多風景勝似丹青好兒郎天生寧馨好時節日見升平氛埃淨年年夀星光照望雲亭水龍吟舊家金谷園林盡隨海變桑田了一灣流水一林修竹菟裘將老瀟灑軒􅑵波光隱映筆床茶灶但溪無六逸林無諸阮相與論懷抱不用滄洲洗耳聼風前此君清嘯黃金臺上儘教塵士騁車爭道魚鳥情親漁樵邂逅不時談笑看古來行路難行真個是間居好賀勝朝吳淞舊雨相鄰住喜復來今雨那時因遇十年艱險劍頭炊黍滿江紅舊約尋梅蹉跎過小春時節忽隴頭人至一枝先折喜見春風顔色好縞衣不受緇塵涅把十年湖海舊相知從頭説三江上滄洲雪千墩下珠林月似許詢支遁總皆清絶重看青山携素手此情方解相思結待漏湖水泮栁風輕孤舟發沁園春笠澤東頭翠竹漁莊滄洲釣船看三江雲浪煙波如畫一篷風月隨處留連巨口鱸魚團臍螃蟹坐飲蓬􅑵醉即眠蒹葭畔不收笭箵意若忘筌向來四海戈鋋好戰艦都成赤壁煙笑癡兒航海空尋蓬島漁郎失路漫説桃源鷗社盟寒歌煙水寥寥𢾗百年玄真子有家傳舊曲重扣吾舷鵲橋仙青年去了青衫破了舊日青氊無了一時清興未能除説與故人知道春花春好秋花秋好每日看花尤好人生沽酒買花錢消得杖頭多少一剪梅崑岡火烈去年時玉也灰飛石也灰飛鶴長鳬短總休題善有天知惡有天知今年快活保妻兒歌也相宜舞也相宜揮金如土醉如泥休負佳期莫負佳期又東風吹醒老梅枝南也芳菲北也芳菲月明半夜五更時笛也爭吹角也爭吹青松澗􅔄獨離竒寒也誰知暖也誰知老夫聊為一歔欷梅也題詩松也題詩又一天和氣盎春暉桃也芳菲李也芳菲若教風打雨淋漓紅也塵泥白也塵泥花前把酒插花枝欹也相宜舞也相宜鶴長鳬短總休提長也天知短也天知江城子去年今日㵼天瓢水滔滔斷藍橋阻我羣仙鵉鶴赴蟠桃獨有商羊偏喜雨跳且舞上山椒今年南極見丹霄射金蕉瑞光搖澆去胸中磊塊儘酕醄莫厭琵琶彈舊曲長聼取鬱輪𫀆龜巢藁卷之十一終
