front:
  text: 龜巢藁卷之十六
  hash: sha256:d33c803b10cef798a171ed3cd0427e9f98a22d3acecf73258653ec8d0c1d963d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0561_SBCK_016-1a}
body:
  text: 啓訟伯父墳地上縣宰啓掩骼埋胔古今之制其仁如天過家上塚者子孫之情伊誰無地頋丘壟之失所寔風化之有傷瀝血寸丹陳情尺素切念厶痛懐伯父曩厯兵戈死雖正狐首之丘時未集鴻飛之澤啓手啓足幸能四體之全歸若釜若堂詎信百年之難保葢自陵谷變遷之後以致家門摧敗之餘失此故茔属諸姻黨誰其主之展我甥兮此一錯在乎當時故陸沉至于今日渭陽之舅既無見念之秦龜隂之田那復肯還于魯然豈料人靣獸心之軰乃謀爲兎葵燕麥之場雷厲風飛宰木頓空于斤斧日侵月削佳城亦壊于犁鉏殆将見暴骨之寒又何異鞭屍之慘三尺之法不畏匹夫之勇莫當向来不平之鳴屡致逢彼之怒闘狠不頋輕性命于鴻毛匍匐而歸飽尊拳于雞肋是可忍孰不可忍如之何末如之何徒憎蒿里之悲每動窮途之哭既無靣于江東父老復何顔于地下祖宗日月不照之盆弗堪長覆天水違行之訟可惮终凶頼典章有禁地之條其情理寔滔天之罪仰惟公道俯察愚衷恭惟厶官讀萬卷書為百里宰氷其清玉其白絃之直稱之平寛猛適中剛柔相濟數月有撫字征科之績四郊無呌囂墮突之憂休休焉其有容皜皜乎不可尚聲蜚臺閣㤙迓絲綸如厶者受㕓為民閉門歛跡亦乆𬒳卓魯之化烏敢虞芮之争但悲夫九原之人𣣔掩以一坏之土願施善政垂戒悪人使知見舅如母之親勿為敗俗亂常之事復此牛眠之地仍為馬鬛之封想去家舊鶴重歸看銜土慈烏畢集凡春秋拜埽之日皆存亾感激之時上窮碧落下黄泉為雪幽㝠之恥生當隕首死結草弗判㫁之恩痛切之私敷宣㒺旣上于尚書啓么名傳字受道號止齋延祐乙邜科進士不封萬户侯願識韓荆州常切慕謫仙之志手把一封書上有皇甫字輙敢扣昌黎之門問胡為今日之來曰專為古人之事與其進也適我願兮甞謂傳道不絶者先民之功没世不忘者後人之義若道鄉鄒忠公之墓近在城隂有了翁陳先生之銘流傳天下孰謂此一丘之土盡廢于八世之孫鄉鄰忍于瓜分翁仲随以蕪没故諸生為之太息于當路鳴其不平頼二侯以公道主盟不半載而佳城復舊築思亭而薦蘋藻立華表以樹松楸茍非紀載之詳尚慮耕鉏之患立羊公一片石大書名世之言如季子十字昭示尊賢之意雖不咎于既徃庶有𥙷于将來求之與之完矣羙矣恭惟厶官老成前軰文章鉅公三千字禮樂縦横在早歲修名掲日九萬里扶揺直上至晚年直氣凌雲典文衡則慎于稱停秉史筆則嚴于褒貶霞雲一􅊤将歸老于長洲茂苑之間霖雨八荒将拜命于安車蒲輪之召斯言非佞輿望所期厶曩客新安聞公舊政復紫陽之闕里大振儒風勒黄絹之好辭有光吾道諒弗忘乎素志必重念于斯文惟大賢無不容則小子庶有造于以紀前言徃行于以發潜徳幽光當令梓里之間永若桐鄉之愛鏘如韶鈞蔚如虎豹雄文照耀于九京明則禮樂幽則鬼神妙理昭彰于千古存亾有感敷叙莫殚贄見余用中先生求作辨惑編序啓狂簡斐成章辨諸家之邪説品題作佳士必當代之儒宗夫瓣香敬為南豊葢學者仰如北斗與其進也適我願兮甞謂璞玉雖竒非和氏則山中之石琴材固羙無中郎則㸑下之灰太玄經有覆醤之􅏺公羊傳有賣餅之辱古猶如此今豈不然𣣔立言圗不朽之傳必取正于有道之士嗟今陋俗舍正路而弗由集古遺言廻狂瀾于旣倒可奈一齊而衆楚猶如皆醉而獨醒驚人之鳥一鳴怪雪之犬羣吠願君斵堊為我折衷或衮褒一字之榮則價倍千金之重馮豊霳寄寥廓乆矣馳情抉雲漢分天章豈辭揮手綱維吾道黼黻斯文兹葢伏遇厶官文章鉅公典型前軰詞塲較藝視五色之目不迷鄉國興賢使三代之風復振躬行古道歴踐華途每為政邑郡之間常蜚英䑓閣之上歸從彭澤舊家北固江山敎若河汾隐居南徐城市戸外之屦常滿門前之轍何多雖云遂莵裘之營必復有蒲輪之召如厶旨俯慚後進仰慕先知尊其所聞行其所知愧未造髙明正大之域博我以文約我以禮誓弗忘仰鑚瞻忽之誠景慕有餘編揣摩㒺旣贄見李晋仲提舉求啓思忠公傳道之賢為裒遺事辨邪説誣民之枉乃集前言持布鼓于雷門分天章于雲漢㳟惟厶官儒林麟角學海龍門鍾山草堂之英靈雪竹霜松之標致懶折腰于彭澤早賦歸來聊濯足于滄浪亦云自取皜皜乎不可尚巳休休乎其有容焉然吾道頼以綱維而儒林視為儀表尚持藻鍳以主文衡名動京師栢府之薦章交上官居翰苑蒲輪之召命将臨先生自此升學者仰如斗厶呉中晩進白下漫逰自憐如明月暗投誰復念陽春寡和汲汲有登龍之願拳拳慕倚馬之文方徃依劉以圗御李𣣔因劉尭輔見公乃于劉處偶得識面低頭拜東野適因邂逅之間瓣香為南豊得展􅎋勤之敬敢持兩帙謹用三薰長年坐井􅔄觀天此日詣程門立雪倘賜五行之覧必䝉一字之褒登山采玉入海求珠捆載乃酬其素志製芰為衣紉蘭為偑激昂正頼其清風贄見楊亷夫提舉求序思賢錄啓兩䄂春風作洛下書生之咏滿船明月過関西夫子之門問胡為今日之來曰端為古人之事窃有請也能無從乎伏念生延陵季子之邦頗知禮譲復道鄉鄒公之墓當効馳驅樂民俗之還淳喜士風之近古思賢有録味道無厭紀前言徃行之二三發潜徳幽光之萬一自藏燕石誰售雞林恐公羊遭賣餅之􅏺使太玄有覆醤之辱願借春秋之筆特為月旦之評得一序以冠塵編若千金而加弊帚庶傳不朽有𥙷将來非惟先哲之有光真乃後學之多幸兹葢伏遇厶官乾坤清氣風雲壮懐走馬看長安花早嵗似唐人得意割雞為百里宰居官如言子愛人以文章政事之俱優宜天下國家之大用尚淹筦庫未展經綸乂皆知大噐晚成我乃獲景星快覩題鸚鵡賦巳多年傳䴡則遺音到鳳凰池将不日遂平生髙志倚湏瓜代入覲楓宸如厶者敢不長遡下風永懐髙誼聞所聞見所見真如到神仙十二楼之間歩亦歩趋亦趋或可在弟子三千人之列其諸欣慕㒺旣敷宣䞇見張用中敎授啓黄魯直謁蘇東坡因述依松之志禰正平過孔北海乃䝉薦鶚之辭葢同氣以相求必當仁而不譲敢持尺牘特造丈凾恭惟厶官海内儒宗江西詩派徃歲為馬尚書賔客當時有虞學士品題謂鵬程萬里横飛期鳳池十年可到道出羲皇才過屈宋何鄭公猶在于廣文上規姚姒下逮荘騷若韓子獨㝷于墜緒先覺覺後已立立人四方之學者來歸一鼓而斯文作氣博求地利開玄武湖以廣澤物之功善育人才置治事齋而兼水利之意聲蜚臺閣恩迓絲綸如厶者生長吳中栖遲白下頋窮居而獨善恐没世以無聞著辨編惑闢近世之異端邪説作思賢録發前修之潜徳幽光𣣔煩斵郢人之斤輙敢弄班門之斧平居抱膝仰太山北斗之髙此日承顔覩鳳皇景星之快天其或者道之行欤得華衮一字之褒增敝帚千金之價品題作佳士何慚奏白雪遺音吹嘘上清㝠或可借春風餘力答陳天倪謝薦師啓見賢而舉者古先之制悪敢言功昜子而敎者夙昔之心幸逢知已豈意與互鄉之進亦勞賦小山之招㤙斯勤斯至矣盡矣恭惟容齋先生玄玄衆妙休休有容身雖領䄂宗門學則淵源吾道小楼明月勝元龍百尺之豪髙枕白雲待丹鳳九重之詔有前人風烈為後學範模如厶者與緇黄交能青白眼獨喜子墨名儒行非他人虎質羊皮通家随三十年責善難一二計兹荷愛烏之及特厪遺鯉之書曲憐覓梨棗之免特命入芝蘭之室從明復受春秋之業看希夷畫太極之圗熊魚何幸乎兼得犬馬當知其所報道院迎仙書堂隐相増爽氣于西山隣家乞火小窓分燈藹餘光于東壁銘心有感筆舌奚殚謝監察御史火公舉茂異啓天朝重耳目之官寔居清要風憲擢山林之士非市私恩葢竹頭木屑有可之時而茅拔茹連乃必然之理敢因竒遇庸布謝言窃念厶家本吳中客兹江左以芰荷為衣秋蘭為佩訪鍾山之英草堂之靈作山川司馬壮逰負湖海元龍豪氣自憐骯髒誰問飄零瞻烏蒼栢之間歌鳳古䑓之下幸逢騘馬䝉試雕蟲叩大小從容之鳴以盡其聲收輪囷離竒之材而為之噐使李白立堦前地如毛遂脱嚢中錐得之若驚觀者如堵兹葢伏遇厶官身居臺閣腹中詩書凛凛乎動揺山岳之威惓惓乎樂育菁莪之意植公門之桃李蓄相籠之葠苓昔中州草木知名今南國衣冠俱化三省十道俱聞鉄靣之威一日九遷将拜玉音之召風塵一埽霖雨八荒如厶者敢不恒念品題益加修省行日用常行之道讀生平未讀之書雖蒲桞之質望秋先零而薑桂之性到老愈辣惴惴焉出門下誓不忘一瓣之香耿耿者在胸中當自愛千金之帚代羽士上亷訪僉事啓上士無争奉先師之明訓監主自盗奈公論之難容故鳴鼓而攻之若同室而闘者窃念厶李老君弟子住焦真人道塲小小山林設住持之主席區區金帛有交代之成規比因樽節年多致有羡餘日積𬒳前職䑕偷狗窃使空山鶴怨猿驚當市攫金衆所共見匹夫懐璧罪寔難逃巳甞赴愬于有司且復陳詞于敎所始則强項不屈终乃揺尾乞憐遂以當仁不譲之心聼其用和為貴之説乃償薄産以𥙷亾金未㡬背挿血之盟又復為紾臂之奪用朝三暮四之術專務貪婪逞人一已百之能肆為欺㒺楚弓得失秦鏡咨度勞六轡之驅馳亷法亷辨亷善亷能按百官之能否明月靡遺罅隙清風一埽塵埃睠兹寂寞之濵亦在照臨之下豺狼歛跡草木知春激濁揚清既憲綱之振肅舉直錯枉宜公道之昭彰或移北山之文或賜南山之判戒無厭溪􅊤之欲征悖入府庫之財庶有𥙷于将来更無煩于訟牒思之弗措辨之弗措願亟持全璧之歸得之若驚失之若驚當永守青氊之物謝崑山梅州判舉鄉善啓儒雅闡大猷漢室之興復見品題作佳士荆州之識為榮矧䝉下采于菲葑豈作不言之桃李寸丹有感尺素具陳厶官佐理神州賢勞王事虚心待物明于滄海之珠羙徳含輝粹若崑岡之玉有賢守與承流宣化在寮寀則同寅協恭切切斯民惓惓吾道氷霜並㓗風月平分南山之判不移北闕之心長戀二千石不如逢掖下士尤勤九萬里直上扶摇前程甚逺吾言非佞輿望所期厶乆客東吳逺迯兵燹功名蹭蹬昔為竹上之鮎身世飄零今作無枝之鵲偶尔宿賛公土室􅌂然逯梅仙市門聼髙山流水以知音驚明月夜光以投暗説項不輙薦禰有書駕言采泮水之芹何異繼廪人之粟驥千里未甘伏櫪鳥一鳴或可驚人翺翔道義之林涵泳詩書之澤鄉之善士國之善士尚期自下以升髙知惟春秋罪惟春秋勿謂有名而無寔賀陶敎授啓鄭廣文才過屈宋坐一氊而司業相憐胡安定敎授蘇湖置二齋而太學為法升髙自下振古如兹恭惟厶官胸襟貯萬卷書文章揮五色筆頻年花縣絃歌之化大行今日薇垣賛畫之才方展王公大人以青眼相頋縉紳先生以白眉見稱兹泛緑以依紅将腰金而曵紫一節既全其清白百憂當念乎羣黎願為龍伯髙勿效杜季良恪守祖傳之家法近舍皇甫湜逺取白居昜當求用世之人才跂予望之自此升矣厶逺迯兵燹乆客勾吳秋菊寒泉祠甫里見尊賢之義長洲茂苑頌鄉校勒輿人之言巳知和白雪之詞但未覩景星之象由村落以來城府見軍民多困飢寒敢用條陳以效芹獻于以開難發之口于以推不忍之心區區非釣夫虚名懇懇必求其寔效蒼生顛厓受辛苦隔羣仙天上清髙大芘廣厦俱歡顔願比屋眼前突兀代謝沈太守啓一輪明月清輝今照蘇州萬里長風素志乃如宗慤念先人遺澤挈孤子于長途知幸自天感㤙無地恭惟厶官乾坤清氣風雲壮懐既不忘向日之誠且㴱識随時之義徃年烏府冠峩廌角之威此日黄堂庭蔑䑕牙之訟退食則斑衣以娛父母傳家則黄卷以授免孫鞭不施蒲庄先種桞豈弟咸稱召杜勲名必到蕭曺三江五湖之風謡政聲藹藹四海八荒之霖雨輿望懸懸遺愛甘棠流芳汗竹如厶者仰依公庇勉讀父書既巳承薦鶚之章當不負愛烏之及俻参苓于薬籠作桃李于公門庶竭駑材以圗豹變父為大夫子為士頼提携發軔之𥘉車如流水馬如龍願追逐後塵之末其為報効㒺既敷陳上沈太守啓太叔為鄭大夫始従寛而终猛不疑謁暴公子先言威而後㤙惟大海不擇細流故他山可以攻玉請以田夫野老之語陳于大人君子之前切以厶近寓吳江偶經荒浦聞近日有䑕窃狗偷之軰各都如蜂屯蟻聚之多始則穿窬终為强禦忽忽乎神出鬼没累累然晝伏夜行星月光中窺商賈他鄉之客烟波深處伺妻孥迯難之人或如斫嚴顔之頭或如㫁孤免之臂横屍洲渚流血泥沙遺臭衝天銜哀入地掩鼻而過者多矣垂泣而道者誰欤鄉鄰惧而不言州縣置之不問致令滋蔓轉肆兇頑目之所覩者如此其多耳之未聞者尤為不少新鬼煩冤舊鬼哭痛恨難忘他生未卜此生休衷情誰訴惟當路發神明之政為斯民雪㝠漠之冤三尺法申明紀律五色棒埽除羣醜寛猛相濟不勞用苻澤之兵恩威並行何待持繡衣之斧一雷既振百蟄俱驚恭惟厶官俊傑識時精忠貫日清氷出萬􅊤此徃年烏府威聲明月照蘇州乃今日虎丘嘉話甘棠樹聼召伯之頌老萊衣照蘇堂上之親愛民若拙于征科下士能勤于吐握五花馬金章紫綬方𬒳殊恩六桞庄緑水青山未容髙興政湏治最以候登庸如厶者幸獲承顔甚慚饒舌聞而來見而去仰山斗之彌髙道以政齊以刑看民風之丕變上梅知州陸同知啓莨莠下除必有傷于嘉榖盗賊不息寕無害于良民目前事可為寒心林下人敢云饒舌俯慚卑陋上凟髙明切以厶為客松陵􅋈舟荒浦聞近日有䑕窃狗偷之軰在各鄊如蜂屯蟻聚之多或穿墉以踰垣或發匱以胠箧或牵去春耕之犢或移人夜泊之舟或刼行商嚢槖為之席􅐈或因迯難妻孥與之偕亾或如斫嚴顔之頭或若㫁孤兒之臂慘慘星月見遭毒手渺渺烟波逸去凶身濺血菰蒲伏屍洲渚漂流于五都十都之境臭腐于六月七月之時里正不敢言恐煩撿覆鄉隣寂無語惧有干連致使跳梁轉加延蔓天隂地􅊜但聞冤鬼之聲水逺山遥渾是愁人之景悪貫既满禁網难迯今有司獲盗窈之徒宜因事䆒凶强之黨幸母姑息凾賜施行轟雷霆于掩耳之先照日月于覆盆之下追三窟兎湏旁求曲徑之踪殺兩頭蛇方能免後人之患餘罪戾之輕者加徒役而逺焉庶令涇渭殊流不致薰蕕同噐葢治非常之盗必加以非常之刑雪痛怨于黄泉聼歌謡于緑野㳟惟厶官同心同徳無黨無偏閭閻䝉撫字之恩案牘絶煩苛之弊訟庭如水印匣生塵明月清風暫尔居淞江太湖之上髙牙大纛翩然到蘭䑓鳳閣之間人皆仰之自此升矣如厶者言雖僣越事寔昭彰祗縁以兎死狐悲未免較鶴長鳬短溺猶已溺望明公擴仁愛之心刑期無刑變悪党為仁良之俗幽明有感賛羙奚殚代上江浙丞相求䕃叙啓上書伏光範門韓愈以布衣自進斗酒酌新豊市馬周于逆旅誰知仰止三台素非一日惟吐哺握髮以下士敢披肝瀝胆以陳情切念厶生毘陵錫谷之墟客吳郡長洲之滸早年勤苦頗讀父書連歲孤寒且罹兵燹竄妻孥于荆棘揮涕泗于蓼莪學弓為箕學冶為裘尚頼傳家之業在無父何怙無母何恃孰憐逰子之歸遲望西日之長安歎南風之不競鬰鬰居此遑遑何之芰為衣蓉為裳苐慚没世而無聞有負先人之遺澤𣣔求䕃叙願借恩光雖云無麟角鳳觜之竒亦庶㡬竹頭木屑之用持衡留藻鑑天書適降于九重随水上龍門巨浪可乗于三汲鯤鯢變化鵷鷺翺翔兹葢伏遇厶官簡在帝心股肱王室保江浙數州之地障東南半壁之天以和静鎮國家量同文靖有忠勲塞天地爵比汾陽公門之桃李欣榮薬籠之参苓並蓄五風十雨頻年見隂陽調爕之功寸地尺天指日復疆里廣輪之舊恩加衮舃銘在鼎彛如厶者幸獲瞻依宜䝉拔擢大木為杗細木為桷良工得國用之宜南山有臺北山有萊君子致太平之樂永言報効盡力馳驅賀上海石縣尹啓郎官應列宿方照臨滄海之秋鴻毛遇順風乃奮起青雲之日敬陳賀語兼進忠言甞觀時有盛衰道無今古為國者必以人民為夲有司者必以父母為心擾攘雖值于難時撫字合由乎古道簡編所載矩矱具存曰既庶既富而敎之曰足食足兵而信矣曰孝弟可盡尭舜之道曰忠信可撻秦楚之兵惟敎化能結其心斯奮發以盡其力小而一邑大則九州是道為農桒學校之原其事乃錢穀兵刑之属苟一日而必葺斯三年而有成倘不鄙常談老生洵可謂知言君子厶官心存愷悌氣禀髙明先世稱萬石君其道義傳家之乆今官為百里宰葢居功名發􅮾之𥘉以胸中所藴之詩書為目下可行之政事征科不廢撫字尤勤春風藹田野如春民無愁歎明月照閭門似水吏絶喧囂釜魚之聲譽巳聞堂鱣之禎祥必應行書上考佇見髙遷厶幸属故知喜聞新政彼客燕皆能賀履豈窮猿反不投林東入海西去秦儗𣣔依棲于賛老昔無𥜗今五袴願同歌詠于吳儂諸士友陳言陸同知誣枉事啓排難觧紛窃慕古人之髙義舉直錯枉宜䝉當道之公心芻蕘有言葑菲可采切見􅉴江州同知陸公厶職居佐貳政出循良三載守官一亷如水自許以赤心報國人皆知洗手奉公豈意權豪乃加排䧟以兵戍干有司之政以文移行無妄之灾舁一夫病死身屍勒其子巧生詞訟聚衆擁停屍之地環若重圍當官逼忤作之人傷皆誣驗强梁若此毒害顯然越官職以横行違憲章而不頋各州縣聞之而丧胆諸士民覩此以寒心赫然恣逞其兇威甚矣有傷于治體是可忍也尚何言哉仰惟上相之賢明俯察本官之冤枉照覆盆之日月即見昭彰遏平地之風波毋令䧟溺如厶等與夲官𥘉無私愛且隔隣封聞一州有頼其主張知百姓多䝉其恩恵昔頌徳于三江五湖之上今稱冤于萬口一辭之間其言至公而無私所願抑强而扶弱直為壮曲為老當明曲直之情危而持顛而扶庶免顛危之辱宜加采擇特賜施行上量田徐孟二公啓立國以經界為先當盡革其中之弊生民以稼穡為夲方能供在上之需惟任用之得人乃公勤而稱職𣣔陳梗㮣敢効芹誠甞謂朝廷革命之𥘉才俊為時而出凡所以體國經野皆可以忠君愛民况皇家付尺度之公要農畝定租庸之法甲是乙非者固當分辨鶴長鳬短者尤宜折衷為前代除毒歛之蛇免後人為涸轍之鮒此當務之為急其任非輕但至公而無私所行必逹厶官同心同徳無黨無偏志如百鍊之鋼下為徺指事若重調之瑟能用改絃雖寸田尺宅皆入版圗而賸水殘山猶䝉紀録田野既揚其聲譽銓衡必録其勤勞同升諸公一臺二妙厶生夲常郡寓此吳鄉如去邠而居岐敢因徐而見孟願求荒圃學為老農春雨一犁駕烏犍而東作青雲萬里看黄鵠之雙飛上王知府啓玉門関兩鬂秋霜歸来晚景金牛臺一輪明月喜挹清輝人皆作未暮之春我𣣔快争先之覩騎竹失随于童子杖藜敢謁于宵人既獲披雲亦言獻曝甞謂農桒者民生之本學校者風化之原其在有司亶為急務睠此常郡即古延陵二十年兵革以來𢾗百里人烟𣣔絶犁鉏不作絃誦無聞大田皆變為荆榛泮宫亦燬為瓦礫今天下全歸于大統而郡中方集其遺氓如谷寒而鄒律重嘘若絃㫁而麟膠再續民何以勸惟恤民則民乃力農學何以興惟重士則士皆志學嚴一鼓而作氣必三年而有成田野闢而賦税増敎化行而習俗羙上以副聖天子明詔之意下以著賢邦侯善治之功斯文黼黻乎皇猷舉世甄陶于清化渤海郡勸農龔遂復見于今成都府興學文翁㒺專于昔茍二端之並舉則百廢之具興幸無謂先生常談真可與古人同傳厶官三槐世胄五馬恩榮金莖露之澄清玉壺氷之㓗白有民人有社稷雅稱弘才為保障為繭絲㑹能兼羙飽夙學于胸次急前務于目前報主赤心待士青眼吐握行周公之禮謙徳彌光循良希漢吏之賢芳名不朽如厶幸然歸魯得此依劉三十年辛勤有廬𣣔訓城南之子千萬間突兀廣厦願䝉庇天下之賢頌禱有餘敷宣㒺既謝孫大雅惠詩文啓寄壮甫題草堂舉世頌髙公之句送李愿歸盤谷至今傳韓子之文故詞章誠有可嘉則名譽皆為不朽感承傑作敬叙謝言厶生長延陵夲同鄉土喬居吳郡俱避風塵既聲迹之相聞且音問之不絶千萬人之前常承説項十五年之内惟欠識荆甞結巢為蓮葉之龜來詩甚羙至還家若華表之鶴得序尤佳頋予生非李杜之儔視所作乃髙韓之比陽春寡和明月暗投巾箱謹于珍藏棐几時乎圭復想丰采于氛埃之外見肺肝于文字之間投桃報璚兹抒倩于尺素如葭倚玉别請敎于丈凾厶官以申浦之澄清鍾于姿禀以君山之蒼古發于文章馳驅荘騷岀入佛老鳴敎鐸東呉者乆投朝簮北海之濵枕流漱石而有祖風弄月吟風而忘世慮山中暦日看黄揚厄閏之年天上春風待紅杏倚雲之日如厶者素慚孤陋雅愛交逰味六經如嗜膏梁親三益便成膠􅃮江東暮雲之酒願與論文山隂雪夜之舟尚期乗興雷門持鼓郢匠揮斤謝張雲門作詩序啓魯直獻東坡二詩葢𣣔見瞻依之志士安叙左冲三賦方能無非議之詞葢當世鴻儒乃後學之龜鑑寸丹方感尺素具陳伏念厶田野草莽山林樗櫟不揣鉛刀之鈍常持鉄硯之堅鮎上竹竿徃歲之功名可笑龜巢蓮葉近年之身世如浮八九家寂寞江村三千丈蕭騷白髮出言爛熟作字迂踈寤疑辨惑以成編懐古思賢而有録頽然詩癖忘乃途窮時抱膝為梁父吟或掩鼻作洛生詠對明月清風而思玄度藴髙山流水以待鍾期持鼓雷門探珠􅌐頷得警䇿片言而為幸豈舂容大篇之敢望珠璧暗投璚瑶非報不識面而知肺腑可謂神交如冩容而見精神珍藏手筆披雲未遂仰斗弥髙恭惟厶官四海儒宗一門科第為時而岀不勝烏鳥之情謝病而歸非為鱸魚之羙以東山吳之山水為西漢之文章托古意于焦桐播遺芳于藂桂風月襟懐江湖雅氣本磊落之竒才泉石膏肓烟霞痼疾享優㳺之清福道則髙矣人皆仰之如厶者敢不佩服斯文勉旃尔力幣甚千金之帚榮哉一字之褒廢䋲墨不為拙工灼見用春秋之筆經品題便作佳士惟恐孤月旦之評瞻望依依臨書草草儗與金壇縣告索尹氏寄書啓賣金買書自是平生之志刻舟求劔難忘眷恋之情雖吳霜巳白其頭顱惟秦鏡能明其肝胆敬持尺素用冩寸丹念厶避地曩年泛湖連日移舟至尹干橋下依乃姻家藏書如孔氏壁中扄諸奥室物其多矣人皆見之三十年賤迹飄蓬數百卷常懐汗竹豈知瓜葛乃變薰蕕以諸史之青編昜兩牵之黄犢餘存簡牘悉入巾箱屡云還合浦之珠竟不返連城之璧朝經暮史𣣔重對于聖賢甲是乙非合辨明于官府是可忍孰不可忍求之與抑與之與惟當道之至公庶斯文之不墜聼其言也適我願兮厶官承恩九重出宰百里乃氷其清乃玉其白如絃之直如鏡之明以識時俊傑之才了積年繁劇之事戴星岀入雙鳬暫止于金沙摶風扶摇孤鳳必巢于阿閣厶逺來鄰邑如倚大山鶴溪水天影涵秋比琴堂之清澈米家船虹光貫日載書簏以還歸儗謝常州府官啓曽参以同姓殺人其母甞投杼而走黔昜非在家遘疾厥子乃驚心而歸奈何事出于鄰封甚至弊生于夲邑幸大府能為辨析今㣲言合用敷陳切念厶乙老窮居苦守株于横峴丁男逺岀因負米于荆溪叠叠乎縣帖拘追纍纍乎里人𬒳執始自三月三修禊之日皂隷登門遂令八十八老耄之年倉皇赴縣換名字如雲翻雨覆動文移則雷厲風飛䧟阱𣣔成網羅交設南阮貧北阮富姓雖同而産業不同東家丘西家愚人有異而鄉閭亦異故奔訴甘棠之下䝉戒懲刻木之徒號咷徹乎二天枉屈為之一雪伏遇厶官等同宣聖化並著仁聲召父杜母之慈祥春濡秋露礬弟梅兄之清白月映氷壺閭閻響擊壌之歌城郭寢撃柝之聲行書上考佇俟髙遷如厶者父子知恩鄉隣感徳覆蕉藏鹿夲無夢于前時縁木求魚免受灾于後日報當啣結力効馳驅上周縣尹請祭頋将軍啓孔北海表鄭公鄉人皆起敬文潞公題明道墓學者知歸葢追敬于儒先寔有禆于風化敢持尺牘用徹琴堂厶老不趋時心猶好古覧中吳之勝㮣訪前代之名賢笠澤西頭皇天蕩烟波相接葑門東畔頋将軍丘壟猶存藂祠倚馬鬛之封荒蘚没龜趺之石每經斯地常念斯人生為吳相之孫死有元公之謚華亭二陸𥘉齊名得三俊之稱白羽一麾獨仗義平六州之亂晋史俻書其勲業吳儂尚保其祠茔但每歲之烝甞欠有司之籩豆不揣効豊干饒舌敢云煩陶令折腰蘋蘩失薦于鬼神桒梓愈加其恭敬此非違道以干譽幸不以人而廢言恭惟厶官以董賈之才為卓魯之政乃氷其清乃玉其白如絃之直如鏡之明見義勇為當仁不譲有民人有社稷國家委任之隆敎禮樂敎詩書流化承宣之急行書上考竚見髙遷厶飄泊長洲蕭條短褐投老二天之下知名両月之間其言至公而無私其事似緩而寔急生芻一束其人如玉望喬仙雙舄之鳬寒鴉數點流水孤村弔華表十年之鶴干陳敬𥘉先生作懐古録序啓懐賢千古聊綴緝夫前言借重一辭庶流傳于後世窃有請也能無從乎睠我楚狂乆客吳中過鳳凰嶺頋彦先之墓有感而傷傾鸚鵡盃李太白之詩長歌而撃節甚矣疾薫蕕同噐忍乎随桃李不言豆籩既請于有司丹青乃新其遺廟屏除妖塜祭埽佳城縉紳皆為之歌咏樵牧則嚴于禁約載嘘藜𦦨用冩蒲編于以發潜徳之光于以紀廢興之事過雷門持布鼓敢曵長𥚑抉雲分天章煩揮健筆厶官居玉堂之署人慕登瀛紬石室之書自當名世為士林冠冤演王國經綸目短曺劉汗流籍湜大鵬九萬里扶揺直上之秋黄河三千年㑹見重清之日前程逺大吾道光榮厶不揣迂踈尚希題品書八篇因窮而著𥘉不效于古人賦三都得叙而傳誠有望于今日代上饒參政啓叔向知鬷蔑因聞堂下之言毛遂従平原乃脱囊中之頴既古人有如此者豈今日獨不然乎切厶㓜讀父書從逰都邑聞所聞見所見囿先生長者之鈞陶歩亦歩趋亦趋習王公大人之規矩辭親日下奉檄浙東干戈擾攘者閲五六年鞍馬馳驅者知㡬千里及區區益升斗之禄又紛紛服州縣之勞栖枳棘于慈溪望蓬萊于滄海旣失怙恃遂用來歸兄弟飄零状若䘮家之狗功名蹭蹬誰憐失水之魚然此膝不屈于常人而其志敢忘于斯世家徒四壁壮氣横秋但知讀書以聖賢為師未甞出門與流俗為伍髙山流水頼有知音明月夜光忍令投暗鷙鶚之書既作鯤鯨之化何疑惟大匠無可棄之材宜小子有相依之志葠苓薬籠桃李公門恭惟厶官俊傑識時耿介拔俗隴雲可悦巳常似山中宰相之閑仁風載揚今復慰天下蒼生之望胸次烱玉壺氷露文章垂金薤琳琅借箸而籌入則告嘉謀于公府累茵而坐岀則參大政于薇垣已立立人先覺覺後行吾道于干戈之際救斯民于塗炭之中㡬千仭廬山衆人所仰五百年名世非公而誰如厶者慕藺許年依劉今日襪綫之才雖短葑菲之采不遺朝取一人暮取一人莫非荷提撕之力待以國士報以國士當不忘感激之㤙輕凟崇嚴重加悚息上張太尉啓蘇轍上韓太尉書所願覩賢人光耀馬周寓常中郎舘即能以時務條陳不揣下愚敢希前軰敬以惜軍愛民之事陳于王公大人之前聞斯行之時則可矣甞謂有民有社湏當畫䇿以治安足食足兵乃可運籌而征討准今酌古發政施仁苟𣣔展心上之經綸必先察有司之利病勿求近效宜作逺圗開荒田則爲富國之原設屯田則爲守邉之計除民瘼則免誅求之苦積軍儲則無匱之之憂廣塩榷之法則逺近流通恤軍士之家則存亾感激凡兹六事盡在一時日月雖明固難照覆盆之地風雨不動願䝉庇廣厦之天布以新條革除舊弊惟其愛民如子必不以人廢言詢我芻蕘敎人稼穡昜其田薄其税民力方紓居有倉行有粮兵威自振幸無吝一舉手一投足之力更勿辭三握髮三吐哺之勤庶士夫得進其忠言而軍民免令其失所恭惟太尉相君英雄葢世度量容舟以崧髙維岳之英靈為海納百川之襟度興利除害更張漢瑟之絃革故鼎新重作禹書之貢西鄙之烟塵去逺東吳之風俗還淳見諸生如見大賔保斯民若保赤子天上天下咸知向日之忱江北江南共仰福星之照名垂竹帛勲在鼎彛厶十載風塵一篷烟雨辟地居淞江之滸憂天如𣏌國之人功名雖負于素志窮困尚憐于黔首或有一得何忍三緘知我春秋罪我春秋𣣔救顛崖之辛苦待以國士報以國士终當範我之馳驅俯竭葵傾仰希藻鑑賀蔡敎授到任啓建學立師夲三代之良法化民成俗即二南之遺風夫以世衰而道㣲其必人存而政舉喜聆木鐸敢進芻言睠此崑山舞丹崖之鳳石沛然婁水接蒼海之鯨波以山川如是之竒况人物由來之盛紛紛顯宦比比髙門豪如劉龍洲而寓焉賢若李樂菴以居此適值近年之兵革遂忘舊日之衣冠城郭是而人民非禮義廢而政敎失幸鄉校之不毁今學宫之苟完有司奔走于豆籩多士趋蹌于礼樂但龍蛇之混雜有鳬鶴之短長中也餋不中才也養不才政頼鈞陶之力仁者謂之仁知者謂之知豈無區别之心惟自今秦鏡之明更不致齊竽之濫大杗小桷匠氏固無棄才貴玉賤䃉識者自能定價嚴一鼓以作氣必三年而有成恭惟厶官心醉六經眼空四海杏花氊上重來鼔焦尾之琴荷蕢門前試聼撃有心之磬胸次烱玉壺氷露文章垂金薤琳琅曩甞居淮海維揚人共仰太山北斗能不失前賢規矩真可爲後學範模苜蓿闌干且莫厭一官之冷菁莪長育當挽回吾道之春立登要津八居翰苑如厶者蹉蛇仕路流落他鄉不能看長安之花乃亦采泮池之藻聞所聞見所見星鳳見覩而快㢤歩亦歩趋亦趋蘭鮑乆居而化矣為王叔才通吳伯善啓魯連為觧紛而出斯為天下之竒陳平能宰社而均終作朝中之相苟有為于今日亦何異于古人今一見之窃有請也恭惟厶官河山清氣丘􅊤閒情雖爵禄不入其心惟孝友是亦為政車乗下澤称鄉里之善人楼卧上床夲湖海之豪氣律吕鳴朝陽之鳳階庭舞荀氏之龍惟其博古通今所以出類拔萃有文舉座上之客而開樽常满聞鬷明堂下之言而執手相知近者悦逺者來親踈無間剛不吐柔不茹好悪惟公藏噐待時在邦必逹厶許年慕藺此日識荆㴱知有長者之風輙敢訴不平之事曩令猶子勉作塩商同客嘉禾王吉父與成交昜親書片楮孔方兄俱付撿收不料堕其計中從此置諸度外屡約屡爽轉富轉貧但知堆满屋之金不肯返連城之璧况視予之流落尤縦意而欺凌獸心忍負于朋儕狡窟乃居于仁里望公秦鏡照我覆盆能扶顛以持危必舉直而錯枉風行草偃水到渠成是猶觧戦國之紛何異宰鄉人之社道之礼樂示之好悪豚魚必感而相孚失之東隅收之桑榆犬馬當知其有報心有所憤書不盡言為王叔才訴神文亘古亘今人世有難明之事誰曲誰直鬼神能灼見其情雖聪明正直之有司必禍福吉凶之有報請陳始末用徹幽明切念厶至正十有五年作檇李異鄉之客統鈔三百餘錠買吳江同姓之塩託在契交信從期約立文憑之一𥿄比重諾之千金豈其反面無情從此掉頭不頋彼已跨腰錢之鶴我乃求縁木之魚日徃月來馴致遷延之乆雲翻雨覆不勝變詐之多故連年空打白厓至今日竞成烏有交情既絶礼貌全無本來似鮑叔相知每去如魯侯不遇彼因積富致鹺物之如山我則固窮避兵戈而失路不念流離之苦轉加欺㒺之心日月不照于覆盆風雨自安于廣厦昔伊過我待為席上之珍今我求伊視若眼中之刺是可忍孰不可忍如之何末如之何既吿于隣里鄉黨之間當質諸上下神祗之右吾言若謬甘受天誅彼語如誣當受遭隂譴願洋洋之如在降濯濯之厥靈有感必通如響斯應舉直錯枉必湏天理昭彰福善禍滛庶使人心畏服上周郎中陳言五事啓李白識韓荆州雖萬户之封非其所願鬷明見鄭叔向惟一言之善得以相人今區區慕足下之賢敢切切論目前之事上以禆國家之清化下以慰郡縣之蒼生逺視𣣔明迩言可察兹葢伏遇厶官乾坤清氣風雲壮懐向坐黄堂著蒲鞭之善政今遷畫省冠蓮幕之諸賔有撥亂反正之才盡扶顛持危之力心不忘乎向日義不失于随時英聲蜚九重之天遺愛溢三吳之地和氣挽回于寒谷恩光照及于覆盆見多士如見大賔保斯民若保赤子能興利以除害不吐剛而茹柔史編當紀其循良鈞軸政湏其賛畫門墙羅列好多陪桃李之春鼎鼐調和有大用塩梅之日更勤吐握以廣咨詢如厶者甫里索居太山髙仰折桂之功名蹭蹬衡門之心迹栖遲雖讀書以聖賢為師但岀門則農圃為伍東隣西舍痛遭毒歛之蛇南枝北風多作無依之鵲太息愁怨之聲常聞于田里呌囂墮突之吏每見于鄉鄰况軍儲不積則時有借糴之憂而官俸太輕則必有侵漁之患此皆係百姓之休戚疇能岀一言以發揚惟大人肻念乎羣黎故小子敢輸其忠赤非甚髙難行之事非荒唐謬悠之談是曰是非曰非尚從公論聞所聞見所見奚敢飾詞宜改絃而更張勿刓印而弗予他有剥床而請者别當借箸以籌之溺猶已溺飢猶已飢斯謂愛民之術仁見爲仁知見爲知𥘉無私已之謀饒舌云云優容幸幸謹奉啓併以所言五事開具詣省幕以聞伏惟台慈鍳念一開荒田夫民之有田猶魚之有水也魚無水則枯而死民無田則飢而斃原民之情豈不𣣔治田以養其生哉今長洲縣崑山州等處水深圍田積荒嵗乆無錫常熟等殘破地面荆棘連天其各處流移之民餬口四方而無卓錐之地是皆𣣔業耕以飬生者也但所慮者犁鉏纔舉即有征科廬舍未完便當差役是以寕受艱辛且迯租賦寕甘窮餓不還鄉土每歲雖䝉官司招諭復業及委官勸農不為不至而民之所慮如此遂成虚名况各處低田圍岸乆壊非一時可以修築積水甚㴱非一時可以車戽必湏隔年料理以俟春耕田家作苦筆舌難盡如䝉呈逹省府行下各州縣踏勘荒田數目參酌至元年間燕參政開荒舊例聼令諸人請佃每年不過若干𥘉年官不徴粮私無租課應干雜役俱得優免次年公私半徵三年成熟然後全徴如此則人皆為飬生之謀而不惮工力之費年間官粮數增國家享無窮之利矣開此荒田官民兩便一除民瘼為政以恤民為先若夫民瘼未除而謂能恤之者謬矣然今之民瘼未昜枚舉姑以前月切近者言之如崑山州等處去年旱澇相兼髙田則禾苗枯槁低田則積水㳽漫各都里正及佃户細民經官告状俱有堪信顯不期騐灾官吏不行詣田踏視從寔免征止坐各州縣衙門及諸寺觀逼令鄉胥里正一㮣伏熟繼後部粮官吏騐數納征其細民棄業迯亾十去八九但将各處里正絣扒弔打責限陪比破家蕩産终不能足幸蒙上司體察将里正人等發下所属州縣乃得䟽放立案擬于粮内帯征若今歲秋粮之時果于里正名下追征其里正百孔千瘡奚暇再剜其肉以𥙷于兹必着落原佃之人一同部内上下交征决致失所况連年兵革擾攘差科繁重里正人等俱各消乏誠不能以一歲之所收辦兩年之租賦縦使捶楚之下求而得之甚非國家愛民之意亦非諸大臣恤民之政也如䝉言諸省府移文郡邑從寛免征庶使里正之家免于破蕩力田之衆不致逋迯非惟今歲秋粮易于辦集而亦免下嵗荒廢其田矣除此民瘼斯民幸甚一抑豪强貧富不等借貸有之舊制民間私債月息三分年月雖多不過一夲一利而巳誠良法也近年以來其宦豪富强之家乗人之急取利過倍少有逋欠凌虐百端或于借貸之時勒令併利作夲虚立文約明取三分寔收過倍之數或有還欠利息倒換文憑利上生利或寛收窄放更昜斗斛或左右邀求減尅分例其舉逋還債之人阨于窮苦吞聲忍氣噤不敢語良為可閔上年幸而官府知之出榜禁約但乆弊不能頓除如䝉申明舊制定立罪名嚴加禁治庶使權豪嗜利之徒畏惧憲刑毋蹈前非抑强扶弱公道幸甚一積軍儲為國之要足食足兵然兵固不可無食而用也但頻年水澇嵗無全收如無錫常熟等處殘破之餘田地抛荒租粮减數今國家軍儲之用常恐不敷况凡有賞勞俱用米粟動以數百千石為無益之費至于青黄不接軍人有缺食之憂百姓有借粮之患窃甞觀之有司採辦米如珠璣濫賞嬴餘粟如塵土此理暁然人所共見今後宜從省府移文禀知太尉遇有㓛賞從公斟酌或加以多爵之榮或犒之金銀等物樽節米粮以偹飢荒如此則倉廪之積日增月羡漕運可供軍儲可給而民無和糴預借之患矣多積軍儲公私便益一增俸禄張官置吏夲以治民黜陟幽明𣣔其稱職然必湏俸禄足以養亷然後考其臧否而黜陟之庶可使之無憾矣今府州司縣之職最為繁難大小官吏之俸類皆鮮少仰事俯育寕免索心洗手奉公誠不昜得其間以貪汚黜罷者固不足惜而清貧亷介禄不償勞者上之人當軫念之如䝉建言夲省告之太尉以官吏俸給之數酌古凖今量加增益如此則居官者可以絶貪墨之心而百姓無侵漁之患矣傳曰忠信重禄所以勸士俸禄之增公道幸甚賀偰知府到任啓騎竹羣童争先逺迓杖藜一老敢進常談或可比乎芻蕘庶無棄于菅蒯甞謂州縣作民父母詩書為世範模必湏酌古凖今乃能承流宣化蟠根錯節毋令挫利噐之鋒流水髙山正𣣔奏朱絃之曲夫御吏治民之要惟正巳格物為先吏或奸欺民多疾苦但鄉無呌囂隳突之吏則田無太息愁恨之民照日月于覆盆轟雷霆于蟄户寛猛相濟恩威並行省刑馴致于無刑聼訟當期于無訟魯中牟之雅化官至司徒黄頴川之循良薦爲丞相苟有爲于今日亦何異于古人恭惟厶官屡世簮纓一門科第金薤琳琅之文采玉壺氷露之襟懐花縣相傳藹仁聲于荒服蒲鞭不用布徳澤于疲甿下車纔一月之間比屋皆二天之喜皜皜乎不可尚恢恢乎其有餘鷦鷯之巣一枝本非素志鳳凰之翔千里方進修程跂予望之自此升矣厶素甞仰斗近獲披雲過䝉禮貌謙謙喜聼政聲藉藉芘寒有頼獻曝何慚三十年黄河一清坐待太平之日九萬里摶風直上佇看大用之秋有猷有為善頌善禱龜巢藁卷之十六终
