front:
  text: 龜巢藁卷之十六
  hash: sha256:d33c803b10cef798a171ed3cd0427e9f98a22d3acecf73258653ec8d0c1d963d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0561_SBCK_016-1a}
body:
  text: 啓訟伯父墳地上縣宰啓掩骼埋胔古今之制其仁如天過家上冢者子孫之情伊誰無地顧丘壟之失所實風化之有傷瀝血寸丹陳情尺素切念某痛懷伯父曩厯兵戈死雖正狐首之丘時未集鴻飛之澤啓手啓足幸能四體之全歸若釜若堂詎信百年之難保蓋自陵谷變遷之後以致家門摧敗之餘失此故塋屬諸姻黨誰其主之展我甥兮此一錯在乎當時故陸沉至于今日渭陽之舅既無見念之秦龜隂之田那復肯還于魯然豈料人靣獸心之輩乃謀為兔葵燕麥之場雷厲風飛宰木頓空于斤斧日侵月削佳城亦壞于犁鉏殆將見暴骨之寒又何異鞭尸之慘三尺之法不畏匹夫之勇莫當向來不平之鳴屢致逢彼之怒鬪狠不顧輕性命于鴻毛匍匐而歸飽尊拳于雞肋是可忍孰不可忍如之何末如之何徒憎蒿里之悲每動窮途之哭既無靣于江東父老復何顔于地下祖宗日月不照之盆弗堪長覆天水違行之訟可憚終凶賴典章有禁地之條其情理實滔天之罪仰惟公道俯察愚衷恭惟某官讀萬卷書為百里宰氷其清玉其白絃之直稱之平寬猛適中剛柔相濟數月有撫字征科之績四郊無呌囂墮突之憂休休焉其有容皓皓乎不可尚聲蜚臺閣恩迓絲綸如某者受㕓為民閉門斂迹亦久𬒳卓魯之化烏敢虞芮之爭但悲夫九原之人𣣔掩以一壞之土願施善政垂戒惡人使知見舅如母之親勿為敗俗亂常之事復此牛眠之地仍為馬鬛之封想去家舊鶴重歸看銜土慈烏畢集凡春秋拜掃之日皆存亡感激之時上窮碧落下黃泉為雪幽冥之恥生當隕首死結草弗判斷之恩痛切之私敷宣罔既上于尚書啓么名傳字受道號止齋延祐乙邜科進士不封萬户侯願識韓荆州常切慕謫仙之志手把一封書上有皇甫字輒敢扣昌黎之門問胡為今日之來曰專為古人之事與其進也適我願兮嘗謂傳道不絶者先民之功沒世不忘者後人之義若道鄉鄒忠公之墓近在城隂有了翁陳先生之銘流傳天下孰謂此一丘之土盡廢于八世之孫鄉鄰忍于瓜分翁仲隨以蕪沒故諸生為之太息于當路鳴其不平賴二侯以公道主盟不半載而佳城復舊築思亭而薦蘋藻立華表以樹松楸茍非紀載之詳尚慮耕鉏之患立羊公一片石大書名世之言如季子十字昭示尊賢之意雖不咎于既往庶有輔于將來求之與之完矣美矣恭惟某官老成前輩文章巨公三千字禮樂縱橫在早歲修名揭日九萬里扶搖直上至晚年直氣凌雲典文衡則慎于稱停秉史筆則嚴于褒貶霞雲一􅊤將歸老于長洲茂苑之間霖雨八荒將拜命于安車蒲輪之召斯言非佞輿望所期某曩客新安聞公舊政復紫陽之闕里大振儒風勒黃絹之好辭有光吾道諒弗忘乎素志必重念于斯文惟大賢無不容則小子庶有造于以紀前言往行于以發潛德幽光當令梓里之間永若桐鄉之愛鏘如韶鈞蔚如虎豹雄文照耀于九京明則禮樂幽則鬼神妙理昭彰于千古存亡有感敷敘莫殫贄見余用中先生求作辨惑編序啓狂簡斐成章辨諸家之邪説品題作佳士必當代之儒宗夫瓣香敬為南豐蓋學者仰如北斗與其進也適我願兮嘗謂璞玉雖竒非和氏則山中之石琴材固美無中郎則㸑下之灰太玄經有覆醬之􅏺公羊傳有賣餅之辱古猶如此今豈不然𣣔立言圗不朽之傳必取正于有道之士嗟今陋俗舍正路而弗由集古遺言回狂瀾于既倒可奈一齊而衆楚猶如皆醉而獨醒驚人之鳥一鳴怪雪之犬羣吠願君斫堊為我折衷或衮褒一字之榮則價倍千金之重馮豐霳寄寥廓久矣馳情抉雲漢分天章豈辭揮手綱維吾道黼黻斯文兹蓋伏遇某官文章巨公典型前輩詞場較藝視五色之目不迷鄉國興賢使三代之風復振躬行古道歷踐華途每為政邑郡之間常蜚英臺閣之上歸從彭澤舊家北固江山教若河汾隱居南徐城市戶外之屨常滿門前之轍何多雖云遂莵裘之營必復有蒲輪之召如某旨俯慚後進仰慕先知尊其所聞行其所知愧未造髙明正大之域博我以文約我以禮誓弗忘仰鑽瞻忽之誠景慕有餘編揣摩罔既贄見李晉仲提舉求啓思忠公傳道之賢為裒遺事辨邪説誣民之枉乃集前言持布鼓于雷門分天章于雲漢恭惟某官儒林麟角學海龍門鍾山草堂之英靈雪竹霜松之標致懶折腰于彭澤早賦歸來聊濯足于滄浪亦云自取皓皓乎不可尚巳休休乎其有容焉然吾道賴以綱維而儒林視為儀表尚持藻鑒以主文衡名動京師柏府之薦章交上官居翰苑蒲輪之召命將臨先生自此升學者仰如斗某吳中晚進白下漫逰自憐如明月暗投誰復念陽春寡和汲汲有登龍之願拳拳慕倚馬之文方往依劉以圗御李𣣔因劉堯輔見公乃于劉處偶得識面低頭拜東野適因邂逅之間瓣香為南豐得展􅎋勤之敬敢持兩帙謹用三薰長年坐井􅔄觀天此日詣程門立雪倘賜五行之覽必蒙一字之褒登山采玉入海求珠捆載乃酬其素志製芰為衣紉蘭為偑激昂正賴其清風贄見楊亷夫提舉求序思賢録啓兩袖春風作洛下書生之咏滿船明月過關西夫子之門問胡為今日之來曰端為古人之事竊有請也能無從乎伏念生延陵季子之邦頗知禮讓復道鄉鄒公之墓當效馳驅樂民俗之還淳喜士風之近古思賢有録味道無厭紀前言往行之二三發潛德幽光之萬一自藏燕石誰售雞林恐公羊遭賣餅之􅏺使太玄有覆醬之辱願借春秋之筆特為月旦之評得一序以冠塵編若千金而加弊帚庶傳不朽有輔將來非惟先哲之有光真乃後學之多幸兹蓋伏遇某官乾坤清氣風雲壯懷走馬看長安花早嵗似唐人得意割雞為百里宰居官如言子愛人以文章政事之俱優宜天下國家之大用尚淹管庫未展經綸乂皆知大器晚成我乃獲景星快覩題鸚鵡賦巳多年傳麗則遺音到鳳凰池將不日遂平生髙志倚須瓜代入覲楓宸如某者敢不長遡下風永懷髙誼聞所聞見所見真如到神仙十二樓之間步亦步趨亦趨或可在弟子三千人之列其諸欣慕罔既敷宣贄見張用中教授啓黃魯直謁蘇東坡因述依松之志禰正平過孔北海乃蒙薦鶚之辭蓋同氣以相求必當仁而不讓敢持尺牘特造丈函恭惟某官海內儒宗江西詩派往歲為馬尚書賔客當時有虞學士品題謂鵬程萬里橫飛期鳳池十年可到道出羲皇才過屈宋何鄭公猶在于廣文上規姚姒下逮莊騷若韓子獨尋于墜緒先覺覺後已立立人四方之學者來歸一鼓而斯文作氣博求地利開玄武湖以廣澤物之功善育人才置治事齋而兼水利之意聲蜚臺閣恩迓絲綸如某者生長吳中栖遲白下顧窮居而獨善恐沒世以無聞著辨編惑闢近世之異端邪説作思賢録發前修之潛德幽光𣣔煩斫郢人之斤輒敢弄班門之斧平居抱膝仰太山北斗之髙此日承顔覩鳳皇景星之快天其或者道之行歟得華衮一字之褒增敝帚千金之價品題作佳士何慚奏白雪遺音吹噓上清冥或可借春風餘力答陳天倪謝薦師啓見賢而舉者古先之制惡敢言功昜子而教者夙昔之心幸逢知已豈意與互鄉之進亦勞賦小山之招恩斯勤斯至矣盡矣恭惟容齋先生玄玄衆妙休休有容身雖領袖宗門學則淵源吾道小樓明月勝元龍百尺之豪髙枕白雲待丹鳳九重之詔有前人風烈為後學範模如某者與緇黃交能青白眼獨喜子墨名儒行非他人虎質羊皮通家隨三十年責善難一二計兹荷愛烏之及特厪遺鯉之書曲憐覓梨棗之免特命入芝蘭之室從明復受春秋之業看希夷畫太極之圗熊魚何幸乎兼得犬馬當知其所報道院迎仙書堂隱相增爽氣于西山鄰家乞火小窗分燈藹餘光于東壁銘心有感筆舌奚殫謝監察御史火公舉茂異啓天朝重耳目之官實居清要風憲擢山林之士非市私恩蓋竹頭木屑有可之時而茅拔茹連乃必然之理敢因竒遇庸布謝言竊念某家本吳中客兹江左以芰荷為衣秋蘭為佩訪鍾山之英草堂之靈作山川司馬壯逰負湖海元龍豪氣自憐骯髒誰問飄零瞻烏蒼柏之間歌鳳古臺之下幸逢驄馬蒙試雕蟲叩大小從容之鳴以盡其聲收輪囷離竒之材而為之器使李白立階前地如毛遂脫囊中錐得之若驚觀者如堵兹蓋伏遇某官身居臺閣腹中詩書凛凛乎動搖山嶽之威惓惓乎樂育菁莪之意植公門之桃李蓄相籠之參苓昔中州草木知名今南國衣冠俱化三省十道俱聞鐵靣之威一日九遷將拜玉音之召風塵一掃霖雨八荒如某者敢不恆念品題益加修省行日用常行之道讀生平未讀之書雖蒲桞之質望秋先零而薑桂之性到老愈辣惴惴焉出門下誓不忘一瓣之香耿耿者在胸中當自愛千金之帚代羽士上亷訪僉事啓上士無爭奉先師之明訓監主自盜奈公論之難容故鳴鼓而攻之若同室而鬪者竊念某李老君弟子住焦真人道場小小山林設住持之主席區區金帛有交代之成規比因樽節年多致有羡餘日積𬒳前職鼠偷狗竊使空山鶴怨猿驚當市攫金衆所共見匹夫懷璧罪實難逃巳嘗赴訴于有司且復陳詞于教所始則強項不屈終乃搖尾乞憐遂以當仁不讓之心聼其用和為貴之説乃償薄産以輔亡金未幾背插血之盟又復為紾臂之奪用朝三暮四之術專務貪婪逞人一已百之能肆為欺罔楚弓得失秦鏡咨度勞六轡之驅馳亷法亷辨亷善亷能按百官之能否明月靡遺罅隙清風一掃塵埃眷兹寂寞之濵亦在照臨之下豺狼斂迹草木知春激濁揚清既憲綱之振肅舉直錯枉宜公道之昭彰或移北山之文或賜南山之判戒無厭溪􅊤之欲征悖入府庫之財庶有輔于將來更無煩于訟牒思之弗措辨之弗措願亟持全璧之歸得之若驚失之若驚當永守青氊之物謝崑山梅州判舉鄉善啓儒雅闡大猷漢室之興復見品題作佳士荆州之識為榮矧蒙下采于菲葑豈作不言之桃李寸丹有感尺素具陳某官佐理神州賢勞王事虛心待物明于滄海之珠美德含輝粹若崑岡之玉有賢守與承流宣化在寮寀則同寅協恭切切斯民惓惓吾道氷霜並潔風月平分南山之判不移北闕之心長戀二千石不如逢掖下士尤勤九萬里直上扶搖前程甚逺吾言非佞輿望所期某久客東吳逺逃兵燹功名蹭蹬昔為竹上之鮎身世飄零今作無枝之鵲偶爾宿贊公土室􅌂然逯梅仙市門聼髙山流水以知音驚明月夜光以投暗説項不輒薦禰有書駕言采泮水之芹何異繼廪人之粟驥千里未甘伏櫪鳥一鳴或可驚人翺翔道義之林涵泳詩書之澤鄉之善士國之善士尚期自下以升髙知惟春秋罪惟春秋勿謂有名而無實賀陶教授啓鄭廣文才過屈宋坐一氊而司業相憐胡安定教授蘇湖置二齋而太學為法升髙自下振古如兹恭惟某官胸襟貯萬卷書文章揮五色筆頻年花縣絃歌之化大行今日薇垣贊畫之才方展王公大人以青眼相顧縉紳先生以白眉見稱兹泛緑以依紅將腰金而曵紫一節既全其清白百憂當念乎羣黎願為龍伯髙勿效杜季良恪守祖傳之家法近舍皇甫湜逺取白居昜當求用世之人才跂豫望之自此升矣某逺逃兵燹久客勾吳秋菊寒泉祠甫里見尊賢之義長洲茂苑頌鄉校勒輿人之言巳知和白雪之詞但未覩景星之象由村落以來城府見軍民多困飢寒敢用條陳以效芹獻于以開難發之口于以推不忍之心區區非釣夫虛名懇懇必求其實效蒼生顛崖受辛苦隔羣仙天上清髙大芘廣厦俱歡顔願比屋眼前突兀代謝沈太守啓一輪明月清輝今照蘇州萬里長風素志乃如宗慤念先人遺澤挈孤子于長途知幸自天感恩無地恭惟某官乾坤清氣風雲壯懷既不忘向日之誠且深識隨時之義往年烏府冠峩豸角之威此日黃堂庭蔑鼠牙之訟退食則斑衣以娛父母傳家則黃卷以授免孫鞭不施蒲莊先種桞豈弟咸稱召杜勳名必到蕭曺三江五湖之風謡政聲藹藹四海八荒之霖雨輿望懸懸遺愛甘棠流芳汗竹如某者仰依公庇勉讀父書既巳承薦鶚之章當不負愛烏之及備參苓于藥籠作桃李于公門庶竭駑材以圗豹變父為大夫子為士賴提携發軔之𥘉車如流水馬如龍願追逐後塵之末其為報效罔既敷陳上沈太守啓太叔為鄭大夫始從寬而終猛不疑謁暴公子先言威而後恩惟大海不擇細流故他山可以攻玉請以田夫野老之語陳于大人君子之前切以某近寓吳江偶經荒浦聞近日有鼠竊狗偷之輩各都如蜂屯蟻聚之多始則穿窬終為強禦忽忽乎神出鬼沒纍纍然晝伏夜行星月光中窺商賈他鄉之客煙波深處伺妻孥逃難之人或如斫嚴顔之頭或如斷孤免之臂橫尸洲渚流血泥沙遺臭衝天銜哀入地掩鼻而過者多矣垂泣而道者誰歟鄉鄰懼而不言州縣置之不問致令滋蔓轉肆凶頑目之所覩者如此其多耳之未聞者尤為不少新鬼煩冤舊鬼哭痛恨難忘他生未卜此生休衷情誰訴惟當路發神明之政為斯民雪冥漠之冤三尺法申明紀律五色棒掃除羣醜寬猛相濟不勞用苻澤之兵恩威並行何待持繡衣之斧一雷既振百蟄俱驚恭惟某官俊傑識時精忠貫日清氷出萬􅊤此往年烏府威聲明月照蘇州乃今日虎丘嘉話甘棠樹聼召伯之頌老萊衣照蘇堂上之親愛民若拙于征科下士能勤于吐握五花馬金章紫綬方𬒳殊恩六桞莊緑水青山未容髙興政須治最以候登庸如某者幸獲承顔甚慚饒舌聞而來見而去仰山斗之彌髙道以政齊以刑看民風之丕變上梅知州陸同知啓莨莠下除必有傷于嘉榖盜賊不息寧無害于良民目前事可為寒心林下人敢云饒舌俯慚卑陋上瀆髙明切以某為客松陵􅋈舟荒浦聞近日有鼠竊狗偷之輩在各鄊如蜂屯蟻聚之多或穿墉以踰垣或發匱以胠篋或牽去春耕之犢或移人夜泊之舟或劫行商囊槖為之席􅐈或因逃難妻孥與之偕亡或如斫嚴顔之頭或若斷孤兒之臂慘慘星月見遭毒手渺渺煙波逸去凶身濺血菰蒲伏尸洲渚漂流于五都十都之境臭腐于六月七月之時里正不敢言恐煩撿覆鄉鄰寂無語懼有干連致使跳梁轉加延蔓天隂地􅊜但聞冤鬼之聲水逺山遙渾是愁人之景惡貫既滿禁網難逃今有司獲盜窈之徒宜因事究凶強之黨幸母姑息函賜施行轟雷霆于掩耳之先照日月于覆盆之下追三窟兔須旁求曲徑之蹤殺兩頭蛇方能免後人之患餘罪戾之輕者加徒役而逺焉庶令涇渭殊流不致薰蕕同器蓋治非常之盜必加以非常之刑雪痛怨于黃泉聼歌謡于緑野恭惟某官同心同德無黨無偏閭閻蒙撫字之恩案牘絶煩苛之弊訟庭如水印匣生塵明月清風暫爾居淞江太湖之上髙牙大纛翩然到蘭臺鳳閣之間人皆仰之自此升矣如某者言雖僣越事實昭彰祗緣以兔死狐悲未免較鶴長鳬短溺猶已溺望明公擴仁愛之心刑期無刑變惡黨為仁良之俗幽明有感贊美奚殫代上江浙丞相求蔭敘啓上書伏光範門韓愈以布衣自進斗酒酌新豐市馬周于逆旅誰知仰止三台素非一日惟吐哺握髮以下士敢披肝瀝膽以陳情切念某生毗陵錫谷之墟客吳郡長洲之滸早年勤苦頗讀父書連歲孤寒且罹兵燹竄妻孥于荆棘揮涕泗于蓼莪學弓為箕學冶為裘尚賴傳家之業在無父何怙無母何恃孰憐逰子之歸遲望西日之長安歎南風之不競鬱鬱居此遑遑何之芰為衣蓉為裳苐慚沒世而無聞有負先人之遺澤𣣔求蔭敘願借恩光雖云無麟角鳳觜之竒亦庶幾竹頭木屑之用持衡留藻鑑天書適降于九重隨水上龍門巨浪可乘于三汲鯤鯢變化鵷鷺翺翔兹蓋伏遇某官簡在帝心股肱王室保江浙數州之地障東南半壁之天以和靜鎮國家量同文靖有忠勳塞天地爵比汾陽公門之桃李欣榮藥籠之參苓並蓄五風十雨頻年見隂陽調燮之功寸地尺天指日復疆里廣輪之舊恩加衮舄銘在鼎彛如某者幸獲瞻依宜蒙拔擢大木為杗細木為桷良工得國用之宜南山有臺北山有萊君子致太平之樂永言報效盡力馳驅賀上海石縣尹啓郎官應列宿方照臨滄海之秋鴻毛遇順風乃奮起青雲之日敬陳賀語兼進忠言嘗觀時有盛衰道無今古為國者必以人民為夲有司者必以父母為心擾攘雖值于難時撫字合由乎古道簡編所載矩矱具存曰既庶既富而教之曰足食足兵而信矣曰孝弟可盡堯舜之道曰忠信可撻秦楚之兵惟教化能結其心斯奮發以盡其力小而一邑大則九州是道為農桑學校之原其事乃錢穀兵刑之屬苟一日而必葺斯三年而有成倘不鄙常談老生洵可謂知言君子某官心存愷悌氣稟髙明先世稱萬石君其道義傳家之久今官為百里宰蓋居功名發􅮾之𥘉以胸中所藴之詩書為目下可行之政事征科不廢撫字尤勤春風藹田野如春民無愁歎明月照閭門似水吏絶喧囂釜魚之聲譽巳聞堂鱣之禎祥必應行書上考佇見髙遷某幸屬故知喜聞新政彼客燕皆能賀履豈窮猿反不投林東入海西去秦擬𣣔依棲于贊老昔無𥜗今五袴願同歌詠于吳儂諸士友陳言陸同知誣枉事啓排難解紛竊慕古人之髙義舉直錯枉宜蒙當道之公心芻蕘有言葑菲可采切見􅉴江州同知陸公某職居佐二政出循良三載守官一亷如水自許以赤心報國人皆知洗手奉公豈意權豪乃加排陷以兵戍干有司之政以文移行無妄之災舁一夫病死身尸勒其子巧生詞訟聚衆擁停尸之地環若重圍當官逼忤作之人傷皆誣驗強梁若此毒害顯然越官職以橫行違憲章而不顧各州縣聞之而喪膽諸士民覩此以寒心赫然恣逞其凶威甚矣有傷于治體是可忍也尚何言哉仰惟上相之賢明俯察本官之冤枉照覆盆之日月即見昭彰遏平地之風波毋令陷溺如某等與夲官𥘉無私愛且隔鄰封聞一州有賴其主張知百姓多蒙其恩惠昔頌德于三江五湖之上今稱冤于萬口一辭之間其言至公而無私所願抑強而扶弱直為壯曲為老當明曲直之情危而持顛而扶庶免顛危之辱宜加采擇特賜施行上量田徐孟二公啓立國以經界為先當盡革其中之弊生民以稼穡為夲方能供在上之需惟任用之得人乃公勤而稱職𣣔陳梗概敢效芹誠嘗謂朝廷革命之𥘉才俊為時而出凡所以體國經野皆可以忠君愛民况皇家付尺度之公要農畝定租庸之法甲是乙非者固當分辨鶴長鳬短者尤宜折衷為前代除毒斂之蛇免後人為涸轍之鮒此當務之為急其任非輕但至公而無私所行必逹某官同心同德無黨無偏志如百鍊之鋼下為徺指事若重調之瑟能用改絃雖寸田尺宅皆入版圗而賸水殘山猶蒙紀録田野既揚其聲譽銓衡必録其勤勞同升諸公一臺二妙某生夲常郡寓此吳鄉如去邠而居岐敢因徐而見孟願求荒圃學為老農春雨一犁駕烏犍而東作青雲萬里看黃鵠之雙飛上王知府啓玉門關兩鬢秋霜歸來晚景金牛臺一輪明月喜挹清輝人皆作未暮之春我𣣔快爭先之覩騎竹失隨于童子杖藜敢謁于宵人既獲披雲亦言獻曝嘗謂農桑者民生之本學校者風化之原其在有司亶為急務眷此常郡即古延陵二十年兵革以來𢾗百里人煙𣣔絶犁鉏不作絃誦無聞大田皆變為荆榛泮宫亦燬為瓦礫今天下全歸于大統而郡中方集其遺氓如谷寒而鄒律重噓若絃斷而麟膠再續民何以勸惟恤民則民乃力農學何以興惟重士則士皆志學嚴一鼓而作氣必三年而有成田野闢而賦稅增教化行而習俗美上以副聖天子明詔之意下以著賢邦侯善治之功斯文黼黻乎皇猷舉世甄陶于清化渤海郡勸農龔遂復見于今成都府興學文翁罔專于昔茍二端之並舉則百廢之具興幸無謂先生常談真可與古人同傳某官三槐世胄五馬恩榮金莖露之澄清玉壺氷之潔白有民人有社稷雅稱弘才為保障為繭絲會能兼美飽夙學于胸次急前務于目前報主赤心待士青眼吐握行周公之禮謙德彌光循良希漢吏之賢芳名不朽如某幸然歸魯得此依劉三十年辛勤有廬𣣔訓城南之子千萬間突兀廣厦願蒙庇天下之賢頌禱有餘敷宣罔既謝孫大雅惠詩文啓寄壯甫題草堂舉世頌髙公之句送李願歸盤谷至今傳韓子之文故詞章誠有可嘉則名譽皆為不朽感承傑作敬敘謝言某生長延陵夲同鄉土喬居吳郡俱避風塵既聲迹之相聞且音問之不絶千萬人之前常承説項十五年之內惟欠識荆嘗結巢為蓮葉之龜來詩甚美至還家若華表之鶴得序尤佳顧豫生非李杜之儔視所作乃髙韓之比陽春寡和明月暗投巾箱謹于珍藏棐几時乎圭復想丰采于氛埃之外見肺肝于文字之間投桃報璚兹抒倩于尺素如葭倚玉别請教于丈函某官以申浦之澄清鍾于姿稟以君山之蒼古發于文章馳驅莊騷出入佛老鳴教鐸東吳者久投朝簮北海之濵枕流漱石而有祖風弄月吟風而忘世慮山中曆日看黃揚厄閏之年天上春風待紅杏倚雲之日如某者素慚孤陋雅愛交逰味六經如嗜膏梁親三益便成膠􅃮江東暮雲之酒願與論文山隂雪夜之舟尚期乘興雷門持鼓郢匠揮斤謝張雲門作詩序啓魯直獻東坡二詩蓋𣣔見瞻依之志士安敘左沖三賦方能無非議之詞蓋當世鴻儒乃後學之龜鑑寸丹方感尺素具陳伏念某田野草莽山林樗櫟不揣鉛刀之鈍常持鐵硯之堅鮎上竹竿往歲之功名可笑龜巢蓮葉近年之身世如浮八九家寂寞江村三千丈蕭騷白髮出言爛熟作字迂踈寤疑辨惑以成編懷古思賢而有録頽然詩癖忘乃途窮時抱膝為梁父吟或掩鼻作洛生詠對明月清風而思玄度藴髙山流水以待鍾期持鼓雷門探珠􅌐頷得警䇿片言而為幸豈舂容大篇之敢望珠璧暗投璚瑶非報不識面而知肺腑可謂神交如寫容而見精神珍藏手筆披雲未遂仰斗彌髙恭惟某官四海儒宗一門科第為時而出不勝烏鳥之情謝病而歸非為鱸魚之美以東山吳之山水為西漢之文章托古意于焦桐播遺芳于藂桂風月襟懷江湖雅氣本磊落之竒才泉石膏肓煙霞痼疾享優遊之清福道則髙矣人皆仰之如某者敢不佩服斯文勉旃爾力幣甚千金之帚榮哉一字之褒廢繩墨不為拙工灼見用春秋之筆經品題便作佳士惟恐孤月旦之評瞻望依依臨書草草擬與金壇縣告索尹氏寄書啓賣金買書自是平生之志刻舟求劔難忘眷戀之情雖吳霜巳白其頭顱惟秦鏡能明其肝膽敬持尺素用寫寸丹念某避地曩年泛湖連日移舟至尹干橋下依乃姻家藏書如孔氏壁中扄諸奧室物其多矣人皆見之三十年賤迹飄蓬數百卷常懷汗竹豈知瓜葛乃變薰蕕以諸史之青編昜兩牽之黃犢餘存簡牘悉入巾箱屢云還合浦之珠竟不返連城之璧朝經暮史𣣔重對于聖賢甲是乙非合辨明于官府是可忍孰不可忍求之與抑與之與惟當道之至公庶斯文之不墜聼其言也適我願兮某官承恩九重出宰百里乃氷其清乃玉其白如絃之直如鏡之明以識時俊傑之才了積年繁劇之事戴星出入雙鳬暫止于金沙摶風扶搖孤鳳必巢于阿閣某逺來鄰邑如倚大山鶴溪水天影涵秋比琴堂之清徹米家船虹光貫日載書簏以還歸擬謝常州府官啓曽參以同姓殺人其母嘗投杼而走黔昜非在家遘疾厥子乃驚心而歸奈何事出于鄰封甚至弊生于夲邑幸大府能為辨析今微言合用敷陳切念某乙老窮居苦守株于橫峴丁男逺出因負米于荆溪疊疊乎縣帖拘追纍纍乎里人𬒳執始自三月三修禊之日皂隸登門遂令八十八老耄之年倉皇赴縣換名字如雲翻雨覆動文移則雷厲風飛陷阱𣣔成網羅交設南阮貧北阮富姓雖同而産業不同東家丘西家愚人有異而鄉閭亦異故奔訴甘棠之下蒙戒懲刻木之徒號咷徹乎二天枉屈為之一雪伏遇某官等同宣聖化並著仁聲召父杜母之慈祥春濡秋露礬弟梅兄之清白月映氷壺閭閻響擊壤之歌城郭寢擊柝之聲行書上考佇俟髙遷如某者父子知恩鄉鄰感德覆蕉藏鹿夲無夢于前時緣木求魚免受災于後日報當銜結力效馳驅上周縣尹請祭顧將軍啓孔北海表鄭公鄉人皆起敬文潞公題明道墓學者知歸蓋追敬于儒先實有禆于風化敢持尺牘用徹琴堂某老不趨時心猶好古覽中吳之勝概訪前代之名賢笠澤西頭皇天蕩煙波相接葑門東畔顧將軍丘壟猶存藂祠倚馬鬛之封荒蘚沒龜趺之石每經斯地常念斯人生為吳相之孫死有元公之諡華亭二陸𥘉齊名得三俊之稱白羽一麾獨仗義平六州之亂晉史備書其勳業吳儂尚保其祠塋但每歲之蒸嘗欠有司之籩豆不揣效豐干饒舌敢云煩陶令折腰蘋蘩失薦于鬼神桑梓愈加其恭敬此非違道以干譽幸不以人而廢言恭惟某官以董賈之才為卓魯之政乃氷其清乃玉其白如絃之直如鏡之明見義勇為當仁不讓有民人有社稷國家委任之隆教禮樂教詩書流化承宣之急行書上考佇見髙遷某飄泊長洲蕭條短褐投老二天之下知名兩月之間其言至公而無私其事似緩而實急生芻一束其人如玉望喬仙雙舄之鳬寒鴉數點流水孤村弔華表十年之鶴干陳敬𥘉先生作懷古録序啓懷賢千古聊綴緝夫前言借重一辭庶流傳于後世竊有請也能無從乎眷我楚狂久客吳中過鳳凰嶺顧彥先之墓有感而傷傾鸚鵡杯李太白之詩長歌而擊節甚矣疾薰蕕同器忍乎隨桃李不言豆籩既請于有司丹青乃新其遺廟屏除妖塜祭掃佳城縉紳皆為之歌咏樵牧則嚴于禁約載噓藜𦦨用寫蒲編于以發潛德之光于以紀廢興之事過雷門持布鼓敢曵長𥚑抉雲分天章煩揮健筆某官居玉堂之署人慕登瀛紬石室之書自當名世為士林冠冤演王國經綸目短曺劉汗流籍湜大鵬九萬里扶搖直上之秋黃河三千年會見重清之日前程逺大吾道光榮某不揣迂踈尚希題品書八篇因窮而著𥘉不效于古人賦三都得敘而傳誠有望于今日代上饒參政啓叔向知鬷蔑因聞堂下之言毛遂從平原乃脫囊中之頴既古人有如此者豈今日獨不然乎切某幼讀父書從逰都邑聞所聞見所見囿先生長者之鈞陶步亦步趨亦趨習王公大人之規矩辭親日下奉檄浙東干戈擾攘者閲五六年鞍馬馳驅者知幾千里及區區益升斗之祿又紛紛服州縣之勞栖枳棘于慈溪望蓬萊于滄海既失怙恃遂用來歸兄弟飄零狀若喪家之狗功名蹭蹬誰憐失水之魚然此膝不屈于常人而其志敢忘于斯世家徒四壁壯氣橫秋但知讀書以聖賢為師未嘗出門與流俗為伍髙山流水賴有知音明月夜光忍令投暗鷙鶚之書既作鯤鯨之化何疑惟大匠無可棄之材宜小子有相依之志參苓藥籠桃李公門恭惟某官俊傑識時耿介拔俗隴雲可悅巳常似山中宰相之間仁風載揚今復慰天下蒼生之望胸次炯玉壺氷露文章垂金薤琳琅借箸而籌入則告嘉謀于公府纍茵而坐出則參大政于薇垣已立立人先覺覺後行吾道于干戈之際救斯民于塗炭之中幾千仭廬山衆人所仰五百年名世非公而誰如某者慕藺許年依劉今日襪線之才雖短葑菲之采不遺朝取一人暮取一人莫非荷提撕之力待以國士報以國士當不忘感激之恩輕瀆崇嚴重加悚息上張太尉啓蘇轍上韓太尉書所願覩賢人光耀馬周寓常中郎館即能以時務條陳不揣下愚敢希前輩敬以惜軍愛民之事陳于王公大人之前聞斯行之時則可矣嘗謂有民有社須當畫䇿以治安足食足兵乃可運籌而征討準今酌古發政施仁苟𣣔展心上之經綸必先察有司之利病勿求近效宜作逺圗開荒田則為富國之原設屯田則為守邉之計除民瘼則免誅求之苦積軍儲則無匱之之憂廣鹽榷之法則逺近流通恤軍士之家則存亡感激凡兹六事盡在一時日月雖明固難照覆盆之地風雨不動願蒙庇廣厦之天布以新條革除舊弊惟其愛民如子必不以人廢言詢我芻蕘教人稼穡昜其田薄其稅民力方紓居有倉行有糧兵威自振幸無吝一舉手一投足之力更勿辭三握髮三吐哺之勤庶士夫得進其忠言而軍民免令其失所恭惟太尉相君英雄蓋世度量容舟以嵩髙維嶽之英靈為海納百川之襟度興利除害更張漢瑟之絃革故鼎新重作禹書之貢西鄙之煙塵去逺東吳之風俗還淳見諸生如見大賔保斯民若保赤子天上天下咸知向日之忱江北江南共仰福星之照名垂竹帛勳在鼎彛某十載風塵一篷煙雨辟地居淞江之滸憂天如𣏌國之人功名雖負于素志窮困尚憐于黔首或有一得何忍三緘知我春秋罪我春秋𣣔救顛崖之辛苦待以國士報以國士終當範我之馳驅俯竭葵傾仰希藻鑑賀蔡教授到任啓建學立師夲三代之良法化民成俗即二南之遺風夫以世衰而道微其必人存而政舉喜聆木鐸敢進芻言眷此崑山舞丹崖之鳳石沛然婁水接蒼海之鯨波以山川如是之竒况人物由來之盛紛紛顯宦比比髙門豪如劉龍洲而寓焉賢若李樂菴以居此適值近年之兵革遂忘舊日之衣冠城郭是而人民非禮義廢而政教失幸鄉校之不毁今學宫之苟完有司奔走于豆籩多士趨蹌于禮樂但龍蛇之混雜有鳬鶴之短長中也餋不中才也養不才政賴鈞陶之力仁者謂之仁知者謂之知豈無區别之心惟自今秦鏡之明更不致齊竽之濫大杗小桷匠氏固無棄才貴玉賤珉識者自能定價嚴一鼓以作氣必三年而有成恭惟某官心醉六經眼空四海杏花氊上重來鼓焦尾之琴荷蕢門前試聼擊有心之磬胸次炯玉壺氷露文章垂金薤琳琅曩嘗居淮海維揚人共仰太山北斗能不失前賢規矩真可為後學範模苜蓿闌干且莫厭一官之冷菁莪長育當挽回吾道之春立登要津八居翰苑如某者蹉蛇仕路流落他鄉不能看長安之花乃亦采泮池之藻聞所聞見所見星鳳見覩而快哉步亦步趨亦趨蘭鮑久居而化矣為王叔才通吳伯善啓魯連為解紛而出斯為天下之竒陳平能宰社而均終作朝中之相苟有為于今日亦何異于古人今一見之竊有請也恭惟某官河山清氣丘􅊤間情雖爵祿不入其心惟孝友是亦為政車乘下澤稱鄉里之善人樓卧上床夲湖海之豪氣律吕鳴朝陽之鳳階庭舞荀氏之龍惟其博古通今所以出類拔萃有文舉座上之客而開樽常滿聞鬷明堂下之言而執手相知近者悅逺者來親踈無間剛不吐柔不茹好惡惟公藏器待時在邦必逹某許年慕藺此日識荆深知有長者之風輒敢訴不平之事曩令猶子勉作鹽商同客嘉禾王吉父與成交昜親書片楮孔方兄俱付撿收不料墮其計中從此置諸度外屢約屢爽轉富轉貧但知堆滿屋之金不肯返連城之璧况視豫之流落尤縱意而欺凌獸心忍負于朋儕狡窟乃居于仁里望公秦鏡照我覆盆能扶顛以持危必舉直而錯枉風行草偃水到渠成是猶解戰國之紛何異宰鄉人之社道之禮樂示之好惡豚魚必感而相孚失之東隅收之桑榆犬馬當知其有報心有所憤書不盡言為王叔才訴神文亘古亘今人世有難明之事誰曲誰直鬼神能灼見其情雖聰明正直之有司必禍福吉凶之有報請陳始末用徹幽明切念某至正十有五年作檇李異鄉之客統鈔三百餘錠買吳江同姓之鹽託在契交信從期約立文憑之一𥿄比重諾之千金豈其反面無情從此掉頭不顧彼已跨腰錢之鶴我乃求緣木之魚日往月來馴致遷延之久雲翻雨覆不勝變詐之多故連年空打白崖至今日競成烏有交情既絶禮貌全無本來似鮑叔相知每去如魯侯不遇彼因積富致鹺物之如山我則固窮避兵戈而失路不念流離之苦轉加欺罔之心日月不照于覆盆風雨自安于廣厦昔伊過我待為席上之珍今我求伊視若眼中之刺是可忍孰不可忍如之何末如之何既告于鄰里鄉黨之間當質諸上下神祗之右吾言若謬甘受天誅彼語如誣當受遭隂譴願洋洋之如在降濯濯之厥靈有感必通如響斯應舉直錯枉必須天理昭彰福善禍淫庶使人心畏服上周郎中陳言五事啓李白識韓荆州雖萬户之封非其所願鬷明見鄭叔向惟一言之善得以相人今區區慕足下之賢敢切切論目前之事上以禆國家之清化下以慰郡縣之蒼生逺視𣣔明邇言可察兹蓋伏遇某官乾坤清氣風雲壯懷向坐黃堂著蒲鞭之善政今遷畫省冠蓮幕之諸賔有撥亂反正之才盡扶顛持危之力心不忘乎向日義不失于隨時英聲蜚九重之天遺愛溢三吳之地和氣挽回于寒谷恩光照及于覆盆見多士如見大賔保斯民若保赤子能興利以除害不吐剛而茹柔史編當紀其循良鈞軸政須其贊畫門墻羅列好多陪桃李之春鼎鼐調和有大用鹽梅之日更勤吐握以廣咨詢如某者甫里索居太山髙仰折桂之功名蹭蹬衡門之心迹栖遲雖讀書以聖賢為師但出門則農圃為伍東鄰西舍痛遭毒斂之蛇南枝北風多作無依之鵲太息愁怨之聲常聞于田里呌囂墮突之吏每見于鄉鄰况軍儲不積則時有借糴之憂而官俸太輕則必有侵漁之患此皆係百姓之休戚疇能出一言以發揚惟大人肻念乎羣黎故小子敢輸其忠赤非甚髙難行之事非荒唐謬悠之談是曰是非曰非尚從公論聞所聞見所見奚敢飾詞宜改絃而更張勿刓印而弗豫他有剝床而請者别當借箸以籌之溺猶已溺飢猶已飢斯謂愛民之術仁見為仁知見為知𥘉無私已之謀饒舌云云優容幸幸謹奉啓併以所言五事開具詣省幕以聞伏惟台慈鑒念一開荒田夫民之有田猶魚之有水也魚無水則枯而死民無田則飢而斃原民之情豈不𣣔治田以養其生哉今長洲縣崑山州等處水深圍田積荒嵗久無錫常熟等殘破地面荆棘連天其各處流移之民糊口四方而無卓錐之地是皆𣣔業耕以飬生者也但所慮者犁鉏才舉即有征科廬舍未完便當差役是以寧受艱辛且逃租賦寧甘窮餓不還鄉土每歲雖蒙官司招諭復業及委官勸農不為不至而民之所慮如此遂成虛名况各處低田圍岸久壞非一時可以修築積水甚深非一時可以車戽必須隔年料理以俟春耕田家作苦筆舌難盡如蒙呈逹省府行下各州縣踏勘荒田數目參酌至元年間燕參政開荒舊例聼令諸人請佃每年不過若干𥘉年官不徴糧私無租課應干雜役俱得優免次年公私半徵三年成熟然後全徴如此則人皆為飬生之謀而不憚工力之費年間官糧數增國家享無窮之利矣開此荒田官民兩便一除民瘼為政以恤民為先若夫民瘼未除而謂能恤之者謬矣然今之民瘼未昜枚舉姑以前月切近者言之如崑山州等處去年旱潦相兼髙田則禾苗枯稿低田則積水瀰漫各都里正及佃户細民經官告狀俱有堪信顯不期驗災官吏不行詣田踏視從實免征止坐各州縣衙門及諸寺觀逼令鄉胥里正一概伏熟繼後部糧官吏驗數納征其細民棄業逃亡十去八九但將各處里正絣扒弔打責限陪比破家蕩産終不能足幸蒙上司體察將里正人等發下所屬州縣乃得疏放立案擬于糧內帶征若今歲秋糧之時果于里正名下追征其里正百孔千瘡奚暇再剜其肉以輔于兹必著落原佃之人一同部內上下交征決致失所况連年兵革擾攘差科繁重里正人等俱各消乏誠不能以一歲之所收辦兩年之租賦縱使捶楚之下求而得之甚非國家愛民之意亦非諸大臣恤民之政也如蒙言諸省府移文郡邑從寬免征庶使里正之家免于破蕩力田之衆不致逋逃非惟今歲秋糧易于辦集而亦免下嵗荒廢其田矣除此民瘼斯民幸甚一抑豪強貧富不等借貸有之舊制民間私債月息三分年月雖多不過一夲一利而巳誠良法也近年以來其宦豪富強之家乘人之急取利過倍少有逋欠凌虐百端或于借貸之時勒令併利作夲虛立文約明取三分實收過倍之數或有還欠利息倒換文憑利上生利或寬收窄放更昜斗斛或左右邀求減尅分例其舉逋還債之人厄于窮苦吞聲忍氣噤不敢語良為可閔上年幸而官府知之出榜禁約但久弊不能頓除如蒙申明舊制定立罪名嚴加禁治庶使權豪嗜利之徒畏懼憲刑毋蹈前非抑強扶弱公道幸甚一積軍儲為國之要足食足兵然兵固不可無食而用也但頻年水潦嵗無全收如無錫常熟等處殘破之餘田地拋荒租糧減數今國家軍儲之用常恐不敷况凡有賞勞俱用米粟動以數百千石為無益之費至于青黃不接軍人有缺食之憂百姓有借糧之患竊嘗觀之有司採辦米如珠璣濫賞嬴餘粟如塵土此理曉然人所共見今後宜從省府移文稟知太尉遇有㓛賞從公斟酌或加以多爵之榮或犒之金銀等物樽節米糧以偹飢荒如此則倉廪之積日增月羡漕運可供軍儲可給而民無和糴預借之患矣多積軍儲公私便益一增俸祿張官置吏夲以治民黜陟幽明𣣔其稱職然必須俸祿足以養亷然後考其臧否而黜陟之庶可使之無憾矣今府州司縣之職最為繁難大小官吏之俸類皆鮮少仰事俯育寧免索心洗手奉公誠不昜得其間以貪汚黜罷者固不足惜而清貧亷介祿不償勞者上之人當軫念之如蒙建言夲省告之太尉以官吏俸給之數酌古凖今量加增益如此則居官者可以絶貪墨之心而百姓無侵漁之患矣傳曰忠信重祿所以勸士俸祿之增公道幸甚賀偰知府到任啓騎竹羣童爭先逺迓杖藜一老敢進常談或可比乎芻蕘庶無棄于菅蒯嘗謂州縣作民父母詩書為世範模必須酌古凖今乃能承流宣化蟠根錯節毋令挫利器之鋒流水髙山正𣣔奏朱絃之曲夫御吏治民之要惟正巳格物為先吏或姦欺民多疾苦但鄉無呌囂隳突之吏則田無太息愁恨之民照日月于覆盆轟雷霆于蟄户寬猛相濟恩威並行省刑馴致于無刑聼訟當期于無訟魯中牟之雅化官至司徒黃頴川之循良薦為丞相苟有為于今日亦何異于古人恭惟某官屢世簮纓一門科第金薤琳琅之文采玉壺氷露之襟懷花縣相傳藹仁聲于荒服蒲鞭不用布德澤于疲氓下車才一月之間比屋皆二天之喜皓皓乎不可尚恢恢乎其有餘鷦鷯之巢一枝本非素志鳳凰之翔千里方進修程跂豫望之自此升矣某素嘗仰斗近獲披雲過蒙禮貌謙謙喜聼政聲藉藉芘寒有賴獻曝何慚三十年黃河一清坐待太平之日九萬里摶風直上佇看大用之秋有猷有為善頌善禱龜巢藁卷之十六終
