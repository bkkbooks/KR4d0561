front:
  text: 龜巢藁卷之二十
  hash: sha256:380a67aefa43966e79ae04c5328eb2d31158508ef3349d91fe7e92b4503d2a0d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0561_SBCK_020-1a}
body:
  text: 祭文祭姚吉甫文嗚呼物之不齊誰其主之齒去角存從古如兹如公之生夀富且寧不泯其胤百福具并奈何狂飈蘭摧桂折乃館二甥以繼其絶茍非逹觀拂鬱奚堪公能釋然優遊燕酣凡我親朋時相往來有客必醉春風滿懷𢾗日之間𢾗往問疾留連眷顧其情益密卜云其凶醫獲微功方疑蓍龜遽爾而終嗚呼蒼天知乎不知伯道無兒千古之悲所可慰者女能奉母歲時蒸嘗亦猶有後凡我親戚忍言長違奠此杯斚涕泗沾衣代王文甫祭兄文嗟嗟我兄少歷﨑嶇相我先子經營厥家自失所怙顛危誰扶繄我與兄左枝右梧我室苟完兄力其痡嗚呼哀哉兄於斯世閲七十年天賦其醇朴而不鐫故此家事我其勉旃尺布斗粟曽無間言所可喜者兄其息肩幸有二雛能奉周旋日飲無何皥皡其天意此安佚夀或可延奈何既衰屢疾屢痊絶粒信宿晞露溘然嗚呼哀哉誰無兄弟我獨孤苦顧二雛者視豫猶父我嘗朂之以纘先緒矢心以辭酸淚如雨代祭子文嗚呼天降禍于我家何其酷耶我生勞勞髮已垂白兾汝冡子仰事俯育以纘先緒汝年既長頗涉丗故與汝諸弟左枝右梧我經爾緯我作爾述知稼穡之艱難未嘗敢慢而敢逸也維汝多病常貽我憂去歲仲冬幾致弗救厥疾既愈我心則喜然未嘗假以詞色實慮汝因疾之餘弛而弗張馴致怠荒故也正月之吉我適錢塘别方兩旬訃音忽至將信將疑屢泣屢止意汝暴疾氣或絶而復蘇聲或喑而再語匍匐來歸汝簣巳易汝棺巳斂無從見汝之面矣可不痛哉可不痛哉嗚呼彼蒼者天我罪何居人或釋之子淵之天顔路何辜信乎修短之有𢾗耶天道之茫茫耶不然何乃使汝不得其夀也嗚呼汝子汝女嫡庶五人女嫁其一子皆未婚汝何忍置之不顧耶食指之衆賦役之重又何忍老父無息肩之日耶死而有知汝必念我于冥冥之中而我之所以念汝者將何時而已耶嗚呼痛哉我築之室汝弗與居汝蓄之器用以祭汝今卜日祔葬汝祖塋之側撰此飲食與之永訣汝妻汝孥哀慟欲絶代王氏祭叔父文嗚呼痛哉我叔父春秋七十有二年始于承家中於克家終於成家其劬瘁艱苦非諸幼所能盡知也但見完美之室風雨不動衡從其畝阡陌相連男有室而女有家水乘舟而陸乘馬非叔父積纍之功何以得此哉至如目能識丁皆叔父延師之力也行不犯義皆叔父提耳之訓也一家之間緦服何㸑以叔父之恩無偏情無私嗃嗃之威嚴不可犯故能齊其不齊以致其齊耳嗚呼痛哉庭訓之言萬萬千千今不能盡述矣如南孰篝燈東軒奉茗嘗屢進某等於前而語之曰我兄弟自生至死未嘗有䦧墻之日也老我夫婦自少至老無牝晨之患也鄰不爭畔帑無私蓄許人以諾不食其言鈎距不知掊克不能汝等亦能如是乎凡此𢾗事反復告戒知幾朝夕今其巳矣斯言不可得而聞矣而某等為之子為之侄為之孫者可不追念貽謀而踐其成法乎否則為叔父之辱親朋之􅏺鄊里之笑天地間之罪人也嗚呼痛哉去年先人皆謂叔父矍鑠其夀未艾也孰意數月之頃視則眊焉聼則聵焉筋力索焉方病而紅冦入室病愈而租吏打門百憂感心二豎成而某等猶以醫藥可恃而不懼也詎意遽至是耶嗚呼痛哉教育之恩固不能報其萬一但速葬以遵治命如此永别之悲五內加割泣血一酬惟以告哀嗚呼痛哉尚饗代周華甫祭伯文昔我先人早棄諸孤所恃兩伯其一復殂巋然獨存山澤之癯憐我兄弟教之友于雖異厥居有無相須撫之愛之與子不殊奉承周旋匪朝伊晡階庭之間言笑怡懌小過弗責曲禮弗拘叱咤之聲罔及僕夫鄉稱善人久矣不誣年踰八秩健飯為娛詎意一疾竟若摧枯由兹而往誨言則無疑難誰質顛危誰扶寧不使我哀號痛呼伯兮伯兮死不復蘇薄陳簠簋清酒一壺收淚永訣靈其鍳諸代祭吳間間真人文玄元之學世遠言湮不有先覺孰貽後人伊昔上卿道契世皇手持玄珠光明四方吾師繼之山鳴谷應弘道纍朝維清維寧帝錫之爵羽節霓旌邈乎髙風崆峒廣成出入西垣在帝左右黼黻皇猷厥功亦懋名日益重德日益尊世則賴之以棟玄門豈不懷歸怡雲舊隴勇退弗獲祗承天寵間間之情聖皇所知大書所思奎畫煥然寶玩無斁瓊館逍遙以永朝夕胡厭斯世遽逰鬱羅哀聞九重傷如之何我諸葛翁嗣法之孫如牛馬走忝為後昆䑛鼎而仙雞犬弗及寓哀兹觴無任於悒為亮西山祭光祖庭文生必有死斯理焯焯况我釋氏以滅為樂獨于交情實不能無若我與君忘之可乎昔在光孝親如葭莩承平異處患難相扶故山丘墟避地東吳未幾言還如蚿如夔銅馬西來猛于䝟貐再涉大江九人與俱披榛門道體無完膚既脫虎口猶虞畏途我二人者始終持扶白茒宵征狐嘷鬼哭磧沙遇舊乃衣乃鋪萍聚雲散連年海隅每一握手猶論毒痡維暮之秋以豫起躄爰繼我師踞天惠室與君相依鐘鼓朝夕平居論道風飛電激方期進修各殫其力君遽云亡必樂于寂我失良友是用悽惻溪毛之薦諒維來格祭沈仁齊文天道何茫茫耶顔氏之永仁不永其年栁跖之暴夀何以延豈有生之𥘉氣禀其偏乎抑蜉蝣朝暮蟪蛄春秋一皆聼其自然乎如君之生洵美且都鄉閭共稱吉人之徒蚤歲失怙藐焉而孤仰事俯育綽乎有餘若騏驥之夙駕且能範乎馳驅每逰四方以廣其居安知信宿之先方歸覲省一别之後遽疾而殂嗚呼哀哉倚門之母其望懸懸垂髻兩兒其泣漣漣鴒原永嘆鵉鏡莫圎德哉若人何辜于天如某等葭莩之親情猶骨肉既不及匍匐而往救徒號呼而頓足旅櫬未歸橫山埋玉顧彭殤之不齊信斯理之難燭漬綿以詞酸淚盈掬為葛子寧祭父文嗚呼天乎人孰無父獨不假我父之年遽止是耶在昔家居仰事俯育以大父遺業之重隻力負荷常懼弗克所樂者惟琴惟書是吟詠而巳餘無所嗜好也嗃嗃之聲弗及犬馬姻族閭里咸薰其良善人之稱無間然者數年以來遭時艱棘流離異鄉食指百餘賴父全活亦豈易為然耶嗚呼痛哉時之避難者妻孥啼號或委溝􅊤我父則旁求治生之術使母與某等無凍餒之憂也時之人居無室廬或冒風雨我父則納交仗義之士使母與某等得居處之安也至若族有孤寒之胤家有臧獲之衆亦莫不愛之如骨肉然搢紳之士多與莫逆葭莩之親相與依倚但不肖孤不能幹蠱負義方之訓為多然我父之慈訓未嘗不勤勤也今也一疾遽爾大故顧某等為孤為婺者真若喪家之狗失水之魚矣嗚呼蒼天其無知乎如其有知視孤婺之悲若此而不為之憗遺乎然而悲則悲矣猶有可慰乎冥冥中者我母以柏舟自誓將星冠羽服以終其身某雖愚不肖既於父有風木之憾幸母之存寧不服勤奉飬以慰我父乎矢心陳詞惟以告哀惟吾父念之願以父之靈隂相厥後代祭表嫂文維靈之生錢橋望族嬪我表兄閨門睦睦賴有內助以生以育暨肥其家且飬以福吾兄强仕朔南宦逰嫂居於家家政克修男齠而嬉女幼而柔以母可恃父弗為憂頃因喪亂家毁于兵吳往越還千懼百驚寓兹吳門待時之清念我胤子可教而成以女許嫁親親相仍擬古朱陳卜世莫京雖居異鄉客舍聫夢嫂嘗有言兒女鍾情必娶必嫁此心乃寧適豫親喪連服絰縗子未可醮禮文亦虧惟嫂之言艱難共知戮力同心教子擇師眷我婦子朝斯夕斯一味之珍食必共之方期將來嫁娶有時安知一疾遽爾而萎聞者愕然慘怛歔欷况我骨肉胡寧不悲最可悲者兒號女啼而今而後㷀㷀何依死而無知棄之如遺如其有知忍此别離我婦我子其慟亦宜天命奈何彭殤不齊傷哉永訣漬綿以詞代祭弟婦文嗟我兄弟遭時艱危兵燼其廬星散其人使汝妯娌等不能同家而處共㸑而食於今凡六十年矣然吾弟賴汝之力以巾以櫛以絲以枲以鞠其子女常得以慰我心焉鄉也吾弟與而避地浙左我夫婦每念汝婉孌之姿跋涉山川漂搖風雨多有可憂者焉幸而言還得同居長洲茂苑間者𢾗月我乃就食于無錫矣又使汝妯娌乍聚而散百里之間相望相憶而不能𢾗相見也近方喜汝子暫贅而歸其妻將有拜姑之日矣又喜汝女擇配得人亦將有館甥之時矣滿謂時將小康仍居故鄉少長咸萃搆一畝之宫犁二頃之田歲時酒飯于先人之墓則我妻與汝復得相率以事蘋蘩矣𢾗日之前方聞安信片𥿄之上忽來訃音使舉家相顧失色始而疑焉終而信焉莫不為劈踊而長號也嗚呼痛哉天胡不仁奪吾弟之內助者耶地胡不仁奪吾侄之所恃者耶苟曰非天也非地也以汝之徽柔淑慎乃何為夭閼如此哉自今以往雖不知故鄉之願能遂與否其或遂焉亦不得與汝一日同也生死之間此憾何極雖然天降喪亂代祭趙師吕文公之生也七十有六年時有盛衰事有得失境有順逆物有欣戚公其處之操履如一其少也以簮纓之裔而無爵祿之念其壯也以陶猗之富而無奢靡之習及其年之老成尤儉素而篤實為鄉里之善人不鬪智而用力橫逆之來唾面弗拭蓋明夫舌存齒亡之理而得乎全身逺害之術每論平生禍福靡常鵉膠之絃三斷而三續鳳穴之雛或存而或亡銀杯羽化付之渺茫知有命之在天忘鳬鶴之短長維箕維裘授子及孫閒居别第翟公之門清風茗碗沉水罏薰日怡情于晝書絶無心于世紛視不義之富貴如太空之浮雲獨念先世欲勵後昆託祠事于老佛之廬屬喪具于葭莩之親視死如歸餘何足云或謂公之可憾者燕子樓化為劫灰科斗壁飄為風塵殊不知公之逹觀藐如墮甑未嘗怨天而尤人也今也人遭亂離多殞鋒鏑橫尸四野鳥鳶之食公乃得全體之歸掩佳城之室回視前日之死于非命者安能企其萬一乎某等親親尊尊道義交結涉江以送其喪雪涕以臨其穴一觴之酬千古永别公知不知我語無極嗚咽尚餐代張希良祭王文甫文公之一生磊磊落落操心至公俯仰無怍出辭必信不事鐫鑿人或狙詐言諄聼藐家庭之間一呼百作奔走服勤罔敢乖錯及交親朋春風笑謔恩誼有餘禮文則略患難相救扶顛濟弱鄉里庇庥恩尤不薄或飢而餔或病而藥或輔其仁或紏其惡周恤貧寠不輕唯諾頻年時危所在跖蹻鄉人愛之斂袵如昨施德有報理亦昭灼我曹多幸松蘿附托凡諸甥館必席賔幕從容語言欵洽杯酌别不忍去期必如約今公巳矣失我矩剃枉者誰矯懵者誰覺窳者誰範觚者誰削誰指其迷誰斷其堊靜言思之相視錯愕掩𬒮拭涕薦此泂酌為周縣尹祭顧元公文盛德之士使人後千載而興起者其信然乎猗歟元公才兼文武其文也世稱三俊為當代之儒宗其武也羽扇一麾走六州之豺虎醉非嗜酒免禍驕主醒非沽名赤心自許抗疏𥙷衮職之闕擇賢進邦國之輔史不一書勳業昭著世徒知思蓴而歸者之為髙而不知採蕨南山之言先入乎其肺腑故公之殁特為公鼓琴而悲慟哭而去也眷兹長洲實公鄉土桑梓之宫墓有祠宇何物地靈混此室處斥而去之陳我簋簠悵烟塵之滿眼懷清風之白羽惟公有神以福黎庶為周尹立碑祭元公文昔典午氏碑表有禁勒石公墳勳業昭甚事傳信史石亡何時走尹兹邑永言懷思載葺祠宇籩豆具陳祀神有詩刻諸堅珉峴首之碑令人墮淚吳人于公亦復何異惟公有靈隂隲吳人克武克文無愧先民代姜周佐祭姨夫王仲德文君之老姑為我叔母而我女兄獲奉箕帚我弟於姨復得其偶如古朱陳婚姻世守先人嘗言君性醇厚人或顛危君力能救我親雖亡斯語不朽如不肖者公亦弗陋有過必規有善必誘眷我弟兄無一或否公年半百閒居靜守閨門之內肅若賔友忘情軒冕適意杯酒獨奈今年避冦奔走挈家於舟虎兕傍吼千驚百憂窘束如杻一女鍾愛疾莫能救羣盜稍息歸卧南牖襁褓之珠復碎于手公之痛心如割如剖痛猶未定厥疾新遘嗟哉若人天胡不祐今公之殁命也誰咎凡我私親倚仗何有尤憐女兄孤燈白首撫膺長號淚􅊜雙䄂為王孟學祭母文蚤歲失怙惟母焉依母其視之猶掌中珠未寒而衣未飢而飱左提右挈顧之復之夙夜檢束惟恐不能自立以保其身以承其家以承大父母及諸父之訓諄諄之言不一而足每于舅姑之側視其色有不豫然者退則惴惴檢其不及既自檢束又詢之二雛曰爾於大父母之志或有違乎事或有怠乎抑不能謹飭以貽其憂乎母之欣戚係乎兒之有過無過未嘗一日忘乎懷也仰事俯育婺居而憂勤者十年男室女家志願方畢然于祭祀賔客之奉身先中饋亦未嘗一日之或懈也嗚呼痛哉兒以母之康强而年未艾烏鳥之情方圗萬一庸詎知一疾而不起耶臨絶之言謂死無憾特以弗克終飬舅姑為慊是則吾母之孝于舅姑者為何如哉宜乎舅姑之痛不翅如父母嗚呼風木之悲兒將奈何惟當追念母訓兄兄弟弟各勉成立律身成家竭力以奉承諸父以飬大父母之志尺布斗粟昆弟共之不敢有毫髮欺隱若有所否者是忘其親忘其親則不孝之罪上通乎天雖吾母之慈有不可得而宥者惟母有神尚克相之庶踐其言以慰母靈為陳彥直祭外姑文嗟我外姑德不可滅孤燈十年柏舟髙節為婦而孝為姑而慈林下之風鄉稱姆儀如諤與謙材俱碌碌壻于名門蒹葭倚玉每詣甥館升堂起居必詢女家諸兄何如或墮優逸勉之克勤防微杜漸忠言屢聞或坐孱弱戒之自立扶顛持危惟恐不及比嬰微疴時在床席我來候問仍飲而食眷顧之間無異于常及女來歸語猶琅琅一日之間遽成永别卑尊戚疏故皆痛切曰壻與女感恩如前豈不哀思泣涕漣漣幸有賢嗣篤親如母夔蚿相憐義當久永死而有知知豫之悲一觴敬酬靈之格思代吳伯亨祭外舅張守齊文嗚呼惟我婦翁鄉之善士不鄙庸愚妻以其子既妻其子恩義兼至念我先君夙昔交契今也孤㷀遭家殄瘁朂女內助庶弗顛躓每詣甥館言提其耳翁經州閭必過敝止綜理厥家以綱以紀親之愛之視子無二别無幾何聞疾以痞女舟歸寧夜渡淞水訃音歘來驚使躃地匍匐及門翁巳長逝我服雖緦我哭不偯矧為女者其痛曷巳潔此一觴進饌靈几永言哀思翁其鍳諸代金子俊祭錢仲居文嗟嗟仲居其止於斯福善禍淫天胡我斯父為善人君亦如之非義弗取非善弗為曰儉曰勤俯焉孜孜業日益廣家日益肥十數年間遭時艱危賦斂之蛇毒人骨肌君安其親茹荼如飴弟則友愛室家其宜是皆深淳親親之推眷我姻戚肝膽相知溫溫其容抑抑其儀莫可忘者顛危扶持僉曰若翁澤流未涯厚培其根必茂其枝詎意一疾遽爾而萎禍福之柄誰其倒持於乎蒼天天閼若兹某等念乃疇昔胡寧不悲矧如雙親遺孤與婺其痛之巨庸曷已時我舂不相我淚沾衣言采溪毛薦此一巵嗟嗟仲居庶或格之代張伯仁等祭父文於乎痛哉樹欲靜而風不停子欲養而親不存哀哀諸孤所以痛裂乎其內也仰惟父天覆我兒女男室女家志願俱畢且復為之樹産業立根本使各得衍其餘澤焉苐所恨者我父之生過於勤勞六十九年日用矻矻未嘗得一餉之優遊也矧逢艱時子或受圍于城者親雖野處心常危之或行役于逺者親雖家居心實隨之餘在侍旁親若可樂然憂患則為之料理征徭則為之區䇿亦未嘗忘於懷也至如鶴長鳬短物不能齊又豈能不拂我親之意哉今也兒無所瞻女亦何怙菽水之歡不復可得是雖五內之裂亦徒然耳某等與弟等但黽勉襄事以我親索嗜佛學視身為幻敬以茶毗之法奉之遵治命也輀車在門翌日永訣菲焉一奠吐此哀衷祭先墓文於乎陵谷之變知係乎時惟情所鍾不能不悲昔我先壟松大十圍今皆宿莽荒烟盡迷不思言者佳城或墮或幸而存冢眠狐狸曰不肖孤避兵海涯九死一生如鳥無枝十有六年豈不懷㱕回首鄉關道阻且危丹陽之東吳門之西方𢾗百里野無黔黎我兄我姨塜亦靡遺我父與母夢或見之既寤而嘆涕泗交頥今我冡子携厥妻兒歸耕舊田丘壟是依餘口猶十未能同歸歸何不能生理未治旅食異鄉破研日隨尚賴遺澤歸或有期載耕載穫蒸嘗于兹或樹松楸如前盛時嗟我祖禰知乎不知拜伏墓下拭淚陳詞代張伯仁祭黃景先文近年耆英晨星霜木婁人視公崑山片玉公之為人生有器局遭時迍邅如玉韞匱搢紳之文罔不刮目公之處家仰事俯育陸賈之槖兒女均蓄彼徑此緯同一機軸公之居鄉春風穆穆凡與之逰惟善是朂烈髙風遐邇咸服于我姻黨眷義尤篤念無後人墜緒誰續以孫贅居我女䝉福哀我親喪觸暑匍匐弔之唁之沃酬之辱比豫之謝留連欵曲别方兩旬書往而復豈意公亡疾不徑宿豫聞訃音哀淚盈掬奈役于官如薪􅊜束送不執紼罪奚可贖公或我知矜我碌碌束芻之奠鍳此心曲祭大雲講主文師之髙年七十有九以涅槃而論之復傷之何有人之所以哀我師者我知之矣一大藏教淹貫胸中如魯靈光天台之宗今也砥柱摧折隤波洶洶同𫀆之士其誰適從三周七喻化導羣迷隨所住處桃李成蹊今也野狐長嘷彌天蒺藜信從之衆疇將依歸吾黨固嘗有月旦之評曰善與人交僧中之晏嬰也度不可量方外之黃生也其愛客則孔融而衣緇其滑稽則方朔而釋名也觀其詩則見其心之平淡而無牛鬼蛇神之怪觀其畫則知其興之清逸而出乎山􅈨水仙之外若是者豈非大雄氏所謂無罣礙者乎抑亦所謂得遊戲三昧者乎是則吾党平昔之所敬愛而今日之所以為誄也彼千駟萬鍾而死者欲使吾黨贊一詞而不可得而况為之沃酹乎言采絲蓴淞江之曲懷哉若人薦此寒渌祭柴處士文近年耆英晨星落落剗刓為方誰其矩矱惟公渾厚不雕不鎸如玉在璞如珠在淵寄跡隴畝絶意圭組為龎德公不入城府以善為樂襟抱生春為馬少逰鄉稱善人髙堂眉案如賔如友梁鴻孟光無此白首幹蠱有子三鳳翩翩源深流衍理固宜然昔我先君深敬於公所以敬者古人之風先君云亡公來慟哭弔死問生重禮之辱由兹而來陵谷變遷干戈所至流血成川公之居安其福孔厚年過七十亶為希有豫聞訃音義合匍匐吏呼石壕去不可得言采溪蘋薦此一觴公其鍳之我泗沾裳代柴子祭父文父生三子女亦如之長飬婚嫁恩義維均以恭出贅愛念尤篤定省雖踈音問不絶每歸侍旁奉親飲食分甘食之親同稚孺豈惟食之誨言諄諄惟懼孱弱弗克樹立撫恤諸孫欣欣色康兒所喜者親在健飲兵戈擾攘十五六年幸無險波以及我親微痾月餘靡神弗宗恭役于官如墮膠􅃮間嘗請告歸侍湯藥父曰亟去公家事數兒能了官父心乃安别方數日聞病小愈豈其淹忽永訣終天風木之悲尚何忍言嗚呼哀哉我親之死人皆哀之姻戚之哀思親義也鄉鄰朋舊哀善人也我兄我姊我妻我孥其痛如荼五內崩裂罔極之恩奈弗克報所不敢忘各慎其身黽勉成之無忝所生尚賴遺澤垂𥙿後人祭蕭處士文蘭陵望族竹帛著稱髙年過于伏生儉德同于晏嬰自罹喪亂多遘迍邅萬死一生脫性命于虎口三吳百粵寄身跡於狼烟覩姑蘇之麋鹿重逰念北山之猿鶴相望言歸故里欲正首邱顧親故鮮有子遺喜父子獨能無恙安居未幾怪事忽生呌閽救無辜之孫霜飛六月奉命復慗遺之老風動四方蓋埋劍之氣冲于斗牛故覆盆之光照于日月遂爾貽謀之念灼然隂隲之符骨肉聚于目前滫􅔱供于膝下得正斃而全四體應含笑而赴九原蹇豫劣材荷公知已自青年而䝉館榖至白首無異金蘭又如王趙之交亦有陳雷之義今皆巳矣可不痛哉老淚淋浪持束芻以效孺子儀容倣佛撫絲桐而呼彥光即此微忱伏惟尚饗代祭錢鼎卿文吳越世家焜煌史册公為雲礽蔓延遺澤昔在妙年青雲氣格弗屑於時丘園自適風流文采聲亦藉藉晚罹兵燹稍涉艱厄三江五湖浮家泛宅歸帆無恙佳兒連璧乃疆乃理剃乃榛棘莵裘鶴渚溪流環碧公其優游素願斯獲邀朋呼酒看花岸幘賔明往來冠蓋絡繹滫􅔱之供子盡厥職自春徂冬頗須藥石厥足蹣跚心仍夷懌所懌者子服勤無斁宜其泰然瞑目中夕顧惟某等攸居咫尺匪親伊故心皆莫逆今也云亡如失肘腋緬懷德容傷心如刺鄉飲之歡無復共席薄言采藻薦此窀穸惟公鍳之有如平昔又代兩甥及甥壻作昔人有言見舅如母此蓋由親親而推之乃常情之所有如我舅翁其親愛於甥及甥女之夫者尤恩深而義厚厥恩維何煦濡撫摩視弱孱而為扶植者支一木于幾傾之厦屹砥柱于頽波厥義維何切磋刮劘念昏愚而為牖之者鑿渾沌之七竅投阿膠于濁河然則翁之為舅氏而愛其甥者視餘人為何如嗚呼痛哉軟腳之疾醫云無傷謂翁健飯全愈可望如某等朝夕承奉于埋固當奈公私之服役磨旋蟻之奔忙故不得服役于左右􅋵几而執床又安知一夕甘寢而遂亡耶嗚呼痛哉聞訃而疑蒲伏救之救不可得徒哭而悲念生平之恩義雖欲報而無期一酬永訣涕泗沾衣武進縣學起講堂祝文維洪武五年四月二十日丁酉常州府武進縣承務郎知縣董某從仕郎縣丞陳某將士郎主簿尹某謹以釋菜之奠敢昭告于大成至聖文宣王曰夫學以明倫尚矣凡為學宫必先乎講習之地使學者登降揖讓咸有儀度朝斯夕斯以明人倫之道斯堂之所以亟其成也而某等共勉厥職以副朝家興學之意尚惟神聖於斯文有以相之縣學諸生祭陶兄文天道何茫茫耶跖暴而夀顔仁而天蘭摧桂折樗檪合抱是皆必有其說蹇余昧而莫之曉耳吾友陶兄如玉在璞鍾厥愛于雙親求良工而雕琢既賣金以買書復徙居而近學惟吾兄心父母之心故能孜孜厥修類如麟之角也吾党碌碌辱交連年竊鄰燭之餘光亦效顰而勉旃方期吾兄馳騁乎詩書之林游泳乎道義之淵又安知車方駕而覆轍弓始張而斷弦也耶嗟哉彼蒼誰薄誰厚賦命不齊吾將誰咎惟沒世而有稱斯可謂不朽彼區區與草木同腐者雖龜鶴之年而亦何足取哉嗟嗟友兄其止于斯其心孔哀其友亦悲一慟永訣漬綿以詞武進縣學移先聖祝文廟貌之設人所具瞻所以尊聖賢寓祗敬也棟宇朽腐懼將壓焉不敬不尊責何可逃今將一殿兩廡撤而新之汛掃鮎堂舁置神像聖靈洋洋無適不存具瞻之敬蓋自若也工僝事集神其相之祭胡秀才文公之父兄為我友朋公之子孫吾與師生公嘗以父執遇我謙謙乎奉承翼翼乎將迎席必置醴途不並行我步我趨視為規繩然吾亦愛之重之與之語言未嘗不肝膽相傾也嗚呼人孰無死有未死之前為子係者或不能如親之志親沒之後或墜其基業是皆不能無憾于幽明也惟公不然孝友之行父兄素稱曰子曰孫起廢兩具别第新築良田歲登可以供粢盛奉輸征恤孤㷀鄉里稱少遊之善犁鉏帶常林之經死而有知豈不含笑于九原子嗚呼昔我與公俱避甲兵公亡我存無復合併每想見之于墻見之於羔今也以一勺之行潦表四世之交情睇彼吳東逰魂杳冥我將假巫陽之詞以招之曰太湖之隂風濤震驚魂兮來歸歸我毗陵父兄之丘隴相望子孫之箕裘遹成念此土桐鄉之愛念老夫束芻之誠魂兮來歸天風冷冷祭朱黃二友文嗚呼兩駒並駕兮同一蹶兩輪並進弓成覆轍秋氣肅以戕物兮羌蘭摧而挂折鳬鶴斷而可悲兮何短長之足說嗚呼天乎祭徑山長老顔悅堂文福慧俱足惟佛稱首能具而微世亦希有如吾悅翁是希有者德尊一代聲溢藂社早被殊渥著金伽黎所在說法四衆皈依晚坐南屏雷鳴鐘鼓雨華西湖魚龍起舞丞相授經化伏羣魔凌霄絶頂砥柱頽波慧以知幾福以歸休崑岡之陽為師莵裘師方退藏陵谷變改兀如懶融得大自在我昔避兵識師東林忘形儒墨結交以心時有旦評師稱孝禪吾其敬之僧中子騫九流百家問無不知吾其愛之僧中子期師之于豫亦敬且愛片言可親如拾珠貝我歸故鄉師贐其别歲時音問往來不絶前年孟冬丈室信宿白雪陽春𢋫和舊曲寂滅樂矣師固云然故我思故交中心悁悁擷茗陽羡㪺泉錫山詞以抒情塔鈴吾言夫祭妻文嗚呼誰無夫婦琴瑟相友惟汝與我憂患白首粵自世變家燬于兵扶老携幼蝶血交征具區之山龍馬留跡羝觸肉籬幾中鋒鏑載歸故邑遭歲薦飢裙無完布叉遺折蓍而于舅姑菽水朝夕生事死葬與我僇力𤇺烟滿眼人皆岻巇賴而內助非義不為我檐耒耜而躬井臼長育二雛庶亦肯構所居三徙非效孟母全身逺害以避豺虎內外服勤乃成此堂舁疾來居庶安且吉而飲而食而言琅琅辭絶而逝悲風滿室六十四年不失婦道雖逢百罹卒獲夀考嗟我父子痛心如割骨肉恩愛祭此契濶歲時蒸嘗誰為薦羞我暑誰葛我寒誰裘風雨孤燈室與誰處齊眉之案誰為重舉宅兆斯卜祔而姑嫜一酬永訣我淚其滂兩祖祝文維洪武九年歲在丙辰七月𥘉四日不孝曾孫某等敢昭告于某官之靈伏念某兒子木不幸逢豸冠之怒無辜屯鳳陽之田骨肉生離肝腸痛割以卑悃陳詞于烏府䝉大臣請命于丹墀欽承釋放之恩幸獲來歸之喜雖風憲紀綱公道之力卓然行之非天地祖宗隂隲之靈何以得此天無以報祖何可忘謹以𬞞果酒饌之儀用陳菲薦謹告考妣祝文伏念某兒子木屯田臨濠如落陷阱而某原其罪狀揆諸刑書為父者有可救之理于是扶􅉵觸熱赴臺陳訴幸而臺官垂憐轉而上聞玉音俞允放歸養親此恩固不敢忘也然某思之苟非早歲䝉父母教訓之力則暗于義理昧於法律視其子可援而不能奮身以為之則為父之道有所未盡今也賴親訓于昔年脫子難于今日恩其可忘乎况乎上之人所以矜恤所以釋放使得仰事俯育而骨肉完聚者非天與祖宗有以相之不能也嗚呼天無以報矣豺獺之敬聊表於親至如父子受辱有玷先世其出于不幸而非係乎不義而致者惟天惟祖宗尚或宥之外舅姑祝文伏念某兒子木比遭禍而屯田今䝉恩而歸里親戚骨肉重獲團欒其為外祖父母者死而有知其必哀憐眷顧而隂相之也推情揆理義不能忘三兄祝文惟吾長兄有幹蠱之才而不得其夀由是而家人失節門祚陵替幽冥之中不能無憾也必矣然而幸存一息以嗣蒸嘗如木識丁兄必愛之不啻若已子耳頃罹竒禍屯種濠梁豈不為之悲愍哉今䝉國恩歸奉菽水又豈不為之隂祐乎生而孝友死必不殊區區哀思詞莫能既惟吾三兄深嗜佛學早絶伉􅓻誓不與同室而生同穴而死也早育二子長令出贅幼為沙門兄則超然自謂在家出家矣避兵之日緇流與俱杳不知其所終此固兄之素願也然而某佩服儒訓雅愛人倫念同氣不宜泯絶命子林以奉蒸嘗今以木屯田而歸如獲再生如脫鼎鑊吾兄以佛之心為心亦必為之慈悲也惟吾四兄未壯而克家將娶而即世父母悲悼終身不忘諒吾兄于父母之子若孫亦不忘也如木者幸脫屯種故歸耕故壠以飬其親以畜其妻子兄之喜為何如哉兄無後命吾子森嗣之以承祭祀尚期垂𥙿使得與木等鼎峙而峙立也姊及姊夫祭文嗚呼賢姊之生愛弟深至視弟之子已子無異木之屯田姊必憂恚今令還家必喜而慰閔豫暮年遭時不利父子汚辱有玷先世所自釋者中心無愧微姊復生孰語于是嗟而子孫俱死疫癘歲時禴嘗賴女承繼我今摧頽百事俱廢念姊之心獨爾弗替姊夫善人義同昆季庶幾來格鍳此微意代祭母舅文昔人有言見舅如母今吾不見舅氏者閲四五年又何異別吾親之久乎瞻彼陽山追懷亂離脫萬死于虎口幸重逢于盛世然而陵谷變遷各天一方舅甥之情惟天其知遭險人之排陷茗參商而東西方鴻飛于魚網奮病翮而來歸聞舅疾而往問涉雨露之塗泥承訃音于中道乃蒲伏而星馳顛崖之苦蒺藜之悲皆不能與舅氏細數而陳之釋此憾者將何時耶言采溪蘋薦此泂酌哀歌渭陽涕淚交落知乎不知神在冥漠代任仲文祭妻祖文翁於女孫親愛所鍾愛及其夫情亦與同既玉其成加以磨礱藻雖不才感恩之隆服勤左右黽勉厥躬歡然菽水庭幃春融金澤之濵瓢湖之東居凡三徙天風轉篷今年夏秋巨浸如洚賦斂之蛇毒于射工避地蘭陵請謀吾翁去危就安翁樂其從瞻彼橫山滄海駐蓬將營莵裘一畝之宫月有旬日往來憧憧豈其微疾藥石罔功我方抱持滫瀡之供語音未絶瞑目而終嗟我夫婦遭罹禍凶倚若泰山山頽倚空賴有大母同此哀恫棺以黃楊衣衾重重忍兹永訣涕泗沾胸三寵而醊以寫愚衷祭朱仲起文生於吳東殁于西州七十四年陶朱之疇其生也有一㕓而弗處樂浮家以優遊有二子而離居各專力于箕裘其殁也繼室厚衣衾之具過百倍于黔婁女孫得藁砧之良襄大事而能周視世之生不聊生死不得其死者逈乎其不侔又何憾首邱之正與否耶某等或忝微姻㑹晤無幾或傾蓋于東洲之濵或結鄰于橫山之址聞哭聲而蒲伏徒往救而弗起兔死狐悲矧吾人耳一觴敬酬用歌蒿里代楊彥澤祭妻祖文昔在童丱聞翁厚德邑之名門視為矜式遭時變故挈家中吳人多覆轍翁行坦途陶朱之裝罔有遺失食指百餘乃保終吉陵谷既遷言歸故邱橋梓相須聿成莵裘非德之積曷云能爾隂隲自天灼見斯理如某不才誤䝉采菲以孫妻之撫愛莫比每至甥館誨言諄諄俯育之德盎然如春及翁卧疴或輟或作往來問安眷顧如昨七十八年如旦而莫視諸夭閼實有餘祐所可悲者永别終天女孫歸寧誰其眷憐某于羔墻思亦罔極薦此溪蘋凍淚沾臆祭鄒忠公墓文公逰程門遊楊比肩慎獨之學首得其傳孝于事親如曽如騫移孝為忠厥德兼全𥙷衮之闕蒲伏涕漣數惇六罪羣邪凛然奈何城狐威福得專推落陷阱炎風瘴烟忤物固爾精誠動天遐陬峻嶺感應有泉處困而亨斯文䆒研既釋論孟復解韋編羲文姬孔羔墻見焉蔽日雲開暫脫迍邅再寵再辱愈磨愈堅明月之珠霾光九淵鳳穴有雛赤霄翩翩暴白先志誣衊悉蠲德薰晋鄙垂四百年顯忠有祠奉嘗有田由宋而元有司豆籩度守是邦追慕昔賢詢諸遺黎知公故阡增土鬣封起碑之顛樵牧有禁溪山連延何以奠之秋菊寒泉仰止髙風服膺拳拳尚饗代曹子夀祭陳氏親母文惟靈生衣冠之茂族作佳配于頴川相夫子以無違實四德之兼全出鳳雛于丹穴昭采翮之翩翩熊丸之教有法掌珠之愛弗偏豫是以有東床之選蓋亦慕北堂之賢方鳯占之叶吉結朱陳之姻㜕何飄風之不情折萱花于歘然葭莩黯乎其失色朝露若為之涕漣念九泉之永訣酒三寵于柩前靈洋洋其如在鍳此意之勤拳代陳煥章祭母文嗚呼三子早孤皇皇疇依賴有慈親恩斯勤斯非徒飬之而又有以教之視我三子掌珠之惜遭時艱危基業蕩析萬死一生幸逃鋒鏑徙兹滆濵苟焉休息其不滿于吾親之心者一子一孫介胄而殁居侍旁者但供其菽水習史業者常離于朝夕每勞乎倚門之望鮮能遂板輿之適所幸時康方安厥居孰謂微疾遽然云殂方巫醫之並用竟永棄其諸孤嗚呼痛哉而今而後雖日用三牲之飬而我親無復為之娛矣一抔之土無復窆于吳矣徒感傷于風木愧返哺之慈烏奉觴永訣肝腸若刳代祭陳母文生長勾吳秀鍾林屋有林下風四德之淑隨世變遷家此溪曲鄉稱姆儀嶶音馥郁熊丸教子峙若鼎足伯為督家仲則戎服季也刀筆搢紳刮目甘軟之供如食厚祿斑衣諸子森如立竹春藹慈闈家用雍睦夀踰稀年殁有餘福季歸自公撫棺慟哭烏烏之情悲乃風木里不卷歌弔者接躅某等姆儀之敬義當蒲伏言采溪毛薦此􅌬醁肹蠁有靈視同芻束又代李一泉等作孟母以斷機教子成其子為亞聖陶母以剪髮待賔致其子有大名世之為人母者苟能有其遺風則其子亦必有可稱者矣若吾陳母其遺風伊何教子之功不鮮待賔之禮亦多昭哉彼蒼降福洋洋八十指子孫之盛七十三夀考之長東鄰西舍愛同六親簞食豆羔饗如八珍為一境之母儀誠四德之淑人倐爾云殁孰不酸辛時無張林孰德弗碑劉向不作立傳者誰我酹此巵我陳此辭亦庶乎薤露之悲彤管之貽也歟祭萬氏子文人與萬物一氣所鍾何乾坤之為父母有賦豫之不同顔路之子聖師之賢胡不永其年耶桞季之兄凶熖赫烈胡不使短折耶美牛山之木而厄于牛羊戕于斧斤彼樗檪之不才乃夀而輪囷故梟囚鳳刖足麒麟若吾甥之淳朴孝敬而夭者皆莫曉乎混淪某等忍痛雪涕敢一問乎大鈞天雖不言聞必酸辛持杯酒以弔窮泉之幽魂亦以慰髙堂之老親親乎親乎慎勿為卜商氏之喪明徒貽誚于聖人嗚呼彼蒼聞乎不聞祭沈氏女文維洪武十二年十一月𥘉八日老姨公携其子以酒肉祭于姨孫女沈氏之靈曰汝之父與吾子為弟吾之孫嘗中選汝之父之雀屏今也如寶鏡之破于未照玉簮之折于未成嗚呼傷矣哉吾父子之情傷矣哉吾父子之情又某年月日老姨婆與姑娘等以酒果家饌奠于時娘柩前嗚呼痛哉汝之生也母亡于七歲之𥘉使汝不得蒙其撫養汝之死也父殁于千里之外汝不能與之訣别未笄而善事繼母久病而不弛女紅是皆可哀可憐而可憾者嗟哉彼蒼何彭何殤骨肉之悲寓此一觴代任仲文祭外祖文翁于外孫恩德俱厚三孫之中藻為最幼惟其幼也特恐愚陋其愛尤深加之訓誘翁自中年無心組綬湖山秋九風月杯酒幽花秀竹蒲石清繆翁于其間婆娑白首陵谷之變干戈日久危而復安賴天之祐八十八年可謂遐夀為鄉善人其德亦𢡟甥孫紛然日在左右藻則出贅翁為擇偶桑梓連隂聲聞雞狗犁鉏畎畝復客桐江數月宿留廢禮百端辭莫能䆒比聞訃音痛心如剖匍匐而歸豈云敢後以病莫前徒抱哀疚瓢湖之水難洗厥咎翁其閔之庶或原宥雪涕陳情薦此簞豆為曹元度祭姑夫鄒挂堂文昔魯義姑抱姪遺子恩難兩絶義重如此公篤於親如姑之情撫字其姪同乎所生念某昆弟稚孺而孤適逢亂離干戈九邱垂涸之鱗䝉激滄波無依之鵲乃栖瓊柯恩以蓄之義以淑之威儀言語教且朂之人皆蒺藜我則祍席居吳吳數年如一朝夕陵谷變遷公還故鄉某亦里居烜以餘光咄彼青蠅竟涴白璧投界遐荒混淆瓦䃯咸謂貂蟬將出兜鍳天定勝人無悔無尤夫何不弔乃涉重坎訃音之來痛割肝膽丈夫馬草死不顧身唯其骨肉極切悲辛巫陽之招魂其來歸桂子秋風髙堂繐帷知恩罔酬義蔑以報見公羔墻淚滿懷抱義魯之義姑我姑之夫書以厚俗疇兹董狐祭徐逹卿文往昔避兵衆依於仁纍纍乎喪家之狗躍躍乎脫網之麕公之視豫騶虞麒麟暖蘭湯而濯足下懸榻而重茵館婦子於别室撫臧獲而所親不以俗有數未而炊者以玉其粒不以時有析骸而㸑者以桂其薪或戚或疏恩惠俱臻長筵燕集禮意殷勤是故人皆以和氣氤氲喜色津津忘憂于板蕩之秋湛樂于熙臺之春殆若古桃源之避秦也别公數年滄海飛壁干戈阻絶公殁不聞逮歸里而聞之日羈縶于世紛欲一酹橋玄之墓閲數歲而因循窈嘗論之世衰俗薄狥利忘義者十之八九公乃磊磊落落猶獨寉之在羣雞然一飯之報吾志弗信抑亦有愧于古人瞻彼膠山如隔雨塵舉匏樽以澆墳上之土頌遺愛而云云酸風撼林嗚呼孔賔為陳以貞祭王母文昔在故里婦德著稱鍾禮郝法容儀具并暨孀居之一紀羌玉潔而氷清今居蘭城母儀之懿奉檄有孫盡歡甘㫖奉重闈之慈訓謹􅍾持于胥吏故凡葭莩之親桑梓之供莫不愛之敬之尊仰乎林下之風也樂善之性出乎天賦口不絶西佛之名如渴飲于甘露其心愈慈其法髮半素諸兒女之通家每升堂而拜母起居問安匪朝伊暮方鞠月之下旬捧夀觴于𥘉度安知彼蒼災祥並臻賢孫有鶚書之薦而大母則病入於膏肓巫藥罔功遽爾云亡正所謂賀者在門弔者在閭變夷懌為䀌傷矣衰絰之孫劈踊哭泣吐令伯之哀衷人皆為之嗚咽不有彤管孰紀髙節采滆浦之寒藻薦郫筒之香雪拭淚陳辭千載之别祭崑山張伯仁文洪武之𥘉傾蓋如故買宅買鄰日益清顧于時蘇城樓櫓灰飛公脫陷阱欣然而歸人之所稱百鷙一鶚有猷有為抑强扶弱我所見者厚葬其父故舊不遺保障鄉土數載之交視同懿親為公所憂里多荆榛縛虎而縱反遭其齧鵂鶹夜啼興妖作孽室雖有繼卒以無嗣播遷臨濠日以毁棄女之嫁者遽失其良而壻承家池魚並殃公在異鄉寸心千里骨肉傷殘痛何可巳一紀之别老我于家每聞竒禍為公怨嗟蒼天蒼天斯人何辜困厄摧折乃至此乎客來今春謂公䝉恩難兄難弟同歸故園豫欲賀之恨臂不飛以詩言情不勝瞻依安知隔歲公巳物故集師書來我淚如雨追念疇昔肝膽相知天各一方徒云坐馳面不復晤魂其可招悲歌些辭酹此一瓢生日祀考妣祝文父母生不肖八十六年矣不肖雖不能為賢人君子為世矜式然未嘗敢為小人之不臧也雖不富不貴不能顯榮其親亦未嘗飢寒失節以辱先也長太平之時則微樹其業遭亂離之日而不殱于兵夫妻諧老暖衣飽食蚤眠晏起不憂不慮以安以娛是皆天地之大恩父母之遺澤也䝉天地父母之恩澤其可忘乎其可忘乎所願者子子孫孫中外和睦瓜瓞蔓延荆棘不生使不肖夫婦如是安娛以盡天年不久床褥全歸天遺體尚賴天地父母之靈有以隂相之始生之日釃酒以告冬至祀外舅姑祝文嗚呼悲哉仁而無後斯理之變而又遭世之大遭變也三子八孫靡有噍類所遺之業盡屬他人顧為女為壻者耄無能為竟不能為立後人以為似續以承祭祀每一思之慚色而巳扼腕而巳嘆息流涕而巳惟兹一陽薦此蘋藻蘋藻匪薦薦以此心靈之鍳之閔其不能以宥厥辜祭唐親家母文德為母儀五十九年見而知者罔不稱賢昔我冡子多幸自天雀屏中選以女􅓻焉主我中饋毫忽罔愆母教之淑豈容忘筌昔在鄉里絲蘿纏綿今居毗陵同居一㕓姻婭之情益加於先母在床褥久弗能痊曰女曰壻常侍榻前我來問安飲食流連今也云亡骨肉棄捐為子壻者公務所愆羈旅金陵未能言還女以慈育月輪未圎棺弗能憑縗麻涕漣垂髫末孫其哀亦然我念疇昔淚如迸泉有菲蘋藻供陳几筵靈其如在鍳此惓惓代王仲孚祭表伯母文昔居故里家為比鄰綿綿瓜瓞如朱如陳今兹異鄉亦復如舊通家往還情以日益厚靈以沉痾一載之餘匪朝伊夕俟詢起居若我婦子均䝉眷顧食必分甘骨肉相處孚方馳驅信宿而歸靈乃即世幽明永違匍匐往救巳不可得陳此薄奠涕淚沾臆祭王君夀文昔在西孰草有餘年公之父叔坐於講氊愛我敬我如骨肉然公于此時雁行聨翩敬以父執禮意勤拳規行矩步靡不勉旃厥後一别陵谷變遷公守故邱我落梅邉萬死一生脫身戈鋋我東來歸公喜自悲喜獲再見悲厯艱危冠玉之美殘為瘡痍樓臺廣居化為茅茨衣不紋繡緼𫀆為宜食忘八珍啜菽如飴樹菊軒階杖履棲遲幹蠱有子蔚乎孫枝樂事以酒餘皆弗治佳哉蔗境為鄉白眉我嘗鼓琴滆浦之湄連城婁宿細論昔時負笈之孫服受我詩自兹以來别多㑹稀花朝月夕每有所思去年莫春尺書載馳緣有義事要公共為安知踰月遽然其萎偶出西關路聞葬期彼祖挽者舟欲同移眸子眵昏行且尼之送不執紼奠莫奉巵烈塘之東倣徨涕淚還家數日晝夜忸怩緬維前賢絮酒千里嗟今之人跬步或弛朋友道喪恬不為恥擷此溪毛陳詞尺𥿄物薄情深公必鍳止祭妻文嗚呼悲哉靈年八十以微疾不兩日而亡人皆謂天錫之福子孫滿堂衣衾而斂瘞之髙岡并餘一紀家居樂康既葬而鄰里騷然紛捉軍而驚惶使襄事之日而遇之則惡乎有數百之人祭奠于北堂縞衣而送喪也未幾而季子森為人謀陷嫁禍其身我扶􅉵而赴救詣郡邑而具陳刀筆之吏欺天妄人妄移文于崑邑欲玉石之俱焚賴公道之不泯如屈蠖之得伸雪埋而歸父子悲辛以今思之六十年之伉􅓻常居安而欣欣雖世變之秋避兵海濵亦未嘗遭此不仁信乎我細君有可福之善䝉隂相于大鈞也耶卒哭之祭遂致目眚死而有知必不我嗔吾知母之慈子必哀憐其遘迍奈何死生幽明之分兒哭之慟我亦沾巾嗚呼悲哉祭張溝南先生文維洪武十六年月日同郡老友謝蘭謹遣孫塏以清酌庶羞之奠致祭于故心友溝南先生之靈曰嗚呼近年耆英晨星落落公在鄉邦雞羣獨鶴詩三百篇精華咀嚼吐而為文光輝焯焯粵自早歲蜚聲臺閣遭時多艱屢進屢郤歸來故山雲卧一􅊤洪武更化羣髦進趨克嶷有子首應而須手持直筆追踪董狐如晳有參飬志而娛寶樹遽折悲風呌呼公無怨尤曰命矣夫中郎之女傳業于家丙申莫春郡志有作時我與云同秉筆削甲可乙否語皆良藥别來𢾗載心交如昨愛及吾兒義尤不薄前年過我新秋夜凉中庭夜坐月白如霜劇談千古把酒淋浪興盡而去東方未明去年夏五我兒云亡公為墓銘九原有光弔我唁我喻以大方斗城之別譙門夕陽自冬徂春人多讃揚優哉遊哉新居草堂幽花秀石池島蒼莨不徒玩物世慮俱忘顧我潦倒理宜溘先安知矍鑠乃在我前四月九日訃音忽傳無妄之灾網罹正纒葬不克送酒不漬綿每一思之淚如迸泉病目昏盲舉步欲顛塏持瓣香拜于靈筵鮑叔知我鍳此勤惓姪婦祭姨母文昔侍姨母東吳避兵我姑繾綣諸婦奉承及歸桑梓半舍之隔歲時候問眷焉如昔今我娣姒等哭姑之淚未乾而又哭姨母而永違母乎母乎見我姑于地下其能說諸婦之哀思乎溪蘋霜薦此一觴阿翁倀倀作此祭章代常信孚祭親家母文曩豫之家幹蠱乏人賢郎贅居䝉飬而姻維時魚軒雲從祁祁繄我婦子獲瞻母儀事雖從權悉如所願舉室歡然親親眷眷去年合巹䝉餽茝蘭愛子及婦恩出肺肝顧豫東床每歸問安慈愛之深尚䝉垂訓所可喜者起居樂康豫嘗詣門亦得升堂别來未幾聞有隱憂豈意成疾竟弗能瘳訃音忽至婦子匍匐泣血呼天救不可得我來柩前奠此束芻區區哀忱靈其鍳之代木森冬至祭母文嗚呼痛哉每年冬至齊宿祀先母率諸婦供具酒食今也中饋或有缺失誰懇懇而朂之耶每年冬至賀客過門母語諸婦治具迎接今也禮意或有懈怠誰諄諄而命之耶一味之甘誰分諸幼耶糗餌之屬誰餉之鄰里耶是則目擊序而追感者如此至若子孫之有室皆吾母擇配而為之子之婦孫之婦其婦工有未善者皆吾母教而成之平居之日甘㫖裘葛之奉則吾母弗求其偹溫凊定省之禮或有疾則終日終夜木之濠梁屯種森之滕州𬒳劫林之客死新鄭吾母為之廢寢忘食晝夜憂思痛哭幾致喪明慈愛之情言莫能盡如此之恩又皆在劬勞罔極之外今子之死者固不能報其生而存者將以報其萬一耶母兮母兮無復見兮寫此哀衷矢弗諼于逺弓祝亡子文洪武十六年十一月二十一日老父命汝弟森持思賢録一簿置汝靈几酹之酒而祝之曰往歲板刻辨惑編既成汝嘗執書立吾前而言曰不圖今日遂二十年之願欲矣汝于此時喜容可掬吾知吾兒推心父腹繼而摘藁尤喜成速携二書新鄭之行不兩期而瞑目今老父偶逢于知已又為刻思賢之録此汝之所寫者稍撙節其簡牘工數月而就緒吾巳盲其雙目摩挲𥿄夲無復能讀嗚呼誰念其為之不易寶之如玉耶誰為其喜而傳之士友道治丐乎道鄉先生之膏馥耶悲哉吾兒身不可贖置此書于靈几猶掛劍于宰木顧觸屏之子若孫絃將斷而復續睹物思人淚沾汗竹代東洲黃氏祭母舅文嗚呼見舅如母念母不忘舅復厭世豈不永傷若吾舅甥世居邑里如鳥同林鷇育棲止版圖之繆牽連伏辜天恩汪􅐮姑緩其罰脫網之魚赬尾發發七里八岡水溢溝澮載欣載奔過我歷塊蒼髮黧面泥土裳衣忘乃劬勞負疚而歸賀者在門退不旋踵弔者之來乃哭而慟如至親洎諸姻婭痛不可忍涕淚交㵼將來休戚無復相知俯􅅹肝膽酹此一巵祭賀彥銘文南華有言曰上夀百歲中夀八十下夀六十一月之間得開口而笑者或四五日而不能及也况遭世之岌岌乎如公之生垂及中夀喬木故家不為不茂遇陵谷之變遷若摧枯而拉朽坐衣冠于塗炭脫性命于虎口元龍之豪氣雖衰丹穴之鳳雛方雊俄陸海之風波沉鐵船而莫救有竹林之小阮尚枝梧于左右五六年憂患之中能一笑如南華所言者亦烏有也嗚呼哀哉凡我親舊居同里閭困蒺藜于世變之日煦涸轍于濡沫之餘犁鋤乎荆棘之埸屋廬乎瓦礫之區若夔蚿之相憐不戚施而籧篨吉凶慶弔出入起居或叙情于杯酒澆磊落而欷歔今也云亡痛當何如奠椒漿于三寵墮清淚如鮫殊悲風愁雲送乃軟車代陳彥髙祭妹文嗟我先世錫山故鄉曰朱曰陳閥閲相當乃以我妹嬪朱之良為婦而賢孝於姑嫜陵谷一變雲萍四方念我兵餘如龜六藏聿來依稀鄰里分光爾居再遷半舍相望手足之情眷眷相弗忘常念我甥來我渭陽我兒念姑安問亦常焉知微疾遽尓云亡朱陳六親罔不痛傷况豫潦倒孤雁遑遑慿棺飲泣奠此壺漿祭妻兄文大哉天之所以為天兮宰萬物而幽玄雖陵谷而變改兮恆福善而弗愆觀若人之始終兮蒙隂隲于彼蒼避戎馬于勾吳兮涉畏境如康莊聚原鴒以救急兮作歸雁之同行舍故土之荒穢兮樹豐業于暨陽托家政于仲氏弓日娛客以壺觴肆優遊于桑榆之景兮家有餘慶蹇豫早歲有室兮得名門之女弟賴昆季之眷顧兮于今四歲紀眷小阮亦僥幸弓辱妻以其弟之子悵東西之相望兮多契濶而㑹少比問安而抵家兮喜棣蕚之俱好孰謂别無兩月弓聞訃音而絶倒慘豫室中之人兮姑與姪其同悲徒匍匐而莫救兮淚滂沱而沾衣奠椒漿而永别兮叙生平而陳詞除服祭母文二月十四為兒子木等作齊衰母服也三年之喪猶卒哭而再祥禫而除其服者古之制也然劬勞重恩罔克有報孝思之心有不能隨服而除者也於是撤靈幃于斯寢奉神主于祠堂歲時蒸嘗寓不忘之意也不忘者何敬與愛也凡吾親之所敬者敬之所愛者愛之則親之死猶無死也苟忘其親則親之故舊或疏如途人親之子孫交惡為仇敵也以若所為是不孝也觀夫孝之至者通神明不孝者必獲戾于神也過庭之訓諄諄有年勉而行之請質諸母之靈也矢心陳詞終身戒也遷祖考神主祝文嘗聞祠堂之制當設四龕以祝四世之親不肖幼年在父兄之側失記髙祖考官稱髙祖妣姓氏故曩于兵後重立神主由曽祖及禰而巳虛設第一龕于兹數載今因亡妻終喪其子木等奉母主入祠敢請遷曽祖居第一龕曰祖曰禰從而遷之以第四龕安奉其母任氏候應芳之殁然後改題髙曽祖禰稱號也不肖違失禮制不能無罪惟尊靈恕之寒食祭曽祖墓祝文素賴先世德澤未泯瓜瓞遺蔓幸繼蒸嘗時維禁烟隨俗展墓匪云報本庶不敢忘伏惟尚饗祭祖禰墓祝文墓祭非古也以應芳不肖不克歸里不能以時省掃常愧于心每念寒食展拜墓下豺獺之意庶幾萬一常兾先澤垂𥙿後人有永弗替墓祭母弟祝文寒食墓祭雖狥俗禮為子孫者哀墓省掃亦庶幾豺獺報之意焉惟慈母賢弟魂魄有靈必䝉歆格墓祭先兄祝文父母遺體夲有三兄仲兄避世不知所終伯兄季兄並窆于此時維寒食祭掃荒邱手足之情庶乎不忘娶孫婦祭祖祝文維洪武十八年歲次乙丑三月𥘉四日乙丑孝曽孫應芳等以孫男塤于𥘉五日丙寅吉辰娶夲縣安豐南鄉吕氏女為妻敢招告于某官曰娶婦三月而廟見者古婚禮也近代之制以日代月各有義焉應芳輒敢參酌古今從宜從俗擬於翼日親迎婦𥘉入門先當拜謁先丗以見不敢忘本之意然後祗見舅姑及詣姻眷自兹以往庶得奉承宗祀蔓延嗣續尚賴遺澤垂𥙿弗替謹以清羞酌庶羞前期祗薦謹告祭徐仲清文嗚呼九流百家玉石混錯公隱于醫常之一鶚黃岐之書孰云不知公得其要探玄索微如古兵法時用出竒博議宏辨吐屑霏霏蜚英早年鄉評衆推紫燕厯塊非駘可希遭時艱危挈家勾吳藥石之靈孚及豚魚長蛇當路報亦銜珠以之事親厚飬為娛春風杏林名聲載途所不忘者首邱如狐大明開天四海一家父母之邦青氊故廬徵車聿至乃赴清都醫國之忠老莫能輸謁告而還子孫怡懌蜂房合户哺雀羣烏混迹市塵懸我藥壺衛生之仁施于州閭佳哉蔗境餘人所無衣冠敬共鬚眉皓如應芳沗交四世于此公有佳兒愛我中子同業於儒同出而仕惟命不由一生一死公恤其孤與諸孫齒誘掖激昂誨言提耳老我墻東相望咫尺頻年喪明跬步千里時䝉問信或餽藥餌心親迹踈匪負知己今公榼棺事皆定矣我末能然望風長喟束芻授孫往奠靈几玉雪之姿羔墻宛爾載歌薤露商飈歘起願言從逰脫屣滓泥存順沒寧庶幾無愧遷葬三兄祝文元厯垂盡時盜之槌頷珠斷臂釧無處無之嗟我三兄荒郊廢冢雖有後人漫不省視與無人同薪者芻者為樵牧埸而犁鉏者日侵月削又將為禾黍區矣應芳以同氣之迹是可忍乎今重製二函遷瘞祖壟東南隅以祔大父母父母及諸父之側並封如前䕃以竹木歲時灑飯庶得享而侑食焉惟兄有靈安兹幽宅諸親友祭曹子夀文古之人有言兔死狐悲物傷其類况人為物靈居同里閭有瓜葛之親朋友之義者乎又况子夀之為人善與人交而有春風和氣者呼居常往來杯酒為禮或有時而合歡雪襟懷之凝滯奈何轑釡之聲瓶罍之恥往往鮮克遂其意也欷歔慷慨音猶在耳一月之餘痿而弗起屬纊未定而榼棺訃音裁至而發靷東方載明虆梩亟奄于橫山之趾凡我親朋惆悵而巳其為骨肉至親者又何忍而至于若是耶溪毛泂酌亟奠靈几遂成永違䫙而有泚祭唐仲傑文公之子吾子之門弟子也吾之孫公以小友呼之過愛而忘其齒也垣雖失怙如飲食數載慶弔吉凶且能惓惓乎盡其禮也今公之沒胥靡也哉古人月明千里再歌些調魂弓歸只寓永傷于匏樽一酹乎落花流水祭劉德祥親家文人皆謂公有通濟之才設施之方且識見之長何終始之乖張吾嘗比公為江河之舟視舶而微非葦而抗能重載而逺適可周流于四方或長河順流懸帆巨檣一日千里快若飛黃或大江水逆石尤風狂釘石系纜隨波低昂或脫難於盤渦或經險于吕梁或候潮而逗遛或阻水而倣徨安知一夕怒濤舂撞盲飈簸揚遂顛覆于鮫鱓之鄉嗚呼哀哉六十四年安危變遷以資禀之髙明知有命之在天不尤不怨處之泰然鄉之旦評前後可甄有可稱于後者何異乎青史之傳嗚呼哀哉如某者昔在東關鄰比相依承公以鍾愛之女為吾孫阿塏之妻雖别多而會少獲通家而往來每黃耳之有信知告老而有期擬祖孫之同迓呼麯生以洗泥訃音忽至招魂來歸塏也哭婦翁于四千里之外奈此願之乖違兩兒扶持奠此一巵文以抒瓜葛之情詩以寫薤露之悲公知不知我泗沾衣生日祀先祝文某之生斯世也九十一年每念劬勞罔克有報也然視不明聼不聰而猶有可覩之物可聞之聲肢體雖頽猶能杖而行几而坐也方寸之天不蔽于私義理昭著而能燭物是皆生我教我者之大恩也先世之恩雖不能報實末忘乎心也况夫左右服勞飲食裘葛內外有人老老幼幼頗知義方非祖考垂𥙿之力焉能得如是之樂也自今以往天年未盡喘息未絶皆感戴之日也家饋殽羞先用祭享亦庶乎豺獺之報本也歟代席彥適祭徐子思文旦必有暮死生奈何或玉關之不入或薤露之有歌或馬草褁于異域或魚腹葬于泪羅是皆卓犖之士去鄉井捐首邱而忘其考槃之阿也今公之沒類乎古人論公平昔良可悲辛其家居也克肖而翁持身以儉約勤苦待人以和氣春風其戶役也羈縻長安夢方尋于失鹿事乃畢于蓋棺嗚呼三子䁀峙峙乃公餗銜哀服勤惟恐顛覆雖匍匐而莫救望鍾山而慟哭東床佳壻淚亦盈掬如某既忝姻婭且居鄉曲愲愲乎叶力同心董征輸之萬斛覩丹旐之來歸極感愴于心目蓉湖采蘋薦此􅌬醁武進縣學立先賢祠祭文昔之人以鄭公之賢而名其鄉以荀淑之子而里名髙陽蓋地因人勝使山川人物皆為之有光今夫三先生之産兹邑也道學之傳淵源二程發揮道妙有功遺經劾當國以滔天之罪而貝錦乃成諌至尊以正始之道而逆鱗敢攖觀夫感應之泉醉客之語則忠義之至通乎神明若夫由大魁而演綸參大政而憂國者位雖不同同乎一誠輔崇寧之𥘉政知秦蔡之非賢俄梁木之俱壞徒流芳于汗青量皆可以為天下之師表百世之儀型豈特為鄉里之榮哉某等叨䝉國恩社民之寄以先生祠諸學宫是亦祭于社之遺意詵詵諸生駿奔粢盛如將見之於墻於羔沾德薰于晋鄙何以異乎師承我將見金鍾之䜟復靈劍之文聿興謝莊曽祖墓清明祝文某嘗聞先世開封渡江蕃盛東西謝莊地因人姓三百年來陵谷變遷自髙而上故隴茫然眷兹哀邱鬱鬱如許即彼强侵為外禦侮非松非楸幽篁翳之弗樵弗牧周垣衛之寒食清明聿來省掃追逺者心妥此蘩藻尚享新河口祖墓祝文邱墓之祭禮無所考然俗禮以清明祭掃其來尚矣苟于此以盡其誠亦庶乎豺獺報夲之意幽明雖殊有感斯應所謂洋洋如在者將見諸羔墻見諸堂封斧封馬鬛封也某等雖不肖尚期垂𥙿以衍餘澤繼述弗替尚享先考忌日祝文父母之恩人皆罔極惟我父之鍾愛于某也既生之又能擇師而教之使日就琢磨黽勉樹立雖不克奮馳驅取青紫以華其身以顯其親以澤其後人然此身賴訓育之力不姦不邪不淪胥于俗陋之習於先世無甚忝辱子若孫則矯枉就正識之無于農圃之間我則杖履所至晏然棲息無飢無憂是皆吾親之遺澤未泯也此恩此德之死不忘惟兹忌辰祗陳泂酌以鳴其感悰恭請顯妣石人氏安人同賜假享謹告代丁學古祀先文奉先思孝聖賢之訓甚明事死如生祖考之靈可格焚香代鬱鬯之灌秉燭為庭燎之光雖無鐘鼓鏗鏘惟是豆籩奔走志意追思于齊戒客儀如見之羔墻蘋蘩蕰藻之菜靈筵可薦參苓薑桂之物相籠親傳谷陵兩變于當年城郭一㕓于今日如繩祖武勉讀父書豚魚或昧于交孚時加修省豺獺粗知于報夲歲奉蒸嘗伏願濯濯厥靈洋洋如在灾不生禍不作正賴乎厦屋帡幪居之安資之深何異乎門閭髙大根深蒂固地久天長𥘉進酒生不封侯賜酒泉無人死作酒中仙一杯𥘉進葡蔔醁且喜家庭有象賢苾苾芬芬一豆羔丹衷寸許若葵傾我宗我祖應歡喜自惜厨無轑釜聲再進酒饌銀燭生花再舉觴滿堂渾是鬱金香愁多莫問人間世年少多為地下郎不識駝峰翠釜烹羔名錦帶亦虛稱一杯骨董如芹獻五味調和意盡誠三進酒饌孤兒碌碌混泥塵華胄遙遙出搢紳百拜勉循三獻禮一年祗薦四時新廟堂調鼎用鹽梅四海蒼生笑口開我手幸無窮鬼捩折旋三獻奉羔杯進饅頭籠餅炊來玉屑香貽牟喜得歲豐穰賢如脫粟晏平仲應笑縮葱侯侍郎送靈致語切以欲表孝忱勉循俗禮焚楮錢以代幣意在殷勤酹桂酒以送靈魂歸寥廓下情不勝感愴之至代祭曹子毅大使文萬物之靈莫靈于人然人所以異于物者秉彛方寸之天不私而公不僞而真也惟靈身無毁傷不辱其親口無萋斐亦近乎仁不汲汲于肥家不戚戚于謀身西園鬻爵乘時取名東陵種瓜避時辭榮是皆過不吝改而復其天真至若愛女而嫁不贅壻而效秦視其弟之子猶子意終老以歡欣非明理而能之乎彼昧於理而不能然者寧不泚䫙于泉下貽誚于鄉鄰某等親舊交接敬恭相承悵幽冥之永别感涕泗而欷歔軟車發靷奠此束芻子祭父文代奔牛陳明逺兄弟作哀哀父母生我劬勞欲報之德昊天罔極此尼山聖人删詩三百存此言為萬世之訓也凡為人子者親親之心其可忘耶况某某之痛親尤有甚于常人者元曆之末兵戈數年委棄桑梓流離異鄉其生也不能盡菽水之歡其沒也不能永宅兆之安陵谷之變邱壟之失仰愧俯怍無可奈何于兹又隔一宇宙矣今也倣昔人衣冠之葬葬以木主巫陽些歌魂兮來歸于以寓安厝之禮于以表追逺之心非敢謂報親之萬一也嗚呼哀哉嗚呼痛哉代祭姊丈何子潤文猗歟吾姊得配君子梁鴻孟光隱德可比眷我弟昆骨肉無異賔朋之交或臧或否坦率忤物豈無微纇嗚呼蒼天禍福倚伏乃著戎衣往役安陸折桞郡城别淚盈掬十年夢寐每念衷曲黃耳書歸殷勤齒數路越四千親愛益篤尚聞矍鑠慰我毣毣安知訃音遽云瞑目生還玉關無復可卜嗚呼蒼天何怨何尤嗟嗟我嬃舉案無由兩地共哭痛心如抽爰命巫陽招魂道周香雪一觥薦此蘋羞魂兮魂兮來歸首邱代祭金親家文金以運糧遼東巨船五十餘隻官吏役夫千餘回途遭風覆舟而溺嗚呼平地風波陸沉者多航海而沒奈貝母何魚腹葬兮渺茫散精靈兮八荒巫陽銜哀兮籲穹蒼白雲悠弓歸故鄉大矣哉尾閭無􅔄渤澥無邉非精衛之石可填豈彭咸之居可遷魂弓來歸閭井依然雙親具保其妻子一弟服勤而力田逍遙徜徉何異乎生前某等葭莩之親鄉曲之情援溺之手罔措將迎之意宜傾言采溪毛薦此一觥代吕輔之祭湯母文惟靈春秋八十有七年林下髙風鄉稱姆儀耳聰目明老而弗衰盡三從之道全四德之歸其早歲之事非詳所知請以晚年所見而知者頌之男婚女嫁各得其時愛其男及其婦則能盡其慈親其女及其壻則無偏無私凡諸卑幼愛亦如之視姻眷如骨肉待鄰里無陵夷故其病也人皆扶持其殁也人皆涕洟而今而後侍奉無期區區酌東洲之水擷橫山之薇于以見親親之情于以表戀戀之悲靈其不昧鍳此哀詞祭重外甥女周氏文維洪武二十四年十一月日龜巢老人謝舅翁携子及孫以清酌庶羞祭汝重外甥周氏娘子告之曰人不幸遇世變而俘于兵如風雨落花藩溷泥塗鮮或不汚汝乃釋係纍以配二千石之子宜其家而悅于舅姑此不幸中之幸非人之所能圖也至如一念之孝念母孀居草餘年抱歸寧之願百餘舍涉艱關之途德哉良人能與之俱服齊衰以終其喪脫簮珥以恤其家眷我東翁母嘗託孤亦𣣔報之以璚琚凡如此類竹帛可書然則昔之所幸者抑亦有感于天而天賜之扶輿也今也一疾斯須朝露溘然鬛封象服慈親田墓弟良人之悲有未葬之親未笄之女汝何忍乎舍旃我意汝視斯世斯身履氷臨淵玉石俱焚萬萬千千保遺體之全歸餘無憾于九泉寥寥旌善亭令名誰為傳嗚呼蒼天代曹原度祭黃仲器文公長原內某為忘年交年雖不同身同澤臞韋杜桑麻叔牙夷吾舊雨有時而契濶今雨有時招呼往往來來曽不計其誰數而誰疏也夫以公之晚歲言之一子出贅鼓盆自娛或蒼頭而詩卷或長鬚而酒壺或載月剡溪之舟或踏雪霸橋之驢尋梅看竹清逸如故人謂公為荷蓧荷蕢之徒嗚呼公之闔棺之日某客東吳不救喪于匍匐不送葬于泥塗每一思之涕泗沾𥚑酌彼潢潦薦此束芻謝莊墓祭祝文開封舊家軒冕烈塘隨龍渡江奄宅兹土豈無佳城海水尋田敬惟髙堂祖封巋然清明祭掃豺獺遺意尚期垂𥙿有永弗替烈塘墓祭祝文人夲乎祖猶物之天化育之恩疇能盡然維曽大父瓜瓞蔓延幽殯宫宅此平原左三從祖吾祖右偏兩伯遷祔壁仍連五封十靈餘皆茫然天荒地老陵谷變遷尚賴遺澤箕裘勉旃清明省掃薦此蘋蘩霜露之變永矢弗諼橫山墓祭祝文哀哉慈親寂寞九泉我弟與侄亦遽溘然言之痛心有不能忘夫親在則晨昏定省親殁則春秋祭祀寒食上塜陳此饛簋雖不足報其劬勞庶循乎世俗之禮為吾親吾弟及其子念之代孫垣祭邵姨夫文嗚呼先人在時吾姨丈以肺腑之親往來之頻不逺三舍有如比鄰至不幸殁于鄭校歸葬橫山而姨丈弔之祭之無異乎平昔禮意之殷勤也數年之間姨丈不祿吾兄則桂折秋風時垣又失腳危途路迷而車覆母婺矛牙居子戎服母東吳子西蜀回視六親皆茫然置之而弗告今也幸服役而過家哀詞一幅酸淚一掬吐母子之真情于此來之一慟哭也樽無醇酹豆無㫖蓄聲容藹然鍳此衷曲新河口祖墳上祭奠祝文維洪武十六年歲次癸丑二月𥘉九日孝孫某敢昭告于祖考妣伯父母父母祖父母父母從父母九位尊靈曰墓祭本非禮欲子孫于雨露之春不忘厥祖從俗祭掃以寓孝思尚兾遺澤使後人繼繼繩繩有永弗替謹以清酌庶羞祗薦歲事謹告謝莊曽祖墳上築墻祭奠祝文維年月日孝曽孫某以目昏不能逺來躬拜墓下謹遣玄孫某等代行敬昭告于曽祖考妣二位之靈曰人本乎祖恩極如天祖世雖逺天不可忘眷此故土殯宫猶存繚以周垣以禦樵牧清明省掃歲修祀事尚期垂𥙿悠逺無斁謹告寒食祭妻墓祝文余生與細君偕老君年七十有九吾齒長于君者兩年以豫之潦倒而君稍强健也孰謂君先棄豫而逝也君骨肉之窆于此倐焉兩旬視時艱虞恨不能相從泉下以安其居惟兹寒食携子孫狥俗祭掃以寓哀思尚饗寒食祭子墓祝文墓藏而骨豈祭所乎然而之遺言有曰歸祔先塋子孫姻戚歲時灑麥飯于松楸之下志願足矣今兹寒食扶我携幼設祭墦間以踐而之言如而之祭志抑亦表長幼骨肉之情吾子有靈尚飲食之代祭胡隱君文惟靈世居東吳笠澤之濵厭處卑􅊜于兹卜鄰同井為鄉垂五十春維桑與梓寢為婚􅊚待人以恭儉以律身二子克肖構穫維勤貽厥諸孫占畢其呻老福婆娑笻杖幅巾如某等同一里閈往來侁侁以翁年髙而尊而親翁雖不飲席必同茵笑語相狎翁弗我嗔春風童顔喜色津津意其夀考籛鏗之倫何物二竪癲我吉人我來問安翁語諄諄别不旋踵哭聲遽聞追念疇昔涕泗沾巾當此窀穸束芻具陳出門一慟悲風愁雲張彥實哀詞歲丁亥之仲冬丹陽張君彥實遘厲瘧疾不五而逝其友人謝應芳為哭之慟且嘆曰噫君自少倜儻多知謀尚氣節能仗大義平居論時事言若湧泉故搢紳多器之其憂人之憂樂人之樂亦庶幾杜季良之流歟苐峭直不容人過遇强梗𣣔鉏去之用是或斂怨焉后至元間邑大姓與令有隙且與君不相能因媒蘖其短詣部使者訴之謂君嘗為人納賄部使者𥘉不能察稍加淫刑𣣔强服焉令恐噤不復辨君受挫辱屢數日終不忍加誣于令若是者非仗義能之乎至正𥘉里有橫逆君疾之一日乃自殘其幼搆大獄以陷君之季子聞者股栗君處之𥙿然詣郡邑雪理卒能脫其子之械以械之他如姻舊及凡與之逰者顛則扶之危則持之若是者又不可一二數但惜乎負竒崛之氣時不見用終於此而巳嗚呼吾彥實之死可不為之哀乎然而象賢有人君又能擇其最肖似者為仲氏之後使先世之業並立弗墜然則彥實之死猶無死也奚哀為雖然哀者人情也禮曰哭死而哀非為生者也豫與君素相知而氣質且相類狐兔之悲疇克自巳故為之辭以寫其哀云天胡為兮生楩楠搆大厦兮無不堪匠石不遇兮老雲岩天胡為兮生龍媒鹽車困兮骹骨埋名駒汗血兮陵風埃折瑶華兮山之阿望美人兮不我過我心傷悲兮淚滂沱夀上人哀詞浮屠夀道傳蘇人也年三十攖暴疾不終日而逝其親戚師友以及鄉里之人咸哀之豫之哀則又有已私焉我聞道傳為兒童時既棄家學浮屠越數歲慕徑山古鼎師化風往事之為入室弟子未幾師命典教藏聲譽蔚然巳而振錫逰諸方參禪門老宿聞見日益廣操履日益堅𬒳緇衣茹蒿芹泊如也一日念親老無他侍飬飄然來歸朝夕奉滫􅔱以答顧復之恩又築室西林閉門讀天竺書且旁通百家㑹其歸趣閲五六年矻矻不少暇庸詎知遽至于斯耶吁夫以道傳之聰敏勤苦早歲入徑山之室典教藏巳卓犖不羣使厯階而升足為藂林師表道傳乃退然自守而卒無聞也飬親而不得終其志力學而未能發乎文辭以黼黻斯道此衆人所共惜而哀者也豫于道傳𥘉無葭莩之親鄉里之嫟喪亂之際傾蓋如舊館焉以安其居榖焉以盡其禮愛之敬之二載猶一日視親戚鄉里殆有過焉以今思之可不重為之哀乎或謂彼佛以寂滅為樂而道傳深究厥㫖必樂于逝焉奚哀為豫曰不然吾今哀道傳者情也其樂與否非所論也夫情動于中而辭出焉辭而哀之亦以示不忘云大鈞賦物兮物胡不齊深谷蘭摧兮蕕生道周良農服田兮祈榖有秋禾方秀實兮賊以螟蛑嗚呼哀哉伊人好修天其渺茫兮我將誰尤哀鶴辭至正八年秋盜夜入我友諸葛用中之家殺其鶴于後圃巳而盜被執詰之盜吐其實當其穴墻之時鶴長鳴警之既穴而入鶴奮翮而前若將力禦焉故遇害用中于是惋惜流涕褁之席坎而埋之縣文學汪君以敬為作瘞鶴銘進士王君伯恂又為之誄然則鶴之死可無憾矣然豫于是重有感焉夫物性能警盜者狗也非鶴也警盜而鳴亦巳異矣禦盜而死不亦義乎人為物靈求其舍生取義者尤不易得况禽鳥乎葛之鶴其可謂義鶴也巳矣故哀之以辭其辭曰鶴兮鶴兮瘞彼髙岡不鳥其形心人之良鶴之斃兮殉于義兮骨朽名存猶無死兮龜巢藁卷之二十終
