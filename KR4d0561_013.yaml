front:
  text: 龜巢藁卷之十三
  hash: sha256:a7d61524574862b9dd30965fc2d41a731b998e94955a577c15263b9c52c61b0c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0561_SBCK_013-1a}
body:
  text: 疏三教堂修造疏推倒人我山三教一家之意踏翻生死海十方諸佛之心必須無風雨震凌乃可集江湖名勝青山舊隱白馬弘規欲求木于工師須布金于長者過我門入我室不妨分半席煙霞上我堂踞我床相與話三生風月祝聖人壽報檀那恩元山主造退居疏掀翻黑漆桶舉頭見明月當空跳上白牛車拂袖喜春風滿路毋慅急流中勇為退步怕從閙籃裡只管鑽頭但給孤舍祗樹之園則摩詰坐散花之室作鐵門限透金剛圈畫圖對緑水青山供養有清風明月應無所住作如是觀大千總是一禪床但要覺得些安身立命之地百丈只有三轉語必須撞著箇點頭會意之人了是因緣勝諸福德梁寶寺修造疏數百年祖師道場千龍圍繞五七件未了公案歲月因循要令折碓觜花生莫謂冷灰中豆爆有緣相遇何事不成大丈夫直下承當小比丘向前料理試看寶剎勝昔年梁武之時當效華封祝今上唐虞之壽無邉功德難盡贊揚謝雨佛事疏如惔如焚方慮亢陽之虐既優既渥乃蒙甘澤之恩欲報效于鴻鈞敬皈依于象教伏願王某同羽士吳某冠裳雖異鄉并實同有公家賦粟之征無仙子食松之術望霓蹙額得雨寬心田疇不失于農時􅗂􅊤免憂于他日感造化鬼神之力誦如來祕密之言開法華道場設伊蒲法供伏願百靈昭格諸佛證明雨我公及我私尚求霑足井而飲耕而食共樂豐登更兾萬邦之咸寧永賴一人之有慶謝恩誦法華經疏朝廷推曠蕩之恩飢饉處稅糧全免官吏執偏私之見施行間荆棘橫生欲徼福于百靈當投誠于三寶事雖不遂心曷能忘切念某等欽觀詔條可霑德澤赴訴為七邑之衆奔馳歷半載之餘公乎私乎自謂上天能鑒知者仁者皆云不日而成雖一時遭毒斂之蛇或他日得塞翁之馬掃除梵宇持誦真詮二十四人同演法音六萬餘言重宣妙義設香花燈燭之供奉天龍鬼神之靈上答聖恩下祈民福一人有慶四海攸同大臣以道事君罔敢咈絲綸之命庶人召役則往將來免粟米之征時和歲豐天長地久誦法華經疏作善降祥上古之書埀訓供佛有福法華之語流傳欲報德于百靈用投誠于三寶伏念某戶門孤立租賦交征為公為私寧無過咎有財有用幸遂經營居之安而資之深災不生而禍不作荷天錫福靡日忘恩擇三五之良辰禮大千之諸佛肅陳清供敬誦真詮伏願慧日照臨神天感格吾老及人老家家無凍餒之憂新年勝舊年日日有平安之喜作佛事謝聖恩蠲租疏官賦半蠲欽奉九重之詔聖恩難報皈依三寶之尊敬爇清薰俯陳丹悃伏念草茅雖賤稼穡維艱幸蒙曠蕩之恩又獲豐登之嵗倉箱頓滿饘粥可供盡力催科喜輸官之易畢中心報效感聖代之難逢仰祝皇圗虔修佛事伏願一人有慶萬壽無疆乃聖乃神乃武乃武聖德合乾坤之大自西自東自南自北清光瞻日月之明結社畫淨土疏嘗觀釋迦世尊説西方淨土教人念佛真方便第一義也今欲按阿彌陀無量夀二經命畫工寫刻極樂境界仍遠法師會一百二十三人結為蓮社瞻依寶地修行淨業凡我同盟作成幸甚西方過有十萬億國有極樂世界九品化生東林社百草三人與圜悟祖師六時行道兹欲精修淨業亦須遠效前賢想像莊嚴瞻依寶地非助我者孰能為之孔方兄肯為結緣吳道子便教著筆有色無色有相無相看諸佛之本來面目如何先覺後覺先知後知見一頭之涅槃妙心方可頂門具眼言下點頭海印菴起山門疏遍大千界未嘗無見性成佛之人入不二門方得箇安身立命之地希升堂必開戶牖為巨室必使工師敢告諸賢用求多助老身作鐵門限儘教雲水往來世尊放玉毫光轉見山林輝赫大開方便是名莊嚴請志寶長老掩壙疏為馬鬛封痛念慈親之歿作獅子吼願聞開士之言陟彼屺兮竊有請也恭惟某談空説有窮深極微參透禪機面少室山中之壁得來佛法傳黃梅嶺上之衣五藴皆空一絲不挂哀我無恃幸爾有緣願師乘出岫之雲為我送落山之月覆將香合子超升在一語之間作箇土饅頭安穩于九泉之下勿孤申請顒候降臨待雲菴雕觀音疏念彼觀音本自尋聲救苦如是信解何妨粧假成真看良工刻劃之奇即菩薩化身之妙大檀越以七寶布施紫竹林現五色毫光龍女獻珠鸚􅛥聼法瞿曇老千百億化亦須現光明之中善財子五十三參管取在皈依之列其為福德難盡贊揚請蔣居士造諫壁橋疏編竹渡蟻隂德猶多乘輿濟人傳名不朽况此河梁建造兼之佛閣莊嚴必須有力量人了此大因果事某人荆溪秀氣竹徑遺風江水吸乾無一老點頭印可涅槃鑽透不二門信手掣開尚古人淳朴之風絶時俗浮華之態積而能散綽然有餘人皆仰之竊有請也眷兹諫壁實乃要途爛月一舷每橫舟于野水埀虹千丈欲砥柱于中流惟其成此飛梁從此免令病涉練插天鯨跨海兩邊鎖三百闌干簾捲雨棟飛雲就上搆七重樓閣如斯福德難盡贊揚請蔣月堂建奔牛橋疏古堰橫奔牛漫有前賢之句過橋乘駟馬方無病涉之憂必得其人庶成乃事某人為善最樂見義必為廣造輿梁不特濟人于溱洧多修塔廟尤能事佛于祗園聚福海由歷劫之修登彼岸乃平生之願難兄難弟均懷編竹渡蟻之仁賢子賢孫綽有跨灶過父之美鄉里稱善湖海知名眷此官河實為孔道當一市人煙輳集聚四方車騎往來每遇斷橋如隔弱水不有填河之鵲又無跨海之鯨欲得安行必須改作甃鱗鱗之萬甓護曲曲之回欄車流水馬遊龍聽揚名于道上月出雲虹飲澗看橫影于波間慷慨承當咄嗟可辦置供佛花板疏獻花發善智之心因緣不昧刻楮用宋人之手工巧難成必須上根器人會此好因果事胸中開發筆􅔄化生非莊嚴是名莊嚴此福德勝前福德看他枝葉似優鉢曇佛土之養為我苾芻作阿羅漢人天之供天惠寺請愚隱長老開山疏闔閭城萬灶貔貅多依佛剎給孤園七寶樓閣大闡禪關誰其尸之曰有人矣某某機鋒不露道價彌髙若王侯將相往往歸心而淮海魚龍時時聼法慈悲願重救羣生于刀鋸斧鉞之間常寂光明悟真空于文字言語之外逢場作戲到處為家必須竪硬鐵脊梁庶不負布金心地久矣暗中摸索宜乎直下承當三千年河水重清唱開元太平之曲二六時天花亂雨入如來般若之門拈一瓣香祝九重壽請亮西山住天慧寺諸山疏佛法全盛以來在處有珠幢寶剎世道多故如此其誰能玉振金聲聞斯行之可為難矣某人頂門具眼鼻孔撩天𢾗千卷貝葉迷人都成一笑五百歲曇花瑞世自得單傳悠然卧北窗清風久矣挹西山爽氣來此矻中流砥柱我亦分東壁餘光葭樹相依鼓鐘交作如如不動黑漆桶盡􅔄掀翻綽綽有餘破衲襖為他重著慈悲廣大慷慨承當天惠寺請亮西山住持疏嚼碎鐵酸饀有幾人氣味相投搭著金伽黎二千載風流尚在顧天惠以記公刀尺政日來立百丈繩規去𣣔息肩來當接踵某人潑天聲價立地機關捋猛虎鬚早歲入曇華密室揮白麈尾前時坐三槐道場邉逢雨橫風狂便欲山深林密如明月暗投者久亦陽春寡和而然闔閭城突兀叢林住天惠姑安虎旅午橋莊往來雲水聼雷音皆上龍門三呼北闕聖人一示西來祖意方外交送愚隱師住萬壽寺疏禪月道場為吳下藂林之冠凌霄法窟得淮南老虎之孫惟其祖武是繩可使家聲復振象龍雲集林壑風生某人如愚不愚以隱無隱所見即大乘境界其行皆實際工夫出入干戈曾救百萬億顛崖之命扶持宗社實有三大千恆沙之功故名公巨卿多以為師而諸子百家亦來問道今方外舊逰相慶了箇中大事因緣雖碧雲之出本自無心而白雪之歌莫非有意昔萬壽今萬壽祝聖壽之無疆彼一時此一時將盛時之重見方外交送毅剛中住承天寺疏峙雙峨石古道場金布祇園示一指禪衆僧室珠還合浦顧馬齒掩嘉蔬之久如麟膠續斷絃之初惟得其人乃弘斯道某人曺溪正派淮海名流天下壯遊所至奏陽春白雪山中舊隱向來分明月清風南楚翁喜青出于藍北山老慶拔茅連茹當此猊座重敷之日實為象法中興之秋王公大人既為更張天龍夜乂必加擁護菩提樹纎塵不惹初無今古之殊優曇花滿地還開聿見禎祥之意續燈諸祖祝聖萬年新創水雲菴疏鹿苑三千年河沙界多興佛剎龍江六七里水雲鄊宜建法幢布金地既已現成卓錫泉蓋將湧出權輿自我恢拓在人振雷霆鐘鼓之音接雲水瓶盂之衆彈指頃要開樓閣筆頭邊當落珠璣長者布施七寶羅漢身何必朝西天而暮東土華封􅎋勤三祝聖人壽正須望北闕以頌南山福有所歸恩無不報方外交賀顔悅堂住徑山疏展開一座具視十方皆雙徑道場扶起大法幢障百川為中流砥柱惟烏獲可勝重任如鸞膠能續斷絃既得其人必弘斯道某人德尊一代名徹九重金伽黎著處雨露猶香玉麈尾揮時人天交敬賢君相問西來祖意針芥相投正法眼得東土親傳鉢花重現速步上凌霄絶頂先聲至頑石點頭變瓦礫作七寶階墀還成鹿苑滿虛空見五雲樓閣永鎮龍宮鐘鼓雷嗚瓶盂星聚士大夫期望如此者久矣佛世尊期望如彼者存焉只有天在上更無山與齊此地真為峻絶雖知燈是火不悟鍾非飯吾儕是亦知歸亟奉賀言尚圖宿覺東隱菴化齋糧疏世尊遺教每朝令乞化七家衲子坐禪在處要供需四事東隱菴雖云草創西來意正欲同參必須為糊口之謀乃可得安心之法三條篾緊縛腹此蓋藥山老特地求奇五斗米懶折腰是亦栗里翁有田可恃必須杯盂裡喫現成粥飯乃可蒲團上做著實工夫願諸公欣欣然指囷看大衆兀兀乎面壁攪河成酪待他時節到來運水搬柴是我神通妙用常當飽德誓不食言募化畫十王等像疏𢾗百年水陸科儀廣傳緇素三千界鬼神情狀妙入丹青看天堂地獄之不同使鐵心石腸之俱化莊嚴如是因果何疑欲得吳道子筆下通神必藉孔方兄眼前助力有相無相非無相直須是得兔忘蹄大乘小乘最大乘更不待畫蛇添足諸公具眼為我點頭西歸菴化齋糧疏一把茅蓋頭即不免隨緣安衆三條篾縛腹豈盡能為道忘飢欲安其心必糊其口望擅信舉指囷之手令木魚作呼粥之聲瓦釡中爛煮虛空禪堂裡儘留雲水佛世尊著衣持鉢幸傳流如此家風龎居士運水搬柴但作用無非神妙施當有報誓不食言千墩寺造木橋疏編竹筏而渡蟻猶有隂功造輿梁以濟人豈無因果千墩浦素為衝要駟馬車孰不往來惟相逢一笑揮金可便使羣工伐木試看流水即跨長虹澱山湖水國人家自是生成畫圖趙州老石橋公案别當拈起話頭了是因緣勝諸福德大祥薦父水陸道場疏父大中作折代徐伯樞薦喪不過三年鞠育之恩罔極佛能度一切慈悲之願弘深俯瀝丹衷仰干皇覺伏念某顯考某官搢紳推重臺閣蜚英立身揚名以顯其親賣金買書而傳于子赤心報國居京師為三品之官白骨他鄉賴朋友掩一壞之土死或悟空花之幻生豈忘風木之悲適亂離而蒲伏莫前非涊淟而劬勞敢負旅櫬雖藏于東薊神逰當往於西方祥􅎭日臨緇衣雲集吹螺擊鼓薰修按水陸科儀掃地焚香禮拜作天人供養伏願一靈感格諸佛降臨執金剛臺接引至七寶金沙之地瞻玉毫祖化生託四色車輪之花凡在幽冥悉皆超度水陸道場榜同前今據某郡某州某鄉奉佛弟子某及弟某等投誠伏為顯考大中大夫中書户部郎中徐公不祿以來致喪三年禮宜除服追念父恩昊天罔極取至正二十一年十二月草六日為始啓建冥陽水陸大齋三晝夜藉此良因用伸超度道場法事條具左方喪制有終人子念劬勞之報法門無量世尊埀慈愍之仁故弘開水陸道場乃大集河沙功德天龍圍繞嶽瀆感通今齋主某等念先君壽五六十年生斯世成百千萬事官居三品名聞四方衣紫隨朝所存者致君澤民之志焚黃先世且及乎封妻蔭子之榮痛憐客死于京華欲得神遊于淨土廣邀緇侣虔奉金仙琅函翻貝葉之文鐵鉢供伊蒲之饌香雲縹眇花雨繽紛樹燈懸明月光阿鼻獄爍開幽暗斛食施甘露味尸陀林充滿飢虛凡所謂六道四生皆于此三皈五戒是名無礙以濟羣生其齋主當盡乃心我清衆各修厥職有感斯應無願不從徐公百不憂直往生于極樂恆老三轉語更何在于多言無間寃親俱能解脫者廣濟菴道者化修造等緣事疏瀕湖祇樹園林劫灰久冷大地雜花世界佛日長明三條篾縛腹緊做工夫一莖草璚樓須教出現分甘古井總是醍醐想像靈山莊嚴寶地無孔笛要聲諧律吕有髮僧當力效殷勤諸公從筆􅔄落成不日見眼前突兀燕雀相賀龍象羣居比丘衆千二百五十人重宣般若方丈室八萬四千師子共禮維摩壽祝楓宸福歸檀越蛟龍菴塑觀音等像疏觀世音七佛之師神通具足阿羅漢諸天之衆在處依皈今欲令粧假成真奈不解將無作有諸開寶藏滿載鐵船對長洲茂苑之江山作補陀洛迦之境界願菩薩三十二應剎剎度人看善財五十三參時時見佛相逢具眼必為點頭忠清菴修造疏忠清公宇宙隔越猶奉蒸嘗瞿曇老風雨震凌豈容坐視雖曰即心是佛也須開口告人小苾芻固碌碌不才得錢米則多多益辦八萬四千修月斧儘教匠石呼來百千萬億恆河沙願施主福田增廣但蒙金諾即注錢銀萬峯菴修造疏半夜傳衣諸佛祖當時道在九年靣壁小禪菴近日人多本來無鏡以無臺亦合肯堂而肯構工師求木非赤手而可圖長者折枝須點頭而相許金錯刀作成妙用鐵門限準偹都來雲水依歸天龍擁護橫展布金之地大開選佛之場竪起硬脊梁每日坐三條椽下掀翻黑漆桶大家上百尺竿頭壽祝楓宸福歸擅越化城菴鑄銅鐘疏今易之折舊用鐵舊錯聚六州之鐵久已知非今新鐘鑄萬選之銅今將改作惟擅越共為爐鞲而蒲牢即出範圍作興禮樂于山林號令人天于夜旦山鳴谷應八百聲吼動鯨音月落烏啼三千界喚醒塵夢佛會祈禳疏時和歲豐喜見升平之兆天高地逈難酬覆載之恩感仰鴻鈞皈依象教切念某等或僧或俗或里或鄰田疇蔑水旱之虞邊境絶煙塵之患物無疵癘家用平康夔蚿如此其相憐豺獺豈忘于報本莊嚴寶地諷誦琅函遍告諸天地神祗同鑒此河沙功德伏願一人有慶萬邦咸寧日斯邁月斯征立見秋成之富災不生禍不作羣居生計之安化衣鉢疏世尊入舍衛城也須持鉢祖師過大庾嶺先已傳衣惟二者之得兼乃一生之可了奈何兵燹俱化劫灰今干求衆檀越相成庶圓滿小苾芻所願一鉢在手三衣稱身海上降龍便可比六通羅漢山中禮佛更不霑半點塵埃由此成功誓將報德法華經會疏為凌野卿等作世尊千百億化愍大地之衆生法華六萬餘言有恆沙之功德欲慿資報是用皈依伏願某等忝在人倫幸叨佛庇天地為之覆載風塵逮乎廓清擇暮春望日之良辰建同日常年之勝會三周七喻齊演梵音六道四生俱聞妙法供陳脯笋香爇旃檀賴象王願力之宏深感龍天鬼神之歡喜伏願潛銷黑業復見清明熾而昌壽而臧户户獲康寧之福災不生禍不作年年遇豐稔之秋化修造疏經化修造及增修蓋觀音殿折西歸菴勤上人寫金字法華有漏無漏硬脊梁撑住虛空前三後三爛葛藤掃除風雨要此屋似銀山鐵壁問誰家無明月清風孔方兄但為點頭公輸子便教動手敢持貝葉用告恩檀黃金字寫七軸蓮華藉妙法河沙願力白玉毫現諸佛菩薩看圓通宫殿隨身是名莊嚴勝前福德散花文為恢上人作夫散花者心地栽培善根滋長春生金剪枝枝奪造化工夫香滿錦堂朵朵作人天供養如風飄墜如雪繽紛優鉢曇大地皆春曼陀羅從空亂雨昔天之散之維摩室中者此也我世尊拈于靈山會上者同乎勿云色界迷人正要頂門具眼肇自一花而五葉皆為同氣以連枝欲了知是色是空須會得無聲無臭桃紅李白河陽縣車馬塵多魏紫姚黃洛陽城綺羅香溷曷若傾葵心于佛日乃蒙盻蓮目于慈雲想像金園莊嚴寶地千江水見千江月共看法性圓明一片西飛一片東當悟色身虛幻其為因果難盡贊揚募長明燈油疏密地工夫不用説石窗油盞普天照耀要單提露桂燈籠老苾芻略用吹噓大檀越正須傾倒膏馥沾溉因果分明二六時中常剔起靈光一點三千界內總利他癡暗衆生西歸菴修梁武懴疏空王為象教之尊慈悲廣大懴法脫蟒形之苦因果昭章既響報于昔年宜精修于今日即蘭若皈依金相為檀那宣演琅函必須衆力扶持乃偹諸經供養作功德海開解脫門娑婆世間滿眼是志公和尚忉悧天上舉頭見郗氏夫人福德無邉讃嘆難盡二聖菴浴佛疏九龍水浴紫金身慶西方聖人初度二聖菴結白蓮社繼東林遠公道場想像毗藍皈依極樂大檀越隨喜布施小比丘如法莊嚴諸塵非塵是名微塵清淨身本無塵垢憶佛念佛必定見佛廣長舌朗演佛音幸發心花共成因果滄洲菴修造疏本菴草創之初事有未備兹欲修造前軒粧塑觀音聖像晨香夕燈修行淨業端為祝延聖壽上報四恩旁資百有敢望諸大檀越相與作成指園揮金多多益辦插竹建精藍鎮蛟龍之窟宅開花成結果展龍象之法筵莫謂滄洲菴小小規模要作補陀岩巍巍境界軒開寶地像塑珠纓惟諸公同為結緣則良匠皆能呈巧莊嚴相好非莊嚴是名莊嚴福德因緣此福德勝前福德功歸檀越壽祝楓宸化城菴募緣疏本宅以下元令節啓建念佛道場與諸上善人同修淨業所用香燭儀供望樂助焉其為因果蓋有讃揚難盡者惟好事者領之參一指禪本元元坐三條掾下念幾聲佛要人人生九品華中當此下元敢提前話舉赤手欲諸般辦集用青蚨須衆力圓成香火焚修人天供養看西方極樂世界只在目前比東林祖師道場亦非分外願言向道請為結緣千墩寺翻蓋大悲殿疏延福寺襟江帶湖梁天監之年逺矣觀音殿震風凌雨魯靈光之狀巋然雖千手千眼乃吾佛化身然一瓦一禒皆衆人願力因緣有遇修整何難磨磚時用南嶽工夫加泥處會古靈説法即有漏而無漏在求仁而得仁寶蓋珠纓瞻妙相于旃檀林內金螭鐵鳯展畫圖于秦柱峯前壽祝楓宸福歸檀越齋僧簿敘引徑山興聖萬夀禪寺徒弟某切見宿生多幸沗與僧流道業無成四恩罔報謹以平昔所受信施之資自四月八日為始齋僧千員每員銅錢四十文為一飯之供敢望各題芳字以滿區區之願云出家以六和為尚勉守僧規傾囊與衆人結緣願酬素志效減米同舟之意助折蘆渡水之行一千員白足倘過茅菴四萬箇青錢聊供蒲飯東手來西手去免虛孤信施之恩左畫圓右畫方請連署題名之筆佛日照鑒宗風振揚釋氏舉棺文代界東為衡母作佛説西方極樂邦大千沙界更無雙諸天接引移蓮步認取光明大法幢恭惟某人現婦女身生娑婆間世一宿業八十幾年之內發菩提心慕樂土十萬億國之西念阿彌佛三從不失五戒能持子行孝而暗合禮經婦服勤而俱無誶語愛男孫女孫之親意毫髮無偏待姻黨鄉黨之真情骨肉相似報緣斯盡享福亦多到這裡蓋棺事定正須要脫灑出門超凡入聖咦一腳踏翻生死海逍遙直上九華臺活套起棺文代吳彥德作野花繁盛不多時明月團圓亦易虧一日鑿開方寸地百年生死了無疑恭惟某官天性髙朗心地坦平精勤六十五年料里理百千萬事嗣祖宗之基業實為有光了男女之室家皆如所願到這裡出門一句要説到佛老工夫自古斯民行直道青天白日甚分明剃僧頭致語燃解脫香點光明燭恭請十方諸佛説法度人要人之四大幻身脫塵離俗煩惱根盡皆除去菩提樹自此圎成伏願法嗣興隆不負真如之印宗門光顯能傳無盡之燈詩曰煩惱根生厯劫前如今盡落寶刀邉頂門露出金剛眼照見三千及大千募緣造藥師琉璃燈疏諸佛開方便門救衆生之苦楚厯劫轉光明藏破六趣之昏迷藥師佛宜用于道場枽門氏合營其法具煌煌火樹欲他因地移來朵朵金蓮自我心花發現唯金諾一揮大筆便玉成𢾗尺長檠毋論㸑蠟之齊奴絶勝燃犀之溫嶠膏澤注琉璃碗內恆沙佛同放毫光恩輝分阿鼻獄中大地人皆除瘴業功成普照福有攸歸薦父醮詞親恩罔極勉為改葬之圖道力可慿敢有超升之望俯陳丹忱仰徹玄穹切念先考某官早稱善人晚罹惡世羣雄血戰故避地于湖南一旦身亡乃菆塗于道左以兒女室家之相失豈衣衾棺槨之能周茶毗近效乎緇流煉度全慿于羽士櫝藏神主地易佳城設齋醮于新居薦英靈于仙府十極之髙真降監九原之幽滯同升伏願天得以清地得以寧由是魂升而魄降父止于慈子止于孝庶幾本立而道行存殁俱安幽明無間妻亡終七日設醮疏失內助而興哀音容如在祈上蒼之埀憫魂魄超升俯瀝蟻忱仰干鴻造切念某亡室自少結髮至老同心亡正室則側室之尊卑渾無妬忌均養子將庶子之親愛皆盡劬勞諧和而處者閲三十餘年頃刻而亡者又四十九日蝸居設醮羽士真朝誦靈寶之妙經獻齋厨之清供伏願蒙恩三境超度一人靈脫迹塵寰棄絶人間之事標名仙藉逍遙天上之逰早壇詞上天之載廣大難名如日之升照明無際雪手香花之供星冠玉笋之班伏願三境巍巍並降臨于下土萬靈奕奕咸拱衛于中天午壇詞日之方中式瞻光耀風斯在下重覲威顔心傾葵藿之誠躬致蘋蘩之薦伏願恩覃九域均蒙化育之仁澤及九原罔俾沉淪之苦晚壇詞日之夕矣禮宜益勤天可必乎善無不報仰止九關之望肅然三接之儀伏願浩浩其天鑒精誠于方寸昭昭在上降德澤于幽冥幽醮建壇詞為王文甫作兩喪終制靡忘追逺之誠百拜籲哀因瀆蓋髙之聼肅瞻金闕肇建瑶臺絳節下臨緑章上逹巍巍蕩蕩洽大德于寰區窅窅冥冥度幽魂于泉壤早朝詞明發懷二人恐淪酆土齋沐祀上帝祗仰鈞天照對威顔備殫悃愊伏願維天之命恩光被于重泉如日之升魂氣超于清境午朝詞日之方中祥輝光被道之云逺仙仗遙臨載伸對越之忱庸表處子之義伏願清都洞鑒共循晝接之儀幽壤超生永脫昏迷之境晚朝詞日忽忽其將暮深念幽冥皇剡剡其揚靈允能超度惴焉三瀆仰止九天伏願黑籍銷名長夜脫沉淪之苦丹臺受籙熙春樂道德之言請詞甥侄銜哀先後七旬而無怙聖賢垂訓古今三載以終喪俯慚悲悼之忱仰徹穹窿之聼伏念先兄某創業歷胼胝之苦黽勉成家妹夫某贅居為骨肉之親始終同㸑幽冥隔世祥禫踰期緣歲凶重困征徭故日久有稽薦拔爰慿羽士式演真科三薰飛奏其緑章諸孤泣除其素韠不違天于咫尺如履氷而戰兢薦父幽醮建壇詞為王敏孟學作陟岵興哀欲報劬勞之德籲天無歸庸申薦拔之誠俶建瑶臺式敷珠笈伏願罪除黑籍名署丹臺零落歸丘山悟人間之夢境清髙隔風雨遊天上之仙都薦父青詞子養親不逮深負劬勞日邁月斯征服經祥禫對越虎關之遠敬陳蟻悃之忱伏念某先考質直一生辛勤多故仰事俯育盡心堂構之謀朝出暮歸殫力門户之設訓子觸屏而無怒賔妻舉案而甚恭忍棄諸孤倐踰三載雖雪衣之已釋奈風木之堪悲所兾超升有嚴醮事伏願帝鄉可到仙靈必通逰白玉京行矣跨吹笙之鳯朝紫金闕飄然往飛舄之鳬醮星青詞弟禳星作折代陳子純為天有六淫疾病多由于感受星羅萬象吉凶或係于運行稽首瞻天傾心告斗伏念某弟一生多病𢾗月弗瘳手足拳攣動若太山之挾胸膈痞塞梗如雲夢之吞敬修清醮于生辰敢乞洪恩于列宿伏願璣衡照鑒瑶闕感通德星聚太丘憂者樂病者愈熒惑退三舍居之安資之深幽醮薦父青詞子養親不逮難酬罔極之恩民欲天必從敢徹蓋髙之聼蟻忱所禱虎拜具陳伏念某同弟某父殁踰一十五年深負終天之痛母喪畢二十五月又逢忌日之臨怙恃俱無劬勞曷報爰慿道衆式演真科區區盡對越之誠切切有超升之望伏願千真列衛九老啓途左畫圓右畫方變化五城之境東王公西王母逍遙三境之天道士化法衣疏神仙居宫府追陪長用鞭鳶海圗拆波濤補綻豈由顛鳯黃冠空戴藍縷包羞必須著紫霞衣乃可立紅雲殿窮道人不妨鈔化富公子當為作成曵月出門待金闕曉鐘之後携煙滿袖拜玉皇香案之前報施主恩祝聖人壽請曹月湖舉棺疏蓋棺已矣生死關未脫塵寰出門何之神仙路豈無捷徑敢煩指示庶獲超升恭惟某人和光同塵尊德樂義一襟湖海湛如明月澄波三尺風雷間與孤雲出岫嗟我雁行之相失煩師鶴馭之寵臨説破玄機大道只消一語喚醒凡夢一靈直上九天請鄧混然起棺疏蓋棺巳定莫酬母氏之恩扳宅無緣那到神仙之境必求髙士為指迷途恭惟某人和光同塵出類拔萃發揚宗教混混然流水之源遊戲詞章蕩蕩乎春雲之態簮星曵月乘虛御風仰希鳴佩之臨分付出門之語喚醒濁夢俾聖善之超升飛上清都庶精神之不死再拜稽首萬望點頭代仁惠觀請周彥忠孔李通家之交蓋由道義楊墨歸儒之道必賴師模誰其尸之曰有人矣恭惟某官才髙時輩譽藹旦評濂學家傳不剗窗前之草唐詩句好能吟觀裡之桃來坐臯比行看豹變強名曰道主善為師敢期如大匠誨人幸勿拒童蒙求我道其道德其德苐慚所學之不同步亦步趨亦趨但願其徒之速肖代歸真觀請孫伯昭寄老子法中強名曰道誨諸生館下主善為師久欲依歸敢云招致恭惟某稽古究春秋之學蜚英冠月旦之評不惟獨抱遺經抑且旁通百氏玄都賦種桃之句足擬唐人山隂寫籠鵝之經可同晉帖平居養素尤善談玄才名三十年想未厭廣文之飯扶搖九萬里尚優哉逍遙之逰大器晚成英才樂育如某者仰如山斗居此甕天墨歸楊楊歸儒曽聞其語士希賢賢希聖實慕斯文敢設坐氊以迎教鐸孺子或容其進履相儒可隱于書堂淡泊相忘清虛共守道其道德其德小哉坐井之觀步亦步趨亦趨瞪若絶塵之後獻芹伸敬鑒茹為榮虀菴疏為江叔亷作潦倒餘生三百甕寒虀未了流離數載千萬間廣厦誰依菴居卜築于江湖土著便同于鄉里竹開三徑藤刺四簾惟諸君贈草堂之資則老我得莵裘之計脫粟飯視同珠玉黃菜根嚼出宫商養藜藿之幽姿變膏粱之舊習落成有日座中約青州從事交歡繼美當年杯後為冰壷先生立傳帡幪有自感戴奚忘壽寧寺請源别流住持諸山疏嵯峨古塔雙尖插霄漢之間蕭瑟禪林一變經煙塵之後念正法凌遲者久待偉人振厲而興某人竪硬脊梁有大力量宗門中識時俊傑緇衣中少年老成從金山躍龍門如神黿鼉鼓舞對劔井坐猊床説法猿鳥依歸惟能于扶顛持危乃卓然出類拔萃煙霞接境庶幾分東壁餘光雲水滿堂相與挹西山爽氣式修鄰好益振宗風方外交疏比年以藂林凋謝恬養者多望望而去今吾别流源公以壽寧禪寺禮聘之勤奮然為兹山領袖真可謂以道自任者也吾黨之士深用讃歎敬緝儷語以效燕雀之賀云千丈潭寸膠難澄久俟河清之日百鳥鳴孤鳯忽見將來道泰之秋顧兹山並立浮圖由前代特稱名剎駕言弘道允在得人某某學有源流名揚湖海妙髙臺了翁法窟如青出藍毗陵郡新興道場如風偃草遊戲卓水雲之錫棲遲橫野渡之舟末法中為宗門棟梁知音者歎朱絃疏越堂前露柱明明為諸佛放光塔上風鈴亹亹與諸生説法華亭縣請仁伯靜住宣妙寺山門疏鳴百里之絃歌固云在我振叢林之鐘鼓正在得人由諸山鶚薦而來宜千仭鳯翔而下某人崑丘産玉合浦藏珠早遇作家函丈入澤公之室中居報國法筵提智者之綱仁者靜固其本心道之行綽有餘力望雲出岫如月當空虛室白生即洞逹光明之藏華亭清唳亦宣揚微妙之音聖壽萬年法輪三轉持諸山疏同前繼三支而稱博學逺躡遺蹤用一夔以作大章足知雅曲時則可矣聞斯行之某人氷雪丰姿江湖襟度執經問難遍參諸老之門領懴司賓兩秉藂林之政蜚英聲于方外展濶步于雲間踞鳯皇山作獅子吼天髙地逈靣九峰翡翠之屏月白風清目三泖水精之域方外交疏送大雲講主權住福壽院福壽禪院者錦溪之佳處也山中耆舊以主席不宜久虛力請吾大雲和尚居之事雖從權而林泉頓為增重而吾黨亦可尋盟蓮社矣持一瓣香綺語以贈山不在髙安靜處卓飛空之錫老當益壯談笑間用合道之雄暫踞猊床橫揮麈尾拂某人春秋八十功行三千竪硬脊梁得天台髓慈雲廣大諸方蒙教雨旁沾智月圓明在處有人天交贊鐘鼓振錦溪北柵衣冠比廬阜東林或疑為入谷之幽自謂作逢場之戲法雖修于出世義不失于隨時當此黃楊厄閏之秋乃有白蓮結社之日魯司寇攝行相事曽三月以成治功逺法師影不出山且六時而修淨業薄言燕賀永締鷗盟永安菴尼請禪老興正宗持住疏余曩歲以衣鉢之資檀施之力創造本院年今八十有六力不能支且無法嗣是用以一應恆産捨為十方禪剎恭請紹隆正宗和尚入院焚修接納雲水契券雖明禮宜疏請昔天竺第一代祖師得度賴阿難之力今震旦編十方禪剎流傳皆逹磨之宗欲改換其門閭宜選擇乎領袖位須德稱道在人弘某人學有淵源名揚湖海千岩老恬目謂能承鐵壁箕裘一把茅蓋頭又多挹玉峯溫潤撥慈航過來不逺將法幢扶起何難雲擁猊床風生麈拂泗橋流水喜瀠回説法之場祇樹獨園當恢拓布金之地香拈一瓣壽祝九重真武經堂會置田疏代張伯祥作某將建真武道堂為吾黨月會清修之地築室塑像勉當獨為預置齋田敢裒衆力惟諸君領之上真玄聖揚靈足踏龜蛇下土蒼生報本心同豺獺擬一已力營真館率諸人預買祊田年年得黍稷之馨月日奉蘋蘩之薦永言祭享賴此膏腴作善則祥不善則殃此體物不遺之妙同盟之人既盟之後正自求多福之秋筆底揮金隴頭種玉置草堂疏代施大鵬作某久客橫塘視同鄉土業欲築室于此圖將老焉敬惟諸君子夙昔庇士必賜作成修辭抒情不自覺其抽黃對白也仲宣依劉荆州慷慨作登樓之賦子美詰黃録事殷勤覔草堂之資蓋依仁乃客子之本心然芘士實故人之髙誼孔方兄但能助力公輸子便可成功鶴帳弗空莵裘可老厦落成而燕雀相賀喜化日之初長門髙大而車馬能容看德星之常聚帡幪有造感戴初長方外交疏余生寡諧俗特于方外髙識之士樂與之逰若我雪心和尚前居南山相好為忘年之交今主領天寧禪寺緇素歡欣山林德色豫于是緝𢾗語以頌其美以抒其交情云齊雲古佛剎留泗州寶僧之衣慧日大法門為常郡禪林之冠稱其名必有其實弘其道須得其人恭唯顯公禪師妙年老成奇器卓犖入松林室中布毛吹雪傳無盡燈坐楞伽峰頂麈尾生風握真如印如卷舒于前日大展布于斯時金斗城圖畫天開鐵門限縉紳雲集爾乃竿木逢場而作戲我豈燈花有約而不來青青翠竹鬱鬱黃花聼法皆能會意巍巍髙山洋洋流水知音當為點頭燕賀聿修鷗盟永好招魂致語為隂陽正術吳彥德作伏以狐正首丘凡物有本原之性鶴歸華表雖仙亦故里之思三魂或散于異鄉一念可通于八極焚香拜跪剪紙招魂切念近故某官生有多聞死無遺憾驅馳日下空知行路之難漂泊天涯竟作顛崖之墮玉門關峯回路轉金斗城物換星移庸歌宋玉之詞敬效巫陽之力往年蜀魄思家而千載號呼今日楚魂歸第而六親迎迓洋如在肅肅有聲髙堂共燈燭之光靈几享殽羞之薦月白風清此良夜獲敘幽情水逺山長愁殺人變為佳境醵諸友買石題獨孤公檜四字廬山種蓮堪笑者區區佞佛董林栽杏可憐哉碌碌依人玉箸篆重題姓氏金斗城倍有輝光尚須假力于錢神即俾奏功于匠氏立公羊一片石乃大書而特書比季子十字碑尤居簡而行簡願言鳩僝詩與鷗盟干親友重搆草堂䟲代黃仲器作荒徑猶存陶彭澤歸來太早吾廬獨破杜少陵受凍何堪巢一枝欲比鷦鷯樹三匝正如烏鵲奐輪受庇風雨帡幪孔方兄毋吝點頭公輸子便令勤手十萬貫揚州鶴上人自求仙八九家錦里村居吾將老矣合矣完矣優哉遊哉大林菴佛像粧金法事疏芳茂山大林道場鼎新革故補陀岩圓通法會粧假成真仰恃慈雲俯陳悃愊切念某某鐵船渡海鈯斧開山浩浩劫峯玄都之兔葵淨掃瀼瀼甘露獨園之祇樹新霑從把茅次第鳩工置刻木莊嚴像設金色界移來勝境玉毫光照見恆沙鐘鼓雷鳴瓶盂雲集一宿雖成于頓覺四恩當報于將來伏願佛日照臨龍天擁護我見人見衆生見因見趣以精修梵音妙音海潮音觀音聲而圓悟尚期擅越同證菩提橫山白龍祠修造疏天蓋髙而地蓋厚人能感通山有仙而水有龍官為祭祀必嚴廟貌乃稱輿情公輸子便欲興工孔方兄必先助蜿蜒靈想像髙堂駿奔走執籩豆參酌用古今之禮鼓雷霆順風雨願言無水旱之憂輪奐美哉神明彰矣重造東山港木橋疏東山趾頭橫巨港橋斷連年東里子産無乘輿人皆病涉每鶴立相呼趂渡今鳩工重作飛梁事欲速成力須多助牽牛來往直可比牛郎七夕之牛乘馬經過亦何異馬卿駟車之馬吾事濟矣衆皆悅之無錫興道鄉重建太平橋疏長安道到處皆通溪山滿眼太平橋連年大壞鄉里驚心義合勇為力宜多助不用集填河烏鵲便當見跨水長虹乘輿濟人施惠毋勞於子産丈夫題柱揚名何異于長卿方外交疏賀哲既明為弘聖講主壽安山坐鎮朔方如如不動華嚴海流傳妙界浩浩無邊惟得其人乃弘斯道某人學窮員頓道混根塵舌上瀾翻皆白馬未駝之文字胸中囊括有黃龍不測之機關挺然冬嶺孤松接乃秋江正派即從别業以竪法幢天龍加以護持猿鶴為之鼓舞江流百𢾗里同梵音演竺國之經吾輩十餘人比賢士結匡廬之社尚期珍重式副願言重建忠祐廟疏自隋朝稱八絶之靈巍然廟食與陳墓對一壞之土巋若堂封人傑地靈者八九百年灰飛煙滅者一十三載剪除荒棘經營閟宮展今日之宏規復前人之舊制工師求大木政須用使鬼之錢長者折一枝敢請下如神之筆紅雲殿香煙繚繞白鶴溪流水回環看眼前突兀之屋既成有壁上槎牙之松堪畫雍雍在宫肅肅在廟􅌂遺像于丹青赫赫厥聲濯濯厥靈振英風于今古福歸庶士壽祝一人普度齋壇榜大地衆生多沉淪于苦海恆沙諸佛能拯救于慈航會遇有緣寃親無間切念齋主僧某洎諸信士某等為見曩因喪亂兼值凶某或被戮于兵戈或遭烹于鼎鑊或疫癘而全家不起或飢羸而比户俱亡月明星稀長夜發無依之嘆天隂雨􅊜常時聞寃苦之聲三寶前今獲皈依九泉下悉令解脫故此新開鹿苑于焉延奉象王命苾芻按乃科儀傳華嚴諷諸經典燈燃火樹阿鼻獄焜耀靈暉食施斛拌尸陀林飽厭甘露齋主宜志心皈命僧流當竭力奉行有感必通無欲不遂伏願佛垂慈愍人得超升玉毫相光照十方咸聼正法金沙池花開四色同往化生壽永天家恩霑沙界干人贈行疏嘗聞朋友有通財之義今某毗陵人也久客居貧欲還鄉而不可得敢請諸君子仗義以贐其行真美事也聼馮歡彈鋏之歌不勝感慨覽王粲登樓之賦亦甚懷歸事有難言理宜代述切見某人鄧侯華胄毗陵宦家二十年海內兵戈遭逢塗炭五千卷胸中文字收斂光􅉭故園之松菊都荒莫景之枽榆不暖但空載滿船明月豈能乘兩腋清風惟諸公曰餽贐焉則此老營莵裘矣腰纒十萬貫便可比揚州之行負郭二頃田更何羡蘇秦之印毋嫌饒舌特為點頭代曹仲鉉募親舊作隱居疏白髮三千丈悵然吟謫仙之詩行窩十二家徒爾慕堯夫之樂借巢鳩拙繞樹烏飛屋茅席捲于秋風衾鐵寒添于夜雨欲新搆作莵裘之計必故人贈草堂之資經之營之完矣美矣潞城風景幸春回兵革之餘劍井虹光看日射軒窗之外帡幪有自感戴奚忘道家受生會疏大功不宰巍巍乎上帝難名小道可觀碌碌乎下民有報蓋豺獺不忘其報本即潢汙可薦其􅐚誠芳名請日下先題勝會在天中令節惟白水真人辦力有玄都道士通靈水到渠成山鳴谷應天一地二天三地四要之同受于生初人一已百人十已千冝爾力行乎斯道黃鶴菴居疏餐五粒松前度看枽田變海縣一壺藥今畨結茅屋山居要得如清溪道士之家必蒙助白水真人之力帡幪有造修養奚難繞香煙鶴聼珠經山鳴谷應養神丹龍蟠金䁀地久天長辨惑編鐫板疏左賦初傳洛陽紙頓增多價白詩可易雞林賈猶用一金矧端人正士之立言皆至聖大賢之遺訓人能弘道德必有鄰切見龜巢老人行年彌髙信道愈篤文字五千卷筆前言為辨惑之編辛勤三十年絃古調待知音之聼固緝補其舊矣宜鐫梓以傳之登山採玉入海求珠所寶無暗投之嘆製芰為衣紉蘭為佩相薰成俱化之功珍重斯文咄嗟可辦奔牛橋南重建井亭古堰橫奔牛髙下分河中之水碾渦深沒馬傍邊宜井上之亭中書君但請揮金公輸子便能求木畫簷飛起接金臺藹藹之雲煙素綆來趨披珉甃泠泠之氷雪願言多助立見落成沈子英以先人墓毁于兵重葬木主作佛事追薦疏七十二疑塜求全難救於昔人千百億化身超度祗慿于我佛投誠三寶追悼雙親伏念某顯考某官顯妣某氏沒有先後恩皆深重北邙埋骨不期毁馬鬛之封西郭招魂復用卜牛眠之地祔卯君而安厝題木主以珍藏情極哀傷事從權變爰命緇衣之侶共陳素供之儀鳴佛樂於法筵宣梵音于教典聚功德海及尸陀林伏願佛日照臨人天感格九品蓮臺之極樂父母超升一壞莎土之無虞兒孫祭掃天長地久存順沒寧方外交疏賀行敏中住永慶寺塵生東海八荒宇宙重開石爛南山一壑煙霞猶在欲起廢而還舊觀須作興以布新條水到渠成山鳴谷應某人深悟單提之旨旁通百氏之書石麟角煎膠續絃從禪月道場得來三昧秋兔毫囊錐脫頴有潑天聲價震動四方道之行歟時則可矣折松枝升座説法種蓮花結社招賢且自怡隴上之雲將突見眼前之屋置草堂宿土室今吾似少陵先生留玉帶鎮山門何代無東坡居士燕賀有喜鷗盟弗渝忠祐廟修造疏世稱八絶數百年人傑地靈廟食一方二十載灰飛煙滅欲舉手作長廊廣殿向知音説流水髙山我老鶴歸良工鳩集惟長者秉如神之筆能慨然助使鬼之錢經之營之完矣美矣丹青遺像若生成大業之初恢拓宏規將復見靈光之舊褔歸衆信壽祝九重諸山請偕長老住報恩寺疏金園祇樹胡少師原是恩檀玉碗葛蒲蘇長公曽留詞藻雖往事盡成隳廢惟得人乃可作興某人學有淵源聲溢湖海大力量能勝重任諸行輩或稱老成松月堂前吹布毛于禪衲錢塘江上揮麈尾于法筵斷絃琴來續朱絲無孔笛别成清調如斯出手方謂作家岸為谷谷為陵更看歷僧祇之劫士希賢賢希聖會當傳佛祖之燈鄰壁光輝宗門焜耀三山湖重建木橋疏踏蘆渡水莫言他物外通神伐木為橋且作此目前方便故址在雨汀煙渚良工運月斧風斤要得速成必須多助倣佛填河之烏鵲依稀跨海之虹霓三山湖岐路縱橫人無病涉駟馬車諸公絡繹自可留題濟衆云功埀名不朽重建排墓橋疏斷橋人不渡如弱水以隔蓬萊小徑曲通村奈荒野而披榛棘溪分燕尾路繞羊腸必飛梁重壓煙波則大道直趨城郭金筆一揮于長者斧斤羣聚而成之浮杯僧不用驚鷗題柱客儘堪乘駟設天上填河靈鵲毋聼偽傳躡空中跨水長虹佇看髙步咄嗟事辦讃嘆福生逺塵居疏為善慶堂作歷𢾗河沙未盡僧祇之劫逺離塵垢詎忘吾佛之言一把茅得以蓋頭三條篾儘堪縳腹道須多助室乃茍完離舊隱稍入深居近新洋最為佳境展開一坐地具截斷諸塵勞門寒山雪不用掃除明鏡臺毋勞拂拭招白雲為伴侶更無心出岩岫之間對玉峯作畫圗其妙趣在丹青之外以安隱想入清淨觀陵口慈院化修造疏扶起法幢據一帶江山之陵口飛來禪錫憩十方雲水之路頭剪荆棘重作藂林掃埃燼仍為寶地數年不輟百廢俱興今將捲屋上之茅從新覆瓦更合剗階前之草依舊磨磚搆層軒奉七佛之師望北闕祝一人之壽小苾芻向前料理大檀那直下承當種種莊嚴綿綿接續使工師求木聚良材以待匠石之需為長者折枝修因果而有福田之報惟金爾諾庶玉其成方外交疏賀蘭楚芳住法濟寺以大法濟世而出接迹前修如小山招隱而來增輝同刋布金園雖云廢毁硬鐵漢斯可承當某人學有淵源名揚湖海虎阜藹勝雲之氣在昔與教藏通靈蛟溪響流水之聲至今效分座説法道將行歟人皆仰之西排灣重見珠林東印土俱成寶地陶彭澤入逺公社更不勞沽酒見招韓昌黎聼頴師琴自肯為賦詩相贈忘形緇素同志清髙塔寺疏青山門匝地荆榛化城安在紅塔寺倚天樓閣勝地重開雖苾芻卓錫而經營必檀越布金而成就掃除瓦礫整頓林泉壘七級之浮圖復還舊觀成一區之蘭若永守清規報施主恩祝聖人壽設冥道場榜金仙慈愍開八萬四千方便之門寶公科儀指一十二數超升之路既殷勤而修設宜次第以宣揚燃解脫香秉光明燭緇流星集幡影雲揚專追悼於一靈敬皈依于三寶禮菩薩諸天聖衆召阿鼻拾府冥王法雷鳴鐃鼓之音甘露灑盤盂之供經演三乘妙法懴除纍世愆尤燃藥師燈破諸幽暗施伽陀食濟衆飢虛散五采之仙花解多生之寃結爾齋主必加精恪無願不從我清衆各盡虔恭有感斯應伏願佛光普照法理圓融成就功德山存算比恆沙之喻脫離生死海亡靈得淨土之逰作佛事薦陳都事疏前常州經歷折名同仁字仲野念伯道之無兒誰承祭祀賴西方之有佛可兾超升追悼同寅投誠大覺伏念某官儒林拔萃仕路蜚英五六年勞贊畫蘭陵卓然可敬四千里赴承宣蓮幕遽爾云亡桐棺菆葬于太原木主奉祠于精舍供陳蔬筍香爇旃擅世尊放玉毫相光釋子誦金剛般若集恆沙之功德為淨土之莊嚴表我交情助公冥福伏願洋洋如在濯濯厥靈柏子庭前聼法會西來祖意蓮花臺上逰魂得上品化生賀徽太古住天寧寺疏一天寧有內外之稱經權並用九雲夢無蒂芥之迹觸背俱亡惟麟膠可續斷絃似烏獲能勝重任道之行也人皆見之某人前輩老成單提正印早入寂照室得徑山骨髓而歸親承圓悟宗聳秀峰頭角而出由由然寸絲不挂堂堂乎大器晚成坐蘭陵第一道場納芥子大千沙界蘇州有常州有總成佳話舊雨來今雨來皆與忘情鐘鼓雷鳴衣冠雲集古調唱陽春白雪餘音存脫節黃花韓昌黎海上留衣特出敬大顛之意蘇子瞻山中解帶不妨問佛印之禪凡與鷗盟永言為好賀聼聞極住天寧寺毗陵稱劇郡天寧為第一禪林泗州留法衣風化有許多因地舊綱維重新振舉大力量直下承當湖海推賢山林增重某人堂堂偉器藉藉英聲虎阜師承聞圓悟相傳之極致龍河法藏得摩維未譯之先幾浮杯使日出之邦駐錫憩春申之浦有聲畫無聲詩等為逰戲橫説禪竪説教儘自圓融踞此猊床香雲繚繞拈將麈拂花雨繽紛石池種靈運之蓮山門對獨孤之檜道則髙矣美矣人皆見之仰之三千年黃河清喜遭遇今朝之盛日十八賢匡廬社當繼承前輩之髙風凡我同盟順爾成德薦亡女疏因産而亡蝮母裂腸于生育轉致寃愆象王慈眼于沉淪能令解脫皈依大覺敷露微忱切念亡女某氏為結子之桃花一時飄墮視當階之蓂莢三載更新欲撤靈幃弘開法席梵唄演瑜伽教典慈恩降阿鼻獄人寶燈破冥路之昏斛食濟陀林之餒罪如霜釋業比氷消拯漂溺以上慈航洗穢濁而歸淨土伏願佛天覆幬靈魄慧臨大乘上乘最上乘裒諸功德欲界色界無色界從此超升常州府天寧寺修造疏娑婆世大千沙界往古來今毗陵郡第一道場殘山剩水大法幢要人扶起老禪衲領衆支撑開甘露門持修月斧佛有殿似靈光巋聳整天龍衛從之威鐘有樓如五鳯添修免風雨震凌之患新兩廡而雁堂奕奕廣丈室而猊座巍巍形勢依金城湯池周圍護銀山鐵壁興言多助立見有成視銀杏為雙樹林數百尺鬱蔥佳氣接曇花從五竺國二千年奕葉餘芳除服設醮薦亡疏明發懷人恐沉淪于下土齋沐祀帝敢對越于上蒼仰瞻威顔俯瀝情悃伏願恩光普照見旭日于雲中魂氣超升御靈飈于天上日之方中恩輝廣被天之所覆大德難名俯陳伉儷之情尚乞哀矜之賜伏願一誠天鑒幸獲接于齋壇萬罪氷消得早升于仙境日之夕矣事亡如存天何言哉有感必應稽首三瀆馳情九霄伏願黑籍除名竟飄然而遺世丹梯飛步即從此以登仙居喪踰古制之期緣嬰世務煉度仗髙真之力可濟幽靈仰籲洪鈞俯陳丹悃切念亡室某氏生無妬忌能內助以成家偹歷艱辛甫中年而即世琴瑟之音固絶室家之意難忘命黃冠演其科儀設清供同乎禴祭敷宣道典歌詠步虛諸孤除服以追哀十極降恩而超度伏願朝紫金闕乘織女之雲車居白玉京勝姮娥之月府尚期遺澤益裕後昆重建後餘橋疏論靈鵲填河之事每笑訛傳假祖龍鞭石之神何憂病涉眷此滆湖頭濶港實為鶴溪上要途惟諸公發鄭僑濟人之心則良工用媧氏補天之手以舊石加諸土木則新冬成此津梁客有馬長卿必為題升仙之柱賢如鄭子産毋勞用溱洧之車太平興國寺修塔造寺疏毗陵郡諸山起廢幸此明時太平寺一塔巋存依然壯觀風摧雨壞歲久月長戒壇與梵宇俱亡畫水在圖經空載巍巍乎七層巨搆茫茫然百畝荒基扶天柱之傾宜先出手聼風鈴之語會有知音雖卓錫已有人焉而布金必須長者千年鐵柱骨看青蓮居士重禮冥僧半天拍欄杆待簡齋先生留題佳句聿成勝事求著修名常州府送聰聞極住蘇州萬壽寺一笑視齊雲舍利重現神通三遷至禪月道場能繩祖武遽爾風吹别調本來雲出無心某人見合真知聞皆極致是空是色出熙恬藍外之青自本自根得妙喜骨中之髓進非躐等道在力行猊床擁五色香雲麈拂灑六時花雨以淞江太湖倒傾其法海于長洲茂苑振起其宗風登東山登泰山道眼蓋明于天下處北海處南海交情何異于日前尚曰鄰封無忘舊好常州府請中道立住天寧寺乾毒發一花五葉之春流芳震旦天寧為四縣諸山之冠鎮重毗陵必須得前輩老成乃可為後學師表竊有請也聞斯行之某人有藴皆空無道不立山林下工夫縝密湖海間聲價崢嶸無凖翁祖派傳來得寧翁虎丘之親授穹窿山珠寶招出升景山猊座以盛行連年橫野渡之舟此日擊誓江之楫平地把法幢扶起獨園隨坐具展開白槌雷鳴緇侶雲集金斗城鳴抱關之柝鐘鼓相聞鐵門限待問話之人衣冠聿至佇徯三祝同寅一誠普庵堂修齋安奉德藏主靈位代蟺作藂林鐘鼓道本貴于同修祠宇香燈義不忘于前輩敢謂東山小宗之從子仰于西方大覺之慈悲悃愊具陳慈悲諦聼切念故師伯藏主德公早遵父訓過匡廬蓮社之門繼得師承入靈隱竹泉之室主名山一大藏教典涉危途十餘載兵戈常時若緘口無言凡事皆灰心不作雖病業難逃于俗舍乃寂滅預知于去期法已茶毗禮宜蒲供安奉覺靈于舊隱宜設科教于今辰伏願成就菩提圓融般若六十五年娑婆世界夢幻俱空百千萬億清淨法身光明普照延福菴衆設法華道場保安疏居安慮危愍衆生之煩惱捍災禦患賴諸佛之慈悲俯述輿情仰千大覺切念某人等家居長幼咸寄幻于兩間氣候燠寒或愆和于四體共闡道場于延福同宣妙義于法華爐爇寶香藹祥雲之繚繞花生銀燭增慧日之輝光伊蒲列供于齋筵固果緣成于梵宇伏願佛天覆幬法雨霑濡五運六氣之流行無災無害七喻三周之功德無量無邉凡在乎鄰里鄉黨之間共享此壽富康寧之福延福菴修造疏修月之斧數千世傳異事補天之石五色神立竒功矧草創之禪院乃檀那之福地必加修補愈更作興或舍舊而圖新或裒多而益寡斧彼鋸彼輪焉奐焉上漏下滿處任在圬工東塗西抹時光生髤飾孔方兄但能助力阿羅漢别當現身非莊嚴是名莊嚴此福德勝前福德展開一坐具舉頭皆延福道場更上一層樓彈指見華嚴境界願言金諾事悉玉成常州天寧寺請性天之住山疏金大地作瓦礫場空王殿巋然突兀鐵門限為戟戈用僧伽衣久矣源靈必得人扶起法幢特為我展開禪席瓶盂雲集鐘鼓雷鳴某人北山三譍早歲入曇翁之室西江一吸無人當馬祖之鋒煮虛空煨赤腳鐺談般若聚點頭石在處香雲繚繞有時花雨繽紛時止時行了無里礙浙左浙右靡不依皈今菟裘為將老之營而竿木乃逢場之戲幸無多讓勇為此行吳山青越山青拄杖挑白雲飛起常州有蘇州有滿船載明月歸來延陵精舍疏併序昔司馬公諸君子在洛為邵堯夫先生買宅人到于今稱之今叔濓江徵君世居江隂與延陵季子墓同里清風髙節實景慕之邇來避地吳下欲築延陵精舍于淞江之上使學者有所依歸吾黨之士宜相率以助其費亦庶乎為堯夫買宅之意也不揣僣言作成幸甚君子攸居不鄙九夷之陋英才可教常存三樂之心欲襟佩之從逰宜齋廬之講習非助我者孰能為之切見某人喬木世家飄蓬叔世書劍客長洲茂苑襟懷藹和氣春風五色筆之文章家傳久矣十字碑之賢墓鄉念存焉築精舍笠澤之濱揭故園延陵之扁既不忘乎枽梓且樂育於菁莪願言為長者折枝僉曰使工師求木美輪美奐鼓瑟鼓琴試看荷蕢過門之徒皆為升堂入室之士青山在上流水在下馬公案樂花竹餘春先生如丘學舍如舟蘇子以虀鹽送老亟圖燕賀永締鷗盟呈長洲縣請修顧元公祠堂文嘗謂古昔名賢合奉蒸嘗之禮世俗淫祀豈容混雜其間風化所關事宜改作切見晉散騎常侍贈侍中驃騎將軍開府儀同三司顧元公相門華裔文武全才當時與陸機陸雲並稱三俊王導慕江南之望張華號南京之竒平六州之大亂成一代之竒功其他勳業具載晉史祭典曰有功德于民則祀之若元公之賢理宜廟食今墓在長洲縣二十九都皇天蕩南舊有祠堂為鄉里奉嘗之地近被一等無知小民將本處廢廟中土地神像移入本祠使夫婦列坐玉石混淆亂惑觀聼于理未應如蒙官為致祭撤去續添神像禁斷樵牧整葺祠宇非惟尊先賢辨淫祀以明禮法且能正人心勵風俗有補風化為此合行具呈崑山州學講堂上梁文設庠序學校之教于國中人倫為重聞金石絲竹之音于堂上聖道彌尊賴有人心上經綸見此屋眼前突兀恭惟某知州相公理明聖學職守神州念斯文重係綱常知厥職實兼師帥如文翁化蜀多除弟子之更繇似常衮治閩親與諸生相揖讓顧瞻鶚泮乃搆鱣堂看接武布武于上下之間欲求仁得仁于講論之際先聖人洋洋如在賢太守赫赫厥聲視鄭之不廢鄊校而過之比魯公能修泮宮而成矣齋廬俱偹堂廡亦新騶虞之德諸侯之風是皆本先王之教宗廟之美百官之富喜共窺夫子之門爰舉修梁敢陳善頌梁之東日出扶枽麗太空五色喜看祥瑞現八荒都在照臨中梁之西湖上青山玉筍齊千里風塵銅馬去四郊春雨錦鳩啼梁之南負郭人家甕繭蠶共愛甘棠周召伯重歌岐麥漢張堪梁之北江水滔滔歸海國人心亦自水朝宗聲教依然流九域梁之上萬象森羅天蕩蕩日邊氛祲已全銷天下太平今可望梁之下州里絃歌總風雅三吳德化服淮夷多士文章繼班馬伏願上梁之後一人有慶萬邦咸寧舞干羽格苗民之頑大禹班師而勿用修文德來逺人之服顓臾近費以何憂化日舒長士風益盛募朋友置十七史疏農有災畬可盡耕鋤之力儒無簡册曷資講習之功借于人或誚為癡閲于市目亦可笑切見某人螢窗苦學陋巷甘貧十七史歷代之書擬求善本數千載古人之事又欲周知區區未遂其心咄咄不離于口割鷺股奈何無肉刮龜毛安得成氊雖君子存固窮之心在朋友有通財之義多助寡助大書特書便令載米家之船管取插鄴侯之架知之者好之者樂之者相與講明歲之餘日之餘時之餘儘教披玩其為感佩奚可弭忘卿王伯祥王子芳王仲德各一百貫折當時以中統鈔題助者趙師呂蕭昭外蕭子璋金君玉各草五貫僧琇玉林草貫折葛用中王君壽道士鄧混然各五十貫祁塵心買紙儒學內印置共作四百六十册所用折命甥女壻周明舉詣集慶路干託士友陳雪諸史時至元五年歲在己卯余在鳴鳯王氏折裝潢作料工直等費計二百貫淡泊齋藏貯藏金壇縣尹琇峯家其子吾壻也折家孰是書至主正丙午春因避兵寄勸募刋思賢録疏代張希尹作某伏覩故宋道鄊先生鄒忠公常郡名賢程門傳道其一言一行皆可為天下法若龜山楊公了齋陳公南軒張公晦菴朱文公丞相李忠定公諸賢咸有贊述宋季及元郡守教官暨諸名士嘗為表著祠墓之作散諸四方者不一龜巢老人謝某裒輯成編名思賢録然非鐫梓以傳則忠公與諸賢之文辭將遂湮沒寧不惜哉某比以楮版百片助之其鋟刻之資尚有望于好事君子書成之日庋置學宮庶得以貽永久也洪武十一年八月中秋日江隂張端刋龜巢摘藁代王尚絅作嘗觀石鼓之書閲二千餘年剝落未盡學者猶可得而傳焉近代版刻亦類此今吳中宗禮黃氏欲以龜巢謝先生之詩􅍢版而傳之適以事阻因循十年敢用告諸君子與巢翁相知請為協力以玉其成夫巢翁之詩多以忠孝節義形于詠歌茍得刻木以廣其傳于世教豈小補哉龜巢藁卷之十三終
